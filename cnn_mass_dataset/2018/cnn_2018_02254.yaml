  Landrieu said he believes at the same time that Congress should pass a comprehensive immigration system overhaul and called the practice of separating families at the border a “cruel thing.”
  
  The former mayor repeatedly said he was not a candidate for president and did not yet plan to run in 2020, but he predicted a “family fight” among Democrats as they seek to limit President Donald Trump to one term. Landrieu said he expects a wide swath of candidates, including some who occupy the right and center positions of the Democratic Party, and again called for a “big tent” approach.
  
  “The bigger message for Democrats long term is to do what the Republicans are not doing, which is to be a big tent party, to make sure that everybody has got room,” Landrieu said.
  
  Asked about the momentum among self-described progressives and left-wing voices, Landrieu said the party would be misguided to quell that energy, but that Democrats should “forge” the energy toward pragmatic governance.
  
  Landrieu’s appearance on CNNcame aheadof the progressive political convention Netroots Nation in New Orleans, where major contenders for the 2020 race are set to appear. Asked about what it might mean that he was not scheduled to be at the event in his hometown, Landrieu said he had not been invited, but he did not think that was “a sign of anything plus or minus.”
