title: "Landrieu: Democrats must ‘govern in a pragmatic way’"
date: "2018-07-29"
section: "Politics"
url: "https://www.cnn.com/2018/07/29/politics/mitch-landrieu-state-of-the-union-cnntv/index.html"
content: |
  Former New Orleans Mayor Mitch Landrieu distinguished himself from budding voices in the left wing of the Democratic Party on Sunday and called for a “big tent” approach in the run-up to the midterm elections.
  
  “I have always talked about governing from the middle,” Landrieu said on CNN’s “State of the Union.” “I am what they call a radical centrist. There’re not many of us left anymore. And yeah, it is really important for us to make sure that if we are given the responsibility to govern, that we govern in a pragmatic way, in a big tent way that makes sense.”
  
  Landrieu has found his way onto lists of potential 2020 contenders as speculation mounts about the upcoming presidential election and prospective candidates position themselves. While many high-profile potential candidates have taken positions staunchly to the left, such as calling for abolishing the Immigrations and Customs Enforcement agency, Landrieu said he does not think that is the right way to go.
  
  “I don’t think abolishing ICE is a good idea,” Landrieu said. “Primarily, because when police departments get out of the way, do the wrong thing or govern in the wrong way, you don’t say get rid of the police department; you reform the police department.”
  
