title: "Bolton: US still ‘waiting’ for North Korea to start denuclearizing"
date: "2018-08-07"
section: "Politics"
url: "https://www.cnn.com/2018/08/07/politics/john-bolton-north-korea/index.html"
content: |
  President Donald Trump’s national security adviser John Bolton said on Monday that the administration does not feel North Korea is living up to its end of an agreement to denuclearize.
  
  The comments from Bolton came as Secretary of State Mike Pompeo has been stressing the process will take time, revealing a possible split within the administration over how to handle Pyongyang.
  
  “We’re waiting for the North Koreans to begin the process of denuclearization, which they committed to in Singapore and which they’ve not yet done,” Bolton told CNN the same day.
  
  Bolton also stressedin the CNN interviewthat Trump had been willing to have a dialogue with North Korea and likened the US approach to North Korea with its pressure on Iran.
  
  “Maximum pressure on both governments to give up their pursuit of deliverable nuclear weapons, but a willingness to talk to their leaders to see if there’s a way out,” Bolton said.
  
  Pompeosaid last weekthat North Korea was “closer” to denuclearization, but that “the ultimate timeline for denuclearization will be set by Chairman Kim, at least in part.”
  
  State Department spokeswoman Heather Nauert said Pompeo told his North Korean counterpart Ri Yong Ho that they should talk again soon and that Ri replied, “There are many productive conversations to be had.”
  
  Pompeo’s comments came on the heels ofa reportfrom The Washington Post that officials believe new indicators showed North Korea could have been in the process of building new intercontinental ballistic missiles.
