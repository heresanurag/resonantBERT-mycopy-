title: "Nicole Kidman duets with Keith Urban in honor of International Day of the Girl"
date: "2018-10-11"
section: "Entertainment"
url: "https://www.cnn.com/2018/10/11/entertainment/nicole-kidman-keith-urban-international-day-of-the-girl/index.html"
content: |
  Keith Urban enlisted the help of three very important women in his life to help him mark International Day of the Girl.
  
  Urban and wife Nicole Kidman performed a duet of the country star’s song “Female” in honor of the special day, a performance that was subsequently filmed by their daughters, Sunday and Faith, and posted by the actress to Instagram.
  
  Kidman is featured in the background vocals on the studio version of the song, but has never performed it with her husband in public.
  
  “Of all songs to have her sing on, it was the right one,” Urbantold E!last year.
  
  The United Nations has celebrated International Day of the Girlsince 2012to promote girls’ empowerment and highlight the various challenges girls around the world face in their quest to be treated equally, receive education and reach their full potential.
  
  Kidman has been a Goodwill Ambassador of UN Women since2006.
