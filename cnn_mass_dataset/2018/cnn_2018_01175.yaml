id: cnn_2018_01175
title: "Voters are extremely interested in the 2018 midterms"
date: "2018-07-13"
section: "Politics"
url: "https://www.cnn.com/2018/07/13/politics/2018-midterms-fox-poll/index.html"
content: |
  Seven-in-10 registered voters say they’re extremely or very interested in the November elections, a record high inFox News pollingfor their midterm election tracking since 2010.
  
  More Democrats, 77%, say they’re interested in the elections, compared with 74% of Republicans and 44% of independents.
  
  The 70% figure for extremely or very interested is a new high. Interest in previous years has come close to that, but only right before Election Day. In late October polls in 2014 and 2010, 68% said they were interested. It’s now just the start of July, and already voters have surpassed usual levels of interest.
  
  In a follow-up question, Fox asked if, compared with previous congressional elections, voters thought they were more enthusiastic about casting ballots than usual, less enthusiastic or about the same as usual. Forty-four percent said they were more enthusiastic, 43% said they were about the same as usual and only 10% said they were less enthusiastic.
  
  Republicans were more likely to say they were about the same as usual in terms of excitement, while Democrats believed they’re more enthusiastic.
  
  Forty-eight percent of voters said they would support the Democratic candidate in the upcoming election and 40% reported they preferred the Republican.
  
  However, the fact that they would support that party member in their congressional election didn’t mean they believe in the party as a whole. When asked if the Democratic Party has a clear plan for the country, fewer people agreed with that statement than those who said the Republican Party has a plan.
  
  Especially interesting, significantly more Republicans thought their own party had a plan for the country (65%) than Democrats who felt that way about the Democratic Party, with about half of saying so. This could be attributed to the fact that Republicans are in power and their plan can be seen in action, but it should be a troubling figure for Democratic leaders.
  
  Not everyone is as excited about talking about their political views as they are about voting on them, however. Fox asked whether voters in the last year have intentionally avoided talking with friends and family who have different political views. Respondents were exactly split, with 48% saying yes and the same amount saying no.
  
  Among the most likely to say they had avoided talking about differing political beliefs were those who lived in union households (63%), women (56%) and whites with college degrees (56%). Men (55%), nonwhite voters (55%) and Trump voters (52%) were the least likely to avoid discussing those matters.
  
  TheFox News Pollis conducted under the joint direction of Anderson Robbins Research (D) and Shaw & Company Research (R). The poll was conducted by telephone with live interviewers July 9-11, 2018, among a random national sample of 1,007 registered voters (RV). Results based on the full sample have a margin of sampling error of plus or minus 3 percentage points.
