title: "Black men are succeeding in America"
date: "2018-07-03"
section: "Opinion"
url: "https://www.cnn.com/2018/07/03/opinions/good-news-for-black-men-in-america-opinion-wilcox-wang-mincy/index.html"
content: |
  Editor’s Note:W. Bradford Wilcox (@WilcoxNMP), a professor of sociology at the University of Virginia, is a senior fellow at the Institute for Family Studies and a visiting scholar at the American Enterprise Institute. Wendy R. Wang is director of research at the Institute for Family Studies. Ronald B. Mincy is Maurice V. Russell Professor of Social Policy and Social Work Practice and director of the Center for Research on Fathers, Children and Family Well-Being at Columbia University. The opinions expressed in this commentary are theirs.
  
  In recent years, much of the racial news in America has been sobering, if not depressing. Trayvon Martin. Tamir Rice. Walter Scott. Ferguson. Baltimore. And Charlottesville. While manypublic commentators, like Ta-Nehisi Coates,have underlined the enduring character of racism in America, and the ways in which America’s racial divide has exacted a particular kind of toll on black men and boys, there is today, unheralded, good news about African-American men.
  
  Despite a portrait of race relations that often highlights the negative, especially regarding black men (many Americans, according to a 2006 study by the Washington Post, Kaiser Family Foundation, and Harvard University,believedthat crime, unemployment, and poverty are endemic among African-American men), the truth is that most black men willnotbeincarcerated, are notunemployed, and are notpoor– even if black men are more likely than other men to experience these outcomes.
  
  In fact, millions of black men are flourishing in America today.
  
  Our new report, “Black Men Making It In America,” spotlights two pieces of particular good news about the economic well-being of black men.
  
  First, the share of black men in poverty has fallen from 41% in 1960 to 18% today. Second, and more importantly, the share of black men in the middle or upper class – as measured by their family income – has risen from 38% in 1960 to 57% today. In other words, about one-in-two black men in America have reached the middle class or higher.
  
  This good news is important and should be widely disseminated because it might help reduceprejudicialviews of black men in the society at large, and negative portrayals of black men in themedia. It should also engender hope among all African-Americans – particularly young black males.
  
  Racial bias is not just a Starbucks problem
  
  Correcting overly negative depictions and attitudes regarding black men is important because they shape how black men are treated, and how black men view their potential.  Alan Jenkins, executive director of Opportunity Agenda, a social justice organization,noted that“Research and experience show that expectations and biases on the part of potential employers, teachers, health care providers, police officers, and other stakeholders influence the life outcomes of millions of black males.”
  
  So, what routes are black men taking to make it in America?
  
  Tracking black men from young adulthood through their 50s using data from the National Longitudinal Survey of Youth 1979, we identified three factors that are associated with their success: education, work, and marriage.
  
  Black men who worked full-time, had some college education, or were married were much more likely to be members of the middle or upper class by the time they got to their 50s. We found, for instance, that the odds that black men make it to the middle or upper class are at least three times higher for those men who marry, compared to their peers who never married. Their financial well-being is higher partly because married black women contribute ahigher shareof income to the household than other married women.
  
  Adding to the chances of black men achieving middle class and higher status is the US military. We found that serving in the military was associated with a 72% increase in the odds that black men made it into the middle class or higher as 50-something men.
  
  By providing stable work, good health care, housing, and opportunities for advancement, by championing virtues such as duty, responsibility, loyalty, and perseverance, and by pushing racial integration, the US military has served as an important route into the middle class.
  
  My only crime was being a black man in America
  
  Moreover, the US military is also known for its marriage-oriented culture, and we found that black men who served in the military as young men were much more likely to be married later, at ages 29-37, compared to their peers who did not serve. This marriage advantage played a role in boosting their later odds of success.
  
  Of course, the story our report tells is not all rose-colored. Black men are significantly less likely to make it into the middle and upper class than their white and Asian-American peers. The odds of black men in their 50s making it to the middle class were about60% lowerfor those who were charged with a crime as a young adult.
  
  Given that racialsegregation, poverty, andbiasaffect the odds that young black males get caught up in the criminal justice system, systemic racism limits the economic fortunes of black men. What’s more: right now, only a small minority of black men graduate from college:17%. Schools and colleges need to do more to identify, recruit, and support young black men so they are accepted, attend, and graduate from four-year colleges and universities in the US.
  
