title: "24 headlines that sum up 1 very bad week for Donald Trump"
date: "2018-07-20"
section: "Politics"
url: "https://www.cnn.com/2018/07/20/politics/week-in-review-trump-headlines/index.html"
content: |
  It’s hard to avoid hyberbole when it comes to Donald Trump. The President himself constantly engages in braggadocio about the biggest this or the worst that. He lives in a world of extremes and, therefore, the way that he is covered tends to favors the extremes as well.
  
  And yet, it’s very hard to look at this past week and not see it as the worst one of Trump’s 18 months – to the day! – in office.
  
  Rock, paper, soccer: This week in politics, GIF'd
  
  The week began with Trump’sdisastrous press conferencein Helsinki with Russian president Vladimir Putin in which he sought to cast the Russian interference in the 2016 election as at least partly America’s fault.
  
  Tuesday was consumed by the debate overwhether Trump meant “would” or “wouldn’t”in regard to Russia meddling.
  
  The White House spent Wednesdaywalking back Trump’s assertionearly in the day that Russia was no longer targeting the US.
  
  Thursday brought the news that Trumphad invited Putin to a second summitin Washington this fall – an announcement that surprised at least one person: Director of National Intelligence Dan Coats.
  
  Then, today, we learned that Michael Cohen, the President’s longtime fixer,secretly taped a conversationwith Trump regarding a possible payout to a former Playmate alleging she had an affair with Trump in the mid-2000s.
  
  A disastrous week – from beginning to end. Even by Trumpian standards. Below, the week as told through 24 major headlines.
  
