id: cnn_2018_02092
title: "More than 30 children become sick at Florida summer camp"
date: "2018-06-22"
section: "US"
url: "https://www.cnn.com/2018/06/22/us/florida-sick-children-summer-camp/index.html"
content: |
  More than 30 children attending a summer camp in Florida were taken to the hospital Thursday after they suddenly fell ill, the Highlands County Fire & EMS said.
  
  The 33 children and three adults were at the Cloverleaf 4H camp in Lake Placid, Florida, when they were taken to local hospitals Thursday night, officials said.
  
  The camp is about 100 miles southeast of Tampa, Florida.
  
  Most of the children suffered nausea and one child passed out, CNN affiliateWFLAreported.
  
  None of the cases appear to be serious, emergency officials said.
  
  The children attending the camp are from several counties around the state, including Charlotte, Desoto, Sarasota, Palm Beach, Broward, and Miami Dade counties.
  
  It’s unclear what made the children sick.
