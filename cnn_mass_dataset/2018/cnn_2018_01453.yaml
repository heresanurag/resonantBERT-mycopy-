title: "Mar-a-Lago files request to hire 61 foreign temporary workers"
date: "2018-07-06"
section: "Politics"
url: "https://www.cnn.com/2018/07/06/politics/mar-a-lago-foreign-workers-request/index.html"
content: |
  President Donald Trump’s resort, Mar-a-Lago, filed a request to the Department of Labor for 61 additional visas for foreign servers and cooks, according toJob Order Records filedon Thursday and Friday.
  
  The Florida resort requested 61 H-2B visas, which are visas for temporary non-agricultural workers. In order to obtain H-2Bs, employers must prove that there are not enough US workers who are“able, willing, qualified, and available”to do the temporary work. 40 of the visas were for servers, while 21were for cooks.
  
  In January, the resort requested 70 H-2B visas forcooks,housekeepers, andservers.
  
  The latest request sets the wages at $12.68 per hour for the servers and $13.31 for the cooks. Due to terms set by the visa, employees can only work for the company that sponsors the visa itself. The servers and cooks would work October through May.
  
  The President has said before in a 2015 interview with MSNBC that “getting help in Palm Beach during the season is almost impossible.” However, the New York Times reported in 2016 thatsince 2010, only 17 of 300 American applicants were hired at the club. And since October of 2015, Mar-a-Lago has filed 10 separate requests for H-2B visas.
  
  Though Mar-a-Lago requested 61 visas, information has not been made public on how many visas it will receive. Congress sets a cap of 66,000 new H-2B visas a year.
