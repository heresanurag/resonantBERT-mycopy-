  Yet again,America grieves. Here’s what you might have missed on CNN today:
  
  – This is a really bad year for the flu. Thefirst human case of the H7N4 strainof avian flu has been reported in China.
  
  – Three more states announced thatthey will investigate Aetnaafter a stunning admission from a former medical director.
  
  – Former White House aide Rob Porter told his ex-wife about his security clearance being “delayed,” in partbecause of concerns that he might be “violent.” At least 100 White House officials served with “interim” security clearances until November 2017,more than a year after Trump was elected.
  
  – Russia is now the one yelling interference. The country says it hasproof of Western influencein its upcoming election.
  
  – South Africa hasa new president.
  
  – A massive sinkholeprompted evacuationsin Rome.
  
  – McDonald’s istaking cheeseburgers out of the Happy Mealby 2022.
  
  –Buzzing from the Olympics: American skier Mikaela Shiffrin isoff to a gold start. Age is nothing but a number for theOlympians of winter. And it’s not been so “Cool Runnings” for theJamaican bobsled team. Here’s the day in Pyeongchangas it happened.
