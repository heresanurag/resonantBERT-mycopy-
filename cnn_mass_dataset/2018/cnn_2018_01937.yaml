  _August 28, 2018_
  
  _Today’s show begins with an in-depth explanation of NAFTA, as the U.S. and Mexico forge a new agreement while analysts wonder if Canada will join in. Also featured is a look at the effects that Hurricane Lane had on Hawaii. And after a report on a new type of passenger spacecraft, we’re telling you about a professor’s attempt to set a world record for the longest continuous college lecture._
  
