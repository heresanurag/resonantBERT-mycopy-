title: "Quickly catch up on the day’s news"
date: "2018-07-02"
section: "App News Section"
url: "https://www.cnn.com/2018/07/02/app-news-section/quickly-catch-up-july-2/index.html"
content: |
  Here’s what you might have missed Monday on CNN:
  
  – They’re alive! An international rescue mission found12 boys and their soccer coachafter nine days trapped in a cave.
  
  –Michael Cohen, President Donald Trump’s personal attorney, said his loyalty belongs to his “family and country” before Trump.
  
  – Police arrested a man for allegedly planning aJuly Fourth terror attackin Cleveland.
  
  –Harvey Weinsteinwas charged with three additional sexual assault charges, carrying a maximum sentence of life imprisonment.
  
  – If you can’t handle the heat: The Northeast is enduring the year’s worstheat wave, with temperatures reaching 95 degrees Fahrenheit.
  
  –Roseannereturns? The disgraced comedianis contemplating a return to the world of TV.
  
  – Themayor of a Philippines citywas shot and killed by a sniper this morning. He was controversial for his drug offense policy.
  
  –The Defense Intelligence Agencythinks Kim Jong Un does not intend to fully denuclearize, for the time being.
  
  – Tennis superstarRoger Federerbounced out of his 21-year sponsorship deal with Nike, signing with Uniqlo for $300 million.
