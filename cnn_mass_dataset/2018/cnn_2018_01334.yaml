  Amar said the health agency had not taken previous cases reported by the regional register into account, despite multiple appeals, previously concluding that there were not an excessive number of cases with abnormalities.
  
  In response, the health agency said it had identified three clusters,  two of which show an excessive amount of cases. “We considered that in the Ain region there was not an excessive amount whereas Remera said there was. This is where there is a disagreement,” it said.
  
  Santé Publique director François Bourdillon told French radio stationRTL thatthere are usually 150 cases a year, but experts have questioned this figure.
  
  Amar now welcomes the nationwide investigation but wants it to be done correctly and independent of the health agency, she said.
  
  Santé Publique will work with L’Anses, the agency that monitors the environment, to investigate these cases and meet with local mayors and the families to work out what these families have in common, Buzyn told French TV.
  
