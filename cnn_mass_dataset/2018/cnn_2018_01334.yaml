  But Amar questions whether that will all happen. “The families are devastated,” she said. “Yesterday, a doctor went to the home of one of the mothers who collapsed after listening to the Public Health Agency statement on television saying that they had contacted the families when in fact they had never called.”
  
  Santé Publique said Remera met with families in the Ain region, not the health agency, adding, “we will contact the families and we will see them next Tuesday. “
  
  It has also called for a national foundation of registers to be set up to “allow us to re-evaluate the number of cases and know if there is an excessive number of cases,” the agency said.
  
  Buzyn said the first results of the investigation will be released at the end of January and the whole investigation before June.
