id: cnn_2018_01334
title: "France launches nationwide investigation after babies born with missing or malformed limbs"
date: "2018-11-01"
section: "Health"
url: "https://www.cnn.com/2018/11/01/health/france-babies-missing-limbs-investigation-intl/index.html"
content: |
  France has launched a nationwide investigation into abnormal rates of babies born with missing or malformed limbs in several regions after 11 new cases were identified.
  
  In October, the country’s health agency, Santé Publique France, presented seven cases in three geographical areas that had been alerted by the regional register for birth defects, Remera.
  
  Additional tests conducted with hospital data in the Ain region, near the Swiss border, revealed more suspect cases, totaling 18 over 15 years from 2000 to 2014.
  
  For now, the cause remains unknown, Health Minister Agnès Buzyn said.
  
