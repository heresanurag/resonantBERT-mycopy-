  A woman skis on the grounds of the Kolomenskoye estate in Moscow.
  
  YURI KADOBNOV/AFP/Getty Images
  
  ![Image 7: A girl rides a pony in the Botanical Garden in Moscow.](https://media.cnn.com/api/v1/images/stellar/prod/180205103100-08-moscow-snow-0204.jpg?q=w_3000,h_2002,x_0,y_0,c_fill/w_1093)
  
  A girl rides a pony in the Botanical Garden in Moscow.
  
  Maxim Marmur/AP
  
