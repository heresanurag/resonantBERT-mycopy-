  # Records fall in Moscow as snow blankets Russian capital
  
  By Zahid Mahmood, Mary Ilyushina
  
  Feb 5, 2018
  
  PUBLISHED Feb 5, 2018, 10:39 AM ET
  
  Russia Storms Aviation news
  
  [See all topics](http://www.cnn.com/follow)
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2018%2F02%2F05%2Feurope%2Fmoscow-snow-breaks-record-intl "Share with email")Link Threads
  
  Link Copied!
  
  ![Image 1: Snow blankets Red Square in Moscow on Monday, February 5, causing delayed flights and power cuts.](https://media.cnn.com/api/v1/images/stellar/prod/180205103402-10-moscow-snow-0205.jpg?q=w_3000,h_2000,x_0,y_0,c_fill/w_860)
  
  Snow blankets Red Square in Moscow on Monday, February 5, causing delayed flights and power cuts.
  
  Pavel Golovkin/AP
  
  At least one person has died and five have been injured as Moscow endures its heaviest snowfall in more than 60 years.
  
  More than 850 flights were either canceled or postponed, according to local media RBC. The Ministry of Emergency Situations confirmed that 2,000 trees fell overnight in the Russian capital.
  
  The snowfall broke a Moscow record set in 1957, authorities said.
  
  Ad Feedback
  
  “One person died from a falling tree that hit an electric power line,” Moscow Mayor Sergi Sobyanin said in a [tweet](https://twitter.com/mossobyanin?lang=en). “According to the latest data, there are five victims. Be careful.”
  
  Sobyanin also said children were not required to attend school because of the severe weather.
  
  The Russian capital recorded 22 centimeters (8.6 inches) of snow Sunday – more than half of its monthly average snowfall. The figure will rise to 47 centimeters (18.5 inches) by the end of Monday, deputy mayor of Moscow Petr Biryukov said.
  
  In one Moscow district, the military was deployed to clean up the snow which had become too much for local services to handle, Biryukov added.
  
  ![Image 2: A bulldozer plows through snow in Red Square in Moscow on Sunday, February 4.](https://media.cnn.com/api/v1/images/stellar/prod/180205101419-01-moscow-snow-0204.jpg?q=w_3000,h_1997,x_0,y_0,c_fill/w_1093)
  
  A bulldozer plows through snow in Red Square in Moscow on Sunday, February 4.
  
  VASILY MAXIMOV/AFP/Getty Images
  
  ![Image 3: A passenger gingerly leaves a bus during the blizzard in Moscow.](https://media.cnn.com/api/v1/images/stellar/prod/180205102402-02-moscow-snow-0204-restricted.jpg?q=w_3000,h_2002,x_0,y_0,c_fill/w_1093)
  
  A passenger gingerly leaves a bus during the blizzard in Moscow.
  
  Mikhail Japaridze/TASS via Getty Images
  
  ![Image 4: A nun shovels snow in front of a nunnery in the village of Bogoslovo, 190km outside Moscow.](https://media.cnn.com/api/v1/images/stellar/prod/180205102551-04-moscow-snow-0204.jpg?q=w_3000,h_2179,x_0,y_0,c_fill/w_1093)
  
  A nun shovels snow in front of a nunnery in the village of Bogoslovo, 190km outside Moscow.
  
  KONSTANTIN CHALABOV/AFP/Getty Images
  
  ![Image 5: A tramway track is cleared of snow.](https://media.cnn.com/api/v1/images/stellar/prod/180205102719-05-moscow-snow-0204-restricted.jpg?q=w_3000,h_2003,x_0,y_0,c_fill/w_1093)
  
  A tramway track is cleared of snow.
  
  Artyom Geodakyan/TASS Getty Images
  
