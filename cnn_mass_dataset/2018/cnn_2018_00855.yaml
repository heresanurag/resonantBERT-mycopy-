id: cnn_2018_00855
title: "Watchdog report says admin was ‘not fully prepared’ for family separations at border"
date: "2018-10-02"
section: "Politics"
url: "https://www.cnn.com/2018/10/02/politics/dhs-report-family-separations-zero-tolerance-policy-border/index.html"
content: |
  The Department of Homeland Security was “not fully prepared” for the rollout of the Trump administration’s “zero tolerance” policy at the US-Mexico border that resulted in the large numbers of family separations this summer, according to an internal report from the department’s watchdog.
  
  Thenew reportfrom the DHS inspector general also says that Customs and Border Protection detained at least 861 unaccompanied children for extended periods beyond the legally allowed 72-hour time period.
  
  'I wouldn't wish it even on my worst enemy': Reunited immigrant moms write letters from detention
  
  One was held in a Rio Grande Valley facility for 25 days, the report says.
  
  DHS also provided “inconsistent information,” which led some parents to not understand that they would be separated from their children and unable to communicate with them.
  
  The Justice Department Tuesday revealed that its inspector general has also opened a review into its role in the program.
  
  According to the DHS inspector general’s observations, Border Patrol agents did not appear to take steps – like providing wrist bracelets, taking fingerprints or photographs – to ensure that children too young to talk to their separated parents could be correctly identified and linked with the proper file.
  
  The department also announced on June 23 that it, along with Health and Human Services, had “a central database” of location information for separated families.
  
  The inspector general, however, said it found no evidence that such a database exists. DHS officials told investigators that the “central database” is actually a spreadsheet manually maintained by HHS, CBP and Immigration and Customs Enforcement.
  
  DHS spokesperson Katie Waldman said the report shows the need for new immigration laws.
  
  “The findings of OIG report illustrate the difficulties in enforcing immigration laws that are broken and poorly written,” Waldman said in a statement. “The report fails to understand where the Zero Tolerance Policy took effect: in between the ports of entry.”
  
  The report is built off the inspector general’s unannounced site visits to CBP and ICE facilities in and around El Paso and McAllen, Texas, on June 26 to the 28. The report was merely an initial observation on the period from May 5 toJune 20and it does not make recommendations.
