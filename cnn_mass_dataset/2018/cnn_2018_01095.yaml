title: "Settle in with these weekend reads"
date: "2018-10-26"
section: "App News Section"
url: "https://www.cnn.com/2018/10/26/app-news-section/weekend-reads-oct-27-trnd/index.html"
content: |
  Why food matters in the midterms. How the most famous photos in hip-hop came about. Grab a cup of coffee and settle in. Here’s what you might have missed during a busy news week.
  
  We talked to dozens offarmers in the heartland. Their ties to President Trump have weakened, but Democrats will have a hard time winning them over.
  
  The transgender community is on high alert aftera leaked memosuggested the government wants to define sex by genitalia at birth. Experts say it could have implications beyond the LGBTQ community.
  
  A mother donated her newborn’s body to science. Now, a lawsuit alleging that the hospital instead gave the body to a Detroit funeral homemay have helped authorities discoverthe remains of 63 fetuses or infants.
  
  Doctors are seeing increased stress in pregnant patients who are immigrants. That stress can put those mothers – and potentially their babies – at risk. One Mexican immigrant sharesthe complications she faced.
  
  As more black athletes use their public platforms to protest racism, some white athletesare reckoning withwhat they should do for their teammates.
  
  Every hip-hop fan knowsthe photos: The Notorious B.I.G. rocking the “King of New York” crown, Tupac Shakur with the double-finger salute, Jay-Z peeking through his hands as he throws his diamond up. Now a journalist wants to share how they came about.
