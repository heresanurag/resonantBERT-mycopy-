  He was the first man to protest withColin Kaepernickagainst social injustice and police brutality when they were teammates at the San Francisco 49ers and on Sunday Eric Reid became the first Carolina Panthers player to kneel during the American national anthem. None of Reid’s teammates joined him.
  
  My Brother@E_Reid35, with@KSTiLLSand@iThinkIsee12, continue to take a knee against systemic oppression. They are  unwavering in their conviction!#ImWithReidpic.twitter.com/NP7h6aQHUH
  
  The 26-year-old, who has filed a grievance against the NFL, was back on the field for the first time in nine months after signing with the Panthers on September 27.
  
  After the Panthers 33-31 win, Reid told reporters: “People who don’t want things to change, people who want to maintain the status quo … they have to subvert. They have to distract. They have to redirect from what we’re trying to accomplish. We have to stay strong. We have to stay diligent.”
  
