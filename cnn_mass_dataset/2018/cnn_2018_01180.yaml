  1:27  • Source: [CNN](https://www.cnn.com/)
  
  ![Image 3: White House staff secretary Rob Porter, left, walks with White House senior adviser Stephen Miller from Marine One across the South Lawn of the White House in Washington, Monday, Feb. 5, 2018, as they return with President Donald Trump form Ohio. (AP/Manuel Balce Ceneta)](https://media.cnn.com/api/v1/images/stellar/prod/180208150429-rob-porter-02-05-2018.jpg?q=x_529,y_159,h_1045,w_1857,c_crop/w_860)
  
  Porter in talks for promotion when he resigned
  
  1:27
  
  Washington—
  
  White House chief of staff John Kelly is defending the handling of former White House staff secretary Rob Porter, who resigned last week after media reports revealed allegations by his ex-wives that he abused them.
  
  “It was all done right,” Kelly told the Wall Street Journal in[comments published](https://www.wsj.com/articles/fbi-director-defends-handling-of-background-check-of-former-trump-aide-1518542822) Tuesday.
  
  Kelly has come under fire for his handling of the matter and initial statement of support for Porter, and FBI Director Chris Wray on Tuesday[offered information](https://www.cnn.com/2018/02/13/politics/christopher-wray-white-house-rob-porter/index.html) about Porter’s security clearance process that conflicted with the White House’s stated timeline.
  
  Ad Feedback
  
  Kelly said “no” when asked if the White House should have handled the scandal differently.
  
  Wray said on Tuesday that the FBI had briefed the White House on several occasions about the status of Porter’s investigation, submitted a completed background investigation last July and closed the file last month.
  
  [Related article ![Image 4: 01 wray trump SPLIT](https://media.cnn.com/api/v1/images/stellar/prod/180202064958-01-wray-trump-split.jpg?q=x_0,y_0,h_900,w_1599,c_fill/h_720,w_1280/w_256) SAUL LOEB/AFP/Getty Images FBI director contradicts White House's Porter timeline](http://www.cnn.com/2018/02/13/politics/christopher-wray-white-house-rob-porter/index.html)
  
  In response to the first story detailing the allegations in the [Daily Mail](http://www.dailymail.co.uk/news/article-5359731/Ex-wife-Rob-Porter-Trumps-secretary-tells-marriage.html), Kelly vouched for Porter in a statement and said, “I can’t say enough good things about him.”
  
  In a statement released last Wednesday evening after further media coverage and the publication of a photo of Colbie Holderness, Porter’s first ex-wife, with an injury she said came from Porter’s abuse, Kelly [said](https://www.cnn.com/2018/02/07/politics/rob-porter-john-kelly/index.html) he was “shocked by the new allegations.”
  
  Holderness[told CNN](https://www.cnn.com/2018/02/07/politics/rob-porter-ex-wives-white-house/index.html)she informed the FBI about the abuse allegations and subsequently [provided the bureau](https://www.cnn.com/2018/02/08/politics/rob-porter-fbi-background-check/index.html) photos from the alleged incident where she said Porter gave her a black eye.
  
  Arizona Republican Sen. Jeff Flake said Kelly is “wrong” to claim the White House handled the situation correctly, and referenced [comments](https://www.cnn.com/2018/02/08/politics/rob-porter-white-house/index.html) from White House spokesman Raj Shah, who said last week they could have handled it better.
  
  “I think it was mishandled,” Flake said. “The White House said they handled it poorly, or could have handled it better. I agree.”
  
  Flake, a frequent critic of Trump’s tenor and behavior, said he is also “concerned” about what has come to light regarding the backlog of background checks for the White House, and when asked if Kelly should continue as White House chief of staff, Flake replied, “I am not going to go there.”
  
  For his part, President Donald Trump [addressed](https://www.cnn.com/2018/02/09/politics/trump-rob-porter/index.html) the issue on Friday without expressing sympathy for the women and saying Porter had “very strongly” said he was innocent.
  
  Members of both parties have expressed a range of incredulity to outrage over the White House’s handling of the allegations and clearance for Porter, with Iowa GOP Sen. Joni Ernst [telling CNN](https://www.cnn.com/2018/02/13/politics/joni-ernst-trump-rob-porter-cnntv/index.html) on Tuesday morning that she wants Trump to send a “stronger message” about domestic abuse.
  
