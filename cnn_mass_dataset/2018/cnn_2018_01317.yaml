title: "George W. Bush and Michelle Obama share a sweet moment at McCain’s memorial service"
date: "2018-09-02"
section: "Politics"
url: "https://www.cnn.com/2018/09/02/politics/george-w-bush-michelle-obama-mccain/index.html"
content: |
  Former President George W. Bush and former first lady Michelle Obama shared a sweet moment at Sen. John McCain’s memorial service Saturday.
  
  McCain, who died August 25 at the age of 81, was honored in a memorial service at the Washington National Cathedral, where Democrats and Republicans came together to celebrate his decades of public service.
  
  Tributes fromBushand former PresidentBarack Obama, who eulogized the late Arizona Republican at the senator’s request, were among the highlights,as were daughter Meghan McCain’stearful remarks, in which shecontrasted her father’s legacywith the rhetoric of President Donald Trump, who was not invited to attend the service.
  
  Butwhen former Sen. Joe Lieberman of Connecticut was reminiscing abouthis longtime friend, the cameras cut to the front row and caught Bush handing something to the former first lady, who softly thanked him.
  
  The clip of the exchange went viral Saturday, garnering hundreds of thousands of retweets and likes and an outpouring of warm comments. Many initially thought Bush handed Michelle Obama a piece of candy, but Bush spokesman Freddy Ford confirmed to CNN on Sunday it was actually a cough drop – a revelation that he also tweeted out.
  
