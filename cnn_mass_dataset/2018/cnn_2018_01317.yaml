  I'd like to think that moments like this between W. Bush and Michelle Obama are what McCain was hoping for.pic.twitter.com/vYE3A46Ity
  
  George W Bush and Michelle Obama is the reality TV show that America needspic.twitter.com/AdBqdJUXit
  
  Bush and Obama are surprisingly close considering their political differences, and they have often been seated next to each other and photographed together at formal events.
  
  A photo in September 2016 of their warm embrace at the opening ceremony for the Smithsonian National Museum of African American History and Culture also wentviral.
  
  In an interview last year withPeoplemagazine, Bush credited the former first lady’s appreciation of his sense of humor as a key reason for their friendship.
  
  “She kind of likes my sense of humor. Anybody who likes my sense of humor, I immediately like,” Bush told the magazine. “When I saw her, it was a genuine expression of affection.”
