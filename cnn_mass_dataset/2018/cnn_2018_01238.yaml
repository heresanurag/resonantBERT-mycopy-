  Meet the man who’s swimming across the ocean – andthrough the Great Pacific Garbage Patch– to raise awareness aboutplastic pollution. Here’s what else you need to know toGet Up to Speed and Out the Door. (You can also get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  The Justice Department will now let top lawmakerslook at documents related to the FBI’s use of a confidential sourceduring the 2016 presidential campaign. That’s a big about-face for the department, which had resisted earlier efforts by lawmakers to get access to the documents, fearing it would put the source’s life at risk. President Trump has railed for weeks, without evidence, that the FBI source was spying on his campaign. But House Speaker Paul Ryanrebuked Trump on that claim, agreeing with GOP Rep. Trey Gowdy’s assessment that the FBI didn’t do anything wrong in regards to the confidential source.
  
  President Trumpcommuted the life sentence of Alice Marie Johnson, a first-time nonviolent drug offender, just a week after his Oval Office meeting with reality star Kim Kardashian West, who pleaded for Johnson’s release. Johnson, 63, standing outside the Alabama prison where she’d been held for 21 years, hada message for the President: “I am going to make you proud that you gave me this second chance in life.” Her commutation is the sixth act of clemency Trump has issued since taking office, and others may be on the way. CNN has learned that Trump isconsidering pardons for at least 30 more people.
  
  China may havepulled its missiles from a disputed islandin the South China Sea. China has made claims on almost the entire sea and the islands located there and has ticked off Washington with itsmilitary buildup in the area. An Israeli intelligence firm believes the Chinese have removed missile systems they placed on one of the islands. But two US defense officials told CNN they think the Chinese are just hiding the missiles in buildings. The South China Sea is one of the most contested regions in the world, with overlapping territorial claims by China, the Philippines and Vietnam, among several others.
  
  Consider this: A woman was kidnapped in 1990 by guerrillas in El Salvador. They killed her husband and forced her to cook and clean for them. She made her way to the US and applied for asylum, but a court says she shouldn’t get it and has to leave – becauseher forced labor is considered providing help to terrorists. The controversial ruling was issued yesterday by an immigration court run by the Justice Department. US law doesn’t recognize a difference between voluntary or involuntary “material support” for terrorist groups, Board of Immigration Appeals Judge Roger Pauley wrote. The dissenting judge said that’s justa crazy interpretationof the law. The woman can appeal.
  
  If you plan to fly to your dream getaway this summer,be prepared to shell out more cash. Fuel prices are on the rise, which is puttinga hurt on airlines’ profits. So, of course, they’re passing that on to all of us in the form of higher ticket prices. The airlines – like Delta, which said its fuel prices are up 50% from last year – have already started to tell Wall Street that passengers should prep for higher ticket prices. Customer demand is way up this year, thanks to the strong economy, but the airlines haven’t added more seats, so that’s also contributing to higher prices.
  
