id: cnn_2018_01579
title: "Court-ordered ‘corrective statements’ to appear on cigarette boxes"
date: "2018-11-21"
section: "Health"
url: "https://www.cnn.com/2018/11/21/health/cigarette-box-statements-bn/index.html"
content: |
  Cigarette boxes sold across the United States soon will display a new court-ordered accessory.
  
  Starting Wednesday, tobacco brands have been ordered to put “corrective statements” on product packaging that clearly state the harmful health effects of smoking, according to court documents.
  
  The order follows a long and rocky road of litigation against the tobacco industry.
  
  What tobacco does to your health
  
  It comes as a result of a 1999 lawsuit that theUS Department of Justice filedagainst the country’s largest cigarette manufacturers and tobacco trade organizations, claiming civil fraud and racketeering violations over the course of more than 50 years.
  
  In 2006, federal Judge Gladys Kessler ruled that thetobacco industry had violated civil racketeering lawsand ordered companies to issue “corrective statements” on their packaging, on company websites, and in print and television ads.
  
  Last year, as part of the court order, tobacco companies launched “corrective statement” ads across prime-time television and in newspapers, detailing smoking’s harms. Under court order, the ads were paid for by the tobacco companies Philip Morris USA, Lorillard, R.J. Reynolds Tobacco Co. and Altria Group.
  
  Big Tobacco's court-ordered ads make their debut
  
  Now, the statements will appear directly on cigarette packaging.
  
  “Corrective statements are essentially geared towards preventing and restraining future harm,” said Mary Rouvelas, senior counsel for the American Cancer Society Cancer Action Network, which – along with the American Heart Association, the American Lung Association, the Tobacco-Free Kids Action Fund, the National African American Tobacco Prevention Network and Americans for Nonsmokers’ Rights – was involved in the case to ensure that public health interests were presented to the court.
  
  “Once they start shipping, they will appear in the retailers between two days and two weeks after, depending on how much volume that retailer goes through,” she said.
  
  Tobacco companies ordered to publicly admit deception on smoking dangers
  
  A court document with a mockup of the statements shows them stating, “A Federal Court has ordered R.J. Reynolds Tobacco, Philip Morris USA, Altria, and Lorillard to make this statement about the addictiveness of smoking and nicotine.”
  
  The statements go on to note that smoking is highly addictive, that it’s not easy to quit, that nicotine actually changes the brain and that all cigarettes can cause cancer, lung disease and heart attacks, among other health implications.
  
  “We are at a point where 480,000 people a year die from tobacco use,” Rouvelas said, referencing data from theUS Centers for Disease Control and Prevention.
  
  “We want to make sure that the public knows about the harms of smoking. We want to make sure that it knows about the fact that the industry intentionally manipulated nicotine, there are dangers of secondhand smoke. All those things that are in those statements are things that we think are very important to be out in the public domain,” she said.
  
  In a statement Monday, R.J. Reynolds confirmed that these cigarette package onserts are the next phase of the court-ordered corrective statements and will be on all brands of R.J. Reynolds Tobacco Company cigarettes during six two-week periods over a two-year span.
  
  “R. J. Reynolds will continue to fully meet its obligations under this order as part of its commitment of being a responsible company,” the statement said.
  
  Altria, whichowns the maker of Marlboro cigarettes, issued astatement last year in response to the court order.
  
