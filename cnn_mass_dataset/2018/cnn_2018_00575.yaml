title: "What it’s like at the prison in Otisville where Michael Cohen may go"
date: "2018-12-12"
section: "US"
url: "https://www.cnn.com/2018/12/12/us/michael-cohen-prison-otisville/index.html"
content: |
  Michael Cohen said in court Wednesdaythat he had been living in a “personal and mental incarceration” under President Donald Trump and that his prison sentence would, ironically, help him get back his freedom.
  
  That’s particularly true if he goes to a certain minimum-security prison not far from the city.
  
  In federal court on Wednesday, US District Judge William Pauley agreed to recommend that Cohen serve his 36-month prison sentence at FCI Otisville, about 70 miles northwest of New York City.
  
  FCI Otisville has sometimes been viewed as a preferable prison option for inmates convicted of white-collar crimes. In 2009,Forbes namedit one of “America’s 10 cushiest prisons.”
  
  Despite the judge’s recommendation, the decision as to where Cohen will spend time is ultimately up to the Bureau of Prisons, which hassole responsibility for determining where offenders spendtheir prison sentences.
  
  The decisions are made at the Designation and Sentence Computation Center in Texas. The DSCC attempts to send inmates to prisons within a 500-mile radius of their residence, which for Cohen is in New York. However, the decision also is made using a series of criteria, such as security needs, medical needs, availability of counseling services, and bed space.
  
  Michael Cohen sentenced to three years in prison
  
  Bureau of Prison data shows the bureau complies with 74% of judicial recommendations, wholly or in part, according to ananalysis of the DSCC published in Criminal Justice magazinein 2016.
  
  FCI Otisville is a medium-security correctional institution for men. It has 840 inmates. The prison includes a detention center, where 722 inmates are housed, and an adjacent minimum-security satellite camp with 118 inmates,according to its website.
  
  After Bernard Madoff admitted to running a criminal Ponzi scheme in 2009, his attorney Ira Lee Sorkinrequestedto the judge that he be sent to FCI Otisville. Instead, Madoffis incarceratedat FCI Butner, a medium-security prison in North Carolina.
  
  Inmates at FCI Otisville includeSholam Weiss, a businessman who was convicted of racketeering, wire fraud and money laundering in connection to the collapse of National Heritage Life Insurance Company in 1999. He fled the country as the jury deliberated but was eventually found in Austria and extradited back to the United States, theUS Attorney’s Office said.
  
  Celebrity financial adviser Kenneth Ira Starr has also spent time at FCI Otisville after pleading guilty to carrying out a$33 million schemeto defraud clients.
  
  In the movie “Wall Street: Money Never Sleeps,” fictional Wall Street businessman Gordon Gekko, played by Michael Douglas,does his time for insider trading at “Otis” federal prison, a clear reference to Otisville.
  
  At FCI Otisville’sdetention center, the daily schedule begins at 6 a.m. with wake-up call and lights on, and days are made up of a series of meals, work calls, unit sanitation and leisure time activities. Lights out is at 11:30 p.m.
  
  Inmates are allowed 12 visiting points per month, with a visit on a weekday counting as one point and on holidays or weekends as two points.
  
  The FCI Otisvillesatellite campis more lenient. The camp has a number of recreational activities: Weights, cardio equipment, bocce ball and horseshoes. The camp has a basketball court, handball court, tennis area, baseball field, and running and walking areas.
  
  Given its proximity to New York’s sizable Jewish population, theFCI Otisville commissaryincludes a number of kosher foods, including matzo ball soup, gefilte fish, beef cholent and rugelach.
