  _August 27, 2018_
  
  _On today’s show, a CNN reporter who extensively covered the presidential campaigns of John McCain remembers the late U.S. senator. We’re reporting on a shooting at a video game tournament in Jacksonville, Florida. And we’re taking you to a surf school that’s said to be available to those who most need a smile._
  
