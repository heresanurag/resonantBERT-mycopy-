title: "Amy Schumer expecting her first child"
date: "2018-10-22"
section: "Entertainment"
url: "https://www.cnn.com/2018/10/22/entertainment/amy-schumer-pregnant/index.html"
content: |
  While working to get out the vote, Amy Schumer revealed some exciting news on Monday.
  
  The actress is expecting her first child with husband, Chris Fischer.
  
  Schumer announced her pregnancy in an Instagram story about the upcoming midterm elections via journalistJessica Yellin. Yellin shared some of Schumer’s candidate recommendations for voters and directed followers to read to the bottom of a list where Schumer wrote, “I’m pregnant.”
  
  Schumer, 37, teased the reveal in a separate Instagram post, sharing a photo of herself and her husband made to look like a pregnant Meghan Markle and Prince Harry.
  
  Instagram post not found.
  
  Post has been removed or is no longer public.
  
  Thecouple marriedin an intimate outdoor ceremony in Malibu, California last February. Fischer is a James Beard award-winning chef and author.
  
  Beyond her work in film and television, Schumer is an advocate for equal rights and ending gun violence.Earlier this month, she was arrested as part of a demonstration against the Supreme Court nomination of Brett Kavanaugh.
