title: "$18 million in cocaine shows up amid bananas given to prison"
date: "2018-09-23"
section: "US"
url: "https://www.cnn.com/2018/09/23/us/cocaine-donated-bananas-tdcj-trnd/index.html"
content: |
  This shipment of bananas donated to the Texas Department of Criminal Justice was ripe for contraband.
  
  “Sometimes, life gives you lemons. Sometimes, it gives you bananas. And sometimes, it gives you something you’d never expect!,” posted the department on Facebook.
  
  On Friday, department officers went to pick up two pallets of donated fruit and quickly discovered something off about the weight of the boxes.
  
  “One of the sergeants just noticed one of the boxes didn’t seem quite right,” Jeremy Desel,department spokesperson, told CNN affiliate KTRK. “[He] looked a little further, removed that box off one of the pallets, took a look inside and saw something extraordinarily suspicious.”
  
  Within the boxes, officials discovered 540 packages of cocaine hidden among bundles of bananas. Police list the value of the drugs at almost $18 million. The donation came from Port of America in Freeport, Texas, according to the department, though it’s unclear who or when the cocaine entered the shipment.
  
  “There are several federal entities that are investigating and it’s a pretty significant find for them,” said Desel. The DEA and the US Customs and Border Protection are continuing to investigate, the Texas  department said.
  
  “Our correctional officers and supervisory correctional officers are trained to notice things out of place that don’t seem quite right,” said Desel. “They’re doing their jobs, not just on our units, but somewhere else, and they found something good today.”
  
  Border officers find nearly 2 tons of weed camouflaged as limes
  
  This isn’t the first time drug smugglers have tried to use fruit to hide contraband. In 2017, almosttwo tons of marijuana was disguised as limesin a commercial shipment coming across the Texas-Mexico border. More than 34,000 of the fake fruit packages were discovered by an imaging inspection system and narcotics K-9 team. The drugs are valued at approximately $789,467, according to the US Customs and Border Protection statement.
  
  Two years ago, 2,493 pounds of marijuana were concealed incarrot-shaped packaging entering from Mexico.
