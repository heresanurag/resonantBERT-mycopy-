title: "World Cup gambling in Kenya"
date: "2018-06-18"
section: "Sport"
url: "https://www.cnn.com/2018/06/18/sport/kenya-football-betting-world-cup-spt-intl/index.html"
content: |
  Five African nations are competing in the FIFA World Cup, and it is anticipated that an incredible 86% of the continents’ population in Sub-Sahara alone will be tuning into the matches, a newGeoPoll studysays. Sports-mad Kenyans are no exception.
  
  Kenya is home to world-class athletic champions, Safari Rally enthusiasts, and a rising international rugby sevens team. But football is the most popular spectator sport in the country; the English Premier League is followed religiously.
  
