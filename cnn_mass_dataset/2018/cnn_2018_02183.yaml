id: cnn_2018_02183
title: "Holiday week starts with 4 high-profile, fatal shootings in 4 states"
date: "2018-11-20"
section: "US"
url: "https://www.cnn.com/2018/11/20/us/thanksgiving-shootings/index.html"
content: |
  Thanksgiving week got off to a violent start Monday with four fatal shootings across the US in a matter of hours.
  
  Attacks in a Chicago hospital, on a Denver street, at a suburban St. Louis business and in a Philadelphia basement left 10 people dead – including one of the gunmen – and at least four people wounded.
  
  A police officer, a doctor and a pharmacy resident were killed after aMonday afternoon shooting at Chicago’s Mercy Hospital.
  
  A police officer and two employees were killed in Chicago hospital shooting that left gunman dead
  
  The gunman, who had been in a relationship with the one of slain hospital employees, also died, police said.
  
  It’s not clear if he died from police gunfire or a self-inflicted gunshot wound.
  
  The gunman approached one of the female victims – a hospital employee – around 3:30 p.m. in the hospital’s parking lot, and an argument ensued. Police were called after the man revealed a handgun to a friend of the woman who had tried to intervene.
  
  When officers responded, the gunman opened fire on them before they could exit their vehicle. Officers followed him into the hospital and exchanged gunfire with him, police said.
  
  During the shootout, Officer Samuel Jimenez – a father of three – was fatally wounded. Also killed were emergency room physician Tamara O’Neal and pharmacy resident Dayna Less.
  
  Multiple people shot in downtown Denver, 1 dead
  
  One person was fatally shot and four others were wounded Mondayin downtown Denver, officials said.
  
  One victim was pronounced dead at the scene and four people were taken to the hospital, all in a stable condition, the Denver Police Department said.
  
  The shooting occurred just after 4 p.m. near Coors Field on Lawrence and 21st streets.
  
  Police are talking to witnesses hoping to get a description of a suspect, authorities said.
  
  St. Louis County police are searching for a man believed to be armed and dangerous after a woman was shot at a Catholic Supply business in Ballwin, Missouri – about 30 miles west of St. Louis – Monday afternoon.
  
  Officers called to the scene found her suffering from an apparent gunshot wound, the St. Louis County Police Department said in a statement.
  
  The suspect committed a sexual assault and shot a woman at the business before fleeing the scene, police said.
  
  The victim was taken to a hospital, and policelater said on Twitterthat the incident “is now a homicide investigation.”
  
  Police called to a home in Southwest Philadelphia midday Monday found the bodies of four people in the basement.
  
  The victims – two men and two women who appeared to have been in their 30s – each were shot in the head, Philadelphia Police Commissioner Richard Ross told reporters.
  
  “All four of these individuals were executed,” Ross said. “There are no ifs, ands or buts about it.”
  
  Preliminary information suggests the two men were related, he said.
  
  Police said at least one of the men lived in the house,CNN affiliate 6ABCreported.
