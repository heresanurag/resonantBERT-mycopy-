  _October 11, 2018_
  
  _The landfall of Hurricane Michael is our first story today on CNN 10. We’re bringing you reports from the scene and the studio to explain the effects of the storm and what’s meant by the term “rapid intensification.” Afterward, we’re looking at how social media platforms like Instagram are impacting the restaurant business._
  
