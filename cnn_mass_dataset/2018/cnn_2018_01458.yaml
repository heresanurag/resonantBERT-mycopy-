  “If they have the passion for something they have to pursue it.”
  
  Using soccer as an example, the engineer says youths practice soccer for hours in the day to become a star. He enjoins them to invest the same equivalent amount of time to their passions in order to excel.
  
  “It’s kind of ironic that they will think they have to practice soccer for hours and they have to do maths for 30 minutes,” he says
  
  The engineer says his success is down to his parents who he says provided him the right avenue to study. “My mom was a teacher, my dad was an economist, they really encouraged you to study,” he says.
  
  “Most people think that school does everything but you need a balance of the home and school to get a very good education.”
