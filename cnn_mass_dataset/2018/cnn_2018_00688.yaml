  “If you had a teacher who was adept with the firearm, they could end the attack very quickly,”Trump saidduring a listening session on school safety a week after the shooting.
  
  The idea of arming school staff has been met with sharp condemnation.
  
  Former Democratic Rep. Gabrielle Giffords of Arizonasaid in a statement Wednesdaythat “arming teachers is not a solution.”
  
  “It recklessly puts American children in even more danger,” she said in response to the Times report. “It’s time for Americans to find the courage to take on the powerful and fight for our own safety.”
  
  The American Federation of Teachers and the National Education Associationalso lambasted the proposal. Nicole Hockley, whose 6-year-old son was killed in the 2012 Sandy Hook Elementary School shooting, took the microphone and told Trump she would rather arm teachers with ways to prevent shootings in the first place rather than with a firearm.
  
  Despite the criticism, Trump doubled down on the proposal on several subsequent occasions, andin March, the Trump administrationproposed providing some school personnel with “rigorous” firearms training.
  
  In the wake of the Parkland shooting, the Trump administration also created a federal school safety commission, which is chaired by DeVos. In June, shetestified before a congressional committeethat the commission would not focus on looking at the role the role of guns in school safety. That stance waspanned during a public forum. Democrats on the House Committee on Education and the Workforce have called on DeVos to explain how the commission will explore the role of guns.
  
  “The Commission was charged with recommending policies and funding proposals to prevent school violence,” 17 members of the committeewrote in a letter in June. “A core element of combating school violence is addressing gun violence, both in school and in our communities.”
  
  CORRECTION: This story has been updated to correct the name of the Texas Education Agency.
