id: cnn_2018_00688
title: "Trump admin disputes NYT report on Education Department plan to arm teachers"
date: "2018-08-23"
section: "Politics"
url: "https://www.cnn.com/2018/08/23/politics/nyt-betsy-devos-funding-plan-arm-teachers/index.html"
content: |
  The Trump administration is pushing back on aNew York Times reportthat Education Secretary Betsy DeVos is looking into a plan that would allow states to use federal funding to buy firearms for teachers.
  
  On Wednesday, the Times reported that the Education Department was considering using a grant program called the Student Support and Academic Enrichment Program as a way to give federal funding for firearm purchases to states or school districts. The report cited multiple people with knowledge of the plan.
  
  A senior administration official told CNN that the idea laid out in the Times report did not originate with the Department of Education or DeVos. That official said the department received a letter from the Texas Education Agency asking if the funds from a federal grant program could be used to purchase firearms. It was circulated to departmental lawyers and researchers for guidance, according to the official. The department ultimately chose not to respond, the official said.
  
  The official added that DeVos thinks that Congress should take action to clarify whether or not using the grant funding to buy guns is permissible. Moreover, the Education Department believes the grant program is intentionally vague to give school districts flexibility, and the idea of purchasing firearms was likely not considered when it was written, according to the official.
  
  In response to the Times report, Education Department spokeswoman Liz Hill told CNN that “the department is constantly considering and evaluating policy issues, particularly issues related to school safety. The secretary nor the department issues opinions on hypothetical scenarios.”
  
  The Texas Education Agency told CNN on Thursday that the agency never formally requested that districts be able to use federal funds to arm or train teachers in firearm use, but at the request of several school districts it did ask the Department of Education for clarification about the possibility of using these funds in this way.
  
  “TEA simply sought clarification on allowable uses of Title IV funding for school safety purposes,” the agency said. It said the inquiry came in response to questions from school districts in the wake of the Parkland, Florida, shooting in February that killed 17 high school students and staff members. “To date, USDE has not provided us with a final answer on this specific issue.”
  
  The discussion around arming teachers has been a deeply controversial one. President Donald Trump floated the proposal to arm educators and school staff on multiple occasions in the wake of the deadly shooting at Marjory Stoneman Douglas High School in Parkland.
  
