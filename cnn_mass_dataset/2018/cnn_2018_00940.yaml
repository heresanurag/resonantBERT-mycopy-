title: "Huda Kattan: The face that launched a billion-dollar beauty empire"
date: "2018-07-23"
section: "Health"
url: "https://www.cnn.com/2018/07/23/health/huda-kattan-dubai-beauty-boom/index.html"
content: |
  Beauty is big business. In Forbes’ recent list of “America’s Richest Self-Made Women,” seven out of 60 made their fortunes in cosmetics and skincare. One of them is Dubai-based makeup mogul Huda Kattan.
  
  Driving with the Arabian Gazelles, Dubai's all-female supercar club
  
  The 34-year-old businesswoman, who founded cosmetics brandHuda Beautyin 2013, ranked number 37, joining the likes of Oprah Winfrey, Sheryl Sandberg and 20-year-old Kylie Jenner – whose estimated$900 millionfortune also comes from a beauty empire (one that makes her more than twice as wealthy as big sister Kim Kardashian West).
  
  For Huda, the US-born daughter of Iraqi immigrants, it started with a blog.
  
  “I noticed there were no bloggers that looked like me… nobody that I could look (up) to,” Huda tells CNN. Disillusioned with her job in finance, Huda quit to become a makeup artist, and in 2010 she launched her own website with makeup tutorials, skincare routines and beauty hacks.
  
  Her commercial breakthrough came in 2013, when she teamed up with sisters Mona and Alya – who act as Huda Beauty’s global president and chief Instagram officer, respectively – to create a line of false eyelashes. They flew off shelves and caught the eye of Kim Kardashian herself.
  
  But Huda feels Instagram was the turning point. “It was the catalyst that changed everything,” she says. “It changed the dynamics in which people not only communicate but are inspired as well.”
  
  The app gave her access to people from all over the world. Her videos started to go viral and her followers multiplied. She has over 26 million on Instagram today.
  
  “I realized that my purpose really is to inspire people,” she says. “It has nothing to do with money, it has nothing to do with anything material. It’s really to prove to people that the little guy can make it.”
  
  With an estimated net worth of $550 million and Huda Beauty valued at upwards of $1 billion perForbes, it’s safe to say she’s proven her point.
  
  The phenomenon of beauty blogging and vlogging is worldwide, with the number of YouTube views on beauty-related content jumping from 4 billion in 2010 to 104 billion in 2017, according to the latest data gathered by a video advertising technology companyPixability.
  
  Huda is an early example of this new generation of “influencers.” As Olivia Phillips, the digital editor ofGrazia Middle East, explains, not only has she introduced cult beauty products but she has also been an inspiration to the region’s businesswomen and young girls alike.
  
  Are windowless planes the future of travel?
  
  “Huda is the best kind of success story,” says Phillips. “Tenacious, talented, a working mum with a family… (she’s) the poster girl for the kind of entrepreneurial spirit we pride ourselves on in the Middle East.”
  
  Social media influencers like Huda have had a knock-on effect on the industry. According to the latest report byEuromonitoron beauty and personal care in the UAE, they are one of the key reasons for increased spending on cosmetics. Consumers in the UAE spent $228 per capita on beauty products in 2017, up from $168 in 2010, ranking first among surveyed nations in the Middle East and 11th worldwide.
  
  “Consumers are highly engaged towards brands and retailers who have a strong social media presence,” says Euromonitor analyst Amna Abbas. According to the report, collaborations between brands and bloggers have become essential in raising awareness of a new products and boosting sales.
  
  But this marketing strategy relies on an internet-savvy audience, which is why Gulf countries are ideal. “Social media in countries such as Saudi Arabia and the UAE continue to be very popular and a platform to express oneself as well as learn how to do things,” says Abbas.
  
  New top global retail destination revealed for 2018
  
  Ahmed Pauwels, CEO of Messe Frankfurt Middle East which organizes theBeautyworld Middle Easttrade fair, says the number of expats living in the UAE, especially in Dubai, also helps to fuel the beauty market, since they have “a lot of excess income to spend on the beauty sector.”
  
  Over the last ten years, many international brands have set up shop in Dubai, including Sephora, Kiko Milano, Anastasia Beverly Hills, Essence and Nars. As Abbas explains, “the growth of cities like Dubai… has led many brands to make the UAE an entry point to expand into the Middle East.”
  
  But the cosmetics craze goes deeper than social media trends; it is an intrinsic part of Arab culture. “If you look at the Arabic population, women are very much self-aware and busy with their appearances,” says Pauwels.
  
  Nazan Asghar, an up-and-coming beauty blogger in Dubai, attributes her rising popularity to the distinctive “Arab look.”
  
  “That’s what I’m known for in Dubai,” she says. “I do a lot of Arab-inspired looks: heavy eyes, intense glowing cheekbones.”
  
  When Asghar started blogging on Instagram, she had a mere 15 followers, all family and friends. Her first post was a picture of her smiling with bronzed cheekbones, glossy lips, thick eyebrows and intensely dark eyes. Most of her makeup styles require a minimum of eight products and take at least 30 minutes to apply, she says.
  
  24-karat diet: Dubai's appetite for gold
  
  But this doesn’t faze her audience, which has grown to 217,000. “The local ladies have got a lot of money and they believe in makeup,” she says. “I feel like I’m in the right area, hitting the right targets.”
  
  The Kattan sisters echo the sentiment: the commitment to makeup in the Middle East is quite something. “It’s in our DNA,” says Mona. “We’re excessive. We’re never like ‘that’s too much.’ We’re like ‘add a bit more.’ And that’s with everything we do: beauty, makeup, food, fashion, everything.”
  
