title: "Trump: Space Force and Air Force will be ‘separate but equal’"
date: "2018-06-18"
section: "Politics"
url: "https://www.cnn.com/2018/06/18/politics/trump-space-force-air-force/index.html"
content: |
  President Donald Trump used a term from US segregationist history to describe the relationship between the Air Force andhis newest military branch, the Space Force,calling it “separate but equal.”
  
  “We must have American dominance in space. Very importantly, I’m hereby directing the Department of Defense and Pentagon to immediately begin the process necessary to establish the Space Force as the sixth branch of the armed forces. That’s a big step,” he said in the White House East Room during a meeting of his National Space Council Monday.
  
  “We are going to have the Air Force and we are going to have the Space Force: separate but equal, it is going to be something so important,” he said.
  
  Trump pushes idea of adding 'Space Force' to US military
  
  The term “separate but equal” became a legal precedent followingan 1896 Supreme Court rulingPlessy v. Ferguson that said the use of racially separate facilities, if equal, was not discrimination. That legal rationale was deemed unconstitutional through a series of Supreme Court decisions, ending with 1954’s Brown v. Board of Education.
  
  In addition to calling for the Space Force, Trump signed Space Policy Directive – 3 on Monday, part of his administration’s push to lead in the space space.
  
  Trump previously floated the idea of adding a “Space Force” branch to the US military – a concept that has received some support on Capitol Hill but drawn skepticism from the Pentagon.
  
  “Space is a warfighting domain, so it is vital that our military maintains its dominance and competitive advantage in that domain. The Joint Staff will work closely with the Office of the Secretary of Defense, other (Defense Department) stakeholders and the Congress to implement the President’s guidance,” one US defense official said.
  
  Another US defense official told CNN: “The President’s direction to begin planning is clear. We are implementing his direction.”
  
  Space Policy Directive – 3 is primarily focused on satellite traffic management and mitigating debris in space. The policy, executive secretary of the National Space Council Scott Pace told reporters, “seeks to address the challenges of a congested space environment.”
  
  “If we’re going to expand the economy in space, we need to make sure it’s done in a sustainable way,” Pace said.
  
  For the private sector’s space activity, the primary effect of the policy is “more rapid and more accurate information on where they can launch,” as well as “flexibility in launch windows,” and satellites having “more time to put toward revenue-generating activities rather than maneuvering” to avoid collision risks, Pace said.
