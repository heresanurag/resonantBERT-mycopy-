  # Flake calls out Trump for saying non-clapping Democrats ‘treasonous’
  
  By [![Image 1: Daniella Diaz](https://media.cnn.com/api/v1/images/stellar/prod/160314170609-daniella-diaz-profile.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/daniella-diaz)[Daniella Diaz](https://www.cnn.com/profiles/daniella-diaz)
  
  Updated Feb 6, 2018
  
  Updated Feb 6, 2018, 4:41 PM ET
  
  PUBLISHED Feb 6, 2018, 3:19 PM ET
  
