id: cnn_2018_00923
title: "Mike Huckabee accused of bigotry and racism after tweet touting Pelosi’s ‘campaign committee’"
date: "2018-06-23"
section: "Politics"
url: "https://www.cnn.com/2018/06/23/politics/mike-huckabee-ms13-pelosi/index.html"
content: |
  Former Arkansas Republican governor Mike Huckabee is facing allegations of racism after he tweeted a photo on Saturday of five men who appear to be using hand signs associated with the MS-13 gang with the caption, “Nancy Pelosi introduces her campaign committee for the take back of the House.”
  
  According toa guideto from New Jersey’s Office of the Attorney General, some of the hand gestures seen in the photo are used as gang signs for MS-13. According to theDepartment of Justice, “MS-13, which is short for La Mara Salvatrucha, is a gang composed primarily of immigrants or descendants from El Salvador. In the United States, MS-13 has been functioning since at least the 1980s.”
  
  Drew Hammill, a spokesman for Pelosi, a California Democrat who’s the House minority leader, said when reached for comment, “Trump and his surrogates will continue to repeat blatantly false attacks as long as the media continues to take the bait and print them.”
  
  The image and caption have also generated backlash on Twitter, including accusations of bigotry and racism against Huckabee.
  
  Conservative commentator Bill Kristolreferredto the tweet as a “dog whistle.”
  
  Shannon Watts, the founder of Moms Demand Action for Gun Sense in America,reacted to the tweetby calling Huckabee a “despicable racist.”
  
  Huckabee later justified his tweet in an exchange with Washington Post political columnist Karen Tumulty.
  
  “MS-13 is not a race but an illegal gang who rapes, murders, and mutilates children as sport. Nancy Pelosi defended them because she said @realDonaldTrump insulted them,” Huckabeetweetedat Tumulty. “Are you defending them too? Wasn’t aware that criminal was a ‘race.’”
  
  When Tumulty thenurgedhim to understand that his “tweet had a racial meaning,” Huckabee stood firm that it was not racist.
  
  “Absurd!” hetweeted. “To see race in everything IS racist. Nothing about race but about a vile violent criminal gang. Please understand that.”
  
  Later Saturday, Huckabee accused a restaurant in Lexington, Virginia, of bigotry after his daughter, White House Press Secretary Sarah Sanders, said that she was kicked out because she works for President Donald Trump.
  
  Bigotry. On the menu at Red Hen Restaurant in Lexington VA. Or you can ask for the “Hate Plate”.  And appetizers are “small plates for small minds”https://t.co/rHEVdcQwwh
  
  Huckabee has a history of making inflammatory remarks, including ones that have drawn criticism from within his own party. While running for president in the 2016 election, Huckabeeinvokedthe Holocaust to criticize then-President Barack Obama, comments that drew a rebuke from his then rival former Florida governor Jeb Bush.
  
  Afterdropping outof the Republican presidential race in 2016, Huckabeesaidthat he was “all in” for Trump.
  
  Huckabee’s tweet referencing Pelosi was retweeted on Saturday by the President’s son Donald Trump Jr.
  
  Huckabee did not respond to a CNN request for comment.
  
  Trump has previously made false andmisleading statementsattempting to inaccurately link Democrats to the MS-13 gang.
  
  In May, Trump claimed that Pelosi “came out in favor of MS-13,” a statement that thefact-checker PolitiFact rated as false.
