title: "Trump goes after Jimmy Fallon"
date: "2018-06-25"
section: "Politics"
url: "https://www.cnn.com/2018/06/25/politics/donald-trump-jimmy-fallon-hair/index.html"
content: |
  President Donald Trump attacked Jimmy Fallon on Twitter Sunday after “The Tonight Show” host expressed regret about a friendly interview during the campaign.
  
  Trump’s outburst – which references a light-hearted moment on the show during the 2016 campaign – is thelatest exampleof him using his platform as president to respond to perceived slights made by entertainers.
  
  ”.@jimmyfallon is now whimpering to all that he did the famous ‘hair show’ with me (where he seriously messed up my hair), & that he would have now done it differently because it is said to have ‘humanized’ me-he is taking heat. He called & said ‘monster ratings.’ Be a man Jimmy!” Trump tweeted.
  
  .@jimmyfallonis now whimpering to all that he did the famous “hair show” with me (where he seriously messed up my hair), & that he would have now done it differently because it is said to have “humanized” me-he is taking heat. He called & said “monster ratings.” Be a man Jimmy!
  
  Fallon said in response he would make a donation in Trump’s name to the Refugee and Immigrant Center for Education and Legal Services, a non-profit group that provides legal services to immigrants.
  
  In honor of the President’s tweet I’ll be making a donation to RAICES in his name.
  
  The back-and-forth refers to a “Tonight Show” appearance Trump made in the fall of 2016, where the then-Republican presidential nominee let Fallonmess with his hair. The lighthearted appearance led to criticism for Fallon, who said in arecent interviewwith The Hollywood Reporter that he wasn’t trying to “normalize” Trump or express agreement with his politics.
  
  “I made a mistake,” Fallon said. “I’m sorry if I made anyone mad. And, looking back, I would do it differently.”
  
  The “Tonight Show” host first publicly expressed regret for the 2016 interview last year,telling The New York Timesthat his critics “have a right to be mad.”
