  This page includes the show Transcript
  
  The Weekly Newsquiz tests your knowledge of events in the news
  
  A look at the upcoming U.S. Midterm Elections leads off our show this Friday, followed by a report on a time change observed in many parts of the world. We’re featuring a Positive Athlete who’s also a scholar, and we’re giving you a bird’s-eye view of a record set by “dancing” SUVs.
  
  Click for a printable version of the Weekly Newsquiz.
  
  1. Over the weekend, crowds gathered to remember, mourn, and honor the victims of a shooting at a synagogue in what U.S. city?
  
  2. In what U.S. state was a suspect arrested in the FBI’s nationwide manhunt for the sender of numerous suspicious packages addressed to public figures?
  
  3. In what body of water, which was known to ancient Greeks as the “Inhospitable Sea,” did researchers recently discover the world’s oldest, intact shipwreck?
  
  4. Angela Merkel, who announced on Monday that she would not seek re-election in 2021, is the leader of what nation?
  
  5. Following a polarizing campaign season, Jair Bolsonaro was recently elected as president of what nation?
  
  6. The U.S. military announced this week that is deploying command posts, helicopters, medical units, and more than 5,200 troops to what area?
  
  7. The Parker Space Probe recently set a record, getting closer than any other man-made device to what celestial object?
  
  8. What Italian city, which has been affected by a low-pressure weather system, may have just seen its highest tide levels since 1979?
  
  9. Name the founder of Amazon, the richest person in the world whose company has changed the U.S. retail landscape.
  
  10. In what part of the U.S. government are all voting seats up for election in the Midterms on November 6?
  
