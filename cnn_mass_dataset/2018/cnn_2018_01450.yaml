  The office is also responsible for special documents from the President, such as certificates.
  
  This Valentine’s Day, the first lady teamed up with the calligraphers to design a special White House valentine, which she distributed during a visit to a children’s hospital in Cincinnati.
  
  .@FLOTUSbrought gift bags with valentines to the patients she visited today at@CincyChildrenspic.twitter.com/cYDZJtVL4S
  
  The calligraphers keep a low profile with rare media access.Martha Stewart featuredthe office ahead of a state dinner with Prime Minister Tony Blair in November 2000, andC-SPAN took a tourwhile the calligraphers prepared invitations for a state dinner for Queen Elizabeth II in 2008.
  
  Exclusive: Trump expected to invite France's Macron for first state visit of his presidency
  
  While the number of calligraphers in the office has ranged as high as eight at the beginning of the Carter administration, there are currently three full-time calligraphers in the office, including the chief calligrapher. Calligraphers Debra Brown and Becky Larimer do not have security clearances, per the data. White House salary disclosure dataindicatesthat Blair made $102,212 in 2017, with Brown at $90,828 and Larimer at $70,100.
  
  There has been change throughout the years at the office – for instance, Paulus ushered Macintosh computers into the office in 1998. The deadlines have gotten shorter and aspects of the work has been taken into the digital era. Design and style has also changed over the years.
  
  “I think there’s a general misconception that things have been forever unchanging, but the calligrapher’s office is one of the places that has changed with the times,” Costello said.
  
  The office is currently fully entrenched in preparations for the Trump administration’s first state dinner. The President and first lady will welcomePresident Emmanuel Macron of France to the White Houseon April 24.
