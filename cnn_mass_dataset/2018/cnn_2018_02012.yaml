title: "‘Happy Days’ star Henry Winkler says he was ‘left off’ LA county voter roster"
date: "2018-06-06"
section: "Politics"
url: "https://www.cnn.com/2018/06/06/politics/henry-winkler-happy-days-los-angeles-voting-error/index.html"
content: |
  A Los Angeles County voter roster wasn’t exactamundo Tuesday night, according to “Happy Days” star Henry Winkler, who said he was one of the many California voters left off the rolls during the primary night.
  
  “My name was left off the polling registry today on Los Angeles,” Winkler, who played Arthur “Fonzie” Fonzarelli on the iconic ’70s sitcom, posted on Twitter.
  
  My name was left off the polling registry today on Los Angeles
  
  A message left with the county seeking comment about Winkler’s claim was not immediately returned Wednesday.
  
  According to the Los Angeles County Registrar-Recorder, thenames of 118,522 voters were omittedfrom the roster that poll workers use to check in voters at their polling place, due to a random printing error.
  
  The county registrar instructed all voters left off the roster to cast a provisional ballot and assured them that their votes will be counted.
  
  The error, however, in the most populous county in the state has delayed the vote count andleft key House racesin California still undecided.
