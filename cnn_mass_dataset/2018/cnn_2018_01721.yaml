title: "Ariana Grande talks about her PTSD after Manchester attack"
date: "2018-06-05"
section: "Health"
url: "https://www.cnn.com/2018/06/05/health/ariana-grande-ptsd-vogue-interview-intl/index.html"
content: |
  Singer Ariana Grande has spoken about suffering post-traumatic stress disorder following a suicide bombing that killed 22 people at her concert in Manchester, United Kingdom, last year.
  
  “I know those families and my fans, and everyone there experienced a tremendous amount of it as well,” said Grande of suffering the symptoms of PTSD, inan interview with British Vogueto be released on Friday.
  
  5 things you may not know about post-traumatic stress
  
  “I feel like I shouldn’t even be talking about my own experience – like I shouldn’t even say anything,” added the 24-year-old American, who appears on the cover of the magazine’s July edition.
  
  PTSD is a form ofanxiety disorderthat occurs when intrusive memories linked to fear from a traumatic event become consolidated in a person’s mind by them visualizing the event in aloop until it becomes locked in their brain.
  
  Grande said she didn’t think she’d ever be able to talk about the attack at Manchester Arena in May 2017 “and not cry.”
  
  Attacker Salman Abedidetonated a bomb at the end of Grande’s concert, as people were leaving the packed arena.
  
  Many of the victims were teenage fans, the youngest among them8-year-old Saffie Rose Roussosfrom Leyland, north of Manchester.
  
  Inside the July issue, @ArianaGrande shares details of her difficult and transformative past year with Vogue:https://t.co/FociKiCJnDpic.twitter.com/teENfb8HfQ
  
  “It’s hard to talk about because so many people have suffered such severe, tremendous loss,” Grande told Vogue during the interview at her home in Beverly Hills.
  
  “Time is the biggest thing,” she said of recovering from the trauma.
  
  Following the first anniversary of the attack, Grande last month revealed a bee tattoo beneath her ear in commemoration of the tragedy.
  
  The worker bee is often used as anemblem for Manchester, representing the city’s industrial past and appearing in its crest.
  
  Services were also held across Manchester to mark theanniversary of the attack,with Prince William and Prime Minister Theresa May among the dignitaries attending.
