title: "People killed in duck boat tragedy weren’t wearing life jackets when found, source says"
date: "2018-07-22"
section: "US"
url: "https://www.cnn.com/2018/07/22/us/missouri-duck-boat-tragedy-life-jackets/index.html"
content: |
  The 17 people who died in theduck boat tragedylast week in southwestern Missouri were not wearing life jackets when found, a source with knowledge of the investigation told CNN Sunday.
  
  TheRide the Ducks Bransonamphibious vessel had 31 people on board when it set sail Thursday on Table Rock Lake near the Missouri tourist mecca of Branson as a severe thunderstorm whipped up intense winds and waves. A treacherous squall sank the boat.
  
  There were life jackets on the boat,but passengers weren’t required to wear them, according to Stone County Sheriff Doug Rader. Rader said over the weekend he didn’t know if people were wearing them.
  
  Tia Coleman, one of the 14 survivors, said passengers were told there was a storm coming before the trip. The captain mentioned the life jackets before they went on the lake but said, “you won’t need them so we didn’t grab them,” Coleman said Saturday.
  
  “The captain did say something about life jackets. He said, above you are the life jackets, there are three sizes, but you won’t need them,” Coleman said Saturday night.
  
  She told CNN affiliate KOLR: “When that boat is found, all those life jackets are going to be on there because nobody pulled one off.”
  
  Coleman, who lost nine family members, said she thinks she could have saved her children if she had been able to get them life jackets.
  
  “I felt like, if I was able to get a life jacket I could have saved my babies because they could have at least floated up to the top and somebody could have grabbed them,” she told reporters at Cox Medical Center Branson, where she was hospitalized.
  
  In an exchange over Facebook, survivor Talyssa Mann, 19 of Carlsbad, New Mexico, said Coleman’s statement about the life jackets was correct.
  
  The boat sank 40 feet and then rolled to an area 80 feet deep, according to Rader.
  
  Duck boat victims: 9 family members among 17 who died
  
  The dead victims ranged in age from 1 to 76 years, authorities said.
  
  State investigators are looking into whether any criminal acts were committed, according to Missouri Attorney General Josh Hawley. The National Transportation Safety Board is also investigating the cause of thesinking.
