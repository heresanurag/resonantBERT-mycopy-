title: "Quickly catch up on the day’s news"
date: "2018-12-04"
section: "App News Section"
url: "https://www.cnn.com/2018/12/04/app-news-section/quickly-catch-up-december-4/index.html"
content: |
  Here’s what you might have missed Tuesday on CNN.
  
  – Sen. Bob Corker, R-Tennessee and chairman of the Senate Foreign Relations Committee, told CNN after a briefing with CIA Director Gina Haspel that Saudi Crown PrinceMohammed bin Salman, “ordered, monitored, the killing” of Jamal Khashoggi.
  
  – TheGOP’s House campaign arm says it was hackedduring the midterms. An official tells CNN the surveillance went on for months.
  
  – There will be anational day of mourning on Wednesdayto honor the late former President George H.W. Bush, who died Friday night at 94. Here’s a list of what offices and agencies will be closed to pay tribute to the 41st president.
  
  – A state judge ruled thatMerced Property & Casualty Co. can’t meet its obligations to pay millions of dollars to policyholders after last month’s Camp Fire, the deadliest and most destructive wildfire in California history.
  
  – A set of161 absentee ballots for North Carolina’s 9th Congressional Districtobtained by CNN on Monday showed that the same nine people signed at least 10 absentee ballots each.
  
  – The police chief in Springfield, Missouri, hasapologized to the city’s sexual assault victims after a CNN investigationinto rape kit destruction highlighted the agency’s practices, which experts called disturbing.
  
  – Chrissy Teigeninspired parents to share photos of their babies with head-shaping helmetsafter sharing a photo on Instagram of her own son, Miles, with a corrective helmet to treat his flat head syndrome.
  
  – Kanye West wascalled out by one of the actors in the new Broadway bio musical“The Cher Show” after he was spotted on his phone during Monday night’s opening performance.
