title: "Mandy Moore marries Taylor Goldsmith"
date: "2018-11-19"
section: "Entertainment"
url: "https://www.cnn.com/2018/11/19/entertainment/mandy-moore-marries-taylor-goldsmith/index.html"
content: |
  Mandy Moore is married.
  
  The “This Is Us” star tied-the-knot with Dawes frontman Taylor Goldsmith in Los Angeles over the weekend.
  
  Moore took to Instagram on Monday to share a photo from their special day with the caption: “11-18-18.”
  
  Several of Moore’s co-stars were in attendance, including Milo Ventimiglia, Chrissy Metz and Sterling K. Brown.
  
  When speaking to CNNrecently about her wedding plans, the actress/singer said that she didn’t want her wedding to be traditional.
  
  “Seeing the day start to take shape, I don’t think it will be super-conventional, but it will speak to our love for one another and our shared life that we already have,” Moore said.
  
  Moore said she and her husband hope to become parents.
  
  “(Being a mother) is a role I’ve always looked forward to playing in life one day,” she told CNN. “I feel like I get to have glimpses of it and live vicariously through my role and through work every day, but I have always just had a soft spot for anything having to do with kids.”
  
  Moore was previouslymarried to singer Ryan Adams. They divorced in 2016.
