title: "Quickly catch up on the day’s news"
date: "2018-11-19"
section: "App News Section"
url: "https://www.cnn.com/2018/11/19/app-news-section/quickly-catch-up-november-19-trnd/index.html"
content: |
  Here’s what you might have missed Monday on CNN:
  
  –The 4 to 6 inches ofrain expected later this week in Northern California will help suppress a wildfirethat has already killed at least 77 people. But with more than 150,000 acres of newly scorched earth, the region is now at risk of mudslides.
  
  – CNN asked for an emergency hearing after theWhite House issued a new letter to Jim Acosta, saying his press pass could be revoked again at the end of the month.
  
  – Chris Watts, the Colorado resident who pleaded guilty tokilling his pregnant wife and both his daughters, wasgiven five life sentences– three consecutive and two concurrent – with no possibility of parole.
  
  – TheWhite House Correspondents’ Association is enlisting author Ron Chernowas the featured speaker for its annual fundraising dinner, shelving its tradition of having a comedian roast the president and the press corps.
  
  – A North Carolinaschoolteacher who disappeared while in Mexicois dead, according to a post on the verified Facebook page of Chihuahua’s governor.
  
  – There have now been106 confirmed casesof the polio-like paralyzing illness acute flaccid myelitis, according to the CDC.
  
  – David’s Bridal, the nation’s largest bridal retailer,filed for Chapter 11 bankruptcyprotection on Monday.
  
  – Sean “Diddy” Combsbroke his silence over Kim Porter’s deathwith a heartfelt tribute on social media writing “I don’t know what I’m going to do without you baby. I miss you so much.”
  
  – HaileyBaldwin changed her name on Instagram to Hailey Bieberthis weekend, officially shattering the hopes of teenagers across the globe who dreamed of calling Justin Bieber their husband.
