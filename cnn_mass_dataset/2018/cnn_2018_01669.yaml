  “Where we have a role as a federal government is over the federal public service, the government workers, but also federally-regulated industries, like transport or telecom or banks. So anyone in those private sectors will have to abide by this pay equity legislation,” he says. “And there are already provinces with pay equity legislation that we’re hoping is going to end up matching where we are.”
  
  Trudeau also recently introduced new legislation to increase women’s representation on boards. Canadian women hold only 14% of board seats, despite making up 48% of the country’s workforce. Unlike a recentCalifornia lawthat mandates that there be at least one woman on every public company board, Trudeau’s proposed legislation would force companies to share board member diversity information with shareholders, essentially shaming them into cooperation.
  
  What we’ve seen time and time again is when you have more fairness, more equality, you actually create better prosperity, more opportunity for everyone.”
  
  “So by forcing a level of transparency and making people actually explicitly say what their plan is to bring more women onto boards, more diversity onto their boards, we’re going to spur people to actually act,” Trudeau says.
  
  Earlier this summer, Trudeau responded to allegations that heinappropriately touched a female reporter 18 years ago.He deniedthe allegations, saying, “I do not feel that I acted inappropriately in any way. But I respect the fact that someone else might have experienced that differently and this is part of the reflections that we have to go through.”
  
  When asked how the #MeToo movement has changed his leadership, Trudeautold Harlowthat “respecting and leaving room for multiple voices and multiple experiences is essential in our conversation.”
  
  While his work for women has afforded him accolades from many, recentNanos Research pollsshowed a decline in support from men for the prime minister. As one poll scientisttold the Harvard Political Review,“there’s a tacit assumption that they are not a priority.”
  
  “I can understand worries that people have any time there is a status quo that is challenged,” Trudeau says. “But what we’ve seen time and time again is when you have more fairness, more equality, you actually create better prosperity, more opportunity for everyone.”
  
