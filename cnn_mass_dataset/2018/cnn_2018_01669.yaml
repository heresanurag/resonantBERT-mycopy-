  Trudeau says he’s encouraged by more conversations aboutmale allyship, and he sees huge opportunity when it comes to teaching more men about this path.
  
  “You can have a world in which our daughters believe they can do anything but in which our sons also believe that our daughters can do and be anything and will be allies to them,” he says. “That’s really how we have to raise our families.”
