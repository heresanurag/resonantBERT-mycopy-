title: "Julen Lopetegui sacked by Real Madrid"
date: "2018-10-29"
section: "Football"
url: "https://www.cnn.com/2018/10/29/football/julen-lopetegui-real-madrid-sacked-football-spt-intl/index.html"
content: |
  Lopetegui leave Madrid after two months
  
  Los Blancos have won one of past seven games
  
  Real Madrid has sacked coach Julen Lopetegui after just two months in charge with the side ninth in La Liga following a humiliating defeat to Barcelona.
  
  The5-1 El Clasico defeatat Camp Nou Sunday proved the final straw for Lopetegui, who was dismissed from his position as Spain coach on the eve of the World Cup after agreeing to take charge of Real for the start of the 2018/2019 season.
  
  An official club statement thanked Lopetegui for his efforts but said the decision “aims to change the dynamics of the first team, when all the objectives of this season are still achievable.”
  
  Santiago Solari, the Real Madrid B coach, will take over on an interim basis. The club gave no indication of who they would appoint permanently.
  
  Under Lopetegui, Los Blancos has won just four out of 10 league games and suffered a Champions League defeat to CSKA Moscow.
  
  Zinedine Zidaneleft his role as Real bossin May this year having led his former club to nine trophies in a two-and-a-half year spell, including three consecutive European titles.
  
