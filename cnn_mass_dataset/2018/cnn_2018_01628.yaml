content: |
  Here’s what you might have missed Wednesday on CNN:
  
  – British Prime Minister Theresa May says herCabinet backed her Brexit deal after a five-hour debate, calling it a “decisive step.”Follow live updates here.
  
  – The Justice Departmentresponded to CNN’s lawsuit, arguing thatTrump can pick and choose which journalists get press passes. Fox News and other media outlets arejoining CNN’s fight over press accessto the White House.
  
  – The DOJ also says Trump’s appointment of Whitaker asacting attorney general is constitutional.
  
  – Thedeath toll from the fires in Californiahas reached at least 50.
  
  – House Republicans electedKevin McCarthy as minority leader, replacing the outgoing Paul Ryan.
  
  –The Parkland shooter is facing new chargesfor allegedly attacking a jail officer and taking his stun gun.
  
  — The $1.5 billion Mega Millions jackpot winnerstill hasn’t claimed the prize.
  
  – Former first lady Michelle Obama opened up abouther friendship with George W. Bush.
  
  – Country music has its biggest night of the year tonight.Here’s what to expect at the 2018 CMAs.
  
  – Happy birthday, Prince Charles! As the heir apparent of Queen Elizabeth II celebrates his 70th birthday,take a look at his life through photos.
