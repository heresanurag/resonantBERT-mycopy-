title: "Quickly catch up on the day’s news"
date: "2018-11-01"
section: "App News Section"
url: "https://www.cnn.com/2018/11/01/app-news-section/quickly-catch-up-november-1/index.html"
content: |
  Here’s what you might have missed Thursday on CNN:
  
  –Heather Nauert, the State Department spokeswoman, is President Donald Trump’s leading choice to become US ambassadorto the United Nations. He could offer her the post as soon as this week, two sources told CNN. Nikki Haley surprised White House officials last month when she announced her decision to step down at the end of the year.
  
  – More than 100 immigrants showed up to court Wednesday,only to find out that their court dates hadn’t actually been scheduled, according to the American Immigration Lawyers Association. Lawyers told CNN it’s part of a troubling trend that shows how chaotic the Trump administration’s approach to immigration enforcement can be.
  
  – Thesuspect in the Pittsburgh synagogue massacre pleaded not guilty to 44 federal chargesand requested a jury trial. It was his second court appearance this week after a federal grand jury indicted him in the slaying of 11 worshippers at the Tree of Life synagogue.
  
  – Authorities have so far uncovered nothing to suggest that two Saudi Arabian sisters whose bodies were found bound on the banks of the Hudson River were victims of foul play, a source told CNN. Water was found in the sisters’ lungs, the official said,leading investigators to believe they were alive when they entered the water.
  
  –Google employees worldwide participated in a protestover the company’s handling of sexual harassment by walking out of their offices. The demonstration comes after a New York Times investigation detailing the sexual harassment scandals.
  
  – For the fifth time in three days, a driver hit students at a school bus stop.At least five people were rushed to the hospitalin the latest incident in Tampa.
  
  – Remember the little girl who was awestruck by Amy Sherald’s portrait of Michelle Obama at the National Portrait Gallery? Three-year-oldParker Curry took over social media againafter going as the former first lady for Halloween and donning a gown similar to the one from the painting.
  
  – After receiving negative comments for his Halloween costume,Al Roker found himself having to explain why dressing as a white character is not racist. Roker, who dressed as Doc Brown, a white character from the “Back to the Future” movies, explained why his getup wasn’t whiteface: “Just don’t color your skin!”
