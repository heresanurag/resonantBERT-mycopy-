  # Duckworth calls out ‘Cadet Bone Spurs’ after Trump’s ‘treasonous’ remark
  
  By [Maegan Vazquez](https://www.cnn.com/profiles/maegan-vazquez)
  
  Updated Feb 6, 2018
  
  Updated Feb 6, 2018, 3:47 PM ET
  
  PUBLISHED Feb 6, 2018, 8:51 AM ET
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2018%2F02%2F06%2Fpolitics%2Ftammy-duckworth-cadet-bone-spurs "Share with email")Link Threads
  
