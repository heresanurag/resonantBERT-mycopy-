  Video Ad Feedback
  
  Trump: Democrats' SOTU reactions 'treasonous'
  
  3:23  • Source: [CNN](https://www.cnn.com/)
  
  ![Image 2: US President Donald Trump delivers remarks on tax reform at Sheffer Corporation in Blue Ash, Ohio  on February 5, 2018.  / AFP PHOTO / MANDEL NGAN        (Photo credit should read MANDEL NGAN/AFP/Getty Images)](https://media.cnn.com/api/v1/images/stellar/prod/180205155316-donald-trump-sheffer.jpg?q=x_667,y_259,h_1972,w_3506,c_crop/w_860)
  
  Trump: Democrats' SOTU reactions 'treasonous'
  
  3:23
  
  Washington—
  
  An Illinois Democrat who was seriously wounded in Iraq derisively referred to President Donald Trump’s draft deferments after Trump called Democrats [“treasonous”](https://www.cnn.com/2018/02/05/politics/trump-speech-treason/index.html) for not clapping during his State of the Union speech.
  
  “We don’t live in a dictatorship or a monarchy. I swore an oath—in the military and in the Senate—to preserve, protect and defend the Constitution of the United States, not to mindlessly cater to the whims of Cadet Bone Spurs and clap when he demands I clap,” Sen. Tammy Duckworth [tweeted](https://twitter.com/SenDuckworth/status/960665400643080193) Monday evening.
  
  Duckworth, an Army veteran who lost her legs while serving in Iraq, appeared to be referencing Trump’s draft deferments. Trump received five draft deferments throughout the Vietnam War, and on one occasion, Trump [received a deferment](https://www.cnn.com/2017/11/09/politics/president-donald-trump-vietnam/index.html) because of bone spurs.
  
  Ad Feedback
  
  On Monday, Trump called out Democrats’ behavior at his speech last week.
  
  “They were like death and un-American. Un-American. Somebody said, ‘Treasonous.’ I mean, yeah, I guess, why not,” Trump said, adding, “Can we call that treason? Why not.”
  
  This isn’t the first time Duckworth has pointed out Trump’s draft deferments. Last month, she brought it up on the Senate floor.
  
  “I spent my entire adult life looking out for the well-being, the training, the equipping of the troops for whom I was responsible. I will not be lectured about what our military needs by a five-deferment draft dodger,” Duckworth said at the time.
  
