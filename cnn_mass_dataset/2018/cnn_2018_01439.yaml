  So far, pushback in Congress and in the courts is promising. Last June, the Senateintroduced a Farm Bill that rejected the strict work requirementson SNAP that the House had passed in its bill. Still, the issue will be revisited as the final bill gets negotiated. In June, a federal court vacated the administration’s approval of work requirements on Medicaid recipients in Kentucky. A similar suit wasjust filed challenging Medicaid work requirements in Arkansasa few weeks ago. It may just be that the weaknesses in the administration’s narrative create an opening for Congress and voters to focus on the facts. In any case, we should hold off on celebrating a victory in the War on Poverty, and instead realize that the declaration of victory is actually an opening salvo in a new War on the Poor.
