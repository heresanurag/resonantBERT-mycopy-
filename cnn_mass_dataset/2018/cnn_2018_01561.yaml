  If you want to sip (or gulp) a drink at the London watering hole just recognized asthe world’s best bar, you’d better hurry. It’s closing soon – for good.
  
  Here’s what else you need to know toGet Up to Speed and Out the Door. (You can also get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  Senators who will decide the fate of Supreme Court nominee Brett Kavanaughwill start reading the reportfrom the FBI’s investigation of him this morning. It comes as Republican Majority Leader Mitch McConnellset up a procedural voteon Kavanaugh’s nomination for tomorrow. If that’s successful, a final vote could come Saturday. Democrats and others are still grumbling about the FBI inquiry, saying many witnesses who could have possibly corroborated the sexual misconduct allegations against Kavanaugh weren’t interviewed.
  
  One police officer was killed and six other law enforcement officers were injured after aman opened fire on themin Florence, South Carolina. County deputies were executing a search warrant when the man started shooting. “These officers went there unknowing the firepower this suspect had,” Florence County Sheriff Kenney Boone said. The officer who was killed, Florence Police Officer Terrence Carraway, had just recently been given a pin recognizing 30 years of public service. After a two-hour standoff, the shooting suspect was arrested.
  
  A federal judge in California has put up a roadblock to one of the Trump administration’s immigration initiatives. A preliminary injunction was granted that, for now, stops the government from terminating temporary protected status, known as TPS, for immigrants from Sudan, El Salvador, Haiti and Nicaragua. TPS protects people in the US from having to return to countries hit by war, epidemics and other natural disasters. Trump’s administration has worked to end the protections for most immigrants, saying conditions in their home countries had improved. The judge’s ruling means the protections continue – and the immigrants can stay – while a lawsuit challenging the government’s decision works its way through the courts.
  
  What happened to Jamal Khashoggi? He’s a prominent Saudi journalist and critic of the country’s leadership. He went Tuesday to Saudi Arabia’s consulate in Istanbul, Turkey, to get paperwork so he could get married.He hasn’t been seen since.Saudi officials said he left the consulate soon after getting the paperwork, but Turkish police, after examining surveillance footage, said there’s no sign he ever left. His fiancée, who has been outside the building since he went in, fears the worst. With therise of young Crown Prince Mohammed bin Salman, Saudi Arabia has taken a hard line against dissenters.
  
  The Navy may be preppinga major show of forceas a warning to China. A draft proposal has been drawn up recommending the US Pacific Fleet conduct a weeklong series of operations in November, US defense officials say. The point of the exercises – which would involve warships, combat aircraft and troops – would be to show China and others that the US can counter its enemies quickly on several fronts. Part of the operations would be conducted near China’s territorial waters in the South China Sea, putting US ships and planesnear Chinese forces.
  
