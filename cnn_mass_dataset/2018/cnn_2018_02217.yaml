  _February 14, 2018_
  
  _Wednesday’s show takes you to South Africa, Haiti, and the U.S. Our first report examines political instability surrounding calls for South Africa’s president to step down. Our second is part of CNN’s Freedom Project; it’s aimed at shedding light on human trafficking in some of Haiti’s orphanages. And our third shows you how dog-like robots are getting advanced enough to open doors._
  
