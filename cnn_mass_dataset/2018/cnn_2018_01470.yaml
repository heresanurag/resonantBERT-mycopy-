  _November 13, 2018_
  
  _A rule change involving asylum and certain migrants to the U.S. is the first story we’re explaining today. It’s followed by an examination of a major vote recount in a state that’s had one before. The top 10 CNN Heroes of 2018, a technology show in the Middle East, and a robotic anchor are our other topics this Tuesday._
  
