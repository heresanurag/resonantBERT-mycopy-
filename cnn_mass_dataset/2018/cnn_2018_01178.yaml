  One page called “Memes that are right,” for instance, has spent afew hundred dollars on ads,mostly deriding Democrats. The person behind that page told CNN Business in a Facebook message they were a small business owner who “believes deeply in a conservative agenda being best for our nation and has the drive to support it.”
  
  Editor’s note: Facebook has given CNN and other organizations access to itsad archive APIto analyze political ad spending. The data featured in this story was gathered throughFacebook’s public political ad website, not its ad archive API.
