title: "Women who are early risers have lower risk of breast cancer, says new study"
date: "2018-11-06"
section: "Health"
url: "https://www.cnn.com/2018/11/06/health/early-risers-less-likely-develop-breast-cancer-intl/index.html"
content: |
  Women who are naturally early risers were found to have lower risk of developing breast cancer than evening typesin a new study. One in 100 women who considered themselves morning people developed breast cancer, compared with two in every 100 women who called themselves evening people.
  
  Cancer risks associated with a person’s body clock and sleep patterns have been reported in previous research and the UK researchers wanted to explore sleep traits in more detail, as well as any genetic factors underlying this.
  
  Self-reported preferences for mornings or evenings (by their own definition of that preference) were recordedin more than 180,000 women, led by Dr. Rebecca Richmond, research fellow in the Cancer Research UK Integrative Cancer Epidemiology Program and the Epidemiology Unit at the University of Bristol, and presented Tuesday at the NCRI Cancer Conference in Glasgow.
  
  Richmond’s team also analyzed genetic variants linked to whether someone is a morning or night personin more than 220,000 women to find out if these could help provide a causal link to breast cancer.
  
  This type of statistical model, called Mendelian randomization, showed that people whose genes made them more likely to be early risers were less likely to develop breast cancerby as much as 48%, as shown from the 220,000 participants in the study.
  
  The second analysis, using self-reported data on sleep from 180,000 participants, showed a similar trend of early rising women having a 40% lower risk of breast cancer. The variation is due to technical differences, stated Richmond.
  
  Women who self-reported sleeping more than the average seven to eight hours per night were also found to have a slightly increased risk of breast cancer, of 20% per extra hour slept, according to the team’s Mendelian randomization analysis.
  
  But the team point out that many factors are involved in a person developing breast cancer and that these numbers are not an absolute risk. Also, the findings cannot be applied across populations as the majority of women included were of European ancestry.
  
  “Sleep is likely to be an important risk factor for breast cancer, but it isn’t as large as other well-established risk factors like BMI or alcohol,” said Richmond.
  
  TheAmerican Cancer Societysays 45% of cancer deaths in the United States are linked to modifiable risk factors, such as cigarette smoke, excess body weight, eating red and processed meat and physical inactivity. Around 4% of US cancer deaths were linked to drinking alcohol and theBreast Cancer Nowcharity warns that any alcohol intake increases the risk of breast cancer. And obesity is set to become the leading preventable cause of breast cancer for women in the UK, according to areportfrom earlier this year.
  
