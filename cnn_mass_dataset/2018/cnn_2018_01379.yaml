  “We know that sleep is important generally for health,” said Richmond. “These findings have potential policy implications for influencing sleep habits of the general population in order to improve health and reduce risk of breast cancer among women.”
  
  Our circadian rhythms, or body clocks, control bodily functions such as sleep patterns, blood pressure and metabolism and when disturbed can increase the risk of cancers and other diseases.
  
  Richmond’s team conducted their genetic analysis in hope of digging into possible causes and consequences of this link. However, experts warn more research is needed and the existing findings cannot be applied more widely.
  
