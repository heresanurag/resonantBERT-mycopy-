  Hidden medical causes of weight gain
  
  8 photos
  
  Are you sure those extra pounds are caused by a lack of willpower, or could there be an underlying medical issue?
  
  Shutterstock
  
  Hidden medical causes of weight gain
  
  ![Image 2: Suffering from knee, hip or ankle pain? Bad back or neck? Joint problems like these can keep us from exercising, limiting our ability to burn calories. Get your aches and pains addressed and get moving again.](https://media.cnn.com/api/v1/images/stellar/prod/170221135230-10-hidden-medical-causes-of-weight-gain.jpg?q=w_3000,h_1688,x_0,y_0,c_fill/w_1182)
  
  -1 / 8
  
  Suffering from knee, hip or ankle pain? Bad back or neck? Joint problems like these can keep us from exercising, limiting our ability to burn calories. Get your aches and pains addressed and get moving again.
  
  Shutterstock
  
  ![Image 3: Plagued by insomnia? Or just not fitting in enough Z's? You're not alone. The vast majority of Americans is officially sleep-deprived. <a href="http://www.mayoclinic.org/healthy-lifestyle/adult-health/expert-answers/sleep-and-weight-gain/faq-20058198" target="_blank" target="_blank">Studies </a>have shown that sleeping fewer than five or more than nine hours a night can pack on the pounds. Mostly that's because you're more likely to reach for high-calorie snacks and do less exercise.](https://media.cnn.com/api/v1/images/stellar/prod/170221135231-11-hidden-medical-causes-of-weight-gain.jpg?q=w_3000,h_1688,x_0,y_0,c_fill/w_1182)
  
  0 / 8
  
  Plagued by insomnia? Or just not fitting in enough Z's? You're not alone. The vast majority of Americans is officially sleep-deprived. [Studies](http://www.mayoclinic.org/healthy-lifestyle/adult-health/expert-answers/sleep-and-weight-gain/faq-20058198)have shown that sleeping fewer than five or more than nine hours a night can pack on the pounds. Mostly that's because you're more likely to reach for high-calorie snacks and do less exercise.
  
  Shutterstock
  
  ![Image 4: Are you sure those extra pounds are caused by a lack of willpower, or could there be an underlying medical issue?](https://media.cnn.com/api/v1/images/stellar/prod/170221134719-01-hidden-medical-causes-of-weight-gain.jpg?q=w_3000,h_1688,x_0,y_0,c_fill/w_1182)
  
  1 / 8
  
  Are you sure those extra pounds are caused by a lack of willpower, or could there be an underlying medical issue?
  
  Shutterstock
  
  ![Image 5: The stress hormone cortisol regulates appetite, body composition and metabolism. Studies show that prolonged exposure to stress is related to high body mass and obesity. <br />It's hard to beat a stress habit, but experts suggest trying to choose better coping habits than comfort food. Look to yoga, medication, deep breathing and mindfulness exercises.](https://media.cnn.com/api/v1/images/stellar/prod/170221134722-02-hidden-medical-causes-of-weight-gain.jpg?q=w_3000,h_1688,x_0,y_0,c_fill/w_1182)
  
  2 / 8
  
  The stress hormone cortisol regulates appetite, body composition and metabolism. Studies show that prolonged exposure to stress is related to high body mass and obesity.
  
  It's hard to beat a stress habit, but experts suggest trying to choose better coping habits than comfort food. Look to yoga, medication, deep breathing and mindfulness exercises.
  
  Shutterstock
  
  ![Image 6: The culprit for your recent weight gain could be hiding in your medication cabinet. A variety of medications are frequently associated with weight gain, most notoriously antidepressants. Be sure to read up on side effects and discuss options with your psychiatrist. ](https://media.cnn.com/api/v1/images/stellar/prod/170221134726-03-hidden-medical-causes-of-weight-gain.jpg?q=w_3000,h_1688,x_0,y_0,c_fill/w_1182)
  
  3 / 8
  
  The culprit for your recent weight gain could be hiding in your medication cabinet. A variety of medications are frequently associated with weight gain, most notoriously antidepressants. Be sure to read up on side effects and discuss options with your psychiatrist.
  
  Shutterstock
  
  ![Image 7: Ovarian cancer is a rare but deadly reason for a bloated belly. It usually goes along with other <a href="http://www.bmj.com/content/339/bmj.b2998" target="_blank" target="_blank">telltale signs </a>such as abdominal pain, urinary frequency, postmenopausal and anal bleeding, and a loss of appetite. So if you've suddenly developed abdominal distension in the past few months and have any of these other symptoms, see a doctor immediately. And don't rely on the results of your Pap test; that's effective only in the early detection of cervical cancer.](https://media.cnn.com/api/v1/images/stellar/prod/170221134729-05-hidden-medical-causes-of-weight-gain.jpg?q=w_3000,h_1688,x_0,y_0,c_fill/w_1182)
  
  4 / 8
  
  Ovarian cancer is a rare but deadly reason for a bloated belly. It usually goes along with other [telltale signs](http://www.bmj.com/content/339/bmj.b2998)such as abdominal pain, urinary frequency, postmenopausal and anal bleeding, and a loss of appetite. So if you've suddenly developed abdominal distension in the past few months and have any of these other symptoms, see a doctor immediately. And don't rely on the results of your Pap test; that's effective only in the early detection of cervical cancer.
  
  Shutterstock
  
  ![Image 8: Some diabetes medications, such as insulin, are notorious for adding on pounds. That's especially vexing when being overweight has contributed to the development of the disease. <a href="http://blog.joslin.org/2013/09/diabetes-medications-and-weight-gain/" target="_blank" target="_blank">Experts</a> suggest working closely with your doctor to see whether some of the more weight-friendly diabetes medications are an option.](https://media.cnn.com/api/v1/images/stellar/prod/170221134731-06-hidden-medical-causes-of-weight-gain.jpg?q=w_3000,h_1688,x_0,y_0,c_fill/w_1182)
  
  5 / 8
  
  Some diabetes medications, such as insulin, are notorious for adding on pounds. That's especially vexing when being overweight has contributed to the development of the disease. [Experts](http://blog.joslin.org/2013/09/diabetes-medications-and-weight-gain/) suggest working closely with your doctor to see whether some of the more weight-friendly diabetes medications are an option.
  
  Shutterstock
  
  ![Image 9: Chronic constipation can also lead to abdominal bloating as well as gas, cramps and sharp, stabbing pains. Constipation is defined as having fewer than three bowel movements a week. Be sure to eat foods with plenty of fiber and drink a lot of water, but if that doesn't solve the problem, it may be time for a visit to your health practitioner.](https://media.cnn.com/api/v1/images/stellar/prod/170221135227-08-hidden-medical-causes-of-weight-gain.jpg?q=w_3000,h_1688,x_0,y_0,c_fill/w_1182)
  
  6 / 8
  
  Chronic constipation can also lead to abdominal bloating as well as gas, cramps and sharp, stabbing pains. Constipation is defined as having fewer than three bowel movements a week. Be sure to eat foods with plenty of fiber and drink a lot of water, but if that doesn't solve the problem, it may be time for a visit to your health practitioner.
  
  Shutterstock
  
  ![Image 10: Suffering from knee, hip or ankle pain? Bad back or neck? Joint problems like these can keep us from exercising, limiting our ability to burn calories. Get your aches and pains addressed and get moving again.](https://media.cnn.com/api/v1/images/stellar/prod/170221135230-10-hidden-medical-causes-of-weight-gain.jpg?q=w_3000,h_1688,x_0,y_0,c_fill/w_1182)
  
  7 / 8
  
  Suffering from knee, hip or ankle pain? Bad back or neck? Joint problems like these can keep us from exercising, limiting our ability to burn calories. Get your aches and pains addressed and get moving again.
  
