  # Weight loss interventions that work: Medications
  
  By Lisa Drayer
  
  Updated Mar 8, 2018
  
  Updated Mar 8, 2018, 2:26 PM ET
  
  PUBLISHED Feb 7, 2018, 4:15 AM ET
  
  Food & health Prescription drugs Chronic diseases Federal agencies
  
