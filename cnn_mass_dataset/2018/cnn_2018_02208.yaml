  # Pence didn’t snub North Koreans deliberately, officials say
  
  By [![Image 1: Elise Labott](https://media.cnn.com/api/v1/images/stellar/prod/140926161954-elise-labott-profile-image.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/elise-labott-profile)[Elise Labott](https://www.cnn.com/profiles/elise-labott-profile)
  
  Updated Feb 11, 2018
  
  Updated Feb 11, 2018, 5:21 PM ET
  
  PUBLISHED Feb 9, 2018, 7:13 PM ET
  
  North Korea Asia South Korea Olympics
  
