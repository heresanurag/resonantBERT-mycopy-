  What message did Pence send to NK at Olympics?
  
  2:00  • Source: [CNN](https://www.cnn.com/)
  
  ![Image 3: US Vice President Mike Pence (front R), his wife Karen (front C), North Korea's leader Kim Jong Un's sister Kim Yo Jong (2nd L) and Kim Jung-Sook (L), the wife of South Korea's President Moon Jae-in, attend the opening ceremony of the Pyeongchang 2018 Winter Olympic Games at the Pyeongchang Stadium on February 9, 2018.](https://media.cnn.com/api/v1/images/stellar/prod/180209090030-09-olympics-unfurled-0209.jpg?q=x_5,y_241,h_2526,w_4490,c_crop/w_860)
  
  What message did Pence send to NK at Olympics?
  
  2:00
  
  Vice President Mike Pence did not deliberately snub North Koreans at an Olympic reception, according to US officials who pushed back on South Korean reports that Pence deliberately came late to a VIP gathering Friday evening and then snubbed officials from Pyongyang.
  
  Officials traveling with Pence to the 23rd Olympic Winter Games in South Korea were responding to reports that Pence had gone around a main table and greeted everyone except Kim Yong Nam, North Korea’s nominal head of state. These officials said that while Pence did not greet Kim Yong Nam, he didn’t deliberately skip over him. Instead, they said, Kim simply wasn’t seated in the area where Pence was receiving well-wishers.
  
  The officials said it was fair to say both Pence and the North Koreans rebuffed South Korean President Moon Jae-in’s efforts to facilitate a meeting between North Korea and the US.
  
  Ad Feedback
  
  [Related video ![Image 4: PYEONGCHANG, SOUTH KOREA - FEBRUARY 09: United States Vice President Vice President Mike Pence (front row, 2-R) watches the opening ceremony of the PyeongChang Winter Olympics along with Kim Yo-jong, the sister of North Korean leader Kim Jong-Un (back row, 1-L), Kim Yong Nam, North Korea's ceremonial head of state (top row-L), Japanese Prime Minister Shinzo Abe (front row 1-R) and South Korean president Moon Jae-in (front row-L) on February 9, 2018 in PyeongChang, South Korea.](https://media.cnn.com/api/v1/images/stellar/prod/180209072616-pence-winter-olympics-2018-0209.jpg?q=x_3,y_119,h_1311,w_2330,c_crop/h_720,w_1280/w_256) PYEONGCHANG, SOUTH KOREA - FEBRUARY 09: United States Vice President Vice President Mike Pence (front row, 2-R) watches the opening ceremony of the PyeongChang Winter Olympics along with Kim Yo-jong, the sister of North Korean leader Kim Jong-Un (back row, 1-L), Kim Yong Nam, North Korea's ceremonial head of state (top row-L), Japanese Prime Minister Shinzo Abe (front row 1-R) and South Korean president Moon Jae-in (front row-L) on February 9, 2018 in PyeongChang, South Korea. Carl Court/Getty Images Video shows Pence seated near Kim Jong Un's sister](http://www.cnn.com/videos/world/2018/02/09/pence-sits-by-kim-jong-un-sister-olympics-ripley-newday.cnn)
  
  North Korea has sent some of the highest level officials ever to the south for these games, the result of diplomacy by Seoul that led to an agreement between the two countries – still formally at war – to participate together in the Winter Games. [Athletes from the two countries marched side by side](https://www.cnn.com/2018/02/09/sport/olympics-opening-ceremony-peyongchang-color-intl/index.html) during the opening ceremony and have formed a joint women’s hockey team.
  
  But Pence has not let up on the tough rhetoric he’s been delivering since arriving in Asia. Speaking to [NBC’s “Nightly News”](https://www.nbcnews.com/storyline/winter-olympics-2018/pence-vows-defend-u-s-north-korea-taking-whatever-action-n846231)on Thursday, the vice president continued to stress that the US would protect itself from North Korean nuclear threats by taking whatever “action is necessary to defend our homeland.”
  
  Officials traveling with Pence said it would be fair to characterize his failure to interact with the North Koreans as a mutual decision, with neither side making any public overtures.
  
  [Related article ![Image 5: US Vice President Mike Pence attends their joint announcement with Japan's Prime Minister Shinzo Abe after their joint announcement after their meeting at Abe's official residence in Tokyo on February 7, 2018. Pence is in Tokyo for three days before leading a US delegation to the opening ceremony of the politically tinged Pyeongchang 2018 Winger Olympic Games on February 9. / AFP PHOTO / POOL / TORU HANAI (Photo credit should read TORU HANAI/AFP/Getty Images)](https://media.cnn.com/api/v1/images/stellar/prod/180207063838-mike-pence-japan-02-07-2018.jpg?q=x_0,y_25,h_2576,w_4579,c_crop/h_720,w_1280/w_256) US Vice President Mike Pence attends their joint announcement with Japan's Prime Minister Shinzo Abe after their joint announcement after their meeting at Abe's official residence in Tokyo on February 7, 2018. Pence is in Tokyo for three days before leading a US delegation to the opening ceremony of the politically tinged Pyeongchang 2018 Winger Olympic Games on February 9. / AFP PHOTO / POOL / TORU HANAI (Photo credit should read TORU HANAI/AFP/Getty Images) TORU HANAI/AFP/AFP/Getty Images Pence, Moon play down differences over North Korea on eve of Games](http://www.cnn.com/2018/02/08/politics/mike-pence-moon-jae-in-north-korea/index.html)
  
  Pence was in close proximity to the North Korean party both at the VIP reception and later, watching the opening ceremony from Moon’s box, which included Kim Yong Nam and leader [Kim Jong Un’s sister](https://www.cnn.com/2018/02/09/sport/pence-kim-yo-jong-olympics-trnd/index.html), Kim Yo Jong.
  
  That said, these officials said that if the North Koreans had approached Pence with pleasantries, he would have responded in kind.
  
  As for sharing Moon’s box with the North Koreans, the officials said they knew in advance who was going to be in Moon’s box to watch the opening ceremony. They said Pence could have opted to sit with the US delegation and avoided the box that included the North Koreans.
  
  The visual was important, a US official said.
  
  “We wanted to show the alliance seated together,” the official said. “We wanted the North Koreans to see the vice president, Abe and Moon sitting directly in front of them for the opening ceremonies, and it would show that that alliance is strong.”
  
  [Related video ![Image 6: mike pence tokyo](https://media.cnn.com/api/v1/images/stellar/prod/180207034803-mike-pence-tokyo.jpg?q=x_178,y_76,h_709,w_1261,c_crop/h_720,w_1280/w_256) Pool Pence: N. Korea won't hide behind Olympic flag](http://www.cnn.com/videos/world/2018/02/07/mike-pence-otto-warmbier-north-korea-hide-olympics-sot.cnn)
  
  “At any moment, he could have gotten up and left and sat somewhere else, and then you would have had the image of North sitting in the box with South Korea and Japan,” the official added. “But he stayed there the entire time… and talked to Moon and Abe and their spouses, and the North Koreans sat in the back and didn’t talk to anybody, and that image is telling.”
  
  Pence had said all week that if he met with the North Koreans, he would deliver a tough message. He also said the ceremonies were not the appropriate venue for serious talks.
  
  Asked about criticism that Pence stood and cheered only for Team USA and stayed seated when the North and South Koreans marched in under a unified flag, the official was unapologetic.
  
  “The vice president cheered for the team he’s rooting for. He cheered for the USA,” the official said. “That’s the team he’s going to be cheering for all Olympics. He wants them all to win medals. He’s biased for the Americans.”
  
