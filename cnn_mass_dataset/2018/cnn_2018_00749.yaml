  Despite his frustration over Brexit, he is ecstatic that the Clarets – as Burnley FC is affectionately known –  are playing in Europe this year.
  
  “It’s huge. It’s massive for the town and it’s massive for the club,” he said. “It makes the club feel a little bit special. It’s impossible to overstate how important this club is in the town.
  
  “No other town of this size gets anywhere near having a top football club. A bigger share of population goes to games than any other club in the country. So when we do well that success has a huge impact around the place.”
  
  Former Burnley goalkeeper Brian Jensen shares Campbell’s elation over Burnley’s return to European football.
  
  “Qualifying for Europe will mean everything for them,” he told CNN Sport. “It will put the club back on the map again, where they belong. It’s always nice to get the chance to get a trip around the world. I mean, Aberdeen isn’t the furthest but it’s a start. Who knows where they can go from here?”
  
  Jensen, nicknamed “The Beast,” is still adored by Burnley fans after playing for the club for 10 years and he wishes them well on their European endeavors.
  
  “Well, If I was there it would mean everything, “he said. “It’s a great achievement and something you want to do as a footballer – next step for them is probably (Europe’s premier competition) the Champions League but let’s not get ahead of ourselves.”
  
  Football hasn’t always been a tale of success in Burnley.
  
  The last 10 years, since first getting promoted back to the Premier League, can certainly be seen as a purple patch but it hasn’t always been that way for the Lancashire club.
  
  For a start, the last time it competed in Europe was in 1967, when it featured in the old Inter-Cities Fairs Cup.
  
  Half a century has passed and for a lot of the time since, the club has been more concerned with survival than European glory.
  
  In the 1986-87 season, Burnley very nearly fell out of the English football league entirely. Only a win over Leyton Orient on the final day saved it.
  
