title: "This town backed Brexit. Now, it’s back in Europe (Well, kind of)"
date: "2018-08-01"
section: "Football"
url: "https://www.cnn.com/2018/08/01/football/brexit-burnley-back-in-europe-spt-intl/index.html"
content: |
  They were among the most ardent supporters of Brexit, but now some residents of Burnley in the northwest of England are relishing a European adventure.
  
  More than 66% of Burnley’s voters in the 2016 referendum were in favor of leaving the EU, but fans of the town’s football team are targeting trips to the continent after it qualified for European competition for the first time in 51 years.
  
  Founded in 1882, Burnley Football Club punches above its weight in England’s top division against heavyweights and near neighbors Manchester City and Manchester United.
  
  Last season it finished seventh in the Premier League to qualify for UEFA’s Europa League, Europe’s second-tier competition.
  
  But for the fans the continent is still tantalizingly distant.
  
  Last week, the team kicked off its campaign with a two-leg qualifying round against Aberdeen, runners up in the Scottish Premier League.
  
  The first game at Pittodrie, Aberdeen’s home ground, finished 1-1, leaving the tie wide open going into the second leg Thursday night.
  
  Alastair Campbell, former communications director for ex-UK Prime Minister Tony Blair and avid Burnley fan, thinks Brexit is “one of the biggest disasters” to happen to the UK and believes that the town backing Brexit was partly a “protest vote.”
  
  Campbell says Burnley has had “more than its fair share of economic and social issues” and suggests it is an area that “felt left behind by globalization.”
  
  “The tragedy for me is that Brexit is likely to hit the people who have the least. A lot of the problems that drove people to vote leave are not going to be addressed,”  Campbell told CNN Sport.
  
