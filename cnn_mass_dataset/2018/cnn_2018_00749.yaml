  “I think to appreciate Burnley being in Europe now, you have had to experience the lows – there have been a lot of lows,” says Campbell.
  
  While acknowledging the recent success of other English underdog clubs in Europe, including Middlesbrough and Fulham, he reinforced his admiration for Burnley, saying, “No other club has played in Europe after once being 92nd in the football league” – the lowest a team can fall before crashing out of national competition.
  
  Before its return to England’s top division in 2009, Burnley arguably punched above its weight in the Championship for many years, but promotion always seemed slightly out of reach.
  
  But that season was pivotal. Jensen, the former goalkeeper, hinted that the club was staring administration in the face.
  
  “Five or six games before the end of the season we were told that we might not have jobs next season, so it was a hard pill to swallow,” he said. “But fortunately we put our heads down, played some good football and got promoted.
  
  “Now, to make it into Europe is a phenomenal achievement. It’s absolutely incredible if you consider what was happening about 10 years ago.”
  
  The keeper wouldn’t be the first person to put Burnley’s recent success down to the current manager, Sean Dyche.
  
  “I don’t think anyone would have predicted Burnley playing in Europe right now – it shows what a good job Sean Dyche does up there,” he added.
  
  “He gets the best out of the players and the resources at the club.”
  
  Off the pitch, Burnley has also had success.Burnley FC in the Community, the official charity of the club, was recently nominated on a shortlist of organizations for creating a positive social impact through sport in exciting, innovative and inspiring ways.
  
  About 24,000 people engaged with the charity in 2017, as it invested £1.7 million into communities and helped 800 disabled participants access sport every week, according to the club.
  
  The real spirit and love behind any football club is often found in the fans supporting it.
  
  Local man Simon Townley, 32, is a hairdresser for several of the Burnley football players. He even flew to Russia to cut some of the England footballers’ hair during the World Cup – Nick Pope, Burnley’s goalkeeper, was part of the national squad.
  
  “I’m pretty close to the guys. They’re good to me and I always try my best to keep the boys looking good,” he said.
  
  Townley flew to Scotland for the first game with Aberdeen and his enthusiasm for Burnley is palpable.
  
  “Being in the Europa League is a fantastic achievement for any club in the Premier League but to a town with a population of 80,000 it’s almost ridiculous,” he said. “But that’s was makes it even more exciting.”
  
  On the Brexit issue he added: “Politics is what it is and football is something else.
  
  “It doesn’t matter to me personally the Brexit issue but what football does is bring countries and clubs together for 90 minutes.”
  
  Ben Robinson, another Burnley fan, was more vocal on the issue of Burnley and Brexit.
  
  “Burnley is not one of the most prosperous areas and always seems to be on the end of some negative press,” he told CNN Sport.
  
  “I walk around the town center now and it’s really sad to see the number of shops and pubs that have shut down since the economic crash. So it’s fantastic for the town to be able to feel some pride again.
  
  “Regarding Brexit, without getting into the yes or no debate, it appears that it’s going to be Northern towns like Burnley that will suffer most from leaving the EU.
  
  “So, for us to potentially economically benefit from playing in a European competition is very interesting.”
  
  Burnley fans may not have shared views on Brexit, but what they do have is a shared love and pride in their football club.
  
  “Qualifying for Europe can only be a good thing,” said Gail Astin.
  
  “It can hopefully increase the town’s profile, give it an opportunity to portray itself in a positive light, bring people in and give it an economic boost – if the club can have a run in the competition.
  
  “It will hopefully raise the club’s profile further afield and possibly increase the fan base, creating more marketing opportunities as the club look to grow the club brand.”
  
  Gail and husband Simon’s love for the club is “in the blood,” she says.
  
  “It means everything. Burnley is my home town. I am born and bred Burnley,” she adds.
  
