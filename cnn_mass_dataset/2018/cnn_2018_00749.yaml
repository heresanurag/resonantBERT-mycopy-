  Robinson shares the same feeling, and relishes the unity the football club brings to the town.
  
  “There’s so much divide in the country at the moment. For example, Labour-Tory, right-wing, left-wing, pro- or anti-Brexit,” he says.
  
  “But going to Turf Moor is where we can forget about all of that, and in that brief moment, we all share a common goal – the success of Burnley.”
