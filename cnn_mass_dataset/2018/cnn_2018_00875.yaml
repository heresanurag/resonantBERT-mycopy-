  # Bioluminescent waves light up Big Sur. And what a sight it is
  
  By Isabella Gomez, [![Image 1: Christina Zdanowicz](https://media.cnn.com/api/v1/images/stellar/prod/140926160415-christina-zdanowicz-profile-image.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/christina-zdanowicz-profile)[Christina Zdanowicz](https://www.cnn.com/profiles/christina-zdanowicz-profile)
  
  Updated Feb 8, 2018
  
  Updated Feb 7, 2018, 10:28 PM ET
  
  PUBLISHED Feb 7, 2018, 3:14 PM ET
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2018%2F02%2F07%2Fus%2Fbig-sur-bioluminescent-waves-trnd "Share with email")Link Threads
  
  Link Copied!
  
  ![Image 2: Phytoplankton concentrations in the waters below Bixby Creek Bridge illuminate the darkened waters. ](https://media.cnn.com/api/v1/images/stellar/prod/180207143826-01-bioluminescent-big-sur.jpg?q=w_3000,h_1688,x_0,y_0,c_fill/w_860)
  
  Phytoplankton concentrations in the waters below Bixby Creek Bridge illuminate the darkened waters.
  
  courtesy George Krieger
  
  Big Sur is home to some of the most breathtaking views in the US, but a recent bloom in bioluminescent phytoplankton has turned its waves into a full-blown spectacle.
  
  The bright blue water under California’s Bixby Creek Bridge comes alive in photographs taken on Monday night by Monterey photographer George Krieger. Combined with a star-speckled sky, the entire scene lights up the night.
  
  ![Image 3: 02 bioluminescent big sur](https://media.cnn.com/api/v1/images/stellar/prod/180207143924-02-bioluminescent-big-sur.jpg?q=w_3000,h_1687,x_0,y_0,c_fill/w_1093)
  
  courtesy George Krieger
  
  So what’s causing the unusual sight?
  
  Ad Feedback
  
  “It is almost certainly a dinoflagellate bloom. We are also seeing relative high bioluminescence with our instruments here in Monterey Bay,” Steve Haddock, a bioluminescence specialist at the Monterey Bay Aquarium Research Institute, told [CNN affiliate KSBW](http://www.ksbw.com/article/bioluminescent-waves-glowing-in-big-sur/16645987).
  
  “The species counts from [the] Santa Cruz area show low to moderate numbers of the ‘usual suspects’ of luminous species that we would expect to cause such a bloom: Noctiluca, Lingulodinium, and Protoperidinium being some of the brightest,” he said.
  
  ![Image 4: 03 bioluminescent big sur](https://media.cnn.com/api/v1/images/stellar/prod/180207144005-03-bioluminescent-big-sur.jpg?q=w_3000,h_1688,x_0,y_0,c_fill/w_1093)
  
  courtesy George Krieger
  
  Reports of glowing waves down the California coast have spiked since early January, most likely due to a combination of high nutrient rates and calm conditions that form layers of highly concentrated dinoflagellates in the water, Haddock explains.
  
  Once the wind picks back up, the phytoplankton will likely be dispersed through the waves. In the meantime, tourists and locals are in for a special treat after sunset.
  
