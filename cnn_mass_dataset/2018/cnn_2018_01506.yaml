title: "The ‘chicken and egg’ reason why polio outbreaks still happen"
date: "2018-07-10"
section: "Health"
url: "https://www.cnn.com/2018/07/10/health/polio-vaccine-outbreaks-explainer-intl/index.html"
content: |
  The wild poliovirus is near eradication, but vaccine-derived polioviruses can trigger very rare outbreaks
  
  It's a "chicken and egg" problem, experts say
  
  If polio is near extinction, why do outbreaks still pop up in places where the disease was thought to be long gone? The answer is complicated.
  
  Global efforts to destroy disease-causing polioviruses have been quite a success story. Cases caused by the wild poliovirushave dropped 99%since 1988, thanks to vaccination efforts and a public-private partnership launched that year called theGlobal Polio Eradication Initiative.
  
  Yet some immunization efforts carry the very rare risk of causing polioviruses to circulate in areas where many people might not yet be vaccinated or areas that were poorly vaccinated – an event that could lead to new cases of disease while trying to demolish it.
  
  It turns out that live strains of poliovirus that are used in the oral poliovirus vaccine can mutate, spread and, in rare cases, even trigger an outbreak, representing a catch-22 in ongoing polio eradication endeavors.
  
  These vaccine-derived viruses continue to haunt certain regions of the world.
  
  “Why do we see outbreaks? First, we need to make a distinction between the wild poliovirus – which is the virus we’re trying to eradicate – and thevaccine-derived polioviruses, which are causing some of the outbreaks that we are now seeing in the Democratic Republic of Congo, as well as in Papua New Guinea,” said Michel Zaffran,director of the polio eradication programat the World Health Organization in Geneva, Switzerland.
  
  Polio outbreak confirmed in Papua New Guinea
  
  Last month, a polio outbreak was confirmed inPapua New Guinea, which had been certified as polio-free in 2000, along with the rest of WHO’s Western Pacific Region. Last year,two separate outbreaks of poliowere reported in remote parts of theDemocratic Republic of Congo. Another outbreak was confirmed inSyria.
  
  These outbreaks all involved circulating vaccine-derived polioviruses.
  
  Symptoms of polio, orpoliomyelitis, include fever, fatigue, headache, vomiting, stiffness in the neck, pain in the limbs and, in a very small percentage of cases, paralysis, which is often permanent. There is no cure for polio, and it can be prevented only by immunization.
  
  Vaccine-derived polioviruses circulating have been rapidly stopped in the past with two to three rounds of immunization campaigns, according to WHO. So, for all polio outbreaks – from a vaccine-derived virus or not – the solution has been to immunize every child several times with the oral vaccine to stop transmission.
  
  Nigeria's fight against polio
  
  “The eradication of the wild poliovirus is on track because we only have three countries where the wild virus still fights for survival:Pakistan, Afghanistan and Nigeria. I believe that we could very well eradicate the virus very soon,” Zaffran said.
  
  “In terms of these outbreaks caused by the vaccine-derived viruses, this can only be stopped when we stop altogether using the vaccine, and we will not stop using the vaccine until we have eradicated the wild virus. So it’s a chicken and egg situation,” he said. “But we first need to eradicate the wild virus. After that, we will actually withdraw globally the use of the oral polio vaccine.”
  
  Vaccine-derived polioviruses circulate when routine immunization efforts are poorly conducted, leaving a community susceptible to any poliovirus, whether vaccine-derived or wild.
  
  Experts tend to agree that the problem is not with the vaccine itself but ratherlow vaccination coverage, as a fully immunized community would be protected against both vaccine-derived and wild polioviruses, according to WHO.
  
  “That’s why the world needs to continue its efforts until the very end,” Zaffran said. “We cannot stop our efforts now.”
  
  Polio rises from the grave
  
  In 1988, there were an estimated350,000 cases of polioin more than 125 endemic countries worldwide. Last year, there were only22 reported casesin two endemic countries: Pakistan and Afghanistan
  
  Since 2000,more than 10 billion dosesof the oral polio vaccine have been administered to nearly 3 billion children worldwide, preventing more than 13 million cases of polio, according to WHO.
  
  During that time, 24 vaccine-derived poliovirus outbreaks occurred in 21 countries, resulting in fewer than 760 vaccine-derived poliovirus cases.
  
  “The countries that have had problems have been the countries where the vaccination levels are extremely low, either because of ongoing infrastructure issues or, more commonly now, because areas of conflict don’t have the necessary infrastructure to vaccinate,” said Dr. Yvonne Maldonado, a professor of pediatrics at theStanford University School of Medicineand chief of pediatric infectious diseases at Lucile Packard Children’s Hospital at Stanford, who has studied poliovirus.
  
  “We’re almost ready to declare that we have eliminated wild polio, and these other cases, the vaccine-derived cases, are viruses that have been sitting around for months and years,” she said. “If we continue to keep our vaccination levels high in all countries until we know polioviruses are all gone, then we should not see more cases.”
  
  Some countries no longer use the oral vaccine and have switched to what’s called theinactivated polio vaccine, developed byDr. Jonas Salkand madeavailable in the United States in 1955.
  
  The inactivated vaccine contains killed versions of wild-type poliovirus strains, doesn’t pose the small risk of an outbreak and can be administered with a shot in the arm or leg. The inactivated vaccine is theonly polio vaccine given in the USsince 2000.
  
  Busting common myths about vaccines
  
  Theoral poliovirus vaccine– which contains live weakened versions of the virus and can be administered through liquid in the mouth – is the predominant vaccine used in many countries to eradicate polio. Unlike the Salk vaccine, it’s the only one that can both protect individuals and block person-to-person transmission of the virus.
  
  The vaccine was developed byDr. Albert Sabinand approved foruse in the US in 1961.
  
  “The live virus vaccine is still in use for two reasons,” said Maldonado, who sits on the American Academy of Pediatrics’ Committee on Infectious Diseases.
  
  “One is because it is much cheaper,” she said. “Secondly, the manufacturers are really trying to ramp up production of the killed vaccine. So as soon as they get enough vaccine, they’re hoping that all countries will be using the killed vaccine, and eventually the plan is to try to switch over to only using killed vaccine.”
  
  Bill Gates pledges $450 million to fight polio
  
  Theinactivated vaccineis more than five timesmore expensive than the oral vaccine, which could cost a country only about 12 to 18 cents per dose when procured through UNICEF. The inactivated vaccine can cost about $1 per dose for a 10-dose vial or $1.90 per dose for a five-dose vial, according to a2014 UNICEF document.
  
  The inactivated vaccine induces lower levels of immunity specifically in the intestines, where the poliovirus resides in most cases, compared with the oral vaccine. This type of immunity is calledmucosal immunity.
  
  As a result, when a person immunized with the inactivated vaccine is infected with wild poliovirus, thevirus could still multiplyinside the intestines and spread to other people through that person’s feces – even though the person shows no signs of infection.
  
  The typical route of infection is by ingesting the virus, for instance if a person touches an object contaminated with feces and then touches their mouth.
  
  The virus can live in an infected person and be excreted in feces for many weeks and contaminate food and water in unsanitary conditions, according to theUS Centers for Disease Control and Prevention.
  
  Why is it taking so long to rid the world of polio?
  
  “If I get this inactivated polio vaccine and somehow I get infected, I would not know that I got infected because I am completely protected, but I will act as a vector, transmitting this virus almost at the same rate as if I had no vaccination,” said Raul Andino, professor of microbiology and immunology at theUniversity of California, San Francisco, whose lab has been studying poliovirus.
  
  “It’s very effective to prevent disease, but it’s not effective to prevent spread from people to people,” he said of the inactivated vaccine.
  
  On the other hand, Andino pointed out that with the oral vaccine, you risk seeing live vaccine-derived viruses circulating in under-vaccinated communities.
  
  “So what do we need? Another vaccine,” he said. “A vaccine that induces mucosal immunity and at the same time is safe.”
  
  Andino led a study published last year inthe journal Cellthat described exactly how vaccine-derived polioviruses replicate, regain virulence and lead to outbreaks.
  
  This new insight into the specific pathway in which vaccine-derived polio outbreaks occur could help in thedevelopment of improved vaccines.
  
  For instance, the finding could help predict whether a live attenuated vaccine candidate could revert to a pathogenic form, possibly triggering an outbreak, Andino and his co-authors wrote in the study.
  
  “We need to improve the technology, because clearly, this is a problem,” Andino said. “Hopefully, this is going to be happening in the next few years.”
