title: "146 years after Susan B. Anthony cast a history-changing vote, women are sharing their voting pride at her grave"
date: "2018-11-06"
section: "US"
url: "https://www.cnn.com/2018/11/06/us/elections-voting-susan-b-anthony-grave-trnd/index.html"
content: |
  On November 5, 1872, Susan B. Anthonyvoted in a presidential election. At the time, it was an illegal and status-smashing act, and two weeks afterward she was charged with and fined for illegal voting.
  
  It took nearly 50 years for the efforts of the womens’ suffrage movement to finally come to fruition with the passing of the19th Amendment, which enshrined womens’ right to vote.
  
  On November 6, 2018 – 146 years later – women are visiting her final resting place in Rochester, New York, to place their “I voted” stickers on her grave.
  
  The first people arrive at 7:05am here at Mount Hope Cemetery in Rochester, NY to place their “I Voted” stickers at the grave of Susan B. Anthony.  It was November 5, 1872 when Anthony illegally voted in the presidential election, resulting in her arrest.#ElectionDay@News_8pic.twitter.com/4yklblxbqY
  
  A similar scene unfolded in 2016, when Rochester’s Mount Hope Cemeteryoverflowed with women coming to pay their respectsafter voting in the presidential election.
  
  The fight for women’s voting equality was not a perfect one. The rights and humanity of black and other minority citizenswere often dismissed or overlooked by some of its leaders, and the 19th Amendment was far from the end of the struggle for equal rights for all Americans. But Anthony remains a hero to women around the country who vote proudly in her stead.
