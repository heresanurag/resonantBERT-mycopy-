  # Kylie Jenner welcomes baby girl
  
  By [![Image 1: Lyric Lewin](https://media.cnn.com/api/v1/images/stellar/prod/171117090900-lyric-lewin-2017.jpeg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/lyric-lewin)[Lyric Lewin](https://www.cnn.com/profiles/lyric-lewin), Nadeem Muaddi
  
  Updated Feb 5, 2018
  
  Updated Feb 5, 2018, 7:55 AM ET
  
  PUBLISHED Feb 4, 2018, 4:07 PM ET
  
