title: "The end of the AIDS epidemic is (almost) in reach"
date: "2018-07-26"
section: "Opinion"
url: "https://www.cnn.com/2018/07/26/opinions/us-needed-combat-hiv-aids-epidemic-radin/index.html"
content: |
  Editor’s Note:Elizabeth Radin is the technical director for the Population-based HIV Impact Assessment Program at ICAP at Columbia University. The program receives technical and financial support from PEPFAR (the US President’s Emergency Plan for AIDS Relief) through the US Centers for Disease Control and Prevention. The views expressed in this commentary are her own. View moreopinion articleson CNN.
  
  Bernard Haufiku has every reason to beam. The Namibian Minister of Health is in Amsterdam to announce that despite his country’s vast deserts, ethnic and linguistic diversity, variable roads and modest rural health facilities, Namibia is thelatest nationto bring a devastating AIDS epidemic under control.
  
  This week, roughly 15,000 scientists, activists, policy-makers and even afew celebritieshave converged on Amsterdam for the 22nd International AIDS Conference. This year’s scientific findings include remarkably good news:nearly 22 millionpeople are now on lifesaving treatment and new HIV infections are decreasing in several of the hardest hit countries, including Namibia.
  
  But it’s not time to celebrate yet. In a reportreleased this week, UNAIDS acknowledges the progress achieved but also notes that the response is lagging in some regions. As a result, the worldwide decrease in new HIV infections is not on track to meet 2020 targets.
  
  At the same time, the United States, the largest donor to the AIDS response, is in the midst of a political swing towards isolationism. For the past two years, the Trump administration has proposed unprecedented$1 billion cutsto the US AIDS response program, PEPFAR. Congress rejected these cuts and maintained flat funding for PEPFAR, but the threat persists. If the US steps back from its leadership role in this effort, it will put the world at risk for a dangerous resurgence just when the end of the epidemic is within reach.
  
  As Haufiku said, Namibia’s rate of new HIV infections hasdeclined by 50%compared to the 2012 UNAIDS estimate. The decrease in new infections is largely driven by the dramatic scale-up of HIV treatment funded by PEPFAR and other partners, including The Global Fund for AIDS, Tuberculosis and Malaria. By suppressing the amount of virus circulating in the body of a person living with HIV, this treatment prevents not only sickness and death, but also HIV transmission.
  
  UNAIDS projects that if73% of peopleliving with HIV are on effective treatment that limits the amount of virus in their body by 2020, and that level is maintained for ten years, we would see the end of the AIDS epidemic as a global health threat by 2030. Namibia has exceeded this target with77% of adultsliving with HIV virally suppressed.
  
  Biden & Frist: Now is not the time to cut off AIDS funding
  
  South Africa, the country with thelargest numberof people living with HIV, andSwaziland, the country with thehighest HIV prevalence, have both announced a 44% decrease in new HIV infections over the last 5 years. Swaziland has also achieved the73% goalfor viral suppression.
  
  These figures make the global AIDS response one of the most effective humanitarian interventions of all time. For 15 years, the US has played an admirable leadership role through PEPFAR. Of the 22 million people on treatment worldwide, PEPFAR supportsover 14 million. That’s 14 million people who would be dead or dying otherwise.
  
  PEPFAR’s yearly budget of approximately$6 billionrepresents a generous commitment from the American people that has set the bar for other countries. However, when compared to other line items in the US budget, such as$686 billionin military spending, PEPFAR also represents excellent value for money in terms of humanitarian impact and soft power.
  
  While an end to the epidemic is coming into view, the battle is not yet won, and near victory could turn to renewed tragedy.
  
  Want to stop AIDS? Fight inequality
  
  Despite improvement in the overall population, HIV is still spreading rapidly among young people, especiallyyoung women. At the same time, populations key to the epidemic – such asgay and bisexual men and people who inject drugs– also face a high risk of infection and uneven access to services.
  
  In order to expand treatment tonearly 37 million peopleliving with HIV and reduce new infections to zero, we need to increase financial support and intensify programming.
  
  Instead, we face a funding crisis. The UNAIDS reportnotesthat there is a 20% shortfall against  the funding they project is required to meet the 2020 targets for epidemic control, and it could get worse.
  
  Continued US commitment to the AIDS response is critical for multiple reasons. With the US contributingeight timesas much as the second leading donor, the United Kingdom, even a small percentage change in US support would be deeply felt. Additionally, if the US were to decrease funding significantly for the AIDS response, other countries may follow suit in a domino effect that could lead to a deadly resurgence of HIV around the world.
  
  Already, analysis by the Kaiser Family Foundation has found thateight of the 14 countriesthat provide international funding for AIDS decreased their support last year. These 8 countries include Australia, Denmark, Germany, Ireland, Japan, the Netherlands, Norway and Sweden. This may reflect the influence of inward-looking politics on development assistance overall. It may also reflect the resource pressures of the migration and refugee crises in Europe.
  
  The evidence is clear: it is possible to prevent and treat HIV/AIDS at large scale – even in low-resource contexts. We have the technologies and approaches to do it. We just need the political will to deliver on the promise of an AIDS-free generation.
