title: "Political GIFs of the week: The headset drop is the new mic drop"
date: "2018-06-08"
section: "Politics"
url: "https://www.cnn.com/2018/06/08/politics/political-gifs-of-the-week/index.html"
content: |
  One of these weeks, it would be nice to look back on politics and think about how little happened. That week was not this week. Let’s relive some of the top moments, shall we?
  
  Hello, Mrs. Trump! This week, the first lady appeared publiclyfor the first time since May 10. She had anoperation, and President Donald Trump says she’s thriving. All smiles.
  
  Football Eagles are out. Bald eagles and other patriotic things are in. At least, as far as the White House is concerned. President Trumpuninvited the Super Bowl championsfrom their visit to 1600 Pennsylvania Avenue and replaced that event with a celebration of America, complete with a hand over his heart.
  
  The Consumer Financial Protection Bureaueffectively dissolved the Consumer Advisory Boardearlier this week. It’s those kinds of moves that make people like Sen. Elizabeth Warren – seen above talking animatedly about regulations earlier this week – unhappy.
  
  Japanese Prime MinisterAbe came to visitthe White House on Thursday. His first visit made headlines for a particularlyawkward handshake. This time Abe showed off what I think should be his signature move: the translation earpiece throw-down. Does not have the same ring as a “mic drop,” but it’s definitely less (ie, not at all) aurally jarring for people in the crowd.
  
  On their way out to the Rose Garden, Abe and Trump left the door to the Oval Office open. Was it a metaphor for keeping the door open for diplomacy? (Probably not.) Is that door often left open when people leave and the weather is nice? (Probably.) Would it throw American dads into an absolute tizzy over “trying to air condition the entire neighborhood”? (Definitely.)
