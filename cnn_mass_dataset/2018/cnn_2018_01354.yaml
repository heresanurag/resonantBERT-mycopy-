title: "Increasing water intake by 1.5 liters a day keeps UTIs away, study says"
date: "2018-10-01"
section: "Health"
url: "https://www.cnn.com/2018/10/01/health/uti-bladder-infections-water-study/index.html"
content: |
  Upping water intake by 6 cups daily fights recurring bladder infections in women
  
  Any safe-to-drink water will do, experts say
  
  Chalk up another win for Mom: She was right when she told you to drink more water to fight off pesky and painful recurring bladder infections.
  
  Women who added 1.5 liters of water a day to their regular intake for 12 months were 50% less likely to get another urinary tract infection than women who drank less than that amount, according to astudy published Monday in JAMA.
  
  The reduction in recurring infections was probably because the increase in urine volume drove more frequent urination, both of which flushed more bacteria from the bladder, the study authors said. This study is the first randomized, clinical trial to examine the common recommendation of adding water to the diet, the authors said.
  
