  Drinking 1.5 liters a day is the equivalent of about six cups of water or four 12-ounce bottles of water.
  
  The study was funded by Danone Research, which sells bottled water, including the brand used by women in the study. But anaccompanying editorialby Dr. Deborah Grady of the University of California, San Francisco, says any safe-to-drink water will do. She’s deputy editor for JAMA Internal Medicine.
  
  At least half of all women are at risk of what doctors call “acute uncomplicated cystitis” or “urinary tract infections” at some point in their lives. Once they get one, about a quarter of those women will get another within six months. Up to 75% of women will have another within a year.
  
  The intense burning, itching and frequent urination can make life miserable.
  
  But there’s another, bigger problem, said the study authors: Treating UTIs accounts for about 15% of all antimicrobial use,according to research, which contributes to the growing problem of antibiotic resistance. That’s why many women are encouraged to try lifestyle changes before or in addition to prescription medication.
  
  A recent study shot down another home remedy, though: The use ofcranberry juice was not shownto help prevent or cure UTIs. (sorry, Mom!)
  
