content: |
  Here’s what you might have missed Monday on CNN:
  
  – Brett Kavanaugh,President Trump’s Supreme Court nominee, will sit down with Senate Minority Leader Chuck Schumer tomorrow.
  
  – The President said he hopes ex-CIA Director John Brennan will bring forward a lawsuit against the Trump administration forrevoking his security clearancelast week.
  
  – Even by Trump’s odd standards of success, critics are callingRudy Giuliani’s “truth isn’t truth”interview a disaster. Will he get a do-over?
  
  –A helicopter crash killed one Americanand injured several other coalition service members who are fighting ISIS in the region.
  
  – A South Carolina woman was killed inan apparent alligator attack. Witnesses say she was walking her dog near a lagoon before being pulled into the water by the animal.– Tesla and Elon Musk have alwaysmade big promises. Now those promises could cause big problems.
  
  –Actress and filmmaker Asia Argentohas found herself on the other side of the #MeToo conversation.
  
  – The son this mother lost during the Korean War is now an old man. They wereone of 89 lucky familieschosen from 57,000 seeking reunions.
  
  – Pope acknowledges “with shame and repentance” theCatholic Church’s failure to acton sex abuse after a damning grand jury report.
