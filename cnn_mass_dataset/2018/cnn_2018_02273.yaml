title: "Plant-based protein company Beyond Meat files for IPO"
date: "2018-11-17"
section: "Business"
url: "https://www.cnn.com/2018/11/17/business/beyond-meat-ipo/index.html"
content: |
  Plant-based protein company Beyond Meat has filed for a $100 million initial public offering, as vegan and meat alternative food products gain in popularity.
  
  The California-based startup is the maker of vegan sausage, vegan chicken and its flagship product, the Beyond Burger, a 100% plant-based burger sold in grocery stores such as  Whole Foods and Kroger and served in restaurants including TGI Fridays. The companyclaims the burgeris “the closest thing to meat” that it has ever created.
  
  'Bleeding' plant-based burger hits growing UK vegan market
  
  In documents filed Friday, the company said it had applied to list its common stock on the Nasdaq under the symbol “BYND,” with an initial offering size of $100 million.
  
  The company says net revenue for the nine months ending September 29, 2018, was $56.4 million, a 167% increase from the same period a year earlier. Net losses through September 29, 2018, were $22.4 million.
  
  “Going forward, we intend to continue to invest in innovation, supply chain capabilities, manufacturing and marketing initiatives,” the company saidin the filing.
  
  The global market for meat substitutes is forecast to grow steadily, from an estimated $4.6 billion in 2018 to $6.4 billion by 2023,according to researchfirm MarketsandMarkets.
  
  The expansion owes to rising health concerns, including obesity and diabetes, due to consumption of meat products, the research found.
  
  Meat substitute companies, like Beyond Meat, Morningstar Farms andImpossible Foods, are benefiting from growing concern over animal welfare and the environmental impact of factory farming.
  
  Beyond Meat was founded in 2009 and is backed by Bill Gates and Twitter co-founder Biz Stone. J.P Morgan, Goldman Sachs and Credit Suisse will lead the IPO.
