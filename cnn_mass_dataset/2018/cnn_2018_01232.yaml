  # Eiffel Tower closed as heavy snowfall blankets Paris
  
  By [Saskya Vandoorne](https://www.cnn.com/profiles/saskya-vandoorne-profile), [Eliza Mackintosh](https://www.cnn.com/profiles/eliza-mackintosh)
  
  Updated Feb 7, 2018
  
  Updated Feb 7, 2018, 3:50 PM ET
  
  PUBLISHED Feb 7, 2018, 6:24 AM ET
  
