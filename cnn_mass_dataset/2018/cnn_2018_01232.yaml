  Exceptionally heavy snowfall brought public transport in Paris and surrounding regions to a near halt on February 7, spelling misery for commuters after hundreds were forced to abandon their cars to sleep in emergency shelters overnight.  / AFP PHOTO / Thomas SAMSON        (Photo credit should read THOMAS SAMSON/AFP/Getty Images)](https://media.cnn.com/api/v1/images/stellar/prod/180207103840-02-france-cold-weather-0206.jpg?q=x_3,y_145,h_1684,w_2993,c_crop/w_860)
  
  Heavy snow blankets Paris
  
  1:01
  
  Paris—
  
  The Eiffel Tower was shuttered to tourists as heavy snowfall snarled traffic in Paris, bringing the City of Light to a standstill on Wednesday.
  
  Photographs shared by the Eiffel Tower’s official Twitter account showed the French capital blanketed in white.
  
  ![Image 3: People pass by the Arc de Triomphe du Carrousel as they walk through the snow covered Tuileries garden.](https://media.cnn.com/api/v1/images/stellar/prod/180207104212-05-france-cold-weather-0206.jpg?q=w_3000,h_2002,x_0,y_0,c_fill/w_1093)
  
  People pass by the Arc de Triomphe du Carrousel as they walk through the snow covered Tuileries garden.
  
  GERARD JULIEN/AFP/Getty Images
  
  ![Image 4: Snow snarls traffic across the French capital.](https://media.cnn.com/api/v1/images/stellar/prod/180207104447-08-france-cold-weather-0206.jpg?q=w_3000,h_1997,x_0,y_0,c_fill/w_1093)
  
  Snow snarls traffic across the French capital.
  
  GUILLAUME SOUVANT/AFP/Getty Images
  
  The exceptional snowfall caused chaos on roadways across Paris, with a record 700km (430 miles) of traffic jams recorded on Tuesday evening, [CNN affiliate BFM TV reported](http://www.bfmtv.com/mediaplayer/video/avec-la-neige-le-parc-de-bercy-a-paris-a-des-allures-de-station-de-sports-d-hiver-1032911.html). Public transportation also was halted.
  
  Ad Feedback
  
  Authorities opened emergency shelters to accommodate stranded commuters, a spokesman for the Ministry of Interior, Frederic de Lanouvelle, said.
  
  “The situation is complicated, it’s even quite exceptional,” de Lanouvelle said on national radio France Info.
  
  “We’re asking drivers not to use their cars this morning.”
  
  ![Image 5: A volunteer worker talks with a homeless woman in Issy les Moulineaux, west of Paris, on Tuesday.](https://media.cnn.com/api/v1/images/stellar/prod/180207103728-01-france-cold-weather-0206.jpg?q=w_3000,h_2000,x_0,y_0,c_fill/w_1093)
  
  A volunteer worker talks with a homeless woman in Issy les Moulineaux, west of Paris, on Tuesday.
  
  Thibault Camus/AP
  
  ![Image 6: People stranded by the snow rest in an emergency shelter installed at the Robert Wagner gymnasium in Velizy-Villacoublay, southwestern suburbs of Paris.](https://media.cnn.com/api/v1/images/stellar/prod/180207104021-03-france-cold-weather-0206.jpg?q=w_3000,h_2003,x_0,y_0,c_fill/w_1093)
  
  People stranded by the snow rest in an emergency shelter installed at the Robert Wagner gymnasium in Velizy-Villacoublay, southwestern suburbs of Paris.
  
  SAMUEL BOIVIN/AFP/Getty Images
  
  De Lanouvelle said 46 emergency shelters were opened to homeless people and others caught out in the winter weather on Tuesday night, housing about 1,000 people. Hundreds were sheltered at train stations and airports.
  
  Some 2,500 emergency services staff were deployed to restore order as quickly as possible, De Lanouvelle added.
  
  But some Parisians braved the snow, with at least a few skiers and snowboarders taking to one of the slopes in the city – Montmartre hill near Paris’ iconic church, the Sacre Coeur. Others shared photos of the wintry scenes on social media with the hashtag #ParisSousLaNeige, Paris under snow.
  
  ![Image 7: A man skiing on the snow-covered Montmartre hill.](https://media.cnn.com/api/v1/images/stellar/prod/180207105454-10-france-cold-weather-0206.jpg?q=w_3000,h_2000,x_0,y_0,c_fill/w_1093)
  
  A man skiing on the snow-covered Montmartre hill.
  
  ALAIN JOCARD/AFP/Getty Images
  
  ![Image 8: Children play in the snow in the Palais Royal garden on Wednesday.](https://media.cnn.com/api/v1/images/stellar/prod/180207104255-06-france-cold-weather-0206.jpg?q=w_3000,h_2002,x_0,y_0,c_fill/w_1093)
  
  Children play in the snow in the Palais Royal garden on Wednesday.
  
  GERARD JULIEN/AFP/Getty Images
  
  According to the Meteo France weather service, up to 5.9 inches of snow has fallen in the Paris area so far – the biggest snowfall since 1987.
  
  The greater Paris region is among [27 departments that have been placed under alert](https://twitter.com/VigiMeteoFrance/status/960938514979450881) across the country, according to Meteo France.
  
