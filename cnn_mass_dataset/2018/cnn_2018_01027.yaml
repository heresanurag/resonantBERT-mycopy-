title: "Newsrooms held a moment of silence today for victims of the Capital Gazette shooting"
date: "2018-07-05"
section: "US"
url: "https://www.cnn.com/2018/07/05/us/newsroom-moment-of-silence-trnd/index.html"
content: |
  One week after thetragic shooting at the Capital Gazette in Annapolis, newsrooms across the country held a moment of silence in memory of theirfive fellow journalists whose lives were lost.
  
  The American Society of News Editors (ASNE) and the Associated Press Media Editors (APME) asked newsrooms around the world to join them at 2:33 p.m. ET Thursday – the exact time the gunman began his rampage a week ago – for a moment of contemplation, prayer, reflection or meditation.
  
  “The tragedy last Thursday at the Capital Gazette in Annapolis, Maryland, tears at our hearts, tugs at our compassion and calls forth our fears for the safety of all those on the front lines of truth, accountability and journalistic pursuit,” said a joint release by the two groups.
  
  Some of the surviving Capital Gazette staffers participated in the moment of silence at their temporary new office in Annapolis. Journalists at the paper’s parent company, Tronc, also gathered in their Chicago newsroom to reflect.
  
  At 2:33 p.m. today, please join us in a moment of silence to honor the five members of our Capital Gazette family that we lost in last week's deadly attack.https://t.co/9XVTNt9YP2
  
  Big newsrooms like NPR and smaller newsrooms like NowThis joined in the moment of silence as well.
  
  Judy Woodruff, anchor of the PBS “NewsHour,” said on Twitter that her team participated “to honor memory of lives lost.”
  
  moment of silence here at@NewsHourto honor memory of lives lost at#CapitalGazetteshooting last week at this time
  
  Local officials also marked the one-week anniversary with a ceremony outside the Anne Arundel County Government Building in Annapolis.
  
  Last Thursday’s attack was thesingle deadliest day for journalism in Americasince 9/11.
  
  A man walked into the Capital Gazette’s newsroom and killed Rob Hiaasen, 59, assistant editor; Gerald Fischman, 61, editorial page editor; John McNamara, 56, a staff writer; Rebecca Smith, 34, a sales assistant; and Wendi Winters, 65, who worked in special publications.
  
  We stand with the@capgaznewsin a "Moment of Silence" to remember the#journalistslost in#Annapolis.#WKOWdarkened our newsroom to remind ourselves that journalism is needed now more than ever.#StayStrong#SupportLocalNews#Madison#Wisconsinpic.twitter.com/3v45BR4KNv
  
  Jarrod Ramos, 38, was arrested and charged with five counts of first-degree murder, according to court records. Ramos hadharbored a grudge against the paperfor years after it ran a column about his harassment of a former high school classmate.
  
  The alleged killerwrote a chilling letter, saying he went to the newspaper with the “objective of killing every person present.” The letter was dated the day of the shooting.
  
  The ASNE and the APME asked that people consider donating to funds to help the families of those lost and the newsroom with its recovery.
  
  “As we unite in solidarity behind the grit of the Capital Gazette team and its media family, let us remember the very real needs of those in Annapolis,” the release said.
  
  The@DispatchAlertsstaff joined hundreds of others in newsrooms across the country in a moment of silence to honor the@capgaznewsstaff killed last week.pic.twitter.com/fjU4AdcgFx
  
  Several dozen current and former staffers from the Capital Gazette, some with tears in their eyes,marched Wednesday in Annapolis’s annual July 4 paradeto show solidarity with the community.
