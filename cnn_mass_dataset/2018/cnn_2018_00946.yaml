title: "Horse dentistry 3,000 years ago ‘linked to warfare and globalization’"
date: "2018-07-04"
section: "Sport"
url: "https://www.cnn.com/2018/07/04/sport/horse-dentist-mongolia-spt/index.html"
content: |
  Nomadic herders from the Deer Stone-Khirigsuur culture experimented with horse dentistry between 1300-700 B.C.
  
  A study by theMax Planck Institute for the Science of Human Historyfound herders would saw or remove teeth that were causing horses pain
  
  More than 3,000 years ago on the open steppes of Mongolia and eastern Eurasia, nomadic herders were experimenting with equine dentistry.
  
  However, the practice did a lot more than just alleviate horses from pain – in fact, researchers argue it was here where horses were transformed into a tool that drove globalization.
  
  A new studycarried out by theMax Planck Institute for the Science of Human Historyhas found that the world’s oldest known evidence of horse veterinary dental care was carried out by the Deer Stone-Khirigsuur Complex, a culture that existed between 1300-700 B.C.
  
  William Taylor from the instituteled a team of scholars who carefully analyzed horse skulls from ancient burial areas on the Mongolian steppe. The impressive horse burials – from which the nomadic people take their name – consist of megaliths with intricate carvings, as well as large mounds made out of stone.
  
