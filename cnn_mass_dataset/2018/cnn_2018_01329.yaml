title: "Quickly catch up on the day’s news"
date: "2018-10-25"
section: "App News Section"
url: "https://www.cnn.com/2018/10/25/app-news-section/quickly-catch-up-oct-25/index.html"
content: |
  Here’s what you might have missed Thursday on CNN:
  
  – Three more suspicious packages have been found today,bringing the total to 10.TheFBI warns there may be more. Two packages addressed to former Vice President Joe Biden were discovered at Delaware postal facilities and a package addressed to actor-director Robert De Niro was reported at the Manhattan building where his production company is based.
  
  – Saudi Arabia’s attorney general said thekilling of journalist Jamal Khashoggiin the Saudi’s Istanbul consulate was premeditated.
  
  – The Wall Street roller coaster started to climb again. The Dowrose as much as 512 pointstoday.
  
  – Two girls at a middle school in central Florida were waiting in a bathroom, planning to overpower at least 15 smaller students and kill them with knives, authorities said. The 11- and 12-year-old girls said they were Satan worshipers andwere going to drink the blood and eat the flesh of the studentsthey killed.
  
  – Taking pills for high blood pressure or heart failure? You’re going to want to know that the FDA again added to itslist of products that are included in the recall of drugscontaining valsartan.
  
  – Spoiler alert: A beloved character on the sitcom “Modern Family”was killed off in Wednesday’sHalloween episode.
  
  – Hawaii’s East Island is no longer on the map after powerful storm surges fromHurricane Walaka submerged the islandearlier this month.
  
  – Almost 25 years after “Mrs. Doubtfire” debuted, the Hillard kids are all grown up.See the can’t-miss family photo hereand feel all the feels.
