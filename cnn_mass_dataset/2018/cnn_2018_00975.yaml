title: "Former GOP rep poses with wooden Native American statue to mock Elizabeth Warren"
date: "2018-10-18"
section: "Politics"
url: "https://www.cnn.com/2018/10/18/politics/jason-chaffetz-warren/index.html"
content: |
  Former Utah Republican Rep. Jason Chaffetz posted a photo of himself Thursday with a wooden Native American statue in an attempt to mock Massachusetts Democratic Sen. Elizabeth Warren.
  
  “At Disneyland today with Senator Elizabeth Warren,” Chaffetz, now a Fox News contributor, wrote in a post on Twitter and Instagram.
  
  At Disneyland today with Senator Elizabeth Warrenpic.twitter.com/37rvaSOVGl
  
  With Thursday’s posts, Chaffetz echoed President Donald Trump in mocking Warren amid renewed attention over her claims of Native American heritage.
  
  Warrenreleased the resultsof a DNA analysis on Monday showing she has distant Native American ancestry. Trump dismissed the results and brought back his“Pocahontas”nickname to ridicule her. Cherokee Nation Secretary of State Chuck Hoskin Jr. said in a statement, “Using a DNA test to lay claim to any connection to the Cherokee Nation or any tribal nation, even vaguely, is inappropriate and wrong.”
  
  South Carolina Republican Sen. Lindsey Grahamjoined Trumpin ribbing Warren over the test, saying on Fox News that he would take a DNA test himself. He predicted he would “beat” Warren at being Native American and quipped that a hypothetical result showing him having Iranian heritage would be “terrible” – a remark he later called a joke directed at Ayatollah Ali Khamenei.
  
  A raft of tech industry leaders with Iranian heritagecalled on Grahamto apologize.
