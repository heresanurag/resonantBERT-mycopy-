title: "Ivanka Trump: ‘Inappropriate’ to ask her about father’s accusers"
date: "2018-02-26"
section: "Politics"
url: "https://www.cnn.com/2018/02/26/politics/ivanka-donald-trump-sexual-misconduct-accusers/index.html"
content: |
  Ivanka Trump does not believe the women who have accused her father of sexual misconduct, adding that it’s “pretty inappropriate” to ask her about the subject.
  
  Asked byNBC Newsif she believes the accusers, Trump replied, “I think it’s a pretty inappropriate question to ask a daughter, if she believes the accusers of her father, when he’s affirmatively stated that there’s no truth to it. I don’t think that’s a question you would ask many other daughters.”
  
  “I believe my father. I know my father. So, I think I have that right, as a daughter, to believe my father,” the senior White House adviser continued in the interview, which aired Monday morningafter she represented the United States delegation at the Winter Olympics in South Korea during the closing ceremonies.
  
  The comments represent Ivanka Trump’s strongest public denial of the accusers to date. At least 15 womenhave come forwardwith a wide range of accusations against President Donald Trump, ranging from sexual harassment and sexual assault to lewd behavior around women. Of the women, 13 say Trump attacked them directly and two others say they witnessed behavior that made them uncomfortable. All the alleged incidents took place prior to his assuming the presidency.
  
  The President has denied all the allegations, and at one point during the 2016 campaign,threatened to sue his accusers, though he never did.
  
  The first daughterpreviously describedher father’s remarks in the infamous “Access Hollywood” tape, in which he bragged about being able to grope women as “offensive” and “crude.”
  
  As a White House senior adviser, Ivanka Trump has addressed a range of issues, including policies specifically geared toward women. Shepushed fora child tax credit in Congress,rolled outa women’s entrepreneurship initiative, and has used her official platform to discuss sexual harassment in the workplace.
  
  At the World Assembly for Women in Japan last year, she said that “all to often, our workplace culture fails to treat women with appropriate respect. This takes many forms, including harassment, which can never be tolerated.”
  
  And following Oprah Winfrey’s speech at the Golden Globes, the first daughtertweeted: “Just saw @Oprah’s empowering & inspiring speech at last night’s #GoldenGlobes. Let’s all come together, women & men, & say #TIMESUP!”
  
  The first daughter has previously spoken out about other sexual harassment allegations against politicians during her time in the West Wing, including former Alabama Senate candidate Roy Moore, who allegedly pursued sexual relationships with teenagers when he was in his early 30s.
  
  Prior to her father’s decision to endorse Moore,she said“there’s a special place in hell for people who prey on children,” referring to the Moore allegations.
  
  In her 2009 book, “The Trump Card,” Ivanka Trumprevealed that she experienced sexual harassment“many times” on her father’s work sites. In those cases, she said, “the workers never realized I was the boss’s daughter when they started hooting and hollering.”
