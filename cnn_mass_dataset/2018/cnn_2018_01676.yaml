  As soon as the Holden video went viral, internet trolls, of course,began to criticizewhat she was wearing – the typical blame-the-woman-for-the-violence-she-suffers type of explanation that patriarchal society has always leaned on. Had Holden been a waitress with me in 2002 in Kentucky, I can imagine her getting fired because restaurant management likely would have sided with a valued customer. Today, however, I am proud to see that times have changed and that men are being held accountable for their actions.
  
  Holden has certainly received criticism for her behavior from some dark corners of the internet, but women on Twitter saw her body slam as a marker of the empowerment of the #MeToo era. In an interview with Glamour magazine, Holdensaid, “All I want from my experiences is for women to know that it’s okay to stand up for yourself.”
  
  Had a man stepped in and restrained Holden’s groper, there is no doubt he would be hailed as a hero. The fact that the 115-pound Holden body-slammed her groper and kept him restrained until police arrived has shocked some. But the truth is that she represents the power of the #MeToo era, one in which a woman who is sexually harassed knows instinctively and instantaneously that action – whether it be confronting the groper, reporting him to a boss or trying out a body slam à la Holden – is her right, because her body is not up for grabs anymore.
