title: "87 more cases of salmonella linked to recalled beef"
date: "2018-12-12"
section: "Health"
url: "https://www.cnn.com/2018/12/12/health/salmonella-beef-recall-update/index.html"
content: |
  Eighty-seven more people have been sickened with salmonella linked to recalled beef products, theUS Centers for Disease Control and Preventionsaid Wednesday.
  
  A total of 333 have become ill and 91 have been hospitalized since illnesses began in August. No deaths have been reported.Illnesses have been reported in 28 states; Michigan, Mississippi and West Virginia are the latest. The CDC said the outbreak investigation is ongoing.
  
  5.1 million pounds of beef added to recall due to salmonella
  
  JBS Tolleson Inc. has recalled more than 12 million pounds of beef products that might have been contaminated with salmonella. The products were produced and packaged between July 26 and September 7, distributed nationwide and sold in more than 100 stores. A list of the states and distributors that received the contaminated meat, including Walmart and Kroger, isavailable from the US Department of Agriculture.
  
  The CDC recommends that consumers check their freezers for beef they may have stored and look for establishment number EST. 267. Any beef associated with the recall should be returned or discarded.
  
  Sign up here to getThe Results Are In with Dr. Sanjay Guptaevery Tuesday from the CNN Health team.
  
  The USDA said people should “only consume ground beef that has been cooked to a temperature of 160°F. Other cuts of beef should be cooked to a temperature of 145°F and allowed to rest for at least 3 minutes.”
  
  Salmonella symptomsusually appear within 12 to 72 hours of consuming food that has been contaminated. Symptoms include diarrhea, abdominal cramps and fever and can last four to seven days. Hospitalization can be necessary for persistent diarrhea. Children under 5, adults over 65 and those with weakened immune systems are more likely to have severe cases.
  
  Consumers with questions about the recall can call the JBS USA consumer hotline at 800-727-2333.
