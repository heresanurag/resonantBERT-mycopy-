  “This is something that needs to be done,” Astley said. “This (new study) is not the way to do it.”
  
  Astley’s [past research](http://depts.washington.edu/fasdpn/pdfs/foster.pdf) screened foster children for fetal alcohol syndrome, finding that they had a prevalence 10 to 15 times greater than the general population. Since the state was their guardian, she said, the research avoided the problems of stigma and lower participation that school-based studies might face. Similar research is being replicated in other countries such as Australia and Canada, she added.
  
  Both Astley and Chambers say that research on these disorders can help wage new efforts to educate future mothers, prevent new cases, improve current treatments and measure how well such initiatives work.
  
  “Our hope that what this will do is raise this to the level on the national agenda where we think it should be,” Chambers said.
