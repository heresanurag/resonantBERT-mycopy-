title: "Ethiopia swears in first female Supreme Court chief"
date: "2018-11-01"
section: "Africa"
url: "https://www.cnn.com/2018/11/01/africa/ethiopia-first-woman-supreme-court-head-intl/index.html"
content: |
  Human rights lawyer Meaza Ashenafi was sworn in Thursday as the head of Ethiopia’s Supreme Court by the country’s parliament in a wave of appointments for women in top government positions.
  
  Prime Minister Abiy Ahmed nominatedMeaza, the country’s chief of staff announced.The Ethiopian leader has pushed for more female representation in his Cabinet.
  
  “She brings a track record of competence and relevant experience to the role,” Abiy’s top aide, Fitsum Arega, said on Twitter, adding that her position signaled the country’s move toward “gender parity” in key leadership positions.
  
  Meaza Ashenafi is one of#Ethiopia’s  most seasoned lawyers and a prominent women rights activist. She was the founder of Ethiopian Women Lawyers Association and has served as High Court Judge. She brings a track record of competence and relevant experience to the role.pic.twitter.com/E9ZNtpp6GB
  
  Meazahas been an adviseron gender and women’s rights at the UN Economic Commission for Africa based in Ethiopia’s capital of Addis Ababa.
  
  She founded the Ethiopian Women Lawyers Association and served as a High Court judge.
  
  Why Ethiopians believe their new prime minister is a prophet
  
  Meaza’s appointment comes a week after Ethiopia elected Sahle-Work Zewde as itsfirst woman President,a move lauded as setting new standards for female leadership in the African nation.
  
  Womenmake up halfof the country’s ministerial positions following a Cabinet reshuffle by Abiy, who leads Ethiopia’s government and policy.
  
  Abiy, Africa’s youngest head of government at age 42,has embarked on liberal reforms since taking office in April.
  
  He honored an agreement that ended a 20-year border war with neighboring Eritrea and freed journalists, bloggers and political prisoners jailed by previous administrations.
