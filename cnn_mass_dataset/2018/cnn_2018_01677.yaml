title: "Most burger chains fail on annual antibiotics report card"
date: "2018-10-17"
section: "Health"
url: "https://www.cnn.com/2018/10/17/health/fast-food-burger-antibiotic-grades-study/index.html"
content: |
  New report looks at antibiotic use in 25 US burger chain restaurants
  
  Shake Shack and BurgerFi were the only two places to receive A grades
  
  Twenty-five of the top US burger chains were graded on their antibiotic policies in acollaborative reportreleased Wednesday. Only two chains received As,Shake ShackandBurgerFi; the other 23 got a D minus or F.
  
  “It’s really exciting to hone in onbeef because we know that Americans love burgers. It’s one of the most favorite foods in our country, and taking a closer look at what is and isn’t happening when it comes to responsible antibiotic use in that sector seemed particularly important,” saidLena Brook, lead researcher of the report and interim director of the food and agriculture program at the nonprofitNatural Resources Defense Council, one of the organizations involved in the research.
  
  Brook said that after seeing positive changes in poultry used by fast food restaurants from the group’s pastreports, it made the decision to focus on beef and burger chains for its fourth annual report.
  
  Fast food restaurants were ranked by total US sales to get the top 25. The report grades the restaurants in three areas, according to Brook. The first is whether these companies are making pledges or policies to end the routine use of antibiotics, the second is how the companies are implementing the policies, and the third is verifying whether the claims being made by the companies are true.
  
  The report identified Shake Shack and BurgerFi as the only two chains to serve antibiotic-free beef.
  
  “What’s interesting about that is they also happen to be what I think of to be these younger upstarts that are disrupting the normal kind of operational model that burger chains have use for decades now, and customers are really responding to that,” Brook said. “They are being rewarded for the good food that they are serving and the good practices that stand behind that food, and serving responsibly raised beef is a part of that new business model.”
  
  Smaller burger companies such asElevation Burger, which has 50 locations in the United States and abroad and serves beef raised without antibiotics, according to the report authors, received honorable mentions. Brook said this suggests that there is an emerging type of chain that is adhering to good antibiotic use policies.
  
  Wendy’s was given a D minus for a policy that the authors described as “while far from comprehensive … a positive step forward.” According to thecompany’s website, Wendy’s will get about 15% of its beef from producers that have committed to a 20% reduction in antibiotics used in their livestock and whose cattle’s antibiotic use can be tracked and reduced.
  
  “As we go forward, we have a goal of eliminating routine antibiotic use in our beef and pork supply, while protecting the need for targeted, therapeutic use of an antibiotic in the limited cases where a sick animal needs to be treated individually, or in the unlikely case that animals have been exposed to an illness and treatment with an antibiotic is necessary to prevent a disease outbreak,” Liliana Esposito, chief communications officer for The Wendy’s Co., wrote in ablog post.
  
  The other 22 chains, including places such as McDonalds, received F grades.
  
  Restaurant report card: What's in your fast food meat?
  
  “Preserving the effectiveness of antibiotics for future generations is highly important to McDonald’s,” company spokeswoman Lauren Altmin wrote in an email. “In 2016, McDonald’s fully implemented its pledge to no longer serve chicken treated with antibiotics important to human medicine in its US restaurants, which led to the 2018 implementation of an antibiotic use policy for broiler chicken in markets around the globe. McDonald’s is currently finalizing aglobal antibiotics policyfor beef, to begin roll out before the end of 2018.”
  
  Only seven of the companies that were sent surveys responded to the researchers. But not returning a survey did not lead to an automatic failing grade, Brook said. Nonresponders were graded on publicly available information about their antibiotic policies while losing points only in the survey submittal category.
  
  The report says that the “overuse of antibiotics in livestock production significantly contributes to the spread of antibiotic resistance.” TheWorld Health Organization, theUS Food and Drug Administrationand theUS Centers for Disease Control and Preventionconsider antibiotic resistance a threat to public health.
  
  How does antibiotic resistance work?
  
  “Sometimes, antibiotics are used to treat sick animals, and that’s great, we are 100% supporting of that, and they are a really important part of the veterinary tool kit. But unfortunately, oftentimes, they are also given to animals either to promote faster growth or for the so-called disease prevention purpose,” Brook said.
  
  Charlie Arnet,CEO ofthe nonprofit Center for Food Integrity, agrees that antibiotics must be used responsibly.
  
  “We all want healthy animals and safe food that is sustainably produced. The responsible use of antibiotics helps make that a reality,” he wrote in an email.
  
  Antibiotic-resistant bacteria can be spread to humans in a number of ways, the CDC says. For example, resistant germs can lurk in the gut of an animal when it is killed, contaminating meat and other products, or animal waste containing resistant germs can be used as fertilizer or for irrigation on produce.
  
  The CDC hasreportedthat every year in the United States, at least 23,000 people die and 2 million get sick with antibiotic-resistant infections. Two of the bacteria that are commonly spread through food, salmonella and campylobacter, make more the 400,000 Americans sick each year.
  
  “In simplest terms, what it means is that once a bacteria are resistant to antibiotics, that means the ability of doctors to treat the infection becomes extremely limited, and so that’s really scary, because it means that infections that were once really easily and commonly treated could actually be fatal, or common medical procedures would no longer be possible because of a risk of infection without antibiotics,” said Brook.
  
  5 things you need to know about antimicrobial resistance
  
  WHO credits the misuse of antibiotics, both in humans and in animals, as “accelerating the process” of antibiotic resistance. In 2015, it releasedrecommendationsaround animal antibiotic use that included a reduction in medically important antimicrobials in food-producing animals, a restriction in these antimicrobials for growth promotion and a restriction of using them for non-diagnosed illnesses.
  
  WHO classifiesmedically important antimicrobialsas those that are critically important for human medicine.
  
  The FDA released afive-year planin September that supports steps to eliminate the use of these medically important antimicrobials in animal production. They include using antimicrobials only under the instruction of veterinarians and supporting the judicious use of the drugs in food animals, meaning they should only be used “when necessary for the treatment, control or prevention of specific diseases.”
  
  “In simple terms, we believe medically important antimicrobial drugs should only be used when necessary to treat, control or prevent diseases. in addition, when such use is necessary, these antimicrobials should be used in an optimal manner. they should only be used under the oversight of a licensed veterinarian,” FDA Commissioner Dr. Scott Gottlieb said in astatementin July.
  
