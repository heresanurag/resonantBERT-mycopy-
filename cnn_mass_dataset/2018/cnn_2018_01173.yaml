  “Previous research has shown that crowdfunding is being used for unproven stem cell interventions and alternative cancer interventions. This paper builds on that research by confirming the existence these areas of concern and also demonstrating that this problematic fundraising is going on for HBOT for brain injury and antibiotic treatment for Lyme disease,” said Jeremy Snyder, aprofessor of health sciences at Simon Fraser Universityin Canada, who was not involved in the paper but was one of the authors of the separate paper on crowdfunding for unproven stem cell-based interventions.
  
  “The public should know that their money may be wasted on ineffective treatments or even used for dangerous interventions that could harm the health of those they are seeking to help. If their aim is to help others, there are a variety of well run, science-based charities that very effectively help those in medical need,” he said. “Crowdfunding platforms should also be wary of letting themselves be used for these purposes.”
