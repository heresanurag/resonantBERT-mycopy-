title: "ATF: There have been 5 attacks on Jehovah’s Witnesses in Washington state this year"
date: "2018-12-09"
section: "US"
url: "https://www.cnn.com/2018/12/09/us/jehovahs-witnesses-attacks-washington-state/index.html"
content: |
  A fire last week at a Jehovah’s Witnesses’ house of worship in Washington state was arson – the fifth attack targeting the religious group this year, federal officials said Sunday.
  
  The blaze early Friday destroyed a Kingdom Hall of Jehovah’s Witnesses in Lacey, a suburb of Olympia, according to Jason Chudy, a spokesperson for the Seattle Field Division of the Bureau of Alcohol, Tobacco, Firearms and Explosives. No one was injured in Friday’s blaze and no arrests have been made.
  
  Three other Kingdom Halls in Thurston County were torched, and a fourth Kingdom Hall was hit by gunfire, according to the ATF.
  
  There were 4 earlier attacks on Kingdom Halls  in Thurston Co. in 2018.  Two arsons Mar. 19 in Tumwater and Olympia.  Damage minor.  Third incident May 15 when rifle rounds fired at KH in Yelm. Fourth on July 3, with fire destroying Olympia KH.  Call if you have info on any.
  
  The incidents occurred in close proximity to one another and are believed to be related, according to the ATF.
  
  Speaking to reporters after Friday’s blaze in Lacey, Thurston County Sheriff John Snaza said that there have been “many attacks” on Kingdom Halls in the county.
  
  Snaza said it’s sickening to think of someone attacking houses of worship out of “some sort of animosity towardsany religion.”
  
  The sheriff said local Jehovah’s Witnesses are “terrified.”
  
  The freedom to worship is a right that should be protected for every person in our country. Our thoughts are with the members of our community affected by this abhorrent act.https://t.co/ubgUTkk21f
  
  Following Friday’s blaze, Gov. Jay Inslee condemned the attack on social media. “The freedom to worship is a right that should be protected for every person in our country,” he wrote.
  
  ATF has determined that the Kingdom Hall of the Jehovah's Witnesses fire at 6th Ave SE in Lacey is an arson.  ATF and@ThurstonSheriffare investigating.  Up to $36,000 in total rewards available.  Have info? Call 888-ATF-TIPS or 800-222-TIPS.  You can remain anonymous.pic.twitter.com/M5Kte03xhq
  
  On March 19, arson attacks caused minor damage to a Kingdom Hall in Tumwater, south of Olympia, and to the Cain Road Kingdom Hall in Olympia, the ATF said. No one was injured in those blazes. On May 15, a Kingdom Hall in Yelm was struck by about 35 rifle rounds, causing more than $10,000 in damage, the ATF said.
  
  Another blaze torched the Olympia Kingdom Hall on July 3, the ATF said.
  
  Dan Woollett, an elder who helped build the Lacey house of worship decades ago, toldCNN affiliate KCPQhe was devastated.
  
  “It’s just a building,” he told the station. “Everybody’s safe, and that’s the important thing.”
  
  In a statement Monday, Jehovah’s Witnesses officials said more than 33,000 Jehovah’s Witnesses worship at 163 Kingdom Halls in Washington state.
  
  “Jehovah’s Witnesses work hard to be a force for good in their community, so violent acts like this are difficult to comprehend,” the statement said.
