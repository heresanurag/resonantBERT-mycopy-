title: "Quickly catch up on the day’s news"
date: "2018-02-21"
section: "App News Section"
url: "https://www.cnn.com/2018/02/21/app-news-section/quickly-catch-up-february-21-trnd/index.html"
content: |
  Here’s what you might have missed on CNN today:
  
  – TONIGHT: CNN will host a town hall with students, parents, community members and Florida politicians. Tune in to“Stand Up: The Students of Stoneman Douglas Demand Action”live from 9 p.m. to 11 p.m. ET.
  
  – Students in Florida and beyondwalked out of schoolin solidarity with survivors whotraveled to the state Capitolto speak to lawmakers and rally for gun reform.
  
  – However, Florida lawmakers on Tuesday nightrejected a motionto consider a ban on assault rifles. (But they thinkporn is dangerous.)
  
  – A trending YouTube videotrying to discredit one of the survivorswas removed from the site.
  
  – A new criminal charge or charges were added to the case against ex-Trump campaign advisers Paul Manafort and Rick Gates, though thedetails remain a mystery.
  
  – America’s pastor Billy Grahamdied at age 99.
  
  – President Trump challenged his attorney general to investigate Obama and the Democrats fornot doing enough about Russian election meddling.
  
  – Melania Trump’s parents may be living in the United States under the very means their son-in-lawhas strongly criticized and sought to end.
  
  – A Kentucky Democratwon a special electionin a district that went to Trump in 2016.
  
  – Jared Kushner is pushing back on giving upaccess to his classified info, according to an article inThe New York Times.
  
  – AT&T is debuting itsspeedy 5G networkin the South.
  
  – Wendy Williams is taking a break from her talk show after announcing she was diagnosed withGraves’ disease.
  
  – Could we somedayvaccinate ourselves against cancer?
