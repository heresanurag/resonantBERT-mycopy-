  Making moves, Part 1A 71-year-old Frenchman is trying to float across the Atlantic –in a barrel. Because that’s how we all want to spend our retirement years.
  
  Making moves, Part 2Crossing Antarctica. Alone. While pulling a sled. Not our idea of a good time, buta US athlete did it, in 54 days, and made history, to boot.
  
  Eye to the skyYou won’t need to go to the movies next year to see great special effects. Just look up for 2019’sfive eclipses, super blood wolf moon and other cool events.
  
