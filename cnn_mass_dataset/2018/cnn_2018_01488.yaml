title: "5 things to know for December 28: Transformer explosion, financial markets, Saudi Arabia, Congo, weather"
date: "2018-12-28"
section: "US"
url: "https://www.cnn.com/2018/12/28/us/five-things-december-28-trnd/index.html"
content: |
  The last weekend of the year is upon us, so there’s no better time to look back at themovies and TV shows that thrilled usin 2018 – along with the onesthat let us down. Here’s what else you need to know toGet Up to Speed and Out the Door. (You can also get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  If you were in New York around 9 Thursday night, as the sky lit up a brilliant shade of blue, you were probably asking yourself, “What the heck was that?” No, it wasn’t an alien invasion or some out-of-control marketing stunt for the next “Avengers” movie. It wasa transformer that blew upat a power plant in Queens, producing an eerie, glowing turquoise color that was visible for miles. The blast shook buildings, rattled windows and sent folks running into the streets. But thankfully no one was hurt in the explosion. There were some temporary power outages, and LaGuardia Airport closed for about an hour. New York police later tweeted that an equipment malfunction was the cause of the blast.
  
  Wall Street’s wild roller-coaster ride continues. The Dow started off Thursday by plummeting a whopping 611 points, then it rallied in the final hour of trading for a swing of almost 900 points. The late comeback saw the Dowclose 260 points higher. The S&P 500 and the Nasdaq ended the day slightly higher as well. All this comes after the Dowsuffered its worst ever Christmas Evesession, followed byits biggest ever daily point gainthe day after Christmas. So what’s fueling all of this volatility? Investors are worried that the economy, while still strong, will slow down in 2019. They’re also watching to see how President Donald Trump’s trade policies will turn out and what planned interest rate hikes from the Federal Reserve will do
  
  King Salman is shaking up Saudi Arabia’s governmentas the kingdom continues to deal with the fallout from the killing of journalist Jamal Khashoggi. The foreign affairs minister was replaced, a new head of the National Guard was announced and new security intelligence officials were hired. But nothing seems to have changed for Crown Prince Mohammed bin Salman, the heir apparent to the Saudi throne who the CIA concludedordered Khashoggi’s killing. Khashoggi, a Washington Post columnist and harsh critic of the Saudi regime, was killed and reportedly dismembered by a 15-person team at the kingdom’s consulate in Istanbul in October.
  
  Protests broke out in parts of the eastern Democratic Republic of Congo after the latest delay in the presidential election there. The election, repeatedly postponed since 2016, is set for Sunday. But voters in the cities of Beni, Butembo and Yumbi won’t be able to cast ballots until March, because of concerns about terrorism and an ongoing Ebola outbreak. The announcement of the delay sent people into the streets, wherethey blocked roads and burned tires. Police responded with tear gas to break up the crowds.
  
  Blizzard warnings in the northern Plains and upper Midwest will wind down this morning as a severe weather system that also brought torrential rain to the South moves eastward. The storm, which killed two people,produced whiteout conditionsand dumped up to a foot of snow in Colorado, Kansas, Nebraska, Minnesota and the Dakotas. A 75-mile stretch of Interstate 70 in Kansas was shut down because of the blizzard conditions. The storm system also soaked parts of Louisiana and Mississippi with more than 11 inches of rain. More than 50 million people remain under flood watches from New Jersey to Louisiana.
  
