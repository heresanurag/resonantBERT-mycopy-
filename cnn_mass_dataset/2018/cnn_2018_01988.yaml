  _August 20, 2018_
  
  _What precisely are security clearances, where do they come from, and how does one factor into a recent decision by the U.S. president? Today’s down-the-middle coverage explores and explains that issue. We also examine the significance of Monday’s planned family reunions on the Korean Peninsula, and we feature a story about a Positive Athlete._
  
