  How Alzheimer's destroys the brain
  
  1:38  • Source: [CNN](https://www.cnn.com/)
  
  ![Image 3: alzheimers brain](https://media.cnn.com/api/v1/images/stellar/prod/150624151527-alzheimers-brain.jpg?q=x_2,y_0,h_1078,w_1915,c_crop/w_860)
  
  How Alzheimer's destroys the brain
  
  1:38
  
  ### Story highlights
  
  The test detected the presence of amyloid beta with 90% accuracy
  
  The researchers caution that they are still far from practical clinical application
  
  A team of scientists from Australia and Japan has developed a blood test to detect early signs of Alzheimer’s disease.
  
  The noninvasive test was developed to detect the presence of the toxic protein amyloid beta, known to be present in people affected by the disease, and did so with 90% accuracy, according to the study, published Wednesday in the journal [Nature](https://www.nature.com/articles/nature25456#abstract).
  
  The team trialed the test on 121 patients from Japan and 252 from Australia with varying levels of health, ranging from healthy to mild cognitive impairments or Alzheimer’s disease.
  
  Ad Feedback
  
  The idea behind the test is to predict the presence and levels of amyloid beta in a person’s brain. Buildup of the abnormal protein in the brain is one sign of Alzheimer’s disease, the most common form of dementia.
  
  [Related article ![Image 4: what is dementia health explainer orig_00000000.jpg](https://media.cnn.com/api/v1/images/stellar/prod/170116175631-what-is-dementia-health-explainer-orig-00000000.jpg?q=x_0,y_0,h_1080,w_1919,c_fill/h_720,w_1280/w_256) what is dementia health explainer orig_00000000.jpg Why it's so hard to treat dementia](http://www.cnn.com/2018/01/18/health/dementia-alzheimers-drug-treatment-partner/index.html)
  
  Other teams have developed similar tests to detect Alzheimer’s, with one [2017 study](https://edition.cnn.com/2017/09/04/health/alzheimers-blood-test-study/index.html) proving to have 86% sensitivity and specificity.
  
  “This test is at least as good as current brain scan techniques and far surpasses existing blood tests,” said Colin Masters, professor of dementia research at Melbourne’s Florey Institute of Neuroscience and Mental Health, who led the study.
  
  But the researchers cautioned that they were still far from practical clinical application.
  
  The onset of Alzheimer’s can come as early as 30 years before the patient experiences any symptoms, such as memory loss.
  
  There is no concrete test to determine early onset of dementia, and patients with cognitive impairment are diagnosed based on a careful evaluation using brain scans and concise mental testing, according to the [Alzheimer’s Society UK.](https://www.alzheimers.org.uk/)
  
  The study used blood samples from patients to detect levels of the toxic protein in the blood and in turn predict how much of it is in the brain.
  
  [Related article ![Image 5: A health worker draws blood from a Mexican immigrant for a free lab test inside a mobile clinic at the Mexican Consulate on October 7, 2009 in Denver, Colorado. Salud Family Health Centers sends a mobile clinic at least once a week to the consulate to care for Mexican immigrants and their families, many of whom have little other access to basic health care. (Photo by John Moore/Getty Images)](https://media.cnn.com/api/v1/images/stellar/prod/130731154418-blood-drawn-test.jpg?q=x_0,y_159,h_1906,w_3390,c_crop/h_720,w_1280/w_256) A health worker draws blood from a Mexican immigrant for a free lab test inside a mobile clinic at the Mexican Consulate on October 7, 2009 in Denver, Colorado. Salud Family Health Centers sends a mobile clinic at least once a week to the consulate to care for Mexican immigrants and their families, many of whom have little other access to basic health care. (Photo by John Moore/Getty Images) John Moore/Getty Images Blood test predicts Alzheimer's disease](http://www.cnn.com/2014/03/09/health/alzheimers-blood-test/index.html)
  
  There is no treatment available for Alzheimer’s disease, but early detection can speed access to therapy.
  
  “Progress in developing new therapeutic strategies for Alzheimer’s disease has been disappointingly slow. None of the three drugs currently on the market treat the underlying disease,” Masters said in a statement.
  
  The team highlights that more research needs to be conducted across a wider population to make the results more conclusive – and applicable clinically.
  
  “This is not a blood test for dementia that people who are worried about their memory and concentration should be asking their doctors about,” said Rob Howard, professor of old age psychiatry at University College London, who was not involved in the study. “Not everyone with amyloid in their brains will turn out to have dementia, and not everyone who has dementia will be found to have amyloid in their brains.”
  
  Alzheimer’s disease affects over [5 million people in the US](https://www.alz.org/documents_custom/2017-facts-and-figures.pdf), where the estimated cost of caring for Alzheimer patients in 2017 was [$259 billion](https://www.alz.org/facts/overview.asp).
  
  In the UK, there are more than 520,000 people affected by the disease, costing £26.3 billion, according to the [Alzheimer’s Society.](https://www.alzheimers.org.uk/info/20007/types_of_dementia/2/alzheimers_disease)
  
  ### Join the conversation
  
  *   See the latest news and share your comments with CNN Health on[Facebook](https://www.facebook.com/CNNHealth) and [Twitter](https://twitter.com/cnnhealth).
  
  Though the new study provides a breakthrough in research, it is performed only in laboratories in Japan, where it will take up to a year to conform it to a level suitable to distribute to other laboratories and apply it to clinical trials.
  
  “We need to see whether the test works in a larger population, but it has the potential both to speed up clinical trials and help people in the very early stages of Alzheimer’s to access new treatments if and when they become available,” said Doug Brown, policy and research officer at the Alzheimer’s Society UK.
  
  Carol Routledge, director of research at Alzheimer’s Research UK, said that “further work with more people will need to build on this study to understand how well this approach could predict those who will go on to develop symptoms of Alzheimer’s in the future.”
  
