  # Blood test detects proteins linked to Alzheimer’s disease
  
  By Zahid Mahmood
  
  Feb 1, 2018
  
  PUBLISHED Feb 1, 2018, 1:42 PM ET
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2018%2F02%2F01%2Fhealth%2Falzheimers-blood-test-study-intl "Share with email")Link Threads
  
