title: "Thai cave rescuers and a Monty Python member are recognized in the Queen’s New Year’s Honors List"
date: "2018-12-28"
section: "UK"
url: "https://www.cnn.com/2018/12/28/uk/uk-honors-list/index.html"
content: |
  The British divers who helpedrescue a Thai soccer teamfrom a flooded cave this year have been awarded medals by Britain’s Queen Elizabeth in her 2019 New Year’s honors list.
  
  Richard Stanton and Johnathan Volanthen, the first divers to reach the 12 boys and their coach after they became trapped in June, were awarded the George Medal, and fellow rescuers Christopher Jewell and Jason Mallinson receive Queen’s Gallantry Medals. Both medals are civilian gallantry awards for “exceptional bravery” and for those who put themselves in danger to protect others, according to theUK Cabinet Office.
  
  The four divers are among 1,148 people to be honored on the honors list, released at the end of each December to recognize outstanding achievement and service.
  
  Authors Margaret Atwood and Philip Pullman, 1960s model Twiggy, actress Thandie Newton and Hollywood director Christopher Nolan are among the hundreds to be recognized on the annual honors list.
  
  Monty Python member Michael Palin – who starred in such films as “Monty Python and the Holy Grail” and “The Life of Brian” – is receiving a knighthood, but not for his comedy work. Palin is being recognized for his services to travel, culture and geography because of his work as a travel writer and TV presenter, Britain’s Press Association reported.
  
  Pullman, who wrote “His Dark Materials,” is also receiving a knighthood for his services to literature.
  
  A CBE, or Commander of the Order of the British Empire, is being awarded to Lesley Lawson, more commonly known as the model Twiggy. She became famous in the 1960s for her short hair, mini skirts and wide-eyed look and will now have the title of dame.
  
  Also being honored with a CBE is children’s book author Julia Donaldson, who wrote “The Gruffalo” and dozens of other rhyming picture books such as “Charlie Cook’s Favourite Book.”
  
  Nolan, who directed “Dunkirk” and the “Dark Knight” trilogy, is also receiving a CBE.
  
  Newton, the Emmy-winning actress who starred in the HBO series “Westworld,” is receiving an OBE, which stands for Order of the British Empire, and “Handmaid’s Tale” author Atwood is being made a member of the Order of the Companions of Honor.
  
  The honors lists are issued twice a year – at the new year and for the Queen’s birthday. Anyone may be nominated, and honors are given based on outstanding service or achievement in a certain field.
  
  Forty-three of this year’s awards recognize those involved in the response to terrorist incidents. They include Paul Woodrow, director of operations at the London Ambulance Service; Joy Ongcachuy, a theater, or surgical, nurse at Barts Health; and Teresa Lam, who works with family liaison at Greater Manchester Police.
  
  The recipients will receive their awards from the Queen in ceremonies scheduled throughout the coming year.
