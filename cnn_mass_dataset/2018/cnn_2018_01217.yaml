content: |
  A rogue racehorse, a Slinky Dog costume, and surprising details in a tiny house. Here are the videos you don’t want to miss this week.
  
  Thanks to a viral performance of the National Anthem, we already know 7-year-old Malea Emma Tjandrawidjaja can sing her heart out. She’s also full of charm and candor, as evidenced by her interview with CNN’s Alisyn Camerota and John Berman, where she belts out a song by one of her favorite artists.
  
  This dad is serious about “Toy Story.” He had a do-it-yourself costume idea: Slinky Dog, where his young son is the front of the dog and his niece brings up the rear. They toddled around Disneyland in slinky form, winning over crowds and the internet.
  
  Patrons of a sports betting bar in Chantilly, France, likely didn’t bet onthishappening:A runaway racehorse – who bucked her rider – charged through the doors of the bar.
  
  Tiny doesn’t mean simple. Go inside this tiny home, built by a world-renowned architect, to see every high-end detail.
