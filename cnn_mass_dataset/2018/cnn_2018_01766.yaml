  _November 5, 2018_
  
  _Today’s show leads off with economic news, from the U.S. Labor Department’s newest jobs report to a look at the challenges of seasonal hiring in a strong economy. Afterward, we’re showing you how a Peruvian doctor became a CNN Hero for his efforts to help cover the living expenses of sick children._
  
