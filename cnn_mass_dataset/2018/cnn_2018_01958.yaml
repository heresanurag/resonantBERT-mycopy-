  It’s not too late to put together that romantic Valentine’s Day trip. Here are [12 lavish options](http://www.cnn.com/travel/article/valentines-day-2018-travel/index.html). And here’s what else you need to know to to **Get Up to Speed and Out the Door**. (You can also get “5 Things You Need to Know Today” delivered to your inbox daily. [Sign up here](http://cnn.us11.list-manage1.com/subscribe?u=47c9040f6ff957a59bd88396e&id=6da287d761).)
  
  While you were sleeping, the federal government shut down again – but it’s on its way back. Let us explain. Everyone thought the[$300 billion budget deal](https://www.cnn.com/2018/02/07/politics/government-shutdown-deal-spending-caps-debt-ceiling/index.html)announced this week had solved the looming shutdown problem. But then Sen. Rand Paul stood up and [complained about all that massive spending.](http://www.cnn.com/2018/02/08/politics/rand-paul-spending-agreement/index.html) And he talked for so long that he prevented the deal from passing by Thursday’s midnight deadline, triggering the shutdown (the second one in less than a month). But then, the Senate quickly OK’d the plan, and the House approved it at about 5:30 ET this morning. So, this quickie little shutdown will be over as [soon as President Trump signs the bill.](https://www.cnn.com/2018/02/08/politics/budget-vote-congress-shutdown/index.html)
  
