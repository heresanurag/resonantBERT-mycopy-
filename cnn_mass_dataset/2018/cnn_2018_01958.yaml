  **1,033**
  
  That’s [how many points the Dow dropped](http://money.cnn.com/2018/02/08/investing/dow-jones-stock-market/index.html) yesterday, the second-worst point drop in history ([see: Monday](http://money.cnn.com/2018/02/05/investing/stock-market-today-dow-jones/index.html)). The stock market is officially [in correction territory](http://money.cnn.com/2018/02/09/investing/dow-jones-stock-market/index.html) now, off 10% from its record high just two weeks ago.
  
