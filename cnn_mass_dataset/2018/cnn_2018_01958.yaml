  The Trump administration is looking at new rules that would make it harder for immigrants to get into the US or get green cards [if they use certain public benefits,](http://www.cnn.com/2018/02/08/politics/immigrant-public-charge-proposal/index.html)like Medicaid or Head Start. The plan, contained in a draft obtained by CNN,could lead to substantially higher numbers of immigrants being blocked from staying in America. A Homeland Security spokesman wouldn’t confirm the plan, saying only that the administration is concerned about saving taxpayer dollars. The proposal would still need to go through a formal comment period before it could be implemented.
  
