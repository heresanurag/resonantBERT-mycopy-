  What a terribly violent week it’s been in Syria. It’s estimated [more than 200 civilians have been killed](http://www.cnn.com/2018/02/08/middleeast/syria-eastern-ghouta-airstrikes/index.html) since Monday because of Syrian airstrikes (backed by Russia) on Eastern Ghouta, a rebel-held area near Damascus. The [airstrikes ramped up](https://www.cnn.com/2018/02/07/middleeast/syria-eastern-ghouta-airstrikes-intl/index.html)after a Russian plane was shot down over the weekend near Idlib. Activists say conditions in Eastern Ghouta, which has been surrounded by Syrian forces for more than four years, are rapidly deteriorating for the hundreds of thousands of people trapped there, who [struggle with food and medicine shortages.](https://www.cnn.com/2018/02/06/middleeast/syria-refugees-lebanon-winter-intl/index.html)
  
