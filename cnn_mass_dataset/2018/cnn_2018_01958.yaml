  **Not quite ‘Armageddon’**
  
  An asteroid will [fly really close](http://www.cnn.com/2018/02/08/us/nasa-asteroid-flyby/index.html) to Earth today – about 39,000 miles away – but we won’t need Bruce Willis to nuke it,[like in the movies.](http://www.imdb.com/title/tt0120591/)
  
  **Games people play**
  
  Some of the more obscure Winter Olympic sports get underway today. [Be an expert in them](http://www.cnn.com/2018/02/08/sport/olympics-obscure-sports-guide-trnd/index.html) in less than five minutes. Guaranteed!
  
  **What a deal**
  
  The San Francisco 49ers just signed Jimmy Garoppolo to the[biggest deal in NFL history](http://bleacherreport.com/articles/2741812-report-jimmy-garoppolo-49ers-agree-on-record-5-year-1375-million-contract?utm_source=cnn.com&utm_medium=referral&utm_campaign=editorial), and the rest of the league’s QBs are on the phone with their agents.
  
  **Ginger time**
  
  We’re getting new emojis this year, including a partying face and a “cold” face, but the buzz is all about [the one for redheads.](http://money.cnn.com/2018/02/08/technology/new-emoji-2018/index.html)
  
  **The podcast we’re listening to next …**
  
  [“Patty Has a Gun: The Life and Crimes of Patricia Hearst.](https://itunes.apple.com/us/podcast/patty-has-a-gun-the-life-and-crimes-of-patricia-hearst/id1326856596?mt=2)” It’s one of America’s most bizarre crimes, and CNN’s Brian Stelter and Jeffrey Toobin are revisiting the case’s epic details. For more on the saga, don’t miss CNN’s docuseries, “[The Radical Story of Patty Hearst](http://www.cnn.com/shows/radical-story-patty-hearst),” premiering Sunday at 9 p.m. ET.
  
