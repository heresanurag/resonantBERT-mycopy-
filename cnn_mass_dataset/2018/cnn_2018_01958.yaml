  **OPENING CEREMONY:** About 35,000 fans will fill the Olympic stadium as the [torch is lit this morning](https://www.cnn.com/2018/02/08/sport/olympics-pyeongchang-2018-russia-north-korea/index.html) on the 23rd Winter Olympics in Pyeongchang, South Korea. The moment everyone’s waiting for will be the entrance of the North and South Korean teams, marching under the [Korean Unification Flag.](https://www.cnn.com/2018/01/17/asia/north-south-korea-olympics-flag-intl/index.html)
  
  **SPORTING ACTION:** No gold medals can be won today, but American Nathan Chen, a favorite to claim gold in the men’s individual [figure skating competition](https://www.cnn.com/2018/02/08/sport/figure-skating-olympics-preview-trnd/index.html), takes to the ice. There’s also the opening round of[mixed doubles curling](https://www.cnn.com/2018/02/08/sport/olympics-obscure-sports-guide-trnd/) and the qualification rounds of the men’s and women’s moguls in freestyle skiing.
  
