  The good Olympic vibes on the Korean Peninsula may yield a new breakthrough in relations between the North and South. There’s reportedly a “good chance”[Kim Yo Jong](https://www.cnn.com/2018/02/07/asia/kim-jong-un-sister-olympics-korea-intl/index.html), the sister of North Korean leader Kim Jong Un, [will invite South Korean President Moon Jae-in](https://www.cnn.com/2018/02/08/asia/north-korea-moon-jae-in-visit-possible/index.html) to visit the North. The invitation could come at a welcome luncheon on Saturday. And Moon could make the trip to the North “sometime this year.” If it happens, it would be the first time a South Korean President stepped foot in North Korea in a decade.
  
