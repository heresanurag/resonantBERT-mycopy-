  The White House is in full-blown damage-control mode as it deals with the scandal surrounding ex-staffer Rob Porter. Chief of staff John Kelly [sent out a memo](https://www.cnn.com/2018/02/08/politics/john-kelly-staff-email-domestic-violence/index.html) last night to White House staffers, saying that “we all take matters of domestic violence seriously.” But a lot of people are questioning if that’s really true because Kelly reportedly knew for months about the domestic violence allegations made against Porter [by his two ex-wives](https://www.cnn.com/2018/02/09/politics/ex-wife-rob-porter-interview-describing-abuse-cnntv/index.html), yet [kept him around anyway](https://www.cnn.com/2018/02/07/politics/rob-porter-white-house-who-knew/index.html). Is Kelly’s job on the line? Not likely, sources tell CNN, because the White House doesn’t exactly have a list of replacements handy right now.
  
