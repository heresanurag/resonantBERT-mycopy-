title: "Trump’s failure to fight climate change is a crime against humanity"
date: "2018-10-18"
section: "Opinion"
url: "https://www.cnn.com/2018/10/18/opinions/trumps-failure-to-fight-climate-change-sachs?fbclid=IwAR2r3e-jXcl_LYLMFo_Ijik22zmPS8jISh5X51fWkABO20rl-XHYwY4DM5s"
content: |
  Editor’s Note:Jeffrey Sachs is a professor and director of theCenter for Sustainable Development at Columbia University. The opinions expressed in this commentary are those of the author; view moreopinionarticles on CNN.
  
  President Donald Trump, Florida Gov. Rick Scott, Florida Sen. Marco Rubio, and others who oppose action to address human-induced climate change should be held accountable for climate crimes against humanity.  They are the authors and agents of systematic policies that deny basic human rights to their own citizens and people around the world, including the rights to life, health, and property.  These politicians have blood on their hands, and the death toll continues to rise.
  
  Trump remains in willful denial of thethousands of deathscaused by his government’s inept, under-funded, and under-motivated response to Hurricane Maria in Puerto Rico in 2017.  The image that will remain in history is of the President gleefullythrowing paper towelsfor a photo op as the people of Puerto Rico around him suffered and died of neglect.  Last September, 2018 Hurricane Florence claimed at least48 lives, with more likely to come in its aftermath. Soon after, Hurricane Michael claimed at least32 lives, with more than a thousand people reportedly stillmissing. The final death toll will likely soar in the months ahead as the residual consequences of the storm become more clear.
  
  As the Earth warms due to the continued burning of coal, oil, and gas, climate-related disasters that include high-intensity hurricanes, floods, droughts, extreme precipitation, forest fires, and heat waves, pose rising dangers to life and property.Hurricanesbecome more destructive as warmer ocean waters feed more energy to the storms. Warmer air also carries more moisture for devastating rainfalls, while rising sea levels lead to more flooding.
  
  Climate change endangers dozens of World Heritage sites
  
  YetTrumpand his minions are the loyal servants of the fossil-fuel industry, which fillRepublican partycampaign coffers. Trump has also stalled the fight against climate change by pulling out of the Paris Agreement. The politicians thereby deprive the people of their lives and property out of profound cynicism, greed, and willful scientific ignorance.
  
  The first job of government is to protect the public. Real protection requires climate action on several fronts: educating the public about the growing dire risks of human-induced climate change; enacting legislation and regulations to ensure that families and businesses are kept out of harm’s way, for example by stopping construction in flood plains, and investing in sustainable infrastructure to counteract rising sea levels; anticipating therising frequencyof high-intensity climate-related disasters through science-based preparedness following through on properly scaled disaster-response during and after storm events; and most importantly for the future, spearheading the rapid transition to zero-carbon energy to prevent much greater calamities in the years ahead.
  
  Ex-EPA chief: Trump will pollute your air and make you pay for it
  
  This straightforward to-do list is the opposite of what Trump and his cronies are doing.  Trump blithely disregards scientific findings about climate change and thereby exposes the nation to unprecedented risks.  The officials he hasappointed to the Environmental Protection Agencyand other relevant parts of government are industry cronies and lobbyists far more interested in self-enrichment, padding their accounts, and helping their once-and-future employers than in doing their current jobs.
  
  Trump’s mishandling of Puerto Rico disaster in the wake of Hurricane Maria is grounds itself for impeachment and trial.  Thousands of citizens died unnecessarily on Trump’s watch because the administration could not be stirred to proper action before, during, and after the hurricane.
  
  Two independent, detailed epidemiological studies, using different methodologies – one led by researchers atHarvard Universityand the other by researchers atGeorge Washington University– have estimated that thousands died in the aftermath of Maria.
  
  While dozens died during the storm, thousands more died as a result of the residual effects of the storm. Maria downed electricity and wreaked havoc on the ability of Puerto Ricans to meet their life-sustaining needs by disrupting access to health services, safe water, and transportation.  They died, in short, from the storm, and ultimately from inadequate disaster prevention, preparedness and response.
  
  To truly fight climate change, we need to set our sights higher
  
  Yet when the George Washington University study was released in September, 2018, the Presidentresponded by saying, “I think we did a fantastic job” in Puerto Rico.  He brazenlydenied the death count, without any attempt whatsoever to understand or learn from the findings.
  
  Recent scientific studies underscore the dire emergency ahead.  Professor James Hansen, one of the world’s leading climatologists, hasdemonstratedthat the Earth’s climate has moved above the temperature range that supported the entire 10,000 years of civilization.  The risks of catastrophic sea level rise are upon us.
  
  A group of world-leading ecologists recentlyhighlightedthat critical Earth systems could spiral out of control.  The Nobel-prize winning Inter-Governmental Panel on Climate Change released a harrowingreportshowing that the world has just a few years left to move decisively towards renewable energy if it hopes to achieve the globally agreed target to limit warming below 1.5 degrees Celsius above the pre-industrial average temperature of the planet.
  
  The huge bills for Hurricanes Florence and Michael will now start rolling in: funerals, suffering, sorting through debris, and perhaps$30 billionin losses that could have been reduced dramatically through science-based planning and foresight. The American people are paying a heavy cost for the cynicism and cruelty of politicians in the pocket of the fossil-fuel industry.  It is time to hold these reckless politicians to account.
  
