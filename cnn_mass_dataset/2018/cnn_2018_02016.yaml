title: "Harvey Weinstein pleads not guilty to rape charges in court"
date: "2018-06-05"
section: "US"
url: "https://www.cnn.com/2018/06/05/us/harvey-weinstein-arraignment/index.html"
content: |
  Harvey Weinstein pleaded not guilty on Tuesday to three felony counts in New York Supreme Court.
  
  The disgraced producer walked into court for an arraignment on two counts of rape and one first-degree criminal sex act charge.
  
  Weinstein denied all allegations of nonconsensual sexual activity, and he’s remained free after posting $1 million cash bail, according to his attorney, Benjamin Brafman.
  
  “Under the circumstances, he’s holding up reasonably well. No one can be happy to be in the position that he is in,” Brafman said Tuesday outside court.
  
  “As terrible a crime as rape is, it is equally reprehensible to be falsely accused of rape, and since Mr. Weinstein has denied these allegations, that’s where we are,” he added.
  
  The charges stem from allegations from two women – one involving an incident in 2004, and one in 2013 – according to the Manhattan District Attorney’s Office.
  
  Weinsteinsurrendered to authoritieson May 25, seven months after The New Yorker and The New York Times published accounts from several women accusing him of various forms of sexual misconduct.
  
  The accounts unleashed a flood of accusations against Weinstein that emboldened women around the world to accuse powerful men of sexual harassment as part of the #MeToo movement.
  
  Harvey Weinstein indicted on charges of rape, criminal sexual act
  
  As more women came forward with allegations against Weinstein, the New York Police Department and the Manhattan DA’s Office launched a joint investigation culminating in the charges. A grand juryindicted Weinstein on three felony countson May 30.
  
  A source familiar with the investigation previously told CNN that the criminal sex act charge was from a case involving aspiring actress Lucia Evans, who alleges Weinstein forced her to perform oral sex on him in his Tribeca office in 2004. Evans has not responded to any of CNN’s requests for comment since first speaking out about Weinstein in The New Yorker last fall.
  
  The person in the 2013 rape case has not been publicly identified, the source said.
  
  Weinstein must next appear in court for a hearing on September 20, Brafman said.
  
  On Friday,three women filed a lawsuitagainst Weinstein and his former employers, including the Walt Disney Company and Miramax. The lawsuit accuses Weinstein of rape and alleges that his former employers are liable for his actions during his employment.
