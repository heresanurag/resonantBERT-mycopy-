title: "Mind game: When rugby stars are ‘too nervous to take the field’"
date: "2018-06-01"
section: "Sport"
url: "https://www.cnn.com/2018/06/01/sport/rugby-sevens-hsbc-sevens-world-series-ben-ryan-brian-odriscoll-intl-spt"
content: |
  It’s late on a Sunday and you’re about to play a cup final.
  
  In your legs you feel the heaviness of the four or five other games already played that weekend. Your body has been bruised and knocked, your lungs emptied.
  
  You’re about to take to a pitch thousands of miles from home, where your team could be just 14 minutes away from a trophy.
  
  For many internationalrugbysevens players, these circumstances will feel familiar.
  
  And while some will be calm in front of a vibrant crowd of thousands, others will be beset with nerves.
  
  It’s a nature of the game – and sport more generally – of which former sevens coach Ben Ryan is well aware. At all levels and to different degrees, players feel pressure; the effects can be overpowering.
  
  “I’ve had players who have got to Olympic finals and it was as though they were running out to lunch break with their mates – they felt absolutely no pressure at all,” Ryan, who lead Fiji to Olympic gold in 2016, tells CNN.
  
  “Then I’ve seen people on the other end that will self-sabotage – will do things on purpose to derail themselves from their performance because the pressure has got too much and they want to find an excuse.
  
  “Whatever that is – in a running race falling over on purpose, dropping a ball or getting injured. I’ve seen players who were too nervous to take the field … They’d put this pressure on themselves that didn’t exist.”
  
  READ: Swapping sacks for sevens in the off-season
  
  In recent years, Ryan has been hailed as something of a sevens guru. After coaching Fiji to two world championship titles andOlympic gold at Rio 2016, he was cast as the country’s hero – gifted his own plot of land, granted an honorary title, andimmortalized on national currency.
  
  His guidance is perhaps the most sought-after in the game. Alongside his role as a sevens ambassador withHSBCthis season, he’s been helpingFrance as a consultant coachwhere the players revere him with “superstar” awe.
  
  He knows better than anyone that there are aspects of sevens that make the mental strain on players particularly acute. Take, for example, the tournament format, where a team’s games are staggered every few hours over the course of a weekend.
  
  “You’re on this roller coaster of winning and losing,” explains Ryan. “Momentum is everything in sevens. Teams who get a good early win or beat a bigger side – you can see them literally lift; that synergy can come.
  
  “But if a team has a defeat that they don’t expect or an injury or something then you’ve got to try to press the reset button. Nearly every team gets the high and the lows.”
  
  Then within games, individual decision making is crucial. Sevens is blessed with some of the quickest athletes in the world, and with so much space to play with, defenders are exposed.
  
  READ: The rugby captain raised in a one-room home
  
  Miss a tackle, and your opponent will be streaking towards the try line; rush out the defensive line and you’ve left a gaping hole behind you; dive in a dead ruck, and there’s one fewer body in an already stretched defense.
  
  There are wider factors, too. The HSBC Sevens World Series criss-crosses the globe, from Sydney to Singapore, London to Las Vegas. Travel-induced fatigue can be mentally and physically draining.
  
  “We set up PhDs around jet-lag, we did saliva tests, we did all sorts of stuff,” says Ryan of his time coaching England. “We talked far too much about jet-lag to the players that they all felt they had jet-lag even if they didn’t. It became a far bigger issue.”
  
  While the physical effects of anxiety – butterflies, high heart rate, and nausea – usually dissipate during exercise, cognitive anxiety – worry, fear of failure, and feeling pressurized – can be debilitating.
  
  The mind can tire as much as the legs and lungs. Helping players stay mentally unburdened is crucial in a game of fine margins.
  
  “You reduce that anxiety by letting players know what their roles are and what they’re supposed to be doing,” explains Ryan.
  
  “At the high end, coaching isn’t teaching someone to pass or kick. It’s about man-management skills, understanding a person, and consistently behaving the right way towards them.
  
  “Those sort of things around belief and purpose and giving players security as a coach – that they can go on the field without feeling they’re going to get it in the neck if it doesn’t work out.”
  
  “There’s triggers you can have with individuals – like an imaginary piece of paper being thrown away when you’ve missed a tackle to reset yourself. Other players might just like to be told how good they are.”
  
