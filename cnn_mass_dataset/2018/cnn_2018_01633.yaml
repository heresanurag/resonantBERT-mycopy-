title: "5 things to know for November 14: Wildfires, White House, Brexit deal, hate crimes"
date: "2018-11-14"
section: "US"
url: "https://www.cnn.com/2018/11/14/us/five-things-november-14-trnd/index.html"
content: |
  Don’t let all the grim news get you down. You might be able to improve your health and gain some peace of mind – bybirdwatching. Here’s what else you need to know toGet Up to Speed and Out the Door. (You can also get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  Firefighters in Southern California have abrand-new blazeto battle. The Sierra Fire sparked up overnight and is burning through about 20 acres east of Los Angeles County. But there’s some good news. The firefight may not be as rough as with other blazes because forecasters predict the swirling winds that have fueled the fires will slowly begin to decrease today, with favorable conditions lasting a couple days.
  
  So far, 48 people have been killed in the northern part of the state by the Camp Fire, the deadliest and most destructive fire in California history, while two have died in the Woolsey Fire, in Southern California. Officials fear the number will rise as search teams comb through rubble and ashes in thetown of Paradise, which was wiped out by the Camp Fire. It’s just been a hellish time in California. In the past week, more than 230,000 acres have burned – more area than Chicago and Boston combined. And in the past 30 days, firefighters have battledmore than 500 blazes, Cal Fire said.
  
  Now that themidtermsare (sort of) over, it looks like there’s going to be some turnover at 1600 Pennsylvania Avenue. And not all of it will be orchestrated by the President. First lady Melania Trump shocked the heck out of everybody when she put out a stinging statementseeking the ousterof senior national security adviserMira Ricardel. Now, President Trump seems poised to fire her. Ricardel reportedly ran afoul of the first lady after feuding with her staff over her recent trip to Africa (about plane seats and National Security Council resources).
  
  But that’s not all the potential people-moving that could happen. The President isreportedly looking at replacementsfor Homeland Security Secretary Kirstjen Nielsen and White House Chief of Staff John Kelly, as well. It’s not unusual for a White House to retool after midterms, but this seems more tumultuous.
  
  Looks like the UK and the EU have come up with aframework for an agreement on Brexit. The so-called draft deal will be discussed today during an emergency meeting of Prime Minister Theresa May’s Cabinet. It’s not clear just what’s in this agreement, but the main sticking point had been over the Irish border. Currently, the UK and Ireland are both part of the EU single market, so goods passing between them do not need customs inspections. The sides wanted to avoid a “hard border” between Northern Ireland (which is part of the UK) and Ireland (which will remain in the EU), which would require infrastructure and customs checks. May wanted to strike a deal now to get it ratified by the time Britain is due to leave the EU at the end of March.
  
  Theslayings of eight relativesrocked an Ohio town in 2016. Now comes shock over the suspects arrested in the crime – all from another Ohio family. Policearrested four membersof the Wagner family yesterday in connection with the shooting deaths of Rhoden family members. Authorities said the Wagners planned the crimes for months, learning the Rhodens’ routines, the layouts of their homes and where they slept. The motive for all this violence may have something to do with a child custody dispute, Ohio’s attorney general said.
  
  Hate crimes were up, significantly, in the US last year, according to just-released numbersfrom the FBI. Reported incidents rose 17% in 2017 compared to 2016. Of 7,106 single-bias hate crimes reported last year:
  
  • 59.6% of victims were targeted because of the offenders’race/ethnicity/ancestry bias;
  
  • 20.6% were targeted because ofsexual-orientation bias;
  
  • 1.9% were targeted because ofgender identity bias;
  
  • 0.6% were targeted because ofgender bias.
  
  Of 1,679 religious hate crimes reported, 58.1% were anti-Jewish, while 18.6% were anti-Muslim. The stats are a compilation of bias-motivated incidents submitted to the FBI by some 16,000 law enforcement agencies.
  
  An Air Force plane crashed last night at the Laughlin Air Force Base in Texas. One pilot is dead and another is in the hospital.
  
