title: "NYC subway bomber found guilty of 6 counts, including perpetrating a terrorist attack"
date: "2018-11-06"
section: "US"
url: "https://www.cnn.com/2018/11/06/us/new-york-subway-bomber-guilty/index.html"
content: |
  A jury has foundAkayed Ullahguilty of last year’s attack in an underground walkway of the New York subway system, a spokeswoman for the federal prosecutor’s office said Tuesday.
  
  Footage from the tunnel showed Ullah detonate a bomb on his person during morning rush hour December 11, 2017. The tunnel connects two subway lines beneath the Port Authority Bus Terminal in Manhattan.
  
  “Ullah’s sinister purpose was to harm and terrorize as many innocent people in his path as possible, by using deadly violence to make a political statement,” U.S. Attorney Geoffrey S. Berman said.
  
  Berman said the verdict coming on Election Day “fittingly underscores the core principles of American democracy and spirit.”
  
  Wife ‘didn’t know about radicalization’
  
  Six people were injured in the blast. Ullah injured his hands and stomach, and footage shows police responding to the scene as Ullah lay on his back in the tunnel.
  
  According to authorities,the bomb was composedof a battery, wires, metals screws and a Christmas tree light bulb.
  
  On the day of the attack,Ullah posted to Facebook, “Trump you failed to protect your nation,” according to a criminal complaint.
  
  “Through incredibly good fortune, his bomb did not seriously injure anyone other than himself,” acting US Attorney Joon Kimsaid after a January court appearance.
  
  The 28-year-old Bangladeshi man was convicted on six counts:
  
  The first count involves Ullah detonating the explosives on his person“for and in the name of ISIS,”the complaint said.
  
  It was not immediately clear when Ullah will be sentenced. The maximum sentence for two of the charges, including using a weapon of mass destruction, is life in prison.
  
  The Port Authority Bus terminal accommodates 220,000 passenger trips a day.
