  “Unlike other politicians who never admit error or even imperfection, McCain was all too aware of his and was usually the first to raise them. And yet, there was always, with the senator, standing there, defiant, the reality of his past, of what he did as a prisoner of war,” Tapper said, a reference to McCain’s refusal to be released by his North Vietnamese captors unless the soldiers taken captive before him also were freed.
  
  Tapper: Washington needs McCain more than ever
  
  “[A]nd as we say goodbye to Senator McCain this week, many of us feel as if we have lost something other than just a man,” Tapper said. “That may be not only because he tried to encourage us all to serve a cause greater than ourselves, it may be because he never stopped trying to be a better man. He never stopped trying to become the man he wanted to be. ‘We’re all afraid of something …’ McCain wrote in his book ‘Why Courage Matters.’ ‘Don’t let the sensation of fear convince you that you’re too weak to have courage. Fear is the opportunity for courage, not proof of cowardice. No one is born a coward. We were meant to love. And we were meant to have the courage for it. So be brave. The rest is easy.’
  
  “We’re in an era right now of lies and indecency, of tribalism and nastiness, and in this era, we lost someone who tried – tried – to embody the opposite of those vicious impulses,” Tapper said. “His loss leaves a chasm in the public square.”
