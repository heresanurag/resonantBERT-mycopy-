  NYT: Trump lawyers worried he'd lie to Mueller
  
  0:54  • Source: [CNN](https://www.cnn.com/)
  
  ![Image 3: President Donald Trump listens during a meeting with North Korean defectors where he talked with reporters about allowing the release of a secret memo on the FBI's role in the Russia inquiry, in the Oval Office of the White House, Friday, Feb. 2, 2018, in Washington. (AP Photo/Evan Vucci)](https://media.cnn.com/api/v1/images/stellar/prod/180202211538-01-donald-trump-0202.jpg?q=x_5,y_0,h_2760,w_4905,c_crop/w_860)
  
  NYT: Trump lawyers worried he'd lie to Mueller
  
  0:54
  
  Washington—
  
  President Donald Trump’s attorneys are trying to sway him against agreeing to an interview with special counsel Robert Mueller partially out of concern he might incriminate himself through false statements and could be charged with lying to investigators, The New York Times [reported](https://www.nytimes.com/2018/02/05/us/politics/trump-lawyers-special-counsel-interview.html) Monday evening.
  
  The report follows on CNN’s [reporting last week](https://www.cnn.com/2018/01/30/politics/donald-trump-attorneys/index.html) that Trump’s attorneys are arguing that Mueller’s team has not met the “high threshold” it needs to have Trump in a face-to-face interview.
  
  The Times, citing four people briefed with the matter, said Trump’s attorneys want the President to refuse an extensive interview with Mueller’s team and that lawyers and aides believe once refused, Mueller may not be willing to subpoena Trump in an attempt to compel a presidential interview.
  
  Ad Feedback
  
  Trump [said last month](https://www.cnn.com/2018/01/24/politics/robert-mueller-donald-trump/index.html) that he wanted to speak with Mueller and would be willing to do so under oath.
  
  “I am looking forward to it, actually,” Trump told reporters. “Here is the story: There has been no collusion whatsoever. There is no obstruction whatsoever. And I am looking forward to it.”
  
  After Trump made that remark, his attorney John Dowd [said he would be the one](https://www.cnn.com/2018/01/25/politics/john-dowd-donald-trump-robert-mueller/index.html) to decide whether Trump talks to the special counsel and that he had not made a decision yet. The Times report on Monday said Dowd “wants to rebuff an interview request.”
  
  As the Mueller-led special counsel investigation into potential coordination between Trump associates and Russia to influence the 2016 election, and questions about any possible obstruction of justice, continues, more attention has fallen onto the prospect of a potential sit-down interview with Trump.
  
  Sources familiar with the matter [told CNN](https://www.cnn.com/2018/01/24/politics/special-counsel-trump-interview/index.html) late last month that Mueller had provided Trump’s lawyers with a range of topics he wants to ask Trump about in the interview.
  
