  Minister: Jesus is your flu shot
  
  1:27  • Source: [CNN](https://www.cnn.com/)
  
  ![Image 1: Gloria Copeland Flu Comments 1](https://media.cnn.com/api/v1/images/stellar/prod/180206155354-gloria-copeland-flu-comments-1.jpg?q=x_2,y_0,h_1071,w_1903,c_crop/w_860)
  
  Minister: Jesus is your flu shot
  
  1:27
  
  Washington—
  
  A televangelist with ties to President Donald Trump says you don’t need a flu vaccine if you have Jesus Christ.
  
  “Well, listen, partners, we don’t have a flu season,” Minister Gloria Copeland said on a Facebook [video](https://www.facebook.com/CopelandNetwork/videos/1783790631672334/) for her church that was posted last week. “And don’t receive (a flu shot) when somebody threatens you with, ‘Everybody’s getting the flu.’ We’ve already had our shot: He bore our sicknesses and carried our diseases. That’s what we stand on.”
  
  Copeland, who works with her husband at Kenneth Copeland Ministries in Texas, said to followers in the clip: “Inoculate yourself with the word of God.”
  
  Ad Feedback
  
  By praying and saying “I’ll never have the flu. I’ll never have the flu,” Copeland says followers can ward off the virus.
  
  “Flu, I bind you off of the people in the name of Jesus,” she continued, adding, “Jesus himself gave us the flu shot. He redeemed us from the curse of flu, and we receive it and we take it, and we are healed by his stripes, amen.”
  
  The Copelands were among the more than two dozen advisers on the Trump campaign’s advisory board. Ahead of the 2016 election, Kenneth Copeland [said](https://www.youtube.com/watch?v=edwCVThqqXQ) that Christians who don’t vote for Trump “are going to be guilty of murder,” are “guilty of an abomination to God,” and are “guilty of every baby that’s aborted,” in video posted by Right Wing Watch.
  
  In 2013, there was a measles outbreak in Texas that state officials[tied to the Eagle Mountain International Church](http://religion.blogs.cnn.com/2013/08/29/ex-employee-measles-church-preached-faith-not-shots/), which is run by Kenneth Copeland Ministries. At the time, the church was linking vaccinations to autism and teaching parents how to access vaccination exemption forms.
  
  The White House referred a request for comment about Copeland’s remarks to the Centers for Disease Control and Prevention’s [recommendation](https://www.cdc.gov/flu/consumer/vaccinations.htm) for getting flu shots.
  
  Influenza and pneumonia-related deaths for this flu season are now [categorized](https://www.cdc.gov/flu/weekly/index.htm) as an epidemic, according to the CDC.
  
  There were 14,676 laboratory-confirmed flu-related [hospitalizations](https://www.cnn.com/2018/01/24/health/how-flu-kills/index.html) reported from October 1 to January 27. The number of people infected with influenza is believed to be much higher because not everyone goes to their doctor when they are sick, nor do doctors test every patient.
  
  Fifty-three children[have died](https://www.cdc.gov/flu/weekly/index.htm) from the flu since the start of the 2017-18 flu season, according to the CDC.
  
