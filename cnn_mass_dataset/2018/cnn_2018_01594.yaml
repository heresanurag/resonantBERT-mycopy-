  # Televangelist with Trump ties: ‘Jesus himself gave us the flu shot’
  
  By [Maegan Vazquez](https://www.cnn.com/profiles/maegan-vazquez)
  
  Feb 7, 2018
  
  PUBLISHED Feb 7, 2018, 3:07 PM ET
  
  Respiratory viruses Vaccines Donald Trump
  
  [See all topics](http://www.cnn.com/follow)
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2018%2F02%2F07%2Fpolitics%2Fgloria-copeland-trump-adviser-flu-shot "Share with email")Link Threads
  
