title: "Here’s what’s on the docket for Paul Manafort’s pretrial hearing"
date: "2018-06-29"
section: "Politics"
url: "https://www.cnn.com/2018/06/29/politics/manafort-hearing-russia-ukraine-trump-mueller/index.html"
content: |
  One of the most consequential hearings before former Trump campaign chairman Paul Manafort goes to trial is unlikely to have him there to witness it.
  
  On Friday morning, Judge TS Ellis will review several requests from defense attorneys and federal prosecutors – including new details onwhy investigators swept Manafort’s apartmentand a storage unit for documents related to powerful Ukrainians and Russians he worked for – as they set the terms of his bank fraud and financial crimes trial in Virginia.
  
  Another former aide to Roger Stone subpoenaed in Russia investigation
  
  The trial, the first of two criminal proceedings for Manafort, is set to begin July 25 and last about three weeks. But he is excused from being at the pretrial hearing in person Friday.
  
  This would have been the first time he had appeared following his imprisonment in a Virginia regional jail two weeks ago after he was accused of contacting witnesses. Manafort likely would have appeared in the courtroom clad in a jail-issued jumpsuit, rather than his typical pinstripe business suit, as is standard in federal proceedings before a judge outside of a jury trial.
  
  But his lawyers said earlier this week that the two hours of travel each way fromNorthern Neck Regional Jail in Warsaw, Virginia,to the Alexandria courthouse would be excessive. The judge agreed Manafort didn’t have to come to court Friday, as is his right.
  
  Russian company asks court to say Mueller's investigation is out of bounds
  
  The hearing begins at 9 a.m. and could last hours. On the schedule are several requests from both sides:
  
  Investigators detail Manafort money from Ukrainian corruption, Russian oligarch
  
  In spite of the list of weighty topics, the hearing could be lively. The last time Manafort went before Ellis, the judgequestioned whether the special counsel’s officehad a political vendetta aimed at President Trump. His remarks lit up Mueller’s Republican doubters, including the President. Though Ellisultimately decided the case was a fair oneand fell within Mueller’s authority, the septuagenarian judge has a flair for drama – and for long stories about his days as a pup lawyer – when he speaks from the bench.
