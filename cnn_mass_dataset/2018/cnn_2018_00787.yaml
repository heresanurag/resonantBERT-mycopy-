content: |
  While most of the nation’s attention was focused onhonoring former President George H.W. Bushthis week, the gears of government slowed, but by no means did they grind to a halt. Here are a few things you might have missed.
  
  This moment between George W. Bush and Michelle Obamawas reminiscent of a moment the duo shared at Sen. John McCain’s funeral earlier this year. Friends are the family you choose, y’all.
  
  Now that the 2018 election is(mostly)in the rear-view mirror, we’re focusing in on 2020. It’s less than 700 days away, after all! Former Florida gubernatorial hopefulAndrew Gillum met with former President Barack Obamaon Tuesday, amid speculation that he might be considering a 2020 presidential run.
  
  The band’s getting back together! And by band I mean Stormy Daniels and her attorney Michael Avenatti. And by getting back together I mean,going back to court.And he’s going to have plenty of time on his hands for lawsuits, seeing ashe’s decided not to join the Democratic 2020 field.
  
  I put this in here just to make you feel better if you got your holiday decorating done late this year. Congress is way behind the rest of us (shocking, I know). They finally got around to lighting the Capitol Christmas Tree on Thursday. My favorite fun fact about the Capitol Christmas Tree is that last year it wasliterallydecorated with recycled trash that children made into decorations.(Garbage, but make it Christmas!)
  
  And as December creeps on, it’s time for year-end wraps and farewell tours. Including UN Ambassador Nikki Haley, who is on her own farewell tourafter announcing in October that she’ll be stepping downby the end of the year.
