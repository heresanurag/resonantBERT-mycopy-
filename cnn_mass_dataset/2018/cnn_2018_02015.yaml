id: cnn_2018_02015
title: "Federal judge allows Florida voters more time to fix signature problems"
date: "2018-11-15"
section: "Politics"
url: "https://www.cnn.com/2018/11/15/politics/florida-extension-mismatched-signatures/index.html"
content: |
  A federal judge in Florida has ruled voters whose mismatched signatures disqualified their provisional and mail-in ballots and who were “belatedly notified” of the problem have until Saturday at 5 p.m. to correct those signature problems.
  
  The ruling by U.S. District Court Judge Mark Walker comes in a suit brought by U.S. Sen.Bill Nelson’s campaignand Democratic Party officials, who are looking to the courts to help them find votes to narrow the margin in Nelson’s bid for re-election against Republican challenger Gov.Rick Scott. The number of ballots in question is certainly less than the margin of votes separating Nelson and Scott. Scott led Nelson in the unofficial, pre-recount tally by more than 12,500 votes.
  
  In his ruling Judge Walker said as many as 5,000 ballots could be impacted by the signature mismatch provision, however, it is unclear exactly how many votes were impacted by this decision.
  
  In court, Democratic lawyers introduced examples of voters who were informed of the signature mismatch issue, but that notification came after the deadline to resolve the problem. Walker’s ruling only offers relief to those voters who were “belatedly notified.
  
  The ruling is narrower than the wider relief that Democrats were seeking, which was to invalidate the signature-match requirement entirely. Florida law requires signatures on vote-by-mail and provisional ballots match the signatures on file for each voter. Attorneys for Nelson’s re-election campaign argued that the signature-match rules violate the US Constitution and called for the judge to invalidate the law. Lawyers representing the state of Florida and the National Republican Senatorial Committee, along with others, argued that the law was valid and constitutional.
  
  “There are dozens of reasons a signature mismatch may occur, even when the individual signing is in fact the voter. Disenfranchisement of approximately 5,000 voters based on signature mismatch is a substantial burden,” Walker wrote in the order.
  
  He added, however: “Let this Court be clear: it is NOT ordering county canvassing boards to count every mismatched vote, sight unseen. Rather, the county supervisors of elections are directed to allow those voters who should have had an opportunity to cure their ballots in the first place to cure their vote-by-mail and provisional ballots now, before the second official results are fully counted.”
  
  Scott’s campaign announced Thursday that they would appeal the ruling.
  
  “We are immediately appealing this baseless decision and we are confident we will prevail in the Eleventh Circuit. Let’s be clear- Bill Nelson’s high-priced Washington lawyers went to court to argue against a process that they previously argued for,” said Lauren Schenone, a spokeswoman for the campaign.
  
  Marc Elias, the lead lawyer for the Democrats, called the ruling a “victory for the people of Florida and for the Nelson campaign” on Thursday.
  
  “The court’s ruling impacts thousands of ballots, and that number will likely increase as larger counties like Broward add their ballots to the total pool which can be cured,” Elias said in a statement. “We are taking several steps to ensure the rights of every Floridian are protected, and this is one major step forward.”
  
  While election officials have until Thursday at 3 p.m. to finish the machine recount on races within .5%, votes in the race for US Senate and agriculture commissioner will likely still be counted after the deadline because election officials have until Sunday at noon ET to finish the hand recount of any races within .25%. The election is not set to be certified until Tuesday, November 20 at 9 a.m.
  
  The gubernatorial contest between Republican former Rep. Ron DeSantis and Democratic Tallahassee Mayor Andrew Gillum is also being recounted, but the margin is wider – nearly 34,000 votes. Florida Democrats are aware that margin will probably not be overcome in a recount. Still, Gillum withdrew his election night concession over the weekend with a message that every vote should be counted.
  
  Walker, during a more than five-hour hearing on Wednesday, teased that his decision would likely extend the deadline by days, not weeks. The judge also indicated that he was concerned about the idea of just letting the votes be counted without verifying the signatures, telling the lawyers that there was “not a chance” he was going to do that.
  
  Uzoma Nkwonta, a lawyer for Nelson’s campaign, clearly sensed on Wednesday that Walker would likely extend the deadline by a few days. But in his closing question and answer with the judge, he suggested that “would probably be insufficient” and said there would need to be “reasonable notice” for voters who want to validate their ballots.
  
  “We believe that opportunity would take significantly longer than three days,” Nkwonta said.
  
  Walker did not appear to agree with this view. “At some point, isn’t there some onus on the voter?” Walker responded to Nkwonta.
  
  This story has been updated.
