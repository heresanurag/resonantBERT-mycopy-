title: "US diplomat found dead in Madagascar"
date: "2018-09-25"
section: "Africa"
url: "https://www.cnn.com/2018/09/25/africa/us-diplomat-dead-madagascar/index.html"
content: |
  A suspect is in custody and an investigation is underway after a US diplomat was found dead Friday in Madagascar, theUS State Department said.
  
  The unnamed diplomat was found at home in Antananarivo, Madagascar.
  
  “Our deepest sympathies go out to the family and to the US Embassy Antananarivo community,” State Department spokesperson Heather Nauert said in a statement.
  
  US investigators are working with Malagasy authorities to investigate the death, the statement said.
  
  Madagascar, a Texas-sized island nationoff the southeast coast of Africa, is one of the poorest countries in the world. Though the nation has abundant natural resources, it has struggled with political corruption, high poverty and pestilence, including a recent outbreak ofa rare pneumonic plaguethat left more than 200 people dead and more than 1,700 infected, according to theWorld Health Organization.
