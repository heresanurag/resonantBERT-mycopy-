title: "Michelle Obama steps out in boots Carrie Bradshaw would approve of"
date: "2018-12-21"
section: "Politics"
url: "https://www.cnn.com/2018/12/21/politics/michelle-obama-boots-becoming-book-tour/index.html"
content: |
  Former first lady Michelle Obama’s book tour ended the year in style.
  
  Wednesday night, Obama wore thigh-high sequin boots by Balenciaga for the last leg of her 2018 book tour promoting her bestselling memoir “Becoming.”
  
  Michelle Obama's evolving style
  
  The shiny gold stiletto boots retail for a whopping $3,900. The gold dress she wore was also from Balenciaga.
  
  The boots stole some attention during her event at the Barclays Center in Brooklyn where she was interviewed by “Sex and the City” actress Sarah Jessica Parker.
  
  As a first lady who was conscious of her fashion choices, Obama told Parker that her footwear had no message behind them, and that she simply wore them because she liked them, according toVox.
  
  “Now, I’m free to do whatever,” she told Parker.
  
  “They were just really cute,” she said, Vox reported. “I was like, ‘Those some nice boots!’”
  
  Well, I have never seen boots like this before.  Have you?   Love that ⁦@MichelleObama⁩ chose these for her last stop on her 2018#IAmBecomingbook tour in Brooklyn, NY.pic.twitter.com/GrN99KXIPU
  
  Obama also told Parker that as first lady she came to realize “fashion does have meaning,” and she was aware her clothes were making a statement.
  
  During her time as first lady, Obama mixed designer clothes with more affordable pieces, like from the Gap and J.Crew. She also chose to use her platform to elevate emerging designers of diverse backgrounds and influences.
  
  Obama’s stylist in the White House, Meredith Koop, also handled putting together all of her looks for the book tour, according to theNew York Times.
  
  CORRECTION: The date of the event where Obama wore the boots has been updated.
