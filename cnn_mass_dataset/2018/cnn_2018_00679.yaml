title: "A new campaign is asking all Americans to show up for Shabbat this weekend and fight anti-Semitism"
date: "2018-10-31"
section: "US"
url: "https://www.cnn.com/2018/10/31/us/show-up-for-shabbat-trnd/index.html"
content: |
  A new campaign is encouraging Americans of all faiths to visit synagogues for Shabbat services Friday and Saturday as a show of strength and love against hate.
  
  Launched by the American Jewish Committee, a global Jewish advocacy organization, the #ShowUpForShabbat campaign is a reaction to last Saturday’s massacre, when 11 worshipers were gunned down at a synagogue in one ofPittsburgh’s most vibrant Jewish communities.
  
  “I encourage all members of the Jewish community and all people of conscience across our country to join me,” AJC CEO David Harrissaid in a statement.“What could be a more fitting response to the terror in Pittsburgh?”
  
  Pittsburgh deaths were tragic. And preventable
  
  “We are determined to ensure that love triumphs over hate, good over evil, unity over division. That’s our America.”
  
  Shabbat, Judaism’s traditional day of rest, is observed from Friday evening to Saturday evening. Its rituals include prayer, family gatherings and festive meals.
  
  The campaign is also asking elected officials, religious and civic leaders and other community allies to show up. It’s telling synagogues to expect an influx of attendees during their Shabbat services and asking them to provide explanatory programming for newcomers.
  
  One religious group has already pledged to attend.
  
  A leader of the Sikh community in the US, who experienced their own tragedy whena gunman killed six worshipers at a temple in Oak Creek, Wisconsin, in 2012, is encouraging Sikhs to go to Shabbat services this weekend.
  
  “After Oak Creek, the Jewish community resoundingly stood by Sikh Americans, and this time we encourage our whole community to stand with our Jewish brothers and sisters,” said Rajwant Singh, co-founder of the National Sikh Campaign, in a statement.
  
  The campaign goes beyond the US. The AJC says its 11 international offices are also working with groups in more than 35 Jewish communities around the world to carry out something similar.
