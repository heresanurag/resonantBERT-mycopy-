title: "Lynyrd Skynyrd guitarist Ed King, co-writer of ‘Sweet Home Alabama,’ dies"
date: "2018-08-23"
section: "Entertainment"
url: "https://www.cnn.com/2018/08/23/entertainment/ed-king-lynyrd-skynyrd-death/index.html"
content: |
  Ed King, the Lynyrd Skynyrd guitarist who co-wrote the Southern rock anthem, “Sweet Home Alabama,” has died.
  
  The retired guitarist died Wednesday at his home in Nashville, according to his Facebook page. The post did not include a cause of death or King’s age.
  
  King was a member of the Florida band in its early days. He left before a1977 plane crashin Mississippi that killed three members of the group and later rejoined for a reunion tour.
  
  King was one of three writers of “Sweet Home Alabama,” which was released on the album “Second Helping” in April 1974.The rollicking track begins with King counting “1-2-3,” before the guitar lick that generations have come to know as a tribute to the state of Alabama.
  
  “When we were out in the country driving all the time, we would listen to the radio. Neil Young had ‘Southern Man,’ and it was kind of cutting the South down. And so Ronnie (Van Zant) just said, ‘We need to show people how the real Alabama is,’ ” guitarist and founder member Gary Rossington toldGarden & Gunin 2015.
  
  “It wasn’t cutting him down,” Rossington said of Young. “It was cutting the song he wrote about the South down. Ronnie painted a picture everyone liked. Because no matter where you’re from, sweet home Alabama or sweet home Florida or sweet home Arkansas, you can relate.”
  
  The iconic song was born in a practice session.
  
  Rossington toldGarden & Gunhe kept playing a riff over and over while they waited for everyone to arrive for rehearsal.
  
  “Ronnie and I were sitting there, and he kept saying, ‘play that again,’ ” Rossington said in the 2015 article. “Then Ronnie wrote the lyrics and Ed [King] and I wrote the music.”
  
  Four days later, the group recorded the hit, according to The Birmingham News.
  
  “I am mainly known as the one who verbally counted off ‘Sweet Home Alabama,’ then played the infamous Stratocaster riff as well as the solos in that tune,” King said, according to the newspaper.
  
  “I am the luckiest guitar player that ever lived. Who could’ve guessed that song would pay the rent for over 30 years?”
  
  The band was named after a Jacksonville, Florida, high school gym teacher who was their nemesis. The teacher’s name was spelled differently, Rossington told CNN. The group, who liked the Beatles at the time and just wanted to be a band, often got in trouble in gym class because of their long hair, Rossington said.
  
  On Thursday, tributes poured in for King.
  
  Rossington tweeted: “Ed was our brother, and a great Songwriter and Guitar player. I know he will be reunited with the rest of the boys in Rock & Roll Heaven.”
  
  I’ve just found out about Ed’s passing and I’m shocked and saddened. Ed was our brother, and a great Songwriter and Guitar player. I know he will be reunited with the rest of the boys in Rock & Roll Heaven. Our thoughts and prayers are with Sharon and his family. -Gary Rossington
  
  Randy Bachman with Bachman-Turner Overdrive said King “wrote the anthem of the south with Sweet Home Alabama and was such a talented guitarist.”
  
  Just got word that Ed King, former guitarist with Lynyrd Skynyrd who played so many of the classic guitar parts on their early records has passed away.Rest in peace Ed, you left behind some great riffs Buddy
  
  County music legend Charlie Daniels said King “played so many of the classic guitar parts on their early records.”
  
  “Rest in peace Ed, you left behind some great riffs Buddy,” Daniels wrote.
  
  King had been retired since 1996, according to hisFacebook page.
  
  He once played the opening lick from “Sweet Home Alabama” for CNN’s Jake Tapper, then with VH1 News. Tapper’s interview with King in Nashville wasfeatured in the 2002 documentary “Lynyrd Skynyrd’s UnCivil War.”
  
  RIP original member of Lynyrd Skynyrd Ed King. I really liked meeting him making that doc about the band with@VH1back in the day. In this 3rd pic he’s playing that great opening lick from Sweet Home Alabama.pic.twitter.com/t74YSCTqRf
  
  “Is there something unusual about the lick?” Tapper asked, during the interview.
  
  King stopped playing his red and black guitar and gave a classic answer.
  
  “I think the tone of the guitar kinda, like, sounds like Alabama.”
