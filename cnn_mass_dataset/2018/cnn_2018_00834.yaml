title: "Quickly catch up on the day’s news"
date: "2018-12-17"
section: "App News Section"
url: "https://www.cnn.com/2018/12/17/app-news-section/quickly-catch-up-december-17/index.html"
content: |
  Here’s what you might have missed Monday on CNN:
  
  – Senatereports on Russian interference reveal new detailson how a troll group tried to get unsuspecting people to complete real-world tasks.
  
  – Funding expires for a number of key government agencies on Friday at midnight. Here’swhat will happen if there’s a partial government shutdown.
  
  – After surviving a no-confidence vote last week, British Prime MinisterTheresa May is facing another no-confidence motionset forward by opposition leader Jeremy Corbyn.
  
  – Did you stay caught up on the news all year? See if you remember these110 things that happened in American politicsin 2018.
  
  – A 15-year-oldstudent slammed climate negotiatorsat a United Nations climate summit in Poland, telling world leaders they “are not mature enough to tell it like it is.”
  
  – Actor Stoney Westmoreland was dropped from the Disney Channel show “Andi Mack” afterpolice said he tried to meet a 13-year-oldfor sex.
  
  – Cardi B’s headlining set at Rolling Loud Festival in Los Angeles washijacked after her estranged husband Offsetsurprised her on stage asking her to take him back.
  
  – Merriam-Webster’sWord of the Yearfor 2018 is… “justice.”
