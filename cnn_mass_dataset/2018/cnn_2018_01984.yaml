  # Captured ISIS fighters provide clues to remains of Jihadi John victims
  
  By [![Image 3: Barbara Starr](https://media.cnn.com/api/v1/images/stellar/prod/140926154120-barbara-starr-profile-image.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/barbara-starr-profile)[Barbara Starr](https://www.cnn.com/profiles/barbara-starr-profile), CNN Pentagon Correspondent
  
  Updated Feb 10, 2018
  
  Updated Feb 10, 2018, 1:47 PM ET
  
  PUBLISHED Feb 8, 2018, 5:35 PM ET
  
  The Middle East Syria conflict
  
