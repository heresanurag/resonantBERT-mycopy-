title: "Duffer Brothers not leaving ‘Stranger Things’"
date: "2018-02-21"
section: "Entertainment"
url: "https://www.cnn.com/2018/02/21/entertainment/duffer-brothers-netflix-stranger-things/index.html"
content: |
  Report claimed brothers were leaving
  
  You can relax, “Stranger Things” fans.
  
  After a report said brothers Matt and Ross Duffer are leaving the popular show they created and where they serve as showrunners, Netflix has stepped up to say it’s not true.
  
  “Don’t drop your Eggos,” the streaming service tweeted late Tuesday. “Rumors that the Duffer Bros are leaving Stranger Things after season 3 are false.”
  
  Don't drop your Eggos. Rumors that the Duffer Bros are leaving Stranger Things after season 3 are false.pic.twitter.com/x4kbL9990e
  
  It all began witha Moviefone reportpublished on Tuesday that said the Duffer brothers were likely moving on from the fan favorite series after Season 3.
  
  But if their bosses are to be believed, things will keep on being strange for a bit longer.
  
  “Stranger Things” was released on Netflix in 2016 and was an instant hit for the streaming service. The show won big in January at the Screen Actors Guild awards where it took home the award forbest ensemble in a drama series.
  
  Netflix announced in December that theshow was renewed for a third season.
  
  Last August, the pairtold New York Magazinethey have planned for the eventual end of their series.
  
  “We’re thinking it will be a four-season thing and then out,” Ross Duffer, said.
