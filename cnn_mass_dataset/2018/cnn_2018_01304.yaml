  # Republicans are suddenly more optimistic about the midterms
  
  By [![Image 2: Eric Bradner](https://media.cnn.com/api/v1/images/stellar/prod/141231144627-eric-bradner.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/eric-bradner)[Eric Bradner](https://www.cnn.com/profiles/eric-bradner)
  
  Feb 8, 2018
  
  PUBLISHED Feb 8, 2018, 6:06 AM ET
  
  Donald Trump Taxes US elections Congressional news
  
