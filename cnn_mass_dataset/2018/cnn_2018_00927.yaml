id: cnn_2018_00927
title: "Kanye West donates $150,000 for security guard killed by officer in suburban Chicago"
date: "2018-11-18"
section: "Entertainment"
url: "https://www.cnn.com/2018/11/18/entertainment/kanye-west-gofundme-donation-chicago-security-guard/index.html"
content: |
  Rapper Kanye West donated $150,000 to a memorial fundraising site for a security guardshotby an officer near his hometown Chicago.
  
  West gave through theGoFundMepage made to raise money for the funeral of Jemel Roberson, 26, far exceeding the goal. Bart Jackson, a representative for GoFundMe, confirmed the contribution.
  
  “Sadly, Jemel’s life was tragically and unexpectedly cut short this morning as he tried to save others from senseless violence,” the page creator wrote on behalf of Roberson’s mother.
  
  Roberson was shot by an officer from Midlothian, Illinois while detaining a gunman outside of Manny’s Blue Room Lounge in Robbins, where he worked, according to a federal lawsuit. Witnesses said the alleged gunman returned to the bar after security asked him and several drunken men to leave,CNN affiliate WGNreported.
  
  The responding officer fatally shot Roberson in his side, after giving him “multiple verbal commands to drop the gun and get on the ground,” according to a statement filed by Illinois State Police, citing witnesses.
  
  Roberson’s mother, Beatrice Roberson, sued for more than $1 million, listing the unnamed responding officer and the village of Midlothian as defendants.
  
  Many have expressed outrage and concerns of alleged racial bias in this latest instance of police killing a black man.
  
  US Sen. Corey Booker, D-New Jersey, tweeted, “Words can’t begin to describe my horror and outrage.”
  
  Jemel Roberson was a young father and a security guard who aspired to one day become a police officer. On Sunday, he was doing his job, subduing a shooter, when he was killed by a police officer. Words can't begin to describe my horror and outrage.https://t.co/WZsIKHHDDa
  
  US Sen. Tammy Duckworth, D-Illinois, called the shooting “heartbreaking.”
  
  This is heartbreaking. My thoughts are with#JemelRoberson’s family, friends and community after this awful wake-up call showed just how much work we still have to do to prevent this sort senseless tragedy from ever happening again.https://t.co/8hZvgIg1Tm
  
  Actress Gabrielle Union also tweeted, saying that Roberson was brave and that “his life was snatched.”
  
  "HE'S ONE OF US!" How is it that WE dont count as "us"? That man in the WH & the NRA are silent when "good guys with guns" was the answer they said This is in the town that raised@DwyaneWade&#JemelRobersonis all of us. He was loved. He was brave & his life was snatchedhttps://t.co/T2NcImjixS
  
  “My baby lost his father, his hero” Avontae Boose, the mother of Roberson’s son, told CNN affiliateWLS. “Jemel loved his babies so much.”
  
  Correction:A previous version of this story misstated the city where security guard Jemel Roberson was fatally shot. It was in Robbins, Illinois.
