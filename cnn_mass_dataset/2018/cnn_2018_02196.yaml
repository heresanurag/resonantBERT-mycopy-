title: "50 Cent faces backlash for mocking Terry Crews for his sexual harassment activism"
date: "2018-06-27"
section: "Entertainment"
url: "https://www.cnn.com/2018/06/27/entertainment/50-cent-terry-crews/index.html"
content: |
  Crews spoke out about sexual harassment at Senate hearing
  
  Fans on social media criticize 50 Cent for his postings
  
  Actor/rapper 50 Cent was blasted on social media for mocking Terry Crews after the former “Everybody Hates Chris” star spoke out about sexual assault.
  
  Crews, who in October publiclyaccused a Hollywood executive of groping himat an industry event, appeared Tuesday before a Senate Judiciary Committee hearing for the Sexual Assault Survivors’ Bill of Rights.
  
  Actor Terry Crews tells Senate more men need to talk about sexual assault
  
  50 Cent posted a pair of photos of Crews on Instagram, one showing him topless with the words “I got raped, my wife just watched” superimposed over it and another of the actor with a rose in his mouth and the words “Gym time.”
  
  “LOL,What the f*** is going on out here man?,” 50 Cent wrote in the caption. “Terry: l froze in fear, they would have had to take me to jail. Get the strap.”
  
  The rapper has since deleted the posts, but screen grabs are beingshared on social media.
  
  Many criticized 50 Cent for the posts.
  
  50 Cent is trash and has been for a while. He's disgusting and perpetuates rape culture and he hasn't had a hit since '03. He better apologize to Terry Crews,and people that found what he said funny are just as stupid.
  
  “So Terry Crews had the guts to speak out about assault and 50 cent thinks it’s funny.” one person tweeted. “This is why men bottle up their hurt.”
  
  Actress Kelechi Okafor also called out 50 Cent, who is one of the stars and a producer of the Starz drama “Power.”
  
  “Toxic masculinity is what is doing @50cent instead of showing support to @terrycrews he is mocking him,” she wrote. “Childish.”
