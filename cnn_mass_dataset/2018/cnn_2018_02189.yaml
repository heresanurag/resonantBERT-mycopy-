title: "Title: There has been, on average, 1 school shooting every week this year"
date: "2018-02-01"
section: "US"
url: "https://www.cnn.com/2018/02/01/us/school-shootings-in-2018/index.html"
content: |
  URL Source: https://www.cnn.com/2018/02/01/us/school-shootings-in-2018/index.html
  
  Published Time: 2018-03-02T16:46:17Z
  
  Markdown Content:
  
  We’re **21 weeks** into 2018, and there have already been **23 school shootings** where someone was hurt or killed. That averages out to more than **1 shooting a week**.
  
  The parameters CNN followed in this count are:
  
  *    A shooting that involved at least one person being shot (not including the shooter)
  
  *    A shooting that occurred on school grounds
  
  *    We included grades K through college/university level
  
  *    We included gang violence, fights and domestic violence
  
  *    We included accidental discharge of a firearm as long as the first two parameters are met
  
  Two people were injured when[a gunman opened fire](https://www.cnn.com/2018/05/25/us/indiana-school-shots-fired/index.html) at Noblesville West Middle School in Noblesville, Indiana.
  
  Ad Feedback
  
  Ten people were killed in a shooting at [Santa Fe High School](https://www.cnn.com/2018/05/18/us/texas-school-shooting/index.html).
  
  [A 14-year-old boy went to Highland Hig](https://www.cnn.com/2018/05/11/us/california-school-shots-fired/index.html)h, his former school, and began shooting a semiautomatic rifle shortly before classes were scheduled to begin, officials said. A 15-year-old boy was struck in the shoulder.
  
  A 17-year-old student at Forest High School was shot in the ankle [shortly before students were to walk out](https://www.cnn.com/2018/04/20/us/florida-high-school-shooting/index.html) as part of a national protest against gun violence.. The suspect was a 19-year-old former student.
  
  [A man was shot in the stomach in the parking lot](http://www.kctv5.com/story/37946972/man-shot-in-stomach-at-raytown-south-middle-school-track-meet) of Raytown South Middle School during a track meet.
  
  A student shot another student [with a BB gun in Gloversville Middle School](https://dailygazette.com/article/2018/04/13/gloversville-student-allegedly-shot-other-student-with-bb-gun).
  
  ## **March 20: Lexington Park, Maryland**
  
  [An armed student shot two others at Great Mills High School](https://www.cnn.com/2018/03/20/us/great-mills-high-school-shooting/index.html) before a school resource officer fired a round at the shooter. The shooter was killed. One of the students, 16-year-old girl Jaelynn Willey, [was taken off life support two days later](https://www.cnn.com/2018/03/22/us/maryland-school-shooting-jaelynn-willey/index.html).
  
  A teacher [accidentally discharged a gun during a public safety class](https://www.cnn.com/2018/03/14/us/california-teacher-fires-gun/index.html) at Seaside High School, injuring a student.
  
  One person was hospitalized after [a shooting at an apartment building on the campus](http://www.al.com/news/mobile/index.ssf/2018/03/1_shot_at_university_of_south.html) of the University of South Alabama.
  
  One student was killed and another critically wounded [after an accidental shooting during dismissal time](https://www.cnn.com/2018/03/07/us/birmingham-alabama-school-shooting/index.html) at Huffman High School. Police wouldn’t elaborate further.
  
  A student was [shot inside a dormitory at Jackson State Universit](http://www.msnewsnow.com/story/37671537/jsu-student-shot-on-campus)y. His injuries were not life-threatening.
  
  Two people were shot to death[at a dormitory on the campus of Central Michigan University](https://www.cnn.com/2018/03/02/us/central-michigan-university-shots-fired/index.html). The victims were not students and police think the incident stemmed from a domestic situation.
  
  A student at Norfolk State University [was shot from an adjacent dorm room while he was doing homework](http://wtkr.com/2018/02/27/man-shot-nsu/). He was not seriously injured.
  
  A person was shot [in a rec center at Mississippi Valley State University](http://www.wtvm.com/story/37609290/one-injured-in-shooting-incident-on-mvsu-campus). Police said the person was not a student and the injury was not life-threatening.
  
  A person was shot on the campus of Savannah State University and taken to a nearby hospital where he later died. Neither the victim nor the shooter were university students, [the college said](https://twitter.com/savannahstate/status/967805505807806464?).
  
  ## **February 14: Parkland, Florida**
  
  A 19-year-old man [gunned down students and staff](https://www.cnn.com/2018/02/15/us/florida-high-school-shooting/index.html) with a rifle at Marjory Stoneman Douglas High School in Parkland, slaughtering at least 17 unsuspecting students and adults. The shooter, Nikolas Cruz, had been expelled from the high school over disciplinary problems, officials said.
  
  [A high school student was shot five times](http://www.wsmv.com/story/37500077/14-year-old-suspect-wanted-in-shooting-outside-pearl-cohn-high-school) in the parking lot of Pearl-Cohn High School.
  
  ## **February 5: Oxon Hill, Maryland**
  
  A high school student was shot in the parking lot of Oxon Hill High. The victim was treated and later released. Police arrested two teens and s[aid they are acquaintances of the victim](http://pgpolice.blogspot.ca/2018/02/two-teenage-suspects-in-custody-for-non.html).
  
  A 15-year-old boy was shot in the head and a 15-year-old girl shot in the wrist at [Sal Castro Middle School](https://www.cnn.com/2018/02/01/us/los-angeles-sal-castro-middle-school-shooting/index.html) in Los Angeles, officials said. Two other students were grazed by bullets. A 12-year-old girl was booked for negligent discharge of a firearm in that shooting,[which was considered “unintentional,” Los Angeles police said.](http://www.cnn.com/2018/02/02/us/los-angeles-school-shooting/index.html)
  
  A fight led to a shooting in the parking lot of Lincoln High School, [fatally wounding a 32-year-old man](http://6abc.com/man-32-killed-outside-lincoln-high-school-in-mayfair-idd/3013312/).
  
  A 15-year-old student shot 16 people – killing two other 15-year-olds – at [Marshall County High School](https://www.cnn.com/2018/01/23/us/kentucky-high-school-shooting/index.html), authorities said. The student faces two charges of murder and 12 counts of first degree assault.
  
  A 15-year-old student was wounded in a shooting at a high school in Italy, Texas, authorities said. The suspect, also 15, was quickly apprehended.
  
  A Winston-Salem State University football player, Najee Ali Baker, was [shot to death at a party](http://www.wfmynews2.com/news/crime/man-wanted-in-death-of-winston-salem-state-university-football-player/511252550) on the campus of Wake Forest University.
