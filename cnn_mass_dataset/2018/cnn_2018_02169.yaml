  Jordan is also working on amendments to its anti-human trafficking law and the penal code to strengthen sentences for human trafficking violations.
  
  In November 2017, Al-Maeda was deported back to the Philippines. Tamkeen is still handling her case, which could take years in the Jordanian courts.
  
  Al-Kalash says she will never stop fighting for the rights of migrant workers, trying to improve their situation one case at a time.
  
  “My message to them is, ask for your rights, don’t be afraid,” she said. “Go to a police station, go to the Ministry of Labor, file a complaint against your employer. You have the right … it is very important to empower yourself.”
  
