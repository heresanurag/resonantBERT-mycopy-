  Suzan Koshbay, who heads the Ministry of Social Development’s Anti-Human Trafficking department, told CNN: “Dar Karama is considered the first step in the response to victims of human trafficking.
  
  “It provides them with a safe space, with all the support services … that enable them to begin psychological and physical rehabilitation, and that enable them to acquire skills to lift their feeling of self-value and stop them from becoming victims of human trafficking again.”
  
  According to Al-Kalash, Jordan is considered to have some of the best legislation in the Middle East when it comes to migrant workers. In recent years Jordan passed laws that would protect the rights of migrant workers, like limiting working hours and fining employers for withholding travel documents.
  
  But these laws remain hard to enforce as not all workers come forward with complaints.
  
