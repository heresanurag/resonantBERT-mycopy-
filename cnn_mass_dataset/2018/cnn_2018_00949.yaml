id: cnn_2018_00949
title: "Must-watch videos of the week"
date: "2018-09-14"
section: "App News Section"
url: "https://www.cnn.com/2018/09/14/app-news-section/videos-of-the-week-mobile-sept-14/index.html"
content: |
  A dangerous and unsportsmanlike gesture, rare footage of new fish species and a look inside a 4,000 year-old tomb. These are the videos you don’t want to miss this week.
  
  An Italian Moto2 rider has been dropped from his team after he pulled a rival’s brake while traveling at 130 mph. Fortunately, the other rider only briefly lost his balance and continued the race. This is not the first time the driver in question has been involved in outbursts against other drivers.
  
  Go inside a 4,000 year-old Egyptian tomb that is now open to the public. It belonged to a high-ranking official named Mehu, and features two chambers with intricate wall inscriptions.
  
  “Jeopardy!” host Alex Trebek is sporting a new beard, and people are taking notice. Late-night host Stephen Colbert calls him out for stealing his look.
  
  Carrie Underwood debuted a new song for the NFL’s “Sunday Night Football,” but not everyone is fine with the change. The new tune ignited Twitter, where the harsh words seemed to outweigh the approval.
  
  Scientists have discovered three new species of snailfish in the depths of the Pacific Ocean, capturing their journey on camera. Researchers say their bodies are so fragile, they melt rapidly when brought to the surface.
