  This page includes the show Transcript
  
  The Weekly Newsquiz tests your knowledge of events in the news
  
  Our first story this Friday gives an overview of a shooting that took place earlier this week in California. An illuminating view of Diwali, a view of World War I footage that hasn’t been seen before, and an incredibly high-resolution view from the International Space Station round out our coverage.
  
  Click for a printable version of the Weekly Newsquiz.
  
  1. What is the current U.S. unemployment rate, a percentage that remained the same through September and October?
  
  2. In what South American nation, whose topography includes both the Andes and the Amazon Rainforest, did a doctor become a CNN Hero for his efforts to help children?
  
  3. In 1845, the U.S. Congress passed a law that established the Tuesday after the first Monday in November as what?
  
  4. In what year did Iran and several other countries, led by the U.S., reach a controversial nuclear agreement that the U.S. fully exited this week by reinstating sanctions on Iran?
  
  5. Following the U.S. Midterm Elections, what political party was projected to control the U.S. House of Representatives in the 116th Congress?
  
  6. Following the U.S. Midterm Elections, what political party was projected to control the U.S. Senate in the 116th Congress?
  
  7. What product, announced in 2001 by renowned inventor Dean Kamen, saw a rise, fall, and rise again with its technology being utilized in electric scooters?
  
  8. Name the former U.S. attorney general, also a former U.S. senator from Alabama, who suddenly resigned on Wednesday.
  
  9. Health officials say that acute flaccid myelitis (AFM), which has been detected in 25 states, is similar to what well-known disease that was largely eradicated in the 20th Century?
  
  10. In what year did the Armistice of November 11 bring an end to World War I, a conflict whose scale and technology had never been seen before?
  
