  # If you blinked, you missed the immigration fight
  
  Analysis by [![Image 2: Chris Cillizza](https://media.cnn.com/api/v1/images/stellar/prod/171011105543-chris-cillizza.jpg?q=x_0,y_0,h_1440,w_2558,c_fill/h_270,w_480/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/chris-cillizza)[Chris Cillizza](https://www.cnn.com/profiles/chris-cillizza), CNN Editor-at-large
  
  Updated Feb 16, 2018
  
  Updated Feb 15, 2018, 9:38 PM ET
  
  PUBLISHED Feb 15, 2018, 7:29 PM ET
  
  Immigration Congressional news
  
