  # Emails show FBI officials saddened by Comey firing
  
  By [![Image 1: David Shortell](https://media.cnn.com/api/v1/images/stellar/prod/171201182235-david-shortell-headshot.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/david-shortell)[David Shortell](https://www.cnn.com/profiles/david-shortell)
  
  Feb 5, 2018
  
  PUBLISHED Feb 5, 2018, 4:46 PM ET
  
  Federal agencies
  
