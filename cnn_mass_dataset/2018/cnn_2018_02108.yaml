title: "Why a tiny paper cut can cause such agony"
date: "2018-07-31"
section: "Health"
url: "https://www.cnn.com/2018/07/31/health/paper-cuts-hurt-partner/index.html"
content: |
  They typically occur on parts of our bodies that are the most sensitive
  
  These same highly sensitive areas are also parts we use all the time
  
  Consider, for a moment, the paper cut. It happens suddenly and entirely unexpectedly, usually just as you are finally getting somewhere on that task you had been putting off.
  
  Recall your sense of relief to finish that thank-you note to your aunt for the lovely sweater she sent you three months prior when, at the crucial moment, your hands failed you in their familiar task and the paper’s edge slid past its restraints into the flesh. Then pain – sharp, pure pain that bends your consciousness to the Only. Thing. That. Matters. Right. Now. There is sometimes a moment, between awareness and pain, when you bargain with fate, hoping that what just happened didn’t. But the hand is gone and the blood needs tending.
  
  Body maps reveal the bacteria and chemicals lurking on skin
  
  Physically, paper cuts hurt as much as they do for a variety of reasons. They typically occur on parts of our bodies that are the most sensitive, such as the fingers, lips or tongue. Thenerve networksof these body parts can discriminate with exceptional clarity and specificity, sensations of pressure, heat, cold and injury. Our brains even have specialized areas toreceive signalscoming from these parts in high definition. The exquisite sensing abilities that make our fingers, lips and tongue so good at what they normally do also make injuries all the more painful.
  
  Treating pain in children can teach us about treating pain in adults
  
  These same highly sensitive areas are also parts we use all the time. Cuts on fingers, lips and the tongue tend to reopen throughout the day, dooming us to relive the pain again and again. Finally, the depth of the wound is perfect for exposing and exciting the nerve fibers of the skin without damaging them the way a deeper, more destructive injury can severely damage the nerve fibers impairing their ability to communicate pain. With a paper cut, the nerve fibers are lit, and they are fully operational.
  
  As afamily physician, I can recommend a few practical ways to minimize the discomfort of a paper cut. First, wash the cut as soon as you can with soap and water. This will reduce the chance of infection and help the wound heal quickly. Keep the wound clean, and if possible, for a few days cover it with a small bandage to cushion the wound and limit reopening.
  
  Opioids don’t have to be addictive; new versions will treat pain without triggering pleasure
  
  While the physical effects of a paper cut are a real drag, I am fascinated by the mental and emotional response to the paper cut. While both intentional self-injury (example: cutting) and major accidental injury (example: car accident with loss of limb or paralysis) have inspired important, ongoing research into their psychological effects, minor accidental injuries do not – and that is OK. There are more pressing issues in need of research than paper cuts.
  
  But for a moment think back to the feelings you may have had about your paper cuts: surprise that the mundane act of licking an envelope could result in an injury (and so much blood!); shame that your body didn’t coordinate such a simple task (why does this always happen to me?); anger for hurting yourself (arrrgh!); anxiety that it will happen again (I still have 200 more envelopes to go!). Paper cuts are trivial, but they may invoke a complex emotional response.
  
  Why it’s so hard for doctors to understand your pain
  
  Paper cuts remind us that no matter how many times we have performed even a simple task we are capable of accidentally hurting ourselves. If that makes us a little more sympathetic to our neighbor’s pains, and a little more humble, then maybe paper cuts do us some good too. Maybe.
  
  Gabriel Neal is a clinical assistant professor of family medicine at Texas A&M University.
