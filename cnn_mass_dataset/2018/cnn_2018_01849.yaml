  # Charges will move forward against Amtrak engineer in deadly 2015 crash
  
  By [![Image 1: Ellie Kaufman](https://media.cnn.com/api/v1/images/stellar/prod/171213064314-ellie-kaufman-profile.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/ellie-kaufman)[Ellie Kaufman](https://www.cnn.com/profiles/ellie-kaufman), [Lauren del Valle](https://www.cnn.com/profiles/lauren-del-valle)
  
  Updated Feb 7, 2018
  
  Updated Feb 7, 2018, 2:31 PM ET
  
  PUBLISHED Feb 6, 2018, 8:41 PM ET
  
  Train accidents Federal agencies
  
