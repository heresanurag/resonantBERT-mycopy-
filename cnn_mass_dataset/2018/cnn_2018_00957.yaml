  # House Republicans prepare to vote on short-term spending bill to keep government open
  
  By [![Image 1: Phil Mattingly](https://media.cnn.com/api/v1/images/stellar/prod/160629141409-phil-mattingly-profile.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/phil-mattingliy-profile)[Phil Mattingly](https://www.cnn.com/profiles/phil-mattingliy-profile), [![Image 2: Deirdre Walsh](https://media.cnn.com/api/v1/images/stellar/prod/150123130119-deirdre-walsh.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/deirdre-walsh-profile)[Deirdre Walsh](https://www.cnn.com/profiles/deirdre-walsh-profile)
  
  Feb 6, 2018
  
  PUBLISHED Feb 5, 2018, 8:31 PM ET
  
  Congressional news National security
  
  [See all topics](http://www.cnn.com/follow)
  
