id: cnn_2018_01098
title: "Dead fish scattered on the highway as floodwaters recede in North Carolina"
date: "2018-09-23"
section: "US"
url: "https://www.cnn.com/2018/09/23/us/florence-carolinas-dead-fish-highway/index.html"
content: |
  North Carolina fire crews hosing down Interstate 40after floodwaters recededfound a stunning discovery: Dead fish scattered across the highway.
  
  The flooding from the deadly Hurricane Florence pushed the fish from their natural habitat and stranded them on the interstate, the Penderlea Fire Departmentposted on Facebook on Saturday.
  
  “Well, we can add ‘washing fish off of the interstate’ to the long list of interesting things firefighters get to experience!” it said.
  
  At least 44 people have diedsince the hurricane slammed the Carolinas, sending rivers overflowing into neighborhoods and roadways.
  
  While the rain has subsided, some rivers are still rising, and North and South Carolina officials warn the flooding danger is far from over.
  
  Last week,drone video captured how floodingfrom the storm transformed part of I-40 from a highway into a waterway. In the video taken as part of the state’s damage assessment, a section of the highway is completely underwater.
  
  More than a week after Hurricane Florence made landfall, thetrillions of gallons of waterit dumped over the Carolinas are slowlymoving toward the sea, leaving a path of destruction. Residential streets have turned into rivers, and freeways have morphed into waterways.
