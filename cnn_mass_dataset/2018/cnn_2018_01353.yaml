title: "He ate a slug on a dare, became paralyzed and died"
date: "2018-11-05"
section: "Health"
url: "https://www.cnn.com/2018/11/05/health/man-dies-after-eating-slug-on-dare/index.html"
content: |
  It was just a silly dare among teenage boys. What could it hurt to eat a small slug?
  
  So Australian teenager Sam Ballard grabbed the slimy creature and gulped it down. He had no idea that the slug carried a potentially deadly worm that would put him into a coma that lasted more than a year, paralyze his body and ultimately take his life.
  
  In 2010, 19-year-old Sam, an avid rugby player, was drinking with Jimmy Galvin and several more of his Australian “mates” when a slug began crawling across Galvin’s concrete patio at his home in Sydney.
  
  “We were sitting over here, having a bit of red wine appreciation night, trying to act as grown-ups,” Galvin recalled in avideo interviewthis year with Lisa Wilkinson of “The Sunday Project,” a current affairs talk show that airs on Network 10 in Australia.CNN reached out to Galvin but has not heard back.
  
  “And then the conversation came up, ‘Should I eat it?’ ” recalled Galvin. “And then off Sam went and bang, that’s how it happened.”
  
  In this special report@Lisa_Wilkinsontalks to the amazing family and friends of Sam Ballard#TheProjectTVpic.twitter.com/UXY5KGeWjF
  
  After downing the slug, Sam became weak and complained of severe pain in his legs, according to “The Sunday Project.” Sam’s mother, Katie Ballard, told the news show that at first they worried he might have multiple sclerosis, which had afflicted her husband. But doctors said no, that wasn’t the cause.
  
  Then Sam turned to his mother and told her he had eaten a slug, “And I went, ‘No, no one gets sick from that,’ ” Katie Ballard said. CNN has also reached out to Ballard.
  
  Soon, however, doctors told them otherwise. Sam had developed rat lungworm disease from the infected slug, changing his life forever.
  
  Rat lungworm disease is caused by a parasitic worm called Angiostronjilus cantonensis. As the name suggests, the parasite lodges in the lungs of rats and is later excreted in poop.
  
  Along comes a slug, snail, freshwater crab, shrimp, prawn or frog, and either eats the rat dung or the parasite works its way into the creature infecting it. Fish, however, do not spread the parasite.
  
  Newlyweds contract rare brain parasite during Hawaiian honeymoon
  
  Humans can be infected if they eat the raw or undercooked contaminated animals, or vegetables carrying unseen snails or slugs that have not been thoroughly washed.
  
  In addition, says theUS Centers for Disease Control and Prevention, beverages can become contaminated with worms if left open for snails and slugs to enter.
  
  Unlike in rats, the worm’s life cycle is not completed in a human. So instead of passing through the digestive tract, the worm larvae “can get lost, and it will go to the brain, and it’ll stay there,” said Heather Stockdale Walden, an assistant professor in the Department of Infectious Diseases and Pathology at the University of Florida. The parasite is not passed from human to human.
  
  “When it gets to the brain, you can have eosinophilic meningitis,”Walden said, which is an inflammation of the membranes surrounding the brain and spinal cord.
  
  Symptoms can include headaches, nausea, vomiting, fever and a stiff neck, the CDC said.
  
  Most cases of rat lungworm disease are typically mild. But in some cases, like Sam’s, the disease can cause catastrophic damage.
  
  Soon after the diagnosis, Sam fell into a coma, where he remained for 420 days, Ballard said in the Australian news report. He woke up paralyzed, unable to eat without a tube or move without intense effort. He required 24-hour care, seven days a week.
  
