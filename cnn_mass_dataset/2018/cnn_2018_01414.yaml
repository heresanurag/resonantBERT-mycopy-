title: "OPEC’s reputation in D.C. is hurting. Qatar’s exit will make it worse"
date: "2018-12-14"
section: "Perspectives"
url: "https://www.cnn.com/2018/12/14/perspectives/qatar-leaving-opec/index.html"
content: |
  Editor’s Note:Varsha Koduvayur is a senior research analyst at the Foundation for Defense of Democracies, where she focuses on the Gulf. The opinions expressed in this commentary are her own.
  
  Qatar recently announced that it willleaveOPEC next year, withdrawing after 57 years of membership. The surprise move reveals the deep fissures within OPEC as the cartel’s decision-making power coalesces around Saudi Arabia and non-member Russia. With the bloc striking a bigger-than-expectedproduction cutfor 2019, Qataxit (orOpexit, if you prefer) is likely to create increased oil market volatility while feeding anti-OPEC invective in Washington.
  
  Though its withdrawal will be largely symbolic given Qatar’s status as a minority oil producer — its heft lies innatural gas— it is ajabagainst its regional rival, OPEC kingpin Saudi Arabia, which enacted a boycott against Qatar in June 2017 over allegations that Doha supported terrorism. The decision also sheds light on OPEC members’ growing feelings of exclusion by the Saudi-Russian axis.
  
  In December 2016,Russia and Saudi Arabia, two of the world’s largest oil exporters,teamed upto deliver the OPEC+ cut agreement, which took roughly 1.8 million barrels per day off the market in an attempt to shore up a steepslidein oil prices. The deal marked the first time in 15 years that OPEC and non-OPEC countries had cooperated.
  
  While Qatar’s official reason for exiting is so it can focus more on itsnatural gas ambitions, its energy ministergripedthat oil is “controlled by an organization managed by a country,” a barely-veiled reference to Saudi Arabia. Riyadh’s power within OPEC hassubstantially grown, in large part because it is the only member with significant spare capacity. And though Moscow is not an official member of OPEC, its subsequentcooperationwith Riyadh has set OPEC’s policy since the 2016 deal was struck, with the Saudis appearing keen to transform this relationship into a more long-term arrangement.
  
  Other members’ interests haven’t always aligned with those of the Saudi-Russian axis, fomenting strife in OPEC. Iraq, while agreeing to extend OPEC+ cuts into 2018, noted that it was doing so at personalcost, given the country’s dire fiscal straits. Other OPEC members, including Venezuela, Kuwait, Nigeria and Algeria, reportedly say they feelmarginalizedby Saudi-Russian dominance. While OPEC memberscheeredthat same cooperation in 2016, now they are reportedly privately noting “rising discontent” over Riyadh’s and Moscow’s hold over the bloc’s decision-making. Qatar, whichpumpsjust 600,000 barrels per day, isn’t a big enough producer to feel sidelined by the Saudi-Russian axis — which is itself beset by divergences, casting doubt on how long this newfound cooperation can hold.
  
  It signals OPEC’s lack of unity, even within the Saudi-Russian axis, which could spur greater volatility in oil markets.”
  
  Against this backdrop, Qatar’s exit suggests that OPEC may see increased instability. At minimum, it might embolden other producers to vent their frustrations against Saudi-Russian dominance. It signals OPEC’s lack of unity, evenwithinthe Saudi-Russian axis, which could spur greater volatility in oil markets. But more worryingly for OPEC, it might signal its impending irrelevance. This is not to suggest the cartel’s imminent demise, but OPEC has lost tremendous market power compared to its heyday, asUS shale productionmuscles up. Growing US output, coupled with increasing internal dissonance, risks downgrading OPEC’s decision-making power over markets long term — which could give members cause to re-think their involvement in the bloc. The Saudis, on some level, seem aware of the organization’s dim prospects, givenreportsthat a government-funded think tank has commissioned a study on breaking up OPEC.
  
  All this compounds OPEC’s sinking reputation in Washington, fueled by perceptions that its actions haveraised costson American consumers. The Department of Justice began formally reviewing antitrust legislation against OPEC last month. Dubbed “NOPEC,” the measure would make it illegal to set oil prices or curb its production,removethe sovereign immunity that has safeguarded OPEC members from US legal action, andenablethe attorney general to sue the cartel for price fixing. President Trumprecentlydoubled down on his demands that OPEC keep prices low, while the ceasefire in the US-China trade war, if it holds, couldmitigateprevious fears of an economic downturn and boost oil demand forecasts.
  
  Saudi Crown Prince Mohammed bin Salman cannot afford to alienate President Trump, who is perhaps his best and only western defender given the diminished position he finds himself in following the killing of Saudi critic Jamal Khashoggi. But neither can the young royal afford to distance himself from Russian President Vladimir Putin. Though the two agreed on the need for a production cut, OPEC’s Vienna talks weregreatly complicatedover the precise volumes and on how the burden will be shared by both producers.  Moreover, the two disagree on a range of other important global issues, including the role of Iran in the Middle East.
  
  Qatar’s exit, in exposing OPEC’s internal struggles, is likely to feed Washington’s anti-OPEC sentiment. And given the cartel’s numerous internal fissures, more mixed messaging and volatility is likely in the future, which in turn could hamper President Trump’s efforts to keep a cap on oil prices. Other countries, seeking to minimize reputational taint with an increasingly toxic brand, may be tempted to follow Qatar’s example. For OPEC, Qatexit may foretell a winter of discontent.
