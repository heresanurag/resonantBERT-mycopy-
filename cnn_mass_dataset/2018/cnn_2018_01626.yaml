id: cnn_2018_01626
title: "London’s low-emission zone ineffective in improving child lung health, study says"
date: "2018-11-14"
section: "Health"
url: "https://www.cnn.com/2018/11/14/health/air-pollution-low-emission-zones-child-lung-study-intl/index.html"
content: |
  Traffic control measures have improved air quality in London, but the number of children with poor lung capacity because of traffic pollution remains high, a new analysis says.
  
  Low-emission zones – areas with a daily charge for vehicles that don’t meet emission requirements – were introduced in 2008 and have led to small improvements in nitrogen dioxide and nitrogen oxide levels, found in diesel emissions, according to astudypublished Wednesday.
  
  But no improvements were seen in levels of particulate matter – PM10, less than 10 micrometers in diameter –which can cause premature death and worsening of heart and lung diseases, according to theLondon Air Quality Network.
  
  No G20 countries are meeting climate targets, says report
  
  Despite a reduction in some pollutants, the study found no evidence of a declinein the number of children with reduced lung capacities or asthmatic symptoms since the implementation of the zone in London.
  
  Theauthors stressthat more ambitious control measures are needed to improve childhood respiratory health.
  
  “Traffic pollution harms children’s health, particularly development of lungs,” said Chris Griffiths, professor of primary care at Queen Mary University of London,who co-led the research.
  
  Low emission zones restrict or penalize the entry of polluting vehicles and are often the biggest part of emissions-reducing strategies, according to the study.London’scurrent zonerequires the most polluting diesel vehicles to meet European guidelines.
  
  In 2008, London introduced the world’s largest citywide low-emission zone, encompassing 8.5 million residents. There are 200 other such zones across Europe and several in Asian cities such as Singapore and Tokyo.
  
  Griffiths’ team is the first to look at the effects of large-scale traffic emission controls on air quality improvements and at their effects on children’s health, he said.
  
  Each year from 2009 through 2013, they measured the lung capacity of 400 different primary-school children between 8 and 9 years old in four East London boroughs. All four boroughs were within London’s low emission zone and are heavily polluted, exceeding European Union limits on nitrogen dioxide at the start of the study.
  
  Average exposure concentrations of nitrogen oxides and particulate pollution (PM10 and PM2.5) were measured annually at each child’s home and school addresses.
  
