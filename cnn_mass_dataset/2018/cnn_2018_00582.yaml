id: cnn_2018_00582
title: "Here’s what’s going on with the children separated at the border"
date: "2018-06-25"
section: "US"
url: "https://www.cnn.com/2018/06/25/us/separated-families-what-we-know-dont-know/index.html"
content: |
  If this saga over families separated at the border seems highly confusing, that’s because it is.
  
  We’ve seen a flurry of recent activity from politicians and protesters trying to rectify the situation – yetmany undocumented children are still scattered across the country.
  
  Here’s what we know and don’t know about the complicated situation and what’s next:
  
  – More than2,500 undocumented children have been separatedfrom their parentsin the two months since President Donald Trump’s zero-tolerance policy took effect.
  
  Parents who choose voluntary deportation are told they'll be reunited with children beforehand
  
  The policy meant any adult caught crossing the border illegally would face federal prosecution. And that led tochildren getting sent to federal sheltersacross the country as their parents’ criminal cases progressed.
  
  – The majority of those children have not been reunited with their parents.Government statistics released over the weekend showed more than 2,000 were still in federal custody, and just over 500 had been reunited with their parents.
  
  –A federal judge in California ordered ahalt to most family separationsat the US border.The court orders federal officials to reunify all parents with children age 5 or older within 30 dayswhile parents with children who are under 5 years old should be reunited within 14 days.
  
  – Trump said he wants the US todeport people without judicial proceedings. “We cannot allow all of these people to invade our Country,” he tweeted Sunday.
  
  “When somebody comes in, we must immediately, with no Judges or Court Cases, bring them back from where they came,”he continued. “Our system is a mockery to good immigration policy and Law and Order. Most children come without parents…”
  
  We cannot allow all of these people to invade our Country. When somebody comes in, we must immediately, with no Judges or Court Cases, bring them back from where they came. Our system is a mockery to good immigration policy and Law and Order. Most children come without parents...
  
  ....Our Immigration policy, laughed at all over the world, is very unfair to all of those people who have gone through the system legally and are waiting on line for years! Immigration must be based on merit - we need people who will help to Make America Great Again!
  
  – Secretary of Defense James Mattis saidtwo military installations in Texas – the army’s Fort Bliss and Goodfellow Air Force Base– could be used to temporarily house migrants. Mattis said the military is not involved in the politics of the situation. “For us, it is a logistics support effort,” he said Monday.
  
  – After widespread criticism over thedifficulty in finding separated relatives, the government is working tobetter organize databaseslinking the parents’ and children’s information, federal officials said.
  
  – Even though Trump signed anexecutive order saying families would not be separated in the future, there’s no timeframe onwhen the roughly 2,000 children who are still separated will see their parentsagain.
  
  Senator: We will continue our oversight on reunifications
  
  The administration released a plan to reunite those children with their families – butonly after the parents’ deportation proceedings are completed. The families will either be reunited before deportation or, if the parent is released from detention, after the parent applies to serve as the child’s sponsor under Health and Human Services rules.
  
  – It’s stillunclear who will take responsibility for linking parents with children. None of the agencies involved in the process have been designated as the central keeper of both parents’ and children’s data with the responsibility of putting them back together at the end.
  
  – Wedon’t know if every child will be successfully reunitedwith his or her parent. Wendy Young, president of the advocacy and legal support group Kids in Need of Defense, said the process is “incredibly challenging.”
  
  “What I fear is that it might, in some cases, be impossible,” she said.
