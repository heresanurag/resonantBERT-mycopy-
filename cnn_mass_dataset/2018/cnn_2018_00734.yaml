  Boko Haramcontinues deadly attacks in villages in Nigeria’s northeast despite claims by the military that its troops have reclaimed territories previous inhabited by the militant group.
  
  Nigeria’s army on Sunday said some of its soldiers were killed in an ambush by Boko Haram militants in Yobe, one of the states that has borne the brunt of attacks.
