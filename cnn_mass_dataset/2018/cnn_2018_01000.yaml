  _August 29, 2018_
  
  _We have a very science-oriented show set for Wednesday. Our first report is on a study concerning air pollution and brain health. That’s followed by a look at “space junk” and efforts being made to track it and clean it up. And we’re sitting down with a group of Kodak engineers who unknowingly aided the U.S. government’s spy efforts during the Cold War._
  
