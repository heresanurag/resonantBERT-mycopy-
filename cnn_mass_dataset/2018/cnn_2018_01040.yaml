id: cnn_2018_01040
title: "Nigeria launches app to fight human trafficking"
date: "2018-07-31"
section: "Africa"
url: "https://www.cnn.com/2018/07/31/africa/nigeria-launch-app-to-fight-trafficking-intl/index.html"
content: |
  Nigeria’s anti-trafficking agency has launched an app called iReport that allows people to report cases of human trafficking in the country.
  
  Using the app, citizens can alert local authorities on human trafficking incidents, the National Agency for the Prohibition of Trafficking in Persons (NAPTIP) said in a statement.
  
  She escaped domestic slavery, now she helps other survivors
  
  Nigeria is top among African countries where thousands of women and children are trafficked illegally to destinations abroadespecially in Europe.
  
  The International Organization for Migrationsaid around 11,000 women and 3,000 children who arrived by sea in Italy in 2016 were from Nigeria.
  
  Eighty percent of all women and girls arriving from Nigeria to Europe are potential victims of trafficking for sexual exploitation, the group estimates, noting that exploitation of younger girls is on the rise.
  
  NAPTIP officials foiled an attempt to smuggle ten children out of Nigeria to Russia during the World Cup in June.
  
  World Cup child trafficking plot stopped in Nigeria
  
  The agency said it had secured convictions in 359 cases since it was created in 2003 to tackle growing cases of human trafficking in the country.
  
  Director General of NAPTIP, Julie Okah-Donli said human trafficking networks were recording huge profits from their activities as young women escaping poverty fall into the clutches of traffickers who paint a rosy picture of life in Europe.
  
  Traffickers are “inhuman and barbaric,” and when caught the ultimate punishment should face prosecution, Okah-Donli said in a statement.
