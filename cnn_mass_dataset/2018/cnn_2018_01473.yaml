title: "A teacher who said Stephen Miller ate glue as a child is reassigned"
date: "2018-10-12"
section: "US"
url: "https://www.cnn.com/2018/10/12/us/teacher-reassigned-after-miller-claims-trnd/index.html"
content: |
  A California school district has reassigned a teacher who said Trump aide Stephen Miller would eat glue off his arm when he was in her third grade classroom.
  
  Nikki Fiske is a teacher in the Santa Monica-Malibu Unified School District.
  
  In a piece inThe Hollywood Reporter, she said that when Miller was 8, he would pour glue on his arm, wait for it to dry, peel it off and eat it.
  
  “I remember being concerned about him – not academically,” Fiske said in the piece, which appeared Wednesday. “He had such strange personal habits. He was a loner and isolated and off by himself all the time.”
  
  A district spokesman told CNN it is reviewing the incident but that Fiske has been reassigned.
  
  “The Santa Monica-Malibu Unified School District is looking into this matter and has placed Nikki Fiske on home assignment pending the completion of the review,” district spokesman Gail Pinsker said in an emailed statement Friday.
  
  Millerhas been a part of Donald Trump’s team since January 2016, consistently accompanying the President at rallies and playing a crucial role in the administration’s immigration policies.
