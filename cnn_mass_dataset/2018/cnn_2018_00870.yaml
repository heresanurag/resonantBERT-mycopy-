id: cnn_2018_00870
title: "Trump claims ‘better numbers than Obama,’ though it’s unclear what he means"
date: "2018-08-05"
section: "Politics"
url: "https://www.cnn.com/2018/08/05/politics/donald-trump-approval-tweet/index.html"
content: |
  President Donald Trump touted his approval numbers in a Sunday afternoon tweet that also pointed to the economy and military, while claiming he had “better numbers” than former President Barack Obama “by far,” though he did not specify which numbers he was addressing.
  
  “Presidential Approval numbers are very good - strong economy, military and just about everything else. Better numbers than Obama at this point, by far. We are winning on just about every front and for that reason there will not be a Blue Wave, but there might be a Red Wave!” Trump tweeted.
  
  Presidential Approval numbers are very good - strong economy, military and just about everything else. Better numbers than Obama at this point, by far. We are winning on just about every front and for that reason there will not be a Blue Wave, but there might be a Red Wave!
  
  It was not immediately clear what exact numbers Trump was referring to in claiming improvement over his predecessor, but if his remark was in reference to approval ratings at this point in his presidency relative to Obama’s, his tweet would be incorrect.
  
  In theweekly Gallup pollreleased July 29, 40% of respondents approved of Trump’s performance and 55% said they disapproved. Gallup’s numbers from August 2-8, 2010, showed 45% of respondents approved of Obama’s performance compared to 48% who said they disapproved.
  
  The full story on Trump’s ‘economic turnaround’
  
  Although he did not reference a specific approval rating for his claim on Sunday, Trump has often touted polls that he construes as favorable, andclaimedearly in his presidency that “any negative polls are fake news.”
  
  The economy, by many indicators, is performing strongly. The unemployment ratewas downto 3.9% in the jobs report released Friday, a relatively low level by historic standards. Economic growthin the second quarterof this year was at an annual rate of 4.1%, the best performance since the third quarter of 2014.
