  “I’m not offended easily, so I just looked at him and said ‘If that’s how you feel then you’ve obviously made up your mind, but I’d appreciate if you’d listen to where I stand on other issues,’” he added.
  
  Log Cabin Republicans’ national office tells CNN that they’ve identified six LGBTQ GOP candidates running for office in local and federal offices nationwide. Gregory Angelo, the president of Log Cabin Republicans, said that he sees that LGBTQ Republicans have viable races this year, with some of them running for reelection.
  
  “Throughout America, you are seeing members of the LGBTQ community running for office as so much more than their sexual orientation or gender identity,” Angelo said, adding that over the course of his five years leading the organization, he has “seen a trend of more LGBTQ Republicans running for office, not less.”
