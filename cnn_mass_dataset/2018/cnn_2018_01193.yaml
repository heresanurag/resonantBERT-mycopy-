  Chandler attributed the rise in LGBTQ candidates to “self-defense combined with confidence.”
  
  “When one is under attack you can either crouch down, hide, despair. Or you can stand up and fight. For a lot of LGBT people, it’s about standing up and fighting,” she said.
  
  Christine Hallquist, a Democrat hoping to become Vermont’s next governor, expressed similar sentiments. The former CEO of Vermont Electric Coop, who is running on a platform of environmental and economic justice, transitioned in 2015.
  
  “I was sure I was going to lose my job. I was sure I was going to lose respect. But that didn’t happen,” Hallquist said. “So this describes the beauty of Vermont. So now I’m at this point where I can’t do enough to give back to Vermont.”
  
  Marriage is the least of LGBTQ+ issues at the start of Pride Month
  
  The Victory Institute, an organization with a sister political action committee called the Victory Fund, is geared toward encouraging more LGBTQ candidates to run for office. This election cycle, the fund, which requires candidates to identify as LGBTQ and be pro-choice in order to earn their endorsement, has endorsed 133 candidates. While the institute saw that LGBTQ politicians in office rose 24.8% overall since last year’s annual “Out for America” report, the number of LGBTQ Republicans in office has shrunk at the same time.
  
  Nearly all the LGBTQ candidates CNN spoke with said they were inspired by the historic election of Virginia Democratic delegate Danica Roem, a transgender woman elected in 2017, who was open about her LGBTQ identity, but ran a platform focusing on the district’s road problems.
  
  J.D. Ford, a Democrat running for Indiana’s state Senate, said he sees the rise in LGBTQ candidates partially as a rebuke of state’s anti-LGBTQ policies and the Trump administration.
  
  Ford faces incumbent Republican Mike Delph, who pushed a referendum on same-sex marriage in the state.
  
  “I live in Indiana, so this is the home of Mike Pence. We’re at the epicenter of all that,” Ford said.
  
  “Going back to the past couple of years in Indiana, it’s been very tumultuous for the LGBTQ+ community because of what I call legislative bullying,” Ford added, referring to Delph’s policy pushes and the Religious Freedom Restoration Act signed into law by Pence in 2015.
  
  Republican Gene Truono, a former PayPal executive running to replace Democratic US Sen. Tom Carper, says that despite the small pool of GOP LGBTQ candidates, he doesn’t believe the disparity between Republicans and Democrats among the LGBTQ pool of candidates is necessarily a result of a rebuke of Republican or Trump administration policies.
  
  Among conservatives in his home state, Truono said his sexuality isn’t commonly an issue. He recalled an evangelical pastor telling him on gay marriage: “Gene, as far as I’m concerned that’s a decided issue by the Supreme Court in 2015. I’m more concerned where you stand on life, where you stand on religious freedom and liberty.”
  
  However, Truono also said that though incidents are rare, he has not been immune to scrutiny for his sexuality since deciding to launch the campaign. He encountered one tense incident with some potential voters in West Sussex County.
  
  “Most of the group seemed relatively receptive. There was one gentleman who threw some magazines with gay men on the cover and said, ‘My religion teaches me this is a sin. I can’t support someone like you,’” Truono said.
  
