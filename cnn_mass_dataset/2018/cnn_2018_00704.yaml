title: "Mike ‘The Situation’ Sorrentino sentenced to eight months in prison"
date: "2018-10-05"
section: "Entertainment"
url: "https://www.cnn.com/2018/10/05/entertainment/mike-the-situation-sorrentino-sentenced-prison/index.html"
content: |
  Mike “The Situation” Sorrentino, best known for starring on MTV’s “Jersey Shore,” has been sentenced to prison for tax evasion.
  
  The reality star appeared in New Jersey federal court on Friday and was given an eight month prison sentence, along with two years of supervised release.
  
  He must also pay a fine of $10,000 within 30 days and complete 500 hours of community service.
  
  Sorrentino starred on the MTV series from 2009 to 2012.More recently, he appeared on the show’s spinoff, “Jersey Shore Family Vacation.”
  
  In January, Sorrentino pleaded guilty to tax evasion and concealing income,stemming from a 2014 indictmentfor falsifying business and personal tax returns between 2010 and 2012. Sorrentino’s brother, Marc Sorrentino, was also sentenced on Friday. He received two years in prison and a fine of $75,000.
  
  The U.S. Attorney in New Jersey chargedthe brothersfor filing false tax returns and inaccurately reporting some $8.9 million in income.
  
  Mike Sorrentino reportedly did not pay any income tax in 2011, despite making $2 million that year.
  
  In April, Sorrentino announced he was engagedto Lauren Pesce. She arrived to the court, alongside Sorrentino on Friday.
