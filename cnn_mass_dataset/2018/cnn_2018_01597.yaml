  # Second federal judge blocks move to end DACA
  
  By [![Image 1: Ariane de Vogue](https://media.cnn.com/api/v1/images/stellar/prod/150422092918-ariane-de-vogue-profile.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/ariane-de-vogue-profile)[Ariane de Vogue](https://www.cnn.com/profiles/ariane-de-vogue-profile), CNN Supreme Court Reporter
  
  Updated Feb 13, 2018
  
  Updated Feb 13, 2018, 6:20 PM ET
  
  PUBLISHED Feb 13, 2018, 4:09 PM ET
  
  Immigration Donald Trump
  
