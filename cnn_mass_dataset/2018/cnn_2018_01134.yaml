title: "The 11-year-old Nigerian artist who moved President Macron"
date: "2018-07-04"
section: "Africa"
url: "https://www.cnn.com/2018/07/04/africa/nigerian-boy-paints-french-president/index.html"
content: |
  French President Emmanuel Macron has praised the skills of an 11-year-old Nigerian artist who drew a stunning portrait of him in just two hours.
  
  Kareem Waris Olamilekandrew a portrait of President Macron during his visit to Fela Kuti’s New Africa Shrine in Lagos Tuesday.
  
  Unbelievably talented 11-year old Kazeem paints the President of France on a canvas in just 2 hours at the New Afrika Shrine yesterday. You should have seen the shock on the Macron's face.#Art#Muse#PrideofLagos#AfrikaShrine#afrotourism#africa#culturepic.twitter.com/9Z0DDV25p7
  
  Macron is currently on a two-day visit to Nigeria and attended a cultural showcase at the venue to announce the launch of the Season of African Cultural Season, scheduled to hold in France in 2020.
  
  While waiting for the President to arrive, Olamilekan got to work and created a portrait of Macron, which was presented to him by the event’s host, Nigerian singer, Banky W.
  
  Macron Nigeria visit:  Let's provide new hope for African youth
  
  A visibly moved Macron touched heads with Olamilekan and later took to Twitter to appreciate his work.
  
  He posted a short video of the moment, with the caption, “Very touched. Congrats to this young boy.”
  
  Very touched, congratulations to this young boy!pic.twitter.com/hQd3ylxGnV
  
  Olamilekan is one of the youngest members of a growing community of artists in Lagos creating hyper-realistic charcoal and pencil paintings.
  
  Inside Nigeria's hyperrealist art scene
  
  Hyperrealism is a genre of art that produces hand-drawn images resembling high-resolution photos.
  
  Other young Nigerian creatives, likeArinze StanleyandOscar Ukonu, are using their art to mirror real life.
  
  It’s an aesthetic growing in popularity, amongst both the local art community and an avid global audience.
  
  During the event organized byTRACE media, President Macron was treated to a display from top contemporary Nigerian visual artists Ndidi Emefiele, Abraham Onoriode Oghobase andVictor Ehikhamenor,curated byArtX Lagos fair founder, Tokini Peterside.
