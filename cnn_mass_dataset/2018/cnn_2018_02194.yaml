title: "Settle in with these weekend reads"
date: "2018-08-17"
section: "US"
url: "https://www.cnn.com/2018/08/17/us/weekend-reads-aug-18-trnd/index.html"
content: |
  A sobering question. A historic surgery. Grab a cup of coffee and settle in. Here’s what you might have missed during a busy news week.
  
  A dying teenager’s parents fought for her to go to theworld-renowned hospital.They say Mayo saved her life – then held her “prisoner.”
  
  As accusations of racism against President Trump surround the rollout of Omarosa Manigault Newman’s tell-all book, a journalist asked Kellyanne Conway who themost senior black aide at the White Housewas. The answer? “Ja’Ron.”
  
  Aretha Franklin wasn’t asking a man whether he’d still love her tomorrow. She demanded respect as a condition of her fidelity and money. Artists like Beyoncé and Nicki Minaj,writes Kerra L. Bolton,owe her an enormous debt.
  
  The laser-guided bomb used inan attack on Yemeni schoolchildrenwas sold in a State Department-sanctioned arms deal with Saudi Arabia.
  
  When Katie Stubblefield was 18, she tried to kill herself with a gun. At 21, she became theyoungest person in the US to receive a face transplant.Now, she hopes to use her historic surgery to raise awareness about the lasting harms of suicide and the precious value of life.
  
  As students at Marjory Stoneman Douglas High School and across the country return to classes this week, CNN spoke to designers, architects and security experts to answera sobering question:What should a school look like in the age of the mass shooting?
  
  While the release of “Crazy Rich Asians” is a big event for the Asian-American community,Jeff Yang writesthat it’s really a movie everyone should see. It does what few films of recent memory do: It reminds us that the ultra-wealthy generally don’t live up to the sales pitch that they, Hollywood and the Republican Party have collectively tried to sell us.
