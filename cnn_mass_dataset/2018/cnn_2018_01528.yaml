  ### Story highlights
  
  This page includes the show Transcript
  
  _September 26, 2018_
  
  _Tensions flare between the U.S. and Iran at the U.N. General Assembly. Today’s show gives you a sense of what their leaders said. We’re also explaining why the worst damage from Hurricane Florence may still be ahead for a community in South Carolina. And we’re taking you back in time to when people with long sticks worked as alarm clocks._
  
