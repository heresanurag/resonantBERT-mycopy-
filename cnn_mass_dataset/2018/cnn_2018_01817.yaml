id: cnn_2018_01817
title: "Parkland school shooter told detective he heard a demon in his head, transcript shows"
date: "2018-08-07"
section: "US"
url: "https://www.cnn.com/2018/08/07/us/florida-parkland-nikolas-cruz/index.html"
content: |
  Marjory Stoneman Douglas school shooter Nikolas Cruz told a detective shortly after the February massacre that a voice in his head the night before the shooting told him to hurt people.
  
  Cruz is accused of killing17 students and facultyat the school in Parkland, Florida. Court documents show the former student has confessed to being the gunman. However, a judge entered aplea of not guiltyon Cruz’s after he stood mute to the charges in March.
  
  Documents released Monday by the Broward County state attorney’s office include a transcript of Cruz’s conversation with a detective after his arrest on the day of the shooting, February 14. The transcript shows the gunman talking about his deceased parents and a demon that Cruz said was in his head. The document also details a meeting Cruz had with his younger brother.
  
  In the beginning of the interview, the detective asked Cruz whether he would like some cold water. Cruz answered, “I don’t know.” and then when pressed by the detective why he didn’t know he told him, “I don’t deserve it.”
  
  Cruz was read his rights and chose to continue the video-taped interview with the detective.
  
  Several times when the detective left the room, Cruz spoke to himself saying, “Kill me. Just (expletive) kill me. (expletive).”
  
  Another time, Cruz said, “I want to die. At the end you’re nothing but worthless (expletive) dude. You deserve to die because you’re (expletive) worthless and you (expletive) (unintelligible) everyone. I want to die.”
  
  Cruz spoke to the detective about what he called a demon in his head, according to the transcript of the interview. Cruz said the voice told him to do bad things, including the night before the shooting. He said it was the voice that told him to buy the AR-15 and to take an Uber ride to Marjory Stoneman Douglas the day of the shooting.
  
  The detective asked Cruz what the demon told him to do. Cruz answered, “Burn. Kill. Destroy.”
  
  He told the detective that he sometimes used the drug Xanax and marijuana to make the voice go away.
  
  Cruz said the voice was talking to him while he was there in the interrogation room, telling him to kill himself.
  
  The detective pushed Cruz on whether or not the voice really existed, “You could have stopped the demon by getting a prescription for marijuana. You could have stopped the demon by getting a prescription for Xanax. You could have stopped the demon any time you want. You didn’t want to stop the demon.”
  
  Cruz became defensive of those accusations, and told the detective over and over, “I don’t like the demon,” before asking for an attorney and ending the interrogation.
  
  When the detective left the room, Cruz again started talking to himself. “Why didn’t he kill me?” he repeated over and over.
  
  Several parts of the transcript were redacted in accordance with Florida law, which exempts public disclosure of the substance of a confession of a person arrested until the case is fully resolved. The judge in the Cruz case ruled that parts of his statement to police could be released because they are not considered substance of a confession.
  
  Cruz, a former Stoneman Douglas student, roamed the hallways of the 1200 building on campus February 14 for several minutes, targeting victims huddled in classrooms on the first and second floors, killing 14 students and three school employees in one of thedeadliest mass shootings in modern US history.
  
  A Broward County grand jury indicted the 19-year-old Cruz in March on 17 counts of premeditated murder in the first degree and 17 counts of attempted murder in the first degree, and a judge entered a not-guilty plea on his behalf during his arraignment.
  
  Broward Countyprosecutors have said they plan to seek the death penaltydespite his attorney’s offer of a guilty plea in exchange for a life sentence.
