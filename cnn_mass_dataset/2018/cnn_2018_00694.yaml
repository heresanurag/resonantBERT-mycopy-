id: cnn_2018_00694
title: "Largest known diamond in North America found in Canada"
date: "2018-12-14"
section: "World"
url: "https://www.cnn.com/2018/12/14/world/552-carat-diamond-found-in-canada/index.html"
content: |
  A 552-carat yellow diamond was recently unearthed in Canada – the largest ever found in North America.
  
  Mining company Dominion Diamond Minessaid in a press releaseon Thursday the diamond was discovered in October at the Diavik Diamond Mine in Canada’s Northwest Territories.
  
