title: "Here’s how the Senate Judiciary Committee voted"
date: "2018-09-28"
section: "Politics"
url: "https://www.cnn.com/2018/09/28/politics/kavanaugh-judiciary-committee-votes/index.html"
content: |
  The 21 members of the Senate Judiciary Committee voted 11-10 on Friday to move Judge Brett Kavanaugh’s nomination to the full Senate. All Republicans senators voted yes and all Democrats voted no. Sen. Jeff Flake called for a one-week delay in Kavanaugh’s nomination vote so that an FBI investigation can occur.
  
  See how the committee voted below.
  
