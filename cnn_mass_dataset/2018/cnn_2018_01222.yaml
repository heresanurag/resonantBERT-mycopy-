title: "Car manufacturers seek tech solutions to hot car deaths"
date: "2018-07-31"
section: "Health"
url: "https://www.cnn.com/2018/07/31/health/nissan-rear-door-alert-hot-car-deaths/index.html"
content: |
  Experts estimate 37 children die each year from being left in hot cars
  
  Nissan aims to have rear door alerts in all four-door trucks, sedans and SUVs by model year 2022
  
  Thirty-seven children die each year as a result of being left in a hot car according to theNational Safety Council. Every death seems to prompt a discussion on ways to prevent these tragedies by reminding drivers of their precious backseat cargo.
  
  Safety advocates have just scored a win as automaker Nissan announced plans Tuesday to make rear door alerts standard in eight vehicle types by model year 2019.
  
  The system will notify drivers if the rear door was opened before a trip but not reopened after the car is parked and the ignition is turned off, with an initial display in the instrument panel and a series of discrete honks. Nissan aims to have the rear door alerts in all four-door trucks, sedans and SUVs by model year 2022, the company said in a statement.
  
  “We kept reading all these incidences of children accidentally left in cars and we were really worried,” said Marlene Mendoza, a mechanical engineer at Nissan who developed the technology with fellow engineer and mother, Elsa Foley.
  
  They asked themselves, “Is there something we can do?” Mendoza said.
  
  More than 36 kids die in hot cars every year and July is usually the deadliest month
  
  They started brainstorming and working on the concept in 2014 but the idea for the alert came while Mendoza was pregnant and accidentally left a pan of lasagna in her backseat overnight. She said the car smelled for days after but it made her wonder about what could happen if she left something – or someone – more important back there.
  
  “It can help so many people at different levels,” she said.
  
  GMCalso developed a rear seat reminder feature in most of their 2018 models to help remind parents to look before they lock.Hyundaicreated a reminder system that detects children’s movements in the backseat.
  
  While child safety advocates are pleased car companies are implementing technology, they say it cannot stop there.
  
  “I think all alert systems can be helpful,” said Miles Harrison, of Purcellville, Virginia. “But alert systems alone will not work. It needs to be an alert system and a regular messaging system somehow. Because most people, myself included, can’t believe this can happen to them. It’s so unbelievable. You can’t walk in someone else’s shoes.”
  
  37 US children die in hot cars each year, report says
  
  Harrison is one of thehundreds of parents and caregiverswho have lost a child to vehicular heatstroke. Hisone-and-a-half-year-old son Chasedied in July 2008 after Harrison accidentally left him in the backseat of his car and went to work instead of dropping him off at daycare. Harrison said it’s imperative that more warnings and messaging about the dangers of leaving a child behind get shared in birthing centers, daycares and schools.
  
  “It is terribly hard,” he said. “I think part of it is this intense guilt that I still feel. The other part is I don’t want parents to have to go through what I put my family through. I don’t want them to have to wake up every morning like I do.”
  
  The National Highway Traffic Safety Administration created theHeatstroke Awareness Challengein July to encourage the public to create and share short videos that spread awareness about heatstroke. The organization encourages parents and caregivers to check the backseat before locking, keep the keys out of reach of children to prevent them from getting in alone, and to take action if a child is left alone in a vehicle.
  
  “As temperatures around the country continue to rise, and summer schedules change routines, we recognize, tragically, that the heatstroke death toll is only going to climb,” said Heidi King, the Deputy Administrator of the National Highway Traffic Safety Administrationin an op-ed. “It’s up to everyone – parents, guardians, and even bystanders – to end these senseless and preventable tragedies.”
  
  More than 36 kids die in hot cars every year and there's no clear solution
  
  A car’s temperature can shoot up by 20 degrees in just 10 minutes and because of climate change, more days are expected to be hotter, according to theAmerican Academy of Pediatrics. A child’s body overheats faster than an adult’s and starts shutting down at 104 degrees Fahrenheit. Twenty-six children have died so far from heatstroke in 2018 alone, according to the US Department of Transportation.
  
  “We’ve introduced theHot Cars Actand it would require a reminder alert system in all new vehicles to prevent hot car deaths,” said Amber Rollins, director of the safety organization KidsAndCars.org. “It’s not a prescriptive bill, so it doesn’t call for any specific type of technology but it calls for the National Highway Traffic Safety Administration to take a look at what’s available and decide what the best solution would be.”
  
  The bill was attached to the federal Self Drive Act, which was introduced and passed in the House in 2017. Its companion in the Senate, the AV Start Act, passed through the Commerce, Science and Transportation Committee but awaits confirmation by the full Senate. If the bill doesn’t make it through, Rollins said it will be reintroduced in the next congressional session.
  
  Safety can be looked at from several angles, Rollins said, citing examples of technology installed in the vehicle or added to car seats.
  
  The child seat and stroller company Evenflo createdSensorSafe, a chest clip that connects with a wireless receiver to trigger an alert. When the driver reaches their destination and turns off their vehicle, it sounds an audio reminder that there’s a baby in the back.
  
  Evenflo’s parent company also makes car seats that use an app for an additional prompt.
  
  There are even more sophisticated systems that would sense a child’s presence through movement or carbon dioxide sensors, she added.
  
  “You can also start doing something today, like putting your bag in the back,” said Emma Klingman, a board member of theSofia Foundation for Children’s Safety. “It doesn’t cost any money; you don’t need to buy anything; you don’t need a new car. We’re really hoping we can help prevent this from happening to people even in the meantime as technology is being developed.”
  
  Correction:An earlier version of this story incorrectly referred to Amber Rollins as Amber Collins.Also, a previous version of the story inaccurately described how the SensorSafe chest clip works.
