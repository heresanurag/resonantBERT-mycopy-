  There is no specific treatment for AFM, but treatments that have been tried includeimmunoglobulin replacement therapy, corticosteroids,plasma exchangeand antiviral therapy, according to theNational Institutes of Health.
  
  “This is a relatively uncommon syndrome. So I think that should be reassuring to people,” Dominguez said. “This is likely a rare complication from a common virus.”
