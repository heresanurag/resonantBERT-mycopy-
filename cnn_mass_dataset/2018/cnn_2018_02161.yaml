title: "Most states facing confirmed or possible cases of polio-like illness"
date: "2018-10-15"
section: "Health"
url: "https://www.cnn.com/2018/10/15/health/acute-flaccid-myelitis-cases-states/index.html"
content: |
  Acute flaccid myelitis is rare neurological condition that can result in temporary or permanent paralysis
  
  30 states had cases that were confirmed, suspected or being investigated, CNN finds
  
  This year, more than half of all US states have had confirmed or possible cases of acute flaccid myelitis, the polio-like illness that can cause paralysis and mostly affects children, according to an exclusive CNN analysis.
  
  In total, CNN found 47 confirmed cases and 49 more that were suspected or being investigated, for a total of 96.
  
  The US Centers for Disease Control and Prevention, which releases only confirmed numbers, says16 states had 38 casesas of September 30. It does not identify the states.
  
  The states reporting confirmed cases are Arizona, Colorado, Georgia, Indiana, Iowa, Massachusetts, Minnesota, New Jersey, North Carolina, Ohio, Pennsylvania, Rhode Island, South Carolina, Texas and Wisconsin.
  
  States reporting suspected cases or cases under investigation are Alabama, Arkansas, California, Florida, Illinois, Kentucky, Louisiana, Maryland, Massachusetts, Michigan, Montana, Nebraska, Nevada, New York, North Carolina, Oklahoma and Washington.
  
  Acute flaccid myelitis, also called AFM, is a rare but serious condition that affects the nervous system, with a particular focus on the gray matter of the spinal cord. It affects fewer than one in a million people each year across the country, the CDC estimates.
  
  The agency has seen an increase in cases since August 2014. Although the cause remains a mystery in the majority of cases, the 2014 jump coincided with “a national outbreak of severe respiratory illness among people caused by enterovirus D68,” though it wasn’t found in all patients, according to the CDC.
  
  Young survivor of rare polio-like illness now thriving
  
  Other enteroviruses have also been found in patients with AFM. For example, 11 of the Colorado cases of AFM this year have tested positive for EV A71, a rare type of enterovirus not usually seen in the US, rather in Asia and other parts of the world, according to state epidemiologist Dr. Rachel Herlihy.
  
  “The most common etiology is probably a viral infection that starts off the process, and there’s probably several different viruses that can cause acute flaccid myelitis,”saidDr. Samuel Dominguez, medical director of the clinical microbiology laboratory at Children’s Hospital Colorado.
  
  In addition to viruses,potential causesmay include environmental toxins and genetic disorders, according to the CDC, and it “can be difficult to diagnose because it shares many of the same symptoms as other neurologic diseases.” It is not a reportable disease in all states.
  
  Symptoms can include sudden limb weakness, loss of muscle tone and reflexes, facial and eyelid drooping, difficulty moving the eyes, difficulty swallowing, slurred speech and, in the most severe cases, difficulty breathing,according to the CDC.What happens to patients down the line is unclear; some recover quickly, while others may need long-term care.
  
