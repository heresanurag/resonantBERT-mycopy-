title: "Props are having a moment: The week in politics, GIF’d"
date: "2018-07-27"
section: "Politics"
url: "https://www.cnn.com/2018/07/27/politics/political-gifs-of-the-week/index.html"
content: |
  If I had a dollar for every time I exclaimed “What a week!” with an exasperated sigh, I might be able to afford one share of Facebook stock (especially after yesterday). But it was indeed another one of those weeks, and props emerged as the breakout star. Let’s relive it together, on loop.
  
  Senate Foreign Relations Committee Chairman Bob Corker wasnot thrilledwith Secretary of State Mike Pompeo’s appearance before the committee. You know when the glasses come out, things are getting serious. Or things need to be read. Sometimes both.
  
  Secret audio recordings are having their biggest momentsince the 1990s. Michael Cohensecretly recordeda conversation with then-candidate Donald Trump. This week Lanny Davis, Cohen’s attorney and apparentexpert in staying relevant,released the tapeto CNN. Look at how animated he got over it!
  
  This week’s drama didn’t stop Trump from taking a“Made in America”products tour on the lawn of the White House. Honestly, it looked a lot like aShowcase Showdownfrom “The Price is Right,” which is amazing. I want to win a new RV (even though I don’t have a driveway, hate nature and have no idea what I’d do with it).
  
  Trump scaled down his prop during atrip to the Midweston Thursday. He showed off a twist on the classic MAGA hat, this one reading “Make Our Farmers Great Again.” Apologies to any farmers who currently thought they were great. Your parents lied to you.
  
  This headgear wins the week. Trump got a custom hard hat during atrip to Granite City, Illinois. While this was not Trump’s first time sporting safety gear – he famously donned aminer’s helmet in West Virginia– he gave off strong“Blue Steel”vibes this time around. Hard hats: So hot right now.
  
  High five, Sen. Orrin Hatch! You’re alive and thriving! Earlier this week, Google searching the senator would return a result saying that hedied last year. Clearly not the case. He had a good sense of humor about it, though, whereas most of us probably would have been sent spiraling into an existential crisis.
