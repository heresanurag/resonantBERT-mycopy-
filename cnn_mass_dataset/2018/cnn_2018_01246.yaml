  Editor’s Note:Liza Donnellyis an award-winning cartoonist for The New Yorker and writer whose book “Women On Men” was a finalist for the Thurber Prize for American Humor and whose history of women cartoonists, “Funny Ladies: The New Yorker’s Women Cartoonists and Their Cartoons,” is considered a resource for historians. She has curated and been in numerous exhibitions around the world, and is vice president of theAmerican Association of Editorial Cartoonists. Follow her@LizaDonnelly. The views expressed here are solely hers. View moreopinionarticles on CNN.
  
  We have become accustomed to our American presidential plane’s look. Air Force One is quite a very nice-looking airplane – blue and white with red accents. But does it say “American” in a way that President Trump approves?
  
  Apparently not, as Trumpreportedly would like to redesignit, which is his prerogative as President. When I heard that he was going to go through with the redesign, I began to envision what he might instruct the designers to do.
  
  I am a cartoonist, I can’t help it.
  
  Trump loves his hats, and wears a variety of them at every opportunity. Why would he deny his plane a giant-sized hat? They could be interchangeable:  “USA,” “Trump”  or the fan favorite: “Make America Great Again.”
  
  Everyone knows that Trump is patriotic. Everyone also knows that Trump likes to be patriotic in a way so that everyone knows he’s VERY patriotic.  Never enough flags. And while designers are at it, make the non-flag surfaces of the plane gold-plated, and add a diamond on the nose of the plane to let the world know that America is going to win – a lot.
  
  This gold, bejeweled, crowned plane is one that Trump might envision, but then again he might not.
