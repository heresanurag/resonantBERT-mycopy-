title: "Start your Monday smart: A deadline for Sears, a Harry-Meghan tour, Canada legalizes pot"
date: "2018-10-14"
section: "World"
url: "https://www.cnn.com/2018/10/14/world/five-things-october-14-trnd/index.html"
content: |
  Getting ready to grab a gorgeous, Instagram-worthy brunch? There are actuallyrestaurants that have become famousbecause of this super-photogenic food trend.
  
  Here’s what else you need to know toStart Your Week Smart.
  
  •Searsfaces a critical deadline.Sears Holdings, the parent company ofSearsandKmart, has to come up with $134 million. The most recent filing from Sears showed it had only $193 million in cash on hand as of August 4, the end of its last fiscal quarter. Having so little cash available would make it difficult for the former retail giant to pay its debt by this deadline. All signs point to a bankruptcy filing soon.
  
  • November’s midterm electionsare fast approaching, and we’ll get a taste of one of the biggest contests whenSen. Ted Cruz of Texasandhis Democratic challenger,Beto O’Rourke, come together for a debate inSan Antonio. O’Rourke’s campaign just had a record-smashing third quarterfundraising haul of $38.1 million– the most ever raised in a quarter by a US Senate campaign – but he’s trailing Cruz in the polls.
  
  • If you’d literally rather be on the other side of the world than deal with more political rancor, watch out forPrince HarryandMeghan, the Duchess of Sussex, as the British royals head off toSydney, Australiaona 16-day tour of theSouth Pacific. The tour will coincide with the Invictus Games (more on those later). The couple made their first public appearance together at the2017 games.
  
  • Are you done being sad about baseball, or are now getting sad about football? Well,a brand-new NBA season tips off, heralding a fresh crop of opportunities to be sad about yet another sport! Why do you do this to yourself? Anyway, thePhiladelphia 76ersplay theBoston Celticsat 8 p.m. ET, and the West Conference gets theOklahoma City Thundervs. theGolden State Warriorsat 10:30 p.m. ET.
  
  •Our Canadian friendswill have high hopes asadult-use marijuana is set to go on salein approved dispensaries throughout the country.Uruguay,which became the first country to legalize recreational marijuana in 2013, is still going throughgrowing pains in setting up its market.
  
  •President Donald Trumpwill awardtheMedal of Honorto retired MarineSgt. Maj. John L. Canleyfor conspicuous gallantry. Canley fought off enemy attacks to lead a group of wounded Marines to safety during his time inVietnamin 1968.
  
  •Jamie Lee Curtisreturns in the role that made her famous in arebootof the 1978 horror classic“Halloween.”Original directorJohn Carpenterwas an executive producer and creative consultant on the flick.
  
  •The Student Gun Violence Summitstarts in Washington, where representatives from around the country will review student plans to reduce gun violence. Along with input from teachers and other students, they’re hoping to combine all of the proposals into a single “Students’ Bill of Rights.”
  
  •The Invictus Games kick offin Sydney and run through October 27. Remember, this is the multisport competition that Prince Harry started, and it features wounded service members from around the world doing what they do best: being stone-cold warriors.
