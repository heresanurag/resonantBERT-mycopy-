  In aposton his official website decrying the impact of climate change, Young said “I have lost my home before to a California wildfire, now another.”
  
  The Woolsey fire is one of three major blazes burning across California. As of Sunday night, the fire had spread to 85,500 acres and was 15% contained.
  
  Together with the smaller Hill fire, which spans 4,531 acres, the Woolsey fire has so far destroyed 179 structures, but fire officials say another 57,000 are threatened. The Hill fire was 75% contained as of Sunday night.
  
  The third fire, Northern California’s Camp fire, is the most destructive in state history andone of the deadliest. That blaze virtually burned the town of Paradise to the ground, destroying thousands of homes and structures. Some 228 people are unaccounted for.
  
  At least 31 people have died in the fires: 29 in the Camp fire and two in the Woolsey fire.
  
  “This is not the new normal, this is the new abnormal,” Gov. Jerry Brown said of the role of climate change in driving the fires. “The chickens are coming home to roost, this is real here.”
  
  Los Angeles County Fire Chief Daryl Osby echoed Brown’s sentiments, noting how widespread the fire destruction has been across the state.
  
  Why the California wildfires are spreading so quickly
  
  The southern part of the state used to be able to rely on help from their counterparts up north around this time of the year, Osby said, when the threat of fire was much less prevalent in those communities. But that’s no longer the case.
  
  “And as evident by the Camp Fire in Northern California – which is larger than this, more structures have been lost than this, more lives have been lost – it’s evident from that situation statewide that we’re in climate change and it’s going to be here for the foreseeable future,” Osby said.
  
  Firefighters on Sunday contained significant flare-ups in wind-prone canyons along the Pacific Coast Highway in Malibu and Bell Canyon in Ventura County, Osby said.
  
  Unfavorable conditions are expected to persist into Monday, threatening new flare-ups that could reach beyond containment lines, Osby said.
  
  Though the state’s drought has eased slightly, it’s still abnormally dry, according toCNN meteorologist Taylor Ward. That leaves a lot of dry vegetation to feed fires.
  
  Osby urged those in mandatory evacuation zones to leave, warning that they can get in the way of firefighting efforts.
