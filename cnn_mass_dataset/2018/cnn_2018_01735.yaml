  _February 20, 2018_
  
  _CNN 10 kicks off a new week by explaining why the U.S. recently indicted 13 Russian citizens. We’re also looking at how proposed U.S. tariffs could impact both American and Chinese metal industries. And we’re plunging into frigid waters with a minke whale and the camera that lets scientists see what the animal does._
  
