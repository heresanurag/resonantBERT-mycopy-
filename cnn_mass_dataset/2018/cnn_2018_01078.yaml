title: "IOC preparing ‘detailed heat countermeasures’ for Tokyo 2020"
date: "2018-07-24"
section: "Sport"
url: "https://www.cnn.com/2018/07/24/sport/tokyo-2020-olympics/index.html"
content: |
  With exactly two years to go until the Tokyo 2020 Olympics, Japan continues to swelter under searing heat.
  
  Dozens of people have died across the nation since early July, with 11 losing their life to the deadly heatwave on Saturday alone.
  
  Temperatures have been almost 11 degrees hotter than the average at this time of year — the mercury rising to over 41 degrees (105.8F) in the city of Kumagaya, a short drive from the capital.
  
  The heatwave has prompted the International Olympic Committee (IOC) to outline the “detailed heat countermeasures” it’s planning to protect athletes, fans and the workers who will put on the Games.
  
  “You will see the first step has already been reflected in the competition schedule, with specific events held at certain times to ensure the wellbeing of athletes,” said an IOC spokeperson in a statement sent to CNN.
  
  Track and field events held at the open-air New National Stadium will take place in morning and evening sessions, with competitors typically remaining in the shade between 13:00 and 19:00.
  
  The men’s and women’s marathons will both be finished before 10:00, while the the triathlons and outdoor swims are similarly scheduled to be wrapped up before noon.
  
  Even so concerns remain over the impact such potentially oppressive heat could have on athletes.
  
  Tokyo University professor Makoto Yokohariwarned earlier this year that the Games could bring “some of the worst conditions in the history of marathon running,” adding “you should never run in this kind of heat and humidity.”
  
  Yokohari rates the prospective marathon course as “dangerous” or “extremely dangerous” on clear sunny days.
  
  Steps are being taken to reduce the risks, with trees planted around the course to offer shade and “mist-spraying technologies” implemented to cool spectators.
  
  But there are fears that we could see scenes of exhaustion similar to Gabriela Andersen’s infamousstaggering finishto the 1984 women’s marathon at the Los Angeles Games, or triathlete Alistair Brownlee’snear-collapse at a 2016 eventon the Caribbean island of Cozumel.
  
  “In recent days Tokyo and Japan has been like living in a sauna every day,” Tokyo Governor Yuriko Koike said on Monday.
  
