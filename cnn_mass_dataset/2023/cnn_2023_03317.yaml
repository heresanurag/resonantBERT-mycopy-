id: cnn_2023_03317
title: "France star Paul Pogba provisionally suspended after drugs test"
date: "2023-09-12"
section: "Sport"
url: "https://www.cnn.com/2023/09/12/sport/paul-pogba-provisionally-suspended-doping-spt-intl/index.html"
content: |
  France and Juventus starPaul Pogbahas been provisionally suspended after testing positive for a banned substance, Italy’s national anti-doping  tribunal (NADO Italia) said.
  
  In astatementMonday, NADO Italia said that testosterone, which can be used to increase athletic endurance, was detected in the midfielder’s system.
  
  Juventus confirmed in astatementthat Pogba had been provisionally suspended. The tests, the club said, took place on August 20. Juve beat Udinese 3-0 that day with Pogba on the bench as an unused substitute.
  
  Pogba’s agent, Rafaela Pimenta, said in a statement: “We are waiting for the counter analysis and until then we cannot say anything.”
  
  “What is certain is that Paul Pogba never wanted to break the rules,” Pimenta added.
  
  Pogba must now wait for the results of the B sample. If found guilty of doping, he may face asuspensionof between two and four years.
  
  “The club reserves the right to consider the next procedural steps,” Juventus added in itsstatement.
  
  In his prime, Pogba was one of the best midfielders in the world and was a key member of France’s World Cup-winning team in 2018.
  
  He has struggled with injuries and form in recent years, missing out on last year’s World Cup in Qatar because of injury. He returned to Juventus in 2022 after a disappointing spell at Manchester United.
  
  The 30-year-old barely played last season due to injury and has made just two substitute appearances for theVecchia Signorain the league since the start of the new campaign.
