title: "‘Unstoppable’ energy transition means demand for oil, gas, and coal set to peak by 2030"
date: "2023-10-24"
section: "Energy"
url: "https://www.cnn.com/2023/10/24/energy/iea-oil-gas-coal-demand-peak-2030/index.html"
content: |
  Global demand for oil, natural gas and coal — and the carbon pollution they generate — areexpected to peaklater this decade, according to a new report by the International Energy Agency.
  
  Driving the shift will be the “phenomenal rise” of clean sources of energy, the Paris-based agency said in its annual World Energy Outlookreport, published Tuesday.
  
  The agency said it expects there to be nearly 10 times as many electric cars on the road globally by the end of the decade, and for renewables to account for almost half of the global energy mix, up from 30% today.
  
  Slowinggrowth in Chinawill also depress demand for fossil fuels. The world’s second biggest economy — and largest energy consumer — has reached an “inflection point,” the IEA said, with its total energy demand set to peak around the middle of the decade. China is also becoming a “clean energy powerhouse,” and accounted for more than half of electric vehicle sales worldwide last year.
  
  “The transition to clean energy is happening worldwide and it’s unstoppable. It’s not a question of ‘if’, it’s just a matter of ‘how soon’ — and the sooner the better for all of us,” IEA Executive Director Fatih Birol said in a statement.
  
  The IEA report challenges calls by the Organization of the Petroleum Exporting Countries (OPEC) — a group of the world’s major oil producing nations — fortrillions of dollarsof new investment into the sector between now and 2045 to prevent a spike in energy prices.
  
  And it stands in sharp contrast to moves in recent days by America’s biggest oil and gas companies — ExxonMobil (XOM) and Chevron (CVX) — to double down on the future of US shale production by acquiring smaller rivals Pioneer (PXD) and Hess (HES) in deals valued at$60 billionand$53 billionrespectively.
  
  Head of OPEC warns of a 'dangerous' lack of investment in oil
  
  “The end of the growth era for fossil fuels does not mean an end to fossil fuel investment, but it undercuts the rationale for any increase in spending,” the agency said in its report.
  
  In the near term, oil prices could be driven much higher by the war triggered by the brutal attack by Hamas on Israel on October 7. Brent crude, the global benchmark, has gained nearly 7% since then.
  
  Birol said that the conflict couldrock oil markets, 50 years after the world was plunged into an energy crisis by an Arab oil embargo triggered by the 1973 Yom Kippur war.
  
  “We are today facing a major geopolitical crisis in the Middle East that could shock oil markets once again and deeply, because many oil producing countries are in that region,” Birol told reporters.
  
  “This comes on top of the insecurity that we had in the natural gas markets… after the invasion of Ukraine by Russia,” he added.
  
  Despite the accelerating shift to renewables, and lasting changes to consumption patterns in countries such as China, the IEA — which monitors energy trends for the world’s richest economies — warned that more needed to be done if the world is to stand a chance of limiting global warming to1.5 degreesCelsius.
  
  “Based on today’s policy settings, global emissions would remain high enough to push up global average temperatures by around 2.4 degrees Celsius this century,” it said.
  
  Scientists consider warming of 1.5 degrees a threshold beyond which extreme heat, floods, droughts, wildfires, and food and water shortages will have an even greater impact on life as we know it. This year’s summer in the Northern Hemisphere was the world’shottest on record, according to the European Union’s Copernicus Climate Change Service.
