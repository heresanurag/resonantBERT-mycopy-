title: "Living with air pollution, especially from wildfires or agriculture, raises risk of dementia, US study finds"
date: "2023-08-14"
section: "Health"
url: "https://www.cnn.com/2023/08/14/health/particle-air-pollution-dementia/index.html"
content: |
  People in areas of the United States with high levels of a certain kind of air pollution have a greater risk of dementia, a new study found.
  
  The study, published Monday in the journalJAMA Internal Medicine, looked at data from 27,857 survey participants between 1998 to 2016. About 15%, or 4,105, developeddementiaduring the study period, and all lived in areas of the US with higher concentrations of particle pollution than those who didn’t develop dementia, the researchers found. The study authors said it’s the first nationally representative study of the potential effects of particle pollution from different emission sources on dementia in the US, and the link to dementia was most robust in areas with pollution from agriculture and wildfires.
  
  It’s important to note, the study authors said, that these associations were observed even at pollution levels lower than the current national ambient air quality standards.
  
  Deaths, disabilities from heart problems related to air pollution are on the rise, study finds
  
  Particle pollution, also called PM2.5 or particulate matter, is the mix of solid and liquid droplets floating in the air, according to the USEnvironmental Protection Agency.It can come in the form of dirt, dust, soot or smoke.Particulate matter can come from coal- and natural gas-fired plants, cars, agriculture, unpaved roads, construction sites and wildfires.
  
  Most previous research on the issue has looked largely at particle pollution from fossil fuels. But in the new study, the connection to dementia seemed most robust with pollution connected to agriculture and wildfires, although it could also come from other sources like traffic and coal combustion.
  
  “At first, when agriculture and wildfires were the two that popped out, Boya and I were both surprised,” said Dr. Sara Dubowsky Adar,associate chairof epidemiology at the University of Michigan School of Public Health, who worked on the study with a team that included Dr. Boya Zhang, a research fellow in the department.
  
  ”In hindsight, it really makes a lot of sense, mostly because of the fact that we’re looking at impacts on the brain, and agriculture we know is using a lot of pesticides,” Adar said.
  
  Pesticides are neurotoxins to animals, she said, so those may be the particles in agriculture pollution that are affecting human brains, as well. As for wildfires, the smoke doesn’t just come from burning trees; things like homes and gas stations burn too, becoming the particle pollution that people breathe in.
  
  Air pollution may contribute to rising threat of antimicrobial resistance, study says
  
  Particle pollution is particularly deadly becausePM2.5isso tiny— 1/20th of a width of a human hair — that it can travel past your body’susual defenses. Instead of being breathed out when you exhale, it can get stuck deep in your lungs or go into your bloodstream.
  
  The particles cause irritation and inflammation and can lead to respiratory problems. Research has found that long-term exposure to particle pollutioncan also causecancer, depression, breathing problems and a variety of heart problems.
  
  “Just likecigarettes, there’s no such thing as good inhaled particles,” said Dr. Caleb Finch, a professor and the ARCO/William F. Kieschnick Chair in the Neurobiology of Aging at the University of Southern California, who was not involved with the new study. “Almost everything that air pollution does, cigarette smoke also does.”
  
  More than 55 million people worldwide have dementia, and 10 million more develop it each year, according to theWorld Health Organization. Because of the aging population andother health issueslike obesity, smoking and high blood pressure, that number is expected to grow significantly.In 2021, the Alzheimer’s Association said that increasing levels of air pollution and increasing cases of dementia worldwide should be treated as serious public health crises.
  
  The new study cannot determine the exact mechanism connecting particle pollution and dementia, but scientists have some theories.
  
  These tiny pollution particles could be getting into the brain through the nose and causing neuronal cell death that’s connected to dementia. It’s also possible that particle pollution is modifying inflammatory proteins that act on the brain.
  
  Dr. Masashi Kitazawa, anassociate professorof environmental and occupational health at the University of California, Irvine, speculated that the pollution may be having an indirect effect.Scientists knowthat exposure to particle pollution causesheart conditionsand vascular problems, for example, and both can be a risk for Alzheimer’s disease and dementia.
  
  “Is that causing the cardiovascular failure that leads to the less oxygen supply to the brain, and then that caused the accelerating dementia, or the PM is getting into the brain and causing some neurotoxic reaction? We still don’t know yet,” said Kitazawa, who was not involved with the new study.
  
