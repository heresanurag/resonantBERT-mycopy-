  $50,000That’s how much the Orlando Magic NBA team donated to a super PAC that supports the presidential bid of Florida GOP Gov. Ron DeSantis. While it wouldn’t be surprising to see individuals give contributions, it is anunusual move for a professional sports teamto donate as a corporation directly to a single candidate. The donation has stirred controversy among Democrats and LGBTQ activists who criticize DeSantis’ record as governor. This year, hesigned into law several restrictionson gender-affirming treatments for minors, drag shows, bathroom usage and which pronouns can be used in school.
  
  “After many meaningful and difficult conversations, we have made the decision to separate.”
  
  — Canadian Prime Minister Justin Trudeau, announcing Wednesday that he and his wife Sophie Grégoire Trudeau areseparating after 18 years of marriage. The prime minister’s office said the pair have “have signed a legal separation agreement,” in a statement. The Trudeaus havethree children together, all under the age of 15.
  
