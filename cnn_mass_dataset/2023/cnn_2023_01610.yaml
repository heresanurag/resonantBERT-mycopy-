content: |
  China is proposing new rules that would limit minors to no more than two hours a day on their cell phones. The restrictionsaim to combat internet addictionas the country tries to cultivate “good morality” and “socialist values” among children and adolescents.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  Former President Donald Trump will bearraigned todayas he faces criminal charges over his alleged efforts to overturn the 2020 election and remain in office. The indictment, which was handed down and unsealed Tuesday, describes theplot to overturn the 2020 election, which culminated in the insurrection at the US Capitol on January 6, 2021. However, even before that, Trump engaged in a pressure campaign targeting state election workers, lawmakers and others,the indictment said. Ahead of the former president’s initial court appearance today in Washington, DC, metro police said they are working withfederal law enforcement partnersto “ensure the safety of DC residents and visitors.” The federal courthouse where Trump is scheduled to appear is several blocks from the Capitol.
  
  Recent data from the CDC suggests that a summer surge of Covid-19 could be underway, although not as significant as in past summers. The number ofCovid-19 infections is rising, along with test positivity, ER visits and hospital admissions. Around 8,000 people in the US were hospitalized last week due to Covid-19, a 12% increase from the prior week,CDC data shows. Federal health officials have announced a new Covid-19 booster should be released around late September or early October, which will target the now-dominant XBB strains of the virus. And with a new vaccine forthcoming, experts say it is unlikely we will see a return to masking for everyone. Additionally, the once critical Covid-19 vaccine card hasbecome less relevant, but CDC officials still recommend saving it as part of your medical record.
  
  The gunman who killed 11 people at a Pittsburgh synagogue in 2018 was unanimouslysentenced to deathby a federal jury on Wednesday. The sentence represents the end of a saga that began on October 27, 2018, when the gunman burst into the Tree of Life synagogue andshot worshipperswith an AR-15-style rifle. At the time, the synagogue was hosting three congregations for weekly Shabbat services. The 50-year-old shooter was found guilty in June of all 63 charges against him for the deadliest attack on Jewish people in the US. The court is scheduled to reconvene today when the death sentence will be formally imposed.
  
  Some of Hollywood’s “highest-earning” actors have helped toraise over $15 millionto provide financial assistance to tens of thousands of unionized actors on strike. Among the actors who have made donations of $1 million or more to the SAG-AFTRA Foundation are George Clooney, Meryl Streep, Leonardo DiCaprio, Ben Affleck and Jennifer Lopez, Oprah Winfrey, Julia Roberts and Dwyane Johnson. SAG-AFTRA, the union representing 160,000 actors, said it ispreparing to deliver the aidswiftly to performers “in times of urgent need.” Actors formally joined the picket lines on July 14, more than two months after around 11,000 screenwriters began striking. This week, Hollywood studios asked the Writers Guildback to the negotiating table, but there are still no talks scheduled with SAG-AFTRA.
  
  The US State Department hasordered the evacuationof non-emergency personnel and family members from Niger following last week’s military takeover. “On July 26, President Mohamed Bazoum wasplaced under house arrestamidst efforts to overthrow the democratically elected government of Niger. Subsequent events have severely limited flight options,” the State Department said Wednesday in anupdated travel advisory. The advisory warns Americans not to travel to Niger, setting the advisory level at its highest possible: Level 4. The US has not yet formally decided if the situation constitutes a coup — a designation that would require the US to cut foreign and military assistance to the Nigerien government.
  
