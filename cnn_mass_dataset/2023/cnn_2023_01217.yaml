  “I grew up with great parents who sacrificed everything for me,” she said. “And you have to really be committed to having children. You have to be a great parent, and I was afraid I couldn’t be.” The whole enterprise of motherhood seems (to this childless woman, anyway) like it’s never been more stressful, and the idea that there is any way to be a perfect mother is, of course, impossible.
  
  The scale at which more women are opting out of motherhood has given rise to a heated global debate about declining birthrates. On the one hand are arguments about thecatastrophic implicationsfor thefunctioning of societyunder an aging population; on the other are theories that a shrinking number of humans will actually begood news for the badly damaged planetand eventhe economy. But so far, I have yet to see a compelling, widespread case being made for a massive overhaul of our treatment of mothers, and child care, as the means to convince skeptical women to sign on.
  
  On the contrary, the anti-choice stance seems to be that the way forward is just to force women into motherhood in a “Handmaid’s Tale”-adjacent way. Given the breathtaking speed with which conservatives are eroding women’s access to reproductive care and family planning, it doesn’t seem hyperbolic to say that the endgame is to compel every woman to be a mother if at all possible — no matter that, increasingly, it’s obvious that a certain percentage of themdo not feel it’s right for them.
  
  Supposedly “pro-life” people rarely acknowledge the exhausting, often thankless lives of women who do choose to have children. As one child-free womantoldHuffPost in 2021, “I think Americans need to get it through their heads how awful the safety net is here: bad health care, unsafe schools and streets, no child care, minimal parental leaves or sick leaves, nor job security.”
  
  The patriarchal fervor is blatantly at odds with societal trends and thosedeclining birthrates, including the increasing prevalence of women saying they’re just not made for motherhood.That level of obliviousness is not new for conservatives — they’re regularly wildly out of touch with what the majority of Americans want, and that includesthe right to an abortion— but there’s a tiny bit of hope that this willcome back to bite themin the 2024 election. And that someday soon, it won’t even be news when a woman such as Clarkson shares the joy of non-motherhood.
