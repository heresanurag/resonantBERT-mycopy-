content: |
  Editor’s note:Sara Stewartis a film and culture writer who lives in western Pennsylvania. The views expressed here are her own. Viewmore opinionon CNN.
  
  Imagine, if you will, seeing this headline:“Jon Hamm is happy as a man without kids: ‘I’ve had a great sexy-ass life.’”
  
  Sounds vaguely ridiculous, right? Aside from the fact that Hamm, 52, does seem to have a sexy-ass life, who cares if he has kids? (In a2016 interview, the “Mad Men” star didn’t seem super into it, but who can say?)
  
  Male actors who choose childlessness almost never get breathless media attention. Patricia Clarkson, on the other hand, who is 63, wasmentionedeverywhere last week after shegavethat exactquoteto the “Table for Two With Bruce Bozzi” podcast.
  
  It’s a real marker of how far we haven’t come on the issue of chosen childlessness that an offhand comment from a woman in the public eye still gets so much notice. In an era that’s seenhorrendous harmto reproductive rights in this country after the fall of Roe v. Wade last year, it’s unsurprising but still infuriating that a woman publicly saying she doesn’t want kids is a big deal.
  
  Clarkson’s certainly not the only celebrity to talk openly about choosing not to have kids. Other vocally child-free stars — Helen Mirren, Oprah Winfrey, Dolly Parton, Kim Cattrall andmany more— have been saying this stuff on the record for decades. And like clockwork, their words nearly always end up in a headline.
  
  Chelsea Handler’s pitch-perfect sketch “A Day in the Life of a Childless Woman” evoked a predictable outcry fromconservative male punditsthis year. (One childless male star whohasgotten attention is Seth Rogen, whotold Howard Sternthat “I don’t know anyone who gets as much happiness out of their kids as we get out of our non-kids.”)
  
  Opinion: For women, it’s past time to give up the ghost of equality
  
  But something does feel a bit different at this particular moment. If there’s a glimmer of hope in the reaction to Clarkson’s comments, it’s that she’s comfortable saying shealwaysknew she wanted a different path: “I made a big choice. But I knew it when I was young,” she told Bozzi. Inanother interview, she worded it differently: “I’ve never wanted to marry, I’ve never wanted children — I was born without that gene.”
  
  The idea that some women just don’t have a maternal instinct is gaining traction, especially as younger generations increasinglyembrace childlessness. A recent book by British author Ruby Warrington,“Women Without Kids: The Revolutionary Rise of an Unsung Sisterhood,”explores this idea in detail.
  
  She asks: “What if, rather than motherhood being every woman’s natural, God-given role, some of us, regardless of our biology, are simply more suited to the role and the vocation of parenthood than others?” Instead, she argues for a “motherhood spectrum”; the spectrum theory “does away with the notion that not being a mother, or not naturally reveling in the role means that there is something wrong with us.”
  
  Warrington, who’s credited with coining the term “sober curious,” has come up with another that I’m hoping catches on: “areproductive,” used as a less-polarized word than “childless” or “child free” to describe women who simply never had the urge to have children.
  
  The reasons many womencite for not wanting kidsare, to be sure, frequently circumstantial: a rapidly downward-spiraling climate, lack of a societal safety net for motherhood, the erosion of reproductive rights. But the majority of Generation Z and millennial respondents who are choosing not to have kids, according to a recentPew Research Center Survey, report that they “just don’t want to.” That’s reflective of the seismic shift Warrington’s talking about. “What if not all of us are supposed to have kids,” she writes, “and what if this were considered the norm?”
  
  Still, it’s frustrating that even outspoken women such as Clarkson self-flagellate about motherhood, even as they extol the lives they’ve been able to live without being mothers: In her podcast interview, Clarkson also discusses thinking she wouldn’t be agood enoughmother.
  
