title: "‘Barbenheimer’ box office debut sparks hopes that cinema is back"
date: "2023-07-24"
section: "Business"
url: "https://www.cnn.com/2023/07/24/business/barbie-oppenheimer-box-office-combined/index.html"
content: |
  Summer blockbusters “Barbie” and “Oppenheimer” have given thetroubled film industrya big shot in the arm, kindling hopes that consumers may have fallen back in love with the big screen three years after the pandemic forced movie theaters to close.
  
  The films raked in a combined $511 million in box office sales over their opening weekend, according to Boxoffice.com, which cited data from Warner Bros., the producers of “Barbie,” and Universal Studios, which is behind “Oppenheimer.”
  
  'Barbie' dominates the US box office, raking in a $155 million opening weekend
  
  It was“Barbie”that came out on top, earning $337 million globally, compared with “Oppenheimer’s” $174 million. That gave the pink-drenched film the largest opening weekend of 2023 so far and the biggest-ever debut for a female director. (Warner Bros., is owned by CNN’s parent company Warner Bros. Discovery.)
  
  Timothy Richards, chief executive of Vue International, Europe’s largest privately owned movie theater operator, said in a statement Sunday that it had seen its biggest weekend in four years for ticket sales.
  
  “Vue saw its highest weekend admissions since ‘Avengers: Endgame in 2019,’” Richards said, adding that it was “an incredibly exciting moment for the industry.”
  
  The box office haul caps weeks of intense marketing for both films, though particularly for “Barbie,” director Greta Gerwig’s comedy-cum-existential drama about the iconic doll’s search for meaning, relevance and her reckoning with sexism in the real world. Burger King in Brazil madeburgers with pink sauce, Crocs released a line ofhot pink clogs, and Airbnb created alife-sized versionof Barbie’s Malibu DreamHouse to rent in California.
  
  The contrast with Universal Studios’ “Oppenheimer” could not have been starker. The film, directed by Christopher Nolan, tracks the journey of American physicist J. Robert Oppenheimer from kid genius to director of the United States’Manhattan Project, where he spearheaded the creation of the atomic bomb.
  
  Yet the unlikely pairing seems only to have fueled interest in both. AMC(AMC), the world’s largest movie theater chain,saidlast week that 60,000 people had bought tickets see both filmson the same day.
  
  For movie theaters, bludgeoned by poor ticket sales and a wave of permanent closures since the start of the pandemic, the pop culture sensation generated by “Barbenheimer” — aided and abetted by a cottage industry ofmemes— might be exactly what the doctor ordered.
  
  “The Barbenheimer phenomenon was the catalyst to something we hadn’t seen for years in this industry: rather than driving the cultural conversation around seeing a movie, it became a global viral campaign around going to the movies,” Daniel Loria, editorial director at Boxoffice.com, told CNN.
  
  Michael O’Leary, president and CEO of the National Associations of Theater Owners in the United States, also said: “People recognized that something special was happening, and they wanted to be a part of it.”
  
  But whether the success of both films will translate into a sustained revival of the movie industry remains to be seen. Big budget films like DC’s “The Flash” and Disney’s “Indiana Jones and the Dial of Destiny” haveunderperformedthis summer, and an ongoing strike by Hollywood actors and writers over pay and working conditions has temporarily stopped production on most films.
  
  The financial toll of the pandemic has been immense. Cineworld, the world’s second-biggest movie theater chain and owner of Regal Cinemas,filed for bankruptcyin September after posting a total $3.3 billion loss over 2020 and 2021. So far, Cineworld hasshuttered51 of its Regal movie theaters in the US.
