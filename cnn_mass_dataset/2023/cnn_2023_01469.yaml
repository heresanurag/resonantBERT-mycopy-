title: "Trader Joe’s recalls two types of cookies because they may contain rocks"
date: "2023-07-24"
section: "Business"
url: "https://www.cnn.com/2023/07/24/business/trader-joes-rock-cookies/index.html"
content: |
  Trader Joe’s announced a recall of two types of cookies, stating that they may contain a foreign material, rocks, in a statement on Friday.
  
  According to the statement, Almond Windmill Cookies with sell-by dates of10/02/23 and 10/19/23 through 10/21/23 or Dark Chocolate Chunk Cookies with sell by dates of 10/17/23 through 10/21/23 may have been affected.
  
  Remaining cookies have been removed from sale or destroyed, the statement said, but any shoppers who purchased these products should dispose of them.
  
  The statementurged customers not to consume any of the potentially affected cookies and said the products can be returned to any Trader Joe’s for a full refund.
