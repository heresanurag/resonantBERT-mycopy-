  Editor’s note:A version of this story appeared in CNN’s Wonder Theory science newsletter. To get it in your inbox,sign up for free here.
  
  The cosmos is filled with unexpected surprises.
  
  Observatories such as the Hubble and James Webb space telescopes and the Chandra X-ray Observatory see the universe in different wavelengths of light, showcasing new details that the human eye would never detect on its own.
  
  But when their powerful capabilities are combined, the telescopes can unveil even more celestial mysteries, including theoldest black hole ever foundandcolliding galaxy clustersthat twinkle like a Christmas tree.
  
  Meanwhile, missions such as NASA’s Lucy spacecraft are revealing asteroids that would otherwise remain hidden from view. The probe’s cameras shared yet anothernew surprise about what’s orbiting around the space rockDinkinesh in the main asteroid belt.
  
  Also this week, a new telescope opened our eyes to a fresh perspective of the universe.
  
  The first five images captured by the Euclid telescope showcase glimmering clusters of galaxies and stars.
  
  The telescope, launched in July, was designed to create the most detailed 3D map of the hidden “dark side” of the universe. Though invisible, dark matter and dark energy are both believed to play crucial roles in the structure and expansion of the cosmos.
  
  Euclid has a wide field of view, capable of capturing 1,000 galaxies within the Perseus Clusteras well as more than 100,000 additional distant galaxies in the background in a single image.
  
  The telescope also shared a dreamy andhighly detailed panoramic view of the Horsehead Nebulawithin the Orion constellation, where young planets may be hiding within the stellar nursery.
  
  There is a sleeping giant beneath southern Italy that might be reawakening.
  
  A supervolcano left a giant depression called a caldera about 2 million years ago, creating Campi Flegrei, or the Phlegraean Fields, which stretch for miles from the outskirts of Naples to the islands of Capri and Ischia.
  
  Campi Flegrei’s last major eruption occurred in 1538, creating a mountain in the Bay of Naples.
  
  Intensifying seismic activity has been detected since December 2022.With the possibility of aneruption looming overwhat has become a densely populated region, Campi Flegreimay be Italy’s most dangerous volcanic threat.
  
  Colorful holes dug by fish, some playful leaping wolves and a moment where fall meets winter are just some of the winners of The Nature Conservancy’s 2023 Global Photo Contest.
  
  The grand prize went to Hungarian photographer Tibor Litauszki, who captured an illuminated underwaterimage of an alpine newt floating on frog eggs.
  
  Some of the images show the impacts of the climate crisis and humans intruding upon the natural world. This week, new research suggested that, due to changes in agricultural land use, thousands of plants and animals across Europeface the risk of extinction.
  
  In the Southern Hemisphere, scientists are hopeful as Australia’s Great Barrier Reef enters coral spawning season,giving rise to the next generation of corals.
  
  Bundles of letters intended for the crew of the French warship Galatée never reached their recipients 265 years ago after the men were captured during the Seven Years’ War.
  
  Now, the sentiments and stories within their envelopes have been shared for the first time since they were sealed with red wax and tied with ribbon.
  
  The “treasure box” of letters provides insights into what family dynamics were like during 18th century wartime — including thesaga of a young sailor, his jealous mother and his fiancée.
  
  Mysteriessurround the Great Sphinx of Giza, including why and how it was made.
  
  Space scientist and geologist Farouk El-Baz first proposed in 1981 that if the ancient Egyptians discovered a natural landform called a yardang, they could have added surface details to create the massive limestone statue.
  
  Yardangs can take shape when wind sculpts compact sand, and some resemble seated animals, occasionally referred to as “mud lions,” according to Leif Ristroph, an associate professor at New York University’s Courant Institute of Mathematical Sciences.
  
  Ristroph and his colleagues set out to recreatethe landscape conditions from about 4,500 years ago and conducted erosion tests on clay-model yardangs. The new research adds evidence to the theory that suggestswind played a role in shaping the sculpture.
  
  These intriguing reads are sure to capture your attention:
  
  — A diver discovered more than 30,000 Roman bronze coins off the coast of Sardinia. The well-preserved artifacts, dated to the fourth century, couldsuggest the presence of an unknown shipwreck.
  
  — Curious as to whether he “could build a wooden house on the moon or Mars,” Kyoto University researcher Koji Murata wants to test his theory bysending a wooden satellite into space.
  
  — Scientists in Chinacombined two DNA sets to create a chimeric monkey, named for the hybrid creatures from Greek mythology, in the name of medical research and conservation.
  
  — More than half of all species live within Earth’s soil, and photographer Andy Murray’s images have captured the fascinatingmicroscopic animals inhabiting the secret kingdombeneath our feet.
  
