  Parts of the Northeast US are bracing today for possibly the coldest wind chills in decades.Dangerously frigid temperatureswith wind chills as cold as50 degrees Fahrenheit below zeroare set to wallop New England and surrounding regions beginning this morning, the Weather Prediction Center said. All of Maine, New Hampshire, Vermont, Massachusetts, Rhode Island and Connecticut are under wind chill alerts. Northern New Jersey, northeast Pennsylvania and much of New York state outside of New York City and Long Island are also under wind chill threats. Officials are warning people to stay indoors as such extreme conditions can cause frostbite in as little as 10 minutes. Fortunately, the cold spell will only last about 36 hours, forecasts show. This comes as the South isstruggling with a deadly ice stormthat made road conditions miserable this week, claiming the lives of at least eight people in two states.
  
  US officials are tracking a suspected Chinesehigh-altitude surveillance balloonfloating above the northern US. It is currently “traveling at an altitude well above commercial air traffic and does not present a military or physical threat to people on the ground,” Pentagon spokesman Brig. Gen. Patrick Ryder said Thursday. Senior military officials advised President Joe Biden not to shoot down the balloon – which is the size of three buses – due to fear that the falling debris could pose a safety threat to civilians. Officials say they are confident the balloon belongs to thePeople’s Republic of China, and although its current flight path carries it over “a number of sensitive sites,” officials say it does not present a significant intelligence gathering risk.
  
  The US is expected to announce a new Ukraine security package worth approximately $2.2 billion that includeslonger-range missiles for the first time. The type of missiles included in the package will effectively double the range of Ukrainian weaponry, officials say, reaching a range of approximately 90 miles. This will be the first security package since the UScommitted to providing Ukrainewith advanced M-1 Abrams tanks in January, a decision made in coordination with European countries providing German-made Leopard 2 tanks. The weapons will not arrive in Ukraine immediately, since they will not come directly out of US inventories. Instead, the US will contract with weapons manufacturers – a process that could takeweeks or months while the war drags on. The announcement of the new package, however, could come as soon as today.
  
  Most US adults support banning sales of all tobacco products,according to a new CDC survey.Although cigarette smoking has declined in recent decades, it remains the leading cause of preventable disease, disability and death in the US, where nearly 31 million adults currently smoke. Meanwhile, the FDA is still considering its proposed ban onmenthol cigarettes and flavored cigars. Experts say menthol – the last flavor allowed in cigarettes – makes smoking easier to start and harder to quit. The additive can mask the harshness and irritation of tobacco, making cigarettes more appealing to young people and those who have never used tobacco products. It also enhances the effect of nicotine in the brain, making tobacco products even more addictive. One study published in 2021 estimated that a menthol cigarette ban in the US couldprevent up to 650,000 premature deathsover the next 40 years.
  
  The manufacturer that distributed eye drops under the brand EzriCare has issued a recall due to possible contamination, the FDA said Thursday. This comes after the CDC said earlier this week it isinvestigating 55 reports of infections in 12 statesthat may be linked to the products. Some of the cases resulted in permanent vision loss or hospitalization, and one person died. The drops were sold online across the US in multidose bottles. Consumers should stop using them and report any adverse reactions to the FDA, health officials said. New Jersey-basedEzriCare said in a statementthat after learning about the investigation on January 20, it “immediately took action to stop any further distribution” of the eye drops and has been “contacting customers to advise them against continued use of the product.”
  
