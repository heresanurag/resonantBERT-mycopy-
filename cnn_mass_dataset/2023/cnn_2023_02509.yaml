id: cnn_2023_02509
title: "Federal lawsuit filed over Kenosha police officer who put his knee on a 12-year-old’s neck while breaking up school fight"
date: "2023-02-07"
section: "US"
url: "https://www.cnn.com/2023/02/07/us/kenosha-wisconsin-officer-knee-student-lawsuit/index.html"
content: |
  A father and his middle-school-aged daughter have filed a federal lawsuit against a former school security guard in Kenosha, Wisconsin, after he puthis knee on the child’s neckwhile trying to break up a cafeteria fight last year.
  
  The security guard, Shawn Guetschow, also was a Kenosha police officer but was not on police duty at the time of the incident at Kenosha’s Lincoln Middle School on March 4, officials havesaid.
  
  The lawsuit,filed Monday in US District Court, alleges Guetschow used excessive force against the girl – identified only as Jane Doe – while he was trying to arrest her after the fight, and that putting his knee on her neck helped constitute an unlawful chokehold. The lawsuit also names the school district and city of Kenosha as defendants, alleging they failed to properly train or supervise Guetschow while he was employed as a security guard.
  
  Off-duty officer put his knee on a 12-year-old's neck for more than 20 seconds while breaking up school fight, video shows
  
  Surveillance videoreleased by the school districtlast year shows the guard attempting to break up a fight between two students. He is either struck or falls backward while holding on to one of the students, which the lawsuit identifies as Jane Doe. The guard appears to hit his head on a nearby table. Shortly after, the guard can be seen on top of the student, appearing to push her head onto the floor with one hand while holding his knee to her neck for about 25 seconds.
  
  Eventually, the girl is handcuffed and taken away, the video shows.
  
  Guetschow was “pushed to the ground” and struck his head on a table as he fell, his attorney said Monday. The lawsuit, however, asserts that the guard tripped, and that the girl did not push him or cause him to fall.
  
  The girl, a 12-year-old sixth grade student at the time, wascharged with disorderly conduct, but the case was later “resolved” and she was not convicted, according to her family’s attorney, Drew DeVinney.
  
  The student changed schools and received mental health treatment as a result of the “emotional distress, mental trauma, and anxiety” she felt after the arrest, the lawsuit says. She has also been treated for traumatic brain injury, cervical strain and recurrent headaches as a result of the incident, it says.
  
  After video of the incident spread on social media, Guetschowresigned that month from his part-time security guard rolewith the Kenosha Unified School District. CNN has asked Kenosha police about his employment status with their department, but has not heard back.
  
  Off-duty officer resigns from school district role after being seen on video putting his knee on the neck of a 12-year-old to break up a fight
  
  The suit alleges the city didn’t provide Guetschow “with any training regarding security, policing and/or supervision of children and students.” It also accuses the school district of not training him or requiring any training for the position.
  
  Guetschow had a reputation for having a short temper, which the school district and the city were aware of, the suit alleges.
  
  The lawsuit seeks punitive damages against Guetschow and monetary damages against all three defendants for an amount that would be determined during trial.
  
  Guetschow “continues to recover from injuries” he sustained on March 4, according to his attorney Sam Hall, who also is representing the school district. Guetschow “suffered a concussion, significant swelling and a contusion of the head during this incident,” Hall said in a news release.
  
  The guard’s position on the girl drew comparisons from Kenosha police to the position of the former Minneapolis police officer who killed George Floyd in 2020. Noting “the visual similarities to George Floyd,” a Kenosha Police Department spokesmansaid in Aprilthat interim Chief Eric Larsen asked federal investigators to look into the case.
  
  A US attorney’s office concluded it would file no charges against Guetschow, and the Kenosha County district attorney’s office subsequently also declined to file charges against him, county District Attorney Michael Graveley told CNN on Tuesday.
  
  The US attorney’s office for the eastern district of Wisconsin will not comment on the status of criminal investigations, office spokesman Kenneth Gales told CNN Tuesday.
  
  The Kenosha Unified School District has a policy that permits physical restraint of a student when their actions are “a clear, present and imminent risk to the physical safety of the student or to others.”
  
  However,the policy prohibitsany restraint techniques that “place pressure or weight on the student’s neck or throat, on an artery, or on the back of the student’s head or neck” or obstructs students’ breathing. It also bans maneuvers that place students in a prone “chest down, back up” position.
  
  The lawsuit against Guetschow accuses him of placing the student in the prone position and failing to give her instructions, and says the girl did not resist arrest.
  
  Kenosha police request FBI look at incident of off-duty officer putting his knee on the neck of a 12-year-old girl
  
  “A reasonable officer in Guetschow’s position would not have believed himself to be in imminent danger of death or great bodily harm” or “believed that the use of a chokehold was reasonable and necessary,” the lawsuit says.
  
  According to the suit, the girl communicated to the guard that she was unable to breathe while he was positioned on top of her.
  
  Hall, Guetschow’s attorney, said in the news release that officers are in Kenosha schools “because it is the district’s highest priority to provide a safe and secure learning environment for its students and staff,” adding, “We will vigorously defend KUSD and Officer Guetschow in this action.”
