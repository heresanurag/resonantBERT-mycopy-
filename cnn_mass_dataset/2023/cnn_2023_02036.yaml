  Kaiser Permanente saysit has been working to bulk up staffing. It set a goal of hiring 10,000 additional workers by the end of the year and should reach that mark this month, it said. About 29,000 staffers were hired in 2022 and an additional 22,000this year.
  
  Studies that have looked at the effects of walkouts on patient care have found that they’re disruptive but have only a marginal impact, if any, on patient outcomes.
  
  One analysisthat looked at longer strikes suggested that they had little impact on patient morbidity.Another 2022analysis of several studies involving 1.8 million patients globally found no clear negative effects on patient mortality.
  
  Correction: A previous version of this story misstated the day the strike would end.
