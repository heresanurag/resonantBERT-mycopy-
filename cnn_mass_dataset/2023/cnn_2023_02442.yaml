  “We have achieved major advancements in the prevention and management of SARS-CoV-2 since the pathogen was initially identified in 2019,” the editorial said. “In recognition of these achievements, the time has come to deimplement policies that are not appropriate for an endemic pathogen when the expected benefits of such policies are low. Universal masking in health care is a policy whose time has come and gone … for now.”
  
  The CDC had already heard some complaints and concerns about the draft guidelines.
  
  In October, Dr. Michael Bell, deputy director of CDC’s Division of Healthcare Quality Promotion and Cohen, the CDC director, listened to concerns about the early evidence review from several experts in airborne transmission of infectious disease and worker protections. Bell said because this session was not a public meeting, they couldn’t engage in dialogue with the experts, but he promised to take the comments back to the HICPAC. Theminutes of the meetingwere posted online.
  
  Dr. David Michaels, an epidemiologist and professor at the George Washington University School of Public Health, said the new guidelines should have benefited from all the knowledge about the transmission of respiratory infections gleaned during the pandemic. Instead, he said, “this is going backwards.”
  
  The conclusion of the evidence review that surgical masks work as well as N95 masks contradicts the findings of a 2022studyby researchers at the University of California at Berkeley and the California Department of Public Health that showed people who said they consistently wore N95 masks in public settings were less likely to test positive for Covid-19 compared with those who wore surgical or cloth masks.
  
