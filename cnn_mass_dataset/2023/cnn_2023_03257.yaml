title: "Emmys 2023 have been pushed to January 2024, on Martin Luther King Jr. Day"
date: "2023-08-10"
section: "Entertainment"
url: "https://www.cnn.com/2023/08/10/entertainment/emmy-awards-new-date"
content: |
  The telecast ofthe 75th Emmy Awardshas been pushed back to air in January, on Martin Luther King, Jr. Day, the Television Academy and Fox announced Thursday.
  
  The awards show has historically aired in September, but there had been speculation that it would either be postponed or canceled in light of the ongoingwriters’ andactors’strikesin Hollywood.
  
  It was announced last monththat TV’s biggest awards event would be postponed.
  
  'Succession' and 'The Last of Us' lead Emmy nominations
  
  “As the Emmy Awards celebrates its 75th Anniversary, the show will broadcast live on FOX coast-to-coast from the Peacock Theater at LA Live and will honor the talented performers, writers, directors and craftspeople whose work has entertained, inspired and connected viewers across the globe throughout the past year,” the Fox press release stated.
  
  Nominations for the Emmys were announced last month, with programs “Succession” and “The Last of Us” leading the pack.
  
  The show will air on Fox from 8-11 p.m. EST/5-8 p.m. PT on Monday, January 15, 2024.
