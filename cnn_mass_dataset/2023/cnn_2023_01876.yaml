title: "Army Corps will barge in up to 36 million gallons of freshwater a day as saltwater threatens drinking water south of New Orleans"
date: "2023-09-23"
section: "US"
url: "https://www.cnn.com/2023/09/23/us/freshwater-new-orleans-saltwater-mississippi-river/index.html"
content: |
  The US Army Corps of Engineers is planning to barge 36 million gallons of fresh water daily into the lower Mississippi River near New Orleans as an expected saltwater intrusion from the Gulf of Mexico in Octoberthreatens the area’s drinking water supply, officials said Friday.
  
  The move comes as water levels are plummeting for thesecond consecutive yearafter this summer’s blistering heat and low rainfall triggered extreme drought over parts of the central US.
  
  As water levels drop, the threat of saltwater intrusion grows in Louisiana as ocean water pushes north into drinking water systems, unimpeded by the Mississippi’s normally mighty flow rate.
  
  New Orleans officials anticipate the city will see the effects of saltwater intrusion in late October,according to a Friday news release from the mayor’s office. “Please note that this timeline is subject to change, and the City will keep the public informed as the timeline is updated,” the release stated.
  
  The Mississippi River is forecast to reach “historic lows over the next several weeks,” Louisiana Gov. John Bel Edwards said during a Friday news conference.
  
  Water levels on the Mississippi River are plummeting for the second year in a row
  
  To help mitigate intrusion, the state and the Army Corps of Engineers are working to add 25 feet of height to a 1,500-foot-wide underwater levee in the Mississippi River, which was constructed in July to slow the saltwater’s progression, Army Col. Cullen Jones said.
  
  The corps also plans to barge millions of gallons of water daily to local water treatment facilities, Jones said during the news conference.
  
  The corps announced the plan to build the leveelast year. It involved dredging sediment from the bottom of the river and pile it up to create what’s known as a sill, which acts as a dam for the denser saltwater in the lower levels of the river.
  
  These five cities could be one natural disaster away from a catastrophic water crisis
  
  Typically, enough rainfall upstream helps ease drought conditions andkeeps the saltwater at bay. However, during the news conference Friday, the governor said officials “don’t believe that there is sufficient precipitation in the near term anywhere along the Mississippi River to materially change the conditions for the better.”
  
  “Unfortunately, we just haven’t had the relief from the dry conditions that we need and so that inclusion is worsening,” Edwards said.
  
  The governor requested a federal emergency declaration for four parishes already affected or expected to be impacted over the next month: Jefferson, Orleans, Plaquemines and St. Bernard, his office said Monday in a news release.
  
  “In some areas, the increased salinity from the saltwater intrusion is forecast to exceed the Environmental Protection Agency’s (EPA) maximum standard of 250 mg/L, impacting public water systems and introducing the risk of corrosion to water distribution systems, machinery, and appliances,” the release said.
  
  If approved, the emergency declaration will help reimburse for the response and temporary mitigation efforts, and it will open up assistance from federal organizations, according to the governor’s office.
  
  Jones said it will take approximately 24 days to add to the sill. Once augmented, it will delay saltwater intrusion by 10 to 15 days, he said.
  
  Fifteen million gallons of freshwater is expected to be brought in as soon as next week, Jones said, adding the area will need 36 million gallons per day to help mitigate the problem.
  
