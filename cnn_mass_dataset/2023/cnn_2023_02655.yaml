title: "Chick-fil-A’s newest sandwich has no chicken in it"
date: "2023-02-09"
section: "Business"
url: "https://www.cnn.com/2023/02/09/business/chick-fil-a-cauliflower-sandwich"
content: |
  Chick-fil-A’snewest sandwich ditches chicken for … cauliflower.
  
  The aptly named “Chick-fil-A Cauliflower Sandwich” is being tested in three cities beginning next week, marking the chicken chain’s first-ever plant-based sandwich. Imitating the chain’s signature fried chicken sandwiches, the new offering uses a “tender filet cut” of cauliflower that’s marinated and breaded in the chain’s seasoning, then pressure cooked and served on a buttery bun with pickles.
  
  “Guests told us they wanted to add more vegetables into their diets, and they wanted a plant-forward entrée that tasted uniquely Chick-fil-A,” said Leslie Neslage, the chain’s director of menu and packaging, in a statement.
  
  Chick-fil-A’s new sandwich goes on sale Monday for a limited time in three cities: Denver; Charleston, South Carolina; and the Greensboro-Triad region in North Carolina. The starting price is $6.59, but it varies by market, a company spokesperson told CNN.
  
  The sandwich has been in development for nearly four years and was created in house by the chain’s chefs. Stuart Tracy, culinary developer of the cauliflower sandwich,explained in a blog postthat the chain considered using “everything from mushrooms to chickpeas to chopped vegetables formed into patties,” but it chose cauliflower because it has a “mild flavor.”
  
  However, the company notes that it’s not vegan, because milk and eggs are used. And it may not satisfy vegetarians, either: Its restaurants don’t have “vegetarian-only preparation surfaces,” the company said.
  
  Fast food companies have been addingplant-based alternativesto their meat-centric menus in recent years as more people seek to limit their meat intake. But these efforts have been met with varying success.
  
  Kentucky Fried Chickentested plant-based fried chicken nuggetslast year, but it hasn’t returned to menus. Taco Bell has tested severalplant-based meat-flavored alternatives, but nothing has officially joined its menu. And McDonald’s tried aMcPlant sandwich last yearand has yet to add it to US menus.
  
  Burger King, however, still sells itsImpossible Whopperand has expanded into testingplant-based chicken sandwicheswith the same company.
