  Feeling pain? Listen to sad songsThe songs that pull on your heartstrings the most can temporarily soothe the perception of pain,a new study found. Cue up your favorite melancholy and bittersweet tunes — or Adele’s beautiful ballad“To Be Loved”— if you need an emotional release.
