title: "Track the House speaker vote count: See how Johnson got the gavel"
date: "2023-10-17"
section: "Politics"
url: "https://www.cnn.com/2023/10/17/politics/track-house-speaker-vote-count-dg"
content: |
  Rep. Mike Johnson, who served as the House GOP conference vice chairman, was elected House speaker in a fourth round vote on Wednesday after several weeks of GOP infighting.
  
  There were 220 votes for Johnson and 209 votes for Democrat Hakeem Jeffries.
  
  House Republicans had been attempting to elect a speaker followingKevin McCarthy’s abrupt ousteron Oct. 3. Multiple Republicans either withdrew their names in the face of opposition or were unable to win a majority of the full House chamber needed to become speaker.
  
  Rep. Mike Johnson secured thespeaker’s gavel. The Louisiana lawmaker has been avocal supporterof former President Donald Trump and was a key congressional figure in the failed efforts to overturn the 2020 election.
  
  Rep. Jim Jordan dropped his name from the speakership bid later on October 20 after 25 Republicans – the most so far – voted against him on the third speaker ballot. He later withdrew as a nominee.
  
  Jordan fared worse in the second vote, with 22 Republicans voting against him, compared tothe 20 who did not support him on October 17.The House went into recess immediately after the vote was gaveled.
  
  The first vote concerning Jordan’s bid to become the next speaker of the House fell short on Tuesday.Twenty Republicans voted againstJordan’s candidacy, far more than the handful he could afford to lose given the party’s narrow majority in Congress.
  
