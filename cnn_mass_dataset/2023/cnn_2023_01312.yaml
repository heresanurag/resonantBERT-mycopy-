title: "Opinion: This Nobel prize is for all the women fighting for freedom in Iran"
date: "2023-10-07"
section: "Opinion"
url: "https://www.cnn.com/2023/10/07/opinions/nobel-prize-women-fighting-for-freedom-in-iran-ghitis"
content: |
  EDITOR’S NOTE:Frida Ghitis,a former CNN producer and correspondent, is a world affairs columnist. She is a weekly opinion contributor to CNN, a contributing columnist to The Washington Post and a columnist for World Politics Review. The views expressed in this commentary are her own. Viewmore opinionon CNN.
  
  A year ago, the women of Iran electrified the world when theydefied a brutal regime, stripping off their government-mandated head coverings, waving them in the air and eventhrowing them into bonfiresin an uprising that came to be known by its motto, “Woman, Life, Freedom.”
  
  One year later, after aferociouscrackdown, the women’s revolt has faded from the headlines. But if you thought the lack of global attention meant the cause has died, prepare to be inspired again.
  
  On Friday, Iranian activist Narges Mohammadi won this year’sNobel Peace Prize. Mohammadi is a prisoner of the regime, but that has done little to quell her passion or her activism. Even within the walls of Tehran’s infamous Evin Prison, and despite cumulative jail sentences ofmore than 30 yearsand a ban on seeing her husband and her two children, Mohammadi has proven indomitable.
  
  The Nobel committee awarded her this prestigious prize “for her fightagainst the oppression of womenin Iran and her fight to promote human rights and freedom for all.” The committee also recognized “the hundreds of thousands of people who, in the preceding year, have demonstrated against Iran’s theocratic regime’s policies of discrimination and oppression targeting women.”
  
  This Nobel prize is for all the women fighting for freedom in Iran.
  
  And that fight continues. Even inside Evin Prison.
  
  Just before the news of the prize broke, Mohammadi was incontact with CNN, managing to send an audio recording and aletter through intermediaries. The material is breathtaking; proof of a core of moral courage that most of us can hardly comprehend.
  
  In the audio message, one can hear Mohammadi leading chants of “woman, life, freedom” by prisoners in Evin. Ponder that for a moment.
  
  Opinion: Washington’s turmoil plays right into Putin’s hands
  
  Evin is a chamber of horrors, as Mohammadi herself documentedlast yearinher book, “White Torture,”which includes women’s testimonies of what transpires in the prison’s ward 209. Their accounts describe a place where intelligence officials interrogate women; where they are not only tortured and sexually abused, but where living conditions resemble medieval prisons during the Inquisition.
  
  After the book was published, Iranian authoritiesadded time to Mohammadi’s prison sentence. They have also punished her for her continuing activism. In August, the regime tacked onanother yearafter shespoke to the mediaabout sexual assaults in jail and pointed out what she described as the hypocrisy of a religious state’s use of sexual violence. (The Iranian government has denied the widespread allegations of sexual assaults against detainees,calling them “false” and “baseless.”).
  
  The following month, she wrote an article in The New York Times with the headline: “The more they lock us up,the stronger we become.”
  
  The brutality has apparently done little to quell the fires burning for freedom. In written answers to CNN’s questions, she says this “still is the era ofgreatest protestin this prison.”
  
  In the audio recording shared with CNN, one can also hear women singing “Bella Ciao,” an Italian folk song linked to the fight against fascism that Iranian women have adopted as ananthem of freedomduring last year’s street protests.
  
  That uprising exploded when a young Kurdish-Iranian woman was detained for allegedly failing to wear her headscarf properly. Mahsa Amini, 22,died in the custodyof the morality police. (She was actually known as Jina to friends and family, which means “life” in Kurdish.Jin, Jiyan, Azadimeans “woman, life, freedom.”)
  
