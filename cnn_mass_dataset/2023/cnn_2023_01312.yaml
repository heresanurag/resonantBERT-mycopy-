  Amini’s death was the last straw. Iranian women, who wereoften joined by men, took to the streets to demand equality and an end to the repressive regime.
  
  Mohammadi explainedin her letterto CNN that mandatory hijab is a tool of subjugation and control over women, which by extension facilitates “control over the entire society,” and helps “to preserve the image of religious Islamic men.”
  
  In response to the protests, the government imprisonedtens of thousandsof protestersand their relatives, andexecutedan unknown number. It carried outpurges of perceived criticsfrom universities and the media.
  
  The government imprisonedtens of thousandsof protestersand their relatives, andexecutedan unknown number. It carried outpurges of perceived criticsfrom universities and the media.
  
  The streets grew quieter. But if you think the movement – and the danger – ended, think again.
  
  This week, 16-year-oldArmita Geravandwas hospitalized after she got on a train at a metro station in Tehran on Sunday. While it is still unclear what happened, a Norway-based group focused on Kurdish rights said she was “assaulted” by female officers of the morality police. Insecurity camera footageshowing only the exterior of the train, Geravand is seen entering the carriage, and then being carried out onto the platform. She is nowreportedly in a comain a military hospital in Tehran.
  
  Authorities deny the accusations, saying she was hospitalized due to an injury caused by low blood pressure.
  
  Geravand, it seems, may be one of the countless Iranian women who have refused to surrender to the crackdown. Women are still required to wear hijab, and they do it when entering government buildings or walking into a bank. But on the street, thequiet resistance continues. The defiance persists.
  
  Resisting a violent regime requires courage, but doing it from inside one of the world’s harshest prisons requires a special kind of courage and an uncommon depth of integrity and commitment. For Nobel prize winner Narges Mohammadi, it’s a clear choice. “I am sure,” she wrote to CNN, “that the worldwithout freedom, equalityand peace is not worth living.”
