  “Moreover, the frogs themselves provide hope for a bright future; even species that have been particularly hard-hit by chytrid like the mountain chicken frog have individual animals that survive long periods of time in landscapes where the fungus is found — these individuals may provide the key to understanding how to best fight the fungus.”
  
  The research team was discouraged to find the devastatingly low number of frogs in Dominica — it had expected to find at least 50, Sánchez said. A captive breeding program across several institutions, includingLondon Zoo, a ZSL conservation zoo, featured an initial 50 frogs that now have offspring, Sánchez said.
  
  During the survey, the team with ZSL took mouth swabs of the resident frogs found in Dominica and plan to study these for any evidence of the remaining frogs developing resistance to the fungus.
  
  Some frogs are better equipped against the disease than others, Kaganer said. Certain frog species, such as the American bullfrog, according to theAmphibian Ark organization, have immune defenses that are fully tolerant of the disease, and others live in environments that the fungus has a hard time growing in, Kaganer said.
  
