  “They do this [issue a flag ban] to give police a free hand to do whatever it is they want,” she told CNN. “They know it’s not legal to do this type of stuff - but the point is to create enough repressive measures so people stay silent.”
  
  Alongside the flag order, Ben Gvir said he was restricting the number of lawmakers allowed to visit so-called security prisoners to one Knesset member per party.
  
  The edicts by Ben Gvir, who heads the Jewish Power faction in Prime Minister Benjamin Netanyahu’s governing coalition, come just days after his controversial visit to the Temple Mount/Haram al-Sharif. That morning walkprovoked criticismfrom opponents and allies alike, and a meeting of the United Nations Security Council, amid concerns about threats to the status quo of the flashpoint holy site.
