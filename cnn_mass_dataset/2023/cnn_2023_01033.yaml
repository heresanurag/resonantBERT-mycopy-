  University of Pennsylvania President Liz Magill announced Saturday that she isstepping downafter facing criticism over the school’s response to rising antisemitism. Several moments led to Magill’s resignation, including the decision to allow a Palestinian literature festival on campus with a highly controversial guest list. UPenn, Harvard University and MIT faced enormous backlash from high-profile donors after presidents from all three schools gave widely criticized testimony to the House in which they failed to condemn calls for the genocide of Jews as explicitly against campus harassment and bullying codes. Now that Magill has stepped down, the spotlighthas turned to her counterpartfrom Harvard, Claudine Gay.
  
  President Joe Biden will host Ukrainian President Volodymyr Zelensky at the White House this week as discussions for a Ukraine aid dealremain stalled in Congress. The Senate has struggled for weeks to reach an agreement as top Republicans insist any aid package for key US allies — including Israel and Ukraine — be tied to reformed US immigration and border security policies. Lawmakers are nowworking against the clockto end the impasse before they leave town for the holidays next week. Senate Majority Leader Chuck Schumer and Minority Leader Mitch McConnell have invited Zelensky to speak Tuesday at an all-senators meeting where he will call on the US to renew support of Ukraine’s defense against Russia.
  
