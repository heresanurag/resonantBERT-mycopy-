  The surest way to stress less at the airport during the holidays? Arrive with time to spare, of course. At least two hours early is fine for domestic flights, according to standard Transportation Security Administration advice. A good timing strategy will be crucial if you’re among the record crowds flying during thepeak 10-day travel periodthis month. Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  Clashes between the Israeli military and Hamas are intensifying in Gaza as pressure builds for Israel to agree to a ceasefire. In an update Sunday, Israel said it struckmore than 250 Hamas targetswithin 24 hours. Israeli forces have ordered residents in the main southern city ofKhan Younisto evacuate ahead of additional strikes, but it’s unclear how many people might be aware of the instruction given the lack of communication in much of the enclave. Meanwhile, the US is facing condemnation after it vetoed aUN Security Council resolutionlast week demanding an immediate truce in Gaza. UN Secretary-General António Guterres says he “will not give up” calling for a ceasefire but said to “expect public order to completely break down soon.”
  
  Powerful tornadoes and storms tore through Tennessee over the weekend, shredding hundreds of homes and killing at least six people. More than 34,000 Tennesseans were without power early today and hundreds are facing prolonged outages due tothe widespread destruction. In Nashville, a local utility estimates it may take days to restore power to some. In Clarksville near the Kentucky border, local officials say it could take weeks to get power after a tornado destroyed over 90 buildings and left at least 270 others “uninhabitable.” The same storm that spawned the deadly tornadoeswill bring more severe weatherto at least a dozen eastern US states today.
  
  Former President Donald Trump was supposed to testify again in his New York civil fraud trial today, but he made asurprise announcement Sundaysaying he would not appear. TheGOP frontrunner’sdecision to forgo testimony is the latest of his relentless attacks on the civil fraud case brought by New York Attorney General Letitia James, who is seeking $250 million in damages and to bar Trump from doing business in the state. The former president attended the civil trial last Thursday — though he didn’t have to be there — and used every opportunity to speak to TV cameras during breaks. Political experts say Trump’s trials have become part ofhis pitch to his base, arguing that his own plethora of legal woes is a reason voters should re-elect him.
  
