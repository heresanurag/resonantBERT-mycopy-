title: "Trump asks judge to dismiss Georgia election subversion charges against him"
date: "2023-09-11"
section: "Politics"
url: "https://www.cnn.com/2023/09/11/politics/trump-georgia-rico-request-to-dismiss/index.html"
content: |
  Former PresidentDonald Trumpis asking a court to dismiss several criminal charges against him in the Georgia 2020 election interference case.
  
  His filings on Monday are Trump’s opening salvo of legal arguments to challenge the state-level charges.
  
  Trump asks Judge Tanya Chutkan to recuse herself from federal 2020 election subversion case
  
  The filings indicate Trump wants toadopt the legal argumentshis racketeering co-defendantsRudy Giuliani,Kenneth ChesebroandRay Smithhave already made in court filings.
  
  Giuliani filed his challenge Friday, asking Fulton County Superior Court Judge Scott McAfee to toss his indictment due to “deficiencies,” his lawyers argued, that render it invalid. Chesebro, the pro-Trump lawyer who devised the “fake electors” scheme, filed a similar challenge last month that argued the indictment “fails to sufficiently set out the charge or any violation of the law.”
  
  Smith, an attorney for Trump’s 2020 campaign in Georgia, filed his extensive motion challenging the indictment also on Monday, arguing that the indictment had “voluminous” defects and that the state failed to meet the racketeering statute.
  
  Motions like these are common at the start of a criminal case, and they are rarely successful.
  
  The former president is asking for the state charges to be tossed even as he has indicated in court filings that hemay ask for the case to be moved to federal court, where he can try to invoke protections for federal officials.
  
  Trump faces 13 counts – including racketeering, conspiracy charges and soliciting a public official to violate their oath of office – in thesprawling indictmentbrought by Fulton County District Attorney Fani Willis last month against him and 18 co-defendants for their roles in attempting to reverse Georgia’s 2020 election results. All 19 defendants – including Trump, Giuliani, Chesebro and Smith – have pleaded not guilty in the case.
  
  This story has been updated with additional information.
  
  Jason Morris, Marshall Cohen and Jack Forrest contributed to this report.
