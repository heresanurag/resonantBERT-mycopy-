  “When people look at the Moon, I hope they first take in that it’s the same Moon that their grandparents, great grandparents, and so on, have seen,” Petro said. “For millennia humans have looked to the Moon, and it’s looked similar for all of human history.”
  
  Petro also noted two current NASA space operations involving the moon. NASA’sLunar Reconnaissance Orbiter,which has been orbiting the moon for over 14 years, is creating a 3D map of its surface. TheArtemis II missionis aiming for a late 2024 launch to send four astronauts on a trip around the moon and back — the first attempt to fly humans near Earth’s closest neighbor since 1972.
  
  The beaver moon’s name is believed to be a nod to this full moon’s appearance when the industrious animal retires to its lodge in anticipation of winter. And when the North American fur trade thrived from the1500s to the 1800s, November was also beaver trapping season due to the animal’s thicker coat this time of year,according to The Old Farmers’ Almanac.
  
  The November full moon has also been referred to by the Tlingit as the digging moon, as it is the time when animals begin to prepare for winter. The Cree have called this lunar event the frost moon, and the Anishinaabe have referred to it as the freezing moon since cold winter temperatures are near, according to the almanac.
  
  Keep an eye on the sky for the Leonid meteor shower this weekend
  
  The final full moon of the year is the cold moon on December 26,according to the Farmers’ Almanac.
  
  And when it comes to meteors, the Leonids are expected to be seen blazing in the night sky until the shower’s finality on December 2, according to theAmerican Meteor Society. If you are eager to see more, two upcoming meteor showers peak next month:
  
  ● Geminids: December 13-14
  
  ● Ursids: December 21-22
