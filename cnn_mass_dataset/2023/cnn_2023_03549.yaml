title: "Mahsa Amini’s uncle arrested ahead of one-year anniversary of her death"
date: "2023-09-08"
section: "Middle East"
url: "https://www.cnn.com/2023/09/08/middleeast/mahsa-amini-uncle-arrested-intl/index.html"
content: |
  The uncle ofMahsa Amini,the 22-year-old woman whose death in the custody of Iran’s morality police sparked nation-wide protests last year, was arrested last week, according to a family member and a human rights group.
  
  Safa Aeli, a resident of the Kurdish city of Saqqez, was arrested on Tuesday at his home by 10 intelligence agents, according to the Human Rights Activists News Agency (HRANA). A family member told CNN on condition of anonymity that Aeli has since been taken to Tehran, without providing further details out of concern for his safety.
  
  Iran rounds up activists and relatives of killed protesters ahead of Mahsa Amini anniversary
  
  The reasons behind his arrest are unknown, but his detention comes just days before the one-year anniversary of Amini’s death.
  
  Amini died last September after being detained by the regime’s notorious morality police and taken to a “re-education center,” allegedly for not abiding by the country’s conservative dress code. Her death triggered a social movement, with demonstrators protesting the regime’s treatment of women as well as other issues.
  
  The protests dwindled, but the regime hasramped up its arrestsof activists and their relatives ahead of the anniversary of Amini’s death September 16.
  
  The regime has also brought back its morality police after witnesses said the force hadbriefly disappeared from the streetsduring the protests. Iran also doubled down on hijab laws, with parliament now considering draft legislation dictating harsher measures against those violating the country’s dress code.
