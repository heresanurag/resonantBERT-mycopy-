title: "2022 was the warmest La Niña year on record. Scientists say this year will be warmer"
date: "2023-01-12"
section: "US"
url: "https://www.cnn.com/2023/01/12/us/2022-warmest-la-nina-year-climate/index.html"
content: |
  Twin reports released Thursday by NASA and the National Oceanic and Atmospheric Administration found the last nine years were the hottest nine on record, with 2022 being the warmest La Niña year ever recorded.
  
  That’s significant, scientists said, since theLa Niña phenomenontypically has a cooling effect on global temperatures.
  
  NASA also reported that 2022 was the fifth-warmest year on record for the entire planet, echoing similar findings from the European Union’s Copernicus Climate Change Service, whichCNN reported earlier this week.
  
  “In the pattern of climate change, the long-term trends, we’re seeing this overall warming pretty much everywhere, with perhaps an exception in the deepest southern oceans around Antarctica,” Gavin Schmidt, a climate scientist at NASA, told CNN.
  
  “And unfortunately, we’re predicting that 2023 will actually be warmer than 2022,” he said.
  
  Planet-warming fossil fuelemissions have pushed the planet’saverage temperature to 1.1 degrees Celsius above pre-industrial levels, which is nearly 75% of the way to the 1.5-degree thresholdscientists warn it should stay under.
  
  These aren’t small numbers, Schmidt said.
  
  Even at 1.1 degrees, 2022 made abundantly clear thedangers of a warming planetthat many are not prepared for, including adeadly heat wavethat seared much of Europe,catastrophic flooding in Pakistan, adevastating hurricanein Florida, andhistoric droughtsthat are draining freshwater supply in many parts of the globe.
  
  “What we’re predicting – if we were to burn all the fossil fuels that we can – it could get as warm, by the end of the century, as the Ice Age was cold,” Schmidt said.
  
  The NOAA analysis also noted that ocean temperatures were at arecord high in 2022, surpassing the previous record set in 2021. The last four years have been the warmest four on record for the planet’s oceans.
  
  Additionally, researchers found that the extent of Antarctic sea ice was at a near-record low in 2022, second only to 1987 with a smaller annual sea ice extent – an alarming development that threatens the region’s plants and animals, including itsiconic penguins.
  
  From slashing the use of fossil fuels to retrofitting buildings to be more climate-efficient, Schmidt said the world already has the proper tools in place to address the worst of the climate crisis. It’s just a matter of using them fast enough.
  
  “It’s clear that people are taking this more seriously than they were a decade ago,” he said. “But let’s not sugarcoat how big a challenge this is. It’s not a challenge for a week or a year or a decade. It’s going to be the challenge of the century.”
