id: cnn_2023_02536
title: "Apple is raising the price of iPhone battery replacements"
date: "2023-01-04"
section: "Tech"
url: "https://www.cnn.com/2023/01/04/tech/apple-battery-replacement-cost-increase/index.html"
content: |
  Apple is raising the price of battery replacements for all out-of-warranty iPhone models prior to the currentiPhone 14 lineup, the company confirmed onits website.
  
  Starting March 1, Apple(AAPL)will charge $89 for battery replacements for iPhone X through iPhone 13 models, a $20 increasefrom the current price of a new battery. Battery replacements for other models, such as the iPhone SE and iPhone 8, will jump from $49 to $69.
  
  Apple has lost $1 trillion in market value in a year
  
  Apple is also raising the cost of replacing batteries for other products.Batteries for newer iPad models will cost $20 more, while it will cost $30 more for a new MacBook Air battery and $50 more for MacBook Pro models.
  
  Apple devices typically come with one year of warranty. The changes only apply to customers who are not part of its AppleCare+ repair service program, which provides up to two or three years of coverage and varies in cost depending on product.
  
  Apple firstlowered the priceof iPhone battery replacements from $79 to $29 in 2018, after it was discovered that the company deliberately slowed down the performance of older iPhones to prevent sudden battery shutdowns. In response to the controversy, dubbed batterygate, Apple also issued a rare apology and agreed to a$113 million settlementwith dozens of states.
  
  In raising prices now, Apple may be responding to an uptick in the cost of productsamid rising inflation and supply chain issues. By taking this step, Apple could also make it less attractive for customers to delay upgrading their devices or drive them to pay for the repair service program.
  
  The news comes as Apple’s market capfell below $2 trillionin trading on Tuesday for the first time since early 2021 and one year to the day after the company became the first public tech company valued at $3 trillion.
  
  Like other tech companies, Apple has grappled with supply chain hiccups and concerns that recession fears could weigh on advertiser and consumer spending, including for pricier products like the iPhone.
