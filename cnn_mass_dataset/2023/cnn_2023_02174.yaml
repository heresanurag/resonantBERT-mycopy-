title: "Government barreling toward shutdown after McCarthy dealt another defeat"
date: "2023-09-29"
section: "Politics"
url: "https://www.cnn.com/2023/09/29/politics/kevin-mccarthy-shutdown-latest/index.html"
content: |
  Congress remained on track Friday to trigger agovernment shutdown, as House Speaker Kevin McCarthy suffered another high-profile defeat when the chamber failed to advance a last-ditch stopgap bill to extend government funding past a critical deadline.
  
  McCarthy is under intense pressure as House Republicans have not been able to coalesce around a plan to prevent a shutdown amid hard-line conservatives’ resistance to passage of a short-term funding extension.
  
  House GOP leadership has told members that further votes are now expected on Saturday, but it is not yet clear what the chamber would vote on and there is still no consensus among House Republicans.
  
  Late Friday evening, McCarthywrote on X, the platform formerly known as Twitter, that a bipartisan Senate proposal to keep the government funded through November 17, which includes aid for Ukraine, “has no path forward and is dead on arrival,” calling the bill “misguided.”
  
  Speaking to reporters earlier in the evening, McCarthy argued that aid to Ukraine should be dropped from the Senate bill.
  
  “I think if we had a clean one without Ukraine on it, we could probably be able to move that through. I think if the Senate puts Ukraine on there and focuses on Ukraine over America, I think that could cause real problems,” he told CNN’s Manu Raju.
  
  How a government shutdown could impact Americans
  
  McCarthy also said he had proposed putting up a “clean” stopgap bill and that he was “working through maybe to be able to do that.”
  
  A number of House Republicans oppose additional funding for war-torn Ukraine.
  
  Twenty-one Republicans crossed over to vote with every Democrat against the House stopgap bill on Friday in a 232-198 vote. The measure – a 30-day extension that would slash funding from current levels – also includes strict GOP-led border policies. House GOP leadership hoped thatborder security provisionstucked into the temporary measure would force hardliners’ hands – but it was not enough.
  
  McCarthy is now confronting the most significant challenge to his leadership to date as he faces pushback from hardline conservatives and threats over the possibility of a vote to oust him as speaker.
  
  During a closed-door conference meeting, House GOP leadership proposed that members stay in session the next two weeks to vote on more individual appropriations bills, according to multiple lawmakers in the room.
  
  That plan would not help avert a government shutdown this weekend, but Republicans are hoping that leadership’s proposed schedule change might convince some holdouts to support a short-term funding option in the meantime.
  
  GOP Rep. Ken Buck, who voted against the House GOP stopgap funding measure Friday, said the failed effort was a “no confidence vote” in McCarthy.
  
  “This was a vote where people didn’t have faith that Kevin McCarthy was going to do the right thing. We passed a vote on the debt ceiling. He went and negotiated a significantly higher number with President Biden. People don’t have faith that when it comes time to negotiate he’s going to do the right thing,” Buck told CNN’s Jake Tapper on “The Lead.”
  
  On Thursday, the speaker refused to say whether he would try to cut a deal with Democrats – a step thatcould prompt conservativesto move to oust him from the speakership.
  
  “I still got time, I got time to do other things,” McCarthy responded when asked by CNN what will happen if the stopgap bill fails.
  
  Pressed further on whether he has a plan B, McCarthy said, “In this job you got to have an ABCDEF and G,” and he laughed when asked what letter he was currently on. “I haven’t spelled my name out completely,” he responded.
  
  Are you worried about a federal government shutdown? Share your story
  
  A shutdown could have enormous impactsacross the country, in consequential areas ranging from air travel to clean drinking water, as many government operations would come to a halt, while services deemed “essential” would continue.
  
  House GOP leaders brought a series of spending bills to the floor Thursday evening as they try to show conservatives they are working in good faith to advance full-year funding bills.
  
  The House passed several of those spending bills, but the measures would not stop a shutdown and have no hope of passing in the Senate.
  
  At the end of the night, a bill to fund the Department of Agriculturefailed to pass on the floorwith 27 Republicans voting against it, highlighting once again the difficulty Republicans have had coalescing around spending bills.
  
  Meanwhile, the Senate is working to advance a bipartisan stopgap bill that would keep the government open through November 17 and provide additional aid to Ukraine and disaster relief. McCarthy has so far dismissed that bill.
  
  It could take until Monday to pass the Senate’s bill to keep the government open if GOP Sen. Rand Paul slows down the process – as he has vowed to do – over his demand that the bill drop the $6.2 billion in aid to Ukraine it contains, according to senators. That would put it past the Saturday evening shutdown deadline.
  
  This story and headline have been updated with additional developments.
