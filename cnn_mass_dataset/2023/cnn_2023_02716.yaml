title: "More summer travel delays: Major Northeast airports issue ground stops"
date: "2023-07-16"
section: "Business"
url: "https://www.cnn.com/2023/07/16/business/flights-grounded-delays-northeast-airports?cid=external-feeds_iluminar_yahoo"
content: |
  Major airports across the Northeast warned of significant flight delays and cancellations Sunday, as storms moved across the region and as all flights servicing the major airports around New York City and Boston faced ground stops at 1 p.m.
  
  Nationwide, over 1,450 flights were canceled as of Sunday evening, according to flight tracking websiteFlightAware.
  
  Why airline delays and cancellations are so bad: It's not just the weather
  
  Boston Logan International Airport is currently under aground stopdue to thunderstorms, according to the Federal Aviation Administration.
  
  LaGuardia Airport in Queens was also under a ground stop due to thunderstorms, the FAA said. “Due to heavy rain & fog, customers are advised to check with their airline before coming to the airport,” the airport said onTwitter.
  
  Weather conditions have also caused flight disruptions and a ground stop at New Jersey’s Newark Liberty International Airport, it said onTwitter. Newark is now under a ground delay, according to the FAA.
  
  John F. Kennedy International Airportis also under a ground stop. Earlier Sunday, the airport said it was experiencing delays and cancellations due to weather, according to a Twitter update. It advises travelers to contact their airline for their flight status before heading to airport.
  
  Almost a third of flights at Newark were canceled as of 5:30 p.m. ET, according FlightAware, and 27% were delayed. JFK had more than 150 cancellations and 220 delays.
  
  JetBlue(JBLU), which has hubs in Boston and New York, canceled more than 25% of its operations by Sunday evening and has more than 450 delays.
  
  It’s been arough summer for travelers.
  
  Problems with flight delays and cancellations plagued airline travelers in the end of June, particularly United Airlines, which canceled thousands of flights, leaving passenger stranded.
  
  Flight problems mostly over — except at United
  
  There were likely more than 1 million passengers booked on the 8,000 canceled flights industry-wide, based on statistics from aviation analytics firm Cirium and the Bureau of Transportation Statistics. Bad weather kicked off those travel delays, though aseries of staffing shortages and FAA problemscreated a travel meltdown.
