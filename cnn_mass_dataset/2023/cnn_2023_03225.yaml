title: "Start your week smart: Unidentified objects, Earthquake, Iran, Cyclone, Ukraine"
date: "2023-02-12"
section: "US"
url: "https://www.cnn.com/2023/02/12/us/five-things-february-12-trnd?cid=external-feeds_iluminar_msn"
content: |
  It’s Super Bowl Sunday, and it’s shaping up to be a day of firsts: the first Super Bowl to featuretwo Black starting quarterbacks, the first mother to havetwo sons play against each otherin the Super Bowl, and the first pregame flyover to beperformed by an all-women crew. Here’s what else you need to know to Start Your Week Smart.
  
  Here’s what else you need to know toStart Your Week Smart.
  
  • An unidentified object wasshot down over northern Canadaon Saturday, marking the third time in a week that US fighter jets have taken down objects in North American airspace.
  
  • More than 28,000 people have been killed and tens of thousands injured after amagnitude 7.8 earthquakestruck Turkey and Syria.
  
  • Anti-government hackersbriefly interrupted a televised speechby Iran’s President Ebrahim Raisi as the Islamic Republic marked the 44th anniversary of the Iranian revolution on Saturday.
  
  • Schools across Auckland, New Zealand, will close Monday as the island nation’s largest citybraces for the arrival of Cyclone Gabrielle, CNN affiliate Radio New Zealand reported Sunday.
  
  • At least one person was injured aftera Russian missile strikeon the Ukrainian region of Kharkiv late Saturday.
  
  NATO defense ministers are scheduled to begin a two-day meeting in Brussels amid the backdrop of thedevastating earthquakethat struck Turkey and Syria and theongoing war in Ukraine. Ministers of defense fromNATO invitees Finland and Sweden, as well as Ukraine’s defense minister, will be in attendance.
  
  We’ll also get a key reading of inflation with the announcement of the Consumer Price Index for January. In December,consumer prices increased by 0.1%, according to a revision from the Bureau of Labor Statistics released on Friday. The original estimate showed a decline of 0.1%.
  
  And speaking of inflation … February 14 isValentine’s Day, aka the day that a $20 bouquet of roses goes for $100 and swanky dinner reservations are harder to get thanTaylor Swift tickets. (Quick tip: If you plan on popping the question, consider having dinner atthe nearest Cracker Barrel.)
  
  Former South Carolina Gov. Nikki Haley is expected toannounce in Charleston that she’s running for president, according to a person familiar with her plans. Haley would be the second big-name Republican to jump into the 2024 presidential race, with former President Donald Trump launching his bid last fall.
  
  And one of President Joe Biden’stop cybersecurity advisers, National Cyber Director Chris Inglis, will retire as the Biden administration continues to face a host of foreign hacking threats and officials urge, and sometimes compel, US companies to tighten their defenses.
  
  The Rio Carnival, the world’s biggest Carnival held annually in Rio de Janeiro, Brazil, returns to the streets after a two-year pandemic hiatus. About 80,000 tourists are expected to join in the festivities.
  
  One Thing: Journey to the quake zone
  
  Check out more imagesfrom the week that was, curated by CNN Photos.
  
  Paul Rudd is back for another turn as the small, regular and supersized superhero Ant-Man, along with Evangeline Lilly as his partner, the Wasp.“Ant-Man and the Wasp: Quantumania,”the 31st entry in the Marvel Cinematic Universe, arrives in theaters on Friday. Be sure to look for a familiar yet unexpected face in the trailer.
  
  Some people watchjust for the commercials. Others only care aboutthe Halftime Show. And a few apparently tune into watch the game. Whichever category you fall into, pregame coverage begins hours before the actual kickoff tonight at 6:30 p.m. ET.
  
  The19th annual Puppy Bowlwill air simultaneously on Animal Planet, Discovery Channel, and TBS, as well as stream on discovery+ and HBO Max today at 2 p.m. ET. This year’s matchup featuresmore than 100 puppiesfrom 67 shelters and rescue groups divided into Team Ruff and Team Fluff – all vying to take home the coveted “Lombarky” Trophy. The real point, of course, is to get every player on the field adopted into forever homes while promoting shelter and foster pet awareness. And for that, the Puppy Bowl sports a perfect 19-0 record. (CNN, Animal Planet, Discovery Channel, TBS, discovery+ and HBO Max are all owned by the same parent company, Warner Bros. Discovery.)
  
  Arizona is the place to be this weekend for sports fans. TheWM Phoenix Open– hands downthe rowdiest golf tournamenton the PGA Tour – wraps up later today. Scottie Scheffler, the defending champion, begins the day with a two-shot lead at 13 under par. The tournament is being played about a 30-mile drive from State Farm Stadium in Glendale, Arizona, the site of Super Bowl LVII. So, theoretically, you could watch the final putt drop on 18 and still make it in time for kickoff!
  
