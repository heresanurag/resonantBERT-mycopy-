title: "Jennifer Aniston, Lisa Kudrow and David Schwimmer remember ‘brother’ Matthew Perry"
date: "2023-11-15"
section: "Entertainment"
url: "https://www.cnn.com/2023/11/15/entertainment/jennifer-aniston-matthew-perry-tribute/index.html"
content: |
  “Friends” cast members Jennifer Aniston, Lisa Kudrow and David Schwimmer have added heartfelt individual tributes to their late costar Matthew Perry.
  
  The three shared posts about Perry on their verified Instagram accounts on Wednesday, following posts on Tuesdayfrom fellow costars Matt LeBlancandCourteney Cox.
  
  Perrydied on October 28.He was 54.
  
  Aniston’s postincluded a photo of her and Perry, a screen grab of text he had sent her and a video clip of a touching scene between their characters on “Friends.”
  
  “Oh boy this one has cut deep… Having to say goodbye to our Matty has been an insane wave of emotions that I’ve never experienced before,” Aniston wrote in the caption.
  
  Loss comes for everyone, Aniston noted, before describing the depth of hers.
  
  “Being able to really SIT in this grief allows you to feel the moments of joy and gratitude for having loved someone that deep. And we loved him deeply,” she wrote. “He was such a part of our DNA. We were always the 6 of us. This was a chosen family that forever changed the course of who we were and what our path was going to be.”
  
  The photo she shared of her and Perry laughing together was one he had texted her, writing, “Making you laugh just made my day. It made my day :).”
  
  According to Aniston, Perry had said “if he didn’t hear the ‘laugh’ he thought he was going to die. His life literally depended on it.”
  
  “And boy did he succeed in doing just that. He made all of us laugh. And laugh hard,” Aniston wrote. “In the last couple weeks, I’ve been pouring over our texts to one another. Laughing and crying then laughing again. I’ll keep them forever and ever.”
  
  Schwimmer, too, referenced Perry’s humor in histribute.
  
  “Thank you for ten incredible years of laughter and creativity,” Schwimmer wrote. “I will never forget your impeccable comic timing and delivery. You could take a straight line of dialogue and bend it to your will, resulting in something so entirely original and unexpectedly funny it still astonishes.”
  
  He described how the cast became like a family.
  
  “And you had heart. Which you were generous with, and shared with us, so we could create a family out of six strangers,” Schwimmer wrote.
  
  Later on Wednesday, Lisa Kudrow – the actor who played Phoebe Bouffay on the mega hit show – posted her owntribute on Instagramto Perry, sharing an early Polaroid of the pair with the NBC logo visible.
  
  “Shot the pilot, Friends Like Us, got picked up then immediately, we were at the NBC Upfronts. Then… You suggested we play poker AND made it so much fun while we initially bonded,” Kudrow recollected. “Thank you for that. Thank you for making me laugh so hard at something you said, that my muscles ached, and tears poured down my face EVERY DAY.”
  
  Kudrow also thanked Perry for his “open heart in a six way relationship that required compromise,” and “for showing up at work when you weren’t well and then, being completely brilliant.”
  
  “Thank you for the best 10 years a person gets to have. Thank you for trusting me,” she added. “Thank you for all I learned about GRACE and LOVE through knowing you. Thank you for the time I got to have with you, Matthew.”
  
  Kudrow’s post rounded out all five surviving cast members who have honored their late costar.
  
  Aniston wrote of her love for Perry, adding that she “talks” to him daily and knows he is “completely at peace and out of any pain.”
  
  “Rest little brother,” she concluded her post.” You always made my day…”
