title: "FDA plans to propose ban on hair-straightening chemical products linked to health risks"
date: "2023-10-13"
section: "Health"
url: "https://www.cnn.com/2023/10/13/health/fda-hair-straightening-chemical-products-rule-proposal?cid=ios_app"
content: |
  The US Food and Drug Administration is planning to propose a ban on certain hair-straightening products, such as chemical relaxers and pressing products, that have been linked to health risks, according to anentryin the Unified Agenda, which lists actions that administrative agencies plan to issue.
  
  The agency plans aproposed rulethat would specifically ban hair-straightening products that contain formaldehyde and other formaldehyde-releasing chemicals like methylene or glycol.
  
  If such a proposed rule is issued, the FDA will receive public comments on it, and after reviewing those comments, the agency willdecide whether further action is needed, spokesperson Courtney Rhodes said Friday.
  
  Hair-straightening chemical products linked to increased uterine cancer risk in new study
  
  “Based on the comments, we might decide to end the rulemaking process, to issue a new proposed rule, or to issue a final rule. If we decide to issue a final rule, we publish the final rule in the Federal Register,” the FDA says on itswebsite.
  
  Scientists have long identified an association between the use of hair-straightening chemical products with an increased risk of certain hormone-related cancers, including ovarian andbreast cancers, anduterine cancer, particularly among Black and Latina women. Research suggests that about 50% of products advertised to Black women contain these types of chemicals, compared with about 7% that are advertised to White women, according to theHarvard T.H. Chan School of Public Health.
  
  The FDA is expected to propose language notingthat these types of hair-straightening chemical products are also “linked to short-term adverse health effects, such as sensitization reactions and breathing problems” and that “these chemicals are used in certain cosmetic products that are applied to human hair as part of a combination of chemical and heating tool treatment intended to smooth or straighten the hair.”
  
  When it comes to their hair, Black women face a difficult choice
  
  In March, two lawmakers – Reps. Ayanna Pressley, D-Massachusetts, and Shontel Brown, D-Ohio –wrote a letterto FDA Commissioner Dr. Robert Califf urging the agency to conduct a “thorough and transparent investigation” to determine whether hair-straightening chemical products on the market contain carcinogens that lead to an increased risk of uterine cancer.
  
  Both Pressley and Brown have applauded the FDA’s action and called for the agency to implement such a ban.
  
  “The FDA’s proposal to ban these harmful chemicals in hair straighteners and relaxers is a win for public health – especially the health of Black women who are disproportionately put at risk by these products as a result of systemic racism and anti-Black hair sentiment,” Pressley said in anews release.
  
  “Regardless of how we wear our hair, we should be allowed to show up in the world without putting our health at risk. I applaud the FDA for being responsive to our calls and advancing a rule that will help prevent manufacturers from making a profit at the expense of our health,” she said. “The Administration should finalize this rule without delay.”
  
  US woman files lawsuit against L'Oréal, claiming chemical hair straightening products are linked to her cancer
  
  A study published last year in theJournal of the National Cancer Institutefound evidence of an association between the use of straightening products and uterine cancer. Among nearly 34,000 women in the United States ages 35 to 74, the study found a higher incident uterine cancer rate for those who reported using hair-straightening chemical products in the previous 12 months relative to those who did not.
  
  The study found that among women who frequently used hair-straightening chemical products, the risk of developing uterine cancer by age 70 was around 4%. In women who did not use hair-straightening chemical products in the previous 12 months, the study found the risk of developing uterine cancer by age 70 to be about 1.6%.
  
  One woman in Missouriclaimed in a lawsuitagainst L’Oreal and other entities that her uterine cancer was caused by regular and prolonged exposure to chemicals found in the companies’ hair-straightening products. The suit was filed last year in Illinois on behalf of Missouri resident Jenny Mitchell, who was diagnosed with uterine cancer in 2018 and underwent a full hysterectomy.
  
  “Our highest priority is the health, wellness and safety of all our consumers,” L’Oreal said ina statementafter the filing. “We are confident in the safety of our products and believe the recent lawsuits filed against us have no legal merit. L’Oréal upholds the highest standards of safety for all its products. Our products are subject to a rigorous scientific evaluation of their safety by experts who also ensure that we follow strictly all regulations in every market in which we operate.”
  
