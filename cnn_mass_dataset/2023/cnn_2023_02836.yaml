title: "Elon Musk vs Mark Zuckerberg fight will be streamed on X, according to Musk"
date: "2023-08-06"
section: "Business"
url: "https://www.cnn.com/2023/08/06/business/elon-musk-vs-mark-zuckerberg-fight?utm_source=trendbar"
content: |
  The possible showdown between Elon Musk and Mark Zuckerberg will be streamed on X, formerly known as Twitter, according to Musk.
  
  In a pair of tweets Sunday morning, the platform’s ownersaidhe was “lifting weights throughout the day, preparing for the fight,” adding “all proceeds will go to charity for veterans.”
  
  Musk has not provided more details about the fight.
  
  In June, the two Big Tech billionairesseemingly agreedto participate in a cage fight. The stakes for the potential fight were raised last month when Zuckerberg’s Meta launched a new Twitter competitor calledThreads.
  
  Zuckerberg replied to Musk via Threads on Sunday afternoon, “Shouldn’t we use a more reliable platform that can actually raise money for charity?”
  
  He added: “I’m ready today. I suggested Aug 26 when (Musk) first challenged, but he hasn’t confirmed. Not holding my breath.”
  
  Since Musk’s takeover of Twitter in October 2022, policy pivots, technical issues, and the platform’sstance on harassmentandhate speechhave given many users whiplash. When Threads was released, some saw it as a viable alternative that might unseat its rival, and the app saw enormous initial success. A lawyer representing Twitter eventhreatened a lawsuitover Threads.
