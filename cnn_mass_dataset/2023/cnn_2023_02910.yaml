title: "‘It’s time for me to move on’: Rachael Ray’s talk show will end after 17 years on air"
date: "2023-03-05"
section: "Entertainment"
url: "https://www.cnn.com/2023/03/05/entertainment/rachael-ray-talk-show-ending-trnd/index.html"
content: |
  Celebrity chefRachael Ray’s talk showwill come to an end after 17 years, according to CBS.
  
  “In my more than 20 plus years in television, I have had 17 wonderful seasons working in daytime television with Rachael. However I’ve made the decision that’s it’s time for me to move on to the next exciting chapter in my broadcast career,” said Rayin a news release from CBS. “My passions have evolved from the talk show format production and syndication model to a platform unencumbered by the traditional rules of distribution.”
  
  Rachael Ray and family safe after house fire
  
  The show will end after its current season, according to the new release. Ray said that with the program ending, she plans to redirect her efforts to her newly-launched production company, Free Food Studios.
  
  “I am truly excited to be able to introduce and develop new and upcoming epicurean talent on all platforms,” she said. “Thank you to all of our Rachael daytime show partners, crew and affiliates, and the wonderful years we all worked together.”
  
  The talk show debuted in September 2006 to “immediate ratings success,” according to the release. The program was nominated for 37 Daytime Emmys and won for Outstanding Talk Show three times.
  
  The show featured cooking segments and celebrity interviews, with Ray inviting guests including John McCain, Lindsay Lohan, and Bill Clinton into the kitchen.
  
  The website for Free Food Studios, Ray’s new venture, states that “it is a collaboration between superstar food personality Rachael Ray and her long time producing partners Brian Flanagan, Anthony Amoia and Sean Lee.”
  
  In the news release, Steve LoCascio, president of CBS Media Ventures, called Ray a “gamechanger in the daytime space.”
  
  “She made cooking accessible to the masses, taught viewers simple solutions on how to improve their lives and coaxed great stories out of celebrity guests with her relatable down-to-earth demeanor,” he said “We’re proud to have produced such a successful show with Rachael and her team for so many years. We’ll miss Rachael on the air every day, but we’ll always be family.”
