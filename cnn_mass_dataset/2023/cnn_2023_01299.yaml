id: cnn_2023_01299
title: "Fox News apologizes to Gold Star family after facing backlash over false story"
date: "2023-08-26"
section: "Business"
url: "https://www.cnn.com/2023/08/26/business/fox-news-gold-star-family-apology/index.html"
content: |
  Fox News apologized Saturday to a Gold Star family for publishing a false story last month claiming that the family had to pay $60,000 to ship the remains of their fallen relative back from Afghanistan because the Pentagon refused to pay.
  
  “The now unpublished story has been addressed internally and we sincerely apologize to the Gee family,” a Fox News spokesperson said in a statement, referencing the family of fallen Marine Sgt.Nicole Gee, who was one of 13 service memberskilled in a terror attackat the Kabul airport in 2021 while assisting with US withdrawal efforts.
  
  The apology came after aMilitary.com reportthis week drew attention to the issue and indicated that the right-wing outlet’s top executives had repeatedly been notified by senior members of the Marine Corps that it was pushing a false story.
  
  In an email to Fox News President Jay Wallace and other network personnel, Marine Corps spokesman Maj. James Stenger privately accused the outlet of capitalizing off Gee’s death “to score cheap clickbait points,” according to documents obtained by Military.com through a public records request.
  
  Stenger, who is the top spokesman for the Marine Corps, added that he viewed the behavior of Fox News as “disgusting,” according to Military.com.
  
  Initially, after being notified about the false report, Fox News only changed the headline on the story to attribute the claims to Republican Rep. Cory Mills of Florida, who had advanced the narrativebut later recanted. The outlet later scrubbed the story from its website without a correction or explanation. It remained deleted on Saturday after the apology.
  
  Deleting an entire story is exceedingly rare in news media and is seen as a last-ditch measure if the entire premise of the article is incorrect. Deleting a story without offering readers an explanation or correction is widely considered to be unethical.
  
  In this case, Fox News did not publicly address the incident until the Military.com story ignited backlash against the outlet.
  
  While unethical, the behavior is typical for Fox News. The outlet often breaks traditional news ethics and traffics in dishonest reporting and commentary.
  
  Earlier this year, Fox Newssettled a defamation casewith election technology company Dominion Voting Systems over lies related to the 2020 election. Fox News paid Dominion a historic $787 million to avoid a trial.
  
  Fox News, however,still faces a $2.7 billion lawsuitfrom voting technology company Smartmatic. That lawsuit is making its way through the courts system.
  
  This story has been updated with additional information.
