  One theory is that the mice eat lichens, a combination betweena fungus and an alga, Storz said, that is also a common part ofsome Arctic mammal diets, another example of a harsh, barren environment. The lichens, as well as other mosses and small arthropods develop from the outflow of water vapor and hot gases from the volcano’s soil crust,Emmanuel Fabián Ruperto,an ecologist at theArgentine Institute for Dryland Researchin Mendoza, Argentina, told CNN in an email.
  
  A second theory is that plant fragments, small insects and other dietary resources are carried to the top of the mountains by the wind, Fabián-Ruperto said.
  
  “Life at such high elevations was believed to be impossible for mammals,” Fabián-Ruperto said, who was not involved in the study. “These observations surpass previous records in the Himalayas and other mountain ranges, challenging what we thought we knew about species’ survival capabilities.”
  
  The leaf-eared mouse weighs anaverage of 55 grams(about 1.9 ounces). With further research, scientists are hoping to learn how the tiny mouse can maintain a steady body temperature at such high altitudes, when the rate of heat loss could succumb the mouse to hypothermia and death within minutes, Fabián-Ruperto said.
  
