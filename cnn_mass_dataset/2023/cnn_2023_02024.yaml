title: "Mysterious mouse mummies found in Mars-like conditions on Andes mountain peaks"
date: "2023-10-31"
section: "World"
url: "https://www.cnn.com/2023/10/31/world/mouse-mummies-andes-mountains-mars-scn?cid=external-feeds_iluminar_yahoo"
content: |
  Sign up for CNN’s Wonder Theory science newsletter.Explore the universe with news on fascinating discoveries, scientific advancements and more.
  
  With freezing temperatures of down tominus 40 degrees Celsius(minus 40 degrees Fahrenheit) and vegetation hundreds and sometimes thousands of meters below the mountain tops, the summits of the Andes mountains maintain an extremely harsh environment.
  
  So how did a species of leaf-eared mouse make this barren land their home?
  
  That is the question a team of scientists fromArgentina, Chile, Bolivia and the United Statesare looking to answer after discovering 13 mummified mice at elevations above 6,000 meters (19,685 feet) in theAtacama Plateau of Chile and Argentina.Their discovery further proves the species is the world’s highest dwelling mammal, according to the studyrecently published in Current Biology.
  
  The mice, called Phyllotis vaccarum, are commonly found living in the Andes mountains at lower elevations, all the waydown to sealevel.In 2020,a living mouse was recorded at the summit of Llullaillaco, a volcano with an elevationof 6,739 meters(about 22,110 feet) on the border of Chile. It currently holds the world record forhighest living mammal, said Jay Storz, co-study author for the new and 2020 studies.
  
  The discovery of the living mouse spurred Storz to conduct expeditions at 21 different volcanoes. The 13 mummified mice were found on the Salín, Púlar and Copiapό volcanoes.
  
  “Every time that we’ve found anything at those super extreme elevations, we’re completely blown away,” said Storz, abiology professor at the University of Nebraska-Lincoln. “It’s really hard to overstate how inhospitable these environments are.”
  
  On the summit of these volcanoes, each breath of air only contains about 40% of the oxygen that is available at sea level, Storz said. The temperatures also rarely rise above freezing, and the wind forces are extremely strong, once recorded at over 116 miles per hour from a National Geographic weather station at 6,505 meters (21,342 feet).
  
  Furthermore, the environment has been described to be Mars-like. In 2021, NASA researchers had studied the environment in efforts to “understand how the building blocks of life might respond to Martian conditions over time,”according to its website.
  
  While the conditions are not ideal for living creatures, they create perfect conditions for preservation, as the mice are essentially freeze dried, Storz said. In normal circumstances, mummified mice are hard to come by since most deaths are caused by predators. But high up in the mountains, the mice have no predators.
  
  Asteroid that doomed the dinosaurs halted a key process for life on Earth, scientists say
  
  The researchers performedradiocarbon dating— a method that uses the amount of carbon from organism material to estimate its age — which indicated the oldest mummies to be no more than 350 years old, while some could have recently died, according to the study.
  
  Storz pointed to previous reports of the rodent, where archaeologists had thought the mice to be used as a part ofIncan rituals. Since the samples are not as old as the Inca civilization (over 500 years), that theory has been ruled out.
  
  “It’s still a mystery as to why they’re there — why they would ascend to these extreme elevations — but it’s also clear that they got there on their own,” Storz said, who also noted that the team found evidence of active burrows at the high elevations.
  
  The team of researchers are currently conducting research on 31 live-trapped mice, including the record-holder mouse, to attempt to understand how the species can survive in the extreme conditions, Storz said. The research will also include analyses of their gut contents to find what the mice have been eating.
  
