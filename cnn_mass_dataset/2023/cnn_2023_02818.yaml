title: "What to know about dengue as CDC warns of rising risk in US"
date: "2023-08-18"
section: "Health"
url: "https://www.cnn.com/2023/08/18/health/dengue-what-to-know-wellness/index.html"
content: |
  Dengue virus is the most common mosquito-spread virus globally, but generally relatively rare in the continental United States. However, the US Centers for Disease Control and Preventionwarnedthis week about a higher-than-expected number of dengue cases among US travelers — 745 cases through June 24 — as well as a public health emergency in Puerto Rico, where the virus is endemic.
  
  Global infections in 2024 have been the highest on record, with cases in the Americas already reaching 9.7 million — exceeding the highest number ever recordedin a single year.
  
  Dengue is a mosquito-bornevirusthat is spread mainly via the Aedes aegypti mosquito, which is also known to carry several other viruses such as yellow fever, chikungunya and Zika, according to the CDC.
  
  Dengue is endemic in more than 100 countries in tropical and subtropical climates, mostly in urban and semi-urban areas, according toWHO.
  
  It’s also endemic in the US territories of Puerto Rico, the US Virgin Islands and American Samoa.
  
  The US eliminated malaria in 1951. How can it keep it under control now?
  
  More than 34,000 locally acquired cases werereportedin the US between 2010 and 2023, according to CDC data.A handful of outbreaksof locally transmitted cases have been reported in states with warmer climates, including Florida, Texas, Hawaii and Arizona. California reported its first locally-transmitted case in Pasadenalast year.
  
  But almost all US cases are reported in Puerto Rico, says Dr. Gabriela Paz-Bailey, chief of the Dengue Branch in the Division of Vector-Borne Diseases at the CDC’s National Center for Emerging and Zoonotic Infectious Diseases, told CNN previously. And that’s not a surprise.
  
  “It has the perfect climate for it. It’s a tropical island,” she said. “There are indeed efforts from the health department and other organizations like the Puerto Rico vector control unit to control dengue in the area.”
  
  This includes public education and integrated mosquito management such as “removing places where the mosquitoes lay eggs, and that is done through community engagement, but also clean-up campaigns,” Paz-Bailey said.
  
  Similar efforts are also recommended in the rest of the US and its territories, she noted.
  
