  Backlash ensued soon after [a monument](https://www.cnn.com/2023/01/15/us/mlk-coretta-embrace-memorial-boston-trnd/index.html)meant to honor [Rev. Dr. Martin Luther King Jr.](https://www.cnn.com/interactive/2018/04/us/martin-luther-king-jr-cnnphotos/) and his wife [Coretta Scott King](https://www.cnn.com/2013/08/23/us/coretta-scott-king-fast-facts/index.html)’s legacy in Boston was unveiled.
  
  The 20-foot tall, 40-foot wide [“The Embrace”](https://www.embraceboston.org/memorial) statue was unveiled Friday on Boston Common, where King gave a speech on April 23, 1965, to a crowd of 22,000. The statue was inspired by a photograph of King and Scott King which captured them hugging after he won the Nobel Peace Prize in 1964.
  
  The art piece, designed by Brooklyn-based conceptual artist [Hank Willis Thomas](https://hankwillisthomas.com/), only features the couple’s arms during the embrace and not their heads, which has sparked criticism and mockery online. While some people defended the sculpture, others described it as hideous or disrespectful, with social media users posting memes saying it resembled a sex act.
  
