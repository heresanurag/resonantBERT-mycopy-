title: "Suki Waterhouse reveals she’s pregnant"
date: "2023-11-19"
section: "Entertainment"
url: "https://www.cnn.com/2023/11/19/entertainment/suki-waterhouse-pregnant/index.html"
content: |
  Actor and singerSuki Waterhouserevealed that she is expecting her first child on Sunday during her performance at the Corona Capital music festival in Mexico City.
  
  “I decided to wear something sparkly today because I thought it might distract you from something else going on,” the “Daisy Jones & the Six” star said, going on to show off her belly while on stage, as seen in avideoposted to social media from the concert.
  
  As the audience cheered her on, she said with a laugh, “I’m not sure if it’s working.”
  
  Waterhouse, 31, has been dating “Batman” and “Twilight” starRobert Pattinson, 37, for over five years, but the singer did not mention Pattinson while on stage on Sunday.
  
  The pair have been romantically linked since they were first spotted together in 2018 in London, and have since kept their relationship mostly private.
  
  They made their red carpet debut as a couple just last year at the Dior fashion show in Egypt, nearly five years after their relationship began.
  
  In February, Waterhouse opened up about Pattinson in an interview withThe Times, saying she’s “shocked” to find herself “so happy with someone for nearly five years.”
  
  “I’m always incredibly excited when I see his name pop up (on my phone) or even a text, and I think he feels the same about me,” she said at the time, adding, “We’ve always got so much to say, and I find him hilarious.”
