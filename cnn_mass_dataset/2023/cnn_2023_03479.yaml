title: "Jamie Foxx says he’s finally feeling more like himself following hospitalization"
date: "2023-08-17"
section: "Entertainment"
url: "https://www.cnn.com/2023/08/17/entertainment/jamie-foxx-health-update"
content: |
  Jamie Foxx is sharing anupdateon his health.
  
  The Oscar winnerposteda few photos of himself onInstagram, writing that he is starting to feel more like himself following a recent health scare that landed him in the hospital.
  
  “You’re lookin at a man who is thankful… finally startin to feel like myself…” he wrote. “It’s been an unexpected dark journey… but I can see the light… I’m thankful to everyone that reached out and sent well wishes and prayers… I have a lot of people to thank… u just don’t know how much it meant… I will be thanking all of you personally… and if you didn’t know… GOD IS GOOD… all day every day… #swipeleft #imbackandimbetter #nobaddays”
  
  Foxx was hospitalized in April but has not publicly disclosed why.
  
  Friends and colleagues were among the supporters who commented on Foxx’s post
  
  Jeremy Renner wrote, “Bless you my friend !!!”
  
  Meagan Goode wrote, “Love you my Brother.”
  
  Foxxshared a videoupdate in July and has been spotted out and about over the summer in Chicago where he had undergone treatment at a facility that specializes in rehabilitation care for patients with physical impairments, brain or spine injuries.
