  Oliver-Gary attendsMount Jezreel Baptist Church, which was established between 1865 and 1873 and is thought to be one of the oldest Black Baptist churches in the Washington, DC, area, according to church history.
  
  She said she strives to attend a watch night service each year to do her small part to keep the tradition alive.
  
  “You have the spiritual aspect about reflecting about God but there’s also the cultural historical aspect of preservation of African American culture … The Black church is, to me, the hallmark place of preservation of Black history of Black culture,” she said.
  
  Over theyears, watch night service traditions have evolved. Some congregations now begin and end services earlier in the evening. Since the pandemic, others have moved to a virtual format so that more congregants can attend from the safety of home.
  
  But both Oliver-Gary and Keeler said the historical significance still remains. They also believe that watch night service, like other traditions in Black culture, should continue to be passed down.
  
  “This concept of faith and this belief that although things may not be what you want them to be, that a better day is coming, that has been a thread throughout the lives of Black people in America,” Oliver-Gary said.
  
  Keeler agreed and said Watch Night remains a powerful symbol and tradition for Black Americans because it underscores the power of hope.
  
  “African American traditions, some of them are kind of dying just because some people don’t understand what they mean or culture about us,” she said. “This is our form of culture. We gotta keep it going.”
