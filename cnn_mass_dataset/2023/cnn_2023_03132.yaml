title: "Rob McElhenney shares he was diagnosed with neurodevelopmental disorders and learning disabilities at 46"
date: "2023-07-12"
section: "Entertainment"
url: "https://www.cnn.com/2023/07/12/entertainment/rob-mcelhenney-diagnosed-health-wellness/index.html"
content: |
  Rob McElhenneyrevealedhe has been diagnosed with “neurodevelopmental disorders and learning disabilities.”
  
  The “It’s Always Sunny in Philadelphia” star took to Twitter with the news, saying he will explain more about what he’s learned in an upcoming episode of “The Always Sunny” podcast with costars Glenn Howerton and Charlie Day.
  
  “I was recently diagnosed with a host of neurodevelopmental disorders and learning disabilities! At 46!” he wrote.
  
  He continued, “It’s not something I would normally talk about publicly but I figured there are others who struggle with similar things and I wanted to remind you that you’re not alone. You’re not stupid. You’re not “bad.’ It might feel that way sometimes. But it’s not true :).”
  
  I was recently diagnosed with a host of neurodevelopmental disorders and learning disabilities! At 46!I go through the full diagnosis/prognosis on the@thesunnypodcast(which drops in 2 weeks)It’s not something I would normally talk about publicly but I figured there are…
  
  Several people responded in the comments section to express their gratitude to McElhenney for opening up.
  
  McElhenney has beenbusyprepping for the start of soccer season in the UK as co-owner of Wrexham AFC with Ryan Reynolds. He and Reynolds also joined actor Michael B. Jordan to purchase the Alpine F1 auto racing team.
