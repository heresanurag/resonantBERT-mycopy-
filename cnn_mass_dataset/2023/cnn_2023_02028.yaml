id: cnn_2023_02028
title: "The nation’s largest organization for blind people faces lawsuit alleging widespread sexual misconduct and lack of accountability"
date: "2023-01-06"
section: "US"
url: "https://www.cnn.com/2023/01/06/us/national-federation-of-the-blind-lawsuit/index.html"
content: |
  The largest and oldest nationwide group advocating for the rights of blind people was sued Friday for allegedly failing to protect its students, including minors, from known sexual abusers employed by the organization in a culture the lawsuit claims enabled the abuse to continue for years.
  
  The lawsuit against theNational Federation of the Blindwas filed by attorneys representing Alyssa Mendez, 20, who is legally blind and says she was repeatedly sexually assaulted when she was 16 by her instructor, Michael Ausbun, while attending a training program in 2018 at an NFB-affiliated center in Louisiana.
  
  Ausbun was 22 years old at the time he is accused of first sexually assaulting Mendez. Ausbun denies the allegations, his lawyer told CNN.
  
  The NFB, founded in 1940 and headquartered in Baltimore, consists of affiliates, chapters and divisions in all 50 states and coordinates “programs, services, and resources to defend the rights of blind Americans,” according to its website.
  
  The lawsuit, filed in Baltimore City Circuit Court, is seeking damages from the NFB on four counts, including battery; negligence; negligent hiring, training, supervision and retention; and violation of requirements to report suspected abuse of a child under Maryland law.
  
  In the lawsuit, Mendez said her mother told the NFB’s leadership about Ausbun sexually assaulting her daughter, but even afterward, the lawsuit alleges, the NFB “still failed to exact any punishment.”
  
