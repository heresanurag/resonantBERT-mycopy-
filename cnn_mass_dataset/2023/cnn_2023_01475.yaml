title: "Secret Service agent on Biden’s granddaughter’s security detail fired weapon in response to car break-in"
date: "2023-11-13"
section: "Politics"
url: "https://www.cnn.com/2023/11/13/politics/secret-service-dc-break-in/index.html"
content: |
  A US Secret Service agent on President Joe Biden’s granddaughter Naomi Biden’s security detail shot at individuals attempting to break into a US government vehicle in Georgetown, CNN has learned.
  
  “On Nov. 12 around 11:58 p.m. in the Georgetown neighborhood of Washington, DC, Secret Service agents encountered possibly three individuals breaking a window on a parked and unoccupied government vehicle,” Secret Service spokesman Anthony Guglielmi said in a statement.
  
  He added, “During this encounter, a federal agent discharged a service weapon and it is believed no one was struck. The offenders immediately fled the scene in a red vehicle and a regional lookout was issued to supporting units.” There was “no threat” to any of the Secret Service’s protectees, Guglielmi said.
  
  A source familiar with the matter confirmed to CNN that the agent involved was assigned to Naomi Biden’s detail. First lady Jill Biden’s office declined to comment on the matter.
  
  The incident was firstreportedby the Associated Press.
  
  Guglielmi said the incident is being investigated by the DC Metropolitan Police Department and the Secret Service.
  
  “The officer involved shooting incident remains under investigation by the Metropolitan Police Department Internal Affairs Division’s Force Investigation Team, which investigates all law enforcement officer involved shootings in the District of Columbia,” DC police said in a statement. “The facts and evidence in the case will be independently reviewed by the United States Attorney’s Office.”
  
  The incident comes amid an uptick in crime in Washington, DC. Motor vehicle theft is up 98% over the past year, according tostatisticsfrom DC police.
  
  This story has been updated with additional details.
