title: "Opinion: Is Tucker Carlson the reason Texas Gov. Abbott says he’ll pardon a convicted killer?"
date: "2023-04-10"
section: "Opinion"
url: "https://www.cnn.com/2023/04/10/opinions/texas-abbott-pardon-murder-trial-obeidallah/index.html"
content: |
  Editor’s Note:Dean Obeidallah, a former attorney, is the host of SiriusXM radio’s daily program “The Dean Obeidallah Show.” Follow him@DeanObeidallah@masto.ai. The opinions expressed in this commentary are his own. Viewmore opinionon CNN.
  
  Texas Gov. Gregg Abbott announced this weekend that heplans to pardona defendant convicted last week in the shooting death of a US military veteran who took part in a 2020 Black Lives Matter protest.
  
  Abbott’s planned pardon is a dangerous attack on the rule of law.
  
  Why is the Republican governor – who pardonedjust two peoplelast year – in a hurry to pardon the person who was convicted days ago of fatally shooting 28-year-oldAir Force veteran Garrett Fosterin the middle of a Texas street?
  
  Abbott’s pardon announcement came after he wasgoadedto do so by figures on the right – from Fox News hostTucker Carlsonto thechairman of the Texas Republican PartytoKyle Rittenhouse. The last becamecelebrated in right-wing circleswhen, as a teenager, he shot three people in 2020 –killing two and injuring another– during unrest and anti-racism protests in Kenosha, Wisconsin. (Rittenhouse, who wasacquitted on all countsin November 2021, testified that he acted in self-defense.)
  
  The facts of the Texas murder case were fairly straightforward: On the night of July 25, 2020, defendant Daniel Perry wasworking as an Uber driverin Austin as protests were taking place in the Texas capital over the gruesome murder of George Floyd. Foster, who wasopenly carryingan AK-47, was one of the protesters taking part in the demonstrations.
  
  Texas Gov. Abbott says he's working to pardon sergeant convicted of killing protester at 2020 BLM rally
  
  According toAustin police, Perry was driving his car when he reached an intersection blocked by BLM protesters. He initially paused for a few seconds to allow some demonstrators to cross the street, but after honking his horn at them, heran a red light.Theprosecution arguedPerry initiated the encounter by running the light and turning into the crowd, according toCNN affiliate KEYE. That’s when the confrontation took place between Perry and Foster – both White and legally armed.
  
  There areconflicting accountsas to whether Foster pointed his weapon at Perry or Perry made the first move. What’s undisputed, however, is that Perryfired five shotsfrom his .357 revolver through his car window, killing Foster. Perryfled the scenebut latercalled policeto report the shooting, saying he acted inself-defense.
  
  During the trial, thekey questionfor the Texas jury was whether Perry’s shooting was justified under the state’s “Stand Your Ground” law, which allows deadly force to be used by those who feel their life is in danger.
  
  ProsecutorsarguedPerry had instigated the incident and introduced into evidence messages that suggested the shooting was not a spur-of-the-moment act but a premeditated one. One of the most damning was Perry’s Facebook message to a friend before the shooting that he might “kill a few peopleon my way to work. They are rioting outside my apartment complex.” Defense attorneyssaid that Foster had threatened Perryby pointing his gun at Perry.
  
  Opinion: Idaho's new abortion law is first to challenge the right to travel
  
  During the eight-day trial,dozens of witnessestestified, and forensic evidence was presented. After deliberating for 17 hours, the jury rendered a unanimous verdict on Friday finding Perry guilty of murder. (The jury found him not guilty of aggravated assault with a deadly weapon, and a deadly conduct charge is pending with the county attorney’s office.)
  
  Then Carlson and others on the right began to pressure Abbott to issue a pardon, because they didn’t agree with the verdict.
  
  On his Fox News show on Friday night, Carlson called on Abbott to pardon Perry,arguingthat the defendant had acted in self-defense – despite the jury rejecting that argument. Carlson even attacked the prosecutor by describing him as a “Soros-funded DA,” invoking the billionaire Jewish philanthropistwhose name is often used as an antisemitic putdownby the right. Carlson declared that the verdict “means that in the state of Texas, if you have the wrong politics, you’re not allowed to defend yourself.”
  
  The Fox News host was not alone in clamoring for Perry to be pardoned for killing a protester advocating for Black Lives Matter, an organization that has been repeatedly demonized by the right, with then-President Donald Trump in 2020 calling the words “a symbol of hate” andRep. Marjorie Taylor Greenein 2021 labeling the movement “the strongest terrorist threat” in the country.
  
  Texas Attorney General Ken Paxtonreleased a statementto Fox News Digital claiming that “the Soros-backed DA … cares more about the radical agenda of dangerousAntifaand BLM mobs than justice.” And another Texas Republican, US Rep. Ronny Jackson,tweetedhis demand that Abbott “PARDON Daniel Perry IMMEDIATELY!”
  
  Opinion: Three little letters that have Florida's Ron DeSantis on the attack
  
  Did Jackson cite evidence showing that the jury had made a mistake? Nope. But like some other Republicans, he dog-whistled the name Soros, saying, “don’t let a Soros-owned Austin liberal DA destroy our justice system.”
  
  As the pressure campaign mounted,  Abbott announced that he would ask the Texas Board of Pardons and Paroles – whose members he appoints – to expedite the pardon paperwork for Perry, which he vowed to sign as soon as it “hits my  desk.” The governor justified his work for a pardonby saying, “Texas has one of the strongest ‘Stand Your Ground’ laws of self-defense that cannot be nullified by a jury or a progressive District Attorney.”
  
  But the jury was aware of the Stand Your Ground law. It reviewed the facts in the case and determined that Perry was guilty. If the verdict is so clearly wrong, then lawyers for the defendant should file an appeal. (Perry’s attorney, Clint Broden, told CNNhis client plans to appeal the verdict.)
  
  In fact, David Wahlberg, a former Travis County criminal court judge,told the Austin American-Statesmannewspaper that he can’t think of another case in Texas history when a governor sought a pardon before a verdict was formally appealed.
  
  Trial verdicts are determined by judges and juries, and sentences should not be set aside by a governor – apparently for political reasons. What Abbott is doing is not just wrong, it’s dangerous. His pardon, when it comes, is not what the rule of law looks like.
