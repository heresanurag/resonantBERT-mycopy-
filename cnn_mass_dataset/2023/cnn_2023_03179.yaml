title: "US aid to Israel and Ukraine: Here’s what’s in the $105 billion national security package Biden requested"
date: "2023-10-20"
section: "Politics"
url: "https://www.cnn.com/2023/10/20/politics/us-israel-ukraine-aid-package/index.html"
content: |
  Weeks after the Biden administrationlaid out the detailsof a $105 billion national security package that includes funding for both Israel and Ukraine, Senate Majority Leader Chuck Schumer said he would bring the supplemental requestto the flooras soon as next week.
  
  But the effort facessteep hurdlesin getting through Congress. Among them: The House and Senate are divided over whether to continue sending aid to Ukraine, and Republican lawmakers want to tie the funding to tightening immigration laws.
  
  The supplemental package would provide security support to Israel, bolster Israeli efforts to secure the release of hostages and extend humanitarian aid to civilians affected by thewar in Israel and Gaza, according to a White House fact sheet released in October.
  
  It would also provide training, equipment and weapons to help Ukraine defend itself against Russia’s invasion and to recapture its territory, as well as to protect Ukrainians from Russian aggression, the fact sheet said.
  
  The package would also include additional funds to supportUS-Mexico border security, including more patrol agents, machines to detectfentanyl, asylum officers and immigration judge teams. Plus, it would provide funding to strengthen security in the Indo-Pacific region, including Taiwan.
  
  Biden makes the case for wartime aid to Israel and Ukraine in primetime address
  
  President Joe Biden pushed for the funding request in aprime-time Oval Office addressto the nation in October. The administration’s prior request for $24 billion in Ukraine aid was not included in astopgap government funding measureCongress approved in late September.
  
