  # The last government shutdown was the longest in nearly 50 years. Here are all the recent shutdowns in one chart
  
  By Gillian Roberts and [![Image 1: Kaanita Iyer](https://media.cnn.com/api/v1/images/stellar/prod/1418603-3621-r-ps2560x1440.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/kaanita-iyer)[Kaanita Iyer](https://www.cnn.com/profiles/kaanita-iyer)
  
  Updated Nov 4, 2025
  
  Updated Nov 4, 2025, 4:55 PM ET
  
  PUBLISHED Sep 30, 2025, 4:00 AM ET
  
  US shutdown Congressional news
  
  [See all topics](https://www.cnn.com/follow)
  
