  _CNN 10 serves a growing audience interested in compact on-demand news broadcasts ideal for explanation seekers on the go or in the classroom. The show’s priority is to identify stories of international significance and then clearly describe why they’re making news, who is affected, and how the events fit into a complex, international society._
  
