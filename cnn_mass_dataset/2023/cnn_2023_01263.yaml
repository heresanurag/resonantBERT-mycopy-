  _September 28, 2023_
  
  Today on CNN10, a landmark lawsuit and a looming government shutdown. We’ll get into the details of why the US government is suing Amazon and why government agencies are preparing to pause. Plus, a series of inspiring stories about women, daredevils, and daredevil women.
  
