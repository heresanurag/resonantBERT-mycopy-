title: "Emma Stone is at the center of rumors about a new ‘from the vault’ Taylor Swift song"
date: "2023-07-08"
section: "Entertainment"
url: "https://www.cnn.com/2023/07/08/entertainment/when-emma-falls-in-love-taylor-swift/index.html"
content: |
  As Swifties and others rejoice at the release ofTaylor Swift’s“Speak Now (Taylor’s Version),” a reissue of the star’s third studio album from 2010, one previously unreleased track has some scratching their heads.
  
  “When Emma Falls in Love,” one of the “from the vault” songs in the album rerelease, is gainingtraction onlineas being about Oscar-winning actor Emma Stone, a known friend of Swift’s from the time “Speak Now” was initially written, around 2008-2010.
  
  Several clues have been pointed out by eagle-eyed Swifties, including the fact one lyric, “Cause Little Miss Sunshine always thinks it’s gonna rain,” might be a nod to Stone’s biggest hit film of the era, “Easy A,” in whichshe famously rocks outto Natasha Bedingfield’s “Pocketful of Sunshine.”
  
  The movie was released the same year as the original “Speak Now,” in 2010, and Swift even attended the “Easy A” premiere to show support for her friend Stone.
  
  Other slightly more vague clues come with a lyric referencing how Emma in the song “calls up her mom” to talk about her love life. Stone notably has taken her mother Krista to various awards shows and public events, perEntertainment Weekly. And the line “Well, she’s so New York when she’s in L.A.​​” could also be a reference to Stone, who was known to live in Los Angeles around the same time but was seen with Swift in New York City on a number of occasions.
  
  Whatever the case may be, all the signs point to “When Emma Falls in Love” indeed being about Stone, as this wouldn’t be the first time Swift has made a sly reference to a real life person in her life (yes, we’re thinking of you, “Dear John” Mayer).
