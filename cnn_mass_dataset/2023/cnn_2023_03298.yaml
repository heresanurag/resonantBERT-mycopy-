title: "Rite Aid stock is experiencing extreme turbulence: Here’s why"
date: "2023-08-28"
section: "Investing"
url: "https://www.cnn.com/2023/08/28/investing/rite-aid-stock-bankruptcy"
content: |
  Shares of Rite Aid ended Monday’s session higher after a day of highly volatile trading.
  
  Rite Aid’s stock price experienced steep swings throughout the trading day, soaring more than 20% higher than its opening price in morning trading and then falling to near-session lows close to midday. The stock surged again in the afternoon and ended the day 8.23% higher.
  
  The steep swings come after Rite Aid saw its price of shares tumble Friday amid reports that the drug store chain was preparing to file for bankruptcy.
  
  The Philadelphia-based chain sank 51% on Friday setting a new all-time low of $0.71 a share. Shares of Rite Aid (RAD) are down more than 91% since this time last year.
  
  Friday’s plungecame afterThe Wall Street JournalandBloombergreported that Rite Aid was preparing to file for Chapter 11 bankruptcy. Rite Aid is currently about $3.3 billion in debt and has been embroiled in a legal battle for allegedly filling unlawful opioid prescriptions.
  
  The Department of Justicefiled suitagainst the company in March, claiming that it knowingly processed “unlawful prescriptions for controlled substances.” That stands in violation of False Claims Act and Controlled Substances Act.
  
  Filing for bankruptcy would restructure Rite Aid’s debt, including any legal liabilities.
  
  Rite Aid told CNN in a statement Friday that it “does not comment on rumors and speculation.”
  
  Rite Aid is currently theseventh largest pharmacychain in the United States, with more than 2,200 stores in 17 states.
  
  Purdue, Endo Pharmaceuticals and Mallinckrodt have also declared bankruptcy after facing similar opioid lawsuits.
  
  More than 760,000 people have died from a drug overdose since 1999, according to the Department of Health and Human Services. About 75% of drug overdose deaths in 2020 involved an opioid.
