  In addition to releasing more than a dozen studio albums and receiving multiple Grammy nominations as a rapper, Snoop Dogg has been expanding his business empire.The rapper has expanded intopet accessoriesand a gluten-freecerealcalled Snoop Loopz.
  
  In 2020, he launched his ownwinelabel. As avocal cannabisadvocate, he has his own line ofcannabis products.
