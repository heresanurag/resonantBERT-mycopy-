  In December, the former presidentunveiled plansas part of his “free speech platform” that included vows to ban federal money from being used to label speech as misinformation or disinformation and to punish universities engaging in “censorship activities” with cuts to federal funding.
  
  Trump did not elaborate Friday on how he would pay for his latest proposal – leaving unanswered what could be the biggest question as Republicans in Washingtonseek to curb federal spending. He also did not explain how some elements of his proposal differ from similar Democratic plans.
  
  His plan, which was light on details, includes three additional planks: increasing tariffs on goods imported into the United States; providing families with “baby bonuses” that he said would “help launch a new baby boom”; and launching a beautification effort aimed at removing “ugly” buildings and revitalizing parks and public spaces.
  
  Trump did not explain what “baby bonuses” would amount to or who would qualify. It’s not clear how his proposal differs fromthe enhanced child tax credit, which wasn’t extended beyond 2021. A group of Democratic lawmakers and progressive advocates tried – but failed – to have it included in the $1.7 trillion spending measure in December. That proposalwas blocked by Republicans.
  
  Trump on Friday also called for universal tariffs and imposing higher taxes on imported goods. He said he would escalatea trade battle with China, which he began during his four years in the White House. Doing so, he said, would jump-start American manufacturing.
  
  President Joe Bidenhasleft tariffs in placeon $350 billion of Chinese goods – nearly two-thirds of what the US imports from China – which were imposed by Trump.
  
  However, the costs of those tariffs are beingpassed on to American consumers, and contributing to inflation, experts say.
  
  Treasury Secretary Janet Yellensaid last yearthat those tariffs on Chinese goods have “imposed more harm on consumers and businesses” than on China.
  
