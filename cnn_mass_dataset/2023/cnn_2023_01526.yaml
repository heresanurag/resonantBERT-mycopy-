title: "Chinese leaders defend state of economy at global finance summit in Hong Kong"
date: "2023-11-07"
section: "Economy"
url: "https://www.cnn.com/2023/11/07/economy/china-economy-reassurance-finance-summit-intl-hnk/index.html"
content: |
  EDITOR’S NOTE:Sign up for CNN’s Meanwhile in China newsletter, which explores what you need to know about the country’s rise and how it impacts the world.
  
  Senior Chinese officials have defended the state of the world’s second largest economy at a conference in Hong Kong, telling global financiers not to worry about prospects in China despite an uneven recovery and ailing property market.
  
  In a recorded message, Vice Premier He Lifeng told the audience of international CEOs that China was on track to hit its growth target of about 5% this year, framing it as a much needed boost for the world economy.
  
  “Since the beginning of the year, China’s economy has been picking up in general,” He said Tuesday at the Global Financial Leaders’ Investment Summit, which was organized by the Hong Kong Monetary Authority, the city’s de facto central bank. “It will certainly inject fresh positive energy into the global economic recovery.”
  
  China’s economy enjoyed asolid startto 2023 after emerging from three years of Covid restrictions, but the recoveryfizzled outin the second quarter. It is now grappling with mounting challenges,ranging from weak consumer spending and a deepening property crisis toa slumpin foreign investment.
  
  The vice premier’s virtual appearance was followed by an in-person panel of officials including Zhang Qingsong, deputy governor of the People’s Bank of China, who argued that despite recent headwinds, China’s economy was in good shape.
  
  “Global investors have some concerns about China’s economy, including the pace of economic recovery, problems with property markets, and local government debt. You may ask me, ‘Are you worried?’” he quipped. “No, not always. Not too much.” The remark elicited laughter in the room.
  
  China’s economy regains momentum. But real estate remains a drag
  
  Producing a series of slides to bolster his case, Zhang pointed to China’s working-age population of more than 900 million, its investment in research and development — which he said ranked second in the world — and its long-term status as an export powerhouse.
  
  “The potential of the Chinese economy remains promising,” he told the audience, which included the heads of Goldman Sachs, Citi and Morgan Stanley.
  
  Even in the face of increased global uncertainty, the foundation of China’s economy has not changed and remains “stable” from a long-term perspective, Zhang added. He also dismissed concerns about China’s government debt, calling its current level of 79.4% of gross domestic product (GDP) in line with the international average and “much lower” than other major economies.
  
  In the third quarter, the economyregained some momentum, with GDPup 4.9% compared to a year ago, according to official data released last month.
  
  The data has renewed optimism in some circles. The International Monetary Fund on Tuesdayraised itsoutlook for China’s economy, projecting GDP growth of 5.4% in 2023 and 4.6% in 2024. Both were up 0.4% on previous forecasts, and reflected stronger than expected third-quarter data, along with recent government measures to boost activity, the IMF said.
  
  But the recovery appears uneven.Trade data released Tuesday showed a mixed picture in October, with exports falling 6.4%, far worse than the 3.3% drop economists had expected. That marked the sixth consecutive monthly decline in exports. Imports, though, beat forecasts, growing for the first time in eight months with a 3% increase.
  
  The country’s property sector, which accounts for as much as 30% of GDP, has remained a drag, however, because of a slump in home sales and a cash crunch.
  
  Zhang noted the concerns, though he tried to shrug them off by describing the situation as a process of “natural selection.” He suggested it was normal for the industry to experience ups and downs after years of continued expansion.
  
  “Like in other industries, the rapid growth of the property sector cannot be sustained. And sometimes, the supply and demand will experience a major shift, and some correction may follow,” he said.
  
  To stabilize the industry, the government has “ruled out” many policy measures this year, while introducing new ones to help shore up demand, added the central bank official.
  
  These included the construction of dual-purpose facilities in urban areas, the speeding up of renovation projects in big cities and the building of more rental homes, which should stimulate activity, he said.
  
  “Therefore, we’re quite optimistic about the future of China’s property market.”
  
  China’s housing market struggle will weigh on global growth
  
  Wang Jianjun, vice chairman of the China Securities Regulatory Commission, the country’s top securities watchdog, echoed the hopefulremarks, saying his peers had “told you that all the concerns [with China] have been addressed.”
  
  Going forward, the government will make it easier for mainland Chinese companies to list shares in Hong Kong, as well as “deepen and optimize” the use ofStock Connect, a trading link that gives international investors access to shares in mainland China via the city,according to Wang. Details of the latter were still being worked out, he added.
  
  Recently, China has lifted restrictions onthe proportion of shares in Chinese businesses that can be held by foreign companies, while also granting more solely foreign-owned companies financial licenses, Wang noted.
  
  “At the moment, the mainland [Chinese] capital market is full of opportunities,” he said. “If you get on this train, then you will certainly [succeed].”
  
  — CNN’s Laura He contributed to this report.
