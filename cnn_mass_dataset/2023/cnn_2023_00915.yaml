title: "Distressed bear cub rescued after its head was trapped in a plastic container"
date: "2023-08-27"
section: "US"
url: "https://www.cnn.com/2023/08/27/us/black-bear-pennsylvania-rescue-jug-trnd/index.html"
content: |
  Pennsylvania Park Manager Sarah Lindgren is no stranger to wildlife, so when she sawa bear cub in distress, she knew exactly what to do.
  
  Lindgren was driving through Cross Fork, a small village in northern Pennsylvania on Sunday, when she spotted a young bear on the side of the road with a plastic container stuck on its head.
  
