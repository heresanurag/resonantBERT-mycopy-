title: "Nicole Kidman’s AMC ad is two years old, and just as beloved (and divisive) as ever"
date: "2023-11-28"
section: "Entertainment"
url: "https://www.cnn.com/2023/11/28/entertainment/nicole-kidman-amc-ad-keith-urban-cec/index.html"
content: |
  Since late 2021, filmgoers who flock to the altar of their local movie theater have borne witness to a kind of gospel: “We come to this place for magic.”
  
  “We come to AMC Theaters to laugh, to cry,” to begin our cinematic journey with Nicole Kidman stomping through a puddle in stilettos and a sparkly pantsuit to sit in an empty cinema and marvel at “Jurassic World.”
  
  The swelling melodrama of the now-iconicAMC commercialwas initially embraced as a campy ode to movie magic and the power of pantsuits,﻿capably sold by the Oscar-winning Kidman. Then, as people saw it over and over again, the ad became a meme. Audience members started reciting Kidman’s exhilarated monologue along with her, and its popularity jumped off-screen and grew.
  
  Kidman and her AMC collaborators haveadmittedthey didn’t expect the performance to be embraced as a campy work of art. Kidman’s husband Keith Urban evensaidin an interview with podcaster-slash-magician Criss Angel that Kidman was merely doing AMC a solid during “hard times for theaters” during the pandemic.
  
  “(We) never in a million years expected it to be this cultural thing,” he said.
  
  Now, the AMC spot is entering a new phase of cultural appreciation. It’s still playing two years later, delighting audiences who know the rapturous monologue by heart and mildly irritating those who just want the darn movie to start.
  
  For those who appreciate the maudlin absurdity of theatre, the Kidman ad works because it’s a collection of seemingly incongruous parts.
  
  There’s Oscar winner Nicole Kidman, dressed to the nines, strutting not onto a red carpet but into her local cineplex. She recites lines like “We go somewhere we’ve never been before — not just entertained, but somehow reborn” with complete integrity while a scene from “Wonder Woman” flashes before her eyes.
  
  Not to mention, the adforAMC almost only playsatAMC, to captive audiences halfway through their popcorn who need no additional persuasion to go to the movies, where they already are.
  
  Since its debut in September 2021, when more and more audience members began to return to the theater after the prolonged drought of the early pandemic, people have fallen in love with the odd exultation.
  
  Some audience members have been filmedstandingthroughout the spot and saluting Kidman through the screen. There have been innumerable parodies (including aninfamousLionsgate-produced ad for the most recent “Saw” movie), recreations (“RuPaul’s Drag Race” favorite Katyarockeda pantsuit to her local “Gay-MC Theaters”) and Halloween homages.
  
  Some devotees on TikTok evenmadethe pilgrimage to the suburban Los Angeles AMC location where Kidmanfilmedthe ad to retrace her pointy-toed steps. When AMC dared to debut a shortened version of the ad, cutting the line “heartbreak feels good in a place like this,” viewersbalkedand prompted the company to restore the ad in its full, glorious form.
  
  AMC, eager to capitalize on the ad’s infamy, released an extensive line ofmerchandiseprinted with excerpts from Kidman’s monologue: There’s a babyonesiewith the phrase “We come to AMC Theaters to laugh, to cry, to care,” with the word “cry” cheekily formatted in bold. Oneshirteven dubs the monologue “The Pledge” and features the entire script on the back so passersby can read it and be moved.
  
  In November, AMCannounceda collaboration with Loungefly, a company that produces merchandise tailored for all kinds of fandoms. The result is a sparkly pin-striped mini backpack with double-breasted buttons and a little collar – proof that the commercial is now so widely known, it can be reduced to just a silhouette and a suggestion.
  
  Two years after it first premiered, the ad is at the point where it will either be run into the ground, or ascend to some higher theatrical plane. Some audiences are souring on its ubiquity, claiming it’s lost its luster after countless parodies, including a“Saturday Night Live”sketch and an appearance in Jimmy Kimmel’s Oscarsmonologueearlier this year. Since 2022, moviegoers on Reddit have been polling each other on whether the ad is anobnoxiouswaste of time.
  
  Movie theaters, meanwhile, are still struggling to convince audiences to return in large numbers after the pandemic and the streaming boom, though hits like“Barbie”and“Taylor Swift: The Eras Tour”boosted 2023 summer box office numbers. Theaters are continuing toclose, and theSAG-AFTRA strike’srestrictions on actors meant, for a time, Kidman was one of the only celebrities viewers would likely see ahead of a film.
  
  But AMC is continuing to bet on the prolific star. Kidmanrenewedher deal with the company last year, and CEO Adam Aron evencalledher “The First Lady of AMC.” There’s a second Kidman ad in the works, he told Variety in May, which all but guarantees Kidman will greet audiences for years to come. Love them or hate them, it seems the immortal words of AMC’s pre-show gospel are on their way to movie history.
