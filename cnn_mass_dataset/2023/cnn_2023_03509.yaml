  6That’s how many inches of rain Hong Kong received within one hour today.Flash flooding in the cityhas submerged metro stations and trapped drivers on roads as authorities suspended schools and urged the public to seek safe shelter. The hourly rainfall today is the highest since records began in 1884, the government said.
  
  “Over 250 million people face acute food insecurity worldwide and by deliberately attacking Ukraine’s ports, the Kremlin is depriving them of the food they desperately need.”
  
  — EU Council President Charles Michel, accusing Russia of “weaponizing food” after the country pulled out of a deal in July that allowed Ukrainian ships to safely navigate through the Black Sea. While the EU attempts to provide alternative export routes, Ukraine also submitted an official proposal to Turkey this week to operate a “grain corridor” in the Black Sea without Russia’s participation. This comes as accounts on the ground say Ukrainian forces aremaking incremental gainsamid constant attacks from both sides.
  
