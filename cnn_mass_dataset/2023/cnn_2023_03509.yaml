title: "5 things to know for Sept. 8: Presidential race, Hurricane Lee, G20, SCOTUS, Climate"
date: "2023-09-08"
section: "US"
url: "https://www.cnn.com/2023/09/08/us/5-things-to-know-for-sept-8-presidential-race-hurricane-lee-g20-supreme-court-climate-change"
content: |
  Covid-19 cases are increasing, but after the pandemic’s intense physical and emotional toll, many people can’t seem to muster the energy to care. If the virus feels too overwhelming to think about again or is not yet in your immediate view,these expert tipscan help you get over Covid apathy.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  A new CNN poll reveals decreased confidence among Democratic-aligned voters about supporting President Joe Biden in the 2024 election. Thedismal poll numberscome as Biden faces broadly negative job ratings overall and widespread concerns that his age, at 80 years old, might affect his current level of physical and mental competence. According to the poll, a broad 67% majority of Democratic and Democratic-leaning voterswish they had an alternativeto Biden — and 46% of registered voters say that any Republican presidential nominee would be a better choice than Biden in 2024. While we are still around 14 months away from the election, it’s a safe bet that Biden will be the party’s nominee, assuming no other credible Democrats will step up to challenge him. However, analysts are cautioning his current unpopularity may give former President Donald Trump hisshot at reclaiming power.
  
  Hurricane Lee has strengthened into amajor Category 5 storm, packing maximum sustained wind speeds of 160 mph as it spins over the Atlantic. The storm system is well east of the Caribbean but could still become a dangerous hurricane over the southwestern Atlantic early next week, according to the National Hurricane Center. Computer modeltrends for Leehave shown the hurricane taking a turn to the north early next week, though it’s still too soon to know how close it will get to the US. Meteorologists say that any potential impact on the East Coast will become more clear as Lee moves to the west in the coming days.
  
  World leaders have begun arriving in India for theannual G20 summit, where they will meet to address several pressing crises facing the globe. President Joe Biden and other US allies are set to arrive today at the forum in New Delhi, but Russian President Vladimir Putin and China’s President Xi Jinping arenot expected to attend. Amid heightened international tensions, the two autocratic leaders are skipping the summit for various reasons, but analysts say both absences display clear fracturescoursing through the gathering. Xi has never missed a G20 summit since taking power in 2012, which may mark a shift in how China views the G20 — a premier global forum that brings together economies representing 80% of global GDP.
  
  Justice Brett Kavanaugh said that the Supreme Court is working on “concrete steps” to addressethics issues at the high courtfollowing several news stories on justices’ unreported luxury travel and relationships with political donors. ProPublica, the Associated Press and other outlets have reported on issues concerning justices’ undisclosedtrips on private jets, lavish vacations and the use of taxpayer-funded staff to perform tasks related to book ventures. The comments from Kavanaugh come weeks before the start of a new term for the Supreme Court and critics, including Democrats in Congress, are pressuring the justices todevelop a code of conductspecific to the justices themselves.
  
  Planet-warming pollution made this summer’s heat twice as likely for most people on Earth, a new analysis has found. Between June and August, 98% of the global population — 7.95 billion people — experienced high temperatures made at leasttwice as likely by climate change, according to the research group Climate Central. Nearly half of humanity, around 3.9 billion people, also experienced 30 days or more of heat made at least three times more likely by planet-warming pollution, according to the report. This included the US states of Hawaii, Arizona, New Mexico, Texas, Louisiana and Florida. Data from another study this week showed June, July and August all broke global records for thehottest such months.
  
  How to watch US Open men’s semifinalsTwenty-year-old American Ben Shelton hopes to upset World No. 2 Novak Djokovic today in ahighly-anticipated semifinal match. The other semifinal will see world No. 1 Carlos Alcaraz face Russian third seed Daniil Medvedev.
  
  Detroit Lions shock reigning Super Bowl champion Kansas City ChiefsAlso in the sports world, the2023 NFL season kicked off Thursdaywith an impressive win for the Lions — and a complete shakeup for the Chiefs.
  
  Who will win the lying down contest?Seven competitors vying for the title of “Laziest Citizen” have been lying down on mats for over 20 days!View photos here.
  
  Ultra-spicy ‘One Chip Challenge’ removed from store shelvesTortilla chip brand Paqui isremoving the product from storesafter a Massachusetts family claims their teenage son may have died from eating the single “challenge” chip.
  
  Danny Masterson sentenced to 30 years to life in prison in rape caseThe actor, best known for his lead role on “That ’70s Show,” was sentenced to30 years behind barsafter being found guilty in May on two counts of rape.
  
