  After the war and during his trial at Nuremberg, Wilhelm Keitel, one of Hitler’s field marshals, would succinctly summarize and qualify the importance of what the Greeks did during this time with thefollowing quote:
  
  “The unbelievably strong resistance of the Greeks delayed by two or more vital months the German attack against Russia. If we did not have this long delay, the outcome of the war would have been different.”
  
  The legacy of Oxi Day
  
  As noted, it’s beendebated throughout theyears whether Prime Minister Metaxas ever said “oxi” to the Italian ambassador in the middle of the night, or if his words were simply, “Alors, c’est la guerre,” and then nothing else.
  
  What hasn’t been debated in the years since, though, is that very same morning, on October 28, 1940, after Metaxas addressed the Greek people via radio and told them of the Italian ultimatum and his response to it, the people of Greecespontaneously took to the streetsof their cities and villages chanting and shouting together as one, “Oxi!” For them to put aside politics and differing ideologies in a very politically fractured country was quite significant in and of itself, as Greece was a nation that had just suspended certain parts of its constitution and was underauthoritarianrule and would later descend intocivil warnearly as soon as WWII and the Axis occupation was over.
  
  But, for a brief moment, Greece stood united as one when it mattered most, and they stood stronger and more resilient than anyone ever thought possible.
  
  In acknowledgement of this Greek spirit and the country’s contribution,President Franklin Rooseveltis believed by some to have said,“When the entire world had lost all hope, the Greek people dared question the invincibility of the German monster, raising against it in the proud spirit of freedom.”
  
  In 1943, Joseph Stalin, the leader of the Soviet Union, also acknowledged during the German invasion of his country Greece’s contribution and role in the war, and isquotedas saying on a radio broadcast, “I am sorry, because I am getting old, and I shall not live long enough to thank the Greek people, whose resistance decided WWII.”
  
  When many think of the legacy of Oxi today, what they think of is perhaps the quotes above, or the more famous one from Winston Churchill, about how the Greeks fought when they were called upon to do so. But before the fighting began, there was a choice – to either surrender, or come together, as one, and resist and stand-up to evil – and every year on October 28, with parades and ceremonies in both Greece and around the world, that’s what’s celebrated most of all.
  
  Oxi Day celebrates the path of bravery, unity, and freedom over the path of fascism, tyranny, and lies.
  
  It’s a day that celebrates righteousness and good being stronger than evil, and reminds us that passing despots are mere representations of themselves and their time, and not of their people.
  
  And most of all, Oxi Day is a day that celebrates sacrifice of the highest order by the Greek people during WWII, and all those who fought in Greece alongside them. It serves as an eternal reminder of the enduring obligation to stand up to evil and injusticewhereverandwheneverit’s next seen — and how a small but brave country that had been all but forgotten was able to once again change the course of history and help save the world.
