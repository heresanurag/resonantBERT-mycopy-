  The fighting didn’t last long on Greek soil, though, and despite Greece’s significantly smaller population (just 7.3 million people) against the much larger Italy, which in 1940 had a population of 43.8 million, the better-equipped Italians were pushed back into occupied Albania again and out of Greek territory altogether.
  
  These initial Greek victories over the Italians were actually the veryfirst land victoriesfor the Allies in all of WWII, and the effect of this Greek pride, defiance and success was undeniable and even reached as far as America. On the cover of the December 16, 1940 issue ofLife magazinethere was a picture of a member of the Greek Evzone army unit standing at attention in front of the Temple of Olympian Zeus in Athens with a bugle at his lips. The cover ofTime magazineon the exact same day also paid tribute to the Greek victories and featured an image of the Greek army’s Commander-in-Chief and architect of their military defense, Alexandros Papagos, pencil-sketched in uniform with the Acropolis proudly behind him.
  
  For the Allies and America, this victory was both a representation of the low morale, convictions and capability of the invading Italian troops, combined with the fierce and inspirational spirit of the under-equipped and out-manned Greeks, who were fighting to defend their homes and everything they had. HistorianMark Mazowerwould later describe the event as the “first Axis setback of the entire war,” with the Greeks “surprising everyone with the tenacity of their resistance.”
  
  This changed things for Germany, as Hitler saw these Greek victories over the Italians as a direct threat to his own southern border and interests, so a fateful decision was made, and in early April 1941, German forces came south.
  
  Even though Greece had defied the odds and beaten the Italians when no one thought they could, they wouldn’t be able to defeat the combined Italian and German forces. It was very important that they continue to fight, though, because even though ultimate victory over Germany wasn’t achievable either in or by Greece, the ensuing battle would end up being very likely one of the deciding factors in the outcome of the entire war. How long the Greeks fought and resisted is ultimately what prolonged the German invasion of Russia into the harsh winter, when they could be defeated, just the same as Napoleon had been, a little over a hundred years earlier.
  
  Greece ultimately resisted the combined Axis forces for219 days, which was … more than triple the time of any other country that would come to be occupied during the war.
  
  There is a famous story about the Spartan Basileus Leonidas, his 300 warriors, and their doomed stand in 480 BCE against the Persians at Thermopylae where they fought as another small but determined group against a much larger invading opponent, facing certain defeat.
  
  In 1940 and 1941, the Greeks would bear a similarly fatal cost as they continued their resistance, against all odds, even after the Germans overran their northern border and reached Athens. The capital fell onApril 27, 1941and the Greek government fled to Crete, where resistance would still continue until Crete finally fell, too, inJune of 1941.
  
  All told, beginning on October 28, 1940 and continuing until early June 1941, Greece ultimately resisted the combined Axis forces for219 days, which was significantly longer and more than triple the time of any other country that would come to be occupied during the war.
  
  During the course of their resistance and the ensuing German and Italian occupation, Greece would lose in both military and civilian casualties, by varying counts, anestimated 10to13 percentof its entire population. Even the low end of that estimate is a staggering amount of people, and while it’s not something found in many history books, the importance of the Greek defeat of the Italians and delay of the Germans to the Allied war effort and eventual victory was essential, and something that would come to be a matter of great national pride.
  
