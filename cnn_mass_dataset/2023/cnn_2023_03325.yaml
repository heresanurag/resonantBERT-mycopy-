title: "Opinion: Greek resistance during WWII remains a model for confronting evil"
date: "2023-10-26"
section: "Opinion"
url: "https://www.cnn.com/2023/10/26/opinions/oxi-day-the-true-story-of-how-greece-helped-defeat-the-nazis-cosmos"
content: |
  Editor’s note: Christopher Cosmos is aBlack List screenwriterand best-selling author from Grand Rapids, Michigan, whose debut novel “Once We Were Here” is a multi-generational love story set in Greece during WWII about the Greek resistance and events that Oxi Day commemorates. Follow him onInstagramandFacebook. The opinions expressed in this commentary are his own. Readmore opinionat CNN.
  
  There is afamous quoteoften attributed to former British Prime Minister Winston Churchill, although some debate whether he said it:
  
  “From henceforth, we will not say that Greeks fight like heroes, but that heroes fight like Greeks.”
  
  It describes the heroic actions of Greece and the Greek people in resisting the Axis invasion of their country that began in the Fall of 1940 during World War II. To fully understand the quote, though, it’s necessary to start further back, in the hours before the invasion and fighting began.
  
  On October 28, 1940, Greece’s Prime Minister, Ioannis Metaxas, was awakened at his residence at 3 a.m. and given anultimatumby the Italian ambassador to Greece, Emanuele Grazzi: either let the Italians occupy Greece without a fight, or it would be war.
  
  The important words that come next have been debated throughout the years since.
  
  Grazzi himself, in hismemoirswrote that Metaxas said to him, staring straight into his eyes, “Alors, c’est la guerre!,” that translates from French - a common language of diplomacy at the time - as, “Then it is war!” When Grazzi responded by saying war could be avoided entirely if the Greeks simply surrendered, Metaxas interrupted and allegedly answered with a single Greek word: “Oxi.” No.
  
  Whether Metaxas actually said “oxi” (pronounced:Oh-hee) or not is still debated, but regardless of what he actually said, this is the word of refusal that would embed itself in the collective consciousness of the Greek people, and it would need to, because mere hours later, true to his word, then-Italian Prime Minister Benito Mussolini’s troopsinvadedfrom where they were stationed in Italian-occupied Albania, on Greece’s northern border. Greece’s military participation in WWII thus began.
  
  Adolf Hitler himself, as Chancellor of Germany and leader of the Axis Powers, hadno intentionof invading Greece. In fact, he’d told Mussolini, who had designs on expansion and conquest throughout the Mediterranean, not to start a war or create another front at all.
  
  The restless and ambitious Mussolini, however, hungry for glory of his own, decided to ignore Hitler’s orders. Before delivering hisultimatum, he told Count Galeazzo Ciano, his foreign minister (as well as his son-in-law), “Hitler always faces me with a fait accompli. This time I am going to pay him back in his own coin. He will find out in the papers that I have occupied Greece.”
  
  This, however, proved to be a miscalculation of the highest magnitude as Greece’s response to his ultimatum and the single word that was spoken in defiance by an entire nation during the early hours of October 28, 1940, would become a rallying cry not just for Greece, but also the rest of the Allies and the world, eventually changing the course of the entire war — and history — forever.
  
  The Italian offensive is rebuffed
  
  The Greek resistance to the Italian invasion was immediate, and after Italian troops spilled over the northern Greek border from Italian-controlled Albania that very same morning,at 5:30am, just hours after the rejection of the Italian ultimatum and declaration of war, fighting began between Greece and Italy in the northern mountains of Greece.
  
