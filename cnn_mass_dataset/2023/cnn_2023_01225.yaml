title: "Opinion: The perfect storm hitting homebuyers"
date: "2023-10-19"
section: "Opinion"
url: "https://www.cnn.com/2023/10/19/opinions/housing-market-mortgage-rates-glock/index.html"
content: |
  EDITOR’S NOTE:Judge Glock is the director of research and a senior fellow at the Manhattan Institute. He is the author of The Dead Pledge: The Origins of the Mortgage Market and Federal Bailouts, 1913-1939. The views expressed in this commentary are his own. Read moreCNN Opinion.
  
  Anyone looking to buy a house knows that this is not a great time. During the pandemic, mortgage rates were at their lowest level inhistoryand housing was cheaper. It took just about 20% of the median family income to pay for a mortgage with 20% down. Today, mortgage interest rates are up — the30-year fixed rateis currently 7.63%— and so are home prices. Americans need about35%of their income to pay for a mortgage, which is higher than at the peak of the so-called housing bubble in the early 2000s.
  
  Unfortunately for homebuyers, there is almost no hope that we’ll return to the affordable housing days of 2020. More concerning, there is little indication that recent trends will reverse or that homebuying will get much more affordable in the near future.
  
  The main reason homebuyers are struggling is that the cost of borrowing has gone up for everybody. After a burst of inflation, the Federal Reserve increased interest rates at one of the fastest paces in its history. The Fed has taken its targetinterest ratefrom near zero at the beginning of 2022 to almost 5.5%today.
  
  But the Fed’s rates mainly affect short-term borrowing. Even more important for mortgages are long-term interest rates that recently hit peaks.
  
  One of the main reasons for those higher long-term rates is unprecedented levels of federal deficits and debt. This year the federaldeficit, excluding the reversal of the government’s student loan forgiveness plan, hit $2 trillion, a level once inconceivable in peacetime. The Fed has also beenreducingits holdings of many long-term federal bonds and evenmortgage-backed securitiesbacked by the federal government. These trillions of dollars of bonds thrown on the market mean all sorts of borrowers have to compete for funds in a more crowded field, and therefore have to pay higher interest rates to attract investors’ attention.
  
