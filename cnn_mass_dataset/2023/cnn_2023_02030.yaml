  Children should also stay covered up and wear sunscreen. Babies younger than 6 months should be kept out of direct sunlight, sinceskin damagecan accumulate over time, according to theAmerican Academy of Pediatrics.
  
  Even on overcast or cold days, be sure to wear sunscreen on your face. Many lotions and makeup have some form of UV protection.
  
  The US Dermatological Association suggests wearing water-resistant sunscreen with an SPF of 30 or higher.
  
  If you’ll be in direct sun, theEnvironmental Working Group, a nonprofit consumer advocacy group that has spent more than a decade testing sunscreens, recommends lotion sunscreens over sticks. Apply enough to fill a shot glass – about an ounce – every two hours while you’re in the sun.
