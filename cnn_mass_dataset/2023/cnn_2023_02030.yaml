  Doctorsmay also trychemotherapy and/orradiation, depending onthe stage. Patients may getimmunotherapy, medicine that helps their body destroy the cancer cells.
  
  There’s no good way to prevent MCV, the common virus linked to Merkel cell carcinoma﻿, but there are good ways to protect yourself from this cancer.
  
  Early detection is key. Examine your skin every month, and get a regular checkup from a doctor. TheAmerican Academy of Dermatologyoffers free skin cancer screenings across the country every year.
  
  Boosting your immune systemmay help prevent cancer, the CDC says. Get proper sleep, avoid drinking too much, avoid smoking, maintain a healthy weight, eat a healthy diet, and get regular exercise.
  
  There’s alsoa lot you can doto protect yourself from damaging ultraviolet (UV) rays. Never use a tanning bed. When you’re outdoors, stay in the shade as much as possible, and wear protective clothing, a hat and sunglasses, theAmerican Cancer Societysays.
  
