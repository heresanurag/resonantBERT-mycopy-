title: "What to know about Merkel cell carcinoma, Jimmy Buffett’s rare cancer"
date: "2023-09-04"
section: "Health"
url: "https://www.cnn.com/2023/09/04/health/jimmy-buffett-rare-merkel-cell-carcinoma/index.html"
content: |
  Singer-songwriterJimmy Buffett, who died September 1, hadMerkel cell carcinoma, a skin cancer that’s diagnosed in fewer than 3,000 people in the US every year.
  
  Skin cancer is the most widespread form of the disease in the United States, according to theUS Center for Disease Control and Prevention, but Buffett’s death may be the first time people have heard ofMerkel cellcarcinoma. The condition wasnamed forGerman scientistFriedrich Merkel, whofirst describedthat type of cell in 1875.
  
  Merkel cells are thought to be a kind of neuroendocrine cell found at the base of the surface of the skin, the epidermis. They’re close to the nerve endings in the skin that let you feel a light touch.
  
  The 10 best sunscreens for acne-prone skin, according to dermatologists
  
  Merkel cell carcinoma happens when something makes them grow out of control. Although scientists don’t fully understand what causes it, they believe the cancer is connected to UV light exposure, a weakened immune system due to disease or age, and theMerkel cell polyomavirus (MCV), which is found in nearly all the tumors of this cancer.
  
  Nearly everyone gets MCV as a child, but it doesn’t cause any symptoms. The virus wasdiscoveredin 2008.
  
  ﻿Merkel cell carcinoma typically shows up on a person’s face or neck orinother areas that are often exposed to the sun, like the arm. It can also be found in places like inside the nose or esophagus.
  
  It looks like a raised red or purple lump or pimple, unlike melanoma, another serious form of skin cancer that shows up as a dark spot.
  
  AMerkel cell carcinoma may be mistaken for a cyst, but cysts can be painful while these spots often are not.
  
  Buffett, who was 76, had been living with the cancer for four years, according tohis official website.
  
  Most cancer screenings don’t extend life, study finds, but don’t cancel that appointment
  
  If it’s caught early enough, thechance of living at least five years after diagnosisis pretty good – about 75%, according to theAmerican Cancer Society– but if it has spread past the skin, likelihood of five-year survival dips to 24%.
  
  Although rare, it is the second most common cause of skin cancer death after melanoma, according to theNational Cancer Institute. It can be so deadly because it grows and spreads quickly, and it often can come back after treatment, usually within two or three years of diagnosis.
  
  Men aretwice as likelyto develop this cancer than women. About 90% of the people who have it are White, and about 80% are 70 and older. The risks may be related to how much sun damage a person has had over their lifetime,the American Cancer Society says.
  
  Because so few people have had this form of cancer, research is limited, and it is difficult to know exactly howto fight it. TheAmerican Cancer Societyrecommends that people who have Merkel cell carcinoma at any stage try to enroll in a clinical trial so they will have access to the latest treatments.
  
  If the cancer is in anearly stage, doctors will probably do a biopsy of the suspicious spot and thensurgically removethe spot and some of the tissues around it. They may also do a biopsy of a nearbysentinel lymph nodeto detect whether the cancer has spread. The American Cancer Society says cancer is detected in the lymph nodes of 1 in 3 people who have Merkel cell carcinoma.
  
