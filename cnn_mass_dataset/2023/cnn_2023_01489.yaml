  EDITOR’S NOTE:Fareed Zakaria hosts “Fareed Zakaria GPS,” airing at 10 a.m. and 1 p.m. ET Sundays on CNN. The views expressed here are his own. Readmore opinionat CNN.
  
  When one thinks of America’s greatest strengths, the kind of assets the world looks at with admiration and envy, America’s elite universities would have long been at the top of that list. But the American public has been losing faith in these universities – and with good reason.
  
  Three university presidentscame under firethis week for their vague and indecisive answers when asked whether calling for the genocide of Jews would violate their institution’s code of conduct. But to understand their performance we have to understand the shift that has taken place at elite universities, which have gone from centers of excellence to institutions pushing political agendas.
  
  Opinion: My students aren’t debating ‘genocide,’ they’re looking for the freedom to learn
  
  People sense the transformation. As Paul Tough haspointed out,the share of young adults who said a college degree was very important fell from 74% in 2013 to 41% in 2019. In 2018,61%of Americans said higher education was headed in the wrong direction, and only 38% felt it was on the right track. In 2016, 70% of America’s high school graduates were headed for college. Now that number is 62%. This souring on higher education makes America an outlier among all advanced nations.
  
  American universities have been neglecting excellence in order to pursue a variety of agendas — many of them clustered around diversity and inclusion. It started with the best of intentions. Colleges wanted to make sure young people of all backgrounds had access to higher education and felt comfortable on campus. But those good intentions have morphed into a dogmatic ideology and turned these universities into places where the pervasive goals are political and social engineering, not academic merit.
  
  As the evidence produced for the recent Supreme Court case on affirmative action showed, universities have systematically downplayed the merit-based criteria for admissions in favor of racial quotas. Some universities’ response to this ruling seems to be that they will go further down this path, eliminating therequirementfor any standardized test like the SAT. That move would allow them to take students with little reference to objective criteria. (Those who will suffer most will be bright students from poorbackgrounds, who normally use tests like the SAT to demonstrate their qualifications.)
  
  Opinion: Why student protests against Israel are so painful, polarizing and complicated
  
  In the humanities, hiring for new academic positions now appears to center on the race and gender of the applicant, as well as the subject matter, which needs to be about marginalized groups. Based on conversations with dozens of academics, my impression is that today a White man studying the US presidency does not have a prayer of getting tenure at a major history department in America. Grade inflation in the humanities is rampant. AtYale College,the median grade is now an A. New subjects crop up that are really political agendas, not academic fields. You can nowmajorin diversity, equity and inclusion at some colleges.
  
  The ever-growingbureaucracydevoted to diversity, equity and inclusion naturally recommends that more time and energy be spent on these issues. The most obvious lack of diversity at universities, political diversity, which clearly affects their ability to analyze many issues, is not addressed, showing that these goals are not centrally related to achieving, building or sustaining excellence.
  
  Opinion: For students and scholars, words matter. That’s why this is so appalling
  
  Out of this culture of diversity has grown the collection of ideas and practices that we have all now heard of — safe spaces, trigger warnings, and micro aggressions. As authors Jonathan Haidt and Greg Lukianoff havediscussed, many of these colleges have instituted speech codes that make it a violation of university rules to say things that some groups might find offensive. Universities advise students not to speak, act, evendressin ways that might cause offense to minority groups.
  
  With this culture of virtue signaling growing, the George Floyd protests erupted, and many universities latched on andissued statements, effectively aligning their institutions with these protests. By my memory, few took such steps even after 9/11 or during the Iraq War.
  
  In this context, it is understandable that Jewish groups would wonder, why do safe spaces, micro aggressions, and hate speech not apply to us? If universities can take positions against free speech to make some groups feel safe, why not us? Having coddled so many student groups for so long, university administrators found themselves squirming, unable to explain why certain groups (Jews, Asians) don’t seem to count in these conversations.
  
  Having gone so far down the ideological path, these universities and these presidents cannot make the case clearly that at the center of a university is the free expression of ideas and that while harassment and intimidation would not be tolerated, offensive speech would and should be protected. As CNN’s Van Jones has eloquentlysaid, the point of college is to keep you physically safe but intellectually unsafe, to force you to confront ideas that you disagree with passionately.
  
  What we saw in the House hearing this week was the inevitable result of decades of the politicization of universities. America’s top colleges are no longer seen as bastions of excellence but as partisan outfits, which means they will keep getting buffeted by these political storms as they emerge. They should abandon this long misadventure into politics, retrain their gaze on their core strengths and rebuild their reputations as centers of research and learning.
