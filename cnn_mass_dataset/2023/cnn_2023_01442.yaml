title: "Ex-Columbia University gynecologist sentenced to 20 years in prison on federal sex abuse charges"
date: "2023-07-25"
section: "US"
url: "https://www.cnn.com/2023/07/25/us/robert-hadden-gynecologist-sentencing?cid=external-feeds_iluminar_yahoo"
content: |
  A former Columbia University gynecologist accused by the wife of former Democratic presidential candidate Andrew Yang and others of sexual assault was sentenced Tuesday to 20 years in prison after his conviction earlier this year on federal sexual abuse charges.
  
  Robert Hadden, 64,wasconvictedin January of four counts of enticing and inducing individuals to travel interstate to engage in illegal sexual activity – each of which carried a maximum possible sentence of 20 years in prison, the US Attorney’s Office for the Southern District of New York previously said.
  
  On Tuesday, Judge Richard Berman sentenced Hadden to 20 years to be served concurrently for each of the four counts. The judge also imposed a $10,000 fine and lifetime supervised release after Hadden serves out his sentence.
  
  Dozens of accusers emerge after Andrew Yang's wife reveals sexual assault
  
  “I just want to say I am very sorry for all the pain I have caused,” Hadden said before the sentence was handed down in federal court in Manhattan, breaking into a sob. Hadden asked that his brevity not be mistaken for a lack of sincerity, noting his attorney had advised him to speak briefly in light of future efforts to appeal his case.
  
  Hadden then sat down at the defense table, holding his head in his hands. He removed his glasses to wipe his eyes.
  
  Theallegations against Haddenfirst became widely publicized after anexclusive interviewby CNN’s Dana Bash with Evelyn Yang and a series of reports by CNN’s investigative unit.
  
  In the wake of that reporting, dozens of women came forward saying they too had been assaulted by Hadden.
  
  US Attorney Damian Williams called Hadden a “predator in a white coat.”
  
  “For years, he cruelly lured women who sought professional medical care to his offices in order to gratify himself,” Williams said in a statement. “Hadden’s victims trusted him as a physician, only to instead become victims of his heinous predilection.”
  
  Exclusive: Evelyn Yang reveals she was sexually assaulted by her OB-GYN while pregnant
  
  Williams thanked all the “brave women who came forwardto tell their stories, many of whom testified at trial, to end his yearslong cycle of abuse.”
  
  Several of Hadden’s victims gave emotional statements about his abuse immediately after his conviction.
  
  Hadden wasinitially charged with six federal abuse counts.
  
  But prosecutors later filed a “streamlined” indictment charging him with four counts of enticing and inducing individuals to travel to engage in illegal sexual activity, according to Nicholas Biase, spokesperson for the US Attorney’s Office for the Southern District of New York.
  
  Hadden previously faced state charges brought by the Manhattan District Attorney’s Office, but secured acontroversial plea deal in 2016that saw him surrender his medical license and plead guilty to a criminal sex act in the third degree and forcible touching. He avoided prison time as a result of the deal.
  
  Hadden has not practiced as a doctorsince August 2012, according to Columbia University.
