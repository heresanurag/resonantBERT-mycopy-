title: "Opinion: Towering Netanyahu has never looked so weak"
date: "2023-07-25"
section: "Opinion"
url: "https://www.cnn.com/2023/07/25/opinions/netanyahu-legacy-israel-judicial-overhaul-showdown-ghitis/index.html"
content: |
  Editor’s note:Frida Ghitis, a former CNN producer and correspondent, is a world affairs columnist. She is a weekly opinion contributor to CNN, a contributing columnist to The Washington Post and a columnist for World Politics Review. The views expressed in this commentary are her own. Viewmore opinionon CNN.
  
  There is no question that history books will dedicate considerable space to the impact that Israeli Prime MinisterBenjamin Netanyahuhad on the fate of his embattled nation.
  
  After all, Netanyahu, nicknamed “Bibi,” was already thelongest-serving prime ministerbefore he managed to secure another stint in the top job inDecember, launching his most tumultuous term in office and the one that may well end up defining his legacy.
  
  And right now, that legacy looks like a dark one.
  
  Unless there’s a sudden reversal, it is likely that history will remember Netanyahu as the man who served the interests of Israel’s enemies by tearing the countryinto bitterly opposed camps. Instead of seeking common ground and trying to bring the people together, he pushed ahead with a plan that undermined the country’s democratic foundations.
  
  On Monday, as if history were trying to highlight the fragility of his power, Netanyahu was released from hospital after anemergency interventionto implant a pacemaker in time fora key votein the Knesset, Israel’s parliament.
  
  The oppositionboycotted the vote, but the Knesset approved a key element of the proposed judicial overhaul aimed at curtailing the power of the courts and strengthening that of the parliament, the Cabinet and the prime minister – all under Netanyahu’s control. The bill, approved 64-0, abolishes the so-calledreasonableness clause, weakening the Supreme Court’s ability to review Cabinet decisions it views as unreasonable.
  
  It’s all part of a legislative package that Netanyahu’s supporters call “reforms,” arguing they would strengthen democracy. However, opponents insist these measures constitutea coup, allowing Israel’smost right-wing government in historyto govern without any checks and balances and potentially inching the country toward dictatorship.
  
  In the United States, the three branches of government can restrain one another, and the 50 states operate with a great deal of autonomy. But in Israel’s parliamentary system, theprime minister controls not just the executive but also the legislaturethrough his majority coalition in parliament. And there are no separate state courts and legislatures. Without judiciary oversight, the prime minister and his bloc have little to stop them as they push their agenda.
  
  Powerful right-wing radicals are testing democratic checks and balance in both Israel and the US
  
  Supporters of the overhaulsay it reflects the results of elections and would make the country more democratic by defanging unelected judges.
  
  But the move has raised alarms across the country. For29 consecutive weeks, Israelis have been protesting in the streets, blocking highways and demanding a stop to far-reaching changes to their country’s legal system.The demonstrationshave been enormous, bringing out as many as 200,000 people at a time bysome estimates, in a country of just10 million.
  
  The passion driving these defenders of democracy is the one bright side to Israel’s crisis. This past weekend,thousandsundertook a gruelingmarch from Tel Aviv to Jerusalem, a steep uphill climb in scorching temperatures. They have been determined to stop what they say will change the character of their country.
  
  In an “emergency letter” published in January, prominent economists warned that “theconcentration of vast political powerin the hands of the ruling group without strong checks and balances could cripple the country’s economy.”
  
  Top security officials wrote ascathing letterto Netanyahu, holding him personally responsible for causing serious harm to Israel’s security.Reservists have saidthey will stop volunteering, and scores of businesses are closing their doors in protest.
  
  Netanyahu’s agendais very differentfrom what he promised when he came to office again seven months ago. Back then, he vowed to focus on stopping Iran’s nuclear program, expanding Israel’s relations with Arab countries and strengthening the economy.
  
  But Netanyahu shifted gears almost immediately, and he did it most likely to secure his hold on power by pleasing his new far-right coalition partners and possibly — although hesternly denies it— to protect himself from theongoing corruption prosecutionshe faces,on charges he denies.
  
  For Netanyahu, it’s a fight for his survival. For Israel, it is a battle over the character of the country. Will it remain amodern, pluralist democracy— a Jewish-majority nation with a secular government — or will it become a nationalist religious country with laws that reflect religious tenets, with less respect for pluralism and individual rights and perhaps more authoritarianism.
  
  For Netanyahu, it’s a fight for his survival. For Israel, it is a battle over the character of the country.
  
  To become prime minister, Netanyahu had to enlist the support of enough parties to have 61 votes out of the 120 seats in the Knesset. He cobbled together a coalition by bringing inright-wing extremistswho until then had been viewed as pariahs.
  
  Far-right activistsItamar Ben Gvir and Bezalel Smotrich,whose parties combinedwon 13 seatsout of 120, now hold power to enact their extremist positions, including expanding Israel’s control of the West Bank, reversing socially liberal policies and injecting more religion into public life.
  
  Netanyahu had long tempered his ideology with pragmatism, but changing course could mean losing their support and seeing his coalition collapse.
  
  Polls show that Netanyahu’s popularity started sinking from the moment he started pushing the far right’s agenda. A February poll found roughlytwo-thirds of Israelis opposingthe overhaul. Since then, multiple surveys have showed that if elections were held now, Netanyahu and his right wingwould lose power.
  
  Most dramatically, a poll released during the spring Passover holiday found Netanyahu’sapproval collapsing. When asked whom they would prefer as prime minister, just 34% said Netanyahu over the center-right Benny Gantz, with opposition leader Yair Lapid also beating the Israeli leader.
  
  President Joe Biden, whom Israelis know as a supporter of Israel,has been urging Netanyahuto safeguard Israeli democracy and try to build across-the-board support for changes. Florida Gov. Ron DeSantis, a 2024 GOP presidential candidate,has said Biden should butt outof Israel’s internal deliberations. Others say it’s time for the US to start pulling away from Israel. Biden is right in staking out a middle path. Israelis care what its indispensable ally thinks.
  
