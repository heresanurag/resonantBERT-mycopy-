  Netanyahu has been the towering figure in Israeli politics for decades. He is a brilliant man and a gifted politician. He has notchedmajor achievementsthat have benefited Israel. He unleashed the country’seconomic dynamism, helping turn it into a financial, technology and security powerhouse. He built Israel’s diplomatic ties in a hostile environment, evenamong Arab countries.
  
  But he also choked the last breath out of an admittedly moribundtwo-state solutionwithout offering a meaningful path out of the conflict with Palestinians, and heundermined bipartisan supportfor Israel in the US by contributing to former PresidentDonald Trump’s politicizationof the issue.
  
  Now, for his own benefit, Netanyahu is toying not only with Israel’s democracy but also with its social fabric, with the cohesion it needs to survive whenso manystillvow to destroy it. Unless he changes course, history will not be kind.
