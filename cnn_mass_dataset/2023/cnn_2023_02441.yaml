  “These letters are about universal human experiences, they’re not unique to France or the 18th century,” Morieux said in a statement. “They reveal how we all cope with major life challenges. When we are separated from loved-onesby events beyond our control like the pandemic or wars, we have to work out how to stay in touch, how to reassure, care for people and keep the passion alive. Today we have Zoom and WhatsApp. In the 18th century, people only had letters but what they wrote about feels very familiar.”
  
  Some of the correspondences are from wives of the sailors sending love letters to their husbands, wishing they could be reunited or waiting to hear whether their loved ones were safe.
  
  About 59% of the letters were signed by women, offering insights into literacy across classes and what life was like for those who were making key decisions at home as their husbands sailed the seas.
  
  “I could spend the night writing to you … I am your forever faithful wife,” Marie Dubosc wrote. “Good night, my dear friend. It is midnight. I think it is time for me to rest.”
  
  The letter was addressed to Louis Chambrelan, her husband and the first lieutenant of the ship. He never received the letter and never saw his wife again. Dubosc died in 1759, likely before he was released after being captured. Chambrelan returned to France and remarried in 1761.
  
  “These letters shatter the old-fashioned notion that war is all about men,” Morieux said in an email to CNN. “While their men were gone, women ran the household economy and took crucial economic and political decisions.”
  
  Morieux came across the box of letters at the UK’s National Archives while conducting research for his book “The Society of Prisoners: Anglo-French War and Incarceration in the Eighteenth Century.”
  
  Inside, the letters were bundled together with ribbon. Seeing that the small letters were still sealed, he asked whether correspondence could be opened and was granted permission. Unsealing the letters was “like finding a treasure box,” he said.
  
