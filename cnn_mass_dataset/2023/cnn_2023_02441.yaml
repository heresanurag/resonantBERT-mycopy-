title: "Rare ‘treasure box’ of French letters opened and read after 265 years"
date: "2023-11-06"
section: "World"
url: "https://www.cnn.com/2023/11/06/world/french-letters-national-archives-scn?cid=external-feeds_iluminar_yahoo"
content: |
