title: "Jamie Lee Curtis heavily teases ‘Freaky Friday 2’ team-up with Lindsay Lohan, and we’re here for it"
date: "2023-11-11"
section: "Entertainment"
url: "https://www.cnn.com/2023/11/11/entertainment/jamie-lee-curtis-freaky-friday-lindsay-lohan/index.html"
content: |
  It’s been 20 years since their “freaky” pairing, and all signs are pointing toward a highly anticipated redux for this beloved onscreenmother-daughter duo.
  
  Jamie Lee Curtis shared a stunning selfie with her “Freaky Friday” costar Lindsay Lohan on herverified Instagramaccount on Friday, with a caption that hints a sequel is a strong possibility in the “near future.”
  
  “Too late. YOU GREW UP and SO BEAUTIFULLY!” Curtis wrote next to the snap of the gorgeous pair. “Well, it’s Friday, and the strike is over so hopefully, we can switch places again in the near future!”
  
  The Oscar-winner tagged both Lohan and Disney at the end of her note.
  
  Curtis was referring to her and Lohan’s 2003 Disney movie “Freaky Friday,” which tells the story of a mother and daughter who switch bodies and all the hilarity that ensues.
  
  The film is itself a remake of a 1976 flick from the House of Mouse, which starred Jodie Foster as the daughter and Barbara Harris as the mom, and is based on the 1972 novel of the same name by Mary Rodgers.
  
  This isn’t the first time Curtis has teased a possible sequel to the popular remake.
  
  In February, she shared a similar post onInstagramof herself with Lohan, writing “Freaky fingers crossed” in the caption.
  
  Later that month, Curtissaid at an awards eventthat the sequel is “going to happen,” adding the proviso, “without saying there’s anything officially happening.”
  
  Then in May, the “Halloween” starconfirmedthat both she and Lohan are open to the project.
  
  In the interim, Hollywood was saddled with twin writers’ and actors’ strikes, but it seems now that they’ve bothcome to an end, the actors are ready to gear up for a “Freaky Friday” re-team.
  
  As for Lohan, she has been busy recreating the magic of her other beloved aughts-era movie – she and several costars like Lacey Chabert and Amanda Seyfried have been appearing in new“Mean Girls”-themedWalmart ads.
