  Meteorite hunters, get ready to head into the woods.
  
  A museum in Maine is offering $25,000 for the remains of a space rock that streaked across the sky last week before landing near the border between the United States and Canada.
  
  The fireball, which was visible in broad daylight and created a sonic boom, wasdetected by radar, allowingNASA’s Astromaterials Research and Exploration Science (ARES) Labto calculate the “strewn field” — where fragments of the meteor might be found — near Calais, Maine.
  
  Rare 17-pound meteorite discovered in Antarctica
  
  Darryl Pitt, head of the meteorite division at theMaine Mineral & Gem Museum, said he was keen to study any fragments of the meteorite, which, depending on the type, could contain valuable information about the origins of the solar system. The $25,000 reward is for the first meteorite piece found that weighs 2.2 pounds (1 kilogram) or more. However, he said the museum would be willing to pay for any specimen “irrespective of its size.”
  
  “Finding meteorites in woods of Maine. It’s not the simplest of the environments,” Pitt said.
  
  “It’s a sparsely populated area but not as sparsely populated as where most meteorites fall — the ocean,” he added.
  
  Worldwide, only eight to 10 meteorites are recovered each year out of hundreds of fireballs seen falling to Earth, Pitt said.
  
  A meteorite that fell on a driveway in the United Kingdom in 2021 turned out to be anextremely rare type of space rockandis now part of the Natural History Museum in London.
  
