  Guaranteed income, also known asuniversal basic income, means giving money to everyone, regardless of how much they earn, so they can have more freedom to move between jobs, train for new positions, provide care or engage in creative pursuits. Interest in the concept has risen in recent years, driven by concerns that automation and the climate crisis would lead to a mass displacement of workers.
  
  This study also showed that the “length of time someone receives unconditional cash matters,” Castro said.
  
  “We did not start seeing changes in people’s health and well-being until 6 months after receiving consistent cash. Recurring cash over time impacts people differently than a short-term cash infusion like the [Earned Income Tax Credit]. This offers a clear signal back to the Federal government when we think about policies like the child tax credit,” she wrote.
  
  A Pew Research Centerpollfrom 2020 found that about 54% of American adults are against the idea of the federal government providing a guaranteed income of approximately $1,000 a month to all adults, regardless of their work status. More Democrats support the concept than Republicans.
