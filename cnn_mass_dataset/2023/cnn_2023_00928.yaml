title: "Chris Pine says Harry Styles did not spit on him at the Venice Film Festival"
date: "2023-03-01"
section: "Entertainment"
url: "https://www.cnn.com/2023/03/01/entertainment/chris-pine-harry-styles-spit"
content: |
  The internet is not done talking about“#spitgate”– the term born online last year when viral footage from the Venice Film Festival showed singer and actor Harry Styles making a motion that caused some to believe he had spit on his“Don’t Worry Darling”co-star Chris Pine.
  
  Months after the September 2022 controversy, Pine himself has finally entered the conversation to put it to rest.
  
  “Harry did not spit on me,” Pine toldEsquirein an interview that was published on Wednesday. He added that he thinks Styles is a “very, very kind guy.”
  
  Pine said he had seen the footage and admitted that “it does look, indeed, like Harry’s spitting on me.”
  
  The “Star Trek” actor went on to clarify what actually happened, explaining that Styles leaned down toward Pine to say, “It’s just words, isn’t it?” The comment, according to Pine, boiled down to a “little joke” that the “Don’t Worry Darling” cast had with each other about interacting with the media while promoting the film, which was the purpose of their appearance in Venice at the time.
  
  While this is the first time Pine has directly addressed the incident, a rep for the actor had previouslyreleaseda statement denying that anything nefarious occurred between Pine and Styles.
  
  Olivia Wilde, who directed and also starred in “Don’t Worry Darling,” echoed the sentiment weeks later,telling Stephen Colbertthat Harry “did not spit on Chris.”
  
  She added that the viral video is “a perfect example of people will look for drama anywhere they can,” which was seemingly a reference to the manybuzzynarratives that came out of the movie’s production and subsequent promotion.
  
  Even Styles himselfjokedabout the incident during one of his concerts.
  
  It seems now there’s no need to worry, darling. All is well between Styles and Pine.
