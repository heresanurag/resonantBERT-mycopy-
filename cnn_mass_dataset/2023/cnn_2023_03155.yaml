id: cnn_2023_03155
title: "How antisemitic hate groups are using artificial intelligence in the wake of Hamas attacks"
date: "2023-11-14"
section: "US"
url: "https://www.cnn.com/2023/11/14/us/hamas-israel-artificial-intelligence-hate-groups-invs/index.html"
content: |
  Hate groups and far-right internet trolls have seized on the tensions surrounding theIsrael-Hamas war, while leveraging advances in artificial intelligence to further stoke antisemitism in the United States.
  
  The confluence of the conflict and the rapid development – and sheer accessibility – of AI tools have allowed antisemitic groups to weaponize the technology, creating images and audio that are used to harass the Jewish community, according to experts who track online extremism.
  
  “We’ve seen a real concerning ideological convergence between far-right communities online and pro-Hamas sentiment,” said Ben Decker, CEO of Memetica, a threat analysis company that monitors online hate.
  
  The activity is on law enforcement’s radar as antisemitism remains on the rise nationwide: A 316% increase in antisemitic incidents has hit the US since the October 7 Hamas terror attack on Israel, compared to the same period last year, according to preliminarydatareleased Monday by the Anti-Defamation League.
  
  Just days after the war between Israel and Hamas began, the FBI and the Department of Homeland Security warned of threats against Jewish, Muslim and Arab-American communities, noting that antisemitism and anti-Islamic sentiment “permeates many violent extremist ideologies and serves as a primary driver for attacks by a diverse set of violent extremists.”
  
  The heads of both agencies are expected to address the issue of domestic extremism in a hearing on Capitol Hill on Wednesday. FBI Director Christopher Wray has alreadyindicatedthat antisemitism is reaching “historic levels” in the US, and a police bulletin obtained by CNN indicates that DHS has compiled information on racist and hate groups in the US “celebrating attacks on the Jewish community.”
  
  Users of the notorious hate-filled, far-right online forum 4chan quickly began celebrating the October 7 attack, in what Memetica describes as “convergence of Hamas and White supremacist ideologies.”
  
  Although paradoxical that White supremacists would be supportive of an Islamic terrorist group, Decker says the White supremacists’ hatred of Jewish people outranks all else.
  
  Karen Dunn, an attorney whosued the people responsiblefor the violence at the deadly 2017 Unite the Right rally in Charlottesville, Virginia, told CNN the hate groups “hate everybody, but they hate the Jews the most.”
  
  Antisemitism is a commonality that can unite multiple different and competing hate groups, which can then metastasize into hate directed at others, she said.
  
  “That’s what we saw in Charlottesville,” Dunn said. “The weekend started with ‘Jews will not replace us,’ but ended with racially motivated violence against all groups.”
  
  Decker noted the effectiveness of Hamas’ strategy to publicize its terrorist attack on social media, despite most major platforms banning the terror group. Its already substantial following on Telegram, the social media messaging app,skyrocketedafter the October 7 attacks.
  
