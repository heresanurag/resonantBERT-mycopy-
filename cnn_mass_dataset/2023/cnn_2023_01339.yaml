title: "Mother of 6-year-old boy who shot his teacher is sentenced to 21 months in prison for federal offenses"
date: "2023-11-15"
section: "US"
url: "https://www.cnn.com/2023/11/15/us/deja-taylor-teacher-shot-virginia-sentencing/index.html"
content: |
  The mother of the Virginia6-year-old who shot his first-grade teacherin January was sentenced to 21 months in prison for federal felony offenses, a spokesperson with the US Attorney’s Office for the Eastern District of Virginia told CNN Wednesday.
  
  Deja Taylorpleaded guiltyin June to two federal charges – the unlawful use of a controlled substance while possessing a firearm and making a false statement while purchasing the firearm –  as part of a plea deal with prosecutors. She was sentenced to 21 months on each count, and the judge ordered them to be served concurrently, according to her attorney.
  
  Taylor’s 6-year-old sonusedher gun to shoot his 25-year-old teacher, Abigail Zwerner, on January 6 at Richneck Elementary School in Newport News. Zwerner was wounded in her hand and chest.
  
  The judge ordered Taylor go directly to jail because she failed several drug tests while she was on “federal pre-trial services,” Taylor’s defense attorney James Ellenson told CNN.
  
  She is being temporarily held at the Western Tidewater Regional Jail in Suffolk until the federal prisons bureau assigns her somewhere, her attorney said.
  
  Zwerner was present at Wednesday’s sentencing and “gave a very moving victim impact statement,” Ellenson added.
  
  Defense attorneys for Taylor had asked for a sentence of three years of probation “with special conditions, including home confinement and appropriate counseling,” according to a filing last week.
  
  Additionally, Taylorhas pleaded guiltyto a state charge of felony child neglect. That charge has a maximum sentence of five years, but prosecutors have said they will not seek a punishment beyond the sentencing guidelines of six months.
  
  She is expected to be sentenced for that on December 15, Ellenson said.
  
  The boy, who Ellenson has said has “extreme emotional issues,” will not be criminally charged, according to prosecutors.
  
  Taylor has no criminal record and has cooperated with authorities since the shooting, her defense attorney said. In a May interview on ABC’s “Good Morning America,” the mother accepted responsibility for the shooting and apologized to the child’s teacher.
  
  Zwerner, meanwhile, has filed a $40 million lawsuit alleging Newport News Public Schools and administrators ignored warning signs and were aware of the student’s “history of random violence.”
  
  The school board moved to dismiss the suit, buta judge earlier this month ruledit can move forward.
