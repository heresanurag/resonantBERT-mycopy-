  Okal:I don’t know, but it already is no longer the Gaza that I knew before leaving 17 years ago and moving to the US. Entire neighborhoods in the center of Gaza City have been taken out. There were major landmarks that everybody would know are gone. You’re talking about1.1 million peoplewho have fled south. My parents have the feeling — and my wife’s parents do as well — that they will never see their homes again, even though it’s about a 10-mile drive north of here. I won’t be going back, and I can’t imagine that anyone I know will be back. The amount of destruction there is just unthinkable.
  
  Okal: We wish. Not all of them are American citizens. We’ve been told by the State Department transit will be allowed for Americans and their immediate relatives, meaning spouse and children if they’re not American. That’s the heartbreaking part: that while we’re trying as hard as we can to leave, we know we will be leaving family and loved ones behind.
