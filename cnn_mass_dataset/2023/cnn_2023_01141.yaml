  “It’s one of the greatest rip-offs in modern American history.”
  
  – California Gov. Gavin Newsom, accusing oil companies ofprice gouging California residentswith high gas prices – even when crude oil prices started to decrease. “Why is it that we are paying at peak $2.61 more per gallon of gasoline than the national average?” Newsom said Tuesday, after signing a bill into law giving the state’s energy commission oversight power on oil companies to determine potential price gouging and impose corresponding penalties.
  
