title: "Get headaches from drinking red wine? Study offers clue about why"
date: "2023-11-22"
section: "Health"
url: "https://www.cnn.com/2023/11/22/health/red-wine-headache-cause-study-wellness/index.html"
content: |
  Get inspired by a weekly roundup on living well, made simple. Sign up forCNN’s Life, But Better newsletterfor information and tools designed to improve your well-being.
  
  Scientists may be closer to understanding the culprit behind theconsumption of red winecausing headaches for some people, according to new research.
  
  Aflavonol naturally occurringin red wines may interfere with the body’s ability to metabolize alcohol, causing an accumulation of toxins that can lead to swift headaches, suggests thestudy published Mondayin the journal Scientific Reports.
  
  Quercetin, the flavonol, is aplant compound found in fruitsand vegetables including grapes, berries, onions and broccoli.
  
  “When (quercetin) gets in your bloodstream, your body converts it to a different form called quercetin glucuronide,” said study coauthor Andrew Waterhouse, a wine chemist and professor emeritus in the department of viticulture and enology at the University of California, Davis, ina news release. “In that form, it blocks the metabolism of alcohol.”
  
  Alcohol: Do you drink too much?
  
  Red wine has a tenfold higher amount of phenolic compounds, especially flavonoids, than white wine, which makes the beverage a “primary contender responsible” for headaches, the authors said.
  
  Waterhouse and the other researchers aimed to uncover why headaches after imbibing just one or two glasses of red wine can even happen to people who don’t get headaches from other alcoholic beverages — so they studied how the flavonol may affect a genetic variant of an enzyme called ALDH2 that’s involved in the body’s metabolism of alcohol.
  
  Nearly8% of the global populationhas a variant of the enzyme that isn’t particularly active, and the deficiency is highly prevalent among people of East Asian descent — affecting around 40% of this population. Having a dysfunctional ALDH2 variant has been associated with skin flushing, heart palpitations and headaches after drinking.
  
  When people drink, the alcohol is broken down in the liver by the enzyme alcohol dehydrogenase, which turns it into the compound acetaldehyde —a “well-known toxin, irritant and inflammatory substance,” said lead study author Dr. Apramita Devi, a postdoctoral researcher in the department of viticulture and enology at UC Davis.
  
  How much you drink could have an influence on how your teen drinks, study shows
  
  Thepresence of acetaldehydein the body is supposed to be short-lived since the enzyme ALDH2 transforms it into acetate, which is less toxic.
  
  Using lab tests, the authors found that a derivative of quercetin — quercetin glucuronide — inhibited the enzyme variant. The interference, they hypothesized, would lead to a buildup of the toxin acetaldehyde — and headaches — in people who are more susceptible.
  
  But experts who were not involved in the research urge caution, characterizing the study as a proposition of a theory rather than proof.
  
  “The study was only done in a lab, and the substances were tested outside the human body in concentrations several times higher than that in blood after a few glasses of wine,” said Dr. Jonas Spaak, an associate professor of cardiology at the Karolinska Institute in Stockholm, Sweden, via email.
  
