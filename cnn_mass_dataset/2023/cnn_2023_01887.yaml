title: "A rare baby giraffe was born without spots, a Tennessee zoo says"
date: "2023-08-22"
section: "Travel"
url: "https://www.cnn.com/2023/08/22/travel/giraffe-born-without-spots-scn-cec?cid=external-feeds_iluminar_yahoo"
content: |
  There’s a brand new spotless superstar on the scene at a Tennessee zoo.
  
  She doesn’t have a name yet, but she’s already made a big splash among her herd – she’s a giraffe without patches.
  
  The 6-foot wonder was born sans spots on July 31 at Bright’s Zoo, a privately owned facility in Limestone, and made her public debut this month. The calf is a reticulated giraffe, one offourgiraffe species.
  
  The zoo said she might be the “only solid-colored reticulated giraffe living anywhere on the planet.” (The last spotless giraffe in captivity was likely a calf born at Tokyo’s Ueno Zoo in 1972, CBS Newsreported.)
  
  The word “reticulated” refers to the giraffe’s network of polygonal brown spots, broken up by veins of creamy off-white, according to theDenver Zoo.The spots function primarily as camouflage in the savannas of northern Kenya where they live and graze.
  
  And underneath each spot is a “sophisticated system of blood vessels,” according to theGiraffe Conservation Foundation, a nonprofit that focuses on sustaining and growing the wild giraffe population across Africa. It takes a large network of vesselsand25-pound hearts to keep the world’s tallest land mammal on its hooves.
  
  Zoo founder Tony Bright said that the weeks-old calf is casting a “much-needed spotlight” on giraffe conservation. Around 16,000 reticulated giraffes remain in the wild, according to theGiraffe Conservation Foundation, a 50% decline in the last three-and-a-half decades from when there were around 36,000 wild reticulated giraffes living on the continent.
  
  The new calf joins a growing herd at Bright’s, following another baby giraffe that was born just weeks before. The zoo says she’s “thriving” under the supervision of her attentive mother and its human staff. Now she just needs a name, whichfans can vote onbefore the winning moniker is announced on Labor Day.
  
  Among the four choices are Kipekee, which means “unique” in Swahili – a fitting name for an exceedingly rare baby.
  
