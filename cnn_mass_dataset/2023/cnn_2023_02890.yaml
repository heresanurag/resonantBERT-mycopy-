  The world’s biggest climate joke has just ended in the United Arab Emirates, where more than 80,000 delegates — including2,400 from the fossil fuel sector, have conspired to take the mickey.
  
  Nearly three decades of climate COPs have done nothing to reduce emissions, nor rein-in ever-climbing concentrations of carbon dioxide in the atmosphere. The UK Met Office has just predicted that the global average temperature risecould touch 1.5°Cnext year, yet the COP28 final communique is still banging on about how we can still avoid a permanent rise above this critical threshold, while at the same time failing to show how.
  
  COP28 was always set to be a bit of a comedy show, and one that even the best comic writers would find hard to make up. Held in a major petrostate, the colossal wealth of which is predicated upon fossil fuel extraction, and which has no vested interest in slashing the carbon dioxide emissions that result from burning them, the conference waspresided over by the head of the country’s national oil company.
  
  Papers leaked in advance revealed that theUAE planned to use the opportunity provided by the meeting to set up new oil and gas deals,while — half way through — it emerged that the COP president had made a vigorous defence of fossil fuels, arguing that dumping them wouldsee us back living in caves.
  
  You have to laugh — the sort of slightly hysterical laugh that quickly turns to weeping. Oh, and to add to the fun, the host for next year’s COP29 is going to be Azerbaijan — another big oil producer.
  
  Rather than making progress on tackling the climate emergency, then, we are at the very least standing still, and quite possibly going backwards. A role for comedy in helping to turn things around has never been more urgent.
  
  So let’s see more comedians build the climate emergency into their shows, and let’s get the really big hitters involved. Come on Bill Bailey, Lee Mack, Steve Coogan, Ricky Gervais, Jack Dee and the rest. It’s your world too.
  
  And what about a climate sit-com — surely it’s time has come? “Last of the Summer Heatwave” anyone, or perhaps “Only Fools and Climate Scientists”?
  
  I know — “Third Overheating Rock from the Sun.”
