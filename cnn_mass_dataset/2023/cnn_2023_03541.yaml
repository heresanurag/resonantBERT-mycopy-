title: "Ornate necklace found in an ancient grave site of a child and reassembled"
date: "2023-08-04"
section: "World"
url: "https://www.cnn.com/2023/08/04/world/neolithic-necklace-reconstruction-scn?cid=external-feeds_iluminar_Englishheadline"
content: |
