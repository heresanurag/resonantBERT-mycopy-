title: "Feral cows in New Mexico’s Gila Wilderness will be shot from air, US Forest Service says"
date: "2023-02-19"
section: "US"
url: "https://www.cnn.com/2023/02/19/us/new-mexico-feral-cattle-shooting-trnd/index.html"
content: |
  The US Forest Service willmove forward with killing feral cattle in New Mexico’s Gila National Forest, officials say.
  
  The agencyissued its decision in a news releaseon Thursday, stating the feral cattle “pose a significant threat to public safety and natural resources.”
  
