title: "Judge who presided over Alex Murdaugh trial didn’t expect the ‘interest and notoriety’ surrounding it"
date: "2023-03-29"
section: "US"
url: "https://www.cnn.com/2023/03/29/us/clifton-newman-alex-murdaugh-trial-captivating/index.html"
content: |
  The South Carolina judge who found himself in the headlines during the high-profile murder trial ofAlex Murdaughsaid he didn’t anticipate the proceedings would be so captivating when he made the decision to make them available for everyone to view.
  
  “It was an important case, all cases are, any case where you have a murder,” Judge Clifton Newman said during an event at Cleveland State University College of Law on Tuesday.
  
  These are the deaths and investigations connected to the Murdaugh family
  
  Newman presided over the weekslong trial, which saw Murdaughconvictedof murdering his wife and son, Maggie and Paul Murdaugh, andsentencedto two consecutive life sentences without the possibility of parole. Developments in the case involving the scion of a South Carolinalegal dynastywere closely tracked by many who followed the day-to-day coverage of the trial.
  
  Prosecutors argued Murdaugh killed his wife and son on their property in Islandton, South Carolina, to distract and delay investigations into hisalleged financial crimes. They said he stole millions of dollars from his former clients and law firm and repeatedly lied to cover his tracks.
  
  Murdaughadmitted in courtthat he stole money and lied about it, and also that he lied to investigators about his whereabouts just prior to the killings due to paranoia from his drug addiction, but denied killing his wife and son.
  
  “It had the added notoriety because it involved a lawyer who had been accused of stealing money from clients, over eight million dollars from any number of clients, a lawyer who admittedly was strung out on drugs and more than anything else, a man who’s accused of killing his wife and his son,” Newman said in avideoposted by his alma mater CSU’s law school.
  
  What's next for Alex Murdaugh? About 100 fraud charges and a coming appeal
  
  “And despite those types of facts that would certainly make folks interested, I believe when I decided to make the entire process open to the public and open to the media … I wasn’t experiencing any of that, I was simply a judge in a trial doing my job as I’ve done repeatedly over the years,” Newman added. “The interest and notoriety that was taking place all around had no effect on me, because I was engaged in the process of what I had to do.”
  
  Murdaugh maintains his innocence willappeal his conviction, court filings show.
