title: "New research reveals how coffee and tea can affect risk of early death for adults with diabetes"
date: "2023-04-19"
section: "Health"
url: "https://www.cnn.com/2023/04/19/health/coffee-tea-lower-mortality-type-2-diabetes-wellness"
content: |
