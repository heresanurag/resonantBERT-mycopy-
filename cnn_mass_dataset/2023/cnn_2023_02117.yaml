title: "TikTok CEO to testify before Congress in March"
date: "2023-01-30"
section: "Tech"
url: "https://www.cnn.com/2023/01/30/tech/tiktok-ceo-congress/index.html"
content: |
  TikTok CEO Shou Zi Chew will testify at an upcoming hearing before the House Energy and Commerce Committee, a committee spokesperson confirmed to CNN Monday.
  
  Chew will be the sole witness at the hearing, scheduled for March 23. He is expected to testify on TikTok’s privacy and data security practices, its impact on young users, and its “relationship to the Chinese Communist Party,” according to ahearing announcementon the committee’s website.
  
  Who is Shou Zi Chew? Mounting scrutiny on TikTok could put new spotlight on its CEO
  
  “We’ve made our concerns clear with TikTok,” said the committee’s chair, Washington Republican Rep. Cathy McMorris Rodgers, in a statement. “It is now time to continue the committee’s efforts to hold Big Tech accountable by bringing TikTok before the committee to provide complete and honest answers for people.”
  
  Chew’s upcoming testimony was first reported byThe Wall Street Journal.
  
  “We welcome the opportunity to set the record straight about TikTok, ByteDance, and the commitments we are making to address concerns about U.S. national security before the House Committee on Energy and Commerce,” Brooke Oberwetter, a spokesperson for TikTok, said in a statement. “We hope that by sharing details of our comprehensive plans with the full Committee, Congress can take a more deliberative approach to the issues at hand.”
  
  The high-profile hearing underscores the rising political risk for TikTok as its negotiations with the US government on a national security deal continue to drag on.
  
  US officials have raised concerns that China could use its laws to pressure TikTok or its parent, ByteDance, to hand over US user data that could be used for intelligence or disinformation purposes. Those concerns have prompted the US government to ban TikTok from official devices, andmore than half of US stateshave taken similar measures, according to a CNN analysis.
  
  Chew, who took over as TikTok CEO in April 2021, haslargely stayed out of the spotlightat a time when the app he leads can’t seem to avoid it. Members of Congresspreviously grilledTikTok COO Vanessa Pappas, arguably the public face of the company in the United States, during a Senate hearing last year.
