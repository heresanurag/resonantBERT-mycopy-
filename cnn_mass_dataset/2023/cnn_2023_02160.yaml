  “Terrorism — including political and ideological violence — is the opposite of all we stand for as a nation.”
  
  — President Joe Biden, delivering a speech Monday to US servicemembers on the 22nd anniversary of the September 11, 2001, terrorist attacks. The presidentcalled on Americansto “protect our democracy” and “not succumb to the poisonous politics of difference and division.”
  
