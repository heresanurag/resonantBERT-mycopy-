title: "Wrestling legend Jerry ‘The King’ Lawler is recovering after a massive stroke"
date: "2023-02-08"
section: "Entertainment"
url: "https://www.cnn.com/2023/02/08/entertainment/jerry-lawler-wwe-legend-stroke/index.html"
content: |
  Wrestling legend and WWE Hall of Famer Jerry “The King” Lawler is recovering in a Florida hospital after having a massive stroke on Monday,according to a poston his Twitter account.
  
  His speech is limited, but with rehabilitation he will make a full recovery, the post, published Wednesday, reads.
  
  “He thanks everyone for the continued prayers and will be back in the near future,” it reads. The post was accompanied by pictures showing Lawler in a hospital gown – in one image he gives a thumbs-up and smiles.
  
  A Memphis native, Lawler has been a fixture on the wrestling circuit since the 1970s, winning heavyweight championships and known for aninfamous feudwith comedian Andy Kaufman – one later revealed after Kaufman’s death to be a well-crafted performance by the pair.
  
  As wrestling grew nationally in the 1990s and beyond, Lawler became a ringside announcer for World Wrestling Entertainment, then known as WWF.
  
  Famed announcer Jim Ross, who for years worked alongside Lawler calling matches,said on social mediahe spoke with Lawler after he was hospitalized.
  
  “He’s obviously weak but I could understand his affected speech,” Ross said. “Jerry’s prognosis is positive but he needs all our thoughts and prayers.”
