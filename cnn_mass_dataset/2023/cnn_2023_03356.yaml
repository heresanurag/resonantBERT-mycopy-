title: "Powerball jackpot winning numbers announced for the estimated $1.2 billion prize. Here are your odds – and what you could buy"
date: "2023-10-04"
section: "Business"
url: "https://www.cnn.com/2023/10/04/business/powerball-jackpot-wednesday-drawing/index.html"
content: |
  Your dream of buying400 private jetsor someLamborghini Veneno Roadstersfor you and 143 of your closest friends could become reality after Wednesday night’s Powerball drawing.
  
  The winning numbers are 9, 35, 54, 63, 64 and Powerball 1.
  
  The grand prize is worth an estimated $1.2 billion (before taxes, of course). If you hit the jackpot but can’t wait 29 years to collect all your dough, the cash value option is a more modest$551.7 million.
  
  The Powerball jackpot is huge, but here are 3 better ways to increase your wealth
  
  Of course, you’re far more likely to getkilled by fireworks or have quintuplets naturallythan hit the jackpot. The odds of nabbing the big bonanza is 1 in 292.2 million.
  
  And Wednesday’s gargantuan jackpot isn’t even the biggest in Powerball history.
  
  The largest Powerball jackpot was $2.04 billion, won in November, followed by a $1.586 billion jackpot in January 2016.
  
  If you do miraculously hit the jackpot, try to stay sanewith some smart planning.
