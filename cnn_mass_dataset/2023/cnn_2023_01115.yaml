  The CDC is also encouraging people 60 and older to get one of the two RSV vaccinesintroducedthis year as soon as possible.
  
  Hotez maintains that vaccinations are the single most impactful thing you can do to keep yourself and others safe, but he points out that many Americans are not aware that there are new vaccines on the market – particularly the Covid-19 vaccine.
  
  “A lot of adults don’t realize that this new annual immunization is different from what they’ve gotten previously,” he said. “They don’t realize that it’s specifically targeted to a new variant.”
  
  The latest Covid-19 shot wasrolled outin September. It’s not a bivalent or two-strain version like last year’s vaccine but rather a monovalent vaccine that is formulated to target newer variants of the virus that are currently circulating, including BA.2.86 and EG.5.
  
  About three-quarters of US adults say they are “not too worried” or “not at all worried” about getting Covid-19 over the holidays, according to asurveyfrom KFF, and two-thirds say they are not worried about spreading the virus to people close to them.
  
  Recent data seems to support those attitudes. As of December 15, 18% of adults reported getting the updated Covid-19 vaccine. Only 7.8% of children have received their shot.
  
  Meanwhile, only 17% of adults over 60 said they had received an RSV vaccine, according todatacollected by the CDC’s National Immunization Survey.
  
