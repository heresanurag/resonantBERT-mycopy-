title: "With a new Covid-19 variant on the rise, here’s how to stay safe this holiday season"
date: "2023-12-22"
section: "Health"
url: "https://www.cnn.com/2023/12/22/health/stay-well-holidays-wellness"
content: |
  As people across the country prepare for holiday celebrations, the US Centers for Disease Control and Prevention is urging anyone who hasn’t gotten the latest vaccines against respiratory viruses to do so now to avoid getting sick and spreading illness.
  
  For the first time, there are vaccinesavailableto protect against Covid-19, influenza and respiratory syncytial virus, known as RSV.
  
  But there is an “urgent need” to boost vaccination coverage amid increasing levels of respiratory disease, the CDC said in an officialhealth advisorylast week. Vaccination rates in children and adults remain low as virusactivityincreases.
  
  As respiratory viruses spread everywhere, what should you do if you get sick?
  
  Dr. Peter Hotez, co-director of the Texas Children’s Hospital Center for Vaccine Development and dean of the National School of Tropical Medicine at Baylor College of Medicine, says he shares the CDC’s sentiments specifically concerning Covid-19.
  
  “The number of Covid hospitalizations is now going up pretty abruptly,” Hotez said, adding that the new JN.1 subvariant is on the rise.
  
  JN.1 is now causing about 20% of new Covid-19 infections in the US, the CDCestimates. It is the fastest-growing coronavirus subvariant in the US and is already dominant in the Northeast.
  
  Hotez notes that the confluence of a new subvariant, low vaccination rates and increased Covid-19 hospitalizations could lead to a “pretty serious Covid wave” as we head into the new year.
  
  “Vaccination remains the best way to protect yourself and your loved ones against serious outcomes of these viral respiratory illnesses,” the CDC notes. Vaccines can help reduce the strain put on hospitals by overwhelming patient numbers.
  
  Heading into Christmas, vaccinations will play an important role in preventing virus spread. Airlines are expected toservicenearly 3 million passengers per day over the holiday rush, according to Industry lobby Airlines for America.
  
