content: |
  If you frequently find yourself stuck in a procrastination loop, there’s a good chance you’re not lazy – but rather, a perfectionist. Oftentimes, perfectionists avoid starting tasks due to a fear of failure or criticism, experts say. You can challenge those beliefs by avoiding all-or-nothing thinking and bysetting achievable standardson a daily basis.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  (You can get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  Ukraine’s interior minister is among at least16 people killed after a helicopter crashedin a Kyiv suburb today, police said. Ukrainian President Volodymyr Zelensky called the crash in Brovary “a terrible tragedy” and ordered officials to “find out all the circumstances” of the incident. This comes asmore than 9,000 civilians, including 453 children, have been killed in Ukraine since Russia’s invasion began last February, a senior Kyiv official said. On Tuesday, US Secretary of State Antony Blinken reiterated that the fastest way to end the war is “to give Ukraine a strong hand on the battlefield,” which is what the US is doing, he said. The White House alsoteased that an additional aid packagefor Ukraine could be announced “as soon as the end of this week.”
  
  Senior House Republicans are preparing to hold hearings on the problems at the southern border, which they say could serve as a prelude to an impeachment inquiry againstHomeland Security Secretary Alejandro Mayorkas. It’s exceedingly rare for a Cabinet secretary to be impeached as it has only happened once in US history in 1876. Meanwhile, House committees are forming and some of the awarded seats have drawn the ire of several Democrats.Embattled Rep. George Santoshas been awarded seats on two low-level committees, though he is facing growing calls to resign for extensively lying about his resume. Republican Reps. Marjorie Taylor Greene and Paul Gosaralso received their committee assignmentsfor the new Congress, after being booted from their committees by Democrats and some Republicans for their incendiary remarks.
  
  Military veterans can now receive free emergency mental health care, according to an announcement by the Department of Veterans Affairs. The new policy,which went into effect Tuesday, provides inpatient care for “veterans in suicidal crisis” for up to 30 days and outpatient care for up to 90 days at no cost. “This expansion of care will save Veterans’ lives, and there’s nothing more important than that,” VA Secretary for Veterans Affairs Denis McDonough said. The policy will also allow the VA to make “appropriate referrals” after a period ofemergency suicide care, determine veterans’ eligibility for other services and benefits from the VA, and refer veterans who received emergency care to other VA programs and benefits.
  
  Covid-19 has killed more than 1 million people in the US since the start of the pandemic, and life expectancy has been cut by nearly 2.5 years since 2020. While data from 2022 suggests that there were significantly fewer Covid-19 deaths in the third year of the pandemic than there were in the first two, experts say the virus willlikely remain the third leading cause of deathin the US in 2022 for the third year in a row, behind heart disease and cancer. CDC officials have said they are actively working to better develop and deploy rapid response measures to combat the spread of disease outbreaks. A new report, however,argues that the CDC is in “a moment of peril”and a significant reset is necessary to build a “strong, effective, and more accountable” agency.
  
  Microsoft is set to announce thousands of job cuts today, according to multiple news reports, potentially becoming the latest tech company to shrink its workforce. Sources say the reported layoffs could affectroughly 5% of the company’s workforceand largely impact the company’s engineering divisions. Microsoft employs 221,000 people around the world, including 122,000 in the US.Multiple tech companieshave made deep cuts to their workforces since the start of the year, as inflation weighs on consumer spending and rising interest rates squeeze funding. The demand for digital services during the pandemic has also waned as more people return to their offline lives.
  
  Brian Walshe, charged with murdering his wife, is expected to appear in court today
  
  Brian Walshe is expected to be arraigned in court today after being charged with murdering his wife Ana Walshe, a Massachusetts mother and corporate real estate manager.The case has captured widespread attentionsince she was reported missing by her employer at the start of the year. Brian Walshe told police he last saw his wife the morning of January 1 when she left for a work trip. However, searches have uncovered several pieces of potential evidence linking him to the alleged crime, law enforcement sources told CNN. The couple’s three children, all between the ages of 2 and 6, are now in the custody of the Massachusetts Department of Children and Families.
  
