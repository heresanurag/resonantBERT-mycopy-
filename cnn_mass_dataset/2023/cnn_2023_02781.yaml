  Today CNN 10 is going deep down to the bottom of a Great Lake, where a cargo ship was discovered after more than 120 years underwater. CNN 10 will explain the technology that allowed researchers to locate the ship in preserved condition. CNN 10 also has an update on Teresa Gray, who was recognized by CNN Heroes for her contributions through her nonprofit Mobile Medics. Teresa traveled to Turkey to help the people there after the devastating earthquake. All that and a pair of parrots interrupting a college softball game in Florida, on this episode of CNN 10.
  
