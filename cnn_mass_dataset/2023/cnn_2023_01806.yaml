title: "Idaho killings suspect followed 3 female victims on Instagram and ‘repeatedly’ messaged one, People reports"
date: "2023-01-20"
section: "US"
url: "https://www.cnn.com/2023/01/20/us/bryan-kohberger-university-of-idaho-killings-restaurant-visits/index.html"
content: |
  Bryan Kohberger, the 28-year-old man accused ofkilling four University of Idaho students,followed “all three of the female victims on Instagram,” but they didn’t follow him back,PEOPLEreported, citing an investigator familiar with the case and their own review of the now-deleted account.
  
  Kohberger facesfour counts of first-degree murderin the fatal stabbings of Kaylee Goncalves, 21; Madison Mogen, 21; Xana Kernodle, 20; and Ethan Chapin, 20.
  
  “Authorities have not said if the victims knew Kohberger, but the suspect’s now-deleted Instagram account — which was reviewed by PEOPLE before it was removed — followed the accounts of Mogen, Goncalves and Kernodle,” the outlet noted.
  
  The suspect allegedly contacted one of the female victims “repeatedly” in late October – roughly two weeks before the killings, the PEOPLE reported, adding that the unidentified victim did not respond to the messages. It’s unclear if that victim had seen the alleged messages sent from Kohberger.
  
  Kohberger is scheduled to have a preliminary court hearing in June where a judge will determine if there is enough evidence to proceed to trial. He has not yet entered a plea, but an attorney representing Kohberger during his extradition from Pennsylvania toldNBC earlier this monthhe “believes he’s going to be exonerated.”
  
  A broad and sweeping gag order in State v. Kohberger was amended on Thursday, expanding the scope of parties legally ordered to not speak publicly about the case. This includes “attorneys for any interested party in the case” including “any attorney representing a witness, victim, or victim’s family.”
  
  Kohberger also visited the restaurant where two of the victims worked in the weeks before their killings, according toPEOPLE.
  
  Citing a former employee, the outlet reportedKohberger went to the restaurant at least twice to order vegan pizza. Though nothing appeared suspicious about his visits, the employee told the magazine that Kohberger checked that his vegan food did not come in contact with animal products.
  
  The Mad Greek sits amid a row of restaurants, cafes and other businesses along the bustling Main Street that is frequented by locals and students from the University of Idaho and Washington State University. It’s about a 20 minute drive from Kohberger’s apartment in Pullman, Washington.
  
  It’s unclear if either of the victims were at the restaurant when Kohberger visited, if he ever interacted with the victims at the restaurant, or if he ever sat in the restaurant to eat his food.
  
  Law enforcement is aware of the restaurant visits, and employees and owners of the restaurant have been interviewed, PEOPLE said, citing an investigator familiar with the case.
  
  In a Facebook post, Mad Greek owner Jackie Fischer called the report “completely fabricated information” and said the outlet’s reporting “is not true.”
  
  “Please allow us to grieve the loss of our friends and co workers,” the post said, criticizing media’s coverage. “This has been incredibly hard on us.”
  
  In a statement to CNN, People said it stands by its reporting.
