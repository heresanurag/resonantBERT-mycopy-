  Biden’s claim is correct. The national debt, now more than $31 trillion, increased by just under $8 trillion during Trump’s four years in office, in part because of Trump’s major tax cuts. It’s important to note, though, that some of the increase in the debt during the Trump era was because of the trillions in emergency Covid-19 pandemic relief spending that passed with bipartisan support. The national debt spiked in the first half of 2020 after increasing gradually during Trump’s first three years in office, and because of spending required by safety-net programs that were created by previous presidents. A significant amount of spending under any president is the result of decisions made by their predecessors.
  
  [Read more](https://www.cnn.com/politics/live-news/biden-state-of-the-union-2023/h_5b5f31cc803b23a2f169ce9a5fe3452d)
  
