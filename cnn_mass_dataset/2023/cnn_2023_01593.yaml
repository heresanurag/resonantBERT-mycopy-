title: "ExxonMobil earnings fell on sinking oil prices"
date: "2023-07-28"
section: "Business"
url: "https://www.cnn.com/2023/07/28/business/exxonmobil-earnings/index.html"
content: |
  ExxonMobil’s profit fell sharply in the second quarter on lower oil and natural gas prices, leaving earnings below Wall Street forecasts.
  
  The company earned $7.9 billion, or $1.94 a share, down 56% from a year earlier. Analysts surveyed by Refinitiv had forecast earnings of $2.01 a share.
  
  Revenue was also sharply lower, falling 27% from a year ago to $80.8 billion. But the top-line number edged above forecasts.
  
  The good news for ExxonMobil and bad news for drivers is that oil and gas prices have been climbing recently. The average gas price nationally hit aneight-month highFriday of $3.73 a gallon, according to AAA, as excessive heat and production caps have hurt supply. That’s up 15 cents a gallon, or 4%, in just the last week.
  
  It was a relatively rare earnings miss for the nation’s largest oil company. The last time it didn’t beat analysts’ forecast was the first quarter of last year, and before that in 2020 when oil prices tumbled to negative territory on a plunge of demand at the start of the pandemic.
  
  This time oil and gas prices were down by a far more modest amount. The price for a barrel of Brent crude oil, the international benchmark used by traders, closed the quarter at $74.90, down 6% from the end of the previous quarter and down 35% from a year earlier.Oil prices soaredandgas prices hit record levelsin the second quarter a year ago in the wake of Russia’s invasion of Ukraine.
  
  But after a year of steadily falling, crude prices have rebounded 12% in the four weeks since the end of the quarter after both Saudi Arabia and Russia announced anotherround of oil production cutsandfears of a US recession started to retreat.
  
  The situation was similar at Chevron, which reported adjusted earnings of $5.8 billion, or $3.08 a share, on Friday. That was down 14% from the first quarter and 49% from a year earlier. But unlike ExxonMobil it beat Wall Street forecasts of $2.97 a share.
  
  Shares of ExxonMobil(XOM)and Chevron(CVX)were both narrowly lower in premarket trading.
