title: "‘We are not imperial’: Justice Kagan says Supreme Court still subject to checks and balances"
date: "2023-08-03"
section: "Politics"
url: "https://www.cnn.com/2023/08/03/politics/kagan-supreme-court-checks-and-balances?cid=external-feeds_iluminar_post-news"
content: |
  Justice Elena Kagan declined Thursday to outright answer the question of whether Congress could impose an ethics code on theSupreme Court, but she did allow that it could do “various things” to regulate the high court.
  
  “It just can’t be that the court is the only institution that is somehow not subject to any checks and balances from anybody else,” she said, adding, “I mean, we are not imperial.”
  
  “We, too, are part of a checks and balances system,” she said.
  
  But, the justice noted, there are limits. Congress, she said, “can’t do anything it wants.”
  
  “You know, if Congress did something that basically, you know, that effectively, prevented the court from fulfilling its assigned responsibilities, I mean, that would raise some pretty serious constitutional issues,” Kagan said.
  
  John Roberts can't get a Supreme Court ethics code. Alito's interview shows why
  
  The liberal justice declined to say much more abouta bill that advancedout of the Democratic-led Senate Judiciary Committee at the end of July – meant to force the Supreme Court to adopt a stronger ethics policy – for fear legal challenges surrounding the issues could someday land before the court.
  
  “In the back of my mind I’m thinking, ‘Who knows? Something might come before us someday,’” she said.
  
  If the law advances, she said, “then we’ll have the chance to say something about it.”
  
  Her comments, at the 9th US Circuit Judicial Conference in Portland, Oregon, come after Justice Samuel Alito told The Wall Street Journal last month that Congressshould stay out of the Supreme Court’s businessand stop trying to impose ethics rules on justices and clerks.
  
  Asked specifically about Alito’s interview, Kagan demurred, but said she had read the interview.
  
  Kagan said the justices are stillworking behind closed doorsto consider whether to implement a code of conduct that would be directed specifically at the high court.
  
  “It’s not a secret for me to say that, you know, we have been discussing this issue,” Kagan told the audience.
  
  Kagan also addressed public confidence in the court system, saying she believes the court can create confidence by “acting like a court” and staying away from decisions that look political or imposing personal preferences.
  
  “For me, what it means is a certain kind of restraint and moderation. It means being careful not to trespass on other institutions’” areas of responsibility, she said.
  
  “The court should be extremely wary of doing things that essentially make it the policy maker on important issues,” she added.
  
  Correction:This story has been updated to reflect that Justice Kagan read the Alito interview in The Wall Street Journal.
