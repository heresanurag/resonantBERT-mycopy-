  Furthermore, Republican House leaders have made no effort to justify their actions based on theoriginal meaning of the Constitution, which in other contexts Republicans insist is the only principled basis for constitutional interpretation. The framers regarded impeachment as a serious, not partisan, mechanism for holding presidents accountable for their proven misconduct.
  
  Indeed, impeachment was central to our nation’s founding. In the Declaration of Independence, the signatorieslisted 27 articles of impeachment-like charges against the British monarch, who in Englandcouldn’t be subject to impeachment. They were determined to establish a new nation and fashion a written constitution in which no one, including the president, was above the law.
  
  At the Constitutional Convention, James Madison declared impeachment “indispensable” for addressing serious presidential misconduct, while George Mason worried, “Shall any man be above Justice?” Lowering the standard for impeachment to hurt Biden politically both fails to do justice to the original conception of impeachment and creates a problematic precedent.
  
  Republicans today are also deviating from recent Supreme Court precedents limiting the scope of the House’s investigative authority to search for evidence that fits clearly, specified objectives. The high court delivered aunanimous orderthat Nixon had to comply with a judicial subpoena seeking specific evidence – taped White House conversations – that was instrumental to Nixon’s downfall. He complied, but at the cost of producing the tapes that sealed the case for his removal. In 2020’sTrump v. Mazars, the Supreme Court declared that a fishing expedition, in contrast, was not a “legitimate” exercise of the House’s authority.
  
  Yet the GOP voted last week to authorize an impeachment inquiry against Biden despite not having any new or credible evidence of wrongdoing by the president (as opposed to his son Hunter, the main focus of the investigations thus far). It seems clear that they want to use their new subpoena powers to extend their fishing expedition into the president’s financial records with the hope of turning up something that might embarrass him.
  
  If the Republicans succeed in effectively turning impeachment into a stunt, I suspect I’m not alone in worrying that they will have gutted the most important constitutional check – impeachment – that we had left to protect us from a president bent on lawlessness and vindictiveness.
