title: "Opinion: It’s been 50 years since Nixon resigned. Impeachment hasn’t held up well"
date: "2023-12-21"
section: "Opinion"
url: "https://www.cnn.com/2023/12/21/opinions/trump-biden-impeachment-nixon-watergate-gerhardt/index.html"
content: |
  EDITOR’S NOTE:Michael Gerhardt teaches constitutional law at the University of North Carolina at Chapel Hill. He has written and consulted extensively on impeachment and is the author of the forthcoming book,“The Law of Presidential Impeachment.” The opinions expressed in this commentary are his own. Viewmore opinionon CNN.
  
  The past 50 years have not been good for presidential impeachment. In 1974, the Constitution worked as it should have when President Richard Nixon resigned on the brink of certain impeachment in the US House of Representatives and conviction in the Senate. Withsubstantial proof of Nixon’s misconductassembled by the House, Senate and special prosecutor, the public overwhelmingly agreedwith removing Nixon from office.
  
  In contrast, Republicans last Wednesday voted to authorize animpeachment inquiry into President Joe Bidenbased on unspecified,undemonstrated misconduct. There is no evidence, much less any established public consensus, that impeachment is warranted or desirable. Instead, this process is transparently and overwhelmingly partisan.
  
  FormerPresident Donald Trump had asked House Republicansto impeach Biden as payback for his own two impeachments, which Trumpdismissed as partisan witch hunts. House Democrats, for their part, have denounced the GOP efforts as designed tohurt Biden’s reelectionchances and distract from Trump’s legal woes, includingindictments for more than 90 felonies(Trump denies any wrongdoing).
  
  The path impeachment has traveled from its proper use in Nixon’s case to partisan politics by other means is not simply the consequence of hyperpartisanship. In my judgment, it is also a result of increased tribalism and, as I explain in my forthcoming book, the experience presidents and members of Congress have had with the impeachment process.
  
  After Nixon, the presidents stamped with impeachment – Bill Clinton and Donald Trump – felt no need to resign as the momentum for impeachment built after their revelations of misconduct. Each felt certain that not only would their support within their party hold but also that senators from their respective parties would not vote to convict them and thus ensure their acquittals after their trials.
  
  Opinion: Impeachment will soon be nothing more than a mean tweet
  
  The process has also changed. Investigations ofNixon’s misconduct via the Watergate hearingswere conducted by bipartisan committees in the House and the Senate for months before the House authorized a formal impeachment inquiry. Clinton’s impeachment inquiry followed the fact-finding undertaken by then-independent counsel Ken Starr’s office, while Trump’s followed intensivefact-finding by the House Intelligence Committee. Since retaking control of the House in January, Republicans have spent monthsinvestigating Hunter Bidenbut have not yet found any credible evidence of wrongdoing by his father.
  
  That hasn’t keptGOP House Speaker Mike Johnsonfrom alleging that the “evidence” of Joe Biden’s corruption is “the worst in the history of the country.” Republicans differ on the crimes they think the inquiry is needed to explore, with someclaiming influence-peddling and briberyand others having difficulty specifying the misconduct that needs investigating. Yet in theone Republican-led House hearingthat was called an impeachment inquiry, in September, the Republicans’ own constitutional expert said he did not believe “the current evidence would support impeachment.”
  
  While Johnson said last Tuesday that he will not “prejudge” the “outcome” of the impeachment inquiry, his credibility has been shattered.
  
  In contrast, the Watergate hearings saw members of Congress place principle over party.Republican and Democratic staffersworked together on committee reports and investigations. Shortly before Nixon’s resignation, Senate Republican leader Barry Goldwater told Nixon only a small number of Republicans would vote to acquit him.
  
  Today, House Republicans make no pretense of building bipartisan support. Wednesday’s vote to open the Biden inquiry fell entirelyalong party lines. Republicans are simply playing to their base. While they no doubt expect that the Senate would acquit Biden given the chamber’s Democratic majority, conviction doesn’t seem to be the objective – instead, impeachment seems aimed at retaking the White House, with perhaps a side benefit of gutting impeachment as an impediment toTrump’s dictatorial ambitions.
  
