title: "Ryan Reynolds and Rob McElhenney recreate famous Wham! cover and it’s hilarious"
date: "2023-12-19"
section: "Entertainment"
url: "https://www.cnn.com/2023/12/19/entertainment/ryan-reynolds-rob-mcelhenney-wham/index.html"
content: |
  This Christmas Ryan Reynolds and Rob McElhenney want to give you their hearts. Not really, but it fits this story.
  
  The friends and business partners, who together own the UK soccer team Wrexham, recreated “Wham” album covers in which they were styled to look like George Michael and Andrew Ridgeley.
  
  “WREXHAM!” the caption on the photos McElhenneyposted on his Instagram accountreads.
  
  The first photo is in black and white and framed similarly to the cover photo for Wham’s hit 1986 holiday single, “Last Christmas.”
  
  In the second photo, which is in color, the two men recreate the look from Wham’s 1983 “Fantastic” album cover.
  
  Reynolds and the”It’s Always Sunny in Philadelphia” actor clearly share a similar sense of humor. Reynolds shared the photos on his Instastories.
  
  Wrexham AFCscored big in Aprilwhen the Welsh soccer team beat National League title rivals Notts County 3-2 in a celebrated match.
  
  The photo tribute comes one week before the anniversary of George Michael’s death. The artist who found fame as one half of Wham and later a hugely successful solo performer,was found deadat his home in Oxfordshire on Christmas Day in 2016 at the age of 53.
  
  An autopsy laterdetermined Michael died of natural causes.
