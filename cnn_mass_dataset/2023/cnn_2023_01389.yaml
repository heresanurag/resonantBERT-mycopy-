id: cnn_2023_01389
title: "North Carolina town puts out advisory after razor blades found on gas pumps"
date: "2023-01-26"
section: "US"
url: "https://www.cnn.com/2023/01/26/us/north-carolina-razor-blades-gas-pumps-trnd/index.html"
content: |
  The Forest City Police Department in North Carolina has issued an advisory aftermultiple razor blades were found on gas pump handles.
  
  The departmentpublished the community advisoryon Tuesday to address “multiple instances of razor blades being placed in gas pump handles in Forest City and surrounding areas.” It said that they are “actively investigating” the incidents in cooperation with the state Department of Agriculture.
  
