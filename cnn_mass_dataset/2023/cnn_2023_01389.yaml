  They advised residents to “be aware of your surroundings while pumping gas and “always check before grabbing the gas pump handle.”
  
  In a statement emailed to CNN, the police department specified that there have been three confirmed incidents of razor blades found on gas pump handles. The incidents occurred over the past month and were reported to the department and the sheriff’s office on Tuesday.
  
  “This is a very disturbing incident and we are devoting all of the resources available to us to figure out who is responsible and hold them accountable,” the department wrote in its statement.
  
  Forest City is located in North Carolina’s Rutherford County, in the southwest of the state, around 63 miles from Asheville. The town is home to around 7,000 residents,according to the 2020 census.
