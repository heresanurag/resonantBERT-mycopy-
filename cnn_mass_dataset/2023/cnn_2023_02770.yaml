title: "Democrats will win control of Virginia legislature, CNN projects, in blow to Gov. Youngkin"
date: "2023-11-07"
section: "Politics"
url: "https://www.cnn.com/2023/11/07/politics/virginia-senate-election-democrats-youngkin/index.html"
content: |
  Democrats will win full control of the Virginia legislature, CNN projects, expanding their foothold in state government and effectively ending Gov.Glenn Youngkin’s hopes of governing with Republican majorities and enacting his conservative agenda.
  
  Virginia Democrats will flip the state House while retaining their majority in the state Senate.
  
  Control ofthe state legislaturewas at stake in this year’s election, with Republicans defending their narrow majority in the state House. Youngkin, who has been touted as a potential late entrant into the 2024 Republican presidential race currently dominated byDonald Trump, spent much of the past few months rallying GOP voters toward a hoped-for governing trifecta.
  
  The elections were also seen, for better or for worse, as a referendum on Youngkin’s non-MAGA brand of conservative politics and the state legislative candidates who subscribe to it.
  
  But with Democrats projected to control the legislature, Youngkin may have lost the opportunity to portray himself as the rare GOP leader with some distance from the MAGA brand and a record of winning over some Democrats.
  
  The results alsounderscore the power of abortion politicsafter yet another campaign waged with reproductive rights as a central issue broke in Democrats’ favor. Youngkin had vowed that if Republicans won full control of the Virginia legislature, they would pass and he would sign legislationto outlaw abortions after 15 weeks, with exceptions for rape, incest and the life of the mother.
  
  Going into the election, Virginia Democrats held a 22-17 majority in the state Senate, with one vacancy. Republicans currently control the state House 48-46 with six vacancies.
