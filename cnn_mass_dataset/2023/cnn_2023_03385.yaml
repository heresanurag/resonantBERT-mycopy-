title: "Trump lawyers negotiating with Fulton County DA over details of surrender, sources say"
date: "2023-08-16"
section: "Politics"
url: "https://www.cnn.com/2023/08/16/politics/donald-trump-surrender-negotiations/index.html"
content: |
  Lawyers forformer President Donald Trumpare in “ongoing negotiations” with the Fulton County District attorney’s office regarding details of his surrender, two sources familiar with the talks tell CNN.
  
  As of now, they have not yet landed on a date for when Trump will surrender, the sources said.
  
  Early indications from Trump’s team are that they are discussing a potential surrender date for next week, though the talks are ongoing. Fulton County District Attorney Fani Willis, a Democrat, gave Trump and his18 co-defendantsuntil August 25 at noon to voluntarily surrender.
  
  The Fulton County sheriffsaid in a statement Tuesdaythat “all 19 defendants,” including Trump, are expected to surrender at the Fulton County jail, as is common procedure.
  
  The strengths and weaknesses of the Georgia election meddling case against Trump and his allies
  
  Trump’s surrender and arraignment will look different in Georgia than in his previous three criminal cases.
  
  Fulton County Sheriff Pat Labat has previously suggested he wants to treat these defendants the same as any other defendant would be treated, which means they would have mugshots taken and be fingerprinted. However, the authorities in Fulton County will need to coordinate with the Secret Service and Trump’s attorneys about the logistics of the former president’s surrender.
  
  The initial court appearance for Trump and other defendants is expected to be set by Fulton CountySuperior Court Judge Scott McAfee, who has been assigned to the historic case.
