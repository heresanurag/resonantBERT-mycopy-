  Tens of thousands of Hollywood actors are officially on strike today, creating tremendous uncertainty for the entertainment industry. While some films are already complete and set to hit theaters soon —like “Barbie”— many other movies and TV shows in the production stage have come to a screeching halt. That means there will likely be ashortage of blockbustersin theaters next summer unless a solution can be reached in the near term.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  President Joe Biden wrapped up his trip to Europe this week by asserting that Russian President Vladimir Putin has“already lost” the war in Ukraine. “There is no possibility of him winning the war,” Biden said at a news conference Thursday, emphasizing the strength of theNATO alliance. He predicted that the war will not go on “for years,” saying Putin will ultimately decide “it’s not in the interest of Russia” to continue due to limited resources. Separately, the US military confirmed thatAmerican cluster munitionshave arrived in Ukraine. This comes after Biden raised eyebrows last week when he said he made the “difficult decision” to approve their transfer, despite beingbanned in more than 100 nations. Cluster munitions are canisters that disperse bomblets over a wide area and can fail to explode on impact, posing a risk to civilians.
  
  The US Secret Service has concluded its investigation into the small bag of cocaine found at the White House earlier this month and has beenunable to identify a suspect, the agency said in a statement. FBI lab results from the packaging found “insufficient DNA” and could not retrieve any fingerprints, according to the statement. The investigation was closed after Secret Service officials combed through “security systems” and indexed “several hundred individuals” who entered the West Wing before the discovery. Investigators were also unable to find surveillance footage to identify the particular moment or day when the baggie wasleft inside the West Wing. A source familiar with the investigation told CNN that the leading theory remains that it was left by one of the hundreds of visitors who entered the area that weekend for tours.
  
  The House voted Thursday to adopt several controversial amendments pushed by conservative hardliners to acritical national defense billas the fate of the must-pass legislation hangs in the balance. Passage of the amendments — which touch onhot-button issues like abortion policy— is expected to cost Democratic votes and could prevent the final passage ofthe legislationunless House Republicans are able to largely unite behind the measure. One of the most high-profile amendments would prohibit the secretary of defense from paying for or reimbursing expenses relating to abortion services. Many Democrats made it clear ahead of the vote that if the amendment was included as part of the defense bill, they would be unlikely to support it. Meanwhile, as Republican lawmakers have pushed restrictions on abortions in recent months, Democratic-led states have responded by passingso-called shield lawsto protect people who undergo the procedure against the possibility they could one day face prosecution.
  
  A jury has found that the Pittsburgh synagogue mass shooter is eligible to face the death penalty. The 50-year-old gunman was found guilty on June 16 of all63 charges against himfor killing 11 worshippers and wounding six others atPittsburgh’s Tree of Lifesynagogue in 2018, the deadliest attack on Jewish people in the US. Twenty-two of those counts were capital offenses. This week, the shooter’s defense team said his mental illnesses and delusions “took over his thinking.” The prosecution called in their own doctors who disputed thegunman’s diagnoses. In the next phase of the trial, the jury will hear from survivors and loved ones of the victims, who will speak to the lasting impact of the shooting. Then, next week, the jury will move into the final phase to decide whether to recommend death for the capital offenses.
  
  Republicans areescalating their legal threatsagainst retailer Target, pressuring the company to remove merchandise for transgender customers and backtrack on its diversity initiatives. Last week, Republican attorneys general in seven stateswrote to Targetwarning that merchandise in its Pride month product collection could violate their states’ child protection laws. The letter followed ananti-LGBTQ campaignagainst Target that wentviral on social media. A separate letter was sent to Target last week by Arkansas GOP Sen. Tom Cotton, who said the company’s diversity pledge in 2020 to increase Black employees by 20% and invest more than $2 billion in Black-owned businesses was racially discriminatory. Target did not respond to comment on Sen. Cotton or the attorneys general letter.
  
  Kremlin says Wagner private mercenary group was never a legal entityThe Kremlin says that the Wagner private mercenary group, which led a failed insurrection against Russian President Vladimir Putin last month,was never a legal entityand its legal status needs further consideration. “Such a legal entity as PMC Wagner does not exist and never existed. This is a legal issue that needs to be explored,” Kremlin spokesperson Dmitry Peskov said today. Peskov refused to disclose any further details on the meeting between Wagner head Yengeny Prigozhin and Putin, which reportedly took place several days after the aborted rebellion in June.
  
