  — A Los Angeles County medical examiner, announcing that Lisa Marie Presley’s death in January was due to complications from aprior weight-loss surgery. Lisa Marie Presley, the only daughter of the late Elvis Presley and Priscilla Presley, suffered a small bowel obstruction, or blockage in the small intestine, according to the medical examiner’s report. She was 54.
  
