  $1 billionThat’s roughly how much money former President Donald Trump appears to have earned in his post-presidential life, according to new financial disclosures. The latest filings show Trump received multimillion-dollarspeaking engagement dealssince he left office, including one worth $2.5 million to provide commentary at a boxing match.
  
