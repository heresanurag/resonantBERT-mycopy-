  Making sure children get the recommended MMR vaccinations as part of their routine childhood immunizations can help reduce their risk of measles, said Dr. Tanya Altmann, founder ofCalabasas Pediatricsin California and author of “Baby & Toddler Basics,” who is an adjunct clinical professor at Children’s Hospital Los Angeles.
  
  “Measles is one of the most contagious viruses that we’ve identified, and if one person has measles and there’s somebody unvaccinated around them, there’s a 90% chance they’re going to get it,” she said, adding that all of the children infected during the measles outbreak in Ohio were all not fully vaccinated.
  
  “It really just takes one unvaccinated person to travel into a community, and they can have a measles outbreak if there isn’t a high enough vaccination rate in that community,” Altmann said.
