title: "1 person dead and 3 injured in Christmas Eve mall shooting in Colorado, police say"
date: "2023-12-25"
section: "US"
url: "https://www.cnn.com/2023/12/25/us/christmas-eve-shooting-colorado/index.html"
content: |
  One person was killed and three others were injured during a Christmas Eve shooting at a mall in Colorado, police said, marking at least thesecond time in two daysthat gunshots rang out at a shopping center in the US as people tried to wrap up their holiday shopping.
  
  Sunday’s shooting at the Citadel Mall in Colorado Springs happened aftera fight broke out between two groups, according to theColorado Springs Police Department.
  
  Authorities issue arrest warrant for suspect in connection with deadly Florida mall shooting
  
  Officers responded just after 4:30 p.m., as holiday shoppers were making their last-minute purchases during what wasexpectedto be second-busiest shopping weekend of the year, behind Black Friday. The shooting in Colorado came just a day after shoppers at amall in Ocala, Florida, were sent running for cover when gunfire broke out on Saturday. One person was killed and another person was injured, marking another example of how pervasive gun violence has become during day-to-day activities in the US.
  
  In Colorado, one man was found dead in the mall, and two other men “suffering from at least one gunshot wound each” were taken to local hospitals in serious condition,police saidin a post on X, formerly known as Twitter.
  
  A woman was also taken to the hospital with minor injuries, according to police.
  
  The mall has been “cleared and closed,” thepolice department said. “There is no known threat to the community at this time.”
  
  Several people have been detained, police said.
  
  This story has been updated with additional information.
