  – President Joe Biden, announcing Thursday that he’s nominating Ajay Banga, a former MasterCard executive, toserve as president of the World Bank. “Raised in India, Ajay has a unique perspective on the opportunities and challenges facing developing countries and how the World Bank can deliver on its ambitious agenda to reduce poverty and expand prosperity,” Biden added. The World Bank, a group of 187 nations, lends money to developing countries to help reduce poverty.
  
