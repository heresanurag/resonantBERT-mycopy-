  5That’s how many people recently got sick in connection with a batch of counterfeit Ozempic. The FDA warned Thursday that it has seized “thousands of units” ofcounterfeit versionsof the type 2 diabetes drug from the US drug supply chain, and it’s urging suppliers, pharmacies and patients to use caution.
  
  “Many of our stores have experienced incidents of vandalism.”
  
  — Starbucks CEO Laxman Narasimhan, saying that he wants people to stop protesting its stores over the Israel-Hamas war. Some of therecent demonstrationsbegan after the coffee chain tried to distance itself from pro-Palestine positions taken by Starbucks Workers United, a union for Starbucks workers.
  
