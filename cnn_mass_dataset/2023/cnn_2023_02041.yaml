  Golden Globe Awards announces 2024 hostWith a bit more than two weeks remaining before the event, the Golden Globes has selectedcomedian Jo Koyas host for the festivities.
  
  Vin Diesel accused of sexual battery in new lawsuit“Fast & Furious” star Vin Diesel has been accused of sexual battery and creating a hostile work environment in alawsuit filed by a former assistant.
  
