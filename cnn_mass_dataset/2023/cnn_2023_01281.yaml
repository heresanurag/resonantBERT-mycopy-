title: "The numbers for Wednesday night’s $850 million Powerball jackpot have been drawn"
date: "2023-09-27"
section: "US"
url: "https://www.cnn.com/2023/09/27/us/powerball-lottery-jackpot-millions-wednesday/index.html"
content: |
  The winning numbers for Wednesday’s night’s $850 million Powerball jackpot – the fourth largest jackpot prize in the game’s history – have been drawn.
  
  The numbers are 1, 7, 46, 47, 63 and the Powerball is 7, the lottery said.
  
  A jackpot winner Wednesday night would have the option of taking the whole prize in paymentsover 29 years, or a lump sum of an estimated $397.4 million, both before taxes, the lottery said.
  
  Powerball used to have a jackpot limit. Then it exploded
  
  The lottery’s grand prize grew from $785 million when no winner matched all six numbers Monday night. An $850 million jackpot would be the fourth-largest in the game’s history,according to Powerball.
  
  The most recent Powerball jackpot win – $1.08 billion, the third-largest in the game’s history – came on July 19 in California. Since then, 29 consecutive drawings have happened without a grand prize.
  
  The largest Powerball jackpot –$2.04 billion– was won by one ticket in California in November.
  
  The odds of winning the jackpot are1 in 292.2 million, according to the lottery.
