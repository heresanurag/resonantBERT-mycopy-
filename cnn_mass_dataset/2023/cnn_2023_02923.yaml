title: "Stefanik back in the spotlight after fierce questioning of university presidents over antisemitism"
date: "2023-12-11"
section: "Politics"
url: "https://www.cnn.com/2023/12/11/politics/elise-stefanik-antisemitism-hearing/index.html"
content: |
  House Republican Conference Chairwoman Elise Stefanik had a sharp response to the news that University of Pennsylvania President Liz Magillwas stepping downfrom her position over the weekend: “One down. Two to go.”
  
  It was Stefanik’s line of questioningat a hearing last weekbefore the House Committee on Education and the Workforce that attracted the most attention from the roughly five hours of testimony. A series of exchanges went viral when Magill and other university presidents at Harvard and MIT failed to condemn calls for the genocide of Jews as explicitly against campus rules on harassment and bullying. The answers from such high-profile leaders in higher education sparked bipartisan backlash and condemnation, which led to Magill’s departure and increasing pressure to oustboth Harvard’s President Claudine Gayand MIT President Sally Kornbluth.
  
  Stefanik, a Harvard graduate herself, has been leading the charge since the hearing to highlight and investigate campus antisemitism, and her efforts have attracted supporters from across the aisle as well as former President Donald Trump.
  
  On Tuesday, Stefanik blasted her alma mater, whose president has not stepped down from her post despite some calls for it. Harvard President Claudine Gay has has theunanimous supportof the university’s board, Harvard’s highest governing body said in a statement Tuesday.
  
  “This is a moral failure of Harvard’s leadership and higher education leadership at the highest levels, and the only change they have made to their code of conduct where they failed to condemn calls for genocide of the Jewish people,” Stefanik said at a news conference on Capitol Hill.
  
  Stefanik announced late last week the committee was launching an investigation into Harvard, MIT and the University of Pennsylvania. While the investigation became public before news of Magill’s resignation broke, the New York congresswoman’s statements since then have made clear she’s not finished with the issue.
  
  “This forced resignation of the President of Penn is the bare minimum of what is required,” Stefanik said in a statement over the weekend. “These universities can anticipate a robust and comprehensive Congressional investigation of all facets of their institutions’ negligent perpetration of antisemitism including administrative, faculty, and overall leadership and governance.”
  
  Former Penn board chair Scott Bok also resigned Saturday.
  
  Trump praised Stefanik as “very smart” over the weekend.
  
  “I guess they’re all gonna be losing their jobs within the next day or two, but one down, two to go,” Trump said in a speech hosted by the New York Young Republican Club late Saturday night – repeating Stefanik’s line hours after she put her statement out.
  
  Stefanik has a polarizing reputation on Capitol Hill as a staunch supporter of Trump. But the congresswoman has managed to amass Democratic support for pushing for the ouster of university presidents. She co-wrotea letter dated Fridaywith Democratic Rep. Jared Moskowitz of Florida demanding those presidents’ removal. The letter was also signed by Democrats Josh Gottheimer of New Jersey and Joe Courtney of Connecticut.
  
  How Harvard, Penn and MIT’s presidents made such a fatal error in their free speech defense
  
  “I am proud to lead a bipartisan letter with @RepMoskowitz and 72 of our colleagues to the members of the Governing Boards of @Harvard, @MIT, and @Penn demanding that their presidents be removed after this week’s @EdWorkforceCmte hearing,” Stefanik tweeted Friday.
  
  Gay has since apologized for her remarks, in an interview with The Harvard Crimson last week.
  
  “I got caught up in what had become at that point, an extended, combative exchange about policies and procedures,” Gay told the student newspaper. “What I should have had the presence of mind to do in that moment was return to my guiding truth, which is that calls for violence against our Jewish community — threats to our Jewish students — have no place at Harvard, and will never go unchallenged.”
  
  “I am sorry,” she said. “Words matter.”
  
  The Executive Committee of the MIT Corporation, MIT’s governing board, issued a statement last week saying President Sally Kornbluth has their “full and unreserved support.”
  
  Stefanik, who was first elected in 2014, replaced then-Rep. Liz Cheney as GOP conference chairwoman in May 2021. While she voted against one of Trump signature legislative victories –his 2017 tax plan– she attracted significant attention for herimpassioned defense of Trumparound the former president’s first impeachment investigation in 2019.
  
  While she’s been one of the most visible messengers for the House GOP Conference, she was not one of the many Republicans to throw themselves in for nomination to be the next House Speaker, after Kevin McCarthy was ousted earlier this fall.
  
  Since the October 7 Hamas terrorist attack on Israel, the Department of Education has opened an unprecedented number of investigations into alleged incidents of hate on college campuses.
  
  Both Harvard and Penn, along with 11 other colleges and five K-12 school districts, have come under investigation since that time.The Department of Education has told CNNthat the situation is becoming untenable for the Office for Civil Rights, and that it doesn’t have the investigative staff to match the influx of cases, shining a light on where the investigation Stefanik announced last week may be able to fill in those gaps.
  
  This story has been updated with additional developments Tuesday.
