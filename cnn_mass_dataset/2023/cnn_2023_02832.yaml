title: "Taylor Swift’s surprise song at Seattle concert hypes next potential ‘Taylor’s Version’ album"
date: "2023-07-23"
section: "Entertainment"
url: "https://www.cnn.com/2023/07/23/entertainment/taylor-swift-reputation/index.html"
content: |
  The inimitable Taylor Swift has been on herrecord-breaking “Eras” tourand along the way, she’s played a different “surprise song” to change up the setlist atevery concert.
  
  On Saturday during her Seattle concert, Swift’s surprise song was an acoustic version of “This Is Why We Can’t Have Nice Things,” a“Reputation”album track that’s beenlong-speculatedby Swifties to be about Kanye West, who has notoriously clashed in public with the singer through the years.
  
  It all started, as if we could forget, when the “Gold Digger” rapper notoriouslyinterruptedSwift at the 2009 MTV Video Music Awards while she was accepting the award for best female video.
  
  The artists clashed again in a 2016disputeover whether or not the rapper cleared lyrics with Swift for his song “Famous,” wherein he calls Swift a “b—” and takes credit for her fame.
  
  Despite the fact that a handful of songs from the 2017 album are played regularly on the “Eras” tour, “Nice Things” serves as a very specific reminder of what may bubble up when the “Reputation (Taylor’s Version)” album eventually comes out.
  
  Invideosposted to social media from Saturday’s concert, Swift is seen giving an extra loud cackle during the song’s bridge when she sings the lyrics, “and here’s to you, because forgiveness is a nice thing to do… I can’t even say it with a straight face,” so, at least she appears to be having fun with it. (The laugh is part of the original recording.)
  
  Regardless of the current state of Swift’s beef with West, most Swifties would agree that “Reputation” was used, in part, as a vehicle for her to take back control of her image aftervarious disputes, and “Nice Things” is one of the many songs on the album that represents that.
  
  Just as Swift made it a point during an “Eras” tour concert tourge “kindness”online when releasing “Speak Now (Taylor’s Version)” – seemingly to avoid reigniting any internet negativity toward John Mayer – it begs the question of how she’ll tackle the storylines that may reignite upon the release of “Reputation (Taylor’s Version).”
  
  Whenever that may be – we’re not ready for it.
