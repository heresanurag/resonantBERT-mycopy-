title: "Evergrande shares plunge 70%. The Chinese developer is still losing billions"
date: "2023-08-27"
section: "Economy"
url: "https://www.cnn.com/2023/08/27/economy/china-evergrande-earnings-shares-intl-hnk/index.html"
content: |
  Evergrande Group, the world’s most indebted real estate developer, has reported a significant narrowing inits net lossesfor the first half of the year, thanks to a rise in revenue because of a “short boom” earlier this year.
  
  But its stock still plunged more than 70% on Monday when it resumed trading following a 17-month suspension, even as shares in most Chinese property firms traded higher after a series of weekend announcements by officials aimed at boosting demand for property.
  
  For years, the Shenzhen-based company was one of China’s largest property developers by sales. But it had borrowed heavily to fund its expansion and defaulted on its debt in 2021, sparkinga crisis in China’s real estate sector, which once accounted for as much as 30% of the country’s economy. Earlier this month, itapplied for bankruptcyin the United States.
  
  Investors are closely watching its progress because of the key role it has played in China’scurrent economic woes.
  
  Evergrande’s loss attributable to shareholders amounted to 33 billion yuan ($4.5 billion) for the January to June period, a 50% drop from the 66.4 billion yuan loss ($9.1 billion) recorded in the same period a year ago, it said in aSunday filingto the Hong Kong stock exchange. Revenue surged 44% from a year ago, reaching 128.2 billion yuan ($17.6 billion).
  
  The company said it had “actively planned for the resumption of sales and successfully seized the short boom of the property market that emerged at the beginning of the year.”
  
  The Chinese economy enjoyeda strong start to the year, thanks to a post-opening recovery after the country scrapped its strict Covid-19 restrictions. But that rebound hasfadedsince April.
  
  Evergrande incurred acombined loss of $81 billionduring 2021 and 2022, according to a long overdue financial report posted last month.
  
  Its challenges are not over. Evergrande was still laden with liabilities worth 2.39 trillion yuan ($328 billion) atthe end of June. That’s just slightly lower than the 2.44 trillion yuan ($334 billion) in total liabilities it reported at the end of last year.
  
  Its total assets also declined to 1.74 trillion yuan ($239 billion) from 1.84 trillion yuan ($253 billion).
  
  Evergrande's bankruptcy may be just the beginning of China's real estate crisis
  
  Evergrande is undergoing a government-guided debt restructuring, which kicked off in late 2021 shortly after it defaulted on its debt.
  
  In March this year, it unveiled a multi-billion dollar plan to make peace with its international creditors but said it needed additional financing of $36 billion to $44 billion to complete unfinished property projects.
  
  In Sunday’s filing, Evergrande said it had already obtained new financing for certain projects and will continue to seek additional capital.
  
  But the company’s ability to continue as a going concern still depends on whether it can successfully complete the offshore debt restructuring plan, it said.
  
  It also needs to negotiate with onshore lenders on the extension of the company’s borrowings, it added.
  
  Since Friday, Beijing has once again stepped up policy support to bolster the real estate sector, which has been a major drag on the country’s economy.
  
  Five Chinese regulators — including the Ministry of Housing and Urban-Rural Development, the People’s Bank of China and the State Taxation Administration — separatelyannounced a series of movesto boost home buying and revive the troubled industry.
  
  The measures include allowing local governments to scrap a rule that disqualifies people who have held previous mortgages from being considered first-time homebuyers in major cities. Such homebuyers generally enjoy preferential treatment in bank lending.
  
  “This mortgage easing measure will likely unleash upgrading demand in big cities,” said Nomura analysts on Monday.
  
