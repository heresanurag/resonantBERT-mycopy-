title: "Fossils reveal the mysterious primate relatives that lived in the ancient Arctic"
date: "2023-01-25"
section: "World"
url: "https://www.cnn.com/2023/01/25/world/arctic-ancient-primate-relatives-scn/index.html"
content: |
