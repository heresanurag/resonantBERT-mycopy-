title: "Opinion: How Russia outmaneuvered the US in Africa"
date: "2023-01-31"
section: "Opinion"
url: "https://www.cnn.com/2023/01/31/opinions/russia-africa-wagner-lavrov-putin-us-davis"
content: |
  Editor’s Note:Joyce M. Davis, outreach and opinion editor forPennLiveand The Patriot-News, is the president and CEO of the World Affairs Council of Harrisburg, Pennsylvania. She is a veteran journalist and author who has lived and worked around the globe, working for National Public Radio, Knight Ridder Newspapers in Washington, DC, and Radio Free Europe/Radio Liberty in Prague. The opinions expressed here are her own. Read moreopinionat CNN.
  
  Russia seems to be outmaneuvering the United States in Africa. In recent days, Russian Foreign Minister Sergei Lavrov underscored that stark reality as he wined and dined his way through a tour of four African capitals.
  
  As much as President Joe Biden would like African countries to join the Western alliance in isolating Russia over its brutality in Ukraine, Russia is making a show of bolstering ties with some powerful players on the continent.
  
  Instead of being treated like a global pariah as the US wants, leaders in South Africa, Eritrea, Angola and Eswatini (formerly Swaziland) treated Lavrov like a cherished friend during his visit.
  
  In South Africa, Foreign Minister Naledi Pandor greeted Lavrov withopen arms.She didn’t use the meeting in Pretoria last Monday to repeat calls for Russia to stop killing Ukrainians. And she brushed off criticism, saying it would be “simplistic and infantile” to do so.
  
  To make matters worse, Pandor also announced South Africa will soon conductjoint naval drills with Russia and China, calling it “exercises with friends.” TheUSandEuropewere not amused.
  
  But South Africa has historically strong ties with Russia, dating back to the days of apartheid when the Soviet Union stood with the then-banned ANC when it most needed support. It’s likely Lavrov reminded South Africans of that history during his visit.
  
  Now the West is having to face the fact that a good swath of Africa appears to consider Russian President Vladimir Putin a friend – or at the very least, strategically important enough to keep on side.
  
  South Africa was one of 17 African nations which abstained against condemning Russia’s invasion of Ukraine, atthe United Nations in March.Eight others didn’t submit a vote.
  
  Putin is the best friend any brutal dictator could have.
  
  It was a significant – though just shy of a majority – portion of the continent. In total, 28 African nations – including Nigeria and Egypt – voted to condemn Russia.
  
  Eritrea was one of only four countries globally – the others being Belarus, North Korea and Syria – toopenly side with Russia, which has a history of military co-operation with these decidedly undemocratic, authoritarian regimes.
  
  It’s easy to understand why. Putin sends weapons toprop up authoritarian regimes. He sendsmercenaries to fight Islamic insurgents; and he doesn’t care a whit about democracy, corruption or human rights.
  
  Putin doesn’t care thatAmnesty International saysEswatini’s government has launched a brutal crackdown on pro-democracy activists in the country.
  
  He doesn’t care that Eritrea’s president Isaias Afewerki has been unelected since 1993 and thatHuman Rights Watch saysthe country has no legislature, no independent civil society organizations, and no independent judiciary.
  
  An off-the-books mercenary army is gaining power in Putin's Russia
  
  Putin doesn’t care that theHuman Rights Watch World Report 2022 saysEritrean forces have carried out large-scale massacres, summary executions, and widespread sexual violence, including gang rape and sexual slavery.
  
  He doesn’t even care thatHuman Rights Watch saysMali’s government security forces are responsible for extrajudicial killings, enforced disappearances, torture, arbitrary arrests, and detentions of suspected armed fighters.
  
  Putin is not only deepening military ties with these governments, he’s akey figurebehind the Wagner Group helping to carry out their brutality. (A charge the Kremlin denies).
  
  Russia’s private military group isbolstering authoritarian regimes throughout Africa, including inMali,Sudan,Central African Republic,MozambiqueandLibya. And human rights organizations say Wagner is guilty of its own atrocities on the continent.
  
  There are numerous reports of Russian mercenariesmassacring miners in the Central African Republicto plunder the region’s gold.
  
  Former Wagner commander describes brutality and incompetence on the frontline
  
  None of these horrors matter to Putin. He has none of the constraints Western democracies are expected to honor in international relations. He is willing to deal with whoever is in power and help them stay there, as long as they remain his friend.
  
  Putin is the best friend any brutal dictator could have. But his lack of scruples presents a major problem for US efforts to exclude Russia and strengthen its own ties in Africa.
  
  And Putin’s influence in Africa has had a dramatic impact on the world stage during a time of crisis when the US sought unified condemnation of the invasion of Ukraine. Just look atvoting at the United Nations.
  
  It is true, America has also been guilty of propping up authoritarian regimes and ignoring human rights abuses. Let’s not forgetAmerican atrocitiesin the Democratic Republic of the Congo and elsewhere in Africa.
  
  But democracies can hold their leaders accountable and do. Western democracies are supposed to care about human rights and rule of law. Putin simply does not. And no one holds him accountable for anything.
  
  Despite the constraints of international law and respect for democracy, the US has a few powerful tools to help counter Russian influence in Africa: chief among them – money.
  
  President Biden’s pledge of$55 billionin economic, health, and security aid over three years not only helps counter Russia’s influence but China’s, as well.
  
  Also in Africa last week, US Treasury Secretary Janet Yellin used her trip to promise even more money. She announced American plans to expand partnerships with Africa on conservation, climate change, and access to clean energy. And she said the United States will provide over$1 billionto support African-led efforts to combat climate change.
  
  It’s harder for Russia to do that. International sanctions and its war in Ukraine will keep Putin financially crippled for a while.
  
  And as Russia focuses its efforts on controlling Africa’s despots, the US would do well to focus on the African people, especially on its youth. As they soon take over the seats of power, there are signs young people want more responsible and accountable governments.
  
  According to the2022 African Youth Survey, 74% of young Africans say democracy is preferable to any other form of government, even if they don’t want to be carbon copies of the West.
  
  So, while Putin thinks he’s outmaneuvering the West, he may find himself alienating Africa’s youth.
  
  Unlike Pandor, there is hope these emerging leaders will not see Russia as their friend but as it really is – an obstacle to stability, democracy, and African prosperity.
