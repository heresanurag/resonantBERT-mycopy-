title: "Neymar to undergo surgery after tearing his anterior cruciate ligament with Brazil"
date: "2023-10-19"
section: "Sport"
url: "https://www.cnn.com/2023/10/19/sport/neymar-brazil-acl-injury-spt-intl/index.html"
content: |
  Braziliansoccersuperstar Neymar is set to have surgery after tearing both hisanterior cruciate ligament(ACL) and meniscus in his left knee, his clubAl-Hilalhave confirmed.
  
  The 31-year-old suffered the injury duringBrazil’s 2-0 defeat against Uruguayon Tuesday.
  
  After battling with Uruguay’s Nicolás de la Cruz for ball, Neymar collapsed to the ground clutching his knee, just before half-time. He received medical attention for several minutes before being stretchered off the field.
  
  “The medical tests Neymar underwent, confirmed the Anterior Cruciate Ligament and Meniscus tear injury in his knee, he will be going through surgery and then a treatment program that will be determined later,” the teamannounced on X, formerly known as Twitter. “Return Stronger @neymarjr 💙”
  
  The club did not say how long the Brazilian is expected to be sidelined for, but ACL injuries usually keep players in recovery for several months, meaning that his participation in the Copa América in June is under threat.
  
  Neymar, made the move to the Saudi Arabian club in September, departing Paris Saint-Germain after spending six seasons in the French capital, becoming one of the highest-profile players to join the burgeoning Saudi Pro League. The €222 million (approximately $243.1M) transfer fee attached to his 2017 move to PSG saw him become the most expensive soccer player of all time.
  
  “It’s a very sad time, the worst,” Neymarposted on Xafter the injury was confirmed. “I know I’m strong, but this time I’m going to need my family and friends even more.”
  
  Injuries have plagued the forward throughout his career. This marks the second surgery Neymar will undergo in 2023 – his final season in Paris was ended prematurely after anankle injury in February.
  
  “It’s not easy going through injury and surgery, imagine going through it all again following four months of recovery,” he added in his post.
  
  Neymar became Brazil’sall-time record goalscorerin September, passing Pelé’s record of 77 international goals after scoring twice against Bolivia.
