title: "Global markets struggle to put last year’s misery behind them"
date: "2023-01-03"
section: "Investing"
url: "https://www.cnn.com/2023/01/03/investing/global-markets-new-year-stocks-rise?cid=external-feeds_iluminar_msn"
content: |
  European and Asian stocks pushed higher on the first major trading day of 2023 as investors try to look beyond agloomy outlookfor the world economy, China’s worst Covid outbreak and stubbornly high inflation in Europe.
  
  But after a positive start, Wall Street succumbed to fear again. US stocks opened higher but the rally was short lived. TheDowended the day with a loss of about 13 points, essentially unchanged. TheS&P 500fell 0.4% while theNasdaq Compositewas down 0.8%. Stocks did close well off their lows from earlier in the session, though.
  
  Shares of Tesla plunged 12% after the electric car giant reported weaker than expected global sales for the fourth quarter. Apple sank about 4%, leaving its market cap below $2 trillion. An impressive number, for sure, but about$1 trillion lessthan its valuation at this time last year.
  
  Europe’s Stoxx 600 index rose1.2%, off earlier highs but extending strong gains posted Monday when Chinese and US markets were closed. Germany’s DAX rose 0.8%, while France’s CAC gained 0.4%.
  
  US markets are waiting for the first major economic news of the year, due later this week. A key report on manufacturing, new data on labor market openings and the minutes from the latest Federal Reserve meeting are due out Wednesday. The monthly jobs report for December will be released Friday.
  
  World's largest iPhone factory bounces back from Covid disruption that hurt Apple
  
  Investors in Europewere buoyed by survey data, released Monday, showing thatsupply chainand inflation pressures were easing slightly for manufacturers in the economies that use the euro currency.
  
  Shortages of parts in Germany, the biggest economy in Europe, have also abated, according to data released by the Institute for Economic Research (Ifo) on Tuesday. Inflation in the country continues to trend downwards. Data published Tuesday by the German Federal Statistics Office showed that consumer prices rose 8.6% in December, compared with 10% the previous month, and 10.4% in October.
  
  London’s FTSE 100 index clocked up gains of 2.3%in morning trading,before easing slightly to stand 1.4% higher.
  
  Holger Schmieding, chief economist at Berenberg bank, struck a cautiously optimistic note about the year ahead.
  
  “Unless a major new geopolitical shock intervenes, the new year could be far less unsettled than 2022. Especially for Europe, the outlook continues to become substantially less negative,” he wrote in note Tuesday.
  
  In Asia, markets ended the day firmly in positive territory, recovering from early losses.
  
  Hong Kong’s Hang Seng Index dropped by as much as 2% after a closely watched private survey showed China’s economy ended last year with a slump in factory activity. But the index soon reversed course to gain 1.8% by the close, as hopes for the reopening of the city’s border with mainland China on January 8boosted stocks.
  
  Stocks in mainland China also had a choppy first-day trading. The Shanghai Composite opened lower, but then clawed back losses to close 0.9% higher.
  
  Investors spent 2022 on a rollercoaster, with$33 trillionwiped off global equity markets. Many suffered deep losses last year as central banks hiked interest rates at an unprecedented clip in a bid to control surging inflation.
  
  The S&P 500 lost 19.4% over the past 12 months — its worst year since 2008 — despite hitting an all-time high last January. Europe’s Stoxx 600 index fell 12.9%, its steepest annual loss since 2018. Hong Kong’s Hang Seng dropped 15.5%, its weakest performance since 2011.
  
  Predicting the state of markets is notoriously tricky — and oftendownright wrong— but it looks likely that many of last year’s economicheadwinds willstick around, and some could get even worse.
  
  Kristalina Georgieva, head of the International Monetary Fund, warned in aninterview with CBSthat aired on Sunday that 2023 will be tougher on the global economy than 2022 was.
  
  Georgieva said that the world’s three biggest economies, the United States, the European Union and China, are all “slowing down simultaneously,” and the IMFexpected “one third of the world economy to be in recession” this year.
  
  “Almost everyone is going into 2023 with a healthy dose of trepidation,” Craig Erlam, senior market analyst at Oanda, said in a Tuesday note.
  
  “The outlook is understandably gloomy and will remain so unless something significant changes, either on the war in Ukraine or inflation,” he added.
  
  Investors can expect the world’s central banks to continue hiking interest rates to tame historic levels of inflation, despite signs that price rises globally havestarted to cool, in part due to a drop in energy prices.
  
  Both the European Central Bank and US Federal Reserve have said they plan to continue to raise the cost of borrowing in the near term, a move that typically hurts companies’ profits — and their investors.
  
  China is also unpredictable. While investors are broadly happy that the country ditched its strict zero-Covid policy last month — promising to lift demand across the world’s second-biggest  economy —rocketing numbers of casesand a potential contraction in the early part of 2023could limit gains.
  
  — Paul LaMonica, Julia Horowitz and Laura He contributed reporting.
