title: "Before she was kidnapped, an American nurse described Haitians as ‘full of joy and love.’ Last week, the US urged citizens to leave the Caribbean nation"
date: "2023-07-31"
section: "Americas"
url: "https://www.cnn.com/2023/07/31/americas/haiti-kidnapped-nurse-alix-dorsainvil/index.html"
content: |
  Before Alix Dorsainvil was kidnapped with her child in Haiti, the American nurse described Haitians as a “resilient people” who are “full of joy and life and love.”
  
  Her comments came in a video on the website of El Roi Haiti, the Christian humanitarian aid organization for which she works.
  
  Dorsainvil, the wife of El Roi Haiti Director Sandro Dorsainvil, and their child were reportedly abducted Thursday morning while serving in their community ministry on El Roi Haiti’s campus near the capital city Port-au-Prince, according to a statement from the non-profit. It’s unclear how old the couple’s child is.
  
  American nurse and her child kidnapped from their community ministry in Haiti
  
  The same day, the US State Departmentordered the departureof nonemergency government personnel from Haiti as thesecurity situationin the country deteriorates.
  
  The order followed a travel advisory from the US Embassy in Haiti advising US nationals to leave the country immediately due to recent armed clashes between criminal groups and police in Port-au-Prince.
  
  Haiti’s capital Port-au-Prince and surrounding areas have been gripped by a yearslong kidnapping-for-profit epidemic, with hundreds of Haitians targeted by gangs seeking ransom payments each year.
  
  While the bulk of such cases are local, targeting the rich and poor alike, foreigners have been taken in several high-profile kidnappings. In 2021,17 missionaries from the United States and Canadawere seized by a local gang while traveling on the road north of the capital and held for more than a month.
  
  Authorities registered 1,014 kidnappings in Haiti from January to June this year –  256 women, 13 girls and 24 boys, according to aUnited Nations reporton Haiti.
  
  Dorsainvil, a nurse from New Hampshire, moved to Haiti after her husband invited her to the Haitian school to provide nursing care for the children, Dorsainvil explained in an undated video on the organization’s website.
  
  According to a 2021 newsletter published by Sandro Dorsainvil’s alma mater, Lustre Christian High School in Montana, the couple married in Haiti in January 2021.
  
  “Haitians are such a resilient people,” Dorsainvil said in the video. “They’re full of joy and life and love and I’m so blessed to be able to know so many amazing Haitians.”
  
  El Roi Haiti has 390 students enrolled from pre-K through 12th grade, according to its website.
  
