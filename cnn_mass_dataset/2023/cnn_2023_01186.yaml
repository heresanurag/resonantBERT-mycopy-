  “People are tired. Everyone is tired … But this is not a stalemate.”
  
  — Ukrainian President Volodymyr Zelensky, responding to concerns that people are getting “tired” after18 months of warin the country. Zelensky’s comments follow an assessment by his own military chief that the war with Russia is at a “stalemate,” deepening a feud in Kyiv which has heightened nerves that the Israel-Hamas conflict is drawing Western support away from the war in Ukraine.
  
