title: "5 things to know for Nov. 6: Israel, Trump trial, Election workers, Extreme weather, Pollution"
date: "2023-11-06"
section: "US"
url: "https://www.cnn.com/2023/11/06/us/5-things-to-know-for-nov-6-israel-trump-trial-election-workers-extreme-weather-pollution/index.html"
content: |
  A Muslim student at Stanford University is advocating for “love, understanding and inclusivity” after he was recently struck by a car in what authorities are calling a hate crime. It is one of the latest instances ofhate-based violence, as many communities in the US face increasinglytense rhetoricand protests surrounding the Israel-Hamas war.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  Humanitarian agencies have lost contact with aid workers in Gaza as the Palestinian enclave slowly recovers from its third communications blackout of theIsrael-Hamas conflict. The disruption to internet and cell service comes as Israel expands its ground operation targeting Hamas infrastructure. Israel said it opened a four-hour evacuation window to secure safe corridors for civilians before its forces reached the enclave’s coast on Sunday. But the outcry is growing over the Gaza crisis as deadly blasts continue to strikerefugee camps and crowded hospitals. Additionally, US Secretary of State Antony Blinken made anunannounced visit to Iraqon Sunday as Iranian-backed proxy groups have scaled up attacks targeting US troops in the region.
  
  Former President Donald Trump will be called to the witness stand today to testify in his civil fraud trial in New York. It will be the first time Trump himself will besubject to extensive courtroom questioningin any of his current legal battles. The trial was brought by New York Attorney General Letitia James, who has accused Trump of inflating his net worth to save hundreds of millions of dollars in business and real estate deals. James is seeking $250 million in damages and to bar the former president from doing business in the state. Still, despite a mountain of legal woes, recent polls show Trump isleaping past President Joe Bidenin multiple key swing states as he tries to turn his criminal peril into an electoral advantage.
  
  A growing exodus of local election officials is raising alarms ahead of the 2024 presidential contest. Officials saymany workers are resigning or retiringbecause they continue to face a barrage of threats, harassment and partisan interference in their duties, first ignited by DonaldTrump’s false claimsof a stolen election in 2020. In one region alone — across 11 Western states — more than 160 top election officials have left their positions since November 2020, according to a study from Issue One, a non-profit watchdog group tracking the departures. In some counties, the typical level of experience of officials has also dropped from about eight years to one, the analysis found.
  
  More than 60 record-high temperatures are expected from Arizona to New York this week beginning today through Wednesday. The above-average temperatures will make their way throughparts of the southwestern US todayand gradually move east by the middle of the week, meteorologists say. However, cold air is expected to return quickly in some cities by Friday. For example, St. Louis is expected to drop from a high of 83 degrees on Wednesday down to 61 degrees. Denver and some other areas in the West are also expected to see a similar drop from 75 degrees on Tuesday to the high 40s within a day.
  
  New Delhi, home to more than 20 million people, isblanketed with smog— forcing schools to shut down and disrupting the Cricket World Cup. The airborne particle pollution in India’s capital stands at PM 2.5 — a concentration nearly 80 times the World Health Organization’s recommended limit, according to Swiss air quality company IQAir. The city’s air quality declined last week after colder temperatures trapped particles from surrounding crop burning,creating a toxic hazethat hit hazardous levels for the fourth straight day today. Exposure to this type of pollution can impair cognitive and immune functions with links to lung and heart disorders.
  
  Here’s who won the New York City Marathon on SundayEthiopia’s Tamirat Tolaset a course recordwhile Kenya’s Hellen Obiri won the women’s race. (Everyone else who ran, you’re still a winner in our eyes!)
  
