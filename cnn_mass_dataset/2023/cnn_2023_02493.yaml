title: "Police were called about a person with a rifle. It turned out to be a man in a Boba Fett costume"
date: "2023-04-09"
section: "US"
url: "https://www.cnn.com/2023/04/09/us/boston-police-boba-fett-costume-trnd/index.html"
content: |
  Boston police had an intergalactic encounter after a report about a person carrying a long rifle led them to someone dressed up in a Boba Fett costume.
  
  Transit police with the Massachusetts Bay Transportation Authority received a call about a person armed with a long rifle at the Back Bay train station on Friday around 6 pm ET,according to a tweet from the agency’s official account.
  
  But the rifle in question wasn’t real at all, said police.
  
  “Officers located a person in character as ‘Boba Fett” w/a replica firearm,” the agency wrote on twitter. “Officers conversed with the individual & the scene was safe.”
  
  Boba Fett appears as an armored bounty hunter – and clone – throughout the Star Wars franchise. The character is known for his standoffish demeanor and for almost always wearing his helmet, rarely appearing unmasked. Most recently, the bounty hunter has appeared in“The Mandalorian”series and“The Book of Boba Fett.
  
  The encounter took place during Boston’s 2023Anime Bostonconvention, which spanned from Friday to Sunday.
