  $395 millionThat’s how much revenue Bud Light’s parent company lost in US sales in the second quarter after beingswept into a marketing controversy. The brewer received backlash from right-wing media and anti-trans critics after sponsoring transgender influencerDylan Mulvaneyin April. At the same time, the beer giant was slammed by LGBTQ advocates who said it failed to support Mulvaney and the broader trans community during the public relations crisis. Bud Light lost its ranking as America’s best-selling beer toMexican brewer Modeloin May.
  
  “We, too, are part of a checks and balances system.”
  
  —Supreme Court Justice Elena Kagan, affirming Thursday that the high court is working behind closed doors to consider whether toimplement a code of conductthat would be directed specifically at the nine justices. This comes asethics questions have been raisedover some justices’ luxury travels and extracurricular activities that could be seen as potential conflicts of interest. “It just can’t be that the court is the only institution that is somehow not subject to any checks and balances from anybody else,” Kagan said, adding, “We are not imperial.”
  
