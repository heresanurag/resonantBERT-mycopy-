url: "https://www.cnn.com/2023/08/04/us/5-things-to-know-for-august-4-trump-parkland-immigration-ukraine-wells-fargo?cid=external-feeds_iluminar_post-news"
content: |
  All Louisiana public schools are now required to display the national motto of “In God We Trust” inside every classroom, according to anew law that went into effect this week. Some critics fear the law will further blur the lines separating church and state, which follows a pattern seen in Southern legislatures in recent years.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  Former President Donald Trumppleaded not guilty Thursdayto four criminal charges related to his alleged attempts to overturn the 2020 presidential election. It was the third occasion that Trump was arraigned this year, in which he was arrested andreleased pending trial. Federal prosecutors in the latest indictment allege that Trump “was determined to remain in power” after losing the election and that he andsix unindicted co-conspiratorsorchestrated a plot to reverse the results — leading up to the January 6, 2021, attack on the US Capitol. After Trump left the courthouse Thursday, herailed against the indictment to reporters, describing it as “persecution of a political opponent.” Trump’s next hearing is set for August 28.
  
  The 2018 Parkland school shooting will bereenacted with live gunfire todayas part of a civil lawsuit against a former sheriff’s deputy who remained outside during the massacre. At least 140 bullets will be fired inside Marjory Stoneman Douglas High School in Parkland, Florida, where a gunman killed 17 people and injured 17 others in what remains thedeadliest high school shootingin the US. Families of the victims want to reenact the shooting with live rounds instead of blanks in an effort to prove that Scot Peterson, the former deputy, heard “upwards of 70 shots and knew where they were coming from” but chose to not confront the shooter, an attorney for the families said. Peterson was foundnot guilty in June of criminal chargesafter prosecutors accused him of ignoring his training and failing to make contact with the gunman, instead taking cover while the victims were gunned down.
  
  An appeals court will allow the Biden administration to keep acontroversial asylum policyin place for now. The policy at the heart of the court battle largely restricts migrants who passed through another country from seeking asylum in the US, marking a departure from decadeslong protocol. The policy and a similar Trump-era policy have received criticism from Biden allies, Democrats and immigration advocates. A district court judgehad blocked the policy last weekbut put that ruling on hold for 14 days for a possible appeal. The 9th US Circuit Court of Appeals on Thursday extended that pause and said it would expedite its consideration of the case. Additionally, Mexico’s president hascondemned Texas’ floating barrierson the Rio Grande river, calling the state’s border enforcement tactics “inhumane.”
  
  Ukrainian forces said they attacked a ship at a Russian naval base today which had about 100 servicemen aboard. A sea dronestruck the shipwith nearly 1,000 pounds of TNT, causing serious damage to the point that it is “not able to fulfill its duties,” a Ukrainian source said. Social media imagesshowed the ship being towednear the Novorossiysk naval base, despite earlier claims by the Russian defense ministry that the attack had been repelled. The strike today comes as tensions continue to rise in the Black Sea after Russiawithdrew from a grain dealcrucial to global food supplies and resumed its blockade of Ukraine’s ports, as well as launching a prolonged bombardment of its infrastructure and grain storage facilities.
  
  It may be a good time to check your Wells Fargo accounts. The bank is working to resolve a technical glitch that caused direct deposits to disappear from some customers’ bank accounts. On Thursday night, a torrent of customers contacted Wells Fargo via Twitter, now officially branded as ‘X,’ claiming theycould not access money that they depositedinto the bank. CNN reached out to Wells Fargo to determine how widespread the problem is, but the company has not said how many accounts are affected or when the issue will be resolved. Instead, a company spokesperson shared the following statement: “Wells Fargo is aware that some customers’ deposit transactions are not showing on their accounts. The issue will be resolved as soon as possible. We sincerely apologize for the inconvenience.”
  
