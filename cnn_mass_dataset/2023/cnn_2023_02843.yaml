id: cnn_2023_02843
title: "Controversial social media site Parler to return in 2024"
date: "2023-12-19"
section: "Tech"
url: "https://www.cnn.com/2023/12/19/tech/conservative-social-platform-parler-returns-2024/index.html"
content: |
  Conservative social media platform Parler says it’s planning a comeback after shuttering in April following a string of controversies and hosting illicit content.
  
  Parler is relaunchingin the first quarter of 2024 to “return to its roots as a robust marketplace of ideas,” according to a company statement, emerging just as the 2024 presidential race amps up.
  
  Launched in 2018 and popular with conservativeaudiences in its prime, Parler also found a fan base among users frustrated by speech rules on more mainstream platforms like Twitter. In that era, Twitter had removed numerous user accounts for violating its policies on speech, banning far-right figures such as Andrew Tate, Alex Jones and even President Donald Trump.
  
  Amid some normal social media discussions and behavior, the site alsobecame an arenafor forms of hate speech and misinformation, including election denial claims﻿.
  
  Accounts with swastikas as their profile pictures and racist posts were common, and members of theProud Boys, adherents ofconspiracy theory QAnon, anti-government extremists and white supremacists all openly promoted their views on Parler, according to a 2020ADL report.
  
  The platform was only shunned by major app stores after rioters used it as a platform toplan the Jan. 6thCapitol attacks. “We prefer not to continue to be associated with the events of January 6th,” company spokeswoman Elise Pierotti said in a statement to CNN.
  
  At the time, Parler lacked key content moderation systems including ways for users to report objectionable content and the ability to remove users who violated the app’s terms of service, Google said last year.
  
  Both Apple andGooglekicked Parler off their stores, while Amazon moved to remove the site from its web hosting service.
  
  Apple and Google both eventually allowed the company back into their stores, withApplein April 2021 reinstating it andGooglein September 2022. Both companies cited improvements to content moderation methods.
  
  Parler’s user base had plummeted, however.
  
  Comscore data analyzed byThe Rightingshows Parler attracted just 137,000 unique visitors in August 2022, adramatic plungefrom the 12.3 million it had in January 2021 surrounding the Capitol attack.
  
  “No one goes there for a dialogue on conservative ideas,” CNN national security analyst Juliette Kayyem pointed out on-air in October 2022. “They go there to find equally-minded hate.”
  
  Controversy also surrounded Parler in October 2022 when Kanye Westannouncedhe would be purchasing the site after antisemitic comments got the rapper’s Twitter accounttemporary locked, though the deal quickly fell through.
  
  Parler now also faces a few competitors. In November of 2022, Elon Musk acquired Twitter and has since renamed it as X, letting several far-right figures back on the platform such as Alex Jones and Andrew Tate. Trump started his own social media platform called Truth Social in 2022.
  
  Other platforms such as Mastodon,Spilland Bluesky launched in recent years, aiming to draw some of the journalists, moderates and progressive users that grew less comfortable on X. And Mark Zuckerberg’s Meta launched Threads in 2023, aiming to compete with X and all the other players.
  
  Digital media firm Starboard then acquired the platform in April and closed it down for a “strategic assessment.” Parler was recently acquir﻿ed by Texas-based PDS Partners, the firm leading its rebirth.
  
  “Our primary goal with this relaunch is to return Parler to its original vision—a marketplace of ideas open to everyone,” Pierotti said.
