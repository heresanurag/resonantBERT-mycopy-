title: "Opinion: The surprising thing that helps you cope with change"
date: "2023-11-03"
section: "Opinion"
url: "https://www.cnn.com/2023/11/03/opinions/uncertainty-is-good-for-you-jackson/index.html"
content: |
  EDITOR’S NOTE:This essay is adapted from author Maggie Jackson’s most recent book, “Uncertain: The Wisdom and Wonder of Being Unsure,” to be published Nov. 7 by Prometheus Books. The opinions expressed in this commentary are her own. Read more opinion atCNN.
  
  Like many people across the world, I got hooked on year-round ocean swimming during the pandemic. I learned which apps to check for wave height and wind velocity on the stretch of Rhode Island coast where I swim almost daily with a band of fellow devotees. We gained a sense of local currents and when to opt for the shelter of a nearby harbor.
  
  Yet for all of our accrued experience, each morning’s swim remains far more a bundle of questions than answers. How long can you last even with a wetsuit in a 38-degree January sea? Will the dawn fog lift or make the beach perilously invisible? In the midst of it all, we mostly just don’t know.
  
  And that uncertainty, I’ve come to realize, has been a major reason why these daunting, improvisational, joyful mornings have been so uplifting, not just for body but mind. With every stroke, I’m discovering the cognitive treasure in being unsure.
  
  Not-knowing as strength? That seems a contradiction in terms. It’s easy to feel as if we are drowning in unknowns, or what scientists callaleatoryuncertainty. Economic and geopolitical uncertainty has been slowlyrisingsince the 1990s, with sharp spikes in recent years, according to analyses by Stanford University economist Nicholas Bloom.
  
  Why linger in the indefinite in volatile times? Why in particular seekepistemicuncertainty, that uneasy sense of not-knowing that grips us when we confront anything murky or new? Today, sure-fire answers are what we usually seek.
  
  Yet now is the time when we can least afford to retreat into fortress certainty and miss out on the unsung opportunities for growth and wisdom offered by being unsure. My daily doses of not-knowing hint at what a new science of uncertainty is uncovering: This mindset is a path to curiosity, adaptability and resilience, the very cognitive skills needed in times of change.
  
  This mindset is a path to curiosity, adaptability and resilience.
  
  “Uncertainty shakes you out of your complacencyand makes you more attuned to new information,” says neuroscientist JosephKableof the University of Pennsylvania. “It plays a role in setting up the brain to learn.”
  
  How does uncertainty expand our cognitive horizons? Think of the unease you may feel on the first day of a new job or when you encounter surprise roadwork on your commute. When you experience something new, ambiguous, or unexpected, stress hormones and chemicals flood the brain. At that moment, a mismatch erupts between old expectations and new realities. Youdon’tknow, a state of mind linked tostresssymptoms such as dilated pupils, sweaty skin and higher cortisol. We are built to crave answers. Not-knowing unsettles us — and that is precisely why we benefit from this mindset.
  
  As we confront something new, powerful neurotransmitters such as norepinephrine boost the mind’sreceptivityto new data, fire up cognitive circuits that flexiblycontrol focusand prime brain regions to engage ininformation-sharing. Within milliseconds, the tripwire of not-knowing interrupts our current program of action, invoking cognitive systems needed to update a now-outmoded understanding of the world.
  
