  The arousal sparked by uncertainty puts us right where we should be in times of flux, at the raw edge of change. “You want to bemoststressed by the most unpredictable situations,” saysRobb Rutledgeof Yale University. “It means we’re in tune with the environment.”
  
  In other words, it pays to lean into uncertainty in times of change. In astudypublished in 2016, Rutledge and colleagues showed images of various rocks to volunteers and asked them to guess where snakes were hiding. The players could earn money by learning the game’s hidden patterns; speckled rocks might be safe this round, gray boulders a danger. But they couldn’t escape the stress of the game: They got a mild shock when a snake appeared, regardless of whether their prediction had been right. The play was most taxing when the rules changed. But during those periods of high uncertainty, some players rose to the occasion.
  
  It pays to lean into uncertainty in times of change.
  
  People whose stress levels were most attuned to the game’s fluctuating levels of uncertainty made the most accurate predictions. In essence, they recognized the essential dynamism of life. By clinging to a belief that a situation is stable when it isnot, weare less likely to pick up on shifting realities,studiesshow. Thebest players, in contrast, mustered the sweat equity needed to wake up to times when the world was inviting them to learn. Norepinephrine is amarkerof cognitive effort.
  
  This is one reason why chief executives who areambivalent in a crisistend to be more resourceful than the ultra-decisive leaders we so often admire, research shows. By embracing the challenge of uncertainty, we become alive to possibilities.
  
  And thus, we are more likely to be curious. One of the key elements of a curious disposition is being willing to explore new, mysterious or complex situations, despite their unsettling nature, according tostudiesled byTodd Kashdanof George Mason University. “Curious people try a lot of things and they do feel uncomfortable doing so, but that’s not stopping them from doing it,” says PaulSilviaof the University of North Carolina-Greensboro. Atwork,people high in this facet of curiosity are more likely to voice dissent, seek challenges and be engaged.
  
  Intriguingly, this capacity for pushing into the discomfiting unknown also is the facet of the curious personality most correlated with measures ofwell-being, including positive emotions. Echoing this link, young adults who before the pandemic scored higher on a measure called “intolerance of uncertainty” struggled more mentally during the peak scourge than peers who viewed the challenge of uncertainty as less inherently problematic, according toresearchled by Stephanie Gorka of Ohio State University.
  
  It may seem surprising that people who can cope with and are even drawn to disquieting not-knowing take such delight in life. But it is our capacity to be open to times of ease and disquiet alike that buoys body and mind. By treating opaque surprises and broken expectations as chances to learn, we can spend our days steeped in wonder, not fear.
  
  By treating opaque surprises and broken expectations as chances to learn, we can spend our days steeped in wonder, not fear.
  
  Today, however, we seem to be increasingly fearful of being even momentarily unsure. Hyper-checking smartphones that offer neat, instant answers may reduce“everyday exposures to uncertainty,”writes Nicholas Carleton of the University of Regina in Canada. Intolerance of uncertainty has risen in parallel with the use of smartphones and the internet, he found in ameta-analysisof data from 1999 to 2014.
  
  Meanwhile, leaders who briefly deliberate in public about a new, thorny problem are rated as lesscompetentthan executives who respond instantly. It is time to stop running from a mindset that is key to human flourishing. Uncertainty is not the problem that we take it to be, but rather a font of opportunity.
  
  One day, fellow swimmer Stephen Bird and I were approaching a sprawling offshore rock that we often like to encircle to end the morning’s adventure. The water was seething. It was hard to know what we would find on the other side of the rock, roughly 700 feet from shore and fully exposed to the roiling Atlantic.
  
  Pausing, Stephen looked back at me and summed up the edginess of the moment. “This is it,” he called over his shoulder. “There’s 2,000 miles of nothing out there — it’s scary and it’s great at the same time.”
  
  I knew what he meant. The rock symbolizes where our limits lie, for the edge of what we know. And each morning that’s just where we want to be — and what makes us stronger. “Let’s do it,” he urged. And off we went.
