  Israeli Prime Minister Benjamin Netanyahu [has said](https://www.cnn.com/middleeast/live-news/israel-hamas-war-gaza-news-11-04-23/h_cf4d5244a60cc0817f6f84c65adac1e8) his government opposes any temporary ceasefire in Gaza unless Hamas frees [all the hostages](https://www.cnn.com/2023/10/08/europe/israel-hostages-hamas-what-we-know-intl/index.html) it holds, adding that it will continue to block fuel from entering the strip. Netanyahu has however said he is open to short pauses taking place.
  
  Israel has accused Hamas of hoarding and diverting fuel. CNN cannot independently verify the amount of fuel in the enclave.
  
  Qatar, a US ally that maintains ties with Hamas, has been trying to mediate deals to free hostages, as well as evacuate foreign nationals from Gaza.
  
  Four hostages held by Hamas – two Israelis and two American-Israelis – have so far been freed through Qatari and Egyptian mediation.
  
  The Hamas attack raised concerns that the conflict could spread across the region, with the potential entry of Hezbollah from Lebanon as well as Israel’s arch enemy Iran.
  
  The US has warned regional players against getting pulled into the war, [calling on Iran and its proxies](https://www.cnn.com/2023/11/02/politics/us-intelligence-iran-proxies/index.html) not to escalate.
  
  The US military has [said that a guided missile](https://www.cnn.com/2023/11/05/politics/us-missile-submarine-middle-east) submarine has arrived [in the Middle East](https://www.cnn.com/2023/11/05/politics/us-missile-submarine-middle-east), a message of deterrence directed at regional adversaries. The Pentagon last month ordered a [second carrier strike group](https://www.cnn.com/2023/10/14/middleeast/us-aircraft-carrier-eisenhower-israel-gaza-intl-hnk-ml/index.html) to the eastern Mediterranean and sent Air Force fighter jets to the region.
  
  [Iran](https://www.cnn.com/2023/10/27/middleeast/iran-may-not-want-full-war-israel-mime-intl/index.html), which backs Hamas, has [denied involvement](https://www.youtube.com/watch?v=ukOe92anlFk) in the October 7 attack but has said that it morally supports the “anti-Israel resistance” – which includes Hamas, Hezbollah and other Iran-backed militias.
  
  On Israel’s northern border, Iran-backed Hezbollah has engaged in an exchange of fire since the Gaza war began. Those altercations have however been confined to the border areas.
  
  There have [also been skirmishes in Syria and Iraq](https://www.cnn.com/2023/10/27/middleeast/iran-may-not-want-full-war-israel-mime-intl/index.html), from which Iran-backed militias have launched multiple drone attacks on US forces. Yemen’s Iran-backed Houthis have attempted an aerial attack on Israel, which Israel’s military [said it thwarted](https://www.cnn.com/2023/11/01/middleeast/israel-says-it-thwarted-attacks-from-yemens-houthis-intl-hnk/index.html).
  
  [In a November 3 speech](https://www.cnn.com/middleeast/live-news/israel-hamas-war-gaza-news-11-03-23/h_159ef931dd83c8d040b0eaf4d7e8f64f), Hezbollah Secretary General Hassan Nasrallah said his “primary goal” was to achieve a ceasefire in Gaza, and said it was incumbent on the US to implement the cessation of hostilities. The speech appeared to show that Nasrallah’s immediate plans do not include broadening the conflict.
