  “It is spectacular to find structures that could be biogenic (produced by living organisms) at this unusual altitude,” saidPieter Visscher, a professor of marine sciences at the University of Connecticut who has extensively studied stromatolites, in an email. “A major issue with the discovery, whether biogenic or not, is that these are formed in the presence of oxygen (in the current atmosphere). Until 2.3 billion years ago, there was no oxygen.”
  
  While the stromatolites are in an environment containing oxygen, Hynek said hebelieves the layers farther down in the rock have little to no access to oxygen and are actively formed by microbes using anoxygenic photosynthesis. This would make the structures similar to the ones found on ancient Earth.
  
  Hynek spotted the system of lagoons through satellite imagery in April 2022 when he was studying another lagoon in northwestern Argentina that had smaller stromatolites with microbes that use anoxygenic photosynthesis.
  
  “We’re not sure if the microbes are actively participating in their growth (in the newly discovered stromatolites). We think they are. But we haven’t done the experiments yet to try to figure that part out,” said Hynek, who documented preliminary observations with microbiologist Maria Farías, cofounder of Punabio SA Environmental Consulting. “There’s a lot of work to be done. We just discovered them and hardly scratched the surface.”
  
  Hynek and Farías were slated to present their findings December 11 at the 2023 meeting of the American Geophysical Union in San Francisco, according to a news release.
  
  If the stromatolites are produced by microbes using anoxygenic photosynthesis, the discovery could provide insight on the possibility of life on ancient Mars, Hynek said.
  
  “We’ve identified more than 600ancient lakes on Mars; there may have even been an ocean. So, it was a lot more Earth-like early on,” he said. Hynek also said theminerals gypsum and halite, found in the stromatolites in Argentina, are also in salt deposits all over Mars.
  
