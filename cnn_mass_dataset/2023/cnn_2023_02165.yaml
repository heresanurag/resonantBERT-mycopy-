title: "Land of the lost: Hidden lagoon network found with living fossils similar to those from more than 3 billion years ago"
date: "2023-12-16"
section: "Americas"
url: "https://www.cnn.com/2023/12/16/americas/stromatolites-argentina-discovery-lagoons-ecosystem-scn/index.html"
content: |
  Sign up forCNN’s Wonder Theory science newsletter. Explore the universe with news on fascinating discoveries, scientific advancements and more.
  
  Scientists have discovered a previously hidden ecosystem with an expansive system of lagoons in the salt plainsof Puna de Atacama, an arid plateau in Argentina — with giant stromatolites that could provide a glimpse into the earliest life on Earth and possibly even on Mars, according to new research.
  
  Stromatolites arelayered rockscreated by the growth of blue-green algae, or cyanobacteria, through photosynthesis. The structures are considered to be one of the oldest ecosystems on Earth,according to NASA,representing the earliest fossil evidence for life on our planet from at least3½ billion years ago.
  
  “These are certainly akin to some of the earliest macrofossils on our planet, and in really a rare type of environment on modern Earth,” saidBrian Hynek, a professorin the department of geological sciences at the University of Colorado Boulder, who helped document the ecosystem. “They are a window into the distant past as to what life might have looked like 3½ billion years ago on our planet.”
  
  Ancient giant stromatolites used to be widespread in Earth’s Precambrian era, which encompasses the early time span of around4.6 billion to 541 million years ago, but now they are sparsely distributed around the world. The most well-developed areas are in the Bahamas and the Shark Bay area in Western Australia, according to the nonprofit conservation organizationBush Heritage Australia.
  
  Modern stromatolites are relatively small, Hynek said, whereas ancient stromatolites used to grow to 20 feet (6 meters) tall and 16 to 22 feet (5 to 7 meters) wide, he said. Beneath the waters of Puna de Atacama’s lagoons, the recently uncovered stromatolites are up to 15 feet (4.5 meters) wide and several feet high,according to a news releasefrom the University of Colorado Boulder.
  
  Stromatolites also tend to grow in alkaline conditions, but the Puna de Atacama’s system of lagoons are acidic. The stromatolites found today are almost all carbonate rocks (made of limestone), but these structures are mostly composed of the mineralsgypsum and halite(rock salt), Hynek said.
  
  It is unclear why the stromatolites are so large, Hynek said, but he speculated that the inland ecosystem sat undisturbed for a long period of time, which allowed them to grow unimpeded.
  
  Unlike modern stromatolites, ancient stromatolites grew in a period when the atmosphere lacked oxygen. In these conditions, the stromatolites’ microbes usedanoxygenic photosynthesis, which doesn’t require oxygen, to convert light energy into compounds that support living cells.
  
