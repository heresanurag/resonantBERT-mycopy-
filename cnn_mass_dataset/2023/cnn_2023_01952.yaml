  For Wegovy, patients are eligible if they have abody mass index, or BMI, at or over 27. Zepbound is approved for those with BMI of 30 or over. Individuals are to use the medicines together with lifestyle changes including increased exercise and careful diet.
  
  In general, I think it’s a good thing that there are new tools available for patients with obesity, whichincreases the riskof heart disease, diabetes, many forms of cancer and early death. There are potential side effects and risks associated with these drugs, as there are for virtually all medications. Individuals should weigh the risks and benefits, as well as discuss alternatives, with their physicians.
  
