title: "What you should know about the latest obesity medication approved by FDA"
date: "2023-11-14"
section: "Health"
url: "https://www.cnn.com/2023/11/14/health/obesity-diabetes-medication-semaglutide-tirzepatide-wellness/index.html"
content: |
  The US Food and Drug Administration approved the medicationZepboundlast week to treat chronic obesity. The injectable drug, made by the pharmaceutical company Eli Lilly, has the active ingredienttirzepatide, which had been approved in May 2022 to treat type 2 diabetes under the nameMounjaro.
  
  Tirzepatide joins a similar medication called semaglutide that was also initially developed for diabetes treatment under the name Ozempic and has since been approved to treat obesity under the name Wegovy. Studies on both have shown high effectiveness in treating diabetes and obesity.
  
  What is the difference between Zepbound and Wegovy? How do they work, and how well do they work? How long do they need to be used? What are the possible side effects? Should people consider more affordable versions of drugs that some internet pharmacies sell? And who should think about taking these drugs — and who shouldn’t?
  
  To learn more about these medications, I spoke with CNN wellness medical expert Dr. Leana Wen. Wen is an emergency physician and professor of health policy and management at the George Washington University Milken Institute School of Public Health. She previously served as Baltimore’s health commissioner.
  
  Dr. Leana Wen:Both are injection medications that are intended to be used once a week. They were both first approved to treat type 2 diabetes, andclinical trialsalso showed that they induced a significant amount of weight loss. Wegovy is already on the market, and Zepbound has just been approved by the FDA and is expected to be available later this year.
  
  Both are in the class of drugs known asGLP-1 agonists. That means they mimic the digestive hormone glucagon-like peptide 1, or GLP-1, that is released by intestines when we eat. GLP-1 stimulates insulin production, which reduces blood glucose levels. The hormone also suppresses appetite and promotes the sensation of being full.
  
  In addition to mimicking GLP-1, tirzepatide mimics another gut hormone calledgastric inhibitory polypeptide, or GIP, that scientists believe has a similar effect on the body as GLP-1.
  
  Wen:These medications both appear to work well. A March 2021 study on semaglutide, published inThe New England Journal of Medicine, showed that people who took the medication lost an average of 14.9% of their body weight in about a year, compared with 2.4% in the placebo group. A September 2022 study, published in the journalJAMA Network Open, found that mean weight loss after six months was about 27 pounds (12.3 kilograms).
  
  Tirzepatide also has excellent efficacy. A seminalJuly 2022 studyin The New England Journal of Medicine found that those taking a lower dose of tirzepatide achieved an average weight reduction of 16%, or 35.5 pounds (16 kilograms), in about a year. Those taking a higher dose had a 21.4% reduction in body weight, or 49 pounds (22 kilograms). These are much larger reductions compared with the results for those who took a placebo, which achieved an average reduction of 2.4% or 5.3 pounds (2.4 kilograms).
  
  Wen:The studies I mentioned were not done head-to-head, so I don’t think we can say that one medication works better than the other just yet. Like other medications, one may work better for some people compared with another.
  
  Wen:At the moment, the understanding is that tirzepatide and semaglutide need to be taken for a lifetime. If they are stopped, much of the weight loss is reversed.
  
  In a way, this is no different than treatment for other chronic diseases such as high blood pressure, high cholesterol and diabetes. Not all patients will be willing or able to take these GLP-1 drugs for many years, though, and it’s important that studies are done to better understand how to help individuals who want to wean off them.
  
  Wen:Yes, there is. Many people experience gastrointestinal issues, such as nausea, diarrhea, vomiting and constipation. In rare cases, the medications have been associated with pancreas, gallbladder and stomach problems. Because tirzepatide and semaglutide are relatively newer therapeutics, long-term side effects are not known.
  
