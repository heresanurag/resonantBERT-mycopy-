title: "Modern earthquakes in US could be aftershocks from quakes in the 1800s, scientists say"
date: "2023-12-04"
section: "World"
url: "https://www.cnn.com/2023/12/04/world/earthquake-century-old-aftershocks-us-scn?cid=external-feeds_iluminar_yahoo"
content: |
  Sign up forCNN’s Wonder Theory science newsletter. Explore the universe with news on fascinating discoveries, scientific advancements and more.
  
  After large earthquakes, there is an expectation thataftershockscould occur in the hours and days that follow, but aftershocks from some of the strongest earthquakes in recorded United States history may still be happening — nearly 200 years later, new research has found.
  
  Frequentaftershock activities stemming from a trio of quakes that occurred near the Missouri-Kentucky border between 1811 and 1812, and a separate earthquake in Charleston, South Carolina, in 1886, are likely continuing today, according to a study published recently in theJournal of Geophysical Research: Solid Earth.
  
  One of the regions researchers focused on, called the New Madrid seismic zone, encompasses present-day Memphis and the surrounding Mid-Mississippi River Valley area, and the other includes Charleston and the surrounding coastal plain. Seismic activity in these relatively stable regions of North America is not well understood, and its nature is debated among scientists, the study authors wrote.
  
  “You use the time, distance and the magnitude of event pairs, and try to find the link between two events — that’s the idea,” said lead study author Yuxuan Chen, geoscientist at Wuhan University in China, in a news release. “If the distance between a pair of earthquakes is closer than expected from background events, then one earthquake is likely the aftershock of the other.”
  
  Background events, also known as background seismicity, basically refers to the current rate of seismic activity that’s considered normal for a specific region.
  
