  “The new study considers the question from a different angle, considering how tightly clustered earthquakes are, and concluding that some of the events are ongoing aftershocks,” Hough said. “The question remains: ifNew Madrid earthquakes are aftershocks, why don’t they follow the rules that aftershocks are known to follow?”
  
  The big difficulty with confirming or denying the results of these studies or the long-lived aftershock more broadly is that among seismologists there is no universally agreed-upon definition on what an aftershock of an earthquake is, said John Ebel, a professor of geophysics at Boston College who was not involved in the latest study.
  
  “Every seismologist who studies such phenomena has no choice but to make assumptions about how to define foreshocks, mainshocks and aftershocks,” said Ebel, who is also a senior research scientist at Boston College’s Weston Observatory, in an email. “Thus, different seismologists will define foreshocks, mainshocks and aftershocks in somewhat different ways, and that makes comparing studies by different investigators subject to uncertainty and disagreement.”
  
  For Hough’s 2014 study, the researchers considered an aftershock sequence to be over when the rate of earthquakes fell below the rate before the main shock. Aftershocks might still be continuing, but once the normal seismic rate for the area returns, she said, you can no longer identify them as aftershocks.
  
  In areas of frequent seismic activity such asCalifornia, the aftershocks of a large earthquake last less than a decade, Ebel said. He addedthis is particularly the case for earthquakes of magnitude 6.5 or greater that have occurred in the past 50 years or so.
  
  “Even more to the point, there are no earthquakes that any seismologist would call aftershocks that are currently taking place on the San Andreas Fault in Southern California which last had a big earthquake in 1857 or on the San Andreas Fault in Northern California where the last big earthquake was in 1906,” Ebel told CNN. “The San Andreas and other faults in California seem to be behaving differently with respect to aftershocks than are the faults in central and eastern North America.”
  
  However, locations away from plate boundaries, such as in Central or Eastern North America, the rate of background earthquakes is very low.Other studieshave also speculated that aftershocks in areas away from plate boundaries could last many centuries. The new study just applies another statistical method to reach a similar conclusion, according to Ebel.
  
