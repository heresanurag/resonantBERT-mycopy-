title: "Saudi Arabia’s oil production cuts have tipped its economy into reverse"
date: "2023-11-03"
section: "Economy"
url: "https://www.cnn.com/2023/11/03/economy/saudi-arabia-economy-oil-shrinks?cid=external-feeds_iluminar_yahoo"
content: |
  Saudi Arabia’s economyhas jolted into reverse, after the world’s largest crude oil exporterslashed output to prop up prices.
  
  Saudi gross domestic product, the broadest measure of its economy, shrunk 4.5% year-over-year in the third quarter of 2023, the country’s official statistics agency said this week. That’s the largest contraction since the Covid-19 pandemic in 2020. The slump would have been even greater if not for growth of 3.6% in non-oil activities.
  
  The country’s vast oil sector had been shrinking for months but the overall economy still managed growth of 1.2% year-on-year in the secondquarter.
  
  The kingdom’s oil sector contracted by 17.3% year-on-year in the third quarter — the most on record for any quarter since at least 2011 — because of thevoluntary oil production cuts, aimed at shoring up global prices.
  
  Saudi oil production tonine million barrelsper day in July as the biggest player in the OPEC+ alliance joined forces with Russia to restrict supply amid signs of weakening demand because of a slowing global economy.
  
  “We expect [oil] production to remain low until the end of this year, with a slow unwind in early 2024,” Oxford Economics analysts wrote in a note published Friday.
  
  The International Monetary Fund predicts the kingdom’sGDP will growjust 0.8% for all of 2023, down from 8.7% last year.
  
  Saudi Arabia’s oil cuts were aimed at stabilizing global oil markets, according to Ralf Wiegert, Economics Director for the Middle East and North Africa at S&P Global Market Intelligence.
  
  “In the second quarter [of] 2023, risks of a global growth slowdown were weighing on oil markets,” Wiegert said. “The Saudi leadership decided to take some supply out of the market to account for those recessionary risks to oil demand.”
  
  Phasing out production cuts will largely dictate the Saudi economy’s ability to bounce back, Wiegert said, with cuts expected to end in 2025.Saudi growth would remain sluggish at 1.1% in 2024, he added.
  
  While other Gulf states have also come under economic pressure from cuts to oil production, the United Arab Emirates economy has continued to grow.
  
  The country’s economy minister said this week that GDP in the UAE grew 3.7% in the first half of the year, helped by growth in the non-oil sector.
  
  Non-oil revenues are growing at the fastest rate in four years, according to new PMI numbers from S&P.
