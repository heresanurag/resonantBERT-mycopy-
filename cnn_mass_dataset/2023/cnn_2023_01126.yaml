  Just before getting Covid, I’d read an important studyof nearly 45,000 patients 50 and older treated for Covid between January and July 2022 at Mass General Brigham, a large Massachusetts health system. Twenty-eight percent of the patients were prescribed Paxlovid, which had received an emergency use authorization for mild to moderate Covid from the FDA in December 2021; 72% were not. All were outpatients.
  
  Unlike in other studies, most of the patients in this one had been vaccinated. Still, Paxlovid conferred a notable advantage: Those who took it were 44% less likely to be hospitalized with severe Covid-related illnesses or die. Among those who’d gotten fewer than three vaccine doses, those risks were reduced by 81%.
  
  A few months earlier,a studyout of Israel had confirmed the efficacy of Paxlovid — the brand name for a combination of nirmatrelvir and ritonavir — in seniors infected with Covid’s omicron strain, which arose in late 2021. (The original study establishing Paxlovid’s effectiveness had been conducted while the delta strain was prevalent and included only unvaccinated patients.) In patients 65 and older, most of whom had been vaccinated or previously had Covid, hospitalizations were reduced by 73% and deaths by 79%.
  
  Still, several factors have obstructed Paxlovid’s use among older adults, including doctors’ concerns about drug interactions and patients’ concerns about possible “rebound” infections and side effects.
  
