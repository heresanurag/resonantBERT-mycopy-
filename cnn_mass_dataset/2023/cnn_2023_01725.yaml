  The Baltics have also become home to tens of thousands of Ukrainian refugees, who nervously watch developments back home — and in the US. Galina Domenikovska, 53, sells almonds at a street stand in Tallinn. When I told her I come from the US, she glanced toward the heavens and put her hands together. “Best, wonderful country,” she told me in broken English. She typed a message into her phone and translated it,thanking Americansfor supporting Ukraine. Then typedanother for President Joe Biden, wishing him health and long life.
  
  When I asked her about former President Donald Trump, she winced, and told me she is afraid he will come back to office.
  
  Russia’s full-scale invasion of Ukraine has reawakened old fears and breathed new life into the commitment for self-determination in a region that thought it had already won those battles and put away history’s ghosts.
  
  Genuine normalcy, a permanent sense of safety, Russia’s neighbors have discovered, will have to wait until peace returns to a secure Ukraine.
