title: "Bryan Tanaka confirms ‘amicable separation’ after seven years with Mariah Carey"
date: "2023-12-27"
section: "Entertainment"
url: "https://www.cnn.com/2023/12/27/entertainment/mariah-carey-bryan-tanaka-split?cid=external-feeds_iluminar_cnn-brasil"
content: |
  All Mariah Carey wanted for Christmas this year, apparently, did not include Bryan Tanaka.
  
  On Tuesday, Tanaka, a dancer and creative director, shared on social media that he and the superstar singer have parted ways after seven years.
  
  “With mixed emotions, I share this personal update regarding my amicable separation from Mariah Carey after seven extraordinary years together,” Tanaka wrotein a statement posted on his verified Instagram account.“Our decision to embark on different paths is mutual, and as we navigate these separate journeys, we do so with profound respect and an overwhelming sense of gratitude for the invaluable time we’ve shared. The memories we’ve created and the artistic collaborations are etched in my heart forever.”
  
  The 40-year-old is a former backup dancer who was part of Carey’s “The Adventures of Mimi Tour” in 2006. They reportedly started dating in 2016,had a brief split the following year, and then they later reunited.
  
  Tanaka had kind words for Carey in his statement.
  
  “Mariah’s dedication to her family and her commitment to her craft have inspired us during our shared journey,” he wrote. “I want to express my love and appreciation for Mariah and her incredible children, whose warmth and kindness have enriched my life in ways words cannot capture.”
  
  Tanaka also asked for “understanding, privacy, and respect” during this “sensitive” time.
  
  “The outpouring of love and support from fans has been a beacon of strength, and I am extremely grateful for the encouragement that continues to uplift me,” he wrote. “I eagerly anticipate continuing my journey, knowing my passion for inspiration, dance, and the creative arts will resonate in the unfolding chapters.”
  
  Tanaka’s relationship with Carey was part of her 2016 reality series, “Mariah’s World”
