title: "Tim McGraw says he knew Taylor Swift was unstoppable"
date: "2023-08-17"
section: "Entertainment"
url: "https://www.cnn.com/2023/08/17/entertainment/tim-mcgraw-taylor-swift-music"
content: |
  Tim McGrawsayshe knew Taylor Swift was a rare talent from her start.
  
  The country singertoldET Canada that he spent a lot of time with Swift as she was beginning her career because the “Cruel Summer” singer opened for him and his wife Faith Hill on tour in 2007.
  
  “We knew early on, when she was opening for Faith and I on our ‘Soul2Soul’ tour, just her and an acoustic guitar, and spending time with her,” McGraw said. “Faith and I both knew that there was no stopping her.”
  
  He added, “She’s a special talent.”
  
  Swift is a fan of McGraw’s too. Her first single off her 2006 debut album was called “Tim McGraw.” The two also released the single “Highway Don’t Care” in 2013.
  
  In July, Swift’s Era’s tour stop inSeattlecaused seismic activity equivalent of a 2.3 magnitude earthquake.
  
  Earlier this month, Swiftgaveeach member of her crew members and tour truck drivers a $100,000 bonus.
