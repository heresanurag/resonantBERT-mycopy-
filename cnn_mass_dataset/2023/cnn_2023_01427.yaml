  Although the Fed does not set the interest rates that borrowers pay on mortgages directly, its actions influence them.
  
  Mortgage rates tend to track the yield on 10-year US Treasuries, which move based on a combination of anticipation about the Fed actions, what the Fed actually does and investors’ reactions.
  
  When Treasury yields go up, so do mortgage rates; when they go down, mortgage rates tend to follow.
  
  On Wednesday the Treasury Department also announced that it will slow the pace of its longer-dated 10-year and 30-year bond issuance.
  
  “However, longer-term debt issuance will continue to climb, which keeps upward pressure on mortgage rates,” said Jones.
  
  With average rates over 7% since mid-August, applications for mortgages have been trending down. They declined for the third consecutive week as low inventory and high rates continued to stifle borrower demand, according to the Mortgage Bankers Association.
  
  Rates are expected to stay elevated until it becomes clear the Fed is done hiking rates, according to MBA.
  
