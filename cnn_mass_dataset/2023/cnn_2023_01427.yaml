  “We were pleased to see that the Fed held short-term rates steady yesterday and continue to believe that it should not hike again and not sell its holdings of mortgage-backed securities until and unless the housing finance market has stabilized,” said Bob Broeksmit, MBA president and CEO. “These actions would help to lower mortgage rates and improve homebuyer affordability heading into 2024.”
  
  Mortgage rates should stay stable in the next few months, said Jones, since another two-day monetary policy meeting is not scheduled until December. That should give homebuyers a small bit of comfort, she says.
  
  “Today’s buyers face scarce for-sale inventory, still-high listing prices, and multi-decade high mortgage rates, so any potential relief from climbing housing costs is welcomed,” Jones said.
