title: "Nurse faces additional charges after admitting she tried to kill 19 other patients, Pennsylvania AG says"
date: "2023-11-03"
section: "US"
url: "https://www.cnn.com/2023/11/03/us/nurse-heather-pressdee-patient-deaths-pennsylvania/index.html"
content: |
  A Pennsylvania nurse is facing additional charges after prosecutors say she admitted to trying to kill 19 patients in her care, according to the state’s attorney general.
  
  Heather Pressdee, 41, was already facing charges after Pennsylvania’s Attorney General Michelle Henry said the registered nurse from Natrona Heights confessed to intentionally administering a lethal dose of medication to three patients at the Quality Life Services nursing facility in Chicora, a borough in western Pennsylvania. She was charged in May with homicide and attempted murder after two men, ages 55 and 83, died and a third was hospitalized, Henry said in anews release.
  
  On Thursday, Henry’s office filed additional charges related to the mistreatment of 19 other patients Pressdee treated between 2020 and 2023 at five different care facilities, Henry said in anews release.The new charges include two counts of first-degree murder, 17 counts of attempted murder and 19 counts of neglect of a care-dependent person, according to the release.
  
  In total, 17 patients who were being cared for by Pressdee died, Henry’s office said.
  
