title: "NAACP Image Awards 2023: See the complete list of winners"
date: "2023-02-25"
section: "Entertainment"
url: "https://www.cnn.com/2023/02/25/entertainment/naacp-image-award-winners-list/index.html"
content: |
  The ceremony for the54th NAACP Image Awardstook place Saturday.
  
  The event recognizes achievement in the arts, entertainment and culture by people of color in more than80 categories. Quinta Brunson, Viola Davis, Will Smith and Angela Bassett, who won Entertainer of the Year, were among those honored.
  
  A list of nominees in several film and television categories follows below. Winners are indicted in bold.
  
