title: "Start your week smart: Spy balloon, Ukraine, Chile, Pervez Musharraf, LeBron James"
date: "2023-02-05"
section: "US"
url: "https://www.cnn.com/2023/02/05/us/five-things-february-5-trnd"
content: |
  It’s been nearly three years since much of the USshut downdue to Covid-19 and people started working from home in their pajamas or wearing the same pair of jeans for days on end. But now that thejob market is boomingand workers are returning to the office, is it time to start washing your clothes more often after you’ve worn them all day long?The answer might surprise you.
  
  Here’s what else you need to know toStart Your Week Smart.
  
  • US military fighter jets shot down thesuspected Chinese spy balloonover the Atlantic Ocean off the Eastern Seaboard of the US on Saturday.
  
  • Nearly half a million people in Odesa were left without power Saturday after an accident at a substation damaged byprevious Russian attacks, Ukrainian officials said.
  
  • At least 22 people have died in connection withwidespread forest firesin south-central Chile, according to government officials.
  
  • Pakistan’s former President General Pervez Musharraf has died in Dubai after a prolonged illness, according to a statement from the Pakistani military.He was 79 years old.
  
  • LeBron James is closing in on history as he is now just 36 points away from breaking theNBA all-time scoring record.
  
  Florida lawmakers will return to the state Capitol to finalize their efforts tostrip the Walt Disney Company of its special governing powers, the latest round in a feud between Republican Gov. Ron DeSantis and the entertainment giant. House and Senate leaders informed lawmakers late last week that the legislature will hold a special session starting Monday that will include changes to theReedy Creek Improvement District, the elected board that effectively gives Disney control over the land in and around its central Florida theme parks.
  
  President Joe Biden will deliver theState of the Union address to Congress. The annual address will provide Biden with a chance to highlight key priorities and agenda items. This year’s State of the Union will take place with Republicans newly in control of the House, a position of power the GOP is using to launch congressional oversight investigations aimed at the Biden administration. It also comes as the president faces heightened scrutiny over the handling of classified documents after his time as vice president.
  
  Following Biden’s speech, Arkansas Gov. and former Trump White House press secretary Sarah Huckabee Sanders willdeliver the Republican response.
  
  Google plans tolivestream an eventthat will showcase a “reimagining” of how people search for, explore and interact with information. Details are scant, but many in the tech world are expecting the event to focus on artificial intelligence and a possible competitor toAI chatbot ChatGPT.
  
  Twitter willcut off free accessto its API – which lets third parties access many types of Twitter data for their own applications and research – in favor of a new “paid basic tier.”What that meansto the average Twitter user is that a lot of popular accounts that run automatically and tweet jokes or pictures ofpossumsorfoxeswill grind to a halt.
  
  February 10 is the kickoff ofNew York Fashion Week, which will feature more than 70 runway shows from the industry’s top brands.
  
  The 2023Chicago Auto Showopens to the public.
  
  One Thing: What the Nichols video truly reveals
  
  Check out more imagesfrom the week that was, curated by CNN Photos.
  
  The 65th annual Grammy Awards,hosted by Trevor Noah, air live from Los Angeles tonight at 8 p.m. ET on CBS. Beyoncé leads the pack with nine nods forher album “Renaissance,”while Kendrick Lamar scored eight nominations, and Adele and Brandi Carlile each have seven. Scheduled performers include Bad Bunny, Mary J. Blige, Brandi Carlile, Luke Combs, Steve Lacy, Lizzo, Kim Petras and Sam Smith.
  
  And tonight at 9 p.m. ET is the premiere of the CNN Film“American Pain,”a documentary that traces the rise and fall ofAmerica’s most prolific opioid kingpins.
  
  Channing Tatum returns to the silver screen as Mike Lane, the stripper with a heart of gold, in“Magic Mike’s Last Dance.”The third and allegedly final installment of the “Magic Mike” trilogy,which also stars Salma Hayek Pinault, is being released Friday by Warner Bros. (CNN and Warner Bros. are both part of the same parent company, Warner Bros. Discovery.)
  
  Are you ready for the big game? No, notthat big game– the big flag football game also known as thePro Bowl! Yes, you read that right … the NFL announced last fall that it will replace its annual exhibition match with a week-long skills competition that culminates in an AFC vs. NFC flag football game later today. Why flag football? Simply put, previous Pro Bowls have been contested at less than full speed by playersunwilling to risk a potential injuryin an exhibition game that garners mediocre ratings at best.
  
  Take CNN’s weekly news quiz hereto see how much you remember from the week that was! So far, 42% of fellow quiz fans have gotten eight or more questions right. How will you fare?
  
