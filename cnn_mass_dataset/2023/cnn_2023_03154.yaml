title: "Man found guilty in 2021 Garland shooting that left 3 teens dead. But his teen son, the suspected gunman, remains at large"
date: "2023-02-12"
section: "US"
url: "https://www.cnn.com/2023/02/12/us/garland-triple-homicide-father-charged-capital-murder"
content: |
  The man accused of serving as a getaway driver for his teenage son, who allegedlykilled three other teens and wounded another at a Texas convenience storein 2021, has been convicted of capital murder in connection with the three deaths.
  
  Richard Acosta Jr. was found guilty Friday and “automatically sentenced to life in prison without the possibility of parole,” for the deaths of Xavier Gonzalez, 14, Ivan Noyala, 16, and Rafael Garcia, 17, theDallas County District Attorney’s Office saidin a statement.
  
  Authorities said Acosta Jr. “was seen driving” a Dodge Ram with his son to a convenience store on the night of the shooting and was then seen “fleeing” afterward.
  
  But Acosta’s teenage son, who is suspected of gunning down the victims, is nowhere to be found.
  
  Garland police said Acosta’s sonAbel Elias Acosta, who was 14 at the time, shot four teenagers, killing three and wounding the fourth, on December 26, 2021.
  
  Abel Acosta remains at large.
  
  Police say a 14-year-old is a suspect in a Texas convenience store shooting that left 3 dead
  
  “We are only halfway to justice,”Garland police said. “The search continues. We will not stop until Abel Acosta is captured.”
  
  It’s unusual for authorities to release juvenile information related to crimes, “but due to the nature of the offense and potential risk to the public, the court has authorized the release of his information,”Garland police saidin 2021.
  
  A$10,000 reward has been offeredfor tips leading to Abel Acosta’s capture.
  
  “This shooting appears to be in retaliation from a previous disturbance, and was believed to be a targeted attack on one or more of the persons inside the store,”Garland policesaid in 2021.
  
  Police showed video of a person wearing shorts but no shirt opening the door to the store and shooting.
  
  “The gun used in this incident was a 40-caliber pistol. It had an extended magazine,” Garland Police Chief Jeff Bryan said. “We know he fired at least 20 rounds because we found the shell casings.”
