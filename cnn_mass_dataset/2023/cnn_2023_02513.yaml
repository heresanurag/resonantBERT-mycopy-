title: "Mega Millions draws numbers for nearly $1 billion jackpot Friday"
date: "2023-01-06"
section: "US"
url: "https://www.cnn.com/2023/01/06/us/mega-millions-jackpot?cid=external-feeds_iluminar_msn"
content: |
  The Mega Millions drew numbers Friday for a nearly $1 billion jackpot after Tuesday’s drawing yielded no winners.
  
  Numbers drawn Friday were 3, 20, 46, 59, 63 and the gold Mega Ball 13.
  
  We're not saying you shouldn't play, but here are 5 things more likely to happen than you winning
  
  The jackpot is estimated at $940 million ($483.5 million cash), according to thelottery.
  
  Friday’s drawing follows the third-largest jackpot in July. In September, two people – who agreed to split the prize – came forward to claim the $1.34 billion prize, the Illinois Lottery said.
  
  “In more than 20 years since the game began in 2002, there have been just three larger jackpots than Friday’s estimated prize,” the Mega Millions said in anews release.
  
  Tuesday’s drawing featured nearly 3 million winning tickets for prizes ranging from $2 to up to $4 million,the lottery said. Six tickets matched the first five numbers, winning the lottery’s second-highest prize of $1 million each, the lottery said.
  
  The largest jackpot in history was$1.537 billionin 2018.
  
  The last jackpot was won in October, and the number of winning tickets at all prize levels has been growing across the country, the lottery said.
