  The company also said new developer tools will allow companies to work alongside its large-language model. In ablog post, Amazon said it is already partnering with a handful of companies, such as BMW, to develop conversational in-car voice assistant capabilities.
  
  Rowan Curran, an analyst at Forrester Research, said the news marks a major step forward in bringing generative AI to the home and allowing it to accomplish everyday tasks. By connecting speech-to-text to external systems and byusing a large language model to understand and produce natural speech, this is “where we can begin to see the future of how we will use this technology near-ubiquitously in our everyday lives.”
  
  Some US users will get access to the changes through a free preview on existing Echo devices. Over the years, Alexa has been infused in countless Echo products, from its speaker and hub lineup to clocks, microwaves,and eyeglasses.
  
  Amazon also said it will be bringing generative AI to its Fire TV platform, allowing users to ask more natural, nuanced or open-ended questions about genres, storylines and scenes or make more targeted content suggestions.
  
  Alexa launched nearly a decade ago and, along with Apple’s Siri, Microsoft’sCortana, and other voice assistants,were promised to change the way people interacted with technology. But the viral success of ChatGPT has arguably accomplished some of those goals faster and across a wider range of everyday products.
  
  The effort to continue updating the technology that powers Alexa comes at a difficult moment for Amazon. Like other Big Tech companies, Amazon has slashed staff in recent months and shelved products in an urgent effort to cut costs amid broader economic uncertainty. The Alexa division did not escape unscathed.
  
  Amazon confirmed plans in January to lay off more than 18,000 employees. In March, the company said about 9,000 more jobs would be impacted. Limp previouslytoldCNN his division lost about 2,000 people, about half of which were from the Alexa team.
  
  Still, he emphasized innovation around Alexa has not stalled. “We’re not done and won’t be done until Alexa is as good or better than the ‘Star Trek’ computer,” Limp said. “And to be able to do that, it has to be conversational. It has to know all. It has to be the true source of knowledge for everything.”
