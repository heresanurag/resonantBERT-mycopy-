title: "Samsung flags 78% profit drop as chip demand remains weak"
date: "2023-10-11"
section: "Tech"
url: "https://www.cnn.com/2023/10/11/tech/samsung-earnings-guidance-q3-2023-intl-hnk/index.html"
content: |
  Samsung warned that operating profit in the third quarter likely plunged 78% as itcontinues to contendwith lower than usual demand for consumer devices.
  
  The South Korean tech giant releasedearnings estimatesWednesday, forecasting operating profit of about 2.4 trillion Korean won ($1.8 billion) for the three months ended September. That compares with 10.85 trillion won ($8 billion) in the same period last year.
  
  Revenue was also projected to drop 12.7% from a year ago.
  
  That continues a dreary run for the electronics maker, which has reported major losses in recent months as global economic uncertainty weighs on consumers around the world, leading many people to hold on to their cell phones and laptops longer.
  
  According toCounterpoint Research, “2023 is on track to be the worst year for global smartphone shipments in 10 years,” with shipments forecast to decline 6% to fewer than 1.2 billion units.
  
  In major markets like North America, “consumers are hesitant to upgrade their devices,” the firm noted in an August report.
  
  Samsung has already been feeling the effects. The firm’s operating profitplummeted 95%in the first quarter, following a record loss in its semiconductor business. It sawsimilar resultsin the second quarter.
  
  Samsung's newest foldable phone is still outrageously pricey
  
  After a historicsupply shortageduring Covid, the global semiconductor industry is now seeing a glut in some areas that has driven losses for Samsung, the world’s largest memory chip and smartphone maker.
  
  According to consultancy Bain, “the semiconductor industry’s post-pandemic rebound boosted capacity to the extent that some foresee an oversupply.”
  
  In areportlast month, Bain suggested the trend was merely cyclical, attributing it to “normal” ups and downs in the industry.
  
  Samsung has alsotoldshareholders it anticipates a gradual comeback in global demand in the second half of the year.
  
  This “should lead to an improvement in earnings driven by the component business,” it said in a July earnings statement.
  
  “However, continued macroeconomic risks could prove to be a challenge,” the company cautioned.
  
  Samsung flags massive drop in quarterly profit as chip glut drags on
  
  Analysts believe a downturn in memory chips will also turn around, benefiting manufacturers like Samsung.
  
  In a recent note to clients, Nomura analysts said they expected a recovery in the sector “to accelerate” through the rest of this year.
  
  “The team expects memory prices to remain flat or slightly increase in [the third quarter], then show strong growth in [the fourth quarter],” the analysts wrote, maintaining a buy rating on Samsung’s stock.
  
  The company’s shares climbed 3.5%in Seoul on Wednesday following its announcement.
