title: "Matthew Perry foundation established in his honor to help people with addiction"
date: "2023-11-03"
section: "Entertainment"
url: "https://www.cnn.com/2023/11/03/entertainment/matthew-perry-foundation-is-established-to-help-people-struggling-with-addiction?cid=external-feeds_iluminar_post-news"
content: |
  A foundation has been established in Matthew Perry’s name with the goal ofhelping people“struggling with the disease of addiction.”
  
  Following the actor’sdeathon Oct. 28, the foundation launched Friday and is accepting donations to help individuals dealing with addiction, according to a press release.
  
  “In the spirit of Matthew Perry’s enduring commitment to helping others struggling with the disease of addiction, we embark on a journey to honor his legacy by establishing the Matthew Perry Foundation, guided by his own words and experiences, and driven by his passion for making a difference in as many lives as possible,” a statement from he foundation reads.
  
  The organization is sponsored and maintained by public charity the National Philanthropic Trust.
  
  Perry, who played Chandler Bing on “Friends,” was open about his efforts to recover from drug and alcohol abuse throughout his life in his 2022 memoir, “Friends, Lovers and the Big Terrible Thing.”
  
  In aninterview last year,Perry said he hoped to be remembered most for his efforts helping others struggling with addiction.
  
