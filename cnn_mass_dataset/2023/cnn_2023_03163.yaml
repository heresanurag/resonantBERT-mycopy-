title: "Trader Joe’s recalls broccoli cheddar soup and falafel amid concerns over insects and rocks"
date: "2023-07-29"
section: "Business"
url: "https://www.cnn.com/2023/07/29/business/trader-joes-recall-broccoli-cheddar-soup-falafel/index.html"
content: |
  Trader Joe’s has issued two more recalls this week, one for a prepared soup and another for its falafel.
  
  The retailer said in a statement on Thursday that itsUnexpected Broccoli Cheddar Soup– with use-by dates of 07/18/23 through 09/15/23  – may contain insects.
  
  On Friday, Trader Joe’s announced that itsFully Cooked Falafelsold in 35 states and Washington, DC could contain rocks.
  
  The company added that all potentially contaminated products have been removed from the chain’s shelves, and officials urged customers to throw away any affected item or return it to any store for a full refund.
  
  This was the third recall announced by Trader Joe’s in the space of a week. Earlier this month,the company recalledsome of their Dark Chocolate Chunk and Almond Cookies, as well as their Almond Windmill Cookies because rocks may have inadvertently been among the ingredients.
