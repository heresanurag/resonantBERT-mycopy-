  One hostage – a female Israeli soldier – was rescued Mondayduring ground operations in Gaza, the IDF said.
  
  IDF spokesperson Lt. Col. Jonathan Conricus told CNN Tuesday the soldier, named as Private Ori Megidish, was “actively rescued” in a special operation “targeted in specifically getting her out.”
  
  “Based on intelligence” the Israeli special forces went into northern Gaza knowing her whereabouts and rescued her, Conricus said, adding that she is “well mentally and physically,” and reunited with her family.
  
  Meanwhile,Shani Louk, a 23-year-old German-Israeli woman who was abducted from the Nova music festival and taken to Gaza has been declared dead, Israel’s Foreign Ministry said Monday.
  
  A source involved with her identification told CNN Louk’s death was announced after forensic examiners found a bone fragment from her skull.
  
  Correction:An earlier version of this story misidentified Permanent Observer of Palestine to the United Nations Riyad Mansour
