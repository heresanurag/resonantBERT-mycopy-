  “From a scientific standpoint, it was a landmark event,” Eth said. “The Chowchilla work of Lenore Terr and then subsequent work by others has established child PTSD as legitimate and as a condition that calls for evaluation and treatment.”
  
  That improved understanding of trauma, Terr says, has also changed how we respond to crisis situations. After the school shootings in Columbine and Sandy Hook, for instance, mental health counselors were on the front lines to help survivors.
  
  “They paved the way for us to understand more contemporary things,” Terr said of the Chowchilla survivors in the film. “What happens when you force away children from parents at a border? What happens to children at some of these horrible school shootings?
  
  “The Chowchilla children are heroes,” she added. “And they continue to teach us what childhood trauma is … 50 years after the fact.”
