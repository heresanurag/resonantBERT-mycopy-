title: "Mars Wrigley fined after two workers fell into a tank of chocolate"
date: "2023-02-13"
section: "Business"
url: "https://www.cnn.com/2023/02/13/business/mars-wrigley-chocolate-vat-fine?fbclid=IwAR1y5okdoV6J7mwQf47SZUrkcmVJ6RHvq_HSOeCj-XjB3OE1VfUDqti3ETI&mibextid=q5o4bk"
content: |
  US regulators havefined Mars Wrigley, the maker of Snickers and Skittles, after two workersfell into a tank of chocolateat its Pennsylvania factory last June.
  
  The Occupational Safety and Health Administration fined the confectionery and chewing gum maker $14,500 for the incident, which it described as “serious” in areport.
  
  “Employees of an outside employer, I.K. Stoltzfus Service Corp., cleaned tanks, including the Dove chocolate batching 20 micron tank, owned by the onsite/host employer, Mars Wrigley,” the report said.
  
  Mars Wrigley failed to provide the contractors with adequate safety training, the document added.
  
  According toPenn Live, a local news site, firefighters rescued the workers by drilling a hole in the bottom of the tank and pulling them out. The chocolate was about waist-high, itreported.
  
  “The safety of our Associates and outside contractors are a top priority for our business,” a spokesperson for Mars Wrigley said in a statement. “As always, we appreciate OSHA’s collaborative approach to working with us to conduct the after-action review.”
