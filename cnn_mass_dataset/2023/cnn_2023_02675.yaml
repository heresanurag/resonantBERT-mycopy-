title: "McCarthy ally dares critics to push vote ousting speaker, blasts hardliners over possible shutdown"
date: "2023-09-23"
section: "Politics"
url: "https://www.cnn.com/2023/09/23/politics/garret-graves-oust-mccarthy-vote/index.html"
content: |
  Rep. Garret Graves, one ofHouse Speaker Kevin McCarthy’sclosest allies, told CNN that he’s fed up with conservative critics dangling thethreat of McCarthy’s ouster, saying that he’s prepared to put the debate to rest by forcing a vote on the threat.
  
  “I don’t think the speaker is even remotely concerned about some of the theatrics going on right now,” Graves told CNN’s Manu Raju. “As a matter of fact … I drafted a motion to vacate for the speaker as well. I’ve got it sitting on my desk right now. And I said, ‘Look, if you’re going to keep hanging this over (his) head and playing these games, let’s just do it now, let’s get it over with. Get your little games over with and then we’ll get back to the things that actually matter.’”
  
  When asked whether he would make such a move this week, Graves indicated it was possible: “Perhaps.”
  
  The Louisiana Republican also came down on the right-wing hardliners who havetanked GOP effortsto pass a stopgap funding billto provide more timeto finish the House’s appropriations bills for the next fiscal year.
  
  “It’s a huge concern that I have,” Graves said.
  
