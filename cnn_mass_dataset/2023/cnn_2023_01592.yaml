title: "Starfish bodies aren’t bodies at all, study finds"
date: "2023-11-02"
section: "World"
url: "https://www.cnn.com/2023/11/02/world/starfish-head-body-plan-scn?cid=external-feeds_iluminar_yahoo"
content: |
