title: "5 things to know for Oct. 13: Israel, House speaker, Covid-19, Medicare, TikTok"
date: "2023-10-13"
section: "US"
url: "https://www.cnn.com/2023/10/13/us/5-things-to-know-for-oct-13-israel-house-speaker-covid-19-medicare-tiktok?cid=external-feeds_iluminar_post-news"
content: |
  Protests are erupting around the world as supporters of both pro-Israeli and pro-Palestinian movementsgather outside embassies, government buildings and college campuses. In recent days, many of the world’s most recognizable landmarks have also been illuminated in the blue and white colors of Israel’s flag as a show of solidarity.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  Israel has called on all civilians in Gaza City to leave their homes and head south today ahead of a potential ground invasion in response toHamas’ terror attacksthat killed more than 1,300 people. The UN, however, said an order for the mass evacuation was “impossible” without major humanitarian consequences. Israel has amassed more than 300,000 reservists along its southern border for itspossible intensified military operation, but Hamas militants told Palestinians living in the besieged Gaza Strip not to leave their homes. Meanwhile, the Biden administration said it willbegin chartering flights todayfrom Israel to destinations in Europe, as officials scramble to get Americans stranded in the war-ravaged country back home to the US.
  
  Listen toCNN’s podcast “Tug of War”to hear from our reporters who are on the ground in Israel documenting the escalating conflict.
  
  House Republicans appear to be far from electing a new speaker after Majority Leader Steve Scalise abruptlywithdrew from the speaker’s raceThursday evening. Scalise announced he was dropping out after his GOP conference failed to coalesce behind him in the aftermath of Kevin McCarthy’s historic ouster. Republicans have now effectively frozen the chamber at a time when major international and domestic crises loom, from Israel’s war against Hamas to a potentialgovernment shutdown in November. Additionally, with no indication there is any viable candidate who could secure the 217 votes needed to win the Speaker role, questions are being raised abouthow long the standoff will lastand at what cost.
  
  More than 7 million Americans have received a dose of theupdated Covid-19 vaccinesince it became available in September, the Department of Health and Human Services said Thursday. The CDC recommended vaccines from Moderna and Pfizer/BioNTech foreveryone 6 months and olderon September 12. An updated vaccine from Novavax, which became available this month, is recommended forpeople 12 and over. In comparison, when last year’s bivalent Covid-19 booster was available, more than 18 million people had received a dose by October 12, 2022, about six weeks after the CDC signed off on it. The new Covid-19 vaccines have been updated to target currently circulating coronavirus variants.
  
  Medicare enrollees will spend around $10 more next year for theirmonthly Part B premiums, the Centers for Medicare and Medicaid Services announced Thursday. The standard monthly premium for Medicare Part B will be $174.70 for 2024, up from $164.90 this year. The premium increase means that retirees will see a monthly bump of less than $50, on average, in theirSocial Security benefits next year. This comes as many seniors are concerned about their personal finances, analysts say. Inflation has caused Social Security payments to lose 36% of their buying power since 2000, according to a study released earlier this year by The Senior Citizens League. Monthly benefits would have to increase by $517 to maintain the same level of buying power as in 2000.
  
  EU officials issued awarning to TikTokon Thursday about “illegal content and disinformation” on its platform linked to the war between Israel and Hamas. The EU called for TikTok CEO Shou Zi Chew to respond within 24 hours and warned that failure to comply with its laws around content moderation could result in penalties. Also on Thursday, a federal judge ripped intoMontana’s statewide TikTok ban, saying in a hearing that the legislation appears driven by “paternalistic” views. Montana became the first state to authorize a complete ban on TikTok in May, prompting an immediate legal challenge. This ongoing court battle is being closely watched because it is viewed as a bellwether for TikTok’s future in the rest of the US.
  
