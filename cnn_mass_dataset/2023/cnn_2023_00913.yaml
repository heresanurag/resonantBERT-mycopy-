  Rudolph Isley, one of the founding members of the R&B group The Isley Brothers, has died, his family announced.He was 84. Though the band’s membership evolved through the years, The Isley Brothers had enduring success with songs like “Love The One You’re With” and “Testify.”
  
  700That’s around how many entertainment industry professionals havesigned an open lettervoicing their support for Israel and condemning Hamas as fighting continues in the Middle East. Gal Gadot, Amy Schumer, Mayim Bialik and Jerry Seinfeld were among those who signed the letter expressing their condolences to “all those experiencing unfathomable levels of fear and violence.”
  
  “Hopefully today’s verdict can be a sign for healing.”
  
  —Colorado Attorney General Phil Weiser, issuing a statement after one Colorado police officer whoarrested Elijah McClainwas convicted of criminally negligent homicide. The other officer was acquitted. Elijah McClain, an unarmed 23-year-old Black man, died after he was subdued by police and injected with ketamine by paramedics in 2019.
  
