title: "Climate advocates are rallying against the Willow Project. The White House is eyeing concessions to soften the blow"
date: "2023-03-02"
section: "Politics"
url: "https://www.cnn.com/2023/03/02/politics/willow-project-petition-concessions-biden-climate/index.html"
content: |
  With just days to go until theBiden administration is set to a releasea decision on the first major oil drilling project of its tenure, the White House has indicated it may reduce the scope of the controversial project that has drawn fierce criticism from climate advocates.
  
  The Willow Project, proposed by ConocoPhillips, is a massive and decades-long oil drilling venture on Alaska’s North Slope that the state’s lawmakers say will create jobs and boost domestic energy production. Its supporters say Willow could be a much-needed new source of revenue for the region.
  
  But environmental groups have remained staunchly opposed to it, fearing the effect of the planet-warming carbon pollution from the hundreds of millions of barrels of oil it would produce. Young voters have rallied on social media against the proposal with the hashtag #StopWillow in posts that have amassed tens of millions of views. Apetition to “say no the willow project”on Change.org has more than 1.6 million signatures and continues to grow.
  
  They say the approval of Willow will deal a significant blow to President Joe Biden’s climate credibility after he pledged in his campaign toend new oil drillingon federal land.
  
  By the administration’s own estimates, the project would generate enough oil to release 9.2 million metric tons of planet-warming carbon pollution a year – equivalent to adding 2 million gas-powered cars to the roads. Over the course of 30 years, climate groups have estimated it would release around 278 million metric tons of carbon pollution, which is more than what 70coal-fired power plantscould produce every year.
  
