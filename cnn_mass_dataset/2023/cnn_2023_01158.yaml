title: "Rwanda accused of ‘act of war’ as DRC fighter jet is hit mid-air"
date: "2023-01-25"
section: "Africa"
url: "https://www.cnn.com/2023/01/25/africa/drc-rwanda-govt-tensions-intl/index.html"
content: |
  The Democratic Republic of Congo (DRC) on Tuesday denounced Rwanda’s accusation that a Congolese fighter jet violated Rwandan airspace, alleging the aircraft was attacked by Rwandan forces in a “deliberate act of aggression that amounts to an act of war.”
  
  Rwanda’s government communications office released astatementon Twitter Tuesday which said: “Today at 5:03 pm, a Sukhoi-25 from DR Congo violated Rwanda airspace for the third time. Defensive measures were taken. Rwanda asks the DRC to stop this aggression.”
  
  The Congolese government later issued astatementdisputing Kigali’s version of events, alleging the jet was “attacked while it was beginning its landing on the runway of Goma’s international airport.”
  
