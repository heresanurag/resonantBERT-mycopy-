title: "European regulators warn of fake Ozempic pens found at wholesalers in EU, UK amid shortage"
date: "2023-10-18"
section: "Health"
url: "https://www.cnn.com/2023/10/18/health/fake-ozempic-european-regulators/index.html"
content: |
  Fake versions of the popular diabetes medicine Ozempic have been found at wholesalers in the European Union and United Kingdom, the European Medicines Agency warned Wednesday, prompting an alert to patients to check their medicines carefully.
  
  Ozempic, Wegovy maker begins legal proceedings against certain med spas, clinics, compounding pharmacies
  
  There’s no evidence fake Ozempic pens have been dispensed to patients from legal pharmacies and no indication any patients have been harmed, the EMA said in astatement. The fake pens were caught because they were packaged with real serial numbers that were flagged as inactive when the packs were scanned.
  
  “Check the patient information leaflet for Ozempic to see what the genuine Ozempic pens should look like,” the EMA said in its warning for patients. “You must not use Ozempic pens that you suspect are falsified as this may lead to serious health consequences.”
  
  Anexampleof a fake pen posted by German regulators showed several differences from the real product, including different colors, lack of visible Ozempic branding, and additional numbering printed on the fake version. The regulators warned that “it cannot be ruled out that the counterfeit is being sold in Germany.”
  
