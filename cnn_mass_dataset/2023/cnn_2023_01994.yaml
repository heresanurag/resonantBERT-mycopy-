id: cnn_2023_01994
title: "CNN announces sweeping new lineup ahead of 2024 election"
date: "2023-08-14"
section: "Media"
url: "https://www.cnn.com/2023/08/14/media/cnn-prime-time-lineup/index.html"
content: |
  The dramatic changes, which inject an added boost of diversity to the programming slate and will roll out in the coming weeks, are some of the most wide-ranging in the cable news landscape in years and represent a new chapter for CNN. The network has been aiming to reverse its fortunes after a tumultuous run under former chief executive Chris Licht, who was fired earlier this year after only a little more than a year on the job.
  
  In the morning hours, CNN named Phil Mattingly, who currently serves as its chief White House correspondent, as the co-anchor of “CNN This Morning” alongside Poppy Harlow. Harlow had been without permanent co-hosts since Collins departed for prime time and Don Lemon was fired in April.
  
  Later in the day, CNN added a new 3 p.m. ET show anchored by Pamela Brown, its chief investigative correspondent, slashing an hour off of the afternoon edition of “CNN News Central” to make room for the program.
  
  Mainstay anchors Jake Tapper, Wolf Blitzer, Erin Burnett, and Anderson Cooper will continue hosting their current time slots.
  
  On Sundays, Manu Raju, chief congressional correspondent, will take over for Phillip as host of “Inside Politics Sunday.” Alisyn Camerota, who anchored a temporary program in prime time after a long run in the mornings and afternoons, will focus on reporting for CNN’s long-form unit.
  
  The dramatic changes are some of the most wide-ranging in the cable news landscape in years and represent a new chapter for CNN, which has been aiming to reverse its fortunes after a rocky run under former chief executive Chris Licht.
  
  Licht, who was fired earlier this year after a little more than a year on the job, never committed to a consistent prime time lineup and left CNN’s overall slate of programming in an unsettled state. That contributed to a decline in staff morale and left a major opening for its rival MSNBC, which surpassed CNN in the ratings, including in the key advertiser-coveted 25-54 demographic.
  
  “One of CNN’s key differentiators is our deep roster of experienced journalists, reporters and storytellers,” CNN’s four-person leadership team said in a statement. “Many joined CNN early in their careers and have grown with the network throughout the years.”
  
  The leadership team described the group of hosts as “extraordinarily talented” and said they “share the same CNN sensibility: versatility, determination and an inquisitive and empathetic approach to reporting the news.”
  
  “By expanding the range and depth of our programming lineup across multiple dayparts, we are strengthening our reporting excellence throughout the schedule, elevating our ability to tell great stories across platforms, and doubling down on CNN’s position as the most trusted name in news,” they said.
