  In-N-Out didn’t immediately respond to CNN’s request for comment. However, the memo said that its new policies are in “compliance with evolving health guidelines.” The Occupational Safety and Health Administration recommends employeeswear masks, however.
  
  The changes come a few months after President Joe Bidenended the Covid national emergency,which had enabled the government to provide many Americans with tests, treatments and vaccines at no charge. Although statewide mask mandates have disappeared,health experts recommendthat vulnerable individuals might still want to wear masks in crowded indoor spaces, such as restaurants.
  
  It’s not the first time In-N-Out has gone against Covid rules. In 2021, its locations in Contra Costa county (near San Francisco) temporarily closed because it didn’t want to verify customers’ vaccination status, which was required during that time for indoor dining.
  
  “We refuse to become the vaccination police for any government. It is unreasonable, invasive, and unsafe to force our restaurant associates to segregate customers into those who may be served and those who may not,” In-N-Out said in a statement at the time.
