title: "In-N-Out bans mask wearing for employees in some states"
date: "2023-07-18"
section: "Business"
url: "https://www.cnn.com/2023/07/18/business/in-n-out-employee-mask-policy/index.html"
content: |
  In-N-Out employees in five US states will no longer beallowed to wear masksas part of new companyguidelines that “emphasize the importance of customer service,” notably showing their smiles, according to anew policyissued by the fast food chain.
  
  Beginning August 14, employees that want to wear masks amid Covid-19 must have a “valid medical note exempting him or her from this requirement,” an email to workers said. The policy is in effect for workers at its restaurants in Arizona, Colorado, Nevada, Texas and Utah, which amount to about 100 locations.
  
  Apolicyfor its California and Oregon restaurants, where it can’t ban employees from wearing masks, said that they have to wear a company-provided N95 mask. A majority of In-N-Out locations are in California, totaling about 300 out of 391.
  
  “We are introducing new mask guidelines that emphasizes the importance of customer service and the ability to show our associates’ smiles and other facial features while considering the health and well-being of all individuals,” the memo said. Employees that have to wear masks, like in the “patty room” or lab technicians,” are exempted.
  
  In-N-Out told employees that the medical note “should clearly state the reason for the exemption and included the estimated duration.” If approved, they have to wear a company-provided N95 mask.
  
  “Our goal is to continue to provide safe and customer-centric store and support environments that balance two things that In-N-Out is known for — exceptional customer service and unmatched standards for health, safety and quality,” the memo said.
  
