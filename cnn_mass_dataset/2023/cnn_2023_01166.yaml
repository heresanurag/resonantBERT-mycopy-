  X, the social media company formerly known as Twitter, has been rife with misinformation about the Israel-Hamas war. Many users aresharing false and misleading claimsabout the conflict — and Elon Musk himself pointed users to an account known for spreading fake reports.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  Israel is pounding Gaza with deadly airstrikes, displacing more than 100,000 people and sending waves of injured Palestinians to overwhelmed hospitals. At least 900 people have died in Israel and more than 680 Palestinians have been killed since theconflict erupted on Saturdaywhen Hamas launched a devastating surprise attack on the region. Additionally,11 US citizens have diedin the attack, President Joe Biden said Monday, and an unknown number remain missing. The number ofhostages held in Gazais estimated at between 100 and 150, Israeli Ambassador Gilad Erdan said. Hamas has claimed it is holding more than 100 captives, including Israeli army officers.
  
  President Biden participated in a voluntary interview this week as part of aninvestigation into classified documentsfound at his home and former office last year. Biden’s interview withspecial counsel Robert Hurmarks the first major development in the case known to the public in months and stands in stark contrast to his predecessor. Former President Donald Trump was never interviewed by special counsel Robert Mueller during the investigation into Russian interference in the 2016 election despite extensive negotiations over a potential interview. Trump currently faces criminal charges in two separate special counsel investigations, including one regardinghis own handling of classified documentsafter he left the presidency in January 2021.
  
  The list of 2024 Republican presidential contenders shrank Monday after former Texas Rep. Will Hurd announced thathe is ending his campaignand is endorsing former South Carolina Gov. Nikki Haley. Hurd, who had struggled to gain traction in a crowded GOP field dominated by Trump, offered a stark warning to his party: “If the Republican party nominates Donald Trump or the various personalities jockeying to imitate his divisive, crass behavior, we will lose.” His pledge of support to Haley’s campaign comes after she raised$11 million in the third quarter— a significant fundraising gain in her fight to emerge as a leading Trump rival. Also on Monday, Robert F. Kennedy Jr. announced alongshot independent run for president, ending his Democratic primary challenge to President Biden.
  
  Older adults have accounted for nearly two-thirds of Covid-19 hospitalizations in the US this year, as concern grows over the population’s lack of vaccination. From January through August, US adults aged 65 and older accounted for around 63% of all Covid-19 hospitalizations,a recent report from the CDC shows. Most of those hospitalized had underlying health conditions, such as diabetes or kidney disorders — but only about 23% had received the bivalent vaccine that was recommended at the time. Health officials are encouraging eligible Americans to get thenewly updated Covid-19 vaccinethat became available this fall. The CDC has recommended the shot for everyone 6 months and older.
  
  California has banned the use of four potentially harmful chemicals in food, including the common color additive red dye No. 3. The landmark law makes the Golden State the first in the country toforbid the use of ingredientsfound in many popular candies, drinks and more, according to some environmental health organizations. Nearly 3,000 products usered dye No. 3as an ingredient, including sweets such as Skittles, Nerds and Trolli gummies; protein shakes; instant rice and potato products; and boxed cake mixes. California Gov. Gavin Newsom said the bill won’t be implemented until 2027 to allow brands enough time to revise their recipes.
  
  Flag football among new sports being considered for 2028 OlympicsOlympic organizers have proposedfive new sports for inclusionin the 2028 Games: baseball/softball, cricket, lacrosse, squash and flag football.
  
  Powerball jackpot leaps to $1.73 billionThe search for a winner goes on afterno ticket matched the jackpot numberson Monday. The prize is now the second largest in the lottery’s history.
  
  National Museum of Women in the Arts reopens after $67.5M makeoverAfter undergoing a full renovation, the museum in Washington, DC, isset to open next weekendwith an ambitious show of sculptures and installations.
  
  ‘The Crown’ final season gets release dateThe dates for the sixth and final season of “The Crown” wereannounced Monday, along with the release of anew trailer. Netflix has also teased a royal wedding will be featured.
  
  Ancient Roman site of Pompeii is about to ‘expand’See how archeologists plan to make one of the world’smost famous ancient sites “bigger”in order to welcome more tourists.
  
  $100 billionThat’s how much the federal government could collect this year instudent loan payments, according to arecent report. This month marks the first time in more than three years that federal student loan borrowers will be required to make monthly repayments after the Biden administration ended its pandemic-related pause.
  
  “Together we were able to accomplish what many said was impossible only six months ago.”
  
  — Meredith Stiehm,President of the Writers Guild of America West, issuing a statement on Monday after the WGAratified its new contractwith Hollywood and TV studios. As part of the deal, most writers’ minimum pay will increase by 5% immediately, followed by incremental gains through 2026. The major studios also agreed to improve writers’ benefits and increase residual pay for big-budget streaming projects.
  
