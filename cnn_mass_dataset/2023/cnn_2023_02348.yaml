  A nurse who was also on board helped care for the pilot, the airline said, without releasing further details on the pilot’s condition.
  
  “The captain became incapacitated while enroute. He’s in the back of the aircraft right now with a flight attendant, but we need to get him on an ambulance immediately,” a member of the flight crew is heard saying in air traffic control audio fromLiveATC.net.
  
  “It’s standard procedure for our Flight Crews to request assistance from traveling medical personnel during in-flight medical events involving Customers, this situation just so happened to involve one of our Employees,” the airline said.
  
  Data from the flight tracking siteFlightAware.comshows the plane was in the air for about 1 hour and 17 minutes. After safety returning to Las Vegas, a backup crew boarded and the flight continued to Columbus as planned, the airline said.
  
  The Federal Aviation Administration will investigate the incident, it said.
