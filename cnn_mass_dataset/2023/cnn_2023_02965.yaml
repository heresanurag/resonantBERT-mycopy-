  Researchers at the University of Michigan, the lab that found the sequence from the US, gave no information about the patient it came from, saying the case was being investigated by the state’s health department.
  
  In March, the White Housequietly polledabout a dozen Covid-19 experts who follow the evolution of the coronavirus to ask about the likelihood of a highly mutated variant emerging within the next two years.  Most experts pegged the odds of that happening somewhere between 10% and 20%.
  
  The XBB descendant EG.5 is currently the dominant variant in the US, causing an estimated 20% of all new Covid-19 cases in this country. The next most common variant, FL.1.5.1, has grown quickly and is now causing about 13% of all new cases, according to the CDC’svariant tracker.
