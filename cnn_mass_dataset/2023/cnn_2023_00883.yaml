  “In view of the overall economic situation and the development of incoming orders, it can be expected that the high [production] growth rates will soon slow down. The high order backlog is slowly being reduced,” Hildegard Müller, the president of the industry body, said in a statement last month.
  
  In other parts of Germany’s industrial sector, which includes energy production, prospects appear brighter. New orders in manufacturing jumped 7% in June from the previous month, provisional data showed Friday, although the figures were distorted by large-scale orders.
  
  “German industry remains in rough waters,” Salomon Fiedler, economist at Berenberg, said in a note Monday, noting last year’s energy price shock and weakness in US and Chinese demand, among other factors.
  
  Volkswagen(VLKAF), Europe’s largest carmaker, has been grappling withsluggish sales in China— its single biggest market — losing out to local competitors.
  
  The company reported a 14.5% drop in its deliveries in China in the first quarter. It saw a recovery in April and May but deliveries in the first half overall were still 1.2% down on the same period in 2022.
  
  Germany’s broader industrial sector has had to contend with high energy prices, which were already rising in Europe when Russia invaded Ukraine in February 2022, sending them to record highs. European natural gas prices have since tumbled to stand 44% below their pre-war level.
  
  Berenberg expects Germany to fall back into “a mild recession” in the second half of this year, Fiedler added.
  
  — Mark Thompson and Anna Cooban contributed reporting.
