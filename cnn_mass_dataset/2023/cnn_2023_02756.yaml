  The call, which was a free prison call only allowed to last 60 seconds, ends after that.
  
  Buster Murdaugh testified on his father’s behalf at the double murder trial.
  
  Alex Murdaugh isappealing his conviction.
  
  South Carolina prosecutors argued during his trial Murdaugh killed his wife and son to distract from a variety of allegedfinancial crimes, charges for which he now faces in state court, including embezzlement, computer crimes, money laundering and conspiracy. In all, state prosecutors allege Murdaugh bilked his law firm, clients and the government out of more than $9 million.
