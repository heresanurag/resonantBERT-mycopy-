title: "Attorney General Merrick Garland makes unannounced trip to Ukraine"
date: "2023-03-03"
section: "Politics"
url: "https://www.cnn.com/2023/03/03/politics/merrick-garland-ukraine"
content: |
  Attorney General Merrick Garland madean unannounced trip to Ukraineon Friday, according to a Justice Department official, his second trip to the country after Russia invaded a little more than a year ago.
  
  The trip was not announced for security reasons, the official said.
  
  Garland was invited to Lvivby the Ukrainian prosecutor general, the official said, and joined President Volodymyr Zelensky at the “United for Justice Conference.”
  
  The official added that Garland “held several meetings and reaffirmed our determination to hold Russia accountable for crimes committed in its unjust and unprovoked invasion against its sovereign neighbor.”
  
  The trip comes nearly two weeks after President Joe Biden made his first trip to Ukraine since the war began and is one of several trips made by members of Biden’s Cabinet. Treasury Secretary Janet Yellen also recently made a trip to Ukraine to meet with Zelensky.
  
  The attorney general last went to Ukraine in June and similarly committed the United States’ assistance in finding and prosecuting those who committed war crimes. During that trip, Garland announced that he was appointing Eli Rosenbaum, the top US so-called “Nazi hunter,” to lead a Justice Department team to identify and prosecute war criminals.
  
  On Wednesday, Garland testified to the Senate Judiciary Committee that he believed the Russian government was committing crimes against humanity and said the Justice Department supports efforts by The Hague to investigate and prosecute those crimes.
  
  “The United States supports what is now being developed in The Hague, sponsored by Eurojust, looking into the possibility of creating that court [to charge crimes of aggression,]” Garland testified.
  
  “There are concerns that we have to take into account with respect to how that might deal with our own service members and other circumstances,” he continued. “We have to be sure that the appropriate guardrails are up. But we support any number of different ways in which war crimes, crimes against humanity, and the potential for crimes against aggression are investigated.”
  
  The Justice Department has taken several steps to hold the Russian government and its supporters accountable since the invasion began.
  
  The Justice Department’s Task Force KleptoCapture – made up of federal prosecutors, investigators and analysts – has worked for the past year to target the complex web of wealth surrounding Russian oligarchs and Kremlin insiders. Since the beginning of the war, the Justice Department has seized more than $500 million in yachts, properties and other assets from people who support the Russian government and have evaded US sanctions, according to a department news release.
  
  The department has also brought over 30 indictments against sanctioned supporters of the Kremlin and Russian military, the department has said, some of which have directly implicated individuals in supporting the war in Ukraine.
  
  This story has been updated with additional reporting.
