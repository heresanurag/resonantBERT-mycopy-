title: "Get your eyes checked to keep your brain healthy, study says"
date: "2023-07-13"
section: "Health"
url: "https://www.cnn.com/2023/07/13/health/vision-loss-dementia-study-wellness"
content: |
  People with untreated visual impairments were significantly more likely to develop dementia, according to a new study.
  
  Previous studies have shown a link between cognitive and vision health. This latest research, however, was unique in the rigor with which vision was assessed and in how representative the sample was, said clinician-scientist Dr. Joshua Ehrlich, the lead author of thereport published Thursday in the journal JAMA Ophthalmology.
  
  Ehrlich and his coauthors looked at data from the 2021 National Health and Aging Trends Study in the United States and included nearly 3,000 people.
  
  The NHATS interviewers gave individuals in the 2021 study tablet deviceswith tests for near and distance vision as well as contrast sensitivity, he said.
  
  “We did all the research to make sure that in fact, the iPad tests are equivalent to (the) gold standard test in the doctor’s office, and we implemented this in the homes of thousands of older adults,” said Ehrlich, an assistant professor of ophthalmology and visual sciences at the University of Michigan in Ann Arbor.
  
  The participants, who were all older than 71, were then screened for dementia using the Dementia Screening Interview, the study said.
  
  Across all individuals involved in the study, 12.3% showed signs of dementia. In people with distance visual impartment, that jumped to 19.5%; 21.5% for near visual impairment; and 32.9% for people who had moderate to severe visual impairment or were blind, according to the study.
  
  The study showed that even mild vision impairment can increase risk, said Dr. Arielle Silverman, director of research at the American Foundation for the Blind. Silverman was not involved in the research.
  
  And the increase for moderate and severe impairment was significant.
  
  “The potential to increase your risk by two and a half times because of vision impairment is quite stark,” said Dr. Thomas Holland, a physician scientist at the Rush Institute for Healthy Aging and an instructor of internal medicine at Rush Medical College in Chicago. Holland was not involved in the study.
  
  It is important to note that because of the way this study was designed, the research team can’t know for sure that the vision impairment caused the dementia, only that they were correlated.
  
  Not enough people wear hearing aids, experts say. Doing so could reduce dementia
  
  Dementia could be causing the vision loss, or they could just be happening at the same time, Ehrlich said.
  
  There is a similar correlation betweenhearing loss and dementia, he added. It may be that the impairments decrease the input of our senses, which could lead to some confusion that can speed up cognitive decline, Holland said.
  
  “If you can’t feel something and know that you are injuring yourself, you’re going to get hurt. That just is the name of the game. And then the same thing when it comes to your hearing and your vision,” he added.
  
  Another factor that might lead to the correlation is a possible decrease in opportunities and community participation that could come with vision loss, Silverman said.
  
  What should you do about it? Keep on top of vision care, Ehrlich said.
  
  In addition to living a healthy lifestyle, having annual visits and vision checks are important, Holland added.
  
  And if a problem is found, get it taken care of, Ehrlich said.
  
  “When it comes to vision impairment and blindness, an estimated 80 plus percent is either preventable or even reversible,” he added.
  
  After an examination, your eye doctor may recommend a corrective procedure like LASIK or cataract surgery, or it could be as simple as wearing prescription glasses, Holland said.
  
  When it comes to dementia, preventive measures are important, and taking care of your senses is an easy way to take care of your cognition, Ehrlich said.
  
  “The earlier the better,” Holland said. “If you notice that you have vision that is starting to be impaired, get it checked out.”
  
  But not every case of vision loss is treatable. That is why it is important to pair vision preventive health with rehabilitation services “so that people who become blind or have low vision can continue to live their lives actively with choice, independence and confidence,” Silverman said.
  
  That could mean building skills so that people who are blind can continue to move independently and safely through the world, engage with hobbies, and do other things that are crucial for cognitive health, she added.
  
  “Aging is hard, but vision is something we have a lot of supports for,” Silverman said. “If your vision cannot be corrected, seek a referral to a vision rehabilitation therapist for strategies to work with the vision you do have, and non-visual techniques to keep engaged in all aspects of your life.”
  
