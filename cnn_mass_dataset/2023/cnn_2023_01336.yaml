title: "Start your week smart: Biden, Mass shooting, Atlanta, King Charles III, Buzz Aldrin"
date: "2023-01-22"
section: "US"
url: "https://www.cnn.com/2023/01/22/us/five-things-january-22-trnd/index.html"
content: |
  Welcome to the Year of the Rabbit! Today is Lunar New Year, butcelebrations in many parts of the worldwill occur over several days – collectively referred to as the Spring Festival. One Lunar New Year tradition involves eating what are known aslongevity noodles, a ritual that can be traced back more than 2,000 years.
  
  Here’s what else you need to know toStart Your Week Smart.
  
  • FBI investigators on Fridayfound additional classified materialwhile conducting a search of President Joe Biden’s home in Wilmington, Delaware.
  
  • At least 10 people are dead and at least 10 others are hospitalized aftera mass shooting in Monterey Park, California, Saturday night, according to the Los Angeles County Sheriff’s Department.
  
  • Six people were arrested Saturday night in downtown Atlantaduring proteststhat came in response to a proposed police training facility and the fatal police shooting of an activist earlier in the week.
  
  • Buckingham Palace has revealed details ofKing Charles III’s coronation,which will see three days of celebrations across the country during which the public will be invited to participate.
  
  • Edwin “Buzz” Aldrin, who became the second person to ever set foot on the moon in 1969 following crewmate Neil Armstrong,married his “longtime love”on his 93rd birthday on Friday.
  
  Tax season officially gets underway on January 23. That’s the first day the IRS willstart accepting 2022 federal income tax returns. Before you start to panic, that isnotthe day your return is due. You still have until April 18 before you start to sweat. What happened to the traditional April 15 deadline? Well, it falls on a Saturday this year, and the following Monday isEmancipation Dayin Washington, DC, where the IRS is headquartered.
  
  The trial of disgraced former South Carolina attorney Alex Murdaugh, who is accused of killing his wife and son and beinginvolved in financial crimes and fraud schemes, is set to begin. Maggie and Paul Murdaughwere found deadon the night of June 7, 2021, after Murdaugh called 911 to report he had discovered them fatally shot at the family’s property in Islandton, South Carolina.
  
  The judge overseeing the Atlanta-area special grand jury that has been investigating whether then-President Donald Trump and his allies violated the law in their efforts tooverturn the 2020 election resultsin Georgia has scheduled a hearing for January 24 to determine whether all or part of the jury’s report should be made public. Special grand juries in Georgia are not authorized to issue indictments, but the report will serve as a mechanism for the jury to recommend whether Fulton County District Attorney Fani Willis should pursue indictments in herelection interference investigation.
  
  Also on Tuesday, we’ll learn just how close we are to the end of the world. For the past 75 years, the Bulletin of the Atomic Scientists has published a newDoomsday Clock– the hands of which indicate how close humanity is to midnight and the apocalypse. A year ago,the clock stood at 100 seconds to midnight. Since then, Russia launched its invasion of Ukraine, renewing fears of the potential forglobal nuclear war.
  
  A federal judge has ordered Boeing to appear in federal court in Texas on January 26 foran arraignment on a fraud chargeinvolving the certification of the 737 MAX. In 2021, Boeing and the US government entered into a deferred prosecution agreement without involving family members of the737 MAX crash victims, who then argued to the court that they should have been allowed to participate in the case under a federal crime victim law. In October, the judge sided with them.
  
  January 27 isInternational Holocaust Remembrance Day.
  
  One Thing: Western Water Wars
  
  In this week’s“One Thing” podcast, CNN’s Lucy Kafanov shares the story of one Arizona community forced to take legal action against the city of Scottsdale after being cut off from its water supply – and why it could serve as a warning to the rest of the country as the climate crisis continues.Listen here for more.
  
  Check out more imagesfrom the week that was, curated by CNN Photos.
  
  Oscar winner Riz Ahmed and“M3GAN”star Allison Williams willannounce the nominees for the 95th Academy Awardson Tuesday at 8:30 a.m. ET.
  
  “The 1619 Project,”a six-part documentary series based on The New York Times’ deep dive into the legacy of slavery, premieres Thursday on Hulu.
  
  “Poker Face”from “Knives Out” director Rian Johnson arrives on Peacock Thursday. Natasha Lyonne produces and stars in this 10-part mystery series about a woman who can tell when people are lying.
  
  And“Shotgun Wedding”blasts its way onto Amazon Prime Video on Friday. Jennifer Lopez and Josh Duhamel star in this action comedy about a wedding that turns violent.
  
  The NFL playoffs continue later today when the Cincinnati Bengals take on the Buffalo Bills in the AFC divisional round. The last time these two teams faced each other, Bills safetyDamar Hamlin went into cardiac arreston the field. On Saturday, theKansas City Chiefs defeated the Jacksonville Jaguarsto advance to the AFC championship game, while the Philadelphia Eagles beat the New York Giants to move on to the NFC championship game.
  
  The quarterfinals of theAustralian Openbegin Monday in Melbourne following a number ofnotable upsetsover the weekend.
  
  Take CNN’s weekly news quizto see how much you remember from the week that was! So far, 64% of fellow quiz fans have gotten eight or more questions right. How will you fare?
  
  David Crosby, one the most influential musicians of the ’60s and ‘70s,died last weekat the age of 81. Spend a few minutes and listen to him perform one of Crosby, Stills, Nash & Young’s early hits with The Lighthouse Band a few years ago. And remember, “We are stardust.” (Click here to view)
