title: "Netflix is winding down its DVD business after 25 years"
date: "2023-04-18"
section: "Media"
url: "https://www.cnn.com/2023/04/18/media/netflix-dvd-red-envelopes/index.html"
content: |
  Netflix is officially winding down the business that helped make it a household name.
  
  This fall, the streaming giant will officially say goodbye to its DVD rental service and all of the red envelopes that made it possible.
  
  “On September 29th, 2023, we will send out the last red envelope,” the companytweetedTuesday. “It has been a true pleasure and honor to deliver movie nights to our wonderful members for 25 years.”
  
  “Our goal has always been to provide the best service for our members, but as the DVD business continues to shrink, that’s going to become increasingly difficult,” co-CEO Ted Sarandoswrote in a blog post Tuesday.“Making 2023 our Final Season allows us to maintain our quality of service through the last day and go out on a high note.”
  
  The company reported a miss for its second-quarter earnings after market close on Tuesday. Shares fell by around 6%.
