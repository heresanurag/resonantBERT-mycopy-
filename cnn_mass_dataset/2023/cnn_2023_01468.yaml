title: "Start your week smart: Gaza hospital crisis, government shutdown, NYC mayor, Iceland emergency, Veterans Day"
date: "2023-11-12"
section: "US"
url: "https://www.cnn.com/2023/11/12/us/5-things-november-12-trnd/index.html"
content: |
  One way to get wary diners to try an exotic new dish is to tell them, “It tastes just like chicken!” Now, in a twist on the “which came first” question, one poultry producer has createda new snack mixthat lets humans try food that’s similar to what its chickens eat..
  
  Here’s what else you need to know toStart Your Week Smart.
  
  • Heavy fighting near Gaza’s largest hospital has left itin a “catastrophic situation,”with patients and staff trapped inside, ambulances unable to collect the wounded and life-support systems without electricity. Israel said it will help evacuate babies.Follow live updates.• House Republicansare pursuing a two-step planfor funding the government, sources told CNN, as Congress barrels toward another spending deadline Friday. Newly elected House Speaker Mike Johnson announced the plan and said, “I wasn’t the architect of the mess we are in.”•FBI agents seized the cell phonesof New York City Mayor Eric Adams as part of a federal investigation into campaign fundraising, a source told CNN. The seizure is a dramatic escalation of the federal probe into whether foreign money was funneled to his campaign.•Iceland has declared a state of emergency, with police officials urging residents to evacuate the coastal town of Grindavík following an intense wave of earthquakes in the southwest of the country linked to a possible volcanic eruption.• President Joe Bidenhonored Veterans Dayat Arlington National Cemetery, a site he described as a “sanctuary of sacrifice” during his deeply personal remarks. Biden talked about his late son, Beau, who served in the Delaware Army National Guard.
  
  MondayDonald Trump Jr. will bethe first defense witness calledin the civil fraud trial against former President Donald Trump, his adult sons Donald Jr. and Eric, and the Trump Organization. The New York attorney general’s office rested its case last week and was denied a motion to limit certain expert witnesses from testifying for the defense. Judge Arthur Engoron ruled the Trump team can call all of its witnesses but said he would limit the experts’ testimony to relevant topics in line with his summary judgment decision, where he has already ruled the Trumps and their company areliable for “persistent and repeated” fraud.
  
  TuesdayThe Bureau of Labor Statistics is set to release its latest reading of inflation with the Consumer Price Index for October. Its previous report in September showedgas prices and rentsremaining high, whilegrocery price increasescontinued to ratchet down.
  
  King Charles IIIturns 75 years old. Of course, as any devotee of the Royal Family knows, His Majesty gets to celebrate his birthday not just once,but twice a year.
  
  WednesdayClosing arguments will begin in the14th Amendment disqualification trialagainst Donald Trump in Colorado. Witness testimony in the case wrapped up earlier this month. Days later, the Minnesota Supreme Courtrejected a similar attemptto block Trump from appearing on the state’s GOP primary ballot next year — but said the challengers can try again to block him from the general election ballot if he wins the Republican nomination. The 14th Amendment, ratified after the Civil War, says US officials who take an oath to uphold the Constitution are banned from future office if they “engaged in insurrection.” But the Constitution doesn’t say how to enforce the ban, and it has only been applied twice since 1919, which is why many experts view these challenges as a long shot.
  
  President Biden is set to meet with Chinese President Xi Jinpingin the San Francisco Bay Area, senior US administration officials said, setting up a test of whether the two men can slow a downward spiral in US-China relations at a moment of heavy global turbulence.
  
  FridayThe federal government isset to run out of moneyat midnight ET, which putsHouse Speaker Mike Johnsonin the same difficult situation as his predecessor,Rep. Kevin McCarthy, who was ousted in unprecedented fashion more than a month ago. Johnson hopes his strategy will keep the government’s lights on without sparkinga right-wing rebellion. Meanwhile, the White House Office of Management and Budget has already begun its initial communications with agencies onhow to prepare for a possible government shutdown, a source familiar with the plans said.
  
  SaturdayHot dog!Happy 95th birthday, Mickey Mouse! The world’s most famous animated rodent made his big-screen debut when“Steamboat Willie”premiered onNovember 18, 1928, in New York’s Colony Theatre.
  
  One Thing: The rise of ‘Fire Weather’In this week’sOne Thingpodcast, journalist and author John Vaillant talks about how climate change is helping to alter the behavior of wildfires — and why most communities are still unprepared to fight them. Listenhere.
  
  Check out more imagesfrom the week that was, curated by CNN Photos.
  
  TV and streamingIn case you haven’t heard, Hollywood actors are back to work afterreaching a tentative dealwith the major studios last week, ending a historic strike that lasted almost four months.Here’s what we knowabout the tentative release dates for some of TV’s most anticipated series, including the sixth and final season ofNetflix’s “The Crown,”which premieres Thursday.
  
  In theaters﻿A new chapter in “The Hunger Games” franchise makes its debut Friday with the release of the prequel,“The Hunger Games: The Ballad of Songbirds & Snakes,”starring “West Side Story” breakoutRachel Zegler.
  
  Inthe holiday horrorspirit of “Halloween” and “Silent Night, Deadly Night” comes“Thanksgiving,”from blood-and-guts impresario Eli Roth — and featuring People Magazine’s“Sexiest Man Alive.”(What’s next? “Groundhog Night: Punxsutawney Phil’s Revenge”?)
  
  Or, if murderous pilgrims and children fighting to the death are not your speed, give“Trolls Band Together”a shot.
  
  At a glance …Sports fans have no shortage of games to watch today and all this week with the NFL, NBA, NHL and college football and basketball seasons all underway.
  
  Speaking of the NHL, the Vegas Golden Knights — the 2023 Stanley Cup champions — will be honored ata ceremony at the White Houseon Monday.
  
