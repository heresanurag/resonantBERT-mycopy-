  ‘Stairway to Heaven’In 1971, the British rock band Led Zeppelin released an album with no tracklist, no title, not even the band’s name on the cover — just a photograph of an elderly man with a bundle of sticks on his back. More than half a century later,the mystery of the “Stick Man” has been solved. And that album, dubbed “Led Zeppelin IV,” sold 37 million copies. Here is its most famous track. (Click here to listen)
