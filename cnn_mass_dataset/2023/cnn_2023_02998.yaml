title: "Dwayne ‘The Rock’ Johnson addresses Maui fund backlash: ‘I get it and I completely understand’"
date: "2023-10-08"
section: "Entertainment"
url: "https://www.cnn.com/2023/10/08/entertainment/dwayne-johnson-addresses-maui-fund/index.html"
content: |
  Dwayne Johnson is acknowledging thebacklashhe received after he and Oprah Winfreyasked the publicto donate to a Maui wildfire recovery fund last month.
  
  “When we first launched the fund, there was some backlash,” Johnson said in avideoposted to his Instagram page on Sunday, adding, “I get it and I completely understand, and I could’ve been better. And next time I will be better.”
  
  Johnson went on to say that he understands “money ain’t falling out of the sky, and it’s not growing on trees, and there’s a lot of people out there who’s living paycheck to paycheck. And I get it, and I know what that’s like.”
  
  “The last thing you want to hear when you are living from paycheck to paycheck is someone asking you for money, especially when the person asking you for money already has a lot of money,” he said.
  
  In August, Johnson and Winfrey first announced they created the People’s Fund of Maui via avideoposted to their Instagram pages, saying they each contributed $5 million to get the campaign started.
  
  “I get it, I understand. I’ve never launched a fund before, but I’m a quick study and lesson learned,” Johnson said, adding that he appreciates the transparency that his social media provides with respect to absorbing feedback from his followers.
  
  When announcing the fund, Winfrey and Johnson explained that those who lost their primary homes in the Lahaina and Kula fires were eligible to receive $1200 a month from their fund.
  
  In his video on Sunday, Johnson said that “thousands and thousands of survivors” have started to receive the first round of funding.
