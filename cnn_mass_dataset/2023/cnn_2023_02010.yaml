title: "Danish researchers use machine learning to predict aspects of individual lives, including when someone might die"
date: "2023-12-22"
section: "Health"
url: "https://www.cnn.com/2023/12/22/health/algorithm-life-expectancy/index.html"
content: |
  Researchers in Denmark say they have used powerful machine-learning algorithms to accurately predict certain aspects of human lives, including how early someone is likely to die.
  
  Theirstudy, published this week in the journal in Nature Computational Science, details how a machine-learning algorithm model called life2vec predicted the outcome of a person’s life and their actions when presented with highly specific data about them.
  
