title: "Opinion: Biden is hesitating at curbing the excessive rise in prescription drug prices"
date: "2023-01-10"
section: "Opinion"
url: "https://www.cnn.com/2023/01/10/opinions/high-drug-prices-biden-administration-doggett-weissman/index.html"
content: |
  Editor’s Note:Texas Democrat Lloyd Doggett represents the newly created37th Congressional District.Robert Weissman is president ofPublic Citizen, a consumer rights advocacy group. The views expressed in this commentary are their own. Readmore opinionat CNN.
  
  Last summer, Congresspassed overdue drug pricing reformsto help older adults afford their medications by empowering Medicareto negotiate somedrug prices, limit drug corporation price spikes and cap out-of-pocket costs.
  
  Though a step forward, it was not nearly enoughto quell rising outrageover astronomical drug prices, and it did nothing for themore than 200 million Americanswho are not on Medicare.
  
  Negotiated prices willnot take effectuntil 2026, and it will remain illegal for Medicareto negotiate the priceof the vast majority of drugs. To provide immediate and expansive relief for all patients, not just those who rely on Medicare, President Joe Biden should use his existing authority to rein in pharmaceutical monopolies.
  
  Prices for lifesaving treatments for everything from diabetes to cancer have been steadily rising in the United States, even as other countriespay a fractionfor the medicines we do.
  
  From July 2021 to July 2022, pharmaceutical companiesincreased pricesby an average of 31.6% on more than 1,200 drugs — well above the rate of inflation, according to one report from the Department of Health and Human Services (HHS). And this month, drug makersare expected to raiseprices on more than 350 drugs.
  
  The President already has the authority he needs to bring down prescription drug prices, but so far, he hasn’t acted on requests from patients, advocates and members of Congress to take on monopoly pricing. He has hesitated to use thetwo key powersat the administration’s disposal to address the crisis of unaffordable medicines.
  
  How to fix American health care, according to 6 experts
  
  These tools include the government’spower to issue licenseswaiving patents so generic competitors can enter the market early in exchange for reasonable compensation to the patent holder. The federal governmentused this law repeatedlyin the 1960s to buy low-cost generic versions of patented drugs and still routinely uses this authority for other technologies, such as night vision goggles and electronic passports.
  
  The second tool that the President could use is related totaxpayer-funded inventions. For drugs invented with taxpayer dollars, the government has the right to authorize generic competitors to use the patents to ensure the pharmaceuticals are “available to the publicon reasonable terms.”
  
  There’s nothing reasonable about today’s high drug prices. About 1 in 4 Americans taking prescriptions say it’s hard to afford their medications, a2019 Kaiser Family Foundation Health Tracking Pollfound, and a new studyrevealsthat more than 1.3 million Americans with diabetes are delaying buying, skipping or rationing their insulin due to cost.
  
  Unfortunately, the new federal law does not lower insulin prices and only caps monthly copays of insulin for Medicare beneficiaries, despite patients without insurance and with private insurancerationing insulinat higher rates. Further, copay caps without corresponding price reductionscould leadto health insurance premium increases.
  
  My son's death was preventable. There are so many more like him
  
  Even more outrageous, Americans paymore than two and a half timesas much for prescription drugs than people in other countries do, according to a 2021 Rand Corp. report. For the 20 top-selling drugs, pharmaceutical corporationsmade more money in the USthan in every other country in the world combined, according to a Public Citizen analysis. Other countrieshave meaningful price negotiationthat not only lowers drug prices compared to what Americans pay, but also often incentivizes better innovation.
  
  Last year, cancer survivorspetitionedHHS to use its executive authority to reduce the cost of outrageously-priced prostate cancer treatment Xtandi, which is used to treat three common form of the cancer. Ina recent letterto HHS Secretary Xavier Becerra, they noted that 33,000 men have died of prostate cancer since their petition has gone unanswered.
  
  Xtandiwas developedwith US taxpayer funds, yet itcosts about $190,000a year for American patients, as much assix times higherthan as in other large, wealthy countries, according to Knowledge Ecology International, a nonprofit that focuses on intellectual property in medicine. Advocacy groups and100 members of Congresshave urged HHS to grant a hearing on the Xtandi petition.
  
  Even the threat of powerful action could lower prices, just as we saw in 2001 on theanti-anthrax drug Cipro. Then-HHS Secretary Tommy Thompson’s threat to authorize generic competition led to the pricebeing cut in half. Action on Xtandi could force pharmaceutical executives to broadly rethink their practices.
  
  To meet the needs of millions of Americans struggling to afford necessary medications, Biden must ensure the narrow legislative progress made last year is catalyzed into much broader relief through executive action.
  
  Now is the time for the Biden administration to act to ensure that lifesaving medicines are affordable for all.
