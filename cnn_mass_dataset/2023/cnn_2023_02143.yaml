title: "Mercedes-Benz to adopt Tesla’s EV charging standard in North America"
date: "2023-07-08"
section: "Business"
url: "https://www.cnn.com/2023/07/08/business/mercedes-benz-tesla-supercharger"
content: |
  Mercedes-Benz announced its electric vehicle drivers will be able to use Tesla(TSLA)superchargers starting next year and that it will fully adopt the company’s charging standard in 2025.
  
  It joins a growing list of automakers who have made similar deals with Tesla. The Mercedes-Benz arrangement moves Tesla another step towards  becoming widely adopted as the EV industry standard.
  
  What Tesla's EV charging win really means for drivers
  
  The German luxury automaker will fully integrate what Tesla calls the North American Charging Standard (NACS) in its electric vehicle line-up, it said on Friday. There are more than 12,000 Tesla supercharger stations North American drivers can access starting next year.
  
  Superchagers are Tesla’s name for its fast charging stations.
  
  Mercedes also will build its own charging network that will be accessible for a “wide range” of EV owners. It plans to make more than 2,000charging hubs in North America, Europe  and China by the end of the decade. North America will have 400 of these.
  
  As many US states push for electric vehicle adoption, some critics have pointed out that long stretches of highway lack the charging infrastructure to make the carsa viable optionfor many Americans. The issue is growing in urgency: Several states, including California and New York, have passed bills to restrict the sale of new gas-powered vehicles by 2035.
  
  In November, Tesla CEO Elon Muskinvited other EV makersto build vehicles that could use Tesla charging ports.
  
  In May, Ford(F)announced its vehicles will gain accessto Tesla’s vast EV charging network.Rivian and GMhave also joined. Now, Mercedes.
  
  “With the development of Mercedes-Benz’s new North American High-Power Charging Network, we are ready to redefine the electric vehicle charging experience,” Andrew Cornelia, CEO of Mercedes-Benz HPC North America said in a statement.
  
  Mercedes said it’s the first German manufacturer to implement the NACS ports into its new electric vehicles. It will also offer a plug adapter for vehicles with the Combined Charging System made before 2025.
  
  CCS chargers are used by most other EV makers, including General Motor, Audi, and Rivian, but Tesla’s charging stations outnumber CCS stations in the United States.
