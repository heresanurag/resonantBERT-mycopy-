title: "James Lewis, convicted of extortion following Tylenol deaths, has died"
date: "2023-07-10"
section: "US"
url: "https://www.cnn.com/2023/07/10/us/james-lewis-tylenol-deaths/index.html"
content: |
  James Lewis, who was convicted of extortion for promising to stop the 1982 Tylenol poisonings for $1 million – but denied he was behind the seven deaths, has been found dead, police said Monday.
  
  The Massachusetts manserved time for sendingJohnson & Johnson a letter in 1982 vowing he’d stop the killings that set off panic. The body of the 76-year-old was found Sunday in Cambridge, according to police, who said the death did not appear suspicious.
  
  The unsolved Chicago-area deaths occurred after the over-the-counter Extra-Strength Tylenol capsules were laced with potassium cyanide.
  
  How an unsolved murder mystery changed our pill bottles
  
  The fears set off by the killings led to major changes in the way medicine was packaged in the US, withtamper-proof safety sealsbecoming the norm. The poisonings inspired a troubling string of copycats and prompted one of the largest product recalls in history.
  
  Johnson & Johnson, parent of the drug maker, McNeil, was credited for its aggressiveness in recalling the product and its openness in dealing with the killings, and the product quickly bounced back in sales. It remains a popular analgesic.
  
  No one has been charged in the deaths, but Lewis was under periodic police attention.
  
  The Chicago Tribune reportedlast year that some investigators were still pushing for Lewis to be prosecuted, and that Lewis said he’s been treated unfairly and continued to deny involvement.
  
  In 2009, FBI agents searched Lewis’s Massachusetts home. Investigators seized a computer from Lewis and collected a sample of his DNA.
  
  The FBI’s Boston field office declined to comment Monday on Lewis’s death.
