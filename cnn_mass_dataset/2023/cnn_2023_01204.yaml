title: "‘Persistent bear activity’ forces wildfire crews to leave campsite in British Columbia, officials say"
date: "2023-09-02"
section: "Americas"
url: "https://www.cnn.com/2023/09/02/americas/canada-british-columbia-bears-wildfires/index.html"
content: |
  “Persistent bear activity” forced fire crews to leave a camp in British Columbia, Canada, authorities said Thursday.
  
  The camp near the community of Gold Bridge was housing crews working on the Downton Lake wildfire, which was reported on July 13 and has consumed more than 9,000 hectares, according to theBritish Columbia Wildfire Service.
  
  “I think the bear wanted to help us on the fire line,” theDashwood Fire Departmentwrote on social media, sharing a video of a bear wandering around near the camp.
  
  Because of the bear activity, around 160 personnel were moved to the town of Lillooet, where they are being hosted by T’it’q’et First Nation and Lillooet municipality facilities as they fight the flames, the fire service said.
  
  Thousands scramble to evacuate capital of Canada's Northwest Territories as more than 200 'unprecedented' wildfires blanket region
  
  “This was required to ensure the safety of personnel following persistent bear activity within and around the camp,” the fire service said.
  
  Conservation officers are assessing and advising on a safe return to the campsite, the fire service added.
  
  Firefighters for weeks have been battling the Downton Lake wildfire, which has forced evacuations as it spread and continues to burn out of control, according to the fire service. The area is roughly 100 miles (around 161 km) north of Vancouver.
  
  “Precipitation fell across the fire overnight and Thursday morning, with further amounts expected throughout the day. Fire activity remains low on both wildfires of the Bendor Range Complex,” the fire service said Thursday.
  
  The entire capital city of Canada's Northwest Territories has been ordered to evacuate as hundreds of wildfires scorch the region, officials say
  
  The blaze is one of around420 active wildfiresburning across the province amidCanada’s unprecedented fire season, according to the British Columbia Wildfire Service.
  
  Experts had warned that the many wildfires scorching large swaths of wildland from coast to coast across Canada will likely displace, injure and kill local wildlife.
  
  “Wildlife will be displaced. There will also be a lot of animals that will be dying because of the fires,” Angelika Langen, executive director of the Northern Lights Wildlife Society, toldCNN affiliate CTVin Canada.
  
  British Columbia is considered“bear country,”where both black and grizzly bearsroam.
  
  On Thursday, an orphaned and injured bear cub was rescued from a wildfire-ravaged area in British Columbia’s Shuswap region.
  
  The cub suffered burns to its paws but is expected to make a full recovery, according to theBritish Columbia Conservation Officer Service.
  
  Scientists say they've found a direct link between planet-warming pollution and polar bear survival
  
  The cub’s sibling had severe injuries from the fire and was put down, the conservation office said, while the sow is believed to have died in the fire.
  
  “Although unfortunate the cub was orphaned, its survival is welcome news for the Secwepemc community and Conservation Officers, who have been dealing with wildlife injured by wildfires,” the conservation office said.
