title: "Grammy winners 2023: See who won"
date: "2023-02-05"
section: "Entertainment"
url: "https://www.cnn.com/2023/02/05/entertainment/grammy-winners-list-2023/index.html"
content: |
  The 65th Grammy Awardswere presented onSunday.
  
  While most of the awards were announced during a pre-televised ceremony, nominees from several top categories across musical genres follows below. Winners are indicated in bold.
  
  The full list of winners in more than 91 categories can be foundhere.
  
