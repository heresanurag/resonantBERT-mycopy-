title: "Household debt hit record $16.9 trillion last quarter, as consumers loaded up their credit cards"
date: "2023-02-16"
section: "Economy"
url: "https://www.cnn.com/2023/02/16/economy/us-household-debt-fourth-quarter/index.html"
content: |
  Americans continued toadd to their debtat the end of last year — and grew their credit card balances at record rates, according to data released Thursday by the Federal Reserve Bank of New York.
  
  Total US household debt hit a record $16.9 trillion during the fourth quarter, an increase of $394 billion, or 2.4%, from theprior three-month period, according to the Fed’s latestQuarterly Report on Household Debt and Credit. While the lion’s share of the debt is attributable to mortgages, the report showed that not only are credit card balances swelling at record levels, delinquencies are on the rise as well.
  
  Inflation was still hot in January, but some prices are cooling off
  
  Credit card balances increased nearly 6.6% to $986 billion during the quarter, the highest quarterly growth on record, according to New York Fed data that goes back to 1999. Year over year, credit card balances grew 15.2%.
  
  The Federal Reservehas made sweeping rate hikesover the past 11 months in an effort to combat high inflation. Climbing interest rates have taken a toll on thehousing sector: During the fourth quarter of last year, mortgage originations dropped to 2019 levels, according to the New York Fed report.
  
  A historically strong labor market has helped to keep consumers spending; however, they’re doing so in an environment withhistorically high inflationandrising interest rates.
  
  “It’s triple trouble for credit card borrowers,” Ted Rossman, senior industry analyst for Bankrate, said in a statement. “Balances are up, rates are up and more people are carrying credit card debt.”
  
  And in this high inflationary and interest rate environment, Americans are having more trouble meeting payment obligations: The share of current debt becoming delinquent increased across nearly all debt types, with credit cards and auto loans showing delinquency transparency rates of 0.6 and 0.4 percentage points, respectively.
  
  At the end of 2022, 18.3 million borrowers were behind on a credit card, according to New York Fed researchers. That compares to 15.8 million at the end of 2019.
  
  Younger borrowers in particular, those in their 20s and 30s, are struggling with credit card and auto loan payments, New York Fed researchers said.
  
  While total delinquency levels remain below what was seen pre-pandemic — 2.5% of outstanding debt was in some stage of delinquency as of December versus 4.7% at the end of 2019 — the fact that delinquency rates are escalating in spite of a strong labor market environment is concerning, New York Fed researchers said.
  
  “Although historically low unemployment has kept consumers’ financial footing generally strong, stubbornly high prices and climbing interest rates may be testing some borrowers’ ability to repay their debts,” Wilbert van der Klaauw, economic research adviser at the New York Fed, said in a statement.
  
  If there were to be a deterioration in the labor market, that would be worrisome for consumer debt and delinquency levels, New York Fed researchers said.
  
  “While person-level delinquencies are high, we do not anticipate widespread stress for lender portfolios as balance weighted delinquencies remain at or below pre-pandemic levels,” New York Fed researchers wrote in a blog post Thursday. “But, on a person-level, this financial distress is real, and the delinquent marks will impact their access to credit for years to come.”
  
  Retail sales jumped by 3% in January, the biggest gain in nearly two years
  
  Additionally, the ending of the current federal student loan payment forbearance could not only cause education loan delinquencies to rise but also spill over to credit card and auto loans as well, researchers noted.
  
  A restart of student loan payments“is absolutely going to put more pressure on the consumer and force people to make touch choices,” Mike Loewengart, head of model portfolio construction at Morgan Stanley, said in an interview with CNN.
  
  All in all, this current spending dynamic is “just not sustainable,” he said.
  
  “As long as people have jobs, as long as the labor market remains tight, they’ll continue spending — even in the face of additional challenges,” he said. “It just speaks to the challenges that we face in the fight against inflation.”
