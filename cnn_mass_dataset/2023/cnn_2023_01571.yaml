  In addition to avoiding areas where there are known outbreaks, there are ways tokeep yourself safefrom Marburg virus, the CDC said. Avoid contact with blood and bodily fluids from people who are sick. If attending a funeral for someone who has died from the disease, take care not to touch the body. Also avoid contact with fruit bats and primates in areas where there are outbreaks, since both animals are known to be carriers for the virus.
