  And “while this business has made millions of dollars, MrBeast has not received a dime,” the lawsuit alleged.
  
  The lawsuit said Beast Investments did give VDC the right to use his name, images and likeness.
  
  “Because MrBeast has spent years developing his brand into one of the most valuable in the world,” the lawsuit said, “it was an essential component of their deal that MrBeast retain strict control over the use of his name, image, likeness, and brand by the MrBeast Burger business.”
  
  Donaldson claimed VDC immediately capitalized on MrBeast Burger’s initial success (Donaldson’s videodocumenting the launch,“I Opened A Restaurant That Pays You To Eat At It,” has over160 million viewson YouTube).
  
  In 2022, a physical MrBeast Burger opened at the American Dream mall in New Jersey, sending fansswarming the storeon its debut.
  
  The lawsuit claimed Donaldson himself raised concerns over the quality of the burgers. In a June tweet, Donaldson said he enjoys running Feastables, his snacks line, “100X more” than burgers.
  
  “…(T)he problem with Beast Burger is i can’t guarantee the quality of the order,” hetweeted. “When working with other restaurants it’s impossible to control it sadly.”
