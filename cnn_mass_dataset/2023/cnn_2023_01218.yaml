title: "Republican senator warns Congress must take action now to protect Medicare and Social Security"
date: "2023-02-12"
section: "Politics"
url: "https://www.cnn.com/2023/02/12/politics/mike-rounds-medicare-social-security-cnntv/index.html"
content: |
  Republican Sen. Mike Rounds of South Dakota offered Sunday a stark warning aboutthe future of Social Security and Medicareif Congress fails to take action now.
  
  “In the next 11 years, we have to have a better plan in place than what we do today. Or we’re going to see – under existing circumstances – some reductions of as much as 24% in some sort of a benefit. So, let’s start talking now because it’s easier to fix it now that it would be five years or six years from now,” Rounds told CNN’s Jake Tapper on “State of the Union.”
  
  In recent days,President Joe Bidenhas made a forceful argument against Republicans by highlighting his support for Social Security and Medicare. The president has specifically seized on a proposal from GOP Sen. Rick Scott of Florida to sunset federal legislation – including Social Security and Medicare – every five years and require Congress to pass them again.
  
  'They just walked into it': Explaining Biden's feud with Rick Scott
  
  Referencing his “spirited debate” with Republicansat the State of the Union, Biden called Scott’s proposal “outrageous” and vowed he would veto such a plan during a speech in Florida last week.
  
  “The very idea the senator from Florida wants to put Social Security and Medicare on the chopping block every five years I find to be somewhat outrageous. So outrageous that you might not even believe it,” he said,pulling out a pamphlet detailing Scott’s plan.
  
  Scotttold CNN’s Kaitlan Collinslast week that his proposal is intended to eliminate wasteful spending and help ensure the government can “figure out how to start living within our means.”
  
  “I want to make sure we balance our budget and preserve Medicare and Social Security, and I’ve been clear all along,” he said.
  
  Rounds also stressed Sunday that Republicans want to better manage Medicare and Social Security in order to improve the programs – not strip them from the American people.
  
  “We think that there are possibilities out there of long-term success without scaring people and without tearing apart the system and without reducing benefits. But it requires management. And it requires actually looking at and making things better,” he said.
