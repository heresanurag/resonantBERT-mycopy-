  Raisi told CNN that Iran’s intention is not to bar the IAEA from conducting inspections, but that Tehran has withdrawn designations of inspectors from France, Germany and the United Kingdom, the countries Iran accused of not living up to their commitments under the 2015 deal, as well as the US.
  
  “Iran hasn’t said we do not wish any inspectors to be here,” Raisi told CNN. “We have said what these three countries, what has been said by the IAEA is that we have certain considerations vis-a-vis individuals from these three countries,” he said, adding that “their trust is under a shadow of doubt.”
  
  In a joint statement, the three European countries and the US on Monday demanded that Iran immediately reverse its decision and “fully cooperate with the Agency.”
  
  The European signatories to the JCPOA have lost a lot of credibility in the eyes of the Iranians, Vaez of Crisis Group said, adding that the Iranians see them as having “overpromised and underdelivered.” This view, he added, is taken up by hardline politicians like Raisi, as well as more moderate ones.
  
  “Now, you see that the Iranians and the Americans have reached an understanding that has toned down Iran’s nuclear program, in which Europe played no role,” Vaez said.
  
  In a sign of a diplomatic breakthrough, Iran this week released five American prisoners in a Qatar-mediated deal that also included the unfreezing ofsome $6 billionin Iranian funds and the release of five Iranian prisoners in the US.
  
  The deal was a sign of what analysts described as a method of unwritten arrangements between Washington and Tehran, with smaller exchanged concessions in lieu of a wider, formal agreement.
