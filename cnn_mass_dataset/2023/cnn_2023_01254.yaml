title: "Iran’s president defends uranium enrichment after Europeans ‘trampled on their commitments’"
date: "2023-09-24"
section: "Middle East"
url: "https://www.cnn.com/2023/09/24/middleeast/iran-raisi-fareed-zakaria-interview-intl/index.html"
content: |
  Editor’s Note:A version of this story appears in CNN’s Meanwhile in the Middle East newsletter, a three-times-a-week look inside the region’s biggest stories.Sign up here.
  
  Iranian President Ebrahim Raisi has defended his country’s enrichment of uranium to near weapons-grade levels, claiming it was a response to European states not living up to their end of the 2015 nuclear agreement.
  
  “In the beginning, we were not seeking 60% levels of enrichment. They (European states) trampled upon their commitments,”Raisi told CNN’s Fareed Zakariain New York on the sidelines of the UN General Assembly this week. “What the Islamic Republic of Iran did was in response to a breaking of commitment of the signatories to the (2015) agreement.”
  
  Iran announced that it was enriching uranium to 60% in 2021,following an attackon its above-ground nuclear facility in Natanz, which Tehran blamed on Israel.
  
  The move alarmed the West, as it shortened Iran’s so-called “breakout time” to build a nuclear weapon, which requires uranium that is enriched above 90%. The UN’s nuclear watchdog, the International Atomic Energy Agency (IAEA), said earlier this month that Iran was the only country without a nuclear weapon that was enriching uranium to 60% purity, and in March the agency announced that uranium particles enriched to 84% werefound at Iran’s Fordow plant.
  
  This month, Reuters cited aconfidential IAEA reportstating that Iran’s stock of uranium enriched to up to 60% purity continued to grow, albeit at a slower pace than in the previous quarter.
  
  Nuclear power, which Iran says is the purpose of its nuclear program, requires uranium to be enrichedto 3% to 5%.
  
