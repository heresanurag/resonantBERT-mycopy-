  In July 2024, the terms of the repayment plan willbecome even more generous for borrowers with federalloans from undergraduate school by cutting their monthly payments in half.
  
  President Joe Biden’s signature student loan forgiveness program, which promised up to $20,000 in debt relief for low- and middle-class borrowers, was struck down by the Supreme Court in June.
  
  But his administration has canceleda record $127 billion of federal student loan debtfor nearly 3.6 million people through existing forgiveness programs on a rolling basis since taking office.
  
  That’s more student loan forgiveness than was granted under any other administration – in part due to the Biden administration’s efforts totemporarily expand some debt relief programsand tocorrect past administrative errorsmade to borrowers’ student loan accounts.
