title: "Lawsuit alleges Brian Laundrie shared with his parents that Gabby Petito was ‘gone’ and that he needed a lawyer"
date: "2023-12-04"
section: "US"
url: "https://www.cnn.com/2023/12/04/us/gabby-petito-gone-brian-laundrie-parents-lawsuit/index.html"
content: |
  Brian Laundrie told his parents Gabby Petito was “gone” in what is described as a frantic phone call that took place three weeksbefore her remains were discovered, according to an amended civil complaint filed by Petito’s parents on November 30.
  
  Joseph Petito and Nichole Schmidt are suing Laundrie’s parents and their attorney, claiming they intentionally withheld information about 22-year-oldGabby Petito’s death, causing them pain and emotional distress.
  
  Petito wasreported missing by her familyin September 2021 after she embarked on a trip withLaundrie, her fiancé. Authorities found her remains in Wyoming days later, on September 19, and a coroner ruled her cause of deathstrangulation.Laundrie returned to his Florida home and then vanished into a reserve for weeks, before investigators found his remains and a medical examiner ruled he died by suicide. Authorities said they found writings near his remains in which heclaimed responsibility for Petito’s death.
  
  Petito’s familyhas been involved in a legal battleagainst Laundrie’s parents for more than a year, alleging they knew that their son killed Petito.
  
  Gabby Petito’s parents get copy of ‘burn after reading’ letter that Brian Laundrie’s mom wrote him
  
  According to the recent complaint filed by Petito’s parents, Laundrie called his parents on August 29, 2021, and told them Gabby was “gone” and he needed a lawyer.
  
  The complaint does not explain how Petito’s parents know about the alleged phone call.
  
  Christopher and Roberta Laundrie are believed to have spoken to attorney Steven Bertolino that same day, sharing with him the message their son told them, the complaint alleges.
  
  On September 2, 2021, Laundrie’s parents sent Bertolino a retainer — usually a fee clients pay to secure an attorney’s services — and Bertolino entered into a fee agreement with a criminal defense law firm in Wyoming, according to the complaint.
  
  The legal services were retained to represent Brian Laundrie, the complaint alleges.
  
  Petito’s parentsfirst allegedChristopher and Roberta Laundrie knew their son had killed Gabby Petito in the spring of 2022.In an amendment to that lawsuitthat came shortly after, her parents alleged that while authorities continued to search for the young woman, Laundrie’s parents knew he had killed her and knew “the whereabouts of her body.”
  
  At the time of that amended complaint, Bertolinohad told CNNthe Laundrie family was confident the case would be dismissed.
  
  In November 2022,a Florida judge ruled in favorof Petito’s family in a wrongful death suit against Brian Laundrie’s estate, awarding $3 million to Petito’s mother as the administrator of her daughter’s estate.
