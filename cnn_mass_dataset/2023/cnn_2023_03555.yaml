  The deputy who opened fire said he saw the zebra walking aggressively toward him and yelled at it to scare it away but the “Zebra didn’t slow down and kept coming at me,” according to the document.
  
  The report from the sheriff’s office says the male Zebra may have been aggressive because it was protecting a group of female zebras in the field.
  
  Zebras are not listed as wild and dangerous animals by theOhio Department of Agriculture, which means they can be owned as pets.
  
  The man who was injured remains in the hospital in fair condition, according to a spokesperson with Ohio Health.
