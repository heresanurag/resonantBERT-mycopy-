title: "Patrick Mahomes restructures contract for record 4-year deal"
date: "2023-09-18"
section: "Football"
url: "https://www.cnn.com/2023/09/18/football/patrick-mahomes-record-contract-deal/index.html"
content: |
  Kansas City Chiefs quarterback Patrick Mahomes has agreed to a restructured deal with the team that will pay the two-time Super Bowl winner a record $210.6 million over four years, Mahomes’ agency confirmed onits verified social media accountMonday.
  
  The 2023-2026 agreement is the most in NFL history over that timeframe and is guaranteed, his agency, Equity Sports, said.
  
  NFL Network Insiders Ian Rapoport and Tom Pelisseroreport that by the end of 2026, the deal could reach $218.1 million with escalators.
  
  The two-time NFL Most Valuable Player and the Chiefs intend to revisit the contract following the 2026 season, Equity Sports said.
  
  In July 2020, Mahomes signed a 10-year, $450 million contract extension that his agent said at the time was the most lucrative contract in sports history.
  
  Equity Sports said Mahomes has received more than $273 million in guarantees since the original 2020 deal was signed.
