title: "Toronto Blue Jays manager John Schneider saves woman from choking in restaurant"
date: "2023-02-20"
section: "Sport"
url: "https://www.cnn.com/2023/02/20/sport/john-schneider-choking-toronto-blue-jays-spt-intl"
content: |
  Toronto Blue Jays manager John Schneider saved a woman’s life after he saw her choking in a restaurant, the team announced onsocial media.
  
  Schneider and his wife, Jess, were eating at a restaurant in Dunedin, Florida, the Blue Jays said, when he noticed a woman at a nearby table was choking on her food.
  
  The 43-year-old went to her rescue and performed theHeimlich maneuver, a lifesaving response to choking which the 6-foot-3-inch Schneider said he had learned at school.
  
