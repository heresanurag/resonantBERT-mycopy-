  “But even when cities and neighborhoods have similar population densities, development patterns and materials allow some to get much hotter than others.”
  
  Extreme heat hasgripped the country’s southern tierfrom Southern California to Florida since June. And Phoenix, one of the hardest-hit cities in this summer’s scorching heat, is in its fourth week in a row of high temperatures over 110 degrees, smashing a previous record of 18 straight days.
  
  Phoenix is one of nine cities where at least 1 million people live in neighborhoods that climb 8 degrees higher than surrounding areas, the Climate Central analysis showed. More than 1.3 million residents in Phoenix are exposed to these higher temperatures.
  
  The analysis also found even more intense urban hotspots where temperatures are at least 10 degrees Fahrenheit higher than the rest of the city. Nearly 3.8 million New Yorkers, for example — 41% of the city’s population — faced temperatures at least 10 degrees Fahrenheit hotter than the city’s official readings, Climate Central found.
  
  These giant swings in temperature over short distances in cities, known as theurban heat island effect, make heat waves even worse. Areas blanketed with asphalt, buildings, industry and freeways tend to absorb the sun’s energy then radiate more heat, while areas with abundant green space — parks, rivers, and tree-lined streets — radiate less heat and provide shade.
  
  For instance, only a few miles from Manhattan’s bustling Central Park, where luxury apartments, upscale shops, green spaces and trees neatly line the neighborhood streets and provide cooling for residents, Harlem experiencessevere heat vulnerabilitydue to nearby freeways and lack of green spaces.
  
  Urban heat islandscan be deadlywhen temperatures spike. Extreme heat kills more Americans than any other weather-related disaster, according todata trackedby the National Weather Service — and climate change is making these extreme heat events more intense and frequent.
  
