title: "Millions of people in these cities are exposed to more intense heat, new report shows"
date: "2023-07-26"
section: "US"
url: "https://www.cnn.com/2023/07/26/us/urban-heat-island-cities-climate-change/index.html"
content: |
  Therecord-shattering heatthis summer has beendownright dangerousin some of the largest cities in the US. But for some, the oppressive temperatures werelikely far higher— even within the same city limits.
  
  A new analysis fromClimate Central, a non-profit research group, found that urban development increased temperatures by at least 8 degrees Fahrenheit for a total of 41 million people who live in certain pockets of 44 US cities, making them much more vulnerable to higher cooling costs, heat-related illnesses, hospitalizations and even death.
  
  “Population density alone makes cities hotter than other environments, because so much of our everyday activities, including cooling our homes and workplaces, generate heat,” Jen Brady, a senior data analyst at Climate Central who designed and led the research, told CNN.
  
