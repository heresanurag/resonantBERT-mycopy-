  “This analysis shows that planting rooftop gardens or trees at street level can make a difference, so can using lighter, more reflective surfaces for sidewalks and streets when it’s time to repave them,” Brady said.
  
  In Los Angeles, where much of the city’s land surface is heat-trapping black asphalt, and more than 3.2 million residents are exposed to the 8-degree temperature increase, city officials have installed California’s firstwhite, reflective road coatingsin some areas.
  
  In New York, an$106 million initiativeaim to coat roofs with white reflective paint, while in Chicago, localgreen roof initiativesare taking place.
  
  “The way neighborhoods are built plays a huge role in how much additional summer heat their residents are exposed to, but many can be changed to reduce their urban heat island effect,” Brady said.
