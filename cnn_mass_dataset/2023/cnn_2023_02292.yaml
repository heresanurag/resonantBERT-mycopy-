title: "Ben Platt speaks out against antisemitic protests of ‘Parade’ on Broadway"
date: "2023-02-22"
section: "Entertainment"
url: "https://www.cnn.com/2023/02/22/entertainment/ben-platt-antisemitic-protesters-parade-broadway-cec/index.html"
content: |
  Audiences at the first preview of theBroadwayrevival of “Parade,” a musical about the dangers of hatred, were met by a group of antisemitic protesters, who gathered outside the theater before the show, saidBen Platt, a Tony Award winner who stars in the musical.
  
  Ultimately, though, the group’s presence only reinforced that “now is really the moment’ to perform this show,Platt said in a videoon Instagram.
  
  Platt, who plays Leo Frank, a Jewish man who faced antisemitic hate in 1900s Georgia, said the protesters harassed audience members on their way into the theater and said hateful things about Frank, “spreading antisemitic rhetoric that led to this whole story in the first place.”
  
  Playbillreportedthat the protesters “carried signs with hateful rhetoric,” shouted at audience members waiting to enter the theater and attempted to hand out fliers.
  
  “It was definitely very ugly and scary but a wonderful reminder of why we’re telling this particular story and how special and powerful art and, particularly, theater can be,” Platt said in the video. “And it just made me feel extra, extra grateful to be the one that gets to tell this particular story and to carry on this legacy of Leo.”
  
  “Parade” follows the true story of Leo Frank, a Jewish factory superintendent in Georgia who was accused and eventually convicted of murdering a young factory employee in 1913. Though Frank maintained his innocence throughout his trial, he waskidnappedfrom prison and lynched by a mob. Per theNew Georgia Encyclopedia, his trial was a “miscarriage of justice” fueled by antisemitism in the South, among other social issues.
  
  Platt noted that security at the Bernard B. Jacobs Theatre kept the cast and audience members safe during the protests.
  
  “I just wanted the button on the evening, at least for me, personally to be to celebrate what a beautiful experience it is,” he said. “Not the really ugly actions of a few people who are spreading evil.”
  
  “Parade” producers shared astatementon Instagram condemning the antisemitic protests.
  
  “If there is any remaining doubt out there about the urgency of telling this story in this moment in history, the vileness on display in front of our theater last night should put it to rest,” they wrote. “We stand by the valiant Broadway cast that brings this vital story to life each night.”
  
  Antisemitic attackshavebeen on the risein the last few years, hitting an all-time high in 2019, according to the Anti-Defamation League. The ADLreportedearlier this year that 85% of Americans believe in at least one anti-Jewish trope, which the organization said can lead to violence against Jewish people. Celebrities includingKanye WestandKyrie Irvinghave shared antisemitic posts on social media, and former President Donald Trumpdinedwith West and White nationalist and Holocaust denier Nick Fuentes late last year.
  
  Rabbi Jeffrey Myers, who leads the Tree of Life Congregation in Pittsburgh, where 11 people were killed by a White supremacist,toldCNN last year that it’s not on victims of antisemitic hate to battle it alone.
  
  “It doesn’t end with antisemitism,” Myers said. “From antisemitism, it moves on to another minority group and another minority group until there’s no one left to call out because all of the groups are no longer around.”
