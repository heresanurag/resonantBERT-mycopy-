  “If and when this drug is approved by the FDA, it will take clinicians some time to be able to parse out how this drug may or may not be effective in their own individual patients,” especially since carriers of theAPOE4 genecould be at higher risk of side effects, Dr. Richard Isaacson, director of the Alzheimer’s Prevention Clinic in the Center for Brain Health atFlorida Atlantic University’s Schmidt College of Medicine, who is not involved in studying lecanemab or its development,said in November.
  
  More than 300 Alzheimer’s treatments are in clinical trials, according to the Alzheimer’s Association. Alzheimer’s disease was first documented in 1906, when Dr. Alois Alzheimer discovered changes in the brain tissue of a woman who had memory loss, language problems and unpredictable behaviors.
  
  The debilitating disease affects more than 6 million adults in the United States.
