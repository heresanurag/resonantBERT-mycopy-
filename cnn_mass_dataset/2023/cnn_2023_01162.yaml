title: "New image shows likely lunar crater caused by Luna 25 crash"
date: "2023-09-01"
section: "World"
url: "https://www.cnn.com/2023/09/01/world/nasa-lro-luna-25-impact-crater-scn?cid=external-feeds_iluminar_post-news"
content: |
