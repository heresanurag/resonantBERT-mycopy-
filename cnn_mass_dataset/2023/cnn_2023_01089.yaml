title: "Girl Guides of Canada rename ‘Brownies’ to be more inclusive"
date: "2023-01-12"
section: "Americas"
url: "https://www.cnn.com/2023/01/12/americas/girl-guides-canada-brownie-name-cec/index.html"
content: |
  The Canadian equivalent of theGirl Scoutsis dropping the name “Brownie,” the membership branch of some of its youngest scouts, after current and former scouts raised concern that it could harm Black members and girls of color.
  
  Now, 7- and 8-year-old members of the Girl Guides of Canada will becalled Embers, a name chosen with the help of current scouts and adult alumni. Other scouting organizations, including Girl Scouts of the USA, still use the name Brownies, but the origin of the word itself is less important than the way it made girls feel, Girl Guides of Canada CEO Jill Zelmanovitssaid in a statement.
  
  Girl Guides of Canada said it made the change after members said the former name was offensive to them: “This was a name that made them feel extremely uncomfortable, prompted teasing and racist comments and was a barrier to feeling that they belong at Girl Guides.”
  
  “Some do not want to be part of this branch because of the name,” the organizationsaid. “Some girls choose to skip this branch altogether or delay joining Girl Guides until after this branch.”
  
  📣 Our new branch name is EMBERS! 🔥 Embers are full of potential and when they work together, they can ignite a powerful flame!With this new name, we’re showing girls that what they say matters, and that Girl Guides is a place for everyone to belong.https://t.co/hXSPTW5muupic.twitter.com/BJnb1zNFne
  
  Girl Guide troops are expected to start using the Embers name immediately, per Girl Guides, with updated Embers materials and uniforms to follow.
  
  Brownies began as a membership level of the UK scouting groupGirlguiding– a Guide Association was established in 1909. The Brownies (originally called Rosebuds) came about so that girls under age 11 could participate.
  
  Many major scouting organizations in the West have adopted the name in the years to follow, including Girl Guides of Canada and the Girl Scouts of the USA. The latter organizationuses the Brownie namefor its second- and third-grade members.
  
  Both Girl Guides and Girl Scouts have pledged tobecome “anti-racistorganizations” since2020. “We are dedicated to carrying out this pledge, and we are currently evaluating all aspects of our program to ensure alignment with this commitment,” the Girl Scouts of the USA said in a statement to CNN.
  
  The group noted that it supported its “sister organizations throughout the world in making decisions that best reflect the wellness and intentions of their communities, and most importantly, girls.”
