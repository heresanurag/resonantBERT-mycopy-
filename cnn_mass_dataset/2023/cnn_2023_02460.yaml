title: "Britney Spears’ husband Sam Asghari files for divorce"
date: "2023-08-17"
section: "Entertainment"
url: "https://www.cnn.com/2023/08/17/entertainment/britney-spears-sam-asghari-divorce/index.html"
content: |
  Britney Spears and Sam Asghari are getting divorced after 14 months ofmarriage.
  
  Asghari, an actor and personal trainer, filed a petition to end the marriage with the Los Angeles Superior Court on Wednesday, citing “irreconcilable differences,” according to a copy of filing obtained by CNN. The date of separation for the couple is July 28, the petition states.
  
  Spears and Asghari wed in June of last year after becomingengagedin September 2021. The pair first met in 2016 when Asghari co-starred with Spears in the music video for her single “Slumber Party.”
  
  The pair wed just seven months after the court-ordered conservatorship that Spears had been under for 13 years wasendedby a Los Angeles judge in a landmark court hearing.
  
  This is the singer’s third divorce.
  
  Spears previously was married to Jason Alexander, a childhood friend, for about 55 hours in 2004 before the marriage was annulled. She was also married to dancer Kevin Federline beforefilingfor divorce in 2006. The singer and Federline share two sons, Sean Preston, 17, and Jayden James, 16.
  
  At the time of her nuptials to Asghari, Spears wrote in anInstagram postthat their wedding was “the most spectacular day.” Asghari last shared a post featuring Spears on his Instagram on Valentine’s Day.
