title: "America’s CEOs don’t have the stomach for Trump’s promised revenge tour"
date: "2024-10-29"
section: "Business"
url: "https://www.cnn.com/2024/10/29/business/ceos-trump-revenge-nightcap/index.html"
content: |
  A version of this story appeared in CNN Business’ Nightcap newsletter. To get it in your inbox, sign up for free,here.
  
  If reelected, Donald Trump has made clear that he plansto exact revengeon the people and institutions he perceives as a threat. His “enemies” list seems to be constantly growing as the election nears, and includes Democratic politicians, the media, lawyers and political donors who he believes were“involved in unscrupulous behavior.”
  
  Any CEO with a memory of Trump’s first term knows that it’s wise to take those threats seriously, as the president didn’t hesitate to sound off and, witha single tweet, sink a company’sstockor spark aboycott.
  
  While dozens of American business leaders — yourReid Hoffmans, your Mark Cubans, etc. — have used their money and powerto resist that kind of bullyingand endorse Vice President Kamala Harris, others are choosing to bend the knee. Or to keep just quiet enough to avoid being becoming a target.
  
  Trump threatened John Deere. It’s just his latest attempt to bully a legendary American company
  
  Jeff Bezos, owner of The Washington Post, didn’t endorse Trump explicitly. Instead, heblocked the paper’s editorial pagefrom endorsing any candidate for the first time in decades — a not-at-all subtle nod to the Republican nominee, and one that legendary former Post editor Marty Baron called an act of cowardice. That move came shortly after the billionaire owner of the Los Angeles Times, Patrick Soon-Shiong,vetoed his editorial board’sendorsement of Harris.
  
  Baron, who retired from the Post in 2021, on Saturday told CNN’s Michael Smerconish that Trump has threatened Bezos “continually,” but that Bezos had previously resisted that pressure.
  
  “I was very grateful … for his willingness to stand up to the pressure from Donald Trump in 2015 … until now. But the fact is that Bezos has other commercial interests,” including a large stake in Amazon and a private space company, Blue Origin.
  
  Jeff Bezos defends Washington Post non-endorsement after subscribers flee and staffers resign
  
  And Blue Origin, of course, competes directly with SpaceX, the rocket maker owned by outspoken Trump supporter Elon Musk, for government contracts.
  
  “Trump rewards his friends and he punishes his perceived political enemies, and I think there’s no other explanation for what’s happening right now,” Baron said.
  
  To be clear: What Bezos and Soon-Shiong did here, under a guise of neutrality, is take a very loud position. No Washington Post or LA Times editorial, with all due respect to those institutions, was ever going to meaningfully sway the electorate. But pulling them creates news, and it’s news for an audience of one.
  
  (And for Bezos, at least, it may also turn out to be a shockingly bad business decision. AsNPR’s David Folkenflik reportedMonday, some 200,000 people had canceled their digital subscriptions to the paper — about 8% of its subscriber base — over the decision.)
  
  Late Monday,Bezos defendedthe move inan op-ed, writing that there was “no quid pro quo of any kind” behind his decision and claimed that the timing, less than two weeks before Election Day, was due to “inadequate planning, and not some intentional strategy.”
  
  Other rich executives are doing diplomacy behind the scenes, as my colleaguesSteve Contorno and Alayna Treene reported:
  
  Executives have plenty to worry about under a Trump 2.0 White House, particularly when it comes to trade policies that would force American companies to pay exorbitant markups to the US government for supplies imported from overseas. On top of that, Trump has promised to deport millions of undocumented immigrants, potentially creating a labor shortage, and to put himself in a position to influence interest-rate policy.
  
  That’s why88 business leaderslast month endorsed Harris.
  
  But in a race this close, many executives are hedging their bets. Sticking their necks out to express their concerns doesn’t really benefit anyone if Trump wins and decides to do, like, all the things he has repeatedly promised to do. On the other hand, a little back-channeling and olive-branch-extending could give business leaders and their companies some goodwill in an administration helmed by a notoriously impulsive, vengeful leader.
  
  In a business world that craves certainty and economic stability, executives may be telling themselves that their silence is purely a business decision. But staying quiet is a choice, and it’s not a neutral one when you’re a billionaire with real power.
