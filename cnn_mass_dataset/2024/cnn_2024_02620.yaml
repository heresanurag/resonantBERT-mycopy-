title: "5 things to know for Nov. 27: Tariffs, Middle East, Disney settlement, Anti-obesity drugs, Cargo plane crash"
date: "2024-11-27"
section: "US"
url: "https://www.cnn.com/2024/11/27/us/5-things-to-know-for-nov-27-tariffs-middle-east-disney-settlement-anti-obesity-drugs-cargo-plane-crash/index.html"
content: |
  Thanksgiving means family, friends, food — and packed airports. The holiday rush is in full swing across the US as last-minute travelers try to reach their destinations inunappetizing weather conditions. Wherever you are, we hope you enjoy this festive, albeit busy, time of year! 5 Things AM will return bright and early on Monday.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  Trade is a key issue for President-elect Donald Trump, who has promised to slap new tariffs on goods from Mexico, Canada and China starting on the first day of his administration. Mexican President Claudia Sheinbaumresponded Wednesday, saying that “neither threats nor tariffs” will solve the immigration or illegal drug issues in the US. Sheinbaum added that the economic strength of North America lies inmaintaining the business relationshipbetween the two countries, which allows them to be more competitive compared to other economic blocs. If Trump follows through with his tariff plan,several common goodswill get more expensive for Americans, including gas, produce, cars and alcohol, economists say.
  
  Displaced residents began returning to their homes in Lebanon today after a ceasefire in the war between Israel and Hezbollah went into effect. The truce could bring an end to the 13-month border conflict that has killed thousands. The deal stipulates a60-day halt in hostilities, which negotiators have described as the foundation of a lasting truce. In that time, Hezbollah fighters are expected to retreat 25 miles from the Israel border, while Israeli ground forces should withdraw from Lebanese territory. But there are questions abouthow long the truce may hold. Israel insists that it will take military action in response to any breach of the agreement. That could reignite the conflict, putting US-backed diplomatic efforts in jeopardy.
  
  Disney has agreed to pay $43 million to settle a lawsuit that it paid female employees less than their male counterparts in similar roles for nearly a decade. The settlement agreement stems from a 2019 lawsuit filed by LaRonda Rasmussen. She claims she learned that six men with the same job titleearned substantially more than her, including one man with several years less experience, who was earning $20,000 a year more than she did. About 9,000 women, who were both former and current employees, joined the lawsuit. Disney disputed the allegations and didn’t admit fault.
  
  Millions more senior citizens and lower-income Americans could obtain coverage for costly anti-obesity drugs under a proposal unveiled Tuesday by the Biden administration. Some 3.4 million Medicare beneficiaries and about 4 million Medicaid recipients wouldgain access to these medications, which can cost as much as $1,000 a month for the uninsured. Some Medicare enrollees could see their out-of-pocket costs drop by as much as 95%. Although Medicare by law is not allowed to cover drugs for weight loss, the Centers for Medicare and Medicaid Services says it is proposing toreinterpret the statuteto allow coverage for the treatment of obesity as a chronic disease. The expanded coverage could potentially go into effect in 2026.
  
  German leaders raised the possibility that a fiery cargo plane crash in Lithuania on Monday was the result of sabotage or hybrid warfare. The plane that crashed was a Swiftair aircraft “operating under contract for DHL,” the logistics company told CNN. It was flying from Leipzig, Germany, and was due to land at Vilnius Airport when itcrashed a few kilometers from the runway. Asked on Monday whether the crash was the result of hybrid warfare, German Chancellor Olaf Scholz told public broadcaster ZDF: “We are looking at this closely, we can’t say at the moment, but it could be so — there are very many bad forms of hybrid warfare that we are seeing in Germany.” Meanwhile, Lithuanian authorities downplayed the prospect of nefarious activity, insisting that no evidence pointing to sabotage had yet been uncovered.
  
  Wildlife Photographer of the Year People’s Choice finalists announcedA prowling puma, a hunting polar bear cub and a ghostly barn owl are amongthe shortlisted imagesfor the Wildlife Photographer of the Year People’s Choice Award 2024.
  
  Subway CEO John Chidsey is stepping down at the end of the yearChidsey’s departure marks another entry on the list of fast food chain CEOs who havestepped down this year, including Starbucks, Chipotle, Shake Shack and Wendy’s.
  
  ‘Lilo & Stitch’ live-action movie to crash into theaters next summerDisney released anew teaser trailerfor the upcoming live-action version of “Lilo & Stitch.” The film will hit theaters in the summer of 2025.
  
  Huawei’s new Chinese smartphone takes on Apple and AndroidHuawei unveiled a new flagship phone boastingentirely homegrown softwarethat aims to give users an alternative to Google’s Android or Apple’s iOS.
  
  Former CEO says don’t obsess over your career pathIndra Nooyi, highly regarded in her role as PepsiCo’s CEO from 2006-2018, shares some career advicein this short video.
  
  How well do you know Thanksgiving facts and foods? Don’t be a chicken; test your knowledge with CNN’s Thanksgiving quiz!
  
  Turkey is typically the centerpiece of Thanksgiving dinner. Which US state raises the most turkeys?A. ArkansasB. IndianaC. MinnesotaD. North Carolina
  
  $2.5 millionThat’s how much a painting of a dog by British artist George Stubbs is expected to fetch at a London auction next week. The 18th-century artwork titled“The Spanish Pointer”was first auctioned in 1802, when it sold for just £11 — or $14.
  
  “I am proud of the race we ran, and your role in this was critical. What we did in 107 days was unprecedented.”
  
  — Vice President Kamala Harris, addressing a group of her supporters during a call on Tuesday. The leaders of Harris’ presidential campaign in a newly released interviewblamed a variety of external factorsfor the Democrat’s defeat three weeks ago.
  
