title: "Jason Sudeikis cheers on Caitlin Clark at NCAA game and talks about his love for women’s basketball"
date: "2024-04-06"
section: "Entertainment"
url: "https://www.cnn.com/2024/04/06/entertainment/jason-sudeikis-womens-basketball-ncaa-game/index.html"
content: |
  College basketball starCaitlin Clarkhas a fan in beloved actor and sports fanaticJason Sudeikis.
  
  The “Ted Lasso” star attended Friday’s Final Four NCAA women’s basketball match to watch Clark’s team, the Iowa Hawkeyes, play the Connecticut Huskies.
  
  The No. 1 Hawkeyes earned a return to the women’s NCAA tournament national championship game after defeating No. 3 UConn in a nailbiter finish, winning 71-69 in Friday night’s game.
  
  During the game, Sudeikis shared more about what drew him to women’s sports andbasketball on ESPN’s “The Bird and Taurasi Show.”
  
  “It started with getting the opportunity to be in the UK when the England national women’s teamwon the Euro,” he said, referencing England winning its first-ever major women’s championship in 2022 while he was across the pond filming “Lasso.”
  
  He also said one of his sisters played college basketball and “we grew up watching sports.” And, he added, “having a daughter is a big part of it.”
  
  Sudeikis previously attended thehighly anticipatedElite 8 game earlier this month, where he watched Clark lead the Iowa Hawkeyes to a 94-87 victory over the LSU Tigers.
  
  Donning a sweatshirt that had “Everyone Watches Women’s Sports” written on the back, Sudeikis was seen infootageposted to social media cheering on Clark from the sidelines and giving her a congratulatory hug after that game.
  
  Having grown up in Kansas City, Sudeikis is known to cheer for his hometown teams in professional leagues, but he has previously showcased his support of women’s sports beyond the message written on his sweatshirt that he wore at the Elite 8 game.
  
  In December, Sudeikis was seen sitting next to WBNA legend Sue Bird to watch Iowa play against Bowling Green, and he hasattendeda number of New York Liberty WBNA games with his family.
  
  He also made a memorableappearanceon “The Bird and Taurasi Show” last year, which his two kids – Otis, 9, and Daisy, 7, who he shares with ex Olivia Wilde – hilariously crashed.
  
  Iowa will next play the South Carolina Gamecocks in the national championship game on Sunday. Last year, the Hawkeyes lost to the LSU Tigers in the title game.
