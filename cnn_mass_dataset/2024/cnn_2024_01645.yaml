title: "Merrick Garland to briefly hand off attorney general duties while he undergoes back surgery"
date: "2024-01-29"
section: "Politics"
url: "https://www.cnn.com/2024/01/29/politics/merrick-garland-back-surgery-attorney-general-duties/index.html"
content: |
  Attorney GeneralMerrick Garlandis scheduled to undergo back surgery on Saturday and delegate his duties for a time during the procedure, according to a Justice Department spokesperson.
  
  The procedure is minimally invasive, department spokesperson Xochitl Hinojosa said in a statement, and Garland, 71, is likely to go home the same day.
  
  When Garland is under general anesthesia for the procedure, which lasts about 90 minutes, Deputy Attorney General Lisa Monaco will assume his duties.
  
  While Garland’s announcement follows the typical protocol for top government officials, such medical absences have come into the spotlight afterDefense Secretary Lloyd Austin’s recent hospitalizationwas not disclosed to the media or to President Joe Biden and other senior administration officials for days.
  
  The defense secretary returned to workat the Pentagon on Monday. He was admitted to the hospital on New Year’s Day due to complications from surgery to treat prostate cancer in late-December.
  
  After Austin’s unannounced hospitalization raised major questions about transparency and communications within the Biden administration, the White Houseissued new guidelinesfor agency notification of key absences following its review of each federal agency’s plans for “delegation of authority” when a Cabinet member is unable to perform his or her duties.
  
  Additionally, Austin’s chief of staff directed a 30-day review of the Pentagon’s processes and procedures for notifying senior national security leaders and the White House when the defense secretary needs to transfer authorities to the deputy secretary, which was required during Austin’s hospitalization. The Defense Department inspector general also launched a separate investigation into whether the Pentagon had the appropriate policies in place to ensure an effective transfer of power and duties.
