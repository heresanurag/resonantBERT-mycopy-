title: "Chinese owner denies it’s willing to sell TikTok as US ban looms"
date: "2024-04-25"
section: "Business"
url: "https://www.cnn.com/2024/04/25/business/bytedance-denies-reports-selling-tiktok-intl-hnk/index.html"
content: |
  TikTok’sChinese parent companyByteDance said Thursday that it has no plans to sellthe social media platform, its first official response on the fraught issue since President Joe Bidensigned a billthat could lead to a nationwide ban of the wildly popular app.
  
  “Foreign media reports that ByteDance is exploring the sale of TikTok are untrue,” the Beijing-based company said in a statement on Toutiao, a news aggregation app that it owns and is popular in mainland China.
  
  “ByteDance doesn’t have any plan to sell TikTok,” it said.
  
  Banning TikTok would hit China’s tech ambitions and deepen the global digital divide
  
  The statement was in direct response to an article bythe Informationon Thursday that said Bytedance was exploring scenarios for selling TikTok’s US business without the algorithm that recommends videos to TikTok users.
  
  In the statement, Bytedance attached screenshots of the Information’s report, which cited three people with knowledge of deliberations.
  
  Until now Beijing-based ByteDance, the parent company of TikTok and a host of other apps, had remained quiet on this week’s legislation in the US pushing for a forced sale. Chinese authorities have also been muted since the bill was signed into law despite Beijing previously making clear it would oppose any such measure.
  
  Congress passed the bill this week as part of a wide-ranging foreign aid package to support Israel and Ukraine. It wasapproved by the Houseon Saturday, and bythe Senateon Tuesday.
  
  The legislation poses the most serious risk to TikTok since US officials beganraising concerns about the app in 2020. Under what is now US law, TikTok is forced to find a new owner within months or be banned from the United States entirely, its biggest market with 170 million users.
  
  On Wednesday, TikTok’s CEO Shou Chew said the company would fight in the courts to stay online in the US.
  
  “Rest assured, we aren’t going anywhere,” he said in avideoposted on the app.
  
  Wait, is TikTok really Chinese?
  
  The Chinese government has previouslysaidit strongly opposes a forced sale of TikTok, andhas the legal abilityto do so. It views TikTok’s technology as highly valuable and has taken steps since 2020 to ensure it can veto any sale by ByteDance.
  
  TikTok’salgorithms, which keep users glued to the app, are believed to be key to its success. The algorithms give recommendations based on users’ behavior, thus pushing videos they want to watch.
  
  US lawmakers have long beenconcerned aboutBeijing’s influence over the app. In particular, they worry that TikTok could share data with the Chinese government or manipulate content displayed on its platform. So far, there’s little evidence to support these concerns.
  
  But as a China-based company, ByteDance is subject to a myriad of national intelligence, data security and cybersecurity laws.
  
  In 2018, China amended its National Intelligence Law, which requires any organization or citizen to support, assist and cooperate with national intelligence work. That means ByteDance is legally bound to help with gathering intelligence.
  
  As a result,a number of countries have bannedofficials from downloading TikTok onto their phones, but the US law is one of the most sweeping measures taken so far.India banned TikTok entirely in 2020.
