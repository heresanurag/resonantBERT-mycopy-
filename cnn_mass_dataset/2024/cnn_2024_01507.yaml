title: "Snoop Dogg will be one of the final torchbearers at the Paris Olympics"
date: "2024-07-23"
section: "Sport"
url: "https://www.cnn.com/2024/07/23/sport/snoop-dogg-paris-olympics-torchbearer-spt-intl/index.html"
content: |
  American rapper and actorSnoop Doggwill be one of the final torchbearers of theOlympicflame ahead of the Games’ Opening Ceremony in Paris on Friday.
  
  Snoop Dogg, whose full name is Calvin Cordozar Broadus Jr., will carry the torch through the neighborhood of Saint-Denis,accordingto the town’s mayor, Mathieu Hanotin.
  
  BTS member Jin to participate as South Korea torchbearer in Paris 2024 Olympic torch relay
  
  Hanotin said that Saint-Denis is the final stop of the Olympic flame’s journey before it reaches the Eiffel Tower.
  
  Snoop Dogg has already arrived in Paris,tweetinga photo on Tuesday of himself in the Olympic host city with the caption: “U ready? Paris 2024 Olympics ya digggg.”
  
  The rapper will also be involved in NBCUniversal’s coverage, with an NBCstatementlast December outlining that he will provide “regular reports” and “explore the city’s iconic landmarks” for the network’s prime time shows on NBC and Peacock.
  
  “I grew up watching the Olympics and am thrilled to see the incredible athletes bring their A-game to Paris. It’s a celebration of skill, dedication, and the pursuit of greatness,” Snoop Dogg said in the December NBC statement.
  
  He also made an appearance at the US Olympic trials in Eugene, Oregon, earlier this month, running a 200-meter exhibition race in 34.44 seconds.
