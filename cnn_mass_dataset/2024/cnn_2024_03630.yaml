title: "Ancient lord’s tomb found filled with gold and multiple sacrificial bodies"
date: "2024-03-13"
section: "World"
url: "https://www.cnn.com/2024/03/13/world/ancient-tomb-gold-artifacts-panama-scn/index.html"
content: |
