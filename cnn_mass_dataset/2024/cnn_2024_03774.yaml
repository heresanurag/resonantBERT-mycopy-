  As of March 7,the CDC said, 45 cases have been reported in 17 jurisdictions across the country this year. For all of last year, there were 58 cases in the US.
  
  About 92% of US children have been vaccinated against MMR by age 2, according to a2023 reportfrom the CDC – below the federal target of 95%.
  
  The percentage of kindergartners who got their state-required vaccines for measles also remained below the federal target for the 2022-23 school year, according to CDCdata. And the rate of vaccine exemptions for children has reached the highest level ever reported in the US.
  
  Children should get two doses of the MMR vaccine, according to the CDC: the first dose at 12 to 15 months of age and the second at 4 to 6 years of age.
  
  Before thenation’s measles vaccination program, about 3 million to 4 million people got the virus every year, and about 400 to 500 died.
