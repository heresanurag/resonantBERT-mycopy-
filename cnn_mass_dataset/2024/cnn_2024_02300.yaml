id: cnn_2024_02300
title: "Sudan’s army launches push to retake ground in capital"
date: "2024-09-26"
section: "Africa"
url: "https://www.cnn.com/2024/09/26/africa/sudan-army-clashes-khartoum-rsf-intl/index.html"
content: |
  Sudan’s armylaunched artillery and airstrikes in the capital on Thursday in its biggest operation to regain ground there since early in its 17-month war with the Rapid Support Forces (RSF), witnesses and military sources said.
  
  The push by the army, which lost control of most of the capital at the start ofthe conflict, came ahead of an address by its commander, General Abdel Fattah al-Burhan, at the United Nations General Assembly in New York later in the day.
  
  Witnesses reported heavy bombardments and clashes as army troops tried to cross bridges across the Nile connecting the three adjoining cities that make up the greater capital, Khartoum, Omdurman and Bahri.
  
  “The army is carrying out heavy artillery strikes and air strikes on Halfaya and Shambat,” Ahmed Abdalla, a 48-year-old resident told Reuters by phone, referring to areas of Bahri close to the river. “The sounds of explosions are very loud.”
  
  Video footage showed black smoke rising above the capital and the booms of the battle could be heard in the background.
  
  Army sources said their forces had crossed bridges in Khartoum and Bahri. The RSF told Reuters it had thwarted the army’s attempt to cross two bridges to Khartoum. Reuters could not independently confirm the accounts.
  
  Though the army retook some ground in Omdurman early this year, it depends mostly on artillery and airstrikes and has been unable to dislodge nimble RSF ground forces embedded in other parts of the capital.
  
  The RSF has also continued to make advances in other parts of Sudan in recent months in a conflict that has caused a vast humanitarian crisis, displacing more than 10 million people and driving parts of the country to extreme hungeror famine.
  
  Diplomatic efforts by the United States and other powers have faltered, with the army refusing to attendtalks last monthin Switzerland.
  
  This month the battle for control of al-Fashir, the capital of North Darfur state in the west of Sudan, has also intensified as the RSF has tried to advance from positions surrounding the city against the army and allied former rebel groups.
  
  Al-Fashir is the last army holdout across the Darfur region, where the U.N. and rights groups say the RSF and allies have led ethnically-targetted attacks and the humanitarian situation isparticularly critical. The RSF has denied being behind the violence.
  
