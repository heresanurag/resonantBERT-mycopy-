title: "Two US Navy SEALs missing off the coast of Somalia are dead, officials say"
date: "2024-01-21"
section: "Politics"
url: "https://www.cnn.com/2024/01/21/politics/navy-seals-dead-somalia/index.html"
content: |
  The two US Navy SEALswho went missingoff the coast of Somalia on January 11 are dead, US Central Command said after searching for them for 10 days.
  
  “We regret to announce that after a 10-day exhaustive search, our two missing U.S. Navy SEALs have not been located and their status has been changed to deceased,” Central Command said in a statement Sunday. “Out of respect for the families, no further information will be released at this time.”
  
  CENTCOM added that teams from the US, Japan and Spain searched more than 21,000 square miles to try to locate the two missing SEALs. The two sailors were boarding a vessel in search of illicit Iranian weaponswhen one fell into the water due to eight-foot swells, and the second jumped in after them according to protocol, CNN previously reported.
  
  “We mourn the loss of our two Naval Special Warfare warriors, and we will forever honor their sacrifice and example. Our prayers are with the SEALs’ families, friends, the U.S. Navy, and the entire Special Operations community during this time,” said Gen. Michael Erik Kurilla, US CENTCOM commander.
  
  “We mourn the loss of our two brave Navy SEALs, and our hearts are with their families,” Defense Secretary Lloyd Austin said in a statement Sunday. “The entire Department is united in sorrow today. We are grateful to all who worked tirelessly to try to find and rescue them.”
  
  The US maintains a small military presence in Somalia that focuses on the threat of theal-Shabaabmilitant group, an extremist Islamist organization that has carried out attacks against the Somali government. The US recognizes al-Shabaab as a terrorist organization.
  
  In addition to training Somali forces, the US has also coordinated with the Somali government tocarry out strikes against al-Shabaab.
  
  According to US Africa Command, “Al-Shabaab is the largest and most kinetically active al-Qaeda network in the world and has proved both its will and capability to attack U.S. forces and threaten U.S. security interests.”
  
  This story has been updated with additional information.
