title: "Fact check: Six days of Trump lies about the Hurricane Helene response"
date: "2024-10-06"
section: "Politics"
url: "https://www.cnn.com/2024/10/06/politics/fact-check-trump-helene-response-north-carolina?cid=external-feeds_iluminar_google"
content: |
  Former President Donald Trump has delivered a barrage of lies and distortions about the federal response to Hurricane Helene.
  
  While variousmisinformationabout the responsehas spread widely without Trump’s involvement, the Republican presidential nominee has been one of the country’s leading deceivers on the subject. Over a span of six days, in public comments and social media posts, Trump has used his powerful megaphone to endorse or invent false or unsubstantiated claims.
  
  The chief targets of his hurricane-related dishonesty have been Vice President Kamala Harris, his opponent in the November presidential election, and President Joe Biden.
  
  Monday: Trump falsely claims Biden hasn’t answered calls from Georgia’s governor
  
  During a visit to Georgia on Monday, Trumpsaidof Georgia Gov. Brian Kemp: “He’s been calling the president, hasn’t been able to get him.”
  
  It was immediately clear that Trump’s claim was false. Kemp, a Republican,told reportersearlier Monday that he had spoken with Biden the day prior — and that it was Kemp who had initially missed a call from Biden, not the other way around.
  
  Kemp told reporters that he had successfully called Biden right back. Kemp added: “He just said, ‘Hey, what do you need?’ And I told him, you know, ‘We got what we need. We’ll work through the federal process.’ He offered that if there’s other things we need, just to call him directly, which — I appreciate that. But we’ve had FEMA embedded with us since a day or two before the storm hit in our state operations center in Atlanta; we’ve got a great relationship with them.”
  
  Monday: Trump cites baseless ‘reports’ about anti-Republican bias in the North Carolina response
  
  In a social mediaposton Monday, Trump said of North Carolina: “I’ll be there shortly, but don’t like the reports that I’m getting about the Federal Government, and the Democrat Governor of the State, going out of their way to not help people in Republican areas.”
  
  It’s unclear what “reports” Trump might have been getting, but there was no apparent basis for the underlying claim that the Biden administration and North Carolina Gov. Roy Cooper were maliciously abandoning certain communities out of partisan bias.Trumpprovided no evidencewhen a reporter pressed him later in the day.
  
  Thursday: Trump falsely claims the Biden-Harris response had received ‘universally’ negative reviews
  
  Trumpwrotein a social media post on Thursday that Biden and Harris “are universally being given POOR GRADES for the way that they are handling the Hurricane, especially in North Carolina.”
  
  Thatwasn’t even close to accurate. Though the Biden administration’s response had certainly received criticism, it had also been praised by various state and local leaders — including theRepublicangovernorsof some of the affected states and the Democratic governor of North Carolina, plus local leaders including the Democratic mayor of the hard-hit North Carolina city of Asheville.
  
  For example, Republican South Carolina Gov. Henry McMastersaidat a Tuesday press conference that federal assistance had “been superb,” noting that Biden and Transportation Secretary Pete Buttigieg had both called and told him to let them know whatever the state needed. McMaster also said FEMA Administrator Deanne Criswell had called.
  
  Thursday: Trump falsely claims Harris spent ‘all her FEMA money’ on housing illegal migrants
  
  At a campaign rally in Michigan on Thursday, Trumpclaimedthat “Kamala spent all her FEMA money, billions of dollars, on housing for illegal migrants, many of whom should not be in our country.” He added in an election-related conspiracy theory,saying, “They stole the FEMA money, just like they stole it from a bank, so they could give it to their illegal immigrants that they want to have vote for them this season.”
  
  First, there is zero basis for Trump’s suggestion that the Biden administration is running some sort of scheme to get undocumented immigrants to vote illegally in the 2024 election. Voting by noncitizens is a felony.
  
  Second, there is zero basis for claiming that FEMA disaster assistance money was stolen — by anyone, let alone Harris personally — for the housing of migrants.
  
  Congress appropriated $650 million in the 2024 fiscal year to fund aprogramthat helps state and local governments house migrants — andinstructedUS Customs and Border Protection to transfer that $650 million to FEMA to administer the program. But this $650 million pot isentirely distinctfrom FEMA’s pot of disaster relief funds; as theDepartment of Homeland Security,the White Houseand independent observers noted this week, they’re just two separate things funded separately by Congress.
  
  Congress appropriated more than $35 billion in disaster relief funds for fiscal 2024, according toofficial FEMA statistics.
  
  Friday: Trump falsely claims $1 billion was ‘stolen’ from FEMA for migrants and has gone ‘missing’
  
  Though Trump’s Thursday claim about FEMA money and migrants had already been debunked by Friday, Trumprepeated the claim to reportersat leasttwiceon Friday — and then said itagainat a Friday night town hall event in North Carolina.
  
  Saturday: Trump falsely claims the federal government is only giving $750 to people who lost their homes
  
  At a campaign rally in Pennsylvania on Saturday, Trump strongly suggested that Americans who lost their homes in the hurricane were only being offered $750 in federal aid.
  
  “They’re offering them $750, to people whose homes have been washed away. And yet we send tens of billions of dollars to foreign countries that most people have never heard of. They’re offering them $750. They’ve been destroyed, these people have been destroyed,” Trumpsaid. He added, “Think of it: We give foreign countries hundreds of billions of dollars and we’re handing North Carolina $750.”
  
  Trump’s claim is wrong. As FEMA explained earlier in the weekon social mediaandon a web pageit created to combat misinformation about the response, $750 is merely theimmediate, upfrontaid survivors can get to cover basic, pressing needs like food, water, baby formula and emergency supplies. Survivors are also eligible to apply for additional forms of assistance, such as to pay for temporary housing and home repairs, that can be worth thousands of dollars; thecurrent maximum amount for home repair assistance, for example, is $42,500.
  
  During Harris’ visit to Georgia on Wednesday, shesaid, “And the federal relief and assistance that we have been providing has included FEMA providing $750 for folks who need immediate needs being met, such as food, baby formula, and the like. And you can apply now.” But she added just moments later, “FEMA is also providing tens of thousands more dollars for folks to help them be able to deal with home repair, to be able to cover a deductible when and if they have insurance, and also hotel costs.”
  
  It’s also worth noting that this hurricane-related assistance to individual residents is separate from the hurricane-related assistance the federal government will provide to state governments. For example, the federal transportation departmentannounced Saturdaythat it was immediately providing $100 million to North Carolina’s transportation department “to help pay for the costs of immediate emergency work resulting from Hurricane Helene flood damage.” Buttigieg added that this emergency funding “will be followed by additional federal resources.”
  
  Saturday: Trump falsely claims there are ‘no helicopters, no rescue’ in North Carolina
  
  Trump, criticizing Harris forparticipating ina political fundraising event in California the last weekend of September,saidat the Saturday rally in Pennsylvania: “Kamala wined and dined in San Francisco, and all of the people in North Carolina — no helicopters, no rescue — it’s just — what’s happened there is very bad.”
  
  This claim about North Carolina is false. There have been numerous government and private helicopters and other aircraft involved in rescue and aid efforts in North Carolina, though some residents died before they could be rescued and a significant number of residents haveremained missing or stranded for days.
  
  The North Carolina National Guardannounced Thursdaythat its own air assets had “completed 146 flight missions, resulting in the rescue of 538 people and 150 pets.”  The Washington Postreported Friday: “The drone of helicopters has become routine across western North Carolina in the wake of Helene. National Guard and civilian aircraft now crisscross the skies of a region where roads and bridges have been destroyed and people are trapped. The helicopters are delivering supplies, picking up people who need rescuing, dropping off firefighters and search-and-rescue crews and radioing for assistance for others who can be more easily accessed from the ground.“
