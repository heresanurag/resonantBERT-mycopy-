title: "FAA to take a closer look at United after a series of incidents"
date: "2024-03-22"
section: "Business"
url: "https://www.cnn.com/2024/03/22/business/faa-united-airlines-safety-incidents?cid=external-feeds_iluminar_yahoo"
content: |
  The Federal Aviation Administration will take a closer look at safety at United Airlines after a string of nearly a dozen incidents this month, the airline said in a memo Friday.
  
  “Over the next several weeks, we will begin to see more of an FAA presence in our operation as they begin to review some of our work processes, manuals and facilities,” United said in a memo to employees obtained by CNN. The review means an “even closer look at multiple areas of our operation to ensure we are doing all we can to promote and drive safety compliance.”
  
  United CEO tries to reassure customers following multiple safety incidents
  
  On March 15, a United Boeing 737-800 landed in Medford, Oregon,missing an external panel.
  
  While no passengers were injured, the incident was just one in a line of recent mishaps on United flights – all involving Boeing jets. In justthe last month, another United Boeing plane spewed flames from an engine after taking off, one slid off the runway, one lost a wheel during takeoff, and yet another trailed hydraulic fluid.
  
  “The number of safety-related events in recent weeks have rightfully caused us to pause and evaluate whether there is anything we can and should do differently,” the United employee memo said.
  
  In a statement, the FAA said its “safety assurance system routinely monitors all aspects of an airline’s operation. It focuses on an airline’s compliance with applicable regulations; ability to identify hazards, assess and mitigate risk; and effectively manage safety.”
  
  Boeing, the manufacturer of the vast majority of the jetsthat United Airlines uses, is also in the spotlight following a series of dramatic incidents involving its planes. The most notable istheAlaska Airlines Boeing 737 Max 9plane that lost a door plug mid-flight on January 5, leaving a hole in the side of the plane. Last week, a LATAM Airlines flight from Sydney, Australia, to Auckland, New Zealand, plunged in mid-air suddenly, causing some passengers to be injured as they were thrown to the ceiling of the cabin.
  
  Both incidents are still under investigation, but an early report from the National Transportation Safety Board found that Boeing may haveleft bolts offthe Alaska Air jet. Boeing has suggested that the LATAM plunge may have been caused by anincident in the cockpitrather than by the plane’s controls.
  
  Still, United Airlines CEO Scott Kirby has said he would look into the possibility ofbuying more jets from Airbus, Boeing’s European competitor.
  
  - CNN’s Pete Muntean and Chris Isidore contributed to reporting.
