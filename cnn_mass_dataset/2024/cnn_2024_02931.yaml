  It is unclear why the construction worker was shot, according to Criss, who said there was “no reason” as far as police could tell.
  
  All city buildings and local schools were placed on lockdown Friday before the suspect’s arrest, including 11 schools and a learning center.
  
  The three victims were taken to the hospital. A male victim, one of the two people shot at the first location, died from his injuries. The other two victims were taken into surgery.
  
  It is unclear if Baymon has obtained an attorney at this time.
  
  This story has been updated with additional developments.
