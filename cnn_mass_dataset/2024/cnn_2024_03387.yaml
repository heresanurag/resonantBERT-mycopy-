title: "Red Lobster may soon have a new owner"
date: "2024-07-24"
section: "Business"
url: "https://www.cnn.com/2024/07/24/business/red-lobster-may-soon-have-a-new-owner/index.html"
content: |
  Two months afterfiling for bankruptcy, Red Lobster is close toemergingwith a new owner.
  
  Red Lobster said this week in a courtfilingthat it will accept an existing sale offer from Fortress Credit Corp., a lender experienced in restaurant management, after the seafood chain did not receive any other acquisition bids. A hearing has been set for next week for a judge to approve the sale.
  
  Fortress is one of Red Lobster’s largest lenders and has financed the restaurant chain’s operations, including a new $100 million loan that allowed Red Lobster to stay afloat during its bankruptcy proceedings. Fortress is an investment fund and owns restaurant chains such as Krystal, Logan’s Roadhouse and J. Alexander’s through a hospitality arm of the fund.
  
  Red Lobster has closed around 100 restaurants in recent months and has said itwants to close several dozen morelocations. It has around 600 restaurants remaining.
  
  The forgotten racial history of Red Lobster
  
  Mismanagement, competition, inflation and other factors brought down Red Lobster, which has been a pioneer in the restaurant industry. Thai Union, a global seafood supplier, became Red Lobster’s leading shareholder in 2020.
  
  Under Thai Union’s leadership,Red Lobster’s culture turned toxic,former leaders told CNN. Red Lobster cut costs, removed longtime suppliers and implemented strategies that backfired, such as making $20 endless shrimp a permanent menu item. Red Lobsterlost $11 millionon the endless shrimp deal.
  
  Red Lobster said in its bankruptcy filing that it was investigating the decision made under Thai Union to implement the endless shrimp promo and whether it was improperly done to drive more business to Thai Union. (Thai Union has previously called the accusations “meritless.”)
  
  Thai Union in January announced its intention todivest from Red Lobsterand took a $530 million loss on its investment.
