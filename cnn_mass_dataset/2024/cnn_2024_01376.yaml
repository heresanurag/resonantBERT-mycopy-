title: "Horrific nightmares may signal initial onset of these chronic diseases, study says"
date: "2024-05-21"
section: "Health"
url: "https://www.cnn.com/2024/05/21/health/nightmares-daymares-autoimmune-flares-wellness?cid=external-feeds_iluminar_msn"
content: |
