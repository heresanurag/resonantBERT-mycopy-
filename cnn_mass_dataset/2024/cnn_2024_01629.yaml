title: "Regular aspirin use may help lower risk of colorectal cancer, study finds, especially for those with unhealthy lifestyles"
date: "2024-08-01"
section: "Health"
url: "https://www.cnn.com/2024/08/01/health/aspirin-colorectal-cancer-lifestyle?cid=external-feeds_iluminar_cnn-brasil"
content: |
  Regular aspirin use may keep the oncologist away, at least when it comes to colorectal cancer, according to a new study, and people with unhealthy lifestyles seemed to see the greatest benefit.
  
  Many older adults are still taking daily aspirin, even though some shouldn’t be, experts say
  
  Colorectal cancer is the second most common cause of cancer deathworldwide, predicted to cause more than 52,500 deaths in the US alone in 2023. About 153,020 people in the US were diagnosed with the condition in 2023, and it’s becomemuch more prevalentamong people under 55, with numbers more than doubling in this group from a decade ago,studies show.
  
  The causes of colorectal cancer can be genetic, but certain lifestyle factors also seem to raise risk, including eating an unhealthy diet, not getting enough exercise, drinking alcohol, smoking and having a high body mass index.
  
  In addition to adopting healthier lifestyles, doctors have often recommended low-dose aspirin to reduce the risk of colon cancer. TheUS Preventive Services Task Forcemade the aspirin recommendation in 2016 but reversed course in 2022 because ofconcerns that it might cause bleeding.Aspirin can also cause gastrointestinal trouble.
  
  With the change in recommendations, the authors of the new study decided to look at whether there were any groups that would benefit more from the practice and for whom aspirin would be worth the risk.
  
  For the study, published Thursday in the journalJAMA Oncology, the authors examined data from more than 107,655 people who were a part of large datasets of medical professionals called theNurses’ Health Studyand theHealth Professionals Follow-Up Study. Most of the participants were White, so the authors suggest that their research should be replicated with more diverse populations to see if the conclusion would be the same.
  
  For some cardiac patients with stents, long-term aspirin treatments might be on the way out
  
  Study participants were tracked for at least a decade, and in addition to being monitored for colorectal cancer, they were given surveys to determine the healthiness of their lifestyles. The surveys assessed their BMI, alcohol intake and diet, whether they smoked and how much they exercised. The use of two or more regular-strengthaspirin or six or more low-dose aspirin per week was considered regular aspirin use for the purpose of this research.
  
  Those regular users were found to have an 18% lower risk of developing colorectal cancer than non-users. Participants who were determined to have a less-healthy lifestyle had more benefit, particularly if they smoked or if their BMI was higher than 25. A BMI of 25 to 29.9 is considered overweight.
  
  “Our results show that aspirin can proportionally lower the markedly elevated risk in those with multiple risk factors for colorectal cancer,” Dr. Daniel Sikavi, the lead author of the paper and a gastroenterologist at Mass General Brigham, said in an email. “In contrast, those with a healthier lifestyle have a lower baseline risk of colorectal cancer, and, therefore, their benefit from aspirin was still evident, albeit less pronounced.”
  
  The study cannot determine why regular aspirin use seemed to be so helpful, butprevious researchhas suggested that aspirin may inhibit pro-inflammatory signals that can lead to cancer.
  
  Although otherstudieshave shown the benefits of aspirin in the prevention of colorectal cancer among certain populations, the results have beeninconsistent, according to the authors of the new research. They argue that doctors should weigh different lifestyle risk factors when they determine whether someone should take regular aspirin to prevent colorectal cancer.
  
  Dr. Christina Annunziata,senior vice presidentof extramural discovery science with the American Cancer Society, noted that the research saw the greatest effect of aspirin in people with the most risk factors for colon cancer.
  
  It’s important to keep in mind that the study is not a gold-standard randomized clinical trial that compared people who got aspirin with those who didn’t, meaning there are limitations to keep in mind and more research will be needed, she said. But the study serves as a good reminder that cancer is not inevitable and that people can take steps to lower their risk.
  
  “There are things you can change about your lifestyle that will decrease your risk,” said Annunziata, who wasn’t involved with the new research. Those include maintaining a healthy weight, eating a diet rich in vegetables, fruits and whole grains, and drinking less.
  
  Dr. Raymond DuBois,a past presidentof the American Association for Cancer Research, said that while keeping up with the changing aspirin recommendations over more than two decades, he has always wondered why some studies show a benefit and others don’t. He thinks this research may help solve that mystery.
  
