title: "Sony unveils faster, more powerful PlayStation 5 Pro. And it comes with a price tag to match"
date: "2024-09-11"
section: "Tech"
url: "https://www.cnn.com/2024/09/11/tech/sony-ps-pro-5-playstation-announcement-intl-hnk/index.html"
content: |
  After years of speculation and hype, Sony will be launching an upgraded version of its popular PlayStation 5 at the console’s highest ever price.
  
  The PS5 Pro will go on sale on November 7 at $700, about 40% more expensive than the PS 5 when it launched in 2020, Sony said on Tuesday. Pre-orders will begin on September 26.
  
  The newest console will have much more powerful computing power, allowing up to 45% faster rendering for game play, Mark Cerny, lead architect for PS5 Pro revealed in avideo presentation. “Simply put, it’s the most powerful console we’ve ever built,” he said.
  
  Sony has added custom hardware for machine learning and an AI Library that provides super sharp image clarity, he said. The console will not come with a disc drive, which is  sold separately.
  
  In ablog post,Sony wrote the new console will improve the performance of older titles, saying “several games will be patched with free software updates for gamers to take advantage of PS5 Pro’s features.”
  
  The current PS5 has sold more than 56 million units since its release,according toSony, which said it expected to sell 18 million PS5 consoles this financial year. That’s slightly less than the 20.8 million devices it sold in the same period a year earlier,Reutersreported.
  
  Sales of the PS5 have lagged behind its predecessor, the PS4, of which more than 114 million units had been sold since its launch in 2013. The PS4 haddominated the gaming worldand far outpaced its rival Xbox One developed by Microsoft Gaming.
