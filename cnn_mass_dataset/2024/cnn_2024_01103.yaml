id: cnn_2024_01103
title: "Hong Kong is becoming a hub for financial crime, US lawmakers say"
date: "2024-11-26"
section: "Business"
url: "https://www.cnn.com/2024/11/26/business/hong-kong-hub-financial-crime-us-lawmakers-intl-hnk/index.html"
content: |
  Hong Konghas become a center for money laundering and sanctions evasion under the tightening grip of Beijing, US lawmakers have warned, calling for a re-evaluation of America’s close business relationship with the Asian financial hub.
  
  Ina letterto US Treasury Secretary Janet Yellen Monday, bipartisan leaders of the House Select Committee on China demanded greater scrutiny from Washington of Hong Kong’s much prized financial sector,a pillarof the economy that’s home to many big US banks and accounts for more than one-fifth of the Chinese territory’s gross domestic product.
  
  Hong Kong has become a “global leader” in illicit practices, it said, including in the export of controlled Western technology to Russia, the creation of front companies to buy Iranian oil and the managing of “ghost ships” that engage in illegal trade with North Korea.
  
  Since Beijing imposed a national security law on the city in 2020, “Hong Kong has shifted from a trusted global financial center to a critical player in the deepening authoritarian axis of the People’s Republic of China, Iran, Russia, and North Korea,” the lawmakers said.
  
  “We must now question whether longstanding US policy towards Hong Kong, particularly towards its financial and banking sector, is appropriate,” they added.
  
  The committee’s letter citedresearchpublished this year that shows nearly 40% of goods shipped from Hong Kong to Russia between August and December 2023 were high-priority items that are likely fueling Moscow’s production of military goods such as missiles and aircraft.
  
  Why Russians with wads of cash flock to Apple stores in Hong Kong
  
  The lawmakers asked Treasury Department officials to brief the committee on “the current status of American banking relationships with Hong Kong banks, how our policies have shifted to account for the changes in Hong Kong’s status and posture, and the measures the Treasury plans to implement to address these risks.”
  
  A spokesperson for the US Treasury said the department had received the letter and “will respond through the appropriate channels.”
  
  The Hong Kong government said it “strongly disapproves of and firmly rejects malicious slander of Hong Kong’s reputation as an international financial centre in the letter.”
  
  A spokesperson said the Hong Kong government had been enforcing sanctions imposed by the United Nations Security Council, but does not implement “unilateral sanctions imposed by other countries that constitute a flagrant violation of the international order.”
  
  “Maintaining the integrity and robustness of our financial systems is high on the (Hong Kong) Government’s agenda. Our banks and other financial institutions adhere to international standards and best practices, including those on anti-money laundering and counter-financing of terrorism,” the person said in a statement.
  
  In 2020, then-President Donald Trumprevokedthe special treatment Hong Kong had long enjoyed under US law, to punish Beijing for imposing the national security law on the once-outspoken city. The executive order effectively ended the city’s separate customs treatment from mainland China by suspending a 1992 law granting Hong Kong special economic status.
  
  Since then, dozens of Hong Kong-based companies have been hit by US sanctions for evading extensive measures imposed on Russia in response to its invasion of Ukraine, including the supply of critical dual‑use goods such as semiconductors.
  
  Hong Kong officials havepreviously saidthe city has no obligation to implement unilateral sanctions imposed by other countries – including when a mega yacht linked to aRussian oligarchsanctioned by the US, the European Union and the United Kingdomdropped anchor in the city in October 2022.
  
  The lawmakers’ letter, signed by Republican Rep. John Moolenaar, who chairs the committee, and Rep. Raja Krishnamoorthi, the panel’s top Democrat, highlights the growing scrutiny on Hong Kong in the escalating great power rivalry between the US andChina.
  
  China is armed and ready for trade war 2.0 with Trump
  
  It comes as Trump is poised to return to the White House with a cabinet stacked with China hawks, including Marco Rubio, who has been named secretary of state.
  
  Rubio, a fierce critic of Beijing’s crackdown on Hong Kong, has sponsored legislation that sanctioned Chinese and Hong Kong officials for alleged human rights violations in the city. He has also proposed a bill now being considered in Congress to let the secretary of state strip certification from Hong Kong’s economic and trade offices in the US.
  
  Trump has also named hedge fund executiveScott Bessentas his treasury secretary.
  
  Isaac Stone Fish, CEO of Strategy Risks, a business intelligence firm that focuses on China, said even if Yellen declines to act upon the letter, Bessent – who in a recentinterviewdescribed Beijing as a “despotic regime” – is expected to take a more hawkish approach to China.
  
  “In fact, it appears like he’ll be the most hawkish Treasury Secretary since the 1970s. This has massive implications for US businesses with big exposure to Hong Kong,” Fish said.
  
  “Sadly, the idea of Hong Kong as autonomous from China is now a farce … US companies need to understand that their Hong Kong operations will likely fall under increased scrutiny.”
