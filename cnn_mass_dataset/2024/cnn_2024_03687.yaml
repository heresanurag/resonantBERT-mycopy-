  Here are some additional best practices for food prep to minimize cross contamination in your kitchen.
  
  Listeria outbreak: What to know and how to protect yourself
  
  While hot, soapy water will clean your dishes and surfaces, it won’t sanitize them. To make sure you’re not leaving any bacteria in your kitchen, sanitize the sink, faucet and countertops after working with poultry or meat.
  
  The germiest place in your home and the best way to combat those microbes
  
  Make your ownsanitizing solutionby combining ½ teaspoon liquid bleach with 2⅔ cups water in a spray bottle, and wipe with paper towels or a clean towel that can be laundered in hot water. If using store-bought sanitizing spray or wipes, follow the manufacturer’s instructions.
  
  With therisk of foodborne illnesseson the rise since the pandemic, putting best practices in place in your kitchen is one of the easiest and smartest ways to protect yourself while still eating well.
  
