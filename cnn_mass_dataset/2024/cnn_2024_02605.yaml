title: "Routine jobs raise the risk of cognitive decline by 66% and dementia by 37%, study says"
date: "2024-04-17"
section: "Health"
url: "https://www.cnn.com/2024/04/17/health/brain-job-dementia-wellness/index.html"
content: |
