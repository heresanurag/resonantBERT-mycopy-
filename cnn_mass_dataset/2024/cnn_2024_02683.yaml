title: "NYPD preparing to revoke Donald Trump’s license to carry a gun after felony conviction in New York"
date: "2024-06-05"
section: "Politics"
url: "https://www.cnn.com/2024/06/05/politics/trump-gun-nypd-revoke/index.html"
content: |
  The New York City Police Department is preparing to revoke former PresidentDonald Trump’s license to carry a gun, a senior police official told CNN.
  
  Trump’s New York concealed carry license was quietly suspended on April 1, 2023, following his indictment on criminal charges in New York, the official said.
  
  Two of the three pistols he was licensed to carry were turned over to the NYPD on March 31, 2023, and a third gun listed on Trump’s license “was lawfully moved to Florida,” the person added.
  
