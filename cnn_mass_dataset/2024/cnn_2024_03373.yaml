title: "‘Prehistoric Pompeii’ reveals 515 million-year-old sea bugs’ anatomy in pristine 3D"
date: "2024-07-09"
section: "Science"
url: "https://www.cnn.com/2024/07/09/science/trilobite-fossils-discovery-volcanic-ash?cid=external-feeds_iluminar_yahoo"
content: |
