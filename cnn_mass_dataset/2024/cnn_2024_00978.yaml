title: "Alexey Navalny honored by Bono and U2 during Las Vegas concert"
date: "2024-02-19"
section: "Entertainment"
url: "https://www.cnn.com/2024/02/19/entertainment/bono-and-u2-lead-chant-in-honor-of-kremlin-critic-alexei-navalny-at-las-vegas-concert/index.html"
content: |
  Bono and U2 got their audience involved in a tribute tolate Russian opposition leader Alexey Navalnyduring their concert at Las Vegas’s Sphere over the weekend.
  
  Speaking to the crowd on Saturday, according to audience video, Bono spoke about theupcomingtwo-year anniversary of Russia’s invasion of Ukraine and acknowledged the millions of people affected by the ongoingconflict.
  
  “For these people, freedom is not just a word in a song. For these people, freedom is the most important word in the world – so important that Ukrainians are fighting and dying for it. And so important that Alexey Navalny chose to give his up,” Bono said.
  
  Navalny, an outspoken critic of the Kremlin whose 2020 poisoning with a nerve agent made global headlines,was reported deadon Friday by the Russian prison service. He was 47.
  
  He died after becoming unwell and falling unconscious while on a walk in the Siberian prison he was being held at, according to the Russian prison service.
  
  “Apparently, Putin wouldnever, ever say his nameso I felt tonight, the free people from here – people who believe in freedom – we must say his name,” Bono said.
  
  Bono then led a chant of Navalny’s name that the audience joined in on. The band then began to play a cover of Crowded House’s “Don’t Dream It’s Over.”
  
  The band has been supportive of the Ukrainian people.
  
  In addition to raising funds, Bono and U2 guitarist, The Edge, gave aperformanceat the Khreschatyk metro station in Kyiv in May 2022 on the invitation of Ukrainian President Volodymyr Zelensky.
