title: "Argentina coach slams ‘circus’ as chaos descends on Olympic soccer opener"
date: "2024-07-24"
section: "Sport"
url: "https://www.cnn.com/2024/07/24/sport/paris-olympics-soccer-argentina-morocco-controversy-intl-hnk-spt/index.html"
content: |
  Argentina thought it had leveled its Olympic soccer opener against Morocco in the dying seconds on Wednesday – before its goal was dramatically ruled out and a pitch invasion caused the final three minutes to be played in an empty stadium after a nearly two-hour delay.
  
  It was hardly an auspicious opener for theParis Summer Games, with Argentina coach Javier Mascherano calling the disorderly scenes “the biggest circus I’ve ever seen in my life.”
  
  Soufiane Rahimi scored either side of half-time to put Morocco 2-0 up at at Saint-Etienne’s Stade Geoffroy-Guichard, before Argentina’s Giuliano Simeone pulled one back in the 68th minute.
  
  The chaos kicked off in the final moments of a lengthy added time, when Argentina’s Cristian Medina headed home in the 106th minute to apparently tie the game at 2-2 - sending Argentina players and fans into raptures.
  
