content: |
  👋Welcome to 5 Things PM!Listen up, couch potatoes. As you probably already know, planting yourself in front of the TV for hours on end isn’t good for your health. The upside is there’s an easy wayto make your “couch time” more productiveand have a little fun along the way.
  
  Here’s what else you might have missed during your busy day:
  
  1️⃣Joey Chestnut:The competitive eating champion will not take part in this year’s Nathan’s hot dog eating contest. Read why the organization that oversees the event is upset with Chestnut andhopes he will change his mind.
  
  2️⃣Long-haul flights:Air travel can be a drag — especially if you’re going overseas and have tons of time to kill. A veteran flight attendantshared some tipsto get you through with flying colors. ➕ A flight in China was delayed after apet possum got loose.
  
  3️⃣Portrait vandals:The first official portrait of King Charles III raised plenty of eyebrows when it was unveiled several weeks ago. Now it has drawn some unwanted attention fromanimal rights activists with a paint roller.
  
  4️⃣Real gems:Everyone knows about the allure and elegance of diamonds, emeralds, rubies and sapphires. Now some other little-known gemstones areskyrocketing in value and desirability.
  
  5️⃣$35 computer:Investors are going gaga overtiny and cheap computersthat just went public on the London Stock Exchange. Some are the size of a credit card, and they can be used to power smart speakers and robots.
  
  👀Rocky road:A “catastrophic landslide” closed a mountain highway near Grand Teton National Park. The road, connecting Wyoming and Idaho,could reopen in a few weeks.
  
  💰 That’s the Powerball jackpotclaimed by a group in Michigancalled The Breakfast Club. The winner of the New Year’s Day drawing had been a mystery for months.
  
  📧Billionaire Elon Musk dropped a lawsuit against which tech company after it published his emails?A. GoogleB. AmazonC. OpenAID. Nvidia⬇️Scroll down for the answer.
  
  🥵Heat dangers:It’s only June, but parts of the US are already baking under triple-digit temperatures. Here’s how you canavoid heat stroke and stay safe.
  
  🗓️Tomorrow:The Federal Reserve will announce a decision on interest rates. Last week’s stronger-than-expected jobs report suggestsa rate cut is unlikely.
  
  😎We like to wrap things up on a positive note:﻿Max, a “very affectionate” 6-year-old tabby cat, enjoys roaming the campus of Vermont State University. He greets visitors when they arrive for tours and enjoys climbing on students’ backpacks and posing for pictures. After all that hard work, the college decided the furry fixture on campus deservedan honorary “Doctor of Litter-ature”— and Max is in a class by himself because the university doesn’t offer doctorates for humans.
  
