title: "5 things to know for Aug. 30: Harris-Walz interview, Elon Musk, Trump sentencing, West Nile virus, Boeing Starliner"
date: "2024-08-30"
section: "US"
url: "https://www.cnn.com/2024/08/30/us/5-things-to-know-for-aug-30-harris-walz-interview-elon-musk-trump-sentencing-west-nile-virus-boeing-starliner/index.html"
content: |
  It’sLabor Day weekendand the 5 Things AM staff will be taking a break to celebrate summer’s last big hurrah! We’ll be back bright and early Tuesday — and the Sunday edition of 5 Things will be posted as scheduled.
  
  In the meantime, here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  Vice President Kamala Harris on Thursday offeredher most expansive explanation to dateon why she’s changed some of her positions, including on fracking and immigration. In anexclusive sit-down interviewwith CNN’s Dana Bash, Harris said her values haven’t shifted but that her time as vice president provided new perspective on some of the country’s most pressing issues. Speaking alongside running mate Minnesota Gov. Tim Walz, Harris also said she would name a Republican to serve in her Cabinet if elected. She also sought toframe the 2024 raceas one that offers the American people “a new way forward” after a political decade in which Trump — in office or out — was a central figure.
  
  Elon Musk is stepping up his online attacks on a Brazilian Supreme Court judge threatening to suspend social media platform X, calling him“an evil dictator”in an ongoing feud between the two. Musk, who had previously called Justice Alexandre de Moraes “Darth Vader,” retweeteda statementfrom X’s Global Government Affairs team saying it would publish the judge’s “illegal demands and all related court filings” in the coming days. Brazil is a major market for social media platforms, including X, formerly known as Twitter.
  
  Former President Donald Trump ​​filed a petition Thursday seeking tomove his New York state criminal caseto a federal court in Manhattan and push off the upcoming sentencing for hisconviction on 34 countsof falsifying business records. The petition asks the court to confirm Trump cannot be sentenced while the litigation over the removal to federal court is pending. Trump’s sentencing is currentlyscheduled for September 18, though Judge Juan Merchan is expected to rule in early September on a previously filed motion from Trump’s legal team — which the Manhattan district attorney’s office did not oppose — to delay it until after the election.
  
  Two deaths from West Nile virus have been reported in Wisconsin and one in Illinois — thefirst such deaths in those statesthis year, according to the state health departments. The CDC said Thursday that it has received reports of 18 deaths from West Nile across the country so far this year, according to preliminary data. Overall, the CDC has received289 reports of West Nile casesin 33 states this year. Of those cases, 195 have been neuroinvasive, in which the virus invades the brain and nervous system. This can lead to complications such as brain swelling, brain damage or death. There is no vaccine or specific treatment for West Nile, which is spread through the bite of infected mosquitoes.
  
  After spending 12 weeks docked to the International Space Station, Boeing’s Starliner spacecraft is finally set to return home — empty. The troubled spacecraft willundock from the space station on September 6at around 6 p.m. ET, and will spend about six hours maneuvering closer to home before landing near midnight in New Mexico’s White Sands Space Harbor. Astronauts Butch Wilmore and Suni Williams, who rode the Starliner to the ISS on June 5, will fly home on a SpaceX Crew Dragon capsule no earlier than February.
  
  Shocking defeat at the US OpenCarlos Alcaraz, the world’s No. 3 tennis player, lost in straight setsto Botic van de Zandschulp in the second round of the US Open. It’s one of the biggest upsets in recent memory.
  
  Lizzo is taking a break and living her best lifeThe Grammy-winning singer is famous for her songs about self-love — now she’s taking her own advice and “protecting her peace,” asshe posted on Instagram along with a video of her standing in a tropical setting.
  
  Fossil reveals details of sea cow’s death 15 million years agoBy analyzing the rare fossil, unearthed in Venezuela, researchers were able to piece together howthe manatee-like marine mammal was killed by a crocodile and a tiger shark. Talk about an unlucky day.
  
  Officer’s bodycam captures his gator-wrangling skillsThe Fulshear Police Department near Houston, Texas, shared video online of the officer fearlessly removing an alligator from a resident’s doorstep.Watch how he did it.
  
  Plane struggles to land in typhoonStrong winds from Typhoon Shanshanprevented the plane from landing onJapan’s southernmost main island Kyushu.
  
  The king of New Zealand’s indigenous Māori people,Kiingi Tuheitia Pootatau Te Wherowhero VII, died peacefully earlier today, according to a statement from his representatives.He was 69. The king had been in the hospital recovering from heart surgery just days after celebrating the 18th anniversary of his coronation, the statement added. He had experienced poor health in recent years, including cancer and diabetes, according to CNN affiliate RNZ.
  
  Which famous duo signed a $100 million podcast deal this week?A. Ryan Reynolds and Hugh JackmanB. Ryan Reynolds and Blake LivelyC. Jason Kelce and Travis KelceD. Taylor Swift and Travis Kelce
  
  Last week, 58% of readers who took the quiz got eight or more questions right. How will you fare?
  
  89That’s how many years it’s been since a No. 1 jersey has been worn by a New York Giants player. Rookie wide receiver Malik Nabers will don the once-retired number during the NFL team’s season opener on Sept. 8.Here’s why he picked the number.
  
  “We would have had a lot of time to study the jet completely in peacetime, but we do not have the time.”— Oleksiy “Moonfish” Mes, one of only a few Ukrainian pilots trained to fly US-made F-16 fighter jets,was killed Monday when his jet crashedwhile “repelling the biggest ever aerial attack” on Ukraine by Russia, a Ukrainian military source told CNN.
  
