  The new study did not include data on other factors that may impact a woman’s overall health, such as diet or exercise, but it’s well-known that a healthy lifestyle – such as eating healthy, maintaining a healthy weight, not smoking and limiting alcohol – canlower the risk of pregnancy complications, as well as getting adequate health care before, during and after pregnancy.
  
  “Many of these – preeclampsia, hypertension, diabetes – can be associated with obesity, for example. So, getting the weight under control, being healthy, exercising better, having a healthy lifestyle that certainly can help,” Stone said. “There’s a lot of lifestyle interventions that can be done to improve health going into the pregnancy.”
