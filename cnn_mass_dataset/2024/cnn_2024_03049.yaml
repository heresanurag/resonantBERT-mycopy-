  But awareness of global warming’s threat to human health is increasing among some physicians, said Dr. Catharina Giudice, anemergency physicianand climate change and human health fellow at Harvard University who was not involved in the study.
  
  “When you’re filling out a death certificate, you make your best interpretation with the available information you have, and I think the more people are aware of climate change-related mortality,” Giudice said. “So there may be some bias of increasing awareness over time” contributing to the recent trend, she said.
  
  And more people will probably continue needing emergency care for heat exposure. By theend of this century, more than half of the global population is projected to be exposed to weeks of dangerous heat every year, according to a 2022 study. This makes even common activities liketaking a hikein the Grand Canyon,going for a runin gym class or even justsitting on the couchwithout air conditioning potentially deadly.
  
  Extreme heat is the No. 1 weather-related killer in the US, according to theWorld Meteorological Organization, but experts say it’s a phenomenon that often goes under the radar. Unlike with a hurricane, there are usually no dramatic pictures to remind people about the dangers of heat.
  
  Heat can kill in at least 17 different ways, many related to heart and breathing problems. Some groups of people are more vulnerable to its effects, including small children and the elderly, whose bodies don’t regulate temperature as well, along with people with certain underlying medical conditions and people who have overweight or obesity.
  
