  Heat-related deaths may also include suicide, drowning and homicide, phenomena that could not be captured by this study.
  
  Howard hopes that studies like this can bring more awareness of the issue, prompting more steps to avoid what are ultimately preventable deaths.
  
  “I think this should be a real wake-up call to say ‘this really does warrant more attention,’ especially in areas of high risk,” Howard said.
  
  Public health experts have recommended that governments invest in infrastructure that can help lower temperatures, like planting shade trees and installing covered bus stops. There are even cool pavement coatings that can lower surface temperatures when applied to asphalt.
  
  Other suggestions have included making money available to put more air conditioners in schools and help people with limited incomes with costly air conditioning bills, as well as creating more cooling shelters and mobile cooling centers that can give people a break from the heat.
  
  The new study found a disproportionate number ofheat-related deaths in four states: California, Arizona, Nevada and Texas. “These are all hot areas, so you may expect that, but so much more could be done to plan for these hot days,” Howard said. “I hope this will spur further action.”
