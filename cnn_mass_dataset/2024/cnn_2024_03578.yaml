title: "George Strait tops one of the most successful live bands in history to set new US concert attendance record"
date: "2024-06-17"
section: "Entertainment"
url: "https://www.cnn.com/2024/06/17/entertainment/george-strait-concert-attendance-record/index.html"
content: |
  All of George Strait’s fans, friends and exes must live in Texas.
  
  The country music starperformedat Kyle Field at Texas A&M in College Station, Texas over the weekend and set a new record for the largest US ticketed show in history.
  
  The crowd topped at 110,905 people, which broke anall-timeattendance record set by the Grateful Dead at New Jersey’s Raceway Park in 1977. A little over 107,000 concertgoers were in attendance at that Dead show.
  
  According toBillboard, Strait told the crowd, “We got some Aggie’s out there? Oh yeah! I’m ashamed to say this, but this is my first time to ever be in Kyle Field… damn. Just invite me back, I’ll come!”
  
  With expected record attendance for tonight's show at Kyle Field, plan your afternoon accordingly!For more information visithttps://t.co/T1Da4yoqpYpic.twitter.com/YrxKF7nP1x
  
  Strait debuted two new songs, “MIA in MIA” and “The Little Things,” from his upcoming album, “Cowboys and Dreamers.”
  
  Strait has sold more than 120 million records worldwide, and is one of the bestselling music artists of all time.
