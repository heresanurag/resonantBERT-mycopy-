  In a statement sent to CNN, the Adani Group called the allegations “baseless and denied.”
  
  “The Adani Group has always upheld and is steadfastly committed to maintaining the highest standards of governance, transparency and regulatory compliance across all jurisdictions of its operations. We assure our stakeholders, partners and employees that we are a law-abiding organisation, fully compliant with all laws,” said a spokesperson for the group.
  
  Worth more than $85 billion, Adani, the founder of his eponymous group, is Asia’s second-richest person behind countryman Mukesh Ambani, according toBloomberg’s Billionaires Index.
  
  In a letter to India’s two main stock exchanges, Adani Green, which is building theworld’s biggest energy planton the edge of Western India, acknowledged the separate criminal and civil indictments brought by US officials. Sagar Adani is executive director of the company.
  
  “In light of these developments, our subsidiaries have presently decided not to proceed with the proposed USD denominated bond offerings,” it said. Reuters and the Financial Times reported the bond sale was worth $600 million.
  
  US authorities said Adani and his associates tried to hide the alleged bribery schemes from US investors “in order to obtain financing, including to fund those solar energy supply contracts procured through bribery.”
  
  They referred to documentation including a cell phone to extensively track specific details on the bribes, a photograph of a document summarizing various bribe amounts and PowerPoint and Excel analyses “that summarized various options for paying and concealing bribe payments.”
  
