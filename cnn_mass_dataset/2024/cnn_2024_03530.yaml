title: "Billionaire Gautam Adani indicted in New York on bribery charges"
date: "2024-11-20"
section: "Business"
url: "https://www.cnn.com/2024/11/20/business/gautam-adani-indicted"
content: |
  Indian billionaire Gautam Adani and other executives were indicted in New York on Wednesday by US prosecutorsfor their alleged roles in a yearslong, multi-million-dollar bribery and fraud scheme involving plans to develop a major solar power plant.
  
  The Department of Justice (DOJ) said ina statementthat Adani, a key ally of Indian Prime Minister Narendra Modi, and seven other executives, including his nephew Sagar Adani, promised more than $250 million in bribes to Indian government officials to secure solar energy contracts.
  
  The impact of the allegations, which come more than a year after aUS short-selleraccused Adani Group of stock manipulation and accounting fraud, was immediately felt across the sprawling conglomerate. On Thursday, shares in the group’s listed firms fell between 10% and 20%, wiping out just under $30 billion in total market value according to Reuters data.
  
  It has also created political waves inside India with the Indian National Congress, a major rival of Modi’sruling Bharatiya Janata Party, renewing calls for a parliamentary investigation into Adani’s companies.
  
  The DOJ alleges the solar energy supply contracts were projected to raise more than $2 billion in profits after tax over an approximately 20-year period.
  
  Authorities say Adani, 62, personally met with an Indian government official to “advance” the scheme, which took place between 2020 to 2024. The defendants frequently met and allegedly discussed the bribery scheme, including evidence on several phones.
  
  “This indictment alleges schemes to pay over $250 million in bribes to Indian government officials, to lie to investors and banks to raise billions of dollars, and to obstruct justice,” Deputy Assistant Attorney General Lisa Miller said in the statement.
  
  “These offenses were allegedly committed by senior executives and directors to obtain and finance massive state energy supply contracts through corruption and fraud at the expense of US investors,” she added.
  
