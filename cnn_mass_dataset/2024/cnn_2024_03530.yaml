  In a parallel civilaction,the Securities and Exchange Commissionalso charged both Adanis (as executives of Adani Green Energy Ltd) and Cyril Cabanes, an executive of Azure Power Global, for the bribery scheme that the SEC said allowed both companies to capitalize off a lucrative contract by the Indian government. The SEC said Adani Green raised more than $175 million from US investors on those misrepresentations.
  
  For more than a year, the Adani Group has been trying to restore its reputation following allegations made in January 2023 bythe US short-seller Hindenburg Researchof a “brazen stock manipulation and accounting fraud scheme. The billionaire’s fortune, which at one point in 2022 was worth more than that of Jeff Bezos, plummeted over $80 billion following the report.
  
  In its investigation, which Hindenburg said took two years to compile, the American firm had questioned the “sky-high valuations” of Adani companies and said their “substantial debt” put the entire group “on a precarious financial footing.” Short-sellers make money by betting that a company’s stock will fall.
  
  The Adani Group published a 400-page rebuttal, calling the Hindenburg analysis “nothing but a lie.”
  
  Adani began his career in diamond trading. He set up a commodity trading business in 1988, which later evolved into Adani Enterprises, and now has firms in key sectors ranging from ports and power to media and clean energy.
