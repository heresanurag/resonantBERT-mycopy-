title: "5 things to know for Jan. 23: 2024 race, Israeli hostages, Immigration, Stock market, China earthquake"
date: "2024-01-23"
section: "US"
url: "https://www.cnn.com/2024/01/23/us/5-things-to-know-for-jan-23-2024-race-israeli-hostages-immigration-stock-market-china-earthquake?cid=external-feeds_iluminar_post-news"
content: |
  A robocall using artificial intelligence to mimic President Joe Biden’s voice is urging voters in New Hampshire to skip the state’s pivotal primary today. Tracking data suggestsup to 25,000 fraudulent callswere made to residents across the Granite State as investigators quickly try to find the identity of the caller behind the scheme.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  The nation’s first presidential primary isunderway in New Hampshire, where former President Donald Trump and former South Carolina Gov. Nikki Haley are vying for votes to become the Republican nominee to take on President Joe Biden in November. The first ballots werecast at midnight, with all six voters in the tiny town of Dixville Notch backing Haley. The latest polls, however, show Trump’s lead over Haley haswidened to double-digitsfollowing his big win in Iowa’s caucuses last week. The primary will also be, in part, a test for Biden as he seeks to pull off a successful write-in campaign in the state. Biden’s name does not appear on the ballot today following aninternal party disputeover the primary’s date.
  
  Poll closing times vary in New Hampshire today but most close at 7 p.m. ET.Visit CNN’s voter guideto find out how to vote in the primaries in your state.
  
  Israel has offered Hamas a two-month ceasefire as part of a prospective deal that wouldfree more than 100 hostagesbeing held in Gaza, according to Axios. The broader agreement would allow the safe passage out of Gaza for top Hamas leaders who orchestrated the October 7 attacks. Analysts say that draining Gaza of its leaders could weaken Hamas’ grip on thewar-torn stripwhile also allowing Israel to continue tracking down high-value targets abroad. On the ground, 21 Israeli soldiers were killed in combat in Gaza on Monday in the biggest singleloss of life for Israeli troopssince the start of the war.
  
  The Supreme Court will allow US Border Patrol agents to remove razor wire deployed by Texas Republican Gov. Greg Abbott’s security initiative at the US-Mexico border.The vote on Monday was 5-4. While the justices’ order will now face legal challenges from the state, it is nonetheless a major victory for President Biden in his ongoing dispute with Abbott over his border policy. The crisis in the region has been particularly fraught in recent days afterthree migrants drownedin a section of the Rio Grande. Federal officials said they were unable to assist in the emergency rescue because Texas state officials had blocked agents’ access to crossing areas.
  
  The Dow closed above the 38,000 markfor the first time on Monday, building on last week’s momentum. The Dow rose 138 points, or 0.4%, ending the day at 38,001.81. The S&P 500 also gained 0.2% and closed at an all-time high, reaching 4,850.43. The positive trend comes after the major Wall Street indexes started the year in a topsy-turvy fashion by breaking a nine-week streak of gains. But last week, all three indexes turned positive for the year as tech stocksled the broader market higher. The rally is also being powered by rising optimism that the Federal Reserve will nail a soft landing, or bring down inflation without triggering mass unemployment.
  
  A magnitude-7.1 earthquake rocked China’s far western Xinjiang region early today, with multiple injuries reported by state media. The quake struck shortly after 2 a.m. local time,collapsing structures and downing power lines. The epicenter is a remote, mountainous and sparsely populated area near China’s border with Kyrgyzstan. Heavy tremors were also felt in cities hundreds of miles away, including the Silk Road oasis of Kashgar and Hotan in southern Xinjiang. Nearly 200 rescue workers have been dispatched to the quake zone, and hundreds more are being assembled, authorities say.
  
  Apple unveils major security update for iPhone usersThe company released new tools Monday to keep thieves from accessing users’ data.Read more about the iOS 17.3 update.
  
  Blood test that screens for Alzheimer’s may be a step closer to realityResearchers saythis new blood testcan be used to screen for Alzheimer’s disease with “high accuracy,” even before symptoms begin to show.
  
  New sanctions on Russian diamondsNearly two years after Russia invaded Ukraine, a group of the world’s biggest economies have imposed a rolling ban on stones from the country. Here’s how it willchange the global trade in gems.
  
  How did the middle finger become so offensive?The naughty middle finger gesture — or “flipping the bird” — was likely developed by Greeks around 2,500 years ago to offend each other. Read more aboutthe most controversial digit.
  
  Man explains why he stole ‘Wizard of Oz’ ruby slippers from museumNew court documents reveal why a Minnesota manstole the magical shoesused in the “The Wizard of Oz.”
  
  Dexter Scott King, the youngest son of Dr. Martin Luther King Jr., died Monday after a battle with prostate cancer, according to statements from his family and the King Center.He was 62. Dexter worked as chairman of The King Center for Nonviolent Social Change, a non-profit started by Coretta Scott King, and president of the King Estate.
  
  171That’s how many Boeing 737 Max 9 airplanes are grounded in the US as they undergo inspections forpossible loose hardware. The Max 9 aircraft were pulled out of service more than two weeks ago following thefailure of a door plugthat detached during an Alaska Airlines flight. This week, the FAA recommended additional inspections of an earlier generation of the 737 — the Boeing 737-900ER — over similar concerns with bolts that secure the door to the airframe.
  
  “Let’s all vote — I’m not telling you who to vote for, but please, in the midst of all that you’ve got going on, take the time to fill out a ballot.”
  
  — Vice President Kamala Harris, calling on Americans torecognize the high stakesof the 2024 presidential election — stakes many Democrats worry haven’t registered yet with enough voters.
  
