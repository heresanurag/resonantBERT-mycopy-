  The EPA says it has conducted a thorough cost evaluation of the rule and said the benefits and costs of the standard would be about $1.5 billion, with the real benefit being fewer cancers, a lower incidence of heart attacks and reduced birth complications.
  
  “Folks, you’re going to hear people talk about cost and it can’t be done and we shouldn’t do this. Let me just tell you it can be done. It can be achieved using a range of technologies and approaches that many water systems are using today,” EPA Administrator Michael Regan told a crowd in Fayetteville, North Carolina on Wednesday. While Regan was the secretary of North Carolina’s Department of Environmental Quality, the state got amilestone settlementthat levied a $12 million fine against chemical giant Chemours for dumping PFAS into the Cape Fear River. It also required the company to contain and clean up contaminated groundwater.
  
  “Everyone should be able to turn on their tap and trust the water that they drink and give their children is safe,” Regan said. “We can get the job done.”
