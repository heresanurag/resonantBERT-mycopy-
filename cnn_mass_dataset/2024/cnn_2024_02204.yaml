  Beyoncé is not the first celebrity to recently enter the world of hair care. In 2019, Tracee Ellis Ross launched Pattern, a now-award winning natural hair line focused on “curl conscious and textured” customers. Two years later, “Friends” star Jennifer Aniston – whose shiny, face-framing layers became known as “The Rachel” haircut on TikTok –launcheda line of vegan and cruelty free hair products called LolaVie.
