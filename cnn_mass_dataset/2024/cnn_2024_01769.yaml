  An emotional Damar Hamlin presents the Buffalo Bills training staff that saved his life with an award during the ESPYS
  
  Last year, an emotionalDamar Hamlinpresented thePat Tillman Award to the Buffalo Bills training staffwho helped save his life during a game.
  
  Hamlin wiped tears from his eyes as he took the stage that day to introduce the training staff – months after he went intocardiac arreston the field after making a tackle during the first quarter of a Bills’ game against the Cincinnati Bengals in January 2023.
  
  The ESPYS show, which celebrates excellence in sports, was hosted this year by tennis star Serena Williams. Honorees included former NFL safety Steve Gleason, who received the Arthur Ashe Award for Courage for his fight against ALS. University of South Carolina women’s basketball head coach Dawn Staley was given the Jimmy V Award for Perseverance following a 38-0 season and NCAA Women’s Basketball Championship title.
