title: "Investigators have removed black boxes from LATAM’s plane that dropped suddenly"
date: "2024-03-13"
section: "Business"
url: "https://www.cnn.com/2024/03/13/business/latam-airlines-black-box-boeing/index.html"
content: |
  New Zealand authorities were able to remove the cockpit voice recorder and flight data recorder from the Boeing 787-9 that experienced a “technical event” onMonday’s LATAM Airlines Flight 800, a spokesman for New Zealand’s transport safety body told CNN on Wednesday.
  
  The black boxes hold data crucial to understanding what caused the Boeing jet to suddenly drop during the flight from Australia to New Zealand, causing dozens of passengers to be treated for injuries.
  
  The technical glitch and subsequent investigations come at a fraught time for Boeing. The US manufacturer hasfaced harsh criticismfor a series of recent safety and quality issues in its aircraft.
  
  Boeing is unable to provide key information in door plug blowout investigation, NTSB chair says
  
  Chile’s Directorate General of Civil Aeronautics (DGAC) is leading the investigation into the black boxes as the plane was registered in the country. New Zealand’s Transport Accident Investigation Commission (TAIC), will also contribute an investigator to the process.
  
  The Boeing jet remains in Auckland and will also be assessed by the Chilean investigators.
  
  The union representing the flight’s crew said on Wednesday that it would conduct an investigation, we well.
  
  The LATAM Cabin Crew Union (STCLA) said in a statement to CNN Wednesdaythat it is “gathering records of its colleagues who were injured” during the incident.
  
  According to a statement published by LATAM Airlines, at least 10 passengers and three crew members were injured when the plane experienced a “technical event.” However, emergency medical services provider Hato Hone St John Ambulance in Auckland told CNN that approximately 50 people were treated for injuries upon arrival in Auckland, including one person in serious condition.
  
  One of the passengersaboard the Chilean Boeing 787, Brian Jokat, told CNN that the pilot checked on the passengers and explainedhe had temporarily lost controlof the jet.
  
  “I immediately engaged with him and said, ‘What was that?’ And he openly admitted, he said, ‘I lost control of the plane. My gauges just kind of went blank on me,’” Jokat said.
  
  STCLA told CNN that it is awaiting the results of the investigation “not only to know what happened, but also to be able to ask the company for any necessary improvements.”
  
  “Aviation is a complex activity, it involves significant risks and must be carried out safely, so carrying out our work with appropriate conditions is also guaranteeing the safety of aviation as a whole,” STCLA said in its statement.
  
  Analysis of the LATAM Airline flight’s black box data could shed light on Boeing’s role in the flight’s sudden drop.
  
  Boeing is in crisis after a series of mid-flight disasters in recent months haveled to intense scrutinyof its quality standards.
  
  In January, a door plug blew off a new Boeing 737 Max operated by Alaska Airlines, leaving a hole in the side of the plane mid-flight. Investigators from the US National Transportation Safety Board said evidence showed four bolts that are meant to hold the door plugwere missing.
  
  On Wednesday, in a letter to a Senate committee probing Boeing, the National Transportation Safety Board said its investigation has been held back by Boeing’slack of a paper trailfor key evidence.
  
  The most serious problem Boeing faced in recent years: two fatal crashes of its 737 Max jet due to a design flaw in the plane.
  
  Meanwhile, in February, the Federal Aviation Administration flagged safety issues with engine anti-ice systems on the 737 Max and larger 787 Dreamliner.
  
  ﻿The FAA said Monday it has given Boeing until late May to produce a plan to remedy issues identified in a federal audit and other reviews, including a safety culture survey of employees and a separate panel report that found workers concerned about retaliation for reporting safety concerns.
  
  - CNN’s Chris Isidore, Kathleen Magramo, Manveena Suri and Alex Stambaugh contributed to reporting.
