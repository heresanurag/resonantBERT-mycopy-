  The flower moon name is thought to have originated among the Algonquin people who live in Canada and parts of the northeastern United States, according to theFarmer’s Almanac.But ancient groups coined several creative names for May’s full moon that mark the arrival of warmer weather and the new life that grows during the spring.
  
  Its old English name is “milk moon,” according to NASA, a reference to the archaic English word for the month we now call May. The eighth-century monk St. Bede the Venerable referred to May as themonth of three milkings–– in the medieval era, people believed that cows could be milked at least three times daily in late spring.
  
  Other names for May’s full moon include “frog moon,” from the Cree people of Canada’s North Plains — likely a nod to the spring peeper frog and its birdlike chirp, which is a harbinger of warm weather. The Dakota and Lakota people of the US Great Plains also called the celestial spectacle the “planting moon” to mark the agricultural practice of planting in the spring for a healthy harvest.
  
  The flower moon played a minor role in a particularly dark period of US history. Martin Scorsese’s recent Oscar-nominated historical drama“Killers of the Flower Moon”explores a series ofmurders of Osage people in Oklahoma. The killings began in May 1921, the month of the flower moon.
  
  Of the 12 full moons this year, the September and October lunar events will be considered supermoons, according to EarthSky.
  
  Definitions of a supermoon can vary, but the term generally denotes a full moon that is closer to Earth than normal and thus appears larger and brighter in the night sky. Some astronomers say the phenomenon occurs when the moon is within 90% of perigee — its closest approach to Earth in orbit.
  
  Here are the remaining full moons of the year:
  
  June 21: Strawberry moon
  
  August 19: Sturgeon moon
  
  September 17: Harvest moon
  
  October 17: Hunter’s moon
  
  November 15: Beaver moon
  
  December 15: Cold moon
