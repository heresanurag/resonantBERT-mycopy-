  Stargazers are in for a treat this week: The full moon returns for its May engagement, peaking on Thursday morning.
  
  May’s full moon is known as the flower moon, a reference to its appearance in late spring, when many flowering plants begin to bloom again after their winter slumber. The glowing orb will reach maximum illumination on Thursday at 9:53 a.m. ET, according toNASA.
  
  The best time to view the moon, though, is at night on Wednesday and Thursday, since it will be below the horizon during its peak in some regions, according to theFarmer’s Almanac. The flower moon will begin to rise after sunset on Wednesday, reaching its highest point after midnight, perEarthSky.
  
  In some parts of the world, including the Washington, DC area, the full moon will come so close to the bright star Antares on Thursday night that the star will appear to vanish behind the moon, according to NASA.
  
