  About 50 million Americans currently have insurance coverage for Wegovy, Jorgensen said, and Lillytold investors this weekthat about 67% of Americans with commercial insurance have coverage for Zepbound. Jorgensen also said Medicaid coverage is improving, noting “a number of states have opted in and see that there’s value in treating patients living with obesity.”
  
  Wegovy wasshownin a major clinical trial last year to not only aid with weight loss, but also to prevent heart attacks, strokes and heart-related death in people at elevated cardiovascular risk, potentially increasing demand for the medicine even further, but also improving insurance coverage; the US Centers for Medicare and Medicaid Services subsequentlysaidMedicare plans could cover the medicine for heart benefits.
  
  “We are only getting to, say, a million Americans so far out of the 50 million” whose insurance would cover Wegovy, Jorgensen said. He noted a million is the number of patients who have ever been prescribed Wegovy in the US, and fewer are currently taking the medicine, though he didn’t specify precisely how many. More than 40% of US adults areestimatedto have obesity, according to the US Centers for Disease Control and Prevention, or about 100 million people.
  
  “So I think availability of medicines is probably a bigger challenge than, actually, access” through insurance coverage, Jorgensen said.
