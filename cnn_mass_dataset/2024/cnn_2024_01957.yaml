  ##### In pictures: UK Prime Minister Keir Starmer
  
  “He’s the first Labour leader in a generation to talk about class and snobbery,”Tom Baldwin, author of “Keir Starmer: The Biography,”told CNN.“This doesn’t make him a class warrior but someone who understands the different layers of pride, aspiration and guilt… He feels the sting of the disrespect his dad experienced… He talks a lot about his sister who has led a precarious life as a carer, having not gone to university.”
  
  Starmer chose to study law at the University of Leeds, before completing a postgraduate degree at the University of Oxford. He initially thought he would have a legal career working for trade unions, but as his politics evolved in line with his studies, he became increasingly interested in human rights.
  
  ## What does he believe?
  
  Starmer has been on something of a journey since entering politics. He was elected to Parliament in 2015 at the age of 52 and entered the shadow cabinet a little over a year later.
  
  Corbyn,then the Labour leader, made Starmer his Brexit chief following the 2016 referendum.
  
  [Related article ![Image 81: Keir Starmer, leader of Britain's Labour party, addresses his supporters at a reception to celebrate his win in the election, at Tate Modern, in London, Britain, July 5, 2024. REUTERS/Suzanne Plunkett](https://media.cnn.com/api/v1/images/stellar/prod/240705050950-07-keir-starmer-070524.jpg?c=16x9&q=h_720,w_1280,c_fill/w_256) Keir Starmer, leader of Britain's Labour party, addresses his supporters at a reception to celebrate his win in the election, at Tate Modern, in London, Britain, July 5, 2024. REUTERS/Suzanne Plunkett Suzanne Plunkett/Reuters Labour Party set to end 14 years of Conservative rule in UK general election landslide, exit poll projects](https://www.cnn.com/2024/07/04/uk/uk-election-exit-poll-results-labour-conservative-starmer-gbr-intl)
  
  Corbyn is a controversial figure in British politics and serving in his top team is still something that haunts Starmer. Corbyn had historically been on the far left of the Labour Party. Prior to becoming leader in 2015, Corbyn had at various points in his long career supported nuclear disarmament,and withdrawal from NATO, and said it was a “tragedy” that Osama bin Laden was killed rather than put on trial.
  
  Starmer was in Corbyn’s shadow cabinet for the 2017 and 2019 general elections – something the Conservatives bring up regularly as evidence that he is a threat to national security, having tried twice to make Corbyn prime minister.
  
  However, Starmer has since kicked Corbyn out of the Labour Party following an investigation into antisemitism during Corbyn’s time as leader. Starmer has also said that he supported Corbyn knowing he would lose. Pressed on that point in a BBC “Question Time” program, he said Corbyn “would be a better prime minister” than “what we got” in[Boris Johnson](https://www.cnn.com/2023/02/25/uk/boris-johnson-british-politics-intl-cmd/index.html). Starmer also argues that he has brought Labour back to a position of electability.
  
  This result proves that he was right, but critics of Starmer on the left say that he used Corbyn and his wing of the Labour Party to win the party leadership in 2020 – committing to several left-wing positions such as nationalizing public services, scrapping university tuition fees and reversing Conservative welfare reforms – only to abandon those pledges once he got closer to power.
  
  ![Image 82: Starmer, left, and then-Labour leader Jeremy Corbyn talk to the media at the EU Commission headquarters on March 21, 2019 in Brussels, Belgium.](https://media.cnn.com/api/v1/images/stellar/prod/gettyimages-1131830538.jpg?c=original&q=w_1093,c_fill)
  
  Starmer, left, and then-Labour leader Jeremy Corbyn talk to the media at the EU Commission headquarters on March 21, 2019 in Brussels, Belgium.
  
  Thierry Monasse/Getty Images
  
  James Schneider, Corbyn’s former communications chief, told CNN: “Starmer is not a principled man. His campaign to become Labour leader was systemically dishonest. His cynicism and lack of policies to improve people’s lives will lead to a deep disillusionment that could either feed the hard right or a future people’s movement for change.”
  
  Starmer has at various times responded to accusations that he has drifted politically by saying that he puts his country before his political party, and that it’s only possible to change things if you are in power.
  
  ## Can Starmer change Britain?
  
  Whether you think Starmer’s current plan is unambitious, dishonest, or exactly what Britain needs, it’s impossible to push through policy without political and personal capital.
  
  Dominic Grieve, a Conservative politician who served as attorney general while Starmer was DPP, speaks glowingly of this period.
  
  “He ran his department very efficiently and effectively at a really difficult time because his budget had been cut. It was genuinely very impressive,”Grieve told CNN.
  
  Grieve added that Starmer was able to be an effective manager because “he is not bogged down with years of political ideology or baggage. He can see what is wrong and can address it.”
  
  Much as Starmer’s allies might see this as a strength, his opponents, from both sides of politics,see it as a weakness.
  
  ![Image 83: Starmer speaks while Director of Public Prosecutions, in 2010.](https://media.cnn.com/api/v1/images/stellar/prod/gettyimages-96443202.jpg?c=original&q=w_1093,c_fill)
  
  Starmer speaks while Director of Public Prosecutions, in 2010.
  
  John Stillwell/Getty Images
  
  To those on the right, Starmer is a man who would say anything to get in power. He is someone who supported Corbyn –who is anti-NATO and has repeatedly been accused of being a terrorist sympathizer –to get what he wants and is a danger to Britain.
  
  To the left, he is someone who doesn’t have the conviction to make radical changes and, once in office,will not be materially that different to a Conservative leader.
  
  Starmer is now set to have an enormous majority in the House of Commons. But the future may not be so simple.Given the current state of Britain’s finances, the circumstances of Labour’s victory and, even Starmer’s own personality traits, it might mean he doesn’t have quite the blank check that a leader with virtually no opposition in parliament would typically enjoy.
  
  An inability to turn that parliamentary power into tangible results at a time when voters are crying out for something different could mean that five years from now, his moderate, safety-first center-left program may ultimately be seen as just as big a political gamble as any of those the Conservatives took in the past 14 years.
  
