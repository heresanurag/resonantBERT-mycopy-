  London—
  
  Four-and-a-half years ago, [Britain’s Labour Party](https://www.cnn.com/world/live-news/uk-general-election-results-2024-intl/index.html) suffered its worst election defeat since 1935. The historic election victory of Boris Johnson in 2019 – which allowed him to finally implement Brexit – was supposed to mark another 10 years of Conservative rule in Britain, with Labour resigned to rebuild on the fringes of politics.
  
  Then Labour leader, the hard-left Jeremy Corbyn, was forced to resign and reluctantly hand his party to the centrist Keir Starmer, a former lawyer, knight of the realm and exactly the type of establishment figure that Corbyn and the far-left despise.
  
  In little over four years, Starmer has pulled off a once-impossible coup and dragged his Labour Party from the margins of British politics to a thumping victory in Thursday’s general election.
  
  Ad Feedback
  
  It will be the first time Labour has been in power since 2010 and the first time it has entered power from opposition since Tony Blair’s historic win in 1997.
  
  Addressing the nation before entering 10 Downing Street Friday afternoon, Starmer pledged a return to the politics of public service, vowing to heal the “weariness at the heart of the nation” with “action not words.”
  
  It was clear going into this election campaign that Britain was screaming out for change after 14 years of Conservative rule that saw cuts in public spending, stretched public services, the chaos of Brexit, a cost-of-living crisis and a sitting prime minister fined by police while in office for the first time in history.
  
  [Related live story ![Image 31: Keir Starmer, leader of Britain's Labour party, addresses his supporters at a reception to celebrate his win in the election, at Tate Modern, in London, Britain, July 5, 2024. REUTERS/Suzanne Plunkett](https://media.cnn.com/api/v1/images/stellar/prod/2024-07-05t040429z-148736527-rc2ro8arnxeu-rtrmadp-3-britain-election-party-starmer.jpg?c=16x9&q=h_720,w_1280,c_fill/w_256) Keir Starmer, leader of Britain's Labour party, addresses his supporters at a reception to celebrate his win in the election, at Tate Modern, in London, Britain, July 5, 2024. REUTERS/Suzanne Plunkett Suzanne Plunkett/Reuters Labour set for UK election landslide, exit poll predicts](https://www.cnn.com/world/live-news/uk-general-election-results-2024-intl)
  
  Starmer, who had led the opinion polls since October 2021, has promised to be the agent of change that Britain wants. During the campaign, he pledged to grow the country’s economy by reforming planning laws and investing in a new industrial strategy. He said he will set up a national wealth fund with £7.3 billion($9.3bn)of public money that will help pay for the[transition to net zero emissions.](https://www.cnn.com/2022/11/05/world/climate-change-terms-explained-cop27/index.html)
  
  An£8.3 billion ($10.5 billion) publicly owned energy company, Great British Energy, will see the United Kingdom’s energy grid decarbonized by 2030. Starmer says all this can be achieved without raising income taxes, though there are no commitments on other levies, such as capital gains tax, which is paid on money made from selling assets, including property and shares.
  
  The rest of the Labour manifesto comprised a mix of modest centrism with soft socialism.It included imposing taxes on private schools to help[pay for state education](https://www.cnn.com/2024/06/18/business/uk-millionaires-loss-record/index.html)and windfall levies on energy companies to fund the transition to clean energy. There were also commitments on workers’ rights, cutting waiting lists for health care and also controlling immigration.
  
  Critics on the right say that Starmer will need to raise taxes to fund his plans, while skeptics on the left say his manifesto is not bold or ambitious enough to change Britain for the better.
  
  In short,this is a long list of things to sort out in a five-year term when public finances are in disarray. The question for Starmer now is whether the mess is too big for him to fix and whether he has the political skill to bring about the change he promised.
  
  ## Who is Keir Starmer?
  
  On paper,the 61-year-old Starmer looks like a classic establishment figure.
  
  Once a leading human rights lawyer, he became Director of Public Prosecutions (DPP) in 2008, running the Crown Prosecution Service of England and Wales –a high-profile job for which he was knighted, making him the first ever Labour leader to enter the job with the prefix Sir to their name.
  
  Starmer, however, is - by the standards of modern political leaders - from relatively humble beginnings.
  
  Born in 1962, Starmer grew up in a small town to the south of London. His father was a toolmaker who worked in a factory, his mother was a nurse who suffered with severe physical disabilities, which ultimately led to one of her legs being amputated.
  
  While Starmer has never claimed to have suffered poverty, he has talked of financial struggles that affected his family, as well as the learning difficulties that held back his younger brother.
  
  Clearly, these early experiences shaped Starmer’s politics. He has talked about noticing people looking down on his father for working in a factory or bullying his brother. His parents were political, naming their eldest after the first Labour leader in parliament, Keir Hardie.
  
