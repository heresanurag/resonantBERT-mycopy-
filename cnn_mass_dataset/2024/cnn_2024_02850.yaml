id: cnn_2024_02850
title: "Fact check: Trump made at least 10 false claims about Kamala Harris in a single rally speech"
date: "2024-07-25"
section: "Politics"
url: "https://www.cnn.com/2024/07/25/politics/fact-check-trump-false-claims-kamala-harris/index.html"
content: |
  Former President Donald Trump made at least 10 false claims about Vice President Kamala Harris in his first campaign rally since she became the presumptive Democratic presidential nominee.
  
  Trump, speaking in North Carolina, attacked Harris at length with a flurry of assertions about her personal and political past, her record as vice president and her policy stances. We’re still looking into some of his claims, but at least 10 were wrong.
  
  Here is a fact check.
  
  Harris and the retirement age
  
  Discussing Social Security, Trump claimed of President Joe Biden and Harris: “They’re talking about, he was talking, she’s talking about – lifting the retirement age.”
  
  Facts First:This claim is false about Harris. She has not spoken in favor of raising the age for receiving Social Security retirement benefits. (Biden did, as a US senator in the 2000s and prior,express support for or opennessto raising the retirement age, but he hasbeen a vocal opponentof the idea as president.)
  
  Harris has supported increasing, not reducing, Social Security benefits. In 2019, about two years before she became vice president, sheco-sponsoreda bill from Sen. Bernie Sanders of Vermont, called the Social Security Expansion Act, that wouldboost Social Security benefitsby raising payroll taxes on high earners.
  
  Trump said, “She wants abortions in the eighth and ninth month of pregnancy, that’s fine with her, right up until birth, and even after birth – the execution of a baby.”
  
  Facts First:Trump’s claim that Harris supports the execution of babies after birth is false. She has never said anything to endorse post-birth murder, which is illegal everywhere in the country; Trump has frequently claimed that some Democratic states allow such post-birth executions, butthat claim is false, too.
  
  Harris, avocal supporter of abortion rights, has declined to endorse specific limits on how late in a pregnancy an abortion should be permitted to occur. According to data published by the US Centers for Disease Control and Prevention, just0.9% of reported abortions in 2020occurred at 21 weeks gestation or later.Many of these abortionsoccur because of serious health risks or lethal fetal anomalies.
  
  Harris hascalledfor legislation restoring the protections of the Roe v. Wade decision that was overturned by the Supreme Court in 2022; Roeallowed statesto restrict abortion after the point of fetal viability, oftenconsideredto be around 23 to 24 weeks gestation, with exceptions for abortions necessary to protect the patient’s life or health. As asenatorandvice president, Harris has supported a bill that would, like Roe, ensure abortion was available at least until fetal viability – and would also prohibit various state policies that make the process of providing or obtaining an abortion more onerous.
  
  Asked about Trump’s comments, the Trump campaign provided various examples of Harris taking liberal positions on abortion policy and declining to endorse specific limits - but nothing to substantiate the claim that she supports “the execution of a baby” after birth.
  
  Trump claimed, “Kamala even wants to pass laws to outlaw red meat to stop climate change.”
  
  Facts First:This is false. Harris has never expressed support for passing laws to outlaw red meat. At aCNN climate change town hall in 2019, when she was running in the Democratic presidential primary, she expressed support for changing dietary guidelines to try to encourage Americans to reduce their consumption of red meat, but she also said “I love cheeseburgers from time to time” and that she favored using “incentives” and education to encourage healthy eating.
  
  After mentioning sodas and foods with copious sugar, Harrissaidin this same town hall answer that “the balance that we have to strike here, frankly, is about what government can and should do around creating incentives and then banning certain behaviors.” The phrase “banning certain behaviors” opened the door to claims that she wants to ban red meat. But she immediately proceeded to her comments about how she enjoys cheeseburgers and favors incentives to prod changes in behavior – making clear in context that she was expressing support for incentives rather than bans.
  
  Asked about Trump’s claim about Harris wanting to outlaw red meat, the Trump campaign provided two citations that did not substantiate it: aYouTube videoof Harris’ comments that was correctly titled “Kamala Harris Wants The Government To Create ‘Incentives’ For Americans to Eat Less Meat” and anarticleheadlined, “Flashback: Kamala Harris said she would support eating less meat if elected president.”
  
  Harris and Trump’s legal cases
  
  Trump has claimed for months that Biden secretly orchestrated his criminal and civil legal cases. This time, he directed the claim at Harris. He said, “But it was all headed up by her. Because she’s a prosecutor.”
  
  Facts First:This is false. There is simply no basis for claiming that Harris “headed up” the legal cases against him. Trump has never presented any evidence for this claim that Biden was the hidden hand behind his cases, let alone for suddenly switching the claim to make it about the vice president after months of saying it about the president.
  
  There is no sign that Harris had any role in bringing charges against Trump in Manhattan, New York (where he wasconvictedof 34 felony counts of falsifying business records) or Fulton County, Georgia (where an election subversion case against Trumpis on hold); those prosecutions have been led by elected local district attorneys. Trump’s two federal cases, onedismissed by a judge earlier this month, were brought by a special counsel, Jack Smith. Smith was appointed by Attorney General Merrick Garland, a Biden appointee, but that is not proof that Biden orchestrated the prosecutions – and certainly not proof that Harris did.
  
  Harris’ immigration role
  
  Trump claimed of Harris: “She was the border czar, but she never went to the border.”
  
  Facts First:Trump made two false claims here. First, Harris did go to the border as vice president,in Texas in mid-2021;many Republicans had criticized Harris prior to the visitfor not having gone, and some later argued that she didn’t go frequently enough, but the claim that she “never” went has not been true for more than three years. Second, Harris was never made Biden’s “border czar,” a label the White House has always emphasized is inaccurate. Inreality, Biden gave Harris a more limited immigration-related assignment in 2021, asking her to lead diplomacy with El Salvador, Guatemala, and Hondurasin an attempt to address the conditions that prompted their citizens to try to migrate to the United States.
  
  Some Republicans have scoffed this week at assertions that Harris was never the “border czar,” noting on social media that news articles sometimesdescribedHarris as such. But those articles were wrong.Various news outlets,including CNN, reported as early as the first half of 2021 that the White House emphasized that Harris had not been put in charge of border security as a whole, as “border czar” strongly suggests, and had instead been handed a diplomatic task related to Central American countries.
  
  A White House “fact sheet” in July 2021said: “On February 2, 2021, President Biden signed an Executive Order that called for the development of a Root Causes Strategy. Since March, Vice President Kamala Harris has been leading the Administration’s diplomatic efforts to address the root causes of migration from El Salvador, Guatemala, and Honduras.”
  
  Biden’s own comments at a March 2021 event announcing the assignment were slightlymore muddled, but he said he had asked Harris to lead “our diplomatic effort” to address factors causing migration in the three “Northern Triangle” countries (he also mentioned Mexico that day). Biden listed factors in these countries he thought had led to migration and said that “if you deal with the problems in-country, it benefits everyone.” And Harris’ comments that day were focused squarely on “root causes.”
  
  Republicans can fairly say that even “root causes” work is a border-related task. But calling her “border czar” goes too far.
  
  Harris and the number of migrants
  
  Trump claimed that Harris “allowed 20 million illegal aliens to stampede into our country from all over the world.”
  
  Facts First:Leaving asideTrump’s claim about Harris’ own responsibility for migration levels, the“20 million” figure is false, a major exaggeration. The total number of “encounters” at the northern and southern border from February 2021 through June 2024, at both legal ports of entry and in between those ports,was about 10 million– and an “encounter” does not mean a person was let into the country; some people encountered arepromptly sent away.
  
  Even if you added the estimated number of Biden-era “gotaways” (people who evaded the Border Patrol to enter illegally), which House Republicanssaid in Maywas nearly two million, “the totals would still be vastly smaller than 15, 16 or 18 million,” Michelle Mittelstadt, spokesperson for the Migration Policy Institute think tank, said in late June after Trump used those figures.
  
  The “encounters” figures can’t be described as figures on people successfully entering the US. Some encounters involve people whoare deemed inadmissible at legal ports and are refused permission to enter. Also, the same person can be “encountered” multiple times if they keep returning to the border to try again – which iswhat happened in many casesunder Biden when the Title 42 rapid-expulsion authority invoked by Trump during the Covid-19 pandemic was in placeinto May 2023.
  
  Harris and fentanyl deaths
  
  Shortly after claiming there is a “Kamala Harris invasion” of the border, Trump said, “We’re losing 300,000 people a year through fentanyl that comes through our border.”
  
  Facts First:Trump’s “300,000” claim is false.The number of US overdose deaths in 2023 involving synthetic opioids, including fentanyl, was approximately 75,000, according to estimated and provisional data published by theUS Centers for Disease Control and Prevention. The CDC saidin Maythatroughly 107,500 peoplein the US died from a drug overdose involving any kind of drug in 2023; even that larger number is nowhere close to Trump’s “300,000.”
  
  When Trump made similar “300,000” claims earlier this year,Dr. Andrew Kolodny, medical director of the Opioid Policy Research Collaborative at Brandeis University, said “I have no idea where Trump is getting ‘300,000’ from and called it “a made-up number.”
  
  While Kolodny said it’s likely that the number of US overdose deaths is undercounted, there is no apparent basis for Trump’s insistence that the real number is nearly triple the reported number. And Kolodny said the undercount issue is centered not on overdoses from illicit fentanyl smuggled across the southern border but on seniors’ overdoses from accidentally taking too much of their legal prescription medications.
  
  It is also worth noting that fentanyl islargelysmuggled by US citizensthrough legal ports of entryrather than by migrants sneaking into the country.
  
  Harris and the Jewish community
  
  Trump criticized Harris for not attending Israeli Prime Minister Benjamin Netanyahu’s Wednesday speech to Congress (though Trump’s running mate, Sen. JD Vance of Ohio,also did not attend); Harris, who is planning to hold a meeting with Netanyahu on Thursday, traveled to Indianapolis on Wednesday to give a previously scheduled speech to a historically Black sorority.
  
  That’s fair game for criticism. But Trump said after criticizing Harris’ absence: “Even if you’re against Israel or you’re against the Jewish people, show up and listen to the concept. But she’s totally against the Jewish people.”
  
  Facts First:Trump’s claim that Harris is “totally against the Jewish people” is nonsense. Harris has been married to a Jewish man, Doug Emhoff, for nearly 10 years – and she hasrepeatedly denounced antisemitism,expressed fondnessfor the Jewish community andits traditions,complimented Israel at length, andendorsed“America’s ironclad commitment to the security of Israel.”Though she has sometimes beenpointedly criticalof the actions of Israel’s government during the war in Gaza, drawingcriticismfrom conservative Jews and others, there is no evidence she has a general antipathy toward “the Jewish people” as Trump claimed.
  
  The Jewish Telegraphic Agency news servicereported this week: “Over the course of her life and career, she has been surrounded by Jews, from her schoolmates to her colleagues to her closest family members. That background has given Harris, 59, an easy familiarity with Jewish spaces, say those who have interacted with her. She has also encouraged Emhoff to embrace his Jewish identity as the second gentleman; for the first time,mezuzahshave been installed at the vice presidential residence, and Emhoff has taken a leading role in the administration’s efforts to fight antisemitism.”
  
  Harris and the bar exam
  
  Trump claimed that Harris, a lawyer who was elected as San Francisco’s district attorney and then as California’s attorney general, “failed her law exams.” Then he continued, “You know that? She couldn’t pass her bar. She couldn’t pass her bar exams…Does anyone know that? … But she’s gonna be a great president, right? No, she couldn’t pass her bar exams. She couldn’t pass anything. Couldn’t pass everything. She couldn’t pass anything.”
  
  Facts First:It’s not true that Harris “couldn’t pass anything.” She did fail on her first attempt to pass the bar exam, according toThe New York Times, but then succeeded. She wasadmitted to the California bar in 1990,the year after she graduated from law school.
  
  Trump could fairly say that Harris couldn’tinitiallypass the bar exam, but his rally comments made it sound like she never passed at all.
