  The new study includes longer observations than previous ones, which captured the evolution of the bubbles, said Dr. Claudia Paladini, associate astronomer at the European Southern Observatory in Chile. Paladini authored a study on the observation ofbubbles on the surface of the star pi1 Gruis. While she was not involved in the new research, she authored an article that accompanies the study in Nature.
  
  “One can see the bubbles coming up, expanding, and vanishing like it’s seen in the Sun. It’s remarkable considering the distance we are talking about,” Paladini said. “Now we just need to observe many more of these stars!”
