title: "Elon Musk says Tesla shareholders will vote ‘immediately’ on quitting Delaware for Texas"
date: "2024-02-01"
section: "Business"
url: "https://www.cnn.com/2024/02/01/business/elon-musk-delaware-texas-hnk-intl?cid=external-feeds_iluminar_yahoo"
content: |
  Stung by a Delaware court ruling earlier this week that struck down his record Tesla pay package, Elon Musk says he is seeking shareholder approval to incorporate the company in Texas.
  
  Soon after Tuesday’srulingabout his 2018 salary package — worth about $51 billion at current stock prices — Musk put up apoll on Xasking if Tesla (TSLA) should move its registration from Delaware to Texas, where it is alreadyheadquartered.
  
  Hours later, the Tesla CEO wrote that the “public vote is unequivocally in favor of Texas.” The poll results showed Texas had won the backing of more than 87% of about 1.1 million votes.
  
  Musk added he will now “immediately” seek shareholder approval to incorporate the electric carmaker in the southern state.
  
  Delawareis famously one of the world’s most welcoming places for companies of all kinds and sizes to incorporate for legal and tax purposes. Nearly 70% of Fortune 500 companies are incorporated there.
  
  Who can rein in Elon Musk? Someone you’ve probably never heard of
  
  It is seen as a desirable place to seek approval for mergers and litigate disputes, and doesn’t levy sales tax or tax on profits from intellectual property.
  
  While Musk has not commented directly on the judgment on his pay package, hetweetedTuesday: “Never incorporate your company in the state of Delaware.”
  
  “I recommend incorporating in Nevada or Texas if you prefer shareholders to decide matters,” he said in anothertweet.
  
  Attorneys for the Tesla shareholders who brought the suit had argued that the package of stock options was excessive and that the company’s directors were too close to Musk to protect their interests.
  
  The 303 million split-adjusted stock options that Musk had received as part of the package are worth $51 billion today, when calculated using Tuesday’s closing price, less the modest exercise price of $23.34 a share.
  
  Delaware Chancery Court Chancellor Kathaleen McCormick, who oversaw the benchtrial that concluded in November 2022, ruled Tuesday that Musk and the Tesla board “bore the burden of proving that the compensation plan was fair, and they failed to meet their burden.”
