  EDITOR’S NOTE:Sign up forUnlocking the World, CNN Travel’s weekly newsletter. Get the latest news in aviation, food and drink, where to stay and other travel developments.
  
  In our latest roundup oftravelnews: love in later life, dark tourism from Chernobyl to Germany, plus a European airline launches an “all you can fly” pass.
  
  There are many chapters in life, and a new adventure might always be waiting at the turn of the page.
  
  American Judy Curtis and Englishman John Nears were both widowed and retired when they crossed paths on a train traveling through Peru in 2004. Their fortuitous meeting led them tounexpected happiness.
  
  University professor Kenneth Harl had been single all his life and expected to stay that way. Then at 60, he went to Turkey to research his next history book. Instead, it was his future that came calling, in the shape of local woman Sema Tegkul. One question changed everything. “Do you believe inlove at first sight?” she asked.
  
  There are numerous tourist destinations around the world that draw visitors keen to learn more about a site’s complex or tragic or isolated history.
  
  Chernobyl once brought tourists to Ukraine to see the site of the worst nuclear accident in history. Visitors are still coming, but now to see scars of more recentterror.
  
  In Hamburg, Germany, a formerNazi bunkerhas been turned into a Hard Rock hotel with a rooftop garden. A new exhibition on the first floor tells the building’s history.
  
  Kalaupapa in Hawaii is one of the most out-of-the-way sites in the US National Park Service. It’s a scenic paradise, but it’s also the world’s most famous colony for people with Hansen’s disease, better known asleprosy.
  
  Finally,North Koreawill reopen to international tourism this winter, tour operators say. Here’s what it’s like to go tosummer campin the isolated nation.
  
  We’re deep into sizzle season in the Northern Hemisphere, and our cities are feeling it the most.
  
  Buildings, roads and sidewalks radiate more heat than grass and trees, pushing temperatures up by as much as 20 degrees Fahrenheit, in what’s known as theurban heat island effect.
  
  What finer escape then, than Lord Howe Island, a remote island some 370 miles off the east coast of Australia where the winter temperatures are currently a breezy 37 F. Its mountains are verdant and its beaches pristine-white, but to protect all that lovely splendor,only 400 touristsat a time are allowed to visit.
  
  If you don’t make the cut this year, our partners at CNN Underscored, a product reviews and recommendations guide owned by CNN, have rounded up the bestanti-chafing productsfor sweating it out in the city.
  
  Disney has announced a whole bunch oftheme park projectsthat will be coming in the years ahead. Visitors will be able to fly like Iron Man, join a battle in Wakanda and venture into an eerie land dedicated to Disney villains.
  
  That follows the news in June that a controversial Disney World attraction was being replaced by its ride featuring its first Black princess, Tiana.Watch here.
  
  Some different thrills are being offered in Norway, with the opening of a 131-foot-long “floating” staircase dangling over a fjord. “It might make most people’s legstremble a bit,” says the ladder’s operations manager.
  
  In the heart of Michigan’s fruit belt, a region rich with orchards and gardens, Grand Rapids is perhaps best known for its fermented produce, having held theBeer City USAtitle since 2012.
  
  It’s a city of crafters, designers, innovators and artists, with a long lineage stretching from its renowned furniture designers of the 19th century to the impressive public art, meticulous flower beds and cutting-edge industrial design of today.
  
  A European airline has launched an “all you can fly” pass.
  
  Although it’s been named theworst airlinefor UK flight delays three years in a row.
  
