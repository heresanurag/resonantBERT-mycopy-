title: "Fact check: Trump makes false courthouse claims about bail and his campaign schedule"
date: "2024-05-03"
section: "Politics"
url: "https://www.cnn.com/2024/05/03/politics/fact-check-trump-bail-campaign-schedule/index.html"
content: |
  Continuing his barrage of courthouse deception, former President Donald Trump made more false claims about hisManhattan trialon Friday.
  
  Trump has beenrepeatedly inaccuratein his comments to media cameras upon entering and exiting the courtroom, where he is facing charges of falsifying business records. On Thursday afternoon, hefalsely claimedthat the judge’s gag order means he is not allowed to testify in the case.
  
  On Friday morning, heacknowledgedthat he is allowed to testify — but he made new inaccurate claims about the case, falsely claiming he had been forced to post bail and that the trial is preventing him from campaigning this weekend.
  
  Trump said: “New York City is a violent city; it’s become violent with the cashless bail. I’m the only one who has to put up bail.”
  
  Facts First:Trump’s claim is false. Like many other New York defendants whose alleged crimes arenon-violent, hedidn’t have to put up bail. After his arraignment in 2023, he was released on his own recognizance — in other words, without having to post any cash.
  
  Trump did have to posta $200,000 bondin his separate election subversion case in Fulton County, Georgia (contributing 10% himselfand working with a bail bonds company to cover the rest), but his clear Friday suggestion was that he is being treated uniquely harshly in New York. He was released on his own recognizance in his twofederalcriminalcases—one in Washington, DC, over his attempts to overturn the 2020 election, and one in Florida over his post-presidency retention of classified documents.
  
  Trump’s assertion that New York City is “a violent city” is subjective. It’s worth noting, though, that violent crime in the city hasplummeted over the last two decades, that the city has long hadlower crime rates than many other big and small communitiesaround the country, and that the impact of New York state bail reforms on the city’s recent crime levels is disputed.
  
  Trump continued Friday to complain that the New York trial is preventing him from being on the campaign trail. This time, he said: “We were already marked down — months ago, we were marked down to be in Georgia today, where we’re doing very well at the polls, by the way. But that’s where we were supposed to be. We’re supposed to be in Ohio tomorrow and we’re supposed to be in Florida on the next day, doing — campaigning, essentially campaigning. So now I have to go through this trial day after day.”
  
  Facts First:Trump’s claim that the trial is preventing him from having campaign events this weekend is false. The trial is not being held on weekends (or on Wednesdays), so he is free to campaign wherever he wants on Saturday and the day after — and he is planning to fly to Florida.Trump is scheduled to headline a closed-doorRepublican National Committee fundraising luncheon at his Mar-a-Lago club on Saturday, and he is expected at the Miami Grand Prix Formula One race on Sunday.
  
  There is no apparent basis for Trump’s claim that he was supposed to be in Ohio on Saturday; he isplanning to visit the state on May 15, another court-free Wednesday. And it’s unclear what his campaign internally “marked down,” but he had never publicly scheduled a campaign event for Georgia on Friday.
  
  Trumpheld campaign rallies in Wisconsin and Michigan this Wednesday, and he had a rally planned for North Carolina last Saturday that wascalled off because of severe weather. However, he has regularly declined to visit swing states or hold public events on his days without court,opting insteadto host dinners and meetings at Trump Tower in Manhattan or to play golf at his club in Bedminster, New Jersey.
