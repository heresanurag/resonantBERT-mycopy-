  Melanie Safka, the singer who was best known for hit songs including “Lay Down (Candles in the Rain)” and “Brand New Key,” has died, her family said in a statement.She was 76. Safka, who went by the mononym Melanie, released two singles and an album in the late 1960s, but it was her appearance at theWoodstock Festival in 1969that cemented her breakthrough.
  
  $45 millionThat’s how much the utility giant Pacific Gas and Electric will pay in penalties for its role in the Dixie Fire — the second-largest wildfire in California’s history —state regulators said Thursday. An investigation found the inferno that destroyed over 1,300 structures ignited when power lines owned by PG&E came in contact with a tree in 2021.
  
  “His Majesty would like to thank all those who have sent their good wishes.”
  
  — Buckingham Palace, announcing that Britain’s King Charles III wasadmitted to a London hospital earlier todayahead of a corrective procedure for an enlarged prostate. The statement said the 75-year-old monarch is also “delighted to learn that his diagnosis is having a positive impact on public health awareness.”
  
