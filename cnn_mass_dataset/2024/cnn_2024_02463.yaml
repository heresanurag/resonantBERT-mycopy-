title: "Start your week smart: Iranian assassination plot, Ukraine drone attack, setback in Gaza talks, markets soar, Tuskegee shooting"
date: "2024-11-10"
section: "US"
url: "https://www.cnn.com/2024/11/10/us/5-things-sunday-november-10-trnd/index.html"
content: |
  Need a little inspiration to get off the couch this Sunday? Look no further thanthis octogenarianwho recently completed her 21st marathon!
  
  Here’s what else you need to know toStart Your Week Smart.
  
  • The Justice Department announced federal chargesin a thwarted Iranian plotto kill Donald Trump before the presidential election. According to court documents, Farhad Shakeri is still at large in Iran. Meanwhile the final presidential projection showed that Trump will win Arizona, completing a sweep of the battleground states and bringing his total number of projected Electoral College votes to 312, compared with 226 for Kamala Harris.Follow live updates.• Russia and Ukraine haveexchanged record numbers of drone strikes, with Moscow launching a total of 145 drones – the most ever in a single nighttime attack of the war. Ukraine, meanwhile, fired an unprecedented number of drones toward Russia’s capital.•Qatar is suspending its role as a mediatorin talks between Israel and Hamas after concluding that the two sides are no longer negotiating in good faith, its foreign ministry said. Qatar, alongside Egypt, served as an intermediary for the two sides, which do not officially maintain direct contact.• US stocks closed at record highs,notching their best week all yearafter Trump’s election victory. The S&P 500 briefly crossed 6,000 points for the first time ever before closing at about 5,996. The Dow rose about 260 points.•One person was killedand several others were injured in a shooting on the last day of homecoming week at Alabama’s Tuskegee University. Social media video shows people ducking for cover at a parking lot as gunshots rang out.
  
  MondayNovember 11 isVeterans Day, a holiday honoring men and women who have served in the US armed forces.
  
  TuesdayThe judge who presided over Donald Trump’s hush money trial earlier this year is expected to decide whether to wipe away Trump’s convictionon 34 countsof falsifying business records to cover up a payment to an adult film star, or to proceed with sentencing the president-elect later this month.Judge Juan Merchan’sself-imposed deadline follows the Supreme Court’sdecision this summergranting a president partial presidential immunity. If Merchan decides to wipe away the conviction, the charges will be dismissed.
  
  Wednesday﻿Senate Republicans will choose a successor to Mitch McConnell, who announced in February that he would not run for leader in the next Congress, ending what will be an 18-year tenure. TexasSen. John Cornynand Senate GOP Whip John Thune,the two top candidates to succeed McConnell, poured millions into GOP candidates’ campaign accounts and stumped for them on the trail as part of an effort to lock up support. A third leadership candidate, Florida Sen.Rick Scott, is seen as a long shot, even though he has been in regular contact with Trump in their home state.
  
  The House Committee on Oversight and Accountability will hold a hearing onUnidentified Anomalous Phenomena— more commonly known as UFOs. Three retired military veterans testified at a hearing in July 2023 that the sightings are a national security problem and that the government has been too secretive about them. One went as far as to claim that the US government has not onlyUFOs in its possessionbut also the remains of the allegedly “non-human” pilots of the craft.
  
  ThursdayPresident Joe Biden is scheduled to travel to Lima, Peru, to attend the 2024Asia-Pacific Economic Cooperation Summit. The 21 APEC member economies — which include China, Japan and Australia — make up nearly half of global trade and nearly 40% of the global population.
  
  Happy birthday toKing Charles III, who turns 76.
  
  One Thing: 🎧 How Trump sold himIn this episode of the “One Thing” podcast, CNN’s David Rind speaks to an Illinois man who was convinced to vote for Trump after years of voting for Democrats.Listen here.
  
  Check out more imagesfrom the week that was, curated by CNN Photos.
  
  TV and streamingFormer world heavyweight championMike Tyson will face Jake Paul— the YouTuber-turned-boxer — in a highly anticipated bout that will be streamed on Netflix at 8 p.m. ET Friday. The match wasoriginally slated for July 20but was delayed after Tyson suffered an ulcer flare-up in May. Tyson, 57, will participating in his first professional matchup since 2005. Paul, who is 30 years younger than Tyson, competed in his first boxing match in 2018.
  
  In theatersThanksgiving may still be a few weeks away, but that’s not stopping Hollywood from getting into the Christmas spirit. Dwayne Johnson and Chris Evans team up to rescue a kidnapped Santa Claus in“Red One.”Lucy Liu and J.K. Simmons co-star. “Red One” flies onto the big screen Friday.
  
  At a glance …In the NFL, we’re now officially past the halfway point of the season.Here’s what to watch forin today’s games.
  
  In college football, Oregon quarterback Dillon Gabrielbroke the NCAA recordfor total career touchdowns during his team’s win over Maryland.
  
  In the MLS playoffs, Lionel Messi and Inter Miami were eliminated by Atlantain a shocking first-round upset.Miami entered the postseason as the No. 1 seed and heavy favorite to win the championship.
  
  NASCAR Hall of Famer and three-time Daytona 500 winner Bobby Allisondied at the age of 86at his home in Mooresville, North Carolina.
  
