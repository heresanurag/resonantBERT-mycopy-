title: "Shoppers continue indulging in Black Friday sales, but mostly online"
date: "2024-12-01"
section: "Business"
url: "https://www.cnn.com/2024/12/01/business/black-friday-holiday-shopping/index.html"
content: |
  Despite retailers offering holiday discounts earlier than usual this year, US consumers did more shopping on Black Friday than the days leading up to it.
  
  In-store and online retail sales saw a 3.4% increase year-over-year on Black Friday, according to Mastercard SpendingPulse.
  
  “Shoppers are making the most of seasonal deals and enjoying a balance of experiences spending and gifts for all loved ones,” said Steve Sadove, senior advisor for Mastercard, in a news release. “They’re more strategic in their shopping though, prioritizing promotions that they believe hold the greatest value — opening their wallets, but with more intentional distribution.”
  
  More people turned to online shops on Friday, while in-store sales grew less than 1% compared to last year. According to Mastercard, online sales were up 14.6% from last year. Despite warm weather lasting longer into the fall, apparel was popular with online shoppers.
  
  Mastercard said there was an increase in grocery spending during the two weeks leading up to Black Friday and people were spending big at restaurants the day after Thanksgiving.
  
  According to Adobe Analytics, online shoppersspent $10.8 billion on Fridaycompared to $9.8 billion in 2023. Shoppers set a record this week byspending $6.1 billionon Thanksgiving Day.
  
  Adobe expects Cyber Monday to be the year’s biggest shopping day, though. It estimated shoppers will spend a record $13.2 billion, up 6.1% year-over-year.
  
  Shopify, an e-commerce site, reported that it set a new record for its Black Friday sales, which reached $5 billion globally. The average cart price for US shoppers was about $157, with many looking for products like t-shirts, skincare and vitamins.
  
  The National Retail Federation estimated in October that Americans would spend$902 per personon gifts, food, decorations and other items during the holiday season — $25 per person more than last year and $16 more than the record set in 2019 — but economists didn’t expect this week tobe anything out of the ordinary.
  
  The NRF estimated that shoppers would spend $261 on food, candy and decorations and other holiday items.
  
  Mastercard said jewelry, electronics and apparel were the top purchases on Black Friday, with consumers taking advantage of big discounts.
  
  But great deals don’t always mean high quality. Flora Bagenal, producer of Netflix’s “Buy Now!” documentary, told CNN’s Fredricka Whitfield on Saturday that these electronics, toys and clothes are mass-produced and eventually thrown out by consumers. It creates a cycle of overconsumption that hurts the environment.
  
  “That’s where consumers have a bit more power to make some more choices around the things that we buy,” she said. “Just not falling for stuff that is probably not gonna last very long.”
