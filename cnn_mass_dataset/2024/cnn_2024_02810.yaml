title: "Rep. Nancy Mace says she was ‘physically accosted’ on Capitol grounds"
date: "2024-12-10"
section: "Politics"
url: "https://www.cnn.com/2024/12/10/politics/nancy-mace-says-she-was-physically-accosted"
content: |
  US Capitol Police arrested a person who Rep. Nancy Mace said “physically accosted” her Tuesday, the South Carolina Republican said ina poston X.
  
  “I was physically accosted tonight on Capitol grounds over my fight to protect women. Capitol police have arrested him. All the violence and threats keep proving our point. Women deserve to be safe. Your threats will not stop my fight for women!” Mace said.
  
  “One new brace for my wrist and some ice for my arm and it’ll heal just fine,” shealso posted.
  
  Asked about Mace’s claim, Capitol Police said they received a report just after 6 p.m. from a member of Congress’ office of an incident in the Rayburn Office Building. Officers and agents with the Threat Assessment Section tracked down and arrested a suspect, charging them with assaulting a government official, the agency said.
  
  James McIntyre, 33, of Illinois pleaded not guilty Wednesday in DC Superior Court to one misdemeanor charge of simple assault and was released with a “stay away” order, according to court records. Mace, according to a police filing in the case, described the person placing their hands over hers and “began to aggressively and in an exaggerated manner shake her arm up and down in a hand shaking motion” for a few seconds.
  
  Last month, the South Carolina Republican made headlines when sheintroduced a resolutionto ban transgender women from using women’s restrooms at the Capitol andfiledbroader legislation that would apply to every federal building and federally funded school. The moves followed the election of Democratic Rep.-elect Sarah McBride of Delaware, who will be the first out transgender person to serve in Congress.
  
  In the wake of the Supreme Court overturningRoe v. Wadein 2022 and her party’s efforts to hold onto women voters, Macehas often saidshe’s looking for ways to show that the GOP is“pro-women.”
  
  This story has been updated with additional developments.
