title: "Haley says she thinks Biden should resign"
date: "2024-02-13"
section: "Politics"
url: "https://www.cnn.com/2024/02/13/politics/nikki-haley-joe-biden-resign/index.html"
content: |
  Republican presidential candidate Nikki Haley on Tuesday said she thinksPresident Joe Bidenshould resign, as it would be in “the best interest of the country.”
  
  Asked by radio host Hugh Hewitt during an interview if she believes the president should step down, Haley responded: “Yes, I do.”
  
  “I think the Democrat Party knows that and I think that it is not just in the best interest of their party. It’s in the best interest of the country. What I will tell you – and I have said this from the very beginning – the party that gets rid of their 80-year-old candidate is the party that will win,” Haley said.
  
  “We cannot have a country in disarray and a world on fire and have two presidential candidates in their 80s when we need someone who’s going to put eight years into making sure that we are disciplined, focused on getting our economy, the border, preventing war, and getting our country back on track,” she added.
  
  Haley has made similar calls for years – shecitedBiden’s foreign policy as a reason he should step aside in early 2022, and last month, after it was revealed that Defense Secretary Lloyd Austin did not disclose a hospitalization, she said Biden should be“fired”over the controversy.
  
  But Tuesday’s remark is especially pointed as Haley istrying to gain tractionahead of a crucial GOP primary in her home state of South Carolina and asquestions over Biden’s fitness for officehave been renewed in the wake of special counsel Robert Hur’s report, which, although it did not charge the president with a crime, painted a picture of apparent lapses in memory after Biden failed to properly protect highly sensitive classified information.
  
  The former South Carolina governor has frequently taken digs at Biden, who is 81, and former President Donald Trump, 77, over their age, arguing they are both too old to serve another four years as president. Haley, 52, has also been adamant about calling for term limits andmental competency testsfor any politician over the age over the age of 75.
