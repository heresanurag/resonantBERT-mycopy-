title: "Kylie Minogue honored with global icon award at the Brits"
date: "2024-03-02"
section: "Entertainment"
url: "https://www.cnn.com/2024/03/02/entertainment/kylie-minogue-brits-global-icon-award?cid=external-feeds_iluminar_cnn-brasil"
content: |
  England’sbiggest night in musictook place Saturday across the pond, and one international superstar received one the highest honors.
  
  Australian pop sensationKylie Minoguewas honored at the Brit Awards in London with the global icon award, recognizing her nearly 40-year career in music. She was also nominated for international artist of the year at the event, and took the stage to close the show with a blowout medley performance of her biggest hits.
  
  Ahead of the show, Minogue spoke with theBrit Award correspondents, saying how her “mind has not stopped for a while” amid all the accolades and activity, but that she is “very much looking forward to tonight.”
  
  The global icon award was presented to Minogue by Dua Lipa, who referred to her as “the eternal queen of pop.”
  
  When Minogue was on stage to accept the honor, she said, “the thing that really gets me is the love of music and the connection with people.”
  
  “There’s a part of me that’s still the 14-year-old girl in her room dreaming of making music,” she added.
  
  Soon after receiving the award, Minogue took the stage once again to perform a medley of her hits, from “Padam, Padam” to “Slow” to “Can’t Get You Out of My Head,” as the final act of the night.
  
  “Tension,” the sixteenth studio album from Minogue released in September, has heralded yet another resurgence in popularity for the star, most notably for its lead singe “Padam, Padam,” whichdominated the airwavesand party playlists last summer.
  
  Outside of the festivities in London this weekend, Minogue is currently performing in residency in Las Vegas.
