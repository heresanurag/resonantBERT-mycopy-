title: "‘It’s a scary time’: US universities urge international students to return to campus before Trump inauguration"
date: "2024-12-26"
section: "US"
url: "https://www.cnn.com/2024/12/26/us/international-students-us-colleges-trump/index.html"
content: |
  Fear and uncertainty are spreading across many US college campuses ahead of President-elect Donald Trump’s January 20 inauguration, with some schools advising international students to return early from winter break amid promises of another travel ban like the one that stranded students abroad at the start of Trump’s last term.
  
  In a country wheremore than 1.1 million international studentsenrolled in US colleges and universities during the 2023-24 academic year, the former president has pledged more hardline immigration policies upon his return to the White House, includingan expansion of his previous travel banon people from predominantly Muslim countries and the revocation of student visas of “radical anti-American and antisemitic foreigners.”
  
  International students generally have nonimmigrant visas that allow them to study in the US but don’t provide a legal pathway to stay in the country.
  
  Trump has vowed to give green cards to college grads. Could that actually happen?
  
  “It’s a scary time for international students,” said Pramath Pratap Misra, 23, a student from India who graduated from New York University this year with a bachelor’s degree in political science. NYU had the most international students in the US –more than 27,000– during the last academic year.
  
  On campuses from New York to California, students not only buckled down to take finals before winter break but some also braced for possible disruptions to their lives and the possibility of not being able to complete their studies. Some universities have urged students to put off or cut short travel plans outside the US before the inauguration.
  
  Cornell University’sOffice of Global Learning advised studentswho are traveling abroad to return before the January 21 start of the spring semester or to “communicate with an advisor about your travel plans and be prepared for delays.”
  
  “A travel ban is likely to go into effect soon after inauguration,” the university warned students late last month. “The ban is likely to include citizens of the countries targeted in the first Trump administration: Kyrgyzstan, Nigeria, Myanmar, Sudan, Tanzania, Iran, Libya, North Korea, Syria, Venezuela, Yemen, and Somalia. New countries could be added to this list, particularly China and India.”
  
  At the University of Southern California, which had more than 17,000 international students during the last academic year, administrators urged foreign students in an email to be back in the US one week before Trump’s White House return, saying that “one or more executive orders impacting travel … and visa processing” may be issued. USC has the largest number of international students in California.
  
  Trump has threatened  the visas of international student protesters. A post-grad at risk shares his fears
  
  “While there’s no certainty such orders will be issued, the safest way to avoid any challenges is to be physically present in the U.S. before the Spring semester begins on January 13, 2025,” said the USC Office of International Service, according to a report in thestudent-led media site.
  
  Additionally, Trump’s promise of“mass deportations”reverberates beyondcritical industries such as agriculture, leisure and hospitality, construction and health care: It potentially complicates matters for some students regardless of their winter break travel plans.
  
  The president-elect has at the same timepromised to “automatically” give green cardsto foreign nationals who graduate from US colleges, a proposal that — if pursued by Trump and passed by Congress — could pave the way for potentially millions of international students to become legal permanent residents.
  
  Shortly after Trump made that pledge in June, however, a campaign spokespersonsaid that group would be limitedto the “most skilled graduates” and screened to “exclude all communists, radical Islamists, Hamas supporters, America haters and public charges.” Public charges refers to those who rely on or seek public assistance. Trump hasn’t publicly mentioned the proposal since June, and it’s not clear how his new administration will approach the issue.
  
  One day after the presidential election last month,UCLA’s Center for Immigration Law and Policyreminded students that the university “will not release immigration status or related information in confidential student records … without a judicial warrant, a subpoena, a court order, or as otherwise required by law.”
  
  “The University also has a strict policy that generally prevents campus police from undertaking joint efforts with federal immigration enforcement or detaining people at the federal government’s request,” the center said.
  
  In October 2023, after the start of Israel-Hamas war sparked protests on US college campuses, Trump said at a campaign event that he would revoke student visas and deport“radical anti-American and antisemitic foreigners”enrolled in universities. He criticized pro-Palestinian protests and said he would send Immigration and Customs Enforcement officers to what he called “pro-jihadist demonstrations.”
  
  Trump also vowed to reinstate and expand his previous travel ban on people from predominantly Muslim countries – which limited travelers from Iran, Libya, Iraq, Sudan, Somalia, Syria and Yemen. The administration later extended the travel ban to include several African countries. PresidentJoe Bidenrevoked the travel banafter he took office in 2021.
  
