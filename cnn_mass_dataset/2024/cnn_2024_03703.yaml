  TheMassachusetts Institute of Technologyurged students to avoid “making decisions based on social media and news reports or rumors.”Northeastern University,which enrolls more international studentsthan any US college after NYU, recommended they return to campus by January 6 to “minimize potential disruption to your studies, work, or research.”
  
  Harvard University’s International Officeadvised students and scholars to “budget time ahead of the semester start, prior to the January Martin Luther King holiday” to avoid disruptions or delays. Wesleyan University, in a letter to students traveling abroad, recommended they return by January 19 amid “uncertainties around President-elect Donald Trump’s plans for immigration-related policy.”
  
  “The best way to anticipate or predict what will happen in the second Trump administration is to look at what happened in the first administration, and what we saw in the first Trump administration was an effort to restrict the entry of foreign born (students and workers) throughout every category,” Stuart Anderson, executive director of the National Foundation for American Policy, a nonpartisan research organization, said during a recentpost-election briefing hosted by the Presidents’ Alliance on Higher Education and Immigration.
