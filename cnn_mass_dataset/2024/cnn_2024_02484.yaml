title: "Boeing stock drops as Alaska Airlines incident adds to woes"
date: "2024-01-08"
section: "Investing"
url: "https://www.cnn.com/2024/01/08/investing/boeing-stock-alaska-airlines-737-max/index.html"
content: |
  Shares of Boeing and one of its key suppliers dropped sharply on Monday as investors grew worried about possibledamage to the businessesafter a piece of fuselage on a Boeing 737 Max 9blew out mid-flight.
  
  The Alaska Airlines flight, which had been travelling from Portland, Oregon, to Ontario, California, on Friday, made an emergency landing after part of the wall of the aircraft detached itself, leaving a gaping hole in the side of the plane. The cause of the incident has not been determined.
  
  The Federal Aviation Administration on Saturday ordered all Boeing 737 Max 9 aircraft to be grounded until they can be carefully inspected. The order applies to 171 planes around the world, and airlines in Turkey and Panama have also grounded flights.
  
  Aviation trial attorney Robert Clifford told CNN the incident will have reputational repercussions for Boeing and the company will likely be on the hook to pay airlines for lost revenue.
  
  Boeing (BA) shares dropped more than 8% on Monday, while shares of aerospace supplier Spirit AeroSystems (SPR) fell by about 11%. The company manufactured and completed the initial installation of part of the plane’s fuselage, Reutersreported, citing unnamed sources. Spirit did not immediately respond to a request for comment.
  
  Shares of Alaska Air Group declined 0.2%.
  
  Meanwhile, United Airlines on Monday said it found loose door plug bolts on an undisclosed number of its Boeing 737 Max 9 aircraft during its FAA-mandated inspections of the aircrafts following the Alaska Airlines incident.
  
  “Since we began preliminary inspections on Saturday, we have found instances that appear to relate to installation issues in the door plug — for example, bolts that needed additional tightening,” United Airlines said in a statement.
  
  Shares of United rose 2.8% on Monday.
  
  The incident is the latest in along string of problemsfor Boeing. Since thegrounding of the 737 Maxin March 2019, followingtwo crashesthat killed 346 people, Boeing’s financial losses have mounted.
  
  The company reported an annual loss for four straight years from 2019 to 2022, and logged a$2.2 billion net lossfor the first nine months of last year. Its full-year results for 2023 are due at the end of January.
  
  Boeing’s share price has recovered since the pandemic threw the global airline industry into turmoil but is still down about 34% from its peak in February 2020.
  
  In comparison, shares in Airbus, Boeing’s European rival, are trading above their pre-pandemic peak, rose 2.5%﻿ from their previous close in Paris on Monday.
  
  A terrifying 10 minute flight adds to years of Boeing’s quality control problems
  
  Together, Airbus and Boeing dominatethe global aviation market. But Airbus overtook its American counterpart in 2018 in the number of jets it delivered to customers, and has stayed out in front ever since.
  
  In 2023, Airbusdelivered 623jets to customers within the first 11 months, compared with461for Boeing. Airbus will announce its full-year deliveries on Thursday, a company spokesperson told CNN.
  
  ﻿Some of Boeing’s woes have been beyond its control. Trade tensions between the US and China have largely closed off that key growth market. But the company has faced repeated quality and safety issues with its aircraft over the past five years.
  
  Ten days ago, Boeing asked airlines to inspect all of their 737 Max jets forloose bolts in the rudder system, after an unnamed international carrier discovered a potential problem with the key part on two aircraft.
  
  —CNN’s Krystal Hur, Pete Muntean and Gregory Wallace contributed to this report.
