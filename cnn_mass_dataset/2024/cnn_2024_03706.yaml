  EDITOR’S NOTE:Sign up forUnlocking the World, CNN Travel’s weekly newsletter. Get the latest news in aviation, food and drink, where to stay and other travel developments.
  
  Intravelnews this week: how Japan led the world’s high-speed rail revolution, the couple who rode motorcycles round the world with three rescue dogs – plus we put the spotlight on America’s world-class cuisine.
  
  From Louisiana gumbo to Hawaiian poke to the humble PB&J, the United States is home to many fantastic dishes. Here are CNN Travel’s picks of 20 of the best of them –see if your favoritesmade it to the table.
  
  And it’s not just US cuisine that Americans are winning at. The Italy-based 50 Top Pizza Awards revealed its 2024 list recently, and the winning restaurant wasn’t in Naples or Rome. Instead, it was apizza jointon Manhattan’s Lower East Side.
  
  Then there’s Virginia woman Jane Satow, who moved to the southern French region of Provence, known for its lavender fields and Mediterranean cuisine, and opened acooking schoolteaching French people how to make authentic local cuisine.
  
  It’s been 60 years since Japan’s first high-speed Shinkansen bullet train made its debut, inspiring a rail revolution that spread around the world. Now China’staking the batonand developing magnetically levitating Maglev trains capable of running at almost 400 mph (640 kph).
  
  In Europe, a fresh wave of rail startups promised an exciting new era for night trains, with new routes, cheaper fares or more luxurious accommodation among the approaches on offer. Those bright visions, however,were soon derailed.
  
  Finally, low-cost intercity travel is under threat in the United States, asGreyhound bus stationsare closing down in a nationwide trend. Chicago is close to losing its only intercity bus terminal, jeopardizing travel freedom for many low-income, elderly and minority travelers with limited transportation options.
  
  First-class pampering on a luxury flight with blankets, treats and an onboard spa – if that’s “a dog’s life,” then pop a collar on me and call me Rex. Bark Air is a new airline for dogs and their human companions, who’ll also be the ones footing the $8,000 bill for a one-way international ticket for one canine-person pairing.Watch here.
  
  Of course, some travelers prefer “ruffing it” to the lap of luxury. An Australian couple set off on a motorbike world tour with their beloved pet. When tragedy struck and their dog passed away, they found comfort through their new travel companions:three rescue dogswho faced their own challenges before joining the growing family.
  
  Before diving into their touching story, though, some readers may want to take a look at this guide to thebest waterproof mascaras, as reviewed by our partners at CNN Underscored, a product reviews and recommendations guide owned by CNN. You can thank us later.
  
  Rome’s Trevi Fountain is one of the most celebrated landmarks in one of the world’s most celebrated cities. But where do its waters flow from?Watch this videoto see how it’s powered by an ancient Roman aqueduct.
  
