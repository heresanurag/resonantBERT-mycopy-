  Shares of GameStop climbed 21% on Monday as the renewed frenzy aroundmeme stocksshows little sign of abating.
  
  The video game retailer’s stock soared hours after a Redditpostby stocks influencer Keith Gill — also known as “Roaring Kitty” — revealed that he had bought nearly $116 million worth of the stock. GameStop’s stock surged as much as 75% earlier in the day before parings its gains.
  
  The post was the first on Gill’s Reddit account in more than three years, whensocial media-fueled hypearound GameStop (GME) shares was in full swing.
  
  Meme stocks are shares that swing wildly in value based on their popularity among trader communities on social media rather than the companies’ fundamental characteristics. The frenzy started with GameStop in 2021,extending to other companiessuch as AMC Entertainment (AMC) and Bed, Bath and Beyond, which has sincefiled for bankruptcy.
  
  Shares of AMC Entertainment were up 11.1% on Monday.
  
