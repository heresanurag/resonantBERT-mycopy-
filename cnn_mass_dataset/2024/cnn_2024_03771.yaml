title: "Europe in ‘pre-war era,’ warns Poland’s Prime Minister Tusk, citing Russia’s threat"
date: "2024-03-29"
section: "Europe"
url: "https://www.cnn.com/2024/03/29/europe/poland-tusk-europe-pre-war-russia-ukraine-intl/index.html"
content: |
  Polish Prime MinisterDonald Tuskhas warned that Europe is in a “pre-war era” but still has a “long way to go” before its ready to confront the threat posed byRussia.
  
  “War is no longer a concept from the past. It is real, and it started over two years ago. The most worrying thing at the moment is that literally any scenario is possible. We haven’t seen a situation like this since 1945,” Tusk said in an interview with German newspaper Die Welt published Friday.
  
  “I know it sounds devastating, especially for the younger generation, but we have to get used to the fact that a new era has begun: the pre-war era. I’m not exaggerating; it’s becoming clearer every day.”
  
  Since Russia launched its full-scaleinvasion of Ukrainein February 2022, European leaders and military officials have grown increasingly concerned that the conflict could spill over to other countries on its border. Russian President Vladimir Putin has repeatedly denied that Russia intends to attack NATO countries.
  
  Russia’s war upended the post-Cold War geopolitical order, forcing Europe to take seriously its own defense after decades of dwindling military budgets and prompting countries on its border to take more drastic measures.
  
  SwedenandFinlandrecently joined NATO – something that until two years ago would have been unthinkable for the two famously neutral Scandinavian countries. In the Baltics,EstoniaandLithuaniahave bolstered their defense budgets far above NATO’s minimum commitment of 2% of GDP. AndMoldova, which borders Ukraine and has long been vulnerable to Russian meddling, is on an accelerated path to the European Union.
  
  Meanwhile, the triumvirate ofFrance,Germanyand Poland – the so-called “Weimar Triangle” – has been spearheading the continent’s efforts to rearm and guard itself against further Russian aggression.
  
  Tusk returned to power after last year’s election and has since been trying to haul Poland back into the European mainstream after nearly a decade ofauthoritarian ruleunder the populist Law and Justice Party.
  
  Poland, sandwiched between Germany and Russia, has long been aware of the importance of strong defense. This year, Poland’s military budget was more than 4% of its GDP – double NATO’s guideline. It has also welcomed millions of Ukrainians who have fled Russia’s invasion.
  
  Last weekend, Poland said a Russian cruise missile aimed at Ukraine hadentered its airspace– arepeat occurrenceduring more than two years of war – and demanded an explanation from Moscow.
  
