  Despite Europe’s efforts to bolster its defense, Tusk said the continent still “has a long way to go.” He said it must be “independent and self-sufficient in defense” while maintaining a strong alliance in the US.
  
  While US President Joe Biden has remained steadfast in his support for Ukraine, former PresidentDonald Trumpsaid last month that, if reelected in November, he would encourage Russia to do “whatever the hell they want” to any NATO member that doesn’t meet spending guidelines on defense.
  
  “Our job is to nurture transatlantic relations, regardless of who the US president is,” Tusk said.
  
  Tusk also warned that Russian President Vladimir Putin could use the terrorist attack atCrocus City Hallin Moscow as a pretext to escalate the war in Ukraine.
  
  “We know from history that Putin uses such tragedies for his own purposes,” he said, recalling events in 2002 when Chechen gunmen took 800 hostages inMoscow’s Dubrovka Theatreand in 2004 when Chechen rebels took 1,200 children and adults hostage at a school inBeslan, southern Russia.
  
  “Putin has already begun blaming Ukraine for the preparation of this attack, although he has not provided any evidence. Obviously, he feels the need to justify the increasingly violent attacks on civilian sites in Ukraine,” Tusk said.
