title: "‘Cosmic clock’ dates earliest human presence in Europe"
date: "2024-03-06"
section: "Europe"
url: "https://www.cnn.com/2024/03/06/europe/stone-tools-earliest-humans-europe-scn?cid=external-feeds_iluminar_yahoo"
content: |
