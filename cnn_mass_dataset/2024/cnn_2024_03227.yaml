id: cnn_2024_03227
title: "Fisher-Price recalling 2 million infant swings following five deaths"
date: "2024-10-11"
section: "Business"
url: "https://www.cnn.com/2024/10/11/business/fisher-price-snuga-infant-swings-recall/index.html"
content: |
  Fisher-Price is recalling more than 2 million infant Snuga Swings due to a suffocation risk found after reports thatfive children died sleeping in the device.
  
  In analertissued by the US Consumer Product Safety Commission (CPSC), the $160 device “should never be used for sleep and bedding materials should never be added to it” because the headrest and body support insert located on the seat cap “can increase the risk of suffocation.”
  
  Five deaths were reported between 2012 and 2022, and all were infants aged between 1 and 3 months using the swings for sleep. The agency said that in “most” of the incidents the children were unrestrained, andthe swing had bedding materials added to it.
  
  The American Academy of Pediatricsrecommendsto keep loose blankets, pillows, stuffed toys, bumpers and other soft items out of the sleep space.
  
  There are 21 models of Snuga Swings, all of which are part of the massive recall. A full list of models and product numbers are available on theCPSC website.
  
  The device has been sold in the United States, Canada and Mexico since 2010. Retailers include Amazon, Toys R Us, Target and both Walmart and Sam’s Club.
  
  People who keep the Snug Swing should “immediately remove” the headrest and body support insert on the seat pad. Fisher-Price is providing a $25 refund to owners who remove those parts, which is available toaccess on Mattel’s website.
  
  Despite that remedy, Richard Trumka Jr., a commissioner of the CPSC, blasted Fisher-Price for not recalling the whole product and said customers should be fully refunded.
  
  “I believe that the flawed recall that Fisher-Price is announcing today is doomed to fail and will keep many babies in harm’s way,” he wrote in astatement. “My advice: get your $25 refund and then throw this product away; do not keep it in your homes because even after the so-called ‘repair’ this product will still be unsafe for infant sleep.”
  
  Mattel didn’t immediately respond to CNN’s request for comment about Trumka’s remarks.
  
  Fisher-Price has previously recalled other infant swings, including its problem-prone Rock ‘n Play Sleepers. That device was involved in two recalls,including last yearwhen eight infant deaths occurred after its initial 2019 recall.
