title: "Once celebrated, an inventor’s breakthroughs are now viewed as disasters — and the world is still recovering"
date: "2024-05-24"
section: "World"
url: "https://www.cnn.com/2024/05/24/world/thomas-midgley-jr-leaded-gas-freon-scn/index.html"
content: |
  Sign up forCNN’s Wonder Theory science newsletter. Explore the universe with news on fascinating discoveries, scientific advancements and more.
  
  Facing a crowd of journalists, inventor Thomas Midgley Jr.poureda lead additive over his hands and then proceeded to inhale its fumes for about a minute. Unfazed, he said, “I could do this every day without getting any health problems whatsoever.”
  
  Soon afterward, Midgley needed medical treatment. But the act would have dire consequences beyond his own well-being.
  
  The year was 1924, and Midgley, then a chemical engineer for General Motors, had pulled the stunt to support his most recent, lucrative finding: a lead compound calledtetraethyl lead. Added to gasoline, it solved one of the biggest problems the automotive industry faced at the time — engine knocking, or tiny explosions in car engines due to the low quality of gasoline that resulted in an annoying sound and potential damage. Lead helped, but at great expense, because the substance is highly toxic to humans, especially children.
  
  New analysis of Beethoven’s hair reveals possible cause of mysterious ailments, scientists say
  
  Midgley would go on to leave his mark in history with another destructive invention, also a solution to a problem: the need to replace the noxious and flammable gases used in refrigeration and air conditioning. He found that CFCs, or chlorofluorocarbons, were an ideal substitute and harmless to humans. However, they turned out to be deadly to the ozone in the atmosphere, which blocks dangerous ultraviolet radiation that can cause skin cancers and other health problems, as well as harming plants and animals.
  
  One hundred years after that stunt before the press in 1924, the planet is still recovering from the ill effects of both of Midgley’s inventions. The ozone layer will need anotherfour decadesto heal fully, and because leaded gasoline was stillsoldin parts of the world until 2021, many continue to live with the long-term effects of lead poisoning.
  
  Yet Midgley — whose story will be told in an upcomingmoviedeveloped by the writer of the 2013 film “The Wolf of Wall Street” — was hailed as a hero for decades.
  
  Bornin Beaver Falls, Pennsylvania, in 1889, Midgley had a penchant for finding useful applications for known substances early on. In high school, heusedthe chewed bark of the slippery elm trees to give baseballs a more curved trajectory, a practice professional players would laterpick up.
  
  He was known to carry with him at all times a copy of the periodic table, his main tool in the search for the substance that would mark his breakthrough invention.
  
  The task of addressing the issue of engine knocking fell to Midgley while he was working at General Motors in 1916.
  
  “It was the dawn of the automobile era in the United States, and Ford had developed the Model T, which was not very powerful,” said Gerald Markowitz, a history professor at the City University of New York. “GM joined with Standard Oil and DuPont to try to develop more powerful engines, and in order to do that they needed to solve the problem of the engines knocking with the fuel that they had at the time.”
  
  Under the direction of Charles Kettering, another influential American inventor and head of research at GM, Midgley worked his way throughthousandsof substances —includingarsenic, sulfur and silicon — in a quest to find one that reduced knocking when added to gasoline. He eventually landed on tetraethyl lead, a lead derivative that was marketed simply as Ethyl. Leaded gasoline firstwent on salein Dayton, Ohio, in 1923 and eventually spread throughout the world.
  
  Lead is highlypoisonous, with no safe level of exposure, and can impair development in children, causing decreased intelligence and behavioral disorders, according toUNICEF. An estimated 1 million people a year still die from lead poisoning, according to theWorld Health Organization.
  
