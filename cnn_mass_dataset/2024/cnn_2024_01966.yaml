  Novo Nordisk has reaped huge profits from the sales of Wegovy and its sister diabetes medication Ozempic, reporting a total sales growth of 36% and an operating profit growth of 44% in 2023, but competition has also emerged. In November, theFDA approved Eli Lilly’s drug tirzepatide, used in the diabetes drug Mounjaro, for the treatment of obesity under the name Zepbound. The list price of Zepbound is about20% lowerthan the price of Wegovy.
  
  Regardless of the brand, ensuring access to obesity medications for eligible people is crucial, Jaisinghani said. She also warns against obtaining weight-loss medications through potentially risky avenues such as medical tourism or compounding pharmacies.
  
  “Ensuring sustained weight management is a critical objective, and interruptions due to drug shortages pose substantial challenges for ongoing treatment plans,” Jaisinghani said.
