title: "Dubai princess’s Instagram account announces divorce with royal husband"
date: "2024-07-18"
section: "Middle East"
url: "https://www.cnn.com/2024/07/18/middleeast/dubai-princess-announces-divorce-instagram-intl/index.html"
content: |
  The daughter of Dubai’s ruler has apparently announced her divorce on social media in what would be a rare move for a princess in the United Arab Emirates.
  
  TheInstagram accountof Sheikha Mahra bint Mohammed bin Rashid Al Maktoum, the daughter of UAE Prime Minister and Dubai ruler Mohammed bin Rashid Al Maktoum, announced her intention to leave her husband, a fellow royal.
  
  “I hereby declare our divorce,” 30-year-old Sheikha Mahra’s account posted on Instagram on Wednesday. “I divorce you, I divorce you, and I Divorce You. Take care. Your ex-wife.”
  
  The princess appeared to be invoking thecontroversial practiceof triple divorce that is used in some Muslim countries where a man instantly divorces his wife by declaring it three times. The method is banned in some countries and isn’t customarily invoked by women against their husbands.
  
  Mahra married Sheikh Mana Bin Mohammed Al Maktoum, also a member of the Dubai ruling family, last year in a glamorous ceremony that was featured in magazines such asHarper’s Bazaar ArabiaandGrazia. They had a daughter shortly after. Pictures of her with her husband have now been removed from her account. There are no pictures of her onSheikh Mana’s Instagramaccount either.
  
  The princess has a visible public andsocial media presence, often attending red carpet events in Dubai and adorning the cover of regional magazines, an unusual practice for female royals. She has almost half-a-million followers onInstagram, where she posts about her hobbies, her love for horses, her charity work as well as selfies. Her mother is Zoe Grigorakos, a Greek national,according to local media.
  
  Some Instagram users speculated whether her account had been hacked. Both the post and the account, however, remain active more than a day since the post went up.
  
  Neither the UAE government nor Mahra’s husband Sheikh Mana have publicly commented on the Instagram post. CNN has reached out to Sheikh Mana for comment through his Instagram account.
