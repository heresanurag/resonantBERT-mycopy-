  Veteran journalist and former CNN anchorAaron Brownpassed away on Sunday.He was 76. Brown gained prominence for his live coverage of the September 11 terror attacks and also played a major role in shaping CNN’s evening news format.
  
  5,565That’s how many truckloads of aid have entered Gaza since October 6 of this year, when Israel’s concentrated operation in the north began, according to the UN’s Office for the Coordination of Humanitarian Affairs. All of the hospitals in the enclavehave been forced out of serviceand aid is now barely reaching the few hundred thousand Palestinians still trapped in the area, the United Nations said.
  
  “We continue to call on China to share data and access so we can understand the origins of COVID-19. This is a moral and scientific imperative.”
  
  — The World Health Organization, issuing a statement Monday urging China to share data tohelp understand the origins of Covid-19— five years on from the start of the pandemic in the Chinese city of Wuhan. How the pandemic started has been a subject of intense scientific scrutiny and heated political debates, with opinions divided primarily over whether it originated from a natural animal spillover or a lab leak.
  
