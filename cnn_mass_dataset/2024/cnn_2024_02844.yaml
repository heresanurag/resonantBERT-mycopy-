title: "5 things to know for Dec. 31: New Year’s Eve, Jimmy Carter funeral, stock market, US Treasury hack, India space mission"
date: "2024-12-31"
section: "US"
url: "https://www.cnn.com/2024/12/31/us/5-things-to-know-for-dec-31-new-years-jimmy-carter-funeral-stock-market-treasury-hack-india-space/index.html"
content: |
  New Year preparations are in full swing in the US, while dozens of countries arealready welcoming 2025. In New York, around 1 million people are expected to flood Times Square to watch the ball drop despite potentiallydrenching rain in the forecast. Wherever you are, we hope you have a happy and safe holiday! 5 Things AM will return on Thursday after the festivities.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  One of the biggest questions during the holidays is what stores will be open for those who need to run errands. This year, many grocery chains, pharmacies and restaurants nationwidewill continue business as usual todayand on New Year’s Day. As always, check your local stores before going out as some may have modified hours. For example, Albertsons Companies will be open today and Wednesday on reduced hours. On New Year’s Day, warehouse club Costco is closed but Walmart and Target stores will be open. Also on Wednesday, most banks services will be closed and USPS will not be sending or delivering mail.
  
  The official state funeral in Washington, DC for former President Jimmy Carterwill be held on January 9, the White House confirmed. President Joe Biden declared January 9 as a National Day of Mourning in a proclamation on Sunday, hours after Carter’spassing at the age of 100. Biden will deliver a eulogy at Carter’s funeral service held at the Washington National Cathedral, a White House official said, a marquee moment for the Democrat to pay tribute tohis longtime friendin the waning days of his own presidency. Public observances honoring Carter’s legacy will be held in Atlanta and Washington, DC, followed by a private interment in Carter’s hometown of Plains, Georgia, according to the Carter Center.
  
  US stocks dropped Monday, with the Dow falling by 418 points, or just under 1%, asmarkets close out a record year. The S&P 500 ended the day down by just over 1%, while the tech-heavy Nasdaq saw the biggest slide, down 1.19%, as traders sold off Big Tech investments such as Amazon, Tesla and Alphabet, Google’s parent company. Still, the Dow, S&P 500 and Nasdaq are all on track to book another year of gains. Of the three, the Nasdaq is set to see the biggest gains of the year, up more than 32%. As for Bitcoin, the cryptocurrency traded at $94,000 when US stock exchanges closed Monday at 4 p.m. ET. Bitcoin surged to $106,000 earlier this month on hopes that the incoming Trump administration willespouse more crypto-friendly policies.
  
  The US Treasury says China-backed hackers recently breached its workstations in what officials are describing as a “major incident.” In a letter reviewed by CNN, a Treasury official said the department was informed by a third-party software service provider on December 8 that a threat actor used a stolen key toremotely access certain Treasury workstationsand unclassified documents. It’s not clear exactly how many workstations were infiltrated or if the department has fully determined the extent of the damage caused by the breach. Treasury officials plan to hold a classified briefing about the hack next week with staffers from the House Financial Services Committee.
  
  India launched its first space docking mission Monday on an Indian-made rocket, in an attempt to become the fourth country to achieve the advanced technological feat. The mission, called Space Docking Experiment (SpaDeX), was deemed successful after the spacecraft reached an altitude of nearly 300 miles. It is seen aspivotal for future space endeavors, including satellite servicing and the operation of the country’s planned space station. The testing of this particular docking technology could take place in about a week, the chairman of the Indian Space Research Organisation said. A successful demonstration would place India alongside the US, Russia and China as the only countries to have developed and tested such capability.
  
