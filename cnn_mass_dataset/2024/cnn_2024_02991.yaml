title: "Microsoft asks some employees in China to move to other countries"
date: "2024-05-16"
section: "Tech"
url: "https://www.cnn.com/2024/05/16/tech/microsoft-china-employees-relocate-hnk-intl?cid=external-feeds_iluminar_yahoo"
content: |
  EDITOR’S NOTE:Sign up forCNN’s Meanwhile in China newsletter,which explores what you need to know about the country’s rise and how it impacts the world.
  
  Microsoft has asked at least 100 of its employees in China to consider moving to other countries, according to Chinese state media reports.
  
  The reports come as relations between Beijing and Washington deteriorate over technologies like artificial intelligence (AI) and clean energy.
  
  Microsoftemployees, mostly involved with cloud computing, were recently offered the opportunity to work in the United States, Australia or Ireland, among other countries, state-run outlet The Paper said ina reportWednesday, citing an unnamed source.
  
  “Providing internal opportunities is a regular part of managing our global business. As part of this process, we shared an optional internal transfer opportunity with a subset of employees,” a Microsoft spokesperson told CNN on Thursday. It did not specify the number of workers who had received the offer.
  
  TheWall Street Journalreported Thursday that Microsoft asked as many as 800 employees, mostly engineers with Chinese nationality working on cloud computing and AI, to consider relocating. The Journal, which cited unnamed sources, reported last year that the Biden administration was preparing to restrict Chinese firms’ access to US cloud services.
  
  The companyenteredChina in 1992 and for decades has counted on its well-known Beijing-based research lab, Microsoft Research Lab Asia, to help it build influence.
  
  “Everyone is confused,” an employee told the Paper, as the affected staff has been given less than a month to decide.
  
  Yicai, a Chinese state-owned financial media outlet,wrote thatmore than 100 employees were affected. It added that people had the option not to move.
  
  The reports comein the same weekPresident Joe Bidenannounced tariffs on $18 billion worth of imports of Chinese electric vehicles and an array of other products. Biden said he was trying to prevent unfair competition from China decimating US industries.
  
  The tech war between the two economic superpowers has been intensifying for years. InOctober, the Biden administration limited the types of semiconductors that American companies can sell to China.
  
  In recent months, the United States has also enlisted its allies inEuropeandAsiain restricting sales of advanced chipmaking equipment to China.
  
  Beijing hashit backby imposing its own curbs on exports of germanium and gallium, two elements essential for making semiconductors.
  
  Hassan Tayir and Juliana Liu contributed to this report.
