  Editor’s Note: CNN’s 5 Things newsletter is your one-stop shop for the latest headlines and fascinating stories to start and end your busy day.Sign up here.
  
  👋Welcome to 5 Things PM!Companies are cracking down on people sharing their accounts left and right, so no more using your sister’s Costco membership card and your college roommate’s Netflix login. CNN’s Allison Morrow explains whythe era of freeloading is officially over.
  
  Here’s what else you might have missed during your busy day:
  
  1️⃣Past meets present:Going “viral” may seem like something that only happens to today’s online generation. But hundreds of years ago, over-the-top art that radiated ostentatious triumph and prosperity createdbuzz among the chattering classduring the Renaissance era.
  
  2️⃣‘End the havoc’:If you live in a large metro area, you’ve probably had a close call with someone zipping around on an electronic scooter. With injuries and fatalities on the rise, another major city just decidedto ban e-scooter rentals.
  
  3️⃣Legal strategy:A man suing Disney for the wrongful death of his wife faces a new legal hurdle. The entertainment giantis trying to get the case thrown outbecause he bought an Epcot ticket and signed up for Disney+.
  
  4️⃣Will to survive:Bing Olbum planned to hike for a few days but ended up getting lost in the Idaho wilderness for more than a week. Local residents on horseback finally found the 89-year-old adventurer, whomanaged to surviveon beef jerky, salted nuts and iodine tablets.
  
  5️⃣Mysterious vortex:For months, the world’s largest iceberg has been slowly spinning in one spot in the Southern Ocean near Antarctica, and it could continue for quite some time.Here’s what experts have to sayabout the phenomenon.
  
  😬Big blunder:A home in Edison, New Jersey, wasblasted with waterafter an apparent mistake by workers in the area.
  
  •Multiple people chargedin connection with actor Matthew Perry’s death• Live updates: Biden and Harrishold their first joint eventsince he left the presidential race• Trump asks that sentencing in hush money case bepostponed until after election
  
  ✈️Unlimited travel:One airline is offering an“all-you-can-fly” dealthat lets pass holders take as many flights as they want for a year.
  
  🏊Futuristic float:New Yorkers are one step closer to getting their long-awaitedcross-shaped floating poolin the East River. It’s set to open near Pier 35 in Manhattan in 2026.
  
  🏡 That’s the average 30-year fixed-rate mortgage this week — way below the peak — which isenticing some homeowners to refinance.
  
  It’s a strange feeling, missing balls I shouldn’t miss … Internally I hear myself screaming ‘what the hell is happening?!?!’
  
  Naomi Osaka, tennis pro
  
  🎾Bouncing back:The four-time grand slam champion said she’s stilladjusting to playing tennis againsince returning from maternity leave following the birth of her daughter.
  
  🌎Harry and Meghan are in South America to support initiatives that protect children from online harm. Meghan was welcomed by their host nation’s vice president, seen above. Which country did they visit?A. BrazilB. ColombiaC. PeruD. Argentina⬇️Scroll down for the answer.
  
  ⚽New direction:Mauricio Pochettinowill be the next head coachof the US men’s national soccer team, reports say. He previously managed Chelsea in the English Premier League.
  
  ☀️We like to wrap things up on a positive note:Boats powered by the sun are quietly sailing through a secluded section of the Amazon rainforest in Ecuador. A non-profit organization provides solar vessels to help people in indigenous communitiesnavigate daily life.
  
