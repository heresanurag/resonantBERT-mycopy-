id: cnn_2024_02064
title: "Troopers rescue camels and zebras from truck fire on Indiana interstate"
date: "2024-01-27"
section: "US"
url: "https://www.cnn.com/2024/01/27/us/camels-zebras-truck-fire-indiana-trnd/index.html"
content: |
  Traffic on an Indiana interstate was a real circus Saturday morning – complete with camels, zebras and a miniature horse.
  
  These were among the animals left grazing on the side of the highway after the trailer that was transporting the animals caught fire.
  
  The Grant County Sheriff’s Office responded to the incident on Interstate 69 and shared photos and videos of the rescued animals on Facebook.
  
  “Grateful to report that all animals involved have been rescued safely. No harm to our furry friends,”the sheriff’s officesaid.
  
  “Gratitude to our first responders for their heroic efforts!”
  
  Once the animals were contained in pens on the side of the interstate, officers gave them a snack of some hay before they were loaded up for transport, video shows.
  
  The northbound interstate was temporarily closed while responders worked to contain the animals and put out the fire,according to CNN affiliate WISH-TV.Indiana State Police Sgt. Steven Glass told WISH-TV the fire was likely caused by an equipment failure.
