title: "Dutch tourist accused of graffitiing ancient Roman villa in Herculaneum"
date: "2024-06-05"
section: "Travel"
url: "https://www.cnn.com/2024/06/05/travel/dutch-tourist-defacing-roman-scli-intl/index.html"
content: |
  A tourist from the Netherlands has defaced a frescoed wall in an ancient Roman house inHerculaneum, near Naples, damaging a building that survived the volcanic eruption ofMount Vesuviusin 79 AD, Italian police said on Monday.
  
  The police statement said the 27-year-old tourist was swiftly identified after staff at the archaeological site discovered tagged graffiti writing made with a black, indelible marker pen on a white section of a painted wall.
  
  Police said the writing was the man’s graffiti signature.
  
  “Any damage hurts our heritage, our beauty and our identity and that is why it must be punished with the utmost firmness,” Italian Culture Minister Gennaro Sangiuliano said in a statement.
  
  The tourist, who was not named, faces charges of damage and defacement of artistic works.
  
  Tourists arrested for spraying soccer graffiti on 460-year-old Italian landmark
  
  A smaller city than its more famous neighbor, Pompeii, Herculaneum was buried under a deeper layer of ash, which protected its ruins from thieves and left particularly well-preserved remains.
  
  It is not the first time that historical monuments have been vandalised by tourists in Italy.
  
  Last year, a visitor from England was caught in a video, posted on social media, scratching his and his girlfriend’s names with a key on an internal wall of Rome’s Colosseum.
  
  Also last year, graffiti artists scaled and tagged the soaring stone facade to Milan’s Galleria Vittorio Emanuele II, the prestigious shopping arcade at the heart of the city. They were not caught.
  
  In response to repeated acts of vandalism, Italy this year introduced tougher penalties on those who damage monuments and cultural sites, imposing fines of up to €40,000 (around $43,500) for those found guilty of defacing monuments.
