title: "Researchers found a tiny skull with wide eyes and a cartoonish grin. It could help solve an evolutionary puzzle"
date: "2024-03-21"
section: "World"
url: "https://www.cnn.com/2024/03/21/world/prehistoric-amphibian-fossil-kermit-the-frog-scn?cid=external-feeds_iluminar_yahoo"
content: |
