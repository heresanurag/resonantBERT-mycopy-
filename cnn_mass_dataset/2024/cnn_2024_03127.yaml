title: "5 things to know for Sept. 5: Georgia school shooting, Presidential debate, Gaza ceasefire talks, Hunter Biden, Hotel strikes"
date: "2024-09-05"
section: "US"
url: "https://www.cnn.com/2024/09/05/us/5-things-to-know-for-sept-5-georgia-school-shooting-presidential-debate-gaza-ceasefire-talks-hunter-biden-hotel-strikes/index.html"
content: |
  US regulators want to investigate Shein and Temu forselling dangerous baby products. This comes as the two e-commerce websites are facing scrutiny over a litany of issues, including how they’re able to sell goods at such strikingly low prices.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  The community of Winder, Georgia, is grieving the deaths of two 14-year-old students and two teachers who were killed in amass shooting at Apalachee High Schoolon Wednesday. Nine others were wounded and hospitalized, all of whom are expected to survive. The suspected gunman is in custody and was identified as a14-year-old student at the school, which is about an hour outside of Atlanta. There is no known connection between the shooter and the victims, authorities said, adding an investigation is underway to determine his motive. The teenager will be charged with murder and will be tried as an adult. The shooting is at least the45th school shooting in 2024and the deadliest this year, according to a CNN analysis.
  
  ABC News on Wednesday officially announced therules of the upcoming presidential debateon September 10. Vice President Kamala Harris and former President Donald Trump have agreed to the format that microphones will be muted while the other is speaking. However, the Harris campaign again laid out their objections to the muted mics condition, insisting that they believe the vice president will be“disadvantaged” by the format. In a Fox News town hall Wednesday, Trump said he was “going to let her talk” when asked about his upcoming debate with Harris. However, the former president also spread baseless allegations that he had “already heard” thatHarris’ team would “get the questions in advance.”The rules set out by ABC News do not allow for notes and the candidates will be standing behind podiums.
  
  A prospective hostage and ceasefire agreement between Israel and Hamas is 90% completed but disputes remain over the exchange of prisoners for hostages and the redeployment of Israeli forces in Gaza,according to a senior US official. US officials, with Qatar and Egypt, have for months worked to broker a deal to bring an end to the nearly yearlong conflict. Talks remain ongoing but Hamas said this week that militants guarding Israeli hostages in the buildings and tunnels of Gaza had “new instructions” to kill them if Israeli troops closed in. Meanwhile, an Israeli newspaper reported Wednesday that Prime Minister Benjamin Netanyahuderailed a potential hostage deal in Julyby introducing a raft of new demands.
  
  Hunter Biden is set to go on trial today for alleged tax crimes. The case was once seen as a potential liability for President Joe Biden’s reelection campaign before he dropped out of the 2024 race. Hunter Biden, 54, is accused offailing to pay $1.4 million in federal taxesand executing a tax-evasion scheme. He pleaded not guilty and said he belatedly paid all of his tax debts after regaining his sobriety in 2019 amid a lifelong struggle with alcohol and drug abuse. The trial, which could last about a month, will feature salacious details about Hunter Biden’s extravagant partying and spending during the peak of his addiction, including money for strippers, escorts and luxury cars — all while allegedly failing to pay taxes. Political experts say the stakes are high for Hunter Biden, who was alsoconvicted of three gun felonies in Juneand will be sentenced for those crimes after the election.
  
  Most of the 10,000 hotel workers who went on strike during the busy Labor Day weekend returned to work Wednesday, but one group of 700 union members in San Diegowill stay on strike for the foreseeable future. Those workers, employed at the Hilton San Diego Bayfront, will remain on strike until there is a contract agreement, their union says. Over the weekend, many guests at Hilton, Hyatt and Marriott properties across the US had to deal with noisy picket lines andreduced service from skeleton hotel crews. The strike, which affected as many as 25 hotels in nine US cities, was planned as a limited-duration walkout. Union leaders and members are still pushing for a deal that includes better pay and improved working conditions.
  
  Chipotle launches Halloween costume collectionThe fast-casual chaincreated a costume collectionfeaturing a napkin, fork, water cup and a burrito. Or in this case, you can say you’re aboo-rrito.
  
  Asteroid burns up in Earth’s atmosphere over the PhilippinesSky-gazers saw an asteroid burn up in Earth’s atmosphere over the Philippines near Luzon Island on Wednesday.See a photo here.
  
  Southwest brings back buy-one, get-one-free promotionSouthwest Airlines isoffering a flash promotionthat amounts to a buy-one, get-one-free offer for companion flights. Act fast if you’re interested — the deal ends today.
  
  Russian watchmaker upends race to design world’s thinnest wristwatchLuxury giants are locked in a heated battle to design the world’s thinnest mechanical watch. But anindependent Russian watchmaker and inventormay have trumped them all.
  
  What parents can do to reduce the likelihood of kids getting sick and missing schoolAs more children head back to school, some will likely catch and spread illness. A doctor tells CNNhow parents should prepare for virus risksthis school year.
  
  7.67 millionThat was the number of available jobs in the US in July, according to new data released Wednesday by the Bureau of Labor Statistics. That’s thelowest number of openingssince January 2021.
  
  “As a conservative, as someone who believes in and cares about the Constitution, I have thought deeply about this.”
  
  — Republican former Rep. Liz Cheney, announcing Wednesday that she will vote for Vice President Kamala Harris in November because of the“danger that Donald Trump poses.”Cheney, who is the daughter of former Vice President Dick Cheney, has been a vocal critic of former President Trump for years. The youngest son of the late Sen. John McCain also told CNN this week that hechanged his voter registration to Democratand plans to vote for Harris in the 2024 election.
  
