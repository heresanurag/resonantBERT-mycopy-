id: cnn_2024_03420
title: "Peloton ‘paused the use of’ Sean ‘Diddy’ Combs’ music on its platform"
date: "2024-05-21"
section: "Business"
url: "https://www.cnn.com/2024/05/21/business/peloton-sean-diddy-combs-music/index.html"
content: |
  Peloton said it has paused the use of music recorded by Sean “Diddy” Combs on its workout class platform in response to a member of a private Facebook group for Peloton users.
  
  In the comment posted on Monday, the company said it also removed the Bad Boy Entertainment Artist Series, a line of classes and workouts using music from a record label founded by Combs, on its platform.
  
  It did not indicate that it was removing music from past classes.
  
  “This means our Instructors are no longer using his music in any newly produced classes,” Peloton said in the post.
  
  On Friday, CNN publishedhotel surveillance videofrom 2016 in which Combs appeared to grab, shove, drag and kick his then-girlfriend — Cassie Ventura.
  
  “My behavior on that video is inexcusable. I take full responsibility for my actions in that video,” Combs said in a video statement posted onInstagramon Sunday.
  
  Combs had previously issued a blanket denial of the allegations contained in a lawsuit filed by Ventura last November, in which she accused him of rape and years of abuse.
  
  Since then,Combshas faced four other civil lawsuits accusing him of a range of sexual misconduct and other illegal activity. One of those cases has already been settled, but the othercasesremain active.
  
  In 2022, Peloton said it “indefinitely paused” playingKanye West’s musicfrom its streaming workout classes after he made antisemitic comments.
  
  Pelo Buddy, a fan website that doesn’t have official ties with Peloton, reported in 2022 that the company told concerned members that its instructors were no longer using West’s music in “newly produced classes” and it wasn’t recommending previously produced workout classes on its hardware or app that uses his music.
  
  - CNN’s Jordan Valinsky, Alli Rosenbloom and Elizabeth Wagmeister contributed to this report.
