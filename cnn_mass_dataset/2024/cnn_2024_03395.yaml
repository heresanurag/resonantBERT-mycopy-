title: "A new boat-plane hybrid, politics and TikTok, too-spicy ramen noodles: Catch up on the day’s stories"
date: "2024-06-12"
section: "US"
url: "https://www.cnn.com/2024/06/12/us/5-things-pm-june-12-trnd/index.html"
content: |
  👋Welcome to 5 Things PM!How many people in their 70s and 80s do you know on TikTok? Joe Biden and Donald Trump both joined the social platform in recent months in hopes of wooing young voters — buta new surveyshows that their strategy may not pan out.
  
  Here’s what else you might have missed during your busy day:
  
  1️⃣Alternative transportation:A new type of electric boat-plane hybridcould become the next big thingfor people who live in coastal communities. “Seagliders” skim over the surface of the water using wing-like hydrofoils to produce a smooth ride.
  
  2️⃣Eating out:Although grocery prices have leveled off, the cost of dining at restaurants — even fast food or casual joints —keeps ticking upward.Some chains have started bragging about their discounted meals in an effort to change the narrative.
  
  3️⃣Logo inspiration:Jerry West, the legendary Los Angeles Lakers player and executive who passed away at the age of 86,served as a modelfor the NBA’s silhouette logo. West’s career spanned more than 60 years, and he had a hand in nine championships.
  
  4️⃣Ramen recall:Three flavors of “fire chicken” instant noodles proved to be a littletoohot for people to handle in one European country. The capsaicin levels were so high and potentially dangerous that the noodles wereyanked off store shelves.
  
  5️⃣Unexpected finding:Human sacrifices were often thought to be young females, but a new study on theDNA of ancient Mayahas revealed that wasn’t always the case.
  
  🪐Stunning simulation:NASA’s new immersive black hole visualization shows what it would be like to getsucked into a massive black holeand then slingshotted back out.
  
  ❗That’s the percentage of Americans whogive companies a failing gradefor CEO pay.
  
  📸Behind bars:Back in the 1970s, photographer Jack Lueders-Booth used vintage Polaroid images of female inmates to capture solitarymoments of life in prison.He taught them photography for several years and took pictures along the way.
  
  I can’t imagine that 20 kids are not graduating with us and that they’re not having the opportunity to walk across the stage.
  
  High school senior Grace Fischer, a Sandy Hook survivor
  
  🎓Bittersweet graduation:Survivors of the Sandy Hook Elementary School shooting in 2012 received their diplomas today andhonored their classmatesby wearing green ribbons.
  
  🗓️Tomorrow:The leaders of the Group of Seven nations — the United States, Canada, Britain, France, Germany, Italy and Japan — will gather in Verona, Italy. President Bidenannounced new sanctionsagainst Russia, and the US and Ukraine are expectedto sign a long-term security agreement.
  
  😎We like to wrap things up on a positive note:﻿When Brandon Garrett had a car accident that left him injured and stranded in a ravine in rural Oregon, he didn’t think he would make it through the night. Butone of his dogs was determinednot to let that happen.
  
