title: "MTV VMAs 2024: See who won"
date: "2024-09-11"
section: "Entertainment"
url: "https://www.cnn.com/2024/09/11/entertainment/mtv-vmas-2024-see-who-won/index.html"
content: |
  MTV’s Video Music Awards(VMAs) took place Wednesday night in New York, whereTaylor Swiftwon the event’s top prize for video of  the year.
  
  Megan Thee Stallion acted as host of the typically unpredictable proceedings, but it was a smooth and star-studded show that felt more like a concert than an awards ceremony.
  
  Eminem opened with the help of Jelly Roll. Other performers who took the stage included Camila Cabello,Chappell Roan,GloRilla, Rauw Alejandro, Lenny Kravitz and Sabrina Carpenter.
  
  A full list of nominees follows below, with winners indicated in bold.
  
