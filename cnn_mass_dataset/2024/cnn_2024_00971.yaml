  That might suggest Putin thinks he is on safe ground. But whataboutism is not necessarily a sign of confidence.
  
  Predicting Putin’s post-election course of action is a tricky business. The Russian leader has for the short termsanction-proofed his economy; hisammunition factoriesare outproducing the US and its European allies and the political landscape has been cleared of all competition.
  
  But war is always unpredictable. And whatever Putin’s efforts to spin things in his favor, Russia’s longer-term problems – demographic decline, the cost of war and sanctions, and the inherent brittleness of one-man rule – arenot likely to disappearbefore Putin stands for a sixth term in office.
