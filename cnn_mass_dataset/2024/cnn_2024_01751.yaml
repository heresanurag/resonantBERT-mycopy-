title: "Opinion: How Hunter Biden and Trump trials dangerously mix politics and justice"
date: "2024-06-03"
section: "Opinion"
url: "https://www.cnn.com/2024/06/03/opinions/hunter-biden-trump-trials-mix-politics-justice-antle/index.html"
content: |
  EDITOR’S NOTE:W. James Antle III is executive editor of the Washington Examiner magazine and author of“Devouring Freedom: Can Government Ever Be Stopped?”The views expressed in this commentary are his own. View moreopinionon CNN.
  
  As jury selection in Hunter Biden’s gun trialbeganon Monday, the case continued the trend of the courtroom becoming an extension of the campaign trail. It’s not a welcome development.
  
  Biden’s trial comes on the heels of former President Donald Trump’shistoric convictionThursday on 34 felony counts of falsifying business records, with three other criminal cases against him pending. This means that the election is a contest between an incumbent president whose son is facing federal criminal charges related to a 2018 firearm purchase (with a separate federaltrial on charges of tax evasion and tax fraud still to come) and a convicted felon.
  
  In an era of intense political polarization, we could be headed down a dangerous road. Even the perception of the justice system becoming politicized would be incredibly damaging, much less the reality.
  
  Democrats were horrified whenTrump supported chants of “lock her up”aimed at then-Democratic presidential nominee Hillary Clinton during his campaign rallies in 2016. The alleged offense concerned Clinton’s handling of emails containing classified material, for whichshe was being investigatedat the time (she ended up not being charged). Many critics saw the rally chants as a call to “lock her up” for being a political opponent.
  
  Fast forward to 2024. Trump waschargedby an elected Democratic district attorney in New York, Alvin Bragg, whocampaigned on his abilityto beat Trump in court and vowed to hold him accountable. Trump wasconvictedby a unanimous jury verdict. But Bragg relied onsome novel legal theoriesto get past the statute of limitations and turn Trump’s bookkeeping misdemeanors into felonies, which is not necessarily the district attorney’snormal practice. The judge in the case, Juan Merchan, made pro-Biden political contributions. Thedonations were small, but prohibited by state judicial ethics rules and raised questions about impartiality.
  
  There was alsosome disputeabout the case among legal experts. Both state and federal investigators had looked for evidence of violations of campaign finance laws in Trump’s hush money payment shortly before the 2016 presidential election to adult film actress Stormy Daniels, who alleges that she had a sexual encounter with Trump (which he denies), yet haddeclined to prosecutehim. And even if the payment to Daniels couldaccurately be describedas a campaign expenditure, it would not bethe first shady onein recent American politics. Clinton and the Democratic National Committee were bothfinedin 2022 for not disclosing financial research support for the controversial Trump-Russia dossier.
  
  Trump on potential for prison time or house arrest: ‘I’m ok with it,’ but not sure ‘public would stand it’
  
  Making matters worse has been the celebratory air about Trump’s conviction in some circles. There have beencalls from prominent liberalsto make it an important part ofDemocratic campaign messagingthis year. Early indicators show President Joe Bidenmay comply.
  
  Obviously, any candidate for office is going to make an issue of their opponent being convicted of a crime. It would be campaign malpractice to do otherwise. But the perception will exist among at leastsome votersthat attaching the “convicted felon” label to Trump in an election year was more a matter of political than legal necessity. Out offour criminal cases faced by Trump, this was the case Democrats could get to trial before the election, the argument will go, with the appeals processexpected to extendpast Election Day — and if the conviction is ultimately overturned, it will likely be after the election (as will the other three cases if Trump’sstrategy to delay themcontinues to work).
  
  There will also be Democrats who believe that the criminal cases against Hunter Biden were brought to appease Republicans complaining about the“weaponization” of the justice systemagainst Trump.
  
  Indeed, Hunter Biden had a plea agreement with the federal government concerning his tax and gun charges thatcollapsedafter congressional Republicansdenouncedit as a “sweetheart deal” and an example of a “two-tiered system of justice” in contrast with the Justice Department and other authorities’ treatment of Trump.
  
  Whether or not the motivations for bringing the cases against Trump and Hunter Biden are political, there is no doubt they will have political effects. Trump is now a felon about to get a sentence. The Hunter Biden trial will be a headache for the president in an election year.
  
  Once the system’s credibility is damaged, it is difficult to repair. Democrats spoke throughout Trump’s term of the importance of maintaining certain political and institutional norms that are not necessarily laws themselves but are vital to the credibility of the rule of law.
  
  The various cases against Trump might be separate, with various jurisdictions pursuing them independently. But in the current political atmosphere, they look to a slice of the public like a legal pile-on, a patchwork of attempts to get Trump by any means necessary. Not exercising prosecutorial discretion in the New York case may work to undermine them all politically, if not legally. Skepticism of the justice system has already beenraised as an issuein Hunter Biden’s jury selection.
  
  And Democrats may come to regret the precedent that has been set with the first felony conviction of a former and perhaps future president — through what some experts believe was theweakest of these cases— if Trump wins and does indeed behave the way theywarn he will.
  
  Trump andpeople in his orbithave indeedspoken of retribution. It’s possible if he wins that this warning wouldn’t beabandonedas quickly as hisvowto “lock her up” was after his last election. But a more overt politicization of justice would be even worse.
  
  Most people in politics don’t have the level of exposure of Trump or Hunter Biden. Both men have lived dangerously for years, which is why not everyone is sympathetic to their legal plights.
  
  But if highly charged prosecutions in a partisan political environment become more normal, we will all regret it.
