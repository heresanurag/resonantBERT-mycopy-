title: "5 things to know for March 25: Moscow attack, Trump trials, Severe weather, Gaza, Plane safety"
date: "2024-03-25"
section: "US"
url: "https://www.cnn.com/2024/03/25/us/5-things-to-know-for-march-25-moscow-attack-trump-trials-severe-weather-gaza-plane-safety?cid=external-feeds_iluminar_post-news"
content: |
  Kensington Palace thanked the public for their tremendous support over the weekend after Catherine, Princess of Wales, announced Fridaythat she has cancer. The royal family, however, is not expected to reveal any further medical details such as the type of cancer or what stage it is.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  Russia held a day of mourning Sunday after an attack at a concert venue near Moscow left at least 137 dead — including 3 children. ISIS has claimed responsibility for the massacre, which sawarmed assailants storm the Crocus City Hallas crowds gathered to see the band Picnic. Nearly a dozen people have been detained in connection with the attack, according to authorities. Among them, four suspected gunmen have been charged withcommitting a terrorist act, which under the Russian Criminal Code is punishable by up to life imprisonment. Russia’s President Vladimir Putin said, with no evidence, that the suspects planned to flee into Ukraine. Ukraine has denied any connection.
  
  In the hours ahead, former President Donald Trump faces a deadline to secure a $464 million bond for the civil fraud judgment against him. Legal experts tell CNN that New York Attorney General Letitia James and her staff should bepoised to start seizing Trump’s assetsif he does not secure the money. Assets, such as buildings, houses, cars, helicopters and his plane, are in play. Separately, Trump’s first criminal trial was supposed to begin today but has beenpostponed until at least the middle of next month. This trial is related to Trump’s alleged efforts to falsify business documents related to hush-money payments made to cover up an alleged affair with adult film star Stormy Daniels. If the trial starts in April, it would potentially be the only one of the four criminal trials the former president is facing that would occur before the November election. Trump has pleaded not guilty and denied the affair.
  
  Millions of people are under winter weather alerts today across the Central Plains and the Midwest as apowerful storm threatens widespread disruptions. Travel could become “nearly impossible” in some areas, creating icy roadways and whiteout conditions, the National Weather Service warned. Blizzard warnings currently extend from northern Colorado and Kansas into parts of Minnesota, Nebraska and South Dakota. The storm will move across the Midwest and Great Lakes by Tuesday, forecasts show. It will then shift to the Northeast, where almost 160,000 homes and businesses are without power today afterreceiving several feet of snowover the weekend.
  
  Israel has agreed to a US proposal on aprisoner-hostage exchangeand is awaiting a response from Hamas. The deal would release around 700 Palestinian prisoners — including 100 serving life sentences for killing Israeli nationals — in exchange for the release of 40 Israeli hostages held by Hamas in Gaza, according to a CNN analyst Barak Ravid. The proposed exchange will “definitely include some” American hostages, Ravid said, because it will include the release of men over age 50. This comes as US and Israeli officials are slated to meet in Washington this week as the Biden administration works to deter Israel’splanned military operation in Rafah, where more than 1 million Palestinians are sheltering from constant bombardment.
  
  The FAA has warned its increased oversight of United Airlines — after a string of incidents on flights this month — may mean the troubled airline will have to put some of its future plans on hold. The FAA did not specify what projects may be delayed, but Bloomberg reported the agency is consideringpreventing United Airlines from adding new routes, curbing the airline’s growth. United’s troubles come at a time of heightened safety concerns around Boeing, the manufacturer of most of the airline’s jets. The most notable mishap on a Boeing plane this year occurred on January 5, when an Alaska Airlines Boeing 737 Max 9 plane lost a door mid-flight. This incident, among several others, has led many to wonder if it’s still safe to fly. In short, aviation experts sayflying is safer than most forms of travel— and much safer than the car rides most people take every day without thinking twice.
  
  Paris waiters compete in race, trays in handSome 200 waiters raced through the streets of Paris to see who could be first to get a coffee and croissant across the capital!Watch this videoto see their impressive balancing skills.
  
  Kevin Bacon says he’ll attend ‘Footloose’ high school’s final promUtah’s Payson High School, where the iconic movie “Footloose” was filmed, is set to relocate in a few months. Students were overjoyed to learn that Bacon plans tojoin them at the school’s final prom.
  
  Carnival Cruise ship catches fire while at seaTraveling can be a wonderful, relaxing experience … but it can also be unpredictable. See what happened after aCarnival cruise ship caught fireSaturday in the middle of its voyage.
  
  $800 million Powerball jackpot up for grabsIf the prize is won today, it would be thesixth-largest in the game’s history.
  
  Record-breaking American teen wins first World Figure Skating titleAt only 19 years old, Ilia Malininlanded a quadruple axelat the World Figure Skating Championship. This skill is often attempted — but never accomplished — by skating greats.
  
  37That’s the age of Ireland’s new prime minister, Simon Harris, making him theyoungest leader in Irish history. He succeeds former Prime Minister Leo Varadkar, who announced his surprise resignation last week, citing “mainly political reasons.”
  
  “I am happy, the families are happy, we are all happy the children have been rescued.”
  
  — Uba Sani, the governor of Nigeria’s Kaduna state, announcing Sunday that at least 137 school children who were kidnapped by gunmen in Nigeria earlier this monthhave been released.
  
