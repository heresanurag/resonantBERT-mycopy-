  👋Welcome to 5 Things PM!Using your brain for complex thinking during work can pay off in more ways than one,according to a new study. Researchers found that having a routine job with little mental stimulation during your 30s, 40s, 50s and 60s was linked to a significantly higher risk of mild cognitive impairment and dementia later in life.
  
  Here’s what else you might have missed during your busy day:
  
  1️⃣Alejandro Mayorkas:The Senatekilled the articles of impeachmentagainst the Homeland Security secretary as the trial barely got underway. The articles were for “willful and systemic refusal to comply with the law” and “breach of public trust.”
  
  2️⃣Aid for Ukraine:House Speaker Mike Johnson issticking with his planto put a series of foreign aid bills on the floor after facing significant pressure from GOP hardliners.📹 Video: MTG says support for her motion to vacate is growing
  
  3️⃣Maui wildfires:Hawaii’s attorney generalreleased findingsfrom a comprehensive investigation into the catastrophic fires that killed 101 people last year. The report showed how environmental and geographical factors enabled the fire to intensify.
  
  4️⃣Abortion ruling:The GOP-controlled Arizona House votednot to move forward with a repealof the recently revived 160-year-old ban, in a blow to reproductive rights.
  
  5️⃣NBA player banned:Jontay Porter of the Toronto Raptors wasbanned from the leagueafter an investigation found that the 24-year-old had violated betting rules.
  
  👀Speaking up:University of Southern California valedictorian Asna Tabassum responds after she wasdenied the chanceto give a speech at commencement.
  
