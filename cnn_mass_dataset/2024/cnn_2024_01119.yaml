title: "Louis Vuitton owner clinches 10-year sponsorship deal with Formula 1"
date: "2024-10-03"
section: "Business"
url: "https://www.cnn.com/2024/10/03/business/lvmh-sponsorship-formula-1/index.html"
content: |
  French luxury giant LVMH has struck a 10-year sponsorship deal with Formula 1, covering its Louis Vuitton, Moet Hennessy and TAG Heuer brands and replacing long-time sponsor Rolex, the companyannouncedWednesday.
  
  The sponsorship deal comes into effect in 2025 and marks a fresh push by LVMH into sports. The company, headed by one of the world’s richest men,Bernard Arnault, paid some €150 million ($166 million) to be the premiumsponsor of the Paris Olympics.
  
  High-end Swiss watchmaker Rolex had been a partner to Formula 1 since 2013.
  
  Luxury players are increasingly seeking to boost brand exposure with events combining hospitality, travel and entertainment.
  
  Ahead of the Olympics, Louis Vuitton CEO says sports embody ‘the DNA’ of the brand
  
  At the Paris Olympics, LVMH and other companies broadened the realm of traditional brand sponsorship, taking part in medals ceremonies, for example.
  
  “For many years, several of our Maisons (brands) have also chosen to invest in Formula 1,” said LVMH Watches CEO Frederic Arnault, adding: “We want to further grow this experiential dimension that Formula 1 provides all over the world.”
  
  LVMH did not provide financial details of the deal.
  
  The company’s sponsorship of the Paris Olympics included its jeweler Chaumet, which designed medals for the event, with each containing an originalpiece of the Eiffel Tower.
