title: "Barron Trump selected to be a Florida delegate at Republican National Convention"
date: "2024-05-09"
section: "Politics"
url: "https://www.cnn.com/2024/05/09/politics/barron-trump-delegate-republican-national-convention/index.html"
content: |
  Former PresidentDonald Trump’s youngest son, Barron Trump, was selected by the Florida GOP as an at-large delegate for Florida at the Republican National Convention, according to a list of delegates obtained by CNN.
  
  Barron, who turned 18 in March, joins several other family members – Donald Trump Jr., Eric Trump and Tiffany Trump – who were also selected. Steve Witkoff, Trump’s longtime friend and luxury real estate developer, along with Trump ally Sergio Gor are also listed as delegates.
  
  NBC Newswas first to report on Barron Trump’s selection.
  
  Before Donald Trump’shush money criminal trialbegan, his attorneys had asked for May 17 off so that he could attend Barron’s graduation. Thejudge last month saidthings were moving quickly enough that he was comfortable having no court that day so Trump could attend the graduation.
  
  RNC asks Secret Service to keep protesters farther from convention location
  
  The Republican National Committee will hold itsconvention in Milwaukeein July. Last month, theRNC asked the Secret Serviceto keep protesters farther back from the convention than is currently planned.
  
  RNC counsel Todd Steggerda wrote in a letter that the city of Milwaukee’s current proposal “creates an elevated and untenable safety risk to the attending public” and places demonstrators in a one-block park that “will force thousands of peaceful attendees and demonstrators … to be in extremely close, consistent and unavoidable proximity.”
  
  “The operational security plan for national special security events, to include the 2024 Republican National Convention, is developed and approved through an executive steering committee made up of representatives from the Secret Service, as well as supporting federal, state, and local agencies,” said Alexi Worley, spokesperson for the Secret Service, in a statement at the time. “The operational security plan is based on a variety of thorough security assessments established in coordination with our partners, with the express mission being to ensure the highest level of safety and security for the convention.”
  
  Donald Trump, the presumptive Republican presidential nominee, has said he will likely announce his running mate around the RNC convention in July and has beenfloating several names both in public and private.
