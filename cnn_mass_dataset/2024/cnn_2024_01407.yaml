  👋Welcome to 5 Things PM!OpenAI unveiled a new artificial intelligence large language model designed to be easier andmore intuitive to use. The latest version, dubbed GPT-4o, basically turns ChatGPT into a digital personal assistant that can engage in real-time, spoken conversations. OpenAI is trying to stay ahead of rivals Google and Meta in the highly competitive AI arena.
  
  Here’s what else you might have missed during your busy day:
  
  1️⃣Beach reading:Summer is right around the corner, and if your vacation plans include lounging by the water you’ll probably bring a page-turning thriller or a trashy romance novel to help pass the time. These types of books havebecome an unofficial genreall their own, and they’re almost always marketed to women.
  
  2️⃣Airline fees:Major airlines aresuing the federal governmentover new rules that would require carriers to disclose all fees up front, including those for checked and carry-on bags as well as change and cancellation fees.
  
  3️⃣ ‘Upcycled’ clothing:It’s surging in popularity thanks to the demand for streetwear and vintage products. But some luxury brandsare pushing backbecause they’re concerned about their bottom line, brand image and counterfeit items.
  
  4️⃣Parental burnout:A recent survey found that more than half of parents were feeling overwhelmed by the pressure cooker of everyday life. Experts suggestadjusting your expectationsand embracing the concept of “good enough.”
  
  5️⃣Ultraprocessed foods:These tasty nibbles contain additives such as flavor enhancers, colors and thickeners so they stay fresh longer and are easy to prepare. But just how bad are they for your health?Here’s what you should know.
  
  👀Daring stunt:Two skydivers jumped from 3,000 feet up over the River Thames and became the firstto glide throughLondon’s iconic Tower Bridge.
  
