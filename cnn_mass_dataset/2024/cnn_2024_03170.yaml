title: "Red Lobster is closing another 23 restaurants. Here’s where they are"
date: "2024-08-26"
section: "Food"
url: "https://www.cnn.com/2024/08/26/food/red-lobster-closures-august-2024?cid=ios_app"
content: |
  Roughly two dozen moreRed Lobsterlocations are scheduled to close within the coming days as part of the seafood restaurant chain’songoing bankruptcyproceedings.
  
  A recent court filing shows that the company is rejecting the leases of an additional 23 locations by Saturday, August 31, joining themore than 100 restaurantsthat Red Lobster closed earlier this summer. Once complete, the chain will have around 500 outlets left — a sharp decline from the 650 it had just last year.
  
  Red Lobster is in theprocess of selling itselfto Fortress Credit Corp., a lender experienced in restaurant management that also owns Krystal, Logan’s Roadhouse and J. Alexander’s. The firm recently gave the seafood chain a $100 million loan to allow it stay afloat.
  
  On Monday, Fortress announced that it will install the former chief executive of P.F. Chang’s, Damola Adamolekun, as Red Lobster’s new CEO once the chain exits bankruptcy proceedings. Adamolekun left the Chinese food restaurant chain in August 2023 following a four-year stint.
  
  Mismanagement, competition, inflation and other factors brought down Red Lobster, which has been a pioneer in the restaurant industry. Thai Union, a global seafood supplier, became Red Lobster’s leading shareholder in 2020 and filed for bankruptcy four years later in May.
  
  How a global seafood giant broke Red Lobster
  
  Under Thai Union’s leadership,Red Lobster’s culture turned toxic,former leaders told CNN. Red Lobster cut costs, removed longtime suppliers and implemented strategies that backfired, such as making $20 endless shrimp a permanent menu item. The chainlost $11 millionon the endless shrimp deal.
  
  The new list of restaurants leases identified to be closed “are likely to continue to drive losses” and the company does “not anticipate needing in order to operate their business going forward and can be rejected,” the filing said.
  
