title: "Biden to convene top four congressional leaders Tuesday as pressure builds for Ukraine aid"
date: "2024-02-25"
section: "Politics"
url: "https://www.cnn.com/2024/02/25/politics/biden-congress-ukraine-aid-shutdown/index.html"
content: |
  President Joe Biden will convene the top four congressional leaders Tuesday as the White Houseratchets up pressureon lawmakers to pass additional funding to Ukraine and ahead of a partial government shutdown deadline this week.
  
  The meeting – which will include Senate Majority Leader Chuck Schumer, Senate Minority Leader Mitch McConnell, House Speaker Mike Johnson and House Minority Leader Hakeem Jeffries – comes at a pivotal moment following Johnson’s resistance to Ukraine aid.
  
  Biden, who visited Ukraine last year, has repeatedly framed the need to support the country against Russia as a matter of national security abroad and at home. In the face of congressional inaction on apackage that includes $60 billionin aid to Ukraine, the president has directed his team to make the consequences “abundantly clear,” a US official told CNN.
  
  At the core of that message are the stakes of ceding ground to Russia and the dire situation Ukraine faces without more funding. Military analysis, intelligence and information from Ukrainians have prompted concerns within the Biden administration about Russia’s aggression and what it means on the battlefield.
  
  Zelensky warns ‘millions will be killed’ without US aid to Kyiv, as Ukrainian troop deaths reach at least 31,000
  
  “The outlook is a lot more bleak,” the US official said.
  
  On Sunday, national security adviser Jake Sullivan called out Johnson by name in his push for the GOP-controlled House to pass Ukraine aid.
  
  “There is a strong bipartisan majority in the House standing ready to pass this bill if it comes to the floor, and that decision rests on the shoulders of one person, and history is watching whether Speaker Johnson will put that bill on the floor,” Sullivan told CNN’s Dana Bash on “State of the Union.”
  
  In private conversations, Biden has sought to reassure allies that he’s doing everything he can to support Ukraine, including on Saturday during a call with G7 leaders.
  
  Johnson has signaled that he will not put the $95 billion Senate aid package – which includes $60 billion in Ukraine aid – on the floor in its current form as he faces pressure from his right flank.
  
  In a statement earlier this month, the Louisiana Republican said a standalone foreign aid bill, without addressing US border security, was unacceptable. And Johnsonprivately told his colleaguesbefore Congress left town for its nearly two-week recess that he was in “no rush” to address the issue.
  
  “The mandate of national security supplemental legislation was to secure America’s own border before sending additional foreign aid around the world. It is what the American people demand and deserve,” Johnson said at the time. Congressional Republicansscuttled a bipartisan border security billnegotiated in the Senate amid pressure from former President Donald Trump, the front-runner for the GOP presidential nomination.
  
  While further aid for Ukraine has majority support in the House, including from a solid core of Republicans, Johnson has to manage a fractious conference that includes members on the right who staunchly oppose additional aid.
  
  And despite efforts to release a spending deal Sunday, an agreement still hasn’t come to fruition amid high-level disputes over policy issues, according to GOP sources. Funding for four government agenciesruns out Fridayat midnight.
  
  Johnson had told his members on a recent conference call that he was hoping to have a deal they could put on the floor this week.
