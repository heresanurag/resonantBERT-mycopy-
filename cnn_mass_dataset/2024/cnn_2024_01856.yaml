  👋Welcome to 5 Things PM!Parents and kids have been battling over screen time for years. Recent research found parents should let go of guilt over letting their children use phones and tablets more than experts recommend.Here’s why.
  
  Here’s what else you might have missed during your busy day:
  
  1️⃣Niche hobby:For these collectors of aviation accoutrements, their leisure time activity is serious business. It helps to have a really good sense of humor —and a strong stomach.
  
  2️⃣Worker safety:The sweltering temperatures across much of the United States have put a spotlight on what companies should be doing to protect employees.Here’s what you should knoweven if you don’t work outside.
  
  3️⃣Parkour problem:The latest chapter of tourists behaving badly comes from Italy, where visitors ran, climbed and leaped over an ancient city’s historic structures. Part of one buildingcame crashing down.➕ Just Stop Oil protestersspray Stonehenge with paint.
  
  4️⃣Cosmic awakening:Astronomers are witnessing a never-before-seen spectacle in real time as a supermassiveblack hole emergesat the center of a distant galaxy.
  
  5️⃣Microplastics:These tiny particles are proliferating, and concerns are mounting about their potential effects on our health. Now they’ve turned up in …a sensitive place on the body.
  
  🤖Robot research:Experts from the Monterey Bay Aquarium Research Institute in Californiaidentified a new speciesof deep-sea squid using footage captured by underwater robots.
  
