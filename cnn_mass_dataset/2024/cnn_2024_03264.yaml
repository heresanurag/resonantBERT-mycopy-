title: "Opinion: Nikki Haley is right about the Trump tariffs"
date: "2024-02-02"
section: "Opinion"
url: "https://www.cnn.com/2024/02/02/opinions/trump-haley-tax-tariffs-2024-presidency-mccaffery?cid=external-feeds_iluminar_post-news"
content: |
  EDITOR’S NOTE:Edward J. McCaffery is Robert C. Packard Trustee Chair in Law and a professor of law, economics and political science at the University of Southern California. He is the author of “Fair Not Flat: How to Make the Tax System Better and Simpler” and founder of the People’s Tax Page. The opinions expressed in this commentary are his own. Viewmore opinionat CNN.
  
  It has been pretty quiet on the tax beat of late.
  
  Billionaires have beencallingfor increased taxes on themselves, perhaps because they know that no such thing is going to happen anytime soon.
  
  Democratscontinue to proposetaxes on billionaires, perhaps because they know thatno such thing is going to happen anytime soon.
  
  A relatively modest ($78 billion)bipartisan tax deal, which strengthens the child tax credit and extends some of the business tax breaks from former President Donald Trump’s Tax Cut and Jobs Act (TCJA) of 2017, got through the House Wednesday but faces an uncertain future in the Senate.
  
  This is not surprising. It is hard to do anything meaningful about taxes in a presidential election year. Except, that is, to talk.
  
  Enter Nikki Haley. In a recent interview, while preparing for the critical South Carolina Republican presidential primary, Haleytook aimat Trump’s call for more tariffs, specifically a 10% across-the-board charge on all imports: “This is a man who now wants to go and put 10% tariffs across the board, raising taxes on every single American. Think about that for a second.”
  
  Second, Haley is almost certainly right: tariffs can be a regressive tax, borne largely, if not exclusively, by ordinary American workers. The moderate, non-partisan Tax Foundation found that the existing Trump tariffs will bring in a mere $74 billion in revenues over ten years, while costing jobs, lowering growth and depressing American wages. TheTax Foundation claims that Trump’s latest tariff proposals would act as a $300 billion tax on most of us.
  
  OK, let us take Haley up on that, and think about it for a few seconds. Here are some thoughts:
  
  First off, Trumpdid impose tariffsin his time as president. Theyrangedfrom 7.5% to 25%.
  
  Second, the Trump campaign disputes that characterization of his new proposal, of course, (callingthe Tax Foundation’s view “an economically illiterate statement put forward by a globalist Washington think tank funded by multinational corporate interests”) but we have known at least since Adam Smith that tariffsare generally poor tax (and trade) policy.
  
  Third, despite all thewailing and gnashing of teethby liberals and progressives about Trump and his tariffs, the Biden-Harris administration has mostlykept them in place.
  
  Fourth, Trump, being Trump, has effectivelydoubled down, by proposing another 10% round of tariffs (the proposal criticized by Haley and the Tax Foundation) and even sextupled down, mullinga 60% tariffon China, in particular. Even if the first round of Trump tariffs produced modest revenues with modest downsides, the harms are likely to get worse as the rates rise, as we may recall from theSmoot-Hawley Act of 1930, which may well have exacerbated the Great Depression.
  
  Opinion: Nikki Haley’s right. Red flags about Trump’s mental fitness can’t be ignored
  
  So, after a few seconds of thought, here is the thing. Haley is right. Trump’s plan is to impose a 10% tariff that acts like a sales tax that will mainly fall on ordinary workers, the kind who shop at Walmart, although it is nominally targeted at foreigners. Who is likely to benefit most from any future Trump tax cuts? Likely therich, the kind of people who do not shop at Walmart. This is perfect, inverse-Robin-Hood-Republican-tax-policy: take from the poor to give to the rich. This has been a through line from Herbert Hoover to Ronald Reagan and now Trump.
  
  One more thing: It is popular.
  
  Like the high schooler giving the perfect speech in running for class president, Haley is losing to the class clown promising Taco Tuesdays in the cafeteria.  The simple take-home on the tax rhetoric du jour?  Haley is right; Trump wins.
  
  Those who politically oppose Trump or his regressive tax policies forget at their peril his undeniable skills, even genius, at marketing.Trump Universitymay have taught its students little of value, but they paid their tuition.
  
  We live in an age in which politicians create the “realities” they sell, as on “The Apprentice.” Peoplehatetaxes. A plan that makes it look as if those mean, cheating foreigners will pay our taxes for us sounds great, and who has time to check the math?
  
  The truth about tariffs is that they are a fee charged to people who import goods into the US. The government gets the revenue from the tariff, but the importer normally factors that amount into the price at which it sells products to Americans. So, consumers are ultimately footing the bill for tariffs like the ones Trump advocates.
  
  Here is some advice: If a politician pitches a tax plan that sounds too good to be true, check your wallet. And while we all learn to get better at understanding tax and the other laws that affect us, day to day, we can stop blaming the salespeople-politicians for pitching their plans. We get what we vote for. Caveat emptor, as they say.
