title: "Two Americans, one Canadian missing after attempt to climb New Zealand’s highest mountain"
date: "2024-12-03"
section: "US"
url: "https://www.cnn.com/2024/12/03/us/new-zealand-missing-climbers/index.html"
content: |
  Harsh weather conditions have slowed the search for two American men and a Canadian climber who went missing after they attempted to summit New Zealand’shighestmountain, officials said.
  
  Kurt Blair, 56, Carlos Romero, 50, and the Canadian national were reported overdue from their planned ascent of Mount Cook (also known as Aoraki), police Inspector Vicki Walker, Aoraki area commander,saidin a news release Tuesday.
  
  The three – who flew to the area on Saturday – were planning to summit the 12,218-foot alpine mountain via Zurbriggen Ridge and were reported overdue to meet their flight back out Monday morning, according to New Zealandpolice.
  
  A helicopter and search and rescue personnel began looking for the three but had to pause “due to weather conditions on the mountain,” Walkersaid. The search was unable to resume Tuesday as conditions on the mountain haven’t improved.
  
  Several climbing-related items, believed to belong to the three men, were found Monday during the limited time authorities were able to search, Walker said.
  
  “Police have been working with the US and Canadian embassies to inform and support the families of the three men,” Walker said. The official declined to share further information about the third man until the agency is assured his family is notified of his status.
  
  Walkersaidsearch and rescue operations are unlikely to resume until Thursday, when weather conditions are expected to improve.
  
  Blair andRomeroare certified guides in skiing, alpine climbing and rock climbing, according to theAmerican Mountain Guides Association (AMGA). Blair lives in Durango, Colorado, while Romero lives in Livermore, California.
  
  Aorakireceivedits European name, Mount Cook, in 1851 and features a number of walks and activities for all levels of fitness.
