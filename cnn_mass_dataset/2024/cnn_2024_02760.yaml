title: "Ariana Madix debuts to a standing ovation in ‘Chicago’ on Broadway"
date: "2024-01-30"
section: "Entertainment"
url: "https://www.cnn.com/2024/01/30/entertainment/ariana-madix-chicago-broadway/index.html"
content: |
  Ariana Madix is now part of the Great White Way.
  
  The “Vanderpump Rules” star made her Broadway debut on Jan. 29, starring as Roxie Hart in “Chicago.”
  
  Madix received a huge bouquet of flowers for her performance at the Ambassador Theatre in New York City. Madix’s “Pump”costarsLala Kent and Scheana Shay were in attendance, along with Madix’s mom Tanya.
  
  Madix had long dreamed of being on Broadway and was a theater major at Flagler College in St. Augustine, FL.
  
  After moving to Los Angeles, shelanded a spoton “Vanderpump Rules.” She was famously betrayed by her longtime boyfriend Tom Sandoval, who had an affair with her best friend while filming Season 10 of the Bravo show.
  
  “Chicago” has won six Tony Awards, including best revival. It was originally choreographed by Bob Fosse.
  
  A few audience members too to Instagram to comment on a video of Madi’x curtain call, with one writing, “I was there ! Arianna killed it!”
  
  Another wrote of Madix’s unusual path to Broadway, “She turned those lemons into the biggest glass of lemonade you ever seen. Drink up, girl!”
