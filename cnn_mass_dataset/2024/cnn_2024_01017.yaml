  Haaretz slammed the move in astatementon Sunday, calling it “another step in Netanyahu’s journey to dismantle Israeli democracy.”
  
  “Like his friends Putin, Erdoğan, and Orbán, Netanyahu is trying to silence a critical, independent newspaper,” the statement said. “Haaretz will not balk and will not morph into a government pamphlet that publishes messages approved by the government and its leader.”
  
  The move comes two months after themilitary raided and shut downAl Jazeera’s office in Ramallah and six months after the governmentshut down the broadcaster’s operationsinside Israel in May, prompting condemnation from the United Nations and rights groups.
  
  On Friday, the Committee to Protect Journalists (CPJ) saidpreliminary investigations showedat least 137 journalists and media workers had been killed covering the war, making it the deadliest period for journalists since CPJ began gathering data in 1992.
