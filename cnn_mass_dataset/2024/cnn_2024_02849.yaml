  LaGuardia’s furry fugitive is not the only raccoon to have caused a stir this year.
  
  In May 2024, a bandit-eyedpitch invaderinterrupted a soccer game in Chester, Pennsylvania, causing stadium staff to chase it with trash cans.
  
  Raccoons are an invasive species in Germany, with an estimated two million of the cuteprocyonidsat large. A butcher in the northeast of the country, Michael Reiss, told CNN last month that he’d come up with what he believes is an innovative solution to the raccoon problem. He’s been turning them into sausages,“raccoon balls”and other meat products.
