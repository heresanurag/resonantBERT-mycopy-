title: "Trump’s stock tumbles again after Truth Social announces it’s getting into streaming"
date: "2024-04-16"
section: "Investing"
url: "https://www.cnn.com/2024/04/16/investing/trump-stock-djt-truth-social-streaming"
content: |
  Investors in Trump Media & Technology Group’s stock are throwing in the towel.
  
  Shares of TMTG (DJT) tumbled 14% Tuesday afterclosing 18% lower Monday. Driving the stock lower Tuesday: The company’s premier product, Truth Social,announced a major expansion into streaming, a notoriously cost-intensive business in which media behemoths like Disney havestruggled to turn a profit.
  
  TMTG’s stock, majority-owned by former President Donald Trump, is down more than 70% from the all-time high it set on March 26, the day after it merged with a blank-check acquisition company to go public. Although the company is still worth billions of dollars, it is struggling to make money and desperate for cash.Experts have warned investorsto be careful if they choose to trade the stock, because the company doesn’t have the fundamentals to back up its sky-high valuation.
  
  Trump Medialost $58 millionin 2023 and made just $4.1 million in revenue. So, it announced Monday it would sell 21.5 million more shares to the public to raise cash — even though that would dilute the value for existing shareholders.
  
  The streaming initiative didn’t give investors any reason to get enthused about the company. Truth Social said it spent the past six months testing its web, iPhone and iPad apps for live TV streaming, and it hopes to launch a content delivery network to stand up streaming apps for phones and tablets — and eventually smart TVs.
  
