title: "Opinion: Why a booming economy isn’t helping Biden"
date: "2024-03-24"
section: "Opinion"
url: "https://www.cnn.com/2024/03/24/opinions/biden-economy-low-approval-ratings-zakaria/index.html"
content: |
  EDITOR’S NOTE:Fareed Zakaria is the host ofFareed Zakaria GPS, airing at 10 a.m. and 1 p.m. ET Sundays on CNN. Follow Fareedon X,and read news, analysis, and insights from Fareed and his team in thedaily CNN newsletter Fareed’s Global Briefing. This article is adapted in part from Fareed’s new book, “Age of Revolutions: Progress and Backlash from 1600 to the Present,” which will be published March 26. The views expressed in this commentary are his own. Read moreCNN Opinionhere.
  
  The central puzzle about this election campaign, that has pollsters and pundits opining, is the disconnect between the state of the economy and President Joe Biden’s approval ratings. A simple rule of thumb is that a president’s approval rating predicts the chances ofreelection. It used to be that the public’s view of the presidentdependedmostly on its view of the economy. But that relationship has gone haywire recently.
  
  Look at the current state of the economy. America is in unusually good health. It hasrecoveredbetter from the Covid-19 pandemic than any other major economy. For two years the unemployment rate has beenunder 4%,a streak the US hasn’t seen in more thanfive decades.
  
  Inflation, which was worrying, has dropped sharply since mid-2022 and is now3.2%. Wage growth for lower-income workers over the past few years hasoutpacedthat of high-income workers.
  
  The flood of good news also includes some unprecedented data. In a reversal of a decades-long trend, Black workers’participationrate in thelabor forceis now higher than that of White workers. And yet, Biden’sthird-year averageapproval rating was about 40%, the second lowest of modern presidents. It’s currently around 38%.
  
  Opinion: Biden needs to stand up to Texas’ immigration extremism
  
  Part of the answer is probably the disconnect around people’s perception and feelings. Whileconsumer sentimentis up dramatically from itsall-time lowin June 2022 and many people havepositive viewsof their personal finances, they are still gloomy on the economy at large.
  
  Explanations for this disconnect abound. Some say it’s atime lag, others that people are being swayed bysocial media, still others that residual feelings aboutinflationtends to trump all else. But I think that the real answer is that politics is no longer fundamentally driven by economics – that our political preferences are today shaped more by issues of culture, class and tribalism than by how much money we make.
  
  That is one of the core theses of my new book, “Age of Revolutions,” which argues that we are living through a huge backlash after decades of rapid accelerations in technology and globalization. And this backlash is largely centered on cultural anxiety in a fast-changing world.
  
  The disconnect between economics and politics has been growing for a while. As Nate Cohn of The New York Timeshas noted, ever since Barack Obama’s presidency, the rock-solid connection between the health of the economy and a president’s approval ratings has “almost gone.”
  
  Former President Donald Trump presided over a very strong economy until Covid-19, and yet his approval ratings were extremely low, just like Biden’s. And during the 2020 election, something extraordinary happened: Democrats’ and Republicans’viewsof the economy flipped massively in the months around Biden’s inauguration.
  
  Democrats who had previously thought the economy was in terrible shape now thought it was booming, and Republicans did the opposite. A similar flip-flop occurred when Trump was elected in 2016. In other words, peoples’ political leanings shaped their views of the economy, not vice versa.
  
  Opinion: The cracks are beginning to show in Trump’s campaign finances
  
  What then is shaping peoples’ political affiliations? I argue in the book that it is identity — which encompasses culture, class and tribalism. In the 20th century, political leanings were shaped by economics. Where you sat economically determined where you voted politically.
  
  It made sense in a much poorer age when vast numbers of working-class voters were fundamentally motivated by moving up to secure a decent living. (America’sper capita GDPin 1950, adjusted for inflation, was around $15,000.) Most Western societies achieved that basic condition by the 1960s, and people began to express other “post-materialist” identities and values. (I am drawing on powerful survey research, done over decades, by the social scientist Ronald Inglehart.)
  
  Many people believe that populism is fundamentally about rising inequality and a working class that has been left behind. But look at northern European countries like Sweden and Denmark. They spend lavishly on social safety nets andworkerretrainingprograms and have relatively lowinequality. And yet, populist parties — at least one with a direct lineage tofascism— have surged in these places to become major political players.
  
  France has coddled and shielded itsworkersmore than almost any other industrial nation and yet, were elections held today, the xenophobic National Rally wouldprobably win.
  
  All thesecountrieshaveseen large tides of migrants over the last few decades. In 1970, most major Western European countries had under 6% of their population who wereforeign-born. In 2020, most had more than 12%. In Austria, Germany, and Sweden, it was close to 20%. (For comparison, the US has seen those numbers rise from around 6% to 15% during the same period).
  
  Opinion: What Biden needs to know about Rafah
  
  Immigration today remains the rocket fuel that propels populist parties. Immigration is, in a sense, the visible face of globalization. You cannot see or feel capital flows or trade liberalization. But you can look at these new entrants into your society, who look different, speak differently, and often worship different gods, and feel unnerved.
  
  One counterexample helps make the point. A major industrialized country that has not had much right-wing populism and where the old ruling establishment continues to hold the reins of power largely unchallenged is Japan. It is surely relevant to note that Japan also takes very few immigrants.
  
  Beyond immigration, one sees how other issues that divide people along lines of religion, culture and class feed the new politics. In his last book, Inglehartnoteda startling fact about the United States. The US had always been an outlier among developed countries as a rich nation that remained deeply religious,closerto Nigeria than to Denmark on this cultural scale. In recent years, the single strongest drop in religiosity (among countries he studied)occurredin the United States.
  
  America is rapidly secularizing, and this is causing extreme anxiety in large parts of the country, especially among non-urban, non-college educated people. The religious and cultural divide in America is layered underneath a class divide: urban vs rural, college-educated vs non-college educated. And economic differences are malleable; you can split the difference between someone who wants to spend $2 billion and another who wants to spend $4 billion. But how do you split the difference on issues of identity, religion and morality like abortion and gay rights?
  
  This rise of cultural politics explains the other great shift in polling that has been best observed bythe Financial Times’s John Burn-Murdoch: “a racial realignment.” All non-White voters, especially Hispanic and Black voters, are becoming more evenly divided between left and right than they have been for decades. Why? Perhaps many of them are realizing that on many of the social issues that now dominate – abortion, gay rights, immigration – they may lean more right than left.
  
  In recent decades, globalization and technology have moved so fast that they have left many people in advanced societies deeply anxious. And when people see their world in flux, they often move not left on economics but right on culture. They want the world to stop changing so fast and to listen to politicians who promise to take them back to “the good old days,” or make America great AGAIN.
  
  The left’s instinct is to solve this problem by spending money. Biden’s policies have disproportionatelyhelpedpeople in rural areas without college degrees – likely Trump voters, in other words. But I doubt this will make them into Democrats. The left needs to play more effectively on the new crossroads of politics, where culture and class have replaced economics.
