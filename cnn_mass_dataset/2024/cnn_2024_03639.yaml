  “This is a reckless policy change that will only serve to promote more spread of Covid and Long Covid,” Dr. Eric Topol, founder and director of the Scripps Research Translational Institute, said in an email. Topol co-authored one of thefirst reviewsof asymptomatic Covid-19 infections.
  
  Wastewater surveillancedatapublished by the CDC suggests that Covid-19 is still circulating at high levels across the US, but the agency notes that “infections arecausing severe disease less frequentlythan earlier in the pandemic.”
  
  Still, tens of thousands of people are hospitalized with Covid-19 and hundreds of people die from the virus each week. There were about 21,000 Covid-19 hospitalizations during the week ending February 3, according to the latest CDCdata. That’s about 20% lower than this time last year but more than three times more than the low point from this summer.
