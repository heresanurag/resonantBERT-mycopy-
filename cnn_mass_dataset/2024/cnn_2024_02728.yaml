  Police in Sweden are meanwhile leading an investigation into the breach last month of twoBaltic Sea telecom cables, in an incident German Defence Minister Boris Pistorius has said he assumed was caused by sabotage.
  
  Separately, Finnish police continue to investigate damage caused last year to the Balticconnector gas pipeline linking Finland and Estonia, as well as several telecoms cables, and have said this was likely caused by a ship dragging its anchor.
  
  In 2022 the Russia-to-GermanyNord Streamgas pipelinesrunning along the seabed in the same waters were blown up, in a case still under investigation by Germany.
