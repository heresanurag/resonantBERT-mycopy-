title: "The hottest trend in executive leadership: Bring back the White Guy"
date: "2024-10-22"
section: "Business"
url: "https://www.cnn.com/2024/10/22/business/ceo-diversity-nightcap/index.html"
content: |
  A version of this story appeared in CNN Business’ Nightcap newsletter. To get it in your inbox, sign up for free,here.
  
  Listen up, corporate boards: If you’re looking for the biggest trend in leadership this fall, look no further. Corporate America’s hottest CEO pick is a classic model — the Middle Aged White Guy.
  
  Twenty-twenty-four has been the year of CEO turnover, with some 1,450 having announced their departure so far —up 15% from the same period last yearand the highest year-to-date total on record, according to research from executive coaching and outplacement firm Challenger, Gray & Christmas. Companies are increasingly opting to fill those vacant top jobs with a man, the data show.
  
  In August, the rate of new CEOs who are women fell 0.7% to 27.2% compared with the same period last year.
  
  Companies are caving to anti-DEI crusaders. That’s bad for business
  
  And of course, the ranks of women and people of color have always been thin. Just 52 businesses in the 2024 Fortune 500 ranking were run by women, holding flat from the year before.
  
  Obviously, White Guy CEO never went out of fashion — women have rarely represented more than 10% of Fortune 500 companies. People of color are also wildly underrepresented in the C-suite, with just eight Black CEOs in the Fortune 500 this year (down from a peak of nine last year).
  
  But a rash of recent leadership shakeups illustrates the enduring power of the White Guy as a kind of capsule wardrobe for corporate leadership.
  
  To be clear: What a board decides to do with its chief executive is the board’s business. But DEI initiatives have beenshownto boost profits, reduce employee attrition and increase employee motivation, as my colleagueNathaniel Meyersohn has reported.
  
  Two of America’s most prominent Black business leaders have a warning for companies abandoning DEI
  
  Leadership diversity, in particular, is associated with “holistic growth ambitions, greater social impact, and more satisfied workforces,” according toMcKinsey research.
  
  The business case is clear. But the reversion to the mean of a White male CEO also is happening at the same time that many firmsare backing off their early-2020s commitmentsto diversity, equity and inclusion, or DEI. All of that coincides with the Supreme Court’sdecisionlast year to end affirmative action in colleges.
  
  In other words, giant US institutions have created a permission structure for businesses to revert to muscle memory. There may have been a moment, circa 2020-2022, when replacing a person of color or a woman with a White man may have sparked a public relations debacle.
  
  Clearly, major companies don’t seem to be sweating the optics anymore.
