title: "‘Devil comet’ visible in night sky now won’t swing by Earth again for decades"
date: "2024-03-21"
section: "World"
url: "https://www.cnn.com/2024/03/21/world/devil-comet-pons-brooks-eclipse-scn?cid=external-feeds_iluminar_yahoo"
content: |
