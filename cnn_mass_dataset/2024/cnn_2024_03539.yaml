title: "5 things to know for Aug. 12: Paris Olympics, Presidential race, Middle East tensions, Brazil plane crash, Greece wildfires"
date: "2024-08-12"
section: "US"
url: "https://www.cnn.com/2024/08/12/us/5-things-to-know-for-aug-12-paris-olympics-presidential-race-middle-east-tensions-brazil-plane-crash-greece-wildfires/index.html"
content: |
  It’s a bird … It’s a plane … No, it’s a fireball. The Perseid meteor shower reached its peak before dawn today, lighting up the skies with up to 100 meteors per hour. If you were fast asleep, don’t fret: There areseven remaining meteor showersset to peak before the end of the year.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  After an exciting two-and-a-half weeks of competition, theSummer Olympics wrapped up on Sundaywith a grand closing ceremony at the Stade de France. The celebration boasted an array of music, a parade of nations and evenTom Cruise rappelling from the roof. It was a fitting Hollywood finish as the Games were formally handed to 2028 host Los Angeles. Also on Sunday, the US women’s basketball team survived a scare and beat host nation France, 67-66. The victory sealed a US tie with China formost gold medals at the 2024 Games. Meanwhile, a saga is unfolding around American gymnast Jordan Chiles’ floor exercise bronze medal. US Olympic officials say they willappeal a rulingthat stripped her of the medal and dropped her to fifth place.
  
  Vice President Kamala Harris and former President Donald Trump are facing another busy week ahead intheir quest for the White House. Harris delivered remarks at a San Francisco fundraiser Sunday while Trump said his weekend fundraisers in Montana and Wyoming raised $28 million for his campaign. On Saturday, Trump’s campaign said in a statement that it had beenhacked by Iranian operativesthat “intended to interfere with the 2024 election.” Politico reported that it had received emails from an anonymous account with documents from inside Trump’s campaign operation but it’s not clear whether Iran was responsible for the hack. The White House condemned any attempt at foreign interference in American elections.
  
  A barrage of rockets fired by Hezbollah into Israel on Sunday night has further heightened tensions in the Middle East. The latest salvo was fired in support of the Palestinian people in Gaza and in retaliation for Israeli strikes in southern Lebanon, the militant group said in a statement. Rocket fire toward Israel by Iran-backed Hezbollah militants in Lebanonhas become a near-daily occurrencesince the outbreak of war in Gaza as fears grow over a possible Iranian attack that could escalate into a wider regional conflict. US Defense Secretary Lloyd Austin hasordered a submarine to the Middle Eastand accelerated the arrival of a carrier strike group to the region ahead of an anticipated Iranian attack against Israel, the Pentagon said on Sunday.
  
  All 62 bodies have been recovered from the site of thedeadly plane crash outside São Pauloon Friday, according to the state government. Flight tracking data shows that the passenger plane dropped 17,000 feet in just one minute, but it is not yet clear why. The flight had left Cascavel, in the Brazilian state of Parana, and was en route to Guarulhos, in São Paulo state. Dramatic footage circulating on social media showed the plane’s fall and itsdestroyed fuselage in flameson the ground. Preparations are expected to begin today for a wake to be held in Cascavel, according to reporters in the region.
  
  Evacuations have been ordered near Athens as authorities race to containwildfires near the Greek capital. More than 500 firefighters and volunteers are working to extinguish the blaze which broke out Sunday near the town of Varnavas, north of Athens. Fire officials have not said how big the fire is, but Greek public broadcaster ERT estimates it exceeds about 19 miles. Although wildfires are common in Greek summers, climate scientists say thatunusually hot and dry weatherlinked to global warming makes the blazes fiercer and more numerous. Greek authorities have battled dozens of blazes already this summer after enduring its hottest June and July on record.
  
  Disney dropped huge theme park announcementsThe company announced aslew of theme park projectsto be developed in the coming years, including an ominous land dedicated to Disney villains.
  
  Inflation comes for your oystersAw,shucks.Oysters used to be (relatively) cheap in past decades but prices at some restaurants are nowfloating around $2.50 apiece.
  
  New England Patriots win first game without Bill Belichick in 24 years﻿The New England Patriots won their first game in 24 yearswithout legendary coach Bill Belichick in charge, beating the Carolina Panthers 17-3 in their opening preseason game.
  
  Celine Dion criticizes Trump campaign for unauthorized use of her musicSinger Celine Dionshared this cheeky statementafter learning the Trump campaign has used her ballad “My Heart Will Go On” at multiple rallies.
  
  More than 80 years after he went missing, an American airman has been honoredA World War II airman who died in 1943 after his aircraft went down over Romaniawas recently honoredat an American cemetery abroad.
  
  1.3 millionThat’s roughly how many women in the USenter menopause every year. However, around 94% of US women reported never being taught about menopause at school, a 2023 study found, and nearly half said that they did not feel informed about it at all.
  
  “The core of the problem is that the United States does not have a national heat safety standard for workers, indoor or outdoor.”
  
  — Brian Renfroe, the president of the National Letter Carriers Association, calling forbetter heat protections for US postal workersamid rising temperatures nationwide. Between 2015 and 2021, approximately 500 to 600 letter carriers have reported heat-related injuries, according to the Department of Labor.
  
