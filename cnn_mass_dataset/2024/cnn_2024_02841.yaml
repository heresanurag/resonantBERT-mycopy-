title: "Colossal rock engravings may be ancient borders, study suggests"
date: "2024-06-04"
section: "Science"
url: "https://www.cnn.com/2024/06/04/science/rock-engravings-ancient-south-america-scn?cid=external-feeds_iluminar_yahoo"
content: |
