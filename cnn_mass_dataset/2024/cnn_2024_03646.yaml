  EDITOR’S NOTE:Sign upto get this weekly column as a newsletter. We’re looking back at the strongest, smartestopinion takesof the week from CNN and other outlets.
  
  On George Washington’s birthday in 1892, former President Grover Cleveland urged graduating students at the University of Michigan to “take with you … a strong and abiding faith in the value and potency of a good conscience and a pure heart. Never yield one iota to those who teach that these are weak and childish things, not needed in the struggle of manhood with the stern realities of life.”
  
  The speech embracing Washington’s virtues was “perhaps the most unusual kickoff to a presidential campaign in American history,”wroteCleveland biographer Troy Senik.
  
  Nine months later, Cleveland won the presidency for the second time, becoming the only person in American history to serve non-consecutive terms in the White House. It is a feat former President Donald Trump is trying to duplicate this year.
  
  Cleveland overcame scandal in his first run for president when he had to admit to having possibly fathered a child out of wedlock — his opponents derisivelychanted, “Ma, ma, where’s my Pa?”
  
  But his travails pale in comparison to Trump’s 91 felony charges — and Cleveland’s speech saluting homely American virtues is worlds away from the 2024 Republican frontrunner’s repeated focus on his own grievances, spoken as he travels from primary appearances to courtrooms. And, of course, Cleveland didn’t refuse to accept that he lost his bid for reelection — in 1888 to Benjamin Harrison — as Trump has, claiming without evidence that the 2020 election was a fraud.
  
  The first true test of Trump’s comeback occurs Monday in Iowa, where caucusgoers will venture into sub-zero temperatures to choose between Trump, Florida Gov. Ron DeSantis, former UN ambassador Nikki Haley, entrepreneur Vivek Ramaswamy and others.
  
  After months of speculation, we’ll finally get some answers to a few questions: Is there an opening for any Republican aside from Trump? Will DeSantis’ decision to focus on Iowa, where he’s visited all 99 counties, pay off? Does Haley’s momentum in New Hampshire, where she is second in the polls, also apply to Iowa?
  
  Most of our contributors thought Haley won Wednesday’s CNN debate in Iowa against DeSantis, but Trump’s absence from the stage again loomed large.
  
  “Haley sounded like someone looking to take on the genuine article — the Republican frontrunner,” wroteW. James Antle III. “Her refrain of ‘make America proud again’ appropriated Trump’s signature line while suggesting his term wasn’t always a source of national pride. She went even more directly against his divisiveness and conduct during the January 6 Capitol riot.”
  
  “There’s a limit to how far that will take you in a Republican primary, as former New Jersey Gov. Chris Christie can attest after campaigning hard against Trump only to drop out Wednesday. … But if Haley can dispatch DeSantis and put up some resistance to Trump, the frontrunner might have difficulty continuing to avoid debates — and might not benefit from joining her on stage.”
  
  “But that is still a lot of ‘ifs’ for Haley,”Antle observed.
  
  “Make no mistake,” wroteSE Cupp, “Haley made conservative arguments. But for someone looking for a Trump alternative, who’s turned off by the new GOP’s regressive extremism, who wants to move past Trump’s chaos,Haley made an appeal to them without giving up on her principles.”
  
  Sophia A. Nelsonargued that “Haley isn’t quite there yet. She certainly has the intelligence and ability to be president. But … she and Florida Gov. Ron DeSantis engaged in petty, juvenile sniping at one another. She opened the night looking presidential and sounding sober-minded — right up until she told voters to go to Desantislies.com (which she repeated multiple times throughout the night).That was a low point — for me and the room full of family members I watched the debate with.”
  
  Debate coachTodd Grahamgave Haley a B for her performance: “Haley deftly pivoted away from Trump. She was more forceful in her criticisms of the former president than she’d been in previous debates. Haley knows it’s now or never to highlight their contrasting styles and policies. This could be something to build on for future debates.” DeSantis got a D+ from Graham:“His answers became alarmingly policy-free and could easily fit on bumper stickers.”
  
