  In the world of legal developments swirling around Trump last week, the most significant was the DC Circuit Court’s oral arguments over his claim to immunity from criminal prosecution under nearly all circumstances.
  
  “Right out of the gate,” wroteLaurence Tribe, Norman EisenandTaylor Redd, “Judge Florence Pan, who emerged as the panel’s most incisive questioner, presented Trump’s counsel John Sauer with a hypothetical that exposed the unthinkable consequences of Trump’s extreme position: Could a president who used his official authority to order SEAL Team Six to assassinate a political rival ever be prosecuted?”
  
  They wrote that “placing presidentsabovethe law — by making them immune from criminal accountability —gets separation of powers backwards and upends the rule of law.”
  
  The SEAL Team Six hypothetical“resonated because it aligns with the Trump we have all come to know: a politician who has encouraged, promoted, justified and even praised political violence, as long as he sees it as a sign of support for him,”Frida Ghitisobserved.“And it resonated because Trump is once again sending very clear signals that he endorses and even encourages political violence to support his cause.”He is calling those imprisoned for the Capitol riot “hostages,” rather than people convicted of crimes, Ghitis noted.
  
  Trump’s strategy of showing up for court sessions where his presence is not required appears to be working for him, along with his refusal to engage in debates. “There are many reasons for Trump’s formidable lead in the Republican primary, but at the top of the list is the fact that Haley, DeSantis and others in the GOP havestruggled to attract similar levels of attention as the former president, whose mastery of grabbing the media spotlight is unrivaled,” wroteJulian Zelizer.
  
