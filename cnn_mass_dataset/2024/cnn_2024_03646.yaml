  For sports traditionalists, it’s bad enough that the college football realignment is under way. Now the NFL’s legendary Bill Belichick is out as coach of the New England Patriots, the team he led to six Super Bowl victories.
  
  Will Leitchargued that the “changes to college football seem potentially fatal. Sure, in the short term, they’ll work: I’m as excited to watch next year’s 12-team College Football Playoff as anyone. But in the long term, when you pattern yourself after the NFL in order to get some of their television juice, when you jettison the traditions and orthodoxies that made people fall in love with the sport in the first place, you stop being college football: You simply become Minor League NFL. And no one cares about minor league anything.”
  
  Sports writerJeff Pearlmanclassed Belichick’s departure with the nearly simultaneous retirement of University of Alabama head coach Nick Saban as big losses for football.Not least, they represent a disappearing kind of team leader: “the grump coach.”
  
  “Belichick is a grump. Saban is a grump. One-word answers. Dismissive shrugs. Indifferent brush offs. Pointed stares. That look — that dreaded, nightmarish, awful look — that screams one of the following:
  
  • ‘What type of stupid question is that?’• ‘Who let you in here?’• ‘You are a millimeter of lint on my sweater.’
  
  Pearlman recalled, “When they addressed the media, it was usually done in a dark and dank office, a cracked-open Schlitz in one hand, a smoldering Camel in the other…”
  
  “I once interviewed Lou Piniella, manager of the Seattle Mariners, as he (simultaneously) peed at a urinal, smoked a cigarette and ate a turkey-and-Swiss hoagie. ‘Ask me what you wanna know,’ he said, ‘then leave.’”
  
  “On the one hand, it’s not always fun dealing with the grump. Actually, it’srarelyfun dealing with the grump. But at least grumps are sincere and straightforward and generally incapable of posting a video to Instagram (without a grandchild’s assistance).”
