title: "Coca-Cola is pulling its newest ‘permanent’ flavor from store shelves"
date: "2024-09-24"
section: "Food"
url: "https://www.cnn.com/2024/09/24/food/coca-cola-spiced-discontinued?cid=external-feeds_iluminar_yahoo"
content: |
  Coca-Colais discontinuing the production of its new Spiced flavor just six months after the soda hit shelves, marking the end of a disappointing attempt to attract younger drinkers.
  
  The company said in a statement that Coca-Cola is “always looking at what our customers like and adjusting” its flavors. “As part of this strategy, we’re planning to phase out Coca-Cola Spiced to introduce an exciting new flavor in 2025,” a spokesperson said.
  
  The short lifespan of Spiced is surprising, because the company promoted it as apermanent flavor. Coca-Cola didn’t provide a specific reason for axing Spiced, although lack of awareness of the new offering and confusion about the flavor (it wasn’t actually spicy) probably contributed to lackluster sales.
  
  Coca-Cola introduced Spiced in February with asplashy ad campaign. The beverage blended the traditional Coke flavor with raspberry notes.
  
  Spiced was created to attract Gen-Z drinkers, who have a thirst forpunchier flavors, and soda giants have ceded some of their flavor innovation to pluckier upstarts, like Olipop and Poppi.
  
  For the past several years, Coca-Cola has been routinely updating its lineup withlimited-time offerings, such as a newOreo-flavor soda. It has also released some ambiguously flavored limited-time Cokes, including “Dreamworld,” “Starlight” and “Byte” flavored Coca-Cola. It also partnered with DJ Marshmello on aflavor that did not taste like marshmallow.
  
  Those beverages were part of itsexperimental Creations line, which was aimed at attracting young drinkers. Duane Sanford, editor of Beverage Digest, told CNN that Spiced “might have been lost in the shuffle” of those limited time offerings.
  
  But Coca-Cola intended Spiced to become a permanent addition to its lineup because its research found that an “increase in consumer willingness to try a spiced beverage” and that raspberry was selected more than 5 million times on its Freestyle drink machines in 2022, which the company “often uses for inspiration” for new flavors, according to Sue Lynne Cha, the company’s vice president of marketing for North America.
  
  “Consumers are looking for more bold flavors and more complex flavor profiles,” Cha previously told CNN. “That’s a trend we started to see in food but also in beverage, and we thought that was a unique space for us to play in.”
  
  Coca-Cola does not break out sales of individual Coke flavors, and the drink wasn’t mentioned in Coke’s most recent earnings call. Coke’s second-quarter net revenue rose 2.9%, but volumes of the company’s North American sales, where Spiced was sold, slumped 1%.
  
  Spiced isn’t the only flavor to get cut: On social media, the company confirmed it was ending production of Cherry Vanilla,which launched in 2020, and Diet Coke with Splenda. It’s part of a broader culling of its beverage portfolio that started four years ago and meant the end for 200 drinks, includingTab,AHA Sparkling WaterandOdwalla
  
  Drinkers are shifting their preferences away from sugary sodas and to sparkling waters and hydration beverages. In response, the company is growing its Topo Chico water line and expanding itsBodyArmor brand.
