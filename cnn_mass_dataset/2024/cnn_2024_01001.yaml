  Moody’s move reflects growing worries thattoxic market conditions, including weak demand and a tough financing environment, in China’s property industry are dragging down even relatively healthy companies with solid state backing.
  
  Vanke’s contracted sales declined 10% in 2023 to 376.12 billion yuan ($52.4 billion). In January 2024, its sales dropped by 32%.
  
  Investors have been dumping Vanke’s shares in the past few months. Its Hong Kong-listed stock has lost nearly 30% since November. So far this year, it’s down 9%.
  
  Beijing has been scrambling tofix its real estate crisissince 2021, when Evergrande, the world’s most indebted developer, defaulted on its international debt. The crisis subsequently spread, with dozens of major developers also failing to repay creditors. The fallout — which has undermined the confidence of homebuyers, businesses and investors — hasthreatened the broader economy.
  
  The stimulus measures rolled out by Chinese authorities have so farfailed to revive the sector. In 2023, property sales dropped 6.5% from 2022. Property investment fell 9.6%, the second straight year of decline.
  
  Last week, Ni Hong, China’s housing minister, told reporters during theNational People’s Congressthat regulators will support the “reasonable” financing needs of real estate developers.
  
  He reiterated a “whitelist” mechanism that was recently established to inject liquidity into the crisis-hit sector. More than 6,000 property projects across the country have been matched with development loans by banks.
  
  But he also said Beijing will not bail out developers that are “seriously” in trouble.
  
  “For real estate companies that are seriously insolvent and have lost their operating capabilities, [we should] let them go bankrupt or be restructured,” he said.
  
  “We view the tone as negative,” Nomura analysts wrote on Monday. They said Ni has made clear that the government’s priority is to ensure delivery of property projects, not to protect the developers’ businesses.
