title: "Sheryl Sandberg to leave Meta board"
date: "2024-01-17"
section: "Tech"
url: "https://www.cnn.com/2024/01/17/tech/sheryl-sandberg-leaving-meta-board?cid=external-feeds_iluminar_yahoo&.tsrc=rss"
content: |
  Former longtime Meta chief operating officer Sheryl Sandberg will not remain on the company’s board of directors after her term ends in May, she said in a Facebook post Wednesday.
  
  “With a heart filled with gratitude and a mind filled with memories, I let the Meta board know that I will not stand for reelection this May,” Sandberg said in thepost.
  
  Sandberg’s exit comes after she spent more than 14 years as the company’s chief operating officer, in addition to 12 years on its board. Sandbergstepped downfrom her COO role in the fall of 2022, marking the end of aremarkable tenureduring which she helped grow one of the world’s most influential companies and also saw it through significant criticism.
  
  Sandberg said in her post that she would be leaving the Facebook parent company’s board to focus more on philanthropic work but added that she would continue to serve as an advisor to Meta.
  
  She added that Meta’s current leadership team under CEO Mark Zuckerberg “have proven beyond a doubt that the Meta business is strong and well-positioned for the future, so this feels like the right time to step away.”
  
