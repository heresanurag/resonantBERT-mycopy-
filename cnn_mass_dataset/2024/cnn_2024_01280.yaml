title: "Why the Bills picked a player in NFL Draft who has never played football: he’s 6-foot-7 and runs a 4.79 second 40-yard dash"
date: "2024-04-29"
section: "Sport"
url: "https://www.cnn.com/2024/04/29/sport/travis-clayton-buffalo-bills-2024-nfl-draft-spt-intl?cid=external-feeds_iluminar_cnn-brasil"
content: |
  The transition from rugby tofootballhas proven tough in the past. Jarryd Hayne and Christian Wade both left rugby near the peak of their powers to try their hand on the football gridiron, with both failing to make it long term.
  
  Former Welsh internationalLouis Rees-Zammitwill try to make it work with the Kansas City Chiefs this seasonafter switching sportsearlier this year.
  
  However, there are some prominent success stories.Jordan Mailatais one of the best offensive tackles in the NFL, having developed into a stalwart on the offensive line for the Philadelphia Eagles after switching from rugby league.
  
  And on Saturday, the Buffalo Bills drafted someone who they hope will have a similar effect as Mailata, despite never having played a snap of football.
  
  With the221st overall pickand the first pick of the seventh round, the Bills selected Travis Clayton, a former rugby player from the United Kingdom.
  
  From Basingstoke in England, Clayton is one of 16 players in this year’s International Player Pathway program – an NFL scheme which allows athletes from across the globe to try to reach the league.
  
  He first opened doors to the NFL for international players. Now, Aden Durde is a historic coordinator
  
  Clayton has never played in a football game but possesses the raw tools that could translate to play offensive tackle in the league.
  
  He is 6-feet-7-inches and weighs 303 pounds. He can also run a 40-yard dash in 4.79 seconds.
  
  “His measurables are – wow – off the page,” Bills general manager Brandon Beane said.
  
  Clayton played for Basingstoke Rugby club, which plays in the Counties 2 Hampshire Division, the eighth tier of English rugby.
  
  The clubposted the congratulationsto Clayton on X, formerly known as Twitter, after he was drafted, saying: “BUFFALO SOLDIER!! Our man Travis Clayton drafted by the Bills. Proud is an understatement. Basingstoke on the NFL Map! Go smash it Trav!!”
  
  While his experience in the game is limited, Clayton believes his rugby experience will help his transition to a new sport.
  
  “With rugby also being a team sport, I believe that helps tremendously, my team knowledge and what it takes to communicate properly here and in the future, hopefully in the NFL,” Claytonsaid. “More importantly, playing the wing in rugby helps with the physicality side and with agility and things like that will help.”
  
  According to NFL draft analyst Lance Zierlein, Clayton’s future in the league will be dependent on “his toughness and a team’s ability to provide him with the necessary reps to get better at his craft” given his inexperience.
  
  But while there are glaring weaknesses, Zierlein also points to his strengths, saying Clayton is an “above-average athlete with a seven-foot wingspan” and “shuffles and slides with fluidity and clean change of direction.”
