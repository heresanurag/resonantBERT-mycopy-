  Editor’s Note: CNN’s 5 Things newsletter is your one-stop shop for the latest headlines and fascinating stories to start and end your busy day.Sign up here.
  
  👋Welcome to 5 Things PM!Marijuana has come a long way on the road to legitimacy in the US, and it’s on the verge of being reclassified as a less dangerous drug. An expert explainswhat that would meanfor the average American.
  
  Here’s what else you might have missed during your busy day:
  
  1️⃣Success stories:The FBI just released new data showing that violent crime is down across the US. Here’s how Baltimore, Detroit and San Antonio aremaking neighborhoods saferthanks to buy-in from people in the community.
  
  2️⃣Sluggish sales:Apple was counting on new artificial intelligence features to make the iPhone 16 a big hit. But despite several splashy launch events, early sales figureshave been lukewarm.The company is hoping for a boost during the holiday season.
  
  3️⃣A losing battle:Oprah Winfrey’s body has been a topic of public conversation for much of her career. People scrutinized her when she was at her biggest and smallest. Experts explain the intricacies of diet culture — andwhy we care so much.
  
  4️⃣Growth spurt:Scientists think they know why one of Earth’s tallest mountains suddenly got even taller. It can all be traced back towhat happened thousands of years agoin the Himalayas.
  
  5️⃣‘Who are you?’How well do we really know our parents? A photographer discovered images of several mysterious women while sorting through her late father’s belongings, and she turned it into a book thatconfronts a delicate subject.
  
  ⛴️‘Flying’ ferry:A Swedish company’s all-electric, hydrofoiling vehicles could make people’s commutes faster and more comfortable while alsohelping the planet.
  
