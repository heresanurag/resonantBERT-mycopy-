title: "McDonald’s restaurants finally have a solution to their busted McFlurry machine problem"
date: "2024-10-28"
section: "Food"
url: "https://www.cnn.com/2024/10/28/food/mcdonalds-broken-mcflurry-solution/index.html"
content: |
  A brokenMcDonald’s McFlurrymachine, arguably one of life’s greatest nuisances, has finally been solved thanks to a court ruling.
  
  McDonald’s franchises haven’t been able to fix the soft serve ice cream machines on their own because manufacturing company Taylor owns the copyright and exclusive rights to fix the machines — until now.
  
  TheUnited States Copyright Officegranted a copyright exemption last week that gives restaurants the“right to repair”the machines by bypassing the digital locks thatprevented them from being fixed. The inability to make timely fixes has been a bane of the customers’ existence, so much so, that there’s athird-party websitecalled McBroken.com that tracks their availability.
  
  The exemption, which goes into effect Monday, was requested by advocacy group Public Knowledge and repairs website iFixIt to allow third parties to circumvent digital locks on the machines for repairs. Although the full request wasn’t granted, commercial restaurant equipment received a narrow exemption.
  
  Public Knowledge and iFixIt teamed together on the issue after the latter group broke apart an ice cream machine andfound“lots of easily replaceable parts.”
  
  The decision will lead to an “overdue shake-up of the commercial food prep industry,” according to Meredith Rose, senior policy counsel at Public Knowledge.
  
  “There’s nothing vanilla about this victory; an exemption for retail-level commercial food preparation equipment will spark a flurry of third-party repair activity and enable businesses to better serve their customers,” Rose said in astatement.
  
  McDonald’s and Taylor didn’t immediately respond to CNN’s request for comment.
  
  Broken ice cream machines have been such a blemish on McDonald’s reputation that evencompetitors mock themfor it. And perhaps a fix can’t come quick enough: Nearly 15% of ice cream machines are broken as of Monday, according toMcBroken.
