title: "Catch up on the day’s stories: Cheap gym memberships, Chevy’s last sedan, psychedelic therapy"
date: "2024-05-09"
section: "US"
url: "https://www.cnn.com/2024/05/09/us/5-things-pm-may-9-trnd/index.html"
content: |
  👋Welcome to 5 Things PM!Americans have a gloomy outlook on the current state of the housing market. Only 21% think it’s a good time to buy a house, a new survey shows. Potential buyers aredealing with the double whammyof surging home prices and stubbornly high mortgage rates.
  
  Here’s what else you might have missed during your busy day:
  
  1️⃣Gym prices:The $10-a-month membership, a staple of the Planet Fitness brand for more than two decades,is going away. The rock-bottom price lures people who want to get in shape, analysts say, but isn’t expensive enough that they will cancel if they don’t go often. Starting this summer, new members will pay $15 a month for the basic plan.
  
  2️⃣Chevy’s last sedan:The Malibuwill be phased outin a few months so the factory can shift gears and make electric vehicles instead. With this change, Chevrolet will sell only trucks, SUVs and the two-seat Corvette sports car in the United States.
  
  3️⃣Adults with autism:People who are diagnosed later in life say they often experience a catharsis after years of struggles. Most of the support services that exist are for autistic children though, so adults often can’t get the help they need. Groups such as Autism Speaks are helpingto bridge those gaps.
  
  4️⃣Complicated crime:The FBI used a can of spray paint, stolen license plates and odd text messagesto build its caseagainst a Florida man accused of abducting his wife in Spain. Ana Maria Knezevich Henao was last seen in early February. She and her husband were separated and planned to get a divorce.
  
  5️⃣Brain chips:The first person to receive an implant from Elon Musk’s startup companyexperienced a problemjust a few weeks after the chip was inserted. Neuralink said some of the chip’s connective threads became detached, but it figured out a workaround. The ultimate goal is to link human brains to computers.
  
  👀Retro ride:An Alaska woman turns plenty of heads tooling around townin a big red wagonthat goes 60 mph. Now it’s up for sale at auction. Giant handle included.
  
  📸Window to the world:A newinteractive art installationlets viewers in New York City communicate with people more than 3,000 miles away in Dublin, Ireland.
  
  🎧Psychedelic therapy:CNN’s Audie Cornishtalks with an expertabout whether these drugs can ease emotional trauma and why there’s reason for both hope and skepticism.
  
  🛏️Talking in your sleep:It’s relatively common and typically harmless, but experts say it can be connected to PTSD, depression and anxiety.Here’s what they recommend.
  
  😎We like to wrap things up on a positive note:﻿Europe’s largest saltwater lagoon, Mar Menor in Spain, was on the verge of environmental collapse. Teresa Vicente, a professor at a nearby university, worked tirelessly to have the lagoon grantedthe same legal rights as a person. She received a prestigious prize for her efforts and is hopeful for Mar Menor’s recovery.
  
