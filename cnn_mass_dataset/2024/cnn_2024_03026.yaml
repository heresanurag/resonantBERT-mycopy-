title: "Apple Store workers in Maryland vote to authorize strike"
date: "2024-05-12"
section: "Tech"
url: "https://www.cnn.com/2024/05/12/tech/apple-maryland-workers-strike/index.html"
content: |
  Apple Store workers in Towson, Maryland, thefirst of the tech giant’s retail employeesto unionize, made history again by voting late Saturday in favor of authorizing a strike.
  
  The International Association of Machinists and Aerospace Workers Coalition of Organized Retail Employees (IAM CORE), the union representing the workers, said in anews releasethe vote “underscores the frustrations among workers regarding unresolved workplace issues.”
  
  Employees at the store in Towson, a suburb of Baltimore, have been in contract negotiations with Apple management since last year over a number of issues, including the store’s “unpredictable” scheduling practices and wages that don’t “align with the area’s cost of living.”
  
  Apple faces growing labor unrest at its retail stores
  
  “This vote today is the first step in demonstrating our solidarity and sends a clear message to Apple,” said members of the union’s negotiating committee on Saturday. “The passage of the strike sanction vote highlights IAM CORE’s unwavering commitment to advocating for the rights and well-being of workers in the face of challenges.”
  
  In response, Apple said in a statement to CNN that it will “engage with the union representing our team in Towson respectfully and in good faith.”
  
  “At Apple we work hard to provide an excellent experience for our retail team members and empower them to deliver exceptional service for our customers,” an Apple spokeswoman said. “We deeply value our team members and we’re proud to provide them with industry leading compensation and exceptional benefits.”
  
  The union at the Towson store has not disclosed what date members would strike.
  
  Meanwhile, another vote for a store to unionize failed this weekend.
  
  Apple employees at the Mall at Short Hills store in New Jersey voted against unionizing on Saturday,according to Bloomberg. The union, known as the Communications Workers of America, alleged Apple engaged in illegal union-busting activity and blamed the defeat on the Apple’s tactics.
  
  “Instead of leaving the decision up to the workers themselves, the company turned to its usual anti-union playbook to influence the results of the election,” CWA said in a statement obtained by Bloomberg.
  
  Labor unresthas embroiled Apple and its retail stores, compounding the number of issues facing the iPhone maker includingregulatory scrutiny in Washington,sluggish sales in Chinaand aniPad ad that massively backfired.
  
  The National Labor Relations Board last week upheld a decisionalleging union-busting tactics by Apple in New York City.
  
  The labor wave hitting Apple retail stores echoes the mass organizing that began at other influential companies in the United States, such as Starbucks and Amazon. As Apple grew to becomethe world’s first $3 trillion company, a tight labor market from the Covid-19 pandemic exposed labor conditions and inequalities facing workers in stores and warehouses.
  
  “It speaks to a growing frustration among workers and also a contagion in labor activity, which is when one group of workers stands up and inspires others,” Kate Bronfenbrenner, the director of Labor Education Research at Cornell’s School of Industrial and Labor Relations, previously told CNN.
  
  This story has been updated with additional reporting.
