title: "5 things to know for June 17: Extreme heat, Gaza, Marijuana pardons, Gun violence, Airline scare"
date: "2024-06-17"
section: "US"
url: "https://www.cnn.com/2024/06/17/us/5-things-to-know-for-june-17-extreme-heat-gaza-marijuana-pardons-gun-violence-airline-scare/index.html"
content: |
  The countdown to the first 2024 presidential debate has begun. President Joe Biden and his predecessor, former President Donald Trump, willface off next week on CNNin the most critical debate clash in years.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  Nearly 200 high-temperature records could be tied or broken this week as an expansiveheat wave grips the Midwest and Northeast. The heat arrived in the South and Midwest as many families celebrated Father’s Day outdoors on Sunday, prompting alerts to stay cool amid 90-degree temperatures in some areas. The most extreme heat risk is now in place from the Great Lakes into the Northeast, according to the National Weather Service. This includes the major metropolitan areas of Chicago, St. Louis, Detroit, Cleveland, Pittsburgh, New York City and Boston. Meanwhile, windy conditions in Southern California are potentially fueling the flames of thePost Fire in Los Angeles County. The blaze has charred nearly 15,000 acres and was only 2% contained as of midday Sunday.
  
  The Israeli military has announced a “tactical pause” of military activity along a route in southern Gaza to allow aid to be distributed but stressed itwould not halt its offensive in Rafah. Aid has been delivered to the embattled enclave by land, sea and air since the war began, but few entry points remain operational. This has triggered a spiraling humanitarian crisis, with many human rights groups repeatedly sounding the alarm over“unspeakable” living conditions for Palestinians. Meanwhile, Israeli Prime Minister Benjamin Netanyahu hasdisbanded the country’s war cabinet, an official told CNN. The decision comes after opposition leader Benny Gantz resigned last week, citing Netanyahu’s failure to devise a strategy for the war and the future governance of Gaza.
  
  Maryland’s Democratic governor is expected to pardon more than 175,000 marijuana convictions today, according to a report from The Washington Post. The pardons “will automatically forgiveevery misdemeanor marijuana possession chargethe Maryland judiciary could locate in the state’s electronic court records system,” the Post said. This comes as cannabis, and specifically how it is viewed by the public and politicians, has undergone asea-change during the past decade. In November 2023, a record 70% of Americans surveyed by Gallup said they supported cannabis legalization. In 2014, the share was 51%.
  
  The US saw another weekend of gun violence in several communities, extending the list of around 220 mass shootings in the country so far this year. Two people were killed and 14 others were injured following ashooting at a Juneteenth celebrationin Round Rock, Texas, on Saturday, police said. Round Rock is located about 20 miles north of Austin. Authorities said Sunday evening they were actively searching for a suspect. In Michigan, at least nine people — including two children — were wounded after an apparent“random” shooting at a crowded splash padin Rochester Hills. The 42-year-old shooter has been identified but his motive remains unclear.
  
  A federal investigation is underway after aSouthwest Airlines flight plunged toward the oceanoff the coast of Hawaii. The incident occurred on April 11 but only came to light publicly on Friday after Bloomberg reported Southwest sent a memo to pilots about the incident. Bloomberg reported the memo indicated a “newer” first officer was flying at the time and inadvertentlypushed forward on the control column. The Boeing 737 Max 8 flew as low as 400 feet before rapidly climbing, flight tracking data shows. In a brief statement to CNN, Southwest acknowledged the incident but did not address the memo or why the incident took place.
  
  A jolt for the summer box office﻿Movie theaters may be facing a bleak future, but an animated film could give the industry a much-needed boost. This movie just notched themost lucrative box office openingsince “Barbie,” which grossed $162 million.
  
  Tony Awards 2024: See the full list of winnersThe Tony Awards, which honor the best of Broadway, were presented on Sunday in New York City.See the full list of winners.
  
  ‘House of the Dragon’ Season 2 premiere recapAt last, the wait is over. The second season of “House of the Dragon” returned Sunday to HBO (which is owned by CNN’s parent company, Warner Bros. Discovery).Let’s talk about it.
  
  Highlights from the US OpenBryson DeChambeauwon his second US Open titleon Sunday, edging Rory McIlroy in a nerve-shredding finale at Pinehurst No. 2 in North Carolina.
  
  Why your child may be feeling anxious before bedtimeOne in four parents say they have trouble getting their anxious child to sleep, while one in five resort togiving their kids melatonin, according to a new poll.
  
  1,000That’s nearly how many people wereinfected by a highly fatal bacteriain Japan, official figures show, with experts so far unable to pinpoint the reason for the rise.
  
  “The Supreme Court has never been as out of kilter as it is today.”
  
  — President Joe Biden, criticizing the Supreme Court at astar-studded fundraiser in Los Angeleson Saturday as he teamed up with former President Barack Obama to warn of a second Donald Trump term.
  
