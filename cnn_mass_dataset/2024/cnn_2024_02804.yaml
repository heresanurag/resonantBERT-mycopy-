title: "Melissa McCarthy is thrilled Barbra Streisand knows she exists"
date: "2024-05-01"
section: "Entertainment"
url: "https://www.cnn.com/2024/05/01/entertainment/melissa-mccarthy-responds-barbra-streisand?cid=external-feeds_iluminar_cnn-brasil"
content: |
  Melissa McCarthy remains a proud fan of Barbra Streisand.
  
  The Oscar-nominated actress was completely unbothered by acommentStreisand left on her Instagram in which the legendary singer asked McCarthy if she was onOzempic. In fact, she took it as a compliment.
  
  McCarthy shared her response onInstagramlate Tuesday, holding a magazine with a vintage picture of Streisand on the cover. She captioned the post, “@barbrastreisand fan club members only!!!”
  
  “The takeaway is Barbra Streisand knows I exist. She reached out to me and she thought I look good!” McCarthy said in a short video.
  
  “I win the day,” she added.
  
  McCarthy’s post came after Streisand wrote and then deleted her question to McCarthy about the weight-loss medication.
  
  Barbra Streisand ‘forgot the world is reading’ when she asked Melissa McCarthy if she took Ozempic on Instagram
  
  Streisand addressed her comment, saying she initially opened her Instagram to look at photos of the “beautiful flowers” she’d received for her birthday last week.
  
  “Below them was a photo of my friend Melissa McCarthy who I sang with on my Encore album,” she wrote. “She looked fantastic! I just wanted to pay her a compliment. I forgot the world is reading!”
  
  Their mutual admiration remains.
