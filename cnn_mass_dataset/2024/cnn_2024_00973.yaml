title: "Ruth Chepngetich smashes women’s marathon world record in Chicago"
date: "2024-10-13"
section: "Sport"
url: "https://www.cnn.com/2024/10/13/sport/ruth-chepngetich-womens-marathon-world-record-chicago-spt-intl?cid=external-feeds_iluminar_yahoo"
content: |
  Kenya’s Ruth Chepngetich obliterated the women’s marathonworld recordin Chicago on Sunday as she completed the course in 2:09:56, becoming the first ever woman to break the 2:10 barrier.
  
  Chepngetich shaved almost two minutes off the previous world record of 2:11:53, which was set by Ethiopia’s Tigist Assefa in September 2023, and secured her third ever race win in Chicago.
  
