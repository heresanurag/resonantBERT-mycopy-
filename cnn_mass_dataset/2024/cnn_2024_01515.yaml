title: "Brazil soccer star Marta to play in sixth Olympics at Paris Games"
date: "2024-07-03"
section: "Sport"
url: "https://www.cnn.com/2024/07/03/sport/marta-brazil-soccer-olympics-paris-spt-intl?cid=external-feeds_iluminar_cnn-brasil"
content: |
  Brazilian soccer starMarta, considered one of the greatest players in the history of the women’s game, is set to feature in her sixth Olympics after being selected to represent her nation at this year’s Games in Paris.
  
  In April, Marta told CNN Brasil that she plans toretirefrom international soccer at the end of the year but will have one more chance to claim an Olympic gold medal for her country.
  
  The 38-year-old has won two silver medals in 2004 and 2008, losing the final to theUS women’s teamon both occasions.
  
  Simone Biles qualifies for a third Olympics after dominating US Olympic Gymnastics Trials
  
  Marta currently plays club soccer in the US for the Orlando Pride, which is battling the KC Current at the top of the NWSL this season.
  
  “She brings a lot to the table, she’s the greatest athlete of all time,” Brazil’s coach Arthur Elias said, per Reuters. “She’s playing well, she deserved to be on this list.
  
  “Marta’s performance, especially after she came back to play for her club, which is fighting for the top spot in the US, her behavior, with or without the ball, makes all the athletes see her as an example.
  
  “I have the challenge of finding a way of playing to maximize her game. But she knows that you can only win with everyone.”
  
  Marta is Brazil’s all-time record goalscorer, male or female, and has appeared in six World Cups.
  
  In Tokyo 2020, she made history by becoming the first player to score in five straight Olympics. She will have the chance to extend that record in Paris.
  
  Brazil will face Nigeria in its opening match of theParis Gameson July 25 in Bordeaux, before playing Japan and Spain in its remaining Group C matches.
