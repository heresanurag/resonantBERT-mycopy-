title: "What you should have in stock when preparing for a winter storm"
date: "2024-01-04"
section: "US"
url: "https://www.cnn.com/2024/01/04/us/prepare-winter-storm-groceries-xpn-wellness"
content: |
  Powerful storms like the oneexpected this weekendcan be dangerous, in some instances potentially cutting off heat, power and communication services for days — and sometimes even longer.
  
  To make sure you’re best prepared, start with some basics: Learn how to keep your pipes from freezing by opening cabinets under sinks to let heat in or letting faucets drip, test smoke alarms and carbon monoxide detectors, have extra batteries for radios and flashlights, charge electronics, and consider specific needs of everyone at home, like medication.
  
  You should have at least three days’ worth of food and water for everyone in your household, according to Joann Sands, a clinical associate professor in the School of Nursing at New York’s University atBuffalo.
  
  Choose groceries with a long shelf life, which do not require cooking and are not too salty, because those foods mean you will likely drink more water, the US Federal Emergency Management Agency and the American Red Crossrecommend.
  
  Many stores may be low or even out of essentials right now, but this is a great time to start preparing for the next storm. Here’s what to stock up on:
  
  Choose foods like energy bars and protein and fruit bars not requiring refrigeration or freezing, said Sands, who trains students in disaster and emergency preparedness.
  
  Dry cereal, granola, peanut butter, dried fruit and non-perishable pasteurized milk are also good to have as you hunker down.
  
  Though not essential, experts recommend you have comfort and stress foods on hand as you weather a storm.
  
  Remember the power may go out in harsh weather conditions, so it’s good to have ready-to-eat canned meats, fruits, vegetables and canned juices as well as a manual can opener, according toReady.gov.
  
  Canned dietetic foods, juices and soups may be especially helpful for elderly or ill people, according to FEMA.
  
  If a can is swollen, dented or corroded, do not eat from it.
  
  Store at least three days’ worth of water supply for each person in your household and for each pet, the CDC recommends. FEMA recommends storing at least 1 gallon of water for each person in your household for each day.
  
  Unopened, commercially bottled water is the safest and most reliable water supply, the agency says. If it’s store-bought water, make sure you check the expiration date.
  
  Make sure you also have plastic bags on hand, as you can wrap perishable foods – such as cookies – in there, and place them in sealed containers, according to FEMA.
  
  If you’re out of electricity and water, having paper plates and utensils can help you prepare and eat your meals safely, the US Centers for Disease Control and Prevention says.
  
  When preparing, don’t forget about babies and pets in the house.
  
  Make sure you have a sufficient supply of baby formula, as well as anything else an infant may need, including diapers, Sands said.
  
  Be sure to also have several days’ worth of supplies for pets, such as medications and non-perishable foods, and maybe some treats, as storms can be stressful for them as well.
  
