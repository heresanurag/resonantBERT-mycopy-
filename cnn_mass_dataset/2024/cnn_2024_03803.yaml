  Check to ensure you have the hygiene products you need – including feminine supplies, toilet paper, wet wipes, paper towels and hand sanitizer.
  
  It’s always good to have a disaster kit at the ready, in a portable container near your home’s exit.
  
  It should include non-perishable foods and a three-day supply of water, a battery-powered radio and flashlight, extra batteries, a first-aid kit with a manual, sanitation items, matches in a waterproof container, a whistle to signal for help if needed, clothing, blankets and sleeping bags, identification cards, credit cards and cash, paper and pencil, items to cover baby and pet needs, and any special items like medications, contact lenses, glasses, hearing aids, and activities for younger children.
  
  You should also pack face masks, to keep you safe fromseasonal viruses.
  
  It is important to avoid panic buying and filling your fridge, Sands said.
  
  “How are you going to be able to store this food if you don’t have power?” Sands said, adding stocking up on extra groceries can not only lead to wasted food but could hurt others who may not be able to find what they’re looking for.
  
  If your power goes out, keep refrigerator and freezer doors closed as much as you can, to avoid letting the cool air out. If unopened, your fridge will be able to keep food cold for about four hours, according toReady.gov.
  
  Throw out any perishable food – meat, poultry, eggs or leftovers – left in temperatures over 40 degrees Fahrenheit for more than two hours.
  
  While in a winter storm, avoid traveling. Make sure if you do have to go out, you have a full tank of gas, Sands said.
  
  And try to have some key items in your car should you get stranded, including a charged phone and a charged phone battery pack, blankets, food and extra clothing, Sands said. Make sure to also keep the exhaust pipe clear to avoid carbon monoxide dangers, she added.
  
  If you become stranded, stay in your vehicle.
  
  You need these things in your car in case of severe winter storms
  
  • Have important documents readily available in case of an evacuation, including home or renter’s insurance, Social Security cards, birth certificates and passports, Sands said.
  
  • Create a family communications plan on how you’ll be able to get in touch if you are separated during the storm.
  
  • Do not bring portable generators, camp stoves and grills inside your home. Keep them at least 20 feet away from your windows, doors and vents toprevent carbon monoxide poisoning.
  
