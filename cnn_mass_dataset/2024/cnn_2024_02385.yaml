  The aquarium reported four confirmed white whale sightings so far this season as of Saturday, according to Chisholm.
  
  The New England Aquarium urged people to be aware of sharks swimming in shallow waters, avoiding spots where schools of fish or seals are visible, and remaining close to the shoreline so emergency responders can help if necessary, according to the release.
  
  People who spot sharks can report sightings through the Atlantic White Shark Conservancy’sSharktivity app, according to the conservancy and the aquarium.
  
  A 2023 study found a superpopulation size ofaround 800 white sharksin the Cape Cod area between 2015 and 2018.
  
  While the totalnumber of unprovoked shark bitesreported globally remains “extremely low,” according to the Florida Museum of Natural History’s International Shark Attack File, unprovoked shark bite deaths rose over the past year with most of the deaths caused by white shark bites.
  
  Three of those deaths occurred in Australia and one person was killed in California, according to the Florida Museum of Natural History.
