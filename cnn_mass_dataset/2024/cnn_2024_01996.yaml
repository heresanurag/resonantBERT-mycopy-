id: cnn_2024_01996
title: "Russian investigators receive more than 100 missing person reports after Moscow concert hall attack"
date: "2024-03-27"
section: "Europe"
url: "https://www.cnn.com/2024/03/27/europe/missing-people-russia-moscow-concert-hall-attack-intl/index.html"
content: |
  The final death toll from theMoscow concert hall attacklast week could be higher than the 143 confirmed dead, as Russian investigators said they have received more than 100 reports of missing people.
  
  Russia’s Investigative Committee on Wednesday published a list of names identifying the 143 people confirmed dead so far.
  
  Investigators had said earlier that they had also received 143 reports of missing people since Friday. It is not clear how many of the people reported missing are accounted for in the confirmed death toll. CNN has asked the Investigative Committee for clarification.
  
  Russiawas rocked last week by the deadliest terror attack on its soil in two decades, when gunmen stormed Crocus City Hall on the outskirts of Moscow, shooting civilians at point blank with assault weapons before setting the building on fire, causing the roof to collapse while concert-goers were still inside.
  
  Thousands of people had traveled to the venue to watch the Soviet-era rock group Picnic. Russian social media channels have since been filled with appeals from friends and relatives to help find the victims still missing.
  
  “Friends are looking for relatives, but still cannot find them. They are looking for their mother and brother. Please help!” read one message on the “Crocus Help Center” Telegram channel.
  
  Russia’s political class is taking a dark and vengeful turn
  
  Many of the victims are thought to have been killed by inhaling smoke from the fire. While the roof was still burning,ISIS claimed responsibilityfor the attack and shared a video by the men as they stormed the building, where thousands of Russians had arrived to watch the rock group.
  
  Despite ISIS sharing video evidence, Russian President Vladimir Putin has baselessly claimed that Ukraine was in some way responsible for the attack.
  
  In his first national address after the attack – 19 hours after it began – Putin on Saturday claimed, without evidence, that a “window” had been prepared for the attackers to escape to Ukraine. Senior Kremlin figures, including the head of Russia’s security services, the FSB, have doubled down on the accusation.
  
  Ukraine has vehemently denied the “absurd” claims. President Volodymyr Zelensky accused “miserable Putin” of waiting a whole day to address the public only to “try to turn such a situation to his personal advantage again.”
  
  Belarusian President Alexander Lukashenko, one of Putin’s most loyal allies,contradicted Putin’s claimthat the attackers had bolted for Ukraine. He said the gunmen tried initially to flee to Belarus, and only headed for Ukraine after realizing that Belarus had tightened its security – which Lukashenko said was done at the Kremlin’s request.
  
  Lukashenko undermines Putin’s Ukraine claim on Moscow concert hall attack
  
  In trying to promote Belarus’ standing as a reliable partner of Russia, Lukashenko may have inadvertently weakened Putin’s allegations.
  
  Russia has so far arrested 11 men in connection with the attack. Four of thesuspects– all citizens of the former Soviet republic of Tajikistan – appeared battered and bruised in a Moscow court on Sunday, with one in a wheelchair appearing unresponsive. They were charged with terrorism and face a maximum sentence of life in prison.
  
  Videos shared widely on Russian social media appeared to show some of the men beingviolently interrogated. One video appeared to show the use of electrocution. Another showed a suspect having his ear cut off and stuffed in his mouth.
