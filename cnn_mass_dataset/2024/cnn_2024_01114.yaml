title: "Mystery of common mushroom growing from an amphibian shows how little we know about fungi"
date: "2024-03-02"
section: "World"
url: "https://www.cnn.com/2024/03/02/world/frog-mushroom-science-newsletter-wt-scn?cid=external-feeds_iluminar_post-news"
