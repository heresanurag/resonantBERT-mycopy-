  Federal audits of emergency preparedness at nursing homes inCaliforniaandColoradofound facilities lacking. In Colorado, eight of 20 nursing homes had deficiencies related to emergency supplies and power, according to the report. These included three nursing homes without plans for alternate energy sources like generators and four nursing homes without documentation showing generators had been properly tested, maintained, and inspected.
  
  For Debra Saliba, director of UCLA’s Anna and Harry Borun Center for Gerontological Research, making sure nursing homes are part of emergency response plans could help them respond effectively to any kind of power outage. Herstudy of nursing homesafter a magnitude 6.7 earthquake that shook the Los Angeles area in 1994 motivated LA County to integrate nursing homes into community disaster plans and drills.
  
  Too often, nursing homes are forgotten during emergencies because they are not seen by government agencies or utilities as health care facilities, like hospitals or dialysis centers, Saliba added.
  
  Albertson said she is working with hospitals and community emergency response coalitions in Colorado on disaster preparedness plans that include nursing homes. But understanding Xcel Energy’s prioritization plan for power restoration would also help her prepare, she said.
  
