title: "Nvidia names Huawei a top competitor in major areas including AI chips"
date: "2024-02-23"
section: "Business"
url: "https://www.cnn.com/2024/02/23/business/china-nvidia-huawei-competitor-ai-chips-intl-hnk/index.html"
content: |
  EDITOR’S NOTE:Sign up for CNN’s Meanwhile in China newsletter, which explores what you need to know about the country’s rise and how it impacts the world.
  
  Nvidiahas named Huawei a top competitor in a number of areas, including in thecrucial production of processorsthat power artificial intelligence (AI) systems.
  
  The Santa Clara-based company said Wednesday in itsannual reportthat Huawei was a competitor in four out of five major categories of its business, including supplying software and hardware for graphic processing units (GPUs), which are widely used in generative AI.
  
  Other companies also listed as its rivalsin some areas include AMD (AMD), Amazon (AMZN), Microsoft (MSFT) and Broadcom (AVGO).
  
  The naming of Huawei came just two months after Jensen Huang, chief executive officer of Nvidia (NVDA), told reporters in Singapore that the Chinese tech giant was a “formidable” competitor in producing AI chips, according toa Reuters report.
  
  The Shenzhen-based firm, which makes smartphones and telecoms equipment,surprised the worldlast year by launching the Mate 60 Pro, a cutting-edge phone powered by advanced chips.
  
  Questions swirled over how Huawei was able to manufacture the phone when it had spent the four years under US restrictions banning its access to 5G technology.
  
  The breakthrough represented a “milestone” achievement for China,according to analysts,as Beijing and Washington arelocked in a battle over semiconductor technology.
  
  In October 2022, the Biden administration imposed sweeping curbsdesigned to curtail China’s access to advanced computing chips. In early 2023, Japan and the Netherlandsjoined the USin curbing the export of chipmaking technology to China.
  
  Beijing has hit back. In April, 2023, it launcheda cybersecurity probeinto Micron before banning the company from selling to Chinese companies working on key infrastructure projects. In July, itimposed export controlson two strategic raw materials, gallium and germanium, that are critical to the global chipmaking industry.
  
  In October 2023, the Biden administrationtightened restrictionson sales of advanced semiconductors by American firms.
  
  Nvidia has flagged concerns about getting caught up further in the geopolitical tensions between the United States and China.
  
  Its competitive position has been harmed and could be further impacted in the long term, if there are further changes in US export controls on chips, it said in the annual report.
  
  “In the event of such change [in US export control rules], we may be unable to sell our inventory of such products and may be unable to develop replacement products not subject to the licensing requirements, effectively excluding us from all or part of the China market, as well as other impacted markets, including the Middle East,” it said.
  
  Nvidiareported strong earningson Wednesday. Its profits for the three months ended January 28 were up 769% from a year ago. But its China business took a hit from US restrictions on chip sales to the country.
  
  “Growth was strong across all regions except for China, where our data center revenue declined significantly following the US government export control regulations imposed in October [2022],” Colette Kress, Nvidia’s chief financial officer, said in an earnings call.
  
  Data centers, which includes the graphics cards, are Nvidia’s biggest source of revenue. Sales from its core data center business grew 409% year-over-year to a record $18.4 billion in the fourth quarter.
  
  She said China represented “a mid-single-digit percentage” of the company’s data center revenue in the fourth quarter, and is expected to stay in “a similar range” in the current quarter.
  
  Nvidia declined to comment on the news.
