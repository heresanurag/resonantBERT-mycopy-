title: "Trump names billionaire Scott Bessent as Treasury secretary pick"
date: "2024-11-22"
section: "Politics"
url: "https://www.cnn.com/2024/11/22/politics/scott-bessent-treasury-secretary-trump?Date=20241122&Profile=CNNPolitics"
content: |
  President-electDonald Trumpnamed billionaire Scott Bessent as his pick to serve as the next secretary of the Department of the Treasury.
  
  “Scott has long been a strong advocate of the America First Agenda. On the eve of our Great Country’s 250th Anniversary, he will help me usher in a new Golden Age for the United States, as we fortify our position as the World’s leading Economy, Center of Innovation and Entrepreneurialism, Destination for Capital, while always, and without question, maintaining the U.S. Dollar as the Reserve Currency of the World,” Trump said in a statement announcing the pick Friday, confirming CNN’s earlier reporting.
  
  “Unlike in past Administrations, we will ensure that no Americans will be left behind in the next and Greatest Economic Boom, and Scott will lead that effort for me, and the Great People of the United States of America.”
  
  Bessent, 62, advised Trump on economic policy on the campaign trail and is the founder of hedge fund Key Square Capital Management. Before that, he was the chief investment officer at Soros Fund Management, a hedge fund started by Democratic megadonor George Soros. He gained prominence at the firm for leading efforts to bet against the British pound and Japanese yen that netted the firm billions of dollars in profits.
  
  3 urgent tasks awaiting Trump’s pick for Treasury secretary
  
  A key Cabinet player, the US Treasury secretary advises the president on economic and fiscal matters, including spending and taxes. The role is seen as the top financial job in any administration and has become a trophy position for many well-heeled Wall Street donors.
  
  If confirmed by the Senate, Bessent’s early days on the job could be even more challenging than usual as he’ll have to face pressure to address the federal debt limit, the expiring provisions of Republicans’ 2017 tax cut package, and Trump campaign promises.
  
  Bessent would be the first out gay Treasury secretary, as well as the first LGBTQ Senate-confirmed Cabinet member in a Republican administration, according toThe Associated Press. In 2021, Biden administration Transportation Secretary Pete Buttigieg became the first out gay Cabinet member confirmed by the Senate.
  
  Since Trump’s electoral victory, the US dollar has jumped, reaching a one-year high. The rally “is a vote of confidence in US leadership internationally and in the dollar as the world’s reserve currency,” Bessent said in aNovember 10 opinion piecehe penned for The Wall Street Journal. Similar rallies in financial markets, he said, were signs investors “expect the Trump agenda to foster noninflationary growth that will drive private investment.”
  
  He went on to advocate for Trump to pursue policies involving deregulation and tax cuts as well as “addressing the debt burden,” which he attributed to “four years of reckless spending.”
  
  In the piece, however, Bessent made no mention of tariffs. Trump as a candidate pledged to impose 60% tariffs on goods from China, as well as 10% tariffs on goods from other countries.
  
  In recent interviews with the Financial Times and CNBC, Bessent signaled support for a more gradual approach to tariffs aimed at containing potentially inflationary blowback that could arise from imposing such levies.
  
  Trump had expected to announce his pick for Treasury a week ago, but jockeying among his top contenders for the role – Bessent and Howard Lutnick – led him to expand his pool of prospects. Earlier this week, the president-elect picked Lutnick, the CEO of Cantor Fitzgerald and the co-chair of his transition,for the role of Commerce secretary.
  
  As CNNpreviously reported, Trump had been nearing a decision to name Bessent earlier this month, with allies saying Trump liked his billionaire bona fides and the fact that he converted to the MAGA movement after working for Soros. Compared to Lutnick’s more aggressive campaign for the role, Bessent led a more understated quest for the position. But he called Elon Musk last weekend to try to win over the tech billionaire before he attended a United Fighting Championship with Trump. Musk, however, had come out in support of Lutnick on X, calling Bessent “a business-as-usual choice.”
  
  Trump named a flurry of new Cabinet picks and other top administration roles Friday night, as he was eager to announce his latest decisions before the holiday weekend, two sources familiar with the announcements said. He was especially eager to announce his pick for Treasury before the weekend, to ensure it got more news coverage, one of the sources said.
  
  All of the names Trump put out Friday night had been decided by the afternoon, the sources said, but he wanted to name his Treasury secretary first before publicly releasing his other decisions.
  
  The role will be especially important in the coming Trump administration considering the president-elect’s campaign promises toimpose an across-the-board tariffof either 10% or 20% on every import coming into the US, as well as a tariff upward of 60% on all Chinese imports.
  
  The incoming secretary will have to deal quickly with making sure the nation doesn’t default on its obligations once the debt ceiling returns in early January, unless Congress addresses the cap before that. The secretary also will work with Trump and congressional Republicans to extend the more than $4 trillion inTax Cuts and Jobs Act provisionsthat expire at the end of 2025.
  
  All that’s in addition to thesecretary’s regular dutiesoverseeing the Treasury Department, which pays trillions of dollars in bills, collects taxes, sells US debt securities to investors and serves as a regulator of the banking and finance industries. The secretary also serves as the nation’s finance minister on the global stage.
  
  During his first term, Trump choseSteven Mnuchin, a financier and Hollywood producer who stayed in the administration all four years. Mnuchin, who had no government experience before taking the Treasury post, had also served as finance chairman of Trump’s 2016 presidential campaign.
  
  The former secretary worked on and helped implement the 2017 tax cuts law and some of the keyCovid-19 pandemic relief measures, including thestimulus checksthat were distributed to millions of Americans, among other initiatives.
  
  This headline and story have been updated with additional developments.
