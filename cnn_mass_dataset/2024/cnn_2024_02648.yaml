title: "Shohei Ohtani in the World Series sparks major excitement in Japan, attracts viewership rivaling the US"
date: "2024-10-30"
section: "Asia"
url: "https://www.cnn.com/2024/10/30/asia/ohtani-world-series-television-japan-us-hnk/index.html"
content: |
  Tokyo (CNN) —Baseball superstarShohei Ohtanihas turned millions of Japanese residents into fans of the Los Angeles Dodgers, so much so that more than a tenth of the country’s population has been tuning in to the World Series, giving the Fall Classic better TV ratings in Japan than in the United States.
  
  The excitement was evident in a Tokyo bar on Wednesday morning, Japan time, as fans chanted for their homegrown hero.
  
  “Shohei! Shohei! Shohei!” erupted in Fields Shibuya, a sports dining bar, as the All-Star player stepped to the plate against the New York Yankees in Game 4 of the World Series, later turning into deafening cheers when the Dodgers’ designated hitter ripped a single.
  
  “Ohtani’s performance is high level,” said Ryosuke Matsumoto, 22, who was among the crowd in the sports bar. “I’m very happy that a Japanese player is doing so well in the Major Leagues. That’s how I became a fan. I’m proud of him.”
  
  There would be little else for fans of Ohtani and the Dodgers to cheer for in Game 4, as the Yankeesprevailed 11-4, but the excitement is sure to return for Game 5 on Wednesday (Thursday morning in Japan) at Yankee Stadium in the Bronx.
  
  The appearance of Ohtani in this year’s edition of the World Series has captivated Japan and emerged as a television ratings phenomenon.
  
  Earlier this week, the Dodgers’4-2 winover the Yankees in Game 2 drew an average of 15.9 million viewers, marking it as the highest-rated Major League Baseball postseason game in Japan’s history, according to the press release.
  
  “Ohtani is an honorable person in Japan. Everyone shouts Ohtani, Ohtani, and it makes me extremely happy. We never had any Japanese person like that before. It’s our dear Ohtani,” said Mamoru Tanaka, a manager of the bar.
  
  The first two games of the seven-game series between the Dodgers and the Yankees, averaged of 15.15 million viewers in Japan,according to Major League Baseball— at times, more viewers than in the US. Japan’s population isapproximately 124.5 millioncompared to the US, which has a population of about 334 million, as of last year.
  
  The viewership in Japan is even more notable, given that the event aired during daytime hours.
  
  How Shohei Ohtani has brought a new wave of Japanese tourists to LA
  
  “Since it’s on a weekday, people are watching the game between work or school. Young people are looking at the scores on social media. A lot of people can’t watch, and I think most of the people watching the game live are elderly people,” said Matsumoto.
  
  When combined with US viewership, the first two World Series games have averaged 29.7 million viewers across the two countries.
  
  ForGame 3 in New York, the World Series drew an average of 13.6 million viewers in the US, making it the most-watched Monday night World Series game since 2013 – reflecting a heated enthusiasm also in the US, according to Fox Sports.
  
  The excitement around Ohtani extends well past the TV screen.
  
  A leading Japanese travel agencytold CNNthat it was booking up to 200 clients from Japan for each Dodgers home game this season. The Dodgers jumped on the Ohtani phenomenon by adding 12 new Japanese sponsors, providing Japanese-language stadium tours, and introducing a variety of new menu items specifically designed for Japanese fans for the fan experience.
  
