url: "https://www.cnn.com/2024/08/16/us/5-things-to-know-for-aug-16-drug-costs-trump-rallies-middle-east-typhoon-ampil-matthew-perry/index.html"
content: |
  Popular European destinations have been overwhelmed by swarms of tourists, resulting in sold-out hotels, packed museums and overflowing restaurants. In Italy this weekend, access to many beaches willonly be granted by booking through an app, and in some cases, even towels and chairs have been banned from the sand.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  President Joe Biden and Vice President Kamala Harris made a joint appearance in Maryland on Thursday at an event focused on prescription drug costs. The Biden administration announced the results of historic Medicare drug price negotiations that will save an estimated $6 billion whenlower prices take effect for some medicines in 2026. The negotiation program has been a central talking point of the White House’s efforts to lower the cost of living for more Americans —including senior citizens, a key voting bloc. The powerful pharmaceutical industry, which has long fought against allowing Medicare to negotiate prices, has been trying tostop the negotiation process, filing multiple lawsuits in federal courts across the US contending that the program is unconstitutional in various ways.
  
  Bulletproof glass will surround former President Donald Trump at his campaign rallies moving forward as the Secret Service aims toincrease security on the campaign trail. The heightened safety measures are being implemented in the wake of the assassination attempt against Trump at hisrally last month in Butler, Pennsylvania. Additional precautions also include increasing the number of agents and certain technological changes, a senior official told CNN. Ballistic glass is commonly used to protect sitting presidents and is moved into place by the Department of Defense. For Trump, the Secret Service will strategically place the glass across the country where the former president is expected to visit in the lead-up to the November election.
  
  Mediators in talks for a ceasefire agreement between Hamas and Israel are making a last-ditch effort this week torevive stalled negotiationsas the Middle East braces for an Iranian attack on Israel. A high-stakes meeting concluded on Thursday and will resume today, a diplomatic source briefed on the talks told CNN. In the meeting, Qatar, Egypt and the US were expected to present a plan to implement a deal that could bring about a ceasefire in the 10-month-long war in Gaza andfree the remaining hostages. While inconclusive so far, Thursday’s talks marked “a promising start,” National Security Council spokesman John Kirby said.
  
  Hundreds of thousands of people are being advised to evacuate in parts of Japan as Typhoon Ampil approaches the capital. The storm, located 121 nautical miles southeast of Yokosuka, Greater Tokyo, has intensified to theequivalent strength of a Category 4 hurricane, according to the Joint Typhoon Warning Center. More than 400,000 people in total were issued evacuation advisories in the cities of Mobara and Asahi near Tokyo and Iwaki, Fukushima prefecture, which are near the east coast and expected to feel the brunt of the storm later today. Thousands have already lost power while airlines and railways are canceling services during the peak summer travel season.
  
  Five people have been charged in connection with the 2023 death of actor Matthew Perry, according to the US Attorney’s Office. The charges come after investigators say they uncovered an underground network of drug sellers and suppliers they allege areresponsible for distributing the ketamine, a potentially deadly drug, that killed Perry. “Matthew Perry’s journey began with unscrupulous doctors who abused their position of trust because they saw him as a payday, to street dealers who gave him ketamine in unmarked vials,” DEA Administrator Anne Milgram said. Over two months from September to October 2023, Perry was distributed approximately 20 vials of Ketamine that cost him roughly $55,000, a US attorney said. The beloved actor who starred asChandler Bing on “Friends”died in October 2023 at the age of 54.
  
