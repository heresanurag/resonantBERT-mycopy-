title: "The evolution of indie theaters, shrinking homes, cryogenic craters on the moon: Catch up on the day’s stories"
date: "2024-08-05"
section: "US"
url: "https://www.cnn.com/2024/08/05/us/5-things-pm-august-5-trnd/index.html"
content: |
  👋Welcome to 5 Things PM!If you’ve been watching the Olympics, you’ve probably found yourself in awe of how the athletes bend this way and that without even batting an eye. Flexibility is important for everyone, and the experts shared some tips forhow you can improve yours.
  
  Here’s what else you might have missed during your busy day:
  
  1️⃣Screen time:Small independent theaters have often been fixtures in the community for decades, but they’re finding it hard to compete with massive megaplexes and the allure of streaming. Here’s what they are doingto stay afloat.
  
  2️⃣Shrinking homes:Americans are known for embracing the mantra that bigger is better. We want larger cars, giant water bottles and hefty food portions. When it comes to houses though,builders are scaling back, and that could be good news for first-time buyers.
  
  3️⃣Fragile friendships:Women often form closer emotional bonds with one another than men do, but these relationships don’t come without challenges.Understanding the subtle complexitiescan lead to healthier and happier connections.
  
  4️⃣Life preservers:This one falls in the category of what will they think of next? Scientists came up with a plan to safeguard Earth’s species bypreserving them cryogenicallyon the moon. The moon’s craters are in the shadows and therefore cold enough for storage.
  
  5️⃣Fetching scent:Dolce & Gabbana just launched a new perfume inspired by a designer’s “unconditional love” —but it’s not for humans.
  
  🏅Memorable moment:US women’s gymnastics stars Simone Biles and Jordan Chileshonored Rebeca Andradeafter she beat them on floor exercise at the Olympics and took home a gold medal for Brazil.
  
  • Debby unleashesdangerous amounts of rainafter making landfall in Florida• Dow and S&P 500finish their worst daysince 2022•Google loses massive antitrust lawsuitover its search dominance
  
  🎤Fan favorite:Pop star Chappell Roandrew a massive crowdat the Lollapalooza music festival in Chicago. Organizers called it “the biggest daytime set we’ve ever seen.”
  
  🐦Prized perch:New Yorkers probably think a rat or a cockroach is a more fitting symbol of the city, but agiant pigeon sculpturewill stand guard from the High Line trail starting this fall.
  
  💡 The starting price of abespoke LED display wallthat some wealthy people are installing in their garages and super luxe “man caves.”
  
  ⚽Late drama:Spain scored a goal in the 86th minute to beat Morocco in men’s soccer and reach the gold medal match for the second straight Olympics.Follow live updates.
  
  🚢Which European hot spot, nicknamed “Instagram island,” plans to limit the number of cruise ship passengers allowed to visit?A. IbizaB. SantoriniC. CorsicaD. Malta⬇️Scroll down for the answer.
  
  😎We like to wrap things up on a positive note:Team USA discus thrower Veronica Fraley said she’s struggling to make ends meet. Rapper Flavor Flav and tech entrepreneur Alexis Ohanian, who have been cheering on athletes at the Summer Olympics in Paris,stepped in to pay her rent.
  
  👋 We’ll see you tomorrow.🧠Quiz answer:B. The mayor of theGreek island of Santoriniwants to cap the number of cruise ship passengers at 8,000 a day.📧 Check out all ofCNN’s newsletters.
  
