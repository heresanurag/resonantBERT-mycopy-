id: cnn_2024_03522
title: "Have you been targeted by non-consensual deepfake pornography?"
date: "2024-07-25"
section: "Tech"
url: "https://www.cnn.com/2024/07/25/tech/non-consensual-deepfake-pornography-callout?cid=external-feeds_iluminar_yahoo"
content: |
  Rapid advancements in artificial intelligence have made it easier for bad actors to create non-consensual deepfake pornography.
  
  While “revenge porn” – a form of harassment that involves posting explicit images of someone online without their consent – has been an issue for years, new AI tools make it possible to artificially generate nude images that look strikingly real.
  
  Women around the world, fromTaylor SwiftandRep. Alexandria Ocasio-Cortezto high school girls in New Jersey and Texas, have been targeted by non-consensual, AI-generated sexual images in recent months. Social media companies arefacing new pressureto address the spread of non-consensual images. And lawmakers are now scrambling to find a way to crack down on the people who create such images and the online tools that enable them.
  
  Have you or your child been the target of this form of harassment? We want to hear about what it meant for your life and how (and if) law enforcement or school officials responded.
  
  Tell us about your experiences in the form below. Providing commentary anonymously can be discussed.
