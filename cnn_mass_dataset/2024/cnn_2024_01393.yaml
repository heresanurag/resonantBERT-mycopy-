title: "11-year-old’s fossil discovery reveals ancient creature larger than a blue whale"
date: "2024-04-20"
section: "World"
url: "https://www.cnn.com/2024/04/20/world/ichthyosaur-fossil-science-newsletter-wt-scn/index.html"
content: |
  Editor’s Note:A version of this story appeared in CNN’s Wonder Theory science newsletter. To get it in your inbox,sign up for free here.
  
  As Earth Day approaches and the Wonder Theory newsletter celebrates three years of arriving in your inboxes, I look to the future with hope.
  
  We all start somewhere. Encouragement and the pursuit of knowledge help us grow. When Jane Goodall was a little girl, her mothernurtured the celebrated primatologist’s love of the living world.
  
  Now 90, Goodall nurtures that same appreciation through her Roots & Shoots program, which empowers young people to create change within their communities around the globe.
  
  Even as the world shifts in reaction to the climate crisis, Goodall remains hopeful that humanity can save the planet.
  
  “Don’t forget that you as an individual make an impact on the environment every single day,” Goodall told CNN recently. “And it’s up to you to choose what sort of impact you make.”
  
  In May 2020, Ruby Reynolds, then 11, and her father, Justin, were searching for fossils on a Somerset beach along the English coast when she spotted something unusual.
  
  Now reassembled with the help of experts, the fossils Ruby found have revealed the jawbone of a giant ichthyosaur that roamed the seas 202 million years ago. And when it came to sheer size, themarine reptile likely rivaled the blue whale, currently the largest living animal.
  
  “It was so cool to discover part of this gigantic ichthyosaur. I am very proud to have played a part in a scientific discovery like this,” she said.
  
  Meanwhile in India, paleontologists at the Indian Institute of Technology Roorkee unearthed evidence of a different massive reptile: aprehistoric snake that was longer than a school bus.
  
  Archaeologists have pieced together the puzzle of a dramatic dynasty collapse after finding burned remains within an ancient Maya pyramid in Guatemala.
  
  The research team uncovered the scorched bones of four adults, as well asluxurious adornments and weapons, in a room beneath a temple, leading them to believe the people were of royal lineage.
  
  It’s likely that a new type of leader arose during a time of political and societal change for the Maya, and the bones were burned as a sign of intentional desecration, the team said.
  
  Separately, two 5,500-year-old skeletons recovered at an archaeological site in southwest France belonged to women who were likely buried alive in a sacrificial riteusing an Italian Mafia-style form of torture.
  
  For the first time, astronomers have detected a rainbow-like effect called a glory on a planet outside our solar system.
  
  Scientists using the Cheops space telescope noticedan unexpected glowwithin the atmosphereon WASP-76b. An artist’s illustration depicts the phenomenon, which appears as colorful, concentric rings of light and has only ever been observed on Earth and Venus.
  
  The blazing-hot exoplanet, located 637 light-years away, is also intriguing because it has one side that perpetually faces a sunlike star, causing molten iron to rain down from its clouds.
  
  In a different study, scientists found that an ancient, cataclysmic collision with another planet created the telltalebright, white heart seen sparkling on Pluto’s surface.
  
  The unusual wobble of a star led astronomers to what they have dubbed a cosmic “sleeping giant” in the Milky Way.
  
  The Gaia space telescope hasdetected the most massive known stellar black hole, or a black hole formed from the collapse of a giant star, in our galaxy.
  
  Named Gaia BH3, the celestial heavyweight has a mass that is nearly 33 times that of our sun, and it’s only 1,926 light-years away.
  
  When scientists accidentally submerged a specific type of hibernating bumblebee in water, they made a remarkable discovery: Queen common eastern bumblebees cansurvive underwater for up to a week.
  
  It’s possible that the queens, which hibernate through the cold season alone after male and worker bees die, enter a state of suspended growth called diapause, which helps them survive.
  
  Meanwhile, as billions of cicadas are set to emerge this spring after spending more than a decade underground, scientists expect some of the bugs to be manipulated by a zombifying fungus.
  
  The pathogentransforms the cicadas into “saltshakers of death,”as described by Dr. Matt Kasson, an associate professor at West Virginia University.
  
  Take a closer look at these surprising stories:
  
  — Budget cuts threaten the program that could retrieve rare samples from Mars collected by the Perseverance rover. Now,NASA is soliciting creative methodsto return them to Earth.
  
  — Excavations in southern Australia have revealed three new species of giant kangaroo that lived millions of years ago, and one of them was aboutdouble the size of the biggest kangaroos alive today.
  
  — NASA expected garbage it ejected from the International Space Station to burn up in Earth’s atmosphere, but a piece of space junk survived the fiery reentry process andsmashed into a home in Naples, Florida.
  
  — Camels once roamed across what’s now Canada, but they crossed the Bering land bridge 17,000 years ago andcompletely readapted to live in the desert— and humans can learn from their transformation.
  
