  According to the French government’sofficial specifications, traditional French baguettes are made up of only white flour, water, yeast and salt, have five blade strokes and are approximately 60 centimeters (23.6 inches) long and 5 to 6 centimeters (2 to 2.4 inches) wide.
  
  French baguetteswere awarded aspecial protected statusin 2022. The “artisanal know-how and culture of the baguette” was officially recognized on UNESCO’s list of Intangible Cultural Heritage.
  
  The attempt to beat the record for the world’s longest baguette was to give homage to that recognized heritage and culture, according to the Suresnes release.
