title: "More than 40 states have voted on a Super Tuesday since 1980"
date: "2024-03-05"
section: "Politics"
url: "https://www.cnn.com/2024/03/05/politics/states-voting-super-tuesday-dg/index.html"
content: |
  At one point or another, voters in 42 different states have cast ballots in a presidential primary or caucus on a Super Tuesday. Sixteen of those states areholding elections today— the most since 2008, when two dozen states held contests on that year’s Super Tuesday.
  
  Super Tuesday refers to the election day with the most states voting in a presidential primary season — and with the biggest prize on thepresidential primary calendar. But the group of states voting on Super Tuesday fluctuates every election cycle.
  
  While the majority of states have been included at least once, no state has voted on every single Super Tuesday. Massachusetts and Oklahoma have held contests on 10 of the 12 Super Tuesdays, including this year. Eight states have never participated in a Super Tuesday, including New Hampshire and South Carolina, whose primaries have historically been among the first on the presidential year calendar.
  
  In the 1980s, Super Tuesday was favored by Southern states in anattempt to steerthe Democratic presidential nominee toward the political center. On Super Tuesday 1988, 13 of the 20 participating states were in the South, compared with seven of this year’s 16 Super Tuesday states.
  
