title: "Five children among 12 killed as Russia hits Odesa apartment block"
date: "2024-03-02"
section: "Europe"
url: "https://www.cnn.com/2024/03/02/europe/odesa-ukraine-russia-drone-intl/index.html"
content: |
  The death toll from a Russian drone attack on an apartment block in the Ukrainian city of Odesa has risen to 12, with the bodies of five children removed from the rubble, officials said Sunday, the latest civilian victims of a relentless Russian bombing campaign.
  
  “The body of another baby has just been found next to the woman’s body. The child is believed to be less than a year old,” Oleh Kiper, the head of Odesa regional military administration on Sunday, wrote on Telegram.
  
  The bodies of a mother and her four-month-old were also found in the rubble on Saturday, authorities said.
  
  The dead woman’s sister told CNN the mother’s name was Anna, and she was in her bedroom on the second floor of her apartment building when the strike happened. She was a florist and a decorator.
  
  ‘Eventually, one gets used to anything:’ How Ukrainians have learned to live with war
  
  Her husband and daughter survived the drone attack, her sister told CNN.
  
  According to Saturday’s daily address by Ukrainian President Volodymyr Zelensky, a toddler named Mark was also killed - he was two, set to turn three on Sunday.
  
  Five people were rescued alive, Zelensky said Sunday.
  
  The attack left the facade of an apartment block in ruins.
  
  Andriy Kostin, Prosecutor General of Ukraine noted there is no military facility nearby, calling the attack a deliberate targeting of civilians.
  
  Sunday has been declared a day of mourning in Odesa, according to the city’s administration.
  
  Zelensky said the attack showed the need to further strengthen the country’s air defense capacities.
  
  “One of the enemy drones hit a residential building in Odesa. 18 apartments have been destroyed,” Ukrainian President Volodymyr Zelensky said Saturday.
  
  “More air defense systems, more missiles for air defense is what saves lives,” he said.
  
  Ukraine has been asking its western allies for more military aid as Russia’s war against Ukraine enters its third year.
  
  Last week, Zelensky warned CNN“millions” could dieif US lawmakers don’t approve President Joe Biden’s $60 billion aid request for Kyiv, hours after announcing some 31,000 Ukrainian soldiers have been killed so far in the conflict.
  
  Republican leadership in the House has so far beenrefusing to hold a voteon providing more funding.
  
  Meanwhile, the Pentagon is weighing whether to tap into the last remaining source of funding it has for military aid to supportUkraine’s war effort against Russiaeven without guarantees those funds will be replenished by Congress, multiple defense officials told CNN.
  
  In a separate Russian bombing in the town of Kurakhove in the Donetsk region, 16 people were injured, Zelensky said Sunday.
  
  In the past week Russia has used 400 guided aerial bombs, more than 50 Shahed drones, and more than 40 missiles against Ukraine, Zelensky said. Ukraine has shot down seven Russian military aircraft over the past week, and 15 total in the month of February, he said.
  
  “Despite a significant shortage of artillery, our heroic soldiers are holding back the assaults and defending their positions. It is extremely difficult. This is loss. This is pain. We are waiting for vital supplies, including an American decision. And we really need support,” Zelensky said.
  
  This is a developing story and will be updated.
