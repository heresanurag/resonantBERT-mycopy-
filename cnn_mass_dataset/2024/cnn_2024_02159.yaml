  # Europe just slashed tariffs on cars made by Tesla in China
  
  By [![Image 2: Hanna Ziady](https://media.cnn.com/api/v1/images/stellar/prod/230612141828-hanna-ziady.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/hanna-ziady)[Hanna Ziady](https://www.cnn.com/profiles/hanna-ziady)
  
  Updated Aug 21, 2024
  
  Updated Aug 20, 2024, 10:22 PM ET
  
  PUBLISHED Aug 20, 2024, 12:16 PM ET
  
  Tariffs Asia China European Union
  
  [See all topics](https://www.cnn.com/follow)
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2024%2F08%2F20%2Fcars%2Ftesla-europe-ev-tariffs "Share with email")Link Threads
  
  Link Copied!
  
  ![Image 3: SHANGHAI, CHINA - MARCH 30: Aerial view of Tesla electric vehicles to be shipped aboard sitting parked at Nangang Port on March 30, 2023 in Shanghai, China. (Photo by Shen Chunchen/VCG via Getty Images)](https://media.cnn.com/api/v1/images/stellar/prod/230409133341-tesla-shanghai-megafactory-file-restricted.jpg?c=original&q=w_860,c_fill)
  
  Tesla electric vehicles for export parked at Nangang Port in Shanghai, China in March, 2023.
  
  Shen Chunchen/VCG/Getty Images/File
  
  EDITOR’S NOTE:[Sign up for CNN’s Meanwhile in China newsletter which explores what you need to know about the country’s rise and how it impacts the world.](https://www.cnn.com/newsletters/meanwhile-in-china?source=nl-acq_article)
  
  London—
  
  The European Union may have just given Tesla’s future sales in the region a boost by setting tariffs on its China-made vehicles considerably below those imposed on rival electric carmakers.
  
  The high-profile decision comes two months after the EU [hiked tariffs](https://www.cnn.com/2024/06/12/cars/europe-china-ev-tariffs/index.html) on all electric cars imported from [China](https://www.cnn.com/business/china), citing “unfair” state subsidies that unduly benefited the country’s electric vehicle makers at the expense of European manufacturers.
  
  Tesla, which has a factory near Berlin but exports many of the cars it makes in China to Europe, had requested that the EU recalculate its rate, initially set at 20.8%.
  
  Ad Feedback
  
  On Tuesday, the European Commission, the EU’s executive arm, set that rate at 9%.
  
  That applies on top of the existing EU duty of 10% on all EV imports, but it is still well below the additional tariffs of between 17% and 36.3% levied on other Chinese automakers.
  
  The European Commission said the tariff reflected the “level of subsidies” Tesla received in China.
  
  “The Commission verified the information during (a) visit in China and conducted the same checks as of the other sampled Chinese exporting producers,” it added in a statement. CNN has contacted Tesla for comment.
  
  [Related article ![Image 4: BYD electric vehicles awaiting export at the port in Lianyungang in Jiangsu province, China, on April 25, 2024](https://media.cnn.com/api/v1/images/stellar/prod/2024-04-25t000000z-992672810-rc2nd7aquqtf-rtrmadp-3-china-autos-byd.jpg?c=16x9&q=h_720,w_1280,c_fill/w_256) BYD electric vehicles awaiting export at the port in Lianyungang in Jiangsu province, China, on April 25, 2024 China Daily/Reuters Europe’s electric car tariffs sting China but won’t halt BYD’s advance](https://www.cnn.com/2024/06/13/cars/eu-ev-tariffs-china-effects-analysis-intl-hnk)
  
  Gregor Sebastian, a senior analyst at think tank Rhodium Group, said he was “surprised” that Tesla’s additional tariff had been set at “only 9%.” He pointed to local government loans that the company has received in Shanghai, as well as subsidized batteries from Chinese battery maker CATL.
  
  “But it’s tricky to make a strong argument here without seeing all the inputs and methodology the Commission used,” he added.
  
  The additional duty is “still negative” for Tesla, but could give the carmaker “some breathing room” relative to SAIC, currently its major competitor in Europe, he told CNN. “(SAIC) is really going to struggle.”
  
  The Chinese state-owned carmaker, which owns the iconic MG car brand, has been hit with an additional 36.3% tariff, reserved for “non-cooperating companies,” according to the Commission.
  
  Geely, which owns Sweden’s Volvo, has been hit with an additional 19.3% tariff. And cars made by BYD — which is vying with Tesla to be the world’s biggest seller of battery EVs — are subject to an additional duty rate of 17%.
  
  These are slightly lower than the duties proposed in June following a more thorough investigation and input from the automakers, the Commission said.
  
  Some Chinese companies in joint ventures with EU automakers may also benefit from lower duties, set at 21.3%, rather than automatically receiving the higher 36.3% rate.
  
  China’s Commerce Ministry said on Tuesday that it “firmly opposes and is highly concerned” about the bloc’s ruling on EV tariffs, which followed an extensive probe into Chinese EVs. In a statement, the ministry said the investigation findings were “distorted” and vowed to “resolutely defend the legitimate rights and interests of Chinese companies.”
  
  ## Tesla versus BYD
  
  After the initial EU tariffs took effect in July, Tesla hiked the price of its Model 3 in Europe by about 4%, or €1,500 ($1,666), to €42,490 ($42,177), blaming the additional duties.
  
  Still, the Model 3 remains cheaper than the BYD Seal, according to George Whitcombe, an automotive research analyst at consultancy Rho Motion. “Now, with Tesla’s additional tariff being reduced … it will help the Model 3 remain competitive with other Chinese-made EVs in Europe,” he told CNN.
  
  BYD, for its part, has not yet raised prices in Europe despite the hefty additional tariff.
  
  [Related article ![Image 5: ISTANBUL, TURKIYE - JULY 08: (----EDITORIAL USE ONLY - MANDATORY CREDIT - ' TURKISH PRESIDENCY / MUSTAFA KAMACI / HANDOUT' - NO MARKETING NO ADVERTISING CAMPAIGNS - DISTRIBUTED AS A SERVICE TO CLIENTS----) Turkish President Recep Tayyip Erdogan (C), Wang Chuanfu (R), chairman and chief executive officer at BYD Co., and Turkish Minister of Industry and Technology Mehmet Fatih Kacir (L) attend the BYD New Energy Vehicle Investment Signing Ceremony after their meeting at Dolmabahce Palace working office in Istanbul, Turkiye on July 08, 2024. World's largest electric vehicle producer Chinese BYD expected to build 150,000-vehicle capacity production plant, mobility and R&D center with investment worth $1B in Turkiye, according to ministry. (Photo by Turkish Presidency/ Mustafa Kamaci / Handout/Anadolu via Getty Images)](https://media.cnn.com/api/v1/images/stellar/prod/gettyimages-2160563450.jpg?c=16x9&q=h_720,w_1280,c_fill/w_256) ISTANBUL, TURKIYE - JULY 08: (----EDITORIAL USE ONLY - MANDATORY CREDIT - ' TURKISH PRESIDENCY / MUSTAFA KAMACI / HANDOUT' - NO MARKETING NO ADVERTISING CAMPAIGNS - DISTRIBUTED AS A SERVICE TO CLIENTS----) Turkish President Recep Tayyip Erdogan (C), Wang Chuanfu (R), chairman and chief executive officer at BYD Co., and Turkish Minister of Industry and Technology Mehmet Fatih Kacir (L) attend the BYD New Energy Vehicle Investment Signing Ceremony after their meeting at Dolmabahce Palace working office in Istanbul, Turkiye on July 08, 2024. World's largest electric vehicle producer Chinese BYD expected to build 150,000-vehicle capacity production plant, mobility and R&D center with investment worth $1B in Turkiye, according to ministry. (Photo by Turkish Presidency/ Mustafa Kamaci / Handout/Anadolu via Getty Images) Mustafa Kamaci/Turkish Presidency/Anadolu/Getty Images Chinese EV giant BYD to build $1 billion plant in Turkey](https://www.cnn.com/2024/07/09/business/china-ev-byd-turkey-plant-intl-hnk)
  
  “BYD has a much better ability to absorb these additional duties because production costs are much lower compared to their prices in Europe,” said Sebastian of Rhodium Group. He estimates that BYD could absorb an additional EU tariff of up to 45%.
  
  The company could also ramp up exports of plug-in hybrid electric vehicles, which Tesla doesn’t make, as the tariffs apply only to battery EVs. And in future, BYD could escape tariffs altogether by making cars in Turkey for the EU market. Imports from Turkey are not subject to tariffs.
  
  Regardless of higher tariffs, Chinese EV makers are unlikely to give up on Europe, which accounted for more than a third of their exports last year, more than the next five largest markets combined, according to Citi.
  
  Chinese automakers enjoy a “large margin” on their sales in Europe, said Whitcombe.
  
