title: "SpaceX launches mission that aims to return long-delayed Starliner astronauts"
date: "2024-09-28"
section: "Science"
url: "https://www.cnn.com/2024/09/28/science/spacex-launch-starliner-crew-9-astronauts/index.html"
content: |
  Sign up forCNN’s Wonder Theory science newsletter. Explore the universe with news on fascinating discoveries, scientific advancements and more.
  
  A SpaceX mission due to unite the Boeing Starliner astronauts with the spacecraft that will bring them home has taken flight. NASA’s Suni Williams and Butch Wilmore have now been on the International Space Station more than 100 days longer than expected.
  
  The SpaceX mission, called Crew-9, took off at 1:17 p.m. ET Saturday from Cape Canaveral Space Force Station in Florida.
  
  NASA previously delayed the launch attempt from Thursday, rolling the spacecraft back into its hangar asHurricane Helenethreatened Florida and other parts of the southeastern United States. Mission teams reset everything at the launchpad Friday after the danger had passed.
  
  Unlike other routine trips ferrying astronauts to and from the space station under NASA’s Commercial Crew Program — of which SpaceX has already launched eight — the outbound leg of this mission is carrying only two crew members instead of four: NASA astronaut Nick Hague and Roscosmos cosmonaut Aleksandr Gorbunov.
  
  Two other seats are flying empty, reserved for Williams and Wilmore to occupy on the spacecraft’s return flight in 2025. The configuration is part of an ad hoc plan that NASA chose to implement in late August after the space agency deemed the Starliner capsule too risky to return with crew.
  
  Williams and Wilmore rode the Starliner to the International Space Station in early June for what was expected to be about a weeklong test flight.
  
  Boeing Starliner astronaut: ‘We found some things that we just could not get comfortable with’
  
  At liftoff, Hague and Gorbunov were strapped inside the SpaceX Crew Dragon spacecraft, nicknamed Freedom, as it sat atop a Falcon 9 rocket. The launch vehicle roared to life, powering on nine massive engines that sit at its base to thrust the 1.2 million-pound (544,300-kilogram) rocket system into the air.
  
  After about 2 ½ minutes, the first stage of the Falcon 9 rocket quit firing and broke away from the rocket’s second stage. The second stage then ignited its own engine and continued to propel the Crew Dragon capsule to more than 17,000 miles per hour (27,360 kilometers per hour) — or 22 times the speed of sound.
  
  As the crew blazed to faster speeds, the rocket’s first stage guided itself back to land on a ground pad in Florida so that SpaceX can refurbish and reuse the vehicle.
  
  Once the Crew Dragon capsule reached orbital speeds, the spacecraft separated from the Falcon 9’s second stage and began maneuvering through orbit on its own, using onboard thrusters to adjust its position gradually so it can link up with the International Space Station, expected at about 5:30 p.m. ET Sunday.
  
  “Thank you guys, you know, we had the opportunity to meet so many people that were involved with the Falcon 9 along the way,” Hague said on NASA’s livestream after the launch. “It was a sweet ride.”
  
  Williams and Wilmore watched on September 6 as their Boeing-built capsule returned from the station without them.
  
  Engineers had worked for months to understand issues with helium leaks and thruster outages that had plagued the Starliner’s journey to the space station, and NASA ultimately declared too many uncertainties and risks existed to trust the vehicle to transport crew on its return trip. It’s not clear when Boeing’s Starliner might fly again.
  
  Boeing Starliner capsule returns home from space — without astronauts on board
  
  NASA remains in the same situation it has been in for four years, with SpaceX as the sole provider for the space agency’s Commercial Crew Program, which was designed to hand over the task of crew rotations at the International Space Station to the private sector. (Boeing and SpaceX were each awarded contracts in 2014, and SpaceX began flying routine trips in 2020, while Boeing has struggled to push Starliner development to the finish line.)
  
  To get Williams and Wilmore home, NASA turned to SpaceX — opting to remove two previously assigned members from its Crew-9 team to make room for the Starliner test pilots.
  
  The space agencyannouncedat the end of August that NASA astronauts Stephanie Wilson and Zena Cardman would be the members booted from the mission. Cardman had been set to make her first trip to space and was expected to be commander of the Crew-9 mission.
  
  Gorbunov, a Russian cosmonaut who got his seat via a ride-sharing agreement inked between NASA and Russia’s space agency, Roscosmos, remained on the crew. And Cardman handed over commander duties — the top position on a spaceflight — toHague, who had previously been named the pilot for Crew-9.
  
  “Handing the helm to (Hague) is both heartbreaking and an honor. Nick and Alex are truly an excellent team, and they will be ready to step up,” Cardman said in aposton the social platform X, formerly Twitter, after the announcement.
  
  “I only wish (Wilson), Nick, Alex, and I could fly together, but we choose without hesitation to be part of something much larger than ourselves.Ad astra per aspera. Go Crew 9.”
  
  What the two Boeing Starliner astronauts will do in space until 2025
  
  Speaking on NASA’s livestream Saturday, Cardman acknowledged it was hard to watch the launch without thinking, “That’s my rocket, that’s my crew.”
  
  Meanwhile, Williams and Wilmore have folded into daily life on the space station. The duo transitioned from a lighter test mission schedule to taking on roles as full-time crew members, with Williams assuming the role of commander at the orbiting laboratory.
  
  Gorbunov and Hague will join them after docking with the space station.
  
  When asked if he had trouble adjusting to the prospect of waiting months longer to get home, Wilmore said during a September 13 news briefing from the space station, “I’m not gonna fret over it. I mean, there’s no benefit to it at all. So my transition was — maybe it wasn’t instantaneous — but it was pretty close.”
  
  Williams said that she missed her family and was disappointed to miss some family events this fall and winter, but she added, “This is my happy place. I love being up here in space. It’s just fun. You know, every day you do something that’s work, quote, unquote, you can do it upside down. You can do it sideways, so it adds a little different perspective.”
