title: "Inmates escape Niger prison holding militants"
date: "2024-07-12"
section: "Africa"
url: "https://www.cnn.com/2024/07/12/africa/inmates-escape-niger-prison-intl/index.html"
content: |
  Niger’s interior ministry said it had ordered search units to be on alert after inmates escaped on Thursday from the high-security Koutoukale prison whose inmates include Islamist militants.
  
  The ministry statement did not say how many prisoners had escaped Koutoukale, which lies 50 km (30 miles) northwest of the capital Niamey, or how they had done so. In 2016 and 2019,attempted jail breaksat the facility were repelled.
  
  US begins pulling military equipment from Niger ahead of withdrawal deadline
  
  The prison’s inmates include detainees from the West African country’s conflict witharmed groups linked to al Qaeda and Islamic Stateand suspected Boko Haram insurgents.
  
  Local authorities imposed an overnight curfew in the urban commune of Tillaberi, which is in the same region as the prison, but did not give further details.
  
  Niger and its neighbors in the central Sahel region are on the frontlines of the battle to contain a jihadist threat that has steadily grown since 2012, when al Qaeda-linked fighters first seized parts of Mali.
  
  Thousands have been killed in the insurgencies and more than three million displaced, fueling a deep humanitarian crisis in some of the world’s poorest countries.
