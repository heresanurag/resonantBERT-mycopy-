title: "A detailed look at children’s brains might show how sex and gender are different, new study says"
date: "2024-07-12"
section: "Health"
url: "https://www.cnn.com/2024/07/12/health/sex-gender-child-brain/index.html"
content: |
  Sex and gender are often conflated or equated in everyday conversations, and most American adultsbelievea person’s gender is determined by sex assigned at birth. But a new study of nearly 5,000 9- and 10-year-olds found that sex and gender map onto largely distinct parts of the brain.
  
  The research gives a first insight into how sex and gender may have “measurable and unique influences” on the brain, study authors said, just as other experiences have been shown to shape the brain.
  
  “Moving forward, we really need to consider both sexes and genders separately if we better want to understand the brain,” said Dr. Elvisha Dhamala, anassistant professorof psychiatry at the Feinstein Institutes for Medical Research and the Zucker Hillside Hospital in Glen Oaks, California, and a co-author of the study, published Friday in the journal Science Advances.
  
  The researchers on the new study defined sex as what was assigned to the child at birth. In the US, clinicians make this assignment based on genitalia. Most people are assigned either female or male, according to the research; the rest are intersex, a person whose sexual or reproductive anatomy doesn’t fit this male/female binary.
  
  Teen brains get a closer look in ‘Inside Out 2.’ Here is what we all can learn
  
  The researchers defined gender as an individual’s attitude, feelings and behaviors, as well as socially constructed roles. They noted specifically that gender is not binary, meaning not all people identify as either female or male.
  
  Both sex and gender are a core part of human experience. They’re key to how people perceive others and how they understand themselves. Both can influence behavior as well as health, the study authors say.
  
  The researchers looked at brain imaging data from 4,757 children in the United States, 2,315 assigned female at birth and 2,442 assigned male at birth, who were ages 9 and 10 and were a subset of theAdolescent Brain Cognitive Development (ABCD) study, the largest long-term study of brain development and child health in the United States. Over a period of 10 years, the children in the ABCD study underwent comprehensive neuroimaging, behavioral, developmental and psychiatric assessments.
  
  Beyond tests such as MRIs, the scientists did surveys of the children and their parents that were focused on gender, both at the beginning of the research and then a year later. The children were asked about how they expressed their gender and how they felt about it. The parents were asked about a child’s sex-typed behavior during play and whether the child had anygender dysphoria, a term that mental health professionals use to describe clinically significant distress felt because a person’s sense of their gender does not match their sex the assigned at birth.
  
  Parents were a key part of the study, said study co-author Dr. Dani S. Bassett, a professor at the University of Pennsylvania with appointments in the Departments of Bioengineering, Electrical & Systems Engineering, Physics & Astronomy, Neurology, and Psychiatry.
  
