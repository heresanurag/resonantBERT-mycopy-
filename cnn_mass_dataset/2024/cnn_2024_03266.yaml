title: "American Ezra Frech completes incredible Paralympic gold double"
date: "2024-09-04"
section: "Sport"
url: "https://www.cnn.com/2024/09/04/sport/ezra-frech-paralympics-gold-double-intl-spt/index.html"
content: |
  American Ezra Frech completed a remarkable golden double on Tuesday at theParis Paralympicsafter he won the men’s high jump by clearing a height of 1.94 meters, setting a new Paralympic record that was just shy of his own world record.
  
  On Monday, the 19-year-old earned a dramatic gold in the men’s 100-meter T63 sprint – coming from behind to win in a photo finish to beat Denmark’s Daniel Wagner by just 0.02 seconds.
  
  Frech wasborn with congenital limb differencesand ran on his first blades aged four. The future star was soon playing soccer, basketball and running track, according to Olympics.com.
  
  By age 11, after watching the Rio 2016 Paralympics, he vowed to his friends that he would make it to Tokyo 2020.
  
  “Everyone said I was crazy,” he toldSports Illustratedahead of the Games. “It was statistically unlikely. I mean, an 11-year-old saying he’s gonna make the Games in four years is utterly ridiculous.”
  
  He made good on his promise, but didn’t place, finishing fifth in the T63 high jump and missing out on a medal.
  
  “That is undoubtedly one of the most devastating moments of my entire life,” Frech said to SI about his experience in Tokyo. “It’s easy to fail in private. It’s hard to fail on the world stage where everyone sees it.”
  
