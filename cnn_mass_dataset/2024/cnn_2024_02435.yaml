  Editor’s Note: CNN’s 5 Things newsletter is your one-stop shop for the latest headlines and fascinating stories to start and end your busy day.Sign up here.
  
  👋Welcome to 5 Things PM!Feeling sleepy during the day could indicate ahigher risk of cognitive issuesdown the line, according to a new study. Excessive drowsiness may be linked to a pre-dementia syndrome.
  
  Here’s what else you might have missed during your busy day:
  
  1️⃣Spiritual care:Although some people are moving away from religion, the desire for connectedness remains. The term might sound like an oxymoron, but atheist chaplains areforging a new pathin a changing world.
  
  2️⃣Rich get richer:Donald Trump won the presidential election, but he wasn’t the only one who had a good day. The wealth of the world’s 10 richest people also soared by a record amount as Elon Musk, Jeff Bezos, Bill Gates and othersbenefited from the outcome.
  
  3️⃣Suspicious spheres:Thousands of mysterious black balls washed up on beaches in Sydney, Australia, prompting closures and clean-up efforts. Scientists now know what they were —and it’s pretty disgusting.
  
  4️⃣Monkey mayhem:Residents in a small South Carolina town are on high alert after 43 rhesus macaque monkeysescaped from a research facility.Authorities set traps for the young primates and were trying to entice them with food.
  
  5️⃣Grammy nominations:It’s shaping up to be ladies’ night at the 2025 Grammy Awards. The nominees will be announced Friday, and Taylor Swift, Beyoncé, Billie Eilish, Ariana Grande, Sabrina Carpenter, Charli XCX and Chappell Roan allcould receive multiple nods.
  
  🌋Clouds of ash:Indonesia’s Mount Lewotobi Laki Laki erupted recently, spewing volcanic ashmore than three miles into the air. Some people who live nearby fled after the eruption, and several houses were burned.
  
