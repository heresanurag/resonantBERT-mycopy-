  🚘 That’s how many carsVolkswagen recalledin the US because of safety concerns over their airbags.
  
  🧛‍♀️‘Vampire’ woman:Researchers recreated the faceof a 17th century female buried with a sickle across her neck and a padlock on her toe, which were intended to stop her from rising from the dead.
  
  🎤Iconic voice:Elwood Edwards, a graphics and camera operator at a Cleveland TV station whose voice gained worldwide fame after he recorded AOL’s email greeting, “You’ve got mail,”died at age 74.
  
