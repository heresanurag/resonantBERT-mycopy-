title: "Second gentleman Doug Emhoff tests positive for Covid-19; Harris is negative"
date: "2024-07-07"
section: "Politics"
url: "https://www.cnn.com/2024/07/07/politics/doug-emhoff-tests-positive-covid-19/index.html"
content: |
  Second gentleman Doug Emhoff tested positive for Covid-19 Saturday after experiencing mild symptoms, according to a Sunday statement from his office.
  
  Vice President Kamala Harris has tested negative for the virus and remains asymptomatic, Emhoff communications director Liza Acevedo said in the statement.
  
  The couple were on a balcony at the White House with President Joe Biden and first lady Jill Biden on Thursday for an Independence Day celebration. CNN has reached out to the White House to ask whether the president is being tested.
  
  Harris was in New Orleans on Saturdayfor a moderated conversation at the Essence Festival, an annual Black music and cultural festival. The vice president is on a tour through the US on what the Biden administration has dubbed the “Summer of Engagement.” She’s participated in more than 60 trips across 20 states since the start of 2024, her office said earlier this month.
  
  The vice president is next scheduled to deliver a keynote speech at the Alpha Kappa Alpha Sorority’s 71st Boule on Wednesday in Dallas as she looks to reach key constituencies for the Biden campaign, including Black, women and young voters.
  
  Biden, meanwhile is making campaign stops in Pennsylvaniaas part of an “aggressive travel schedule” in July following hispoor debate performance last month.
  
  Emhoff previously tested positive for Covid-19 in March 2022, andHarris tested positivea month later but had no symptoms.
