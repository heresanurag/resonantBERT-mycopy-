title: "The Odysseus lunar lander is sideways on the moon, company that built it says"
date: "2024-02-23"
section: "World"
url: "https://www.cnn.com/2024/02/23/world/odysseus-lunar-landing-sideways-scn?cid=external-feeds_iluminar_yahoo"
content: |
