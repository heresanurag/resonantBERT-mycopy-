title: "Tyson CFO and chicken family scion John Tyson arrested for DWI"
date: "2024-06-13"
section: "Business"
url: "https://www.cnn.com/2024/06/13/business/john-tyson-chicken-cfo-dwi-arrest/index.html"
content: |
  Tyson Foods suspended its CFO John R. Tyson after he was arrested Thursday on charges of DWI and careless driving. Tyson, the great grandson of the founder of the meat processing company, was previously arrested in 2022on charges of public intoxication and criminal trespass.
  
  The 34-year-old was booked early Thursday and has since been released, according to the Washington County, Arkansas, Detention Intake Report. His initial hearing is scheduled for Friday.
  
  “We are aware that John Randal Tyson, Chief Financial Officer of Tyson Foods, was arrested for an alleged DWI,” the company said in a statement Thursday.
  
  “Tyson Foods has suspended Mr. Tyson from his duties effective immediately and named Curt Calaway as interim Chief Financial Officer.”
  
  Tyson Foods CFO arrested after entering wrong home, falling asleep
  
  Back in 2022, Tyson was charged after he allegedly wandered into the wrong home and fell asleep.News reports at the timesaid he was found asleep on a bed by a woman who lived there. She called the police, who then identified Tyson through his driver’s license. Hereportedly later pleaded guiltyto two misdemeanor charges related to the incident.
  
  Tysonissued an apologyduring an analyst call in November 2022. “I’m embarrassed and I want to let you know that I take full responsibility for my actions,” he said at the time. “I also want to apologize to our investors as I have to our employees.”
  
  During that same call, Tyson Foods CEO Donnie King said that the company was taking the incident seriously through its “corporate governance process.”
  
  — CNN’s Rebekah Riess and Parija Kavilanz contributed to this report.
