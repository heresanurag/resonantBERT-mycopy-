title: "Bud Light loses more ground, slipping to No. 3 in America"
date: "2024-07-18"
section: "Food"
url: "https://www.cnn.com/2024/07/18/food/bud-light-michelob-ultra-sales/index.html"
content: |
  Bud Light, formerly the top-selling beer in the United States, has had a tough year since aboycottupended the industry. It’s only getting worse: The brand has now fallen into third place.
  
  Michelob Ultra, also brewed by Anheuser-Busch, leapfrogged Bud Light to become the second-best selling beer at grocery and convenience stores during a crucial sales period stretching between Memorial Day and July 4 holidays, according to NIQ data shared by industry trade publication Beer Marketer Insights. Modelo Especial, made by rival Constellation Brands,remains the top-selling beerat retailers in the US aftersurpassing Bud Lightlast year.
  
  For the past four weeks ending on July 6, Bud Light captured 6.5% of beer dollar sales at retail stores compared to 7.3% for Michelob Ultra, NIQ data shows. Meanwhile, Modelo maintains its top share at 9.7%.
  
  Bud Light’s further decline shows that a boycott over the brand that started in April 2023 over a one-off sponsored Instagram post featuringtransgender influencer Dylan Mulvaneyhas caused lasting damage to the beer’s sales. The social media post garnered national attention from the right, and Bud Light’s response to the controversy caught anger from the left.
  
  Gen Z wants flavorful drinks. Here’s how Big Beer is trying to attract them
  
  Michelob Ultra’srise to the topisn’t solely due to the decline of Bud Light. A-B has pumped more marketing money into the beer, which attracts health-conscious drinkers seeking a flavorful and low-carb beer.Industry observersand evenformer A-B executives predictedthis would happen.
  
  The beer sponsored the Copa America soccer tournament, which racked uprecord US TV ratings. And it is now the official beer sponsor for Team USA with its ads set to dominate the Olympics on US TV. Michelob Ultra also released special-edition packaging featuring the Team USA logo and the American flag, in a nod to its patriotic passion.
  
  For Bud Light, its marketing efforts pivoted to win back conservatives. It became theofficial beer of the UFCand sponsored music festivals with country stars. It’s also maintaining a large advertising presence in the upcoming NFL season.
  
  An A-B spokesperson said in a statement that “millions of consumers choose Bud Light every day” and that the beer brand “will always be a mainstay of our iconic portfolio.”
