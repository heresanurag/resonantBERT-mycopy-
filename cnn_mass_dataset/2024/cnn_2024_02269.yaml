title: "Man who pleaded guilty to intimidating pro-Israeli protester charged with hate crime for antisemitic threats on NYC subway"
date: "2024-11-12"
section: "US"
url: "https://www.cnn.com/2024/11/12/us/california-man-antisemitic-threats-nyc-subway/index.html"
content: |
  A 36-year-old California man has been charged with a hate crime and harassment by the Manhattan District Attorney’s Office after allegedly threatening a Jewish man on the New York City subway.
  
  This incident took place on the night oflarge protestsoutside a Manhattan exhibition commemorating the victims of Hamas’ attack on an Israeli music festival on October 7 last year.
  
  According tothe DA’s office, Christopher Husary was on an NYC subway train on June 10 when he vandalized a train car door with an antisemitic symbol. The victim, who was wearing a Jewish yarmulke, took a picture of the graffiti — a red inverted triangle — before Husary allegedly demanded that he delete the photo, made antisemitic remarks, and said, “Yo, we got a Zionist over here,” and “We’ll find you and there will be consequences,” the DA’s office said.
  
  TheAnti-Defamation Leaguenotes that red inverted triangles have been used by the military wing of Hamas in the recent Gaza conflict to mark Israeli military targets.
  
  The United States has seen rising levels of antisemitic incidents since the October 7 Hamas attacks on Israel, according to data from the ADL.
  
  Themost recent datafrom the organization, which has tracked antisemitic incidents in the US since 1979, found a 140% increase in incidents from 2022 to 2023, with a “dramatic” increase taking place after October 7. According toNYPD data, 496 hate crime incidents took place in New York City during the first nine months of 2024, with 276 involving Jewish targets.
  
  The victim exited the subway at the following stop and reported the incident to police nearly two weeks later, on June 22, according to the New York City Police Department.
  
  New York City police arrested Husary in Northern California just after he was sentenced to 364 days in the county jail and two years of probation following a guilty plea to a charge of robbery with a hate crime enhancement for using force and intimidating a woman holding an Israeli flag during a demonstration over the Israel-Hamas war.
  
  He is to begin serving his sentence on January 2, according to theContra Costa District Attorney’s Office.
  
  “Everyone has the right to express their beliefs under the First Amendment and we deeply appreciate those who bravely stood up for their rights despite attempts by the defendant to silence them,” Contra Costa District Attorney Diana Becton said. “The First Amendment does not protect people who threaten others, cause injury, engage in intimidation, or damage property.”
