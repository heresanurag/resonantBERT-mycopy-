title: "Kamala Harris needs to beat the fundamentals to win"
date: "2024-10-05"
section: "Politics"
url: "https://www.cnn.com/2024/10/05/politics/kamala-harris-trump-election-fundamentals/index.html"
content: |
  FormerPresident Donald Trumpshould be running away with this election given how few people think the country is heading in the right direction.
  
  Instead, Trump and Vice PresidentKamala Harrisare neck and neck in the polls. Now, it’s not clear whether Harris can continue to win over so many voters who think we’re heading in the wrong direction. What is clear is that Harris would need to defy certain fundamentals if she wants to win next month, and recent history suggests she has a shot.
  
  When I speak of fundamentals, I mean questions beyond the horse race, like asking Americans whether they think the country is heading in the right direction or is on the wrong track.
  
  A minority of Americanshave historicallysaid that the country is heading in the right direction, but it’s usually not as bad as the current figures. Only about 28% of Americans believe the country is on the right track these days, according to the latestNBC News poll. That’s well below where things were whenJoe Bidentook office in 2021, when that percentage waswell north of40%.
  
  Indeed, 28% is not where a president’s party wants to be a month before the election — whether the incumbent is running or not. Since 1980, in elections won by the incumbent’s party, an average of 42% of Americans have said that the country was on the right track.
  
  But in elections that the president’s party has lost over the same time period, just 25%, on average, have felt that the country was heading in the right direction. That looks a lot like the 28% who say so today.
  
  Kamala Harris may be the first Democratic presidential nominee to win seniors since Al Gore
  
  A closer examination of the stats reveals that there isn’t a single instance of the party in power winning another term when fewer than 39% said the country was heading in the right direction.
  
  We see something similarly troubling for Harris on another fundamental —presidential approval ratings. A president’s approval rating is obviously less predictive when the incumbent isnotrunning for another term. Still, it carries somemodicum of importance.
  
  The incumbent’s party has never won when the president had higher disapproval ratings than approval ratings.
  
  Biden’s disapproval rating right now is about 10 points above his approval rating.
  
  These are just two indicators of public opinion that are bad for Harris’ chances in November.
  
  Gallup listed 10different metricsit looks at heading into an election, ranging from party identification to satisfaction with the economy to presidential approval. Eight of those 10 were deemed to be good for Trump. The other two were neutral. None of the 10 hinted in the direction of a Harris victory.
  
  Despite these fundamentals pointing to Trump, Harris may have an ace in the hole: the 2022 midterm elections.
  
  Think back to two years ago. Biden’s approval rating was basically as bad as it is now. A mere 26% of Americans, in my average of polls, said we were on the right track as a nation. That 26% was the lowest figure going into a midterm in the previous 40 years.
  
  In short, there were few, if any, metrics in 2022 that were better for the Democratic Party than they are now.
  
  Kamala Harris vs. Donald Trump is the closest presidential race of the century
  
  Yet, Democrats defied the midterm trends, keeping their House losses to single digits, expanding their Senate majority and picking up governor’s seats.
  
  Arguably the two biggest factors that allowed Democrats to do so well are still present today: Trump and abortion.
  
  Trump still sportsa net unfavorable ratingwith American voters. If he wins the presidency next month, he would be the least popular candidate to do so, except for Trump himself in 2016. Harris ismore popularthan the former president in almost all surveys.
  
  Abortioncontinues to ranknear the top of all issues, two years after Roe v. Wade was overturned, and measures to expand abortion access are on the ballot in anumber of statesthis fall. Remember, every presidential election in the past 50 years took place when Roe was the law of the land. It’s tough to say what might happen withso many voters upsetabout the loss of federal protections for abortion.
  
  The bottom line is that something that was true for the past 44 years of presidential elections now conflicts with what 2022 taught us, and that’s what makes this election so interesting.
  
  The past is often prologue, as they say, but sometimes history is not meant to be repeated.
