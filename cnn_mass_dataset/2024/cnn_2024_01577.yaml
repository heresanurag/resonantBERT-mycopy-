title: "The undeniable crisis that’s not driving American voters"
date: "2024-10-09"
section: "Politics"
url: "https://www.cnn.com/2024/10/09/politics/climate-change-voters-what-matters"
content: |
  A version of this story appeared in CNN’s What Matters newsletter. To get it in your inbox, sign up for freehere.
  
  Warm water in the Gulf of Mexico that was predicted by climate scientists to feed harsher hurricanes helpedsupercharge September’s Hurricane Helene. That was before October’s monster storm, Milton, struck – the destruction of which will become clear in the days to come.
  
  The science suggests Americans need to get used to more harsh weather events – extreme storms, warmer waters, wildfires and hotter weather. Evacuations and destruction will become more normal.
  
  In this case, two epic storms in two weeks.
  
  But climate change, to the extent people are talking about it, does not register this year as an “extremely important” presidential campaign issue, per a new poll.
  
  InGallup pollingfrom late September, most of which was conducted just before Helene made landfall, registered voters were asked to rate the importance of 22 issues in this year’s election.
  
  Just 5% of Republicans and Republican-leaning independents, along with slightly more than a third of Democrats and Democratic-leaning voters, said climate change was “extremely” important to their vote.
  
  Climate change and transgender rights were the only two of the 22 issues listed by Gallup that half or fewer of respondents said were either “extremely” or “very” important to their presidential vote choice.
  
  An issue doesn’t have to be top of mind to be potent. Transgender rights might not be the issue a majority of voters are citing as important, but it is the issue on which former President Donald Trump’s allies are focusing many of their ad dollars as theyattack Vice President Kamala Harrisin the final month of campaigning.
  
  Voters are most focused on the economy, with 52% of registered voters, driven by Republicans and Republican leaners, citing the economy as “extremely important” to their vote. The second-most-cited “extremely important” issue, democracy in the US, was driven by Democrats.
  
