title: "Buffalo Bills ask fans to help clear snow as Highmark Stadium braces for ‘two to three feet of snow’ over the weekend"
date: "2024-11-30"
section: "Sport"
url: "https://www.cnn.com/2024/11/30/sport/buffalo-bills-highmark-stadium-snow-spt-intl/index.html"
content: |
  It must be holiday season when theBuffalo Billsare asking fans to help clear snow at the team’s Highmark Stadium.
  
  Last year’sSuper Bowlrunner-up theSan Francisco 49erswill make the trip to Buffalo for Week 13’s edition of Sunday Night Football, but the elements may pose as much difficulty as the opposing team.
  
  According tometeorologists,two to three feet of snow could hit the stadium, with the most likely scenario being 20-30 inches of snowfall. Forecasts show that the temperatures will plunge to around 28 degrees Fahrenheit on Sunday night with a wind chill of 19 degrees Fahrenheit. Wind speeds ahead of the game will reach around 15 mph.
  
  To prepare the stands and areas around the stadium for gameday, the Bills are once again asking for their supporters’ help. Anyone over the age of 18 who feels up to the task will be paid a rate of $20 per hour and provided with hot food and drinks, as well as shovel for clearing snow.
  
  Winter is coming. 🥶In anticipation of the upcoming snowfall, we're asking Bills Mafia to register to be a prospective snow shoveler:https://t.co/EMTU21J4zzpic.twitter.com/szhuelS0Va
  
  The Bills are used to playing in frigid conditions anddefeated the Pittsburgh Steelersin the Wild Card round of playoffs last season, with Highmark Stadium once again coated in snow. Fans who braved the chill celebrated by tossing snow in the air after every touchdown.
  
  Led by superstar quarterback Josh Allen, Buffalo has been one of the best teams in the NFL this season and boasts a 9-2 record heading into Week 13. After theMiami Dolphins were beaten 30-17 by the Green Bay Packers on Thanksgiving, the Bills can clinch the AFC East division on Sunday with a victory.
