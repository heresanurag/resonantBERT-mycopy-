id: cnn_2024_02947
title: "Six former Florida State players suing coach Leonard Hamilton over failed NIL payments"
date: "2024-12-30"
section: "Sport"
url: "https://www.cnn.com/2024/12/30/sport/six-former-florida-state-players-suing-coach-leonard-hamilton-spt/index.html"
content: |
  Six former Florida State basketball players sued Seminoles coach Leonard Hamilton on Monday, alleging he failed to make good on a promise to get each of them $250,000 in name, image and likeness compensation.
  
  The plaintiffs — Darin Green Jr., De’Ante Green, Cam’Ron Fletcher, Josh Nickelberry, Primo Spears and Jalen Warley — filed suit in Leon County circuit court. Their attorney, Fort Lauderdale-based Darren Heitner, shared the 20-page complaint with The Associated Press. Yahoo Sports first reported the case.
  
  The former players allege Hamilton promised them the money from his “business partners.” The lawsuit says they walked out of a practice last season over the missed payments and intended to boycott a February 17 game against Duke. They ended up playing — the Seminoles lost 76-67 — amid a guarantee from Hamilton that they would be paid but never were, according to the suit.
  
  No attorney for Hamilton was listed in the lawsuit. FSU hosts Syracuse on Saturday.
  
  The complaint includes multiple text-message exchanges between players and some between players and Hamilton.
  
  FSU finished 17-16 last season, including 10-10 in the Atlantic Coast Conference. The 76-year-old Hamilton is in the final year of his contract. The Seminoles are 9-4, including 0-2 in league play.
  
  None of the plaintiffs in the lawsuit remain with the team. Green and Nickelberry exhausted their college eligibility last spring, and the four others transferred. Spears is now at UTSA, Fletcher is at Xavier, De’Ante Green is at USF and Warley is at Gonzaga.
  
  The lawsuit is the latest in a growing number of NIL legal battles.
  
  Matthew Sluka, a starting quarterback for the UNLV football team, left the program after three games in September because he was never paid a $100,000 NIL deal. Former Florida quarterback signeeJaden Rashada, now playing at Georgia, sued Gators coach Billy Napier last year over an unpaid $13 million NIL deal. And several Tulsa players claim they were never paid thousands in NIL commitments made by former coach Kevin Wilson.
