title: "Prince Harry and Meghan are in Colombia. Here’s what to know about their visit"
date: "2024-08-15"
section: "UK"
url: "https://www.cnn.com/2024/08/15/uk/harry-meghan-royal-family-colombia-intl/index.html"
content: |
  Editor’s Note:This is a version of CNN’s Royal News, a weekly dispatch bringing you the inside track on Britain’s royal family.Sign up here.
  
  HarryandMeghan, Duke and Duchess of Sussex, arrived in the Colombian capital of Bogotá on Thursday, for a visit to support initiatives that protect children from online harm.
  
  The four-day visit came together following an invitation fromVice President Francia Márquez, the first Afro-Colombian to hold executive powers.
  
  The couple were warmly welcomed to Bogotá by Márquez and her partner, Rafael Pinillo. The meeting lasted around 30 minutes, during which the group had drinks and pan de bono (Colombian cheese bread) before exchanging gifts.
  
  The two parties held talks at the residence of the vice president, who said the “Sussexes share the same ideals and goals when it comes to championing a better, safer digital future and mental health landscape for our children and the world,” according to a journalist traveling with the Sussexes.
  
  Márquez, who also serves as the nation’s minister for equality, told reporters Thursday: “This is their first visit to Latin America. The goal is to build bridges and open doors to attend an issue that affects the whole of humanity: cyber harassment and online discrimination.”
  
  She pointed to her own background – as an environmental defender of African heritage –- as part of the reason she is pushing for a saferdigital landscape.
  
  “Cyber harassment is a problem that doesn’t affect us only around racial issues, but also for gender and political issues. Women who want to do politics today are exposed to a level of violence on social media that affects us as human beings, affects our dignity,” she explained. “And this is not only happening to women, but the most worrisome aspect of cyber harassment is also that it’s affecting children and teenagers.”
  
  Márquez also reiterated the importance of theInvictus Games, launched by Prince Harry a decade ago, saying the couple will meet the Colombian delegation on Friday.
  
  “Colombia is the only country in Latin America taking part in these Games and we’re preparing for the next edition to be held in Canada in 2025,” she added.
  
  Because of over 60 years of almost permanent civil conflict, Colombia has hundreds of thousands of military veterans, some of whom suffer from long-term injuries or chronic conditions as the result of their service.
  
  During their stay in the South American nation, the couple are expected to travel beyond the capital and visit the cities of Cartagena and Cali in the days ahead.
  
  Harry and Meghan will see these “vibrant locations,” while engaging with “leaders, youth, and women who embody the aspirations and voices of Colombians committed to progress,” the vice president’s office said when announcing the visit earlier this month.
  
