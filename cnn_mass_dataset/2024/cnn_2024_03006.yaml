title: "Officials in Arizona release Rudy Giuliani’s mug shot after he pleaded not guilty in election subversion case"
date: "2024-06-10"
section: "Politics"
url: "https://www.cnn.com/2024/06/10/politics/rudy-giuliani-mugshot-arizona-election-subversion/index.html"
content: |
  Rudy Giuliani was processed in Phoenix on Monday, weeks afterpleading not guiltyin Arizona to charges of allegedly conspiring to overturn the 2020 presidential election results.
  
  Donald Trump’s former attorney was given 30 days to appear and get his mug shot and fingerprints taken, according to a Maricopa County court commissioner, after aproblematic attempt by agentswithin the Arizona attorney general’s office to serve Giuliani last month.
  
  Giuliani was served on May 17 in Palm Beach, Florida, at his 80th birthday bash held by a GOP operative. Arizona prosecutors spent weeks trying to track down the former New York City mayor and eventually found him based on his podcasts.
  
  Giuliani also posted a $10,000 bond in cash on Monday, according to court documents.
  
  A grand jury in Arizonahanded up indictmentslast month charging over a dozen Trump allies, including the fake electors and several individuals connected to his campaign, over their efforts to overturn his 2020 election loss.
  
  “This yet another example of partisan actors weaponizing the criminal justice system to interfere with the 2024 presidential election through outlandish charges against President Trump and anyone willing to take on the permanent Washington political class,” said Ted Goodman, a spokesperson for Giuliani.
  
  Goodman added that Giuliani “will be fully vindicated.”
  
  The Arizona indictment is just the latest legal woe for Giuliani stemming from his time as Trump’s attorney after the 2020 presidential election. Hefiled for bankruptcyin December, days after a jury ordered him topay nearly $150 millionto two former Georgia election workers for makingdefamatory statementsabout them.
  
  Giuliani is alsoan unindicted co-conspiratorin Trump’s federal election subversion case; faces 13 charges in theGeorgia election subversion case, which has beenindefinitelypaused by a state appeals court; and is being sued for defamation by both Dominion and Smartmatic, voting technology companies that he falsely said rigged the 2020 election.
  
  This story has been updated with additional reporting.
