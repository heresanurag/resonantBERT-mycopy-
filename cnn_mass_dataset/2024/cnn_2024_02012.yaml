  February 20, 2024
  
  Today on CNN 10, take a look at footage from Sora, a new AI model from the makers of ChatGPT who claim they can create artificially generated videos that look realistic. We also cover the death of Alexey Navalny, a well-known critic of Russian President Vladimir Putin. Finally, we profile two trailblazing Black Americans who left a profound impact on the world, Dr. Charles Richard Drew and pilot Bessie Coleman.
  
