  People who received the latest Covid-19 vaccine this past fall may still have some protection against the latest variants; that vaccine targeted a different strain but was found to besimilarly effectiveagainst JN.1, and experts say that some of those benefits may extend to its FLiRT relatives. People who had a recent infection — especially since the start of the year, when JN.1 was prominent — may also have some protection. But immunity wanes over time.
  
  In June, the US Food and Drug Administration’s vaccine advisory committee will meet to discuss recommendations for the version of the Covid-19 vaccine that will be available this fall. The meeting was postponed by about three weeks in order to “allow for additional time to obtain surveillance data” to have “more up-to-date information when discussing and making recommendations,” according to aposton the federal agency’s website.
  
  For now, experts say, risk remains relatively low.
  
  “As with all things Covid, our outlook may change in a week or two. But at the moment, we’re in really a very good place — the best place we’ve been in for a long, long time,” Schaffner said.
