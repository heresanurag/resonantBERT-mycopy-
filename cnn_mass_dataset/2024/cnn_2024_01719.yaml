  Covid-19 surveillance has scaled back significantly since the US public health emergency ended a year ago, which also adds to the uncertainty. But the data that is available is consistent. For now,wastewater surveillancesuggests that viral activity is very low and decreasing in all regions of the country, and Covid-19 hospitalization rates remain extremely low.
  
  “We learned from the laboratories that FLiRT variants appeared, so far, to be as transmissible as the other Omicron subvariants, which means they’re really quite contagious. But they do not appear to be producing more severe disease or any sort of illness that’s distinctive from the point of view of clinical presentation symptoms,” Schaffner said.
  
  As of May 1, the requirement for all hospitals to report Covid-19 data to the federal government has expired. But Schaffner’s Vanderbilt University Medical Center is part of a CDC-run surveillance network that continues to track trends based on a sample of hospitals that cover about 10% of the US population. Covid-19 hospitalization rates have fallen from nearly 8 new admissions for every 100,000 people in the first week of the year to about 1 new admission for every 100,000 people at the end of April, thedatashows.
  
  While the FLiRT variants pose some risk this summer, experts remain focused on what might happen in the fall.
  
