title: "Sondra Williams, wife of San Francisco 49ers tackle Trent Williams, announces son was stillborn at 35 weeks"
date: "2024-12-03"
section: "Sport"
url: "https://www.cnn.com/2024/12/03/sport/trent-williams-son-stillborn-49ers-spt-intl/index.html"
content: |
  Sondra Williams, the wife of San Francisco 49ers tackle Trent Williams, said on social media that their son, Trenton, was stillborn on November 24.
  
  Sondra wroteon Instagramthat it had been “extremely hard trying to process the saddest Hello and Goodbye.” She also said she had lost Trenton’s twin earlier in the pregnancy.
  
  “My heart is heavy. Being home without you in my arms has been quite an adjustment.Knowing I will never be able to watch you grow older alongside your sisters has my eyes filled with tears,” she said.
  
  “I can’t even begin to describe how I felt leaving the hospital without you. Nor how it feels being home celebrating Thanksgiving without my baby in my arms. My heart is broken and my arms are empty. But I know you’ll always be near watching over me and your sisters. And for that, my heart smiles with gratitude.”
  
  In the post, Sondra added that Trenton had been diagnosed with trisomy 13, which is also known as Patau syndrome.
  
  According to the National Library of Medicine, trisomy 13 is a “chromosomal condition associated with severe intellectual disability and physical abnormalities in many parts of the body” which can lead to “heart defects, brain or spinal cord abnormalities, very small or poorly developed eyes, extra fingers or toes, an opening in the lip (a cleft lip) with or without an opening in the roof of the mouth (a cleft palate), and weak muscle tone (hypotonia).”
  
  Because of “several life-threatening medical problems” which can come with trisomy 13, infants with it can often die within their first days or weeks of life with only 5-10% percent of children with this condition living past their first year, per the National Library of Medicine.
  
  San Francisco 49ers’ Charvarius Ward mourns death of daughter
  
  San Francisco head coach Kyle Shanahan told reporters on Monday that Williams – who has missed recent games with an ankle injury – has spent time grieving with his family.
  
  “It was something that happened that last week and he was there at the hospital with her and got to meet him and say bye,” Shanahan said. “And then he had to cremate him on Friday, so he’s been dealing with that and he’s working through it. But we’re all just trying to be here for him through it all.”
  
  Shanahan said that Williams wants to return to the field when he returns to full fitness and said that the 49ers are offering all the support they can to Williams and his family.
  
  “When you’ve got to deal with tragedies like this, it’s hard as a coach, it’s hard as a friend, it’s hard as a family member, it’s hard for everybody,” he said. “But we spend a lot of time with each other and that’s what’s cool about a football team. Whatever you go through, the good or the bad, we go through it together.
  
  “And I do like for those guys because I do like that they have this, they have a group of guys they can go to, a group of guys that could see them every day. And you can’t ever escape that full grief and stuff. But I do think it’s nice for those guys to have another avenue to get out on the football field, to get around teammates and things like that.”
  
  Williams is the second 49ers player this season to be grieving the loss of a child after cornerbackCharvarius Ward announcedthe death of his one-year-old daughter Amani Joy in a heartfelt post on social media in October.
