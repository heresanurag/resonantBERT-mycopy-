title: "UPenn taps venture capitalist Ramanan Raghavendran to lead board of trustees"
date: "2024-01-05"
section: "Business"
url: "https://www.cnn.com/2024/01/05/business/penn-ramanan-raghavendran-board-of-trustees/index.html"
content: |
  Venture capitalist Ramanan Raghavendran is taking the helm of the University of Pennsylvania’s board of trustees following the sudden resignation of Scott Bok last month amid a firestorm of controversy.
  
  The schoolannouncedon Thursday that Raghavendran, a Penn graduate and managing partner of venture capital firm Amasia, is taking over as chair effective immediately.
  
  “I believe great American universities, like the University of Pennsylvania, are the most important repositories of all that defines, and is good and laudable about, our modern civilization,” Raghavendran said in a statement. “We are united in supporting the mission of this incredible institution.”
  
  Raghavendran, a Penn trustee since 2014 and chair of the School of Arts and Sciences Board of Advisors, will step into the position at a tumultuous time for the Ivy League school.
  
  After Harvard and Penn president resignations, focus of ire shifts to MIT’s Kornbluth
  
  Liz Magillannounced on December 9 that she would step down as Penn’s president following her contentious testimony before Congress about antisemitism. Bok resigned as board chair that same day, declining requests to stay on for an interim period.
  
  Raghavendran replaces interim chair Julie Platt, who is returning to her role as vice chair.
  
  Penn previouslytapped J. Larry Jameson, its longest serving dean, to serve as interim president.
