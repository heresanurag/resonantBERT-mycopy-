title: "New York Jets fire head coach Robert Saleh after disappointing season start"
date: "2024-10-08"
section: "Sport"
url: "https://www.cnn.com/2024/10/08/sport/new-york-jets-fire-robert-saleh-spt-intl/index.html"
content: |
  The New York Jets have fired head coach Robert Saleh, the team announced on Tuesday.
  
  The Jets have started the 2024 season with two wins and three losses and are coming off a 23-17 loss to the Minnesota Vikings in London on Sunday.
  
  Salehcompiled a 20-36 regular season record with no playoff appearances in three-plus seasons on the sidelines. He is the NFL’s first head coach to be fired this season.
  
  “This was not an easy decision, but we are not where we should be given our expectations, and I believe now is the best time for us to move in a different direction,” Jets chairman Woody Johnson said in astatement.
  
  A product of San Francisco 49ers head coach Kyle Shanahan’s ever-growing coaching tree, Saleh was named Jets head coach in 2021 after spending four seasons as the 49ers’ defensive coordinator. He became thefirst Muslim Americanto lead an NFL team and the third Arab American head coach.
  
