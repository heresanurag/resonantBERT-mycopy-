title: "James Gunn says Krypto, Superman’s dog, will be in new film – and the reason why might make you cry"
date: "2024-10-15"
section: "Entertainment"
url: "https://www.cnn.com/2024/10/15/entertainment/james-gunn-dog-krypto-superman-movie/index.html"
content: |
  It’s a bird, it’s a plane, it’s Superman’s dog!
  
  In movie news that is sure to have comic book fansbarkingwith excitement,James Gunnhas announced that Krypto – Superman’s super-pet, named for the Man of Steel’s home planet Krypton – will be a part of next summer’s big-budget “Superman” movie, formerly titled “Superman: Legacy.” (The film is being produced by DC Studios and Warner Bros. Pictures, which like CNN are owned by Warner Bros. Discovery.)
  
  The director shared aseries of visuals to Xon Tuesday in which Superman is seen next to a dog, along with a photo of Gunn with his own pet canine.
  
  Gunn went on to share that the film’s furry four-legged character is inspired by his dog Ozu, who he said he adopted shortly after he began writing the “Superman” script.
  
  “Ozu, who came from a hoarding situation in a backyard with 60 other dogs & never knew human beings, was problematic to say the least,” Gunn wrote in his social media post. “He immediately came in & destroyed our home, our shoes, our furniture - he even ate my laptop. It took a long time before he would even let us touch him.”
  
  He added that the thought occurred to him, “how difficult would life be if Ozu had superpowers?” which provided the entry point for Krypto into the script. He wrote that Krypto “changed the shape of the story as Ozu was changing my life.”
  
  Gunn added that his post was timed toAdopt A Shelter Dog month, which happens every October.
  
  “Superman” is set to star “Pearl” actor David Corenswet as Clark Kent/Superman, along with “Marvelous Mrs. Maisel” starRachel Brosnahan as Lois Lane. Nicholas Hoult will portray Lex Luthor. “Superman” is slated to fly into theaters on July 11, 2025.
