title: "Cara Delevingne’s Los Angeles home destroyed in fire: ‘My heart is broken today’"
date: "2024-03-15"
section: "Entertainment"
url: "https://www.cnn.com/2024/03/15/entertainment/cara-delevingne-home-fire?cid=external-feeds_iluminar_cnn-brasil"
content: |
  A house fire devoured the Los Angeles-area home of actress and modelCara Delevingneearly Friday morning, leaving two people injured.
  
  The Los Angeles Fire Department responded to the Studio City home in the Hollywood Hills just before 4 a.m. local time. They found heavy flames at the back of the house, which spread to the attic of the home, the fire department saidin a news release.
  
  One firefighter was taken to the hospital in fair condition, the department said, and one person inside the home suffered minor smoke inhalation.
  
  It took 94 firefighters more than two hours to extinguish the blaze in the two-story home, by which time the roof had collapsed, according tofire officials.
  
  The “Carnival Row” star is currently performing in London’s West End production of “Cabaret,” with a show scheduled on Saturday. Delevingne acknowledged the fire on herInstagramStories on Friday.
  
  “My heart is broken today,” she wrote in text on top of a photo of her two cats. In a video also posted to her Stories, fire trucks are seen parked alongside a road near the home.
  
  Delevingne thanked the firefighters in another slide, writing, “I cannot believe it. Life can change in the blink of an eye. So cherish what you have.”
  
  She later shared a second photo of her two white felines with an update confirming that the cats “are alive.” Delevingne went on to again express her gratitude for the firefighters.
  
  LAFD said the cause of the fire remains under investigation.
