title: "Some experts are calling for age restrictions on the sale of nonalcoholic drinks. Here’s why"
date: "2024-09-20"
section: "Health"
url: "https://www.cnn.com/2024/09/20/health/age-restrictions-nonalcoholic-drinks-kids-wellness?cid=ios_app"
content: |
  They won’t get you buzzed, but some experts saylow-alcohol and alcohol-free beers and mocktailsshouldn’t be sold to minors, and they’re calling for laws that curb underage sales to kids and teens.
  
  The market for nonalcoholic drinkshas been growingas more people — notably younger adults — look tocut their alcohol use. In order to be considered nonalcoholic, these drinks have to contain less than 0.5% alcohol by volume.
  
  The sober-curious movement has given rise to ready-to-go drinks in cans and bottles that often look just like their boozy counterparts. There’s a version of Budweiser beer calledBudweiser Zero, for example, and a nonalcoholic version of Corona beer in the same signature longneck bottles.
  
  “It’s a way to blend in for a lot of folks who are using these in social settings,” said Dr. Molly Bowdring, an instructor in the Stanford Prevention Research Center.
  
  But the products may offer an entry point into drinking culture that some experts are worried could foster unhealthy habits.
  
  Alcohol’s healthy halo dims as study finds drinking may be harmful for older adults, even at low levels
  
  Actress Kristen Bellruffled some featherslast year when she said onKelly Clarkson’s talk showthat she lets her young daughters drink their dad’s nonalcoholic beer at home.
  
  “They’re unlikely to lead to intoxication, but they contain many of the same cues as alcohol – so flavor, look, smell, experience of sipping and sometimes even the same brand as alcoholic beverages,” said Bowdring, who recentlypublished a commentaryon the issue in the journal JAMA Pediatrics.
  
  If nobody’s getting tipsy, what’s the harm? Bowdring says there’s emerging evidence that nonalcoholic beverages may prime kids to switch to the real thing.
  
  The research that’s raising eyebrowscomes from Japan, Taiwan and Australia.
  
  Surveys of elementary, middle and high school students in Japan, where the legal drinking age is 20, found that 20% to 30% said they were drinking nonalcoholic beverages. Additional studies in Japan found that elementary school students who said they drank nonalcoholic drinks were more interested in drinking alcohol than those who said they didn’t have these kinds of beverages.
  
  Nonalcoholic beverage use in junior high and high school was linked to the likelihood that a person had had alcohol in the previous 30 days.
  
  In Taiwan, where the legal drinking age is 18, high schoolers who said they drank nonalcoholic beverages were more likely than those who didn’t to express an intention to drink alcohol.
  
  In Australia, where the legal drinking age is 18, researchersconducted focus groups and surveyed teensages 15 to 17 about the use of what they called zero-alcohol beverages. They found that more than a third had tried zero-alcohol drinks, and more than 1 in 5 were drinking them at least monthly. In the survey, teens who said they had tried zero-alcohol drinks were 2.5 times more likely to have also drunk alcohol compared with those who’d never had them.
  
  Dr. Leon Booth, a research policy fellow at the George Institute for Global Health in New South Wales, Australia, said teens appear to be drinking these for a mix of reasons. Some were just curious about new products and tried them but didn’t drink them frequently. Others, though, said they had used zero-alcohol drinks to fit in with older friends who were drinking.
  
  “They are effectively role-playing drinking when they choose a zero-alcohol version of an alcoholic product, instead of a regular soft drink or something else obviously not alcoholic,” Booth wrote in an email.
  
