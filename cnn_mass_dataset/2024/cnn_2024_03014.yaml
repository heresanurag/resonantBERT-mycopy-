  “In the focus group discussions, a few teens mentioned they had gotten used to the taste of beer by drinking zero alcohol versions, which suggests that zero alcohol beverages can acclimatise young people to the taste of alcoholic beer,” he added.
  
  The Distilled Spirits Council, a group that represents manufacturers of alcoholic drinks, said its members agree that nonalcoholic beverages that are made to look like the real thing shouldn’t be consumed by kids and teens.
  
  “Non-alcohol beverages using alcohol branding are made for adult consumption and many alcohol producers havecommittedto voluntarily print age restrictions on alcohol-free extensions of alcohol brands,” Lisa Hawkins, a spokesperson for the council, wrote in an email. The group says it has no position on state-mandated age restrictions.
  
  A spokesperson for Budweiser echoed that sentiment.
  
  “Anheuser-Busch has a longstanding commitment to responsible drinking: all of our beers and non-alcohol beers are marketed to and intended for adults 21 years of age and older, and we operate in strict compliance with the Beer Institute’s Advertising & Marketing Code,” they said in a statement.
  
  Constellation Brands, which markets Corona beverages, didn’t respond to a request for comment.
  
  Bowdring says there’s little research on how often kids in the US may be drinking these, although she’s working on a survey now. She also contacted officiais in all 50 states and the District of Columbia to see whether they regulate the sale of nonalcoholic beverages. It turns out most don’t.
  
  Twelve states limit the sale of nonalcoholic beverages to minors to some degree, Bowdring said, but her research suggests that most of these regulations were sort of accidental more than intentional.
  
  “My read of the situation, having talked to a lot of folks, is that there weren’t specific laws or policies written in for nonalcoholic beverages, but rather their definition of alcohol simply encompassed nonalcoholic beverages,” she said.
  
