  Georgia and Idaho don’t sell nonalcoholic drinks to minors because they regulate based on the way a beverage is made, rather than by how much alcohol it contains. If it’s brewed like beer, it’s beer.
  
  Florida and Kansas have a stricter definition than federal regulators. These states count any drink as alcoholic if it has any measurable amount of alcohol. So minors in those states can buy nonalcoholic drinks but not those with low levels of alcohol.
  
  Overall, Bowdring said, there’s a limited and concerning lack of restrictions on the sale of this category of beverages, given their potential association with alcohol use.
  
  Nonalcoholic beverages may be good for adults who are trying to kick the habit or cut back on how much they drink, she said, but kids are a different story.
  
  For minors, there’s no benefit in consuming nonalcoholic drinks, and there is some evidence of potential harm, she said — which is why she thinks states need to step in to curb sales.
