title: "What to know about West Nile virus, the illness that sickened Dr. Anthony Fauci"
date: "2024-08-29"
section: "Health"
url: "https://www.cnn.com/2024/08/29/health/west-nile-virus-cases-wellness/index.html"
content: |
  When Dr. Anthony Fauci became infected with West Nile virus, a mosquito-borne disease, it was so severe that he had to be hospitalized.
  
  Fauci, once the top US infectious disease expert, isnow recovering at home—althoughhe told Stat, the health and medical news website, that it could take “weeks and weeks to get back to normal.”
  
  With summer temperatures persisting, I wanted to know more about West Nile — what are the symptoms and what makes it so serious? Are there vaccines and treatments available? And, as the summer’s high temperatures and peak mosquito season continues, what can we do to reduce our risk of contracting this and other mosquito-borne illnesses?
  
  West Nile Virus Fast Facts
  
  To help with these questions, I spoke with CNN wellness expert Dr. Leana Wen. Wen is an emergency physician and clinical associate professor at George Washington University. She previously was Baltimore’s health commissioner.
  
  Dr. Leana Wen:West Nile virus is the No. 1 cause of mosquito-borne disease in the continental US, according to theUS Centers for Disease Control and Prevention. It is most commonly spread through the bite of an infected mosquito. The time of the year when this disease is most often seen is the summer and early fall.
  
  Most people infected with West Nile virus are asymptomatic. Of those who develop symptoms, many have flu-like symptoms such as fever, headaches, body aches, swollen lymph nodes and nausea.
  
  There is a subset of people who develop a neurological form of the disease. (Fauci said he did not.) These cases can involve brain inflammation and swelling resulting in confusion, seizures, paralysis, coma and death. Individuals can also experiencelong-term neurological consequencesas a result of contracting West Nile.
  
  Wen:In the US this year, the CDC has documented33 statesthat have had West Nile cases. In 2023,47 statesreported West Nile cases; in total, there weremore than 2,400 reported instances, though this was likely a significant undercount given the number of asymptomatic and mildly symptomatic cases.
  
  The West Nile virus is also foundthroughout the world, including across Africa, Europe, Asia and the Middle East.
  
  Wen:West Nile cannot be transmitted through casual contact with other humans who have the disease. Humans are also believed to be “dead-end hosts,” meaning that a mosquito that bites an infected human is not going to transmit the virus to another human.
  
  However, there have beendocumented casesof transmission through blood transfusion, organ transplantation and, rarely, from mother to baby during pregnancy and breastfeeding. The dominant mode of transmission, by far, is through mosquito bites.
  
  In the US, West Nile virus is leading cause of viral disease spread by insects, CDC study says
  
  Wen:There areblood teststhat can detect antibodies to West Nile virus that are used for diagnosis. Patients with the neurological form of the illness may also receive a spinal tap, and testing could be done of the spinal fluid.
  
  Individuals concerned about West Nile should speak with their health care provider to discuss whether and how they can pursue diagnostic testing.
  
  Wen:Unfortunately, there is no vaccine and no specific antiviral treatment for West Nile. Individuals diagnosed with it receive supportive treatment to address their symptoms, but there is no directed antiviral therapeutic at this time.
  
  What scientists say keeps mosquitoes at bay
  
  Wen:Dengue is another example of a virus transmitted by mosquito. Most cases in the US are from travelers, but local transmission has also occurred. Those traveling to other parts of the world need to consider malaria, which could be deadly.
  
  And there are rarer cases of mosquito-borne diseases that can be very serious. For instance,Eastern equine encephalitis, also called EEE, was recently reported in Massachusetts — a disease that hasa mortality rate of about 30%.
  
  With pandemic memories fresh, town’s voluntary curfew to prevent spread of lethal mosquito-borne virus draws ire
  
  Wen:Prevention is key, especially as there is no specific vaccine or treatment for West Nile. People should take these steps between peak West Nile season, which is typically July to September, though cases have also been reported in the continental United States as early as June and as late as October.
  
  First, reduce mosquito bites. Wear long-sleeve shirts and long pants when possible, especially when going out at sunrise, sundown and during the night, when mosquitoes are most active. ApplyUS Environmental Protection Agency-registeredinsect repellents to all areas of exposed skin. These will contain active ingredients like DEET. When used as directed, they are safe, including for children and pregnant women. An added step is to wearpermethrin-treated clothing, which further reduces the risk of mosquito bites.
  
  Mosquitoes and ticks are showing up with greater frequency. Here’s how to stay safe this summer
  
  Second, work to reduce mosquitoes near you. Use screens on windows and doors, especially between dusk and dawn. Remove standing water in your garden and around your home, as these are key breeding grounds for mosquitoes. Look for items around your home that can hold water, like buckets, trash containers and toys, and empty and wash them at least once a week.
  
  Third, assess your personal risk. If you are going to be traveling out of the country and going to areas known to have diseases such as yellow fever and malaria, make sure to ask your health care provider about additional prophylactic steps, such as the yellow fever vaccine and antimalarial pills.
  
  Know, though, that there are risks close to home, too. Fauci said that he believes he got bitten by mosquitoesin his gardenin suburban Washington, DC.
