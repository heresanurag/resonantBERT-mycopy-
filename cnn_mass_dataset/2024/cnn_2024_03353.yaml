title: "Saudi Arabia to chair UN forum on women’s rights and gender equality"
date: "2024-03-28"
section: "Middle East"
url: "https://www.cnn.com/2024/03/28/middleeast/saudi-arabia-chair-un-gender-equality-forum-intl/index.html"
content: |
  A decision by the United Nations to appoint Saudi Arabia as the chair of a gender equality forum has been criticized by women’s rights advocates.
  
  The UN’s Commission on the Status of Women (CSW) unanimously appointed Saudi Arabia to chair its 69th session in 2025, according to theSaudi Arabia Mission to the UN. Saudi ambassador to the UN, Abdulaziz Alwasil, was elected as chair Wednesday.
  
  Ahead of the decision,Amnesty InternationalDeputy Director for Advocacy Sherine Tadros called out Saudi Arabia for its notorious treatment of women.
  
  “The Commission on the Status of Women has a clear mandate to promote women’s rights and gender equality and it is vital for the chair of the commission to uphold this. Saudi Arabia’s abysmal record when it comes to protecting and promoting the rights of women puts a spotlight on the vast gulf between the lived reality for women and girls in Saudi Arabia, and the aspirations of the commission,” Tadros said Friday.
  
  “Saudi Arabia cannot prove its commitment to women’s rights merely by securing a leadership role in the commission. It must demonstrate its commitment through concrete actions domestically,” Tadros added.
  
  Human Rights Watchalso warned about the UN decision, saying last week that “Saudi Arabia systematically discriminates against women and persecutes women’s rights activists.”
  
