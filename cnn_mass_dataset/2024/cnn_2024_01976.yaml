  Today, CNN 10 heads to Iowa, where former President Donald Trump convincingly won that state’s caucuses. We explain what the results mean and what’s next as 2024 presidential candidates look to win their party’s nomination. Then, we head to Iceland, where an erupting volcano threatens a small fishing town for the second time in less than a month. And before you go, we speak to a professor who gives us tips on how to turn New Year’s resolutions into reality. All that and more on this episode of CNN 10.
  
