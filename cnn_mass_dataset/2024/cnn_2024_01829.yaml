title: "False claims about the federal response to Helene are an ominous sign for the coming election"
date: "2024-10-05"
section: "Media"
url: "https://www.cnn.com/2024/10/05/media/hurricane-helene-fema-false-claims-recovery/index.html"
content: |
  False claims about the federal response to the historic devastation left by Hurricane Helene are spreading out of control on social media, hampering recovery efforts in hard-hit areas, according to local officials.
  
  The flood of misinformation targeting the Biden administration’s response to the destructive storm is an ominous sign for the coming election, with the presidential contest between former President Donald Trump and Vice President Kamala Harris sure to trigger further attacks on the truth.
  
  “If you think the lies and distortions and know-nothing takes about FEMA are bad, just wait until this time next month,” Tim Alberta, The Atlantic staff writer and author,wrote on X, one of the primary platforms where falsehoods have spread faster than facts.
  
  Elon Musk, the X owner who hasendorsed Trump, has repeatedly posted rumors and innuendo denigrating the federal government’s response to Helene. Most of the misinformation is brazenly political, portraying President Joe Biden and Harris as incompetent in an attempt to help Trump win reelection.
  
  With misinformation swirling in Hurricane Helene’s wake, officials urge residents to ‘stop this conspiracy theory junk’
  
  Politicians and emergency responders in the disaster zone stretching from Georgia to North Carolina, including many Republican elected officials,have refuted the liesand urged people to stop sharing unsupported rumors on social media.
  
  Kerry Giles, the public information officer for Rutherford County, NC, told CNN on Saturday that debunking the rumors “did consume resources that could have been more effectively utilized in the recovery efforts.”
  
  Giles and her colleagues issued a statement on Friday shutting down several lies swirling online about the devastated towns of Lake Lure and Chimney Rock Village. No, they said, the government is not taking over Chimney Rock; no, there is no discussion about seizing property; no, there are not dead “bodies everywhere” as a result of the storm.
  
  “Snopes.comandregional media outletshave covered much of the debunking, which has helped to reduce some of the misinformation circulating,” Giles told CNN.
  
  Some of the most-shared lies on social media have involved FEMA’s response. Trumphas falsely claimedthat relief funds are being withheld from predominantly Republican areas after the agency directed relief money to help migrants.
  
  “A billion dollars was stolen from FEMA to use it for illegal migrants,” Trump falsely claimed Friday in Georgia.
  
  But Trump was actually accusing the Biden administration of an actvery similar to something he did as president.
  
  “Republican elected officials keep rebutting the BS, and MAGA does not care,” conservative columnist David French said in a social media post Saturday. “They follow liars, and when the liars lie, they believe them and hate anyone who tells the truth.”
  
  People desperate for answers as family members remain unaccounted for days after Helene’s devastation
  
  Veteran users of X say the sheer amount of bogus and baseless information on the platform is getting worse – in part because Musk reversedeffortsto reduceviral misinformation andreinstated accountsof conspiracy theorists.
  
  Officials at FEMA have published arumor control pageto push back on bogus claims, including the assertion that it “is confiscating donations for survivors.” Mike Rothschild, a journalist who has written two books about conspiracy theory culture, called FEMA’s effort “noble but doomed.” Hewrote on Xthat “nobody who wants to believe the lies will trust the source, and the denials will just be rolled into the conspiracy theories.”
  
  Or, as the hosts of the progressive podcast Appodlachiacommented, more bluntly, “the internet has broken peoples’ brains.”
  
  Misleading AI-generated images purporting to be from the disaster zone have been proliferating on Facebook, leading one local news stationto publisha “how to spot AI-generated Helene storm photos” explainer.
  
  As North Carolina columnist Billy Ballwrote on Friday, “We have a lot of crises in the U.S., but few are as significant as the information crisis. People are lying to us to make us hate each other, to get our money, to boost some cause or another.”
  
  And all signs point to an even uglier climate once votes start to be counted next month.
