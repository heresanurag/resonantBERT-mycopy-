title: "Pentagon chief loses bid to reject 9/11 plea deals"
date: "2024-12-31"
section: "Politics"
url: "https://www.cnn.com/2024/12/31/politics/9-11-plea-deals-appeals-court/index.html"
content: |
  A military appeals court has ruled against Defense Secretary Lloyd Austin’seffort to throw outthe plea deals reached for Khalid Sheikh Mohammed and two other defendants in the 9/11 attacks, a US official said.
  
  The decision puts back on track the agreements that would have the three men plead guilty to one of the deadliest attacks ever on the United States in exchange for being spared the possibility of the death penalty. The attacks by al Qaeda killed nearly 3,000 people on September 11, 2001, and helped spur US invasions of Afghanistan and Iraq in what the George W. Bush administration called its war on terror.
  
  The military appeals court released its ruling Monday night, according to the US official, who was not authorized to discuss the matter publicly and spoke on condition of anonymity.
  
  US repatriates Tunisian detainee held without charge at Guantanamo Bay since the day it opened
  
  Military prosecutors and defense attorneys for Mohammed, the accused mastermind of the attacks, and two co-defendantsreached the plea agreementsin July after two years of government-approved negotiations.
  
  Supporters of the plea agreement see it as a way of resolving the legally troubled case against the men at the US military commission at Guantanamo Bay naval base in Cuba. Pretrial hearings for Mohammed, Walid bin Attash and Mustafa al-Hawsawi have been underway for more than a decade.
  
  Much of the focus of pretrial arguments has been on how torture of the men while in CIA custody in the first years after their detention may taint the overall evidence in the case.
  
  Within days of news of the plea deal this summer, Austin issued a brief order saying he wasnullifying them. He cited the gravity of the 9/11 attacks in saying that as defense secretary, he should decide on any plea agreements that would spare the defendants the possibility of execution.
  
  Defense lawyers said Austin had no legal authority to reject a decision already approved by the Guantanamo court’s top authority and said the move amounted to unlawful interference in the case.
  
  The military judge hearing the 9/11 case, Air Force Col. Matthew McCall, had agreed that Austinlacked standingto throw out the plea bargains after they were underway. That had set up the Defense Department’s appeal to the military appeals court.
  
  Austin now has the option of taking his effort to throw out the plea deals to the US Court of Appeals for the District of Columbia Circuit. There was no immediate word from the Pentagon on any next move.
