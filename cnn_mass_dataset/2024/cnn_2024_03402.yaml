  In astatement Monday, the Association of State and Territorial Health Officials (ASTHO) said it is “alarmed” at the measles outbreaks in the United States.
  
  “Measles was declared eliminated in the United States in 2000, but is still the most easily transmitted human virus presently in circulation. Thankfully, by following established public health principles, Americans can make informed decisions, prevent outbreaks, and protect our communities. Vaccination is the best and safest way to protect children,” Dr. Marcus Plescia, chief medical officer of ASTHO, said in the statement.
  
  “Because of the risk of severe disease from measles and the high likelihood of transmission to others even before symptoms are evident, well-established public health practice recommends that unvaccinated persons exposed to measles stay home for at least 21 days to prevent further growth of the outbreak,” he said. “While this is undoubtedly disruptive to the persons impacted, imagine how much more disruptive it would be if measles takes hold again in the United States, spreading widely, and impacting children and communities across the entire nation.”
