content: |
  Here’s what else you might have missed during your busy day:
  
  👋Welcome to 5 Things PM!Fans of having subtitles on while watching movies — even those in English — raise your hands. (Me too!) Those British and Australian accents can be a little tricky to understand, so rest assured thatyou’re not alone.
  
  1️⃣Elephant names:These gentle giants are seemingly more like humans than we might have realized. While dolphins call one another by mimicking the signature whistle of the dolphin they want to address, and parrots communicate in a similar way, wild elephantsmay go a step further in identifying one another.
  
  2️⃣Cyber attacks:Hospitals across the US — many in rural areas — have been targeted by hackers and cyber-criminals who are disrupting their ability to care for patients. Microsoft and Google are providing free or discountedsecurity updates and training.
  
  3️⃣Disney’s new ride:Visitors to the Orlando theme park will experience an attraction inspired by the entertainment giant’s first Black princess. Tiana’s Bayou Adventure is replacing the beloved yet also widely criticized Splash Mountain ride.Read why it’s so controversial. 📹See the new ridein action
  
  4️⃣Earth-first diet:Chowing down on fruits and veggies isn’t just good for you — itbenefits the planet too. That type of diet dramatically reduces the release of greenhouse gases along with your risk of premature death. It’s a win-win.
  
  5️⃣WNBA fans:Women’s basketball has been hitting new heights lately, and now we have somestatistics to back that up. The league said the first month of the season saw record television ratings and the highest attendance numbers in 26 years.
  
  👀Costly stunt:YouTube star Alex Choi was arrested after posting a video showing a low-flyinghelicopter shooting fireworksat a Lamborghini, authorities in California said. No injuries were reported, and the video has been taken down from his channel.
  
  📸Colorful camouflage:As a teenager, Thandiwe Muriu created elaborate photo shoots with her sisters in the family’s garden. Now shespecializes in striking imagesof African beauty and womanhood.
  
  The Coast Guard lied to me. I can no longer in good conscience be part of an organization that would betray me (and) betray victims of sexual assault.
  
  Shannon Norenberg, head of sexual assault prevention at the Coast Guard Academy
  
  Stepping down:Norenberg’s allegationswere made ahead of a congressional hearing this week where the Coast Guard’s first female commandant will testify about the scandal.
  
  🎾Spanish tennis star Carlos Alcaraz just won a thrilling five-set match for his first title at which tournament?A. US OpenB. WimbledonC. Australian OpenD. French Open⬇️Scroll down for the answer.
  
  🗓️Tomorrow:President Bidenwill address a gun violence prevention conferencein Washington, DC, nearly two years after he signed the first major federal gun safety legislation in decades. His campaign believes this will be a key election issue.
  
  😎We like to wrap things up on a positive note:Rudy Lopez was umpiring at a baseball game in California when he suffered a heart attack. Luckily for him, pediatric nurse Lakeysha Pack was in the stands cheering for her son. She ran onto the field and performed CPR on Lopez until paramedics arrived. “All I saw was me and Rudy,” she said. “I didn’t hear anything. I didn’t see anything. It was just me and him.”See what happened next.
  
