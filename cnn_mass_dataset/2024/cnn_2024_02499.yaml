  A cityreport released in Mayfound that clearing camps and enforcing anticamping laws that ban people from sleeping, sitting, or keeping belongings on sidewalks in certain sensitive areas, including school zones, parks, or freeway underpasses, is not effectively helping people into housing. After spending roughly $3 million enforcing anticamping laws from 2021 to 2023, the report found, the city placed just two people into permanent housing and 81% of encampment sites have been repopulated.
  
  In onecentral Los Angeles districtwhere law enforcement is not aggressively enforcing anticamping laws, street homelessness fellroughly 38%in a one-year period from 2023 to 2024, said Indu Subaiya, interim CEO for the nonprofitHealthcare in Action, which has been housing and treating patients there.
  
  “We’re starting to actually see results and reductions in unsheltered homelessness,” Subaiya said. “However, in Southern California counties aggressively enforcing Newsom’s executive order and clearing encampments, we’re seeing our patients and their medical conditions set back profoundly.”
  
  Once Douglass was released, he was back in the Tenderloin hunting for housing and popping his tent up the street from his previous hangout.
  
  “Every time I try to get my documents to get housing, I get knocked backwards,” he said. “I guess the city thinks we all need to be in handcuffs.”
  
  By the next morning, the encampment had grown twice in size.
  
