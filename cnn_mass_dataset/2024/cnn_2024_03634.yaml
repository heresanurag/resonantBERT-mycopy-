title: "Amazon plans to donate $1 million to President-elect Donald Trump’s inauguration"
date: "2024-12-12"
section: "Tech"
url: "https://www.cnn.com/2024/12/12/tech/amazon-plans-to-donate-usd1-million-to-president-elect-donald-trumps-inauguration/index.html"
content: |
  Amazon is planning to donate $1 million to President-elect Donald Trump’s inauguration, a person familiar with the matter told CNN. Amazon founder Jeff Bezos is expected to visit with Trump in person in the coming days, as he and other tech founders seek closer relationships with the incoming president.
  
  Amazon will donate $1 million in cash to the inauguration and it will make a $1 million in-kind donation by streaming the event on Amazon Video, the company confirmed to CNN Thursday evening.
  
  Bezos and Trump spoke over the summer after the first assassination attempt. Bezos publicly praised Trump at the time.
  
  “Our former President showed tremendous grace and courage under literal fire tonight,”Bezos wrote on Xat the time.
  
  Trump has been warming up to tech giants. He has flaunted his private conversations with them in interviews and appearances and now heaps praise on companies he once blamed in part for his 2020 electoral defeat.
  
  The Wall Street Journalfirst reportedthe planned donation.
  
  Bezos joins other tech leaders in looking to foster a closer relationship with the president-elect.
  
  Meta confirmed Wednesday that itdonated $1 million to the inaugural fund, two weeks after Meta CEO Mark Zuckerberg met with Trump privately at Mar-a-Lago. It’s a major shift from the company’s previous approach to Trump nearly four years ago, when it banned him from its platforms after the January 6, 2021, insurrection.
  
  Trump had also previously criticized Bezos over his ownership of The Washington Post and the newspaper’s coverage of him.
  
  Trumptweetedin 2015, “If @amazon ever had to pay fair taxes, its stock would crash and it would crumble like a paper bag. The @washingtonpost scam is saving it!”
  
  More recently, the Post was thrown into turmoil in late October afterBezos withheld the newspaper’s endorsementin the 2024 presidential race.
  
  “Presidential endorsements do nothing to tip the scales of an election,”Bezos wrote in an op-ed. “No undecided voters in Pennsylvania are going to say, ‘I’m going with Newspaper A’s endorsement.’ None. What presidential endorsements actually do is create a perception of bias. A perception of non-independence. Ending them is a principled decision, and it’s the right one.”
  
  The decision had deep ramifications for the newspaper. Members of the Post’s editorial boardresigned over the decisionnot to issue its endorsement of Vice President Kamala Harris, and thousands of readers canceled their subscriptions to the newspaper. Staffers also publicly expressed their dissent.
  
  Trump had also met with executives from Blue Origin, a Bezos-founded spacefaring company. In his op-ed, Bezos deniedallegations hewithheld the endorsement to curry favor with Trump, saying he had no advance knowledge of the meeting.
  
  Trump has also repeatedly squabbled with Zuckerberg over the years. The president-elect appeared to threaten the Meta chief in a book published this year.
  
  “We are watching him closely, and if he does anything illegal this time he will spend the rest of his life in prison — as will others who cheat in the 2024 Presidential Election,” hewrote.
  
  This story has been updated with additional context and developments.
