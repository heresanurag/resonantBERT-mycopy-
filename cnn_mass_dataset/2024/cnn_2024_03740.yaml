title: "FDA advisers weigh benefits of weekly insulin for people with diabetes"
date: "2024-05-24"
section: "Health"
url: "https://www.cnn.com/2024/05/24/health/weekly-insulin-fda-committee/index.html"
content: |
  Most types ofinsulin therapy, an important part of diabetes treatment for many people, are given as daily injections to help manage blood sugar levels. Now, the maker of a once-weekly insulin injection is seeking approval from the US Food and Drug Administration, but a committee of agency advisers is divided on whether the benefits of the product may outweigh the risks.
  
  In a meeting Friday, theFDA’s Endocrinologic and Metabolic Drugs Advisory Committeeweighed whether the benefits of Novo Nordisk’s weekly product, called insulin icodec, outweigh its risks. If the agency signs off, the treatment will be the first weekly insulin available in the United States.
  
  More Americans can now get insulin for $35
  
  Thecommittee’s discussionsfocused on the safety and efficacy of insulin icodec, specifically in people with type 1 diabetes. The advisers were asked to answer a question of, based on the available data, whether Novo Nordisk has demonstrated that the benefits of insulin icodec outweigh its risks for improving glycemic control in adults with type 1 diabetes. Four voted yes. Seven voted no.
  
  The advisory committee’s discussions and voting outcomes will be shared with the FDA, which takes into consideration but does not have to follow the committee’s advice when deciding whether to approve thetreatment.
  
  An analysis ofPhase 3 clinical trialsfound that once-weekly insulin icodec was better at reducing high blood glucose levels in comparison with the once-daily therapy insulin degludec, but insulin icodec was associated with a higher incidence of hypoglycemia, also known aslow blood glucose, which can lead to a loss of consciousness or seizures.
  
  “Insulin icodec was associated with 50 to 80% more clinically significant or severe hypoglycemia compared to insulin degludec at Week 52, depending on the method of analysis,” the committee’s meeting materials say.
  
  If the product is approved by the FDA, some panel members said, there should be guidance on ways to mitigate and treat the risk of hypoglycemia.
  
  Committee member Dr. Barbara Onumah, a endocrinology in Largo, Maryland, voted yes on the benefits of insulin icodec outweighing its risks.
  
  “This would add a tool to the toolbox for clinicians,” Onumah said.
  
