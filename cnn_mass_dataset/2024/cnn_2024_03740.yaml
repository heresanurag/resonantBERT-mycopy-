  The committee also discussed how a weekly insulin injection might be an easier treatment regimen to follow than daily injections.
  
  Studies suggest that about 53% of adults with type 1 diabetes adhere to existing insulin therapy schedules, “with approximately 22% of patients missing at least one basal insulin dose over any 14-day period,” according to theFDA advisory committee’s meeting materials. “Nonadherence to insulin therapy is a precipitating factor for diabetic complications such as diabetic ketoacidosis.”
  
  Novo Nordisk isn’t the only company developing a weekly insulin therapy for diabetes patients. Last week,Eli Lilly announcedthat its once-weekly insulin efsitora alfa was “equally safe and effective” in Phase 3 trials involving adults with type 2 diabetes using insulin for the first time and those who require multiple daily insulin injections. However, Lilly has not yet requested FDA approval.
