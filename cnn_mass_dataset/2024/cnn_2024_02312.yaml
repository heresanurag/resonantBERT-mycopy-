id: cnn_2024_02312
title: "He killed a man 26 years ago in Missouri. His husband secretly worked with investigators to get a confession"
date: "2024-03-29"
section: "US"
url: "https://www.cnn.com/2024/03/29/us/missouri-murder-timothy-stephenson-cec/index.html"
content: |
  On the surface, Timothy Stephenson had an enviable life. He was married to a doctor, and they lived in a $2 million home with their twin daughters in a quiet suburb east of San Francisco.
  
  But Stephenson harbored a secret: About two decades earlier, he had shot andkilled a man he met at a barin Kansas City.
  
  The crime remained unsolved until 2021, when Stephenson’s dark past finallycaught up with him. By then, his personal life was unraveling. His husband had filed for divorce the year before and the couple were locked in a legal battle over custody of their children.
  
  Authorities arrested him on murder charges that December and extradited him toMissouri. And this month, he pleaded guilty to second-degree murder and was sentenced to 16 years in prison.
  
  For Stephenson, it all came crashing down after police received new informationthat helped them piece together what happened that night back in 1998 in KansasCity.
  
  That information came from Stephenson’s estranged husband.
  
  Stephenson’s sentencing came a decade after he told his husband, Joseph Ginejko,about the killing he’d committed in Missouri. According to a probable cause statement obtained by CNN, Stephenson told his husband in 2014 that he met the man, Randall Oliphant, at a gay bar in January 1998 and they drove to Stephenson’s house in Kansas City, where he shot him twice in the bathroom.
  
  Oliphant pleaded for his life after the first shot, Stephenson said. Theprobable cause statement did not mention a motive.
  
  Oliphant’s body was found two months later in some woods in rural Benton County, Missouri, about 100 miles southeast of Kansas City. Missouri State Police said Stephenson was familiar with the area because his father and grandmother lived nearby and he’d been there many times.
  
  In his confession to his husband, Stephenson told him he later remodeled the bathroom to mask the crime scene and conceal evidence.
  
  Investigators interviewed Stephenson in 1998and he admitted to taking an “unknown male” to his home in Kansas City. But he said he gave the man a ride from his house afterward and dropped him off at a different bar.
  
  Stephenson’s phone records revealed roaming charges from a cellular tower nearwhere the victim’s body was found in rural Missouri, investigators said.
  
  In 1998, investigators also tracked down the person who’d bought Stephenson’sJeep Wrangler in May of that year – four months after the killing. The new ownertold them parts of the carpet were missing when he bought it. Police said theyfound traces of blood in the Jeep’s rear cargo area, but DNA evidence wasinconclusive.
  
  It’s not clear why police didn’t arrest Stephenson in 1998. The Missouri StateHighway Patrol declined to comment to CNN and referred questions to the BentonCounty Prosecuting Attorney’s Office, which did not respond to requests foradditional details.
  
  Stephenson and Ginejko were married in 2008 and lived with their daughters inDanville, in San Francisco’s East Bay — a suburb thatwas once namedthe safestin California.
  
  Court records show Ginejko filed for divorce in January 2020 — six years after hishusband’s startling confession — in Contra Costa County, but it’s unclear when thedivorce was finalized. Ginejko told police he tried to research the Missouri killingafter his husband’s confessionbut there was little information available online.
  
  But at some point between early 2020 and April 2021, Ginejko spoke to thepolice. Ginejko told them details about the killing that had never been publicly revealed, the probable cause statement said — suggesting that he only could have learned them from his husband.
  
  In the probable cause statement, investigators said they then staged an undercoveroperation: an April 2021 meeting between Stephenson and Ginejko that wassecretly captured on audio and video.
  
  During that conversation, which included the estranged couple talking about theirchildren, Ginejko brought up Stephenson’s 2014 confession. Stephenson’sdemeanor changed and he “became paranoid,” the court document said.Stephenson asked his husband if he was wearing a wire or recording theconversation, and even frisked him — also examining his wallet, phone and coffeecup.
  
  Ginejko asked Stephenson several times why he killed Oliphant, and his answerswere conflicting. Stephenson finally admitted that he had indeed confessed years ago to the killing, but claimed he’d told his husband that to scare him into staying with him, the court document said.
  
  Stephenson’s 16-year sentence includes credit for time served.
