  This Small Business Saturday, use your purchasing power for good and support businesses in Asheville, North Carolina, whose residents are still rebuilding after Hurricane Helene.CNN’s Impact Your World team compiled a list of local brandsthat could use some love, including acclaimed ceramicists East Fork Pottery and Spicewalla, whose vibrant spices and seasonings are beloved by home chefs. There are plenty of potential gifts on this list!
  
