  The last time Voyager 1 experienced a similar, but not identical, issue with the flight data system was in 1981, and the current problem does not appear to be connected to other glitches the spacecraft has experienced in recent years.
  
  Over time, both spacecraft have encountered unexpected issues and dropouts, including aseven-month periodin 2020 when Voyager 2 couldn’t communicate with Earth. In August 2023, the mission teamused a long-shot “shout” techniqueto restore communications with Voyager 2 after a command inadvertently oriented the spacecraft’s antenna in the wrong direction.
  
  As the aging twin Voyager probes continue exploring the cosmos, the team hasslowly turned off instrumentson these “senior citizens”to conserve power and extend their missions, Voyager’s project manager Suzanne Dodd previously told CNN.
