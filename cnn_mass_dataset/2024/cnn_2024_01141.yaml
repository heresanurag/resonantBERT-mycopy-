title: "Elon Musk says he’s moving SpaceX and X out of California"
date: "2024-07-16"
section: "Business"
url: "https://www.cnn.com/2024/07/16/business/elon-musk-spacex-x-texas/index.html"
content: |
  Elon Musk says he’s moving his companies out of California.
  
  In two posts on X Tuesday, the billionaire said he will move SpaceX’s HQ from Hawthorne, California, to Starbase, Texas, a company town being built in the southern part of the state. Social media platform X will move from San Francisco to Austin, Texas, he thensaid.
  
  Musk said thatthe SAFETY Act, a law California Gov. Gavin Newsom signed that would prohibit school districts from requiring teachers to inform parents if a child wants to be identified by a different gender, was “the final straw.”
  
  “Because of this law and the many others that preceded it, attacking both families and companies, SpaceX will now move its HQ from Hawthorne, California, to Starbase, Texas,” Muskposted on X.
  
  One ofMusk’s children petitioned a California court in 2022to recognize her new name and gender, saying she no longer wished to be related to her famous and wealthy father “in any way, shape or form.” Musk has beencriticizedfor some of his statements on X regarding gender identity issues.
  
  Elon Musk’s child tells court she no longer wants ‘to be related’ to her dad
  
  Musk said in a follow-up post that he was tired of what hedescribedasviolent crime surrounding the buildingwhere X is located in San Francisco.
  
  Musk has had an inclination toward the Lone Star State for a few years now. In February, SpaceX filed to move its business incorporation location from Delaware to Texas, aftera Delaware state judge struck down Musk’s 2018 Tesla pay package, siding with a shareholder who had challenged it as excessive.
  
  In 2021,Musk said he would move Tesla HQ from the Bay Area to Austin, Texas. And Musksaid in December 2020 that he moved to Texas.
