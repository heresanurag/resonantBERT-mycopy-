id: cnn_2024_02359
title: "Qatar is suspending its role in talks between Israel and Hamas"
date: "2024-11-09"
section: "Middle East"
url: "https://www.cnn.com/2024/11/09/middleeast/qatar-mediation-israel-hamas-intl/index.html"
content: |
  Qatar is suspending its role as amediator in talksbetween Israel and Hamas after concluding that the two sides are no longer negotiating in good faith, its foreign ministry said Saturday.
  
  Qatar, which hashosted Hamas’ political officein Doha since 2012, has alongside Egypt served as an intermediary for the two sides, which do not officially maintain direct contact.
  
  A diplomatic source briefed on the matter told CNN that the Qatari government made the decision after concluding that both sides are now refusing “to engage constructively.”
  
  “The State of Qatar notified the parties 10 days ago during the last attempts to reach an agreement, that it would stall its efforts to mediate between Hamas and Israel if an agreement was not reached in that round,” Majed Al-Ansari, the spokesperson for the Qatari Foreign Ministry,saidin a statement Saturday.
  
  Except for a brief flurry of activity last month, there have been no real negotiations since six Israeli hostageswere executed by Hamasand discovered in a Gaza tunnel at the end of August. During a temporary ceasefire mediated by Qatar and Egypt last November, Hamas released 105 hostages and Israel released 240 Palestinian prisoners.
  
  “The Qataris have concluded that there is insufficient willingness from either side, with the mediation efforts becoming more about politics and PR rather than a serious attempt to secure peace, save the hostages and Palestinian civilians,” the diplomatic source told CNN. “As a consequence, the Hamas political office no longer serves its purpose.”
  
  A separate diplomatic source told CNN that Hamas’ political office in Doha “⁠won’t be operational so (Hamas) may leave. The office could open again if talks restart.”
  
  Hamas has insisted that any agreement with Israel must lead to a permanent end to the war in Gaza. Israeli Prime Minister Benjamin Netanyahu has refused that demand. In July heeffectively spikeda draft hostage and ceasefire deal by introducing a raft of new, 11th-hour demands.
  
  There are 101 hostages still held in Gaza. Israel’s military campaign, launched in response to Hamas’ October 7 attack, has killed more than 43,000 Palestinians in Gaza, according to the Palestinian Ministry of Health; the UN reported that70% of the fatalities in the first six months of the conflictwere women and children.
  
  The Israeli minister of economy, Nir Barkat, appeared to offer the first official Israeli reaction to the move, saying on X that “Qatar was never a mediator, but Hamas’ defender, the one to fund and protect the terrorist organization.” Netanyahufor years backedpayments to Hamas through Qatar, in order to divide Palestinian politics and – detractors allege – prevent the establishment of a Palestinian state.
  
  It is not the first time the Qatari government has expressed frustration – particularly withinsinuations that it was too close to Hamas. In April, Prime Minister and Minister of Foreign Affairs Sheikh Mohammed bin Abdulrahman Al Thani said that Qatar’s efforts were being misused for “narrow political interests” by some involved in the conflict, “which required the state of Qatar to conduct a comprehensive evaluation” of its role.
  
  The Qatari government has now told the Biden administration that it is willing to restart its mediation efforts “when both sides reach an impasse and demonstrate a sincere willingness to return to the negotiating table with the objective of putting an end to the war and the suffering of civilians.”
  
  A senior American official told CNN that while Qatar had played “an invaluable role in helping to mediate a hostage deal” last year, “following Hamas’ repeated refusal to release even a small number of hostages, including most recently during meetings in Cairo, their continued presence in Doha is no longer viable or acceptable.”
  
  Alex MarquardtandMJ Leecontributed to this report.
