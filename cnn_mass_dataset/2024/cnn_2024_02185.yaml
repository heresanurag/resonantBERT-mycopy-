  Hope Village is more ambitious, according to Mark Loughnan, principal and head of design at Hassell. “It’s (our) first go (at) what we hope will prove to be a successful methodology,” he said, adding that the model could one day be replicated in other locations.
  
  For Dr. Consola Elia, who will oversee the children’s home at Hope Village, the project is “the reality of a dream that I’ve had for over 20 years,” she said in a statement.
  
  Work on the masterplan has begun, with housing already underway and construction of the community center expected to begin in early 2025.
  
  “We’re using (design) to uplift the way people experience their daily life,” said Loughnan . “We’re using it in this instance to hopefully help and heal and educate — and we’re also using it to innovate at the same time.”
