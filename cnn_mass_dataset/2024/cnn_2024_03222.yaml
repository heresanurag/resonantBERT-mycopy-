title: "Macron says ‘nothing ruled out,’ including using Western troops, to stop Russia winning Ukraine war"
date: "2024-02-27"
section: "Europe"
url: "https://www.cnn.com/2024/02/27/europe/france-macron-troops-ukraine-intl?cid=external-feeds_iluminar_google"
content: |
  French President Emmanuel Macron hasopenly discussed the possibility of sending European troopsto Ukraine to help Kyiv win the war against Russia, a potential major escalation to the largest ground war Europe has seen since World War II.
  
  Though the possibility of Western democracies putting boots on the ground in Ukraine remains remote, Macron’s comments following a summit in support of Ukraine prompted a hawkish response from the Kremlin and sent European leaders scrambling to backtrack. A NATO official told CNN the alliance had “no plans” to deploy combat troops in Ukraine.
  
  German Chancellor Olaf Scholz, who attended the meeting in Paris on Monday, said that while there was a good debate and detailed discussion on the topic, summit participants were “unanimous” in their opinion against deploying troops
  
  Macron had told reporters at a news conference that while he and the other 21 European leaders present did not agree on deploying military personnel, the prospect was discussed openly.
  
  “Nothing should be ruled out,” he said. “We will do anything we can to prevent Russia from winning this war.”
  
  However, a raft of European officials came out Tuesday against such a plan. Among them were some of Ukraine’s more ardent supporters, including the United Kingdom, Poland, Spain and Italy, as well as officials from Hungary and Slovakia, two countries whose leaders have been criticized as pro-Russian.
  
  “What was agreed among ourselves and with each other from the very beginning also applies to the future, namely that there will be no ground troops, no soldiers on Ukrainian soil sent there by European countries or NATO states,” said Scholz.
  
  Macron did, however, announce that a new coalition would be created to supply Ukraine with medium-range and long-range missiles.
  
  “We’re at a critical moment in this conflict that requires us to take the initiative,” Macron said.
  
  With $60 billion worth of American funding for Ukraineheld up by Republicans in Congress, the burden has shifted to Europe to help arm Ukraine as it attempts to fend off a resurgent Russian military.
  
  House Speaker Mike Johnson faces a defining dilemma on Ukraine
  
  Ukrainian soldiers on the frontlines say they are already running lowon ammunition, which has cost themon the battlefield. Ukrainian President Volodymyr Zelenskytold CNN in a recent interviewthat “millions” could die if Washington fails to supply his country with more aid.
  
  The European Union has already committed more than $150 billion in aid to Ukraine, but sending in troops would be a drastic step, one that was unthinkable when Russian President Vladimir Putin launched a full-scale invasion two years ago.
  
  Macron pointed out that Western democracies have gradually increased their support to levels unthinkable when the war began. He highlighted the example of Germany, which offered helmets and sleeping bags to Kyiv at the outset of the conflict and is now saying more needs to be done to supply the country with missiles and tanks.
  
  “The people that said ‘never ever’ today were the same ones who said never ever planes, never ever long-range missiles, never ever trucks. They said all that two years ago,” he said. “We have to be humble and realize that we (have) always been six to eight months late.”
  
  Kremlin spokesman Dmitry Peskov said Tuesday that such a deployment in Ukraine would put the West in conflict with Moscow.
  
  “In this case, we need to talk not about the likelihood, but about the inevitability of a conflict.” Peskov said. “These countries must also assess and be aware of this, asking themselves whether this is in their interests, as well as the interests of the citizens of their countries.”
  
  Kremlin officials have made similar comments in the past. Foreign Minister Sergey Lavrovsaid last yearthat the US, the United Kingdom and many others are “waging war” against Russia and are engaged in hostilities against the country by supplying Ukraine with assistance.
  
  In hosting Monday’s summit and committing to such a strong defense of Ukraine, Macron appears to be attemptingonce againto assert himself as the symbolic leader of a united Europe, as the continent braces for the possibility of former US President Donald Trump winning a second term.
  
  Given Trump’s antipathy toward NATO and transactional view toward alliances, leaders like Macron have stressed that the burden must fall to Europe to protect itself from any future Russian aggression.
  
  Macron warned at the start of the summit that Russia would likely attack beyond Ukraine in the coming years, threatening Europe’s collective security.
  
  “This is a European war,” Macron said. “It’s our soil and our continent.”
  
  Macron also signaled he was willing to abandon his longstanding opposition to buying arms for Ukraine from outside the EU for Ukraine. The French president had been against purchasing weapons outside the bloc to support an EU initiative known as “strategic autonomy” – bureaucratic jargon for a series of policies aimed at making Europe less reliant on the US – and other international partners in matters of foreign and defense policy.
  
  While Macron’s apparent shift on non-EU weapons acquisition may seem in conflict with Europe’s drive for self-sufficiency, it is more likely a reflection of how badly European arms stockpiles have been hit by the war in Ukraine.
  
  As long as a year ago, officials were warning that supplying Ukraine had left nations desperately short of a wide range of weapons.
  
  The urgent need to do this as soon as possible means that buying exclusively within the EU simply isn’t realistic. Region-wide﻿drops in defense spending following the end of the Cold Warled to arms manufacturers reducing their ability to make such weapons, and rebuilding the industry won’t happen overnight. This meant that Europe didn’t only need to “refill its own cupboard, but build a new cupboard and fill that too,” one European official told CNN last week.
  
  Macron’s change of heart, however, doesn’t necessarily mean he is moving on from strategic autonomy. It remains a long-term goal, but rearming Kyiv is a short-term necessity.
  
  It’s also worth noting that there is no precise end point to strategic autonomy and many European officials have shifted on what the exact role of the US should be in European security and to what extent NATO should be the broker in that, rather than the EU.
  
  But by arranging the meeting where this new short-term approach was agreed, Macron can still claim to be leading the charge on bolstering Europe’s new, more assertive and independent foreign policy.
  
  Still, even within France, Macron’s comments have proved controversial. Various opposition lawmakers criticized the comments Tuesday, saying a French deployment would constitute belligerence, though Defense Minister Sebastien Lecornuinsistedthat “to say that we exclude nothing is neither weak nor escalatory.”
  
  Meanwhile, the US State Department and the Pentagon both reiterated that President Joe Biden had ruled out sending US troops to fight in Ukraine.
  
  “Certainly every country is free to speak to its own interest, but in addition to the president making clear that the US will not send troops to fight in Ukraine, the NATO secretary general has ruled out any NATO troops to fight in Ukraine,” said State Department Spokesperson Matthew Miller at a press briefing.
  
  Pentagon spokesman Maj. Gen. Pat Ryder added: “Just to be clear, we have no plans to send US service members to fight in Ukraine.”
