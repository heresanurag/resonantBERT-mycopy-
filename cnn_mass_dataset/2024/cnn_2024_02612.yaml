id: cnn_2024_02612
title: "South Korean actor Song Jae-lim dead at 39"
date: "2024-11-12"
section: "Asia"
url: "https://www.cnn.com/2024/11/12/asia/south-korea-song-jae-lim-dead-intl-hnk/index.html"
content: |
  South Korean actor Song Jae-lim, a former model who rose to prominence in K-dramas, was found dead in Seoul on Tuesday. He was 39.
  
  Song’s body was found in his apartment by a friend, who had planned to have lunch with him that day, according to the Seoul Seongdong police. A police official told CNN that no evidence of foul play was found at the scene, and a note was discovered in the apartment.
  
  “Our initial investigation so far, has revealed no signs of criminal activity,” police told CNN. “Since the family did not want an autopsy, we will proceed with transferring the deceased to his family’s custody.” Police added that they will investigate the cause of the death following standard procedures.
  
  Born in 1985, Song began his entertainment career with the 2009 film “Actresses.”
  
  He gained widespread recognition for his portrayal of a royal guard in the 2012 historical drama “Moon Embracing the Sun,” and reached further fame through an appearance on the reality show “We Got Married.” His final performance was in the musical “La Rose De Versailles,” which ended in October.
  
  The final posts on Song’sInstagram account, two selfies shared in January, have accumulated more than 61,000 likes. Comments are disabled on the account.
  
  South Korean stars paid tribute to Song following the news of his death.
  
  Help is available if you or someone you know is struggling with suicidal thoughts or mental health matters.In the US: Call or text 988, theSuicide & Crisis Lifeline.Globally: TheInternational Association for Suicide PreventionandBefrienders Worldwidehave contact information for crisis centers around the world.
  
  “This is mad… Jae-lim… you were such a cheerful guy… I can’t believe this. I’m so sorry for not contacting you or caring for you enough,” actor Park Ho-san said alongside a photo taken with Songpostedon Instagram.
  
  In another Instagram post, actorHong Seok-cheonsaid: “I’m sad that I can’t see your wonderful smile again… I’m so sorry, rest in peace.”
  
  The recent deaths ofK-pop idolsandK-dramastars have highlighted ongoing concerns about mental healthand pressuresin South Korea’s entertainment industry.
  
  ASTRO boy band member Moon bindied last year at age 25. K-popsinger and actress Sulliwas also 25 when she died in 2019. And two years earlier, boybandSHINee’s Kim Jong-hyunwas found dead at his home at age 27.
  
  Entertainment agencies have implemented various mental health support systems, including counseling services and more flexible schedules, but observers say the highly competitive nature of K-entertainment, combined with intense public scrutiny, and expectations of perfection in appearance and behavior, are affecting stars.
