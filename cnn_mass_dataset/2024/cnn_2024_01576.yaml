title: "How a group of butterflies flew 2,600 miles across the Atlantic Ocean without stopping"
date: "2024-07-01"
section: "Science"
url: "https://www.cnn.com/2024/07/01/science/painted-lady-butterfly-cross-oceans-scn?cid=external-feeds_iluminar_cnn-brasil"
content: |
  Sign up forCNN’s Wonder Theory science newsletter. Explore the universe with news on fascinating discoveries, scientific advancements and more.
  
  Painted lady butterflies venture far and wide with their impressive migratory patterns that stretch forthousands of miles— but they often travel across land, so they can stop to rest.
  
  Scientists have now found evidence that a group of the winged travelers flew over 2,600 miles (about 4,200 kilometers) across the Atlantic Ocean without stopping, according toa new studypublished June 25 in the journal Nature Communications.
  
  The finding ends a decade-long mystery that began when entomologist and lead study author Dr. Gerard Talavera came across around 10 painted lady butterflies, known by the scientific name Vanessa cardui, on a beach inFrench Guianain October 2013. The insects, which are not usually found in South America, were worn out with holes and tears in their wings.
  
  “They looked exhausted. They even couldn’t fly very much — they kind of jumped instead of flying,” said Talavera, a Spanish National Research Council senior researcher at the Botanical Institute of Barcelona. “The only explanation that came to my mind was that these were long-distance migrants.”
  
  But crossing an entire ocean was unheard of for butterflies, even ones as worldly as the painted ladies. Talavera, along with his colleagues, had to rule out a few factors before concluding that these butterflies accomplished what was previously thought impossible.
  
  Moths actually aren’t drawn to light as previously thought, study finds
  
  AnOctober 2016 studythat Talavera coauthored found that painted ladies from Europe migrate in great distances of around 2,500 miles (about 4,000 kilometers) to sub-Saharan Africa, facing obstacles such as the Mediterranean Sea and Sahara Desert. But even so, the butterflies remain mostly over land where they can “stop and refuel, feed on flowers and then get energy to keep going,” Talavera said.
  
  Crossing the Atlantic would take a painted lady butterfly five to eight days, depending on different variables, according to the new study.
  
  Based on analyses of the energy constraints, researchers concluded that the butterflies could fly a maximum of 485 miles (780 kilometers) or so without stopping, but favorable wind conditions are what allowed them to complete the lengthy journey, Talavera said.
  
  “This is actually kind of a record for an insect, especially for a butterfly, to perform such a long flight without possibilities to stop,” said Talavera, who also leads the Worldwide Painted Lady Migration Project, a global citizen science project that tracks the migratory routes of the insects.
  
  There have been other instances in which experts suspect butterflies and other migratory insects of traveling longer distances than usual, turning up on boats, remote islands or countries where they are not usually found, Talavera said.
  
  The researchers believe that these butterflies took part in their annual migration south from Europe but got lost when the wind blew them into the ocean, he added. The butterflies then likely rode out the trade winds, whichblow east to west near the equator, until they reached land in South America.
  
