title: "Lilly launches lower-price weight loss drug without injector pen"
date: "2024-08-27"
section: "Health"
url: "https://www.cnn.com/2024/08/27/health/zepbound-tirzepatide-new-vials/index.html"
content: |
  Starter doses of the weight-loss drug Zepbound are now available in single-dose vials, drug manufacturer Eli Lilly announced Tuesday, a move the company says will “significantly” expand supply as it sees continued high demand.
  
  Tirzepatide cuts risk of diabetes by 94% in adults with prediabetes and obesity or overweight, drugmaker says
  
  Instead of a preloaded injector pen, patients will use a syringe to draw out the medicine.
  
  Tirzepatide, the active ingredient in Zepbound and Mounjaro, is part of new class of medications used to treat obesity and diabetes that have skyrocketed in popularity, drivingshortages— and leading some people to use versions made by compounding pharmacies.
  
  “These new vials not only help us meet the high demand for our obesity medicine, but also broaden access for patients seeking a safe and effective treatment option,” Patrik Jonsson, president of Lilly Cardiometabolic Health and Lilly USA, said in a statement.
  
  The new vials will be available exclusively to people who pay out of pocket through LillyDirect, a company platform that helps coordinate telehealth services and fill prescriptions for patients.
  
  A four-week supply of 2.5-milligram (mg) vials is $399, and a four-week supply of 5-mg vials is $529, less than half the list price of other GLP-1 medicines for obesity, according to Eli Lilly.
  
  These prices are in line with those offered through Lilly’s savings program for uninsured people, the company said. But the option to pay out-of-pocket for the vials now expands access to patients who aren’t eligible for the savings program, such as those on Medicare.
  
  “Despite obesity being recognized as a serious chronic illness with long-term consequences, it’s often misclassified as a lifestyle choice, resulting in many employers and the federal government excluding medications like Zepbound from insurance coverage,” Jonsson said. “Outdated policies and lack of coverage for obesity medications create an urgent need for more innovative solutions. Bringing Zepbound single-dose vials to patients will help more people living with obesity manage this chronic condition. We will also continue to advocate for a system that better aligns with the science.”
  
  President Joe Biden heralded Lilly’s announcement on Tuesday, pointing to it as an example of the fruits of his work to lower the cost of prescription drugs.
  
  “Today, I am pleased to see one of these manufacturers, Eli Lilly, taking steps to lower their price by offering a direct-to-consumer version of their medication for less than half the price they used to charge. This is a welcome first step for American families struggling to access these drugs,” Biden said in a statement.
  
  Eli Lilly launches service to connect patients with telehealth care, deliver medications to their homes
  
  He added that it is “critical that drug companies lower their prices across the board.”
  
  Tirzepatide works by mimicking hormones that stimulate the release of insulin, increase feelings of fullness and reduce appetite. It targets two hormone receptors, GIP and GLP-1. Semgalutide, known as Ozempic for diabetes and Wegovy for weight loss, is also part of this broad class of drugs.
  
  The ongoing shortages of tirzepatide and other popular weight-loss drugs have allowed for compounded versions of the treatments – with similar or related ingredients – to hit the market, with less oversight and regulation from the US Food and Drug Administration.
  
  The FDA has issued awarninglast month about compounded versions of semaglutide; the agency says that it has received reports of adverse events – some requiring hospitalization – due to dosing errors related to units of measurement, varying product concentrations and use of multiple-dose vials. Patients “should not use a compounded drug if an approved drug is available,” the agency hassaid.
  
  Eli Lilly has also raised concerns about the potential risks that compounded versions of its drugs pose to patients. In an openletterin June, the company emphasized that it is the “only lawful supplier of FDA-approved tirzepatide medicines” and that products from other unverified sources may be “fake, counterfeit, or otherwise unsafe products.”
  
  “[Safety] is our number one priority, and this is a great way for patients to know they’re getting genuine Lilly medicine,” said Rhonda Pacheco, group vice president for Lilly US Cardiometabolic Health. Thousands of people use LillyDirect each week, she said.
  
  The experience for people who self-inject tirzepatide with a syringe that was filled from a vial would probably be similar to using a prefilled pen — and it might come with some added benefits, said Dr. Jody Dushay, an endocrinologist at Beth Israel Deaconess Medical Center and assistant professor of medicine at Harvard Medical School.
  
