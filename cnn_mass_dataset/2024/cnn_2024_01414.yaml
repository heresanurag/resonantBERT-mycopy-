  Fireballs are typically caused by meteors more 3 feet (1 meter) long, according toNASA, making them appear brighter as they burn up in Earth’s atmosphere.
  
  The Southern Taurids are made up of debrisfrom Comet Encke, which has an orbital period of about 3.3 years around the sun — the shortest orbit of any known comet in the solar system. The celestial body creates a broad stream of debris that Earth encounters every year. When the particles enter Earth’s atmosphere, they create the meteors we see streaking across the sky.
  
  “If you have larger chunks of material, it will take longer to burn up, so it’ll be a brighter, longer streak — a fireball is one of these (relatively) big ones,” Schmoll said. Occasionally, the bigger space rocks fall to the ground, in which case they are known as meteorites, but most of the particles are too small and burn out quickly, she added.
  
  What is known about the daytime fireball seen over the New York metropolitan area
  
  Every few years, the Taurid showers see an increase in the rates of meteors produced, often called the Taurid “swarm,” such as thehigher rates created in 2022. This heightened activity is usually seen every three or seven years, according to theAmerican Meteor Society.
  
  Normal rates are expected this year for the Taurid showers — scientists predictthe next swarmto occur in 2025 — but the celestial display could still offer a sight to see, Schmoll said.
  
  “I think it’s really good for us to have those moments of focusing on the beauty of the universe … to have that connection to nature and outside and marvel at what’s out there,” Schmoll said. “There’s something so exciting about seeing that streak of light, that interaction of the Earth with the rest of the solar system.”
  
  Meteors from the Southern Taurids are expected to be seen blazing across the sky until their finality on December 8, according to the American Meteor Society.
  
