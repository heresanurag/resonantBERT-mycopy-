title: "Famous fossil is really just paint, rocks and a couple of bones, researchers say"
date: "2024-02-20"
section: "World"
url: "https://www.cnn.com/2024/02/20/world/ancient-reptile-fossil-forgery-scn?cid=external-feeds_iluminar_cnn-brasil"
content: |
