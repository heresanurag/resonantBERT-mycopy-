id: cnn_2024_01838
title: "NYC taxi driver was having a medical episode when he jumped the curb and hit people, police say"
date: "2024-12-26"
section: "US"
url: "https://www.cnn.com/2024/12/26/us/new-york-taxi-driver-hits-pedestrians/index.html"
content: |
  A taxi driver whose car hit six pedestrians when hejumped a curbin a Manhattan shopping district on Christmas Day was having a medical episode at the time, New York City police said Thursday.
  
  An NYPD spokesperson would not elaborate on the type of medical episode but said no criminality is suspected at this time. The 58-year-old was taken to a hospital in stable condition for further evaluation.
  
  Also hospitalized after the yellow taxi drove onto the sidewalk across the street from Macy’s flagship store in Herald Square were a 9-year-old boy with a laceration to his right thigh, a 49-year-old woman with a leg injury and a 41-year-old woman. All were in stable condition, police said.
  
  Three other pedestrians, women aged 19, 37 and 49, declined medical treatment.
  
  Herald Square is a major shopping destination for tourists and locals, with the Macy’s store taking up an entire city block between 34th and 35th streets. It is among the city’s many retailers that feature elaborate Christmas window displays.
