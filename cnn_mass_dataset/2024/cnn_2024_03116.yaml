title: "An hour-by-hour guide to election night poll closings"
date: "2024-11-05"
section: "Politics"
url: "https://www.cnn.com/2024/11/05/politics/polls-close-time-election-dg/index.html"
content: |
  The 2024 presidential electionwill decide control of the White House, Senate, House of Representatives, gubernatorial offices and ballot measures on key issues in many states. This is a guide to poll closing times and includes notable down ballot races – both competitive and not. See race ratings forSenateandHouseby Inside Elections with Nathan L. Gonzales. Click on a state’s name to see results and projections for that state once votes start being counted.
  
  Election night begins as the first polls close in parts of Kentucky and Indiana.
  
  CORRECTION: This story has been corrected to reflect that the poll closing time in Indiana’s 6th District is 6 p.m. ET.
