title: "Adele bids a tearful farewell to Las Vegas audience on final night of her residency"
date: "2024-11-24"
section: "Entertainment"
url: "https://www.cnn.com/2024/11/24/entertainment/adele-las-vegas-residency-end?cid=ios_app"
content: |
  The time has finally come for singer Adele to saygoodbyeto her Las Vegas residency Weekends with Adele.
  
  Adele on Saturday performed her final show at The Colosseum at Caesars Palace and made an emotional speech about the show that drew astarry crowdand became one of The Strip’s most popular tickets to get.
  
  “It’s been wonderful and I will miss it terribly, and I will miss you terribly,” Adele tearfully told the audience on Saturday, according tovideosposted online. “The only thing I’m good at is singing. I just don’t know when I want to next come on stage but I love you.”
  
  Adele told the audience that she decided to do a residency instead touring around the world with her son Angelo, 11, in mind.
  
  “I chose to do a residency so I could keep his life normal,” she said, adding that she’s looking forward to spending her weekends with him again.
  
  Addressing her son directly, she said “I love you to bits.”
  
  Adele also thanked her partner Rich Paul for “always picking me up and making me feel like I could do whatever I want to do.”
  
  “I am emotional but also, just so you know, I got closure when Celine Dion came to my show,” Adele said. “I cried for a whole week!”
  
  DionattendedAdele’s concert last month and the powerhouse vocalists brought each other to tears after an emotional interaction in the audience. The wholesome moment quickly went viral online.
  
  “It was just such a full circle moment for me because that’s the only reason I ever wanted to be in here,” Adele said, nodding to the fact that her residency took place in the same venue that was built for Dion when she first launched her own Las Vegas residency more than two decades ago.
  
  Adele hadpreviouslyspoken about how she intended to take an extended “break” once the residency concluded, telling her audience during her special Munich concert series in September that she has “spent the last seven years building a new life for myself, and I want to live it.”
  
  Weekends with Adele began in November 2022.
  
  “I am so sad that this residency is over but I am so glad that it happened,” she said, according to anothervideoposted online. “I am bursting, bursting, bursting with pride.”
