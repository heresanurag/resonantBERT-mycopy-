title: "Ford becomes the latest company to scale back its diversity and inclusion policies"
date: "2024-08-29"
section: "Business"
url: "https://www.cnn.com/2024/08/29/business/ford-dei-policies-robby-starbuck?cid=external-feeds_iluminar_yahoo"
content: |
  Ford is changing some of its diversity and inclusion policies, joining a growing list of companies altering their approaches amid a changing legal and political environment and online pressure from the right.
  
  Ford CEO Jim Farley said in an email to employees Wednesday that the company has changed some of its policies in the past year. It has shifted its employee resource groups’ focus and ended participation in external culture surveys by the Human Rights Campaign, an LGBTQ+ advocacy group. In 2017, Fordboastedabout its recognition from the organization as one of the best places to work for LGBTQ equality.
  
  Right-wing activist Robby Starbuckposted a copy of the email on X and took credit,sayinghe had told the automaker he was looking into their policies. (Ford confirmed the accuracy of the email to CNN.)
  
  “We are mindful that our employees and customers hold a wide range of beliefs,” Farley wrote in the email. “The external and legal environment related to political and social issues continues to evolve.”
  
  The right-wing activist riding a wave of opposition to DEI in corporate America
  
  Farley said that Ford remains committed to creating an “inclusive workspace and building a team that leverages diverse perspectives, backgrounds and thinking styles.”
  
  Ford joinsHarley-Davidson,Tractor Supply Co.,John Deereand other companies in revising or pulling back on their diversity, equity and inclusion programs (DEI), support for gay Pride marches and LGBTQ events, strategies to slow climate change and other social policies.
  
  Some companies have backtracked more than Ford. Tractor Supply, for example,announced in Junethat it will withdraw its carbon emission reduction goals and eliminate jobs and goals focused on diversity, equity and inclusion. It will also stop sponsoring LGBTQ+ Pride festivals and voting campaigns
  
  Starbuck, a former Hollywood music video director turned conservative activist, has claimed credit for these moves. But business experts have told CNN that Starbuck’s activism alone does not fully explain these decisions, and some companies’ commitments to diversity and inclusion were thin to start.
  
  The Human Rights Campaign criticized Ford’s announcement, saying the company was “abandoning inclusive employees policies and support” and “cowering” to Starbuck.
  
  “Ford Motor Company’s shortsighted decisions will have long-term consequences,” Human Rights Campaign President Kelley Robinson said in a news release Wednesday. “Ford Motor Company is abandoning its financial duty to recruit and keep top talent from across the full talent pool. In making their purchasing decisions, consumers should take note that Ford Motor Company has abandoned its commitment to our communities.”
