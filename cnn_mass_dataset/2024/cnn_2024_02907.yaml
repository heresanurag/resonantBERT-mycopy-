title: "Debate flares over how quickly to replace many lead service lines"
date: "2024-07-10"
section: "Health"
url: "https://www.cnn.com/2024/07/10/health/lead-service-lines-kff-health-news-partner"
content: |
  With the Environmental Protection Agency’s latest — and strictest — plan to minimize the risk of Americans drinking lead-contaminated water on the horizon, the debate over whether the agency’s proposed rules go too far or not nearly far enough is heating up.
  
  Although lead was banned from new water service lines in 1986, it’s estimated thatmore than 9 million such linesstill carry drinking water to homes and businesses throughout the country. Under the EPA’sLead and Copper Rule Improvementsproposal, water utilities would be required to replaceall lead-containing lineswithin 10 years.
  
  The proposal from the Biden administration differs from rules put out in the waning days of the Trump term that allow up to 30 years for service line replacement, triggered only when lead levels test higher than 15 parts per billion. The new proposal, which would largely supplantthe Trump rules, calls for stricter monitoring, enhanced public education, and the 10-year pipe replacement mandate regardless of lead levels.
  
  Biden unveils $3 billion for nationwide lead pipe replacement
  
  An October deadline looms for the new rules to be adopted; otherwise, enforcement of the less-stringent Trump administration rules will begin. And complicating matters more: November’s election results could shake up whose rules the nation must follow.
  
  While many cities and states have begun to replace their lead pipes, some utilities and officials say the 10-yeartime frame is unfeasibleand too expensive. They say it would be difficult for water utilities to follow the rules while also dealing withnew EPA limits on five PFAScontaminants, known as “forever chemicals,” andfailing pipes, among other issues.
  
  “Nobody will tell you that having lead in contact with water is a great idea,” said Steve Via, director of federal relations for theAmerican Water Works Association, the country’s largest nonprofit water utility industry group. “The question becomes: How urgent a matter is it, and at what pace does it need to be done?”
  
  Already,15 Republican state attorneys generalhave argued that the proposed rules infringe on states’ rights and chase “speculative” benefits. On the other side,14 Democratic attorneys generalsaid that the EPA should find more ways to ensure pipes are quickly replaced in low-income areas.
  
  To be sure,no amount of lead is considered safeto consume. Lead is aneurotoxin known to causeirreversible long-term organ damage, lower IQs, higher risk for miscarriage, asthma, cardiovascular disease, impotence, and elevated blood pressure.
  
  Public health advocates say societal costs — in health care, social services, and lost productivity — far outweigh the cost of replacement. They say corrosion controls that have limited lead exposure can and do fail, pointing to human and systemic errors that prompted thewater crisis in Flint, Mich., where thousands of people were exposed to high lead levels in their drinking water.
  
  “That’s the whole thing about lead pipes: They unexpectedly release lead into drinking water,” saidRoya Alkafaji, who manages an initiative focused on reducing lead exposure from water with theEnvironmental Defense Fund, a national advocacy group. “I don’t think kicking the can down the road is the solution.”
  
  A lead water service line from 1927 lays on the ground on a residential street after being removed on June 17, 2021, in Denver.
  
  According to a2023 analysisbyRonnie Levin, an environmental health researcher at Harvard’s T.H. Chan School of Public Health, the benefit of replacing lead pipes outweighs the costs by a 35:1 ratio.
  
  Why is it important to remove lead from water pipes? A doctor explains
  
  The EPA estimated $335 million in annual costs to implement water sampling, corrosion control treatments, inventorying and replacement of lead service lines, and educational outreach for the Trump rules. Using that figure, Levin’s analysis shows that $9 billion in annual health care costs could be avoided.
  
  An additional $2 billion in spending — through upgraded infrastructure and reduced corrosion damage to appliances — could be saved. The broad spectrum of health-related costs has historically been ignored in analyzing the actual costs of leaving lead service lines in place, said Levin, a former EPA scientist.
  
  Estimates of the cost to replace the nation’s lead pipes range from$46 billionto more than$90 billion, far higher than the$15 billionset aside in theBipartisan Infrastructure Law. The Biden administration has framed those funds as a down payment,49% of which will be grantsor principal forgiveness loansallocated on the basisof the estimated number of lead pipes per state. Otherfunding programscan also be tapped.
  
  Replacement costs vary widely by location, with average costs ranging fromthe EPA’s 2019 estimate of $4,700per service line to$12,500 from Via’s utilities trade group.
  
  Carolyn Berndt, legislative director for sustainability at the National League of Cities, said funding challenges could render the EPA’s 10-year timeline unrealistic. While her organization is encouraging local leaders to secure as much funding as possible, what’s available won’t be enough to cover replacement costs for some localities — especially low-income areas, which often have older infrastructure and more lead pipes.
  
  Some direct costs could fall to property owners, such as replacing the lines connecting their water meters to their homes. And people could face indirect costs if utilities increase customer rates to offset the expense.
  
  Still, some communities, such as Olathe, Kan., are finding ways to move forward with a patchwork of funding. Out of 37,000 service lines there, 266 galvanized pipes were found serving downtown properties, where many of the city’s most vulnerable residents live. The coating forgalvanized pipes typically contains lead.
  
  Flint, Michigan, held in contempt by federal judge for missing deadlines to replace lead pipes at center of water crisis
  
  Workers will replace the lines at no cost to property owners in the city of 147,000 people outside Kansas City, said Megan Spence, who isoverseeing the city project. It is expected to cost around $2.3 million, paid for witha loanfrom the Kansas Department of Health and Environment and about $1.2 million in federal infrastructure funding. About $500,000 for lawn restoration is included.
  
  “We’re really looking at this as an opportunity and another way to protect public health,” said Spence. “There shouldn’t be any lead lines in any drinking water distribution systems.”
  
  Elsewhere, some Republicans, such as Indiana state Sen.Eric Koch, are leading the charge to replace the pipes despite historical pushback in conservative states against federal mandates. He said lawmakers should consider the harm — and long-term costs — caused by delaying the cleanup of lead from drinking water.
  
  In March, Indiana’s Republican Gov.Eric Holcombsigned aunanimously approved bill, which Koch authored, designed to lower costs for replacing customer-owned lead service lines. Under the law, landlords are required to enroll in a state-approved program to have their lead pipes removed at no cost by their water utility or pay for replacement themselves.
  
  Koch said estimates for replacing customer-owned service lines are around $8,000, though the cost could be significantly higher for some properties. But by starting the work now, Koch said, utilities can avoid price inflation and ultimately remove pipes more cost efficiently.
  
  Meanwhile, time is running out to publish the Biden administration’s proposed rules in theFederal Register. Water utilities will be required to comply with the Trump rules as of Oct. 16 unless the EPA publishes the newer rules before then, saidErik Olson, a senior strategic director of the National Resources Defense Council, an advocacy group.
  
  It remains unknown what the June 28 Supreme Courtruling on agency rulemaking, known as the “Chevron deference” decision, will mean for either set of rules.
  
  A deadline is also looming for the 60-day “look-back” period under theCongressional Review Act, during which a regulation can be repealed. If control of Congress or the White House flips with the November election, the Biden administration’s rules could be repealed under an emboldened Congress even before the January swearing in of new officeholders.
  
  “Depending on how the election goes, it could become a hot issue,” saidTom Neltner, national director of the advocacy organizationUnleaded Kids.
  
