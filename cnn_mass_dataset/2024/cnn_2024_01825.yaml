title: "5 things to know for Aug. 1: Presidential race, Middle East, 9/11 mastermind, Wildfires, Instagram"
date: "2024-08-01"
section: "US"
url: "https://www.cnn.com/2024/08/01/us/5-things-to-know-for-aug-1-presidential-race-middle-east-9-11-mastermind-wildfires-instagram/index.html"
content: |
  Tesla’s “Full Self-Driving” mode is facing renewed scrutiny after police announced the technology was recentlyinvolved in another fatal accident. Still, Tesla CEO Elon Musk is betting that he will soon develop a vehicle that resembles a “tiny mobile lounge” where drivers will be able to watch movies, play video games, work and even sleep.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  Former President Donald Trump falsely claimed Wednesday that his 2024 Democratic rival, Vice President Kamala Harris,“turned Black” a few years agoafter “all of a sudden, she made a turn” in her identity. “She was always of Indian heritage, and she was only promoting Indian heritage. I didn’t know she was Black until a number of years ago, when she happened to turn Black, and now she wants to be known as Black,” Trump said at agathering of Black journalists in Chicago. The vice president later dismissed Trump’s controversial remarks as “the same old show.” Meanwhile, sources say Harris and her forthcoming running mate willtravel to a series of battleground statesnext week. The details on which states — and when — have not yet been firmed up, but it would mark an important next stage of the campaign.
  
  Iranian leaders havevowed to “strike Israel directly”following the death of Hamas political leader Ismail Haniyeh, who was killed in Tehran this week. Israel has neither confirmed nor denied involvement in Haniyeh’s assassination. On Wednesday, Israeli Prime Minister Benjamin Netanyahu said Israel has delivered “crushing blows” to its enemies in the last few days, adding his country is “ready for any scenario.” Experts say Haniyeh’s assassination will complicate the tenuous efforts toprocure a ceasefire-hostage deal in Gaza, as well as hopes of de-escalation between Israel and its Iran-backed rivals in the region.
  
  In today’s ‘One Thing’ podcast, CNN’s Tamara Qiblawi joins us from Beirut to tell us more about the death of Haniyeh inside Iran.Listen here.
  
  The US has reached a plea deal with alleged 9/11 mastermind Khalid Sheikh Mohammed and two other defendants accused ofplotting the 2001 terror attacks, according to the Defense Department. The pretrial agreement takes the death penalty off the table for Mohammed, Walid Bin ‘Attash, and Mustafa al Hawsawi, prosecutors said in a letter obtained by CNN. Families of 9/11 victims and survivors criticized the plea agreements and pushed for more information aboutSaudi Arabia’s possible involvement in the attacks. The military trial against Mohammed and his alleged co-conspirators was delayed for years as the US tried to determine how to handle the issue of torture used against Mohammed and others at secret CIA prisons in the 2000s.
  
  While California battles the fifth-largest wildfire in state history, a new inferno in Colorado hasforced the evacuation of about 600 homesnear Denver. The Stone Canyon Fire has scorched more than 1,500 acres and killed at least one person, Boulder County Sheriff Curtis Johnson said Wednesday. Colorado Gov. Jared Polis has also deployed the state National Guard to assist in the fire response as the Quarry Fire spread rapidly southwest of Denver overnight. In northern California, the Park Fire has destroyed hundreds of structures and is 18% contained. It has swallowedmore than 391,000 acresand is estimated to be bigger than the size of Los Angeles.
  
  Some Instagram users were informed Wednesday that some of their photos have been permanently deleted from the app’s Stories archives and are unable to be recovered. “Due to a technical issue, this story is no longer available. While we’ve since fixed this issue, your story can’t be restored,” the notice said. Meta, which owns Instagram, declined to share how many users were affected but said only thepeople whose Stories were lost will see the notification. Many users treat their Story Archives as a photo diary, with some using it as a way to store pictures and videos. Experts say the bug serves as a reminder that people should ensure they back up photos, videos and other media outside of an app, no matter how trustworthy the company may be.
  
  ‘Squid Game’ Season 2 is coming this winterHere’s a show you can devour over the holidays … Netflix announced that its Emmy-winning drama “Squid Game” will finally return withSeason 2 on December 26, before it all ends with Season 3 in 2025.
  
  All eyes on Simone Biles as she goes for women’s all-around goldSimone Biles is hoping to take her second all-around victory at the Olympics alongside teammate and friend Suni Lee in the coming hours.Here’s when you can tune in.
  
  Katie Ledecky leaves her competition in the dustAmerican swimmer Katie Ledecky won her first gold of the 2024 Games in spectacular fashion with a new Olympic record in the 1500m freestyle. Read how she becameone of the greatest swimmers in history.
  
  Maya Rudolph will return to ‘SNL’ to play Kamala HarrisIt’s a tense election year, but there’s always room for political comedy. Maya Rudolph is set to repriseher portrayal of Vice President Kamala Harriswhen “Saturday Night Live” returns for its 50th season this fall.
  
  Your coffee’s getting pricier – and climate change could keep it that way﻿Coffee roasters are signaling that pricescould remain higher for longer, as factors like climate change reduce the global coffee supply.
  
  89That’s how many Russian drones Ukraine shot down overnight, according to the Ukrainian military. It was one of thelargest drone attacks on Ukrainesince the war began, mainly targeting the region in and around the capital Kyiv.
  
  “They haven’t offered us anything.”
  
  — Delta Air Lines CEO Ed Bastian, lashing out at cyber security firm CrowdStrike and software provider Microsoft for the global cyber outage that resulted in a service meltdown he saidcost the airline $500 million. Delta has yet to file a lawsuit against either CrowdStrike or Microsoft, but sources say the airline has hired lawyers to pursue compensation from the two companies.
  
