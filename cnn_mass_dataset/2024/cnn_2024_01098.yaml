  110That’s at least how many people are missing following alandslide in the southern Philippineson Tuesday. However, a young girl’s “miraculous” rescue from the scene earlier today is offering hope for dozens of families hoping to reconnect with their loved ones.
  
  “This moment isn’t just for Kobe, but it’s for all of you that have been rooting for him all of these years.”
  
  — Vanessa Bryant, sharing remarks Thursday as the Los Angeles Lakers unveiled a19-foot statue of the late basketball legendin an emotional ceremony. The base of the statue bears inscriptions of many of Bryant’s career accomplishments, as well as one of his most iconic quotes: “Leave the game better than you found it. And when it comes time for you to leave, leave a legend.”
  
