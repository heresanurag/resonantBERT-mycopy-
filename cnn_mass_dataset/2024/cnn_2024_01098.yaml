  Lamar Jackson is named NFL’s Most Valuable PlayerThe Baltimore Ravens quarterback was named theNFL’s Most Valuable Playeron Thursday night, becoming the 11th player in league history to have won the award more than once.
  
  British Vogue features 40 ‘legendary’ cover stars for editor Edward Enninful’s final issueNaomi Campbell, Miley Cyrus, Jane Fonda, Dua Lipa, Kate Moss and Serena Williams are justsome of the namesthe outgoing editor brought in for his last cover shoot.
  
  Zyn nicotine pouches are flying off shelvesSome companies are seeing explosive sales of tobacco-free nicotine pouches. Read why critics saythey’re dangerous for kids.
  
  Thieves steal 200-foot radio tower in AlabamaA small-town radio station in Alabama wasknocked off the airafter thieves managed to steal the station’s transmitter and 200-foot radio tower.
  
