title: "If we shouldn’t eat ultraprocessed foods, what should we eat instead?"
date: "2024-05-11"
section: "Health"
url: "https://www.cnn.com/2024/05/11/health/alternatives-ultraprocessed-foods-wellness?cid=external-feeds_iluminar_cnn-brasil"
content: |
  Many people love their ultraprocessed foods.
  
  Sodas, chips, ice cream, lunch meat and other prepared foods are staples of the American diet. They are hard to avoid, too. More than70% of the US food supplyis made of ultraprocessed food.
  
  But a diet heavy in ultraprocessed food isn’t good for us, science has shown. Eatingultraprocessed foodsraises the risk of developing or dying from dozens of health conditions, according to aFebruary reviewcovering nearly 10 million people.
  
  Science has also shown that when you eat Mediterranean meals, which focus on vegetables, fruits, legumes, nuts and fish,you can reduce the risk of somecancers,diabetes,heart disease,high cholesterolandstroke.Adopting this approach to eating can alsoimprove brain health,strengthen bonesand ward offdepressionanddementia.
  
  Hot dogs and cookies are delicious, though. So, what to do?
  
  Watch a nutritionist explain the food labels behind three everyday foods
  
  Many ultraprocessed foods have very long lists of ingredients and include additives, according to theFood and Agriculture Organization of the United Nations. If you can’t pronounce the names in your food’s ingredient list, that’s a warning sign.
  
  The list may include preservatives designed to resist mold and bacteria; emulsifiers to keep incompatible ingredients from separating; artificial colorings and dyes; anti-foaming, bulking, bleaching, gelling and glazing agents; and added or altered sugar, salt and fats designed to make food more appealing. All are signs that the food is ultraprocessed.
  
  Skip eating out when you can’t tell what ingredients are in your food, and note that many items on fast-food restaurant menus can be ultraprocessed (such ashot dogs, hamburgers, nuggets and fries).
  
  Breakfast may be the easiest meal to change. Instead of sugar-fortified cereal or toaster waffles, have somewarm and fillingancient grains such as quinoa, sorghum or wheat berries cooked with milk, honey, nuts and fruits. No time in the morning to prepare breakfast? Prep theseovernight oatsthe night before. Or have a simple small bowl of plain Greek yogurt with fresh fruit and a sprinkle of sliced nuts to go.
  
  You may be eating predigested food. Here’s why
  
  Instead of a loaded deli sandwich or slices of pizza every day, try to bring your own plant-based lunch once or twice per week. I love adding roast chicken leftovers to this kalericotta salad (sub in feta if you can’t find the ricotta). Or make this dish by registered dietitian Rahaf Al Bochi, founder ofOlive Tree Nutrition. She created herWarm Farro Grain Salad With Pomegranatefor CNN’s Eat, But Better newsletter.
  
  Need more ideas? Check out CNN contributor Casey Barber’s ideas forschool lunch. Try our interactive to help you buy the least ultraprocessed lunch you can.
  
  Snacks can be tricky. The no-fly list of ultraprocessed food is loaded with store-bought chips, sugar-packed yogurts and candy-filled trail mix.
  
  Instead, think about apples, oranges, bananas, carrot sticks, and other fruits and veggies.
  
  Protein-packed nuts and seeds are filling while also providing a brain boost and heart-healthy fats.
  
  If you want to get fancy, Al Bochi created thisroasted almond snackfor CNN that features the Mediterranean spice blend za’atar. Suzy Karadsheh’savocado salsa dipis also amazing for movie nights, the big game and parties (whichever one you choose).
  
  How much ultraprocessed food are you eating?
  
  With dinner a rushed affair for many overscheduled families, it can be impossible to cook during the week. Try to avoid fast-food burgers and chicken nuggets when you can.
  
  Instead, consider grilling chicken or cooking ground turkey on the weekend for easy-assemble Tuesday taco night. Karadsheh also has a Mediterranean twiston tuna saladthat will convert even the most anti-tuna eaters (which once included me).
  
  Baked goods and ice cream are fine for special occasions, but for an everyday dessert that’s not highly processed, Al Bochi’s recipe forStrawberry Ricotta Granola Parfaitsis next level.
  
  For something grown-up, try poaching pears withpomegranate juiceor port and serve them over yogurt orbake pears and other fruits in parchment.
  
  Ultraprocessed foods are designed to be fun and taste good. Reducing your reliance on them can be hard. Try one suggestion at a time, for a week at a time.
  
