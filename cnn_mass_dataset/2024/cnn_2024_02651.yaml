title: "Red Lobster closings: These are the locations it wants to shut down"
date: "2024-06-06"
section: "Food"
url: "https://www.cnn.com/2024/06/06/food/red-lobster-closures-list/index.html"
content: |
  Red Lobster wants to close several dozen more restaurantsfollowing its bankruptcy, and it has identified which ones are in danger of shutting down if the court approves its plan.
  
  The chain, which brought affordable shrimp and lobster to middle-class America and grew to become the largest seafood restaurant chain in the world, filed for bankruptcy last month.
  
  Red Lobster said that it had more than $1 billion in debt and less than $30 million in cash on hand. It plans to sell its business to its lenders, and in turn, it will receive financing to stay afloat. Part of its plan is to close some locations of its nearly 600 restaurants in the meantime.
  
  A few weeks prior to its bankruptcy, it abruptlyclosed around 50 locationsacross the United States. The new list of locations in danger of closing was revealed in court filings last week, and all could be shuttered if they can’t renegotiate their leases.
  
  The list below, which also includes its iconic Times Square location, contains some restaurants that have already closed in May.
  
