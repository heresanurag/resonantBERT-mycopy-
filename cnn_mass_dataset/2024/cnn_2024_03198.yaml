title: "NASA calls off spacewalk at last minute as astronaut suit malfunctions"
date: "2024-06-24"
section: "Science"
url: "https://www.cnn.com/2024/06/24/science/spacewalk-astronauts-canceled-iss-space-station-scn/index.html"
content: |
