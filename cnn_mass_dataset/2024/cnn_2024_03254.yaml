title: "UPenn to start producing documents on Wednesday in response to House antisemitism investigation"
date: "2024-02-06"
section: "Business"
url: "https://www.cnn.com/2024/02/06/business/upenn-to-start-producing-documents-on-wednesday-in-response-to-house-antisemitism-investigation/index.html"
content: |
  The University of Pennsylvania plans to start a weekslong process of turning over documents to Congress on Wednesday in response to a House committee antisemitism investigation, a university spokesperson told CNN.
  
  However, the Ivy League school is signaling it won’t necessarily turn over all of the many documents the House Education Committee has requested by the Wednesday deadline.
  
  The UPenn spokesman described the handover as a “rolling production” that will take place over the next few weeks, starting on Wednesday.
  
  The House Education Committee declined to comment.
  
  Last month, the committee wrote aletterto UPenndemanding a mountain of documentsto aid an investigation launched in December into antisemitism on campus.
  
  The wide-ranging document request asked for everything from reports on antisemitic activity on campus since early 2021 to how the university responds to hate crimes and documents linked to a controversialPalestinian literature festivalheld on campus last year.
