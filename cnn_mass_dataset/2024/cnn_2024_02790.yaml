  Eugene “Mercury” Morris, two-time Super Bowl champion with the Miami Dolphins, has died, his son announced Sunday.He was 77. Known for his speed and dynamic running game, Morris rushed for a career-best 1,000 yards and 12 touchdowns during the historic undefeated Super Bowl-winning season in 1972. The following season, Morris rushed for 954 yards and 10 touchdowns to help Miami win back-to-back Super Bowl titles.
  
  $2.2 billionThat’s how much theater chains in the US and Canada are investing in a makeover plan that aims to draw in more moviegoers. An industry group that represents the eight largest chains including AMC Entertainment, Regal Cinemas and Cinemark said themultibillion-dollar renovation planencompasses 21,000 screens and affects every part of the theater experience, from signage to snacks and snazzier seats.
  
  “This fall will determine the future of this war.”
  
  — Ukrainian President Volodymyr Zelensky, sharing remarks Sunday as hebegan a key visit to the USin which he is expected to present his blueprint to defeat Russia to President Joe Biden and other allies.
  
