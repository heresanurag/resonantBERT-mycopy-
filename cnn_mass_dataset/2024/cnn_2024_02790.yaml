content: |
  Paper or plastic? That question will no longer be a choice at grocery store checkout lines in California after Gov. Gavin Newsom signed a new law Sunday thatbans all plastic shopping bagsstarting in 2026.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  Former President Donald Trump said hedoesn’t see himself running againin 2028 if he is unsuccessful in November. “I don’t see that at all,” Trump said in an interview with Sharyl Attkisson. Trump would be 82 on Election Day in 2028. Meanwhile, Vice President Kamala Harrisaccepted CNN’s debate invitationfor October 23, challenging Trump to another showdown. The former President argued it was “too late” to have more debates because Americans have begun casting their ballots in the 2024 election. This comes as Trump remains locked in what CNN senior political data reporter Harry Enten described Sunday as theclosest presidential racesince Democrat John F. Kennedy’s narrow win over Vice President Richard Nixon.
  
  Israel is “conducting extensive strikes” on Hezbollah targets in Lebanon, the Israeli military said today, following a weekend that saw the two sides exchange theirmost intense fire since the war in Gaza began. Israel has urged civilians to leave areas in which Hezbollah operates, warning it would soon engage in “precise strikes” against the Iran-backed militant group across Lebanon. Meanwhile, Israeli Prime Minister Benjamin Netanyahu is considering a plan toforce all Palestinians out of northern Gazato lay siege to Hamas and force the release of hostages. The plan doesn’t say when civilians would be allowed to return.
  
  Multiple people opened fire Saturday night in a bustling area of Birmingham, Alabama, killing four people and injuring 17 others. Police described the shooting as a targeted “hit” thatcaught many bystanders in the barrage of bullets. More than 100 shell casings were recovered from the scene at Five Points South, a busy area known for its restaurants, nightclubs, bars and live music venues near the University of Alabama at Birmingham campus and downtown. With no suspects in custody, the Birmingham Police Department is partnering with the FBI and other agencies to investigate, urging anyone with information to come forward.
  
  House Speaker Mike Johnson unveiled a spending bill Sunday that will avert a government shutdown if it is passed by both the House and Senate beforefunding runs out on September 30. Still, even with a possible deal to avert a lapse in funding, the standard procedure to bring nonessential government functions to a halt will soon get underwayfor all federal government departments and agencies, an administration official told CNN. Should lawmakers fail to pass a funding bill, millions of federal workers and military personnel would be affected. Prior shutdowns have also forced the temporary closure of some national park and monument facilities, threatened nutrition assistance to low-income Americans and caused flight delays.
  
  Voters in Sri Lanka elected Marxist-leaning Anura Kumara Dissanayake as their new president on Sunday, putting faith in his pledge to fight corruption and bolster a fragile economic recovery following the South Asian nation’s worst financial crisis in decades. Dissanayake, 55,led from start to finish during the counting of votes, knocking out incumbent President Ranil Wickremesinghe and opposition leader Sajith Premadasa. He has promised a series of major reforms and vowed to dissolve parliament within 45 days of taking office. About 75% of the 17 million eligible voters cast their ballots, according to the election commission.
  
