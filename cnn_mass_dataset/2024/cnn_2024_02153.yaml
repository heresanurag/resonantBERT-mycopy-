  👋Welcome to 5 Things PM!PowerPoint parties are a thingamong young people. They are inviting friends over and asking them to present a slideshow on any topic at all — “the sillier, the better.” So get your presentation on the 10 most attractive animated characters ready. It’s a great way to get to know your friends a bit more.
  
  Here’s what else you might have missed during your busy day:
  
  1️⃣Bridge collapse:An emergency “mayday” call from a cargo ship allowed authorities to close Baltimore’s Francis Scott Key Bridge and save lives, Maryland’s governor said.Divers are still searchingfor several people.Here’s what else we know.📹 Video shows moment the bridge collapses
  
  2️⃣Running mate:Independent presidential candidateRobert F. Kennedy Jr. announcedSilicon Valley attorneyNicole Shanahanas his vice presidential choice.📹 Watch: RFK Jr.’s sister explains why she isn’t voting for him
  
  3️⃣Abortion pill:A majority of Supreme Court justices appeared skeptical of the idea of a nationwide ban ornew limits on mifepristone, the primary drug used for medication abortions.
  
  4️⃣Gag order:A New York judgelimited Donald Trumpfrom making statements about potential witnesses in his upcoming criminal trial relating to hush money payments. Plus:Trump Media stock debuts
  
  5️⃣Housing crunch:US home prices roseat the fastest clip in monthsto a fresh record high in January, according to new data released today.
  
  👀Slipping through:A Texas man managed to make it onto a Delta plane without a ticket before flight attendants caught him outside the restroom.
  
