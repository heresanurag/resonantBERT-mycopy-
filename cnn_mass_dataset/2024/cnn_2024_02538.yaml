content: |
  Taylor Swift andTravis Kelceare in their tennis era.
  
  Swift and Kelce were among the famous faces shown on broadcast of the US Open men’s singles final on Sunday. Italy’s Jannik Sinnerbeat outAmerican tennis star Taylor Fritz in the match, which aired on ESPN.
  
  The couple walked into Arthur Ashe Stadium in New York holding hands and were dressed for the occasion, with Swift donning a red gingham sundress and Kelce sporting a white Gucci bucket hat.
  
  Patrick Mahomes, Chiefs quarterback, and his wife Brittany Mahomes latershowed upand joined Kelce and Swift at their seats. Mahomes and Kelcekicked offthe 2024-2025 NFL season on Thursday, winning their season opener against the Baltimore Ravens.
  
  The superstar power couple weren’t the only celebrities in attendance.
  
  Matthew McConaughey and his wife Camila Alves were also seen in the stands. Rockstar Jon Bon Jovi, Eddie Redmayne, Rachel Lindsay, Martha Stewart and Rebel Wilson were also present at Sunday’s match.
  
  Fritz is thefirst American manto advance to the US Open final since Andy Roddick in 2006.
