title: "Tiger Woods to make 2024 debut at the Genesis Invitational"
date: "2024-02-08"
section: "Sport"
url: "https://www.cnn.com/2024/02/08/sport/tiger-woods-2024-debut-genesis-invitational-spt-intl?cid=external-feeds_iluminar_cnn-brasil"
content: |
  Tiger Woodswill make his first competitive start of the year at the Genesis Invitational next week, the 15-time major winner announced on social media Wednesday.
  
  The 47-year-old – restricted to a limited schedule after suffering serious leg injuries in a car accident in 2021 – has not featured at a PGA Tour eventsince playing the Hero World Challengein the Bahamas in December, but will return for the event he hosts at Los Angeles’ Riviera Country Club on February 15.
  
  Tiger Woods and Nike’s ‘seismic’ partnership is over. Where do they go from here?
  
  Organized by the Tiger Woods Foundation and classed as one of the PGA Tour’s Signature Events, offering increased prize purses and FedEx Cup points, many of the circuit’s biggest stars are set to feature, including all of the world’s top 10 ranked players, exceptnew LIV Golf recruit Jon Rahm.
  
  That includes world No. 6 Wyndham Clark, who played just 54 holes before being crowned the winner of the AT&T Pebble Beach Pro-Am last week asheavy storms in California saw organizers end the tournament early.
  
  Woods, chasing his first PGA Tour win since his record-equaling 82nd triumph at the Zozo Championship in October 2019, said he was “excited” to compete in anInstagram postannouncing his participation on Wednesday.
  
  After undergoingankle surgeryin April, Woods finished 18th out of a 20-player field in his first tournament in eight months at the Hero World Challenge, beforepairing with his son Charlie to play the PNC Championshipin Florida later in December.
  
  The duo finished tied-fifth out of 20 teams formed of past major or Players Championship winners and a family member at the Ritz-Carlton Club, six shots behind the winning pairing of Bernhard Langer and his son Jason.
  
  Woods, who will be making his first competitive appearance sinceending his 27-year partnership with Nikein January, has said he is aiming to play in one tournament a month this year.
  
  The Players Championship, dubbed ‘the fifth major,’ tees off in March, while The Masters begins the major calendar in April.
