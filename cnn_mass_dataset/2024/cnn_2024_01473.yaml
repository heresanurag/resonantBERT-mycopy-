title: "Humanity’s earliest recorded kiss adds new twist to the history of locking lips"
date: "2024-02-13"
section: "World"
url: "https://www.cnn.com/2024/02/13/world/kissing-earliest-recorded-evidence-scn?cid=external-feeds_iluminar_yahoo"
content: |
