  “The meeting of lips is the most perfect, the most divine sensation given to human beings, the supreme limit of happiness.”
  
  So wrote the 19thcentury French author Guy de Maupassant in his 1882 short story, “The Kiss.” He wasn’t alone in his flowery thoughts about kissing. Romantic kisses have long been celebrated in songs, poems and stories, commemorated in art and film.
  
  No one knows for sure when humans first figured out that mouth-to-mouth contact could be used for romance and erotic pleasure, but scientists reported in May 2023 that people were locking lips at least 4,500 years ago. The findings, published in the journalScience, pushed back the history of the practice by about 1,000 years.
  
  “Kissing has been practiced much longer than perhaps a lot of us realized, or at least had thought about,” said lead study authorDr. Troels Pank Arbøll, an assistant professor of Assyriology — the study of Assyria and the rest of Mesopotamia — at the University of Copenhagen.
  
  Thousands of clay tablets from Mesopotamia survive to the present; their references to kissing shed light on romantic intimacy in the ancient world, the researchers reported.
  
  6 historical mysteries that scientists finally cracked in 2023 — and one they didn’t
  
  “This fascinating case study adds to a growing body of scientific research on romantic/sexual kissing, and helps us understand kissing’s origins in human social behavior and in intimate life specifically,” said evolutionary biologistDr. Justin R. Garcia, a professor of gender studies at Indiana University in Bloomington. Garcia, who investigates the culture and evolution of human intimacy at the Kinsey Institute, was not involved in the research.
  
  “Romantic and sexual behavior experiences are part of larger patterns of human social behavior,” Garcia told CNN in an email. “Understanding how these behaviors express themselves, change, and evolve helps us better understand who we are today.”
  
  When de Maupassant wrote his heartfelt descriptions of loving kisses, he probably wasn’t thinking too hard about how kissing arose in the first place amid civilizations of the past. But the origins of this “most divine sensation” are deeply rooted in human history and evolution, and there is likely much about its role and significance in ancient cultures that is yet to be discovered, the study authors wrote.
  
  Previously, the oldest recorded evidence of kissing was attributed to theVedas, a group of Indian scriptural texts that date back to around 1500 BC and are foundational to the Hindu religion. One of the volumes, theRig Veda, describes people touching their lips together. Erotic kissing was also featured in great detail in another ancient Indian text: the Kama Sutra, a guide to sexual pleasure dating to the third century AD. Modern scholars therefore concluded that romantic kisses likely originated in India.
  
  But among Assyriologists, it was widely known that clay tablets from the region mentioned kissing even earlier than it was described in India, Arbøll told CNN. However, outside of highly specialized academic circles, few knew that such evidence existed, he added. In the study, Arbøll and coauthorDr. Sophie Lund Rasmussen, a research fellow in the department of biology at Oxford University in the UK, wrote of kisses inscribed in Mesopotamian tablets dating to 2500 BC.
  
  “As an Assyriologist, I study cuneiform writing,” Arbøll said. Cuneiform, in which characters are pressed into tablets using cut triangular reeds, was invented around 3200 BC. Early cuneiform was used by scribes for bookkeeping, Arbøll explained. But around 2600 BC — perhaps even earlier — people began recording stories about their gods.
  
