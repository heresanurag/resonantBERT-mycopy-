title: "Trump Organization intends to create 25 entities for future product or hotel licensing deals, monitor says"
date: "2024-10-23"
section: "Politics"
url: "https://www.cnn.com/2024/10/23/politics/trump-organization-new-entities?ICID=ref_fark"
content: |
  The monitor overseeing the Trump Organization’s finances wrote inits latest reportthat Donald Trump’s company intends to create 25 new entities for products or hotel licensing deals.
  
  “The Trump Organization informed the Monitor that, contingent upon the execution of certain agreements, it intended to create 25 new entities for the purpose of either licensing products or merchandise and hotel licensing deals. For these contemplated transactions, there have been no financial disclosures to third parties, and there is no ongoing requirement for any such disclosures. One entity was dissolved during this reporting period,” the monitor wrote.
  
  The monitor report did not specify if the potential deals will be domestic or foreign.
  
  Trump’s family business cameunder scrutinywhile he was in office formillions of dollarshis properties received from foreign governments or government-controlled entities. He was sued for violating the emoluments clause of the US Constitution but the casesfizzledwhen the Supreme Court dismissed them as moot with Trump out of office.
  
  Since Trump left the White House, his real estate company has inked deals in Oman and Vietnam and has hosted various golf tournaments by theSaudi-backed LIV Golf tour.
  
  If Trump wins the election and his real estate business continues to develop overseas, questions about conflicts of interest are likely to return.
