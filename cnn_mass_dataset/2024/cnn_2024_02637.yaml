  Set in an unidentified Caribbean location, “Until August” follows protagonist Ana Magdalena Bach as she makes an annual trip to the island where her mother is buried. Each year, while there, she “for one night takes a new lover,” according to a synopsis from the book’s publisher Penguin Random House, whichdescribedthe novel as a “profound meditation on freedom, regret, self-transformation, and the mysteries of love.”
  
  The posthumous novel emerged from the manuscripts thanks to the fine-tuning of publisher and literary agent Cristóbal Pera, who edited the last two books García Márquez published during his lifetime.
  
  García Márquez’s sons have confirmed that there are no other unfinished novels in storage. “All of Gabo’s work is now available to his readers,” said Gonzalo.
