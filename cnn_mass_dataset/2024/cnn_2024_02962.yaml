id: cnn_2024_02962
title: "Former Brazilian soccer player Robinho arrested after failed appeal"
date: "2024-03-22"
section: "Sport"
url: "https://www.cnn.com/2024/03/22/sport/robinho-arrested-failed-appeal-spt-intl/index.html"
content: |
  FormerBrazilian footballerRobson de Souza – also known as Robinho – was arrested by Federal Police on Thursday in Santos, in the Brazilian state of São Paulo, his lawyer told CNN affiliate CNN Brasil, as police cars were seen leaving his residence in Santos.
  
  The 40-year-old former AC Milan and Brazil striker faces nine years in prison after being convicted in Italy for gang raping a woman with five other men in 2013 after plying her with alcohol in a Milan nightclub.
  
  Robinho’s arrest comes as Brazil’s Supreme Court (STF) deniedhis appealon Thursday to remain out of custody while all judicial appeals against his conviction are exhausted and ordered for the “immediate” start of his prison sentence, according to a statement from the STF.
  
