title: "Jelly Roll shares update after his jet’s emergency landing"
date: "2024-04-08"
section: "Entertainment"
url: "https://www.cnn.com/2024/04/08/entertainment/jelly-roll-emergency-landing/index.html"
content: |
  Country music star Jelly Roll has recovered from a flight scare over the weekend.
  
  He and his wife Bunnie XO were on their way from California to Austin, Texas for theCMT Music Awardson Sunday, when their private jet wasforcedto make an emergency landing after experiencing technical issues mid-flight.
  
  Despite the problems, theylanded safely. Bunnie shared a video on social media of the pilot explaining what happened.
  
  “The plane just got turned around. They said it’s an issue with the computer,” Jelly Roll is heard saying on the video. “At least it wasn’t the brakes!”
  
  Bunnie XO later shared another video of their plane taking off for the second time, writing, “Let’s try this again. Austin here we come!”
  
  Jelly Roll was nominated at the CMT Music Awards for video of the year, male video of the year and CMT performance of the year for “Need a Favor.” He swept all three categories on Sunday night.
  
  When asked about the travel emergency upon arriving at the event, Jelly Roll called it a “little baby scare.”
  
  “We’re awesome, man.” he toldEntertainment Tonight. “It’s all good.”
