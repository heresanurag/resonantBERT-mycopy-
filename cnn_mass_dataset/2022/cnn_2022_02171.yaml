title: "Federal agents search homes linked to Russian oligarch who recently had yacht seized, sources tell CNN"
date: "2022-09-02"
section: "Politics"
url: "https://www.cnn.com/2022/09/02/politics/russian-oligarchs-homes-searched"
content: |
  Federal agents have searched a high-rise apartment in New York City’s affluent Park Avenue and a New York Southhampton estate Thursday connected to a Russian oligarch who recently had his yacht seized, sources told CNN.
  
  The Russian owner of the properties is Viktor Vekselberg, one source told CNN. Vekselberg has close ties to Russian President Vladimir Putin. Another source familiar with the matter said multiple raids happened simultaneously in New York City, Southampton, and Florida, targeting multiple designees from the US Department of Treasury’s Office of Foreign Assets Control (OFAC).
  
  Vekselberg is a Russian national and the founder and Chairman of the Board of Directors of the Renova Group, according toUS court documents. Vekselberg has a history of allegations and lawsuits lodged against him in various jurisdictions due to his business practices, according to the documents. In 2018,Vekselberg was sanctionedas one of seven Russian oligarchs designated by the US Department of Treasury’s OFAC in response to what it called “worldwide malign activity.”
  
  In April, a 255-footluxury yachtowned by the Russian billionaire was seized by Spanish law enforcement at the request of US officials. The case marked the first seizure by anewly formed US task forcethat’s dedicated to cracking down on sanctions violators in response to Russia’s war in Ukraine.
  
  The New York City Police Department told CNN it was not responding to anything at the address in Park Avenue Thursday.
  
  The FBI and Homeland Security Investigations (HSI) did not respond to CNN requests for comment.
