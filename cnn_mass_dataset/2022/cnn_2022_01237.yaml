title: "Next supercontinent may form when the Pacific Ocean disappears"
date: "2022-10-07"
section: "World"
url: "https://www.cnn.com/2022/10/07/world/pacific-ocean-supercontinent-scn?cid=external-feeds_iluminar_yahoo"
content: |
