  Millions of people around the world will die” if Ukraine’s Black Sea ports aren’t reopened,says the head of the UN World Food Programme, David Beasley. The official is pleading with Russian President Vladimir Putin to reopen the channels, and the EU is proposing ways to ease the blockade of produce exports like corn, wheat and barley out of Ukraine. The EU’s top diplomat announced today that the blocwill provide $521 million in military supportto Ukraine. Meanwhile, a sustained Ukrainian counteroffensive in the Kharkiv region was hampered after at least two bridges vital to continuing the Ukrainian advance were blown up. However, Ukrainian forces arereportedly pressing on in the area.
  
  Parents are looking for answers and alternatives as the baby formula shortagecontinues to worsen in the US. A recall and plant shutdown from Abbott Nutrition in February snowballed into larger supply chain issues, resulting in extremely high out-of-stock rates for baby formula – 43% for the week ending May 8. Manufacturerssay they are producing at full capacity, and Abbott says its plant could be open in a matter of weeks, but it’s all not enough to keep up with demand. The American baby formula market is relatively shut off from other countries due to regulatory constraints and recent trade agreements, which is helping drive the product shortage.
  
  Republican lawmakers are calling on Attorney General Merrick Garland to enforce a 1950 federal law thatmakes it illegal to hold protests outside the homes of judges. Protesters have been holding peaceful demonstrations outside the homes of multiple conservative Supreme Court justices after the publication of a Supreme Court draft opinion that would overturn Roe v. Wade. Meanwhile, leading anti-abortion groups ​​areurging state lawmakers to reject legislationthat would criminalize women for having abortions. Their call is prompted by fears that women who have abortions could be charged criminally if Roe is struck down.
  
  North Korea has announced its first Covid-19 deaths,the result of an “explosive” outbreakthat state media says has sickened more than 350,000 in the country. North Korea has never reported Covid deaths before, though few believe the nation of 25 million, however isolated, has managed to avoid the effects of a deadly global virus. A large outbreak in the country could prove disastrous, since its reclusive policies and poor health care infrastructure leave it ill-prepared for a large onslaught of patients. North Korea is also not believed to have received any Covid vaccinations. China has already offered assistance, and South Korea and the US have said they are open to dialogue.
  
  The House select committee investigating the January 6 attack on the US Capitol hassubpoenaed five Republican lawmakers, including House Minority Leader Kevin McCarthy. McCarthy and the others have rejected the panel’s requests to voluntarily cooperate, and McCarthy has made it well-known he believes the panel is illegitimate.New audio has revealedthat, in the days following the insurrection, the minority leader had considered asking then-President Donald Trump to resign. The panel wants to understand how McCarthy’s initial criticisms of Trump changed to support, and whether Trump pressured him to change his tone when the pair met in late January 2021. The other Republican congressmen included in this round of subpoenas are Jim Jordan of Ohio, Mo Brooks of Alabama, Andy Biggs of Arizona and Scott Perry of Pennsylvania.
  
  Elon Musk says he is putting hisbid to acquire Twitter on hold, weeks after agreeing to take the company private in a $44 billion deal. His announcement came in a Friday morning tweet.
  
