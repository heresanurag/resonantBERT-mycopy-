  A senior administration official said Zhenhua and US Climate Envoy John Kerry have met multiple times in the last month and continued work on the agreement the two countriesannounced at COP26in Glasgow last year is “intensifying” and a “top priority.”
  
  “We are committed to working with them on topics like their plan to address methane emissions in China for the first time,” that official said. “We’re also of course engaging on other topics including the energy transition and illegal deforestation in China.”
  
  As promising as Biden’s early goals on reducing US greenhouse gas emissions were, progress on achieving them has been mixed, independent analysis shows.
  
  Afterrejoining the Paris accordafter taking office, Biden announced a goal toslash US emissions in halffrom 2005 levels – a record-high year for planet-warming emissions – by 2030.
  
