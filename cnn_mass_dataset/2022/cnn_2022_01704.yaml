title: "China Mobile holds massive Chinese listing after leaving Wall Street"
date: "2022-01-05"
section: "Investing"
url: "https://www.cnn.com/2022/01/05/investing/china-mobile-shanghai-listing-intl-hnk/index.html"
content: |
  China Mobile’s stock rose on its first day of trading in Shanghai, where it was forced toretreatto after beingbooted off Wall Streeta year ago.
  
  Shares of the Chinese telecom giant were up 1.8% on Wednesday after it pulled off mainland China’s biggest listing in 10 years, according to Dealogic.
  
  The company had earlierraisedabout 48.7 billion yuan ($7.64 billion), a figure thatcould go even higherto 56 billion yuan ($8.8 billion) if an over-allotment option is taken by early February.
  
  China Mobile’s shares were trading at 58.64 yuan ($9.23) apiece in Shanghai as of 2:34 p.m. local time. The company’s stock in Hong Kong, where it also trades, jumped 4.3%, too.
  
  The massive debut makes for one of the world’s biggest equity offerings in recent months — and a splashy homecoming for China Mobile.
  
  China Mobile plans to raise up to $8.8 billion by listing shares in Shanghai
  
  Last year, the firm, along with two other Chinese state-run telecom providers — China Telecom and China Unicom — werekicked offthe New York Stock Exchange, after the Trump administration barred American investment in companies with ties to the Chinese military.
  
  US President Joe Bidensignedan executive order in June that expanded the ban.
  
  Since then, China Telecom, the country’s second largest telecom firm, has also listed in Shanghai. Its $7.4 billion raise last year was one of mainland China’s biggest on record, too, according to Dealogic.
  
  Meanwhile, China Unicom already trades in Shanghai and Hong Kong, while both China Mobile and China Telecom are listed in Hong Kong.
  
  China Mobile gets the green light to list in Shanghai after it was kicked out of New York
  
  Mainland investors had been eyeing a comeback for China Mobile since last month, when the companysaidthat it had received approval from Chinese regulators to move ahead with its latest share sale in Shanghai.
  
  It alsoannouncedplans in a stock exchange filing Tuesday to buy back up to 10% of its Hong Kong-listed shares.
  
  In August, the firm said that it would use its new funds to shore up its 5G capabilities, as well as cloud infrastructure and smart home projects.
  
  It disclosed plans to use roughly half the money it planned to raise in Shanghai on wireless technology, and build at least 500,000 5G base stations by 2022.
