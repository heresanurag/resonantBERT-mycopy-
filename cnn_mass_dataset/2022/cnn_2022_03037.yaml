title: "Tom Brady answers retirement question"
date: "2022-10-21"
section: "Entertainment"
url: "https://www.cnn.com/2022/10/21/entertainment/tom-brady-retirement"
content: |
  We may not know what’s next for Tom Brady and his wife Gisele Bündchen, but the famed quarterback has put one highly speculated item to rest.
  
  “I’m here to announce finally you guys pushed me to the brink,” Brady joked in a video of a Tampa Bay Buccaneers’ press conferenceposted on their verified Instagram account Thursday.
  
  “I love the sport, I love the teammates and I wanna go do a great job for this team like I always have,” he said. “So no retirement in my future.”
  
  Earlier this month, a source close to seven-time Super Bowl champion quarterback and his estranged model wife told CNN the pair had each hireddivorce attorneys. They married in 2009 and have two children.
  
  Tom Brady and Gisele Bündchen have hired divorce attorneys, source says
  
  There has been chatter that Brady reversing his February retirement decision may have factored into their marital problems.
  
  Bündchentalked to Elle magazinefor a story that published last month about the “violent sport” Brady plays in and wanting him to “be more present.”
  
  “I have definitely had those conversations with him over and over again,” she said. “But ultimately, I feel that everybody has to make a decision that works for [them]. He needs to follow his joy, too.”
