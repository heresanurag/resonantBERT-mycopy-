  “Based on these data, we believe we have two very strong Omicron-modified candidates that elicit a substantially higher immune response against Omicron than we’ve seen to date,” Pfizer Chairman and Chief Executive Officer Albert Bourla said in a news release.
  
  Earlier this month, Moderna reported itsbivalent Covid-19 vaccine boosterthat contained a vaccine targeting Omicron showed a stronger immune response against the variant. The company said its updated booster also showed a “potent” response against the BA.4 and BA.5 subvariants.
  
  The companies will present their data on Tuesday, when the US Food and Drug Administration’s Vaccines and Related Biological Products Advisory Committeemeets to voteon updated coronavirus vaccines for the fall.
