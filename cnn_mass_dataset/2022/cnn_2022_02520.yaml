  A Google engineer claims that one of the tech company’s unreleased artificial intelligence programs advanced so much that it has achieved a level of consciousness. Google and many in the AI communityquickly shut down the engineer’s claims, but the mere idea is sparking fascinating conversations – and stoking fears – about the potential for what this technology can do.
  
