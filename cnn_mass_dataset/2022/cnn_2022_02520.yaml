  The chairman of the House select committee investigating the January 6, 2021, attack on the US Capitol told reporters that the panelwon’t criminally refer former President Donald Trumpor others to the Justice Department. Democratic Rep. Bennie Thompson’s statement on Monday drew quick reactions from other members of the committee, revealing the panel is split over how to handle potential criminal referrals of Trump andhis associatesfor prosecution.In Monday’s hearing, Democratic Rep. Zoe Lofgren laid out evidence that Trump knew he had lost the 2020 election, was told he had lost on dozens of occasions, and not only refused to accept it but actively pushed conspiracy theories and other false claims that he knew were wrong to stir up his party’s base. In response, Trump lashed out in a 12-page statementtrashing the committee’s work.
  
  Stocks plunged again Monday, officially pushing the S&P 500 into bear market territory – which happens when stocks close down 20% or more from their most recent high. In short, stocks are tumbling due to inflation and the Federal Reserve’s efforts to tame it, experts say. One month ago, Federal Reserve Chairman Jerome Powell said that the central bank was not “actively considering” raising interest rates by three-quarters of a percentage point to fight inflation, but Wall Street is now worried that Powell may have to change his tune. The S&P 500, the broadest measure of Wall Street, is down more than 21% from its high reached in early January – and cryptocurrencies have also joined the meltdown.Bitcoin fell below $23,000 todayas investors bailed out of risky assets.
  
  The vast majority of Republican senators are showing they are hesitant to fully embrace the announcedgun safety framework,with many telling CNN they want more details before saying where they stand. It’s a sign of just how hard it will be for Republicans to hold on to the support they have and expand it, as pro-gun groups and others whip up supporters against the framework.Sen. Joe Manchin of West Virginia– the most conservative Democrat in the Senate – defended the newly reached bipartisan agreement on Monday, adding it takes “no rights away, no privileges away” from gun owners. Separately, Ohio’s governor Monday signed a Republican-backed bill into law that makes iteasier for teachers and staff to carry gunson school premises.
  
  The embattled Ukrainian city ofSeverodonetskis nearly completely controlled byRussian forces, according to Ukrainian military officials. The third of three main bridges to the city wasdeemed impassableon Monday, making evacuations extremely difficult. Meanwhile, the human rights group Amnesty International hasaccused Russia of war crimesduring its efforts to capture the northeastern Ukrainian city of Kharkiv, documenting the alleged use of cluster munitions and “other indiscriminate means of attack which killed and injured hundreds of civilians.” Ukraine’s national police said authorities are also investigating the deaths of more than 12,000 civilians across the country.
  
  Severe flooding has shut down Yellowstone National Park and left some people in surrounding communities trapped without safe drinking water, officials say. All park entrances have been closed to visitors through at least Wednesday, officials announced, citing “record flooding events” and a forecast of more rain to come.Images of the damageshow bridges partially collapsed and washed out roads across the park – 96% of which is in Wyoming, 3% in Montana and 1% in Idaho. The Yellowstone River, which runs through the park and several Park County cities, swelled to a record high this week due to recentheavy rainfall and significant runofffrom melting snow in higher elevations.
  
