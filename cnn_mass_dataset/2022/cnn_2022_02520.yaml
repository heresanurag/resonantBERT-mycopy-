  That’s how manyglobal travel destinationsare on the CDC’s “high” risk category for Covid-19 as of Monday. Some popular places that joined the “Level 3: Covid-19 High” category this week include Mexico, a favorite destination for US tourists, and the UAE, the Middle East’s glitzy hot spot. TheLevel 3 categoryapplies to countries that have had more than 100 cases per 100,000 residents in the past 28 days, the CDC said.
  
  “We remain concerned about the prospects for what would be a seventh nuclear test over multiple administrations. We know that the North Koreans have done preparations for such a test. We are being extremely vigilant about that.”
  
  – Secretary of State Antony Blinken, emphasizing the US is prepared to make adjustments to military posture in response to apotential nuclear test by North Korea. Following several recent missile launches by Pyongyang, Blinken said Monday the US is “preparing for all contingencies” and is in “very close touch” with partners like South Korea and Japan “to be able to respond quickly” ifNorth Koreacarries out such a test.
  
