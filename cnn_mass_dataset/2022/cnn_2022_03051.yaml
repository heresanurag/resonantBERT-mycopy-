title: "Tech wreck: Goldman Sachs cuts Netflix, Roblox and eBay to ‘sell’"
date: "2022-06-10"
section: "Investing"
url: "https://www.cnn.com/2022/06/10/investing/goldman-sachs-sell-netflix-roblox-ebay/index.html"
content: |
  Tech stocks have been obliterated this year. TheNasdaqis down more than 26%, putting that index in a bear market. Unfortunately for investors, analysts at Goldman Sachs see more pain ahead for some (but not all) tech heavyweights.
  
  Goldman Sachs analysts downgraded shares of Netflix(NFLX), eBay(EBAY)and gaming/metaverse giantRobloxto rare “sell” ratings on Thursday. The Goldman Sachs analysts had previously rated these stocks with a lukewarm “neutral.”
  
  The analysts said the downgrades were done after they decided “to incorporate a greater probability of a weaker macro environment and solidly lower revenue growth…to reflect broader industry maturation.”
  
  In other words,rate hikes,increased competitionand the fact that consumers are less worried about Covid and leaving their homes more often instead of sheltering in place are catching up to Netflix, Roblox and eBay.
  
  Shares of Netflix and eBay both tumbled 5% Friday while Roblox fell 9%.
  
  Netflix's world has been turned upside down as stock plunges 35%
  
  The Goldman Sachs analysts said they downgraded Netflix due to “concerns around the impact of a consumer recession as well as heightened levels of competition.” They said Netflix is now a “show-me story.”
  
  There are growing worries that cash-strapped consumers may find that they are now paying for too many streaming service and need to cut back.
  
  Netflix isno longer the only streaming gamein town, as Disney(DIS), Amazon(AMZN), Apple(AAPL),Paramount, Comcast(CMCSA)and CNN ownerWarner Bros. Discoveryall have their own services with exclusive content.
  
  Goldman Sachs seems less worried aboutcompetition for Roblox, saying it is still “the best positioned company in the gaming/interactive entertainment” business and has good “long-term secular growth opportunities.”
  
  But there are “increasing concerns around the post-pandemic environment” for Roblox. The Goldman analysts expect “slowing growth” in the near term.
  
  Is the summer vacation boom over before it even began?
  
  As foreBay, the Goldman Sachs analysts noted that “with the global consumer environment under pressure and eCommerce growth slowing in a post-pandemic world, we see eBay’s…revenue growth at risk, [especially] given its overexposure to international markets.”
  
  The Goldman Sachs analysts also reiterated their “sell” rating on another big tech firm:Airbnb. The analysts slashed their target price on Airbnb from $150 to $95. The stock currently trades at about $110.
  
  The analysts said that even though “pent-up travel demand…remains a tailwind,” there are concerns about a recession, the stock’s valuation and the possibility of “potential normalization of consumer travel habits” leading to more people staying at hotels as opposed to renting homes when they go on vacation.
  
  Still, it wasn’t all doom and gloom from the so-called Vampire Squid about Big Tech.
  
  The Goldman Sachs analysts said they were maintaining their buy rating on Amazon(AMZN), Uber(UBER),FacebookownerMeta Platforms, Google and YouTube parent Alphabet(GOOGL), Barry Diller’s internet conglomerate IAC(IAC)and its real estate tech spin-off Angi(ANGI)as well as online dating apps Match(MTCH)andBumble.
