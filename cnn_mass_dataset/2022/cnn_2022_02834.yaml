  ##### In pictures: Supreme Court Justice Ketanji Brown Jackson
  
  Here is a look at the life of [US Supreme Court](http://www.cnn.com/2013/06/10/us/u-s-supreme-court-fast-facts/index.html) Justice[Ketanji Brown Jackson](https://www.cnn.com/2022/02/02/politics/ketanji-brown-jackson-profile/index.html).
  
  ## Personal
  
  **Birth date:** September 14, 1970
  
  **Birth place:** Washington, DC
  
  Ad Feedback
  
  **Birth name:** Ketanji Onyika Brown
  
  **Father:** Johnny Brown, attorney
  
  **Mother:** Ellery Brown, school principal
  
  **Marriage:** Patrick Jackson (1996-present)
  
  **Children:** Leila and Talia
  
  **Education:** Harvard University, B.A., 1992, magna cum laude; Harvard Law School, J.D., 1996, cum laude
  
  **Religion:** Nondenominational Protestant
  
  ## Other Facts
  
  Ketanji Onyika is an African name [meaning “lovely one.”](https://www.cnn.com/2022/03/21/politics/ketanji-brown-jackson-hearing-monday-takeaways/index.html)
  
  While at Harvard Law School, Jackson served as a supervising editor for the Harvard Law Review.
  
  Jackson is the [first Black woman to be nominated](https://www.cnn.com/2022/03/24/politics/kbj-black-women-reaction/index.html) to the [United States Supreme Court.](https://www.cnn.com/2013/08/27/us/supreme-court-nominations-fast-facts/index.html)
  
  Jackson is the first justice to be a former public defender.
  
  Jackson is [related by marriage](https://www.cnn.com/2022/03/22/politics/who-is-ketanji-brown-jackson-family/index.html) to former House Speaker and longtime Republican [Rep. Paul Ryan](https://www.cnn.com/2013/03/01/us/paul-ryan-fast-facts/index.html).
  
  [Nominated](https://www.grammy.com/artists/ketanji-brown-jackson/61278) for one [Grammy award](https://www.cnn.com/us/grammy-awards-fast-facts).
  
  ## Timeline
  
  **1992-1993 -** Staff reporter and researcher at Time magazine.
  
  **1996-1997 -** Law Clerk for District of Massachusetts Judge Patti B. Saris.
  
  **1997-1998 -** Law Clerk for First Circuit Court of Appeals Judge Bruce M. Selya.
  
  **1998-1999 -** Associate at Miller, Cassidy, Larroca & Lewin LLP.
  
  **1999-2000 -** Law Clerk for [Associate Justice Stephen G. Breyer](https://www.cnn.com/2013/02/19/us/stephen-breyer-fast-facts/index.html).
  
  **2000-2002 -** Associate at Goodwin Procter LLP.
  
  **2002-2003 -** Associate at Feinberg Rozen, LLP (formerly known as The Feinberg Group, LLP).
  
  **2003 -2005 -** Assistant Special Counsel at the United States Sentencing Commission.
  
  **2005 -2007 -** Assistant Federal Public Defender in Washington, DC.
  
  **2007-2010 -** Of Counsel at Morrison & Foerster LLP.
  
  **2010-2014 -** Vice Chair and Commissioner at the United States Sentencing Commission.
  
  **September 20, 2012 -**[President Barack Obama](https://www.cnn.com/2012/12/26/us/barack-obama---fast-facts/index.html) nominates Jackson for US District Court Judge. On March 23, 2013, the Senate votes to confirm Jackson.
  
  **March 30, 2021 -**[President Joe Biden](https://www.cnn.com/2013/01/22/us/joe-biden-fast-facts/index.html) announces his intent to nominate Jackson for the United States Court of Appeals for the DC Circuit. [On June 14, the Senate votes 53-44 to confirm Jackson](https://www.cnn.com/2021/06/14/politics/ketanji-brown-jackson-confirmation-vote-senate/index.html).
  
  **February 25, 2022 -**[Biden announces he has selected Jackson as his nominee](https://www.cnn.com/2022/02/25/politics/supreme-court-ketanji-brown-jackson/index.html) to the Supreme Court.
  
  **April 7, 2022 -**[The Senate votes 53-47 to confirm Jackson](https://www.cnn.com/2022/04/07/politics/ketanji-brown-jackson-senate-vote-latest/index.html).
  
  **June 30, 2022 -**[Jackson is sworn in as an associate justice to the United States Supreme Court](https://www.cnn.com/2022/06/30/politics/who-is-justice-ketanji-brown-jackson/index.html), becoming the first Black woman to take a seat on the high court.
  
  **September 30, 2022 -**[Jackson’s investiture ceremony](https://www.cnn.com/2022/09/30/politics/justice-ketanji-brown-jackson-investitutre/index.html) is held.
  
  **September 3, 2024 -**[Jackson’s memoir, “Lovely One,” is published](https://www.cnn.com/2024/09/03/politics/ketanji-brown-jackson-new-memoir/index.html).
  
  **December 14, 2024 -**[Jackson makes her Broadway debut](https://www.cnn.com/2024/12/16/politics/video/ketanji-brown-jackson-broadway-juliet-digvid) with a [one-night-only walk-on role](https://www.instagram.com/p/DDXpMVlOFtv/?igsh=YWswbGhza2IyajVq) in “[& Juliet.](https://www.cnn.com/2024/12/10/politics/justice-ketanji-brown-jackson-broadway-show/index.html)” She participates in a talkback with the audience following the performance.
  
