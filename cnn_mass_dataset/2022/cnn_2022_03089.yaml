title: "Trump defends Nebraska gubernatorial candidate facing groping allegations"
date: "2022-05-01"
section: "Politics"
url: "https://www.cnn.com/2022/05/01/politics/trump-defends-herbster-sexual-misconduct-claims/index.html"
content: |
  Former President Donald Trump defended Nebraska gubernatorial candidate Charles Herbster at a rally on Sunday,dismissing recent sexual misconduct allegationsagainst him as “malicious” and saying they were the main motivation for his decision to hold an event in the Cornhusker State ahead of the GOP primary later this month.
  
  “He’s been badly maligned and it’s a shame. That’s why I came out here,” Trump, who hasfaced more than a dozensexual misconduct allegations and denied them, said of Herbster during his remarks in Greenwood. “It would have been easy for me to say, ‘I’m not gonna come.’ I defend my people when I know they’re good.”
  
  The full-throated defense came just days afterthe Nebraska Examinerreported that seven women, including Republican state Sen. Julie Slama, had accused Herbster of groping them at political events or beauty pageants, with an additional woman accusing him of kissing her forcibly. In six cases, at least one eyewitness corroborated the women’s allegations, the publication reported.
  
  Herbster has denied the allegations, calling them “100% false.” Hefiled a lawsuitFriday against Slama – who says that Herbster reached up her skirt during a Republican fundraising dinner in 2019 – and claimed to have suffered “grievous harm to his reputation” from her accusation.
  
  Trump on Sunday claimed to have met several friends of Herbster who defended him before the former President took the stage.
  
  “Charles W. Herbster will never bend to the RINOs, the media, or the radical left. That’s why they’re doing everything they can to stop him. Malicious charges to derail him long enough that the election can go by before the proper defense can be put forward,” the former President said.
  
  “But he’s already got the proper defense. He doesn’t even know about this stuff. That’s the proper defense. Charles is a fine man. And he’s innocent of these despicable charges,” Trump added, without citing any evidence. “I could’ve gotten out of this one real easy. I could have played golf. I could have gone to the beach. And I’m here with Charles W. Herbster.”
  
  The May 10 gubernatorial primary in Nebraska is one of several upcoming tests for the influence of Trump’s endorsement in GOP primaries. Candidates backed by the former President are facing competitive primaries for House, Senate and governor’s races in May in several states, includingOhio,West Virginia,North Carolina,PennsylvaniaandGeorgia.
  
  Trump’s speech Sunday lasted nearly two hours, and saw him return to a number of familiar topics including false claims about the 2020 election. The rally, which was rescheduled following tornado warnings on Friday night, featured several speeches from Trump-aligned figures and other GOP candidates.
  
  The former President was also joined by informal advisers David Bossie and Matt Schlapp, and US Rep. Billy Long, a Senate hopeful in Missouri.
  
  “They’re all doing good. They’re all doing good. And let’s see what happens,” Trump said of the candidates he’s endorsed.
  
  Herbster is not the first Trump-supported candidate this cycle to face allegations ofmistreatment of women.
  
  In Ohio, House hopeful Max Miller is facingallegations of abusefrom an ex-girlfriend, former White House press secretary Stephanie Grisham. Miller has denied the allegations and has filed a defamation suit against Grisham. Former football star Herschel Walker, who is running for Senate in Georgia, has been accused ofthreatening multiple womenover the course of a decade. Walker has spoken of his struggles with mental illness, and his campaign has noted that he has gotten help since the allegedly violent incidents in the early 2000s. He has denied allegations of threats made in at least two cases.
  
  And Trump had endorsed Sean Parnell for Senate in Pennsylvania before the candidatedropped out of the racein late 2021. Parnell had lost a custody fight with his estranged wife, who had accused him of committing abusive acts against her. Parnell has denied the allegations.
