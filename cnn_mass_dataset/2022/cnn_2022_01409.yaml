  “Out of stock.” Many moms are still seeing that sign on empty store shelves where baby formula was once plentiful. Despite dozens of international flights loaded with formula that have already come into the US, experts say the product hasn’t been replenished in stores due toconsumer stockpiling. As a result, some moms are traveling significant distances –even across borders– just to feed their children.
  
