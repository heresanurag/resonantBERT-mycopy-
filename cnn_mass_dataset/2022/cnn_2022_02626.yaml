id: cnn_2022_02626
title: "Six high school-aged girls dead after crash with semitruck, Oklahoma Highway Patrol says"
date: "2022-03-22"
section: "US"
url: "https://www.cnn.com/2022/03/22/us/oklahoma-truck-crash-high-school-girls/index.html"
content: |
  Six high school-aged girls died in a crash with a semitruck, the Oklahoma Highway Patrol said Tuesday.
  
  Highway patrol spokesperson Sarah Stewart told CNN the fatal crash happened about 1:30 p.m.
  
  The girls were riding in a small passenger vehicle when it collided with a semitruck at an intersection in the city of Tishomingo, about 122 miles south of Oklahoma City, Stewart said.
  
  The condition of the semitruck driver is not yet known, Stewart said, along with the cause of the crash.
  
  “Our district has suffered a great loss today involving high school students. Our hearts are broken, and we are grieving with our students and staff,” said Bobby Waitman, Tishomingo Public Schools superintendent, in a statement.
  
  “Schools will be in session tomorrow at each campus, but our focus will be the emotional well-being of our students,” Waitman’s statement read.
  
  The National Transportation Safety Board is sending five investigators to help investigate the accident, the agency said Wednesday.
