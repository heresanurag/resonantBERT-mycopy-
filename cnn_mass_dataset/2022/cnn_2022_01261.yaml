title: "Fund for those affected by Uvalde school massacre clears $11 million in donations, city officials say"
date: "2022-06-11"
section: "US"
url: "https://www.cnn.com/2022/06/11/us/uvalde-texas-elementary-school-shooting-saturday/index.html"
content: |
  A fund created for thevictims of the massacreat a Uvalde, Texas, elementary school has garnered more than $11 million from donations worldwide, city officials said Friday.
  
  The Robb School Memorial Fund was established to help those affected by last month’s mass shooting that killed19 students and two teachers.
  
  As of Friday, $11.5 million have been donated to the fund, which is run through a partnership with the First State Bank of Uvalde and the Austin-based nonprofitOneStar Foundation, according to the city.
  
  Uvalde shooting victim's parents say their child is changed forever
  
  “Funds are continually being received by generous and compassionate individuals, businesses, and organizations from across Texas, the nation, and the world,” Uvalde Mayor Don McLaughlin said.
  
  A steering committee comprised of residents will decide in the coming weeks how the money will be distributed and used, city officials said, adding that a “transparent program protocol” will be presented to the public.
  
  As families mourn the loss of loved ones andsurvivors struggle to make sense of their trauma, officials have facedintense scrutinyover how law enforcement initially responded to the deadliest school shooting in the US in nearly a decade.
  
  Pedro “Pete” Arredondo, the Uvalde school police chief identified by other officials as the incident commander on scene, recently gave his first extensive public comments inan interviewwith the Texas Tribune.
  
  Speaking to the outlet by phone, written answers, and in statements provided by his attorney, George E. Hyde, Arredondo said that hedidn’t consider himselfthe incident commander and did not instruct officers to refrain from breaching the scene.
  
  Uvalde school police chief says he didn't keep officers from breaching massacre scene and didn't consider himself the commander, report says
  
  “I didn’t issue any orders,” Arredondo told the Tribune, which noted that the chief instructed officers to start breaking the outside windows of other classrooms and begin evacuating students. “I called for assistance and asked for an extraction tool to open the door” of one of the classrooms where the shooting happened, he said.
  
  The gunman was in adjoining classrooms with students and teachers formore than an houruntil police were able to open the locked door with a key from a janitor, according to a timeline released by the Texas Department of Public Safety.
  
  As those critical moments elapsed, some children were still alive and calling 911 for help; one survivor told CNN shesmeared herself with her friend’s bloodand played dead.
  
  During that time, Arredondo “assumed that some other officer or official had taken control of the larger response,” the Tribune reported. “He took on the role of a front-line responder.”
  
  Hyde told CNN in a text message Friday that neither him nor Arredondo would speak further at this time.
  
  “My client needs some time as this has been very difficult for him. At this point we will not be granting any interviews immediately,” Hyde said.
  
  A Texas House committee will hold one of its investigative hearings June 20 in Uvalde. Texas state Rep. Dustin Burrows said members of the town’s police department will testify, but when asked whether Arredondo would take part, he told reporters, “Not yet.”
  
  The committee held its first hearing in its probe into theRobb Elementary shootingon June 9.
  
  The panel may release its preliminary findings before the full probe is complete, Burrows, the committee chairman, said in the panel’s opening remarks. The preliminary report is expected to be complete by the end of the month, a source close to the committee told CNN.
  
  Key moments from Wednesday's emotional hearing on gun violence
  
  Burrows, along with the two other committee members – State Rep. Joe Moody and former Texas Supreme Court Justice Eva Guzman – have heard private testimony from top Texas Department of Public Safety officials, according to a witness list provided by the committee.
  
  When asked by CNN about how it felt to review the evidence surrounding the shooting, Moody said, “Like every other parent in this state, I’m sad. I’m scared. I’m shocked.”
