title: "Sam Asghari says he’s ‘always looked forward to’ fatherhood"
date: "2022-04-12"
section: "Entertainment"
url: "https://www.cnn.com/2022/04/12/entertainment/sam-asghari-britney-spears-fatherhood/index.html"
content: |
  Britney Spears has shared thatshe is having a babyand now her fiancé is revealing his thoughts about fatherhood.
  
  “Marriage and kids are a natural part of a strong relationship filled with love and respect,”Sam Asghariwrote on his verified Instagram account Monday.
  
  “Fatherhood is something i have always looked forward to and i don’t take lightly,” he wrote in the caption of a drawing showing a family of lions. “It is the most important job i will ever do.”
  
  Earlier Spears had posted on her verified Instagram account that after losing some weight to go on a recent Maui vacation, she had gained it back and wrote that Asghari told her she was “food pregnant.”
  
  “So I got a pregnancy test … and uhhhhh well … I am having a baby,” Spears wrote.
  
  Asghari and Spearsgot engaged in September 2021and do not currently have any children together.
  
  She shares teen sons Sean and Jayden with ex-husband Kevin Federline.
