title: "Mega Millions jackpot swells to $790 million after no lottery ticket drew all 6 winning numbers"
date: "2022-07-23"
section: "US"
url: "https://www.cnn.com/2022/07/23/us/mega-millions-jackpot-friday/index.html"
content: |
  TheMega Millions jackpothas surged to a whopping $790 million after no ticket matched all six winning numbers in Friday night’s drawing.
  
  Friday’s winning numbers were 14, 40, 60, 64, 66, plus the gold Mega Ball 16, according to the lottery’s website.
  
  The night’s $630 million prizewas the equivalent of about $388 million in cash, the lottery said.
  
  The next drawing is scheduled Tuesday, when the cash prize is estimated to be $464.4 million.
  
  “There have been only three lottery jackpots ever won – in any game – at a higher level than next Tuesday’s estimated prize of $790 million,” the lottery said in a news release.
  
  Two of those were Mega Millions jackpots – $1.537 billion won in South Carolina on October 23, 2018, and $1.050 billion won in Michigan on January 22, 2021.
  
  A $1.586 billionPowerball jackpotis currently the jackpot world record, which was won on January 13, 2016.
  
  Although nobody drew the six numbers, therewere four big winners Fridayas they drew the first five numbers. In the case of three of those tickets – sold in Delaware, New Jersey and New York – they had opted for the Megaplier, giving each a $3 million prize. The fourth ticket to match the five numbers was sold in Virginia and was worth $1 million, according tothe lottery.
  
  Four Mega Millions jackpots were won this year across Tennessee, California, New York and Minnesota.
