title: "First US death due to monkeypox confirmed in Los Angeles County"
date: "2022-09-12"
section: "Health"
url: "https://www.cnn.com/2022/09/12/health/california-monkeypox-death"
content: |
  A Los Angeles County resident’s death has been attributed tomonkeypox, the county Department of Public Health said Monday, the first known death from the virus in the US.
  
  The department and the US Centers for Disease Control and Prevention confirmed the link and said the person had a severely weakened immune system and had been hospitalized. No further information will be made public, the department said in anews release.
  
  Global experts race to understand rare cases when monkeypox leads to death
  
  “Persons severely immunocompromised who suspect they have monkeypox are encouraged to seek medical care and treatment early and remain under the care of a provider during their illness,” the news release says.
  
  Dr. William Schaffner, a professor in the Division of Infectious Diseases at Vanderbilt University Medical Center, told CNN in an email that the person’s “impaired immune system could not control the virus once it entered his body, the virus multiplied in an uncontained fashion and it likely spread to several organ systems, causing their malfunction.”
  
  Deaths from monkeypox are extremely rare and often affect babies, pregnant women and people with weakened immune systems, such as from HIV. A person in Harris County, Texas, who had monkeypox died last month, but the virus’ role in that death has not been confirmed.
  
  There have been almost 22,000 cases of probable or confirmed monkeypox reported in the US this year, as of Monday,CDC datashows. California has the most cases: 4,300.
  
  Globally in this outbreak, there have been almost 58,000 cases and 18 confirmed deaths, according toCDC data, which does not yet include the US death.
  
  Trends in monkeypox cases appear to be leveling off, health officials say, but that shouldn’t lead to complacency.
  
