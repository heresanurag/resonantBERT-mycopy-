title: "Walmart will stop selling cigarettes in some stores"
date: "2022-03-28"
section: "Business"
url: "https://www.cnn.com/2022/03/28/business/walmart-cigarettes-sales-retail/index.html"
content: |
  Walmart, the world’s largest retailer, will stop selling cigarettes in select US stores followingyears of pressureon big chains to end tobacco sales.
  
  Cigarettes are being removed from Walmart in various markets, including some stores in California, Florida, Arkansas and New Mexico, the Wall Street JournalreportedMonday. In some of these stores, Walmart has added more self-checkout registers, as well as other items such as grab-and-go food or candy in place of cigarettes, the Journal said.
  
  The move is Walmart’s latest change to its tobacco policies.
  
  Why Amazon makes you click a box to redeem coupons
  
  Walmart(WMT), which has around 5,000 stores in the United States, in 2019raised the minimum ageto buy tobacco to 21 and stopped selling e-cigarettes. Sam’s Club, owned by Walmart(WMT), has also stopped selling cigarettes at most of its stores in recent years.
  
  Walmart did not say how many of its stores have removed tobacco entirely. A spokesperson for Walmart told CNN Business that it made the “business decision” to end tobacco sales in select stores “as a result of our ongoing focus on the tobacco category.”
  
  Public health advocates have long urged retailers to stop selling tobacco products, and some cities and states have also banned tobacco sales in pharmacies.
  
  More than two dozen state attorneys general in 2014sent lettersto large retailers with pharmacies, including Walmart, to end tobacco sales.
  
  “There is a contradiction in having these dangerous and devastating tobacco products on the shelves of a retail chain that services health care needs,” the letters said.
  
  In 2014, CVS(CVS)announced it would stop selling tobacco. At the time, CVS(CVS)said the move would cost it an estimated $2 billion in revenue. CVS(CVS)said selling tobacco was “inconsistent with our purpose” of being a health care provider.
  
  Walgreens(WBA)CEO Roz Brewer last year saidtobacco saleswere under “real scrutiny right now. And so you’ll see more to come in that area.”
  
  Costco(COST)sells tobacco in some stores. Target(TGT)ended tobacco salesin 1996.
  
  Cigarette sales in the United Statesrose in 2020for the first time in two decades.
  
  The North American Quitline Association, a nonprofit that promotes tobacco-quitting services, attributed the reversal to “stress and anxiety resulting from the pandemic.”
