title: "Opinion: Families suffered from America’s nuclear testing. They still need help"
date: "2022-05-12"
section: "Opinion"
url: "https://www.cnn.com/2022/05/12/opinions/nuclear-testing-victims-reca-lujan?cid=external-feeds_iluminar_msn"
content: |
  Editor’s Note:Ben Ray Luján is the junior United States senator from New Mexico. The views expressed in this commentary are his own. Read moreopinionarticles on CNN.
  
  As the sun rose over Tularosa, New Mexico, on July 16, 1945, Henry Herrera helped his father fill their truck’s radiator. Suddenly, a blinding flash overtook the dawn light. A roaring boom followed, striking fear into Henry and his family. Elsewhere in Tularosa, some were knocked back from their breakfast tables. Others pulled out rosaries to pray.
  
  On that July morning, the Manhattan Project conducted itsfirst atomic weapons testsome 25 miles away at the Trinity Test Site. In a matter of seconds, these tests inflicted damage that would endure for generations. The radioactive fallout would afflict Herrera and his family with cancers and other diseases for decades to come.
  
  Between 1945 and 1992, the United States conductedmore than 200 above-ground nuclear weapons tests, releasing harmful radioactive material into the air and blanketing parts of the country, especially New Mexico. Individuals living near these test sites, known as “downwinders,” continue to suffer health effects related to the testing. Similarly, workers who helped mine, mill and transport the uranium needed for these weapons – and their families –continue to bear the consequencesof this work done in service to our country.
  
  To account for these sacrifices made for our national defense, Congress originally passed theRadiation Exposure Compensation Act (RECA)on a bipartisan basis in 1990. RECA provides one-time payments to individuals who developed “cancer or other diseases after exposure to atomic-weapons testing or contact with uranium.” The RECA program, which is scheduled to sunset in July of this year,has providedmore than $2.5 billion to more than 39,000 claimants since becoming law.
  
  To be sure, these efforts are better than no effort at all. But in its current form, RECA does not go far enough.
  
  The original RECA bill failed to recognize that radioactive fallout is not restricted by state lines. Unacceptably, RECA has continually left New Mexicans out. This is wrong. Only those who lived near the Nevada test site during a period of atomic-weapons testing are eligible for compensation as a downwinder. Alsoneglectedare the uranium workers exposed to radiation after 1971.
  
