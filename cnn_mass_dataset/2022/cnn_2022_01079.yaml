  Mybill– introduced alongside Republican Sen. Mike Crapo of Idaho – would strengthen the current RECA program by expanding the geographic downwinder eligibility to cover then-residents of the entirety of New Mexico, Colorado, Arizona, Nevada, Utah, Idaho, Montana and Guam. This legislation would also expand eligibility for individuals who worked in uranium mines and mills or who transported uranium ore after 1971. It would double the compensation an individual receives and extend the program for another 19 years.
  
  While the final goal must be expansion and long-term extension, I am proud to have worked with my colleagues to secure atwo-year continuationfor RECA in the Senate. Just this week, the House approved of the measure and sent it to President Biden’s desk.
  
  As Congress deliberates, widespread heartbreak and loss afflict downwinders and their families to this day – and their stories speak for themselves.
  
  TakeBeata Tsosie, a Tewa woman from Santa Clara Pueblo in New Mexico, whose family and community continue to endure the ongoing harms resulting from radiation exposure on an intergenerational basis. She knows that, ultimately, her children could inherit the legacy of contamination from nuclear weapons production. RECA, in its current form, excludes Beata and her family.
  
  Or considerLivia Cordova, a young steering committee member at the Tularosa Basin Downwinders Consortium. Cordova inarguably has been exposed to too much death and disease for someone her age, having grown up with cancer plaguing her family. In 2020, she gave testimony for the 75th Anniversary of the Trinity Test, sharing the love she feels for her family and the gutting pain of losing them to cancers related to exposure. Cordova’s family, too, is left out by RECA as it stands.
  
  The legislation Sen. Crapo and I put forward will help these families. Though the federal government cannot fully decontaminate Tsosie’s community or undo the suffering endured by Cordova’s loved ones or Henry Herrera, it can take steps to make amends. As I see it, an expanded and extended RECA would be a down payment of compensation for the irreparable harm done to these communities. In short, it’s an act of long-overdue justice.
  
  I will keep up the fight for this legislation and build further bipartisan support for its passage – not just to help the countless New Mexico families burdened by loss and disease, but to affirm that the US government is in the business of making things right.
