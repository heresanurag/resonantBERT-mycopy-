title: "Zelle fraud is rising. And banks aren’t coming to the rescue"
date: "2022-10-03"
section: "Business"
url: "https://www.cnn.com/2022/10/03/business/nightcap-zelle-fraud-warren-investigation/index.html"
content: |
  This story is part of CNN Business’ Nightcap newsletter. To get it in your inbox, sign up for free,here.
  
  Zelle, the popular payment app, is under fire for how it handles (or rather, doesn’t handle) fraud and scams that have exploded on the platform in recent years.
  
  The New York Timescalled Zelle outin two reports earlier this year. That grabbed the attention of US senators, who pressed the CEOs of the nation’s large banks that own the platform in hearings last month and began an investigation into the service.
  
  Here’s the deal: On Monday, Senator Elizabeth Warren’s office said its investigation into Zelle showed that fraud and theft are not only rampant but getting worse. And once people report fraudulent transactions, banks are reimbursing only a small fraction of the swindled customers.
  
  “Big banks own and profit from Zelle but are failing to make their customers whole for both authorized and unauthorized fraudulent activity on the platform, despite their claims that it is safe,” Warren’s office wrote.
  
  Naturally, where the internet and money collide is where scammers get to work.
  
  Zelle’s size and accessibility — it’s built right into participating banks’ apps — make it the “preferred tool of fraudsters and other bad actors,” according to the report from Warren’s office.
  
  Among the investigation’s key findings, which corroborate anecdotal evidence reported by the Times:
  
  Zelle sought to downplay the report and didn’t specifically address Warren’s allegations Monday. In a statement, the company said: “Tens of millions of consumers use Zelle without incident, with more than 99.9% of payments completed without any report of fraud or scam,” adding that the proportion of fraud and scams has steadily decreased as its user numbers have climbed.
  
  The Bank Policy Institute, a banking industry group, also disputed Warren’s findings and claimed that Zelle’s rivals Venmo and CashApp receive more reports of disputed transactions.
  
  “Zelle is the safest peer-to-peer network,” it said in a statement Monday. “For any real discussion of online fraud, the focus belongs elsewhere.”
  
  It’s kind of crazy to remember how anyone moved money among friends before the advent of payment apps. Did I actually carry cash with me? On the first every month did I take my little checkbook out and literallywrite outmy portion of the rent on a magic slip of paper and then just hand it to my roommates? Wild. It would not surprise me if the original idea for a payments app came from a restaurant server who was fed up with splitting bills unevenly across eight different cards.
  
  But that’s the pre-internet world Regulation E was made for. It’s a 1978 rule that only got a 21st century electronic payments update by the Consumer Financial Protection Bureau late last year. It wasn’t made for the world of instant payments, and could hardly have envisioned how easy the internet would make it to swindle people out of their money.
  
  Warren’s report on Zelle could add pressure on regulators including the CFPB to update its guidance.
  
  “Given this uncertain landscape and the banks’ abdication of responsibility, regulatory clarity is needed to further protect Zelle users,” researchers wrote in the report, noting that the CFPB has regulatory authority over peer-to-peer platforms including Zelle.
  
  Kim Kardashian, the reality TV star, cosmetics entrepreneur and budding private-equity manager,was hit with a $1.26 million finefor touting what turned out to be a worthless crypto token to her millions of Instagram followers.
  
  Kardashian failed to disclose that she was paid $250,000 for the endorsement. Her hashtag“#ad” in the June 2021 post wasn’t enough to satisfy the Securities and Exchange Commission.  In addition to the fine, Kardashian agreed to refrain from any crypto asset promotions for three years.
  
  “This case is a reminder that, when celebrities or influencers endorse investment opportunities, including crypto asset securities, it doesn’t mean that those investment products are right for all investors,” said SEC Chair Gary Gensler.
  
  In a development that I can only assume means that Liz Truss is a Nightcap reader, the British government is reversing part of its tax proposal that was so unpopular it nearly tanked the UK bond market last week.
  
  Here’s the deal: The newly installed government of Prime Minister Liz Truss had announced a massive slate of tax cuts that have amounted to a windfall for the nation’s wealthiest people, slashing the top rate of income tax to 40% from 45%.
  
  That provision “had become a distraction,” the finance minister said Sunday.
  
  The proposed cuts of more than $50 billion were aimed at turbo-boosting growth. Instead, it caused panic. The pound plunged to its lowest level against the US dollar, and sparked chaos in the market for UK debt because they will require a large increase in government borrowing.
  
  It was a dumpster fire of a plan that no mainstream economist supported.
  
  But, as my colleague Mark Thompson writes,the about-face is more of a symbolic gesturethan a genuine reckoning. It will likely reduce the overall size of the tax-cutting package by about £2 billion.
  
  “This move is rather symbolic, being less about the amount of money it will save (low billions) and more about the poor signal it had delivered of ideological (unfunded) tax cuts,” wrote Chris Turner, global head of UK markets at ING.
  
  Bottom line: The Truss government’s unfunded tax cuts, which set off a panic in financial markets and put Downing Street in a standoff with the Bank of England, remain, uh, unfunded. The BOE’s bond-buying intervention may have bought the government some time, but Truss has shown no signs of budging on her fringe trickle-down economic theory.
  
  Truss’ finance minister, Kwasi Kwarteng, “still has a lot of work to do if he is to display a credible commitment to fiscal sustainability,” said Paul Johnson, director of the Institute for Fiscal Studies, on Monday.
  
  “Unless he also U-turns on some of his other, much larger tax announcements, he will have no option but to consider cuts to public spending: to social security, investment projects, or public services.”
  
