id: cnn_2022_02071
title: "‘This is an issue of equality’: Maryland law to allow religious garments in college sports"
date: "2022-07-20"
section: "Sport"
url: "https://www.cnn.com/2022/07/20/sport/maryland-inclusive-athletic-attire-act-spt-intl/index.html"
content: |
  “We had to make this really tough decision between our love for our faith or our love for sports.”
  
  Simran Jeet Singh– Executive Director for the Aspen Institute’s Religion & Society Program, who studies religion, racism and justice – recalls his own experience of fighting for inclusion as a turbaned Sikh athlete.
  
  Growing up in Texas, he says he and his brothers were often denied the right to play school and college sports because of their turbans, a religious head covering worn by men of the Sikh religion.
  
  His is one of the voices welcoming the US state of Maryland’sInclusive Athletic Attire Act, also known as House Bill 515, which came into legal effect on July 1.
  
  The law requires the Maryland Public Secondary Schools Athletic Association, governing bodies of public institutions of higher education, county education boards and community college trustee boards to allow student athletes to modify athletic, or team uniforms, to conform to their religious or cultural requirements, or preferences for modesty.
  
  Under the law, modifications to athletic or team uniforms can include head coverings, undershirts or leggings worn for religious reasons.
  
  House Bill 515states that “any modification to the uniform or headgear must be black, white, the predominant color of the uniform, or the same color worn by all players on the team.”
  
  Any uniform modifications must not interfere with the student athlete’s movement or pose safety hazards to themselves or others. The Bill also stipulates that uniform modifications must not “cover any part of the face, unless required for the safety of the wearer.”
  
  In apress releaseissued by the Maryland office of the Council on American Islamic Relations (CAIR), director Zainab Chaudry said: “Our lawmakers have fundamentally leveled the playing field and improved the lives of thousands of children in our state.”
  
  She added: “Maryland ranks among the worst states in Americawhen it comes to juvenile justice … This progress is long overdue, and we thank the bill sponsors and every lawmaker who voted on the right side of history on these measures.”
  
  “I am so heartened to see that a state in the United States, Maryland, [is] no longer going to bar people from playing the sports they love because of how they look,” Singh tellsCNN Sport.
  
  “I think that’s what I really believe in sports. You’re supposed to bring people together, not divide them.”
  
  Singh held fast to this belief during his own days as a student athlete, where he and his brothers petitioned various sports governing bodies to allow them to play in religious attire, trailblazing a path to greater inclusion.
  
  To play high school soccer while wearing his turban, Singh says he petitioned the United States Soccer Federation (USSF) and was granted a letter to be carried from game to game that stated he could maintain religious attire while playing.
  
  “While that was helpful for me personally, it was essentially an exception to a discriminatory rule. But now, we’re at a place where we should just be changing the rule that’s discriminatory,” Singh says.
  
  “We shouldn’t put the onus on individuals, and especially on kids, to have to get permission to play and that’s a really important element of this Maryland rule.”
  
  Seeking permission to play in religious garments was the very obstacle faced by student athletes likeJe’Nan Hayes.
  
  In 2017, the Maryland student was excluded from her basketball team’s first regional final appearance because of her hijab, for which, she said, no one had previously invoked a rule saying she needed a state-signed waiver.
  
  Noor Alexandria Abukaramhad a similar experience. The Ohio high school athlete was disqualified from a 2019 district cross-country meet for wearing a hijab, which she later found out violated uniform regulations since she had not obtained a prior waiver to wear the head covering.
  
  Abukaram’s experience fueled her campaign for legislative change. Earlier this year, the state of Ohio signed into lawSenate Bill 181, under which student athletes will no longer be required to present a waiver to play sports in religious attire, following similar legislation passed inIllinoisin 2021.
  
  Last year, the National Federation of State High School (NFHS) Associations Track and Field Rules Committee added anew rulestating that students no longer need authorization from state associations to wear religious head coverings in competition.
  
