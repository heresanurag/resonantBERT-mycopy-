id: cnn_2022_01850
title: "Secret Service has recently provided January 6 committee additional 1.5 million communications"
date: "2022-10-11"
section: "Politics"
url: "https://www.cnn.com/2022/10/11/politics/secret-service-january-6-committee-communications/index.html"
content: |
  The United States Secret Service has, in the last two weeks, giventhe House select committee investigating the January 6, 2021, attack on the US Capitol nearly 1.5 million communications from the lead-up to the attack, including emails and planning documents, according to an agency spokesman.
  
  The data dump represents another large volume of records provided to congressional investigators as the panel nears its final planned public hearing.
  
  The latest batch of records, which was first reported byNBC News, does not include the text messages lost to a data migration that prompted a criminal probe by the inspector general.
  
  The DHS appointed a special counsel to review materials from the Secret Service to ensure the agency could satisfy the January 6 committee’s probe without running afoul of the IG’s criminal inquiry, which demanded theSecret Service halt its investigation into missing texts.
  
  Democratic Rep. Bennie Thompson of Mississippi, who chairs the committee, has described the trove of documents the Secret Service provided as “significant information.”
  
  The committee’shearingthis week comes more than two months since the panel’s last public appearance. Throughout June and July, the committee held a series of eight news-packed hearings to reveal key themes of its investigation so far.
  
  Members have promised that the hearing this week will reveal new information that it uncovered and has not previously disclosed.
  
  This hearing could be the last hearing until after the November midterm elections. Thompson has saidthat the committee could release an interim report on some of its initial findings before the midterms. The panel is still working toward presenting a final report by the end of the year.
