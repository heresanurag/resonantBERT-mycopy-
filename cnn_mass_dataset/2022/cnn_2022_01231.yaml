title: "EMS couldn’t respond to a shooting at a park in Indiana because they were responding to a shooting at a mall"
date: "2022-07-18"
section: "US"
url: "https://www.cnn.com/2022/07/18/us/beech-grove-indiana-park-shooting-ems?cid=external-feeds_iluminar_msn"
content: |
  Some emergency responders in Beech Grove, Indiana, couldn’t go to the scene of a shooting at a park Sunday because they were responding to a shooting at a mall, the city’s mayor said.
  
  “Our Beech Grove EMS … believe it or not, was not available for this incident,” Mayor Dennis Buckley said at a Monday news conference. “Because our ambulances weredown helping peopleat the Greenwood mall.”
  
  An unidentified gunmankilled three peopleand injured two others at Greenwood Park Mall on Sunday evening. An armed witness shot and killed the assailant in that shooting, police said.
  
  A gunman killed 3 people at an Indiana mall before he was shot dead by an armed bystander
  
  A few hours later in Beech Grove, at around 9:30 p.m., authorities responded to a report of shots fired at Don Challis Park. Beech Grove is about 11 miles from Greenwood.
  
  “We do know that there were dozens of rounds fired in the park,” Beech Grove Deputy Police Chief Tom Hurrle said.
  
  Multiple law enforcement agencies came to the scene to assist, including the Indianapolis Metropolitan Police Department, authorities said.
  
  The pair of shootings came as the nation grapples with a string ofhigh-profile mass shootings, including the May 24massacre at Robb Elementary Schoolin Uvalde, Texas, and theJuly 4th parade attackin Highland Park, Illinois.
  
  There have been 350 mass shootings this year, according toGun Violence Archive. Like CNN, the archive defines a mass shooting as one in which four or more people are shot, not including the shooter.
  
  When police arrived at the park they found multiple gunshot victims. At least one person was killed and three people were injured in the Sunday night shooting, Hurrle said. The three injured victims were transferred to local hospitals and are in stable condition, he said.
  
  The suspects’ vehicle is a white Toyota Camry, that may have had a window shot out, authorities said. The gunfire may have been started by two women arguing, officials said, but the investigation is ongoing.
