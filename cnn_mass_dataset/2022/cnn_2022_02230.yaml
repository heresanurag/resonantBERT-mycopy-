title: "Quinta Brunson had to step over Jimmy Kimmel to accept her Emmy"
date: "2022-09-13"
section: "Entertainment"
url: "https://www.cnn.com/2022/09/13/entertainment/quinta-brunson-jimmy-kimmel-emmys-cec"
content: |
  Quinta Brunson brought the audience to its feet when shewon her first Emmy– but atherfeet during the moment was Jimmy Kimmel, who pretended to be unconscious and stayed on the floor while she accepted her award as part of an intended joke that ended up miffing some viewers.
  
  Kimmel presented the award for outstanding writing for a comedy series with Will Arnett, whodraggedKimmel on stage and joked that Kimmel “got into the skinny margaritas” at the theater’s bar after losing in an earlier category.
  
  After the“Abbott Elementary”creator and star was announced as winner for writing the pilot of the popular sitcom, Kimmel stayed on the ground at the base of the microphone stand. He remained there throughout Brunson’s acceptance speech and into the commercial break, nearly two minutes in total.
  
  Footageshared by a ceremony attendee showed that Arnett pulled Kimmel’s body offstage at the end of the segment.
  
  Brunson, unfazed, used her limited time to thank the“Abbott Elementary” team, her family and her husband, but not without a dig at Kimmel: “Jimmy, wake up. I won!”
  
  Kimmel remained out of the camera’s frame for the duration of Brunson’s speech, which lasted roughly one minute.
  
  Laterbackstage, Brunson addressed the moment, saying the bit “didn’t bother me that much,” adding that Kimmel was an early supporter of her and “Abbott Elementary.”
  
  “Tomorrow maybe I’ll be mad at him. I’m going to be on his show on Wednesday, so I might punch him in the face,” she joked.
  
  'Succession' and 'Ted Lasso' reign, while 'The White Lotus' cleans up at the Emmys
  
  It would be the final time Brunson would appear onstage Monday. “Ted Lasso” won over “Abbott Elementary” in the outstanding comedy category, its second win in as many years.
  
  Photos: Emmy winners 2022
  
  Though Brunson’s win was widely celebrated – “Abbott Elementary” is a massive hit, ABC’smost successful comedyin years – many viewers chided Kimmel for not ceding the spotlight, particularly to a Black woman accepting her first Emmy. (Kimmel, meanwhile, hasbeen nominatedfor 18 Emmys and won two since 2012.)
  
  Sociologist Nancy Wang Yuen, who studies race in the entertainment industry, congratulated Brunson for “Abbott Elementary,” whose cast is primarily Black and takes place in an underfunded Philadelphia public school. But she didn’t think much of Kimmel’s joke: “And presenter Jimmy Kimmel, get up, it’s unfunny and rude,” Yuentweeted.
  
  The show everyone is talking about isn't on Netflix or HBO
  
  Ernest Owens, editor-at-large at Philadelphia Magazine, said he was irked by Kimmel, whom hesaidwas “trying to take attention away” from Brunson’s win.
  
  Brunson, meanwhile, will return with the anticipated second season of “Abbott Elementary” on September 21.
