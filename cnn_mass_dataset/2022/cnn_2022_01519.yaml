  US and Russian officialsare holding high-stakes talksabout thebuild-up of troops near Ukraine’s border, as fears mount over a possible Russian invasion. The talks follow months of tension near the Ukraine-Russia frontier, where tens of thousands of Russian soldiers have massed. The global community will be closely following the discussions, which have been billed as an attempt to avert a war on Europe’s eastern flank. On Wednesday, a Russian delegation will meet with NATO members at the NATO-Russia Council in Brussels. But US Secretary of State Antony Blinken has already played down the prospects of a breakthrough, telling CNN’s “State of the Union” on Sunday that, “It’s hard to see making actual progress, as opposed to talking, in an atmosphere of escalation with a gun to Ukraine’s head.”
  
  A federal vaccine mandate goes into effect today for all businesses with 100 employees or more. Under the rule, those who choose not to be vaccinated must submit to weekly testing. The Supreme Court hearddebates and challenges to the rule on Friday, but have not chosen to block or pause it. Nearly two-thirds of the eligible US population is fully vaccinated against Covid-19, according to the CDC. However, sharply increasing case loads are still overwhelming hospitals.National Guard medical teams are now deployed in 10 statesto help in hospitals and medical facilities. In New York state,40 hospitals have had to stop nonessential surgeriesdue to low bed capacity.
  
  A showdown in Congress is looming this week as GOP lawmakers aim torewrite federal voting rights legislation. Republicans aligned with former President Donald Trump are attempting to change voting procedures in several battleground states, as well as continuing to demand audits of the last presidential race. In Georgia,a new elections lawsigned by Republican Gov. Brian Kemp removes the existing secretary of state as the chair of the state elections board. Other GOP leaders are taking a similar approach to change voting rules in Wisconsin, Arizona, and Florida. Former first lady Michelle Obama is adding her voice to the calls for Congress tomove on voting rights legislationat the federal level, issuingan urgent messageabout this year’s midterm elections, saying, “We’ve got to vote like the future of our democracy depends on it.”
  
  Myanmar’s ousted civilian leader, Aung San Suu Kyihas been sentenced to another four years in prison. This is thesecond round of sentencing verdictsfor the Nobel prize winner, who was detained by Myanmar’s military in a coup last February. Once imprisoned, she was hit with dozens of charges, including several charges of corruption. Human rights groups say the convictions are being used to keep Suu Kyi imprisoned indefinitely and quash any opposition to military rule. Myanmar’s military junta has also sought to restrict information about the trials, which have been closed to the public. Suu Kyi’s imprisonment has drawn international condemnation, and pro-democracy rallies and strikes continue to roil in Myanmar as the publicprotests against the junta’s violent rule.
  
  Novak Djokovic, one of the top tennis players in the world,has been released after several days of being detainedin an Australian hotel for violating the country’s strict Covid-19 laws. Djokovic entered the country ahead of next week’s Australian open, and claimed he had a medical exemption from vaccination requirements because he tested positive for Covid-19 in December. However, his visa was cancelled and he was detained. Some other players intending to compete in the eventfaced similar vaccination-related visa consequences, but elected to return home. Aside from debates over Covid-19 restrictions, Djokovic’s case drew interest due to what some saw as an unusual illustration of privilege. Djokovic, who reportedlyreceived gluten-free meals and workout equipmentwhile detained, was staying in a hotel used to house refugees and asylum-seekers — presumably very few of whom are internationally famous tennis superstars withcrowds of people gathered outside, calling for their release.
  
