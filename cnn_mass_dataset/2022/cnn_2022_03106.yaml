title: "Amazon pausing operations at some facilities as Hurricane Ian approaches Florida"
date: "2022-09-28"
section: "Tech"
url: "https://www.cnn.com/2022/09/28/tech/amazon-facilities-hurricane-ian/index.html"
content: |
  Amazon is temporarily pausing operations at some of its facilities as Hurricane Ian barrels towards Florida, the company confirmed to CNN on Wednesday.
  
  The storm,just shy of Category 5 strength, is expected to make landfall in southwestern Florida on Wednesday afternoon. It isalready delivering ruinous winds and rainto the region.
  
  “We’re closely monitoring the path of Hurricane Ian and making adjustments to our operations in order to keep our employees and those delivering for us safe,” Richard Rocha, an Amazon(AMZN)spokesperson, told CNN in a statement.
  
  Airports and airlines brace for a major impact from Hurricane Ian
  
  “We’re in regular contact with our employees and delivery partners to ensure everyone is aware of any site closures or unsafe conditions and will continue to make adjustments as needed,” Rocha added.
  
  CNBCpreviously reported that Amazon had closed warehouses near Tampa and Orlando. The outlet cited notices sent to employees that stated Amazon expects the facilities to remain closed until Friday.
  
  Amazon declined to detail specific locations.
  
  Employees who are scheduled to work will continue to be paid while sites are closed, according to Amazon. There are more than 8,000 full-time and part-time Amazon employees in the Tampa area.
  
  Some other major businesses in the Florida area have also announced adjusted operations due to the hurricane’s approach. Disney World and Universal Resort theme parks in Orlando will betemporarily closedon Wednesday and Thursday. The storm has also been linked to aslew of flight cancellationsat Florida airports.
