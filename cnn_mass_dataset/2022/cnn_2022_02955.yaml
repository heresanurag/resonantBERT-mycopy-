title: "Gas prices are starting to take off again. More increases are on the way"
date: "2022-10-05"
section: "Energy"
url: "https://www.cnn.com/2022/10/05/energy/gas-prices/index.html"
content: |
  Even before Wednesday’s action by OPEC+ to cut oil production, US gas prices were on their way up. More price increases at the pump likely lay ahead.
  
  Gas prices rose nearly 3 cents a gallon in AAA’s daily reading Wednesday, to $3.83 a gallon, the biggest one-day hike in nearly four months.
  
  The99-day streak of price declinesfrom mid-June to September 20 may become a distant memory, even as today’s prices are still far below the June record of just over $5.03 a gallon. Gas prices have increased every day but one day since then, and are now up by 16 cents a gallon, or 4%, since they bottomed out two weeks ago at $3.67 a gallon.
  
  For the most part the price increases have been slow and incremental, but that might be about to change. OPEC+, which includes not only nations in the oil cartel but other major oil producers such as Russia, agreed Wednesday toslash oil productionby about 2 million barrels a day.
  
  Oil futures rose about 2% on the news and gasoline futures were also slightly higher on the OPEC move. Gasoline futures are up about 20 cents a gallon since the slide in gasoline prices ended last month, pointing to possible higher prices ahead.
  
  Oil and gasoline futures had been falling since mid-June due to growing concerns about apossible recessioncutting demand for gasoline and oil, among other factors.
  
  The recent increases have been caused by the unusually high number of US refineries that are shut down for maintenance work, said Tom Kloza, global head of energy analysis for OPIS, which tracks gasoline prices for AAA. He said nearly 18% of the nation’s refining capacity is now offline.
  
  “A lot of it was put off in spring because they were making so much money,” he said. “The margin of error in US refining capacity is so slim right now that you can’t lose any capacity without affecting prices.”
  
  This is normally the time of year that gas prices drop as regulations requiring cleaner but pricier gas to fight smog come to an end in most of the country. The end of the summer driving season also reduces demand, which in turn pushes prices downward.
  
  Unfortunately, the refinery capacity squeeze“means gas prices are not going to go down like I had thought,” said veteran oil analyst Andy Lipow. “In fact, they mightdrift upwards.”
  
  One other factor that helped to reduce prices in recent months: the release of about 1 million barrels of oil a day from the nation’sStrategic Petroleum Reserve, which is set to end November 1.
  
  “Nobody really knows what happens when SPR sales end,” said Kloza.
  
  One thing that could reduce prices: California, which typically keeps its rules requiring the summer of blend of gasoline in place until November, lifted the requirement early last week. That could lower the national average price, even if it only affects gasoline in California. The state accounts for about 9% of US gasoline consumption, so the change can affect the national average even if prices don’t move elsewhere. The average price there is $5.52 a gallon, by far the highest in the nation.
  
  “I don’t think we’ll see major moves in national prices. even if we see California prices come back to the pack,” Kloza said.
  
  The decline in gasoline prices has been an importantcontrol on rising overall prices, as well as a support forconsumer spending, as it means moremoney goes in consumers’ pockets.
  
  The typical US household buys about 90 gallons of gas a month, so the fall from $5.03 a gallon to a low of $3.67 a gallon late last month represented a savings of about $120 a month. By contrast, the 16-cent rise from that low point was costing about $14 a household.
  
  Inside the White House's failed effort to dissuade OPEC from cutting oil production to avoid a 'total disaster'
  
  The concern by the Biden administration is that rising gas prices bring renewed focus in voters’ mind.
  
  For that reason, members of the Biden administrationpushed hard to convince OPECnations not to cut production and possibly send prices higher ahead of a midterm vote. Those efforts were unsuccessful.
  
  – CNN’s Alex Marquardt, Natasha Bertrand and Phil Mattingly contributed to this report
