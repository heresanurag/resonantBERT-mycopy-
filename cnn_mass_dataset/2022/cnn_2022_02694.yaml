title: "The US Constitution does not guarantee women equality. We intend to change that."
date: "2022-03-26"
section: "Opinion"
url: "https://www.cnn.com/2022/03/26/opinions/equal-rights-amendment-constitution-murkowski-cardin/index.html"
content: |
  Editor’s Note:Senator Ben Cardin is the senior US Senator for Maryland. Senator Lisa Murkowski is the senior US Senator for Alaska. The views expressed in this commentary are their own. Readmore opinionarticles on CNN.
  
  The US Constitution does not guarantee women the same rights and protections as men. To the surprise of many, it containsno explicit protectionagainst discrimination on the basis of sex.
  
  We intend to change that to ensure that “Equality of rights under the law shall not be denied or abridged by the United States or by any state on account of sex.”
  
  We represent Alaska and Maryland, states with vastly different constituencies and geographies, but we are working together to advance equality for all Americans because legal inequities continue to persist between men and women.
  
  Written and proposedby Alice Paul and Crystal Eastman, the Equal Rights Amendment (ERA) was first introduced in Congress 1923 by Republican Senator Charles Curtis and Republican Congressman Daniel Anthony, nephew of Susan B. Anthony. The measure fell short.
  
  In1972, after the women’s movement took hold, an updated version was introduced, passed by Congress and sent to the states for ratification in March of that year. The resolution putting forth the ERA included an arbitrary seven-year deadline for the states to ratify. Congress later extended that deadline by three years to 1982. Thirty-five states ratified the amendment by this time.Three more stateshave since: Nevada in 2017, Illinois in 2018 and Virginia in 2020, which became the 38th state to ratify.
  
  Thirty-eight isthree-fourths of the statesand the constitutional threshold set for amendments, yet the ERA still is not part of the Constitution because of that extraneous deadline set back in 1972. Article 5 of the Constitution contains no time limit for ratification of amendments and the ERA itself contains no timeline. Congress haschangedthe deadline once before and now should eliminate it for good.
  
  Most Americansthink we already guarantee equal rightsin the Constitution, but we don’t. Despite significant gains in the courts to apply the14th amendment’sequal protection clause to discrimination on the basis of sex, anchoring this principle in our Constitution remains unfinished work.
  
  What we have now is a patchwork of laws that vary state by state. While nearly half of US states, including Alaska and Maryland, havea version of the ERAwritten into their constitutions, women in our country will not have equal protection under federal law until the ERA is ratified at the federal level.
  
  The West would be wise to heed Madeleine Albright's lessons on foreign policy
  
  Over the last two years, we witnessed significant impacts to women’s economic participation and prosperity.
  
  At the height of the pandemic, millions of women left their jobs in order to care for family members or saw their jobs disappear. The US Bureau of Labor Statistics estimates as many as2.6 million women left the workforceduring the pandemic with about 1 million yet to re-enter, leaving the women’s workforce participation rate at itslowest level since 1988.
  
  The House of Representativespassed a joint resolutionlast year to remove the ratification deadline for the ERA, and we arechampioning a resolutionto do the same in the Senate. But we need our colleagues to join us to pass it.
  
  This is not a partisan issue. Both Republicans and Democrats support the ERA today, and agree it needs to be added to the US Constitution. The majority of Americans agree women should have equal rights with men. According to a Pew survey, 78% of adults support adding the ERA to the Constitution.
  
  The legal case is also strong. As the late Justice Antonin Scaliamade clearin 2011, the Constitutiondoes not prohibit discriminationon the basis of sex. An ERA not only prohibits sex discrimination, it also adds – as the late Supreme Court Justice Ruth Bader Ginsberg once said –“a statement of basic rights”that has been missing from our Constitution for far too long.
  
  Women are not asking for special privileges, simply equality and to be afforded the same legal rights as men.
  
  As America and our allies work to preserve democracy in Ukraine, we are proud to fight side-by-side on a bipartisan basis, on behalf of Americans nationwide, to finally make the ERA part of the Constitution, guaranteeing equality under the law for women.
