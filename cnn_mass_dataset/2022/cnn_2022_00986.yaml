  London—
  
  [Queen Elizabeth II’s](https://cnn.com/2022/09/11/uk/queen-death-whats-next-guide-intl-cmd/index.html)[corgis](https://www.cnn.com/2022/09/09/uk/queen-elizabeth-dogs-intl-scli-gbr/index.html) will live with the Duke and Duchess of York, Andrew and Sarah, a source close to the Duke of York told CNN on Sunday.
  
  The pair, who divorced in 1996, both reside at the Royal Lodge on the Windsor estate.
  
  The source told CNN that the Duchess bonded with the monarch over a shared love of dog-walking and horse-riding.
  
  Ad Feedback
  
  Even after her divorce from Prince Andrew, Sarah continued her friendship with the Queen by walking dogs through the Windsor estate, the source added.
  
  The Queen, who [died Thursday at the age of 96](https://cnn.com/2022/09/11/uk/queen-death-whats-next-guide-intl-cmd/index.html), is reported to have had four dogs, two of whom are Pembroke Welsh corgis, Muick and Sandy.
  
  She is also reported to have left behind an older, mixed breed “dorgi” called Candy and a cocker spaniel named Lissy. It is unclear who will be looking after Candy and Lissy.
  
