  ##### In pictures: The Queen and her corgis
  
  Corgis have become synonymous with the monarch, who throughout her long life was regularly photographed with a Welsh corgi at her feet.
  
  The Queen was often credited with creating the dorgi breed when her corgi mated with a dachshund owned by her sister, Princess Margaret.
  
  The Queen’s passion for corgis dated back to her childhood, when she fell in love with her father King George VI’s dog, Dookie. In 1944, on her 18th birthday, she was given a Pembroke Welsh corgi puppy named Susan. Such was her attachment to Susan, she reportedly took her on her honeymoon in 1947. Susan died in January 1959.
  
  The monarch went on to own dozens of corgis in her lifetime. One, Willow, famously appeared alongside her in the James Bond sketch that she recorded for the opening ceremony of the 2012 London Olympics.
  
  When Willow was put to sleep at the age of 14, the Queen [lost the last descendant](https://cnn.com/2018/04/18/europe/queen-last-corgi-dead-intl/index.html)of her original corgi, Susan. According to [Reader’s Digest](https://www.rd.com/article/queen-elizabeth-corgis/), the Queen had a fondness for corgis because of their “energy and untamed spirit.”
  
  ![Image 60: The Duke and Duchess of York, Andrew and Sarah, will take care of the dogs. ](https://media.cnn.com/api/v1/images/stellar/prod/220911110147-andrew-sarah-york-0619.jpg?c=original&q=w_1093,c_fill)
  
  The Duke and Duchess of York, Andrew and Sarah, will take care of the dogs.
  
  Max Mumby/Indigo/Getty Images
  
  Prince Andrew stepped back from [public duties](https://www.cnn.com/2019/11/20/uk/prince-andrew-steps-back-intl-gbr/index.html) in 2019 following a firestorm of criticism over an interview about his association with convicted sex offender Jeffrey Epstein.
  
  Earlier this year, he [paid a settlement](https://www.cnn.com/2022/03/08/us/prince-andrew-virginia-giuffre-settlement/index)to sexual abuse accuser Virginia Giuffre, according to her attorney, and a US district judge agreed to dismiss her lawsuit against the Duke of York.
  
  The prince has repeatedly denied wrongdoing. Still, the allegations against Andrew, 62, have dramatically tarnished his public standing.
  
