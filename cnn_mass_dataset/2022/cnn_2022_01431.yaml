title: "Opinion: The Secret Service’s actions on text messages don’t pass the smell test"
date: "2022-07-19"
section: "Opinion"
url: "https://www.cnn.com/2022/07/19/opinions/secret-service-texts-raise-questions-wierson"
content: |
  Editor’s Note:Arick Wierson was a senior media adviser to former New York Mayor Michael Bloomberg. Wierson was a deputy commissioner in the city of New York’s Department of Information Technology and Telecommunications. Currently he advises corporate and political clients on communications strategies in the United States, Africa and Latin America. You can follow him on Twitter@ArickWierson. The views expressed in this commentary are his own. Viewmore opinionat CNN.
  
  It has been less than a week since Joseph Cuffari, the Department of Homeland Security’s inspector general, shared that the US Secret Service had deleted key text messages from around the time of rioters’ attack on the US Capitol. The disclosure,in a letterto the House and Senate Homeland Security committees, said the messages from January 5 and 6, 2021, “were erased as part of a device-replacement program,” adding they were deleted after the inspector general had requested records of Secret Service electronic communications as part of a review of events leading up to the January 6 insurrection.
  
  Whatever happened does not pass the smell test. To paraphrase Marcellus from Shakespeare’s “Hamlet,” something appears rotten in the Secret Service.
  
  The Secret Service has been under scrutiny since areport began circulatingthat then-Vice President Mike Pence defied Secret Service recommendations to evacuate the Capitol on January 6. This report was later given added importance following former White House aideCassidy Hutchinson’s testimonybefore the January 6 House committee that an official told her that then-President Donald Trump had angrily demanded that his security detail take him to the Capitol after his speech at the Ellipse.
  
  The Secret Servicehas pushed backon the inspector general’s allegations, saying that “the insinuation that the Secret Service maliciously deleted text messages following a request is false.” It also said it had notified the Office of Inspector General “of the loss of certain phones’ data, but confirmed to OIG that none of the texts it was seeking had been lost in the migration.”
  
  I find that explanation difficult to believe. For eight years, I was a deputy commissioner for the Department of Information Technology and Telecommunications (now called theOffice of Technology and Innovation, or OTI), anover billion-dollar-a-year agencyresponsible for information technology policy, technology investments and oversight of the management of the technology devices used by the city of New York’smore than 325,000 employees.
  
  My role as a deputy commissioner put me in countless meetings every time there was a major software upgrade, platform transition, device migration or any other major change in the technology that city employees used. It included everyone from rank-and-file police officers to the mayor himself.
  
  Cassidy Hutchinson is the witness America has been waiting for
  
  Front and center in all these conversations were records and data preservation and compliance with New York state’sFreedom of Information Law, or FOIL, the equivalent of the federal government’sFreedom of Information Act, or FOIA. In fact, talk of FOIL was so engrained in the minds of city managers that it was adjectivized – something “foilable” was part of our everyday vernacular.
  
  Of course, New York City government, albeit a sprawling and complex public-sector enterprise, is not the same as the federal government, a behemoth withnearly seven times the number of civil employeesas the city of New York. But it’s almost impossible to imagine the policies and processes for adhering to record-keeping laws at the federal government would be laxer than those of the city. If anything, one would naturally assume – especially when it comes to an agency such as the Secret Service – that adherence to such guidelines would be far more stringent than that of a local government.
  
  Without getting into the nerdy details of IT data management, suffice to say that no major technology device transfer could possibly happen without there being not one but several levels of backed-up data and redundancy.
  
  And keep in mind, in the public sector, particularly because of FOIL and FOIA laws, IT professionals are not the only ones involved in major technology overhaul decisions. In the city of New York, when one agency is upgrading tech from one device to another, lawyers – representatives from each agency’s Office of General Counsel – help ensure that all applicable data is being safely preserved. A lot of people have eyes on any major technology overhaul, especially one where data is in the mix.
  
  And this makes Tuesday’s news that the Secret Servicehas turned overthousands of documents to the January 6 committee, but has not yet recovered the missing texts, all the more alarming.
  
  If the deleted data was the result of some bizarro act of benign negligence, that data should have been easy to recoup by forensic IT specialists. The Secret Services insists it is still trying to find those missing messages.
  
  As nearly every IT professional knows, with the right resources, a good forensic IT team can gather just about any data that has been “deleted” – nothing is ever really gone for good. If, in fact the Secret Service concludes that the records are really gone, it could mean they were erased with intent, but we’ll have to wait for the outcome of the investigation to know.
  
  The piece has been updated to reflect the latest news on the investigation into the missing Secret Service text messages.
