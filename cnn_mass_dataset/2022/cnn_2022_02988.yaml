title: "Apple to require employee proof of Covid-19 booster"
date: "2022-01-16"
section: "Tech"
url: "https://www.cnn.com/2022/01/16/tech/apple-covid-booster-requirement/index.html"
content: |
  Apple Inc will require retail and corporate employees to provide proof of a Covid-19 booster shot, The Vergereportedon Saturday, citing an internal email.
  
  Starting Jan. 24, unvaccinated employees or those who haven’t submitted proof of vaccination will need negative Covid-19 tests to enter Apple workplaces, the report said. The Verge said it was not immediately clear if the testing requirement applies to both corporate and retail employees.
  
  Apple closes all New York stores to browsing as Omicron cases surge
  
  “Due to waning efficacy of the primary series of Covid-19 vaccines and the emergence of highly transmissible variants such as Omicron, a booster shot is now part of staying up to date with your Covid-19 vaccination to protect against severe disease,” the memo read, according to The Verge.
  
  Apple did not immediately respond to a request for comment.
  
  Many US companies have been strengthening their Covid-19 rules, mandating vaccination anddelaying back-to-office plansas the Omicron variant increases infections across the country.
  
  Apple is delaying its return to offices indefinitely and giving each employee $1,000
  
  This week, Facebook parentMeta Platforms mandated Covid-19 booster shotsfor all workers returning to offices. It also delayed US office reopenings to March 28 from an earlier plan of Jan. 31.
  
  Alphabet Inc’s Google on Friday said it was temporarily mandating weekly Covid-19 tests for people entering its U.S. offices.
  
  A report by The Information said Amazon has offered its US warehouse workers $40 to get a booster shot.
