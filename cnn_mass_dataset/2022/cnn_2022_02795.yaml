  “We believe this service will be helpful for people in Ukraine to receive money from their friends and relatives around the world,” PayPalwrote in a letterdated March 17 to Ukraine’s Minister of Digital Transformation, Mykhailo Fedorov. “It will also help Ukrainian refugees in other countries, so they can receive money to use or withdraw in their current location.”
  
  Previously, PayPal users in Ukraine could only send money internationally from their accounts, not receive it, the company told CNN Business.
  
  PayPal is also waiving transaction fees for remittances to Ukrainian accounts, for both senders and recipients. The change also applies to Xoom, PayPal’s global remittance platform, the company said in a blog post.
  
  Money transferred from a PayPal account to a linked debit or credit card will make the funds available in the card’s local currency. Ukrainian users will be able to send and receive euros, US dollars, Canadian dollars and British pounds.
  
  The temporary service expansion will last through the end of June, the company said.
