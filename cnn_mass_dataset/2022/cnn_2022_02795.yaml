id: cnn_2022_02795
title: "PayPal enables Ukrainian accounts to send and receive money"
date: "2022-03-18"
section: "Tech"
url: "https://www.cnn.com/2022/03/18/tech/paypal-ukraine"
content: |
  PayPal(PYPL)said Thursday it is expanding its services for Ukrainian accounts and allowing them to send and receive money from friends and family.
  
  The payments company also said in a letter to the Ukrainian government that Ukrainian account holders will be able to transfer money from their PayPal accounts to credit and debit cards, as well as to external bank accounts by linking an eligible Visa or Mastercard debit or credit card.
  
