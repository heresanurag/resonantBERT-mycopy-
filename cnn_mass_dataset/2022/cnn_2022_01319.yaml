  School shootings in the US reached a 20-year highin 2021, with 93 school shootings reported according to federal data cited in a report by the National Center for Education Statistics.
  
  Some students have to pass throughmetal detectorswhen they get to school every morning, and many around the nation undergoactive-shooter training.
  
  And after the Parkland shooting, retailers reported a surge in sales ofbulletproof backpacks.
  
  In Texas, Gov. Greg Abbott last month announced $105.5 million to support additional school safety and mental health initiatives through August 31, 2023.
  
  The funding will provide money for bullet-resistant shields and for Texas school districts to buy silent panic alert technology, among other measures, the governor’s office said last month.
