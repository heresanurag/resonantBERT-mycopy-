  Mourners gathered in Tokyo today for the funeral of former Japanese Prime MinisterShinzo Abe, four days after he was assassinated in broad daylight.Photos captured the outpouring of griefas people gathered to pay their respects to Abe with flowers, notes and green tea – symbols of help in the afterlife. The private funeral was hosted at the centuries-old Zojoji Temple by Abe’s widow,Akie Abe. Millions around the world have reacted with shock and anguish at how Abe wasgunned down during a campaign speechin the central city of Nara on Friday. According to police, the 41-year-old suspectaccused of killing Abe hada “grudge” against a churchhe believed Abe’s grandfather – another former leader of the country – helped to expand.
  
  The House select committee plans to show at a hearing today how right-wing extremist groups, including theProud Boys and the Oath Keepers, prepared to attack the US Capitol in the days leading up to January 6, 2021. According to committee aides,the hearingwill also focus on the roles of former President Donald Trump’s associates, includingRoger StoneandMichael Flynn, who both received presidential pardons after being charged with various crimes. Separately,former Overstock CEO Patrick Byrne, an ally of Trump, is expected to meet Friday with the January 6 committee, three sources familiar with the matter told CNN. Byrne played an active role in supporting efforts to push baseless claims about the 2020 election, including attending a meeting at the White House to discuss strategies to overturn the election results.
  
  President Joe Biden on Monday saidgun violencehas turned everyday places in America into “killing fields” as he marked the passage of the first significantfederal gun safety legislationin 30 years. Biden said the package he signed into law last month represents “an important start,” but falls far short of what he and his party had advocated for to curb the alarming rate of shootings in the US. During his remarks, Biden wasinterrupted by Manuel Oliver, a father whose son was killed in the2018 shootingat Marjory Stoneman Douglas High School in Parkland, Florida. “You have to do more than that,” Oliver yelled. As of today, there have been333 mass shootingsin the US since the beginning of the year, according to data from the Gun Violence Archive.
  
  US health officials are urgently working on a plan to allowsecond Covid-19 boostersfor all adults, a senior White House official confirmed to CNN. Second boosters have beenauthorized for adults 50 and older, as well as some people with weakened immune systems, since late March. But younger adults are eligible for only one booster shot, which was authorized in November. Some experts are concerned that younger adults’ immunity may be waning as Covid-19 cases rise with the dominance of theBA.5 Omicron subvariant. The CDC reports that the BA.4 and BA.5 subvariants constitute more than 70% of new infections in the country. And while these subvariants may partially escape the immunity produced by the vaccine and prior infection, vaccination still likely protects against severe illness.
  
  Thousands of protesters havestormed the homesof Sri Lanka’s President and Prime Minister in recent days in fury over the nation’scrippling economic crisis. The protesters have succeeded in forcing the leaders to resign, but refuse to leave the luxury houses until both of them have vacated their roles. Striking images show protesters sprawled on a bed in the presidential palace and barbecuing food on the property. But the most dramatic footage showedprotesters swimming in the President’s private pool. It remains unclear how Sri Lanka will overcome rising food costs, fuel shortages and electricity cuts as the country struggles to make debt repayments.
  
