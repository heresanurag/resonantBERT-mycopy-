  That’s President Joe Biden’s approval rating according to a new poll, leading to increased speculation abouthis prospects for reelection. The nationwide survey conducted by the New York Times/Siena College comes as Democratic officials and party leaders have begun to doubt that Biden is their strongest candidate to beat former President Donald Trump – or another GOP candidate – in 2024. But a challenge requires a challenger, and all the Democrats being discussed as potential primary opponents to Biden tell CNN they areruling out runs.
  
  “Under the law, no matter where you live, women have the right to emergency care – including abortion care.”
  
  – HHS Secretary Xavier Becerra, the country’s top health official, saying the Biden administrationexpects providers to continue offering abortion services, despite laws that strictly limit the procedure after the Supreme Court overturnedRoe v. Wade. In theclarifying guidanceannounced Monday, Becerra said that the federal government can penalize institutions or providers that fail to provide abortions as needed to treat medical emergencies.
  
