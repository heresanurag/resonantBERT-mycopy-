  A spot in the Southern California desert could hold the key to powering all of America’s electric cars. It’s called the Salton Sea – but isn’t really a sea at all.The toxic lakeis the most abundant source of lithium on the planet, with enough to power all domestic EV car batteries for decades to come, energy experts say.
  
