title: "Start your week smart: Buffalo shooting, NATO, Ukraine, Eurovision, North Korea"
date: "2022-05-15"
section: "US"
url: "https://www.cnn.com/2022/05/15/us/five-things-may-15-cec/index.html"
content: |
  Do you ever get a “case of the Mondays” – that feeling of dread brought on by the thought of having to go to work after a carefree weekend? Take a little advice on career happiness from Walter Orthmann, a 100-year-old man who’sworked at the same company for 84 years.
  
  Here’s what else you need to know toStart Your Week Smart.
  
  • Ten people were killed in a racially motivatedmass shooting at a supermarketin Buffalo, New York, yesterday by asuspect in tactical gearwho was livestreaming the attack, law enforcement officials said during a news conference.
  
  • Finland’s government announced earlier today it willapply to join NATO, ditching decades of wartime neutrality and ignoring Russian threats of possible retaliation as the Nordic country attempts to strengthen its security following the onset of the war in Ukraine.
  
  •  Ukrainian President Volodymyr Zelenskymet with a congressional delegationled by Senate Minority Leader Mitch McConnell in Kyiv yesterday and called for Russia to officially be recognized as a “terrorist state.”
  
  • Ukraine’s folk-rap groupKalush Orchestra won this year’s Eurovision Song Contest, surfing a wave of goodwill from European nations to clinch the country’s third win at the glitzy event.
  
  • North Korea appears to haveresumed construction at a long-dormant nuclear reactorin recent weeks that, if completed, would dramatically increase its capacity to produce plutonium for nuclear weapons, according to new satellite images obtained by CNN and a source familiar with recent US intelligence reporting on the matter.
  
  Karine Jean-Pierre begins her first full week asWhite House press secretaryfollowing thedeparture of Jen Psakilast Friday. Jean-Pierre is the first Black and out LGBTQ person to hold the position.
  
  Also Monday, Amber Heard is set to resume her testimony in the$50 million defamation casebrought by her ex-husband Johnny Depp, following a weeklong break in proceedings.
  
  Voters will head to the polls forprimary electionsin Idaho, Kentucky, North Carolina, Oregon and Pennsylvania in what will be another test of former President Donald Trump’s endorsement power. Ahead of the midterm elections in the fall, Trump has so far backed winners in theOhio Senate raceand in a House primary in West Virginia, even while his candidatefell short in the Nebraska gubernatorial primary. Much of the focus will be on Pennsylvania, where GOP Senate candidateKathy Barnette has emerged as a major threatto Trump-backed Mehmet Oz – the celebrity heart surgeon and former television personality.
  
  Follow all of CNN’s in-depth coverage of the2022 midterm elections here.
  
  Tuesday also promises to be out of this world! A House panel will hold anopen congressional hearing about UFOsfor the first time in more than 50 years. The public hearing will focus on a Pentagon program that was established last year after the US intelligence community released a preliminary assessment on144 reports of “unidentified aerial phenomena” since 2004– and could explain only one.
  
  It’s World Bee Day! In 2017, the United Nations General Assembly adopted a resolution declaring May 20 as a day to remind people of the importance ofpreserving bees and other pollinators.
  
  Also Friday, look for Anglophiles to be abuzz for two reasons: The Crawley family will return to theaters in the film “Downton Abbey: A New Era,” and Harry Styles’ new album, with the inviting title“Harry’s House,”is set to debut.
  
  May 21 isArmed Forces Day, a holiday observed in some areas of the US to honor all branches of the armed forces.
  
  This week on the Sunday edition of the 5 Things podcast, we hear from a small-business owner having to adjust to high levels of inflation. Then, CNN Chief Business Correspondent Christine Romans tells us how we should interpret the (chaotic) state of the US economy.Listen here!
  
  Check out more moving, fascinating and thought-provoking imagesfrom the week that was,curated by CNN Photos.
  
  A publiccelebration for the life of Naomi Juddwill take place later today featuring tributes from family and friends, along with never-before-seen performances. “Good Morning America’s” Robin Roberts, who is a close family friend to the Judds, will host the memorial for the famed country singerwho died in April.  She was 76. Ashley McBryde, Brandi Carlile, Emmylou Harris and Allison Russell, Little Big Town and The Gaithers are among the artists schedule to perform. The memorial airs commercial free at 6 p.m. ET on CMT.
  
  2022 Billboard Music Awards
  
  The Billboard Music Awards will broadcast live from the MGM Grand Garden Arena in Las Vegas tonight at 8 p.m. ET.The Weeknd leads as a finalist in 17 categories, the most of any artist this year. The leading female finalist is Doja Cat, with nods in 14 categories, including top artist, top female artist and top hot 100 artist.
  
  The NBA playoffs continue later today with the Milwaukee Bucks facing the Boston Celtics and thePhoenix Suns taking on the Dallas Mavericks.
  
  ThePGA Championship, one of professional golf’s four majors, begins Thursday at Southern Hills Country Club in Tulsa, Oklahoma. World No.1Scottie Schefflerand 4-time PGA ChampionTiger Woodsare in the field of more than 150 of the world’s best players.
  
  The 147th Preakness Stakes – the second leg of horse racing’s Triple Crown – will be run on Saturday at Pimlico Race Course in Baltimore, Maryland,without Kentucky Derby winner Rich Strike. Owner Rick Dawson made the decision last week, opting instead to let the horse rest until the Belmont Stakes on June 11.
  
  Take CNN’s weekly news quizto see how much you remember from the week that was! So far, 73% of fellow quiz fans have gotten an 8 out of 10 or better this week. How well can you do?
  
