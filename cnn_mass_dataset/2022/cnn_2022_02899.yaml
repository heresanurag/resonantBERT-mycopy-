title: "Weekly jobless claims fall to a nearly 53-year low"
date: "2022-03-24"
section: "Investing"
url: "https://www.cnn.com/2022/03/24/investing/jobless-claims/index.html"
content: |
  Just 187,000 peoplein the United Statesfiled for initial weekly unemployment benefits last week, lower than economists’ expectations of 210,000, according to data released Thursday by the Department of Labor.
  
  The last time theweekly numberwas that low was September 6, 1969, shortly after Neil Armstrong stepped foot on the moon and hippies were rocking out to Jimi Hendrix at Woodstock. Back then, 182,000 people filed for jobless benefits.
  
  The latest jobless claims total was also down from an upwardly revised 215,000 in the previous week. Thelabor market remains a bright spotin the US economy, even as consumers are feelingthe pinch of higher oil and gas pricesand otherinflation pressures.
  
  In another encouraging sign, the number of people filing for continued jobless claims fell 67,000 to 1.35 million during the week ending March 12. That’s the lowest level for this reading since January 3, 1970.
  
  However, thestrong jobs numberscould lead the Federal Reserve tostep up its pace of interest rate hikesin order to keep inflation in check.
  
  No end to the worker shortage: America had 11.3 million jobs available in January
  
  TheFed raised rates earlier this monthfor the first time since December 2018, by a quarter of a percentage point. Traders are now pricing in anearly 70% likelihood of a half-point rate hikeat the Fed’s next meeting on May 3-4.
  
  “There isn’t much more to say about the labor market. It is extremely strong and this data is exactly the sort of evidence that has given the Fed confidence that they can raise rates more quickly to battle inflation,” said Jefferies economists Thomas Simons and Aneta Markowska in a report.
  
  “Demand for labor is strong and there are no reasons to believe that this will change any time soon, barring another wave of a new Covid variant,” the Jefferies economists added.
  
  The government will report its closely watched monthly jobs figures for March next Friday. If the latest jobless claims numbers are any indication, the unemployment rate could fall and jobs gains should be solid. Wage growth may remain robust too.
  
  “It’s an excellent time to be looking for work, since the labor market is tight, wages are rising and workers have negotiating power in many industries,” said Bankrate.com senior industry analyst Ted Rossman in a report after the latest claims numbers were released.
