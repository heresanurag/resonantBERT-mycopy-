title: "Justin Bieber is resuming his tour after medical crisis"
date: "2022-07-20"
section: "Entertainment"
url: "https://www.cnn.com/2022/07/20/entertainment/justin-bieber-resuming-tour/index.html"
content: |
  Justin Bieber will be resuming his tour afterbeing diagnosed with an illness which left him with partial facial paralysis.
  
  “Justin Bieber RESUMES WORLD TOUR!!!” AEG Presents UK tweeted Monday.
  
  “Starting a run of European festivals in Italy on 31st July, then continue across South America, South Africa, The Middle East, Asia, Australia & New Zealand then back to Europe in 2023,”the tweetreads. “Details of postponed U.S shows coming soon!”
  
  Bieber’s repconfirmed the news to Variety.
  
  Last month the singer announced he was pausing his tour because of Ramsay Hunt syndrome, which left him unable to move half of his face.
  
  What is Ramsay Hunt syndrome, the virus attacking Justin Bieber's face?
  
  “It is from this virus that attacks the nerve in my ear and my facial nerves and has caused my face to have paralysis,” he saidin a video posted on his verified Instagram account.“As you can see this eye is not blinking. I can’t smile on this side of my face; this nostril will not move. So there’s full paralysis on this side of my face.”
  
  He later offered an update about how he was doing with the rare neurological syndrome, caused by the same virus that can cause chicken pox and shingles.
  
  “Each day has gotten better and through all of the discomfort I have found comfort in the one who designed me and knows me,” he said.
