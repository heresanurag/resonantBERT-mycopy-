title: "A man convicted of killing an 8-year-old girl nearly 38 years ago was executed in Arizona"
date: "2022-06-08"
section: "US"
url: "https://www.cnn.com/2022/06/08/us/frank-atwood-executed-vicki-lynne-hoskinson-killing/index.html"
content: |
  An Arizona inmate convicted of killing an 8-year-old girl nearly 38 years ago was executed by lethal injection Wednesday morning, the state’s attorney general announced in anews release.
  
  Frank Atwood’s execution took place at the Arizona State Prison Complex just after 10:15 a.m. local time, Arizona Attorney General Mark Brnovich said.
  
  Atwood was sentenced to death nearly 35 years ago and had exhausted all his appeal options, the attorney general said.
  
  “To an innocent child whose life was brutally taken and a family that has had to endure decades of suffering, Arizonans will never forget,” Brnovich said in a statement.
  
  Arizona prisoner Clarence Dixon executed nearly 8 years after the state's last execution was botched
  
  Atwood was convicted in the September 17, 1984 death of Vicki Lynne Hoskinson. Vicki was riding her bike home when Atwood kidnapped and killed her and left her body in a desert, the attorney general said.  A hiker found the child’s remains roughly seven months later, according to the news release.
  
  Prior to Vicki’s killing, Atwood had already been convicted of “lewd and lascivious acts and kidnapping” involving two young children in California, the attorney general said.
  
  Federal courts denied Atwood’s motions to halt the execution, in which he claimed the procedure would violate his constitutional rights and would cause a substantial risk of pain because of a degenerative spinal disease he suffered from. In response to that concern, state officials agreed to make accommodations in their execution protocol by providing a device that would help “avoid any unnecessary pain due to his condition,” according tocourt documents.
  
  A district court dismissed those claims and on Tuesday, the Ninth Circuit Court of Appealsupheld that decision.
  
  Two-hour execution followed correct protocol, says independent report
  
  The United States Supreme Court on Wednesday also denied Atwood’s ask to halt his execution.
  
  Atwood wasthe second person executedin Arizona since the botched lethal injection execution of Joseph Wood in 2014 that sparked a stateside hold in executions for more than seven years. Wood, who was also executed by lethal injection, gasped for air and struggled to breathe for most of the nearly two hours it took him to die, his attorney had said at the time.
  
  The governor directed the corrections departmentto review the processand anindependent reportreleased in 2014 found the state’s corrections department followed protocol in Wood’s execution.
  
  Approximately 111 inmates remain on death row in the state, according to the news release.
