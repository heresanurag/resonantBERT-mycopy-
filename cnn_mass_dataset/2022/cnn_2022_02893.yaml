id: cnn_2022_02893
title: "A popular sunscreen is being recalled because it may contain a carcinogen"
date: "2022-07-31"
section: "Business"
url: "https://www.cnn.com/2022/07/31/business/banana-boat-sunscreen-recall/index.html"
content: |
  Sunscreen is marketed as helping protect against skin cancer — but now some batches of a popular brand are being voluntarily recalled because they may contain a carcinogen.
  
  An internal review of Banana Boat Hair & Scalp Sunscreen Spray SPF 30 found some samples contained trace levels of benzene, which is classified as a human carcinogen. Edgewell Personal Care Co., maker of Banana Boat products, is issuing a nationwide recall of three batches of the sunscreen spray.
  
  The recalled batches have expiration dates of December 2022, February 2023 or April 2024.
  
  The recall said that although benzene is not an ingredient in Banana Boat products, “unexpected levels” of the carcinogen were found in the spray propellant.
  
  Edgewell Personal Care Company said consumers should dispose of the affected product and will be offered reimbursements. More information on the recall can be foundhere.
