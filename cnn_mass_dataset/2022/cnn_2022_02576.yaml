title: "‘Refusal to evacuate could be a fatal decision’: Officials urge residents in northern New Mexico to leave ahead of a rapidly growing blaze"
date: "2022-04-30"
section: "US"
url: "https://www.cnn.com/2022/04/30/us/calf-canyon-fire-new-mexico-saturday/index.html"
content: |
  Officials in northern New Mexico urged residents in more than two dozen communities to immediately evacuate Saturday ahead of a massive blaze that exploded in size in a day.
  
  The Calf Canyon Fire began last week andcombined with the Hermits Peak Fire, which was already burning near Las Vegas, New Mexico. By Saturday morning Calf Canyon had scorched more than 97,000 acres – ahuge size jumpfrom the roughly 65,800 acres it had burned a day before. The blaze was 32% contained Saturday, according to the interagency reporting websiteInciWeb.
  
  The rapid spread of flames prompted evacuation orders Friday for areas across and near San Miguel County, including Big Pine, Gallinas, Lower Canyon Road, Trout Springs, Hot Springs and East and West Sapello, officials said.
  
  Many communities in the county remained under evacuation orders Saturday, as did others in neighboring Mora County, according toa news releasefrom the Office of Emergency Management of San Miguel County and the City of Las Vegas.
  
  It is only April, and New Mexico has already seen a year's worth of fire activity that will worsen starting today
  
  “This emerging situation remains extremely serious and refusal to evacuate could be a fatal decision,” officials said in the release.
  
  New Mexico Gov. Michelle Lujan Grisham also appealed to residents to heed evacuation orders,sayingon Twitter, “buildings can be replaced, but you can’t.”
  
  The spreading flames were pushed Friday by “high wind speeds” in two directions: east toward Las Vegas and south across Gallinas Canyon, according to the New Mexico Fire Informationwebsite.
  
  “We were watching the fire march a mile, about, every hour,” said Jayson Coil, an operations section chief with the Southwest Area Incident Management Team, during a Saturdaybriefing.
  
  The area of Hot Springs began evacuating Friday afternoon as flames approached, Coil said. The area of Mineral Hill began evacuating around midnight, Coil said, after the southernmost part of the fire pushed past previous containment lines.
  
  The blaze was about three quarters of a mile to the closest house in Mineral Hill during the Saturday briefing, Coil said.
  
  On the east side of the blaze, there was a new threat Saturday for areas including Las Tusas, Manuelitas and the Sapello area, Coil added.
  
  2 wildfires have combined in New Mexico as fires also rage in Arizona and Nebraska
  
  And fire conditions areexpected to worsen.
  
  While the northern part of the state was expected to get a break from strong winds Saturday, more powerful winds were forecast to return Sunday along with “more critical fire weather conditions,” the Albuquerque National Weather Servicesaid.
  
  More than 1,000 people were battling the Calf Canyon and Hermits Peak Fires, and officials are investigating what may have started the flames.
  
  A little further north, the Cooks Peak Fire, which started roughly two weeks ago, is still burning.
  
  The blaze has scorched more than 56,000 acres and was 56% contained Saturday morning, according to the fire informationwebsite.
  
  The fires are part of aseries of devastating blazesthat have torchedparts of the state in recent weeks.
  
  The state hasseen wildfires burn more acresso far this year – more than 173,000 – than in seven of the last eight years, according to statistics from the Southwest Coordination Center.
  
  And it could get worse. The peak of the fire season in New Mexico is not until June, with the months that usually have the highest number of fires being June, May, July and April, in that order.
  
  In a warningpostedSaturday, the National Weather Service said the smoke from the northern New Mexico fires was reducing air quality and urged people older than 65 with poor respiratory health to “monitor the visibility & minimize time outdoors.”
