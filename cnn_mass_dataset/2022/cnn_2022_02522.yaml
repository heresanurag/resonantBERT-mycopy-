title: "Roberts clears way for Indiana to try to implement law restricting abortion access for minors"
date: "2022-07-18"
section: "Politics"
url: "https://www.cnn.com/2022/07/18/politics/roberts-abortion-indiana-supreme-court/index.html"
content: |
  Chief JusticeJohn Robertson Monday cleared the way for Indiana to attempt to implement a law that restricts a minor’s access to abortion.
  
  In a procedural order, Roberts granted a request from Indiana to bypass normal procedures and quickly transmit the court’s opinion from JuneoverturningRoe v. Wade to a federal appeals court so that the state can attempt to put in place its strict parental notification law that had been blocked.
  
  Indiana had sent its request to Justice Amy Coney Barrett, but she took no part in the case presumably because she was sitting on the Chicago-based federal appeals court when the case was initially before it. As a result, the application was handled by Roberts.
  
