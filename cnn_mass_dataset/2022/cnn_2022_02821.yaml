  _May 11, 2022_
  
  _U.S. President Joe Biden speaks on the topic of inflation, as gas prices hit a new record high. Bitcoin’s value has dropped dramatically in recent months, but mining the cryptocurrency is in full swing. An ongoing drought in the American West brings down lake levels, threatening some livelihoods. And a tech company opens its first retail store._
  
