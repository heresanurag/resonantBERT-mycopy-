title: "Start your week smart: Winter storm, Djokovic, Texas synagogue, Tsunamis, Covid-19"
date: "2022-01-16"
section: "US"
url: "https://www.cnn.com/2022/01/16/us/five-things-january-16-trnd/index.html"
content: |
  It’s the first earnings season of the year, the timewhen many big, publicly-traded companies release their latest figures. So far, things seem to be off to a strong start for 2022, which may give investors some distraction from inflation fears and other looming economic woes.
  
  Here’s what else you need to know toStart Your Week Smart.
  
  • A massive winter storm dumped snow on the central US and is expected to wallop much of the country’s eastern third withsnow and freezing rain today. As many as 80 million people are under winter weather alerts.
  
  • Tennis starNovak Djokovic has left Australiawithout contesting the Australian Open after losing a legal challenge against a decision revoking his visa for the second time.
  
  • An elite FBI hostage rescue team breached a synagogue in Colleyville, Texas, last night, safely recovering three remaining captivesafter a nearly 11-hour hostage situation.
  
  • An underwater volcano in the South Pacific erupted violently on Saturday,causing tsunamis to hit Hawaii, Japan, and Tonga’s largest island, Tongatapu – sending waves flooding into the capital.
  
  • As the Omicron variant sweeps the US – pressing many hospitals into crisis mode – data from New York show the state is“turning the corner on the winter surge,”Gov. Kathy Hochul said Friday.
  
  The annual meeting of the World Economic Forum in Davos, Switzerland, was supposed to take place this week, but has been deferred because of the pandemic. Instead,world leaders will meet virtually for the Davos Agenda, a week-long event to discuss how to address current global challenges. The meeting’s top priority? Climate change.
  
  Monday is also Martin Luther King, Jr. Day.Here are some ways to make change while observing his legacy.
  
  The Supreme Court will announce thefinal batch of cases it will take up for the term. The court held a conference on Friday to vote on which petitions to pick up, and there are several that will be notable if they’re chosen. They include a case concerning proof of intellectual disability in death penalty cases, jurisdiction over vehicle emissions standards, a qualified immunity case, and the right of individuals to record police officers carrying out their duties. Several cases ask the Supreme Court to overrule existing precedents, including two cases seeking to invalidate affirmative action programs.
  
  Americans can begin orderingfree at-home Covid-19 testsstarting January 19. Orders for up to four tests per household can be placed atCOVIDtests.gov, and tests are expected to ship within seven to 12 days of being ordered.
  
  January 20 is the one-year mark of President Joe Biden’s time in office. Expect lots of conversations about his campaign promises and the state of some of the nation’s biggest challenges one year on.
  
  January 22 marks the anniversary of Roe v. Wade, the landmark 1973 Supreme Court decision that affirmed the right to abortion. The anniversary will be particularly fraught this year,as several states have mounted successful challengesto the legal precedent in recent months. The anti-abortion group March for Life is also planning annual events around the occasion.
  
  This week on the Sunday edition of the 5 Things podcast, CNN Chief Political Correspondent Dana Bash brings us up to speed on the debate over voting rights legislation in the Senate and examines how new voting restrictions could impact this year’s midterm elections.Listen here!
  
  Check out moremoving, fascinating and thought-provoking imagesfrom the week that was, curated by CNN Photos.
  
  Looking for something new to watch? We got you!
  
  The latest “Scream” movie is out, and it pairs cast members from the original (released 25 years ago!) with some new stars. The result?CNN’s Brian Lowry saysit’s “so self-referential as to risk swallowing its own tail,” but “turns out to be a great deal of fun.”
  
  Netflix is also adding to its creepy, bingeable repertoire with “Archive 81,” a showabout an archivist hired to reconstruct a collection of videotapesdamaged in an apartment fire during the 1990s. But, be warned: You’ll be left with some burning questions.
  
  And as if that wasn’t enough emotionally taxing stuff, everyone’s talking about the newsecond season of “Euphoria,”the dark teen drama that definitely isn’t afraid to go there.
  
