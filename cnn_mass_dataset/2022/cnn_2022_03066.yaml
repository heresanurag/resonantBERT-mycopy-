title: "Opinion: It’s time for employers to stop caring so much about college degrees"
date: "2022-10-13"
section: "Perspectives"
url: "https://www.cnn.com/2022/10/13/perspectives/college-degrees-careers-roslansky-auguste"
content: |
  Editor’s Note:Ryan Roslansky is CEO of LinkedIn. Byron Auguste is CEO of Opportunity@Work. The opinions expressed in this commentary are their own.
  
  The urgent business case for finding new ways of hiring has never been clearer. The demand for workers in the US is outpacing the supply, and finding the best talent is going to be increasingly difficult as the world navigates a period of heightened economic uncertainty.
  
  Despite the need for revamping our existing talent strategies to keep pace, employers have been slow to move on what we see as the most sustainable way to hire and grow more effective, engaged workforces: hiring for skills, instead of just relying on pedigree.
  
  The old set of indicators – the rightdegreefrom the right school, the right network to endorse you and the right past employers on your resume – are weak predictors of what actually matters: a candidate’s ability to do the job.
  
  It’s true that colleges and universities remain an important source of talent, but when a college degree becomes a box-checking, bureaucratic exercise, it unnecessarily places a barrier between skilled workers seeking better jobs and employers in need of their talents.
  
  Further, while providing references and getting a gauge for “who you know” is a fairly standard practice, it can inadvertently put some candidates at a disadvantage. LinkedIn research shows, for instance, that workers who go to top universities tend to have strongernetworks, giving them yet another leg up in the job search.
  
  We’ve started to see signs of a shift on LinkedIn, withjob postingsthat don’t have degree requirements up from 15% in January 2020 to 20% so far this year. And HR teams are increasingly looking beyond who you know or what school you attended to find great talent, with 40% ofhirerson LinkedIn explicitly using skills data to fill their roles. Employers are more open to new ways of finding and evaluating job candidates, and those that move swiftly in this direction will build more resilient teams.
  
  When employers use degrees as a proxy for skills, they miss out on half of the workforce, asOpportunity@Work’s researchhas shown. These are the 70 million workers who are skilled through alternative routes, such as community college, military service, workforce training programs, skills bootcamps and learning on the job – rather than through a bachelor’s degree.
  
  LinkedIn datasuggests that certain industries – like professional services, finance and tech – are some of the hardest sectors for workers without bachelor’s degrees to break into. But bringing morecandidatesinto the fold who don’t have these traditional backgrounds can increase the pool of eligible applicants – a huge competitive edge in today’s tight labor market. It can also spur greater diversity, since 61% of Black workers, 55% of Hispanic workers, 66% of rural workers and 61% of veteran workers have in-demand skills but notbachelor’s degrees.
  
  A degree is an achievement, but with careers stretching to half a century, a one-time intensive period of study is not enough. The reality is that with the current pace of technological change, everyone needs to continuously expand their skills, especially as industries keepchanging. The same jobs today will require new skills five years from now, and organizations that understand this are thinking more critically about how to set up new hires from day one for continuous on-the-job learning.
  
