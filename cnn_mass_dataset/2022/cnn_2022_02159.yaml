title: "Tens of thousands likely jobless after Hurricane Ian, economists say"
date: "2022-10-11"
section: "Economy"
url: "https://www.cnn.com/2022/10/11/economy/hurricane-ian-labor-impact/index.html"
content: |
  Hurricane Ian’s devastating impact will be felt for weeks and months to come, especially in the state of Floridawhere much of the storm’s damage was sustained. Economists say tens of thousands of people are likely to file for unemployment benefits in the storm’s wake, but if those workers — many in low-paying service sector industries like tourism — don’t come back, the local economies of some hard-hit areas could struggle to rebound.
  
  Although the damage is still being tallied, earlyestimates indicatethat Ian could be the most costly hurricane to make landfall in Florida. The storm’s economic toll of insured losses could be between $53 billion and $74 billion, according to RMS, a Moody’s Analytics disaster-modeling firm.
  
  In the short term, a spike in jobless claims is almost inevitable, economists say: “Hurricane Harvey in Texasprompted a rise of about 50,000 in August of 2017,” noted Mike Englund, chief economist at Action Economics.
  
  “Certainly, there’s going to be some short-term displacement… but it’s hard to predict exactly what that will look like in the Florida context or in the Southeast more generally,” said Lynn Karoly, a senior economist at the RAND Corporation.
  
  The biggest threat is to tourism. “Particularly in coastal communities, and within tourism… how long those effects persist depends on the sector’s ability to rebuild,” Karoly said.
  
  While big companies can at least fall back on insurance, free cash flow or issuing debt to repair or replace damaged buildings and equipment, workers are likely to have a steeper climb back to financial stability.
  
  “The resilience factor could be lower among the lower-wage workforce, and even their employers may also be rethinking about how they staff the positions that they need to fill,” Karoly said. In a labor market that was historically tight pre-storm, there might be more of an impetus to replace displaced workers with machines, self-serve customer features or other technologies.
  
  Dave Gilbertson, vice president at HR technology firm UKG, which tracks real-time labor market metrics like time-card punches, said that in devastated Floridacounties like Lee and Hillsborough, workforce activity has alreadyplunged by nearly half — suggesting a tremendous loss of economic activity as well as earnings.
  
  “It’s pretty uncommon to see a nearly 50% decline,” Gilbertson said. “This is a deeper disaster than we’ve seen over the past couple of years.”
  
  For the growing number of households whose pay isn’t keeping pace with rising prices, losing a source of income can quickly become a crisis.
  
  “They’re losing so much personally, but they’re also losing the ability to work and support their family,” Gilbertson said. “A lot of hourly workers are living paycheck-to-paycheck [and]dealing with rising inflationby pulling down their savings andutilizing more credit cards… The ability to withstand any kind of disruption is minimal.”
  
  Although parallels are frequently drawn, economists said comparisons to 2005’s Hurricane Katrina can only go so far to help predict what the aftereffects of Ian will mean for Florida’s labor market in the long term.
  
  “There will be a significant slowdown in the job openings in the state, [but] it’s a very strong economy and hurricanes are not new to them,” said Sinem Buber, lead economist at ZipRecruiter.
  
  Florida absorbed nearly 221,000 new residents between July 2020 and July 2021 alone, according to Census Bureau data. The hard-hit city of Fort Myers hadthe sixth-fastest growth of all US cities in that time frame.That state’s unemployment rate was 2.7%, a full percentage point below the national average.
  
  “Katrina was a much more damaging storm, and impacted Louisiana, which is much less affluent than Florida,” Zandi said.
  
