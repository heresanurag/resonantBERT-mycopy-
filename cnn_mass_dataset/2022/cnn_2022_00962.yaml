title: "Johnny Depp channels Jack Sparrow outside of courthouse"
date: "2022-05-23"
section: "Entertainment"
url: "https://www.cnn.com/2022/05/23/entertainment/johnny-depp-jack-sparrow/index.html"
content: |
  Johnny Deppmay not be heading back to the “Pirates of the Caribbean” franchise anytime soon, but he has not left the character totally behind.
  
  The actor thrilled some supporters last week outside of the Virginia courthousewhere his defamation trial against ex-wife Amber Heardis being held by interacting with them from the SUV where he was a passenger.
  
  When a fan yelled out “You’ll always be our Captain Jack Sparrow,” Depp responded in the voice of the character inan exchange that was shared on social media.
  
  “He’s still around somewhere,” Depp said in his Jack Sparrow voice. “I see him now and again. He shows up now and again.”
  
  Depp has accused Heard of defaming him in a 2018 op-ed for the Washington Post in which Heard described herself as a “public figure representing domestic abuse.” Though Depp was not named in the article, he claims it affected his reputation and lost him work.
  
  Heard has filed a counterclaim for $100 million.
  
  “Pirates of the Caribbean” producerJerry Bruckheimeraddressed in a recent interview whether Depp would be returning to the franchise.
  
  “Not at this point,” Bruckheimer said. “The future is yet to be decided.”
  
  Depp may be called to return to the witness stand this week as the trial winds down.
