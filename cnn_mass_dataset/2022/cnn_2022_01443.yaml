title: "Biden administration announces it will resume onshore oil and gas lease sales with higher royalty rate"
date: "2022-04-15"
section: "Politics"
url: "https://www.cnn.com/2022/04/15/politics/biden-interior-oil-and-gas/index.html"
content: |
  The Department of Interior announced Friday it planned to resume onshore oil and gas lease sales on federal land, with a higher royalty rate for companies to pay to the federal government.
  
  The Bureau of Land Management will issue sale notices on Monday for upcoming oil and gas projects.
  
  The Biden administration had previously planned to hold the lease sale, but paused it aftera judge blocked the administrationfrom using a metric to quantify the economic harm caused by the climate crisis, such as sea level rise, more destructive hurricanes, extreme wildfire seasons and flooding. The Biden administration appealed that ruling and argued it necessitated a pause on all of the many projects in which the government used that particular analysis.
  
  Biden struggles to refocus Americans' attention on his efforts to help family budgets as inflation soars
  
  The royalty rate increase comes after the Interior Department issued acontroversial reportlast Novemberrecommending that rates be increasedfor more of a return to taxpayers. The newly increased royalty rate is 18.75%, up from of 12.5%. It’s the first time the federal government has ever increased what companies pay to drill for oil and gas on public land.
  
  “For too long, the federal oil and gas leasing programs have prioritized the wants of extractive industries above local communities, the natural environment, the impact on our air and water, the needs of tribal nations, and, moreover, other uses of our shared public lands,” Interior Secretary Deb Haaland said in a statement, adding the department would “begin to reset how and what we consider to be the highest and best use of Americans’ resources.”
  
  The bureau will offer around 173 parcels on roughly 144,000 acres of federal land, which Interior said is an 80% reduction from the acreage originally being considered for leasing. Interior said it reduced the amount of land being offered after “robust environmental review” and engagement with Native tribes and local communities.
  
  The department also said it would focus on offering new leases near existing oil and gas infrastructure and will continue to disclose greenhouse gas emissions that would result from oil and gas drilling on federal lands.
  
