title: "Is there really a non-MAGA wing of the Republican Party?"
date: "2022-09-06"
section: "Politics"
url: "https://www.cnn.com/2022/09/06/politics/joe-biden-donald-trump-maga-republican/index.html"
content: |
  In a series of remarks over the last few days, President Joe Biden has made his strategy heading into the 2022 midterm elections crystal clear: Appeal to Republicans who don’t align themselves with Donald Trump or his broader “Make America Great Again” coalition.
  
  At his speech in Philadelphia last Thursday,Biden said this:
  
  “Now, I want to be very clear, very clear up front: Not every Republican, not even the majority of Republicans, are MAGA Republicans. Not every Republican embraces their extreme ideology.
  
  “I know because I’ve been able to work with these mainstream Republicans.”
  
  And he echoed that sentiment on Labor Dayduring a speech in Wisconsin. “Not every Republican is a MAGA Republican,” said Biden. “Not every Republican embraces that extreme ideology. I know because I’ve been able to work with mainstream Republicans my whole career.”
  
  The strategy is simple: With Trump continuing to falsely say the 2020 election was stolen and with the Supreme Court overturning Roe v. Wade, Biden wants to make sure that Republicans who feel alienated from their own party know that they can find a home with him, and with Democrats more broadly, in the fall campaign.
  
  In each episode of his weekly YouTube show, Chris Cillizza will delve a little deeper into the surreal world of politics. Click to subscribe!
  
  Which is a smart approach – especially when you consider that some of the most contested Senate seats up in 2022 happen to be in the top swing states in the country like Arizona, Georgia, Pennsylvania and Wisconsin.
  
  But Biden’s rhetoric of late raises, for me, a broader question: Is he right that “not even the majority of Republicans” identify closely with Trump and the MAGA movement more generally? Or, put another way, are there really enough non-MAGA Republicans to sway the election to Democrats if Biden can persuade them to vote for his side?
  
  There’s no one poll question that answers that question directly. But there are a few recent polls that get us some answers — all coming at it from different directions. (And shoutout to CNN’s polling and analytics editorAriel Edwards-Levyfor help with these numbers.)
  
  * In late JulyCNN pollingof registered Republican voters or those who lean toward the Republican Party, 44% said the GOP should nominate Trump in 2024. A majority, 55%, said the party should nominate a different candidate. Among that 55%, voters are split between those who said they’d prefer another candidate because they don’t want Trump to be president (27%) and those who cite other reasons for preferring different candidate (28%).
  
  * AnAugust Quinnipiac University pollshowed that among registered Republican voters, 76% had a favorable view of Trump, while just 15% an unfavorable view. Almost 3 in 4 (71%) said they would like to see Trump run for president in 2024, with 25% saying they would not.
  
  * AnAugust NBC News pollfound that among registered voters who are Republicans and lean toward the Republican Party, 41% said they considered themselves to be more supporters of Trump, while 50% said they were more supporters of the Republican Party.
  
  What to make of all those numbers? Well, two main things:
  
  1) Trump remains the dominant force within the Republican Party and is quite popular among rank-and-file Republicans.
  
  2) There are, roughly, one-quarter of Republicans who donotwant Trump to run again in 2024.
  
  Given that, it’s probably fair to say that there are roughly 1 in every 4 Republican voters who, whether they identify as such or not, are non-MAGA Republicans.
  
  Which is interesting!
  
  But don’t assume that that 25% of non-MAGA Republicans are necessarily up for grabs for Biden and Democrats – either this fall or in 2024. There’s abigdifference between saying you don’t want Trump to run for president again in 2024 and deciding to cross party lines to support a Democrat running for House or Senate this November.
  
  On the other hand, Democrats don’t need 1 in 4 Republicans to cross party lines to vote for Democrats in the 2022 election. If even 10% of that group did so, it could well amount to enough votes to make a difference in not just some of these swing states and districts, but also in the broader fights for the majority in the House and Senate.
