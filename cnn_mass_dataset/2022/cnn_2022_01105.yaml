title: "SpaceX capsule docks with space station carrying international astronauts — and 1 cosmonaut"
date: "2022-10-06"
section: "World"
url: "https://www.cnn.com/2022/10/06/world/spacex-nasa-astronaut-docking-iss-scn"
content: |
  Sign up for CNN’s Wonder Theory science newsletter.Explore the universe with news on fascinating discoveries, scientific advancements and more.
  
  A SpaceX capsule carrying a multinational crew of astronauts linked up with the International Space Station on Thursday after a 29-hour trek.
  
  The mission, called Crew-5, is a joint operation by NASA, SpaceX and theirgovernmentpartners around the world, including — for the first time — Russia, despite mounting tensions on the ground surrounding the invasion of Ukraine. The missionlaunched from Kennedy Space Center in Florida at 12 p.m. ETon Wednesday.
  
  SpaceX, NASA launch 3 astronauts and 1 cosmonaut to the ISS. Here's everything you need to know
  
  The Crew Dragon capsule spent a day making a slow, methodical climb toward the space station. And as it approached the ISS, the spacecraft, which is fully autonomous, used its small onboard thrusters to stay oriented as it eased into its docking port. It first made physical contact with the ISS at 5:01 p.m. ET.
  
  After ensuring a vacuum-tight seal between the SpaceX spacecraft and the ISS, the hatch that separated the capsule and the space station was opened, officiallyjoiningthe spacecraft.
  
  As is routine for astronauts arriving at the ISS, the crew was able to send a video message to the ground that was aired on NASA’slivestream.
  
  The crew members include astronauts Nicole Mann and Josh Cassada of NASA; astronaut Koichi Wakata of JAXA, or Japan Aerospace Exploration Agency; and cosmonaut Anna Kikina of Russia’s Roscosmos space agency.
  
  Samantha Cristoforetti, a European Space Agency astronaut who flew on a previous SpaceX mission to the ISS and recently became the first female commander of the space station, welcomed them.
  
  “It’s just fantastic to finally have you guys on board. And this is a very special crew because it’s the first time that we have a Russian cosmonaut flying on a Crew Dragon, so very special welcome to Anna (Kikina),” Cristoforetti said.
  
  The spaceflight marks a historic moment, as Mann has becomethe first Native American woman ever to travel to space.
  
  “Look, Mom, I’m finally in space!” she said on the livestream dispatch from the ISS. Mann is also serving as Crew-5 mission commander, making her the first woman ever to take on such a role for a SpaceX mission.
  
  Kikina, who is also experiencing her first-ever spaceflight, shared in the celebratory moment.
  
  “We overflow with emotions,” Kikina added.
  
  A Russian translator took over shortly after from her dispatch, relaying, “I’m extremely happy that I am here.”
  
  Kikina then added through the translator: “A lot of people are working hard and will keep working hard to make sure … that our common (crewed) space exploration will continue to exist to develop further. We’re here and we’re living proof of it,” she said.
  
  Kikina’s participation in this flight is part of a ride-sharing agreementinkedby NASA and Roscosmos in July. Despite geopolitical tensions between the United StatesandRussia reaching a nearfever pitch as the war in Ukraine has escalated, NASA has repeatedly said that its partnership with Roscosmos on the ISS is vital to continuing the space station’s operations and the valuable scientific research that is carried out on board.
  
  During a news conference on Wednesday, Sergei Krikalev, the executive director of Human Space Flight Programs at Roscosmos, also had commented on the significance of the US-Russian partnership.
  
  In pictures: SpaceX's historic Crew-5 launch
  
  “We just continue what was started many years ago, in 1975 when the Apollo-Soyuz crew worked together,” Krikalev said, referring to an in-space meetup in 1975 that became a symbol of post-Cold War cooperation between the USand Russia. “Now we continue that.”
  
  The Crew-5 astronauts will spend about five months in space. During their stay, they’re expected to conduct spacewalks to maintain the space station’s exterior, as well as performmore than 200 science experiments.
  
  “Experiments will include studies on printing human organs in space, understanding fuel systems operating on the Moon, and better understanding heart disease,” according to a NASA statement.
  
  This is the sixth crewed mission that SpaceX, a privately owned company headed by controversial tech billionaire Elon Musk, has carried out on NASA’s behalf. The program stems from a $2.6 billiondeal that NASA and SpaceXsigned nearly a decade agoas part of the space agency’s efforts to hand over all transportation to and from the ISS to the private sector so that NASA could focus on exploring deeper into the solar system.
  
  NASA and SpaceX to send first Native American woman to orbit
  
  Aerospace giant Boeing also signed a similar contract, though it’s still working to get its commercial spacecraft, the Starliner, up and running. Its first crewed flight could happen in early 2023.
  
  Meanwhile, NASA has continued to extend its partnership with SpaceX, growing the value of theiroverall deal to encompass 15 total crewed missions at a value of more than $4.9 billion.
