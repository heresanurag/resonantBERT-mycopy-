title: "5 things to know for April 27: Ukraine, Covid-19, Recession, Bitcoin, LGBTQ rights"
date: "2022-04-27"
section: "US"
url: "https://www.cnn.com/2022/04/27/us/five-things-april-27-trnd/index.html"
content: |
  Getting ready for your next vacation? Don’t forget to pack your patience. Experts say a summer of travel chaos lies ahead with crowded planes and canceled flights as the industry struggles to cope in the face of decreased workforces. Plus,some of the world’s most popular tourism destinationsare still off limits to travelers – regardless of their willingness to test, get vaccinated and quarantine.
  
  Here’s what you need to know toGet Up to Speed and On with Your Day.
  
  (You can get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  Amid escalating tensions with Western powers,Russia has cut off gas suppliesto Poland and Bulgaria after they refused to pay in rubles, rather than dollars or euros. The European Commission described the decision to halt gas supplies asattempted “blackmail”and said it was coordinating a response among EU member states. Russian state energy giant Gazprom told Bulgaria that it would shut off gas supplies starting today, Bulgaria’s energy ministry said in a statement. The announcement sent US natural gas futures up about 3% yesterday. European gas prices also jumped nearly 20% this morning, according to Reuters. As of now, officials say Poland and Bulgaria were preparing for this possible move and are not experiencing shortages yet. Separately, scores of people arefleeing areas around the city of Kherson, Ukraine – a region that has been terrorized in the past week by Moscow’s offensive – as fears mount about apossible referendum Russia plans to hold today.
  
  Pfizer and BioNTech said yesterday that they have requested FDA authorization of abooster dose of Covid-19 vaccine for children 5 through 11. The companies have said that a third vaccine dose raised Omicron-fighting antibodies by36 times in this age group. Recent studies found that the effectiveness of Pfizer’s vaccine for children ages 5 to 12 dropped substantially during the Omicron surge, falling from 68% to about 12% against Covid-19 infection. However, two doses continued to provide protection against more severe illness resulting in urgent care or hospitalizations. Currently, boosters are available for kids 12 and older with certain kinds of immunocompromised conditions,as well as adults. Second boosters are authorized for anyone 50 and older.
  
  A major recession is coming,Deutsche Bank economists warned in a report yesterday. This comes after Deutsche Bank raised eyebrows earlier this month by becoming the first major bank toforecast a US recession, albeit a “mild” one. The problem, according to the bank, is that while inflation may be peaking, it will take a “long time” before it gets back down to the Federal Reserve’s goal of 2%. That suggests the central bank will raise interest rates so aggressively that it hurts the economy. The good news is that Deutsche Bank predicts the economy will eventually rebound by mid-2024 as the Fed reverses course in its inflation fight.
  
  Bitcoin may be a new investment option in your 401(k) plan by the middle of this year. Fidelity Investments – the largest 401(k) plan provider in the US with more than 20 million participants – will become thefirst major 401(k) provider to offer cryptocurrency as an investmentfor retirement savers. But if you’re interested, you’ll have to check with your employer first, because the bitcoin option will only be offered to participants whose employers have elected to include it in their plans. Fidelity did not specify how many employers have already signed on, but it confirmed a number of clients have committed and others are undergoing the evaluation process. The Department of Labor, on the other hand, has publicly indicated it isvery concernedabout the prospect of 401(k) participants being exposed to the extreme volatility of crypto trading.
  
  Oklahoma Republican Gov. Kevin Stitt yesterday signed a lawbanning nonbinary gender markers on birth certificates. The legislation, which cleared the Oklahoma state legislature in recent weeks, states: “The biological sex designation on a certificate of birth issued under this section shall be either male or female and shall not be nonbinary or any symbol representing a nonbinary designation including but not limited to the letter ‘X’.” The law takes effect immediately because it was passed with an emergency designation. Oklahoma’s measure is part of abroader effort by conservativesto make it more difficult for transgender and nonbinary Americans to receive gender-affirming health care, play sports or change their birth certificates and other identification documents to match their gender identity.
  
