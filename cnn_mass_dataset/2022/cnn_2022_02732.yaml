  Harry Styles graces the cover of Better Homes & Gardens, obviously
  
  His new album is titled “Harry’s House” so it makes perfect sense. Plus, who doesn’t lovethat contagious smile!
  
  Brooklyn Public Library offers teens free library cards and access to banned books
  
  Book bans are sweeping the nation, but some libraries are tellingteens and young adults to read on.
  
  SpaceX to launch another historic astronaut mission today
  
  On board will befour professional astronauts, including the first Black woman to join the International Space Station crew.
  
  Kevin Hart is launching a new media company called HARTBEAT
  
  The company has a clever name, a funny boss, and just received a$100 million private equity investment. Sounds like a great start, Hart.
  
  That’s how much Harvard University is dedicating to create a fund to research and redress its “extensive entanglements with slavery,” university President Lawrence Bacow announced yesterday. This comes aftera new university reportdetailed how slavery and racism played a significant part in Harvard’s institutional history. For nearly 150 years – from the founding of the university in 1636 until Massachusetts abolished slavery in 1783 – Harvard presidents and others enslaved more than 70 people, the report says.
  
  “I think in many situations in this country, where if people have good access to health care and they are taking care of other risk factors, aspirin now makes a lot less sense.”
  
  – Dr. Donald Lloyd-Jones, president of the American Heart Association, onscientists seeing little benefit of taking daily aspirinfor most healthy people to prevent heart attack and stroke. The US Preventive Service Task Force finalized its latest recommendations on low-dose aspirin regimens and now says people over 60 should not start taking a daily aspirin for primary prevention of heart problems, in most cases, because it may contribute to a risk of bleeding in the stomach or brain.
  
