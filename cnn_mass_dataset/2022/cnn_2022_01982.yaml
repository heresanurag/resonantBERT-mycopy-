  Across the United States, thepowerful synthetic opioid fentanylhas become the most commonly used drug involved in drug overdoses.
  
  In 2020, areport from the CDCfound that opioids have “substantial involvement” in nonfatal overdoses, including those involving other types of drugs, and these types of nonfatal overdoses are on the rise.
  
  Astudyfound in 2016 that about 27% of nonfatal cocaine overdoses treated in emergency departments also involved an opioid.
