  _April 25, 2022_
  
  _A preview of the upcoming U.S. Midterm Elections – along with what some Democrats and Republicans are saying – is front and center today on CNN 10. We’re discussing what’s known about natural immunity with regard to Covid-19. And we’re telling you where a couple alligators have been strolling through the neighborhood._
  
  [Click here to access the printable version of today’s CNN 10 transcript](http://transcripts.cnn.com/TRANSCRIPTS/2204/25/sn.01.html)
  
  _CNN 10 serves a growing audience interested in compact on-demand news broadcasts ideal for explanation seekers on the go or in the classroom. The show’s priority is to identify stories of international significance and then clearly describe why they’re making news, who is affected, and how the events fit into a complex, international society._
  
