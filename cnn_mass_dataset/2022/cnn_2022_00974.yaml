  This weekend will be a glimpse of the long, hot summer ahead for many Americans. A “dangerous and deadly heat wave” is on track to bake several southwestern states over the next few days, the National Weather Service warns. More than 25 million people are under heat alerts and some major cities will reach sweltering temperatures above 110 degrees – putting many power grids to the test.
  
  Here’s what you need to know toGet Up to Speed and On with Your Day.
  
  (You can get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  The House select committee investigating theUS Capitol insurrectionon January 6, 2021, will hold its firstprime-time televised hearing todayat 8 p.m. ET. The committee’s central mission has been to uncover the full scope of former President Donald Trump’s unprecedented attempt to overturn the 2020 presidential election and stop the transfer of power to President Joe Biden. Thesehighly choreographedhearings will be the panel’s first opportunity to show the public what it’s learned from more than 1,000 witness interviews and 135,000 documents during its 10-month investigation.Today’s hearingwill also shine a spotlight on thenine-member committee, which features seven Democrats and two Republicans, and set the stage for subsequent hearings in the coming days.
  
  Victims of the Uvalde elementary school massacre and other recent mass shootings gavefirst-hand descriptionsof the horrors of gun violence at a House committee meeting on Wednesday. In a pre-recorded video, 11-year-old Miah Cerrillo, a fourth-grade student atRobb Elementary School in Uvalde, described trying to hide behind her teacher’s desk and covering herself in blood in an attempt to survive. It marked a rare moment for Congress to hear testimony from someone as young as Cerrillo on a subject as sensitive and disturbing as gun violence. Family members of shooting victims also made passionate pleas for gun legislation. The hearing, however, clearly displayed the partisan divide in thedebate on gunsas Democrats urged stronger gun control, while Republicans pushed back on restrictions.
  
  Ukrainian officials say they are considering pulling back troops to more fortified positions as intense fighting continues for the key eastern city ofSeverodonetsk, the epicenter of the confrontation in Donbas region. “The Russians are destroying everything,” Serhiy Hayday, head of the Luhansk regional military administration, said in a televised announcement Wednesday, “They are firing tanks and artillery at residential buildings,” he added. Separately, Ukrainian President Volodymyr Zelensky warned that “millions of people may starve” if Russia continues its blockade of Ukraine’s ports. The UN secretary-general madesimilar remarks Wednesday, saying the war threatens to “unleash an unprecedented wave of hunger and destitution” around the world.
  
  The White House is set to announce aCovid-19 vaccine rollout plantoday for children under 5. The Biden administration is partnering with state and local governments, health care providers, federal pharmacy partners, national and community-based organizations and other entities to ship and distribute vaccines across the country following next week’s meeting of the FDA’s vaccine advisers – who willreview data on vaccinesfrom Pfizer and Moderna – and the expected authorization from the full FDA. Following that expected authorization, the first vaccinations could startas early as the week of June 20– with the program ramping up as more doses are delivered and more appointments become available, the White House wrote in a fact sheet.
  
  The immigration challenges facing the Biden administration along the southern border are “beyond anything that anyone has seen before,” US Secretary of State Antony Blinken told CNN Wednesday. US officials have said immigration will be a key focus of a summit of regional leaders taking place this week in Los Angeles. Notably, however, the leaders of several countries that are crucial to addressing the influx of migrants at the border – including Mexico, El Salvador, Honduras and Guatemala – are boycotting the summit, dealing an embarrassing blow to the White House at a time when it is scrambling to handle the issue. At the US southern border, US Customs and Border Protection stopped more than 310,000 migrants from the Northern Triangle of Guatemala, Honduras and El Salvador from October through April, according to the latest agency data.
  
