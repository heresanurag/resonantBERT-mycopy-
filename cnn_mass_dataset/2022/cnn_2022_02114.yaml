  “The ppl around these rappers gain so much. It’s time to start really reminding them over & over!!! At least TRY to put your foot down if you CARE! Tell them!!! You’re not loved like you think you are!!! You’re prey!!!! In a world full of predators!!!! What’s not clicking???!!!”rapper Nicki Minajtweetedafter PnB Rock’s death.
  
  Rapper PnB Rock fatally shot at Roscoe's Chicken 'N Waffles in Los Angeles, police say
  
  Her tweets and the organic conversations among other artists and fans on social media speak to common issues in hip-hop: masculinity, security and handling rising fame.
  
  “The amount of non reported robbery attempts dealing with rappers are ridiculous.. hella rappers don’t even speak on it cuz some feel it’s embarrassing to admit or speak on. Rappers literally being targeted out there and ppl trying em in broad daylight,” podcast host and entertainerDJ Akademiks tweeted.
  
  PnB Rock previously spoke with Akabout an attempted robbery when he was out with his girlfriend and daughter. It appears the rapper, who hails from Philadelphia, did not have security when he was at Roscoe’s in September.
