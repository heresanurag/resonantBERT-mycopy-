title: "Start your week smart: Ukraine, Pakistan, France, Puerto Rico, Dwayne Haskins"
date: "2022-04-10"
section: "US"
url: "https://www.cnn.com/2022/04/10/us/five-things-april-10-trnd/index.html"
content: |
  Soaring inflation. The war in Ukraine. Yet another rise in Covid cases. With so much going on this year it’s hard to focus on things like filing your taxes. Nevertheless, the IRS still expects you to file your 2021 return and pay whatever you still owe by the filing deadline, which is April 18 for most taxpayers. If you haven’t filed yet,here are answers to some key questions that will help you through the process.
  
  Here’s what else you need to know toStart Your Week Smart.
  
  • Nine evacuation corridors have been agreed upon insouthern and eastern Ukraine, Ukraine’s deputy prime minister said earlier today, two days after a Russian missile strike on a train stationkilled at least 50 people.
  
  • Pakistan’s Prime Minister Imran Khanhas been ousted as the country’s leaderfollowing a vote of no-confidence over allegations of economic mismanagement, bringing an end to his tumultuous term in office.
  
  • French voters head to the polls today for one of themost consequential presidential electionsthe country has seen in decades. Twelve candidates, including incumbent Emmanuel Macron, are running for the top job.
  
  • Power could befully restored in Puerto Ricotoday after hundreds of thousands of people on the island have been in the dark since a fire at a power plant Wednesday evening, officials said.
  
  • Dwayne Haskins, the Pittsburgh Steelers quarterback and 2018 Heisman Trophy finalist at Ohio State,was fatally struck by a dump truckyesterday morning while trying to cross a highway on foot in South Florida, police said. Haskins, who re-signed with the Steelers just last month, was 24.
  
  April 11 is National Pet Day! The day was created tohighlight the unconditional lovepets bring to people’s lives and to encourage adoption from animal shelters. And Ramadan,the Islamic holy month of fasting, continues until May 2.
  
  The Consumer Price Index, a key measure of inflation, will be released Tuesday morning. Economists are forecasting that the CPI numbers will show prices rose at an 8.3% clip over the past 12 months, according to Refinitiv. That would be up from February’s year-over-year increase of 7.9%,which was a 40-year high.
  
  The annual Maundy Service is set to take place Thursday at Windsor Castle in the United Kingdom. A number of public events are expected to draw large crowds during the Easter Week celebrations, but notably absent will beBritain’s Queen Elizabeth II. In years past, the Queen has distributed special coins to pensioners at the service as part of an old tradition.Buckingham Palace announced Fridaythat Prince Charles and Camilla would represent the monarch in the Queen’s absence.
  
  Major stock and bond markets around the world will be closed for Good Friday, and Passover begins at sundown. Passover is the Jewish festivalcelebrating the exodus of the Israelitesfrom Egyptian slavery.
  
  Saturday will mark 15 years since theshootings at Virginia Tech on April 16, 2007– one of the deadliest mass shootings in US history. A gunman killed 32 people on the Virginia Polytechnic Institute and State University campus in Blacksburg, Virginia, before taking his own life. Various vigils and ceremonies are scheduled to remember the victims.
  
  April 17 isEaster Sunday, the day Christians celebrate the resurrection of Jesus Christ on the third day after his crucifixion. It also marks the end of the 40-day period of penance called Lent. Easter is considered to be the most important season of the Christian year.
  
  This week on the Sunday edition of the 5 Things podcast, CNN’s Rosa Flores tells us about her trip to the US-Mexico border, where migrants are anticipating the lifting of a Trump-era pandemic policy called Title 42. We examine how border officials are preparing and how the move could impact the upcoming midterms.Listen here!
  
  Check out more moving, fascinating and thought-provoking images from the week that was,curated by CNN Photos.
  
  Actor Will Smith banned from the Oscars for 10 years
  
  Will Smithwill not be allowed to attend the Academy Awardsfor the next 10 years, as a result of his slapping comedian Chris Rock on stage during this year’s Oscar ceremony, the Academy of Motion Picture Arts & Sciences announced in a statement Friday. Smith issued a quick, concise statement on his ban from the Oscars for the next decade: “I accept and respect the Academy’s decision,” the actor said.
  
  Billboard Music Awards finalists
  
  The finalists for the2022 Billboard Music Awardshave been announced. The Billboard Music Award (BBMA) honors the year’s most successful artists in 62 categories across all genres of music. The Weeknd leads as a finalist in 17 categories, the most of any artist this year. The leading female finalist is Doja Cat, with 14 categories including top artist, top female artist, and top hot 100 artist. As a first time finalist, Olivia Rodrigo also did pretty well landing nominations in 13 categories. The award ceremony will broadcast live from Las Vegas on May 15.
  
  The 2022CMT Music Awards, hosted by singer Kelsea Ballerini and actor Anthony Mackie, will air live from Nashville at 8 p.m. ET on Monday on CBS. The show will include performances from Kane Brown, Cody Johnson, Miranda Lambert, Little Big Town, Maren Morris and Ryan Hurd, Carly Pearce, Cole Swindell with Lainey Wilson and Keith Urban.
  
  2022 Masters Golf Tournament
  
  The final round of the Masters begins later this morning with overnight leaderScottie Scheffler sitting at nine-under par. Scheffler, the newly crowned world No. 1, has a three-shot advantage over second-placed Cameron Smith. Five-time Masters champion Tiger Woods, who began aremarkable comebackon Thursday by carding a one-under 71 in the opening round, will start the day at seven-over par in a tie for 41st place. The winner of this year’s Masterswill go home with a whopping $2.7 million, as well as the famous green jacket.
  
