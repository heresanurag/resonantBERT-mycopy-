title: "Biden downplays worries over economic downturn: ‘I don’t think we’re going to see a recession’"
date: "2022-07-25"
section: "Politics"
url: "https://www.cnn.com/2022/07/25/politics/white-house-recession-worries/index.html"
content: |
  President Joe Biden and White House officials are continuing to downplay recession fears, even as they brace fora highly anticipated report that couldshow the economy shrinking for a second consecutive quarter.
  
  “We’re not going to be in a recession, in my view,” Biden told reporters on Monday. “The employment rate is still one of the lowest we’ve had in history. It’s in the 3.6 (percent) area. We still find ourselves, the people, investing.”
  
  “My hope is we go from this rapid growth to a steady growth. And so, we’ll see some coming down. But I don’t think we’re going to – God willing – I don’t think we’re going to see a recession,” he continued.
  
  While there is no steadfast rule governing what defines a recession in the United States, it is commonly understood to be two consecutive quarters of the country’s gross domestic product – or GDP – shrinking. But a small group of economists onthe Business Cycle Dating Committee officially define when the US economyis in a recession, and they define a recession as involving “a significant decline in economic activity that is spread across the economy and lasts more than a few months.”
  
  The US is expecting a number of key economic reports this week aside from the second quarter GDP numbers coming Thursday, including Tuesday’s consumer confidence survey and Friday’s Personal Consumption Expenditure index. The Federal Reserve also meets on Wednesday to discuss interest rates.
  
  Top Biden administration officials continue to insist the economy is not in recession amid widespread inflation.
  
  Director of the National Economic Council Brian Deese argued earlier Monday that if this week’s report from the Commerce Department shows a second consecutive negative quarter of GDP it does not mean the US is in a recession. Using an argument that theWhite House used regarding an inflation report earlier this month,Deese said the second quarter data – which reflects the April through June period – will be “inherently backward-looking,” and pointed to the jobs created in that time frame.
  
  “Never in the history of our country have we had a recession where the economy was creating jobs, period, let alone creating 400,000 jobs,” Deese told CNN’s John Berman on “New Day.”
  
  Deese and Biden’s other economic advisers are trying to use that squishy definition to argue that the economy is resilient, even if lastweek’s CNN pollshowed the public’s view of the economy is the worst it’s been since 2011.
  
  “Certainly in terms of the technical definition, it’s not a recession. The technical definition considers a much broader spectrum of data points. But in practical terms what matters to American people is whether they have a little economic breathing room, they have more job opportunities, their wages are going up – that has been Joe Biden’s focus since coming into office,” Deese said.
  
  Deese said despite the high gas and grocery prices the nation’s economy is “demonstrating resilience in the face of very significant global economic challenges.” Gas prices have dropped in recent weeks, having dropped about 55 cents over the last month,according to AAA.
  
  “If you look at the labor market, if you look at what consumers are spending, what businesses and households are investing, you continue to see this resilience,” Deese said. “But that’s no reason for complacency. We need to act. We need to act on things like prescription drugs and things like semiconductors right now.”
  
  He urged Congress to take immediate action to bring down costs for American families, including by lowering prescription drug prices and bolstering US computer chip manufacturing, which he noted would help bring down costs for automobiles.
  
  “These are very uncertain times,” Deese said. “And when you go and pull up at the gas station or pull into the grocery store and see these high prices, they not only create hardship but they create uncertainty for what things are going to be like in the future.”
  
  White House economic adviser Heather Boushey also told CNN Monday afternoon that while the administration is hopeful for encouraging economic data later this week, they’re still preparing for more discouraging signs.
  
  “Well, certainly we are looking for positive (GDP) growth in the second quarter, but you know, expectations are that it will be small – it’ll be small to negative,” Boushey told CNN’s Victor Blackwell. Like Deese, Boushey highlighted continued strong economic indicators, like the labor market.
  
  Boushey said the administration is convinced “we have the tools and we’re in a good enough place to weather the challenges in front of us,” but acknowledged high prices remain “an ongoing challenge.”
  
  Treasury Secretary Janet Yellen argued Sunday the economy is in “transition” and there is a “slowdown.”
  
  “This is not an economy that’s in recession, but we’re in a period of transition in which growth is slowing,” she told NBC’s “Meet the Press.”
