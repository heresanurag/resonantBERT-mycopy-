title: "The rise and fall of Theranos: A timeline"
date: "2022-07-07"
section: "Tech"
url: "https://www.cnn.com/2022/07/07/tech/theranos-rise-and-fall?cid=external-feeds_iluminar_yahoo"
content: |
  Four years after the top two Theranos executives, Elizabeth Holmes and Ramesh “Sunny” Balwani, were first indicted together on a dozen federal fraud charges stemming from their time heading up the failed blood testing startup, both have been convicted by juries.
  
  Holmes, the founder and former CEO of Theranos, wasfound guilty on four out of 11 federal fraud and conspiracy chargesin January after a months-long trial. Balwani, Theranos’ former president and COO who was also Holmes’ live-in boyfriend at the time, was found guilty on Thursday of ten counts of federal wire fraud and two counts of conspiracy to commit wire fraud.
  
  Their trials marked the final chapter for Theranos, a startup once valued at $9 billion and lauded for its promise to upend the healthcare industry. Theranos claimed its technology could accurately and efficiently test for conditions like cancer and diabetes with just a few drops of blood. With that promise, it attracted $945 million in financing, a board of well-known political figures and prominent retail partners.
  
  Then came a Wall Street Journal investigation into the company, which called into question the company’s testing methods and the capabilities of its technology. In 2018, Holmes and Balwani were each charged with a dozen counts of wire fraud and conspiracy to commit wire fraud. Both pleaded not guilty.
  
  Their trials were separated after Holmes indicated she would pursue a defense that included alleging she was the victim of a decade-long abusive relationship with Balwani that impacted every part of her life. (Balwani’s legal team has strongly denied the allegations in court filings.)
  
  Here are the highlights of the rise and fall of Theranos.
  
  Holmes, a Stanford University sophomore studying chemical engineering,drops outof school to pursue her startup, Theranos, which she founded in 2003 at age 19. The name is a combination of the words “therapy” and “diagnosis.”
  
  Balwani guarantees a $10 million loan to Theranos and soon after takes on a formal role at the startup. Balwani, roughly 20 years older than Holmes, first met her in 2002 through a program in Beijing to learn Mandarin. Balwani had enjoyed a successful career in the software industry, and following the sale of his e-commerce startup, was pursuing an MBA.
  
  The two kept in touch and began living together in 2005, Holmes testified during her criminal trial. Their personal relationship was largely concealed from employees, investors and business partners. Balwani would ultimately become the company’s chief operating officer and president of the startup.
  
  A decade after first starting the company, Holmestakes the lid offTheranos and courts media attention the same month that Theranos and Walgreens announce they’ve struck up a long-term partnership. The first Theranos Wellness Center location opens in a Walgreens in Palo Alto where consumers can access Theranos’ blood test.
  
  Theoriginal planhad been to make Theranos’ testing available at Walgreens locations nationwide.
  
  Holmes isnamedto the magazine’s American billionaire list with the outlet reporting she owns a 50% stake in the startup, pinning her personal wealth at $4.5 billion.
  
  Theranos has raised more than $400 million, according to a profile of the company and Holmesby The New Yorker.It counts Oracle’s Larry Ellison among its investors.
  
  The FDA clears Theranos to use of itsproprietary tiny blood-collection vialsto finger stick blood test for herpes simplex 1 virus – its first and only approval for a diagnostic test.
  
  TheWall Street Journalreports Theranos is using its proprietary technique on only a small number of the 240 tests it performs, and that the vast majority of its tests are done with traditional vials of blood drawn from the arm, not the “few drops” taken by a finger prick. In response, Theranos defends its testing practices, calling the Journal’s reporting “factually and scientifically erroneous.”
  
  A day later, Theranos halts the use of itsblood-collection vialsfor all but the herpes test due to pressures from the FDA. (Later that month, the FDA released two heavily redacted reports citing 14 concerns, includingcallingthe company’s proprietary vial an “uncleared medical device.”)
  
  One week after the Journal report, Holmes isinterviewedon-stage at the outlet’s conference in Laguna Beach. “We know what we’re doing and we’re very proud of it,” she says.
  
  Amid the criticism, Theranos reportedly shakes up itsboard of directors, eliminating Henry Kissinger and George Shultz as directors while moving them to a new board of counselors; the company also forms a separate medical board.
  
  Safeway, which invested $350 million into building out clinics in hundreds of its supermarkets to eventually offer Theranos blood tests,reportedly looksto dissolve its relationship with the company before it ever offered its services.
  
  Centers for Medicare and Medicaid Services (CMS) sends Theranosa lettersaying its California lab has failed to comply with federal standards and that patients are in “immediate jeopardy.” It gives the company 10 days to address the issues.
  
  In response, Walgreens says it willnot sendany lab tests to Theranos’ California lab for analysis and suspends Theranos services at its Palo Alto Walgreens location.
  
  CMSthreatens to banHolmes and Balwani from the laboratory business for two years after the company allegedly failed to fix problems at its California lab. Theranos says that’s a“worst case scenario.”
  
  Balwani departs. The company alsoadds three new board membersas part of the restructuring: Fabrizio Bonanni, a former executive vice president of biotech firm Amgen, former CDC director William Foege, and former Wells Fargo CEO Richard Kovacevich.
  
  Theranos voids two years of blood test results from its proprietary testing devices, correcting tens of thousands of blood-test reports,the Journal reports.
  
  Forbes revises its estimate of Holmes’net worth from $4.5 billion to $0. The magazine also lowers its valuation for the company from $9 billion to $800 million.
  
  Walgreens, once Theranos’ largest retail partner, ends its partnership with the company and says itwill closeall 40 Theranos Wellness Centers.
  
  CMSrevokesTheranos’ license to operate its California lab and bans Holmes from running a blood-testing lab for two years.
  
  Holmes tries tomovepast recent setbacks by unveiling a mini testing laboratory, called miniLab, at a conference for the American Association for Clinical Chemistry. In selling the device, versus operating its own clinics, Theranos seeks to effectively side-step CMS sanctions, which don’t prohibit research and development.
  
  Theranos investor Partner Fund Managementsues the company for $96.1 million, the amount it sunk into the company in February 2014, plus damages. It accuses the company of securities fraud. Theranos and Partner Fund Management settled in May, 2017, for an undisclosed amount.
  
  The company also lays off340 employeesas it closes clinical labs and wellness centers as it attempts to pivot and focus on the miniLab.
  
  Walgreens sues the blood testing startup for breach of contract. Walgreens sought to recover the $140 million it poured into the company. The lawsuitwas settledAugust, 2017.
  
  Theranosdownsizesits workforce yet again following the increased scrutiny into its operations, laying off approximately 155 employees or about 41% of staffers.
  
  The Wall Street Journalreportsthat Theranos failed a second regulatory lab inspection in September, and that the company was closing its last blood testing location as a result.
  
  Theranossettleswith the CMS, agreeing to pay $30,000 and to not to own or operate any clinical labs for two years.
  
  Theranos alsosettleswith the Arizona Attorney General Mark Brnovich over allegations that its advertisements misrepresented the method, accuracy, and reliability of its blood testing and that the company was out of compliance with federal regulations governing clinical lab testing. Theranos agrees to pay $4.65 million back to its Arizona customers as part of a settlement deal.
  
  The SEC charges Holmes and Balwani with a “massive fraud” involvingmore than $700 millionfrom investors through an “elaborate, years-long fraud in which they exaggerated or made false statements about the company’s technology, business, and financial performance.”
  
  The SEC alleges Holmes and Balwani knew that Theranos’ proprietary analyzer could perform only 12 of the 200 tests it published on its patient testing menu.
  
  Theranos and Holmes agree to resolve the claims against them, and Holmes gives up control of the company and much of her stake in it. Balwani, however, is fighting the charges, with his attorney saying he “accurately represented Theranos to investors to the best of his ability.”
  
  Reporter John Carreyrou, who first broke open the story of Theranos for the Wall Street Journal, publishes “Bad Blood,” a definitive look at what happened inside the disgraced company. Director Adam McKay (who directed “The Big Short”) secures the rights tomakethe film, starring Jennifer Lawrence as Holmes, by the same name.
  
  Holmes and Balwani areindicted on federalwire fraud charges over allegedly engaging in a multi-million dollar scheme to defraud investors, as well as a scheme to defraud doctors and patients. Both have pleaded not guilty.
  
  Minutes before the charges were made public, Theranos announced that Holmes has stepped down as CEO. The company’s general counsel, David Taylor, takes over as CEO. Holmes remains chair of the company’s board.
  
  Taylor emails shareholders that Theranos will dissolve, according to a report fromThe Wall Street Journal.Taylor said more than 80 potential buyers were not interested in a sale. “We are now out of time,” Taylorwrote.
  
  Alex Gibney, the prolific documentary filmmaker behind “Dirty Money,” “Enron: The Smartest Guys in the Room,” and “The Armstrong Lie,” debuts“The Inventor”on HBO, following the rise and fall of Theranos.
  
  A new court document reveals Holmes may seek a “mental disease” defense in her criminal fraud trial. Later, in August 2021, unsealed court documentsreveal Holmesis likely to claim she was the victim of a decade-long abusive relationship with Balwani. (Balwani’s legal team strongly denied the claims in court filings.) The allegations led to the severing of their trials. His trial is slated to begin in 2022.
  
  Initiallyset to beginin July 2020, Holmes’ criminal trialis further delayed til July 2021due to the coronavirus pandemic.
  
  News surfaces that Holmes’ isexpectingher first child, once more further delaying her criminal trial. Holmes’ counsel advised the US government that Holmes is due in July 2021, a court document revealed. She gavebirth in July.
  
  More than 80 potential jurors arebrought intoa San Jose courtroom for questioning over the course of two days to determine if they are fit to serve as impartial, fair jurors for the criminal trial of Holmes.  A jury of seven men and five women is selected, with five alternatives.
  
  Holmes is found guilty of one count of conspiracy to defraud investors as well as three wire fraud counts tied to specific investors. She is found not guilty on three additional charges concerning defrauding patients and one charge of conspiracy to defraud patients. The jury returns no verdict on three of the charges concerning defrauding investors. Holmes faces up to 20 years in prison as well as a fine of $250,000 plus restitution for each count.
  
  Holmes’s sentencing date is set forlate Septemberto allow for the completion of Balwani’s trial. In the meantime, Holmes remains free on a $500,000 bond secured by property.
  
  “The Dropout,” a scripted miniseries about Theranos produced by ABC, debuts on Hulu. Amanda Seyfried stars as Holmes and Naveen Andrews plays Balwani. Their romantic and professional relationship features prominently in the show.
  
  Following delays due to Holmes’ prolonged trial then a surge of Covid-19, jury selection for Balwani’s trial gets underway. On March 22, opening arguments are held and the government’s first witness, a former Theranos employee turned whistleblower, is called to the stand.
  
  After four full days of deliberations, a jury finds Balwani guilty of ten counts of federal wire fraud and two counts of conspiracy to commit wire fraud. Like Holmes, Balwani faces up to 20 years in prison as well as a fine of $250,000 plus restitution for each count of wire fraud and each conspiracy count.
