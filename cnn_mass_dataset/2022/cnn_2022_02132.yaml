title: "A new ‘Obi-Wan Kenobi’ trailer teases appearances from Darth Vader and young Luke Skywalker"
date: "2022-05-04"
section: "Entertainment"
url: "https://www.cnn.com/2022/05/04/entertainment/obi-wan-kenobi-trailer-may-fourth-cec/index.html"
content: |
  “Obi-Wan Kenobi”is back – but, based on thenew trailer for the Disney+ series, the droll Jedi master no longer has the high ground.
  
  Released on – when else? – May the Fourth, the trailer teases appearances from a young Luke Skywalker, lightsaber-wielding villains and, of course, a certain Sith known for his belabored breathing.
  
  Billed as a “six-part event,” thelimited seriesfollows Ewan McGregor’s legendary Jedi after his apprentice Anakin Skywalker has gone full dark side in “Episode III: Revenge of the Sith.”
  
  Years after Emperor Palpatine rose to power and “Order 66’d” most Jedi, Obi-Wan still can’t catch a break: He’s evading evil Inquisitors intent on hunting him down as one of the galaxy’s last living Jedi and keeping careful tabs on a young Luke Skywalker, living simply on his Uncle Owen’s moisture farm on Tatooine.
  
  They're coming.#ObiWanKenobi, a limited series, starts streaming May 27 on@DisneyPlus.pic.twitter.com/NOX2nj015X
  
  The trailer ends with the instantly recognizable breaths of one Darth Vader, who, in the“Star Wars” timeline, only recently became a Sith. Will the former master and apprentice face off? It’s likely – Hayden Christensen isreprising his roleas a badly burnt Anakin/Vader in the series.
  
  Also starring are Joel Edgerton, Kumail Nanjiani, Moses Ingram and Rupert Friend, among many others. Who will end up voicing a comical droid? How will Ingram and Friend’s villains stack up against Vader? And who will get to say,“I have a bad feeling about this?”
  
  These and more questions will be answered, hopefully, when “Obi-Wan Kenobi” premieres on May 27 on Disney+.
