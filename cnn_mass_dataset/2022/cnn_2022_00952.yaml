title: "More human remains found at Lake Mead as reservoir’s water level plunges"
date: "2022-05-09"
section: "US"
url: "https://www.cnn.com/2022/05/09/us/lake-mead-human-remains-drought-climate/index.html"
content: |
  More human remains were found atLake Meadover the weekend, less than a week after abody in a barrel was discoveredat the reservoir.
  
  National Park Service rangers responded to a call on Saturday afternoon that reported the remains in Callville Bay. The Clark County Medical Examiner is assisting with determining the cause of death, according to NPS, which said there is “no further information is available at this time.”
  
  It was the second set of human remains found at Lake Mead, the country’s largest reservoir, aswater levels plunge. The first body, discovered on May 1, was likely a murder victim who died from a gunshot wound “some time in the mid ’70s to early ‘80s, based on clothing and footwear the victim was found with,” according to a new release from the Las Vegas Metropolitan Police.
  
  “The lake has drained dramatically over the last 15 years,” Las Vegas Metropolitan Police Homicide Lieutenant Ray Spencer said at the time, noting “it’s likely that we will find additional bodies that have been dumped in Lake Mead” as the water level drops more.
  
  Around 40 million people in the West rely on water from the Colorado River and its two largest reservoirs — Lake Mead and Lake Powell — where levels have fallen at an alarming rate over the past few years, amid aclimate change-fueled megadrought.
  
  As of Monday,Lake Mead’s water levelwas around 1,052 feet above sea level — roughly 162 feet below its 2000 level, when it was last considered full. It’s the lowest level on record for the reservoir since it was filled in the 1930s.
  
  The lake’s low water levelexposed one of the reservoir’s original water intake valvesin April for the first time. The valve had been in service since 1971, but it can no longer draw water, according to the Southern Nevada Water Authority. That agency is responsible for managing water resources for 2.2 million people in southern Nevada, including Las Vegas.
  
  Upstream at Lake Powell, federal officials announced unprecedented, emergency steps last week to keep more water in that reservoir — and preserve the Glen Canyon Dam’s ability to generate hydropower — rather than sending it downstream to Lake Mead.
  
  “We have never taken this step before, but the potential risk on the horizon demands prompt action,” Assistant Secretary of Water and Science Tanya Trujillo told reporters last week. “We need to work together to stabilize the reservoir before we face a larger crisis.”
