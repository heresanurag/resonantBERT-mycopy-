  “This was a failure for one individual police officer. It had nothing to do with our policies. Policies did not allow that, our training did not teach that.”
  
  – San Antonio Police Chief William McManus, sharing a statement Tuesday on thepolice shootingof an unarmed 17-year-old who was eating in his car at a McDonald’s parking lot. The shooting, which left the teenager in critical condition, happened on October 2. The police officer involved had seven months of experience at the time and now faces aggravated assault charges, the police chief said.
  
