  Take a look at thenew chubby champion here. He’s one of the biggest brown bears on Earth, possibly weighing as much as 1,400 pounds!
  
  Blink-182 is reuniting for new music and tour
  
  If you’ve been waiting for an opportunity to rock out in punky half-finger gloves, this is for you. Band members Travis Barker and Mark Hoppus areset to reunitewith original member Tom DeLonge for the first time since 2015.
  
  Giant Cheeto attracts a crowd
  
  A giant Cheeto sculpture with massive fingerscoated in orange dusthas become a roadside attraction – and yes, devoted Cheeto fans are traveling great distances to see it.
  
  Blake Shelton announces exit from ‘The Voice’ as new coaches join
  
  The popular show’s longest-tenured coach is bidding farewell. Buta few recognizable starshave been added to the lineup.
  
  Angela Lansbury, the beloved star of “Murder, She Wrote,” has died, according to a statement from her family provided to NBC, whose parent company produced the long-running series.She was 96. In addition to receiving 11 Emmy nominations for her role as Jessica Fletcher in “Murder, She Wrote,” the actress accepted an honorary Oscar in 2013 to go with the five Tony Awards she collected over a 40-plus-year span.
  
