title: "5 things to know for October 12: Biden, Iran, Supreme Court, NASA, Economy"
date: "2022-10-12"
section: "US"
url: "https://www.cnn.com/2022/10/12/us/five-things-october-12-trnd/index.html"
content: |
  At this time of year, it’s easy to get transfixed by the beauty of nature. Next season’s flowers are blooming, leaves are turning different hues of yellow, and cooler weather is reminding us that the holidays are almost here. Nature is full of unexpected beauty, too – and sometimes photographers are lucky to capture its grandeur at the most unpredictable times. If you enjoy being wowed by our natural world,take a look at the winning imagesfrom this year’s Wildlife Photographer of the Year competition.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  (You can get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  In an exclusive CNN interview Tuesday, President Joe Biden provided new insight on how he is dealing with Russian President Vladimir Putin, the investigation into his son Hunter, and whether he plans to run for reelection in 2024. In regard to Russia’s ongoing war in Ukraine, Biden said he believesPutin is a “rational actor”who nonetheless badly misjudged his ability to invade the country. He also said he doesn’t believe Putin would risk using a nuclear weapon. Separately, Biden addressed possiblecriminal charges against his son Hunterfor allegedly lying on a gun-purchase application, but said he was proud of him for confronting his struggles with drug addiction. Biden was also asked what he’d say to voters whoconsider his age a concernahead of a potential 2024 bid for reelection, as his 80th birthday approaches next month. His response was, “Look what I’ve gotten done. Name me a president in recent history that’s gotten as much done as I have.”
  
  Amid ongoingnationwide protestsagainst a regime accused of corruption, the UK this week dealt a raft of sanctions against senior Iranian officials and the country’s morality police following the death last month ofMahsa Aminiwhile in morality police custody. Citing “human rights abuses,” the UK announced all sanctioned individuals will have their assets held in the UK and will also be banned from traveling to the UK. Iran’s Foreign Ministry strongly condemned the sanctions, calling them “arbitrary and baseless,” according to state media. UK Foreign Secretary James Cleverley stressed these sanctions “send a clear message to the Iranian authorities” that the UK “will hold you to account for your repression of women and girls and for the shocking violence you have inflicted on your own people.”
  
  The Justice Department isurging the Supreme Courtto reject former President Donald Trump’s request that it intervene in the dispute over classified documents seized from his Mar-a-Lago residence. Trump’s lawyers want thespecial masterto review the more than 100 documents marked classified – which, if allowed, could open the door to Trump’s team reviewing “extraordinarily sensitive” material, the Justice Department said. The court could act on the matter within days. Separately, the high court declined on Tuesday to hear a case over whether fetuses should have constitutional rights. Theissue of fetal personhoodraises complicated questions that could impact issues such as in vitro fertilization and child support going forward.
  
  NASA’s recent DART mission successfully changed the trajectory of the asteroid Dimorphos when its spacecraft intentionally slammed into the space rock last month, according to the agency. TheDouble Asteroid Redirection Test, a full-scale demonstration of deflection technology, was the world’s first mission to see if this kind of impact can help deflect objects posing a threat to Earth in the future. The agency said the spacecraftchanged the asteroid’s orbitby 32 minutes, marking the first time humanity intentionally changed the motion of a celestial object. “This mission shows that NASA is trying to be ready for whatever the universe throws at us,” NASA Administrator Bill Nelson said. “NASA has proven we are serious as a defender of the planet.”
  
  The International Monetary Fund has once again downgraded its forecast for the global economy with a sharp warning: “The worst is yet to come, and for many people 2023 will feel like a recession.” The agency said Tuesday that it expects global growth to slump to 2.7% next year. That compares with projected growth of 3.2% this year. Theprospects for the global economyas outlined by the IMF are the third weakest since 2001, behind only the 2008 financial crisis and the worst phase of the coronavirus pandemic. According to anew CNN poll, just 22% of Americans rate economic conditions in the country as good, with 78% calling conditions somewhat poor or very poor. President Biden told CNN on Tuesday that the prospect of a“slight recession” is possiblebut that he doesn’t anticipate it – even as experts are sounding the alarm about the future of the American and global economies.
  
  Biden to designate WWII-era training ground as a national monument
  
  President Biden will travel to Colorado today where he is expected to designate Camp Hale, a World War II training ground high in the Rocky Mountains,as a national monument. The site was where the US Army’s 10th Mountain Division trained and developed warfare techniques in the harsh, wintery conditions before heading to the Italian Alps to fight.
  
  Dwayne ‘The Rock’ Johnson leaves the door open to a presidential run
  
  The actor and pro wrestling legend has “seriously considered”running for officeafter being “blown away” by calls for him to launch a White House bid.
  
