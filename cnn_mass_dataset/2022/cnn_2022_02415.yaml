title: "Sony takes a big hit in the console wars"
date: "2022-01-19"
section: "Tech"
url: "https://www.cnn.com/2022/01/19/tech/sony-shares-microsoft-activision-blizzard-deal-hnk-intl/index.html"
content: |
  Microsoft’s blockbuster purchase of video game developer Activision Blizzard could pose a serious threat for Sony.
  
  Shares of the maker of the PlayStation console, a major rival to Microsoft(MSFT)’s Xbox, plummeted nearly 13% in Tokyo on Wednesday after Microsoft(MSFT)announced the nearly $70 billion deal. That was the worst plunge inSony(SNE)’s stock price since 2008, according to data provider Refinitiv.
  
  Microsoft and Sony have competed for decades with iterations of their Xbox and PlayStation consoles, often wooing video gamers with exclusive titles and features.
  
  Microsoft already owns successful franchises like “Halo,” but the Activision Blizzard deal would add popular series including “Call of Duty” and “World of Warcraft” to its library — as well as the nearly 400 million monthly active players that come with them.
  
  The transaction would see Microsoft become the world’s third-largest gaming company by revenue, behind Tencent(TCEHY)and Sony, the company said in astatement.
  
  Microsoft to acquire Activision Blizzard in $68.7 billion deal
  
  The “console wars are heating up,” wrote Amir Anvarzadeh, a market strategist at Asymmetric Advisors, in a research note. “Sony will have a monumental challenge on its hand to stand its own in this war of attrition.”
  
  Nearly30% of Sony’s revenuecomes from games and network services, according to the company’s most recent earnings report. Investors may be concerned that Sony will lose out to Microsoft on gaming content, especially if some of Activision’s titles become exclusive to Microsoft systems, according toMorningstar Research analyst Kazunori Ito.
  
  “Acquiring exclusive gaming content is key,” he told CNN Business on Wednesday, noting that the gaming industry is in a state of “transition” as businesses adopt subscription models.
  
  Microsoft already had its eyes on building out its content library, especially during thecoronavirus pandemic, when more people were staying at home and gaming became an even more attractive entertainment option. In September 2020, Microsoft bought ZeniMax, the parent company ofBethesda Softworks, whose studios have produced critically acclaimed franchises including “Elder Scrolls,” “Fallout” and “Doom.”
  
  While the latest PlayStation 5 is consideredmore popularthan the Xbox Series X, Sony has lagged behind in launching a true competitor to Microsoft’sGame Passcloud subscription service, which allows people to play a selection of games for a monthly fee. Microsoft on Tuesday said it has over 25 million Game Pass subscribers, and “will offer as many Activision Blizzard games as we can” on the Xbox and PC versions of the service.
  
  Analyst at Macquarie said that “Sony itself recognizes the long-term limits of a console-centric games business,” but pivoting to a new strategy may require significant investments from the Japanese firm.
  
  “We had considered their overall games/entertainment strategy to be conservative,” the analysts wrote in a note on Wednesday, adding that it may have been diluted by the company’s “parallel commitments to other businesses and acquisitions,” including image sensors andelectric cars.
  
  “It will be interesting to see if Sony counters Microsoft’s aggressive push with a move of its own, but the price tags may be too high,” the Macquarie analysts added.
  
  Investors are already betting on which company might be the next to get scooped up. Wall Streetseems to thinksthat Electronic Arts, which makes the super popular Madden NFL franchise of football video games, could be the most likely target.
