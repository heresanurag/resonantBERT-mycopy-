title: "Weekly jobless claims fall again, underscoring tight job market"
date: "2022-09-08"
section: "Economy"
url: "https://www.cnn.com/2022/09/08/economy/us-jobless-claims/index.html"
content: |
  Despite fears of a recession, the labor market is showing no signs of weakening. The number of first-time claims for unemployment benefits fell by 6,000 to 222,000 for the week ended September 3, according to Department of Labor data released Thursday.
  
  The initial weekly claims figure, which is at its lowest level in just over three months, is belowthe previous week’sdownwardlyrevised level of 228,000 and lower than economists’ expectations of 240,000, according to Refinitiv estimates.
  
