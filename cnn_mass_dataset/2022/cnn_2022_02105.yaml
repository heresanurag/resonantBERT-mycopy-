  If you’re planning on hitting the streets this Halloween weekend, check your local forecast to make sure the weather won’t spook your plans. While most of the country should be pretty fright-free, there will be somepockets of slightly scary skiesin the Pacific Northwest and the Deep South.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  (You can get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  The US military will test launch a rocket today with experiments for hypersonic weapons development. This comes after the militarycompleted a successful test launch Wednesdayto collect information on components of hypersonic missiles, including heat-resistant materials and high-end electronics. The Pentagon has made the development of hypersonic weapons one of its top priorities after China conducted successfulhypersonic launches last yearand Russia has begun using hypersonic missiles in itswar on Ukraine. Hypersonic weapons travel at speeds greater than Mach 5, or approximately 4,000 miles per hour, making them difficult to detect and intercept in time. The missiles can also maneuver and vary altitude, allowing them to evade missile defense systems. Separately, Biden administration officials on Wednesday said that Russian President Vladimir Putin has been warned of the “potential for dire consequences” if Moscow uses a nuclear weapon to attack Ukraine.
  
  Former President Donald Trump hasannounced a Florida rallythat will prominently feature Sen. Marco Rubio – but will notably exclude Gov. Ron DeSantis, even though he is currently running for reelection in the state. The rally comes as the relationship between Trump and DeSantis, once allies, has grown distant ahead of a possible presidential showdown in 2024. Trump is also annoyed that DeSantis hasnot said he wouldn’t run in 2024if the former President entered the race, one source said. Meanwhile, Trump has been accelerating his plans foranother presidential bidwith recent campaign stops in Nevada, Ohio, Arizona and Michigan. He is also spending the rest of 2022 preparing his political operation – including assembling his campaign leadership, hatching plans for his remaining midterm rallies, and searching for a venue from which to launch his perceived political comeback.
  
  The US has imposed a slew of new sanctions against Iranian officials involved in the ongoing crackdown on nationwide protests in Iran. The Biden administration’spunitive measures on Irancome as the US and Europe work to counter Iran and Russia’s growing cooperation on the war in Ukraine. Russian forces have in recent weeks pummeled Ukrainian cities withIranian drones. State Department principal deputy spokesperson Vedant Patel said last week that the “deepening” of relations between Russia and Iran should be seen as “a profound threat.” Separately, CNN has obtainedexclusive visual evidencesurrounding the death of Iranian teenagerNika Shahkarami, a 16-year-old protester who was found dead in Tehran last month. The Iranian government has said she died after falling from a building’s roof, but videos and testimony are raising fresh questions about officials’ claims.
  
  A diver has foundmore human remainsin Lake Mead, marking at least the sixth such discovery this year. The National Park Service confirmed the “finding of human skeletal remains” after the diver discovered what appeared to be a human bone on October 17. This latest finding comes as the water level of the massive lake continues to drop due to a prolonged drought. Declining water levels at the lake have also uncovered relics includingsunken boats, aWorld War II-era landing craftandancient volcanic rock. Lake Mead, which straddles the Nevada-Arizona border, is the nation’s largest reservoir and serves about 25 million people in Arizona, Nevada, California and New Mexico.
  
  Ford and Volkswagen, two of the world’s largest automakers, are shutting down their joint effort to develop self-driving cars. Ford said Wednesday that it had concluded that the large-scale profitable commercialization of self-driving cars wasfurther out than expected, and therefore would take a $2.7 billion hit to walk away from the startup Argo AI. The company said it is still “optimistic” about a future for fully self-driving cars, but added that “profitable, fully autonomous vehicles at scale are a long way off.” Instead of having Argo develop self-driving car technology for cars without steering wheels, brakes or accelerator pedals, Ford said it will instead focus onsimpler driver-assist technologiesthat have proven easier to develop and bring to market.
  
