  – Athletic shoe company Skechers, issuing a statement after embattled musician Kanye West wasescorted from one of its Los Angeles buildingson Wednesday. The company said West, who has legally changed his name to Ye, “arrived unannounced and without invitation.” The statement said he was engaged in “unauthorized filming” and he was escorted out “after a brief conversation.” West’s visit to Skechers comes a day after Adidas ended its partnership with the musician due to hisrecent antisemitic comments.
  
