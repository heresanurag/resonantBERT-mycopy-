title: "Stocks surge even though consumers feel lousy. Here’s why"
date: "2022-06-24"
section: "Investing"
url: "https://www.cnn.com/2022/06/24/investing/dow-stock-market-today"
content: |
  It was a bad news is good news day on Wall Street again.Stockssoared and finished the week with solid gains after a key economic report showed a record low inconsumer confidence levels.
  
  Investors cheered the drop in the University of Michigan’s consumer sentiment reading in June. Why? Growing recession fears may mean that the Federal Reserve, which has begun toaggressively hike interest ratesto fight inflation, could reverse course by the end of 2023 andcut ratesagain in order to deal with a slowing economy.
  
  TheDowsurged 823 points, or 2.7%, Friday and gained more than 5% for the holiday-shortened trading week. The US market was closed Monday in observance of Juneteenth.
  
  Another recession warning: Falling copper prices
  
  TheS&P 500andNasdaqboth rallied by more than 3%. The S&P 500 rose 6% in the past four days while the Nasdaq shot up nearly 7%. All three indexes snapped three-week losing streaks, but they each remain down sharply for the month of June.
  
  “It has been very volatile. We have jittery markets. We just had a historically large hike from the Fed,” said Jake Jolly, senior investment strategist at BNY Mellon Investment Management. “Growth is slowing. We know that is happening but at the same time we have aggressive tightening.”
  
  Jolly added that his team now thinks there is a higher chance of a recession than a so-called economic soft landing because of weaker economic data.
  
  But it wasn’t all bad news Friday. Investors may also have been cheering a surprisingly strong housing report.
  
  New home sales were up nearly 11% in May, much better than expected and defying some of the doom and gloom concerns about the real estate market due to worries thatrising mortgage ratesandhigher pricesare making buying a home a pipe dream for many Americans.
  
  Earnings were giving stocks a lift too, as two consumer companies reported strong results. Shares of cruise line Carnival(CCL)and CarMax(KMX)both soared after each reported improving sales.
  
  FedEx shows how to boost a stock in two simple steps
  
  The results from Carnival helped spark a broader rally in leisure stocks, with competitors Royal Caribbean(RCL)and Norwegian(NCLH)both surging. Casino stocks and airlines also rose sharply.
  
  FedEx(FDX)also rallied sharply after the shipping giant gave a bullish outlook for the rest of the year.
  
  And big bank stocks were winners, thanks to the results of the Fed’s so-called stress tests late Thursday. The Fed gave a clean bill of health to the nation’s top financial institutions, paving the way for many large banks to buy back more stock and raise dividends.
  
  Shares of Goldman Sachs(GS)were up almost 6%, making it one of the top stocks in the Dow. JPMorgan Chase(JPM)gained 3%.
