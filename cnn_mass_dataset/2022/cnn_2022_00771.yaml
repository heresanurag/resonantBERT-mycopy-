  Russian troops areamassing forces in eastern Ukraineas Western and Ukrainian officials warn a major assault on the region is imminent. Ukrainian President Volodymyr Zelensky said his country is“ready” for an offensive, but urged civilians to evacuate the region. Many people, however, are getting trapped in areas of fighting where access to some towns is being blocked by Russian forces. This comes as nine evacuation corridors were agreed on Sunday, following a deadly Russian missile strike last week thathit a train stationpacked with evacuees. Meanwhile in Russia, President Vladimir Putin is maintaining his heavy-handed approach and recentlyappointed a new generalto direct the war in Ukraine after his troops failed to take the city of Kyiv, according to US and European officials.
  
  In addition to vaccines, boosters, handwashing and masks, some of the most powerful tools against Covid-19 areventilation and filtration, experts say. Filtration – just like it sounds – is filtering or cleaning the air by removing the infected particles. But think of ventilation as “diluting” the air – or bringing in more fresh air in to reduce the concentration of those particles. Opening doors or windows at opposite ends of your home will create cross-ventilation, the Environmental Protection Agency advises. Opening the highest and lowest windows, especially if on different floors of a home, can also increase ventilation. Separately, several members of President Biden’s cabinet and various lawmakers are among at least 67 people known to have contracted Covid-19 after attending theGridiron Club dinnerin Washington, DC.New York City Mayor Eric Adamstested positive for Covid-19 yesterday after attending the dinner, but it is unclear exactly where he contracted the virus.
  
  Emmanuel Macron and Marine Le Pen are projected to advance to thesecond round of the French presidential election, an analysis of early results showed, setting up a rematch of the 2017 contest. Macron, France’s current president, is in first place with 28.6% following a preliminary count of the votes from the first round of the election yesterday. Le Pen, a long-time standard-bearer for the French far-right, is on track to come in second with 23.6%. Twelve candidates ran for the top job. Since none of them received more than 50% of the ballots in the first round, the top two candidates will face each other in a runoff on April 24. Macron is seeking to become the first French president to win reelection since Jacques Chirac in 2002, but Le Pen’s support hassteadily risen in recent weeks.
  
  Gun violence plagued the US again this weekend following several deadly shootings that took place across the country. Four people, including two teens, wereshot shortly after an MLB gamein Washington, DC, on Saturday night, police said. In Illinois, six people were found injured after ashooting occurred in a residential neighborhood. Police are also investigating a shooting at a birthday party in Indianapolis where six people were shot and one person was killed. Two people were also killed and 10 hospitalized after a“targeted attack” at a Cedar Rapids nightclub, police say. This comes as President Biden is expected to announcea new firearm regulationas soon as today meant to contain the use of privately made weapons known as “ghost guns” that are unregulated and untraceable.
  
  Scottie Scheffler won the2022 Masters golf tournamentyesterday following a dominant performance at Augusta National. This is his first major title after finishing ahead of Northern Irishman Rory McIlroy. Over the four days at the sprawling golf club in Augusta, Georgia, the 25-year-old produced some excellent golf, refusing to falter under the pressure of being the tournament’s leader for nearly three days.Tiger Woods also notably made a comebackat the Masters. Although it didn’t end with a big win, many say Woods displayed incredible grit and determination. His injuries and lack of match fitness seemed to catch up with him though after he carded a six-over par 78 on Saturday, his worst score in a Masters round, and finished with the same score yesterday.
  
