  White House officials are gettinganxious about a massive migrant surgethat will likely occur at the US-Mexico border next month. On May 23, the Biden administration is set to lift a Trump-era border policy that cited pandemic concerns to justify denying people entry to US. President Joe Biden and the CDC have determined the restriction is no longer necessary – but once it’s repealed, up to 60,000 people could seek entry within hours, a federal law enforcement official said.
  
  Here’s what you need to know toGet Up to Speed and On with Your Day.
  
