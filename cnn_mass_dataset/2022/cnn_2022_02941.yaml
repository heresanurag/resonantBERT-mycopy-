title: "Florida lawmaker charged with Covid relief fraud"
date: "2022-12-07"
section: "Politics"
url: "https://www.cnn.com/2022/12/07/politics/joseph-harding-covid-loan-fraud/index.html"
content: |
  Federal prosecutors announced charges Wednesday against a Florida state representative who allegedly swindled thousands of dollars incoronavirusrelief loans from the Small Business Administration.
  
  State Rep. Joseph Harding obtained more than $150,000 in SBA loans by lying on his loan applications, according to a news release from the Justice Department. Prosecutors allege Harding listed dormant business entities on his applications, fabricated the numbers of people he employed and submitted fake bank statements.
  
  Harding, 35, is set to go to trial for charges of wire fraud, money laundering, and making false statements, DOJ said in the release. A wire fraud conviction carries a maximum sentence of 20 years in prison, while money laundering and making false statements carry a maximum of 10 and five years, respectively.
  
  His trial is set for January 11 in Gainesville, Florida.
  
  Harding was elected to the Florida House of Representatives in 2020. He still holds the public office, according to his website.
  
  In a statement to theThe New York Times, he said he had pleaded not guilty during an initial court appearance Wednesday. “I want the public and my constituents to know that I fully repaid the loan and cooperated with investigators as requested,” Harding told the Times.
  
  The Florida Republican has drawn the national spotlight before, as a sponsor of thecontroversial legislation that banned certain instructionabout sexual orientation and gender identity in the classroom that opponents dubbed the “Don’t Say Gay” law. The legislation officially named the “Parental Rights in Education” law, signed by Florida Republican Gov. Ron DeSantis in March, set off a national firestorm and drew immediate pushback from LGBTQ advocates.
  
  Investigators have said thatbillions of dollars of Covid-19 relief fundshave been obtained using fabricated, stolen or fake information. The Justice Department’s Covid-19 Fraud Enforcement Task Force has brought several high-profile fraud cases across the country.
