  And there will be one more total lunar eclipse and a partial solar eclipse in 2022, according to theFarmer’s Almanac. The partial solar eclipse on October 25 will be visible to people in parts of Greenland, Iceland, most of Europe, northeast Africa, and western and central Asia.
  
