title: "Opinion: LinkedIn chief economist: Gen Z should be feeling great about the job market right now"
date: "2022-06-06"
section: "Perspectives"
url: "https://www.cnn.com/2022/06/06/perspectives/linkedin-gen-z-jobs-work/index.html"
content: |
  Editor’s Note:Karin Kimbrough is the chief economist at LinkedIn. The opinions expressed in this commentary are her own.
  
  Young workers who entered the US job market in the throes of the pandemic in 2020 faced an uphill battle.Hiringon LinkedIn dropped off dramatically, and widespread layoffs hitGen Zmore severely than most other groups.
  
  Fast forward two years, and the picture looks much brighter for Gen Z and younger millennials joining the workforce today. Despite recent headwinds like inflationary pressures and geopolitical tensions driving economic uncertainty, opportunities still abound for entry-level roles in the US.
  
  Here are some key findings from a recentLinkedInreport that looked at the top trends and industries for those just starting out.
  
  Workers with fewer than four years of full-time work — namely new grads and those just starting their careers — are experiencing a steady comeback after the 2020 drop-off. LinkedIn data shows overall hiring rates in 2021 recovered from pandemic lows, up 25% from 2020. And while Gen Zhiringrates still have room to catch up in the overall recovery, they also rebounded in 2021 — up 15% compared to 2020.
  
  Companies are signaling that they are ready and willing to hire more young talent, with employers planning to hire almost 30% more newgradsthan they did in 2021, according to a recent survey from the National Association of Colleges and Employers.
  
  While the big coastal cities like New York City and San Francisco continue to attract droves of new workers, a few smaller cities top the list for the fastest-growing cities for entry-level roles.
  
  LinkedIn data shows Austin, Chattanooga, Raleigh and Charlotte are now the fastest-growing markets forentry-level rolesin the US. There are a lot of upsides to working in these Sun Belt cities. Particularly, they’re more affordable to live in compared to bigger cities, which is especially top of mind given thatrent pricesare hitting new highs.
  
  At the industry level, staffing and recruiting, hospitality, and health care and biotech are the sectors that saw the biggest gains in openings for entry-level jobs.
  
