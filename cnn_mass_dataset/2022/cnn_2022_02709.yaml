  Hospitality — one of the hardest-hit sectors during the 2020 lockdowns — has made a roaring comeback, as increased travel and tourism has driven up the need for these businesses to ramp back up hiring activity to keep pace.
  
  And health care continues to prove a booming sector for jobs of all levels, with roles like vaccine specialists (some of which are entry-level) — which made up a tiny fraction of open roles pre-pandemic — becoming one of the fastest-growing jobs onLinkedInright now.
  
  Many young professionals — and especially new grads — are often thinking first and foremost about how to market their existing skills. And while that will always be a necessary tactic in landing a role, what’s becoming increasingly important is also being able to communicate a willingness to adapt and learn new skills along the way.
  
  Research from LinkedIn shows that, on average, theskill setsfor jobs have changed by roughly 25% since 2015. In other words, an entry-level data scientist today has to bring some different skills to the role relative to what the same data scientist brought five years ago. What can set young professionals apart in the job search is demonstrating an understanding of the evolving nature of the industry, and a willingness to keep learning on the job.
  
  Those who do this well will be better positioned to weather the storms of turbulent job markets, and stand out among crowded applicants pools.
