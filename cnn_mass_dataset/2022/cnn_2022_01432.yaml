title: "Bad Bunny announces summer stadium tour"
date: "2022-01-24"
section: "Entertainment"
url: "https://www.cnn.com/2022/01/24/entertainment/bad-bunny-tour/index.html"
content: |
  Weeks away from kicking off his sold-out arena tour, “El Último Tour Del Mundo,” Bad Bunny has already made plans for another marathon of concert dates, coming to stadiums across North America and Latin America.
  
  “Bad Bunny: World’s Hottest Tour” will begin August 5 in Orlando, FL, with the 29-date tour ending in December.
  
  DJ Alesso and Grammy nominee Diplo will join the Puerto Rican rapper and musician on tour for select dates.
  
  Instagram post not found.
  
