title: "Here are ways you can help the victims of the Bronx Fire"
date: "2022-01-10"
section: "US"
url: "https://www.cnn.com/2022/01/10/us/iyw-how-to-help-bronx-fire/index.html"
content: |
  On January 9, 2022, an electric space heater sparked a fire in a Bronx apartment building that killed 17 people, eight of them children. More than 60 people were injured. New York City’s fire commissioner said it is one of the worst fires in the city’s modern history.
  
  As the fire’s full toll unfolds, relief groups are helping those affected. Below are ways you can contribute to assist victims of the fire and the families involved:
  
  The Mayor’s Fund to Advance New York Cityhas set up an online fundraiser where money will go toward emergency relief supplies and support for the victims and their families.
  
  The Global Empowerment Missionhas also set up an online fundraiser to collect money for victims of the fire. GEM will be providing help to residents displaced by the fire as well distributing food, water and other essential items.
  
  The American Red Cross New York Regionis providing assistance as well as emergency housing for families affected by the fire. It will also be providing food, water and emotional support assistance from trained mental health volunteers.
