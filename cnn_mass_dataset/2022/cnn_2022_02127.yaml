title: "Agriculture Secretary Tom Vilsack tests positive for Covid-19"
date: "2022-04-09"
section: "Politics"
url: "https://www.cnn.com/2022/04/09/politics/tom-vilsack-positive-covid-agriculture-secretary/index.html"
content: |
  US Agriculture SecretaryTom Vilsack, who is fully vaccinated and boosted, said Saturday he has tested positive for Covid-19 and has “mild” symptoms.
  
  “I tested positive for COVID. I’m both vaccinated and boosted and thankfully my symptoms are mild,” he wroteon Twitter.
  
  Vilsack joinsother high-profile politiciansin Washington who have tested positive for the virus recently, including fellow Cabinet members Attorney General Merrick Garland and Commerce Secretary Gina Raimondo, as well as House SpeakerNancy Pelosi.
  
  Vilsack recently traveled to Mexico to discuss trade policies between the US and Mexico.
  
  He is not considered a close contact of President Joe Biden, per a White House official.
  
  Garland, Raimondo and Pelosi announced their positive tests after attending the elite Gridiron Club Dinner in Washington last Saturday. President Joe Biden did not attend the dinner.
  
  Dinner attendees had their vaccination status checked, but were not required to show proof of a negative Covid-19 test for entry.
  
  This story has been updated with additional details.
