title: "McDonald’s is selling Happy Meals to adults — with a twist"
date: "2022-09-27"
section: "Business"
url: "https://www.cnn.com/2022/09/27/business/mcdonalds-adults-happy-meal/index.html"
content: |
  The Hamburglar is back atMcDonald’s. But this time, it’s just for adults.
  
  McDonald’s is bringing back its family of recognizable figurines in a new adult Happy Meal, which, yes, includes the toys. Beginning October 3, customers can order a Cactus Plant Flea Market Box — a Big Mac or 10-piece chicken McNuggets, with fries and a drink. The meal is a collaboration between the streetwear brand and the fast food chain as itdigs deeper into nostalgia.
  
  The food will be served in a specially designed box that should trigger memories of Happy Meals from the old days. Toys include redesigned takes on McDonald’s famous mascots, including Grimace, Hamburglar and Birdie, plus a new one named Cactus Buddy.
  
  “We’re taking one of the most nostalgic McDonald’s experiences and literally repackaging it in a new way that’s hyper-relevant for our adult fans,” said Tariq Hassan, McDonald’s USA chief marketing and customer experience office in a release.
  
  Cactus Plant Flea Market is a streetwear brand that has been popularized by Kanye West and Pharrell in recent years.Complex has describedits aesthetic as a “fluid and eccentric combination” mixed with “playful graphic imagery.” And its elusive origins are a major appeal for the brand’s fans. Hoodies from the brand can sell as much as $1,000 on theonline marketplace StockX.
  
  McDonald’s(MCD)has found success with its celebrity collaborations, oftencrediting them for boosting sales. Past partnerships include BTS, J Balvin and Travis Scott, with the latter being so popular that itran out of meals.
