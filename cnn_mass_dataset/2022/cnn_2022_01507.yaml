title: "5 things to know for May 25: Texas shooting, Primaries, Ukraine, Formula, North Korea"
date: "2022-05-25"
section: "US"
url: "https://www.cnn.com/2022/05/25/us/five-things-may-25-trnd/index.html"
content: |
  The deadly mass shooting at a Texas elementary school yesterday left the nation grieving and in anguish – once again – about gun violence in the US. The tragedy marks at least the30th shooting at a K-12 school this year alone. But with gun legislation currently stalled in a divided Congress, lawmakers are facing renewed calls from the American people to come together and swiftly pass laws that keep children safe.
  
  Here’s what you need to know toGet Up to Speed and On with Your Day.
  
  (You can get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  Just two days before students at Robb Elementary School in Uvalde, Texas, were set to begin their summer break, an 18-year-old lone gunman rushed his way into the school andopened fire on classrooms of young children, killing 19 students and two adults, officials said. The gunman was killed by law enforcement and is also believed to have shot his grandmother before carrying out the attack, according to the Texas Department of Public Safety. In a national address last night,President Joe Biden called on the USto turn its collective pain into political action. Authorities are continuing to search forclues about the gunman’s motive. Yesterday’s tragic event marks the deadliest school shooting in nearly a decade since 20 children and six adults were killed atSandy Hook Elementary School in 2012.
  
  Voters made their way to the polls yesterday forprimaries in Georgia, Alabama, Arkansas and Texas– amid news of the deadly school shooting. Georgia’s Republican Gov. Brian Kemp defeated former Sen. David Perdue, who was backed by former President Donald Trump. Kemp will face Democratic nominee Stacey Abrams in a rematch in November. In Alabama,Rep. Mo Brooks– the Senate candidate who Trump backed away from – is advancing to a runoff. He will face Katie Britt in a June for the Republican Senate primary, CNN projects. And in Texas, a loss for the Bush family political dynasty.George P. Bush– the son of former Florida Gov. Jeb Bush, nephew of former President George W. Bush and grandson of the late former President George H.W. Bush – lost his bid to unseat Attorney General Ken Paxton, who is under indictment for alleged securities fraud.
  
  Ukrainian President Volodymyr Zelensky said yesterday that he can only talk with Vladimir Putin once the Russian Presidentsteps out of his “bubble” of “alternative reality.”Putin has said the invasion began to protect Russian speakers from genocide at the hands of “neo-Nazis,” despite the lack of any concrete evidence. Russia’s invasion of Ukraine has effectively halted all maritime trade at Ukrainian ports on the Black Sea, according to a US official. Ukraine provides about 10% of the world’swheat exports, the vast majority of which exit the country from Black Sea ports. The UN has called on Putin to reopen the ports to exports toprevent people around the world from starving. Separately, at least 22,000 Ukrainian residents are believed to have died during Russia’s three-month assault on theport city of Mariupol, according to a Ukrainian official. The figure, however, cannot be independently verified.
  
  The Michigan manufacturing plant at the heart of the nationwide baby formula shortagewill reopen on June 4. The first new batches of formula are expected to be available to consumers on or around June 20. Similac and Alimentum powder formulas that were recalled in February are not included in theupcoming product release, the plant said in a statement. The facility, Abbott Nutrition, shut down in February after FDA investigators founddangerous bacteriain several areas inside the plant. Under a consent decree, the company will be required to keep an independent expert on site to review operations and to make sure the plant is in compliance with FDA rules before restarting production.
  
  North Koreatested a presumed intercontinental ballistic missile(ICBM) and two other missiles today, according to South Korean officials. The test comes a month after North Korean leader Kim Jong Un vowed to“strengthen and develop” its nuclear forcesat the “highest possible” speed. Last week, a US official warned that North Korea appeared to bepreparing for an ICBM testafter satellite imagery revealed activity at a launch site near the capital, Pyongyang. The latest launches, which come on the heels ofPresident Biden’s first trip to Asiasince taking office, mark the 16th time that North Korea has tested its missiles this year.
  
  Walmart apologizes for selling Juneteenth ice cream
  
  The company promoteda certain flavor of ice creamand other themed products to commemorate the end of slavery. *Palm to face*
  
  A huge new underground railway has opened deep beneath London
  
  It’s called theElizabeth line, and rightfully so.
  
  ‘The Ellen DeGeneres Show’ is wrapping up after 19 seasons this week
  
  Some ofthe final episodesfeature major star power, including Oprah Winfrey.
  
  ‘Lunchflation’ is real
  
  Workers returning to the office areseeing higher costs for everythingfrom their morning coffee to their lunchtime salad.
  
  NASA captures eruption of ‘Sharkcano’
  
  This underwater volcano is also anunlikely home to sharks, suggesting they can tolerate extreme environments like hot and acidic water.
  
  That’s how low the water level in Lake Mead – the nation’s largest reservoir – dropped for the first time last week.Shocking photos show formerly sunken boats emerging in the mudas the water level continues to decline, largely due to climate change.Lake Meadprovides water to roughly 25 million people in Arizona, Nevada, California and Mexico. The reservoir is currently operating in atier 1 shortage, which prompted states across Southwest states to issue mandatory water cuts in January. Those cuts have primarily affected agriculture.
  
  “When are we going to do something? I’m so tired of getting up here and offering condolences to the devastated families that are out there. I’m tired of the moments of silence. Enough!”
  
  – Golden State Warriors head coach Steve Kerr, delivering apassionate plea for gun controlyesterday at a pre-game press conference in response to the school shooting in Uvalde, Texas. He urged senators – and called out Senate Minority Leader Mitch McConnell by name – to take action on legislation designed to protect kids from school shootings.
  
