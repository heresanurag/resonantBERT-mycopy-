  That was the price tag of a Michigan voting machine that wound up for sale on eBay last month. Election machines are part of the US’ critical infrastructure and are supposed to be kept under lock and key. The machine waspurchased by a cybersecurity expertin Connecticut who alerted Michigan authorities and is now waiting for law enforcement to pick up the device. News of the sale comes as authorities in several states are probing apparent efforts to gain unauthorized access to voting machines or obtain data from them following the 2020 election.
  
