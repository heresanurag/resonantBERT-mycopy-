  President Joe Biden delivered his sharpest rebuke yet of Republicans during a speech in Philadelphia on Thursday, warning that former President Donald Trump and his closest followers aretrying to undermine American democracy. “As I stand here tonight, equality and democracy are under assault,” Biden said in his address – just months ahead ofmidterm electionsthat will determine control of Congress. Biden attempted to separate Trump’s most loyal MAGA followers from the Republican Party as a whole and also sought to conclude on a more upbeat note, urging it is still within voters’ power to rein in Trump’s staunchest supporters. This comes as Biden’s recent aggressive rhetoric has drawn the ire of Republicans, particularly after he accused Trump loyalists of “semi-fascism” at a fundraiser last week.
  
  For the first time in 25 years, the month of August did not have a named storm. But now that September has arrived, things appear to have changed quickly in the tropical Atlantic. On Thursday, the National Hurricane Center announced that Tropical Storm Danielle, currently in the North Atlantic, is expected tostrengthen into a hurricane by Saturday. Danielle is not a threat to any land at this time, forecasts show, and it is expected to remain fairly stationary through the weekend. Still, current indications show the early stages of the Atlantic hurricane season havebeen above averageand could begin to pick up.
  
  Former President Trump said he will “very, very seriously”consider full pardons for the rioterswho breached the US Capitol on January 6, 2021, if he runs for reelection and wins. “If I decide to run and if I win, I will be looking very, very strongly about pardons. Full pardons,” Trump said on Wendy Bell Radio Thursday. Trump had made a similar promise during his final days in office when some of theJanuary 6 rioterswere already in jail. None, however, were pardoned before he left office. Trump’s comments come amid intense speculation about a potential 2024 presidential run, and his continued invocation of the Capitol attack could preview a central part of his future political messaging.
  
  The California Legislature passed about a dozen bills this week protecting or expanding abortion access in the state, as its Democratic leaders seek to make California a safe haven for “reproductive freedom.”The legislationnow goes to Democratic Gov. Gavin Newsom, who has been supportive of abortion rights, for his signature. Meanwhile,nearly one-third of all US stateshave banned or severely restricted abortion after the Supreme Court overturned Roe v. Wade in June. At least seven states, including Alabama, Kentucky and Missouri, have banned abortions with no exceptions for rape or incest. Health care providers and abortion activists have continued to file legal challenges to stop bans in several states from being enacted.
  
  The UN nuclear watchdog says it will have a “continued presence” at Ukraine’sZaporizhzhia nuclear power plantfollowing an inspection at the site, where Russian shelling has sparked fears of a nuclear accident. The plant and the area around it, including the adjacent city of Enerhodar, have endured persistent shelling that has raised fears of a meltdown through the interruption of the power supply to the facility. Each side accuses the other of acts of nuclear terrorism. Separately, Ukrainian military officials claim Russia has suffered “significant losses” in the south to both its manpower and equipment as Ukraine tries to prevent Russia from resupplying its troops.
  
