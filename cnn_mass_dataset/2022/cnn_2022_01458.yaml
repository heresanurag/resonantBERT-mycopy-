title: "As gas prices soar, thieves steal thousands of dollars’ worth of gasoline to sell, authorities say"
date: "2022-06-17"
section: "US"
url: "https://www.cnn.com/2022/06/17/us/virginia-beach-gas-scam/index.html"
content: |
  With the nationwide average price of gasolinehitting $5 a gallon, and prices expected tocontinue to rise, thefts of gasoline are being reported across the country, and according to police, it’s not just a few gallons being siphoned from vehicles.
  
  Now, thieves are pumping thousands of dollars’ worth of fuel from gas stations and selling it on the black market, according to authorities.
  
  Two men were arrested in connection with the theft of thousands of dollars’ worth of gasoline from a Virginia Beach Citgo gas station, according to the Virginia Beach Police Department.
  
  Why gas prices always end in 9/10 of a cent
  
  Officers began investigating after they noticed an unusual number of people pumping gas and congregating at the Citgo, which was closed at the time, anews releasestated.
  
  The officers discovered the use of devices to illegally obtain gas from the pumps and individuals selling the gas at a cheaper price, the release stated.
  
  They also “advertised the operation on social media,” according to the release.
  
  The suspects are being charged with grand larceny, conspiracy and possession of burglary tools, according to the release. Authorities say the investigation is ongoing.
  
  This is what determines the price of gas
  
  And in Greenville, South Carolina, CNN affiliateWHNS reportspolice have made several arrests for gas thefts. Authorities believe thousands of dollars’ worth of fuel were stolen.
  
  President Joe Biden has invited oil company executives to ameeting next weekto discuss high gas prices.
