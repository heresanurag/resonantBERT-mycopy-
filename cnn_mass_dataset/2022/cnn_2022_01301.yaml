  “Political extremism is ripping our nation apart, and the two major parties have failed to remedy the crisis.”
  
  – A group of former Republican and Democratic officials, on forminga new political party called Forward, in an attempt to appeal to what they call the “moderate, common-sense majority.” The group – David Jolly, Christine Todd Whitman andAndrew Yang– wrote in aWashington Post op-edthat they will merge their political organizations into the new party and will seek ballot access to run candidates in the 2024 election. Jolly is a former Republican congressman from Florida, Whitman is a former Republican governor of New Jersey and Yang is a former Democratic presidential and New York mayoral candidate.
  
