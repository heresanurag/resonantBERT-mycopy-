  If you’re among the millions of Americans facing sweltering heat this summer, you may find a little consolation in knowing that the cooler – and cozier – fall season is less than 2 months away. Yes, that means wearing comfortable sweaters, savoring the colorful transformation of leaves, and sipping warm pumpkin spice lattes. But this year, your patience may be tested in the Halloween candy aisle. Hershey says itwon’t be able to meet consumer demandthis Halloween due to manufacturing and supply chain issues.
  
  Here’s what you need to know toGet Up to Speed and On with Your Day.
  
  (You can get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  The Justice Department’s criminal investigation into theJanuary 6Capitol riot is heating up. According to sources familiar with the matter, prosecutors arepreparing for a court battleto force former White House officials to testify about former President Donald Trump’s conversations and actions around the insurrection. This appears to be the clearest sign yet that federal investigators are homing in on Trump’s conduct as he tried to prevent the transfer of power to Joe Biden. This court fight would put the Justice Department’s investigation into a more aggressive stance than even theMueller investigation– a major yearslong criminal probe into Trump while he was President. He was not ultimately charged. This comes as the House select committee investigating the Capitol riot confirmed it intends toshare 20 transcripts with the DOJas the department ramps up its investigation.
  
  At least eight people are dead and hundreds of homes have been damaged followingcatastrophic flooding in eastern Kentuckyon Thursday. Rescuers are working around the clock to reach difficult-to-access areas amid continuing storms, officials said. Floodwaters have washed out bridges, wiped out power lines and sent some residents scrambling to their rooftops as water gushed into their homes. Some families’ houses and cars were submerged orswept away completely by the flooding, which has been exacerbated by overflowing creeks. Kentucky Gov. Andy Beshear called it one of the most “devastating flooding events in Kentucky’s history,” adding destruction is far from over as more rainfall is expected today. Officials said the death toll is expected to rise.
  
  The principal of Robb Elementary School in Uvalde, Texas, has beenallowed to return to workafter a brief suspension, according to her attorney. Mandy Gutierrez has faced criticism about her handling of school security before the mass shooting that left19 children and two teachers dead. She was placed on administrative leave Monday during a school board meeting. Gutierrez’s reinstatement comes after anexclusive interviewwith CNN this week in which she defended her actions during theMay 24 shooting. “I feel that I followed the training that I was provided with to the best of my abilities,” she said when asked whether she felt she should lose her job. “And I will second-guess myself for the rest of my life.”
  
  San Francisco and New York aresounding the alarm on monkeypox, as federal officials weigh whether to declare the outbreak a nationwide public health emergency. San Francisco became the first major US city todeclare a local health emergencyon monkeypox in an effort to strengthen the city’s preparedness and response. This declaration goes into effect on Monday. In New York, a state health commissionerdeclared an imminent threat to public health, citing the virus’ rapid spread. Due to the high demand for theJynneos monkeypox vaccine, the FDA has authorized 786,000 additional doses. About 338,000 doses have already been delivered across the country.
  
  The US economy shrank again in the second quarter, the Bureau of Economic Analysis said Thursday,fueling some recession fears. Gross domestic product, or GDP, fell by 0.9% on an annualized basis from April through June. The decline marks a key symbolic threshold for the most commonly used – though unofficial – definition of arecessionas two consecutive quarters of negative economic growth. Although Thursday’s estimate marked a sharp drop from the 6.7% expansion the economy underwent in the second quarter of 2021, theBiden administration has been adamantthat the world’s largest economy, despite being buffeted by decades-high inflation, remains fundamentally sound.
  
