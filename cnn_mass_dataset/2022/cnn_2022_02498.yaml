  # Volodymyr Zelensky Fast Facts
  
  Updated Aug 18, 2025
  
  Updated Aug 18, 2025, 10:37 AM ET
  
  PUBLISHED Mar 29, 2022, 11:32 AM ET
  
  Russia War in Ukraine Donald Trump Joe Biden
  
  [See all topics](https://www.cnn.com/follow)
  
