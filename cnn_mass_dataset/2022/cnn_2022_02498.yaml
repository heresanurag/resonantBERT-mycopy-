  ![Image 1: Ukrainian President Volodymyr Zelensky delivers a video address in Kyiv, Ukraine on March 16, 2022. Photo by Ukraine Presidential Press Service via ABACA](https://media.cnn.com/api/v1/images/stellar/prod/220321110440-03-ukraine-monday-reset-03-21-intl.jpg?c=original&q=w_860,c_fill)
  
  Ukrainian President Volodymyr Zelensky delivers a video address in Kyiv, Ukraine on March 16, 2022. Photo by Ukraine Presidential Press Service via ABACA
  
  Ukraine Presidential Press Service/ABACA/Reuters
  
  Here’s a look at the life of [Volodymyr Zelensky](https://www.president.gov.ua/en/president/biografiya), the president of Ukraine.
  
  ## Personal:
  
  **Birth date:** January 25, 1978
  
  **Birth place:** Kryvyi Rih, Ukraine
  
  Ad Feedback
  
  **Birth name:** Volodymyr Oleksandrovych Zelensky
  
  **Father:** Oleksandr Zelensky, computer science professor
  
  **Mother:** Rimma Zelenska, engineer
  
  **Marriage:** Olena (Kiyashko) Zelenska (2003-present)
  
  **Children:** Oleksandra and Kyrylo
  
  **Education:**Kyiv National Economic University, law, 2000
  
  **Religion:** Jewish
  
  ## Other Facts:
  
  Former [comedian, actor, writer and producer](https://www.cnn.com/2022/03/04/entertainment/volodymyr-zelensky-acting-career/index.html).
  
  His best known role was in the television series “Servant of the People.” He played a destitute schoolteacher who unexpectedly becomes president of Ukraine after video of his anti-corruption rant goes viral.
  
  ![Image 2: zelensky transformation split](https://media.cnn.com/api/v1/images/stellar/prod/220302085426-zelensky-transformation-split.jpg?c=16x9)
  
  Video Ad Feedback
  
  Zelensky's unorthodox path to leading and inspiring Ukraine
  
  3:05  • Source: [CNN](https://www.cnn.com/)
  
  ![Image 3: zelensky transformation split](https://media.cnn.com/api/v1/images/stellar/prod/220302085426-zelensky-transformation-split.jpg?c=16x9&q=w_860,c_fill)
  
  Zelensky's unorthodox path to leading and inspiring Ukraine
  
  3:05
  
  ## Timeline:
  
  **1990s -** Forms a comedy troupe with college friends called Kvartal 95. The group gains prominence performing in comedy competitions, and eventually starts a popular live sketch television show, “Evening Kvartal.”
  
  **2003 -** Co-founds an entertainment production company, [Kvartal 95 Studio](https://kvartal95.com/uk/istoriia/).
  
  **2009 -** In his feature film debut, Zelensky co-writes and stars in the [romantic comedy “No Love in the City.”](https://kvartal95.com/uk/projects/kokhannia-u-velykomu-misti/)
  
  **November 16, 2015 -** “Servant of the People” premieres.
  
  **2018 -** Kvartal 95 Studio officially registers Servant of the People as a political party.
  
  **December 31, 2018 -** Announces his candidacy in the 2019 presidential election.
  
  **April 21, 2019 -** Zelensky [is elected president](https://www.cnn.com/2019/04/21/europe/volodymyr-zelensky-ukraine-president-profile-intl/index.html), defeating incumbent Petro Poroshenko with 73.22% of the vote.
  
  **May 20, 2019 -** Sworn in as the 6th president of Ukraine. In [his inaugural address](https://www.president.gov.ua/en/news/inavguracijna-promova-prezidenta-ukrayini-volodimira-zelensk-55489), Zelensky dissolves the current Ukrainian parliament and orders a parliamentary election. He also announces his intention to achieve a ceasefire in Donbas, a region in eastern Ukraine which is[the site of hostilities between Russian-backed separatists and Ukrainian forces](https://www.cnn.com/2022/02/19/europe/donbas-ukraine-russia-intl-cmd/index.html).
  
  **July 2019 -** Zelensky’s Servant of the People party [wins an outright majority in parliamentary elections](https://www.cnn.com/2019/07/22/europe/ukraine-elections-zelensky-putin-intl/index.html).
  
  **July 25, 2019 -** Phone call with US President [Donald Trump](https://www.cnn.com/2013/07/04/us/donald-trump-fast-facts/index.html), during which [Trump presses Zelensky](https://www.cnn.com/interactive/2019/09/politics/trump-ukraine-transcript-annotated/) to investigate [Joe Biden](https://www.cnn.com/2013/01/22/us/joe-biden-fast-facts/index.html) and his son, Hunter Biden.
  
  **September 25, 2019 -** Zelensky [meets Trump on the sidelines of the UN General Assembly](https://www.cnn.com/2019/09/25/politics/volodymyr-zelensky-donald-trump-meeting-unga/index.html) in New York. During a joint press conference, Zelensky says he does not want to become involved in American politics, and he stresses that he did not feel pressured by Trump during the July phone call.
  
  **October 1, 2019 -** Zelensky agrees to hold a local election in eastern Ukraine, signing accords with Russia, European monitors and separatists from the region. The agreement could pave the way for peace talks between Zelensky, [Russian President Vladimir Putin](https://www.cnn.com/2013/01/03/europe/vladimir-putin-fast-facts) and European leaders. Ukrainian nationalists protest the agreement, describing it as a capitulation to Russia.
  
  **December 9, 2019 -** Attends the Normandy summit peace talks in Paris, marking Zelensky’s first meeting with Putin. Ukraine and Russia [agree to a new prisoner swap and a ceasefire before the end of the year](https://www.cnn.com/2019/12/09/world/russia-ukraine-peace-paris-intl/index.html). Zelensky calls the results of the talks “a draw.”
  
  **March 4, 2020 -**Zelensky [replaces the country’s prime minister](https://www.cnn.com/2020/03/04/europe/ukraine-prime-minister-denis-shmygal-intl/index.html), saying he hopes the new PM will “do the impossible.” Ukraine’s Parliament approves Denis Shmygal as the new PM, after accepting the resignation of Oleksiy Honcharuk at an extraordinary session of the Verkhovna Rada, Ukraine’s parliament.
  
  **September 1, 2021 -** Zelensky meets with President Joe Biden in his [first visit to the White House](https://www.cnn.com/2021/09/01/politics/ukraine-volodymyr-zelensky-biden-white-house/index.html). A joint statement issued by the two countries affirms the US commitment to Ukraine’s sovereignty.
  
  **January 27, 2022 -** Amid a buildup of Russian troops at the Ukrainian border, Biden and Zelensky [hold a phone call](https://www.cnn.com/2022/01/27/politics/biden-zelensky-call/index.html) in which Biden warns that a Russian attack may be imminent. Zelensky tells reporters the following day that [world leaders have been overstating the likelihood of war](https://www.cnn.com/2022/01/28/europe/ukraine-russia-zelensky-biden-intl/index.html) between Ukraine and Russia.
  
  **February 19, 2022 -** Zelensky [delivers a speech](https://kyivindependent.com/national/zelenskys-full-speech-at-munich-security-conference/) at the Munich Security Conference asking for [new security guarantees and preemptive sanctions on Russia](https://www.cnn.com/2022/02/19/europe/ukraine-russia-zelensky-amanpour-munich-security-conference-intl/index.html) prior to any invasion.
  
  **February 24, 2022 -** Russian military forces [enter Ukraine and begin a full-scale assault](https://www.cnn.com/2022/02/24/europe/ukraine-russia-invasion-thursday-intl/index.html) across airfields, military headquarters, major cities and ports. Zelensky [introduces martial law and urges calm](https://www.cnn.com/europe/live-news/ukraine-russia-news-02-23-22/h_1831ec828890a281e4fcfc8db92e3c4b), “We are strong. We are ready for everything. We will win over everybody because we are Ukraine.”
  
  **March 16, 2022 -** Delivers a [virtual address to the US Congress](https://www.cnn.com/interactive/2022/03/politics/ukraine-zelensky-congress-speech-annotated/) from Kyiv in the midst of the Russian invasion. Zelensky invokes[Pearl Harbor](https://www.cnn.com/2013/07/09/world/world-war-ii-fast-facts/index.html)and [September 11](https://www.cnn.com/2013/07/27/us/september-11-anniversary-fast-facts/index.html) to [make an appeal for a no-fly zone](https://www.cnn.com/2022/03/16/politics/zelensky-ukraine-speech-to-congress/index.html), additional sanctions and continued assistance.
  
  **April 3, 2022 -**After reports of alleged Russian atrocities in the town of Bucha near Kyiv, [Zelensky calls for an end of Russian “war crimes.”](https://www.cnn.com/2022/04/03/europe/bucha-ukraine-civilian-deaths-intl/index.html) In his address, Zelensky announces a “mechanism of justice” will be established to investigate crimes committed by Russian soldiers in Ukrainian territory.
  
  **September 30, 2022 -**Putin announces that Russia will seize four Ukrainian regions, in an annexation process which is illegal under international law.[Zelensky calls the move a “farce” in a pre-recorded video statement and vows that “the entire territory of our country will be liberated.”](https://www.cnn.com/2022/09/30/europe/putin-russia-ukraine-annexation-intl/index.html)Zelensky also said his country would apply for NATO membership “under an accelerated procedure,” but it’s unclear how long such a process will take.
  
  **December 7, 2022 -**[Time magazine](https://www.cnn.com/2022/12/07/europe/zelensky-time-person-year-intl/index.html) names Zelensky its “Person of the Year.”
  
  **December 21, 2022 -**During a surprise trip to the United States, Zelensky meets with Biden at the White House, and [delivers a speech to a joint meeting of Congress](https://www.cnn.com/2022/12/21/politics/zelensky-biden-washington-visit-ukraine-russia-war/index.html), making a plea for more help fighting Russia. It is his first trip outside Ukraine since the war began in February.
  
  **May 14, 2023 -**[Zelensky is awarded the prestigious Charlemagne prize](https://www.cnn.com/europe/live-news/russia-ukraine-war-news-05-14-23/h_97c898b6e7d11b9f3c96db15ee1a45c4) during a visit to Germany on behalf of the Ukrainian people for their contribution to the unification of Europe.
  
  **May 20, 2023 -**[Zelensky appears at the G7 in Japan](https://www.cnn.com/2023/05/20/politics/zelensky-g7-summit-biden-leaders/index.html) to continue to appeal for more powerful weapons and tougher sanctions against Moscow.
  
  **August 7, 2023 -**The Ukrainian Security Service (SBU) announces [an alleged informant for Russia has been detained in connection to a plot to assassinate Zelensky.](https://www.cnn.com/2023/08/07/europe/zelensky-assassination-plot-intl/index.html)
  
  **May 9, 2024 -**Zelensky dismisses State Guard Service (UDO) chief Serhii Rud after [two UDO officers are detained over an alleged assassination plot against Zelensky.](https://www.cnn.com/2024/05/10/europe/zelensky-rud-ukraine-assassination-fired-intl/index.html)
  
  **February 28, 2025 -**A [meeting with US President Trump at the White House ends in an argument](https://www.cnn.com/2025/02/28/politics/trump-zelensky-vance-oval-office/index.html) with Trump and [Vice President JD Vance](https://www.cnn.com/2024/07/19/politics/jd-vance-fast-facts/index.html) accusing Zelensky of standing in the way of a peace agreement with Russia and not demonstrating enough gratitude for American support.
  
  **June 29, 2025 -**[Zelensky announces he signed a decree that would take Ukraine out of the Ottawa Treaty,](https://www.cnn.com/2025/06/29/europe/ukraine-f-16-pilot-killed-russia) the international agreement that bans the use of anti-personnel landmines. The withdrawal still needs to be approved by Ukraine’s parliament. Kyiv has long argued that it cannot continue to be member of the treaty because its attacker – Russia – is using landmines in its own territory. Russia has been using mines extensively in Ukraine’s territory, but according a 2023 [report](https://www.hrw.org/news/2023/01/31/ukraine-banned-landmines-harm-civilians) from Human Rights Watch found that Ukraine has also used antipersonnel landmines.
  
