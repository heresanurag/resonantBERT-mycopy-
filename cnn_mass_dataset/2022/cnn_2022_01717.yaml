title: "Nighttime lighting reduces crime but it’s not a one-size-fits all solution, study shows"
date: "2022-04-28"
section: "US"
url: "https://www.cnn.com/2022/04/28/us/lighting-study-new-york-study"
content: |
  A recent study showed nighttime lighting in New York City public housing complex courtyards could reduce crime, and the reduction in crimeheld over the three-year period of the study.
  
  Though the lighting appeared to reduce crime at the experiment sites in New York, the researchers and other experts cautioned against drawing too firm a conclusion about lighting as an anti-crime measure that can be used everywhere.
  
  “It seems to have worked beautifully in New York public housing, it could be applicable in others, but it’s hard to make any firm claim about it,” saidAaron J. Chalfin, one of the study’s authors and a professor at the University of Pennsylvania. “If you look back at all the literature on lighting – most finds effects (from lighting), but not all of it finds effects. It’s one strategy city planners can use in conjunction with other things they can be doing. It’s not magic that always works in all circumstances.”
  
  Researchers studied crime in areas where the city placed temporary light stations – the type typically used to illuminate construction sites. The emitted brightness from those fixtures was brighter than the lights used at Yankee Stadium. The experiment was conducted with the city of New York under the administration of former Mayor Bill de Blasio. Officials from the New York City’s mayor’s office didn’t respond to a request for comment.
  
  The fixtures gave off “600,000 lumens,” while street lights are often between about 5,000 and 35,000lumensand the brightest light at Yankee Stadium is 150,000 lumens, according to the study and experts.
  
  “This is kind of weaponizing light and using it in an experiment … (you can use) space, light, other facilities to create a safe environment, that’s the essence of crime prevention through environmental design ethos. This is the antitheses of that. You need quality lighting, quality lighting will make it safer, enhance the ability to see and to safely navigate space,”Ruskin Hartley, executive director of theInternational Dark-Sky Association. The group advocates against light pollution to protect night skies while also providing resources to city planners and managers to help them use lighting in a responsible way.
  
