title: "Netflix lays off 300 employees as bad year continues to hit company"
date: "2022-06-23"
section: "Media"
url: "https://www.cnn.com/2022/06/23/media/netflix-layoffs/index.html"
content: |
  Netflixis laying off 300 employees in the midst of arough year for the streaming giant.
  
  “While we continue to invest significantly in the business, we made these adjustments so that our costs are growing in line with our slower revenue growth,” a company spokesperson told CNN Business Thursday. “We are so grateful for everything they have done for Netflix and are working hard to support them through this difficult transition.”
  
  Thursday’s layoffs impact around 3% of Netflix’s workforce, which includes 11,000 full-time employees. The layoffs are also mostly taking place in the United States. Variety was thefirst to report the news.
  
  To save itself, Netflix might have to play nice with an industry it battled for years
  
  Netflix reported in April that it lost subscribers forthe first time in more than a decade. That sent shock waves through Wall Street, leading investors to wipebillions of dollars off Netflix market cap. The company’s stock has plummeted roughly 70% this year.
  
  Last month, Netflixlaid off 150 workers,placing the blame on slowing revenue growth.
  
  Netflix(NFLX)has been coming up with ways to turn the negative tide and get the platform, which has 221.6 million subscribers, back on track.
  
  Ideas includeintroducing a new lower-priced ad tierand clampingdown on password sharingamong subscribers.
