  Formerpolice chiefs, in a brief filed in September, said that “may-issue” gun permitting laws that give states discretion on how they approve gun permits were “a critical component of their obligation to safeguard … their citizens.” That group included Bill Bratton, considered an elder statesmen in law enforcement leadership circles, along with former police chiefs from Chicago, Philadelphia, Milwaukee, Boston and elsewhere across the country.
  
  Separately, law enforcement advocacy groups fromNew York to Californiaand a handful of shooting and gun associations argued that the outbreak of “murders and shootings” sincethe 2020 death of George Floydheightened the need for “self-defense where it is most frequently needed: outside the home.” That group included national and local policing groups, sport shooting groups from across the country, and police education and legal groups.
  
  Some stateshave legalized permit-less carry since the onset of the pandemic, which typically allows adults to carry guns without any permitting or screening process. Some law enforcement groups objected to that.
  
  Harrison said guns complicate police response to any incident.
  
  “Think about the police officer that sees a person carrying a firearm, what disadvantage are you putting that officer in that’s used to dealing with people in a certain way that carries a firearm. Now we’re going to be in a state of confusion,” Harrison said.
  
  Bronx District Attorney Darcel Clarksaid the borough has struggled with gun violence. Clark, who currently has 1,200 open gun cases, says changes to the law could create issues for prosecutors.
  
  “I don’t know what this is going to do to the current cases,” Clark said. “I don’t know if some defense attorney will say ‘this was illegal but now my client wants to apply for a license.’ I don’t know what the ramifications will be.”
  
  There have been 216 people shot in the Bronx so far this year and police have recovered 552 guns from arrests, according to Clark. And while some want to carry a gun for protection, Clark says carrying a firearm doesn’t make you more safe.
  
  “They could also be killed,” she said. “Just because you have a gun doesn’t mean you’re safer than somebody else. In the cases we have now, both sides have guns and both sides are getting killed.”
  
  Clark added that even having someone with a weapon possibly intervene would not necessarily make anything better.
  
