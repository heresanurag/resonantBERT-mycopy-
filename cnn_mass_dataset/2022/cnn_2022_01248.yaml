title: "Clarence Thomas’ Second Amendment ruling shows power of conservative supermajority"
date: "2022-06-23"
section: "Politics"
url: "https://www.cnn.com/2022/06/23/politics/supreme-court-guns-analysis-clarence-thomas/index.html"
content: |
  For more than a decade, individualSupreme Courtconservatives lamented lower court decisions that endorsed gun regulations, as their own court failed to expand a 2008 ruling that said the Second Amendment protects a right to a handgun in the home for self-defense.
  
  One of the strongest dissenters was JusticeClarence Thomas, who in 2020 declared, “It is extremely improbable that the Framers understood the Second Amendment to protect little more than carrying a gun from the bedroom to the kitchen.”
  
  What the Supreme Court's new gun rights ruling means
  
  But the new conservative supermajority has changed everything for America, and on Thursday Thomas wrote the 6-3 decision broadening prior interpretations of the Second Amendment right “to keep and bear arms.”
  
  Thomas wrote that the definition of “bear naturally encompasses public carry. Most gun owners do not wear a holstered pistol at their hip in their bedroom or while sitting at the dinner table. Although individuals often ‘keep’ firearms in their home, at the ready for self-defense, most do not ‘bear’ them in the home beyond moments of actual confrontation.”
  
  This is the first time the justices declared a right to carry a weapon outside the home and, significantly for future cases, transformed the legal framework that most lower courts had adopted when reviewing gun laws.
  
  Thursday’s ruling underscores the character of the contemporary court, which is often at odds with public opinion and in conflict with its predecessor courts, when centrist conservatives controlled the center and prevented the bench from pitching too far right.
  
  Whether gun restrictions can stand, Thomas wrote, must be measured by the nation’s history, not by a state’s assertion of urgent public safety interests. He said the Second Amendment “requires courts to assess whether modern firearms regulations are consistent with the Second Amendment’s text and historical understanding.”
  
  The decision striking down a New York licensing restriction is certain to open the door to more challenges to gun regulations, as the country confronts a new series of mass shootings, including at an elementary school in Uvalde, Texas, andCongress is considering new firearms restrictions.
  
  John Roberts played the long game on state funding of religious schools
  
  Led by senior liberal Justice Stephen Breyer, the dissenters referred to the 21 people dead from the Uvalde tragedy and the 10 who were killed a few days earlier in May at a Buffalo, New York, supermarket.
  
  The dissenters insisted that Thomas’ new test goes further than what the court’s 2008 landmark demanded, and they observed at one point that “firearms in public present a number of dangers, ranging from mass shootings to road rage killings, and are responsible for many deaths and injuries in the United States.”
  
  Justice Samuel Alito,who like Thomas has been pushing for greater gun rights for years, joined the majority yet wrote a separate statement that dismissed Breyer’s list of mass shootings: “(H)ow does the dissent account for the fact that one of the mass shootings near the top of its list took place in Buffalo? The New York law at issue in this case obviously did not stop that perpetrator.”
  
  Overall, Thursday’s ruling underscored the power dynamic on today’s 6-3 conservative-liberal bench. The appointment in 2020 of JusticeAmy Coney Barrett, who had complained as a federal appeals court judge that the Second Amendment appeared to be “a second-class right,” helped lock in Thursday’s decision.
  
  The decision was signed by all three appointees of former president Donald Trump (Barrett, Neil Gorsuch and Brett Kavanaugh), along with Alito and Chief Justice John Roberts, both appointees of President George W. Bush.
  
  Latest Ginni Thomas controversy means the Supreme Court can't escape the 2020 election
  
  Thomas, a 1991 appointee of President George H.W. Bush, is the longest serving member of the current bench. He turned 74 on Thursday.
  
  The justices are in the final days of their current session, and among the awaited cases are those testing the future of abortion rights and a church-state clash involving a public school football coach who prayed after games at midfield. The conservative wing is likely to control those rulings, too.
  
  The 2008 ruling inDistrict of Columbia v. Hellerbroke ground on Second Amendment rights, but it also reflected a compromise among justices in the conservative camp – the kind of compromise that Thomas could avoid.
  
  The late Justice John Paul Stevens, who dissented from the 2008 milestone, wrote in his memoir that Justice Anthony Kennedy, the critical fifth vote for the majority, signed on only after insisting on “important changes” by author Antonin Scalia, who died in 2016.
  
  Fmr. Scalia Clerk Paul Clement on the Justice's legacy
  
  Scalia had confined the Heller ruling to an individual right to possess a firearm for self-defense in the home.
  
  “Although we do not undertake an exhaustive historical analysis today of the full scope of the Second Amendment,” Scalia wrote, “nothing in our opinion should be taken to cast doubt on longstanding prohibitions on the possession of firearms by felons and the mentally ill, or laws forbidding the carrying of firearms in sensitive places such as schools and government buildings, or laws imposing conditions and qualifications on the commercial sale of arms.”
  
  It is not yet known how many of such limits could evaporate under the majority’s new test, but the decision inNew York State Rifle and Pistol Association v. Bruenrobustly signals a new era.
  
  Breyer, joined by Justices Sonia Sotomayor and Elena Kagan, noted that states had not previously had to “affirmatively prove” that a regulation was part of the historical tradition.
  
  “To the contrary, every Court of Appeals to have addressed the question has agreed on a two-step framework for evaluating whether a firearm regulation is consistent with the Second Amendment,” Breyer wrote. “At the first step, the Courts of Appeals use text and history to determine ‘whether the regulated activity falls within the scope of the Second Amendment.’ If it does, they go on to the second step and consider ‘the strength of the government’s justification for restricting or regulating’ the Second Amendment right.”
  
  That is essentially what happened in the New York case before it reached the high court. The state law, dating back more than a century, required applicants for a license to carry a concealed handgun to show some actual need, such as for self-defense, a condition that left considerable discretion to local officials and was stricter than licensing schemes in many other states.
  
  But a lower US appellate court had weighed the state’s justification against Second Amendment rights, siding with the state as it took account of studies showing that widespread access to handguns in public increases the chances of deadly violence.
  
  History must overtake such justifications, Thomas said, writing: “Apart from a few late-19th century outlier jurisdictions, American governments simply have not broadly prohibited the public carry of commonly used firearms for personal defense.”
  
  Samuel Alito lashes out at liberals in guns case as tensions boil over at SCOTUS
  
  The constitutional right to bear arms in public for self-defense is not “a second-class right, subject to an entirely different body of rules than the other Bill of Rights guarantees,” he concluded, “That is not how the First Amendment works when it comes to unpopular speech or the free exercise of religion. It is not how the Sixth Amendment works when it comes to a defendant’s right to confront the witnesses against him. And it is not how the Second Amendment works when it comes to public carry for self- defense.”
  
  With that, Thomas robustly elevated gun rights beyond where Scalia had taken them and for the first time ever gathered a majority for his vision of the Second Amendment.
