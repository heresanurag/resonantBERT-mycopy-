title: "Harry and Meghan’s children become Prince Archie and Princess Lilibet"
date: "2022-09-09"
section: "Europe"
url: "https://www.cnn.com/2022/09/09/europe/prince-archie-princess-lilibet-royal-title-intl/index.html"
content: |
  Followingthe death of the Queen, Harry and Meghan’s children have become His Royal Highness Prince Archie of Sussex and Her Royal Highness Princess Lilibet of Sussex.
  
  The change is a result of conventions created over a century ago. Under rules set out by George V in 1917, the grandchildren of themonarchautomatically receive royal titles.
  
  As grandchildren ofKing Charles III, Archie and Lilibet now have the right to be prince and princess, whereas they did not immediately qualify as the great-grandchildren of the Queen.
  
  Meghan last year made adamning suggestionthat this title might be denied to Archie because of his mixed-race ancestry. In an interview with broadcaster Oprah Winfrey, the Duchess of Sussex said a member of the royal family had expressed “concerns and conversations about how dark his skin might be when he was born.”
  
  “That was relayed to me from Harry. Those were conversations that the family had with him,” Meghan added, but declined to reveal who was involved in those conversations. “That would be very damaging to them,” she said.
  
  The duchess said these comments were made at the same time as the couple were told Archie wouldn’t have security or an official title. She said there had also been “conversations” while she was pregnant about the convention being changed once Charles became King, meaning Archie would lose his right to a title.
  
  She insisted to Winfrey that her concern over her son’s right to the title of prince was linked to her desire for him to be given police protection. Lilibet was born after the interview was conducted.
  
  Buckingham Palace told CNN at the time ofArchie’s birth in 2019that the Duke and Duchess of Sussex had chosen not to use any title at all for their son.
  
  Meghan rejected that suggestion in her interview with Winfrey, saying: “It’s not our decision to make, right.”
  
  There has been no indication that the King intends to make any changes to the convention.
  
  As King Charles III takes the throne, big changes lie ahead for the royal family
  
  Harry and Meghan announced in 2020 that they would step back from royal duties and “work to become financially independent.” It was agreed that they would remain part of the family, but the couple renounced their HRH titles.
  
  It is unlikely that Harry, Charles’ son, will be offered a royal office unless he and Meghan resume their duties.
  
  While several members of the royal family, including Harry, traveled to Balmoral Castle on Thursday after Buckingham Palace announced “concern” surrounding the Queen’s condition, Meghan did not accompany her husband.
  
