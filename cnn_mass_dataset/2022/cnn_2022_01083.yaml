title: "Airlines cancel another 1,600 flights, citing worker coronavirus cases"
date: "2022-01-06"
section: "Business"
url: "https://www.cnn.com/2022/01/06/business/more-canceled-flights-airlines/index.html"
content: |
  Airlines continue tocancel and delay flights by the thousandsas their operations struggle with an untold number of workers calling out sick with coronavirus.
  
  Carriers havecanceledmore than 1,620 flights as of Thursday afternoon and delayed more than 1,350 nationwide according to flight tracking site FlightAware. On Wednesday, US airlines canceled a total 1,790 flights and delayed another 6,097 flights.
  
  Southwest Airlines(LUV)has canceled 562 flights, or 18% of its total schedule, as of noon Thursday, more than any other US carrier.
  
  United Airlines(UAL)has canceled 227 flights, 11% of its Thursday schedule. United is now offering pilots who pick up extra trips up to three times their normal pay through the end of the month.
  
  What should I do if my flight has been canceled or delayed?
  
  Airlines have said they were doing their best to accommodate passengers in the face of widespread problems. Many of the flights were canceled in advance to allow the greatest possible notice to passengers. And all the airlines say they are doing what they can to hire the staffing needed so that they don’t have future problems.
  
  But these widespread challenges have become farmore frequent, with airline employees complaining that they’ve beenstretched to the breaking pointby difficult work conditions.
  
  – CNN Business’ Chris Isidore contributed to this report
