  If a caregiver or older sibling is sick, Mora says, they should wear a mask around other people and wash their hands frequently.
  
  And most of all, if anyone is sick – child or adult – they should stay home so they don’t spread the illness.
  
  There is amonoclonal antibody treatmentfor children who are at highest risk for severe disease. It’s not available for everyone, but it can protect those who are most vulnerable. It comes in the form of a shot that a child can get every month during the typical RSV season. Talk to your doctor about whether your child qualifies.
