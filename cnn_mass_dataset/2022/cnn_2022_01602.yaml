title: "South Florida apartment building evacuated after engineers deem it structurally unsafe"
date: "2022-04-05"
section: "US"
url: "https://www.cnn.com/2022/04/05/us/south-florida-building-evacuated-unsafe/index.html"
content: |
  The city of North Miami Beach, Florida, ordered the evacuation of a five-story, 60-unit apartmentbuildingMonday following an evaluation by a South Florida engineering firm that found the building to be “structurally unsound.”
  
  The city received a letter from an engineering firm on Monday notifying the property owner and city officials of the firm’sfindings after a months-long investigation, according to anews release. The apartment building, Bayview 60 Homes, was built in 1972, according to the release. Fifty-five of the building’s 60 units were occupied as of Monday, city officials said.
  
  The building is about three miles north of theChamplain Towers South, the Surfside condo tower that partially collapsed last summer,killing nearly 100 people. The disasterunnerved some residents of coastal propertiesin Florida and beyond and promptedNorth Miami Beach to launch a reviewof all high-rise condo buildings above five stories.
  
  Since last July, several units in the Bayview 60 Homes building have been under repairahead of the property’s 50 Year Recertification inspections.
  
  Susset Cabrera, Chief Communications Officer forNorth Miami Beach, told CNN on Monday that the owner of the building “verbally requested that the city order an immediate evacuation of residents” based on the engineering report.
  
  In the April 1 report, Bronislaus P. Taurinski Structural Engineers, the engineering firm hired by the property owner of Bayview 60 Homes, found that the building needed to be evacuated due to a “deflection” in the elevation of the building’s floor slabs. Deflection is an engineering term for how much something changes shape when a load is applied to it.
  
  “The deflection in the slabs is exceeding the (American Concrete Institute) guidelines for two-way slabs,” according to the letter.
  
  After Surfside tower collapse, condo residents in Florida and beyond wonder if they need to worry
  
  Cabrera says residents were told by the property owner to evacuate by 2 p.m. on Monday. It is unclear if residents were given any other warning ahead of time.
  
  “They have 24 hours to take their personal belongings. The city will schedule a time for residents to come back later this week to pick up heavier furniture and large items,” Cabrera said in an email to CNN.
  
  In July, North Miami Beachordered the evacuationof a 10-story building, Crestview Towers, after a report determined the building’s structure to be unsafe. The residents have not yet returned, Cabrera said.
  
  “The residents at Crestview have not been allowed back to the property because the structural repairs just started two weeks ago,” Cabrera told CNN. “The electrical repairs have not started yet. Therefore, the building is still unsafe until the property completes the repairs needed for re-occupancy.”
