title: "Must-watch videos of the week"
date: "2022-07-22"
section: "App News Section"
url: "https://www.cnn.com/2022/07/22/app-news-section/videos-of-the-week-mobile-july-22"
content: |
  A motorist spots a stranded bride, Lizzo shocks fans with her improvised tunes, and an iPhone-hating emu goes viral. These are the must-watch videos of the week.
  
  A motorist in London spotted a bride on the side of the road looking to hitch a ride to her own wedding! CNN’s Jeanne Moos has the details.
  
  Lizzo shocked her fans by appearing on the “Jimmy Kimmel Live!” segment “Undercover Sing” by improvising lyrics to her popular songs.
  
  An iPhone-hating emu lights up the internet for hilariously interrupting owner’s phone. CNN’s Jeanne Moos explains.
  
  Watch comedian Dana Carvey cleverly bring back some of his most iconic impressions from “Saturday Night Live” while guest hosting “Jimmy Kimmel Live!”.
  
  Cats are going nuts over a video game that lets you play a virtual cat. CNN’s Jeanne Moos lets the video game out of the bag.
