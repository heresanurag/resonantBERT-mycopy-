title: "Indonesia considers prosecutions over cough syrup suspected of links to child deaths"
date: "2022-10-24"
section: "Asia"
url: "https://www.cnn.com/2022/10/24/asia/indonesia-pharma-firms-prosecution-cough-syrup-child-deaths-intl-hnk?cid=external-feeds_iluminar_msn"
content: |
  Indonesia’s food and drugs agency on Monday said it may pursue criminal action against two pharmaceutical firms that made products linked to acute kidney injury (AKI), amid a spike in cases anddeaths among childrenthis year.
  
  Authorities havetemporarily banned salesof some syrup-based medications and identified the presence in some products of ethylene glycol and diethylene glycol as possible factors in the deaths of 141 children, most of which were under 5.
  
  BPOM chief Penny K. Lukito said the agency would work with police to investigate the two firms with a view to criminal proceedings over the composition of their products. Penny did not identify the two companies.
  
  “There are indications in their products … (of concentrations) that are highly excessive, highly toxic, and suspected to cause the kidney injury,” Penny told a news conference.
  
  Authorities have said casesspiked from August to October.
  
  Asked why the spike was only recent, Health Minister Budi Gunadi Sadikin said it was most likely due to changes in the raw ingredients of medications.
  
  Indonesia bans sale of all cough syrups after 99 child deaths
  
  He said the government had data on recent imports of raw ingredients and would share it at a later time.
  
  Indonesia imports most of its raw ingredients for medicines fromIndiaand China, according to its health ministry.
  
  Indonesia is investigating its rise in AKI cases in consultation with paediatric experts and the World Health Organization (WHO), following asimilar pattern in Gambia,which has seen at least 70 child AKI deaths related to syrup medications.
  
  BPOM recently named three medications that contained high levels of ethylene glycol and diethylene glycol and ordered those be taken out of circulation.
