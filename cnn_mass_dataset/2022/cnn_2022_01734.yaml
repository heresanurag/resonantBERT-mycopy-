  On hisfirst trip to Asiasince taking office, President Joe Biden said today that the United States would respond militarily if China tries to take Taiwan by force. “That’s the commitment we made,” he told reporters in Tokyo.The President’s statementcaught several of his top administration officials off guard, CNN was told by multiple aides. However, this is not the first time Biden has gone further than longstanding US public policy toward the self-governing island. The US provides Taiwan defensive weapons, but has remained intentionally ambiguous on whether it would intervene militarily in the event of a Chinese attack. Following Biden’s remarks, the White House issued a statement that said the US’ official position remained unchanged.
  
  Tomorrow marks three months since Russia launched its assault on Ukraine. Since then, a staggering8 million peoplein the country have been displaced, the UN Refugee Agency said today. Separately, Ukrainian President Volodymyr Zelensky announced a“historic” joint customs control with Polandyesterday, stressing “unity of Ukrainians and Poles is a constant that no one will break.” Zelensky also signed a decree introducing a new award to thank cities of partner countries that have helped Ukraine the most – and the Polish city of Rzeszow became the first to be added to the list. On the ground, tensions remain high and Ukrainian presidential adviser Mykhailo Podolyak said Saturday he hasruled out a ceasefire with Russia, emphasizing Kyiv would not accept any deal with Moscow that involved ceding territory.
  
  A shipment of 35 tons of baby formula arrived yesterday in Indiana on a US military aircraft from Germany to address the nationwide shortage – butnone of it will land on store shelvesin the US, a Biden administration official told CNN. The recent batch of formula is a specialized prescription and will be fed to babies intolerant of protein in cow milk, the official said. The shipment will provide enough formula for 9,000 babies and 18,000 toddlers for one week, Agriculture Secretary Tom Vilsack said. As for more upcoming shipments, the White House announced yesterday that additional flights toimport formula from abroadwill “take place in the coming days.” Biden announcedOperation Fly Formulalast week. His administration said the total amount of formula in the first round equals up to 1.5 million doses of eight-ounce bottles.
  
  A 32-year-old runner died Saturday after finishing ahalf marathon in Brooklynwhere 15 others were injured, officials said. The marathoner was found unconscious, lying on the pavement, having collapsed after crossing the finish line just before 9 a.m. in Brooklyn’s Brighton Beach neighborhood, an NYPD detective said. An official cause and manner of death have not been released. The runner immediately received attention from on-site medical staff, but was pronounced dead at the hospital approximately 45 minutes later, officials said. Fifteen other individuals were transported to local hospitals from the race and at least four were in serious condition. During the marathon, temperatures ranged from the low 60s to the high 70s Fahrenheit and the relative humidity was between 96% and 97%, according to theNational Weather Service.
  
  The White House is exploring the possibility oftapping into an emergency diesel reserveto ease the spike in gas prices, a senior White House official said. The emergency declaration under consideration would enable President Biden to release diesel from ararely used stockpile, but the reserve is relatively small and will only serve as a temporary solution to buy time. The national average price for diesel stood at $5.56 a gallon as of yesterday, just shy of the record of $5.58 set last week,according to AAA. Diesel is a vital fuel for the US economy, powering not only farm and construction equipment but the trucks, trains and boats that move goods across the country. Skyrocketing diesel prices often get passed down to consumers.
  
