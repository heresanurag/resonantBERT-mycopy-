id: cnn_2022_02002
title: "DA’s office to drop criminal charges against Denver security guard who fatally shot a man last year after political rally"
date: "2022-03-11"
section: "US"
url: "https://www.cnn.com/2022/03/11/us/denver-protest-shooting-charge-dismissal/index.html"
content: |
  Prosecutors will drop a second-degree murder charge for aDenver security guard who shot a manat a political rally in October 2020, according to a statement from the Denver District Attorney’s office.
  
  Matthew Dolloff and his attorney, Doug Richards, have claimed Dolloff was acting in self-defense when he shot Lee Keltner once during a confrontation.
  
  Keltner, who was walking from a rally at Civic Center Park, died at a Denver hospital.
  
  The fatal incident was recorded by Denverpolice surveillance camerasand cellphone video, a police affidavit said. At least one newspaper photographercaptured the shooting.
  
  Police: Video shows security guard shoot man who slapped him during confrontation near Denver rally site
  
  “Having fully considered the facts and circumstances surrounding the charges, today we informed Lee Keltner’s family members that we will soon dismiss the criminal case against Matthew Dolloff,” the statement said. “In line with our ethical obligations, we cannot overcome the legal justifications of self-defense or defense of others. We are not able to prove guilt beyond a reasonable doubt.”
  
  Richards told CNN he has been advised of the DA’s intent to dismiss the case later this month.
  
  Dolloff was a security guard who was contracted through Pinkerton byCNN affiliate KUSAto accompany its reporting staff to a police support rally and a counterdemonstration, the station said in 2020.
