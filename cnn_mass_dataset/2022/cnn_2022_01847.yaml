title: "CDC says a room spray connected to a deadly multistate outbreak last year also killed a pet raccoon"
date: "2022-12-15"
section: "Health"
url: "https://www.cnn.com/2022/12/15/health/room-spray-kills-pet-raccoon"
content: |
  Humans weren’t the only ones that lost their lives after being exposed to an aromatherapy spray linked to fatal cases of a rare tropical disease. The disease also killed a family’s pet raccoon in Texas.
  
  Exposure to a room spray containing “gemstones” that was sold atWalmartlast year led to the death of one person in Georgia and another in Kansas, according to theUS Centers for Disease Control and Prevention. Both developed melioidosis, a difficult-to-diagnose infection caused by the bacteria Burkholderia pseudomallei. There were at least two other cases in Minnesota and Texas that all had been genetically linked to the Georgia case.
  
  Lidl recalls chocolate advent calendar due to potential salmonella contamination
  
  A reportpublished Thursdayby the CDC determined the otherwise healthy pet raccoon of the Texas patient also died from exposure to the spray. This is the first reportedmelioidosiscase documented in a raccoon. It is also the first animal case linked to this multistate outbreak.
  
  Typically, the only time doctors in the US see these kinds of infections follow a person’s trip to the tropics. The doctors were at first mystified because none of the patients had taken such a trip. Investigators determined what the patients had in common was exposure to Better Homes & Gardens Lavender & Chamomile Essential Oil Infused Aromatherapy Room Spray with Gemstones, which had been manufactured in India.
  
  The raccoon had broken a bottle of the aromatherapy spray and walked through the liquid. On April 3 last year, about 2 weeks after it had the accident with the bottle, it showed signs of what the CDC described as “acute neurological symptoms consistent with neurologic melioidosis” and it died three days later.
  
