  Typically, melioidosis does not transfer from animals to humans, the CDC said, but it can infect a wide range of animals including reptiles, fish and other mammals. Since there wasn’t any environmental contamination, the bacteria should not have spread to other animals from the burial.
  
  In Octoberlast year, the CDC instructed people to stop using the product immediately and gavespecific directionsfor getting rid of the suspected aromatherapy products that included the lavender scent and any of the otherrecalledscents with Gemstones (including Lemon & Mandarin, Lavender, Peppermint, Lime & Eucalyptus, and Sandalwood & Vanilla).
