title: "Bruce Willis revisits ‘Die Hard’ set in honor of film’s 34th anniversary"
date: "2022-07-20"
section: "Entertainment"
url: "https://www.cnn.com/2022/07/20/entertainment/bruce-willis-die-hard-anniversary/index.html"
content: |
  Bruce Willis revisited the site of one of his most famous films.
  
  The actor’s wife, Emma Heming Willis,posted a video on her verified Instagram accountrecently that showed her husband visiting Fox Plaza in Los Angeles, which was the setting for Nakatomi Plaza in his now iconic 1988 film, “Die Hard.”
  
  “Nakatomi Plaza 34 years later #happymovieanniversary #diehard @20thcenturystudios,” she wrote in the comments.
  
  Willis’ family announced in March that the star would be taking a break from actingdue to his being diagnosed with aphasiathat is affecting his cognitive abilities.
  
  Understanding the brain disorder affecting Bruce Willis
  
  According to the Mayo Clinic,aphasia is “a condition that robs you of the ability to communicate” and can be caused by a stroke, head injury, a brain tumor or a disease.
  
  Since his diagnosis his wife has shared updates about Willis’ life, including himenjoying a game of basketball with some friends.
