  Many states had dropped mask mandates in schools, and at the beginning of February, 60% of the nation’s 500 largest school districts had mask requirements. Now, that number is just 32%, according to thedata company Burbio.com. At one point in the school year, 18 states mandated masks in schools.
  
  “As Omicron has become the predominant variant, COVID-19 levels have shifted nationally and CDC no longer recommends universal masking in all schools. Instead, CDC recommends masking in schools in areas with high COVID-19 Community Levels. CDC will continue to follow the data and science and ensure our recommendations meet the moment we’re in,” Nordlund said in the statement.
  
  The American Academy of Pediatricssuggeststhat families continue to wear masks to protect children who are too young to wear a mask – under age 2 – or other family members who are immunocompromised or unvaccinated.
