  The texts between Favre and Bryant published in Mississippi Today are requested in the October 7 subpoena issued by Smith’s attorneys.
  
  It isn’t the first time communications with the quarterback have come up as part of the civil lawsuit related to misspent welfare funds.Text messages released last monthallegedly show Bryant worked to help Favre obtain funds to build a volleyball facility at the University of Southern Mississippi. Favre played football for the school from 1987-1990 and his daughter played volleyball there 2017-2022.
  
  Mississippi Today has reported thatat least $5 millionof welfare funds were channeled to build the volleyball facility.
  
  Neither Smith, Favre, VanLandingham, nor Bryant have been criminally charged with anything related to this matter. Bryant also has not been named as a defendant in the state’s civil suit. Smith, VanLandingham and Favre, however, are all named as defendants in the state’s large civil suit trying to claw back some of the funds misspent in the scheme.
