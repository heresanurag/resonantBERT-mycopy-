  ### Story highlights
  
  This page includes the show Transcript
  
  _January 26, 2022_
  
  _Less than two weeks away from the 2022 Winter Olympics, some athletes are discussing their anxiety over missing events if they test positive for Covid. A new space telescope reaches its home in orbit, but it’s not revolving around the Earth. And a young Walmart “shopper” places a massive furniture order._
  
  [Click here to access the printable version of today’s CNN 10 transcript](http://transcripts.cnn.com/TRANSCRIPTS/2201/26/sn.01.html)
  
  _CNN 10 serves a growing audience interested in compact on-demand news broadcasts ideal for explanation seekers on the go or in the classroom. The show’s priority is to identify stories of international significance and then clearly describe why they’re making news, who is affected, and how the events fit into a complex, international society._
  
