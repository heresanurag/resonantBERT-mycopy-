title: "Arizona’s Senate race is suddenly close again"
date: "2022-10-27"
section: "Politics"
url: "https://www.cnn.com/2022/10/27/politics/arizona-senate-race-close-polling"
content: |
  A version of this story appeared in The Point newsletter. To get it in your inbox, sign up for freehere.
  
  A few weeks ago, Republican Blake Masters’ chances of knocking off Arizona Democratic Sen. Mark Kelly seemed remote. Kelly had outworked (andoutraised) Masters and it appeared as though some national Republicans were writing off the race.
  
  Things look different today. On Thursday, two election forecasts – from theCook Political Report with Amy WalterandPolitico– moved the race from the “lean Democrat” category to “toss up.”
  
  Wrote the Cook Political Report’s Jessica Taylor:
  
  “Talking with multiple sources this week, we have found across the board that Democrats acknowledge this is once again a margin-of-error race. We have seen tightening public polling as well.”
  
  (Worth noting: ACNN pollreleased earlier this month showed Kelly leading Masters 51% to 45% among likely voters.)
  
  Taylor noted that though the race was a toss up, it still favored Kelly – albeit slightly.Inside Elections, another campaign tipsheet,rates the race“tilt Democratic.”
  
  What’s changed from even a few weeks ago in the race? A few things:
  
  1) Republican Kari Lake is running stronger than expected in the governor’s race against Democrat Katie Hobbs, helping to lift the GOP ticket as a whole.
  
  2) Joe Biden (as I notedhere) simply isn’t popular nationally, and that fact will have a tendency to drag down even the most well-funded and competent of Democratic candidates – which Kelly absolutely is.
  
  3) After a Mitch McConnell-aligned super PACpulled outof the race, Masters was getting drubbed on TV. But of late, Donald Trump’ssuper PAChas begun to spend money to help close the ad gap.
  
  Masters remains a lackluster candidate whose past controversial comments have been mined time and again by Kelly’s campaign for material for negative ads.
  
  The Point: Sometimes, it’s better to be lucky than good. And Masters is, right now, benefitting from the rising Republican tide that is lifting GOP candidates around the country.
