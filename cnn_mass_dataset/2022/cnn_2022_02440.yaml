title: "Opinion: Half-Earth Day is not a celebration, but a warning"
date: "2022-10-22"
section: "Opinion"
url: "https://www.cnn.com/2022/10/22/opinions/half-earth-day-biodiversity-warning-strohl/index.html"
content: |
  Editor’s Note:Lydia Strohl is a freelance writer in Washington, DC. More of her workcan be found here. The views expressed in this commentary belong to the author. View moreopinionat CNN.
  
  When I first learned that October 22 marks Half-Earth Day, I thought it was because the date is six months to Earth Day. (True.) But it’s got a message all its own.
  
  Half-Earth is the notion that for humans to survive, we must retain earth’s waning biodiversity by reserving half the planet for nature, stabilizing large swaths of ocean, prairie, rainforest and desert to house the birds, insects and ecosystems that affect the water we drink, the food we eat, the air we breathe. Not to mention the economies, cultures and past-times that sustain us.
  
  The Half-Earth Project was inspired by legendary Harvard biologist E.O. Wilson, who died in 2021 at the age of 92. In “Half-Earth: Our Planet’s Fight for Life,” Wilson wrote: “We would be wise to find our way as quickly as possible out of the fever swamp of dogmatic religious belief and inept philosophical thought through which we still wander. Unless humanity learns a great deal more about global biodiversity and moves quickly to protect it, we will soon lose most of the species composing life on Earth.”
  
  This means us, people, who Wilson calls a “lucky accident of primate evolution during the late Pleistocene.”
  
  Not a particularly happy accident, perhaps, for Planet Earth.Since 1970, the global population hasdoubled to nearly 8 billion. And in those five decades, monitored wildlife populations have declined by anaverage of 69%, warns the recent Living Planet Report, World Wildlife Fund’s study of the abundance of species worldwide (select vertebrate species; others are difficult to track). Freshwater populations have been hit the hardest, declining 83% over this time period.One million plant and animal species, out of theestimated 8 millionout there, are in danger of extinction.
  
  Opinion: For years, I was insulated from the effects of climate change. Evacuating my home was a rude awakening
  
  It is time to change our ways, fromusingtostewardingearth’s resources. People cannot thrive at the expense of nature. Latin America has seen a whopping 94% decline in species populations. Meanwhile, deforestation for crops and cattle, legal and illegal mining and logging, development, and devastating wildfires have contributed to a 20% loss of the Amazon rainforest –an area the size of France. This doesn’t just affect the 350 indigenous communities and untold species of plants, animals and insects living there, but all of us, as the400 billion treesthat make up the Amazon rainforest produce anestimated 6%of earth’s oxygen.
  
  What makes humans more comfortable on earth now threatens the planet: energy, food production, growth in housing and commercial development. These are all systems Wilson believed we need to rethink. But just as the problem lies with us, so does the solution.
  
  To move people to action, Jennifer Morris, CEO of The Nature Conservancy, thinks it’s important to talk about what matters to them, citing health care, clean air and jobs. Morris spoke at a recent Half-Earth Day conference hosted by Smithsonian Institution and theE.O. Wilson Biodiversity Foundation, bringing together government, community, corporate and conservation stakeholders like The Nature Conservancy, Audubon, and supporters like the Bezos Earth Fund. “Governments aren’t going to move until people move,” Morris said.
  
  The problems are thorny, however: even high-minded efforts can provoke Mother Nature. “The biggest threat to forests in Virginia is solar,” Morris said, referring toclean energy projectsslated to take out thousands of acres of trees. “We can be smart where we put solar and wind … in a way that doesn’t undermine biodiversity,” Morris added.
  
