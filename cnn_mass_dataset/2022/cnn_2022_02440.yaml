  The Half-Earth Project looks at growth through the lens of nature, with tools that map richness and rarity in wildlife populations as well as human pressures and existing protections, hoping to inform both preservation and development. I dial their online map down to my community, close to the screaming orange urban mass of Washington, DC, but dotted with green conservation areas established by both public and private authorities.
  
  The E.O Wilson Biodiversity Laboratory – located in Mozambique’sGorongosa National Park, which was once decimated by civil war and other human ills – provides a blueprint not only for rebuilding biodiversity but alsotrainingnew biologists and conservationists. The Half-Earth project also involves indigenous communities – which have traditionally balanced human needs with nature – in their programs, bringing together past and present, to work together towards a durable plan for our future.
  
  While the first Earth Day took place in 1970 to celebrate conservation efforts, Half-Earth Day is more of a caution. Whatever your beliefs on climate change, this much is clear. We’re losingwhitetip sharksandharpy eagles, the inspiration for ‘Fawkes’ in the Harry Potter films. Gone are theBramble Cay melomys, a small rodent whosehabitat, food source and nesting siteswere eradicated by storms and unprecedented flooding. You may never see a pink dolphin, but the interplay of plant, animal and insect species sustains us.
  
  Attacking a problem of this scale requires all of us – from those seated in governments and board rooms to our own kitchen tables – to come together. Too often, “solutions” whipsaw between administrations with their own political agendas. “Meanwhile, we thrash about, appallingly led, with no particular goal in mind other than economic growth, unfettered consumption, good health, and personal happiness,” Wilson wrote. He placed his faith in nature, and we should too.
  
  “We need to listen to what the birds are telling us. We’velost three billion birdsin my lifetime,” says Audubon CEO Elizabeth Gray, who is in her 50s. “Birds are sentinels for healthy land and water – if birds are in trouble, people are too.”
  
  The canary is singing. Listen, before its voice is stilled.
  
  An earlier version of this article misspelled Elizabeth Gray’s last name.
