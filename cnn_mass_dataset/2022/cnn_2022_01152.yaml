title: "Exclusive: ‘I’m just not going to leave’: New book reveals Trump vowed to stay in White House"
date: "2022-09-12"
section: "Politics"
url: "https://www.cnn.com/2022/09/12/politics/trump-vowed-to-stay-in-white-house-haberman-book/index.html"
content: |
  Former President Donald Trumprepeatedly told aides in the days following his 2020 election loss that he would remain in the White House rather than let incomingPresident Joe Bidentake over, according to reporting provided to CNN from a forthcoming book by New York Times reporter Maggie Haberman.
  
  “I’m just not going to leave,” Trump told one aide, according to Haberman.
  
  “We’re never leaving,” Trump told another. “How can you leave when you won an election?”
  
  Trump’s insistence that he would not be leaving the White House, which has not been previously reported, adds new detail to the chaotic post-election period in which Trump’s refusal to accept his defeat and numerous efforts to overturn the election result led tothe January 6, 2021, attackon the US Capitol by pro-Trump rioters.
  
  Haberman’s book, “Confidence Man: The Making of Donald Trump and the Breaking of America,” is being released on October 4.
  
  The revelations from the book come as investigators in the US House and the Justice Department probe Trump’s refusal to cede power after the2020 election. The House select committee investigating January 6 is planning more hearings and a final report this fall, while federal investigators have recently served several former Trump aides with subpoenas.
  
  Haberman, a CNN political analyst, has covered Trump for the New York Times since his 2016 presidential campaign. Her stories made her a frequent target of Trump’s vitriol on Twitter.
  
  Haberman writes that in the immediate aftermath of the November 3 elections, Trump seemed to recognize he had lost to Biden. He asked advisers to tell him what had gone wrong. He comforted one adviser, saying, “We did our best.” Trump told junior press aides, “I thought we had it,” seemingly almost embarrassed by the outcome, according to Haberman.
  
