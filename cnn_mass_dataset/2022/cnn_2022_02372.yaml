title: "Polio has reemerged in the US. Who should get a polio vaccine now?"
date: "2022-09-15"
section: "Health"
url: "https://www.cnn.com/2022/09/15/health/polio-paralysis-vaccine-health-wellness"
content: |
  New York’s governor hasdeclared a state of emergencyafter health officials detected poliovirus in the wastewater of five counties – evidence the disease is circulating. The declaration also follows a report from the US Centers for Disease Control and Prevention of an unvaccinated person in Rockland County, New York, who wasdiagnosed with paralytic polio this summer– the first case identified in the United States in nearly a decade.
  
  Understandably, these events have sparked a lot of questions: Why does one case of polio worry officials? What does it mean to find poliovirus in wastewater? Who should be worried about contracting the disease? If someone had the vaccine years ago, are they still protected now?
  
  Polio 101: Signs, symptoms and dangers of an ancient virus
  
  To understand more about this disease, which most people alive today have never experienced, I spoke with CNN Medical Analyst Dr. Leana Wen, an emergency physician and professor of health policy and management at the George Washington University Milken Institute School of Public Health. She is also author of“Lifelines: A Doctor’s Journey in the Fight for Public Health.”
  
  Dr. Leana Wen:An Augustreport from the CDCsaid that “even a single case of paralytic polio represents a public health emergency in the United States.” This is for two main reasons.
  
  First, polio is a disease with the potential for very severe consequences.During its peak in the 1940s and 1950s, polio resulted in tens of thousands of children becoming paralyzed every year. Thousands died from the virus.
  
  This changed with the introduction of vaccines that are highly effective –more than 99% effectiveat protecting against paralytic polio. Thanks to massive vaccination campaigns, the last incidence of wild-type polio occurred in 1979 – and it had been considered to be eliminated in the United States. The reemergence of such a disease, which can have such serious impacts, is a major threat.
  
  My mother's walk through life with polio
  
  Second, the one case of paralytic polio may be the tip of a large iceberg. Mostcases of polio infectionare asymptomatic and do not cause paralysis. Symptoms – which can include fatigue, fever and diarrhea – tend to be mild and can resemble those of other viruses. Public health officials are worried there are many other people who may be infected with polio and could be transmitting it unknowingly.
  
  This is particularly concerning because Rockland County, where the recent paralytic case of the virus was diagnosed, has a polio vaccination rate ofjust 60%. In some parts of the county, the vaccination rate is as low as 37%. These numbers are far below the threshold needed for herd immunity, and that means there are a lot of individuals in the area who are vulnerable to polio infection and potential severe outcomes.
  
  Wen:Finding poliovirus in sewage means one of two things: That there are people actively infected with polio who are shedding the virus, or that the virus signal could be from people who recently received the oral polio vaccine (OPV). OPV is no longer given in the United States – since 2000, the version used in the US is the inactivated polio vaccine (IPV), which is injected – but other countries are still using OPV, and it’s possible that travelers from those places are shedding virus from the vaccine.
  
  In rare circumstances, the weakened virus from people who just received OPV could cause paralytic polio in unvaccinated individuals – which is a major reason why OPV is no longer used in the US.
  
  One additional point of concern is that a wastewater sample from Nassau County on Long Island has beengenetically linkedto the paralytic polio case identified in Rockland County. (The two counties are not adjacent, rather approximately 40 miles apart.) This is further evidence of community spread that’s going largely undetected.
  
  Wen:Polio is an infectious disease thatcan be transmitted in a number of ways. A primary route is fecal-oral, meaning someone could get polio if they come into contact with feces from an infected person. This could occur, especially in children, through putting objects like toys that have been contaminated with feces into the mouth.
  
  Poliovirus could also be transmitted through the respiratory route – for example, if someone who is infected coughs or sneezes and those droplets land around your mouth. It’s worth noting that people who are vaccinatedcould also contract polio and pass it on to others, though they are extremely well-protected from severe illness themselves.
  
  Wen:Again, people who are vaccinated against polio are extremely well-protected from paralytic polio, and should not be concerned at this point. It should be pointed out, however, that while IPV is very good at preventing the most severe potential effects of the disease, people who received the vaccine could still be carriers of polio and could transmit it to others. Those at risk for serious outcomes are people who are unvaccinated and those who are incompletely vaccinated, including young children under 6 who have not yet completed their polio vaccine series.
  
  Wen:TheCDCrecommends children receive four doses of IPV. The first is given at 2 months of age, the second at 4 months, the third between 6 and 18 months old and the fourth between 4 and 6 years old.
  
  Adults who have never been vaccinated against polio should receive three doses of IPV. The first should be given as soon as possible, the second one to two months after that and the third six to 12 months after the second.
  
  Wen:The protection against severe diseaseremains strong for many yearsafter immunization; it’s believed it probably lasts for a lifetime. There is no need for most vaccinated people to get more doses.
  
  Opinion: How a virus seemingly returned from the dead
  
  However, if someone has not completed their original vaccine series, they should get their remaining doses. Some fully vaccinated people can also receive an additional lifetime booster of IPVunder specific circumstances– for example, if they have direct contact with someone suspected of having polio or if they are health care workers with higher risk of exposure to people with the disease.
  
  Wen:You could check with your primary care physician’s office or state health department to see whether they have records of your immunizations. If they don’t, and there is no other way for you to verify – for example, by asking parents or other relatives or caregivers – you should speak with your health care provider about getting the full vaccine series for polio now. There is no blood test that can reliably detect whether you’re fully vaccinated against polio.
  
  Wen:People who have yet to receive any doses or are incompletely vaccinated should make sure to get their entire polio vaccine series right away. This is particularly important if they live in or around Rockland County in New York – but really everyone should get caught up with their routine immunizations.
  
  It was a tragedy decades ago that so many children became permanently paralyzed and even died from polio. This should not happen again, since we have such effective vaccines that can prevent severe consequences of the disease.
