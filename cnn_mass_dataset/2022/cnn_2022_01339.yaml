  Nehammer said Bucha was “a place of war crimes.”
  
  “We have to make those war crimes known to the UN, and international justice must begin investigating and fight these crimes,” he said during a news conference with Zelensky.
  
  The twin visits by Johnson and Nehammer came a day after top European Union officials made a trip to Ukraine. European Commission President Ursula von der Leyen and Josep Borrell, the bloc’s top diplomat, visited Kyiv and Bucha on Friday, alongside Slovak Prime Minister Eduard Heger.
  
  During the visit, von der Leyen ceremoniouslyhanded Zelensky an EU questionnaireto complete –  a symbolic, but important step towards Ukraine’s membership of the bloc. Tweeting about the move, von der Leyen said: “We will accelerate this process as much as we can, while ensuring that all conditions are respected.”
  
  The prime ministers of theCzech Republic, Poland and Sloveniavisited Kyiv last month, at a time when it was still regularly targeted by Russian strikes. Like Johnson’s visit on Saturday, that trip was kept secret until the three leaders were in the country, traveling on a train from eastern Ukraine.
