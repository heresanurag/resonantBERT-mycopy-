  Austria is not part ofNATOand does not supply weapons to Ukraine. It has, however,provided Ukraine with humanitarian aidand helmets and protection vests for civilian use, according to a statement from the Austrian Chancellery.
  
  Nehammer said Saturday that while his country is militarily neutral, “We understand we have to help where injustice and war crimes take place.”
  
  According to his office, Nehammer was set to meet with Prime Minister Denys Shmyhal and Kyiv Mayor Vitali Klitschko, before returning to Austria on Saturday evening.
  
  Nehammer was also due to visit the Kyiv suburb ofBucha, which endured five weeks of near-constant firefights; after Russian forces withdrew from the town, the bodies of at least 20 civilians werefound lying in one street,some with their hands tied.
  
