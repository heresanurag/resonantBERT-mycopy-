title: "Ray Liotta’s daughter Karsen posts a sweet tribute to him"
date: "2022-06-10"
section: "Entertainment"
url: "https://www.cnn.com/2022/06/10/entertainment/ray-liotta-daughter-tribute/index.html"
content: |
  Ray Liotta’s daughter, Karsen, 23, posted a tribute to her dad onInstagram.
  
  “Those who knew him, loved him,” she wrote alongside a photo of the pair. “You are the best Dad anyone could ask for. I love you. Thank you for everything.”
  
  She added a heart emoji.
  
  On May 26, Liottadiedin his sleep at age 67 while in the Dominican Republic filming his latest project, “Dangerous Waters.”
  
  HesharedKarsen with his ex-wife, Michelle Grace. He is survived by his fiancéeJacy Nittolo.
  
  Liotta supported his daughter’s acting ambitions during an “Absolute Radio” interview in 2016.
  
  “I am a true believer that if this is what she wants to do, what am I gonna do?” he said. “It’s what you do and how you handle that time in between, which is what messes up a lot of actors.”
