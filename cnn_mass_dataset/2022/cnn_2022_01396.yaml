title: "Rage Against the Machine called to ‘abort the Supreme Court’ at their first concert in 11 years"
date: "2022-07-11"
section: "Entertainment"
url: "https://www.cnn.com/2022/07/11/entertainment/rage-against-the-machine-abort-supreme-court-cec/index.html"
content: |
  In their first show in over a decade, rock-rap renegadesRage Against the Machinedecried the Supreme Court’s decision tooverturn Roe v. Wadeand end the federal constitutional right to an abortion.
  
  Members of the band, which has long been known for its anti-authority stance and its music’s political messages, didn’t give impassioned speeches on the first stop of their reunion tour – singer Zack de la Rocha and his crew simply rocked while a giant screen behind them did the talking.
  
  Milwaukee Journal-Sentinelreporter Piet Levy, on hand to review the show,filmed a segment of the concertduring which de la Rocha repeatedly screamed “freedom” while a video screen flashed with statements about gun violence, Black maternal mortality and abortion access.
  
  “Forced birth in a country that is the only wealthy country in the worldwithout any guaranteed paid parental leaveat the national level,” read the screen for several seconds, according to Levy’s video.
  
  Billie Joe Armstrong says he'll renounce his US citizenship over Roe v. Wade reversal
  
  “Forced birth in a country where Black birth-givers experience maternal mortality two to three times higher than that of white birth-givers,” the screen read afterwards, citing astatistic from the US Centers for Disease Control and Prevention.
  
  The screen then read: “Forced birth in a country where gun violence is the number one cause of death among children and teenagers,” a reference to recent findings from health nonprofitKaiser Family Foundationand an article in theNew England Journal of Medicinethat firearms are the current leading cause of death for children and teens in the US.
  
  The final message was brief but clear: “ABORT THE SUPREME COURT.” Many audience members erupted into cheers.
  
  Halsey responds to fans who left show in Phoenix over speech supporting abortion
  
  For some of the show, guitaristTom Morelloalso wore a shirt that read “I [Heart] CRT,” a reference tocritical race theory,an educational lens that incorporates the history of racism and inequality into American history lessons,Rolling Stonereported.
  
  Rage Against the Machine’s anti-establishment music, which criticizes wealth inequality, racism and powerful institutions, has become their signature. One of the group’s most famous songs, “Killing in the Name,” wasinspired by the beating of Rodney Kingat the hands of Los Angeles police and the protests against police brutality that followed.
