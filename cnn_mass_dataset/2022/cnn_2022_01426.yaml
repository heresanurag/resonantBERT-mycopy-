title: "How to watch the West Virginia and Nebraska primary elections"
date: "2022-05-10"
section: "Politics"
url: "https://www.cnn.com/2022/05/10/politics/election-coverage-may-10-primaries/index.html"
content: |
  It’s Election DayinWest VirginiaandNebraska, where key primary races of the 2022 election cycle are taking place. The races, which will test former President Donald Trump’s influence over the Republican Party, include this year’s first US House member-vs.-member matchup in West Virginia and a controversial, Trump-backed candidate facing off with the Republican supported by the state’s term limited governor, Pete Ricketts.
  
  In West Virginia, Republican Reps. Alex Mooney and David McKinley are running against each other after the state lost a seat in reapportionment. Trump is supporting Mooney, while McKinley, who voted for the bipartisan infrastructure bill, is backed by West Virginia’s Republican Gov. Jim Justice and Democratic Sen. Joe Manchin.
  
  Republican Rep. Carrol Miller, who currently represents West Virginia’s 3rd Congressional District, is running in the state’s 1st Congressional District, where she faces four Republican challengers – though she has the backing of Trump and holds a steep fundraising advantage.
  
  In the contest that will decide Nebraska’s GOP gubernatorial nominee, term-limited Ricketts has backed Jim Pillen, a hog farmer and member of the University of Nebraska board of regents, to replace him, whileTrump has endorsed controversial businessman Charles Herbster. Herbster faces allegations he inappropriately touched women, including Republican state Sen. Julie Slama, but he has denied the allegations. State Sen. Brett Lindstrom is also in the running. The winner will likely face Democratic state Senator Carol Blood in the November general election.
  
  In Nebraska’s 1st Congressional District, former Republican Rep. Jeff Fortenberry, whoresigned from Congressearlier this year after being convicted in regard to an investigation looking into illegal campaign contributions, will remain on the ballot because he missed the deadline to withdraw from the race ahead of his resignation from Congress. Four other Republican candidates are running in the primary, including state Sen. Mike Flood, who is favored to win. While there will be a special election on June 28 to fill the remainder of Fortenberry’s term, the Republican primary nominee will advance to a general election in November and will likely face Democratic state Sen. Patty Pansing Brooks.
  
  Meanwhile, in Nebraska’s 2nd Congressional District, where Republican Rep. Don Bacon has for years confounded Democrats who try to flip the seat, two Democrats are vying for the nomination: state Sen. Tony Vargas, a former member of the Omaha Public Schools Board and former public school teacher, and Alicia Shelton, a mental health practitioner and counselor who ran for US Senate in 2020.
  
  You can follow along with results onCNNandcnn.com. CNN’s decision desk will be monitoring results and will make projections accordingly.
  
  Polls close for in-person voting in West Virginia close at 7:30 p.m. ET. Mail-in ballots can be received by May 16 if postmarked by Election Day. Hand-delivered ballots must have been returned by May 9. In-person early voting took place between April 27 and May 7.
  
  Polls close for in-person voting in Nebraska at 9:00 p.m. ET. Mail-in ballots must be received by the time polls close on May 10. In-person early voting took place between April 11 and May 9.
