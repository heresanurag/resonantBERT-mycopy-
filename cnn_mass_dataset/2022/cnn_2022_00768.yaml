title: "What to know about the NRA’s annual meeting in Houston"
date: "2022-05-25"
section: "Politics"
url: "https://www.cnn.com/2022/05/25/politics/national-rifle-association-annual-meeting-what-to-know/index.html"
content: |
  The National Rifle Association is set to hold its 2022 annual meeting in Houston on Friday, bringing together its top brass and several notable conservatives, including former President Donald Trump, forthe first time in three years.
  
  The NRA’s annual meeting was canceled in2020and2021due to the coronavirus pandemic, but this year, the organization is moving ahead with its plans, holding the meeting at a time when both gun rights and the organization itself have come under intense scrutiny, especially after ashooting at an elementary school in Uvalde, Texas, left 21 dead.
  
  Here’s what we know about the 2022 annual meeting.
  
  Despite the controversy surrounding this year’s convention, a number of high-profile Republicans are set to participate in the event, with some scheduled to deliver speeches:
  
  NRA members were also expecting to hear from Texas Gov. Greg Abbott, but the Republican canceled his in-person appearance to instead attend a news conference in Uvalde, with his spokesperson telling the Dallas Morning News Thursday evening that the governor will address the convention “through prerecorded video.”
  
  Friday’s meeting will feature remarks from NRA head Wayne LaPierre and Jason Ouimet, the executive director of the group’s lobbying arm, according to the event website.
  
  The former President, who maintained a close relationship with the gun lobby and its activists throughout his presidency,spoke at the 2019 event,which marked his fifth consecutive speech to the annual meeting.
  
  Texas Lt. Gov. Dan Patrick, who appeared alongside Abbott during a press conference Wednesday, said in a statement he was canceling his appearance, “after prayerful consideration and discussion with NRA officials.”
  
  “While a strong supporter of the Second Amendment and an NRA member, I would not want my appearance today to bring any additional pain or grief to the families and all those suffering in Uvalde,” Patrick said Friday.
  
  On the federal level, two GOP lawmakers have backed out of the convention, though neither cited the deadly shooting in Uvalde as the reason for their cancellations:
  
  Notably, at least four musicians who were set to sing in a concert at this weekend’s convention havecanceled their performances, citing the shooting in Uvalde:
  
  “I just did not believe it was the right thing to do,” Gatlin told CNN’s Pam Brown on Thursday. “It would have been kind of a classy move on the NRA’s part, and they need some good PR right now, if they’d cancel the whole thing and said, ‘Hey, we’re going to go in here for one big moment and say a prayer for those folks or have a moment of silence, and we’ll come back and do this later. We can always have our big convention.’”
  
  He emphasized that he still supports the NRA and believes in the Second Amendment, but that he “didn’t think it was a good time to go down to Houston and have a party.”
  
  The NRA’s 2022 Annual Meeting & Exhibits is scheduled to take place from May 27-29, according to theevent website.The leadership forum, which the organization bills as “one of the most politically significant and popular events in the country,” will take place Friday afternoon.
  
  The leadership forum will be held in Houston’s George R. Brown Convention Center, the same location it was going to be at last September for the 2021 annual meeting.
  
  The annual meeting is only open to NRA members. The organization currently has over five million members, according to itswebsite.
  
  The NRA said that because Trump will be at the event, the US Secret Service “will take control of the General Assembly Hall and have magnetometers in place before entry.”
  
  Attendees areprohibited from bringing“firearms, firearm accessories, knives, and other items,” including backpacks and selfie sticks.
  
  Friday’s annual meeting will take place at a time when gun rights and the NRA have come under intense scrutiny, with supporters of gun control turning their attention to the organization this week after an 18-year-old gunmanfatally shot 19 children and two teachersat anelementary school in Uvalde, Texas, before he was killed by law enforcement, officials said.
  
  The NRA condemned the shooting in a statement Wednesday, calling it a “horrific and evil crime.”
  
  “Although an investigation is underway and facts are still emerging, we recognize this was the act of a lone, deranged criminal,” the group said. “As we gather in Houston, we will reflect on these events, pray for the victims, recognize our patriotic members, and pledge to redouble our commitment to making our schools secure.”
  
  The massacre is the deadliest shooting at a school since the Sandy Hook massacre in Connecticut in 2012 that left 26 people dead, including 20 children aged between 6 and 7 years old.
  
  The NRA has also been in a fight to remain afloat after New York Attorney General Letitia James sued to dissolve the NRA for allegedly misusing charitable funds. In March, a New York State Supreme Court justiceblocked James’ attempt to dissolve the organizationbut allowed her suit against it to move forward.
  
  And observers are also awaiting a decision from the US Supreme Court in thebiggest Second Amendment case it has taken upin more than a decade. The justices are considering whether to strike down a New York gun law enacted more than a century ago that places restrictions on carrying a concealed gun outside the home.
  
  At2019’s annual meeting,Trump announced that he would not ratify a United Nations arms trading treaty and then signed a message to the Senate in front of an audience of NRA leaders.
  
  The meeting was also notable because then-NRA President Oliver North told members during it that he would not be renominated president of the group following a dispute with LaPierre. The announcement was made in a letter in which North said he hoped he would be renominated for a second term but, “I am now informed that will not happen.”
  
  Already a controversial figure due to his involvement in the Iran-Contra scandal, North joined the NRA at a critical juncture for it as it responded to renewed calls for gun control in the wake of the 2017 school shooting in Parkland, Florida.
  
  This story has been updated with additional information Friday.
