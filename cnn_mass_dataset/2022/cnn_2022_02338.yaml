title: "CDC issues health advisory about acute hepatitis in children"
date: "2022-04-21"
section: "Health"
url: "https://www.cnn.com/2022/04/21/health/hepatitis-unknown-children-cdc-advisory/index.html"
content: |
  An investigation continues into cases of acute hepatitis with unknown causes among children who had adenovirus infections.
  
  In ahealth advisory Thursday, the US Centers for Disease Control and Prevention alerted health care providers and public health authorities to the investigation and recommended that providers consider adenovirus testing in children with hepatitis when the cause is unknown, adding that testing the blood in whole – not just blood plasma – may be more sensitive.
  
  The advisory notes that “a possible association between pediatric hepatitis and adenovirus infection is currently under investigation.”
  
  UK, US health officials investigating cases of severe hepatitis with unknown causes in children
  
  Last week, public health officials in the United States and the United Kingdom announced that they had launched an investigation into cases of severe acute hepatitis in children. At the time, theWorld Health Organization had identified74 cases among children across the UK, andAlabama health officials identifiednine cases of hepatitis in children, ages 1 to 6, who also had tested positive for adenovirus since October. None of the children had Covid-19.
  
  In its latest health advisory, the CDC asks that health care providers or state public health authorities alert the agency to any child younger than 10 who may have been diagnosed with hepatitis due to an unknown cause since October.
  
  “In November 2021, clinicians at a large children’s hospital in Alabama notified CDC of five pediatric patients with significant liver injury, including three with acute liver failure, who also tested positive for adenovirus. All children were previously healthy,” CDC officials wrote. “Case-finding efforts at this hospital identified four additional pediatric patients with hepatitis and adenovirus infection for a total of nine patients admitted from October 2021 through February 2022; all five that were sequenced had adenovirus type 41 infection identified.”
  
