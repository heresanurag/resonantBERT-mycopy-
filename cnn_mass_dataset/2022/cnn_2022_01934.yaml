  _September 12, 2022_
  
  _CNN 10 is kicking off its first show of the 2022 fall season! Today, we’re looking back at the life and legacy of Britain’s Queen Elizabeth II, we’re observing remembrances of the lives lost on September 11th, 2011, and we’re featuring an update on NASA’s next mission to the moon._
  
  [_Click here to access the printable version of today’s CNN 10 transc_ ript](http://transcripts.cnn.com/TRANSCRIPTS/2209/12/sn.01.html)
  
  _CNN 10 serves a growing audience interested in compact on-demand news broadcasts ideal for explanation seekers on the go or in the classroom. The show’s priority is to identify stories of international significance and then clearly describe why they’re making news, who is affected, and how the events fit into a complex, international society._
  
