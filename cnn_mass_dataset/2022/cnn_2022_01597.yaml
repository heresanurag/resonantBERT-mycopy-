title: "Harry Styles, Elton John honor Queen Elizabeth during their concerts"
date: "2022-09-09"
section: "Entertainment"
url: "https://www.cnn.com/2022/09/09/entertainment/harry-styles-elton-john-queen-elizabeth-died-death/index.html"
content: |
  Two of the UK’s biggest music stars paid tribute toQueen Elizabethin concert on Thursday.
  
  Harry Stylespausedto honor the late monarch during his latest Madison Square Garden show.
  
  “From my homeland there’s some very sad news today,” Stylestoldthe crowd Thursday night, before he led the audience in a round of applause.
  
  “Thank you, Madison Square Garden,” he said.
  
  Styles’ fellow Brit Elton John alsopaid tributeto Queen Elizabeth with kind words at his concert in Toronto.
  
  “I’m 75, and she’s been with me all my life, and I feel very sad that she won’t be with me anymore, but I’m glad she’s at peace,” John told the crowd. “I’m glad she’s at rest, and she deserves it. She worked bloody hard.”
  
  Britain’s Queen Elizabeth IIdiedon Thursday at the age of 96, bringing to a close a reign that spanned seven decades.
