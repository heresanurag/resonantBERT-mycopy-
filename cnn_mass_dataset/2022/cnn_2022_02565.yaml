  He says current realities require that the government continue to incentivize the production of new therapies, and he expects that the Biden administration will again try to ask Congress to pass more funding to do that.
  
  “And the truth is that if we want monoclonals to protect high-risk people – which we do – then at this point, given the speed of viral evolution, the US government has to be a major player in that role,” Jha said. “The market cannot take care of it by itself.”
