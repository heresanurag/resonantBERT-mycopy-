  But antibody therapies are particularly important for people with immune function that has been blunted by drugs, disease or age. These are the same people whose bodies don’t respond robustly to vaccines.
  
  The antibodies are also needed to help people who can’t take antiviral therapies because of possible reactions with other medications.
  
  White House Covid-19 Response Coordinator Dr. Ashish Jha says the federal government has been spurring the development of new monoclonal antibodies during the pandemic by promising to purchase new therapies after they’re made.
  
  The government can’t do that anymore, he said, because Congress has declined to pass additional funding for the Covid-19 response.
  
  As a result, development of new antibodies – and other new therapeutics – is lagging.
  
  “So even if we got money today, it would take us many months to bring a monoclonal into the marketplace, and we don’t have the money today anyway,” Jha told CNN.
  
  US without 'adequate' Covid-19 tests this winter due to congressional inaction, White House says
  
  Jha said that means the nation is facing fall and winter with a smaller arsenal against the virus, just when it needs to expand its options.
  
  “There is not a monoclonal sitting ready to go tomorrow that we could just buy off the shelf,” he said.
  
  Antibodies are a losing proposition for companies because it takes millions of dollars of investment to make them and because the virus is evolving so fast, they might be effective for only a few months.
  
  “That is a terrible business model,” Jha said.
  
  The administration has been thinking about ways to commercialize some parts of the Covid-19 response – to get out of the business of buying vaccines and therapies – ultimately passing the costs on to consumers and insurers. But Jha says the process has to be guided by “the needs on the ground and the realities of the virus.”
  
