  Leading dental care, patients, and seniors’ advocacy organizations along with congressional Democratslargely supportthe proposal. But at the same time, they criticized its shortcomings.
  
  “This new rule merely expands coverage to align with the most recent medical literature and accepted standards of care,” said Rep. Lloyd Doggett (D-Texas), who chairs the Ways and Means health subcommittee and who has advocated for comprehensive coverage, said in a statement to KHN. “It is not a panacea.”
  
  In June, Doggett spearheaded alettersigned by more than 100 colleagues pressing CMS to expand dental services for certain medical conditions. In July,22 Senate Democratsalso urged CMS to expand dental coverage.
  
