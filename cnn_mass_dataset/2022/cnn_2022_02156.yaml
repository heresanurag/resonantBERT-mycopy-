  Editor’s Note:Sign upto get this weekly column as a newsletter. We’re looking back at the strongest, smartestopinion takesof the week from CNN and other outlets.
  
  In a 1932 case, US Supreme Court Justice Louis D. Brandeis argued that the state of Oklahoma had the right to regulate companies selling ice, a vital commodity in the days before electric refrigerators were widely adopted.
  
  States must have the power to reshape “our economic practices and institutions to meet changing social and economic needs,” hewrote in a dissenting opinion.
  
  Under America’s federal system, “a single courageous state may, if its citizens choose, serve as a laboratory” and conduct “social and economic experiments without risk to the rest of the country.” Even though he was on the losing side, Brandeis’ opinion would be remembered for casting the states as “laboratories of democracy.”
  
  Inherent in that view is the possibility some state experiments will go wrong; even wildly wrong, as many believe is happening today amid an intensifying culture war.
  
  Red states are enacting measures restricting what can be taught in schools — with Florida’s “don’t say gay” law and Virginia’s executive order banning the teaching of critical race theory among them — and reducing access to voting in the wake of former President Donald Trump’s lies about widespread fraud in the 2020 election. And, last week, Oklahoma, Kentucky and Florida put in place new restrictions on abortion that appear to violate the landmark Supreme Court decision Roe v. Wade.
  
  “In red states,it’s open season on women’s rights,” wroteJill Filipovic. “Several Democratic-dominated states, on the other hand, are taking proactive steps to ensure abortion access. In Maryland, a new law means that trained medical professionals other than doctors will be able to legally perform abortions in the state.”
  
  Four years before the Oklahoma ice decision, Justice Brandeis invoked the right to privacy in another dissenting opinion with long-lasting implications. Wiretapping someone’s phone without a warrant violates the Fourth Amendment, Brandeis contended. The framers of the Constitution “conferred, as against the government,the right to be let alone— the most comprehensive of rights and the right most valued by civilized men.”
  
  The “right to be let alone” became the basis for the Supreme Court’s 1973 ruling in favor of abortion rights, which now is under assault.
  
  In the Washington Post,Paul Waldmanwrote “when the history of how American women lost their reproductive rights is written, the bill-signing that took place in Oklahoma City on Tuesday should be acknowledged as a key moment when the shrinking window of possibility that the Supreme Court might hold back from overturning Roe v. Wade essentially closed forever.” Gov. Kevin Stitt, a Republican, signed a “plainly unconstitutional bill” which outlaws almost all abortions.
  
  “Faced with upholding or striking down a near-total ban such as Oklahoma’s, the court can’t take half-steps,” Waldman observed. “The justices can’t find refuge in debating the number of weeks into a pregnancy restrictions might be allowed, or whether some hoops states make women jump through are acceptable and others aren’t. They’ll have to decide on the fundamental question:Either women have a right to abortions, or they don’t.And the court’s conservative majority clearly thinks they don’t,” he argued.
  
  “The reemergence of the culture war is downright chilling,”LZ Grandersonwrotein the Los Angeles Times. “Florida Gov. Ron DeSantis may be hogging all the attention for starting the flood of so-called ‘Don’t Say Gay’ bills across the country (we’re up to 12 and counting), but don’t sleep on the ‘don’t read gay’ effort that’s been working in the shadows.” Granderson noted “the American Library Assn. tracked 729 book challenges in 2021 and found the ‘most targeted books were by or about Black or LGBTQIA+ persons.’ “
  
  On Tuesday, April 5, Twitter announced that Elon Musk had been appointed to its board after he purchased a 9% stake in the social media company. Last weekend, Musk turned down the post. And on Thursday, he offered to buy the company for $43 billion in a bid to take Twitter private.
  
  “Will Musk actually have the cash and attention span to follow through on his proposed acquisition, and will Twitter say yes? Who knows?The word ‘unpredictable’ doesn’t do justice to this moment,”Shira Ovidewrote in her New York Times newsletter.
  
  “But imagine that Musk eventually buys Twitter from the stockholders who own it today. The closest comparison to this might be the 19th-century newspaper barons like William Randolph Hearst, Joseph Pulitzer and the fictional Charles Foster Kane, who used their papers to pursue their personal agendas, sensationalize world events and harass their enemies,” wrote Ovide.
  
  In an interview at the TED conference Thursday, Musk expanded on his complaints about the way Twitter moderates posts. He suggested platforms should be evaluated based on this test: “Is someone you don’t like allowed to say something you don’t like? And if that is the case, then we have free speech.”
  
  In the Washington Post,Max Bootwrote Musk, who has 82 million Twitter followers, “engages in online bullying and traffics in hyperbole and outrage, such as comparing Canadian Prime Minister Justin Trudeau to Adolf Hitler for imposing public health regulations … Anyone who thinks the problem with social media is too much content moderation, rather than too little, should not own one of the most powerful platforms online.”
  
  Kara Alaimoobserved, “What’s essential to a functioning democracy is accurate information so that people can make informed decisions about how to cast their ballots and protect their health — not the kinds of potentially deadly disinformation about Covid-19 and elections that have been circulating widely on the platform (and, of course, other social networks, as well).”
  
  “It’s also essential for Twitterto take steps against online abuse and harassment,which a report released by Amnesty International in December found is rampant against Twitter users — particularly against women and members of marginalized communities.”
  
  Ten people were shot on a rush-hour train in Brooklyn Tuesday morning, and the images of the resulting panic as riders rushed from the blood-strewn subway car were indelible.
  
  The shooting came nearly 30 years after a gunman opened fire on a Long Island Rail Road train. Among the victims were Dennis McCarthy, who was killed, and his son Kevin, who was injured.
  
  Carolyn McCarthy, a nurse, tried to rebuild her life after her husband’s death and son’s injury, becoming a passionate advocate for gun safety and eventually winning nine terms in Congress before her retirement in 2015.
  
  “People think the pain goes away; it doesn’t heal,” said McCarthy, who spoke to CNN Opinion’sStephanie Griffith. “I mean, we certainly go on with our lives. But my son still needs medical care. People I know who have been shot are still under medical care.Everyone you saw lying on that platform — how many of them don’t have insurance? How many will be possibly paralyzed? Or have head injuries?”
  
  “I left Congress because I was ill with cancer, but I always felt I would live long enough to see gun violence being dealt with,” McCarthy said. “And over the last couple of years, there have been minor wins, but a win is a win. More and more people are realizing we’re not taking away your right to own a gun, but, yes, there are restrictions that can save lives.”
  
  ToPaul Callan, who rode to crime scenes as an assistant district attorney in 1980s Brooklyn, last week’s subway shooting is a reminder of the vital role law enforcement plays.
  
  “One riding scene has haunted me to this day, and the senseless shooting on Tuesday in Brooklyn brought it back to mind.”
  
  “I arrived at a small, dingy takeout restaurant to find an elderly Chinese immigrant, the owner of the restaurant, sprawled out on the floor with a gunshot wound to his head. A plexiglass shield with a small opening was supposed to protect the owner from robbers. Somehow, his murderers got behind the plexiglass. The cops determined there had been only $12.00 in the register, which had been turned over to the robbers, who then proceeded to shoot the old man in the head. The murderers were never caught.”
  
  “Social workers and other violence de-escalators cannot protect the publicfrom the kind of deranged criminal who kills a restaurant owner over $12 or one who chooses to detonate a smoke grenade in a crowded subway car before opening fire on helpless passengers for no discernible reason.”
  
  Before the subway shooting,Deborah Padgettwrote about a spate of highly publicized crimes. “We have been here before — the horrific scene of a disheveled man experiencing homelessness suddenly attacking a stranger in New York City. Five homeless men in New York and Washington, DC, shot, two killed. Some corners of the media seized upon police descriptions of these incidents — citing the intersection of homelessness, drug use and mental illness to craft morality tales of untethered madness and bedlam on city streets. Public outcries once again converged on the urgent need to do something.”
  
  “Having spent decades engaged in research on the needs of persons experiencing homelessness and mental illness, I continue to marvel at how outrage and fear never seem to lead to the political will to make better, more effective social policies…”
  
  “We know that providing stable permanent housing with caring support can set in motion positive life changes.Public monies are better spent on realizing these goals than in activating police departmentsto use force and coercion to ‘manage’ homeless people rather than put an end to their ultimate deprivation.”
  
  “What was once one of the most beautiful and thriving capitals in Europe has been transformed over weeks of Russian aggression into an eerie ghost town,”Michael Bociurkiwwrote from Kyiv.
  
  Yes, Russian troops have withdrawn from the Kyiv region and refocused on the eastern Ukrainian territories claimed by Russian separatists. But “as long as Moscow has the ability to send deadly long-range cruise missiles anywhere onto Ukrainian territory,no city, town or village can be declared safe,” Bociurkiw observed.
  
  Daniel L. Davis, a former US Army Lieutenant Colonel, wrote, “Ukraine inflicted a stunning defeat of Russian President Vladimir Putin’s feeble attempt to capture the capital Kyiv in the war’s opening round. Now, Russia is preparing to launch a revised second phase in the east, shaping up to be the biggest tank battle in Europe since the Second World War: The Battle of Donbas.”
  
  “Putin’s primary target … appears less to be the capture of geographic territory in the Donbas than it doesthe destruction of Ukrainian Armed Forces defending in the east. Militarily, that looks like a far more attainable objective than the initial target of Kyiv. Outside of the urban capital, Ukrainian defenders won’t have the protection of buildings to shield them from Russian observation, and Putin’s troops will be able to use their mobility to their advantage.”
  
  “If Ukraine can store up enough supplies for its mobile tactical reserves and maintains the ability to reverse any Russian penetrations, it will give it a chance to blunt Russia’s advance and prevent encirclement. That will also buy time for Ukraine’s leaders and give them negotiating leverage with Putin as the casualties pile up for Moscow.”
  
  Putin’s invasion of Ukraine put Russia’s other neighbors, including Finland, on edge. Now that nation’s prime minister says it will decide within weeks whether to apply to join NATO, the western alliance Putin has vilified.
  
  “Finland is home to what are said to be the world’s happiest people,” wroteMarja Heinonen. “We have a high per capita income, stellar educational outcomes and a vaunted health care system. But our sense of contentment was shattered with Putin’s Ukraine invasion. Finland and Russia share a 1300-kilometer (830-mile) border.”
  
  “As a small country with a Russian goliath for a neighbor, Finland has, out of necessity, always pursued very pragmatic politics. At the heart of Finnish Realpolitik is the idea that, while decidedly a western democracy, we should not provoke Russia unnecessarily.But the atrocities in Ukraine have changed our minds.”
  
