title: "These are the 15 Republican senators who voted to pass federal gun safety legislation"
date: "2022-06-23"
section: "Politics"
url: "https://www.cnn.com/2022/06/23/politics/republican-senators-break-filibuster-gun-safety-bill/index.html"
content: |
  Fifteen Republican senators on Thursday joined Democratsin voting to passa bill to address gun violence, advancing the first major federal gun safety legislation in decades.
  
  The measure will next go to the House of Representatives – where Speaker Nancy Pelosi has promised to bring the legislation forward “first thing” – before it can go to President Joe Biden’s desk for his signature.
  
  The Republicans who voted in support of the measure are the same ones who had voted to break afilibusterearlier Thursday. Those GOP senators are:
  
  Of the 15, four – Blunt, Burr, Portman and Toomey – are retiring at the end of their terms.
  
  This headline and story have been updated to reflect the final Senate vote.
