title: "DNA analysis of soil from paw prints could help save Sumatra’s tigers"
date: "2022-12-04"
section: "World"
url: "https://www.cnn.com/2022/12/04/world/sumatran-tiger-paw-prints-dna-scn"
content: |
  Editor’s Note:“This Is Life with Lisa Ling” discovers the fate of hundreds of tigers bred and held captive by the so-called Tiger King. Watch the episode now onCNNgo. All-new episodes air Sundays at 10 p.m. ET.
  
  Dr. Mrinalini Watsa, a researcher at San Diego Zoo Wildlife Alliance in California, scoops up soil from a fresh paw print made by Rakan, a 4-year-old male Sumatran tiger who lives at the San Diego Zoo Safari Park, and secures it in a specimen jar.
  
  Back in her lab, Watsa analyzes the sample using a small electrophoresis device that’s connected to a smartphone. Jackpot. She’s able to detect Rakan’s DNA in the soil.
  
  'I've never seen a snow leopard in the wild' -- the anthropologist who has spent two decades protecting Pakistan's elusive big cats
  
  The proof of concept experiment is part of her work adapting existing genome-sequencing technology so it can be easily used to detect individual tigers in the wild using their DNA. Watsa hopes the application will make it easier to track Rakan’s wild counterparts in Sumatra, Indonesia’s biggest island, and tiger populationsacross the rest of Asia.
  
  “Now, instead of saying we’ve seen about 40 prints in this 3-kilometer-square (1.8-mile-square) area, actually you can see those 40 prints come down to four tigers and that gives us so much more power in terms of how we go about counting them,” she said in the latest episode of CNN Original Series “This Is Life with Lisa Ling.”
  
  All living organisms, including humans, shed genetic material into the environment when they excrete waste, bleed, or shed skin or fur.
  
  Conservation scientists are increasingly making use of this environmental DNA — whether it’s in soil, water, snow oreven air— to gather information about particular species or ecosystems. It can alert scientists to the effects of the climate crisis or the existence of harmful pathogens, and help them track animal populations.
  
  In her experiments to date, Watsa has been able to detect Sumatran tiger DNA in soil and determine the sex of the animal. Watsa wants to refine her approach so she can identify individual tigers before testing it in the field.
  
  Tiger numbers have increased 40% in seven years,from 3,200 in 2015 to 4,500 in 2022, according to the latest estimates released in Julyby the International Union for Conservation of Nature.
  
  This promising population growth has been hailed as a conservation success story, but Watsa and other tiger experts say it’s not mission accomplished. Tigers still hold endangered status on theIUCN Red List of Endangered Speciesand are a fraction of the 100,000-strong population that roamed Asia at the beginning of the 20th century.
  
  Plus, the headline figures mask a more nuanced picture.
  
  'Mind control' by parasites influences wolf-pack dynamics in Yellowstone National Park
  
  Tiger populations are growing in some places in India andNepal, but the big cats are clawing out a much more fragile existence in Southeast Asia. Tigers have been extinct in Vietnam, Cambodia and Laos since 2000 and are teetering on the brink in Malaysia. In Sumatra, where Watsa’s work is focused, it’s thought that fewer than 800 tigers remain, with only two protected areas containing more than 25 breeding female tigers.
  
  What’s more, it’s not clear to what degree the detected increase in numbers is down to intensified and improved tracking techniques or actual population increases. Tiger counts are rarely based on direct sightings; instead, population numbers are inferred from tracks or pugmarks, or how often tigers are detected by hidden cameras.
  
  “It’s a cautious optimism. Tiger numbers are better known than they’ve ever been. More than a rebound, I’d say it’s a much more accurate estimate,” said Abishek Harihar, the deputy director of the tiger program at big cat conservation group Panthera.
  
  “A lot of so called increases are more to do with better estimation methods,” he added.
  
  For example, Harihar said that India, which accounts for about 64% of the world’s wild tiger population, conducts a survey every four years — but the area surveyed has increased over the past 12 years, making it hard to truly understand population trends.
  
  Population monitoring in India is typically done using camera traps, Harihar added. He believesDNA techniques could help scientists better understand how some tigers disperse between different areas, which can be hard to pick up with cameras.
  
  “It’s good to understand where the different tigers come from and then we can secure these dispersal routes,” he added. “DNA techniques will also be useful where camera trapping is difficult,” he added, such as the remote, mountainous regions in Southeast Asia.
  
