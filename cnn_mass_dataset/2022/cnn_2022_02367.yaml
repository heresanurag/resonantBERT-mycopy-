  Between 2000 and June 2022, there were 2,205 confiscations of tigers and their body parts across 50 different countries,according to Traffic, a group that monitors the illegal wildlife trade. Of these, one-third involved whole tigers, with 665 found alive and 654 found dead.
  
  In the United States, the popular 2020 Netflix documentary “Tiger King” publicized the exploitation of tigers for entertainment. The Big Cat Public Safety Act, a piece of legislation that would set limits on private ownership of tigers and help prevent big cats from entering the illegal animal trade,was passed by the House of Representativesin late July.
  
