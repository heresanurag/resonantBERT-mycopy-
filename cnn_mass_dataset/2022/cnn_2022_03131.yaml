content: |
  Bad news for Twitter could turn out to be good news for former President Donald Trump.
  
  Shares of Digital World Acquisition Corp., the special purpose acquisition company that has agreed to merge with Trump Media & Technology Group, surged 15% in premarket trading Monday morning after Elon Musk said he would back out of his deal to buy Twitter(TWTR).
  
  The surge comes afterMusk announced late Fridaythat he was pulling out of his agreement to buy Twitter, citing the lack of information about the percentage of Twitter accounts that are bots. Musk’s lawyer said that placed Twitter “in material breach of multiple provisions” of the original agreement.
  
  At a rally in Alaska on Saturday, former President Donald Trumpcalled Musk a “bullsh*t artist”and claimed he knew all along that Musk wouldn’t buy Twitter.
  
  “He told me he voted for me,” Trump said. He also said that he had predicted months ago that “Elon is not gonna buy Twitter,” adding, “Where did you hear that before?”
  
  Then, Trump urged the crowd to switch to Truth Social. Trump Media & Technology Group owns Truth Social, the Twitter-like app that Trump now uses following his ban from Twitter and Facebook(FB)in January 2021 after the violence at the Capitol.
  
  “Sign up for Truth,” Trump said about his struggling social network. “We love the Truth.”
  
  Musk has previously hinted he wouldallow Trump back on Twitterif he bought the company.
  
  “I do think it was not correct to ban Donald Trump, I think that was a mistake,” Musk said in May. “I would reverse the perma-ban. … We should not have perma-bans.”
  
  Digital World Acquisition Corp. revealed in aregulatory filing late last monththat its board members have received subpoenas from a federal grand jury in the Southern District of New York related to due diligence regarding the deal. Shares are down more than 50% for the year.
  
  Following the disclosure, the company responded that “we encourage — and will cooperate with — oversight that supports the SEC’s important mission of protecting retail investors.”
  
  – CNN Business’ Chris Isidore contributed to this report.
