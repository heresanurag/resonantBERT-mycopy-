  President Joe Biden will travel to Poland today, marking his second stop on a trip through Europe aimed at coordinating the West’s response to Russia’s invasion of Ukraine.Yesterday’s crisis talks in Brusselsended with Western leaders touting their unity and announcing new sanctions on hundreds of Russia’s elite. Ukraine also updated its extensive wishlist of additional military assistance from the US government, saying it needs1,000 missiles per day, according to a document provided to CNN. Less than two weeks into Russia’s invasion, the US and other NATO members had sent about 17,000 anti-tank missiles and 2,000 anti-aircraft missiles into Ukraine. Since then, NATO countries, including the US, have kept the pipeline of weapons and equipment flowing, even as Russia has threatened to target the shipments. Separately, more than 3.5 million refugees have now fled Ukraine, according to new UN data. For its part, the US willwelcome up to 100,000 Ukrainiansand others fleeing Russia’s aggression, a senior administration official said yesterday.
  
  The House Select Committee investigating the January 6 riot at the US Capitol has in its possessionmore than two dozen text messages, 29 in total, between former Trump White House chief of staff Mark Meadows and Virginia “Ginni” Thomas, a conservative activist and the wife of Supreme Court Justice Clarence Thomas, according to multiple sources. The text messages, reviewed by CNN, show Thomas pleading with Meadows to continue the fight to overturn the 2020 election results. The revelation of messages between Thomas and Meadows, both key allies of former President Donald Trump, comes as progressives and some legal ethics experts see her activism as a potential conflict of interest for Justice Thomas’ work on some Supreme Court cases. The committee is also considering whether to recommend that two former advisers to Trumpbe held in contemptfor not cooperating with its investigation and to refer them to the Justice Department for possible prosecution.
  
  Confirmation hearings for Supreme Court nominee Judge Ketanji Brown Jacksonwrapped up yesterday after four days. Jackson spoke about her judicial experience and addressed the historic nature of her nomination, which would make her the first Black female Supreme Court justice. The hearing also featured contentious moments of harsh questioning by committee Republicans. Sen. Lindsey Graham took issue with hersentencing of child pornography offendersand even criticized her as an “activist.” On the other hand, New Jersey Democrat Sen. Cory Booker delivered a moving speech thatbrought tears to the nominee. The Senate Judiciary Committee will vote on Judge Jackson’s Supreme Court nomination on Monday, April 4.
  
  The Biden administration has finalized a federal regulation that will helpsettle asylum claims at a faster pace. The new rule will help alleviate the immigration court backlog by giving asylum officers more authority to hear and decide asylum claims – cases that are usually assigned to immigration judges – when migrants present at the US southern border. The change comes amid growing concerns abouta potential migrant surge at the US-Mexico border. There are 1.7 million cases pending in immigration court, according to a system which tracks immigration court data. The administration is still assessing who the rule will apply to and where it will be implemented, officials said, emphasizing that the rollout will start small.
  
  Australia’s Great Barrier Reef is suffering itssixth mass bleaching event due to heat stresscaused by climate change, the reef’s managers confirmed today. The update comes mid-way through a 10-day monitoring mission by scientists who are considering whether to add one of the world’s seven natural wonders to their “in danger” list.” According to a biologist monitoring the project, more than half of the living coral seen from the air is severely bleached completely white and are producing fluorescent pigments in an attempt to protect their tissue from the intense sun during marine heatwaves. This is the fourth mass bleaching event in six years and the first since 2020, when about one quarter of the reef showed signs of severe bleaching. Previous bleaching occurred in 1998 and 2002.
  
