  Vacation mode: on. If you’re on the West Coast, grab your sunglasses and head to the beach this weekend. Most of the western US willexperience record-breaking heatfor the next few days. However, not everyone is excited to get an early taste of summer. March is considered high season for many ski resorts in the Mountain West, and this weekend will be a seasonal shock.
  
