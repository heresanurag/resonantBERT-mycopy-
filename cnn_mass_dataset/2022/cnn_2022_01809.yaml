  That’s how many people in the USfiled for unemployment benefits last week, according to data released yesterday by the Department of Labor. The last time the weekly number was that low was in 1969, when 182,000 people filed for jobless benefits. And while the strong jobs numbers are an encouraging sign, they could lead the Federal Reserve to step up its pace of interest rate hikes in order to keep inflation in check.
  
  “The Texas Legislature has made it clear that when it comes to sex education, parents – not school districts – are in charge.”
  
  –Texas Attorney General Ken Paxton, arguing that Pride Week activities at schools that celebrate LGBTQIA+ students, staff and families are breaking state law. In aletter to the Austin Independent School District’s superintendent, Paxton, a Republican, said the district’s “curriculum and lesson plans deal head-on with sexual orientation and gender” and said Texas law requires parental consent in writing before students are taught about human sexuality. “We aren’t worried about Paxton’s letter,” a district spokesperson told CNN. “Pride Week and sex education are different. Celebrating diversity and acceptance is completely legal.”
  
