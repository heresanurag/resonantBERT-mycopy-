  Mother Nature is cooking up a historic heat wave for Mother’s Day weekend. Hot temperatures will bake much of Texas, the Plains and the Midwest tomorrow and into early next week – withsome areas feeling like 110 degreesdue to the humidity.
  
  Here’s what you need to know toGet Up to Speed and On with Your Day.
  
  (You can get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  The battle for Mariupol’s Azovstal steel plant is creating a dire situation for civilians as the fierce combat continues. Many people are in urgent need of medical help and food, according to a UN spokesperson.Rescue operations are planned for todaywith the help of aid organizations, Ukrainian President Volodymyr Zelensky said. However, a Ukrainian commander inside the plant claimed Russians hadbroken their pledgeto allow civilians to leave through the evacuation corridors. The Kremlin, on the other hand, denies that its troops are preventing civilians from leaving. The UN said it’s unclear how many people remain in the plant, while Ukrainian authorities put the number in the hundreds. Separately,sources told CNNthe US provided intelligence to Ukraine that helped sink Russia’s prized warship the Moskva in the Black Sea last month. The Pentagon hasdenied providing Ukraine “specific targeting information”for the Moskva.
  
  Law enforcement officials arebracing for potential violencein Washington, DC, and nationwide in wake of the leaked draft Supreme Court majority opinion that wouldstrike down Roe v. Wade. The US Capitol Police issued an alert yesterday that warned about far-right calls for violence against a religious group planning an upcoming protest in support of abortion rights at the court. In preparation, teams began installing an 8-foot-tall, non-scalable fence around parts of the Supreme Court building Wednesday and set up concrete barriers last night blocking the street in front of the court. Multiple sources told CNN the recent developments may also embolden violent extremists to engage in attacks or other criminal activity targeting abortion clinic staff, patients or clinic facilities.
  
  The FDA has announced that it is puttingstrict limits on the Johnson & Johnson Covid-19 vaccine. Specifically, the vaccine will be limited to people 18 and older for whom other vaccines aren’t appropriate or accessible. It will also only be administered to those who opt for J&J because they wouldn’t otherwise get vaccinated.The FDA said in a statement that the change is being made because of the risk of a rare and dangerous clotting condition called thrombosis with thrombocytopenia syndrome (TTS) after receiving the vaccine. The new warning comes as the US will likely exceed 1 million coronavirus deaths in the coming weeks,the latest data shows.
  
  If you have a moment, CNN asked people to talk about the items their loved ones lost to Covid left behind. View their stories inthis touching interactive piece.
  
  Wildfires and straight-line winds that have ravaged New Mexico for a month have created a major disaster, President Joe Biden declared,unlocking critical federal aidas the state continues to battle the largest wildfire burning in the United States. The move makes federal money available for temporary housing and home repairs, loans to cover property losses and other programs to help residents and business owners recover, the declaration states.The Hermits Peak/Calf Canyon Fire– the biggest US fire this year and the second-largest in New Mexico in at least 30 years – had torched more than 165,000 acres by Thursday,destroyed dozens of homesand could soon threaten 15,000 more, officials have said. Some 300,000 acres have burned this year alone in New Mexico – more than the past two full years combined, according to a CNN analysis.
  
  States at the southern US border are preparing for the expected influx of migrants seeking asylum after theend of Title 42, a pandemic-era border restriction put in place by the Trump administration. The public health order, which the Biden administration hoped to drop this month, previously allowed border officials to turn away approximately 1.8 million migrants in the past two years. In Laredo, Texas,about 5,000 migrants are waitingfor the Title 42 to lift, a director of a shelter in the region said.A new CNN pollalso shows most Americans say now is not the time to end the Title 42. Forty-three percent of Americans say it’s time to end the border policy and return to pre-pandemic procedures, while 57% say it’s not. But those who say it’s not the right time are divided over how long it should remain in place, the numbers show.
  
