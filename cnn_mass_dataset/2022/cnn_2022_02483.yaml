  Marcel Hug of Switzerland won the wheelchair division race, setting an unofficial course record of 1:25:20,accordingto the Chicago Marathon. American Susannah Scaroni won the women’s wheelchair field,finishingin 1:45:48.
  
  This year marked the 44th running of the marathon in Chicago, and more than 40,000 participants were expected from all 50 states and more than 100 countries, according to Chicago officials.
