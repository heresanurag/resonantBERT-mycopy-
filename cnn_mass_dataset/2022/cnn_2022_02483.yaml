title: "Emily Sisson set a record for US women at the Chicago Marathon"
date: "2022-10-10"
section: "US"
url: "https://www.cnn.com/2022/10/10/us/emily-sisson-chicago-marathon-record"
content: |
  Emily Sisson set a new record for an American woman when she finished second at the Bank of America Chicago Marathon Sunday.
  
  Sisson finished with a time of 2:18:29, beating Keira D’Amato’s record by 43 seconds, the Chicago Marathontweeted. D’Amato set the previous record at the Houston Marathon earlier this year, finishing at 2:19:12.
  
  The two women, as well as record holders from 2006 and 1985, Deena Kastor and Joan Benoit Samuelson, all came together for a photo Sunday.
  
  All four women who have held the American Marathon Record since 1985, including the latest in the lineup: Emily Sisson! Emily ran 2:18:29 today to beat Keira D’Amato’s record by 43 seconds.pic.twitter.com/HqD3OF0yuu
  
  Kenyan runner Benson Kipruto was the men’s champion with a time of 2:04:24 and fellow Kenyan Ruth Chepngetich was first among the women at 2:14:18. Chepngetich also won the women’s race in2021.
  
