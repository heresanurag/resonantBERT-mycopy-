title: "Increasing flood costs over next three decades will mainly impact people of color, study shows"
date: "2022-01-31"
section: "US"
url: "https://www.cnn.com/2022/01/31/us/future-flood-risk-increases-for-people-of-color-climate/index.html"
content: |
  The United States is already spendingtens of billions of dollars a yearon flood damage as hurricanes get more intense, sea level rises along the coasts and extreme weather becomes more frequent.
  
  And anew studysuggests that not only is flooding going to cost the US even more in the future – around 26% more by 2050 – but people of color are going to bear the brunt of that increase.
  
  The study, published Monday in the journal Nature Climate Change, found the cost of flooding in the US will likely rise from around $32 billion today to $43 billion in 2050. And likemany aspects of the climate crisis, the change in flood risk won’t affect everyone equally.
  
  Federal judge cites climate crisis in decision to cancel oil and gas leases in Gulf of Mexico
  
  Currently, researchers found, severe flooding is disproportionately harming low-income White communities in the Appalachian region, particularly in West Virginia. Over the next 30 years, the study shows that risk shifting disproportionately toward primarily Black communities along the Atlantic and Gulf Coasts.
  
  “Not everyone is bearing the same burden here,” Oliver Wing, lead author of the study and chief research officer at Fathom, a flood modeling group, told CNN. “As flooding patterns shift and the climate changes, we’re basically telling African American communities to shoulder greater burdens again – so there’s a fundamental social justice issue there.”
  
  The climate crisis is intensifying thewater cycle, making dry periods drier and wet periods wetter. That effect is layered on top of sea level rise, which in turn leads to higher storm surges along the coasts. In 2017, Hurricane Harvey dumped more than 60 inches of rain in parts of Texas and slammed the coast with an 8-foot storm surge. Afterward,researchers notedthat it wascommunities of colorthat Harveyimpacted the most.
  
  While there is a strong connection between the climate crisis and flood risk, the study’s authors noted thatpopulation growthwill have a much larger impact on the increasing cost of flooding. They say it’s another example of why policymakers need toput more focus on adaptation– helping communities adapt to the climate crisis and grow more resilient against extreme weather.
  
  Gas stoves are a threat to health and have larger climate impact than previously known, study shows
  
  Beth Tellman, a co-founder of analytics firmCloud to Streetwho was not involved in the study, said she believes the most helpful result of this research is how it gets specific about which parts of the US will face an increased risk.
  
  “It’s the specificity at which they had the confidence in pointing out who is going to be affected, as well as the difference in the causes of development and population growth, because of the improvements they’ve made to their models, that’s important,” Tellman told CNN. “That level of specificity helps us understand what to do in terms of investments and policies.”
  
  Research last year from First Street Foundation, whose flood hazard model was used in this study, showed that25% of the critical infrastructurein the US is already at risk of being rendered inoperable due to flooding. It also recently published research that estimated businesses are set to collectivelylose millions of days of operationin coming years because of flooding alone.
  
  Monday’s study “adds to the larger understanding of the impacts of flood risk by bringing in population characteristics and tying those as an additional dimension to the overall risk and economic implications that we generally research at First Street,” Jeremy Porter, a co-author on the study and the chief research officer at First Street, told CNN.
  
  In addition totransitioning away from fossil fuels, Wing said adaptation measures are critical given the rate at which climate change is advancing – and that policymakers must invest in marginalized communities to help them adapt to climate risks.
  
  “Even if we were to instantly decarbonize, if we just stopped it all together in some crazy world, then most of what we projected would be completely unaffected by such action,” he said. “These changes that we’re projecting are fundamentally climatically locked in and no decarbonization is going to stop this.”
  
  Wing adds it all boils down to major investment in adaptation, whether it comes in the form of buyout policies or building defenses on coasts.
  
  “We need to get these communities the resources to adapt, and that’s a problem for policymakers,” he added. “They have to ensure that they’re giving the communities that we highlight in this report the means to adapt to this risk, because they shoulder an outsized burden of what’s going on right now and in the future.”
