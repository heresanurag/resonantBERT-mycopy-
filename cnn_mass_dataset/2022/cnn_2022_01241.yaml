title: "House passes bills to protect abortion access after Roe v. Wade overturned"
date: "2022-07-15"
section: "Politics"
url: "https://www.cnn.com/2022/07/15/politics/house-abortion-access-legislation-vote/index.html"
content: |
  The Democratic-led House of Representatives on Friday passed a pair of bills aimed at protecting access to abortion at the federal level in the wake of the Supreme Court’s momentousdecision to overturn Roe v. Wade.
  
  The House took up the bills in an effort to counter the Supreme Court’s reversal of longstanding legal precedent by holding that there is no longer a federal constitutional right to an abortion.  But the bills are on track to run into a wall in the Senate, where there is not enough support for either piece of legislation to overcomethe filibuster’s 60-vote threshold.
  
  The first bill approved by the House was HR 8296, the Women’s Health Protection Act of 2022, which is sponsored by Democratic Rep. Judy Chu of California.The bill is aimed at preserving access to abortion nationwide at the federal level.
  
  Democrats have made the Women’s Health Protection Act a key agenda item andpreviously successfully passed a version of the bill in the House. The measure passed on Friday with a vote of 219 to 210. Democratic Rep. Henry Cuellar of Texas crossing over and voting with all of the House Republicans against the measure.
  
  The bill has previously been blocked in the Senate, however. In May,a key Senate vote failedwith Sen. Joe Manchin of West Virginia, a moderate Democrat, joining with Republicans to vote against the measure and stop it from advancing.
  
  The bill’s failure to advance in the Senate was expected at the time amid widespread GOP resistance, but the outcome of the vote nevertheless underscored how Democrats remain severely limited in what they can achieve in terms of safeguarding abortion access with only an extremely narrow Senate majority.
  
  The other bill House Democrats passed on Friday was HR 8297, the Ensuring Access to Abortion Act of 2022 sponsored by Democratic Rep. Lizzie Fletcher of Texas.
  
  The bill passed largely down party lines, with just three crossover votes, including Michigan Republican Rep. Fred Upton and Illinois Republican Rep. Adam Kinzinger, who joined Democrats in voting for the bill. The final vote was 223 to 205.
  
  The measure is intended to protect the right to travel to seek access to abortion and would prohibit anyone from restricting or hindering an individual’s ability to cross state lines to obtain an abortion in a state where it is legal to do so.
  
  A vote to approve the bill in the House comes as the Supreme Court’s decision to overturn Roe v. Wade has led statesto implement their own abortion policies. The ruling has already resulted in a patchwork system across the country in which access to the procedure is, for many people, determined largely by whether a state is controlled by Republicans or Democrats.
  
  So-called trigger laws – bans designed to take effect with the overturning of Roe v. Wade – are enforceable in some states following the Supreme Court’s ruling, while in others, the bans await official action.
  
  This story and headline have been updated with additional developments Friday.
