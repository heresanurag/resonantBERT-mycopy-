  “Matariki helps to reaffirm identity and bonds that we have with each other. Those that have passed, those that are still with us and those that are still to come,”saidRangiānehu ‘Mātāmua, chair of the Matariki Advisory Group.
  
  “It’s a very important celebration and period of time that really helps to embed those central values within us.”
  
  Māori, who make up about 15% of New Zealand’s population, were dispossessed of much of their land during Britain’s colonization of the country. Thousands of Māorihave protested for civil and social rightsin recent years, and have criticized governments for failing to address social and economic inequalities.
  
  Earlier this year, Prime Minister Jacinda Ardern introduced a newcurriculumwith mandatory teaching of Māori history and British colonialism.
  
  Ardern also appointed the country’sfirst indigenous female foreign minister, Nanaia Mahuta, in November 2020.
  
  Additional reporting by Reuters
