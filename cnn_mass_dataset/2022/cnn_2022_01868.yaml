  After an 11-day manhunt, an inmate who escaped an Alabama jail has beencaptured and is back behind bars. The corrections officer he fled with – whom authorities believe he had a romantic relationship with – died of an apparent self-inflicted gunshot wound.And this isn’t the first jail love story we’ve seen before. Experts say there’s even a term for this kind of attraction: “Bad Boy Syndrome,” or the interest in those who commit heinous crimes.
  
  Here’s what you need to know toGet Up to Speed and On with Your Day.
  
