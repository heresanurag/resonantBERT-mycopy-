  NBA Hall of FamerBob Lanierdied yesterday. He was 73. Lanier, the eight-time All-Star who played for 14 years in the NBA, died after a short illness, surrounded by family,the NBA said in a statement. “His impact on the league went far beyond what he accomplished on the court,” NBA Commissioner Adam Silver said.
  
  That’s the percentage of theGreat Barrier Reef impacted by bleachingthis year due to warming waters from escalatingclimate change. A new report from an Australian government agency confirmed this is thesixth mass bleaching eventof the reef on record and the fourth since 2016. Coral reefs are some of the most vibrant marine ecosystems on earth, and somewhere between a quarter and a third of all marine species rely on them at some point in their life cycle.
  
  “You cannot go into a war zone and not come away unchanged. You don’t have to see the sorrow with your eyes because you can feel it with your heart.”
  
  – First lady Jill Biden, on what she learned while visiting Eastern Europe over Mother’s Day weekend.In her opinion piece, Biden shares her experience meeting Ukrainian mothers and hearing their stories about enduring bomb strikes and struggling to obtain food. At the end, Biden directs a poignant message to Russian President Vladimir Putin: “Mr. Putin, please end this senseless and brutal war.”
  
