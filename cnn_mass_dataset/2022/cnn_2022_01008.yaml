title: "Golden Globes 2022: See the full list of winners"
date: "2022-01-09"
section: "Entertainment"
url: "https://www.cnn.com/2022/01/09/entertainment/golden-globes-winners-2022/index.html"
content: |
  On a typical year, the Golden Globe Awards serve as the gold standard for tipsy fun. But this is not a typical year for Hollywood’s quirkiest award show.
  
  Still, evenas the Globes serve a time outas The Hollywood Foreign Press Association works to repair its reputation, there is no break being taken from recognizing the best films and television of the year.
  
  In atoned down, untelevised presentation, the winners of the Golden Globes were announced Sunday night.
  
  A full list of nominees follows below with winners indicated in bold.
  
