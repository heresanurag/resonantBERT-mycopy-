  Supreme Court Justice Stephen Breyer is expected to formallyannounce his plans to retire today, clearing the way for President Joe Biden to name his first nomination to the high court. Biden has vowed to fill the vacancy with an African American woman, which would represent a historic first. Currently,six of the nine justices are conservative, so Biden’s pick will not change the balance of the court, given that Breyer will almost certainly be replaced with a liberal. Still, it’s a consequential decision, considering that the president’s nominee is expected to be much younger than Breyer and could serve on the court for decades. As forthe next steps in the process, Biden will now interview hisshort list of candidates. The White House will then make a decision and then a formal nomination will be made.
  
  Russian and Ukrainian negotiators haveagreed to continue ceasefire talksas concerns that Russia will invade Ukraine continue to escalate. The world has been on edge, fearing an invasion is imminent, but Ukrainian Foreign Minister Dmytro Kuleba lessened those concerns somewhat yesterday, stating Russiahas not assembled sufficient forcesto a launch full-scale invasion. Officials also say the latest four-way conversation between representatives from Ukraine, Russia, Germany and France has helped broker some hope for peace. Speaking after yesterday’s meeting, Moscow’s chief negotiator said the ceasefire must be observed “unconditionally” but that many other issues in eastern Ukraine remained unresolved. Ukraine’s negotiator said all parties were in support of a permanent ceasefire, adding they are ready to negotiate around the clock to prevent a war.
  
  Moderna says it has given aCovid-19 booster shot specific to the Omicron variantto the first participant in their Phase 2 clinical trial.Research published yesterdayin the New England Journal of Medicine found that a booster dose of the vaccine remained durable against the Omicron variant but did show signs of waning antibody protection. Pfizer and BioNTech, makers of the other major mRNA Covid-19 vaccine, announced earlier this week that they had also begun their own Omicron-specific vaccine trials. According to latest CDC data, Omicron currently accounts for 99.9% of all US Covid-19 infections, while the Delta variant makes up the remaining 0.1%.
  
  With inflation rising, the Federal Reserve said yesterday it isgetting ready to raise interest rates– a move widely expected on Wall Street. “With inflation well above 2% and a strong labor market, the Committee expects it will soon be appropriate to raise the target range for the federal funds rate,” the Fed said a statement, with Fed Chairman Jerome Powell confirming in a press conference that March is probably the right time frame for a rate hike. Investors now expect the Fed to hike interest rates four times this year (or more) if inflation continues to be a problem. That’sencouraging them to dump stocksin companies that rely on borrowed cash, as well as the technology firms that have powered the recent bull market.
  
  Cuban officials are calling for the Biden administration to restore relations with the island in light of a recent CIA report that found most“Havana syndrome” cases were unlikely to have been caused by a foreign power. In 2016, US diplomats and undercover CIA officers in their homes and hotel rooms in Havana began complaining of unexplained symptoms, including dizziness, pounding headaches, and piercing noise that sounded as if metal was being scraped across a floor. Eventually,24 diplomats were diagnosed with brain damagethat ranged from mild impairment to severe injuries. US officials feared the unexplained illnesses might have been caused by “sonic attacks” from other countries. In a new study this week, the CIA determined the spate of mysterious health incidents, can be explained by environmental causes, undiagnosed medical conditions and other factors.
  
