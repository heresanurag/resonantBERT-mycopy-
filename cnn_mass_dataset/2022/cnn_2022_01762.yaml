  That’s how much Kansas City Chiefs fansdonated to a children’s hospital in New Yorkafter their team beat the Buffalo Bills in an epic playoff game on Sunday. Bills fans are typically the ones making donations after a game, but Chiefs fans began donating this week in $13 increments – representing the 13-second drive the Chiefs made to send the game into overtime. The hospital thanked the Chiefs fans,tweetingthat the donations will help ensure their medical team has the tools, training, and programs to care for kids in Western New York.
  
