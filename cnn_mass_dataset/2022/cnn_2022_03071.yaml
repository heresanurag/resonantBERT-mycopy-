  The guidance aligns with the CDC on several points, including emphasizing that people with symptoms stay home, but it also urges discontinuing required weekly testing for people without symptoms and supports “mask to stay”-style policies that allow people exposed to Covid-19 to remain in class.“With limited access to testing and schools overwhelmed with contact tracing and required testing solutions that are no longer feasible or sustainable, the time has come to pivot towards solutions that prioritize normalization of in-school education alongside practical safety measures that can manage the worst of this resurgence,” Dr. Jeffrey Gerber, associate director for inpatient research activities for the Center for Pediatric Clinical Effectiveness at Children’s Hospital of Philadelphia and co-author of the guidance, wrote in ablog post.
  
  “Failure to pivot quickly risks closure of many under-resourced schools, which have been disproportionately impacted by staffing shortages, and whose communities have had more limited access to testing.”
