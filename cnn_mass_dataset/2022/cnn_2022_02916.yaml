title: "World Cup 2022 draw: Everything you need to know"
date: "2022-03-31"
section: "Football"
url: "https://www.cnn.com/2022/03/31/football/qatar-world-cup-draw-preview-spt-intl/index.html"
content: |
  The draw for an unprecedentedFIFA World Cuptakes place Friday as teams discover their fates for the first winter edition of football’s flagship event, inQatarthis December.
  
  With several spots still yet to be decided, only 29 of the 32 participants will be confirmed when the draw gets underway at the Doha Exhibition Center at 7 p.m. local time (12 p.m. ET).
  
  Here’s everything you need to know about Friday’s ceremony.
  
  Having won the bid in 2010 and with hosts rewarded with automatic qualification,Qatarhas had a decade to prepare for its World Cup debut.
  
  The Gulf nation will be joined by the 10 European winners of UEFA’s qualifying groups, fronted by four-time winnerGermanyand two-time championFrance, as well asSpainandEngland, who both have one World Cup triumph to their names.
  
  Serbia, Switzerland, Belgium, Denmark, Croatiaand theNetherlandsround up the rest of the European group winners.
  
  PortugalandPolandstamped their tickets after progressing through the UEFA playoffs, with wins over North Macedonia and Sweden respectively ensuring that legendary forwards Cristiano Ronaldo and Robert Lewandowski will both feature in Qatar.
  
  Brazil, the most successful country in World Cup history with five titles, played to form by qualifying as group winner of the CONMEBOL – the South American Football Confederation – round robin.
  
  TheSeleçaowas followed through by old rivalArgentina, as well asUruguayandEcuador.
  
  Fans storm onto the pitch as Ghana earns World Cup berth over Nigeria
  
  A thrilling week of CAF – the Confederation of African Football – third round qualifiers concluded withSenegalproving to be the bane of Egypt once again,securing its passage to Qatarvia penalties on Tuesday.
  
  Cameroonedged past Algeria courtesy of a winner deep into extra-time, withGhana, TunisiaandMoroccorounding up the rest of the African contingent set for Friday’s draw.
  
  In the AFC – the Asian Football Confederation – section of qualifying,Iran, Saudi Arabia, South KoreaandJapanwent through to ensure back-to-back World Cup appearances.
  
  Canadasecuredits first World Cup qualification in 36 years after topping the CONCACAF – the Confederation of North, Central American and Caribbean Association Football – round-robin.
  
  On Wednesday, theUnited Statesended an eight-year World Cup hiatus,qualifying despite losing2-0 to Costa Rica in San Jose. They will be joined by neighboursMexico, who finished second to take the other CONCACAF qualification spot.
  
  Two intercontinental playoffs in June will decide the next two spots.Peruwill face the winner of theUnited Arab EmiratesversusAustralia, whileCosta Ricawill faceNew Zealandin the other playoff.
  
  The final spot will be the victor of a match betweenWalesand one ofScotlandorUkraine, a game initially scheduled to take place on March 24 butpostponedby FIFA to June following Russia’s invasion of Ukraine.
  
  A date for the rescheduled qualifier is yet to be announced by FIFA.
  
  Reigning European championItalywas undoubtedly the most shocking casualty of qualifying, the four-time World Cup winner missing out for the second tournament in a row after beingstunnedby North Macedonia.
  
  Mohamed Salahand Riyad Mahrez will both miss out afterEgyptandAlgeriafailed to qualify. Salah’s Liverpool teammate Luis Diaz will also not feature afterColombiaendured a disappointing qualifying run.
  
  Young superstar striker Erling Haaland also misses out, asNorwayfinished third in its qualifying group.
  
  The draw is seeded into eight groups from four pots, organized according to FIFA’s men’s world rankings as of March 31.
  
  Teams from the same confederation cannot be grouped together, barring Europe, given they will have 13 teams present in Qatar.
  
  Pot 1 - Host and the seven highest-ranked countries
  
  Pot 2 - 8th-15th highest-ranked countries
  
  Pot 3 - 16th-23rd ranked
  
  Pot 4 - 24-28th ranked, plus intercontinental playoff winners and final UEFA playoff winner
  
  Qatar is set to host the curtain raiser on November 21, with the final round of group games concluding on December 2.
  
  The knockout stages begin the following day, running until December 18 when the Lusail Stadium will play host to the World Cup final.
  
  FIFA will be streaming the draw on itswebsite, while UK-based viewers can watch via BBC One. Follow live updates here on CNN.
  
  An earlier version of this story misstated Mexico’s CONCACAF qualifying position.
