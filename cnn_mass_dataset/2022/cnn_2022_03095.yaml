title: "Warnock says Walker ‘has trouble with the truth’ but does not comment on abortion allegations"
date: "2022-10-08"
section: "Politics"
url: "https://www.cnn.com/2022/10/08/politics/raphael-warnock-herschel-walker-georgia-senate/index.html"
content: |
  Democratic Sen. Raphael Warnock of Georgia said Saturday that his Republican rivalHerschel Walker“has trouble with the truth” but did not directly address the recent allegation thatWalker once paid for a woman to have an abortion.
  
  “It’s up to Georgia voters. It’s not up to him, it’s not up to me,” Warnock told reporters after a rally here. “We do know that my opponent has trouble with the truth. And we’ll see how all this plays out, but I am focused squarely on the health care needs of my constituents, including reproductive health care.”
  
  The Georgia Senate race has been rocked by an allegation first reported byThe Daily Beastthat the GOP nominee paid for a woman’s abortion in 2009. The woman toldThe New York Timesthat Walker asked herto terminate a second pregnancytwo years later but she refused the request and their relationship ended.
  
  Walker, who said in May he supports a full ban on abortions, with no exceptions, has denied the earlier report from The Daily Beast, calling the allegation a “flat-out lie.”
  
  Pressed by CNN on Saturday whether he believes Walker’s denial, Warnock declined to say.
  
  “What I believe is irrelevant because the people of Georgia will decide,” he said.
  
  Warnock has avoided directly commenting on the allegations since the Daily Beast story broke. At his rallies and in front of reporters, the Georgia Democrat avoids mentioning Walker’s name, referring to him instead as “my opponent.”
  
  The Senate contest between Walker and Warnock, who is seeking a full six-year term, is among themost competitiveof the2022 midterm electionsand could be instrumental in deciding control of the evenly divided chamber.
  
  National Republican Senatorial Committee Chairman Sen.Rick Scott will travel to Georgiaon Tuesday to support Walker, a move that highlights the importance of the Georgia race.
  
  “The Democrats want to destroy this country, and they will try to destroy anyone who gets in their way. Today it’s Herschel Walker, but tomorrow it’s the American people,” Scott said in a statement to CNN. “I’m proud to stand with Herschel Walker.”
  
  NRSC spokesperson Chris Hartline said Saturday that the organization will “have a big presence in Georgia in the final stretch.” GOP Sen. Tom Cotton of Arkansas will also be in Georgia to campaign for Walker on Tuesday.
  
  The Washington Post first reported on Scott and Cotton’s trip to Georgia.
  
  Republican groupshave vowednot to abandon Walker, even as the scandal sent his campaign scrambling. Campaig manager Scott Paradise, addressing staff earlier this week, acknowledged that the initial Daily Beast report was a setback, but pointed to Trump’s victory in 2016 – despite the initial backlash to the release of the “Access Hollywood” tape in which he spoke crudely about groping women – as evidence that Walker remained a viable candidate.
  
  Earlier Friday, Walker’s campaignsplit from its political director, Taylor Crowe, over suspicions that he was leaking information to the media, two people familiar with the matter told CNN. Crowe did not respond to multiple requests for comment from CNN. It is unclear if there were other factors at play or if the move had any connection to the abortion allegations.
