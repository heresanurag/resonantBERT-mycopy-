  — Weredinosaurs capable of creating sonic boomswhen they whipped their long tails? Researchers have finally settled the debate with an unexpected find.
  
  — Jupiter’s moon Io,the most volcanic place in the solar system, is about to become the main focus of NASA’s Juno spacecraft.
  
