  _September 29, 2022_
  
  _We’re watching Hurricane Ian as it makes landfall in Florida. We then head under the sea to an ancient shipwreck off the coast of Israel which could contradict a major archaeological theory. And we travel to India to learn about human-elephant conflict and a device that scientists have developed to alleviate the growing issue._
  
