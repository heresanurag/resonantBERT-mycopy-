title: "Civil rights groups ask Texas court of appeals to stop state investigations of transgender families"
date: "2022-03-17"
section: "US"
url: "https://www.cnn.com/2022/03/17/us/texas-transgender-investigation-civil-right-court-of-appeals/index.html"
content: |
  Civil rights groups are seeking an emergency order from the Texas Third Court of Appealsto ensure families seeking gender-affirming care for their trans children won’t be investigated.
  
  Lambda Legal and the American Civil Liberties Union (ACLU) filed a request on Thursday asking the court to reinstate a March 11 temporary injunction, saying emergency relief is needed to “prevent imminent and irreparable harm.”
  
  In late February, Texas Attorney General Ken Paxtondeclared gender-affirming surgical proceduresin children and prescribing drugs that affect puberty to be considered “child abuse.”
  
  Florida and Texas can't outlaw my family
  
  In response to Paxton’s legal opinion – which was seen by many as an attack on transgender children – Gov. Greg Abbottdirected the Department of Family and Protective Services (DFPS)“to conduct a prompt and thorough investigation of any reported instances of these abusive procedures in the State of Texas.”
  
  A district court judge ordered the state of Texas to temporarily stop investigating families on March 11, but Paxton appealed Friday night and declared that investigations would continue during the appeal process regardless.
  
  The legal maneuverings have sown confusion over whether the state can legally continue its investigations.
  
  The DFPS would not tell CNN whether their investigations of at least nine families were still open nor whether they had opened new investigations this week despite the temporary injunction.
  
  “Can’t get into specifics,” DFPS spokesman Patrick Crimmins told CNN in an email on Wednesday. “We continue to follow the law.”
  
  It’s unclear how quickly the court of appeals will rule on the emergency relief request, but civil rights groups have asked for a response by Friday at 12 p.m. CT.
  
  Parents and advocates are speaking out against such investigations, with many worried about thesevere consequencesthey could have on children.
  
  “To trans young people across Texas and the country, you have done absolutely nothing wrong. You are perfect just the way you are. And there are countless people across Texas, across this country, across the world that are fighting to protect your right to exist authentically,” Ricardo Martinez, CEO of the LGBTQ rights group Equality of Texas,told CNNearlier.
  
  Transgender children in the US are battling discrimination on different fronts.
  
  In Kansas, a teacher isrefusing to use her students’ preferred names and pronouns and issuing her school districtsuperintendent, board members and principal.
  
  Arkansasbecame the first stateto ban gender-affirming care last year, including puberty blockers and cross-sex hormone therapy, for minors. In West Virginia, a bill was signed into law in 2021, which was temporarily blocked, that prohibits transgender girls and women from participating in girls’ and women’s secondary school or higher education sports teams.
  
  And a “Parental Rights in Education” bill in Florida, dubbed by critics the“Don’t Say Gay” billbecause it seeks to ban discussion of gender and sexuality issues with younger students, awaits Gov. Ron DeSantis’ signature.
