title: "Anna Netrebko, Russian soprano, out at the Metropolitan Opera"
date: "2022-03-03"
section: "Entertainment"
url: "https://www.cnn.com/2022/03/03/entertainment/anna-netrebko-russian-soprano-metropolitan-opera-met/index.html"
content: |
  Famed Russian soprano Anna Netrebko will no longer perform at the Metropolitan Opera in New York City this season or next after she refused to publiclydistance herselffrom Russian President Vladimir Putin, according to a statement from the Met.
  
  “It is a great artistic loss for the Met and for opera,” the company’s general manager, Peter Gelb, said in a statement to CNN. “Anna is one of the greatest singers in Met history, but with Putin killing innocent victims in Ukraine there was no way forward.”
  
  Netrebko was scheduled to perform in Puccini’s “Turandot” this spring, as well as Verdi’s “Don Carlo” next season.
  
  Анна Нетребко приняла знамя Новороссии!#Донбасс#Новороссия#Украинаpic.twitter.com/srcpcSG3ow
  
  Ukranian soprano Liudmyla Monastyrska will replace her in “Turandot” and her replacement in “Don Carlo” will be announced at a later date, according to the Met.
  
  Netrebko had issued statements critical of the war, but has not publicly commented on Putin.
  
  In 2014, Netrebko made a large donation to an opera house in Donetsk, a city in Ukraine controlled by pro-Russian separatists, according to a report by theNew York Times.After she made the donation, she was pictured holding a Novorossiyan flag, which is used by separatist groups.
