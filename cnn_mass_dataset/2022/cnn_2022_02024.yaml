content: |
  Editor’s Note:Elliot Williams is a CNN legal analyst. He is a former deputy assistant attorney general at the Justice Department and is currently a principal at The Raben Group, a public affairs firm. Follow him on Twitter@elliotcwilliams. The views expressed in this commentary are his own. Viewmore opinionon CNN.
  
  The publichas been losing faithin the Supreme Court for years, research tells us.
  
  However, the biggest current threat to the court’s legitimacy as an institution continues to be the behavior of Virginia “Ginni” Thomas, wife of Justice Clarence Thomas.
  
  The House Select Committee investigating January 6 now hasmore than two dozen text messagesin which Ginni Thomas repeatedly leaned on then-White House Chief of Staff Mark Meadows to push baseless efforts to overturn the results of the 2020 presidential election. (Attorneys for Meadows and Thomas have not responded to CNN’s requests for comment.)
  
  Ginni Thomas went too far
  
  Ifirst wrotein February of 2021 about Ginni Thomas’ shameful behavior leading up to and on January 6, when she had repeatedly used social media to urge protesters to challenge the results of the 2020 election. However, what we know now about her texts to Meadows in matters that specifically could come before her husband poses grave ethical and legal issues for the court.
  
  There has never been any doubt that cases about January 6 would have ended up in the federal courts, given the subject matter: separation of powers, free speech and destruction of federal property, to name a few. Former President Donald Trump himselfsaid in a speechon election night 2020, “We want the law to be used in a proper manner. So we’ll be going to the US Supreme Court.”
  
  He got his wish, as several cases got there. In February 2021, Justice Thomaswrote a dissentafter the majority declined to hear a case filed by Pennsylvania Republicans that sought to disqualify certain mail-in ballots. In January 2022, Thomaswas the only justicewho said publicly that he was against allowing the release of records from the Trump White House related to the Jan. 6 attack.
  
  New report about Clarence Thomas' wife, Ginni Thomas
  
  In the midst of all this, intext messages to Meadows, Ginni Thomas called Election Day a “heist” and repeated debunked theories about evidence of election fraud. According to the Washington Post, she evencommented on her outreachto “Jared,” possibly a reference to the Trump’s son-in-law and senior White House adviser, Jared Kushner.
  
  Thomas actively weighed in on the makeup of Trump’s legal team, witha particular focuson ensuring that Meadows help Sidney Powell be “the lead and the face” of the team. Sheweighed indirectly on legal strategy, saying “[s]ounds like Sidney and her team are getting inundated with evidence of fraud. Make a plan. Release the Kraken and save us from the left taking America down.”
  
  The standard for when justices must step aside from hearing cases is vague. Under federal law, all federal judges, including Supreme Court justices,must recuse themselvesfrom cases in which their “impartiality might reasonably be questioned.” Even without specific guidelines for where and what “might reasonably be questioned” even means, at the heart of the rules are how the public sees the court. The challenges are more acute for the Supreme Court, which is both the only federal court in America that decides which cases it hears, and the only one that has no other court above it to clean up its messes.
  
  Most recently, at her Supreme Court confirmation hearing this week, Judge Ketanji Brown Jacksonannouncedthat she would recuse herself from an upcoming matter involving affirmative action at Harvard University, given her role on its board of overseers. While nothing required the recusal, the appearance of a conflict to many would have hurt the public’s faith in any decision issued by the court.
  
  Clarence Thomas refuses the clear and obvious path forward
  
  Thomashas saidthat she and her husband “have our own separate careers, and our own ideas and opinions, too. Clarence doesn’t discuss his work with me, and I don’t involve him in my work.”
  
  Of course it would be improper for the court to have a window into every private conversation between justices and their family members. That doesn’t mean that their relationships might not pose problems for the court’s public perception. There is a parallel in problems posed by personal contact between advocates or business leaders and government officials. Most contacts will not run afoul of lobbying registration laws; many are far closer for comfort than the public probably wants.
  
  Here, the glaring appearance of a conflict is more than enough to justify Justice Thomas’s stepping aside from all matters related to January 6. Imagine if, as the court were hearing cases involving abortion restrictions, the husband of Justice Amy Coney Barrett were actively sharing messages with activists on either side of the issue or their attorneys? Or, were she to be confirmed as a justice, Jackson’s husband were to send dozens of messages to the White House Chief of Staff with talking points on critical race theory – an issue that Republicansmade centralat her confirmation hearing? People would be right to lose their minds.
  
  Judges might try to keep a straight face and claim that they leave their work at the courthouse; the public wouldn’t – or at least shouldn’t – buy it. The tragedy isn’t that the law entrusts the justices to make the decision over whether to recuse themselves; it’s that we have no real recourse when they don’t.
  
  The court’s legitimacy was a specter looming over Jackson’s hearing. For instance, she was often asked heated questions over 18 hours of questioning regardingwhether to add justicesto the court and about the role of “dark money” in judicial nominations. At their core, these were questions about how much faith the public should have in its institutions. Senate Republicans’ way of raising them was through attacks on a historic judicial nominee who should have instead been answering entirely fair questions about her resume and record.
  
  The Ginni Thomas saga is part of something bigger: We have placed too much trust in the individuals on the court to police themselves. Congress should immediately pass tougher ethical guidelines for justices. Chief Justice John Roberts, who repeatedly stresses how much he cares about thepublic perceptionof the court, could speak out more forcefully about his colleagues’ – or their spouses’ – behavior.
  
  And even if we are to believe that he and his wife don’t discuss work at home, Justice Thomas should stop hearing January 6 cases.
  
  Without those steps, neither he, the Chief Justice, nor anyone else should be shocked that America has lost faith in its highest court.
