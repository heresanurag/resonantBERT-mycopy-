  “Violence is not the answer, violence won’t help us move the country forward. I am urging everyone to stay calm and work together to resolve our differences,” Henry said Sunday.
  
  At least 10 people, including two journalists, were killed in unrest over the weekend in the Cité Soleil area of capital city Port-au-Prince.
  
  Henry, who assumed leadership of the Caribbean nation last year, has struggled to bring the country together for long-postponed elections.
