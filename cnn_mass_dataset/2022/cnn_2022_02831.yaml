  “To know I have three living survivors that are here with me right now [to] feel this partial victory, it means everything.”
  
  – Attorney Damario Solomon-Simmons, celebrating a judge’s ruling yesterday allowing alawsuit seeking reparationsfor the 1921 Tulsa Race Massacre to move forward. The 2021 lawsuit, which names 11 plaintiffs, looks to not only set the record straight on what took place between May 31 and June 1, 1921, but also create a special fund for survivors and descendants of themassacre that left at least 300 Black people deadand the once-booming neighborhood of Greenwood destroyed.
  
