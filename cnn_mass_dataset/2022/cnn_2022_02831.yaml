  In a stunning breach of Supreme Court confidentiality and secrecy, Politico has obtained what it calls a draft of a majority opinion written by Justice Samuel Alito that wouldstrike down Roe v. Wade– the law that affirms a woman’s right to have an abortion.The draftwas circulated in early February, according to Politico. The final opinion has not been released and votes and language can change before opinions are formally released. The opinion in this case is not expected to be published until late June. CNN has not independently confirmed the document’s authenticity. Politico says it has authenticated the draft. The opinion would bethe most consequential abortion decision in decadesand transform the landscape of women’s reproductive health in America.
  
  US and Western officials believe Russian President Vladimir Putin couldformally declare war on Ukraineas soon as May 9. The declaration would enable the full mobilization of Russia’s reserve forces. Western officials have long believed that Putin would leverage the symbolic significance and propaganda value of May 9 to announce either a military achievement in Ukraine, a major escalation of hostilities – or both – because it would coincide with “Victory Day” inside of Russia, which commemorates the country’s defeat of the Nazis in 1945. Meanwhile, tensions remain heightened at thebesieged Azovstal steel plant, where a commander among the Ukrainian soldiers said yesterday that the complex is under “constant fire” as hundreds of civilians try to evacuate.
  
  The US is likely to record its1 millionth reported Covid-19 deathin the next few weeks, according todata from Johns Hopkins University. This comes as public health officials are urging people to get booster shots months after vaccination to slow the spread of the virus. While more than three-quarters of the country has received at least one dose of a Covid-19 vaccine, less than one-third has received a booster. A detailed look at theCDC’s latest datashows that 77.6% of Americans – or nearly 258 million people – have received at least one dose of the vaccine. However, only about 30% of the total population has received a booster. For this reason, officials have moved away from that term “fully vaccinated” and instead encourage people to stay “up to date,” which means getting a booster when eligible.
  
  Ivanka Trump cooperated with the House select committee investigating the January 6, 2021, attack on the US Capitol, according to the committee’s chairman. In a recent exclusive interview with CNN, Rep. Bennie Thompson said Ivanka Trump provided themost extensive account yetof the state of play inside the White House, as well as then-President Donald Trump’s state of mind that day. A person close to the Trump family told CNN the former President’s children never saw a reason not to cooperate with the committee because none of them felt appearing before the panel put them at any risk. Some ofTrump’s former advisers, however, have been less willing to testify. Yesterday, three additional GOP lawmakers received letters asking that they voluntarily cooperate with the ongoing probe. But two of them, Reps. Andy Biggs of Arizona and Ronny Jackson of Texas,made it clear they will not cooperatewith the investigation.
  
  Extreme heat in India is “testing the limits of human survivability,” according to a climate expert. Last month, New Delhi saw seven consecutive days over 40 degrees Celsius (104 Fahrenheit). In some states, the heat has damaged crops and put pressure on energy supplies as officials warned residents to remain indoors and keep hydrated.The heatwavehas also been felt by India’s neighbor Pakistan, where the cities of Jacobabad and Sibi in the country’s southeastern Sindh province recorded highs of 47 degrees Celsius (116.6 Fahrenheit) on Friday. Experts say India is among the countries expected to be affected the hardest by the impacts of the climate crisis, and will likely endure more frequent and longer heatwaves in the future.
  
