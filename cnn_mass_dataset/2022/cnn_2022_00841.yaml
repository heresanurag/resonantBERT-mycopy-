  The FBI says cybercriminals are trying to steal financial information from Americans bycreating fraudulent QR codesthat look like the ones many restaurants and other businesses are using due to the coronavirus pandemic. These fake codes direct people to malicious websites in order to steal their data or hijack their payments.
  
  Here’s what you need to know toGet Up to Speed and On with Your Day.
  
  (You can also get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  President Joe Biden held anews conference yesterdaymarking his first year in office. In his address, he touted major strides in Covid-19 vaccination efforts, but alsothe challenges that lie aheadas many priorities in his agenda remain stalled in Congress, including the Build Back Better Act and voting rights legislation. On the topic of Ukraine, where tens of thousands of Russian troops have amassed along the border,Biden predicted Russia “will move in” to Ukraine, citing concerns by the country’s president, Vladimir Putin, even as he acknowledged disunity within NATO over how to respond to a “minor incursion.” Shortly after those remarks, the White House issue a clarification stating that a potential Russian invasion “will be met with a swift, severe, and united response from the United States and our Allies.”
  
  Senate Democratssuffered a major defeat yesterdayin their efforts to pass voting rights legislation – a key issue for the party, which is under pressure totake action ahead of the midterm elections. An attempt by Democrats to change filibuster rules in order to pass a voting bill failed amid opposition from moderate Democratic Sens. Joe Manchin and Kyrsten Sinema. After the vote, Sinema released a statement saying she opposed the change because it would “deepen our divisions” and “risk repeated radical reversals in federal policy.” The proposed rules change – to allow for a “talking filibuster” on the legislation – would have forced lawmakers to come to the Senate floor and speak in opposition. Once those speeches end, the Senate would be able to hold a simple majority vote for final passage.
  
  The Supreme Courtcleared the way yesterdayfor the release of presidential records from the Trump White House to a congressional committee investigating the attack on the US Capitol. The high court’s order means that more than 700 documents will be transferred to Congress that could shed light on the events leading up to the insurrection. The select committeeis seeking those documentsas it explores Trump’s role in trying to overturn the 2020 presidential election. That includes his appearance at a January 6 rally in which he directed followers to go to the Capitol where lawmakers were set to certify the election results and “fight” for their county. The documents include activity logs, schedules, speech notes and three pages of handwritten notes from then-White House chief of staff Mark Meadows – paperwork that could reveal goings-on inside the West Wing on the day of the riot.
  
  With more than 18 million global coronavirus cases reported last week alone, the head of the World Health Organization says there is stillno clear end in sightas health care systems remained overburdened by the influx of patients. “This pandemic is nowhere near over,” WHO Director-General Tedros Adhanom Ghebreyesus said, adding the next few weeks will be critical for strained health care workers. In the US,about 63% of the total population is fully vaccinatedand boosted against Covid-19, according to data published yesterday from the US Centers for Disease Control and Prevention. CDC experts also say a Covid-19 vaccine for children under the age of 5 could be available within a month.
  
  The Biden administration defended the use of a controversial Trump-era border policy thatallows authorities to swiftly remove migrantsencountered at the US southern border during a court hearing yesterday. A Justice Department spokesman cited Covid-19 concerns as the main rationale for invoking the policy, known as Title 42. The use of the authority has drawn fierce criticism from immigrant advocates, attorneys and health experts, who argue the policy has no health basis and puts migrants in harm’s way. The United Nations refugee agency has alsopushed back on the restrictions.
  
