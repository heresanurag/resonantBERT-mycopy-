title: "Stocks, bonds rally after Bank of England says it will buy UK debt"
date: "2022-09-28"
section: "Investing"
url: "https://www.cnn.com/2022/09/28/investing/treasury-bond-yield-inflation/index.html"
content: |
  US stocks and bonds rallied Wednesday after theBank of England saidit would buy UK government debt “on whatever scale is necessary” in an emergency intervention to halt a bond market crash.
  
  TheDowrose nearly 550 points, or 1.9%. It was the best day for the Dow since mid-July. Apple(AAPL)was the only Dow stock toend the day lower, falling more than 1% following a report suggesting weaker-than-expected demand for the new iPhone 14.
  
  The S&P 500 and the Nasdaq Composite both climbed about 2%. The Dow and S&P 500 rebounded from the near two-year lows that they set on Tuesday and snapped six-day losing streaks in the process. The Dow is also no longer in bear market territory.
  
  Wall Street took its cue from the news out of London. The Bank of England announced its bond buying plans after sweeping tax cuts announced last week by the government of new Prime Minister Liz Truss sparked a selloff in the bond market.
  
  That news helped push US bond rates sharply lower. The yield on the benchmark 10-year US Treasury bond briefly topped 4% Wednesday morning before pulling back to 3.7%. The earlier surge was thefirst time the yield moved above the 4% threshold since April 2010and the highest level for the 10-year since October 2008.
  
  The 10-year Treasury yield is important for consumers and businesses since it impacts how much interest banks charge for various types of loans, most notably mortgages. The dramatic spike has helped push theaverage rate for a 30-year mortgage above 6%for the first time since 2008.
  
  Yields for the 10-year have soared from just north of 1.5% at the end of 2021, a stunning surge in a relatively short period of time.
  
  Markets are now treating UK bonds like Greek and Italian debt
  
  Bond yields rise when investors sell Treasuries — and traders have had plenty of reasons to dump the 10-year lately. Worries about runaway inflation have causedthe Federal Reserve to aggressively raise short-term interest rates.That has pushed up longer-term yields.
  
  Economic turmoil in the UKand Europe have also caused thevalue of both the British pound and the euro to fall dramaticallywhen compared to the US dollar. Dollar strength typically coincides with higher bond rates as well.
  
  This volatility is having an impact onstockstoo. The Dow fell intoa bear market, more than 20% below its all-time high, on Tuesday. TheS&P 500andNasdaqhave plunged even further this year.
  
  TheCNN Business Fear & Greed Index, a measure of investor sentiment, is indicating signs of Extreme Fear as investors grow more nervous about a recession.
