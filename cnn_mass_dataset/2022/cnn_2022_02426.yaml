title: "Asia’s richest woman lost more than half her fortune in China’s property crunch"
date: "2022-07-28"
section: "Economy"
url: "https://www.cnn.com/2022/07/28/economy/asia-richest-woman-wealth-china-property-crunch-intl-hnk/index.html"
content: |
  Yang Huiyan, Asia’s wealthiest woman, has seen her wealth fall to $11 billion from nearly $24 billion this year as China’sproperty crisis escalates, according to theBloomberg Billionaires Index.
  
  The 41-year-old controls Country Garden Holdings, China’s largest real estate developer by sales. Her stake was largely transferred from her father Yang Guoqiang, who founded the company in Foshan, Guangdong province, in 1992.
  
  Country Garden’s stock has lost more than half its value this year, as the country’s real estate sector has struggled with falling home prices, weakening buyer demand, and adebt default crisisthat has engulfed some of its largest developers since last year.
  
  Despite losing more than half her fortune,Yang remainsthe richest woman in Asia, according to theBloomberg Billionaires Index. The plunge in her net worth has narrowed the wealth gap between her and fellow female billionaires in China, making Yang only some $100 million away frombeing surpassed by Fan Hongwei in wealth. Fan chairs Hengli Petrochemical, a chemical fiber producer.
  
  Blame that on China’sproperty quagmire.
  
  Evergrande, China’s most indebted property firm,defaulted on its US dollar bondsin December following months of liquidity issues. Since then, several other major developers, includingKaisa and Shimao Group, have also sought protection from creditors.
  
  In recent weeks, the real estate crisis has escalated, as thousands of disgruntled homebuyers who had made down payments for unfinished homesthreatened to stop paying mortgagesif construction is not completed in time.
  
  Country Garden is also facing growing liquidity stress. On Wednesday, the developer announced it would sell stocks at a nearly 13% discount to raise HK$2.83 billion ($361 million), compared to its Tuesday’s closing price.
  
  Some of the proceeds will be used to repay the company’s offshore debt, it added.
  
  “The mortgage boycotts are a double threat to developers and to the housing market,” said analysts at Capital Economics in a report on Wednesday.
  
  China's real estate crisis deepens as big Shanghai developer defaults
  
  They have drawn attention to the problem of cash-strapped developers being unable to complete properties that they have already sold, which is “putting off new homebuyers.” The boycotts have also made banks more cautious about issuing mortgages, which could dent property sales further, they added.
  
  In a report earlier this week, S&P Global Ratings estimated China’s property sales could drop by a third this year because of mortgage strikes,as people believe developers won’t be able tocomplete presold units in time— the most common way they sell homes in the country.
  
  “Without sales, many more developers will collapse, which is both a financial and an economic threat,” said Capital Economics analysts.
