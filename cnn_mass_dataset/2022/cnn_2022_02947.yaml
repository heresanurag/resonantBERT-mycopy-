title: "Five takeaways from the only Florida governor debate between DeSantis and Crist"
date: "2022-10-24"
section: "Politics"
url: "https://www.cnn.com/2022/10/24/politics/florida-governor-debate-takeaways-desantis-crist?cid=external-feeds_iluminar_msn"
content: |
  Florida Gov. Ron DeSantisandDemocrat Charlie Cristwent toe-to-toe on abortion, Hurricane Ian response, the state’s ongoing culture wars and the rising Republican’s future political ambitions in an hour-long debate that produced a handful of notable moments that may just yet fire up Democrats in this state.
  
  Down in the polls and nearly out of campaign money, Crist entered the Sunrise Theatre in Fort Pierce, Florida, withalmost nothing left to loseand he repeatedly put DeSantis on the defensive over the divisive agenda that has catapulted the Republican into GOP stardom.​ Crist’s objective Monday was twofold: build momentum for the final weeks of the Florida race and bruisethe national reputation of DeSantis, who is also weighing a potentialpresidential primary campaignagainst former President Donald Trump as he seeks reelection as governor.
  
  In the face of Crist’s broadsides, DeSantis largely stayed the course, visibly gritting his teeth at times or feigning a smile, while sticking to his talking points and delivering a series of well-timed lines. DeSantis appeared less at ease on the debate stage than at his hand-crafted news conferences orchestrated to showcase his signature combative style. It was a conventional performance of a front-runner – and with a comfortable lead and almost $100 million left in the bank, DeSantis is certainly that, albeit one who has risen up the GOP’s presidential power rankings by bucking conventional wisdom.
  
  Here are five takeaways from Monday’s first and only debate ofFlorida’s governor race.
  
  Crist entered the debate seeking to engineer a race-altering moment that could galvanize not just Florida Democrats but people around the country looking to slow DeSantis’ national rise.
  
  With DeSantis and Crist often on opposing sides of a split screen and with a raucous crowd cheering over the objections of a debate moderator, the night produced plenty of opportunities for Crist to do just that.
  
  In one such moment, Crist attempted to get DeSantis to commit to a full four-year term if he wins in November.
  
  DeSantis, considering a run for president in 2024, wouldn’t bite.
  
