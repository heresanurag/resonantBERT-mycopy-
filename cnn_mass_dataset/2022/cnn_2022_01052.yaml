title: "Opinion: If I’d lived in a post-Roe world, my son might not be here"
date: "2022-05-27"
section: "Opinion"
url: "https://www.cnn.com/2022/05/27/opinions/roe-struck-down-ivf-journeys-beers/index.html"
content: |
  Editor’s Note:Laura Beers is a professor of history at American University. She is the author of“Your Britain: Media and the Making of the Labour Party”and“Red Ellen: The Life of Ellen Wilkinson, Socialist, Feminist, Internationalist.”The views expressed here are solely hers. View moreopinion articleson CNN.
  
  Since the moment of his birth, my 5-year-old son has been a near unalloyed joy, but the long journey to that moment was anything but joyous. My husband and I started trying for a child in 2013, and I quickly became pregnant. At 10 weeks, I had an unexplained miscarriage. I was rushed to the emergency room where I ultimately had a dilation and curettage, or D&C, to clear my womb of the self-aborted pregnancy.
  
  It took us over a year of trying before I became pregnant again. This time, I made it to the sonogram at the end of my first trimester, when doctors told us our baby had a condition that meant that he would likely die in utero. If he survived, he would only live for at most a few years, in a life spent in and out of the hospital. Ultimately, after extended soul-searching, I decided to abort the pregnancy, for the sake of both my existing family and my unborn son, a heart-wrenching decisionI have written about elsewhere.
  
  In the painful aftermath of these two losses, we turned toward in vitro fertilization, in the hopes that IVF would finally give us the baby we both longed for. We were extremely fortunate that I became pregnant following our first IVF attempt.
  
  It is widely expected that the Supreme Court will, in its anticipated decision in a case of a Mississippi abortion-restriction law, overturn the protection of abortion rights codified in Roe v. Wade. In a post-Roe world, it is possible that each of these steps on my parenting journey could be rendered illegal or practically prohibited in many states across the South and Midwest.
  
  In recent weeks,harrowing stories have come out of Texasof women being denied care during miscarriage by practitioners wary of being sued under HB8, the Texas law that allows individuals to sue anyone involved in terminating a pregnancy after the detection of a fetal heartbeat. The Oklahoma bill that was signed into law on Wednesday is even more severe, employing a similar enforcement mechanism as the Texas lawto ban all abortions from fertilization. The Oklahoma law will doubtless lead to similar tragedies in miscarriage management as have occurred in Texas. And Texas and Oklahoma are only two among several states that have passed or are considering laws that wouldprohibit or severely restrict abortion, even after a diagnosis of severe fetal disability.
  
  But the implications of recent abortion legislation extend beyond abortion and miscarriage. The legal assertion that life begins at conception hasimplications for IVF, and pro-life groups in this country and abroad have argued for a proscription not only of embryo research but also of the freezing and disposal of embryos. If such a proscription were to become law in some states, it would severely curtail the practice of IVF in this country.
  
  While the Oklahoma legislatorshave not commented on the bill’s implications for IVF, others have been quick to point out that the logical corollary of an abortion ban premised on fetal life beginning at fertilization would be a prohibition of many practices considered central to ensuring that IVF cycles lead to successful pregnancies. Such a scenario should not be dismissed as dystopian anti-science fiction. Pro-life Conservatives in the United Kingdomnearly succeeded in passing legislation to the same ends in 1985. The bill was only prevented from becoming law by a coordinated filibuster engineered by a group of pro-choice MPs working in close concert with OBGYNs and embryologists.
  
  Each step in my journey to motherhood – the D&C following my miscarriage, my abortion, and my IVF treatment – relied on the good faith support and care of doctors committed to helping me achieve the healthy pregnancy that I so desired. Recent anti-abortion legislation imperils the ability of doctors to provide similar care to their patients.
  
  Many of you reading this piece will have had, or know someone who has had, a D&C. They areamong the most common surgical proceduresperformed in the United States. A D&C is a procedure to dilate the cervix and cut or suction away tissue from the uterus. They are frequently performed following a miscarriage. When a woman cannot pass the miscarried fetus on her own, as happened to me, the fetal tissue is aspirated from the womb along with the placenta and other endometrial matter that supported the pregnancy.According to Johns Hopkins Medicine, “infection or heavy bleeding can occur if these tissues are not completely removed.” D&Cs thus play an important role in preserving the health and future fertility of women undergoing miscarriages.
  
  D&Cs are also used for abortions, including my own. The procedure is effectively identical, except that, in the case of a miscarriage, the pregnancy has already self-aborted. And therein lies the problem. Once a previously pregnant woman has had a D&C, there is no way to determine whether or not the pregnancy was viable at the time that the procedure was performed.
  
