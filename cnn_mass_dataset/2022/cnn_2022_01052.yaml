  Given that an estimated10 to 20% of known pregnancies result in miscarriage, and of those,roughly 50% require either medical or surgical intervention, abortion restrictions such as the law on the books in Texas, thesimilarly restrictive legislation recently passed in Idaho, and the total proscription of abortion in the Oklahoma legislation, have the potential to affect a large number of women.
  
  Some of the draconian anti-abortion laws passed in recent years have included exemptions for fetal health, although others,including Texas’s lawand the recent Oklahoma bill, do not. But even the laws that contain exemptions for fetal health arefrighteningly ambiguous for pregnant women. The Alabama law signed in 2019 permits abortion only if the mother’s life is at risk or if the fetus has a “lethal anomaly.” Louisiana’s provision includes an exception if the fetus has an anomaly that would prevent it from surviving after birth. Georgia’s law only allows abortion for fetal anomaly if the fetus “has a profound and irremediable congenital or chromosomal anomaly that is incompatible with sustaining life after birth.”
  
  How would I have fared under such legislation? Fetuses with my son’s condition – Lower Urinary Tract Obstruction (LUTO) –have a high perinatal morbidity and mortality rate, but the question of whether LUTO would qualify with certainty as a “lethal anomaly” isn’t answerable. Such heartless laws usurp what should be a family’s right to make a painful moral decision under a doctor’s care and give that power to the state. I can only imagine where my life – and my family’s – would be if a judge in Georgia or Alabama had authority over whether I could terminate my pregnancy.
  
  Finally, IVF. My husband and I turned to IVF after my abortion because, after two failed pregnancies, we were desperate to have a healthy baby. IVF is a procedure in which eggs are extracted from a woman’s ovaries, fertilized in a laboratory (in vitro literally means “in glass”) and then reimplanted into the woman’s womb to gestate like a natural pregnancy. When thefirst IVF baby, Louise Brown, was born in England in 1978, the embryologist, Robert Edwards, implanted a single fertilized embryo in her mother’s womb.
  
