  Editor’s Note:Peter Bergen is CNN’s national security analyst, a vice president at New America and a professor of practice at Arizona State University. His forthcoming paperback is “The Cost of Chaos: The Trump Administration and the World.” The views expressed in this commentary are his own. View moreopinionon CNN.
  
  Over the weekend President Joe Biden met in Poland with agroup of Ukrainian refugeeswhom he lauded as “an amazing group of people.” But where was Biden when it came to the Afghan refugees fleeing the rule of the Taliban this past summer?
  
  It was, of course, Biden who created that refugee crisis with his ill-considered and poorly executed decision to pull out of Afghanistan unilaterally in August, leaving the country to the tender mercies of the Taliban.
  
  Biden has never visited any of the Afghan refugees that his decision-making helped to create.
  
  Yet the Biden administration has far more responsibility to help Afghan refugees than Ukrainians since for the past two decades more than250,000 Afghansare estimated to have worked directly with the US military or American officials based in Afghanistan. All of them and their families are at risk for reprisals by the Taliban.
  
  Why Putin will regret launching this war
  
  Of course, the United States should do as much as possible for the Ukrainians fleeing Russian President Vladimir Putin’s scorched-earth war, but there is a strange double standard when it comes to the Biden administration’s approach to America’s Afghan allies.
  
  Consider that on Thursday the Biden administration announced100,000 visas for Ukrainian refugees.Yet theAssociation of Wartime Allies, an advocacy group for Afghans who worked for the US, estimated that of 81,000Special Immigrant Visa applicantsin Afghanistan when the Taliban seized Kabul, 78,000 were left behind. Meanwhile, the administration has admitted around 75,000 Afghan refugees since the Taliban’s takeover whocan stay at least 18 months.
  
  Following the chaotic scenes at Kabul airport as the US withdrew last summer, inan interview with ABC News, Biden seemed dismissive of the situation in Afghanistan, saying, “The idea that somehow, there’s a way to have gotten out without chaos ensuing – I don’t know how that happens.”
  
  The big hole in Biden's Afghan speech
  
  Four months after the Taliban took over Afghanistan, the Biden administration convenedthe Summit for Democracyof the world’s democracies, a club that Afghanistan had once been part of. No more.
  
  The Biden administration also constantlytrumpets its support for women’s rights. Yet last week the Taliban again denied girls older than 12 entry to Afghan schools. Seven months after the Taliban seized power, they continue to bangirls above the sixth grade from attending school. The Taliban’s Education Ministry said it’s because they haven’t designeda Sharia-compliant uniform for the girlsas yet. To use a Bidenism: “That’s a bunch ofmalarkey.”
  
  The Biden administration talks a good game about upholding democracy and women’s rights, yet it enabled the Taliban to take over Afghanistan. And now the Taliban have ended almost every element of a liberal democracy that once existed there and have also severely curtailed women’s rights.
  
  Thepopulation of Afghanistan and Ukraineis roughly the same, around 40 million people. Why abandon 40 million in one country and try and save 40 million in the other?
  
  Of course, it’s great the United States is doing what it can to save Ukraine, but the Biden administration’s abandonment of Afghanistan – a country that now gets scant media coverage – remains quite striking.
