  A body’s metabolic rate is determined by how quickly (or slowly) it turns calories into energy. To lose weight, the body must expend more energy than the calories consumed. “The more active you are, the more calories you burn,” according to theMayo Clinic.
  
  Aerobic exercise is the most efficient way to burn calories, but strength training is also important, experts say. That’s because muscle burns more calories than fat, both at rest and while exercising.
  
  Earlier research, conducted with larger groups of people overlonger periods of time, has found people who load up on calories in the morning do lose weight. It’s possible that eight weeks was not long enough for weight loss to be seen in the new research, the study’s authors said, or that other studies may not have measured body composition and energy expenditure in the same way.
  
  Regardless, the new research results should not be used to “refute the importance of breakfast for the hungry, nor does it address the role of ‘having’ versus ‘skipping’ breakfast on weight,” Katz said.
  
  It simply suggests that eating more calories at breakfast and fewer at dinner “may favor less hunger, more satiety during weight loss,” he said, assuming the meals are nutritionally the same.
