title: "San Francisco Giants and Carlos Correa reportedly agree on 13-year, $350 million deal"
date: "2022-12-14"
section: "Sport"
url: "https://www.cnn.com/2022/12/14/sport/carlos-correa-san-francisco-giants-deal-spt-intl/index.html"
content: |
  TheSan Francisco Giantsand two-time All-Star shortstop Carlos Correa have reportedly agreed to a franchise record, 13-year deal worth $350 million, according to ESPN’s Jeff Passan and MLB.com’s Mark Feinsand, citing unnamed sources.
  
  The deal is the largest for a shortstop inMLBhistory, according to Passan.
  
  Correa signed with the Minnesota Twins on a three-year, $105.3 million deal, according to the salary tracking website Spotrac, in March. He opted out of the final two years in November.
  
  Correa hit .291 with 22 home runs and 64 RBIs in 136 games last season.
  
  New York Yankees and Aaron Judge reportedly agree on nine-year deal worth $360 million
  
  Prior to joining the Twins, the 2012 top overall draft pick for theHouston Astrosplayed with the club for seven seasons where he was named to two All-Star teams in 2017 and 2021.
  
  Correa was part of Houston’s firstWorld Seriestitle team in 2017. He won his first ever Gold Glove, which is awarded to the best defender in each position, in 2021.
  
  The 28-year-old has batted .279 with 155 homers and 553 RBIs in eight MLB seasons.
