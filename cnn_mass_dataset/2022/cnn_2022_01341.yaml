title: "Fallen NYPD officer saved 5 lives with organ donation, organization says"
date: "2022-01-27"
section: "US"
url: "https://www.cnn.com/2022/01/27/us/nypd-officer-organ-donation/index.html"
content: |
  A New York Police officer who died days after a brutal shootout in Harlem saved five lives after his organs were donated, according toLiveOnNY, the organization that helped facilitate the donation.
  
  Officer Wilbert Mora, 27, donated his heart, liver, two kidneys, and pancreas to five patients needing lifesaving organ transplants, said LiveOnNY President and CEO Leonard Achan in a statement.
  
  Mora wasone of two officerswho died as a result of the shooting.
  
  “LiveOnNY can now confirm that through the generosity of NYPD Officer Mora and his family with their heroic gift of organ donation, 5 people who were waiting for a heart, liver, two kidneys, and pancreas were saved,” said Achan.
  
  Eric Adams has been mayor of NYC for 24 days. He's already at a crossroads
  
  The donations were given to three individuals in New York and two outside of the state based on the medical urgency of the patients’ status, according to Achan.
  
  “We are humbled and honored to be the steward of these gifts on behalf of Officer Mora and his family so others may live on,” Achan said.
  
  Mora and Officer Jason Rivera, 22, were fatally shot Friday when a suspected gunman opened fire in a Harlem apartment, authorities said. Rivera died the night of the shooting.
  
  The suspect, Lashawn McNeil, tried to run but wasconfronted and shot by a third officeron the scene and died days later, police said.
  
  Rivera’s wake took place Thursday at St. Patrick’s Cathedral and his funeral is scheduled for Friday.
