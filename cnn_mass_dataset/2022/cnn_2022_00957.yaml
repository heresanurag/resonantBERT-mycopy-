title: "US airstrike in Somalia kills 2 members of al-Shabaab, US says"
date: "2022-10-25"
section: "Politics"
url: "https://www.cnn.com/2022/10/25/politics/us-airstrike-al-shabaab-somalia-support/index.html"
content: |
  The US military conducted an airstrike over the weekend against theal-Shabaab terror groupin Somalia, which was attacking Somali National Army forces near Buulobarde, US Africa Command said.
  
  The strike occurred about 218 kilometers north-northwest of Mogadishu and the initial assessment is that it “killed two attacking al-Shabaab terrorists,” US Africa Command said in a news release, adding that no civilians were hurt in the strike.
  
  Sunday’s strike is the latest US military operation in Somalia. Earlier this month, a US airstrikekilled an al-Shabaab militant leader, and in late September, another strike killed 27 members of the terrorist group.
  
  The US has provided ongoing support to the Somali government sincePresident Joe Biden approved a Pentagon requestto redeploy US troops to the area in an attempt to counter the terrorist group in May. The approval to send fewer than 500 troops was a reversal offormer President Donald Trump’s decision to withdraw all US troops from the country in 2020.
