  Airlines will try to increase ticket prices to offset rising fuel costs. And they are counting on not losing too many customers since other airlines will also likely hike fares to try to offset higher fuel costs. Even Southwest Airlines, which hedges most of its fuel costs, faces other cost pressures, like labor expenses, and may seek to raise fares somewhat.
  
  Airlines are probably right to anticipate that passengers won’t stop traveling. After all, they know that declining virus counts, the end ofmask mandatesand considerable pent-up demand for travel will probably more than offset geopolitical and inflationary concerns for passengers. And given that airlines are constrained by staff shortages, there will likely not be many empty seats.
  
  On top of higher fuel costs, strong demand and limited supply translate to higher fares, though they will not need to be dramatically higher for airlines to offset costlier fuel.Delta Air Linesestimated in mid-March that it would need to raise fares $15 to $20 on a typical $200 one-way ticket to cover anticipated higherfuel costs. And thecompany saidmore recently that it is “successfully recapturing higher fuel prices.”
  
  We at S&P Global Ratings don’t expect that airlines will be able to fully offset the higher cost of fuel through fare increases (and their earnings will suffer accordingly), but they should be able to recover most of it.
  
  Of course, as we all well know after the last couple of years, a lot could change by the time the summer travel season arrives. But right now we’re on track for a busy — and pricey — season ahead.
