title: "Opinion: Get ready for crowded planes and higher fares this summer"
date: "2022-04-20"
section: "Perspectives"
url: "https://www.cnn.com/2022/04/20/perspectives/summer-travel-airlines-prices/index.html"
content: |
  Editor’s Note:Philip Baggaley is a managing director with S&P Global Ratings, and has been following the airline industry as a credit analyst since 1985. The opinions expressed in this commentary are his own.
  
  Ever since Covid-19 nearly shut down travel two years ago, US airlines and travelers have been dealing with frustration and uncertainty. They’ve endured several waves of the virus, government-mandated restrictions on travel and service problems as airlines struggled to staff up for a resurgence in demand. All of this has tested passengers’ patience and airlines’ balance sheets.
  
  Unfortunately, there are more unknowns on the horizon. A new and more dangerous variant of Covid could emerge (there is already a more transmissible form of Omicron spreading); the war in Ukraine could take an even more dangerous turn; or rising interest rates, inflation and oil prices could slow the US and global economies more than expected.
  
  We are only about eight weeks into the crisis in Ukraine, but so far, travelers don’t appear to be pulling back. In March,passengerswere at 87% of 2019 levels, and manyairlinesare reporting no discernable effect as of yet onbookingsfor future travel, which remain strong.
  
  If these trends continue, this summer will most likely be much like last year’s — with crowded planes. But this time the fares will be noticeably higher.
  
  For airlines, higher fuel costs will slow their long, bumpy path to financial recovery —fuelis already one of the most expensive items for airlines. And the sudden run-up in oil prices will feed through to jet fuel prices. US airlines have disclosed estimates of how much a specified increase injet fuel priceswould raise their expenses. The numbers are sobering.
  
  For example, a $1 increase in the price per barrel of jet fuel could costAmerican Airlinesan extra $95 million over the course of a year, based on its forecast fuel consumption. Meanwhile,Delta Air Linesrecently estimated that its second quarter 2022 jet fuel would cost $3.20 to $3.35 per gallon, compared with $2.16 in the same periodlast year.
  
