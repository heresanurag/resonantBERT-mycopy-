title: "Traders sleep by their desks as China’s financial hub locks down"
date: "2022-03-30"
section: "Business"
url: "https://www.cnn.com/2022/03/30/business/shanghai-covid-lockdown-finance-intl-hnk-mic/index.html"
content: |
  Editor’s Note:A version of this story appeared in CNN’s Meanwhile in China newsletter, a three-times-a-week update exploring what you need to know about the country’s rise and how it impacts the world.Sign up here.
  
  China’sbanks and investment firms are calling on essential staff to live at the office this week to avoid any trading disruption during Shanghai’smassiveCovid lockdown.
  
  A person familiar with the matter told CNN Business that traders and fund managers were being offered between 500 and 2,000 yuan ($78 to $314) per night to camp out at work, with some companies placing folding beds under workers’ desks. Other firms have also provided staff with sleeping bags, food and toiletries to get by.
  
  Much of Pudong “is doing it,” the source added, referring to Shanghai’s financial district, which is home tomore than 1,000financial institutions, and China’s leading stock exchange — which is continuing to operate as normal.
  
  Zhong Ou Asset Management, a Chinese firm thatsaysit has $98 billion in assets under management, said that several of its investment directors and fund managers had begun staying overnight earlier this month to ensure operations continued as the pandemic “began to escalate” in Shanghai.
  
  One executive, who is designated the “onsite chief,” has been “stationed in the office for more than half a month,” the companysaidin a post on Chinese social network WeChat on Monday.
  
  China battles biggest surge in Covid cases since original Wuhan outbreak
  
  Another firm, Foresight Fund, also said some of its staffers had been staying at the office since March 16.
  
  “Weekends are no exception. They bring daily necessities and call the company home,” itsaidin a post on WeChat, featuring photos of a well-stocked pantry and camping beds set up beside workers’ desks.
  
  Shanghai has emerged as thenew epicenterof China’s worst Covid-19 outbreak in two years, reporting more than 25,000 cases since March 1.
  
  Officialskicked off a staggered lockdown on Monday, with about 11 million people in the eastern half of the city — which includes Pudong — told to stay indoors for four days. The western half, which houses about 14 million residents, will start restrictions on Friday.
  
  During the pandemic, workers in China have become familiar with the concept of living in the office.
  
  Earlier this month, Chinese state-run news outlet china.com.cn posted a video diary showing workers spending severalnights in an office in Shanghai. While the video did not identify the company, it said that75 workers were living in 3,230 square feet of space.
  
  In the footage,postedon Chinese social platform Weixinearlier this month, employees slept on air mattresses scattered around the office. One man washed his face in the bathroom sink.
  
  Showers were “a problem,” one worker said in the video, adding that the team initially had to boil hot water to wash up before a shower facility was eventually installed.
  
  “It feels like going back to the dorms at university.”
  
  When it came time to sleep, they faced other problems. The employee in the video complained that the marble floor was hard and uncomfortable, even with sleeping bags.
  
  They bring daily necessities and call the company home.
  
  Foresight Fund, a Chinese financial firm
  
  “The first couple of days, we felt panic. We couldn’t sleep until 2 to 3 a.m.,” she said.
  
  Some colleagues also snored, so “we decided to send them to a meeting room,” she added. “So they sleep together in that room.”
  
  The video did not specifywhy the workers were in lockdown prior to the citywide restrictions.
  
  But China has a practice of imposing “snap” lockdowns across the country, sometimesshutting downentire office buildings with people still inside, even if just a single Covid-19 case is detected. Those workers are often also provided bedding and other necessities.
  
  Last year, Shanghai Disneyland became aprominent exampleof such stringent measures, with tens of thousands of visitors and staff forced to undergo coronavirus testing after authorities said that one visitor had tested positive.
  
  Shanghai Disney closes as city sees record surge in Covid cases
  
  Despite the latest clampdown, businesses in Shanghai are not deterred.
  
  This week, the Shanghai Stock Exchange said it would offer online services for companies to continue to hold listing ceremonies, roadshows and shareholder meetings. It will also relax some requirements for the submission of documents.
  
  The priority is to keep the “business running,” Zhong Ou Asset Management said in its post Monday.
