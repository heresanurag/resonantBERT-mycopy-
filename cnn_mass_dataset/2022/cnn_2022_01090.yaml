title: "How the Northeast’s extreme drought could spoil this year’s fall colors"
date: "2022-09-10"
section: "US"
url: "https://www.cnn.com/2022/09/10/us/fall-colors-northeast-drought-climate"
content: |
  Three years ago, Andy Finton planted a sugar maple tree – his favorite species – in his suburban Boston backyard. Each fall he waits for its leaves to change into the bright red or deep orange autumn colors the tree is known for.
  
  That’s probably not going to happen this year.
  
  Severe droughthas been spreading and intensifying inNew Englandthis summer, prompting concerns over how vibrant the region’s fall colors show will be and whether the muted outlook could impact its multi-billion dollar fall tourism industry.
  
