title: "An algae bloom has killed thousands of fish in the San Francisco Bay Area"
date: "2022-09-03"
section: "US"
url: "https://www.cnn.com/2022/09/03/us/san-francisco-bay-area-algae-fish/index.html"
content: |
  Analgae bloomhas killed thousands of fish in the San Francisco Bay Area in recent weeks, officials say, forcing shoreline cleanups, spreading unpleasant odor and spurring scientists to further investigate the extent of the ecological damage.
  
  The bloom was detected in late July in the Oakland and Alameda areas, and dead fish have since washed ashore in the bay as well as at Oakland’s Lake Merritt, California fish and wildlife department spokesperson Jordan Traverso said.
  
  “It’s estimated that 10,000 yellowfin gobies died … as well as hundreds of striped bass and hundreds of sturgeon,” and the bloom probably is impacting all aquatic species in the area “to some degree,” Traverso said.
  
  The situation escalated early this week atLake Merritt, where numerous dead fish began lining the shores, Oaklandofficialssaid. Parts of the lake’s shoreline were nearly covered in the carcasses of tiny fish, with more sizable fish scattered about, images from the city and CNN affiliatesKPIXand KGO showed.
  
  A city-hired crew removed 1,200 pounds of fish from the lake’s shores Wednesday, continued shore cleanup Thursday, and will remove floating material from the lake’s surface into the weekend, the city governmentsaidonline. It acknowledged unpleasant odors around the lake, abutted by awell-visited parkand urban surroundings.
  
  “You can smell – it’s not like, awful-awful, but there’s definitely a stench,” Mitchell Manburg, who was exercising in the area,told CNN affiliate KPIXthis week, before the cleanup started.
  
  Algae blooms and dead fish were reported not only along the Oakland and Lake Merritt shorelines, but also “for many miles to the north and south along the coastline,” Oakland’s release reads.
  
  Precisely what killed the fish wasn’t immediately known, but it’s “likely related to dissolved oxygen levels and/or toxins produced by the algal bloom,” Traverso said.
  
  The cause of the bloom also wasn’t clear. Oakland’s government cited several potential sources and contributing conditions.
  
  “Generally, increased inputs of nutrients like nitrogen and phosphorus (from fertilizers and human or animal wastes), low water flows, stagnant water, increased intensity and duration of sunlight, and sustained high temperatures create the ideal conditions for these blooms,” thecity’s online postreads.
  
  “Current research suggests that the rising temperatures and changing precipitation patterns caused by climate change are a catalyst for their growth,” the post continued.
  
  Algae are a natural part of the ecosystem, but when they are overabundant the compounds they release can accumulate to levels harmful to wildlife and people, theCalifornia Water Quality Monitoring Councilsays.
  
  The state fish and wildlife department is working to sample strategic locations to “verify the extent of the harm to fish and aquatic species,” Traverso said.
  
  Oakland’s public works department and its water board detected “low levels of contaminants associated with harmful algae blooms” in May, the city said. The city then posted signs warning lake visitors that harmful algae might be there, and to not touch the water, it said.
