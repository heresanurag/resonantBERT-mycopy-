title: "Start your week smart: Ukraine, Earthquake, King Charles III, The Queen, Mar-a-Lago"
date: "2022-09-11"
section: "US"
url: "https://www.cnn.com/2022/09/11/us/five-things-september-11-trnd/index.html"
content: |
  Today isSeptember 11, and if you are old enough to remember the events of that day 21 years ago, you know the painful memories of loss and sacrifice this anniversary invokes. Channel those feelings into something positive today by reflecting on what’s most important to you andperforming at least one good deedthat helps someone else in need.
  
  Here’s what else you should know toStart Your Week Smart.
  
  • Ukraine dealt a big blow to Russia’s grip on parts of the east with a fast-moving offensive that saw Ukrainian troopsenter the strategic city of Iziumafter five months of occupation.
  
  • A massive7.6 earthquake struck Papua New Guineaearlier today, causing landslides, cracking roads and damaging buildings.
  
  • King Charles III dedicated “what remains to me of my life” to “the heavy task that has been laid upon me” after he was formally confirmed as thenew king of the United Kingdomin a ceremony steeped in tradition and pageantry at St. James’s Palace on Saturday.
  
  • Thestate funeralfor Britain’sQueen Elizabeth IIwill take place a week from Monday at Westminster Abbey, and she will lie in state in Westminster Hall from Wednesday, Buckingham Palace has announced.
  
  • The Justice Department and former President Donald Trump’s lawyersproposed two selections eachto a federal judge for who should serve as “special master” in the Mar-a-Lago investigation.
  
  Primary season wraps up with voters heading to the polls inDelaware, New Hampshire and Rhode Island. Here’severything you need to knowahead of the final sprint to the midterm elections in November.
  
  Twitter’s former head of security, who filed anexplosive whistleblower disclosurein July, is scheduled to testify before the Senate Judiciary Committee to discuss his allegations of serious security vulnerabilities at the social media company. September 13 is also the day that Twitter’s shareholders areset to voteon whether to approve Elon Musk’s $44 billion takeover deal – whichMusk wants to terminate.
  
  Alex Jones’ second defamation trial over the mass shooting at Sandy Hook Elementary School is expected to begin in Connecticut. The trial will determinehow much Jones and his companywill have to pay the families of the victims. Jones was previously found liable in a defamation lawsuit for calling the2012 massacrea hoax. In August, a Texas juryawarded $45.2 millionto the parents of one of the children killed in the shooting.
  
  And the 77th session of theUN General Assemblykicks off in New York City with representatives from the193 member statesgathering in person after a two-year disruption due to Covid-19.
  
  Chinese leader Xi Jinping and Russian President Vladimir Putin are expected tomeet on the sidelines of a summitin Uzbekistan. It will be the first face-to-face meeting between the two leaders – who have established a close relationship – sinceRussia began its invasion of Ukraineearlier this year.
  
  It’s also the beginning ofHispanic Heritage Month.
  
  A looming rail strike could deal another blow to America’s economy. Unions representing more than 90,000 workers at the nation’s freight railroads arepoised to go on strikeon September 16, a move that could bring nearly 30% of the nation’s freight to a grinding halt.
  
  September 17 isConstitution Day, which commemorates the day in 1787 that 39 of the delegates to the Constitutional Convention signed the document in Philadelphia.
  
  Want to hear more about Queen Elizabeth’s legacy?
  
  In this week’sOne Thingpodcast, CNN Chief International Anchor Christiane Amanpour looks back at the Queen’s legacy and unpacks what her death means for the future of the monarchy. Plus, she remembers being honored by Queen Elizabeth for her work and what it was like meeting her face-to-face.Listen here.
  
  Check out more moving, fascinating and thought-provoking imagesfrom the week that was, curated by CNN Photos.
  
  The74th Emmy Awardshosted by “SNL” veteranKenan Thompsonwill air Monday at 8 p.m. ET on NBC. You can get ready for the show by reading aboutall the nominations here. And be sure to check out some of thenominees’ reactionsto getting the nod.
  
  Elsewhere in TV and streaming land…
  
  Season 5 of“The Handmaid’s Tale”premiers Wednesday on Hulu, while the fourth and final season of“Atlanta”begins Thursday on FX.
  
  Viola Davis stars in this drama based on the history of the Agojie, an army of women warriors who defended the West African kingdom of Dahomey in the 18th and 19th centuries.“The Woman King”hits theaters on Friday.
  
  TheUS Openmen’s singles final is set for later today withCasper Ruud facing Carlos Alcaraz. On Saturday, Polish tennis starIga Swiatek defeated Tunisia’s Ons Jabeurin straight sets in the women’s singles final
  
  And you can watch the premiere of“Serena Williams: On Her Terms”tonight at 8 p.m. ET on CNN. The film chronicles her early beginnings in Compton, California, to her epic ascent to international prominence, exploring the key moments on and off the court that shaped her evolution.
  
  Game 1 of the 2022WNBA Finalstips off today with the Las Vegas Aces facing the Connecticut Sun. Last week, WNBA legend Sue Birdbid farewell to the sportwhen her Seattle Storm lost in the semifinals to Las Vegas.
  
  It’s the first Sunday of theNFL season, so go stake out your spot on the couch now. And if you are new to the game – or merely clueless like me – here’s aglossary of terms and football jargonto get you up to speed.
  
  Take CNN’s weekly news quizto see how much you remember from the week that was! So far, only 19% of fellow quiz fans have gotten eight or more questions right. How will you fare?
  
