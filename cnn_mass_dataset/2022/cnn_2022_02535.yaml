  DeSantishas inserted himselfinto the state’s once-in-a-decade redistricting process far more than any of his predecessors, even going so far as to submit his own maps for consideration. He has repeatedly said he would veto any map that does not reapportion Florida’s 5th Congressional District, a Black plurality seat that stretches across north Florida to connect African American communities in Tallahassee and Jacksonville. The district is represented by Democratic Rep. Al Lawson, who is Black. DeSantis would also break up an Orlando-area district represented by Rep. Val Demings, who is also Black.
  
  DeSantis believes Lawson’s district represents an unconstitutional gerrymander, even though it was approved by the state Supreme Court last decade.
  
  If DeSantis vetoes the maps, then the Legislature could override him with two-thirds of the vote. If state lawmakers cannot come to agreement on a map, then they could kick the fight to the state Supreme Court.
  
  Florida is one of four states that have yet to finalize their congressional maps.
