title: "Mudslide traps drivers in Southern California as storms bring heavy rainfall over the region"
date: "2022-09-12"
section: "US"
url: "https://www.cnn.com/2022/09/12/us/california-lake-hughes-mudslide"
content: |
  A mudslide trapped multiple drivers in Southern California as storms drenched the region and brought flash flood warnings Sunday evening.
  
  Several motorists were rescued after their vehicles became stuck in a mud and debris flow on Pine Canyon Road in the Lake Hughes area, about 65 miles north of Los Angeles, according to the Los Angeles County Fire Department.
  
  Rescuers responded to the area shortly before 8 p.m., the agency said in atweet.
  
  A total of 24 vehicles became stuck on the road with 53 people accounted for, according to apreliminary storm reportfrom the National Weather Service.
  
  Oregon wildfire explodes in size as multiple blazes rage across the West, forcing evacuations and worsening air quality
  
  Earlier, maintenance crews responded to reports of a mudslide blocking all lanes on Lake Hughes Road, Los Angeles County Public Workstweeted.
  
  Aerial video fromCNN affiliate KCAL/KCBSshowed thick mud blanketing a roadway, where several vehicles appeared to be trapped.
  
  The mudslide came as the area was experiencing scattered rainfall from post-tropical cyclone Kay as it pulled away from the region. Lingering showers and thunderstorms were expected though Monday, with flooding possible in the mountains overnight, according to theNational Weather Service.
  
  A Flash Floodwarningwas in effect for northwestern Los Angeles and Ventura counties until 10:45 p.m. Sunday, with the weather service warning about flash flooding in small creeks and streams, urban areas and highways, as well as other low-lying areas.
