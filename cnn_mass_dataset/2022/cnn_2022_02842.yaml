  # 2-year-old dies after being run over by construction equipment in North Carolina
  
  By [Rebekah Riess](https://www.cnn.com/profiles/rebekah-riess)
  
  Updated Apr 2, 2022
  
  Updated Apr 2, 2022, 4:45 PM ET
  
  PUBLISHED Apr 2, 2022, 12:33 PM ET
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2022%2F04%2F02%2Fus%2Fnorth-carolina-2-year-old-dies-run-over "Share with email")Link Threads
  
