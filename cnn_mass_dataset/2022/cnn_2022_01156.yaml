title: "Some migrants who were flown to Martha’s Vineyard will still ‘wind up in Florida anyway,’ advocacy organization says"
date: "2022-09-17"
section: "US"
url: "https://www.cnn.com/2022/09/17/us/marthas-vineyard-migrants-florida-saturday?cid=external-feeds_iluminar_msn"
content: |
  Florida Gov. Ron DeSantisspent taxpayers’ moneyon flying migrants toMartha’s VineyardinMassachusettsand some of those people are “still going to wind up in Florida anyway,” said Domingo Garcia, the president of theLeague of United Latin American Citizens(LULAC).
  
  The roughly 50 migrants touched down on the island earlier this week, surprising a community that was not expecting their arrival but quicklyworked to coordinateand address the migrants’ needs. On Friday, the group was taken to a military base to receive shelter and humanitarian support, officialssaid.
  
  The flight’s stunt was part of a series of efforts by Republican governors who, critical of federal efforts on southern border security, have begun transporting migrants to liberal cities and states. Also this week,two buses of migrantssent by Texas Gov. Greg Abbott arrived outside Vice President Kamala Harris’ official residence in the nation’s capital.
  
  Many of the migrants who were sent to Massachusettsdid not want to stay in Martha’s Vineyard because they have family or friends in other parts of the country like Miami and Portland, Oregon, and now they’re trying to figure outhow to get tickets to those places, Garcia said. Three peoplehe spoke to wanted to go to Florida, he added.
  
  “It’s a political stunt,” Garciatold CNN over the phone Saturday. “They’re going to wind up in Miami.”
  
  Migrants released from government custody often move to other cities across the US as they go through their immigration proceedings.
  
  The two flights of migrants who arrived in Massachusetts – and for which Florida’s governor claimed credit – were coming from Texas, not Florida. But DeSantis has for months been talking about plans to get his state involved in redirecting migrants from the southern border and to liberal areas. And on Friday, he set the expectation for buses and“likely more” flightsfull of migrants paid for by Florida, adding that “these are just the beginning efforts.”
  
  Garcia saidhe spoke in person to about 11 migrants on Martha’s Vineyard on Friday and, separately, a few migrants in DC. Most of the migrants were happy with the “welcome they had received in Martha’s Vineyard,” but felt they had been used for politics, Garcia said.
  
  'They enriched us.' Migrants' 44-hour visit leaves indelible mark on Martha's Vineyard
  
  He criticized DeSantis and Abbott over their treatment of the migrants, saying the governors want to “score political points with their base.”
  
  Democratic leaders, migrants’ advocates and federal officials have also denounced the moves of the two governors. White House press secretary Karine Jean-Pierre accused the governors of using migrants as “political pawns” and said their actions amounted to a “cruel, premeditated political stunt.”
  
  Lawyers for Civil Rights, a group of attorneys representing more than 30 of the migrants flown to Massachusetts, on SaturdayaskedUS Attorney for Massachusetts Rachael Rollins and the state’s attorney general to open criminal investigations into the flights, also calling them a “political stunt.”
  
  A spokesperson for Rollins’ office told CNN they did not have a comment.
  
  Rollinstold reporters on Thursdayshe would be speaking with members of the Department of Justice about DeSantis sending the migrants to Massachusetts, saying at the time she did not yet have enough information to say whether he broke any laws in doing so, and added their first priority was making sure the people who arrived were treated respectfully.
  
  A spokesperson for the Massachusetts Attorney General’s Office said the office is in touch with federal and state partners, gathering facts and evaluating all legal options related to the two flights.
  
  “Our office continues to review all information relevant to this situation,” spokesperson Chloe Gotsis told CNN in a statement.
  
  Meanwhile, Garcia on Saturday described the scene when the migrants left Martha’s Vineyard for Joint Base Cape Cod – already an emergency shelter designated by the state emergency management agency – a day earlier and local volunteers bid them goodbye.
  
  “Everyone was clapping and cheering them on,” he said. “It’s actually what America’s supposed to be like.”
