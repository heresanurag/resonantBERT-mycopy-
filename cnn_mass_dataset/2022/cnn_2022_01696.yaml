  What we now require is greater participation by the private sector to identify partners in each of the other countries. Because once they have identified partners, we will establish if there are any shortcomings in the policy framework. The African market is huge. It’s important that we work to remove any barriers, not just tariffs.
  
  As Trade and Industry Minister, what are you doing to make Kenya a regional hub?
  
  Maina:Kenya’s interest is consistent across all integration projects. We see them as an opportunity to challenge our companies to become more globally competitive so they can penetrate these markets. But it’s also important that we penetrate these markets with goods that do not yetexist. It has given us an opportunity to go up in the industrialization journey towards production of capital goods, towards production of pharmaceuticals. We produce textiles and apparel, but there other sophisticated industries that we can and sign up to.
  
  You said the private sector is going to be very important to create that system that will facilitate trade. What are you doing to ensure that the private sector can expand into other countries?
  
  Maina:We talk with the private sector on a very regular basis. We have a good sense of the capacity of our private sector, and we work to facilitate their entries into these different markets. But the government is not a producer, the government is not in business. It’s important to talk to the private sector as you attract new investment, to ensure that they can become partners.
  
  Are you happy with Kenya’s trade numbers from 2021?
  
  Maina:We could do better. We could always do better. We have a goal within the government to expand our exports on an annual basis by 25%. We’ve not yet reached that number. So clearly it shows that there’s a lot of work to do to get our trade numbers up.
