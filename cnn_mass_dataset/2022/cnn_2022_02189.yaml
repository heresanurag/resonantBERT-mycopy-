title: "Bonnaroo announces its 2022 lineup after two years of canceled festivals"
date: "2022-01-11"
section: "Entertainment"
url: "https://www.cnn.com/2022/01/11/entertainment/bonnaroo-2022-lineup-cec/index.html"
content: |
  After two years off, Bonnaroo will return this summer with headlinersStevie Nicks, J. Cole and Tool, among others. And this time, hopefully, the festivities won’t be halted by the pandemic or extreme weather.
  
  Both the 2020 and 2021 editions of the popular music and arts festival were canceled – theformer due to Covid-19, like most other festivals that year, and thelatter after severe floodingmade much of the festival site, a 700-acre farm in Middle Tennessee, unusable.
  
  But organizers are hoping the show, scheduled to run June 16 to 19, will go on this year. The new lineup features notable artists from various genres, likecountry trio The Chicks, rapper21 Savage, electronic hitmaker Flume and viral star Roddy Ricch. Indie acts include Japanese Breakfast, 100 gecs and Lord Huron.
  
  Bonnaroo organizers cancel this year's festival, citing flooding from heavy rains
  
  Bonnaroo revelers typically camp out on the grounds to catch four days of acts, running Thursday through Sunday. Last year’s lineup was set to includeLizzo,Megan Thee StallionandFoo Fighters, among other big names, before organizers called it off.
  
  Tickets for the festival go on sale at 1 p.m. ET Thursday,starting at $320for four-day general admission. Though last year, attendees were required to provide proof of vaccination or negative test results within 72 hours, Bonnaroo organizers have not announced the2022 festival’s Covid-19 vaccination policy.
