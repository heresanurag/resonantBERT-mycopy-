title: "Start your week smart: Ukraine, Putin, Colorado wildfire, China plane crash, Volcano"
date: "2022-03-27"
section: "US"
url: "https://www.cnn.com/2022/03/27/us/five-things-march-27-trnd/index.html"
content: |
  Two cups of coffee a day keeps the doctor away! Contrary to worries among some doctors and the public, new research found that drinking two to three cups of coffee daily has been associated with a10% to 15% lower riskof getting heart disease. Here’s what else you need to know toStart Your Week Smart.
  
  • Ukraine has reclaimed several villages from Russian forcesin a series of counterattacks, including to the east of Kharkiv and northwest of Mariupol, after Russian missiles struck the western city of Lviv yesterday.
  
  • US President Joe Biden said Russian President Vladimir Putin“cannot remain in power”during a speech in Poland yesterday, but the White House said afterward that it was not a direct call for regime change.
  
  • A wildfire near Boulder, Colorado, hasprompted an evacuation warningfor nearly 20,000 people.
  
  • All 132 people on board the China Eastern Airlines jetliner thatcrashed in the densely forested mountainsof southern China Monday are dead, China’s aviation authorities confirmed late yesterday.
  
  • Philippine authorities haveevacuated thousands of residentsas volcano Taal spewed a mile-high plume south of central Manila.
  
  The Senate Judiciary Committee isscheduled to consider the nominationof Judge Ketanji Brown Jackson to the Supreme Court. Jackson’sconfirmation hearings concluded last weekafter rounds of questioning and heated exchanges with some GOP senators. Republicans, however, are expected to request a one-week delay, pushing the vote to April 4. The committee chair, Sen. Dick Durbin, has already announced that he would accept the request.
  
  President Joe Biden is also expected to release hisbudget proposal for fiscal year 2023. The statutory deadline for submission to Congress is typically the first Monday in February, but the announcement was delayed due to the late State of the Union address this year.
  
  It’s launch day for CNN+, a whole new streaming experience that will bring you a fresh take on the day’s headlines and a way to interact and take part in the conversation.Sign up now for updatesand learn how to subscribe and start streaming.
  
  Something else that’s set to launch Tuesday … Jeff Bezos’ Blue Origin will send another rocket to the edge of space. The launch was originally set for March 23, but was pushed back for additional ground tests. “SNL” star Pete Davidson, who had been scheduled to make the trip, said he wasno longer able to goafter the launch date was moved. Blue Origin later announced it will replace Davidson with thechief architect of its suborbital rocket, Gary Lai. Five other paying customers are set to go on the flight.
  
  March 31 isCesar Chavez Day. The national holiday honors the civil rights activism of the late labor organizer. Without Chavez, California’s farm workers wouldn’t have fair wages, lunch breaks and access to toilets or clean water in the fields.
  
  Happy April Fools’ Day! We all need a little laugh every now and then. Today is the day to joke and have fun with your friends and family, so here are some ofthe greatest April Fools’ pranks of all time. Feel free to use them as inspiration! Or maybe you already have a few pranks up your sleeve!
  
  Want more 5 Things?This week on the Sunday edition of the 5 Things podcast, we kick off a special series on anti-Asian violence in America. In part one, CNN’s Natasha Chen explores the aftermath of the Atlanta spa shootings and examines why many of these acts of violence are not recognized as hate crimes..Listen here!
  
  Check out more moving and fascinating imagesfrom the week that was, curated by CNN Photos.
  
  The 94th Academy Awards will be presented later today at the Dolby Theatre in Los Angeles. The ceremony will be broadcast live at 8 p.m. ET on ABC. Wanda Sykes, Amy Schumer and Regina Hall are co-hosting the event – the first Oscars ceremony with a host since 2018. “The Power of the Dog” leads among nominated films with 12 nods. “Dune” has 10, while “West Side Story” and “Belfast” each have seven. Learn more about the show and get arefresher on all the nominees here.
  
  March Madness rolls on
  
  Duke men’s basketball head coach Mike Krzyzewskiadvanced to his record-setting 13th Final Four appearanceyesterday after the No. 2 seed Blue Devils defeated No. 4 seed Arkansas in the Elite Eight of the NCAA men’s tournament. Duke will next face the winner of today’s No. 15 seed Saint Peter’s and No. 8 seed North Carolina Elite Eight game. The Saint Peter’s teammade historyFriday night by becoming the first No. 15 seed to reach the Elite Eight. No. 1 seed Kansas will face No. 10 seed Miami in the other Elite Eight game later today.
  
  Italy fails to qualify for men’s World Cup
  
  Italy players are “destroyed and crushed” afterfailing to qualify for the 2022 World Cup in Qatarfollowing a last-gasp defeat to North Macedonia, according to defender Giorgio Chiellini. Aleksandar Trajkovski scored a dramatic 92nd-minute winner to stun the European champions in their playoff qualifier semifinal and ensure Italy will not be playing the World Cup for the second straight time, having also missed out in 2018.
  
  First woman to be drafted by a professional baseball team
  
  History was made this past week when the Kentucky Wild Health Genomes drafted Alexis Hopkins,the first woman ever draftedby an American professional baseball team for an on-field role, according to the Atlantic League and MLB.com.
  
