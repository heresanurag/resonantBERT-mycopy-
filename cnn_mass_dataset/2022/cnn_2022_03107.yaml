  Many Americans think $2 bills are rare or have gone out of circulation, but that’s a misconception. The Treasury Department’s Bureau of Engraving and Printing will churn out more than 200 million $2 bills this year. However, there are several reasonswhy the notes never took off– one being the widespread superstition that they were bad luck.
  
