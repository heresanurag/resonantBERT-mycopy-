title: "Opinion: The surprising reason for Joe Biden’s low approval rating"
date: "2022-06-11"
section: "Opinion"
url: "https://www.cnn.com/2022/06/11/opinions/biden-approval-ratings-left-wing-fanfiction-masciotra/index.html"
content: |
  Editor’s Note:David Masciotrais the author of“I Am Somebody: Why Jesse Jackson Matters”and“Mellencamp: American Troubadour.”He has written for many publications on politics, music and literature, including Salon, No Depression, the Progressive, CounterPunch and the Los Angeles Review of Books. The views expressed in this commentary are his own. View moreopinionon CNN.
  
  One of the most obvious realities of American politics is that the Republican Party, members of which have pushed increasingly hateful rhetoric, is blocking President Joe Biden’s reform efforts to improve people’s lives. What is much less recognized is that a significant faction of the left also damages any hope for improvement in a country wrestling with unprecedentedassaults on democracy,escalating hate crimesandgun violence,global warmingandextreme income inequality.
  
  Commentators offer different theories to explain Biden’slow approval ratings, but many miss the importance of partisan loyalty.Gallup pollsshow that Biden’s support among Democrats declined from 95% at the start of his presidency to 85% by early 2022. Trump, on the other hand, had lost only1% of Republicansover a similar time period during his presidency, going from 87%  to 86% in approval. What could likely account for Biden’s comparatively worse losses among members of his own party is the insidious influence of what I call the “fan fiction left.”
  
  Increasingly dominant on the internet — particularly social media and the podcast sphere — the fan fiction left imagines an alternative universe where the Republican Party, with its embrace ofTrump and his authoritarian tendencies, is not the main problem of American politics. Instead, in this view, the only hindrance to the enactment of just and beneficial public policy is lack of will within the Democratic Party.
  
  Opinion: I witnessed Jan. 6 and want the public to understand the truth
  
  Far worse than teenagers writing an extension of their favorite anime series or video game, the fan fiction left encourages its audience, which depending on the writer or podcast often rivals those of mainstream publications and programs, to act in accordance with its weird delusions. Hallucination is central to their magical world of make-believe. Enter that world, and you will learn the following:
  
  Opinion: The 75-year-old lesson for pushing back against Putin
  
  It’s likely these ideas play a role in the divergence in party loyalty that lowers Biden’s approval rating to Trump levels, but more importantly, it illustrates the venomous effect that the left has on potential Democratic voters.
  
  Considering that its fabulists soconsistentlyandaggressivelyridicule Democrats, they are operationally right wing. The impact of the fan fiction left, irrespective of intention, is to dampen voter enthusiasm for the Democratic Party. As a consequence, it helps Republicans capture and hold power. Judging bypopularsocialmediaaccounts, millions of young progressivesbelievethat, if he only wanted, Biden could cast a spell, and by wizard’s fiat, transform the United States into Finland.
  
  An emblematic example arose recently when several leading left pundits declared they were“done with Democrats”in reaction to the news that theSupreme Court is preparing to overturn Roe v. Wade.
  
  Jimmy Kimmel presses Biden on gun control
  
  It is incoherent to blame the Democratic Party, given that it is Democratic governors, likeJay Pritzkerof Illinois,Gavin Newsomof California andGretchen Whitmerof Michigan, who have vowed to protect women’s reproductive rights in their states, and it is Republicangovernorslike Brian Kemp in Georgia andKevin Stittof Oklahoma and theSupreme Courtappointments of Republican presidents who are  poised to eliminate women’s autonomy.
  
  Observable reality is irrelevant to this faction of the left. Theonly thing that mattersis that President Barack Obama and the Democrats did not codify Roe v. Wade as federal law when they controlled Congress from 2009 to 2011. But this argument ignores that Obama and Democrat lawmakers spent those two years pushing through amassive stimulus packagein the middle of financial collapse and then passing themost consequential expansionof the welfare state since the 1960s, theAffordable Care Act, which enabled more than20 million Americansto receive health care for the first time.
  
  Obama also appointedElena KaganandSonia Sotomayorto the Supreme Court, both of whom are committed to protecting a woman’s right to choose. He also nominated Merrick Garland, now the Attorney General, to the Supreme Court and was met with adishonest blockade from GOP senators. Based on Garland’soppositionto an anti-abortion law in Texas, it is likely he would have voted in favor of Roe.
  
  Last month, the US Senateattempted to codify Roe. All but one Democrat – West Virginia Sen. Joe Manchin – voted in favor. Every Republican voted against.
  
  Of course, the women’s rights crisis wouldn’t exist if Hillary Clinton won the presidential election of 2016 and appointed three Supreme Court justices instead of Trump. But many prominent left wing leaders gleefully called for peoplenot to vote for Clinton.
  
  The fan fiction left is not without precedent. George Orwell, asocialist, came to believe that the left of his era had no real desire in holding power and for them political thought was nothing more than a “masturbation fantasyin which the world of facts hardly matters.”Ernst Thälmann, the leader of the Communist Party of Germany from 1925 to 1933, believed that the center left presented a greater danger than Adolf Hitler and the Nazis. Needless to say, that analysis didn’t turn out so well.
  
  The Democrats certainly have flaws. They are rhetorically passive, disorganized and seem to base their strategy on how not to lose rather than how to win, which usually guarantees failure. The party is also worthy of harsh criticism for taking a bashful approach to punishing Trump and his allies for insurrection. Despite sizable weaknesses, they do have the advantage of not being racists, sexists, homophobes or hostile to the foundation of democracy. Residents of the real world should vote accordingly.
