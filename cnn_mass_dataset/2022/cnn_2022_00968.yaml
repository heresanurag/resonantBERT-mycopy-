title: "Trump will make first return to Washington since leaving office"
date: "2022-07-14"
section: "Politics"
url: "https://www.cnn.com/2022/07/14/politics/donald-trump-washington-return/index.html"
content: |
  Donald Trumpwill return to Washington on July 26 to deliver what’s being billed as a major policy speech, CNN has learned, marking the former President’s first time back in the nation’s capital since he left office nearly a year and a half ago.
  
  Trump will deliver remarks at the America First Agenda Summit, a conference hosted by one of the MAGA-aligned outside groups that formed after his presidency. His planned appearance will come less than a week after theHouse panel investigating the January 6 Capitol riothosts its next public hearing on July 21 and as Trump continues to fume over coverage of the congressional investigation and his lack of allies on the committee.
  
  His speech is slated for the afternoon on the second day of the summit, and a person familiar with the planning said he will likely respond to recent revelations by the committee just as he did following its prime-time hearings last month whileappearing at a conference for religious conservativesin Nashville.
  
  But Trump is also expected to use the high-profile speech at this conference, where he will be surrounded by a range of former advisers and aides – including former economic adviser Larry Kudlow, White House counselor Kellyanne Conway and former Energy Secretary Rick Perry, as well as several members of Congress – to lay out a vision for what his policy agenda could be in a second term if he runs for president again in 2024, said the person familiar with the planning.
  
  The group hosting the event, America First Policy Institute, is led by several ex-Trump administration officials who remain close to the former President, including Kudlow and former Small Business Administrator Linda McMahon.
  
  Axiosfirst reported details of Trump’s return to Washington on Thursday.
