  Total lunar eclipses, a multitude of meteor showers and supermoons will light up the sky in 2022.
  
  The new year is sure to be a sky-gazer’s delight with plenty of celestial events on the calendar.
  
  There is always a good chance that the [International Space Station is flying overhead](https://spotthestation.nasa.gov/). And if you ever want to know what planets are visible in the morning or evening sky, check [The Old Farmer’s Almanac’s visible planets guide](https://www.almanac.com/astronomy/planets-rise-and-set).
  
