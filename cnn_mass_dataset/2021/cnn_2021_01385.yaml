title: "Rare sea eagle from Asia spotted thousands of miles from home in Massachusetts"
date: "2021-12-23"
section: "US"
url: "https://www.cnn.com/2021/12/23/us/stellers-sea-eagle-massachusetts-scn-trnd/index.html"
content: |
  Birdwatchers are flockingto a Massachusetts state park in hopes of getting a glimpse of a rare Steller’s sea eagle – an enormous raptor that is native to eastern Russia and parts of Asia.
  
  The Massachusetts Division of Fisheries & Wildlifesaid in a Facebook postthat the bird was first spotted last week along the Taunton River – thousands of milesfrom its normal habitat. It’s unclear how it got there, but wildlife officials said it is likely that this is the same eagle that has been spotted in Alaska and Canada.
  
  “No one knows for sure why it got lost in the first place. It could have been caught up in a storm blowing it off course, or simply a basic navigational error by the bird,” the post said. “It is a very lost bird, and no one is sure if it will ever return to its normal range.”
  
  Steller’s sea eagles are some of the largest raptors in the world and can weigh up to 20 pounds with an 8-foot wingspan, the post said.
  
  News of the rare bird’s arrival spread quickly in birding circles and people have posted almost 300 photos of it oneBird.org based at Cornell University.
  
  Carol Molander, of Marion, Massachusetts, was on her way home on Monday when she got an alert about the eagle on a bird watching app, so she decided to go straight toDighton Rock State Parkto take a look.
  
