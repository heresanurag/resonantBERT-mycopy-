  _April 21, 2021_
  
  _New medical suggestions concerning surfaces, disinfectants and coronavirus are outlined today on CNN 10. After that, we’re covering the verdict in a former police officer’s widely watched trial. A drone’s helicopter’s first flight on Mars and a camera attached to a wolf round out our coverage._
  
