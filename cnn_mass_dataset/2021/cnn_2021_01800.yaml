title: "Why Sikh Americans again feel targeted after the Indianapolis shooting"
date: "2021-04-17"
section: "Opinion"
url: "https://www.cnn.com/2021/04/17/opinions/indianapolis-shooting-sikh-singh/index.html"
content: |
  Editor’s Note:Simran Jeet Singh(@simran) is a scholar and historian of South Asia, a senior fellow for theSikh Coalition, the author ofa guidefor reporters covering Sikhism and a 2020 Equality Fellow for the Open Society Foundations. The views expressed here are his own. Readmore opinionat CNN.
  
  On Thursday night, a gunmankilled eight peopleand injured several others before killing himself at a FedEx Ground facility in Indianapolis.Four of the eightdead identified as Sikh and the facility was known to employa significant numberof members of the Sikh community.
  
  The shooting came just days after Sikhs, who comprise the world’sfifth-largest religious community,celebratedVaisakhi,the most significant holiday of our calendar, and also as the state of Indiana was honoring its Sikh residents with an awareness and appreciation month – one ofseveral statesto do so.
  
  The FBI hasnot determinedthe killer’s motives – and may never do so given that he turned the gun on himself and is now deceased.
  
  Sikh Americans once again feel targeted. As we come upon 20 years since the terrorist attacks of 9/11, and the racist backlash that ensued, we cannot ignore the long history ofhate violenceagainst Sikhs in this country. FBIhate crime datashows Sikhs to be one of the mostcommonly targetedreligious groups – behind Jews and Muslims – in modern America.
  
  We also know that much of the violence that Sikhs face has to do with the cultural and religious illiteracy of others. Despite being one of the world’s largest religions, most Americans do not know who Sikhs are.A 2013 studyled by the Stanford Innovation Lab and the Sikh American Legal Defense and Education Fund found that 70% of Americans misidentified Sikhs when shown a Sikh man in a picture, with many believing they were Muslim.
  
  The distinctive Sikh appearance – which often includes brown skin, facial hair and turbans wrapped upon our heads – has made Sikhs regular targets of racist violence. Balbir Singh Sodhi, a turbaned Sikh immigrant from Punjab, India, was the first casualty of a hate crime after 9/11. His murderer, Frank Roque, on a shooting rampage that included attacks on an Afghan couple and a man of Lebanese descent, wrongly associated Sodhi’s Sikh identity with terrorism andkilled himat point-blank range outside Sodhi’s gas station in Mesa, Arizona, on Sept. 15.
  
  History shows we ignore Tucker Carlson at our peril
  
  We can point to various factors that contribute to such unnecessary tragedies: unchecked access to deadly firearms, xenophobic rhetoric that sanctions bigotry, a history and climate of racism that makes those who look different frighteningly vulnerable.
  
  And while we may not know the Indianapolis killer’s motive, we do know the immense cost of our cultural ignorance. If nothing else, this tragedy might spur more people to learn about their Sikh neighbors.
  
  The Sikh religion (Sikhi, in Punjabi) is one of the world’s youngest, originating about 500 years ago in the Punjab region of South Asia, which is currently split between Pakistan and northwest India.
  
  The faith’s founder,Guru Nanak, was born in 1469 and was disenchanted with the suffering, divisions and social inequities he saw around him. He sought to establish a new community with a new vision rooted in oneness, love and justice. He taught that all people are equal and interconnected, and that human beings have no legitimate basis for creating hierarchies or discriminating against one another. Rather, each of us is inherently divine and we ought to treat one another accordingly. To serve humanity is to serve God (Vahiguru).
  
  Guru Nanak put his vision into practice, establishing institutions that would live beyond him. For example, he started the tradition oflangar,a free communal meal open to all with only one condition – everyone must sit on the ground together as equals. This traditionremains alive and welltoday.
  
  Guru Nanak traveled around South and Central Asia spreading his message and building a following. These people referred to themselves as Sikhs, a term that derives from Sanskrit and means “students.” The mindset was that we are lifelong students, always seeking to learn and grow.
  
