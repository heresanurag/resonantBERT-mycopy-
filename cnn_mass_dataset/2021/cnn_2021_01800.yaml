  Guru Nanak’s community also grew, and before he died, he appointed a successor, Guru Angad. There were 10 total gurus (enlighteners) in the lineage of Guru Nanak, the last of whom, Guru Gobind Singh, passed away in 1708. From that time onwards, Sikh authority would rest in two entities – theGuru Granth Sahib, scriptural canon that was compiled and primarily composed by the Sikh gurus themselves, and the Guru Khalsa Panth, the community of initiated Sikhs. To this day, Sikhs view these two entities as their eternal guru.
  
  As part of their practice, Sikhs maintain long, uncut hair, which they often wrap in turbans on top of their heads. Many see their appearance as a public promise to live by their faith. Sikhs cherish their identities as gifts from their gurus and shared aspects that bind them to their co-religionists, present and past.
  
  Sikhs continued to grow in numbers anddisperse around the worldover the decades. After British colonizerstook controlin Punjab in 1849, more and more Sikhsmovedto regions controlled by the British Empire, including the United Kingdom, Southeast Asia and East Africa.
  
  The first Sikhs entered North America as laborers in the late 1800s – and they came face-to-face with American racism soon thereafter. In 1907, in Bellingham, Washington, angry mobs of White men rounded up Sikh and other South Asian workers, beat them and drove them out of town, an event known today as theBellingham race riots.
  
