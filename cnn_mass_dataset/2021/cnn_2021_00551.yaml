content: |
  A manfound a baby boywho was just a few hours old abandoned in a subway in New York. The chance encounter led to an unexpected family and a beautiful children’s story. Here’s what else you need to know toStart Your Week Smart.
  
  Michigan school shooting suspect Ethan Crumbley will be in court Monday. He facesmurder, assault and weapons chargesin the rampage that killed four students. The 15-year-old, who’s pleaded not guilty to all charges, will be tried as an adult.
  
  In New York, childrenages 5 to 11 will have to show proof of one doseof coronavirus vaccine before entering indoor restaurants, fitness and entertainment venues. The requirement also applies to children participating in activities such as sports, orchestra and dance.
  
  Eligible families will start receiving the finalchild tax credit paymentof the year. They’ll get up to $300 for every child under age 6, and a maximum of $250 for each kid between ages 6 and 17. While this is the final check of the year, there could be more to come in2022 if the White House gets its way.
  
  FormerWhite House trade adviser Peter Navarro, who refused to comply with a congressional subpoena for documents related to the Trump administration’s response to the pandemic, has until Wednesday to sit for a deposition. A House subcommittee on the coronavirus crisis issued the subpoena as part of its probe into the federal response to the pandemic.
  
  Ghislaine Maxwell’ssex trafficking trial resumesafter a few days break due to the judge’s scheduling conflict. The government rested its case last week after prosecutors called 24 witnesses across 10 days of testimony.
  
  Want more 5 Things?This weekend on the Sunday edition of the 5 Things podcast, we sit down with CNN Investigates reporter Isabelle Chapman to discuss the coal ash pond that’s seeping into groundwater in Alabama and threatening the ecosystem. Some environmentalists call it “America’s Amazon.”Listen here!
  
  Abandoned cats search for food on a road covered by ash and blocked by lava near a volcano on the Canary island of La Palma, Spain.Here’s a look at 31 moving, fascinating and thought-provoking imagesfrom the week that was, curated by CNN Photos.
  
  The annualCNN Heroes All-Star Tributeis live tonight at 8 ET. Since 2007, the event has honored everyday people changing the world, and has recognized more than 350 heroes from the US and over 110 countries. Their missions are diverse, but they’re all dedicated to one goal: helping others.
  
  Nominees for the Golden Globe Awards will be announced tomorrow morning, months aftera controversy surrounding the organizationthat hands them out blew up. The event will belive-streamedhere and on the Golden GlobesYouTube channel.
  
  Take CNN’s weekly news quizto see how much you remember from the week that was! So far, 3.7% of readers who took Friday’s quiz got a perfect score. How well can you do? If you can’t see the quiz,click here!
  
  Singer Dionne Warwick turns 81 years young today. She may not make music anymore – but hertweetsare her new form of art.
