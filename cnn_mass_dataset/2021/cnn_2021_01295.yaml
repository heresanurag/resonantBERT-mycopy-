title: "2020 was Europe’s hottest year on record ‘by a considerable amount,’ scientists say"
date: "2021-08-25"
section: "Europe"
url: "https://www.cnn.com/2021/08/25/europe/2020-hottest-on-record-europe-climate-change/index.html"
content: |
  Last year was Europe’s hottest on record, according to a reportpublished Wednesdayby the American Meteorological Society, which also found 2020 to be among the three hottest years globally.
  
  The UK Met Office, which contributed to the report, said record had been broken “by a considerable amount.” Average temperatures in Europe last year were 1.9 degrees Celsius above the 1981-2010 average, a period used as a benchmark to measure changing temperatures.
  
  The five warmest years in Europe have all been since 2014.
  
