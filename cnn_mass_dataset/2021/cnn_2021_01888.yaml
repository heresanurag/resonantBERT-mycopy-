  After Felix’s column ran,Nike announcedit would change its policy related to pregnant athletes.
  
  “We recognize we can go even further,” it said at that time. “Moving forward, our contracts for female athletes will include written terms that reinforce our policy.”
  
  This has not been a good week for Nike(NKE)and high-profile athletes.Kobe Bryant’s estatealso ended its nearly 20-year relationship with Nike(NKE).
  
  Other prominent athletes who have left Nike for its competitors include basketball’sSteph Curry, baseball’sBryce Harperand football’sTom Brady, all of whom have deals with Under Armour(UA), and soccer’s Lionel Messi, who has a deal with Adidas(ADDDF).
  
  But Nike’s money dwarfs anything that other companies offer in endorsements, giving it a stranglehold on deals with most of the world’s most popular athletes. According to a company filing, the value of all Nike’s endorsement deals came to $9.3 billion as of last year.
  
  The terms of Biles’ deal with Athleta were not announced.
