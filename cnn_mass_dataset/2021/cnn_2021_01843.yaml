title: "Democracy in America has been overthrown before"
date: "2021-06-06"
section: "Opinion"
url: "https://www.cnn.com/2021/06/06/opinions/infrastructure-week-groundhog-day-save-democracy-opinion-weekly-column-carr/index.html"
content: |
  Editor’s Note:Sign upto get our new weekly column as a newsletter. We’re looking back at the strongest, smartestopinion takesof the week from CNN and other outlets.
  
  “Did you, too, O friend, suppose democracy was only for elections, for politics, and for a party name?”
  
  Walt Whitmanposed this questionin his 1871 pamphlet “Democratic Vistas,” written when he was living in Washington, DC — the seat of power of a nation seeking to rebuild and redefine itself after the Civil War.
  
  His answer, of course, was no — that the word had a far broader meaning. Democracy comes to true fruition, he wrote, only “in the highest forms of interaction between men, and their beliefs — in religion, literature, colleges, and schools.” In other words, “democracy in all public and private life.”
  
  Whitman’s words rang out in a familiar key this week, as Americans across the country raised alarms over widespread Republican efforts to make it harder to vote and easier to overturn elections.
  
  One of them was President Joe Biden, who in his Memorial Day address reached for Whitmanesque heights when he referred to democracy as “more than a form of government.” He called it “a way of seeing the world” and the “soul of America.”
  
  A group of 100 scholars, experts on democracy and authoritarianism,warnedthat recent actions by Republicans “call into question whether the United States will remain a democracy.”
  
  Writing for CNN Opinion,Nicole Hemmernotedthat “Democracy has been overthrown in America before. That’s our best evidence and soberest warning that it can happen again,” adding that “that history — the sometimes-successful fight for democracy and the sometimes-successful fight to thwart it — is exactly the battle that the US is facing today, and there is nothing inevitable about democracy’s success.”
  
  SE Cupptook Republicans to taskfor trying to “pass draconian laws that make it harder to vote, targeting especially minority voters, voters with disabilities and younger voters — i.e. people who usually vote Democratic.” The only possible reason for such dark moves, she wrote, is that the GOP was truly out of ideas to win elections. “If this is your idea of public service, it’s a pretty dystopian one.” Think of the two major political parties as “Parties R Us,” offering their wares in a giant department store: “Instead of adding new and improved items to compete with the Democrats’ overflowing racks, Republicans are trying to limit store hours, open the doors late and close them early, prohibit you from buying any products online and empower store managers to lurk menacingly behind you as you consider buying the other guy’s goods.”
  
  Michael D’Antoniowrote that former President Donald Trump’s summer of grievance wasupon usin the form of a planned series of rallies. “He’ll do this because he thrives on attention and withers without it,” D’Antonio wrote.
  
  But D’Antonio cautioned readers tostay on guardbecause Trump’s irrational claim that he will be “reinstated” by August could potentially goad his most rabid followers to violence. In comments last Sunday (which he later walked back), Trump’s former national security adviser Michael Flynn appeared to encourage just such violence in the form of a Myanmar-style coup.WrotePeter Bergen: “It’s hard to get a grip on what’s happened to one-time war hero, retired lieutenant general Michael Flynn,” but like “so many who have entered into Trump’s orbit, Flynn’s once-sterling reputation is ever more seriously damaged.”
  
  Julian Zelizer:States cannot be trusted to protect the right to vote
  
  High-profile ransomware attacks are intensifying: first Colonial Pipeline and then JBS, the world’s biggest meat producer, the New York City subway system, a local police department in California and the city of Atlanta. FBI Director Christopher Wray told the Wall Street Journal on Thursday that the staggering vulnerability of the US to such cyberattacks threat summoned “parallels” to 9/11.
  
  “When President Joe Biden meets with Russian President Vladimir Putin later this month, he will undoubtedly bring up — as he should — the matter” of these repeated ransomware attacks on US targets by Russian-based hackers,observedFrida Ghitis. The recent attacks, she wrote, are “serving a useful purpose for the United States. They are warning the country about a growing danger, and helpfully pointing out precisely where the vulnerabilities lie.” The Kremlin is already dismissing Wray’s comments (tellingly) as “emotional,” but according to Ghitis, what matters more than Putin’s immediate response is Biden’s “sending a message that there’s a price to pay for the attack” and “creating a system that will start blocking the assaults on the US and other countries … Anything else will result in ever-escalating assaults on America’s ability to function.”
  
  American employers are facing a labor shortage in excess of 8 million jobs right now — not because of stimulus-boosted unemployment payments, as some conservatives have surmised, but because of what the Covid pandemic has revealed about a country that has long mistreated and radically underpaid its workers,wroteJill Filipovic. She argued: “Our country may treat wage workers as disposable automatons, but if the past year has taught us anything, it should be how much we need the folks who deliver our food, stock our grocery store shelves, care for our children and tend to our ill and aging … It’s about money, yes. But it’s also about a desire to be treated like a human being.”
  
  Covidhas also motivatedwhite-collar workers to challenge the “fetishization of the ‘frictionless employee,’” wroteAnne Helen Petersenfor Substack — “the worker who makes themselves the most flexible and adaptable, who scrapes off aspects of their personality that impede their ability to be ‘a team player.’”
  
  2021 is hardly the first time a pandemic has prompted a labor crisis,Spencer Strubpointed outin the Washington Post: In England “the worker shortages that followed what is known as the ‘Black Death’ of the mid-14th century … led to the introduction of the first national labor laws … In response, the elite found new ways to repress workers and maintain a class hierarchy, reminding us of the stakes of the conversation about labor today.”
  
  On Friday, Biden rejected a new Republican counterproposal on infrastructure, saying it didn’t meet his policy goals. With negotiations continuing, key Democratic Sen. Joe Manchin indicated to CNN he’s not ready to join his colleagues in a partisan infrastructure bill or dispense with Senate filibuster rules. A grueling, process-driven path likely lies ahead for Biden and senators on both sides of the aisle.
  
  “Republicans do not seem to have grasped the political dead-end they have created for themselves on the bipartisan infrastructure deal,”commentedthe Washington Post’sJennifer Rubin.Jeffrey Sachswrote for CNN Opinion that rather than engaging in endless bipartisan negotiations with the GOP — “a continuation of the status quo under a false headline” — Biden and the Democrats should simplypush throughthe American Jobs Plan on a party-line vote.
  
  In a week full of Covid-related news, Dr. Anthony Fauci’s emails threatened to acquire Hillary Clinton-level notoriety. Many pored eagerly over more than 3,000 pages released through a Freedom of Information Request, “including Fauci’s detractors currently scouring them for missteps,” wrote Dr.Megan Ranney. They may have been disappointed as the messages offered an inside look at the routine interactions between scientists and government, but of Fauci himself,she noted: “Throughout, his on-paper voice sounds just like his television voice. He is humble, curious and committed. My takeaway? He is just like us — or, at least, he’s how most of us like to imagine ourselves to be, on our best days.”
  
  Rai Goyal, a sixth grader from New York City, described getting his first Covid vaccination dose andsent a messageto other kids his age —and their potentially hesitant parents: “Do your own research from widely trusted sources, listen to the science and take a look at the world around us. We need to bring an end to this pandemic, and if our age group doesn’t take the vaccine, there will always be a significant chunk of the population that continues to pass the virus and create opportunities for mutations. Roll up your sleeves and take that shot.”
  
  As joyful as being vaccinated and out in the world is, reflectedTess Taylor, there is stilla kind of amnesiaattached to reentry. She compared it to moving back to her hometown as an adult and getting lost driving around, because the streets had changed in her absence — the freeway on-ramps of her youth no longer existed. “There has been a troubling uptick of hate and violence in public places,” she lamented. “This is just one more sign that we have widespread, steady work to do towards repair … Some of the old on-ramps are gone, it’s true. What’s ahead? Instead of treating ‘getting back to normal’ as ‘returning to the way it was before,’ is there a way we could approach it differently?”
  
  Moss Cohenfor CNN Business Perspectives:After 444 days, I went back to the movies. Here’s why everyone else will too
  
  In a long social media post on Monday, tennis star Naomi Osaka explained her withdrawal from the French Open after officials threatened to expel her if she didn’t participate in mandatory media interviews. She cited anxiety and depression, writing, “I thought it was better to exercise self-care and skip the press conferences.”
  
  PsychologistPeggy Drexlerapplauded Osaka’s courage, noting that for organizers, “forcing her to choose between her mental health and a few media sound bites was entirely unnecessary.” MSNBC Opinion’sDave Zirinsuggested that French Open officials’ response wasall the more shockingbecause of how “increased social awareness of mental health has spawned something of a burgeoning movement in the sports world.” He was less surprised by what he saw as the racism and sexism being marshaled against Osaka, a young woman of Haitian and Japanese heritage.
  
  Lindsay Crouseof the New York Times saw in Osaka thecontinuation of a growing line of women athletes— runners, gymnasts and Osaka’s fellow competitor Serena Williams — exercising their power by setting limits on their own terms. Osaka’s decision to put herself first resonated with others in the sport, reportedAlexa MikhailandZaria Howellfor The 19th, whoquoted one high school tennis coach: “Why can’t we try to do better? Why are we OK with doing things that are really bad for our mental health?”
  
  As Pride Month began, pastor and speakerPaula Stone Williamsshared her storyof transitioning from living as a White evangelical man to coming out as transgender and living authentically as a woman. She lost her job and almost everything else in a matter of days and thought her life was over. Today, she lives a fulfilling life; decades of White male privilege helped her bounce back in ways few other transgender people — especially kids and people of color — can, she wrote. She issued a firm call to those pursuing and supporting bills in multiple states that target transgender kids: “To my White evangelical friends and former coworkers, I implore you, leave transgender children alone. I can handle your rejection. These children cannot … the lives of many hang in the balance. I am lucky that mine is not one of them.”
  
  By treating gender as something to be freely explored instead of policed, wroteAllison Hope, everyone who interacts with kids — parents, relatives, teachers, caregivers, babysitters, neighbors —has the powerto build joy and protect their future selves: “It’s not hard. But it is necessary. We all have a role to play.” She revealed that when her son “recently told me that he liked his friend’s pink dress and wanted one of his own, I brought up a children’s clothing site on my phone and let him pick one out. It was a small gesture (that) set me back roughly three minutes and $5.95 … but (it) … could mean a lifetime of affirmation for a child.”
  
