  Dr.Alexis Drutchas:In America, is bodily autonomy a human right?
  
  On June 5, 1981, the US Centers for Disease Control and Prevention published an article in its Morbidity and Mortality Weekly Report (MMWR) describing cases of a rare lung infection in young, White, previously healthy gay men in Los Angeles — the first official reporting of the disease later known as AIDS. Forty years later, Dr.Kent Sepkowitzreflected onhaunting lessons that decades of fighting this epidemic have left for those battling the Covid-19 contagion. He described the harm caused by government neglect and societal denial, and the painstaking, transformative work of communities and public-health professionals to create progress. “AIDS has shown us this inch-by-inch strategy is the only way forward with Covid-19. Hopefully, the dimming spotlight of attention and ever louder screams of denial will not deter us. Because if we falter now, we will find ourselves trapped in an eternal 2020, stepping forward — then back — as people continue to die.”
  
