title: "KFC is testing a new dipping sauce in these three cities"
date: "2021-12-06"
section: "Business"
url: "https://www.cnn.com/2021/12/06/business/kfc-mambo-sauce/index.html"
content: |
  Kentucky Fried Chickenis testing a new dipping sauce in three US cities.
  
  Beginning Monday, customers in Washington, Atlanta and Dallas can add “Sweet Hot Capital City” mambo sauce to their orders for a limited time. The chain describes the flavor as “sweet, spicy and tangy,” and one that “perfectly compliments” its fried chicken.
  
  DC residents will likely recognize themambo sauce, made by family-owned local business Capital City, because it’s “found at nearly every carryout restaurant” in the city, KFC said in a press release. The sauce has been around since the 1950s and is “synonymous with Black DC food culture,” the chain added.
  
  Capital City is owned by Arsha Jones, who is Black. She developed the sauce recipe and founded the company in 2011 with her late husband Charles, after the couple moved to the DC suburbs in Maryland and discovered mambo sauce was hard to find.
  
  KFC said it hopes to “introduce more customers to the District’s iconic sauce and bring new flavors to a national audience.” If the test is well received, the sauce could be added to menus nationwide.
  
  Last year,KFC revamped its condimentlineup by adding a new signature sauce called “KFC Sauce” and rolling out new recipes for its “core” dipping sauces of ranch, honey BBQ, honey mustard and hot sauce. Fast food sauces have developed such a fandom thatChick-fil-A started sellingits sauces at some grocery stores last year.
