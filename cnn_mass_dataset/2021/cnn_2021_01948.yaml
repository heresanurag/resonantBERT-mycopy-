title: "A kinder, gentler Taliban?"
date: "2021-08-19"
section: "Opinion"
url: "https://www.cnn.com/2021/08/19/opinions/last-time-taliban-took-over-bergen/index.html"
content: |
  Editor’s Note:Peter Bergen is CNN’s national security analyst, a vice president at New America and a professor of practice at Arizona State University. Bergen has reported from Afghanistan since 1993. His new book is, “The Rise and Fall of Osama bin Laden.” The views expressed in this commentary are his own. Viewmore opinionon CNN.
  
  The fall of Kabul to the Taliban is being compared, ad nauseam, to the fall of Saigon to the North Vietnamese in 1975. Both retreats certainly share some common features – the botched, chaotic evacuation, the abandonment of many US allies on the ground, and the humiliation of the American superpower. But a closer analogue to what is likely to happen in Afghanistan during the coming weeks is to look at what the Taliban did thelast time they swept into powerin Kabul in September 1996.
  
  Then, the Taliban imposed their“Islamic Emirate”on the population. While this was not the “caliphate” that was declared by ISIS in Iraq almost two decades later, it was similar enough, not least because the leader of the Taliban, anointed himself “the Commander of the Faithful,” which immodestly claimed not only the leadership of the Taliban, but of all Muslims everywhere.
  
  The Talibanimposed their ultra-purist vision of Islamon much of the country. Women had to wear the burqa and stay at home unless accompanied by a male relative.
  
  Music, television and even kite flying were banned. There wasno independent Afghan media; only Radio Shariat that blared Taliban propaganda.
  
  In an unsettling echo of how the Nazis treated the Jews, the Talibanforced the country’s miniscule Hindu population to wear distinctive clothing.
  
  Theseedicts were enforced by the religious policeof the Ministry for the Promotion of Virtue and the Prevention of Vice.
  
  I witnessed black-turbaned vigilantes roaming Kabul’s streets like wraiths dispensing their ferocious brand of “Islamic” justice. Curfew started at 9 p.m., and by 8 p.m. the streets were deserted except for the young Taliban soldiers who stood at every traffic circle, carefully checking passing vehicles. Some of the Talibs worekohl, a black eyeliner, which was particularly noteworthy sincewomen were banned from using cosmetics.
  
  I fled Kabul in 1992, and I'm having disturbing flashbacks
  
  In Kabul, one of the few diversions available were the well-attendedpublic executions in the former soccer stadium. The victims, including women, were stoned to death or shot in the head.
  
  Vahid Mojdeh, a former Taliban official,noted in his memoirthat, “the Taliban were ruthless torturers, their most commonly used technique was beating people with electric cables.”
  
  In interviews I conducted with Taliban leaders before 9/11, they defended keeping women at home and shrouded in theburqaby saying these were simply the cultural norms of Afghan culture. But what the Taliban didn’t acknowledge was thatthese were really the social norms of the Pashtun ethnic group, which made up pretty much the entire leadership of their movement.
  
  For the other ethnic groups in Afghanistan, such as Tajiks, Hazaras and Uzbeks, and the inhabitants of the larger cities, particularly Kabul, Taliban policies were imports from another culture.
  
  The Taliban called it the rule of sharia, Islamic law. In their view, once sharia ruled, Afghans would become virtuous and thus the perfect society would be created. But the Taliban had no real policy to govern. They presided overthe total collapse of what remained of the Afghan economyfollowing two decades of war. A doctor I spoke to in Kabul in 1999 said he earned only six dollars a month.
  
  Axelrod: These are the battle scars Biden brought to Afghanistan decision
  
  When they were in power before 9/11, the Taliban were pariahs on the world stage. Onlythree countries recognized the movementof religious warriors, because of their treatment of women, dismal human rights record and their provision of safe haven to al Qaeda.
  
  When Osama bin Laden was forced out of his refuge in Sudan in 1996, he flew to what he hoped to be a new haven, Afghanistan. Once he was in Afghanistan,a Taliban cabinet minister told bin Laden, “We serve the ground upon which you walk.” Another senior Taliban minister told al Qaeda’s leader, “God will never be ashamed of you because you are the champion of the oppressed and you have waged holy war alongside the downtrodden.”
  
  But even the Taliban’s harshest critics before 9/11 could not deny their one achievement: They restored order to much of the country. During the early 1990s, Afghanistan had become a patchwork of fiefdoms held by competing warlords enmeshing Afghans in a brutal civil war. The Taliban defeated most of those warlords and brought law and order at the cost of also imposing a draconian theocracy.
  
  The Taliban are claiming today that they have changed during the past two decades; that they are a kinder, gentler Taliban.
  
  On Tuesday Taliban officials gave theirfirst press conference since their victory. Taliban spokesman Zabihullah Mujahid asserted, “The Islamic Emirate is committed to the rights of women within the framework of Sharia.”
  
  “Within the framework of sharia” is the important modifier in this assertion, since the Taliban’s understanding of sharia means that women cannot work outside their homes, except perhaps in some very limited roles, such as working as doctors who treat only female patients.
  
  Also, Taliban officials havesometimes assertedthat they favor education for females, yet in areas of Afghanistan that they have seized control of within the past couple of years, thisdispensation only extends to girls under the age of 12.
  
  At Tuesday’s press conference, the Taliban spokesman declared a general “amnesty” for enemies of the Taliban. The crowds of thousands of Afghans that are besieging the Kabul airport to flee their country suggest that there is a high degree of skepticism about these claims of amnesty. Indeed, in Maythe Taliban beheaded Sohail Pardis who was an interpreter for the US military.
  
  On Tuesday a photographer for the Los Angeles Times documentedbrutal beatings that the Taliban inflicted on women and childrenoutside Kabul airport.
  
  Meanwhile,women have almost completely disappeared from the streets of Kabul, according to CNN’s Clarissa Ward.
  
  Further grounds for skepticism about a reformed Taliban came in a UN report issued in June that describedrelations between al-Qaeda and the Taliban as “closely aligned.”
  
  In the years before 9/11, many millions of Afghans lived under the yoke of the Taliban’s incompetent, brutal rule. They have good reason today to be skeptical of the “kinder, gentler” Taliban.
  
  Already thearmed resistance to the Taliban is forming, led by Ahmad Massoud, the son of the legendary Afghan military commander Ahmad Shah Massoud who wasassassinated by bin Laden’s men just two days before the 9/11 attacks.
  
  Joining that resistance is Amrullah Saleh, who on Tuesdaysaid he is the leader of Afghans; a legitimate claim since he was elected to the post of vice president, while former Afghan president Ashraf Ghani has fled the country.
