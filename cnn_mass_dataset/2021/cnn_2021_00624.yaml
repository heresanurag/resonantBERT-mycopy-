title: "South Carolina may become the fourth state to allow executions by firing squad"
date: "2021-05-06"
section: "US"
url: "https://www.cnn.com/2021/05/06/us/south-carolina-firing-squad-death-penalty/index.html"
content: |
  The South Carolina House of Representatives passed a bill Wednesday that allows for firing squads to carry out death penalty sentences and makes electrocution a more likely means of execution.
  
  The potential change in South Carolina law comes as states nationwide have hit barriers executing those on death row due to problems administering lethal injections, the widely preferred method in the US. Difficulties finding the required drugshave essentially pausedexecutions in many states including South Carolina, which has not hadan executionsince 2011.
  
  Lethal injection and electrocution are the two current choices given to a death row inmate in South Carolina, and if an inmate picks lethal injection, the state has beenunable to move forwardwith the execution.
  
  A Nevada man sentenced to death tells court he'd rather die by firing squad than lethal injection
  
  The bill changes the default method of execution to electrocution if lethal injections cannot be given, and offers the inmate the alternative of dying by firing squad. Lethal injection will remain an option utilized if the drugs are available.
  
  South Carolina Gov. Henry McMaster said Wednesday that he intends to sign the bill into law if it passes the state legislature.
  
  “We are one step closer to providing victims’ families and loved ones with the justice and closure they are owed by law. I will sign this legislation as soon as it gets to my desk,” he saidin a statement.
  
  House lawmakers passed the bill by a vote of 66-43. The state Senate passed a similar version in March and must approve the House’s language before sending it to the governor.
  
  Opponents of the measure deplored the new execution methods as well as the use of the death penalty in general. State Rep. Justin Bamberg described the visceral nature of death by electrocution on the House floor during debate, laying out the step-by-step procedures during the execution process.
  
  “You can’t be afraid of what the reality is. You can’t vote for electrocution and death and be afraid to face it in front of your very eyes,” he said.
  
  “It’s 2021. We should move on from these barbaric forms of punishment that are more medieval than they are modern. Today, our state has taken a step backward and I am ashamed,” State House Democratic Leader Todd Rutherford saidin a statementafter the bill passed.
  
  If signed into law, South Carolina would becomethe fourth stateto allow death row inmates the option of death by firing squad, joining Oklahoma, Mississippi and Utah.
