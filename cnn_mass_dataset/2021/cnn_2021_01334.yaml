  _December 6, 2021_
  
  _A new week of coverage begins in Indonesia, where a deadly volcanic eruption has covered some Javanese villages in a thick coat of ash. New travel rules take effect for air travelers headed to the U.S. The last surviving U.S. Army officer of the “Band of Brothers” has passed away at age 99. And a French “speedcuber” solves a popular puzzle using only one hand._
  
