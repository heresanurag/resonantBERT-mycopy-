title: "Jeff Bezos has fun with girlfriend’s Leonardo DiCaprio moment"
date: "2021-11-09"
section: "Entertainment"
url: "https://www.cnn.com/2021/11/09/entertainment/jeff-bezos-leonardo-dicaprio/index.html"
content: |
  Watch out, Leonardo DiCaprio as Jeff Bezos may have a special delivery for you.
  
  The mega-mogul had a funny response to Varietytweeting a videofrom their editor Marc Malkin showing DiCaprio chatting with Jeff Bezos and his girlfriend Lauren Sanchez at the LACMA Art + Film Gala.”
  
  In it, Sanchez appears to be looking adoringly at DiCaprio while Bezos stands at her side.
  
  The internet was all over it, dubbing DiCaprio “Mr. Steal Your Girl” and having some fun with the footage.
  
  Bezos decided to play along as well.
  
  Hetweeted a photoof him posing with a red sign which read “Danger! Steep cliff fatal drop.”
  
  “Leo, come over here, I want to show you something…,” the tweet read.
  
  Of course Bezos was joking about possibly making DiCaprio one of “The Departed.”
