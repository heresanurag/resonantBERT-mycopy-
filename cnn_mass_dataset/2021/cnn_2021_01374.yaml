  Podium prediction: USA is expected to top the Olympic medal table once again with 100 days to go until#Tokyo2020(via@GracenoteGold)👉https://t.co/sfZLMvyO44pic.twitter.com/YcbrWNiTYp
  
  Anongoing ban for doping offensesmeans Russian athletes are unable to compete under their country’s name, flag and national anthem at major international sporting events until December 2022, but athletes willbe able to compete under the acronym ROC(Russian Olympic Committee) in Tokyo.
  
  The US, whose projected total of 114 medals is seven down on its haul at the Rio Olympics, topped the medal tables in 2016 and 2012 but was bettered by host China, which won more golds, at the 2008 Beijing Olympics.
  
  Great Britain, which finished second in the medal table at Rio 2016, is predicted to drop down to eighth in the table in Tokyo behind Japan, Netherlands, France and Australia.
  
  Will Claye: The Olympian with music dreams
  
  Japan’s predicted tally of 59 medals would be a 40% improvement on its Rio total, according to Gracenote, while the Netherlands is forecast to comfortably beat its best-ever haul of 25 medals with 46 in Tokyo.
  
  Uncertainty has surrounded the upcoming Olympics since they were postponed until 2021, although organizers maintain that the event will go ahead later this year.
  
  Last month, it was announced thatinternational spectators will be refused entry to Japan for the Gamesand the start to the torch relaywas also closed to the public.
  
  Then last week, the governor of Osakatook the relay off public roadsamid a surge in Covid-19 cases as the region declared a state of emergency.
  
  There areconcerns about the fate of the Olympics amid a looming fourth waveof infections in Japan – especially given that the country has so far only vaccinated about 1.1 million people, which equates to less than one percent of its population.
