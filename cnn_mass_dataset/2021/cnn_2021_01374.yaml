title: "USA predicted to top Tokyo Olympics medal table"
date: "2021-04-14"
section: "Sport"
url: "https://www.cnn.com/2021/04/14/sport/olympics-medal-table-prediction-spt-intl/index.html"
content: |
  The circumstances around this year’sOlympicsmight be wildly different compared to previous Games, but history could be about to repeat itself when it comes to theTokyo 2020medal table.
  
  With Wednesday marking 100 days to go until the Olympics get underway in Japan on July 23, the USA is predicted to top the medal table, according to analysis by sports data companyGracenote.
  
  The US team is tipped to win 114 medals in Tokyo (43 gold, 30 silver and 41 bronze), which is expected to be ahead of China on 85 (38 gold, 23 silver and 24 bronze) and athletes from Russia on 56 (23 gold, 24 silver and 26 bronze).
  
