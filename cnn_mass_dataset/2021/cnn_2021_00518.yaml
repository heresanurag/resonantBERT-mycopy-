  _April 28, 2021_
  
  _U.S. Census results and how they could impact the House of Representatives compose our first topic this Wednesday. A shortage of workers complicates the recovery for restaurants that survived last year’s mandatory closures. U.S. lumber prices go through the roof. And we have a look at the first test event of the upcoming Olympics._
  
