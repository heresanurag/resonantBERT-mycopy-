title: "Press pause on your international travel plans – for now"
date: "2021-11-12"
section: "Opinion"
url: "https://www.cnn.com/2021/11/12/opinions/covid-cases-europe-travel-sepkowitz/index.html"
content: |
  Editor’s Note:Kent Sepkowitz is a physician and infection control expert at Memorial Sloan Kettering Cancer Center in New York. The views expressed in this commentary are his own. View moreopinionon CNN.
  
  A sense of normalcy has once again settled onto large regions of the United States as Covid-19 cases have quieted down.
  
  For many, this relative calm, occurring just as the holiday season approaches, means only one thing: an opportunity to leave the United States, to go overseas to that favorite tourist destination – somewhere in Europe where there aren’t so many tourists.
  
  Unfortunately for travelers, the US Centers for Disease Control and Prevention has implored Americans to think long and hard before they leap. Europe, it seems, is in the early stages of a new Covid-19 surge. Thelist of placeslabeled by the CDC as “avoid travel” due to risk of infection, updated weekly, includes about half the countries in Europe, with Belgium, Slovakia and Russia added just this week.
  
  Note that “Europe,” from a public health perspective, is not the European Union or a travel agency conceit but rather the 53 countries on theWorld Health Organization’s map. This large area includes Russia and numbers about 750 million people, giving it nearly twice the population of the US.
  
  Which brings us to the two questions for potential holiday travelers: Is it really this bad or is the CDC just being cautious? And is it going to get worse over there and, gulp, over here, too?
  
  As to the first question – the CDC is not being too cautious. Not at all. The newest Eurosurge is quite real in countries as different culturally and politically as Russia and Germany, theCzech Republic and the Netherlands. Cases overall have been increasing for at leastfour weeksand are highest in those under 50 years of age, thougholder peopleare beginning to see an increase as well.
  
  Travel to the Netherlands during Covid-19: What you need to know before you go
  
  The reasons for the newest increase resemble those of the last big European surge fromMarch–under-vaccination, weak enforcement of public health interventions and general refusal to accept the risk as real.
  
  This lack of a clear and singular explanation for this uptick in cases has led to considerable speculation and handwringing. Countries in Eastern and Central Europe, many of them once part of the Iron Curtain, such as Bulgaria, Romania and Slovakia, have some of thelowest vaccination ratesin the world, likely explaining therise.
  
  But in Western Europe, countries includingGermanyandBelgiumhave vaccination rates similar to the US – yet this does not seem sufficient to contain spread. To try to gain control once again, these countries are giving booster shots, trying even harder to convince the unvaccinated to take the shot and even considering re-instituting some components of the never popular lockdown. To my mind, a plausible explanation is that the same Delta variant is spreading to unvaccinated and unboosted  people as weather cools and everyone returns indoors, where social distancing and fresh air are in short supply.
  
  No matter the causes, the trends in Europe (and the Caribbean and some other areasaround the world) are not amenable to a quick fix. The surge is here to stay, at least for a little while. In other words, Europe is likely to get worse rather than better in the weeks ahead.
  
  As to the other question of whether the Eurosurge will presage a new global surge … well, it’s complicated. In the US,cases are risingin a few states, as has been true for months. But a more disturbing trend is being seen across large swaths of the country and inNew York Cityas well: an end to the steady decrease of cases registered over the last few months. To turn a oncegood-news termto the dark side, the curve is flattening – but this time it indicates a stalemate between the virus and humanity, not the inspiring consequences of a hard-fought battle to curb a runaway pandemic.
  
  Given all this uncertainty, international travel in the next weeks seems like a singularly bad idea. Yes, maybe this is all just a cold weather pause, or perhaps some more people need a boost, or maybe the virus is doing something new we have not yet discerned. But from what we know right now, there is a real possibility that whatever is driving the Western European increase will also mess things up in the US.
  
  Once again, just when we think we have this pandemic figured out and are on the right track to extinction, something new gets thrown in our path. Decisions, though, still must be made – and the only thing we have learned, it seems, from almost two years of the pandemic is this: If the experts are confused about what’s going on, the best thing for everyone to do is to stay put.
