title: "15-year-old soccer player should be allowed to play in US professional women’s league, judge rules"
date: "2021-05-25"
section: "US"
url: "https://www.cnn.com/2021/05/25/us/olivia-moultrie-soccer-judge-ruling/index.html"
content: |
  A federal judge has ruled that a 15-year-old soccer player should be able to be signed by theNational Women’s Soccer Leaguedespite the league’s existing age restriction.
  
  In a ruling issued Monday, Judge Karin Immergut approved a temporary restraining order that would require the NWSL to lift its age restrictions, allowingOlivia Moultrieto be signed on to a team.
  
  Such restrictions do not exist in the US men’s professional league, the MLS, or in European Women’s Leagues, according to the order.
  
  In atweetlast week, the teen said, “The only gender and country combination in the entire world where I can’t play professional soccer is as a female in the United States. Just something to consider.”
  
  Her officialTwitter feedwas full of retweets in support of her effort to be signed to a professional team.
  
  Moultrie was 14 when she appeared with thePortland Thorns, a  professional women’s league U-19 team in 2020 and was the youngest player to participate in training camp with the U.S. U-17 Women’s National Team in January, according to apress releasefrom Thorns Academy.
  
  Following the decision, Len Simon, an attorney representing Moultrie, expressed delight, telling CNN in an email, “We are very pleased with the court’s ruling.”
  
  In a statement reported byThe Oregonian, the NWSL said that it was in the midst of collective bargaining negotiations with the players association over employment terms, which include the age rule. “We continue to believe that is the appropriate place for a decision on this topic and are evaluating our options with respect to the district court’s order,” the statement said
  
  The application for a restraining order was filed on May 4 and sought to stop NWSL from enforcing its rule that players must be 18 or older.
  
  According to the ruling, Moultrie wants to be able to compete for a position on a professional soccer team “free from the Age Rule’s restrictions.”
  
