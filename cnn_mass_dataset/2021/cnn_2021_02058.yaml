title: "Workers are crying out for a four-day week. It’s time for their bosses to pay attention"
date: "2021-11-17"
section: "Economy"
url: "https://www.cnn.com/2021/11/17/economy/four-day-workweek/index.html"
content: |
  A key lesson of the “Great Resignation” is becoming increasingly clear: It’s time to shave a day off the workweek.
  
  American workers arequitting in record numbers— 4.3 million in August, and another 4.4 million in September. Managers across industries arehaving trouble hiring, even as they raise wages and offer incentives.
  
  But a new survey offers support for a not-so-radical but still uncommon solution: The four-day workweek.
  
  Researchers for financial firm Jefferies asked young Americans (ages 22 to 35) who had quit their jobs recently what their former bosses could have done to persuade them to stay. Thirty-two percent said they would have stayed if they’d been offered a four-day work week. That was the second most-common answer, right behind the 43% who would have stayed for more money.
  
  The study also found 80% of respondents support a four-day workweek. As for the remaining 20%: Only 3% said they were against a shorter week, and 17% were “neutral.”
  
  Among workers with Bachelor’s degrees, “feeling burned out” was the No. 1 reason they quit.
  
  The idea of a four-day week is hardly new, but the pandemic and the overwork that came with it have reinvigorated proponents.
  
  Over the summer, Congressman Mark Takano of Californiaintroduced legislationthat would amend the Fair Labor Standards Act of 1938 — which codified the 40-hour model we now live with — to reduce the standard workweek to 32 hours. Takano cited the pandemic-driven upheaval of workplace normsin an op-ed last month, drawing comparisons to the cataclysmic socioeconomic shifts of the 1930s.
  
  “Globally and nationally, I think we’re at a similar place now,” Takano said. “Norms are being upended and questioned. People don’t want to return to old ways.”
  
  It won’t happen overnight, he said. But it may come faster than people expect.
  
  The 40-hour workweek was a hard-won fight by labor activists in the early 20th century. And it’s easy to see parallels to the current labor market, when workers are more empowered andunionization efforts are growing.
  
  There have been plenty of experiments to support the idea. One oft-cited study in Iceland, in which workers reduced their hours without reducing pay, was hailed asan overwhelming success. Researchers found that worker wellbeing dramatically increased across a range of indicators, such as perceived stress and burnout.
  
