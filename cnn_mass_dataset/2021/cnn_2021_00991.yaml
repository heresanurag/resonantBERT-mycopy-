title: "CVS is handing out prizes for Covid-19 vaccinations"
date: "2021-05-27"
section: "Business"
url: "https://www.cnn.com/2021/05/27/business/cvs-covid-19-vaccination-prizes/index.html"
content: |
  CVS Health is tempting people who arehesitant to get the Covid-19 vaccinewith lavish prizes — some of which were forbidden just a year ago.
  
  The pharmacy chain announced Thursday that people who plan to receive or have received aCovid-19 vaccineat CVS can enter its new “One Step Closer” sweepstakes and win one of more than 1,000 prizes. Those include a seven-day cruise on Norwegian Cruise Line, VIP tickets to next year’s Super Bowl, a two-night stay at a Wyndham hotel and $5,000 cash prizes for family reunions.
  
  “We’re grateful for the millions of people who’ve received one of the well over 17 million doses we’ve administered at CVS Health, but we have a long way to go,” said Dr. Kyu Rhee, senior vice president of CVS Health, in a press release.
  
  The sweepstakes, which begins June 1 and ends July 10, is aimed at “working to close gaps in hesitancy” of getting the vaccine. CVS cited a survey from the Centers for Disease Control and Prevention that 17.6% of adults 18 years and over are hesitant to receive the vaccine.
  
  To combat that, private companies are offering incentives to people that get vaccinated. Unilevergave out free ice cream, Krispy Kreme is givingaway a free doughnutevery day for the rest of the year and Budweiser is reimbursing beer purchases.
  
  States are also giving away lavish prizes too. Ohio recently launched a $1 million prize that has boostedvaccination rate by 45%.New York and Marylandhave also announced lotteries offering people who get vaccinated a chance to win money.
  
  President Joe Biden is aiming to have at least one dose of vaccine administered to 70% of the nation’s adult population by July 4, a target date some officials have set for a full reopening. As of Tuesday,50% of adultsare fully vaccinated against Covid-19, according to the CDC.
