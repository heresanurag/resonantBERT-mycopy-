title: "Roger Federer will miss US Open after announcing further knee surgery"
date: "2021-08-16"
section: "Tennis"
url: "https://www.cnn.com/2021/08/16/tennis/roger-federer-us-open-knee-injury-spt-intl/index.html"
content: |
  Tennis greatRoger Federerwill miss the US Open later this month and possibly the rest of the season, after announcing that he needs another knee surgery which will sideline him for “many months.”
  
  “I’ve been doing a lot of checks with the doctors, as well, on my knee, getting all the information as I hurt myself further during the grass-court season and Wimbledon,” the 40-year-old said in anInstagrampost Sunday.
  
  “Unfortunately, they told me for the medium to long-term, to feel better, I will need surgery, so I decided to do it. I will be on crutches for many weeks and then also out of the game for many months.”
  
  Federer, who is tied with Rafael Nadal andNovak Djokovicon 20 career grand slams, was noncommittal about his future in tennis.
  
  “I want to be healthy. I want to be running around later, as well, again, and I want to give myself a glimmer of hope, also, to return to the tour in some shape or form,” he added.
  
  “I am realistic, don’t get me wrong. I know how difficult it is at this age right now to do another surgery and try it.”
  
