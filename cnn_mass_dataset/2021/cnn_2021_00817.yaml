content: |
  Oregon, the state that produces the most Christmas trees in the US, haslost acres upon acres of seedlings due to the recent record heat. That means tighter tree supplies now and possibly for years to come – and higher prices to match. Here’s what you need to know toGet Up to Speed and On with Your Day.
  
  (You can also get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  The CDC is moving more and more countriesto its highest-risk travel tieramong Omicron coronavirus concerns and rising Covid-19 cases across the world. Several European countries, including France and Portugal, are the latest to be added to the CDC’s Level 4 list. A coronavirus resurgence in Europe is currently threatening the regional economy, and a drop in tourism is one of the main factors. Back in the US, a rise in cases is complicating workplace policies. Companies are delaying return-to-office plans, including Ford,which asked 30,000 workers to remain homeafter initially scheduling a return next month. And in New York City,all private sector employers will soon be requiredto implement a Covid-19 vaccine mandate.
  
  President Joe Biden and Russian President Vladimir Putinwill hold an urgent call todayas the Western world grows increasingly alarmed at signs Russia is planning to invade Ukraine. A spokesman for the Kremlin has called the notion “hysteria,” but the US, Ukraine, and their allies arenot ignoring the Russian buildupof troops along its western border. US officials in recent days have weighed whether to issue wide-reaching sanctions on Russia meant to deter Putin. This week, Putin visited New Delhi andoversaw the signing of new trade and arms deals, one of which will also see India produce more than 600,000 Kalashnikov assault rifles. India is a key US ally, and the US has expressed reservations about growing military cooperation between Moscow and New Delhi.
  
  Marc Short, the former chief of staff to Vice President Mike Pence,is cooperating with the House committee investigating the January 6 Capitol riot. This is a significant development that will give investigators insight from one of the highest-ranking Trump officials. Short is still one of Pence’s closest advisers and is a witness to many critical events at the center of the investigation, including what happened to Pence at the Capitol on January 6 and how former President Donald Trump pressured Pence not to certify the presidential election. Short’s cooperation also signals an openness among Pence’s inner circle to talk to the committee — a change from some in Trump’s inner circle who have defied House subpoenas.
  
  The December 15 debt ceiling deadline is looming, and the question may not be whether Congress votes to raise it,but who will take the fall for the politically toxic vote. Senate Minority Leader Mitch McConnnell is reportedly working on a plan to raise the nation’s borrowing limit — which is a must if the US wants to avoid economic chaos — while forcing Democrats to be the ones to pull the trigger. However, the plan requires Republican cooperation under the rules of the Senate, and it’s not clear whether 10 of McConnell’s party colleagues will agree to it. Meanwhile, Biden’s key economic legislation, known as the Build Back Better bill, is still languishing. Senate Majority Leader Chuck Schumeris insisting the bill can still pass his chamber by Christmasdespite lingering differences among Democrats.
  
  The Biden administrationhas relaunched a Trump-era border policy known as “Remain in Mexico.”The policy allows officials to send non-Mexican migrants back to Mexico to await their US immigration court hearings. The Biden administration pledged to end the program and begin admitting migrants who were subjected to it, but a federal judge in Texas ordered the administration to revive the policy. Still, the administration has promise to make changes that will, as White House press secretary Jen Psaki said, “improve humanitarian components,” like improving access to lawyers. However, the return of the policy is still a deeply unwelcome and discouraging one for immigration advocates.
  
