  Incorrect nursing signs include your baby’s head not being in line with their body, your baby is sucking on the nipple only but not on the areola and your baby’s cheeks being puckered inward.
  
  If you aren’t hearing your baby swallow regularly or if you experience pain or nipple damage, you may want to seek advice from your pediatrician or or a lactation consultant such asLa Leche League,a non-profit agency dedicated to providing education and support for breastfeeding mothers.
