title: "What to do when those around you are not wearing masks? An expert weighs in about Christmas travel"
date: "2021-12-24"
section: "Health"
url: "https://www.cnn.com/2021/12/24/health/us-coronavirus-friday/index.html"
content: |
  With holiday travel returning to pre-pandemic levels, a health expert is offering advice for those planning to visit loved ones for Christmas, given the surgein Covid-19 casesin many parts of the country.
  
  Both New York state and Washington, DC, reported record infection numbers on Thursday.
  
  With take-home tests hard to find and testing demandscreating long linesnationwide, other safety measures such as wearing N95 or KN95 masks while traveling for the holidays will be critical, said Dr. Esther Choo, associate professor at Oregon Health and Science University.
  
  Flying has an increased risk due to a lack of vaccine requirement and an inconsistent adherence by some to fully keeping on their masks, such that “this could be a much safer activity than it currently is,” Choo told CNN’s Laura Coates on Thursday.
  
  “Speak up when you see those around you not wearing masks. This is not a time to be polite and let people do what they feel like doing. It’s really about keeping everyone safe,” she said.
  
  For the second Christmas in a row, hospital workers will face the trauma of Covid-19 patient deaths
  
  Dr. Anthony Fauci has repeatedly said this month he believes people can feel relatively comfortable traveling by plane if they are vaccinated, including with a booster dose, and are wearing masks as required at airports and aboard aircraft.
  
  “If I had to, I would have no problem getting on an airplane. I am vaccinated. I’m boosted. I know we have to wear a mask on an airplane,” the director of the National Institute of Allergy and Infectious Diseasestold CNBC last week.
  
  Vaccinations and booster doses have shown to be thebest methodto prevent severe illness, yet one’s immune system needs time to respond to administered doses. And unvaccinated people – whether seeing others for the holidays or not – are at a substantially higher risk of severe illness from Covid-19.
  
  About 71 million eligible recipients over the age of 5 in the US have yet to receive any doses of vaccine,according todata from the US Centers for Disease Control and Prevention.
  
  More than 500 million doses of the Covid-19 vaccine have been administered in the US, per CDC data. Nearly 62% of all Americans are fully inoculated, and more than 34% of fully vaccinated adults have received a booster.
  
  Covid-19 cases in the US have been rising as the highly contagious Omicron variant becomes dominant. The country averaged more than 182,600 new Covid-19 cases a day over the last week, according to Johns Hopkins University.
  
  That’s 48% higher than a week ago, and beyond the peak of the Delta-variant-driven surge in the summer. It falls short of the country’s all-time peak, which was 251,900 daily cases reached on January 11, according to Johns Hopkins data.
  
  More than 71,400 Covid-19 patients were in US hospitals on Friday – a number that’s been trending up since it dipped to around 45,000 on November 8, according to Health and Human Services Department data.
  
  But that hospitalization number is below the peak from the Delta surge (103,896 on September 1), and about half the record-high reached in January, according to HHS data.
  
  The US averaged 1,584 Covid-19 deaths a day over the last week, 30% higher than a week prior, according to Johns Hopkins.
  
  At least 2.08 million travelers were screened at US airports on Wednesday, higher than on the same weekday in 2019, according to the Transportation Security Administration. The agency anticipates 20 million people will fly between December 23 and January 3, rivaling figures from 2019.
  
  Yet multiple airlines haverecently announcedcanceled flights and shifting schedules due to crew members exposed to the Omicron variant.
  
  Doctor describes getting death threats by families of Covid patients
  
  United Airlines has canceled more than 175 Christmas Eve flights, or 9% of its total number of flights,according toflight tracking site FlightAware on Friday morning.
  
  “The nationwide spike in Omicron cases this week has had a direct impact on our flight crews and the people who run our operation,” said a United memo obtained by CNN.
  
  Delta Air Lines has canceled more than 140 Christmas Eve flights, according to FlightAware, roughly 7% of its total schedule.
  
  “Delta teams have exhausted all options and resources – including rerouting and substitutions of aircraft and crews to cover scheduled flying,” the airline said in a statement.
  
  So you tested positive for Covid. Here's what to do next
  
  Alaska Airlines announced it canceled 17 flights Thursday because of Omicron and more cancellations are possible on Christmas Eve.
  
  Covid-19 is not only affecting airport travel. A Royal Caribbean cruise ship was recentlydenied entryinto Aruba and Curaçao after 55 fully vaccinated crew members and passengers – just over 1% of those on board – tested positive for Covid-19, the company told CNN.
  
  TheOdyssey of the Seashas no more scheduled ports of call and will spend days at sea until their regular scheduled return on December 26, Royal Caribbean said.
  
  In anew paperpublished Thursday in the journal Science, two infectious disease experts recommended more booster shots and more mask-wearing to protect people.
  
  Vaccine efficacy wanes over time, the researchers wrote, but can be restored with a booster dose to help protect against breakthrough infections.
  
  FDA authorizes second antiviral pill to treat Covid-19
  
  “Time appears to be the key driver of the post-vaccination reduction in effectiveness,” write Ravindra Gupta of the University of Cambridge in the UK and Dr. Eric Topol of the Scripps Research Translational Institute in California.
  
  “Continued transmission in highly vaccinated populations underscores the need for expansion of vaccination across age groups while maintaining nonpharmacological interventions, such as mask wearing,” they write.
  
  The researchers note how, earlier in the rollout of vaccines, nations that spaced out administering first and second doses of the Pfizer/BioNTech and Moderna mRNA vaccines saw longer-term durability of immunity from the shots, compared with nations like the United States and Israel where vaccine doses were administered three to four weeks apart.
  
  “Administration of two mRNA vaccine doses, closely spaced by 3 to 4 weeks, may have acted as a primary immunization – maximally inducing neutralizing antibodies but compromising durable immunity,” the paper said. This suggests that the two vaccine doses together likely acted as primary immunizations, instead of the first dose alone being the primary as intended.
  
  Deflated health care workers and desperate patients clash over alternative Covid treatments
  
  And while Israelhas begun providing a fourth dose of Covid-19 vaccine to older people, Moderna chief medical officer Paul Burton said more time is needed in the US to determinewaning immunity.
  
  “We’re going to have to wait for a couple of months yet, until we can see how those data develop and mature to understand when will that additional booster dose – if needed – have to be given,” Burton toldCNN’s Wolf Blitzeron Thursday, adding that he did not want to downplay the importance of boosters right now.
  
  “I think we can be confident, Wolf, getting a booster shot will provide protection throughout the holiday season and throughout these winter months,” he said.
  
  When it comes to a variant-specific booster Moderna is developing, Burton confirmed the company would be starting clinical trials in early 2022, yet the continued presence of two different variants may alter plans.
