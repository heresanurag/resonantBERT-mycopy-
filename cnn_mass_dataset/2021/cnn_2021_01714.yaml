  The fact that the Democratic-controlled US Senate passed a trillion-dollar infrastructure bill with substantial Republican support Tuesday is one remarkable fact in today’s polarized Washington. Even more striking is that Democrats may be heading toward passing a $3.5 trillion budget resolution with vastly expanded social spending – the largest such initiative in generations.
  
  The big bucks are badly needed, wrote economistJeffrey D. Sachs. The bipartisan bill only addresses part of America’s needs and “it doesn’t even pay for those investments through offsetting budget cuts or tax increases …the Democrats need to pass a real investment package – by reconciliation, along a party-line vote, this fall. And this package should be financed by tax increases on corporations and the rich.”
  
  The bipartisan bill is going to require skillful maneuvering through the House, where Speaker Nancy Pelosi wants to pass it in tandem with the larger package favored by progressives, wroteLincoln Mitchell. “For President Joe Biden, who has made infrastructure one of his key legislative issues, the stakes could not be higher. But he can breathe a little easier because no legislator in recent decades has been as adept as Pelosi at counting the votes – and knowing when she has the votes she needs. In 2009, it was Pelosi who promised then-President Barack Obama the votes on the Affordable Care Act. She delivered then –and she will deliver more than a decade later for Biden, too.”
  
  In the Los Angeles Times,Virginia Heffernanpointed out that the broadly popular hope of fixing America’s infrastructure remained unfulfilled under the previous administration. “During Trump’s term, federal investment in roads and bridges stagnated,” she wrote. “Roads, ports and airports never got fixed.Any hope that Trump’s autocratic proclivities could be channeled into mega-projects to astonish his base fizzled.He couldn’t even add more than 80 miles to his promised big, beautiful wall.”
  
  Thursday’srelease of 2020 datafrom the US Census confirmed the picture demographers have sketched – the data told the “story of a rapidly changing America: The relative size of the nation’s White population continues to decline, while ethnic and racial minorities represent the only source of population growth,” wrote political scientistJustin Gest.
  
  “On the surface, these numbers suggest a bleak future for the Republican Party, which finds its strongest support among Whites. Yet the surprising reality is that,overall, these demographic trends may favor the GOPbecause of the way political power is apportioned in America.”
  
  Peniel E. Josephwrote that focusing on the declining White population fuels the wrong narrative. “More Americans than ever are self-defining as multiracial, making headlines about the loss of White identity less of the proper focus than one about a 21st century multiracial democracy,” he wrote.
  
  “Over the past two decades, some Republicans have used forecast demographic changes related to the Census for partisan political advantage, helping to sustain and grow a whole ecosystem trafficking in racially intolerant appeals that have remade American politics. The rise of a right-wing public sphere we are now seeing – untethered to science, objective facts and past support for voting rights and racial justice –depends on a narrative that presents democracy as a zero-sum game,with historic White winners on the verge of being replaced by citizens and immigrants of color.”
  
