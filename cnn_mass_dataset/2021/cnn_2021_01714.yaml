  For 22 of the last 38 years, New York has had a Governor Cuomo – first Mario Cuomo, who served three terms beginning in 1983, and then his son Andrew, who took office in 2011. But on Tuesday, the governor, in the midst of his third term and facing likely impeachment, abruptly announced he was resigning, effective August 24. The move came after an investigation by state Attorney General Letitia James supported the allegations of 11 women who had accused Cuomo of sexual harassment.
  
  Cuomo’s decision “is a historic marker driven into the ground, a before-and-after moment,one warning men everywhere there’s a cost for ignoring what women have been shouting for some time now, particularly from social media rooftops,” wroteFrida Ghitis. “That the times have changed; the days when a boss could casually hug his assistant and let his hand slip are in the past now. Even if Cuomo himself still doesn’t seem to quite get it.”
  
  It’s about time,Allison Hopeobserved. “The constant harassment, condescension, marginalization and abuse of women is not sustainable.Even though women have endured such abuses for generations and even longer, perhaps we have at long last started to reach the overdue point where we have simply had enough.”
  
  In political terms, wroteJulian Zelizer, “the politician who was willing to fight every scandal that plagued his tenurefinally met a challenge he couldn’t outmaneuver.” What was striking, he added, was the difference in how the two parties have dealt with these situations. “When (former president Donald) Trump faced multiple accusations of sexual misconduct (all of which he denied), the GOP largely stood behind him … In contrast, Democrats have decided to put principle before party or power.”
  
