  Former White House press secretary Sean Spicer says Donald Trump will run for president in 2024. Trump biographerMichael D’Antonioagrees, with a caveat. “I part company with Spicer when he explains why he’s certain Trump is ‘in.’ He sees evidence in former President’s confabs with key advisers.But me? I see it in the merch.”
  
  Trump is marketing “Official Trump Cards,” D’Antonio noted. “Among all of today’s political leaders, and arguably among all of them going back to the Civil War, none have equaled Trump when it comes to understanding the power of symbols and demonstrating a willingness to use them. With his famous Make American Great Again caps, his easily identified blue flags, and now his membership cards, Trump has equipped his supporters in a way never seen before.”
  
  While Trump continues to push the big lie that he was cheated of victory in the 2020 election,Norman EisenandJoanna Lydgatewrote that there is some good news: “For all those alarmed by the assaults on democracy in the 2020 election cycle and its aftermath,it will come as a great relief that the rule of law is pushing back. The latest example is a federal judge in Colorado who sanctioned two lawyers for ‘echoing and repeating election-rigging conspiracy theories’ and noted that those allegations ‘are extraordinarily serious, and if accepted as true by large numbers of people, are the stuff of which violent insurrections are made.’”
  
  In an interview with CNN’s Dana Bash, Rep. Alexandria Ocasio-Cortez revealed her true fears about the January 6 insurrection at the Capitol. “She wasn’t just worried about rioters murdering her if they found her – she worried about them raping her,” wroteJill Filipovic.
  
  “Admitting to the particular fear of sexual violence that women have – recognizing that particular vulnerability –is entirely outside the norm for female politicians, who often have to go to absurd lengths to prove that they’re tough enough for the job. And Ocasio-Cortez told her story at a moment when members of the American political establishment seem to want to move on and put January 6 in the rearview mirror. She’s insisting that we refuse to look away from the reality of that day and saying that if we want that attempted coup to be a lesson and not a test-run, we need to understand it, agree on the facts about it, and level appropriate consequences for it.”
  
