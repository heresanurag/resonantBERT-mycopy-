  _April 5, 2021_
  
  _Today’s special edition of CNN 10 focuses on Amazon, the $1 trillion U.S. company that has changed the retail landscape. We’ll explore some of the technology it uses, the challenges it has faced and created, the concerns about whether it’s a monopoly, and the profits it has generated._
  
  [Click here to access the printable version of today’s CNN 10 transcript.](http://transcripts.cnn.com/TRANSCRIPTS/2104/05/sn.01.html)
  
  _CNN 10 serves a growing audience interested in compact on-demand news broadcasts ideal for explanation seekers on the go or in the classroom. The show’s priority is to identify stories of international significance and then clearly describe why they’re making news, who is affected, and how the events fit into a complex, international society._
  
