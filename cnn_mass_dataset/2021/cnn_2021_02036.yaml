id: cnn_2021_02036
title: "Arson and vandalism sweep Brazilian city of Manaus after death of criminal leader"
date: "2021-06-06"
section: "Americas"
url: "https://www.cnn.com/2021/06/06/americas/manaus-crime-wave-gang-leader-intl-latam/index.html"
content: |
  Police have been ordered into the streets of theBrazilian city of Manaus,amid a wave of attacks on buses, cars and banks that began on Saturday night and forced the city to halt public transportation and left some residents afraid to leave home.
  
  State officials said criminal gangs in Manaus organized the arson attacks from prison, in retribution for the reported death of one of their leaders during a police raid on Saturday. Images of the weekend’s damage show burned-out buses and bank offices filled with rubble.
  
