title: "Judge denies request for earlier court date to remove Britney Spears’ father as conservator"
date: "2021-08-09"
section: "Entertainment"
url: "https://www.cnn.com/2021/08/09/entertainment/britney-spears-request-to-move-court-date/index.html"
content: |
  Britney Spearswill have to wait longer for a ruling on her request to remove her father as conservator of her estate.
  
  Judge Brenda Penny has denied apetitionfiled by Britney Spears’ attorney Mathew Rosengart to move a September 29 hearing in the case to August 23 in an effort to remove Jamie Spears as soon as possible as the conservator of his daughter’s estate, according to court documents obtained by CNN on Monday.
  
  Judge Penny did not give a reason for her decision.
  
  “Every day that passes is another day of avoidable harm and prejudice to Ms. Spears and the Estate,”last week’s petition filed by Rosengartstated. “Ms. Spears’s emotional health and well-being must be, and are, the paramount concern. Further, all interested parties forcefully agree that Mr. Spears’s continued presence as Conservator of the Estate is contrary to Ms. Spears’s best interests, health, and well-being, and that his prompt removal – or, at the very least, his immediate suspension – is ‘critical’ at this juncture.”
  
  Rosengart had previously filed a petition to remove the elder Spears from his role as co-conservator and replace him with Jason Rubin, a CPA at Certified Strategies Inc. in Woodland Hills, California.
  
  Speaking to the court last month, the singer said she wanted to press charges against her father for “conservatorship abuse” and called the arrangement “f***ing cruelty.”
