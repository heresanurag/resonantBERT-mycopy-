title: "Ian Wright attacks ‘disrespect’ of Africa Cup of Nations"
date: "2021-12-30"
section: "Football"
url: "https://www.cnn.com/2021/12/30/football/ian-wright-africa-cup-of-nations-spt-intl/index.html"
content: |
  Former England andArsenalstriker Ian Wright says that media coverage of Europe-based players travelling to the Africa Cup of Nations is “disrespectful” and “tinged with racism”.
  
  Wright, now a pundit for the BBC, said that coverage of the tournament and the issue of player release during the European season, is in marked contrast to how Euro 2020 was treated.
  
  “Is there ever a tournament more disrespected than the Africa Cup of Nations?” Wright said in a video posted on social media.
  
  “There is no greater honour than representing your country. The coverage is completely tinged with racism.
  
  “We played our Euros across 10 countries in the middle of a pandemic and there’s no issue at all. ButCameroon, a single country hosting a tournament, is a problem,” he said.
  
  Wright added that he objected to players being asked whether they intend to play for their countries.
  
  “You are getting journalists asking players … players getting asked if they will be honouring the call-ups to their national teams. Imagine if that was an English player representing the Three Lions. Can you imagine the furore?”
  
