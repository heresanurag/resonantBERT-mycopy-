title: "The SEC should investigate the Didi IPO fiasco, US senator says"
date: "2021-07-08"
section: "Investing"
url: "https://www.cnn.com/2021/07/08/investing/china-didi-ipo-sec/index.html"
content: |
  Democratic Senator Chris Van Hollen called on US financial regulators to probe thedisastrous IPOof Chinese ride-hailing company Didi.
  
  “The SEC should thoroughly investigate this incident to see if investors were intentionally misled by Didi’s public disclosures,” Van Hollen told CNN Business in a statement.
  
  Didi raised $4.4 billion by listing its shares on the New York Stock Exchange on June 30, marking thebiggest US IPO by a Chinese company since 2014.
  
  Within days, Didi’s share price collapsed, costing US investors dearly The selloff was triggered by a crackdown from China, which announced on July 4 it isbanning Didi from app storesin the country because it poses cybersecurity risks and broke privacy laws.
  
  Didi’s market value tumbled to $57 billion by Wednesday’s close, down from nearly $70 billion on its first day of trading. The stock dropped another 7% in premarket trading on Thursday morning asChinese tech stocks tumbled.
  
  Exclusive: China just gave a big F-U to America, hedge fund manager says
  
  “American investors need confidence that the companies that list on U.S. exchanges are not engaging in fraud and should have access to information on the risks posed by investing in foreign companies – especially those influenced by foreign governments,” Van Hollen, a Democrat from Maryland, said in the statement.
  
  In a statement on Sunday, Didi said it will “strive to rectify any problems, improve its risk prevention awareness and technological capabilities, protect users’ privacy and data security, and continue to provide secure and convenient services to its users.”
  
  The SEC did not respond to repeated requests for comment.
  
  Van Hollen championed abill signed into law last yearby former President Donald Trump that requires US-listed companies to be held to American auditing standards and establish they are not owned or controlled by a foreign government. Under the law, companies that fail to comply with US auditing standards for three years in a row will get kicked off US exchanges.
  
