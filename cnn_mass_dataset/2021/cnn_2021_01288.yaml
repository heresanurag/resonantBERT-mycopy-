title: "Justice Department sues Uber for overcharging people with disabilities for taking too long to load into vehicle"
date: "2021-11-10"
section: "Politics"
url: "https://www.cnn.com/2021/11/10/politics/doj-sues-uber/index.html"
content: |
  Customers with disabilities across the country have been overcharged by Uber since 2016 for allegedly taking too long to load into their designated vehicle, according to afederal civil lawsuitthe Justice Department filed on Wednesday.
  
  Uber’s policies and practices of charging “wait time” fees for disabled passengers and potential passengers violates the Americans with Disabilities Act, according to the lawsuit filed with the US District Court for the Northern District of California.
  
  “Many passengers with disabilities require more than two minutes to board or load into a vehicle for various reasons, including because they may use mobility aids and devices such as wheelchairs and walkers that need to be broken down and stored in the vehicle or because they simply need additional time to board the vehicle,” according to the lawsuit.
  
  The lawsuit described an unidentified 52-year-old woman who relocated to Louisville, Kentucky, is a quadriplegic, uses a wheelchair for mobility and relied onUberfor transportation at least 10 times a week. The woman noticed that she was charged a “wait time” fee for taking 15 minutes to load into the vehicle and was denied a refund by Uber, according to the lawsuit.
  
