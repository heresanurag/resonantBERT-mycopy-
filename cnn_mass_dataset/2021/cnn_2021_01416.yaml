title: "Taylor Swift drops rerecorded ‘Fearless (Taylor’s Version)’"
date: "2021-04-09"
section: "Entertainment"
url: "https://www.cnn.com/2021/04/09/entertainment/taylor-swift-fearless-trnd/index.html"
content: |
  “Fearless (Taylor’s Version)” is here.
  
  Taylor Swift has releasedthe rerecordingof her sophomore album, which contains 27 songs and runs nearly two hours. She recorded the original “Fearless” in 2008.
  
  Thenew recordingscome two years after she failed to acquire the rights to her early albums.
  
  It was the night things changed. Fearless (Taylor’s Version) is out now:https://t.co/Sw5JzYR4cSpic.twitter.com/SoJRNdPfho
  
  On Thursday Swift tweeted a video of Olivia Rodrigo and Conan Gray to help promote the remake.
  
  “They are so cute it physically hurts me,” Swift wrote.
  
  You ok? NO cause I sent my two kids@Olivia_Rodrigoand@conangraymy new version of You Belong With Me and THEY ARE SO CUTE IT PHYSICALLY HURTS ME((Album out at midnight!))pic.twitter.com/yDJusP8TAs
  
  Swift has been promoting the album for weeks on social media, releasing never-before-heard songs, including “You All Over Me” and “Mr. Perfectly Fine.”
