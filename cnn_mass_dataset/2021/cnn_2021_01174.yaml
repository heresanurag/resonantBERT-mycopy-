title: "Football’s coming home, but taking a knee divides England fans"
date: "2021-06-05"
section: "Football"
url: "https://www.cnn.com/2021/06/05/football/euro-2020-england-taking-a-knee-spt-intl/index.html"
content: |
  Twenty five years ago, when England hosted Euro 1996, the nation was in thrall to a team that reached the European Championship’s semifinals playing an exciting brand of soccer to the soundtrack of fans singing“Football’s Coming Home,”the chorus to the “Three Lions” song.
  
  Ahead ofEuro 2020’sstart on June 11, England plays its final friendly in Middlesbrough on Sunday against Romania, but the mood music is more discordant.
  
  As England players took the knee before kickoff in Wednesday’s friendly against Austria – a game also played in Middlesbrough – the gesture was booed by some fans.
  
  There were alsoboosahead of theFA Cup finallast month between Leicester City and Chelsea when players did the same.
  
  READ:Targeted by far right group, football club founded by Turkish immigrants looks to connect cultures
  
  The act of kneeling – made famous in 2016 by NFL quarterbackColin Kaepernick,who kneeled in protest of the national anthem –  was taken up by English Premier League footballers during the2019/2020 seasonas an act of solidarity following the global outrage over the murder of George Floyd.
  
  Last season, English top-flight players continued to kneel head of games, though Crystal Palace starWilfried Zahabecame the first Premier League player not to do so before kickoff, instead choosing to stand before his side’s match against West Brom. Zaha said it was “becoming something we just do.”
  
  In March, former Arsenal and Barcelona starThierry HenrytoldCNN Sportthat the discourse over the issue has veered so far off course that people are now “forgetting” why players started kneeling in the first place.
  
  “The cause is: what are you going to do for it to be better for everybody? Equality. Everybody, and obviously I’m going to talk about my community,” Henry told CNN’s Darren Lewis.
  
  “This is not so much about kneeling or standing – which, by the way, I thought kneeling was a strong, strong message and we all know where it comes from – but then the discussion moved to: are we standing or are we kneeling?”
  
  READ:Copa America controversy: Brazil squad will ‘talk at the right time’
  
  But footballers taking a knee and the response of some fans to that act has prompted some soul searching and wider debate as to what it says about racism in England in 2021
  
  Asked if people were wearing “their racism more lightly” because of the kneeling, Tony Burnett, chief executive of football inclusivity organization Kick It Out told theIndependent newspaperthis week: “I don’t think that’s about taking the knee. I think this started when Brexit kicked off. The hatred, polarisation and binary positions people took up from then has carried on.
  
  “Brexit became an excuse for racism to resurface in the UK and we are seeing that manifest in football now. I don’t think players taking the knee have caused this, I think people taking the knee are trying to address it.
  
  “What’s caused this is government behaviour, government attitudes towards race, failure to tackle racism at a national level and allowing organisations and sports like football to get away with it for years.”
  
  Earlier this year aBritish government-backed reportinto institutional racism that found no evidence that the country is “still institutionally racist” was deemed a “whitewash” by racial equality advocates.
  
  “If you boo England players for taking the knee, you’re part of the reason why players are taking the knee,” tweeted former England internationalGary Lineker.
  
  Commenting on the boos ahead of the Austria game, one Twitter user went even further.
  
  “Based on what we are seeing from a small number of fans, England is going to be severely embarrassed in the Euros by the extreme racist element of our fans,” he tweeted. “There is no hiding it, they proudly boo the recognition of equality.Difficult to believe.”
  
  Another Twitter user put forward a different viewpoint: “What if some people are booing because they are bored of virtue signalling and nothing actually being done about the issue. Having to see players take the knee when nothing more is happening, no changes being made, etc?”
  
