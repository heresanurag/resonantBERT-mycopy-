title: "Doja Cat, positive for Covid-19, drops out of tour"
date: "2021-12-13"
section: "Entertainment"
url: "https://www.cnn.com/2021/12/13/entertainment/doja-cat-covid-positive-tour/index.html"
content: |
  Doja Cat has announced she’s dropped out of the 2021 iHeartRadio Jingle Ball Tour after testing positive for Covid-19.
  
  The singerposted on her verified Instagram accountthat some members of her production team also tested positive.
  
  “I’m sad to share that I just tested positive as well and will no longer be able to perform on the rest of the iHeartRadio Jingle Ball Tour,” her statement read. “While my spirits are down since I can’t be there to celebrate the holiday with my fans in Philly, DC, Atlanta and Miami, I’m doing ok and look forward to recovering and getting back out there as soon as I can!”
  
  This is her second bout with Covid. Shesaid she had first contracted the virus in July 2020.
  
  It was reported recentlythat Coldplay and Lil Nas X had to withdraw from the UK’s Jingle Bell Ball 2021 with Barclaycard after members of their teams tested positive.
