title: "‘Belfast’ leads pack of Critics Choice film nominations"
date: "2021-12-13"
section: "Entertainment"
url: "https://www.cnn.com/2021/12/13/entertainment/critics-choice-film-nominations-2022/index.html"
content: |
  The critics have made their choices for best film of the year.
  
  The film nominations for the 27th Annual Critics Choice Awards were announced on Monday with “Belfast” from Focus Features and “West Side Story” from 20th Century Studios leading the pack, earning 11 nominations each.
  
  With the momentum from Monday’sGolden Globe nominations, “Belfast,” which earned seven Globe nominations, is quickly becoming this season’s award show heavyweight.
  
  The Critics Choice Awards, which will broadcast on CW and TBS, is set to be held on Jan. 9 with hosts Taye Diggs and Nicole Byer – the same date as theGolden Globe Awards, which will not be televised this year. (TBS and CNN are both part of WarnerMedia.)
  
