title: "As states attack voter rights, Congress has to step in"
date: "2021-04-20"
section: "Opinion"
url: "https://www.cnn.com/2021/04/20/opinions/voter-rights-suppression-congress-durbin/index.html"
content: |
  Editor’s Note:Dick Durbin, a Democrat, is the senior US senator from Illinois. He is chairman of the US Senate Judiciary Committee. The opinions expressed in this commentary are his own. View moreopinionarticles on CNN.
  
  It’s Tuesday, November 8, 2022.
  
  A nurse in Georgia just finished a 12-hour shift. It’s 6:15 p.m. She rushes to the polling site she’s voted at every election year, only to discover that a long line awaits her. Parched and hungry after a long day, she won’t find any assistance from good Samaritans offering water or food to voters in line – because under Georgia’snew restrictive voting law, such an offer would risk a criminal charge.
  
  Her neighbors, an elderly couple, had hoped to vote early to avoid the long lines. They had planned to vote after church, but Georgia’s new lawallows countiesto choose not to open for early voting on Sundays. As an alternative, they requested absentee ballots, but they didn’t realize that they now had to print theirdriver’s licensenumber or other comparable state ID on the outer envelopes of their ballots, and so their votes were discarded.
  
  Last month, Republican legislators in Georgia passedSB 202, a law that fundamentally changes the state’s voting process – and makes it harder forvoters of colorto access the ballot box, after theyturned outin historic numbers in 2020 and, again, in January 2021 in the state’s Senate runoffs.
  
  This law was no accident. In fact, it’s the latest example of Republican state legislatures enacting new restrictions on voting in an effort to maintain a partisan advantage by targeting communities of color.
  
  To deny that this is a replay of Jim Crow era legislation is to ignore the realities of racism in America. Congress cannot stand by while these real-time attacks on our democracy take place. The federal government must defend every eligible American’s right to vote – and it must act fast, because states are already moving ahead to prevent similar outcomes to the 2020 election.
  
  Jury is out -- no matter the verdict, Congress must act
  
  In 2013, the US Supreme Court decision in Shelby County v. Holdergutted the federal preclearance protection, which required states and localities with the worst records of voting discrimination to get preapproval for voting changes. This decision robbed minority voters of critical legal protections and creating opportunities for partisan actors to adopt targeted means to disenfranchise voters.
  
  Hours after the Shelby County decision, Texasannouncedit would implementthe very photo ID lawthat the Justice Department had previously blocked under the Voting Rights Act provision that the Supreme Court had gutted. The law was ultimately determined to violate the US Constitution by afederal court, because it wrongfully discriminated against the state’s Black and Latino votersand Texas insteadadopted SB5, a law permitting people to vote without a photo ID in certain circumstances.
  
  North Carolinaimplemented its own strict photo ID requirement within two months of the Shelby decision, which a federal court eventually determined targeted the state’s Black voters with“surgical precision.”The case took almost three years to litigate,with the ACLU notingthat 2014 voting for almost 200 federal and state officials took place under a “discriminatory regime” before the court had issued its ruling.
  
  By 2016, 14 stateshad new voting restrictionsin place for the first time in a presidential election.  And, as of April 1, 2021, legislatorshave introduced 361 billswith voting restriction provisions in 47 states. That’s a 43% increase in voting restriction legislation in about a month.
  
  History shows we ignore Tucker Carlson at our peril
  
  Meanwhile, the pending Supreme Court caseBrnovich v. Democratic National Committeechallenging Arizona’s ballot collection and counting rules threatens to further erode critical federal protections for minority voters against discriminatory laws. The lawyer seeking to dismantle federal voting rights laws suggested during his argument before the Court that these federal protections put Republicans at a “competitive disadvantage” electorally. Rather than win elections based on ideas and merit, it appears that Republicans have decided that they can only win by suppressing the vote.
  
  Unfortunately, this isn’t a new tactic. The legislation and legal cases we see today mirror the racist attacks on political rights at the turn of the 20th century known asthe Mississippi Plan: discriminatory efforts that sought to blunt the electoral influence of Black voters and put red tape around the voting process. Today’s bills may not include literacy tests or poll taxes, which were also advanced in the name of protecting election integrity, but the barriers to the ballot box are fueled by the same aims of voter suppression and discrimination.
  
  On April 20, the Senate Judiciary Committee will hold a hearing to examine the wave of voter suppression across our nation. There are clear steps Congress can take right now to restore the protections of the Voting Rights Act, such as the Senate passing the House-approved John Lewis Voting Rights Advancement Act that would restore the “preclearance” remedy and provide a legal framework to protect voters from discrimination.
  
  I have also proposedan amendmentthat would finally enshrine an affirmative right to vote in the US Constitution. This would provide a critical tool to resist voter suppression efforts, ranging from felony disenfranchisement laws to problematic election administration changes that lead to long lines and drive down voter turnout.
  
