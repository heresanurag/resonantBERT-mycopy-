title: "Ancient DNA from a teen girl reveals previously unknown group of humans"
date: "2021-08-25"
section: "World"
url: "https://www.cnn.com/2021/08/25/world/wallacea-skeleton-dna-discovery-scn?cid=external-feeds_iluminar_yahoo"
content: |
