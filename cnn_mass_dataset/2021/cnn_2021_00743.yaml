title: "Civilian casualties in Afghanistan hit record high amid US withdrawal, UN says"
date: "2021-07-26"
section: "Asia"
url: "https://www.cnn.com/2021/07/26/asia/afghanistan-civilian-deaths-2021-us-taliban-intl/index.html"
content: |
  Civilian casualties inAfghanistanreached record levels in the first half of 2021, the United Nations warned Monday, noting that deaths and injuries spiked markedly from May when the United States and its allies began withdrawing troops from the country.
  
  Some 5,183 casualties were recorded in the first six months of the year – a 47% increase from 2020 – the United Nations Assistance Mission in Afghanistan (UNAMA) found in areport.
  
  The number of deaths and injuries recorded during May and June alone was 2,392, almost as high as the total for the preceding four months, when 2,791 casualties were recorded.
  
  UNAMA said 2021 would be the deadliest year for Afghan civilians since its records began unless urgent action was taken to tackle violence in the country.
  
  The report added that it was “sickening” that almost half of all casualties had been women and children, who have been killed and injured in record numbers this year. Some 32% of casualties were children, while 14% were women – with a combined total of 687 dead and 1,722 injured.
  
