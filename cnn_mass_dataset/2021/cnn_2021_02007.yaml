title: "Finally, the wind is at our back on the climate crisis"
date: "2021-04-22"
section: "Opinion"
url: "https://www.cnn.com/2021/04/22/opinions/climate-crisis-biden-summit-figueres/index.html"
content: |
  Editor’s Note:Christiana Figueres is the former executive secretary of the UN Framework Convention on Climate Change (2010-2016). She is now a founding partner atGlobal Optimism,co-author of The Future We Choose and co-presents the climate podcast,Outrage + Optimism.The views expressed here are her own. Readmore opinionat CNN.
  
  History will remember this decade as the climate turning point, the moment we finally woke up to the fact that despite (andbecause of) shocks like Covid-19,decarbonization– the reduction of carbon dioxide emissions – is now inevitable. The only question is how fast we will achieve it. I’m reminded of Ernest Hemingway’s book, “The Sun Also Rises,” when his character, Mike Campbell, describes how he went bankrupt: “Two ways. Gradually and then suddenly.”
  
  The “suddenly” part of climate action is at last beginning to blossom, evident in the early unfolding of the most exciting technological and economic transformation of our lifetime. Since 2005,32 countries,including some developing nations, have successfully grown their economies without growing their emissions.
  
  Meanwhile, thousands of commitments tonet-zero emissionshave been announced in recent months from governments, companies and financial institutions large and small, putting theParis Agreement goalto keep temperature rise within 1.5ºC within reach. Even with theirvarying degrees of robustness, the collective message of these commitments is clear: We’ve crossed a new threshold, there’s no going back to a high-emissions trajectory.
  
  The challenge for global leaders now is to not get stuck. It’s no longer practical to play both sides: putting one foot in the net-zero future while keeping the other in a high carbon past. It’s a contortionism that can only end in the middle splits – a very difficult position from which to move forward.
  
  The US Special Presidential Envoy for Climate Change, John Kerry, has recentlyvisited Asia,meeting with representatives of theIndian,ChineseandSouth Koreangovernments to encourage their leadership in the net-zero future ahead of President Joe Biden’sclimate summitthis week. This outreach recognizes the role of partnership and cooperation on climate as being in everyone’s self-interest: It’s much easier for all of us to move forward quickly when others are going in that direction too. And move we must, decisively, today, with action to safeguard our climate. When the US economy sets a target of50-52%emissions reductions from 2005 levels by 2030 it is not only transformational for the citizens of that country, it is influential on all other economies, small and large.
  
  This town powered America for decades. What do we owe them?
  
  When a government commitssignificant investmentsin favor of, for example, renewables, but continues to fund coal-fired power at home andabroad, I call that the decarbonization splits. When a company focuses on emissions reductions from energy use or transport, without also responsibly investing in protecting and restoring nature, that’s just another version of the decarbonization splits. In each case we get stuck, unable to travel in any direction, limiting shared cooperation for green growth.
  
  Inevitably, it’s people who feel the pain. It’s no wonder so many among usdon’t feel hopefulwhen we look into the future and see a climate-changed world. Climate impacts are already reachingworst-case scenario levelsbased on scientific predictions from just a few years back. The consequences aredevastating lives and shattering livelihoodstoday. Despite this stark reality, too many of us see leaders apparently stuck in the splits when it comes to climate change.
  
  No leader should have to perform such gymnastics any longer. Capital isalready flowingto support the future we need. Yes, to date this has been a gradual flow, but it’s quickly accelerating and will no doubt enter the “suddenly” phase soon! BlackRock CEO Larry Fink has famously described the shift as tectonic,a fundamental reallocationof capital.
  
  Let's talk about the climate apocalypse
  
  When I took the job to lead the global climate negotiations ahead of what was to become the Paris Agreement, few people were hopeful that we could secure a global deal on climate. I was one of them. I evenblurted outat my first press conference that I did not think we would achieve such a deal in my lifetime. But the moment those words left my mouth, I realized that if Ifullycommitted to the opportunity that lay within the challenge others may join me – and we could (and did) in fact achieve it.
  
  It’s this full commitment to move forward into the future that we need to bring to life now, just as the stakes are at their highest and the hour is late. The evidence base is undeniable – climate action is exactly how we will create thegood jobs,better cities,cleaner airandmore sustainable food supplyurgently needed to improve human, economic and planetary health.
  
  This is the moment for stubborn optimism – the necessary mindset when embarking on any momentous task. And the good news is that we have an extraordinary wind at our backs. Recent developments show the momentum for change is far stronger than anything we had ahead of the Paris Agreement.
  
  Anyone who’s sailed on the ocean will know that when one is traveling in the same direction as the wind, and at the same speed as the wind, a physical deception comes into play: It can feel as if there’s no wind at all and that you’re traveling quite slowly, when in fact you may be going the fastest your boat will ever go.
  
