title: "A rainbow rose over the Pulse nightclub memorial on the fifth anniversary of the mass shooting at the Orlando venue"
date: "2021-06-13"
section: "US"
url: "https://www.cnn.com/2021/06/13/us/rainbow-over-pulse-memorial-trnd"
content: |
  A symbol of hope in the form of a rainbow appeared over a remembrance ceremony to pay tribute to the 49 people who lost their lives during themass shooting at the Pulse nightclubin Orlando, Florida, five years ago.
  
  Orlando police shared a video from the event on Saturday stating that the colorful arch in the sky was seen moments after CNN affiliate WFTV anchor, Nancy Alvarez, spoke at the memorial ceremony.
  
  THE 49: Minutes after @NAlvarezWFTV said a rainbow would be a sign the 49 were watching this evening’s tribute, a 🌈 appeared...🕊#rememberthe49#OrlandoUnited#ThisisOrlando#Pulse5YearsLaterpic.twitter.com/RZrZeVAOSm
  
  “If you see a rainbow, shout it out, point it out, stop the ceremony, do what you got to do, because that will be our 49 saying (present),” Alvarez said.
  
  On June 12, 2016,a gunman opened fire in the nightclub, killing 49 people on Latin night at the popular gay venue.
  
  On Saturday, people gathered in Orlando to remember those who were killed and honor those that survived the shooting.
  
  49 birds appear over Orlando shooting victims memorial
  
  Therainbow flag has becomea universal symbol for the LGBTQ movement and is a symbol of hope and peace.
  
  In 2016, as the names of the 49 victims were being read at a vigil in Orlando, a photographer captured an image of a flock of birds flying by. When she counted the birds in her frame she told CNNshe was truly surprised: There were 49.
  
  “Seeing the birds made me feel a sense of peace about the tragedy,” the photographer told CNN in 2016. She asked to remain anonymous, because she would rather people be focused on the victims of the tragedy.
