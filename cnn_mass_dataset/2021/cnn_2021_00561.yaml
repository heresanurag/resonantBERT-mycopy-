title: "Kissing ‘Keeping Up With the Kardashians’ goodbye"
date: "2021-06-12"
section: "Entertainment"
url: "https://www.cnn.com/2021/06/12/entertainment/keeping-up-kardashians-plc/index.html"
content: |
  Where has the time gone?
  
  We are already more than halfway through 2021, and I promise you I am still processing 2020.
  
  Some parts of the country arestruggling with heat, some with rain, others withcicadas. Mount Rainier National Park in Washington State is still measuring snowfall.
  
  No matter what is going on outside your window, I’ve got some content for you to enjoy inside.
  
  ‘Keeping Up With the Kardashians’ series finale
  
  Speaking of time flying by, it seems like just yesterday we were peeking into the living room of the Kardashian-Jenner household and watching the youngest kids,KendallandKylieJenner, grow up.
  
  Arguably no one has done more for the reality TV game than the Kardashian-Jenner clan, andon Thursday we bid the wildly popular E! series farewell after 20 seasons.
  
  Sure,the family now has a deal with Hulu, but will the new project have the same magic that wasKim’s crying faceand the sisters talking smack over salads? We shall see.
  
  If you miss the original airing, the show is streaming on Hulu With Live TV, Sling TV, fuboTV and YouTube TV.
  
  Get ready for a lot of mischief.
  
  The God of Mischief, that is. Marvel Cinematic Universe’s“Loki”is getting the TV treatment on Disney+.
  
  Played to the hilt by Tom Hiddleston, Loki is trying to stay at least one step ahead of a time cop named Mobius, played by Owen Wilson.
  
  Disney+ has had great success with Marvel projects, including“WandaVision”and“The Falcon and the Winter Soldier.”There is no reason to believe lightning won’t strike again.
  
  “Loki” is streaming now.
  
  Nothing beats summertime in New York City. I suspect Lin-Manuel Miranda feels the same way.
  
  His popular Broadway musical “In the Heights,” set in the largely Dominican neighborhood of New York City’s Washington Heights, has been adapted for the big screen.
  
  “Crazy Rich Asians”director Jon M. Chuhelms the movie version. It’s one of themost eagerly awaited films of the yearfor those who have followed every step – the casting, the pandemic-related delays and now the final countdown to its release.
  
  The story about a bodega owner who hopes for a better life hits theaters and HBO Max (which is owned by CNN’s parent company) on Thursday.
  
  I’ve missedAdam Levine on “The Voice,”so it’s good to see he has been working hard on music.
  
  His band, Maroon 5, has a new album coming out and a tour to accompany it.
  
  “Jordi” is chock-full of star guest appearances, includingStevie Nicks, H.E.R., YG and thelate rapper Nipsey Hussle.
  
  The album drops Friday.
  
  Offset, a member of the rap trio Migos, is convinced that their latest project is fire.
  
  “We got creative with our flows, so we could stamp another (movement),” the man also known as Cardi B’s husbandtold Billboardabout the new album titled “Culture III.” “We feel like we gonna lead the pack with this album.”
  
  “Culture III,” which comes after a few years of members Offset,Quavoand Takeoff pursuing solo projects, is out Friday.
  
  Of course, Gwyneth Paltrow is a cool mom.
  
  The mother of a 17-year-old daughter, Apple Martin, and 15-year-old son, Moses Martin, recently modeled earrings for her brandGoop.
  
  “Every year on Apple’s birthday, we get a new piercing – it’s this little tradition we have,” acaption of the photostated. “She was a big inspiration for this collection and helped me refine the designs. She’ll definitely be ‘borrowing’ her namesake earrings.”
  
  Annual piercings and naming jewelry after your daughter? You win, Paltrow.
  
  Chris Harrison has learned the hard way that talking about race can be tough.
  
  The “Bachelor” franchise host sounded like he believed he would return to work after some time off followingremarks he made that were deemed racially insensitiveby some.
  
  But it was confirmed to CNN Tuesday thatHarrison is officially outafter serving as a host for “The Bachelor” and its successful spinoffs since 2002.
  
  Harrison announced back in February that he was “stepping aside” from the show following an interview in which he defended Rachael Kirkconnell, a “Bachelor” contestant who was photographed at an antebellum plantation-themed fraternity formal in 2018.
  
  Issues of raceand racism are rarely – no pun intended – black and white. But the “Bachelor” franchise has some evolving to do to earn its roses.
