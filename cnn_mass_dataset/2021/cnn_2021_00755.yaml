  Afghanistan is not the only test. Central America, Haiti, Syria, Libya, and countries around the world are currently facing large-scale human rights crises and need our help. The climate emergency is already fueling extreme weather events, and climate migration is sure to be one of the defining political challenges of the coming century. We should be leading a global migration compact, which would provide global funding to address the migrant crisis and establish clear benchmarks for each nation to take in refugees (I have introduced abillon just this.) I’m glad that the President allocated$500 millionto help resettle Afghans, but we must do more. The reconciliation package should includefunding to address this. And we must live up to our promises to increase the refugee cap.
  
  That is the choice our country faces right now. We owe it to the Afghan who risked his life to fight alongside the United States. We owe it to the little girl huddled in a refugee camp, wondering if she will have a shot to ultimately become not just a guest, but an American.  I know, because that little girl was me.
