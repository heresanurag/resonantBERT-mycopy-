id: cnn_2021_00628
title: "USC issues apology after ‘offensive chant’ during football game"
date: "2021-11-29"
section: "US"
url: "https://www.cnn.com/2021/11/29/us/usc-chant-apology-byu/index.html"
content: |
  The University of Southern California (USC) issued a public apology after an ‘offensive chant’ was made from USC’s student section during Saturday night’s football game against Brigham Young University (BYU).
  
  “The offensive chant from our student section directed towards BYU during the football game last night does not align with our Trojan values,” USC’s athletic department said in a tweet Sunday. “It was distasteful and we apologize to the BYU program.”
  
  USCwas not able to provide any details on why the apology was issued or what the chant was.
  
  “I did not hear the chant but I know it does not reflect the Trojan family that I’ve come to know and love,” USC defensive line coach Vic So’oto said in a tweet.
  
  So’oto, who played on BYU’s football team for four years, apologized and tagged BYU’s head coach Kalani Sitake and athletic director Tom Holmoe.
