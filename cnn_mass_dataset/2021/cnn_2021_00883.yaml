title: "Ma’Khia Bryant’s funeral was filled with calls to protect Black girls"
date: "2021-04-30"
section: "US"
url: "https://www.cnn.com/2021/04/30/us/makhia-bryant-columbus-ohio-funeral/index.html"
content: |
  Ma’Khia Bryantloved styling her curly hair in front of her camera phone and posting about it on TikTok.
  
  “This was a child that had so much love in her heart,” her cousin Don Bryant said at her funeral on Friday. “A smart girl, capable, and deserving of fulfilling all her hopes and dreams in this world.”
  
  Ma’Khia, 16, died April 20 during an encounter with aColumbus, Ohio, police officer at her foster home. The mother of Breonna Taylor, elected officials and clergy members joined her family on Friday to mourn her passing and call for systemic justice.
  
  “Say her name as a reminder of the loving kind person she was,” Don Bryant said on behalf of the family. “Say her name as a reminder that change doesn’t just happen by offering words or talking about it.”
  
  “What are you doing to make sure no more Ma’Khias are taken from us?” he added.
  
  Friday’s service marked at least the third funeral the First Church of God handled for the families of Black people killed by police. The church had hosted funerals forAndre Hill, 47, in January andCasey Goodson Jr., 23, in December.
  
  Ma’Khia’s death happened about 30 minutes before the verdict was delivered in the trial of the former Minneapolis police officer who knelt on George Floyd’s neck.
  
  Some of her family members were dressed blue – Ma’Khia’s favorite color – while ushers wore large blue roses and blue flowers sat on top of her casket.
  
  Emmanuel Anthony, the principal at The Academy for Urban Scholars High School who was Ma’Khia’s middle school principal, presented Ma’Khia’s mother with an honorary high school diploma for her daughter.
  
  “Did you know that Ma’Khia loved getting good grades in school? That she was a very intelligent young girl?” her cousin Don Bryant said.
  
  She was attending the 11th grade and was on the honor roll, according toher obituary.She had a great sense of humor, always wanted to make everyone laugh and enjoyed cooking.
  
  “My baby was an innocent, talented, bubbly, loving teenager,” her mother, Paula Bryant, told reporters earlier this week.
  
  One of her aunts told reporters on Wednesday that Ma’Khia had a “vibrant personality” and her grandmother, Jeanene Hammonds, recalled how Ma’Khia used to sing while they were driving.
  
  The Rev. Jamal Harrison Bryant, who led the funeral forFreddie Gray, called on mourners to fight to stop racism and called for police reform.
  
  “Do you know when we’re going to get Ma’Khia back? We’re going to get Ma’Khia back when police training changes,” the reverend said. “We’ll get Ma’Khia back when White officers don’t see Black skin as a threat to them.”
  
  He added, “We’ll get Ma’Khia back when we learn how to de-escalate and learn how to talk and learn how to communicate. We’ll get Ma’Khia back when we value one another and respect one another.”
  
  Earlier this week, Columbus Mayor Andrew Ginther and City Attorney Zach Klein sent a letter to the US Department of Justice asking the agency to review the city’s police department practices,CNN affiliate WBNSreported.
  
  “We believe this will help provide an environment that fosters trust between residents and police — and will ultimately lead to a Columbus that is safer for everyone,” Ginther said about the letterin a tweet.
  
  Ma’Khia was in foster care at the home where the shooting took place.
  
  Angela Moore, the woman who cared for Ma’Khia in foster care, has said two of her former foster children were visiting to celebrate her birthday when the young women and Ma’Khia began arguing over a messy home and unmade bed. The argument led to a fight that ended with the police shooting.
  
  Ma'Khia Bryant argued about housekeeping before fatal police shooting, foster parent says
  
  Police body camera video of the shooting shows the officers exiting their car and seeing Ma’Khia lunge at another young woman with a knife outside the house. Officials in Columbus have urged residents to await the facts in the investigation.
  
  Authorities identified the officer who fired the shots as Nicholas Reardon, who was hired in December 2019. The officer is off street duty pending an investigation.
  
  The attorney for the girl’s family said Wednesday that “the many systems responsible for Ma’Khia’s protection failed her.”
  
  Franklin County Children’s Services has said Bryant was a foster child in the county’s care, CNN has reported.
  
  “Without these failings, Ma’Khia Bryant would still be with us today,” attorney Michelle Martin said in a statement.
  
  Martin told reporters on Wednesday that she intends to conduct an investigation into why the police officer “chose lethal force” and every agency that had a chance to prevent the girl’s death.
  
  “If you aren’t angry about why this happened, If you’re not angry about why this continues to happen, then you are truly the problem,” Martin said.
  
  “We have to protect our children, they are our core. We have to do more, Ma’Khia deserves more,” she said. “Ma’Khia deserves justice.”
