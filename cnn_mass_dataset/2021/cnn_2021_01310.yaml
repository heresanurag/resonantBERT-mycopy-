  So, is Israel headed for yet another election? It’s impossible to say right now. After having consulted with all parties next week, the president of Israel will designate the candidate who seems to have the best chance of forming a government.
  
  We are most likely in for a prolonged period of coalition negotiations, deal-making and horse trading to see whether Netanyahu or his putative opposition can put together a coalition. If not,in the words ofan Israeli columnist reflecting the spirit of the Passover season, a fifth election – sadly for most Israelis – looms like the 11th plague.
