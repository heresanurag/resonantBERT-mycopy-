content: |
  The Colonial Pipeline is up and working again, but gas shortages – and the ensuing gas panic –probably won’t be resolvedfor a few more days.
  
  Here’s what you need to know toGet Up to Speed and On with Your Day.
  
  (You can also get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  People in the US who are fully vaccinated against Covid-19do not need to wear masks or practice social distancing indoors or outdoors, except in certain circumstances, according to new guidance from the CDC. This news is a game changer, and somestates and businesses are already reconsideringtheir mask policies in response. However, experts say there’s stilla long road ahead for those who haven’t been vaccinated, and questions remain for people with compromised immune systems or households with unvaccinated children or other members. Meanwhile, the fate of the Tokyo Olympic Games is still in the air. A doctor’s union in Japan hasurged the government to cancel this summer’s competitions, citing the country’s low vaccination rate.
  
  The state trial for the three former Minneapolis police officers accused of aiding and abetting the murder of George Floydhas been postponed until next March so a federal trialcan take place first. J. Alexander Kueng, Thomas Lane and Tou Thao all have pleaded not guilty to two state charges. A federal grand jury last week indicted all of the officers, including Derek Chauvin, in connection with Floyd’s death, alleging they violated his constitutional rights. Meantime, the Supreme Court is tackling a different case that could providemore guidance on the legal doctrine of qualified immunitythat shields law enforcement from some liability. The case was brought by the parents of Nicholas Gilbert, who say their son died in police custody in St. Louis after officers put their weight on his back as he was shackled facedown.
  
  The Biden administration is looking toidentify vulnerable migrant families in Mexico and admit themto the US instead of expelling them under a Trump-era border policy known as Title 42. The policy was enacted at the start of the pandemic, and critics say it puts migrants and asylum-seekers in harm’s way, exposing them to potentially dangerous conditions in Mexico. Because of Title 42, many migrant families have opted to separate from their children, since the rule does not apply to minors. Two large emergency intake sites in Texas that have sheltered unaccompanied children during this year’sinflux of arrivals will close by early June, marking some of the first closures as the number of kids in border facilities drops.
  
  China isconflicted over the US troop withdrawal in Afghanistan. At a forum of Central Asian leaders this week, China’s foreign minister said Beijing supports the withdrawal of foreign troops from Afghanistan. But a spokesperson for China’s foreign ministry earlier had criticized the decision, calling it abrupt and saying it will lead to instability. China supported the 2001 invasion of Afghanistan, even though it typically dislikes foreign intervention. However, Afghanistan under Taliban rule had become a source of instability on China’s border. Now, China is facing two possibilities: The US withdrawal could mean greater Chinese military engagement in the region, or it could once again plunge Afghanistan into war and chaos, leaving China off-balance.
  
  A top House Foreign Affairs Committee member is calling on the Biden administrationto enact sanctions in response to the ongoing human rights abusesin the Tigray region of Ethiopia.A CNN investigation found that soldiersfrom neighboring Eritrea were blocking critical humanitarian aid to starving and wounded civilians, sometimes even disguising themselves in old Ethiopian military uniforms. Thousands of civilians are believed to have been killed since Ethiopian Prime Minister Abiy Ahmed launched a military operation in November against the region’s ruling party, the Tigray People’s Liberation Front. Both Ethiopian and Eritrean forces have been accused of enacting mass killings and widespread sexual violence.
  
