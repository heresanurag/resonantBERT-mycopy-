title: "An Apple II manual signed by Steve Jobs just sold for nearly $800,000"
date: "2021-08-22"
section: "US"
url: "https://www.cnn.com/2021/08/22/us/steve-jobs-autograph-manual-trnd/index.html"
content: |
  If you thought Apple computers were expensive, you haven’t seen what their manuals go for.
  
  Boston-based RR Auction on Thursday sold anApple II manualsigned by the company’s late co-founder Steve Jobs for a whopping $787,484.
  
  The computer’s 196-page manual is signed and inscribed opposite the Table of Contents: “Julian, Your generation is the first to grow up with computers. Go change the world! steven jobs, 1980.”
  
