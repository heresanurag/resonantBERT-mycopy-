  _August 25, 2021_
  
  _The Covid pandemic is our first topic today: We’re discussing the Delta variant, a formal vaccine approval, controversies concerning mandates, and the virus’ impact on global shipping. We’re also reporting on deadly flooding in Middle Tennessee and the general dangers posed by flash floods. And a feature on a controversial type of pizza invites a hungry debate._
  
