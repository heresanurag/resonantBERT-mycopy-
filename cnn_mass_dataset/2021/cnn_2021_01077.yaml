title: "San Francisco declares a water shortage emergency and urges residents to cut usage"
date: "2021-11-24"
section: "US"
url: "https://www.cnn.com/2021/11/24/us/san-francisco-water-shortage-emergency/index.html"
content: |
  San Francisco declared a water shortage emergency and is calling for a 10% reduction across its regional system,Mayor London Breed announcedTuesday.
  
  “With California still experiencing devastating drought and the uncertainty around this rainy season, we need to make tough decisions that will ensure that our water source continues to be reliable and dependable for the future,” Breed said.
  
  “Year after year, San Franciscans step up to conserve our most precious resource, resulting in one of the lowest water usage rates in California, and during this critical time, I know that our City will once again meet the call to reduce water use.”
  
  TheSan Francisco Public Utilities Commission (SFPUC)unanimously approved the emergency measure, which applies to all 2.7 million customers in Alameda, Santa Clara, San Mateo, and San Francisco counties, according to the mayor’s office.
  
  California is under a statewide drought emergency as it sees its driest year in nearly a century
  
  Breed in a news release urged San Franciscans to reduce water usage by taking voluntary steps “such as fixing leaky toilets, installing low-flow fixtures, reducing outdoor irrigation, and receiving water usage audits from SFPUC professionals.”
  
  Gov. Gavin Newsom issued a statewide drought emergency proclamationlast month. The proclamation allowed the governor’s office to help fund response to the drought and the delivery of water.
  
  California has had a rough year,suffering through high temperatures and low precipitation. Both are factors, when combined with the existing climate change crisis, that contributed to a devastating wildfire season. The state is experiencing its worst drought since the late 1800s, as measured by both lack of precipitation and high temperatures, the governor’s office said.
  
  The SFPUC declaration allows the agency to access water reserves and resources during an emergency. It also includes a temporary drought surcharge for customers of up to 5% on their bills which will go into effect April 1, 2022. The average residential customer surcharge is estimated at about $6 per month if they make no changes in water use.
  
  “We are in a drought with far-reaching consequences, and it has become clear we all need to do even more to address it,”SFPUC General Manager Dennis Herrerasaid. “San Franciscans have been doing their part and have some of the lowest water usage in the state. This emergency water shortage declaration will help all of our customers pull together and move in the same direction.”
  
