title: "LAPD officer who sent a George Floyd Valentine’s Day-themed image is cleared of wrongdoing"
date: "2021-07-07"
section: "US"
url: "https://www.cnn.com/2021/07/07/us/lapd-george-floyd-image/index.html"
content: |
  A Los Angeles Police Departmentofficer who was under investigation for his alleged connection to a Valentine’s Day-themedimage of George Floydhas been cleared of wrongdoing, according to the LAPD.
  
  The officer, who alerted his superior to the image of Floyd that said, “You take my breath away” was found not guilty by a civilian review board, the department and his attorney said Tuesday.
  
  Floyd diedafter aformer Minneapolis police officer kneeledon his neck for more than nine minutes during an arrest in May of 2020. His deathset off months of protests for racial injusticeand calls for police reform. Derek Chauvin was found guilty andsentenced to more than 22 yearsin prison in June in Floyd’s death.
  
  LAPD launches internal investigation into Valentine-themed image with George Floyd and phrase 'You take my breath away'
  
  “The employee who was directed to a board of rights for sharing the George Floyd meme was found Not Guilty,” the LAPD said in a statement. “In this case, the facts and evidence were heard by a board that was comprised of civilian board members who are selected from the community.”
  
  The law enforcement officer has not been publicly identified. The LAPD would not specify what department policy the officer was found not guilty of violating, calling it an administrative internal investigation.
  
  Leslie Wilcox, an attorney for the officer, called the decision “absolutely correct.”
  
  “The officer found the meme offensive, he did not create the meme, nor did he distribute it beyond notifying a commanding officer of its existence,” Wilcox said in a statement to CNN. “Both the commanding officer who received the officer’s communication, as well as the Assistant Chief who oversaw the investigation, agreed that the officer’s single notification of a commanding officer was in no way improper. This decision shows that the Board of Rights process works and that the civilian panel is able to put aside political pressure and focus on the evidence in front of them in making objective decisions.”
  
  The union that represents LAPD officers declined to comment, citing confidentiality restrictions.
  
  When word of the meme making light of Floyd’s killing surfaced earlier this year, the union called the image abhorrent and demanded those responsible be held accountable.
  
  “If that image was created, ‘liked,’ or shared by a member of the LAPD, the Chief of Police must act swiftly to hold those individuals accountable,” the Los Angeles Police Protective League said at the time. “There must be zero tolerance for this behavior in our profession, and any police officer who feels the need to be part of any online group that engages in, promotes, and/or celebrates this type of activity should quickly rethink their career choice because they clearly don’t have the judgment, nor temperament, to be a member of law enforcement.”
  
  When the image was first brought to light in February, the LAPD said in aseries of tweetsthat it was launching an internal investigation and had “have zero tolerance for this type of behavior.”
  
  The department’s internal affairs officials said at the time they would immediately interview personnel about the post, including when and where they saw it and who was responsible, an official told CNN at the time.
  
  TheLos Angeles County District Attorney George Gascónalso said in February that his office would review the incident to “determine if the integrity of any of our cases may have been compromised by biased police work.”
  
  Tensions rise in policing talks as negotiations hit a delicate phase
  
  “Celebrating the murder of a Black man at the hands of police demonstrates a profound absence of humanity,” Gascón said in astatement. “The mock valentine underscores the highly problematic, and frankly, racist perceptions that pervade the law enforcement culture regarding the communities we are sworn to protect and serve.”
  
  Following the news of the image, attorney Ben Crump, who has represented the Floyd family, said the family was furious and devastated by the news of the image’s circulation and called for the immediate termination of the person responsible for it.
  
  “The Floyd family is understandably outraged. This is beyond insult on top of injury – it’s injury on top of death,” he said in the statement after the image was first reported. “The type of callousness and cruelty within a person’s soul needed to do something like this evades comprehension – and is indicative of a much larger problem within the culture of the LAPD.”
  
  “We demand that everyone who was involved is held accountable for their revolting behavior and that an apology be issued to the family immediately,” he added.
  
  It is unclear if any apology was ever issued by the person responsible.
