  In short, the Kremlin’s idea of “democracy” is one in which opposition voices are not heard and members of the opposition are not able to convene or protest. That’s not democracy. It’s authoritarian rule. Western leaders should say so.
  
  The Kremlin may hope to stymie the pro-democracy movement by beheading it. Every effort should be made to save Navalny. But Western leaders should make clear that they will also call out the steps taken to crush his movement and to destroy democracy in Russia. We can only hope that it would be enough to spare Navalny’s life.A previous version of this article incorrectly described a 2014 law on protests in Russia.
