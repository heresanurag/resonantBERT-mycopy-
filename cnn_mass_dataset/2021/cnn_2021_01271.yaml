title: "Judge postpones Ghislaine Maxwell’s sex-trafficking trial until the fall in light of new charges"
date: "2021-05-04"
section: "US"
url: "https://www.cnn.com/2021/05/04/us/maxwell-trial-postponed/index.html"
content: |
  A federal judge on Monday agreed to delay until the fall the sex-trafficking trial ofGhislaine Maxwellto provide the defense team more time to prepare for the additional charges against the former girlfriend of the late Jeffrey Epstein.
  
  Maxwell faces sex-trafficking charges for allegedly recruiting and grooming a 14-year-old girl to engage in sex acts with Epstein.
  
  Federal prosecutorsfiled the charges in March, alleging that Maxwell and Epstein recruited the underage girl to perform massages that became sexual at Epstein’s Palm Beach, Florida, residence. In exchange, they paid her hundreds of dollars in cash for each encounter, prosecutors have alleged.
  
  Maxwell, 59,pleaded not guiltyto the sex trafficking charges.
  
  The trial was set to begin in July. That changed Monday when US District Judge Alison Nathan postponed it for the fall.
  
  “Such an adjournment would plainly give the defense team sufficient time to prepare for trial in light of the additional charges contained in theS2 indictmentwhile also ensuring that the trial proceeds without undue delay,” Nathan said.
  
  Nathan ordered both parties to meet and discuss a new trial date by May 10.
  
  Maxwell has been jailed without bailsince July because Nathan determined that her wealth made her a flight risk. She’s being held at New York’s Metropolitan Detention Center.
  
  Last July, Maxwell was charged byNew York federal prosecutorswith conspiracy and enticing minors to travel to engage in illegal sex acts, and the transportation of minors to engage in criminal sexual activity for allegedly grooming and recruiting underage girls from 1994 through 1997.
  
  Federalprosecutors charged Epsteinwith running a sex trafficking operation between 2002 and 2005 at his homes in Manhattan and Palm Beach. He pleaded not guilty and died in prison in August 2019 while awaiting trial.
  
  A medical examiner ruled Epsteindied of suicide by hanging, but a doctor hired by Epstein’s family to conduct an independent autopsy has disputed that conclusion.
