id: cnn_2021_01964
title: "Nike postpones release of Travis Scott’s latest sneaker"
date: "2021-11-16"
section: "Business"
url: "https://www.cnn.com/2021/11/16/business/nike-cactus-jack-sneaker-delayed-release/index.html"
content: |
  Nike has postponed the release of its latest sneaker collaboration with Travis Scott following the Astroworld concert tragedy thatleft 10 people dead.
  
  “Out of respect for everyone impacted by the tragic events at the Astroworld Festival, we are postponing the launch of the Air Max 1 x Cactus Jack,” Nikesaid on its website Monday.
  
  The sneaker, officially known as the ‘Nike x Travis Scott Air Max 270 ‘Cactus Trails,’” has several designs. The latest was meant to be released in December and a rescheduled release date was not announced.
  
  The death toll from thechaotic concert in Houston rose to 10following the death of a 9-year-old boy Sunday from injuries sustained at the festival.
  
  Earlier this month, hundreds of concertgoers were crushed, trampled and struggled to breathe as the packed crowd surged toward an outdoor stage when rapper and headliner Scott started performing.
  
  A slew of lawsuits have been filed against Scott, the festival organizer and others by the families of the deceased and injured. A coalition of Houston lawyers announced last week they represent more than 200 victims who attended the festival and have filed more than 90 lawsuits in Harris County Civil Court againstpromoter Live Nation and othersinvolved in the fatal event.
