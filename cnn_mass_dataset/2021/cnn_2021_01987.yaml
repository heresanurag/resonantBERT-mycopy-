  Iran wantsan immediate endto all sanctions before it begins any return to compliance with the old agreement. Israelwants sanctions to force Iran to its knees. Neither remotely approaches a workable formula.
  
  So, this is by most standards simply the“Worst of Times.”All that can be hoped is that a calm, reasonable position from Biden and his accomplished Secretary of State Antony Blinken, who haveexpressed willingnessto lift some sanctions in return for an expanded agreement, will find a way of helping both sides appreciate the bad hand the losers will be holding.
