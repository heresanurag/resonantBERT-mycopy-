title: "Jennifer Aniston defends staying away from the unvaccinated"
date: "2021-08-06"
section: "Entertainment"
url: "https://www.cnn.com/2021/08/06/entertainment/jennifer-aniston-unvaccinated-backlash/index.html"
content: |
  Jennifer Aniston stirred some feelings when sherecently saidshe has “lost a few people in my weekly routine who have refused or did not disclose” whether they had been vaccinated against Covid-19.
  
  Aniston made the remark toIn Style, and almost immediately folks on social media were offering their opinions.
  
  On Thursday she posted about some of the critical comments on the Instastories ofher verified Instagram account.
  
  The “Friends” star posted one person’s comment that read, “But if she’s vaccinated she’s protected correct? Why be worried about unvaxed around her?”
  
  Aniston responded with “Because if you have the variant, you are still able to give it to me.”
  
  “I may get slightly sick but I will not be admitted to a hospital and or die,” she wrote. “BUT I CAN give it to someone who does not have the vaccine and whose health is compromised (or has a previous existing condition) — and therefore I would put their lives at risk.”
  
  “THAT is why I worry,” Aniston concluded. “We have to care about more than just ourselves.”
  
  The Covid-19 can still be transmitted to those who have been vaccinated, but the vaccine protects against serious injury or death.
  
  Last year Aniston also caused backlashafter she shared a Christmas ornament which read “Our first pandemic 2020.”
