content: |
  The first thing that comes to mind when I think of Texas Republican Sen. John Cornyn is either a) his white hair b) his preference for cowboy boots or c) “Big John.”
  
  It is not “Congress’ most prolific tweeter.”
  
  And yet, that’s exactly what Cornyn is, according to ananalysis done by Hamilton Place Strategiesof the first three months (and 157,757 tweets!) of social media activity by members of Congress.
  
  Cornyn, in fact, ran circles – tweeted circles? – around his competition.  Between January 1 and March 31, Cornyn sent a whopping2,198 tweets, more than double the second-place Republican finisher (Arizona Rep. Andy Biggs at1,006 tweets.)
  
  The most active tweeter on the Democratic side was Pennsylvania Rep. Dwight Evans (no, not theRed Sox great) who sent1,740 tweetsover the first three months of 2021.
  
  Interestingly, Cornyn was one of six senators in the top 10 GOP tweeters. Only Chuck Schumer, who sent the 10th most tweets on the Democratic side, broke into the top 10 for congressional Democrats.
  
  But it’s the sheer number of tweets from Cornyn that stand out in the HPS analysis. AsTexas Monthly noted earlier this weekCornyn’s pace breaks down to roughly one tweet for every hour of the day.Everyday between January 1 and March 31.
  
  In each episode of his weekly YouTube show, Chris Cillizza will delve a little deeper into the surreal world of politics. Click to subscribe!
  
  And what is he tweeting? Again,Texas Monthly provides some insight:
  
  “Cornyn’s tweets come in a variety of forms: the personal (remember his brisket?), thecryptic(oftenunattributed excerptsfrom articles he’s read), and the snarky (“It’s summer, Chuck,” he wrote in response to a 2019 tweet from Senate majority leader Chuck Schumer noting that July was the hottest month ever recorded on the planet). Sometimes Cornyn wants to push a policy position such as border reform, sometimes he wants to let you into his life, andsometimes he just wants to make fun of his rivals with a beer.”
  
  What’s clear is that Cornyn expects other politicians to meet the high bar he has set for tweeting. Herecently made national headlineswhen he quoted a Politico story that said President Joe Biden’s tweets were “limited” and “unimaginably conventional,” adding: “Invites the question: is he really in charge?”
  
  The Point: Cornyn clearly loves Twitter. But maybe he loves it too much?
