title: "Minneapolis Police Chief Medaria Arradondo, whose tenure included George Floyd’s murder, will retire in January"
date: "2021-12-06"
section: "US"
url: "https://www.cnn.com/2021/12/06/us/minneapolis-police-chief-retiring/index.html"
content: |
  Minneapolis Police Chief Medaria Arradondo, whose tenure will be remembered for his handling of theGeorge Floyd murderinvestigation, announced Monday that he will retire in mid-January.
  
  “After much personal reflection and thoughtful discussions with my family and Mayor Frey, I have made the decision that I will not be accepting a new term as chief of the Minneapolis Police Department,” Arradondo said.
  
  He was the city’s first Black police chief, appointed in 2017.
  
  Minneapolis police chief vows to reform police department
  
  Arradondo was chief whenFloyd died while in police custodyon May 25, 2020. Video of Floyd’s death ignitedprotests around the US and worldas protesters called for reform in policing and law enforcement treatment of Black people.
  
  Arradondo said Monday his decision to retire was based on time and not Floyd’s murder.
  
  “The impacts of Mr. [George] Floyd’s killing certainly will stay with me forever, but that did not render to my decision at this point,” Arradondo said. “My decision at this point, quite frankly … was just that it’s time. Thirty-two years of being able to give back to a city that I was born and raised is a blessing.”
  
  Video of the incident that led to Floyd’s death showed former officer Derek Chauvin impassively kneeling on the 46-year-old Black man’s neck and back while he was handcuffed and lying prone in the street for more than nine minutes, gasping for air and telling Minneapolis officers, “I can’t breathe.”
  
  In June 2020,Arradondo told CNNthat a meeting with George Floyd’s family was “gut-wrenching” under the circumstances.
  
  “I looked them in the eye and I said, ‘I’m sorry’ and said ‘their brother’s death is not in vain,’” he said. “The grace and the love that they showed, they hugged me and we hugged.”
  
  Arradondo called Floyd’s death at the time a “murder” and fired four officers, saying all involved in Floyd’s death bear the same responsibility.
  
  Chauvin was convicted in Aprilon state murder charges. He plans to appeal that conviction.
  
  Arradondotestified at Chauvin’s trialthat the kneeling was a violation of the policies around de-escalation, objectively reasonable use of force and requirement to render aid.
  
  Minneapolis police chief says all four officers involved in George Floyd's death bear responsibility
  
  “Once Mr. Floyd had stopped resisting, and certainly once he was in distress and trying to verbalize that, that should have stopped,” Arradondo testified.
  
  Chauvin and former officers Tou Thao, J. Alexander Kueng and Thomas Lane have pleaded not guilty tofederal civil rights chargesstemming from Floyd’s death.
  
  The state trial forThao, Kueng and Lane, accused of aiding and abetting the murder of Floyd, has been postponed until March 2022.
  
  Mayor Jacob Frey on Monday thanked Arradondo for his service.
  
  “Throughout his time within the MPD, he’s been unabashed about his commitment to truth, to transparency, and to justice,” the mayor said.
  
  Frey said he learned of Arradondo’s decision to retire this morning and would announce an interim chief in the coming days.
  
  The recruiting process will include a national search as well, according to the mayor. A police chief’s term with the Minneapolis Police Department is three years.
  
  Minneapolis rejects policing overhaul, CNN projects
  
  Despite a“defund the police”measurefailing at the ballot this year, Frey and Arradondo announced several key changes to the department, according to a recent report, including an overhaul to its use of force policy, a new policy on “no-knock” warrants, and a new requirement to report instances of police de-escalation attempts.
  
  Arrandondo, who grew up in Minneapolis, said he’s “been blessed beyond measure to have served the people of this truly wonderful city.”
  
  “After 32 years of service, I believe that now is the right time to allow for new leadership, new perspective, new focus, and new hope to lead the department forward in collaboration with our communities,” the chief said.
  
  Asked if he plans to run for public office – including governor – Arrandondo said no.
  
  “I have utmost respect for those leadership positions, political leadership positions, but no. I’m open to exploring – not the governor’s position – I’m open to exploring what my next chapter will be. But I’ve not entertained politics at all,” he said.
