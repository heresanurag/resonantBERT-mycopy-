title: "Transgender soccer referee makes Israeli sports history"
date: "2021-05-04"
section: "Football"
url: "https://www.cnn.com/2021/05/04/football/sapir-berman-referee-transgender-israel-spt-intl/index.html"
content: |
  Sapir Berman made sports history on Monday, officiating at a soccer match in Israel’s Premier League for the first time since coming out astransgender.
  
  “This is the first step in a long and wonderful journey. Sapir, we are proud to do it with you,” theIsrael Football Associationtweeted as she took the field for the contest between Beitar Jerusalem and Hapoel Haifa.
  
  At a news conference last Tuesday in which she publicly announced her transition, Berman, at 26 already a top referee in Israel’s leading soccer league, said she had always seen herself as a female, even at a young age.
  
  She told reporters that players had already begun using the feminine form of words in Hebrew when addressing her.
  
