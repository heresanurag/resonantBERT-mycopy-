  “The reality was the moon program was an attempt to change the subject,” says Roger Launius, NASA’s former chief historian and author of “Apollo’s Legacy.”
  
  One month earlier, in amemofrom Kennedy to Johnson on April 20, the president asked his VP if they had a “chance of beating the Soviets” by putting a lab in space, orbiting the moon, or even landing on it. “Is there any other space program which promises dramatic results in which we could win?” Kennedy wrote.
  
  “He needed to do something dramatic,” says Fredrik Logevall, professor of history at Harvard University. Kennedy and his team decided the drama would come from a lunar landing. “This was a weighty proposition, and they spent a lot of time on (the speech),” he adds. “Ted Sorensen was the person who did most of the drafting.”
  
  Copies of the printed speech pages JFK had on the podium, including his handwritten notes.
  
  Ted Sorensen was one of JFK’sclosest advisersand speechwriters, making the pair “one of the great political partnerships of the 20th century,” Logevall says. “The two of them were so in sync … they paid a lot of attention to other people’s speeches; they paid a lot of attention to how historical figures had addressed the populace. And I think Kennedy’s speeches clearly benefited from this.”
  
