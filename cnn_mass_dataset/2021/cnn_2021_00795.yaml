title: "Facebook says decision on whether Trump ban will be overturned coming Wednesday"
date: "2021-05-03"
section: "Tech"
url: "https://www.cnn.com/2021/05/03/tech/facebook-oversight-board-trump/index.html"
content: |
  The Facebook Oversight Board will announce its long-anticipated decision on the fate of former President Trump’s Facebook account at 9 a.m. ET on Wednesday, it announced Monday morning.
  
  The Board said last month that it had received 9,000+ public responses concerning Trump’s indefinite suspension from Facebook and Instagram.
  
  Facebook(FB)suspended Trump’s account following the Jan. 6 Capitol riots and later referred that decision to the court-like Oversight Board, an independent body which has the power to reverse Facebook(FB)content decisions and set precedent for the company.
  
  Trump wassuspended“indefinitely” from Facebook and Instagram on Jan. 7, a day after his supporters stormed the Capitol in a bid to overturn the 2020 election results.TwitterandYouTubetook similar steps, citing an ongoing risk of violence and incitement.
  
  “We believe the risks of allowing the President to continue to use our service during this period are simply too great,” Facebook CEO Mark Zuckerberg wrote at the time.
  
  Later that month, Facebook asked the Oversight Boardfor a rulingon whether to let Trump’s suspension stand, saying the significance of the matter warranted its independent review.
