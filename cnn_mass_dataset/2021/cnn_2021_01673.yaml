title: "A rare species thought to be extinct is clinging to survival, study finds"
date: "2021-08-02"
section: "World"
url: "https://www.cnn.com/2021/08/02/world/chameleon-endangered-species-found-study-scn/index.html"
content: |
  A species of tiny chameleons presumed to be extinct due to deforestation has been found, but it is clinging to survival.
  
  Up to only 5.5 centimeters (2.2 inches) long, the critically endangered Chapman’s pygmy chameleon (Rhampholeon chapmanorum) is native to the low-elevation rainforest of the Malawi Hills in southern Malawi, a country in southeastern Africa, according toa studypublished Monday in Oryx—The International Journal of Conservation.
  
  First describedby herpetologist and author Colin Tilbury in 1992, Chapman’s pygmy chameleon is one of the world’s rarest chameleons.
  
  “They are mostly brown but they can change to quite beautiful blues and greens with little dots all over them and that’s probably a way of communicating with each other,” said the study’s lead author Krystal Tolley, a professor and research leader in the Leslie Hill Molecular Ecology Laboratory at the South African National Biodiversity Institute, ina statement. “Other chameleon species can be hysterical, hissing and biting, but pygmy chameleons are gentle and just beautiful.”
  
  Chameleons’ extinction risk is much higher than the average of 15% for the reptile order they belong to, with 34% of chameleon species classified as threatened and 18% near threatened, the authors wrote. Most of the threatened species areforest specialists, which means they can only live in a specific type of environment.
  
  When Tilburyfirst describedpygmy chameleons in 1992, previous researchers noticed signs of substantial deforestation in Malawi Hills, wrote the authors of the current study. To protect the species from further harm, 37 Malawi Hills-based pygmy chameleons were released into a forest patch about 95 kilometers (59 miles) north in Mikundi, Malawi, in 1998, according to the study. When Tilbury assessed the release site in 2001 and 2012, chameleons were still there.
  
  Because pygmy chameleons are intolerant of transformed areas and Tolley didn’t discover any pygmy chameleons duringrelated assessment workin 2014, they were thought to have possibly become extinct. Her work led the International Union for Conservation of Nature to list the chameleons as critically endangered on itsRed List of Threatened Species. Using historical (1984-1985) and recent (2019) Google Earth satellite imagery of the Malawi Hills and another geographical information system, the authors of the current study estimated about 80% of the Malawi Hills forest had been destroyed from 1984 to 2019.
  
  At night on the trails of three accessible forest patches in 2016, the authors walked, using torchlights to find and record chameleons.
  
