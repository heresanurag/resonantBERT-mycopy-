  A growing number of places and groupsare considering vaccine or mask mandatesas Covid-19 cases continue to rise. California will require all state employees and health care workersto provide proof of vaccination status or get regular testing. New York City has a similar planfor its entire municipal workforce, including police officers and teachers. More than 50 major medical and health groups have issued a joint statementcalling for all health care employers to mandate employees be vaccinated. Is it legal for places to impose such requirements? In short, yes. Justice Department lawyers have determinedfederal law doesn’t prohibit public agencies and private businesses from requiring Covid-19 vaccines. Experts say if vaccination rates remain stagnant, the US could see as many as200,000 cases a day in the coming weeks.
  
  The House select committee charged with investigating the January 6 insurrection will hold its first public hearing today. The committeewill hear testimony from four police officerswho were on the front lines the day of the attack. This is the first big public step for the committee’s investigation, which has seen strong GOP pushback. Currently, Republican leaders are hoping to zero in on security failures from the day of the attack to take attention away from former President Donald Trump’s role.Only two Republicans, Reps. Liz Cheney and Adam Kinzinger, are on the committee. Their fellow party members are trying to chip away at their credibility to zing them for participating and undermine the committee’s mission in general.
  
  President Joe Biden announced plans toformally conclude the US combat mission in Iraq by the end of the year, winding down another prolonged US military engagement. Unlike the troop withdrawal in Afghanistan, this decision was made with Iraq’s urging, and Biden made the announcement alongside Iraqi Prime Minister Mustafa al-Kadhimi. This agreement will also not result in a troop withdrawal. Rather, the US and Iraq are expected to announce the US mission will fully shift to an advisory role. Meanwhile, White House officials have told lawmakers they will need $1 billion in emergency funds as the US worksto evacuate and accommodate Afghan translators and other personnel who worked for the US in Afghanistan, and are now trying to leave the country amid the last phases of troop withdrawal there.
  
  The first person to be tried under Hong Kong’s controversial national security lawfaces life in prison after being found guilty of inciting secession and terrorism. This trial was seen as a litmus test for how the law will be implemented and interpreted in court, and the landmark ruling will likely have profound implications for the city’s legal system. The 24-year-old was found guilty of terrorism for crashing his motorcycle into a group of police officers last year. He was also found guilty of a second charge, incitement to commit secession, for carrying a large black banner emblazoned with the popular anti-government protest slogan “Liberate Hong Kong, revolution of our times.”
  
  A cache of Internal Justice Ministry documents obtained exclusively by CNNreveal death threats and other roadblocks faced by those investigating the assassination of Haitian President Jovenel Moiseearlier this month. Multiple Haitian officials have received death threats since their investigation began, documents show. Some of these officials have gone into hiding. Sources close to the investigation also describe unusual restrictions and difficulty accessing crime scenes. Potential key witnesses, like presidential guards who were present at the time of the assassination, were allowed to leave the scene without being interviewed. The inconsistencies raise several questions: Is there a motive behind these obstacles, or are they consequences of Haiti’s underfunded justice system? So far, there has been no public announcement of formal charges against any suspects in the case.
  
