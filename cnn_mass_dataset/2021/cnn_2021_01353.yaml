title: "‘Wheel of Fortune’ contestant will still get a new car after she lost out on a technicality"
date: "2021-12-23"
section: "Entertainment"
url: "https://www.cnn.com/2021/12/23/entertainment/wheel-of-fortune-car-cec/index.html"
content: |
  After a“Wheel of Fortune”contestant lost out on a new Audi due to a technicality – even though she answered the puzzle correctly – the car company said it would gift her the vehicle instead.
  
  Within a few days of her appearance on thelong-running game show, Audi located competitor Charlene Rubush and said it would give her the same model of car she’d been denied on the show.
  
  In a recentholiday episode of “Wheel of Fortune,”Rubush had made it to the bonus round with just 10 seconds to fill in the missing letters of a puzzle, themed “What are you doing?” After first guessing, “Choosing the right card,” she tried again – “Choosing the right … word!”
  
  Rubush answered correctly, but she paused for a few seconds between “right” and “word.”
  
  Melissa Joan Hart becomes the first to win $1 million on 'Celebrity Wheel of Fortune'
  
  “You know, this one’s tough because you said all the right words, including the word ‘word,’ but as you know, it’s gotta be more or less continuous,” host Pat Sajak told Rubush, a hint of disappointment in his voice. “We’ll allow for a little pause, but not four or five seconds.
  
  “I’m sorry,” he continued. “You did a good job of getting it, but we can’t give you the prize, and it was the Audi.”
  
  Rubushdidend her stint on the show with$16,500 in winnings– just no Audi Q3, a luxury SUV thatstarts at $35,900.
  
  Aclip of the moment Rubush lost out on the Audidue to a technicality was shared widely on Twitter, including by former “Jeopardy” winner Alex Jacob.
  
  Pat Sajak and Vanna White reup on 'Wheel of Fortune'
  
  “Come on @WheelofFortune, the woman literally chose the right word,” he tweeted. “Give her the car.”
  
  His plea and those of other “Wheel of Fortune” viewers gained traction, and Jacob shared that he’d messaged Audi to ask for their help. Several hours later, Auditweetedthat Rubush was “a winner in our eyes” and would award her the Q3.
  
  Tara Rush, Audi of America Chief Marketing Officer, said the company was “thrilled to gift Charlene” in a statement to CNN.
  
  “It is the season of giving after all and, technicality or not, we are always eager to share a bit of Audi magic and cheer!” Rush said in the statement.
  
  “Wheel of Fortune” did not immediately responded to CNN’s requests for comment.
  
  The hubbub over Rubush’s loss is at least the second time this year “Wheel of Fortune” would-be winners’ chances were tanked by a technicality. InApril, a contestant used the word “and”in his final answer despite answering the puzzle correctly. Suffice to say, fans were very unhappy – but that contestant was not later awarded a car for his troubles.
