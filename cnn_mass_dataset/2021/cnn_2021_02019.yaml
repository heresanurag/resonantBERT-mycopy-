title: "Hyundai and Kia are spending $7 billion in US electric car push"
date: "2021-05-14"
section: "Business"
url: "https://www.cnn.com/2021/05/14/business/hyundai-kia-us-electric-cars-intl-hnk/index.html"
content: |
  Hyundai and Kia are pouring billions of dollars into the United States, where they plan to start building electric cars and invest more in futuristic technologies.
  
  The South Korean carmakers announced Thursday that they would invest $7.4 billion in the country over the next four years.
  
  The funding will help the companies gradually expand manufacturing, though they said in a statement that exact plans have yet to be finalized. Hyundai(HYMTF)aims to kick off electric vehicle production in the United States next year.
  
  The move bolsters the automaker’s presence stateside, where it already has a sprawling,$1.8 billion factoryin Alabama that churns out nearly half of its cars sold domestically.
  
  Hyundai reveals a new pickup truck, but please don't call it that
  
  It also could help Hyundai and Kia, which is part of the Hyundai Motor Group, win support from the new administration.
  
  US President Joe Biden has alreadysaidthat he wants America to be the world leader in EV manufacturing, proposing toinvest about $174 billionin the sector. He has alsopushedto incentivize consumers to buy US-made electric cars.
  
  In theirstatementThursday, Hyundai and Kia said that they would “monitor the market conditions and US government EV policy to finalize” plans on upgrading their US facilities.
  
  “One key element of Kia’s transformation is transitioning from internal combustion engine to electrification,” Sean Yoon, CEO of Kia North America, said in the statement.
  
  “With our strategic investment in the United States to produce EV models, we are making huge strides to lead the EV market but also increase our contribution to the economies where we do business.”
  
  Hyundai's recall of 82,000 electric cars is one of the most expensive in history
  
  Hyundai also wants to drum up more innovation around areas such as flying cars, autonomous driving and robotics. It laid out plans Thursday to help “ensure future competitiveness,” such as setting up a new subsidiary in Washington, DC, to oversee initiatives around aerial vehicles.
  
  Hyundai gave the public a glimpse of some of those goals last year,unveilinga flying taxi concept with Uber at the Consumer Electronics Show in Las Vegas. The South Korean firm alsoboughta majority stake in US robotics firm Boston Dynamics last December, saying it wanted the two players to come up with new ideas of “future mobility.”
  
  Other automakers have taken a similar route. Earlier this year, Toyota(TM)also launched Woven Planet, a unit dedicated to investing in ambitious projects involving automated driving, smart cities and robots.
