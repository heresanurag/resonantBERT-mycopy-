  “Basically this conservatorship is doing me way more harm than good. I deserve to have a life. I’ve worked my whole life. I feel ganged up on, I feel bullied, I feel left out and alone. I’m tired of feeling alone. I deserve to have the same rights as anybody.”
  
  Britney Spears, who asked during a court hearing yesterday foran end to her nearly 13-year conservatorship. Spears, who rarely speaks about the situation in public, said she felt she had been forced to perform, was given no privacy and was made to use birth control, take medication and attend therapy sessions against her will.
  
