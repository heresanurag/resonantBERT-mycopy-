title: "All Blacks cancel fixtures against Australia and South Africa due to Covid-19 travel restrictions"
date: "2021-08-20"
section: "Sport"
url: "https://www.cnn.com/2021/08/20/sport/all-blacks-cancel-australia-south-africa-rubgy-spt-intl/index.html"
content: |
  The All Blacks, the New Zealand men’srugbyteam, have canceled two tests against South Africa and a match against Australia because of Covid-19 travel restrictions.
  
  New Zealand is currentlyunder lockdown restrictionsuntil at least Tuesday at 11:59 p.m. local after discovering an outbreak of the highly transmissible Delta variant of the coronavirus in the country. Authorities have since uncovered another 30 active cases, including 11 locally transmitted infections that were announced on Friday.
  
  The team were scheduled to face the Wallabies – the Australia men’srugbyteam – this Saturday in Perth, Australia, for the third Bledisloe Cup Test match – a series between the two nations – and the nation’s second match of the Rugby Championship, a test series contested between New Zealand, Australia, South Africa and Argentina.
  
  However, “given the current uncertainty over The Rugby Championship schedule,”accordingto a statement from New Zealand Rugby (NZR), the team will not travel.
  
  NZR CEO Mark Robinson said the decision was made because of the inability to assure the team’s return to home.
  
  “Once the team leaves our shores, they currently can’t return until November 23 post their Northern Tour, so given the uncertainty, it makes sense to pause and get more clarity on these fixtures,” hesaidin a statement.
  
  “We remain 100 percent committed to playing in the entire Fortinet Rugby Championship in 2021 and are working closely with SANZAAR to look at a range of options to reschedule these important matches.”
  
  Furthermore, the All Blacks were scheduled to play South Africa at Forsyth Barr Stadium in Dunedin on Saturday, September 25, and at Eden Park in Auckland on Saturday, October 2.
  
  New Zealand women’s rugby side, the Black Ferns, were scheduled to play the Wallaroos – the Australian women’s rugby team – in Christchurch, on Sunday, September 26 and at Eden Park as part of a double header with the All Blacks.
  
  But after government advice that the 2019 World Cup winners and the Wallaroos would not be able to enter New Zealand to play the matches “due to COVID-19 travel restrictions,” the games have been canceled.
  
  Robinson said every effort had been made to keep the tests in New Zealand.
  
  “We share the disappointment of our fans, players and other stakeholders, particularly those in Dunedin where the sold-out 100th Test between the All Blacks and South Africa was shaping up as a very special occasion,” hesaid.
  
  “However, after discussions with Government, it is clear that the Covid-19 travel restrictions meant there was no way of bringing the South African and Wallaroos squads into New Zealand and we understand the importance of putting the health and safety of New Zealanders first.”
  
