title: "Now the CDC wants to shut down ‘hygiene theater’"
date: "2021-04-21"
section: "Opinion"
url: "https://www.cnn.com/2021/04/21/opinions/hygiene-theater-covid-opinion-sepkowitz/index.html"
content: |
  Editor’s Note:Kent Sepkowitz is a CNN medical analyst and a physician and infection control expert at Memorial Sloan Kettering Cancer Center in New York. The views expressed in this commentary are his own. View moreopinionat CNN.
  
  Remember when we all thought we had to wash our vegetables to remove possible contamination from the novel coronavirus? A year ago, this was a hot topic of discussion; when asked by friends (and I frequently was asked by friends) how to both eat and live safely, I referred them to this well-done video that shows the bestclean-your-box-of-pastaapproach.
  
  It seemed logical at the time. In those frantic early months of the pandemic, routes of transmission of the virus were not well-characterized. Everything and anything seemed a potential danger, from touching a countertop to eating an apple to walking in the street.
  
  In response, the most germophobic behavior suddenly made perfect sense. Hand sanitizers proliferated at every store entrance, in pockets and at home. Indeed, hand sanitizer sales in 2020jumped 600%.
  
  But now we actually know a great deal about how the coronavirus is and is not transmitted. It turns out that airborne transmission of the virusis much more likelythan transmission from surfaces, especially porous ones.
  
  So, the apple you washed and scrubbed and let sit overnight to make sure all the maybe-virus had died could have been bitten into after a quick rinse, just like you used to do when all you worried about were toxic chemicals and salmonella.
  
  In fact, we are so confident of transmission routes that the US Centers for Disease Control and Prevention (CDC)has just declaredthat the constant cleaning of surfaces and food and chairs is not part of the solution at all, but rather threatening to become part of the problem.
  
  Sure, the “high-touch” surfaces, like doorknobs and faucet handles, need attention – and in households with a Covid-19-positive individual, disinfecting surfaces in the house can lead to lower viral transmission rates –  but the rest, according to Vincent Hill, chief of the Waterborne Disease Prevention Branch of the CDC, is protecting no one and is, in fact, nothing more than “hygiene theater.”
  
  Even worse, such an approach may be harmful in two distinct ways. First, scrubbing and scrubbing may lead to a false sense of security, the misplaced confidence that if the place is spick-and-span, Covid-19 transmission cannot occur – so you need not tell your coughing uncle who came over for dinner to cover his cough or better yet, go home.
  
  The mystery of Michigan's overwhelming Covid surge
  
  Second, there is the often-overlooked fact about soap and other cleaning products such as bleach and quintenary ammonia: They are not harmless. Indeed, Hill points out that calls to poison centers increased in 2020. This may have been related to the overenthusiastic use of cleaning products and other dangerous practices in the name of preventing illness.
  
  The problem with the CDC adjusting its message, especially this far into the pandemic, is that the agency is less than forthcoming about how and why everyone went into such a cleaning frenzy.
  
  It – the CDC – did not dissuade people from the sort of over-sanitizing that can be dangerous.  In its cagey gov-speak, the exact declarative statement, “sanitize every surface you touch, every time you touch it!” never appears. But, with little known about the risks of everyday behaviors in the dark months of spring 2020,the advice on howto avoid contracting Covid-19 often felt unclear.
  
  Plus the collective worry was enhanced by the initial medical literature, which was chock-full ofsuper-scary lab findingsshowing that the virus could last hours andhours on surfaces.Many logically concluded that a contaminated apple might be a real thing.
  
  As the first wave of the pandemic was settling last summer and the country was catching its breath, the CDC inched in the direction of telling people not to worry in theirJune 2020 guidance,writing that “it may be possible that a person can get COVID-19 by touching a surface or object that has the virus on it and then touching their own mouth, nose, or possibly their eyes, but this is not thought to be the main way the virus spreads.” (“This is not thought” by whom, exactly?)
  
  But this sort of non-declaration declaration serves only to allow the CDC plausible deniability.  They are giving“take it or leave it” advice, not strong and helpful direction similar to some of their recent guidance.
  
  Vaccine passports -- A technical, not an ideological issue
  
  That’s why the current cheerful revision feels like a bit of a bait-and-switch operation.
  
  The CDC, of course, is in the very unenviable position of needing to scare people into action when a threat appears but then turning around the very next week or month or year to now assure the exact same people that there is nothing to be afraid, that it is safe to goback into the water.
  
  An impossible task. Better, though, to admit that consensus has changed; that new evidence is available, and we changed our minds after reviewing the data. Instead, we get the usual robotic tone that ignores past missteps and, if anything, points to overly energetic cleaning as ill-advised, perhaps whacky and in no way a normalish response to the terrifying early days of the pandemic when cleanliness was next to godliness and the more the better.
  
  Getting the tone right might sound like a ridiculous quibble at a moment of such heightened excitement and concern regarding the pandemic.
  
  But it matters a great deal: the Biden CDC and other governmental experts have done a good job winning back the trust of much of the population, but the confidence in any government endeavor is extremely fragile. Witness the intense criticism of their appropriately cautious“pause” of vaccinationwith the Johnson & Johnson Covid-19 vaccine.
  
  Stay up to date on the latest opinion, analysis and conversations through social media. Join us atFacebook/CNNOpinionand follow us@CNNOpinion on Twitter. We welcome your ideas and comments.
  
  Throughout the pandemic, the CDC and the World Health Organization and every Covid-19 talking head, myself included, havemade countless mistakesas all have tried, in good faith, to prepare people for what’s ahead.
  
  Trustworthiness, though, is not based on the percentage of predictions and bits of advice a person or agency gets right; rather, it’s owning up to mistakes and changes of direction with clarity and bluntness.
  
  Or, stated more clearly and bluntly, for people in need of public health advice, the road to hell is lined with evasively worded guidelines.
