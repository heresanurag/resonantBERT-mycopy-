  _December 1, 2021_
  
  _The mysterious “omicron” variant of Covid-19, the resignation of a social media CEO, and the conclusion of the Atlantic hurricane season are today’s first subjects. We’re explaining why experts are saying not to procrastinate on holiday shopping. And we’re visiting a controversial Christmas tree at a Canadian mall._
  
