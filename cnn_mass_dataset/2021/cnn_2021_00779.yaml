  Fear, tumult and confusion are gripping parts of Afghanistanin the aftermath of the Taliban’s takeoverof the capital city of Kabul.People flooded the city’s airportin an attempt to leave the country and escape Taliban rule. Countries around the world, likeIndiaand Australia, are fast-tracking immigration pathways to accept Afghan people trying to flee. In Washington, among Biden administration members and longtime national security professionals, there has been fierce debate over how the swift, catastrophic end to the US’ 20-year presence in the country came to be.In a speech to the nation yesterday,President Joe Biden admitted Afghanistan’s collapse “did unfold more quickly than we had anticipated,” but stood behind his withdrawal plan.
  
  The Biden administration is expectedto release guidance advising people to get a Covid-19 boostershot eight months after their final initial dose. The plan, which is still being developed, would be put into action beginning in mid- to late September, pending FDA authorization. Pfizer has submitted initial data to the FDAthat supports the use of a booster dose, and claims such a step would help protect against the virus and, importantly, its variants. Meanwhile, New Zealandhas announced a nationwide lockdownafter a single reported coronavirus case – its first locally transmitted case since February. In Tokyo, Paralympics organizers say the games, which start next week, will go on without spectators as the country continues to struggle with new coronavirus outbreaks.
  
  Wildfires and droughts are still relentlessly ravaging the western US.Dry wildfire conditions are expected to continue through the next month, the National Interagency Fire Center says. Right now, there are 97 large fires burning in the US, scorching a total of 2,147,446 acres. In total, more than 4 million acres of US land have been scorched by fires in 2021. Evacuations and power shutoffs could affect tens of thousands of citizens in Western states in the coming days. Lake Mead, the largest reservoir in the US by volume,has been pushed to historic lowsby severe drought in areas around the Colorado River, which feeds it. The US government has declared a water shortage on the river for the first time ever, triggering mandatory water consumption cuts for states in the Southwest.
  
  T-Mobilehas confirmed it was hit by a data breachafter hackers claimed they were selling personal information obtained from some 100 million people. The company has not said whether any personal information from customers was accessed or how widespread the damage may be. These kinds of breaches are becoming more of a threat to US security, and can have long-lasting consequences for individuals as well as the companies affected. Colonial Pipeline, one of the largest fuel pipelines in the US, says the breach that caused it to go offline in the springalso compromised the personal information of nearly 6,000 individuals, who are mostly current or former company employees and their family members.
  
  Indian Prime Minister Narendra Modihas renewed a pledge to spend more than $1 trillion on infrastructureto boost the economy and create hundreds of thousands of jobs. Modi made the announcement on India’s Independence Day, which is a holiday he often likes to use to make ambitious promises (he made a similar infrastructure pledge last year). As Asia’s third-largest country and home to nearly 1.4 billion people, things like railways and emissions regulations are a big priority for India. The country is also clawing its way out of its first recession in a quarter century, spurred on by the pandemic. Modi did not give a timeline for the infrastructure plan, called “Gati Shakti,” which means momentum.
  
