title: "Americans are still buying up a storm"
date: "2021-11-14"
section: "Investing"
url: "https://www.cnn.com/2021/11/14/investing/stocks-week-ahead/index.html"
content: |
  A version of this story first appeared in CNN Business’ Before the Bell newsletter. Not a subscriber? You can sign upright here.
  
  Consumer spending continues to power the US economy. Whether it’s to buy a new house or just a Squid Game plush toy from Amazon(AMZN), people still seem willing to shell out their hard earned cash for stuff.
  
  Retail sales in the United Statessoared more than expected in Septemberand figures for August were revised higher to show a bigger jump than initially reported. October numbers will be released Tuesday. More healthy gains are expected, despite lingeringworries about rising pricesand supply chain disruption.
  
  Inflation isn’t yet killing demand, and investors have taken notice. The SPDR S&P Retail(XRT)exchange-traded fund, which holds a variety of leading retail stocks, has surged nearly 60% this year, beating the broader market by a big margin.
  
  Americans are spending a lot on their homes in particular, especially ashouse prices continue to surge.
  
  Why some say the worst of the supply chain woes are near an end
  
  That’s been great news for retail giants Home Depot(HD)and Lowe’s(LOW), which are both set to report earnings this week. Home Depot(HD)shares have soared nearly 40% this year, making it one of the top performers in the Dow(INDU). Rival Lowe’s(LOW)has done even better, skyrocketing about 45%.
  
  Both retailers have benefited from the fact that there are plenty of DIY enthusiasts looking to fix up their homes before selling them, as well as new homeowners who need to do renovations. The two companies also sell lumber and other supplies to professional builders.
  
  Analysts are predicting Home Depot’s earnings per share will rise more than 20% this fiscal year, which ends January 31. Wall Street expects an even bigger profit pop — nearly 30% — for Lowe’s.
  
  Home Depot and Lowe’s aren’t the only major retailers on tap to post solid results. Investors are also betting that discount giants Walmart(WMT)and Target(TGT)will report strong sales and earnings.
  
  Department store chains TJX(TJX), Kohl’s(KSS)and Macy’s(M)will be reporting earnings too.
  
  The big questions will bewhat demand looks like for the holidaysand whether these retailerscan ship enough goodsfor customers to get them wrapped in time. The bumper fourth quarter — which accounts for most retailers’ profits — is at the mercy ofsnarled supply chainsoverseas andport congestionin the United States.
  
  “Retail sales are expected to soar this holiday shopping season due to high consumer confidence as well as rising personal income,” said Louis Navellier, chairman of Navellier & Associates, in a report last week. “The shortage of some key goods should not derail holiday spending, since when consumers have money in their pockets, they will spend it.”
  
  How grocery stores are handling rising food prices
  
  Hasbro(HAS)’s finance chief Deborah Thomas said a few weeks ago that she felt the worst of the logistics issues were over and that the toymaker should haveplenty of new products on retailers’ shelvesin time for the December sales rush.
  
  Still, what’s happening in China may send a warning signal. Online commerce giants Alibaba(BABA)and JD.com(JD), which both report earnings this week, eachposted record salesfrom theirSingles Day shopping extravaganzaduring the first eleven days of November. But the pace of growth was much slower than in previous years.
  
  President Joe Biden’s highly anticipated virtual summit with Chinese President Xi Jinping willtake place on Monday.
  
  On the agenda: The talks come at a time of heightened tensions over Taiwan, trade and human rights. At the same time, the United States and China just unveiled a surprise pact on climate, underscoring some areas of cooperation.
  
  For investors, discussions between the world’s two largest economies are always worth watching. The meeting will be Biden’s first with Xi since he became president in January.
  
  There will be plenty to talk about. While the Biden administration recently reached an agreement with the European Union to ease Trump-era sanctions on aluminum and steel, criticism of China’s trade practices and subsidies for domestic businesses has persisted.
  
  US Trade Representative Katherine Taisaid last weekthat progress was being made in talks with China to hold the country accountable for promises made in the “Phase 1” trade deal President Donald Trump signed in January 2020.
  
  The global energy crisis and supply chain disruptions could also feature in discussions. And then there’s the weakness in China’s property sector, which rattled American investors earlier this fall.
  
  In a recent report, theFederal Reserve warnedthat “financial stresses in China … could further strain global financial markets and negatively affect the United States.” The Fed pointed specifically to the crisis at Evergrande, China’s most indebted developer.
  
