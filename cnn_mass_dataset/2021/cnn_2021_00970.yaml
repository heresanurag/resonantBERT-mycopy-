title: "Bitcoin tumbles after Elon Musk tweets breakup meme"
date: "2021-06-04"
section: "Investing"
url: "https://www.cnn.com/2021/06/04/investing/elon-musk-bitcoin-breakup/index.html"
content: |
  The price of bitcoin sank on Friday after Elon Musk appeared to lament the end of hisrelationshipwith the cryptocurrency.
  
  The Tesla(TSLA)CEOtweeted a memeabout a couple breaking up along with the bitcoin hashtag and a broken heart emoji. The post included lyrics from a song by rock band Linkin Park titled “In the end.”
  
  Bitcoin fell by over 6% to hit $35,814 at around 8 am ET, according to CoinDesk. It was last trading at $36,410, having dropped about 5% over the past 24 hours. Other digital currencies lost ground, with ethereum 5.6% weaker in mid-morning US trade at $2,637 and dogecoin tumbling 10% to around 36 cents.
  
  Musk recently told customers that the electric car giant would no longer accept bitcoin aspayment for its vehiclesbecause of concerns about the environmental impact of bitcoin mining, which is extremely energy intensive.
  
  While he later appeared tosoften his stanceafter speaking with bitcoin miners in North America, Musk’s most recent tweet suggests he won’t be back on the bandwagon anytime soon.
  
  Muskfrequently triggerslarge moves in cryptocurrency prices, often viaobscure remarkson social media. In December, Musk sent the price of dogecoin up nearly 20% by simply tweeting, “One word: Doge.” He later said that his tweets about the crypto weremeant as jokes.
  
  Bitcoin, which accounts for more than 40% of the global crypto market, is coming off arough month. Prices plunged about 36% in May, their worst monthly performance since September 2011.
  
  A steady torrent of bad news, including steps by China tocrack downon the digital coin, has sent bitcoin spiraling downward since it hit an all-time high above $64,000 in April.
  
  — Paul R. La Monica contributed reporting.
