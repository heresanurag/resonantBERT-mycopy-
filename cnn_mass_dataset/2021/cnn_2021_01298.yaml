  “I want to be very clear: We are not skipping the very important FDA and ACIP process here. They have an incredibly important role to play in evaluating safety and making recommendations for vaccines. We respect that, we honor that and that will be a part of this process as well,” Murthy told the White House briefing.
  
  White House Coronavirus Response Coordinator Jeff Zients told reporters on Wednesday’s Covid-19 briefing that boosters will be free and available at established vaccine sites.
  
  “It will be just as easy and convenient to get a booster shot as it is to get the first shot today,” Zients said. “We have enough vaccine supply for every American.”
  
  Murthy said they made the announcement now for the sake of transparency, and to ensure boosters can roll out in an orderly way.
  
  “We also want to ensure that people and states and localities and the public more broadly can plan,” Murthy said. “You can’t turn on a booster effort with the flip of a switch. You have to lay the groundwork.”
