title: "Bonnaroo organizers cancel this year’s festival, citing flooding from heavy rains"
date: "2021-08-31"
section: "US"
url: "https://www.cnn.com/2021/08/31/us/bonnaroo-festival-canceled/index.html"
content: |
  Organizers of the annualBonnaroo Music and Arts Festivalin Tennessee have canceled this year’s event, citing flooding from heavy rains.
  
  It’s the second year in a row that the festival has been called off. Last year’s eventwas canceledbecause of the coronavirus pandemic.
  
  “We are absolutely heartbroken to announce that we must cancel Bonnaroo,” the festival wrote on its website Tuesday. “While this weekend’s weather looks outstanding, currently Centeroo is waterlogged in many areas, the ground is incredibly saturated on our tollbooth paths, and the campgrounds are flooded to the point that … we are unable to drive in or park vehicles safely.”
  
  The area around the festival site – a 700-acre farm in Middle Tennessee–  has seen 5-7 inches of rain in the past two weeks, much of that in the past 24 hours asTropical Storm Ida moved north, and during the previous weekend, according to CNN Meteorologist Taylor Ward.
  
  Middle Tennessee is clawing its way out of devastation from recent flooding. It sits right in Ida's crosshairs
  
  The festival was scheduled to start Thursday and run through Sunday at the festival grounds in Manchester. Media reports put attendance for the four-day event at 80,000 people, including some who camp and others who come by personal vehicle or shuttle.
  
  Bonnaroo said it has “run out of options” to make the event happen safely.
  
  Among those scheduled to performwere Foo Fighters, Meghan Thee Stallion, Lizzo, Tame Impala, Jason Isbell, Phoebe Bridgers and Tyler, the Creator.
  
  Many of those same acts were scheduled to perform atlast year’s festival.
  
  The festival this year was requiring attendees to show proof of vaccination or a negative coronavirus test within the past 72 hours.
  
  Organizers have said tickets for this year’s festival will not roll over to 2022.
  
  The festival site is about 65 miles southeast of Nashville.
