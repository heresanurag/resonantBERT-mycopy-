title: "A partial skull bone and dozens of skeletal remains found in missing student’s car found in creek after almost 46 years"
date: "2021-12-09"
section: "US"
url: "https://www.cnn.com/2021/12/09/us/clinkscales-missing-car-search-trnd/index.html"
content: |
  Investigators picking throughKyle Clinkscales’ rusted 1974 Ford Pintohave recovered a partial skull bone, dozens of human remains and personal items believed to belong to the college student, who’s been missing for almost 46 years, authorities announced on Thursday.
  
  The Troup County, Georgia, Sheriff’s Officesaid on Facebooka special agent with the Georgia Bureau of Investigation (GBI) has been searching the car since Wednesday with help from its criminal investigations division.
  
