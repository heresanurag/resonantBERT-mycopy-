title: "India’s Covid crisis has revealed the real Narendra Modi"
date: "2021-05-01"
section: "Opinion"
url: "https://www.cnn.com/2021/05/01/opinions/india-covid-second-wave-narendra-modi-ahamed/index.html"
content: |
  Editor’s Note:Meenakshi Narula Ahamed is a journalist and author of “A Matter of Trust – India/US relations from Truman to Trump.” The views expressed in this commentary are her own. View moreopinionon CNN.
  
  By 2014, when Narendra Modi became prime minister of the world’s largest democracy, India had long shed her image being one of the poorest nations teeming with starving and sick people in constant need of foreign aid. Under a team of pro-western reformers, India underwent an economic transformation in the 90’s and by the early 2000’s was being hailed as an economic powerhouse and an attractive partner for the western alliance.
  
  Today, the image of “India shining” — a publicity slogan the ruling Bharatiya Janata Party (BJP) tried so hard to promote in 2004 when it was first elected — is in tatters as news outlets around the world and social media carry images of Indians dying of Covid-19 in the streets as hospitals have run out of beds and oxygen and have had to turn people away. And then there are thegruesome imagesof mass cremations in parking lots and on sidewalks.
  
  India’s second wave of the pandemic has once again revived images of a country of disease and death. With its health care system collapsing under the strain, the government announced this week that iswelcoming foreign assistance, after15 years of rejecting foreign aid. Countries like Russia, the United States, the United Kingdom and others are sending supplies to India despite the country being avaccine manufacturing hub. Many blame the Modi government.
  
  In March 2020 when the news of a possible global pandemic made headlines, Modi acted swiftly andordered a national lockdownand mandated masks and social distancing. As a consequence, the covid rates in India remained manageable until early in 2021. What went wrong?
  
  Modi has offered little more than hollow words amid India's horrifying covid crisis
  
  While the prime minister can be congratulated for acting decisively during those first few weeks, his implementation was flawed and contingency planning for a future resurgence negligible. Several governments have made mistakes during the pandemic, but in India the mistakes proved to be disastrous due to the sheer scale of the population.
  
  When Covid first hit, India faced a vacuum of leaders that previous governments had been able to rely on to provide the sort of contingency planning necessary to weather a crisis. Throughout his tenure as prime minister,Modi has consistently accusedformer public officials and previous administrations of being out of touch and corrupt. He has undermined the institutions of democracy bycompromising the independence of the judiciaryand hassuppressed protestsover thecontroversial 2019 Citizenship Amendment Actwhich fast-tracks citizenship to immigrants from neighboring countries — but not if they’re Muslim.
  
  The handful of US trained Indian American professors who returned to India to serve under Modi’s government, like Viral Acharya and Raghuram Rajan,have left the administration.
  
  Despite being one of the major vaccine manufacturers in the world, the government has failed to provide adequate funding to ramp up the needed supply of Covid-19 vaccines. Instead,60 million vaccines manufactured in India were exportedto other countries as part of a “vaccine diplomacy” initiative. Although the exports were stopped in March, it was insufficient to make up for the shortages. These measures have had consequences.
  
  As of Saturday, only1.9% of India’s nearly 1.4 billion population had been fully vaccinated. By comparison30.3% of the US population is fully vaccinated.
  
  But lulled into complacency by the declining rates of infection last year, Modi acted as if the battle had been won and made a series of critical mistakes. Instead of focusing on getting the country vaccinated and making sure the health care system had adequate supplies, the prime minister turned his attention to winning state elections. Amid an election year,massive political rallieswere allowed to take place without ensuring Covid protocols.
  
  What makes Andrew Yang appealing to New Yorkers?
  
  Modi’s minister of home affairs, Amit Shah, who he relied on as his political strategist wason the campaign trailrather than fulfilling his duties handling the pandemic, as several news outlets in India reported. They pandered to their Hindu base and allowed the Kumbh Mela to take place, a Hindu festival wheremillions gatheredto pray over two months defying social distancing as Covid cases spiked. Thousands contracted the virus as a result and the events were deemed super spreaders.
  
  The prime minister’s reputation as an efficient administrator when he was chief minister of the state of Gujarat convinced people he would bring the same skills to Delhi, but the pandemic has revealed his shortcomings in managing a vast and complex nation with its multicultural population. He also failed to protect the Muslim minority when his partyblamed Muslims for spreading Covidin India last year.
  
  Back then, the public was given just a few hours’ notice before the first lockdown, creating weeks of domestic havoc andenormous hardship to the thousands of poor migrant workersin big cities. Many of them were unable to return home when public transportation shut down and no public assistance had been provided for them.
  
  Modi promotes himself as a man of the people, but his policies, fromdemonetization in 2016and the 2020 lockdown, have adversely affected the most vulnerable population, displaying a remarkable lack of empathy for the very people he claims to represent.
  
  The prime minister indulges in dramatic but empty gestures such as ordering the population tolight candlesandbang on pots and pansat a selected hour across the country to boost morale to convey that he is in charge.
  
  He dresses in elaborate headgear and coats with his name embroidered on them andsurrounds himself by religiously motivated peoplelike him, disregarding science and experts. His health minister appalled the scientific community bysuggesting cow urine as a potential cure for Covid.
  
  Doctor: The secret weapon for ending the pandemic
  
  Modi’s defiant march to reconstruct India into a Hindu nation, uprooting it from its secular constitution as conceived by the founders of modern India, has beena priority for him and his key advisers.
  
  The extent of the damage to the basic institutions of government under Modi is becoming increasingly visible.  With his authoritarian tendencies, he has become intolerant of dissent within the government. Ideas that run contrary to the party line are suppressed. Vigorousdebate on policy issues is no longer permitted. The attempt to cripple India’s democratic institutions is evident everywhere. TheBJP has intimidated the domestic pressand hastried to have Twitter and Facebook remove postscritical of the prime minister. Modi evenslammed Australian newspapersfor criticizing his handling of the Covid crisis.
  
  In response to this growing humanitarian crisis, President Joe Biden pledged to the prime minister thatthe US would provide“a range of emergency assistance, including oxygen-related supplies, vaccine materials and therapeutics” to India. The first US shipment arrived in India Friday morning.Europe is also rushing to helpwith personal protective equipment, oxygen and ventilators.
  
  Pleasing the US is one of Modi’s core foreign policy values. He wasa constructive partner to President Barack Obamaon climate change and catered to President Donald Trump’s ego by organizinga welcome ceremony that drew a massive crowdduring his visit to the country in February 2020.
  
  As defense cooperation between two countries continues to grow and their convergence of interests over an aggressive China find common ground, the partnership has enormous potential. The Biden administration is hoping that India will play a significant role in containing China in the Indo-Pacific as a member of the Quad group, comprising Australia, Japan, India and the US.
  
