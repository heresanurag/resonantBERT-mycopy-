title: "Goldman Sachs employs just 49 Black people in top US jobs"
date: "2021-04-21"
section: "Business"
url: "https://www.cnn.com/2021/04/21/business/goldman-sachs-workforce-diversity/index.html"
content: |
  Goldman Sachshas just 49Black executives and senior managers in its US workforce, accounting for about 3% of the total.
  
  In asustainability reportpublished Tuesday, the investment bank revealeddata on the racial and gender composition of its US workforce for the first time. The numbers reflecta very low rate of Black employmentacross almost all roles in the organization.
  
  Of 1,548 US executives and senior managers, just 24 are Black men and 25 are Black women, or about 3.2% of the total, according to Goldman Sachs(GS).
  
  Black people make up a similar percentage of middle managers and sales representatives. Numbers increase in professional roles in other areas such as compliance, investing and marketing, but are still out of step with the wider US population: Of the 12,521 professionals the Wall Street bank employs, 452 are Black men and 418 are Black women, accounting for 7%.
  
  Overall, Black people make up 6.8% of Goldman Sachs’ US workforce. According to Census Bureau data, about 13.4% of the US population is Black.
  
  “We’ve made good progress on our aspirational diversity and inclusion goals,” CEO David Solomon wrote in the introduction to the report, adding that recent partner and managing director classes were the “most diverse” in the company’s history.
  
  “There’s still a long road ahead, but I will continue to make this effort a personal priority.”
  
  Last year, dozens of US companies, including Amazon(AMZN), Starbucks(SBUX), General Motors and major banks, committed to publicly disclosing the composition of their workforces by race, ethnicity and gender.
  
  The move followedpressurefrom the New York City comptroller and three city retirement funds, calling on companies to back up statements in support of racial equity with “concrete actions” by publishing information reported to the US Equal Employment Opportunity Commission.
  
  JPMorgan Chase(JPM)recently publishedethnicity datafor 2020 showing that 5% of itsUS executives and senior level managers are Black. At Morgan Stanley(MS), 37 out of 1,705 senior leaders are Black, or just over 2%, according to the bank’s 2020Diversity and Inclusion Report.
  
