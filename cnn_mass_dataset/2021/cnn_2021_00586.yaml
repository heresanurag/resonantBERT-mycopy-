  Black peoplemade up5% of Bank of America(BAC)’s US executives and senior managers in 2019, up from 4% in 2015. Of Citigroup(C)’s 108 US senior leadersin 2019, four were Black men and there were no Black women.
  
  According to a report published by Goldman Sachs last month, America’s Black womenhold 90% less wealththan White American men. The bank is investing $10 billion over the next decade to address the disparities Black women face throughout their lives in areas such as healthcare, education, housing and small business.
