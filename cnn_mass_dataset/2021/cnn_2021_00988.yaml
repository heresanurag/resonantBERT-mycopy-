  A venomous West African banded cobrahas been missing in a Texas neighborhoodsince Tuesday.
  
  Here’s what you need to know toGet Up to Speed and On with Your Day.
  
  (You can also get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  Fully vaccinated peoplewho get Covid-19 can transmit the virus, CDC Director Dr. Rochelle Walensky said. Vaccines “continue to work well for Delta, with regard to severe illness and death – they prevent it,” she told CNN. “But what they can’t do anymore is prevent transmission.” Experts have warned that while breakthrough infections of vaccinated people are expected, it isthe unvaccinated who are most at risk. “The unvaccinated continue to be the big highway of transmission,” Dr. William Schaffner of Vanderbilt University Medical Center said. Meanwhile, thetit-for-tat and search into the origins of the pandemic continue. No smoking gunhas emerged to support any lab leak theory, and many scientists continue to believe the virus is more likely to have jumped naturally from animals to humans.
  
  President Biden unveiled another piece of his administration’s plan to fight the climate crisis, announcing a newtarget that half of vehicles sold in the US by 2030will be battery electric, fuel-cell electric or plug-in hybrid. Biden said the future of American car manufacturing “is electric and there’s no turning back.” While reps of Ford, GM and Stellantis joined Biden at the White House for the announcement,Tesla was snubbed. The news comes as the climate crisis makes destructive wildfires increasingly common. The Dixie wildfire justwiped out much of the Greenville communityin Northern California. Meantime, the coming months could be a wild ride for many if NOAA’sfresh prediction of a more active Atlantic hurricane seasonproves true.
  
  Biden signed a bill toaward Congressional Gold Medals to the police forcesthat responded to the insurrection at the US Capitol on January 6. The award is Congress’ “highest expression of national appreciation for distinguished achievements and contributions by individuals or institutions.” Twenty-one House Republicans voted against awarding the medals. Biden thanked the officers  “for protecting our Capitol, and maybe more importantly, for protecting our Constitution, and saving the lives of duly elected members of the Senate, in the House, and our staffs.” The awards come as we continue tolearn the full picture of ex-President Trump’s liesand further details about his pernicious efforts to poison the US political system from within, writes CNN’s Zachary B. Wolf.
  
  A Myanmar militia force fighting the army in a central part of the countryhas found at least 40 bodies in jungle areas in recent weeks, including some showing signs of torture, said a militia member and Myanmar’s UN envoy. Since the military overthrew the elected government of Aung San Suu Kyi on February 1,hundreds have been killed as the army violently quelled protests. The bodies were found in several locations around the town of Kani, which has seen fierce fighting in recent months between the army and the militia groups set up by opponents of military rule. Myanmar’s UN envoy, who represents the elected civilian government, described the incidents as “clearly amounting to crimes against humanity.”
  
  It’s been a whirlwind few days in the world of soccer. British police havearrested 11 people across the UK in connection with episodes of racist abuseof England football players on social media following the team’s Euro 2020 final loss. The barrage was aimed at England players Marcus Rashford, Jadon Sancho and Bukayo Saka after they missed penalties in the shootout against Italy. Meanwhile, one of the greatest players ever,Lionel Messi, is leaving Barcelona“because of financial and structural obstacles,” the club said. And English Premier League champion Manchester City completed thesigning of England international Jack Grealish​on a six-year contract. British media outlets have reported that City had made an offer worth $139 million.
  
  Expensive whiskey goes missing
  
  A$5,800 bottle of Japanese whiskeythat was given to former Secretary of State Mike Pompeo has gone missing, agency filings say.
  
  Cave lion cub found frozen in Siberia is 28,000 years old
  
  The cat is “probably the best preserved Ice Age animal ever found.”Even its whiskers are intact.
  
  Viewers baffled by Olympic divers
  
  Taking a shower between dives?Are they not already wet?!However, there is method to the (perceived) madness.
  
  Virgin Galactic reopens ticket sales
  
  It will cost you$450,000 per seat.
  
  The International Olympic Committeehas revoked the accreditation of two Belarusian coachesallegedly involved in trying to force sprinter Kristina Timanovskaya to return home against her will. The Olympic body said it decided to remove the coaches to safeguard “the wellbeing of the athletes of the NOC of Belarus who are still in Tokyo and as a provisional measure.”
  
  That’s about how many artifacts the US has returned to Iraq this year, the country’s foreign minister said. The items, some that date back 4,000 years, include statues and carvings from ancient Mesopotamia. It isthe largest ever repatriation of artifacts to Iraq, which has seen huge swathes of its cultural heritage looted and sold since the US invasion in 2003.
  
