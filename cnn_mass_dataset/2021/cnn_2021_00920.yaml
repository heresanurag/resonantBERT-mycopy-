  # Are you leaving your restaurant job for good? Share your story
  
  By [![Image 1: Danielle Wiener-Bronner](https://media.cnn.com/api/v1/images/stellar/prod/180928114855-danielle-wiener-bronner-byline.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/danielle-wiener-bronner)[Danielle Wiener-Bronner](https://www.cnn.com/profiles/danielle-wiener-bronner), CNN Business
  
  Apr 16, 2021
  
  PUBLISHED Apr 16, 2021, 11:26 AM ET
  
  Food & drink
  
  [See all topics](https://www.cnn.com/follow)
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2021%2F04%2F16%2Fbusiness%2Frestaurant-worker-callout "Share with email")Link Threads
  
  Link Copied!
  
  ![Image 2: 02 Restaurant waiter - stock](https://media.cnn.com/api/v1/images/stellar/prod/210414173047-02-restaurant-waiter-stock.jpg?q=w_2000,h_1125,x_0,y_0,c_fill/w_860)
  
  Shutterstock
  
  New York CNN Business—
  
  The restaurant sector suffered millions of job losses during the pandemic. Many restaurant workers and bartenders were let go when restaurants closed their doors.
  
  Now, those jobs are starting to come back. But restaurant operators say they’re struggling to staff up.
  
  We want to know: Are you a restaurant worker or bartender who has decided to switch fields during the pandemic? Tell us why you are leaving the industry and what your new career path looks like.
  
