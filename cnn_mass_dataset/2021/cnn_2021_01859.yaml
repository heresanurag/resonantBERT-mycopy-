title: "University of Texas band members will be required to play ‘The Eyes of Texas’ or join a different band"
date: "2021-04-23"
section: "US"
url: "https://www.cnn.com/2021/04/23/us/longhorns-band-eyes-of-texas-trnd/index.html"
content: |
  TheUniversity of Texas at Austinsays that its Longhorn Band will be required to play “The Eyes of Texas” and that it will create a new marching band for students who are unwilling to play the school’s alma mater.
  
  The song has been a mainstay at football games and university events for generations,but critics have argued thatit has a racist history because it was first performed at a 1903 minstrel show, a form of entertainment wherewhite performers often wore blackfaceand presented negative stereotypes of Black people.
  
  In astatement issued on Wednesday, the Butler School of Music announced that “The Eyes of Texas” will be part of the required repertoire for the marching band and the Longhorn Pep Band that plays at basketball and volleyball games and other events.
  
  University of Texas band won't play its alma mater because it was once performed at minstrel shows
  
  “We need to celebrate and nurture what makes UT special, and the Longhorn Band is one of those great organizations that shape our campus culture, elevate school spirit and provide amazing opportunities for our students,” said University of Texas at Austin President Jay Hartzell, who approved the plan. “Our multi-million-dollar commitment over the next five years will support the Longhorn Band in restoring – and even going beyond – its former glory, while also providing strong support for our entire portfolio of university bands.”
  
  The school said that it would create a separate, yet-to-be-named university marching band in fall 2022 that will not be required to perform the song.
  
  Senior band members who do not want to play the song this year will not lose the scholarships they earn for being in the Longhorn Band.
  
  In October, some band members reportedly refused to play the song at a football game because of its origins and concerns that the lyric “The eyes of Texas are upon you” was a play on an expression used by former Confederate Gen. Robert E. Lee.
  
  The school played a recording of the song at the game and Hartzellsaid in a statement that the band was never intended to play at the game.
  
  Hartzell established a 25-person commission to study the history of the song.
  
