title: "Megan Fox quit drinking years ago after getting belligerent at the Golden Globes"
date: "2021-07-22"
section: "Entertainment"
url: "https://www.cnn.com/2021/07/22/entertainment/megan-fox-quit-drinking-trnd/index.html"
content: |
  Megan Foxmay not remember a great deal from the 2009 Golden Globe Awards, but she does know she “got in a lot of trouble” for things she said on the red carpet while tipsy.
  
  Duringa recent appearance on “Who What Wear”the “Till Death” star revisited some of her past looks, including the Ralph Lauren gown she donned at that awards show.
  
  After lamenting that she’s not a fan of the pulled back hair look she had that evening, she tells the story of being “sat at a table with Blake Lively and all three Jonas brothers.”
  
  Megan Fox discusses her son being bullied for wearing dresses
  
  “At the Golden Globes they always put those giant bottles of like Moet champagne on the table,” Fox said. “I went through…multiple glasses of that.”
  
  “And now I don’t drink and this is why,” she continued, and added that she was “belligerent” and said some things on the red carpet after that she should not have.
  
  “I think I got in a lot of trouble for whatever I said on the red carpet at this event,” Fox said. “I don’t remember why, but I know that I did, you can look that up.”
  
  We did and you can watch the video interview she’s probably referencinghere.Warning it contains some offensive language.
