title: "Fight Covid by learning so we can roll with the punches: 7 lessons for 2022"
date: "2021-12-20"
section: "Health"
url: "https://www.cnn.com/2021/12/20/health/covid-lessons-for-2022-frieden/index.html"
content: |
  Editor’s Note:Dr. Tom Frieden, director of the US Centers for Disease Control and Prevention during the Obama administration, when he oversaw responses to the H1N1 influenza, Ebola and Zika epidemics, isPresident and CEO of Resolve to Save Lives, an initiative of Vital Strategies andSenior Fellow for Global Healthat the Council on Foreign Relations. Twitter:@DrTomFrieden.
  
  It’s been two years since Covid emerged, one year since vaccine distribution began, and one month since Omicron upended hopes for a winter of recovery. As we move into a new year, here are seven life-saving lessons from 2021 that can get us closer to ending the pandemic.
  
  Data is the lifeblood of public health. Real-time data allowedSouth Korea,Israeland theUnited Kingdomto make rapid adjustments and inform the world about vaccination, variants, masking and more. Many places have made mistakes – opening too early, not masking, not vaccinating rapidly – but the biggest mistake of all is not getting and acting on data quickly.
  
  All countries need to improve data systems. In the United States, public health programs must navigate a dense forest of payers, providers, health information systems and laboratories. Progress will take a multi-year investment. Globally, strong surveillance systems backed by accurate and rapid laboratory networks will be essential to meeting the first “7” of the7-1-7 targetfor global preparedness.
  
  Long lines for Covid-19 testing as Omicron variant looms
  
  Providing informative, fact-based recommendations is critical, particularly now thatpoliticization, lack of information, and misinformationduel for the eyes and ears of the public while fueling their fears. Effective leaders who communicated successfully were able to empower people to understand their own risks and take appropriate action.New Zealand,Senegaland theIndian Health Servicebuilt trust and increased understanding, leading to wider acceptance of mitigation measures.
  
  Helping people understandhow hard it’s raining Covidin their communities can increase awareness of their own risks so they can make informed decisions about what risks to take and when.
  
  No matter how well-prepared a country’s public health infrastructure,good public health capacity can be undermined by bad political leadership. That’s why good governance, backed by evidence-based policies and clear communication to counter misinformation, are critical for an effective response. Higher trustincreases acceptance of vaccines.Africa CDC’s strong leadershipand ability to mobilize a continent-wide response early in the pandemic is a good example of strong leadership catalyzing action and results.
  
  The world is unprepared for the next pandemic, study finds
  
  Tragically and unacceptably, 2021 continued a long-term trend offailing to protect health care workers, with many dying from Covid. Low pay, weak infection prevention procedures, shortages of personal protective equipment, long work hours, and lack of legal or mental health support are all reasons for the estimated global shortfall of18 million health care workersin the next decade. We need a strong and resilient health care workforce not just for Covid response but also to treat and care for everyday health concerns and ongoing threats.
  
  That means vaccinating every health care worker in the world as soon as possible; investing in training, tools and resources to make health care facilities safer; improving accountability; and increasing national and donor support for programs focused on health care worker protection.
  
  We’ve had remarkably safe and effective vaccines for a full year, particularly the mRNA vaccines from Pfizer and Moderna. Most people in high-income countries are now fully vaccinated, compared withless than 10% of Africa’s population. Although vaccines alone will not end the pandemic, we won’t be able to end it without them. We have to vaccinate as many people in the world as possible, as quickly as possible.
  
  In 2022, that meansgreatly increasing production of mRNA vaccinesand making distribution more equitable, as well as funding vaccination programs – not just vaccines – in Africa and elsewhere. In the medium term, we need to transfer mRNA vaccine technology to regional manufacturing hubs with capacity to scale up rapidly to meet global needs. And long term, we must position mRNA and possibly other technologies as a platform to address future variants and other emerging viral threats.
  
  Biden warns of winter of 'severe illness and death' for unvaccinated due to Omicron
  
  We should develop a global movement to achieve the7-1-7 organizing principle, target and accountability metricso every country can identify every new suspected outbreak within seven days of emergence, start to investigate and report it within one day, and mount an effective response – defined by clear, specific benchmarks for different pathogens – within seven days.
  
  In 2022, the world must greatly increase the financial, technical, and political investments needed to strengthen global health protection. South Africa’s quick detection and flagging of Omicron to the world provides a model for speed and quality of detection and response.
  
  Covid isn’t the last health threat our world will face. Uncontrolled disease spread anywhere is a threat to people everywhere. Covid has already killed more than 10 million people and crippled economies worldwide, costing at least $15 trillion to date. But the worldremains unprepared for and unprotected from epidemics.
  
  More than7,000 life-threatening gapsin countries’ core preparedness and response capacities have been identified; it currently takes far too long – an average of more than 11 days – to detect and report outbreaks. Time is lives, especially in the early stages of a rapidly growing pandemic.
  
  Although the next deadly health threat is inevitable – more than 100 are found each year in Africa alone –the next epidemic or pandemic is not. To prevent epidemics and pandemics, the world needs stronger public health organizations with additional funding, as well as the technical and managerial expertise to translate this funding into real-time improvements.
  
