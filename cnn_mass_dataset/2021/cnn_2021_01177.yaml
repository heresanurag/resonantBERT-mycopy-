  Substantial additional funding would allow The Global Fund, which has been effective at improving the prevention and treatment of HIV, tuberculosis and malaria, to create a pandemic preparedness window. A commitment of $1 billion a year from the United States could help transform empty words and failed promises into real action that breaks our cycle of panic and neglect. With these resources, the Fund could strengthen disease tracking systems, laboratory networks, rapid response capacity and more. Because every dollar the United States gives to The Global Fund is matched by two dollars from other countries, and because the Fund has been efficient and is well accepted by countries, this is a great investment. Aproposed global pandemic treatyled by the World Health Organization could also help, but the treaty process is slow and uncertain.
  
  If in 2022 we don’t greatly improve preparedness, we’re not likely to do so in our lifetimes.
