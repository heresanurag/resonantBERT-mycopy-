  Parents need to keep an eye on their children and take care to protect them, Owensby advised.
  
  “Go back to due diligence. Watch your kids’ social distancing,” she advised. They should wear masks when it’s appropriate – when they are indoors with other, unrelated people, for instance.
  
  “Masks do not hurt kids,” Owensby said. Younger children can have fun wearing masks and playing superhero, she said.
  
  “The entire family should be vaccinated if they can,” she added. Vaccinated parents and siblings can protect younger, unvaccinated children.
  
  More than 75,000 children ages 0-17 have been hospitalized with Covid-19 since August 2020. While this age group makes up the lowest number of Covid-19 hospitalizations of all age groups, hospitalizations in this population are rapidly increasing.
  
  The CDC reports that 1,035 children up to and including age 17 have died from Covid-19.
  
  Clarification:This story has been updated to clarify the number of single-day admissions to Children’s National Hospital in Washington, DCThis story has also been updated with new data on pediatric hospital admissionsArtemis Moshtaghian contributed to this story
