title: "Chrishell Stause and Jason Oppenheim of ‘Selling Sunset’ have split"
date: "2021-12-22"
section: "Entertainment"
url: "https://www.cnn.com/2021/12/22/entertainment/chrishell-stause-jason-oppenheim-split/index.html"
content: |
  Chrishell Stause and Jason Oppenheim are opening up about their breakup.
  
  The “Selling Sunset” costars have ended their relationship five months afterconfirming they were datingand pointed to their different desires regarding wanting a family as the possible cause of their split.
  
  On TuesdayOppenheim posted a statement on his verified Instgram accountstating that Stauce “was the most amazing girlfriend I’ve ever had, and it was the happiest and most fulfilling relationship of my life.”
  
  “While we have different wants regarding a family, we continue to have the utmost respect for one another,” his statement continued. “Chrishell is an exceptional human being and loving her and having her in my life is one of the best things that has ever happened to me.”
  
  Strause also addressed their different viewpoints ina statement on her verified Instagram.
  
  “Men have the luxury of time that women don’t and that’s just the way it goes,” she wrote. “All of that being said, navigating this public terrain is difficult and I am just trying my best.”
  
  “I very much hope to one day have a family and decisions I make at this point are with that goal in mind,” she wrote later in the statement.
  
  Last year Stause,who is now 40,told People magazineshe had frozen her eggs in the hopes of becoming a mother someday.
