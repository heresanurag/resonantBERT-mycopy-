content: |
  Editor’s Note:Richard N. Bond was the Republican National Committee Chairman from 1992-1993. The views expressed in this commentary belong to the author. Viewmore opinionat CNN.
  
  House Minority Leader Kevin McCarthy is in the midst of a political high-wire act worthy of thelegendaryFlying Wallendas, famous for performing daring aerial feats without a safety net.
  
  On the one hand, McCarthy has to retain the loyalty of millions of Republican voters still wedded to former President Donald Trump. On the other hand, McCarthy needs to avoid going down the surreal and dangerous rabbit hole created by Trump and his “Big Lie” of a stolen election.
  
  McCarthy fully recognizes the challenge he faces – and he has attempted to navigate it with mixed results. Right after the insurrection,he blamedTrump for his role in instigating the rioters. Then, McCarthy backtracked on that claim andmade peacewith Trump at a meeting at Mar-a-Lago. Hedid not votefor Trump’s impeachment and wasinstrumentalin removing one of Trump’s foremost GOP critics in the US House, Rep. Liz Cheney of Wyoming, from her leadership position.
  
  At the same time, McCarthy recentlystatedto reporters, “I don’t think anybody is questioning the legitimacy of the presidential election” – a claim that is sadlynot true. And,unlikeRep. Elise Stefanik of New York, who McCarthy endorsed to replace Cheney in GOP House leadership, he has stayed mum on the absurdauditof 2020 election votes in Maricopa County, Arizona. Most tellingly, to date – and with the exception of Cheney – McCarthy has not joined in Trump’s politics of revenge and has not opposed for reelection any of the 10 Republican House members who voted to impeach Trump.
  
  Most importantly, McCarthy recognizes the potency of the Trump policy record and the attraction it holds for voters, particularly Republicans. The vast majority of the GOP supported Trump’stax cuts, his hard line on immigration, hisjudicial appointments, his “get tough” on Iranpoliciesand his unflinchingsupportfor Israel.
  
  However, the darker side of Trump’s record – hiscountlessmisleading statements and falsehoods, incompetentresponseto the pandemic and stirring ofviolenceon January 6 – all contribute to his ranking as one of theworstpresidents in US history. And they pose a threat to McCarthy in expanding the Republican electoral base.
  
  But McCarthy may be able to overcome this hurdle if he can successfully use Democrats’ actions and words to balance himself on the political tightrope. The powerful combination of liberaloverreachesand historical midterm electiontrendshave proven disastrous for the last two Democratic presidents.
  
  Trumpian political insanity has entered GOP's bloodstream
  
  In 1994, former President Bill Clinton’s leftwarddriftand introduction of the Health Security Act, a health reform bill conservatives referred to as “Hillary Care,” contributed to Democrats’lossof 54 seats and control in the US House of Representatives, which they haddominatedfor four decades. Similarly, after former President Obama and his Democratic majorities in Congress prioritized the Affordable Care Act, theylostover 60 seats in the House in the 2010 midterms – handing power to Republican House Speaker John Boehner.
  
  Obviously, President Joe Biden and his congressional lieutenants are aware of this grim history, and they’ve been actively working to pursue issues that poll well with many Americans –includingon Covid relief andinfrastructure. But that doesn’t mean conservatives have not been able to attack them for other issues – including the recent gas shortages, a result of a ransomware attack on the Colonial Pipeline. Republicans seized on the huge gas lines in the South and along the East Coast to illustrate theirdisagreementwith Biden on energy policy, his shutting down of the Keystone Pipeline and pauses in oil and gas drilling.
  
  The GOP also recognizes that Biden’s handling of the border and immigration crisis during the early days of his administration is his greatest vulnerability. The Biden administrationappearedslow to address the crisis – and even resisted using the word “crisis” – and the public has not looked favorably at his handling of the issue. According to an April NBC poll, 59% of respondentsdisapproveof his handling of border security and immigration – and that number jumps to 92% among identifying Republicans.  While the numbers of migrants crossing the border has dropped in the last month, a perception of a border in crisis has been burned into the American psyche, and Republicans will undoubtedly use it in 2022 election ads.
  
  Add to this a variety of issues that progressives like Rep. Alexandria Ocasio-Cortez of New York and other “Squad” members push, such asdismantlingthe US Immigration and Customs Enforcement,defundingthe police,packingthe Supreme Court, andpushingthe Green New Deal, and McCarthy has averitable feastof red meat issues to offer up to voters. These headlines will continue to haunt Democrats and inflame Republicans, even though not a single one of these measures is likely to become law.
  
  McCarthy’s challenge will be to guide the GOP’s agenda away from Trump’s obsession with the 2020 election and toward these issues that the vast majority of Republicans and a chunk of independents support. The fact that Trump continues to be banned from Twitter and Facebook, and that his much-ballyhooedbloghas been a resounding dud will only help dilute his influence. However, Trump’s announcement that he will beginholdingrallies again in June could complicate the House Minority Leader’s efforts.
  
  If he survives this high-wire act, McCarthy should get The Flying Wallenda Lifetime Achievement Award.  The good news for him? Historysuggestshe just might.
