title: "New coronavirus cases are dropping in the US. So is the vaccination rate"
date: "2021-05-19"
section: "World"
url: "https://www.cnn.com/2021/05/19/world/coronavirus-newsletter-intl-05-19-21/index.html"
content: |
  A version of this story appeared in the May 19 edition of CNN’s Coronavirus:Fact vs. Fiction newsletter.Sign up here to receive the need-to-know headlines every weekday.
  
  Covid-19 cases are downin all 50 US states for the first time since the pandemic began, according to the senior White House Covid-19 adviser, Andy Slavitt.
  
  When Slavitt made this announcement yesterday, he said America was “winning the war on the virus.”
  
  “And we need you to help us finish the job,” he added.
  
  But the truth is that, despite the drop in cases, the pandemic is far from over. Not around the world, and not in the US. The virus is still killing around 600 people in the US every day, based on the average numbers for the past week, according to Johns Hopkins University data.
  
  Worryingly, thepace of vaccination is dropping. While nearly 276 million doses have been administered in the US so far, the seven-day average has been falling for more than a week, and has been below 2 million shots per day for five days.
  
  Vaccination rates in rural areas are lagging behind and that could hinder progress, according to a new report from the US Centers for Disease Control and Prevention (CDC).
  
  Seven stateshave reached the Biden administration’s goal of vaccinating at least 70% of adults with at least one dose by July 4 – Connecticut, Hawaii, Maine, Massachusetts, New Hampshire, New Jersey and Vermont – and 18 states have fully vaccinated at least half of their adult residents.
  
  But getting a vaccine to people in rural areas can be difficult.Jen Christensen writesthat nearly 80% of rural Americans live in areas that are designated as “medically underserved” by the US government. Easy access to a doctor for regular appointments is difficult in many parts of the country.
  
  There’s also the issue of hesitancy. In April, a survey by the Kaiser Family Foundation showed persistent resistance to Covid-19 vaccination in rural America. Three in 10 residents said they would “definitely not” have a Covid-19 vaccine or they would get one only if someone required they have it.
  
  With a fifth of the US population living in rural areas, this could have a negative impact on the country’s overall efforts to control Covid-19.
  
  Q:Could the vaccine reduce my fertility?
  
  A:No. The idea that the Covid-19 vaccines could have any impact on fertility is“pure nonsense,”according to Dr. Paul Offit, the director of the Vaccine Education Center at the Children’s Hospital in Philadelphia and a member of the the US Food and Drug Administration’s Vaccines and Related Biological Products Advisory Committee.
  
  There’sno evidence that people have lost any fertilitybecause of the Covid-19 vaccines. In fact, there has never been any vaccine that’s been linked with infertility, according to Dr. Richard Beigi, who sits on the Immunization, Infectious Disease, and Public Health Preparedness Expert Work Group of the American College of Obstetricians and Gynecologists.
  
  The CDC also said there’s no link between any vaccines and fertility.
  
