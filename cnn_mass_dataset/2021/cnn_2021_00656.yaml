title: "World no. 1 Ashleigh Barty retires from French Open with injury"
date: "2021-06-03"
section: "Tennis"
url: "https://www.cnn.com/2021/06/03/tennis/ashleigh-barty-french-open-retire-injury-spt-intl/index.html"
content: |
  World no. 1 Ashleigh Barty was forced to retire from the 2021French Opendue to injury on Thursday.
  
  The 2019championwas clearly struggling with her movement during her second-roundmatchwith Magda Linette on Court Philippe-Chatrier, losing the opening set 6-1.
  
  Barty, who had strapping on her left thigh, left the court for a medical timeout before eventually retiring midway through the second set with the scores level at 2-2, citing a hip injury.
  
  “It’s heartbreaking,” Bartytoldreporters afterwards. “We have had such a brilliant clay court season, and to kind of get a little bit unlucky with timing more than anything to have something kind of acute happen over the weekend and just kind of run out of time against the clock is disappointing. It won’t take away the brilliant three months that we have had, as much as it hurts right now.
  
  “We did everything, absolutely everything we could to give myself a chance. It was a small miracle that we were able to get on court for that first round.”
  
  READ: The Naomi Osaka fiasco is a sign that we’re nowhere near finished with work on mental health
  
  The Australian arrived at Roland Garros with the injury but managed to make her way through her first-round match on Tuesday despite needing treatment on her left hip. Afterward, she admitted that she was “not quite 100%”.
  
  Having arrived to Thursday’s game with her left leg strapped, her serve seemed hampered early on, and after saving some three early break points to level the scores at 1-1, Barty lost five straight games to lose the first set in 36 minutes.
  
  She received treatment off the court, but could not continue for much longer, walking to the net and shaking hands with Linette after the fourth game of the second set.
  
  “I just tried to give myself a chance, tried to give myself a chance and see how it felt,” Bartysaid. “Obviously practicing, we’ve had our restrictions and essentially tried to stay as fresh as possible and not aggravate it in any way, but in a match that’s unavoidable at times.
  
