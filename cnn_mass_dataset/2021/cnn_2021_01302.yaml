  If you’re planning a trip to Target this Thanksgiving to get a jump on your holiday shopping, don’t bother. Target willnever be open on Thanksgiving again. Here’s what you need to know toGet Up to Speed and On with Your Day.
  
  (You can also get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  The House select committee investigating the January 6 riot issueda new round of subpoenasyesterday to five of former President Donald Trump’s allies directly involved in planning “Stop the Steal” rallies,including longtime Republican operative Roger Stoneand conspiracy theorist Alex Jones.
  
  The latest batch of subpoenas indicates the committee continues to focus, in part, on organizers and funding of the “Stop the Steal” rallies that took place on January 5 and 6, as well as earlier rallies in the months leading up to the attack on the US Capitol. Separately, the Biden administration said in a court filing yesterday that former President Donald Trump’spresidential records should be turned over to Congress.
  
  Nearly a dozen Congressional Democrats areurging President Joe Bidento combat high gas prices by not only releasing barrels from the US Strategic Petroleum Reserve but by banning US oil exports, according to a letter viewed by CNN.The letter sent yesterday to Bidenadds to the pressure the White House is facingeven from its own party to lower prices at the pump that are angering Americans and contributing to thebiggest inflation spike in decades.
  
  Biden plans to announce his decision to release oil from the Strategic Petroleum Reservelater today during a speech at the White House, but the timing of such a move is still contingent on other nations finalizing their agreements.
  
  With just a few days to go before Thanksgiving,Covid-19 cases are on the riseacross the US. The daily case rate is about half of what it was at this time last year, according to data from Johns Hopkins University, but the current pace – about 92,000 new cases each day – is up 16% from just a week ago. The picture is even worse for children, withnew cases up 32%from two weeks ago, according to new numbers published by the American Academy of Pediatrics. Meanwhile, A federal judge said this weekend that shewould not blockthe Biden administration’s vaccine mandate for health care workers while a Florida lawsuit challenging the mandate moves forward.
  
  The Biden administration is weighingsending military advisersand new equipment including weaponry to Ukraine as Russiabuilds up forcesnear the border and US officialsprepare alliesfor the possibility of another Russian invasion, multiple sources familiar with the deliberations tell CNN. The discussions about the proposed lethal aid package are happening as Ukraine has begunto warn publiclythat an invasion could happen as soon as January. The package could include new Javelin anti-tank and anti-armor missiles as well as mortars.
  
  Darrell E. Brooks Jr., 39, of Milwaukee has been identified as the suspect who drove an SUV through aChristmas paradein Waukesha, Wisconsin, leaving five people dead and 48 injured, authorities said yesterday. “We are confident he acted alone,” Waukesha Police Chief Dan Thompson said. “There is no evidence this is a terrorist incident.” Brooks faces five charges of intentional homicide and more charges are possible. Among the dead are members of theMilwaukee Dancing Grannies, who have been bringing joy to Wisconsin parade crowds for decades.
  
