title: "Half of US population is fully vaccinated against Covid-19, official says"
date: "2021-08-06"
section: "Health"
url: "https://www.cnn.com/2021/08/06/health/coronavirus-us-half-population-fully-vaccinated/index.html"
content: |
  Half of the US population is fully vaccinated against Covid-19, White House Data Director Dr. Cyrus Shahpar said Friday.
  
  More than 821,000 doses had been reported administered over the previous day’s total, including about 555,000 people who got their first shot, Shahpar said in atweet.
  
  “50% of Americans (all ages) are now fully vaccinated. Keep going!” he tweeted.
  
  Friday just in: +821K doses reported administered, including 565K newly vaccinated. 7-day average of newly vaccinated is up 11% from last week and 44% over past 2 weeks. 50% of Americans (all ages) are now fully vaccinated. Keep going! 🇺🇸
  
  The US Centers for Disease Control and Prevention’sonline Covid-19 vaccination data trackerhad not officially updated with this data by noon ET Friday, but was expected to in the afternoon.
  
  Covid-19 infections of vaccinated people are expected. But the unvaccinated are 'the big highway of transmission,' expert says
  
  As of Thursday morning, the CDChad said, 49.9% of the US population was fully vaccinated. The fully vaccinated percentage out of the population eligible for the vaccine – 12 and older – was 58.4%.
  
  The first dose of Covid-19 vaccine was administered about nine months ago, on December 14. It took about four months – until late March – to fully vaccinate a quarter of the US population, and another four and a half months to reach half, according to the CDC.
  
  An average of 699,261 doses have been administered each day over the past seven days, and an average of 464,778 people initiated vaccination each day over the past seven days, according to the latest data available from the CDC.
  
  Covid-19 vaccinations in the US reached a record high in mid-April, with an average of more than 3 million shots administered each day and about 2 million people initiating vaccination each day.
