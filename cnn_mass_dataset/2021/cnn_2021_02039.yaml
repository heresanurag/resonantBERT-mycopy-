title: "Ford plans to run plants through traditional summer shutdown to recover from chip shortage"
date: "2021-04-09"
section: "Business"
url: "https://www.cnn.com/2021/04/09/business/ford-chip-shortage-no-summer-shutdown/index.html"
content: |
  Ford will keep several of its plants running through the summer in hopes of offsetting production delays caused by theglobal computer chip shortage.
  
  The move follows an announcement from the automaker about a new round of temporary factory closures starting next week.
  
  Most major automakers, including Ford(F), typically shut down production for several weeks in the summer to prepare plants for new model-year cars and perform scheduled maintenance. But Ford(F)now says it will operate more US assembly plants this summer than it has in more than 15 years to “build our must-have vehicles for dealers and customers.”
  
  Automakers are reportingvery tight inventoriesof new vehicles because of widespread shutdowns, although most have tried to keep building their most profitable models, such aslarge pickups and SUVs. But the short supply means many customers are paying above the sticker price for cars – rather than below, as is normal, according to Morgan Stanley auto analyst Adam Jonas.
  
  “We are seeing levels of … vehicle inventory tightness that goes beyond anything we have ever seen,” he said in a note this week.
  
  The Ford factories that will work through the traditional summer shutdown in late June and July are the Dearborn Truck Plant, the Michigan Assembly Plant and the Flat Rock Assembly Plant, all just outside Detroit, as well as the Kentucky Truck Plant in Louisville, the Ohio Assembly Plant outside of Cleveland, the Chicago Assembly Plant and the Kansas City Assembly Plant.
  
  Ford won’t comment on whether or not it will have the full supply of computer chips it needs by June. The automaker has been forecasting that the shortage issues should be resolved by the end of the second quarter. But the company has also warned thatprofits for the yearcould be reduced by between $1 billion to $2.5 billion due to the chip shortage.
  
  “I don’t think it’s wishful thinking to think they’ll have the chips by then,” said Kristin Dziczek, senior vice president of research at the Center for Automotive Studies, a Michigan think tank. “It doesn’t seem out of the realm of possibility.”
  
  Automakers cut back computer chip orders early last year when the pandemic causedtemporary plant closuresandslammed the brakes on auto salesand production. Electronics makers, who enjoyedstrong salesduring the pandemic, eagerly snapped up the excess supply.
  
  But whencar sales bounced backsooner than expected,the industry was left strugglingto find necessary parts, causing widespread shutdowns around the globe.
  
  GM car prices surge as more plants close during the chip shortage
  
  The Ford factories expecting additional weeks off this month include some of the plants that will be working through the summer — Chicago, Flat Rock and part of the Kansas City plant. The Ohio Assembly will also run on a reduced schedule.
  
  The lack of a normal summer shutdown shouldn’t cause Ford significant problems down the road, Dziczek said. Most automakers have completed some of the scheduled maintenance during the chip-related shutdowns. The biggest problem could be making sure that the plants have adequate staffing.
  
  “If you don’t have the scheduled time off,” Dziczek said, “you’ll have a lot of vacation requests.”
