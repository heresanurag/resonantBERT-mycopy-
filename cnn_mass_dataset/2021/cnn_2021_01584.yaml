title: "3 dead after suspected smuggling vessel overturns off San Diego"
date: "2021-05-02"
section: "US"
url: "https://www.cnn.com/2021/05/02/us/san-diego-boat-accident/index.html"
content: |
  Three people are dead after a suspected smuggling vessel overturned off the coast of San Diego on Sunday morning.
  
  San Diego Fire-Rescue Department spokesperson Monica Munoz told CNN they received reports of a vessel that overturned near theCabrillo National Monumentin Point Loma around 10:27 a.m. (1:27 p.m. ET).
  
  James Gartland, lifeguard chief for San Diego, told reporters it appeared the boat hit the reef, broke up and 30 people “came out of the vessel.”
  
  In a Monday update, the US Coast Guard said 32 people were aboard the vessel, 29 survived, three died and of the five remaining in the hospital, one is in critical condition. The Coast Guard indicated Sunday more than 20 people were sent to the hospital.
  
  “This was a mass rescue operation that turned into a mass casualty incident,” Gartland said.
  
  By the time first responders arrived, the boat – a 40-foot cabin cruiser – was broken apart, according to Lifeguard Lt. Rick Romero with San Diego Fire-Rescue.
  
  “Our goal was just to rescue everyone we could,” he said, adding that a Navy staff member who was out with his family also tried to save people in the water.
  
  “Conditions were pretty rough – 5-6 feet of surf, windy, cold, the water’s around 60 degrees so you get hypothermic pretty quickly,” Romero said.
  
  The San Diego Fire-Rescue Department said on its incident page it responded “along with Federal Fire, US Coast Guard and other local agencies.”
  
  “Every indication, from our perspective, is that this was a smuggling vessel used to smuggle migrants into the United States illegally,” said Jeff Stephenson, supervisor and border patrol agent in the San Diego sector of US Customs and Border Patrol.
  
  The fire department said more than 20 people were transported to local hospitals“including Sharp Memorial, Palomar Medical Center West, Alvarado, UCSD Medical Center (Hillcrest), Grossmont Hospital, Kaiser Clairemont Mesa, Kaiser Zion and Paradise Valley Hospital.”
  
  The fire department said it “will not get any updates on the status of patients because of privacy laws.”
  
  The person believed to be operating the boat is in custody, officials said Sunday.
  
  Mayor Todd Gloria tweeted for “San Diegans to keep the boat’s passengers in your prayers.”
  
