title: "Thanksgiving dinner will cost Americans 14% more this year, survey finds"
date: "2021-11-18"
section: "Economy"
url: "https://www.cnn.com/2021/11/18/economy/thanksgiving-dinner-cost/index.html"
content: |
  Thanksgiving dinner will cost 14% more this year, according to new survey by the American Farm Bureau Federation. Dinner for a family of 10 will cost on average $53.31 — up $6.41 from last year’s average of $46.90 which was down 4% from 2019, the lowest in 10 years.
  
  Several factors led to this year’sincreased pricing, including more Americans expected to cook at home as well aseconomic disruptions.
  
  “These include dramatic disruptions to the US economy and supply chains over the last 20 months;inflationary pressurethroughout the economy; difficulty in predicting demand during the COVID-19 pandemic and high global demand for food, particularly meat,” said Veronica Nigh, senior economist with the American Farm Bureau Federation.
  
  Thanksgiving items are running out of stock -- but don't panic
  
  The biggest ticket item — turkey — is up 24% since last year. But there are a few caveats. Grocery stores started advertising lower prices later than usual this year. For example, if you were shopping for a turkey during the week of November 5-11, you could have paid 18% more than the following week November 12-18, the American Farm Bureau found. That means shoppers can still find more affordable turkeys than the Farm Bureau’s estimate of $23.99 for a 16-pound bird.
  
  “Taking turkey out of the basket of foods reveals a 6.6% price increase compared to last year, which tracks closely with the Consumer Price Index for food and general inflation across the economy,” Nigh said.
  
  The entire Thanksgiving meal price includes other staples like stuffing, sweet potatoes, rolls with butter, peas, cranberries, a veggie tray, pumpkin pie with whipped cream, and coffee and milk — with enough for leftovers, according to the American Farm Bureau.
  
  Turkey saw the sharpest increase in price, followed by pairs of pie-crusts up 20% and dinner rolls up 15% at $3.05 for a dozen. Stuffing was the only item that fell in price — down 19% from the year prior to $2.29 for a 14-ounce bag of cubed stuffing mix, the survey revealed.
  
  As for availability, US Secretary of Agriculture Tom Vilsack told CNN earlier this month: “There may be situations throughout the country where a particular grocery store may not have as many turkeys as necessary. At the end of the day, there’s going to be plenty of food on Thanksgiving plates for Americans.”
  
  The US Department of Agriculture estimates Americans will spend closer to 5% more on their Thanksgiving meal this year. But the agency did not specify how many people this would feed and tracks a smaller basket of items than the one in the American Farm Bureau Federation survey.
  
  “We know that even small price increases can make a difference for family budgets, and we are taking every step we can to mitigate that. The good news is that the top turkey producers in the country are confident that everyone who wants a bird for their Thanksgiving dinner will be able to get one, and a large one will only cost $1 dollar more than last year,” Vilsack said Wednesday, citing improvements in the food supply chain in recent weeks.
  
  This is the 36th year that the American Farm Bureau Federation survey hasbeen conducted using pricing data for the same menu items from all 50 states and Puerto Rico. Volunteer Farm Bureau shoppers also checked prices in person and online using grocery store apps and websites to find the best possible prices without using promotions or deals.
