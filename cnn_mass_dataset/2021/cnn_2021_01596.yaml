title: "Silicon Valley gave Asia’s richest man billions, but things aren’t all going to plan"
date: "2021-06-23"
section: "Tech"
url: "https://www.cnn.com/2021/06/23/tech/ambani-reliance-google-smartphone-whatsapp-jiomart/index.html"
content: |
  Last year,GoogleandFacebookcollectivelybet more than $10 billionon Asia’s richest man and his plan to bring hundreds of millions of Indians online.
  
  The investments quickly establishedMukesh Ambani, the billionaire head of sprawling Indian conglomerate Reliance, as agatekeeper for Silicon Valleyin the country — but also raised the stakes for him to deliver the companies a footing in the world’s fastest growing internet market.
  
  Ambani plans to use Facebook’s messaging service, WhatsApp, to connect millions of small businesses in India to his e-commerce initiative, JioMart. The partnership with Google(GOOGL), meanwhile, aims to jointly develop an affordable 5G smartphone.
  
  Reliance, whose major businesses include energy and retail in addition to technology, is expected to provide an update on those initiatives at its annual shareholder meeting on Thursday, along with an ambitious plan to build out India’s 5G network.
  
  But as India continues to struggle with the impact of the coronavirus pandemic, including aneconomic slump, Jio’s plans may be facing more headwinds than its politically connected billionaire owner is used to.
  
  Selling smartphones in India can be atough businesseven under normal circumstances. The average Indian earns around $2,000 a year, according to the latest World Bankdata, makingpricey smartphones out of reach for most of the country. Applehas struggled to sell iPhonesthere for years, and Samsung islosing ground to cheaper Chinese brandssuch as Xiaomi, Oppo and Vivo.
  
  But that challenge was only exacerbated by the global pandemic, which overwhelmed supply chains andcaused shortages of key components. As a result, building a cheap smartphone became more difficult.
  
  “Supply constraints are impacting almost everyone in the industry, but the impact on smaller, local players is even more, as they are not really the top priority for the component makers,” said Kiranjeet Kaur, an analyst at research firm IDC. While Jio does have enormous resources at its disposal, it is still relatively new to the smartphone game, “and the focus on thelow end makes it even more difficult” to procure parts, she added.
  
  He may hold the winning ticket in tech and Silicon Valley knows it
  
  Jio has had to significantly dial back its sales targets for the smartphone because of shortages and rising prices, according to arecent reportfrom Bloomberg.
  
  Delays in the rollout of the smartphone could dentGoogle’s efforts to capture India’s internet user base, which isalready more than 700 millionand set to expand rapidly in the next few years.
  
  A Jio spokesperson declined to comment on its plans for the smartphone’s release and sales, but acknowledged that the pandemic could have an impact on the timeline for its rollout. Google did not respond to requests for comment.
  
  India’s prolonged Covid outbreak and the resulting economic crash has also hurt consumers’ ability to upgrade their devices, according to Tarun Pathak, research director for mobile devices at Counterpoint Research. That makes the country’s smartphone market even more price-sensitive at a time when manufacturing them is getting more expensive.
  
  “That is where we see challenges for someone like Jio. … Every cent matters,” he said.
  
  Facebook’s $5.7 billion investment in Jio — one of the US company’s largest ever — is a marriage of convenience between two services that form the backbone of India’s internet. Jio and Facebook-owned WhatsApp each have more than 400 million users in India, and the partnership between them is part of an effort to unseat Amazon and Walmart at the top of India’s online retail market.
  
  JioMart, Reliance’s e-commerce platform, aims to do that by bringing millions of India’s mom-and-pop stores online. Launched months before Facebook’s big investment, JioMart now operates across more than 200 Indian cities.
  
  Despite its growth over the past year, analysts say JioMart is having some trouble convincing local retailers to sign up. Its direct-to-consumer delivery service is “picking up at a slow pace amid apprehensions among retailers,” according toareportfrom Indian brokerage Kotak Securities earlier this year.
  
  “Getting independent merchants on board has been a challenge since many of [them] are wary of sharing their business information, and many are still not clear about the value-proposition from their perspective,” said Arvind Singhal, chairman of Indian consulting firm Technopak.
  
  Why Amazon and Reliance are clashing in India over a cash-strapped retail chain
  
  WhatsApp is facing struggles of its own in India. After a long delay gettingregulatory approval for its payments systemin the country, the messaging service is nowsuing the Indian governmentover new rules that would require it to break encryption. The rules, and the resulting lawsuit, have cast a shadow over WhatsApp in its biggest market.
  
  Ambani’s battle with Amazon has alsogone to the courts, with the US tech giant challenging Reliance’s recent acquisition of rival retailer Future Group. The court battle is expected to drag on for months, further slowing down JioMart’s growth prospects.
  
  “It is probably true that the progress in executing this vision has not been as per the original expectation of Reliance, but then it would have been a miracle had everything gone as per the plan,” Singhal said. “Reliance is known to be very quick in adapting [and] course-correcting, and hence it is still very likely that JioMart would achieve its original objectives.”
  
  – Diksha Madhok contributed to this report.
