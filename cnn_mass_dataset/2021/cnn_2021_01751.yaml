title: "Here’s why now is one of the most dangerous times of the pandemic for children, expert says"
date: "2021-08-11"
section: "Health"
url: "https://www.cnn.com/2021/08/11/health/us-coronavirus-wednesday/index.html"
content: |
  Students heading back to the classroomfor the new school year will be contending with one of the most dangerous times in the pandemic for children. And officials will have to consider many measures to keep them safe fromCovid-19, an expert said.
  
  “We have the more contagious Delta variant, we have surges and we have so many adults letting down their guard, not wearing masks, not getting vaccinated,” Dr. Leana Wen toldCNN’s Wolf Blitzer on Tuesday. “That’s contributing to this really dangerous environment for children.”
  
  Long-term Covid-19 effects can be significant for kids, pediatricians say. Here's why other doctors say children should be protected
  
  The good news is vaccination rates are up in the US. About 500,000 people on average are initiating their vaccinations each day, according to data from theCenters for Disease Control and Prevention.
  
  Health experts say that the vaccines are an important step for slowing or stopping the spread of the virus, and the more transmissible Delta variant.
  
  But children under 12 are still not eligible for vaccines, and for those newly vaccinated, it takes about six weeks from the first dose to take full effect, many children could still be vulnerable when they start the new school year.
  
  “My concerns are deep and I’m very concerned,” President Joe Biden said when asked about school-aged children returning to the classroom and whether schools might not be able to stay open.
  
  “I also understand that the reason children are becoming infected is because, in most cases, they live in low-vaccination rate states and communities and they’re getting it from unvaccinated adults. That’s what’s happening. And so my plea is that for those not vaccinated, think about it.”
  
  It’s possible that a Covid-19 vaccine will be available for children under the age of 12 before the end of 2021, US Surgeon General Dr. Vivek Murthy said Wednesday.
  
  “Make no mistake, the FDA will move quickly on this because they recognize what’s at stake. It’s the health of our children, and there’s really nothing more important than that,” Murthy told CNN’s Wolf Blitzer.
  
  Before the FDA can evaluate a vaccine for children under 12, Murthy said, companies must complete their trials, collect the data and submit applications to the agency.
  
  Schools reopening without masking is 'formula for disaster,' Louisiana children's hospital doctor says
  
  Whereas the elderly were once considered the population most vulnerable to the virus, the age constraints around vaccinations have left children most at risk now, CNN medical analyst Dr. Jonathan Reiner told CNN’s Don Lemon.
  
  Wen said that it’s clear what’s required to make school safe for children – layers of protection.
  
  When one layer is removed, like when social distancing is foregone so students can gather in a classroom, the other layers of virus protection become even more crucial, she said. Those layers include at least a three-ply surgical mask, improved ventilation, vaccination and testing.
  
  “Putting all that together is how we can get kids back in school safely,” Wen said.
  
  Currently, Covid-19 vaccines are only authorized for people 12 and older, but many experts and officials have called for the efforts to approve vaccines for younger children to be expedited before more children are infected.
  
  Covid-19 or the common cold? How to tell if your child contracted Covid-19 as school starts
  
  “I think the clock is ticking. As we move to late fall and early winter, you want a vaccine for young children,” Dr. Paul Offit, a vaccine adviser to the US Food and Drug Administration, told CNN’s Erica Hill. “I certainly hope we have one in place by then, because children need this.”
  
  The FDA understands the public health impact of having a vaccine for young children but wants to see the necessary data before deciding, said Offit, director of the Vaccine Education Center at the Children’s Hospital of Philadelphia.
  
  In the meantime, Offit noted that children who are still too young to receive the vaccine are relying on the eligible adults and adolescents around them to help protect them by getting vaccinated – which many have yet to do.
  
  “I think as adults, we’ve really let our children down here,” said Offit.
  
  Until vaccines can be administered to younger kids, some officials are hoping that masks will help decrease the spread of the virus.
  
  A majority of parents say they are opposed to schools requiring their children be vaccinated against Covid-19, but are much more accepting of mask mandates, according to a Kaiser Family Foundation Vaccine Monitor poll published Wednesday.
  
  Of the parents of school-aged children in the US, 63% said that their child’s school should require unvaccinated students and staff wear masks, according to the poll. Some 36% of the parents said schools should not have a mask requirement for the unvaccinated.
  
  Two Texas judges issue temporary restraining orders against governor's mask mandate order
  
  In Oklahoma,Santa Fe South Schoolsannounced that it will require masks at school beginning Thursday, defying a law the state Legislature passed last year.
  
  “Exemptions will be made only for those who have a physician’s documentation stating that wearing of a mask is not recommended for that individual,” Superintendent Chris Brewster said in a letter posted on the district website.
  
  Kentucky Gov. Andy Beshear announced Tuesday that masks will be required in K-12 schools, pre-K and child care facilities.
  
  “We are to the point where we cannot allow our kids to go into these buildings unprotected, unvaccinated and face this Delta variant,” Beshear said. “So, I’m going to have the courage to do what I know is right to protect our children.”
  
  In Illinois, Gov. J.B. Pritzker compared enforcing mask mandates to schools enforcing a dress code.
  
  Asked about what schools should do when students don’t wear masks, Pritzker said, “Well, school districts have been enforcing dress codes for many, many years and so they’re expected simply to do the same thing they’ve been doing literally for decades.”
  
  In Florida, Orange County Public Schools received about 8,200 mask opt-out notes on the first day of school, according to school district spokesperson Sara Au. The requests represents roughly 4% of the student population, she said.
  
  The school district kicked off the school year Tuesday with a mask mandate that allows students to opt out of the requirement.
  
  Florida Gov. Ron DeSantis issued an executive order last month prohibiting school districts from requiring mask use, a move former White House Covid-19 adviser Andy Slavitt said is dangerous.
  
  “When school districts try to do the right thing, and he overrules them, he’s both overruling conservative principles of local control, but more importantly, he’s putting kids at real risk,” Slavitt told CNN.
  
  Officials split on masking children in schools as pediatric hospitals fill up with Covid-19 patients
  
  Leon County Public Schools in Tallahassee started the school year Wednesday with a parent opt-out in its mask mandate for K-12 students, changing course from a requirement it announced last week.
  
  Superintendent Rocky Hanna said the district will no longer require a doctor’s signature but will require parents to sign opt-out paperwork. The requirement is temporary with plans to reevaluate it just before Labor Day.
  
  Hanna said the district also plans to seek legal counsel and “if we see that things change one iota, then we then have the clearance to step in as a local board exercising home rule and enact more of a mandate immediately.”
  
  At a meeting Tuesday night, Hanna and school board members expressed concerns about being replaced by DeSantis if they did not follow the law. According to the district, the governor could use statutory authority.
  
  DeSantis, in a statement, welcomed the decision by Leon County, saying the state will monitor all districts closely “to ensure that students are not separated or treated differently due to their parents’ decision to have them wear a mask or not.”
  
  In the northeastern part of the state, Duval County Public Schools reported that the district received about 8,200 mask “opt out” submissions, or about 6% of the total student enrollment of 131,825, according to district spokesperson Sonya Duke-Bolden.
  
  Florida is already is suffering under surging Covid-19 cases. In recent days, the federal government has sent 200 of ventilators to Florida as the state sees some of the highest hospitalization rates per capita in the nation, a health administration official confirmed.
  
  The effects of the spread of the variant can be seen in hospitals around the US.
  
  In West Virginia, there were more than 100 Covid-19 patients in hospital ICUs for the first time since February 8, according to Gov. Jim Justice.
  
  “Buckle up just a little bit West Virginia,” Justice told reporters Wednesday.
  
  There were 275 people with Covid-19 hospitalized and 114 Covid-19 patients in the ICU, according to Justice.
  
  At Children’s Hospital New Orleans, 18 children are hospitalized with Covid-19 and six are in the pediatric ICU. The number of children fighting the disease is unlike anything the hospital has seen at any other time in the pandemic, nurse Kendal Jaffe told CNN’s Nick Valencia.
  
  “Over the last year, we hadn’t seen as many kids get acute Covid lung disease as much as we are seeing now,” she said. “The Delta variant is definitely hitting them a lot harder, a lot faster than we’d seen in the past.”
  
