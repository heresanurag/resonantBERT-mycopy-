title: "Suspected Times Square shooter extradited from Florida, charged with attempted murder"
date: "2021-05-29"
section: "US"
url: "https://www.cnn.com/2021/05/29/us/times-square-shooter-extradited-charged-nyc/index.html"
content: |
  Farrakhan Muhammad was extradited from Florida to New York City and charged Friday evening in connection to a shooting at New York City’s Times Square earlier this month, according to police.
  
  Muhammad, a 31-year-old New York City resident, has been charged with attempted murder, three counts of assault, four counts of criminal use of a firearm and three counts of reckless endangerment, the New York Police Department confirmed to CNN Saturday.
  
  Two women and a 4-year-old girl were wounded during the May 8 shooting.
  
  Muhammed was taken into custody by U.S. Marshals at a McDonald’s in Starke, Florida, on May 11, CNN affiliate WCJB reported.
  
  In anexclusive interviewwith WCJB at the Bradford County Jail, Muhammed denied his involvement in the shooting, saying he wasn’t in New York City at the time.
