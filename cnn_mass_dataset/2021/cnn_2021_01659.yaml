title: "Washington state approves offering free marijuana joints to those getting the Covid vaccine"
date: "2021-06-08"
section: "US"
url: "https://www.cnn.com/2021/06/08/us/free-weed-joint-washington-state-vaccinated-trnd/index.html"
content: |
  Add free weed to the list of incentives being offered to people to encourage them to get vaccinated against Covid.
  
  Officials at theWashington State Liquor and Cannabis Board (LCB)on Monday gave state licensed cannabis retailers permission to offer one pre-rolled marijuana joint “to adult consumers who receive a vaccination at an in-store vaccination clinic.”
  
  The promotion, which LCB calls “Joints for Jabs,” aims to promote and support the state’s vaccination efforts, according to LCB’snews release. They added that they received multiple requests from cannabis retail licensees to help in the efforts.
  
  Others have tried free doughnuts, beers and gifts cards. Now, Ohio is betting millions to improve its vaccination rate
  
  The promotion is offered to adults 21 and older, and will end on July 12.
  
  The news comes just a few weeks after LCBannounceda different incentive offering those who got vaccinated free beer, wine and cocktails.
  
  Across the US, many have been offering incentives ranging from free donuts to baseball game tickets to encourage people to get vaccinated as more states try to reach their vaccination goal.
  
  In Washington, 48.7% of the state’s residents are fully vaccinated, according to data fromCNN’s vaccine tracker. The state’s goal is to hit 70%, according to thestate’s health department.
