title: "Daredevil Alex Harvill dies while practicing for a world record motorcycle jump"
date: "2021-06-18"
section: "US"
url: "https://www.cnn.com/2021/06/18/us/alex-harvill-death/index.html"
content: |
  Daredevil Alex Harvill died Thursday while practicing for a world record motorcycle ramp jump, officials in Washington state said. He was 28 years old.
  
  “Our deepest sympathies go out to Alex’s family, friends and loved ones,” Grant County Coroner Craig Morrison said in awritten statement Thursday.
  
  Harvill, who lived in Ephrata, Washington, was hoping to break the record of a 351-foot jump, according to theMoses Lake Airshow, where his attempt was scheduled on Thursday.
  
  Video of the practice jump at the Grant County International Airport posted to social media showed Harvill’s motorcycle running directly into the top edge of the large dirt berm being used as his landing ramp, with Harvill thrown from the bike.
  
  He was trying to break the record set by Australia’s Robbie Maddison on March 29, 2008, according toGuinness World Records.
  
  Harvill already owned a Guinness World Record of his own, with a297-foot dirt-to-dirt jumpin 2013.
  
  “Coroner Morrison’s staff will conduct an autopsy on Friday to confirm the cause and manner of death, which is normal procedure,” the Grant County Sheriff’s Office said.
