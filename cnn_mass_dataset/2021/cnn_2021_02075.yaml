title: "Former University of Michigan basketball players accuse late Dr. Robert Anderson of abuse"
date: "2021-06-26"
section: "US"
url: "https://www.cnn.com/2021/06/26/us/michigan-anderson-basketball/index.html"
content: |
  Former basketball players at the University of Michigan have accused deceased athletics Dr. Robert Anderson of abuse, their lawyer told affiliateWDIV.
  
  They are the latest to accuse the doctor, who worked for the university from 1966 to 2003. Anderson, who died in 2008, allegedly subjected student athletes to invasive exams, including unnecessary genital and rectal examinations,according to an independent reportreleased in May that was commissioned by the university.
  
  University of Michigan President Mark Schlissel issued a “heartfelt” apology for the abuse after receiving the report.
  
  Attorney Ven Johnson represents 21 men, 18 of whom were members of the university’s basketball team between the 1960s and 1980s, according to the station.
  
  The spotlight on the case has expanded from an independent report on Anderson’s abuse, to calls from survivors to investigate those who may have known of itbut did not act.
  
  Johnson alleged that Dave Strack, who coached the basketball team in the 1960s, knew of the abuse and also failed to respond.
  
  “He did nothing,” Johnson told WDIV.
  
  Bo Schembechler died in 2006.
  
  “This is bigger than Bo. This is bigger than U of M. These are people. These are survivors,” Johnson said.
  
  Neither Johnson nor the University of Michigan immediately returned requests for comment.
