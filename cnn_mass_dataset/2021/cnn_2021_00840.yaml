title: "Title: Italy wins Eurovision Song Contest as the world’s biggest music event returns in Rotterdam"
date: "2021-05-22"
section: "Europe"
url: "https://www.cnn.com/2021/05/22/europe/eurovision-song-contest-2021-winner-scli-intl/index.html"
content: |
