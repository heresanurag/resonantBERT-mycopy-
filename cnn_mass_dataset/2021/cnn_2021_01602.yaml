title: "The mystery of Michigan’s overwhelming Covid surge"
date: "2021-04-14"
section: "Opinion"
url: "https://www.cnn.com/2021/04/14/opinions/michigan-covid-surge-and-vaccines-sepkowitz/index.html"
content: |
  Editor’s Note:Kent Sepkowitz is a CNN medical analyst and a physician and infection control expert at Memorial Sloan Kettering Cancer Center in New York. The views expressed in this commentary are his own. View moreopinionat CNN.
  
  The Covid-19 pandemic is approaching a moment of truth as more and more vaccines are administered. According to the Centers for Disease Control and Prevention’s Covid-19 Data Tracker, in the US, more than a third of the country has received at least one dose of a vaccine and justover 23% are fully vaccinated. An end appears in sight.
  
  Despite this good news, cases are rising dramatically in some areas. For example, Michigan is now in the midst of anoverwhelming surgethat began about six weeks ago. Daily cases arenearing their highesthighs; Michigan has by far thehighest rate of new infections of any state in the country over the last seven days (510.5 per 100,000 population). In a distant second place is nearby Minnesota (290.7 per 100,000).
  
  Speculation is in high gear regarding the simple question:why Michigan and why now?  After all, the increase isnot being seen in surrounding states(yet) with Indiana, Illinois, Ohio and Wisconsin each well below 200 new cases per 100,000 people. Understanding quickly just why this is occurring is particularly important right now, as no one is sure whether the Michigan surge is due to an odd collision of circumstances or, much more ominously, the bellwether of an excruciating national fourth wave of the pandemic.
  
  Thus far, many possible explanations for the increase have been postulated.  Michigan’s daily number of diagnostic tests has beenstable for several monthsand so it’s unlikely to be a contributing factor. In addition,23.7% of people are fully vaccinated, just a hair above the national rate. The vaccine is now available to ages 16+ as it is for many other states. Not much out of the ordinary there.
  
  Local experts have noted thatmany of the outbreaksin the state have been concentrated in schools, sports activities, daycare facilities, nursing homes and other places people congregate. Yet, small outbreaks here, there and everywhere are not unique to Michigan, nor is the recent resumption of sort-of-normal life.
  
  Biden's magical thinking on Afghanistan
  
  Most commenters have also pointed to viral variants. Michigan is among the states with thehighest rate of the more-contagious B.1.1.7 variant(57.6% of new cases compared to 44.1% for the US). But several other states – Tennessee, Florida, Minnesota – are also above the 50% mark. Again: why Michigan and why now?
  
  Examining the racial and age profile of the cases offers no real insight either. The Michigan Department of Healthtracks numerous factorsin detail and their most recent data show cases rising similarly in all races and ethnicities and across all age groups. Overall, cases are up 52% week over week, with the largest rises in the 20 to 29-year-old (73%) and 30 to 39-year-old group (63%) groups. These demographics have only recently become vaccine eligible. In addition, a surge among the mostly not-vaccine-eligible 10 to 19-year-olds only recently has settled a bit; this group too has seen a large increase in cases.
  
  The Michigan experience to date makes an extremely strong case for the effectiveness of vaccination. Though the virus appears to be spreading unchecked in those under age 59, those with a few months of vaccine eligibility (age 60 and up) have an impressively stable (and low) infection rate. This makesGov. Gretchen Whitmer’s plea to President Joe Bidenfor more vaccines all the more logical though, as the administration pointed out when they rejected Whitmer’s request, giving more vaccines to Michigan will mean fewer for the surrounding (and other) states. This, some experts fear, will result in other states becoming the next Michigan.
  
  The likeliest explanation for the Michigan surge is a mix of all of the above: a very transmissible viral variant is spreading one step ahead of the vaccination among those newly eligible for it, with some contribution from a premature, partial return to normal life. And this is where politics is rearing its ugliest head.
  
  J&J vaccine pause prompts a needed discussion of women's health
  
  Michigan after all was called out repeatedly by former President Donald Trump last spring as a state that needed to be liberated from Covid-19 restrictions, as if the Democratic governor, not the pandemic, was the enemy. Some even point to theformer president’s “liberate” mantraas a contributing factor in the armedApril 30th insurrection on the capitol buildingin Lansing as 400 to 700 protesters swarmed in to protest the ongoing legislative session.
  
  In addition to storming the capitol building, some protestors were found by the Federal Bureau of investigation (FBI) to have planned to kidnap Whitmer, a disclosure that then-candidateBiden suggested may have been spurredby the then-president’s inflammatory tweets.
  
  And now the same governor – Whitmer – is faced with a crisis similar to the one from last spring when, despite the threats, she stood her ground.
  
  This time, she has blinked. She isnot demandinga return to the unpopular but effective Covid-19 restrictions, a decision questioned by the head of the CDC.
  
