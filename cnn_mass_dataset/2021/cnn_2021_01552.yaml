  On the heels of his success with passage of the $1.9 trillion Covid-relief act, President Joe Biden proposed an even bigger investment this week – in America’s infrastructure. “His new American Jobs Plan is a comprehensive, well-targeted and timely approach to America’s many long-term economic ills,responding powerfully to 40 years of federal neglect,” observed economistJeffrey D. Sachs. “This is a plan for all Americans in all parts of the country. The time has come to build America’s future.”
  
  Biden is a“man in a hurry,”wroteFrida Ghitis. “Whether or not you agree with his priorities, it’s undeniable that the scope of his actions in the last 70-some days has been enormous. And Biden – the man Trump frequently derided as ‘sleepy’ – is just getting started. His $2 trillion infrastructure proposal is his latest move in what is already one of the most ambitious presidencies in decades. And it’s all happening at a dizzying speed.” At 78, Biden is the oldest President in American history and he faces the possibility of seeing Democrats lose one or both houses of Congress in the November 2022 midterms.
  
  AsSusan Glassernoted in the New Yorker, Biden is being “hailed as an aspiring modern-day F.D.R. or L.B.J. who will lead the country out of crisis.” That may prove premature. “There is, of course, a key question that remains unanswered in the Capitol:Does Biden have the votes?”
  
  Conservative pundits have kept busy deriding the President’s behavior – his recent stumble on the stairs leading up to Air Force One, using note cards at his press conference, heading home to Delaware on some weekends and owning a dog that bit two federal workers. Focusing on such trivialities is a mistake, arguedLanhee J. Chen:
  
  “The more important critique is the one that should be leveled at the substance of Biden’s presidency – the massive policy changes that he has already overseen and is proposing in the months and years to come. Republicans in Congress and across the country should be focusing their fire on Biden’s policies and, even more importantly,presenting their own plans for solving some of the problems he proposes to address.”
  
