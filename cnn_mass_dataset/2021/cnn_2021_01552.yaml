  A loyal backer of President Donald Trump was drawn into controversy this week. Florida Rep. Matt Gaetz “is under investigation by the Justice Department, which is reportedly looking into whether he paid for the travel expenses of a 17-year-old girl across state lines to entice her into sexual activity,” wrote legal analystJennifer Rodgers, a former federal prosecutor. Gaetz has lashed out in his defense, saying that “he and his father are the victims of an extortion plot by individuals who demanded $25 million in exchange for helping Gaetz with the sex trafficking investigation.”
  
  But Rodgers observed that Gaetz’ response doesn’t fully work. “There is no basis at all to believe that the private citizens alleged to be behind extortion attempts beginning two weeks agoalso caused the DOJ investigation into sex trafficking to begin months ago,” she wrote.
  
  If the allegations denied by Gaetz turn out to be true, the “scandal will be another test to show how far Republicans are willing to go to protect their own,” notedJulian Zelizer. “Over the past four-and-a-half years, we have repeatedly witnessed how theimmense power of partisanship within the GOP overwhelms its moral concerns…”
  
  The extremism of some GOP members of Congress has been blamed on Trump, but a new book by former House Speaker John Boehner says it began well before the 45th president took office. Former Rep.Charlie Dent, a moderate Republican, pointed to Boehner’s characterization of some Republicans elected in the 2010 midterms as morons. These members “gained an outsized voice within the House GOP conference, bringing their extreme views and conspiracy theories to Congress. They pushed for legislation that had no chance of passing – including defunding Obamacare while President Barack Obama was in office and Democrats controlled the US Senate – and attempted to obstruct the raising of the debt ceiling, which would have led to fiscal Armageddon,” Dent wrote.
  
  Did you know that Nintendo’s Super Mario has a biographer?Jeff Ryanwrote the book on the character’s prominence in the video game world and this week addressed the false rumors that “Super Mario, the mustached video game plumber, was going to be dead the day after March 31.” In fact, Nintendo is scheduled to release another Super Mario game this year and was just making a few tweaks to its game lineup.
  
  As Ryan pointed out, Mario “dies for a living” in the games. Turns out he is based on the real-life Mario Segale, the landlord of the Seattle-area warehouse where thousands of Nintendo arcade cabinets were waiting to be refitted with a new game four decades ago.
  
  In 1986, Nintendo launched a home game console in the US, the NES, with Super Mario Bros. It was a huge hit, and many more have followed. Ryan wrote, “No Mario? Thank God! he lives, and lives forever. A thousand deaths from now, nay, ten times ten thousand deaths from now,Mario will continue to make glad the heart of childhood.”
  
