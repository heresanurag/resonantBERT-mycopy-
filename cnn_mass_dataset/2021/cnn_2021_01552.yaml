  A year ago,Fiana Garza Tulipwas sending videos of her seven-month-old daughter to her mother, who was “filled with such joy every time she received a clip of her only grandchild.” Tulip’s mother, Isabelle Hilton Papadimitriou, was a respiratory therapist, and last June had a confrontation with a hospital visitor who refused to wear a mask, citing Trump’s failure to wear one. Covid-19 spread through her hospital department and a few weeks later, Papadimitriou died of the disease. She would have celebrated her 65th birthday this week.
  
  Tulip noted that former White House Covid-19 coordinator Dr. Deborah Birx said on a CNN documentary that hundreds of thousands may have died needlessly from the disease. “When the history of the American pandemic is written,” Tulip wrote, “my daughter will ask how things got so bad. I will tell her that it was an age of failed leadership, a collapse of moral courage by those who should have spoken out, a distrust of science, and a time when people stopped caring for each other. I will make sure she knows that her grandmother, ‘Abuelita Obie,’deserved so much better and she should still be alive today.”
  
  Birx had a sterling reputation as a leader of programs to fight HIV/AIDS before she became coronavirus coordinator for the Trump administration.“Accepting a job working for Donald Trump was her first and worst mistake,”wroteDr.Megan Ranney. “Birx’s next error was allowing the regime’s lies to go unchecked. It’s true that she said many things right, from her first day to her last. And as a White House team member, she would have found it hard to publicly contradict her boss. And it’s understandable that she thought she would do more good from inside the administration instead of as an outside observer. She said this herself in January. But still – she could have drawn the lines of honesty and integrity much earlier.”
  
