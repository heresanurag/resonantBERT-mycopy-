title: "The year that’s still breaking our hearts"
date: "2021-04-04"
section: "Opinion"
url: "https://www.cnn.com/2021/04/04/opinions/the-year-that-never-ended-opinion-column-galant/index.html"
content: |
  Editor’s Note:Sign upto get our new weekly column as a newsletter. We’re looking back at the strongest, smartestopinion takesof the week from CNN and other outlets.
  
  The word “trauma” made its way into the English language fromthe ancient Greek verb that means to “penetrate.”The first known use of itcamein 1693 when it was described as “a wound from an external cause.” But today our notion of trauma goes beyond the physical to include the extreme mental anguish that can penetrate lives.
  
  In 2020, we had trauma every which way: a deadly pandemic, an economic plunge, a reckoning over race and a fraught election made for a time that will shape history for decades to come. That we are still coming to terms with all of it was clearer than ever this week.
  
  In a Minneapolis courtroom, witnesses relived the pain of George Floyd’s public death, as prosecutors revealed that Derek Chauvin, then a police officer and now on trial for the events of last May, knelt on Floyd’s neck for 9 minutes and 29 seconds, even longer than previously thought.
  
  “What happened to him resembled a public execution, one thatechoes for many the anti-Black lynchings that marked the Jim Crow era,” wrotePeniel E. Joseph. A 9-year-old girl was one of the onlookers who testified. “That an innocent child, teenagers and well-meaning bystanders had to bear witness to his death – including a firefighter with training that might have saved Floyd’s life – is truly extraordinary.”
  
  For all the shock that the testimony produced, Joseph and others noted that Black Americans have become accustomed to such stark injustice.
  
  Nia-Malika Hendersonrecalled her mother’s tears in 1992 when violence broke out in Los Angeles after police officers were acquitted of the beating of Rodney King, which had been captured on video. “‘Black people are in so much pain,’ she cried, covering her face with her hands and burying her head in her knees.”
  
  Henderson isn’t watching the murder trial of Derek Chauvin. She confessed that despite being a journalist, “I have never seen the George Floyd video.” On the trial, she wrote, “I keep my television muted if it is onscreen. Or I change the channel to avoid seeing anything at all. More specifically, I, like so many others who have seen too much, am avoiding yet another display of Black pain, Black trauma and Black death.”
  
  Her mother is watching the trial and texted her children, “We owe George Floyd.” And Henderson agrees. “Floyd is owed. But he is not owed by Black people, whose suffering is too often on a constant loop, so much as he isby a nation that so regularly has enabled that suffering to continue.”
  
  Calling it “one of the most important trials this country has ever seen,” legal analystElie Honigsaid the defense will “argue that Chauvin did not cause Floyd’s death” and “may claim that Chauvin’s actions were necessary to physically restrain Floyd and take him into custody.” The prosecution’s case is straightforward,“but the outcome is anything but certain, and the stakes – for the entire country – are enormous,”Honig noted.
  
  In a way, there are two trials going on – a narrow one to determine whether Chauvin is guilty beyond a reasonable doubt and a larger, symbolic one about justice in America. AsElliot Williamsnoted, many of the witnesses spoke to what they felt and saw without getting at the “central legal dispute at the heart of the case – the technical cause of Floyd’s death.” Some “highlighted the widespread guilt that so many felt over their failure to confront the gross inequalities baked into our daily lives that led to Floyd’s death. They wondered whether they were complicit in perpetuating racial injustice, andwhether they could have done anything more to combat it.”
  
  The trauma of Jan. 6, when rioters stormed the Capitol aiming to stop the certification of the 2020 election, also lingers painfully. On Friday, security at the Capitol drew headlines when a driver on Constitution Avenue rammed a barricade. Police officer William “Billy” Evans was killed and a second officer was injured. The driver, identified as Noah Green, was shot to death by police, who said he was holding a knife.
  
  The January attack at the Capitol was deeply personal forTheresa J. Fanone.Her son is a 20-year veteran of the Metropolitan Police Department.
  
  Fanone was watching the insurrection on television when she got an “emotional, tearful” call from Michael Fanone’s police partner informing her he had been injured. “My first conversation with Michael, who sounded terrified, began with, ‘Mom, the hate in those people’s eyes, they wanted to kill me, they kept screaming, ‘kill him, kill him, get his gun and kill him.’ Michael, along with many other officers, had been holding the door to the West Tunnel of the Capitol (the door the President uses when he takes the oath of office) when he was pulled through the doorway by the mob, pushed down the stairs, kicked, beaten, maced, tased repeatedly on his neck, had his face shield ripped off and his badge and radio taken.”
  
  “Michael’s injuries resulted ina heart attack, due to trauma, stress and repeated tasing to his neck, burns on his neck and chest, a concussion, a traumatic brain injury and post-traumatic stress disorder.”
  
  On March 25, former President Donald Trump called into a Fox News show to say his supporters had posed “zero threat” that day in January and had been “hugging and kissing” police officers. “My experience of that day, and every day since, has been significantly different,” Theresa Fanone wrote.
  
  The febrile political climate in the United States has not gone away, asDean Obeidallahpointed out. “In the past few days,” he wrote, “we’ve seen the Michigan GOP state chair invoke the specter of violence against those not loyal to Trump and conservative Trump media allies saying on Newsmax that they wished the military would step in and take over from President Joe Biden. Before the attack on the Capitol this type of language was wrong. Today it feels likea dangerous continuation of the type of incitement that led to the Jan. 6 attack.”
  
  The wave of anti-Asian American violence that grew after Trump repeatedly labeled Covid-19 the “Chinese virus” also hasn’t gone away. In one incident, on Monday a 65-year-old woman of Filipino descent was punched and kicked on a New York City street by an attacker shouting anti-Asian slurs.
  
  Yumi Hogan, the first lady of Maryland and the first Korean-American first lady in the US, wrote, “My fellow Asian Americans weep over the rising number of attacks against our people. But in the face of this senseless violence, I see a new strength, determination and resilience in our eyes.”
  
  “We will not stay silent anymore,”Hogan observed. “But we will also not respond with vengeance. Instead, we will love each other more, we will support each other more, and we will stand together. We will make sure the overwhelming outpouring of support from leaders turns into real and lasting action that protects our children and grandchildren.”
  
