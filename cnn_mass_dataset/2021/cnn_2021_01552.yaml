  After a tough year, “admit it,” wrote poetTess Taylor: “The inner school kid in you (especially the one who has been stuck home for more than a year) would rather be out playing:maybe with music, maybe with friends, maybe with mud, maybe with words.”
  
  Playing with words is especially apt in April, National Poetry Month. For those sick of being homebound, there’sthisfrom a William Butler Yeats poem Taylor cited: (It was put to music by Hamilton Camp and has been performed byJudy Collins.)
  
  I will arise and go now, and go to Innisfree,
  
  And a small cabin build there, of clay and wattles made;
  
  Nine bean-rows will I have there, a hive for the honey-bee,
  
  And live alone in the bee-loud glade.
  
  And I shall have some peace there, for peace comes dropping slow,
  
  Dropping from the veils of the morning to where the cricket sings…
