title: "This fast food chain is now one of the most diverse workforces in America – except for its top executives"
date: "2021-04-29"
section: "Business"
url: "https://www.cnn.com/2021/04/29/business/shake-shack-diversity/index.html"
content: |
  Shake Shack has emerged as one of the most diverse employers in America after hiring more than 1,000 people in 2020. But the premium burger chain’s executive management team is also one of the least diverse in the fast food industry, which for years has been criticized forpervasive racial disparitiesbetween its disproportionately Black and Latino frontline workforce and itsoverwhelmingly WhiteC-suite leadership.
  
  Black, Latino and Asian Americans make up a combined total of44.2%of retail fast food and counter workers nationwide, according to the latest available US Bureau of Labor Statistics data. Yet people of color collectively make up more than 75% of Shake Shack’s overall workforce population of about 7,400, according to the company’s latest “Stand For Something Good” diversity, equity and inclusion report released Thursday.
  
  The report, which was provided to CNN Business in advance, breaks down Shake Shack(SHAK)’s most-recent workforce demographics, details its goals for improvement and examines the impact of its social and environmental philanthropic efforts.
  
  It highlights a 76% promotion rate for Shake Shack’s non-White employees, but also shows a familiar imbalance in the ratio of Black and brown restaurant employees and the company’s higher-earning corporate leadership positions.
  
  People of color make up 34.7% of Shake Shack’s restaurant leadership positions and nearly 20% of the company’s home-office corporate leadership roles, which include directors, vice presidents and senior-level managers. Three of the 10 directors on the company’s board are non-White, butShake Shack’s websiteshows it doesn’t have any people of color serving in executive leadership.
  
  For comparison, people of color at McDonald’s, America’s largest burger chain, made up68%of the company’s overall US workforce and 29% of its US-based corporate staff as of December.
  
  Shake Shack’s diversity, equity and inclusion director Idris Stover says the racial imbalance among the company’s executive leaders is something it is working to address.
  
  “We recognize as we look at the numbers there’s an opportunity to move more women and people of color into those roles,” she told CNN Business on Wednesday.
  
  The company’s HR team is searching for a replacement for outgoing President and Chief Financial Officer Tara Comonte, who isstepping downfrom her current position on May 10 to become the new CEO of TMRW Life Sciences Inc., a New York-based fertility tech company.
  
  “We’re definitely looking for the best person for the job, but we do have goals and we are keeping those top of mind as we continue in the search,” Stover told CNN Business on Wednesday.
  
  Last year, Shake Shack partnered with Food Education Fund, a culinary arts nonprofit, to create the company’s new “Shift Up” development program for entry-level managers. The company says the program provides its shift managers with “classroom-based instruction, experiential learning and peer-to-peer networking” training to develop the business communications, tech literacy and leadership skills needed to one day become senior leaders at the company’s restaurants.
  
  Shake Shack says women and people of color comprised 75% of its inaugural Shift Up class in 2020. The company’s next “Shift Up” program is set to begin this summer.
  
  “We will continue to enroll women and people of color in the program to help diversify and strengthen our leadership pipeline,” the company wrote in its report.
  
  Shake Shack has set a goal to fill 50% of its nationwide restaurant leadership positions and 30% of its corporate leadership roles with people of color by 2025. The company credits its workplace culture and the “steppin’ up” employee development program it launched more than five years ago for its ability to recruit and retain employees of color.
  
  New York City Shake Shack general manager Jasmin Chaney joined the company as an entry-level team member more than six years ago. She now leads her own team of employees at the company’s Bay Plaza shopping center location in the Bronx.
  
  “I knew previous people that worked for the company and started off as team members and have become managers,” Chaney told CNN Business on Wednesday “The support and the drive made me want to come for that exact experience.”
  
  – Update: This story has been updated with more context about Shake Shack’s initiatives to improve its executive diversity.
