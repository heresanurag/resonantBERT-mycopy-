id: cnn_2021_01162
title: "Baby raccoon stuck in sewer cover freed by firefighters"
date: "2021-06-12"
section: "US"
url: "https://www.cnn.com/2021/06/12/us/raccoon-head-sewer-rescued-trnd/index.html"
content: |
  It may be the saddest yet cutest photo you see all weekend.
  
  Firefighters in Michigan rescued a baby raccoon Tuesday after it got its head stuck in a sewer cover.
  
  Harrison Township Firefighters Local 1737 posted onFacebookthat crews used multiple tools to free the animal.
  
  The raccoon did not have any injuries, the fire station said. It did not say how the animal got stuck in the first place.
  
  While it’s not a typical call, firefighters make these kinds of rescues more often than you may think.
  
  Last year, California firefighters rescued a puppy that got her head stuck in the wheel of aspare tire. A few months later, firefighters in Scotland freed afox cubfrom a rusty wheel with cutting equipment.
