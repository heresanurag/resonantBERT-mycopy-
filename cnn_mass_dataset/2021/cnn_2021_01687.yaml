content: |
  Simone Biles proved once again she’s the GOAT,taking home her record seventh national women’sall-around title in the lead-up to the Tokyo Olympics.
  
  Here’s what you need to know toGet Up to Speed and On with Your Day.
  
  (You can also get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  The Biden administration is facing a national security crisis.Ransom-demanding hackers have targeteda pipeline, a Florida water system, schools, health care institutions, government agencies and the meat industry in recent weeks, and the nation’s energy secretary warned yesterday that US adversariesare capable of shutting down the power grid. Many of the attacks appear to be the work of criminal gangs based in Russia. President Biden is set to meet with Russian President Vladimir Putin next week on his first foreign trip since taking office, and the summit is likely to be even more tense than expected.
  
  Let’s start with the good news:Most adults in the US have received at least one doseof a coronavirus vaccine, and about 66% said in a recent survey that their lives are at least somewhat back to normal. The average national vaccination rate also got back up above a million shots a day, after falling under that threshold last week. But even as things are looking up, experts warn thatvaccination lags among groups such as adolescentscould delay the return to normal. Also, only 13 states have reached Biden’s goal of vaccinating 70% of US adults with at least one dose by July 4 – and those that are behind could be vulnerable to another outbreak.
  
  Sen. Joe Manchin says heplans to vote against a sweeping voting rights billand remains opposed to gutting the filibuster. The moderate Democrat from West Virginia has for monthsbeen a key holdup to the For the People Act, which he described as “partisan voting legislation.” Hisopposition to filibuster changesalso presents a major roadblock for Biden, given that Republicans can hold up many of his legislative priorities under the current rules. Meanwhile,former President Trump continued to push disinformationaround the 2020 presidential election in a speech this weekend before the North Carolina Republican Party, while praising states likeTexas,FloridaandGeorgiathat have advanced laws making it harder for Americans to vote.
  
  Mexican President Andrés Manuel López Obradorappears to have lost his grip on powerafter a poor showing in yesterday’s midterm elections. Preliminary results suggest the country’s ruling political coalition will no longer have a qualified majority in the lower house of Congress, making it harder to pass major legislative and constitutional reforms without the help of opposition parties. The contest was largely seen as a referendum on López Obrador, who was elected in 2018 after campaigning to tackle violence and corruption. But critics say he’s failed to stop the organized crime turf wars that have plagued Mexico for decades. With fears of voter intimidation high, the balloting concludedone of the deadliest recent midterm election seasons.
  
  The US experiencedanother deadly weekend of shootingsas the nation emerges from restrictions imposed during the pandemic. In Chicago, at least five people were killed and 40 others wounded during five gun violence incidents; so far, no one is in custody. Salt Lake City and Indianapolis also reported fatal shootings over the weekend, whilea shooting in New Orleans yesterday morningleft eight people injured. More than 8,400 people have died from gun violence in the United States this year.
  
  Meghan and Harry welcome their second child
  
  Lilibet Diana is named after her great-grandmother, Queen Elizabeth,and her late grandmother, the Princess of Wales.
  
  Floyd Mayweather Jr. faced off against YouTuber Logan Paul … and it wasn’t a knockout
  
  Thetwo went for eight roundsin yesterday’s highly publicized exhibition match.
  
  The last surviving liberator of Auschwitz dies at 98
  
  David Dushmanhelped free prisoners from the notoriousNazi concentration camp as a soldier for the Soviet Red Army in World War II.
  
  Americans can take cruise vacations again
  
  The first big cruise ship to allow North American passengerssince the pandemic shut down the industryhas set sail.
  
  Dozens of tourists were fined after police seized more than 200 pounds of sand and shells taken from the beaches of Sardinia
  
  The Italian island’s white sand is protected, andbeachgoers can even face jail timefor taking it.
  
  That’s the price of a barrel of oil in the US as of yesterday – thehighest it’s been in nearly three years. The reason for the comeback: more demand for gasoline and jet fuel now that life is returning to normal.
  
  “Asian people in Brazil … We pretend we don’t care, but it hurts deep inside.”
  
  Sissy Oishi de Lima, a fitness instructor in São Paulo, speaking about thediscrimination she’s faced at worksince the coronavirus pandemic began. She’s one of many Asian workers around the world who reported experiencing more workplace bias in the last year.
  
