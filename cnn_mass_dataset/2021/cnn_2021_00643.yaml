title: "Who owns the Colonial Pipeline? It’s complicated"
date: "2021-05-12"
section: "Investing"
url: "https://www.cnn.com/2021/05/12/investing/colonial-pipeline-ownership/index.html"
content: |
  About the only thing that hasn’t been hurt by the hacking attack that shut down the Colonial Pipeline? The company’s market value.
  
  If it were publicly traded, the Colonial’s stock would undoubtedly have tumbled. But the 59-year-old firm is privately held, with its ownership split among five owners spread across five countries on four continents. Started as a joint venture between nine large oil companies, today it is worth about $8 billion, based upon the most recent sale of an 10.1% stake to a unit of Royal Dutch Shell(RDSA)in 2019.
  
  Colonial Pipeline is generally a low-profile company, except when things go wrong, as they did spectacularly Saturday when the pipeline, a majorsource of gasoline and jet fuelused along the East Coast, was shut down by aransomware attack. The company is expected to announce details of restart plans by the end of Wednesday, though any reboot likely will take days.
  
  This isn’t Colonial’s first brush with shutdowns, although it is by far the worst. In September 2016 amajor fuel spillclosed the linefor about two weeks and anexplosionshut it down again later that year.
  
  With the exception of Shell, Colonial’s owners today are privately held companies and pension funds. The 2019 Shell deal raised its stake in the pipeline from 6% to 16.1%, and today Shell is the only remaining integrated oil company to have a stake in the pipeline.
  
  Over the years the rest of the major oil companies have sold their stakesin the venture, sometimes at the demand of regulators. ExxonMobil sold its stake following the 1999 merger of Exxon and Mobil, choosing instead to keep its shares in a Colonial competitor, Plantation Pipeline. ExxonMobil’s stake was repurchased by Colonial and distributed proportionately to its other owners.
  
  Companies are being held to ransom. Should they pay up to get back online?
  
  Marathon and BP(BP)sold their separatestakes in Colonial in 2002 to a unit of Koch Industries, a privately held conglomerate with significant oil interests. Those sales gave Koch the largest stake in the pipeline, with 28.1% of the privately-held shares.
  
  ConocoPhillips(COP)sold its 16.6% stake in Colonial to Caisse de dépôt et placement du Québec, a financial firm that manages funds primarily for public and private pension and insurance plans. And in 2010 Chevron(CVX)sold its 23.4% stake to a joint venture between private equity firm Kohlberg, Kravis Roberts & Co.(KKR)and South Korea’s state-run National Pension Service.
  
  The other current ownerof the pipeline is IFM Investors, an investment firm owned by a group of Australian pension funds, with a 15.8% stake in Colonial Pipeline.
