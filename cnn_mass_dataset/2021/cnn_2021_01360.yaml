  “Does getting full approval for an adult vaccine, does that matter in terms of speeding up the process for approval for the childhood vaccines? I think the answer to that question is probably no,” Offit told CNN on Friday.
  
  Overall, “this is all sort of new territory – the notion of emergency use authorization obviously is new, certainly for vaccines that have been used to this extent. We hadEUAs for anthrax vaccines, but that’s not this,” he said. “I’m not sure how the FDA views this.”
