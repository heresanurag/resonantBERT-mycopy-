title: "China tells its tech giants to heed ‘warning’ in Alibaba’s record fine"
date: "2021-04-13"
section: "Tech"
url: "https://www.cnn.com/2021/04/13/tech/china-warning-tech-giants-alibaba-intl-hnk/index.html"
content: |
  The A-list of China’s tech industry was summoned before the country’s powerful regulators on Tuesday for a dressing down over antitrust behavior, just days after Alibaba(BABA)was hit witha record $2.8 billion finefor acting like a monopoly.
  
  The State Administration for Market Regulation (SAMR), along with the Cyberspace Administration (CAC) and the State Taxation Administration (STA), met with executives from 34 internet companies, such as Alibaba, Tencent(TCEHY)and ByteDance, the SAMR said in a statement.
  
  The meeting was aimed at requiring every company to heed the warning from the Alibaba case and stop anti-competitive and other illegal behaviors, the regulator said. “Internet platform companies must be in awe of and respect the rules,” it added.
  
  Other companies attending included JD.com(JD), Pinduoduo(PDD), Baidu(BIDU), food delivery app Meituan, ride-hailing giant Didi, gaming company NetEase(NTES), streaming platform iQIYI and short-form video app Kuaishou.
  
  The regulators required the companies to conduct their own inspections within a month, rectify any shortcomings, and make a public statement of compliance. Officials will continue to track company behavior and any found guilty of breaching the rules will be subject to “heavy punishments,” the SAMR said.
  
  On Wednesday, the regulator published statements of compliance from12 companies, including Bytedance, JD.com, Pinduoduo, Meituan and Baidu. The companies all pledged to fix their antitrust practices and comply with the rules.
  
  Shares of the companies jumped in Hong Kong on Wednesday. Statements from the other companies are expected in the coming days.
  
  Ant Group cut down to size in latest blow for Jack Ma's business empire
  
  On Saturday, the SAMR slapped a fine of 18.28 billion yuan ($2.8 billion) onJack Ma’s Alibaba, accusing the online shopping company of implementing “exclusive dealing agreements” that prevented merchants from selling on rival platforms.
  
  Two days later, financial regulators ordered Ant Group, Ma’s financial tech firm, to overhaul its operations and become a financial holding company supervised by the central bank. That means the Alibaba-affiliate willhave to follow rules similar to those applied to traditional Chinese banks and scale down its aspirations to become a dominant force in the tech world.
  
  Beijing has been tightening the screws on China’s tech champions in recent months, part of a regulatory crackdown that President Xi Jinping has described as one of the country’s top priorities for 2021. Last month, Xi urged officials to step up their efforts to regulate online companies to maintain social stability.
  
  Xi Jinping renews call for crackdown on Chinese tech companies
  
  The regulators promised on Tuesday to crack down on a range of practices, such as abusing dominant market positions, setting artificially low prices to grab a bigger market share in “community group buying,”using big data to charge consumers different prices, information leakage, and illegal tax-related activities.
  
  In particular, the companies must “take strict precautions against” five behaviors, including the disorderly expansion of capital, monopolizing the market, stifling technology innovation by competitors, abusing internet algorithms, and closing off their digital ecosystems to others.
