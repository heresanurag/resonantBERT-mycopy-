title: "California man who died in custody was restrained on his stomach for 5 minutes and lost consciousness, police body camera shows"
date: "2021-04-28"
section: "US"
url: "https://www.cnn.com/2021/04/28/us/california-mario-arenales-gonzalez-police-custody-death/index.html"
content: |
  A California man who died in police custody this month was restrained on his stomach on the ground for about five minutes before he became unresponsive and officers began CPR, body camera footage released Tuesday by the Alameda Police Department shows.
  
  The April 19 death of Mario Gonzalez Arenales, 26, is under investigation by the county and the city, and a lawyer representing Gonzalez’s family alleges the first police news release about the incident was misleading.
  
  The cause of Gonzalez’s death has not been determined.
  
  The incident started around 10:45 a.m. on April 19, when police officers in Alameda – just south of Oakland – responded to separate reports about a man who appeared to be under the influence and about a suspect in a possible theft, Alameda police said ina news releasethat day.
  
  “Officers attempted to detain the man, and a physical altercation ensued,” the initial news release reads. “At that time, the man had a medical emergency” and died after being transported to a hospital, the release adds.
  
  The next day, police issued asecond releasesaying the Alameda County Sheriff’s Office and the Alameda County district attorney’s office were conducting separate investigations into Gonzalez’s death.
  
  On April 23, the city of Alameda announced it hired an attorney – Louise Renne, founding partner of Renne Public Law Group – to also conduct an investigation.
  
  The three officers – James Fisher, Cameron Leahy and Eric McKinley – are on paid administrative leave, city spokesperson Sarah Henry said.
  
  Fisher has been with the department since 2010 and Leahy and McKinley joined the agency in 2018, Henry said.
  
  A news release from the city said Charlie Clemmens, a Civilian Parking Enforcement employee, was also involved. The statement didn’t say what Clemmens work status was as of Wednesday.
  
  The body camera footage released Tuesday shows Alameda police finding Gonzalez outside, just off a road in a residential area.
  
  It shows Gonzalez talking with police while hesitating to give officers his name for approximately 10 minutes before officers attempt to restrain him.
  
  Gonzalez appears to be incoherent and continues to resist arrest, prompting officers to take him to the ground, restraining him face down as he struggles and yells.
  
  Based on the video footage, it is unclear what level of pressure the officers used.
  
  “We have no weight on his chest, nothing,” one officer says to the others as they attempt to keep him restrained. A second appears to warn, “No weight, no weight.”
  
  After about five minutes of being pinned down, Gonzalez appears to lose consciousness. Seconds after Gonzalez stops moving or making sounds, a police officer says Gonzalez is unresponsive. Officers roll Gonzalez over, and begin CPR, the video shows.
  
  Minutes after CPR starts, an officer declared there was “no pulse,” the video shows. Gonzalez was later transported to a hospital.
  
  The cause of Gonzalez’s death has not been determined, and it is unclear whether drugs or alcohol were involved.
  
  The autopsy and toxicology reports have not been released and are expected to be placed on hold for several weeks before they are finalized, said Julia Sherwin, an attorney representing Gonzalez’s family.
  
  “Our heartfelt condolences go out to his loved ones,” the city of Alameda said in a news release. “This outside investigation will provide an independent analysis into what may have occurred the day (Gonzalez) tragically lost his life.”
  
  Sherwin, the Gonzalez’s family attorney, said the police body camera footage displays Gonzalez was unresponsive long before he was transported to the hospital.
  
  “The police department’s press release looks like theMinneapolis Police Department’s press releaseafterGeorge Floydwas murdered” in Minneapolis in May 2020, Sherwin said. “Two officers respond, he resists them, they get him in handcuffs, and he has some kind of medical distress, and they send him to the hospital where he later died.”
  
  Gonzalez was a father and a caretaker for his younger brother who has autism and other special needs, Sherwin said.
  
  “Alameda Police Department is lying to me,” Gonzalez’s mother, Edith Gonzalez, added. “You guys made a mistake.”
  
  Interim Alameda Police Chief Randy Fenn said Wednesday he was “troubled by watching a young man lose his life.”
  
  “I have questions of how this happened,” Fenn told CNN. “While the videos give us a lot of information, it’s not the entire story.”
  
  Asked whether the actions of the officers were within police department protocol, Fenn said he hopes the answer will be borne out by the investigation.
  
  “It certainly leads to questions,” he said. “Nobody wants to see someone on the ground face down any longer than is absolutely necessary, but I don’t know why the officers made the decisions that they made.
  
  “The investigation, I’m hoping, will bear out what the decision points were for the officers, what was going through their minds, and why they did the things that they decided to do.”
  
  Asked about Sherwin’s criticism of the police department’s news release, Fenn said Gonzalez did experience a medical emergency and rebutted the notion his department was trying to mislead the public.
  
  “We’re trying to be transparent with the information we have at the moment,” he said. “In these dynamic situations, information changes quickly.”
  
  Correction:A previous version of this story misstated Mario Gonzalez Arenales' full name based on information provided by the Alameda Police Department.
