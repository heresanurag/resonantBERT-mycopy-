  Editor’s Note: CNN’s 5 Things newsletter is your one-stop shop for the latest headlines and fascinating stories to start and end your busy day.Sign up here.
  
  👋Welcome to 5 Things PM!Political division. Worry about paying the bills. Social media overload. Whatever the cause, anxiety can be debilitating. Controlling itstarts with this simple step.
  
  Here’s what else you might have missed during your busy day:
  
  1️⃣Dazzling images:The Blue Ghost spacecraft has been sharing stunning visuals of our celestial neighbor since it entered the moon’s orbit a week and a half ago. It will attempt to land on the lunar surface in just a few days.Take a closer look.
  
  2️⃣Burned out:In Los Angeles, homes under $1 million are hard to come by. The devastating wildfires don’t seem to have deterred people who are buying up charred empty lots where homes once stood.The risk of future fires looms large.
  
  3️⃣Shell-shocked:Egg costs are skyrocketing because of the bird flu outbreak, and bakeries are being hit especially hard because it’s such a critical ingredient. They’re raising prices andworried about losing customers.
  
  4️⃣That’s the spirit:After a string of airline incidents, some people are having reservations about flying. But they’restanding by a surprising carrierknown for its tiny seats, frequent delays and baggage fees — in addition to charging for snacks and drinks.
  
  5️⃣Emotional journey:Nearly 10 years after his father died, Will McGough wanted to honor his memory by scattering his ashes in the pristine wilderness of Antarctica.The trip didn’t go as planned.
  
  🏔️Snowed under:Body camera footage shows the moment rescuers in Colorado spotted a snowmobiler’s avalanche airbag anddug him out to safety.He was taken to the hospital with minor injuries.
  
