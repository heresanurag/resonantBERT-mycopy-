  🐟Venturing out:In November, a car accident left Brandon Simmons with a spinal cord injury. Months later, although he was nervous,the 18-year-old visited the Georgia Aquarium using a wheelchairfor the first time in public. What motivated him? His father’s advice: “Don’t ever say you can’t do anything.”
  
