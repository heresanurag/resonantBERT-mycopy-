title: "How much coffee is too much, according to a doctor"
date: "2025-02-13"
section: "Health"
url: "https://www.cnn.com/2025/02/13/health/caffeine-longevity-heart-wellness/index.html"
content: |
  Get inspired by a weekly roundup on living well, made simple. Sign up forCNN’s Life, But Better newsletterfor information and tools designed to improve your well-being.
  
  With millions sipping their morning coffee to start the day, recent research has generated new buzz about caffeine consumption.
  
  A large UK studyfrom September found that moderate caffeine consumption from coffee or tea reduced the risk of developing multiple cardiometabolic diseases such as heart disease, stroke and diabetes.Another study, published in January, concluded that drinking coffee in the morning was especially beneficial in reducing cardiovascular disease and premature death.
  
  Viva la coffee shop: Why we need to meet up in them, now!
  
  That’s nice to know, but what is the evidence for coffee’s health benefits? And what is the underlying physiological basis of these benefits? How much coffee is good for most people, according to these studies — and how much is too much? Should some people be especially careful about coffee consumption? And if you don’t like coffee, are there similar benefits from drinking tea or other beverages?
  
  To help with these questions, I spoke with CNN wellness expert Dr. Leana Wen. Wen is an emergency physician and adjunct associate professor at George Washington University. She previously was Baltimore’s health commissioner.
  
  Dr. Leana Wen:The evidence is quite strong. In addition to the recent studies, a plethora ofresearch over decadeshas found that moderate consumption of coffee is associated with lowering the risk of developing multiple diseases, including heart disease, diabetes, certain cancers and even dementia.
  
  Exactly why this is the case is not known, though there are several hypotheses. For instance, coffee contains chemicals that are thought to have antioxidant and anti-inflammatory properties, perhaps contributing to its effect onreducing cancer risk.
  
  Substances contained in coffee could help the body better use insulin and assist withblood sugar control. And some ingredients could helpbetter process cholesterol, possibly contributing to protecting against negative outcomes. More research is needed to understand what components of coffee have beneficial health effects.
  
  Study seems to confirm secret ingredient for better coffee
  
  Wen:Many of these studies found positive health effects at a moderate level of consumption, which is generally defined as between two and four cups of coffee per day.
  
  In the 2024 UK study, the risk of developing multiple new cardiometabolic diseases was reduced by over48%for those who had three cups of coffee per day compared with those who didn’t drink or who drank less than one cup a day.
  
  According to alarge 2022 study, the biggest decline in early mortality was seen for those who drank two to three cups of coffee a day. Interestingly, this study found that ground coffee consumption lowered the risk of early death the most (27%). Instant coffee had less of an effect (11%).
  
  Wen:The concern with too much coffee is about consuming too much caffeine, which can cause heart palpitations, anxiety, restlessness and difficulty sleeping. According to the US Food and Drug Administration,400 milligrams of caffeineper day is safe for most adults. That is approximately the amount in four 8-ounce cups of brewed coffee.
  
  Many people exceed this amount and experience no ill effects. But people who havesleep difficultiesor other problems should be aware that these could be due to caffeine consumption.
  
  Dark roasted and dangerous: Everything you should know about caffeine intoxication
  
  Wen:One 1-ounce shot of espresso contains around60 to 70 milligramsof caffeine.A cup of black teatypically has 40 to 50 milligrams of caffeine but can have as much as 90 milligrams. Green teas and white teas will have less caffeine. Sodas also vary in caffeine content, but typically a12-ounce servingwill have 3 milligrams to 70 milligrams of caffeine.
  
  Other drinks I want to be sure to flag are energy drinks. These drinks cancontain large amounts of caffeine, often packing 200 or even 300 milligrams in one serving. People should be aware of the total amount of caffeine and other ingredients they are consuming through the day for all these different beverages. Sodas andenergy drinkscan contain a lot of added sugars, for instance, along with other chemicals that are not good for your health.
  
  Is decaf coffee safe to drink? Experts weigh in on claims by health advocacy groups
  
  Wen:Yes. The American Academy of Pediatricsrecommendsthat children under 12 do not consume caffeine. Children ages12 to 18should not exceed 100 milligrams of caffeine per day.
  
  Pregnant women should also be cautious about caffeine intake. According to theAmerican College of Obstetricians and Gynecologists, less than 200 milligrams a day is not associated with miscarriage or preterm birth; itrecommendslimiting intake to under this amount during pregnancy. Small amounts of caffeine can pass from the breastfeeding mother to infant, but less than300 milligrams a dayshould be safe for breastfeeding women, according to the US Centers for Disease Control and Prevention.
  
  Other people who should use caution include those with underlying heart conditions and those who usemedicationsthat could make someone more sensitive to the effects of caffeine, such as certain thyroid and antidepressant medications.
  
  In addition, people who have trouble sleeping should consider limiting their caffeine intake to the morning hours. Those who have questions about their specific medical circumstances should consult a health care provider.
  
  Coffee drinkers get more steps but also less sleep, study finds
  
  Wen:This is an interesting question. It’s not known at this time whether the health benefit from coffee is from the caffeine in the coffee, which could be replicated through non-coffee drinks, or whether they are intrinsic to what’s in the coffee itself.
  
  New research reveals how coffee and tea can affect risk of early death for adults with diabetes
  
  There may be benefits to drinking tea, whether it contains a large amount of caffeine or not.Some studieshave found that drinking tea is also associated with lower mortality and lower risk of some diseases. This benefit does not apply to other caffeine-containing drinks like energy drinks and sodas; whatever benefit the caffeine in these drinks could have would likely be negated by the negative health impacts of added sugars and other chemicals.
  
  In short, my takeaway from these studies about coffee isn’t that everyone needs to drink it. Adults who do probably have some health benefit if they drink it in moderation. Everyone needs to be aware of the total caffeine intake they have, and there are people — notably young children — who really should not be consuming caffeine.
