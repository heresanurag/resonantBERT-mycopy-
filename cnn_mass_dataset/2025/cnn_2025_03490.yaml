title: "The new nudity: A 21st-century guide to taking off your clothes"
date: "2025-06-19"
section: "Travel"
url: "https://www.cnn.com/2025/06/19/travel/naturism-sunfolk-nude-renaissance-clothing-free?ICID=ref_fark"
content: |
