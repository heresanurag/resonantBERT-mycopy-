title: "3 employees of Louisville facility among those missing after UPS plane crash that looked like ‘hell’s fury,’ owner says"
date: "2025-11-06"
section: "US"
url: "https://www.cnn.com/2025/11/06/us/ups-plane-crash-victims-louisville"
content: |
  The power had just gone off and the ground was shaking at Grade A Auto Parts when the owner received a panicked video call from his chief financial officer.
  
  On his screen, CEO Sean Garber watched a “huge fireball” engulf the Louisville, Kentucky, auto-part and recycling facility he has owned for decades as his colleague described a blast followed by “a continuation of explosions.”
  
  “It looked like really hell’s fury around her,” Garber recalled, describing seeing his employees screaming and running from the flames.
  
  A UPS cargo plane had justslammed into the facilityshortly after taking off from a nearby airport Tuesday, leaving at least14 people deadand multiple families with missing loved ones, Kentucky officials said. Three of Garber’s employees are among those still unaccounted for.
  
  Three crew members aboard the freight plane are believed to be among those found dead, Kentucky officials said. UPS identified them Thursday as Captain Richard Wartenberg, First Officer Lee Truitt and International Relief Officer Captain Dana Diamond.
  
  As flames raged and doors melted shut at the recycling facility, people jumped from windows and ran, some employees helping shield others from the growing inferno, the owner said.
  
  The collision left behind a fiery trail of destruction anda half-mile-long debris field, devastating multiple small businesses like Grade A Auto Parts, where mangled, blackened remnants of buildings were set in the background of an “apocalyptic” ashy sky with an acrid smell in the air, Kentucky officials said.
  
  These are the key factors investigators will examine to determine the cause of the Louisville UPS plane crash
  
  Officials are now losing hope there could be more survivors as bodies are pulled from the vast wreckage and the death toll grows.
  
  “We do not expect to find anyone else alive in the area,” Kentucky Gov. Andy Beshear said at a news conference Wednesday, adding the coroner’s office is working to identify remains found at the crash site, but the conditions of some victims’ bodies may make their task more difficult.
  
  Now, some Louisville residents are mourning those killed as others are enduring an agonizing wait to hear from missing loved ones, including the workers’ families and two men who said theyhave not heard froma woman believed to have been at Grade A Auto Parts when the crash happened.
  
  A woman had been dropping off some scrap metal at Grade A Auto Parts after work when the freight plane crashed, her boyfriend, Donald Henderson, told CNN affiliateWDRBTuesday night.
  
  “‘I don’t want to go, (you) go ahead,’” Henderson recalled telling her.
  
  Video of the scene shows a mountainous plume of charcoal-colored smoke emanating from buildings that were set ablaze. In another chilling video at the facility, a man yells, “Did everybody make it out?” When another person responds, “No,” he screams, “What do you mean no?”
  
  Henderson went to a family assistance center authorities set up at the Louisville police training academy with William Moreland, who shares two children with the missing woman. Both struggled to put how they’re feeling into words.
  
  “She’s all I got, so … I don’t know how this is going to turn out,” Henderson told WDRB.
  
  The two men said officials at the center took their information and promised to “give us the news as it comes in.”
  
  “I had to go – I can’t be in there,” Hendersonsaid about being in the center with other emotional families desperately awaiting word on the whereabouts of their loved ones.
  
  Grade A Auto Parts – one oftwo small businessesthe governor says were directly impacted by the plane – is now trying to access its computer system to help officials identify customers who were at the facility when the crash happened, according to Garber. It’s unclear exactly how many customers were at the facility at the time, but Garber says there are typically between 15 to 30 customers around that time.
  
  “There’s been bodies found. Many of them are not recognizable, and they’re trying to figure that out,” Garber said.
  
  John Loucks, a 52-year-old beloved uncle who worked on and off at Grade A Auto Parts for at least a decade, is one of the missing victims, according to his nephew Justin Loucks.
  
  The Louisville Metro Police Department told their family that John Loucks’ body has not been located and that they are conducting DNA testing of the remains. The lack of answers, Justin Loucks said, is difficult.
  
  “It’s scary really,” Loucks told CNN. “Did he die on impact? Did he land in the woods somewhere?”
  
  “We were told (DNA testing) could take weeks or even longer,” he added. “(Police) said there’s a lot of remains still getting recovered and a lot of them are unrecognizable.”
  
  Loucks said he was very close to his uncle growing up, but that they had a disagreement about a year and a half ago. “Officially, he’s still just missing … but it sucks knowing I’m not able to reconcile with him. That’s the hardest part about all this,” Loucks said.
  
  The pair spent a lot of time together playing video games and watching sports, he added.
  
  John Loucks, who lived around Louisville his entire life, loved the Kentucky Wildcats basketball team and fishing, his nephew said. But most importantly, his nephew added, Loucks loved working as a heavy machinery operator.
  
  “It’s what he loved doing. He loved waking up and going to work everyday,” Justin Loucks said. “He was a great guy.”
  
  As the holidays approach, Justin Loucks remembers spending most of them with his uncle and says he will be thinking of him during the upcoming season.
  
  “There’s always hope, but given the governor’s statement … I don’t feel there’s as much chance (he’s still alive), but hey, God works in mysterious ways,” the nephew said. “You never know.”
  
  After the plane collapsed into Garber’s business – apparently coming to rest in the heart of the facility – a headcount revealed three employees were unaccounted for, he said.
  
  Two of the missing employees had been in a building where people jumped from windows to escape the flames after the heat melted the doors shut, Garber said. The third person was believed to be in a warehouse next door.
  
  The incoming plane looked like a rapidly approaching fireball to one of the managers, who tackled a colleague to the floor before they found themselves standing in a burning room, Garber said he later learned.
  
  “There were just so many heroes helping each other out,” he said.
  
  An employee dove between two metal bales that surround the facility to quickly carry a customer who had been burned to safety.
  
  “I would have to imagine it is what a war zone looks like,” Garber said.
  
  As he surveyed the damage Wednesday, Garber said he had lost hope that his employees were still alive. “It’s not survivable,” he said.
  
  One of the missing employees had been with the business for about two decades, Garber said. The second had been working there for about five years and the third had been employed there for about four years.
  
  When Garber met with their families at a family assistance center early Wednesday morning, he noticed they were in a state of shock, made worse by the uncertainty.
  
  “There still isn’t resolution for them,” he said.
  
  Now, Garber feels both anger and sorrow thinking about the employees and customers whose loved ones are still searching for.
  
  “We make our money by providing a service to our customers. People came in just to do that,” Garber said. “They didn’t get to go home and that’s a problem and that’s heartbreaking.”
