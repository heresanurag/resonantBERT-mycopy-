title: "German military says thousands of rounds of ammunition were stolen from parked vehicle last week"
date: "2025-12-02"
section: "Europe"
url: "https://www.cnn.com/2025/12/02/europe/german-army-ammunition-stolen-latam-intl?utm_medium=social&utm_campaign=missions&utm_source=reddit"
content: |
  TheGermanDefense Ministry confirmed Tuesday that “a shipment of thousands of rounds of ammunition” bound for the armed forces was stolen from a civilian contractor’s trailer last week.
  
  A spokesperson told CNN that the ammunition was stolen “from the trailer of the civilian carrier’s transport vehicle, which had been parked overnight” between November 24 and 25.
  
  On November 28, the military discovered that the shipment was missing approximately 20,000 rounds of ammunition, the spokesperson said, without providing further details.
  
  The military is investigating the theft with the help of local police, the German Armed Forces said in a statement sent to CNN.
  
  A Defense Ministry spokesperson told German magazineDer Spiegelon Tuesday that the military is taking the theft “very seriously.”
  
  Germany wants to build Europe’s strongest army – a new conscription bill is moving that closer
  
  “This kind of ammunition must not fall into the wrong hands,” the spokesperson said.
  
  Other ammunition losses have occurred in Germany this year, though none on the scale of last week’s heist. German public broadcasterARDreportedin August that around 90 rounds of ammunition were lost from a police station in Saxony-Anhalt.
  
  The theft comes just as Germany is attempting tobeef upits armed forces after years ofsluggish investmentand cultural discomfort with the country’s military. A week before the heist, Germany’s coalition government put forward a bill to grow the military’s staffing to 260,000 soldiers, up from around 180,000 currently, in addition to an extra 200,000 reservists, by 2035.
  
  The militaristic push comes as Germany remains atop ammo supplierfor Ukraine. In late August, German manufacturer Rheinmetall opened what it claims is Europe’s largest ammunition factory to keep up with demand.
