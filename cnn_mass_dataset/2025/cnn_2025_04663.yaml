  He briefly stepped away from public-facing duties while he received treatment for the undisclosed form of cancer, returning to them a few months later in April 2024. In hisfirst official engagementfollowing his diagnosis, Charles visited a cancer treatment center, where he leaned on his own personal experience when talking to medical teams as well as while connecting with patients and their families.
  
  Thousands of people sent the King messages of support when he was first diagnosed, which he said “reduced me to tears,” according to a statement released by the palace at the time. “Such kind thoughts are the greatest comfort and encouragement,” Charles said.
  
  Since Charles’ diagnosis, it’s understood that his diary has been developed in full consultation with his medical team to protect and prioritize his recovery.
  
  Charles is said to have found carrying out state business and daily engagements in recent months of great benefit to his overall wellbeing. After wrapping up histrip to Australia and Samoalast fall, a palace official said at the time that the visit had lifted “his spirits, his mood and his recovery,” according to PA, and described it as a “perfect tonic.”
  
  Earlier this week, he hosted a reception for regional media at Buckingham Palace and an investiture at Windsor Castle, while last week saw him carry out a three-day trip to Northern Ireland.
  
  This story has been updated with developments.
