title: "King Charles cancels engagements after experiencing temporary side effects of cancer treatment"
date: "2025-03-27"
section: "UK"
url: "https://www.cnn.com/2025/03/27/uk/king-charles-cancer-treatment-latam-intl-gbr/index.html"
content: |
  Britain’sKing Charles“required a short period of observation in hospital” on Thursday after experiencing “temporary side effects” from a scheduled cancer treatment in the morning, Buckingham Palace has said.
  
  Charles, 76, has now returned to Clarence House and, on medical advice, has canceled his engagements on Friday, the palace said in a statement.
  
  “His Majesty would like to send his apologies to all those who may be inconvenienced or disappointed as a result,” it added.
  
  The King was set to receive credentials from the ambassadors of three countries on Thursday, and was scheduled to undertake four public engagements in Birmingham, central England, on Friday.
  
  How much does the public have a right to know about King Charles’ cancer diagnosis?
  
  “He very much hopes that they can be rescheduled in due course and offers his deepest apologies to all those who had worked so hard to make the planned visit possible,” a Buckingham Palace spokesperson said.
  
  A royal source described it as “the most minor bump in the road that’s very much heading in the right direction.”
  
  The statement from the palace came late on Thursday to allow the King some time to consult with his staff and medical team once he had returned home to Clarence House over whether he should continue Friday’s events.
  
  Charles was said to be in good form after the treatment, continuing to work on state papers and make phone calls from his study, a royal source told CNN.
  
  He and Queen Camilla are still expected to travel to Italy for a state visit in April. The four-day trip was also supposed to include a visit to the Vatican, but earlier this week the King and Queen postponed their state visit to the Holy See as Pope Francis recuperates from his recent case of double pneumonia.
  
  The King’s recovery is continuing to proceed in a positive direction and the unspecified side effects he experienced on Thursday are temporary and not uncommon with many medical treatments, the royal source said.
  
  A spokesperson for UK Prime Minister Keir Starmer said he “wishes His Majesty the King all the very best,” according to Britain’s PA Media news agency.
  
  Queen Camilla did not accompany Charles for the brief visit to the London Clinic, the same private hospital near Regent’s Park where heunderwenta procedure for an enlarged prostate in January 2024. The King revealed his cancer diagnosis a month later.
  
