title: "The Florida GOP ending vaccine mandates is playing with fire"
date: "2025-09-03"
section: "Politics"
url: "https://www.cnn.com/2025/09/03/politics/florida-gop-end-vaccine-mandates?iid=cnn_buildContentRecirc_end_recirc&recs_exp=up-next-article-end&tenant_id=related.en"
content: |
  The Republican Party’s recent crusade against Covid-19 vaccine mandates has,rather predictably, begun to ensnare other vaccines.
  
  Even as US Health and Human Services Secretary Robert F. Kennedy Jr. has ramped up ahostile takeover of federal vaccine policy, Florida on Wednesday took an unprecedented step: It became the first state to move toeliminate all vaccine requirements.
  
  In making the announcement, Florida’s vaccine-skeptic Surgeon General Dr. Joseph Ladapo likened each of those mandates to “slavery.”
  
  It’s a huge moment, especially given Florida’s size and the possibility that other red states will follow suit. After the state’s announcement, top Trump health official Mehmet Oz endorsed its approach, saying on Fox News, “I would definitely not have mandates for vaccinations.”
  
  But that would seem to be far out-of-step with the American public.
  
  Some Republicans are warning their party about going too extreme. Two Republican doctors who served in Congress until earlier this year wrote inSTAT Newsbefore the Florida announcement that the party’s vaccine moves are not just “bad policy” but “becoming a political liability for all Republicans.”
  
  They appear to have a point.
  
  Florida’s move means schoolchildren would no longer be required to getpreviously required vaccinationsfor measles-mumps-rubella (MMR), polio, tetanus, chickenpox and hepatitis B. (The Covid-19 vaccine is not mandated for schoolchildren by any state.)
  
  While the decision is being billed as a win for freedom, the effectiveness of such vaccines relies upon widespread adoption in order to buildherd immunity. We’ve already seen just this year how depressed MMR vaccination ratescan lead to measles outbreaks, like the one in West Texas.
  
  It remains to be seen how Florida’s move will affect its vaccination rates and whether it will lead to outbreaks. But polls suggest many Republicans especially would forgo vaccinations for their children if they could.
  
  And that could mark a major shift in the health of Americans. Even as Republicans targeted Covid-19 mandates earlier this decade, they often cast their efforts as being limited to that vaccine. When they occasionally suggested reviewing mandates for other vaccines, theyoften backed off. Now those appear to be in jeopardy, too.
  
  But Florida’s move – along with Kennedy’s vaccine moves – are also rather politically risky.
  
  While Republicans have been quite skeptical of the Covid-19 vaccines and increasingly skeptical of other vaccines, too, recent polls show huge support for non-Covid vaccine mandates for schoolchildren:
  
  Belief in vaccine effectiveness also far outpaces vaccine skepticism, according toa 2023 Pew Research Center poll. While more than 7 in 10 Americans had at least “high” confidence in the preventive health benefits of vaccines, a little more than 1 in 10 rated the risk of side effects that high.
  
  Not all polls show such lopsided margins. A2024 Gallup poll, for instance, showed a new low in the percentage of Americans who said all children should be required to get vaccinated against diseases like measles. It pegged that number at 51%, which was down from 62% in 2019 and 81% in 1991). The question didn’t invoke school attendance, though.
  
  As that trendline shows, vaccine skepticism is clearly on the rise, especially on the right. But that’s not the same as saying people want all vaccine mandates to go away. That doesn’t seem to be what most Americans or even necessarily most Republicans or MAGA supporters want right now. Yet Florida is pressing ahead.
  
  The devil is also in the details as far as what happens next.
  
  While we don’t know what will happen with Florida’s vaccination rates, there are plenty of indicators this could significantly depress them. (Florida already has a relativelyhigh vaccine exemption rateof 5%.)
  
  AUS Centers for Disease Control and Prevention studylast year found 11% of parents disagreed with the statement that they would have vaccinated their children regardless of requirements. Another 16% were neutral on the question. That raises the prospect of vaccination rates in places that don’t require them falling well below the 95% that health officials aim for to achieve herd immunity.
  
  Amid the measles outbreak in Texas earlier this year, as many as1 in 5 children were unvaccinatedin some of the hardest-hit areas, after having received exemptions.
  
  If Florida faces outbreaks in the years to come, it won’t be difficult to trace it to this policy shift.
  
  And vaccines have already been a political liability for Republicans as an issue. A recent Wall Street Journal poll showed Americans preferred congressional Republicans to congressional Democratsonnearly every issuetested. The only exceptions? Health care (40-26% for Democrats) and vaccine policy (40-31% Democrats).
  
  These new moves appear likely to exacerbate that problem – and raise its salience in voters’ minds.
