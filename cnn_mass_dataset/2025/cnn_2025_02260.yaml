  “There’s a lot of amazing communities around the world, but this (one) is special,” Amy Grace Ulman said, hopeful about the future. “People really are just showing up out of every corner.”
  
  For now, the Guadalupe River has receded to itscypress-lined banks,again offering a place to bird watch, ride bikes, picnic andgeocachefor “treasures” hidden in the wild as people in Hill Country andonline around the worldband together tohelp Central Texasfigure out what comes next.
