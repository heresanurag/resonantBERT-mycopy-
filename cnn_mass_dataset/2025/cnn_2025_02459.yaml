id: cnn_2025_02459
title: "Fact check: Trump repeats numerous false claims in prime-time address"
date: "2025-12-17"
section: "Politics"
url: "https://www.cnn.com/2025/12/17/politics/fact-check-trump-prime-time-address?iid=cnn_buildContentRecirc_end_recirc&recs_exp=up-next-article-end&tenant_id=related.en"
content: |
  President Donald Trump made a series of false claims during his prime-time address from the White House on Wednesday night, most of which have been debunked before. Here is a fact check of some of his assertions.
  
  Inflation under Trump:Near the end of the speech, Trump falsely claimed, “Inflation is stopped.” Inflation hasn’t stopped; the most recent available year-over-yearinflation rateat the time he spoke on Wednesday,3.0%in September, was the same asthe rate when Trump returned to office in January– in fact, if you go to multiple decimal places, the September rate was a tiny bit higher – and September was the fifth consecutive month the year-over-year rate had increased.  The year-over-year November rate released the morning after Trump’s speechwas 2.7%, but that means prices are rising less quickly than they were in September, not that inflation ceased. (The October number wasn’t calculated because of the government shutdown, which also impacted the government’s data collection in November.)
  
  Inflation under Biden:Trump repeated his false claim that “when I took office, inflation was the worst in 48 years, and some would say in the history of our country.”
  
  The year-over-year inflation rate in the last full month of the Biden administration, December 2024, was2.9%; it was3.0% in January 2025, the month of Trump’s second inauguration. That’s the same as the most recent available rate at the time Trump spoke on Wednesday,3.0% in September 2025. (Again, the November rate released Thursday morning was 2.7%). We don’t know who Trump was referring to when he said “some would say,” but neither the December 2024 number nor the January 2025 number was anywhere close to the worst inflation in decades or all time.
  
  It is true that the year-over-year USinflation ratehit about a 40-year high (not a 48-year high) during the Biden administration in June 2022, 9.1%, but even that was not close to the all-timerecordof23.7%, set in 1920– and it occurred more than two years before Trump returned. Inflation had plummeted before Trump’s inauguration.
  
  The cumulative increase in prices from the beginning of the Biden administration to the end was also not the worst in US history.Federal figures showthat cumulative inflation under Biden was less than half of that during President Jimmy Carter’s term.
  
  Grocery prices:After noting that the price of eggs has plummeted since March, Trump added, “And everything else is falling rapidly.” That is not true even if he was talking specifically about grocery prices, which areupthis year. Consumer Price Index data shows thata far greater numberof grocery items haveincreasedin price since he returned to office than have decreased. The most recent availableCPI figuresat the time he spoke on Wednesday, for September, showed that average grocery prices were up about 2.7% from September 2024; about 1.4% from January 2025, the month Trump returned to office; and about 0.3% from August to September.
  
  TheNovember datareleased Thursday morning showed that average grocery prices were up about 1.9% from November 2024 and about 1.2% from January 2025.
  
  Egg prices:Trump’s specific claim about egg prices was this: “The price of eggs is down 82% since March.” That needs context. The White House told CNN on Thursday morning the president was referring towholesaleegg prices, not the consumer prices that average Americans actually pay. Consumer Price Indexfiguresreleased Thursday morning show consumer egg prices were down 54% between March and November – a big drop, but much smaller than the 82% drop Trump cited. (And at the time he spoke on Wednesday night, the most recent available Consumer Price Index figures, for September, showed a 44% drop in egg prices since March.)
  
  Prescription drug prices:Trump repeated his false claim that an executive order he issued on prescription drug prices will cut those prices by “as much as 400, 500, and even 600%.” These figures are mathematically impossible; if the president magically got the companies to reduce the prices of all of their drugs to $0, that would be a 100% cut. You can read a longer fact checkhere.
  
  Gas prices:Trump said, “Gasoline is now under $2.50 a gallon in much of the country, and some states it by the way just hit $1.99 a gallon.” These claims need context.
  
  As of Wednesday, there were only four states whose average price for a gallon of regular gas was below $2.50, according todata published by AAA: Oklahoma, Arkansas, Iowa and Colorado. (Nine more states had averages between $2.50 and $2.60 per gallon.) The AAAnational averagewas $2.905 per gallon.
  
  No state had an average below Oklahoma’s $2.339 per gallon. And while some individual stations around the country were offering gas for $1.99 per gallon or less, the number was tiny; Patrick De Haan, head of petroleum analysis for the firm GasBuddy, estimated Wednesday that it was between 75 and 100 stations of the roughly 150,000 GasBuddy tracks around the country. (That doesn’t include others offering special discounts.) De Haan said Thursday that, as of the early hours Thursday morning, about 125 stations out of roughly 150,000 were at or below $1.99 per gallon.
  
  Investment in the US this year:Trump repeated his false claim that there has been “$18 trillion” in investment in the US during his second presidency, saying Wednesday, “I’ve secured a record-breaking $18 trillion of investment into the United States.” This figure is fiction. At the time he spoke on Wednesday, the White House’sown websitesaid the figure was “$9.6 trillion,” and even that is a major exaggeration; a detailed CNN review in October found the White House was counting trillions of dollars in vague investment pledges, pledges that were about “bilateral trade” or “economic exchange” rather than investment in the US, or vague statements that didn’t even rise to the level of pledges. You can read morehere.
  
  Trump and wars:Trump repeated his false claim that he has ended eight wars this year, saying Wednesday, “I’ve restored American strength, settled eight wars in 10 months.” While Trump has played a role in resolving some conflicts (at least temporarily), the “eight” figure is aclear exaggeration.
  
  Trump has previouslyexplainedthat his list of supposed wars settled includes a war between Egypt and Ethiopia, but that wasn’t actually a war; it is a long-running diplomatic dispute about amajor Ethiopian dam projecton a tributary of the Nile River. Trump’s list includesanother supposed war that didn’t actually occurduring his presidency, between Serbia and Kosovo. (He has sometimesclaimedto have prevented the eruption of a new war between those two entities, providing few details about what he meant, but that is different than settling an actual war.) And his list includes a supposed success in ending a war involving the Democratic Republic of Congo and Rwanda, but that warhas continueddespite a peace agreement brokered by the Trump administration this year – which was never signed by the leading rebel coalition doing the fighting.
  
  Trump’s list also includes an armed conflict between Thailand and Cambodia, where fightingerupted againthis month and continued into this week despite a peace agreement brokered by the Trump administrationearlier in the year.
  
  One can debate the importance of Trump’s role in having ended the other conflicts on his list, or fairly question whether some have truly ended; for example, killingcontinuedin Gaza in November after the October ceasefire deal between Israel and Hamas. Regardless, Trump’s “eight” figure is obviously too big.
  
  Migration and Biden:Trump repeated his false claim that “25 million” migrants entered the country under Biden. The “25 million” figure is false; even Trump’s previous “21 million” figure was awild exaggeration. Through December 2024, the last full month under the Biden administration, the federal government hadrecordedunder 11 million nationwide “encounters” with migrants during that administration, including millions who were rapidly expelled from the country. Even adding in the so-called gotaways who evaded detection,estimatedby House Republicans as being roughly 2.2 million, there’s no way the total was even close to what Trump has said.
  
  Trump also repeated his unsubstantiated claim that, during the Biden administration, foreign countries emptied their prisons and mental institutions to somehow send the people in them to the US as migrants, claiming that “many” members of the supposed “army of 25 million people” were “from prisons and jails, mental institutions and insane asylums.” Trump has never provided corroboration for such claims about foreign countries in general or the specific places he has named in the past: Venezuela and “the Congo.” Experts on Venezuela, the Democratic Republic of Congo and the neighboring Republic of Congosaidduring the Biden administration that they had seen no basis for Trump’s stories, the governments of both of the Congo countriestold CNN the stories are false, and an expert on the global prison populationtold CNNshe saw “absolutely no evidence” of any country emptying its prisons to somehow release prisoners into the US.
  
  Trump’s bill and Social Security:Trump repeated his false claim that the big domestic policy bill he signed earlier this year includes “no tax on Social Security.” The legislation did create an additional, temporary $6,000-per-year tax deduction for individuals age 65 and older (with a smaller deduction for individuals earning $75,000 per year or more), but the White House itself has implicitlyacknowledgedthat millions of Social Security recipients age 65 and older will continue to pay taxes on their benefits – and that new deduction, which expires in 2028, doesn’t even apply to the Social Securityrecipients who are younger than 65.
  
  Biden, crime and law enforcement:Trump falsely claimed that, under Biden, there was “crime at record levels, with law enforcement and words such as that just absolutely forbidden.” Neither of these two claims is true.
  
  There was no ban on the phrase “law enforcement” under Biden; the Biden administration itselfused the phraserepeatedly. And crime wasn’t even close to an all-time high under Biden. Crime in the US wasfar higher in the early 1990sand at various points of the1970s and 1980sthan it has been in the 2020s under either Biden or Trump.
  
  Murder spiked nationally amid the turmoil of the early stages of the Covid-19 pandemic, under bothTrump in 2020andBiden in 2021. But FBI data showed that both violent crime and property crime declined nationally under Biden in2023and2024. Trump haschallenged the FBI data, and while it does have flaws and limitations, there issimply no basisfor the notion that crime was at a record high during the Biden era.
  
  Democrats and health care:After disparaging the Affordable Care Act, popularly known as Obamacare, as the “unaffordable care act” that “was created to make insurance companies rich,” Trump added a false claim about Democrats, saying: “It was bad health care at much too high a cost, and you see that now in the steep increase in premiums being demanded by the Democrats. And they are demanding those increases and it’s their fault. It is not the Republicans’ fault. It’s the Democrats’ fault.”
  
  Democrats are not demanding steep premium increases. Rather, Democrats in Congress are trying topreventAmericans from facing steep increases in their premium payments bypushingfor an extension of the enhanced pandemic-era Obamacare premium subsidies that are scheduled to expire at the end of the year. Many Republicans are opposed to an extension.
  
  A White House spokesperson claimed Thursday on condition of anonymity that “(Trump’s) point was that Democrats just want to increase the amount of government money going to insurance companies, which allows them to increase their premiums wantonly and get rewarded for it.” But what Trump actually said was that Democrats are pushing for steep premium increases, and that is just not true.
  
  Coal:Trump said, as he regularly does, that “We’re bringing back clean, beautiful coal.” Though it’s true he hasmade effortsto revive US coal production, it’snot true that coal is “clean”; its use as a power source createspolluting emissionsthat harm humans and the environment, even with technological improvements that can reduce the emissions levels.
  
  This article has been updated with additional items and November inflation data released the morning after Trump’s address.
