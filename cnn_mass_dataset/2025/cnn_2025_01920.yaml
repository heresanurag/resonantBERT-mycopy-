  Before people were forcibly transferred or deported, “arrests, detentions, various forms of violence – sometimes including torture – searches (and) confiscations of documents and property” took place, the commission found.
  
  Moscow has long been accused of forcibly transferring Ukrainian children from Russian-occupied areas of Ukraine. These transfers have largely been into Russia.
  
  In March 2023, the International Criminal Courtissued arrest warrantsfor Russian President Vladimir Putin and Russian official Maria Lvova-Belova for allegedly directing the forced transfer of Ukrainian children to Russia, a war crime. At the time, the Kremlin denounced the ICC’s action as “outrageous and unacceptable,” saying that Russia does not recognize the jurisdiction of the court.
