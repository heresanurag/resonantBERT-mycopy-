title: "A tiny island country is selling citizenship for $105,000 to save itself from rising seas"
date: "2025-03-05"
section: "Climate"
url: "https://www.cnn.com/2025/03/05/climate/nauru-passport-program-rising-seas?cid=ios_app"
content: |
  Citizenship of Nauru, an island nation spanning just 8 square miles in the southwest Pacific Ocean, can be yours for $105,000. The tiny, low-lying island has launched a “golden passport” initiative with the aim of raising money tofund climate action.
  
  Nauru faces an existential threat from rising sea levels, storm surges and coastal erosion as the planet warms. But the world’s third smallest country lacks the resources to protect itself from a climate crisisdisproportionately driven by wealthy countries.
  
  The government says selling citizenship will help raise the funds needed for a plan to move 90% of the island’s around 12,500-strong populationonto higher groundand build an entirely new community.
  
  Golden passports are not new but they are controversial; history is littered with examples of them being exploited for criminal actions. Yet as developing countriesstruggle to get the moneythey need to deal with escalating climate impacts — a funding gap likely to be exacerbated by the USwithdrawal from global climate action— they are being forced to find new ways to raise cash.
  
  “While the world debates climate action, we must take proactive steps to secure our nation’s future,” Nauru’s President David Adeang told CNN.
  
  The passportswill cost aminimum of $105,000, but will be prohibited for people with certain criminal histories. A Nauru passport offers visa-free access to 89 countries including the United Kingdom, Hong Kong, Singapore and the United Arab Emirates.
  
  Few of these new passport holders are likely to ever even visit remote Nauru, but citizenship allows people to lead “global lives,” said Kirstin Surak, associate professor of political sociology at the London School of Economics and the author ofThe Golden Passport: Global Mobility for Millionaires. This can be particularly useful for those with more restrictive passports, she told CNN.
  
  For Nauru, this program is being pitched as a chance to secure the future of the island, which has a difficult, dark history.
  
  Nauru was strip mined for phosphate from the early 1900s. For nearly a century, the landscape was gouged by miners, leaving the center of the island a near barren landscape of jagged rocks.
  
  It has leftaround 80%of the island uninhabitable, meaning most people now live clustered along the coastlines, exposed to sea level rise, which has been increasing here at afaster rate than global average.
  
  Once the phosphate ran out, Nauru looked for new revenue sources. Since the early 2000s, it has served as anoffshore detention sitefor refugees and migrants attempting to settle in Australia — a program scaled back after detainee deaths.
  
  Now, the island is at the center of a controversial plan tomine the deep seafor materials for the green transition.
  
  Nauru was even in the sights of now-disgracedcryptocurrency entrepreneurSam Bankman-Fried, who floated a plan to buy the island and build a bunker to survive an apocalypse, according to 2023 filings in a lawsuit against him.
  
  For the people who live there, however, Nauru feels anything but future-proofed.
  
  “A lot of people residing on the coast have already lost land — some have had their entire houses engulfed by king tides and they have lost everything,” Tyrone Deiye, a Nauruan national and a researcher at Monash Business School in Australia, said in astatement.
  
  Selling citizenship has the potential to make “an absolutely enormous” economic impact for micro-states like Nauru, LSE’s Surak said.
  
  Nauru expects to make around $5.6 million from the program in its first year, eventually scaling that to around $42 million a year. It will be built up gradually “as we assess for any unintended consequences or negative impact,” said Edward Clark, CEO of Nauru Economic and Climate Resilience Citizenship Program. Ultimately they hope the program will make up 19% of total government revenue.
  
