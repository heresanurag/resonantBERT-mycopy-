  The success of the program will depend on how “revenues are channeled into the country, and what they are used to do,” Surak said. That means vetting andtransparency on where the funds go, and preventing people who would otherwise be prohibited from being granted passports from paying officials off the books to get one, she added.
  
  An earlier program to sell citizenship in the mid-1990s was mired in scandal, including the2003 arrest in Malaysiaof two alleged Al Qaida terrorists carrying Nauru passports.
  
  The government says the program’svetting will be stringent and exclude those from countries designated as high risk by the United Nations, including Russia and North Korea. Partnerships with international organizations including the World Bank will provide “expertise and oversight,” said President Adeang.
  
  Nauru is not the first country to look to fund climate action by selling passports. The Caribbean nation of Dominica, which has been selling citizenshipsince 1993, recently said it was using some of the proceeds to fund its “commitment to be theworld’s first climate resilient countryby 2030.”
  
  It may be a route other countries consider as the burden of dealing with the costs of climate change far outweigh their economic resources, all while international climate funding appears to be drying up.
  
  “Nauru highlights the opportunities for climate vulnerable countries to become testing grounds for climate innovation,” Clark said.
