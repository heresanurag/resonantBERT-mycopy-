  # Israel receives remains of two deceased hostages held in Gaza
  
  By Mohammad Al Sawalhi, [![Image 1: Tal Shalev](https://media.cnn.com/api/v1/images/stellar/prod/cnn-international-tal-shalev-profile.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/tal-shalev)[Tal Shalev](https://www.cnn.com/profiles/tal-shalev), Ibrahim Dahman and [![Image 2: Oren Liebermann](https://media.cnn.com/api/v1/images/stellar/prod/170824162227-oren-liebermann.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/oren-liebermann)[Oren Liebermann](https://www.cnn.com/profiles/oren-liebermann)
  
  Updated Oct 31, 2025
  
  Updated Oct 31, 2025, 1:02 AM ET
  
  PUBLISHED Oct 30, 2025, 11:23 AM ET
  
  The Middle East Israel-Hamas war
  
  [See all topics](https://www.cnn.com/follow)
  
