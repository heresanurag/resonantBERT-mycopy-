title: "‘Confused and scared’: Inside the middle-of-the-night effort to repatriate Guatemalan children in US custody"
date: "2025-09-03"
section: "Politics"
url: "https://www.cnn.com/2025/09/03/politics/migrant-children-repatriated-guatemala-scared"
content: |
  It began with a pair of notices from the Trump administration and then a flood of messages and calls among attorneys and child advocates: Guatemalan children in US government custody were being moved in the middle of the night to besent back to their home country.
  
  Late Saturday and into the early morning hours of Sunday, staff at shelters woke children up — some of them crying or vomiting in fear, legal filings say — to prepare them to fly back to their home country. Shelter providers were directed to collect personal belongings and any necessary medications, as well as two prepared sack lunches. Attorneys, meanwhile, were advised their clients were going to be removed from the country.
  
  The South Texas Pro Bono Asylum Representation Project (ProBAR), which provides legal services at nearly two dozen shelters for migrant kids, immediately deployed staff to facilities.
  
  “At all of the shelters visited in the middle of the night, ProBAR staff witnessed children who had been pulled out of their beds. They were confused and scared,” said Lauren Fisher Flores, legal director of ProBAR, in a declaration submitted Wednesday as part of an ongoing lawsuit against the administration’s attempt to repatriate Guatemalan kids.
  
  Seventy-six children were prepared for repatriation, placed on planes for departure then abruptly returned to US custody after a federal judge temporarily blocked their removals.
  
  The last child was placed back at a shelter at around 1:30 a.m. Monday — more than 24 hours after the whole episode began.
  
  The Trump administration has fixated onunaccompanied migrant childrenin US government custody, as well as those residing in the country with family or legal guardians, arguing that the previous administration mishandled their care. Former Biden officials and experts dispute that characterization, but it’s served as the premise for a series of policy changes that have overhauled the way the US government handles migrant kids
  
  The latest move to pull Guatemalan children from US custody to send them back to their home country raised alarm among attorneys who represent them and the child advocates who work with them. Many children in custody, they say, are in immigration proceedings to determine whether they have protections in the US after fleeing dangerous conditions in Guatemala.
  
  The administration, in a notice to legal service providers late Saturday, said the effort stemmed from a request from Guatemala, stating that the country “requested the return of certain unaccompanied alien children in federal custody for the purposes of reunifying the UAC with suitable family members.”
  
  A senior Guatemalan official told CNN that in diplomatic exchanges between the two governments over the summer Guatemala said it would be open to receiving unaccompanied minors as long as they received due process. The issue, Guatemalan officials have said, came up in June, during a visit by Homeland Security Secretary Kristi Noem. At the time, the Guatemalan government expressed a desire for the US to return children who were close to aging out of the custody of Health and Human Services, to avoid those teens being placed in Immigration and Customs Enforcement custody.
  
  A diplomatic note from Guatemala reiterated the need to “guarantee due process of these minors,” and listed protocols to ensure the safe return of kids, the official said. In Guatemala, meanwhile, the government started the process of locating the families of those minors.
  
  The children, ranging in age, are believed to not have a parent in the US, though they may have a relative.
  
  “We are prepared to receive them,” Guatemalan President Bernardo Arévalo said this week. “Our programming allows us to receive approximately 150 children per week under ideal conditions, facilitating their safe relocation. The exact number depends on our capacity to identify family members and ensure a secure return.”
  
  Unaccompanied migrant children go through immigration proceedings to determine whether they have relief available to them in the US, given conditions at home. Some children opt to voluntarily leave but those who request it must have it approved by an immigration judge. It’s unclear what immigration process the administration used in its attempt to remove the children.
  
  For now, the effort is temporarily blocked amid an ongoing legal dispute. Early Sunday, attorneys argued in a lawsuit against the administration that officials were violating US law, which affords unaccompanied migrants special protections and ensures kids aren’t removed without due process or the opportunity to seek a court’s intervention before they’re deported.
  
  A federal judge temporarily blocked the initiative over the weekend. And on Wednesday, attorneys filed a new request for the court to indefinitely block the transfer, repatriation, or removal of unaccompanied Guatemalan minors in US custody, requesting that the Office of Refugee Resettlement, which is charged with the care of children, follow standard protocols for release and reunification.
  
  Senior Trump officials have pushed back on criticism over the repatriation of Guatemalan minors.
  
  “The Biden judge is effectively kidnapping these migrant children and refusing to let them return home to their parents in home country,” said White House deputy policy chief of staff Stephen Milleron X Sunday.Department of Homeland Security spokeswoman Tricia McLaughlincalled it“disgusting and immoral” that the kids would be in shelters in the US rather than reunified with their families.
  
  In court proceedings Sunday, the Justice Department argued that the government of Guatemala requested the children and that their parents or legal guardians requested their repatriation.
  
  The case has since been assigned to another judge, who’s a Trump appointee. Judge Sparkle L. Sooknanan, a Biden appointee who halted the removals over the weekend, was the on-call emergency judge that day and now the case has been assigned in the regular course.
  
  A spate of declarations from children and attorneys, as part of the latest court filing, reveal some of the chaos that ensued in the overnight hours over the weekend.
  
  Flores described a young girl who was “extremely distraught, crying and repeatedly saying that she could not go back to Guatemala.” At a different shelter, another girl vomited. And at another facility, a teenager expressed fear of being killed if returned to Guatemala. None of the parents in Guatemala requested the return of their children, according to Flores.
  
  A separate group that works with children, the Young Center for Immigrant Children’s Rights, said that of the more than 100 Guatemalan children who don’t have a parent in the United States, only two of the kids they work with have requested and received permission from an immigration judge to return through voluntary departure.
  
  One Guatemalan mother, whose child is living with a foster family in California, said she wanted her daughter to remain in the United States, citing abuse by her father and poor conditions at home in her country, according to a declaration submitted to court.
  
  In another filing, a father residing in Guatemala recalled being notified last month that the US government was going to return his child, adding that neither he nor his wife had asked for their daughter’s return.
  
  “I am afraid for my daughter to be deported to Guatemala. My wife and I would like our daughter to remain in New York, where she has safety and stability… She should remain in the United States so that she can have her case heard,” said the father, identified as Rudy Anibal Tiul Cucul, according to the filing.
  
  More than a dozen declarations from teenagers described fear of returning to Guatemala for various reasons, including abuse and neglect at home, and the desire to continue their immigration proceedings in the United States. Two described being woken up in the middle of the night to be removed.
  
  “Late Saturday night, we went to bed as normal. But then somebody woke me up and told me to come down to the main floor with other Guatemalan children. They sat us down and the director told me that they received a letter that all Guatemalans had to be returned to our home country,” a 16-year-old said, according to a declaration. “When I was packing up my personal belongings, I was thinking about everything that could happen to me with all the crime in Guatemala. I was worried I would be killed.”
  
  There are just under 2,000 children in HHS custody, according to federal data.The majority of the unaccompanied migrant childrenwho arrive to the US southern border are from Guatemala, Honduras or El Salvador.
  
  The Trafficking Victims Protection Reauthorization Act, which has been in place for more than two decades, provides protections for unaccompanied migrant children who arrive and reside in the US, including screening them to see if they are victims of human trafficking or have a credible fear of persecution in their home country. Attorneys and child advocates who work with children have said that returning kids to their home country to be with family is not always in their best interest.
