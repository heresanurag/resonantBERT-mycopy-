title: "UN human rights chief says US strikes on alleged drug boats are ‘unacceptable’"
date: "2025-10-31"
section: "World"
url: "https://www.cnn.com/2025/10/31/world/un-human-rights-chief-drug-boats-strikes-intl?Date=20251031&Profile=CNN&utm_content=1761918021&utm_medium=social&utm_source=bluesky"
content: |
  The UN human rights chief said Friday that USmilitary strikesagainst boats in the Caribbean Sea and eastern Pacific Ocean allegedly carrying illegal drugs from South America are “unacceptable” and must stop.
  
  The UN High Commissioner for Human Rights,Volker Türk, called for an investigation into the strikes, in what appeared to mark the first such condemnation of its kind from a United Nations organization.
  
  Ravina Shamdasani, a spokeswoman for Türk’s office, relayed his message Friday at a regular UN briefing: “These attacks and their mounting human cost are unacceptable. The US must halt such attacks and take all measures necessary to prevent the extrajudicial killing of people aboard these boats.”
  
  She said Türk believed “airstrikes by the United States of America on boats in the Caribbean and in the Pacific violate international human rights law.”
  
  US PresidentDonald Trumphas justified the attacks on the boats as a necessary escalation to stem the flow of drugs into the United States, but the campaign against drug cartels has been divisive among countries in the region.
  
  The strikes and the US military’s growing presence near Venezuela have stoked fears that the Trump administration couldtry to topple Venezuelan President Nicolás Maduro, who faces charges of narcoterrorism in the United States.
  
  Asked Friday if he’s considering land strikes in Venezuela,Trump said, “No.”He did not elaborate as he spoke to reporters aboard Air Force One as he heads to Florida for the weekend.
  
  Speaking earlier this week from the USS George Washington aircraft carrier in Japan, Trump noted the US attacks at sea and reiterated that “now we’ll stop the drugs coming in by land.”
  
  US Defense Secretary Pete Hegseth on Wednesday announced the latest US military strike in the campaign, against a boat he said was carrying drugs in the eastern Pacific Ocean. All four people aboard were killed. It was the 14th strike since the campaign began in early September, while the death toll has grown to at least 61.
  
  Shamdasani noted the US explanations of the efforts as an anti-drug and counterterrorism campaign, but said countries have long agreed that the fight against illicit drug trafficking is a law enforcement matter governed by “careful limits” placed on the use of lethal force.
  
  Intentional use of lethal force is allowed only as a last resort against someone representing “an imminent threat to life,” she said. “Otherwise, it would amount to a violation of the right of life and constitute extrajudicial killings.”
  
  The strikes are taking place “outside the context” of armed conflict or active hostilities, Shamdasani said.
