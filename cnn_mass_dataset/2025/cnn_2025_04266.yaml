title: "Syria to hold parliamentary ballot in September as first elections since Assad’s removal"
date: "2025-07-27"
section: "Middle East"
url: "https://www.cnn.com/2025/07/27/middleeast/syria-first-election-since-assad-intl-latam?tenant_id=related.en&iid=cnn_buildContentRecirc_end_recirc&recs_exp=more-from-cnn-right-rail"
content: |
  Syriawill hold parliamentary elections in September, the head of a body tasked with organizing the election process told state media Sunday.
  
  Mohammed Taha al-Ahmad, chairman of the Higher Committee for People’s Assembly Elections, told state news agency SANA that elections will take place between Sept. 15 and 20. They will be the first to take place under the country’s new authorities after thefall of former President Bashar Assadin a lightning rebel offensive in December.
  
  One third of the 210 seats will the appointed by interim President Ahmad al-Sharaa, with the rest to be elected.
  
  In a recent interview with the Erem News site, another member of the elections committee, Hassan al-Daghim, said an electoral college will be set up in each of Syria’s provinces to vote for the elected seats.
  
  Atemporary constitutionsigned by al-Sharaa in March called for a People’s Committee to be set up to serve as an interim parliament until a permanent constitution is adopted and general elections held, a process that could take years.
  
  The announcement of impending elections comes at a time when the country is increasingly divided in its views of the new authorities in Damascus after sectarian violence broke out in the southern province ofSuwaydaearlier this month. The fighting killed hundreds of people and threatened to unravel Syria’s fragile postwar transition.
  
  The violent clashes, which broke out two weeks ago, were sparked by tit-for-tat kidnappings between armed Bedouin clans and fighters from theDruzereligious minority.
  
  Syrian government forces intervened, ostensibly to end the fighting, but effectively sided with the clans. Some government fighters reportedly executed Druze civilians and burned and looted houses. Israel intervened, launching airstrikes on government forces and on the Defense Ministry headquarters. Israel said it was acting to defend the Druze minority.
