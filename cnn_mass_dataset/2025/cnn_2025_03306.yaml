  👋Welcome to 5 Things PM!The cosmic origins of heavy elements, like gold, have mystified scientists for decades. New research based on archival space mission data may haverevealed a potential clue.
  
  Here’s what else you might have missed during your busy day:
  
  1️⃣Coping with chaos:Because of Elon Musk’s Department of Government Efficiency, tens of thousands of federal workers have been fired or quit, leaving those who are still employedto cope with a new culture at work. One said “people are afraid to do things that were once routine.”
  
  2️⃣Ending Energy Star:Sources tell CNN that the Trump administration is preparing to eliminate Environmental Protection Agency divisions focused on climate change and energy efficiency. That could doom the Energy Star program, which certifies appliances tohelp consumers get tax credits and save money.
  
  3️⃣Toy tariffs:Mattel, the maker of Barbie, announced plans toraise prices on American toys because of tariffs. Nearly 80% of all toys sold in the US are manufactured in China, which was hit with 145% tariffs.
  
  4️⃣Future of flying?Aircraft manufacturer Cirrus is launchinga new safety systemin a single-engine piston airplane. The “Safe Return” feature will automatically direct the plane to the closest available runway and land in an emergency if the pilot can’t do so.
  
  5️⃣Relationship burnout:Find yourself resenting your partner? Too tired for date night or feeling uncertain about your future? A marriage and family therapistoffers these tipsfor dealing with emotional exhaustion.
  
  🧳Passport for preschool:Michael and Dorothy Brockwell joined the growing number of “digital nomads” who can relocate because of remote employment. The Australian couple moved to Japan withtheir 3-year-old daughter, Kinga, for a preschool exchange program.
  
