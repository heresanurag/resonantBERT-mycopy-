  Iowa’s Supreme Courthas expressly rejectedthe argument that discrimination based on sex includes discrimination based on gender identity.
  
  Several Republican-led legislatures arepushing to enact more lawsthis year creating legal definitions of male and female based on the reproductive organs at birth followingan executive orderfrom President Donald Trump.
  
  Trump also signed orders laying the groundwork for banning transgender people frommilitary serviceand keeping transgender girls and women out of girls and women’ssportscompetitions, among other things. Most of the policies are beingchallenged in court.
  
  On Thursday night, Trump wrote on Truth Social: “Iowa, a beautiful State that I have won BIG every time, has a Bill to remove Radical Gender Ideology from their Laws. Iowa should follow the lead of my Executive Order, saying there are only two genders, and pass this Bill – AS FAST AS POSSIBLE. Thank you Iowa!”
