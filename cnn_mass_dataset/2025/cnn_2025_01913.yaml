id: cnn_2025_01913
title: "ICE arrests superintendent of Iowa’s largest school district"
date: "2025-09-26"
section: "US"
url: "https://www.cnn.com/2025/09/26/us/ian-roberts-des-moines-superintendent-arrested-ice?iid=cnn_buildContentRecirc_end_recirc&recs_exp=more-from-cnn-right-rail&tenant_id=popular.article.en"
content: |
  The superintendent of Des Moines Public Schools — Iowa’s largest school district – was detained Friday morning by immigration agents, according to the Department of Homeland Security, which said the educator was in the country illegally and had existing weapon possession charges.
  
  Superintendent Ian Roberts – an educator with decades of experience who previously competed as anOlympic athlete for Guyana– was arrested as part of a “targeted enforcement operation” and fled after US Immigration and Customs Enforcement officers approached him, according to statements from DHS and the Iowa Department of Public Safety.
  
  DHS said he was “in possession of a loaded handgun, $3,000 in cash and a fixed blade hunting knife” at the time of his arrest. It’s a violation of federal law to own a firearm and ammunition if an individual doesn’t have legal status in the US.
  
  The school district and DHS presented starkly divergent portraits of Roberts. DHS described him as a “criminal alien” and suggested he was a public safety threat. But at a news conference after his arrest, board president of Des Moines Public Schools Jackie Norris said the superintendent was “an integral part of our school community” who “has shown up in ways big and small” for students and staff. And Roberts disclosed his weapon charge, related to a hunting rifle, when he was hired, a district spokesperson told CNN.
  
  The arrest spurred a protest outside the federal courthouse in Des Moines. “Education, not deportation / Free Dr. Roberts,” read one sign carried by a demonstrator, according to footage fromCNN affiliate KCCI. Local education and immigration advocacy groups have rallied behind the superintendent.
  
  The Iowa Board of Educational Examiners issued Roberts a license to serve as superintendent in the state in July 2023, according to Norris.
  
  “There is new information that has been made public that we did not know, and we have not been able to verify,” Norris said.
  
  Roberts oversaw over 30,000 students in the Des Moines public school system, according to the district’s website, and had previously worked at public schools across the country.
  
  Another administrator, Matt Smith, has taken the role of interim superintendent in the meantime, according to amessage posted on social mediaby the district earlier.
  
  “Our priority is to provide a safe, secure and outstanding education for all students and to support our students, families, and employees,” the statement read.
  
  Roberts’ arrest comes amid the Trump administration’s continued crackdown on immigration, which has seenraids on workplacesandarrests of community pillarsincluding a firefighter, a journalist and a pastor.
  
  A volunteer firefighter, a beloved pastor, a prominent journalist: These are the community pillars being detained by ICE
  
  Roberts entered the US on a student visa in 1999 and was given a final order of removal by an immigration judge in May 2024, according to the DHS statement. He had existing weaponcharges from 2020, the agency added.
  
  Des Moines Public Schools said it was unaware of the order of removal but Roberts did inform the school board of a firearms offense related to a hunting rifle during his hiring process. The district said in a statement Roberts “provided sufficient context and explanation of the situation to move forward in the hiring process.”
  
  Public records show Roberts pleaded guilty to a weapon charge in Pennsylvania in 2022. CNN has been unable to verify whether Roberts has a separate charge from 2020.
  
  The district also said Roberts submitted an employment eligibility verification form and an I-9 as part of the hiring process.
  
  “The district has not been formally notified by ICE about this matter, nor have we been able to talk with Dr. Roberts since his detention,” district spokesperson Phil Roeder said.
  
  ICE Enforcement and Removal Operations St. Paul Field Office Director Sam Olson said in a statement Robertson’s arrest should be a “wake-up call for our communities to the great work that our officers are doing every day to remove public safety threats.”
  
  ICE’s online detainee locatorsystemshows Roberts was born in Guyana and is being held at a county jail in Council Bluffs, Iowa.
  
