id: cnn_2025_02903
title: "Russian troops inch forward in Ukraine’s Dnipropetrovsk region"
date: "2025-08-26"
section: "Europe"
url: "https://www.cnn.com/2025/08/26/europe/russian-troops-ukraine-dnipropetrovsk-latam-intl"
content: |
  Russia has captured two villages in Ukraine’s southeastern Dnipropetrovsk region, Ukrainian open-source researchers confirmed on Tuesday, as Kremlin troops press an offensive amid a stalling diplomatic effort to end the war.
  
  Ukraine’soutmanned and outgunned military has struggled to fend off grinding Russian advances in much of the east as Moscow increases pressure on Kyiv to give up territory in any peace negotiations.
  
  Russianforces now occupy the villages of Zaporizke and Novoheorhiivka, according to DeepState, a group tracking battlefield developments. Moscow’s defense ministry had previously reported capturing both villages.
  
  Ukraine’s military on Tuesday dismissed reports that Russian troops had occupied the villages as false.
  
  “Russians have entered (there) and are attempting to establish a foothold,” Ukrainian military spokesperson Viktor Trehubov told Reuters, referring to Zaporizke and Novoheorhiivka. “Our forces are fighting to maintain their positions.”
  
