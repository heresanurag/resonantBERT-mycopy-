  But there have long been indicators of a changing tide — and shrinking silhouette. At the start of the year, WGSN’s senior denim strategistSusie Draffan shared her predictions with CNN, which included a “very slow-burn return in 2025 for the skinny jean” in the face of catwalk appearances and growing Miu and McQueen all sent vacuum-packed-style denim down the Fall-Winter runways in 2024. Unofficial trend barometer Bella Hadid has also been spotted in tight drainpipe denim (styled with chunky boots) during a recent trip to Rome, while Lila Moss carries on the family name by pioneering the skinny style just like her mother.by pioneering the skinny style just like her mother.
  
  The Haim sisters have recently been delving into other areas of 2000s-era pop culture — including their own yearbook photos — to promote their new album, “I Quit .” The visual artwork for singles like “Relationships” and “Everybody’s Trying to Figure Me Out” reference famous paparazzi shots of Nicole Kidman shouting with relief (allegedly after signing her divorce papers with Tom Cruise in 2001) and Kate Moss in 2000 sunning herself against a black SUV. For their most recent single, “Take Me Back,” the band shared an image shot in Manchester — each dressed in a pair of extremely low-slung jeans and peek-a-boo lacy briefs — that has been compared by fans to a much-circulated 2004 pap shot of Keira Knightly wearing a similar outfit.
  
  It seems fitting, then, that Haim’s own paparazzi photographs act like an extension of their album narrative. Shot by Terence O’Connor, their staged images are a case of art imitating life. But the sisters are going one step further by blurring the lines between reality and reference as they commit to the sartorial touchstones of 2000s culture round-the-clock, too.
