  The universities in Toronto and Waterloo did not cite the reasons for the increase in interest, while the UBC’s Vancouver campus attributed the rise to the Trump administration’s policies.
  
  The administration hasfrozen hundreds of millionsof dollars in federal funding for numerous universities, pressing them to make policy changes and citing what it says is a failure to fight antisemitism on campus. It has begun deportation proceedings against some detained foreign students who took part in pro-Palestinian demonstrations, while visas for hundreds of other students have been canceled - actions that have raised concerns about speech and academic freedoms in the US.
  
  At the same time, Canada has capped the number ofinternational studentsallowed to enter the country for the second year in a row, meaning there may be fewer spots for US and other international students.
  
  Canada’s immigration ministry said it expects learning institutions to only accept the number of students they can support, including providing housing options. Provinces and territories are responsible for distributing spaces under the cap, the ministry said.
  
  Gage Averill, UBC Vancouver’s provost and vice president of academics, attributed the spike in US applications to the Trump administration abruptly revoking visas of foreign students and increased scrutiny of theirsocial media activity.
  
  “That, as a result, and especially as a result of the very recent crackdown on visas in the United States for international students, and now the development of a center that’s reading foreign students’ social media accounts,” Averill said.
  
  The University of Toronto, considered an alternative to US Ivy League schools, is seeing a “meaningful increase” in applications from those living or studying in the US over previous years, the university said in a statement.
  
