title: "Canadian universities report jump in US applicants as Trump cuts funding"
date: "2025-04-15"
section: "US"
url: "https://www.cnn.com/2025/04/15/us/canadian-universities-report-jump-us-applicants?cid=external-feeds_iluminar_flipboard"
content: |
  More students living in the United States are applying to Canadian universities or expressing interest in studying north of the border as President Donald Trump cuts federal funding to universities and revokes foreign student visas.
  
  Officials at the University of British Columbia’s Vancouver campus said the school reported a 27% jump in graduate applications as of March 1 from US citizens for programs starting in the 2025 academic year, compared to all of 2024.
  
  In response to rising demand for graduate-level programs, UBC Vancouver briefly reopened admissions to US citizens for several graduate programs this week with plans to fast-track applications from American students hoping to begin studies in September.
  
  The University of Toronto, Canada’s largest university by number of students, also reported more US applications by its January deadline for 2025 programs, while a University of Waterloo spokesperson reported an increase in US visitors to campus and more web traffic originating from the United States since September.
  
