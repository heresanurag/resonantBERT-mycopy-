title: "5 things to know for Sept. 25: ICE facility shooting, Government shutdown, Hurricane season, Cyberattacks, Powerball winner"
date: "2025-09-25"
section: "US"
url: "https://www.cnn.com/2025/09/25/us/5-things-to-know-for-sept-25-ice-facility-shooting-government-shutdown-hurricane-season-cyberattacks-powerball-winner"
content: |
  Jimmy Kimmel’s return to late-night television set a new record for his show. ABC says roughly6.3 million viewerswatched Kimmel’s first post-suspension episode on Tuesday, more than three times his typical audience.
  
  Here’s what else you need to know to get up to speed and on with your day.
  
  A shooting at an immigration facility in Dallas has left one detainee dead and at least two others in critical condition. The FBI is investigating the shooting as an “act of targeted violence,” after a “sniper” on a nearby rooftopfired “indiscriminately” at the ICE building. One of the injured detainees is a Mexican national, according to the Mexican government. The shooter was identified as a 29-year-old Dallas resident who died from a self-inflicted gunshot wound. Homeland Security Secretary Kristi Noem told CNN that the shooter was “very much against” ICE agents based on the evidence that has been gathered. The secretary’s comments come as President Donald Trump is blaming the shooting onrhetoric from “radical left Democrats.”
  
  The federal government could shut down next week if Congress fails to pass a spending bill by the end of the month. While essential services would remain in operation, many government agencies would come to a halt on October 1, and hundreds of thousands of federal employees would go without pay until the deadlock is resolved. The White House budget office is instructing federal agencies toprepare plans for mass firingsin the event of a government shutdown, with instructions to target programs they are not legally required to continue. The threat of mass job losses is likely to escalate the partisan funding showdown over the next several days, with Democrats demanding key concessions — most notably, an extension ofObamacare enhanced subsidiesset to expire at the end of the year.
  
  Tropical Storm Humberto has formed in the Atlantic, and another system near the Bahamas could develop soon, putting the East Coast on alert heading into the weekend. Humberto — the eighth named storm of the season — is currently about 500 miles away from the Leeward Islands and is expected tostrengthen into a Category 2 or 3 hurricanein the coming days. While it’s forecast to curve out to sea, it’s still too early to rule out potential impacts on Bermuda or elsewhere. Meanwhile, forecasters are closely monitoring a disorganized cluster of storms over the northeastern Caribbean, which is intensifying as it moves toward the Bahamas.
  
  An airport in northern Denmark was forced to close today due to unauthorized drones in its airspace — the second such incident this week. The drone sightings come amid asurge in cyberattacksand suspected Russian airspace violations across Europe. Just days ago, sightings of two or three large drones halted all takeoffs and landings for hours at the airport in Copenhagen, in what Denmark’s prime minister called a “serious attack on Danish critical infrastructure.” It’s unclear if the incidents are linked, but the pattern was similar, police said. This also follows amajor cyberattack over the weekendthat disrupted automatic check-in systems at several of Europe’s busiest airports, including London’s Heathrow.
  
  A lucky man in Missouri who won half of the nearly $1.8 billion Powerball jackpot hascome forward to claim his prize. He held one of only two tickets that matched all the numbers in the September 6 drawing, the second-largest lottery jackpot in US history. The man, who the lottery did not identify, opted for a one-time payment of $410.3 million (before taxes). While accepting the massive prize, he described himself as a homebody and said he’s looking forward to spending quality time with his wife. “The perfect day is sitting at home doing what I do — relaxing,” he said. Referring to his wife, he joked that “she’s going to drag me out of town now.” The man purchased the winning ticket at a gas station in St. Louis. The other winning ticket wassold at a convenience storein Fredericksburg, Texas.
  
  Former Vice President Kamala Harrisbegan her book tour on Wednesday, with both supporters and protesters in attendance.
  
  Coming in at number one is Jimbōchō, a corner of Tokyo known for its array of vintage bookstores.See the full list of the “world’s coolest” neighborhoods.
  
  The chart-topping couple is celebrating another achievement —a baby girl!
  
  This popular beeris reallytappinginto America’s taste buds.
  
  Babylon was once an ancient wonder. Today,it’s a very different story.
  
  37That’s how manyconfirmed Ebola caseshave been linked to a new outbreak in the Democratic Republic of Congo. The risk of spread to the US is considered low at this time, according to a CDC health advisory.
  
  “We’re hopeful, and I might say even confident, that in the coming days, we’ll be able to announce some sort of breakthrough.”
  
  — US Special Envoy Steve Witkoff
  
  Witkoff was expressing confidence that there will be “some sort of breakthrough” after the Trump administration met with Arab leaders on Tuesday and proposed a21-point peace plan to end the war in Gaza. The plan calls for a permanent ceasefire, the release of all hostages and Israel’s withdrawal from the Gaza Strip.
  
