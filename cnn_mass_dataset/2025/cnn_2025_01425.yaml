title: "Start your week smart: Alzheimer’s research, IRS audit, Trump’s first 100 days, horse racing’s future, goodbye $5 T-shirts"
date: "2025-04-27"
section: "US"
url: "https://www.cnn.com/2025/04/27/us/5-things-sunday-april-27-trnd"
content: |
  April 15 has come and gone, so you can stop worrying about your taxes for another year … or can you? With so many changes taking place at the IRS — including widespread staff departures and the implementation of artificial intelligence —how likely are you to be audited?
  
  Here’s what else you need to know toStart Your Week Smart.
  
  More than 55 million people worldwide are living with Alzheimer’s disease and other forms of dementia, and that number is expectedto nearly triple by 2050.
  
  In the United States, one huge question mark surrounds the future of Alzheimer’s research.
  
  The National Institutes of Healthhas canceled hundreds of grantsfor studies of different conditions and populations — including in states that backed President Donald Trump in the 2024 election.Some groups are suing.
  
  1️⃣Stuck in limbo:The uncertaintyalarms a lot of people, including a Florida man who was diagnosed with early onset Alzheimer’s disease at age 46. Francisco Rios and his wife are racing to check items off their travel bucket list.
  
  2️⃣Sleep well:Not spending enough time in thetwo deep stages of sleep— slow-wave and rapid eye movement — may hasten the deterioration of parts of the brain associated with Alzheimer’s disease, a recent study found.
  
  3️⃣Tech effect:It’s important to keep your brain active. The use of computers and other forms of technology was linked witha lower risk of cognitive declinelater in life, according to new research.
  
  4️⃣Raising the risk:How you managea cluster of health conditionsknown as metabolic syndrome could have a big impact on whether you develop dementia at a young age.
  
  🎧Listen in:CNN Chief Medical Correspondent Dr. Sanjay Gupta explainswhy there’s more hopefor Alzheimer’s patients — and what it’s liketo take the test.
  
  5️⃣Blood markers:Instead of relying on painful spinal taps and expensive brain scans, new tests offera quick and easy way to determine riskand aid in an earlier diagnosis of Alzheimer’s.
  
