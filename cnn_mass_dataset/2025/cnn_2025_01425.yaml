  MondayCanada willhold national elections, where Prime Minister Mark Carney is vying for a chance to continue leading the country as tensions grow with the US. The former central banker’s main competition in the vote is Pierre Poilievre, Canada’s Conservative Party leader, whose political capital has declined as US-Canada relations nosedive amid threats from President Donald Trump.
  
  AMassachusetts District Court judgeis expected to hold a hearing inHarvard’s lawsuit against the Trump administrationafter it froze over $2 billion in multi-year grants and contracts when the university’s leadership refused to make key policy changes.
  
  Also on Monday, the Trump administration is expected to ask Congress toend federal funding for PBS and NPR— casting the organizations as wastes of money that “spread radical, woke propaganda.” Such a proposal would start a 45-day clock for the House and Senate to either vote to cut the funding or ignore the proposal and keep the funding intact. At an annual cost of $535 million to taxpayers, such stations provide access to educational shows, emergency alerts and a wide array of radio and TV programming, including educational programs like “Sesame Street.”
  
  TuesdayApril 29 marks 100 days of President Trump’s second term in office, and CNN’s anchors and correspondents will discuss his administration’s actions and policies as part of the day’s coverage. Do you have questions for our journalists who cover the administration?Submit them here, and they may be answered during a live chat at midday Eastern time.
  
  We’ll also get the latest reading on how Americans are feeling about the economy. Consumer confidenceslid last monthto its lowest level since January 2021 — extending a decline that began in December, when President Trump began rolling out the details of his sweeping economic agenda.
  
  Wednesday﻿April 30 is the 50th anniversary of theend of the Vietnam War, when South Vietnam surrendered as North Vietnamese troops took control of Saigon — now Ho Chi Minh City.
  
  ThursdayMay 1 is International Workers’ Day. Several unions and immigrant rights groups are planning nationwide protests againstsweeping cuts to the federal workforceand thedeportation of migrantsbeing carried out by the Department of Government Efficiency and the Trump administration.
  
  FridayMay 2 marks the end of the “de minimis” shipping exemption that allows packages worth less than $800 toenter the US tax-free, which means Shein and Temu customers could see higher prices and longer shipping times.
  
  One Thing: 🎧 Horse racing’s futureIn this episode of the “One Thing” podcast, CNN’s Katie Bo Lillis explains how the sport of horse racing is trying to balance animal welfare with shifting economics as it tries to remain relevant. Listenhere.
  
  Check out more imagesfrom the week that was, curated by CNN Photos.
  
  TV and streamingCNN Original Series“Eva Longoria: Searching for Spain”premieres tonight at 9 p.m. ET/PT on CNN.
  
  In theatersMarvel’s“Thunderbolts*”opens Friday, starring Florence Pugh, David Harbour, Lewis Pullman, Julia Louis-Dreyfus and Sebastian Stan, among others. It follows a group of antiheroes embarking on a dangerous mission that forces them to confront their pasts. Pugh previously played Yelena Belova in 2021’s “Black Widow” film and in the Disney+ miniseries “Hawkeye.” She will also appear in the upcoming “Avengers: Doomsday” movie in 2026.
  
  And Alec Baldwin stars in“Rust,”which isbeing releasedmore than three years after the film’s cinematographer,Halyna Hutchins, was killed on the New Mexico set. Baldwin, who also co-produced the film, was charged with involuntary manslaughter in connection with the shooting before the case wasdismissedthree days into the 2024 trial.
  
  At a glance …There are plenty of options for sports fans to pick from today, from playoff games in theNBAand theNHL, to the final round of professional golf’sZurich Classic, the lone team event on the PGA Tour schedule.
  
  President Trump will welcome thePhiladelphia Eaglesto the White House on Monday to celebrate their victory in Super Bowl LIX.
  
  And the 151st Kentucky Derby, aka the“Run for the Roses,”is set for Saturday at Churchill Downs in Louisville.
  
