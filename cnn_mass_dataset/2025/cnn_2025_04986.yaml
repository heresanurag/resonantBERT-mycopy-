title: "Trump says he’s ordered Pentagon to ‘prepare for possible action’ in Nigeria"
date: "2025-11-01"
section: "Politics"
url: "https://www.cnn.com/2025/11/01/politics/trump-pentagon-nigeria-action?Date=20251101&Profile=CNN+International,CNN+Politics&utm_content=1762036605&utm_medium=social&utm_source=facebook"
content: |
  US President Donald Trump said Saturday he has ordered the Defense Department to prepare for possible military action in Nigeria as he continues to accuse the nation of not doing enough to stem violence against Christians — an accusation Nigeria has repeatedly denied.
  
  In a social media post criticizing what he called the “mass slaughter” of Christians in the country, Trumpwrotethe United States would “immediately stop all aid and assistance to Nigeria” and warned the government there to “move fast.”
  
  In the lengthy message, Trump said the US “may very well go into that now disgraced country, ‘guns-a-blazing,’ to completely wipe out the Islamic Terrorists who are committing these horrible atrocities.”
  
  Both Christians and Muslims have been victims of attacks by radical Islamists in the country of more than 230 million people. The violence in the country is driven by varying factors: some incidents are religiously motivated and affect both groups, while others arise from disputes between farmers and herders over limited resources, as well as communal and ethnic tensions.
  
  Although Christians are among those targeted, local reports indicate that most victims are Muslims living in Nigeria’s predominantly Muslim north.
  
  “I am hereby instructing our Department of War to prepare for possible action,” Trump wrote. “If we attack, it will be fast, vicious, and sweet, just like the terrorist thugs attack our CHERISHED Christians! WARNING: THE NIGERIAN GOVERNMENT BETTER MOVE FAST!”
  
  “Yes sir,” US Secretary of Defense Pete Hegseth posted on social media with a screenshot of Trump’s comments.
  
  “The killing of innocent Christians in Nigeria — and anywhere — must end immediately. The Department of War is preparing for action. Either the Nigerian Government protects Christians, or we will kill the Islamic Terrorists who are committing these horrible atrocities.”
  
  Trump’s announcement comes after he accused Nigeria of religious freedom violations on Friday, claiming that “Christianity is facing an existential threat in Nigeria” and designating the nation as a “Country of Particular Concern” under theInternational Religious Freedom Act. The label is a suggestion that his administration has found that Nigeria has engaged in or tolerated “systematic, ongoing, (and) egregious violations of religious freedom.”
  
  In a social media post after the designation, but before Trump’s mention of the military, Nigerian President Bola Tinubuwrote: “The characterisation of Nigeria as religiously intolerant does not reflect our national reality, nor does it take into consideration the consistent and sincere efforts of the government to safeguard freedom of religion and beliefs for all Nigerians.”
  
  He added that Nigeria is “working with the United States government and the international community to deepen understanding and cooperation on protection of communities of all faiths.”
  
  Tinubu’s press secretary, responding to a social media post from US Secretary of State Marco Rubio condemning the “slaughter of thousands of Christians,” called the characterization “a gross exaggeration of the Nigerian situation,” adding that “Christians, Muslims, churches and mosques are attacked randomly.”
  
  “What our country requires from America is military support to fight these violent extremists in some states of our country, not designation as a nation of particular concern,” said Bayo Onanuga.
  
  Spokespersons for the White House and Tinubu’s office did not immediately respond to requests for comment.
  
  This story has been updated with additional information.
