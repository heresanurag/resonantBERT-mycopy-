title: "Do you need a measles booster? Here’s what experts say"
date: "2025-02-13"
section: "Health"
url: "https://www.cnn.com/2025/02/13/health/measles-vaccine-shot-booster-adults-wellness"
content: |
  Measles casesare popping up across the country, especially in areas with lower vaccination rates.
  
  Measles outbreak expands in West Texas around county with low vaccination rate
  
  There were 285 cases reported in the US last year, the most since 2019, according to the USCenters for Disease Control and Prevention.And cases have already emerged in 2025: Two cases of measles were detected inmetro Atlantalast week; this week, one case was confirmed inNew Mexico, and an outbreak inWest Texasis growing, with24 cases, according to the state health department. Cases have also been identified in Alaska, Rhode Island and New York City.
  
  Measles is a highly contagious airborne illness that can cause rash, fever, red eyes and cough. Severe cases can result in blindness, pneumonia or encephalitis, swelling of the brain according to theWorld Health Organization. In some cases, the illness can be fatal.
  
  Prior to the introduction of the measles vaccine in1963,the virus would claim an estimated 2.6 million lives each year worldwide. In 2023, WHO estimated that there were 107,500 measles deaths, largely in countries with low vaccination.
  
  “We’ve eliminated the memory of measles. I don’t think people remember how sick that can make you,” said Dr. Paul Offit, director of the Vaccine Education Program at the Children’s Hospital of Philadelphia.
  
  Experts say it’s a good time for everyone to be thinking about their immunity to measles.
  
  The best way to stay protected against measles is to get vaccinated, according to experts. The measles, mumps and rubella (MMR) vaccine is 93% effective against measles after one dose and 97% effective against measles after two, according to theCDC.
  
  Officials’ guidance says children should get two doses of the MMR vaccine: the first dose between 12 and 15 months and the second around age 4, before starting school.
  
  “When people consider their choice about vaccinating their child, it isn’t just about their own individual child, but this is a public health issue. … If we just stop thinking about the health of the population, we are going to see more and more vaccine-preventable illness, outbreaks occur,” said Dr. Christina Johns, a pediatric emergency physician at PM Pediatrics.
  
  Required vaccine coverage among US kindergartners dips again, new CDC data shows
  
  Older children or adults can also get vaccinated if they didn’t get the vaccine as a child, she says. However, people born before 1957 are likely to have been naturally infected and thus already have immunity, according to theCDC.
  
  CDC guidancealso indicates that if someone is exposed to measles, getting the MMR vaccine within 72 hours could induce some protection or result in less serious illness.
  
  Across the country, cases are rising now in large part due to declining vaccination rates, which Johns said stems from “the misinformation and disinformation campaigns that have gone wild and run rampant.”
  
  Arecord shareof US kindergartners had an exemption for required vaccinations last school year, leaving more than 125,000 new schoolchildren without coverage for at least one state-mandated vaccine, according todatapublished by the CDC in October.
  
  The US Department of Health and Human Services has set agoalthat at least 95% of children in kindergarten will have gotten two doses of the MMR vaccine, a threshold necessary to help prevent outbreaks of the highly contagious disease. The US has now fallen short of that threshold for four years in a row.
  
  Titer tests at a primary-care office can be used to check for immunity against measles. Some doctors say that this is not necessary, though, if you have gotten both recommended doses of the MMR vaccine or have had the measles itself.
  
  Titer tests can detect the presence of antibodies - infection fighting proteins produced by immune cells in response to a specific foreign pathogen - at high concentrations. When you have an infection or you get vaccinated, your immune cells learn how to produce antibodies against the virus and can stay in your system for years, helping fight repeat or future infections.
  
  Very anxious: Nurse reacts to being on frontlines of viral diseases as Minnesota sees uptick in outbreaks
  
  In the case of measles, a virus with a longer incubation period, the body has longer to prepare to fight the infection, including more time to produce antibodies. So even if the titer tests don’t show high levels of antibodies, your immune memory cells may still be able to respond to the virus quickly, according to Offit.
  
  “All you need is memory,” he said. “It’s not likely tested in a commercial laboratory.”
  
  The commercial laboratory tests or titer tests are most useful for people who don’t know their vaccination status, experts say.
  
  This happens “particularly if they don’t have access to their own vaccination records, which is so often the case because people move, pediatric practices go – the pediatrician passes away or retires and you can’t contact the office anymore,” said Dr. William Schaffner, an infectious disease expert at Vanderbilt University Medical Center.
  
  Doctors may also want to test people who haveweakened immune systemsto see how much immunity they have to measles. In this case, immunosuppressed patients may not be eligible for the vaccine, which uses live but weakened form of the virus, but they may want information about their immunity status and to discuss further with providers.
  
  If you were vaccinated withthe first version of the measles vaccine - a killed-virus vaccine used between 1963 and 1968 - or don’t know which type of vaccine you received, theCDCrecommends getting at least one dose of MMR.
  
