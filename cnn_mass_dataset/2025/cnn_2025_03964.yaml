  # Russia launches deadly strikes in Kyiv as peace talks continue in Abu Dhabi
  
  By [![Image 1: Natasha Bertrand](https://media.cnn.com/api/v1/images/stellar/prod/220324095143-new-bertand-headshot.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/natasha-bertrand-profile)[Natasha Bertrand](https://www.cnn.com/profiles/natasha-bertrand-profile), [![Image 2: Lex Harvey](https://media.cnn.com/api/v1/images/stellar/prod/lex-harvey-profile-02.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/lex-harvey)[Lex Harvey](https://www.cnn.com/profiles/lex-harvey)
  
  Updated Nov 25, 2025
  
  Updated Nov 25, 2025, 6:59 AM ET
  
  PUBLISHED Nov 25, 2025, 2:14 AM ET
  
  Russia War in Ukraine The Middle East
  
  [See all topics](https://www.cnn.com/follow)
  
