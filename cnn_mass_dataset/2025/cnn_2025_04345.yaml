title: "At the Hollow in Florida, the ‘medical freedom’ movement finds its base camp"
date: "2025-10-24"
section: "Health"
url: "https://www.cnn.com/2025/10/24/health/florida-maha-medical-freedom-movement"
content: |
  MAGA and MAHA are happily married in Florida, and nowhere more at home than in Sarasota County, where on a humid October night a crowd of several hundred gathered to honor state Surgeon General Joseph Ladapo, his wife, and an unlicensed Canadian radiologist who treats cancer with horse paste.
  
  The event,titled “The 3 Big C’s: Courage, Censorship & Cancer,” was sponsored by theWe the People Health and Wellness Center, a clinic, funded by a Jan. 6 marcher, where patients can bask in red light, sit in ozone-infused steam baths, or get their children treated for autism with an experimental blood concentrate.
  
  In Venice, in Sarasota County, a “medical freedom” movement forged in opposition to covid lockdowns blends wellness advocates, vaccine-haters, right-wing Republicans, and angry parents in a stew of anti-government absolutism and mystical belief.
  
  Ladapo’s wife, Brianna, a self-proclaimed “spiritual healer” who says she speaks with angels and has prophetic visions, chaired a panel at the event at the Venice Community Center. The keynote speech was by William Makis,a litigious covid conspiracistwho, after losing his medical license in 2019, has made a living treating cancer patients with antiparasitic drugs including ivermectin, which was also championed in some circles as a covid treatment during the pandemic.
  
  Clinical trials showed that ivermectin didn’t work, but covid skeptics viewed medicine’s rejection of it as part of a conspiracy by Big Pharma against a cheap, off-patent drug. Some of the patients in his care have what he calls “turbo cancers,” Makis says, blaming alleged impurities in mRNA vaccines that he says have killed millions of people.
  
  For Makis, it’s all one big conspiracy — the virus, the vaccine, and the suppression of his therapies.
  
  Florida plans to end vaccine mandates statewide, including for schoolchildren
  
  Brianna Ladapo has her own take on medicine, based on the idea of good and bad spiritual energy. She wrote in a memoir that as the pandemic began she intuited that it had been planned by “sinister forces” to “frighten the masses to surrender their sovereignty to a small group of tyrannical elites.” She has written that the governmenthides vaccination’s risks.
  
  She sees “dark forces” all over the place, including, she saidin a podcast interviewearlier this year, in “chemtrails” shaped like a pentagram. “They’ve been plastering it in the sky right outside our house for the last few weeks,” Ladapo said. The chemtrails “they are dumping on us,” she said, had sickened her and her three sons. “The dark side are no fans of ours.”
  
  (“Chemtrails” are a favorite topic of conspiracy theorists who say they think that contrails, the condensation formed around commercial airplane exhaust, contain toxic substances poisoning people and the terrain. Although there is zero evidence of that, Health and Human Services Secretary Robert F. Kennedy Jr.plans to look intowhether they are part of a clandestine effort to use toxic chemicals to change the weather.)
  
  Ladapo’s husband hasn’t publicly endorsed all her beliefs, but as surgeon general he’s reversing decades of accepted public health practice in Florida and embracing untested therapies. “We’re done with fear,” Joseph Ladapo said after being named surgeon general in 2021. He wants to ban mRNA vaccines in Florida, and on Sept. 3 he announced plans to end childhood vaccination mandates in the state.
  
  A few days after the Venice event, Ladaposaid he hopedto support Makis’ work — though his treatments are unproven and potentially dangerous — through a new $60 million cancer research fund created by Florida Gov. Ron DeSantis and his wife, Casey.
  
  Vic Mellor, CEO ofa local concrete business, founded and owns We the People. He’s an associate of retired Army Lt. Gen. Michael Flynn, who was briefly President Donald Trump’s national security adviser in 2017 before being dismissed for lying to the FBI about his contacts with Russians. Trump later pardoned him, and Flynn since has become a leader of the Christian nationalist movement.
  
  We the People provides vitamin shots but no vaccines. In fact, many of its offerings are treatments for supposed vaccine injuries. Part of the We the People building is a broadcasting studio, where conservatives hold forth on what they see as the villainy of liberals and the American Academy of Pediatrics.
  
  Florida surgeon general altered Covid-19 vaccine analysis to suggest higher risk for younger men, Politico reports
  
  Mellor was at the U.S. Capitol during the riot on Jan. 6, 2021 — he said he “just knocked on front doors,” according to a Facebook post describedby The Washington Post. He returned home and started building a 10-acre complex that hosts weddings and right-wing assemblies, with playgrounds, a butterfly garden, a zip line over a pond visited by alligators, and an attached, separately owned gun range.
  
  Visitors who travel down a dirt road to The Hollow — named for the hollow-core concrete that made Mellor wealthy — can enter the compound through a dark, cavernous passage lined with neon signs illuminating maxims from the likes of Thomas Jefferson, Thomas Paine, and Flynn.
  
  The Hollow has hosted clinics for unvaccinated kids and eventsfor Ladapo, anti-vaccine activist Sherri Tenpenny (who in 2021 told legislators atan Ohio House hearingthat covid vaccine made people magnetic), and other “medical freedom” advocates. Mellor created a medical home for such ideas byopening We the Peoplein 2023.
  
  The year before, three “medical freedom” candidates had won seats on the board overseeing Sarasota’s public hospital and health care system, after protests over the hospital’s refusal to treat covid patients with ivermectin and other drugs of choice for covid contrarians.
  
  On a recent afternoon at The Hollow, manager Dan Welch was clearing brush when approached by KFF Health News. As a foe of vaccinations, he welcomed Ladapo’s move to end vaccine mandates. “Maybe in their inception, vaccines were created to prevent what they were supposed to prevent,” Welch said. “But now there’s so much more in there, the metals, aluminum, mercury. Since they started vaccination, the autism rate went through the roof, and I believe these vaccines are part of it.”
  
  The theory that vaccines cause autism has been debunked, and manufacturers removed mercury from childhood vaccines 24 years ago, although Welch said he doesn’t believe it.
  
  Vaccination faces additional challenges in a century-old Sarasota County neighborhood of low-slung bungalows called Pinecraft, home to about 3,000 Mennonites — and double that number when Amish snowbirds arrive in the winter. Pastor Timothy Miller said that while Sarasota’s Mennonites are less culturally isolated than the Mennonite community in West Texas, site of a measles outbreak in January, many in his community also shun vaccination.
  
  His cousin Kristi Miller, 26, won’t vaccinate her 9-month-old daughter or any of the other children she hopes to have, she said, because she thinks vaccines probably cause autism and other harms.
  
  As for vaccine-preventable diseases like measles, she doesn’t worry about them.Like the Ladapos, “I don’t live in fear,” she said. “I have a God who’s bigger than everything.”
  
