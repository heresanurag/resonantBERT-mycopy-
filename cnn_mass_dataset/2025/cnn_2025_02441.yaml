  ![Image 2: Buying a home has grown more expensive for many Americans in the past few years. Elevated mortgages further cut into affordability.](https://media.cnn.com/api/v1/images/stellar/prod/gettyimages-2166343943-20250709204252413.jpg?c=original&q=w_860,c_fill)
  
  Buying a home has grown more expensive for many Americans in the past few years. Elevated mortgages further cut into affordability.
  
  Patrick T. Fallon/AFP/Getty Images
  
  Average mortgage rates in the US have hovered above 6% for nearly three years. Many Americans who purchased homes during this stretch may have expected rates to fall by now, offering a chance to refinance. But so far, relief hasn’t come.
  
