  # Do you have regrets about buying a home? CNN wants to hear from you
  
  By [![Image 1: Samantha Delouya](https://media.cnn.com/api/v1/images/stellar/prod/1519100-3659-r-ps2560x1440.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/samantha-delouya)[Samantha Delouya](https://www.cnn.com/profiles/samantha-delouya)
  
  Jul 9, 2025
  
