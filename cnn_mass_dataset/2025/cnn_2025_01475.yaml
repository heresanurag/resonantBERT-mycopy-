title: "Extreme weather events are here to stay. How to financially prepare yourself for a disaster"
date: "2025-01-17"
section: "Business"
url: "https://www.cnn.com/2025/01/17/business/how-to-financially-prepare-extreme-weather-wellness/index.html"
content: |
  EDITOR’S NOTE:This story, which originally ran in August 2024, has been updated.
  
  No part of the United States is spared the risk of extreme weather events, which have been hitting harder in recent years.
  
  From wildfires and tornadoes to hurricanes and flooding to prolonged heat waves, the potential damage from extreme weather to people, animals and property is high. Especially if you’re a homeowner. And especially if you live in or near high-risk areas.
  
  However, there are steps you can take right now to help speed the process of repair and recovery after a devastating weather event, should you ever be directly hit.
  
  Beyond thephysical essentialsyour family and pets might need if you have to evacuate or shelter in place, pull together an administrative emergency kit, so to speak — physical and virtual.
  
  “Things can happen very quickly. You should have that go bag with all your important documents in an easy-to-remember, easy-to-access place,” said Loretta Worters, a spokesperson for the Insurance Information Institute. “You can get an insurance check pretty quickly if you have all the documentation.”
  
  California’s evacuees agonized over when to leave and what to take. These are the items they grabbed – and left behind
  
  Consider, for example,wildfires. At least 38 states are at risk for them, according to the III. As so many in Los Angeles County have experienced this month, a wildfire can reduce your home and all your belongings to ash. “When [your house] burns there’s nothing to show what you have,” Worters said.
  
  That’s why she recommends taking photos or videos of your house and its contents — even on your cellphone. Store them in the cloud and if possible keep a physical copy with your important papers or on a flash drive.
  
  Also — dog and cat owners will no doubt be spoiled for choice — include a current photo of your pet, in case you get separated.
  
  If you ever do get hit with a devastating weather event, be sure to take photos soon after impact, too, so you can better tell your before-and-after story to insurers, said Keith Turi, acting director of response and recovery at the Federal Emergency Management Agency (FEMA).
  
  Having sufficient insurance is key to preserving your finances and sanity after a disaster. In 2023 alone, there was nearly $80 billion in insured losses due to 89 natural catastrophes in the US like wildfires and flooding, according to the III.
  
  Of course, being adequately insured has proven difficult for many Californians, wherehomeowners’ insurance had already become unaffordablefor some before the LA wildfires hit this month and whereinsurers declined to renewnearly 3 million homeowners’ policies, which included fire coverage.
  
  California’s insurance is in crisis. The solution will cost homeowners a ton
  
  But no matter where you live, if you own a home, periodically check that the policies you have cover the most likely types of extreme weather that may occur. If you can’t get adequate coverage from a private insurer on your own, check to see if there are any state-approved programs — like the Fair Access to Insurance Requirements (FAIR) Plans in California and other states, or Florida’s Citizens Property Insurance — that can provide event-specific coverage. In addition to a FAIR Plan, if you don’t have a homeowner’s policy, you also may need to get what’s called a “Difference in Conditions” policy, which can provide the equivalent of comprehensive homeowners insurance, Worters said.
  
  Check, too, that your policies cover the cost of what you’d want to replace, she added. For instance, stay apprised of rebuilding costs. They may be higher than you think.
  
  Note that if your home is damaged by flood waters, standard homeowner policies typically won’t cover that damage. To learn more about the potential costs of flooding and how to get flood insurance, you can visitfloodsmart.gov, Turi recommended.
  
  Lastly, double check that the coverage for your possessions will make you whole — or whole enough. The coverage in most homeowners’ policies for possessions amounts to between 50% and 70% of the value of your home structure, Worters said. So, for every $100,000 in coverage for the structure of your home, you might have $50,000 to $70,000 in coverage for your possessions in the home — from your furniture and household items to your piano.
  
  Keep a physical copy of your insurance coverage and the title and deed to your home in a waterproof or fireproof bag or other container.
  
  Make an emergency contact list to keep with your other documents that includes the policy and account numbers for all your insurance policies as well as the insurers’ phone numbers, emails and website addresses — e.g., for health and prescriptions; home, auto and life; plus any pet coverage you may have.
  
  Also include on your list the contact information and account numbers for your bank, investment and retirement accounts.
  
  If you have pets, include your vet’s contact information and that of any boarding facilities you might need to use if ever you have to evacuate. Or, alternatively, the names of pet-friendly places the whole family can stay.
  
  You might also add to your list a FEMA helpline number so you can register for assistance after a disaster: 800-621-3362.
  
  Other key documents that III recommends you have at the ready to throw into your go bag are your birth and marriage certificates, passports, a driver’s license (unless it’s in your wallet on your person), your most recent tax return, any hard-copy stock certificates and your will.
  
  Since you may have to pay initially for hotel or motel rooms and meals immediately after a disaster — and for which you may later be reimbursed — thenational public service campaign Readyrecommends having cash or traveler’s checks available in your emergency kit. Another option if you have more than one credit card is to use your second or third card sparingly, so that you have enough under that card’s credit limit to charge such immediate expenses.
