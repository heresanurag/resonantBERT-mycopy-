id: cnn_2025_04011
title: "A Gaza ceasefire is the closest it has been in months. Here’s what we know"
date: "2025-07-02"
section: "Middle East"
url: "https://www.cnn.com/2025/07/02/middleeast/israel-gaza-ceasefire-deal-closer-than-ever-what-we-know-intl?iid=cnn_buildContentRecirc_end_recirc"
content: |
  US President Donald Trump has voiced confidence that a ceasefire deal in Gaza could be agreed this week after Hamas announced that it had “submitted a positive response” to a proposal for a 60-day truce with Israel.
  
  Israeli Prime Minister Benjamin Netanyahu is set to meet Trump in Washington on Monday and, while Israel and Hamas have long had conflicting demands that negotiators have been unable to bridge, for the first time in months an agreement seems within reach.
  
  “I think there’s a good chance we have a deal with Hamas during the week, during the coming week, pertaining to quite a few of the hostages,” Trump told reporters in New Jersey on Sunday.
  
  The renewed efforts gathered steam following a truce between Iran and Israel but also reflect US pressure and a shift in Israel’s war goals. Here’s what to know.
  
  Since the Israel-Iran ceasefire on June 24, mediators Qatar and Egypt – as well as the United States – have redoubled their calls for a new Gaza truce. A Qatari foreign ministry spokesman told CNN the Israel-Iran agreement had created “momentum” for the latest talks between Israel and Hamas.
  
  Netanyahu’s government has faced mounting international criticism for the suffering its war is inflicting on Palestinians in Gaza.
  
  Israel imposed a total blockade on humanitarian deliveries to the enclave in March. It somewhat eased the blockade in May, after a chorus ofglobal experts warnedthat hundreds of thousands of people could soon starve.
  
  Hundreds of Palestinians in Gaza have been killed byIsraeli strikesin recent days. And aid distribution has been marred by violence, with hundreds killed on their way to try to obtain food from the Gaza Humanitarian Foundation (GHF), the controversial US-backed aid initiative that began operating at the end of May.
  
  Pressure is also growing on Netanyahu from within Israel.
  
  His government is propped up by far-right figures who want to escalate the fighting in Gaza, but opposition leader Yair Lapid said Wednesday that he would join the coalition government to make a hostage deal possible. Polls have repeatedly shown that a majority of the country wants a deal to bring the hostages home, even if it means an end to the war.
  
  Talks began on Sunday in Qatar. Meanwhile there has been no let up in the Gaza offensive, with the health ministry reporting scores of people killed in Israeli strikes over the past 12 days.
  
  In addition to the aim of bringing the hostages home, Netanyahu has not wavered from his more maximalist aims: disarmament of Gaza and the destruction of Hamas’ military capabilities and governance abilities.
  
  Last month, the prime minister made a rhetorical shift in laying out Israel’s goals – for the first time prioritizing the return of hostages ahead of what he once called the “supreme objective” of defeating Hamas.
  
  Israel at a crossroads as Netanyahu prepares to meet Trump
  
  Netanyahu said “many opportunities have opened up” following Israel’s military operations in Iran, including the possibility of bringing home everyone still held captive by Hamas. “Firstly, to rescue the hostages,” he said. “Of course, we will also need to solve the Gaza issue, defeat Hamas, but I believe we will accomplish both missions.”
  
  The comments were welcomed by families of hostages held in Gaza, who have criticized him for not clearly placing releasing their Ioved ones as Israel’s primary goal. Only a small number of hostages have been rescued in military operations rather than freed under truces.
  
  The Israeli military this week recommended pursuing a diplomatic path in Gaza after nearly two years of fighting and the elimination of much of Hamas’ senior leadership.
  
  Last week, a military official told CNN that Israel has not fully achieved all of its war goals, but as Hamas’ forces have shrunk and gone into hiding, it has become more difficult to effectively target what remains of the militant group. “It’s harder now to achieve tactical goals,” the official said.
  
  The militant group has three main demands: a permanent end to the fighting, for humanitarian assistance to be carried out by the United Nations, and for Israel to retreat to the positions it held on March 2 this year, before it renewed its offensive and occupied the northern part of the Strip.
  
  A senior Hamas official told CNN in late May that the group is “ready to return the hostages in one day – just we want a guarantee that war will not come again after that.” The hostages are Hamas’ key leverage in negotiations, and the militant group has refused to agree to a release without a path to end the conflict.
  
  In response to  the earlier Trump administration-backed ceasefire proposal in May, Hamas requested US assurances that permanent ceasefire negotiations will continue and that fighting will not resume after the 60-day pause.
  
  Whether the ceasefire will be temporary or a pathway to a permanent truce is the biggest sticking point between the warring parties.
  
  While Israel wants to eradicate Hamas following the Oct. 7 attacks, the group has shown little willingness to relinquish its political and military power in Gaza.
  
  Officials in the group have given contradictory statements as to Hamas’ role in a post-war Gaza. The group’s spokesperson, Hazem Qassem, has said that the group isnot “clinging to power”and does not have to be part of arrangements “in the next phase.”
  
  While the fine detail of the proposal is yet to be released it is clear that the revised plan is an attempt to bridge some of the differences between Israel and Hamas.
  
  A source familiar with the negotiations said that the timeline of the latest proposal calls for the release of 10 living Israeli hostages and 18 deceased hostages spread out over the full 60-day period.
  
  Of the 50 hostages still in Gaza, at least 20 of them are believed to be alive, according to the Israeli government.
  
  Similar to previous ceasefires, on the first day of the truce, Hamas would release eight living hostages. In exchange, Israel would release an unspecified number of Palestinian prisoners and detainees, and withdraw its forces from pre-agreed locations in northern Gaza.
  
  Israel and Hamas would also immediately enter into negotiations for a permanent ceasefire once the initial truce goes into effect, the source said.
  
  Under the deal, hostages will be released without ceremonies or fanfare at Israel’s request – unlike during the last truce, when Hamas staged public propaganda events around hostage transfers that sparked outrage in Israel.
  
  Humanitarian aid will immediately begin to flow into Gaza at the start of the ceasefire, including from the United Nations and from other aid organizations, similar to the previous ceasefire which began on January 19.
  
  This leaves the fate of the US-backed GHF and its role in Gaza unclear.
  
  The US and the mediators have provided stronger assurances about reaching a settlement to end the war in Gaza as part of the updated proposal, an Israeli official told CNN, something that in principle should address one of Hamas’ key concerns. The official did not provide the specific language in the document, but said the wording is stronger than previous assurances.
  
  Although both sides have accepted the proposal more talks must take place before a ceasefire begins.
  
  In these proximity talks, negotiators shuttle back and forth between the two sides to hammer out the final details of the agreement.
  
  Hamas said on Friday night that they had submitted a “positive response” to the proposal, but an official involved in the talks said Hamas had introduced some “amendments.”
  
  Hamas did not publicly state what changes they wanted to the proposal put forward by Qatar last week, but the militant organization has long sought stronger assurances about a comprehensive end to the war, as well as the entrance of humanitarian aid entering Gaza. Hamas has sought to channel that aid through the traditional United Nations mechanism, not the controversial US- and Israeli-backed Gaza Humanitarian Foundation.
  
  Israel has sent a delegation to participate in the talks in Doha, but the Prime Minister’s Office said the changes Hamas is seeking to the latest Qatari proposal are “unacceptable.”
  
  “We are working to secure the deal that has been discussed – under the conditions we’ve agreed to. I’ve sent a negotiating team (to Doha) with clear instructions,” Netanyahu said Sunday before departing for Washington DC, where he will meet with Trump.
  
  One of the key issues to resolve during proximity talks will be the timeline and location of the withdrawal of Israeli forces in Gaza during the 60-day ceasefire, according to the source.
  
  In the 21 months of war between Israel and Hamas, ceasefires have been in place for a total of only nine weeks.
  
  More than 57,000 people, of which more than 17,000 are children, have been killed in Gaza during the fighting, according to the Palestinian health ministry.
  
  The first ceasefire came into effect in November 2023, but lasted only a week. In that time, 105 hostages were released from Gaza, in exchange for scores of Palestinian prisoners.
  
  A second ceasefire was not struck until January 2025, shortly before Trump’s return to the White House. In just over 8 weeks – the first “phase” of the ceasefire – Hamas freed 33 hostages, with Israel releasing around 50 Palestinian prisoners for every Israeli freed.
  
  Under the planned second stage, Israel was supposed to agree to a permanent ceasefire. But Israel resumed its offensive on March 18, shattering the ceasefire and derailing the talks, saying it did so to put pressure on Hamas to release the remaining hostages.
  
  This article has been updated with new reporting.
