title: "Legionnaires’ disease cluster in New York City rises to 83 infections and 3 deaths"
date: "2025-08-05"
section: "Health"
url: "https://www.cnn.com/2025/08/05/health/legionnaires-disease-outbreak-nyc"
content: |
  New York City health officials are continuing to investigate a cluster of cases of Legionnaires’ disease, a serious bacterial lung infection, that has sickened at least83 peopleand led to 21 hospitalizations and three deaths.
  
  Health officials suspect the bacteria that cause the disease, Legionella, originated in a cooling tower — a device that uses water to cool large buildings and then disperses mist into the air. If the water inside becomes too warm, stagnant, or isn’t properly disinfected, Legionella can grow and sicken people who inhale the mist.
  
  The disease cannot be spread from person to person.
  
  Since the first cases were announced July 25, New York City’s health department said it tested “dozens” of cooling towers in Central Harlem, where the cases were reported. Building owners with towers that tested positive in initial screenings were directed to carry out cleaning efforts, including a chemical that kills the bacteria.
  
  Although cleaning has been completed, the disease has an incubation period of two to 10 days, according to theWorld Health Organization.
  
  “Anyone in these zip codes with flu-like symptoms should contact a health care provider as soon as possible,” Acting Health Commissioner Dr. Michelle Morse said in anews release.
  
  Legionnaires’ disease causes flu-like symptoms, including cough, fever, headaches, muscles aches and shortness of breath. It’s treatable with antibiotics, but if left untreated, it can cause shock and multi-organ failure, according to theWHO About 10% of people who get Legionnaires’die from complicationsof their illness, according to the US Centers for Disease Control and Prevention, and it’s more dangerous for older adults and people with weakened immune systems.
  
  Around 6,000 Legionnaires’ disease cases are reported each year in the United States, according to the Occupational Safety and Health Administration, but reported totals may be lower than the actual cases in part because it can be difficult to distinguish Legionnaires’ disease from other types of pneumonia.
