  In 1991, Schaffner was a liaison representative to ACIP when it voted toadvise universal vaccinationfor hepatitis B before an infant leaves the hospital.
  
  “We want no babies infected. Therefore, we’ll just vaccinate every mom and every baby at birth. Problem solved. It has been brilliantly successful in virtually eliminating hepatitis B in children,” he said.
  
  In 1990, there were 3.03 cases of hepatitis B per 100,000 people 19 years old or under in the U.S., according to the CDC.
  
  Since the federal recommendation to vaccinate all infants, cases have dramatically decreased.CDC datashows that in 2022 the rate among those 19 or under was less than 0.1 per 100,000.
  
  While hepatitis B is often associated with high-risk behaviors such as injection drug use or having multiple sexual partners,health expertsnote that it is possible for the virus to be transmitted in ordinary situations too, including among young children.
  
  The virus can survive forup to seven daysoutside the body. During that time, even microscopic traces of infected blood on aschool desk or playground equipmentcan pose a risk. If the virus comes into contact with an open wound or the mucous membranes of the eyes, an infection can occur. This means that unvaccinated children not considered at high risk can still be exposed in everyday environments.
  
  If the CDC significantly alters its recommendation, health insurers would no longer be required to cover the cost of the shots. That could leave parents to pay out-of-pocket for a vaccine that has long been provided at no charge. Children who get immunizations through the federalVaccines for Childrenprogram would lose free access to the shot as soon as any new ACIP recommendations get approved by the acting CDC director.
  
  The two former CDC officials said that plans were underway to push back the official recommendation for the vaccine as of August, when they both left the agency, but may have changed.
  
  Schaffner is still an alternate liaison member of ACIP, and hopes to express his support for universal newborn vaccination at the next meeting.
  
  “The liaisons have now been excluded from the vaccine work groups. They are still permitted to attend the full meetings,” he said.
  
  Schaffner is worried about the next generation of babies and the doctors who care for them.
  
  “We’ll see cases of hepatitis B once again occur. We’ll see transmission into the next generation,” he said, “and the next generation of people who wear white coats will have to deal with hepatitis B, when we could have cut it off at the pass.”
  
