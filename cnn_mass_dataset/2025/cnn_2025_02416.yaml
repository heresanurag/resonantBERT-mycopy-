title: "Jury will be shown footage of Sean ‘Diddy’ Combs physically assaulting Cassie Ventura, judge rules"
date: "2025-04-25"
section: "Entertainment"
url: "https://www.cnn.com/2025/04/25/entertainment/sean-diddy-combs-footage-physically-assaulting/index.html"
content: |
  Footage of Sean “Diddy” Combsphysically assaultinghis ex-girlfriend, Cassie Ventura, will be shown to the jury in his criminal sex trafficking trial, which is scheduled to begin next month.
  
  After numerous attempts to exclude the 2016 hotel footage, which was first reported on by CNN, the judge denied the Combs’ attorneys requests to eject the damning footage at a hearing on Friday.
  
  Despite numerous attempts to exclude the footage from evidence, Combspreviously admittedin May 2024 to physically assaulting Ventura. After CNN released the video, Combs posted an apology on his Instagram account, saying, “My behavior on that video is inexcusable. I take full responsibility for my actions in that video.”
  
  In its attempt to exclude the 2016 footage, Combs’ defense team had claimed it was inaccurate.
  
  “We can eliminate at least many of the defense’s concerns through technology,” Judge Arun Subramanian said Friday. Prosecutors said at the court appearance they had a video expert working on adjusting some of the footage.
  
  “CNN never altered the video and did not destroy the original copy of the footage, which was retained by the source,” a spokesperson for CNNsaid in a statementlast month. “CNN aired the story about the video several months before Combs was arrested.”
  
  Combs and Ventura settled a civil lawsuit in which she alleged years of abuse by Combs in November 2023. He has been accused of sexual assault in dozens of civil lawsuits since that time. Combs has denied all the allegations.
  
  In his federal criminal case, Combs has pleaded not guilty to federal charges of sex trafficking, transportation to engage in prostitution and racketeering conspiracy. He is currently being held at a federal detention center in New York City as he awaits trial. Jury selection will begin on May 5, with opening statements expected to begin May 12.
  
  Combs’ attorney, Marc Agnifilo, suggested in court on Friday that Combs was a “swinger” as opposed to a sexual predator – giving an apparent preview into part of the defense’s strategy. In denying the charges and all allegations against him, Combs has repeatedly said that all of his sexual encounters were consensual.
  
  At the hearing Friday, Assistant US Attorney Madison Smyser informed the judge that Combs had rejected a plea deal offered by prosecutors, though no further details on what the plea deal entailed were revealed.
