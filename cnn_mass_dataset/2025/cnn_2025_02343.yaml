  Since the pandemic, her perspective has shifted. Where she once considered it essential for a more equitable and progressive future, she now sees developments of cutting-edge technologies like AI deepening social and economic inequalities, spreading misinformation and negatively changing the way people think and interact.
  
  She explored this feeling in a recent solo exhibition, “Can I Believe in a Fortunate Tomorrow?” which, in addition to the aforementioned “Tech Bro Debates Humanity,” featured two other thought-provoking video installations.
  
  The show’stitular workis an AI-simulated video showing the optical phenomenon known as “saiun”— when the sun shinesthrough iridescent clouds and creates streams of rainbow–colored light, a good luck symbol in some Asian cultures. It’s an uncommon sight, in the real world: but with AI, the phenomenon can be constantly simulated.
  
  And in “Drone in Search for a Four-Leaf Clover,” a drone scans a field of green clovers, instantly identifying several four-leafed versions hidden in the grass. Clovers typically havethree leaves,but a rare mutation occasionally produces a fourth, and so the elusive four-leaf clover has long been associated withgood luck and happiness in Celtic cultures.
  
  Both works consider the true cost of AI-driven efficiency: in the former, how much does rarity, chance and surprise add to pleasure; in the latter, is the joy found in having the clover, or the quest itself?
  
  Her works evoke the clichédquoteoften attributed to American philosopher Ralph Waldo Emerson: “Life is a journey, not a destination.” In the era of AI, how much of the journey are we still partaking in?
  
  Ozaki isn’t the only one feelingtech-fatigued. Digital burnout ison the rise, particularly amongGen Z and Millennials, who increasingly want todisconnectfrom digital devices.
  
  While technology has often been hailed as a way to reduce our workload — Ozaki cites economist John Maynard Keynes, who speculated in 1930 that within a century, technology would be so advanced we’d only need to work15-hour weeks— it’s far from the truth.
  
  In most nations, work hourssteadily declinedthroughout the 20th century, but since the 1990s, economists say this trend has stagnated, or in the case of the US, reversed, with “extreme” working hours increasing in many economically developed nations. The digitalization of work and widespread internet connectivity — which allows remote working and 24/7 connection to a work phone and emails — are both contributing factors. Ozaki sees the rejection of “hustle culture” by many young people as a recognition that it props up an “unequal system” in which it’s impossible to win.
  
  “There’s been so much technological progress, but we don’t work 15-hour weeks,” she said, adding that instead of working less, we are producing more, with wealthy stakeholders benefitting rather than workers.
  
