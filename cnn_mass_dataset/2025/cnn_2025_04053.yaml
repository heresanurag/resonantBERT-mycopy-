title: "Coco Gauff replaces coach with biomechanics specialist ahead of US Open"
date: "2025-08-21"
section: "Sport"
url: "https://www.cnn.com/2025/08/21/sport/tennis-us-open-coco-gauff-coach-intl"
content: |
  Tennis superstarCoco Gauffhas parted ways with her coach just days before this year’s US Open, according to reports, includingESPN, on Wednesday.
  
  The two-time grand slam singles winner has not publicly announced the decision, but reports suggest coach Matthew Daly will no longer be part of her team.
  
  “Only have good things to say about Coco, enjoyed working with her,” Daly toldBounces, adding that the decision was made “recently.”
  
  Reports state that Gauff will continue working with her longtime coach Jean-Christophe Faurel, while also bringing in biomechanics specialist Gavin MacMillan.
  
  The world No. 3 was seen practicing with her new coaching team in New York this week, according toReuters, with particular attention being paid to her serve and forehand.
  
  Coco Gauff reacts to winning the French Open
  
  MacMillan, who works across various sports, has been widely credited for helping current world No. 1 Aryna Sabalenka improve her serve.
  
  Serving has been a problem area for Gauff in recent months, with the American hitting 42 double faults in just three matches at the Canadian Open earlier this month, according to Reuters.
  
  Under the partnership of Daly and Faurel, though, Gauff produced some of her best tennis, winning both last year’s WTA Finals and this year’sFrench Open.
  
  But the 21-year-old has struggled with form in recent months, crashing out ofWimbledonin the first round after losing to the then world No. 42 Dayana Yastremska.
  
  Gauff will look to rectify her dip in performance at this year’s US Open, where she won the 2023 edition and will be one of the biggest stars in the draw.
  
  The singles tournament is set to start on Sunday, with the draw taking place later Thursday.
