title: "UnitedHealth confirms federal investigation into its Medicare practices"
date: "2025-07-24"
section: "Business"
url: "https://www.cnn.com/2025/07/24/business/unitedhealth-investigation-doj?iid=cnn_buildContentRecirc_end_recirc&recs_exp=up-next-article-end&tenant_id=related.en"
content: |
  UnitedHealth Group confirmed Thursday that its Medicare program is under investigation by the US Department of Justice and that it is working with the agency.
  
  The health insurer, which has been inupheavalsince the murder of one of its top executives late last year, said in a statement it reached out to the Justice Department after media reports about the investigations.
  
  “The Company has now begun complying with formal criminal and civil requests from the Department,” it said. “The Company has full confidence in its practices and is committed to working cooperatively with the Department throughout this process.”
  
  The Justice Department is investigating UnitedHealth for potential criminal fraud in its Medicare Advantage program, theWall Street Journal reportedin May, though it said the exact nature of the potential criminal allegations is unclear. The company is one of a number of insurers that the federal government contracts with to provide Medicare coverage to senior citizens and other enrollees.
  
  Both the Wall Street Journal and STAT News have published stories that call into question UnitedHealth’s Medicare billing practices and noted other government probes into the company.
  
  In May, UnitedHealth issued a statement saying that it had not been notified of any investigation by the Justice Department and that it stands by “the integrity of our Medicare Advantage program.” It called the Wall Street Journal story “deeply irresponsible.”
  
  UnitedHealth reiterated on Thursday that it has launched third-party reviews of various policies and practices, including the codes it uses to evaluate patients’ health status, its managed care practices and its pharmacy services.
  
  The investigation is the latest crisis for the nation’s top insurer, which is also one of America’s biggest corporations. The CEO of its health insurance unit,Brian Thompson, was gunned down on a New York City sidewalk in December, which unleashed a torrentof angry social media postsaboutcare denialsby UnitedHealth and other insurers.
  
  Andrew Witty, its former CEO,stepped down abruptlyin May, shortly after the company suspended its financial outlook for the year, citing continued higher-than-expected costs in its Medicare Advantage program. UnitedHealth’s former longtime CEO, Stephen Hemsley, has returned to lead the company.
  
  UnitedHealth’s (UNH) stock has lost about half its value over the past year – more than $277 billion. It closed down about 5% on Thursday.
