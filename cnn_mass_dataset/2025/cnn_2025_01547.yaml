id: cnn_2025_01547
title: "Cracker Barrel quietly removes DEI and Pride pages from its website after logo upheaval"
date: "2025-08-28"
section: "Business"
url: "https://www.cnn.com/2025/08/28/business/cracker-barrel-removed-dei-and-pride-website?utm_source=fark&utm_medium=website&utm_content=link&ICID=ref_fark"
content: |
  After backing away from a controversial logo rebrand loudly opposed by many right-wing influencers, Cracker Barrel also quietly made changes to its website this week.
  
  The Tennessee-based roadside restaurant chain deleted a dedicated “Pride page” and scrubbed references to employee resource groups, including its LGBTQ+ and Diversity, Equity, Inclusion and Belonging groups, from another part of its website.
  
  “On behalf of Cracker Barrel’s LGBTQ+ Alliance & DEIB Team, we want to celebrate YOU for being YOU. It is our greatest Mission to ensure that Pleasing People means ‘all people,’” Cracker Barrel’s now-deleted Pride page read, according to a CNN review of theWayback Machine.
  
  The URL now redirects to the company’s “Culture and Belonging”page, which has also been revised, according to the Wayback Machine. The new version speaks more broadly about company culture but no longer lists its employee resource groups, which were publicly visible as recently as Tuesday, according to the archive.
  
  In a statement to CNN, a Cracker Barrel spokesperson said the website updates reflected the removal of outdated content.
  
  “In connection with the Company’s brand work, we have recently made updates to the Cracker Barrel website, including adding new content and removing out-of-date content,” the spokesperson said. “Several months ago, the Company also made changes to our Business Resource Groups that now focus all sponsorships or events on our corporate giving initiatives: addressing food insecurity, supporting community needs through food, and reducing food waste.”
  
  The website changes come after Cracker Barrel faced days of intense backlash, primarily from right-wing influencers, after the company unveileda new minimalist logolast week, which got rid of an image of its famous barrel and “Old-Timer” figure.
  
  The controversy made it all the way to the Oval Office. On Tuesday,President Donald Trump weighed in, agreeing that the company should revert to its old logo.
  
  That same day, Cracker Barrel announced it wouldnot move forwardwith its rebrand.
  
  The changes to Cracker Barrel’s website come after Robby Starbuck, a prominent anti-DEI influencer, posted a screenshot of Cracker Barrel’s “Pride page” on social media.
  
  “Cracker Barrel still proudly has their LGBTQ+ and DEI page on their website and they haven’t said that they’ll end funding for all ages pride events,” Starbuck wrote. “They don’t deserve your money for fixing the logo.”
  
  After the changes to the chain’s site, Starbuck declared “a total victory” on social media.
  
  Since the Covid-19 pandemic, the restaurant chainhas struggled to recover, with Cracker Barrel’s stock (CBRL) losing more than half its value over the past five years. Shares ticked up earlier this week after the company scrapped its rebrand but dropped once again on Thursday.
