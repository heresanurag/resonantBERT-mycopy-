title: "Trump sets 7,500 annual limit for refugees entering US. It’ll be mostly White South Africans"
date: "2025-10-30"
section: "Politics"
url: "https://www.cnn.com/2025/10/30/politics/trump-7-500-refugees-limit-white-south-africans?cid=ios_app"
content: |
  The Trump administration is restricting the number of refugees itadmits annually into the country to 7,500and they will mostly be White South Africans, a dramatic drop after the United States previously allowed in hundreds of thousands of people fleeing war and persecution from around the world.
  
  The Republican administration published the news Thursday in a notice on the Federal Register.
  
  No reason was given for the numbers, which are a dramatic decrease from last year’s ceiling of 125,000 set under Democratic President Joe Biden. The Associated Press previously reported that the administration was considering admitting as few as 7,500 refugees andmostly White South Africans.
  
  The memo said only that the admission of the 7,500 refugees during 2026 fiscal year was “justified by humanitarian concerns or is otherwise in the national interest.”
  
  The slashed cap represents another blow for the long-standing program that until recently has enjoyed bipartisan support.
  
  President Donald Trump suspended the program on his first day in office and since then only a trickle of refugees have entered the country, mostly White South Africans. Some refugees have also been admitted as part of a court case seeking to allow entry to refugees who were overseas and in the process of coming to the US when the program was suspended.
  
  The administration announced the program for the Afrikaners in February,saying that White South African farmersface discrimination and violence at home. The country’s government strongly denies this characterization.
  
  Across the country groups that work to help resettle newly arrived refugees into the country have had to lay off staff as the number of people arriving under the longstanding program plummeted.
