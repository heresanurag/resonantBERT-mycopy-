title: "Justice Department drops lawsuit against Trump adviser Peter Navarro"
date: "2025-06-04"
section: "Politics"
url: "https://www.cnn.com/2025/06/04/politics/navarro-trade-justice-department?iid=cnn_buildContentRecirc_end_recirc"
content: |
  (AP) —The Justice Department is droppinga lawsuitthat it filed against White House trade adviser Peter Navarro, a case in which he was accused of using an unofficial email account for government work and wrongfully retaining presidential records during the first Trump administration, according to a Tuesdaycourt filing.
  
  The joint filing by the Justice Department and an attorney for Navarro doesn’t explain why they are abandoning a case that was filed in 2022, during President Joe Biden’s term in office. The one-page filing says each side will bear their own fees and costs.
  
  The lawsuit accused Navarro of using at least one “non-official” email account — a ProtonMail account — to send and receive emails. The legal action comes just weeks after Navarro was indicted on criminal charges afterrefusing to cooperatewith acongressional investigationinto the January 6, 2021, attack on the Capitol. Navarro served afour-month prison sentenceafter being found guilty of misdemeanor charges.
  
  The civil cases alleges that by using the unofficial email account, Navarro failed to turn over presidential records to the National Archives and Records Administration.
  
  The government notified the court of the lawsuit’s dismissal a day before US Magistrate G. Michael Harvey was scheduled to preside over a status conference for the case.
  
  A Justice Department spokesperson declined to comment. A lawyer for Navarro didn’t immediately respond to an email seeking comment.
  
  Navarro served as a trade adviser during President Donald Trump’s first term. A longtime critic of trade arrangements with China, he has been named senior counselor for trade and manufacturing for Trump’s second administration.
