id: cnn_2025_02780
title: "What it feels like to spend $10M on a handbag, according to the man who did it"
date: "2025-08-01"
section: "Style"
url: "https://www.cnn.com/2025/08/01/style/japan-birkin-valuence-auction-hnk-intl?bt_ee=o3ndOuHFibIaOf5IBndT%2BNnhgdfLypZRjw6GEKQzPH3PaoWGkussssouVVkBdsQp&bt_ts=1754078239170"
content: |
  The record-breaking sale of Hermès’ original Birkin bag was among the most remarkable auctions of modern times.
  
  Last month’snine-way bidding battleopened with an offer of 1 million euros that instantly made it the most expensive handbag of all time. When bids reached 6 million euros, spontaneous applause erupted across Sotheby’s typically restrained Paris saleroom. After the auctioneer’s gavel fell at 7 million euros — meaning that, after fees, a then-anonymous telephone buyer would pay the equivalent of $10.1 million for the bag — cheers broke out.
  
  On the other end of the phone, more than 6,000 miles away, Japanese businessman Shinsuke Sakimoto was processing the audacity of what he had just done.
  
  “It was the most expensive purchase I’ve ever made for a single item,” said Sakimoto, the CEO of luxury resale company Valuence Holdings, in his first major interview since the landmark sale. “It was very exciting, but it really made me sick to my stomach.”
  
  Sakimoto’s business is — in part, at least — used handbags. The ones his company resells may cost considerably less than the original Birkin, but they often retail for thousands of dollars. Yet, the 43-year-old is also an unlikely suitor for one of fashion’s most coveted artifacts, a prototype designed for the late English “it-girl”Jane Birkinthat has since become a luxury staple.
  
  A former player in Japan’s top soccer league, Sakimoto appeared in a few professional games before being released by his club and retiring aged 22. He opened his first luxury resale store in Osaka in 2004, having earlier worked at his father’s second-hand business, before founding Sou (which would become Valuence) seven years later.
  
  Sakimoto retains a competitiveness that he attributes to his sporting past. Recounting the 10-minute auction from his Tokyo office, he repeatedly described other participants as “aite” (opponent) and “teki” (enemy). Even as bids neared his price ceiling, he advised his representative on the phone to immediately counter his rivals’ offers. “Hit back in three or five seconds,” he recalled telling her. “I had to be aggressive.”
  
  “We were almost at the upper limit, but in those few minutes we were strategizing how to inflict psychological damage on our opponents and force them to give up.”
  
  The night before the auction, Sakimoto twice dreamt of placing the winning bid. “We went into this process with a lot of faith,” he said. “And in a sense, we were chosen by the fashion gods to own the first Birkin.”
  
  But for all the romance of literal dreams come true, this was very much an investment.
  
  High-profile auction purchases are the latest big-money strategy in the corporate PR playbook (see crypto entrepreneur Justin Sun buying Maurizio Cattelan’s infamous banana artwork for $6.2 million, beforeeating it, last year). After all, the historic Birkin’s owner is technically Valuence, not its CEO, and the company’s valuation is premised on returns.
  
  Sakimoto estimates that publicity resulting from last month’s auction will generate “several billion yen” — or, in dollars, an eight-figure sum — in “advertising value” over the next decade.
  
  “It was certain that the winning bid would break the record, which meant it would be reported all over the world,” he said, making little attempt to idealize his motive. “Everyone agreed and understood that this was a good investment.”
  
  At the same time, Sakimoto appears committed to conserving this piece of fashion history. Valuence insists that, unlike the rest of its luxury inventory, this Birkin is not going back on sale. In fact, it will likely be an ongoing expense: The company estimates that other fees, such as shipping and import duties,  will  add a further 300 million yen (around $2 million) to its initial $10.1 million investment.
  
  While exact plans are yet to be revealed, the company hopes to put its new handbag on public display. Thousands of visitors came to see it when it was exhibited by Sotheby’s in New York and ahead of last month’s sale. It has previously featured in exhibitions at the Museum of Modern Art in New York and London’s Victoria & Albert Museum.
  
  “The purpose of winning this artwork is not to make it the personal property of the wealthy, but to create a new ownership model — for companies like ours and society to share, together,” Sakimoto said, adding: “We want to preserve it in the future and share it with everyone.”
  
  The prototype’s legend is not just about the luxury icon it spawned, but the story of its creation.
  
  Birkin herself conceived the design during a chance encounter with Hermès’ chairman, Jean-Louis Dumas, on a flight to London in 1984. After her possessions spilled from her Kelly (one of the house’s earlier handbags, popularized by Grace Kelly) onto the airplane floor, the actress and style icon suggested a bigger, less structured design.
  
  “I said, ‘Why don’t you make a bag that’s sort of four times the Kelly, that you could leave open?” she told CNN’s Christiane Amanpour in 2020. Dumas asked her to draw it for him, so she sketched an idea for a generously sized handbag on an airplane vomit bag.
  
  At $3,000 a night, luxury farm resorts are the next glamorous getaway
  
  Hermès obliged and gave the very first of the bags to Birkin. While the style would later span colors and materials, hers was constructed from simple black leather and engraved with the initials “J.B.” It also featured a pair of small silver nail clippers dangling from the shoulder strap, as Birkin liked to keep her nails neatly trimmed, Sotheby’s said. The actress, whodied in 2023, claimed to have used it almost every day from 1985 to 1994, when she sold it to benefit AIDS research.
  
  Sakimoto admits to not being a long-time Birkin “fan.” But the businessman said he saw parallels between his mission and hers.
  
  “The more I looked into Jane Birkin’s life and stance, the more I realized how fascinating she was,” he said. “I felt that I have a very strong connection with these people, and their role as ambassadors or evangelists, that really match our company’s business philosophy.”
  
  That philosophy is centered firmly on circularity. Valuence claims its resale and reuse businesses have, in the last year alone, avoided 5.3 million tons of carbon dioxide emissions and more than 70 billion gallons of water waste by reducing demand for new apparel, jewelry and luxury goods.
  
  So, what better company talisman than a 41-year-old bag that remains in usable condition despite years of daily wear?
  
