  ⛽Road trip!Drivers won’t need to break the bankto fill their gas tanksthis Fourth of July weekend. Prices are expected to average between $3.10 and $3.15 per gallon nationally, according to GasBuddy. That’s down sharply from last year and the cheapest gas for the summer holiday since at least 2021.
  
