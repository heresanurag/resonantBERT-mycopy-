  👋Welcome to 5 Things PM!San Marino sits high on a hill in northeastern Italy, and it’s one of Europe’s smallest andmost unusual countries. There are no checkpoints marking the border, just a sign along the highway welcoming arrivals to the “Ancient Land of Freedom.”
  
  Here’s what else you might have missed during your busy day.
  
  Seniors, students, taxpayers, children, parents, low-income Americans and just about everyone else will be affected by President Donald Trump’s massive tax and spending bill that is being hashed out on Capitol Hill. We broke downwhat you need to know. ➕ The Senate passed the megabill after Vice President JD Vancebroke a tie.
  
  Morale has plunged among doctors and nurses at Veterans Affairs hospitals across the US amid hiring freezes andfears of layoffs. Workers said they’re running short of supplies — and they’re worried these conditions are drying up the pipeline for future talent.
  
  In one of the coldest places on Earth, Alan Chambers searched for an invisible threat. He’s teaming up with climate scientists to see if microplastics and nanoplastics have reached some of the most remote corners of the planet.Answers are just emerging.
  
  AlphaBot 2 wants to beat humans at their own game. Thanks to embodied artificial intelligence, it has the ability to understand instructions. The robot knows how to play dice — and eventually it could make you tea anddo your dishes.
  
  Veils are one of the oldest elements of the wedding ensemble, dating at least as far back as Ancient Greece. Here’s why theyremain a staple accessoryfor even the most modern brides.
  
  🏢Building the future:Researchers and students are exploring the potential of biodesign. By blending science, design and technology they’redeveloping building materialsthat could be grown — with properties like self-coloring and healing.
  
  💸 That’s how much the New York Metsare paying Bobby Bonillaeach year even though he hasn’t played a professional baseball game in more than two decades.
  
  🍷Boozy battles:Typically, a glass of wine is something to be savored — except in one quiet town in northern Spain, where it’sused as ammunition.
  
