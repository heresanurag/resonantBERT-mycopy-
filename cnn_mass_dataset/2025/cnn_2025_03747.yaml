title: "YouTube to pay $24.5 million to settle Trump lawsuit"
date: "2025-09-29"
section: "Business"
url: "https://www.cnn.com/2025/09/29/business/youtube-settle-trump-lawsuit?Date=20250929&Profile=CNN,CNN+International"
content: |
  YouTube agreed to pay $24.5 million to settle a lawsuit filed by President Donald Trump after he was suspended by social media platforms following the January 6, 2021, insurrection.
  
  This makes Alphabet-owned YouTube the last of the three Big Tech social media companies sued by Trump — which included Meta and then Twitter, now called X — to settle over his removal from their platforms.
  
  YouTube will pay $22 million to settle the claims made by Trump to the nonprofit Trust for the National Mall, which is “dedicated to restoring, preserving, and elevating the National Mall, to support the construction of the White House State Ballroom,” according to a court document.
  
  The social media company will also pay $2.5 million to settle with other plaintiffs, such as the nonprofit American Conservative Union.
  
  YouTube directed CNN to the court document when asked for comment.
  
  Trump crowed over the settlement in a Truth Social post, writing, “This MASSIVE victory proves Big Tech censorship has consequences.”
  
  ﻿Metaagreed to settleTrump’s lawsuit in January for $25 million. X’s settlement in February involved a payment of around $10 million, according to theNew York Times.
  
  When they suspended his accounts, theplatformssaidTrump’s posts about the riot risked inciting further violence. At the time, legalexperts saidsimilar suits had been dismissed because tech companies have the right to run their platforms as they see fit.
  
  However, the settlements come as tech giants have taken a more conciliatory, if not outright supportive, approach to Trump and Republican interests since he took office in January.
  
  After Elon Musk acquired X — then known as Twitter — in late 2022,he reinstated Trump’s account; Metafollowed suitin February 2023 andYouTubethe following month.
  
  Musk, Meta CEO Mark Zuckerberg and Alphabet CEO Sundar Pichaiall sat front and centerat Trump’s inauguration, and social media platforms haverolled back content moderation effortsthat Republican users had likened to censorship.
  
  Just last week, YouTubesaid it would reinstate some accountsbanned for violating now-defunct rules meant to curb repeated posting of misinformation, including about the results of the 2020 election. In its announcement, the company said it “values conservative voices on its platform and recognizes that these creators have extensive reach and play an important role in civic discourse.”
  
  This story has been updated with additional details.
