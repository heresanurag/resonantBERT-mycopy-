title: "Treasury secretary says ‘we will see’ about $2,000 rebate checks to Americans as Supreme Court weighs Trump’s tariffs"
date: "2025-11-16"
section: "Business"
url: "https://www.cnn.com/2025/11/16/business/bessent-tariff-rebate-supreme-court-trade"
content: |
  Treasury Secretary Scott Bessent said Sunday that President Donald Trump’s proposal to issue$2,000 tariff rebate checksto most Americanswould require Congress’ approval.
  
  “We will see. We need legislation for that,” Bessent said on Fox News’ “Sunday Morning Futures” when asked about rebate checks, adding that “Those could go out.”
  
  Trump has repeatedly suggested using tariffs to fund rebate checks in recent months, including in aTruth Socialpost last weekend. “People that are against Tariffs are FOOLS! … A dividend of at least $2000 a person (not including high income people!) will be paid to everyone,” he wrote. Trump first floated the idea of Americans potentiallyreceiving a portion of the tariff revenuein July.
  
  The payments would be “for working families” and would have an income limit, Bessent said Sunday.
  
  Butthe Supreme Courtcould strike down a large chunk of Trump’s tariffs when it decides on the president’s use of an emergency law. The court appeared deeply concerned earlier this month with Trump’s reliance on the law, with several conservative justices picking apart the administration’s position.
  
  The tariffs have faced scrutiny for contributing to higher inflation on consumer goods, though Bessent and others in Trump’s economic team have denied thattariffs are essentially a tax on American consumers.
  
  “I don’t think this ruling is going to go against us, but if it does, what’s (the Supreme Court’s) plan for refunds? Because how is this going to get to consumers? Are they just going to hand some of these importers big windfalls?” Bessent said Sunday.
  
  “I don’t think the Supreme Court wants to wade into a mess like that,” Bessent added.
  
  The United States has yet to sign a trade deal with China on rare-earth minerals, which areessential to making consumer electronics and military equipment, after months of trade tensions between the two sides.
  
  Bessent said a deal will “hopefully” be done by Thanksgiving after a framework agreement wasannounced in October. That agreement averted additional 100% tariffs that the US threatened on Chinese goods, but only if Beijing ends current and proposed export controls on critical rare earths.
  
  Bessent said Sunday that the agreement would allow rare earths to “flow freely as they did before April 4,” when the trade war kicked off due to Trump’s “reciprocal” tariffs.
  
  The longest government shutdown in US historycame to an endWednesday after Congress narrowly passed a spending package.
  
  “Of course the government shutdown set us back,” Bessent said Sunday.
  
  Bessent did not say whether he expected a weak GDP for the fourth quarter.
  
  The first two quarters of 2026, though, will see inflation down and the real income curve “substantially accelerate,” Bessent said.
  
  “When those two lines cross, Americans are going to feel it,” he said.
  
  The Trump administration on Friday announced that many agricultural imports would beexempt from “reciprocal” tariffsinstead of rates as high as 50% on imports from Brazil or the lowest 10% duty imposed on many other countries, potentially providing a solution to rising grocery costs.
  
  Average grocery prices in the US were2.7% higher in Septembercompared with last year. Coffee prices, for instance, were up nearly21% year-over-yearin August, and bananas were about6.6% more expensive in Augustthan they were a year ago.
  
  “The prices for those goods weren’t necessarily going up just because of tariffs,” National Economic Council Director Kevin Hassett told ABC’s “This Week” on Sunday. “The prices will go down, of course … because the supply of goods into the US is going to increase.”
  
  Theconsumer sentiment index fellto 50.3 this month from 53.6 in October, according to the University of Michigan — a sobering sign leading into the holiday season.
