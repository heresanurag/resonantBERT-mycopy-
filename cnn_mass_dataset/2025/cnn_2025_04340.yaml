  According to ICE’s website, ICE does not detain unaccompanied children except in rare instances, though CNN has previously reported onsimilar instances.
  
  “This was not a harmless mistake. It was the direct result of callous and chaotic policies by the Trump Administration,” McKee said. “Moreover, ICE’s failure to exercise even a shred of due diligence is shameful and underscores just how broken and dangerous these federal policies are.”
  
  ICE is continuing its operations under the Trump administration’s immigration crackdown, makinghundreds of arrestsin Charlotte, North Carolina, and preparing to deploy in New Orleans in December.
