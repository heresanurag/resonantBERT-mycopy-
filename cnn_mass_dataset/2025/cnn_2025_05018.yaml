  After 10 years, a blockbuster rematch betweenFloyd Mayweather Jr. and Manny Pacquiaois “almost” agreed, Pacquiao said, confirming the two camps are “in negotiations.”.
  
  The Federal Reserve said Wednesday it is lowering its benchmark interest rate by a quarter point.Here are a few money moves to make now..
  
  With balls that jingle and bases that beep,these blind baseball players aim for Olympic goldand leave their sense of limitation in the dugout. CNN’s Randi Kaye follows a team of remarkable athletes aiming to bring their version of baseball to the Paralympics.
  
  2,000That’s roughly how many National Guard troops are currently deployed in Washington, DC, as part of President Trump’s efforts to crack down on crime. The troops willremain in the city at least through February 2026, according to people familiar with the guard’s orders.
  
