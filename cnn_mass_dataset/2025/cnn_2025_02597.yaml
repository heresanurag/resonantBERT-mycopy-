  But the list alsoincludedother topics, such as the “Spread of Unsubstantiated Information” and “Addressing Vaccine Information Integrity.”
  
  In a post about the canceled grants, the NSF said that the misinformation research funding was halted to comply with Trump’s January 20 executive order on “restoring freedom of speech.”
  
  The agency said itdoes“not support research with the goal of combating ‘misinformation,’ ‘disinformation,’ and ‘malinformation’ that could be used to infringe on the constitutionally protected speech rights of American citizens across the United States in a manner that advances a preferred narrative about significant matters of public debate.”
  
  The changes have prompted backlash from various research organizations and stakeholders.
  
  In response to the executive orders and other internal changes at NSF, some of which have taken place since DOGE arrived in mid-April, researchers have been asked to ensure funding requests comply with shifting directives.
  
  That guidancehas put scientists in the “middle of a political tug-of-war, wasting valuable time and resources,” according to an April 24statementfrom the Federation of Associations in Behavioral & Brain Sciences.
  
  “NSF has a tested process for evaluating the intellectual merit and the broader impact of proposed investigations and FABBS encourages NSF to honor it,” the federation’s statement reads.
  
