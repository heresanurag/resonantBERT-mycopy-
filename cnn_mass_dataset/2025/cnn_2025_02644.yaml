  # BBC apologizes to Trump over editing blunder, rejects defamation claim
  
  By Catherine Nicholls, [Christian Edwards](https://www.cnn.com/profiles/christian-edwards), Billy Stockwell
  
  Updated Nov 14, 2025
  
  Updated Nov 14, 2025, 6:53 AM ET
  
  PUBLISHED Nov 13, 2025, 3:47 PM ET
  
  Donald Trump Movies Media
  
  [See all topics](https://www.cnn.com/follow)
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2025%2F11%2F13%2Fmedia%2Fbbc-apologizes-trump-documentary-latam-intl "Share with email")Link Threads
  
  Link Copied!
  
  ![Image 1: Pedestrian walks outside the BBC Headquarters in London on November 12.](https://media.cnn.com/api/v1/images/stellar/prod/ap25316394685569.jpg?c=original&q=w_860,c_fill)
  
  Pedestrian walks outside the BBC Headquarters in London on November 12.
  
  Kin Cheung/AP
  
  London—
  
  The BBC apologized to US President Donald Trump on Thursday over a documentary that Trump’s lawyers described as false and defamatory, seeking to defuse a row that has plunged the public broadcaster into its [worst crisis in years](https://www.cnn.com/2025/11/11/uk/trump-bbc-sue-one-billion-explainer-intl).
  
  A BBC spokesperson said that lawyers for the broadcaster had written to Trump’s legal team in response to a letter received on Sunday.
  
  “BBC chair Samir Shah has separately sent a personal letter to the White House making clear to President (Donald) Trump that he and the corporation are sorry for the edit of the president’s speech on 6 January 2021, which featured in the program,” the spokesperson said.
  
  Ad Feedback
  
  The spokesperson said the BBC has no plans to rebroadcast the documentary on any BBC platforms while rejecting that it was defamatory.
  
  Rebuffing Trump’s demands for compensation, the broadcaster said that “while the BBC sincerely regrets the manner in which the video clip was edited, we strongly disagree there is a basis for a defamation claim.”
  
  A letter from the BBC’s legal team summarizes the organization’s arguments as to why it believes it does not have a case to answer, including that the documentary was not distributed in the US, that the edit was not made to mislead viewers, rather to “shorten a long speech,” and that the 12-second clip not meant to be considered in isolation.
  
  The documentary also did not cause Trump any harm, the letter argues, as he was re-elected as US President shortly after the clip aired in the UK.
  
  Trump had threatened to sue the BBC for $1 billion unless it retracted the October 2024 documentary and apologized for what his lawyers have described as “overwhelming financial and reputational harm” before a deadline of 5 p.m. ET Friday. He is yet to respond to the BBC apology.
  
  [Related article ![Image 2: “While the BBC sincerely regrets the manner in which the video clip was edited, we strongly disagree there is a basis for a defamation claim,” the broadcaster said on Thursday.](https://media.cnn.com/api/v1/images/stellar/prod/gettyimages-2245675774.jpg?c=16x9&q=h_720,w_1280,c_fill/w_256) “While the BBC sincerely regrets the manner in which the video clip was edited, we strongly disagree there is a basis for a defamation claim,” the broadcaster said on Thursday. Henry Nicholls/AFP/Getty Images Analysis: BBC signals it will fight, not fold under Trump’s political pressure](https://www.cnn.com/2025/11/13/media/bbc-trump-panorama-legal-threat-documentary)
  
  The BBC had already apologized for an error of judgment in the documentary, titled “Trump: A Second Chance?”, but not before it had ignited a scandal that saw the resignations of its director-general and head of news.
  
  In the documentary, Trump’s January 6 speech was edited to show him saying: “We’re gonna walk down to the Capitol and I’ll be there with you and we fight. We fight like hell and if you don’t fight like hell, you’re not going to have a country anymore.”
  
  In fact, the US leader said: “We’re gonna walk down to the Capitol and we’re going to cheer on our brave senators and congressmen and women,” with “fight like hell” coming 54 minutes later.
  
  In an interview with Fox News Tuesday, Trump said the British broadcaster had “butchered” his “beautiful” and “calming” speech and “made it sound radical.”
  
  On Thursday, [the Telegraph newspaper](https://www.telegraph.co.uk/news/2025/11/13/bbc-doctored-trump-speech-second-time-newsnight/) accused the BBC of similarly editing the same speech in a 2022 episode of the show Newsnight, again making it look like Trump was encouraging his followers to “fight like hell” in the Capitol.
  
  A spokesperson for the broadcaster said that “the BBC holds itself to the highest editorial standards,” adding that the matter “has been brought to our attention and we are now looking into it.”
  
  [Related video ![Image 3: 115138_TrumpBBCSue_clean.00_00_06_27.Still004.jpg](https://media.cnn.com/api/v1/images/stellar/prod/115138-trumpbbcsue-clean-00-00-06-27-still004.jpg?c=16x9&q=h_720,w_1280,c_fill/w_256) Fox News/The Ingraham Angle Trump says ‘I have an obligation’ to sue the BBC in Fox interview](https://www.cnn.com/2025/11/12/us/video/trump-bbc-fox-sue-january-six-ldn-digvid)
  
  Trump has a history of sending legal threats and not following through with lawsuits. But he has sued [The New York Times](https://nam11.safelinks.protection.outlook.com/?url=https%3A%2F%2Fwww.cnn.com%2F2025%2F09%2F16%2Fmedia%2Ftrump-lawsuit-new-york-times-hnk&data=05%7C02%7Cclaire.cozens%40wbdcontractor.com%7C4ce03a9fa8384715575608de21efbb85%7C0eb48825e8714459bc72d0ecd68f1f39%7C0%7C0%7C638985511047526815%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=tLyM%2FwbpCwgK9WoJZRtILTxplFiFwecPXYR5XcZtlDo%3D&reserved=0) and [The Wall Street Journal](https://nam11.safelinks.protection.outlook.com/?url=https%3A%2F%2Fwww.cnn.com%2F2025%2F07%2F18%2Fpolitics%2Ftrump-wall-street-journal-jeffrey-epstein&data=05%7C02%7Cclaire.cozens%40wbdcontractor.com%7C4ce03a9fa8384715575608de21efbb85%7C0eb48825e8714459bc72d0ecd68f1f39%7C0%7C0%7C638985511047550212%7CUnknown%7CTWFpbGZsb3d8eyJFbXB0eU1hcGkiOnRydWUsIlYiOiIwLjAuMDAwMCIsIlAiOiJXaW4zMiIsIkFOIjoiTWFpbCIsIldUIjoyfQ%3D%3D%7C0%7C%7C%7C&sdata=ntoIMr%2BiTzcrXF1gDuxm6TmjjBiMhY3CvYt%2FVmLlFp0%3D&reserved=0) in recent months over other grievances.
  
  The BBC’s board has been criticized for responding too slowly to the editing error, which was revealed in a leaked internal memo that has created a firestorm of criticism and allegations of systemic bias.
  
  Deborah Turness, the outgoing CEO of BBC News who resigned on Sunday, has said that while mistakes were made, “allegations that BBC News is institutionally biased are wrong.”
  
  In a message to BBC News staff following her resignation, Turness said that the backlash surrounding the Trump documentary had “reached a stage where it is causing damage to the BBC – an institution that I love.”
  
  Britain’s Culture Secretary Lisa Nandy told the BBC that the broadcaster was “right to apologize for what were serious mistakes.”
  
  When asked if she believed the BBC is “doomed” if it loses the public’s trust, the official said that the organization “is and remains the most trusted source of news in this country, and one of the top five most trusted sources of news all over the world.”
  
  When it makes mistakes, the BBC must be “willing and able to respond to that level of challenge and to put in place changes, because that trust is something that is essential, it’s vital, it’s precious, and it must be protected,” she said.
  
  The British public broadcaster’s next steps are not immediately clear.
  
  Trump’s legal team had no immediate comment when reached by CNN.
  
  _This story has been updated with additional details._
  
