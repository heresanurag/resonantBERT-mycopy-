title: "Lindsey Halligan fires more prosecutors in key US attorney’s office"
date: "2025-10-17"
section: "Politics"
url: "https://www.cnn.com/2025/10/17/politics/lindsey-halligan-ousts-more-prosecutors-eastern-district-virginia?iid=cnn_buildContentRecirc_end_recirc&recs_exp=up-next-article-end&tenant_id=popular.article.en"
content: |
  President Donald Trump’s hand-picked interim US AttorneyLindsey Halliganhas fired more senior prosecutors from the Eastern District of Virginia office, two sources familiar with the matter told CNN.
  
  Beth Yusi and Kristin Bird were no longer with the office as of Friday. Yusi has been with the Department of Justice since 2007. One source said that Halligan believed the attorneys to be leaking “unauthorized” information to the press. The other source added that they received termination letters.
  
  Halligan has moved quickly to assert her authority over the office, with several recent firings and departures, and  she has become personally involved in courtroom proceedings — which is unusual for a US attorney —in the recent indictments of Trump foesJames ComeyandLetitia James.
  
  The move indicates a deepening split between Halligan, who leads the powerful office, and its roster of experienced prosecutors.
  
  The Trump DOJ’s slow-motion Saturday Night Massacre
  
  The departures mark the latest in a string of resignations and firings in the Eastern District of Virginia in less than a month.
  
  The first Trump-appointed US attorney in the Eastern District of Virginia,Erik Siebert, resigned under pressure from Trump, as resistance in the office built around charging Comey at the end of September.
  
  Cleary sided with career prosecutors who opposed bringing the Comey case. She sat in a back row, not at the government table, when Halligan presented the indictment from the grand jury before the magistrate judge.
  
  Two other career prosecutors,Michael Ben’Aryand Maya Song, were fired in the aftermath of Halligan charging Comey. Comey’s son-in-lawTroy Edwards Jr.,who was a career prosecutor in the office, also resigned.
  
  Justice Department “leadership is more concerned with punishing the President’s perceived enemies than they are with protecting our national security,” Ben’Ary wrote in a note he taped to the door of his former office when he left two weeks ago.
  
  This story has been updated with additional reporting.
