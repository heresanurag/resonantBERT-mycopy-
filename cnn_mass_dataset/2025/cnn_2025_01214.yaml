title: "Top HHS spokesman resigns amid clashes with key RFK Jr. aide"
date: "2025-03-03"
section: "Health"
url: "https://www.cnn.com/2025/03/03/health/hhs-spokesman-resigns-corry/index.html"
content: |
  A top spokesman for the US Department of Health and Human Services resigned abruptly Friday, according to his post onLinkedInon Monday.
  
  As measles outbreak grows, HHS secretary says vaccination is a personal decision that can protect individuals and communities
  
  Thomas Corry, assistant secretary of public affairs, didn’t provide a reason in his post, but PoliticoreportedMonday he quit after clashing with Secretary Robert F. Kennedy Jr. and his principal deputy chief of staff,Stefanie Spear, who served as press secretary for Kennedy’s presidential campaign. The conflicts included management of the agency amid the growing measles outbreak in Texas, Politico reported.
  
  Sources told CNN that Spear appeared to run communications within HHS, frustrating Corry. They declined to be named for fear of retribution. An HHS spokesperson declined to comment. CNN hasn’t been able to reach Corry.
  
  “I want to announce to my friends and colleagues that last Friday I announced my resignation effective immediately,” Corry said on LinkedIn. “To my colleagues at HHS, I wish you the best and great success.”
