title: "Israeli official says country has accepted 60-day Gaza ceasefire deal detailed by Trump"
date: "2025-07-01"
section: "Politics"
url: "https://www.cnn.com/2025/07/01/politics/gaza-ceasefire-israel-agreement-trump?iid=cnn_buildContentRecirc_end_recirc"
content: |
  Israel has accepted the latest Gaza ceasefire and hostage release proposal, according to an Israeli official, who said Wednesday the updated framework provides stronger US assurances about ending the war.
  
  The confirmation comes after President Donald Trump said Tuesday Israel had “agreed to the necessary conditions” to finalize a ceasefire in Gaza. It was not immediately clear whether Hamas would accept the terms.
  
  Israel’s Minister of Strategic Affairs Ron Dermer agreed to the proposal while in Washington on Tuesday, prompting Trump’s social media post. And Israel Foreign Minister Gideon Saar said Wednesday during a press conference in Estonia that the country is “serious in our will to reach a hostage deal and a ceasefire.”
  
  “There are some positive signs. I don’t want to say more than that right now,” Saar added.
  
  Two US administration officials said Hamas still had to agree to the deal. In apost on Truth social, Trump said the Qataris and the Egyptians would deliver it.
  
  “My Representatives had a long and productive meeting with the Israelis today on Gaza,” Trump wrote. “Israel has agreed to the necessary conditions to finalize the 60 Day CEASEFIRE, during which time we will work with all parties to end the War. The Qataris and Egyptians, who have worked very hard to help bring Peace, will deliver this final proposal.”
  
  Hamas said it is reviewing the latest Gaza ceasefire proposal but did not indicate if they would accept the deal.
  
  The proposal was finalized after months of behind-the-scenes efforts led by Trump’s special envoy Steve Witkoff, the source said.
  
  As part of the latest proposal, Israel has agreed to allow a surge of humanitarian aid through traditional UN-run channels rather than through the controversial US-backed Gaza Humanitarian Foundation, the Israeli official said.
  
  Israeli Prime Minister Benjamin Netanyahu will convene his full Cabinet on Saturday night to discuss the proposal before flying to Washington to meet with Trump on Monday.
  
  Despite Trump’s statement, an Israeli source familiar with the matter said earlier Israel had not approved the new proposal, which revolves around timetables and guarantees for ending the war, the critical sticking points in previous negotiations. The source did not provide details on the updated language in the proposal about the guarantees. Netanyahu may send a delegation to participate in ceasefire talks following his meeting with Trump, they added.
  
  The new proposal comes just days after Qatar helped broker a ceasefire between Iran and Israel after US and Israeli strikes on Iran’s nuclear program, and months after an initial Trump administration-backed ceasefire proposal for Gaza was rejected by Hamas.
  
  A source told CNN that the new version — which the Qataris also worked on — attempted to take into account Hamas’ concerns with the earlier proposal. During the ceasefire, Israeli hostages would be released in exchange for Palestinian prisoners, the source added.
  
  The White House did not comment on the details of the proposal, which were reported before Trump’s Truth Social post.
  
  On Tuesday, an Israeli military officialtold CNNthat Israel had not fully achieved all of its war goals, but as Hamas’ forces have shrunk and gone into hiding, it has become more difficult to effectively target what remains of the militant group.
  
  Netanyahu said Sunday that “many opportunities have opened up” following Israel’s military operations in Iran, including the possibility of bringing home the remaining hostages held in Gaza.
  
  Trump told reporters Tuesday that he would be “very firm” in discussions with Netanyahu at next week’s planned White House meeting and predicted the prime minister wanted to end the war.
  
  “He wants to. I can tell you he wants to. I think we’ll have a deal next week,” Trump said.
  
  But even with a new proposal on the table, agreeing to a ceasefire remains a major challenge. Hamas has long pushed for a permanent ceasefire, so it is unclear if it would agree to a temporary 60-day truce. Hamas also still maintains its core demand that the war needs to end and that it would have to stay in power, which Israel will not allow, said a separate source familiar with the matter.
  
  Still, there have been some indications that Hamas is willing to show some leniency on its hardline positions, the source said.
  
  This story has been updated with additional information.
