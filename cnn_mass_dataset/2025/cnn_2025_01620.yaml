  Twoeclipse eventswill take place as summer draws to a close.
  
  A total lunar eclipse will be visible in Europe, Asia, Australia, Africa, parts of eastern South America, Alaska and Antarctica on September 7 and 8, according toTime and Date.
  
  A lunar eclipse occurs when the moon passes directly into Earth’s shadow as the sun, Earth and the moon line up. This causes the moon to appear darker or dimmed.
  
  When the moon sits in the darkest part of Earth’s shadow, the sun’s rays peek out from behind the Earth and the light refracts, giving the moon a reddish hue, according to London’sNatural History Museum. Some people call the result a blood moon.
  
  Two weeks after the total lunar eclipse, a partial solar eclipse will be visible in parts of Australia, the Atlantic, the Pacific and Antarctica on September 21.
  
  Solar eclipses occur when the moon moves between the sun and Earth. In the case of a partial solar eclipse, the moon will not fully block out the sun, according toNASA. It creates a crescent — as if the moon took a bite out of the sun.
  
