title: "Sting cancels three US concerts due to illness"
date: "2025-01-22"
section: "Entertainment"
url: "https://www.cnn.com/2025/01/22/entertainment/sting-cancels-us-concerts-scli-intl/index.html"
content: |
  Stinghas postponed three US concerts and canceled an awards appearance due to illness.
  
  In astatementpublished on Instagram on Wednesday, the British rock legend said that “with severe regret” he had canceled an appearance at the Bass Magazine Awards scheduled for Thursday following advice from his doctor.
  
  The Golden Globes and Grammy winner has also moved a concert in Phoenix from January 24 to June 1, and another show in Wheatland, California from January 26 to May 28.
  
  Finally, a performance at the Cherrytree Music Company’s 20th anniversary will now take place May 29, according to the statement.
  
