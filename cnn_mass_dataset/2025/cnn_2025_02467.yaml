  👋Welcome to 5 Things PM!The most popular breakfast food for kids — a bowl of cereal — has gotten even unhealthier. CNN wellness expert Dr. Leana Wen, the mother of two school-age children,offers some better optionsfor what parents can serve instead.
  
  Here’s what else you might have missed during your busy day:
  
  1️⃣Recession risks:President Donald Trump’s tariffs — those he has threatened and those he has already enacted — have led some experts to predict that the US economy could enter a recession while also seeing inflation rise.Here’s what it means for consumers.
  
  2️⃣On the lam:Grant Hardin, a former police chief in Arkansas, was serving lengthy prison sentences for murder and rape. Some call him “evil,” and his brazen escape this week has left a small town on edge andreopened old wounds.
  
  3️⃣Keeping the faith:Todd and Julie Chrisley built an empire based on religion and family. Then they were convicted of conspiracy to defraud banks out of more than $30 million in loans. Thanks to a presidential pardon,they’re embarking on a new chapter.
  
  4️⃣‘Ugly ducklings’:Jewelry experts have always emphasized the importance of the clarity and cut of a gem — until now.Imperfections are no longer tabooas high-end jewelers champion stones with unique inclusions or a lack of sparkle.
  
  5️⃣Bright lights:The neon signs that used to illuminate Hong Kong have mostly gone dark because of safety concerns and tighter government regulations. Artist Jive Lau opened a studioto help keep the city’s neon heritage alive.
  
  👀Breaking free:New video obtained exclusively by CNN shows a manescaping the New York City townhousewhere he was allegedly tortured and held hostage for weeks in a cryptocurrency extortion scheme.
  
