  🇬🇧 That’s how many Americanshave applied for UK citizenshipsince the start of Trump’s second term.
  
  🦍Back where they belong:Four eastern lowland gorillas that had been captured by wildlife traffickers werereintroduced into the wildin Virunga National Park in the Democratic Republic of the Congo. It’s the largest translocation of the critically endangered species.
  
  🎭Dramatic reunion:The original cast of the hit Broadway musical “Hamilton” will get back togetherto perform during the Tony Awardsnext week at Radio City Music Hall.
  
  🧑‍⚖️The prosecution rested its case in Karen Read’s retrial. What is she accused of?﻿A. Insurance fraudB. Killing her boyfriendC. Child abuseD. Embezzlement⬇️Scroll down for the answer.
  
  🫙Making waves:When Roberto Beltrami was a physics student at Boston University, he was captivated by the work of American artist Dale Chihuly. He decided to take a glassblowing class and started his own workshop at the age of 25. Now he’s one of theyoungest master glassmakers in Murano, the Italian island renowned for centuries for the glass made there.
  
