title: "Analysis: What the Jewish community needs most in its time of distress"
date: "2025-12-16"
section: "US"
url: "https://www.cnn.com/2025/12/16/us/antisemitism-solutions-hanukkah"
content: |
  Public displays of Jewish worship have become hunting grounds.
  
  The deadly attack on the Sydney Jewish community at Bondi Beach this weekend, where people were gathering for a Hanukkah celebration, served as yet another painful example of the violent hatred many have for people like me.
  
  Antisemitism has come roaring back over the past decade - particularly since the Hamas terrorist attack on Israel on October 7, 2023. Anti-Jewish hate crimes in the United States rose last year to their highest level since 1991,according to the FBI. And antisemitic incidents documented by the Anti-Defamation League spiked last year to theirhighest levelsince the ADL started keeping records in 1979.
  
  Many Jews have turned inward for community, while synagogues have become literal fortresses of bullet-proof glass and armed guards, further isolating the Jewish community from the outside world and the wider support we need so much in these dark moments.
  
  The Jewish community needs help – from non-Jews and Jews alike.
  
  How can people support their Jewish neighbors? I asked the rabbis and Jewish leaders in my life, including family and friends I met as an undergraduate at the Jewish Theological Seminary of America.
  
  Their messages were remarkably similar.
  
  If you’re looking for one thing to do to support the Jewish community, reach out – now.
  
  Calls, texts or any gesture of support can carry more weight than people might realize, said Rabbi Jesse Olitzky, the spiritual leader of my synagogue, Congregation Beth El in South Orange, New Jersey.
  
  “They remind your Jewish friends that we are seen, that we are not alone, and that others stand beside us and stand with us,” he said.
  
  Jonathan Greenblatt, CEO of the ADL, offered a similar message.
  
  “For non-Jews, now is the time to check in,” he told me. “Showing friendship can seem small, but it can be very big when people are feeling alienated.”
  
  A next-level approach: Be physically present with the Jewish community.
  
  “It’s actually easier than it sounds,” said Greenblatt. “Non-Jews can show up at a menorah lighting and just be there for their friends. Being proximate can help Jewish people who are feeling alone.”
  
  Jews throughout time have benefitted tremendously from their relationships with non-Jews. An infinitesimal 0.2% of the world’s overall population, Jews would not have survived this long without building those bridges, said Shuly Rubin Schwartz, Chancellor of the Jewish Theological Seminary of America and my former dean.
  
  “Building interreligious bridges has never been more important,” she said. “Isolation is not the answer.”
  
  The small size of the Jewish community makes incidents like Bondi Beach, the attack on a Manchester, England, synagogue this past Yom Kippur, or the October 7 attacks, felt acutely by Jews around the world.
  
  But my former roommate Rabbi Jason Fruithandler of Woodbury Jewish Center on Long Island said his congregation has felt abandoned since October 7 – particularly after they worked so hard to foster relationships in the interfaith community.
  
  “For many Jews I talk to, it feels to them like they make it a point to show up for other vulnerable communities,” Rabbi Fruithandler said. “It can be doubly hard when they feel like they don’t get the same in return.”
  
  If you’re looking for inspiration, the Christian community ofBillings, Montana, set a tremendous example.
  
  In 1993, White Supremacists in Billings desecrated a Jewish cemetery, sent bomb threats to a synagogue and threw a brick at a menorah in the window of a five-year-old Jewish boy. In response, the Christian community stood up against hate – and stood with their Jewish neighbors. Churches in Billings organized a massive effort to place thousands of hand-drawn menorahs in windows across town.
  
  What can Jews do to help? Be practical, sensible and safe – but don’t give in to fear.
  
  “It’s important not to be intimidated,” said Rabbi Andrew Warmflash, my father-in-law and Rabbi Emeritus of the Hewlett-East Rockaway Jewish Centre on Long Island. “The message of Hanukkah is resilience. Part of resilience is maintaining the perspective that antisemitism is real and this is horrific, but there is light in the darkness.”
  
  Staying strong after a moment of shocking violence can be intimidating. But there is reason for hope: The man who bravely tackled one of the suspected Bondi Beach gunmen was a non-Jew,Ahmed al Ahmed. The suspects’ imamcondemned their actionsas antithetical to Islam. Complete strangers showed up in long lines to donate blood after the shooting. Numerous Muslim nations immediately spoke out against the attack.
  
  Ironically, fear has led a growing number of Jews to demonstrate pride in their Judaism. Half of synagogues affiliated with America’s Conservative movement reported increased attendance since October 7, compared to 2% that said attendance has fallen, according to theUnited Synagogue of Conservative Judaism.
  
  “There is a lot of good that is coming from the fear of antisemitism,” said my friend Rabbi Ari Saks of Temple Torat Yisrael of East Greenwich, Rhode Island. “Jewish people are coming closer to their faith.”
  
  Greenblatt echoed that message.
  
  “The best response to anti-Jewish hate is for Jews to be more Jewish,” Greenblatt said. “If you ever wondered if there was a year to light the menorah, this is the year.”
