  When an extraterrestrial rock fell to Earth in June, it caused a sonic boom in the Southeast before crashing through the roof of a home in Georgia. Now, researchers say the McDonough Meteorite isolder than our planet.
  
  Here’s what else you need to know to get up to speed and on with your day.
  
  The Israeli military targeted and killedAl Jazeera correspondent Anas Al-Shariflate Sunday after accusing him of leading a Hamas cell. Al-Sharif, a prominent 28-year-old journalist who covered the war from inside Gaza, previously denied the allegation. Six other people, including at least three additional Al Jazeera journalists, were killed in the attack, which occurred near the entrance of Al-Shifa Hospital in Gaza City. Hospital director Dr. Mohammad Abu Salmiya said the journalists were in a tent marked with a “Press” sign. According to the Committee to Protect Journalists, 186 journalists have been killed since the beginning of the war nearly two years ago. Of those, at least178 were “Palestinians killed by Israel.”Minutes before he was killed, Al-Sharif posted on social media: “If this madness does not end, Gaza will be reduced to ruins, its people’s voices silenced, their faces erased — and history will remember you as silent witnesses to a genocide you chose not to stop.”
  
  President Donald Trump is expected tohold a press conference later this morningto announce plans to curb violent crime in Washington, DC. Since February, Trump has frequently threatened a federal takeover of the nation’s capital because, as he remarked on his social media site, “Crime in Washington, DC, is totally out of control.” However, according to preliminary data from DC police, this year’s crime numbers are lower than last year’s. Trump also said he would make the Capital safer and more beautiful than ever before, and that the homeless population would have to immediately move out. “We will give you places to stay, but FAR from the Capital,” Trump posted on Sunday. He didn’t say what services were going to be provided or where the homeless population would be taken.
  
  The legal battle over President Trump’s deployment of National Guard troops to quell protests in Los Angelesheads to court today. In June, hundreds of people held demonstrations in the city to protest immigration raids by ICE. In response, Trump deployed 4,000 National Guard members over the objections of California Gov. Gavin Newsom and LA Mayor Karen Bass. Now, a judge will determine if Trump violated a 147-year-old law that allows the president to federalize the Guard during times of actual or threatened rebellion or invasion, or when regular forces can’t enforce US laws. Newsom’s attorneys say Trump illegally made an “unprecedented power grab” and violated the Constitution by overruling local authorities to send in the military. Trump’s lawyers said the National Guard troops were dispatched only to protect federal property and personnel and didn’t engage in any law enforcement activities.
  
  Texas Republicans’ recent effort to redraw the state’s congressional districts in the middle of the decade has so far been stymied by more than 50 quorum-breaking Democratic House memberswho left the state. The GOP’s proposed map could potentially eliminate five Democratic US House seats ahead of the 2026 midterms. Such a partisan change may also have repercussions in Washington, DC, where House Republicans hold a razor-thin majority. Conservative leaders have vowed to punish, arrest and remove the Democratic lawmakers from office. Democrats say they will not allow the new maps to advance in the legislature, despite Republican threats. So, how will this political standoff shake out?Here are four possible outcomes.
  
  More than 10 million people across the Midwest remain under flood alerts this morning as heavy rains continue to fall. Milwaukeewas hit particularly hardby storms over the weekend and is on track to break its daily rainfall record of 14.5 inches. On Sunday, Milwaukee County declared a state of emergency as the Milwaukee River crested to a historic 11.19 feet. Flash floods swamped roads and stranded vehicles, prompting first responders to make dozens of water rescues. Even the Wisconsin State Fair had to shut down early because heavy rains flooded the fairgrounds. The severe weather is part of the same storm system that brought wind gusts of more than 80 mph to Nebraska on Saturday and killed one person. Hundreds of inmates at the Nebraska State Penitentiary also had to be relocated after the storms damaged two housing units, the AP reported.
  
