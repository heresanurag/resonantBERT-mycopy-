title: "5 things to know for Jan. 9: Los Angeles wildfires, Carter funeral, Presidential immunity, School safety, Winter virus season"
date: "2025-01-09"
section: "US"
url: "https://www.cnn.com/2025/01/09/us/5-things-to-know-for-jan-9-los-angeles-wildfires-carter-funeral-presidential-immunity-school-safety-winter-virus-season/index.html"
content: |
  Wind-driven wildfires are pushing through Los Angeles County, forcing residents to flee their homes by the tens of thousands. Learn how you canhelp the evacuees and firefightersimpacted by this unprecedented disaster.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  At least five people have died as severalmajor fires in Los Angeles Countyremain mostly uncontained. The seaside neighborhood of Pacific Palisades has been devastated, with many residents and reporters describing the area as “apocalyptic” and a “ghost town.” Officials saythe Palisades Firehas exploded to more than 17,200 acres with zero containment. It has destroyed at least 1,000 structures, making it the most destructive ever in Los Angeles County. The other massive blaze,the Eaton Fire, is overtaking homes across Altadena and has ballooned to more than 10,000 acres. With wind speeds easing, crews say that air tanker planes will be better able to drop water and fire retardants today to hopefully contain the fires and protect property.
  
  Former President Jimmy Carter will be honored today in Washington, DC, athis official state funeral. Carter, the 39th president of the US, died at age 100 on December 29. President Joe Biden declared January 9 as a national day of mourning in an executive order and isexpected to deliver a eulogy. President-elect Donald Trump told reporters that he plans to attend the service. Many businesses will be operating as usual but the US Postal Servicewill suspend regular operations. All federal departments and agencies will also be closed. As for the stock market, the New York Stock Exchange will not trade and the Nasdaq will close all of its equities and options markets.
  
  Donald Trump on Wednesday urged the Supreme Court to pause his sentencing in thehush money case set for Friday, a highly unusual request that relies in part on the court’s decision last year to grant himbroad immunity from criminal prosecution. Trump was convicted in May of falsifying business records over payments to his then-lawyer Michael Cohen to reimburse a $130,000 hush money payment made to an adult film star to keep her from speaking out about an alleged affair before the 2016 election. Trump has denied the affair. Trump’s request to the Supreme Court is unusual because his criminal case isn’t fully resolved by New York courts. A New York appeals court judge recentlyrejected Trump’s demandsto stop the Friday sentencing.
  
  A 14-year-old student has been arrested after bringing a gun on Wednesday to Apalachee High School, the same Georgia high school where a shooting in September killed two teachers and two students and wounded others. The student was taken to a juvenile detention facility and charged with two counts ofpossessing a weapon on school grounds, theft and being a minor in possession of a gun. Wednesday’s arrest comes as students, teachers and parents across the US have urged local officials to enhance security on school campuses. More than 80 school shootings took place in 2024, surpassing 2023 for themost school shootings in a single yearsince CNN began tracking such incidents in 2008.
  
  Cases of respiratory illness, Covid-19 and seasonal flu areincreasing in most parts of the US, according to the CDC. Emergency room visits for flu and the respiratory syncytial virus, or RSV, are very high. While Covid-19 cases leading to emergency room visits are still low, they are increasing, with wastewater testing alreadyrevealing high coronavirus levels. Several other infectious illnesses are making the rounds, too, including the viruses that cause the common cold and bacteria that lead to strep throat. Health experts recommend that individuals at higher risk for developing severe disease from Covid-19 and influenza should get tested as soon as their symptoms start so that they can begin prompt antiviral treatment.
  
  Hollywood productions and events halted due to raging LA wildfiresThe wildfires in the celebrity-filled enclave of Pacific Palisades and other areas have forced a production shutdown in Los Angeles.Here’s what we know.
  
  SAG Award nominations 2025The nominees for the 31st annual Screen Actors Guild Awards were revealed in a news release on Wednesday after the live in-person event was canceled due to LA’s dangerous fire conditions.See the full list of nominees.
  
  Ex-CEO of MoviePass’ parent company faces up to 25 years in prisonThe former chief executive of MoviePass’ parent company has pleaded guilty to charges of securities fraud and conspiracy.Read about the case.
  
  Video: Bluefin tuna sells for $1.3 millionTokyo’s Toyosu fish market saw its second-highest price on record forthis massive bluefin tunathat was auctioned for over a million dollars.
  
  Maximalist fashion is staging a loud returnPopularized on social media,the maximalist styleis more extreme and theatrical than ever — and is bringing the look to a whole new demographic.
  
  $500 million​​That’s the estimated value of the final aid package that the Biden administrationwill send to Ukraine. It comes as the White House prepares to announce another round of sanctions on Russia, expected at the end of this week. The Biden administration has given more than $65 billion in aid to Ukraine since the war began in February 2022.
  
  “Getting sick is prohibited.”
  
  — The mayor of a small town in southern Italy, issuing a proclamation thatbans residents from falling ill. About 1,300 people in Belcastro have been “ordered to avoid contracting any illness that requires medical assistance” due to the town’s inadequate access to healthcare.
  
