title: "Democrat James Walkinshaw will win US House seat in Virginia special election, narrowing GOP majority, CNN projects"
date: "2025-09-09"
section: "Politics"
url: "https://www.cnn.com/2025/09/09/politics/virginia-special-election-house"
content: |
  Democrat James Walkinshaw will win a special election in Virginia’s 11th Congressional District, CNN’s Decision Desk projects, bolstering Democratic numbers in the House and cutting down on an already slim Republican majority.
  
  With Tuesday’s results, House Speaker Mike Johnson will now only be able to afford to lose two Republicans on party-line votes as opposed to three.
  
  The election in the 11th Congressional District is being held to fill longtime Democratic Rep. Gerry Connolly’s seat. Connollydied from cancer in May.
  
  “Tonight, northern Virginians have sent a very powerful message: The reckless Trump agenda must come to an end,” Walkinshaw said in remarks at his election night party on Tuesday.
  
  Walkinshaw, Connolly’sformer chief of staffand a Fairfax County supervisor, was heavily favored. Walkinshaw faced Republican Stewart Whitson, a military veteran and former FBI special agent currently working as a lobbyist.
  
  Situated in the suburbs of Washington, DC, the district includes a large swath of Fairfax County and is home to thousands of federal workers. It voted for former Vice President Kamala Harris over President Donald Trump by 34 percentage points in the 2024 election. Connolly sailed to reelection by that same margin.
  
  House Democrats hope to add back to their ranks after a string of member deaths has given the GOP some breathing roomwith the party’s slim majority in the chamber. Connolly was the third House Democrat to die while in office this year after Reps.Sylvester Turner of TexasandRaul Grijalva of Arizonaboth died in March. Tennessee RepublicanMark Green stepped down in July, putting the current House breakdown at 219 Republicans to 212 Democrats.
  
  It’s possible all three of the Democratic vacancies will get filled before Green is replaced in December, putting more pressure on the narrow GOP majority. The election to replace Grijalva is set for September 23, and the special election in Turner’s district is scheduled for November 4: Both seats are expected to stay in Democratic hands.
  
  The arrival of those Democrats could mean a timely advantage for House members looking to force a vote to release theJeffrey Epstein files. The bipartisan discharge petition led by Republican Rep. Thomas Massie and Democratic Rep. Ro Khanna needs 218 signatures to move forward, and the congressmen maintain they have 216 votes so far without Walkinshaw and the likely Democratic Arizona member joining the chamber this month.
  
  “We have the 218 votes. 216 already support it,” Khanna said in an interview with ABC’s “This Week” on Sunday. “There are two vacancies that haven’t been reported as much, but two Democrats are going to be joining, and they are both committed to signing it. That’s going to happen by the end of September.”
  
  This story and headline have been updated with additional details.
