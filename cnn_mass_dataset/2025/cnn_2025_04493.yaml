title: "5 things to know for Feb. 13: Federal firings, Trump-Putin call, Inflation, Homelessness, Taiwan explosion"
date: "2025-02-13"
section: "US"
url: "https://www.cnn.com/2025/02/13/us/5-things-to-know-for-feb-13-federal-firings-trump-putin-call-inflation-homelessness-taiwan-explosion"
content: |
  Severe winter weather isdisrupting travel and commutesacross the US, with data showing thousands of recent flight cancellations and delays. Millions of people on the West Coast are currently under alerts for flooding rainfall, while snow and ice continue to pound several central and eastern states.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  Scores of firings have begun at federal agencies, withterminations of probationary employees underwayat the Department of Education and the Small Business Administration, sources told CNN. The moves mark the first from the Trump administration as Elon Musk’s Department of Government Efficiency aims to dramatically shrink the federal workforce andpull back on government spending. Until now, federal employees across all US agencies had only been placed on paid administrative leave. The full scope of the firings remains unclear, though it has impacted at least dozens of workers.
  
  President Trump said negotiations to end the Ukraine war will start “immediately” after he held a “lengthy and highly productive” phone call with Russian President Vladimir Putin on Wednesday. The two leadersdiscussed the future of the conflictand “agreed to work together, very closely, including visiting each other’s Nations,” Trump said. His predecessor, President Joe Biden, hadn’t spoken to his Russian counterpart in nearly three years, believing there was little to be gained in speaking to a leader he’d deemed a war criminal. Defense Secretary Pete Hegseth also reaffirmed that the US willno longer prioritizeEuropean and Ukrainian security as the Trump administration focuses on securing US borders anddeterring war with China.
  
  Despite promises from President Trump to bring prices down, many common goods and services in the US got more expensive last month. Inflation jumped to 3% —its highest rate since June of last year, according to the latest Consumer Price Index data released Wednesday by the Bureau of Labor Statistics. The increase was driven by many factors, including therising costs of energy and food. That’s particularly true of eggs, which have seen prices soar and widespread shortages due to avian flu. Egg prices, which are up 53% year-over-year, shot up more than 15% from December to January.
  
  City and state officials in parts of the US are uncertain how to respond to a surge in homelessness and encampments that have cropped up under bridges and in parks. Meanwhile, people who live in those encampments and advocacy groups say they are alarmed byefforts to criminalize the populationrather than build shelters and affordable housing. This week, the city council in Fremont, California, voted to criminalize “aiding” and “abetting” homeless camps — an unusual move that advocates say could stifle help for people who need it. The new policy comes about seven months after theSupreme Court ruledthat ticketing homeless people does not constitute “cruel and unusual punishment.”
  
  A blast inside a shopping mall in Taiwan earlier today killed at least five people and injured several others, according to local officials.Dramatic videos of the explosionin the city of Taichung, on the island’s west coast, showed debris and large panels of a building’s exterior blown out as a loud bang is heard. Footage shot by bystanders of the aftermath showed the street below littered with debris ashundreds evacuated the area. Taiwanese President Lai Ching-te urged authorities to investigate the cause of the accident.
  
  Carmakers Nissan and Honda call off merger talksJapan’s Nissan and Honda haveput the brakes on merger talksthat would have created the world’s third-largest carmaker.
  
  Rock & Roll Hall of Fame 2025 nominees announcedA pop diva. A rock duo. A jam band.Here are the nomineesfor this year’s Rock & Roll Hall of Fame.
  
  From rooftops to islands, Hong Kong has basketball courts everywhereHong Kong has thousands of outdoor basketball courts — some in the most peculiar locations. This photographerwants to capture them all.
  
  New Zealand is home to the ‘world’s clearest lake.’Tourists are even being told towipe their shoes before visiting it.
  
  The latest on R. Kelly’s chargesA federal appeals court on Wednesday upheld singer R. Kelly’s convictions and30-year prison term.
  
  14,000That’s around how many undocumented immigrants have been arrested in the US since President Trump’s inauguration, according to Trump’s border czar Tom Homan.Border crossingsare also down 92% during the same period, Homan said during a radio interview this week.
  
  “I just want to go to school like other kids and keep playing the game I love.”
  
  — Parker Tirell, a transgender high school student in New Hampshire, commenting on the Trump administration’s recent executive orderbanning transgender girls and womenfrom participating in girls’ sports. Attorneys for the 16-year-old have filed a suit challenging the order so she can continue playing for her school’s soccer team.
  
