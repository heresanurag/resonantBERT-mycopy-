title: "The metaverse is cooked, and Wall Street couldn’t be happier"
date: "2025-12-04"
section: "Business"
url: "https://www.cnn.com/2025/12/04/business/meta-metaverse-stock-nightcap"
content: |
  A version of this story will appear in CNN Business’ Nightcap newsletter. To get it in your inbox, sign up for freehere.
  
  It appears Meta may finally be ready to put the metaverse out of its misery.
  
  Shares of the company formerly known as Facebook shot up 7% early Thursday in response to aBloomberg reportthat CEO Mark Zuckerberg is slashing the metaverse team’s budget by as much as 30%. CNN hasn’t confirmed the report. In a statement, a Meta spokesperson confirmed that “we are shifting some of our investment” from the metaverse group toward AI glasses and wearables.
  
  The stock ended the day up 3.4%.
  
  It’s not hard to see why Wall Street is so thrilled. After four years and billions of dollars wasted, the metaverse — a feature that Zuck believed in so deeply that herenamedthe company after it — is more or less cooked.
  
  The thing never made much sense, even when Zuck dramatically declared the metaverse would be “the successor of the mobile internet.” The company initially set a goal of 500,000 monthly active users inHorizons Worlds, a virtual reality space, by the end of 2022. According tothe Wall Street Journal, Meta revised that goal by nearly half later that year.
  
  To be clear, we don’t know yet what will become of the metaverse, which is part of Meta’s Reality Labs divisionoverseeing its virtual reality headsets. And Zuckerberg has said he still believes people will one day spend significant amounts of time in virtual worlds.
  
  But the entire project is, to say the least, a far cry from the vast digital idyll of Zuck’s pandemic-era fever dream, and it’s getting shoved to the back of the closet like so many well-intentioned Covid projects.
  
  Investors (and most people using the internet) were skeptical from the start.
  
  The metaverse was asquishy concept, pitched to a populace that had just emerged from Covid lockdowns and wanted little more than to be around other humansoffline,in real life. Meta was telling us that the future of social media would be immersive, like a giant Zoom call populated by digital alter egos that can interact and play games and buy stuff from one another for … fun? It wasn’t actually clear what the point was, and regardless, getting there required access to a bulky $400 headset.
  
  Of course, the timing of Meta’s rebrand was also important. Facebook was desperately trying to army crawl out of a swamp of negative headlines linked to whistleblowerFrances Haugen, who leaked internal documents to the Wall Street Journal detailing how the social media giant repeatedly failed to address problems on its platforms that executives knew were harming users (especially teens).
  
  The company, under all kinds of scrutiny and still sore it missed out on the move to smartphones, needed a narrative shift.
  
  Meta’s big problem: Everything about VR looks supremely uncool
  
  But the more we the people got glimpses into the metaverse, the less appealing it became. About a year after the Meta pivot, an image of Zuck’s own blocky, dead-eyed visage from inside the metaverse went viral because of how shockingly mid the graphics still were after a year of work and billions of dollars to build it. At the time, I wrote up what I saw as Meta’s biggest metaverse problem:It just doesn’t look cool.
  
  The early appeal of Facebook lay partly in how it allowed people to make themselves look cool, whatever that meant to them.
  
  You could be funny or hot or mysterious in your profile picture. You could write up a clever status message name-checking some under-the-radar indie band. You created a whole vibe with your lists of favorite movies and music and books. And you could connect with people in a way that left the meaning of your connection ambiguous — “friending” could mean so much, or so little, no pressure, whatever, just be cool.
  
  That cool factor is decidedly lacking in the metaverse. But Zuck may have learned at least one lesson from the debacle: Aesthetics matter, which is whyMeta is poaching Apple’s top designer, Alan Dye, to run a new studio for hardware, software and AI integration.
  
  Savings from metaverse cuts, people familiar with the plans told Bloomberg, are expected to be diverted to other projects, including AI glasses and other wearables, where Meta is trying to cement its dominance. This year, the company held a huge lead over rivals, capturing 61% of the market for smart glasses and AR/VR headsets,according to IDC Global.
  
  Like the metaverse, though, AI’s financial return is far from certain, and Wall Street has expressed concern about Zuck’s willingness to spend astronomically on unproven tech, even one as popular as AI.
  
  Zuck is, characteristically, undeterred. “If we end up misspending a couple of hundred billion dollars, I think that that is going to be very unfortunate, obviously,” he said in September on the“Access” podcast. “But what I’d say is I actually think the risk is higher on the other side.”
