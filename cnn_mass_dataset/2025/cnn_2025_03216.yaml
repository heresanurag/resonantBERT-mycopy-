content: |
  Venus Williams’ winning return to the professionaltennistour also came with a surprise announcement: She is engaged.
  
  After becoming the second-oldest woman towin a tour-level singles match, Williams gave thanks to her fiance, who was in the stands at the DC Open. He is Andrea Preti, who is a Danish-born Italian model and actor, according to the website IMDB.
  
  The 45-year-old Williams hadn’t played in a tournament in 16 months until entering the event in Washington. She won a doubles match on Monday and a singles match on Tuesday, before losing in doubles on Wednesday.
  
  Williams, who has won seven Grand Slam singles titles, is scheduled to face Magdalena Frech in the second round on Thursday night.
