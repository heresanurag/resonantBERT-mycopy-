title: "Trekker uses cooking pots to dig her way out of freak blizzard on Everest"
date: "2025-10-07"
section: "China"
url: "https://www.cnn.com/2025/10/07/china/everest-blizzard-tibet-intl-hnk"
content: |
  What began as a hiking trip with friends on the breathtaking slopes on the Tibetan side of Mount Everest turned into a frightening ordeal for 30-year-old Feng Holiday, after a rare October blizzard left her andhundreds of hikers strandedin treacherous conditions.
  
  Feng and her group had set off from Youpa Village, in Tibet’s Shigatze prefecture, for their trek through the scenic Gama Valley on the eastern side of Mount Everest on October 1. But three days in, the freak blizzard struck.
  
  Feng was among hundreds of trekkers who had to evacuate after unusually high snowfall collapsed tents and covered trails on Saturday evening, leaving hikers stranded at roughly 16,400 feet (5,000 metres).
  
  About 580 trekkers and more than 300 local guides and porters had safely arrived back in the small township of Qudang, Chinese state news agency Xinhua said late Tuesday night.
  
  Feng – an avid hiker – wasn’t worried when it started snowing because her group was well equipped. But as the storm grew more intense, with thunder and lightning rattling the mountain range, she became concerned.
  
  “By midnight, the snow was getting heavier, and my sleeping bag wasn’t cutting it. There was condensation dripping inside, making it damp,” she said.
  
  “So, I had to go out and shovel snow, only to find my teammates were buried too. We all had to dig together, which was tough since we had no tools — just used our cooking pots!”
  
  More than3 feet (95 cm) of snowfell at the summit of Mount Everest Saturday, according to estimates fromsome snow reports— nearly three times the average weekly snowfall for this time of year.
  
  October is a busy season for hiking around Everest, when skies tend to clear after the monsoon season. This week also coincides with China’s Golden Week holiday.
  
  “The weather this year is not normal. The guide said he had never encountered such weather in October. And it happened all too suddenly,” Chen Geshuang, another trekker who was evacuated to Qudang, told Reuters news agency.
  
  “It was so wet and cold in the mountains, and hypothermia was a real risk.”
  
  Videos posted to Chinese social media platform Xiaohongshu showed hikers shoveling snow off buried tents in blustery whiteout conditions.
  
  After a “scary” night, on Sunday morning Feng and her friends began hiking down the mountain on their own, ditching their tent and gear for lighter packs. At about 6:30 p.m. local time they reached the foot of the mountain, where government officials and locals awaited them, Feng said.
  
  The heavy snowfall follows a week of extreme weather across the Himalayan region. Floods and landslides triggered by severe rain in Nepal and around Darjeeling in northeast India killed more than 70 people, Reuters reported.
  
  A South Korean trekker died after hiking the 21,246-foot (6,476-meter) Mera Peak in Nepal Saturday, Reuters reported.
  
  Reflecting on her ordeal on Everest, Feng shared one key lesson: “We have to respect nature.”
