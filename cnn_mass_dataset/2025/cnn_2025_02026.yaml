title: "Canadian court dismisses farm’s attempt to save ostrich flock despite efforts by RFK Jr."
date: "2025-11-06"
section: "Americas"
url: "https://www.cnn.com/2025/11/06/americas/canada-ostrich-flu-cull-rfk-latam-intl"
content: |
  Canada’s Supreme Court declined to hear an appeal on the proposed culling of a British Columbia ostrich herd,in a case that has attracted the attention of US Health Secretary Robert F. Kennedy Jr. and his “Make America Healthy Again” movement.
  
  The court’sdismissalpaves the way for the flock of around 330 ostriches to be culled. The Canadian Food Inspection Agency (CFIA) had ordered the birds to be euthanized after detectinghighly pathogenic avian influenzaon the farm in late December 2024.
  
  In a statement published Thursday, the CFIA confirmed that it would move forward with euthanizing the ostriches under its “stamping out” policy, in which infected or exposed animals are killed in the event of a disease outbreak. The statement did not provide a timeline.
  
  “This is the saddest day in Canadian history,” Katie Pasitney, the spokesperson for Universal Ostrich Farms and the daughter of one of its co-owners, told CNN shortly after the court made its announcement.
  
  Universal Ostrich Farms in Edgewood, British Columbia says it is raising the animals to study their ability to produce disease-fighting antibodies. The farm has been embroiled in a legal battle with the CFIA for nearly a year over the matter.
  
  The CFIA hascalledthe farm’s research claims “unsubstantiated,” saying that the agency “has not received any evidence of research activities” on the ostrich farm, nor “any research to show the flock of ostriches currently under quarantine has a unique capacity to produce eggs with antibodies.”
  
  The farm’s plea to save the ostriches from culling was heard by Trump administration officials like Kennedy.
  
  After meeting with Canadian officials in May, Kennedywrote a letterto the CFIA asking it to “consider not culling the entire flock of ostriches,” writing that the animals could be used to study the “antibody levels and cellular immunity” to develop cures for disease.
  
  “We believe there is significant value in studying this population,” Kennedy added.
  
