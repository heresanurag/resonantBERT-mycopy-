  Cartel-related violence and drug trafficking in Mexico may capture the majority of media attention, but pettier crimes such as theft and pickpocketing are the most reported problems.
  
  In addition, as is the case in some other countries including Portugal, an influx of foreigners and increasing gentrification in certain cities has sparkedgrowing tensionsin some areas with large expat populations.
  
  How to make the move:Valid passport holders from countries that don’t require a visa (including the United States) can remain in Mexico for up to 180 days. (They still must complete a visitor’s permit, orForma Migratoria Multiple(FMM), at their port of entry. Keep in mind that the exact number of days allowed remains at the discretion of the immigration official processing entry.)
  
  For longer stays, retirees can look into visas astemporaryandpermanent residents. Both are fairly straightforward, but applicants must be able to demonstrate financial stability.
  
