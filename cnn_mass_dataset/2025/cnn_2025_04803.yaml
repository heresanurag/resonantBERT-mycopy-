  “I really appreciate all the messages of support, thank you to all. I am staying positive. I am in good hands,”Brockhoff said on an Instagram Story, adding the surgery will likely occur Wednesday or Thursday.
  
  Her partner flew to Greece to be by her side, according to the AOC.
  
  “Currently our medical team are working with the medical emergency service personnel and the hospital in Greece to ensure that Belle receives the best care possible,” Olympic Winter Institute of Australia CEO Geoff Lipshutsaid.
  
  “Belle is in good spirits, and I am very pleased that her partner has been able to fly to Greece to support her during this time.”
  
  The snowboarder – who became Australia’s first woman to win a snowboard cross World Cup in the 2015-16 season – only recently returned to competition afterfracturing her wrist late last year.
  
  Brockhoffpreviously toreher anterior cruciate ligament (ACL) in a crash at the 2017 World Championships and competed at the 2018 PyeongChang Winter Olympic Games without an ACL.
