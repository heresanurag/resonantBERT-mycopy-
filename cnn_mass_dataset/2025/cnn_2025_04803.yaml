title: "Australian snowboarder Belle Brockhoff suffers broken back after high-speed crash"
date: "2025-03-11"
section: "Sport"
url: "https://www.cnn.com/2025/03/11/sport/belle-brockhoff-australian-snowboarder-injury-spt-intl/index.html"
content: |
  Three-timeWinter OlympianBelle Brockhoff was rushed to a Georgian hospital with abroken backafter a serious crash at a Snowboard Cross World Cup race on Saturday.
  
  The Australian hadplaced third in qualifiersand was competing in her last race of the day in Gudauri, Georgia, when the accident occurred.
  
  Brockhoff’s boardslipped beneath her midway through the course, sending her skidding over a jump at speed before she landed heavily on her tailbone. She appeared to be in discomfort while being tended to by race officials on the side of the slopes.
  
  “Examination and imaging revealed a fracture of the L1 vertebrae, with no neurological damage,” a statement published on behalf of Brockhoff by theAustralian Olympic Committee (AOC) confirmed.
  
  After initial evaluation at a Georgian hospital, the 32-year-old was evacuated to Greece for surgery, where she will likely remain for two weeks before flying home to Australia.
  
