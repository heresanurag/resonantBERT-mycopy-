title: "RFK Jr.’s long, complicated history with the measles vaccines"
date: "2025-04-12"
section: "Politics"
url: "https://www.cnn.com/2025/04/12/politics/rfk-jrs-long-complicated-history-with-the-measles-vaccines/index.html"
content: |
  Health and Human Services Secretary Robert F. Kennedy Jr. this week made his strongest endorsement yet of the measles vaccine amid an ongoing outbreak that has killed three and infected more than 600 people across the US.
  
  But hisrecent pushfor people to get vaccinated for measles stands in stark contrast to Kennedy’s years of work against measles vaccines, including suing the state of New York for its vaccine mandates, and making numerous claims that the shot is dangerous and unnecessary.
  
  Kennedy’scomments on Xlast Sunday that the measles-mumps-rubella (MMR) vaccine, “is the most effective way to prevent the spread of measles” set off vaccine critics who saw the statement as a betrayal of the health secretary’s longtime views on vaccine safety.
  
  “Bobby Kennedy was our founder, but Bobby Kennedy is now the Secretary of HHS,” Mary Holland, CEO of the anti-vaccine group Children’s Health Defense, said in a video statement. “He certainly left off that in my personal experience, and in the personal experience of many people at CHD, the measles, mumps, rubella vaccine was extremely injurious.”
  
  Tracking measles cases in the United States
  
  Holland went on to repeat disproven claims that the MMR vaccine causes autism.
  
  The health secretary followed up this Thursday with a Fox News interview, where he told host Martha MacCallum that it is “very hard to tell” whether measles deaths this year could have been averted with vaccinations. “We need to do better at treating kids who have this disease, and not just saying the only answer is vaccination.”
  
  He also discussed the health agency’s“massive research and testing” planto find the causes of autism by this September, a project he said will probe vaccinations along with environmental exposures, food and societal factors.
  
  While Kennedy has been most critical of Covid-19 vaccines in recent years, MMR immunizations have been one of his earliest and most consistent targets for misinformation and alarmover the last two decades.
  
  As Kennedy wrote in his 2023 book with Brian Hooker, Vax-Unvax, “The MMR vaccine is the tip of the spear regarding the modern debate around vaccine safety.”
  
  Here are three ways Kennedy questioned the vaccine’s safety and the severity of measles infections themselves.
  
  The theory that MMR vaccines led to autism first took hold with a since-retracted 1998 study by Andrew Wakefield. As thedisbarred British physicianrose to prominence in the anti-vaccine world, so did Kennedy — who repeatedly defended his debunked research.
  
  “Wakefield [and his co-researchers] did not state that MMR causes autism,” Kennedy and Hooker wrote in their 2023 book. “They merely pointed out the timing of the vaccine before the onset of symptoms.”
  
  Ten of the 12 co-authors on the studyissued a retractionin 2004, saying it established no causal link between the MMR shot and autism. Infants with autism typically start showing signs between 12-24 months of age; the first dose of the MMR vaccine is usually given when a child is 12 months old.
  
  Kennedy, like Wakefield, has asserted over the years that MMR vaccines lead to myriad adverse events besides autism.
  
  MMR vaccines have an “unconscionably high injury rate” Kennedywrote on CHD’s websitein 2019, citing gastrointestinal and respiratory complications from a mid-1970s study. Those are symptoms “that might persuade rational consumers to choose the infections over the vaccine,” he added.
  
  This March,speaking to Fox News’ Sean Hannity, Kennedy repeated the claim that the vaccines themselves are as risky at the virus. “[The MMR vaccine] causes all the illnesses that measles itself causes,” and leads to “deaths every year,” he said.
  
  There are no reported deaths from the vaccine among healthy people, according to theInfectious Disease Society of America.
  
  Kennedy has repeatedly said that measles outbreaks are not unusual, infection is not severe in healthy people, and deaths with measles are due to other causes.
  
  “If you look at the kids in Africa who die from measles, or these other infectious diseases, they’re all malnourished,” he said onJoe Rogan’s podcastin June 2023. “It’s hard for a disease to kill a healthy person; it’s hard for an infectious disease to kill a healthy person with a rugged immune system.”
  
  ‘It’s only going to get worse,’ warns Pulitzer Prize winning science journalist Ed Yong on America’s measles outbreak
  
  State health departments reportedno underlying health conditionsreported in the three US deaths this year, the first measles deaths in the country in a decade. All three, two children in Texas and an adult in New Mexico, were unvaccinated. In the Fox interview Thursday, Kennedy suggested at least one of the children had prior medical complications.
  
  Kennedy also this year dismissed the notion that many died from measles in a 2019 Samoan outbreak that killed 83 and infected more than 5,000 people.
  
  Details of Kennedy’svisit to Samoamonths before the 2019 outbreak resurfaced during his Senate confirmation hearings. He went to the countryfollowing an invitationfrom an anti-vaccine advocate, but denies he campaigned against vaccination while he was there. He also denied to senators that dozens of people died from the virus.
  
  “Most of the people did not have measles,” when tissue samples were tested, he told Sen. Ron Wyden (D-Ore.) “We don’t know what was killing them.”
  
  That claim is a “total fabrication,” Samoa Director-General of Health Dr. Alec Ekeroma toldThe Associated Press. Ekeroma also said Kennedy met with anti-vaccine advocates while there.
  
  Kennedy, along with former federal prosecutor Michael Sussman, sued the state of New York in 2019 to oppose vaccine requirement for school-age children. The state’s legislature passed the law, which removed religious exemptions, amid a measles outbreak that year among Brooklyn’s Orthodox Jewish community that infected nearly 800 people.
  
  A state Supreme Court justice rejected the suit days later. The Kennedy-chaired Children’s Health Defense vowed to keep fighting.
  
  That same year, Kennedy rallied with Washington state residents against a MMR vaccine mandate for children attending school. At the time, there were roughly 50 reported measles cases in the state. It spread to 71 people, most of them unvaccinated children, during themonthslong outbreak.
  
  As health secretary, Kennedy has maintained that position that vaccination should be a choice despite the spread of measles across 23 states.
  
  “The federal government’s position, my position, is that people should get the measles vaccine, but the government should not be mandating those,” Kennedytold CBS NewsApril 8. “I always said during my campaign — and every part, every public statement I’ve made — I’m not gonna take people’s vaccines away from them. What I’m gonna do is make sure that we have good science so that people can make an informed choice.”
