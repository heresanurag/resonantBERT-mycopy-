title: "What do the polls say about the key races this election?"
date: "2025-10-31"
section: "Politics"
url: "https://www.cnn.com/2025/10/31/politics/polls-election-major-races"
content: |
  We’re just days away from 2025’s off-year elections. Beyond how the races themselves turn out, the contests will be a valuable source of data to analyze – and perhaps overanalyze – ahead of next year’s midterms.
  
  Here’s an overview of what the polls suggest about the four big races we’re watching this year.
  
  A note: Polls are a valuable tool for understanding the electorate, but they’re most useful when they’re treated as estimates rather than attempts to predict the future with pinpoint precision. Often, what they tell us about the broader political environment is more valuable than the exact margin that any specific survey finds for a race.
  
  Virginia’s election for governortakes place in the shadow of an unpopular GOP administration in Washington, DC.A Washington Post-Schar School pollasked voters to describe the most important issue in the race. The share who responded with negative comments about President Donald Trump or Republicans came second only to concerns about economic issues and the cost of living.
  
  The Post-Schar poll, which found Democrat Abigail Spanberger with a 12-point lead over Republican Winsome Earle-Sears among likely voters, joinsother recentsurveysin the state that show Spanberger with a stable advantage in the race. There’s much more uncertainty in the other statewide races, particularly the campaign for attorney general, where polls show support for Democrat Jay Jones facing some erosion afterthe publication of text messagesin which he fantasized about killing a legislative colleague.
  
  New Jersey’s gubernatorial raceis a tale of two incumbents: Trump is unpopular there as well, but the state’s outgoing Democratic governor, Phil Murphy, also draws closely divided ratings for his time in office. Many recent surveys of the race, including polls fromQuinnipiac University,Fox News,Fairleigh Dickinson Universityand theRutgers-Eagleton Poll, have found Democrat Mikie Sherrill with an edge among likely voters, hovering around the 50% mark, while her opponent, Republican Jack Ciattarelli, stands closer to 45%.
  
  Quinnipiac’s latest poll, like several others, found that Ciattarelli’s supporters were more likely than Sherrill’s to express strong enthusiasm about their chosen candidate, although Sherrill’s favorability ratings remained higher overall.
  
  New York City’s multi-candidate mayoral raceposes a unique challenge for pollsters. Surveys of likely voters, however, have been largely consistent in showing Democrat Zohran Mamdani with a double-digit lead over his nearest rival, former New York Gov. Andrew Cuomo, with Republican Curtis Sliwa in third. They differ on the precise scope of Mamdani’s advantage, although most have found him shy of clearing a majority of support in the race.
  
  In polls released Thursday byMarist CollegeandFox News, Mamdani was buoyed by positive favorability ratings and broad support among younger voters, while older voters broke for Cuomo.
  
  Perhaps nowhere is the role of national politics as clear as in California, wherevoters are weighing Proposition 50, a ballot measure to temporarily enact a new congressional map drawn by Democrats in response to Republican-driven redistricting in other states.
  
  A mid-October poll fromCBS/YouGovfound 62% of likely voters in support of Proposition 50, whilean October Public Policy Institute of California pollput that support at 56%. It’s worth noting thatpast research has foundthat polling sometimes overshoots support for initiatives that implement new changes – whether liberal or conservative – because some voters default to preferring the status quo.
  
  Half of likely voters said in the CBS/YouGov poll that their decision had more to do with national issues and politics than with state or local issues. Broad majorities of likely voters supporting Proposition 50 said their choice was driven by the desire to oppose Trump, to oppose national Republicans and to support national Democrats.
  
  How have polls been performing lately? Anew postmortem report on 2024 election polling, released Wednesday by the American Association for Public Opinion Research, found that polling in last year’s election was significantly more accurate than it was in 2020 or 2016 even as it continued to underestimate Republican vote shares for the third straight presidential cycle. (Polls in the 2022 and 2018 midterms both saw smaller directional errors.)
  
  As the report also noted, polls last year weren’t always able to estimate the ways that turnout changed between 2020 and 2024. That bears mentioning because all of these surveys reflect pollsters’ best estimations about who’s likely to end up voting in an off-year election – and how much that might differ from four years ago, at the start of former President Joe Biden’s administration.
