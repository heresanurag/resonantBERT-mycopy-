title: "Why Indiana is such a major unforced error for Trump"
date: "2025-12-12"
section: "Politics"
url: "https://www.cnn.com/2025/12/12/politics/indiana-redistricting-vote-trump-analysis"
content: |
  Whether theIndiana state legislaturevoted to draw two additional Republican-leaning congressional districts, as President Donald Trump wanted, was unlikely to be the decisive factor in the 2026 midterm elections.
  
  But just as Trump’s dominance over his party waslooking to be somewhat in doubtin recent weeks, he picked a battle to reestablish it.
  
  He chose very wrongly.
  
  In the end, the situation in Indiana demonstrated quite the opposite of what Trump intended. Indeed, the state Senate’srejection of his redistricting pushwound up being one of the most significant GOP rebukes of Trump to date, and at a particularly inauspicious time for him.
  
  The deeply personal reasons why many Indiana Senate Republicans said no to Trump
  
  The upshot is that Trump’s hold over his party – his most important political asset – appears weaker than at virtually any other point in his two presidencies. Not weak, period, but weaker.
  
  After months of uncertainty, the Indiana state Senate on Thursday afternoon finally put the issue to bed, once and for all. Itvoted 31-19 against the new congressional map, which would have changed a map where the GOP is favored in 7 of 9 districts to one in which it’s favored in all nine.
  
  This was a particularly remarkable rebuke of Trump for a few reasons:
  
  Once it was clear that the vote was going to fail Thursday, Republican state Sen. Michael Young took to the floor. The supporter of the proposed new map warned those who voted against it that they would have millions of dollars spent against them in their upcoming elections.
  
  “I believe, in the end, most of you won’t be here anymore,” Young said. “And that takes courage to give up your seat.”
  
  And that’s really the point here. This process took months. These members got a full dose of precisely what voting against Trump could mean for them. They had reason to fear for not just their careers, but also for their safety. And a majority of them stood against Trump even with those stakes being made abundantly clear.
  
  There is some evidence the pressuremight have actually backfired– that the members might have worried that voting with Trump would amount to setting a dangerous precedent in which they capitulate to threats.
  
  “I will not let Indiana or any state become subject to the threat of political violence in order to influence a legislative product,” state Sen. Greg Walker said this week before voting no.
  
  But regardless of whether that’s the case, it’s clear these Indiana Republicans steeled their spines in standing up to Trump in a way we’ve rarely seen.
  
  There are precious few examples of lawmakers voting against Trump on something so high-profile – and so resoundingly.
  
  In Trump’s first term, congressional Republicansbucked him on foreign policy issuesseveral times. The late Sen. John McCain in 2017 doomed the Trump-backed plan to repeal and replace Obamacare with an infamous thumbs down on the Senate floor.A more recent example was when the GOP-controlled Congress voted last month to release the Jeffrey Epstein files.
  
  But on the Epstein files, it was just 4 out of more than 200 House Republicans actually standing up and forcing the issue by signing the discharge petition. Virtually every Republican wound up voting in favor of the legislation, but only after Trump relented.
  
  And compared to weighty foreign policy issues, passing a new map is very small-bore. The easy move for Indiana Republicans would have been to just capitulate, especially after all the pressure was brought to bear.
  
  But they decided to make a point, and they did so by voting in much bigger numbers than they needed to. Several of them could have protected their careers and livelihoods by voting yes and still having the map fail, but they went out of their way to stand with one another against Trump by a large margin.
  
  And for Trump, it’s merely the latest signal that his grip on his party is softening.
  
  We’ve already seen thecracks in his base in the polling. We’ve seen Republicans start to fret about their party’spoor electoral track recordthis year. And with the Epstein files, his base forced his hand like we’ve arguably never seen before. And then we saw a one-time top Trump loyalist in Rep. Marjorie Taylor Greene suddenly turn away from him on a host of issues, including the Epstein files (where she was 1 of the 4), tariffs and Obamacare subsidies.
  
  Indeed, if any of these signs were the most ominous for Trump, it might have been Greene. That’s because it punctured his reputation as a guy that Republicans just don’t mess with. When Trump tried to put Greene in her place by calling her a “traitor” and vowed to back a primary challenger, Greene gave it right back to him. She soon announced she would resign from Congress, so Trump certainly asserted his dominance in a way. But it was striking how much a MAGA true-believer like Greene leaned into this fight.
  
  And crucially, like the Indiana Republicans,she stuck to her gunsdespite an onslaught of threats she ties directly to Trump’s attacks on her.
  
  Loyalty enforced through fear has been the lifeblood of Trump’s political career. It’s the thing that’s kept him relevant even when he was broadly unpopular. As long as Trump dominates one of the two major parties, after all, he’s got major power in our polarized politics.
  
  But once that’s diminished, he’s in a considerably more precarious political situation. And Thursday certainly diminished it – thanks to a major unforced error by Trump.
  
  This story has been updated with additional information.
