title: "Company recalls 2 million pounds of barbecue pork jerky that may contain metal wire"
date: "2025-10-25"
section: "Business"
url: "https://www.cnn.com/2025/10/25/business/pork-jerky-recall"
content: |
  A South Dakota company is recallingmore than 2.2 million pounds(998,000 kilograms) of Korean barbecue pork jerky sold at Costco and Sam’s Club stores because the product may be contaminated with pieces of metal, federal health officials said Friday.
  
  LSI, Inc., of Alpena, voluntarily pulled the product after customers complained about finding pieces of wiry metal in the jerky, according to the U.S. Agriculture Department. Company officials said the metal came from a conveyor belt used in production. No confirmed injuries have been reported,
  
  The recall includes 14.-5-ounce (410-gram) and 16-ounce (450-gram) plastic pouches of meat jerky labeled “Golden Island fire-grilled pork jerky Korean barbecue recipe.” Roughly four dozenlots of jerkyare affected. The products have a one-year shelf life with best-by dates ranging from Oct. 23, 2025, to Sept. 23, 2026. The packages contain the establishment number M279A inside the USDA mark of inspection.
  
  People shouldn’t eat the recalled jerky and should throw it away or return it to stores for refund.
  
  Contamination withrocks, sticks, insectsand other foreign objects occasionally occurs in food produced in the U.S. Consumers who find foreign materials in food should notify manufacturers, food safety experts said.
