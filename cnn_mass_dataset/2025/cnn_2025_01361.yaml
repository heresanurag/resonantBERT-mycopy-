  Afghan Embassy sources confirmed to CNN that the internet was blocked by the Afghan government and there are very limited mobile phones working there. CNN attempts to reach Taliban officials for comment via messaging app did not go through and there has been no official statement yet from the group.
  
  Earlier this month Taliban officials warned they would cut off internet access across the country “to prevent immoral activities.”
  
  An “alternative system will be established within the country for essential needs,” the spokesman of the governor of northern Balkh province, Haji Zaid, said in a statement. He did not clarify what was meant by “immoral activities.”
  
  Zaid said the order came from Mawlawi Haibatullah Akhundzada, the Taliban’s reclusive supreme leader.
  
  According to UNAMA, the internet and mobile access disruptions began on September 16, with a nationwide blackout imposed on the evening of September 29 without prior notice.
  
  Wahida Faizi, an Afghan journalist based in Denmark, described the personal toll of losing contact with her family. “It has only been a few hours since the internet was cut off in Afghanistan, but for me, it feels like a lifetime has passed,” Faizi told CNN on Monday.
  
