title: "Amazon launches Project Kuiper satellites designed to compete with Elon Musk’s SpaceX"
date: "2025-04-28"
section: "Science"
url: "https://www.cnn.com/2025/04/28/science/amazon-spacex-project-kuiper-satellite-internet"
content: |
