title: "UK prosecutors confirm charges against Tate brothers include rape and human trafficking"
date: "2025-05-28"
section: "UK"
url: "https://www.cnn.com/2025/05/28/uk/tate-brothers-uk-charges-intl?Date=20250528&Profile=CNN"
content: |
  Prosecutors in the United Kingdom have confirmed that they previously authorized charges including rape and human trafficking against self-proclaimed misogynistAndrew Tateand his brother Tristan.
  
  The UK’s Crown Prosecution Service (CPS) said for the first time on Wednesday that it had authorized 21 charges against the pair. Tristan Tate faces 11 charges including rape, actual bodily harm and human trafficking connected to one alleged victim, CPS said in a statement.
  
  Andrew Tate faces 10 charges including rape, actual bodily harm, human trafficking and controlling prostitution for gain, connected to three alleged victims, the statement also said.
  
  The dual British and American citizens have previously denied any wrongdoing. Lawyers representing the Tate brothers on Thursday accused the CPS and police of refusing “to engage with us in any meaningful way. This is despite us potentially having available information to undermine the allegations.”
  
  “As and when the time presents itself, we will rigorously defend our clients,” the lawyers said in a statement Thursday.
  
  The CPS statement revealed that British policeexecuted an arrest warrantin 2024 in relation to the charges against the Tates, who were already facing investigations in Romania at the time.
  
  In the separate case in Romania, the pair are facing charges over human trafficking and forming an organized criminal group in the eastern European nation. They have also repeatedly rejected the allegations made against them in that case.
  
  Andrew Tate threatened and pointed gun at woman’s face, UK lawsuit alleges
  
  The CPS said in its Wednesday statement: “A European Arrest Warrant was issued in England in 2024, and as a result the Romanian courts ordered the extradition to the UK of Andrew and Tristan Tate.”
  
  It added, “However, the domestic criminal matters in Romania must be settled first.”
  
  Andrew Tate, a kickboxer-turned-social media influencer, has racked up millions of male followers by spouting aggressive speech on male dominance, female submission and wealth, along with his brother. Rights advocates have warned against the pair’s rising tide of influence among young boys and men within the manosphere – a digitized space that promotes male supremacy, anti-feminism and“red pill”culture.
  
  Andrew Tate is also facing acivil suitin the UK, which is being brought by four women who accuse the social media influencer of rape. A spokesperson for Tate previously told CNN that their client “categorically denies these unproven and untested allegations.”
  
  This story has been updated with further developments.
