  Mexico Secretary of Security Rosa Icela Rodriguez said in August that Joaquín hadreached an agreementwith his brother Ovidio “so that they would go to the United States to surrender.”
  
  However, an attorney for Ovidio told CNN that Rodriguez’s claim was “a complete and utter fabrication.” An attorney for El Mayo said he “neither surrendered nor negotiated any terms with the US government” and described the flight to the US as a violent kidnapping.
  
  Two other sons of El Chapo,Ivan ArchivaldoandJesus Alfredo Guzmán Salazar, are still at large. The US has accused them of leading large-scale drug trafficking operations for the cartel and has issued $10 million bounties for information leading to each of their arrests.
  
  Mexican forces had previously arrested Ovidio in a2019 operationthat ended in failure. Shortly after he was detained in October of that year, the cartel quickly mobilized dozens of gunmen to battle Mexican authorities and try to free him.
  
  Ovidio was eventually released on the orders of then-President Andrés Manuel López Obrador to stop the violence. He then went into hiding until his second arrest and eventual extradition in 2023.
  
  This is a developing story and will be updated.
