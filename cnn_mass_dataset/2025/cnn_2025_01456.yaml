title: "MTV VMAs 2025: See the list of winners"
date: "2025-09-07"
section: "Entertainment"
url: "https://www.cnn.com/2025/09/07/entertainment/mtv-vma-2025-winners-list"
content: |
  Sunday’s MTV Video Music Awards was a celebration of the past and present.
  
  Doja Cat opened the show with a nod to the MTV of old, appearing on a big screen dressed as Max Headroom, a fictional character from the 1980s who was billed as “the world’s first ‘computer-generated’ host.” Then famed musician Kenny G. played her on stage to perform her single, “Jealous Type.
  
  Going into the event,Lady Gagaled among nominees with 12. She won the first Moon Person trophy of the night - artist of the year - presented by Lenny Kravitz.
  
  “I hope as you navigate through the mayhem of daily life, you are reminded of the importance of the art of your life,” Gaga said. “I dedicate this award to the audience. You very much deserve a stage to shine on, and I give you all my applause. Thank you, Little Monsters, my fans, for always supporting me.”
  
  Later, part of Gaga’s concert performance at Madison Square Garden was simulcast at the VMAs.
  
  Sabrina Carpenter, who won VMAs for best pop and best album, performed her new song, “Tears.” She was accompanied onstage with dancers who carried signs calling for support for trans rights and discouraging hate.
  
  Mariah Carey, Ricky Martin and Busta Rhymes all performed prior to receiving career achievement awards, while Yungblud and Aerosmith teamed up for a tribute to late rockerOzzy Osbourne.
  
  Mariah Carey wins first ever MTV VMA: ‘What in the Sam Hill were you waiting for?’
  
  LL Cool J hosted the event, which aired live for the first time on CBS.
  
