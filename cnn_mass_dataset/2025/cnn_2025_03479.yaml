title: "Greenland’s leader says he’s ready to talk to Trump"
date: "2025-01-10"
section: "Americas"
url: "https://www.cnn.com/2025/01/10/americas/greenland-trump-denmark-press-conference-intl-latam/index.html"
content: |
  Greenland Prime Minister Mute Egede said on Friday he was ready to speak with US President-elect Donald Trump, who has said he wants control over the Arctic island, and urged respect for the island’s independence aspirations.
  
  Trump, who takes office on Jan. 20, has described US control of Greenland, a semi-autonomous Danish territory, as an “absolute necessity.” He did not dismiss the potential use ofmilitary or economic means, including tariffs against Denmark.
  
  At a Copenhagen press conference, when asked if he had had contact with Trump, Egede responded: “No, but we are ready to talk.”
  
  Danish Prime Minister Mette Frederiksen, who also addressed the press conference, said on Thursday she had asked for ameeting with Trump, but did not expect it to happen before his inauguration.
  
  Greenland, home to 57,000 people, was a Danish colony until 1953 but is now a self-governing Danish territory. In 2009, it secured the right to claim independence through a vote.
  
  The U.S. maintains a military base in the northern part of thestrategically importantterritory.
  
  Egede emphasized Greenland’s aspirations, saying: “We have a desire for independence, a desire to be the master of our own house … This is something everyone should respect.”
  
  “But that doesn’t mean we are cutting all ties, all cooperation and all relations with Denmark,” he said.
  
  An independence movement has gained momentum in recent years, which Egede discussed in hisnew year speech.
