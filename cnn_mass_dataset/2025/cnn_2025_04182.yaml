title: "T. rex ancestors crossed from Asia to North America via land bridge 70 million years ago, study finds"
date: "2025-05-06"
section: "Science"
url: "https://www.cnn.com/2025/05/06/science/t-rex-ancestors-asia-study-scli-intl?Date=20250510&Profile=cnn"
content: |
  Sign up for CNN’s Wonder Theory science newsletter.Explore the universe with news on fascinating discoveries, scientific advancements and more.
  
  The direct ancestor ofTyrannosaurus rexwould have arrived in North America after crossing a land bridge from Asia, according to a new study. The report is the latest to weigh in on the fierce debate among paleontologists over the origins of the king of the dinosaurs.
  
  A team led by Cassius Morrison, a doctoral student of paleontology at University College London, or UCL, used mathematical modeling to conclude that T. rex precursors likely arrived in North America after crossing the Bering Strait between modern-day Siberia and Alaska around 70 million years ago.
  
  The finding tracks withpast researchthat suggests T. rex was more closely related to the large carnivore Tarbosaurus in Asia compared withtop predators in North Americasuch as Daspletosaurus, Morrison said in a statement.
  
  At the time, the area would have been home to temperate rainforests, with a climate somewhat similar to British Columbia today, Morrison told CNN on Tuesday.
  
  T. rex ancestors —tyrannosaurids —would have been fewer in number within their environment compared with the herbivorous dinosaurs they preyed on, much like apex predators such as lions are today, Morrison said.
  
