title: "Aubrey Plaza is ‘functioning,’ but it’s a ‘daily struggle’ after her husband’s death"
date: "2025-08-19"
section: "Entertainment"
url: "https://www.cnn.com/2025/08/19/entertainment/aubrey-plaza-husband-amy-poehler-podcast"
