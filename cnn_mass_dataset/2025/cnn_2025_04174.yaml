title: "For Trump, Russia’s nuclear saber-rattling may be a useful distraction"
date: "2025-08-02"
section: "Europe"
url: "https://www.cnn.com/2025/08/02/europe/russia-donald-trump-nuclear-threat-latam-intl?tenant_id=related.en&iid=cnn_buildContentRecirc_end_recirc&recs_exp=up-next-article-end"
content: |
  There’s something faintly undignified about a president of the United States being goaded by aminor Russian officialinto making nuclear threats on social media.
  
  But that’s exactly what President Donald Trump has now done by ordering the repositioning of two US nuclear submarines, allowing himself to appear rattled by the hollow saber-rattling of Dmitry Medvedev, an outspoken but long-sidelined former Russian president.
  
  In a series of bombastic posts on social media, Medvedev, who has styled himself as a virulent anti-Western critic in recent years, slammed Trump’s soon to expire deadline on Russia for a peace deal in Ukraine, saying that each new ultimatum was a “step towards war” – not between Russia and Ukraine, but “with his own country.”
  
  The US president should remember “how dangerous the fabled ‘Dead Hand’ can be,” Medvedev wrote, in a provocative reference to Russia’s Soviet-era automatic nuclear retaliation system, which can initiate the launch of intercontinental ballistic missiles if it detects a nuclear strike.
  
  Trump’s own secretary of state, Marco Rubio, played down the Russian’s recent posts, pointing out that Medvedev isn’t a decision-maker in Moscow anymore. It is a view shared by many Russians, for whom Medvedev is widely seen as politically irrelevant, with little authority,let alone the power to launch a nuclear strike.
  
  It begs the question as to why Trump would even engage with what he himself described as “foolish” statements, and issue such a strident public response which ratchets up the rhetoric between Washington and Moscow.
  
  Trump is moving nuclear submarines following remarks by an ex-Russian president. Here are the subs in the American fleet
  
  One possible answer is that it’s a convenient way for Trump to appear tough on Moscow, singling out a public figure often dubbed “little Dima” in Russia because of his small stature, without directly confronting the real power in the Kremlin, President Vladimir Putin, or indeed making any concrete changes to the US nuclear posture.
  
  Trump said his order for two nuclear submarines “to be positioned in the appropriate regions” came in case Medvedev’s “foolish and inflammatory statements are more than just that.”
  
  But there are multiple US nuclear submarines, armed with hundreds of nuclear warheads, patrolling the world’s oceans on any given day. Given the multi-thousand-mile range of the missiles they carry, as well as the vast size of Russia, it is unlikely any repositioning would make a significant difference to their ability to strike Russian targets.
  
  But, as ever, the timing is key.
  
  Trump’s Mideast envoy, Steve Witkoff, in his dual role as a makeshift Russia mediator, is set to hold more talks with the Russian leadership in the coming days. He is likely to again press for a ceasefire as a deadline set by Trump, for the Kremlin to agree to peace in Ukraine or face stiff tariffs, is set to expire.
  
  Few realistically expect the Kremlin, which has stubbornly insistedon achieving its stated military objectivesbefore ending the Ukraine conflict, to back down. The latest escalating nuclear rhetoric is unlikely to change that hardline position.
  
  But, again, as Trump weighs – and possibly backs away from – the potentially self-damaging impact of imposing secondary sanctions on countries such as India and China who buy Russian oil, as he has threatened to do, the phantom of increased nuclear readiness may prove to be a useful distraction.
  
  In fact, creating a distraction from mounting political problems at home may be a welcome byproduct of the escalating nuclear rhetoric.
  
  Talk of mounting nuclear readiness towards Russia, which has more atomic weapons than any other country in the world, could overshadow more trifling domestic matters, like the Epstein scandal, for instance.
  
  Of course, any mention of nuclear escalation between the world’s biggest nuclear superpowers rightly attracts serious attention. But the broader relationship between Washington and Moscow, though under renewed pressure, is nowhere near nuclear confrontation.
  
  And while the seemingly flippant use of nuclear threats by both nations may be concerning, it does not signal that a nuclear confrontation is on the way.
