title: "Pamela Anderson and Liam Neeson’s loved ones aren’t spilling on their relationship, but they are supportive"
date: "2025-08-04"
section: "Entertainment"
url: "https://www.cnn.com/2025/08/04/entertainment/pamela-anderson-liam-neeson-family-support"
content: |
  “Naked Gun” costars Pamela Anderson and Liam Neeson are coy when asked if they are romantically involved, but we do know how some of their friends and family feel about their closeness.
  
  Bravo executive and talk show host Andy Cohen - who was a good friend of Neeson’s late wife, actress Natasha Richardson - was among the first people to provide insight, sayingduring a recent episode of his SiriusXM showthat he and others who were close to Richardswere “very much stanning whatever this is” between Neeson and Anderson. Others appear to also be showing support.
  
  Richardsondied in a skiing accident in 2009. She was 45.
  
  Over the weekend her sister, actress Joely Richardson, commented with seven hearts from her verified Instagram account ona carousel of photos of Anderson and Neeson,which Anderson posted on her verified Instagram account.
  
  Anderson and Neeson appeared on Sunday’s episode of “Watch What Happens Live with Andy Cohen” and Cohenlet it be known that he would not be asking about the nature of their relationship.
  
  But the host did reiterate that Neeson’s friends are “very much stanning this relationship” and referenced the actor’s adult son, Daniel Neeson, who was in the studio audience.
  
  “Right, Danny?,” Cohen said to the younger Neeson, who smiled and appeared to agree.
  
  Liam Neeson reached out and held Anderson’s hand after Cohen made the comment.
  
  Speculation about their relationship swirled as the pair began promoting their new film, now in theaters, with onlookers noting their chemistry on and off screen.
  
  Neeson first fanned the flames when he told People magazine in aninterviewlast year that he is “madly in love with” Anderson, going on to compliment her work ethic.
