  TheWelsh government plans to introduce similar legislationto Scotland this year.
  
  Venice experimented with a temporary entrance feefor day-trippers last year and officials hailed the program a success for raising millions of euros.
  
  Amsterdam is thought to have thehighest tourist tax in Europe, with a nightly fee built into hotel room prices of 12.5% of the room rate.
  
  The same charge is applied to camping sites and holiday rentals in the Dutch capital, while sea and river cruise operators must pay €14.50 ($15.20) per passenger, according to the City of Amsterdamwebsite.
