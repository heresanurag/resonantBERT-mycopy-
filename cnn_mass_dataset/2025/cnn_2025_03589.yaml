title: "Nobel Prize in medicine goes to trio of scientists for discovering how the immune system is kept in check"
date: "2025-10-06"
section: "Science"
url: "https://www.cnn.com/2025/10/06/science/nobel-prize-medicine-brunkow-ramsdell-sakaguchi-immune-system-intl?Date=20251006&Profile=CNN,CNN+International&utm_content=1759743749&utm_medium=social&utm_source=bluesky,facebook"
content: |
  The 2025Nobel Prizein physiology or medicine has been awarded to a trio of scientists – two of them American and one Japanese – for unraveling how the immune system protects us from thousands of different microbes trying to invade our bodies.
  
  Mary E. Brunkow, Fred Ramsdell and Shimon Sakaguchi will share the prize “for their fundamental discoveries relating to peripheral immune tolerance,” the Nobel Committee announced Monday at a ceremony in Stockholm, Sweden.
  
  The laureates identified “regulatory T cells,” which function like the immune system’s security guards and prevent immune cells from attacking our own body, a cause of autoimmune diseases.
  
  “Their discoveries have been decisive for our understanding of how the immune system functions and why we do not all develop serious autoimmune diseases,” said Olle Kämpe, chair of the Nobel Committee.
  
  The findings have led to the development of potential medical treatments that scientists hope could cure autoimmune diseases, the committee said, as well as providing more effective cancer treatments and reducing complications after stem cell and organ transplants.
  
  Autoimmune diseases such as lupus, rheumatoid arthritis and multiple sclerosis are a spectrum of diseases that affect patients of all ages, oftentimes with devastating or even fatal effects, said Daniel Kastner, a distinguished investigator at the National Institutes of Health. “T regulatory cells play an absolutely vital role in preventing or ameliorating their impact,” he said.
  
  The immune system, which the committee called an “evolutionary masterpiece,” protects us from disease first by differentiating pathogens from the body’s own cells, then by attacking these invading microbes. To try to evade the immune system, pathogens develop similarities to human cells as a form of camouflage.
  
  If pathogens camouflage themselves successfully, this can lead to a sort of biological friendly fire, in which the body’s immune system attacks its own cells, unable to tell the difference between an invading pathogen and what was already there.
  
  Our immune system is an evolutionary masterpiece. Every day it protects us from the thousands of different viruses, bacteria and other microbes that attempt to invade our bodies. Without a functioning immune system, we would not survive.One of the immune system’s marvels is its…pic.twitter.com/TzBWuIrTgn
  
  The committee said that Sakaguchi, a Japanese immunologist now at Osaka University, made a groundbreaking discovery in 1995 which helped to explain why the immune system does not attack our bodies more frequently.
  
  By examining mice and the role of the thymus – the organ in which T cells mature – Sakaguchi learned that the immune system must have some other form of “security guard” to stop the body from attacking itself. This newly identified class of immune cells were named “regulatory T cells.”
  
  Brunkow and Ramsdell, both American, built on Sakaguchi’s discovery in the early 2000s when they explained why a specific type of mouse was particularly vulnerable to autoimmune diseases. Their experiments took many years. Whereas mapping a mouse’s genome today only takes a few days, “in the 1990s, it was like looking for a needle in a giant haystack,” the committee said.
  
  Eventually, Brunkow and Ramsdell identified a mutation in a particular gene in those mice, which they namedFoxp3. They then showed that mutations in the human equivalent of this gene cause IPEX syndrome, a serious autoimmune disease.
  
  In 2003, Sakaguchi linked their findings to his discovery in the 1990s, proving that theFoxp3gene governs the development of the regulatory T cells.
  
  Sakaguchi said he learned he had received the Nobel Prize after returning to his office from a conference, and that he was “pleasantly surprised.”
  
  “I believe this will encourage immunologists and physicians to apply T regulatory cells to treat various immunological diseases,” he told the committee in a phone call.
  
  Brunkow is a program manager at the Institute for Systems Biology in Seattle, while Ramsdell is a co-founder of Sonoma Biotherapeutics, a biotechnology firm in San Francisco.
  
