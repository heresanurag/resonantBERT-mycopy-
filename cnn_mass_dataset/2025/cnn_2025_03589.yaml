  Annette Dolphin, a professor of pharmacology at University College London and president of the UK-based Physiological Society, said the winning researchers provided “vital insights into the regulation of the immune system” and opened up “new possibilities for treating autoimmune diseases, improving transplant outcomes, and developing future cancer therapies.”
  
  “This work is a striking example of how fundamental physiological research can have far-reaching implications for human health,” she said in a statement.
  
  Last year, the prize was awarded to US scientists Victor Ambros and Gary Ruvkun for their work on the discovery ofmicroRNA, a molecule that governs how cells function in the body.
  
  In 2023, the prize was awarded to Katalin Karikó and Drew Weissman, for their work on messenger RNA (mRNA)vaccines, a crucial tool in curtailing the spread of Covid-19.
  
  The prize carries a cash award of 11 million Swedish kronor ($1 million).
