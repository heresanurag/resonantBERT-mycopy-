  It’s hard not to be inspired by Junglepussy — just ask Paul Thomas Anderson.
  
  The celebrated film director was so in awe of the genre-bending wordsmith that afterseeing her openfor indie faves Tame Impala in 2022, he wrote a whole role for her in his 2025 movie, “One Battle After Another.” Wondering why the movie of the year has so many pussy references, including the repeated line “This pussy don’t pop for you?” You have Junglepussy to thank. (“One Battle After Another” is distributed by Warner Bros. Pictures, which is owned by CNN’s parent company Warner Bros. Discovery.)
  
  EDITOR’S NOTE:This is CNN’s “Annual Self-Assessment,” where some of the year’s notable cultural figures look back at the memorable and not-so-memorable parts of 2025 and say what they expect to see in 2026.
  
  Junglepussy has long been a critical fave, the type of artist whose work has, for most of her decade-plus career, existed in a sphere of if-you-know-you-know. From her very beginning, her witty verses and dreamscape beats shook the rap world up:opening for Lil’ Kimand getting a sign-offfrom Erykah Baduall before she had even released an album.
  
  That an independent, nebulous rapper whose last full-length album dropped more than five years ago has found herself rubbing shoulders with Hollywood’s eliteexemplifies her artistic strength. While she maintains a supporting role in “One Battle After Another,” her fingerprints are all over the movie (the “pussy don’t pop” line is straight from her 2015 song, “Pop For You”). Her success this year is proof that talent can still speak for itself.
  
  How far can Junglepussy’s star go? Her advice to you – yes, you – in 2026 is simple: “I’m going global! Get familiar!”
  
  My most memorable moment of 2025 was seeing how far and wide my resume, the Junglepussy name, and my artistry are reaching. As a fully independent artist from Brooklyn, to be featured in so many ways in one of the most iconic films of this century is more than I ever imagined. I’m proud of myself too because I paved this lane for myself without traditional support. And, for a highly esteemed director to be so inspired by me, to use my lyrics, artwork and name in his film! Moments like this make me trust myself even more.
  
  Expanding into different realms of this industry off the strength of my work is a dream come true for me. Also, my dream of being a successful multifaceted artist who doesn’t conform to industry standards is another.
  
  Nothing! Regret?! I don’t know her!
  
  I quit smoking last year, which was a pretty big deal for me, getting to learn more of myself without one of my favorite vices was hard, especially since I did it cold turkey, but I love this accomplishment for me. It’s a new beginning, I have a new outlook on life.
  
  I have to say I made the biggest splash this year. I was quite literally pushed into these Hollywood waters with some of the biggest fish out there. You see how I rock the boat? I held my own!
  
  During the hard parts, I always return to my hobbies.@Junglepaints— I paint , draw, read, write poetry, free write, write music and dance every day! I’m really into my Etch A Sketch. Spending quality time with my close family and friends helps a lot too, they uplift me with endless joy!
  
  Climate change and greedy narcissistic people/leaders who think they can control the world because of their access to power.
  
  One that lives in my head as the new year approaches… Junglepussy is truly a formidable force — I’m going global! Get familiar!
  
  Stay tuned! If anything, let this moment be a testament that I’m constantly evolving. I will continue. My journey will be publicized and glamorized, but my evolution process is sacred to me. At some point, I would love to write a book. My life story needs to be in the annals.
  
  “Sinners” was my favorite movie this year! My sister took me to see it in IMAX. We don’t always get to hang out so that was a beautiful night that I won’t forget. “OBAA,” of course. I’m also into shows like “Naruto” and “Supa Team 4” that my niece and nephew insist I watch with them — and I’m constantly watching women battle rap!
