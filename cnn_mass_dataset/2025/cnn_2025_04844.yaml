title: "RFK Jr. fires top aides in HHS shakeup"
date: "2025-07-16"
section: "Health"
url: "https://www.cnn.com/2025/07/16/health/rfk-hhs-aides-fired?iid=cnn_buildContentRecirc_end_recirc&recs_exp=more-from-cnn-right-rail&tenant_id=related.en"
content: |
  US Health and Human Services Secretary Robert F. Kennedy Jr. has fired two of his top aides in an abrupt shakeup of the leadership at the nation’s sprawling health department, two people familiar with the matter told CNN.
  
  Kennedy’s chief of staff, Heather Flick Melanson, and deputy chief of staff for policy Hannah Anderson left HHS after only a handful of months on the job, following internal clashes that culminated in both of their removals this week.
  
  After this story published, Flick Melanson said in an email, “It’s simple. I was not fired. I resigned.” Anderson did not immediately respond to a request for comment.
  
  Flick Melanson had initially pushed to oust Anderson over dissatisfaction with her performance, three of the people familiar with the matter said.
  
  But the firing was not carried out through the proper processes, the people said, including taking the White House by surprise. Those complications angered Kennedy and triggered his decision to then fire FlickMelanson over his loss of confidence in her as well.
  
  In a statement, an HHS spokesperson confirmed the moves and said the department’s White House liaison, Matt Buckham, would serve as acting chief of staff.
  
  “He brings valuable experience in personnel strategy and organizational management to this new role,” the spokesperson said. “Secretary Kennedy thanks the outgoing leadership for their service and looks forward to working closely with Mr. Buckham as the Department continues advancing its mission to Make America Healthy Again.”
  
