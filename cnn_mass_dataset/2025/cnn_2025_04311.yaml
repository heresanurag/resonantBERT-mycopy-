title: "How authorities got ahead of themselves in the Brown University shooting investigation"
date: "2025-12-16"
section: "US"
url: "https://www.cnn.com/2025/12/16/us/brown-university-shooting-investigation"
content: |
  Early Sunday morning, Providence Mayor Brett Smiley stepped up to a podium and announced that a “person of interest” in theBrown University shootingwas in custody.
  
  “The people of Providence should breathe a little easier this morning,” he said, announcing that a “shelter in place” for the city had been lifted.
  
  But later that same day, officials returned to a podium to announce that person of interest would be released.
  
  The evidence in the case “now points in a different direction,” Rhode Island Attorney General Peter Neronha said.
  
  The rapid turnabout raises questions about the status of the investigation and the community’s safety three days after asuspect opened fireon the Ivy League campus, killing two students and injuring nine others.
  
  The false start also reveals some behind-the-scenes friction between the FBI, whoseleader announcedthe detention of the person of interest, and their local law enforcement counterparts.
  
  Asked by CNN’s Erin Burnett about why information about the person of interest came out prematurely, Neronha expressed his frustration.
  
  “I think because people who aren’t familiar and aren’t experienced in investigations got over their skis,” Neronha said Monday night.
  
  “This is why I have tried to frankly exert more influence over this in the last 24 to 48 hours, 36 hours, because it’s really important that career prosecutors and career law enforcement officers – people who have been in these situations before – talk about what we have and where we’re going,” he added.
  
  FBI Director Kash Patelsaid Monday nightthe FBI is acting in an “assisting role” and said they had sent additional resources and personnel to help.
  
  There were tensions between the FBI and local police, law enforcement officials involved in the investigation told CNN Chief Law Enforcement and Intelligence Analyst John Miller.
  
  “The FBI is a big organization. They’ll show up with a lot of people and some incredible resources, tools and technology that no other agency has,” Miller said. “For a small police agency, sometimes it’s best to let the bureau take the reigns. But for a city like Providence, with detectives who have a good deal of experience with violent crime, there can be moments when you have to reassert to the FBI that they are there in a supporting role; that you, the police, are the lead agency and your chain of command is making the decisions.
  
  “I think we saw some of that over the weekend. Whatever the adjustments were, the team is still together, the FBI is still there, and they are providing a good deal of technical support in evidence collection, processing the scene and working with the videos to develop enhanced imagery,” he said.
  
  Officials defended their investigative process and said the detention and release of the person of interest is nothing out of the ordinary.
  
  “It’s not a mistake,” Providence Police Chief Oscar L. Perez Jr. said Sunday night.“It’s just how investigations work.”
  
  An aspiring neurosurgeon and a ‘faithful bright light:’ What we know about the two students killed in the Brown mass shooting
  
  In the meantime, officials said they do not believe the public is at imminent risk, even asresidents expressed their fearsof a killer on the loose.
  
  “I think that a lot of people found a lot of relief in knowing that the authorities had caught this person and recovered the weapons that this person may have used,” said Cole Francis, a senior at Brown who was inside the building when the shooting occurred. “And now to know that he may still be on the street is extremely scary and worrisome for a lot of people.”
  
  The unknown suspect, described by the FBI as about 5-foot-8-inches tall with a stocky build, has not been found, and an intensive search remains underway. With no firearm recovered at the scene, the shooter is still considered armed and dangerous, Neronha told CNN’s Brian Todd.
  
  Perez said the focus on the person of interest began as a tip to police that then was picked up by the FBI, who located the person.
  
  The FBI activated the Cellular Analysis Survey Team to “provide critical geolocation capabilities,”Patel saidin a post on X. That led to the location of a person of interest in a hotel room in Coventry, Rhode Island, he said. Police recovered two firearms from the room, law enforcement sources previously said.
  
  Law enforcement then did a “thorough investigation,” but there was not enough evidence to prosecute the person, Perez said.
  
  Another campus, another night of terror: Brown University shooting traps students in a familiar nightmare
  
  Speaking generally, Neronha said investigators collect evidence from the scene – such as fingerprints, ballistics or DNA – and then compare that evidence to a person of interest to see if there’s a match.
  
  “Here, they came back negative, so we’re in a position where we are now going to release that person of interest,” he explained.
  
  “This is what these investigations look like,” Neronha added. “Sometimes you head in one direction and then you have to regroup and go in another.”
  
  The person of interest hassince been cleared.
  
  Indeed, several other recent high-profile shootings have led to the detention of a person who was later cleared of wrongdoing. For example, after the killing of conservative activist Charlie Kirk in September,Patel initially posted that a “subject” was in custody, a claim that he walked back shortly afterward. A different person was later arrested and accused of carrying out the shooting.
  
  Miller, the CNN analyst, said focusing on a person only to later clear them is “not uncommon” in major cases. “These cases take twists and turns,” he said.
  
  Still, the false start may have delayed the investigation by 18 to 24 hours during a critical period, said CNN analyst and former Department of Homeland SecurityAssistant Secretary Juliette Kayyem said.
  
  “This is unfortunate, and the public does not want to see law enforcement agencies sort of throwing each other under the bus,” Kayyem said.
  
  The FBI did not speak at the press conference Sunday night, and Neronha, the Rhode Island attorney general, made clear in his response to questions what agency was in charge of the investigation.
  
  “Ultimately this is Providence’s case, and they are the lead here, and they have the most boots on the ground to do most of the work that needs to get done,” Neronha said.
  
  Providence police and the FBI released an initialvideo of a person of intereston Saturday night, followed by several morevideos and images Monday. The FBI is offering a $50,000 reward for information leading to the identification, arrest and conviction of the person responsible.
  
  Officers were going to businesses and residences in Providence neighborhoods to request available camera footage as part of their investigation,Providence policesaid.
  
  “At this point, we’ll continue to follow on every lead that comes our way,” Perez said Sunday night. “Our federal partners are on board. We’ll be meeting again tomorrow with them and continue to do the work that we need to do to bring this person who’s responsible to justice.”
  
  As the search for the shooter continues, investigators across local, state and federal agencies are working well together, Smiley said Sunday night.
  
  “The boots on the ground here are all professionals. They have a preexisting and long-standing relationship, and everyone is focused on the task at hand in doing their job,” Smiley said. “Of course, they’re getting tired. There hasn’t been a lot of sleep in the last two days.”
  
  ‘Scared is the only way to put it’: Brown campus remains on edge with killer on the loose
  
  Miller said the focus on Monday was effectively a “reset.”
  
  “There’s nothing stalled about the investigation,” he said. “Everybody’s very active. It’s all about moving forward with covering those leads and getting a better picture.”
  
  As of Tuesday, Brown University has largely been shut down, with classes over for winter break and exams canceled.
  
  Although the suspect remains at large, a shelter-in-place order has not been reestablished.
  
  “The reason the shelter in place was lifted is because again, since the initial call came in at 4:05 (Saturday), we have not received a single additional specific threat to the Brown community, to the Providence community, to the Rhode Island community,” the mayor said. “We are not recommending at this time a new shelter in place. We do not feel it is necessary.”
  
  Now back at square one, investigators are looking through tips and the evidence to move forward.
  
  “Every minute that goes by that you haven’t identified who that person is, you get a little further behind, and the chances of solving this quickly and putting that person into custody get a little smaller with every minute, every hour, every day that goes by,” CNN Senior Law Enforcement Analyst Andrew McCabe told CNN’s John Berman in Providence.
