title: "Warren Buffett: Tariffs are ‘an act of war’"
date: "2025-03-03"
section: "Business"
url: "https://www.cnn.com/2025/03/03/business/warren-buffett-tariffs-trump/index.html"
content: |
  Tariffs might be President Donald Trump’sfavorite word. To legendary investor Warren Buffett, there is less to be excited about.
  
  “Tariffs are actually — we’ve had a lot of experience with them — they’re an act of war, to some degree,” Buffett said in an interview with CBS that aired on Sunday.
  
  The Berkshire Hathaway CEO and billionaire investor said tariffs over time serve as a tax on goods and could raise prices for consumers.
  
  “The Tooth Fairy doesn’t pay ‘em!” Buffett said with a laugh.
  
  Tariffsdisrupt tradebetween countries by raising taxes on imported goods, and those new costs are often passed on to consumers through higher prices. Tariffs are considered by many economists a political cudgel — sometimes used in a trade war — and not an efficient framework for international trade.
  
  Buffett offered his thoughts in a rare sit-down interview, with CBS News’ Norah O’Donnell. Thesegmentfocused on the late Katharine Graham, former publisher of the Washington Post and a friend of Buffett’s, though he answered a few questions about the economy.
  
  The Oracle of Omaha said it’s critical to ask, “And then what?” when thinking about the implications of tariffs and who will bear the cost.
  
  “You always have to ask that question in economics: Always say, ‘And then what?’” Buffett said.
  
  Trump is set to go ahead with tariffs on America’sbiggest trading partnerson Tuesday, imposing 25% tariffs on goods from Canada and Mexico. Trump on Monday also raised tariffs implemented on China from 10% to 20%.
  
  The Trump administration has gone back and forth on its proposed tariff plans. Economists expect tariffs to increase the cost for US consumers on everyday goods that rely on international supply chains, fromelectronicstovehicles. Trump’s tariff proposals come at a time when US consumerconfidence is decliningand concerns of inflation are lingering.
  
  China has hit back at the United States withits own tariffs, stoking concerns of a trade war similar to Trump’s first term. And this time, the European Union and other trading partners are also targets, with Trump outlining a plan for“reciprocal tariffs”on countries that have tariffs on US goods.
  
  In an interview on The Situation Room on Monday with CNN’s Pamela Brown, Commerce Secretary Howard Lutnick dismissed Buffett’s comments about tariffs as “silly.”
  
  Lutnick said tariffs could replace the need for the Internal Revenue Service, which he incorrectly said was created when the US entered World War I.
  
  “The United States of America before 1913 only had tariffs, and then we created — when we entered World War I, we all had to pitch in, and we created, of course, the brilliantly named Internal Revenue Service,” Lutnick said.
  
  In fact, what became known as the IRS was initiallycreated in 1862, during the Civil War. The federal income tax, collected by the IRS, was established in 1913 by the ratification of 16th amendment, four years before the US entered World War I. Since then, federal income tax has become the government’s largest source of revenue.
  
  It is true the US government used to rely on revenue from tariffs before the federal income tax was created, but the US economy of the 2020s — a global powerhouse deeply intertwined in international trade — has evolved tremendously in scope and complexity since the US economy of the late 1800s and early 1900s.
  
  In short, the proposal to abolish the IRS and supplement government revenue with tariffs is financially unrealistic andriddled with issues.
  
  While Buffett didn’t elaborate on his comment about tariffs being an act of war, tariffs have long been associated with protectionist trade policy that has influenced isolationist foreign policy. In the 1930s, after the United States hiked tariffs as part of the Smoot-Hawley Tariff Act of 1930 (which exacerbated the Great Depression), the French media reportedly called it a declaration of(economic) war.
  
  Buffett has previously been outspoken about the negative effects of tariffs. In 2016, hesaidTrump’s proposals for tariffs on the campaign trail were “a very bad idea.”
  
  Trump wants to ‘abolish’ the IRS and replace it with tariffs. Can it work?
  
  When Buffett was asked by O’Donnell about his thoughts on the general state of the economy, he said it was the “most interesting subject in the world,” though declined further comment.
  
  Buffett, whose every word is watched closely by investors,drew attentionover the past year due to a growing cash pile at Berkshire Hathaway.
  
  Berkshire amassed its cash and cash equivalents to a record $334.2 billion in the fourth quarter, up from $167.6 billion the year prior. Berkshire added to its cash position while selling stock in blue-chip companies like Apple (AAPL) and Bank of America (BAC), raising questions about his thoughts on the US market.
  
  Berkshire’s operating earnings in the fourth quartersurged to a record, and both its class A shares (BRK.A) and class B shares (BRK.B) closed at a record high just last week. Buffett said most of the money he manages will always be in the United States.
  
  “It’s the best place,” Buffett said. “I was lucky to be born here.”
