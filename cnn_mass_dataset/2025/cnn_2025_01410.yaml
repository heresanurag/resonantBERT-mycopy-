title: "Title: This girl is trying to keep her family alive in Gaza. Hunger already killed her baby niece"
date: "2025-05-20"
section: "Middle East"
url: "https://www.cnn.com/2025/05/20/middleeast/this-girl-is-trying-to-keep-her-family-alive-in-gaza-hunger-already-killed-her-baby-niece"
content: |
  URL Source: https://www.cnn.com/2025/05/20/middleeast/this-girl-is-trying-to-keep-her-family-alive-in-gaza-hunger-already-killed-her-baby-niece
  
