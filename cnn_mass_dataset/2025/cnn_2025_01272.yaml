  👋Welcome to 5 Things PM!Tesla CEO Elon Musk just lost his title as the “world’s richest person.” The new No. 1?An AI tech star.
  
  Here’s what else you might have missed during your busy day.
  
  President Donald Trump promised tariffs would revive American manufacturing. But instead of sparking a jobs boom,hiring has stalled— and industries most exposed to tariffs are losing workers.
  
  Funding for train and bus services is so dire that one of the largest cities in the US must rely on a sports gambling company to help.FanDuel subsidized ridesfor thousands of fans going to and from a Philadelphia Eagles game last week.
  
  NASA’s Perseverance rover discovered “leopard spots” on a reddish rock collected from the edges of a river valley sculpted by water more than 3 billion years ago. Scientists believe it’s the“clearest sign” yet of ancient life.
  
  Prince Harry and his father, King Charles III, had tea together during their first face-to-face meeting in 19 months, triggering speculation that the family’s long-running riftmight soon come to an end.
  
  We’re less than a year away from the start of the global soccer celebration, and it’s time for fans to try to book their spots.Here’s everything you need to knowif you’re planning to go.
  
  ☕Recipe for success:Adam San Miguel is using Cortaditos, his small chain of Cuban cafes in New Jersey, to serve more than coffee and sandwiches. He’s helping his employees learn new skills andbuild their confidence.
  
  📺You better work!CNN teamed up with Rotten Tomatoes to select 25 exceptional workplace TV series from the past 25 years. Not only did they get the job done —they made the office entertaining.
  
  📘Who said in a new book that it was reckless to let former President Joe Biden make a reelection decision on his own?A. Nancy PelosiB. Gavin NewsomC. Alexandria Ocasio-CortezD. Kamala Harris⬇️Scroll down for the answer.
  
