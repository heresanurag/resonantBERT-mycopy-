title: "Analyzing the scale of Trump’s federal layoffs in his first 100 days"
date: "2025-04-26"
section: "Politics"
url: "https://www.cnn.com/2025/04/26/politics/federal-layoffs-trump-musk-dg?cid=external-feeds_iluminar_yahoo"
content: |
  Nearly 100 days. Wide-ranging and chaotic firings across at least 30 agencies.
  
  At least 121,000 federal workers have been laid off or targeted for layoffs in the three months since President Donald Trump’s second term began, according to a CNN analysis of official statements, internal memos from government officials and news reports. It’s a vastnumberthat doesn’t count those placed on administrative leave or who took voluntary buyouts.
  
  The fallout of the sweeping layoffs has already had a ripple effect across the country andraised questionsabout the government’s capacity to meet public needs when it comes to education, healthcare, transportation and public safety, experts told CNN. The threats to essential services that Americans depend on havesparked concernsabout the future, with arecent CNN pollshowing more than half of US adults expect cuts to federal programs to hurt their families and the economy.
  
  Federal layoffs, which surged in February and tapered down in March and April, surpassed layoffs in any other industry in 2025 so far. While most of the targeted agencies saw reductions of under 10%, others like the Department of Education or Agency for International Development were gutted, according to CNN’s analysis.
  
  One in 14 federal employees at impacted agencies werefired or have been targeted, according to CNN’s analysis. Not all agencies have felt the impact of layoffs equally, though.
  
  By sheer total, the Department of Veterans Affairs has plans for the largest reduction in force — at least 70,000 people — which accounts for nearly 15% of total staff. The VA is the second-largest federal department, following the Department of Defense, and is responsible for providing services likehealth care to veterans and their families.
  
  No agency has been targeted quite like USAID. After months of cuts, the State Department announced that the agency wasofficially closing its doors. Countries around the world that relied on the agency for programs tofight starvation and address human and drug traffickingare already feeling the impact.
  
  While the full scope of federal workforce cuts under the new administration is uncertain, thelong-term effectsof the downsizing efforts that have already taken place, on both services and the people they serve, will be felt for years to come.
  
  This story has been updated with additional information.
  
  Methodology |CNN talked to federal agencies and impacted workers directly, analyzed dozens of statements and internal memos from government officials and evaluated additional reporting from The Associated Press, NPR, Politico, The New York Times, ABC News and Reuters to determine the approximate number of workers impacted from federal departments and agencies. These numbers are subject to change based on updated figures from government officials and various media reports, and in some instances, include announced firings or reports of announced firings. For this project, CNN is not tracking federal workers who are reinstated after their initial job impacts and is not tracking those placed on administrative leave or those who take voluntary buyouts.
