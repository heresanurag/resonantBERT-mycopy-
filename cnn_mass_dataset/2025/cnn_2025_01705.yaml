  For David Breslin, the Met’s curator in charge for modern and contemporary art, Escobedo’s limited experience with large-scale buildings was not an issue. “People ask: ‘What’s it like working with an architect on their biggest project?’ And I say, ‘Well, it would probably be the biggest project for almost any architect that we chose,’” he said. “It just so happens that Frida is younger and earlier in her career than some others. But for whomever, this would have beenthe job.”
  
  Breslin believes the museum has benefitted from working with an architect who is experimental and open, even without a CV full of similar projects.
  
  “Artists love her, and artists are, a lot of the time, her first collaborators. I think she brings that same sense of real inquiry,” Breslin said. “I think the best artists are the ones who also refuse a signature style, who are open to having their minds changed. And I think she brings that artist’s mind, as well, to her idea of what design and architecture can be.
  
  “We’re really building something for the future — and so we want to open up possibilities and not close them down,” he added.
  
  Many parts of the Met have been in flux lately as the museum looks to the future, refreshing its galleries for European paintings; building abrand-new wingfor African, Ancient American and Oceanic art; and providing a more central location for the blockbuster Costume Institute exhibitions that inspire the Met Gala each year. Escobedo’s task is to elevate and showcase the Met’s collection of 20th- and 21st-century art, which has long been underrepresented among the museum’s vast encyclopedic holdings and within its maze-like halls. The museum recently received a substantial gift of 188 artworks by leading surrealist and Dada figures, including Marcel Duchamp, Man Ray and Max Ernst, and has been adding contemporary additions from artists like Kerry James Marshall and Nicole Eisenman, Breslin said.
  
  “We’re at the crossroads of many different collections,” Escobedo said of the new wing. “There’s this wonderful thing about the fluidity of the Met — you go from one wing to the other without even noticing it.” Visitors might wander from the Arms and Armor section to the American Wing, then find themselves gazing up at the Egyptian Temple of Dendur, letting serendipity guide them.
  
  The Tang Wing, a collaboration with the architecture firm Beyer Blinder Belle, will also house rotating special exhibitions, requiring blank canvases of sorts. But Escobedo is rethinking what it means for a space to be versatile. “It’s common to think about flexibility as a very neutral space that could be reprogrammable, something that is flat and that could allow for different divisions of the space,” she explained. “But the way that we have been thinking is almost the opposite. It’s the architectural specificity that allows for future flexibility.”
  
  She continued: “The collection holds many different formats — photography, prints, paintings, sculpture, video, installation — and because it’s a contemporary collection, it will be growing, and we don’t know what’s going to happen next. So the idea was that a variation of spaces, a range of scales, and different relations between them, would allow for a more interesting approach on what flexibility could be.”
  
  Two miles uptown from the Met, Escobedo approached her design for the building housing the National Black Theatre with the same sense of inquisitiveness. The NBT is one of the longest running Black theaters in the country, exploring and uplifting Black culture through a range of often genre-bending productions. Now partnering with Ray Harlem, a mixed-use residential building, the performing arts space was founded in 1968 by Dr. Barbara Ann Teer as a “temple for liberation” at a time when Harlem was largely abandoned, explained Teer’s daughter, Sade Lythcott, who now helms the NBT. Decades after the Harlem Renaissance, the artistic and cultural movement that transformed the city in the 1920s and 1930s, Teer remained committed to the neighborhood’s reinvestment and renewal.
  
  “I told Frida that story, and how Frida responded was by far the most thoughtful, the most balanced and the most radical approach to what this hub of cultural ingenuity needed to be: a monument of Black imagination with a very refined and balanced hand,” Lythcott said in a video call. “She’s a deep listener. And I think architects build these massive structures and ego does get in the way — she just didn’t have any.”
  
  Escobedo is collaborating with Marvel Architects, Handel Architects and interior designer Little Wing Lee on the project, and recently completed the residential portion of the 21-story Ray Harlem. The NBT will open in its new permanent space in the tower’s lower floors in 2027, hosting both a 250-seat flexible “temple” and a 99-seat theater within its 27,000 square feet. A group of notable contemporary artists will contribute works to the space, too, including the interdisciplinary artist Sanford Biggers. In the spirit of serving its community, the new theater has been designed to forge a sense of inclusion, according to Lythcott.
  
  “We wanted to be explicit about theater having to connect folks together, and — literally — our windows look into our neighbors windows,” Lythcott said, adding that the architecture promotes “this idea of belonging. No matter what view you have in the theater, you feel connected.”
  
