  The fossil record is not neatly organized, and some chapters are missing.
  
  “Species might have failed to enter the fossil record, they might have been preserved as fossils but not yet discovered, or they might have been discovered but lack essential context, such as precise estimates of geological age,” wrote Dr. Lindsay Zanno, head of paleontology at the North Carolina Museum of Natural Sciences, in arelated articlepublished with the research. Zanno was not involved in the study.
  
  The Naashoibito Member site is problematic because erosion has stripped it of the perfect layers of rock found at other sites in North America, making it difficult to determine when the layers were created, Flynn said.
  
  Work at the site to determine a more detailed timeline of dinosaur habitation began in 2011. The team members measured the thickness and location of different rock layers, collected samples for testing and identified all of the spots where fossils were found over the last century and a half.Sample collectionlasted about three to four years just for Cretaceous rocks, while another four to five were spent on the overlying rock that shows when mammals lived at the site after the dinosaurs went extinct.
  
  One way the team was able to date the rocks was by comparing the samples with Earth’s magnetic field, which periodically changes direction.For instance, right now,magnetic northaligns with the direction of north. But sometimes, magnetic north can align with the direction of south. Scientists have a clear understanding of when these reversals have occurred over time. By measuring the direction of the magnetic field when the rock layers were created, researchers can narrow down the time frame.
  
  “The end-Cretaceous mass extinction, fortunately for us, took place during a relatively short period of reversed polarity, which makes it much easier to say what our data correlates to,” Flynn said.
  
