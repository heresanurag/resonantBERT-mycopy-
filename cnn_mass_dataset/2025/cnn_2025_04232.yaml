title: "19 states sue Trump administration over push to end diversity programs in public schools"
date: "2025-04-25"
section: "Politics"
url: "https://www.cnn.com/2025/04/25/politics/states-sue-trump-administration-diversity-programs-schools/index.html"
content: |
  Nineteen states that refused to comply with a Trump administration directive aimed at eliminating diversity, equity and inclusion programs in public schools went a step further Friday, filing a federal lawsuit challenging what they consider an illegal threat to cut federal funding.
  
  The lawsuit filed in Massachusetts by Democratic attorneys general seeks to block theDepartment of Educationfrom withholding money based on its April 3 directive ordering states to certify their compliance with civil rights laws, including the rejection of what the federal government calls “illegal DEI practices.” States were also told to gather signatures from local school systems certifying their compliance by April 24.
  
  Three judges, including two Trump appointees, rule against the Department of Education’s anti-DEI policy
  
  Instead, the plaintiffs informed the government that they stand by their prior certifications of compliance with the law but refuse to abandon policies that promote equal access to education.
  
  “Diversity, equity, and inclusion initiatives are legal efforts that help students feel safe, supported and respected. The Trump administration’s threats to withhold critical education funding due to the use of these initiatives are not only unlawful, but harmful to our children, families, and schools,” said Massachusetts Attorney General Andrea Joy Campbell.
  
  The new lawsuit comes a day afterthree judges ruledagainst the Trump administration in separate but related cases.
  
  A Maryland judge postponed the effective date of aFebruary memoin which the Education Department told schools and colleges they needed to end any practice that differentiates people based on their race. A judge in Washington, DC, granted a preliminary injunction against the April certification letter. And in New Hampshire, a judge ruled that the department can not enforce either document against the plaintiffs in that case, which includes one of the nation’s largest teachers’ unions.
  
  All three lawsuits argue that the guidance limits academic freedom and is so vague that it leaves schools and educators in limbo about what they may do, such as whether voluntary student groups for minority students are still allowed.
  
  The new lawsuit accuses the administration of imperiling more than $13.8 billion, including money used to serve students with disabilities.
  
  “Plaintiffs are left with an impossible choice: either certify compliance with an ambiguous and unconstitutional federal directive — threatening to chill polices, programs and speech – or risk losing indispensable funds that serve their most vulnerable student populations,” the lawsuit states.
  
  In addition to Campbell, the plaintiffs are the attorneys general of California, Colorado, Connecticut, Delaware, Hawaii, Illinois, Maryland, Michigan, Minnesota, Nevada, New Jersey, New Mexico, New York, Oregon, Rhode Island, Vermont, Washington and Wisconsin.
  
  The Education Department did not respond to a request for comment Friday. President Donald Trump’s Education Secretary, Linda McMahon, has warned of potential funding cuts if states do not return the certification forms.
  
  In a Tuesday interview with Fox Business, McMahon said that states that refuse to sign could “risk some defunding in their districts.” The purpose of the form is “to make sure there’s no discrimination that’s happening in any of the schools,” she said.
