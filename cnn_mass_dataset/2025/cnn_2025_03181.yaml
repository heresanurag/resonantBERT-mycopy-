title: "Even modest strength training can counter age-related decline"
date: "2025-12-05"
section: "Health"
url: "https://www.cnn.com/2025/12/05/health/muscle-loss-strength-training-longevity-wellness?hss_channel=tw-2165438024"
content: |
  Dana Santas, known as the “Mobility Maker,” is a certified strength and conditioning specialist and mind-body coach in professional sports, and is the author of the book “Practical Solutions for Back Pain Relief.”
  
  Many people view aging as an inevitable breakdown. Muscle loss, in particular, can carry a sense of dread: the fear that our bodies will become less capable with each passing year.
  
  The good news? You have more control over this process than you might think. The most effective strategy for fighting muscle loss isresistance training— exercise that challenges your muscles to work against force.
  
  After age 30, adults can lose3% to 8% of their muscle massper decade. This decline accelerates after 60. When left unaddressed, loss of muscle can compromise your balance, metabolism, bone density and ability to live independently. Muscle atrophy can also increase your risk of falls, fractures and metabolic diseases.
  
  Yet, too often, people don’t take steps to counter muscle loss until after a serious injury or health scare forces the conversation. But building muscle doesn’t require a gym membership or heavy weights. Exercises that use your ownbody weight, working against gravity, can provide enough resistance to build significant strength, especially if you’re just starting out.
  
  By prioritizing strength training, you’re not just preserving muscle, you’re investing in a proven antiaging strategy that protects your independence, health and quality of life for years to come.
  
  If you’re new to strength training, begin with simple body-weight workouts that cover upper-, lower- and full-body movements. For sedentary older adults, modified variations such asbox squats,wall push-upsandseated leg liftsare excellent entry points. Focus on good form with controlled movement andproper breathing— exhaling during the exertion phase of each exercise.
  
  Current guidelines from theUS Centers for Disease Control and Preventionrecommend strength training at least two days per week, targeting all major muscle groups. But someresearchsuggests that older adults may benefit from even more frequent training, with some studies showing advantages to three sessions weekly for muscle growth.
  
  How to use a single dumbbell for a full-body workout
  
  Regardless of whether you do two or three training sessions weekly, you don’t need to perform marathon workouts. Ten to 30 minutes of focused resistance exercise can produce meaningful results. Muscle responds to stimulus, and even modest strength training with consistency and effort can work toward countering age-related decline.
  
  The key is progressive overload: gradually increasing the difficulty of your exercises over time. As you feel stronger, you should progress by adding repetitions, slowing down your movement tempo or eventually incorporatingresistance bandsor weights. Adding weight doesn’t have to mean jumping straight todumbbellsor other free weights. To start, consider incorporating the use of a weighted vest or ankle and wrist weights to increase resistance in any body-weight exercises, including walking. Check with your doctor or physical therapist before beginning any new exercise program.
  
  To build muscle, you need the right fuel. Protein intake becomes increasingly important with age.Researchsuggests older adults need more protein than younger people for effective muscle protein synthesis, the process your body uses to build and repair muscle tissue. Aim for 1.2 to 1.6 grams of protein per kilogram of body weight daily, spread across meals. That’s roughly 80 to 110 grams for a 150-pound person.
  
  Food quality is important, too. Since chronic inflammation interferes with muscle maintenance, your food choices can either support or undermine your progress. Emphasize whole foods such as lean proteins, fruits, vegetables, whole grains and healthy fats while limiting ultraprocessed foods, which tend to promote inflammation.
  
