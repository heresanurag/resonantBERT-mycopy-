title: "Summer McIntosh wins second gold at World Aquatics Championships to continue bid to match Michael Phelps record"
date: "2025-07-28"
section: "Sport"
url: "https://www.cnn.com/2025/07/28/sport/summer-mcintosh-katie-ledecky-400m-freestyle-intl"
content: |
  Summer McIntoshcontinued to take the swimming world by storm on Monday, winning her second gold medal in two days to keep up her bid to makeWorld Aquatics Championshiphistory.
  
  The 18-year-old won the 200m individual medley final with atime of 2:06.69, almost two seconds faster than American Alex Walsh, who took silver with 2:08.58.
  
  Monday’s victory came after McIntosh beat nine-time Olympic championKatie Ledeckyby more than two seconds to take gold in Sunday’s 400m freestyle.
  
  In that event, the 18-year-old finished with a time of 3:56.26, just two seconds shy of theworld recordshe set back in June, but more than enough to beat Li Bingjie, who finished in3:58.21and claimed silver.
  
  Ledecky, the so-called “First Lady of Freestyle” who has dominated the sport for more than a decade, took bronze with a time of 3:58.49.
  
  McIntosh’s impressive run means that she is now three gold medals away from joining Michael Phelps as the only swimmers ever to win five individual titles at a single world championships.
  
  The Canadian is also competing in the 400m individual medley, the 200m butterfly and the 800m freestyle.
  
  Yu Zidi: The 12-year-old Chinese phenom who just finished 0.06 seconds off a world championship medal
  
  “I think the 400 free, at past world championships and Olympics, I haven’t been at my best. And I haven’t been where I wanted to be. So, to finally stand in the center of the podium is promising for the rest of the meet,” McIntosh said after Sunday’s victory,according to the Associated Press.
  
  “I think I’m at my best. I’m in the best shape of my life. So now I just have to act on that and put it into all my races.”
  
  Monday’s 200m individual medley final also saw12-year-old prodigy Yu Zidifinish in fourth place, just 0.06 behind Mary-Sophie Harvey, who took bronze.
  
  Competing in what is probably her weakest event, the Chinese phenom led for part of the race and finished with apersonal-besttime of 2:09.21.
  
  Yu is also due to compete in the 400m individual medley and the 200m butterfly events.
