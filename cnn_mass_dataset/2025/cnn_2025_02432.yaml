title: "DC sues Trump administration over National Guard deployment"
date: "2025-09-04"
section: "Politics"
url: "https://www.cnn.com/2025/09/04/politics/washington-dc-sues-trump-national-guard?cid=external-feeds_iluminar_yahoo"
content: |
  Washington, DC, officials are suing the Trump administration, accusing the president of violating the Constitution and federal law by sending thousands of National Guard troops into the city without consent from local leaders.
  
  The lawsuit, filed Thursday by DC Attorney General Brian Schwalb, claims the troops – many from out of state – have been deputized by the US Marshals office and are patrolling neighborhoods, conducting searches and making arrests, despite federal laws that generally bar the military from acting as local police.
  
  The lawsuit argues that the deployment undermines the city’s autonomy, erodes trust between residents and law enforcement and damages the local economy by discouraging tourism and hurting businesses.
  
  “Deploying the National Guard to engage in law enforcement is not only unnecessary and unwanted, but it is also dangerous and harmful to the District and its residents,” Schwalb said in a statement. “It’s DC today but could be any other city tomorrow. We’ve filed this action to put an end to this illegal federal overreach.”
  
  President Donald Trumprolled out the deploymentof troops on August 11 as part of his anti-crime agenda in the nation’s capital, which has also included a surge in federal officers from other agencies and an attempted takeover of the city’s police department.
  
  In the weeks since, National Guard members in DC, which include troops from six GOP-led states, have been ordered tocarry weapons. As of Tuesday morning, there were 2,290 National Guard troops assigned to the mission – 1,340 of them from supporting states.
  
  The city, the lawsuit reads, “has suffered a severe and irreparable sovereign injury from the deployment.”
  
  “No American jurisdiction should be involuntarily subjected to military occupation,” reads the complaint, filed in the US District Court for DC. “The District of Columbia brings this lawsuit to obtain declaratory and injunctive relief that will stop Defendants’ violations of law, remedy the harms Defendants are inflicting on the District, and preserve the District’s sovereignty.”
  
  At a press event Thursday, however, DC Mayor Muriel Bowser repeatedly declined to endorse the lawsuit, referring questions to the attorney general’s office.
  
  “What’s fair to say is that my 100% focus is on exiting the emergency, and that’s where all of our energies are,” she told reporters.
  
  While Bowser has criticized the National Guard deployment for weeks, her more conciliatory approach to the Trump administration stands in sharp contrast to the new legal challenge, as she seeks to avoid provoking the president and limit federal interference in local affairs.
  
  The White House, meanwhile, claimed the lawsuit was an attempt to “undermine” Trump’s efforts to crack down on crime in the nation’s capital.
  
  “President Trump is well within his lawful authority to deploy the National Guard in Washington D.C. to protect federal assets and assist law enforcement with specific tasks,” White House deputy press secretary Abigail Jackson told CNN in a statement.
  
  “This lawsuit is nothing more than another attempt, at the detriment of DC residents and visitors, to undermine the President’s highly successful operations to stop violent crime in DC,” Jackson added.
  
  With no end in sight, National Guard troops deployed to DC grow weary
  
  The orders for the DC National Guard troops mobilized in the city have been extended through November 30, the DC National Guard announced on Thursday.
  
  The Trump administration has touted its efforts in the capital city, pointing to a sharp drop in violent crime since ramping up federal law enforcement last month. But critics — including Bowser — argue the National Guard deployment is unnecessary and costly, with taxpayers footing anestimated $1 million a day, while troops are seen taking photos with tourists, picking up trash, and laying mulch.
  
  Bowser issued an executive order this week requiring the city to closely coordinate with federal law enforcement indefinitely. While some progressive groups viewed the move as ceding to Trump,Bowser later clarifiedthat the order was designed to provide a pathway for the district to exit the federal emergency by offering the administration and congressional Republicans an off-ramp to scale back their involvement in DC.
  
  “I want the message to be clear to the Congress: We have a framework to request or use federal resources in our city. We don’t need a presidential emergency,” Bowser said Wednesday, emphasizing that protecting DC’s autonomy remains her “north star.”
  
  The lawsuit comes as the Trump administration prepares for a major immigration enforcement operation in Chicago, with Trump pledging to send in National Guard troops, though he has not given a timeline.
  
  While the administration looks to replicate its effortsin other Democratic-led cities– Trump holds unique authority over the DC National Guard, which reports only to the President of the United States. The city’s status as a district — not a state — allows the president and the federal government more leeway in directing troops and a range of federal authorities.
  
  The DC attorney general’s lawsuit comes after another challenge to Trump’s deployment of the National Guard proved successful earlier this week in California.
  
  Afederal judge ruledTuesday that Trump and Defense Secretary Pete Hegseth violated federal law by using the US military to help carry out law enforcement activities in and around Los Angeles earlier this summer.
  
  In June, Trump ordered 2,000 National Guard troops and hundreds of Marines into Los Angeles – over the objection of the state’s Democratic Gov. Gavin Newsom – to quell immigration protests.
  
  Schwalbsued the Trump administrationlast month after Attorney General Pam Bondi attempted to appoint an emergency police commissioner to replace DC’s police chief and take over the department’s operations. Ultimately, Trump officials backed down from that sweeping takeover but still maintain the ability to request any services from the local police department as part of the federal emergency, which expires next week unless Congress extends it.
  
  House Republicans are currentlyweighing legislationthat would overhaul criminal justice policies in DC and oust the locally elected Schwalb, replacing him with a presidential appointee.
  
  This week, Schwalb announced he will run for reelection.
  
  This story has been updated with additional information.
