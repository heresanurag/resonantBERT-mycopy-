title: "Anna Wintour stepping down as Vogue editor-in-chief"
date: "2025-06-26"
section: "Media"
url: "https://www.cnn.com/2025/06/26/media/anna-wintour-steps-down-vogue-editor-in-chief"
content: |
  After nearly four decades as the editor-in-chief of American Vogue, Anna Wintour is stepping down and seeking a replacement, the magazine’s publisher Condé Nast confirmed to CNN.
  
  Wintour broke the news to staffers on Thursday. Although she’ll exit the top role at Vogue, she is not leaving Condé Nast altogether, but scaling back her duties. She will remain on as the publisher’s global chief content officer, where she oversees every brand’s global operations, as well as Vogue’s global editorial director.
  
  The new role replacing her atop the storied American fashion magazine will be titled head of editorial content.
  
  As Vogue’s editor-in-chief, she reinvented the publication, transforming an increasingly unadventurous title into a powerhouse that could set and destroy both trends and designers.
  
  This is a developing story and will be updated.
