  Wen:Adults of legal drinking age should not drink more than one drink a day for women and two drinks a day for men, according to the USDietary Guidelines for Americans.
  
  But these guidelines are controversial. Earlier this year, then-US Surgeon General Dr. Vivek H. Murthyissued guidancethat alcohol consumption within the guideline amounts can be linked with elevated cancer risk.
  
  Alcohol is not good for us. 5 tips to stay safe(r) if you drink
  
  Some people who are following these guidelines could be considered heavy drinkers, according to this new study. A man could consume, say, two drinks a day for five days a week and exceed eight drinks a week, which in this study is linked with signs of brain injury.
  
  Another way to assess for excess alcohol consumption is whether there is binge drinking. Binge drinking isdefinedas four or more drinks on one occasion for women and five or more drinks on one occasion for men, according to the US Centers for Disease Control and Prevention. People who engage in binge drinking are at higher risk from injuries such as car accidents and falls. Moreover, the large amount of alcohol their bodies are exposed to is thought to cause more stress to their organs than if the drinks were metabolized over time.
  
  Wen:There are two separate but related issues. One is drinking levels of alcohol that exceed recommended amounts, whether over a weekly basis or heavily at once via binge drinking. Either type of excessive drinking can result in long-term problems, including impacts on the brain, heart and liver.
  
  Another issue is physiological dependence from alcohol and problems stemming from a condition called alcohol use disorder. Alcohol Awareness Month is a time to raise awareness of this disorder, which is the most common substance use disorder in the United States.Nearly 29 millionAmericans age 12 and older meet criteria for diagnosis, which include loss of control over how much they drink, difficulty fulfilling work and caregiving responsibilities, and physical symptoms when they stop drinking such as nausea and sweating.
  
  People can take several differentself-questionnairesto screen for problem drinking. They also can look out for signs of alcohol use disorder in their loved ones. It’s crucial everyone knowseffective treatment existsfor alcohol use disorder. No one should have to suffer alone.
  
  Alcohol’s healthy halo dims as study finds drinking may be harmful for older adults, even at low levels
  
  Wen:This is an area that is hotly debated among clinicians and public health experts. The consensus is generally that less is better. Medical professionals are not going to tell someone who doesn’t drink to start drinking. Moreover, the consensus is clear that excessive drinking is a problem. Binge drinking is associated with many risks, as is heavy alcohol use.
  
  Where to draw the line on defining heavy alcohol use is not entirely clear. More and more research, including this study, are beginning to show that even alcohol usage within currently recommended guidelines could be associated with negative consequences.
  
  At the same time, I think it’s possible for people to have a healthy relationship with alcohol. One way to assess one’s relationship with alcohol is with sobriety challenges such asDry JanuaryandSober October. These experiences can help people take stock of exactly how much they are drinking, how they feel when they abstain, and when and why they drink.
  
  What are your questions about nonalcoholic drinks?
  
  For instance, do they drink to mask negative feelings? Are they ashamed or feel loss of control by how much they drink? These are warning signs that people need to seek help from a mental health specialist or their primary care provider. Individuals who drink heavily also should be careful not to stop suddenly because the effects of sudden withdrawal can be dangerous. Those people who wish to cut back should do so under the care of their medical provider.
