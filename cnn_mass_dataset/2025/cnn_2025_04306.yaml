title: "There is no safe amount of alcohol when it comes to dementia, study finds"
date: "2025-09-23"
section: "Health"
url: "https://www.cnn.com/2025/09/23/health/alcohol-dementia-risk-study-wellness?utm_source=cnn_LBB+-+CRG+%281+Curated%252C+3+Automated%29+-+Interactives"
content: |
  Drinking any amount of alcohol increases your risk of dementia later in life, according to a new study that challengesprior researchfindings.
  
  Some research has suggested light drinking — such as fewer than seven drinks a week — may be more neuroprotective than no alcohol at all. Those studies, however, focused on older people and didn’t differentiate between former drinkers and lifelong nondrinkers, thus potentially skewing the results, study authors said.
  
  In the new study, published Tuesday in the journalBMJ Evidence-Based Medicine, researchers analyzed how certain genes linked to alcohol might impact how liquor consumption affects the brain.
  
