content: |
  👋Welcome to 5 Things PM!The roots of the modern-day potato have always been a mystery. But biologists have finally traced its origins toan unlikely wild plant relative.
  
  Here’s what else you might have missed during your busy day.
  
  The capital of Iran is weeks away from disaster. Experts say a severe water crisis has put the city within reach of “day zero,” whentaps will run dryfor large parts of the region. Residents are trying desperately to combat the problems compounded by climate change.
  
  Elon Musk has relied on small businesses to help him grow his multibillion-dollar empire. But civil lawsuits and construction liens against his companies are filled with claims of contractorsnot being paid promptly— or ever — with complaints totaling over $100 million in Texas alone.
  
  Advertisements in Vogue’s August issue for the clothing company Guess feature something unique: AI-generated models. The choice has sparked debate, with online users questioning how this practice will affect real-life models and those who already grapple with society’sconstantly evolving beauty standards.
  
  President Donald Trump entered office with a promise to lower energy and electricity costs. But as prices continue to rise, Democrats in Congress and left-leaning  groups are looking togo on the offensiveahead of the 2026 midterm elections.
  
  Archaeologists working at a site in Spain say they have found evidence of what may have been a synagogue used by ayet-undiscovered Jewish community. Experts previously believed the site had been a church.
  
  💇Mid-snip drama:A man accused of a grisly double murder in Arkansas was arrested when he stopped for a haircut,ending a dayslong search. A motive for the killings is still being determined, according to police.
  
  ✈️Sudden shift:Turkmenistan has long been considered one of the world’s most isolated, difficult-to-access countries. But streamlined visa regulations could bring change — and more visitors — to itsstartling sites.
  
  🏎️ After much speculation, which team will Max Verstappen drive for in the 2026 Formula One season?﻿A. Red BullB. Aston MartinC. MercedesD. Ferrari⬇️Scroll down for the answer.
  
  👋 We’ll see you tomorrow.﻿🧠Quiz answer: A.The Dutch driver confirmed he willremain with Red Bull, ending speculation over his future with the team for the time being.📧 Check out all ofCNN’s newsletters.
  
  Today’s edition of 5 Things PM was edited and produced by CNN’s Kimberly Richardson and Chris Good.
