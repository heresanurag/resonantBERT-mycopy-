content: |
  Considered the biggest night in the UK film industry, the British Academy Film Awards (BAFTAs) on Sunday afternoon was a welcome distraction from a dreary climate that extended beyond the country’s weather. (Alongside one of the gloomiest winters on record, the UK has faced a challenging social and political landscape under a new Labour government.)
  
  The 78th edition of the awards, which took place at London’s Southbank Centre, was hosted by Scottish actor and “Doctor Who” lead David Tennant and featured musical performances from 1990s boy band Take That and “Wicked” star Jeff Goldblum.
  
  Noticeably absent was William and Kate, Prince and Princess of Wales, who flew with their children to their privately owned Caribbean island, Mustique, for the half-term school holiday. The royal couple last attended the BAFTAs together in 2023, with William (who became a president of BAFTA in 2010) attending alone last year.
  
  Best red carpet looks at the 2025 Critics Choice Awards
  
  The sartorial mood skewed modest, with most guests opting to keep things simple in monochromatic black or white looks. It marked a continuation of the more pared-back styles that celebrities have largely opted for across this year’s red carpets, in response to the wildfires that devastated Los Angeles in January.
  
  Goldblum, along with actors Gwendoline Christie and Kelly Rutherford, arrived early, elegantly dressed in head-to-toe black. In stark contrast were Pamela Anderson, wearing a white wrap dress from Jacquemus’ Spring 2025 collection shown only mere weeks ago in Paris, and Cynthia Erivo in a structured lace number by Louis Vuitton. Mikey Madison and Saoirse Ronan similarly opted for ethereal, bridal-white frocks — a nod to the romantic fashion trend, dubbed as “bridalcore”, which has gained popularity over the past year.
  
