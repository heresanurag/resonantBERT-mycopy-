  # Five killed in Russian overnight air attack on Ukraine
  
  Story by Reuters
  
  Updated Oct 5, 2025
  
  Updated Oct 5, 2025, 4:37 PM ET
  
  PUBLISHED Oct 5, 2025, 7:26 AM ET
  
  Russia War in Ukraine Oil & gas
  
