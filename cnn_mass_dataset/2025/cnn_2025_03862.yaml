content: |
  👋Welcome to 5 Things PM!We’re seeing delays and flight cancellations at major airports across the country amidst the government shutdown.This is what you should do if you’re affected, whether you haven’t left your house yet or are already trapped at your terminal for the night.
  
  Here’s what else you might have missed during your busy day.
  
  A federal judge said the Trump administration mustfully cover food stamp benefitsfor tens of millions of Americans in November. The order comes days after the administration said it would provide only partial food stamp benefits for November by tapping into some $4.65 billion in a contingency fund.
  
  Company announcements of layoffs in the US surged in October as AI continued to disrupt the labor market. Job cuts last month climbed by more than 153,000,the largest October increase in 22 years, according to a new report.
  
  When you think of budget-friendly meals, rice is often the first thing that comes to mind. But Kinmemai Premium, the world’s most expensive kind, has different plans. With only 1,000 boxes produced each year, thecreator still doesn’t turn a profit, despite charging a price you’d never associate with a grocery staple.
  
  You’ll never guess what the Louvre’s onetime CCTV password was. Hint: You absolutely will. After last month’s high-profile heist, details about the museum’s security practices, past and present, are emerging.
  
  After an 8-year hiatus, Meghan, Duchess of Sussex, is reportedly returning to acting. According to reports, the former “Suits” television star will be makinga small cameo in a film called “Close Personal Friends,”starring Lily Collins, Jack Quaid, Brie Larson and Henry Golding.
  
  Astronauts aboard China's space station have, for the first time, used an onboard oven to bake food in orbit. They used the hot air over to make chicken and steak, in what was described as a significant upgrade to the "space kitchen."
  
  🍗 Bon appétit:What can you cook on Earth that you couldn’t in space? Well, it’s no longer chicken wings. China’s astronauts feasted on thefirst-ever barbecue in spaceafter a new hot air oven was installed to cook steak, bake cakes, roast peanuts and more.
  
  🎄 Most wonderful time of the year:The spirit of Halloween is now in the past — and just like every HomeGoods store, we’re heading straight for mistletoe. While you’re thinking about your holiday plans, take some inspiration from thebest Christmas markets around the world.
  
