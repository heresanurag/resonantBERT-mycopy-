  Wen:This is a difficult question to answer because the landscape around Covid-19 vaccination has been changing. Just last month, US Health and Human Services Secretary Robert F. Kennedy Jr. announced that Covid-19 shotsare no longer recommendedfor healthy children and pregnant women. These shots appear to still be accessible for children; for instance, the CDC’s guidancenow readsthat children can get the shots after consulting with their health care provider. However, there are alreadyreportsof pregnant women having more difficulty obtaining these vaccines.
  
  This and other guidance could soon change, as Kennedy hasreconstituted the panelof external experts who advise the CDC on vaccine recommendations, and this new panel could make different decisions during their upcoming meeting in late June. Another uncertainty is when a new round of vaccines will be made available.
  
  One way to approach this decision is to consider your risk of severe outcomes if you were to contract Covid-19. Those who are 65 and over or who have chronic underlying medical conditions should consider getting another dose of the vaccine now,if they are eligible. That way, they have additional protection in case there is a summer wave, since the existing vaccine probably retains some efficacy against the new variant. And they can still get another dose in the fall when the new formulation will presumably be released.
  
  As for those who are younger and generally healthy, some who have not yet received the 2024-25 formulation also may consider getting the vaccine now before guidelines change and they may no longer be eligible. People should discuss their specific medical situations with their primary care physician.
  
