  Abigail Spanberger, the Democratic nominee for governor in Virginia, unveileda suite of policy proposalsaimed at lowering energy costs, including a focus on local generation, weatherization, and regulatory reform. Notably, Spanberger’s plan referenced “making sure data centers don’t drive up energy costs for everyone else in Virginia.”
  
  Additionally, Spanberger and a few others have made the connection between AI data centers and spiking electricity bills. It opens a fraught debate about the rising cost of electricity to operate a technology, artificial intelligence, that could threaten some voters’ jobs.
  
  And the Virginia League of Conservation Voters, a branch of the leading environmental group, is up withan adblaming Republicans for higher bills, saying “big energy is raising prices” and arguing that “Virginia Republicans are helping big corporations rip you off.”
