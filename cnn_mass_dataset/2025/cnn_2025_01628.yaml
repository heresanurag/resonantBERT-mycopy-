title: "Power politics: How electricity costs are shaping this year’s elections"
date: "2025-09-05"
section: "Politics"
url: "https://www.cnn.com/2025/09/05/politics/electricity-bills-politics-virginia-new-jersey?cid=android_app"
content: |
  America’s aging power grid has faced strain for years, exacerbated by severe weather events, an explosion of data centers and the demand created by artificial intelligence.
  
  Now, electricity is emerging as a top issue on the campaign trail.
  
  Campaigns in this fall’s races for New Jersey and Virginia governors, as well as candidates in the upcoming midterms, are taking note of surging utility bills, in the latest sign that affordability has become central to campaigns at all levels.
  
  In herfirst general election campaign ad, US Rep. Mikie Sherrill, the Democratic gubernatorial nominee in New Jersey, declares that on “Day One as governor, I’m declaring a state of emergency on utility costs, using emergency powers to end these rate hikes and drive down your bills.”
  
  Jack Ciattarelli, Sherrill’s GOP opponent, unveiled his own first-day plan calling for more energy generation.
  
  “We need to expand our nuclear capabilities in South Jersey, we need to accelerate solar, we can’t rely on wind,” Ciattarellisaidon Fox News recently, laying blame with the outgoing Democratic administration of Gov. Phil Murphy.
  
  Three leading Democratic organizations spent $8 million on anAugust ad campaignthat linked rising electricity bills to GOP policymaking, arguing that the “One Big, Beautiful Bill” passed this summer “removes clean energy from the electric grid, creating a massive rate hike on electricity.”
  
  Americans for Prosperity, a leading conservative group, launched a seven-figure ad campaign urging lawmakers “to unleash America’s energy potential by cutting red tape and eliminating counterproductive regulations.”
  
  Energy Secretary Chris Wright has acknowledged the looming challenge both for power generation and for Republicans politically.
  
  “It’s what I worry about most seven days a week,” he told Fox Business. “We want to stop the rise in electricity for Americans.”
  
  Speaking toPolitico, Wright was even more frank.
  
  “Who’s going to get blamed for it? We’re going to get blamed because we’re in office.”
  
  The Department of Energy, meanwhile, blamed the Biden administration’s policies for driving up electricity prices, and pointed to its efforts to “meet this rising power demand, fueled in part by the buildout of AI and data centers.”
  
  “With President Trump’s leadership, the Department of Energy is reversing course: Ending subsidies that supported more expensive, less reliable energy, reversing policies that forced the premature closure of baseload power sources and expanding access to affordable, reliable, secure energy 24/7,” said Emery Washington, a spokesperson for the department.
  
  “DOE is pursuing a strategy of energy addition—reforming costly permitting processes, keeping base load power online, and building more energy infrastructure needed to keep the lights and energy prices low for the American people.”
  
  The cost of power hasset a recordfor two consecutive years in the country’s largest grid, covering a wide swath of competitive political territory that includes parts of Pennsylvania, Michigan, North Carolina, Virginia and New Jersey.
  
  According to a May report from the US Energy Information Administration, “retail electricity prices have increased faster than the rate of inflation since 2022, and we expect them to continue increasing through 2026.”
  
  The EIA separatelynotedthis summer that “residential electricity prices in the Pacific, Middle Atlantic, and New England census divisions—regions where consumers already pay much more per kilowatt hour for electricity—could increase more than the national average.”
  
  A big reason why is data centers. Campuses are springing up across the country, powering artificial intelligence technology and offering sought-after economic development. Their energy needs are enormous, however, with some data centersdrawingas much power as 800,000 homes.
  
  In Virginia – dubbed by one state industry group as the “data center capital of the world” – data centers consumed nearly aquarterof the electricity generated in the state in 2023, according to the Electric Power Research Institute, an independent nonprofit.
  
  Areportfrom the Department of Energy last year, meanwhile, estimated that data center energy use “is projected to double or triple by 2028.”
  
  Spiking demand is driving bills up for individuals. In New Jersey, residential rates have climbed by up to 20%, and the tri-state Regional Plan Associationfoundthat “increased demand from data centers is attributed to about two-thirds of the increased prices.”
  
  It’s also putting tremendous pressure on power grids that are already strained. According to another Energy Departmentreport, “our aging infrastructure is struggling to meet our modern electricity needs,” and “70 percent of transmission lines are over 25 years old.” Studies fromPennsylvania State UniversityandColumbia Universityhave also linked grid vulnerabilities to increasing severe weather events.
  
  According toan analysis from Energy Innovation, a nonpartisan think tank, power generation capacity could fall by 340 gigawatts by 2035, with one gigawatt being enough to power up to 1 million homes, while household energy costs could increase $170 annually due to the lost subsidies resulting from the “One, Big Beautiful Bill” passed over the summer.
  
  Democrats argue that surging demand validates their support for alternative energy sources, pointing to President Donald Trump and Republicansslashing clean energy tax creditsandcanceling workon a nearly complete wind farm in Rhode Island. Republicans say it’sall the more reason to deregulateand ramp up fossil-fuel production.
  
  Sherrill is positioning herself in the debate. “New Jersey isn’t generating even close to enough in-state power to keep costs low, and we risk missing the clean energy targets that we need to protect our environment for generations to come. I’m not going to accept that,” shewrotein her “Day One Declaration” plan.
  
  Ciattarelli also called out high electricity costs in his first general electioncampaign ad, pushing back on his rival’s critiques. “All Mikie Sherrill wants to talk about is President Trump. Come on, what does the president have to do with rising property taxes and higher electricity bills?” he says. “I’ll lower electricity bills.”
  
