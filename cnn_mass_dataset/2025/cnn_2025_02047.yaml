  Editor’s Note: CNN’s 5 Things newsletter is your one-stop shop for the latest headlines and fascinating stories to start and end your busy day.Sign up here.
  
  👋Welcome to 5 Things PM!Scientists created the Doomsday Clock in 1947 as a symbolic gauge of how close humanity is to destroying the world. The clock is nowthe closest it’s ever beento that marker.
  
  Here’s what else you might have missed during your busy day:
  
  1️⃣Your brain on pot:Checking your car’s blind spot. Remembering what your boss said. These areexamples of your brain’s working memory— and a new study indicates that if you use marijuana more frequently, you could be damaging it.
  
  2️⃣Housing prices:Unexpected catastrophes such as wildfires can change the character of a community. When ravaged neighborhoods rebuild,gentrification often followsas smaller homes are replaced by larger and more expensive ones.
  
  3️⃣Following the buzz:Researchers tracked bees using tiny QR codes glued onto their backs to gain new insights into the insects’ movements and life cycles. The data suggests that bees enjoylonger lives than previously thought.
  
  4️⃣A room of her own:The Louvre in Paris is about toundergo a major expansionthat could take up to 10 years to finish. One upgrade to the world’s most-visited museum: a dedicated space for Leonardo da Vinci’s “Mona Lisa” masterpiece.
  
  5️⃣Tasty trend:McCormick, the top-selling maker of seasonings and spices, predicts that a flavorcombining sweet and spicywill have a breakthrough year. Is your mouth watering yet?
  
  🦎Taking a tumble:When temperatures dip in Florida, it’s not uncommon to seefrozen iguanas falling from trees, as they go into a cold-stunned state to protect themselves until it warms up. It just happened in North Miami Beach — and the reptile in question was shown no sympathy from a curious cat.
  
  • Judge temporarily blocks part ofTrump’s plans to freeze federal aidafter president’s order caused chaos• Oklahoma Board of Education votes to approve proposalrequiring parents to prove citizenshipwhen enrolling students• Suicidal tendencies and ’80s battlefield tactics:How North Korean soldiers are operatingin Russia’s war on Ukraine
  
  🐗 Wild boars were once a protected species in China. Nowthe population has exploded, and it’s a growing public menace.
  
  📸Powerful pose:First lady Melania Trump shows that she means business in her new official White House portrait, which hassparked plenty of discussion online.
  
  ✈️844 mph:America’s answer to the Concordebroke the sound barrierfor the first time during a test flight in California. Boom Supersonic hopes to build the world’s fastest airliner.
  
  🛸The White House said drones that caused hysteria in the US last month were “not the enemy.” Which state reported the most sightings?﻿A. OhioB. New YorkC. New JerseyD. Pennsylvania⬇️Scroll down for the answer.
  
  🎤Healing through music:Yuval Raphael, who survived the terrorist attack at the Nova music festival in October 2023, willrepresent Israel at this year’s Eurovision Song Contest. She sang ABBA’s “Dancing Queen” and Sam Smith’s “Writing’s on the Wall” during the finals and will compete in Switzerland in May.
  
