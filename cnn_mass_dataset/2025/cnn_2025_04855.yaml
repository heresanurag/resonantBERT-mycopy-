  Editor’s Note: CNN’s 5 Things newsletter is your one-stop shop for the latest headlines and fascinating stories to start and end your busy day.Sign up here.
  
  👋Welcome to 5 Things PM!Spending too much time on social media can leave people feeling isolated, hurt their interpersonal skills and lead to sleep deprivation. If this sounds like you, don’t worry: There are waysto prevent doomscrolling from controlling you.
  
  Here’s what else you might have missed during your busy day:
  
  1️⃣Targeting activists:Nearly a dozen students and faculty members at colleges across the US have been detained by federal agents amid theTrump administration’s crackdown on immigration. Most of them are pro-Palestinian — and they’re seeing their rights called into question.
  
  2️⃣Power of perception:Losing your job can damage your physical and mental health, especially when you see the situation as a catastrophe rather than a temporary setback. These are the things you can doto minimize the harm.
  
  3️⃣Building community:“Rowdy Ruby” and other LGBTQ homesteadersare sharing their storiesin online spaces that are typically dominated by creators who adhere to strict gender roles. They try to live self-sufficiently by growing their food on land they own.
  
  4️⃣Brain drain:Need another reason to prioritize your sleep? Not spending enough time in the two deep stages of slumber might speed up thedeterioration of parts of the brainassociated with Alzheimer’s disease, a new study found.
  
  5️⃣‘We’re just very grateful’:After an EF3 tornado roared through Poplar Bluff, Missouri, wedding photos mysteriously showed up on someone’s lawn 100 miles away. It turned outthey took a remarkable journey.
  
  🌸Pretty in pink:Cherry blossoms have reached their peak as the Northern Hemisphere welcomes the return of spring. Crowds are descending on Tokyo and Washington, DC,to catch a glimpse of the beautiful blooms.
  
