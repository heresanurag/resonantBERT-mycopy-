title: "Text messages and a moved SUV: How the government’s case against a Chicago woman shot by a Border Patrol agent fell apart"
date: "2025-11-21"
section: "US"
url: "https://www.cnn.com/2025/11/21/us/marimar-martinez-shooting-case-what-we-know"
content: |
  Even with a federal indictment hanging over her, claiming she had been a threat to law enforcement, Marimar Martinez was confident she could eventually prove her innocence.
  
  “I know the truth,” Martinez told CNN Friday in an exclusive interview. “I know what really happened that day.”
  
  After anextraordinary reversal by federal prosecutorsin one of the most high-profile cases connected toOperation Midway Blitz in Chicago, a judge dismissed charges Thursday against Martinez, a United States citizen who was accused of ramming the vehicle of a Customs and Border Protection agent in Chicago before he shot her several times.
  
  The ruling from US District Judge Georgia Alexakis came after she repeatedly raised concerns about the handling of the investigation, including the revelation the vehicle of the Border Patrol agent who shot Martinez was moved1,000 miles awayafter the incident and text messages showing the agentapparently braggingabout the shooting.
  
  Martinez had beenaccusedof “aggressively and erratically” pursuing CBP agent Charles Exum and hitting his car on October 4 as protests against the Trump administration’s immigration crackdown took place in the city. The charging complaint says Exum then stepped out of his vehicle and fired his weapon five times at Martinez – shots the Department of Homeland Security called “defensive.” Martinez had pleaded not guilty to a federal charge of assaulting, resisting or impeding federal officers.
  
  Inside the courtroom, the judge noted the government’s case included omissionsthat caused her to tread carefullyas Martinez’s defense attorney alleged it was actually the agent who sideswiped Martinez. Outside the courtroom, the high-profile case garnered public scrutiny.
  
  Defense attorney Christopher Parente – himself a former federal prosecutor – believes a rush by the Trump administration to have a meme-ready example of dangerous protest activity forced the US Attorney’s Office to push a weak case too far.
  
  “She never would have been charged under the old system because they would have found out right away that this case is garbage,” Parente told CNN.
  
  The judge’s decision came hours after federal prosecutors filed a motion to dismiss the charges against both Martinez and her co-defendant, Anthony Ruiz.
  
  The US Attorney’s Office is “constantly evaluating new facts and information relating to cases and investigations arising out of Operation Midway Blitz,” spokesperson Joseph Fitzpatrick said.
  
  Parente commended the Trump-appointed US Attorney for the Northern District of Illinois, Andrew Boutros, for not moving forward with the case despite what was likely enormous pressure.
  
  “That took incredible guts,” Parente said.
  
  Legal experts told CNN the move was likely the result of a series of questionable claims from the federal government in court and a calculation over whether it can be proven at trial that the gunshots were justified.
  
  “Ultimately, there was a determination when everything was evaluated that there were serious questions about the officers’ narratives,” CNN legal analyst Joey Jackson said.
  
  Here’s what we know about the investigation and how experts say the government’s case fell apart:
  
  Text messages displayed in court earlier this month were likely key in the prosecution’s decision to move to dismiss charges, experts said.
  
  Exum appeared to brag to fellow agents about his marksmanship after he repeatedly shot Martinez following a collision between their vehicles, the messages revealed.
  
  Boasting about the shots would look bad to a jury, Jackson said. Had the case moved forward, the government would have needed to justify every shot he took and prove there was immediate danger and proportionate force.
  
  Exum sent anarticle from The Guardianon October 7 to a group of other agents, which quoted Parente saying Martinez had “seven holes in her body from five shots from this agent.”
  
  “Read it. 5 shots, 7 holes,” Exum said in the next text.
  
  Parente pointed to the messages as an indication Exum understood the high public scrutiny of the case.
  
  When Parente pressed him in court on what he meant, Exum responded he was a firearms instructor. He said, “I take pride in my shooting skills.”
  
  Another message to the group read, “I have a MOF amendment to add to my story. I fired 5 rounds, and she had 7 holes. Put that in your book boys.”
  
  Exum explained to the judge MOF is a “Miserable Old F**ker” who is always trying to one up someone wherever possible. It’s unclear what exactly he was responding to because the text conversations were redacted when presented to the court.
  
  When asked to explain the text, Exum said, “That means illegal actions have legal consequences.”
  
  Exum defended his use of force against Martinez, saying his life was at risk and “I did what I had to do.”
  
  Parente told CNN he believes most federal agents would be embarrassed to see that kind of bragging about a shooting.
  
  “I have never come across an agent like that,” Parente said. “Those people go to work, and they try to do the right thing. They do not want to shoot people ever.”
  
  If the case had moved forward, it likelywould have been unsuccessful, Jackson said. Martinez’s attorney agrees.
  
  “There was no way we were going to lose this trial on the evidence,” Parente told CNN.
  
  Hearings in the case included discussion on what the government did with Exum’s car following the collision. The way that piece of key evidence was handled was one of the significant problems with the government’s case, experts said.
  
  Martinez’s defense attorney sought to prove his claimthe government potentially destroyed evidencewhen it released Exum’s damaged vehicle and allowed the agent to drive it more than 1,000 miles to his home state of Maine, where the car may have had repairs.
  
