  “That means that the government did not properly handle and maintain evidence. That’s a major problem in the presentation of the case,” Honig said. It needed to be preserved in the exact same condition it was in after the collision, he explained.
  
  Jackson said it was a major misstep for the federal government that undermined their credibility. In every other case he’s seen where a car was involved in a shooting, the car is taken to be analyzed by law enforcement and experts reconstruct the collision.
  
  “Any evaluation of the trajectory of the damage would go to show what happened. Instead, you take the car away and destroy evidence,” Jackson said.
  
  Judge Alexakis expressed skepticism over why Martinez’s car had been kept in Chicago as evidence while the Border Patrol agent’s car was released and allowed to travel normally. “What gives me great pause is the fact the cars have been treated differently,” Alexakis said.
  
  Government attorneys defended federal agents’ decisions, saying the FBI had preserved any evidence they believed was relevant before releasing the car back onto the street.
  
  But Alexakis said the government clearly believed the vehicle could be exculpatory evidence; otherwise, it would not have gone through the trouble to preserve records on the car.
  
  Alexakis ordered the government last month to return the SUV to Chicago.
  
  Of more than two dozen people arrested for impeding or assaulting federal officers or other protest-related offenses amid demonstrations over the federal immigration crackdown in the Chicago area, none have gone to trial and charges have been dropped against at least nine of them, TheAssociated Pressreported. Judges have expressed skepticism over the strength of some cases.
  
  In its initialpress release, the Department of Homeland Security had referred to Martinez and her co-defendant as “domestic terrorists” who had “ambushed” the Border Patrol vehicle on Chicago streets. Martinez says she couldn’t believe the accusations she was facing.
  
  “They were (saying) ‘domestic terrorist,’ that she had a semiautomatic. I was just like, that’s crazy,” Martinez told CNN.
  
  In court, Alexakis noted ﻿discrepancies in the government’s case have caused her “to question the narrative being put forward.”
  
  She pointed out the Justice Department had previously said in court the agent took the SUV back to Maine because it was his “personal vehicle,” then stated in a later court filing the car is part of an official Border Patrol fleet.
  
  The judge also noted she had not previously been told a mechanic had worked on the car, and the government has given at least two different accounts of who approved the car’s removal to Maine.
  
  She acknowledged the government version of events may turn out to be true, “but I can’t accept that possibility at this juncture,” she said.
  
  “There have been serious questions raised about the truthfulness of the statements made by the Border Patrol agent who shot Ms. Martinez and …about the extent to which she could get a fair trial when the Department of Homeland Security was using her case to make inflammatory public claims about the level of resistance to Operation Midway Blitz,” Northwestern law professor Paul Gowder told CNN. “Dismissing the case was the right thing to do with that kind of cloud over it.”
  
  When reached by CNN for comment on the judge dismissing charges against Martinez, Department of Homeland Security Assistant Secretary Tricia McLaughlin on Thursday restated previous claims that Martinez was one of the drivers who rammed agents and referred questions on the charges to the Justice Department.
  
  Along with the physical scars that wrapped around Martinez from her arms to her legs, the mental trauma is another reminder of that painful day, she said.
  
  “I’m a survivor,” Martinez said. “I don’t want to remember that day. You’re laying there at night and you’re just thinking about it, like, ‘what’s gonna happen?’ It’s really emotional to me.”
  
  Martinez, who works as a teaching assistant, says she now wants to put the case behind her and get back to work.
  
  “I’m just so excited to go back with my students, the parents. They were so supportive,” she told CNN.
  
  Martinez says she will be happy to get her normal life back.
  
  “People are like, ‘oh, you just want to be the victim,’” she said. “I’m not the victim. I’m actually a survivor from all of this injustice that’s going on.”
  
  This story has been updated with additional information.
