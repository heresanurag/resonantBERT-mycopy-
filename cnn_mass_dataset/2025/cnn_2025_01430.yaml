title: "Andrew Garfield’s touching tribute to his mom with Goldie Hawn"
date: "2025-03-03"
section: "Entertainment"
url: "https://www.cnn.com/2025/03/03/entertainment/goldie-hawn-andrew-garfield-oscars-scli-intl/index.html"
content: |
  Hollywood legendGoldie Hawnand actor Andrew Garfield shared a sweet moment on stage at Sunday’s Academy Awards.
  
  Hawn, 79, was presenting the awards for best animated film and short, along with“Spider-Man” star Garfield, when she paused and asked him: “OK. Sweetheart, can you read that? I can’t read that.”
  
  “I’m completely blind. I mean, I am!” said the “Private Benjamin” star, before joking: “Cataracts.”
  
  On Monday, a representative for Hawn clarified to CNN that the Oscar-winner’s vision is intact. (Cataracts are a common condition that can cause blindness if left untreated, but which can be fixed with a simple surgery. )
  
  Garfield told Hawn “OK, I’ve got you,” as he stepped in to announce a win for Latvian movie “Flow.”
  
  Earlier, Garfield had thanked Hawn for the joy she brought to his late mother, Linda, who died of pancreatic cancer in 2019.
  
  “Can I tell you something?” he said.
  
  “There’s someone, there’s a person who gave my mother during her life the most joy, the most comfort, and tonight, I feel very lucky, because I get to thank that person from the bottom of my heart. That person is Goldie Hawn,” Garfield said.
  
