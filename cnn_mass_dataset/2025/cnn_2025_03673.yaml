title: "Opal Suchata Chuangsri from Thailand crowned Miss World 2025"
date: "2025-05-31"
section: "Style"
url: "https://www.cnn.com/2025/05/31/style/opal-suchata-chuangsri-miss-world-thailand-latam-intl?iid=cnn_buildContentRecirc_end_recirc"
content: |
  Opal Suchata Chuangsri ofThailandwas crowned Miss World on Saturday inIndia, where the international pageant was held this year.
  
  Chuangsri topped a field of 108 contestants in the contest held in India’s southern Hyderabad city. Hasset Dereje Admassu of Ethiopia was the first runner-up in the competition.
  
  Chuangsri received her crown from last year’s winner Krystyna Pyszková.
  
  The 72nd Miss World beauty pageant was hosted by Miss World 2016 Stephanie del Valle and Indian presenter Sachiin Kumbhar.
  
  India hosted the beauty competition last year as well.
  
  India’s Nandini Gupta exited after making it to the final 20.
  
  Six Indian women have won the title, including Reita Faria (1966), Aishwarya Rai (1994), Diana Hayden (1997), Yukta Mookhey (1999), Priyanka Chopra (2000) and Manushi Chhillar (2017).
