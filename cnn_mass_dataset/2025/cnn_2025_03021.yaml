id: cnn_2025_03021
title: "Trump escalates battle to take control of spending away from Congress"
date: "2025-09-03"
section: "Politics"
url: "https://www.cnn.com/2025/09/03/politics/trump-congress-spending-shutdown-recissions?Date=20250903&Profile=CNN"
content: |
  Just over seven months into his second term, President Donald Trump has made significant headway towardhis goalof weakening Congress’ centuries-old power of the purse — pushing the boundaries of executive authority and blocking what Democrats argue amounts to nearly a half-trillion dollars the administration is legally required to spend.
  
  Now, Trump’s collision course with Congress is rapidly intensifying as he will be forced into a high-stakes negotiation with Democrats to fund the government by September 30. The administration rolled what amounted to a hand grenade into the spending talks just before Congress returned to Washington this week byproposing to cancel$4.9 billion of foreign aid through what’s known as a “pocket recission,” a tactic that Democrats — and the top Republican Senate appropriator — said was illegal.
  
  “This is a big deal… [Trump] has concentrated all this power in his hands,” Rep. Rosa DeLauro, the top Democrat on the House Appropriations panel, said in an interview hours after the White House’s latest gambit to block foreign aid spending. “They are running around illegally stealing taxpayer money, and it is a unilateral partisan act that excludes any cooperation with Democrats.”
  
  According to figures compiled by congressional Democrats, which have not been previously reported, the administration has so far withheld $425 billion that Congress had agreed to spend on programs like biomedical research, state and local crime fighting efforts and energy programs. It’s a number that congressional Democrats are likely to point to as they push for guardrails in upcoming talks with GOP leaders, who also voted to approve that spending.
  
  Democrats, meanwhile, have been fighting Trump in the courts, where they’ve won some key victories forcing Russ Vought — Trump’s budget chief and lead architect of the president’s spending power grab — to be more transparent about what his office is doing with Congress’ dollars. But the Supreme Court and federal appeals courts have handed the administration other legal victories allowing it to slash congressionally approved funding, such as foreign aid and research grants at the NIH for purposes like HIV funding.
  
  The legal fight is far from over. Dozens of cases related to spending and appropriations are still being litigated. And the administration’s proposed pocket recission — which would cancel funding close enough to the end of the fiscal year that Congress is effectively powerless to stop it — is sure to be challenged in court, too.
  
  House Minority Leader Hakeem Jeffries called the move a “brazenly unlawful scam” and referred to Trump as a “wannabe King.” And the top Democrat on the Senate spending panel, Sen. Patty Murray, said Congress should reject the “ridiculous, illegal maneuver.”
  
  “Republicans should not accept Russ Vought’s brazen attempt to usurp their own power. No president has a line-item veto—and certainly not aretroactiveline-item veto,” the Washington state Democrat said last week.
  
  And the move has met some resistance from members of the president’s own party. Top Senate appropriator Susan Collins called it “a clear violation of the law,” while Alaska Sen. Lisa Murkowski argued that “Congress alone bears the constitutional responsibility for funding our government, and any effort to claw back resources outside of the appropriations process undermines that responsibility.”
  
  Even Rep. Thomas Massie – who strongly supports cutting spending – told CNN he had some concerns with the White House’s tactics on the so-called pocket rescission.
  
  “It looks like they’ve done it intentionally. I think they are trying to be too cute by half by doing it this late. It’s also a risky move. The courts could tie it up. If it’s such a good idea, we have a majority in the House and Senate, why not let us vote on it?” Massie said.
  
  “I don’t know why they literally held it in their pocket until the clock ran out.”
  
  The White House budget office, for its part, insisted that the cancelation of funds was fully legal.
  
  “We are on very firm legal footing and we will be making that case and I think the courts, if they do consider this, will decide along the lines of what we’ve articulated,” a White House official said.
  
  Trump himself said ina 2023 campaign videothat the president should reclaim the spending power he said had been unconstitutionally wrested away by Congress so he could “squeeze the bloated federal bureaucracy for massive savings.”
  
  The more immediate question will be how GOP leaders respond during the upcoming funding negotiations, in which Democrats and at least one Republican – Collins of Maine – are demanding more limits on Trump’s powers. (Notably, some of those limits have already passed the Senate as part of bipartisan spending bills.)
  
  Privately, Trump’s moves have rankled some senior Republicans in both chambers but the president’s grip on the party has made it virtually impossible to fight back, according to multiple people familiar with private discussions. Any restrictions on Trump’s authority would not pass the GOP-controlled House, those people said.
  
  In a statement to CNN, Collins lambasted the White House’s move to withhold funding for PEPFAR, theAIDS relief program, which she called “one of the most successful global health programs in history.”
  
  Asked whether the White House’s moves to block or “impound” spending were threatening Congress’ power, she said the head of the Government Accountability Office “should consider” legally challenging the White House directly.
  
  Democrats like DeLauro had pushed for guardrails in the last funding negotiation in March but were rebuffed and Senate Democrats eventually agreed to forge a spending deal without those limits. This time, they insist they’re not in the mood to capitulate.
  
  Trump’s efforts to circumvent Congress and slash federal spending go beyond what he attempted in his first term – when his efforts to withhold military aid to Ukraine culminated with a House impeachment by Democrats. (Trump was acquitted by the GOP-controlled Senate.)
  
  This time, Vought has usurped Congress’ spending powers in even more ways, refusing to spend money that his own party appropriated, rebuffing efforts to see how the government is spending money and circumventing Trump’s own agency officials by requiring OMB sign-off on spending decisions.
  
  Bobby Kogan, who served as an adviser in former President Joe Biden’s budget office, said Vought and his OMB have effectively put federal agencies under “gunpoint” to follow their directives – with their funding hanging in the balance.
  
  “You have both subverted the will of Congress, which is very major, but you’ve also subverted the agency authority,” said Kogan, who is now senior director of Federal Budget Policy at American Progress. “What they’ve done here is a political bottlenecking inside the White House. He is having it all be controlled by politics inside of the White House, away from the agencies.”
  
  Republican congressional leaders have largely gone along with the budget maneuvers. Congress even voted to approve a recissions package to claw back $9.4 billion in spending it had approved last year, the first time since the Clinton administration that the Legislative Branch had agreed to give back already-approved money. (Collins, the GOP spending leader, opposed the bill along with every Democrat.)
  
  It amounted to a seismic scrambling of order on Capitol Hill. The party out of power has traditionally squeezed some key priorities into spending bills in exchange for their votes to break a filibuster. Suddenly, Trump and his team were ripping up the playbook.
  
  But the pocket recission goes even further trying to assert control, by cutting Congress out of the process altogether. The GAO has argued that such a move is illegal. (Collins described it in a statement as an“attempt to undermine the law.”)
  
  The GAO also concluded that the Trump administration twice violated the Impoundment Control Act of 1974 by withholding funding for Head Start programs and terminating NIH grants.
  
  But Vought — who, like Trump, has argued the Impoundment Control Act is unconstitutional — has largely ignored those rulings.
  
  Vought has publicly dismissed the need for bipartisanship on spending, telling reporters in June the appropriations processshould be less bipartisan, not more.
  
  “We’re $37 trillion in debt,” Vought said in an interview earlier this summer with CBS’s Face the Nation, asked about his push to cancel Congress’s already-approved dollars. “It’s not news that the Trump administration is going to bring a paradigm shift to this town in terms of the business of spending,” he said, adding that the White House believes “we have the ability and the executive tools to fund less than what Congress appropriated.”
  
  Trump’s budget chief wasted little time after the president was sworn in to take a knife to the federal budgets he had inherited, all but eliminating agencies like the US Agency for International Development and the Consumer Financial Protection Bureau, while announcing suspensions and revocations of a host of federal grants and contracts across the government.
  
  The response has been scores of lawsuits, many of which led to US district court judges temporarily freezing the administration’s attempts to axe spending, at least for a time. But recent court decisions suggest the administration’s strategy may ultimately be successful.
  
  Last month, the DC Circuit Court of Appealshanded down a 2-1 decisionthat the administration’s cuts at the CFPB could resume, ruling that employees suing to stop the near-shuttering of the agency had to do so in other venues.
  
  A week later, the Supreme Courtdelivered a 5-4 rulingthat allowed the Trump administration to halt nearly $800 million in research grants awarded by NIH that officials say touch on race and gender issues.
  
  The White House is hoping the Supreme Court will continue to erase obstacles to the cuts it wants to enact: The Justice Department last week asked thehigh court to step inand block a lower court’s attempts to force the administration to spend billions on foreign aid.
  
  The courts have been the primary check on the White House’s desire to cut spending it doesn’t like that was previously approved by Congress. But that’s largely because the legislative branch has done little to try to stop the executive since Trump took office.
  
  In fact, House Speaker Mike Johnson made the administration’s plans not to spend congressionally appropriated funds as part of his argument to convince skeptical members of the conservative House Freedom Caucus to support a full-year continuing resolution in March.
  
  The full-year continuing resolution, which locks prior year funding levels in place through September 30, included$3 billionin emergency funding that OMB would not allocate, which Democrats argued was illegal.
  
  OMB went a step further to obscure spending by taking down a public website that discloses what are known as apportionments, which is how agencies are specifically doling out funds. In a rare instance of bipartisan pushback against the White House, the four leaders of the appropriations committees sent a letter telling the White House to restore the website.
  
  Last month, a federal judge ordered the administration to put the websiteback online.
  
  Democrats insist that they will once again try to rein in Trump’s efforts to circumvent the appropriations process during the end-of-month funding talks. But it’s not clear they will have any more success than this spring.
  
  “We tried to do that last March,” DeLauro said, recalling Democrats’ attempts to get Republicans to agree to guard rails that would force the Trump administration to release funding. But in response, Delauro said Republicans argued that Congress couldn’t rein in the powers of the president.
  
  “That’s bullsh*t, excuse me,” DeLauro said. “Republicans have been silent. They refuse to stand up and fight back.”
