  # Eddie Murphy’s son and Martin Lawrence’s daughter are married
  
  By [![Image 1: Lisa Respers France](https://media.cnn.com/api/v1/images/stellar/prod/220413113637-03-lisa-france-headshots.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/lisa-france)[Lisa Respers France](https://www.cnn.com/profiles/lisa-france)
  
  Updated May 30, 2025
  
  Updated May 29, 2025, 8:15 PM ET
  
  PUBLISHED May 29, 2025, 10:21 AM ET
  
  People in entertainment Relationships
  
  [See all topics](https://www.cnn.com/follow)
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2025%2F05%2F29%2Fentertainment%2Feddie-murphy-martin-lawrence-kids-married "Share with email")Link Threads
  
  Link Copied!
  
  ![Image 2: Eric Murphy and Jasmine Page Lawrence in 2024 in California.](https://media.cnn.com/api/v1/images/stellar/prod/gettyimages-2158523557.jpg?c=original&q=w_860,c_fill)
  
  Eric Murphy and Jasmine Page Lawrence in 2024 in California.
  
  Leon Bennett/Getty Images
  
  No doubt that had there been a wedding reception for these fathers to speak at the speeches would have been pretty funny.
  
  Eddie Murphy has revealed that his son Eric has married Martin Lawrence’s daughter, Jasmin.
  
  The “Beverly Hills Cop” star shared the news Thursday in an episode of [“The Jennifer Hudson Show.”](https://youtu.be/fFA6IFF0w-U?si=CER1xAuiW3lDvJBn)
  
  Ad Feedback
  
  “They got married like two weeks ago,” Murphy said. “They went off…everyone was making the big wedding the plans and then they decided they wanted to do something quiet, just the two of them.”
  
  He also joked about the economic relief that the elopement provided Lawrence.
  
  “Yeah, we’re in-laws,” Murphy said. “He don’t have to pay for the big wedding now.”
  
  The couple announced their engagement in November. Murphy said the plan is to instead have a party to celebrate the nuptials.
  
  The elder Murphy and Lawrence are longtime friends who costarred in the 1992 film “Boomerang” and 1999’s “Life.”
  
  Murphy told Hudson he and Lawrence have several ideas for reuniting on the big screen, including a dream of Murphy’s to remake the 1963 comedy “It’s a Mad, Mad, Mad, Mad World.”
  
