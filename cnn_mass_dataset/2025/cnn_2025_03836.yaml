title: "Popular performer Red Panda makes NBA return, roughly 4 months after breaking wrist in fall"
date: "2025-11-05"
section: "Sport"
url: "https://www.cnn.com/2025/11/05/sport/basketball-nba-unicycle-performer-red-panda-returns"
content: |
  Red Panda wasn’t on the injured list for very long.
  
  The popular halftime performermade her NBA return on Tuesday nightin Chicago when the Bulls hosted the Philadelphia 76ers. Shebroke her left wristduring a July 1 performance at the WNBA Commissioner’s Cup final between the Indiana Fever and the Minnesota Lynx.
  
  Red Panda — whose real name is Rong Niu — spent11 hours in a Minneapolis hospitalafter the fall. Her agent, Patrick Figley, said Tuesday that Niu first returned from the injury on October 23 for an Amazon Prime event and she has also made a few appearances at universities.
  
  The Chinese American performer’s act is composed of her riding on the unicycle and balancing custom-made bowls on her lower leg before flipping them atop her head.
  
  She has been a mainstay at countless NBA and college basketball games over the past several years, including Game 5 of the NBA Finals in June in Oklahoma City.
