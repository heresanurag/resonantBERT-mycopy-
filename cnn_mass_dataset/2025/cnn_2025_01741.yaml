title: "Trump administration launches investigation into Duke University and Duke Law Journal"
date: "2025-07-28"
section: "Politics"
url: "https://www.cnn.com/2025/07/28/politics/trump-duke-investigate-university-law-journal?recs_exp=most-read-article-end&tenant_id=popular.en&iid=cnn_buildContentRecirc_end_recirc"
content: |
  The Trump administration has identified a new target in its battle with elite higher education, announcing a two-pronged front against Duke University on allegations the North Carolina school is in violation of the Civil Rights Act.
  
  The Education Department is launching an investigation into Duke University and the Duke Law Journal, the department announced in a news release Monday, citing reporting that alleges the university was violating the Civil Rights Act. Education Secretary Linda McMahon and Health and Human Services Secretary Robert F. Kennedy Jr. also sent a letter to Duke University “outlining shared concerns about the use of race preferences in Duke’s hiring, admissions, and scholarship decisions.”
  
  The announcements come days after Columbia University reached a$200 million settlementwith the Trump administration to restore federal funding to the school. Trump administration officials have cast the Columbia deal as a blueprint for other schools, and an administration official told CNN that Cornell and Brown universities are engaging in negotiations and agreements are in sight. The administration remains in multiple legal battleswith Harvard Universityafter freezing more than $2 billion in federal funding for the school.
  
  Duke, so far, has not indicated that it’s willing to negotiate with the Trump administration, the official said. This marks another instance of the administration targeting a school in a state that President Donald Trump won in the 2024 election, after the administrationtemporarily suspended fundingfor the University of Pennsylvania earlier this year.
  
  A spokesperson for Duke University did not immediately comment in response to a CNN request. CNN has also reached out to the Duke Law Journal.
  
  The administration will investigate whether Duke and its law journal violated Title VI of the Civil Rights Act, which prohibits discrimination based on race, color or national origin in programs or activities receiving federal funding.
  
  Separately, the letter from McMahon and Kennedy alleged “serious allegations of systemic racial discrimination permeating the operations of Duke University School of Medicine and other components of Duke Health.” The letter, according to HHS, “outlines expectations for a partnership-style pathway for Duke to work with HHS and the Department of Education to swiftly uncover prohibited race-based discrimination in Duke Health and come into compliance with certain Federal civil rights laws.”
  
  Kennedy said in a statement that he and McMahon are calling on Duke to form a “Merit and Civil Rights Committee” to work with the federal government.
  
  .The Education Department requested that Duke University “review all policies and practices at Duke Health for the illegal use of race preferences, take immediate action to reform all of those that unlawfully take account of race or ethnicity to bestow benefits or advantages, and provide clear and verifiable assurances to the government that Duke’s new policies will be implemented faithfully going forward.
  
  Trump has been making good on a key campaign promise in his second term as he’s worked to eliminate programs that boost diversity. The Trump administrationcontendsthat diversity, equity and inclusion, or DEI, “creates and then amplifies prejudicial hostility and exacerbates interpersonal conflict.”
  
  After Trump issued a series of expansive executive orders banning DEI programs, theDepartment of Educationin February threatened the federal funding of any academic institution engaging in DEI initiatives, which prompted many to scrub DEI mentions from websites, shutter programs and some to lose scholarship funding.
  
  Proponents of DEI have criticized the moves, saying many initiatives are beneficial. Studieshave showncollege students exposed to more diversity have greater levels of cultural awareness and political participation.
  
  Trump adviser Stephen Miller, who has been adriving forceof the president’s policies on higher education, is a Duke alumnus.
  
  The investigations could ultimately result in the loss of federal funding, which comes as Duke and other major universities are experiencing heightened pressure due to cuts in grant programs at the National Institutes of Health. Duke has initiated a voluntary separation incentive and layoffs are expected to begin in August, according to theDuke Chronicle.
  
  CORRECTION: This story incorrectly reported the investigation into Duke University was the first time the administration targeted a school in a state that President Donald Trump won in the 2024 election. The administration temporarily suspended funding for the University of Pennsylvania earlier this year. The story has been updated.
