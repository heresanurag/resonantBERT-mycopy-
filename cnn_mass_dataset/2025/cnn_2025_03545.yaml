title: "Trump’s historic new tariffs are now in effect. Here’s what you need to know"
date: "2025-08-06"
section: "Business"
url: "https://www.cnn.com/2025/08/06/business/trump-tariffs-in-effect?cid=external-feeds_iluminar_yahoo"
content: |
  President Donald Trump just enacted a new wave of tariffs on dozens of America’s trading partners, marking a substantial escalation in ongoing trade tensions that could constitute the biggest change to the global economy in nearly a century.
  
  The historic new trade policy follows months of false starts to Trump’s so-called “reciprocal” tariff rollout and countless bilateral trade negotiations, a handful of which resulted in agreements that fended off even higher tariffs.
  
  Trump and his economic advisers have celebrated the considerably higher tariffs that have already gone into effect, correctly noting that they have raised more than $100 billion in tax revenue without leading to catastrophic inflation or a recession, as some economists had feared.
  
  The president is moving forward with new, significantly more aggressive tariffs that economists fear could exacerbate budding economic problems, including rising inflation and slowing job growth, that are just now becoming more apparent.
  
  Here’s what to know about the tariffs:
  
  Before Thursday, virtually every country’s goods were subject to a minimum 10% tariff. Now rates vary substantially from country to country.
  
  The highest rates imposed are on goods from Brazil (50%), Laos (40%), Myanmar (40%), Switzerland (39%), Iraq (35%) and Serbia (35%).
  
  An additional 21 countries also face levies greater than 15%. That includes several countries the US relies heavily on for a variety of goods, such as Vietnam (20%), India (25%), Taiwan (20%) and Thailand (19%).
  
  Goods from India could also be subject toan additional 25% tariffstacked on top of that because of an executive order Trump signed Wednesday that seeks to penalize India for purchasing oil from Russia. That second tariff is slated to take effect on August 27.
  
  Thirty-nine countries’ goods, as well as members of the European Union, are subject to 15% tariffs, according to a list the White House published last week.
  
  Besides Canada and Mexico, all other countries the US imports goods from will continue to face a minimum 10% tariff, albeit with a few exemptions.
  
  Goods from Mexico and Canada are exempt from tariffs if they’re compliant with the US-Mexico-Canada free-trade agreement. If not, goods from Mexico are subject to 25% tariffs, while goods from Canada are subject to 35% tariffs, up from 25% previously.
  
  In most cases, they’re not exactly tradedeals, per se, but rather rough sketches of ones that could take months, or even years, to finalize — assuming they don’t fall apart.
  
  Over the past five months, Trump announced eight trade agreements. Of those, only two — with the United Kingdom and China — have been formalized. The agreement with China, which significantly lowered tariff rates both countries imposed on one another’s goods, expires on August 12. If both countries fail to act, rates could spike again.
  
  Most agreements Trump announced involve trading partners committing to purchasing more American products, like oil, cars, Boeing airplanes, defense equipment and agricultural goods. They also involve hundreds of billions of dollars worth of investments in American businesses.
  
  But it’s unclear if the United States and other trading partners involved in agreements are on the same page about many of the proposed terms. For instance, Japan’s Prime Minister Shigeru Ishiba and a lead Japanese trade negotiator, Ryosei Akazawa, both recently said many key details are still being worked out and are telling a vastly different story from Trump, who earlier this week said the country agreed to buy Ford F-150s.
  
  One notable exemption is smartphones, which aren’t subject to any of the new rates. Additionally, goods for which Trump imposed separate sectoral tariffs or ordered investigations that could result in higher rates won’t be stacked on top of country-specific “reciprocal” tariffs.
  
  For the time being, that means pharmaceuticals, for instance, could be imported from countries duty-free. However, Trump is warning they could soon face significantly higher rates.
  
  The EU sought to preempt those tariffs by negotiating a 15% tax on pharma exports to the US as part of the agreement announced with Trump. Other countries involved in trade agreements similarly are getting more favorable rates on certain sectoral tariffs.
  
  There’s also a partial exemption for certain goods manufactured abroad where at least 20% of their value comes from American materials and labor.
  
  Technically they’re already in effect, but there’s a caveat.
  
  The executive order Trump signed last week essentially states that most goods that were loaded on ships and in transit to the US before 12:01 am on Thursday will face whatever the prior tariff rates were until October 5.
  
  In addition to pharma tariffs, Trump has threatened to impose across-the-board tariffs on semiconductors and lumber. At an Oval Office event on Wednesday, for example, Trump said he would soon placea 100% tariff on chips and semiconductors, although he didn’t give a timeline.
  
  And while the tariffs Trump just enacted could ultimately be rendered illegal, pending anongoing court challenge, the president has plenty of levers he can pull to keep pushing his agenda for higher tariffs.
