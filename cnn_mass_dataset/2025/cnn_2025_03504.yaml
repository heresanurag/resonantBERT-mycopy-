title: "YoCrunch yogurt products recalled over potential choking risk"
date: "2025-07-14"
section: "Health"
url: "https://www.cnn.com/2025/07/14/health/yocrunch-yogurt-recall"
content: |
  YoCrunch yogurt products sold across the country are being recalled because of the potential presence of plastic pieces in the dome topper,  Danone US said Monday.
  
  The company has received reports that the dome topper may contain small, sharp pieces of transparent plastic that could make someone choke, it said in an announcement on the US Food and Drug Administrationwebsite. The issue does not involve the yogurt itself, Danone said, but it’s recalling all flavors and sizes of YoCrunch products with expiration dates between early July and early September.
  
  “The company is working swiftly with retail partners to remove the impacted product from shelves, while it works to address the issue and bring back the YoCrunch products so many people enjoy,” Danone said in the announcement. “Danone U.S., the makers of YoCrunch, takes every consumer experience seriously and is initiating this voluntary recall in line with its commitment to product quality and consumer safety.”
  
  Consumers who have the affected products should not eat them but should call the YoCrunch consumer care line at 1-877-344-4886 for information on refunds, Danone said.
