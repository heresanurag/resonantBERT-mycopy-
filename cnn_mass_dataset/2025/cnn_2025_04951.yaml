  # Trump Media grants large amounts of stock to directors
  
  By [![Image 1: Elisabeth Buchwald](https://media.cnn.com/api/v1/images/stellar/prod/2026-elisabeth-buchwald-headshot-2.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/elisabeth-buchwald)[Elisabeth Buchwald](https://www.cnn.com/profiles/elisabeth-buchwald), [![Image 2: Clare Duffy](https://media.cnn.com/api/v1/images/stellar/prod/2000082-0292-r-ps2560x1440.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/clare-duffy)[Clare Duffy](https://www.cnn.com/profiles/clare-duffy)
  
  Updated Feb 11, 2025
  
  Updated Feb 11, 2025, 2:01 PM ET
  
  PUBLISHED Jan 31, 2025, 8:29 PM ET
  
  Congressional news January 6th Donald Trump Trump appointments
  
  [See all topics](https://www.cnn.com/follow)
  
