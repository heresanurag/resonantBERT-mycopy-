title: "What actually went wrong at Jaguar"
date: "2025-08-05"
section: "Cars"
url: "https://www.cnn.com/2025/08/05/cars/jaguars-sales-trump?iid=cnn_buildContentRecirc_end_recirc&recs_exp=news-&-buzz-right-rail&tenant_id=popular.en"
content: |
  Nearly a year ago, Jaguar unveiled arefreshed brand identitythat was supposed to usher in its future. So far, it’s been mostly a headache.
  
  The 102-year-old luxury automake﻿r, once a head-to-head competitor with brands like Mercedes-Benz and BMW, had beenplagued with problemseven before the advertising campaign was released, including leadership changes, declining sales amid a stale lineup and stiff competition from the likes of both German luxury carmakers as well as relative upstarts like Tesla.
  
  Now it can add two more problems: misleading headlines about its sales, and outrage from the political right — most notably the US president.
  
  On Monday, President Donald Trump trashed Jaguar for what he called a “stupid” and “seriously WOKE” ad campaign last year, which featured anavant-garde commercialthat featured slogans such as “live vivid,” and what appeared to be gender-fluid models, but zero images of its cars or even concepts of a car.
  
  “Who wants to buy a Jaguar after looking at that disgraceful ad,” quipped Trump on Truth Social. “The market cap destruction has been unprecedented with BILLIONS OF DOLLARS SO FOOLISHLY LOST.”
  
  Butthe reality is different.
  
  Jaguar Land Rover has been owned by Tata Motors since 2008, when the Indian company bought it from Ford, which meansJaguar doesn’t have a market cap. And Tata itself is doing fine as a massive multinational conglomerate with a wide variety of operations worth about $28 billion.
  
  Plus, Jaguar’s problems are more fundamental. Although most legacy automakers have tried to manage a smooth transition to fully electric propulsion, Jaguar simply ceased making cars entirely in 2024 pulling all of its products off the market as it tries to reinvent itself as an electric vehicle maker.
  
  But that’s enough to establish a narrative in the minds of many. Headlines swirled last month that Jaguar’s sales across Europe were down 97.5% year-over-year in April, citing data fromthe European Automobile Manufacturers’ Association.That makes sense given Jaguar stopped manufacturing cars  but the news was enough to draw the wrath of Trump and some conservatives.
  
  Jaguar reveals first concept car after controversial rebrand
  
  Shortly after the ad was released, Jaguar revealed itsType 00 concept carat Miami Art Week — notably, not at a traditional automotive show. While the concept isn’t intended for production, it is meant to show Jaguar’s general future design direction.
  
  Jaguar didn’t respond to a question from CNN about when it will start production again.
  
  Last week, Jaguar Land Rover CEO Adrian Mardell announced he was stepping down after 35 years with the brand. He had a largely successful stint, having helped eliminate billions of dollars of debt and withJLRreporting itsninth consecutive profitable quarterin January on the back of strong SUV sales.
  
  Tata Motors on Monday named P.B. Balaji, currently the company’s chief financial officer, as Jaguar Land Rover’s new CEO. He begins in November.
