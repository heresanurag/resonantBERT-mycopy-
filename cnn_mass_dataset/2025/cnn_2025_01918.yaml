title: "A doctor explains a rare but serious condition associated with the flu"
date: "2025-08-19"
section: "Health"
url: "https://www.cnn.com/2025/08/19/health/virus-flu-children-health-wellness"
content: |
  We all know that influenza is a common and serious viral infection, but it’s good to be reminded ahead of the upcoming flu season, which typically starts in October.
  
  There were an estimated 47 million to 82 million flu illnesses in the United States between October 2024 and May 2025, resulting in between 610,000 and 1.3 million hospitalizations, according to preliminary estimated ranges from theUS Centers for Disease Control and Prevention.
  
  Most fatalities occur in older individuals, but children can also die from the flu. TheCDC estimatesthat flu-related deaths in children have generally ranged from 37 to 199 deaths each flu season.
  
  The flu can be a big deal for children. Here’s why
  
  Now, a new study inJAMAhas examined a rare but severe complication that can occur in children who contract the flu. This complication, called acute necrotizing encephalopathy, or ANE, carries a mortality rate of 27%  despite intensive care and treatment, according to the new research.
  
  I wanted to learn more about complications associated with the flu, specifically about ANE, what researchers learned about children with ANE, and how can ANE be prevented. And what should parents and families know ahead of the next flu season?
  
  To help with these questions, I spoke with CNN wellness expert Dr. Leana Wen. Wen is an emergency physician and clinical associate professor at George Washington University. She previously was Baltimore’s health commissioner.
  
  Dr. Leana Wen:Most people who have the flu will recover without complications. They may go through days or even weeks having fever, runny nose, headache and fatigue, but these symptoms generally resolve without long-term consequences.
  
  Some people, though, experiencecomplicationsthat could result in severe illness or even death. These complications include pneumonia, sinus and ear infections, brain and neurological conditions, and the worsening of existing medical problems such as heart and kidney disease.
  
  People at higher risk forflu complicationsinclude individuals 65 years and older, children younger than 2 and pregnant women. In addition, there are a variety of chronic medical conditions that increase risk, including chronic lung disease, diabetes, heart disease, liver disorders, kidney dysfunction and any condition that makes you immunocompromised.
  
  What parents can do to reduce the likelihood of kids getting sick and missing school
  
  ﻿Wen:ANE is arare but very serious conditionthat occurs as a result of influenza infection. It causes inflammation and swelling in the brain, and itcan lead toseizures, impaired consciousness, coma, long-term brain damage and death.
  
  It’s not known precisely how common this condition is or whether the incidence has been changing in recent years. It can also occur after other viral illnesses, but it has been most closely associated with influenza, and most often in children.
  
