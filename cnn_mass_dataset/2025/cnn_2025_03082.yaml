title: "Best red carpet looks at the 2025 SAG Awards"
date: "2025-02-23"
section: "Style"
url: "https://www.cnn.com/2025/02/23/style/sag-awards-red-carpet-fashion?cid=ios_app"
content: |
  With awards season drawing to a close, Hollywood’s biggest names had one last chance to impress on the red carpet beforenext Sunday’s Oscars. But while some stars (or their stylists, at least) will be saving their show-stopping outfits for the Academy, Sunday evening’sScreen Actors Guild (SAG) Awardssaw attendees having fun with a comparatively relaxed dress code.
  
  This year’s big celebrity events have thus far seen plenty of dark ensembles — and some of the most anticipated arrivals continued the trend. Demi Moore stunned in a black drop-waist leather gown from Bottega Veneta’s Summer 2025 collection, while fellow nominee Zoe Saldaña looked elegant in a demure one-sleeve velvet Saint Laurent gown.
  
  Yet, the Shrine Auditorium in Los Angeles also welcomed lots of lighter touches, both in shade and material. Pamela Anderson floated along the venue’s blue-colored carpet in a goddess-like Dior gown, while Ariana Grande arrived in an ethereal sheer Loewe bustier dress with floral detailing. Others opted for brighter and more delicate dresses than we’ve seen of late, by embracing lace (see Quinta Brunson, also in Dior) or satin (see Millie Bobby Brown in Louis Vuitton).
  
  There were bold statements, too. Cynthia Erivo was wrapped in the silver metallic fabric of a Givenchy dress taken from the label’s Fall-Winter 1997 Haute Couture archive. “Shōgun” star Anna Sawai meanwhile wore a crystal-embellished Armani Privé gown with an optical illusion neckline that appeared to float without straps.
  
  Several of evening’s men experimented with less conventionally formal looks, though it was all the usual suspects: Best actor nominee Andrew Scott and “Abbott Elementary” star Tyler James Williams both wore stylishly loose-fitting suits, while “The Bear” actor Jeremy Allen White put a wide-legged spin on black-tie attire. Never one to play by the rules, Timothée Chalamet delivered one of the night’s most outlandish looks in a leather Chrome Hearts suit, Brat-green shirt and diamond-encrusted bolo tie by Cartier.
  
  See below for some of the red carpet’s best looks. This story will be updated throughout the evening.
