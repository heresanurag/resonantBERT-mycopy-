title: "In from the cold? Alibaba co-founder Jack Ma spotted among top tech bosses who met China’s Xi"
date: "2025-02-17"
section: "Tech"
url: "https://www.cnn.com/2025/02/17/tech/china-jack-ma-alibaba-meeting-hnk-intl?cid=external-feeds_iluminar_yahoo"
content: |
  Chinese leader Xi Jinping hosted Alibaba co-founder Jack Ma and the country’s top tech executives in Beijing on Monday, in a meeting that signals officials could be steering the country in a more business-friendly direction after a yearslong regulatory crackdown.
  
  Besides Ma, the other tycoons in attendance included Huawei founder Ren Zhengfei, BYD CEO Wang Chuanfu, CATL CEO Zeng Yuqun, Tencent CEO Pony Ma, Meituan CEO Wang Xing, Xiaomi CEO Lei Jun, and DeepSeek CEO Liang Wenfeng, according to avideo reportfrom state broadcaster CCTV.
  
  According toofficial news agency Xinhua, the Chinese leader told the tycoons that they had “immense potential and promising prospects.” He said the country’s economic challenges were only temporary and also promised to remove barriers to fair market competition.
  
  “Now is the perfect time for private enterprises and entrepreneurs to thrive,” he said at the meeting at the Great Hall of the People, where he chaired asimilar symposiumwith leaders of privately owned businesses in 2018.
  
  The meeting came just weeks after Chinese startup DeepSeek’s latest AI model roiled global stock markets and AI players by delivering comparable performance to US-based industry behemoths at significantly lower cost. Its success has also brought optimism to China’s tech sector, which is still recovering after a severe regulatory crackdown lasting more than three years.
  
  That campaign was sparked in late 2020 after Ma blasted Chinese financial regulators and banks in a landmark speech. His blistering criticism set off themost widespread regulatory crackdownin the history of corporate China, which affected the fortunes of other tech giants including Tencent, ride-hailing Didi and food-delivery Meituan. Since then, Ma, the formerly outspoken founder, haslargely vanishedfrom public view.
  
  His high-profile attendance at the meeting with Xi suggests authorities are finally moving past its crackdown as concerns about his business empire have largely been resolved, according to Angela Huyue Zhang, a law professor at the University of Southern California who wrote a book about China’s regulation of tech firms.
  
  “With the domestic economy slowing and geopolitical pressures escalating, the government is making it clear that it values and relies on the private sector to drive innovation and stimulate growth,” she told CNN.
  
