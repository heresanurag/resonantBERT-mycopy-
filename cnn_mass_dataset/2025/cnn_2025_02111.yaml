id: cnn_2025_02111
title: "Israel kills multiple journalists in Gaza, including prominent Al Jazeera reporters"
date: "2025-08-10"
section: "Middle East"
url: "https://www.cnn.com/2025/08/10/middleeast/israel-strike-kills-six-journalists-gaza-jazeera-latam-intl?iid=cnn_buildContentRecirc_end_recirc&recs_exp=up-next-article-end&tenant_id=related.en"
content: |
  An Israeli strike in Gaza City late Sunday night killed seven people including five staff members from the news network Al Jazeera, in an attack condemned by press freedom advocates and the United Nations human rights office.
  
  The Israeli military said it targeted and killed Al Jazeera correspondent Anas Al-Sharif – a prominent journalist who has extensively covered the war from inside Gaza – after accusing him of leading a Hamas cell, an allegation Al-Sharif and his network had previously denied.
  
  Al Jazeera said correspondent Mohammed Qreiqeh and photojournalists Ibrahim Al Thaher and Moamen Aliwa were also killed in the strike, as well as Mohammed Noufal, another staff member.
  
  “The order to kill Anas Al-Sharif, one of Gaza’s bravest journalists, along with his colleagues, is a desperate attempt to silence voices ahead of the occupation of Gaza,” Al Jazeera said in a statement after the attack.
  
  In the minutes before he was killed, Al-Sharif said on social media, “If this madness does not end, Gaza will be reduced to ruins, its people’s voices silenced, their faces erased — and history will remember you as silent witnesses to a genocide you chose not to stop.”
  
  Al-Sharif was in a tent with other journalists near the entrance to the Al-Shifa Hospital when he was killed, according to hospital director Dr. Mohammad Abu Salmiya. The tent was marked with a ‘Press’ sign, Abu Salmiya told CNN. The strike killed at least seven people, Salmiya added.
  
  The Israel Defense Forces (IDF) has accused Al-Sharif of leading a Hamas cell in Gaza that “advanced rocket attacks against Israeli civilians and IDF troops,” and had previously published documents it claimed showed “unequivocal proof” of Al-Sharif’s ties to Hamas.
  
  “The IDF had previously disclosed intelligence information and many documents found in the Gaza Strip, confirming his military affiliation to Hamas,” the military said in a statement after the strike.
  
  Last month, after the IDF accused Al-Sharif, 28, of being a member of Hamas, he responded in a message on social media.
  
  “I reaffirm: I, Anas Al-Sharif, am a journalist with no political affiliations. My only mission is to report the truth from the ground — as it is, without bias,” he wrote. “At a time when a deadly famine is ravaging Gaza, speaking the truth has become, in the eyes of the occupation, a threat.”
  
  On Monday, the United Nations Human Rights Office condemned the attack, calling it a “grave breach of international humanitarian law” in a post on X. “Israel must respect & protect all civilians, including journalists.”
  
  The Committee to Protect Journalists (CPJ) said it was “appalled” by the killings, adding that Israel has “a longstanding, documented pattern of accusing journalists of being terrorists without providing any credible proof.”
  
  “Israel is murdering the messengers,” CPJ Regional Director Sara Qudahsaid in a statementon Monday. “Israel wiped out an entire news crew. It has made no claims that any of the other journalists were terrorists. That’s murder. Plain and simple.”
  
  “It is no coincidence that the smears against al-Sharif – who has reported night and day for Al Jazeera since the start of the war – surfaced every time he reported on a major development in the war, most recently the starvation brought about by Israel’s refusal to allow sufficient aid into the territory,” Qudah added.
  
  In July, the CPJ said it was “gravely worried” for Al-Sharif’s safety and that the journalist feared for his life after he was the target of “an Israeli military smear campaign, which he believes is a precursor to his assassination.”
  
  The organization said186 journalists have been killedsince the beginning of the war nearly two years ago, adding: “178 of those journalists are Palestinians killed by Israel.”
  
  Since the start of the war, Israel has not allowed international journalists to enter the Gaza Strip to report independently.
  
  Just hours before the strike that killed Al-Sharif and his colleagues, Israel’s Prime Minister Benjamin Netanyahu said foreign journalists would now be allowed into Gaza, but only with IDF approval and accompanied by them, the same embed policy that has been in place since the beginning of the war.
  
  Palestinian reporters for major news outlets like Al Jazeera have become the eyes and ears of those suffering inside Gaza during the conflict and are living in the same arduous conditions as the rest of the population.
  
  Hamas earlier on Sunday accused the Israeli military of “targeting and killing” Palestinian journalists, calling for journalists and international media to be given “freedom to enter” Gaza.
  
