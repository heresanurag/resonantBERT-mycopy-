title: "Title: World strikes climate deal but fails to agree to a roadmap away from fossil fuels after contentious, chaotic summit"
date: "2025-11-22"
section: "Climate"
url: "https://www.cnn.com/2025/11/22/climate/cop30-agreement-brazil-fossil-fuels"
content: |
  URL Source: https://www.cnn.com/2025/11/22/climate/cop30-agreement-brazil-fossil-fuels
  
  Published Time: 2025-11-22T16:44:13.668Z
  
  Markdown Content:
  
  The world struck a new climate deal at the [COP30 summit](https://www.cnn.com/2025/11/11/climate/cop30-explainer-belem-brazil) in Brazil Saturday, which calls for a tripling of funding to help countries adapt to increasingly severe climate impacts. But countries failed to agree to a roadmap [away from fossil fuels](https://www.cnn.com/2025/11/12/climate/3-degrees-warming-reports-iea-united-nations), after entrenched divisions threatened to collapse the talks.
  
  The agreement came after more than two weeks of increasingly fraught negotiations between representatives of more than 190 countries in [the port city of Belém](https://www.cnn.com/2025/11/06/climate/cop30-chaos-love-motels-oil-drilling-amazon-trump), known as the gateway to the Amazon. Disagreements reached such fever pitch there were fears the summit would collapse with no deal. Talks stretched overtime as dozens of nations pushed back against an outcome that didn’t explicitly mention a transition away from oil, coal and gas — the drivers of the climate crisis.
  
  But just after midday local time Saturday, the COP30 president André Corrêa do Lago gaveled through a deal.
  
