id: cnn_2025_04274
title: "Americans don’t want Trump’s federal troop crackdown. He’s barreling forward anyway."
date: "2025-10-08"
section: "Politics"
url: "https://www.cnn.com/2025/10/08/politics/trump-troops-crime-crackdown-polls?Date=20251008&Profile=CNN"
content: |
  President Donald Trump is barreling forward with his administration’s heavy-handed efforts across the United States, in rather ominous and drastic ways.
  
  In recent days alone, his administration has tried to skirt a Trump-nominated judge’s ruling against his use of the National Guard in Portland, Oregon. He’s attacked Democrats in speeches to military leaders and troops, evenpitting generals and admirals against the blue side. He’s pressed forward with a Guard deployment to Chicago that the mayor and Illinois’s governorhave rejected– and even said Wednesday that themayor and governor should be “in jail.”And he’s now floatinginvoking the Insurrection Act, which hasn’t been used in decades and would give him more freedom in deploying the military domestically.
  
  All of this despite no evidence of an actual insurrectionor really even extraordinary levels of crimeorviolencein the cities at issue. The Trump-nominated judge said over the weekend that the record showed the Portland protests “were not significantly violent.”
  
  We seem to be reaching an inflection point, where Trump charges ahead despite the courts, despite the facts on the ground, and despite longstanding norms that guard against the politicization of the military.
  
  But in this moment, it’s also worth emphasizing: He’s charging forward despite public opinion, too.
  
  While many wagered at the start that Americans really just wanted to stomp out crime and didn’t care about the details, the public has  actually taken a pretty dim view of Trump’s gambit.
  
  And if anything, their skepticism appears to be growing.
  
  A few polls of late drive that home.
  
  The first thing to note is that Americans seem to oppose Trump’s use of the Guard by sightly widening margins.
  
  ACBS News-YouGov pollthis weekend showed they opposed Trump’s decision to deploy the Guard to US cities, 58%-42%. A recentQuinnipiac University pollshowed they disapproved of Trump’s use of the Guard and federal law enforcement to reduce crime, 55%-42%. AndNPR-Ipsos pollingin recent weeks showed fewer than 4 in 10 Americans supported Trump’s decisions to deploy the Guard to Washington, DC, and Memphis, Tennessee.
  
  These numbers are significant because early polling suggested Americanswere moreevenly spliton Trump’s initial deployment of the military to Los Angeles over the summer.
  
  Those early polls also suggested Americans were broadly open to the concept of using the Guard to help police combat crime, at least as long as local officials didn’t object. (An August AP-NORC poll showed Americans said55%-37% that it was acceptablefor the military and National Guard to support local police.)
  
  But the new data suggest Americans are now broadly opposed to using the Guard at all, irrespective of local input.
  
  The second point is that, to the extent this was succeeding, you’d expect Americans to be warming to Trump’s handling of crime. That’s the justification for all of this, after all.
  
  But that’s not what has happened.
  
  A newReuters-Ipsos pollreleased Wednesday showed Trump’s approval rating on crime going from 43% last month to 41% now. AWashington Post-Ipsos pollconducted in mid-September showed Americans disapproved of him on crime 54%-44%.
  
  ANew York Times-Siena College pollshowed a more even split, but with some warning signs: Independents disapproved 51%-42%, and even 15% of Trump voters didn’t like his handling of crime.
  
  These are unusual numbers for Trump, for whom getting tough on crime has long been a calling card.
  
  And that brings us to perhaps the most underappreciated aspect of all of this. It’s not just that Americans seem to view this as a waste of time or resources; they also seem to object to it on principle.
  
  This was an issue driven home by the Trump-appointed judge, Karin Immergut, over the weekend. She said that the Trump administration’s arguments “risk blurring the line between civil and military federal power — to the detriment of this nation.”
  
  That’s actually something that Americans seem concerned about, even at this early juncture and even as they’ve been quite worried about crime.
  
  The New York Times-Siena College poll asked perhaps the best question on this. It surveyed  whether Americans were more worried about whether crime would “spiral out of control in big cities” if the Guard weren’t deployed, or whether they were more concerned about Trump using the Guard to “intimidate his political opponents.”
  
  That latter option might seem rather conspiratorial to Trump supporters. But Americans chose it by a significant margin, 51%-42%.
  
  Similarly, the new Reuters-Ipsos poll showed Americans generally align with the idea that the military should be used only in extraordinary circumstances. In fact, they said 58%-25% that a president should only deploy it to deal with “external threats.”
  
  Trump, by contrast, is very much seeking to use it against supposedinternalthreats – what he labels the “enemy from within.”
  
  In a speech to the generals and admirals last week, he repeatedly returned to the idea that this was an enemy akin to a foreign threat. “No different than a foreign enemy,” he said at one point.
  
  None of these overall margins against Trump’s use of the Guard are overwhelming. And Trump has solid support in his base, which is usually what he cares about most.
  
  But as he pushes toward the scenario that some of hismost prominent top military leaders once feared– the militarization of the homeland – it’s worth emphasizing that he’s apparently doing these drastic things against Americans’ will.
