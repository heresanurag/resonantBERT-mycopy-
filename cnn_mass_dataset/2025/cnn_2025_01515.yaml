  Last month, the Trump administration threatened to cancel medical research funds and to pull the accreditation of universities that have diversity and inclusion programs or boycott Israeli companies.
  
  Just hours into his second term, Trumpsigned an Executive Orderdeclaring diversity, equity and inclusion efforts discriminatory, doubling down on one of the controversial policies he pushed during his first presidency.
  
  MIT isamong 45 universitiestargeted in an investigation launched in March by the Department of Education’s Office for Civil Rights for “allegedly engaging in race-exclusionary practices in their graduate programs.”
  
  This week the Trump administration escalated its fight against Harvard by moving to cancelall of the university’s remaining federal contracts, which total around $100 million, in addition to severalbillions in grants already canceled or frozen.
  
