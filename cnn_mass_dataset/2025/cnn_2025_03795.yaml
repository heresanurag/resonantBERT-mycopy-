  At a Kerr County commissionersmeetingMonday, Sheriff Larry Leitha said his office’s search and recovery efforts will “go strong for another month or two,” and could last up to six months. The sheriff’s office said 2,200 people from multiple agencies have been deployed to assist in the recovery efforts.
  
  The searchincluded60 miles of river, murky waters, thick mud and seemingly insurmountable piles of debris. A small army of searchers from across the US and even Mexico haveworkedthrough perilous terrain – aided by helicopters, drones and boats, as well as dogs and mules.
  
  More than 1,000 first responders and thousands of volunteers were involved in the response, Kerr County Emergency Operations Center Unified Command said Saturday.
  
  The people who were listed as missing are not campers or local residents, but tourists who came in for the holiday – and officials didn’t know how many were lost, County Judge Rob Kelly said earlier this week.
  
  Kerr County is expected to host a meeting Tuesday for those in the area impacted by the flood.
  
  Months’ worth of torrential rainfellin the span of just hours, sending river levels surging and triggering deadly flash flooding in western and central Texas on July Fourth weekend.
  
  For many families, the gravest warningsabout the deadlyweather in Texas Hill Country arrived too late. Some were asleep, while others — used to extreme weather in the region — remained awake, listening to heavy downpours and thunder that rattled their homes.
  
  AtCamp Mystic, an all-girls Christian camp, 27 campers and counselors were killed by the raging waters.
  
  The camp is located along the Guadalupe River’s floodplain – whichrose more than 20 feetin less than two hours overnight into the July Fourth holiday.
  
  Abbott has emphasized the unprecedented scale of the flooding and highlighted the coordinated response between state, local and federal agencies in ongoing recovery and relief efforts.
  
