title: "When Trump meets Netanyahu, he’ll meet a politician transformed"
date: "2025-09-29"
section: "Middle East"
url: "https://www.cnn.com/2025/09/29/middleeast/trump-netanyahu-meeting-analysis-intl"
content: |
  When Israeli Prime MinisterBenjamin Netanyahumeets President Donald Trump at the White House on Monday, they will discuss a Middle East that has undergone radical change.
  
  The US president says a dealto end the war in Gaza is likely. But what’s on offer is politically problematic for Netanyahu – and much as the region has transformed, so has Netanyahu. His drastic change in approach makes it all the more difficult to predict what comes next.
  
  For two years, Israeli jets and special forces have undertaken daring missions, striking targets once thought untouchable, with regional capitals from Doha to Tehran and Damascus bearing the scars of Netanyahu’s pledge to reshape the Middle East after the October 7, 2023 attacks on Israel.
  
  At the United Nations General Assembly last week, Netanyahuproudly toutedIsrael’s military operations.
  
  “We’ve hammered the Houthis. We crushed the bulk of Hamas’s terror machine, we crippled Hezbollah, taking out most of its leaders and much of its weapons arsenal, we destroyed Assad’s armaments’ in Syria, we deterred Iran’s Shiite militias in Iraq, and most importantly and above everything else, wedevastated Iran’s atomic weaponsand ballistic missile programs,” he said.
  
  “Israel rebounded from its darkest day to deliver one of the most stunning military comebacks in history.”
  
  The growing tally of days in Israel’s war in Gaza reflects another aspect of the same story.
  
  For years, Netanyahu’s approach to warfare was characterized by brief and contained conflicts, especially in Gaza. Operation Pillar of Defense, in 2012, for example, lasted just eight days. The current Gaza war will mark two years next month, the longest in Israel’s history.
  
  When he returned to power in 2009, Netanyahu declared that one of his goals would be eliminating Hamas. In practice, despite his rhetoric, Israel’s longest serving prime minister’s security policy was widely seen as cautious and relatively restrained, even derided as cowardly by political rivals, who also mocked his inability to make decisive moves. His years of big talk turned into small decisions.
  
  Two days after the Hamas-led attack left more than 1,200 Israelis dead, Netanyahu promised Israelis “we are going to change the Middle East.” This time, he meant it.
  
  Analysts who once expected caution are grappling with a new reality. Netanyahu once shunned long wars and ground operations, aware of the cost and political capital that resulted in indecisive conclusions or stalemates. Now he pursues them – oftenagainst the advice of his own military.
  
  The Israel Defense Forces’ chief of staff, Maj Gen Eyal Zamir, adamantly opposed the latest decision to take over Gaza City, and questioned the high-risk operation targeting Hamas leadership in Qatar. But Netanyahu ignored his warnings.
  
  “From the start of the war through the most recent decisions, including Iran and Qatar, at every one of these stages there were always people in the room who opposed, hesitated or raised reservations of one kind of another,” Netanyahu said at a press conference earlier this month. “And that is perfectly fine, that is their role, they must state their opinion, but in the end, the one who decides is the cabinet.”
  
  This transformation raises a fundamental question, all the more important as the White House meeting nears: Has Netanyahu truly changed?
  
  Trump upbeat about ending Gaza war as 21-point peace plan takes shape
  
  After October 7, Netanyahu is a “totally different person, who has undergone an internal evolution, replacing his risk averse tendencies with a much more proactive and adventurous security approach,” said Mazal Mualem, author of “The Netanyahu Code” biography.
  
  The security collapse on October 7 served as a “wake up call,” Mualem said.
  
  “He won’t admit it but (he) was caught on total strategic blindness, and the lesson he drew was that he must free himself from the security establishment, which always frightened him with warnings about casualties in ground incursions,” she added. “This dovetailed with the Israeli public zeitgeist, which for years resisted paying the heavy prices of war. October 7th changed him and changed that”.
  
  As Israel’s longest-serving leader, Netanyahu has always been known to be driven – at least in part – by fear: of his government collapsing, of elections, of the polls swinging against him. And now fear of hisongoing corruption trial.
  
  That apprehension kept him from making big, sweeping changes. Instead, he allowed Israel’s economy to hum along and took credit for the growing list of countries wanting part of Israel’s tech and arms industries.
  
  Anshel Pfeffer, The Economist’s Israel correspondent and author of “Bibi: The Turbulent Life and Times of Benjamin Netanyahu,” says the motivating factor hasn’t changed at all, even if its effect has.
  
  “Netanyahu has always been, and still is, extremely risk averse. He fears change and clings to status quo,” he said. “He typically avoids both wars and diplomatic breakthroughs. Even the Abraham Accords were forced upon him by the Trump administration. And the Gaza war was forced by Hamas. Once war became the status quo, Netanyahu adapted. He’s still addicted to the status quo – only now, the status quo is war.”
  
  Pfeffer says Netanyahu is still governed by fear, “only now he fears his coalition partners more than anything else.”
  
  From diplomacy to soccer, Israel is becoming a pariah on the global stage
  
  His far-right allies,Itamar Ben GvirandBezalel Smotrich, oppose any negotiation with Hamas and are pushing for permanent occupation of Gaza, and their threats to topple the government if the war ends prematurely have shackled Netanyahu’s strategic decision-making. Trump’s proposal is said to acknowledge aspirations for Palestinian statehood, something firmly opposed by both men.
  
  Still, acknowledging the shift in optics, Pfeffer says Netanyahu is “now at a stage where he’s afraid of history’s judgment, and that he won’t be remembered as Churchill and Israel’s defender. He is desperate for a grand achievement that will rewrite history. He is convinced something will eventually erase October 7th from Israelis’ memory and reveal him as their savior.”
  
  “But that moment isn’t coming.”
  
  Pfeffer likens Netanyahu to “a desperate gambler, putting his chips in a different place each time in the hope of cementing his place in history”. Netanyahu is a complex creature, he concludes, “so perhaps all the theories hold some truth. He remains risk averse, afraid of ceasefires no less than of wars, a hostage of his coalition, and an extremely cautious man who has turned into a desperate gambler”.
  
  Whether driven by genuine strategic evolution or survival instincts, Netanyahu’s transformation from cautious manager to regional gambler remains incomplete.
  
  The military operations across multiple fronts may have restored some of Israel’s deterrence, but they have not yet delivered the decisive victory that he hopes could rehabilitate his legacy or secure his political future.
  
  Israeli public support for the war, which was overwhelming at the beginning, has significantly eroded. So has Israel’s international legitimacy, declining amid waves of sanction threats andinternational recognitionfor Palestinian statehood.
  
  The future of Netanyahu’s new daring playbook remains unclear ahead of his meeting with Trump at the White House. So far, the Trump administration has done little to rein in Israel’s military endeavors and has backed Netanyahu’s continuation of the Gaza war.
  
  But the support has come with sharp – and sometimes surprising – limitations. In June, Trump backed Israel’s strikes on Iran during a 12-day assault, then forced Israel to turn back fighter jets already on their way to attack after he announced an end to hostilities. The president’s mercurial nature means he can oppose Israel’s next move right after he backed the last one.
  
  Trump’s recent upbeat remarks about an imminent deal to end the fighting may signal that he could soon force Netanyahu into accepting a new status quo – one that may halt the prime minister’s bid to build a legacy through military aggression and instead compel him to confront his political reckoning.
