title: "The most striking stats of the 2025 election"
date: "2025-11-05"
section: "Politics"
url: "https://www.cnn.com/2025/11/05/politics/voter-data-election-stats?cid=external-feeds_iluminar_yahoo"
content: |
  Americanscast ballotsat polling places across the country on Tuesday, which means we have a bunch of data on voters voting — rather than just pre-election polls of a hypothetical electorate.
  
  So what did we learn from that data?
  
  Here are some of the most striking statistics.
  
  68%-31%:Democratic New Jersey Gov.-elect Mikie Sherrill’s advantage among Latino voters, according toCNN’s exit poll, which combines pre-election interviews with those conducted at polling places (Virginia Gov.-elect Abigail Spanberger won this demographic by a similar margin.) President Donald Trump had significantly closed the gap with Latino voters in the 2024 election, winning 46% of them nationally. But Tuesday’s results — albeit in states that Trump lost last year — appear much more in line with how this demographic previously voted.
  
  17 and 14 points:Spanberger’s and Sherrill’s respective advantages among young men under the age of 30. Trump had also made big gains nationally with this demographic in 2024, when young male voters were close to evenly split.
  
  1961:The last time Democrats won a Virginia governor’s race by more than Spanberger’s current 15-point margin.
  
  1965:The last time New Jersey elected the same party to the governor’s mansion in three straight elections. Sherrill will succeed two-term Democratic Gov. Phil Murphy.
  
  78%, 82%:Spanberger’s and Sherrill’s respective vote shares among voters who disliked both major political parties. Some Democrats fear that their party’s historic unpopularity will hurt their ability to win anti-Trump voters. At least on Tuesday, though, the so-called “double-haters” swung hard for Democrats.
  
  2006:The last time Democrats won a non-federal statewide race in Georgia, before theywon a pair of Public Service Commission raceson Tuesday.
  
  26 points:The margin by which Democrats won each of those races, defeating a pair of GOP incumbents.
  
  41%:The percentage of Virginia voters who said Democratic Attorney General-elect Jay Jones’violent text messageswere “disqualifying.”
  
  9%:The percentage of those voters who voted for Jones anyway.
  
  50%:The percentage of Virginia voters who agreed that support for transgender rights in society has “gone too far.” Republican gubernatorial nominee Winsome Earle-Sears made trans issues a huge focal point of her attacks on Spanberger.
  
  23%:The percentage of those voters who voted for Spanberger anyway.
  
  320,000:The difference between Spanberger’s current raw vote total (about 1.92 million) and 2021 Virginia Democratic gubernatorial nominee Terry McAuliffe’s raw vote total (about 1.6 million). About 20% more people turned out to vote for her than voted for McAuliffe four years ago.
  
  50.4%:New York City Mayor-elect Zohran Mamdani’s current vote share, with about 91% of the vote counted. Getting a majority would put to rest any talk about Republican nominee Curtis Sliwa having been a “spoiler” in the race with former Democratic Gov. Andrew Cuomo, who ran as an independent.
  
  73%:The percentage of GOP voters in that New York race who voted for Cuomo — whom Republicans, including Trump, wound up rallying around as a Mamdani alternative.
  
  32%:The percentage of Jewish voters who voted for Mamdani, who will become New York City’s first Muslim mayor. Trump on Tuesday called any Jewish people who voted for Mamdani “stupid.”
  
  13%:The percentage of CaliforniaRepublican voterswho voted for Democratic Gov. Gavin Newsom’s ballot measure to allow the state government to draw more Democratic congressional districts. Newsom launched the effort to retaliate against Texas Republicans’ move to draw more GOP districts in that state. And his argument that this tit-for-tat move was warranted clearly proved compelling to voters, given it’s currently passing 64%-36%.
  
  7%, 13% and 16%:The percentages of voters in California, New Jersey and Virginia, respectively, who said their vote was meant to support Trump. In each case, many more voters said their vote was meant to oppose Trump: 52% in California, 41% in New Jersey and 38% in Virginia.
  
  This story has been updated with updated exit poll numbers.
