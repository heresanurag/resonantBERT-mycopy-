title: "Oklahoma sells fan access to postgame press conferences for almost $700"
date: "2025-08-19"
section: "Sport"
url: "https://www.cnn.com/2025/08/19/sport/football-ncaa-oklahoma-press-conference-intl"
content: |
  Oklahoma is offering fans a chance to attend postgame press conferences, but it won’t be cheap.
  
  It’s one of the “Sooner Magic Memories” offerings the program has created to give fans greater access this season. The cost for two people to sit in on the media session after the Oklahoma-Michigan nonconference showdown on September 6 is $692.11. For the Southeastern Conference home opener September 20 against Auburn, it’s $576.86.
  
  “Get exclusive postgame media access for you and one guest and see where real-time reactions unfold,” the advertisement says.
  
  “Hear OU coaches and players address reporters moments after the final whistle. Watch the story take shape through the questions, the insights, and the atmosphere that set the headlines.”
  
  The Michigan and Auburn numbers might seem steep, but the cost for the Illinois State season opener on August 30 is $461.61 – and it’s already sold out.
  
  Other offerings include pregame photos on the 50-yard line, a high five tunnel, game ball delivery and halftime field access.
  
  Athletic departments across the country are looking for new revenue sources as the cost of fielding teams and attracting top talent rises in the NIL era. The House settlement that took effect July 1 allows each participating school to shareup to $20.5 millionin revenue directly with their athletes even as more than $2.5 billion is paid back to current and former athletes who sued over restrictions on their ability to earn compensation.
