content: |
  👋Welcome to 5 Things PM!People are assigning themselves homework to combat brain rot and improve their attention spans. There are no grades and no hard deadlines, just the satisfaction that comes withenriching your mind.
  
  Here’s what else you might have missed during your busy day.
  
  The US excels at building large, expensive weaponry, but most American soldiers lack the know-how for fighting with unmanned systems. That’s why the most advanced military in the worldis playing catchup on the modern battlefield.
  
  The Catholic Church is no stranger to resurrection. After decades of declining attendance and dwindling faith in much of the Western world, Roman Catholicism could be witnessing a revival, and it’s comingfrom an unexpected source.
  
  Sleep difficulties are common, but getting a good night’s rest isn’t just a matter of avoiding afternoon fatigue — it could helpprotect against brain agingin the future, new research suggests.
  
  Meta CEO Mark Zuckerberg made a bold claim that people without smart glasses may one day be at a “significant cognitive disadvantage.” His visioncould come into focusduring the Meta Connect conference, where the tech giant announces new products.
  
  Three octogenarian nuns defied their diocese, ran away from a nursing home and returned to their former convent in Salzburg, Austria. The old residence no longer had electricity or running water, so supportersbrought them supplies.
  
  📸Epic journey:National Geographic photographer and explorer Thomas Peschak documented one of the planet’s most vital ecosystems, the Amazon River Basin.Take a look behind the scenesat his 396-day adventure.
  
  👗Memorable moments:Jenna Ortega’s gothic spin on “naked” dressing was one of the most talked-about red carpet looks at the Emmy Awards, but there were plenty of otherhead-turning outfits.
  
