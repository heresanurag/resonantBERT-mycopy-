title: "Luigi Mangione wants a laptop in jail while he awaits trial in killing of UnitedHealthcare CEO"
date: "2025-03-25"
section: "US"
url: "https://www.cnn.com/2025/03/25/us/luigi-mangione-laptop-jail-united-healthcare/index.html"
content: |
  Luigi Mangioneis asking for a laptop in jail, but just for legal purposes – not for communicating with anyone – as he awaits trial in thekilling of UnitedHealthcare’s CEO.
  
  In a court filing made public late Monday, Mangione’s lawyers proposed that he get a laptop configured solely to let him view a vast amount of documents, video and other material in the case surrounding the shooting ofBrian Thompson. Similar limited-laptop provisions have been made for some other defendants in the federal lockup where Mangione is being held.
  
  The Manhattan district attorney’s office, which is prosecuting Mangione on a rare New York state charge ofmurder as an act of terrorism, didn’t immediately respond to a request for comment. According to Mangione’s lawyers, prosecutors are frowning on the laptop request, saying that some witnesses have been threatened.
  
  Even for an administrative hearing, Luigi Mangione draws crowds at courthouse
  
  Defense lawyer Karen Friedman Agnifilo wrote that there’s “no connection to Mr. Mangione for any of said alleged threats.”
  
  Mangione, 26, is accused of gunning down Thompson in December outside a Manhattan hotel where UnitedHealthcare was about to hold an investor conference. Thompson, who was 50 and had two children in high school, worked for decades within UnitedHealthcare and its parent company.
  
  Mangione, an Ivy Leaguecomputer science graduate from a Maryland real estate family, has pleaded not guilty to the New York state charges. He also faces a parallelfederal casethat carries the possibility of the death penalty. He hasn’t entered a plea to the federal charges or to state-level gun possession and other charges in Pennsylvania, where he was arrested days after Thompson’s death.
  
  Thompson’s killingalarmed the corporate world, where some health insurers hastily switched to remote work or online shareholder meetings.
  
  But at the same time, the casechanneled some Americans’ frustrations with health insurance companies.Mangione’s writingsand words onbullets recovered from the scenereflected animus toward health insurers and corporate America, authorities have said.
  
  Some people havelionized the accused killer, donated money to his defense and evenflocked to his court appearances. Others, including elected officials, have deplored the praise for what they cast as ideological violence and vigilante justice.
  
  Through his lawyers, Mangione has released a statement thanking supporters.
  
  If he does get a laptop, it would be unable to connect to the internet, run video games or play movies or other entertainment, his lawyers said in Monday’s filing. But it would let him examine, from his jail cell, more than 15,000 pages of documents and thousands of hours of video that prosecutors gathered and were required to turn over to his attorneys.
  
  Otherwise, he can view the material when meeting with his lawyers. But they say there aren’t enough visiting hours for him to do that and properly help prepare his defense.
