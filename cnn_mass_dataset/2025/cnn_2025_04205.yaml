  Only 100 were still “on the ground in Los Angeles” as of October, thecourt filingsaid, with the rest deployed to Chicago and Portland, Oregon – cities whereeffortsto deploy federal troops of the National Guard were blocked bycourtchallenges.
  
  “Today’s ruling is abundantly clear – the federalization of the National Guard in California is illegal and must end,” Newsom said in astatementWednesday. “The President deployed these brave men and women against their own communities, removing them from essential public safety operations.”
  
  Breyer also rejected the administration’s claim that courts have no power to review a president’s decision to take control of state National Guard units during an emergency, saying this was an overly expansive view of executive authority.
  
  “The founders designed our government to be a system of checks and balances. Defendants, however, make clear that the only check they want is a blank one,” Breyer said.
  
  This story and headline been updated with additional developments.
