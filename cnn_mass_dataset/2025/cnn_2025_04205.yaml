title: "Federal judge orders Trump’s National Guard deployment in Los Angeles to end"
date: "2025-12-10"
section: "US"
url: "https://www.cnn.com/2025/12/10/us/judge-blocks-la-national-guard-deployment?cid=ios_app"
content: |
  For asecond timethis year, a federal judge is ordering the Trump administration to end its deployment offederalized California National Guard troopsin Los Angeles and return the troops to state control.
  
  US District Court Judge Charles Breyer ruled President Donald Trump does not have the authority to keep the California troops under federal control in the absence of a clear emergency.
  
  “It defies the record – and common sense – to conclude that risks stemming from protests – in August, October, or even present day – could not have been sufficiently managed without resorting to the National Guard,” the judge wrote in the order on Wednesday.
  
  Breyer, anomineeof former President Bill Clinton who sits in San Francisco,  said he would delay enforcement of his order until Monday at noon PT.
  
  The White House is standing by its view that Trump has sole power to decide when to federalize National Guard troops, implying it is likely to appeal.
  
  “President Trump exercised his lawful authority to deploy National Guard troops to support federal officers and assets following violent riots that local leaders like Newscum refused to stop. We look forward to ultimate victory on the issue,” White House spokesperson Abigail Jackson said in a statement.
  
  How Trump is intensifying his crackdown on every form of immigration to the US
  
  The administration initially called up the Golden State’s militia inJune– against the wishes of Democratic Gov. Gavin Newsom – as protests against immigration raids were roiling Los Angeles and surrounding communities.
  
  Breyerinitially ruledthis summer that Trump unlawfully called the troops into federal service and ordered the president to return control of them to the governor, but that first victory for Newsom was short-lived. Even before the order took effect, it was blocked by afederal appeals court,allowing Trump to temporarily maintain control of the troops while the legal challenge played out.
  
  Although that appeal of the initial deployment is still pending, Breyer said he has the right to step in now to consider whether the two extensions to the order that have been made are justified.
  
  “Congress did not intend for the service period to last forever – just long enough to address the present emergency,” Breyer wrote.
  
  Under the latest administration order, the California National Guard members are scheduled to remain under federal control until next February.
  
  Attorneys for the Trump administration have defended deploying Guard troops in multiple cities, saying the protests against immigration enforcement authorities amount to a rebellion and prevent agents from carrying out immigration law. But the federal judge said in the order that is not enough to justify calling up troops.
  
  “Every protest, and indeed any large gathering of people in public, carries with it a risk of violence, however unlikely,” wrote Breyer. “But the specter of a protest that is not a current impediment to the President’s ability to execute the laws becoming a future impediment is not adequate.”
  
  At its peak, the federal government had 4,119 members of the California National Guard under its command, according to a court filing, but that number has since dwindled to 300 as the situation in Los Angeles has calmed.
  
