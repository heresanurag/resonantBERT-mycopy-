  👋Welcome to 5 Things PM!Forgetting things is frustrating, but humans aren’t designed to remember everything. An expert offersfive tips to improve your memoryof the important things.
  
  Here’s what else you might have missed during your busy day:
  
  1️⃣Weapon watch:To quell protests in Los Angeles, police have used “less lethal” weapons to minimize fatalities, prevent permanent injuries and decrease property damage — but that does not mean they are harmless.Here’s a look at the equipment authorities have used.
  
  2️⃣A deep freeze:A new study found the collapse of a critical system of Atlantic Ocean currents could bring extreme weather, with winter temperatures plunging to around minus 55 degrees Fahrenheit in some cities.This interactive maphelps visualize the impacts across the globe.
  
  3️⃣Love over looks:Natasha Burns, a 6-foot-5-inch-tall model, found her now (shorter) husband on Tinder. But as dating apps allow paying users to set height preferences for potential partners,is it getting in the way of finding true love?
  
  4️⃣Gains in your cup of joe:Starbucks is testinga new banana flavored protein cold foamat five US locations. Revising the menu and starting to bake some pastries fresh in store is all a part of the CEO’s plan to expand into the wellness sector and reverse sagging sales.
  
  5️⃣Living off the land:Celebrities and influencers have transformed the image of farm living from backbreaking labor and mucked-up boots to romantic cottage dresses, sunlit ranches and tablescaping.A new wave of luxury resortsis capitalizing on the agrarian rebrand.
  
  😋Epic eats:In Japan, 7-Eleven stores are known for taking snacks to the next level. CNN’s Hanako Montgomery got a behind-the-scenes look athow one of its tasty treats is made.
  
  • Newsom and Californiaconfront Trump with a potential blueprint for Democrats• More than a dozen lawmakers tied to stock trades, transactionsahead of Trump’s early tariff pause• Brian Wilson, music icon andcreative force behind The Beach Boys, dead at 82
  
  💰 That’s how much a rare Labubu — the toys that have taken the world by storm —sold for at an auction in Beijing.
  
  🐊The Crocodile Guardian:In recent years, the population of Jamaica’s 28 species of crocodiles has declined because of illegal hunting, habitat loss and pollution. One man has made ithis life’s mission to change that.
  
  🏈He’s still got it:At 41, Aaron Rodgers is the oldest quarterback in the NFLafter signing a deal with the Pittsburgh Steelers last week. He said the decision to keep playing was “best for my soul.”
  
