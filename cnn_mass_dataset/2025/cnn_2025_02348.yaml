  Other low-cost missions flown under the NASA’s SIMPLEx program have failed due to a range of setbacks, includingLunar Trailblazer, which ended due to communications problems, andLunaH-Map, which experienced launch delays that left the spacecraft in suboptimal condition.
  
  If successful, EscaPADE could be the first bright spot in NASA’s campaign to conduct planetary science on the cheap. And it only takes one, Parker argued, to make the program worth it.
  
  “If the SIMPLEx program, which is trailblazing these high-value missions, succeeds in one mission out of three, that is still much higher value than the traditional-cost missions,” Parker said.
  
