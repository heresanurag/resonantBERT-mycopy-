title: "Popular unicycle performer Red Panda injured at halftime of WNBA game"
date: "2025-07-01"
section: "Sport"
url: "https://www.cnn.com/2025/07/01/sport/popular-unicycle-performer-red-panda-injured-halftime-spt?utm_source=cnn_Five+Things+for+Wednesday%2C+July+2%2C+2025&utm_medium=email&bt_ee_preview=toUuf5q4a52rbWwBMoqL3aC7G%2B77OUwge3R%2FfW21NjhGcDXzDaSoZ7cs1XKUVwxb&bt_ts_preview=1751450661085"
content: |
  The popular halftime show performer who goes by Red Panda fell off her unicycle and crashed to the court during intermission of the WNBA Commissioner’s Cup final between the Indiana Fever and the Minnesota Lynx on Tuesday night, unable to finish her show.
  
  There was no immediate word on the extent of her injuries. She appeared to be grabbing at her left wrist after the fall — she fell forward off the unicycle onto the court — and was helped off the floor by wheelchair.
  
  Red Panda, whose name is Rong Niu, is a Chinese American woman who comes from a family of performing acrobats.
  
  Her act is composed of her riding on her custom-built unicycle, which stretches about 8 feet above the court, and balancing custom-made bowls on her lower leg before flipping them atop her head.
  
  She has performed at countless basketball games, including Game 5 of the NBA Finals last month in Oklahoma City.
