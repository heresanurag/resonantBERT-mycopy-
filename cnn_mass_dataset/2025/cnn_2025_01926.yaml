  Dyes listed with the word “lake” in any ingredient list indicate the dye is a water-insoluble version, meaning it can dissolve in oily foods or low-moisture foods.
  
  Here are good and bad ultraprocessed foods, according to the American Heart Association
  
  Since these ingredients are typically found in ultraprocessed foods, not eating thoseis a shortcutto eliminating the additives from your diet. Ultraprocessed foods are made with industrial techniques and ingredients “never or rarely used in kitchens,” according to theFood and Agriculture Organizationof the United Nations. These foods are typicallylow in fiberand high in calories, added sugar, refined grains and fats, sodium, and additives, all of which are designed to help make food more appealing.
  
  Accordingly,shifting away from these products may result in more significant health benefits, as numerous studies have linked consumption of ultraprocessed foods with health issuesincluding type 2 diabetes,cardiovascular disease, obesity, premature death,cancer, depression, cognitive decline,strokeand sleep disorders.
  
