title: "Walmart will remove dyes and other additives from its US house-brand products by 2027"
date: "2025-10-01"
section: "Health"
url: "https://www.cnn.com/2025/10/01/health/walmart-food-products-synthetic-dyes-wellness"
content: |
  Walmart will remove artificial dyes and 30 other additives — such as artificial sweeteners, fat substitutes and various preservatives — from its US private-brand food and beverage products, thecompany announced Wednesday. The decision marks the latest corporate move in response to evolving consumer tastes and the yearslongcrackdown on food additivesthat began with state lawmakers, particularly those in California. The momentum has picked up steam this year amid Health and Human Services Secretary Robert F. Kennedy Jr.’s “Make America Healthy Again” movement.
  
  The change in Walmart brands, including Great Value, Marketside, Freshness Guaranteed and bettergoods, will be in full effect by 2027.
  
