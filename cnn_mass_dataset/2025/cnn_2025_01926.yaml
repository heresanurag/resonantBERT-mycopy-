  “Our customers have told us that they want products made with simpler, more familiar ingredients — and we’ve listened,” Walmart US President and CEO John Furner said ina news release. “By eliminating synthetic dyes and other ingredients, we’re reinforcing our promise to deliver affordable food that families can feel good about.”
  
  The 11 dyes being removed are blue dyes No. 1 and No. 2; green dye No. 3; red dyes No. 3, No. 4 and No. 40; yellow dyes No. 5 and No. 6; citrus red dye; orange B dye; and canthaxanthin, anorange-red pigmentnaturally found in some bacteria, algae, fungi, crustaceans, and tissues and egg yolk from wild birds. Except for canthaxanthin and orange B dye, the other colorants are made from petroleum. All of these dyes are  commonly used to make food and beverage products brightly colored and more appealing to consumers.
  
  The push to rid the food system of artificial dyes stems from concerns about negative impacts on animal and human health, including a potentiallyincreased risk of cancerand neurobehavioral issues. Californiabanned red dye No. 3statewide in October 2023, followed by a ban of six other common dyes in schoolfoods in September.
  
  The US Food and Drug Administrationbanned red dye No. 3in January, effective for food on January 15, 2027, and for drugs on January 18, 2028 — but the agency has since asked food companies to eliminate the dye sooner. In March, West Virginia passed themost sweeping lawthus far, prohibiting seven dyes and two preservatives.
  
