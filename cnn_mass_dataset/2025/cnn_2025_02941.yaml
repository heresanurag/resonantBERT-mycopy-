id: cnn_2025_02941
title: "Mexican journalist who covered drug cartels found dead on highway with note next to body"
date: "2025-10-27"
section: "Americas"
url: "https://www.cnn.com/2025/10/27/americas/mexico-journalist-found-dead-durango-latam-intl"
content: |
  A Mexican journalist who reported on drug cartels was found dead Saturday on a highway with a note beside his body, a news outlet he worked for reported.
  
  Miguel Ángel Beltrán’s body was wrapped in a blanket on a highway connecting Durango state to Mazatlán, a city in the cartel-plaguedSinaloa state, according to the news site Contexto de Durango.
  
  The outlet reported that the journalist was identified by his son, who last saw him on Thursday when they left for work.
  
  A note was discovered next to his body that reportedly read, “For spreading false accusations against the people of Durango,” according to local media.
  
  Beltrán had worked for various media outlets, including Contexto. He also operated a blog and TikTok account where he covered crime-related news and other topics.
  
  Several days before his death, he posted a video on TikTok about the arrest of a suspected gang leader.
  
  “We deeply regret the passing of our fellow journalist, Miguel Ángel Beltrán,” Contexto said in astatement. “The Contexto de Durango team joins in the grief that overwhelms his family and friends, wishing them strength and swift acceptance in the face of this irreparable loss.”
  
  Mexico is one of the world’s most dangerous countries for journalists, according to Reporters Without Borders.
  
  Beltrán is theninth journalistto have been killed in the country this year, the organization says.
  
  The Inter American Press Association condemned Beltrán’s death and urged authorities to “ensure that his murder does not go unpunished.”
