title: "Barrett and Kavanaugh urge convention of conservative lawyers to stand up for their principles"
date: "2025-11-07"
section: "Politics"
url: "https://www.cnn.com/2025/11/07/politics/barrett-kavanaugh-federalist-society"
content: |
  Justices Amy Coney Barrett and Brett Kavanaugh delivered a pep talk to conservatives on Thursday night, telling an audience of right-leaning legal leaders and students in Washington, DC, they should stand up for their principles and “fight fire with strength and grace.”
  
  Barrett drew hearty applause at the annual gathering of the Federalist Society for her message to female law school students who might feel pressure to conform.
  
