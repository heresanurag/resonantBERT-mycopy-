content: |
  👋Welcome to 5 Things PM!For summertime beachgoers, the threat of sharks may loom large, but nature’s deadliest predator is actuallymuchsmaller. Experts offer tipsto make yourself less attractiveto mosquitoes.
  
  Here’s what else you might have missed during your busy day.
  
  Late July is usually filled with optimism and excitement for the NFL, but the league is reeling after a gunman targeted its offices in New York City. The shooting thrust a sensitive topic — chronic traumatic encephalopathy, or CTE — into the spotlight just days before preseason games begin, along witha uniquely American problem.
  
  Thousands of microplastics so small they can penetrate deep into the lungsare in the air you breathein your home and car. A new study found that they probably come from the degradation of plastic-filled objects such as carpet, curtains, furniture and textiles.
  
  Cosmetic surgeons are reporting a growing number of patients with sagging skin and facial hollowing after they shed pounds with the help of weight-loss drugs. Thanks to them,the plastic surgery business is booming.
  
  With her short hair and unshowy clothing, Fan Chunli looks every bit the middle-aged woman from rural China. Joking about her abusive ex-husband launched the unassuming comedian to stardom,but the authorities aren’t laughing.
  
  Order a cold drink in Europe and you could be in for an unpleasant surprise. The beverage will probably arrive lukewarm. CNN’s travel team explores why Americans’ obsession with icedoesn’t translate across the pond.
  
  🧑‍✈️‘This is a hoot!’This year marks the 100th anniversary of the iconic Goodyear Blimp. CNN correspondent and flight instructor Pete Muntean took one out for a spin and tried a few maneuvers at a Wisconsin airshow.See how he did.
  
  😢A final goodbye:Thousands of fanspaid their respects to Ozzy Osbourneas his hearse made its way through the streets of Birmingham, the English city where he grew up and where his band Black Sabbath formed in 1968.
  
