title: "WADA slams ‘ill-conceived’ Enhanced Games after being named in lawsuit"
date: "2025-08-29"
section: "Sport"
url: "https://www.cnn.com/2025/08/29/sport/athletics-wada-enhanced-games-lawsuit"
content: |
  TheWorld Anti-Doping Agency (WADA)has reaffirmed its opposition to theEnhanced Gamesfollowing an anti-trust lawsuit filed by organizers of the event which allows athletes to use banned drugs.
  
  Enhanced Games said on Wednesday it was suing World Aquatics, USA Swimming and WADA for up to $800 million, alleging an illegal campaign to “crush” the event.
  
  “WADA stands by the firm position it has taken against this ill-conceived event,” the global anti-doping watchdog said in a statement.
  
  “(It) welcomes the unequivocal support it has received from numerous athletes, governments of the world, UNESCO, international sporting federations, medical associations and others, who all see the Enhanced Games as a potential threat to athlete safety.
  
  “The physical and mental toll that performance-enhancing drugs have taken on athletes over the years has been substantial. People have died.”
  
  A doping free-for-all Enhanced Games calls itself the answer to doping in sports. Opponents say it poses a danger to health
  
  World Aquatics (WA), the global governing body for swimming, introduced a new by-law in June banning athletes and staff from its competitions if they participated in events that permit banned drugs.
  
  The new rule came after a Greek swimmer supported by Enhanced Games‘broke’ a world record.
  
  WA said it had not been notified of Enhanced Games’s lawsuit and had no comment.
  
  USA Swimming declined to comment.
  
  World Aquatics to ban participants of controversial Enhanced Games
  
  Enhanced Games organizers say they will protect athletes while using technology and science to enhance their strength and speed, unlocking a new level of “superhuman” performances.
  
  Though few athletes have publicly confirmed they will participate, organizers have scheduled the inaugural Enhanced Games competition for May 2026 in Las Vegas, with swimming, athletics and weightlifting on the agenda.
