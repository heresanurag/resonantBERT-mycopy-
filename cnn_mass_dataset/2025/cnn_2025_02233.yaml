id: cnn_2025_02233
title: "Newsmax will pay $67 million to settle Dominion lawsuit over network’s 2020 election lies"
date: "2025-08-18"
section: "Media"
url: "https://www.cnn.com/2025/08/18/media/newsmax-dominion-settle-2020-election-defamation-lawsuit"
content: |
  Egregious lies about the 2020 presidential election are going to cost Newsmax $67 million.
  
  To averta high-stakes trial, the right-wing cable channel has agreed to pay Dominion Voting Systems $27 million this month and another $40 million in the next two years.
  
  The settlement deal was struck last week and disclosed in a Newsmax financial filing on Monday.
  
  “We are pleased to have settled this matter,” a Dominion spokesperson told CNN, declining to comment further.
  
  There was no indication that Newsmax will offer any on-air apology or acknowledgment of its false claims about Dominion, a voting hardware and software company that became the target of many pro-Trump conspiracy theories about the 2020 presidential election.
  
  The lawsuit was filed against Newsmax in August 2021, in the wake of Donald Trump’s attempts to overturn his 2020 election defeat. After losing, Trump and his allies, including many Newsmax guests and on-air personalities, spread the baseless lie that the election results were fraudulent.
  
  Earlier this year a Delaware judge ruled thatNewsmax did air defamatory statementsabout Dominion by falsely accusing the company of rigging the 2020 election. The judge said it would be up to a jury to decide if the smears were intentional, and if so, how much Dominion deserved in damages. But the expected April trial was postponed by the judge, citing a professional matter unrelated to the case.
  
  Then money talked, just as it did whenFox News settled with Dominionon the verge of a similar trial in 2023. Fox agreed to pay $787.5 million, a gobsmacking sum that weighed on Fox Corp’s quarterly earnings at the time.
  
  In explaining its decision to settle, Newsmax blasted the judge who presided over the case. The companysaid in a statementthat it believed Delaware Superior Court Judge Eric Davis “would not provide a fair trial,” and further claimed without evidence that Davis punished the network because “our reporting was not always sympathetic to Joe Biden.”
  
  The right-wing network complained that Davis’ pretrial rulings “limited Newsmax’s ability to defend itself.” Among Newsmax’s gripes was a key finding from Davis that it was false for anyone on Newsmax to claim that the 2020 election was rigged — a pivotal boost for Dominion that wasconsistentwith how he ruled in the related Fox-Dominion lawsuit.
  
  A court spokesperson declined to comment. Court watchers and First Amendment scholars have praised Davis’ stewardship of both cases: He has been seen as anevenhanded arbiterwith little patience for grandstanding orshenanigansfrom either side.
  
  The judge was appointed to the bench by a Democratic governor in 2010. Earlier this year, Delaware Gov. Matt Meyer, who is also a Democrat,promotedDavis to the president judge of the Delaware Superior Court, commending his “fair and balanced approach to the law.”
  
  Newsmax maintains that it never defamed Dominion, andreiteratedMonday that it believes its 2020 election coverage followed “accepted journalistic standards.” The network has repeatedly pointed out that it broadcasted a“clarification” segmentin December 2020, saying it didn’t have evidence that Dominion manipulated any votes.
  
  There was no immediate indication of how Newsmax and Dominion arrived at the $67 million sum on Monday. Newsmax’s TV ratings, however, are roughly one-tenth of Fox’s ratings.
  
  Nearly five years after the pro-Trump campaign to overturn the results of the 2020 election, some lawsuits by victims of the smears continue to wind their way through the courts.
  
  Fox is aggressively fighting a defamation suit by the voting tech company Smartmatic. Newsmaxagreed to a $40 million settlementwith Smartmatic last fall, on the eve of a trial.
