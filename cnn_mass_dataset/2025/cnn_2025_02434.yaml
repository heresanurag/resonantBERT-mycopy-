title: "Here’s what is affected by the government shutdown"
date: "2025-09-26"
section: "Politics"
url: "https://www.cnn.com/2025/09/26/politics/government-shutdown-september-2025-explained?tenant_id=popular.article.en&iid=cnn_buildContentRecirc_end_recirc&recs_exp=more-from-cnn-right-rail"
content: |
  Thefederal government has shut downas congressional lawmakers remain at odds over funding the government beyond September 30.
  
  And the effects are now being felt: Federal workers are missing paychecks; tourists are unable to visit many national parks or the Smithsonian museums; people can’t get certain federal loans to buy homes or operate small businesses, and travelers are facing delays at airports.
  
  Although Republicans control Capitol Hill and the White House, they need at least seven Democrats in the Senate to join them to pass a spending package under the chamber’s rules. Senate Minority Leader Chuck Schumer, however, is demanding any funding bill contain an extension of theenhanced Affordable Care Act premium subsidies,along with several other items, to get his party’s support. GOP leaders want anextension of fundingfor seven weeks, with additional money for security for the legislative, executive and judicial branches.
  
  With the impasse unresolved, the government shutdown could be unlike any other in recent memory. While no two shutdowns are exactly the same, President Donald Trump and the White House Office of Management and Budget have already shown that they are willing to use a totally different playbook. After urging federal agencies todownsize workersin programs whose funding has lapsed, multiple departmentslaid offseveral thousand workers 10 days into the shutdown, with other agencies warning more reductions are on the way.
  
  Trump is no stranger to government shutdowns. Themost recent oneoccurred during his first term, starting in late December 2018 and lasting 35 days, thelongest on record.
  
  Here’s what we know about the government shutdown:
  
  Congress must provide funding for many federal departments and functions every fiscal year, which begins on October 1. If lawmakers fail to pass a spending package for the full year or extend funding for a shorter period, known as a continuing resolution, then many agencies and activities must shutter until Congress appropriates more money.
  
  Since lawmakers have yet to pass through both chambers any of the 12 appropriations bills that make up the federal discretionary spending budget, this government shutdown will be considered a full shutdown.
  
  Would a federal government shutdown affect you? Tell us about it
  
  During prior impasses, Congress approved annual funding for certain agencies, which allowed them to continue operating while other federal departments went dark. That situation is known as a partial shutdown.
  
  The shutdown began on October 1, since Congress did not act before that.
  
  Every government shutdown differs somewhat, but typically functions that are critical to the protection of lives and property are deemed essential and remain open. Other operations close down until Congress approves a funding package for the current fiscal year.
  
  The Smithsonian Institute’s 19 museums and the zooshutteredon October 12, after being able to remain open for a few days by using budget funds from previous years.
  
  Meanwhile, anincreased shortage of air traffic controllersat various airports around the nation have caused flight delays.
  
  Some of a shutdown’s impact is known in advance. Agencies file what are known as contingency plans that detail what operations will continue and how many employees will remain on the job, many of them without pay.
  
  However, in an unusual move, OMB this time is not postingagencies’ shutdown contingency planson its website. Instead, the plans are hosted only on each agency’s site — making it harder to assess how the Trump administration will handle the shutdown and which activities it will deem essential.
  
  The US Food and Drug Administration’s ability to provide public health oversight will be harmed in a shutdown, according to an updated Department of Health and Human Services’contingency plan. The agency will be limited in the inspections it can conduct, though it will still respond to emergencies.
  
  “In the event of a lapse in appropriations, FDA’s ability to protect and promote public health and safety would be significantly impacted, with many activities delayed or paused,” the plan said.
  
  Meanwhile, the Department of Education said it willfurloughmost of its staffers in a shutdown, though it will continue to dole out Pell Grants and federal student loans and keep making Title I and IDEA grant funding available. States, schools and others can still access the billions of dollars in awards the department made over the summer.
  
  On the other hand, most Department of Homeland Security personnel will continue working. Most employees in Customs and Border Patrol will be retained, as well as those who work for Immigration and Customs Enforcement, the Transportation Security Administration, the Secret Service, Citizenship and Immigration Services and the Federal Emergency Management Agency.
  
  But the Washington, DC, court system said it will not issuemarriage certificatesor perform wedding ceremonies. And the National Flood Insurance Program can’tissue new policies, potentially snagging the closing of home sales.
  
  Federal funding for WIC, the food assistance program for low-income women, infants and young children, was at risk early in this shutdown, but the Trump administration said it woulddivert some tariff fundsto keep the benefits flowing. However, it’s unclear how long the money will last.
  
  Some government functions can continue — at least for a certain period of time — if they are funded through fees or other types of appropriations. For instance, the Internal Revenue Service initially said it can use some of the funding it received from the Inflation Reduction Act to keep all of its roughly 74,300 staffers on the job — as it said it would do previously when shutdowns loomed. But a week into the shutdown, the agency said it wasfurloughing roughly 34,400 employees.
  
  The IRS is currently in the midst of putting into place dozens of tax law changes contained in the Republicans’One Big Beautiful Bill Act, including some that take effect this year.
  
  It’s likely that immigration, border patrol and defense activities funded through the GOP’s tax and spending package, which Trump signed into law in July, will continue.
  
  “Thankfully, H.R. 1 provided ample resources to ensure that many core Trump Administration priorities will continue uninterrupted,” OMB wrote in its memo to agencies about preparing mass layoff plans, referring to the president’s domestic agenda package.
  
  The Defense Department said in itscontingency planthat it considers its highest priorities to be securing the southern border, Middle East operations, the Golden Dome missile defense system, among others.
  
  During the most recent prior shutdown, students had trouble getting neededtax documentsfrom the IRS to get financial aid for the spring semester, and the US Department of Agriculture warned that it could only guarantee to providefood stamp benefitsthrough February.
  
  Agencies and administrations have some amount of choice in which services they deem essential, said Molly Reynolds, interim director of the governance studies program at the Brookings Institution.
  
  In Trump’s first term, Reynolds noted that the administration took some measures to make the shutdown less painful, such as allowing the IRS to process tax refunds — a departure from prior shutdowns.
  
  But that may not be the case this year.
  
  “The OMB memo threatening wide-scale federal layoffs if there is a shutdown suggests that this time around, they might be looking to make the shutdown more painful,” she said before the reductions took place.
  
  Social Security payments to senior citizens, people with disabilities and other Americans will not be interrupted, according to the Social Security Administration’s updated contingency plan.
  
  “In the event of a lapse in appropriation, SSA will follow the contingency plan for continued activities, and Social Security beneficiaries would continue receiving their Social Security, Social Security Disability Insurance and SSI (Supplemental Security Income) payments,” the agency told CNN.
  
  Also, the unemployed will continue to receive their jobless benefits, as long as state agencies have administrative funding to process them, according to the Department of Labor.
  
  Medicare and Medicaid payments will also continue to be distributed, the Department of Health and Human Services said in its contingency plan.
  
  The impact of shutdowns on the 400-plus national park sites has differed greatly in recent shutdowns.
  
  “National parks remain as accessible as possible during the federal government shutdown. However, some services may be limited or unavailable,” the National Park Service said in a banner on its website.
  
  Park roads, lookouts, trails and open-air memorials will generally remain accessible to visitors, according to the service’s contingency plan. At the just over 100 parks that charge entrance fees, that money can go toward maintaining basic visitor services, including restrooms, trash collection and campground operations.
  
  States have also stepped in to keep some national parks open using their own funds. When a shutdown loomed in the fall of 2023, Utah said it would keep the Mighty 5 parks – Arches, Bryce Canyon, Canyonlands, Capitol Reef and Zion – open, while Arizona planned to keep the Grand Canyon operational. Colorado also said it would also keep its four national parks and other federal lands open.
  
  This time, Arizona said it does not have the funds to keep its national parks operating, butColorado and Utahsaid their national parks will remain open.
  
  The Interior Department told CNN that the administration would keep the Statue of Liberty and Ellis Island open.
  
  South Dakota Gov. Larry Rhoden and state lawmakers are personally contributing funds to continuelighting Mount Rushmoreamid the shutdown.
  
  Some services at some of the most popular national parks in themid-Atlantic regionare re-opening, with funding coming from advocacy groups, private donations and in some cases, state money.
  
  In 2013, an estimated 8 million recreation visits and $414 million were lost during the 16-day shutdown, according to the National Parks Conservation Association, citing National Park Service data. During the most recent shutdown in 2019, many parks remained open though no visitor services were provided. The Park Service lost $400,000 a day from missed entrance fee revenue, according to the association’s estimates. What’s more, park visitors would have typically spent $20 million on an average January day in nearby communities.
  
  Air traffic controllers and Transportation Security Administration officers are typically deemed essential and must remain on the job, though they are not paid.
  
  Critical support staff would be furloughed and vital support programs would be suspended in a shutdown, the National Air Traffic Controllers Association said in a statement. That would make it more difficult forair traffic controllers and other aviation safety workers to operate at full capability.
  
  “In a time when aviation safety is under heightened public concern, a government shutdown would significantly add to the distractions our members must manage on the job every day,” Nick Daniels, the union’s president, said.
  
  Staffing shortages are already snarling flights.
  
  The reasons for the short staffing are not clear, but Transportation Secretary Sean Duffy has said that a “small fraction” of controllers were “lashing out” because of the government shutdown and not going to work.
  
  More than half of air traffic delays are now being caused by staffing shortages, as opposed to only 5% earlier this year, Duffy said.
  
  The decision by 10 air traffic controllers to stay home in January 2019 helpedend that shutdown. Their absencetemporarily shut down travelat New York’s LaGuardia airport and caused delays at other major hubs, including in New Jersey, Philadelphia and Atlanta, driving Trump to agree to a temporary government funding measure.
  
  The mail will still be delivered and post offices will remain open during the shutdown.
  
  “Because we are an independent entity that is generally funded through the sale of our products and services, and not by tax dollars, our services will not be impacted by a government shutdown,” the US Postal Service said in a statement.
  
  Federal workers bear the brunt of government shutdowns. Some are furloughed, while others are considered essential and have to continue working. But many don’t get paid until the impasse ends.
  
  Many federal employees started noticing the pause in pay around October 10, when the paychecks for a large share of staffers were distributed for the pay period ending October 4. Their checks were a little lighter since they weren’t compensated for the first few days of the month. Going forward, they won’t receive any pay until Congress approves a new spending package.
  
  In March, the last time a federal government shutdown loomed before being averted, more than 1.4 million employees were deemed essential, according to Rachel Snyderman, managing director of economic policy at the Bipartisan Policy Center. About 750,000 of them would have continued to be paid since their salaries were funded through other sources.
  
  Another nearly 900,000 workers would have been furloughed without pay. (Snyderman noted that the estimates did not include the layoffs and departures that occurred in the early weeks of the Trump administration.)
  
  Trump administration rehires hundreds of federal employees laid off by DOGE
  
  The Defense Department initially informed active duty and reserve military members, as well as civilian employees, in late September that they will not be paid after September 30 until Congress approves funding for the agency, according to a memo viewed by CNN. Active duty members have to continue to report for work.
  
  But Trump recently announced the administration has identified funds topay the military.The money will be pulled from the Pentagon’s research and development funds that are available for two years.
  
  Also, judiciary officialswarnedin late Septemberthat federal courts could be affected by a shutdown within days, much sooner than in previous occurrences, because of tight budgets. While judges and Supreme Court justices would continue to be paid, many other judicial employees would not.
  
  Federal workers are guaranteed to receive their back pay after the impasse is resolved, thanks to a 2019 law. But the Trump administration last week floated adifferent interpretation of the law, calling into question whether federal workers who have been furloughed will be made whole.
  
  Also,federal contractorswho may be furloughed or temporarily laid off by their employers during a shutdown are not guaranteed to receive back pay.
  
  Medical care and critical services for veterans will not be interrupted during a government shutdown, the Department of Veterans Affairs said in its contingency plan. This includes suicide prevention programs, homelessness programs, the Veterans Crisis Line and caregiver support.
  
  The agency will also keep processing and paying claims for education benefits, disability compensation and pensions, as well as loan guarantee programs. And its National Cemetery Administration will continue to inter veterans and eligible family members.
  
  However, certain functions will cease until the impasse ends. The GI Bill Hotline will be suspended, as will assistance programs to help service members shift to civilian life. Also, the permanent installation of headstone and cemetery grounds maintenance will not occur until the shutdown is over.
  
  Shutdowns can have real consequences for the economy since federal spending is delayed, and many federal workers pull back on their purchases while they aren’t receiving paychecks.
  
  The five-week shutdown in 2018-2019 resulted in a $3 billion loss in economic growth that would not be recovered, according to aCongressional Budget Office estimate. It noted that some private sector businesses would never make up their lost income.
  
  Also, because the IRS reduced its compliance activities during the shutdown, CBO estimated that tax revenues would be roughly $2 billion lower — much of which would not be recouped.
  
  What’s more, it would become difficult to determine the health of the economy — which is currently in flux — during a shutdown. The Bureau of Labor Statistics will not issue mosteconomic reports, including the closely watched monthly jobs report on October 3, during the shutdown, the Department of Labor said in its updated shutdown plan. However, later this month, it will release theSeptember inflation report, which is critical to determine the 2026 cost of living adjustment for Social Security recipients.
  
  The impact stretches beyond the federal government.
  
  The US Travel Association wrote a letter to congressional leaders in late September urging them to avoid a shutdown, which it said would result in flight delays, longer airport security lines and canceled trips.
  
  “A shutdown is a wholly preventable blow to America’s travel economy — costing $1 billion every week — and affecting millions of travelers and businesses while placing unnecessary strain on an already overextended federal travel workforce,” wrote Geoff Freeman, the association’s CEO. “The consequences of inaction and immediate and severe.”
  
  This story and headline have been updated with additional details.
