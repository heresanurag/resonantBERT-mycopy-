title: "To protect your brain against dementia, start pedaling, study suggests"
date: "2025-09-20"
section: "Health"
url: "https://www.cnn.com/2025/09/20/health/cycling-lower-dementia-risk-study-wellness?utm_source=dlvr.it&utm_medium=twitter"
content: |
  Cycling isn’t just goodfor the planet, your wallet and your fitness. Choosing this form of transportation for your errands instead of driving or taking the train may also help you prevent cognitive decline, a recent study found.
  
  Riding a bikeis associated with a 19% lower risk of all-cause dementia and a 22% lower risk of Alzheimer’s disease, compared with taking nonactive travel modes such as a car, bus or train,found the studythat assessed nearly 480,000 participants from Great Britain and published in the journal JAMA Network Open.
  
  Physical activity has long been  associated with lower dementia risk in multiple studies, so much so that the2024 Lancet Commissionidentified it as one of 14 factors responsible for preventing or delaying approximately 45% of dementia cases. More than55 million peopleworldwide have dementia, a number expected to nearly triple by 2050.
  
  Zen and the art of bicycling to work
  
  “Although population-based evidence on the health effects of active travel remains scarce, systematic reviews have consistently highlighted its association with improved health outcomes, including a lower risk of diabetes,” the authors of the paper wrote. Few studies until now, however, have investigated the association between travel mode, dementia risk and structural brain changes, they added.
  
  The study participants were recruited between 2006 and 2010 for the UK Biobank study, which has followed the health outcomes of more than 500,000 people age 40 to 69. Participants, who were age 56.5 on average, answered questionnaires about which of four transportation modes they had used most often to get around in the past four weeks, not including journeys to or from work: nonactive, walking, mixed walking (a combination of walking and nonactive travel modes) andcycling and mixed cycling (a combination of cycling and other modes).
  
  Over a median follow-up period of 13.1 years, 8,845 participants developed dementia, and 3,956 adults developed Alzheimer’s disease. Walking and mixed walking were linked with a 6% lower risk of dementia and, interestingly, a 14% higher risk of Alzheimer’s disease. The research team also discovered that thestrongest genetic risk factorfor Alzheimer’s — the APOE ε4 gene — also had an influence. Participants without APOE ε4 had a 26% lower risk of dementia, while those with the genetic variant had a 12% lower risk.
  
  Cycling and mixed cycling were also most associated with greater hippocampal volumes, the region of the brain responsible for memory and learning.
  
  “This study is the first to show that cycling is linked not only to a lower risk of dementia but also to a larger hippocampus,” said Dr. Joe Verghese, professor and chair of neurology at Stony Brook University in New York, via email. Verghese was not involved in the study.
  
  The strengths of the study are impressive, but there are caveats, Dr. Sanjula Singh, principal investigator at the Brain Care Labs at Massachusetts General Hospital, said via email. She was also not involved in the study.
  
  “Travel modes were self-reported at a single time point, so we don’t know how people’s habits changed over time,” said Singh, who is also an instructor of neurology at Harvard Medical School. “Most participants were White and healthier at baseline, so the results may not generalize to all communities.
  
