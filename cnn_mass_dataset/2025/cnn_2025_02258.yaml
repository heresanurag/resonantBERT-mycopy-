  “Begin with short, safe routes on dedicated bike paths before moving into traffic,” Singh said. “Always wear a helmet, use reflective gear, and add lights if biking or walking at night. Stick to well-lit routes and, if possible, travel with a partner.”
  
  Cycling even just once or a few times per week can make a difference, Singh added, and indoor stationary cycling — though not included in the study — is an option for those concerned aboutsafety from traffic.
  
  For walking, aim forbrisk, purposeful treks, and build up your distance over time, Singh suggested. That could mean walking for at least 30 minutes daily, ideally at a level of intensity that makestalking a little difficult, Verghese said. Adults needat least 150 to 300 minutesofmoderate aerobic activityor 75 to 150 minutes of vigorous aerobic exercise per week, according to the World Health Organization.
  
