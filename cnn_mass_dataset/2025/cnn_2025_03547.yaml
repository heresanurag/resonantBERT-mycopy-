title: "Veteran FBI employee sues bureau after being fired over displaying a pride flag"
date: "2025-11-19"
section: "Politics"
url: "https://www.cnn.com/2025/11/19/politics/veteran-fbi-employee-sues-fired-pride-flag"
content: |
  A veteran FBI employee training to become a special agent was fired last month for displaying at his workspace an LGBTQ+ flag, which had previously flown outside a field office,according to a lawsuit filed in federal court.
  
  David Maltinsky had worked at the FBI for 16 years and was nearly finished with special agent training in Quantico, Virginia, when he was called into a meeting last month with FBI officials, given a letter from Director Kash Patel and told he was being “summarily dismissed” over the inappropriate display of political signage, Maltinsky’s lawsuit said.
  
  After CNNfirst reported on the firing last month, two veteran FBI employees speaking on condition of anonymity said displaying the LGBTQ+ flag at one’s desk historically would not violate any past FBI policy. However, since taking office, President Donald Trump has vowed to rid the federal government of what he calls “woke” ideology.
  
  FBI fires agent trainee who displayed Pride flag, sources say
  
  The suit, filed Wednesday in US District Court in Washington, said Maltinsky had been a decorated intelligence specialist working in the Los Angeles field office and most recently was pursuing a longtime dream of becoming a special agent.
  
  In June 2021, the Los Angeles field office displayed a “Progress Pride” flag, which consists of a rainbow-colored horizontal stripes and a chevron with black, brown, pink, light blue, and white colors. It’s meant to represent people of color, as well as the LGBTQ+ community. Maltinsky was given that flag after it had come down and was then displayed at his Los Angeles field office workstation with the support and permission of his supervisors, according to the lawsuit.
  
  In April, he began training at the FBI Academy to become a special agent and had successfully completed 16 of the 19 weeks of training at the time of his firing, the lawsuit stated.
  
  Maltinsky said in the suit he helped lead diversity initiatives during his time at the bureau as well. President Donald Trumpissued an executive order in Januaryending all diversity, equity and inclusion programs within the government.
  
  The FBI and Justice Department declined to comment.
