title: "Europe backtracks on ban of new combustion engine cars, in setback to tackling climate change"
date: "2025-12-16"
section: "Business"
url: "https://www.cnn.com/2025/12/16/business/eu-combustion-engine-ban-changed-intl"
content: |
  Plans to ban the sale of new combustion engine carsin the European Union by 2035 have been thrown into turmoil after pressure from car manufacturers.
  
  On Tuesday, the European Commissionproposedapplying the ban,approvedin 2023, to only 90% of vehicles, down from 100%. This means the remaining 10% of new cars made after 2035 could still be plug-in hybrid vehicles or those with internal combustion engines.
  
  The move, unveiled by the EU’s executive arm alongside other measures to support the bloc’s car industry, represents a setback for tackling climate change, although the commission’s president, Ursula von der Leyen, said Europe remains “at the forefront of the global clean transition.”
  
  “From 2035 onwards, carmakers will need to comply with a 90% tailpipe emissions reduction target, while the remaining 10% emissions will need to be compensated through the use of low-carbon steel … or from e-fuels and biofuels,” the European Commission said in a statement.
  
  The proposal is likely to be approved by European lawmakers. Priorto the announcement, Reuters reported that Manfred Weber, president of the EPP, the largest party in the European Parliament, saidthe EU was planning to scrap the ban and indicated that he supported the new plan.
  
