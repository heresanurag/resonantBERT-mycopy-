  “The European Commission will be putting forward a clear proposal to abolish the ban on combustion engines.…It was a serious industrial policy mistake,” he said.
  
  The announcement is a blow for the EU’s green credentials. The bloc is legally obligated to becomecarbon-neutral by 2050. Cars and vans are responsible for around 15% of the EU’s total greenhouse gas emissions, so a phase-out of polluting vehicles was a key part of EU climate policy.
  
  The new measures are likelya concession to the Europeanauto industry, which is under pressure from high energy costs and tariffs on exports to the United States.
  
  Car manufacturers had high hopes for the shift toward electric vehicles when ambitious targets were originally set, but they have had to grapple withfierce competition from China and lower-than-expected consumer demand for EVs. Meanwhile, the charginginfrastructure is not uniform throughout the continent.
  
  Tim Dexter, a policymanager for environmentaladvocacy group T&E, said in a statement that the dilution of the ban could have“significant consequences for the climate.” It would send“a signal that long-term commitments can be rolled back just as they start to deliver real emissions cuts,” he added.
  
  The news comes after Fordannouncedthat it was pulling back on its EV plans, a move that will result in a $19.5 billion charge against its earnings.
  
  Ford and USother automakers invested heavily in EV plans in anticipation of stringent environmental regulations put in place during the Biden administration. But the Trump administration has rolled back those emissions rules along with financial support for EVs, and is challenging states’ authority to set tougher rules.
  
