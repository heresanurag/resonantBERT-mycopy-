  In a statement to CNN, the Florida Department of Health said it doesn’t comment on active or ongoing epidemiological investigations and did not explain why it had not named the farm.
  
  The state’s bulletin on the cases didn’t explicitly warn people not to drink raw milk.  Instead, it said it wasproviding informationon the outbreak to help residents make informed decisions about their health.
  
  “Residents and visitors should be aware that there are known risks association with human consumption of raw milk,” said Press Secretary Isabel Kilman, in an emailed statement.
  
  US Health and Human Services Secretary Robert F. Kennedy Jr. has said he is a fan of raw milk. In May, he recorded an interview with a wellness influencer, which ended with the twodoing shooters of raw milkin the White House.
  
  The CDC says pasteurized milk offers the same nutritional benefit without the risks of raw milk. The agency encourages consumers tochoose pasteurizedmilk and dairy products.
