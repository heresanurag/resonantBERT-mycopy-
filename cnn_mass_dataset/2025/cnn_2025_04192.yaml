title: "House committee releases ‘birthday book,’ other records from Epstein estate"
date: "2025-09-08"
section: "Politics"
url: "https://www.cnn.com/2025/09/08/politics/epstein-estate-birthday-book-documents-house-oversight?iid=cnn_buildContentRecirc_end_recirc&recs_exp=up-next-article-end&tenant_id=related.en"
content: |
  The House Oversight Committee released a trove of records Monday evening from the estate of Jeffrey Epstein, including a note bearing President Donald Trump’s name that was part of a collection of letters gifted to the late convicted sex offender for his 50th birthday.
  
  In addition to the “birthday book,” the records included Epstein’s last will and testament, entries from his address book, and the 2007 non-prosecution agreement between Epstein and the US Attorney’s Office for the Southern District of Florida.
  
  Ahead of the public release of all the records, Democrats on the committee posted on X an image of the page from the so-called birthday book with Trump’s name. The president has repeatedly denied writing the letter andsued The Wall Street Journal, which first reported on it, for defamation.
  
  White House press secretary Karoline Leavitt saidin a post on Xfollowing the release that “it’s very clear President Trump did not draw this picture, and he did not sign it. President Trump’s legal team will continue to aggressively pursue litigation.”
  
  Ina separate post, White House deputy chief of staff for communications Taylor Budowich also denied that Trump had signed Epstein’s book and shared several images with the president’s signature.
  
  The signature on the document closely resemblesimages circulating onlineof Trump’s signature on other documents, in particular when Trump signs only his first name.
  
  The panel has been investigating the Epstein case andhad subpoenaedthe estate for documents as part of its on-going probe. The investigation comes amid a push – including from within the president’s own party – for more transparency around the case and the release of more information.
  
  Democrats on the committee alsohighlightedwhat they said was another page from the “birthday book” — a letter with a photo that they described as “Epstein and a longtime Mar-a-Lago member joking about selling a ‘fully depreciated’ woman to Donald Trump for $22,500.”
  
  The partially redacted photo shows Epstein standing next to several other people holding an oversized check written to appear that it had been made out from Trump to Epstein for $22,500. The committee did not identify the other people in the photo. Below the photo, a hand-written caption states, “Jeffrey showing early talents with money and women! Sells ‘fully depreciated’ [readacted] to Donald Trump for $22,500.”
  
  “It’s appalling Democrats on the Oversight Committee are cherry-picking documents and politicizing information received from the Epstein Estate today,” Comer said. “Oversight Committee Republicans are focused on running a thorough investigation to bring transparency and accountability for survivors of Epstein’s heinous crimes and the American people. President Trump is not accused of any wrongdoing and Democrats are ignoring the new information the Committee received today.”
  
  The now-famous “birthday book” is a 238-page collection of photos, yearbook pages, song sheets and other mementos. It was compiled by Epstein associate Ghislaine Maxwell, who wrote in the prologue that she wanted to “gather stories and old photographs to jog your memory about places, people and different events.”
  
  “Some of the letters will definitely achieve their intended goal. Some well … you will have to read them to see for yourself. I know you will enjoy looking through the book, and I hope you will derive as much pleasure looking through it as I did putting it together for you,” Maxwell wrote.
  
  In the book’s contents section, under a header titled “FRIENDS,” there is a list of more than 20 names, including former President Bill Clinton, attorney Alan Dershowitz, and Trump. Under a header titled “GIRL-FRIENDS,” the names are all redacted.
  
  The trove includes a letter that appears to be from Clinton wishing Epstein a “Happy 50th.” A spokesman referred to a previous statement that Clinton cut ties before Epstein’s arrest on federal charges in 2019 and didn’t know about Epstein’s crimes.
  
  It also includes a note that appears to be on letterhead from Dershowitz, saying, “Happy birthday and best regards.”
  
  For his tribute, Dershowitz appears to have created a fake magazine cover, which he called “Vanity Unfair,” in which he doctored headlines to fit Epstein’s name, including doctoring a cover story about Nicole Kidman. The note states, “As a birthday gift to you, I managed to obtain an early version” of the magazine.
  
  The book’s contents spanned Epstein’s life before 50, from birth and Cub Scout documents to photos of art in his expensive private residences and black-and-white family portraits. It also included extensive notes and photos about private moments and jokes.
  
  There are several pages of lewd notes with titles such as “Girls on my boat,” where the names of women appear to be redacted.
  
  The records released by the committee also include pages from Epstein’s address book, which contained contact information for many of the wealthy and powerful people in his orbit. A version of the book that redacted phone numbers or email addresses had previously been made public
  
  Attorney Daniel H. Weiner, a representative for the estate, confirmed to CNN that an initial document production had been transmitted to the panel and said “the Co-Executors will continue to produce on a rolling basis documents responsive to the Committee’s subpoena.”
  
  Lawyers representing the estate noted in a letter obtained by CNN accompanying the document production that there are certain redactions in the book, which was reportedly compiled by Epstein associate Ghislaine Maxwell, that comprises three volumes.
  
  “Please note that, in an abundance of caution, we have redacted names and faces of women and minors who appear in the book (other than Ms. Maxwell, public figures, and family or class photos) to ensure that no potential victims are publicly identifiable,” Weiner and attorney Daniel Ruzumna wrote.
  
  “We have also redacted photographs revealing any nudity from the book,” they added.
  
  In response to the committee’s request for “a potential list of clients involved in sex, sex acts, or sex trafficking facilitated by Mr. Jeffrey Epstein,” in the subpoena, lawyers for Epstein’s estate said they “are not aware of the existence” of such a list.
  
  AsCNN previously reported, a bipartisan group of staffers on the committee is expected to travel to New York City later this week to meet with lawyers representing the estate and view unredacted documents related to the investigation.
  
  The committee previously released tens of thousands of pages of documents of Epstein files turned over to the panel by the Justice Department. Democrats on the panel criticized that document production, however, saying that it contained little new information.
  
  This headline and story have been updated with additional developments.
