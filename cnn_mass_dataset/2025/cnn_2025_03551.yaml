id: cnn_2025_03551
title: "Nike’s sales are tumbling"
date: "2025-03-20"
section: "Business"
url: "https://www.cnn.com/2025/03/20/business/nike-sneakers-sales-drop"
content: |
  Nike is in a major slump.
  
  The company’s global sales dropped 9% last quarter, including a 17% drop in China, Nike said Thursday.
  
  In North America, Nike’s largest market, sales dropped 9%.
  
  But the results weren’t as bad as investors feared: Nike’s stock (NKE) inched up 4% during after-hours trading Thursday. Still, the company’s stock has dropped around 30% over the last year.
  
  The largest shoemaker in the world faces a consumer slowdown andtough competitionfrom upstart running brands like Hoka and On. Customers are changing their behaviors, passing up expensive sneakers and athletic clothing for basics.
  
  Nike is also trying to recover from strategy mistakes. The company iscutting back supplyon its classic sneaker lines Air Force 1 and Pegasus to try to juice demand and sell these sneakers at full prices. Nike also wants to push shoppers to buy new, higher-priced Air Max shoes and newer Pegasus products.
  
  In recent years, the company has slashed the number of traditional retailers it sells to,including DSW. Instead, it shifted more of its inventory to its own channels, especially online. But the abrupt change hurt Nike’s sales, and Nike has since brought back some of those partnerships.
  
  “Nike took it too far and underestimated the importance of third-party retailers,” Neil Saunders, an analyst at GlobalData Retail, said in a note to clients in June.
  
  Nike is bettingnew CEO Elliott Hill, a former Nike executive who the company brought back last year, andpartnershipswith celebrity brands like Kim Kardashian’s Skims can help improve profits.
  
  NikeSkims, a new brand from Nike and Skims tailored to women, will launch in the United States this spring.
  
  This is a developing story and will be updated.
