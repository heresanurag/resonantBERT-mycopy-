title: "CBP agent shot at driver who rammed her car at law enforcement vehicle, criminal complaint says"
date: "2025-10-04"
section: "US"
url: "https://www.cnn.com/2025/10/04/us/chicago-dhs-shooting-vehicle-ramming"
content: |
  A federal agent shot at a woman after she rammed a law enforcement vehicle in Chicago, according to a federal charging complaint, amid escalating anti-ICE protests and the Trump administration’s efforts toclamp downon unrest in Democrat-led cities.
  
  A US Customs and Border Protection agent stepped out of his vehicle and shot five times at the woman after she rammed her car into a federal law enforcement vehicle, according to the charging complaint. DHS said the woman — a US citizen — is in FBI custody after being discharged from the hospital, and she and another person are now facing federal criminal charges in connection with the incident.
  
  The woman — along with the drivers of at least 10 other vehicles — rammed and boxed in officers, Tricia McLaughlin, DHS assistant secretary, previously said in apost on X. She described the shots as “defensive” and claimed the woman was armed “with a semi automatic weapon”, although the complaint doesn’t mention that the woman was armed or used a weapon.
  
  “Agents were unable to move their vehicles and exited the car. One of the drivers who rammed the law enforcement vehicle was armed with a semi-automatic weapon,” McLaughlin said in her post. “Law enforcement was forced to deploy their weapons and fire defensive shots at an armed US citizen who drove herself to the hospital to get care for wounds.”
  
  The woman was identified as Marimar Martinez by the DHS, which said she is in FBI custody after being discharged from the hospital. Martinez was recently named in an intelligence bulletin last week “for doxing agents and posting online,” McLaughlin said.
  
  DHS said another person, Anthony Ian Santos Ruiz, was “involved in the ramming” and is in law enforcement custody. It is unclear whether Martinez or Ruiz have been charged or if they have legal representation.
  
  A spokesperson for Chicago’s Mount Sinai Hospital confirmed to CNN that the woman involved in the shooting with federal agents was treated and released.
  
  Law enforcement also deployed gas canisters at the protesters, according to footage from Reuters. The footage shows protesters screaming, running, and shielding themselves. “This is Brighton Park, this is not a war zone,” one woman told a journalist.
  
  Noem says Department of War is coming to Chicago
  
  No officers were seriously hurt in the incident, said McLaughlin, who also accused local police in Chicago of leaving the scene.
  
  “Pritzker’s Chicago Police Department is leaving the shooting scene and refuses to assist us in securing the area,” McLaughlin said. “There is a growing crowd and we are deploying special operations to control the scene.”
  
  The Chicago Police Department said they “responded to the scene to document the incident” and “maintain safety and traffic control for all living and working in the area,” but aren’t involved in the investigation.
  
  The incident follows protests across Chicago sparked by a large-scale immigration enforcement campaign dubbed “The Midway Blitz Operation” by DHS. Demonstrations have concentrated on the Broadview Immigration and Customs Enforcement facility near Chicago. Homeland Security Secretary Kristi Noem spent part of Friday on the rooftop of the controversial facility, surrounded byarmed agents and a camera crew, according to CNN affiliate WLS.
  
  The campaign has included amassive overnight raidcarried out by federal authorities at a Chicago apartment building earlier this week, which triggered condemnation from Democratic lawmakers and terrified residents. One neighbor called the raid a military-style “invasion” and described seeing a Black Hawk helicopter overhead.
  
  Adults and children alike were pulled from their apartments, crying and screaming during the raid, which led to the arrests of 37 undocumented immigrants. US citizens were arrested too, and immigrant parents were separated from their US citizen children, who were taken into custody by DHS.
  
  As protests grew against the immigration enforcement action, law enforcement has used force and tear gas against demonstrators, including lawmakers.
  
  Daniel Biss, the mayor of Evanston, Illinois, who is also running for Congress, said he was teargassed at a protest outside Broadview andcalled the experience“terrifying.” Kat Abughazaleh, a former journalist alsorunning for Congress, was pushed to the ground by a federal law enforcement agent in a camouflage uniform wearing a full facecovering, sunglasses and a helmet during the same protest, video byCNN affiliate WBBMshowed.
  
  After a protest Friday, Chicago Alderperson Jessie Fuentes said she was handcuffed in a hospital emergency room during a confrontation with two men, whom he said were ICE agents. Neither were wearing badges.
  
  At a protest outside Broadview Saturday, five people were arrested, according to the Cook County Sheriff’s Office. All were arrested by Illinois State Police for “resisting/obstruction,” the sheriff’s office told CNN.
  
  Trump deploys National Guard to stop LA immigration protests, defying California’s governor. Why experts call the move dangerous
  
  On Saturday, the White House announced the president had authorized 300 members of the Illinois National Guard to “protect federal officers and assets” in Chicago, a move President Donald Trump has been promising for weeks.
  
  “Amidst ongoing violent riots and lawlessness, that local leaders like Pritzker have refused to step in to quell, President Trump has authorized 300 national guardsmen to protect federal officers and assets,” White House spokeswoman Abigail Jackson told CNN. “President Trump will not turn a blind eye to the lawlessness plaguing American cities.”
  
  US Senate Democratic Whip Dick Durbin, ranking member of the Senate Judiciary Committee, decried the move, saying, “Terrorizing families with midnight raids and military troops in our streets is writing a shameful chapter in our nation’s history” in a statement.
  
  “This President is not intent on fighting crime. He is intent on spreading fear.”
  
  It is a strategy the presidentfirst executed in Los Angeles and Washington, DC, and is now vowing to repeat in other Democrat-led cities across the country – whether local lawmakers agree or not. Before the president deployed National Guard troops to quell anti-ICE protests in Los Angeles, ithad been over half a centurysince a president federalized National Guard troops against the wishes of a state’s governor.
  
  Pritzker said he will not call up the National Guard and criticized federal immigration agents’ operations in the city, saying they aresowing fearinstead of providing safety.
  
  Before the deployment was officially announced, Pritzker said, “This morning, the Trump Administration’s Department of War gave me an ultimatum: call up your troops, or we will. It is absolutely outrageous and un-American to demand a Governor send military troops within our own borders and against our will.”
  
  Following the shooting, Department of Homeland Security Secretary Kristi Noem said she is sending “more special operations” to the scene. DHS declined to clarify what groups the “special operations” deployment would entail, citing safety concerns. CNN has reached out to the White House for comment.
  
  Where things stand in Portland and Chicago as Trump officials promise imminent National Guard deployments
  
  “Today in Chicago, members of our brave law enforcement were attacked—rammed and boxed in by ten vehicles, including an attacker with a semi-automatic weapon. I am deploying more special operations to control the scene. Reinforcements are on their way. If you see a law enforcement officer today, thank them,” Noemposted on X.
  
  In response to the incident and others in Chicago, the FBIsaidit and its federal partners will “continue to aggressively pursue charges and investigate violence against officers, obstruction of justice, and destruction of federal property.”
  
  Correction: An earlier version of this story misidentified Chicago’s Brighton Park neighborhood.
  
  This story has been updated with additional information.
