title: "Scientists reconstruct 10,500-year-old woman’s face using DNA"
date: "2025-06-19"
section: "Science"
url: "https://www.cnn.com/2025/06/19/science/10500-year-woman-facial-reconstruction-intl-scli?cid=external-feeds_iluminar_msn"
content: |
