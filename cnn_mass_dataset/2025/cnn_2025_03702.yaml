  👋Welcome to 5 Things PM!Cancer rates in young people are growing.These five thingscan help you stay ahead of the curve.
  
  Here’s what else you might have missed during your busy day.
  
  “Good morning, my fellow federal furloughed employees!” That’s the start of many TikToks posted by workers now two weeks into the government shutdown. Many have been chronicling their experiences to educate and possibly earn someextra cash.
  
  Wrapped in a towel, barely stirring, but slightly breathing, a newborn had been buried beneath a foot of earth in a north Indian village. In the world’s most populous nation,her gender may have been the reason.
  
  MIT, Brown and the University of Pennsylvania have declined an offer from the Trump administration to join a compact that could link federal funding to changes in school policy. A letter outlining the proposal was sent to nine institutionsearlier this month.
  
  For the first time in over a century, you can experiencePierre-Auguste Renoir’s rarely seen drawings. The major traveling exhibition features more than 100 works, offering a fresh look at the French Impressionist’s quieter, more intimate side.
  
  After the sentencing of Susan Lorincz — the White woman who fatally shot her Black neighbor, Ajike “AJ” Owens, through an apartment door in a dispute over Ownes’ children playing near her home — the victim’s mother said her family could finallystart to heal. Now, they’re channeling their trauma into hope, prevention and support for others affected by gun violence.
  
  🤼‍♂️ Sumos in London:These storied Japanese wrestlers are heading to England. The capital is hosting a top-tier tournament for thesecond time ever.
  
  🛐 Shrine in the sky:If ancient walls could speak, the Sümela Monastery would have countless stories to tell. Dramaticallyperched on a cliffside, this gravity-defying marvel has weathered the rise and fall of empires. But its survival was nearly cut short — by unwelcome guests.
  
