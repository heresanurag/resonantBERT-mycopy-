title: "A failed Soviet-era spacecraft likely crashed back to Earth overnight"
date: "2025-05-09"
section: "Science"
url: "https://www.cnn.com/2025/05/09/science/soviet-spacecraft-crash-kosmos-482"
content: |
  Sign up forCNN’s Wonder Theory science newsletter. Explore the universe with news on fascinating discoveries, scientific advancements and more.
  
  A Soviet-era spacecraft that was designed to make a soft landing onVenus— but instead remained trapped in Earth orbit for decades — likely fell from the sky early Saturday morning, according to the European Space Agency.
  
  The object, referred to as Cosmos 482 or Kosmos 482, is believed to be a capsule launched by the Soviet Union in March 1972 that failed en route to a transfer orbit that would have taken it to Venus to study its environment. The probe entered the dense layers of the atmosphere around 9:24 a.m. Moscow time (2:24 a.m. ET) Saturday, splashing down in the Indian Ocean west of Jakarta, Indonesia, according to the Russian space agency,Roscosmos.
  
  The ESA, which was one of several organizations using ground sensors to keep tabs on the falling space junk, also said on itswebsitethat the vehicle was not spotted by radars in Germany around 7:32 UT (3:32 a.m. ET), indicating, “it is most likely that the reentry has already occurred.”
  
  In the decades since it was launched, Cosmos 482 circled Earth aimlessly as it was slowly dragged back toward home.
  
  Astronomers and space traffic experts have had their eyes on the object for years now as its orbital path slowly reached lower and lower altitudes, a result of the subtle atmospheric drag that exists even hundreds of miles away from Earth.
  
  The cylinder-shaped craft is about 3 feet (1 meter) in diameter.
  
  What is ‘Kessler Syndrome’ — and why do some scientists think the space disaster scenario has already started?
  
  Because the spacecraft no longer had the ability to maneuver, it was destined to undergo what space traffic experts refer to as an uncontrolled reentry — plunging back to Earth in a manner that can be extremely difficult to accurately forecast. The sheer complexity of spaceflight and unpredictable factors, such as space weather, complicate efforts to pinpoint exactly when or where an object will fall out of orbit.
  
  This particular piece of space junk did not pose a substantial risk to people on the ground, experts told CNN. But it garnered international attention because of Cosmos 482’s unique history.
  
  “This object was designed to survive reentering Venus, so there’s fair odds that it’ll survive coming back (to Earth) in one piece,” said Marlon Sorge, a space debris expert with The Aerospace Corporation, on Monday. “That actually makes the risk less … because it would stay intact.”
  
  Often, when spaceborne garbage hurtles back toward Earth, objects such as defunct rocket parts are torn apart by the jarring physics as they can slam into Earth’s thick inner atmosphere while still traveling at more than 17,000 miles per hour (27,000 kilometers per hour).
  
  Each of the pieces from the rocket part can then pose a threat to the area where it lands.
  
  But Cosmos 482 was well suited to make the trip home in one piece. The spacecraft had a substantial heat shield that protected the vehicle from the intense temperatures and pressures that can build up during reentry.
  
  And because Cosmos 482 was designed to reach the surface of Venus — where the atmosphere is 90 times denser than Earth’s — the probe likely remained intact.
  
  The Soviet Union’s Space Research Institute, or IKI, ran a groundbreaking Venus exploration program amid the 20th century space race.
  
  Venera, as the program was called, sent a series of probes toward Venus in the 1970s and ’80s, with several spacecraft surviving the trip and beaming data back to Earth before ceasing operations.
  
  ‘Possibility of a catastrophic failure’: Inside the space station leak problem that has NASA worried
  
  Of the two Venera vehicles that were launched in 1972  , however, only one made it to Venus.
  
  The other, a spacecraft sometimes cataloged asV-71 No. 671, did not. And that’s why researchers believed that Cosmos 482 was the failed Venera vehicle. (Beginning in the 1960s, Soviet vehicles left in Earth orbit were each given the Cosmos name and a numerical designation for tracking purposes, according toNASA.)
  
  While a landing on dry ground was unlikely, it wasn’t impossible. The Cosmos 482 object’s trajectory showed it couldhave landedwithin a broad swath of land that includes “the whole of Africa, South America, Australia, the USA, parts of Canada, parts of Europe, and parts of Asia,” said Marco Langbroek, a lecturer and space traffic expert at Delft Technical University in the Netherlands, via email.
  
  Sorge emphasized that if Cosmos 482 had landed on dry ground, onlookers would have been advised to keep their distance. The aged spacecraft could leak dangerous fuels or pose other risks to people and property.
  
  “Contact the authorities,” Sorge urged. “Please don’t mess with it.”
  
  Legally speaking, the object also belongs to Russia. According to rules mapped out in the1967 Outer Space Treaty— which remains the primary document underpinning international law on the matter — the nation that launched an object to space retains ownership and responsibility for it even if it crashes back to Earth decades after launch.
  
  Though defunct objects in space routinely fall out of orbit, most pieces of debris disintegrate entirely during the reentry process.
  
  But the world is in the midst of a new space race, with commercial companies such as SpaceX launching hundreds of new satellites to orbit each year. That burst in activity has raised alarms across the space traffic community, as experts are seeking to ensure that objects don’t collide in space or pose a risk to humans if they make an uncontrolled descent back home.
  
