  The SBU said Malyuk had also overseen Tuesday’s attack.
  
  “God loves the Trinity, and the SBU always sees things through to the end and never does the same thing twice. We previously struck the Crimean Bridge twice, in 2022 and 2023. So today we continued this tradition, this time underwater,” Malyuk said.
  
  He stressed that the bridge is a “completely legitimate target,” since Russia uses it “as a logistical artery to supply its troops” fighting in mainland Ukraine.
  
  As well as serving as a vital supply line for Moscow’s troops, the Crimean Bridge also has huge symbolic value for PresidentVladimir Putin, embodying his objective to bind the Ukrainian peninsula to Russia.
  
  Built after Russia’s annexation of Crimea in 2014, Putin opened the bridge in 2018. The project cost around $3.7 billion.
  
  Tuesday’s attack marks the third time that Ukraine has targeted the bridge since Moscow’s full-scale invasion in 2022. In October of that year, a fuel truck exploded on the bridge, engulfing a part of it in flames. In July 2023, the SBU said it hadblown up a part of the bridge using an experimental sea drone. Both times, Russia moved quickly to repair the damaged sections.
  
  As well as suspending traffic on the bridge, Russian authorities temporarilyhalted maritime traffic in the waters off Sevastopol, the largest city in Crimea, according to state media RIA Novosti.
