  Naroditsky also carved out huge followings on his online platforms, garnering nearly half a million subscribers onhis YouTube channeland 340,000 followers onTwitch. His online presence brought the game to life for many, as he livestreamed games and guided viewers through key moves, making even the most complex plays approachable.
  
  “Hop into my stream for great chess, good tunes, and an amazing community!!” Naroditsky wrote in his Twitch profile.
  
  TheInternational Chess Federationposted a statement mourning Naroditsky’s death, praising him “a talented chess player, commentator, and educator.”
  
  The 2025 US Chess Championship, currently taking place in St. Louis, opened Monday with a moment of silence for Naroditsky, according toChess.com.
  
  TheSaint Louis Chess Clubcalled Naroditsky “a beloved pillar of the chess community” whose “passion for the game and commitment to teaching inspried countless players around the world.”
  
  Naroditsky’s family has asked for privacy in the wake of his death, according to the statement posted by the Charlotte Chess Center.
  
  “Let us remember Daniel for his passion for chess, and for the joy and inspiration he brought to us all every day,” the family said in the statement.
