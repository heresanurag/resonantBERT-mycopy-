title: "Rockefeller Center Christmas tree arrives in Manhattan, kicking off New York’s holiday season"
date: "2025-11-09"
section: "US"
url: "https://www.cnn.com/2025/11/09/us/new-york-rockefeller-center-christmas-tree?cid=external-feeds_iluminar_flipboard"
content: |
  TheRockefeller Center Christmas treewas hoisted aloft at its new home in Manhattan on Saturday, marking the start of New York City’s holiday season.
  
  This year’s tree is a 75-foot-tall Norway spruce from the upstate town of East Greenbush, a suburb of Albany. After being cut down this week, it made the roughly 150-mile journey southon a flatbed truck, drawing curious onlookers along the way.
  
  The crowds were much bigger at 30 Rockefeller Plaza, where workers used cranes to hoist the 11-ton tree into position overlooking the iconic skating rink. People gathered with coffee cups and phones as crews secured the spruce and began the careful process of stabilizing it.
  
  The tree will soon be decorated with more than 50,000 multicolored, energy-efficient LED lights and crowned with a Swarovski star weighing 900 pounds.
  
  It will be lit December 3 during a live TV broadcast hosted by country music star Reba McEntire and remain on display until mid-January, after which it will be milled into lumber for use by the affordable housing nonprofit Habitat for Humanity.
  
  The tree was donated by homeowner Judy Russ and her family. She said it was planted by her husband’s great-grandparents in the 1920s.
  
  “For this to now become the center of New York City Christmas is incredible,” Russ told theradio station 1010 WINS.
  
  The first Rockefeller Center Christmas tree was put up by workers in 1931 to raise spirits during the Great Depression. The comparatively modest 20-foot balsam fir was outfitted with garlands handmade by the workers’ families.
  
  The tradition stuck as the first tree-lighting ceremony was held in 1933.
