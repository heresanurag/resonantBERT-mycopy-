title: "Yemen’s Houthis say prime minister of rebel-controlled government killed in Israeli airstrike"
date: "2025-08-30"
section: "Middle East"
url: "https://www.cnn.com/2025/08/30/middleeast/yemen-houthis-prime-minister-israel-intl?iid=cnn_buildContentRecirc_end_recirc&recs_exp=most-read-article-end&tenant_id=popular.en"
content: |
  Yemen’sHouthi rebels on Saturday vowed to take revenge for the killing of their prime minister and other political leaders by Israeli airstrikes earlier this week.
  
  The Houthis confirmed Prime Minister Ahmed al-Rahawi was killed in a strike on the Yemeni capital Sanaa on Thursday, which also left others seriously wounded.
  
  Mahdi al-Mashat, head of the Houthis’ Supreme Political Council, said in a video statement, “We promise to God, to the dear Yemeni people and the families of the martyrs and wounded that we will take revenge and we will turn the wounds into a victory.”
  
  Al-Rahawi is the most senior figure in the Iran-backed Houthis to be killed in Israeli’s campaign against the group.
  
  The ministers were targeted during “a routine workshop held by the government to evaluate its activity and performance over the past year,” the group said in a statement carried on Houthi-run television.
  
  The gathering of top Houthi officials, reportedly to watch a speech by the group’s secretive leader, appears to have been a prime opportunity for Israel to target the Iran-backed rebels leaders in one operation.
  
  The Houthi Minister of Defense, Maj. Gen. Mohammad Nasser al-Atifi, said the Houthis are ready “at all levels to confront the US-backed Zionist enemy” in a statement carried on Houthi-run television soon after the news was announced.
  
  The assassination strike was also confirmed by Israel’s Defense Minister Israel Katz on Saturday. Katz said in a statement that the Israeli military had struck an “unprecedented knockout blow” to Houthi leadership.
  
  “The Houthi Prime Minister, most of his ministers, and other senior officials were eliminated and injured,” Katz claimed. “I warned that after the ‘plague of darkness’ would come the ‘plague of the firstborn’ — and now we have carried out that warning,” Katz added.
  
  The Houthis have been targeting Red Sea shipping in solidarity with Palestinians following the October 7 attacks, and have fired a number of missiles at Israel, most of which have been intercepted.
  
  Since the start of the war in Gaza nearly two years ago, Israel has used its robust intelligence advantage to eliminate the leaders of Iran’s closest proxies in the Middle East.
  
  Last year, Israel assassinated Hamas’ political leader, Ismail Haniyeh in the Iranian capital of Tehran. Two months later, Israel killed Hezbollah leader Hassan Nasrallah in an airstrike in Beirut.
  
  Last October, Israeli forces in Gaza killed Hamas leader Yahya Sinwar in Gaza. Seven months later, Israeli Prime Minister Benjamin Netanyahu said that Sinwar’s brotherMohammed Sinwarhas also “probably” been killed. Hamas appeared to confirm Mohammed Sinwar’s death on Saturday, publishing his face in a photo collage memorializing leaders killed by Israel, though it later edited the post to remove him from the list.
  
  In December, Defense Minister Israel Katz publicly threatened that Israel would go after the Houthi’s top leaders as well.
  
  “We will hit the strategic infrastructures of the Houthi terrorist organization and we will behead its leaders - just like we did to Haniyeh, Sinwar, and Nasrallah - in Tehran, Gaza, and Lebanon. This is what we will do in Hodeida and Sanaa as well,” he said.
  
