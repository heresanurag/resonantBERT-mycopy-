  Thursday’s strike marks the first time Israel has successfully targeted Houthi leadership.
  
  In the past, Israel has largely attacked military targets in Yemen and civilian infrastructure that the Israeli military says is being used by the Houthis.
  
  In an indication that Israel may have been shifting its strategy, the Israeli air force struck a military base on which the presidential palace is located. The Air Force also attacked two power plants and a fuel storage site.
  
  The Houthis control much of northern Yemen, having stormed Sanaa in 2014 and ousted the internationally recognized government. Since then a Saudi-backed coalition has been unable to dislodge the Houthis, who have further consolidated their power.
  
  This story has been updated with additional information.
