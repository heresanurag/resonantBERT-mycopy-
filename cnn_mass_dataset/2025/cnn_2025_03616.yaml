title: "Elon Musk just made his starkest political threat since the election"
date: "2025-06-30"
section: "Media"
url: "https://www.cnn.com/2025/06/30/media/elon-musk-bill-primary-threat?ref=america2.news"
content: |
  After declaring he was stepping away from the political spotlight, Elon Musk got right back in it.
  
  As the Senate debated President Donald Trump’s “Big, Beautiful Bill” on Monday before a final vote, Musk issued a stark warning via his social media platform X.
  
  “Every member of Congress who campaigned on reducing government spending and then immediately voted for the biggest debt increase in history should hang their head in shame! And they will lose their primary next year if it is the last thing I do on this Earth,” hewrote.
  
  A few hours later he went further,declaringon X thatif the “insane spending bill passes, the America Party will be formed the next day.”
  
  “Our country needs an alternative to the Democrat-Republican uniparty so that the people actually have a VOICE,” he wrote.
  
  In a late-night post on social media, Trump hit back against Musk and threatened to direct the Department of Government Efficiency (DOGE) against the tech billionaire.
  
  “Elon may get more subsidy than any human being in history, by far, and without subsidies, Elon would probably have to close up shop and head back home to South Africa. No more Rocket launches, Satellites, or Electric Car Production, and our Country would save a FORTUNE. Perhaps we should have DOGE take a good, hard, look at this? BIG MONEY TO BE SAVED!!!” Trump wrote on hisTruth Social.
  
  For weeks, Musk has railed against Trump’s policy bill, leading to a very public and ugly fight withTrump earlierthis month. In a flurry of X posts several weeks ago, Musk had proposed starting a new political party.
  
  That proposal resurfaced on Monday, when Musksaid: “It is obvious with the insane spending of this bill, which increases the debt ceiling by a record FIVE TRILLION DOLLARS that we live in a one-party country – the PORKY PIG PARTY!! Time for a new political party that actually cares about the people.”
  
  Musk’s resolution to support candidates who plan to launch primary campaigns against members of Congress is one of Musk’s most concrete political threats since leaving his post as a White House adviser. Musk spent more than $275 million to support Trump and other Republican candidates in the 2024 election. In late May he said in an interview he was planning to cut back on political spending, saying he has “done enough.”
  
  How the feud between Elon Musk and Donald Trump exploded over 72 hours
  
  According to Federal Election Commission filings, Musk’s political action committee, America PAC, last gave money in March to support two Republican candidates running in special elections in Florida – Randy Fine and Jimmy Patronis.
  
  Musk has long supported closed borders, deportations and stopping illegal immigration, in line with the Trump administration.
  
  But the domestic policy bill has appeared to trigger a rift between the Tesla CEO and the White House. Musk has argued that the Republican policy bill will increase the debt, calling it “debt slavery.”
  
  The Senate bill would addnearly $3.3 trillion to the deficitover the next decade, according to a Congressional Budget Office estimate released Sunday. The Senate legislation costs more than the House-approved bill, which would add $2.4 trillion to the deficit over the next decade.
  
  The Senate package contains deeper tax cuts,fewer spending cuts and provisions that would raise revenue. The White House hasarguedthe bill “slashes deficits” and the debt, while “unleashing economic growth.”
  
  The Trump administration and certain Senate Republicans are opting not to include the cost of extending the 2017 Trump tax cuts in their calculations of the bill’s impact on the federal deficit.
  
  Though Musk has said the loss of electric vehicle (EV) and solar energy subsidies and credits in the bill are not why he opposes the legislation, he hascomplainedthe bill “gives handouts to industries of the past while severely damaging industries of the future.”
  
  In his post on Truth Social, Trump defended his position against EV mandates, writing: “Elon Musk knew, long before he so strongly Endorsed me for President, that I was strongly against the EV Mandate. It is ridiculous, and was always a major part of my campaign. Electric cars are fine, but not everyone should be forced to own one.”
