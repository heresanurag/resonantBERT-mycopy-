title: "Nike is raising prices – and returning to Amazon"
date: "2025-05-22"
section: "Business"
url: "https://www.cnn.com/2025/05/22/business/nike-amazon-price-hikes"
content: |
  Nike is returning to Amazon after an absence of more than five years and hiking prices on some products as its new CEO works to reverse a revenue slump.
  
  The apparel brand announced in 2019 that it wouldpull its products from Amazonin the United States, focusing on sales on its own website and a limited number of third-party retailers. However, Nike’ssales have dropped in recent yearsand the company is now searching for new avenues of growth.
  
  “Nike is investing in our marketplace to ensure we’re offering the right products, best services and tailored experiences to consumers wherever and however they choose to shop,” the company said in a statement.
  
  In addition to returning to Amazon in the United States, Nike is adding new retailer partners, such as Printemps, a French department store that recently opened its first US location in New York. Nike also said it was working to elevate “retail experiences,” a likely reference to anew concept storeit debuted with Urban Outfitters this week that sells Nike shoes and targets Gen Z shoppers.
  
  Nike’s price hikes, meanwhile, will kick in on June 1. The company didn’t mention higher US tariffs as the reason, but said in its statement that “we regularly evaluate our business and make pricing adjustments as part of our seasonal planning.”
  
  Various pieces of Nike apparel and equipment will increase in price by as much as $10.Shoes priced between $100 and $150 will get a $5 increase and shoes above $150 will see increases up to $10, according to a source familiar with the decision.
  
  However, several items won’t get a price increase, including children’s apparel and footwear, products priced under $100, Air Force 1 shoes and Michael Jordan-branded clothing and accessories, the source added.
  
  Nike sales have suffered as competition from rivals like On, New Balance and Adidas has heated up. The company’s global sales dropped 9% last quarter, including a 17% drop in China, Nike said in its most recent earnings report.
  
  The company is also trying to recover from strategy mistakes. It is scalingback the supplyof its classic sneaker lines Air Force 1 and Pegasus to juice demand in order to sell the sneakers at full prices. Nike also wants to push shoppers to buy new, higher-priced Air Max shoes, designed for running.
  
  Last year, Nike named Elliott Hill, who had previously worked at the company, its new CEO. One of his biggest deals so far isinking a collaboration with Kim Kardashian’s brand Skimsfor a new activewear line, which was due to be rolled out this spring.
  
  Shares of Nike (NKE) have fallen nearly 20% for the year.
