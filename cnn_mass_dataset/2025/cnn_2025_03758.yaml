title: "Why a drink called Feel Free has many saying they’re trapped in addiction, debt and rehab"
date: "2025-08-26"
section: "Health"
url: "https://www.cnn.com/2025/08/26/health/feel-free-drink-kratom-kava-addictive-wellness"
content: |
  EDITOR’S NOTE:If you or someone you know is struggling with substance abuse, you can call the US Substance Abuse and Mental Health Services Administration’s National Helpline at 1-800-662-HELP (4357) and findmore resources here.
  
  Jasmine Adeoye drove from gas station to gas station in the fall of 2023, embarrassed about her frequent purchases of a popular herbal drink called Feel Free Classic. The product claims to be a plant-based wellness supplement supporting “relaxation, productivity and focus,” but Adeoye said she had become addicted — finding herself in thousands of dollars of debt, lying to loved ones, experiencing health problems and nearly losing her job.
  
  In the five years since Feel Free Classic’s manufacturer, Botanic Tonics, started selling it, manyusers have reportedmoderate to severe symptoms of addiction to, and withdrawal from, the beverage. And while the drink is sold in a 2-ounce bottle, the label says half that is a serving size, recommends consuming no more than one bottle within 24 hours and warns the product can be “habit-forming.”
  
  The product, which ranges in cost from $8 to $13, is now sold at more than 24,000 gas stations, smoke shops, and convenience, grocery and health food stores nationwide, according to the company website. Along the way, the company has been embroiled ina class-action lawsuitin which it did not admit to any wrongdoing but agreed to settle in 2024, an action awaiting final approval by a judge. The manufacturer has also changed its labels to better reflect potential dangers. But Botanic Tonics maintains Feel Free is safe.
  
  No longer drinking? There are options for you
  
  Adeoye thought Feel Free “sounded like a godsend” when she first heard about it ona popular podcastmore than a year before she started spiraling. The hosts promoted the drink as a kava-based alcohol alternative, claiming it made them feel great and creative.
  
  Kava is a beverage or extracttypically made fromthe root of the pepper plant Piper methysticum in the South Pacific islands. The drink isknown for itsmild euphoria and depressant effects. Depending on consumption levels, people can develop physical tolerance and thus experience withdrawal, said Dr. Oliver Grundmann, a leading kratom researcher and clinical professor in the department of medicinal chemistry at the University of Florida. But kava is generallynot considered addictive.
  
  Another key active ingredient in Feel Free is the herb kratom, made from the leaves ofa tropical treescientifically known as Mitragyna speciosa and native to Southeast Asia. Kratom has both stimulant and sedative effects, according to the US Food and Drug Administration. Sold as a supplement in various forms — including powders, loose-leaf teas, capsules, tablets and concentrates — kratom carries risk for addiction due to how it interacts with the brain, Grundmann said.
  
  Adeoye had recently finally given up her nearly decade-long habit of “fun” social binge drinking, which she also used todrown out her insecurityand loneliness. The night before a work trip, knowing everyone else on the trip would be drinking alcohol, she tried her first bottle of Feel Free. It made her feel dizzy and nauseated, so she didn’t finish the bottle.
  
  But Adeoye kept hearing glowing health testimonies about Feel Free on social media. A few months later she tried it again, this time feeling the promised euphoria. “You feel more interested in things you normally wouldn’t find that interesting, energetic, super social, etc.,” she said. “It helped me tolerate a difficult work environment more.”
  
  Ashamed and confused, Adeoye said she often felt if she were to seek help, people wouldn’t understand why she was hooked on something that seemed like a wellness supplement. Now 30 and based in Austin, Texas, she said she would “wake up in the middle of the night sometimes and have to take one because I would feel the withdrawals kicking in.”
  
  Kratom use in the United States began in the late 1990s but has become popular in the past decade, Grundmann said. The FDA hascalled kratom an opioidand firmly discouraged people from consuming it, but the herb isn’t federally regulated and thus isn’t “lawfully marketed in the U.S. as a drug product, a dietary supplement, or a food additive in conventional food.” Kratom is regulated in at least 24 states, though, and has been bannedin Washington, DC, andseven of those states— including Alabama, Louisiana, Rhode Island and Vermont.
  
  How do teens quit vaping? Some simply send a text for help, new study shows
  
  In states that haven’t banned kratom or set age limits for purchasing it from brick-and-mortar stores, minors can buy it. Grundmann has coauthoredreviews of kratom usein the US that found that it’s currently consumed by at least nearly 2 million Americans.
  
  Some people with opioid use disorder use kratom as a potentiallyless harmful alternativeor a way to manage withdrawal symptoms after quitting opioids, Grundmann said, despite insufficient scientific evidence for those uses. Others self-treat chronic pain with kratom. Some people use kratom to try to relieve depression, anxiety or post-traumatic stress disorder, or to achieve a relaxing high. In Southeast Asia, “there’s a history of kratom being used as a substitute when opium, morphine and heroin were not available,” Grundmann added.
  
  Some clinically documented addictions to kratom have ranged from mild to moderate based on how many ofthe 11 official criteriaforsubstance use disorderparticipants met, according to research by Dr. Kirsten Smith, another leading kratom researcher and an assistant professor in the department of psychiatry and behavioral sciences at the Johns Hopkins University School of Medicine in Maryland. Two tothree criteria metdenotes mild substance use disorder, and four to five is moderate.
  
  In a 2024 study, Smith and Grundmannfound ingesting kratommore than three times daily increased the risk of dependency. But some users of Feel Free report online having felt slightly hooked after a short period of drinking just one bottle daily.
  
  Adeoye’s intake, over the course of a year and a half, gradually increased from one bottle per week to anywhere from nine to 12 bottles per day. (Similar to the product label, the Feel Free website discourages people from drinking more than one bottle, which contains two servings, on a daily basis.)
  
  “I was throwing up a lot, multiple times a day when the addiction was at its worst. I could feel big holes in two of my teeth,” Adeoye said. “I was spending well over $100 a day on them. And people ask, ‘How did you afford that?’”
  
  ‘Chroming’ is killing some kids. Experts explain this trend
  
  By “digging myself into a hole financially,” she said. While foregoing some groceries and social activities, Adeoye also amassed $12,000 worth of credit card debt and took out a same-day cash loan for $3,500.
  
  Kratom leaves havemore than 40 alkaloids. Alkaloids, which naturally occur in plants, are organic compounds that contain nitrogen and may have pronounced physiological effects on humans. Morphine and caffeine are alkaloids. The most abundant of the psychoactive alkaloids in kratom are mitragynine and speciociliatine, Smith said.
  
  In the body, mitragynine metabolizes into 7-hydroxymitragynine, an alkaloid commonly known as 7-OH. That same alkaloid is also present in kratom products as a result of the drying part of the manufacturing process, Grundmann said. The 7-OH is typically1% to 2%or less of the total content of leaf kratom products and some extracts.
  
  Mitragynine and 7-OH are the most studied and discussed kratom alkaloids, Smith said. Those compounds and speciociliatine can bind to the brain’smu opioid receptors, which help regulate pain, breathing, gastrointestinal activity and more. That binding, along with effects similar to opioid drugs such as heroin, fentanyl or oxycodone, leads some experts to refer to kratom as an opioid. But the alkaloids may not fit the receptors as well or bind to them as tightly as typical opioids do, so they may have a weaker biological effect than those drugs.
  
  Some case reports show that kratom overdoses have been responsive to naloxone, the opioid overdose antidote, said psychiatrist Dr. Lief Fenno, chairman of the American Psychiatric Association’s Council on Addiction Psychiatry. But kratom largely hasn’t been associated with respiratory depression that comes with overdoses on traditional opioid drugs.
  
  There were reports ofat least 91 deathsinvolving kratom from 2016 to 2017 and anincrease in callsto US poison control centers about kratom exposures: from 13 calls in 2011 to 682 in 2017. The actual numbers are likely higher given insufficient testing, Fenno said.
  
  J.W. Ross created Feel Free in 2020, after “a few life-changing trips to the South Pacific and Southeast Asia where I discovered powerful ancient plants,” he saidin a statementon the company’s website. “I was inspired to create herbal solutions to help me feel my best every day.”
  
  Ross hasalso publicly saidthat his past struggle with alcoholism and subsequent sobriety helped drive him to invent the tonic. (CNN has made multiple attempts to contact Ross for comment. A representative for Botanic Tonics declined to comment on Ross’ personal details as Ross is no longer affiliated with the daily activities of the business.)
  
  Ross, who had previously worked in the oil and gas industry in Oklahoma, served time in federal prison from 2011 to 2014 for “making a false Sarbanes-Oxley certification to the Securities & Exchange Commission (SEC) by failing to disclose his diversion of millions in corporate funds” for personal use, according to theFederal Bureau of Investigationand federal court documents CNN reviewed.
  
