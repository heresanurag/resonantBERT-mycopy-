  At that time, Ross’ legal name was Jerry Cash. His early prison release resulted from his informing on an extremist group’s plan to harm a judge, which led to a legal identity change sealed by the federal government, accordingto Ross’ website. Since 2014, he has “lived as Jerry Ross” and J.W. Ross, according to the site.
  
  By the time Ross created Feel Free, kratom and its components had already been under scrutiny for their addictive potential. The US Drug Enforcement Administration hadannounced its intentin 2016 to classify mitragynine and 7-OH as schedule I substances on an emergency temporary basis. That’s the category the federal government usesfor illicit substanceswith “no currently accepted medical use and a high potential for abuse,” including heroin and LSD. The proposed rule followed reports of abuse of, and poisonings by, kratom from addiction treatment facilities, poison control centers and researchers.
  
  Before then, several states and 15 countries had already begun regulating or banning kratom. Butafter intense pushbackfrom members of Congress, advocacy groups, industry and others, the DEA withdrew its notice and instead listed kratom as a drug andchemical of concern. The FDA added its own finding in 2018 that kratom qualified as an opioid.
  
  Against this backdrop, Ross and Botanic Tonics released Feel Free. While the use of kava and kratom was listed on the bottle, its advertisements andproduct descriptions onlineoften focused solely on kava, saying Feel Free was made with “kava and other ancient plants … from the South Pacific and Southeast Asia.”
  
  The tonic’s popularity boomed over the next few years, with aesthetically pleasing marketing promoting the supplement as a healthy alcohol alternative. By 2023, it wasraking in an estimated $32 millionin revenue, according to Ross, and securing product partnershipswith athletic programsat three top universities.
  
  But the company ran into trouble in the form of aclass action lawsuitin March 2023. The plaintiffs partly alleged that Botanic Tonics had targeted people who had struggled with addiction in its social media advertising, and that “contrary to the marketing, Feel Free’s primary ingredient is not kava, but kratom.” Until some point in 2022,the product labelhad listed kava and kratom but not how much of each. It also wasn’t until then that Botanic Tonics added to the label a “note” about Feel Free’s potential to be habit-forming, despite a documented history of kratom carrying a risk of addiction. But that warning also implied Feel Free was no more habit-forming than caffeine, alcohol or sugar — a statement Adeoye, the woman from Texas, banked on.
  
  Then the United States Marshals Serviceseized nearly 250,000 bottlesof Feel Free in May 2023, acting on a complaint filed on behalf of the FDA, which alleged that there wasn’t enough data to deem kratom safe to use and “that dietary supplements containing kratom are adulterated under the Federal Food, Drug, and Cosmetic Act.” Botanic Tonics moved to dismiss the case that month. A representative for the US Department of Health and Human Services did not answer CNN’s question about the outcome of the seizure, and court documents show there has been no activity in the case for over a year and a half.
  
  The US Attorney’s Office for the Northern District of Oklahoma, where the complaint was filed, stated via email, “While investigations are still ongoing in this pending case, we won’t be able to offer a comment.”
  
  Botanic Tonics’ college partnerships also ended, a company spokesperson told CNN via email, and the company agreed to settle the lawsuit for $8.75 million in September 2024. Although the company denied the lawsuit allegations, ina news release, Botanic Tonics acknowledged “that its early marketing practices fell short of the high standards of transparency and consumer education that the company now champions.”
  
