title: "Megan Fox and Machine Gun Kelly welcome baby girl"
date: "2025-03-27"
section: "Entertainment"
url: "https://www.cnn.com/2025/03/27/entertainment/megan-fox-machine-gun-kelly-baby-girl?cid=external-feeds_iluminar_msn"
content: |
  Megan Foxand Machine Gun Kelly are parents to a new baby girl.
  
  The “Bad Things” singerannouncedthe news on his Instagram page on Thursday, writing in the caption that “she’s finally here!! our little celestial seed.”
  
  MGK did not reveal their daughter’s name but noted that her date of birth was March 27.
  
  In his post, he shared an accompanying short black-and-white clip of his daughter’s hand clasped onto his pointer finger.
  
  The pairannouncedthat they were expecting in November, when Fox posted photos showcasing her belly and a positive pregnancy test on her Instagram page.
  
  This marks Fox and Kelly’s first child together, but they are both already parents to children from previous relationships.
  
  Fox has three children – Noah, 12, Bodhi, 11, and Journey, 8 – with “90210” actor Brian Austin Green, to whom she was married between 2010 and 2020. The former couple brieflyreconciledbut finalized their divorce in 2022.
  
  Kelly shares daughter Casie Colson Baker, born in 2009, with his ex-girlfriend Emma Cannon.
  
  Fox and Kelly were first romantically linked in 2020 when Fox appeared in Kelly’s music video. They became engaged in 2022 butreportedlyended their engagement in 2024.
