title: "Federal judge extends order blocking Trump from deploying National Guard troops to Portland"
date: "2025-11-02"
section: "US"
url: "https://www.cnn.com/2025/11/02/us/portland-oregon-national-guard-ruling?Date=20251103"
content: |
  A judge has extended her order blocking President Donald Trump from deploying any National Guard troops to Portland, Oregon, until Friday – keeping soldiers in the city in limbo as the legal showdown over presidential power continues.
  
  US District Court Judge Karin Immergut’s decision on Sunday followed a three-day trial that saw arguments over whether the Trump administration violated the law by federalizing and trying to deploy Oregon and California troops to Portland.
  
  The legal saga over the balance of presidential and state power has seen numerous twists and turns as it unfolded in both the district court and before appeals judges.
  
  The ruling comes as the Trump administration faces challenges over its power to send National Guard troops into Democratic-led cities. A federal court last monthblocked the deploymentof National Guard troops in Chicago. And last week theSupreme Courttook the rare step of asking for additional briefing in that high-profile case.
  
  National Guard troops have been staging at Portland training bases for weeks while the legal case plays out, having been activated to protect federal officials and an Immigration and Customs Enforcement facility that has beenthe focal pointof daily protests since June.
  
  Federal attorneys have argued it’s within Trump’s presidential authority to respond to the daily protests outside the facility that have subjected the building and its agents to what it described as coordinated violence.
  
  But state and city attorneys called the move “one of the most significant infringements” on Oregon’s sovereignty in the state’s history and argued the Trump administration is dramatically misrepresenting the situation and risking inflaming tensions.
  
  Protest frogs vs. MAGA media influencers: the info war over ICE in Portland and Chicago
  
  The order from Immergut, aTrump appointeefrom his first term, says the federal government was unable to show the situation in Portland was out of control or federal officers were unable to do their jobs.
  
  “Based on the trial testimony, this Court finds no credible evidence that during the approximately two months before the President’s federalization order, protests grew out of control or involved more than isolated and sporadic instances of violent conduct that resulted in no serious injuries to federal personnel,” her order reads.
  
  Immergut preliminarilyruled the federal government’s deployment of the National Guard in Oregon exceeded its legal authority, violated the Tenth Amendment by infringing on state sovereignty, did not meet the legal definition of a “rebellion,” and caused ongoing constitutional harm that justified immediate judicial intervention.
  
  She noted the trial testimony “included evidence of sporadic isolated instances of violent behavior toward federal officers and property damage to a single building,” but those incidents do not appear to be backed by an “organized group engaged in armed hostilities for the purpose of overtaking an instrumentality of government by unlawful or antidemocratic means.”
  
  “The majority of violence that did occur during this time period involved violence between protesters and counter-protesters and isolated sporadic incidents of low-level unlawful conduct,” the order read.
  
  Oregon has argued federal agents used “disproportionate” force against demonstrators, introducing surveillance video at the trial to support the claim.
  
  One exhibit appeared to show an agent running into a protester at full speed from behind and knocking the person to the ground. The August 13 video, provided to CNN by the Oregon Department of Justice, did not show the protester interacting with agents or any provocation immediately before being hit.
  
  DHS denied any allegations of its officers using excessive force in Portland.
  
  “On August 13, DHS law enforcement made a targeted arrest of a dangerous rioter who previously evaded arrests. He has repeatedly assaulted law enforcement, throwing rocks and other objects at them, obstructed law enforcement by blocking the driveway, and refused to follow law enforcement commands outside the ICE facility in Portland. Law enforcement made the arrest from behind the rioter for their own safety in the case he was armed,” DHS said in a statement.
  
  Another video, from October 2, showed a protester who took a step across a line marking the ICE facility property immediately rushed by more than a dozen agents and taken into custody.
  
  “On October 2, as seen in the video the woman clearly trespasses on federal property and is attempting to (impede) law enforcement by blocking a federal driveway,” the DHS statement continued.
  
