  A government attorney argued attrialthat protesters have exhibited “disturbingly intrusive behavior” and organized violence.
  
  Nearly 250 arrests were made or citations issued against protesters at the ICE building between early June and mid-October, according to theFBIandPortland Police Bureau. It is not clear how many of those taken into custody have been charged with a crime.
  
  Meanwhile, a separateNinth Circuit Court of Appealsdecision allowing Trump to deploy the Oregon National Guard troops to Portland is being reconsidered “en banc” by a broader 11-judge panel.  That case revolves around a now-frozen second order from Immergut that blocked the deployment of troops from Oregon. A date for the hearing was not set.
  
  Appeals court will reconsider decision that allowed Trump to deploy National Guard troops to Portland
  
  While400 soldiersfrom Oregon and California together were federalized and sent to the greater Portland area, a Trump administration lawyersaidin a previous hearing before the Ninth Circuit that the administration didn’t plan to deploy more than 200.
  
  Oregon and Portland officials jointly sued on September 28 after Trump declared he was sending National Guard troops to the city, and Immergut’stwo temporary ordersblocking those efforts closely followed.
  
  Then, the three-judge Ninth Circuit panel on October 20 issued a stay on Immergut’s first restraining order — a ruling that could have paved the way for a deployment as the legal battle played out. But the decision to have a new set of appeals judges rehear the case meant that the Trump administration was still barred from deploying troops.
  
  The October trial Immergut presided over featured a surprising revelation: National Guard troops were on the ground at Portland’s ICE facility earlier last month even after the judge ordered them not to show up.
  
  Though Immergut filed her restraining order at 3:40 p.m. PT on October 4, Justice Department attorney Eric Hamilton told her as many as 10 soldiers were at the facility until midnight. Earlier, his colleague Jean Lin had said the troops were there until 2 a.m.
  
  Hamilton argued it took time to implement the order. “My clients were working to end the mission,” he added.
  
  A federal judge is poised to rule on the fate of the National Guard in Portland. Here’s what the trial revealed
  
  The trial also provided insight on what federal and National Guard officials knew – and didn’t know – when Trump called for hundreds of troops to protect the ICE facility.
  
  Top officials charged with the safety of the Portland ICE facility were not consulted before Trump ordered National Guard troops to Portland in September, a deputy regional director for the Federal Protective Service, identified in court by the initials R.C., said.
  
  Testifying in court, R.C. stated he and his boss, the FPS regional director, were “surprised” by the order, which they had learned about on the news.
  
  A fundamental disagreement from the trial was over how extreme the demonstrations were – and whether local law enforcement can handle them.
  
  State and city attorneys argued a simmering protest scene only ramped up after Trump ordered Guard troops to enter Portland in late September, and while there had been “sporadic and inexcusable crimes” along with peaceful protests, they were nothing existing law enforcement couldn’t handle.
  
  For months, the Trump administration has argued that federal agents face systematic disruption and assault from protesters which justifies a more forceful response.
  
  “It is a frequent occurrence for agitators to carry bats, improvised weapons and shields,” Hamilton told the court. Protesters have displayed “disturbingly intrusive behavior” and organized violence, he said.
  
  This story has been updated with additional information.
