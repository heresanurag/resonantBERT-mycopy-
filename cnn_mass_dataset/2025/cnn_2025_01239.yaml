title: "Country singer Pat Green shares his family suffered ‘heartbreaking loss’ after devastating Texas floods"
date: "2025-07-07"
section: "Entertainment"
url: "https://www.cnn.com/2025/07/07/entertainment/pat-green-texas-floods?iid=cnn_buildContentRecirc_end_recirc"
content: |
  Country singer Pat Green has shared that he and his family have “suffered a heartbreaking and deeply personal loss” as a result of thedevastating floodsthat hit central Texas over the weekend.
  
  Greenwrotein a statement posted to his Instagram on Monday that his family is “grieving alongside countless Texans whose lives have been upended by this tragedy.”
  
  “Right now, we kindly ask for privacy and space as we mourn, support each other, and begin to process what comes next for our family,” he wrote. “Thank you for your love, prayers, and compassion.”
  
  A representative for Green did not have further information to provide when reached by CNN for comment.
  
  In a separateposton Instagram, his wife, Kori Green, shared that Green’s brother John, his wife, Julia, and two of their children remain missing after being swept away in flooding in Kerrville, Texas.
  
  “We are heartbroken and anxiously waiting for all of them to be found. Thank you for your prayers,” she wrote.
  
  Green, a San Antonio-native, had previously postponed a scheduled concert he was set to perform on Saturday, writing in aposton his Facebook page that “due to the unforeseen weather and tragedy around the Texas Hill Country,” he decided to postpone the concert to a later date.
  
  “Our prayers go out to all the folks affected by the floods in the Texas Hill Country,” he added.
  
  Torrential downpour over several central Texas counties Thursday evening into Friday caused catastrophic flooding of the Guadalupe river, killing over 100 people as of Monday afternoon.
  
  Several counties across the region have been affected by the flooding, with Kerr County hit the hardest.
  
  This story has been updated with additional information.
