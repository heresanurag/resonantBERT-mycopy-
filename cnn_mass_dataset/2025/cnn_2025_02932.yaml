title: "5 takeaways from the new Epstein documents"
date: "2025-09-09"
section: "Politics"
url: "https://www.cnn.com/2025/09/09/politics/new-epstein-documents-takeaways?iid=cnn_buildContentRecirc_end_recirc&recs_exp=up-next-article-end&tenant_id=related.en"
content: |
  We gotmore Jeffrey Epstein documentsfrom the House Oversight Committee late Monday. And unlike last week, these actually contained some real news.
  
  The big news is that we finally are ableto see theletter signed in now-President Donald Trump’s namefor Epstein’s 50th birthday back in 2003, which the Wall Street Journal first reported back in July.
  
  Despite Trump’s claim that the lewd letter is a fake – he’s suing the Journal over the matter – two new factors appear tolend legitimacy to it. For one, it was turned over by Epstein’s estate, meaning it had apparently been in Epstein’s possession. For another, it features a “Donald” signature that seems to match contemporaneous documents circulating online from that period.
  
  But that’s not the only thing we learned from the documents themselves and the reactions.
  
  Below are some takeaways.
  
  Trump has made a series of seemingly bizarre statements and decisions vis-a-visEpstein.
  
  These include his administration’s sudden and abruptreversal on releasing the documents, hisfalsedenialthat Attorney General Pam Bondi had told him his name appeared in them, hisslow disclosureon Epstein having recruited a girl who worked at Mar-a-Lago, and a number ofeasily disproven claimsabout Epstein and his personal ties to him.
  
  But the letter, part of a collection of letters compiled into a “birthday book” for Epstein, is looking like it could be up there with the rest of them.
  
  We don’t know for certain that Trump wroteor signedthe letter. But as noted above, plenty of signs are pointing in that direction. Trump previously rested his denials on the false claim that he didn’t ever draw pictures (the letter includes a drawing of a female silhouette), when in fact there areplenty of Trump doodles in the public record.
  
  It’s all particularly weird given that the letter wouldn’t seem all that damning for Trump on its surface, next to everything else we know. We already knew he was buddies with Epstein in this period. We also knew he has demonstrated a tendency for lewd comments.
  
  It might never be proven that Trump himself drew the picture. And there remains no evidence Trump has done anything wrong.
  
  But we got more yet reason Monday night to questionhis relationship with Epstein and his handling of the matter.
  
  Another document in the “birthday book” section caught more than a few people’s attention and washighlighted by Democrats.
  
  It’s a letter with a photo of Epstein holding an oversized, novelty $22,500 check made to look like a payment from Trump to Epstein.
  
  “Jeffrey showing early talents with money + women!” the text reads. “Sells ‘fully depreciated’ [REDACTED] to Donald Trump for $22,500. … Even though I handled the deal I didn’t getany of the money on the girl!”
  
  The redacted portion appears to be a woman’s name.
  
  We don’t know the full context of the photo – CNN has reached out to the White House and those identified related to the photo. It could just be a crude joke, and one Trump didn’t have anything to do with aside from being mentioned. But the letter reinforces how Trump’s name could appear in the documents in ways the White House would prefer not to have to address.
  
  The developments Monday night seemed to affirm something we probably already knew: that lots of people are going to rather blindly toe Trump’s line.
  
  It didn’t take long after the birthday letter was released for pro-Trump influencers to quickly embrace his talking points. A top White House aide claimed the signature on the Trump birthday letter was fake, comparing it to Trump’s signature on more-recent official documents. And plenty of people jumped on board quickly.
  
  “Is this really the best they could do? Trump has the most famous signature in the world,” pro-Trump influencer Benny Johnsonsaid. “Time to sue [the Journal] into the oblivion.”
  
  “Does the below from the WSJ look like this actual signature from the President? I don’t think so at all. Fake,” fellow pro-Trump influencer Charlie Kirksaid.
  
  Some House Republicans echoed the talking point, with Rep. Tim Burchett of Tennessee telling CNN he thought the signaturecould be forged.
  
  None of them seemed to care to check Trump’s signatures on other documents circulating online from the period in question. Many of themlook quite similarto the one on the Epstein birthday letter – from the loopier cursive to the long tail at the end of the final “d.”
  
  That doesn’t mean that Trump definitely wrote the letter. But the signature wouldn’t seem to be any reason to doubt that he did.
  
  It suggests that some people are going to say pretty much anything to seed doubt and defend Trump on this.
  
  The release of the documents in and of themselves is an interesting political storyline.
  
  That’s because House Oversight Committee Democrats decided to get ahead of their release on Monday afternoon by posting an image on X of Trump’s apparentbirthday letter.
  
  House Oversight Committee Chairman James Comer criticized them for selectively releasing materials before the rest of the tranchewas released.
  
  “It’s appalling Democrats on the Oversight Committee are cherry-picking documents and politicizing information received from the Epstein Estate today,” Comer said.
  
  A couple points on that. One is that the letter was obviously already the subject of plenty of intrigue, dating back to the Journal’s July story. The other is that Comer and Republicans have in the past releasedplenty of partial evidence, particularly in their investigations of the Bidens last Congress.
  
  But it’s still interesting that Democrats chose to do this.
  
  It could suggest that Democrats are intending to play more hardball with the Epstein files. But this issuehasbeen somewhat bipartisan, with some House Republicans supporting the Oversight Committee’s subpoenas of these documents and in some cases signing a discharge petition to force the documents’ release.
  
  There could be some danger in making it all look more partisan.
  
  The rest of the documents don’t necessarily tell us a lot. Many of them are lewd and make reference to sex and Epstein’s escapades with women, but not in ways that would necessarily shed light on the crimes he was convicted of.
  
  But a couple points stand out:
