  Any missions in low-Earth orbit could also be in the pathway of the debris, though theInternational Space Stationis scheduled to be deorbited before any potential impact.
  
  Initially, YR4 was seen as a case study in why scientists do the crucial work of planetary defense, discovering and tracking asteroids to determine which ones have a chance of colliding with Earth. Now, astronomers say this one asteroid could redefine the range of risks the field addresses, expanding the purview of the work to include monitoring asteroids that might be headed for the moon as well.
  
  “We’re starting to realize that maybe we need to extend that shield a little bit further,” said Dr. Paul Wiegert, a professor of astronomy and physics at the Western University in London, Ontario. “We now have things worth protecting that are a bit further away from Earth, so our vision is hopefully expanding a little bit to encompass that.”
  
  In the meantime, researchers are assessing just how much chaos a potential YR4 lunar impact could create — and whether anything can be done to mitigate it.
  
  The threatening hunk of rock appears as just a speck of light through even the strongest astronomical tools. In reality, YR4 is likely about 60 meters (about 200 feet) in diameter, according to observationsin Marchby the James Webb Space Telescope, the most powerful space-based observatory in operation.
  
  “Size equals energy,” said Julien de Wit, associate professor of planetary sciencesat the Massachusetts Institute of Technology, who observed YR4 with Webb. “Knowing YR4’s size helped us understand how big of an explosion it could be.”
  
  Astronomers believe they have found most of the near-Earth asteroids the field would classify as “planet killers” — space rocks that are 1 kilometer (0.6 mile) across or larger and could be civilization-ending, said Dr. Andy Rivkin, planetary astronomer from the Johns Hopkins University’s Applied Physics Laboratory in Maryland. The planet killer that slammed into Earth 66 million years ago and led to the extinction of dinosaurs was estimated to be roughly 6 miles (about 10 kilometers) in diameter.
  
  Smaller asteroids such as YR4, which was colloquially dubbed a “city killer” after its discovery, could cause regional devastation if they collide with our planet. About 40% of near-Earth space rocks larger than 140 meters (460 feet) but smaller than a kilometer — capable of more widespread destruction — have been identified, according toNASA.
  
  But astronomers have never really had a chance to watch a collision of that size occur on the moon in real time, Wiegert said. The latest glimpses of YR4 on June 3 before it passed out of view revealed a4.3% chanceof a YR4 lunar impact — small but decent enough odds for scientists to consider how such a scenario might play out.
  
  Initial calculations suggest the impact has the largest chance of occurring on the near side of the moon — the side we can see from Earth.
  
  “YR4 is so faint and small we were able to measure its position with JWST longer than we were able to do it from the ground,” said Rivkin, who has been leading the Webb study of YR4. “And that lets us calculate a much more precise orbit for it, so we now have a much better idea of where it will be and won’t be.”
  
  The collision could create a bright flash that would be visible with the naked eye for several seconds, according to Wiegert, lead author ofa recent papersubmitted to the American Astronomical Society journals analyzing the potential lunar impact.
  
  The collision could create an impact crater on the moon estimated at 1 kilometer wide (0.6 miles wide), Wiegert said — about the size ofMeteor Craterin Arizona, Rivkin added. It would be the largest impact on the moon in 5,000 years and could release up to 100 million kilograms (220 million pounds) of lunar rocks and dust, according to the modeling in Wiegert’s study.
  
  Even pieces of debris that are just tens of centimeters in size could present a hazard for any astronauts who may be present on the moon, or any structures they have built for research and habitation, Wiegert said. The moon has no atmosphere, so the debris from the event could be widespread on the lunar surface, he added.
  
  On average, the moon is 238,855 miles (384,400 kilometers) away from Earth, according toNASA.
  
