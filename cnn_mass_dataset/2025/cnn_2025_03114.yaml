id: cnn_2025_03114
title: "Accused National Guard shooter held without bond after pleading not guilty to murder and assault charges from hospital bed"
date: "2025-12-02"
section: "Politics"
url: "https://www.cnn.com/2025/12/02/politics/national-guard-shooter-court-appearance-hospital?Date=20251202&Profile=cnnbrk&utm_content=1764702340&utm_medium=social&utm_source=twitter"
content: |
  An Afghan man appeared in court virtually from his hospital bed in Washington, DC to plead not guilty tocharges related to the shooting of two National Guardsmenin the capital.
  
  Rahmanullah Lakanwalis accused of shooting two National Guard members near the White House last week. One of them,Sarah Beckstrom, died from her injuries a day later. The other victim,Andrew Wolfe, remains in critical condition.
  
  Lakanwal could be seen on the video displayed in the courtroom squirming in a hospital bed with his eyes constantly closed in apparent pain. In charging documents publicly posted Tuesday, prosecutors say Lakanwal screamed “Allahu Akbar” as he opened fire in downtown Washington, DC.
  
  DC Superior Court Magistrate Judge Renee Raymond ordered Lakanwal be held without bond before trial despite arguments from his attorneys that the government waited too long to charge Lakanwal.
  
  “No condition or combination of conditions will reasonably assure the safety of the community,” the judge said, in deciding to keep the defendant detained.Raymond also said that “sheer terror” from the incident contributed to her decision to hold Lakanwal without bond.
  
  “It is fairly clear that he came across the country, 3,000 miles, armed, with a specific purpose in mind,” the judge added.
  
  Lakanwal was hospitalized after being shot multiple timesWednesday. On Tuesday, the man could be seen in the courtroom video in DC Superior Court wiggling and moving in his bed, all but his head covered by a blanket.
  
  The man mumbled his name when asked while squinting. He said, through a translator, he cannot open his eyes.
  
  “I have pain,” he said.
  
  Who is National Guard shooting suspect Rahmanullah Lakanwal?
  
  Lakanwal was charged with several crimes including premeditated murder and assault with intent to kill. He pleaded not guilty to all counts, a lawyer appointed to the case told Raymond.
  
  An interpreter accompanied Lakanwal in the virtual hearing translating between Pashto and English.
  
  One of Lakanwal’s attorneys, Terrence Austin, argued that his client should be released. He said the Justice Department took too long to charge Lakanwal and said he had no prior criminal record.
  
  A prosecutor argued that the seriousness of the charges — including first degree murder while armed — call for him to be detained pretrial. The prosecutor also argued the man has no ties to the city, and no conditions could ensure the safety of the community.
  
  Lankanwal spent the last few years living in Washington state with his family. He came to the US in 2021 after working with US forces in Afghanistan before the US military withdrew from the country.
  
  DC US Attorney Jeanine Pirro was sitting in the front row of the courtroom throughout the hearing, with a US marshal seated next to her.
  
  Austin said during the hearing Tuesday that the jury pool was being tainted by public news conferences regarding the case.
  
  After the hearing, Pirro exited through the back of the courtroom and held a news conference outside the courthouse.
  
  “We have no idea who he is, he has no connections to the community,” Pirro said.
  
  When asked about the death penalty, she added, “That is a very weighty decision. That is a decision that comes later in time. That is one that ultimately one that the attorney general will make.”
  
  Lankanwal is scheduled to appear in court next on January 14.
  
  In acharging documentreleased Tuesday, prosecutors say Lakanwal screamed “Allahu Akbar” while he opened fire in Northwest downtown Washington, DC.
  
  In an eight-page court filing, law enforcement described in detail the scene of the shooting, with soldiers Beckstrom and Wolfe talking and on patrol just after 2 p.m. ET on November 26 when gunfire erupted.
  
  The two victims fell to the ground and saw the defendant, the affidavit said.
  
  Investigators say they were able to track Lakanwal’s movements before the shooting through a surveillance video from near the Farragut West metro station in DC. The man was standing on the sidewalk near the station for about a minute then ran toward the intersection, and around the corner.
  
  The surveillance camera captured the moment the two soldiers collapsed to the ground. It also captured Lakanwal apparently “chasing and shooting at” another witness and bending down near the two victims he had shot, investigators wrote.
  
  This story was updated with additional reporting.
