  The long-standing difficulties in interpreting the excerpt are a reminder that paleography — the study of handwritten documents — “is not always an exact or precise science,” said Dr. Stephanie Trigg, Redmond Barry Distinguished Professor of English Literature at the University of Melbourne in Australia, “especially in the transmission of English and other vernacular texts without the standardised spelling and abbreviations of Latin.”
  
  Focusing on the sermon is also important because this type of allusion to a popular epic was highly unusual, Trigg, who was not involved in the research, told CNN in an email.
  
  “The authors are right to draw attention to the way the sermon seems to be quoting medieval popular culture: this is not all that common,” Trigg said. “It helps disturb some traditional views about medieval piety.”
  
  When the preacher used the Song of Wade in his sermon, it was clear that he expected his audience to accept the reference “as a recognisable element of popular culture: a meme,” Falk said. “By studying this sermon in depth we get a wonderful insight into the resonances that such popular literature had across culture.”
  
  This new perspective on Wade’s saga doesn’t mean that it was based exclusively in realism. While there are no other known excerpts of the Song of Wade, references to Wade in texts spanning centuries offer details fantastic enough to delight fans of J.R.R. Tolkien’s epic “Lord of the Rings.”
  
  “In one romance text, it’s said that      (Wade) slays a dragon,” Falk said. “There is local folklore in Yorkshire, recorded by John Leland in the 1530s, that he was of gigantic stature.” Other texts stated that Wade’s father was a giant and that his mother was a mermaid, he added.
  
  In fact, chivalric romance from this period frequently incorporated elements of fantasy,      Trigg said. In the chivalric literary tradition, “romances often draw on mythological creatures and the supernatural,” and the distinction between chivalric romances and mythology “is not always rigorously made in medieval literature,” she      added.
  
  Still, aligning the Song of Wade more closely with medieval romances clears up long-standing confusion over allusions to Wade by Geoffrey Chaucer, during scenes of courtly intrigue in “Merchant’s Tale” and “Troilus and Criseyde.”
  
  “Chaucer referring to a Beowulf-like ‘dark-age’ warrior in these moments is weird and confusing,”      Falk said. “The idea that Chaucer is referring to a hero of medieval romance makes a lot more sense.”
  
  While the Song of Wade has      faded into obscurity, its appearance in the medieval sermon and in Chaucer’s work hints that for centuries the legend was a staple of popular culture in medieval England, even though there was no definitive text preserving the entire tale.
  
  As its popularity waned, much of it vanished for good.
  
  “By the eighteenth century there were no known surviving texts and nobody seemed to know the story,” Wade said. “Part of the enduring allure is the idea of something that was once part of common knowledge suddenly becoming ‘lost.’”
  
  Mindy Weisberger is a science writer and media producer whose work has appeared in Live Science, Scientific American and How It Works magazine. She is the author of “Rise of the Zombie Bugs: The Surprising Science of Parasitic Mind Control” (Hopkins Press).
