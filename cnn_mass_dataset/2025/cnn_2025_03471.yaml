  “He was more like a hero of chivalric  romance (a literary genre celebrating knights, codes of honor and romantic  love) like Sir Launcelot or Sir Gawain,” Falk told CNN in an email.
  
  For hundreds of years, historians and literary experts have   argued over why Chaucer would have mentioned the Song of Wade in his   chivalric works. Recasting Wade as a courtly hero rather than a monster      slayer makes Wade’s appearance   in Chaucer’s writing a better fit      and could help to uncover previously hidden   meanings in those literary references, the authors wrote.
  
  The new study is the first to analyze the Song of Wade excerpt alongside the entirety of the Latin sermon that quotes it, said study coauthor Dr. James Wade, an associate professor of English Literature at Girton College. (The surname “Wade” was relatively common in medieval England, and while Wade the researcher could not confirm a family connection to the storied hero, a link “isn’t impossible,” he told CNN in an email.)
  
  In fact, it was the context of the sermon that led the researchers to the discovery that the fragment in English had been misinterpreted, Wade said.
  
  The sermon was about humility, and it warned that some people “are wolves, such as powerful tyrants” who take “by any means.” There are other allusions to unfavorable animal traits in humans. As originally translated, the Song of Wade excerpt read: “Some are elves and some are adders; some are sprites that dwell by waters: there is no man, but Hildebrand (Wade’s father) only.”
  
  For centuries, scholars have struggled to make sense of why references to “elves” and “sprites” were included in a sermon about humility. According to the new translation, the excerpt reads: “Some are wolves and some are adders; some are sea-snakes that dwell by the water. There is no man at all but Hildebrand.” Reinterpreted this way, the quoted phrases align more closely with the overall message of the sermon and redefine the genre of the story.
  
  “We realised that taking the fragment together with its context would allow us not only to completely reinterpret the Wade legend, but also to reshape our understanding of how stories were told and retold in different cultural contexts, including religious contexts,”      Wade said.
  
