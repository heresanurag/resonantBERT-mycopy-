id: cnn_2025_02843
title: "FBI launches task force targeting anti-Tesla ‘domestic terrorism’"
date: "2025-03-25"
section: "US"
url: "https://www.cnn.com/2025/03/25/us/fbi-task-force-tesla-attacks-hnk/index.html"
content: |
  The FBI has created a task force intended to “crack down on violent Tesla attacks,” it announced Monday, following a spate of incidents appearing to target Elon Musk’s electric car manufacturer.
  
  Acts of violence and vandalism have been unfolding for months against Tesla vehicles and facilities, including charging stations and individually owned vehicles. Protests have been held at Tesla showrooms criticizing Musk, the company’s CEO, who is leading the Trump administration’s controversial efforts to downsize the federal government’s workforce and shrink federal agencies through the Department of Government Efficiency.
  
  Over the weekend, the FBI urged the public to look out for signs of a possible attack on Tesla dealerships or Tesla-related entities, including individuals surveilling or trying to break into Tesla properties or making threats against the company online.
  
  Tesla insurance has always been pricey. Will vandalism make it higher?
  
  The new task force will work in conjunction with the Bureau of Alcohol, Tobacco, Firearms and Explosives to investigate anti-Tesla attacks, FBI Assistant Director for Public Affairs Ben Williamson said in apost on X.
  
  The Justice Department recently announced it will crack down on the rising number of attacks against Tesla, including charging people accused of throwing Molotov cocktails at the automaker’s properties.
  
  “This is domestic terrorism. Those responsible will be pursued, caught, and brought to justice,”FBI Director Kash Patelsaid Monday.
  
  Attorney General Pam Bondi also described the anti-Tesla acts as “domestic terrorism” last week, after a person dressed in blackshot and set fire to several Tesla vehiclesat a repair facility in Las Vegas. Tesla sales and stock prices are also facingstiff declines.
  
  Muskechoed thaton his X social media platform on Monday, writing, “There is no doubt that shooting bullets into Tesla stores and burning down Superchargers are acts of terrorism.”
  
  In anX post last weekresponding to the violent acts aimed at Tesla facilities, Musk wrote, “Tesla just makes electric cars and has done nothing to deserve these evil attacks.”
  
  The FBI declined to say how many people will be assigned to the task force.The New York Postfirst reported about the new law enforcement initiative.
  
  There are now local organizers in about 28 states and Washington, DC, and the Tesla showrooms have drawn a growing number of demonstrators, CNNpreviously reported.
  
  One of the organizers of the “Tesla Takedown” movement, Joan Donovan, said in a statement she is being “viciouslythreatened and doxed” for participating in the public demonstrations, she said in a poston Bluesky.
  
  “Musk has developed his own private army of networked harassers, who are calling me a domestic terrorist for picketing Tesla in reaction to DOGE’s likely unconstitutional acts,” Donovan went on to say in her post.
  
  Amid the federal government’s actions to contain these attacks, police in Austin, Texas, got a call Monday morning about possible hazardous materials found at a Tesla dealership.
  
  Responding officers reported “suspicious devices” and called in a bomb squad, which determined the devices to be “incendiary” and took them away without incident, Austin police said.
  
  Police declined to release further details about the type of incendiary devices they found, noting the FBI is now the lead agency investigating the incident.
  
  Anti-Tesla incidents have happened in at least nine states, the FBI said over the weekend, noting the pattern appears to be them occurring overnight and “conducted by lone offenders.”
  
  “These incidents have involved arson, gunfire, and vandalism, including graffiti expressing grievances against those the perpetrators perceive to be racists, fascists, or political opponents,” the FBI said, asking anyone with information about these crimes to contact law enforcement.
  
