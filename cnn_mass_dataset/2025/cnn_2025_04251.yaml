title: "Archaeologists discover true identity of Costa Rica shipwrecks long thought to be pirate ships"
date: "2025-05-02"
section: "Science"
url: "https://www.cnn.com/2025/05/02/science/danish-slave-ships-costa-rica-intl-scli"
content: |
