title: "Nvidia says it will restart sales of a key AI chip to China, in a reversal of US restrictions"
date: "2025-07-15"
section: "Business"
url: "https://www.cnn.com/2025/07/15/business/nvidia-resume-h20-chip-sales-to-china-intl-hnk?cid=external-feeds_iluminar_yahoo"
content: |
  American chipmaking giant Nvidia (NVDA) says it plans to resume sales to China of an artificial intelligence chip that’s become part of a global race pitting the world’s biggest economies against each other.
  
  The company’s announcement on Monday comes after Nvidia CEO Jensen Huang met with President Donald Trump at the White House last week. Huang has argued that restricting sales of American technology to China could put the US position as a global AI leader at risk — and the company had also said the restrictions were causing it to miss out on billions of dollars in lost revenue.
  
  AMD, another major chipmaker, said on Tuesday that it too was planning to restart sales of its AI chips to China.
  
  “We were recently informed by the Department of Commerce that license applications to export MI308 products to China will be moving forward for review,” the company said in a statement to CNN. “We plan to resume shipments as licenses are approved. We applaud the progress made by the Trump Administration in advancing trade negotiations and its commitment to US AI leadership.”
  
  The White House did not immediately respond to a request for comment.
  
  Treasury Secretary Scott Bessent told Bloomberg in an interview Tuesday that the Nvidia export controls have been a “negotiating chip” in the larger US-China trade talks, in which the two countries have made a deal to lower tariffs charged on one another.
  
  The same day Commerce Secretary Howard Lutnick said that the resumption of Nvidia’s AI chip sales to China was part of thetrade agreement with Beijing on rare earths. “We put that in the trade deal with the magnets,” he told Reuters, referring to rare earth magnets.
  
  China’s controls on rare earth exports became a major focus in the trade talks between Beijing and Washington in London last month. In exchange for increasing shipments of the critical resources, the US also agreed to lift export curbs on microchip designing software, ethane and jet engines.
  
  Nvidia is the world’s most valuable company, and last week becamethe first publicly traded firm to reach a valuation of $4 trillion, thanks to its role in the artificial intelligence market. The company’s chips are used to power technologies ranging from AI chatbots to robotics and self-driving cars.
  
  Nvidia released the H20 chip last year as a way to maintain access to the Chinese market — which made up 13% of the company’s sales in 2024 — in the face of strict US export controls.
  
  But in April, the White House told the company it would need a special license to export the H20 to China, forcing the company to halt sales. The H20 is widely believed to have contributed toDeepSeek, an advanced Chinese AI model.
  
  On Monday, Nvidia said that it had applied to sell the H20 in China again and received assurances from the US government that those licenses will be approved, allowing the company to “start deliveries soon.”
  
  Nvidia’s CEO says the US should ‘reduce’ dependency on other countries, onshore technology manufacturing
  
  The US government has sought to block China’s use of American technology to advance its military and AI systems.
  
  But Huang has argued that if American technology companies are restricted from selling to China, Chinese developers will simply create their own, which could undermine US leadership.
  
  “In order for America to be the world leader, just like we want the world to be built on the American dollar, using the American dollar as a global standard, we want the American tech stack to be the global standard,” Huang told CNN’sFareed Zakaria in an interviewthat aired Sunday. “We love that the internet is created by American technology and is built on American technology, and so we should continue to aspire to that.”
  
  The chipmakersaid in Maythat it missed out on $2.5 billion in additional revenue that would have come from H20 sales to China during the first quarter of 2025 and expected another $8 billion revenue loss during the second quarter. Last month, Nvidia said it would no longer include China in its sales and profit forecasts because of uncertainty surrounding export controls.
  
  Huang is scheduled to hold a media briefing in Beijing on Wednesday when he attends a supply chain expo, his second visit to China after a trip in April where he stressed the importance of the Chinese market.
  
  Reuters and CNN’s John Liu contributed to this story.
