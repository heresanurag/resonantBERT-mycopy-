title: "5 Things to know for Dec. 24: Epstein files, National Guard, Nursing home explosion, Student loans, Weight loss drugs"
date: "2025-12-24"
section: "US"
url: "https://www.cnn.com/2025/12/24/us/5-things-to-know-for-dec-24-epstein-files-national-guard-in-chicago-nursing-home-explosion-student-loans-weight-loss-drugs"
content: |
  Three inmates, all accused of violent crimes, are back in custody after escaping from an Atlanta-area jail. It’s still unclear exactly how they got out, but police say their recorded jailhouse phone callsreveal how they plotted their escape.
  
  Here’s what else you need to know to get up to speed and on with your day.
  
  The latest release of Epstein files featured more mentions of President Donald Trump than last week’s drop, and raised additional questions about the Department of Justice’s handling of the documents. Another revelation is that prosecutors sought to investigate and potentially charge more people. A series of apparent FBI emails from 2019 cite “10 co-conspirators.” To date, only Jeffrey Epstein and Ghislaine Maxwell, his former girlfriend, have been charged.Here are more takeaways from the latest release.
  
  The Supreme Court on Tuesdayrejected President Trump’s requestto allow him to deploy the National Guard to Chicago to protect ICE agents, a major loss for the administration. The decision, which came over dissents from conservative Justices Samuel Alito, Clarence Thomas and Neil Gorsuch, appeared almost certain to jeopardize deployments of the National Guard in other cities as well.
  
  Two people are dead and 20 others were injured after anexplosion and firetore through a nursing home outside Philadelphia, spurring first responders, bystanders and staff to rush the elderly residents to safety, Pennsylvania Gov. Josh Shapiro said. The cause of the explosion remains under investigation, but the preliminary belief of officials is that it was a gas leak, Shapiro said. A local utility company was on site responding to reports of a gas odor in the facility when the explosion occurred, the company said in a statement.
  
  Two people are dead and others are missing after a fire and explosion tore into a nursing home in Bristol, Pennsylvania. According to Pennsylvania Gov. Josh Shapiro, the cause of the explosion remains under investigation, but officials’ preliminary belief is that it was a gas leak.
  
  The Trump administration will begingarnishing the wagesof student loan borrowers in default starting in January, the Education Department told CNN on Tuesday. The move comes months after the administration restarted collecting federal student loans in default, which happens after 270 days without payment. The process, known as administrative wage garnishment, allows the agency to order non-federal employers to withhold a portion of an employee’s income to pay off the loans. In April, the department said that more than 5 million borrowers were in default and nearly 4 million more were delinquent, which means they hadn’t made a payment in more than 90 days.
  
  The FDA this week approveda daily pill versionof the weight loss drug Wegovy — creating a new option for how patients can take medicines in a class of drugs that has revolutionized obesity treatment. The drug, which maker Novo Nordisk calls simply the Wegovy pill, uses the same active ingredient that’s in the original version, along with its sister drug for diabetes, Ozempic. Both Wegovy and Ozempic, which mimic the hormone GLP-1, are given as weekly injections, as are rival drugs Zepbound and Mounjaro from Eli Lilly. About 1 in 8 adults in the US say they’re currently taking one of the medicines, according to data from health policy research group KFF.
  
  Researchers studied fossils, well-preserved remains and even a single fingerprint tounravel some of the world’s longest-standing mysteriesthis year.
  
  Denmark’s foreign minister said this week he was “deeply upset” by President Trump’s appointment of a special envoy to Greenlandwho wants the island to become part of the United States.
  
  File this under aviation firsts: A twin-engine turboprop automatically landed itself after experiencing an in-flight emergency near Denver, according to the landing system’s manufacturer.Here’s how the technology works.
  
  One of China’s most popular short-video and streaming platformswas flooded with porn and violent content, sparking outrage and confusion in a nation where the internet is tightly controlled.
  
  To say that 2025 was a busy news year would be an understatement. There were wildfires and hurricanes and plenty of political intrigue. We also enjoyed some memorable moments in sports and entertainment. What do you remember?
  
