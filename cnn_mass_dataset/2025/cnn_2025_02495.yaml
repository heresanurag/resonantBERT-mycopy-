title: "Ryanair is suing ‘disruptive passenger’ for $15,000 in damages"
date: "2025-01-08"
section: "Travel"
url: "https://www.cnn.com/2025/01/08/travel/ryanair-disruptive-passenger-damages-intl-scli/index.html"
content: |
  Ryanair, Europe’s biggest airline, is going after unruly passengers on its flights and has filed for €15,000 ($15,400) in damages from a passenger who disrupted a flight last year.
  
  The Ireland-based budget airline announced Wednesday that it has filed legal proceedings against the passenger, who, it said, disrupted a flight from Dublin to Lanzarote in Spain in April of last year.
  
  “This passenger’s inexcusable behaviour forced this flight to divert to Porto where it was delayed overnight, causing 160 passengers to face unnecessary disruption,” the airline said in astatementpublished online.
  
  Unruly passengers were a problem before the pandemic. Now they’re even worse
  
  The carrier said it has filed a case in the Irish Circuit Court seeking to recover the costs of the delay, which included overnight accommodation, passenger expenses, and landing costs.
  
  There have been several reports of disruptive behavior on Ryanair flights in recent years.
  
  In November, the UK’sIndependentnewspaper reported that a Ryanair flight was forced to alert authorities before landing in Tenerife, Spain after several passengers became disruptive and one person urinated in the aisle.
  
  A passenger who disrupted a Ryanair flight to Athens in 2020 wasconvictedlast month in a Greek court and given a five-month suspended jail sentence, along with a €400 ($412) fine.
  
  “This demonstrates just one of the many consequences that passengers who disrupt flights will face as part of Ryanair’s zero tolerance policy,” a spokesperson for the airline said in a statement.
  
  A spokesperson for Ryanair declined to provide CNN with details of the incident but said it is the first time the company has taken civil action against a passenger in Ireland, marking a new approach to tackling unruly passenger behavior.
  
  “We plan to pursue civil action against disruptive passengers as a move towards eliminating disruptive passenger behaviour,” the spokesperson added.
