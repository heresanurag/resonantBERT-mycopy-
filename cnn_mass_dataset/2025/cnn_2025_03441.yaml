id: cnn_2025_03441
title: "Palestine Action’s co-founder wins bid to challenge UK ban under anti-terror laws"
date: "2025-07-30"
section: "UK"
url: "https://www.cnn.com/2025/07/30/uk/palestine-action-uk-legal-challenge-intl?cid=external-feeds_iluminar_yahoo"
content: |
  The founder of a pro-Palestinian activist group has won the right to challenge the British government’s decision to ban the group under anti-terrorism laws.
  
  London High Court Judge Martin Chamberlain granted Palestine Action’s co-founder Huda Ammori permission to seek a judicial review Wednesday, saying that it was “reasonably arguable,” that the ban had disproportionately interfered with the group’s right to freedom of expression, assembly and association under the European Convention on Human Rights (ECHR).
  
  British Home Secretary Yvette Cooper said Wednesday that the court “confirmed the continuation of the proscription order against Palestine Action Group,” while allowing permission for a further hearing under normal judicial review procedures.
  
  “Importantly, this proscription decision is not about Palestine, nor does it affect the freedom to protest on Palestinian rights,” Cooper said in a statement.
  
  “It only applies to the specific and narrow organisation, Palestine Action, whose activities do not reflect or represent the thousands of people across the country who continue to exercise their fundamental rights to protest on different issues.”
  
  The UK-based group, which aims to disrupt the operations of weapons manufacturers supplying the Israeli government, wasproscribedearlier this month after two Palestine Action activists broke intoBritain’s largest air basein central England in June, damaging two military aircraft.
  
  The group’s ban makes it illegal under UK law to be a member of – or invite support for – Palestine Action and puts them on par with terrorist organizations such as Hamas, al Qaeda and ISIS.
  
  The move has been condemned by multiple human rights organizations, including UN Human Rights Chief Volker Turk, whosaidFriday that it raises concerns that UK counter-terrorism laws “are being applied to conduct that is not terrorist in nature and risks hindering the legitimate exercise of fundamental freedoms.”
  
  Earlier this month the High Court refused Ammori’s application to pause the ban.
  
  On Wednesday, Judge Chamberlain said that Cooper, who brought forward the proscription order, could have consulted Palestine Action prior to their ban.
  
  The judicial review is likely to take place in September.
  
  The news comes as more than 200 people have been arrested in support of the group since July 5, according to Defend Our Juries, a UK-based non-profit. Many have been arrested on suspicion of terrorism offenses for displaying posters in support of the group or the Palestinian cause.
  
  Demonstrations for Palestine Action have taken place this month across the UK, including London, Edinburgh, Manchester, Bristol and Truro.
