title: "Hundreds hit by food poisoning in Indonesia after eating free school meals"
date: "2025-08-14"
section: "Asia"
url: "https://www.cnn.com/2025/08/14/asia/indonesia-food-poisoning-free-lunch-program-intl-hnk?utm_medium=social&utm_source=whatsappCNN&utm_content=2025-08-15T04:59:22"
content: |
  More than 360 people fell ill in Indonesia’s town of Sragen in Central Java after consuming school lunches, an official said on Thursday, in the largest food poisoning case to hit President Prabowo Subianto’s flagship free meals program.
  
  Since itslaunch in January, the free school meals program has been marred by mass food poisoning cases across the archipelago, affecting over 1,000 people.
  
  Sragen government chief Sigit Pamungkas told Reuters 365 people fell ill and a food sample was being tested in a lab. The government would pay for any medical treatment if needed.
  
  Wizdan Ridho Abimanyu, a ninth grader at Gemolong 1 middle school, told Reuters he was woken at night by sharp pain in his stomach.
  
  He had a headache and diarrhoea, which he deduced had been caused by food poisoning after seeing schoolmates’ social media posts complaining of the same.
  
  The likely contaminated lunch was turmeric rice, omelette ribbons, fried tempeh, cucumber and lettuce salad, sliced apple and a box of milk, cooked in a central kitchen and distributed to several schools.
  
  “We have asked to temporarily stop the food distribution from that kitchen until the lab results are back,” Sigit said.
  
  The government’s National Nutrition Agency, which oversees the program, has raised the standards of kitchen operations and delivery in the aftermath of previous food poisoning cases, its chief Dadan Hindayana told Reuters.
  
  The free meals programme has been rapidly expanded to over 15 million recipients so far. Authorities plan to reach 83 million by year-end,budgetinga total cost of 171 trillion rupiah ($10.62 billion) this year.
  
  In a food poisoning case in a city in West Java in May, more than 200 students fell ill and a lab found the food was contaminated with Salmonella and E. coli bacteria, according to media reports.
