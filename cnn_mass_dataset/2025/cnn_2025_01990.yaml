title: "Fact check: Trump tells fictional story about his uncle and the Unabomber"
date: "2025-07-16"
section: "Politics"
url: "https://www.cnn.com/2025/07/16/politics/fact-check-trump-uncle-unabomber?tenant_id=related.en&iid=cnn_buildContentRecirc_end_recirc&recs_exp=up-next-article-end"
content: |
  President Donald Trump likes to boast about the brilliance of his late uncle John Trump, who spentdecades as a professor of electrical engineeringat the renowned Massachusetts Institute of Technology (MIT). And when speaking about all manner of subjects, the president likes tomake up stories filled with dramatic but fictional details.
  
  On Tuesday, Trump conjured an especially odd imaginary tale – that linked his uncle with the late terrorist Theodore “Ted” Kaczynski, better known asthe Unabomber.
  
  Trump wasspeakingat a Pennsylvania event about energy and innovation when he said he had to “brag just for a second” about his uncle’s intelligence. After wrongly saying his uncle was “the longest-serving professor in the history of MIT” (he was one of the longest-serving butnot the very longest) and wrongly saying his uncle’s three university degrees were “in nuclear, chemical, and math” (two were in electrical engineeringandone was in physics), the president claimed, “Kaczynski was one of his students.”
  
  He went on to tell a story about having asked his uncle about what Kaczynski was like. “‘I said, ‘What kind of a student was he, Uncle John?’ Dr. John Trump. I said, ‘What kind of a student?’ And then he said, ‘Seriously, good.’ He said, ‘He’d correct – he’d go around correcting everybody.’ But it didn’t work out too well for him.”
  
  For two big reasons, this story could not possibly be accurate.
  
  First, the president’s uncledied in 1985. Kaczynski was publicly revealed as the Unabomber more than a decade later,in 1996, when he was captured; before that, he had lived as a recluse in the Montana wilderness. There is no apparent reason that Donald Trump would have been asking anyone about Kaczynski in 1985 or earlier.
  
  Second, Kaczynski attended Harvard University and the University of Michigan, not MIT. An MIT spokesperson said in a Wednesday email: “We have no enrollment record or information that Ted Kaczynski ever attended MIT.”
  
  Harvard has long allowed some students toregisterfor classes at nearby MIT, but media outlets and MIT itself have found no sign that Kaczynski ever did that during his time at Harvard in the late 1950s and early 1960s – much less that Kaczynski, a Harvard mathematics major, studied under Trump, the MIT professor of electrical engineering. MITreportedon its website in 1996 that Kaczynski’s high school guidance counselor said Kaczynski had been offered admission to MIT in the 1950s but had chosen Harvard instead.
  
  The White House did not respond to a request for comment on the president’s tale.
  
  What the president could have accurately said is that his uncle wasan esteemed MIT professor. The MIT spokesperson said Wednesday that John Trump “remains among the longest-serving professors in our history and was a highly valued member of the MIT community throughout his tenure as a researcher, innovator, entrepreneur, teacher, and colleague.”
