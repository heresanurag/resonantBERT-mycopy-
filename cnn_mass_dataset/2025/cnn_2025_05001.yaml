title: "Trump and allies celebrated court orders against Biden they now claim are ‘tyrannical’"
date: "2025-02-18"
section: "Politics"
url: "https://www.cnn.com/2025/02/18/politics/trump-biden-court-orders/index.html"
content: |
  PresidentDonald Trumpand top allies who havequestioned the constitutionalityof recent court orders blocking the administration’s agenda touted similar rulings by federal courts as “great news” and “brilliant” when they paused President Joe Biden’s policies.
  
  When a federal judge in Texashalted a Biden administration pauseon deportations six days after Trump was inaugurated, presidential aide Stephen Miller took tosocial media to describethe temporary restraining order as “great news.” When a judge in Louisiana blocked Biden aides from askingsocial media platformsto remove content, Trump called the decision “amazing.”
  
  Is there anyone in government Trump can’t fire? Why Humphrey’s Executor may be in peril at the Supreme Court
  
  “Just last week, in a historic ruling, a brilliant federal judge ordered the Biden administration to cease and desist from their illegal and unconstitutional censorship in collusion with social media,” Trumptold an audiencein Florida in 2023. (The Supreme Court months later would decidein Biden’s favor.)
  
  Trump has faced a barrage of adverse initial rulings since his inauguration that have paused his efforts toend birthright citizenship, fire leaders atindependent government agenciesand withhold spending approved by Congress. Those orders are not final but are instead designed to give courts the time needed to review the law.
  
  Still, they can have enormous on-the-ground impacts, and they have allowed Trump’s allies to pour fuel on the notion that his critics are seeking out friendly judges to stall his agenda – just as conservatives often did during Biden’s administration. On Tuesday, Trump called for impeaching a judge in Washington, DC, who preliminarily blocked him from deporting Venezuelan nationals under a wartime law from the 18th Century.
  
  Republicans have increasingly complained about outside groups choosing courts they believe will rule in their favor – a practice known as judge shopping. Democrats loudly protested that same practice during the Biden and Obama administrations, when Republican-aligned groups frequently sued in Texas or Louisiana where they could bring appeals to the especially conservative 5th Circuit.
  
  “They always have. They’ve done that anyway. And it’s not a good idea,” retired Supreme Court Justice Stephen Breyer told “The Situation Room with Wolf Blitzer & Pamela Brown” on Wednesday. “That’s why there are appeals courts. That’s why there is a Supreme Court.”
  
  The temporary orders, handed down by a single federal judge but often with nationwide ramifications, are exactly the kind of court decisions that the president and his allies are now railing against. Vice President JD Vance, a Yale Law School graduate,carped on social mediathat “judges aren’t allowed to control the executive’s legitimate power.”
  
  “Judges should be ruling,” Trump said on the “Mark Levin Show” recently. “They shouldn’t be dictating what you’re supposed to be doing.”
  
  The complaints fromMiller,whorecently blasted a seriesof temporary court orders against Trump as “tyrannical,” have been particularly notable because he was heavily involved with seeking them against Biden.
  
  Following Trump’s first term, Miller created America First Legal, a group that frequently sued the Biden administration over its Covid-19 policies, immigration orders and its decision to remove Trump appointees from government boards.
  
  To be sure, presidents of both parties, several justices on the Supreme Court and many legal scholars have long raised concerns about temporary orders that block an administration’s policies. The highest-profile cases are usually tied to politically charged issues, which can make it impossible to have rational debates about the ability of courts to issue sweeping injunctions and restraining orders.
  
  A congressional fix, lamented Notre Dame law professor Samuel Bray, would “require putting aside partisan implications in the near term to solve the problem and get the law right in the long term.”
  
  The real puzzle, Bray said, “is why it has taken so long for the Supreme Court to address this.”
  
  “It may be that the onslaught of cases against the second Trump administration will be the occasion where the court is forced to decide,” he said.
  
  Trump’s complaints may also capture the attention of Congress.
  
  “The real question is whether this will incentivize Congress to pursue the very court reforms that were dismissed as Democratic hyperventilating as recently as last year,” said Stephen Vladeck, a Georgetown University Law Center professor and CNN legal analyst.
  
  While the remarks by Trump and Vance set off a flurry of debate about the president’s fidelity to the judicial branch and the principle of separation of powers, they also drew attention to a decades-old — and at times bipartisan — fight over court-ordered nationwide injunctions that reach beyond the parties involved in the litigation.
  
  During the first three years of Biden’s administration, courts issued 14 nationwide injunctions blocking executive orders and policies, according to aHarvard Law Reviewarticle last year. During Trump’s first term, courts issued more than four times that many.
  
  Former Attorney General William Barr, who served in the first Trump administration, decried nationwide injunctions,writing in a Wall Street Journal op-edin 2019 that granting a single judge such power “short-circuits” the usual judicial process. In the final days of the Biden administration, Solicitor General Elizabeth Prelogar urged the Supreme Court to consider limiting the procedure, arguing in an emergency appeal that the orders can lead to “substantial disruption on the execution of the laws.”
  
  The court declined to take Prelogar up on that offer.
  
  But the litigation now swirling around Trump may give the Supreme Court its best opportunity in years to weigh in on that dispute.
  
  “Sometimes an issue has developed to where it’s at a tipping point and something needs to be done,” said Paul Grimm, director of the Bolch Judicial Institute at Duke Law School and aretired district court judge.
  
  “This may be the opportunity that the court says, ‘All right, the time is right for us to take this on and give some guidance,’ because this is a flash point,” Grimm said. “The chance is greater in the next couple of terms than it has been in the past.”
  
  The Trump administration is already pushing that question at the Supreme Court. In a series of emergency appeals filed this monthattempting to upend birthright citizenship, the White House is asking the Supreme Court to limit the ability of lower courts to issue injunctions that apply to everyone rather than the parties who sued.
  
  The use of sweeping, if temporary nationwide orders has “reached epidemic proportions since the start of the current administration,” acting Solicitor General Sarah Harris told the Supreme Court in those appeals. “This court should declare that enough is enough.”
  
  Several justices waded into the thorny issue last spring in a case dealing with Idaho’s strict statewide ban on gender-affirming care for most minors. The courtultimately allowed Idahoto enforce that ban, knocking down a lower court’s sweeping injunction.
  
  Justice Ketanji Brown Jackson, a member of the court’s liberal wing who opposed letting Idaho enforce the law, conceded that “the questions raised by ‘universal injunctions’ are contested and difficult.”
  
  Justice Neil Gorsuch, joined by two of his fellow conservatives,described the debateover temporary court orders as of “great significance” and said because the orders are often considered on an extremely expedited basis they lead to a “fast and furious business.”
  
  “Retiring the universal injunction may not be the answer to everything that ails us,” Gorsuch wrote. “But it will lead federal courts to become a little truer to the historic limits of their office.”
  
  Closely tied to the criticism of sweeping temporary orders is a concern that lawyers aiming to shut down an administration’s policies can seek out a friendly judge — or “judge shop” — and virtually guarantee a favorable, if temporary, outcome.
  
  The federal judiciaryhas tried to take some stepstoward addressing that issue, but those measures have met with resistance and mixed success.
  
  Sebastian Gorka, who worked in Trump’s first White House and who the president has named senior director for counterterrorism this time around,reposted a message on Xlast month describing US District Judge Paul Engelmayer, an Obama appointee, as a “rogue judge.” But he celebrated a nationwide injunction against Biden’s vaccine mandate for federal workers in 2021 in a social media repost, suggesting that a “Federal Judge” had stepped in to block Biden’s “abuse of power.”
  
  Trump himself repeatedly touted or commented on temporary restraining orders and preliminary injunctions that blocked the Biden administration’s policies.
  
  When a federal judge in Louisiana in 2022issued a preliminary injunctionhalting the administration from ending the Title 42 program, which allowed the administration to speed the removal of certain migrants, Trump reposted a supporter on his Truth Social platform thanking US District Judge Robert Summerhays for the ruling. Trump appointed Summerhays to the bench during his first term.
  
  White House spokesperson Harrison Fields dismissed the comparison between the Biden-era orders and those issued in the early weeks of the Trump administration.
  
  “It’s simple: Biden abused his executive power to implement policies not within the scope of his presidential powers, while President Trump is appropriately using his executive authority to implement his America First agenda,” Fields told CNN. “These court orders from left-wing judges are a continuation of judicial weaponization that Americans voted against at the ballot box on November 5.”
  
  While Trump has kicked up considerable dust about federal courts, lawyers in the Justice Department have continued to do what administrations have always done with adverse rulings: Appeal.
  
  Following theuproar over Vance’s tweet, the president told reporters in the Oval Office recently, “I always abide by the courts.”
  
  This story was originally published on February 18. It has been updated following comments by President Donald Trump and Chief Justice John Roberts this week.
