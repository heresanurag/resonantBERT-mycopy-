title: "Microsoft AI CEO: We’re making an AI that you can trust your kids to use"
date: "2025-10-23"
section: "Tech"
url: "https://www.cnn.com/2025/10/23/tech/microsoft-ai-copilot-updates-teen-safety?user_id=68d5685121a17d6389d6518a&sn_type=TWITTER&cpost_id=68fb985005c49e041ec856e3&post_id=100008848213439&asset_id=ADVOCACY_205_68fa5e7f7dc94564d11c5318"
content: |
  Popular artificial intelligence chatbots like ChatGPT and Meta AI are increasingly blurring the line between real-world and digital relationships by allowing romantic and sometimes sexual conversations — whilescramblingto make sure children aren’t accessing that adult content.
  
  But Microsoft wants no part of that, the company’s AI CEO Mustafa Suleyman told CNN.
  
  “We are creating AIs that are emotionally intelligent, that are kind and supportive, but that are fundamentally trustworthy,” Suleyman said. “I want to make an AI that you trust your kids to use, and that means it needs to be boundaried and safe.”
  
  Microsoft is locked in a race with tech giants like OpenAI, Meta and Google to make its Copilot the AI tool of choice in what Silicon Valley believes will be the next big computing wave. Copilot now has 100 million monthly active users across Microsoft’s platforms, the company said in its most recent earnings call. That’s well below competitors like OpenAI, whoseChatGPT has 800 millionmonthly active users.
  
  But Microsoft is betting its approach will win it a wider audience, especially as AI companies grapple with how to shape their chatbot’s personalities amid reports of AIcontributing to users’ mental health crises.
  
  “We must build AI for people; not to be a digital person,” Suleyman wrote in a blog post earlier this year.
  
  The interview came ahead of a series ofnew Copilot featuresthat Microsoft unveiled on Thursday, which include the ability to refer back to previous chats, engage in group conversations, improved responses to health questions and an optional, sassy tone called “real talk.”
  
  Some of Microsoft’s AI competitors are facing intense pressure to keep young users safe on their platforms.
  
  Families have suedOpenAIandCharacter.AIclaiming their chatbots harmed their children, in some cases allegedly contributing to their suicides. A string ofreportsearlier this year raised concerns that Meta’s chatbot and other AI characters would engage in sexual conversations even with accounts identifying as minors.
  
  Instagram will soon let parents stop teens from chatting with AI characters
  
  The tech companies behind popular AI chatbots say they’ve rolled out new protections for kids, including content restrictions and parental controls. Meta and OpenAI are also implementing AI age estimation technology aiming to catch young users who sign up with fake, adult birthdates — but it’s unclear how well those systems work. OpenAI CEO Sam Altmanannouncedearlier this month that with its new safety precautions in place, ChatGPT will soon let adult users discuss “erotica” with the chatbot.
  
  Suleyman said Microsoft is drawing a bright line at romantic, flirtatious and erotic content, even for adults. “That’s just not something that we will pursue,” he said.
  
  That means, for now, Microsoft is unlikely to roll out a “young user” mode like some of its competitors — because they shouldn’t need it, Suleyman said.
  
  A key focus for Microsoft is training Copilot to encourage users to interact with other humans, not just AI. That’s key for a company that has built its business around providing work-oriented productivity tools.
  
  Its new “groups” feature will let up to 32 people — think, classmates working on an assignment or friends planning a trip — join a shared chat with Copilot, where the chatbot can chime in with suggestions.
  
  That theme of pointing users to real people applies to Copilot’s health updates, too. The chatbot will recommend nearby doctors for certain medical-related queries, and will otherwise draw on “medically trusted” sources such as Harvard Health.
  
  Suleyman said he believes this push to get Microsoft’s AI chatbot to help strengthen human-to-human relationships “is a very significant tonal shift to other things that are happening in the industry at the moment, which are starting to see these things as deep simulations where you can go off into your own world and have an entire parallel reality, including, in some cases, adult content.”
