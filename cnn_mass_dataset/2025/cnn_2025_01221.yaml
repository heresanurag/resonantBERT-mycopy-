title: "Mass grave of Roman soldiers tells gruesome tale of military disaster"
date: "2025-04-04"
section: "Science"
url: "https://www.cnn.com/2025/04/04/science/mass-grave-roman-soldiers-austria-intl-scli/index.html"
content: |
