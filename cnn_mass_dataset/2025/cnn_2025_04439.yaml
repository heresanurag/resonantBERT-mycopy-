title: "Kim Kardashian is now a law school graduate"
date: "2025-05-22"
section: "Entertainment"
url: "https://www.cnn.com/2025/05/22/entertainment/kim-kardashian-graduated-law-school?cid=external-feeds_iluminar_yahoo"
content: |
  It’s been a long road for Kim Kardshian as she’s pursued her dream of becoming a lawyer and she’s celebrating a milestone.
  
  Kardashian on Wednesday shared photos and video of what appeared to be a backyard graduation ceremony.In the first video, a voice which sounds like her sister Khloe Kardshian, can be heard saying, “Surprise graduation!”
  
  “It’s an absolute honor to stand here today, not just as mentors, but as witnesses to one of the most inspiring legal journeys we’ve ever seen,” Jessica Jackson, an attorney who worked withKardashian on her studies.
  
  “Six years ago, Kim Kardashian walked into this program with nothing but a fierce desire to fight for justice,” Jackson said. “No law school lectures, no ivory tower shortcuts, just determination and a mountain of case log books to read.”
  
  Jackson also noted that over the six years Kardashian has dedicated “a total of 5,184 hours of legal study, that’s time she carved out while raising four children, running businesses, filming television shows and showing up in courtrooms to advocate for others.”
  
  Kardashian’s advocacy work in criminal justice has resulted in several people being released from prison, most notably Alice Marie Johnson, a first-time nonviolent drug offender, whose sentence Kardashian encouraged President Donald Trumpto commute in 2018, after Johnson had served 21 years.
  
  President Trumppardoned Johnson in 2020.
  
  In anotherslide, Kardashian is shown holding her certificate of completion on stage as her friends and family celebrated her. Kardashianalso included a photo of her late father, Robert Kardashian, an attorney who famously worked on his friend OJ Simpson’s trial.
