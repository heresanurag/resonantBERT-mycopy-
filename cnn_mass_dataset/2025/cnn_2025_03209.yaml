id: cnn_2025_03209
title: "France’s prime minister resigns after less than a month on the job"
date: "2025-10-06"
section: "Europe"
url: "https://www.cnn.com/2025/10/06/europe/france-prime-minister-sebastien-lecornu-resigns-intl?Date=20251006&Profile=cnnbrk&utm_content=1759737608&utm_medium=social&utm_source=twitter"
content: |
  French Prime Minister Sebastien Lecornu resigned Monday just hours after he unveiled his new cabinet, in a shock move that plunged the country further into political crisis.
  
  The prime minister – a key ally of embattled French President Emmanuel Macron – had not even been in office for four weeks, meaning he departs with the ignominious distinction of being the shortest-serving French prime minister since the Fifth Republic began.
  
  It’s the clearest sign yet that Macron has run out of road. After five prime ministers in less than two years – none able to build a stable majority – the country looks exhausted and increasingly done with him.
  
  Public frustration over austerity measures and a government seen as detached from everyday realities has only deepened. Macron himself still seems unable to digest the outcome of last year’s parliamentary elections, which sent a clear message: France has moved on from Macronism.
  
  Lecornu said Monday he is having final talks with political parties in an attempt to stabilize the country, with a deadline of Wednesday evening. Macron vowed to “take responsibility” if the talks fail, sources close to the French president told CNN affiliate BFMTV.
  
  Lecornu’s resignation underscores the paralysis that has gripped France since those inconclusive 2024 elections left no party with an outright majority.
  
  ﻿Macron now finds himself cornered, with few good options left; call a snap election or step down and trigger a new presidential election. Most expect him to opt for parliamentary elections – the lesser of several political risks. Some, however, point to a third path, appointing another prime minister this time from the left or the far right in a bid to rebuild an alliance. But after so many failed experiments in coalition, it’s unclear whether anyone still can.
  
  In a government reliant on fragile coalitions, every cog mattered. Barely 12 hours after announcing a cabinet that largely retained the same ministers, Lecornu faced backlash across the political spectrum, condemned by the both the left and the right, which had made significant gains in the last election.
  
  Lecornu had taken weeks to announce his chosen ministers, in what many assumed was an effort to present a more diverse, politically representative line-up. Speaking on Monday, he blamed a lack of compromise among parliamentary parties on his government’s collapse.
  
  He said that the “break” he had offered – his pledge to no longer use clause 49.3 of the French constitution to force through legislation without a vote – was insufficient for the other parties.
  
  “We didn’t need much to get there,” Lecornu said of negotiations with other parties to chart a path towards a workable government, adding that a lack of humility and “certain egos” got in the way. “There are lots of red lines in the mouths of some” but “there were rarely any green lines,” he added.
  
  “You can’t be prime minister when the conditions simply aren’t there,” Lecornu said. “Political parties keep acting as if each of them held a majority in the National Assembly.”
  
  Bruno Retailleau, leader of the Republicans – the traditional party of the French political right – who kept his post as interior minister in Lecornu’s government, reacted in outrage at his former colleague’s selection of ministers.
  
  “The composition of the government does not reflect the promised break,” he posted on X on Sunday night, referring to Lecornu’s promise to change direction from previous governments since the 2024 elections, which had leaned heavily on Macron party loyalists.
  
  Sunday’s cabinet was made up of 10 ministers from Macron’s party, even more than in Macron’s first government when he swept to power in 2017 with a new centrist party. Of its 15 ministers, Sunday’s cabinet featured no representation from the left-wing bloc or far-right party in the French parliament.
  
  Retailleau’s sentiment was echoed by the French far-right.
  
  “We said it clearly to the prime minister: it’s a break or it’s no confidence,” Jordan Bardella, president of the far-right National Rally, posted on X on Sunday night.
  
  Bardella blamed Macron for the government collapse, accusing him of choosing the cabinet and adding that Lecornu had no “margin of maneuver.” He called for the dissolution of the French parliament.
  
  ﻿“We’re at the end of the road, there’s no solution” Marine Le Pen, figurehead of the French far-right, said Monday. “We’re at the end of the joke,” she said, when asked if she could support another Macronist prime minister.
  
  There was plenty of anger on the left too. “This ephemeral government only shows one thing: Macronism plunges the country once again in chaos,” declared the spokesperson of France’s Socialist Party Arthur Delaporte Monday morning on X.
  
  Particular ire was directed at the appointment of former Finance Minister Bruno Le Maire to Lecornu’s former post heading up the French defense ministry. Le Maire had overseen a drastic spike in the national deficit during the Covid-19 pandemic.
  
  The French political instability is bad news for the country’s economy. The Paris stock exchange tumbled 1.7% on opening Monday morning, with concern growing over the upcoming budget.
  
  Already labored by national debt levels around double the European target, in September the French economy was downgraded by credit ratings agency Fitch.
  
  The government was due to submit a draft budget next week – a deadline that now looks impossible to meet.
  
  Without emergency legislation, missing the budget deadline could set France on a course towards a US-style budget shutdown, although that is still several months away.
  
  France is entering crisis mode again. It didn’t have to be this way
  
  Ludovic Subran, chief investment officer of Allianz, told CNN that he doesn’t think that Monday’s government collapse will have a major macroeconomic impact.
  
  Subran said that, without a prime minister, there’s a higher chance of having a continuation budget for 2026, without a major change in the country’s economic direction or a solution to its fiscal woes.
  
  “﻿I say it’s not a big change,” he said. “It’s even more of a standstill economic framework with even less room to maneuver. So by now it’s almost sure that next year will look a lot more complicated.”
  
  Yields on French government bonds – or the interest rate demanded by investors – have risen above those of Spanish, Portuguese and Greek bonds, which were once at the heart of the eurozone debt crisis. The bond yield Monday was at its highest level in 10 years.
  
  This is a developing story and has been updated.
