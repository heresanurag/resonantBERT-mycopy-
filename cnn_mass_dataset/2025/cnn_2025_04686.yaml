title: "Cambodia PM says he has nominated Donald Trump for Nobel Peace Prize"
date: "2025-08-07"
section: "World"
url: "https://www.cnn.com/2025/08/07/world/cambodia-trump-nobel-prize-intl-hnk"
content: |
  Cambodia’s prime minister said on Thursday he has nominated US President Donald Trump for the Nobel Peace Prize, lauding his “extraordinary statesmanship” in halting a border conflict between Cambodia and Thailand.
  
  Hun Manet made the announcement in a Facebook post late on Thursday, accompanied by a letter he said had been sent to the Norwegian Nobel Committee hailing Trump’sinterventionas an example of his “exceptional achievements in de-escalating tensions in some of the world’s most volatile regions”.
  
  “This timely intervention, which averted a potentially devastating conflict, was vital in preventing a great loss of lives and paved the way towards the restoration of peace,” the Cambodian leader wrote in the letter.
  
  It was a July 26 call by Trump to the leaders of both Thailand and Cambodia that broke the deadlock in efforts to end some of the heaviest fighting between the neighbors in recent history, Reuters has reported.
  
  That led to aceasefirenegotiated in Malaysia on July 28. The two countries agreed on Thursday to ensure no reigniting of hostilities and to allow observers from Southeast Asia.
  
  In total, 43 people were killed and more than 300,000 displaced by a five-day conflict that started with small arms fire and quickly escalated into heavy artillery and rocket fire, then Thailand’s deployment hours later of an F-16 fighter jet for airstrikes.
  
  The nomination had been expected after Cambodia’s deputy prime minister last week announced the plan, while thanking Trump for a tariff of 19% on Cambodian imports by the United States - sharply reduced from the previously threatened 49% that he said would have decimated its vital garment manufacturing sector.
  
  Pakistan said in June thatit would recommendTrump for the Nobel Peace Prize for his work in helping to resolve a conflict with India, and Israeli Prime Minister Benjamin Netanyahusaid last monthhe had nominated Trump for the award.
