  Unprovoked shark attacks are rare in the Bahamas, with just 34 recorded since 1580, according to the Florida Museum’sInternational Shark Attack File. This ranks the Caribbean country ninth among all tracked countries, with the US leading at 1,640 cases, followed by Australia with 706 and South Africa with 262, the data shows.
  
  However, last week’s incident is at least the third reported shark attack involving American tourists in the Bahamas since 2023.
  
  In January 2024, a10-year-old boy from Marylandwas bitten while participating in a shark tank expedition at a resort on Paradise Island, the police said. In December 2023, a44-year-old woman from Bostonwas fatally attacked by a shark while paddleboarding near a beach resort.
