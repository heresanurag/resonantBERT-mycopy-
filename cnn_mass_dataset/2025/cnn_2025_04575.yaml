title: "Democratic lawmakers press for answers from US firms involved in controversial Gaza aid organization"
date: "2025-07-31"
section: "Politics"
url: "https://www.cnn.com/2025/07/31/politics/democrats-letter-security-firms-gaza-aid"
content: |
  A group of Democratic lawmakers on Thursday pressed for answers from the heads of two private US-based companies whose personnel have worked at thecontroversial Gaza Humanitarian Foundationand who the lawmakers say have been accused of deadly violence against civilians seeking aid in the starving enclave.
  
  In aletterfirst obtained by CNN, Sens. Peter Welch and Chris Van Hollen and Reps. Joaquin Castro and Sara Jacobs express concern about reports the two companies, UG Solutions and Safe Reach Solutions, are involved with “deadly security operations in Gaza.”
  
  “Reports and firsthand witnesses have indicated to us that your personnel —American veterans hired as private security contractors—were brought into Israel on tourist visas inappropriate for the intended purpose of their travel, sent to Gaza armed for combat, and ordered by Israeli officials to use lethal force against unarmed and starving Palestinian civilians,” said the letter to the CEOs of the two companies.
  
  “We have also learned that under Israeli orders, your personnel are conducting crowd control at food distribution sites by firing live rounds over the heads of civilians and using stun grenades and pepper spray — all in an active military zone under direct supervision by Israeli military officers,” the letter said.
  
  “As a result, we are deeply concerned that you may have failed to alert your personnel — or investors — of the immense legal risks they face for conducting what amounts to military operations on behalf of the Israeli government on land outside of the State of Israel,” it said.
  
  A spokesperson for Safe Reach Solutions touted the Gaza Humanitarian Foundation’s delivery of “life-saving meals to civilians in one of the world’s most perilous humanitarian environments, where UN convoys are routinely looted and aid workers operate under constant threat.”
  
  “Against that backdrop, Safe Reach Solutions is proud to provide the logistical and operational expertise that has enabled the safe delivery of nearly 100 million meals to those in need,” the spokesperson said. “We look forward to responding to the Senators to help ensure they have the full picture, one grounded in facts, not misinformation, and to reaffirm our shared commitment to saving lives.”
  
  The lawmakers said they are seeking answers about the rules of engagement for personnel in Gaza and the extent to which staff and investors were informed of their potential exposure to lawsuits related to alleged war crimes and torture. They requested those answers within two weeks.
  
  The letters also asked the companies to “preserve all documents and communications related to (their) contracts and work with the Gaza Humanitarian Foundation.”
  
  The Gaza Humanitarian Foundation, a US and Israeli backed private organization established to provide aid amid the Israeli blockade of the Gaza Strip, has prompted an outcry and faced sharp criticism from international aid organizations over the operations of their distribution sites. Hundreds have been killed around the sites trying to get desperately needed food.
  
  US officials have defended the work of the foundation and argued it is the only organization that has been able to stop widespread looting of aid by Hamas. An internal USAID assessmentdid not find evidenceof systemic theft by Hamas.
