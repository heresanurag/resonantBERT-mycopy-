  Following the conclusion of the final [FIFA playoff results](https://www.cnn.com/2026/04/01/sport/italian-soccer-nightmare-italy-world-cup), [soccer](https://www.cnn.com/sport/soccer) fans now know which group their country will play in for the opening stages of the [2026 World Cup](https://www.cnn.com/2026/03/08/sport/donald-trump-world-cup-iran-analysis).
  
  FIFA has released the full schedule of games, so supporters know where their national teams are heading on particular days and what time they will play.
  
  Scroll down to find out when, where and who your country plays – as well as the result of all its matches. All times are listed in Eastern Time.
  
