  The Blue Ghost lander has been documenting its journey through space since it left Earth on January 15, sharing breathtaking imagery of the moon and Earth. Next up, Firefly looks to capture the lunar sunset on Sunday.
  
  During lunar sunsets, a mysterious phenomenon occurs when the moon’s horizonglows, which is believed to be caused by sunlight scattering through floating electrostatic particles,according to NASA.
  
  Firefly CEO Jason Kimhas told CNNthat he is looking forward to verifying this event.
  
  “There’s a phenomenon called thelunar horizon glowthat only theApollo 15and17 astronautshave seen with their eyes,” Kim said. “We’re going to be able to capture that in 4K-by-4K high-definition video and share that with the rest of the world.”
  
