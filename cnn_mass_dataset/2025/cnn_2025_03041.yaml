title: "Illinois deputy found guilty of murder in the shooting of Sonya Massey, a Black woman who called 911 asking for help"
date: "2025-10-29"
section: "US"
url: "https://www.cnn.com/2025/10/29/us/sonya-massey-verdict-deputy-guilty"
content: |
  A jury on Wednesday convicted an Illinois sheriff’s deputy of second-degree murder, a lesser charge, in the shooting death ofSonya Massey, a Black woman who called 911 to report a suspected prowler.
  
  Sean Grayson could be sentenced to up to 20 years in prison or even probation. The jury did not convict him of first-degree murder, a crime that carries a sentence of 45 years to life.
  
  “While we believe Grayson’s actions deserved a first-degree conviction, today’s verdict is still a measure of justice for Sonya Massey,” Ben Crump and Antonio Romanucci said after the seven-day trial.
  
  Grayson and another deputy arrived at Massey’s home in Springfield, Illinois, early on the morning of July 6, 2024, after she reported a prowler. Heshot the 36-year-old womanafter confronting her about how she was handling a pot of hot water she had removed from her stove.
  
  Grayson and his attorneys argued that he feared Massey would scald him with the hot water.
  
  Massey’s killing raised new questions about U.S. law enforcement shootings ofBlack people in their homes, and prompted a change inIllinois law requiring fuller transparencyon the background of candidates for law enforcement jobs.
  
  Grayson, 31, was charged with first-degree murder, but the jury was given the option of considering second-degree murder, which can apply when a defendant faces a “serious provocation” or believes their action is justified even if that belief is unreasonable. He is scheduled to be sentenced on January 29.
  
  State’s Attorney John Milhiser declined to comment as he left the courtroom.
  
  Body camera videorecorded by the other Sangamon County Sheriff’s deputy on the scene that morning, Dawson Farley, was a key part of the prosecution’s case. It showed Massey, who struggled with mental health issues, telling the officers, “Don’t hurt me,” and repeating, “Please God.”
  
  When the deputies entered the house, Grayson saw the pot on the stove and ordered Massey to move it. Massey jumped up to retrieve the pot and she and Grayson joked about how he said he was backing off from the “hot, steaming water.” Massey then replied, “I rebuke you in the name of Jesus.”
  
  Both Grayson and Farley drew their pistols and yelled at Massey to put the pot down. Grayson told investigators he thought her“rebuke” meant she intended to kill himand, in the following commotion, fired three shots, striking Massey just below the eye.
  
  Farley testified that Massey didn’t say or do anything thatcaused him to view her as a threat. But under cross-examination, he acknowledged that he initially reported to investigators that he feared for his safety because of the hot water. Farley did not fire his weapon and was not charged.
  
  Grayson, who was subsequently fired, testified in his own defense and was the first witness called by his attorneys. He told jurors he noticed the bottom of the pot was red and he believed Massey planned to throw the water at him. He said Massey’s words felt like a threat and that he drew his gun because officers are trained to use force to get compliance.
  
  “She done. You can go get it, but that’s a head shot,” Grayson told Farley after the shooting. “There’s nothing you can do, man.”
  
  Grayson relented moments later and went to get his medical kit while Farley found dish towels to apply pressure to the head wound. When Grayson returned, Farley told him his help wasn’t necessary, so he threw his kit on the floor and said, “I’m not even gonna waste my med stuff then.”
  
  Massey’s death also forced the early retirement of the sheriff who hired Grayson and generated aU.S. Justice Department inquiry. The federal probe was resolved with Sangamon County Sheriff’s Department’s agreement to fortify training, particularly de-escalation practices; develop a program in which mental health professionals can respond to emergency calls; and to generate data on use-of-force incidents.
  
  Massey’s family settled a lawsuit against the county for$10 millionand state lawmakers changedIllinois law to require fuller transparencyon the background of candidates for law enforcement jobs.
