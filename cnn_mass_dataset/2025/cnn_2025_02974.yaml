title: "Measles outbreak expands in West Texas around county with low vaccination rate"
date: "2025-02-07"
section: "Health"
url: "https://www.cnn.com/2025/02/07/health/west-texas-measles-outbreak"
content: |
  A measles outbreak is growing in a rural area of West Texas where vaccination rates are well below the recommended level.
  
  In late January, two children in Gaines County were hospitalized for measles. On Wednesday, the state health department shared in ahealth alertthat the number of confirmed cases had grown to six.
  
  How measles, whooping cough, and worse could roar back on RFK Jr.’s watch
  
  As of Friday afternoon, the outbreak has jumped to 14 confirmed cases and six probable cases among people who are symptomatic and had close contact with infected individuals, Zach Holbrooks, executive director of the South Plains Public Health District, told CNN.
  
  Investigations are ongoing, as cases have been identified in parts of the region that are outside the Gaines County lines where the first cases were reported.
  
  All the cases are believed to be among people who are not vaccinated against measles, Holbrooks said, and most of them are in children.
  
  Arecord shareof US kindergartners had an exemption for required vaccinations last school year, leaving more than 125,000 new schoolchildren without coverage for at least one state-mandated vaccine, according todatapublished by the US Centers for Disease Control and Prevention in October.
  
  The US Department of Health and Human Services has set agoalthat at least 95% of children in kindergarten will have gotten two doses of the measles-mumps-rubella (MMR) vaccine, a threshold necessary to help prevent outbreaks of the highly contagious disease. The US has now fallen short of that threshold for four years in a row.
  
  MMR coverage is particularly low in Gaines County, where nearly 1 in 5 incoming kindergartners in the 2023-24 school year did not get the vaccine. The 18% vaccine exemption rate for the county is one of the highest in the state, according todatafrom the Texas Department of State Health Services.
  
  At the state level, vaccine exemptions were highest in Idaho, where more than 14% of incoming kindergartners did not have their required shots, according to CDC data from last school year. Texas overall was slightly above the national average, with about 4% exemptions.
  
  Measles is an airborne disease that can cause serious health consequences, including death,especially for youngand unvaccinated children.
  
