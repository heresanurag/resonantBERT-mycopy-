title: "Macron dismisses viral video showing apparent shove from wife Brigitte"
date: "2025-05-26"
section: "Europe"
url: "https://www.cnn.com/2025/05/26/europe/macron-brigitte-shove-vietnam-intl?iid=cnn_buildContentRecirc_end_recirc"
content: |
  French PresidentEmmanuel Macronhas dismissed a viral video showing his wife Brigitte pushing his face away as they disembarked from a plane in Vietnam for the first leg of a Southeast Asia tour.
  
  Speaking to reporters in Hanoi on Monday, Macron addressed the clip directly, pushing back against the speculation it sparked.
  
  “There’s a video showing me joking and teasing my wife and somehow that becomes a sort of geo-planetary catastrophe, with people even coming up with theories to explain it,” the president said.
  
  Macron acknowledged the footage was genuine but criticized how it had been weaponized. “The videos are all real, and yes, sometimes people tamper with them, but people are attributing all kinds of nonsense to them.”
  
  The short clip shows the aircraft door opening withMacronappearing in the doorway. Seconds later, both of Brigitte Macron’s hands reach out from the side and press against the president’s face in what looks like a sudden shove.
  
  Macron appears momentarily surprised but quickly regains his composure and waves to the press outside.
  
  As the couple descend the steps, Macron offers Brigitte his arm, which she does not take, opting instead to hold the railing.
  
  The Élysée initially denied the incident on the plane, before later moving to downplay its significance.
  
  The couple were merely bickering, a source close to the president told CNN affiliate BFM TV. It was a “moment of togetherness,” according to an Élysée source.
  
  “It was a moment when the president and his wife were unwinding one last time before the trip began, playfully teasing each other,” the source told CNN Monday.
  
  “No more was needed to feed the mills of the conspiracy theorists,” the source added, saying pro-Russian trolls were quick to spin the moment into controversy.
  
  Macron has been at the forefront of efforts to agree a coordinated European response to defending Ukraine following Russia’s full-scale invasion in 2022.
  
  The incident in Hanoi comes as Macron faces another swirl of online disinformation. Earlier this month the Élysée dismissed as “fake news” a viral claim - amplified by Kremlin officials - that the French president was using cocaine aboard a train to Kyiv alongside German Chancellor Friedrich Merz and UK Prime Minister Keir Starmer.
  
  The rumor, traced back to pro-Russian accounts, falsely claimed a crumpled tissue Macron picked up was a cocaine bag. The Élysée posted arebuttalonline with the caption: “This is a tissue. For blowing your nose… When European unity becomes inconvenient, disinformation makes a simple tissue look like drugs.”
  
  The Kremlin’s foreign ministry spokesperson Maria Zakharova fueled the claim, suggesting the scene was part of a wider European dysfunction. French officials condemned the campaign as part of ongoing efforts by Moscow to weaken Western unity on Ukraine and manipulate peace discussions through false narratives and social media manipulation.
