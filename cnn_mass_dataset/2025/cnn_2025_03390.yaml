id: cnn_2025_03390
title: "1 killed, 3 injured after small planes collide midair at Colorado airport"
date: "2025-09-01"
section: "US"
url: "https://www.cnn.com/2025/09/01/us/small-plane-collision-colorado-fort-morgan-hnk?cid=ios_app"
content: |
  One person was killed and three others injured after two small planes collided in midair by the Fort Morgan Municipal Airport in northeast Colorado, authorities said.
  
  A Cessna 172 and an Extra Flugzeugbau EA300 collided while both pilots were attempting to land on Sunday morning, the Federal Aviation Administration said in a statement. Two people were aboard each plane.
  
  Emergency responders reported seeing “black smoke” and “active flames,” according to dispatch audio recorded on the websiteBroadcastify. At least one person was “trapped in one of the planes,” according to the recording.
  
  Footage fromCNN affiliate KMGHshows one of the two planes wrecked on the side of a runway, surrounded by black ash and fluid.
  
  The two occupants of the Cessna survived with minor injuries, theMorgan County Sheriff’s Officesaid in a post on Facebook. One occupant of the other plane was pronounced dead at the scene and the second person from that plane was taken to the hospital.
  
  Both the FAA and National Transportation Safety Board are investigating.
