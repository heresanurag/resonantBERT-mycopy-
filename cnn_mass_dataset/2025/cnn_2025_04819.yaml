title: "Prices are changing. See how much the cost of basic grocery items has shifted"
date: "2025-02-08"
section: "Business"
url: "https://www.cnn.com/2025/02/08/business/tracking-us-food-prices-eggs-dg?iid=cnn_buildContentRecirc_end_recirc&recs_exp=up-next-article-end&tenant_id=related.en"
content: |
  The cost of food in the USincreased significantlyamid the Covid-19 pandemic and the steep inflation that followed. While priceshave stabilized more recently, avian flu drove up the cost of eggs earlier this year, and the price of coffee has continued an upward trajectory for several months now, because of extreme weather. The cost of steak is also on the rise for avariety of factors.
  
  President Donald Trump’s ongoing,chaotic global tariff rollouthas also threatened to increase prices for other common household foods.
  
  The costs for some products could remain volatile, but the overall trend shows prices have largely stabilized. For example, government economists also track inflation for foods Americans eat at home to better understand price trends across all products at the grocery store.
  
  That measure, a subset of the broaderConsumer Price Index, shows that food inflation overall has come down significantly since the Covid-19 peak, with more recent ratescloser to historical norms.
  
  The graphics on this page will automatically update as new data becomes available each month.
