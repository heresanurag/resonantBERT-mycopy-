title: "SoftBank will invest $2 billion into Intel"
date: "2025-08-18"
section: "Business"
url: "https://www.cnn.com/2025/08/18/business/softbank-invest-intel-two-billion-dollars?cid=external-feeds_iluminar_yahoo"
content: |
  Japan’s SoftBank willinvest $2 billion into struggling American chipmaker Intel, the two companies announced Monday.
  
  SoftBank will pay $23 per share of Intel common stock (INTC),according to a statement from the companies. Intel shares rose 6% in after-hours trading.
  
  The news comes just days after reports thatthe White House is discussingtaking a stake in Intel.ReportsonMonday put the government’s possible stake at 10% of the chipmaker, worth roughly $10.5 billion.
  
  The once-formidable Intel hasfallen behind its rivalsafter failing to adapt to technology advances.
  
  President Donald Trump and Intel CEO Lip-Bu Tan met last week following reports and allegations that the latter has ties to China. Trump described that meeting as meeting “very interesting” and said Tan’s “success and rise is an amazing story.”
  
  Tan has been attempting a turnaround at the company since he took over in March. His plans includelaying off 15%of Intel’sstaff, which the company said it had nearly completed last month.
