title: "The ‘white-collar bloodbath’ is all part of the AI hype machine"
date: "2025-05-30"
section: "Business"
url: "https://www.cnn.com/2025/05/30/business/anthropic-amodei-ai-jobs-nightcap?cid=external-feeds_iluminar_yahoo%5C%5C%5C"
content: |
  A version of this story appeared in CNN Business’ Nightcap newsletter. To get it in your inbox, sign up for freehere.
  
  If the CEO of a soda company declared that soda-making technology is getting so good it’s going to ruin the global economy, you’d be forgiven for thinking that person is either lying or fully detached from reality.
  
  Yet when tech CEOs do the same thing, people tend to perk up.
  
  ICYMI: The 42-year-old billionaire Dario Amodei, who runs the AI firm Anthropic,told Axiosthis week that the technology he and other companies are building could wipe outhalfof all entry-level office jobs … sometime soon. Maybe in the next couple of years, he said.
  
  He reiterated that claimin an interviewwith CNN’s Anderson Cooper on Thursday.
  
  “AI is starting to get better than humans at almost all intellectual tasks, and we’re going to collectively, as a society, grapple with it,” Amodei told Cooper. “AI is going to get better at what everyone does, including what I do, including what other CEOs do.”
  
  To be clear, Amodei didn’t cite any research or evidence for that 50% estimate. And that was just one of many of the wild claims he made that are increasingly part of a Silicon Valley script:AI will fix everything, but first it has to ruin everything.Why?Just trust us.
  
  In this as-yet fictional world, “cancer is cured, the economy grows at 10% a year, the budget is balanced — and 20% of people don’t have jobs,” Amodei told Axios, repeating one of the industry’s favorite unfalsifiable claims about a disease-free utopia on the horizon, courtesy of AI.
  
  But how will the US economy, in particular, grow so robustly when the jobless masses can’t afford to buy anything? Amodei didn’t say.
  
  (As an aside: I asked labor economist Aaron Sojourner about this scenario of high unemployment plus strong economic growth, and he said thereisa theory of the case, if you squint really hard. Amodei may believe that AI can increase productivity and make each hour of labor create more goods and services. But if that’s the case, he’s imagining “a 30% jump in labor productivity to get that combination of unemployment and GDP growth,” said Sojourner, a senior researcher at the W. E. Upjohn Institute for Employment Research. “That is a wildly unprecedented vision,” he added, noting that in the 1980s and 90s, computer adoption gave the world all kinds of tools that reshaped the labor market. But labor productivity grew just 2% to 3%.)
  
  Anyway. The point is, Amodei is a salesman, and it’s in his interest to make his product appear inevitable and so powerful it’sscary. Axios framed Amodei’s economic prediction as a “white-collar bloodbath.”
  
  Even some AI optimists were put off by Amodei’s stark characterization.
  
  “Someone needs to remind the CEO that at one point there were more than (2 million) secretaries. There were also separate employees to do in office dictation,” wrote tech entrepreneurMark Cuban on Bluesky. “They were the original white collar displacements. New companies with new jobs will come from AI and increase TOTAL employment.”
  
  Little of what Amodei told Axios was new, but it was calibrated to sound just outrageous enough to draw attention to Anthropic’s work, days after it released a major model update to its Claude chatbot, one of the top rivals to OpenAI’s ChatGPT.
  
  Amodei stands to profit off the very technology he claims will gut the labor market.But here he is, telling everyone the truth and sounding the alarm! He’s trying to warn us, he’s one of the good ones!
  
  Yeaaahhh. So, this is kind of Anthropic’s whole ~thing.~ It refers to itself primarily as an “AI safety and research” company. They are the AI guys who see the potential harms of AI clearly — not through the rose-colored glasses worn by the techno-utopian simps over at OpenAI. (In fact, Anthropic’s founders, including Amodei, left OpenAI over ideological differences.)
  
  Look, I want to live a cancer-free utopia where I only have to work a few hours a week and there’s no poverty and stuff justworks. But do I believe that generative AI is the key to unlocking that fantasyland? I do not. And no tech pioneers have proven their case.
  
  Generative AI from large language models like ChatGPT and Claude arereallygood at somevery specificstuff: They can summarize documents, write dumb emails, help kids cheat on their homework, and even recommend summer reading lists so obscurenot even the authors knewthey’d written them. Heck, they could probably generate this newsletter and mimic my voice.
  
  But they hit their limits fast. Theyhallucinate. They getbasic factswrong. They are susceptible tomanipulation. (And those are all things we human beings can do just fine on our own.)
  
  If AI companies can take these handy, quasi-reliable text predictors and turn them into an economic revolution, fine. But that seems so far off in the future that Amodei’s warnings feel more like an ad than a PSA. It’s on them to show their work: Show us how AI could be so destructiveandhow Anthropic can fix it — rather than just shouting about the risks.
