title: "5 things to know for July 2: USAID, Ukraine munitions, Trump megabill, Climate change, Paramount settlement"
date: "2025-07-02"
section: "US"
url: "https://www.cnn.com/2025/07/02/us/5-things-to-know-for-july-2-usaid-ukraine-munitions-trump-megabill-climate-change-paramount-settlement"
content: |
  Tennessee teens who pick on their classmates may soon have to walk to school. Anew state lawthat took effect this week will give courts the ability to suspend a minor’s driver’s license for up to a year if found guilty of bullying or cyberbullying.
  
  Here’s what else you need to know toGet Up to Speed and On with Your Day.
  
  The dismantling of the US Agency for International Development (USAID), as ordered by President Donald Trump and enacted by the Department of Government Efficiency, has seen funding for thousands of foreign assistance programs frozen or slashed. Now, a new study estimates that the loss of that funding could result inmore than 14 million additional deathsby 2030. Nearly a third of those deaths —more than 4.5 million— are estimated to be among children younger than 5. The authors of the study said the effects of the cuts would be similar in scale to a global pandemic or a major armed conflict.
  
  The Trump administration haspaused some shipments of weapons, including air defense missiles, to Ukraine. The decision to halt such shipments comes as Russia hasintensified its near-nightly air attacks on Ukraine, often using hundreds of drones and missiles. Since Russia first invaded in 2022, the US has been the single biggest donor of military aid to Ukraine. However, after President Trump returned to power, US support for Kyiv shifted. White House Deputy Press Secretary Anna Kelly said the decision to pause the weapons shipments was made “to put America’s interests first.”
  
  The Senatepassed President Trump’s sweeping domestic agenda billon Tuesday after Vice President JD Vance broke a 50-50 tie. Thecontroversial legislationwill infuse more money into the Pentagon and border security agencies, downsize safety-net programs like Medicaid and add nearly $3.3 trillion to the deficit over a decade, according to an estimate from the Congressional Budget Office. As the bill heads back to the House, GOP leaders are racing to get it approved and on the president’s desk by July 4.
  
  In an effort to eliminate all climate-related research work at NOAA, the Trump administration’s proposed budget willdefund the Mauna Loa laboratoryin Hawaii. Since the 1950s, scientists at that lab have gathered the most conclusive evidence of human-caused climate change that’s driving sea level rise, supercharging weather and destroying food systems. The budget proposal would also defund many other climate labs, including instrument sites comprising the US government’s greenhouse gas monitoring network, which stretches from northern Alaska to the South Pole.
  
  CBS News parent company Paramount Global said late Tuesday it hasagreed to pay $16 millionto resolve a lawsuit filed by President Trump over a “60 Minutes” news report last fall. Although legal experts agreed that the suit wasfrivolous and dangerous— and CBS defended “60 Minutes” on First Amendment grounds — corporate priorities outweighed journalistic principles. Paramount has been trying for months to complete a lucrative merger with Skydance Media, but the deal required approval from the Trump administration. Paramount said the lawsuit was “completely separate from, and unrelated to, the Skydance transaction and the FCC approval process.” Nevertheless, Shari Redstone, Paramount’s controlling shareholder, stands to make hundreds of millions of dollars if the deal goes through.
  
  Too darn hotA marine heat wave in the Mediterranean Sea that combined with a powerful heat dome is causing Europe to swelter. Even the Eiffel Tower in Parishad to close.
  
  Popular performer injuredRed Panda was doing her halftime show at the WNBA Commissioner’s Cup final between the Indiana Fever and the Minnesota Lynx on Tuesday night when shefell off her unicycle, which stretches about 8 feet above the court.
  
  Let’s dive into itThe new Netflix documentary,“Shark Whisperer,”has people talking. Is conservationist Ocean Ramsey bringing attention to the plight of sharks or is she risking her life for fame?
  
  What’s in a name?Actor Rob McElhenney (“It’s Always Sunny in Philadelphia,” “Welcome to Wrexham”) has decided to legallychange his name.
  
  Egg-cellent newsRemember when Waffle House added an egg surcharge after the price of eggs soared due to bird flu? Well, that surcharge is officiallyoff the menu.
  
  Televangelist Jimmy Swaggart dies at 90
  
  Swaggartbecame a household nameand amassed an enormous following with his multimillion-dollar ministry, only to see it all undone by a sex scandal.
  
  6 millionThat’s how many customers may have had their personal data exposed after a third-party customer service platform used by Australian airline Qantas washacked
  
  “Every member of Congress who campaigned on reducing government spending and then immediately voted for the biggest debt increase in history should hang their head in shame!”
  
  — Elon Musk,venting his anger on X over President Trump’smassive spending bill.
  
