title: "Mark Sanchez booked and released from custody, breaks silence following Indianapolis fight"
date: "2025-10-12"
section: "Sport"
url: "https://www.cnn.com/2025/10/12/sport/mark-sanchez-released-booked-indianapolis?recs_exp=news-%26-buzz-right-rail&tenant_id=popular.en&iid=cnn_buildContentRecirc_end_recirc"
content: |
  Former NFL quarterbackMark Sanchezwas booked and released at the Marion County Jail in Indiana on Sunday, according to the Indianapolis Metropolitan Police Department.
  
  While leaving, the 38-year-old spoke to reporters upon release, thanking first responders for helping save his life.
  
  How an altercation between Mark Sanchez and a truck driver revealed the pressure on the leaders of America’s big cities
  
  “But I’m focused on my recovery, and I just want to see my wife, I want to see my son, my two baby girls,” Sanchez said.
  
  Sanchez is facing a felony charge for his role in analtercationthat led to the former New York Jet being stabbed last week.
  
  Marion County, Indiana, prosecutor Ryan Mears said earlier this week thatfurther investigationby police led to the more severe charge. Sanchez had initially been charged with three misdemeanors as a part of the incident. Mears said he now faces a charge of felony battery involving serious bodily injury, which carries a maximum sentence of between one and six years in prison.
  
  According to Mears, the dispute between Sanchez and a truck driver began over a parking space.
  
  Sanchez did not comment on any charges he is facing or if he wanted to say anything to the driver, Perry Tole, on Sunday, adding “there will be a day to answer all these questions.”
  
  Tole, the 69-year-old man involved in the incident, filed a lawsuit against Sanchez and others on Monday.Tole and his attorneys allege civil counts of assault/battery and negligent hiring, retention and supervision. The lawsuit does not seek a specific amount of damages rather it asks for the amount awarded to be determined at trial.
  
  After starring at quarterback for the USC Trojans, Sanchez played in the NFL for 10 seasons with the New York Jets and several other teams, retiring after the 2018 season. Sanchez joined FOX Sports in 2021 as a game analyst.
