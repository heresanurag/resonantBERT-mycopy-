title: "Trump wants to revive US manufacturing. That’s not so easy"
date: "2025-04-10"
section: "Business"
url: "https://www.cnn.com/2025/04/10/business/manufacturing-us-jobs-trump-tariffs?cid=ios_app.%20This%20isn%E2%80%99t%20original%20but%20if%20he%20wanted%20those%20type%20of%20jobs%20returned%20that%20Americans%20no%20longer%20want%20why%20did%20he%20just%20destroy%20our%20migrant%20workforce?"
content: |
  In 1970, more than a quarter of American workers held jobs in the manufacturing sector. Today, it’s only about8%.
  
  The Trump administration sayssweeping tariffswill reverse this decades-long decline. But a vision of reinvigorated factory towns and assembly lines that defined America 50 years ago may be out of step with the realities of 2025.
  
  One of the tariff plan’s architects, White House senior counselor Peter Navarro, says the plan’s “endgame” is “to fill up all of the half-empty factories that now are operating at low capacities around Detroit and the greater Midwest area.”
  
  Yet America is far different now compared to the Rust Belt’s glory days five decades ago, when millions of workers were employed to perform specific tasks along assembly lines. Today, in an age of automation and artificial intelligence, factory floors are increasingly filled with robots doing that work instead. That means new and reopened US factories will require fewer workers with more specialized skills.
  
  “The job has very much changed, and yes, there has been a dynamic change in the number of workers needed to it,” said Carolyn Lee, the executive director of the Manufacturing Institute, the workforce development and education affiliate of the National Association of Manufacturers (NAM).
  
  That means the president’s tariff policies, which have been met with resistance by somein the business communityand haveroiled global stock markets, may only be one piece of an effort to usher in the manufacturing renaissance the Trump administration hopes for. If tariffs successfully push companies to expand their manufacturing capabilities in the US, experts say the challenge will be training Americans to work in modern manufacturing roles — and getting them interested in doing so.
  
  The story of the long, slow loss of manufacturing jobs has loomed large in the US. In the decades after World War II, the US led the world in manufacturing. But over the last 50 years, those jobs have largely moved abroad, and many US factories shut down or stalled, devastating the economic prospects of entire towns and cities in the country’s Rust Belt.
  
  Trump has long railed against the loss of America’s manufacturing prowess, and last week he used it as both a backdrop and a rallying cry whenannouncing the most extensive tariff package in at least a century: a baseline10% tariffapplied across all countries, with even higher rates for the 60 countries Trump’s administration deemed the “worst offenders.”
  
  “American steel workers, auto workers, farmers and skilled craftsmen… They watched in anguish as foreign leaders have stolen our jobs, foreign cheaters have ransacked our factories,” Trump said during the announcement from the White House Rose Garden last week.
  
  It’s still up for debate whether free trade is predominantly to blame for the decline in US manufacturing, though, asseveralstudieshave pointed to automation leading to more job losses than outsourcing.
  
  Even so, the US manufacturing sector had been on a modest rebound before Trump’s tariff announcement. Several companies — including Nvidia, Apple and Stellantis — have announced investments in American manufacturing in recent months, for which the White Housetook credit.
  
  But with theunemployment rateat 4.2%, there are more open manufacturing jobs than there are willing Americans to fill them.
  
  As of February 2025, there were 482,000 manufacturing job openings, according to the latest Job Openings and Labor Turnover Survey. In a report from last year, the Manufacturing Institute and Deloitte estimated that there would be 1.9 million unfilled jobs in manufacturing by 2033.
  
  Investments in US manufacturing would likely push the number of unfilled jobs even higher.
  
  Many modern manufacturing jobs will require knowledge of software, data analytics and coding, Lee said. Other positions will require workers who can repair the robots on a factory floor. While many of these jobs won’t necessitate a college degree, they do require certifications and training, she added.
  
  “There’s no one kind of manufacturing job, but the thing that is common to every one of these jobs is that they will require skills,” said Lee. “The majority of the jobs in the sector are not entry-level jobs that have no skills.”
  
  Olaf Groth, who teaches about the future of the global economy at the Haas School of Business at the University of California, Berkeley, said that he agrees with efforts to reshore manufacturing, but they should be coupled with efforts to ensure America’s workers are prepared for the work.
  
  “The skills US workers have are mismatched for manufacturing right now,” Groth said. “What we need to do is lift the majority of American labor from mid-skilled to high-skilled.”
  
  Meanwhile, critics say tariffs may hurt many of the workers they claim to protect. Higher tariffs oftentranslate into higher prices, which often hit lower-income families the hardest.
  
  “At the end of the day, tariffs are a tax on imports,” a February note from JPMorgan read. “The tax incidence nearly always falls on domestic sellers and consumers, not foreign producers.”
  
  When Trump announced tariffs on $34 billion worth of imports from China during his first term in 2018, Ravin Gandhi, then the CEO of GMM Nonstick Coating, a supplier of nonstick coatings for cookware, was a vocal opponent of the policy, arguing the tariffs would make his products more expensive for American consumers.
  
  Gandhi left his role at GMM last year to work in venture capital investing. Since then, his opinion on tariffs has evolved. He now supports the president’s efforts to bring manufacturing back to the US through tariffs.
  
  Gandhi said there was one theme he had been hearing from friends and colleagues: “Robots and automation.”
  
  “I have so many friends who are manufacturing entrepreneurs, and they are raving about the cost savings that they’re seeing as they start to automate,” he added. “These are machines. They don’t need breaks. They don’t need Christmas off.”
  
  Gandhi said that he had already seen automation replace some of GMM’s manufacturing jobs before he left his post as CEO, but he remains optimistic that new technology will usher in new kinds of jobs for American workers.
  
  “I’m a techno-optimist. I do believe that five years from now, there are going to be wide swaths of jobs that don’t exist today that you can’t even fathom,” he said.
  
  It’s a question that extends beyond the Rust Belt. Artificial intelligencethreatens to disrupt a significant number of American industries, not just manufacturing, and many experts are pondering which types of jobs will be needed amid a technological upheaval. A January World Economic Forum survey found that 41% of employers across all industries intend to downsize their workforce as AI automates certain tasks.
  
  “We need to define what are the impacts of industrial AI and what those impacts will be on workers and skills,” said Lee of the Manufacturing Institute. “In the absence of knowledge, I think there’s a lot of fear and worry. We need to be able to help train the people in the skills they’ll need.”
