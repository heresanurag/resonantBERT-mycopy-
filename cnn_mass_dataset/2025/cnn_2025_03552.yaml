title: "How to see the Ursids, the final meteor shower of 2025"
date: "2025-12-20"
section: "Science"
url: "https://www.cnn.com/2025/12/20/science/ursid-meteor-shower"
content: |
  The Ursid meteor shower, which marks the final celestial event of the year, will peak between Sunday night and early Monday morning.
  
  Sky-gazers can expect to see five to 10 meteors per hour between midnight and 5 a.m. ET Monday, or between 9 p.m. PT Sunday and 2 a.m. PT Monday, said Robert Lunsford, fireball report coordinator for theAmerican Meteor Society.
  
  The meteor shower will peak around the time of the winter solstice, or the official beginning of winter in the Northern Hemisphere, when it is the farthest from the sun.
  
