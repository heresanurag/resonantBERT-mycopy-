title: "John Brenkus, founder and host of Emmy-winning ‘Sports Science’ show, dies aged 54 after battle with depression"
date: "2025-06-02"
section: "Sport"
url: "https://www.cnn.com/2025/06/02/sport/john-brenkus-death-sports-science-spt-intl"
