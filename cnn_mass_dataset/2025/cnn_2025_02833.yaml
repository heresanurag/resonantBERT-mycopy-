title: "Fact check: 10 debunked lies Donald Trump has repeated in the last week alone"
date: "2025-08-29"
section: "Politics"
url: "https://www.cnn.com/2025/08/29/politics/fact-check-trump-ukraine-inflation?iid=cnn_buildContentRecirc_end_recirc&recs_exp=up-next-article-end&tenant_id=related.en"
content: |
  President Donald Trump keeps saying the same false things over and over.
  
  Trump’s lying has always been notable for its audacity – his willingness to make obviously untrue claims that can be very quickly debunked. But it has also beendistinguished by its repetitiveness– his unwillingness to stop deploying an exaggerated statistic, baseless accusation or fictional tale after months or even years of debunkings.
  
  Trump has for years hadpersistently poorpoll results on the question of whether he is honest and trustworthy; part of the reason may well be his unwavering devotion to assertions that many Americans already know aren’t true.But his relentlessness also works for him in a way. Because news outlets are naturally focused on new material, some may fact-check a falsehood the first time Trump says it but not the 10th or 100th time. By shamelessly persevering, Trump can eventually get his greatest hits out there with little pushback.
  
  The president’s recent public remarks have featured many old lies. In the interest of not letting them go uncorrected, here is a look at 10 debunked claims he repeated over the past week alone.
  
  Trump, talking about gas prices,saidat a Cabinet meeting on Tuesday, “There’s some places it’s $2. It’s even – it broke $2 in a couple of locations in the South.”
  
  Not true, just as Trump’snumerouspreviousclaimsof $2-or-less gas haven’t been true.
  
  There was no state whose average price for regular gas on Tuesday was below Mississippi’s $2.69 per gallon, according todata published by AAA, and the firm GasBuddy said it did not see a single station, out of the tens of thousands it tracks across the country, that was selling a gallon for $2 or less at the time Trump spoke. (Some drivers get special discounts.) The AAA national average on Tuesday was $3.19 per gallon.
  
  Trumpclaimedin early August: “You know, we’ve cut drug prices by 1,200, 1,300, 1,400, 1,500%. I don’t mean 50%. I mean 14-, 1,500%.”CNNandotherspointed out that this is not only inaccurate but does not make mathematical sense, since a 100% price cut would make the drugs free and a cut of 1,200% or more would presumably mean Americans would be getting paid to buy medications.
  
  Trump has continued using the fake figures anyway.
  
  Hepromised Mondaythat “I’m going to be reducing drug prices by 1,400 to 1,500%,” thenTuesdaythat “we’re not talking about a 25% cut or a 50 – we’re talking about a 1,500% cut.”
  
  There is inflationin the United States. Prices were 2.7% higher in July than they were a year prior and 0.2% higher than they were in June. One can debate how good or bad those figures are. But Trumpsaid Tuesday, as hehasrepeatedlythis summer, that “there’s no inflation.”
  
  Trump briefly used softer rhetoric in mid-August,declaringthat “our inflation is down to a perfect number, a beautiful number, hardly any at all.” This subjective language didn’t hold. The very next day, Trumpreturnedto his regular assertion that “we don’t have inflation.”
  
  To support hisproposalto eliminate the use of mail-in ballots, Trump last Monday revived hisfalse claimthat the US is the world’s only country where mail-in voting exists. The claim was promptly debunked, again, byCNNandothers; dozens of countries use mail-in ballots, includingCanada, theUnited Kingdom,Germany,AustraliaandSwitzerland.
  
  Trump thenrepeatedthe claim in an interview with a supportive radio host three days later. “We’re the only one in the whole world that uses them,” he said.
  
  On Tuesday, Trumptold his usual storyabout how “now they have water” in Los Angeles because he “turned the valve” to send the city water instead of having that “valve” direct the water to the Pacific Ocean.
  
  The story is nonsense – as experts in California water policy have pointed outfor months.
  
  First,there isno single “valve”that controls California water flows. Second, what Trump actually did in late January and early February was send billions of gallonspointlessly releasedfrom two dams in one part of the state’s Central Valley toanother part of that valley, more than 100 miles north of Los Angeles. The water did not go to Los Angeles, whichhas no automatic connection to the dams.
  
  Approaching five years after he legitimately lost the legitimate 2020 election, Trump continues to lie about it. Hereferred Mondayto former President Joe Biden as “a guy that got in there with a fraudulent election,” andsaidThursday that “I knew the election was rigged and now we found that out definitively, as you can see.”
  
  Nobody has found that out because it is definitively false.
  
  Trump also repeated another lie he has been telling since 2020 – his assertion that he signed a “law” or “statute” that year that imposed an automatic sentence of “10 years in prison” to people who damaged monuments.
  
  Trump has kept telling the false story anyway. Upon signing anexecutive orderMonday telling the attorney general to try to find a way, withoutviolating the First Amendment, to crack down on people who have burned the American flag, the president claimed without any apparent basis that offenders would now  “get one year in jail” – and he repeated his old fiction about signing harsh monument legislation. “Just like when I signed the statute and monument act,” he said. “Ten years in jail if you hurt any of our beautiful monuments.”
  
  For months, Trump has claimed the US has given “$350 billion” in wartime aid to Ukraine even thoughnumerousfactchecksnoted that this is a wild exaggeration. Trumpmade the “$350 billion” claim five timesat a single event on Monday.
  
  The real figure is much smaller than what Trump’s number.
  
  A German think tank that has closelytrackedwartime aid to Ukraine says the US allocated about $133 billion to Ukraine (and had committed about $5 billion more) from late January 2022 through June 2025. The website of the US government inspector general overseeing the federal Ukraine responsesaysthe US had disbursed about $90 billion for the response through March 2025 (and had appropriated about $95 billion more), including money that was spent in the US and in broader Europe rather than Ukraine itself.
  
  When CNN asked the White House earlier this month about Trump’s claims that the US had provided Ukraine itself with “$350 billion,” an officialtried to justifythe figure by adding in a bunch of things that are not actually aid to Ukraine – including, absurdly, the cost of US inflation to American households after the Russian invasion.
  
  Trump repeated his long-debunked “$350 billion” Ukraine-aid figure while sitting beside Ukrainian President Volodymyr Zelensky last week. Then, this Monday, he repeated hislong-debunkedstory about US relations with South Korea while sitting beside South Korean President Lee Jae-myung.
  
  Speaking of the presence of more than 26,000 American military personnel in South Korea, Trumpsaid, “As you know, South Korea agreed to pay for that during my last term. And then when Biden came in, they complained to Biden that I wasn’t a nice person and he agreed not to pay. He gave up billions of dollars. We were getting paid billions of dollars, but then Biden ended that for whatever reason. It’s unbelievable that he did.”
  
  This is a reversal of reality.
  
  Biden didn’t agree to let South Korea stop sharing the cost of the US military force in the country. Rather, under Biden, South Korea signed two cost-sharing agreements with the US,one in 2021andone in 2024, that both includedsubstantial South Korean payment increases.
  
  Trump told a story on Monday in which he claimed a Democratic governor with whom he has been trading public barbs this month, Gov. Wes Moore of Maryland, told him during a behind-the-scenes conversation last year, “‘Sir, you’re the greatest president of my lifetime.’” The story wasdisprovenby Trump-friendly Fox News the very same day: it turned out that a Fox documentary show hadrecorded the conversation, in which Moore didn’t say anything close to what Trump claimed.
  
  Trump was undeterred by the footage. Hetolda similar story on Tuesday, this time falsely saying Moore had told him, “Sir, you’re the greatest president” – and adding, “They caught him on camera.” In reality, it was Trump who the camera had caught in a lie.
