title: "1 dead, 6 injured in shooting during homecoming at Lincoln University in Pennsylvania, officials say"
date: "2025-10-25"
section: "US"
url: "https://www.cnn.com/2025/10/25/us/lincoln-university-shooting-homecoming-pa-hnk"
content: |
  At least one person was killed and six others were injured in a shooting at Pennsylvania’s Lincoln University Saturday night, during the historically Black university’s homecoming weekend, according to officials.
  
  The shooting is the latest in a disturbing trend of violence surrounding games and homecoming celebrations across the country this football season.
  
  A total of seven people were hit with gunfire after shots rang out near the school’s International Cultural Center, where homecoming crowds were celebrating after that afternoon’s football game, authorities said at a news conference early Sunday.
  
  “That festivity was interrupted and decimated by gunfire. It was a chaotic scene, and people fled in every direction,” Chester County District Attorney Christopher de Barrena-Sarobe said.
  
  Officials did not give details on the conditions of the six injured. Multiple gunshot victims were taken to hospitals in nearby Delaware, authorities told CNN earlier.
  
  Several others were treated at the scene after being knocked to the ground and trampled as people ran for cover, de Barrena-Sarobe said.
  
  Gov. Josh Shapiro said he has been in “constant contact” with university officials since the shooting and offered the full support of his administration and the state police.
  
  This weekend at Lincoln University “should have been spent celebrating the legacy of our nations’ first degree-granting HBCU, not putting the pieces together after a mass shooting,” he said in apost on X. “Lori and I are praying for the six people injured, the families sick with worry, and the one soul who will not come home. May their memory be a blessing.”
  
  Officials have not yet determined a motive in the shooting, but de Barrena-Sarobe said it does not appear to be a case “where someone came in with the design to inflict mass damage on a college campus.”
  
  One person who was carrying a gun has been detained, the district attorney said, according to the Associated Press.
  
  So far one person has been jailed on charges of carrying a concealed firearm without a license, and authorities were investigating whether that weapon was used in the shooting, de Barrena-Sarobe said.
  
  “We don’t have a lot of answers about exactly what happened,” he said, noting it is possible there were multiple shooters.
  
  Jujuan Jeffers, 25, of Wilmington, Delaware, was shot in the head and died just after midnight, the Associated Press reported, citing the district attorney.
  
  Local, state and federal law enforcement are investigating, the district attorney’s office said ina statement, asking anyone with knowledge of the shooting to contact the FBI.
  
  Lincoln University is located about 55 miles west of Philadelphia. Theschool’s websitesays it is “the nation’s first degree-granting Historically Black College and University.”
  
  “This was to be a joyous occasion,” the university Chief of Police Marc Partee said, expressing regret over what was supposed to be a celebration of the university’s legacy.
  
  “Homecoming – when individuals come back, and they give back to their alma mater, and they live the good memories of their time at Lincoln University … This was interrupted by gunfire that should not have occurred,” the chief said.
  
  Witnesses recalled seeing people run as loud music played in the background. Moments later, police and firefighters arrived and taped off a section of the campus.
  
  “It was chaos,” one witness toldCNN affiliate WPVI, saying she hadn’t heard the shots over the music.
  
  “It was a great time until we heard a couple of shots go off,” another witness told WPVI, describing how everyone in the huge crowd started running at once.
  
  The campus is no longer under lockdown, though the site of the shooting remains an active crime scene, officials said during the news conference.
  
  Counseling will be available Sunday morning for anyone who needs it, the university said onits Instagram page.
  
  PennsylvaniaGov. Josh Shapirosaid he has been briefed on the shooting and offered his administration’s full support to the university and local law enforcement.
  
  “Join Lori and me in praying for the Lincoln University community,” Shapiro said.
  
  Saturday’s shooting is the latest in a series of violent incidents at homecoming weekends and football games.
  
  Five people were injured in a shooting near the campus of Howard University, another historically Black university, in Washington, DC, as the school began its homecoming activities Friday. Police said none of the victims were Howard students.
  
  Two more people were killed and 12 others injured inMontgomeryfollowing Alabama State’s homecoming game and the Tuskegee-Morehouse historic rivalry game. Montgomery policeannouncedthat a juvenile is in custody and charged with capital murder.
  
  At leastthree shootingsacross Mississippi this month, all apparently connected to high school football games, have left at least six people dead and others wounded.
  
  There have been at least 353 mass shootings in the United States so far this year, leaving at least 300 people dead and 1,600 injured, according to theGun Violence Archive(GVA).
  
  This story has been updated with additional information.
