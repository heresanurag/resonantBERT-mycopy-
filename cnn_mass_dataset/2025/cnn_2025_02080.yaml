title: "Gunmen kidnap 25 schoolgirls from Nigerian school, kill vice principal"
date: "2025-11-17"
section: "Africa"
url: "https://www.cnn.com/2025/11/17/africa/gunmen-kidnap-schoolgirls-nigeria-intl"
content: |
  Gunmen attacked a government girls’ boarding school in Nigeria’s Kebbi State early on Monday, killing the vice principal and abducting 25 female students, police said, in the latest mass kidnapping in the country’s northwest.
  
  The assailants, armed with rifles and reportedly using coordinated tactics, stormed Government Girls Comprehensive Secondary School in Maga town around 4 a.m. local time, engaging police in a gunfight before scaling the perimeter fence and seizing the students, police spokesperson Nafiu Abubakar Kotarkoshi said.
  
  Gunmen who kidnapped 287 school children in Nigeria say they will kill them all if $622,000 ransom not paid
  
  Vice Principal Hassan Yakubu Makuku was shot dead while resisting the attackers, and another staff member sustained gunshot injuries, he added.
  
  Police said additional tactical units, soldiers and local vigilantes have been deployed to comb suspected escape routes and surrounding forests in a search-and-rescue operation.
  
  Northwest Nigeria has witnessed repeated school abductions by armed gangs seeking ransom payments, despite government pledges to improve security in the region. Islamist militant group Boko Haram kidnapped 270 schoolgirls in 2014 in the northeastern town of Chibok. While many of the girls managed to escape or were later released, some have never been returned.
  
  This story has been updated.
