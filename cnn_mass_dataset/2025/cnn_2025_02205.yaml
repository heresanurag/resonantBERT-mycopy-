title: "Four top deputies to Eric Adams have resigned, New York mayor says"
date: "2025-02-17"
section: "Politics"
url: "https://www.cnn.com/2025/02/17/politics/eric-adams-deputies-resign?utm_medium=social&utm_source=blueskyCNN&utm_content=2025-02-17T20%3A37%3A41"
content: |
  Four top deputies in Eric Adams’ administration submitted their resignations Monday, in the latest sign of the New York City mayor’scratering supportamong rank-and-file workers and the city’s elected officials.
  
  Maria Torres-Springer, first deputy mayor; Anne Williams-Isom, deputy mayor for health and human services; Meera Joshi, deputy mayor for operations; and Chauncey Parker, deputy mayor for public safety, all notified Adams on Monday that they would step down from their posts.
  
  “I am disappointed to see them go, but given the current challenges, I understand their decision and wish them nothing but success in the future,” Adams said in a statement announcing the resignations.
  
  The resignations of the city’s highest-profile public servants mark a significant shift for the Adams administration, which has been struggling to reset after aDepartment of Justice memolast week ordered federal prosecutors in New York to dismiss corruption charges against the mayor.
  
  Eric Adams’ embrace of Trump unites Democrats against the New York City mayor
  
  The DOJ’s order sparked amass resignation of prosecutorsin New York and Washington, including the Trump-installed acting US attorney in the Southern District of New York, who resigned rather than carry out the order to dismiss the corruption case against Adams, a Democrat. The prosecutors decried the order to drop the charges — which cited in part Adams’ role as mayor helping the Trump administration combat illegal immigration — as a bargain amounting to a “quid pro quo.”
  
  Amid growing calls for Adams to resign, New York Gov. Kathy Hochul, who has the power to remove the mayor, announced late Monday she will convene city leaders Tuesday to discuss “the path forward.”
  
  The four deputy mayors held a call with Adams on Sunday and agreed to hold off on making a final decision on stepping down, an official familiar with the discussions said. However, Joshi, Torres-Springer and Williams-Isom reached out to Adams on Monday morning and said they had finalized their decisions to step down.
  
  “Due to the extraordinary events of the last few weeks and to stay faithful to the oaths we swore to New Yorkers and our families, we have come to the difficult decision to step down from our roles,” Torres-Springer, Williams-Isom and Joshi said in a joint statement.
  
  Torres-Springer, Williams-Isom and Joshi are career public servants and highly regarded in the city’s government circles. They are also responsible for putting much of the mayor’s agenda into place. Their portfolios include some of the city’s biggest agencies, including the public hospital system, the Department of Homeless Services, and the Mayor’s Office of Immigrant Affairs, to name a few.
  
  Since Adams wasindicted on federal corruption chargeslast year, the group was seen as a steady hand that could keep city government churning along even as the mayor found himself distracted by the case against him.
  
  Parker, a relative newcomer to the administration, said in a statement, “Serving as deputy mayor for public safety under Mayor Adams has been an honor of a lifetime. … I am confident that the administration will continue on our mission to deliver for the people of this city.”
  
  It is not yet clear when the resignations will take effect. In the statement, Adams said the “deputy mayors will remain in their roles for the time being to ensure a seamless transition.”
  
  Monday’s departures come months after another round of high-profileofficials left the administrationshortly after charges against the mayor were announced in September.
  
  The Justice Department last year brought public corruption charges against Adams in the first prosecution of a sitting mayor in the city’s modern history. Adamspleaded not guiltyto federal counts of bribery, corruption, wire fraud, and soliciting and accepting donations from foreign nationals, and the case was set to go to trial this spring. Last week’s order says the charges should be dismissed “without prejudice,” meaning they could be refiled at a later date.
  
  ‘It was never going to be me’: How Trump’s DOJ sparked a crisis and mass resignations over the Eric Adams case
  
  The Justice Department’s directive highlighted the mayor’s need to cooperate with federal immigration authorities — which lawmakers in New York said puts Adams in a position of being “beholden” to President Donald Trump’s administration.
  
  After news of the directive last week, Adams alsomet with Trump’s border czarand said he would use his executive powers to increase the city’s law enforcement collaboration with federal immigration authorities.
  
  Adams told Fox News on Friday that there was no “quid pro quo” to get the DOJ to drop the charges in exchange for his cooperation on immigration enforcement. Trump’s border czar, Tom Homan, on Sunday also called it “ridiculous” that concessions made by Adams to let Immigrations and Customs Enforcement into Rikers Island jail were related to the DOJ directive.
  
  Calls have grown from city and state lawmakers for Adams’ resignation or for Hochul to use her power to remove him. The Democratic governor has said she is weighing her options but has not committed to taking any action.
  
  Hochul said in a statement Monday night that she plans to convene city leaders at her Manhattan office Tuesday “for a conversation about the path forward.”
  
  She addressed the deputies’ resignations, saying, “If they feel unable to serve in City Hall at this time, that raises serious questions about the long-term future of this Mayoral administration.”
  
  As governor, Hochul has the power to remove the mayor from office – although it is a complicated process and hasn’t been attempted in nearly 100 years.
  
  “In the 235 years of New York State history, these powers have never been utilized to remove a duly-elected mayor; overturning the will of the voters is a serious step that should not be taken lightly,” Hochul said. “That said, the alleged conduct at City Hall that has been reported over the past two weeks is troubling and cannot be ignored.”
  
  A source familiar with the meeting told CNN high-ranking Democrats will likely attend in person in New York or virtually if they are in Washington, DC.
  
  In response to the deputies’ resignations Monday, City Council Speaker Adrienne Adams said the mayor should resign. The speaker said in a tersely worded statement that the mayor had “lost the confidence and trust of his own staff, his colleagues in government and New Yorkers.”
  
  “He now must prioritize New York City and New Yorkers, step aside and resign,” she said. “These resignations are the culmination of the mayor’s actions and decisions that have led to months of instability and now compromise the City’s sovereignty, threaten chaos, and risk harm to our families.”
  
  City Comptroller Brad Lander, who is running against Eric Adams in the June mayoral primary, also issued an immediate response, sending a letter to the mayor asking the administration to detail its contingency plans as four senior officials prepare to depart their posts.
  
  “These departures would create an unprecedented leadership vacuum at the highest levels of City government and wreak havoc on the City’s ability to deliver essential services to New Yorkers,” Lander said.
  
  The demand for a plan also included a warning: If the mayor does not submit one by the end of this week, Lander said he would convene a meeting of the Inability Committee. The Inability Committee could set in motion what can be described as New York City’s version of impeachment, a move that has never been used in the city’s modern history.
  
  According to thecity charter, a “committee on mayoral inability” would be made up of five members: the city’s corporation counsel, the comptroller, the City Council speaker, a deputy mayor selected by the mayor, and the most senior borough president. Four of the five would have to agree to form the committee, and then the City Council — where Adams does not hold wide support — would vote to declare Adams temporarily or permanently “unable” to discharge the powers and duties of the office, according to the charter.
  
  Adams, who attended a series of church services on Sunday, has said, “I’m not stepping down, I’m stepping up” – a phrase he has repeated since his federal indictment last September.
  
  This story has been updated with additional information.
