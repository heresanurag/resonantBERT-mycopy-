id: cnn_2025_04721
title: "Measles misinformation is spreading in the US, and most aren’t sure what they believe, poll finds"
date: "2025-04-23"
section: "Health"
url: "https://www.cnn.com/2025/04/23/health/measles-misinformation-kff/index.html"
content: |
  As a measles outbreak centered in West Texas continues to grow, a new poll finds that a growing share of adults in the United States have heard false claims about the disease and the vaccine to prevent it – and many aren’t completely confident in their conviction.
  
  RFK Jr.’s long, complicated history with the measles vaccines
  
  Nearly two-thirds of adults have heard the false claim that the measles-mumps-rubella (MMR) vaccine causes autism, according to newpoll datapublished Wednesday by KFF. About a third of adults have heard the false claim that the measles vaccine is more dangerous than the disease, nearly double the share from a year ago. And about a fifth of adults have heard the false claim that vitamin A prevents measles.
  
  US Department of Health and Human Services Secretary Robert F. Kennedy Jr. has shared each of these claims at some point, despite strong scientific evidence that they’re not true. Kennedy has a complicatedhistorywith the measles vaccine, onlyrecentlygiving it a clear endorsement – and still pushing that it’s a “personal” choice.
  
  About a quarter of adults incorrectly believe that the MMR vaccine is “definitely” or “probably” linked to autism, according to the KFF poll. About a quarter believe that vitamin A can prevent measles infections, despite caution from health officials about potentialdangers. And about a fifth believe that getting the measles vaccine is more dangerous than becoming infected. These misconceptions were especially prevalent among Republicans and Hispanic adults.
  
  Measles costs are accumulating as funding cuts threaten the outbreak response
  
  Adults are more likely to say that these claims are “definitely false” than they are to say that they are “definitely true,” but a large share remain less than fully convinced.
  
  At least half of adults fall into what KFF calls the “malleable middle,” expressing some level of uncertainty by saying that the false claims are either “probably true” or “probably false.”
  
  Nearly 900 measles cases have been recorded in the US this year, with more than half of states reporting at least one case, according to a CNN tally using data from state health departments and the US Centers for Disease Control and Prevention. The vast majority are related to a multistate outbreak concentrated West Texas, which has driven case counts to nearly the highest they’ve been since measles was declared eliminated in the US a quarter-century ago.
  
  All but 3% of cases in the US so far this year have been reported in people who arenot vaccinated, according to the CDC, as vaccination coverage among US schoolchildrencontinues to drop.
  
  Parents in the new survey who tend to believe at least one of the false claims are more than twice as likely to have skipped or delayed some vaccines for their children, the KFF data shows. Nearly a quarter of parents who say that at least one of the false claims is “definitely” or “probably” true have delayed or skipped some childhood vaccines for their children, compared with 11% of parents who say that all of the claims are “definitely” or “probably” false.
  
  US measles cases are undercounted, experts say, but real numbers are proving hard to pin down
  
  KFF data shows that less than half of parents are aware that measles cases are higher than average this year, and only about half of US adults are concerned about the ongoing outbreak.
  
  The KFF data is based on a nationally representative sample of about 1,400 US adults who were interviewed between April 8 and 15.
  
  In that time, Kennedy announced thelaunchof a “massive testing and research effort” at HHS to determine the cause of the “autism epidemic,” promising some answers as early as September and pushing the claim that it’s caused by an environmental toxin.
  
  Health experts, members of the autism community and others have vocally refuted claims of a link between vaccines and autism.
  
  “Vaccines do not cause autism,” a group of leading autism advocacy organizations wrote in a jointstatementThursday. “Decades of scientific research have confirmed this. Public health messaging must reflect scientific consensus and protect all communities.”
