title: "Elon Musk wants to audit the Fed. Is that a good idea?"
date: "2025-02-22"
section: "Business"
url: "https://www.cnn.com/2025/02/22/business/musk-audit-federal-reserve?cid=ios_app"
content: |
  Elon Musk is keen on auditing the Federal Reserve, the independent agency that makes critical decisions on interest rates that reverberate throughout the US economy.
  
  Musk, the world’s richest man who is also overseeinga mass restructuringof the federal government, isn’t referring to the Fed’s $6.8 trillion balance sheet. The Fed’s finances and operations are already audited extensively by the Government Accountability Office (GAO) and an independent accounting firm. Musk is talking about the Fed’s monetary policy decisions.
  
  But auditing the Fed’s monetary policy raises questions on the importance of the central bank’s independence, especially as President Donald Trump shakes up the federal bureaucracy.
  
  Asked if the Fed should be audited atan annual gathering of conservativesThursday, the Tesla CEO said, “Yeah, sure” without elaborating. It was the second time this month that Musk expressed support for the idea.
  
  As head of the Department of Government Efficiency, or DOGE, Musk has led efforts to gain access to key government data. This month, a federal judge temporarily blocked DOGE from accessing a Treasury Department payment system.
  
  Musk’s calls to scrutinize the Fed comes after Trump on Tuesdaysigned an executive orderthat’s expected to weaken the central bank’s control over big banks. The executive order gives his political appointeesunprecedented power over independent regulators, such as the Federal Trade Commission and the Securities and Exchange Commission, though it specifically excluded the Fed’s monetary policy.
  
  In 2015, Republicans pushed for the Federal Reserve Transparency Act, also known as “Audit the Fed,” that aimed to make the Fed’s interest rate decisions subject to congressional approval. The bill didn’t gain traction. Last year, Republican Sens. Chuck Grassley of Iowa and Rand Paul of Kentucky tried to introduce a similar bill without much success.
  
  “I know from first-hand experience that the (Fed) sets monetary policy with the best technical information available and without any consideration of politics or partisanship,” former Fed chair Ben Bernanke wrote in a 2016 analysis published by The Brookings Institution. “I am also confident that political interventions in monetary policy decisions would not lead to better results.”
  
  The second Trump presidency seems to have breathed new life into the idea of reviewing the Fed’s policy decisions. Earlier this month, a user on X argued in a post that the Fed’s monetary policy moves should be subject to a “full audit.” Musk cheered the idea.
  
  “All aspects of the government must be fully transparent and accountable to the people,” Musk said in response to the post. “No exceptions, including, if not especially, the Federal Reserve.”
  
  It’s unclear if Musk would want DOGE to audit the Fed. Republicans had previously proposed having the GAO look into the Fed’s monetary policy deliberations, which are solely based on economic data in striving for the central bank’s dual mandate of stable prices and maximum employment.
  
  But regardless of who’s doing the auditing, reviewing the Fed’s policy decisions is essentially asking if the central bank should be independent, since a review of those decisions throws politics into the equation.
  
  Wall Street has resoundingly argued that it shouldn’t.
  
  “An independent Fed is good for the US economy, which is in turn good for everyone,” Roger Ferguson, former president and CEO of TIAA, told CNBC last month.Ferguson was also the former vice chair of the Federal Reserve’s Board of Governors.
  
  After Trump’s presidential victory in November, business leaders such asBank of America CEO Brian MoynihanandPeter Orszag, chief executive of asset manager Lazard, said it’s in the economy’s best interest for the Fed to remain independent.
  
  There aren’t any alarming signs of the Fed’s independence being at risk right now, especially as Trump’s executive order on Tuesday excluded the Fed’s monetary policy.
  
  Scott Bessent, Trump’s Treasury secretary, said in his confirmation hearing in Januarythat there isn’t any plan to infringe on the Fed’s autonomy.
  
  “I think on monetary policy decisions, the (Fed) should be independent,” he told senators.
