title: "The days around Trump’s trade war announcements saw spikes in lawmaker stock market transactions"
date: "2025-06-11"
section: "Politics"
url: "https://www.cnn.com/2025/06/11/politics/congress-stock-market-trading-trump"
content: |
  In the days beforePresident Donald Trumpsuddenly paused most of the punishing tariffs on foreign countries he had revealed in early April, more than a dozen congressional lawmakers were tied to thousands of dollars’ worth of stock transactions, including significant purchases as the US stock market tumbled, a CNN analysis of financial filings shows.
  
  Seven Democrats and three Republicans reported stock transactions made on April 7, two days before Trump instituted the pause, according to a CNN review of a database of congressional financial filings compiled byCapitol Trades, a platform by the financial data research firm 2iQ which tracks lawmakers’ financial activity. That day, apost on X erroneously suggesteda pause was already underway, tumbling stocks and sending the markets into a state of turbulence.
  
  The next day, on the eve of Trump’s tariff reprieve, seven Republicans and four Democrats were tied to transactions, filings show. The White House that day announced it would impose hefty tariffs on China and the S&P 500 closed at itslowest levelso far this year.
  
  “BE COOL!” and “THIS IS A GREAT TIME TO BUY,” Trump wrote on his Truth Social platform that day, hours before his White House announced a 90-day pause on tariffs against a number of countries save for China. The announcement set the S&P 500 on track to post itsbiggest single-day gainsince October 2008.
  
  House and Senate lawmakers on both sides of the aisle have long traded stocks, and their reported transactions so far this Congress have largely mirrored Americans’ high volume of trading activity amid the frenetic market shifts fueled by the president’s whipsaw economic policy. While lawmakers who spoke with CNN denied having advance briefings, some who bought ahead of the president’s tariff reprieve stood to make significant gains after it spurred a market rebound.
  
  Lawmakers told CNN the trades were made largely by third-party financial advisors with unilateral control over their portfolios. But experts and some on Capitol Hill say questions around the timing of the transactions strikes at the heart of an ethical and optical question that has long dogged Congress: Can lawmakers play the market without generating suspicion their access to information gives them an unfair advantage, or should they ban the practice altogether?
  
  “At a time where there was significant or important non-public information swirling around Washington, the public can’t help but fear that members of Congress are using their access to information to personally profit,” Indiana University Maurer School of Law Professor Donna Nagy, who has testified before Congress on the issue, told CNN after viewing the trading data.
  
  “And whether that perception is true or not, it is destructive. It fuels a corrosive belief that lawmakers are using their positions for purposes of profit and not for the public interest.”
  
  Lawmakers, their spouses, and children are permitted to make trades but they are mandated to report any activity done on their behalf within 45 days. They are only required to disclose a monetary value range for trades.
  
  From March 31 — just before the president’s April 2 “Liberation Day” announcement of tariffs of at least 10% across all countries — through the April 9 pause, a total of 35 lawmakers (19 Republicans and 16 Democrats) reported purchases between about $8.6 million and $27.9 million and sales between about $5.9 million and $22.4 million across 1,265 transactions. Not all of the trades were individual stocks; some involved were mutual funds or public bonds.
  
  From March 31 through April 9, Democratic Rep. Ro Khanna reported the most transactions at 438, while GOP Rep. Kevin Hern reported the single highest-value transaction of up to $5 million on April 4. Eleven lawmakers reported one transaction. Fourteen lawmakers reported two transactions or fewer.
  
  The transactions Khanna reported, his communications director Sarah Drory told CNN, were not stock trades but part of a trust managed by an independent third party that stems from money his wife had before they were married.
  
  Hern spokeswoman Miranda Dabney, meanwhile, told CNN: “Rep. Hern does not have day-to-day management or control over his stock portfolio or his businesses.”
  
  In statements provided to CNN, representatives for the lawmakers who reported trades during that period pointed to various agreements with third-party financial advisors and noted that some purchases were bonds and not individual stocks. The offices told CNN the lawmakers are not directly involved in the purchases.
  
  “President Trump was telling the entire world for months, and even decades, about the benefits of tariffs. It was even a central component of his 2024 presidential campaign. Suggesting any behind-the-scenes coordination is ridiculous,” a spokesperson for Rep. Marjorie Taylor Greene said, pushing back on concerns around the timing of the trades.
  
  The Georgia Republican – whose 11 reported purchases on April 8 included between $1,000 and $15,000 worth of stock each, according to thefilings– does not direct her own trades but instead has a fiduciary agreement with her portfolio manager, the spokesperson said.
  
  Around Trump’s trade war, a number of Republicans publicly pledged support for Trump’s economic  policy while protecting their own financial interests.
  
  Sen. Markwayne Mullin sold between $290,000 and $700,000 in stocks across industries from a joint account on April 8 through “an independent, third-party operator firm that manages all stock portfolio investments on his behalf,” according to his spokesperson. At the same time, the Oklahoma Republican waspublicly supportingthe president’s escalating trade war, despite the financial decisions that appeared to mirror broaderconsumer concerns.
  
  Hern, the fourth-highest ranking Republican in the Housesaidon February 13, shortly after Trump announced 25% tariffs on steel and aluminum imports from all countries: “These reciprocal tariffs will incentivize other nations to level the playing field and remove long-standing, exorbitant tariffs.”
  
  On March 31 — two days before Trump announcedexpansivetariffs on April 2 — a trust affiliated with Hernsoldbetween $500,000 and $1 million worth of structured investments.
  
  For Rep. Chip Roy of Texas, one of the Republicans behind the push to ban lawmaker stock trading, having an intermediary conduct the trades does little to assuage concern. “Members of Congress should come here to advance the interests of their constituents, not to enrich themselves using stock trading,” Roy said.
  
  Rhode Island Rep. Seth Magaziner, one of the leading negotiators on the Democratic side of the effort to ban congressional stock trading who participates in regular meetings on the issue, similarly told CNN: “We should eliminate the opportunity for members of Congress to engage in any sort of insider trading because the opportunity clearly exists.”
  
  The director of government affairs at the Project on Government Oversight Dylan Hedtler-Gaudette told CNN, “You occasionally have these moments where it really clarifies and distills down just how bad this is. And I think the tariff announcements and subsequent trades and transactions are a prime example of that.”
  
  March 3 — the day before Trump levied an additional 10% tariff on China and a 25% tariff on Mexican and Canadian imports with some exceptions — saw the highest number of lawmakers reporting stock trading in a single day through mid-April, according to CNN’s analysis. Sixteen lawmakers, evenly split among Democrats and Republicans, reported hundreds of thousands of dollars’ worth of transactions that day — most of them purchases.
  
  The president had confirmed at an afternoon White House event on March 3 that the tariffs would take effect the next day,leading to a sharp selloff in stocks. At that point, March 3 had so far been the worst day for the market.
  
  Pennsylvania Republican Sen. Dave McCormick, who reported purchases between $50,000 and $100,000, was the only lawmaker to report having personally traded on March 3. McCormick did not respond to multiple requests for comment.
  
  Lawmakers reached by CNN sought to distance themselves from the transactions filed during those key dates around Trump’s tariffs announcements.
  
  Democratic Rep. Josh Gottheimer is waiting on congressional approval for a blind trust, a spokesman told CNN. GOP Rep. Bruce Westerman, meanwhile, has instructed his investment advisor to not invest in individual stocks and is in the process of putting his assets back into a fund, after receivingheatfor recent investments, spokesperson Kinsey Featherston shared. Democratic Rep. Julie Johnson has begun the process of divesting her stocks, managed by an independent third party, into ETFs and mutual funds upon becoming a member of Congress, her spokesperson told CNN.
  
  Some said they supported efforts to ban lawmaker trading of individual stocks, even those with active portfolios, including Khanna and GOP Rep. Rob Bresnahan.
  
  The STOCK Act passed with overwhelming support in 2012 to increase transparency about lawmaker stock trading and made it illegal for lawmakers to use inside information for financial benefit.
  
  But lawmakers and experts argue problems persist with existing reporting structures and enforcement mechanisms. Along with only being required to report a monetary range of transactions, lawmakers also don’t report the timing of a trade on a given day, which could be useful context for those determining whether seemingly well-timed trades could be based on non-public information.
  
  There is also currently no designated oversight body to determine whether lawmakers hold a conflict of interest in their trading practices. Legal experts say that even lawmakers who use financial advisors to trade on their behalf are not necessarily insulated from scrutiny, and it depends on the details of the agreement. The $200 fine for late filings is hardly a deterrent, experts argue.
  
  “That doesn’t pass the sniff test even a little bit because there is no guarantee that they’re not talking to those people because there is no prohibition against them from talking to those financial advisors,” Hedtler-Gaudette said of the arrangements most lawmakers have with their financial advisors.
  
  As efforts to ban congressional stock trading have fallen short, scholars and ethics experts have argued that members of Congress are privy to more information than the average American and are often faced with legislative decisions that overlap with their investment portfolios.
  
  “It is essentially completely legal for a congressman, congresswoman or senator to go to Goldman Sachs, Blackrock or Vanguard and be like, ‘Hey I’m proposing this regulation, what do you think will be the impact on the market?’ There is nothing to stop you from that,” said Dr. Jan Hanousek Jr., an assistant professor at the University of Memphis who has studied the patterns of lawmaker stock trading. “This is an insane problem.”
  
  Beyond ethics concerns, a 2022 Fox News pollfoundthat 70% of respondents supported banning members of Congress and their families from trading stock, while a January UC San Diegostudyfound that even when lawmakers make their trading practices public, it “erodes” the legitimacy of Congress.
  
  The push to ban lawmaker stock trading last peaked whendozensof federal officials andsome lawmakersmade lucrative stock and mutual fund trades as the government was preparing for the financial onslaught of the Covid-19 pandemic in early 2020. The Department of Justice has since closed investigations into the moves.
  
  But in a sign this Congress’ bipartisan group of lawmakers may be closer to finding the political will to ban the practice, House Speaker Mike Johnson, House Minority Leader Hakeem Jeffries and the president himself have publicly supported the effort, following news of lawmaker stock trading activity around the tariff announcements.
  
  “I have been working on this issue for years,” Roy told CNN. “We can and should fix the problem during this term now that President Trump and the Speaker have signaled their support for the measure. We have the will and the mandate of the American people to do this. Let’s deliver.”
