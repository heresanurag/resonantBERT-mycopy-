  # Trial of gang accused of robbing Kim Kardashian at gunpoint opens in Paris
  
  By [![Image 1: Saskya Vandoorne](https://media.cnn.com/api/v1/images/stellar/prod/saskya-vandoorne-cnn-headshot.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/saskya-vandoorne-profile)[Saskya Vandoorne](https://www.cnn.com/profiles/saskya-vandoorne-profile), Sérène Nourrisson
  
  Updated Apr 28, 2025
  
  Updated Apr 28, 2025, 1:14 PM ET
  
  PUBLISHED Apr 28, 2025, 10:35 AM ET
  
  Crime People in entertainment Kim Kardashian
  
  [See all topics](https://www.cnn.com/follow)
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2025%2F04%2F28%2Fentertainment%2Fkim-kardashian-robbery-trial-opens-paris-intl "Share with email")Link Threads
  
  Link Copied!
  
  ![Image 2: Defendant Yunice Abbas and his lawyer arrive for the start of the trial in Paris on Monday, April 28, 2025.](https://media.cnn.com/api/v1/images/stellar/prod/gettyimages-2211851871.jpg?c=original&q=w_860,c_fill)
  
  Defendant Yunice Abbas and his lawyer arrive for the start of the trial in Paris on Monday, April 28, 2025.
  
  Bertrand Guay/AFP/Getty Images
  
  Paris—
  
  Nearly nine years after billionaire reality TV star [Kim Kardashian](https://cnn.com/2025/04/27/entertainment/kim-kardashian-paris-robbery-trial/index.html) was bound, gagged and robbed at gunpoint during Paris Fashion Week, the trial of nine men and one woman accused of carrying out the dramatic heist opened Monday at a packed courthouse in the French capital.
  
  The case centers on the October 2016 theft of nearly $10 million in cash and jewelry, including a $4 million engagement ring that was never recovered. The defendants, who range in age from their 30s to their 70s, are facing charges including armed robbery, kidnapping and conspiracy. Eight of them deny involvement, while two have admitted to lesser offenses.
  
  ![Image 3: Police stand guard at the entrance to the hotel where Kardashian was robbed in Paris in October 2016.](https://media.cnn.com/api/v1/images/stellar/prod/gettyimages-612097426.jpg?c=original&q=w_1093,c_fill)
  
  Police stand guard at the entrance to the hotel where Kardashian was robbed in Paris in October 2016.
  
  Thomas Samson/AFP via Getty Images
  
  As the trial proceedings began, several of the defendants, including Aomar Ait Khedache and Yunice Abbas, made their way into the courtroom. Ait Khedache, often alleged to be the mastermind of the robbery, entered with the support of a cane and wearing hearing aids.
  
  Ad Feedback
  
  The defendants’ families arrived moments later, taking their seats next to the press.
  
  [Related article ![Image 4: Kim Kardashian and her bodyguard Pascal Duvier seen out and about in Paris before the robbery on October 2, 2016 in Paris.](https://media.cnn.com/api/v1/images/stellar/prod/gettyimages-614900912.jpg?c=16x9&q=h_720,w_1280,c_fill/w_256) Kim Kardashian and her bodyguard Pascal Duvier seen out and about in Paris before the robbery on October 2, 2016 in Paris. Mehdi Taamallah/NurPhoto via Getty Images Kim Kardashian expected to testify about violent 2016 Paris robbery as alleged ‘Grandpa Gang’ faces trial](https://www.cnn.com/2025/04/27/entertainment/kim-kardashian-paris-robbery-trial)
  
  The robbery unfolded just before 3 a.m. at the “No Address” hotel, a discreet luxury residence in Paris where Kardashian was staying. Disguised as police officers, the thieves forced the concierge to lead them to Kardashian’s apartment, where they tied her up at gunpoint. According to court documents, the group tracked Kardashian’s movements through her social media posts, helping them to orchestrate the attack.
  
  Kardashian is scheduled to testify on May 13, when she will face the alleged robbers in court for the first time. A heightened police presence is expected outside the courthouse during her appearance.
  
  The trial has been delayed for years partly because of major cases like those related to the 2015 Paris terrorist attacks.
  
  Of the original 12 suspects, one has since died and another defendant who has Alzheimer’s disease has been ruled unfit to stand trial. If convicted, some of the remaining defendants could face up to 30 years in prison.
  
  The trial is scheduled to run through May 22, with a verdict expected on May 23.
  
