title: "Private Welsh island with 19th century fort goes on the market"
date: "2025-08-08"
section: "Business"
url: "https://www.cnn.com/2025/08/08/business/thorne-island-fort-wales-scli-intl"
content: |
  If you want to get away from it all, there can be few places moresecludedthan ThorneIsland.
  
  Situated 3 nautical milesoff the coast of Pembrokeshire in west Wales, United Kingdom, the private island is home to a 19th century fort.
  
  Extending to approximately 2.49 acres, Thorne Island has recently gone up for sale, with the owner seeking offers in excess of £3 million ($4 million), according to the listing on theStrutt & Parkerwebsite.
  
  The fort’shighlights include a helipad, a covered rooftopbarwith a games room and a sea-view office.
  
  Originally designed to house 100 men, the restored propertycan today sleep up to 20 people in its five plush bedrooms, while other living spaces include grand dining rooms and terraces sheltered by barrack-style walls.
  
  The fort was built on the craggy outpost between 1852 and 1854 as part of a wider plan to strengthen national defenses against a possible Napoleonic invasion, according to the property listing.
  
  But over time the Welshisland’s military role faded and the forthas served as a hotel and family home since the island wasfirst sold in 1932.
  
  Its current owner, British tech entrepreneur Mike Conner, bought the island in 2017 for £500,000 ($670,000) after seeing a video about it on YouTube, he told CNN.
  
  Back then, the fort – protected by law due to what’s known as a Grade II listing– had no windows or utilities and was waterlogged, but Conner said hewas fascinated and seized the opportunity to undertake a once-in-a-lifetime restoration.
  
  Conner said he had “underestimated a lot of things,” including the effort involved in installing flushing toilets.
  
  “There was a lot of stuff that needed to be done to make it happen,” he said, including digging trenches through rocks and installing a running water system.
  
  It took his team 350 helicopter trips over two days to transport materials – from topsoil and building materials to heat pumps for central heating and hot water – to the island. Meanwhile, builders lived on-site in the original barracks for four years while reconstruction was underway.
  
  Part of the reason it took so long was that the fort was in bad shape when Conner took it over.
  
  Sandblasting the walls to reveal the original stone alonetook six months, while the granite walls in parts were so saturated with historic moisture that it led to flooding, according to a press release sent to CNN.
  
  Conner – the founder of Appsbroker, which later becameQodea– said the overhaul, which has only been completed this year, cost more than £2 million ($2.7 million).
  
  The substantial investment included a £300,000 ($400,000) outlay on renewable energy – such assolar panels and battery storage – and a biodigester system for wastewater, which allow the off-grid fort to be completely self-sufficient, he said.
  
  Conner, 52, said hehas a degree in industrial design, adding that he had embarked on the project as a bit of a challenge.
  
  “It was quite a healthy mid-life crisis by some of my friends’ standards,” he said.
  
  The fort, which is only accessible by sea or air, had to be renovated to withstand salt air and storm-force winds.
  
  Conner, who has spent time in the renovated fort with his family, believes itcould be a perfect venue for luxury retreats and celebrations or for someone who really wants to get away from it all.
  
  As for him, he’s on the lookout for a new challenge.“I’ve enjoyed the journey and I think I would like to find another basket case,” he said.
