title: "Top-rated diet lowers cancer risk in a surprising way, new study finds"
date: "2025-02-25"
section: "Health"
url: "https://www.cnn.com/2025/02/25/health/mediterranean-diet-cancer-prevention-wellness/index.html"
content: |
  Sign up forCNN’s Eat, But Better: Mediterranean Style. Our eight-part guide shows you a delicious expert-backed eating lifestyle that will boost your health for life.
  
  Meals from the sunny Mediterranean have been shown to reduce the risk of developingprostate,cervicalandcolorectal cancer, while also decreasing the risk of womendying from any cancerby 17%.
  
  The Mediterranean diet also winsgold medalsfor healthy weight loss and lowering obesity. Obesity is aleading risk factorfor cancer and many other chronic diseases such as type 2 diabetes, heart and kidney disease, stroke and more.
  
  Mediterranean diet helps women live much longer, a large new study finds
  
  Now, a large, observational study sheds light on the ways in which the Mediterranean diet may reduce cancer risk — and it’s not just via weight loss.
  
  “This was somewhat surprising. Adherence to the Mediterranean Diet was associated with lower obesity-related cancer risk regardless of BMI (body mass index) or fat distribution,” said first author Inmaculada Aguilera-Buenosvinos, a postdoctoral scientistin the department of preventive medicine and public health at the University of Navarra’s Institute for Health Research in Pamplona, Spain
  
  “This suggests that other mechanisms — such as reduced inflammation, improved metabolic health, or dietary interactions with the microbiome — may be responsible for the protective effects,” said Aguilera-Buenosvinos, also a postdoctoral scientist at the World Health Organization’s International Agency for Research on Cancer, in an email.
  
  TheMediterranean dietfeatures simple, plant-based cooking, with much of each meal focused on fruits and vegetables, whole grains, beans and seeds, with a few nuts and a heavy emphasis onextra-virgin olive oil. Fats other than olive oil, such as butter, are consumed rarely, if at all, and sugar and refined foods should be avoided.
  
  Plant-based meal plans like those in the Mediterranean diet are full of fiber, said Lindsey Wohlford, a wellness dietitian at the University of Texas’ MD Anderson Cancer Center in Houston. She was not involved in the study.
  
  VIDEO: A soup that’s truly satisfying? This key Mediterranean ingredient does the trick
  
  “Fiber contributes to fullness and supports a healthy microbiome,” Wohlford said. “Plants are also packed with antioxidants and phytonutrients, which appear to reduce inflammation in the body. We have to eat a variety of plants to get the different nutrients and antioxidants that may help reduce overall cancer risk.”
  
  In the Mediterranean diet,red meatis used sparingly, often only to flavor a dish. Eating healthy, oily fish, which are packed with omega-3 fatty acids, is encouraged, while eggs, dairy and poultry are eaten in much smaller portions than in the traditional Western diet.
  
  The highly processed foods typical in a Western diet can contain chemicals and additives that cause “oxidative damage which can lead to cancer,” said Dr. Neil Iyengar,associate professor of medicine at Weill Cornell Medical College and breast cancer oncologist at Memorial Sloan Kettering Cancer Center, both in New York City.
  
  This diet with exercise reduces dangerous belly fat and more, study says
  
  “What we put into our bodies every day can impact nearly every function of our body through hormones, fat and muscle tissue, and the delicate balance of bacteria in our gut,” said Iyengar, who was not involved in the new study.
  
  “Consuming a minimally processed, plant forward diet can help to reduce or even reverse the oxidative damage that a poor diet can cause to our body,” he said in an email. “We are also starting to see some limited evidence that this type of diet — minimally processed, high fiber, and plant-forward — may even help some cancer therapies to be more effective.”
  
  The study, published Tuesday inJAMA Network Open, analyzed diet and medical data on more than 450,000 people taking part in the European Prospective Investigation into Cancer and Nutrition, or EPIC study, which enrolled participants between 35 and 70 years from 1992 to 2000 across 23 centers in 10 countries. Three of those countries — Greece, Italy and Spain — are known for their use of the Mediterranean diet; the other seven countries are not (Denmark, France, Germany, the Netherlands, Norway, Sweden and the UK).
  
  People who most closely adhered to the Mediterranean diet had about a 6% lower risk of developing obesity-related cancers compared to those with less adherence, the study found. While that number may appear small, the significance grows when applied to larger populations, Aguilera-Buenosvinos said.
  
