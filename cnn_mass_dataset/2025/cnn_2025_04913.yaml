title: "Trump threatens to restrict stadium deal with Washington Commanders if they don’t change name back to ‘Redskins’"
date: "2025-07-20"
section: "Politics"
url: "https://www.cnn.com/2025/07/20/politics/washington-commanders-trump-stadium?cid=external-feeds_iluminar_yahoo"
content: |
  PresidentDonald Trumpon Sunday escalated his call for the Washington Commanders to change their name back to the “Redskins,” threatening to restrict the NFL team’s stadium deal if they don’t, though it’s unclear how he would be able to.
  
  “I may put a restriction on them that if they don’t change the name back to the original ‘Washington Redskins,’ and get rid of the ridiculous moniker, ‘Washington Commanders,’ I won’t make a deal for them to build a Stadium in Washington. The Team would be much more valuable, and the Deal would be more exciting for everyone,” Trump wrote on Truth Social.
  
  The organization left Washington for Landover, Maryland, in 1997, but DC Mayor Muriel Bowser and the team announced a deal in April to bring the Commanders back to the district at the site of the old Robert F. Kennedy Memorial Stadium. Trump touted the deal at the time, but the proposal is stalled before the DC Council.
  
  Speaking to reporterslast week, Bowser urged the DC Council to “make moves” on the deal, adding that “the Commanders are anxious” about it. The Council is holding the first ofpublic testimonyhearings on July 29 for the stadium redevelopment plan.
  
  Trump expressed openness earlier this month to helping out if the DC Council does not approve the deal.
  
  “It’s a great piece of property, so we’ll see. But if I can help them out, I would. … The federal government ultimately controls it,” Trump said. In late 2024,lawmakers in Congress passed a billto transfer ownership of the RFK site from the federal government to the district’s government.
  
  “The owner is very, very successful and a very good man,” Trump continued. “It would be a great place for the NFL to be there, I can tell you that.”
  
  Earlier Sunday, the president initially referred to the football team as the “Washington ‘Whatever’s’” and urged the owners to “IMMEDIATELY change their name back to the Washington Redskins Football Team.”
  
  Trump’s Sunday comments went further than ones he made earlier this month, when he told reporters the Commanders’ name should be changed back to the Redskins, something he acknowledged was a “controversial statement.”
  
  “It doesn’t have the same ring to me,” he said. “But, you know, winning can make everything sound good. So, if they win, all of a sudden, the Commanders sounds good, but I wouldn’t have changed it.”
  
  The Commanders aren’t the only team moniker Trump wants reverted.
  
  Trump also put the pressure on the Cleveland Guardians to change their name back to the “Indians,” claiming that the “Indian people” want the Guardians to be the “Indians” yet again.
  
  The names were changed as part ofa larger cultural shiftas corporate brands reexamined their use of racist caricatures and stereotypical names, but Trump argued Sunday that “times are different now.”
  
  “Our great Indian people, in massive numbers, want this to happen. Their heritage and prestige is systematically being taken away from them,” Trump said. “Times are different now than they were three or four years ago. We are a Country of passion and common sense. OWNERS, GET IT DONE!!!”
  
  And in a later post Sunday, Trump claimed Matt Dolan, a former Ohio state lawmaker whose family owns the Guardians, “has lost three Elections in a row because of that ridiculous name change. What he doesn’t understand is that if he changed the name back to the Cleveland Indians, he might actually win an Election.”
  
  Matt Dolan’s brother Paul Dolan is the principal owner and chairman of the team.
  
  “Indians are being treated very unfairly. MAKE INDIANS GREAT AGAIN (MIGA)!” Trump added, a riff on his “Make America Great Again,” or MAGA, slogan.
  
  The Cleveland Guardians said they had no further comment.
  
  The Washington football team dropped the “Redskins” name in 2020after decades of criticismfrom Native American groups that said it was an ethnic slur and a derogatory reference to skin color. Two years laterit unveiledthe “Commanders” name.
  
  The Cleveland baseball team announced its name change in 2021, after similar criticism from Native Americans over the “Indians” moniker.
  
  This story has been updated with additional information.
