  Sign up forUnlocking the World, CNN Travel’s weekly newsletter. Get news about destinations, plus the latest in aviation, food and drink, and where to stay.
  
  Intravelnews this week: robot legs take off in China, the Italian influencer who mobilized her own TikTok army, plus one of the most terrifying whale encounters since Jonah.
  
  A Chilean father recentlycaptured the momenta humpback whale briefly swallowed his son while kayakingin Patagonia. Miraculously, 24-year-old Adrian Simancas emerged unharmed. “I thought…that I wasgoing to die,” Simancas told CNN.
  
  Inthis video, two American tourists share another harrowing story of the day they were attacked by a shark in the Bahamas. Although unprovokedshark attacksin the Bahamas are rare, it’s at least the third reported shark attack involving Americans since 2023.
  
  It’s not just at sea that tourists need to be vigilant, of course. A video of a dangerous encounter with a territorial bison went viral back in 2022, but would you know what to do if one of the shaggy beasts had you in its sights? Here are ourbison survival tipsif you get yourself in a pickle.
  
  Finally, a Massachusetts man visiting Wyoming’s Grand Teton National Park was in a bad way last year when a grizzly bear took a “good chomp right to the bone” on his leg. Here’swhat happened next.
  
  From animal encounters to Chance Encounters, CNN Travel’s hit series about love and friendship is now a new CNNpodcast. Host Francesca Street chronicles marvelous real-life stories of incredible travel connections, starting with an Italian woman and an American man who met by chance in London’s Trafalgar Square in 1984.
  
  If you don’t want to end up like the man who was fined $200 this month forputting his phone on speakerin a French train station, you’ll want to use headphones in order to listen. Our partners at CNN Underscored, a product reviews and recommendations guide owned by CNN, have this guide to thebest true wireless earbudsof 2025.
  
  After you’ve finished the podcast, there are still several years of the weekly Chance Encounters column you can catch up on, such as the tale of Arthur “Chip” Gaudio Jr., who hadn’t seen hishigh school crushin years. Then he traveled to Sweden to visit her.
  
  China has been working on some innovative ways to get around – from the prototype for what could be the world’sfastest high-speed trainto robot legs to make mountain-climbing easier.  Yes, tourists are tackling the 5,000-foot-tall Mount Tai in Shandong Province usinghigh-tech exoskeletonsto make hiking a breeze. And you thoughtelectric bikeswere fancy.
  
  Then there’s the Comac C919, China’s first homegrown passenger jet and the country’s answer to the Airbus A320. Here’swhat it’s like on board.
  
  China is also building the world’slargest artificial island airport, Dalian Jinzhou Bay International off the country’s northeast coast. Its operators aim to handle 80 million passengers per year, with the first phase due to open in 2035.
  
  Some young Chinese people, however, are preferring to go back to basics. The so-called“iron butt” travelersare ditching planes to travel long distances by bus and train – no matter if it wreaks havoc on heinies.
  
  Vegemite, an Australian delicacy with the unpromising base material of leftover brewers’ yeast, is so loved in the country there’s even a museum dedicated to it.
  
  It’s a short day trip fromMelbourne, the cosmopolitan city that’s become a global food and drink powerhouse.
  
