title: "When to see July’s full buck moon"
date: "2025-07-09"
section: "Science"
url: "https://www.cnn.com/2025/07/09/science/full-buck-moon-july?Date=20250709&Profile=CNN,CNN+International"
content: |
  Skygazers can look toward the horizonthis week to catch a glimpse of the full moon around its peak illumination.
  
  This month’s full moon, also called the buck moon, will be at its fullest at around 4:37 p.m. ET on Thursday, according toEarthSky. That is, of course, during a time when the moon is below the horizon for people in North America, who can catch their best views of the peak a few hours after sunset, according toThe Old Farmer’s Almanac.
  
  “The nice thing about the full moon is it looks full about a day on either side of it, so on the night of the 9th, for instance, if you go out and look at the full moon, it will look effectively full. Similarly, if you miss it on the 10th, the night of the 11th it will also look fairly full,” said Noah Petro, chief of NASA’s Planetary Geology, Geophysics and Geochemistry Laboratory.
  
  Historically, July’s full moon is called the buck moon because it aligns with the time of year where the antlers of male deer, or bucks, are quickly growing, according to The Old Farmer’s Almanac.
  
  Other monikers for July’s full moon fromIndigenous tribesare indicative of the summer season. The Cree, located primarily in Canada, know it as the molting moon to indicate the time of year when birds are shedding their feathers, while the Tlingit tribe in the Pacific Northwest Coast call it the salmon moon to signify the seasonal salmon migrations.
  
  Weather permitting, the best place to view the moon will be in an area with an unobstructed view of the eastern horizon, Petro added. It’s also recommended to avoid areas with bright lights.
  
  Although no planets will be visible during the full moon, Venus, Jupiter and Mars will make appearances in the night sky﻿ toward the end of the month, according toNASA.
  
  On July 21 and 22, Venus and Jupiter will be visible low on the horizon before sunrise. The planets will appear alongside the Pleiades and Hyades star clusters, as well as the star Aldebaran, according toEarthSky. Stargazers should plan to wake early to view the captivating morning scene.
  
  The following week, Mars will appear right next tothe crescent moon on July 28 and will be visible during the first hour or two after sunset, according toNASA.
  
  July also marks a historic occasion: the 60th anniversary of the first successful flyby of Mars in 1965. NASA’s Mariner 4 craft captured images of the red planet during that flight —the first photos of another planet from space.
  
