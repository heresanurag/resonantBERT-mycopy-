title: "More than 600 artifacts stolen from museum collection, say police"
date: "2025-12-11"
section: "Style"
url: "https://www.cnn.com/2025/12/11/style/bristol-museum-stolen-artifacts-scli-intl"
content: |
  More than 600 artifacts relating to the history of the British Empire and Commonwealth have been stolen from the collection of Bristol Museum, police said Thursday as they released images of four suspects.
  
  The Avon and Somerset Police force said the items with “significant cultural value” were taken from a storage building in the early hours of September 25.
  
  The force said it wanted to speak to four men over the theft and appealed to the public for information.
  
  It’s unclear why the appeal is being made more than two months after the crime.
  
  “The theft of many items which carry a significant cultural value is a significant loss for the city,” said Det. Constable Dan Burgan.
  
  “These items, many of which were donations, form part of a collection that provides insight into a multilayered part of British history, and we are hoping that members of the public can help us to bring those responsible to justice.”
  
  The port city of Bristol, 120 miles (195 kilometers) southwest of London, played a major role in the trans-Atlantic slave trade.
  
  Ships based in the city transported at least half a million Africans into slavery before Britain outlawed the slave trade in 1807.
  
