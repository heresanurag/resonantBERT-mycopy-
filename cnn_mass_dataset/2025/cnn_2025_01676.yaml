title: "Trump administration appears open to negotiation with Harvard after university’s lawsuit sets up a monumental clash"
date: "2025-04-22"
section: "US"
url: "https://www.cnn.com/2025/04/22/us/harvard-lawsuit-trump-administration-explainer/index.html"
content: |
  The Trump administration appears open to negotiations with Harvard, even after America’s most prestigious university sued the federal government – setting up a clash over academic freedom, federal funding and campus oversight.
  
  Last week, administration officials reached out to Harvard representatives three times in an effort to restart talks, a person familiar with the outreach told CNN. The nation’s oldest university indicated it was not interested in negotiating, the person said.
  
  Two sources tell CNN all outreach attempts were informal.
  
  Barring a settlement, thelegal showdownover frozen federal funds will likely take years to play out and could end up at the Supreme Court.
  
  At one point, before the filing of the lawsuit, Harvard President Alan Garber considered meeting with President Donald Trump, The New York TimesreportedTuesday.
  
  A White House official told CNN, “The President is always willing to meet with leaders from across the nation on issues he is focused on.” However, the official added, “No meeting is under consideration at this time.”
  
  Some of the university’s donors urged the institution’s secretive board, the Harvard Corporation, to make a deal with the administration last week, something the corporation isn’t currently interested in doing, The Times alsoreported.
  
  The administration intends to continue a dialogue with Harvard, said Education Secretary Linda McMahon, insisting the White House’s recent demands are not about curbing freedom of speech.
  
  Harvard has emerged as a symbol of resistance against Trump, who has been trying to “reclaim” colleges and universities and has framed the conflict as a fight against antisemitism. The university says the White House is trying to control the Harvard community.
  
  The White House official compared conversations around federal funding for higher educational institutions to Trump’s tariff policies – subject to negotiation. “President Trump is a results-driven president. … He truly wants to have a deal at the end of the day,” the official said.
  
  The Trump administration has already rolled back diversity, equity and inclusion programs, arrested international students and revoked their visas, and frozen federal funding for schools that refused to submit to its demands.
  
  Harvard said the administration has cut the funds to gain “leverage” over the university and the move is part of a “pressure campaign” to force the school to submit to governmental control, according to court documents.
  
  The government’s actions “threaten Harvard’s academic independence” and “are part of a broader effort by the Government to punish Harvard for protecting its constitutional rights,” Harvard’s lawyers wrote.
  
  Harvard’s fight with the Trump administration is just getting started. The cost is already high
  
  The new Harvard lawsuit argues the Trump administration has failed to establish any tie between the crucial funding cuts and fighting antisemitism.
  
  “The Government has not – and cannot – identify any rational connection between antisemitism concerns and the medical, scientific, technological, and other research it has frozen that aims to save American lives, foster American success, preserve American security, and maintain America’s position as a global leader in innovation,” said the lawsuit, filed in Boston federal court.
  
  The case has been assigned to US District Court Judge Allison Burroughs, anObama nomineewho was involved in a previous landmark case involving the university. Burroughs, who did not earn her bachelor’s or law degree from Harvard,upheldHarvard’s admissions process in a 2019 ruling that was overturned by the Supreme Court’slandmark decisionending race-conscious admissions in American colleges.
  
  Harvard’s suit against the Trump administration comes as prominent Jewish organizations, including theAnti-Defamation Leagueand Harvard’s chapter of the Hillel student organization, have publicly questioned the administration’s broad attacks on the university.
  
  “(S)huttering apolitical, life-saving research; targeting the university’s tax-exempt status; and threatening all student visas … is neither focused nor measured, and stands to substantially harm the very Jewish students and scholars it purports to protect,” Harvard HillelwroteSaturday.
  
  The escalation between Harvard and the Trump administration intensified quickly, according to court documents.
  
  In March, the federal government sent a letter to Harvard saying the school was being investigated for its failures to “curb or combat” antisemitism on campus. A similar letter withdemands for policy changeshad been sent to Columbia University, and federal agencies soon announced a review of more than $5 billion in grants to the Ivy League school.
  
  Antisemitic incidents on college campuses increased by 84% between 2023 and 2024, accounting for 18% of all incidents, an annual audit from the Anti-Defamation LeaguesaidTuesday. Some occurred during protests between mid-April and mid-May 2024 in response to the Israel-Hamas war in Gaza.
  
  Columbia laterannounced several changesto address the Trump administration’s demands, an apparent concession to the federal government.
  
  The White House continued targeting universities —Princeton,CornellandNorthwesternall had funds frozen or suspended — and on April 11sentHarvard a list of policy changes it wanted implemented, demanding “immediate cooperation” if the university wanted to “maintain Harvard’s financial relationship with the federal government.”
  
  The list included eliminating the school’s diversity, equity and inclusion programs, banning masks at campus protests, merit-based hiring and admissions reforms and reducing the power held by faculty and administrators “more committed to activism than scholarship.”
  
  Analysis: The real stakes in Trump’s confrontation with Harvard
  
  A New York Timesreportsuggested the letter inadvertently had been sent prematurely. Still, Harvard put out a response three days later, publicly rebuking the Trump administration, saying it would not “surrender its independence or relinquish its constitutional rights.”
  
  The Trump administration retaliated by freezing $2.2 billion in multiyear grants and contracts, making plans torescind Harvard’s tax-exempt statusand threatening the school’s ability tohost international students.
  
  The school sued days later.
  
  If the case were to end up at the Supreme Court, it would be heard by a bench that includes four Harvard alumni: liberal Justices Elena Kagan and Ketanji Brown Jackson, along with Justice Neil Gorsuch and Chief Justice John Roberts, both conservatives.
  
  Justices are unlikely to recuse themselves from a case based solely on having studied at an institution involved. Jackson recused herself from a case involvingaffirmative actionat Harvard because she was on the school’sboard of overseers; the other three Harvard alumni ruled in that groundbreaking case.
  
  “I think Harvard, for now, is insisting on treatment that’s consistent with law,” former US Treasury Secretary and former Harvard University President Larry Summers told CNN’s Kaitlan Collins Tuesday. “It seems to me plain to anybody who reads the statute that … the Trump administration is in massive violation of the law.
  
  Billions of dollars, along with jobs, research and Harvard’s ability to administer financial aid are not the only things at stake. The “standing of American higher education” is also on the table, Harvard President Garbersaid Monday in a statement.
  
  Garber signed aletterwith more than 100 presidents of colleges, universities and scholarly societies, opposing the Trump administration’s pressure on academic institutions.
  
  Hear what three Harvard students said about Trump administration threats
  
  “As leaders of America’s colleges, universities, and scholarly societies, we speak with one voice against the unprecedented government overreach and political interference now endangering American higher education,” said the letter released Tuesday by the American Association of Colleges and Universities.
  
  “We are open to constructive reform and do not oppose legitimate government oversight. However, we must oppose undue government intrusion in the lives of those who learn, live, and work on our campuses,” wrote the presidents – including leaders of Princeton and American universities – adding, “The price of abridging the defining freedoms of American higher education will be paid by our students and our society.”
  
  McMahon, the education secretary, reitereted the adminstration’s stance.
  
  “I made it very clear that these are not First Amendment infractions. This is civil rights. This is making sure that students on all campuses can come and learn and be safe … and that is why we have had these funds either withheld or frozen during this period of time of negotiation,” she said on CNBC’s “Squawk Box.”
  
  ‘An unprecedented assault’: Legal scholar says White House attacks on Harvard are threat to democracy
  
  McMahon did not respond directly to a question about whether the Trump administration’s demand in its April 11 letter for “viewpoint diversity” among Harvard students, faculty and departments, to be audited by a third party, is really about free speech.
  
  “We had hoped Harvard would come back to the table to discuss these. We would like to have viewpoint diversity,” the education secretary replied. The letter, she added, “was intended to have both parties sit down again and continue their negotiations.”
  
  The White House official who discussed conversations about funding cast the response from Harvard as “grandstanding” and “political antics” that “set back the good faith negotiations on our part.”
  
  It is the White House’s hope, this official said, that Harvard “comes to the table and corrects course.”
  
  “Money speaks and when money is getting dried up because their donors aren’t buying into what they’re selling anymore and the federal government isn’t there to pad their pockets, they want to remain the envy of the world when it comes to research and science and academia – and they can only do that if they work with this administration,” the official said.
  
  The ultimate goal, the official said, is to “end antisemitism, end discrimination, end inequality” with the hope of “universities that don’t take advantage of the American people and don’t bloat systems to overpay professors that look down on the American people.”
  
  “This is an easy thing to resolve if the other side wants to play ball,” the official said, pointing to agreements made between the Trump administration and some law firms it has targeted.
  
  Garber said last week thedemands in the letterwere “unprecedented” and made “to control the Harvard community,” adding that the university “will not surrender its independence or relinquish its constitutional rights.”
  
  One of Harvard’s best-known educators, constitutional law professor emeritus Laurence Tribe, said he believes the university’s decision to take the administration to court will give courage to other embattled institutions.
  
  “I think that Harvard is encouraging many others to stand up, because when we win – and we will – they will realize that going along with dictatorial demands doesn’t get them anywhere,” Tribe told CNN’s Wolf Blitzer on Tuesday.
  
  Harvard,the world’s wealthiest university, has an endowment of $53 billion, which could help cushion cuts. About 80% of that money is earmarked for financial aid, scholarships, faculty chairs, academic programs or other projects, according to the school. The remaining 20% is intended to sustain the institution’s future.
  
  But the lawsuit paints a bleak picture of that future if Harvard has to dip into university coffers for too long. Eventually, Harvard will be left operating at “a significantly reduced level,” the complaint says.
  
  “If Harvard continues to replace the frozen funding from its own resources, it will be forced to reduce the number of graduate students it admits and the number of faculty and research staff it pays to conduct research,” the lawsuit says.
  
  The Trump administration’s threats against Harvard’s tax-exempt status and its ability to host international students could put even more pressure on the university’s funding, and more federal money could get withheld.
  
  The National Institutes of Healthannounced Mondayit would pull medical research funding from universities with diversity and inclusion programs. Of the $686 million in Harvard’s federal research funding in fiscal year 2024, $488 million came from NIH, according tothe Harvard Crimson.
  
  The government is “slamming on the brakes” on research and the “victims will be future patients,” Garber said. Research on childhood cancer, infectious disease outbreaks and how to ease the pain of soldiers wounded on the battlefield would all be affected, Garber added.
  
  The indiscriminate cuts, he said, would undermine America’s position as a global leader in innovation, adding, “The consequences of the government’s overreach will be severe and long-lasting.”
  
  Harvard’s many partnerships with other universities, private companies, and state and local agencies mean the freeze on funding will touch off widespread economic harm, the lawsuit argues, noting, “Harvard is one of Massachusetts’ largest employers.”
  
  “The freeze creates a ripple effect extending beyond Harvard’s campus by stifling job creation in the research sector across the nation, reducing intellectual property development, and delaying scientific and medical advances that boost the national economy,” the lawsuit says.
