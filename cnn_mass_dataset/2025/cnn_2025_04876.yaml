  👋Welcome to 5 Things PM!Sales of an AI-enabled teddy bear were halted after it offeredadvice on sexually explicit topics, how to light a match and where to find knives. The plush toy was marketed as “the perfect friend for both kids and adults.”
  
  Here’s what else you might have missed during your busy day.
  
  For the first time in his second term, fellow Republicans defied President Donald Trump — on the Epstein files — and he fell in line. That doesn’t mean GOP lawmakers will turn on him en masse, CNN’s Zachary B. Wolf writes, but it’s likelyyou will hear this termmore frequently.
  
  Sales at Target have stagnated for about four years, and 1,000 corporate employees are being laid off. The retail giant hopes a new CEO can turn things around, but the latest quarterly report showedthere’s no quick fix.
  
  The longstanding practice of adding fluoride to drinking water is facing heavy scrutiny in the US. New research challenges recent claims about the risks — and instead suggests thatit may have additional positive effects.
  
  High above the North Pole, a transformation is underway. During the next 10 days, changes in the stratosphere will set the stagefor a cold, snowy Decemberacross parts of the Northern Hemisphere.
  
  Humanity’s earliest lip locks were recorded 4,500 years ago, but the behavior might actually date back 21 million years.Scientists just mapped its unexpected origins.
  
  Footage from NATO shows a decommissioned frigate sinking after one of its submarines hit it with a torpedo during an exercise.
  
  💥Underwater bull’s-eye:NATO released dramatic footage of a Norwegian submarine torpedoing a ship during a training exercise.See the moment of impact.
  
  🏺‘Addicted to clay’:Renowned potter Kate Malone creates otherworldly ceramics brimming with life. Her handcrafted piecesdraw inspiration from the natural world.
  
