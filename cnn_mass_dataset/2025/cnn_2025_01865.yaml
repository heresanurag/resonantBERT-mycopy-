title: "White House releases list of donors for Trump’s multi-million-dollar ballroom"
date: "2025-10-23"
section: "Politics"
url: "https://www.cnn.com/2025/10/23/politics/ballroom-donors-white-house-trump?utm_medium=social&utm_campaign=missions&utm_source=reddit"
content: |
  Apple, Amazon, Lockheed Martin, Microsoft, Google, Coinbase, Comcast and Meta are just some of the major companies who have made donations to build President Donald Trump’sproposed 90,000-square-foot ballroom, according to the White House.
  
  Trump has repeatedly said that work on the ballroom is privately funded by himself and donors and will cost nothing to taxpayers.
  
  On Wednesday, Trumpdiscussedhis plans for the ballroom, saying it will cost “about $300 million.” The administration previouslyput the cost of the ballroom project at $200 million.
  
  Additional donors include co-founders of cryptocurrency exchange Gemini, Tyler and Cameron Winklevoss; Commerce Secretary Howard Lutnick and his family; and the Adelson family. TrumpawardedMiriam Adelson, a Republican megadonor, the Presidential Medal of Freedom in 2018.
  
