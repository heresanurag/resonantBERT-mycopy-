id: cnn_2025_04104
title: "More than a dozen universities have been targeted by false active shooter reports. It may take a while to find these swatters"
date: "2025-09-01"
section: "US"
url: "https://www.cnn.com/2025/09/01/us/swatter-investigation-active-shooter-hoaxes-universities?recs_exp=up-next-article-end&tenant_id=related.en&iid=cnn_buildContentRecirc_end_recirc"
content: |
  Over the past 10 days, more than a dozen college campuses have been the target of thedangerous criminal hoaxknown as swatting, with law enforcement lured to a location in response to a false report of a horrific crime.
  
  Active shooter alerts at Villanova University in Pennsylvania and the University of Tennessee at Chattanooga sent panicked students preparing for the new school year scrambling for cover as first responders swarmed campuses on August 21. In both cases,dispatchers heard what sounded like gunshots in the backgroundof the calls — lending a disturbing realism.
  
  Since then, campuses across the country have received similar hoax calls, including Texas Tech University, Iowa State University, the University of Colorado at Boulder, and Northern Arizona University.
  
  Law enforcement faces the challenge of sorting fact from fiction in real time as swatters employ tools like AI to bolster their hoax in a hypersensitive climate surrounding mass shootings. These hoaxes tax the resources of police departments and put an unquantifiable mental strain on the victims, ratcheting up the importance of putting a stop to them.
  
  A wave of active shooter hoaxes at universities brings panic and turmoil to the start of the school year
  
  But catching those responsible for making these calls can sometimes take months, or longer, as many of them originate from overseas, using Voice over Internet Protocol services, which further complicate investigations and prolong suspect identification efforts.
  
  In response, the FBI has prioritized providing resources and education, creating a nationwide task force to help local law enforcement agencies across the country coordinate efforts as they aim to catch the swatters.
  
  “These aren’t just somebody down the street who makes a call because they don’t want to go to gym class or take a test in English,” Katherine Schweit, a retired FBI executive, told CNN on Wednesday. “In many cases, we have just as likely a person who is making a phone call who might be across the world, on the other side of the world, or in another country, who is being paid to do harassing phone calls to places.”
  
  “So the calls can come from anywhere, and the motivation can be from anywhere,” said Schweit, who once led the FBI’s active shooter response program. “So how do we actually collect that and prevent it? It’s a challenge.”
  
  In 2023, the FBI, at the request of their law enforcement partners, created the National Common Operational Picture – Virtual Command Center (NCOP-VCC) to gather details on swatting incidents across the country. The Virtual Command Center operates as a web-based information sharing system that provides real-time situational awareness “for critical and non-critical incident management” in partnership with state and local authorities, according to the agency.
  
  The initiative allows police and intelligence fusion centers to share details of swatting incidents taking place within their jurisdictions, providing authorities nationwide with a “common operating picture” regarding the nature of the threat, and can assist in identifying whether the same perpetrator is responsible for multiple incidents.
  
  “If a law enforcement agency or federal, state, local, tribal agency gets information from school or from a business, from a university, they can share that information immediately into databases so that we can see commonalities, and that helps us,” Schweit said.
  
  Hundreds of law enforcement agencies have submitted thousands of incidents to the NCOP-VCC, according to the FBI.
  
  “Having nationwide data in a centralized location helps law enforcement track possible trends, better understand various tactics, and offers increased collaboration between agencies to mitigate criminal activities associated with swatting,” the FBI said.
  
  “Knowingly providing false information to emergency service agencies about a possible threat to life drains law enforcement resources, costs thousands of dollars, and, most importantly, puts innocent people at risk. We work closely with our law enforcement partners to determine their credibility, share information, and take appropriate investigative action,” the agency added.
  
  Several relevant federal criminal statutesenable the prosecution of swatting incidents, including laws outlawing injuring or kidnapping threats and bomb threats.
  
  The advance of technology, such as Voice over Internet Protocol services, makes it much more difficult to trace phone calls and has made these hoaxes more elaborate and harder to track, John DeCarlo, former police chief of Branford, Connecticut, and a professor of criminology at the University of New Haven, told CNN.
  
  Swatters often use online call “spoofing” services that in turn use several VoIP accounts, which let the swatter make phone calls using the internet. The VoIP accounts are also often created and accessed using a variety of Virtual Private Networks (VPNs) and proxy services, which allow users to “conceal their IP address by redirecting internet traffic through intermediary machines,” according to acriminal complaintin one 2017 case.
  
  Additionally, AI has made it easier than ever to fake someone’s voice for a hoax phone call, DeCarlo said.
  
  “It’s now easy and quick to clone someone’s voice using AI tools, which now require less than 15 seconds of someone’s voice to create a believable voice clone,” Rachel Tobac, chief executive of SocialProof Security, a firm that trains companies’ employees to defend against such attacks,told CNN.
  
  “What’s most concerning is that with AI-powered clones, seeing – or hearing – is no longer believing, and even trained professionals can be fooled, especially when a familiar voice makes an urgent request,” Steve Grobman, chief technology officer at cybersecurity firm McAfee, told CNN. “It’s also why we need smarter tools to help people tell what’s real and what’s not. We can’t rely on our own instincts anymore.”
  
  Schweit, the retired FBI executive, said trade-offs often have to be made when balancing the amount of investigative effort put into locating hoax callers. “It takes investigative work and that’s a trade-off on how much work do we need to put in… . What is this costing versus the other higher priority matters that we have?” she explained.
  
  Although difficult to investigate, law enforcement has found some success catching those responsible, with US officials often working with international partners to arrest overseas suspects.
  
  Some high-profile swatters have faced legal consequences, including two men from Serbia and Romania who prosecutors saymade hundreds of fake callsto US officials, and three men involved in the swatting of an unrelated man in Wichita, Kansas,whom police fatally shotwhen they arrived.
  
  A California teenwho pleaded guiltyto making hundreds of swatting calls last year – including to a Florida mosque – wassentenced this year to four yearsin prison, federal prosecutors said. The teen had become a “serial swatter for both profit and recreation,” according to the FBI, placing posts on social media advertising his services and swatting-for-a-fee structure.
  
  In a case dating back to 2017,a dual American-Israeli citizenused accounts created at a company that provided online call “spoofing” services to make more than 200 threats to Jewish institutions – while physically in Israel, according to thecriminal complaint in the case.He was arrestedin Israel andreportedlywas convicted under Israeli law and sentenced to 10 years in prison.
  
  Schweit said the likelihood of catching those responsible for the latest swatting incidents depends on the sophistication of the effort and the distance of the individual.
  
  “If somebody is calling from overseas and they’re calling from a phone bank of people who are paid, you know, a few pennies to harass people in the United States as part of a more complicated political operative operation in their country - we’re not going to catch those people,” she said. “But if it’s somebody who’s local and they’re making phone calls, this is where technology does help us.”
