title: "Judge to require that Kilmar Abrego Garcia remain in the US while he challenges deportation to Uganda"
date: "2025-08-25"
section: "Politics"
url: "https://www.cnn.com/2025/08/25/politics/kilmar-abrego-garcia-baltimore-rally?recs_exp=more-from-cnn-right-rail&tenant_id=popular.article.en&iid=cnn_buildContentRecirc_end_recirc"
content: |
  A federal judge said Monday that she will order officials to keep Kilmar Abrego Garcia in the United States while she weighs a new legal challenge from him over the Trump administration’s plans to quickly deport him to Uganda.
  
  US District Judge Paula Xinis said during a brief hearing Monday afternoon that she’s planning to stretch out an existing hold on Abrego Garcia’s removal so she can more fully consider whether officials are violating his due process rights, including by deporting him to Uganda even after he said he fears being persecuted or tortured in the African nation.
  
  Minutes after Abrego Garcia was taken into custody by immigration officials in Baltimore on Monday, his attorneys filed a new lawsuit urging Xinis to order his release and slow down his removal process so he can have a chance to challenge his potential deportation to Uganda.
  
  Abrego Garcia is currently being held at a detention facility in Virginia, his attorney said.
  
  Under that new order, the judge said, the government will be “absolutely forbidden to remove Abrego Garcia from the continental United States.” Xinis said she was also worried that sending Abrego Garcia to Uganda would result in an “end run” around a court order barring him from again being sent to El Salvador.
  
  It’s unclear how long the new pause will last, but it’s likely to remain in effect through at least later this week. The judge has said she wants to receive more written legal arguments from the Justice Department and Abrego Garcia’s attorneys. She’s also planning to hold an evidentiary hearing with witnesses in coming days.
  
  Abrego Garcia, the Maryland man who was unlawfully deported to El Salvador earlier this year, was taken into custody by US Immigration and Customs Enforcement after turning himself in to a facility in Baltimore.
  
  “Regardless of what happens today in my ICE check-in, promise me this,” Abrego Garcia said at a rally with members of his family, immigration activists and community leaders before reporting to the ICE facility on Monday. “Promise me that you will continue to pray, continue to fight, resist and love, not just for me, but for everybody.”
  
  The Trump administration has warned it couldsend Abrego Garcia to Ugandaas soon as this week. Abrego Garciareturned homeat the end of last week from Tennessee, where he was being held pending trial in a federalhuman smuggling case.
  
  Abrego Garcia argues he is being threatened with deportation to Uganda as punishment for his decision to challenge his unlawful removal to El Salvador in March, as well as his decision to go to trial in a human smuggling case brought against him in Tennessee.
  
  His attorneys provided Xinis, an appointee of President Barack Obama, with a copy of notices Abrego Garcia sent over the weekend to immigration officials that said he has a fear of being sent to Uganda and that he preferred to be sent to Costa Rica, a country that has said it would be willing to give him some form of legal status should he be sent there.
  
  “I fear persecution in Uganda on account of my race, nationality, political opinion, and membership in a particular social group. I also fear torture by or at the acquiescence of a public official in that country,” Abrego Garcia wrote in the notice sent Saturday.
  
  “Finally, I fear that country will refoul me (re-deport me) to El Salvador, where I also fear persecution on account of the above-mentioned protected grounds and torture by or at the acquiescence of a public official, and where I have been tortured in the past,” he wrote.
  
  That deal also seemed to strike Xinis as being legally dubious.
  
  “You can’t condition the relinquishment of constitutional rights in that regard,” she said during Monday’s hearing.
  
  Abrego Garcia’s lawyers urge judge to drop his criminal case, alleging ‘vindictive and selective prosecution’
  
  Lydia Walther-Rodriguez, the chief of organizing and leadership at CASA, the group behind the rally outside the ICE facility on Monday, argued that Abrego Garcia is being made a “martyr for having the courage to stand up to this administration’s illegal deportation practices.”
  
  “They’re throwing the entire federal apparatus at one father of three to prove that no one should dare challenge their authority,” she continued in a statement.
  
  The Trump administration brought Abrego Garciaback to the USin June to face the federal charges after sending him in mid-March to a notoriousmega-prisonin El Salvador, in violation of a 2019 court order that prohibited his removal to the Central American country.
  
  Activists joining Abrego Garcia on Monday morning accuse the Trump administration of “retaliating” against him for fighting against his deportation and trying to exercise his constitutional rights.
  
  “The only reason that they’ve chosen to take him into detention is to punish him,” his lawyer, Simon Sandoval-Moshenberg, said.
  
  Abrego Garcia’s lawyers also argued in court papers Saturday that offers by the administration to eventually deport him to Costa Rica in exchange for his guilty plea were evidence of the government’s effort to punish him for challenging his wrongful deportation. They told the judge in his criminal case that their client had until Monday morning “to accept a plea in exchange for deportation to Costa Rica, or else that offer will be off the table forever.”
  
  But Abrego Garcia did not take the deal offered to him by the Trump administration that would have seen him eventually deported to Costa Rica, a person familiar with the case told CNN.
  
  Maryland Sen. Chris Van Hollen said he spoke to Abrego Garcia on Sunday for the first time since theymet in El Salvadorin April. The Democratic senator said he told the father of three and his wife that “we will stay in this fight for justice and due process.”
  
  “If his rights are denied, the rights of everyone else are at risk,” Van Hollen wrote in a statement posted on X.
  
  Before reporting to the ICE facility, Abrego Garcia said memories of his family sustained him during his detention.
  
  “When I was detained, I remembered memories with my family: going to the park with them, going to the trampoline with my children,” he said. “Those moments will continue to give me hope to continue in this fight.”
  
  The story and headline have been updated with additional information.
