  👋Welcome to 5 Things PM!Sugar and spice and everything nice? McCormick analyzes dining trends every year and predictsthis flavorwill show up in a lot of food and drinks in 2026.
  
  Here’s what else you might have missed during your busy day.
  
  The National Weather Service is trying to hire back hundreds of people laid off or otherwise cut by the Trump administration. Offices are coping with vacancies that could affect forecasts and public safetyas a cold and snowy winter looms.
  
  The Taj Mahal is the 17th-century embodiment of an emperor’s love for his wife, and it’s sacred to Hindus. A controversial new Bollywood film is turning India’s iconic marble mausoleuminto a symbol of division.
  
  The progressive movement disorder that affects your muscles and balance is on the rise. An estimated 25 million people worldwide will be living with it by 2050. Experts offer advice onhow to reduce your risk.
  
  Large companies have made progress when it comes to increasing the number of women in management and leadership roles. But a new report warns that corporate Americaruns the risk of backsliding.
  
  Designer Kelly Wearstler has impeccable taste, and clients such as Gwen Stefani and Cameron Diaz pay a lot of money for that. Her approach to gift giving is thoughtful and personalized —here’s what she suggests.
  
  🪻A purple problem:Lupine flowers look beautiful, and they make for great Instagram posts when people visit Iceland —but they also pose a big threat.
  
