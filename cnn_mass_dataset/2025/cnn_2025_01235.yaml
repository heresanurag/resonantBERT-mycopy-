title: "Having trouble getting in your daily steps? The latest science says you may not need to fret"
date: "2025-10-21"
section: "Health"
url: "https://www.cnn.com/2025/10/21/health/step-average-walking-longevity-wellness?utm_medium=social&utm_campaign=missions&utm_source=reddit"
content: |
  If some days it’s easier toreach your step goalsthan others, you may still be protecting yourself against cardiovascular disease and early death, according to a new study.
  
  For women older than 60 in particular, the average daily steps across a week was more strongly associated with a lowered risk of cardiovascular disease and early death than the number of days in a week that step goals were reached, said lead study author Dr. Rikuta Hamaya, instructorin medicine at the Brigham Women’s Hospital and Harvard Medical School.
  
  Smart wellness goals are backed by science-based studies. Be part of one
  
  Higher levels of physical activity have been associated with a longer, healthier lifespan. As a result, many people aim for higher step counts each day to protect against chronic disease.
  
  But different people follow different patterns of activity. Some are moving pretty regularly throughout the week while others will have more active days than others, the study noted.
  
  Future studies may look into what pattern of physical activity is most helpful in getting enough steps throughout the week, but the recent finding suggests that moving more is helpful for longevity — however you can disperse your steps, Hamaya said.
  
  There isn’t one magic number people should aim for when it comes to step counts.
  
  Many people who use fitness trackers see 10,000 steps as a sign they are getting enough movement in a day, but that number is not based on good evidence, said Dr. Sean Heffron, assistant professor of medicine at New York University Langone Health and NYU Center for the Prevention of Cardiovascular Diseasein a previous article. He was not involved in the research.
  
  Other studieshave suggested aiming for 7,000 steps a day is a good objective if you are looking to reduce your risk of cardiovascular disease, dementia, type 2 diabetes, cancer, depressive symptoms and early death.
  
  But themost recent studypublished Tuesday in the British Journal of Sports Medicine investigated the effects of different step thresholds.
  
  This latest study looked particularly at older women with an average age of 71. Those who reached 4,000 steps one or two days a week were at a 26% lower risk of death from all causes, and a 27% lower risk of death from a cardiovascular disease, compared with not reaching this threshold on any day of the week.
  
  Getting a third day of at least 4,000 steps was even better, with a 40% lower risk of death from any cause.
  
  “I think this is important, because the 4,000 steps per day for two, three days per week is very attainable, even for older adults,” Hamaya said.
  
  Getting 5,000 to 7,000 steps a day lowered risk even further, according to the research. However, the primary driver of protection against disease and early death was how high the step count averaged across the week.
  
  Getting more movement in your day doesn’t have to mean slotting time for a long walk.
  
  If you take the bus or subway, getting off a stop or two early and walking the rest of the way can also help youmeet your fitness goals, Heffron said in the previous article.
  
  “It will add a few minutes onto your commute, but every one of those minutes is going to be involved in physical activity,” Heffron said. “That all adds up little by little over the course of a day and week.”
  
