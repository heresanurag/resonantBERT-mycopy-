title: "5 things to know for Sept. 11: Charlie Kirk, 9/11, Colorado school shooting, Georgia ICE raid, Gas truck explosion"
date: "2025-09-11"
section: "US"
url: "https://www.cnn.com/2025/09/11/us/5-things-to-know-for-sept-11-charlie-kirk-9-11-colorado-school-shooting-georgia-ice-raid-gas-truck-explosion"
content: |
  In a nation already deeply polarized, many Americans fear that the killing of conservative political activist Charlie Kirk could widen divisions across the political landscape and spark further violence. Numerous politicians and public figures across party lines are now making urgent appeals forcivility and respectful discourse.
  
  Here’s what else you need to know to get up to speed and on with your day.
  
  Charlie Kirk, the co-founder of Turning Point USA and an ally of President Donald Trump, was fatally shot on Wednesday at an event at Utah Valley University.A manhunt is underway for the shooter, who is believed to have fired once from a nearby roof in a “targeted attack,” according to the Utah Department of Public Safety, which is leading the investigation along with the FBI. Trump expressed his “grief and anger” about the killing and blamed rhetoric from the “radical left” in adirect-to-camera video from the Oval Office. Kirk, 31, was an influential young voice in the MAGA universe. He was known for making regular appearances on conservative media and hosting debates on college campuses.
  
  Today marks 24 years since the terrorist attacks onSeptember 11, 2001, which forever changed the world as we knew it. Nearly 3,000 people were killed in New York City, Washington, DC, and outside of Shanksville, Pennsylvania, after 19 al Qaeda terrorists hijacked four US commercial airplanes bound for West Coast destinations. It remains the deadliest attack on American soil. More than two decades later, people across the nation will pause today to honorthe victimsand reflect on the courage and sacrifice that emerged in the aftermath. President Trump is scheduled to attend a memorial service at the Pentagon.
  
  At least two students were injured Wednesday in ashooting at a Denver-area high school, officials said. The gunman opened fire at Evergreen High School in Colorado, prompting more than 100 law enforcement officers to swarm the campus. Authorities were in contact with the shooter within five minutes of the first 911 call reporting gunfire. The suspect — a male student at the school — was taken to the hospital with a self-inflicted gunshot wound and later died. The incident marks the 47th school shooting in the US this year..
  
  More than 300 South Korean workers who were detained by US immigration authorities in Georgia last week will be repatriated today. They will depart on a flight from Atlanta and arrive in South Korea on Friday, according to a Korean government official. The workers were taken into custody last week during a sweepingICE raid at Hyundai’s battery plantin Ellabell, a quiet town about 25 miles west of Savannah. News of the detentions — including images released by ICE of workers beinglined up and restrained with long chains— has sparked widespread frustration and an outcry in South Korea, a longstanding US ally that earlier this year pledged to invest hundreds of billions of dollars in the American economy.
  
  At least four people were killed and 90 others injured when a gas truck exploded in Mexico City on Wednesday. The massive blast generated a“shock wave” that damaged 32 nearby vehicles, the Mexico City Prosecutor’s Office said. The explosion occurred after the tanker truck carrying 49,500 liters of gas — known in Mexico as “pipas” — overturned by a highway in the Puente de la Concordia area. Authorities are working to determine the cause of the incident. The driver’s condition is also being investigated.
  
  An Apple executive described the iPhone Air as being “so thin and light, it seems todisappear in your hands.”
  
  The appearancecomes as the UK seeks to strengthen its ties to the Trump administration.
  
  On the next season of ABC’s “The Bachelorette,” a group of eligible singles will be vying for the heart ofTaylor Frankie Paul.
  
  The NCAA issued a permanent ban tothree men’s basketball playersafter an investigation uncovered that they were involved in sports betting.
  
  Novo Nordisk, the maker of weight loss drug Wegovy, willlay off about 9,000 peopleas it grapples with rising competition in the obesity market.
  
  “He just killed any hope for those hostages.”
  
  — Sheikh Mohammed bin Abdulrahman bin Jassim Al-Thani
  
  In an exclusive interview with CNN, Qatar’s prime minister said on Wednesday that Israeli Prime Minister Benjamin Netanyahu has “undermined any chance of stability” and puthostage negotiations at riskby targeting Hamas leaders in the Qatari capital.
  
