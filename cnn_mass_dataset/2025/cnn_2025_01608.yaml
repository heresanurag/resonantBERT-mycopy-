  “Safeguarding classified, privileged, and other sensitive information is essential to effective government and law enforcement,” Bondi wrote. “This Justice Department will not tolerate unauthorized disclosures that undermine President Trump’s policies, victimize government agencies, and cause harm to the American people.”
  
  In the first Trump administration, several perceived foes of Trump faced inquiries about their handling of national security information –and leaks to the press fueled several scandals at the time.
  
  Apolicy changefrom Attorney General Merrick Garland came after several major news outlets,including CNN, had some of their internal communications secretly pursued at the end of the Trump administration. The Justice Department coupled those seizures from news outlets with gag orders on the news organizations’ top leadership or lawyers, so even the journalists themselves didn’t know their records were being collected.
  
  The Garland policy was widely considered a win for the protection of the free press.
  
  Bondi, in her Justice Department-wide memo on Friday, said that federal law enforcement will continue to “employ procedural protections to limit” the seeking of news organization records. In the past, higher-level Justice Department officials had to sign off on the approaches.
  
  “These procedural protections recognize that investigative techniques relating to newsgathering are an extraordinary measure to be deployed as a last resort when essential to a successful investigation or prosecution,” the Bondi memo said.
  
  The Reporters Committee for Freedom of the Press, a leading First Amendment advocacy organization, reiterated following Bondi’s announcement that journalistic work that relies on confidential sources should be protected.
  
  “Some of the most consequential reporting in U.S. history — from Watergate to warrantless wiretapping after 9/11 — was and continues to be made possible because reporters have been able to protect the identities of confidential sources and uncover and report stories that matter to people across the political spectrum,” Bruce Brown, the Reporters Committee president, said in a statement.
  
  “Strong protections for journalists serve the American public by safeguarding the free flow of information,” Brown added.
  
  This story has been updated with additional details.
