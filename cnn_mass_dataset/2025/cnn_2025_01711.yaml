title: "After being denied a meeting with Alina Habba, a person ransacked the New Jersey federal prosecutor’s office building"
date: "2025-11-13"
section: "Politics"
url: "https://www.cnn.com/2025/11/13/politics/alina-habba-office-attack"
content: |
  A person ransacked the New Jersey federal prosecutor’s office building on Wednesday after they were denied a meeting with US Attorney Alina Habba, according to two sources familiar with the matter.
  
  The person was sitting in a waiting room outside Habba’s office when they were turned away, the sources said, and they proceeded to “smash” things in the area.
  
  “He literally went crazy,” one of the sources said. Habba was not in her office at the time, and no one has been arrested.
  
  “I will not be intimidated by radical lunatics for doing my job,” Habba said in astatement on XThursday.
  
  The person had tried to get into the US attorney’s office building earlier in the day, the sources said, but was denied entry because they were carrying a baseball bat. When the person returned later on, they were not carrying the bat and were allowed to enter, the sources said.
  
  The FBI said Friday it has identified the man who allegedly ransacked the office and has issued a warrant for his arrest.
  
  Keith Michael Lisa, 51, is facing charges of possession of a dangerous weapon in a federal facility and depredation of federal property, according toan FBI bulletin. There is a $25,000 reward for information leading to his arrest and conviction, and he should be considered dangerous, authorities said.
  
  Attorney General Pam Bondi had vowed to identify and charge the person in a Thursdaysocial mediapost, writing that “any violence or threats of violence against any federal officer will not be tolerated. Period.”
  
  This story has been updated with additional details.
