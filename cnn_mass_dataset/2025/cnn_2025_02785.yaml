title: "Man who stabbed author Salman Rushdie on stage sentenced to 25 years in prison"
date: "2025-05-16"
section: "US"
url: "https://www.cnn.com/2025/05/16/us/salman-rushdie-assault-sentencing"
content: |
  Mayville, New York (AP) –The manconvicted of stabbingSalman Rushdie on a New York lecture stage in 2022, leaving the prizewinning author blind in one eye, was sentenced Friday to serve 25 years in prison.
  
  A jury found Hadi Matar, 27, guilty of attempted murder and assault in February.
  
  Rushdie did not return to court to the western New York courtroom for his assailant’s sentencing but submitted a victim impact statement. During the trial, the77-year-old authorwas the key witness, describing how he believed he was dying when a masked attacker plunged a knife into his head and body more than a dozen times as he was being introduced at the Chautauqua Institution to speak about writer safety.
  
  The man accused of trying to kill author Salman Rushdie is found guilty of attempted murder
  
  Before being sentenced, Matar stood and made a statement about freedom of speech in which he called Rushdie a hypocrite.
  
  Matar received the maximum 25-year sentence for the attempted murder of Rushdie and seven years for wounding a man who was on stage with him. The sentences must run concurrently because both victims were injured in the same event, District Attorney Jason Schmidt said.
  
  In requesting the maximum sentence, Schmidt told the judge that Matar “chose this. He designed this attack so that he could inflict the most amount of damage, not just upon Mr. Rushdie, but upon this community, upon the 1,400 people who were there to watch it.”
  
  Public defender Nathaniel Barone pointed out that Matar had an otherwise clean criminal record and disputed that the people in the audience should be considered victims, suggesting that a sentence of 12 years would be appropriate.
  
  Rushdie spent 17 days at a Pennsylvania hospital and more than three weeks at a New York City rehabilitation center. The author of “Midnight’s Children,” “The Moor’s Last Sigh” and “Victory City” detailed his recovery inhis 2024 memoir, “Knife.”
  
  Matar next faces a federal trial onterrorism-related charges. While the first trial focused mostly on the details of the knife attack itself, the next one is expected to delve into the more complicated issue of motive.
  
  Authorities said Matar, a US citizen, was attempting to carry out a decades-old fatwa, or edict, calling for Rushdie’s death when he traveled from his home in Fairview, New Jersey, to target Rushdie at the summer retreat about 70 miles southwest of Buffalo.
  
  Matar believed the fatwa, first issued in 1989, was backed by the Lebanon-based militant group Hezbollah and endorsed in a 2006 speech by the group’s secretary-general, Hassan Nasrallah, according to federal prosecutors.
  
  Iranian leader Ayatollah Ruhollah Khomeini issued the fatwa after publication of Rushdie’s novel,“The Satanic Verses,”which some Muslims consider blasphemous. Rushdie spent years in hiding, but after Iran announced it would not enforce the decree he traveled freely over the past quarter century.
  
  Matar pleaded not guilty to a three-count indictment charging him with providing material to terrorists, attempting to provide material support to Hezbollah and engaging in terrorism transcending national boundaries.
  
  Video of the assault, captured by the venue’s cameras and played at trial, show Matarapproaching the seated Rushdiefrom behind and reaching around him to stab at his torso with a knife. As the audience gasps and screams, Rushdie is seen raising his arms and rising from his seat, walking and stumbling for a few steps with Matar hanging on, swinging and stabbing until they both fall and are surrounded by onlookers who rush in to separate them.
  
  Jurors in Matar’s first trial delivered their verdict after less than two hours of deliberation.
