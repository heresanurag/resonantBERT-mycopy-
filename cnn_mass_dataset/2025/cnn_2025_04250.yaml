title: "Iowa superintendent detained by ICE falsely claimed he was a US citizen, indictment says"
date: "2025-10-17"
section: "US"
url: "https://www.cnn.com/2025/10/17/us/des-moines-superintendent-ian-roberts-indicted?Date=20251017&Profile=CNN&utm_content=1760739010&utm_medium=social&utm_source=bluesky"
content: |
  Des Moines, Iowa (AP)— The formersuperintendent of Iowa’s largest school districthas been indicted by a federal grand jury after authorities said he falsely claimed to be a US citizen who was eligible to work.
  
  A two-count indictment returned Thursday evening by a federal grand jury in Des Moines chargesIan Robertswith one count of making a false statement for employment and one count of being an illegal alien in possession of a firearm.
  
  Roberts, who is originally from Guyana and worked for two decades in school districts across the country, was detained September 26 by US Immigration and Customs Enforcement agents in a targeted operation.
  
  Authorities said Robertsfled from agentsin his district-issued Jeep Cherokee before being found in a wooded area. Roberts had a handgun wrapped in a towel inside the car, investigators said.
  
  Former Iowa superintendent charged with federal firearms offense after immigration arrest
  
  Des Moines Public Schoolshired Roberts in 2023 to lead its district of about 30,000 students.
  
  The indictment alleges that he made a “false attestation” on a US Citizenship and Immigration Services Employment Eligibility Verification form, known as an I-9, claiming he was a US citizen when he knew he was not.
  
  Roberts’ attorney, Alfredo Parrish, didn’t immediately return a phone message.
  
  Federal authorities said an immigration judge issued a final removal order last year, and an appeal to reopen immigration proceedings was rejected earlier this year.
  
  After his detention by ICE, Roberts was transferred to federal custody October 2 on an arrest warrant and charged with unlawfully possessing firearms while being in the US illegally. In addition to the one in his vehicle when he was arrested, three other weapons were found during a search of Roberts’ home, authorities said. The indictment mentions all four weapons, including two pistols, a rifle and a shotgun.
  
  Who is Ian Roberts, the Iowa school superintendent accused by ICE of being in the US illegally?
  
  The district continues to face the fallout,filing a lawsuitagainst the consulting firm it used to facilitate the superintendent search in 2023.
  
  After anAP investigationidentified a history of Roberts’ school districts hiring a firm that marketed him as a consultant, Jackie Norris, school board chair, proposed a review of his expenditures in Des Moines. Norris alsoended her campaign for US Senateon Thursday.
