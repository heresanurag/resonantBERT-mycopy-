  # Are you concerned about Republicans’ proposed changes to Medicaid? Tell us about it
  
  By [![Image 1: Tami Luhby](https://media.cnn.com/api/v1/images/stellar/prod/180709143124-tami-luhby-circle-cut.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/tami-luhby)[Tami Luhby](https://www.cnn.com/profiles/tami-luhby)
  
  May 30, 2025
  
  PUBLISHED May 30, 2025, 4:29 PM ET
  
  Health care policy
  
  [See all topics](https://www.cnn.com/follow)
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2025%2F05%2F30%2Fpolitics%2Fmedicaid-changes-republicans-questions-callout "Share with email")Link Threads
  
  Link Copied!
  
  ![Image 2: Care advocates attend 24-hour vigil at US Capitol to share stories and urge lawmakers to protect Medicaid on May 7 in Washington, DC. ](https://media.cnn.com/api/v1/images/stellar/prod/c-gettyimages-2214137193.jpg?c=original&q=w_860,c_fill)
  
  Care advocates attend 24-hour vigil at US Capitol to share stories and urge lawmakers to protect Medicaid in May.
  
  Leigh Vogel/Getty Images for Caring Across Generations
  
  Congressional Republicans are considering making some big changes to Medicaid, which provides health insurance to more than 71 million low-income Americans. It could affect millions of people, from children to working-age adults to senior citizens.
  
  Are you enrolled in Medicaid and concerned about how the proposals could affect you? Tell us about it.
  
