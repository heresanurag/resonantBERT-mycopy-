title: "Taylor Swift announces new album, ‘The Life of a Showgirl’"
date: "2025-08-12"
section: "Entertainment"
url: "https://www.cnn.com/2025/08/12/entertainment/taylor-swift-life-of-a-showgirl-album-hnk?bt_ee=F98sZLBAxC4NXlu3MDpffcAjVssohjE19OnafTfoKSYc0NS7I3DC2jAeji9KXTFf&bt_ts=1755004219202"
content: |
  Taylor Swift announced Tuesday she’s dropping a new album: “The Life of a Showgirl.”
  
  The surprise announcement of the Grammy-winner’s 12th original studio album came in dramatic fashion, as a countdown clock on her website ticked down to 12:12 a.m. Eastern.
  
  In a video posted on Instagram, giving asneak peekof Swift’s upcoming appearance on Travis Kelce’s “New Heights” podcast, co-hosted with his brother Jason Kelce, Swift pulled out a mint green briefcase with her initials “TS” written in orange, saying: “This is my brand new album.”
  
  She did not say when the album would be released or any other information about it. Fans will have to wait a little longer to see and hear more when her much-awaited podcast appearance on “New Heights” releases Wednesday at 7 p.m. ET.
  
  Behind Swift on the “New Heights” set were several books with orange covers that featured the work of artists Jean-Michel Basquiat, Marc Chagall and Ruth Asawa, potential influences or references to her new music.
  
  No stranger to including “Easter eggs” or hidden clues in the lead up to her releases, Swift set off a frenzy of speculation Monday after a carousel of 12 photos was posted onher Instagram.“Thinking about when she said ‘See you next era…,’” the caption said.
  
  The surprise announcement coincided with a reveal Monday night that Swift would join Travis Kelce, her boyfriend and Kansas City Chiefs football player, and his brother for an episode of “New Heights” afterteasingthat a “VERY special” guest was joining Wednesday’s episode.
  
  The Empire State Building in New York City was illuminated in orange, the color of Swift’s new album art, on Tuesday night.
  
  A post shared by Empire State Building (@empirestatebldg)
  
  A caption on the building’s official Instagram account read, “Onto the next era.”
  
  This is Swift’s first new album since concluding her record-breaking Eras Tour in December. It’s available for pre-order on Swift’s officialwebsitein physical vinyl, cassette and CD format.
  
  The most recent studio album Swift released was “The Tortured Poets Department,” a 31-song double album that she announced in 2024 amid the Eras Tour and revamped her set list midway through to add songs from.
  
  “The Life of a Showgirl” will be her first release since becoming theproud owner of her entire catalogof music, roughly six years after sheprotestedthe sale of her master recordings by her former record label.
  
  She purchased her music “outright with no strings attached, no partnership, full autonomy,” from Shamrock Capital, a private equity company that had acquired her master recordings, she announced in May.
  
  In pictures: Taylor Swift’s Eras Tour
  
  “To say this is my greatest dream come true is actually being pretty reserved about it,” Swift wrote, adding that she was able to “buy back” her music from Shamrock following the success of theEras Tour.
  
  The sale of the master recordings of Swift’s first six albums to producer Scooter Braun’s Ithaca Holdings in 2019 wascontentious, with Swift alleging she was blindsided and not given the opportunity to buy her catalog at the time. Braun maintained her team was aware of a pending deal in advance.
  
  It prompted the singer to take back ownership of her music in her own way by pledging to re-record the albums. She went on to release what she called “Taylor’s Version” albums for “Red,” “Speak Now,” “Fearless” and “1989.” With each “Taylor’s Version” album, she’s included a number of previously unreleased songs she coined “from the vault.”
  
  This story has been updated with additional information.
