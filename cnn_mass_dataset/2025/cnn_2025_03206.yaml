title: "Trump says he’s increasing tariffs on Canada by 10% after Ontario’s Reagan ad"
date: "2025-10-25"
section: "Business"
url: "https://www.cnn.com/2025/10/25/business/trump-tariffs-canada-reagan?Date=20251025&Profile=CNNPolitics"
content: |
  President Donald Trump said Saturday he is increasing the tariff on Canada by 10% over current levels, further escalating trade tensions over what he called a “fake” ad that featured parts of an anti-tariff speech by former President Ronald Reagan in 1987.
  
  “Canada was caught, red handed, putting up a fraudulent advertisement on Ronald Reagan’s Speech on Tariffs,” Trump posted onTruth Social, adding, “Because of their serious misrepresentation of the facts, and hostile act, I am increasing the Tariff on Canada by 10% over and above what they are paying now.”
  
  The president’s post came after he said Thursday he was terminating trade talks with Canada, threatening once again to upend the crucial economic relationship between the United States and its second-biggest trading partner. The new tariff is Trump’s latest salvo in his global trade agendaafter he imposed a levyof 100% “over and above” any tariffs on China in retaliation for new export controls Beijing imposed on rare-earth minerals earlier this month.
  
  Trump posted about the tariff while aboard Air Force One as he heads to Asia for a five-day trip beginning in Malaysia, where he will meet with Southeast Asian leaders. He is expected to meet with Chinese leader Xi Jinping at the end of his trip in South Korea.
  
  The Canadianad, purchased by the government of Ontario and broadcast on major US television networks, featuredclips from a speechin which Reagan railed against tariffs. The ad quoted Reagan, who said tariffs hurt “every American worker and consumer” and were “triggering fierce trade wars.”
  
  The Ronald Reagan Presidential Foundation & Institute said the ad misrepresented the former president’s words.
  
  While the speech was edited and lacked context, the theme of Reagan’s full five-minute speech, which the Reagan Library has published onYouTube, was to fully support free and fair trade.
  
  Ontario Premier Doug Ford said Friday that he spoke with Canadian Prime Minister Mark Carney, and that the US ad campaign would pause on Monday “so that trade talks can resume.”
  
  But the ad would continue to run over the weekend during the World Series, which is between the Los Angeles Dodgers and the Toronto Blue Jays, Canada’s only Major League Baseball team.
  
  “Their Advertisement was to be taken down, IMMEDIATELY, but they let it run last night during the World Series, knowing that it was a FRAUD,” Trump said Saturday.
  
  Ford’s spokesperson referred CNN to the premier’s Friday statement in which he said the ad would be paused Monday. CNN has reached out to Carney’s office for comment.
  
  Dominic LeBlanc, Canada’s minister responsible for trade with the US, said late Saturday that the country hoped for “constructive discussions” with the US.
  
  “We will remain focused on achieving results that benefit workers and families in both the United States and Canada, and that progress is best achieved through direct engagement with the US administration — which is the responsibility of the federal government,” he said in statement.
  
  Carney and Trump are both in Malaysia for the ASEAN summit, which began late Saturday (Sunday morning local time).
  
  “Tariffs at any level remain a tax on America first, then North American competitiveness as a whole. We hope this threat of escalation can be resolved through diplomatic channels and further negotiation. CUSMA means a North America where businesses do better. A successful free trade zone is fundamental for both our economies,” Candace Laing, the president and CEO of the Canadian Chamber of Commerce, told CNN in an email.
  
  Canada has long been one of America’s top trading partners, behind China and Mexico, making trade tensions a heated topic. Last year, the United States imported$411.9 billion worth of goodsfrom Canada.
  
  Trump’s steep sectoral tariffs on autos, steel, aluminum, lumber and energy — some of the country’s key exports to the United States — have hit Canada especially hard. Canada’s unemployment rate is now at itshighest pointin nine years.
  
  It’s also hurting the US economy because ofCanadian boycotts. According to data from Statistics Canada, Canadian travel to the US by land is down 31% this year through the end of September. Exports of American spirits to Canadaplunged by 85%in the second quarter, according to the Distilled Spirits Council of the United States.
  
  But goods that are compliant with the US-Mexico-Canada Agreement, or USMCA, which Trump negotiated in his first term, have largely been able to enter the US duty-free. Trump’s repeated tariff threats have many expecting major changes to the USMCA when it isreviewed next year.
  
  This story has been updated with additional content.
