id: cnn_2025_03707
title: "Two US service members assigned to southern border task force killed in vehicle accident"
date: "2025-04-16"
section: "Politics"
url: "https://www.cnn.com/2025/04/16/politics/service-members-southern-border-killed-vehicle-accident/index.html"
content: |
  Two US service members were killed after their vehicle was involved in an accident Tuesday morning near the southern US border, the military said in a statement.
  
  The service members were “deployed in support of Joint Task Force Southern Border,” US Northern Command said in the statement.
  
  A third service member is in serious condition at a local hospital, the military said.
  
  The cause of the accident, which occurred near the border town of Santa Teresa, New Mexico, is under investigation, the task force said in the statement.
  
  The military is withholding the names of the service members until the next of kin is notified.
  
  The Joint Task Force Southern Border – announced last month – was created “to tactically synchronize the Department of Defense efforts to secure and seal the southern border,” according to apress releasefrom USNORTHCOM.
  
  PresidentDonald Trumpmandated that the US military step up its presence along the southern border on his first day in office. Thousands of additional troops have been deployed to the border in recent months as part of his efforts to “seal” the border to migrants.
