title: "A Black transgender woman’s testimony helped ratify the 14th Amendment. Then conservatives began attacking her identity"
date: "2025-02-16"
section: "US"
url: "https://www.cnn.com/2025/02/16/us/frances-thompson-transgender-memphis-massacre?cid=external-feeds_iluminar_yahoo"
content: |
  On a Friday in June, Frances Thompson swore an oath before a congressional committee and began to testify about what she’d experienced during a race riot in Memphis one month earlier.
  
  She told the committee how seven White men, including two police officers, forced their way into her home and stole her money and all her meager belongings before sexually assaulting her and her teenage housemate.
  
  In sharing her harrowing experience, Thompson quietly made history. She is believed to be the first Black transgender woman to testify before Congress.
  
  Thompson’s testimony in 1866 came at a critical time, as the nation weighed whether to expand equal constitutional protections to newly freed Black Americans. But it also came at a great personal cost – a decade after her landmark testimony, Thompson was cruelly outed, arrested for cross-dressing and forced to work in an all-male chain gang.
  
  Historians and advocates tell CNN they draw parallels between all that Thompson experienced as a Black trans woman and today’s anti-transgender political climate after President Donald Trump signed numerous executive orders targeting trans American minors’ right toaccess medical treatmentand participatein school sportsteams aligned with their gender identities..
  
  Bryanna Jenkins, policy director at the Lavender Rights Project, which works to address what it calls a “crisis of violence” against the Black trans community, said in order to understand how to defend the civil rights of transgender Americans today, we need to examine the history and experiences of trailblazers like Thompson.
  
  “If we’re going to strategize and be honest about where we have to go,” she said, “we have to look back.”
  
  Exactly one year after the end of the Civil War, on April 9, 1866, Congress overrode President Andrew Johnson’s veto to enact the nation’s first civil rights law.
  
  The Civil Rights Act of 1866 declared freed Black Americans were citizens entitled to “full and equal benefit of all laws … as is enjoyed by white citizens.”
  
  Then the massacres began.
  
  On May 1, 1866, a White mob laid siege to the nascent Black community that had begun to thrive in Memphis, Tennessee.
  
  Despite the end of the war, many White people violently resisted the federal push for formerly enslaved Black Americans to have equal rights. In Memphis, tensions often ran high between Black Union soldiers and the city’s poorer White residents.
  
