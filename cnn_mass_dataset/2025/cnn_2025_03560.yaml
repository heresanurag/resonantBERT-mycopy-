  After a skirmish between the soldiers and police, a local politician stoked a White mob into a frenzy by telling the men to “go ahead and kill the last damned one of the n***er race,” according to the 1866 congressional investigation into the massacre.
  
  “They are free, indeed,” the politician said, “but … we will kill and drive the last one of them out of the city.”
  
  For three days, the rioters – which included the city’s police – terrorized Black residents, indiscriminately murdering, raping and robbing people, according tothe 1866 report.
  
  No one was spared. The mob attacked the sick and elderly and raped multiple women, according to the report. Rachel Hatcher, a 16-year-old girl, was shot and killed and her body burned in a fire.  The rioters then set fire to a home with women and children inside and shot them as they ran out.
  
  In the end, the White mob killed more than 40 people, injured dozens and destroyed countless homes, churches and businesses, according to the report.
  
  The attack would become known as the Memphis Race Massacre.
  
  In the days that followed, Congress dispatched federal agents and members of the Freedman’s Bureau – which had been founded to help the formerly enslaved transition into citizenship – to interview survivors and document what had occurred.
  
  Frances Thompson was “one of many women who got up that morning and walked to the congressional hearing and told her story,” historian Hannah Rosen said.
  
  Rosen’s book, “Terror in the Heart of Freedom,” details how White men weaponized sexual violence against Black women after the Civil War – and highlights the bravery of women like Thompson who shared their experiences.
  
  Investigators noted that Thompson used crutches and described herself as a “cripple” who had “cancer in (her) foot.” On the first night of the massacre, Thompson said the White men – including two police officers – entered her home and demanded that she and her 16-year-old housemate, Lucy Smith, make them dinner.
  
  “When they had eaten supper, they said they wanted some woman to sleep with. I said we were not that sort of women, and they must go,” Thompson testified. “They drew their pistols and said they would shoot us and fire the house if we did not let them have their way with us.”
  
  Thompson said she was assaulted and beaten so badly she remained in bed for days and was sick for two weeks. Lucy Smith, who was also attacked and assaulted, testified that she “thought they had killed me.”
  
  Newspapers published excerpts from the House report. Rosen said the brutality of the massacre, combined with the testimony of Thompson and the other women who were assaulted, horrified the nation.
  
