  In a statement shared with the Associated Press last month, Colorado House Democrats said: “If the GOP wants to spend time and money on which portrait of Trump hangs in the Capitol, then that’s up to them.”
  
  The year before Boardman’s portrait was unveiled, a pranksterhung a portraitof Russian President Vladimir Putin near the space set aside for Trump at the Colorado state Capitol. It was discovered by a tour guide and quickly removed by Capitol staff.
