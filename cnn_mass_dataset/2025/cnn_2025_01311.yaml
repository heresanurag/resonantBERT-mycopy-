title: "Newly discovered fungus turns cave-dwelling spiders into ‘zombies’"
date: "2025-02-14"
section: "Science"
url: "https://www.cnn.com/2025/02/14/science/zombie-spider-fungus-caves-gibellula/index.html"
content: |
  Sign up forCNN’s Wonder Theory science newsletter. Explore the universe with news on fascinating discoveries, scientific advancements and more.
  
  Scientists in Europe have identified a previously unknown species of fungus that turns cave spiders into “zombies.” The fungus lures them out of their webs before instigating an untimely death and then uses the spiders’ corpses to spread its spores.
  
  The newly discovered species, named Gibellula attenboroughii, acts in a similar way as thezombie ant fungus, seemingly manipulating its prey to move to a more suitable spot for the fungus to spread, according to a study published January 24 in the journalFungal Systematics and Evolution.
  
  But the way in which the fungus affects the arachnid’s brain is still a mystery, and a multitude of questions remain about the fungus’ evolutionary pathway and ecological impacts.
  
  “We know very well the ants, the wasps, and very few other examples. And now this is in a different family, so it’s a new origin of behavior manipulation,” said study coauthor Dr. João Araújo, a mycologist at the Natural History Museum of Denmark and an assistant professor at the University of Copenhagen. “It’s something really interesting that’s not super common in the parasitic world.”
  
  The finding opens up new research opportunities to better understand animal-controlling fungus and illuminates the diversity of fungi yet to be uncovered, researchers said.
  
  The newfound species is part of a larger branch of fungi that exclusively infects spiders.
  
  Researchersobserved a different species of Gibellula (G. aurea found in Brazil) possibly manipulating spiders to move to the underside of leaves before death, as described in aNovember 2022 studycoauthored by Araújo. However, the maneuver was not as strikingly evident as it is when G. attenboroughii targets cave spiders, Araújo said.
  
  So far, scientists have only observed G. attenboroughiiinfecting the spiders Metellina merianae and Meta menardi, both cave-dwelling orb weavers that are found inEurope.
  
