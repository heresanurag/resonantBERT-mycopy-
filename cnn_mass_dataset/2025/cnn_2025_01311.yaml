  “Fungi have evolved many millions of years ago, more than 100 million years ago, and they have been coexisting with these spiders and other species of fungi and other insects,” Araújo said.
  
  “Actually, we can hypothesize that they keep the forest in balance,” he added, pointing to the case of the zombie ant fungi.Scientists have documentedthe lethal parasite regulating the insect population, Araújo said.
  
  Around 150,000 species of fungi have been formally documented, but it’s estimated that numberis only around 5% of the diversity of fungus out there to be discovered, said Dr. Matthew Nelsen, an evolutionary biologist and research scientist at Chicago’s Field Museum of Natural History, who was not part of the new study. “This study draws attention to this challenge and will further inspire the community to work to close this gap,” Nelsen added in an email.
  
  The authors also noted the presence of mycoparasites observed eating the zombie spider fungus, “demonstrating that these spiders are important food sources for fungi, which in turn support other fungi. Together, this serves to shine a light on the complex and diverse world around us,” Nelsen said.
  
  The premise of zombie fungus can quickly turn into a horror story whenreimagined as a sci-fi creature infecting humans, such as in the HBO series “The Last of Us,” said to have been inspired by the zombie ant fungus. (HBO shares parent company Warner Bros. Discovery with CNN.) Since this newly discovered fungus only affects spiders, humans need not worry about Gibellula attenboroughii, Nelsen said.
  
  “While there are absolutely some cave-dwelling fungi that are problematic for humans, this is part of a group of fungi that only infects spiders. Jumping to humans would require it to evolve tolerance to our warm body temperature and to circumvent our immune system, both of which serve as strong defenses against most fungi,” he added.
  
