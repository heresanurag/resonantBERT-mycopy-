  American Music Awards nominees announcedAnd rapper Kendrick Lamar, who wowed audiences with his Super Bowl LIX halftime show in February,leads the listwith 10 nominations, including artist of the year, album of the year and song of the year.
  
  Time to pick your players!The first round of the2025 NFL draftbegins at 8 p.m. ET tonight, with the second and third rounds taking place tomorrow and the remaining four rounds happening on Saturday. Fans can watch all of the picks on the NFL Network and ESPN; CNN Sports will also offer live digital coverage.
  
  Concert postponed after Carlos Santana becomes illThe legendary musicianexperienced a medical emergencyand was taken to a hospital on Tuesday just before a performance in San Antonio. Santana’s representative said the Rock and Roll Hall of Famer “is doing well.”
  
  Pedro Pascal makes statement of solidarityThe star of the hit show “The Last of Us” recently wore a T-shirt to the European premiere of “Thunderbolts*” that said“Protect the dolls.”The slogan is seen as a show of solidarity with trans women, who are affectionately known as “dolls” in the LGBTQ community. The issue is personal for Pascal; his younger sister Lux is a trans actress and model.
  
  NFL star Steve McMichael dies at 67The star defensive tackle of the Chicago Bears’ famed 1985 Super Bowl championship team played in 191 consecutive games from 1981 to 1993 and ranks second to Richard Dent on the team’s career sacks list with 92 1/2. McMichael wasinductedinto the Pro Football Hall of Fame in 2024.
  
  59That’s how many hostages Hamasis still holding captivesince it attacked Israel on Oct. 7, 2023, killing 1,200 people and kidnapping 251. On Wednesday, Palestinian Authority President Mahmoud Abbas demanded therelease of the remaining hostagesand the disarmament of the militant group.
  
  “The biggest thing in Canada is we have friends all over the world. How many friends does America have right now?”
  
  — Canadian farmer Peter Hamilton,commenting on President Trump’s calls for annexing Canada. Hamilton said he believesthe upcoming national electionis a key step for the country to reassert its independence.
  
