content: |
  👋Welcome to 5 Things PM!President Donald Trump floated the idea of sending Americans $2,000 rebate checks from tariffs collected by the government. It’s a bold proposal withseveral significant complications.
  
  Here’s what else you might have missed during your busy day.
  
  South America is seeing a boom in fossil fuels just as the impacts of the global climate crisis really bite, but it’s raising thorny questions. Here’s how the region became theup-and-coming oil capital of the world.
  
  Ashlee Buzzard packed her 9-year-old daughter into a rental car and left California. Three days later, she returned alone. Investigators said they’ve uncovered wig disguises and a swapped license plate —but no answers about Melodee’s whereabouts.
  
  The Food and Drug Administration plans to remove the lengthy warning on  hormone treatments for women with menopause. It’s expected to open upmore options for treatmentand generate a flood of new prescriptions.
  
  Visa and Mastercard reached a potential deal with retailers to lower fees for merchants, which could also lower prices. However, there’sone big drawback for consumers.
  
  Nuclear codes, voicemail hacks and businesses going bust: These are some of the biggest password blunders.Learn from their mistakes.
  
  😂A comedy ambassador:Ryan Chen is known as the “Chinese Trump.” He showed CNN’s Mike Valerio around Chongqing and explained how he hopes to use humor to bridge cultural divides.Watch some of his impersonations.
  
  💡Luxe lighting:Designer Lindsey Adelman handcrafts chandeliers that blend centuries-old techniques with sculptural innovation — proving that light itselfcan be a work of art.
  
  🚀A plan written by Jared Isaacman, President Trump’s pick to lead NASA, was leaked. What is the document called?A. “Galaxy Guide”B. “Mars Project”C. “A Stellar Plan”D. “Project Athena”⬇️Scroll down for the answer.
  
  ✅Most popular in Friday’s newsletter:Flight delays and cancellations from the government shutdown —here’s the latest
  
  🧠Quiz answer: D.“Project Athena” outlines the billionaire’s sweeping, ambitious and at times controversialplan for the space agency.
  
  👋 We’ll see you tomorrow.
  
