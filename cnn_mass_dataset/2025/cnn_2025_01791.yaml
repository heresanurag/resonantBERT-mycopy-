title: "Why are a growing number of airlines banning power banks on flights?"
date: "2025-03-26"
section: "Travel"
url: "https://www.cnn.com/2025/03/26/travel/airline-power-bank-rules-explainer-intl-hnk?cid=external-feeds_iluminar_yahoo"
content: |
  Several airlines in Asia are tightening rules on carrying lithium batteries on planes following a series of overheating and fire incidents on board.
  
  A portable power bank with a lithium batteryhas been found to be a possible source of a fire thatengulfed an Air Busan plane in Januarywhile waiting for takeoff, South Korea’s transport ministry said in a press release, citing the investigation committee and forensic services.
  
  Investigators found “multiple electrical melting marks from the remains of a power bank,” the release said.
  
  Travelers often pack lithium-ion battery power banks to charge their phones, tablets, laptops and cameras on the go. The pocket-sized devices keep gadgets fueled to play games or watch downloaded movies to stay entertained on long-haul flights.
  
  But manufacturer issues, misuse and aging canheighten the riskfrom the batteries, which use flammable materials, potentially posing a fire danger on flights. More than 500 in-flight lithium battery incidents involving smoke, fire, or extreme heat have been recorded by theUS Federal Aviation Administration (FAA)in the past two decades.
  
  South Korea implementednationwide restrictionsthat took effect this month, banning passengers from storing power banks and e-cigarettes in overhead cabins on all of the country’s airlines. Passengers can store power banks either in the seat pocket or under the seat.
  
  Charging a power bank on the plane by plugging it into the seat’s USB outlet is also prohibited, according to the new regulations.
  
  “Sockets of a power bank should be covered with friction tape or put in a protective pouch or a plastic bag (eg. zipped bag) so they don’t touch other metals,” the country’s transport ministry said.
  
  Thai Airwaysannounced passengers are no longer allowed to use or charge power banks on flights from March 15, following “incidents of in-flight fires on international airlines,suspected to be linked to power bank usage.”
  
  Starting in April,Singapore Airlinesis banning passengers from using power banks to charge phones and personal devices in-flight. Power banks are also not allowed to be charged using aircraft ﻿USB ports.
  
  Low-cost carrierAir Asiasaid it will require passengers to store power banks under the seat or in the seat pocket, and prohibit charging portable electronic devices throughout the flight.
  
  Taiwan’s major carriers, EVA Air, China Airlines, and Uni Air, have also banned the use of portable chargers in-flight.
  
  Hong Kong’s aviation regulatorsaidit will prohibit passengers from using power banks during flights and from storing lithium batteries in the overhead cabins from April 7. The change comes after aHong Kong Airlines flightfrom the Chinese city of Hangzhou was forced to divert after a portable charging device reportedlytriggered a fire in an overhead compartment.
  
  Lithium-ion batteries are commonly used in power banks due to their high energy density and relatively low cost, according to Chrystal Zhang, associate professor, STEM College at RMIT University. The batteries can store a large amount of power without being excessively bulky, making them a popular choice for high-capacity power banks.
  
  Power banks are essential on long-haul flights, for business travelers, and for anyone relying on mobile devices, since most airports lack sufficient charging stations, Zhang told CNN. Imposing a blanket ban on using them in-flight would inconvenience passengers, she added.
  
