title: "Survivors of Maine mass shooting and victims’ relatives sue US government alleging negligence"
date: "2025-09-03"
section: "US"
url: "https://www.cnn.com/2025/09/03/us/maine-shooting-victims-government-lawsuit"
content: |
  Survivors ofMaine’s deadliest mass shootingand relatives of victims aresuing the federal government, alleging the US Army could and should have stopped one of its reservists from carrying out what they call “one of the most preventable mass tragedies in American history.”
  
  Eighteen peoplewere killed in October 2023 when Robert Card opened fire at a bowling alley and a bar and grill. An independent commission appointed by Maine’s governor later concluded that there were numerousopportunities for interventionby both Army officials and civilian law enforcement as Card’s mental health deteriorated. He was found dead by suicide two days after the shootings.
  
  The lawsuit, filed in federal court on behalf of more than 100 survivors and victims’ family members, accuses the US government of negligence, saying its conduct “directly and proximately caused themass shooting.” It alleges that Army officials and others “failed to act reasonably, broke the promises they made to Card’s family and their community, violated mandatory polices, procedures and disregarded directives and orders.”
  
  Police requests to seize guns from high-risk individuals soar after Maine’s deadliest mass shooting
  
  “By March 2023, the United States and its personnel knew Card was paranoid, delusional, violent, and lacked impulse control. The Army knew he had access to firearms. The Army promised to remove his guns but did not fulfill that promise,” the lawsuit states. “Worse, through its acts and omissions, the Army withheld information and actively misled local law enforcement, thereby preventing others from intervening and separating Card from his weapons.”
  
  Attorneys plan to provide more details Wednesday at a news conferencein Lewiston, not far from where the shootings took place.
  
  The attorneys began the process of suing the government a little less than a year ago when they filed notices of claim, saying the Army did not act despite being aware of Card’smental health decline. Card’s mental health spiral led to his hospitalization and left him paranoid, delusional and expressing homicidal ideations, the claim said. He even produced a “hit list” of those he wanted to attack, attorneys have said.
  
  Family members and fellow reservists said Card had exhibited delusional and paranoid behavior months before the shootings. He was hospitalized by the Army during training in July 2023 in New York, where his unit was training West Point cadets, but Army Reserve officials have acknowledged no one made sure Card was taking his medication or complying with his follow-up care at home in Bowdoin, Maine.
  
  The starkest warning came in a September text from a fellow reservist: “I believe he’s going to snap and do a mass shooting.”
  
  “From the start, the Army disregarded its mandatory policies and procedures, and regulations when dealing with Card,” the lawsuit states. “Despite the serious issues Card presented at the company or battalion level, they were not reported up the chain of command to senior military officials with the knowledge, experience, and resources to address them. Instead, low-ranking, part-time personnel mis-managed the risks, resulting in disastrous consequences.”
  
  Judge sides with gun advocates and pauses Maine gun law enacted in the wake of the Lewiston mass shooting
  
  Army officials conducted their own investigation after the shootings that Lt. Gen. Jody Daniels, then the chief of the Army Reserve, said found “a series of failures by unit leadership.” Three Army Reserve leaders were disciplined for dereliction of duty,according to the report. When the governor’s commission released its final report last August, the Army issued a statement saying it was “committed to reviewing the findings and implementing sound changes to prevent tragedies like this from recurring.”
  
  The Lewiston shootings led to new guns laws in Maine, a state with a long tradition of hunting and gun ownership. The laws promptedlegal actionon the part of gun rights advocates in the state and remain a contentious topic nearly two years after the shootings.
