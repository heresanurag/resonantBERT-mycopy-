title: "Parkland student is a guest of Democratic lawmaker for State of the Union"
date: "2019-02-01"
section: "Politics"
url: "https://www.cnn.com/2019/02/01/politics/parkland-student-state-of-the-union-guest-cameron-kasky/index.html"
content: |
  Ahead of next week’s State of the Union address, Democratic Rep. Eric Swalwell of California announced Friday that he invited one of the students who survivedthe shooting at Marjory Stoneman Douglas High Schoolin Parkland, Florida, as his guest for the event.
  
  Parkland suvivor: Trump is 'professional liar'
  
  Eighteen-year-old Cameron Kasky has beenone of the most vocal and visible student survivorswho played a key role in organizing the March for Our Lives protest last year. This year’s State of the Union address on Tuesday comes just days before the one-year anniversary of the Parkland school’s shooting on February 14, 2018. Seventeen people were killed when a gunman opened fire at the public high school.
  
  Swalwell said in a statement that he’s honored to have Kasky as his guest for this year’s speech to Congress.
  
  “I’m proud to have Cameron join me at the Capitol, nearly one year after he faced a horror no kid should endure at school, to continue this fight, because there is no right more important than the right to live,” he said.
  
  Parkland students will tour the nation to register voters and demand change
  
  Democrats in the House of Representatives introduced a bill in January that would require background checks on private transactions related to gun sales. Former Rep. Gabby Giffords, who survived a deadly shooting in January 2011 in Arizona, attended the bill announcement on Capitol Hill.
  
  In the statement provided by Swalwell’s office, Kasky called Swalwell “one of the most effective change makers out there these days” and says he looks forward to “meaningful discussions about how we can take action to tackle gun violence for the horrific epidemic.”
