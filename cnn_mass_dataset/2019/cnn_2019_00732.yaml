title: "Tencent wants to make Drake and Ariana Grande even bigger stars"
date: "2019-08-06"
section: "Business"
url: "https://www.cnn.com/2019/08/06/business/vivendi-tencent-universal-music-group/index.html"
content: |
  Chinese tech giantTencentcould soon own 10% of the music group behind Drake and Ariana Grande.
  
  French conglomerate Vivendi(VIVEF)confirmed Tuesday that it’s in talks to sell 10% ofUniversal Music Groupto the gaming and social media company.
  
  If the deal is completed, Tencent(TCEHY)would have the right to purchase another 10% of the music group within a year at the same price. Vivendi would get to promote Universal artists on Tencent(TCEHY)’s platforms.
  
  Vivendisaid in a statementthat Universal Music Group would be valued at €30 billion ($33.6 billion) under the deal.
  
  The Paris-based company said last year that it’s willing to sell up to half of Universal Music Group, a crown jewel of its media empire that has been revived by sales of streaming music.
  
  It’s part of a move to cash in on the popularity of subscription and ad-based music streaming services. Vivendi has licensed a significant catalog of hits from artists like Abba and U2 to streaming services.
  
  Arnaud de Puyfontaine, the chief executive of Vivendi, said previously that proceeds from the Universal Music Group sale would be used to buy back shares and acquire companies.
  
  Online games account for some 30% of Tencent’s revenue. In the final quarter of 2018, the company was still suffering from China’s nine-month freeze on approval of new games.
  
  In March, Tencent said asharp fall in its profitswas mainly due to costs related to the US listing of its streaming music subsidiary, Tencent Music(TME), in December.
  
  — Sherisse Pham contributed reporting.
