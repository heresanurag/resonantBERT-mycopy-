title: "US women’s soccer team honors Cardi B, Malala and Beyoncé on jerseys"
date: "2019-03-02"
section: "Sport"
url: "https://www.cnn.com/2019/03/02/sport/uswnt-jerseys-shebelieves-cup/index.html"
content: |
  It looked like Cardi B, Beyoncé and Malala Yousafzai were ready to dribble, pass and shoot a soccer ball.
  
  The US Women’s national soccer team (USWNT) left their usual jerseys in the locker room on Saturday to celebrate women who inspire them.
  
  Each player took the field at the Nissan Stadium in Nashville with a different name on the back of their jerseys during their SheBelieves Cup match against England.
  
  Goalkeeper Ashlyn Harris said she picked rapper Cardi B because she is not what people expect her to be.
  
  “She’s just her and doesn’t care being normal and fitting in and being ordinary. I can appreciate that. She owns her story, all of her story. I think a lot of us can learn something from that,” Harris said.
  
  Forward Mallory Pugh had a chance to wear Beyoncé’s name during the match.
  
  “She’s confident and is just a good role model for women in general because she represents something that is so much bigger than herself,” she said of her choice. “She’s inspiring in her industry and all over the world. She is a person who allows and shows women that they can be who they are and flaunt it.”
  
  Get in formation. 45 minutes to play.#SheBelievesCupon@FOXTV.pic.twitter.com/yct6ilsgty
  
  The team paid tribute to a wide range of women across disciplines and time.
  
  From Supreme Court Justice Ruth Bader Ginsburg and Mother Teresa to Hollywood star Jennifer Lawrence and Nobel Prize winner Malala Yousafzai.
  
  “Malala is someone who stood up for what she believed in even though she knew she could be killed for it. Even after being shot and almost dying she has continued to fight for and inspire women around the world,” said forward Carli Lloyd.
  
  23 players. 23 powerful women.What name would be on your kit?pic.twitter.com/6do6bcMKgq
  
  Other iconic women on the uniforms were Maya Angelou and the late Sally Ride – the first American woman to fly in space.
  
  They also chose fellow athletes like US women’s team stars Abby Wambach, Briana Scurry, Heather O’Reilly and Mia Hamm. And they also picked women involved in other sports.
  
  Defender Crystal Dunn said it was Serena Williams who inspired her to become an athlete. Midfielder Andi Sullivan said she learned to believe in herself after hearing former softball playerJessica Mendozaspeak at her school.
  
  They also wore the names of Doris Burke, the first female full-time analyst on national NBA broadcasts, and San Francisco 49ers assistant coach Katie Sowers, who became the second woman to get a full-time coaching job in the NFL in 2017.
  
  In the game itself, Megan Rapinoe clearly took inspiration as she gave the host the lead with a stunning first half goal.
  
  However, England hit back with goals through Manchester City pair Steph Houghton and Nikita Parris to close on a famous victory.
  
  WE'RE LEVEL!@TobinHeathpokes home a loose ball in the box. 🇺🇸 2-2 🏴󠁧󠁢󠁥󠁮󠁧󠁿pic.twitter.com/v1pXhkX7Y5
  
  It was left to Tobin Heath, sporting Burke’s name on her shirt, to grab a precious equalizer for the US to keep the team’s hopes of winning the competition alive ahead of the final round of matches Tuesday.
  
  Japan, England and the US still has a chance of lifting the prestigious trophy, which is acting as an important pointer ahead of the FIFA Women’s World Cup in France in June.
