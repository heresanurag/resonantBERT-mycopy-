title: "Sears and Kmart are closing these 26 stores in October"
date: "2019-08-07"
section: "Business"
url: "https://www.cnn.com/2019/08/07/business/sears-kmart-closure-list-trnd/index.html"
content: |
  More than two dozen Sears and Kmart stores are closing, as the company continues to struggle afteremerging from bankruptcy.
  
  The parent company of Sears and Kmart, calledTransform Co., said Wednesday that it has “faced a number of challenges returning our stores to sustainable levels of productivity. It plans to close five Kmarts and 21 Sears stores across the United States and Puerto Rico.
  
  Liquidation sales will begin in mid-August and the stores will close in late October.
  
  The company blamed “a generally weak retail environment” for the closures. It also attributed some of the company’s problems to its ongoing court battle withSears Holdings, the still-bankrupt remnant of the company that used to own Sears and Kmart.
  
  “These challenges have unfortunately affected our performance and limited our strategic choices,” Transform Co. added.
  
  Transform Co. warned more store closures could soon be on the horizon.
  
  “Our goal remains to return the company to profitability and preserve as many jobs as possible in the communities we serve,” it said in a statement.
  
  The company said laid-off employees will be offered the same amount of severance that Sears Holdings gave to employees prior to its October 2018 bankruptcy.
  
  Sears is moving forward on a strategy it believes will revitalize its brand. It plans to “accelerate the expansion” of its smaller-formart stores, Sears Home & Life. They arearound 10,000 to 15,000 square feet, rather than the 160,000-square-foot older stores. They don’t sell apparel and instead focus on home goods, including appliances and mattresses.
  
  Transform Co. also plans to add theremaining Sears Hometown and Outlet storesto its portfolio once it completes the purchase of the chain. These stores sell tools, outdoor goods and appliances. Roughly 650 Sears Hometown and Outlet stores remain open.
  
  Sears emerged from bankruptcy in February. A bankruptcy court approved the sale of most of the retailer’s assets to a hedge fund controlled by Eddie Lampert, the company’s chairman, for $5.2 billion. Following the closures, Sears and Kmart will have about 400 remaining stores.
  
