title: "Sue Gordon’s departure is bad news for Trump and country"
date: "2019-08-11"
section: "Opinion"
url: "https://www.cnn.com/2019/08/11/opinions/sue-gordon-bad-news-trump-america-vinograd/index.html"
content: |
  Editor’s Note:Samantha Vinograd is a CNN national security analyst. She served on President Barack Obama’s National Security Council from 2009 to 2013 and at the Treasury Department under President George W. Bush. Follow her@sam_vinograd.The views expressed in this commentary are her own. Viewmore opinionarticles on CNN.
  
  President Donald Trump is quickly losing his top intelligence officials, and his self-inflicted brain drain will continue to have dangerous consequences for US national security. The resignation of Sue Gordon – thehighest-ranking career intelligence officialin the country – after being passed over for the role of Acting Director of National Intelligence, will introduce unnecessary disruptions into an already strained intelligence community.
  
  Much to his dismay, Trump isn’t an oracle, and his disregard for intelligence in favor of his personal convictions has led policymakers to ignore or inappropriately react to threats like white nationalism, election attacks and North Korea. Trump’s prolific personnel problems also signal to our enemies and allies that losing intelligence doesn’t phase him – setting the stage for actual threats to go unaddressed, while we witness the hollowing out of US intelligence.
  
  Experience does matter in Trump’s eyes. Often, however, it seems it’s a disqualifier – rather than a resume enhancer for positions in his administration. Gordon’sdecades of workunder presidents from both parties – and her work at the CIA, National Geospatial-Intelligence Agency, and DNI – provided her experience covering a wide range of issues and responsibilities. Her most recent position – as the Principal Deputy Director of National Intelligence (PDDNI) –kept her busy“advancing intelligence integration across the IC, expanding outreach and partnerships, and driving innovation across the Community,” according to the Office of the Director of National Intelligence.
  
  Trump can't bully his intelligence agencies into submission
  
  She did it all, so to speak, and that’s what may have bothered the President. His son, Don Trump Jr.,tweeted about Gordon’s relationshipwith President Barack Obama’s former CIA Director John Brennan and “the rest of the clown cadre,” and other White House advisersreportedly shared the viewthat Gordon was too close with President Obama’s team. Despite the fact that shebecame PDDNIduring Trump’s administration, conspiracy theories tend to get Trump’s attention.
  
  When publicly questioned about working with Trump, Gordonspoke aboutthe need to ensure that the intelligence community’s work is represented truthfully and for intelligence leadership to make sure it can’t be misrepresented
  
  As an experienced intelligence officer,according to the President, Gordon performed her responsibilities with “candor” – her job was to tell the President what he needed to hear, not what he wanted to hear, even if he rebuffed the analysis she tried to present.
  
  His decision to turn his back on Gordon’s experience signals internally – and globally – that the President views experience not as a virtue, but as a liability.
  
  Naming Gordon Acting DNI would have provided continuity. Her experience as PDDNI means she was already working on a lot of the areas that the Acting Director is also responsible for. She would have had added responsibilities – and a learning curve – but it would have been far less steep than newly named Acting Director of National Intelligence Joseph Maguire will have.
  
  As Director of the National Counterterrorism Center (NCTC), Maguireworked on a narrower rangeof issues and functions. And it’s unlikely he has done a deep dive into election insecurities or North Korea – two issues that require immediate high-level attention. He also hasn’t been looking at resource allocations in those areas or coordinating activities across the 17-member intel community. Gordon had that experience.
  
  He’ll need time to get up to speed – and that transition period is higher risk. Our enemies understand that and may seek to take advantage of this period by ramping up their activities against us.
  
  As Trump looks for a replacement for outgoing DNI Dan Coats – heclaimed on Fridaythat “everybody ” wants the DNI job – it’s hard to imagine what experienced intelligence professional would be willing to take on the role. An intelligence analyst’s job is to present unvarnished analysis and to flag issues that may not be on the President’s radar, even if they don’t jibe with his views or campaign promises.
  
  Why Trump's Ratcliffe nomination was such a disaster
  
  But the Presidenthas personally attackedthe intelligence community when their analysis doesn’t track with his own, and there’s reporting that the intelligence community may not even be comfortable briefing him on key operations because of security concerns. The New York Timesreportedthat Acting Chief of Staff Mike Mulvaney told former Department of Homeland Security Secretary Kirstjen  Nielsen not to raise election security with the President because it could upset him. (Mulvaney says he doesn’t recall saying that.)
  
  But the Timesalso separately reportedthat the intelligence community had concerns about briefing him about another critical topic – cyber operations against Russia – because of fears that he would countermand their efforts or discuss them with foreign officials.
  
  Add to that hisconstant disparagementof the intelligence community, seeming preference for Putin’s assessments over the intelligence community’s, and his decisionto grantAttorney General William Barr authority to declassify intelligence as part of his probe into surveillance of Trump’s 2016 campaign, and it’s not a compelling vacancy announcement for anyone who wants to perform the actual responsibilities of the job.
  
  Trump isn’t looking for a DNI. He’s looking for a research assistant for Barr’s probe and a supervisorto “rein in”the intelligence community. That’s likely what led him to nominate Texas Rep. John Ratcliffe as acting director – a nominationthat was withdrawnbecause of sharp criticism of his inexperience from the left and a lack of enthusiasm for him on the right.
  
  Gordon’s departure is therefore a loss of and for intelligence. It’s the latest indication that we are witnessing the gutting of the intelligence community as we know it. And it will impact members of the intelligence community, making them worry about whether they’ll be fired or passed over or investigated if they show up and do their jobs.
  
  It will also signal to those seeking to sideline the US – or, worse yet, hurt us – that the President doesn’t want to hear what’s happening, because instead of focusing on our security, he’s focused on himself.
