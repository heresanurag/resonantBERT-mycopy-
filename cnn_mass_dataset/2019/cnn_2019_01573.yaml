title: "US journalist reportedly detained in Venezuela is released"
date: "2019-03-06"
section: "Americas"
url: "https://www.cnn.com/2019/03/06/americas/venezuela-us-journalist-detained-intl/index.html"
content: |
  An American freelance journalist reportedly detained by Venezuelan authorities in a raid on his Caracas home has been released.
  
  Cody Weddle is currently at an airport and is headed for Miami, his mother told CNN.
  
  Sherry Weddle says she hasn’t spoken to her son yet but has messaged him via Facebook.
  
  “He said he’s fine,” she said.CNN affiliate WPLG,for whom Weddle works, also confirmed his release.
  
  Weddle had not been heard from since 8 a.m Wednesday, when he was detained by Venezuela’s feared counterintelligence service DGCIM along with his assistant, Venezuelan citizen Carlos Camacho, according to the National Union of Press Workers (SNTP).
  
  Camacho was released late Wednesday, Marco Ruiz, president of the union, told CNN.
  
  The US journalist had lived in Venezuela since June 2014, where he has reported for South Florida’s WPLG Local 10 News, The Miami Herald, ABC and CBC, among others.
  
  WPLG said itwas last in contact with Weddle on Tuesday afternoon. His latest report for WPLG was on self-declared interim president Juan Guaido’s return to Venezuela.
  
  Juan Guaido with a triumphant return to Caracas.   But his path forward remains uncertain.  For@WPLGLocal10>>https://t.co/e9sokSKHCh
  
  Venezuela’s Ministry of Communication declined to comment. The US chargé d’affaires to Venezuela has not responded to a request for comment.
  
  Ruiz told CNN he spoke with three witnesses who were present when Weddle and Camacho were taken into custody.
  
  SNTP has recorded 36 cases of journalists held in Venezuelan custody this year alone, part of a sweeping crackdown on dissident voices by President Nicolas Maduro’s regime.
  
  #AlertaSNTP| Con la detención de Cody Weddle y Carlos Camacho, son 36 los casos de periodistas y trabajadores de prensa presos por@NicolasMaduroen lo que va de 2019.Tres siguen detenidos y otro tiene medida de presentación en tribunales#6Marpic.twitter.com/3mOjDozCAx
  
  Weddle is the latest in a series of foreign journalists to be taken into custody in Venezuela.
  
  Last week, six Univision staffers, including veteran anchorman journalist Jorge Ramos, were brieflydetained at the presidential palacein Caracas when a crew was interviewing Maduro. Ramos and the crew members were released a few hours later, but their equipment, cellphones and interview material were confiscated, according to Univision spokesman Jose Zamora.
  
  Assistant Secretary of State for Western Hemisphere Affairs Kimberly Breier said on Twitter that the State Department was “aware of and deeply concerned with reports that another U.S. journalist has been detained in #Venezuela by #Maduro, who prefers to stifle the truth rather than face it. Being a journalist is not a crime. We demand the journalist’s immediate release, unharmed.”
  
  Maduro is under growing international pressure to relinquish power to Guaido, who has been recognized by Western countries and regional neighbors as Venezuela’s leader.
  
  Opposition leader Juan Guaido returns to Venezuela, risking arrest
  
  US Sen. Marco Rubio, a fierce critic of Maduro,tweeted about Weddle’s detentionon Wednesday, followed by a flurry of posts about sanctions on Venezuela.
  
  White House national security adviserJohn Bolton announcedthat the US was “putting foreign financial institutions on notice that they will face sanctions for being involved in facilitating illegitimate transactions that benefit Nicolas Maduro and his corrupt network.”
  
  Sherry Weddle earliertold CNN that she had been in touch with the US Embassy in Caracas and that they were “following the procedures at this time to make contact with the military police or to make contact with Cody” and would get in touch with her “when they have any information.”
  
  “I’ve also talked to several of our delegates here in Virginia [Sen. Mark Warner and  Rep. Morgan Griffith] and they are making contact also,” Sherry Weddle, who lives in Meadowview, Virginia, where Cody was born and raised, said in a phone call.
  
  “If I thought traveling to Venezuela would be of help, I’m ready to get on the plane but I’m awaiting for confirmation from the US Embassy to see what they know.”
  
  Sherry Weddle said she last spoke with Cody on Facebook messenger Tuesday evening. “Yesterday [I heard from him at] maybe about 6 or 7 yesterday evening and yesterday morning about 10, I asked him how he was doing, he said he was fine and wanted to know how I was.”
  
  They last saw each other in September, when he came home for his 10 year high school reunion. While a student at Virginia Tech, Weddle studied abroad in Ecuador and went back to the country after graduation to improve his Spanish. He later took a job in Venezuela.
