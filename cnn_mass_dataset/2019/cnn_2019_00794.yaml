  [Note: this one was published in 2017, but was very much on our minds this weekend as Florida braces for Hurricane Dorian.]
  
  Sending your children back to school – or taking them to college for the first time, or being the student who leaves home – is more than a rite of passage. It’s a reminder and an extension of your family’s own particular story – the joy, pain and everyday details that make you unique. You opened some amazing windows into your families with stories of the “empty nest.”
  
  “I am a single father, blessed with five wonderful women. Moreover, my five daughters only have two birthdays; the triplets are 25 and the twins are 18. The older girls received their degrees from three different NC universities,” wrote inReid H.of Greensboro, NC. “Given our family size and structure, Empty Nest Syndrome always seemed so far into the future, perpetually distanced on a never ending conveyor of children. Normalcy was the off to college order as the twins accompanied me on each of their older sisters’ campus move-ins (three different campuses on three consecutive days)!… Though I’m still employed and enjoying a successful career, the past 25 years have been solely focused on being the best father that I could possibly become. In a way, the work is done and the ultimate goal has been reached. All five daughters made it to college! What now? Who am I? Where will I invest my passion, energy and commitment? I do feel a bit lost and disoriented, though not really sad. I feel grateful and proud of my girls for persevering through a divorced home life, and I truly believe that their grandparents’ support and our village of wonderful friends have collectively provided each of us a peaceful path to realizing our individual potentials. We’re just now getting started.”
  
  “Watching my children start each college chapter has been a roller coaster of emotion. For them and us,” saidJohn Randof Cincinnati. “They were blessed with their mother’s brain and work ethic so all of them had their choice of schools. But completing all those applications and essays took many edits around the kitchen table. We let each child decide for themselves where to go to school. But we made sure they understood the costs involved with each of their choices. My sons are studying bio-medical and chemical engineering and my daughter graduated in December 2018 from the University of Toledo in Chemical Engineering. So I know they will be successful and this helps to reduce my stress about their futures. As my own mother insisted, when I asked how she handled me moving away 12 hours to school (from Connecticut to Ohio), ‘I did my job. I taught you to be independent. So moving away meant that I had succeeded.’ But I still fear the empty nest will echo to loudly for me.”
  
  Kids don’t just leave home to spread their wings for college –Abe Breslinof Lancaster, PA wrote to share his family’s decision to send their teenage daughter to an intensive school for ballet at 15: “My wife discussed her concerns about missing out on the high school experience, Homecoming games, Proms, concerts, etc. We decided that the opportunity was just too good for her to pass up. She selected a ballet school that is 2 hours away from our home… so she is far enough that she is going to get the full experience but close enough that we can visit, she can come home for a weekend or we can even meet her for dinner at night. It’s still an odd feeling that our younger daughter is leaving the house before our oldest…but it is an opportunity that we are embracing as a family.”
  
  That empty nest feeling isn’t limited to parents, asHannah B.of New York City pointed out. A recent college graduate, she watched her parents load up the car without her to take her sister back to college: “I will be sitting in my over-air-conditioned, Midtown, corporate office, thinking about what used to be. The symbolic separation of our routines has been difficult to navigate this summer. These traditions and routines are what have kept me feeling stable and secure for the past 21 years, especially during the late summer weeks, a time in which most children are transitioned from the chaos of summer, back into school year structure. But as my family continues on with normalcy, I am forming a new identity, complete with new relationships, habits, and traditions of my own. Most of my recently graduated friends are feeling this way it seems, as we all have been reaching out to check in, reconnecting with one another as to project normalcy both to ourselves and each other…. And while our new lives are filled with the structure and obligations of our first jobs, it seems as though we have more agency than ever. What will we have for dinner tonight? Can we afford to eat out again with a friend rather than being lonely in our tiny apartments….? Do we have a job that we like or should we be looking towards our next endeavors? This summer is a transitional stage of our lives. Up until now, everything was figured out for us. Now, we must try to figure things out for ourselves. It is both liberating and terrifying.”
  
  Our regular column and newsletter will be back next week. Until then, thank you to all our readers – especially those of you who shared your stories. We wish you and yours a happy, healthy Labor Day.
