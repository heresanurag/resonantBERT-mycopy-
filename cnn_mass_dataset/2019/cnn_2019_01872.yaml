  “We also should double down our efforts on the other adolescent addictions to ensure they continue to decrease,” Benjamin said. “The recently agreed upon increase to age 21 for both combustible tobacco and e-cigarettes included in the appropriations bill being voted on this week is an additional needed step.”
  
  Lawmakers have agreed to ban the sale of tobacco products toanyone under the age of 21as part of the sweeping year-end spending agreement, according to multiple people involved in the talks. The increased age restriction for tobacco purchases is one of several provisions outside the spending measures themselves that will be attached to the broader $1.4 trillion spending agreement and likely become federal law.
