title: "Quickly catch up on the day’s news"
date: "2019-09-04"
section: "App News Section"
url: "https://www.cnn.com/2019/09/04/app-news-section/quickly-catch-up-september-4/index.html"
content: |
  Here’s what you might have missed Wednesday on CNN:
  
  –Hurricane Dorian is lashing the Florida coast as itmarches toward a potentially dangerous brushwith the Carolinas.
  
  – Therecovery effort begins in the Bahamasas officials warn the death toll there is likely to rise days after Dorian came ashore.
  
  –Winston Churchill’s grandson is oustedfrom the Conservative Party by British Prime Minister Boris Johnson as part of the unending Brexit crisis.
  
  – Rep. Bill Flores sayshe won’t seek reelection, becoming the fifth Texas Republican to retire in 2020.
  
  – Fivefamily members celebrating a birthdayare among the dozens feared dead in the Labor Day boat fire off the California coast.
  
  – Caregivers tell a government watchdog how someseparated migrant childrenexperienced inconsolable grief, confusion and trust issues.
  
  – Googlepays a record fine to settle accusationsthat YouTube illegally collected kids’ data.
  
  – Hong Kong leader Carrie Lam withdraws acontroversial extradition billthat sparked months of protests.
  
  – AnAmerican woman is being held in the Philippinesafter airport staffers find a baby in her hand luggage.
  
  – Michigan is set to be the first state toban flavored e-cigarettes.
  
  – And today is a very special day in the lives of members of theBeyhive.
