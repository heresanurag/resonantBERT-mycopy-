  Following the first intake this year, the Academy hopes to increase to 150 in the second year and then introduce a separate pathway for girls in the third. Recent applicants came largely from London and the UK, but a few traveled from Europe to take part in trials.
  
  All about that speed 🔥#NFLAcademypic.twitter.com/0waU4lwJBI
  
  “Many kids are part of their environment and have limited opportunities,” says Kirkwood. “This is intended to provide structure and discipline and teach resiliency and the importance of teamwork.
  
  “There might be a small handful that end up being athletically talented enough to then go the whole way into the NFL, but that’s a bonus, that’s not the reason for doing it.”
  
  Tottenham Hotspur’s new, 62,000-seat stadiumin north London provided a glamorous backdrop for the final round of trials at the start of July. Hopefuls underwent the same tests used in the NFL scouting system – the 40-yard dash, broad jump, vertical jump, and an agility drill.
  
  There was no shortage of athletic prowess on display. Two trialists, for example, clocked 4.5 seconds for the 40-yard dash – a time not dissimilar to those recorded by NFL running backs and wide receivers.
  
  “I said to the kids that ultimately the day was about performance,”Christian Wade, an England-capped former rugby player who has earned a place on the Buffalo Bills’ practice squad, tells CNN Sport.
  
  “Just going out there and giving it everything.”
  
  Wade left a successful rugby career late last year and knows how difficult it can be to walk into a new sport from scratch.Like other Brits before him, he had never played a game of American football before switching codes.
  
