title: "How the NFL is offering a lifeline for teenagers in London"
date: "2019-09-06"
section: "Sport"
url: "https://www.cnn.com/2019/09/06/sport/nfl-academy-london-spt-intl-gbr/index.html"
content: |
  For 80 students in London, the start of the new school year won’t feel as mundane as usual.
  
  A new academy, overseen by the NFL, has recently opened its doors in the English capital, and pupils will arrive for their first day with a sense of dreamy excitement that comes with studying under the banner of the world’s most valuable sports league.
  
  The NFL has long sought to gain global appeal by staging games in London, and this October Tottenham Hotspur’s new stadium – the first custom-built NFL ground outside the US – will host its first fixtures.
  
  But today, overseas growth is not only about unearthing new fans, but new players also.
  
  Visit CNN.com/sport for more news, videos and features
  
  For a teenage American football fan living in London – someone whose appetite for the sport is fed largely by binging on YouTube highlights and watching games into the small hours – the prospect of experiencing the game first hand can seem a lifetime away.
  
  And that is where the NFL Academy comes in. Open to boys between the ages of 16 and 19, it gives students a formal education – either through A Level exams or vocational diplomas – on top of 10-12 hours of American football training each week.
  
  The aim is not to mass produce overseas stars, but rather, as NFL UK managing director Alistair Kirkwood explains, to “build out well-rounded individuals that can contribute to society and become more employable.”
  
  The elite few, says Kirkwood, will go on to play college football – and beyond – in the States, but just being accepted into the Academy is tricky enough. Of the 1500 applicants for the inaugural year, only 80, following rigorous trials, were offered places to start in September, subject to academic results.
  
  READ: Carli Lloyd received offers to kick in NFL preseason
  
  For those selected – many of whom have been raised in socially deprived areas – the impact could be life-changing. It’s something that hasn’t escaped Efe Obada, the Carolina Panthers’ defensive end who was raised in London.
  
  “[When I was younger] youth clubs were shutting down, gang culture was increasing, funding for everything was getting shut down, and there weren’t that many opportunities,” Obada tells CNN Sport at a trial day for students hopeful of being accepted into the Academy.
  
  “Growing up I never had role models, I never had opportunities like this so to be a part of it, to be able to think I’m even looked up to as a role model is amazing and it’s not something I take very lightly.
  
  “I’m from a similar background to these kids and I’m relating whatever knowledge I can impart. Whatever I wish someone said to me when I was their age or in that situation, then I’m going to try and do that.”
  
  Obada’s route to the NFLwas unconventional, to say the least. Born in Nigeria, he moved to the Netherlands with his mother and sister. At the age of 10, he and his sister were brought to England by a stranger but abandoned on the streets of east London.
  
  From there, Obada moved between various foster homes in troubled circumstances. Yet it was when he started to train with professional American football outfit London Warriors that he found salvation and a stepping stone into the sport.
  
  “I see the NFL having an impact in my community as well. When I was growing up living in Stockwell we had [Premier League side] Fulham that used to hold Saturday trials for people and it was the thing,” continues Obada.
  
  “Everyone that I knew would talk about it: ‘Oh, every Saturday we’ve got to go Fulham, we’ve got to go to this place, we’ve got to go to Larkhall Park because Fulham’s coming.’ But now the NFL’s taking an interest. It’s going to definitely help the kids out. They just want to be a part of something.”
  
