id: cnn_2019_01347
title: "Ford debt has been downgraded to junk"
date: "2019-09-10"
section: "Business"
url: "https://www.cnn.com/2019/09/10/business/ford-downgrade-junk/index.html"
content: |
  Moody’s downgraded Ford’s credit to junk Monday evening. It said the automaker faces considerable business challenges, and its poor financial performance badly positions Ford to take on its planned $11 billion restructuring.
  
  “Ford isundertaking this restructuringfrom a weak position as measures of cash flow and profit margins are below our expectations, and below the performance of investment-grade rated auto peers,” Moody’s said.
  
  News of the downgrade sent Ford shares down 3% in premarket trading Tuesday. They ended the day 1.3% lower.
  
  During the Great Recession, Ford(F)and other US automakers suffered massive losses and junk bond credit ratings, which can raise the cost of borrowing. But the industry has been profitable for about 10 years.
  
  Ford in 2012 wasupgraded to investment grade, which is what a credit rating is called when it is not considered a junk bond.
  
  The company responded that it is taking the proper steps to improve its business, and that it has the cash necessary to do so.
  
  “Ford remains very confident in our plan and progress.  Our underlying business is strong, our balance sheet is solid and we have plenty of liquidity to invest in our compelling strategy for the future,” said company in a statement.
  
  GM's restructuring was tough. Ford's could be even harder
  
  The restructuring, announced in July 2018, should include cash outlays of about $7 billion, and special charges against earningstotaling $11 billionover the course of three to five years. Executives say the changes are necessary to refocus the company on growth areas, such as electric and self-driving vehicles, and away from money-losing or slow growth sectors of the company, mostly overseas.
  
  The company has remained profitable in the year since it first announced its restructuring plans. But it hasyet to disclosemost of the details that will make up the restructuring, let alone put the changes in place.
