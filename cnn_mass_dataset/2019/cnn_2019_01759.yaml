  Those numbers increased another 30% in the six years between 2006 and 2012, researchers said in the new report, with the increase again affecting all ages and races of mothers.
  
  Gastroschisis typically causes the baby’s intestines to poke through a hole in its abdomen near the belly button. Because there is no protective sack around intestines, they can easily become irritated by amniotic fluid and begin to twist, swell or shorten. At times other organs, such as the liver and stomach, also protrude through the opening.
  
  The baby needs immediate surgery to put the organs back into the baby’s body and repair the opening. Still, many infants with the condition have problems digesting breast milk and food and absorbing nutrients, which can affect the baby’s development. Some babies die or suffer life-long problems from the defect.
