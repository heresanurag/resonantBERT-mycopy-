title: "Rise in serious birth defect might be tied to opioid use, study says"
date: "2019-01-17"
section: "Health"
url: "https://www.cnn.com/2019/01/17/health/birth-defect-gastroschisis-opioid-study/index.html"
content: |
  A potentially deadly birth defect in which babies are born with exposed intestines is on the rise, and researchers are concerned that it might be tied to the opioid epidemic.
  
  Serious birth defect on the rise, CDC researchers say
  
  The birth defect, calledgastroschisis, happens early in a mother’s pregnancy when the walls of the baby’s abdomen don’t develop properly. While science hasn’t figured out the exact cause of the condition, there are risk factors. Teen mothers are more likely to give birth to a baby with the defect, as are women who drink and smoke. Now it appears there’s an association with prescription opioid use.
  
  “An analysis found a higher prevalence of gastroschisis in areas where opioid prescriptions rates were high,” researchers said in anew report published by the US Centers for Disease Control and Prevention Thursday.
  
  In their latest analysis, researchers found that the rate of gastroschisis in the United States was 1.6% higher in counties with high opioid prescription rates than in counties with low rates of prescription opioid use. Counties with medium rates of opioid use were 1.4% higher than those with lower rates.
  
  Rate of women addicted to opioids during pregnancy quadrupled in 15 years, CDC says
  
  While the birth defect continues to be most common in mothers under the age of 20, the largest increase in cases occurred in older mothers.
  
  Those findings echo the results of prior studies, the CDC said, including astudy of over 17,000 motherswhich found an association between birth defects and opioid use just before pregnancy through the first trimester.
  
  While the connections are intriguing, the CDC warns that the current analysis doesn’t prove a cause and effect, only that more research is needed “to better understand the potential contribution of opioid exposure” to the cause of gastroschisis and the rise in cases.
  
  According to the CDC,less than 2,000 babiesare typically born with the defect each year in the United States. But there has been an alarming rise over the last two decades: In 2016, the CDC reported that cases of gastroschisis had doubled between 1995 and 2005 for mothers of every race and age group.
  
