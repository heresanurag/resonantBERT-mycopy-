id: cnn_2019_00847
title: "Prince William kisses Prince Louis in adorable new family snap"
date: "2019-12-25"
section: "UK"
url: "https://www.cnn.com/2019/12/25/uk/cambridge-royal-christmas-photo-gbr-intl/index.html"
content: |
  Britain’sDuke and Duchess of Cambridgehave released an adorable new family photograph forChristmas.
  
  The black and white photograph shows Prince William in a flat cap, holding his youngest son, one-year-old Prince Louis, close and giving him a kiss on the cheek.
  
  The royals posted the photograph –  taken byKatein Norfolk earlier this year – on their official Twitter account Wednesday with the caption: “Merry Christmas to all our followers!”
  
  It also shows a smilingPrince George, 6, sitting in a chair next to his dad and brother, while his sister, four-year-old Princess Charlotte stands behind.
  
  The Cambridge’s two eldest children were expected to attend the royal’sannual Christmas day church serviceat Sandringham for the first time on Wednesday.
  
  This is not the first time Kate has shared her own family photographs with the world.
  
  Previously Kensington Palace hasdistributed several photographstaken by the duchess to mark key milestones in the children’s lives, such as birthday andfirst days at school.
  
  Earlier this week, William’s brother Harry releasedhis first family Christmas cardfeaturing his wife, Meghan and baby Archie. The adorable eight-month-old tot was seen front and center, staring into the camera.
