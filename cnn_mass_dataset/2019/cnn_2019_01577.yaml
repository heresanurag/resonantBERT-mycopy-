  Her 97-year-old husband,Prince Philip, wasdischarged from a London hospitalafter a four-night stay for an undisclosed condition Tuesday morning.
  
  Earlier this year, the Duke of Edinburgh gave up his driving license after he was involved in acar crashnear the Queen’s Sandringham estate in Norfolk. While the duke emerged unharmed, the driver of another vehicle in the collision suffered cuts to her knee and a passenger sustained a broken wrist.
  
  Last month also saw Prince Andrew – the Queen’s second son – step back from public duties following a widely-criticized interview about his relationship with convicted sex offender Jeffrey Epstein.
  
  Andrew has kept a low profile in the weeks since buthe was picturedwalking alongside his brother Prince Charles as the pair made their way to a private Christmas Day church service on Wednesday morning.
  
