title: "‘Last Christmas’ trailer is a gift to your cynical heart"
date: "2019-08-14"
section: "Entertainment"
url: "https://www.cnn.com/2019/08/14/entertainment/last-christmas-emilia-clarke-henry-golding-trnd/index.html"
content: |
  It’s beginning to look a lot like we might have a new holiday favorite in the upcoming romantic comedy, “Last Christmas.”
  
  Starring Emilia Clarke and “Crazy Rich Asians” breakout Henry Golding, “Last Christmas” doesn’t look to be re-inventing the rom-com wheel.
  
  Per the just-released trailer, Clarke plays a woman who works in a Christmas shop and is a little wayward in life. Golding plays a man who seems to have a heart of gold and plenty of charm. They find each other. They are an unlikely pair. There’s ice skating.
  
  What more can a moviegoer ask for from a candy cane-sweet holiday film? Nothing, reader. Nothing.
  
  Paul Fieg directed the film based on the screenplay by Emma Thompson and Bryony Kimmings.
  
  It will be released in theaters on November 8.
