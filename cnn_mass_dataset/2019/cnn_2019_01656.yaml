  _August 22, 2019_
  
  _A meeting between two world leaders has been postponed, and the reason why centers on the world’s largest island. A CNN Hero uses the sport of boxing to help young people in Chicago succeed. And a time capsule is opened in the state of New Hampshire, but the event brings more questions than answers._
  
