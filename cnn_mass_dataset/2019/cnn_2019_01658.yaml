title: "‘50 Shades of Maple Glen’ lists a suburban house with something extra"
date: "2019-02-10"
section: "US"
url: "https://www.cnn.com/2019/02/10/us/50-shades-maple-glen-sex-basement-trnd/index.html"
content: |
  For sale in quiet Philadelphia suburb: 5,000-square-foot Colonial with gourmet kitchen, hardwood floors, master bedroom and more.
  
  Much, much more, as it turns out.
  
  The $750,000 home in Maple Glen comes furnished –fullyfurnished – with a large, finished basement featuring whips, chains, bondage equipment and swing.
  
  “It’s what I call a private adult playground or sexual oasis,” said listing agent Melissa Leonard of the home she calls “50 Shades of Maple Glen” after the “50 Shades of Grey” books and movies featuring kinky sex.
  
  She listed the house Thursday night online and it quickly got thousands of views. The photos of the house’s special feature were quickly removed from the main listing site after some real estate agents complained.
  
  Neighbor Barry Katz toldCNN affiliate WPVIhe wasn’t happy about it, either.
  
  “It’s not for us,” Katz said. “Take it downtown. Take it to Los Angeles or Hollywood or wherever, just not here.”
  
  But Leonard said she has 38 showings scheduled through Wednesday, and she isn’t concerned that some people might not like the bonus amenity. A new owner could easily have it removed and use the basement for more ordinary suburban activities.
  
  The owner lost his wife last year and then renovated the basement with his new girlfriend. He and his children – one in high school, one in college – live there part time.
  
  He also rents it out on Airbnb for up to $2,000 a night. That’s why he wanted the accoutrements to remain while the house is on the market.
  
  And some home shoppers will like it, she said.
  
  “When the seller called, he said, ‘I need a Realtor who can think outside the box,’ ” Leonard said. “He told me he was going to send some pictures. I was driving, and he told me to pull over.
  
  “I think it’s great. It sets us apart. And this goes on in a lot of places.”
