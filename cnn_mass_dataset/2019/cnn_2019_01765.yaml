id: cnn_2019_01765
title: "NYT: Saudi Crown Prince said he would use ‘a bullet’ on Khashoggi"
date: "2019-02-08"
section: "Middle East"
url: "https://www.cnn.com/2019/02/08/middleeast/jamal-khashoggi-saudi-us-intl/index.html"
content: |
  Saudi Arabia’s Crown Prince Mohammed bin Salman told a top aide in 2017 that he would use “a bullet” on Saudi journalist Jamal Khashoggi,according to a New York Times reportciting US and foreign officials with direct knowledge of intelligence reports.
  
  The conversation – with aide Turki Aldakhil – occurred in September 2017, just over a year before Khashoggi, a Washington Post columnist, was killed and dismembered after entering the Saudi consulate in Istanbul, the Times reported Thursday.
  
  In the conversation, bin Salman reportedly said that if Khashoggi – a Saudi royal court insider turned government critic – could not be tempted back to the kingdom, then he should be returned forcibly. If that did not work, the Crown Prince said he would go after Khashoggi “with a bullet,” the Times reported officials familiar with one of the intelligence reports as saying.
  
  The recording was intercepted at the time by US intelligence, the Times said. However, its significance was only understood when it was listened to by intelligence officers after Khashoggi’s death.
  
  The article also claimed that days before the conversation with Aldakhil, according to the same intelligence report, bin Salman complained to another aide, Saud al-Qahtani, that Khashoggi had grown too influential and was reportedly tarnishing his image as a reformer.
  
  Jamal Khashoggi is still being used as a political commodity
  
  Riyadh has maintained that neither bin Salman nor King Salman knew of the operation to target Khashoggi last October. US officials, however, have said such a mission – including 15 men sent from Riyadh – could not have been carried out without the authorization of bin Salman.
  
  Saudi prosecutors haveput 11 people on trial accused of Khashoggi’s murder, demanding the death penalty for five of them. However, UN officials say the trial falls short of their call for an independent and international investigation, and US officials say it has not reached the “threshold of credibility and accountability” they expect.
  
  US President Donald Trump has come under pressure from Congress and others to hold Saudi Arabia accountable over the Khashoggi case.
  
  The White House faces a deadline Friday to respond to a Senate request for the President to determine whether bin Salman is responsible for a violation of human rights “against an individual exercising freedom of expression” under the Magnitsky Act.
  
  Representatives from the Committee to Protect Journalists, Human Rights Watch and other groupsgathered near the White Houseon Thursday to draw attention to the looming deadline.
  
  Courtney Radsch, of the Committee to Protect Journalists, said a “strong response” from the US administration and Trump himself “would send a message to the Saudi authorities that acts, such as the murder of Jamal Khashoggi, will not be tolerated.”
  
  Justice for Jamal Khashoggi: Press freedom advocates call on Trump to stand up to Saudi Arabia
  
  However, a source familiar with the administration’s plans told CNN that the administration was expected to “double down on defending MBS. They think the pressure is fading.” The source added that the expectation was that the White House would reiterate there is not a “smoking gun” directly tying the Crown Prince to the murder.
  
  The CIA concluded that bin Salman ordered Khashoggi’s murder, but Trump and some of his allies have cast doubt on the intelligence assessment.
  
  The Trump administration has been reluctant to punish Saudi Arabia over Khashoggi’s murder,citingeconomic benefits to the US.
  
  Meanwhile, the UN Special Rapporteur leading an international human rights inquiry into Khashoggi’s murder on Thursday accused the Saudis of having “seriously curtailed and undermined” Turkey’s efforts to comply with the investigation by denying access to the consulate for almost two weeks after his October 2 killing.
  
  MBS 'clampdown' fuels surge in numbers of Saudi refugees
  
  “Inadequate time and access was granted to Turkish investigators to conduct a professional and effective crime-scene examination and search required by international standards for investigation,” Agnes Callamard said in apreliminary reportfollowing a visit to Turkey last week.
  
  Her team had, however, been given access to evidence “including to parts of the chilling and gruesome audio material obtained and retained by Turkish intelligence agency,” Callamard said. She added that they were not able to undertake a deep technical examination of this material, and had not had the opportunity to independently authenticate the audio material.
  
  Callamard called the journalist’s murder “the gravest violation of the most fundamental of all rights, the right to life” and said it was “unconscionable” that the Saudi authorities continued to fail to disclose the whereabouts of his remains.
  
  Saudi women's rights activist is being tortured in 'palace of terror,' brother says
  
  “Evidence collected during my mission to Turkey shows prime facie case that Mr. Khashoggi was the victim of a brutal and premeditated killing, planned and perpetrated by officials of the State of Saudi Arabia,” she said.
  
  “The mission could not firmly establish whether the original intention was to abduct Mr. Khashoggi, with his murder planned only in the eventuality of this abduction failing. What is abundantly clear is that much planning and preparation took place following Mr. Khashoggi’s initial visit to the consulate on 28 September.”
  
  Callamard said she had requested an official country visit to Saudi Arabia in order for officials there to provide relevant evidence, shed light on the prosecution process and explain why the kingdom was denying Turkey’s demand for the suspects’ extradition.
  
  The Saudis have presented shifting stories about Khashoggi’s fate, initially denying any knowledge before arguing that a group of rogue operators, many of whom belong to bin Salman’s inner circle, were responsible for the journalist’s death.
