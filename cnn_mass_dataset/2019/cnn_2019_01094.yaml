id: cnn_2019_01094
title: "The wild horses of the Outer Banks won’t evacuate. They have a special trick to survive hurricanes"
date: "2019-09-05"
section: "US"
url: "https://www.cnn.com/2019/09/05/us/north-carolina-wild-horses-hurricane-dorian/index.html"
content: |
  A bunch of majestic horses that spend their days frolicking on the beach in North Carolina’s Outer Banks will not be evacuated.
  
  WithHurricane Dorianquickly approaching,the colonial Spanish mustangs will huddle togetherand ride out the storm using a trick horses have used for centuries.
  
  They willmove to higher ground and gatherunder sturdy oak trees to shelter from the storm, said the Corolla Wild Horse Fund, which manages the herd and sends a similar reminder during major hurricanes due to the outpouring of concern for the horses. “They’ll likely ride out winds and rain as their ancestors did before them — in huddles, butts to the wind,” it added.
  
  And unlike human beings living in the Outer Banks, the wild horses are better equipped to handle a hurricane. They’re already sensing a change in air pressure and are grouping up together.
  
  “Remember, they’ve been doing this for 500 years!” the fund said.
  
  The horses’ food, water and other supplieshave been stocked upat the farm.
  
  They have extra hay and grain, and their troughs are filled with water. They also have ID tags braided into their manes, and the herd manager will ride out the storm at the farm with them, the Fund said.
  
  Jo Langone, chief operating officer for the fund, said the horses were in good shape on Thursday evening.
  
  More than 1 million people in parts of South Carolina and North Carolina are under mandatory evacuation orders, forecasters said.
  
  Hurricane Dorian’s core approached the Carolina coasts on Thursday. Downtown Charleston was experiencing flooding as a result of the storm, which is expected to continue north on Friday.
  
  Despite the dangers from the storm, the 100 or so wild horses in the area are resourceful and have an incredibly strong will to live,herd manager Meg Puckett saidduring Hurricane Florence last year.
