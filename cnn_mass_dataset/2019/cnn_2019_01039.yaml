  This has potentially huge implications for athletes or people with joint injuries. MicroRNA could be injected into joints or developed into medicines that prevent or reverse arthritis, the study said. In the more distant future, it could even “establish a basis for human limb regeneration.”
  
  The next step is to figure out what regulators humans lack that salamanders have – and then see if it’s possible to “add the missing components back,” said Duke professor Virginia Byers Kraus, one of the lead authors in the study.
  
  Once those missing components are identified, they could be combined with microRNA to create a “molecular cocktail” aimed at regenerating entire limbs, the study said.
  
  “We believe that an understanding of this ‘salamander-like’ regenerative capacity in humans, and the critically missing components of this regulatory circuit, could provide the foundation for new approaches to repair joint tissues and possibly whole human limbs,” Kraus said.
