id: cnn_2019_01200
title: "Cigarette filters are the No.1 plastic pollutant … and don’t prevent cancer"
date: "2019-01-24"
section: "Health"
url: "https://www.cnn.com/2019/01/24/health/dirty-truth-about-cigarette-filters/index.html"
content: |
  Plastic straws and bags have received widespread attention as pollutants. But another, even bigger, plasticproblem has been slipping under the radar – cigarette filters.
  
  Cigarette butts containing plastic filters arethe most littered item in the world.
  
  “Many smokers assume the filters are made of a biodegradable material,” says Elizabeth Smith, who works on tobacco control policy at the University of California San Francisco.
  
  In fact, filters are made of cellulose acetate – a type of plastic that can takeup to a decadeto decompose.
  
  But now the European Union is cracking down on this hidden problem. Newruleswill require the tobacco industry to fund the cleaning up of cigarette stubs, as part of a broader initiative to reduce single-use plastic items.
  
  Cigarette filters are poisoning our environment – but do they do anything to help smokers’ lungs?
  
  About6 trillion cigarettesare manufactured a year and over 90% of them contain plastic filters. That’s more thanone million tonnes of plastic.
  
  Tossing a cigarette butt on the ground is one of the most accepted forms of littering, according to theWorld Health Organization. Abouttwo-thirdsof butts are dumped irresponsibly – stubbed out on pavements or dropped into gutters, from where they are carried via storm drains to streams, rivers and oceans.
  
  Cigarette butts have beenthe number one item collected by the Washington DC-based Ocean Conservancy’s global beach clean-ups every year since the initiative started in 1986.Its volunteers have collected more than 60 million butts.
  
  Nick Mallos, director of the group’s Trash Free Seas program, says that “many of those found on beaches are simply left behind by beachgoers.”
  
  A recent studyplaced fish in water in which cigarette butts had been soaked and removed. After four days, half the fish had died, showing that cigarette butts “seep in into the aquatic environment and are toxic and deadly to living creatures,” says Thomas Novotny, emeritus professor of global healthat San Diego State University, who was involved in the study.
  
  Plastic filters were invented in the 1950s in response to lung cancer fears.
  
  Tobacco smoke contains about250 harmful chemicals, including heavy metals, arsenic and polonium-210, a highly radioactive substance that has beenused in assassinations. At least 69 of these chemicals are known to cause cancer.
  
  Filters were engineered to reduce lung cancer by blocking toxins.
  
  However, by the mid 1960s researchers realized that the tar and nicotine they were trying to filter out were the very substances that made cigarettes satisfying to smokers.
  
  The companies kept the filters, but made them less effective to allow through that hit of nicotine.
  
  Bradford Harrisdug deep into tobacco company archiveswhile a graduate student of history and technology at Stanford University. He writes that tobacco companies decided to keep the filters as a “marketing tool,” while ensuring that smokers still received the crucial nicotine hit. They made claims about the health benefits of filters that the World Health Organization calls “fraudulent.” CNN contacted the Tobacco Manufacturers’ Association, which represents a number of major tobacco companies in the UK, for comment, but did not receive a reply.
  
  In reality, while filters did block some toxins, they also made cigarette smoke smoother to inhale and that encouraged smokers topuff more frequently. Filters also altered the way tobacco burns, actually increasing some toxins in the smoke.
  
  With filtered cigarettes, rates of the most common type of lung cancer caused by filterless smoking decreased. But rates of another type of lung cancer – adenocarcinoma –increased.
  
  “The survival rates of the two types of cancer are roughly the same,” says David Wilson, a pulmonologist the the University of Pittsburgh Medical Center, adding that there is no persuasive evidence that filters “have a beneficial impact on overall lung cancer survival.”
  
  In short, filters didn’t improve smokers’ health. But they did worsen our environment.
  
  In some cities around the world,feesare already levied on cigarette packets to fund street cleaning, while in other places, litterbugs arefined.
  
  Mervyn Witherspoon, an expert in the chemistry of cigarette filters, believes a better solution woudl be to implement biodegradable filters. He is an advisor toGreenbutts, a company which has developed a filter made of natural materials including flax, hemp and cotton.
  
  But Elizabeth Smith, the US-based tobacco policy expert, says biodegradable filters still contain toxins that could take a long time to degrade. And smokers might feel “permitted” to litter biodegradable filters, she adds, which could make the problem worse.
  
  In October 2018, the European Parliamentbacked a radical proposalto oblige EU countries to remove 50% of plastic from cigarette filters by 2025, and 80% by 2030.
  
  However, EU country representatives later rejected these reduction targets. Instead, tobacco companies will be made responsible for funding awareness-raising campaigns, the provision of public ashtrays and waste collection, and will have to add labels to packets of filtered cigarettes, stating that they contain environment-damaging plastic.
  
  Meadhbh Bolger, resource justice campaigner at Friends of the Earth, says the new laws are “a significant first step” but believes that governments should go beyond these measures and set binding targets.
  
  “We hope that governments will realize that having a planet we can live on is more important than the interests of the tobacco industry.”
