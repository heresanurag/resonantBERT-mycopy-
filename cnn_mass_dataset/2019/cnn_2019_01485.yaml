  _August 14, 2019_
  
  _A mysterious blast in Russia – and the significance of what might have caused it – is our first topic today on CNN 10. That’s followed by a look back at Russia’s Chernobyl disaster of 1986. A study concerning caffeine and migraines, a proposal to return humans to the moon, and a T-Rex race in California complete our coverage._
  
