title: "Uber losses; Broadcom strikes a deal; Huawei’s OS"
date: "2019-08-09"
section: "Investing"
url: "https://www.cnn.com/2019/08/09/investing/premarket-stocks-trading/index.html"
content: |
  1. Uber(UBER)’s miss:Mounting losses and slowing revenue growth at Uber(UBER)are scaring investors.
  
  The ride-sharing company said after markets closed Thursday that it lost $5.2 billion in the three months ending in June, its largest quarterly loss ever.
  
  The loss was fueled by $3.9 billion in stock-based compensation related to its public offering. But even without those charges, the company still lost about $1.3 billion, a roughly 50% increase from the previous year.
  
  Uber is making big investments in freight shipping and meal delivery. It’s also offering discounts for its core business to attract new customers and compete with rivals like Lyft(LYFT).
  
  Its revenue was $3.1 billion during the quarter, a 14% increase from the year prior. That’s hardly the rocketing growth that investors typically expect from technology companies that just went public.
  
  Shares in Uber are down more than 7% in premarket trading.
  
  2. Broadcom(AVGO)deal:Chipmaker Broadcom(AVGO)and cybersecurity specialist Symantec(SYMC)have reached a deal.
  
  Broadcom will buy Symantec’s enterprise security business for $10.7 billion in cash, the companies said Thursday. The acquisition would help Broadcom diversify beyond its main memory chip business.
  
  The proposed acquisition is still subject to regulatory approval. That’s been a sticking point for Broadcom in the past.
  
  The company’s $117 billion bid for rival Qualcomm(QCOM)was blocked by President Donald Trump in 2018 over national security concerns.
  
  Broadcom shares are down slightly in premarket trading. Symantec stock is up about 1%. It surged earlier in the week after the Wall Street Journal reported that the companies were close to a deal.
  
  3. Huawei’s OS:China’s Huawei has released its own operating system months after it was placed on a US blacklist that barred American firms from selling software to the company.
  
  The system, known as Harmony OS or Hongmeng, could serve as an alternative to Google’s Android, which Huawei has used in its smartphones, and the Microsoft(MSFT)Windows operating system it deploys on laptops and tablets.
  
  The announcement comes afterBloombergreported that the White House plans to delay a decision about granting licenses to US companies that sell components to Huawei as trade tensions continue to escalate.
  
  4. Markets stutter:With Huawei grabbing new headlines, global stocks aren’t shaking their trade anxiety just yet.
  
  US stock futurespoint to losses when markets open. The Dow is set to shed 110 points, or 0.4%. The S&P 500 could drop 0.5%, while the Nasdaq is tracking down 0.6%.
  
  Stocks in Asiaended mixed. Hong Kong’sHang Sengfinished 0.6% lower, while theShanghai Compositeclosed down 0.7%. South Korea’sKospirose 0.9%, and Japan’sNikkeigained 0.4%.
  
  European marketsare singing a similar tune. Britain’sFTSE 100shed 0.1% in early trading, while Germany’sDAXrose 0.1%.
  
  The Dowclosed up 1.4% on Thursday. TheS&P 500added 1.9%, and theNasdaqgained 2.2%, erasing losses sustained earlier in the week.
  
