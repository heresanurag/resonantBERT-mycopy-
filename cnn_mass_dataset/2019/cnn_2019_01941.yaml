title: "Colin Kaepernick’s Air Force 1 sneakers with a not-so-subtle message sold out online"
date: "2019-12-23"
section: "Business"
url: "https://www.cnn.com/2019/12/23/business/nike-colin-kaepernick-trnd/index.html"
content: |
  Whether you stand or kneel in them, a pair of Air Force 1 sneakers that Nike made in collaboration with Colin Kaepernick hit the market on Monday.
  
  But you’re out of luck if you’re trying toorder through Nike’s websiteor through the company’s SNKRS app, because the shoes quickly sold out online. You may be in luck if stores near you have them in stock.
  
  While Nike is a major partner of the NFL, the brand made the 32-year-old activist the face of an ad campaign for the company’s 30th anniversary last year, even though Kaepernick has not played a snap in the NFL since 2016.
  
  “Nike partnered with a collective of collaborators to design an AF1 that connects to their life personally,” a Nike spokesperson tells CNN. “Colin was identified because we believe his voice and perspective inspire many generations on and off the field.”
  
  Why Colin Kaepernick wore a 'Kunta Kinte' shirt to his NFL workout
  
  The Air Force 1 x Colin Kaepernick is made primarily of luxe black leather with the brand’s reflective swoosh logo leading to a silhouette of Kaepernick’s head on the heel tab. Kaepernick’s logo is featured on the tongue.
  
  The sneaker has a not-so-subtle message with the date “08 14 16” on the sole of the right shoe. A Nike spokesman confirmed to CNN the placement of the date on the sole.
  
  The date marks the first time Kaepernick didn’t stand during the playing of the national anthem, during a preseason game between the Houston Texans and San Francisco 49ers. He sat on the bench during the performance before that game, and first knelt during the national anthem on September 1, 2016.
