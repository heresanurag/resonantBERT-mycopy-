  “The change is not a good thing, since it will definitely impact the rest of the food web,” said study co-authorStephanie Dutkiewicz, a principal research scientist in MIT’s Department ofEarth, Atmospheric, and Planetary Sciences. “Phytoplankton are at the base, and if the base changes, it endangers everything else along the food web, going far enough to the polar bears or tuna or just about anything that you want to eat or love to see in pictures.”
