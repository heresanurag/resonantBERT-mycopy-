  Against the backdrop of the documented rise of domestic extremism in the United States, another instance emerged this week of students appearing to use Nazi gestures – this time in California. We must address this recurring problem of young people evoking a “nightmarish past,” wroteDavid Vigilante, with an understanding that white supremacy and Nazism, while directed at Jews and people of color, are a betrayal of every single one of us – any expression of them harms us all.
  
  Vigilanteurged readersto remember what’s at stake in a Nazi (or Nazi-sympathizing) gesture, song, image or idea: “To admire Nazism is to be a racist. To admire Nazism is to betray your country. And to admire Nazism is to torture the souls of those Americans who paid the ultimate price to save our democracy from the Nazis. That is how we all must see anyone who venerates Nazis.”
  
  Trying to trace Trump’s position on guns can feel like a trip through the looking glass. After the Parkland shooting in 2018, he pledged he would “do something” and, according to Democrats who attended meetings with him, he expressed openness to banning assault weapons and support for universal background checks. But after speaking with NRA leaders, those prospects evaporated.
  
  Enough is enough, emphasizedMichael Dowlingfor CNN Business Perspectives,issuing a callfor fellow health care CEOs to take a stand on gun control. Dowlingoutlined five immediate steps health care CEOs can take to mobilize employees, and called gun violence “a national tragedy and a public health crisis that demands we use our political capital and advocacy. Health care CEOs and the 18 million men and women who are part of the nation’s health care workforce can be an incredibly powerful voice for change.”
  
  Jennifer Rubin, writing in the Washington Post,identifiedanother way of addressing the crisis: “Practically speaking, the real way forward might be for Democrats to run on gun safety in 2020 and call out Trump and his Republican allies as cowards. That would be smart politics given that the NRA’s approval is underwater and new gun laws are exceptionally popular with the same groups of voters already fleeing the GOP (e.g., women, college-educated voters, suburbanites).”
  
  Two crucial and controversial elements of the United States immigration system came under fire this week. The first – the Deferred Action for Childhood Arrivals program (DACA) – has been “living on borrowed time” ever since Trump first tried to end it in September 2017, wroteElie Honig.But the“skies are darkening”for DACA, Honig said, as the Trump administration’s effort to terminate the program – backed this week by the Justice Department – heads to the Supreme Court in its upcoming term. Honig speculated that on this issue, as on so many others, the deciding vote may rest with Chief Justice John Roberts.
  
  The Trump administration’smessage on immigration is clear, contendedRaul Reyes: “When all else fails, lock up children.” That’s what Reyes deduced from the administration’s new regulation replacing theFloressettlement agreement, which sets minimum standards for migrant children in government custody and limits their detention to 20 days. WithoutFloresin place, Trump claimed, migrants will find it “impossible” to come to the US “illegally.” For Reyes, by contrast, the new regulation “won’t… help solve the humanitarian crisis at the border. The new rule is legally and logistically suspect. The only thing it guarantees is that more children will suffer greatly.”
  
  Acknowledging the Trump administration’s efforts to “make life harder for child migrants and migrants in general,”Tina Rosenbergpointed outin the New York Times that the “system’s horrors run deeper.” Most unaccompanied immigrant children don’t get deported when they have a lawyer, Rosenberg reported, but most children face a judge alone and those who don’t rely on a network of volunteers, essentially sustaining the “safety net for these children” by the “legal equivalent of a bake sale.”
  
  Planned Parenthood, upon facing whatJill Filipovicdescribed asan “impossible choice,” opted in a historic move to discontinue its receipt of funds from Title X, the federal family planning program that provides affordable birth control. To continue in the program, Planned Parenthood would have to both stop providing abortions and stop telling women where they could get legal abortion procedures. “That’s an unconscionable encroachment on free speech,” argued Filipovic, because “it effectively gags doctors and nurses from giving patients accurate information about their completely legal health care options.”
  
  Talk about pregnancy bubbled up on social media this week as well, thanks to model Ashley Graham and her viral Instagram post featuring a picture of her own pregnant body, which,Peggy Drexleropined, “calls out pregnancy for what it is for so many: large and layered and pretty uncomfortable,” while giving women permission to not always be perfect.
  
  That pressure to be body-perfect – or even just to be smaller – worriedHolly Thomas,who called outa new WW (formerly Weight Watchers) appfor children and adolescents. Wrote Thomas: “A tragedy of encouraging children to listen to an app, rather than their stomachs, is that it robs them of weight-regulating tools they already had. And while it’s up to parents — the ones who have the resources to do so – to try to ensure their kids’ access to good food, regular meals and plenty of exercise, offloading that responsibility onto a weight-loss app administered by non-professionals whose first interest is not in the health of these kids but in the health of its bottom line is quite possibly setting them up for an eating disorder.”
  
  Lilit Marcus, who is a CODA (Child of Deaf Adults), and whose first language was American Sign Language,had a messagefor hearing folks who are sharing the now-viral video of ASL interpreter Amber Galloway Gallego working at a Twista performance: stop, think and ask yourself why you’re doing it.
  
  Marcus, noting that many of those watching Gallego and sharing the video cited “raising awareness” about the Deaf community as a reason, said those folks have more work to do: “Watching a signer communicate and thinking you’ll learn ASL along the way is sort of like walking into a library and thinking you’ll absorb all the information in the books just by looking at their covers. When people tell me they recently attended a live program that had an interpreter and that they loved watching him or her perform, I ask what new vocabulary words they picked up. Invariably, the answer is none. Seeing ASL as something cool to watch instead of as a vital service also gives us a peek into why we still have so much work to do in this country around accessibility.”
  
