  The United States of America isn’t the first countryto endure an “unhinged” leader, observedJohn Avlon, but the nation may be facing a new threshold with Trump’s triptych this week: making the “chosen one” comment, retweeting a conspiracy theorist who called him the “second coming of God” and joking about giving himself a Medal of Honor. “There is no universe where the President approving of comparisons of himself to the Messiah is not strange and disturbing,” Avlon declared. And after Trump leveled his rage at Fed Chair Jerome Powell on Friday and the markets tanked, the message was clear, said Avlon: “President Trump seems to see himself as invested with the powers of a king, constrained only by the generosity of his will. Which is why he rails against any individual or institution who attempts to hold him accountable.”
  
  The President is “seemingly devoted to making our country the Divided States of America” wroteMichael D’Antonio,calling outas “evil” the words Trump used to describe American Jews who vote for Democrats: Trump said they have “either a total lack of knowledge or great disloyalty.” Writing in the Los Angeles Times,Lev Golinkinnoted that the “disloyalty” charge carries a dark and twisted history,one that invokes“blood-soaked” and “historically lethal” forms of anti-Semitism. Trump’s comment was “sickening coming from an American president,”wrotePhilip Kleinfor the Washington Examiner.
  
