  How do beloved 1990s films and shows stack up? That was a question on a lot of people’s minds this week.
  
  First HBO Max announced “Rules of Magic,” a 1960s prequel to the 1998 witch-mania favorite, “Practical Magic.” That earlier Sandra Bullock vehicle, with its pop feminism and romantic love plots, doesn’t hold up as well as she thought, wroteBreena Kerr, but that only emphasizeswhy she thinksthis new 1960s prequel is just the right kind of magic needed in the age of Trump: “Magic is a metaphor for personal power and the things that we can do when we set our minds to something. That’s why movies about wizards and witches are so relatable — most people have a sense of stirring within them when they think about something they believe in, a sense of possibility that they could change the current reality.”
  
  Next up: “Seinfeld” and “Friends” are both celebrating big anniversaries this summer – 30th and 25th respectively – and while that’s sparked some debate on social media about which show is the best,Melissa Blakedeclared it’s not even close: “Seinfeld,” hands down. Its characters address all phases of life, not just a free-wheeling (and financially unrealistic) version of being in your 20s and 30s. As Blake reflected, “while we may have wanted to be as cool and chic as Rachel Green in ‘Friends,’ in reality, we were all much more similar to awkward Elaine from ‘Seinfeld.’ Just think about it in contemporary terms. If Rachel were a real person living in 2019, she would be an Instagram influencer posting her #OOTD full of #sponsored clothing from hip places like Madewell or J. Crew. If Elaine were a real person living in 2019, she would probably swear off social media – or use it to spy on her exes.”
  
