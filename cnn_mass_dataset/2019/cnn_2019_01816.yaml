id: cnn_2019_01816
title: "How America feels about Taylor Swift says more about us than her"
date: "2019-08-23"
section: "Politics"
url: "https://www.cnn.com/2019/08/23/politics/america-voters-taylor-swift-lover/index.html"
content: |
  Thegauziness of Taylor Swift’s celebrityis such that when people talk about her, they tend to reveal less about her and more about us, as a society.
  
  Swift has become a political and cultural cipher of sorts – at once nothing and everything. Between her fans and her detractors (there’s rarely an in-between), she holds numerous, often dueling meanings about the perceived state of America at any one moment.
  
  Over the course of more than half a dozen albums –her seventh, “Lover,” is out on Friday– Swift has been many things to audiences: acrucial advocate for artistic control, a (white)feminist, an “Aryan goddess,” aclumsybutvaluable LGBTQ ally,canceled. (These are in addition to her variety of musical lives:a country girl next door,an EDM dabbler,an electro-pop maestro.)
  
  To understand the distinct space Swift occupies in Americana, consider the 2016 presidential election, of which she, at the time, said virtually nothing. The backlash was fast and furious. AsVox’s Caroline Framke wroteon Election Day 2016, “(Swift’s) absolute silence on anything politics-related, in an election that saw a higher than usual number of celebrities, public figures, magazines, and even TV shows endorsing – or at the very least discussing – the candidates, is extraordinary.” (Interestingly, there was aTwitter account dedicated to Swift’s silence.)
  
  Taylor Swift drops 'Lover' video ahead of album launch
  
  Swift explained her previous skittishness toward politics earlier this month, when sheappeared on the cover of American Vogue’s prized September issue.
  
  “Unfortunately in the 2016 election you had a political opponent who was weaponizing the idea of the celebrity endorsement,”she told Vogue.“(Then-candidate Donald Trump) was going around saying, I’m a man of the people. I’m for you. I care about you. I just knew I wasn’t going to help.”
  
  Her gay-friendly, among other things, political reemergence now comes as the nation gears up for what’s sure to be a bruising 2020 election, one in which President Trump is already pulling at the cultural fabric in order to cement his reelection. Swift surely won’t swing an election, but if her stepping-in-from-the-sidelines approach to 2020 reflects a broader trend compared with 2016, it could be a difference-maker.
  
  And yet, despite Swift’s ostensible centrality in certain parts of the election chatter, so little, looking back, actually seemed to be about her. Once you peel back a layer, she was a totem of something else: many people’s broader anxieties around a high-stakes political contest. It wasn’t so much that she was mum duringanelection as it was that she said little duringthatelection – one that made various social and political ills key planks of the White House.
  
  Similarly, theblowbackagainst Swift’s 2017 album, “Reputation,” is perhaps best understood as a response not to the singer but to an oft-cited data point:Fifty-three percent of white women voted fora man who was heard on tape crowing about assaulting women.
  
  The fact that Swift was silent on political conversation but then released a record that underscored her personal feuds seemed only to aggravate adeep historical woundthat had recently been torn open again: that of wealthy or otherwise privileged white women choosing to protect their supposed economic security over the welfare of others.
  
  Even for neo-Nazis,whose visibility has been on the riseover the past few years, Swift’s specific allure is figurative – largely about her symbolism as some sort of “Athena reborn.”
  
  In other words, it’s about Swift – but also, it isn’t.
  
  Consider, too, the times Swift has taken on the man – in the corporate and literal sense – and what those occasions have shown about sexual politics. In 2017,she received a $1 settlementin a case she brought against a DJ who had groped her, with her lawsuit saying that the move would be “an example to other women who may resist publicly reliving similar outrageous and humiliating acts.” That same year, Swift, along with several other women, appeared on the cover ofTime magazine’s Person of the Year issue(toa significant amount of controversy) as a “silence breaker” who had stepped forward to speak about sexual violence.
  
  Taylor Swift performs for first time since Scooter Braun post
  
  In those instances, Swift was once more a kind of simulacrum. Writing forThe Washington Post, Lavanya Ramanathanconnected Swift’s at times humiliating lawsuit to “the burden women endure – this probing and hand-wringing and point-blank disbelief and shame and self-doubt,” and she argued that “it was as if (Swift) really was speaking for every woman.”
  
  Likewise, for all the disagreement it triggered, the Swift/Time dispute helped to pull into focus that no woman – not even a multimillionaire – is necessarily protected from systemically empowered men.
  
  Now, jump to 2019 to see how a related dynamic has been on display, this time regarding LGBTQ rights. In the run-up to “Lover,” Swift completely jettisoned her past political coyness, in ways both subtle and obvious.
  
  Compared with theblack and white of the “Reputation” era, her most recent aesthetic is saturated with bright colors – with Pride-friendly rainbows, to be exact. Just check out the music video for the new album’sfirst single “ME!”or its follow-up“You Need to Calm Down,”the latter of which also features a small army of queer luminaries, including RuPaul and Ellen DeGeneres. More overtly, in April,Swift donated $113,000 to the LGBTQ advocacy group Tennessee Equality Project, and in October 2018, ahead of the midterm elections,she used Instagram to endorse two Tennessee Democrats.
  
  Unsurprisingly, queer people’sreactions have been mixed. Some have been scratching their heads over whether Swift is queer-baiting (for profit or for her, well, reputation), while others have been arguing that she’s just trying to put her massive platform to good use. (Her friendTodrick Hall, who’s gay, told BuzzFeed News’ AM to DM podcastlast week that it’s no little thing for someone like Swift, whose fan base straddles the political spectrum, to be vocal about LGBTQ rights.)
  
  Again, however, the conversation seems to be less about Swift than the climate of the current political season. In particular, the praise and critiques both grapple with questions of what queer audiences expect from their gay icons at a moment whenLGBTQ rights are under siege: Should their art be explicitly queer? What if it smacks of thecringeworthy portrayalsof queerness that were so common in decades past? Does that matter if these figures also support their queer fans in other, more directly political ways?It’s about Swift – but also, it isn’t.
  
  This isn’t to strip Swift of her own singular agency. One of the words perhaps most attached to her ismanicured. Beyond her sizeable musical talents,Swift is a smart,savvy businesswoman. It’s fair to assume that she has a firm grasp of the complex pas de deux between Swift the person and Swift the persona, and how this relationship fits into the culture at large.
  
  That said, it’s hard to think about Swift these days and not think about how she’s become someone whom so many Americans channel notions and emotions through. In her 2004 book“The Many Lives of Marilyn Monroe,” the literary scholar Sarah Churchwellwrites that she’s “interested in the shame, belittlement and anxiety that we bring” to the life and legacy of Monroe. The same could be said of Swift. As discussion swirls around her new album in the days ahead, it makes sense to ask: Are people talking about Swift, really? Or about something bigger?
