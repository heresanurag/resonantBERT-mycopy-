title: "US pulling out of the INF treaty rewards Putin, hurts NATO"
date: "2019-02-01"
section: "Opinion"
url: "https://www.cnn.com/2019/02/01/opinions/us-pulling-out-of-the-inf-treaty-rewards-putin-hurts-nato-engel-smith/index.html"
content: |
  Editor’s Note:Rep. Eliot L. Engel (D-NY) is chairman of the House Committee on Foreign Affairs. Rep. Adam Smith (D-WA) is chairman of the House Committee on Armed Services. The views expressed in the commentary are those of the authors. View moreopinionat CNN.
  
  Secretary of State Mike Pompeo announced Friday the United States will suspend participation in the Intermediate-Range Nuclear Forces (INF) Treaty – an agreement the US signed with Russia in 1987 that helped slow the arms race. In hisannouncement, Pompeo said Russia had violated the treaty for years “without remorse,” adding, “It is our duty to respond appropriately.” But instead of working with our allies to craft a comprehensive plan to hold Russia accountable and pressure it back into compliance, the Trump administration has offered Russia an easy way out.
  
  Pompeo announces suspension of nuclear arms treaty with Russia
  
  The INF treaty, signed by President Ronald Reagan, limits ground-launched nuclear and conventional missiles with ranges between 500 and 5,500 km. By eliminating an entire category of missiles capable of delivering nuclear weapons to nearly all of Europe, this treaty helped ease the nuclear arms race during the Cold War while substantially reducing the risk of nuclear war in Europe.
  
  Russia is nowviolating the INF treatyby developing and deploying new missiles that could deliver nuclear warheads to European targets, including US military bases. This dangerous situation demands a robust and effective response. Instead, the Trump administration has played right into Vladimir Putin’s hands.
  
  In addition to giving Russia free rein to build and deploy an unlimited number of intermediate-range missiles that could potentially be fitted with nuclear weapons, withdrawing from the treaty would allow Putin to deflect responsibility and blame the US for both the treaty’s collapse and any ensuing arms race. While NATO issued a statement declaring itssupportfor the US’ decision, it papers over divisions within the alliance, which will only be exacerbated over time.
  
  According to areport obtained by Breaking Defense, the US has since 2013 considered the INF-range missiles it might develop should the treaty collapse. These missiles would require deployment in Europe – which some NATO allies will certainly oppose. Splits within NATO would only further Putin’s long-standing geopolitical goals, and there is no reason to give him this satisfaction or strategic advantage.
  
  The world is two minutes from doom
  
  President Trump could have avoided this by genuinely collaborating with our NATO allies to jointly pressure Russia from the start. Several allies proposed options to address the violation and ensure Russian compliance in an effort to preserve the treaty, according todiplomats who spoke to Reuterson the condition of anonymity.
  
  Allies also told our offices directly that the Trump administration blocked NATO discussion regarding the INF treaty and provided only the sparest information throughout the process. And now the US is on the path to complete withdrawal unless Russia complies with the treaty within 180 days.
  
  Just weeks after Pompeo announced in December that the US intended to pull out of the INF treaty, then-Secretary of Defense James Mattis issued a strong rebuke of Trump’s approach to foreign policy, emphasizing the importance of supporting our allies in his unprecedentedresignation letter.
  
  “One core belief I have always held is that our strength as a nation is inextricably linked to the strength of our unique and comprehensive system of alliances and partnerships,” Mattis wrote. “While the US remains the indispensable nation in the free world, we cannot protect our interests or serve that role effectively without maintaining strong alliances and showing respect to those allies.”
  
  Trump can't bully his intelligence agencies into submission
  
  By pulling out of the INF treaty, Trump missed an opportunity to make the best use of the world’s most powerful alliance and send Putin a strong message – one with real consequences. As a result, the Trump administration has frittered away its credibility among our European allies who now face the prospect of having new Russian nuclear-armed missiles aimed at them.
  
  This is the latest step in the Trump administration’s pattern of abandoning the diplomatic tools that have prevented nuclear war for 70 years. It also follows the administration’s unilateral decision to withdraw from the Paris climate agreement.
  
  The latest move also suggests that the administration may be open to reneging on other nuclear arms control agreements, including the 2011New STARTtreaty, which verifiably limits the nuclear arsenals of both the United States and Russia. That would likely unleash a no-holds-barred nuclear arms race, threaten American security and potentially lead to vast increases in nuclear-weapons spending.
  
  The United States should not tolerate Russia’s continued treaty violations and aggression, but sidelining diplomacy – as well as our allies – as President Trump has done, will only drive us headlong into a dangerous and expensive arms race.
  
  Instead of furthering Russian interests, we should work with NATO allies on a strong response that includes economic and diplomatic consequences Putin cannot ignore. A starting point could involve additional sanctions on Russia.
  
  Congress must not allow the Trump administration to plunge the United States into a 21st-century nuclear arms race. This dangerous policy would undermine our national security, divide us from our allies, play directly into Putin’s hands, and place peace in Europe at risk. Instead, we must support effective diplomacy, invest in our national security and propose smart policies to keep our country, along with our European allies, secure, free and prosperous.
