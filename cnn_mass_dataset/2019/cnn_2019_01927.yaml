title: "Quickly catch up on the day’s news"
date: "2019-08-20"
section: "App News Section"
url: "https://www.cnn.com/2019/08/20/app-news-section/quickly-catch-up-august-20/index.html"
content: |
  Here’s what you might have missed on Tuesday:
  
  –Kamala Harris plummets in new CNN pollas Joe Biden rebounds to a double-digit lead over the Democratic field.
  
  – A study shows new evidence that e-cigaretteschange blood vessels after just one use.
  
  – China couldoverwhelm US military basesin Asia within hours, an Australian report says.
  
  – Trump touts the strength of the US economy, butdiscussions over cutting payroll taxesreveal recession fears.
  
  – Forget retrograde… a black hole gobbled up a neutron star andcaused ripples in space and time.
  
  – Actor Ben Unwin, who made his name playing Jesse McGregor in the Australian TV soap “Home and Away,”has died at the age of 41.
  
  – Secretary of State Mike Pompeo acknowledged thatthere are “places where ISIS is more powerful todaythan they were three or four years ago,” but sought to downplay the risk.
  
  – A crew of Canadian service dogswatched a live musical in a theateras part of their training.
