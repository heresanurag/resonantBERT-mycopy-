title: "Five takeaways from Elizabeth Warren’s CNN town hall"
date: "2019-03-18"
section: "Politics"
url: "https://www.cnn.com/2019/03/18/politics/elizabeth-warren-townhall-takeaways/index.html"
content: |
  Sen. Elizabeth Warren has a plan – for just about everything.
  
  The policy-fluent Massachusetts Democrat zipped through her thick suite of legislative and regulatory proposals for a CNN town hall audience in Jackson, Mississippi, on Monday, taking questions from voters and, in a declaration that won her a prolonged ovation, saying for the first time that she would support replacing the Electoral College with a national popular vote.
  
  Warren launched her presidential campaign early but has struggled to break through in the initial round of primary polling. She used the national stage to show off the energetic stage presence and affecting personal story that have become a hallmark of her presence on the stump.
  
  For more than an hour, Warren hit on issues ranging from the future of health care in America to her plan to break up tech giants like Amazon and Facebook. She also faced a question about her claims to Native heritage and backlash that followed.
  
  Warren has been critical of the Electoral College in the past. On Monday, she took it a step further, calling for its elimination.
  
  Asked about how she would expand voting rights, Warren described the process for electing presidents – that race to 270 electoral votes – as a de facto form of disenfranchising voters in states dominated by a single political party.
  
  Warren backs plan to get rid of the Electoral College
  
  “Come a general election, presidential candidates don’t come to places like Mississippi, they also don’t come to places like California or Massachusetts, because we’re not the battleground states,” Warren said.
  
  The town hall audience was already cheering its approval as she added, “My view is that every vote matters and the way we can make that happen is that we can have national voting and that means get rid of the Electoral College.”
  
  The issue has gained added traction with Democrats in the aftermath of Hillary Clinton’s 2016 loss to President Donald Trump. Clinton won by nearly 3 million votes but was upset by Trump, who narrowly carried a raft of swing states in the Upper Midwest. Republicans have won the White House in three of the of the last five races, but only once – in 2004 – did the GOP candidate win the popular vote.
  
  The prospect of paying reparations to the descendants of slaves has slowly emerged as a potentially divisive flashpoint in the Democratic primary. Candidates have struggled with how to address the question, which has for so long resided on the fringes of presidential politics.
  
  Warren, who has made proposals to close the racial wealth gap a staple of her stump speech, was asked about it early on in the night and said she would back congressional legislation that, according to its mandate, would form a panel “to examine slavery and discrimination in the colonies and the United States from 1619 to the present and recommend appropriate remedies.”
  
  “I believe it’s time to start the national, full-blown conversation about reparations,” Warren said. “That means I support the bill in the House to appoint a congressional panel of experts, of people who are studying this, who talk about different ways we may be able to do it, and to make a report back to Congress so that we can as a nation do what’s right and begin to heal.”
  
  That bill is commonly referred to as H.R. 40, which was first introduced by former Michigan Rep. John Conyers three decades ago. Texas Democratic Rep. Sheila Jackson Lee re-introduced it after Conyers left Congress.
  
  Asked by Tapper if she would be open to monetary compensation, Warren said she was willing to consider “a lot of ways” reparations could be formulated.
  
  “Ignoring the problem,” she said, “is not working.”
  
  Warren tells the story often. On Monday, a wider audience heard it for the first time.
  
  When she was young, her father suffered a heart attack and the family was thrust into financial peril. Staring down the possibility of losing their home, Warren’s mother – alone, scared and determined, repeating, “We will not lose this house” – entered the workforce on a minimum wage job.
  
  Warren details her upbringing and her parents' struggles in poignant moment
  
  Warren recalls the moment in an effort to connect her Oklahoma roots with the more familiar image she cuts now, of a Harvard academic who represents liberal Massachusetts in the Senate. The story is also her bridge to connecting with voters facing similar, or worse, hardships in the long wake of the 2008 financial crisis. The stagnant federal minimum wage, she often notes, would not have been enough to keep her family afloat in 2019.
  
  “For a long time I used to think that was just a story about my mother,” Warren said in Jackson. “Years later I came to understand that it’s the story of millions of Americans who – it doesn’t matter if you’re scared – when you got to do something to take care of the people you love, you reach down and you find it and you pull it up.”
  
  The backlash to Warren’s past claims to Native American heritage has mostly died down following a series of apologies to tribal leaders.
  
  But on Monday, she was asked again why she did what she did – and faced the suggestion from a voter that it was “tone deaf and indicative of a lack of presidential tact.”
  
  Warren in response said that the stories she told were the ones she heard growing up in Oklahoma, what she “learned about my family from my family,” before pivoting to what she said voters wanted to hear about (hint: not this).
  
  Still, her past assertions and her decision to use a DNA test – which set off an uproar among tribes who viewed it as damaging to their sovereignty – are likely to linger in the background of her candidacy, along with the potential for more embarrassing revelations.
  
  Warren has consistently apologized and, in February, went directly to the Cherokee Principal Chief Bill John Baker to say she meant no “harm.”
  
  “I’m not a tribal citizen and I respect the difference,” Warren told CNN at the time. “Tribes and only tribes determine tribal citizenship.”
  
  Warren signed on to Sen. Bernie Sanders’ “Medicare for all” bill, like so many other 2020 Democratic contenders in the Senate, but on Monday again suggested that she would be open multiple paths to universal coverage – including less aggressive transitions and plans that might keep the private insurance industry in the game.
  
  “When we talk about Medicare for All, there are a lot of different pathways,” Warren said. “What we’re all looking for is the lowest cost way to make sure that everybody gets covered.”
  
  According to Warren, it could be achieved first by lowering the Medicare age to 60, 55, or 50.
  
  “That helps cover people who are most at risk,” she said, but also suggested the possibility – as some activists have discussed – of starting with younger Americans. “Some people say do it the other way. Let’s bring it up from – everybody under 30 gets covered by Medicare.”
  
  Warren also signaled her willingness to back plans, many of them already baked into legislation from her colleagues in Washington, that would allow people to buy in to public programs if they don’t want to be covered by the private insurance offered by their employers.
  
  “For me what’s key is we get everybody at the table on this,” she said – an answer that satisfied the audience but is likely to cause some grumbling among progressives.
