title: "Must-watch videos of the week"
date: "2019-03-15"
section: "App News Section"
url: "https://www.cnn.com/2019/03/15/app-news-section/videos-of-the-week-mobile-march-15/index.html"
content: |
  A kangaroo throws a punch. A snow sculpture receives a traffic ticket. An autographed Bible goes to the highest bidder. Are you a bit confused? Check out the must-see videos of the week.
  
  Paragliding is a bucket list item – but you’d never anticipate this ending. A man in Australia was coming down for a soft landing when a kangaroo attacked. The paraglider tried to protect himself and quickly called a friend to pick him up once the kangaroo retreated.
  
  Snow days are the perfect time build a snowman, sled down the neighborhood hill and launch a snowball fight. A local businessman and his two kids upped the ante by creating a life-sized sculpture of a Mustang.
  
  When asked if he preferred the New Testament or Old Testament in the Bible, President Donald Trump said he likes both equally. But it was the sight of Trump and Melania signing the holy book in Alabama that’s created internet buzz.
  
  Ever heard of a bomb cyclone? Well, residents in Colorado Springs were hit with one that combined 97-mph wind gusts and blizzard conditions. Video captured throughout the city showed hundreds of motorists stranded in the storm.
