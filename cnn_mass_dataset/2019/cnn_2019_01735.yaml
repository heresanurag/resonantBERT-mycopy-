title: "In New Zealand, McDonald’s new McVeggie burger is not strictly vegetarian"
date: "2019-12-06"
section: "Business"
url: "https://www.cnn.com/2019/12/06/business/mcveggie-mcdonalds-intl-scli/index.html"
content: |
  McDonald’sNew Zealand has launched its McVeggie burger, but there’s a catch that could leave meat-free patrons dismayed: It’s not strictlyvegetarian.
  
  The McVeggie, served with cheese and garlic mayonnaise, includes a patty made of potato, corn, carrot and onion.
  
  However, adisclaimerfrom the fast food company on its website advises that the burger is “not vegetarian due to our cooking method,” with the patty cooked with the same equipment used by staff to fry chicken.
  
  “With the equipment we have available, we have to cook the patty in the same oil used for other products like McChicken patties,” David Howse, the general manager for McDonald’s New Zealand,told the Guardian.
  
  The Beyond Meat burger is coming to McDonald's in a Canadian test
  
  He added that the product was “intended for flexitarians,” rather than vegetarians or vegans.
  
  This news has divided opinion.
  
  In aFacebook post, NZ Vegetarian Society asked its members what they thought of the burger, and the response was mixed.
  
  Some social media users called the name of the burger “misleading,” and expressed annoyance that they would not be able to consume the fast food as it was contaminated with meat.
  
  However, others said they would still eat it. “It’s a positive for less meat consumption,” one user wrote. “Any step in that direction is a positive,” they added.
  
  Beyond Burgers are coming to Costco
  
  McDonald’s has been slowly adding more meatless options to its menus around the world.
  
  Two years ago, the company announced the launch of aMcVegan burger, made with a soy patty, in Finland and Sweden.
  
  In May, the fast food giant introduced a vegan burger toGermany– one of its biggest international markets.
  
  In September,McDonald’s tested Beyond Meat burgersin selected Canadian outlets for 12 weeks, giving the plant-based meat craze a major endorsement.
  
  At the time, the company said it was testing the P.L.T. (plant, lettuce, tomato) burger because of customers’ growing interest in plant-based alternatives, and would review the test’s results to inform introducing plant-based options worldwide.
