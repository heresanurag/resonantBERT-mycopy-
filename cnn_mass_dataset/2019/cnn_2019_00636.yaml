title: "The alarming employment trends that the jobs report won’t tell you"
date: "2019-10-03"
section: "Perspectives"
url: "https://www.cnn.com/2019/10/03/perspectives/jobs-report-employment-data"
content: |
  Editor’s Note:Kriston McIntosh is managing director of The Hamilton Project at the Brookings Institution. Ryan Nunn is policy director of The Hamilton Project and a fellow in Economic Studies at the Brookings Institution. Jay Shambaugh is director of The Hamilton Project and a senior fellow in Economic Studies at the Brookings Institution. The opinions expressed in this commentary are their own.
  
  TheUS economyhas experienced growth for about a decade. Yet the share of the population that is employed or seeking work hastrended downfor the last two decades. Many regions within the United States have an alarmingly high percentage of people who are not employed or actively looking for a job. We find this to be troubling, since the labor force participation rate serves as a fundamental marker of the economy’s performance. Increasing participation in the labor force can play a critical role in raising living standards of the country overall.
  
  In anew studypublished byThe Hamilton Projectat the Brookings Institution, we found that some of the decline in labor force participation can be attributed to either the aging population heading toward retirement or young people who are increasingly at school rather than work. However, we are more concerned with the low levels of participation among groups in the 25- to 54-year-old population that face barriers to labor market opportunity: people without college degrees (78%), women (75%) and black men (83%), among others.
  
  Even more alarming, the Hamilton Project’s EconomicVitality Index(which measures income, employment, poverty, life expectancy and housing data to determine whether a county is struggling or succeeding) reveals dramatic differences in labor force participation among various parts of the country.
  
  For example, counties ranking in the top 20% of economic vitality — like Chester County, Pennsylvania and Livingston County, Michigan — have an average prime-age (25 to 54 years old) labor force participation rate of about 86%. That’s pretty high. Conversely, those counties ranked in the bottom fifth of vitality — like Fayette County, Pennsylvania and Montcalm County, Michigan — have a prime-age labor force participation rate of about 72%, on average. This is a significant difference by any measure, considering that during the Great Recession and its aftermath, thenational average labor force participationfell by roughly 3 percentage points to a low of 80.6% in October 2013.
  
  While there have always been large gaps in economic performance across regions of the United States, those gaps have become increasingly locked in place over the last few decades. In the first 80 years of the 20th century, poorer places tended to grow faster than wealthier places, partly because labor productivity rose faster in places that started at lower levels and partly because Americans were more geographically mobile back then. Those without work were able to move to places with more opportunity. While some regions certainly featured more economic opportunity than others, the differences were narrowing over time. However, since the early 1980s, the gaps across regions have become increasingly entrenched.
  
  The rapid post-2011 economic growth in urban and thriving counties has not helped struggling places catch up with the rest of the country, with urban counties gaining jobs by an average of 1.4 percentage points faster than rural counties, according to our research. Following the Great Recession, the top 60% of counties by vitality have experienced job growth in the range of 1.5% to 2% per year. Meanwhile, the bottom 20% of counties, such as Milwaukee County, Wisconsin or Genesee County, Michigan, have seen sluggish growth of between 0% and 1%. More recently, the gap in job growth has closed somewhat, but high-vitality counties continue to grow faster than low-vitality counties.
  
  What can be done to address this challenge?
  
  Place-based policiescan play a critical role in closing the geographic gaps in labor force participation. This could include creatinggeographically targeted job subsidies, establishingcloser linksbetween struggling regions and research universities (which would allow for researchers to come up with innovative ideas for local economies), andexpanding intergovernmental grantsto places that need it most (those that don’t have enough tax revenue to fund their local public infrastructure). Furthermore,policies that encourage mobilitycan also help people move to places with greater labor market opportunity.
  
  Second, to boost employment, the United States will need to continue a robust economic expansion — but that alone will not be enough to solve the labor market problems of struggling groups. Inadequate child care options make it difficult for many parents (especially women) to work. Health challenges ranging from disability to addiction keep many others out of the labor force. Overly punitive incarceration and post-incarceration policies leave many more out of the labor force. And failures in education and training have also contributed to both lower wages and lower participation.
  
  Accordingly, enacting policies that make it easier to balance employment and caregiving, such aspaid parental leaveand intermittent leave for caregiving, and expanding access toaffordable child carecould help caregivers to stay in the labor force. In addition, improving access to health care and making disability less of a barrier to employment would increase participation.Reforms to disability insurancecould incentivize employers to accommodate workers with disabilities and make it easier for them to participate in the labor force. Finally, both tax policy changes and improved education and training can improve labor market outcomes for groups that are often left behind.
  
  To truly come to grips with America’s economic divides across geography, policymakers must confront the problem of localized joblessness. By increasing demand for labor and removing impediments to working, we can build an economy that shares its benefits more broadly and makes better use of the talents and drive of people living in struggling places.
