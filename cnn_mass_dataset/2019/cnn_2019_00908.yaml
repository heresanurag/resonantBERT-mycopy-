  Weeks after announcing her retirement, Wambach was sleeping for either 12-hour stretches or not at all, and on the brink of divorce from her first wife, Sarah Huffman. She was binge drinking, depressed and in April 2016 hit rock bottom when her mugshot, following a DUI arrest, appeared online, on television and in newspapers.
  
  But the shame and embarrassment led to recovery. Help was sought from alcohol and drug counselors and it was during this time that Wambach also met author Glennon Doyle, now her wife of nearly two years.
  
  “It’s the hardest thing I’ve ever done,” says Wambach of sobriety. “It’s the thing that I take the most pride in and I take the most serious in my life.
  
  “I do think that I am prone more to depressive mindsets and thoughts and feelings. Depression has run its course with me over and over again throughout my life and I have no doubt it will come back at some point. Being sober, I’m going to be more prepared for it.”
  
  Over the last two years Wambach has healed. She reevaluated, rebuilt and found a purpose. Her greatest impact could be yet to come.
