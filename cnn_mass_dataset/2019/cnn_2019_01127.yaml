  It was adopted by the western German city of Cologne in 2001, where the facility features a gated entrance, security cameras and alarm buttons in each booth. The model has also been introduced in Essen, Bonn and Zurich.
  
  Dassel argues that the current situation for the sex workers on Kurfürstenstrasse is “inhumane,” and by refusing to act, the state of Berlin is tolerating “forced prostitution, violence against women and drug addiction.”
  
  In particular, he points to reports from the city’s Charité ambulance service, which says sex workers are exposed to daily, significant violence from pimps, while only a very small percentage of them report abuse.
  
  Dassel says regulated sex booths could improve the safety and working conditions for sex workers, while also reducing the “negative impact of prostitution on the residential environment.”
  
  This story has been updated.
