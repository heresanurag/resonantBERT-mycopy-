title: "Mysterious heat spot in Korean border river turns out to be a defector"
date: "2019-08-01"
section: "Asia"
url: "https://www.cnn.com/2019/08/01/asia/north-korea-soldier-river-defection-intl/index.html"
content: |
  Shortly before midnight on Thursday, a South Korean thermal observation device identified a mysterious heat spot floating down the Imjin River on theNorth Korean border.
  
  The soldiers monitoring the foggy scene thought it was flotsam, perhaps a small ball. It turned out to be adefecting North Koreansoldier. “The North Korean soldier came down the river with only his head above the water,” Seoul’s Joint Chiefs of Staff explained on Thursday, according to the South Korean Ministry of Defense.
  
  Defections of soldiers over theDemilitarized Zone (DMZ)that separates the two Koreas are rare compared to crossings made by civilians over the border between North Korea and China. To cross the heavily patrolled DMZ requires getting across several fences and a dense minefield. The last time a North Korean successfully defected through the area was in December last year when two soldiers crossed the line several weeks apart.
  
