  Williams said the belief that transgender activism harms women and lesbians is rooted in the feminist movements of the ’60s and ‘70s, which emphasized the importance of women’s bodies in informing their gender.
  
  Feminists began to split into factions during this time, though mainstream feminists still largely defended transgender rights, Williams said. The term was popularized in 2008 by feminist Viv Smythe to distinguish between transgender exclusionists and the larger swatch of radical feminists who supported transgender people.
  
  For equality campaigners, the argument is nothing short of discriminatory.
  
  Novelist Casey McQuiston responded to Rowling by questioning the idea that the TERF ideology should be considered a strand of feminism. Writing on Twitter, she said: “trans people are real. trans people deserve to be protected, recognized, supported, and loved. if that infringes on your idea of feminism, you’re not actually a feminist at all. you’re a bigot.”
  
  Many, including the American actress Patricia Arquette, pointed out that trans women – the group that the TERF movement says could put women-only safe spaces at risk, are among the most vulnerable people in the society.
  
  “I am not afraid of being raped by a trans woman in fact I’m afraid FOR trans women as they have the highest likelihood of being raped in any group,” Arquette wrote on Twitter.
