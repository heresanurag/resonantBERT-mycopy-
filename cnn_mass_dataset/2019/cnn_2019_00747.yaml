id: cnn_2019_00747
title: "Coast Guard seeks information on New England distress call, including the possibility the report was a hoax"
date: "2019-10-08"
section: "US"
url: "https://www.cnn.com/2019/10/08/us/maine-capsized-boat-possible-hoax/index.html"
content: |
  The US Coast Guard Tuesday said it’s seeking information abouta weekend distress call involving a missing boater and three childrenoff the coast of Kennebunkport, Maine, including the possibility of the report being a hoax.
  
  The agency suspended a search for the four Sunday morning, nearly a day after a man reported their 14-foot boat capsized.
  
  In a mayday callreleased by the US Coast Guard Northeast Division, the man said the boat flipped over and he and the children were in the water trying to get back to the top of the boat. He said if that was unsuccessful, they would huddle in the water.
  
  The Coast Guard said it searched for22 hours over 1,500 square nautical miles.
  
  “We are asking for the public’s assistance in determining the source of the calls and the nature of the distress,” said Capt. Brian Lefebvre, commander of Coast Guard Sector Northern New England.
  
  “Additional information may aid in our closure of the case and offer a degree of finality to the many rescuers who dedicated their time and effort toward this search effort.”
  
  The search team included Maine Marine Patrol, Wells Police Department and other local participants, the Coast Guard said.
  
  The search was called off at 8 a.m. Sunday, according to the Coast Guard.
