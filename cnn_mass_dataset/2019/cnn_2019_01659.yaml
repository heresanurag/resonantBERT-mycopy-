title: "Ellen tried to get Nicole Kidman to pick men for Charlize Theron and things got awkward"
date: "2019-10-16"
section: "Entertainment"
url: "https://www.cnn.com/2019/10/16/entertainment/nicole-kidman-lenny-kravitz/index.html"
content: |
  Charlize Theron and Nicole Kidman deserve some sort of medal for surviving one awkward trip to “The Ellen DeGeneres Show” this week.
  
  Theron, Kidman and Margot Robbie stopped by the daytime talk show to debut the new trailer for their movie “Bombshell” and stuck around  to play a cringe-worthy game that involved Robbie and Kidman judging different male celebrities’ compatibility with Theron, who is single.
  
  Theron played along as her co-stars played “Who would Charlize rather?” a game that pit people like Drake against The Weeknd and Milo Ventimiglia against Trevor Noah.
  
  Some options drew strong reactions from Theron – like Noah, who she called a brother-like figure, and Harry Styles, who made her exclaim, “Guys, I could be hismother!”
  
  It was Kidman, however, who reacted strongest when Michael B. Jordan was entered into the running against Lenny Kravitz, whom Theron reminded everyone Kidman has dated, a fact that was unknown to DeGeneres.
  
  “Okay, this is awkward. Move on,” Kidman said.
  
  “Sorry, sorry, sorry,” Theron said. “I shouldn’t have put you on the spot.”
  
  “You’re dead,” Kidman laughed.
  
  Kidman, who has been married to Keith Urban since 2006, managed to get past the uncomfortable moment and end on a positive point: “I love Lenny. I so recommend him. He’s lovely.”
  
  “Bombshell” will debut in theaters on December 20.
