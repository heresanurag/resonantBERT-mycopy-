title: "Teqball: What Ronaldinho did next"
date: "2019-08-05"
section: "Football"
url: "https://www.cnn.com/2019/08/05/football/ronaldinho-teqball-football-brazil-spt-intl/index.html"
content: |
  Ever since theearliest recorded formoffootballwas played in 200 BC, various forms of theBeautiful Gamehave been invented and reimagined over the years.
  
  From futsal andbeach football, to more recent iterations that have seen it combined with other sports, such as footgolf and footvolley, different variants of football are constantly evolving.
  
  The latest is Teqball; born in Hungary, it already looks to be taking football-mad Brazil by storm.
  
  The brainchild of former professional footballer Gabor Borsanyi – who co-founded the game with businessman Gyuri Gattyan and computer scientist Viktor Huszar – Teqball involves playing with a football on a surface that resembles a curved table tennis table.
  
  Played as singles or doubles, it requires players to take one touch to control the ball and return towards their opponent at the other end of the table.
  
