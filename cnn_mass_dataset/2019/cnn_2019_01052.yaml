  It also is not subject to the special counsel regulations, which require attorney general approval for major prosecutorial decisions.
  
  As an alum of the Southern District of New York, I can attest that the office’s reputation is well-earned: It is uniquely tenacious and apolitical. And as myformer boss Preet Bhararahas said: The Southern District always “does the right thing, in the right way, for the right reasons.”
  
  Mueller’s passage of his report to Barr is a major milestone. But it is the calm; the storm lies ahead.
  
  This commentary has been updated on the news that the Mueller report has been delivered to the attorney general, and modified to clarify language on executive privilege.
