title: "Trump’s threats against the whistleblower are dangerous"
date: "2019-10-01"
section: "Opinion"
url: "https://www.cnn.com/2019/10/01/opinions/trumps-threats-against-whistleblower-are-dangerous-elie-honig/index.html"
