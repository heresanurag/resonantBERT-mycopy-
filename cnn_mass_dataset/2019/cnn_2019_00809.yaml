id: cnn_2019_00809
title: "Iran’s Rouhani says he agreed four-point plan for Trump talks, until US threatened more sanctions"
date: "2019-10-02"
section: "Middle East"
url: "https://www.cnn.com/2019/10/02/middleeast/rouhani-trump-talks-intl/index.html"
content: |
  Iran agreed to a four-point plan for talks with the United States during the UN General Assembly last week, until US President Donald Trump threatened to increase sanctions against Tehran,President Hassan Rouhanisaid in a televised speech on Wednesday.
  
  French President Emmanuel Macron made the proposals and tried tobroker a meetingbetween Trump and Rouhani, the Iranian leader said. “(The) French president for the second time in 24 hours met with me and he presented that plan to me, and I said that the generality of that plan from our point of view (is) acceptable,” Rouhani said.
  
  Rouhani said the four-point program stipulated that Iran should not seek nuclear weapons, should abide by regional peace, help to contribute to peace, and, in exchange, the US would lift all sanctions against Tehran and allow Iranian exports “immediately.”
  
  Tehran balked when Trump doubled down on increasing sanctions in two announcements he made over 24 hours, the Iranian president said.
  
  In his UN speech last week,Trump warnedhe would tighten economic penalties if Iran continued its “bloodlust.” CNN has reached out to the US administration for comment.
  
  A year later, what Khashoggi's murder says about Trump's close ally
  
  “Then I told the Europeans, now (with) what he has said, how can we accept it?” Rouhani added in his televised speech.
  
  Macron and UK Prime Minister Boris Johnson were seen urging Rouhani to meet Trump, in a rare three-way meeting.
  
  In a video that captured the encounter on the sidelines of the General Assembly, UK Prime Minister Boris Johnson is heard telling Rouhani: “You need to be on the side of the swimming pool and jump at the same time.”
  
  “If he leaves the country without meeting with President Trump, this is a lost opportunity,”Macron told Johnson.
  
  In an interview with CNN’s Christiane Amanpour in September, Iranian Foreign Minister Javad Zarif said Iran would be open to negotiating a new deal, that may see Iran’s “permanent denuclearization” in exchange for Congress-ratified sanctions relief.
  
  Tehran had previously said repeatedly that it would not be willing to renegotiate the 2015 nuclear deal which Trump withdrew from in May 2018.
  
