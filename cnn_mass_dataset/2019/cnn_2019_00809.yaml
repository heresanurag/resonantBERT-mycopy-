  In a joint press conference with Italian Foreign Minister Luigi Di Maio on Wednesday, US Secretary of State Mike Pompeo called on the European Union to “stand united against Iranian aggression.” But he added that the Trump administration remained “hopeful” about talks with Iran.
  
  “European nations have begun to wake up to the fact that Iran is the aggressor and not the aggrieved,” said Pompeo.
  
  “We remain hopeful that there will be an opportunity to discuss with the Iranians the path forward,” he later added.
