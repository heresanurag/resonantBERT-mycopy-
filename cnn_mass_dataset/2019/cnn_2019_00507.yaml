  _February 11, 2019_
  
  _History and international relations concerning Iran factor into today’s first story, as the Middle Eastern nation celebrates the 40th anniversary of its revolution. From there, we discuss how a blockade is preventing aid supplies from reaching people in Venezuela. Afterward, we take you to another South American nation, where illegal but lucrative gold mining is changing the landscape of its rainforest._
  
