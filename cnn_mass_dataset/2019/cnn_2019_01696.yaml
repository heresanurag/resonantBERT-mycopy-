  State governments, theUS Environmental Protection Agency,and farmers have createdworking groupsto figure out how to reduce the material running into the Mississippi. Farmers have started to use more cover crops to prevent runoff and to build embankments to contain the soil, but as the climate crisis has increased, heavy rains will continue to cause problems with flooding.
  
  We are “glad to see this is less than what the projection was,” saidBill Northey, under secretary for farm production and conservation with the US Department of Agriculture, said Thursday.
  
  But it “does not mean we achieved a tremendous amount of success,” improving the environment that creates these dead zones, Northey said. “We still have a long ways to go.”
