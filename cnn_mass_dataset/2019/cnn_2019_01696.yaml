title: "The Gulf dead zone was expected to be a record-breaker. A hurricane may have stopped it"
date: "2019-08-01"
section: "Health"
url: "https://www.cnn.com/2019/08/01/health/dead-zone-gulf-of-mexico-climate-scn/index.html"
content: |
  Record-breaking springrainsand historic flooding in the Midwest were poised to create one of the biggest dead zones on record in the Gulf of Mexico this summer, researchers had estimated.
  
  Instead, Hurricane Barry mixed up the waters, making the dead zone smaller than expected, scientists said during a National Oceanic and Atmospheric Administration press conference on Thursday.
  
  Scientists discovered a new species of tiny sharks that glow in the dark
  
  Still, the dead zone in the Gulf of Mexico is 2.8 times larger than thegoal setby the government this year, and the eighth largest in the 33 years with similarly mapped areas.
  
  A dead zone is an area in the ocean that has a low amount of dissolved oxygen.  Scientists call this ocean environmenthypoxia. It can no longer support life that would typically call that area home. When it starts to appear in the spring in the northern part of the Gulf of Mexico, it often causes die-offs of corals, aquatic plants, shellfish and other fish.
  
  Several bodies of water have dead zones, but the Gulf of Mexico has the largest in the world. For decades, researchers have tracked its size.
  
  This year, the size of the dead zone was 6,952 square miles. That’s well below the 8,717 square miles some predicted, or the slightly smaller dead zone of 7,829 square miles that NOAA predicted.
  
  The Gulf could see one of the largest dead zones in history this year
  
  “There is still a surprisingly large area” of the dead zone, saidNancy Rabalais, a marine ecologist who has been studying this phenomenon for over 34 years, “despite the mixing up by the storm.”
  
  Rabalais, a professor at Louisiana State University and a MacArthur fellow, took the measurements and helped create the report. She predicts that the dead zone will be larger a week from now, but “we can only spend so much time on the water” taking the measurements.
  
  Dead zones have changed in size over the years. The size of the zone largely depends on the environment. The “abnormally high amount of spring rainfall” as NOAA calls it, flooded hundreds of farms in the Midwest this spring. That rain washes the soil off farmers’ fields and straight into the Mississippi River, which dumps into the Gulf.
  
  Fake reefs boost Gulf of Mexico marine life, tourism
  
  The runoff contains large quantities of nitrogen and phosphorus that stimulate the growth of phytoplankton in the water. The phytoplankton fall to the bottom of the ocean and decompose with bacteria there, using up all the oxygen and creating harmfulalgal blooms.
  
  Human activity has made the Mississippi River more of a problem for the Gulf. The river now has three times the amount of nitrogen than in the 1950s, Rabalais said, and the amount of phosphorus has doubled.
  
  In May, nitrate loads were about 18% above the long-term average, and phosphorus loads were about 49% above the long-term average, according to scientists at theUniversity of Michigan,who are among those monitoring the issue.
  
