  According to local newspaperIl Piccolo,the rough sleeper in question is a 57-year-old Romanian named Mesej Mihaj who arrived in the city last October.
  
  Il Piccolo’s Diego D’Amelio, who first tweeted a photo of the sign, told CNN the gesture was made by local people “with a socialconscience… who were outraged by Polidori’s act.”
  
  “As a reporter, I’m supposed to be neutral but this isn’t like anything I’ve seen,” he said. “It shows an insane barbarism and general insensitivity. It’s incredible and disturbing.”
  
