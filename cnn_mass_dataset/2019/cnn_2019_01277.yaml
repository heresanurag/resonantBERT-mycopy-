  Equity and oil marketstook a downward turnafter Trump’s tweets.
  
  “The business community was surprised by the President’s announcement of new tariffs,” said Doug Barry, communications director for the US-China Business Council.
  
  “We are concerned that today’s actions will drive the Chinese away from the negotiating table,” he added.
  
  About 85% of the toys sold in the United States come from China and would be hit by the new tariff. In June, Hasbro president John Frascotti told US trade officials at a hearing that the duty would cause “significant and disproportionate harm” to the company and the broader US toy industry.
  
  Tariffs that go into effect on September 1 could hit some of the toys that companies have already ordered for the holiday season, said Steve Pasierb, president and CEO of The Toy Association.
  
  “We’re worried about how much of the 10% tariff will get passed on to consumers across all categories. A lot of things are going to get more expensive, and toys aren’t essential goods,” he said.
