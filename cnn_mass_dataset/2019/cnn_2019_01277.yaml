title: "Trump says he will go ahead with new China tariffs that would hit iPhones and toys"
date: "2019-08-01"
section: "Economy"
url: "https://www.cnn.com/2019/08/01/economy/new-china-tariffs-threat-trump/index.html"
content: |
  President Donald Trump said Thursday that he will add a new tariff on $300 billion of Chinese-made products on September 1, which would effectively put a tax on all Chinese goods coming into the United States.
  
  “Trade talks are continuing, and during the talks the U.S. will start, on September 1st, putting a small additional tariff of 10% on the remaining 300 billion dollars of products coming from China into our country,” hetweeted.
  
  Later in the day, Trump said in remarks to reporters at the White House that he might still ratchet tariffs up to 25%, as he’s previously threatened – or even higher.
  
  “It can be lifted in stages so we’re starting at 10% and it can be lifted up to well beyond 25%,” the President said. “But we’re not looking to do that, necessarily.”
  
  Oil prices nosedive 8% on Trump tariff threat -- worst day in more than 4 years
  
  The new tariffs could hit US consumersharder than the earlier rounds. It would tax goods like iPhones and other consumer electronics, sneakers and toys. Last year, Trump imposed tariffs on about $250 billion in Chinese-made goods, targeting industrial materials and components.
  
  As he has many times before, Trump claimed –falsely– that the tariffs have cost China rather than American consumers.
  
  “We’re taking in many billions of dollars. There’s been absolutely no inflation and frankly it hasn’t cost our consumer anything. It cost China,” Trump said in his remarks, adding that companies are now moving out of China to avoid the tariffs.
  
  In fact, economic studies show that US consumers, not China or other foreign importers, are bearing the weight of the duties. The White House’s most recentEconomic Report of the President, released in March, acknowledged that any benefit from the tariffs is offset by “costs paid by consumers in the form of higher prices and reduced consumption.”
  
  Trump issued his new threat of tariffs on China following a mid-morning meeting in the Oval Office with his trade team meant to update him on talks that wrapped this week in Shanghai, according to an administration official familiar with the matter.
  
  The team includes Treasury Secretary Steven Mnuchin and US Trade Representative Robert Lighthizer.
  
  Trump wasn’t pleased that China had not offered concrete promises to purchase American agricultural products during the talks, something he believed was agreed to when hemetwith Chinese President Xi Jinping in June at the Group of 20 summit in Japan, according to the official.
  
  At the time, Trump said he’d put off imposing new tariffs indefinitely.”We won’t be adding an additional tremendous amount of — we have, I guess, $350 billion left, which could be taxed or it could be tariffed. And we’re not doing that,” Trump said at the time.
  
  While trade officials told Trump on Thursday they believed there is still the potential for a deal to be struck with China, they said they were still far off from coming to any kind of agreement.
  
  Trump issued the four-tweet message announcing new tariffs starting in September with input from Mnuchin and Lighthizer, according to the official.
  
  In his tweets, the President called the talks “constructive,” but said the Chinese have not restarted buying American agricultural products as they had promised. He also claimed that China had failed to live up to its commitment in stemming sales of fentanyl, a powerful opioid, into the United States.
  
  American farmers have been hit hard by China’s retaliatory tariffs. Once the biggest market for US soybean farmers, the Chinese stopped buying the American product last summer in retaliation to Trump’s tariffs. By the end of 2018, the amount of American soybeans sitting in storagehit record levels.
  
  Trump’s move to apply new tariffs came as a surprise to some after positive signals earlier in the week.
  
  “The interpretations of the meeting 24 hours ago were positive. It was a successful meeting. Candid, cordial and constructive on Monday, and now we get to Thursday and it’s not,” said Craig Allen, president of the US-China Business Council. “That seems very counterproductive to me.”
  
  It’s sure to increase anxiety among businesses and Wall Street that the trade war is nowhere near its end.
  
