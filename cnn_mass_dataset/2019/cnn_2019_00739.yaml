title: "Miley Cyrus denies cheating on Liam Hemsworth in series of tweets"
date: "2019-08-22"
section: "Entertainment"
url: "https://www.cnn.com/2019/08/22/entertainment/miley-cyrus-twitter-liam-hemsworth/index.html"
content: |
  Miley Cyrus posted about what she’sgoing through currentlyin a series of tweets on Thursday, telling followers she never cheated on her estranged husband Liam Hemsworth.
  
  “I can accept that the life I’ve chosen means I must live completely open and transparent with my fans who I love, and the public, 100% of the time. What I cannot accept is being told I’m lying to cover up a crime I haven’t committed. I have nothing to hide,” Cyrus began.
  
  I can accept that the life I’ve chosen means I must live completely open and transparent with my fans who I love, and the public, 100% of the time. What I cannot accept is being told I’m lying to cover up a crime I haven’t committed. I have nothing to hide.
  
  Her split from Hemsworth was announced on August 10, after less than a year of marriage. The actorfiled for divorceon Wednesday.
  
  While she admits to cheating in relationships when she was younger and losing a Walmart deal for “ripping a bong,” she says she was never unfaithful to Hemsworth.
  
  “It is no secret that I was into partying in my teens and early 20s. I have not only smoked, but advocated for weed, I’ve experimented with drugs, my biggest song to date is about dancing on molly and snorting lines in the bathroom,” Cyrus continued.
  
  “But the truth is, once Liam & I reconciled,I meant it, & I was committed. There are NO secrets to uncover here. I’ve learned from every experience in my life. I’m not perfect, I don’t want to be, it’s boring. I’ve grown up in front of you, but the bottom line is, I HAVE GROWN UP,” she wrote. “I can admit to a lot of things but I refuse to admit that my marriage ended because of cheating. Liam and I have been together for a decade. I’ve said it before & it remains true, I love Liam and always will.”
  
  But the truth is, once Liam & I reconciled,I meant it, & I was committed. There are NO secrets to uncover here. I’ve learned from every experience in my life. I’m not perfect, I don’t want to be, it’s boring. I’ve grown up in front of you, but the bottom line is, I HAVE GROWN UP.
  
  She explained that she wanted to move on, tweeting, “I had to make a healthy decision for myself to leave a previous life behind. I am the healthiest and happiest I have been in a long time. You can say I am a twerking, pot smoking , foul mouthed hillbilly but I am not a liar.”
  
  BUT at this point I had to make a healthy decision for myself to leave a previous life behind. I am the healthiest and happiest I have been in a long time.  You can say I am a twerking, pot smoking , foul mouthed hillbilly but I am not a liar.
  
  “I am proud to say, I am simply in a different place from where i was when I was a younger,” she concluded.
  
  I am proud to say, I am simply in a different place from where i was when I was a younger.
  
  The former couple married last December. Hemsworth said on Instagram thathe wishes Cyrus“nothing but health and happiness going forward.”
