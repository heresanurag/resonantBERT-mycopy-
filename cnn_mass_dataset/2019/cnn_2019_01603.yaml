  # Japanese artist’s decade-old doodle in a New York bar skyrockets in value
  
  Mirna Alsharif
  
  Oct 14, 2019
  
  PUBLISHED Oct 13, 2019, 9:26 PM ET
  
  ![Image 1: 02 nara drawings](https://media.cnn.com/api/v1/images/stellar/prod/191013150726-02-nara-drawings.jpg?q=x_4,y_4,h_2264,w_4023,c_crop/w_1479)
  
  Mirna Alsharif/CNN
  
  Visual arts Japan Asia
  
  [See all topics](https://www.cnn.com/follow)
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2Fstyle%2Farticle%2Fnara-nyc-bar-drawings-trnd-style "Share with email")Link Threads
  
  Link Copied!
  
  New York—
  
  The walls of most bars are adorned with artwork of some kind, including the doodles of patrons after a few drinks. But a Manhattan bar has a set of doodles that could be worth hundreds of thousands of dollars.
  
  The doodles are the creation of Japanese artist Yoshitomo Nara, who took a felt-tip pen 10 years ago to the walls of [Niagara](http://niagaranyc.com/), a bar he frequents in the city’s East Village neighborhood. Nara’s painting, “Knife Behind Back,” sold for $24.9 million at Sotheby’s Hong Kong last weekend and now his decade-old drawings could be worth hundreds of thousands of dollars, according to a Sotheby’s representative.
  
  ![Image 2: "Knife Behind Back" by Yoshitomo Nara recently sold for $24.9 million.](https://media.cnn.com/api/v1/images/stellar/prod/191013150859-03-nara-drawings.jpg?q=w_4000,h_2249,x_0,y_0,c_fill/w_1093)
  
  "Knife Behind Back" by Yoshitomo Nara recently sold for $24.9 million.
  
  Yoshitomo Nara/Blum & Poe, Los Angeles/New York/Tokyo
  
  Tim Blum, an artist manager who has represented Nara since 1994, say he was with Nara in 2009 at the bar. Blum says they were out to celebrate following the stress of putting a show together. After a few drinks, Nara pulled out a felt-tip pen.
  
  Ad Feedback
  
  [Related article ![Image 3: takashi murakami portrait tai kwun](https://media.cnn.com/api/v1/images/stellar/prod/190729153527-takashi-murakami-portrait-tai-kwun.jpg?q=x_0,y_147,h_1595,w_2835,c_crop/h_720,w_1280/w_256) Photography by Alex Maeland Manga, Goya and 'Star Wars': The unexpected influences that made Takashi Murakami the artist he is today](https://www.cnn.com/style/article/takashi-murakami-identity/index.html)
  
  “He took a pen to the wall and everyone was kind of into it. It was a blur at the time because no one was thinking we should remember this 10 years later,” said Blum, adding that the “capper of the night” was Nara’s arrest by the NYPD after he drew graffiti at a subway station.
  
  And take a pen to the wall he did. The result? A wall mural of Nara-esque figures right across from the bar counter. The figure closest to the door can be seen dancing with a speech bubble reading “Hey! Ho! Let’s Go!” The phrase is a nod to the opening line of “Blitzkrieg Bop” by quintessential New York punk band The Ramones.
  
  > > [View this post on Instagram](https://www.instagram.com/p/BKEh6cBgHQg/?utm_source=ig_embed&utm_campaign=loading)
  
  To the right there are two more figures; one playing guitar while another is on drums.
  
  By the exit sign is the lead singer of the band Nara created. His message to Niagara bar crawlers? “Hey NYC Are You Happy?”
  
  But that’s not all. Nara drew a girl by the women’s bathroom and a boy by the men’s bathroom, welcoming all the “cool” girls and boys to Niagara’s lavatories.
  
  ![Image 4: Nara's doodle of a "typical bass player."](https://media.cnn.com/api/v1/images/stellar/prod/191013140058-nara-drawings.jpg?q=w_1600,h_1600,x_0,y_0,c_fill/w_1093)
  
  Nara's doodle of a "typical bass player."
  
  Courtesy Thom Bennett
  
  “It’s very typical Nara,” Blum said of the drawings. “They’re very music-oriented figures, he was inspired by the bar’s music for sure.”
  
  [Related article ![Image 5: "Astro boy" (1963)](https://media.cnn.com/api/v1/images/stellar/prod/190718133838-astro-boy-1963.jpg?q=x_2,y_674,h_912,w_1621,c_crop/h_720,w_1280/w_256) "Astro boy" (1963) Tezuka Productions Japanese anime: From 'Disney of the East' to a global industry worth billions](https://www.cnn.com/style/article/japan-anime-global-identity-hnk-intl/index.html)
  
  One look at Nara’s work and spectators can see the similarities between the East Village doodles and his paintings. For example, “One Foot in the Groove” — which sold for $1.16 million — contains a figure with similar hair, limbs and dress as those seen in the bar.
  
  But unlike Nara’s paintings, the drawings at the East Village bar were very low-key, only landing on the radar of art enthusiasts’ after his record-breaking sale.
  
  ![Image 6: Jennifer Convery-Masser had no idea this doodle was drawn by a famous artist when she photographed it in 2016. "It was unsigned & I love it!" she told CNN over Instagram.](https://media.cnn.com/api/v1/images/stellar/prod/191013163133-05-nara-drawings.jpg?q=w_1920,h_1080,x_0,y_0,c_fill/w_1093)
  
  Jennifer Convery-Masser had no idea this doodle was drawn by a famous artist when she photographed it in 2016. "It was unsigned & I love it!" she told CNN over Instagram.
  
  Jennifer Convery-Masser
  
  So how does this drawing stack up to his million-dollar paintings?
  
  “The imagery itself is quite in keeping with his style,” said David Schrader, head of private sales at Sotheby’s. “My guess is it’s probably worth hundreds of thousands. For sure, when an artist gets a record-selling price, it elevates them in the market. My gut is there are definitely people who would want to own this or the multiple pieces individually.”
  
  However, Schrader said that the drawings’ lack of certification and that they are not included in Nara’s professional portfolio would affect pricing.
  
  [Related article ![Image 7: No,02](https://media.cnn.com/api/v1/images/stellar/prod/171023113616-no02.jpg?q=x_0,y_245,h_2658,w_4724,c_crop/h_720,w_1280/w_256) Eiji Ohashi The beauty of Japan's lonely vending machines](https://www.cnn.com/style/article/japan-vending-machines-eiji-ohashi/index.html)
  
  “It’s helpful to know that people were there to see that he did create it and that he signed it, but Nara’s most desirable works are big figures on canvas. As you go down in materials used, you’ll have a pretty big decline in value,” Schrader said, adding that this art is site specific and “wasn’t meant to be sold.”
  
  The Niagara’s management declined to comment, but a bartender told CNN that the artwork “has been a part of the bar for a long time and will stay that way.” The drawings are safeguarded by a thin layer of plastic that was installed by the bar’s ownership.
  
  Nara doesn’t want to see the drawing sold, according to Blum.
  
  “It was done in the spirit of the moment,” Blum said. “Nara isn’t interested in any kind of monetarization discussion, but it’s certainly worth some money.”
  
