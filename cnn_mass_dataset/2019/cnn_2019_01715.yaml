title: "American Airlines is canceling 90 flights a day because of 737 Max grounding"
date: "2019-03-24"
section: "Business"
url: "https://www.cnn.com/2019/03/24/business/american-canceling-flights-737-max-grounding/index.html"
content: |
  American Airlines plans to cancel flights well into April because of the Boeing 737 Max grounding.
  
  American, the world’s largest airline, said Sunday it is canceling about 90 flights a day out through April 24. Before Sunday’s announcement, American had only canceled flights through March 28.
  
  The airline is hopeful that that the 737 Max planes will be flying again soon, but said it is canceling flights about a month out as it waits for word from the Federal Aviation Administration.
  
  “Canceling in advance provides additional availability and rebooking options for our customers,” said the statement from American.
  
  The global fleet of 371 of the 737 Max jets wasgrounded indefinitely on March 13after two of the planes had fatal crashes. A Lion Air flight crashed in October and anEthiopian Airlines flight crashed on March 10.
  
  The causes of the crashes have yet to be determined but the focus has been on anautomatic safety featurewhich may have forced the nose of each plane lower when it incorrectly believed the plane was in danger of going into a stall.
  
  Boeing and the FAA said they are working on anupgrade of its softwareto deal with that safety feature. Boeing said at the time of the grounding that it expected that update to be available “within weeks.”
  
  American has 24 of the 737 Max 8 jets. But not every flight which had been scheduled to have a 737 Max has been canceled. American said it has rearranged its schedule to use other aircraft to complete some of those flights.
  
