  This can take place over the course of a few million years as the planets grow from dust rains to round objects with a solid core.
  
  New planets, like babies, are kind of wobbly. They don’t establish a stable orbit around the star right away, but move in and out of range. Much like new parents establishing boundaries in their home to keep their toddler safe from potential dangers, these new planets need something to stop them from wobbling too close to their star.
  
  The researchers wanted to understand what kept the new planets in line, as well as the mechanism that allowed for super-Earths to orbit so closely to their host star that they zipped around the star once every 10 to 12 Earth days.
  
