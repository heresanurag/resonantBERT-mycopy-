  Stars throw off immense radiation. The protoplanetary disk around them contains a boundary called the silicate sublimation front, where temperatures exceed 1200 Kelvin and dust particles like silicates turn into extremely hot, turbulent gas.
  
  A rocky planet close to the star, like a super-Earth, will travel through that gas and has a gas trail of its own because it’s still forming. When the planet hits the boundary, the thinner, hot gas from the star interacts with the denser gas of the planet, resulting in a kick that bounces the planet away.
  
  Venus was potentially habitable until a mysterious event happened
  
  “Why are there so many super-Earths in close orbit, as Kepler has shown us? Because young planetary systems have a built-in baby-proof barrier,” said Mario Flock, study author and postdoctoral scholar at NASA’s Jet Propulsion Laboratory.
  
  The researchers said that there is another option, which they tested by tracing the movement of much smaller objects the size of pebbles. The thin, hot gas of the star rotates quickly and when small objects try to essentially keep  up with this quick orbit, they get tossed off like a child from a ride that’s too fast.
  
  When applied to our own solar system, these theories point to the suggestion of a rocky planet closer to our sun than Mercury. Did the planet just not form or was it kicked out of the solar system? The researchers believe this idea could prove intriguing for further study in the future.
  
  Pondering the idea, Flock said it’s interesting to think “not only that our Solar System was baby-proof – it is possible that the baby thus protected has since ‘flown the nest.’”
