title: "Solar systems have a ‘baby-proof’ system that protects newborn planets, study finds"
date: "2019-10-10"
section: "World"
url: "https://www.cnn.com/2019/10/10/world/solar-systems-new-planets-baby-proof-scn/index.html"
content: |
  Space is not a friendly environment, even for the stars, planets and galaxies born in its cold, violent reaches. But solar systems have found a way to keep their newborn planets from accidentally getting too close to their host stars, according to a new study.
  
  Without a physical “baby-proofing” structure in place, planets born in the inner regions of a star system might drift and dive right into their host star.
  
  And during NASA’s Kepler mission, numerous super-Earths, or planets with a mass higher than Earth’s, were found in close orbits around their stars, toeing the line of so-called “baby-proof” region.
  
  Researchers published their findings about this process in the journalAstronomy and Astrophysicson Thursday.
  
  The current understanding for planet formation follows a specific order. Stars form from clouds of collapsing gas and dust. Then, a protoplanetary disk of leftover gas and dust surrounds the star. Planets form from this disk, using the leftover gas and dust that created the star to pull together solid material for planets.
  
