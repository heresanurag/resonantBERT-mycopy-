id: cnn_2019_00963
title: "Here are all the movies and TV shows you can binge on when Disney+ launches"
date: "2019-10-15"
section: "Entertainment"
url: "https://www.cnn.com/2019/10/15/entertainment/disney-launch-tv-movies-list-trnd/index.html"
content: |
  Disney+, Disney’s much-anticipated streaming service,launched Nov. 12. Earlier this year, Disney released an enormous lineup of “basically everything” that the service offers.
  
  In aprolific Twitter threadandhours-long Youtube teaser, the service highlighted over 600 titles that subscribers will have unlimited access to stream and download.
  
  Disney+ costs $6.99 per month, or $69.99 per year. That’s almost half the price of a standard Netflix subscription.
  
  The service is prepared to go head-to-head with Netflix with an exclusive lineup of Marvel, Star Wars, Disney Animation, Pixar, National Geographic, and original content,announcing in Augustthat they will offer a bundle that includes Disney+, ESPN+, and Hulu for $12.99 a month.
  
  By 2025,Disney anticipates between 60 to 90 million subscribersto the service. It isavailable for pre-orderon the company’s website.
  
  You don’t need to spend 3 hours watching the video teaser, though. CNN has got your back with this complete list of every title teased by Disney+.
  
  Buckle up, kids, this is a long one.
  
