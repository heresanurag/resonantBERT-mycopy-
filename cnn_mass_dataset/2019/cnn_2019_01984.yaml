  _January 22, 2019_
  
  _Democrats and Republicans dispute the value of a White House offer concerning immigration and the partial shutdown of the U.S. government. America remembers a civil rights icon on the holiday named after him. Oysters are recruited to shore up parts of New York City. And if you’ve ever wondered what a super blood wolf moon is (and who hasn’t?), today’s show has your explanation._
  
