title: "Former US ambassador to Denmark says Trump canceling trip ‘is just not the way you treat an ally’"
date: "2019-08-21"
section: "Politics"
url: "https://www.cnn.com/2019/08/21/politics/rufus-gifford-donald-trump-denmark-trip-greenland/index.html"
content: |
  The former US ambassador to Denmark lambasted President Donald Trump Wednesday for hisdecision to cancel a tripto the country after its leader declined to discussTrump’s interest in purchasing Greenlandduring the visit, saying the move is “not the way you treat an ally.”
  
  “I think it’s sad, honestly, because this is just not the way you treat an ally,”Rufus Gifford, who served in the Obama administration,told CNN’s Alisyn Camerota on “New Day.” “And to cancel the trip in this way is just a shame. It’s absolutely a shame.”
  
  On Tuesday, Trump announced in a tweet that he would be postponing his upcoming trip to Denmark “based on” comments by Danish Prime Minister Mette Frederiksen, who told a newspaper earlier this week that the President’s interest in purchasing Greenland was “absurd” and that Greenland, an autonomous Danish territory, “is not for sale.”
  
  Trump postpones Denmark trip after Prime Minister refuses to discuss sale of Greenland
  
  Gifford told Camerota that as ambassador, he “had the great responsibility of going to the Danish government and requesting troops to go to Iraq, to Syria. And they went and they fought alongside our troops and they died alongside our troops.”
  
  During the Obama administration,Denmark joined the anti-ISIS coalitionthat included more than 50 countries fighting against ISIS, and State Department officials hadincluded Denmark on a list of countriesthat provided equipment and ammunition in the fight against the terror group. Denmark is also a founding member of NATO.
  
  “This is not the way you treat a loyal ally … with centuries of diplomatic relations. It’s just a sad chapter to me,” Gifford added.
  
  Frederiksen’s comments came on the same day thatTrump confirmed his interest in buying the country,telling reporters that Greenland is hurting Denmark. A White House official confirmed to CNN on Tuesday that the entire trip to Denmark is being scrapped.
  
  The current US ambassador to Denmark Carla SandstweetedWednesday morning that Trump “values and respects [Denmark] and looks forward to a visit in the future to discuss the many important issues in our strong bilateral relationship!”
