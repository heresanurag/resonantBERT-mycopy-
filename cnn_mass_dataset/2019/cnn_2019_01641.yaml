title: "Quickly catch up on the day’s news"
date: "2019-12-30"
section: "App News Section"
url: "https://www.cnn.com/2019/12/30/app-news-section/quickly-catch-up-december-30/index.html"
content: |
  Here’s what you might have missed Monday on CNN:
  
  – A man with a “big machete knife” burst into a rabbi’s home after a candle-lighting ceremony. One of the congregants initially escaped, but camecharging back to smash a table into the attacker’s faceand to assist police in tracking him.
  
  – The USlaunched airstrikes on facilities in Iraq and Syriawith links to the Iranian-backed militia that is blamed for attacks on Americans in Iraq. Now Iran iswarning of “consequences.”
  
  – Two parishioners were killed when a gunman opened fire in a Texas church Sunday. Within seconds,members of the church security team shot and killed the suspect.
  
  – President Donald Trump’s personal lawyerheld a back-channel phone call with Venezuela’s embattled President Nicolás Maduroin September 2018, according to The Washington Post. It’s the latest example of the scope of Rudy Giuliani’s role in US foreign diplomacy.
  
  – A sports reporter tried to call and text her husband before a fatal plane crash.He never got the chance to answer.
  
  – Stocksslippedon the second-to-last trading day of the year.
  
  – A ‘Rise of Skywalker’ screenwriter addressedthe lack of screen time for a beloved Resistance fighterwho spent much of her time back at the base in the latest ‘Star Wars’ release.
  
  – Russia’s President Vladimir Putin againinvited Trump to visit Moscowin a Christmas and New Year message afterspeaking with the President by phone Sundayto discuss counterterrorism.
