  The  “Dawson’s Creek” actress shocked fans in July 2018 when she told Vanity Fair that she had secretlytied the knotin the Adirondacks with musician Phil Elverum. Williams described her relationship with Elverum toVanity Fairas “very sacred and very special.” The two divorced less than a year later.
  
  Williams is the mother of 14-year-old daughter Matilda, whom she shared with the late Heath Ledger. The two were in a three-year relationship and had their daughter before Ledger died from an accidental overdose of prescription medication in 2008.
