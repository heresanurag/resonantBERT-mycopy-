  Edwards has been polling close to that 50% threshold, but Trump campaign officials believe Trump can help boost turnout among Republicans enough to keep Edwards from winning outright in the state’s unique jungle primary system.
  
  The Louisiana rally came a day afterTrump rallied supporters in Minneapoliswhere he took the stage at a political rally for the first time since Democrats launched their impeachment inquiry. That rally revealed a fired up Trump focused on attacking Democrats over their moves toward impeachment, savaging his would-be rival former Vice President Joe Biden – including by making false or unsubstantiated claims – and insisted once again that he did nothing improper in pressing the Ukrainian president to investigate Biden.
