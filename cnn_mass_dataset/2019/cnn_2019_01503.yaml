id: cnn_2019_01503
title: "Suspect indicted in fatal stabbing at Maryland Popeyes after argument"
date: "2019-12-17"
section: "US"
url: "https://www.cnn.com/2019/12/17/us/popeyes-sandwich-stabbing-suspect-indicted/index.html"
content: |
  A Maryland grand jury has indicted a man in afatal stabbing of a customer outside a Popeyes restaurant last month.
  
  Ricoh McClaine, 30, of Washington, DC is accused of common law murder and carrying a dangerous weapon with intent to injure, Prince George’s County State’s Attorney Aisha N. Braveboy said in a news release Tuesday.
  
  McClaine allegedly stabbed 28-year-old Kevin Davis to death on November 4 outside the Popeyes in Oxon Hill.
  
  The altercation started when Davis cut in front of several customers in a line set aside for ordering the fast food chain’s popularnew chicken sandwich, authorities said.
  
  The fatal stabbing occurred about 15 seconds after McClaine confronted Davis, authorities said.
  
  McClaine was arrestedmore than a week later. It was not immediately clear whether he has an attorney.
  
  Prince George’s Police Chief Hank Stawinski has said attributing Davis’ death to a chicken sandwich “marginalizes the grief and belittles the consequences” of his death.
