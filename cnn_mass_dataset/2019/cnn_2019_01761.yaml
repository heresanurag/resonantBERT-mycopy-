  There has been a backlash in other African countrieswith reports of violent incidents taking place in Zambia and Nigeria where South African owned businesses and shops have been ransacked.
  
  South Africa has temporarily closed its diplomatic missions in Lagos and Abuja in Nigeria, fearing reprisal attacks against its citizens.
  
  These decisions by the Zambian and Madagascan football associations echo the international boycotts of South African athletes and teams during theapartheid era. Between 1960 and 1992, South Africa was barred from competing at the Olympic Games while the Springbok rugby, cricket and football teams were barred from World Cups and officially sanctioned international games.
  
  With political and corporate leaders in Ghana, Kenya, Ethiopia other African nationsslamming the South African governmentand its people for this unchecked xenophobia, there may be more teams declining to play ball with their neighbors.
