  Passengers on a Norwegian Cruise ship were hopping mad after severe weatherforced the ship to cancel several ports of calland float around the Atlantic for days. Oh – and apparently the ship’s bathrooms had serious issues, too. Yeesh.
  
  Here’s what else you need to know toGet Up to Speed and Out the Door. (You can also get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  There was a maelstrom of impeachment news yesterday, and most of it centered around Rudy Giuliani, President Trump’s personal attorney. Two of Giuliani’s Ukraine contacts werearrested on charges of violating campaign finance laws, and now the feds are looking at Giuliani’s financial dealings with the men. Lev Parnas and Igor Fruman, who are powerful Republican donors, allegedly introduced Giuliani to Ukrainian officials who pushed unfounded theories about corruption involving former Vice President Joe Biden and his son Hunter. How much of this did Giuliani know or participate in? It’s unclear, but if the men are offered a chance to exchange information for leniency in sentencing, they may dish on the attorney’s involvement.When asked about the revelations yesterday, Trump said he doesn’t know the men. House Democratsalso issued a subpoena to Energy Secretary Rick Perryfor documents related to the Trump administration’s contacts with Ukraine.
  
  Adding to the mess,Secretary of State Mike Pompeo’s senior adviser resigned yesterday. Pompeo has been under pressure from House Democrats over his involvement in the Ukraine controversy.
  
  After weeks of Brexit deadlock, British and Irish leaders Boris Johnson and Leo Varadkarraised hope of a breakthroughwhen they announced yesterday that they saw a “pathway” to a Brexit deal. After a face-to-face meeting that was billed as a last chance to map out a deal, the pair issued an unexpectedly upbeat statement that indicated progress could be made. How quickly could all of this get wrapped up? Varadkar says they think it’s possible to strike a new deal by the end of the month – that is, as the ball finally drops on Brexit. The effects of Brexit on the Irish border have been a big sticking point for negotiations.In Varadkar’s current plan, Northern Ireland would leave the EU customs union on the current Brexit deadline of October 31 along with the rest of the UK. But the region would remain aligned with EU regulations on goods and agriculture.
  
  An Iranian oil tanker was hit and damaged by two missiles today, andthe tanker company says the missiles were “possibly” fired from Saudi soil. (Iranian government officials haven’t pinned the attack on anyone at this point.) All of the tanker’s crew members are safe. A volley of attacks on Iranian and Saudi oil tankers and production facilities in the region has increased tensions in recent months, with the US standing by to see if and when it should get more involved. This latest attack also caused crude oil prices to jump on Friday morning.
  
  What’s going on between the NBA and China? Earlier this week, all of the NBA’s official Chinese partnerssuspended ties with the leagueafter Houston Rockets General Manager Daryl Morey tweeted support for pro-democracy protesters in Hong Kong. The NBA apologized to China and distanced itself from Morey’s words, but that caused its own backlash: Fans and US politicians have been criticizing the league for seemingly prioritizing profits over free speech and human rights. This has led to some small-scale protests at NBA games, and now,Nike and other big apparel companies could get roped in because of their lucrative tiesto both the league and Chinese consumers. In case you didn’t know, basketball is big business in China. The NBA lists 11 wholly-owned Chinese companies as its official partners in the country, and one analyst estimates the league’s presence in China contributes 10% of its revenue.
  
  A new report regarding the death of 17-year-old Laquan McDonald, who was fatally shot by a police officer in Chicago in 2014,reveals what investigators described as an elaborate cover-upby 16 officers and supervisors following McDonald’s death. The hundreds of investigative documents released with the report accuse 11 officers – including the one who fired the fatal shots – of making false statements to exaggerate the threat posed by the teen, who was black. According to the documents, four others allegedly failed to ensure their video or audio recording systems were working, and a former lieutenant who led the shooting investigation allegedly destroyed handwritten notes from witness interviews. Jason Van Dyke, the former police officer who killed McDonald, was convicted of second-degree murder in January.
  
  This year’s Nobel Peace Prize winner is…
  
  Ethiopia’s peacemaking Prime Minister Abiy Ahmed. He pursued an audacious deal with longtime enemy Eritrea that ended a largely pointless 20-year war between the countries.
  
