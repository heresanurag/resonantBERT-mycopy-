title: "Terrorizing civilians and bombing hospitals is a core part of Assad’s strategy"
date: "2019-09-02"
section: "Opinion"
url: "https://www.cnn.com/2019/09/02/opinions/assad-strategy-terrorizing-civilians-hospitals-jonathan-allen/index.html"
content: |
  Editor’s Note:Jonathan Allen was appointed UK Deputy Permanent Representative to the United Nations in New York in August 2017. He was the director of national security at the Foreign & Commonwealth Office from 2015 until 2017. The views expressed in this commentary belong to the author. Viewmore opinionat CNN.
  
  In war zones, ambulances and hospital roofsare often clearly markedwith a red cross or crescent to avoid accidental air strikes or other attacks. In Idlib, in the northwest of Syria, where the civil war has stretched into its eighth year, the UNhas also sharedthe coordinates of medical facilities with Bashar al-Assad’s forces and their Russian allies in order to avoid inadvertent attacks.
  
  Despite this deconfliction system, these hospitals have been repeatedly hit since the start of the current offensive in April. In northwest Syria, the US-based human rights group Physicians for Human Rights (PHR)received reportsof 46 attacks on health care facilities – and confirmed 16 of them. At least 14 of these facilities were on the UN’s deconfliction list, according to several members of the UN Security Council in a formal diplomatic petition that wasreviewed by Reuters.
  
  No matter how much Russia and Syria try to deny their targeting civilians, given that this information was readily shared, it seems apparent that these are not accidents of war or inadvertent attacks.
  
  We should not be surprised. Over the course of the Syrian conflict, there have been at least 578 attacks on health-care facilities and 890 deaths of medical personnel, according to PHR. More than 90% of these attackswere perpetratedby the Syrian regime or the Russian government (or both), according to the PHR.
  
  Targeting health care facilitiesis a war crime. Syriaclaims, in a July 16 letter to the UN, that all health-care facilities in Idlibhave been rendered“inoperative,” and can no longer be considered “civilian objects” under humanitarian law. But the UN emergency relief coordinatorchallenged those claimsand pointed to facilities that continue to be recognized and supported by the UN, including the medical center at Maarrat al-Numan. Russian military hascooperatedcloselywith the regime and their planes have also taken part in the bombing raids.
  
  Terrorizing civilians is a core part of Assad’s strategy. The Syrian people have been targeted by their own government for daring to ask for a fundamental human right that so many of us take for granted – the right to elect their leadership and have a say in their future. More than 5.6 million people have fled Syria since the start of the conflict in 2011.
  
  Syria deserves to live
  
  Staying in Syria is risky, and detention by the regime is often a death sentence.
  
  Amina Khoulani, the co-founder of Families for Freedom, an organization that helps those who are unlawfully detained in Syria,shared her story– one thousands of other Syrian families can relate to – with the United Nations Security Council this month. Her three brothers were detained for peacefully demonstrating for a free Syria, she told the UN. After years of hoping for their release, shereceived evidencethat all three died in detention.
  
  The Syrian regime has denied systematic abuse in its prison system. But government memos obtained by the New York Timesshow officialswho report directly to Assad ordered mass detentions and were aware of deaths from torture, filthy conditions and other atrocities.
  
  Many like Khoulani have fled the country. Meanwhile, there are oversix million internally displaced people, many of whom find themselves in Idlib, the last stronghold against the regime. For many of these people, there is nowhere left to run. Members of the Security Council are supporting a resolution calling for an immediate cessation of hostilities to protect civilians and allow humanitarian access.
  
  It is desperately sad that the Security Councilhas not been ableto protect Syrians from these war crimes – including chemical weapons attacks committed by their own government.
  
  Syria news is everywhere, except on people's minds
  
  This is not a failure of will by the whole Security Council. We have been prevented from acting by Russia, through its employment of the veto, which ithas used 12 timessince the start of the conflict. China hasalso exercisedits veto power with regards to resolutions on Syria.
  
  As we demand that the Assad regime cease its crimes against its people, we have created investigatory and evidence-gathering bodies to ensure that those ordering and carrying out attacks are one day brought to justice. The Independent International Commission of Inquiry on the Syrian Arab Republic wasset up by the Human Rights Councilto investigate allegations of violations of international human rights law. The International Impartial and Independent Mechanismwas establishedby the General Assembly to assist in the investigation and prosecution of persons responsible for the most serious crimes committed in Syria under international law.
  
  After an intervention by 10 members of the Security Council, the UN Secretary-General issetting upaBoard of Inquiryto investigate attacks on deconflicted sites and UN-supported facilities in Idlib.
  
  Peace in Syria will not be realized until a comprehensive political solution is widely acceptable to the Syrian people. Until that happens, we must not lose our capacity for outrage for what the Syrian regime is doing to its people: using chemical weapons,torturing political prisoners,killing children,targeting civilian infrastructureand bombing hospitals.
  
  We must not stop listening to those who bear witness. We must not let eight years of brutality normalize us to more. We must redouble our efforts to achieve a ceasefire in Idlib and humanitarian access.
  
  We must let the regime know, from Assad down to his commanders and soldiers on the ground, that we will not rest until those who ordered and carried out these attacks are held accountable for their crimes.
