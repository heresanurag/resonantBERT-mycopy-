content: |
  Here’s what you might have missed Thursday on CNN:
  
  – Hurricane Dorian may have weakened to a Category 2, but it’s still unleashing havoc asa related tornado tears apart homesin North Carolina.
  
  – The wild horses of the Outer Banks won’t evacuate. Theyhave a special trick to survive hurricanes.
  
  – As Kevin Hart recuperates from a car accident,reported audio of a 911 callis giving some insight into the seriousness of the crash.
  
  – The bravado of UK Prime Minister Boris Johnson’s premiershipturned into bluster in a mere two daysas his political strategy starts to backfire.
  
  – Ever wonder why you’re left-handed? Scientists have nowidentified the geneslinked to this trait.
  
  – Opinion: Democrats unveiled big, bold plans in the fight for Earth at CNN’s climate-crisis town hall.Here’s who came out on top.
  
  – A Wisconsin mother teaching her teenage son to drive was shot and killed in what police saywas a road-rage incidentsparked by a minor car crash.
  
  – Kim Kardashian West got super drunk andleaked her own news about expecting baby No. 4via a surrogate.
