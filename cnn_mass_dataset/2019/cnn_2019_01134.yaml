  The Northwest cases are amongthree ongoing measlesoutbreaks in the U.S. that sickened 79 people in January, according to the CDC. Last year, 372 measles cases were confirmed nationwide, the most since an outbreak in 2014 sickened 667 people.
  
  Washington and Oregon areamong 17 statesthat allow non-medical exemptions from vaccination requirements for school entry, according to the National Conference of State Legislatures.
  
  Washington state Rep. Paul Harris (R-Vancouver) has introduceda measurethat would remove personal belief exemptions for the MMR vaccine.
  
  Research has confirmed that vaccines don’t cause autism, a common reason cited by parents who reject vaccinations. Others object to the timing and combinations of the vaccines and to being forced to inoculate their children.
