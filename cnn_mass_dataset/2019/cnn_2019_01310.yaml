  Vance’s investigation comes after the Justice Department probe into the payments, which landed former Trump attorney Michael Cohen in prison forviolating federal campaign finance laws. He is at a federal prison in New York and is slated to be released in December 2021.
  
  Trump has gone to extraordinary lengths to keep his finances private,even though he promisedto follow decades of precedent and publicly release his tax returns before the 2016 election.
  
  His critics have alleged that his tax returns could expose massive debts to foreign interests or that is he not as wealthy as he claims to be.A Forbes estimatefrom September said Trump is worth $3.1 billion, though Cohen has testified that Trump inflated his earnings in the past.
  
  CORRECTION: This story has been updated to correctly identify that Judge Denny Chin asked about the “Fifth Avenue” example.
