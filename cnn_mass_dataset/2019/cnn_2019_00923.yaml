  Compliance assurance, he explained, means essentially making sure the companies apply with pollution related laws up front rather than penalize them later. “The more compliance assurance that we have, fewer enforcement actions we need to take.”
  
  Wheeler argued that the metric the EPA currently uses is to track the number of new criminal enforcement cases that open each year.He testifiedthat the EPA opened more criminal enforcement cases in 2017, reversing a downward trend started in 2011.
  
  The Trump administration has proposed rollbacks of several Obama-era pollution control efforts, including weakeningfuel economy targets, revisingcoal ashregulations and loosening emission standards on coal-fueled plants that, by the EPA’sown estimate, would result in up to 1,400 more premature deaths a year as of 2030.
