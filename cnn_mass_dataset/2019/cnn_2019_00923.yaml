id: cnn_2019_00923
title: "Polluters see lowest level of EPA fines, according to Washington Post report"
date: "2019-01-24"
section: "Health"
url: "https://www.cnn.com/2019/01/24/health/epa-fines-of-polluters-lowest-level/index.html"
content: |
  Polluters are paying historically low fines under the Trump administration, according to aWashington Post analysisof the US Environmental Protection Agency’s civil penalties.
  
  The analysis comes from an expert who was familiar with the data and served in the Obama administration’s EPA as the head ofits Office of Enforcement and Compliance Assurancefor eight years. The expert,Cynthia Giles, is now a guest fellow at the Harvard Environmental and Energy Law Program.
  
  According to Giles’ analysis of publicly availabledata from the EPA, the amount of money the agency collected from civil penalties paid by companies that the EPA determined were polluting the environment dropped from an average of more than $500 million a year over the past two decades prior to the Trump administration to about $72 million in fiscal year 2017, the lowest level of fines paid in inflation-adjusted dollars since the EPA office was created in 1994. That drop stood out because 97% of the penalties in fiscal year 2017 came from actions filed under the Obama administration, according to the analysis Gilesshared with CNNafter it appeared in The Washington Post.
  
