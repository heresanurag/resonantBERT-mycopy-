  Editor’s Note:Sign upto get our new weekly column as a newsletter. We’re looking back at the strongest, smartestopiniontakes of the week from CNN and other outlets.
  
  At 9:06 pm ET on Wednesday night, the Democratic Party’s Obama era officially ended.
  
  That was the moment Sen. Cory Booker looked over at Joe Biden, one of his rivals for the Democratic presidential nomination, and said, “Mr. Vice President, you can’t have it both ways. You invoke President Obama more than anybody in this campaign. You can’t do it when it’s convenient and then dodge it when it’s not.” He was talking about immigration. Biden and by extension, Obama, were taking fire on the debate stage for deporting more immigrants in the first two years of their administration than President Trump had in his first two years.
  
  As he did throughout the second night of last week’s CNN Democratic Presidential debates, Biden defended Obama, citing his support for immigration reform.Paul Begalawas among those taken aback by the debaters’ repeated criticisms of the 44th President: “I was stunned at how disrespected he was tonight.On immigration, criminal justice and trade, Democrats denigrated the record of the man who saved the American economy, rescued the auto industry, signed the Paris Climate Accord and placed two impressive female justices on the Supreme Court. It was sad and stupid.”
  
  John Avlonasked, “When did Barack Obama become a Republican?” He noted, “if the policies of Barack Obama – a person who is still America’s most admired political leader – are being castigated as Republican talking points,that’s a sign of how unmoored our political conversation has become from reality.” And for Democrats, Avlon contended, that risks helping re-elect Donald Trump.
  
  Wait a second, wrotePaul Waldman, in the Washington Post. He called Obama an “excellent president,” the best of “my lifetime,” but still said Democrats should welcome the criticism. No president is perfect, “and if Democrats want to have a serious discussion about what they want to do with the presidency the next time they have it,they not only can discuss the shortcomings of Obama’s tenure, they have to.”
  
  They might also consider taking a page from Obama,Errol Louiswrote: “Whatever happened to ‘Yes we can’?” Instead, on the first night of the week’s debates, centrist Democrats John Delaney, John Hickenlooper and Steve Bullock “launched a full-out attack on Senators Bernie Sanders and Elizabeth Warren for promoting sweeping measures like Medicare for All and decriminalizing undocumented border crossings.” It reminded Louis of Obama’s pushback against naysayers in his victory speech after the South Carolina primary in 2008: “’Don’t tell me we can’t change. Yes, we can,’ Obama said. ‘Yes, we can heal this nation. Yes, we can seize our future…’”
  
  Republicans welcomed the divisions.Scott Jenningsrecalled, “Democrats savaged Republicans in the 2018 midterms for trying to repeal Obamacare. And now two of their leading candidates for president – and several others – are arguing about how to do the same thing. My head is spinning!”
  
  Of course, Obama’s legacy was collateral damage in the attacks on Biden, the frontrunner in early polling. To dislodge him, the others went straight at his strategy of closely allying himself with the Obama years.
  
  Biden brought a more spirited performance this time, after a weak turn  in the first round of debates “Joe Biden got the memo,” wroteTara Setmayer. “This time he came prepared for the onslaught of attacks and wasn’t afraid to hit back when necessary. Biden still needs to work on more crisp, simplified defenses of his record on immigration and criminal justice, but overall his performance should alleviate concerns about his ability to handle the campaign.” She faulted the other debaters for spending “more time sniping at each other over wonky policy differences than making their cases to the American people as to why they would make a better president than Donald Trump. This is not a winning strategy in the long run.”
  
  Julian Zelizerwrote, “At the heart of Tuesday’s debate was the contest between moderates who focused on their objections to others’ bold proposals and progressives who focused on the problems that we face as a nation…Senator Warren took the most advantage of the on-stage dynamics by offering hard-hitting commentsabout President Trump and presenting a series of specific policy solutions in stark opposition to the GOP agenda.”
  
  The moderate vs. progressive conflict was clear. “The struggle for the soul of the Democratic Party has now been joined for all to see,” wrote David Gergen.
  
  Sen. Kamala Harris, who dominated the first round of debates, found herself on the defensive this time, particularly at the hands of Rep. Tulsi Gabbard, who critiqued Harris’ record as California Attorney General. “It was always going to be hard for her to replicate the success of her first debate moment against Biden,” wroteSE Cuppof Harris. “But she was overshadowed – not by the front runner, Biden – but by the tier under her.”
  
  Biden, Warren, Harris, and virtually all the candidates who took part in the debates shared their personal stories in a series of op-eds for CNN.See them here.
  
