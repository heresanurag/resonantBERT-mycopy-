title: "NFL player won’t have to pay $7,017 fine for ‘Man of God’ headband, so he’s giving the money to a hospital instead"
date: "2019-10-09"
section: "US"
url: "https://www.cnn.com/2019/10/09/us/saints-headband-fine-donation-trnd/index.html"
content: |
  New Orleans Saints linebacker Demario Davis says he won’t have to pay a $7,017 fine for wearing a “Man of God” headband, so he’s donating the money – and more – to his hometown hospital.
  
  Davis wasfined by the National Football Leaguefor wearing the headband during the Saints’ Week 3 win over the Seattle Seahawks.League rules prohibit players from “wearing, displaying, or otherwise conveying personal messages”during game day events unless they are approved by the NFL.
  
  Charity and NFL team partners to reduce military and veteran suicides ... there are over 7,000 each year
  
  He announced that he won his appealin an Instagram post on Tuesday nightand said he was giving the fine money and more than $30,000 he raised selling the headbands online to St. Dominic Hospital in Jackson, Mississippi.
  
