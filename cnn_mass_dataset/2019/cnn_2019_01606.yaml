title: "State of the Union reactions, GIF’d"
date: "2019-02-06"
section: "Politics"
url: "https://www.cnn.com/2019/02/06/politics/state-of-the-union-reactions-gifs/index.html"
content: |
  Words matter during the State of the Union address, butreactions may matteralmost as much. Here’s a look at some of the notable moments from President Donald Trump’s Tuesday night address to the nation.
  
  The golf clap heard ‘round the world, delivered by House Speaker Nancy Pelosi. This was her response to Trump’s early call for “the boundless potential of cooperation, compromise, and the common good.” Seems the businessman-turned-President may not have convinced her.
  
  Another notable Pelosi clap, this time with a hair fix. One of the more awkward places in Washington has got to be sitting behind the President during the State of the Union, even if he is from your party, andespeciallyif he is not.
  
  Another person who didn’t seem amused by at least one part of Trump speech was Sen. Kamala Harris. Harris is one of Trump’s 2020 challengers from the left, and she seems to think “putting the ruthless coyotes, cartels, drug dealers, and human traffickers out of business” is something that iseasier said than done.
  
  Another 2020 contender, Sen. Kirsten Gillibrand, almost straight up rolled her eyes during Trump’sclaims about unemployment: “Unemployment has reached the lowest rate in half a century. African-American, Hispanic-American and Asian-American unemployment have all reached their lowest levels ever recorded. Unemployment for Americans with disabilities has also reached an all-time low. More people are working now than at any time in our history — 157 million.”
  
  You know whodidget jazzed? These women sitting on the Democrats’ side of the chamber. Wearing suffragette white, a large group of women, many of them new to Congress,cheered when Trump mentionedthat, a century after women won the right to vote, Congress has more women than ever before.
  
  Trump got in on the reaction game too, conducting an impromptuchorus of “Happy Birthday”for an 81-year-old Holocaust survivor who attended the speech as a guest. Which showed that, regardless of what those in the audience or those at home thought of the speech, some moments can bring people together.
  
  He is very polite and said thank you. Usually the first thing I say after people sing happy birthday to me is something about how awkward it was (which, for the record, makes it more awkward).
  
  Since this year’s State of the Union was rescheduled, that meant it fell on Lunar New Year. Which means naturally Buzz Aldrin, one of the first men on the moon, was there. Basically America got to collectivelyyell at the moon with Buzz Aldrin.
  
  Stick with me here, because this is not so much a GIF as a silent documentary short. I just want to understand what happened to Trump’s tie and why it was askew for the beginning of the speech. Look: It is straight, then he turns to our left and when he turns back, it’s stuck for no discernible reason.
  
  Ties had a huge night on Tuesday. Here’s Rep. Billy Long of Missouri having Trump sign his tie.
  
  Let’s do this again. Same time next year?
