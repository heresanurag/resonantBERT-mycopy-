title: "6 ‘probable’ vaping-related lung injury cases linked to Massachusetts dispensaries"
date: "2019-12-06"
section: "Health"
url: "https://www.cnn.com/2019/12/06/health/vaping-marijuana-massachusetts-bn/index.html"
content: |
  Astate investigationinto vaping-related lung injury cases in Massachusetts has found thatvape products used in six probable caseswere purchased legally from dispensaries. All of the products contained THC or tetrahydrocannabinol, the primary psychoactive component of cannabis.
  
  FDA warns consumers to stop using THC vaping products
  
  None of the confirmed cases in the investigation involved products purchased from dispensaries.
  
  Details from this investigation into vape products were released on Thursday and included 49 vaping-related lung injury cases total, 16 of which were “confirmed” and 33 of which were “probable.”
  
  The Massachusetts Cannabis Control Commission said in an email Friday that it is reviewing the information and will use it for the commission’s ongoing investigation into whether marijuana products manufactured by licensees in Massachusetts contain substances of concern.
  
  Breakthrough in CDC vaping illness investigation: Vitamin E acetate linked to THC may be to blame
  
  “Public health and safety remain paramount to the Commission,” the statement said. “The agency continues to test samples from licensed Medical Marijuana Treatment Centers and Marijuana Establishments to understand whether legal products contain vitamin E acetate or other contaminants of concern while its quarantine on marijuana vaping products, except medical-use flower vaporizers, remains in place.”
  
  There have been 2,291 cases of lung injury in the United States linked to vaping as of December 4, according to theUS Centers for Disease Control and Prevention. Vaping-related lung injuries have been reported in all 50 states, the District of Columbia, Puerto Rico and the US Virgin Islands.
  
  In tracking these cases, the CDC has decided to include only cases that resulted in hospitalization. As a result, CDC removed 175 non-hospitalized cases from its previously reported national case counts. The last report, released on November 21,had recorded 2,290 casesof lung injury linked to vaping.
  
  The CDC on Thursday also reported 48 confirmed deaths in 25 states and the District of Columbia.
  
