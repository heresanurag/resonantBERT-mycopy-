title: "Heavy fog and icy roads lead to 69-vehicle pileup on a highway in Virginia"
date: "2019-12-22"
section: "US"
url: "https://www.cnn.com/2019/12/22/us/virginia-crash-roads/index.html"
content: |
  Nearly 70 cars and trucks were involved in a massive pileup on Interstate 64 in eastern Virginia on Sunday morning during heavy fog and icy road conditions, Virginia State Police said.
  
  The crash, about 50 miles east of Richmond, closed both sides of the interstate, authorities said.
  
  Photos from theYork-Poquoson Sheriff’s Officeand theVirginia State Policeshowed the extent of the backup and damage. The state police said 69 vehicles were involved.
  
  In some spots, vehicles were so squeezed together that firefighters and emergency responders had to step from car to car to pull people out.
  
  A witness, Bray Hollowell, also posted a short video showing a number of cars in the crash.
  
  I-64 accident this morningpic.twitter.com/xD1DjLMY1k
  
  Virginia State Police said heavy fog and ice were present at Queens Creek Bridge at 7:51 a.m. when the crashes began. Virginia State Police Sgt. Michelle Anaya said authorities do not know what caused the initial crash, but the fog and ice were factors.
  
  Fifty-one people were treated at the scene or taken to the hospital, including two who are in critical condition, said Steve Kopczynski, fire chief of York County.
