title: "These are some of the deadliest military base shootings in the last three decades"
date: "2019-12-06"
section: "US"
url: "https://www.cnn.com/2019/12/06/us/deadliest-military-base-shootings-trnd/index.html"
content: |
  Just two days after a US sailor shot two civilians and injured anotherat a Pearl Harbor Naval shipyardin Hawaii, another gunman opened fire inside Naval Air Station Pensacola on Friday, killing at least three people, and himself, and injuring several others.
  
  Since 1993, US military installments have had more than 20 shootings. Here are some of the deadliest.
  
  Detailsare still unfolding,but the Navy has confirmed the suspected shooter is dead. At least three people were killed and several others injured.
  
  Active-duty US sailor Gabriel Romerokilled two civilian workers and injured anotherbefore killing himself, officials said. Investigators have yet to identify a motive, but they say he chose his victims randomly.
  
  Army soldier Ivan Lopezkilled three people and injured 16 othersbefore fatally shooting himself in the head. A US official later said Lopez had previously reported being taunted and picked on by soldiers in his unit.
  
  Twelve Navy Yardworkers were killed and eight others injuredwhen military contractor Aaron Alexis went on a shooting rampage. Alexis was killed after an encounter with security officials.
  
  In what is consideredthe biggest mass shootingat a US military base in history, Major Nidal Malik Hasan, an Army psychiatrist, opened fire inside the base’s processing center, killing 13 people and an unborn child and wounding 32 others. A wounded civilian officer managed to shoot Hasan, who was taken into police custody. Hasan was later sentenced to death and iscurrently on military death rowat Fort Leavenworth in Kansas.
  
  Correction:This story has been updated to correct the number of people killed by the shooter at the Naval Air Station in Pensacola.
