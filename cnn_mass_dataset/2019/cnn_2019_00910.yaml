title: "Michelle Obama’s memoir has sold nearly 10 million copies"
date: "2019-03-26"
section: "Politics"
url: "https://www.cnn.com/2019/03/26/politics/michelle-obama-memoir-10-million-copies/index.html"
content: |
  Former first lady Michelle Obama’s best-selling memoir, “Becoming,” has sold nearly 10 million copies, the parent company of publisher Penguin Random Houseannounced Tuesday.
  
  The candid memoir, released in November, quickly became a best-seller and is one of themost popular books of the decade.
  
  “We believe this could be the most successful memoir in history,” said Thomas Rabe, the chief executive of Bertelsmann, a parent company of Penguin Random House, according to theWall Street Journal.
  
  Obama has sold out arenas on her massive international book tour, where she has been interviewed onstage by Oprah Winfrey, Sarah Jessica Parker, Reese Witherspoon and former Obama senior adviser Valerie Jarrett, among others.
  
  In its first week, “Becoming” sold more than 1.4 million copies, Penguin Random House said in November.
  
  The book had the longest streak at No. 1 for any book since “Fifty Shades of Grey” came out in 2012, according to Amazon.
