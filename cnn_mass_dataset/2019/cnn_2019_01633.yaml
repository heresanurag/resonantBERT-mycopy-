  _September 11, 2019_
  
  _The focus of our show this September 11, 2019: the terrorist attacks that changed America 18 years ago. We’re presenting a timeline of the events of September 11, 2001, and we’re speaking to a former CNN anchor to get a sense of what it was like to cover such tragic and momentous news._
  
