  Want to make a political donation to your preferred presidential candidate? Starting next month,you can just ask Alexa.
  
  Here’s what else you need to know toGet Up to Speed and Out the Door. (You can also get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  OK, this story is really complicated, so let’s just start at the beginning. A whistleblower inside the intelligence community filed a complaint about communications between President Trump and a foreign leader. The whistleblower was alarmed by a “promise” Trump allegedly made to the foreign leader. The Democratically led House Intelligence Committee wants to see the complaint, but Joseph Maguire, the acting Director of National Intelligence, has blocked that. (He’s set to testify before the committee next week.) The White House and Justice Department told the Office of the Director of National Intelligencenot to share the complaintbecause they don’t believe it’s governed by laws covering intelligence whistleblowers, three sources told CNN.
  
  Then, yesterday theWashington PostandNew York Timesreported that the communications at the center of all this involved Ukraine. Trump spoke to Ukrainian President Volodymyr Zelensky by phone in July. Some Trump supporters havepushed for the Ukrainian government to open investigationsthat the President could use to raise suspicions about his political rivals, including Joe Biden. Some observers wonder if there’s a connection between the push for an investigation and Trump’s call with Zelensky. But there’s no public evidence that the whistleblower’s complaint pertains to the Trump-Zelensky call. The potential ramifications of this story are starting to become more clear, CNN political analyst Stephen Collinson says, and therisks facing the President, the intelligence community and Democratsin Congress are climbing by the day.Here are 5 key questionsabout the whistleblower case.
  
  Another day, another apology from Canadian Prime Minister Justin Trudeau. After athird incident emergedof himwearing brownface or blackface, he was forced to meet with reporters for the second day in a row to say he’s sorry for wearing racist makeup. He also flat out said he doesn’t remember how many times he’s worn blackface. Trudeau, known for his uber-progressive views, insists he’s still an ally in the fight for social justice. But this scandaland other recent political hiccupscould mix to seriously threaten his chances at re-election next month.
  
  It’s been three days since votes were cast in Israel’s elections, and westill don’t know who will be leading the country. Benny Gantz, leader of the Blue and White party, declared victory because his party is projected to win a few more seats in Israel’s legislature than Likud, the political party headed by Prime Minister Benjamin Netanyahu. But Gantz won’t have enough seats to govern. He’d probably have to form a coalition with Netanyahu to do that, and that’s probably not going to happen. So, that brings up another possibility: Israel may have to have a third election to settle the political gridlock.
  
  The remnants of Tropical Storm Imelda arepushing into northern Texas, Arkansas and Louisianatoday, dumping heavy rain along the way. The storm left quite the mess in southeast Texas, where some areas got more than 30 inches of rain. Flooding was so bad in Houston thathundreds of cars were abandonedafter rising water made some roads impassable. Meanwhile, out in the Atlantic,Hurricane Jerry has developed. It’s a Category 1 storm right now and is expected to pass just north of the Leeward Islands today before moving north of Puerto Rico and the Bahamas over the weekend.
  
  If your co-worker or classmate isn’t around today, it may not be because they’re getting an early jump on the weekend. They could be on strike. Global climate strikes are taking place today all over the world, with people walking out of workplaces and classroomsto demand action to address the climate crisis. It’s expected to be the biggest day of climate demonstrations in history. More than100,000 people gathered in Melbourne, Australia. Someworkers from Amazonand Microsoft are walking off the job. Somecompanies are actually supportingtheir employees’ participation in the strike. New York City gave 1.1 million students the OK to skip school for it.Click here to keep upwith the latest.
  
