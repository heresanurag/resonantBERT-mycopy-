title: "FIFA unveils the emblem for the 2022 World Cup in Qatar"
date: "2019-09-03"
section: "Sport"
url: "https://www.cnn.com/2019/09/03/sport/qatar-world-cup-emblem-trnd/index.html"
content: |
  Soccer fans can officially get excited about the 2022 World Cup.FIFA just unveiledthe emblem for the games in Qatar, and the attention to detail has been turned up.
  
  FIFA says the World Cup emblem is meant to embody the vision of “an event that connects and engages the entire world,” while also reflecting the culture in which the sporting event is taking place.
  
  The new swooping emblem is white with distinct maroon markings that are both floral and geometric. The figure is supposed to resemble the number eight for the number of stadiums that will host the soccer matches, and the infinity symbol, for the “interconnected nature of the event.”
  
  Culturally, the symbol resembles a woollen shawl that is typically worn by the citizens of Arab and Gulf countries in winter, which is when the 2022 World Cup will take place, according to FIFA.
  
  Migrant workers subjected to heat and humidity being put at risk, says Human Rights Watch
  
  The World Cup is normally held during the summer months. But world governing body FIFA decided to move the 2022 tournament to the Qatari winter, following fears over the intense summer temperatures in the Gulf state.
  
  Qatar’s winning bidwas based on the premise it would be held in June and July, but FIFA was forced to backtrack over concerns for the safety of players and spectators.
  
  Soccer fans can get hyped for the world’s biggest sporting event by watchingthe complete launch videofull of previous Cup highlights.
  
  Soccer fans in the US are just hoping the men’s team makes it to the tournament. The US men’s national team failed to qualify for the 2018 World Cup in Russia.
