id: cnn_2019_00768
title: "Hong Kong officials deny protesters a permit for Sunday march"
date: "2019-08-16"
section: "Asia"
url: "https://www.cnn.com/2019/08/16/asia/hong-kong-deny-march-intl-hnk/index.html"
content: |
  Hong Kongofficials have denied permits for a march organizedthis Sundayby the same group that coordinated massive marches earlier this summer.
  
  Bonnie Lueng, spokesperson for the Civil Human Rights Front (CHRF), said the group’s appeal to march from Victoria Park to Chater Garden was denied Friday. This was the first large march to be organized following theprotests at Hong Kong’s airportearlier this week.
  
  Approval still stands for a rally in Victoria Park on Sunday.
  
  CHRF, an over arching organization of pro-democracy groups in Hong Kong, estimated nearly 2 million people joined their march on June 16.
  
  Hong Kong’s protest movement started in early June in opposition to an extradition bill, which critics feared could be used to target dissidents for prosecution in mainland China. The bill has since been shelved, but the uproar stoked a wider civil unrest that shows no sign of ending.
