content: |
  Here’s what you might have missed Tuesday on CNN:
  
  – Secretary of State Mike Pompeoaccused House Democrats of bullyingState Department officials by calling for their depositions in the Ukraine inquiry – something he says is “not feasible.”
  
  – These are the Republicans who are against President Trump and for impeachment. CNN/SSRS polling suggests Trump should be worried aboutmoderates in his own party.
  
  – The former Dallas cop who killed her neighbor in his own homeis found guilty of murder.
  
  – Police confirmed thatan officer shot and injured an 18-year-old manin Hong Kong. It’s the first time potentially lethal force has been used in nearly four months of unrest.
  
  – A federal appeals court has largelyupheld the FCC’s controversial repeal of its net neutrality rules.
  
  – A catering cart causes chaos at Chicago O’Hare International Airport. Butan American Airlines employee saved the day.
  
  – America’s factories just sufferedtheir worst month in a decade.
  
  – Adrone finds a fugitive living in a caveafter 17 years on the run.
