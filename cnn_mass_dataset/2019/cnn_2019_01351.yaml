  _October 22, 2019_
  
  _Officials and residents in Dallas, Texas are assessing the damage from a recent tornado. Medical researchers are working with an Australian airline to assess the physiological effects of the world’s longest commercial flight. And inventors are assessing the effectiveness of new technology in helping people with disabilities._
  
