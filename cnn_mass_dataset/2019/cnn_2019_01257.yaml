title: "Prince George celebrates gleefully during family trip to a Premier League match"
date: "2019-10-07"
section: "Football"
url: "https://www.cnn.com/2019/10/07/football/prince-george-prince-william-aston-villa-epl-spt-intl/index.html"
content: |
  It’s no secret that Prince William is an avid soccer fan but it seems he’s passed on the passion to his young family, especially to Prince George.
  
  The pair, along with the Duchess of Cambridge and Princess Charlotte, was spotted celebrating in the stands as their favorite team Aston Villa thrashed Norwich 5-1 in the English Premier League Saturday.
  
  Prince William and Prince George on the Aston Villa team bus for the next game? ⚽️#AVFCpic.twitter.com/IO41xEDktL
  
  The result – Villa’s biggest win of the season – left the six-year-old Prince with much to celebrate and he did so gleefully whilst dressed in the team’s claret and blue colors – on one occasion needing his father to quell his excitement.
  
  “I’ll be getting them tickets for every game now if they need them,” joked Aston Villa boss Dean Smith after the match at Carrow Road in an interview with the BBC.
  
  “I hope they can get here every game if that is what it needs, I might even get them on the team bus.”
  
  READ:Hugo Lloris in agony after freak injury as Spurs slide to fresh defeatREAD:Prince William – Football’s mental health approach a ‘dereliction of duty’
  
  Prince William, a devoted Aston Villa fan, is President of the English Football Association (FA) and works closely with the governing body on a number of issues related to the sport.
  
  Recently he fronted amental healthcampaign along with players both past and present, which encouraged men to speak openly about their feelings.
  
  In May he was spotted joyously celebrating his side’s Championship playoff win atWembleywhich ensured Villa’s promotion to the Premier League.
