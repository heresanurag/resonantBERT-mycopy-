  Northam initially apologized for the photo, saying he was in it, without specifying which person he was. He later denied he was in the yearbook photo but admitted he had once dressed in blackface during a dance contest in San Antonio.
  
  Northammet Wednesday with Southern Christian Leadership ConferencePresident Dr. Charles Steele Jr. and Dr. Bernard LaFayette, chairman of the SCLC board, two well-known black leaders from a group once led by Dr. Martin Luther King Jr. The meeting was an effort to better understand how he can move past the scandal that has engulfed his office, an adviser to the Democrat tells CNN.
