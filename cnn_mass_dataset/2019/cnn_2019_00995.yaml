title: "Gucci apologizes after social media users say sweater resembles blackface"
date: "2019-02-07"
section: "US"
url: "https://www.cnn.com/2019/02/07/us/gucci-blackface-sweater/index.html"
content: |
  Gucci has apologized and discontinued selling a sweater that social media users said resemblesblackfacebecause of its design.
  
  In a Twitter post Wednesday, the Italian luxury brand said it “deeply apologizes for the offense caused by the wool balaclava jumper.”
  
  The top, which is no longer on the company’s website, is a black turtleneck sweater that pulls up over the bottom half of the face with a cut out and oversized red lips around the mouth.
  
  Gucci deeply apologizes for the offense caused by the wool balaclava jumper.We consider diversity to be a fundamental value to be fully upheld, respected, and at the forefront of every decision we make.Full statement below.pic.twitter.com/P2iXL9uOhs
  
  “We can confirm that the item has been immediately removed from our online store and all physical stores,” Gucci said in a statement on Wednesday. “We are fully committed to increasing diversity throughout our organization and turning this incident into a powerful learning moment for the Gucci team and beyond.”
  
  The sweater had been slammed on social media, with Twitter users saying it resembled blackface and expressing emotions ranging from exasperation to outrage.
  
  “Today Gucci released their Balaclava Knit Top. Sigh. Really Gucci? Really?” Keisha Ka’oir tweeted.
  
  Today Gucci released their Balaclava Knit Top. Sigh. Really@Gucci? Really?pic.twitter.com/ETWKFhHVEB
  
  Michael Bonner tweeted his frustration at the constant depiction of racist imagery in the news recently.
  
  “One day I am going to deliver a prolific dissertation on how it feels to live in a continuous cycle of disrespect as a black man,” he said.  “Gigantic brands like @gucci create offensive “fashion”, quickly apologize, and then state, ‘We did not know.” I don’t care. This is unacceptable.”
  
  One user noted that the controversy was taking place duringBlack History Monthand expressed skepticism that it would stop people from buying the brand.
  
  This is not the first time a fashion brand has been accused of using such imagery. Last year,luxury fashion house Pradasaid it   withdrew products after some items displayed in a Manhattan storefront were seen as depicting blackface imagery. The products, part of Prada’s Pradamalia line, were pulled after images surfaced of some merchandisedepicting monkey-like figures with black facesand large red lips.
  
  The latest controversy also comes as Virginia Gov.Ralph Northamis facing criticism and calls to resign because of a photograph on his page in his medical school’s yearbook showing one person in blackface and another in a Ku Klux Klan robe and hood.
  
