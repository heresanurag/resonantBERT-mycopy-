id: cnn_2019_01934
title: "At least 4 dead in stampede after President’s election rally in Nigeria"
date: "2019-02-13"
section: "Africa"
url: "https://www.cnn.com/2019/02/13/africa/nigeria-rally-stampede-intl/index.html"
content: |
  At least four people were killed Tuesday in a stampede that unfolded as Nigeria’s President left a political rally just days ahead of his country’s elections, police and hospital officials told CNN.
  
  The chaos erupted as thousands of supporters tried to follow President Muhammadu Buhari’s convoy out of a stadium in the southeastern city of Port Harcourt in Rivers State, a journalist covering the rally told CNN.
  
  “I saw four bodies on the ground, and there was so much confusion as people were rushing and pushing each other to leave the stadium,” Chikwe Azoma said.
  
  Hospital officials put the death toll considerably higher – at 15 victims – a spokesman for the University of Port Harcourt Teaching Hospital told CNN on Wednesday.
  
  “We received 14 bodies from the stadium, and one of those injured later died. Twelve people are receiving treatment at the emergency ward,” Kem Daniel-Elebiga said.
  
  Rivers State police insisted four people were killed and four taken to the hospital, spokesman Nnamdi Omoni told CNN.
  
  Casualties and violence have marred a heated campaign season leading up to the presidential polls on Saturday and general elections later this month.
  
  Three people were stabbedand several injured after rival supporters clashed at a rally of Buhari’s All Progressives Congress party in January in Lagos. At least two people were killed at rally for that party last week in the northeastern state of Taraba.
  
  2 electoral offices burn down a few days before Nigeria's presidential election, officials say
  
  Buhari, who is on a nationwide campaign to drum up support for his re-election, offered his condolences after last week’s incident and called on his supporters to comply with crowd managers at rallies.
  
  “I always feel very sad and distressed when ordinary Nigerians, who love me and our party because of what we stand for and have done, make personal sacrifices by taking the pains to show their support (and) end their lives tragically,” the Presidentsaid.
  
  Buhari, 76, is vying for Nigeria’s top office against 71 challengers. His main contender is 72-year-old Atiku Abubakar, Nigeria’s former vice president. Both candidates signed a second peace accord on Wednesday in the capital of Abuja, pledging their commitment to an election free of violence.
