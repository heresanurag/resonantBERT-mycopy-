title: "Khalid felt helpless after the El Paso shooting. So he raised $500,000 with a benefit concert"
date: "2019-09-03"
section: "US"
url: "https://www.cnn.com/2019/09/03/us/khalid-el-paso-concert-500000-trnd/index.html"
content: |
  Few people love El Paso as much asKhalid loves El Paso.
  
  He moved to El Paso during his senior year in high school. He’s dedicated several songs to the “Suncity.” And he evenreceived the key to it in 2018.
  
  Now, to support his adopted hometown during an immense tragedy, he’s raised half a million dollars.
  
  The 21-year-old artist and one-time El Paso resident said he raised $500,000 at“A Night for Sun City,”a benefit concert for thevictims of last month’s mass shootingin the Texas city.
  
  Every penny of the proceeds, raised through ticket and t-shirt sales, will be donated to theEl Paso Community Foundation’s Shooting Victims’ Fund, he said.
  
  The concert, staged less than one month after the shooting that killed 22 people, celebrated the resilience of El Paso with starpower to spare. Famous Texans Matthew McConaughey andBeto O’Rourkewarmed up with crowd, and artists like SZA, Rae Sremmurd and Lil Yachty performed alongside headliner Khalid.
  
  last night in El Pasopic.twitter.com/MEBIgHRv2P
  
  Khalidannounced the concerttwo days after the shooting, saying his “mind and heart have been heavy” performing songs about the city. Tickets sold out within minutes, theEl Paso Timessaid.
  
  “I have been rocked to the core by the horrific act of gun violence that came to El Paso, and by the continued acts of senseless violence that our country faces daily,” he said in a statement last month. “I want to give back to my community of El Paso, the city of the 915, who has given so much to me. Please come out and let’s heal together through music while raising money to help those who need it.”
