title: "Can tech save the kakapo, New Zealand’s ‘gorgeous, hilarious’ parrot?"
date: "2019-12-26"
section: "World"
url: "https://www.cnn.com/2019/12/26/world/kakapo-conservation-scn-c2e-intl-hnk/index.html"
content: |
  A monumental effort is underway to save one of New Zealand’s best loved birds from extinction.
  
  Large, plump and nocturnal, the kakapo is the only parrot in the world that lives on the ground and cannot fly. There are only 211 in existence, confined to four small islands off the New Zealand coast.
  
  What the kakapo lacks in numbers, it makes up for in personality, says radio producer and presenter Alison Ballance. Her podcast,Kākāpō Files, which documents the fight to save the bird, has attracted listeners from around the world. “Gorgeous, hilarious and amazing,” the kakapo has a “serious, but slightly goofy” character, she says. “They’ve got this ancient wisdom thing going on as well. You get the feeling this is a species that has been around for a very long time and is slightly marooned in the modern world.”
  
  Andrew Digby, kakapo science adviser to the New Zealand government, is on a mission to save the beleaguered bird.
  
  Find out more about Call to Earth and the extraordinary people working for a more sustainable future
  
  2019 has been the most successful breeding season on record. “Between January and April, 86 chicks were born, of which 70 are still alive,” says Digby.
  
  But it has also been a year of tragedy.  Nine birds have died of a respiratory infection called aspergillosis, which is caused by an airborne fungus.
  
