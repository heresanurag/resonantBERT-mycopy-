  Males receive as much food as they want, but females are kept at a sweet spot of around 3.3lbs (1.5 kg). Too skinny and they are unlikely to produce eggs; too chubby and they will have mostly male chicks – an evolutionary adaptation that benefited the species when the birds were plentiful but is not the best strategy to increase numbers quickly.
  
  As the kakapo population grows, additional safe havens are needed. Two new sanctuaries off the southern tip of New Zealand – Coal Island and Five Fingers Peninsula on Resolution Island – are being prepared for kakapo reintroduction.
  
  “Our long-term goal is to get kakapo back on the mainland,” says Digby. However, that can only happen if predators no longer roam there.
  
  In 2016, John Key, New Zealand’s then prime minister, announced Predator Free 2050 – an ambitious project to eradicate predators across the country. If it is successful, kakapo and other native birds,80 percent of which are currently in decline, could thrive again.
  
  Predator Free 2050 is a grassroots concept. Iwi (Māori tribes), landowners, NGOs, schools, businesses and individuals are participating by placing traps designed to catch the chief culprits – possums, stoats and rats. Dan Tompkins, lead science strategist for Predator Free 2050, says that parallel initiatives will consider how to address the problem of cats – a sensitive issue for some people – at a later date.
  
