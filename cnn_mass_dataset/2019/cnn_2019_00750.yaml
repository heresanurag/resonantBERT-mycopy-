title: "Democrats’ hurdles for debates make no sense"
date: "2019-09-24"
section: "Opinion"
url: "https://www.cnn.com/2019/09/24/opinions/democratic-debates-2020-field-narrowing-isgur/index.html"
content: |
  Editor’s Note:Sarah Isguris a CNN political analyst. She has worked on three Republican presidential campaigns and is an adjunct professor at George Washington University’s School of Media and Public Affairs. She is a graduate of Harvard Law School. The views expressed here are hers. Read moreopinionon CNN.
  
  The Democratic National Committee just announced the debate criteria for November. As expected, it has modestly raised the bar again, asking for candidates to meet aslightly higher polling and donor thresholdthan the last debates. But like my elderly cat when we got a slightly taller box spring, some candidates just can’t make the leap.
  
  And yet, we are hearing a lot of meowing of protest from the field. Candidates have said they are being forcedto adjusttheir campaign strategies away from winning votes to meet these benchmarks; party insiders are saying the benchmarksare excludinghighly credentialed voices in favor of celebrity candidates; and down-ballot Democrats arecomplainingthe donor threshold is taking much-needed money away from their races.
  
  But first, let’s be clear thatDemocratic primary voterswant tonarrow the field.Generally speaking, a larger and more fractured field tends to benefit some front-runners (Joe Biden) whiledisadvantaging others(Elizabeth Warren). And, of course, no candidate left off the stage is going to praise a system that torpedoed his campaign, but even those candidates know they can’t get their message across with 24 people on the stage. This is all to say, there is no solution to make everyone happy.
  
  The Republican National Committee experienced much the same problem in 2016 and some of us would argue blew it in far more epic fashion. (Full disclosure: I worked for Carly Fiorina during 2016 and was watching the March debate from my hotel room as a handful of dudestossed around not-so-veiled referencesto the size of theirpenises.) My point being that we should at least give the DNC credit for trying to trim the fat with a scalpel instead of the RNC’s machete that arbitrarily set and reset qualifications each month based solely on poll numbers.
  
  Even so, I am not the first to point out that there’s somethingwrong here. Polling and fundraising don’t measure whether someone will be a good president – or even a good candidate. And incentivizing your candidates to spend money to meet those thresholds doesn’t move the ball down the field for the party or the eventual nominee.
  
  And of course, there’s the absurdity of putting that much stock in national name recognition whereby the only way for your candidate to get exposure to tens of millions of viewers during the debate is to have high national poll numbers, which more often than not are simply areflection of name recognitionamong voters who have already been exposed to that candidate. Captain Yossarian would be proud.
  
  DNC raises polling and  donor thresholds for November debate
  
  It’s almost as if you’d be better off if you’d starred on a hit reality TV show for years instead of served as a governor or run a Fortune 50 company.
  
  Defenders of the system, though, would say it’s working. We started with 20 debaters, and by November, we may bedown to eight.
  
  But here’s the problem. If we had whittled the field too quickly in 1991, there would have been no President Clinton. By July of 1991, he had apolling averageof only 1.7% – in a tie for 13th place with Jay Rockefeller. As Nate Silverhas pointed out, in two of the past nine cycles, the eventual Democratic nominee was not even in the top 10 by July – and both Jimmy Carter and Bill Clinton went on to win the presidency the next year.
  
  So here’s an alternative I’m proposing to the DNC:
  
  These rules would have ensured Clinton made the stage in 1991. Ironically, it also would have excluded Bidenin 2007(along with Dennis Kucinich, Wesley Clark and Chris Dodd, among others).
  
  And what of 2020? Of course, it’s impossible to say for sure because the candidates would have run their campaigns differently if the DNC rules had been, well, different. Like those who talk about the popular vote versus the Electoral College, you can’t rerun the game with different rules and assume the same inputs.
  
  But as of July, the field would have been narrowed to Biden, Sanders, Kamala Harris, Warren, Pete Buttigieg and Beto O’Rourke. And given how close Cory Booker and Andrew Yang would have been to the cutoff, it seems fair to assume they would have tweaked their strategies to get to an adjusted 5% as well.
  
  Funny enough, it’s the same eight who will probably be on the stage come November. But it sure sounds a lot fairer, doesn’t it?
