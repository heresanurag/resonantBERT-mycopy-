title: "More men with low-risk prostate cancer are forgoing treatment, study finds"
date: "2019-02-11"
section: "Health"
url: "https://www.cnn.com/2019/02/11/health/prostate-cancer-treatment-study/index.html"
content: |
  More men with low-risk prostate cancer are forgoing treatment to instead watch and wait to see whether their cancer progresses – and experts say that’s a good thing.
  
  Among men with low-risk prostate cancer in the United States, 42.1% used the watch-and-wait approach, also called “active surveillance,” in 2015, up from 14.5% in 2010, according to a studypublished in the medical journal JAMAon Monday.
  
  Compared with high-risk or intermediate-risk,low-risk prostate cancertends to grow very slowly or not at all, which is why “active surveillance” can be considered as an alternative totreatment optionssuch as surgery or radiation therapy. Surgery and radiotherapy can come with someside effects, including a higher risk of erection problems or accidental urine or stool leakage.
  
  In 2010, the USNational Comprehensive Cancer Networkupdated its prostate cancer guidelines to recommend active surveillance for patients with low-risk cancers or a short life expectancy.
  
  Opinion: Epidemic of overtreatment of prostate cancer must stop
  
  As the use of active surveillance climbed between 2010 and 2015, it became the most common approach for managing low-risk prostate cancer, according to the study.
  
  “We found that in low-risk prostate cancer, active surveillance use nearly tripled,” said Dr. Brandon Mahal, aclinical fellow in radiation oncologyat Harvard University’s Dana-Farber Cancer Institute in Boston and first author of the study.
  
  “Overall, these numbers are a good sign and a good thing,” he said. “From 2010 to 2015, there’s been a lot of new evidence – the highest level of evidence we can get in medicine, which are prospective trials and some of them randomized trials – that have shown that active surveillance, conservative approaches or non-treatment approaches of low-risk prostate cancer have very favorable outcomes.”
  
  Worldwide, prostate cancer is thesecond most common canceramong men. There were 1.3 million new prostate cancer cases in 2018, theWorld Cancer Research Fundsays.
  
  In the United States, about 11.2% of men will be diagnosed with prostate cancer at some point during their lifetime, according to theNational Cancer Institute.
  
  Prostate cancer now kills more in UK than breast cancer
  
  The new study included data on 164,760 men diagnosed with prostate cancer in the United States between 2010 and 2015. The data, which came from theSurveillance, Epidemiology, and End Resultsdatabase, included information on each man’s treatment approach.
  
  The researchers found that, among men with low-risk disease, the use of active surveillance increased while the use ofradical prostatectomy– or removing parts of the prostate gland – decreased from 47.4% in 2010 to 31.3% in 2015. The use of radiotherapy also declined, falling from 38% in 2010 to 26.6% in 2015, the researchers found.
  
  Among men with intermediate-risk disease, between 2010 and 2015, active surveillance increased from 5.8% to 9.6%; prostatectomy decreased from 51.8% to 50.6%; and radiotherapy went from 42.4% to 39.8%, the researchers found.
  
  Among men with high-risk disease, active surveillance remained nearly unchanged, going from 1.9% to 2.2%; prostatectomy increased from 38% to 42.8%; and radiotherapy decreased from 60.1% to 55%, the researchers found.
  
  Prostate cancer screening recommendations get rolled back by US task force
  
  The study had some limitations, including that it analyzed trends only within a five-year period. More research is needed to determine trends over a longer time period and how those trends may impact public health. The study also lacked data on whether patients actually complied with their doctors’ orders on active surveillance or other management approaches.
  
  Yet overall, “this study is really the benchmark for what the rates of surveillance are in the United States,” Mahal said.
  
  “There have been other studies that have examined the same question and have found increasing rates, but those studies were either done with smaller databases or databases that didn’t collect this type of information,” he said. “Also, it’s important to continue to follow these trends to know for sure what the management rates are in the US, and also to know in the population, how patients do on active surveillance.”
  
  A studypublished in JAMA last yearfound that the use of a conservative approach for managing cancer – including active surveillance – went up from 27% in 2005 to 72% in 2015 among men with low-risk prostate cancer in the Veterans Affairs integrated health care system who were younger than 65 and from 35% in 2005 to 79% in 2015 among those 65 and older.
  
  “It’s very encouraging that the proportion of men who are receiving conservative management for low-risk prostate cancer has increased so much over time. … However, it appears there’s still a long way to go,” said Dr. Stacy Loeb, urologist and assistant professor of urology and population health atNYU Langone Healthin New York.
  
  US cancer death rate hits 25 years of decline, study says
  
  “For anyone in the low-risk prostate cancer category, what we now know is that the prognosis is quite good even without any treatment,” said Loeb, who was not involved in the new research but was first author of last year’s study.
  
  When it comes to radiation or prostatectomy, “these treatment options do have potential side effects, such as impact on erectile function, urination and, in some cases, bowel function,” she said. “So it is an attractive option for men to monitor the cancer and then receive delayed treatment on an as-needed basis if there’s any appearance over time that the cancer is becoming more aggressive.”
  
  The new study reflects how the medical community continues to grow in its understanding of how best to treat certain types of cancer, said Dr. J. Leonard Lichtenfeld, interim chief medical officer at theAmerican Cancer Society, who was not involved in the research.
  
