title: "Sound the alarm on deadly US-Russia nuclear threat"
date: "2019-12-12"
section: "Opinion"
url: "https://www.cnn.com/2019/12/12/opinions/new-start-treaty-dougherty/index.html"
content: |
  Editor’s Note:Jill Dougherty is an American journalist, a former CNN foreign affairs correspondent and Moscow bureau chief with expertise in Russia and the former Soviet Union. She is a Centennial Fellow at the Walsh School of Foreign Service at Georgetown University, a Global Fellow at the Woodrow Wilson Center, and a member of the Dartmouth Conference. The views expressed in this commentary are the author’s. View moreopinionat CNN.
  
  As I looked around the large square conference table, I watched the faces settle into worried frowns. Russians and Americans, several of whom once had responsibility for their nations’ nuclear weapons, all members of the Dartmouth Conference, the oldest continual bi-lateral dialogue between Americans and Russians, founded almost 60 years ago during one of the darkest periods of the Cold War.
  
  For a long minute, no one spoke. Then, one of them broke the silence: “Someone needs to sound the alarm.”
  
  Now, profoundly concerned that the United States and Russia are on the verge of a new arms race, they arespeaking out,issuing an urgent appeal to keep arms control alive:
  
  “… for the first time in our history we are compelled by the urgency of the situation to issue this public appeal to our governments, founded on our view that the clear threat of an uncontrolled nuclear arms race has re-emerged with the collapse in recent years of key elements of the post-Cold War arms control architecture.”
  
  Members of the Dartmouth Conference meet twice a year to discuss ways of improving – and, at this point, salvaging – the US/Russia relationship. Several are former top-level military and diplomatic officials. Some are religious leaders or physicians. All are concerned citizens.
  
  They’ve watched as the arms control agreements, which helped prevent nuclear war between our countries, were dismantled – the Anti-Ballistic Missile Treaty signed by former President Richard Nixon and Soviet General Secretary Leonid Brezhnev, and the Intermediate Nuclear Forces agreement signed by former Presidents Ronald Reagan and Mikhail Gorbachev.
  
  Now, the New START agreement – the last remaining arms control agreement between the US and Russia – hangs in the balance. It went into force in 2011 and will expire in February 2021. If it dies, there will be nothing to stop either country from developing or deploying nuclear weapons, including the most lethal and technologically advanced weapons.
  
  Trump should continue to follow his instincts on arms treaty
  
  And this is happening at a moment that relations between Moscow and Washington are virtually at rock bottom despite the friendly relationship between Presidents Donald Trump and Vladimir Putin. There is almost no discussion right now between our countries on strategic security. Most of that ended in 2014 when the conflict in Ukraine began.
  
  “We see each other virtually as enemies,” one American participant in the Dartmouth discussion said. “Are we at the bottom,” asked a Russian member, “or could it get worse?”
  
  It could get worse, both I and other Dartmouth Conference members believe. Neither country wants to start a nuclear war, which would imperil the entire planet, but it could start by mistake, by misunderstanding, by escalation of tensions, as it almost did during the Cold War.
  
  Some who want the New START agreement to die accuse Russia of violating arms control agreements and say the US can’t trust Moscow. Russia says the same about the United States. Others claim the New START agreement is out of date or, as the Trump administration proposes, that we should scrap it and start over with a new agreement that would include China.
  
  In their appeal, Dartmouth members say the dialogue on strategic stability should be broadened to include other nuclear powers. But that doesn’t mean that, in the interim, New START can’t be extended for another five years, as the treaty provides. Extending it beyond 2021 would provide some breathing space to work on future global security agreements. We can do both.
  
  New START not only led to steep reductions of nuclear arsenals on both sides but it strengthened confidence and trust between our countries and our militaries by providing for inspections and data exchanges that verify compliance. Transparency is key; Not knowing what weapons the other side might have can ignite suspicion. At this very moment both countries are developing new, highly advanced conventional arms and delivery systems. A cyberattack could knock out early warning systems. Both countries keep most of their nuclear weapons on hair-trigger alert, ready to be fired within minutes. Our presidents have only a few minutes to decide whether to respond. A missile launched in Russia can hit an American city in less than30 minutes – and vice versa.A single warhead can kill millions of people.
  
  The evening after drafting our appeal, we and our Russian colleagues visited the National Museum of the US Air Force in Dayton, Ohio. In a mammoth hall, the Missile Gallery, 140 feet high, built like a silo, we stood, craning our necks, dwarfed by Titan 1 and Jupiter missiles – each one, when armed, 3,000 times more powerful than the atomic bomb dropped on Hiroshima.
  
  All of the thousands of missiles the United States produced over decades were designed to annihilate Moscow and other Russian cities, where our colleagues and their families live. And in Russia, thousands of similar missiles were forged to destroy American cities. It was a sobering visit as we all realized that still could happen.
  
  We thought of the words that, together, we had just written: “The immediate imperative is extension of the New START Treaty … We see this as a paramount moral obligation of both our governments before our own peoples, and the world at large. We respectfully urge our governments to begin discussions immediately to this end.”
