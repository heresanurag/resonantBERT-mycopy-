title: "Trump likely to attend NATO summit in London in December"
date: "2019-02-06"
section: "Politics"
url: "https://www.cnn.com/2019/02/06/politics/trump-nato-summit-london-gbr-intl/index.html"
content: |
  Leaders of theNATOallies will gather in London for the alliance’s 70th anniversary summit in December, Secretary General Jens Stoltenberg announced Wednesday.
  
  As head of the United States government, Donald Trump will be invited, Downing Street told CNN immediately after the announcement. The UK Prime Minister’s office said it had no confirmation about whether he would attend.
  
  NATO headquarters in Brussels said it was “highly likely” Trump would attend the heads of state and government meeting. A spokesperson there said no date or venue had been set. The White House has yet to confirm if the President will attend.
  
  The US President washighly critical of the blocat its annual summit in Brussels in July and has repeatedly called on NATO allies to spend more on defense.
  
  Trump's UK visit cost police nearly $24 million
  
  Trump’s four-day visit to Britain in the same month, during whichlarge protests were held in Londonand elsewhere,cost UK police nearly $24 million, according to a police estimate given in October.
  
  On that trip, the US President largely avoided direct encounters with protesters, meeting Prime Minister Theresa May at her country retreat outside the UK capital, and Queen Elizabeth II at Windsor Castle before heading to hisTurnberry golf resortin Scotland.
  
  “The United Kingdom was one of the Alliance’s twelve founding members and continues to play a key role in the Alliance, making essential contributions to our shared security,” NATO said in a statement confirming that London – the home of the alliance’s first headquarters – would host the December summit.
  
  “The meeting in London will be an opportunity for Allied Heads of State and Government to address the security challenges we face now and in the future, and to ensure that NATO continues to adapt in order to keep its population of almost one billion people safe.”
  
  New York Times: Trump raised withdrawing the US from NATO several times in 2018
  
  Trump vaunted his calls for increased spending by NATO alliesin his annual State of the Union addressTuesday night.
  
  “We are also getting other nations to pay their fair share,” he said. “Finally. For years, the United States was being treated very unfairly by friends of ours – members of NATO. But now we have secured, over the last couple of years, more than $100 billion of increase in defense spending from our NATO allies. They said it couldn’t be done.”
  
  While NATO allieshave stepped up their defense spendingunder Trump’s watch, the US push for NATO countries to spend more on national security began under Presidents George W. Bush and Barack Obama.
  
  Spending has risen in recent years, but many countries in the decades-old alliance are still failing to meet the expectation that they spend at least 2% of their GDP on defense. All members made a commitment in 2014 to try to reach that threshold by 2024.
