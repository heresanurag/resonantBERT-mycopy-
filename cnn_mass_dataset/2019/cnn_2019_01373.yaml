title: "White House escalates impeachment clash by ordering top diplomat not to testify"
date: "2019-10-08"
section: "Politics"
url: "https://www.cnn.com/2019/10/08/politics/donald-trump-impeachment-democrats/index.html"
content: |
  The White House on Tuesdayblocked a senior State Department official from testifyingon Capitol Hill, launching a provocative new effort to thwart Democrats in their impeachment inquiry into President Donald Trump.
  
  US Ambassador to the European Union Gordon Sondland – a major figure in the interactions between the Trump administration and the Ukrainian government – was ordered not to show up to talk to House committees shortly before he was due to appear.
  
  The order seriously impedes the Democrats in their bid to obtain testimony from key players in a scandal triggered by Trump’s pressure on Ukraine to open an investigation into a domestic political opponent – Joe Biden – a possible abuse of power.
  
  “The failure to produce this witness, the failure to produce these documents, we consider yet additional strong evidence of obstruction of the constitutional functions of Congress,” Democratic House Intelligence Committee Chairman Adam Schiff told reporters.
  
  Democrats have already warned that withholding witness testimony and evidence could factor into any articles of impeachment against the President. They want to avoid long legal challenges that could slow the momentum of their investigation and drain political support for impeachment.
  
  The decision to bar Sondland’s testimony followed White House discussions that went on late into the night on Monday. A source familiar with the discussions inside Trump’s impeachment team told CNN’s Jim Acosta that it was “part of an overall strategy connected to what is viewed as irregularities in the House impeachment inquiry.”
  
  “The days of playing nice are done,” the source said.
  
  Trump has complained that House Speaker Nancy Pelosi has not held a formal floor vote in the chamber to initiate impeachment proceedings. Pelosi says there is no constitutional requirement for such a vote but has not ruled one out. Republicans feel such a scenario would be unwelcome for moderate Democrats who won seats in districts Trump carried in 2016.
  
  Sondland’s attorney said his client had no choice but to comply with the order that was formally made by his employer, the State Department.
  
  Schiff suggested that there could be future efforts by the administration to bar testimony from witnesses. Another key figure in the drama, former US Ambassador to Ukraine Marie Yovanovitch, who is still a State Department employee and was recalled by Trump, was due to appear this week.
  
  “This is one of the few impeachment inquires in the history of our country. It goes to the core of whether the President abused his office to seek political help in his reelection campaign and did so to the detriment of our nation’s security,” Schiff said. The chairman said there were text messages and emails on a personal device belonging to Sondland that the State Department is withholding from the House investigation.
  
  Trump offered a clue to his strategy going forward in the impeachment fight.
  
  “I would love to send Ambassador Sondland, a really good man and great American, to testify, but unfortunately he would be testifying before a totally compromised kangaroo court, where Republican’s rights have been taken away, and true facts are not allowed out for the public … to see,” Trump tweeted.
  
  The White House’s decision to block Sondland’s testimony significantly escalates the impeachment confrontation.
  
  But already, Trump’s threats and extreme mistrust between the parties on Capitol Hill are forcing the consideration of the most extrememeasures to keep safe a whistleblowerwho has followed the law to expose the President’s alleged abuse of power. Democrats are making fresh efforts to maintain the early momentum of their impeachment gambit byflinging new subpoenasat Trump’s administration and have associates of his lawyer, Rudy Giuliani, in their sights.
  
  The President’s GOP allies have beenforced intorhetorical pretzelsas they try to cope with his wild swings and false claims on Ukraine while saving their own political skins.
  
  One Republican, Sen Rob Portman of Ohio, tried to walk a tightrope on Monday.He said Trump had been wrongto ask Ukraine and China to probe front running Democrat Joe Biden.
  
  “It’s not appropriate for a president to engage a foreign government in an investigation of a political opponent,” Portmantold the Columbus Dispatch, while adding the caveat that impeachment was not merited. But most Republicans refused to go as far as Portman. Only a few responded to CNN whenmore than 80were contacted to ask if they were concerned about Trump’s behavior.
  
  Trump began the week bristling with defiance and insisting that he was “not at all worried” that a second whistleblower whoCNN reported on Sundayhas direct knowledge of the events described by the first, was already talking to lawyers.
  
  “The people understand it’s a scam,” he said and accused Democrats of trying to win the 2020 election by impeaching him.
  
  Trump’s disruptive mood stretched beyond US borders on Monday into a military conflict that is every bit as intractable as his showdown with Democrats.
  
  Hesuddenly gave a green light to Turkeyto invade northeast Syria, a move that could put America’s Kurdish allies in mortal peril. The rush of Republican senators — even including Trump’s ally Sen. Lindsey Graham of South Carolina — who flocked to criticize the move recreated the hawkish GOP national security coalition that the President crushed with his “America First” ideology and wariness of foreign entanglements.
  
