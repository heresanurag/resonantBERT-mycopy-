  6. Companies and economics:Dick’s Sporting Goods(DKS)is set to release earnings before the open.
  
  Shares in Meituan Dianping, China’s “app for everything,” closed 11% lower after the company revealed massive losses for the last three months of 2018. Meituan reported operating losses more than doubled to 3.7 billion yuan ($551 million) last quarter, compared to the same period a year earlier.
  
  The US Bureau of Labor Statistics will release its CPI report for February at 8:30 a.m. ET.
  
  7. Coming this week:Tuesday— Dick’s Sporting Goods(DKS)earnings; Wells Fargo CEO testifies before House Financial Services committee; T-Mobile(TMUS)and Sprint(S)CEOs testify before CongressWednesday —US durable goods reportThursday —Dollar General(DG)earnings; New US home sales report; Tesla holds Model Y eventFriday —US industrial production and US consumer confidence report
