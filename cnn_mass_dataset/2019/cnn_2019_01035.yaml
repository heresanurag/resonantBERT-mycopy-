id: cnn_2019_01035
title: "Meteorites strike western Cuba"
date: "2019-02-01"
section: "Americas"
url: "https://www.cnn.com/2019/02/01/americas/meteorite-cuba/index.html"
content: |
  A meteor broke apart over western Cuba on Friday, hurtling numerous pieces of various sizes to the ground in several towns in Pinar del Rio province, the state-run Granma newspaper reported.
  
  One meteorite landed with a “loud explosion” in the town of Viñales, Granma said.
  
  Researchers from several Cuban agencies, including the Institute of Geophysics and Astronomy, confirmed the meteorite strikes, Granma reported.
  
  There were no reports of any injuries.
  
  The US National Weather Service began tweeting about the event Friday afternoon, eventually saying that radar may have detected the meteor at 1:21 p.m. ET at an altitude of about 26,000 feet.
  
  @NWSKeyWestradar may have detected the meteor that affected western Cuba earlier today. At 121 pm, a signature was detected near Viñales, Cuba, at a height of over 26,000 ft above ground level.#flwx#KeyWest#FloridaKeys#meteorpic.twitter.com/R2JIlVwpsS
  
  The service said on Twitter earlier Friday it received reports about a meteor being seen in the sky across the Florida Keys.
  
  In 2013, ameteor blast shook Russia’s Urals region. Buildings lost windows and walls tumbled as the sonic wave from the explosion reverberated through the region.
  
  More than 1,000 people were injured, including more than 200 children, according to news reports. Many of them were hit by flying glass.
