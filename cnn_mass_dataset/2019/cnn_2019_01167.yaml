content: |
  The trade war between China and the US is still raging on, buthow is it affecting other economies and businesses on the global stage? Here’s what else you need to know toGet Up to Speed and Out the Door. (You can also get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  The ramifications of Jeffrey Epstein’s death over the weekend are still playing out in Washington. Attorney General William Barr announced theJustice Department is opening an investigationinto Epstein’s suicide. Meanwhile, President Trumpfueled the conspiracy theory machine by promoting a baseless claimthat the Clinton family was somehow linked to Epstein’s death. The multimillionaire financier and accused sex trafficker killed himself while in Federal Custody awaiting trial, andquestions lingerover why Epsteinwasn’t under suicide watchat the time of his death. Another question:What will happen to the legal cases against him? Experts say plaintiffs can still sue Epstein’s estate, and prosecutors could pursue related criminal cases involving Epstein’s associates or employees.
  
  The 2020 Democrats made their mark on Iowa this weekend, in what was supposed to be a proving ground for the presidential hopefuls. The prospective candidates flipped pork chops at the Iowa State Fair and delivered major speeches, policy proposals – and gaffes. Despite making a warm impression with voters in the early-voting primary state, Joe Biden also made several errors,referring to “white kids” when he meant “wealthy kids,”confusing former British Prime Minister Theresa May with Margaret Thatcher anderroneously stating he was Vice Presidentat the time of last year’s Parkland shooting. Gun violence was a major topic for the contenders. In an emotional moment, Democratic candidateAndrew Yang broke down during a town hall on gun violencein Des Moines while talking with a woman who said she lost her daughter to a stray bullet. Sen. Kamala Harrisbeat back attacks from the NRAover her proposed line of gun reform laws.
  
  The weeks-long protests flooding Hong Kong have spilled over into Hong Kong’s international airport,grounding flights and paralyzing one of Asia’s largest air travel hubs. All flights departing from the airport have been canceled, and stranded travelers are saying there are no staff members to give information or assistance. Some incoming flights are also being grounded or diverted. More than 5,000 protesters are camping out in the airport today, and while there are a few individual claims of police brutality floating about, the scene on the ground is reportedly chaotic but not violent.
  
  The Norwegian capital of Oslo was on edge this weekend aftera man opened fire in a nearby mosqueon Saturday. No one was killed in the attack and police reportedworshipers were able to overpower the assailant, but the incident still raises serious concerns about the spread of radical right-wing rhetoric. On Sunday, police revealed the suspect, a Norwegian man in his 20s, expressed right-wing sympathies online and praised figures like Vidkun Quisling, the leader of Norway under Nazi occupation during World War II. The shooting is being investigated as a “possible act of terrorism.” The suspect has also been charged with the murder of a woman found dead in his home shortly after the attack, identified as the man’s 17-year-old stepsister.
  
  Two deadly storms have affected thousands of people in Asia, and the danger isn’t over yet. More than 150 are deadafter heavy monsoon rains in India caused devastating landslides and floods. More than 165,000 others have been forced to evacuate their homes. In China, at least 32 people have died and 16 more are missing afterTyphoon Lekima battered the coast. Most of the victims were killed when torrential downpours caused a landslide which blocked a river, sweeping victims into the water.
  
