  “However, no specific product has been identified in all cases, nor has any product been conclusively linked to illnesses,” the state health department said. “Even though cases appear similar, it is not clear if these cases have a common cause or if they are different diseases with similar symptoms.”
  
  The CDC said Wednesday it’s working with state health departments and the US Food and Drug Administration to figure out which products might have been used and facilitate laboratory testing. In anemail last week, the CDC urged doctors to collect information and samples from patients who might fit a similar description.
