  The first day of the House Judiciary Committee’s impeachment hearings was a long one, but if you paid attention, you probably learned a thing or two about American history. Four constitutional law professors – three called by Democrats and one by Republicans – took a step back from the intricate and specific details of the Intelligence Committee’s proceedings toprovide a greater historical and legal frameworkfor impeachment. The big questions: What, exactly, constitutes “high crimes and misdemeanors,” and did the President’s actions qualify as such? Meantime, Democrats areramping up their impeachment rhetoric, with somepushing harder for Trump’s impeachment and removal ASAP. Those Democratic lawmakers argue the President poses a threat to the fabric of America’s democracy and waiting for next year’s election is just inviting him to mess with the system all over again.Here’s what’s nextin the process.
  
  George Zimmerman, the man acquitted in the 2012 shooting death of Florida teen Trayvon Martin, is nowsuing the family of the slain 17-year-old, among others, for $100 million. According to the lawsuit, Zimmerman accuses Martin’s family, friends and their legal representatives of framing him and lying during the trial. Martin’s family has called the suit “unfounded and reckless.” Since his acquittal, Zimmerman hasn’t exactly kept a low profile. He has been arrested in several alleged domestic incidents, and in 2016 heput the gun used to kill Martin up for auction. Also of note, his lawyer in this new suit once filed a “birther” lawsuit falsely claiming former President Barack Obama wasn’t born in the United States.
  
  Two industries are facing significant issues over claims of sexual assault. New data from the US Department of Transportation reveals cruise lines sailing from American ports filed 35 reports of alleged sexual assault in the third quarter –a 67% jump over the same period last year. An industry trade group says the numbers actually show such incidents are rare and argues the cruise industry has stricter reporting standards, resulting in greater transparency. Meanwhile, 20 more people are suing Lyft over alleged sexual assault, sexual misconduct or rape by drivers while using its service. The plaintiffsaccuse the ride-share company of not doing enough to protectriders and argue the company’s background checks for drivers and safety features for riders are inadequate. A similar lawsuit, with 14 accusers, was filed against Lyft in September.
  
  A US sailor shot andkilled two people and injured one morebefore killing himself yesterday on the grounds of Pearl Harbor Naval shipyard. Police haven’t released the shooter’s identity yet, nor do they have a motive. A Navy commander described the shooter as an active-duty US sailor assigned to the USS Columbia, a submarine in dry dock at the base for standard maintenance work. The shooting occurred just three days before National Pearl Harbor Remembrance Day, which commemorates those who lost their lives during the December 7, 1941, attack that launched the US into World War II.
  
  The entire government of Samoa is shut down today so the country canfocus on reining in a measles outbreakthat has killed at least 62 people in recent weeks. More than 4,200 cases have been reported, and the rapid spread of the disease has forced the government to close schools and ban children from public gatherings in an effort to contain it. The Pacific island nation officially declared a state of emergency over the outbreak on November 15 and has been hammering a massive vaccination campaign ever since. Almost all civil servants are expected to help public health officials over the next two days to get as many people vaccinated as possible.
  
