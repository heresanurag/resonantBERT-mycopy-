title: "4 tornado safety tips that could save your life"
date: "2019-03-04"
section: "US"
url: "https://www.cnn.com/2019/03/04/us/tornado-safety-tips-wxc/index.html"
content: |
  Editor’s Note:If you are in an area under a tornado warning, seek shelter immediately. Warnings can be issued with only a few minutes to prepare. Take them seriously— it could save your life.
  
  They can happen at any time and threaten every corner of the United States. It is time to prepare for one of the world’s most destructive types of weather: tornadoes.
  
  On average, the United States sees more than1,200 tornadoes per year, far more than any country in the world.
  
  While tornadoes can be deadly, there are steps you can take to protect yourself and your loved ones before, during and after disaster strikes.
  
  First things first: Understand the difference between atornado watch and tornado warning, and be able to identify your city and county on a map.
  
  There are a few places that will keep you the most sheltered in a tornado.
  
  Things can get a little more complicated if you don’t have access to a permanent structure.
  
  Be sure your plan is updated and works at all times. If you plan to seek shelter in a public building, make sure it is available 24 hours a day, seven days a week. Your plans need to work at any time of the day or night.
