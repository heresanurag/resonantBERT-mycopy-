title: "Must-watch videos of the week"
date: "2019-08-02"
section: "App News Section"
url: "https://www.cnn.com/2019/08/02/app-news-section/videos-of-the-week-mobile-august-2/index.html"
content: |
  Something shocking is in the water. Trump’s hair makes Twitter buzz. And does the tooth fairy write checks? These are the must-see videos for the week:
  
  Here’s a fish tale for ya. Wildlife officials in Kentucky used “electrofishing equipment” to jolt invasive fish species out of the water. We’re still waiting for the day when pigs fly.
  
  A woman in Oklahoma was tased and arrested after she fled the scene and kicked the officer. The 65-year-old was pulled over for a broken taillight, refused to accept an $80 ticket and instead yelled at the officer, drove away from the scene and later struggled with him, according to police bodycam footage and court documents.
  
  A freight train derailed in the Czech Republic. Limestone powder spewed out of the train cars near a construction site. Several workers were present at the time of the accident, but no one was injured.
  
  A flying insect decided to bug President Donald Trump during a speech in Virginia. A bug in the air that went for Trump’s hair! Maybe it was a bee looking for its honeycomb?
  
  A young boy took a bite out of the record books when doctors discovered he had 526 extra teeth inside his mouth. Saveetha Dental College and Hospital says the boy’s case is the first documented worldwide. Chew on that for a minute.
