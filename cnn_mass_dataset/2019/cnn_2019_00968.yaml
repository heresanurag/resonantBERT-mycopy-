title: "Dollar General is opening 1,000 new stores next year"
date: "2019-12-05"
section: "Business"
url: "https://www.cnn.com/2019/12/05/business/dollar-general-stores-stock-earnings/index.html"
content: |
  Dollar General remains one of thefastest-growing retailers in America, attracting customers with rock-bottom prices on snacks and household goods. It’s so confident in that strategy that it plans to open 1,000 new stores in 2020, just as it has for the past several years.
  
  The company tightened its grip on shoppers during the most recent quarter, increasing sales at stores open for at least a year by 4.6% compared with the same period a year ago. It marked Dollar General’s(DG)fastest quarter of sales growth in five years.
  
  Its profit increased, too, up 11% during the quarter and the company raised its outlook, driving its shares up 5% in early trading. Dollar General stock has rallied more than 50% over the last two years.
  
  By opening 1,000 new stores next year, Dollar General’s growth is nearly unrivaled in the industry at a time in which many brick-and-mortar retailers areclosing stores or folding. Walmart(WMT), which swept into new towns for decades with massive superstores, has essentially stopped opening new ones. By contrast, Dollar General is entering new cities and towns with small stores and opening up in areas where it has already gained hold.
  
  Dollar General has a new beauty brand for under $5 and it's going viral
  
  Dollar General currently has more than 16,000 stores in the United States and caters mainly to low-and-middle-income customers in rural and suburban areas, while its rival, Dollar Tree(DLTR), targets suburban, middle-income shoppers. Family Dollar focuses on lower-income urban and rural customers. Dollar Tree(DLTR)bought Family Dollar in 2015, but hasstruggled to absorb the chain into the company.
  
  Despite the strengthened US economy in recent years, dollar stores’ popularity has endured. Wages for a vast number of Americans have grown only modestly.Americans living paycheck-to-paycheck have been aboon to Dollar General, and wages for a vast number of them have grown only modestly. The chains have also reached higher-income shoppers seeking discounts.
  
  Dollar General’s core customers make around $40,000 a year.
  
  “We see her about where we have the last couple of quarters,” Dollar General chief executive Todd Vasos said on a call with analysts Thursday. “She still has a little bit of extra money in her pocket, continues to be employed at a pretty high rate. But, always remember, our core customer is always a little stretched.”
  
  Dollar Tree CEO Gary Philbin added last week that low-income consumers are often “one doctor bill or one car repair bill away from not being in such good shape.”
  
  On Wednesday, the Trump administration unveiled a final rule that willrequire more food stamp recipients to workto receive benefits. The new requirement limits states’ abilities to waive existing work mandates and could result in 688,000 people losing assistance, according to the US Department of Agriculture.
  
  Dollar General has said a little under 5% of its sales come from the Supplemental Nutrition Assistance Program, or SNAP, as the food-stamp program is formally known.
  
  “We don’t see this as a material impact next year,” CEO Vasos said on a call Thursday. “We’ve continued to see a long-term trend of reduced benefits over time gradually. But over that time, our share has grown as well.”
  
  In recent years, a wave of cities and towns have passed lawscurbing the expansionof Dollar General, Family Dollar and Dollar Tree.
  
  Dollar General built an empire on no-frills stores. Now it's going high tech
  
  Birmingham; Oklahoma City; Tulsa; Mesquite, Texas, and others have passed legislation limiting new dollar store openings, while Cleveland and Fort-Worth, Texas, are weighing similar laws.
  
  Advocates of tighter controls on dollar stores claim the big chains intentionally cluster multiple stores in low-income areas, a strategy that strategy discourages supermarkets from opening and threatens existing mom-and-pop grocers, critics say. Opponents also express concerns that most dollar stores don’t offer fresh produce.
  
  “We are disappointed that a small number of policymakers have chosen to limit our ability to serve their communities,” a spokesperson for Dollar General previously told CNN Business. “We believe the addition of each new Dollar General store represents positive economic growth for the communities we serve.”
