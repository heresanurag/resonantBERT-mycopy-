id: cnn_2019_01943
title: "California law puts a suicide hotline number on school ID cards"
date: "2019-08-14"
section: "US"
url: "https://www.cnn.com/2019/08/14/us/california-suicide-hotline-student-id-trnd/index.html"
content: |
  California high school and middle school students will have some lifesaving information at their fingertips as they go back to school this year.
  
  Alaw that went into effect in Julyrequires schools to print the number for theNational Suicide Prevention Lifelineon student ID cards for seventh- through 12th-graders in public, private and charter schools.
  
  Netflix has cut graphic suicide scene from first season of '13 Reasons Why'
  
  That number is 1-800-273-TALK (8255).
  
  The law also says that student IDs may have information on the Crisis Text Line – which can be reached by texting HOME to 741741 – as well as local suicide prevention resources.
  
  “I think any opportunity for somebody to have a number to be able to call out to, reach out to and be available, I think it’s fantastic,”Ray Morgan told CNN affiliate KGO. His daughter is a freshman at a San Francisco Bay Area high school.
  
  The US suicide rate is up 33% since 1999, research says
  
  The move comes as suicide rates continue to rise in the United States.
  
  The suicide rate in2017 was 33% higher than it was in 1999, according to annual research published in June by the US Centers for Disease Control and Prevention’sNational Center for Health Statistics.
  
  Call the National Suicide Prevention Lifeline at1-800-273-TALK(8255). There is also acrisis text line. For crisis support in Spanish, call1-888-628-9454.
  
  A study published in themedical journal JAMAfound a significant increase in the suicide rates among 15- to 24-year-olds between 2000 and 2017.
  
  Dave Muth, whoadvocated for the law, told CNN affiliate KESQthat he hopes it encourages people to talk openly about suicide and mental health. His daughter Madeline died by suicide in 2015.
  
  “This is a way of remembering her, honoring her and helping to break down the stigma and change policy so that other families don’t have to experience what we did,” Muth said last year when then-Gov. Jerry Brown signed the measure.
  
  To get help, call theNational Suicide Prevention Lifelineat 1-800-273-TALK (8255). There is also acrisis text line. For crisis support in Spanish, call1-888-628-9454.
