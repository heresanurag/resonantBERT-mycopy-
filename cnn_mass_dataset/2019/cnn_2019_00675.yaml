title: "Sean Spicer’s Spice Girls spectacle on ‘DWTS’ is not okay"
date: "2019-09-17"
section: "Opinion"
url: "https://www.cnn.com/2019/09/17/opinions/sean-spicer-dancing-with-the-stars-spectacle-hossain"
content: |
  Editor’s Note:Anushay Hossain is a political analyst and journalist based in Washington. Follow her onTwitterandInstagram. The views expressed are her own. View moreopinionarticles on CNN.
  
  Even though the lines between politics and entertainment have been blurred from the beginning in the Trump administration, Sean Spicer twirling the frills on the sleeves of his neon, lime-green shirt on “Dancing With The Stars” (“DWTS”) have brought us to a collective new low.
  
  It is not funny, it is not entertainment, and most importantly, it is not okay.
  
  The reason most of us know Sean Spicer’s name is because he was one of the first real, tangible signs the public got of just how dysfunctional President Donald Trump’s White House was going to be. (Melissa McCarthy’s portrayal of him on ‘SNL’ surely also gets an honorable mention in that regard as well.)
  
  “I was Donald Trump’s first White House press secretary,”Spicer saysin his “DWTS” video introduction. “There’s no question my time in the White House was tumultuous.”
  
  After this huge understatement, Spicer’s video cuts to a nausea-inducing montage of highlights from his time behind the White House podium before moving onto a clip of Spicer fawning over the tweet Trump sent congratulating him on his new gig.
  
  “It’s nice to have the leader of the free world on your side when it comes to getting votes,” Spicer proudly says of his former boss’endorsement on Twitter.
  
  Sean Spicer’s entire claim to fame (or infamy) comes from lying for a president who uses his office to lie, toside with dictators, to defend men whoabuse women and work for him, toseparate families, to stand up forwhite nationalismand much, much worse.
  
  Spicer lied for a liar for a living.
  
  Sean Spicer is just the latest politico hoping to dance his way into your heart
  
  During his time at the White House, Spicer was perhaps best known for lying and obfuscating repeatedly about the crowd size at Trump’s inauguration. He alsodefendedTrump’s completely unfounded claim about there being a million fraudulent votes in the 2016 election, he lied about the nature of the meeting at Trump Towerin June 2016, and he spent weeks covering for Trump’s ludicrous assertion about President Barack ObamawiretappingTrump Tower.
  
  And do we all not remember when Spicer defended Nazis (!!) by stating, in reference to Assad and the Syrian War that, “You had someone as despicable as Hitler, who didn’t even sink to using chemical weapons.” To Spicer’s credit, he did apologize for that insanelyoffensive statement.
  
  Yet, today Sean Spicer gets the chance to try to rehab, rebrand and relaunch a whole new image of himself. Why? Why, after everything Spicer did, does he get to play the bongos and salsa on national TV to the Spice Girls’ “Spice Up Your Life?”
  
  “This wasn’t part of the plan,” Spicertold The New Yorkerabout his “DWTS” gig. “Frankly, I’m just making money, trying to enjoy life.”
  
  But it’s more than just making money and enjoying life.
  
  The Mooch isn't the only Trump buddy to turn on him
  
  Spicer is getting paid six figures, $125,000 to be exact, to appear on “DWTS,” and it’s not only a TV network and a show that are giving him a platform to redeem himself. Spicer is also a Harvard Kennedy Fellow, he has a book deal, and just this past spring, I saw Spicey with my own eyes at an exclusive TV talent agency party, the night before the White House Correspondent’s dinner, schmoozing and mingling with some of the very same journalists and TV talking heads he regularly gaslit during his tenure.
  
  Why do (white) guys like Sean Spicer seem to win even when they fail? Why do men who work and lie for the Trump administration always get to fail up?
  
  Stephen A. Crockett Jr. from The Rootsays it wellwhen he explains that “the fall for lying white men from the Trump administration is never really a fall” but just a series of poorly conducted interviews in which the former White House employee laughs about the lies he told (see Spicer), or sells himself as a Trump insider who understands the inner workings of President Trump’s mind (see Anthony Scaramucci).
  
  Crockett Jr. writes – and I couldn’t agree more – that America has “a way of forgiving mediocre white men who’ve made a career of being barely decent.” Instead of being publicly shamed for being a pariah who consistently lied to the American people from the White House podium, Spicer gets an opportunity to advertise his availability for a new job on national TV.
  
  Even though Spicer initially rejected the idea of being on “DWTS” when he first left the White House in 2017, and despite even the show’s host, Tom Bergeron,expressinghis unhappiness with Spicer’s casting, we all now get to live without being able to unsee the former White House press secretary dancing to the Spice Girls.
  
  “Thank you @GovMikeHuckabee,” Sean Spicertweetedin response to the former Governor’s tweet praising his support of the dancing career of the man whose job Huckabee’s daughter eventually took over. “Clearly the judges aren’t going to be with me.  Let’s send a message to #Hollywood that those of us who stand for #Christ won’t be discounted. May God bless you.”
  
  Whether invoking Jesus to get gets votes on “DWTS” ends up working for Spicer or not, the public’s vote on giving this man a chance to redeem himself is already in. But there’s no saving a man like Sean Spicer, and there shouldn’t be.
