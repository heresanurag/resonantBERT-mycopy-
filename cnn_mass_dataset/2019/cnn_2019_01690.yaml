title: "House to vote on resolution disapproving of Steve King’s comments on white nationalism"
date: "2019-01-14"
section: "Politics"
url: "https://www.cnn.com/2019/01/14/politics/house-steve-king-vote-disapproval-jim-clyburn/index.html"
content: |
  Rep. Jim Clyburn, the number three Democrat in the House, introduced Monday a resolution disapproving of Iowa Rep. Steve King’srecent racist comments,calling it a “condemnation of white supremacy and white nationalism.”
  
  Clyburn’s motion does not censure King, as some Democrats – including Tim Ryan of Ohio and Bobby Rush of Illinois – have called for. The House could vote as soon as Tuesday on the resolution, Democratic sources tell CNN.
  
