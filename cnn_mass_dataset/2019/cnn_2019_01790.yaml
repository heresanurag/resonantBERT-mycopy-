  In 2014, the federal government tried to do something about mislabeling, creating theUS Government Task Force on Combating Illegal, Unreported and Unregulated Fishing and Seafood Fraud. The task force’s recommendations in 2018 created theSeafood Important Monitoring Program, known in the industry as SIMP.
  
  SIMP requires traceability and catch reporting for 13 types of imported seafood considered most at risk for mislabeling, including red snapper, Atlantic cod, grouper, swordfish, tunas, king crab, mahi mahi, sharks and sea cucumber. Oceana wants the government to expand the requirements to all seafood.
  
  Some groups have taken on the issue without waiting for additional regulations.
  
  Mediterranean diet: How to start (and stay on) one of the world's healthiest diets
  
  Demian Willette, an assistant professor of biology at Loyola Marymount University, has worked on an investigation of the mislabeling problem in Los Angeles sushi restaurants.That 2017 investigationfound that 47% of the sushi it tested was mislabeled.
  
  He works with theLos Angeles Seafood Monitoring Projectteam, a group effort that purchases fish from area restaurants, runs DNA tests to see whether it is accurately described and then works with the restaurants and regulators.
  
  “This is not a gotcha operation,” Willette said. “We’re trying to work with those restaurants to improve this issue.”
  
  There are steps consumers can take to get a better chance of eating what you ordered.
  
  Gibbons, of the National Fisheries Institute, suggests asking the fishmonger or your server or chef whether the establishment is aBetter Seafood Boardmember. Members must adhere to industry principles that include correctly labeling products.
  
