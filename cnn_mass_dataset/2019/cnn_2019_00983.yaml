content: |
  Here’s what you might have missed Monday on CNN:
  
  – President Trumpcalled for unity among Republicansduring his first Cabinet meeting since July.
  
  – UK House of Commons Speaker John Bercow refuses to give permission for another vote on Prime Minister Boris Johnson’s Brexit deal.Here’s what happens now.
  
  – Joe Biden was a top target of Russians who arebuilding a network of accountsdesigned to look like groups in swing states, new Facebook data shows.
  
  – Sen. Mitt Romney says he’ssecretly behindthe “Pierre Delecto” Twitter account.
  
  – Four pharmaceutical companies accused in opioid epidemic lawsuits reacheda settlement totaling $260 millionto avert the first high-profile federal trial.
  
  – American Airlines says two crew members and a customer were taken to a hospital after spilled cleaning chemicalsforced their plane to land.
  
  – Lori Harvey, the stepdaughter of comedian Steve Harvey, wasarrested after a hit-and-run accidentover the weekend.
  
  – It’s time to break out the tissues. See the moment a Vietnam veteran in hospice care was granted his only wish: tosay goodbye to his dog, Patch.
  
  – Kim and Kanye’s love is still on lockdown. The tworenewed their vowsin honor of their five-year anniversary.
