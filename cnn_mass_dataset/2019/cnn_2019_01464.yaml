title: "Quickly catch up on the day’s news"
date: "2019-10-14"
section: "App News Section"
url: "https://www.cnn.com/2019/10/14/app-news-section/quickly-catch-up-october-14/index.html"
content: |
  Here’s what you might have missed Monday on CNN:
  
  – Former Trump adviser Fiona Hillis expected to speak to three House panelsbehind closed doors as part of the impeachment probe.
  
  – Kurdish forces backed by the US strike a deal with Syria’s Assad,marking a major shift in the 8-year war.
  
  – K-pop star Sulli, formerly of the band f(x),has been found dead at her home.
  
  – A touristwas arrested and fined for wearing a particularly revealing bikinion the beach at the Philippines’ newly reopened resort island of Boracay, local media reported.
  
  – Texans are outraged over the death of another black person killed at home by a white police officer. This time thevictim was a woman playing video games with her nephew.
  
  – A disturbing video of a fake President Trump shooting, assaulting and stabbing his critics and the media was played at a conference held by a pro-Trump group at his Miami resort last week,according to footage obtained by The New York Times.
  
  – A pedophile who abused up to 200 childrenwas found dead in prison.
  
  – Elton Johndefended Ellen DeGeneres’ friendship with George W. Bushafter some were critical of them laughing together.
