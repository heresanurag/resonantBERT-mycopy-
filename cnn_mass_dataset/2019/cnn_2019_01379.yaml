id: cnn_2019_01379
title: "Taiwan bridge collapses, sending truck plunging onto fishing boats"
date: "2019-10-01"
section: "Asia"
url: "https://www.cnn.com/2019/10/01/asia/taiwan-bridge-collapse-intl-hnk-scli/index.html"
content: |
  A 140-meter (459-foot) bridge has collapsed in northeast Taiwan, sending an oil tanker in the water and killing at least two people in fishing boats below.
  
  Videoposted onlineby Taiwan legislator Wang Ting-yu showed the bridge falling into the water at Nanfangao harbor in Yilan County on Tuesday morning local time.
  
  According to Taiwan’s state-runCentral News Agency, the truck fell onto a number of fishing boats and sparked a fire.
  
  At least 12 people were injured, the Yilan County Fire Bureau said, with rescue operations continuing in the evening. Two dead bodies had been found at 8 p.m. local time, CNA reported.
  
  “We hope everyone can be safely rescued in the shortest amount of time,” Taiwan President Tsai Ing-wen said, according to CNA.
  
  Wang said the cause of the collapse was being investigated.
