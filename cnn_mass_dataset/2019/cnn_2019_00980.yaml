  Ari Solomon, Mercy For Animals vice president of social impact, tweeted about how huge the idea could be for the vegan movement.
  
  “AMAZING!!! And don’t @ me,” Solomon tweeted. “Beyoncé and Jay-Z are the biggest stars IN THE WORLD. This sort of promo for veganism could literally help MILLIONS of animals. I’m here for it!”
