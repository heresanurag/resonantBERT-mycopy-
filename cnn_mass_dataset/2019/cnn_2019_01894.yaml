  4. Earnings and economics:Dollar General(DG)plans to release earnings before the open Thursday. Meanwhile, Adobe Systems(ADBE)and Oracle(ORCL)are set to release earnings after the close.
  
  Etihad, Abu Dhabi’s global airline, posted a loss of $1.28 billion for 2018, its third consecutive annual loss. Germany’s Lufthansa(DLAKY)posted a slight fall in annual profit and said it would reduce growth in peak summer capacity.
  
  The Census Bureau plans to release its January New Home Sales report at 10 a.m. ET.
  
