id: cnn_2019_01488
title: "2014 photo of Trump and indicted Giuliani associate took place at Ivanka Trump hosted fashion show"
date: "2019-10-18"
section: "Politics"
url: "https://www.cnn.com/2019/10/18/politics/parnas-trump-doral-kfile/index.html"
content: |
  A March 2014 photograph showingDonald Trumpwith arecently indicted associateof Rudy Giuliani appears to have been taken at a fashion show hosted by Ivanka Trump at the Trump National Doral in Florida, a CNN KFile review reveals.
  
  Parnas, along with his associate Igor Fruman, werearrestedlast week trying to leave the country and indicted on criminal charges for allegedly funneling foreign money into US elections. The two men are associates of Giuliani, an attorney for the President, and are connected to efforts to dig up dirt in Ukraine on Democratic presidential candidate Joe Biden.
  
  The photo of Parnas and Trump wasfirst reported by Politico on Saturday, but the outlet did not report on the circumstances surrounding it.An additional photoof the crowd from the event, found by CNN’s KFile, shows Parnas mingling in the crowd. CNN’s KFile identified the event by matching picturespostedonline byvariousphotographersandattendeeswith the date of the event.
  
  Parnas’ attendance at a Trump event in 2014 raises questions about whether he had any existing relationship with the President. Trumpsaid last weekhe didn’t know Parnas or Fruman.
  
  “I don’t know those gentlemen. Now it’s possible I have a picture with them because I have a picture with everybody, I have a picture with everybody here,” Trump said.
  
  The photo of Trump and Parnas smiling side-by-side was postedon Facebookon March 8, 2014, by user Shawn Jaros, who indicatedin subsequent poststhat he was a business associate of Parnas. Jaros declined to comment on the photo, as did John Dowd, a lawyer for Parnas.
  
  A reception took place following the event that wasopen to ticket holdersfor the tournament that day,with VIP options availablefor luxury ticket holders.
  
  AGetty Images photoof the crowd at the event shows Parnas standing in the crowd in the same bright blue shirt with a gray collar he wore in his photo with Trump.A small set of tablessimilar to thosewhere Trumpsatwith his childrennear the stage can be seen off to the side. In one picture, posted on Facebook, Trump andhis son Ericcan be seen chatting with a guest.
  
  Representatives for the Trump Organization did not respond to repeated requests for comment on the event. A White House spokesperson for Jared Kushner and Ivanka Trump declined to comment.
