id: cnn_2019_01757
title: "Even with a massive fire burning nearby, these golfers were SO not worried"
date: "2019-03-20"
section: "US"
url: "https://www.cnn.com/2019/03/20/us/deer-park-fire-golf-course-photo-trnd/index.html"
content: |
  What is it with people and golf?
  
  A photo taken at the Battleground Golf Course in Deer Park, Texas, shows golfers on the driving range calmly swinging away against a backdrop of black smoke froma petrochemical facility fire nearby.
  
  That fire at Intercontinental Terminals Company was extinguished early Wednesday – a day after the photo was taken. Some schools in the area closed and people were told to shelter in place when the flames first broke out.
  
  Perhaps the golfers’ nonchalance is because the region is dotted with chemical plants and refineriesand is no stranger to fires and explosions.
  
  Or it could be that golfers are a special, passionate breed.
  
  We saw it last year in Hawaii’s Big Islandwhen golfers coolly hit the linkseven as a monstrous ash plume from the Kilauea volcano loomed behind them.
  
  And we saw it during the Eagle Creek fire near Portland, Oregon. Even as the blazeencroached on the nearby Beacon Rock Golf Course, things didn’t exactly grind to a halt.
  
  Or maybe golfers just live by the motto attributed to the legendary Sam Snead: “Of all the hazards, fear is the worst.”
