id: cnn_2019_00501
title: "Pilot, 4 Americans killed in helicopter crash in Kenya"
date: "2019-03-04"
section: "Africa"
url: "https://www.cnn.com/2019/03/04/africa/kenya-chopper-crash-intl/index.html"
content: |
  A Kenyan pilot and four American tourists were killed in a helicopter crash in Kenya, aviation authorities and police said on Monday.
  
  The helicopter crashed in the Central Island National Park in Lake Turkana on the country’s northern border at 8:35 p.m. Sunday (2:35 a.m. ET), Kenya’s Civil Aviation Authoritysaid in a statementon its website.
  
  “A rescue team was dispatched immediately and they arrived at the Central Island at around 11:20 p.m. and located the wreckage at 3:20 a.m. with no survivors,” Kenya’s aviation chief Gilbert Kibe said.
  
  A statement from the US Embassy Monday identified three of the four Americans as Anders Asher Jesiah Burke, Brandon Howe Stapper and Kyle John Forti.
  
  “We offer our sincerest condolences to the family and friends of all those killed in the crash. We are providing all appropriate consular assistance to the families of the American citizens,” an embassy spokesperson said in a statement to CNN.
  
  Mario Magonga has been identified as the pilot who flew the chopper to the island. Kenya’sDaily Nation newspaperreported thatMagonga was also the pilot for Kenya’s Deputy President William Ruto.
  
  Authorities have ordered an investigation into the crash.
  
  The chopper was one of two that landed on the island, Kenyan police said in an earlier statement, adding that the other aircraft “managed” to land safely.
  
  Investigators have not yet established the cause of the crash, according to the National Police Service.
  
  A local news outlet reported Monday that the two choppers had taken tourists to the island, which borders Ethiopia and is known for its colony of Nile crocodiles.
  
  10 found dead in Kenyan plane wreckage two days after crash
  
  Air mishaps have become frequent in recent months in Kenya, a popular destination for international tourists visiting the east African nation for its vast wildlife and coastal attractions.
  
  Five people, including two Americans tourists, were killed in February after a small passenger plane crashed in Kenya’s Mukatano forest.
  
  In July,10 people aboard a small aircraftdied after it crashed in the Aberdare forest in the mountainous region of the country.
