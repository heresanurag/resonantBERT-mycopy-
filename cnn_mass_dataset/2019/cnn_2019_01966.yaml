id: cnn_2019_01966
title: "Former Kentucky Gov. Bevin pardoned a child rapist. One of his reasons: The 9-year-old victim’s hymen was intact"
date: "2019-12-20"
section: "US"
url: "https://www.cnn.com/2019/12/20/us/former-kentucky-governor-matt-bevin-child-rapist-pardon-trnd/index.html"
content: |
  In his final days in office,former Kentucky Gov. Matt Bevin issued hundreds of pardons and commutationsto people he said he would not hesitate to welcome as neighbors, co-workers or members of his church.
  
  The pardons largelydrew shock and outrage, not only because of the sheer number or apparent political motivations, but also because some involved violent criminals, including convicted murderers and rapists.
  
  Still, Bevin, a Republican, further enraged critics when he said during a radio interview Thursday with WHAS in Louisville that he pardoned a child rapist partly because the hymen of the 9-year-old victim was still intact.
  
  When WHAS host Terry Meiners asked Bevin about the pardon, the former governor focused on the lack of evidence from physical examinations of the victim and her sister.
  
  “Both their hymens were intact,” Bevin said. “This is perhaps more specific than people would want, but trust me, if you had been repeatedly sexually violated as a small child by an adult, there are going to be repercussions of that physically and medically.”
  
  How former Kentucky Gov. Bevin's pardons are affecting those convicted and the victims' families
  
  His claim was made despite expert studies showing most child victims do not show evidence of physical damage and that examination of the tissue is not a reliable test of sexual activity. In fact,a 2012 study by the peer-reviewed journal Forensic Science Internationalfound that 90% of child victims don’t suffer physical damage from sexual abuse.
  
  “His assertion that, while clearly somebody would have known if they simply looked – and the doctor can tell that a child is being sexually abused – we’ve known that is a false statement for decades,” Dr. James Crawford-Jakubiak, medical director of the Center for Child Protection at UCSF Benioff Children’s Hospital Oakland, said of Bevin.
  
  “Essentially what he’s saying to pedophiles and people who would sexually abuse children is, ‘If you don’t cause an injury, you won’t be prosecuted because the only person that can tell what happened is the child,” Crawford-Jakubiak said.
  
  The case involved a man named Micah Schoettle, who was convicted in 2018 in Kenton County of rape, sodomy and sexual abuse, and sentenced to 23 years in prison.
  
  “Micah Schoettle was tried and convicted of a heinous crime based only on testimony that was not supported by any physical evidence,” Bevin wrote in his executive order signed December 9. “In fact, any and all evidence that is available, refutes the allegations that were made.”
  
  He added that the case was investigated and prosecuted in a “manner that was sloppy at best.”
  
  Schoettle’s trial had included testimony from the victim,according to CNN affiliate WCPO. Schoettle had served fewer than 18 months.
  
  “You should not be sent to jail based simply the word, an uncorroborated word, of a single individual especially when it is possible to verify that medically and physically and there were no ability to do so,” Bevin said in the interview.
  
  The mother of Schoettle’s victim called his pardon a “slap in the face,” CNNaffiliate WCPO reported.
  
  “It feels like we’re going through it all over again … we just got to the point where we felt safe leaving the house and not looking over our shoulders,” the mother, who said she is considering moving her family, told the station.
  
  Crawford-Jakubiak said Bevin “betrayed the trust this girl had that the system was going to give her an opportunity to tell the truth and she would be listened to.”
  
  Prosecutor Rob Sanders of Kenton County told CNN that Schoettle was not in custody long enough to start sex offender treatment and argued his release puts other children at risk.
  
  Former Kentucky governor issued hundreds of pardons and commutations before leaving office this week
  
  Sanders, who prosecuted the case originally, said his office will investigate the pardons in his county including the Schoettle case. He added that he “would prefer a statewide investigation led by either federal law enforcement or a special prosecutor appointed by the Kentucky Attorney General.”
  
  Until that happens, Sanders said he will be conducting his own investigation of the pardons.
  
  Bevin’s final actions in office didn’t become public until the Louisville Courier Journal reported on the high volume of pardons. Bevin was narrowly defeated in November by Democrat Andy Beshear.
  
  Bevin defended the moves in aseries of 20 tweets last week, saying he personally reviewed each case he pardoned and calling questions about “the motives and involvement of anyone else in the administration is highly inappropriate and irresponsible.”
  
  “Not one person receiving a pardon would I not welcome as a co-worker, neighbor, or to sit beside me or any member of my family in a church pew or at a public event,” he tweeted. Bevin added, “No community is either more or less safe now, than it was before the pardons and commutations given over the past four years.”
  
  His last day in office was December 9.
  
  Despite the criticism of Bevin’s pardons in cases involving violent crimes or those deemed as political in nature, the former governor was praised in some circles.
  
  Kentucky Public Advocate Damon Preston, who was appointed by Bevin, said “many deserving people were helped by Governor Bevin’s pardons.”
  
  “Aside from the uproar over a handful of cases, scores of Kentuckians are now quietly benefiting from non-controversial pardons of long-ago convictions,” Preston wrote in an op-ed published in the Lexington Herald Leader.
  
  In one executive order signed December 9, Bevin commuted the sentences for 336 inmates who are “solely serving” sentences for drug possession. A number of the pardons that Bevin issued are for drug-related convictions.
