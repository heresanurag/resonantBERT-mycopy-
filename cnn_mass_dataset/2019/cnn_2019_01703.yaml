  “If we take his proposals as candidate, it doesn’t look good for environmental and indigenous rights or for campaigning organizations,” said Minami. “We’re also concerned about the shrinking democratic space in Brazil.”
  
  If environmentalists find it harder to operate, that could mean less oversight of development in the Amazon. And given the forest’s importance to fighting global warming, that could have an impact far beyond the country’s borders.
  
  A University of Leeds study estimated that since 1980, the Amazon has absorbed roughly 430 million tonnes of carbon per year – more than four times the UK’s annual carbon emissions.
  
  “He bears responsibility for not just the Brazilian economy but for the climate of the whole planet,” said Minami. “It’s a responsibility that Brazilians and global citizens must demand from him.”
  
  Flora Charner contributed to this story
