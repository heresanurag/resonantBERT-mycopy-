title: "‘They feel they can win’: George Gregan on Japan’s World Cup hopes"
date: "2019-10-01"
section: "Sport"
url: "https://www.cnn.com/2019/10/01/sport/japan-rugby-world-cup-george-gregan-spt-intl/index.html"
content: |
  If Japan was to lift theRugby World Cupon November 2 it would constitute one of the greatest shocks in sporting history.
  
  The home nation is in the second tier of rugby playing nations, but landed aremarkable 19-12 win over world No.1 IrelandSaturday to add to an historic victory over mighty South Africa four years ago.
  
  Combined with a30-10 win over Russiain its opening game this year, one former World Cup winner senses an uplift in confidence from Japanese rugby fans.
  
  “They feel they can win,” former Australian scrumhalf and captain George Gregan told CNN’s Alex Thomas in Tokyo.
  
  Gregan, who is the Wallabies’ most capped player with 139 appearance, was integral to Australia’s 1999 World Cup triumph.
  
  Back then, only a handful of nations realistically harbored hopes of winning the quadrennial tournament. Today, that list has grown. And according to Gregan, Japanese fans believe the Brave Blossoms should be on the list of potential champions.
  
  “The game is getting closer and closer,” added Gregan.
  
  View the latest Rugby World Cup news, feature stories, photos and videos on CNN.com.
  
  The reduction in the gap between tier one nations – those competing in the elite competitions of Europe’s Six Nations and the southern hemisphere’s Rugby Championship – and the tier two nations has made this year’s showpiece the most competitive yet.
  
  Only four teams have won the World Cupsince its inception in 1987 – New Zealand, Australia,South Africa, and England – with the All Blacks having won back-to-back titles in 2011 and 2015.
  
  “The first team to go back to back wasNew Zealand, no one else has done it,” Gregan said. “It shows how hard it is to do it. To get in a final and then win it. It’s not easy.”
  
