title: "Colin Kaepernick’s Nike ad wins Emmy for outstanding commercial"
date: "2019-09-15"
section: "Entertainment"
url: "https://www.cnn.com/2019/09/15/entertainment/nike-ad-emmy-win-trnd/index.html"
content: |
  Nike’s gamble to partner with athlete-turned-activistColin Kaepernickpaid off Sunday as the companywon an Emmyfor outstanding commercial at the2019 Creative Arts Emmy Awards.
  
  The commercial, titled “Dream Crazy,” features Kaepernick alongside other sports legends including Serena Williams and LeBron James, who have reached beyond their personal achievements to support and advance political and social causes.
  
  Why Nike is betting its slogan on Colin Kaepernick
  
  The ad was released in September 2018days before the start of the NFL season. Kaepernick was one of the faces ofNike’s 30th anniversary commemorationof its iconic “Just Do It” campaign.
  
  Despite some intense response to the ad – likepeople burning their Nike shoesand aMissouri college dropping the brand– the company’s stockhit an all-time high. Nike also gained tens of thousands of Instagram followers after announcing the campaign.
  
  Since the commercial aired on televisions around the world, Nike has released several other socially and politically charged ads featuring an array of athletes from different backgrounds. Most recently, Nike partnered with the Toronto Raptors in their release of ateam-branded hijabfor Muslim women athletes.
