title: "Big Pharma spends record millions on lobbying amid pressure to lower drug prices"
date: "2019-01-23"
section: "Health"
url: "https://www.cnn.com/2019/01/23/health/phrma-lobbying-costs-bn/index.html"
content: |
  The lobbying group for the pharmaceutical industry spent about $27.5 million on lobbying activities in 2018,federal filingsshow.
  
  This is a record annual total for thePharmaceutical Research & Manufacturers of America,or PhRMA, which represents most of the nation’s largest drug and biopharmaceutical research companies, including Pfizer, Sanofi, Merck, Johnson & Johnson and Gilead Sciences.
  
  Trump administration and Big Pharma square off over proposal to televise drug prices
  
  PhRMA’sprevious record lobbying bill topped out at just over $25 million when the industry fought the Affordable Care Act in 2009.
  
  According to OpenSecrets, a nonpartisan, independent research group tracking money in US politics, individual companies within the pharmaceuticals and health products sector spent$194.3 millionon lobbying as of October 24, 2018 over and above the amount disclosed by PhRMA.
  
  The three biggest spenders on the OpenSecrets list were Pfizer, Amgen andBiotechnology Innovation Organization, a separate lobbying group for drug makers and smaller biotechnology companies. The large outlays followmoves within the White Housethat could limit pharmaceutical companies’ price increases and profits on medicines.
  
  Congress and the Trump administration continue to push for a drug pricing plan and were given more ammunition Tuesday in the form of a report documenting that insulin cost nearly doubled in the United States between 2012 and 2016.
  
  One state's novel idea to make Big Pharma pay for opioid epidemic
  
  The report from the Health Care Cost Institute, an independent research group funded by four health insurance companies, found that individuals with Type 1 diabetes spent, on average, $5,705 per person on insulin in 2016, an increase of $2,841 per person since 2012. “The price of all types of insulin and insulin products increased, with point-of-sale prices roughly doubling on average between 2012 and 2016,” said the institute, which holds data on over 50 million commercially insured individuals per year.
  
  President ‘Donald Trump, who campaigned on a promise to lower drug prices, posted hisblueprintfor doing so in May. Steps include negotiating better Medicare Part B drug pricing and addressing “intellectual property theft and foreign freeloading.”
  
  Medicare drug prices soar at 10 times rate of inflation, report says
  
  US Health and Human Services Secretary Alex Azar remarked last week that despite some “positive developments” in pharmaceutical pricing behavior, “drug companies have a lot further to go.”
  
  Between May and the end of 2018, “drug companies took 57% fewer price increases on brand drugs compared with the same period in 2017,” Azar said. He alsoapplauded Amgen, Merck and Gilead for cutting the list prices on some of their drugs and noted that “early data suggests that the 2019 price increases have been smaller and fewer in number than we saw in 2018.”
  
