title: "Must-see moments from CNN’s LGBTQ town hall"
date: "2019-10-11"
section: "App News Section"
url: "https://www.cnn.com/2019/10/11/app-news-section/cnn-lgbtq-equality-town-hall-must-see-moments/index.html"
content: |
  Nine hopeful 2020 Democratic candidates took the stage in Los Angeles forCNN’s LGBTQ town hall. The event coincides with National Coming Out Day, which takes place on October 11. Read on to see the must-see moments from the town hall.
  
  Sen. Cory Booker (D-NJ) explains how he used a Bible verse to support his idea that religion and LGBTQ rights can coexist after saying people use religion as justification for discrimination.
  
  Former Vice President Joe Biden amuses host Anderson Cooper and the crowd with a phrase while answering a question about discrimination.
  
  Protesters in support of transgender rights interrupted as Mayor Pete Buttigieg was on the stage. See Anderson Cooper’s heartfelt response.
  
  Sen. Elizabeth Warren (D-MA) drew laughs and applause for her humorous response to a question about marriage equality.
