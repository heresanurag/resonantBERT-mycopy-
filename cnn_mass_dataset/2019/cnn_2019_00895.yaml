  Editor’s Note:This was originally published in the October 21 edition ofCNN’s Meanwhile in America, the daily email about US politics for global readers.Sign up here to receive it every weekday morning.
  
  There are two plans afoot to oust President Donald Trump. One, impeachment, has transfixed Washington. But the earth is also moving in the other:the 2020 Democratic race.
  
  The smoke has cleared fromlast week’s CNN/New York Times debate, and Sen. Elizabeth Warren has suddenly emerged as the hot ticket for nomination, shaking up assumptions the race is former Vice President Joe Biden’s to lose. But Warren is significantly to the left of much of middle America, and her proposals could spook voters – even many of those who want Trump gone.
  
  It’s not impossible that Warren,who wants massive social and structural changein health care, taxation, education and the economy, could herald a political realignment. After all, Washington is often the last to get the news. No one here predicted how Trump ripped the Republican Party from its corporate, country club, internationalist roots and turned it into a working class, populist, anti-elite, isolationist force. But she’s still a risky bet. And Trump is itching to run against what he’s branding far left-wing “socialism.”
  
  (This is not just an American conundrum. It could shape the looming UK election as well, where Labour’s Jeremy Corbyn hopes to become the most radical Prime Minister in generations — but could end up handing power back to the unpopular Tories.)
  
