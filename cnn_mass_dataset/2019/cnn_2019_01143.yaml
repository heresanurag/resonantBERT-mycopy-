id: cnn_2019_01143
title: "Someone call Ghostbusters. This Italian restaurant is crawling with ghosts"
date: "2019-10-06"
section: "US"
url: "https://www.cnn.com/2019/10/06/us/italian-restaurant-ghostbusters-trnd/index.html"
content: |
  An unassuming Italian restaurant in Pennsylvania has a ghost problem. So bad, in fact, that the Stay-Puft Marshmallow Man lumbered over from New York to claim it as his castle.
  
  Could this be a job for theGhostbusters?
  
  Fooled ya. These “ghosts” are merely a Halloween costume forAngelo’s II, an Italian restaurant in the small town of Monongahela south of Pittsburgh.
  
  They sure look spooky, though. Spindly green tentacles from an unseen monster spill out of its windows, scaring spaghetti-slurpers inside. And the giant marshmallow monster sits atop the roof, surveying the small town like a king peering at his kingdom.
  
  The restaurant takes holiday decorating very seriously. During Christmas,an oversized Santa peeps from the roofand the facade turns into an evergreen tree. But this ode to “Ghostbusters” might trump Christmas.
  
  Luckily for diners, there haven’t been any signs of Zuul or Slimer on premises.
