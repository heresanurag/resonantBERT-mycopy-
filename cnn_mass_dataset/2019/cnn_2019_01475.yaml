title: "Scaramucci says Trump will turn on everyone ‘eventually,’ then ‘entire country’"
date: "2019-08-11"
section: "Politics"
url: "https://www.cnn.com/2019/08/11/politics/anthony-scaramucci-donald-trump-twitter/index.html"
content: |
  From the looks of former White House communications director Anthony Scaramucci’slatest tweetagainst President Donald Trump, their relationship may not recover.
  
  “For the last 3 years I have fully supported this President,” Scaramucci tweeted Sunday morning. “Recently he has said things that divide the country in a way that is unacceptable. So I didn’t pass the 100% litmus test. Eventually he turns on everyone and soon it will be you and then the entire country.”
  
  Scaramucci’s Sunday tweet comes after Trump appeared to be angry with the former White House communications director for calling the President’s recent visits to the grief-stricken cities of El Paso, Texas, and Dayton, Ohio, following two mass shootings a “catastrophe.”
  
  The President responded late Saturday by ridiculing Scaramucci, who worked for the Trump administration for 11 days in July 2017, for hisshort stint in the Trump administration.
  
  “Anthony Scaramucci, who was quickly terminated (11 days) from a position that he was totally incapable of handling, now seems to do nothing but television as the all time expert on ‘President Trump,’” Trump wrote in atweet.
  
  “Like many other so-called television experts, he knows very little about me,” he wrote, adding, “Anthony, who would do anything to come back in, should remember the only reason he is on TV, and it’s not for being the Mooch!”
  
  Anthony Scaramucci: Trump has 'no need to have a war with the media'
  
  Scaramucci, who regularly appears as a guest on TV news shows, said during his MSNBC appearance that Trump’s trip to visit with victims of mass shootings in two cities fell short.
  
  “So look, the President didn’t do well on the trip,” the former aide said. Some ofTrump’s current aides conceded last weekthat his visits to El Paso and Dayton did not go as planned. New video revealed that Trumpbragged about crowd sizeswhile visiting patients at a Texas hospital.
  
  Last month,after Trump tweeted racist attacksat four minority congresswomen, Scaramuccisaid on Twitterthat the tweets were “racist and unacceptable.” The former aide has also previously criticized the President for repeating falsehoods, saying on CNN last year thatTrump “is a liar.”
  
  Scaramucci’s ousting in 2017 came shortly after an infamous, expletive-laden interview he gave to The New Yorker in which he ripped top White House officials by name. In many of his post-White House TV appearances he has defended Trump, while also making public appeals aboutcurtailing some of his behaviorandchanging policies.
