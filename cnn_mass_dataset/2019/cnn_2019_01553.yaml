id: cnn_2019_01553
title: "At least 17 dead in Uganda fuel truck explosion"
date: "2019-08-19"
section: "Africa"
url: "https://www.cnn.com/2019/08/19/africa/uganda-fuel-tanker-accident-intl/index.html"
content: |
  At least 17 people died after a tanker truck carrying fuel exploded at a small trading center in western Uganda, police said on Monday.
  
  The truck lost control and crashed into three other vehicles before bursting into flames, causing the parked vehicles to explode in Rubirizi district on Sunday, according to a statement from Uganda police.
  
  Nine burned bodies were recovered from the scene and eight more people died in the hospital Monday, Ugandan police spokesman Fred Enanga said.
  
  At least 61 people killed in a fuel tanker explosion in Tanzania
  
  “The stream of liquid fire from the fuel also burnt about 25 small shops,” Uganda policesaidin the statement.
  
  Authorities are still working to identify the most severely burned bodies. They are also calling on family members to come forward with identification as part of DNA profiling process for the victims.
  
  The Uganda police havecalled for stricter penaltiesfor drivers who violate traffic laws, adding that most road accidents in the country roads were caused by bad driving decisions.
  
  Earlier in August,more than 60 peoplewere burnt in a oil tanker explosion in neighboring Tanzania.
