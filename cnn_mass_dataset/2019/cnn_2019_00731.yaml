title: "Prince Harry and Meghan Markle share cute new photo of baby Archie"
date: "2019-12-31"
section: "Europe"
url: "https://www.cnn.com/2019/12/31/europe/baby-archie-prince-harry-intl-hnk-scli/index.html"
content: |
  Prince Harry and wife Meghan have celebrated the new year with an adorable photo of baby Archie having a cuddle with his dad.
  
  The image –postedon the Duke and Duchess of Sussex’s official Instagram account on Tuesday night, UK time – shows Prince Harry sharing a moment with the seven-month-old, who is seventh in line to the British throne.
  
  It was posted as part of a short video looking back at the family’s 2019 highlights, including Archie’sbirth in May.
  
  Instagram post not found.
  
  Post has been removed or is no longer public.
  
  “Wishing you all a very Happy New Year and thanking you for your continued support!” the pair captioned the video.
  
  “We’ve loved meeting so many of you from around the world and can’t wait to meet many more of you next year. We hope 2020 brings each of you health and continued happiness.”
  
  Prince Harry, Meghan and Archie spent Christmas in Canada, where the Duchess lived and worked while filming the legal drama “Suits,” rather than celebrating with the royal family.
  
  Prince Harrydressed as Santa Clausas he sent festive wishes tobereaved children, and the pair released their firstChristmas cardfeaturing their son.
  
  It’s been a big year for the royals. After welcoming their first born into the world, the Duke and Duchess spoke publicly about the pressures of being in thespotlight.
  
  Prince Harry also acknowledged tensions with his older brother Prince William for the first time, saying they are on “different paths.”
