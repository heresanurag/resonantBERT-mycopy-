id: cnn_2019_01624
title: "Interior Department to transfer 560 acres of federal land to Army for border wall construction"
date: "2019-09-18"
section: "Politics"
url: "https://www.cnn.com/2019/09/18/politics/trump-border-wall-interior-department-560-acres/index.html"
content: |
  The Interior Department announced Wednesday that it will soon transfer 560 acres along the US-Mexico border to the Army to allow forborder wall construction.
  
  The five parcels comprise land in Arizona, California and New Mexico, the department said, and will be used to construct 70 miles of border barrier.
  
  “In addition to the national security, humanitarian, and related values impacted by unlawful border crossing, emergency measures are necessary to preserve natural resource values,” Casey Hammond, an acting assistant interior secretary, said on a conference call with reporters.
  
  The department’s announcement of the land transfer comes the same day President Donald Trump toured a section of border wall in California as part of afundraising trip.The visit and Trump’s praise for the wall signal that border security will be a cornerstone of his reelection bid, as it was in 2016.
  
  Hammond said the transfer is in the Interior Department’s interest because people illegally crossing the border in the area “create new roads, damage native vegetation, disturb wildlife, and generate tons of garbage and human waste.”
  
  The land is currently held by the Bureau of Land Management, the department said. It has previously transferred land for “various other” projects but never for border barrier construction.
  
  Trump claimed Wednesday that“we’re building a lot of wall,”as he has repeatedly since taking office. In fact, no new sections of wall have been built along the southern border where some form of barrier didn’t already exist.
  
  The Department of Defense is diverting an estimated $3.6 billion in military construction funds to help build the wall, even though Trump repeatedly claimed thatMexico wouldfoot the bill.
  
  Earlier this month, the Pentagon released thefull list of 127 military construction projectsthat will lose funds in order to help construct 175 miles of southern border wall.
