title: "‘Unbelievable,’ says Marcel Hirscher as he reflects on skiing dominance"
date: "2019-01-13"
section: "Sport"
url: "https://www.cnn.com/2019/01/13/sport/marcel-hirscher-skiing-world-cup-adelboden-giatn-slalom-spt-intl/index.html"
content: |
  There’s just no stopping “Champion of Champions” Marcel Hirscher.
  
  The Austrian skier won his eighth and ninth World Cup races of the season on the Chuenisbärgli in Adelboden over the weekend to push his overall tally to 67 victories on the circuit.
  
  On Saturday, Hirscher beat Henrik Kristoffersen and Thomas Fanara in the two-run giant slalom in Switzerland.
  
  The 29-year-old Hirscher came from behind after Norwegian Kristoffersen led following the first run.
  
  In heavy snow on Sunday, Hirscher repeated the trick in the slalom, edging out Clément Noel and Kristoffersen as the Austrian took his 16th podium in Adelboden, a record for male skiers.
  
  “The feeling was really pretty good on the second run,” said Hirscher, who is chasing an unprecedented eighth World Cup overall title, after Saturday’s win.
  
  “It’s unbelievable, that’s for sure,” added Hirscher, as he reflected in on his impressively consistent form and dominance of men’s skiing. “It underlines for me personally, this seven years where I’ve been performing at this level, I think this is worth the most.”
  
  Hirscher was recently named “Champion of Champions” for 2018 by French newspaper L’Equipe.
  
  “That too is a great honour and when I look at who won the trophy in the past years – Rafael Nadal, Roger Federer, Usain Bolt and Lionel Messi – I have to admit that I’m very touched!” Hirscherrecently wrote on his blog.
  
