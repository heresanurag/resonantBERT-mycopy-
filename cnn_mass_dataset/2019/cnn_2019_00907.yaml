title: "A trade war ceasefire is just what America’s economy needs"
date: "2019-12-13"
section: "Perspectives"
url: "https://www.cnn.com/2019/12/13/perspectives/phase-one-trade-deal/index.html"
content: |
  Editor’s Note:Mary E. Lovely is a professor of economics at Syracuse University and non-resident senior fellow at the Peterson Institute for International Economics. The opinions expressed in this commentary are her own.
  
  The US Trade Representative’sannouncementof a “Phase One” trade deal between the United States and China is good news for the American economy.
  
  The Chinese have agreed to purchase US agricultural products, energy and manufactured goods and made commitments on intellectual property protection and currency management.
  
  In exchange, President Trump agreed to reduce tariffs levied in September, including those on imports of apparel and accessories, as well as cancel new tariffs that were set to take effect on December 15th. He retained the 25% tariffs on $250 billion in Chinese imports first imposed in 2018.
  
  If Trump hadn’t agreed to cancel the December 15th round of tariffs, the average US tariff rate on Chinese exportswould have climbedto almost 24% – dramatically higher than the average tariff of 3.1% in place before the trade conflict began in July 2018.
  
  An agreement will not only avoid the levy of new taxes on US imports of cell phones, laptops and toys – products largely engineered, designed and marketed in the US – it will also preempt new Chinese retaliatory duties, including the re-imposition of tariffs on US autos and auto parts.
  
  The December round of tariffswould have harmedAmerican interests with very little impact on the Chinese economy.  Of the estimated $160 billion ofimports scheduledto be taxed on December 15, 60% would have been computers and other electronic devices, mostly cell phones and laptops.  Most of these devices are assembled in foreign-owned factories operating in China like the Foxconn facilities that assemble Apple’s iPhones.  The upshot is that these tariffs would fall mostly on American technology companies and their suppliers, with little impact on Chinese producers suspected of unfair subsidies or technology theft. Certainly, lower sales for these foreign producers could cause layoffs of Chinese factory workers, but the tariffs would do little harm to key players behind China’s drive for technological innovation.
  
  New tariffs are not only ineffective, they are costly for America. The continuing strength of the overall US economy belies the trouble brewing in America’s manufacturing sector, much of it caused by the trade war. Early US tariffs felllargely on intermediate inputs– the parts and supplies American manufacturers use to feed domestic production. For some of these products, suppliers don’t exist outside of China. With tariff rates on these goods now at 25%, American factories are feeling the pinch. Compounding the pain is ageneral slowdownin the global economy, increasing the difficulty US companies face in maintaining and expanding export sales.
  
  America’s factory activity hascontractedin each of the past four months. Respondents to the influential Institute for Supply Management’s Business Survey cite ongoing economic uncertainty and confusion over the US-China trade relations as reasons for the slowdown. And despitecompensatory paymentsof $23 billion over the past two years, American farm statescontinue to sufferfrom the trade war.
  
  A ceasefire in the trade war will bring much needed relief to America’s factories and farms. Because renewed agricultural purchases by China have been declared a “must-have” by American negotiators, a “Phase One” deal will begin the process of restoring health to American farmlands. A rollback in existing tariffs will also bring relief to American manufacturing exporters.
  
  And, most importantly, a ceasefire now raises the likelihood that the two sides can find lasting solutions to the problems identified in the US investigation of China’s unfair practices related to technology transfer, intellectual property and innovation.
  
  Some see the postponement or roll-back of tariffs as hurting US leverage for second and third phase discussions when even thornier issues, such as industrial subsidies, are likely to be tackled. Such criticisms ignore the obvious – we can only get to those talks if we reach a “Phase One” deal. Reaching that deal requires an end to escalation.
  
  The economic and political benefits of de-escalation in the trade war have become readily apparent.  A rollback of tariffs and cancellation of new levies, especially if followed by a Phase Two deal that tackles the difficult issues of American access to Chinese markets and trade-distorting industrial subsides by the Chinese government, makes sense for the US economy and for the President. The time has come to negotiate better terms for American companies and workers.
