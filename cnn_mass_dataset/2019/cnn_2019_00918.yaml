id: cnn_2019_00918
title: "An incendiary device was under the car of a retired administrator found stabbed to death at a California university"
date: "2019-08-19"
section: "US"
url: "https://www.cnn.com/2019/08/19/us/california-fullerton-fatal-stabbing/index.html"
content: |
  A backpack holding an incendiary device and items that could be used for an abduction were beneath the car in which a retired administrator was found stabbed to death on the campus of California State University Fullerton, authorities said Monday.
  
  The victim was identified by Fullerton police as Steven Shek Keung Chan, 57, of Hacienda Heights. He’d retired from the school but worked at the international student affairs office as a consultant, officials said.
  
  His body was found with multiple stab wounds inside the vehicle in a campus parking lot, police said. He was pronounced dead at the scene.
  
  “Investigators now believe the victim was targeted based on their investigation,” Fullerton police said in a statement.
  
  Police are looking for the attacker, who is described as a man in his mid-20s with black hair, wearing a black shirt and black pants.
  
  CAMPUS UPDATE 12:25 PM: The victim involved was in his late 50s, and was a retired administrator working as a consultant on campus. Previous reports incorrectly indicate he was a faculty member.
  
  The backpack was left by Chan’s assailant, said Fullerton police Lt. Jon Radus. The city’s police force is leading the investigation. No motive was disclosed.
  
  The Orange County Sheriff’s Department bomb squad found the backpack, Radus said. There is no known threat to the community, he said.
  
  Police were on campus attending an active shooter filming, which was later canceled, police said.
  
  President Fram Virjee called the killing a “tragic and senseless attack,” in a letter to the school community.
  
  “He was beloved for his commitment to and passion for both Cal State Fullerton and our Titan Family,” Virjee said of the slain teacher in his letter.
  
  Chan had retired as a budget director in 2017 and returned early in 2019 to work as a consultant, the letter said.
  
  Monday marked the first day of the 2019-2020 academic year. Classes at the Southern California school start Saturday.
