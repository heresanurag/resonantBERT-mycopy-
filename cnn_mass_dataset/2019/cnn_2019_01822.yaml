id: cnn_2019_01822
title: "Convicted bank robber makes five-day closing speech to court"
date: "2019-10-09"
section: "Europe"
url: "https://www.cnn.com/2019/10/09/europe/bank-robbery-five-day-speech-intl-scli-grm/index.html"
content: |
  Abank robberwho used his legal right to a “last word” to speak for five days in court has been sentenced to 12-and-a-half years in jail.
  
  A district court in Hamburg, Germany sentenced Michael Jauernik, 71, to more than 12 years in jail for 3 bank robberies, attempted murder and violation of weapons law.
  
  UnderGermanlaw, a defendant is given the opportunity to have a “last word” after a verdict is given. Defendants generally use the time to show remorse, or say nothing.
  
  Jauernik, who attended court in sunglasses, ranted about allegedly incompetent investigators and claimed he had more legal knowledge than his lawyers, CNN affiliateRTL reported. Jauernik’s speech spanned five days, a source in the court press office confirmed.
  
  60-year-old bank employee honored for fighting off an armed robber
  
  As the verdict was delivered, the 71-year-old continually interrupted the judge, RTL said.
  
  Jauernik has previous convictions for a series of bank robberies in the 1970s and 1980s and led a five-day prison riot in Hamburg’s Fuhlsbüttel prison in 1990, RTL reported.
  
  Jauernik’s lawyer, Johannes Rauwald, told German media that his client would appeal the sentence.
