  One of the leading thoroughbred racing and breeding stables in the USA,WinStarhas been blessed with success – especially in recent years.
  
  Situated in Kentucky, the stable is owned by American billionaire Kenny Troutt who made his name in communications but has since invested heavily in his love for racing.
  
  Most notably, the farm owned 2018’s Triple Crown winner Justify – who became just the 13th horse to ever complete the epic feat.
  
