title: "Chef José Andrés’ team will keep serving free meals to federal employees as they head back to work"
date: "2019-01-24"
section: "US"
url: "https://www.cnn.com/2019/01/24/us/jose-andres-feeds-thousands-federal-workers-shutdown-trnd/index.html"
content: |
  Editor’s Note:If you know someone who dedicates their time to help others in amazing ways,nominate them here to be a CNN Hero.
  
  Renowned chef José Andrés and his nonprofit have served millions of free meals to needy Americans after such natural disasters as Hurricane Maria and the California wildfires.
  
  They tackled a new kind of crisis this month in cities across the United States, feedingfederal government workerswho were furloughed or working without pay during the 35-day partial shutdown.
  
  And though theshutdown ended Fridaywith a deal that funds affected departments through February 15, Andres announced that his team atWorld Central Kitchenwill continue to provide meals through next week since employees still haven’t seen a paycheck.
  
  BIG news! Our government will reopen...but we will be keep cooking hot meals for the next week so that everyone has time to get paid! And@WCKitchen#ChefsForFedswill always be here in future times of need! 🍴🇺🇸pic.twitter.com/ed6hvZyQRV
  
  “We will … keep cooking hot meals for the next week so that everyone has time to get paid!”Andres tweetedFriday.
  
  The #ChefsForFeds campaign opened a kitchen and café this month near the White House, thensoon expandedto 12 states and Puerto Rico. The effort also offers to-go meals for families, plus essentials like diapers, pet food and cat litter.
  
  “We believe that no person should have to go through the pain of not knowing what to feed their children,” the chefsaid in a videoannouncing the endeavor.
  
  Plenty of people took the help. Andrés’ team on Wednesday served 11,400 hot meals,organizers tweeted.
  
  BIG news! In the next 48 hours#ChefsForFedsrestaurants and food trucks are activating across the nation!!pic.twitter.com/AxVUGeUFex
  
  Andrés grew up in Spain and found fame as a chef in Washington, where his tapas restaurant, Jaleo, opened in the early 1990s and spawned a mini-empire of eateries across the city and the country.
  
  'Can I visit the Smithsonian now? When will federal workers get paid?' Questions about the government shutdown -- answered
  
  When the shutdown began last month, he promised free sandwiches at any of his restaurants to federal employees. That vow quickly spawned the pop-up project.
  
  And if the government shuts down again in three weeks, Andrés said he’ll be back with more food.
  
  “Obviously we’re going to be watching what happens during these next few weeks,” Andréssaid Friday. “If for some reason things go wrong again, we will be there for them.”
  
  The chef also called on leaders to reach a permanent solution.
  
  “Now, we need our politicians to show us why we put them in power,” he said. “They need to lead us.”
