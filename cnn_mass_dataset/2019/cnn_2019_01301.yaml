  _February 5, 2019_
  
  _Australia is the site of today’s first report, as we bring you an explanation of why a dam was opened amid historic rains and how a city downstream was flooded. The deployment of 3,750 more U.S. troops to America’s southern border makes headlines ahead of President Trump’s upcoming State of the Union Address. And we consider what the televisions of the future will look like._
  
