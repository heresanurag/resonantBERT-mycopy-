title: "Quickly catch up on the day’s news"
date: "2019-01-07"
section: "App News Section"
url: "https://www.cnn.com/2019/01/07/app-news-section/quickly-catch-up-january-7/index.html"
content: |
  Here’s what you might have missed Monday on CNN:
  
  – The White Houseannounced that President Trump will visit the US-Mexico border on Thursdayin its latest attempt to call attention to what the administration says is a “crisis” there.– Analysis: After he boxed himself in, President Trump escalated the shutdown crisis with a threat to declare a national emergency whichcould spiral into a constitutional duel over presidential powers.– It was supposed to be a big night for “A Star is Born.” Instead, top honors at the Golden Globeswent to another popular movie about the unlikely rise of a powerhouse singer.– CNN’s Bill Weir explores the dirty underbelly of electricity generation and finds that more coal-fired power plants have closed under Trump than in Obama’s entire first term. In short,Trump isn’t saving coal.– During his arraignment, prosecutorsasked actor Kevin Spacey to stay away from his accuser.– Scientists say the 2017 “sonic attack” on US Embassy personnel in Cuba may have been the echoing call of …crickets.– Justice Ruth BaderGinsburg was not at the Supreme Court Monday morningas it met for its first day of oral arguments in the new year.– Nigerian soldiers raided one of the offices of a local newspaper andtook away journalists who wrote an article about Boko Haram.– Kris Jenner told followers to “prepare to be moved” by her daughter Kendall’s announcement. After all the anticipation,fans feel a bit punked.
