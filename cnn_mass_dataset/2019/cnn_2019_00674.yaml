id: cnn_2019_00674
title: "Ohio day care workers charged after 5-year-old endures ‘extreme bullying,’ police say"
date: "2019-09-12"
section: "US"
url: "https://www.cnn.com/2019/09/12/us/ohio-day-care-workers-arrest-bullying/index.html"
content: |
  Two employees of a day care in Ohio were arrested after failing to stop the “extreme bullying” of a 5-year-old girl in their care, police said.
  
  Emma Dietrich, 31, and Joshua Tennant, 27, were charged Tuesday with child endangerment, according to a Columbus police report.
  
  A video of the August 13 incident at the Worthington Learning Center shows the two employees sitting at a table, watching as a group of students start “grabbing, pulling, dragging, swinging, and just ‘bullying’” the girl, according to the police report.
  
  The girl “appears frightened and keeps her eyes closed or covered and attempts to curl up into a fetal position,” in the video, the police report said.
  
  When she tried to get away, the other children grabbed her and held her down, the report said.
  
  In the video, Dietrich and Tennant “do not attempt to stop” the bullying, police said.
  
  At one point in the video, Tennant picked the girl up “by her right ankle,” carrying her upside down to place her on a rug, the police report says.
  
  Reached by CNN, Dietrich said she had no comment. CNN wasn’t able to contact Tennant.
  
  Columbus police said in atweetthat they are making the case public to show the “severity” of what (the) little girl endured in the learning center.
  
  The Worthington Learning Center has been cooperative “through the scope of this investigation,” police said. The day care center did not reply to a CNN request for comment.
  
  Lisa Rowe, owner of the day care center, toldCNN affiliate WBNSthat she was “heartbroken” over the incident, that her employees go through extensive training, and that she fired the two workers after she saw the video. There is “zero tolerance” for this behavior, she said.
  
  “The safety and care of our children is paramount,” Rowe said in a statement given to CNN on Friday. “As soon as we were notified of the situation, we immediately terminated both employees involved. We will continue to cooperate with authorities on this case as needed.”
