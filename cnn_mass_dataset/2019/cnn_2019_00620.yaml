content: |
  The House Judiciary Committee announced Monday that it issending letters seeking information and documents from more than 80 groups, organizations and individuals, as part of its sweeping investigation into President Donald Trump’s campaign, businesses, transition and administration.
  
  In an interview with ABC News’ “This Week,” Rep. Jerry Nadler said Sunday the requests for documents are to “begin investigations, to present the case to the American people about obstruction of justice, about corruption and abuse of power.”
  
  Here’s who and what are receiving letters Monday:
  
