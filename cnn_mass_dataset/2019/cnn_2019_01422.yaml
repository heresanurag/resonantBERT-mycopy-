title: "Anderson Cooper Full Circle"
date: "2019-10-23"
section: "App News Section"
url: "https://www.cnn.com/2019/10/23/app-news-section/anderson-cooper-full-circle-mobile/index.html"
content: |
  Every weeknight at 5pm E.T., Anderson Cooper hosts a daily digital show streaming live around the world covering the stories that audiences care about most.
  
  Anderson Cooper speaks with human rights expert Angelina Godoy who uncovered ICE had been taking a small number of immigrant teens it deemed to be dangerous far from their families and detaining them for months.
  
  Joanna Schroeder tells Anderson Cooper about the shocking discovery she made when she reviewed her sons’ social media and what she says parents can do about it.
  
  Anderson Cooper speaks with singer Mike Posner, who just finished his six-month trek across the United States.
  
  Anderson Cooper speaks with members of a girls’ soccer team penalized for wearing shirts that said #EqualPay.
