title: "Quickly catch up on the day’s news"
date: "2019-08-13"
section: "App News Section"
url: "https://www.cnn.com/2019/08/13/app-news-section/quickly-catch-up-august-13/index.html"
content: |
  Here’s what you might have missed Tuesday on CNN:
  
  – Chaos erupted at Hong Kong’s international airport asriot police clashed with protesterswho continued to block security gates at one of the world’s largest travel hubs.
  
  – People in New Jersey’s largest city may have been drinking lead-contaminated water for years.The EPA says a quick fix hasn’t worked.
  
  – New tariffs would have jacked up the price of iPhones. But tech companies – and their customers –dodged a bullet with news of a delay.
  
  – The Kremlin broke its silence on the apparent explosion of a Skyfall missile during a test,saying that accidents “happen.”
  
  – The body of teenager Nora Quoirinwho went missing in Malaysia has been found, local police confirmed.
  
  – Drug tests and background checks are becoming less important to employers.Here’s why.
  
  – In an interview on NPR, the President’s acting immigration chief revised the iconic poem on the Statue of Liberty’s pedestal to suggest that only immigrantswho can “stand on their own two feet” are welcome.
  
  – In the wake of his split from Miley Cyrus, Liam Hemsworth hasposted his wish for his ex on Instagram.
