  According to Forrester’s Hogan, dark mode has taken off at least partially due to users’ desire to differentiate themselves. Hogan described the feature, which users have to know to enable on an app or website, as “cool, novel and new.” In this sense, it is similar to other ways users can customize their apps and devices to differentiate themselves.
  
  However, it’s unclear whether dark mode is actually easier on the eyes, according toChristopher Starr, an ophthalmologist at Weill Cornell Medicine. It largely boils down to personal preference as there are many variables – such asambient room light and angle of the screen – that can affect eye comfort when staring at computers and devices.
  
  “Ultimately eye strain and computer vision syndrome is more about the amount of screen time without breaks and the reduced blink rate we see with digital device use,” Starr said.
  
  Still, Hogan believes this is only the beginning of the trend of features addressing the downsides of screen time.
  
  “Five years from now, we’ll probably be staring at more screens,” Hogan said. That means we’ll alsolikely still be trying to find ways to reduce the harmful impacts. But he said it’s unclear whether thedark modefeature, in particular, will retain its “cool factor” or if people will have moved on to the next fad.
