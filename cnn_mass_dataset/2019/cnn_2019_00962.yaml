title: "Quickly catch up on the day’s news"
date: "2019-02-15"
section: "App News Section"
url: "https://www.cnn.com/2019/02/15/app-news-section/quickly-catch-up-february-15/index.html"
content: |
  Here’s what you might have missed Friday on CNN:
  
  – Trumpdeclares national emergency to fund the walland is expected to sign a spending bill from Congress thatallocated $1.375 billion for to build 55 miles of new fencing.
  
  – Former Massachusetts Gov. Bill Weldsaid he’s launching a presidential exploratory committee to run in 2020as a Republican. Weld was the 2016 vice presidential nominee on the Libertarian Party ticket with former New Mexico Gov. Gary Johnson.
  
  – The Supreme Court says that it will take up a case this termto decide whether the Trump administration can add a citizenship questionto the 2020 census.
  
  – Two suspectshave been arrested in connection to an attack reported by “Empire” actorJussie Smollett, Chicago Police Department say.
  
  – A nursing home patient “rotted to death” under nurses’ care,Ohio attorney general says. Current and former employees of an Ohio nursing facility are accused of mistreating two patients in their care, including one who died as a result of the nurses’ actions.
  
  – A jogger goes for run along a trail, and ends up having tosuffocate a mountain lion with his footin a fight for his life. “I feel like I should go buy a bunch of lottery tickets,”he says after surviving the attack.
  
  – An 81-year old widow is thesole resident of remote islandthat is being disputed by South Korea and Japan.
  
  – Everyone at this company works from home.Here’s how it works.
  
  – It appears Valentine’s Day was a good one forKaty Perry and Orlando Bloom.
