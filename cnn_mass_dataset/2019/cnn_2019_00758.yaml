id: cnn_2019_00758
title: "FedEx CFO: Our profit drop was ‘horrific’"
date: "2019-12-17"
section: "Business"
url: "https://www.cnn.com/2019/12/17/business/fedex-earnings-second-quarter/index.html"
content: |
  FedEx has been trying to turn its business around aftera difficult year, but its second quarter results show that it’s not nearly there yet.
  
  On Tuesday,the company reportednet income of $660 million for the three months ending November 30, down nearly 40% from the same period a year earlier. Revenue also fell to $17.3 billion from $17.8 billion over that time.
  
  Shares in FedEx(FDX)dropped nearly 7% in after-hours trading Tuesday following the earnings release.
  
  A significant drop in operating income in FedEx’s Ground division — down 42% to $342 million, from $590 million in the same period last year — contributed to the quarter’s disappointing results.
  
  “We are at the bottom,” CFO of FedEx Alan Graf said in a call with Wall Street analysts Tuesday. “Our adjusted operating profit decline year-over-year is horrific … It’s going to improve in Q3 and it’s going to improve substantially in Q4, versus the prior year … We’re going to come up off the mat and improve through the rest of this year and into the next.”
  
  The shipping company has been battling a number of challenges over the last several quarters — namely global trade disputes that cut down on FedEx’s international shipping business and theloss of major customerAmazon(AMZN).
  
  Revenue in the quarter was also hurt by the later-than-usual Thanksgiving holiday, which pushed the Cyber Week shopping period out of the quarter. Income was also hit by costs associated with FedEx’s effort tolaunch and growSaturday and Sunday ground shipping services.
  
  Amazon sellers can't use FedEx Ground for Prime shipments
  
  But the challenge from Amazon isn’t going away yet. The Wall Street Journal reported that Amazonwould no longer allow its third-party sellers to ship Prime packages via FedEx,citing performance deficiencies.
  
  FedEx executives said on Tuesday’s earnings call that non-Amazon e-commerce business is growing and that expanding to seven-day shipping should help results in coming quarters. The company has long delivered on Sundays during peak holiday seasons, butstarting in Januaryit will keep seven-day ground delivery services going year-round in most of the United States.
  
  CEO Frederick Smith said the company has seen an “unbelievable response” from customers to the growth of six- and seven-day shipping services.
  
  Still, investors may be hard to convince. One analyst on the call Tuesday asked why the company hadn’t considered drastic cost-cutting measures, such as laying off employees.
  
  Smith replied that he’s confident the company can turn around, and wants to have all its resources available when it does.
  
