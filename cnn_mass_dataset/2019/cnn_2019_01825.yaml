  In April, the US State Department gave Venezuela its highest travel advisory, Level 4:Do Not Travel, citing crime, civil unrest and the arbitrary arrest and detention of US citizens.
  
  Venezuela was ranked as the most dangerous country in the world for the second straight year, according to a Gallup survey in 2018. It is one of 13 countries issued the highest advisory.
  
  Uruguay is listed as aLevel 2: Exercise Increased Cautionon the State Department’s travel advisory list. The advisory was issued due to violent crimes, the website said.
