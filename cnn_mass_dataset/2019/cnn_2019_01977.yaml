title: "Start your Monday smart: Hanukkah, Christmas, Kwanzaa, Iran, NFL, college bowls"
date: "2019-12-22"
section: "World"
url: "https://www.cnn.com/2019/12/22/world/five-things-december-22-trnd/index.html"
content: |
  What did you accomplish this year? Scientists discovered 71 new species in 2019, andthese are some of their favorites.
  
  Here’s what you need to know toStart Your Week Smart.
  
  (You can also get “5 Things You Need to Know Today” delivered to your inbox daily. You give us five minutes, and we give you five things you must know for your weekday, plus a Sunday edition to get your week started smart.Sign up here.)
  
  • Hanukkah begins at sunset.TheJewish Festival of Lightscommemorates the Maccabees’ rededication of the Second Temple of Jerusalem after they recaptured it in a rebellion. In preparing the Temple, the faithful found only enough oil to light the menorah for one night, but it lasted for eight. The Hanukkah menorah recalls that miracle.
  
  • NFL fates could be sealed.The Dallas Cowboys can clinch the NFC East with a win over the Philadelphia Eagles. Watch at 4:25 p.m. ET on Fox.Find all the Week 16 games here.
  
  • Congress takes a holiday break.After impeaching President Trump, the House is on vacation. But the next steps in the historic process are still in limbo. Speaker Nancy Pelosihasn’t committed yetto sending the articles of impeachment to the Republican-held Senate, where Democrats aren’t satisfied with the rules that would govern the trial. The Senate’s GOP leadermay move forward next monthanyway.
  
  • Holiday travel is in full swing.More Americans than ever are expected to hit the roads, rails and skies this season, withan estimated 115.6 milliondue to strike out through January 1. If you’re flying, here’swhat not to pack. And you can keep up with one very special traveler early in the week, withNORAD’s Santa tracker.
  
  •We wish you a Merry Christmas.Christians the world over celebrate the birth of Jesus Christ. Pope Francisis due to deliverhis “Urbi et Orbi” blessing from the central balcony of St. Peter’s Basilica. And Queen Elizabeth II will share her Christmas message, a British traditionsince 1932.
  
  • Family flicks hit theaters.Greta Gerwig, of “Lady Bird” fame, says directing her on-screen version of the Louisa May Alcott classic, “Little Women,”feels even more personalthan her breakout film. Meantime, Will Smith and Tom Holland join forces in “Spies in Disguise” as a famous super spy and a young scientist who must save the worldfrom an unusual vantage point. Both films are rated PG.
  
  • Kwanzaa celebrates African culture.Theseven-day festivalbegins. Each night, celebrants light a new candle on the kinara, a kind of candelabra, representing the holiday’s seven principles: unity, self-determination, collective responsibility, cooperative economics, purpose, creativity and faith.
  
  • Israel’s Netanyahu faces a leadership challenge.As the nationheads toward its third electionin a year, the Prime Minister could be unseated within his own Likud party. Gideon Saartakes onBenjamin Netanyahu, 70, who faces criminal indictment for bribery, fraud and breach of trust in a trio of criminal investigations.
  
  • Russia, Iran and China hold joint naval exercises.The operation, dubbed “Naval Security Belt,” is expected to start in the Indian Ocean, Iranian news mediareport. The drills unite three American rivals not long after the USflexed its own naval musclein the Middle East.
  
  • College Football Playoff Semifinal teams face off.It’s No. 1 LSU vs. No. 4 Oklahoma, and No. 2 Ohio State against No. 3 Clemson. Watch at 4 and 8 p.m., respectively, on ESPN. The games cap off a bowl-packed week.Check out all the match-ups here.
