title: "Australian river swells to 37 miles wide due to flooding, creates its own weather system"
date: "2019-02-14"
section: "Australia"
url: "https://www.cnn.com/2019/02/14/australia/australia-flinders-river-intl/index.html"
content: |
  A river has gone from thin and dry to 37 miles (60 kilometers) wide in a matter of weeks as a result of floods in northeast Australia, satellite imagery shows.
  
  Images released by NASA show the change to the Flinders River –one of Australia’s longest waterways– over the past month, with flooding there at its worst in more than half a century.
  
  The#FlindersRiveris experiencing its most significant flooding in more than 50 years with major flooding to continue well into next week. Flood plumes spill into the Gulf of Carpentaria as seen from Japan's Himawari-8 satellite:https://t.co/bZgs9WKObBpic.twitter.com/cr2S4N9RUX
  
  The river is now so big it’s creating its own weather system.
  
  The Queensland Bureau of Meteorology (BOM) said extra moisture from the flooding helped create a thunderstorm early Thursday.
  
  A flood so vast it creates its own weather! The extra moisture from the flooding in#NWQldhelped this thunderstorm form this morning. It can be seen following the path of the flood waters very closely, thankfully falls were isolated. More images:https://t.co/nrb8tKt1K1#BigWetpic.twitter.com/zPHnElj50k
  
  Australia’s billion-dollar beef industry is expected to sustain heavy losses due to the storms. About 500,000 cattleare believed to have died in the flooding, estimated to be to be worth about $213 million (AU$300 million), CNN affiliate Seven News reported.
  
  Many of the cattle carcasses remain, and will pose a health hazard if not buried or burned,
  
  “People have gone through drought, they have come out of years and years of drought, and they have now gone smack-bang into a natural disaster the likes of which no one out there has seen before,” Queensland Premier Annastacia Palaszczuk said.
