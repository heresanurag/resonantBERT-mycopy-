title: "Two zebras die after escaping their owner’s property and trotting through a Texas town"
date: "2019-08-08"
section: "US"
url: "https://www.cnn.com/2019/08/08/us/texas-escaped-zebra-dies-trnd/index.html"
content: |
  Two zebras managed a great escape from property in New Braunfels, Texas, on Wednesday, but unfortunately, there wasn’t a happy ending.
  
  The New Branufels Police Department saidthe pair of zebras had been sold to a property owner in the area that day. The zebras apparently escaped the area and swam across the Guadalupe River, where one decided to make its way downtown while the other lingered in the area.
  
  The first zebra “galloped and trotted” along city streets and underneath an interstate, the police said. Luckily, both the animal and the general public were kept safe by police and animal control during this drive-through tour of the town.
  
