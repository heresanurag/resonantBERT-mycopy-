title: "Harry and Meghan opened the door to a side of royal life we don’t often see"
date: "2019-10-21"
section: "UK"
url: "https://www.cnn.com/2019/10/21/uk/harry-meghan-documentary-analysis-gbr-intl/index.html"
content: |
  Every family has their ups and their downs, and Britain’s royal family are no exception – we just don’t normally hear about them.
  
  In a departure from protocol, the Duke and Duchess of Sussex gave anunfiltered perspectiveon their heavily dissected lives in a documentary that aired in the UK on Sunday night.
  
  The silent strategy is one that the royal family have traditionally favored, and the Queen opts for actions over words. Senior royals have started to open up on issues they care about, however. Think Prince Charles or William on climate issues. But they rarely divulge anything about themselves.
  
  That’s what made these interviews so significant. We got to hear something of how Harry andMeghanare truly feeling and coping – or not – with the tabloid news cycle surrounding them. By the end of the hour one thing was clear: they are drained.
  
  It was most evident on Harry’s face when talking to ITV reporter Tom Bradby. Thestrain on the dukewas increasingly evident as footage of thetour in southern Africarolled on.
  
  “It’s constant management… I thought I was out of the woods and then it all suddenly all came back,” Harry revealed. “Part of this job and part of any job, like anybody, means putting on a brave face, and turning a cheek to a lot of this stuff.”
  
  Three reasons why Prince Harry is taking on the tabloids
  
  Meghan echoed Harry’s sentiments when shesummed up the media furor, saying that she had “really tried to adopt this British sensibility of a stiff upper lip” but that ultimately “what that does internally is probably really damaging.”
  
  Reaction to the documentary has inevitably been divided. Some praised the couple for being honest while others within the British establishment were worried about the candid nature of the film. After all, the pair broke the unwritten royal rule that you do not talk about the family, as it undermines the wider institution.
  
  The other talking point from the documentary was the state of Harry’s relationship with his brother and the duke certainlyacknowledged tensions with William: “Part of this role, part of this job, this family, being under the pressure which it’s under, inevitably stuff happens.”
  
  Harry continued, however: “But we are brothers. We will always be brothers.”
  
  “We are certainly on different paths at the moment, but I will always be there for him, and as I know he will always be there for me. We don’t see each other as much as we used to as we are so busy. But I love him dearly,” he said.
  
  Harry’s remarks come on the heels of widespread tabloid stories of a rift between the brothers, and some journalists believe this was confirmation of their reporting. It does appear to undermine previous denials from palace officials.
  
  “It is clear from the documentary that they are far from happy as royals,” royal commentator Richard Fitzwilliams said in a statement.
  
  “A lot of questions need answering [as these interviews] showed a good deal of vulnerability and are inevitably being compared toDiana’s Panorama bombshell interview. What is next, how long do they feel they can carry on and what will this mean for the monarchy?”
  
  The answers to the first two questions have come sooner rather than later. It was confirmed on Sunday that the duke and duchess willtake a breakfrom royal duties towards the end of the year.
  
  This is unfamiliar ground given that royals don’t typically take time off. The hiatus will see them take some “family time” from around mid-November once they have completed their current run of engagements, a royal source told CNN.
  
  The royal couple is aware that one dissenting perception of them is that they live gilded lives, in royal properties with staff at their every beck and call, and that all they do is travel the world to champion causes the family believes in. When pressed on this impression in the documentary, Meghan emphasized that “the grass is always greener.”
  
  “I never thought this would be easy. But I thought it would be fair and that’s the part that’s really hard to reconcile.”
