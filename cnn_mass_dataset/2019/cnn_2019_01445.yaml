id: cnn_2019_01445
title: "El Paso suspect told police he was targeting Mexicans, affidavit says"
date: "2019-08-09"
section: "US"
url: "https://www.cnn.com/2019/08/09/us/el-paso-shooting-friday"
content: |
  The man who authorities saykilled 22 people at an El Paso Walmarttold police that his targets were Mexicans, according to an arrest affidavit.
  
  The El Paso shooting suspect showed no remorse or regret, police say
  
  In the affidavit, El Paso Police Detective Adrian Garcia said 21-year-old suspectPatrick Crusiustold him, “I’m the shooter.”
  
  “The defendant stated his target were Mexicans,” according to the affidavit, which CNN has obtained and was first reported by The Washington Post.
  
  Police said Crusius, besides killing 22 people, wounded 24 others in Saturday’s shooting. He was arrested onthe day of the attack, surrendering to a police officer at an intersection just north of the store.
  
  Crusius has been charged with capital murder in the shooting and is being held without bond.
  
  Police previously said that the shooting appeared to be a hate crime. Investigators believe Crusius wrote a documentfilled with hatred of immigrants and Latinosin which he said he wanted to stop a “Hispanic invasion” of Texas.
  
  These are the victims who have been identified in the El Paso shooting
  
  The document was published on theonline messaging board 8chanabout 20 minutes before the shooting, authorities said. The author says he opposes “race mixing” and encourages immigrants to return to their home countries.
  
  Federal authorities have said they’re treating the shootingas a case of domestic terrorism. The shooting was one of the10 deadliest in modern US historyand one of atleast three mass shootings in a week.
  
  Crusius claimed he targeted El Paso because, in part, he wanted distance between target and his hometown on the other side of Texas, three sources with knowledge of the investigation told CNN.
  
  Crusius told investigators this was one reason why he chose El Paso, the sources said. Crusius believed that if he committed the attack near his home in a suburb of Dallas, his family and acquaintances would have known that he did it, the sources said.
  
  Crusius drove about 11 hours from his home in Allen, Texas, to the Walmart in El Paso, in far western Texas abutting the Mexican border, police said.
  
  About83% of El Paso’s residentsare Hispanic or Latino, according to the US Census Bureau. In Allen,about 11% of residentsare Hispanic or Latino, according to census data.
  
  El Paso police officials would not comment about the sources’ accounts.
