id: cnn_2019_00469
title: "Twitter used phone numbers gathered for account security to sell ads"
date: "2019-10-08"
section: "Tech"
url: "https://www.cnn.com/2019/10/08/tech/twitter-phone-numbers-ads/index.html"
content: |
  Twitter “inadvertently” used phone numbers and email addresses its users provided for account security purposes to target ads, the company said Tuesday.
  
  In July, the Federal Trade Commission (FTC) said Facebook had broken the lawwhen it engaged in a similar practice.The FTC fined Facebook $5 billion for that and a litany of other instances where it mishandled user data.
  
  Twitter users are asked to provide information like their phone number to help secure their account through services such as two-factor authentication.
  
  Facebook will pay an unprecedented $5 billion penalty over privacy breaches
  
  “We cannot say with certainty how many people were impacted by this, but in an effort to be transparent, we wanted to make everyone aware,” the company said in ablog post Tuesday. It said no personal data had been shared externally.
  
  “We’re very sorry this happened and are taking steps to make sure we don’t make a mistake like this again,” the company added.
  
  Phone numbers provided to Twitter for the purpose of two-factor authentication were recently exposed as a hacking vulnerability as well. A hacker or hackerswere able to tweet from the account of CEO Jack Dorseyby convincing Twitter’s systems that they had his phone and were texting the tweets to his account.
