  # EU leader: US ‘committed’ to Iran nuclear deal
  
  By [![Image 1: Nicole Gaouette](https://media.cnn.com/api/v1/images/stellar/prod/160314170913-nicole-gaouette-profile.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/nicole-gaouette)[Nicole Gaouette](https://www.cnn.com/profiles/nicole-gaouette), [![Image 2: Elise Labott](https://media.cnn.com/api/v1/images/stellar/prod/160509135407-cnn-digital-expansion-dc-elise-labott.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/elise-labott-profile)[Elise Labott](https://www.cnn.com/profiles/elise-labott-profile)
  
