  ![Image 4: Rembrandt's drawing of a dog has been in the collection of the Herzog Anton Ulrich Museum in Braunschweig, Germany, since 1770, but was long thought to be the work of a different artist.](https://media.cnn.com/api/v1/images/stellar/prod/170215111849-rembrandt-terrier-germany.jpg?q=w_2836,h_2347,x_0,y_0,c_fill/w_1182)
  
  1 / 19
  
  Rembrandt's drawing of a dog has been in the collection of the Herzog Anton Ulrich Museum in Braunschweig, Germany, since 1770, but was long thought to be the work of a different artist.
  
  Courtesy: C.Cordes/Herzog Anton Ulrich Museum
  
  ![Image 5: In 2016, a drawing attributed to Italian master Leonardo da Vinci was discovered in Paris, after a portfolio of works was brought to Tajan auction house for valuation by a retired doctor. It was valued at 15 million euros ($16 million). ](https://media.cnn.com/api/v1/images/stellar/prod/161213131527-da-vinci-found-drawing-front.jpg?q=w_1600,h_900,x_0,y_0,c_fill/w_1182)
  
  2 / 19
  
  In 2016, a drawing attributed to Italian master Leonardo da Vinci was discovered in Paris, after a portfolio of works was brought to Tajan auction house for valuation by a retired doctor. It was valued at 15 million euros ($16 million).
  
  Courtesy Tajan
  
  ![Image 6: The drawing also features sketches of light and shadows and notes on the back.](https://media.cnn.com/api/v1/images/stellar/prod/161213131500-da-vinci-found-drawing-back.jpg?q=w_1600,h_900,x_0,y_0,c_fill/w_1182)
  
  3 / 19
  
  The drawing also features sketches of light and shadows and notes on the back.
  
  Courtesy Tajan
  
  ![Image 7: While researching for an episode of BBC's "Britain's Lost Masterpieces" series at the National Trust for Scotland's Haddo House collection in Aberdeenshire , art historian Bendor Grosvenor and a team of experts found a painting that could have been painted by artist Raphael. ](https://media.cnn.com/api/v1/images/stellar/prod/161003115141-haddo-madonna-raphael-1.jpg?q=w_1454,h_2048,x_0,y_0,c_fill/w_1182)
  
  4 / 19
  
  While researching for an episode of BBC's "Britain's Lost Masterpieces" series at the National Trust for Scotland's Haddo House collection in Aberdeenshire , art historian Bendor Grosvenor and a team of experts found a painting that could have been painted by artist Raphael.
  
  Courtesy National Trust for Scotland
  
  ![Image 8: In April 2016, a painting believed to be by Caravaggio was found in an attic in France. Experts said it could be worth $136 million. ](https://media.cnn.com/api/v1/images/stellar/prod/160413153444-lost-caravaggio-painting-lklv-bitterman-00002102.jpg?q=w_1920,h_1080,x_0,y_0,c_fill/w_1182)
  
  5 / 19
  
  In April 2016, a painting believed to be by Caravaggio was found in an attic in France. Experts said it could be worth $136 million.
  
  Reuters
  
  ![Image 9: The work was originally purchased for $25 dollars at the end of the 19th century. It could now be worth $26 million. ](https://media.cnn.com/api/v1/images/stellar/prod/161003115456-haddo-madonna-raphael-2.jpg?q=w_2048,h_1265,x_0,y_0,c_fill/w_1182)
  
  6 / 19
  
  The work was originally purchased for $25 dollars at the end of the 19th century. It could now be worth $26 million.
  
  Courtesy National Trust for Scotland
  
  ![Image 10: In 1911, Leonardo Da Vinci's "Mona Lisa" was stolen from the Louvre by an Italian who had been a handyman for the museum. The famous painting was recovered two years later.](https://media.cnn.com/api/v1/images/stellar/prod/130220142557-03-stolen-paintings-0220.jpg?q=w_1280,h_720,x_0,y_0,c_fill/w_1182)
  
  7 / 19
  
  In 1911, Leonardo Da Vinci's "Mona Lisa" was stolen from the Louvre by an Italian who had been a handyman for the museum. The famous painting was recovered two years later.
  
  JEAN-PIERRE MULLER/AFP/Getty Images
  
  ![Image 11: A statue called "Young Girl with Serpent" by Auguste Rodin was stolen from a home in Beverly Hills, California, in 1991. It was returned after someone offered it on consignment to Christie's auction house. Rodin, a French sculptor considered by some aficionados to have been the father of modern sculpture, lived from 1840 until 1917. His most famous work, "The Thinker," shows a seated man with his chin on his hand. ](https://media.cnn.com/api/v1/images/stellar/prod/150709130745-02-stolen-rodin-recovered.jpg?q=w_2000,h_1125,x_0,y_0,c_fill/w_1182)
  
  8 / 19
  
  A statue called "Young Girl with Serpent" by Auguste Rodin was stolen from a home in Beverly Hills, California, in 1991. It was returned after someone offered it on consignment to Christie's auction house. Rodin, a French sculptor considered by some aficionados to have been the father of modern sculpture, lived from 1840 until 1917. His most famous work, "The Thinker," shows a seated man with his chin on his hand.
  
  courtesy Art Recovery
  
  ![Image 12: Picasso's "La Coiffeuse" ("The Hairdresser") was <a href="http://www.cnn.com/2015/02/26/living/stolen-picasso-recovered/index.html" target="_blank">discovered missing</a> in 2001 and was recovered when it was shipped from Belgium to the United States in December 2014. The shipper said it was a $37 piece of art being sent to the United States as a Christmas present. The feds say it was actually a stolen Picasso, missing for more than a decade and worth millions of dollars. ](https://media.cnn.com/api/v1/images/stellar/prod/150317095304-picasso-hairdresser.jpg?q=w_1652,h_1195,x_0,y_0,c_fill/w_1182)
  
  9 / 19
  
  Picasso's "La Coiffeuse" ("The Hairdresser") was [discovered missing](http://www.cnn.com/2015/02/26/living/stolen-picasso-recovered/index.html) in 2001 and was recovered when it was shipped from Belgium to the United States in December 2014. The shipper said it was a $37 piece of art being sent to the United States as a Christmas present. The feds say it was actually a stolen Picasso, missing for more than a decade and worth millions of dollars.
  
  AFP/Getty Images
  
