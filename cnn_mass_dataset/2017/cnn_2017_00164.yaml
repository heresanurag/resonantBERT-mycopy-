  # Jordan beefs up its borders amid ISIS fears
  
  By [Jomana Karadsheh](https://www.cnn.com/profiles/jomana-karadsheh)
  
  Feb 3, 2017
  
  PUBLISHED Feb 3, 2017, 9:12 AM ET
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2017%2F02%2F03%2Fmiddleeast%2Fjordan-border-security-isis "Share with email")Link Threads
  
