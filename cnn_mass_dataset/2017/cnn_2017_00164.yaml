  Jordan is securing its border against ISIS
  
  2:36
  
  ### Story highlights
  
  Jordan reinforcing borders over concerns ISIS fighters from Iraq, Syria may move towards the country
  
  Nearly half of all armed forces now deployed to border regions, officials say
  
  A little over an hour’s drive from the Jordanian capital Amman, lies one of the most breathtaking and seemingly tranquil scenes in the country. But the lush mountainous terrain around al-Wahda dam near the Syrian border, is far from peaceful.
  
  Jordanian border guard are on a constant state of alert here. Their weapons pointed towards Syria’s green hills on the other side of Yarmouk river.
  
  Some of the villages across the river live under the control of an ISIS affiliate, the Khaled bin al-Waleed Brigade. The group has mostly been battling Free Syrian Army rebels but it has also tried to target Jordan, according to officials.
  
  Ad Feedback
  
  And as the US-led coalition forces step up their campaign on [ISIS](https://www.cnn.com/2014/08/08/world/isis-fast-facts/index.html) in Iraq’s Mosul and Syria’s Raqqa, Jordanian officials are warning that [pressure on jihadists](https://www.cnn.com/2017/01/18/middleeast/isis-loses-territory-in-iraq-syria/index.html)in these two countries may push them closer to Jordan’s doorstep.
  
  ## Changing targets?
  
  Jordan is a key US ally in the region; its security forces and air force have been among the most active members of the global coalition in the fight against the terror group.
  
  As ISIS may now be turning its attention to the Kingdom, Jordan is stepping up its efforts to secure its borders.
  
  [Related article ![Image 3: Jordan shootout](https://media.cnn.com/api/v1/images/stellar/prod/161218113351-jordan-shootout.jpg?q=x_223,y_103,h_906,w_1611,c_crop/h_720,w_1280/w_256) Shutterstock Why Jordan, 'Kingdom of Peace,' is no longer immune from attack](http://www.cnn.com/2016/12/19/middleeast/jordan-terrorism-attack-analysis/index.html)
  
  “We reinforced our borders especially in the northern part and eastern part,” Brig. Gen. Sami Kafawin, commander of Jordan’s border guard force, told CNN.
  
  “We (are) reinforced by manpower, equipment (and) the whole weapons system. We need to make a balance between the security and the fighting, if it happens.”
  
  Nearly half of all armed forces are now deployed to the border regions, Jordanian military officials say.
  
  Last June, a [suicide attack on the northeastern border](http://www.cnn.com/2016/06/21/middleeast/jordan-car-bomb-attack/) left at least seven security forces dead. It was the first attack of its kind targeting Jordan’s borders, then-deputy prime minister, Nasser Judeh told CNN’s Wolf Blitzer at the time.
  
  ## Foiled attempts
  
  Commanders stationed at the northern border told CNN their troops foil near daily smuggling or infiltration attempts and are always prepared for possible militant attacks.
  
  According to Kafawin, Jordan is readying for all kinds of threat scenarios because they know the group is going to try and expand its reach beyond Iraq and Syria and may divert resources to do so.
  
  And the newly appointed commander does not rule out the Kingdom requesting support from the US-led coalition in securing its borders.
  
  “I think the coalition is ready to support because we are not talking about Jordanian border – we are talking about the region which is part of the global coalition,” he said.
  
