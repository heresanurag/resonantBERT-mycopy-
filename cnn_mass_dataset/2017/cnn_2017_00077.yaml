  # Suspect in death of Kim Jong Un’s half brother seen wearing ‘LOL’ shirt
  
  By Brian Ries
  
  Updated Feb 17, 2017
  
  Updated Feb 16, 2017, 8:56 PM ET
  
  PUBLISHED Feb 16, 2017, 11:20 AM ET
  
  North Korea Asia Crime Aviation news
  
  [See all topics](http://www.cnn.com/follow)
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2017%2F02%2F16%2Fasia%2Fkim-cctv-shirt-trnd "Share with email")Link Threads
  
  Link Copied!
  
  ![Image 1: Closed-circuit TV from the Kuala Lumpur airport shows a suspect in the death of Kim Jong Un's half brother.](https://media.cnn.com/api/v1/images/stellar/prod/170216100450-malaysia-kim-jong-nam-suspect-closeup.jpg?q=w_1600,h_1132,x_0,y_0,c_fill/w_860)
  
  Closed-circuit TV from the Kuala Lumpur airport shows a suspect in the death of Kim Jong Un's half brother.
  
  Malay Mail
  
  ### Story highlights
  
  Two female suspects were carrying passports from Indonesia and Vietnam
  
  Kim Jong Nam apparently was poisoned as he waited to board a plane
  
  One of two women detained in connection with the [apparent lethal poisoning of North Korean leader Kim Jong Un’s half brother](http://www.cnn.com/2017/02/16/asia/kim-jong-nam-arrests-autopsy/index.html)was seen on airport surveillance video wearing a shirt with the letters “LOL” emblazoned across the front.
  
  Still images taken from closed-circuit TV show one of the suspects on the same day Kim Jong Nam was apparently killed at the airport, Selangor State Police Chief Abdul Samah Mat of the Royal Malaysian Police confirmed Thursday to CNN. The images were first obtained by the Malay Mail.
  
  The acronym, popular with social media and smartphone users, stands for “laugh out loud.”
  
  Ad Feedback
  
  ![Image 2: Surveillance footage shows woman with "LOL" shirt ](https://media.cnn.com/api/v1/images/stellar/prod/170216103423-01-malaysia-kim-jong-nam-suspect.jpg?q=w_3000,h_1688,x_0,y_0,c_fill/w_1093)
  
  Surveillance footage shows woman with "LOL" shirt
  
  Malay Mail
  
  The women, who were carrying an Indonesian passport and a Vietnamese passport, have been remanded into custody for seven days. A 26-year-old Malaysian man also has been arrested in the case. He is believed to be the boyfriend of one of the female suspects, Mat said.
  
  South Korea’s National Assembly Intelligence Committee [has concluded Kim was poisoned](http://www.cnn.com/2017/02/14/asia/kim-jong-un-half-brother-death/). Malaysian officials are yet to release the official autopsy results.
  
  ![Image 3: 02 malaysia kim jong nam suspect](https://media.cnn.com/api/v1/images/stellar/prod/170216103701-02-malaysia-kim-jong-nam-suspect.jpg?q=w_3000,h_1688,x_0,y_0,c_fill/w_1093)
  
  Malay Mail
  
  Malaysia’s Deputy Prime Minister Ahmad Zahid Hamidi dismissed reports of North Korean involvement during a news conference in Kuala Lumpur. “That is only speculation,” he said.
  
  [Related video ![Image 4: In a picture taken on June 4, 2010 Kim Jong-Nam, the eldest son of North Korean leader Kim Jong-Il, waves after an interview with South Korean media representatives in Macau. Kim Jong-Nam was in the limelight with Seoul's JoongAng Ilbo newspaper carrying a snatched interview with him at a hotel in Macau. Jong-Nam declined knowledge of the warship incident, it reported, and said his father is "doing well". North Korean Leader Leader Kim Jong-Il on June 7 attended a rare second annual session of parliament at which Kim's brother-in-law was promoted and the country's prime minister was sacked, state media reported. REPUBLIC OF KOREA OUT AFP PHOTO / JOONGANG SUNDAY VIA JOONGANG ILBO (Photo credit should read JoongAng Sunday/AFP/Getty Images)](https://media.cnn.com/api/v1/images/stellar/prod/170214174248-kim-jong-nam-getty.jpg?q=x_54,y_211,h_924,w_1642,c_crop/h_720,w_1280/w_256) In a picture taken on June 4, 2010 Kim Jong-Nam, the eldest son of North Korean leader Kim Jong-Il, waves after an interview with South Korean media representatives in Macau. Kim Jong-Nam was in the limelight with Seoul's JoongAng Ilbo newspaper carrying a snatched interview with him at a hotel in Macau. Jong-Nam declined knowledge of the warship incident, it reported, and said his father is "doing well". North Korean Leader Leader Kim Jong-Il on June 7 attended a rare second annual session of parliament at which Kim's brother-in-law was promoted and the country's prime minister was sacked, state media reported. REPUBLIC OF KOREA OUT AFP PHOTO / JOONGANG SUNDAY VIA JOONGANG ILBO (Photo credit should read JoongAng Sunday/AFP/Getty Images) JoongAng Sunday/AFP/Getty Images Kim Jong Nam's death in Malaysia](http://www.cnn.com/videos/world/2017/02/14/kim-jong-un-half-brother-death-sje-orig.cnn)
  
  Kim, the [first-born, illegitimate son](http://www.cnn.com/2017/02/16/asia/kim-jong-nam-profile/index.html) of the late leader Kim Jong Il, was apparently attacked as he waited to board a plane at Kuala Lumpur International Airport en route to the Chinese territory of Macau to visit relatives.
  
  “The deceased … felt like someone grabbed or held his face from behind,” Selangor State Criminal Investigations Department Chief Fadzil Ahmat told Reuters. “He felt dizzy, so he asked for help at the (airport) counter.”
  
