  ##### TV and movie characters with multiple personalities
  
  _Spoiler alert:_ _This story contains details about the ending of “Split.”_
  
  ### Story highlights
  
  The film has been at the top of the box office for three weeks
  
  Shyamalan says he has plans for a trilogy
  
  After three weeks of topping the box office, “Split” looks to be getting a sequel.
  
  The horror film, starring James McAvoy as a man with dissociative identity disorder (DID) who abducts three women, has [earned almost $100 million](http://www.boxofficemojo.com/movies/?id=split2017.htm) in North American theaters since its release.
  
  On Saturday, director M. Night Shyamalan tweeted, “I have an 11 page outline for my next film in my bag. I can’t tell you what it is, but If you’ve seen #Split…”
  
  Ad Feedback
  
  > > I have an 11 page outline for my next film in my bag. I can't tell you what it is, but If you've seen [#Split](https://twitter.com/hashtag/Split?src=hash&ref_src=twsrc%5Etfw)...
  
  > >
  
  > > — M. Night Shyamalan (@MNightShyamalan) [February 4, 2017](https://twitter.com/MNightShyamalan/status/827951147470225408?ref_src=twsrc%5Etfw)
  
  Those who have seen the new movie discover at the end that its story is actually a continuation of Shyamalan’s 2000 movie “Unbreakable.”
  
  [Shyamalan told USA Today](http://www.usatoday.com/story/life/movies/2017/01/22/spoilers-m-night-shyamalan-split-unbreakable-sequel/96792866/)that he plans on doing another film after “Split” which would tie the three movies together.
  
  [Related article ![Image 22: James McAvoy in Split a M. Night Shyamalan film. ](https://media.cnn.com/api/v1/images/stellar/prod/170122103314-01-movie-dissociative-identity-disorder.jpg?q=x_0,y_63,h_872,w_1551,c_crop/h_720,w_1280/w_256) James McAvoy in Split a M. Night Shyamalan film. Universal Pictures What Shyamalan's 'Split' gets wrong about dissociative identity disorder](http://www.cnn.com/2017/01/23/health/shyamalan-split-movie-dissociative-identity-disorder/index.html)
  
  “I do feel it’s important to keep making these original movies, that’s what I do, but I don’t mind this unusual trilogy existing in the group,” he said.
  
  While moviegoers have flocked to the theaters for “Split,” mental health professionals and those living with the disorder have been less enthused about the movie.
  
  [What Shyamalan’s ‘Split’ gets wrong about dissociative identity disorder](http://www.cnn.com/2017/01/23/health/shyamalan-split-movie-dissociative-identity-disorder/)
  
  “You are going to upset and potentially exacerbate symptoms in thousands of people who are already suffering,” psychiatrist Garrett Marie Deckel, a DID specialist at Mount Sinai’s Icahn School of Medicine, told CNN.
  
