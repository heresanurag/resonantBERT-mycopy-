  ![Image 2: <strong>Sengan-en, Kagoshima, Japan: </strong>The UNESCO World Heritage site of Sengan-en is a stately home and garden. Tea tours of the area reveal the lifestyle of a feudal lord, followed by a look at the traditional Japanese architecture and private inner garden. (<a href="https://www.flickr.com/photos/kimon/4549678962/in/album-72157623800403009/" target="_blank" target="_blank">Photo credit: KimonBerlin</a>)](https://media.cnn.com/api/v1/images/stellar/prod/170215141038-sengan-en-3.jpg?q=w_1600,h_900,x_0,y_0,c_fill/w_1182)
  
