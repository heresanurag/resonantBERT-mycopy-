  **Sengan-en, Kagoshima, Japan:**The UNESCO World Heritage site of Sengan-en is a stately home and garden. Tea tours of the area reveal the lifestyle of a feudal lord, followed by a look at the traditional Japanese architecture and private inner garden. ([Photo credit: KimonBerlin](https://www.flickr.com/photos/kimon/4549678962/in/album-72157623800403009/))
  
  KimonBerlin/Flickr
  
  ![Image 3: <strong>Rx Tea Time, Cheyenne, Wyoming:</strong> RX Tea Time wants to provide a wellness-focused tea experience. The tea house offers 27 teas -- all with respective health benefits, antioxidant levels, and caffeine content -- to choose from.](https://media.cnn.com/api/v1/images/stellar/prod/170209103915-spring-tea-setup-by-rx-tea-time.jpg?q=w_960,h_720,x_0,y_0,c_fill/w_1182)
  
  0 / 11
  
  **Rx Tea Time, Cheyenne, Wyoming:** RX Tea Time wants to provide a wellness-focused tea experience. The tea house offers 27 teas -- all with respective health benefits, antioxidant levels, and caffeine content -- to choose from.
  
