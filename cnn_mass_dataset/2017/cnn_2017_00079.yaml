  ![Image 3: syrian boy caught in heavy bombing video wedeman pkg_00004629.jpg](https://media.cnn.com/api/v1/images/stellar/prod/170218011009-syrian-boy-caught-in-heavy-bombing-video-wedeman-pkg-00004629.jpg?q=x_356,y_127,h_651,w_1158,c_crop/w_860)
  
  Syrian boy cries for father after losing legs
  
  1:58
  
  ### Story highlights
  
  Abdel Basit Al-Satouf was moved to the hospital in Turkey from Syria's Idlib province
  
  Bana Alabed appeals in a video taken by his bedside for help for the children of Syria
  
  Two days after [losing his legs in the bombing of a Syrian village](http://www.cnn.com/2017/02/17/middleeast/syrian-boy-caught-in-heavy-bombing-video/index.html), a 10-year-old boy received a special visitor Saturday at his hospital bedside.
  
  [Bana Alabed](http://www.cnn.com/2017/02/08/middleeast/bana-ankara-turkey/index.html), the 7-year-old girl whose [Twitter updates](http://www.cnn.com/2016/11/28/middleeast/bana-aleppo-twitter-account/index.html) during last year’s brutal siege of Aleppo drew global attention, tweeted a video of herself meeting Abdel Basit Al-Satouf at a hospital in Turkey and taking the boy gifts.
  
  “Yeeeeeeeeeeeees I am very happy, I’m meeting(Abdel Basit) the Syrian boy who lost both legs to bombing,” she said.
  
