  # Bana Alabed visits Syrian boy who lost legs in bombing
  
  By [![Image 1: Laura Smith-Spark](https://media.cnn.com/api/v1/images/stellar/prod/140929103347-laura-smith-spark-profile-image.jpg?q=x_2,y_0,h_898,w_1596,c_crop/h_270,w_480/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/laura-smith-spark)[Laura Smith-Spark](https://www.cnn.com/profiles/laura-smith-spark), Natalie Gallón
  
  Feb 18, 2017
  
  PUBLISHED Feb 18, 2017, 10:37 AM ET
  
  The Middle East Syria conflict
  
