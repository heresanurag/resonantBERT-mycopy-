  In the video, Bana hugs Abdel Basit as best she can, speaks to him and rubs his elbow. “My friends,” she says, as she looks directly at the camera, “please help the children of Syria. We will go to school. We will go to play. The war will not stop us. We strong.”
  
  [Related article ![Image 4: GRAPHIC CONTENT A Turkish police officer carries a migrant child's dead body (Aylan Shenu) off the shores in Bodrum, southern Turkey, on September 2, 2015 after a boat carrying refugees sank while reaching the Greek island of Kos. Thousands of refugees and migrants arrived in Athens on September 2, as Greek ministers held talks on the crisis, with Europe struggling to cope with the huge influx fleeing war and repression in the Middle East and Africa. / AFP / DOGAN NEWS AGENCY / Nilufer Demir (Photo credit should read NILUFER DEMIR/AFP/Getty Images)](https://media.cnn.com/api/v1/images/stellar/prod/160830102831-aylan-kurdi-carried.jpg?q=x_6,y_102,h_1658,w_2947,c_crop/h_720,w_1280/w_256) GRAPHIC CONTENT A Turkish police officer carries a migrant child's dead body (Aylan Shenu) off the shores in Bodrum, southern Turkey, on September 2, 2015 after a boat carrying refugees sank while reaching the Greek island of Kos. Thousands of refugees and migrants arrived in Athens on September 2, as Greek ministers held talks on the crisis, with Europe struggling to cope with the huge influx fleeing war and repression in the Middle East and Africa. / AFP / DOGAN NEWS AGENCY / Nilufer Demir (Photo credit should read NILUFER DEMIR/AFP/Getty Images) Nilufer Demir/AFP/AFP/Getty Images Alan Kurdi's journey: The children who survived and perished](http://www.cnn.com/2016/09/01/europe/alan-kurdi-anniversary-children-refugees/index.html)
  
  The boy looks sad as he lays his hands on sheets that cover the stumps where his legs used to be. He looks over at the gifts, then to his caregivers but remains mostly quiet as Bana speaks with him.
  
  Both children now find themselves in Turkey, displaced from their homes by Syria’s almost 6-year-long civil war.
  
  Bana has lived in Turkey since she and her family fled the besieged eastern portion of Aleppo in December.
  
  Abdel Basit was moved Friday by aid workers to the hospital in Hatay province after his condition improved, said Mustafa Ozbek, a spokesman for the Humanitarian Relief Foundation.
  
  The aid organization also tweeted a picture of Bana’s visit.
  
  > > The voice of Aleppo [@AlabedBana](https://twitter.com/AlabedBana?ref_src=twsrc%5Etfw) has visited Abdulbasit today in the hospital where he is under treatment in Hatay. [pic.twitter.com/9s093x96BA](https://t.co/9s093x96BA)
  
  > >
  
  > > — IHH Humanitarian Relief Foundation (@IHHen) [February 18, 2017](https://twitter.com/IHHen/status/832895958224625664?ref_src=twsrc%5Etfw)
  
  The boy was initially treated at a hospital in Syria’s Idlib province, according to a photo posted by Syrian opposition activists.
  
  A video circulated by the activists on social media showed him lying amid thick clouds of smoke, screaming in agony. “Baba, carry me, baba!” he cries out, unable to stand, his legs blown off at the knee.
  
  ![Image 5: Abdel Basit Al-Satouf, 10, lost his mother and sister in the bombing, a monitoring group said.](https://media.cnn.com/api/v1/images/stellar/prod/170217035312-syrian-boy-loses-legs.jpg?q=w_1920,h_1080,x_0,y_0,c_fill/w_1093)
  
  Abdel Basit Al-Satouf, 10, lost his mother and sister in the bombing, a monitoring group said.
  
  Facebook/Idlib al-Hadath
  
  The airstrike on the small village of al-Habit was one of 10 attacks to hit the southern countryside of Idlib on Thursday. The UK-based monitoring network Syrian Observatory for Human Rights reports five people died in the attacks.
  
  The boy’s mother and sister were among them, it said.
  
  [Related article ![Image 6: Bana Alabed reads letter to Trump](https://media.cnn.com/api/v1/images/stellar/prod/170127173959-bana-alabed-reads-letter-to-trump.jpg?q=x_2,y_0,h_1078,w_1915,c_crop/h_720,w_1280/w_256) Fatemah Alabed Syrian girl reads letter asking Donald Trump to save her friends](http://www.cnn.com/2017/01/27/europe/donald-trump-bana-alabed-letter/index.html)
  
  The monitoring group said the barrel bomb attack came from Syrian army warplanes. CNN cannot independently verify claims of the origin of the attack. There’s been no comment from the Syrian regime or Syrian state media.
  
  [Since 2015](http://www.cnn.com/videos/world/2015/04/02/pkg-cnni-parker-syria-idlib-capture.cnn/video/playlists/syrian-president-bashar-al--assads-regime/), Idlib has been under rebel-control and is currently covered by a nationwide ceasefire deal brokered by Russia and Turkey in December. The [ceasefire](http://www.cnn.com/2016/12/29/middleeast/syria-ceasefire-russia-turkey-analysis/) requires the Syrian government to halt military operations against anyone who isn’t affiliated with ISIS or other terror groups, state-run Syrian Arab News Agency reported.
  
  A 2016 report by Save the Children says barrel bombs, airstrikes and shelling are the biggest issues threatening the 250,000 children estimated to be living in besieged areas in Syria.
  
