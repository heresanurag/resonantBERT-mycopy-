  # Trump’s Sweden comment raises questions
  
  By [![Image 1: Eric Bradner](https://media.cnn.com/api/v1/images/stellar/prod/141231144627-eric-bradner.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/eric-bradner)[Eric Bradner](https://www.cnn.com/profiles/eric-bradner)
  
  Updated Feb 20, 2017
  
  Updated Feb 20, 2017, 9:44 AM ET
  
  PUBLISHED Feb 19, 2017, 12:23 PM ET
  
  Donald Trump Immigration
  
