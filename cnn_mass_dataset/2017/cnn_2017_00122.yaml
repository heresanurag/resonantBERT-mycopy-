  # Angus King: Republicans made a ‘terrible’ mistake on Warren
  
  By [![Image 1: Eli Watkins](https://media.cnn.com/api/v1/images/stellar/prod/160314165840-eli-watkins-profile.jpg?q=x_0,y_0,h_900,w_1599,c_fill/h_270,w_480/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/eli-watkins)[Eli Watkins](https://www.cnn.com/profiles/eli-watkins)
  
