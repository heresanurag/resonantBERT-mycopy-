  # Flashback Friday: The first African-American House member
  
  By [![Image 1: Brenna Williams](https://media.cnn.com/api/v1/images/stellar/prod/150102122010-brenna-williams.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/brenna-williams)[Brenna Williams](https://www.cnn.com/profiles/brenna-williams)
  
  Feb 17, 2017
  
  PUBLISHED Feb 17, 2017, 1:21 PM ET
  
  Race & ethnicity Human rights
  
  [See all topics](http://www.cnn.com/follow)
  
