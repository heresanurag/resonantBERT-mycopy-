  # US Special Ops chief: More than 60,000 ISIS fighters killed
  
  By [![Image 3: Ryan Browne](https://media.cnn.com/api/v1/images/stellar/prod/160315184142-ryan-browne-headshot.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/ryan-browne)[Ryan Browne](https://www.cnn.com/profiles/ryan-browne)
  
  Updated Feb 15, 2017
  
  Updated Feb 15, 2017, 2:28 AM ET
  
  PUBLISHED Feb 14, 2017, 3:50 PM ET
  
