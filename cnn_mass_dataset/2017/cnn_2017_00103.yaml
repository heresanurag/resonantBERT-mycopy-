  # Bad weather causes lettuce shortages across Europe
  
  By Judith Vonberg
  
  Feb 3, 2017
  
  PUBLISHED Feb 3, 2017, 10:09 AM ET
  
  Agriculture Storms
  
  [See all topics](http://www.cnn.com/follow)
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2017%2F02%2F03%2Feurope%2Flettuce-shortage-europe "Share with email")Link Threads
  
  Link Copied!
  
  ![Image 1: Broccoli is one of several vegetable crops affected by the unusually cold, wet weather in southern Spain.](https://media.cnn.com/api/v1/images/stellar/prod/170203113619-01-vegetable-shortage-europe.jpg?q=w_3000,h_2001,x_0,y_0,c_fill/w_860)
  
  Broccoli is one of several vegetable crops affected by the unusually cold, wet weather in southern Spain.
  
  Pablo Blazquez Dominguez/Getty Images
  
  ### Story highlights
  
  Heavy rain and snow in southern Spain have destroyed vegetable crops
  
  Consumers across Europe are facing rising prices and rationing
  
  Cold, wet weather in southern Spain has devastated supplies of iceberg lettuces to consumers across Europe.
  
  Other vegetables, including broccoli, artichokes and aubergines, also known as eggplants, have been hit.
  
  Many European countries rely on the Spanish regions of Murcia, Almeria and Valencia for the supply of these and other vegetables during the winter months. A shortage of zucchini, also called courgettes, caused by the same spell of bad weather recently prompted consumers to take to social media using the hashtag #courgettecrisis.
  
  Ad Feedback
  
  “Southern Spain is the bread basket for Europe in the winter,” Anthony Gardiner of [G’s](http://www.gs-fresh.com/), a major supplier of fresh produce to supermarkets across Europe, told CNN. “It has its own micro-climate. It’s warm and dry, almost desert-like.”
  
  [Related article ![Image 2: A migrant stands next to a snow-covered tent at the Moria hotspot on the island of Lesbos , following heavy snowfalls on January 7, 2017. The number of migrants arriving in Europe by two main sea routes in 2016 plunged by almost two-thirds to 364,000 compared with the previous year, EU border agency Frontex said Friday. Frontex pointed to an EU border deal with Turkey which came into effect in March as having paved the way to a massive decline in the arrival of Syrian refugees and other migrants in Greece. / AFP / STR (Photo credit should read STR/AFP/Getty Images)](https://media.cnn.com/api/v1/images/stellar/prod/170109110300-02-refugees-suffer-europe-cold-snap.jpg?q=x_0,y_0,h_1391,w_2471,c_fill/h_720,w_1280/w_256) A migrant stands next to a snow-covered tent at the Moria hotspot on the island of Lesbos , following heavy snowfalls on January 7, 2017. The number of migrants arriving in Europe by two main sea routes in 2016 plunged by almost two-thirds to 364,000 compared with the previous year, EU border agency Frontex said Friday. Frontex pointed to an EU border deal with Turkey which came into effect in March as having paved the way to a massive decline in the arrival of Syrian refugees and other migrants in Greece. / AFP / STR (Photo credit should read STR/AFP/Getty Images) STR/AFP/Getty Images Conditions worsen for Europe's refugees as temperatures plummet](http://www.cnn.com/2017/01/09/europe/refugees-suffer-europe-cold-snap/index.html)
  
  But this winter has been different.
  
  “We’ve seen horrific weather on our farms in the Murcia region,” Gardiner said. “Over four days just before Christmas, the region had the same amount of rainfall that London gets in six months. It was an absolute deluge, and a lot of crops were washed away.”
  
  A cold snap pushing across southern Europe over the New Year period compounded the problems.
  
  “We saw snow on the beaches in Murcia,” Gardiner said. “In those conditions, the produce effectively stops growing. We’re now seeing that starting to hit the shelves.”
  
  Fernando Gomez, general manager of [Proexport](http://www.proexport.es/inicio/index.aspx), an association of more than 50 producers and exporters of fruits and vegetables in Murcia, told CNN that supply of lettuces from the region had fallen by 40% due to the bad weather. Supplies of artichokes and broccoli are down by 20% to 30%. Vegetables grown in greenhouses including tomatoes and cucumbers are also affected.
  
  ![Image 3: Spain's Murcia province has seen heavy snowfall for the first time in decades. Many crops have been ruined.](https://media.cnn.com/api/v1/images/stellar/prod/170203113914-03-vegetable-shortage-europe.jpg?q=w_3000,h_2000,x_0,y_0,c_fill/w_1093)
  
  Spain's Murcia province has seen heavy snowfall for the first time in decades. Many crops have been ruined.
  
  Pablo Blazquez Dominguez/Getty Images
  
  Produce that has survived the heavy rains and freezing temperatures is now growing slower due to unusually high humidity levels, Gomez explained. “We are replanting now, but the produce will take longer than normal to mature – 70 to 80 days – if the weather doesn’t change.”
  
  According to Gomez, other European countries make up 90% of the market for the region’s vegetables. More than half of those exports go to the UK and Germany alone, while France and the Netherlands also rely heavily on Spanish vegetables.
  
  Some UK supermarkets are restricting the number of lettuces each customer can buy, and prices have also risen sharply. German consumers are now paying €2 (about $2.15) for a head of lettuce, according to Gardiner, [up from 75 cents](https://www.ami-informiert.de/ami-maerkte/maerkte/ami-gartenbau/ami-meldungen-gartenbau/meldungen-single-ansicht/article/winterliche-witterung-in-suedeuropa-verknappt-salatangebot.html) in mid-December.
  
  ![Image 4: The shortage of lettuces is affecting supermarkets across Europe, including this one in London.](https://media.cnn.com/api/v1/images/stellar/prod/170203114103-05-vegetable-shortage-europe-uk-restricted.jpg?q=w_3000,h_2001,x_0,y_0,c_fill/w_1093)
  
  The shortage of lettuces is affecting supermarkets across Europe, including this one in London.
  
  Victoria Jones/PA Images via Getty Images
  
  “We’re shipping over Californian lettuces to try to meet the demand,” Gardiner said. “But this means we’re creating extra demand in that market, which is also pushing prices up. It’s a very challenging situation.”
  
  [Related article ![Image 5: To go with Millenary olive trees story by Miquel Ros ](https://media.cnn.com/api/v1/images/stellar/prod/170123151724-canet-4patas.jpg?q=x_0,y_0,h_900,w_1599,c_fill/h_720,w_1280/w_256) To go with Millenary olive trees story by Miquel Ros Courtesy Mancomunitat Taula del Sènia Why 1,000-year-old olive oil is Spain's freshest new flavor](http://www.cnn.com/travel/article/millenary-olive-trees-spain/index.html)
  
  It is not only consumers who are feeling the effects.
  
  “People in Murcia have been badly affected by the weather,” Gardiner said. “Some farmers have been washed out of their houses by the floods.”
  
  And with lettuce as Spain’s [biggest vegetable export](http://www.fepex.es/en-gb_datos-del-sector/exportacion-importacion-espa%C3%B1ola-frutas-hortalizas), there could be broader economic consequences, too.
  
  Gardiner predicts that supply will only return to normal in April or May, when produce grown in Britain and other European countries becomes available.
  
  Gomez is more hopeful.
  
  “We’re already seeing the prices of some affected products falling, such as cucumbers,” he said. “I hope supply will be back to normal by the end of March.”
  
  “There are very good reasons to grow these crops here,” Gomez said. “We’ve got the sun, the expertise and a history of being able to produce the kind of crops that can’t be grown elsewhere in Europe at this time of year. That’s not going to change.”
  
