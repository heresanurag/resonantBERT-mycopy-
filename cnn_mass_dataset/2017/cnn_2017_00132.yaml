  Washington—
  
  For those of you keeping track, it’s now three days in a row without any executive actions by President Donald Trump, but, of course, stay tuned for updates!
  
  As more of the President’s cabinet picks push through to a Senate floor vote and the President himself touts some tough long-distance phone calls, much of the buzz on Capitol Hill still centers on what’s happening with his immigration orders and which “R” word has the most juice when it comes to Obamacare: repeal, replace, or … drumroll … repair?
  
  **EXECUTIVE ACTIONS** – As we said, all was quiet on that front today.
  
  Ad Feedback
  
  **OBAMACARE**
  
  *    Repair, repeal, replace? On Groundhog Day, Republicans once again find themselves in a war of words, this time over [how to describe](http://www.cnn.com/2017/02/02/politics/obamacare-repair-republicans-aca/index.html) their health care efforts.
  
  *    Meanwhile, is the repeal plan [shrinking](http://www.cnn.com/2017/02/02/politics/gop-incredible-shrinking-obamacare-repeal/)?
  
  *    Former Lousiana Gov. (and 2016 presidential candidate) Bobby Jindal [weighed in](https://twitter.com/BobbyJindal/status/827161435528642563) with a tongue twister on Twitter, saying, “On Obamacare, Republicans who want to retreat from repeal to repair should be replaced.”
  
  *    What are these Medicaid block grants that many Republicans want? Here’s a [helpful explainer.](http://money.cnn.com/2017/02/02/news/economy/medicaid-block-grants-gop/index.html?iid=hp-stack-dom)
  
  **OBAMACARE/IMMIGRATION** – Trump’s immigration ban could make America’s rural doctor shortage [even worse](http://money.cnn.com/2017/02/02/news/economy/trump-visa-ban-doctor-shortage/index.html?iid=hp-toplead-dom).
  
  **IMMIGRATION**
  
  *    Trump pledged to help out “big-league” with Mexico’s “tough hombres” in a [controversial call](http://www.cnn.com/2017/02/01/politics/malcolm-turnbull-donald-trump-pena-nieto/) with President Enrique Peña Nieto. And #TBT, here’s an [unearthed](http://www.cnn.com/2017/02/02/politics/kfile-trump-on-border-2011/index.html) interview from 2011 where Trump said he would put American soldiers on the border to stop illegal immigration.
  
  *    Fallout from Trump’s travel ban continues, as more than 1,000 bodegas in New York City – largely owned and operated by Yemeni-Americans – [went on strike](http://money.cnn.com/2017/02/01/news/new-york-yemeni-bodega-shutdown/index.html?iid=hp-toplead-dom) Thursday.
  
  *   [Uber’s CEO told Trump he won’t be joining](http://money.cnn.com/2017/02/02/technology/uber-travis-kalanick-trump-advisory-council/index.html?iid=hp-toplead-dom) the President’s business advisory group because of concerns over new policies.
  
  *    DREAMers can go to college, but they [can’t get student loans](http://money.cnn.com/2017/02/02/pf/college/wells-fargo-dreamers-student-loans/index.html?iid=hp-stack-dom).
  
  *    Trump’s ban is [impacting students](http://money.cnn.com/2017/02/01/pf/college/somalia-somaliland-students-trump-travel-ban/index.html?iid=hp-grid-dom)at the Abaarso boarding school in Somaliland, which is known for sending its students to elite universities in the US. Also, American basketball [players are stuck](http://money.cnn.com/2017/02/02/news/trump-iran-ban-basketball-players/index.html?iid=hp-grid-dom) in Dubai.
  
  *    The Miami Herald [reports](http://www.miamiherald.com/news/politics-government/state-politics/article130192194.html) on how the fight against sanctuary cities is taking hold in the Florida state legislature and one of their reporters [tweeted](https://twitter.com/doug_hanks) about developments on the Miami front this afternoon.
  
  **TRADE**
  
  *    After a meeting with the Senate Finance and House Ways and Means committee leaders, Trump [called NAFTA a “catastrophe”](http://money.cnn.com/2017/02/02/news/economy/mexico-nafta-negotiations-90-days/index.html) and said he wanted to “speed up” talks for a new trade deal with Mexico and Canada. Meantime, Mexico is prepared to begin renegotiating NAFTA in May, after a 90-day period during which Peña Nieto will consult with Mexican businesses.
  
  *    Here’s a [look](http://money.cnn.com/2017/02/02/news/economy/border-adjustment-tax-for-and-against/index.html) at the coming fight over the border adjustment tax.
  
  *    Will Mexicans [say adios](http://money.cnn.com/2017/02/02/news/economy/mexico-boycott-america-trump/index.html?iid=hp-stack-dom) to American goods?
  
  **TAXES** – Despite reservations from Sen. John McCain, Mick Mulvaney moved closer to becoming the next OMB director, [surviving party-line votes](http://www.cnn.com/2017/02/02/politics/mick-mulvaney-advances-omb-homeland-security-budget/index.html) in the Senate Budget and Homeland Security Committees.
  
  **ENVIRONMENT/ENERGY**
  
  *    Senate EPW Chairman John Barrasso [took a page](http://www.cnn.com/2017/02/02/politics/scott-pruitt-epa-gop-rule-suspension/index.html) out of Sen. Orrin Hatch’s playbook, and suspended his committee rules to vote EPA administrator nominee Scott Pruitt out of committee and to the Senate floor.
  
  *    Rep. Jason Chaffetz is [withdrawing](http://www.idahostatesman.com/news/local/news-columns-blogs/letters-from-the-west/article130291054.html) his [bill](https://www.congress.gov/bill/115th-congress/house-bill/621) that proposed to sell off 3.3 million acres of public land in 10 western states. Trump, his son Don Jr., and incoming Interior Secretary Ryan Zinke all oppose selling public lands.
  
  *    In a huge victory for the coal industry, the Senate, following the House’s lead Wednesday, voted to repeal a rule that requires coal and mining companies to monitor nearby streams for pollutants. Environmentalists say without the rule, there’s no data by which to hold the industry accountable in the event of polluted water. The repeal awaits the President’s signature.
  
  **INFRASTRUCTURE** – The right-leaning American Action Forum put out a [report](https://www.americanactionforum.org/research/practicality-private-sector-funded-infrastructure/) raising questions about the “practicality of a private sector funded infrastructure,” and noting that urban areas are most likely to benefit from the draft plans that have circulated.
  
  **TAX CUTS** – House Ways and Means Chair Rep. Kevin Brady, R-Texas, gives a speech on tax reform to a forum at Georgetown University’s law school.
  
