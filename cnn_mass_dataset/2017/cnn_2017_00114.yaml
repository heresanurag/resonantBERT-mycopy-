  # Niall Horan: One Direction reunion is ‘definitely’ happening
  
  By [![Image 1: Chloe Melas](https://media.cnn.com/api/v1/images/stellar/prod/170126173139-chloe-melas.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/chloe-melas)[Chloe Melas](https://www.cnn.com/profiles/chloe-melas)
  
  Feb 15, 2017
  
  PUBLISHED Feb 15, 2017, 11:17 AM ET
  
  Music
  
  [See all topics](http://www.cnn.com/follow)
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2017%2F02%2F15%2Fcelebrities%2Fone-direction-reunion-niall-horan-interview "Share with email")Link Threads
  
  Link Copied!
  
  ![Image 2: one direction](https://media.cnn.com/api/v1/images/stellar/prod/160129101238-one-direction.jpg?q=w_3000,h_2032,x_0,y_0,c_fill/w_860)
  
  Jonathan Leibson/Getty Images North America
  
  ### Story highlights
  
  One Direction's Niall Horan said in an interview Tuesday that the band is 'definitely' getting back together
  
  Horan said the remaining members of the band are focusing on solo projects for now, but don't write them off just yet
  
  Dust off your One Direction gear because the band might be getting back together.
  
  Niall Horan, one of the band members, suggested in an interview that loyal “Directioners” shouldn’t lose hope for a reunion.
  
  “It will definitely happen, of course,” Horan told the[Australian radio show “Smallzy’s Surgery”](http://www.nova969.com.au/show/niall-horan-opens-about-future-one-direction) on Tuesday. “As I’ve said many times, we’d be stupid not to.”
  
  Ad Feedback
  
  One Direction went on extended hiatus last March, but they always promised their fans it wasn’t permanent. Shortly before the band announced their split,[Zayn Malik quit](http://www.cnn.com/2015/03/25/entertainment/feat-zayn-malik-leaving-one-direction/) to pursue a solo career.
  
  [Related: Zayn Malik quits One Direction](http://www.cnn.com/2015/03/25/entertainment/feat-zayn-malik-leaving-one-direction/)
  
  Fans have worried that the hiatus is reminiscent of what happened with the boy band ‘NSync. They announced a hiatus in 2002, then went years before taking the stage together again. They reunited in 2013 at the MTV Video Music Awards for a medley of greatest hits.
  
  Even Horan, who released his debut single, “This Town,” last year, admitted that for now everyone in One Direction is focusing on solo projects.
  
  “I’m doing [my music], going to be doing a bit of a tour. Harry’s got his movie coming out, Harry’s doing his thing,” Horan said. “Louis’s doing his thing and Liam’s doing his thing. A year has gone so quick already. But when [a reunion] does happen, it’s going to be great.”
  
  Horan did not reveal when fans can expect to see them take the stage together again.
  
