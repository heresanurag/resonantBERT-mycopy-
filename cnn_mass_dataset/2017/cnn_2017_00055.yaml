  # British Museum exhibit explores the art of South Africa
  
  By [![Image 2: Phoebe Parke](https://media.cnn.com/api/v1/images/stellar/prod/160426154050-phoebe-parke-profile.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/phoebe-parke)[Phoebe Parke](https://www.cnn.com/profiles/phoebe-parke), for CNN
  
  Updated Feb 9, 2017
  
  Updated Feb 9, 2017, 11:50 AM ET
  
  PUBLISHED Feb 9, 2017, 10:57 AM ET
  
  Africa Visual arts UK
  
