  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2017%2F02%2F09%2Fafrica%2Fsouth-africa-art-british-museum "Share with email")Link Threads
  
  Link Copied!
  
  ![Image 3: South African artist Esther Mahlangu's collaboration with BMW is on show at the 'South Africa: art of a nation' exhibition, which runs until February 26 at the British Museum in London. ](https://media.cnn.com/api/v1/images/stellar/prod/170208145407-esther-mahlangu-bmw.jpg?q=w_2489,h_3172,x_0,y_0,c_fill/w_860)
  
  South African art that represents the country
  
  6 photos
  
  South African artist Esther Mahlangu's collaboration with BMW is on show at the 'South Africa: art of a nation' exhibition, which runs until February 26 at the British Museum in London.
  
  Courtesy BMW Group Archives/Esther Mahlangu
  
  South African art that represents the country
  
  ![Image 4: This mixed media painting by Willie Bester from 1994 is one example of the contemporary art scene in South Africa. Works such as a self-portrait from Lionel Davis' and 3D installation by Mary Sibande also feature in the exhibition. ](https://media.cnn.com/api/v1/images/stellar/prod/170208151404-willie-bester-art-south-africa.jpg?q=w_2528,h_1720,x_0,y_0,c_fill/w_1182)
  
  -1 / 6
  
  Willie Bester —
  
  This mixed media painting by Willie Bester from 1994 is one example of the contemporary art scene in South Africa. Works such as a self-portrait from Lionel Davis' and 3D installation by Mary Sibande also feature in the exhibition.
  
  Courtesy Willie Bester
  
  ![Image 5: "'South Africa: the art of a nation' is a chance to explore the long and diverse history of South African art," said Hartwig Fischer, Director of the British Museum in statement, "and challenge audience preconceptions in the way our visitors have come to expect from a British Museum exhibition."<br />South Africa: the art of a nation is on until February 26 at The British Museum. ](https://media.cnn.com/api/v1/images/stellar/prod/170208145712-south-africa-art-exhibition-shot.jpg?q=w_3279,h_2239,x_0,y_0,c_fill/w_1182)
  
  0 / 6
  
  South Africa: the art of a nation —
  
  "'South Africa: the art of a nation' is a chance to explore the long and diverse history of South African art," said Hartwig Fischer, Director of the British Museum in statement, "and challenge audience preconceptions in the way our visitors have come to expect from a British Museum exhibition."
  
  South Africa: the art of a nation is on until February 26 at The British Museum.
  
  Courtesy The Trustees of the British Museum
  
  ![Image 6: South African artist Esther Mahlangu's collaboration with BMW is on show at the 'South Africa: art of a nation' exhibition, which runs until February 26 at the British Museum in London. ](https://media.cnn.com/api/v1/images/stellar/prod/170208145407-esther-mahlangu-bmw.jpg?q=w_2489,h_3172,x_0,y_0,c_fill/w_1182)
  
  1 / 6
  
  Esther Mahlangu —
  
  South African artist Esther Mahlangu's collaboration with BMW is on show at the 'South Africa: art of a nation' exhibition, which runs until February 26 at the British Museum in London.
  
  Courtesy BMW Group Archives/Esther Mahlangu
  
  ![Image 7: Karel Nel collected the white ochre on the left hand side of this painting, called 'Potent Fields', from Nelson Mandela's ancestral lands in the Eastern Cape. The juxtaposition of the different colors is said to echo the color divide of apartheid. ](https://media.cnn.com/api/v1/images/stellar/prod/170208150817-karel-nel-potent-fields.jpg?q=w_2885,h_1493,x_0,y_0,c_fill/w_1182)
  
  2 / 6
  
  Karel Nel —
  
  Karel Nel collected the white ochre on the left hand side of this painting, called 'Potent Fields', from Nelson Mandela's ancestral lands in the Eastern Cape. The juxtaposition of the different colors is said to echo the color divide of apartheid.
  
  Courtesy The Trustees of the British Museum
  
  ![Image 8: Also on display are these dolls made from gun cartridges from the late 19th Century. The exhibition explores the history of South Africa over the past 100,000 years. ](https://media.cnn.com/api/v1/images/stellar/prod/170208150615-south-africa-gun-cartridge-dolls.jpg?q=w_3641,h_2775,x_0,y_0,c_fill/w_1182)
  
  3 / 6
  
  Gun cartridge dolls —
  
  Also on display are these dolls made from gun cartridges from the late 19th Century. The exhibition explores the history of South Africa over the past 100,000 years.
  
  Courtesy The Trustees of the British Museum
  
  ![Image 9: This Zulu beaded waistcoat, is made of glass and wool, and is thought to have been created before 1987 in South Africa. ](https://media.cnn.com/api/v1/images/stellar/prod/170208152120-south-africa-waistcoat.jpg?q=w_2480,h_3139,x_0,y_0,c_fill/w_1182)
  
  4 / 6
  
  Beaded waistcoat —
  
  This Zulu beaded waistcoat, is made of glass and wool, and is thought to have been created before 1987 in South Africa.
  
  Courtesy The Trustees of the British Museum
  
  ![Image 10: This mixed media painting by Willie Bester from 1994 is one example of the contemporary art scene in South Africa. Works such as a self-portrait from Lionel Davis' and 3D installation by Mary Sibande also feature in the exhibition. ](https://media.cnn.com/api/v1/images/stellar/prod/170208151404-willie-bester-art-south-africa.jpg?q=w_2528,h_1720,x_0,y_0,c_fill/w_1182)
  
  5 / 6
  
  Willie Bester —
  
  This mixed media painting by Willie Bester from 1994 is one example of the contemporary art scene in South Africa. Works such as a self-portrait from Lionel Davis' and 3D installation by Mary Sibande also feature in the exhibition.
  
  Courtesy Willie Bester
  
  ![Image 11: "'South Africa: the art of a nation' is a chance to explore the long and diverse history of South African art," said Hartwig Fischer, Director of the British Museum in statement, "and challenge audience preconceptions in the way our visitors have come to expect from a British Museum exhibition."<br />South Africa: the art of a nation is on until February 26 at The British Museum. ](https://media.cnn.com/api/v1/images/stellar/prod/170208145712-south-africa-art-exhibition-shot.jpg?q=w_3279,h_2239,x_0,y_0,c_fill/w_1182)
  
  6 / 6
  
  South Africa: the art of a nation —
  
  "'South Africa: the art of a nation' is a chance to explore the long and diverse history of South African art," said Hartwig Fischer, Director of the British Museum in statement, "and challenge audience preconceptions in the way our visitors have come to expect from a British Museum exhibition."
  
  South Africa: the art of a nation is on until February 26 at The British Museum.
  
  Courtesy The Trustees of the British Museum
  
  ![Image 12: South African artist Esther Mahlangu's collaboration with BMW is on show at the 'South Africa: art of a nation' exhibition, which runs until February 26 at the British Museum in London. ](https://media.cnn.com/api/v1/images/stellar/prod/170208145407-esther-mahlangu-bmw.jpg?q=w_2489,h_3172,x_0,y_0,c_fill/w_1182)
  
  7 / 6
  
  Esther Mahlangu —
  
  South African artist Esther Mahlangu's collaboration with BMW is on show at the 'South Africa: art of a nation' exhibition, which runs until February 26 at the British Museum in London.
  
  Courtesy BMW Group Archives/Esther Mahlangu
  
  ![Image 13: Karel Nel collected the white ochre on the left hand side of this painting, called 'Potent Fields', from Nelson Mandela's ancestral lands in the Eastern Cape. The juxtaposition of the different colors is said to echo the color divide of apartheid. ](https://media.cnn.com/api/v1/images/stellar/prod/170208150817-karel-nel-potent-fields.jpg?q=w_2885,h_1493,x_0,y_0,c_fill/w_1182)
  
