  # Tesla driver saves man’s life, gets surprise from Elon Musk
  
  By [Madeline Holcombe](https://www.cnn.com/profiles/madeline-holcombe)
  
  Feb 17, 2017
  
  PUBLISHED Feb 17, 2017, 12:59 PM ET
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2017%2F02%2F17%2Fus%2Ftesla-unconscious-driver-trnd "Share with email")Link Threads
  
  Link Copied!
  
  ![Image 1: A man in Germany damaged his Tesla after coming across an unconscious driver on the Autobahn.](https://media.cnn.com/api/v1/images/stellar/prod/170217111949-unconscious-driver-on-autobahn.jpg?q=w_1925,h_1083,x_0,y_0,c_fill/w_860)
  
  A man in Germany damaged his Tesla after coming across an unconscious driver on the Autobahn.
  
  Steiger/Munich Fire Department/Facebook
  
  ### Story highlights
  
  Man sacrificed his Tesla to save an ailing motorist
  
  Tesla CEO Elon Musk congratulated him
  
  It’s not every day a car crash saves a life, or gets you a shout-out from one of the car industry’s biggest names.
  
  Manfred Kick was driving his Tesla Model S down the Autobahn near Munich, Germany on Monday, when he noticed something was amiss. The Volkswagen Passat ahead of him was out of control, swerving and slamming into the guardrail.
  
  When he took a closer look, he saw the driver was slumped over the steering wheel, apparently unconscious.Kick immediately called emergency services.
  
  Ad Feedback
  
  He could have driven off and hoped for the best, but it was clear the situation was still dangerous. Kick was concerned the other car wasn’t stopping, and he told the German newspaper [Muencher Merkur](https://www.merkur.de/lokales/muenchen-lk/garching-ort28709/spektakulaere-rettung-auf-a9-tesla-stoppt-wagen-ausser-kontrolle-7399151.html) “it was clear the driver needed urgent help.”
  
  How do you stop a speeding car? Kick settled on some Newtonian physics. He risked his safety—and his Tesla—and pulled in front of the unconscious driver’s car. He carefully slowed until the Passat hit his rear bumper and continued to brake until he brought both cars to a stop. He stayed with the driver and waited until help arrived. According to Muencher Merkur, police and fire responders took the driver to a nearby hospital where he was treated for a possible stroke and internal injuries.
  
  No surprise, the story of his heroism gained some traction. Two days later, Tesla CEO Elon Musk tweeted out a show of his appreciation, and he made sure Kick wouldn’t have to pay too much for his good deed.
  
  > > In appreciation, Tesla is providing all repair costs free of charge and expedited. [https://t.co/D68HNJcCoQ](https://t.co/D68HNJcCoQ)
  
  > >
  
  > > — Elon Musk (@elonmusk) [February 15, 2017](https://twitter.com/elonmusk/status/831972613912080384?ref_src=twsrc%5Etfw)
  
  So not only did Kick save a man’s life, he also has a seriously impressive story to tell about it.
  
