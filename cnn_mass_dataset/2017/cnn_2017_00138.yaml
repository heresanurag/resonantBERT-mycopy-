  ### Story highlights
  
  CAS: "Clear evidence of doping"
  
  Russian has not raced since 2013
  
  Caster Semenya in line for 2012 Olympic gold
  
  Russia’s Mariya Savinova-Farnosova has been stripped of her London 2012 Olympic gold medal and banned for four years after “clear evidence” was found that the 800-meter champion used performance-enhancing drugs.
  
  The 31-year-old’s results from July 2010 and August 2013 have been annulled, meaning she also loses her 2011 world title, 2013 world silver medal and 2010 European gold.
  
  ![Image 37: Savinova celebrates after her London 2012 win.](https://media.cnn.com/api/v1/images/stellar/prod/170210141400-mariya-savinova.jpg?q=w_2584,h_1620,x_0,y_0,c_fill/w_632)
  
  Savinova celebrates after her London 2012 win.
  
  ERIC FEFERBERG/AFP/AFP/Getty Images
  
  The Court of Arbitration for Sport (CAS) said Friday there was “clear evidence” from her biological passport the runner had been “engaged in using doping.”
  
  Ad Feedback
  
  If the International Olympic Committee decides to reallocate the London 2012 gold medal, then runner-up Caster Semenya will become a double champion, following her [800m triumph at Rio 2016.](http://cnn.com/2016/08/17/sport/rio-2016-olympics-caster-semenya-south-africa-800-meters/)
  
  The South African was also second behind Savinova-Farnosova at the 2011 World Championships.
  
  [READ: Russian doping report alleges ‘institutional conspiracy’](http://edition.cnn.com/2016/12/09/sport/wada-russia-doping-mclaren-report/)
  
  [READ: The human misery of state-sponsored doping](http://edition.cnn.com/2015/11/13/sport/east-germany-doping-iaaf-russia/)
  
  ![Image 38: Semenya (left) and Savinova with their medals at the 2011 worlds in South Korea.  ](https://media.cnn.com/api/v1/images/stellar/prod/170210163649-caster-semenya-maria-savinova-2011-medals.jpg?q=w_4407,h_2938,x_0,y_0,c_fill/w_1093)
  
  Semenya (left) and Savinova with their medals at the 2011 worlds in South Korea.
  
  Mark Dadswell/Getty Images AsiaPac/Getty Images/file
  
  With her ban backdated to 2015, Savinova-Farnosova will not be able to compete until 2019.
  
  She is the second Russian from the 2012 800m final to be retrospectively banned. Yelena Arzhakova, who finished sixth, was banned for two years in 2013 for doping.
  
  [Related video ![Image 39: Russia's Paralympians compete during a track meet at the Novogorsk Training Center, outside Moscow, on September 8, 2016, as part of the country's two-day competition for its athletes banned from the Rio 2016 Paralympic Games over evidence of state-run doping. / AFP / Kirill KUDRYAVTSEV (Photo credit should read KIRILL KUDRYAVTSEV/AFP/Getty Images)](https://media.cnn.com/api/v1/images/stellar/prod/160908181808-rio-paralympics-3.jpg?q=x_5,y_245,h_2655,w_4719,c_crop/h_720,w_1280/w_256) Russia's Paralympians compete during a track meet at the Novogorsk Training Center, outside Moscow, on September 8, 2016, as part of the country's two-day competition for its athletes banned from the Rio 2016 Paralympic Games over evidence of state-run doping. / AFP / Kirill KUDRYAVTSEV (Photo credit should read KIRILL KUDRYAVTSEV/AFP/Getty Images) KIRILL KUDRYAVTSEV/AFP/AFP/Getty Images Kremlin denies latest doping allegations](http://www.cnn.com/videos/world/2016/12/28/russia-doping-nyt-reaction-chance-lkl.cnn)
  
  Savinova has not raced since 2013. She was suspended during an investigation started by the release of undercover footage filmed by whistleblower Yuliya Stepanova.
  
  The Russian track and field team was suspended by athletics’ governing body, the IAAF, in November 2015 for state-sponsored doping.
  
  The World Anti-Doping Agency had recommended [five athletes and five coaches be banned for life](http://cnn.com/2015/11/09/sport/athletics-doping-wada-coe/), including Savinova-Farnosova.
  
  [Visit cnn.com/sport for more news and videos](http://cnn.com/sport)
  
  The country’s athletes missed last year’s Rio Olympics and will be absent at August’s World Championships in London after the IAAF voted to extend Russia’s suspension.
  
