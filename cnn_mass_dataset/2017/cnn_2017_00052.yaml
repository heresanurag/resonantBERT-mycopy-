  # Kanye West deletes all tweets defending Trump meeting
  
  By [![Image 2: Deena Zaru](https://media.cnn.com/api/v1/images/stellar/prod/150512163444-deena-zaru.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/deena-zaru)[Deena Zaru](https://www.cnn.com/profiles/deena-zaru)
  
  Updated Aug 16, 2017
  
  Updated Aug 16, 2017, 1:52 PM ET
  
  PUBLISHED Feb 6, 2017, 2:40 PM ET
  
  Donald Trump Kanye West People in entertainment Music
  
