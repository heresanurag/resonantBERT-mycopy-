  ![Image 4: President-elect Donald Trump and Kanye West pose for a picture in the lobby of Trump Tower in New York, Tuesday, Dec. 13, 2016. (AP Photo/Seth Wenig)](https://media.cnn.com/api/v1/images/stellar/prod/161213102630-02-kanye-west-trump-tower-1213.jpg?q=x_0,y_0,h_1687,w_2997,c_fill/w_860)
  
  Kanye meets with Donald Trump
  
  0:58
  
  ### Story highlights
  
  West previously said that had he voted, he would have voted for Trump
  
  West met with Trump at Trump Tower in December
  
  Washington—
  
  Kanye West deleted all of his tweets defending his [meeting with President Donald Trump](http://www.cnn.com/2016/12/13/politics/kanye-west-donald-trump-trump-tower/) sometime between Sunday night and Monday morning.
  
  West, who met with Trump at Trump Tower in December, explained his meeting with the then-President-elect in the series of now-deleted tweets amid intense backlash from fans and friends like John Legend.
  
  “I wanted to meet with Trump today to discuss multicultural issues,” West tweeted on December 13.
  
  Ad Feedback
  
  ![Image 5: Kanye West deleted Trump tweet 1](https://media.cnn.com/api/v1/images/stellar/prod/170206133741-kanye-west-deleted-trump-tweet-1.jpg?q=w_1152,h_648,x_0,y_0,c_fill/w_1093)
  
  “These issues included bullying, supporting teachers, modernizing curriculums, and violence in Chicago,” he added.
  
  ![Image 6: Kanye west deleted trump tweet 2](https://media.cnn.com/api/v1/images/stellar/prod/170206133634-kanye-west-deleted-trump-tweet-2.jpg?q=w_1152,h_648,x_0,y_0,c_fill/w_1093)
  
  “I feel it is important to have a direct line of communication with our future President if we truly want change,” he continued in a third tweet.
  
  As criticism mounted, West [appeared unfazed](http://www.cnn.com/2016/12/14/politics/kanye-west-donald-trump-john-legend-meeting/) a day later when he tweeted a picture a signed copy of TIME Magazine’s “Person of the Year” issue with Trump on the cover.
  
  “To Kanye You are a great friend Thanks,” the front cover reads, followed by Trump’s signature.
  
  This tweet has also been deleted.
  
  West’s representatives did not immediately respond to a CNN request for comment.
  
  [Barack Obama’s evolution in 10 years of hip-hop lyrics](http://www.cnn.com/2017/01/18/politics/obama-legacy-hip-hop-lyrics/)
  
  Last week, Long Island rapper King Myers released the track “Propaganda,” – an anti-Trump anthem that calls for the impeachment of the new President and voices solidarity with refugees, immigrants and Muslims, a song which Myers billed as produced by West. West’s G.O.O.D. music label denied that West produced that track or that the label has any official involvement with King Meyers. King Meyers disputed G.O.O.D. music’s assertion but declined to provide evidence that he was signed to the label.
  
  Previously, a source with knowledge of West’s meeting with Trump told CNN that the rapper’s main concern is the state of his hometown, Chicago.
  
  “Finding ways to effect change for that particular issue has been heavy on Kanye’s mind for years and he has been talking about it more often most recently with family and friends,” the source said. “His hope is that he will be able to keep this issue fresh on the mind of the Trump administration and they will make making Chicago safe again a priority.”
  
  [Related article ![Image 7: donald trump hillary clinton hip hop politics](https://media.cnn.com/api/v1/images/stellar/prod/161025115846-donald-trump-hillary-clinton-hip-hop-politics.jpg?q=x_0,y_0,h_900,w_1599,c_fill/h_720,w_1280/w_256) How hip-hop turned on Trump and settled for Clinton in 2016](http://www.cnn.com/2016/11/02/politics/election-2016-hip-hop-vote-hillary-clinton-donald-trump/index.html)
  
  West, who was hospitalized in November due to exhaustion, shocked fans in California when he abruptly ended a concert with a rant in which he proclaimed that if he had voted, he would have voted for Trump.
  
  “I told y’all I didn’t vote, right?” Kanye said. “But if I would’ve voted, I would’ve voted for Trump.”
  
  His surprising support for Trump was met with anger and confusion in the hip-hop community as activists and artists [gear up for a political battle](http://www.cnn.com/2016/11/22/politics/hip-hop-reacts-to-donald-trump-win/)against the Trump administration amid fears that Trump could threaten civil rights of minority groups.
  
  _UPDATE: This story has been updated to reflect the disputed relationship between West’s G.O.O.D. music label and rapper King Myers._
  
  _CNN’s Chloe Melas contributed to this report._
  
