  # Melania Trump debuts as White House hostess alongside Netanyahus
  
  By Kate Bennett
  
  Updated Feb 15, 2017
  
  Updated Feb 15, 2017, 6:06 PM ET
  
  PUBLISHED Feb 15, 2017, 3:35 PM ET
  
  Trump family People in entertainment
  
