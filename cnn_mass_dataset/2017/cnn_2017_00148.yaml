  ### Story highlights
  
  A group of Republican senators sent a letter to President Donald Trump on Thursday
  
  It urged him to take a firmer line on Russia
  
  Washington—
  
  A group of Republican senators released a stern letter to President Donald Trump on Thursday calling for a “tough-minded and principled policy” toward Russia and urging that Trump “should maintain the current US sanctions regime” until Russian policy in Ukraine and Syria is changed.
  
  The group also raised the controversial Russian hacking activities during the 2016 election.
  
  “We must recognize and counter the active cyber and information warfare Russia is conducting, including attempted interference in our democratic elections process (with a) firm response,” the letter said.
  
