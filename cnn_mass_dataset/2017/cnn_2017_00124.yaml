  # Woman arrested in death of Kim Jong Un’s half brother
  
  By [![Image 1: Ben Westcott](https://media.cnn.com/api/v1/images/stellar/prod/150820163747-profile-background-stock-no-photo.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/ben-westcott)[Ben Westcott](https://www.cnn.com/profiles/ben-westcott), [![Image 2: Joshua Berlinger](https://media.cnn.com/api/v1/images/stellar/prod/150428160301-joshua-berlinger-profile.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/joshua-berlinger)[Joshua Berlinger](https://www.cnn.com/profiles/joshua-berlinger)
  
