  # DeVos, Sessions expected to be confirmed in tight votes
  
  By [![Image 1: Ted Barrett](https://media.cnn.com/api/v1/images/stellar/prod/140929115817-ted-barrett-profile-image.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/ted-barrett)[Ted Barrett](https://www.cnn.com/profiles/ted-barrett), [![Image 2: Tom LoBianco](https://media.cnn.com/api/v1/images/stellar/prod/160314165249-tom-lobianco-profile.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/tom-lobianco)[Tom LoBianco](https://www.cnn.com/profiles/tom-lobianco)
  
  Feb 6, 2017
  
  PUBLISHED Feb 6, 2017, 6:36 AM ET
  
