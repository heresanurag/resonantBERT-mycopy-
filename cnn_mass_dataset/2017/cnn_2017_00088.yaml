  # 9 things to do in the yoga capital of the world
  
  by Motez Bishara
  
  Updated Jun 21, 2019
  
  Updated Jun 20, 2019, 9:39 PM ET
  
  PUBLISHED Feb 16, 2017, 2:37 PM ET
  
  Winding down Wellness Religion
  
