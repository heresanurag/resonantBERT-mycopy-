  From the Beatles to bungee jumping: Rishikesh offers ...
  
  15 photos
  
  **Yoga capital of the world:**International Yoga Day, which is being celebrated on June 21, was proposed by Indian Prime Minister Narendra Modi in 2014 to the UN General Assembly and adopted unanimously. There's no better place to celebrate than Rishikesh -- the "yoga capital of the world." But there's much more to do here.
  
  SAJJAD HUSSAIN/AFP/AFP/Getty Images
  
  From the Beatles to bungee jumping: Rishikesh offers much more than yoga
  
  ![Image 2: <strong>Nightly ritual: </strong>Haridwar has its own nightly aarti sessions, which are less catered to tourists. Be wary of false holy men looking to fleece you for a "donation," however. ](https://media.cnn.com/api/v1/images/stellar/prod/170127143522-haridwar-aarti.jpg?q=w_2437,h_1625,x_0,y_0,c_fill/w_1182)
  
  -1 / 15
  
  **Nightly ritual:**Haridwar has its own nightly aarti sessions, which are less catered to tourists. Be wary of false holy men looking to fleece you for a "donation," however.
  
  Motez Bishara
  
  ![Image 3: <strong>Feet-dipping: </strong>Dipping your feet in the Ganges is tradition -- as displayed by this group in Haridwar. But the river runs rapidly and the banks can be slippery with moss, so do exercise caution.  ](https://media.cnn.com/api/v1/images/stellar/prod/170127143229-haridwar-bathers-2.jpg?q=w_2437,h_1625,x_0,y_0,c_fill/w_1182)
  
  0 / 15
  
  **Feet-dipping:**Dipping your feet in the Ganges is tradition -- as displayed by this group in Haridwar. But the river runs rapidly and the banks can be slippery with moss, so do exercise caution.
  
  Motez Bishara
  
  ![Image 4: <strong>Yoga capital of the world: </strong>International Yoga Day, which is being celebrated on June 21, was proposed by Indian Prime Minister Narendra Modi in 2014 to the UN General Assembly and adopted unanimously. There's no better place to celebrate than Rishikesh -- the "yoga capital of the world." But there's much more to do here. ](https://media.cnn.com/api/v1/images/stellar/prod/190621082512-international-yoga-day.jpg?q=w_1615,h_900,x_0,y_0,c_fill/w_1182)
  
  1 / 15
  
  **Yoga capital of the world:**International Yoga Day, which is being celebrated on June 21, was proposed by Indian Prime Minister Narendra Modi in 2014 to the UN General Assembly and adopted unanimously. There's no better place to celebrate than Rishikesh -- the "yoga capital of the world." But there's much more to do here.
  
  SAJJAD HUSSAIN/AFP/AFP/Getty Images
  
  ![Image 5: <strong>Rishikesh:</strong> Although the Beatles put Rishikesh on the map in 1968 with their trip to the Maharishi's ashram, the holy town on the banks of the Ganges river has recently become a hub for outdoor activities. ](https://media.cnn.com/api/v1/images/stellar/prod/140206172627-beatles-travel-rishikesh.jpg?q=w_2087,h_1377,x_0,y_0,c_fill/w_1182)
  
  2 / 15
  
  **Rishikesh:** Although the Beatles put Rishikesh on the map in 1968 with their trip to the Maharishi's ashram, the holy town on the banks of the Ganges river has recently become a hub for outdoor activities.
  
  Hulton Archive/Getty Images
  
  ![Image 6: <strong>Aarti:</strong> Celebratory Hindu aarti sessions are performed nightly in Rishikesh, with music played and fire lit as offerings to the Ganges River.](https://media.cnn.com/api/v1/images/stellar/prod/170127132934-rishikesh-ganga-arti.jpg?q=w_2437,h_1625,x_0,y_0,c_fill/w_1182)
  
  3 / 15
  
  **Aarti:** Celebratory Hindu aarti sessions are performed nightly in Rishikesh, with music played and fire lit as offerings to the Ganges River.
  
  Motez Bishara
  
  ![Image 7: <strong>The Beatles: </strong>The meditation hall at the former ashram of the Maharishi Mahesh Yogi in Rishikesh is festooned with graffiti, much of it celebrating the Beatles' visit in 1968. ](https://media.cnn.com/api/v1/images/stellar/prod/151210122323-beatles-ashram7.jpg?q=w_1900,h_1096,x_0,y_0,c_fill/w_1182)
  
  4 / 15
  
  **The Beatles:**The meditation hall at the former ashram of the Maharishi Mahesh Yogi in Rishikesh is festooned with graffiti, much of it celebrating the Beatles' visit in 1968.
  
  STR/AFP/AFP/Getty Images
  
  ![Image 8: <strong>Dear Prudence: </strong>The Beatles Ashram has been open to the public since 2015. Although much of it has been let in ruins, meditation caves like these inspired the song "Dear Prudence." ](https://media.cnn.com/api/v1/images/stellar/prod/170127133439-rishikesh-beatles-cave.jpg?q=w_2437,h_1625,x_0,y_0,c_fill/w_1182)
  
  5 / 15
  
  **Dear Prudence:**The Beatles Ashram has been open to the public since 2015. Although much of it has been let in ruins, meditation caves like these inspired the song "Dear Prudence."
  
  Motez Bishara
  
  ![Image 9: <strong>Peanut brittle:</strong> A market vendor in Rishikesh Town sells fresh peanut brittle. India accounts for 16% of the world's peanut production, according to the Food and Agriculture Organization of the United Nations. ](https://media.cnn.com/api/v1/images/stellar/prod/170127134413-haridwar-peanut-brittle.jpg?q=w_2437,h_1625,x_0,y_0,c_fill/w_1182)
  
  6 / 15
  
  **Peanut brittle:** A market vendor in Rishikesh Town sells fresh peanut brittle. India accounts for 16% of the world's peanut production, according to the Food and Agriculture Organization of the United Nations.
  
  Motez Bishara
  
  ![Image 10: <strong>Bustling markets:</strong> Rishikesh Town offers a sight unseen by most tourists visiting the holy city. It's akin to the more manic side of India, with busy street markets and bustling traffic. ](https://media.cnn.com/api/v1/images/stellar/prod/170127144022-rishikesh-town-night-market.jpg?q=w_2437,h_1625,x_0,y_0,c_fill/w_1182)
  
  7 / 15
  
  **Bustling markets:** Rishikesh Town offers a sight unseen by most tourists visiting the holy city. It's akin to the more manic side of India, with busy street markets and bustling traffic.
  
  Motez Bishara
  
  ![Image 11: <strong>Kirtan:</strong> Kirtan players in Rishikesh chant mantras to the gods that last for hours, often playing to no audiences. It is worthwhile sitting in on a session, and participation is usually welcomed. ](https://media.cnn.com/api/v1/images/stellar/prod/170127143802-rishikesh-kirtan.jpg?q=w_2437,h_1625,x_0,y_0,c_fill/w_1182)
  
  8 / 15
  
  **Kirtan:** Kirtan players in Rishikesh chant mantras to the gods that last for hours, often playing to no audiences. It is worthwhile sitting in on a session, and participation is usually welcomed.
  
  Motez Bishara
  
  ![Image 12: <strong>Kailashananda: </strong>A view of the enormous Kailashananda ashram from the other side of the Ganges, with the busy Lakshman Jhula foot bridge connecting the two sides of town.   ](https://media.cnn.com/api/v1/images/stellar/prod/170127151119-rishikesh-lakshman-jhula-night.jpg?q=w_2437,h_1625,x_0,y_0,c_fill/w_1182)
  
  9 / 15
  
  **Kailashananda:**A view of the enormous Kailashananda ashram from the other side of the Ganges, with the busy Lakshman Jhula foot bridge connecting the two sides of town.
  
  Motez Bishara
  
  ![Image 13: <strong>Yoga: </strong>Rishikesh boasts one of the largest clusters of yoga centers in the world. This yoga school features a giant tree wrapped in red rope to signify its holy status. ](https://media.cnn.com/api/v1/images/stellar/prod/170127142645-rishikesh-yoga-tree.jpg?q=w_2437,h_1625,x_0,y_0,c_fill/w_1182)
  
  10 / 15
  
