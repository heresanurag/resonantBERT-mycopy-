  # Young girl diagnosed with ‘tree man’ syndrome in Bangladesh
  
  By [Sugam Pokharel](https://www.cnn.com/profiles/sugam-pokharel)
  
  Updated Feb 1, 2017
  
  Updated Feb 1, 2017, 3:49 PM ET
  
  PUBLISHED Feb 1, 2017, 10:58 AM ET
  
  Asia
  
