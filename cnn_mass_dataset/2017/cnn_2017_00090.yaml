  # How downtown Los Angeles made a stunning comeback
  
  by Andrea Lo
  
  Updated Feb 17, 2017
  
  Updated Feb 16, 2017, 9:09 PM ET
  
  PUBLISHED Feb 15, 2017, 8:09 PM ET
  
  Food & drink
  
  [See all topics](http://www.cnn.com/follow)
  
