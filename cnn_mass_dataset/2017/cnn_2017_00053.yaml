  ![Image 4: The <a href="https://www.instagram.com/everydayastronaut/" target="_blank" target="_blank">Everyday Astronaut</a> of Instagram fame is spreading awareness for scientists to march on Washington, as seen in this widely shared image from last week. "I fear the idea of censorship of the scientific community," Tim Dodd said.](https://media.cnn.com/api/v1/images/stellar/prod/170131101943-everyday-astronaut-make-space-great-again-wide.jpg?q=w_2700,h_1800,x_0,y_0,c_fill/w_860)
  
  Everyday Astronaut brings science to life
  
  10 photos
  
  The [Everyday Astronaut](https://www.instagram.com/everydayastronaut/) of Instagram fame is spreading awareness for scientists to march on Washington, as seen in this widely shared image from last week. "I fear the idea of censorship of the scientific community," Tim Dodd said.
  
  Tim Dodd/Everyday Astronaut
  
  Everyday Astronaut brings science to life
  
  ![Image 5: The project started with a joke. In 2013, he purchased a "Russian high altitude flight suit" online. The following year, he started using the suit to create images to teach people about science via the Instagram account.](https://media.cnn.com/api/v1/images/stellar/prod/170131102028-everyday-astronaut-reverberant-chamber-wide.jpg?q=w_4443,h_2962,x_0,y_0,c_fill/w_1182)
  
  -1 / 10
  
  The project started with a joke. In 2013, he purchased a "Russian high altitude flight suit" online. The following year, he started using the suit to create images to teach people about science via the Instagram account.
  
  Tim Dodd/Everyday Astronaut
  
  ![Image 6: "I try to tap into peoples' curiosity and get their gears turning. It's scientific communication through humor and imagination," Dodd said.](https://media.cnn.com/api/v1/images/stellar/prod/170131102107-everyday-astronaut-vacuuming-the-vacuum-chamber-wide.jpg?q=w_2922,h_1948,x_0,y_0,c_fill/w_1182)
  
  0 / 10
  
  "I try to tap into peoples' curiosity and get their gears turning. It's scientific communication through humor and imagination," Dodd said.
  
  Tim Dodd/Everyday Astronaut
  
  ![Image 7: The <a href="https://www.instagram.com/everydayastronaut/" target="_blank" target="_blank">Everyday Astronaut</a> of Instagram fame is spreading awareness for scientists to march on Washington, as seen in this widely shared image from last week. "I fear the idea of censorship of the scientific community," Tim Dodd said.](https://media.cnn.com/api/v1/images/stellar/prod/170131101943-everyday-astronaut-make-space-great-again-wide.jpg?q=w_2700,h_1800,x_0,y_0,c_fill/w_1182)
  
  1 / 10
  
  The [Everyday Astronaut](https://www.instagram.com/everydayastronaut/) of Instagram fame is spreading awareness for scientists to march on Washington, as seen in this widely shared image from last week. "I fear the idea of censorship of the scientific community," Tim Dodd said.
  
  Tim Dodd/Everyday Astronaut
  
  ![Image 8: "I will 100% be going to Washington DC to march" for science, Dodd said. The date for the <a href="https://www.marchforscience.com/" target="_blank" target="_blank">march</a> is April 22.](https://media.cnn.com/api/v1/images/stellar/prod/170131102051-everyday-astronaut-someday-youll-be-like-this-wide.jpg?q=w_3334,h_2223,x_0,y_0,c_fill/w_1182)
  
  2 / 10
  
  "I will 100% be going to Washington DC to march" for science, Dodd said. The date for the [march](https://www.marchforscience.com/) is April 22.
  
  Tim Dodd/Everyday Astronaut
  
  ![Image 9: Dodd works to bring "space down to Earth for everyday people," as part of an Instagram project he started in 2014. ](https://media.cnn.com/api/v1/images/stellar/prod/170131101824-everyday-astronaut-coin-operated-rocket-wide.jpg?q=w_4978,h_3319,x_0,y_0,c_fill/w_1182)
  
  3 / 10
  
  Dodd works to bring "space down to Earth for everyday people," as part of an Instagram project he started in 2014.
  
  Tim Dodd/Everyday Astronaut
  
  ![Image 10: "I typically will hide facts and Easter eggs about something current in space or science," Dodd said. He created this image after <a href="http://money.cnn.com/2016/09/27/technology/spacex-elon-musk-mars-colonization/">Space X announced its plan to send people to Mars</a>.](https://media.cnn.com/api/v1/images/stellar/prod/170131101850-everyday-astronaut-day-dreamin-wide.jpg?q=w_2348,h_1562,x_0,y_0,c_fill/w_1182)
  
  4 / 10
  
  "I typically will hide facts and Easter eggs about something current in space or science," Dodd said. He created this image after [Space X announced its plan to send people to Mars](http://money.cnn.com/2016/09/27/technology/spacex-elon-musk-mars-colonization/).
  
  Tim Dodd/Everyday Astronaut
  
  ![Image 11: <a href="https://www.instagram.com/p/qAWrd3ntyX/" target="_blank" target="_blank">This image</a> was born of Dodd's mourning for the shuttle program. "I felt a little lost and sad about (the end of) the <a href="http://www.cnn.com/2011/US/07/08/space.shuttle/">manned space program</a>" in July 2011.](https://media.cnn.com/api/v1/images/stellar/prod/170131101904-everyday-astronaut-its-just-not-the-same-wide.jpg?q=w_2624,h_1749,x_0,y_0,c_fill/w_1182)
  
  5 / 10
  
  [This image](https://www.instagram.com/p/qAWrd3ntyX/) was born of Dodd's mourning for the shuttle program. "I felt a little lost and sad about (the end of) the [manned space program](http://www.cnn.com/2011/US/07/08/space.shuttle/)" in July 2011.
  
  Tim Dodd/Everyday Astronaut
  
  ![Image 12: Dodd creates digital works of art, sometimes layering multiple photos to take people to far-off places.](https://media.cnn.com/api/v1/images/stellar/prod/170131101921-everyday-astronaut-keep-exploring-friends-wide.jpg?q=w_4170,h_2780,x_0,y_0,c_fill/w_1182)
  
  6 / 10
  
  Dodd creates digital works of art, sometimes layering multiple photos to take people to far-off places.
  
  Tim Dodd/Everyday Astronaut
  
  ![Image 13: He says he always knew he wanted to be an astronaut when he grew up. Instead he grew up to be the "Everyday Astronaut."](https://media.cnn.com/api/v1/images/stellar/prod/170131102121-everyday-astronaut-i-always-knew-what-i-wanted-to-be-wide.jpg?q=w_2237,h_1491,x_0,y_0,c_fill/w_1182)
  
  7 / 10
  
  He says he always knew he wanted to be an astronaut when he grew up. Instead he grew up to be the "Everyday Astronaut."
  
  Tim Dodd/Everyday Astronaut
  
  ![Image 14: The Everyday Astronaut visited Myanmar in 2015, where he had the chance to teach children about space for two weeks.](https://media.cnn.com/api/v1/images/stellar/prod/170131101958-everyday-astronaut-myanmar-wide.jpg?q=w_4814,h_3209,x_0,y_0,c_fill/w_1182)
  
  8 / 10
  
  The Everyday Astronaut visited Myanmar in 2015, where he had the chance to teach children about space for two weeks.
  
