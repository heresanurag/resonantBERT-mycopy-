  # This man in a space suit has a message for Earthlings
  
  By [![Image 3: Christina Zdanowicz](https://media.cnn.com/api/v1/images/stellar/prod/140926160415-christina-zdanowicz-profile-image.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/christina-zdanowicz-profile)[Christina Zdanowicz](https://www.cnn.com/profiles/christina-zdanowicz-profile)
  
  Updated Feb 1, 2017
  
  Updated Feb 1, 2017, 12:18 PM ET
  
  PUBLISHED Feb 1, 2017, 9:38 AM ET
  
  Space programs
  
