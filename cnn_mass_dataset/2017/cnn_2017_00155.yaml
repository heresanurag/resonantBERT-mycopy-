  # Buckley exits DNC chair race, backs Ellison
  
  By [![Image 1: Sophie Tatum](https://media.cnn.com/api/v1/images/stellar/prod/160314170229-sophie-tatum.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/sophie-tatum)[Sophie Tatum](https://www.cnn.com/profiles/sophie-tatum)
  
  Updated Feb 19, 2017
  
  Updated Feb 18, 2017, 9:56 PM ET
  
