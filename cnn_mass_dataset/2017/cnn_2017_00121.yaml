  **Editor’s Note:**Paul Begala, a Democratic strategist and CNN political commentator, was a political consultant for Bill Clinton’s presidential campaign in 1992 and was counselor to Clinton in the White House. He was a consultant to Priorities USA Action, the pro-Hillary Clinton super PAC. The opinions expressed in this commentary are his.
  
  ### Story highlights
  
  Paul Begala: Donald Trump's complaints about leaks in Flynn case are a shiny object meant to distract from Russia contacts story
  
  Ironic, he says: Trump won office largely due to leaks and well-timed Comey statements. Trump should shed light, not cry foul
  
  In the face of mounting revelations of contacts between his campaign advisers and Russian intelligence, Donald Trump’s best strategy is to come clean: [release his tax returns](http://money.cnn.com/2017/02/13/news/economy/trump-tax-returns-kevin-brady/), answer all questions, recuse Attorney General Jeff Sessions from any inquiries and fully cooperate with an independent investigation. That is the only way to put to rest once and for all the notion that the President is compromised by our adversaries in Moscow.
  
  Fat chance.
  
  [For Trump, chaotic White House becomes the norm](http://www.cnn.com/2017/02/16/politics/donald-trump-power-white-house/)
  
  Ad Feedback
  
  Skilled in the dark arts of deception, Trump instead is turning to a favorite tactic, one that has served him well in the past: Deploy weapons of mass distraction. “Look over there!” he yells, and we do. As a reality TV star, he knows our attention span is short, our desire for drama acute and our interest in shiny new objects extreme.
  
  So he’s shouting “Sabotage!” He’s decrying leaks, and his allies are calling for an investigation of the leakers. Not of the Russians. Not of the campaign advisers who U.S. investigators’ allege spoke with Russians repeatedly throughout the campaign. Not of the [supposed compromising information](http://www.cnn.com/2017/02/15/politics/trump-russia-issues/index.html) the Russians are reported to have on our new President. No, he’s attacking the whistleblowers.
  
  [Related article ![Image 36: GRAND JUNCTION, CO - OCTOBER 18: Republican presidential candidate Donald Trump (L) jokes with retired Gen. Michael Flynn as they speak at a rally at Grand Junction Regional Airport on October 18, 2016 in Grand Junction Colorado. Trump is on his way to Las Vegas for the third and final presidential debate against Democratic rival Hillary Clinton. (Photo by George Frey/Getty Images)](https://media.cnn.com/api/v1/images/stellar/prod/170114094510-trump-flynn-campaign-trail.jpg?q=x_0,y_205,h_1942,w_3452,c_crop/h_720,w_1280/w_256) GRAND JUNCTION, CO - OCTOBER 18: Republican presidential candidate Donald Trump (L) jokes with retired Gen. Michael Flynn as they speak at a rally at Grand Junction Regional Airport on October 18, 2016 in Grand Junction Colorado. Trump is on his way to Las Vegas for the third and final presidential debate against Democratic rival Hillary Clinton. (Photo by George Frey/Getty Images) George Frey/Getty Images Can Congress force Flynn to testify?](http://www.cnn.com/2017/02/15/opinions/can-congress-investigate-flynn-cevallos/index.html)
  
  Keep in mind that when[he paid $25 million](http://money.cnn.com/2016/11/18/news/trump-university-settlement/) to people suing him for fraud over Trump University, he distracted the media by [tweeting an attack on the cast of the Broadway musical “Hamilton.](http://www.cnn.com/2016/11/20/politics/donald-trump-hamilton-feud/)” Mr. Trump apparently thought it was rude for cast members to lecture Mike Pence about diversity and inclusion. Because we all know Donald Trump is a stickler for good manners.
  
  But it won’t work this time. Because this time the story goes on, whether he likes it or not. Nothing short of full disclosure and an independent investigation will end the story of Russia’s attempt to tilt the election to Trump.
  
  Donald Trump whining about leaks is like Jack the Ripper complaining about paper cuts. He is President in large part[due to leaks.](http://www.bbc.com/news/world-us-canada-37639370)Had the Russians not hacked and robbed the emails of the Democratic National Committee and of Secretary Hillary Clinton’s campaign chairman, and then weaponized them through WikiLeaks, Trump would probably not be president. In a race determined by [fewer than 80,000 votes,](https://www.washingtonpost.com/news/the-fix/wp/2016/12/01/donald-trump-will-be-president-thanks-to-80000-people-in-three-states/?utm_term=.b97c3a8d414d) that’s hard to dispute.
  
  And in the final days of the campaign, FBI Director James Comey released a letter which essentially reopened an investigation into Hillary Clinton’s emails once again – based on….well, nothing. Turned out those Anthony Weiner emails had nothing to do with Hillary Clinton’s case. But the damage was done.
  
  [Related video ![Image 37: Paul Manafort Donald Trump Michael Flynn](https://media.cnn.com/api/v1/images/stellar/prod/170214231609-manafort-trump-flynn.jpg?q=x_0,y_0,h_900,w_1599,c_fill/h_720,w_1280/w_256) Paul Manafort Donald Trump Michael Flynn Getty Images Manafort, Flynn spoke regularly with Russians](http://www.cnn.com/videos/politics/2017/02/15/manafort-flynn-communicated-russians-brown-lemon.cnn)
  
  [It should be noted](https://www.theatlantic.com/news/archive/2017/02/flynn-resigns-timeline/516594/) that Comey apparently knew about the Trump operatives’ contacts with the Russians. But somehow that never leaked. The contrast between how Comey handled the Clinton case and how he handled the Trump-Russia case boggles the mind.
  
  Donald Trump has benefited from leaks more than the CEO of Depends. So forgive me if I am unpersuaded by Trump’s complaints about them.
  
  They will keep coming. Perhaps because the system of checks and balances seems to be broken. With Republican control of Congress, a full congressional investigation is unlikely. Sen. Rand Paul (R-Kentucky) candidly told us why. “I just don’t think it’s useful to be doing investigation after investigation,” [Paul told the “Kilmeade & Friends” radio show.](http://www.cnn.com/2017/02/14/politics/kfile-rand-paul-republican-investigations/)“Particularly of your own party. We’ll never even get started with doing the things we need to do, like repealing Obamacare, if we’re spending our whole time having Republicans investigate Republicans. I think it makes no sense.”
  
  Republicans don’t investigate Republicans. Congressional Republicans will not fulfill their oversight obligations; that might interfere with important things, like kicking 20 million Americans off health insurance.
  
  [Related video ![Image 38: rep steve king](https://media.cnn.com/api/v1/images/stellar/prod/170215073119-rep-steve-king.jpg?q=x_2,y_0,h_1078,w_1915,c_crop/h_720,w_1280/w_256) CNN Flynn called victim of political assassination](http://www.cnn.com/videos/politics/2017/02/15/steve-king-flynn-victim-of-political-assassination-newday-sot.cnn)
  
  So sensible whistleblowers probably won’t go to the Hill. And they may not trust the Justice Department, either. After all, our new attorney general was an early and effective Trump supporter, and he [has no appetite for recusing himsel](https://urldefense.proofpoint.com/v2/url?u=https-3A__www.nytimes.com_2017_02_14_us_politics_attorney-2Dgeneral-2Djeff-2Dsessions-2Drussia-2Dinquiries.html-3Fsmprod-3Dnytcore-2Dipad-26smid-3Dnytcore-2Dipad-2Dshare&d=DwIGaQ&c=W8uiIUydLnv14aAum3Oieg&r=bGsD9sZg6ipuCv_GJ9ju7vGas8eG7EXsMzVsre9NrUc&m=pYZcmBlpECrh8vF1YylztZPPn5_wwxvjv6_hOAvFtK0&s=DMVmi95brvZ_zHhLBdhs9a_gyfPx3Vv1d-j_BDUJMNQ&e=)f from investigating a campaign he played a crucial role in.
  
  That leaves the free press. The Fourth Estate is the only option for whistleblowers. When the justice system seems compromised and congressional oversight is negligent, government officials with damning information are going to leak. And leak. And leak.
  
  I suppose there is some poetic justice in seeing the man who was made President because of leaks potentially hobbled by them. If you live by the leak, you die by the leak.
  
