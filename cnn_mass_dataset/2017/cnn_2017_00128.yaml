  # Republicans add to Obamacare confusion with new ‘repair’ pitch
  
  By [![Image 1: MJ Lee](https://media.cnn.com/api/v1/images/stellar/prod/150327154508-mj-lee.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/mj-lee)[MJ Lee](https://www.cnn.com/profiles/mj-lee), [![Image 2: Sunlen Serfaty](https://media.cnn.com/api/v1/images/stellar/prod/140929115712-sunlen-serfaty-profile-image.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/sunlen-serfaty-profile)[Sunlen Serfaty](https://www.cnn.com/profiles/sunlen-serfaty-profile), [![Image 3: Ted Barrett](https://media.cnn.com/api/v1/images/stellar/prod/140929115817-ted-barrett-profile-image.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/ted-barrett)[Ted Barrett](https://www.cnn.com/profiles/ted-barrett)
  
