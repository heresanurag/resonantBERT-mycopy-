  Tributes from Alan Thicke's sons
  
  2:07
  
  ### Story highlights
  
  Carter Thicke was with his dad when he collapsed
  
  The teen said he got to hug, tell his father he loved him
  
  Alan Thicke’s son is sharing his memories of the last moments of his famous father’s life.
  
  Carter Thicke, 19, sat down with “Entertainment Tonight” to talk about his beloved dad.
  
  Father and son had been playing hockey in December at an ice rink in Burbank, California, when the elder Thicke collapsed.
  
  Ad Feedback
  
  “The ambulance came and the paramedics had stabilized him and everything seemed fine,” the teen said in a clip released by the show.
  
  [Alan Thicke dead at 69](http://www.cnn.com/2016/12/13/us/alan-thicke-dead/index.html)
  
  The star later died of a ruptured aorta.
  
  The “Growing Pains” star was “the perfect dad,” his son said.
  
  [Alan Thicke remembered by ‘Growing Pains’ cast at memorial](http://www.cnn.com/2016/12/19/entertainment/alan-thicke-memorial-service/index.html)
  
  Carter is the youngest of three sons born to the actor and his ex-wife, Gina. Older brothers Brennan and Robin are the children of Thicke and his first wife, the singer and actress, Gloria Loring.
  
  “I got to give him a hug and said, ‘I love you,’ and that was the last time I saw him,” Carter Thicke said.
  
  The full interview airs Thursday.
  
