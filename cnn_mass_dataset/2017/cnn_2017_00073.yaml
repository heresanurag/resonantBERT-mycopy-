  # Alan Thicke’s son shares memory of last good-bye
  
  By [![Image 1: Lisa Respers France](https://media.cnn.com/api/v1/images/stellar/prod/140929104601-lisa-france-profile-image.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/lisa-france)[Lisa Respers France](https://www.cnn.com/profiles/lisa-france)
  
  Updated Feb 1, 2017
  
  Updated Feb 1, 2017, 11:57 AM ET
  
