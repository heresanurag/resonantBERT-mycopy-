  **Editor’s Note:**Jennifer M. Harris is a senior fellow at the Council on Foreign Relations and co-author of “[War by Other Means: Geoeconomics and Statecraft](http://www.hup.harvard.edu/catalog.php?isbn=9780674737211).” The views expressed are her own.
  
  ### Story highlights
  
  Jennifer Harris: Foreign governments often like to test a new White House early on
  
  If past is precedent, Beijing will soon look to stress-test the new White House, perhaps over South China Sea, she says
  
  Major geopolitical crises have a way of greeting US presidents soon after taking office. Nazi Germany’s withdrawal from the League of Nations in 1933, the Soviet-led construction of the Berlin Wall in 1961, the Gulf of Tonkin incident in 1964 – all were among the most daunting tests of US foreign policy in the past century, and all came less than a year into the tenures of new US administrations.
  
  This is no accident. Foreign governments often like to test a new White House early on. Indeed, Russia appears to have already commenced its testing of Trump’s Washington; a [resurgence of heavy fighting in Eastern Ukraine](http://www.cnn.com/2017/01/31/europe/ukraine-fighting/) suggests Moscow may be embarking on an offensive that could redraw Ukrainian borders beyond Crimea.
  
  ![Image 33: Jennifer Harris](https://media.cnn.com/api/v1/images/stellar/prod/170202140900-harris-jennifer-head-shot.jpg?q=w_521,h_379,x_0,y_0,c_fill/w_632)
  
  Jennifer Harris
  
  If past is precedent, Beijing will also soon look to stress-test the new White House. How President Trump responds could well determine whether he stays in the driver’s seat of his own legacy.
  
  Ad Feedback
  
  Already, there are concerning signs of conflict to come, and the Trump administration’s early missteps on the [South China Sea](http://cnn.com/2017/02/02/asia/us-china-south-china-sea/index.html) conflict could give Beijing the pretext to manufacture a crisis. Should he take the bait, President Trump risks allowing external foreign policy crises to define his tenure, not unlike the way 9/11 reshaped George W. Bush’s presidency.
  
  [South China Sea: What’s at stake](http://cnn.com/2017/02/02/asia/us-china-south-china-sea/index.html)
  
  The trouble began when Secretary of State Rex Tillerson [suggested](http://www.cnn.com/2017/01/12/politics/china-tillerson/) during his confirmation hearing that the United States would block China from accessing islands it has built in the South China Sea, islands Beijing has outfitted with weapons systems and military-grade airstrips.
  
  [Video 2](https://media.cnn.com/api/v1/loops/stellar/prod/scs.webm?q=w_480%2Cq_auto%2Cfl_keep_dar)
  
  While much of Washington sprung into damage-control mode – most China experts dismissed Tillerson’s remarks as a misstatement – the White House doubled down on Tillerson’s comments, raising the possibility that a US blockade of China in the South China Sea means just that.
  
  Beijing so far has shown marked restraint, at least in its official statements. The Chinese Foreign Ministry downplayed Tillerson’s initial comments and [refused to speculate](https://www.ft.com/content/5edf5fe4-d876-11e6-944b-e7eb37a6aa8e) on how it would react to a “hypothetical” situation. Its message for domestic audiences, though, was less conciliatory.
  
  “Unless Washington plans to wage a large-scale war in the South China Sea,” the nationalist-leaning Global Times [warned](http://www.globaltimes.cn/content/1028568.shtml), “any other approaches to prevent Chinese access to the islands will be foolish.”
  
  For a country whose largest challenge is arguably in managing the expectations of its own people, such hawkish messages may be the more reliable sign.
  
  Such escalations are likely to come in two varieties. Most obviously, Beijing could respond militarily. [China](http://edition.cnn.com/china) could declare an “air defense identification zone,” or ADIZ, in the South China Sea, [just as it did in the East China Sea in November 2013](http://www.cnn.com/2013/11/25/world/asia/china-japan-island-explainer/). This would effectively mean Beijing drawing lines in the air to mirror its claims in the South China Sea waters below.
  
  More worryingly, China could begin building out more of the military infrastructure it has already installed in certain pockets of the South China Sea. China has already militarized one of its artificial islands (near the Spratly Islands chain), equipping it with weapons systems and military-grade landing strips. If they were to do likewise near the Scarborough Shoal – within striking distance of the Philippines and US military bases – this would almost certainly cross a red line for the United States.
  
  ![Image 34: A composite image of  Gaven reef taken on November 17. ](https://media.cnn.com/api/v1/images/stellar/prod/161215141646-south-china-sea-gaven-composite.jpg?q=w_1600,h_900,x_0,y_0,c_fill/w_1093)
  
  A composite image of Gaven reef taken on November 17.
  
  CSIS Asia Maritime Transparency Initiative/DigitalGlobe
  
  But while Washington tends to focus on military scenarios, China is just as skilled at using economic instruments to advance its maritime claims. Unlike the legions of Pentagon strategists poring over military scenarios, much of China’s economic coercion goes unnoticed and unanswered by Washington.
  
  It has already proven effective.
  
  For example, the Philippines won a three-year UN arbitration case against China this past July. Yet by the time the ruling was issued, Philippine President Rodrigo Duterte had already undermined much of its force. Duterte repeatedly hinted at possible concessions in exchange for economic cooperation with Beijing, even going so far as to [offer to “shut up”](https://globalnation.inquirer.net/138487/duterte-favors-making-deal-china-dispute) about the dispute in return for investment.
  
  ### South China Sea: Full coverage
  
