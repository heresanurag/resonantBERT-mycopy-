  *   [Will the ruling spark global conflict?](http://edition.cnn.com/2016/07/13/asia/south-china-sea-global-conflict-risks/index.html)
  
  *   [Court rules against China](http://www.cnn.com/2016/07/12/asia/china-philippines-south-china-sea/index.html)
  
  *   [Will China abide by decision?](http://www.cnn.com/2016/07/12/opinions/south-china-sea-decision-burke-white/index.html)
  
  *   [Why ruling may change Asia](http://www.cnn.com/2016/07/04/asia/south-china-sea-un-case-explainer/)
  
  *   [Showdown: How did we get here?](http://www.cnn.com/2015/10/28/asia/china-south-china-sea-disputes-explainer/)
  
  *   [Fishermen caught in fray](http://www.cnn.com/2016/05/22/asia/vietnam-fisherman-south-china-sea/)
  
  *   [Tropical power struggle](http://www.cnn.com/2016/03/26/asia/taiwan-south-china-sea/)
  
  *   [Exclusive: China warns U.S. warplane](http://edition.cnn.com/2015/05/20/politics/south-china-sea-navy-flight/)
  
  Any escalation between Washington and Beijing, coming just as Russia seems to be mounting a major offensive in eastern Ukraine, would stretch the Trump foreign policy team well beyond its depth. So what can the administration do to head off a crisis? Three broad actions are urgently needed.
  
  First, US military leaders must provide much-needed clarity, signaling precisely what countermeasures China can expect should Chinese officials opt to declare an ADIZ in the South China Sea, militarize near the Scarborough Shoal, or otherwise escalate militarily.
  
  ### Follow CNN Opinion
  
  *   Join us on [Twitter](http://twitter.com/cnnopinion)and [Facebook](http://www.facebook.com/CNNOpinion)
  
  Second, US congressional leaders must pass new legislation (known as AUMF) more clearly delineating the President’s unilateral discretion concerning the use of US military force – and reasserting Congress’ role in green-lighting US military combat, especially in cases (such as this) involving risk of conflict between major powers.
  
  Third, Congress and the White House together must work to equip US policymakers with the option of reaching for something other than military might. The rising military contest in Asia is real, but focusing too narrowly on it risks obscuring the larger struggle for leadership in the region, which remains primarily economic. If Washington is to curb Beijing’s expansionism, it will need to make China bear the economic costs of its growing bellicosity. It will also need to steel its Asian allies, countries such as Japan and the Philippines, against Chinese economic bullying.
  
  These things must happen before Washington gives in to any military escalation in Asia.
  
  China’s greatest military strategist, Sun Tzu, once said, “If you know the enemy and know yourself, you need not fear the result of a hundred battles.” President Trump would do well to heed this advice, because right now he doesn’t appear to know either.
  
