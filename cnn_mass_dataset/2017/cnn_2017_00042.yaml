  # Crowds flock to Saudi Arabia’s first Comic Con
  
  By [Bianca Britton](https://www.cnn.com/profiles/bianca-britton), [![Image 3: Basma Atassi](https://media.cnn.com/api/v1/images/stellar/prod/150325082152-social-gfx-cnn-logo.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/basma-atassi)[Basma Atassi](https://www.cnn.com/profiles/basma-atassi)
  
  Updated Feb 20, 2017
  
  Updated Feb 20, 2017, 8:46 AM ET
  
