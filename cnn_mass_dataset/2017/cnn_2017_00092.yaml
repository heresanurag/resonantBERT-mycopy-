  # EU leaders attack Donald Trump at Malta summit
  
  By [![Image 1: Laura Smith-Spark](https://media.cnn.com/api/v1/images/stellar/prod/140929103347-laura-smith-spark-profile-image.jpg?q=x_2,y_0,h_898,w_1596,c_crop/h_270,w_480/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/laura-smith-spark)[Laura Smith-Spark](https://www.cnn.com/profiles/laura-smith-spark), [![Image 2: Vasco Cotovio](https://media.cnn.com/api/v1/images/stellar/prod/150325082152-social-gfx-cnn-logo.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/vasco-cotovio)[Vasco Cotovio](https://www.cnn.com/profiles/vasco-cotovio), [![Image 3: Euan McKirdy](https://media.cnn.com/api/v1/images/stellar/prod/150103175015-euan-mckirdy-profile-new.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/euan-mckirdy)[Euan McKirdy](https://www.cnn.com/profiles/euan-mckirdy)
  
