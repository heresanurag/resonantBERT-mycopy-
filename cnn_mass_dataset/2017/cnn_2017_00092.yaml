  ### Story highlights
  
  French President attacks Trump's comments on Europe
  
  Largest party in European parliament calls Trump's likely pick for EU envoy "hostile"
  
  Valletta, Malta—
  
  EU leaders, led by French president Francois Hollande, have denounced recent attacks on Europe by Donald Trump as they met for a summit to debate the future of the union.
  
  Hollande described Trump’s statements as “unacceptable”, and German Chancellor Angela Merkel called on the EU to press ahead with its own plans whatever the US says.
  
  EU leaders have been rattled by Trump’s comments on Europe and the NATO transatlantic alliance. He has voiced his support for Britain’s departure from the EU, criticized European refugee policies and called NATO “obsolete”.
  
  Ad Feedback
  
  Hollande hit out at Trump as he arrived at the informal summit on the future of the EU in Malta. “There are threats, there are challenges. What is at stake is the very future of the European Union,” he said.
  
  ![Image 6: President of the European Union Jean-Claude Juncker, center left, and British Prime Minister Theresa May at the Malta summit.](https://media.cnn.com/api/v1/images/stellar/prod/170203133809-03-malta-eu-summit-0203.jpg?q=w_3000,h_2000,x_0,y_0,c_fill/w_1093)
  
  President of the European Union Jean-Claude Juncker, center left, and British Prime Minister Theresa May at the Malta summit.
  
  Leon Neal/Getty Images
  
  “It is unacceptable that there should be, through a number of statements by the US President, pressure on what Europe should be or what it should no longer be.”
  
  Merkel called on fellow EU leaders to unite, as she arrived for the summit in Valletta,Malta’s capital. “I already said that Europe has its destiny in its own hands. And I believe the stronger we state clearly how we define our role in the world, the better we can take care with our transatlantic relations,” she said.
  
  [NIC ROBERTSON: Europe must come to terms with Trump’s hostility](http://edition.cnn.com/2017/02/03/opinions/new-world-order-eu-robertson-opinion/index.html)
  
  Austrian Chancellor Christian Kern criticized Trump’s ban on travel from seven Muslim-majority countries as “highly problematic.” He blamed some of the migration problems on US intervention in the Middle East. “There is no doubt that America shares responsibility for the refugee flows by the way how it intervened militarily,” he said, according to AFP.
  
  ## Concerns about Trump’s ‘decisions and attitudes’
  
  The concerns about Trump continued into the discussions. Malta’s Prime Minister Joseph Muscat said EU leaders expressed concern about some “decisions and attitudes” of the Trump administration during their deliberations at the summit.
  
  “Obviously there was concern among the EU 28 on some decisions that are being taken by the new US administration and some attitudes that are being adopted by the said administration. Nevertheless there was no sense of anti-Americanism. There was a sense that we need to engage with the United States just the same, but we need to show that we cannot stay silent where there are principles involved.”
  
  The President of the European Council, Donald Tusk, said protecting Europe’s “unique” relationship with the United States was still the “highest political priority” for not just the EU, but for all of Europe. Speaking at a press conference at the Malta summit, Tusk said that transatlantic cooperation “has until now been a key pillar of the free world.”
  
  His remarks were markedly more conciliatory than earlier int he week, when he called the Trump administration an “external threat to Europe.”
  
  ## Potential EU envoy ‘hostile’
  
  The criticism of Trump came after it was revealed that the European Parliament’s main political party is attempting to block Trump’s expected choice for US ambassador to the European Union.
  
  A letter from the Group of the European People’s Party, or EPP, urges the EU to reject US businessman Ted Malloch, calling him “hostile and malevolent” and accusing him of “denigrating the EU.”
  
  ![Image 7: Ted Malloch, Trump's expected choice for EU envoy.](https://media.cnn.com/api/v1/images/stellar/prod/170203082519-ted-malloch.jpg?q=w_2296,h_1291,x_0,y_0,c_fill/w_632)
  
  Ted Malloch, Trump's expected choice for EU envoy.
  
  WND books
  
  “In these statements, the prospective nominee expressed his ambitions ‘to tame the bloc like he brought down the Soviet Union,’ eloquently supported dissolution of the European Union and explicitly bet on the demise of the common currency within months,” they say in the letter to the [presidents of the European Council and European Commission.](https://europa.eu/european-union/about-eu/presidents_en)
  
  “We are strongly convinced that persons seeing as their mission to disrupt or dissolve the EU, should not be accredited as official representatives to the EU.”
  
  [Opinion: Europe must come to terms with Trump’s hostility](http://cnn.com/2017/02/03/opinions/new-world-order-eu-robertson-opinion/index.html)
  
  The letter ends by urging EU leaders Donald Tusk and Jean-Claude Juncker not to accept Malloch should he be Trump’s pick. Envoys to the EU must be approved by the European Council, the European Commission and signed off by EU leaders.
  
  ## Brexit debate
  
  Following her trip last week to Washington, UK Prime Minister Theresa May was expected to brief EU leaders on her meeting with Trump in which she received assurances that he is fully committed to NATO. She will call on other members of the EU [to increase their defense spending](http://money.cnn.com/2017/02/03/news/donald-trump-nato-theresa-may/index.html).
  
  [Related video ![Image 8: A Union flag flies near the The Elizabeth Tower, commonly known Big Ben, and the Houses of Parliament in London on February 1, 2017. British MPs are expected Wednesday to approve the first stage of a bill empowering Prime Minister Theresa May to start pulling Britain out of the European Union. Ahead of the vote, which was scheduled to take place at 7:00 pm (1900 GMT), MPs were debating the legislation which would allow the government to trigger Article 50 of the EU's Lisbon Treaty, formally beginning two years of exit negotiations. / AFP / Daniel LEAL-OLIVAS (Photo credit should read DANIEL LEAL-OLIVAS/AFP/Getty Images)](https://media.cnn.com/api/v1/images/stellar/prod/170203140939-brexit-one-thing-to-know.jpg?q=x_4,y_219,h_2411,w_4285,c_crop/h_720,w_1280/w_256) A Union flag flies near the The Elizabeth Tower, commonly known Big Ben, and the Houses of Parliament in London on February 1, 2017. British MPs are expected Wednesday to approve the first stage of a bill empowering Prime Minister Theresa May to start pulling Britain out of the European Union. Ahead of the vote, which was scheduled to take place at 7:00 pm (1900 GMT), MPs were debating the legislation which would allow the government to trigger Article 50 of the EU's Lisbon Treaty, formally beginning two years of exit negotiations. / AFP / Daniel LEAL-OLIVAS (Photo credit should read DANIEL LEAL-OLIVAS/AFP/Getty Images) DANIEL LEAL-OLIVAS/AFP/AFP/Getty Images How much will Brexit cost the UK?](http://www.cnn.com/videos/world/2017/02/03/brexit-one-thing-to-know.cnn)
  
  Britain’s future relationship with the EU is also on the agenda in Malta.
  
  [Britain edged closer to Brexit this week, with Parliament voting](http://www.cnn.com/2017/02/01/europe/article-50-brexit-parliament-vote/) in favor of May triggering [Article 50 of the Lisbon Treaty](http://www.cnn.com/2017/01/24/europe/article-50-what-is-it/)– the formal process of leaving the EU.
  
  May wants to invoke Article 50 by the end of March, firing the starting gun on a two-year divorce wrangle.
  
  The UK government has stressed it wants to see a strong and successful European Union after Brexit.
  
  In Malta, May is already an outsider, invited to some meetings but not all. She won’t join the other EU leaders when they discuss recent comments by Tusk, the European Council president, calling [Trump a “threat” to the European order](http://www.cnn.com/2017/01/31/politics/european-union-trump/).
  
