  **February 14:** Spicer says Trump asked for Flynn’s resignation because of [trust issues](http://www.cnn.com/videos/politics/2017/02/14/white-house-briefing-flynn-resignation-question.cnn) with his national security adviser. [CNN reports](http://www.cnn.com/2017/02/14/politics/donald-trump-aides-russians-campaign/index.html)that high-level advisers close to then-nominee Trump were in constant communication during the campaign with Russians known to US intelligence, according to multiple current and former intelligence, law enforcement and administration officials. Among those senior advisers regularly communicating with Russian nationals were Manafort and Flynn.
  
  **February 16:**FBI officials tell CNN that they do not plan to [pursue charges against Flynn](http://www.cnn.com/2017/02/16/politics/fbi-not-expected-to-pursue-charges-against-flynn/) barring any new information, after he told agents he did not remember discussing sanctions with Kislyak.
  
  **February 24:**CNN reports that the FBI [rejected a recent White House request](http://www.cnn.com/2017/02/23/politics/fbi-refused-white-house-request-to-knock-down-recent-trump-russia-stories/) to publicly knock down media reports about communications between Trump’s associates and Russians known to US intelligence during the 2016 campaign.
  
  **February 27:**Members of the House Intelligence Committee [sign off on a plan to investigate Russia’s alleged interference](http://www.cnn.com/2017/02/27/politics/devin-nunes-house-russia-investigation/) in the US elections, which includes examining contacts between Trump’s campaign and Russia, and looking into who leaked the details. Committee chairman Devin Nunes brushes off calls by Democrats for an independent investigation.
  
  **March 1:**[The Washington Post first reports](https://www.washingtonpost.com/world/national-security/sessions-spoke-twice-with-russian-ambassador-during-trumps-presidential-campaign-justice-officials-say/2017/03/01/77205eda-feac-11e6-99b4-9e613afeb09f_story.html) that Sessions, now the attorney general, [met twice with Kislyak in 2016](http://www.cnn.com/2017/03/01/politics/jeff-sessions-russian-ambassador-meetings/index.html). Sessions did not mention either meeting during his confirmation hearing, when he said he knew of no contacts between Trump surrogates and Russians. Sessions says in a statement: “I never met with any Russian officials to discuss issues of the campaign.” The statement goes on to say: “I have no idea what this allegation is about. It is false.” Democrats call for his resignation and say he should recuse himself from any Trump-related Russia investigation. [The New York Times reports](https://www.nytimes.com/2017/03/01/us/politics/obama-trump-russia-election-hacking.html) that the Obama administration sought to ensure information about Russian efforts to meddle in the election were preserved after Obama left office.
  
  **March 2:**Sessions announces he [will recuse himself](http://www.cnn.com/2017/03/02/politics/democrats-sessions-russia-resignation-call/) from any investigations relating to Russia and the Trump campaign. [USA Today reports](http://www.usatoday.com/story/news/2017/03/02/exclusive-two-other-trump-advisers-also-spoke-russian-envoy-during-gop-convention/98648190/) that Gordon and Page met with Kislyak during the Republican convention in July. [Gordon tells CNN](http://www.cnn.com/2017/03/02/politics/russia-donald-trump-meetings-ambassador/) that, along with national security advisers Page and Phares, he stressed to the Russian envoy that he would like to improve relations with Russia. “This is not any different than anything I said publicly and on panels,” Gordon says. Page confirms in an MSNBC interview that he met with Kislyak in Cleveland. Page tells CNN in a statement that he would not comment on any meetings and “never did anything improper” with regard to Russia.
  
  **March 3:** Russian Foreign Minister Sergey Lavrov[pushes back at assertions](http://cnn.com/2017/03/03/politics/russia-spy-claims-trump-sessions/index.html) that his country’s US ambassador is a spy, and echoes Trump’s contention that the controversy over contacts between Kremlin officials and Trump’s campaign is “a witch hunt.”
  
  **March 5:**Kushner and Flynn met with the Russian ambassador to the United States at a time when the Trump administration’s relationship with the Russians was under close scrutiny, a senior administration official says.
  
  **March 6:** Sessions[defends his answers](http://cnn.com/2017/03/06/politics/jeff-sessions-says-he-didnt-mislead-congress-in-testimony/index.html) about Russian contacts to the Senate Judiciary Committee as “correct” in a letter, as he seeks to tamp down questions after it came to light that he had met with the Russian ambassador twice last year.
  
  **March 7:**Dmitry Peskov, spokesman for Putin,[tells CNN](http://cnn.com/2017/03/06/asia/russia-american-hysteria-hurting-relations/index.html) that “hysteria in official Washington and in the American media” is harming relations between the two nations.
  
  **March 10:**The White House [acknowledges](http://cnn.com/2017/03/10/politics/michael-flynn-donald-trump-consulting-firm/index.html)that President Donald Trump’s transition team was aware that retired Lt. Gen. Michael Flynn engaged in work that would likely require him to register his consulting firm as a foreign agent before Flynn was tapped to serve as national security adviser.
  
  **March 16:** Flynn [was paid more than $33,750 by Russia’s state-run broadcaster](http://cnn.com/2017/03/16/politics/michael-flynn-payments-rt-russia-tv/index.html)RT TV-Russia for a speech in Moscow in December 2015, Rep. Elijah Cummings, the ranking Democrat on the House Oversight Committee, says. The US intelligence community has long assessed RT to be a propaganda tool of the Kremlin, writing in its January report on Russian interference in the US election that the organization had participated in disinformation campaigns aimed at the US.
  
  **March 19:** The Senate Intelligence Committee[has asked Trump adviser Roger Stone](http://cnn.com/2017/03/19/politics/senate-intelligence-stone-records/index.html) to preserve any records he might have that could be related to the panel’s investigation into Russian actions targeting the US election, Stone confirms to CNN.
  
  **March 20:** FBI Director [James Comey confirms](http://www.cnn.com/2017/03/20/politics/comey-hearing-russia-wiretapping/) publicly for the first time that the FBI is investigating Russian interference in the election and, as part of that investigation, the FBI is probing “the nature of any links between individuals associated with the Trump campaign and the Russian government, and whether there was any coordination between the campaign and Russia’s efforts.” His bombshell came at a hearing of the House Intelligence Committee, where he also said the FBI will also determine “whether any crimes were committed.”
  
  Both Comey and National Security Agency Director Mike Rogers say there isn’t any evidence that votes were changed in a series of key swing states that Trump won. Comey also confirms that the Russians wanted to help Trump and hurt Clinton, telling lawmakers “He – Putin – hated Secretary Clinton so much that the flip side of that coin was he had a clear preference for the person running against the person he hated so much.”
