title: "Title: Timeline: What we know about the Trump campaign, his administration and Russia"
date: "2017-02-16"
section: "Politics"
url: "http://www.cnn.com/2017/02/16/politics/trump-russia-timeline/index.html"
content: |
  URL Source: http://www.cnn.com/2017/02/16/politics/trump-russia-timeline/index.html
  
  Published Time: 2017-02-16T11:22:48Z
  
  Markdown Content:
  
  Washington—
  
  FBI Director James Comey testified before the House Intelligence Committee Monday, publicly confirming for the first time that the bureau is investigating the relationship between President Donald Trump’s advisers and Russia to see if those ties played a role in Moscow’s efforts to interfere with the 2016 US election.
  
  During the hearing, Comey was asked for details related to the actions of several individuals who are either currently members of the Trump administration or were tied to his campaign team. Paul Manafort, Michael Flynn, Jeff Sessions, Roger Stone and other figures in the Trump orbit are under scrutiny for their interactions with Russia. They all deny anything improper took place. So what do we know happened when?
  
  **February 29:**Alabama Sen. Jeff Sessions becomes the first sitting US [senator to endorse](http://www.cnn.com/2016/02/28/politics/donald-trump-jeff-sessions-endorsement/) Republican presidential candidate Donald Trump’s campaign. Sessions had already been a supporter and adviser to Trump.
  
  Ad Feedback
  
  **March 3:**Trump [taps Sessions](https://www.facebook.com/DonaldTrump/posts/10156714551570725:0) to chair his campaign’s national security advisory team.
  
  **March 21:**Trump [tells The Washington Post](https://www.washingtonpost.com/blogs/post-partisan/wp/2016/03/21/a-transcript-of-donald-trumps-meeting-with-the-washington-post-editorial-board/) editorial board that Walid Phares and Carter Page will be among his campaign’s advisers for foreign policy.
  
  **March 28:**[Trump hires Manafort](https://www.nytimes.com/politics/first-draft/2016/03/28/donald-trump-hires-paul-manafort-to-lead-delegate-effort/) to head the delegate efforts for his Republican primary campaign.
  
  **May 19:** Trump, now the presumptive GOP nominee, gives Manafort a promotion: [campaign chairman and chief strategist](http://abcnews.go.com/Politics/trump-campaign-announces-expanded-role-paul-manafort/story?id=39231973).
  
  **June 15:** A cybersecurity firm hired by the DNC [posts a public notice](https://www.crowdstrike.com/blog/bears-midst-intrusion-democratic-national-committee/) on its website describing an attack on the political committee’s computer network by two groups associated with Russian intelligence. According to the post, two Russian-backed groups called “Cozy Bear” and “Fancy Bear” tunneled into the committee’s computer system. In response, [a blogger called Guccifer 2.0](http://www.cnn.com/2016/06/21/politics/dnc-hack-russians-guccifer-claims/) claims that he alone conducted the hack, not the Russians. As proof, he posts internal DNC memos and opposition research on Trump. Furthermore, Guccifer 2.0 claims to have passed along thousands of files to WikiLeaks. Trump [offers his own theory](http://www.cnn.com/2016/06/15/politics/dnc-hack-donald-trump/) on the origins of the attack, suggesting in a statement that the DNC hacked itself to distract from Hillary Clinton’s email scandal.
  
  **June:** Private cybersecurity firms provide the FBI with details of the forensic evidence they gathered from DNC servers. [The DNC “rebuffed”](http://www.cnn.com/2017/01/05/politics/fbi-russia-hacking-dnc-crowdstrike/) a request from the FBI to examine its computer services after it was allegedly hacked by Russia during the 2016 election, a senior law enforcement official later told CNN.
  
  **June 20:** After Trump campaign manager Corey Lewandowski is abruptly fired, [Manafort emerges](http://www.cnn.com/2016/06/20/politics/corey-lewandowski-out-as-trump-campaign-manager/) as Trump’s top campaign official.
  
  **July 8:**[The Telegraph reports](http://www.telegraph.co.uk/news/2016/07/08/donald-trumps-adviser-slams-american-policy-on-russia-during-spe/) Page gave a lecture in Moscow that slams US policy toward Russia. Page “lamented that the West ‘unnecessarily perpetuated Cold War tendencies’ in their dealings with Russia, and called instead for ‘mutual respect’ in order to get ‘mutual benefits,’” The Telegraph reports.
  
  **July 11:** At an RNC Platform Committee meeting, a Cruz delegate proposes an amendment that called on the US government to send lethal weapons to Ukraine in response to Russian “military aggression” in the region. Trump campaign aides initiated a process to stop that language from officially being adopted, according to CNN reporting. The final version of the platform strips out the reference to arming Ukraine and calls on the US to provide “appropriate assistance” instead. The platform does support US sanctions on Russia and includes a threat of more sanctions if Russia continues meddling in Ukraine. At the time, Manafort denies that the campaign had any involvement in the change. But in March 2017, Trump campaign adviser [JD Gordon tells CNN](http://www.cnn.com/2017/03/02/politics/russia-donald-trump-meetings-ambassador/) that he is one of the campaign aides who stepped in to defeat the amendment that included references to “lethal defensive weapons” for Ukraine.
  
  **Between July 18-21:**Sessions meets with Russian ambassador to the US Sergey Kislyak twice on the sidelines of the Republican National Convention in Cleveland, Ohio. Gordon and Page, national security advisers to the Trump campaign, [also meet with Kislyak](http://www.usatoday.com/story/news/2017/03/02/exclusive-two-other-trump-advisers-also-spoke-russian-envoy-during-gop-convention/98648190/) during the convention. Phares allegedly attends as well, according to a later statement from Gordon.
  
  **July 22:** Days before the Democratic National Convention, [WikiLeaks posts nearly 20,000 emails](http://www.cnn.com/2016/07/24/politics/dnc-email-leak-wikileaks/) hacked from the DNC server. The documents include notes in which DNC chair Debbie Wasserman Schultz insults staffers from the campaign of Clinton rival [Bernie Sanders](http://www.cnn.com/2015/05/27/us/bernie-sanders-fast-facts/) and messages that suggest the organization was favoring Clinton rather than remaining neutral. [Wasserman Schultz resigns](http://www.cnn.com/2016/07/24/politics/debbie-wasserman-schultz-dnc-chair-career/) in the aftermath of the leak.
  
  **July 25:**[The FBI announces](http://www.cnn.com/2016/07/25/politics/democratic-convention-dnc-emails-russia/) it has launched an investigation into the DNC hack. Although the statement doesn’t indicate that the agency has a particular suspect or suspects in mind, US officials tell CNN they think the cyberattack is linked to [Russia](http://www.cnn.com/2013/10/29/world/russia-fast-facts/index.html).
  
  **July 27:** At a press conference in Florida, [Trump appears to call on Russia](https://www.youtube.com/watch?v=3kxG8uJUsWU) to hack Democratic nominee Hillary Clinton’s private emails: “I will tell you this – Russia, if you’re listening, I hope you’re able to find the 30,000 e-mails that are missing. I think you will probably be rewarded mightily by our press. Let’s see if that happens.” Days later, Trump said he was joking.
  
  **August 5:** Roger Stone, an informal Trump adviser, [writes a column for Breitbart News](http://www.breitbart.com/2016-presidential-race/2016/08/05/dear-hillary-dnc-hack-solved-so-now-stop-blaming-russia/) that repeats claims that Guccifer 2.0 – and not Russia – was behind the DNC hacks. US officials believe that Guccifer 2.0 is a front for Russian military intelligence.
  
  **August 8:** During an event in Florida, [Stone boasts in a speech](https://www.youtube.com/watch?v=r6-qW_PzGEA) that he “has communicated with (WikiLeaks founder Julian) Assange,” and that more documents would be coming, including an “October surprise.”
  
  **August 14:**[The New York Times reports](https://www.nytimes.com/2016/08/15/us/politics/paul-manafort-ukraine-donald-trump.html?_r=1) on $12.7 million in secret cash payments earmarked for Manafort from a pro-Russian political party in Ukraine.
  
  **August 14-17:** Stone exchanges private messages with Guccifer 2.0 on Twitter after the hacker was briefly banned from the social media platform. Months later, Stone posted [two](https://i1.wp.com/stonecoldtruth.com/wp-content/uploads/2017/03/Screen-Shot-2017-03-09-at-8.47.50-PM.png?w=1600) screenshots of the conversation on his blog and downplayed the exchange.
  
  **August 15:**Manafort [denies](https://pbs.twimg.com/media/Cp5MIe-XgAAyUXH.jpg:large) having received payments from Ukraine and Russia, writing, “The suggestion that I accepted cash payments is unfounded, silly and nonsensical.”
  
  **August 19:**[CNN reports](http://www.cnn.com/2016/08/19/politics/paul-manafort-donald-trump-ukraine/) that FBI and Justice Department prosecutors are conducting an investigation into possible US ties to alleged corruption of the former pro-Russian President of Ukraine, including the work of Manafort’s firm. That same day, [Manafort resigns](http://www.cnn.com/2016/08/19/politics/donald-trump-campaign-chairman-paul-manafort-resigns/) his position on Trump’s campaign.
  
