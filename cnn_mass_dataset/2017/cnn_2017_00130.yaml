  **August 21:**In a [Twitter post](https://twitter.com/RogerJStoneJr/status/767366825743097856?ref_src=twsrc%5Etfw), Stone alludes to upcoming trouble for Clinton campaign manager John Podesta, saying “Trust me, it will soon (be) Podesta’s time in the barrel.”
  
  **September 8:**Sessions meets again with Kislyak at his Senate office sometime during the month.
  
  **September 9:**Guccifer 2.0 sends several messages to Stone about recent leaks. Stone sends a two-word response – “pretty standard” – according to a [screenshot of the private Twitter](http://stonecoldtruth.com/roger-stone-the-smoking-gun-aims-fires-misses/) conversation posted by Stone on his blog.
  
  **September 26:** During a presidential debate with Clinton, [Trump questions](http://www.cnn.com/2016/09/27/politics/dnc-cyberattack-400-pound-hackers/) whether the DNC cyberattack was carried out by a state-sponsored group or a lone hacker. “It could be Russia, but it could also be China. It could also be lots of other people. It also could be somebody sitting on their bed that weighs 400 pounds,” he said.
  
  **October 3-5:** Stone sends [two additional](https://twitter.com/RogerJStoneJr/status/782994854964031489)[cryptic tweets](https://twitter.com/rogerjstonejr/status/783532251690704896) predicting that action from Julian Assange and WikiLeaks will soon release more materials harmful to Clinton. “Payload coming,” he tweeted.
  
  **October 7:**[WikiLeaks releases](http://www.cnn.com/2016/10/07/politics/john-podesta-emails-hacked/) the first batch of emails from Clinton campaign manager John Podesta. The anti-secrecy website went on to release thousands of additional emails on a near-daily basis for the duration of the election season.
  
  The US intelligence community publicly blames Russia for election-related email hacks. “We believe, based on the scope and sensitivity of these efforts, that only Russia’s senior-most officials could have authorized these activities,” the [DHS and DNI joint statement reads](https://www.dhs.gov/news/2016/10/07/joint-statement-department-homeland-security-and-office-director-national).
  
  **October 10:** Trump says he [“loves” WikiLeaks](https://www.youtube.com/watch?v=Pkt7EqFWii4) during a campaign rally in Wilkes-Barre, Pennsylvania, just days after the first batch of hacked Podesta emails are released.
  
  **November 18:**Trump as President-elect [appoints Flynn as his national security adviser](http://cnn.com/2016/11/17/politics/trump-offers-flynn-job-of-national-security-adviser/).
  
  **November 29:**[A group of Democratic senators](https://www.wyden.senate.gov/download/?id=D12DD589-5800-4BEF-9F93-A0A122F38D29&download=1) sends a letter to President Barack Obama calling on intelligence agencies to declassify information about “the Russian Government and the US election.” Sources later tell CNN that new intelligence has been shared with lawmakers suggesting that Russia’s purpose for meddling in the election was to sway voters towards Trump, rather than broadly undermining confidence in the system.
  
  **December:** Trump’s senior aide and son-in-law Jared [Kushner and Flynn sit down](http://www.cnn.com/2017/03/02/politics/russia-donald-trump-meetings-ambassador/) at Trump Tower with Kislyak, according to a senior administration official, who describes it as an “introductory meeting” and “kind of an inconsequential hello.” The meeting lasts about 10 minutes, the official says.
  
  **December 1:**[CNN reports](http://www.cnn.com/2016/12/01/politics/paul-manafort-donald-trump-transition/) that Manafort has reemerged in Trump’s orbit as a player shaping the new administration during the presidential transition period.
  
  **December 11:**[Sources tell CNN](http://www.cnn.com/2016/12/11/politics/russia-hacking-conclusions-donald-trump/index.html) that although US intelligence agencies share the belief that Russia played a role in the computer hacks, there is disagreement between the CIA and the FBI about the intent of the meddling. While the CIA assessment shows that the Russians may have sought to damage Clinton and help Trump, the FBI has yet to find proof that the attacks were orchestrated to elect the Republican candidate, according to unnamed officials. Furthermore, some sources say the hackers also infiltrated the Republican National Committee’s computers.
  
  **December 12:** CNN reports that [Russian hackers](http://www.cnn.com/2016/12/12/politics/gop-russia-hacking-trump/) accessed computer accounts of Republican lawmakers and GOP organizations. A source with knowledge of the investigation says that even though hackers breached the GOP computers, they opted not to release documents en masse.
  
  **December 19:**Kislyak and Flynn have a conversation in the wake of the shooting of the Russian ambassador to Turkey in which Flynn expresses his condolences, according to a Trump transition official. The call took place on December 19, [according to The Washington Post](https://www.washingtonpost.com/opinions/why-did-obama-dawdle-on-russias-hacking/2017/01/12/75f878a0-d90c-11e6-9a36-1d296534b31e_story.html).
  
  **December 25:**Kislyak and Flynn [exchange holiday pleasantries](http://www.cnn.com/2017/01/13/politics/donald-trump-michael-flynn-russia-ambassador/) via text message on Christmas, according to multiple transition officials.
  
  **December 28:**The Russian ambassador [texts Flynn](http://www.cnn.com/2017/01/13/politics/donald-trump-michael-flynn-russia-ambassador/), according to a transition official.
  
  **December 29:** The Obama administration announces [new sanctions against Russia](http://cnn.com/2016/12/29/politics/russia-sanctions-announced-by-white-house/)and the expulsion of 35 diplomats over the country’s alleged interference in the 2016 US election. Flynn and Kislyak [speak several times](http://cnn.com/2017/01/23/politics/flynn-russia-calls-investigation/index.html)on the phone the same day, reportedly discussing the sanctions.
  
  **December 30:** Russian President [Vladimir Putin says](http://www.cnn.com/2016/12/30/europe/russia-us-diplomats-expulsion/) Moscow would not expel American diplomats in response to US sanctions against Russia and would instead attempt to rebuild relations with Washington after Trump’s inauguration. [Trump tweets praise](https://twitter.com/realDonaldTrump/status/814919370711461890) of Putin’s move.
  
  **January 6:** The top US intelligence agency [releases a report](https://www.dni.gov/files/documents/ICA_2017_01.pdf) concluding that Putin ordered a cyber campaign to help Trump and hurt Clinton in the US presidential election. The report also said the Russian military intelligence agency known as the GRU “used the Guccifer 2.0 persona and DCLeaks.com” to release material to influence the election “and relayed material to WikiLeaks.” WIkiLeaks founder Julian Assange denied this finding in a Fox News interview in January. He said “Our source is not the Russian government. It is not state parties.”
  
  Trump receives an intelligence briefing at Trump Tower. Comey informs Trump about Russian hacking and gives Trump a summary of a dossier detailing allegations that Russian operatives claim to have compromising personal and financial information about him, multiple US officials with direct knowledge of the briefings tell CNN.
  
  **January 10:** At Sessions’ [Senate confirmation hearing](http://www.cnn.com/2017/03/02/politics/russia-jeff-sessions-confirmation-hearing/) to become attorney general, Sen. Al Franken asks about a CNN report about intelligence community information that Trump campaign officials were in constant communication with Russians during the campaign. Sessions offers that he was a surrogate but never in contact with Russians.
  
  **January 12:**[The Washington Post first reports](https://www.washingtonpost.com/opinions/why-did-obama-dawdle-on-russias-hacking/2017/01/12/75f878a0-d90c-11e6-9a36-1d296534b31e_story.html?tid=a_inl&utm_term=.4b6477a2e764)that phone calls took place the day the White House announced Russian sanctions.
  
  **January 13:**Trump spokesman [Sean Spicer says](http://www.cnn.com/2017/01/13/politics/donald-trump-michael-flynn-russia-ambassador/) Flynn’s calls to Kislyak focused on the logistics of connecting Trump and Putin. “The call centered around the logistics of setting up a call with the President of Russia and the President-elect after he was sworn in, and they exchanged the logistical information,” Spicer says. “That was it. Plain and simple.”
  
  **January 15:**Spicer confirms Flynn and Kislyak have been in communication, but US Vice President Mike Pence tells CBS that[the two men did not talk about sanctions.](http://edition.cnn.com/2017/01/15/politics/mike-pence-flynn-trump-russia-contacts/)
  
  “They did not discuss anything having to do with the United States’ decision to expel diplomats or impose censure against Russia,” Pence says.
  
  **January 23:**Spicer, now the White House press secretary, reiterates that Flynn told him sanctions were not discussed in the calls. Three days after Trump officially becomes president, [US officials say investigators are scrutinizing several calls](http://www.cnn.com/2017/01/23/politics/flynn-russia-calls-investigation/)between Flynn and Russia’s ambassador.
  
  **January 26:**[The Justice Department privately warns the Trump administration](http://cnn.com/2017/02/13/politics/michael-flynn-justice-department-warning/index.html) that Flynn misled administration officials regarding his communications with Kislyak and is potentially vulnerable to blackmail by the Russians, according to a person familiar with the matter. The message is delivered by acting Attorney General Sally Yates, who is fired on January 30 for refusing to enforce Trump’s controversial travel ban barring citizens from seven Muslim-majority countries from entering the US.
  
  **February 8:**The Senate [confirms Sessions](http://www.cnn.com/2017/02/08/politics/jeff-sessions-vote-senate-slog/) to be the US attorney general.
  
  **February 9:**[Pence finds out](http://www.cnn.com/2017/02/14/politics/donald-trump-administration-michael-flynn/index.html) he had been misled by Flynn, according to two administration officials.
  
  **February 10:**[An aide close to Flynn says](http://www.cnn.com/2017/02/10/politics/flynn-russia-us-sanctions-reports/) he cannot rule out that the adviser spoke about sanctions on the call with Kislyak. On the same day, Trump says he is unaware of reports that Flynn may have spoken about sanctions during the calls and says [he will “look into that.”](http://edition.cnn.com/2017/02/10/politics/flynn-russia-us-sanctions-reports/) A US official then confirms that [Flynn and Kislyak did speak about sanctions](http://edition.cnn.com/2017/02/10/politics/flynn-russia-us-sanctions-reports/index.html), among other matters.
  
  **February 13:**Russia again denies the allegations that the men held conversations about sanctions, telling CNN:“[We have already said there haven’t been any.](https://twitter.com/DavidWright_CNN/status/831101696151531520)” On the same day, reports surface of the Justice Department’s warning to the administration regarding Flynn. As the reports emerge, Trump’s counselor Kellyanne Conway tells MSNBC that Flynn “does enjoy the full confidence of the President,” but around an hour later, Spicer says Trump is “evaluating the situation.” Flynn [resigns a few hours later](http://www.cnn.com/2017/02/13/politics/michael-t-flynn-resignation-letter/index.html), admitting he had “inadvertently briefed the vice president-elect and others with incomplete information” regarding the phone calls with Kislyak and apologizes.
  
