  # The world’s most mysterious family tree
  
  By [![Image 1: Holly Yan](https://media.cnn.com/api/v1/images/stellar/prod/150325082152-social-gfx-cnn-logo.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/holly-yan)[Holly Yan](https://www.cnn.com/profiles/holly-yan), CNN / Design: Alberto Mier
  
  Updated Feb 7, 2018
  
  Updated Feb 7, 2018, 3:09 AM ET
  
  PUBLISHED Feb 15, 2017, 5:02 PM ET
  
  North Korea Asia
  
  [See all topics](http://www.cnn.com/follow)
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2017%2F02%2F15%2Fasia%2Fkim-jong-un-family-tree-trnd "Share with email")Link Threads
  
  Link Copied!
  
  Behind North Korea’s ruling family is a tangled web of bizarre fates. It isn’t just the puzzling, [was-he-poisoned death](http://www.cnn.com/2017/02/15/asia/kim-jong-nam-murder-malaysia/index.html)of Kim Jong Un’s older brother. Before that, there was [the startling execution of his uncle](http://www.cnn.com/2013/12/12/world/asia/north-korea-uncle-executed/). And, of course, the reason why Kim leapfrogged past his older brothers to become his country’s Supreme Leader. Here’s a look:
  
  _Note: This family tree does not include all members of Kim’s extensive family, just the most notable ones. Also, since North Korea is notoriously secretive, some information such as birth dates cannot be confirmed._
  
