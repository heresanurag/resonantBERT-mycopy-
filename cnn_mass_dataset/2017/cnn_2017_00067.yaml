  ### Story highlights
  
  The woman had her first child six years ago at the age of 58
  
  Fertility treatments, life choices have led to an increase in later pregnancies
  
  No, this isn’t ripped from the headlines of the National Enquirer. According to a hospital in Spain, a woman really did give birth to twins at the age of 64.
  
  [According to a news release from Hospital Recoletas Burgos](http://www.gruporecoletas.com/hospital-recoletas-burgos-realiza-exito-una-cesarea-gemelos-una-mujer-64-anos/), a hospital in Burgos, Spain, the sextagenarian gave birth via C-section to a boy and a girl, and all three patients are in perfect health.
  
  The woman, who is being identified by her initials, had undergone IVF treatment in the United States before returning to Spain.
  
  Ad Feedback
  
  Recoletas says this isn’t the first time the woman has given birth there. Six years ago, she had her first child at the hospital at the tender, fecund age of 58.
  
  ![Image 3: Video ](http://www.cnn.com/2017/02/17/health/64-year-old-woman-twins-trnd/index.html)
  
  Fertility over 50 is a rare but clearly not impossible feat. [Data from the Centers for Disease Control and Prevention](https://www.cdc.gov/nchs/data/nvsr/nvsr62/nvsr62_09.pdf) (PDF) show that 600 babies were born to women between 50 and 54 years old in 2012. By comparison, there were only 144 such births in 1997.
  
  Celebrities like Janet Jackson are also increasing the visibility of later-in-life pregnancies. [Jackson gave birth to her first child in January](http://www.cnn.com/2016/10/12/health/pregnant-at-50-years-old/) at the age of 50.
  
  [Related video ![Image 4: twin sisters give birth same day pkg_00002201.jpg](https://media.cnn.com/api/v1/images/stellar/prod/160707093114-twin-sisters-give-birth-same-day-pkg-00002201.jpg?q=x_2,y_0,h_1078,w_1915,c_crop/h_720,w_1280/w_256) twin sisters give birth same day pkg_00002201.jpg KMGH Identical twin sisters give birth an hour apart](http://www.cnn.com/videos/us/2016/07/07/twin-sisters-give-birth-same-day-pkg.kmgh)
  
  Still, even though fertility treatments have changed the game for older moms, experts say there are risks, both for the birth and for the difficulties of motherhood that follow.
  
  Dr. Mark Sauer, vice chairman of the Department of Obstetrics and Gynecology at Columbia University Medical Center, [told CNN in January](http://www.cnn.com/2016/10/12/health/pregnant-at-50-years-old/) that the harder chapters of late pregnancies often go untold.
  
  “What never gets picked up in these stories … is there’s a lot of women doing this stuff that doesn’t work for them. They don’t get pregnant, or they miscarry, or God forbid, they have a disabled child, and now they’re maybe 50, 55, and they’ve got to deal with it,” Sauer said. “They have to be prepared for that.”
  
