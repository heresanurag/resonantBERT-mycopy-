  # 64-year-old woman gives birth to twins
  
  By [![Image 1: AJ Willingham](https://media.cnn.com/api/v1/images/stellar/prod/170208120300-aj-willingham.jpg?q=x_0,y_0,h_900,w_1599,c_fill/h_270,w_480/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/aj-willingham-profile)[AJ Willingham](https://www.cnn.com/profiles/aj-willingham-profile)
  
  Feb 17, 2017
  
  PUBLISHED Feb 17, 2017, 1:57 PM ET
  
