  Sessions bids farewell to Senate after vote
  
  1:53
  
  Washington—
  
  President Donald Trump now has an attorney general following the Senate’s confirmation Wednesday night of Jeff Sessions. The vote – coming after a confirmation process in which Sessions fended off accusations of racism – passed 52-47, largely along party lines.
  
  Speaking before prominent law enforcement officials Wednesday morning, Trump [once again lashed out at the judiciary](http://www.cnn.com/2017/02/08/politics/donald-trump-travel-ban-defense/index.html), saying “even a bad high school student” would rule in his favor.
  
  **IMMIGRATION**
  
  Ad Feedback
  
  *    The nation awaits a ruling in the 9th Circuit Court of Appeals, but it will not come Wednesday. Here’s [what happened](http://www.cnn.com/2017/02/07/politics/travel-ban-oral-arguments/) at the hearing.
  
  *    Senate Majority Leader Mitch McConnell [silenced Sen. Elizabeth Warren](http://www.cnn.com/2017/02/07/politics/elizabeth-warren-silenced/index.html) from speaking on the Senate floor, sparking a wave of outrage from Democrats.
  
  *    The [Los Angeles Times](http://www.latimes.com/politics/la-na-sessions-justice-department-20170206-story.html)has a profile of Sessions detailing the many challenges he’ll immediately face as Trump’s attorney general.
  
  *    Trump gave an update on the wall, saying, “The wall is getting designed right now. Many people say Trump was only kidding with the wall. I wasn’t kidding. I don’t kid. I don’t kid … We will have a wall. It will be a great wall, and it will do a lot – it will be a big help.”
  
  **OBAMACARE**
  
  *    At [Tuesday night’s CNN debate](http://www.cnn.com/2017/02/07/politics/obamacare-cruz-sanders-highlights/index.html), Sens. Bernie Sanders and Ted Cruz sparred on the future of healthcare in America. CNN also did [a reality check](http://www.cnn.com/2017/02/08/politics/health-care-debate-fact-check/index.html) on the various claims made at the debate.
  
  *    Get ready for another “R” word to describe the GOP’s Obamacare replacement plans: “[Reconciliation Plus.](http://www.cnn.com/2017/02/08/politics/obamacare-reconciliation-plus/index.html)”
  
  *    Meanwhile, the House Freedom Caucus is [set to introduce its own Obamacare repeal and replace bill](http://www.cnn.com/2017/02/07/politics/house-freedom-caucus-obamacare-repeal-replace/) as early as next week. It is being drafted with similar language to the 2015 bill that Congress passed but got vetoed by President Barack Obama.
  
  *   [Politico](http://www.politico.com/story/2017/02/obamacare-repeal-replace-effort-begins-to-gel-234769) reported Republicans will take four of the plans out there and begin to come up with a unified plan at the end of February.
  
  *   [Buzzfeed](https://www.buzzfeed.com/azeenghorayshi/pharmacists-freak-out-over-trump?utm_term=.lcQMM5xe0) reports that the pharmacy benefits managers lobbying group has issued [a warning](https://www.documentcloud.org/documents/3456994-MEMO.html) to its members that Trump is not “a conventional presidency” and is “rattling” health care industries.
  
  *    Sen. Mike Lee attended a Heritage Foundation roundtable titled “Congress Must Repeal Obamacare Immediately,” which again showed [conservatives getting nervous](http://www.washingtontimes.com/news/2017/feb/8/conservatives-demand-obamacare-repeal-spring/?utm_source=RSS_Feed&utm_medium=RSS) about the timeline for repeal.
  
  **ECONOMY**
  
  *    Despite stock markets reaching record highs, [Wall Street is growing increasingly nervous](http://money.cnn.com/2017/02/08/investing/trump-wall-street-investors/index.html) about Trump’s policies and the honeymoon may be over.
  
  *    Irene Rosenfeld, the CEO of the company that makes Oreo – one of Trump’s [targets](http://www.cnn.com/2016/05/19/politics/donald-trump-chris-christie-oreos/) on the campaign trail – [warned](http://money.cnn.com/2017/02/08/investing/mondelez-ceo-globalization-worries-trump/index.html) against a global rise in populism on her company’s earnings call Tuesday evening.
  
  **TAXES/INFRASTRUCTURE** – House Transportation Chair Bill Shuster told [Bloomberg](https://www.bloomberg.com/politics/articles/2017-02-07/court-weighs-trump-travel-ban-in-key-test-of-presidential-power) he supported using repatriated money from corporations to help pay for Trump’s infrastructure plan.
  
  **INFRASTRUCTURE**
  
  *    The Senate EPW Committee held a hearing on modernizing infrastructure. Sen. John Barrasso of Wyoming [said public-private partnerships](https://www.washingtonpost.com/local/trafficandcommuting/trumps-plan-to-tap-private-investors-for-infrastructure-funds-worries-senators-from-rural-states/2017/02/08/34d4d3b0-ee19-11e6-b4ff-ac2cf509efe5_story.html?utm_term=.46878bbfa7f6), “do not work for rural areas.”
  
  *    The National Governor’s association sent a list of 428 “shovel-ready” projects to the White House. The NGA is not making the final list public.
  
  *    Bloomberg has a [helpful guide](https://www.bloomberg.com/quicktake/public-private-partnerships) explaining public-private partnerships, which Trump has proposed as part of his infrastructure plan.
  
  *    According to [Reuters](http://www.reuters.com/article/us-usa-trump-airlines-idUSKBN15N2D6), US airline and cargo carrier executives will meet with Trump on Thursday to discuss rebuilding America’s aviation infrastructure.
  
  **ENVIRONMENT**
  
  *    In a column for the [Wall Street Journal](https://www.wsj.com/articles/a-conservative-answer-to-climate-change-1486512334), establishment Republican luminaries James Baker and George Schultz proposed a “conservative answer to climate change,” which is to [enact a carbon tax](http://www.cnn.com/2017/02/07/politics/republicans-climate-change/index.html).
  
  **LATER THIS WEEK** – **OBAMACARE** – Sen. John Cornyn said Monday that the Senate would vote on Health and Human Services Secretary-designate Tom Price by the end of the week. However, Democrats have pledged to hold the floor on more cabinet votes, which may push Price to the weekend.
  
  **THURSDAY – INFRASTRUCTURE** – Trump meets with airline CEOs and they are expected to discuss his infrastructure plans.
  
  **FRIDAY – TRADE** – Trade, jobs and infrastructure will all be on the table as Japanese Prime Minister Shinzo Abe visits the White House.
  
