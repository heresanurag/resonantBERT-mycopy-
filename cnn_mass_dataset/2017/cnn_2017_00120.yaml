  ### Story highlights
  
  Boston could surpass its yearly snowfall average this week, and it's only February
  
  National Weather Service: Bay Area has experienced wettest winter season in over 100 years
  
  New England is getting pummeled with yet another blizzard, the latest salvo in what has already been an unrelenting winter in the Northeast.
  
  The National Weather Service issued a winter storm warning Sunday for a large swath of the region, including portions of New York state, Connecticut, Vermont, New Hampshire, Massachusetts and Maine – an area that’s home to more than 15 million people.
  
  The agency warned that Portland, Maine, could see as much as 26 inches of snow.
  
  Ad Feedback
  
  “That’s the bull’s-eye,” said CNN meteorologist Allison Chinchar, who added that the snow, which began falling Sunday afternoon, would continue into Monday.
  
  In anticipation of the winter storm, Portland International Jetport in Portland, Maine, [canceled all flights](https://twitter.com/portlandjetport/status/830886441584558080) for 24 hours, from Sunday at 8 p.m. to Monday at 8 p.m.
  
  ![Image 39: Projected snowfalls for Massachusetts, Connecticut and Rhode Island.](https://media.cnn.com/api/v1/images/stellar/prod/170212101900-new-england-snow-graphc-0211.jpg?q=w_1600,h_899,x_0,y_0,c_fill/w_1093)
  
  Projected snowfalls for Massachusetts, Connecticut and Rhode Island.
  
  National Weather Service
  
  In Boston, about 100 miles south, the city braced for as much as 16 inches of snow from Sunday into Monday – with some suburbs along the north shore expecting up to 19 inches – creating a potentially dangerous morning commute.
  
  “The snow will be heavy and wet, and winds high, so power outages and downed trees are a concern,” said CNN meteorologist Julie Martin. “It is likely schools will be canceled again.”
  
  > > Northeast U.S. bracing for another round of [#wind](https://twitter.com/hashtag/wind?src=hash&ref_src=twsrc%5Etfw)&[#snow](https://twitter.com/hashtag/snow?src=hash&ref_src=twsrc%5Etfw) Sun-Mon as strong Nor'easter develops off Northeast coast. [https://t.co/GIrv1srJLh](https://t.co/GIrv1srJLh)[pic.twitter.com/EUJppoSDBR](https://t.co/EUJppoSDBR)
  
  > >
  
  > > — National Weather Service (@NWS) [February 11, 2017](https://twitter.com/NWS/status/830243902347153410?ref_src=twsrc%5Etfw)
  
  Boston has already gotten almost 31 inches of snow this winter, so if the weather service’s prediction is accurate the city will soon surpass its annual average of 43.8 inches for the entire year, according to Chinchar. “And it’s only February,” she added.
  
  Still, it would take quite a bit more punishing by Mother Nature to match the record-shattering 110.6 inches of snow that crippled Boston in the winter of 2014-2015. That snowfall was so vast [that an enormous pile lingered until July before finally melting.](http://www.cnn.com/2015/07/15/us/boston-snow-pile-finally-melts/)
  
  “I’m not sure we will get to that magnitude,” Chinchar said, “but we will certainly be well above average to finish this winter season.”
  
  ## Thundersnow
  
  Across the Northeast, residents this winter have experienced a rare weather phenomenon known as “thundersnow,” when thunder and lightning occur as snow is reaching the ground.
  
  > > Who's ready for more [#Thundersnow](https://twitter.com/hashtag/Thundersnow?src=hash&ref_src=twsrc%5Etfw)? The setup looks favorable Mon morning for [#MA](https://twitter.com/hashtag/MA?src=hash&ref_src=twsrc%5Etfw)&[#RI](https://twitter.com/hashtag/RI?src=hash&ref_src=twsrc%5Etfw) as a coastal storm intensifies rapidly near Cape Cod!
  
  > >
  
  > > — NWS Boston (@NWSBoston) [February 12, 2017](https://twitter.com/NWSBoston/status/830604180364619777?ref_src=twsrc%5Etfw)
  
  For this to happen, the air layer closer to the ground must be warmer than the layers above but still cold enough to create snow, meteorologists explain. It is fairly rare, because ground temperatures in the winter are usually too cold.
  
  Also, it’s likely that this storm system could undergo another weather anomaly called “bombogenesis.”
  
  “This happens when there is a large difference between a cold air mass and warm sea surface temps. High winds are a product of this and intense precipitation – even blizzards,” Martin said.
  
  [Related video ![Image 40: People walk through Times Square during a winter storm, February 9, 2017 in New York / AFP / Bryan R. Smith (Photo credit should read BRYAN R. SMITH/AFP/Getty Images)](https://media.cnn.com/api/v1/images/stellar/prod/170209103720-01-noreaster-0209.jpg?q=x_3,y_153,h_1684,w_2993,c_crop/h_720,w_1280/w_256) People walk through Times Square during a winter storm, February 9, 2017 in New York / AFP / Bryan R. Smith (Photo credit should read BRYAN R. SMITH/AFP/Getty Images) BRYAN R. SMITH/AFP/Getty Images This is what thundersnow sounds like](http://www.cnn.com/videos/weather/2017/02/09/thundersnow-orig-llr.cnn)
  
  Snowfall will become heavier as the storm moves farther southeast from Maine to Massachusetts and Rhode Island, intensifying near Cape Cod on Monday morning, [the National Weather Service](http://forecast.weather.gov/MapClick.php?lat=42.3651&lon=-71.0178#.WJ1m8W8rKUl) said. Wind gusts of 65 mph or more are expected for the coastal region.
  
  On Cape Cod, a blizzard watch is in effect until Monday as temperatures drop below freezing.
  
  In New York City, no snow is expected Monday, but “gusty winds over 40 mph could lead to a lot of travel troubles to start the workweek,” Martin said.
  
  The storm is expected to move out by Monday night.
  
  ## West Coast gets drenched
  
  The West Coast continues to grapple with rapid snow melt and heavy rains in the Sierra mountains, which led to flooding in parts of Nevada and Southern California last week.
  
  In Northern California, rainfall totals have reached record highs in the Bay Area. The National Weather Service has called this the wettest winter season there in more than 100 years.
  
  > > Rainfall totals for North San Francisco [#BayArea](https://twitter.com/hashtag/BayArea?src=hash&ref_src=twsrc%5Etfw)[#Napa](https://twitter.com/hashtag/Napa?src=hash&ref_src=twsrc%5Etfw)[#Kentfield](https://twitter.com/hashtag/Kentfield?src=hash&ref_src=twsrc%5Etfw) wettest winter season - to date - in over 100 years[#SanRafael](https://twitter.com/hashtag/SanRafael?src=hash&ref_src=twsrc%5Etfw) 2nd wettest [pic.twitter.com/QzUSvXftOX](https://t.co/QzUSvXftOX)
  
  > >
  
  > > — NWS Bay Area 🌉 (@NWSBayArea) [February 12, 2017](https://twitter.com/NWSBayArea/status/830659791982833664?ref_src=twsrc%5Etfw)
  
  Heavy downpours and heavy mountain snow are expected to last through Monday morning, the National Weather Service said.
  
