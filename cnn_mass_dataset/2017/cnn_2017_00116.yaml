  ##### US aircraft carriers
  
  US aircraft carrier operations in the South China Sea are not unusual. Almost a year ago, [the USS John C. Stennis led a similar cruise](http://www.cnn.com/2016/03/04/politics/aircraft-carrier-patrols-south-china-sea/) through the area. And the Vinson was in the South China Sea in 2015, just one of its 16 operations in the South China Sea in its 35-year history.
  
  The cruise of the Vinson in the South China Sea is the second of a high-profile US Navy vessel this month.
  
  Last week, the littoral combat ship USS Coronado, which is temporarily based in Singapore, was conducting training operations in the South China Sea, according to a Navy statement.
  
