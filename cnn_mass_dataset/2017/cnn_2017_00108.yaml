  # Swastika scrawlings unnerve three US cities
  
  By Andreas Preuss, [Joe Sutton](https://www.cnn.com/profiles/joe-sutton)
  
  Updated Feb 5, 2017
  
  Updated Feb 5, 2017, 12:48 PM ET
  
  PUBLISHED Feb 5, 2017, 4:11 AM ET
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2017%2F02%2F05%2Fus%2Fchicago-houston-new-york-swastika-vandalism "Share with email")Link Threads
  
  Link Copied!
  
  ![Image 1: Chicago Police released surveillance video of man smashing the front window of a synagogue.](https://media.cnn.com/api/v1/images/stellar/prod/170205030313-chicago-swastika-suspect.jpg?q=w_1920,h_1080,x_0,y_0,c_fill/w_860)
  
  Chicago Police released surveillance video of man smashing the front window of a synagogue.
  
  Chicago Police Department
  
  ### Story highlights
  
  Chicago Police say a synagogue was vandalized
  
  A Rice University statue was defaced, and New York subway riders encountered hateful graffiti
  
  Police are investigating a flurry of swastika vandalism over the weekend in three major US cities.
  
  Chicago Police released a surveillance video Saturday that shows a man smashing the front window of a synagogue and placing swastikas on the front door.
  
  In the video, the suspect pulls up to the synagogue curb in a dark-colored SUV just after midnight, places the stickers on the front door and then breaks the glass with a metal object. He then gets back in the car and flees the scene.
  
  Ad Feedback
  
  ![Image 2: Chicago Police release pictures of smashed synagogue window and hate crime stickers ](https://media.cnn.com/api/v1/images/stellar/prod/170205030916-chicago-swastika-window.jpg?q=w_1920,h_1080,x_0,y_0,c_fill/w_632)
  
  Chicago Police release pictures of smashed synagogue window and hate crime stickers
  
  Chicago Police Department
  
  The man is wearing dark clothing and a dark head mask, police said.
  
  The incident is being investigated as a hate crime.
  
  “The Chicago Jewish community will not be intimidated by anti-Semitic attacks on a house of worship,” American Jewish Committee Director Amy Stoken said in a statement to CNN.
  
  ## ‘I have had it with this behavior’
  
  In Houston, campus police at Rice University are investigating the swastika vandalism of the school’s William Marsh Rice statue.
  
  The university reported that a swastika was drawn on the base of the iconic statue in the academic quad Friday night. The vandalism also included unidentified “words,” according to a Rice statement sent to CNN.
  
  “I have had it with this behavior … We are smarter, we are resolute and we outnumber the hatemongers by far,” Dean John Hutchinson said in the statement.
  
  ## ‘We will not let hate win’
  
  And in New York City, passengers encountered swastikas and Nazi slogans scrawled on a subway train car Saturday night.
  
  [Related article ![Image 3: nyc nazi graffiti](https://media.cnn.com/api/v1/images/stellar/prod/170205095345-nyc-nazi-graffiti.jpg?q=h_619,w_960,x_0,y_49,c_crop/h_619,w_1100,c_lpad,b_rgb:061015/h_720,w_1280/w_256) Gregory Locke New Yorkers unite to scrub hateful graffiti from subway](http://www.cnn.com/2017/02/05/us/subway-nazi-graffiti-new-york-trnd/index.html)
  
  One rider, Gregory Locke, documented the hateful graffiti – and passengers’ efforts to remove it – in a Facebook post that went viral.
  
  [New Yorkers unite to scrub hateful graffiti from subway](http://www.cnn.com/2017/02/05/us/subway-nazi-graffiti-new-york-trnd/index.html)
  
  It even caught the attention of former first daughter Chelsea Clinton, who tweeted about it.
  
  “We will not let hate win,” Clinton said.
  
  > > We will not let hate win. And, another reason to carry hand sanitizer. [pic.twitter.com/bgrAJf7SCv](https://t.co/bgrAJf7SCv)
  
  > >
  
  > > — Chelsea Clinton (@ChelseaClinton) [February 5, 2017](https://twitter.com/ChelseaClinton/status/828118741728759809?ref_src=twsrc%5Etfw)
  
  One person on the train suggested using hand sanitizer to erase the swastikas, Locke said in his post. So passengers banded together and erased the graffiti in a matter of minutes.
  
