  # Russia: ‘We’re not returning our territory’ Crimea to Ukraine
  
  By [![Image 1: Euan McKirdy](https://media.cnn.com/api/v1/images/stellar/prod/150103175015-euan-mckirdy-profile-new.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/euan-mckirdy)[Euan McKirdy](https://www.cnn.com/profiles/euan-mckirdy)
  
  Updated Feb 16, 2017
  
  Updated Feb 16, 2017, 12:11 PM ET
  
  PUBLISHED Feb 15, 2017, 6:15 AM ET
  
  Russia Donald Trump
  
