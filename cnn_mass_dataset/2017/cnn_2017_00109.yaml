  ### Story highlights
  
  Russia's declaration comes ahead of first meeting between top diplomats
  
  Statement follows reports of Trump campaign advisers' constant contact with Russia
  
  Russia’s Foreign Ministry has indicated that it intends to keep Crimea and not return it to Ukraine because it considers it to be part of Russia.
  
  Russia’s Foreign Ministry spokeswoman Maria Zakharova told reporters Wednesday during a weekly news conference: “We’re not returning our territory. Crimea is part of the Russian Federation.”
  
  White House Press Secretary Sean Spicer said Tuesday that Trump had been taking a tough line with Russia and that he expected Moscow to withdraw from the region, which it occupied following a “[full-scale invasion](http://cnn.com/2014/08/28/world/europe/ukraine-crisis/)” in 2014.
  
  Ad Feedback
  
  Spicer pointed to UN Ambassador Nikki Haley’s recent remarks on Russia’s actions in east Ukraine and occupation of Crimea, adding that Trump “expects the Russian government to de-escalate violence in the Ukraine and return Crimea.”
  
  [Related video ![Image 4: cold war explainer orig](https://media.cnn.com/api/v1/images/stellar/prod/161207082422-cold-war-explainer-orig.jpg?q=x_9,y_0,h_1070,w_1903,c_crop/h_720,w_1280/w_256) Getty Images The Cold War: Then and now](http://www.cnn.com/videos/world/2016/11/30/cold-war-then-and-now-russia-usa-orig-td.cnn)
  
  The Ministry’s declaration comes as it emerged that high-level advisers close to then-presidential nominee Donald Trump were in [constant communication during the campaign](http://cnn.com/2017/02/14/politics/donald-trump-aides-russians-campaign/index.html) with Russians known to US intelligence, multiple current and former intelligence, law enforcement and administration officials tell CNN.
  
  Trump’s former national security adviser Michael Flynn was [forced to step down](http://cnn.com/2017/02/13/politics/michael-flynn-white-house-national-security-adviser/index.html) Monday after it emerged that he had discussed policy with the Russian ambassador to the US prior to his appointment. He subsequently admitted he had “inadvertently briefed the Vice President-elect and others with incomplete information.”
  
  [What does Michael Flynn’s resignation mean for Moscow?](http://cnn.com/2017/02/14/politics/michael-flynn-russia-reaction/index.html)
  
  ## First high-level meeting looms
  
  [Related video ![Image 5: Ukrainian soldiers from the 72nd brigade in training on the outskirts of Avdiivka.](https://media.cnn.com/api/v1/images/stellar/prod/170201114304-eastern-ukraine-01.jpg?q=x_5,y_23,h_2749,w_4885,c_crop/h_720,w_1280/w_256) Ukrainian soldiers from the 72nd brigade in training on the outskirts of Avdiivka. CNN 'People are being killed every day' in Ukraine](http://www.cnn.com/videos/world/2017/02/08/intv-amanpour-david-mcallister-russia.cnn)
  
  Russia’s statement also came as Foreign Minister Sergey Lavrov [prepares to meet his American counterpart](http://www.cnn.com/2017/02/14/politics/tillerson-russia-china-g20/index.html), Secretary of State Rex Tillerson, on the sidelines of the G20 meetings in Germany this Thursday.
  
  The Bonn summit will be Tillerson’s inaugural international trip as the United States’ top diplomat. He’ll be joined in Bonn by Lavrov, Chinese Foreign Minister Wang Yi and representatives from the world’s other major economies.
  
  President Trump had previously buoyed the Kremlin’s claim on Crimea. In July, on the campaign trail Trump had said that the Ukraine crisis was “[more of a Europe problem](http://cnn.com/2015/07/31/politics/doanld-trump-crimea-europe-problem/),” and that the United States should only step in on Crimea if European countries ask for help. He has also criticized NATO – traditionally the West’s bulwark against Russian aggression – for being outdated.
  
  In July, Trump [said](http://cnn.com/2016/07/31/politics/donald-trump-russia-ukraine-crimea-putin/) Russian President Vladimir Putin won’t make a military move into Ukraine – even though Putin already has done just that by seizing the peninsula.
  
  “He’s not going into Ukraine, OK, just so you understand. He’s not going to go into Ukraine, all right? You can mark it down. You can put it down. You can take it anywhere you want,” Trump said in a July interview with ABC News’ George Stephanopoulos on “This Week.”
  
  In the weeks before and after his inauguration, Trump’s refusal to condemn Russian hacking during the election and his attacks on the intelligence community for investigating those hacks raised questions about his ties to Moscow.
  
  [Senators seek Hill veto power over Trump on Russia](http://cnn.com/2017/02/07/politics/russia-sanctions-gop-senators-donald-trump/index.html)
  
  ## Harder line
  
  [Related video ![Image 6: phil black ukraine avdiivka life in warzone pkg_00012617.jpg](https://media.cnn.com/api/v1/images/stellar/prod/170209045241-phil-black-ukraine-avdiivka-life-in-warzone-pkg-00012617.jpg?q=x_0,y_0,h_1080,w_1919,c_fill/h_720,w_1280/w_256) phil black ukraine avdiivka life in warzone pkg_00012617.jpg Families struggle in war-torn Eastern Ukraine](http://www.cnn.com/videos/world/2017/02/09/phil-black-ukraine-avdiivka-life-in-warzone-pkg.cnn)
  
  Since assuming office the Trump administration has taken a much harder line on the occupation of the western part of Ukraine, a partner of NATO.
  
  Haley, the US ambassador to the United Nations, [offered a strong condemnation](http://cnn.com/2017/02/02/politics/haley-russia-un/) of Russia in her first appearance at the UN Security Council on February 2. She called on Moscow to de-escalate violence in eastern Ukraine and said US sanctions against Moscow would remain in place until it withdraws from Crimea.
  
  “The United States continues to condemn and call for an immediate end to the Russian occupation of Crimea,” Haley said.
  
  “Crimea is a part of Ukraine. Our Crimea-related sanctions will remain in place until Russia returns control over the peninsula to Ukraine.”
  
  [Praise for Putin, but Trump’s Russia policy a work in progress](http://cnn.com/2017/02/06/politics/trump-putin-russia/index.html)
  
  Correction:A previous version of this story inaccurately described Ukraine's relationship to NATO. Ukraine is a partner of the alliance.
  
