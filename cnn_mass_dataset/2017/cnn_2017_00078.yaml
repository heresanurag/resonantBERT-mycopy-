  # Newest Republican Obamacare plan: ‘Reconciliation Plus’
  
  By [![Image 1: MJ Lee](https://media.cnn.com/api/v1/images/stellar/prod/150327154508-mj-lee.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/mj-lee)[MJ Lee](https://www.cnn.com/profiles/mj-lee), CNN National Politics Reporter
  
  Feb 8, 2017
  
  PUBLISHED Feb 8, 2017, 11:30 AM ET
  
