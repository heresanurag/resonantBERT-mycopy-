  Jesus Moron/AP
  
  ### Story highlights
  
  Migrants shouted "Viva España!" and kissed the ground, video from the scene shows
  
  Eleven law enforcement officers were treated for injuries, including three taken to the hospital
  
  Nearly 500 African migrants pushed their way across the border fence Friday morning from Morocco into the Spanish enclave of Ceuta, one of two Spanish enclaves in North Africa, a Spanish police source told CNN.
  
  About 700 migrants amassed near the border early Friday before storming the fence, and 498 migrants managed to cross into Spanish territory, the source said.
  
  The others were stopped by the Moroccan military and by Spanish and Moroccan authorities, the source added.
  
  Ad Feedback
  
  ![Image 4: Migrants celebrate after storming the fence and entering the Spanish enclave of Ceuta. ](https://media.cnn.com/api/v1/images/stellar/prod/170217163956-04-ceuta-spain-migrants-0217.jpg?q=w_3000,h_2000,x_0,y_0,c_fill/w_1093)
  
  Migrants celebrate after storming the fence and entering the Spanish enclave of Ceuta.
  
  Jesus Moron/AP
  
  Social media video provided to a local station shortly after the migrants arrived shows many celebrating while running through the streets. Other videos show barefoot and bare-chested migrants shouting “Viva España!” A few migrants had flags of the European Union and Spain draped over their backs. Some could be seen kissing the ground.
  
  > > ▶ Vídeo: Nueva entrada masiva de inmigrantes - YouTube [https://t.co/etMDJnSFVC](https://t.co/etMDJnSFVC)
  
  > >
  
  > > — El Faro de Ceuta (@ElFarodeCeuta) [February 17, 2017](https://twitter.com/ElFarodeCeuta/status/832476227034165249?ref_src=twsrc%5Etfw)
  
  Eleven Spanish Civil guards were hurt trying to stop the migrants, the source said. Three had to be taken to a local hospital.
  
  The 498 migrants are receiving assistance from the Spanish Red Cross at a Temporary Migrant Center in Ceuta, [the agency said in a statement.](https://www.facebook.com/notes/cruz-roja-ceuta/el-erie-inmigraci%C3%B3n-de-cruz-roja-ceuta-atiende-a-498-personas-de-las-que-18-han-/1279626385465317)
  
  The Red Cross said 18 migrants had to be treated at a local hospital after being hurt while crossing the border.
  
  > > El ERIE de Inmigracióbn [@CruzRojaCeuta](https://twitter.com/CruzRojaCeuta?ref_src=twsrc%5Etfw) ha atendido hoy a 498 personas,de las que 18 han sido trasladas al Hospital [https://t.co/PwCOz7C3Od](https://t.co/PwCOz7C3Od)[pic.twitter.com/UpYHhkFxo7](https://t.co/UpYHhkFxo7)
  
  > >
  
  > > — Cruz Roja en Ceuta (@CruzRojaCeuta) [February 17, 2017](https://twitter.com/CruzRojaCeuta/status/832577893695889408?ref_src=twsrc%5Etfw)
  
  ## Desperate attempts to cross
  
  Ceuta, along with the province of Melilla to the east, are Europe’s only land borders in Africa. Both enclaves have long been popular transit points for sub-Saharan African migrants trying to cross the sea at the narrow point south of Spain.
  
  At least 800 African migrants tried to storm a border fence into Ceuta from Morocco on New Year’s Day, [Reuters reported](http://www.reuters.com/article/us-europe-migrants-spain-idUSKBN14L147), citing the Spanish and Moroccan governments[.](http://www.reuters.com/article/us-europe-migrants-spain-idUSKBN14L147)
  
  ![Image 5: Migrants sit on the ground next to Spanish police officers after crossing into Ceuta. ](https://media.cnn.com/api/v1/images/stellar/prod/170217163654-02-ceuta-spain-migrants-0217.jpg?q=w_3000,h_2000,x_0,y_0,c_fill/w_1093)
  
  Migrants sit on the ground next to Spanish police officers after crossing into Ceuta.
  
  Jesus Moron/AP
  
  Most of the migrants that day were prevented from entering Spanish territory. A handful of migrants scaled the 6-meter-high barbed-wire fence but were eventually removed by cranes, [Reuters reported.](http://www.reuters.com/article/us-europe-migrants-spain-idUSKBN14L147) Dozens of Moroccan security agents were injured in the incident, along with five Spanish police officers.
  
  A young woman was arrested in December 2016 after being caught [trying to smuggle a 19-year-old African migrant into Ceuta in her suitcase](http://www.cnn.com/2017/01/03/europe/ceuta-morocco-refugee-suitcase/index.html). The man was treated for lack of sufficient oxygen inside the compact travel bag, Spain’s Civil Guard said in a statement.
  
  [Related article ![Image 6: Photos taken by Spanish Civil Guard on December 30, 2016 show a rescued 19-year-old migrant from Gabon who attempted to cross into Ceuta inside a suitcase. The man was in immediate need of medical attention due to the lack of oxygen inside the suitcase. Authorities arrested the 22-year-old woman who was carrying the suitcase. The statement by the country's Civil Guard says officials decided to ask her to open her suitcase after they noticed she was carrying it on top of a trolley. Authorities add the woman showed "evasive attitude while going through the established controls and nervousness" while speaking to the agents.](https://media.cnn.com/api/v1/images/stellar/prod/170103101040-african-migrant-smuggled-in-suitcase-split-0103.jpg?q=x_3,y_0,h_1684,w_2993,c_crop/h_720,w_1280/w_256) Photos taken by Spanish Civil Guard on December 30, 2016 show a rescued 19-year-old migrant from Gabon who attempted to cross into Ceuta inside a suitcase. The man was in immediate need of medical attention due to the lack of oxygen inside the suitcase. Authorities arrested the 22-year-old woman who was carrying the suitcase. The statement by the country's Civil Guard says officials decided to ask her to open her suitcase after they noticed she was carrying it on top of a trolley. Authorities add the woman showed "evasive attitude while going through the established controls and nervousness" while speaking to the agents. Spanish Civil Guard Woman busted smuggling teen refugee inside suitcase](http://www.cnn.com/2017/01/03/europe/ceuta-morocco-refugee-suitcase/index.html)
  
  This creative but dangerous method of concealment is one of several desperate approaches to illegal smuggling that the Spanish Civil Guard has faced on the Ceuta border.
  
  Two migrants – a man and a woman – from Guinea were also rescued in December after authorities discovered them hidden inside the dashboard and the backseat of a Volkswagen Golf, the Spanish Civil Guard said. A Moroccan man driving the car, which had been stolen, was arrested, officials said.
  
