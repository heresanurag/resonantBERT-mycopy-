  # Nearly 500 African migrants storm border with Spain
  
  By [![Image 1: Marilia Brocchetto](https://media.cnn.com/api/v1/images/stellar/prod/160625063715-marilia-brocchetto-profile.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/marilia-brocchetto)[Marilia Brocchetto](https://www.cnn.com/profiles/marilia-brocchetto), [![Image 2: Vasco Cotovio](https://media.cnn.com/api/v1/images/stellar/prod/150325082152-social-gfx-cnn-logo.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/vasco-cotovio)[Vasco Cotovio](https://www.cnn.com/profiles/vasco-cotovio)
  
  Updated Feb 17, 2017
  
  Updated Feb 17, 2017, 12:55 PM ET
  
  PUBLISHED Feb 17, 2017, 12:49 PM ET
  
  Immigration Africa
  
