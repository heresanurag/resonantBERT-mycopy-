  ##### North Dakota pipeline protests
  
  ### Story highlights
  
  Veterans Stand has raised $186,767 to support protesters, according to website
  
  "We just want to give people a platform," says group's founder
  
  The troops are mobilizing for a second “deployment.”
  
  The Veterans Stand group is once again raising funds for protesters who have been fighting [construction of the Dakota Access Pipeline.](http://www.cnn.com/2017/02/09/politics/dakota-access-pipeline-fight/index.html) So far, the [GoFundMe](https://www.gofundme.com/VetStand4-StandingRock) effort for the new campaign has raised $186,767 of the $500,000 goal, according to the group’s GoFundMe page. The funds will go toward supplies for the North Dakota protest camp, transportation of veterans to and from Standing Rock Indian Reservation and operations. The [Facebook page](https://www.facebook.com/VeteransStand4/?ref=nf) sites increased “turmoil and uncertainty” as a motivation to continue efforts.
  
  > Facebook post not found.
  
  > Post has been removed or is no longer public.
  
