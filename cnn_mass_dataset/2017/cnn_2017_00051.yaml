  # Florida man wanted in 4 killings is dead; companion arrested
  
  By [Eric Levenson](https://www.cnn.com/profiles/eric-levenson), [![Image 1: AnneClaire Stapleton](https://media.cnn.com/api/v1/images/stellar/prod/150107162900-anneclaire-profile-photo.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/anneclaire-stapleton)[AnneClaire Stapleton](https://www.cnn.com/profiles/anneclaire-stapleton), Steve Almasy
  
  Updated Feb 8, 2017
  
  Updated Feb 8, 2017, 6:58 AM ET
  
  PUBLISHED Feb 7, 2017, 10:56 AM ET
  
