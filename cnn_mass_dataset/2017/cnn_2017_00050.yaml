  # US says it killed bin Laden-era al Qaeda leader in Syria
  
  By Ryan Browne
  
  Updated Feb 9, 2017
  
  Updated Feb 9, 2017, 12:02 AM ET
  
  PUBLISHED Feb 8, 2017, 7:05 PM ET
  
