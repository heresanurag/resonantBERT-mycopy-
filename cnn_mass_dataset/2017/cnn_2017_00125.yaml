  ![Image 2: Mike Pence Federalist Society February 4 2017 01](https://media.cnn.com/api/v1/images/stellar/prod/170204150207-mike-pence-federalist-society-february-4-2017-01.jpg?q=x_75,y_54,h_941,w_1673,c_crop/w_860)
  
