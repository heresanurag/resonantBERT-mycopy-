  # Pence’s role: Batting ‘clean up’ for Trump
  
  By [Dan Merica](https://www.cnn.com/profiles/dan-merica-profile)
  
  Updated Feb 6, 2017
  
  Updated Feb 6, 2017, 2:47 PM ET
  
  PUBLISHED Feb 6, 2017, 12:40 PM ET
  
  Donald Trump
  
