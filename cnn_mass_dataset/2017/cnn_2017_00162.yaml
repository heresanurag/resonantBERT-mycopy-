  # Judge rejects request to delay travel ban lawsuit
  
  By [![Image 1: Ariane de Vogue](https://media.cnn.com/api/v1/images/stellar/prod/150422092918-ariane-de-vogue-profile.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/ariane-de-vogue-profile)[Ariane de Vogue](https://www.cnn.com/profiles/ariane-de-vogue-profile), [Dan Simon](https://www.cnn.com/profiles/dan-simon)
  
  Updated Feb 14, 2017
  
  Updated Feb 14, 2017, 6:37 AM ET
  
  PUBLISHED Feb 13, 2017, 4:04 PM ET
  
  Donald Trump
  
  [See all topics](http://www.cnn.com/follow)
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2017%2F02%2F13%2Fpolitics%2Ftrump-delay-travel-ban-seattle "Share with email")Link Threads
  
  Link Copied!
  
  ![Image 2: Federal Judge James Robart at a hearing in Seattle on August 26, 2015.](https://media.cnn.com/api/v1/images/stellar/prod/170204010129-judge-robart.png?q=x_2,y_2,h_1070,w_1902,c_crop)
  
  Video Ad Feedback
  
  Judge rejects request to delay travel ban case
  
  1:48  • Source: [CNN](https://www.cnn.com/)
  
  ![Image 3: Federal Judge James Robart at a hearing in Seattle on August 26, 2015.](https://media.cnn.com/api/v1/images/stellar/prod/170204010129-judge-robart.png?q=x_2,y_2,h_1070,w_1902,c_crop/w_860)
  
  Judge rejects request to delay travel ban case
  
  1:48
  
  Federal District Court Judge James Robart in Seattle denied a request from the Trump administration to postpone any further proceedings in his court over President Donald Trump’s travel ban, while the 9th Circuit Court of Appeals considers whether to rehear the case before a larger panel of judges.
  
  [Related video ![Image 4: US President Donald Trump speaks before Rex Tillerson was sworn in as Secretary of State in the Oval Office at the White House in Washington, DC, on February 1, 2017. President Trump notched a victory with confirmation of Rex Tillerson as his secretary of state, but opposition Democrats girded for battle over several other nominations, including his pick for the US Supreme Court. / AFP / NICHOLAS KAMM (Photo credit should read NICHOLAS KAMM/AFP/Getty Images)](https://media.cnn.com/api/v1/images/stellar/prod/170209180935-trump-8.jpg?q=x_0,y_258,h_2451,w_4356,c_crop/h_720,w_1280/w_256) US President Donald Trump speaks before Rex Tillerson was sworn in as Secretary of State in the Oval Office at the White House in Washington, DC, on February 1, 2017. President Trump notched a victory with confirmation of Rex Tillerson as his secretary of state, but opposition Democrats girded for battle over several other nominations, including his pick for the US Supreme Court. / AFP / NICHOLAS KAMM (Photo credit should read NICHOLAS KAMM/AFP/Getty Images) NICHOLAS KAMM/AFP/AFP/Getty Images Trump responds: See you in court](http://www.cnn.com/videos/politics/2017/02/09/trump-travel-ban-tweet-see-you-in-court-tsr-sot.cnn)
  
  “I’m not prepared to slow this down,” Robart said, ruling from the bench.
  
  What this means is that the challenge to the travel ban by the states – Washington and Minnesota – will proceed the merits in front of Robart.
  
  Ad Feedback
  
  “I’m not persuaded that call for en banc review by one judge … ought to interfere with moving this case forward, ” Robart said.
  
  As the government argued for postponement, the judge referenced Trump’s tweet reacting to the 9th Circuit ruling saying he would “see you in court.”
  
  “I’m a little surprised since the President said he wanted ‘to see you in court,’” Robart said, later adding, “Are you confident that’s the argument you want to make?”
  
  DOJ lawyer Michelle R. Bennett said: “Yes, your honor.”
  
  > > SEE YOU IN COURT, THE SECURITY OF OUR NATION IS AT STAKE!
  
  > >
  
  > > — Donald J. Trump (@realDonaldTrump) [February 9, 2017](https://twitter.com/realDonaldTrump/status/829836231802515457?ref_src=twsrc%5Etfw)
  
  The Trump administration is reviewing its options, including rewriting or modifying the executive order.
  
  [White House examining several new travel ban plans](http://www.cnn.com/2017/02/13/politics/new-travel-ban-executive-order/index.html)
  
  The administration’s request filed Monday reveals no new information regarding the White House’s plans to possibly rewrite or modify the order.
  
  Trump’s order barred foreign nationals from Iran, Sudan, Libya, Somalia, Syria, Iraq and Yemen from entering the country for 90 days, all refugees for 120 days, and all refugees from Syria indefinitely.
  
  Laura Jarrett and Pamela Brown contributed to this report
  
