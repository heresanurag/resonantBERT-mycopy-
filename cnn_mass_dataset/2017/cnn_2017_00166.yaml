  > >
  
  > > — Coexist Peace 🕊️🔴 (@coexistpeace) [February 19, 2017](https://twitter.com/coexistpeace/status/833419862869438464?ref_src=twsrc%5Etfw)
  
  > > Thank you to all who organized [#IAmAMuslimToo](https://twitter.com/hashtag/IAmAMuslimToo?src=hash&ref_src=twsrc%5Etfw) today - Charlotte's 1st protest rally. [#NoBanNoWallNoRaids](https://twitter.com/hashtag/NoBanNoWallNoRaids?src=hash&ref_src=twsrc%5Etfw)[pic.twitter.com/5mSXGQtPJU](https://t.co/5mSXGQtPJU)
  
  > >
  
  > > — Chelsea Clinton (@ChelseaClinton) [February 19, 2017](https://twitter.com/ChelseaClinton/status/833388099107430400?ref_src=twsrc%5Etfw)
  
  > > .[@SusanSarandon](https://twitter.com/SusanSarandon?ref_src=twsrc%5Etfw) and [@lsarsour](https://twitter.com/lsarsour?ref_src=twsrc%5Etfw) at the [#IAmAMuslimToo](https://twitter.com/hashtag/IAmAMuslimToo?src=hash&ref_src=twsrc%5Etfw) rally in Times Square. Solidarity! [#HeretoStay](https://twitter.com/hashtag/HeretoStay?src=hash&ref_src=twsrc%5Etfw)[#NoBanNoWall](https://twitter.com/hashtag/NoBanNoWall?src=hash&ref_src=twsrc%5Etfw)[#SundayMorning](https://twitter.com/hashtag/SundayMorning?src=hash&ref_src=twsrc%5Etfw)[pic.twitter.com/6rsCuoxQhI](https://t.co/6rsCuoxQhI)
  
