  Music mogul leads pro-Muslim rally in NYC
  
  2:24  • Source: [CNN](https://www.cnn.com/)
  
  ![Image 2: Thousands took part in the 'I Am A Muslim Too' in New York's Times Square on Sunday.](https://media.cnn.com/api/v1/images/stellar/prod/170219200423-muslim-rally-new-york.jpg?q=x_2,y_107,h_1171,w_2082,c_crop/w_860)
  
  Music mogul leads pro-Muslim rally in NYC
  
  2:24
  
  ### Story highlights
  
  Thousands, including actor Susan Sarandon and music mogul Russell Simmons, protest in Times Square
  
  Rally came on anniversary of executive order paving way for internment of Japanese-Americans
  
  New Yorkers by the thousand, representing myriad backgrounds and faiths, converged on Times Square on Sunday, heeding a music mogul’s calls to let Muslims know their fellow Americans stood by them.
  
  The demonstrators – many of them hoisting placards featuring a woman in an American flag hijab with the caption “we the people are greater than fear” – gathered at one of the world’s most famous public places to denounce what they see as threats and pressure aimed at Muslim communities.
  
  The rally, dubbed [“Today I am a Muslim Too,”](http://www.iamamuslimtoo.org/) was billed on social media as “a day of solidarity with our Muslim brothers and sisters in reaction to the vicious attacks by (President Donald Trump).”
  
  Ad Feedback
  
  Trump has made numerous disparaging remarks about Muslims and an appeals court recently put a halt to his executive order that temporarily barred all refugees and travelers from seven predominantly Muslim countries from entering the country. Trump [has vowed to issue a new order](http://www.cnn.com/2017/02/16/politics/donald-trump-travel-ban-executive-order/) tailored to the court’s decision.
  
  > > Hearing that there were between 7,000-10,000 people who came to the [#IAmAMuslimToo](https://twitter.com/hashtag/IAmAMuslimToo?src=hash&ref_src=twsrc%5Etfw) rally today!! An absolute incredible show of solidarity! [pic.twitter.com/gAFOrx6JFG](https://t.co/gAFOrx6JFG)
  
  > >
  
  > > — Russell Simmons (@UncleRUSH) [February 19, 2017](https://twitter.com/UncleRUSH/status/833433080845185024?ref_src=twsrc%5Etfw)
  
  Demonstrators toted American flags and maroon signs that said, “I am a Muslim, too,” as one activist donned a Trump costume and paraded through the crowd with a bald eagle in a cage.
  
  [In 45 minutes, they were Americans](http://www.cnn.com/2017/02/17/us/naturalization-ceremony-photo-essay-trnd/index.html)
  
  The list of speakers was extensive, according to the program. In addition to entrepreneur and Def Jam Recordings co-founder Russell Simmons, who helped organize the event, attendees were scheduled to hear from rabbis, imams, a Sikh, a Buddhist, Episcopalian and Presbyterian reverends, a Mennonite, a Seventh Day Adventist minister, a Hindu, a Baptist pastor, local politicians and civil rights advocates.
  
  Actor Susan Sarandon and New York Mayor Bill de Blasio also spoke, and former first daughter Chelsea Clinton tweeted that the rally marked her 2-year-old’s first protest.
  
  Simmons, no stranger to activism, told those at the rally to focus on how Trump, his onetime friend, had unified the people in attendance.
  
