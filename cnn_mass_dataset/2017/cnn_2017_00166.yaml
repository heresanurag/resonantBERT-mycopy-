  # New Yorkers rally to say ‘Today I am a Muslim, too’
  
  By [![Image 1: Eliott C. McLaughlin](https://media.cnn.com/api/v1/images/stellar/prod/160622084424-eliott-mclaughlin-profile-image.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/eliott-c-mclaughlin-profile)[Eliott C. McLaughlin](https://www.cnn.com/profiles/eliott-c-mclaughlin-profile)
  
  Updated Feb 20, 2017
  
