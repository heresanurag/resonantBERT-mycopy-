  > > — RoseAnn DeMoro (@RoseAnnDeMoro) [February 19, 2017](https://twitter.com/RoseAnnDeMoro/status/833388767465517056?ref_src=twsrc%5Etfw)
  
  “We won’t speak too harshly of him today. We want to thank him for bringing us together,” he said.
  
  He decried those who would demonize Muslims as terrorists when, in fact, Muslims have been the victims of terrorism and stand as allies in the fight against extremism.
  
  “So we are here today to show middle America our beautiful signs and, through our beautiful actions and intention, that they have been misled – that the seeds of hate that were small and maybe just ignorance cannot be watered, and that hate cannot grow because we are here to assist them in promoting love,” Simmons told the crowd.
  
  Brooklyn-born Palestinian-American activist and commentator Linda Sarsour noted that Sunday marked the 75th anniversary of President Franklin Roosevelt’s Executive Order 9066, which paved the way for the internment of Japanese-, German- and Italian-Americans.
  
  [Japanese-Americans mark anniversary of incarceration](http://www.cnn.com/2017/02/17/us/japanese-american-day-of-remembrance/index.html)
  
  She asked those in attendance to commit to being part of “the true never-again generation.”
  
  > > .[@lsarsour](https://twitter.com/lsarsour?ref_src=twsrc%5Etfw) is unapologetically Muslim. We are so honored to stand with her today. [#IAmAMuslimToo](https://twitter.com/hashtag/IAmAMuslimToo?src=hash&ref_src=twsrc%5Etfw)[pic.twitter.com/7pNvUU2evg](https://t.co/7pNvUU2evg)
  
  > >
  
  > > — Coexist Peace 🕊️🔴 (@coexistpeace) [February 19, 2017](https://twitter.com/coexistpeace/status/833381800621834244?ref_src=twsrc%5Etfw)
  
  “I am unapologetically Muslim, all day, every day,” she told the cheering crowd. “I am not afraid because fear is a choice; it is not a fact. So today I ask you, in the true grit and spirit of a New Yorker, that you choose courage in the face of fear.”
  
  [Hip-hop icon enters ‘All-American Muslim’ fray](http://www.cnn.com/2011/12/13/showbiz/american-muslim-tv-ads/)
  
  [Related video ![Image 3: WASHINGTON, DC - FEBRUARY 10: President Donald Trump listens during a joint press conference with Japanese Prime Minister Shinzo Abe at the White House on February 10, 2017 in Washington, DC. The two answered questions from American and Japanese press. (Photo by Mario Tama/Getty Images)](https://media.cnn.com/api/v1/images/stellar/prod/170213091043-trump-week-4-live.jpg?q=x_99,y_141,h_933,w_1659,c_crop/h_720,w_1280/w_256) WASHINGTON, DC - FEBRUARY 10: President Donald Trump listens during a joint press conference with Japanese Prime Minister Shinzo Abe at the White House on February 10, 2017 in Washington, DC. The two answered questions from American and Japanese press. (Photo by Mario Tama/Getty Images) Mario Tama/Getty Images North America/Getty Images New travel ban will be based on court decision](http://www.cnn.com/videos/politics/2017/02/17/trump-new-executive-order-based-on-appeal-sot-ac.cnn)
  
  This isn’t the first time Simmons has urged New Yorkers to identify as Muslims as a form of protest. Rabbi Marc Schneier and Imam Shamsi Ali, who helped organize Sunday’s event, joined Simmons before a much smaller Times Square crowd in 2011 to protest congressional hearings on Islamic terrorism.
  
  Simmons also took part in Occupy Wall Street protests and has been an outspoken supporter of marriage equality, animal rights and overturning what he’s criticized as harsh drug laws.
  
  In December 2015, [Simmons wrote his “old friend” Trump](http://www.cnn.com/2015/12/09/politics/russell-simmons-donald-trump-letter/index.html), urging him to “stop the bullsh**” in regard to the soon-to-be US President’s call to ban Muslims from entering the United States.
  
  [How Trump’s tweets affected travel ban](http://www.cnn.com/2017/02/15/politics/trump-twitter-travel-ban/index.html)
  
  “Don’t feed into the rhetoric created by small-minded people. You’re smarter and certainly more loving than you let on,” Simmons wrote. “I know the cheap seats are easy to play to, but you can get them just by being the man I have known for nearly 30 years.”
  
  Donald Trump
  
