  # Jerry Sandusky’s son facing child sex soliciting charges
  
  By [![Image 1: Sara Ganim](https://media.cnn.com/api/v1/images/stellar/prod/140929114002-sara-ganim-profile-image.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/sara-ganim-profile)[Sara Ganim](https://www.cnn.com/profiles/sara-ganim-profile), [Eric Levenson](https://www.cnn.com/profiles/eric-levenson)
  
  Updated Feb 14, 2017
  
  Updated Feb 14, 2017, 9:31 AM ET
  
  PUBLISHED Feb 13, 2017, 3:23 PM ET
  
