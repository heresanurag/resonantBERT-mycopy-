  Yoro recently moved to Los Angeles from New York, but is originally from Hawaii New York City. "I grew up on Oahu, where I was surrounded with everything nature had to offer," he tells CNN. "The ocean was my playground and art didn't enter my life until my later teenage years."
  
  courtesy sean yoro
  
  ![Image 70: Who's the woman in the portraits? "She's a friend from New York, although she prefers to remain anonymous." ](https://media.cnn.com/api/v1/images/stellar/prod/150527101120-yoro-surfing-03.jpg?q=w_881,h_1200,x_0,y_0,c_fill/w_1182)
  
  12 / 20
  
  Who's the woman in the portraits? "She's a friend from New York, although she prefers to remain anonymous."
  
  courtesy sean yoro
  
  ![Image 71: The artworks are created with traditional oil paint: "I use it in a traditional old masters' technique, mixing both loose brushwork with very tight strokes of sharp lines. I'm always trying to make the paint have a juicier texture to really help the portrait come alive."](https://media.cnn.com/api/v1/images/stellar/prod/150527101042-yoro-surfing-02.jpg?q=w_1249,h_1200,x_0,y_0,c_fill/w_1182)
  
  13 / 20
  
  The artworks are created with traditional oil paint: "I use it in a traditional old masters' technique, mixing both loose brushwork with very tight strokes of sharp lines. I'm always trying to make the paint have a juicier texture to really help the portrait come alive."
  
  courtesy sean yoro
  
  ![Image 72: The water and the elements could ruin the artworks any minute, so these portraits also had an expiration date by design. ](https://media.cnn.com/api/v1/images/stellar/prod/150527100745-puuwai-mural-1-hula-painting-artist-surfboard.jpg?q=w_1500,h_1000,x_0,y_0,c_fill/w_1182)
  
  14 / 20
  
  The water and the elements could ruin the artworks any minute, so these portraits also had an expiration date by design.
  
  courtesy sean yoro
  
  ![Image 73: "Oil paint outdoors definitely isn't the best and it doesn't last nearly as long as acrylics, but I kinda like that my figures have their own lifespan," says Yoro.  ](https://media.cnn.com/api/v1/images/stellar/prod/150527101001-yoro-surfing-01.jpg?q=w_1350,h_1200,x_0,y_0,c_fill/w_1182)
  
  15 / 20
  
  "Oil paint outdoors definitely isn't the best and it doesn't last nearly as long as acrylics, but I kinda like that my figures have their own lifespan," says Yoro.
  
  courtesy sean yoro
  
  ![Image 74: Each painting takes anywhere from a whole day to three or four days to complete, depending on the size and detail. ](https://media.cnn.com/api/v1/images/stellar/prod/150527100701-kahu-mural-4-hula-painting-artist-surfboard.jpg?q=w_1500,h_1049,x_0,y_0,c_fill/w_1182)
  
  16 / 20
  
  Each painting takes anywhere from a whole day to three or four days to complete, depending on the size and detail.
  
  courtesy sean yoro
  
  ![Image 75: "I'm lucky to have grown up on a surf board and it's just so natural for me to be on my paddle board, so I'm very comfortable in all types of situations which made it easier for me," says Yoro of his unique approach to art. ](https://media.cnn.com/api/v1/images/stellar/prod/150527100650-aa1503290362-edit.jpg?q=w_1500,h_1000,x_0,y_0,c_fill/w_1182)
  
  17 / 20
  
  "I'm lucky to have grown up on a surf board and it's just so natural for me to be on my paddle board, so I'm very comfortable in all types of situations which made it easier for me," says Yoro of his unique approach to art.
  
  courtesy sean yoro
  
  ![Image 76: Why portraits? "One of the exciting things about painting portraits is being able to bring life and emotion to objects and surfaces that were once without. Also these figures just seem to match with the moods. A mysterious surreal combination."](https://media.cnn.com/api/v1/images/stellar/prod/150527100734-portrait2-hula-painting-artist-surfboard.jpg?q=w_1500,h_1076,x_0,y_0,c_fill/w_1182)
  
  18 / 20
  
  Why portraits? "One of the exciting things about painting portraits is being able to bring life and emotion to objects and surfaces that were once without. Also these figures just seem to match with the moods. A mysterious surreal combination."
  
  courtesy sean yoro
  
  ![Image 77: Painting from the precarious balance of a floating board might seem like a stressful task, but it's not as bad as it looks. "I use a lot of ropes and anchors to keep me in place and steady, and the board itself is pretty stable when it's locked in. I usually choose places with minimal waves and tide changes too, so it feels just like any other platform."](https://media.cnn.com/api/v1/images/stellar/prod/150527100756-wall-water-surfboard-artist-hula-painting.jpg?q=w_1500,h_1108,x_0,y_0,c_fill/w_1182)
  
  19 / 20
  
  Painting from the precarious balance of a floating board might seem like a stressful task, but it's not as bad as it looks. "I use a lot of ropes and anchors to keep me in place and steady, and the board itself is pretty stable when it's locked in. I usually choose places with minimal waves and tide changes too, so it feels just like any other platform."
  
  courtesy sean yoro
  
  ![Image 78: What's next for him? "Like most things in my life, I don't try to plan too much into the future. I only plan to stay true to my passion and see where it takes me. Currently in the works are more water murals and even hopping onto land for some figures who blend in with their environments."](https://media.cnn.com/api/v1/images/stellar/prod/150527100818-wip2-hula-painting-artist-surfboard.jpg?q=w_1500,h_1092,x_0,y_0,c_fill/w_1182)
  
  20 / 20
  
  What's next for him? "Like most things in my life, I don't try to plan too much into the future. I only plan to stay true to my passion and see where it takes me. Currently in the works are more water murals and even hopping onto land for some figures who blend in with their environments."
  
  courtesy sean yoro
  
  ![Image 79: <em>"</em>A'o 'Ana<em>"</em> ("The Warning"), is one of Hawaiian surfer-turned-artist <a href="http://byhula.com/" target="_blank" target="_blank">Sean Yoro</a>'s earlier works. The stunning portrait of a woman, barely emerged from the icy water, is precariously painted on an iceberg freshly broken off from a nearby glacier in Iceland. ](https://media.cnn.com/api/v1/images/stellar/prod/151112134052-yoro-glacier-1.jpg?q=w_1182,c_fill)
  
  21 / 20
  
  _"_ A'o 'Ana _"_ ("The Warning"), is one of Hawaiian surfer-turned-artist [Sean Yoro](http://byhula.com/)'s earlier works. The stunning portrait of a woman, barely emerged from the icy water, is precariously painted on an iceberg freshly broken off from a nearby glacier in Iceland.
  
  courtesy sean yoro
  
  ![Image 80: Yoro traveled to Iceland and scouted for an ideal location to create "A'o 'Ana.<em>"</em> <br /><br />"Just in the short week I was there, the icebergs all around me were constantly cracking and flipping," he says, noting that the portrait was fleetingly short-lived. "I would have given it a week or two, maximum."](https://media.cnn.com/api/v1/images/stellar/prod/151112134240-yoro-glacier-2.jpg?q=w_2930,h_1953,x_0,y_0,c_fill/w_1182)
  
  22 / 20
  
  Yoro traveled to Iceland and scouted for an ideal location to create "A'o 'Ana._"_
  
  "Just in the short week I was there, the icebergs all around me were constantly cracking and flipping," he says, noting that the portrait was fleetingly short-lived. "I would have given it a week or two, maximum."
  
  courtesy sean yoro
  
