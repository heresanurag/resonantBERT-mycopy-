  Link Copied!
  
  ![Image 2: Security forces stand guard Tuesday after a suicide attack outside the Afghan Supreme Court in Kabul. ](https://media.cnn.com/api/v1/images/stellar/prod/170207125826-03-kabul-suicide-attack-0207.jpg?q=w_3000,h_1931,x_0,y_0,c_fill/w_860)
  
  Security forces stand guard Tuesday after a suicide attack outside the Afghan Supreme Court in Kabul.
  
  Massoud Hossaini/AP
  
  ### Story highlights
  
  NEW: ISIS claims responsibility for deadly attack on Twitter
  
  At least 35 wounded in blast at a parking lot near Supreme Court, hospital official says
  
  Kabul, Afghanistan—
  
  At least 20 people are dead after a suicide blast Tuesday outside Afghanistan’s Supreme Court in Kabul, police and other officials told CNN.
  
  A suicide bomber detonated his explosives in a parking lot near the court in the Afghan capital, according to Basir Mojahid, spokesman for Kabul’s chief of police.
  
  The attack at around 3:45 p.m. local time targeted Supreme Court employees as they were leaving for the day, Mojahid said.
  
  Ad Feedback
  
  At least 35 people were wounded in the blast, according to Saleem Rasooli, head of Kabul hospitals.
  
  In a post Wednesday on Twitter, ISIS claimed responsibility for the attack.
  
  ![Image 3: Police inspect the site of the attack Tuesday in Kabul. ](https://media.cnn.com/api/v1/images/stellar/prod/170207125557-02-kabul-suicide-attack-0207.jpg?q=w_3000,h_2000,x_0,y_0,c_fill/w_632)
  
  Police inspect the site of the attack Tuesday in Kabul.
  
  Rahmat Gul/AP
  
  An eyewitness told CNN that he felt the explosion shake the ground as he was leaving his office, opposite the Supreme Court.
  
  Nimatullah Mati said the area is home to several residential apartments and was crowded Tuesday afternoon with people who were heading home from work.
  
  Ambulances and firetrucks arrived on the scene within five minutes, Mati said.
  
  Afghanistan’s chief executive, Abdullah Abdullah, expressed his condolences on Twitter.
  
  “The blood of our people isn’t cheap & won’t be wasted,” he said.
  
  > > I condole with the families of the victims in today's terrorist attack in [#Kabul](https://twitter.com/hashtag/Kabul?src=hash&ref_src=twsrc%5Etfw). The blood of our people isn't cheap & wont be wasted. -AA
  
  > >
  
  > > — Dr. Abdullah Abdullah (@DrabdullahCE) [February 7, 2017](https://twitter.com/DrabdullahCE/status/828964348886470657?ref_src=twsrc%5Etfw)
  
  NATO also condemned the attack.
  
  “Anyone who seeks to destabilize the pillars of a functioning government are enemies of Afghanistan,” Italian army Lt. Gen. Rosario Castellano, deputy commander of the NATO mission in Afghanistan, said in a statement.
  
  The blast comes a month after at least 36 people were killed and dozens wounded in two [suicide bombings near the Afghan Parliament in Kabul](http://www.cnn.com/2017/01/10/asia/afghanistan-violence/). The Taliban claimed responsibility for those January 10 attacks.
  
  ![Image 4: Security forces remove a damaged bus after blasts in Kabul last month. ](https://media.cnn.com/api/v1/images/stellar/prod/170110111912-afghanistan-bombings.jpg?q=w_2464,h_1640,x_0,y_0,c_fill/w_632)
  
  Security forces remove a damaged bus after blasts in Kabul last month.
  
  WAKIL KOHSAR/AFP/Getty Images
  
  Tuesday’s blast underscores the growing concern about the security situation in Afghanistan, where the country’s security forces and its international allies have been fighting Taliban militants and other radical groups for years.
  
  A new report Monday from the [UN Assistance Mission in Afghanistan](https://unama.unmissions.org/un-calls-parties-take-urgent-measures-halt-civilian-casualties-numbers-2016-reach-record-high) said more than 11,000 people were killed or injured in 2016. That’s the highest number of civilian casualties in a single year since the United Nations began systemically documenting those in 2009.
  
  [The report also shows a record spike in the number of children killed in the long-running Afghanistan War.](http://www.cnn.com/2017/02/06/asia/afghanistan-un-child-casualties/) Of the 3,498 killed last year, 923 were children, the report said. Anti-government forces, mainly the Taliban, were behind almost two-thirds of the casualties, according to the report.
  
  ISIS militants have established a presence in the country, and their attacks particularly target Shia Muslims, the report said.
  
  Journalist Ehsan Popalzai reported from Kabul, and CNN’s Chandrika Narayan reported and wrote from Atlanta. Journalist Sandi Sidhu contributed to this report.
  
