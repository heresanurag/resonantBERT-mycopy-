  # 20 dead in suicide blast outside Afghan Supreme Court in Kabul
  
  By Ehsan Popalzai, [![Image 1: Chandrika Narayan](https://media.cnn.com/api/v1/images/stellar/prod/140926155516-chandrika-lakshminarayan-profile-image.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/chandrika-narayan)[Chandrika Narayan](https://www.cnn.com/profiles/chandrika-narayan)
  
  Updated Feb 8, 2017
  
  Updated Feb 8, 2017, 10:06 AM ET
  
  PUBLISHED Feb 7, 2017, 7:23 AM ET
  
  The Middle East Asia Terrorism National security
  
  [See all topics](http://www.cnn.com/follow)
  
