  # Chinese billionaire Xiao Jianhua seized from luxury Hong Kong hotel, source says
  
  By [![Image 1: Steven Jiang](https://media.cnn.com/api/v1/images/stellar/prod/150103184615-steven-jiang-profile.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/steven-jiang)[Steven Jiang](https://www.cnn.com/profiles/steven-jiang), [![Image 2: Katie Hunt](https://media.cnn.com/api/v1/images/stellar/prod/141217021344-katie-hunt.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/katie-hunt)[Katie Hunt](https://www.cnn.com/profiles/katie-hunt)
  
