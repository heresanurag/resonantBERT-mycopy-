  # US threatens Iran, but what comes next?
  
  By [![Image 1: Stephen Collinson](https://media.cnn.com/api/v1/images/stellar/prod/150506104237-stephen-collinson-profile.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/stephen-collinson)[Stephen Collinson](https://www.cnn.com/profiles/stephen-collinson)
  
  Updated Feb 2, 2017
  
  Updated Feb 2, 2017, 5:45 AM ET
  
  PUBLISHED Feb 2, 2017, 1:49 AM ET
  
