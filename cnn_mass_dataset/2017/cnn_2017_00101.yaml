  # Billy Crudup’s bleep-worthy favorite role
  
  By [Sandra Gonzalez](https://www.cnn.com/profiles/sandra-gonzalez), Abigail Brooks, [Chloe Melas](https://www.cnn.com/profiles/chloe-melas)
  
  Feb 17, 2017
  
  PUBLISHED Feb 17, 2017, 3:15 PM ET
  
