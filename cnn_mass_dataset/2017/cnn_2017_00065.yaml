  # Trump doesn’t rule out comprehensive immigration reform bill in meeting
  
  By [![Image 1: Manu Raju](https://media.cnn.com/api/v1/images/stellar/prod/160314164813-manu-raju-profile.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/manu-raju)[Manu Raju](https://www.cnn.com/profiles/manu-raju), [![Image 2: Ted Barrett](https://media.cnn.com/api/v1/images/stellar/prod/140929115817-ted-barrett-profile-image.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/ted-barrett)[Ted Barrett](https://www.cnn.com/profiles/ted-barrett), [![Image 3: Dan Merica](https://media.cnn.com/api/v1/images/stellar/prod/140926160630-dan-merica-profile-image.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/dan-merica-profile)[Dan Merica](https://www.cnn.com/profiles/dan-merica-profile)
  
