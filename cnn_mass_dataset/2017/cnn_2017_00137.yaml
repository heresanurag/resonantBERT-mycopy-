  # The hottest invite in town: Donald Trump’s supper club
  
  By [![Image 1: Sara Murray](https://media.cnn.com/api/v1/images/stellar/prod/150422092921-sara-murray-profile.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/sara-murray)[Sara Murray](https://www.cnn.com/profiles/sara-murray)
  
