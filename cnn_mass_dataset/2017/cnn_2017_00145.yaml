  1:27
  
  [This strategy requires a two-pronged approach](http://www.au.af.mil/au/afri/aspj/airchronicles/apj/apj94/spr94/oleary.html). First, the creation of a small group of loyal insiders, who take orders directly from the leader’s inner circle and are tasked with [creating chains of authority](http://www.politico.com/story/2017/01/trump-immigration-congress-order-234392) that bypass those of the existing federal government and party bureaucracies. I was disturbed, but not surprised, when Conway [said two days after the inauguration that](https://www.theguardian.com/us-news/2017/jan/22/donald-trump-cia-speech-win-twitter-protests) “it’s really time for (Trump) to put in his own security and intelligence community.”
  
  Second is the unleashing of the political purges that authoritarians so love. Some purges are punitive (say the firing of acting Attorney General Sally Yates because she defied Trump’s immigration order) and some pre-emptive (the expulsion of senior State Department staff) but the effect is to cleanse the government of troublemakers and leave a power vacuum to be filled with loyalists – or not filled at all, for added disruption of the state bureaucracy.
  
  ### Follow CNN Opinion
  
  *   Join us on [Twitter](http://twitter.com/cnnopinion)and [Facebook](http://www.facebook.com/CNNOpinion)
  
  Trump campaigned on a platform of unifying the nation, but by striking at the state he and Bannon intend to turn us against each other.
  
  Their blitzkrieg not only throws us off balance but forces us to take sides. Do I work for Trump or leave the government? Do I issue a statement that my company disapproves of the travel ban? What will my shareholders and stakeholders think? It’s no accident that the World War II language of resistance and collaboration has come back into circulation – these are the situations authoritarians create to divide us, making it easier for them to restrict our freedoms.
  
  Trump and Bannon are in this for the long run. [Trump has already filed paperwork for a 2020 candidacy](http://docquery.fec.gov/cgi-bin/fecimg?_201701209041436569+0). Our focus, in the middle of this storm, is to keep our feet on the ground and our eyes on the prize: the defense of American democracy.
  
