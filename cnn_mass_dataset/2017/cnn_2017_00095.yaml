  # Golf diplomacy teed up at the Winter White House
  
  By [![Image 1: Elizabeth Landers](https://media.cnn.com/api/v1/images/stellar/prod/150519163949-elizabeth-landers-profile.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/elizabeth-landers)[Elizabeth Landers](https://www.cnn.com/profiles/elizabeth-landers)
  
