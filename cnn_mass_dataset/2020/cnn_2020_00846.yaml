title: "Some English Premier League clubs living in ‘moral vacuum’ amid coronavirus pandemic"
date: "2020-04-01"
section: "Football"
url: "https://www.cnn.com/2020/04/01/football/premier-league-moral-vacuum-coronavirus-government-scheme-spt-intl/index.html"
content: |
  With theEnglish Premier League season on hiatusamid the coronavirus outbreak, some of its leading clubs are coming in for heavy criticism for using a UK government job program, with one British lawmaker accusing them of living in a “moral vacuum.”
  
  Tottenham Hotspur, Newcastle United and Norwich City have chosen to use the government’s ‘Coronavirus Job Retention Scheme,’ which will pay employees placed on temporary leave 80% of their wages – up to a maximum of £2,500 a month.
  
  Bournemouth has also announced it will be using the scheme, though it would top up salaries of those affected by the furloughing, while some high ranking employees, including first-team manager Eddie Howe, have taken voluntary pay cuts.
  
  But with the 20 Premier League teams sharing billions of dollarsfrom the current TV rights dealand players earning million-dollar salaries, Julian Knight, the chair of the Department for Culture, Media and Sport committee, says the idea of teams using the job scheme “sticks in the throat.”
  
  With much of the UK shut down due to the Covid-19 pandemic, the job scheme was intended to help employers that had been severely affected by the coronavirus.
  
