title: "Second all-female spacewalk briefly hampered by helmet issue"
date: "2020-01-15"
section: "World"
url: "https://www.cnn.com/2020/01/15/world/nasa-all-female-spacewalk-2020-first-scn/index.html"
content: |
  The second spacewalk in history to be conducted entirely by female astronauts got underway at the International Space Station early Wednesday morning and concluded seven and a half hours later.
  
  NASA astronauts Jessica Meir and Christina Koch ventured out of the space station shortly before 7 a.m.Eastern Time for the first spacewalk of 2020 and ended at 2:04 p.m. ET.  Their mission was to replace batteries on solar arrays on the outside of the ISS. They accomplished those tasks, as well as a get-ahead task.
  
  They are the same astronauts who made history after successfully completing thevery first all-female spacewalkin October. That came months after a planned spacewalk with an all-women crew had to becanceled in Marchbecause of a lack of suitable spacesuits.
  
  At the end of the spacewalk, Meir congratulated thenewest class of astronautswho graduated last Friday. “We are so excited to witness your contributions to human spaceflight,” she said.
  
  Meet NASA's first astronaut graduates of the Artemis program, eligible for missions to the moon and Mars
  
  About a half hour into the spacewalk, Koch’s helmet video camera system and lights came loose and the astronauts tried to reattach it to grooves on the helmet. Mission Control then advised them to stow it rather than waste time.  At one point, the astronauts asked if the spacewalk would continue, given the lack of lighting for Koch.
  
  .@Astro_Jessicaand mission controllers on the ground assist@Astro_Christinawith a loose helmet camera on her spacesuit that was eventually stowed in a crew lock bag.#AskNASA|https://t.co/yuOTrYN8CVpic.twitter.com/hvRihbzrSE
  
  “Good question and yes we will continue and try and keep you two together as much as possible,” Mission Control replied.
  
  “Great,” one said. “Perfect,” said the other. Earth was visible below.
  
  “Just be careful,” Mission Control told Koch. “You’re missing that additional protection.”
  
  The problem put the mission, which is expected to last six and a half hours, around 30 minutes behind schedule.
  
  After an historic all-female spacewalk, astronaut has moon dream
  
  NASA said that Meir and Koch replaced nickel-hydrogen batteries with new lithium-ion batteries that store power generated by the solar arrays on the ISS’s port truss. They are scheduled to conduct a second spacewalk on Monday to finish the battery replacement. The space station is powered by solar arrays and four sets of batteries.
  
  These were the second and third spacewalks for Meir and the fifth and sixth for Koch.
  
  Recently, Koch marked 300 days in space. Kocharrived on the International Space Stationon March 14 for her first spaceflight mission. She is set to remain on the station until February 2020, which will make her time on the station the longest single spaceflight by a woman. Meir arrived on the space station for her first six-month mission at the beginning of October.
  
  Koch and Meir are included in the list of12 womenthat could be the first female astronaut on the moon in 2024.
  
  As with the previous spacewalk, the female voice heard speaking to Meir and Koch belongs to NASA astronautStephanie Wilson. She’s acting as CapCom, or Capsule Communication, at Johnson Space Center in Houston. CapCom is the astronaut who on Earth who communicates with crew members on the craft.
  
  Wilson’s voice is a familiar one for Koch and Meir. They all know each other well.
  
  The first woman to conduct a spacewalk was Russian cosmonaut Svetlana Savitskaya in 1984, followed closely by NASA astronaut Kathy Sullivan. An additional 12 US women have conducted 40 spacewalks over the past 35 years. Koch and Meir were the 13th and 14th, respectively.
  
  If the battery replacement work goes as planned, NASA astronaut Andrew Morgan and space station Commander Luca Parmitano from the European Space Agency will exit the station January 25, to finish installing the Alpha Magnetic Spectrometer’s new cooling apparatus and lines begun in November and December, and verify they are ready for use.
  
  The spectrometer is searching for dark matter and antimatter in the universe.
  
  NASA said Wednesday’s spacewalk is the 225th conducted at the International Space Station.
