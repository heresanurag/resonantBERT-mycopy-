id: cnn_2020_01573
title: "Rhode Island voters approve removing ‘Plantations’ from state’s official name over concerns about the word’s history"
date: "2020-11-05"
section: "Politics"
url: "https://www.cnn.com/2020/11/05/politics/rhode-island-name-change-plantations-trnd/index.html"
content: |
  The smallest state in the nation will no longer have the longest name.
  
  This year’s Question 1 ballot proposition asked voters whether to amend the state Constitution by trimming that name to simply “State of Rhode Island.”
  
  The measure passed with52.9% of the vote, according to CNN’s projection.
  
  “Nobody is trying to eradicate the history that has been in play,” Democratic state Rep. Anastasia Williams of Providence, who worked to get the question placed on the ballot this year following George Floyd’s death at the hands of Minneapolis police and worked with the “Yes on 1” campaign, said before the vote. “But we need to present the true and accurate history of it entirely, as opposed to just bits and pieces.”
  
  Williams added: “If you don’t believe that that word has a life, a real dark painful life, then you’re seriously mistaken.”
  
  The “Providence Plantations” in the state’s official name comes from the settlement founded in 1636 by Roger Williams, which now includes the state’s capital, Providence, according to thestate government’s website.
  
  Although Rhode Island passed a law in 1652 banning African slavery, it was never enforced and the state later “played a leading role in the transatlantic slave trade,” according to theJohn Carter Brown Libraryat Brown University in Providence.
  
  Rhode Islanders had more enslaved people “per capita than any other New England state,” according to the John Carter Brown Library, including onplantations in South County, and they enslaved Africans and Native Americans.
  
  “Between the transatlantic slave trade and the West Indian provisioning trade, it is hard to imagine any eighteenth century Rhode Islander whose livelihood was not entangled, directly or indirectly, with slavery,” according to theBrown University Steering Committee on Slavery and Justice’s 2007 reporton the university’s historical ties to slavery and the slave trade.
  
  Rhode Island’s historian laureate, Patrick Conley, opposed the measure.
  
  “My opposition is purely historical,” he told CNN, insisting his opposition is not racist. At the time Providence Plantations was founded, “plantations” simply referred to a tract of land or a farm, he said.
  
  “The word ‘Providence’ is for God’s divine providence in giving Roger Williams a place to establish the American principle of religious liberty and church-state separation,” Conley said of Providence Plantations’ founder. “You want to wipe that away?”
  
  Conley also questioned what striking the words from the state’s official name would achieve.
  
  “What does that accomplish? Does that advance race relations in America? In the world?” Conley said before the vote. “It is what it is. History is what it is. You don’t whitewash history. That is an act of, frankly, stupidity.”
  
  “Removing the word ‘plantation’ – it will never truly make the amends of the past, the horrors of the past, but at least makes amends,” said Democratic state Sen. Harold Metts of Providence, another legislative sponsor of the ballot question, before the election. He said he can trace his own family history of enslavement to a plantation in Virginia.
  
  A previous effort to strike “Providence Plantations” from the state namemet sound defeat in 2010, but Metts said he, Williams and other state legislators had continued to push for the change.
  
  “If people knew Rhode Island’s role in the slave trade, they would be more understanding,” Metts said before the vote. He and Williams cited the groundbreaking work by Brown University President Emerita Ruth J. Simmons studying the university and Rhode Island’s role in the slave trade.
  
  “Accept the true and accurate history of what Rhode Island participated in, because it’s out in the open,” Williams said.
  
  Proponents of this year’s ballot effort spent at least $73,000 on a slick website, internal polling and digital advertising on platforms such as Facebook, YouTube, Google and Reddit, according tocampaign filings with the state.
  
  There was no organized opposition campaign filed with the state, though supporters of sticking with the full name made themselves known in opinion pages and letters to the editor.
  
  Even before the vote, some state and local leaders had already moved to strike “plantations” from the state’s name in official communications by executive orders. Democratic Gov. Gina Raimondo’s executive order struck the term from state documents, and Democratic Providence Mayor Jorge O. Elorza’sorderremoved the term from city documents and oath ceremonies.
  
  “We can’t ignore the image conjured by the word plantation,” Raimondosaid in a news conference this summer. “We can’t ignore how painful that is for Black Rhode Islanders to see that and have to see that as part of their state’s name.”
  
  Announcing his office’s decision to strike the term from official documents, Democratic Rhode Island General Treasurer Seth Magazinersaid simply: “Besides, everyone calls us just ‘Rhode Island’ anyway.”
