  For family members, feeling like a contributing citizen to the householdcan build confidence, a sense of closeness and self-esteem, Schulte said. It can reduce stress in the environment that would be generated by arguments over an unfair distribution of housework.
  
  Continued communication about roles in terms of childcare and housework – and encouraging it as part of your normal family routine – can help ensure an even distribution of housework lasts after distancing and quarantines are over, Yavorsky said.
