  To support the international effort embodied in the TPNW, scientists and physicians, faith leaders and defense experts have launched theBack from the Brink campaignto build support for the US to launch these negotiations. The campaign also calls on the US to take several intermediary steps to lessen the danger as these negotiations proceed.
  
  Consumed with the current Covid-19 crisis, which is seeinga fall surge, it is hard for us to focus on the even greater danger posed by nuclear weapons, but we have to deal with this threat. Our survival and that of our children depends on it.
