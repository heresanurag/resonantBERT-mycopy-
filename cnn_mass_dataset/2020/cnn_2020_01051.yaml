title: "The world is facing an insane danger that’s greater than Covid-19"
date: "2020-10-26"
section: "Opinion"
url: "https://www.cnn.com/2020/10/26/opinions/nuclear-weapons-danger-covid-helfand/index.html"
content: |
  Editor’s Note:Ira Helfandis an emergency medicine physician and co-president of International Physicians for the Prevention of Nuclear War (IPPNW), which won the Nobel Peace Prize in 1985. The views expressed in this commentary are his own. Readmore opinionarticles on CNN.
  
  Honduras just became the 50th nationto ratifythe Treaty on the Prohibition of Nuclear Weapons (TPNW) on Saturday. The accord has now met the required threshold to enter into force in 90 days – on January 22.
  
  This event marks the first time since Hiroshima that the simple possession of nuclear weapons will be deemed a crime under international law – though it is not binding on nations who do not sign it. The treaty’s entry into force could not be timelier.
  
  The President of the United States has the ability tolaunch a nuclear attackon his own authority, without requiring the authorization of Congress, the Cabinet, the vice president or the Joint Chiefs. It is hard to imagine a more perfect example of the insane danger that we continue to live with as long as we maintain massive arsenals of nuclear weapons.
  
  Even a healthy person, possessed of sound judgment, should not have the ability to launch these terrible weapons. The consequences are simply too great, and people are, well … human. As humans, we are prone to mistakes, and the technology we have created is too.
  
  Many errors can be corrected. A nuclear war cannot. Studies over the last decade have shown thateven a limited nuclear war,involving less than one or two percent of the world’s nuclear arsenal, would kill tens of millions directly. Even worse,it would causeworldwide climate disruption and famine putting billions of people at risk and ending civilization as we know it.
  
  Even before the Covid-19 pandemic, the danger of nuclear war was growing at an alarming rate. Experts, like former Secretary of Defense William Perry,have warnedthat we are closer to nuclear war than we have ever been and the expert panel at the Bulletin of the Atomic Scientists have set their iconicDoomsday Clockto 100 seconds to midnight, the closest it has ever been to Armageddon.
  
  Why do we still have The Bomb?
  
  So, even as we cope with the coronavirus pandemic, which haskilled over a million peopleworldwide, and the economic turmoil it has caused, it is critical that we move as rapidly as we can to eliminate nuclear weapons and the imminent, existential threat they pose.
  
  The nine countrieswhich possess nuclear weaponsare moving in the exactopposite direction.They are all engaged inmassive plansto “modernize” their nuclear arsenals and to preserve these weapons for decades to come – if they are not used first. The US plans to spendover $1 trillion dollarsover roughly the next 25 yearsreplacing existing weaponsand is deploying new, smaller, more useable nuclear warheads and updating things like laboratories, delivery systems, early warning systems, etc.
  
  And this past week, The New York Times reported that the US took the unprecedented step ofpressuring countriesthat have joined the Treaty to withdraw from it. Given their failure to join the TPNW, will the Treaty make a difference?
  
  Yes, according to former Secretary Perry, who has stronglyendorsed the accord.“The new UN Treaty on the Prohibition of Nuclear Weapons is an important step towards delegitimizing nuclear war as an acceptable risk of modern civilization,” he said.
  
  Will Covid-19 save the world?
  
  As the TPNW enters into force, the nine nuclear powers will not automatically disarm. But the non-nuclear nations and civil society can use the agreement to pressure them into making fundamental changes in their nuclear policy. The TPNW can be used to stigmatize these weapons so they are no longer seen as global status symbols and bulwarks of national security, but rather as the threat to human survival that they really are.
  
  Here in the US we need to understand that national security can only be achieved by the total elimination of all nuclear weapons across the globe. We need to urgently pursue negotiations with all of the other nuclear states for a verifiable, enforceable, time bound agreement to dismantle all nuclear weapons. We may not be able to persuade the other nuclear states to go along with nuclear disarmament, but we don’t know that because we have never tried.
  
