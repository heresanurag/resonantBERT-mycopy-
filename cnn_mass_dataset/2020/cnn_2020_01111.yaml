  # All Saints’ Day: The history and traditions behind the holiday
  
  By Ashley Novak
  
  Nov 1, 2021
  
  PUBLISHED Nov 1, 2021, 10:30 AM ET
  
  Religion
  
  [See all topics](https://www.cnn.com/follow)
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2021%2F11%2F01%2Fworld%2Fall-saints-day-2021-trnd "Share with email")Link Threads
  
  Link Copied!
  
  ![Image 1: In observance of All Saints Day, a man stands in front of graves decorated with flowers at the Poblenou cemetery of Barcelona, Spain, where many use the holiday to remember deceased loved ones. ](https://media.cnn.com/api/v1/images/stellar/prod/211101101344-restricted-all-saints-day-spain-11-01-2021.jpg?q=w_4041,h_2694,x_0,y_0,c_fill/w_860)
  
  In observance of All Saints Day, a man stands in front of graves decorated with flowers at the Poblenou cemetery of Barcelona, Spain, where many use the holiday to remember deceased loved ones.
  
  Jordi Boixareu/Zuma
  
  Every year on November 1, many Roman Catholics and other Christians around the world observe All Saints Day, which honors [all saints](https://www.catholic.org/saints/allsaints/) of the church deemed to have attained heaven.
  
  In the Eastern Orthodox Church,[All Saints Day](https://www.learnreligions.com/all-saints-day-holy-day-obligation-542408) is observed on the first Sunday after Pentecost. Here’s a look at the history and traditions of this holy holiday.
  
  ## Where All Saints’ Day came from
  
  While now observed in November, All Saints’ Day was originally celebrated on May 13, although the origin cannot be traced with certainty, according to[Encyclopedia Brittanica](https://www.britannica.com/topic/All-Saints-Day). Pope Boniface IV formally started what would later be known as All Saints Day on May 13 in 609 AD when he dedicated the Pantheon in Rome as a church in honor of the Virgin Mary and all martyrs.
  
  Ad Feedback
  
  The current date of [November 1](https://www.learnreligions.com/what-is-all-saints-day-542459)was established by Pope Gregory III during his reign (731-741 AD) when he dedicated a chapel in Rome’s St. Peter’s Basilica in honor of all saints.
  
  While this celebration was originally limited to Rome, later in 837 Pope Gregory IV ordered the official observance of All Saints Day every November 1 and[extended its celebration](https://www.learnreligions.com/what-is-all-saints-day-542459)to the entire Church.
  
  ## All Saints really means ALL saints
  
  While many canonized saints are celebrated with their own [individual feast days](https://www.franciscanmedia.org/sod-calendar/)(such as St. Patrick), saints that have not been canonized have no particular holiday.
  
  [All Saints’ Day recognizes](https://www.learnreligions.com/what-is-all-saints-day-542459) those whose sainthood is known only to God. Even so, [Catholic observances](https://www.catholic.org/saints/allsaints) tend to focus on known saints, those canonized by the Catholic Church.
  
  ## A holy obligation
  
  According to[Catholic Online](https://www.catholic.org/saints/allsaints/), within the Catholic Church, All Saints’ Day is generally considered a Holy Day of Obligation, meaning all Catholics must attend Mass unless they are prevented by illness or another sufficient excuse.
  
  However, mass is not mandatory in 2021 because the holiday falls on a Monday. Whenever Nov. 1 falls on a Monday or a Saturday adjacent to the Sunday sabbath, Catholics are encouraged but not required to attend mass.
  
  After the Protestant Reformation, many Protestant sects kept All Saints’ Day. Methodists, for example, acknowledge it as a day of giving God earnest gratitude for the lives and deaths of saints, according to [Christianity.com](https://www.christianity.com/church/church-history/all-saints-day-november-1.html).
  
  ## Observances around the world
  
  Although not a public holiday in the US, All Saints’ Day is observed publicly in many countries.
  
  In [France and Germany](https://www.newsweek.com/all-saints-day-when-it-why-do-we-celebrate-it-1195454), people have the work day off and businesses are closed.
  
  In countries like the [Philippines](https://news.mb.com.ph/2016/10/31/all-saints-day-a-cherished-tradition/), where All Saints Day is known as “Undas,” the day isn’t just for remembering the saints, but for honoring and paying respects to departed loved ones, usually with prayers, flowers, and good offerings.
  
