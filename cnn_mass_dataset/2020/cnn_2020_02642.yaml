  The Weekly Newsquiz tests your knowledge of events in the news
  
  As vote counting continues in the United States, we’re bringing you up to speed on what the two main presidential candidates said about victory yesterday. Afterward, we’re reporting on a Canadian study of teenagers’ screen time. Then, a trio of animal stories take over our show; they involve bees, a rhino, and a bullish mayor in Kentucky.
  
  1. A candidate for U.S. president needs at least how many Electoral College votes to win the race?
  
  2. Though it won’t apply to Wales and Scotland, a new national lockdown confirmed by parliamentary vote on Wednesday will apply to what division (or country) of the United Kingdom?
  
  3. This week, the U.S. “fell back” from daylight-saving time to what civil time?
  
  4. NASA recently released a series of “space sounds,” some of which were recordings of what kind of waves, which are the longest in the electromagnetic spectrum?
  
  5. On Tuesday, Hurricane Eta made landfall in what Central American country?
  
  6. With Hurricane Eta, the 2020 Atlantic hurricane season tied a record set in 2005. How many named storms were seen in each of these years?
  
  7. What Peruvian World Heritage site, which was built in the 15th Century, was recently reopened to visitors (though there are limitations)?
  
  8. In 2022, NASA plans to launch a probe to what asteroid, which some scientists suggest could be worth $10,000 quadrillion if it’s made up primarily of iron?
  
  9. New research suggests that ogre-faced spiders use receptors on their legs to do what?
  
  10. According to a new study from the University of British Columbia, teenagers are mentally healthier if they spend more time with extracurricular activities and less time with what?
  
