  A version of this story appeared in the November 30 edition of CNN’s Coronavirus:Fact vs. Fiction newsletter.Sign up here to receive the need-to-know headlines every weekday.
  
  The coronavirus could behitching a ridewith some of the millions of Americans heading home after a long Thanksgiving weekend, threatening to plant seeds of infections across the country and overwhelm hospitals that treated a record 93,238 patients for Covid-19 on Sunday.
  
  America’s top infectious disease expert, Dr. Anthony Fauci, warned Sunday of a potential “surge superimposed upon that surge that we’re already in,” as the US topped more than 100,000 new cases for the27th consecutive day.
  
  Fauci and other government health experts implored anyone who traveled to self-isolate and get tested. White House coronavirus taskforce memberDr. Deborah Birxtold CBS that if a family has traveled, they should assume that they were exposed, and should be tested in the next week. “You need to assume that you’re infected and not go near your grandparents and aunts and others without a mask,” Birx said.
  
  Their unity of messaging was remarkable and ominous – and only emphasized the silence of President Donald Trump, who has repeatedly lied about the US “rounding the corner” on the crisis,Stephen Collinson writes.President-elect Joe Biden promises a science-based approach to the pandemic, but he can only do so much before January 20 – when the health crisis and economic toll are likely to be far worse.
  
  With Trump absent, it will fall to governors and mayors to pick up the mantle of leadership again. But it is not too late for average Americans to stem the tide, Fauci told NBC. Those traveling back home can take precautions – wear masks, social distance, and avoid crowds.
  
  Q:Is it safe to ski in a pandemic?
  
  A:“Everything you do has a risk, a benefit and a potential hazard,” said Dr. Joshua Rosenberg, an infectious disease specialist at The Brooklyn Hospital Center in New York. That includes skiing, which is inherently riskyeven without a raging pandemic.
  
  The key is to avoid indoor exposure and to keep your time in indoor settings in resorts to a minimum. An avid skier himself, Rosenberg plans to hit the slopes this season. Here’s what he recommends if you want to join him and stay safe.
  
