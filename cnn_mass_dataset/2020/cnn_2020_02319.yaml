title: "Colorado governor signs bill mandating police body cameras and banning chokeholds"
date: "2020-06-19"
section: "Politics"
url: "https://www.cnn.com/2020/06/19/politics/colorado-polis-police-body-cameras-banning-chokeholds/index.html"
content: |
  Colorado Gov. Jared Polis signed new police accountability legislation into law on Friday that would create new officer requirements including body cameras and limits on using deadly force.
  
  The move, coinciding with theJune 19 holidayJuneteenth, commemorating the end of slavery in the United States, makes Coloradothe first stateto codify broad policing reform since the start of nationwide protests decrying police brutality, the Democratic governor said.
  
  The bill requires that all police officers use activated body cameras or dashboard cameras during service calls or officer-initiated public interactions. It also bars officers from using deadly force against those suspected of minor or non-violent offenses, requires officers to intervene should they witness another officer using excessive physical force and establishes new data reporting on the use of force.
  
  The measure specifically bans officers from using chokeholds, a long-controversial technique, particularly following the death of Eric Garner in 2014 when a police officer was accused of choking him. The death of George Floyd, who died after a Minneapolis police officer restrained him by pressing a knee on his neck for nearly nine minutes, has prompted nationwide protests.
  
  The bill also designatesqualified immunity– a legal doctrine that critics say shields law enforcement from accountability and has garnered recent attention – as an unacceptable defense against liability for violating a person’s rights.
  
  “This legislation specifically contains landmark, evidence-based reforms that not only protect civil rights but will help restore trust between law enforcement and the communities that they serve,” Polis said during the bill signing Friday.
  
  Colorado joins several other states and localities that have moved to reassess their police rules and regulations following the widespread protests. California Democratic Gov. Gavin Newsom directed police departments last week tostop training officers to use carotid holds, calling the technique “a strangle hold that puts people’s lives at risk.”
  
  The New York City Council passed six bills on Thursday that includerequiring officer badge numbers to be visible, an official ban on chokeholds or any other maneuver that restricts blood or air flow and a bill requiring oversight of the New York City Police Department’s surveillance technology.
  
  And last week, the Louisville Metro Council in Kentucky also passed an ordinancebanning no-knock search warrants– the type of warrant that ultimately led to the wrongful shooting death of Breonna Taylor, one of multiple Black people who died recently as a result of excessive police force, prompting protests nationwide.
  
  The ordinance, which will be known as “Breonna’s Law,” also regulates the execution of search warrants and the use of body camera equipment during the implementation of all search warrants.
