title: "Tekashi 6ix9ine’s attempt to donate $200,000 to No Kid Hungry rejected"
date: "2020-05-13"
section: "Entertainment"
url: "https://www.cnn.com/2020/05/13/entertainment/tekashi-6ix9ine-donation-trnd/index.html"
content: |
  Tekashi 6ix9ine looks to be doing well financially since his release from prison and apparently wants to share the wealth.
  
  The rapper, whose legal name is Daniel Hernandez, reportedly attempted to make a $200,000 donation to theNo Kid Hungryorganization.
  
  But the charity rejected it.
  
  “We are grateful for Mr. Hernandez’s generous offer to donate to No Kid Hungry but we have informed his representatives that we have declined this donation,” the organization said in a statement sent to CNN. “As a child-focused campaign, it is our policy to decline funding from donors whose activities do not align with our mission and values.”
  
  Hernandez recently posed on his verified Instagram account holding stacks of cash.
  
  “DESCRIBE ME IN ONE WORD,” he wrote in the caption of the photo.
  
  Hewas released last monthfrom a federal prison four months before he was due to have completed his 2-year sentence.
  
  The rapper was allowed to complete his sentence at home after his attorney, Lance Lazzaro, argued that Hernandez’s asthma made him vulnerable to the coronavirus.
  
  Hernandez was sentenced late last year after pleading guilty to charges related to gang activity in New York. Hewas granted a reduced sentenceafter he cooperated with federal investigators and informed on his former gang associates.
  
  Since getting out he hasreportedly made quite a bit of cashwiththe release of his new song, “Gooba.”
  
  Hernandez seemingly was looking to give away some of his money.
  
  “During this pandemic I understand we have nurses and frontline Hero’s who risk there life daily to save others. But NEVER forget the children & families who depend on OUR PUBLIC schools for daily meals and nutritions to keep our future leaders growing to their best potential,”Complex reportedhe wrote in a since deleted Instagram post.
  
  “To every influencer out there REMEMBER if you are blessed GOD gave you that blessing not just for YOU but also TO HELP OTHERS GOD FIRST.”
