title: "A Colorado restaurant was forced to close after video showed it was packed on Mother’s Day"
date: "2020-05-12"
section: "US"
url: "https://www.cnn.com/2020/05/12/us/colorado-restaurant-shut-down/index.html"
content: |
  A restaurant in Colorado was forced to shut down Monday after reopening on Mother’s Daywith no social distancing protocols in place.
  
  Video shot and posted on social media by Nick Puckett forColorado Community Mediashowed large crowds of people inC&C Breakfast and Korean Kitchenin Castle Rock, about 25 miles south of Denver. Most patrons were not wearing masks, the video showed, and there was no social distancing in place.
  
  In the video, nearly every table is occupied, large groups of people are huddled waiting for their orders and a line of patrons are wrapped around the block.
  
  Tri-County Health Department closed the restaurant Monday due to the violations.
  
  “We are disappointed that C&C Breakfast & Korean Kitchen, a Cookies and Crema Company in Castle Rock, has decided to ignore the Governor’s Safer at Home order and open up yesterday with no attention to social distancing,” a spokesperson for theTri-County Health Departmentwrote in an email to CNN Monday.
  
  Some restaurants are using shower curtains, stained glass and lots of plants to keep diners safe
  
  Governor Jared Polissaid he was disappointed by what he saw on the video during a Monday press conference.
  
  “I was so disappointed that anybody would be so irresponsible and put their own business at risk of closure, with the indefinite closure for hazardous health conditions, that would jeopardize their patrons, probably even friends or loved ones of the employees and the owners,” Polis said.
  
  “The most effective way to limit the suffering of our fellow Coloradans and ourselves and to get our economy back on track sooner rather than later … is we need to obey the public health orders that save lives and reduce the duration of this economic disruption.”
  
  April Arellano, who owns the restaurant with her husband Jesse, toldCNN affiliate KCNCthey knew there would be consequences but they “were willing to make a statement.”
  
  US coronavirus death toll passes 80,000 as states move to phased reopening
  
  “I think that people want to work, they want to live,” Jesse Arellano told KCNC. “We live with danger every day. People go to war – that’s a risk.  People drive every day – that’s a risk.”
  
  Prior to their reopening the restaurant tweeted Saturday, “We are standing for America, small businesses, the Constitution and against the overreach of our governor in Colorado!!” CNN has reached out to the owner of C&C for comment.
  
  Although Colorado lifted the Stay at Home order for most of the population last week, the state is currently under a level 2Safer at Home Order.That means that residents aren’t required to stay home but are encouraged to. Non-essential businesses have reopened but are required to enforce social distancing practices such as maintaining six feet of distance between people and only allowing 10 patrons into a business at a time.
  
  Under the new order,facial coverings are encouragedbut not required.
  
  The health department says they were forced to shut down the restaurant for in-house dining but will continue to stay in touch with the business.
  
  “We will follow up with this restaurant to ensure that they, like other restaurants in the county, take appropriate steps to protect the public health, by limiting service to curbside and take-out service,” a spokesperson for the Tri-County Health Department said.
