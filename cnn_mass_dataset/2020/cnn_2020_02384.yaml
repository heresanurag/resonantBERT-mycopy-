  “Housing is really the place where we have made the least progress in terms of civil rights,” said Hannah-Jones. “We often think that these laws and these practices were a long time ago. But they create an infrastructure of discrimination that goes forward.”
  
  The many black and brown Americans whose ancestors were denied the right to live in affluent neighborhoodsstill feel the economic impact.
  
  “That is the main way that Americans acquire wealth and save money,” said Delegard. “It’s the main way that they pass on assets to the next generation.”
  
  Homes built under covenants in Minneapolis are still worth, on average, 20% more than the median value of homes in the city, Delegard and her colleagues found. And today, around 75% of white families there own the house they live in, while for black families, the figure is just 25%.
  
  “The legacy of these restrictions, it’s demographic, in part, but it’s also profoundly material,” said Delegard’s colleague, Kevin Ehrman-Solberg.
  
  In North Carolina, “there is still very little racial diversity in our neighborhood,” Reisinger said, adding that the racial covenant he found on his own home “made us think twice about it. And I can only imagine what an African American family would have felt.”
  
  Projects to map these racist covenants are also now underway in places like Charlottesville, Virginia, Seattle and St. Louis. Many take their lead from the work done in Minneapolis by Mapping Prejudice.
  
  “We’re the first project to map and identify all of the racial covenants for a given geographic area,” says Ehrman-Solberg who has developed, “optical character recognition, crowd-sourcing, a set of ancillary GIS and digital tools to at least partially automate this process.”
  
  They have now applied for federal funding that, according to Delegard, “would make it possible for us to create a template, or a tool kit, so that any community across the country that wants to do this same kind of work, we would give them the tools.”
  
  In Washington, DC, Shoenfeld first came across racial covenants while leading neighborhood heritage trails in the city, she said.
  
  “Nobody seemed to be aware of how widespread this was,” she said. So, Shoenfeld and others began searching for the covenants, mapping them, hoping to raise awareness of the racist practices that shaped their city.
  
  For those immersed in such study, there is hope this data can somehow be used to right those wrongs. Many do not want the racist language removed.
  
  “Given the other things that covenants did that continue to impact cities and people, I don’t think that’s where the energy and money should go in addressing this legacy,” added Shoenfeld.
  
  “My hope isn’t that we erase this language,” Delegard said. “My hope is that we use this language as a launch pad for making restitution.”
  
  The California Association of Realtors, which had objected in 2008 to De La Torres’ bill, told CNN it now “stands ready to engage in the broader conversation about whether such covenants should be removed completely from a property’s history.”
  
  For Hannah-Jones and others, that is the only solution.
  
  “Absolutely, the language should be removed,” she said. “No one should have to procure housing and spend your money on a house and have in the deed racist policy that says someone like yourself is not allowed.”
