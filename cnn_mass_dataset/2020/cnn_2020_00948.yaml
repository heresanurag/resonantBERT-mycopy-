id: cnn_2020_00948
title: "Belarus riot police drop shields and are embraced by anti-government protesters"
date: "2020-08-14"
section: "Europe"
url: "https://www.cnn.com/2020/08/14/europe/belarus-protests-riot-police-intl/index.html"
content: |
  At least 50Belarussecurity personnel in riot gear dropped their shields and were embraced by anti-government protesters in Minsk, as demonstrators chanted “brothers” at the police.
  
  The scene unfolded in front of several government buildings in the of the capital. Protesters also shouted, “Sveta – President,” referring to opposition politicianSvetlana Tikhanovskayawho says she won the majority in Sunday’s highly contested presidential election.
  
  Belarus authorities say longtime President Alexander Lukashenko won 80.1% of the vote, in a poll which many believe was rigged.
  
  A crowd estimated by CNN’s team in Minsk to be tens of thousands of people marched through the capital on Friday in revolt against the strongman leader Lukashenko, who has ruled the country for 26 years.
  
  Protests have flared up across Belarus this week, sometimes erupting into violence, with some protesters alleging they have been beaten and humiliated by security services.
  
  Officials in Belarus say 6,700 people have been arrested and at least one person has been killed in the violent aftermath of the election, which independent observers have criticized as neither free nor fair.
  
  Authorities have now released more than 2,000 people detained amid the ongoing protests, according to a Friday statement from the interior ministry.
  
  Opposition groups claim the election was marred by widespread ballot stuffing and fraud in order to keep Lukashenko in power, while the independent monitoring group “Honest People” said that according to its data, Tikhanovskaya had won in at least 80 polling stations across Belarus.
  
  Tikhanovskaya, who fled to Lithuania after the vote, on Friday called for city mayors to organize peaceful protests this weekend, and asked her supporters to sign an online petition demanding a vote recount, with the presence of independent observers.
  
  Several people who were detained for participating in mass protests in Belarus this week allege that the country’s security forces beat, tortured and humiliated them while in government custody.
  
  Lukashenko claimed earlier this week the protests were initiated by “foreign puppeteers” adding that the law enforcement will not back down and maintained he still enjoys widespread support.
  
  However, the allegations of torture appear to have fueled public anger toward the government.
  
  There had already been signs this week of the country’s military and police officers apparently turning against Lukashenko and showing support for the opposition. A video posted on Instagram by a man named Evgeny Novitski shows his brother – a former special forces officer – throwing his uniform into a trash can, saying he is not proud of his job anymore.
  
  “Hi all! I gave an oath to my people, and looking at what’s happening in Minsk right now, I can’t be proud of where I’ve been serving, and so, I can no longer keep this uniform at home,” the former officer says.
  
  Another video posted by Belarusian TV station Nexta, shows a police officer named Ivan Kolos saying he refuses to follow “criminal orders.” He urged his colleagues to not point guns at peaceful people and be with them instead. He said he would take orders from Tikhanovskaya, not from Lukashenko.
  
  The growing outcry prompted some Belarusian authorities to apologize late Thursday, a reversal from their previous rhetoric promising a severe response to protesters.
  
  “I want to take full responsibility and apologize in a humane way to these people … I’m not a bloodthirsty person and I don’t want any violence,” Belarusian Interior Minister Yuri Karaev said in an interview with a state TV channel ONT.
  
  Karaev also addressed the use of force against journalists, saying he is “against any violence against journalists, but this does not mean that you need to climb between the two sides, do not go into the thick of it!”
