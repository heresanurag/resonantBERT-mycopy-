  _September 2, 2020_
  
  _Hong Kong, Moscow, and Beijing are three of our stops today as we have a look at how different cities are responding to continued coronavirus challenges. We’re reporting on unrest and a presidential visit in Kenosha, Wisconsin. And we’re looking at how the advent of working from home could potentially impact U.S. cities._
  
