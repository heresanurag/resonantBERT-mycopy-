  A version of this story appeared in the October 26 edition of CNN’s Coronavirus:Fact vs. Fiction newsletter.Sign up here to receive the need-to-know headlines every weekday.
  
  It’s being called the “great American surrender.” On Sunday, President Donald Trump’s chief of staffMark Meadowsadmitted that the United States was “not going to control the pandemic,” arguing in a stunning statement that “proper mitigation factors” like therapies and vaccines should be the priority, as new Covid-19 cases continue to spike.
  
  But there is a problem with that logic. Even if a potentialcoronavirus vaccineis approved by regulators in the coming months, Americans won’t be able to get it until well into next year.  And letting the coronavirus rage unchecked in the interim, medical experts argue, is akin to a policy of herd immunity that would cost many thousands of lives.
  
  Meadows’ comments come as the White House contends with yet another coronavirus outbreak of its own. Vice PresidentMike Penceis refusing to accept CDC guidance on quarantining after his chief of staff and a ‘body man’ personal assistant were among five people in his orbit to test positive. The White House has declared Pence an “essential worker” – a designation normally reserved for first responders and front-line medical staff – so that he can continue campaigning.
  
  It’s the latest sign of the Trump team putting its own political priorities ahead of a duty of care to the American people as the country enters the final stretch before the election,Stephen Collinson writes. Despite a surge in cases in 35 states, the President is continuing his campaign blitz, criss-crossing the US in a frantic week of packed rallies that flout social distancing and mask-wearing measures.
  
  Meanwhile, the latest surge of Covid-19 infections has brought theUS’ seven-day average of new daily casesto heights not seen since the pandemic began.
  
  Q:Will workers at the election places be tested for Covid-19 before the election?
  
  A:Election site rules vary by state. Visit your secretary of state’s website for details. But getting tested before working at an election site is a good idea, especially because many poll workers are over age 60. According toPew Research Center, 58% of election site workers in the 2018 general election were age 61 or above.
  
