title: "Experts warn lockdown could come at ‘psychological cost’ to footballers"
date: "2020-04-03"
section: "Football"
url: "https://www.cnn.com/2020/04/03/football/footballers-training-at-home-coronavirus-spt-int/index.html"
content: |
  Jose Mourinhoispedaling on an exercise biketo the familiar beat of “Sweet Home Alabama.” The Tottenham manager, far from engrossed in the workout, nonchalantly taps each thigh with the palm of his hands as his legs move up and down like a sewing machine needle. It is an unusual technique. But these areunusual times.
  
  At this time of year Mourinho would usually be plotting how to defeat an opponent or, depending on your point of view, figuring out where topark the bus.(His team was supposed to playing Sheffield United in the English Premier League on April 4.) But with most of the world in lockdown, there are no tactics to determine, no battles to prepare for.
  
  Fortunately, for fans of the London club at least, Mourinho’s players appeared to be breaking sweat during Tottenham’s midweek videolink training session; split screens showed them running on the spot at their homes while a trainer barked from miles away. The future is now.
  
  🏡 The virtual training sessions continue 💪#SpursAtHome⚪️#COYSpic.twitter.com/ppU3jkyf7w
  
  As apandemichas swept around the world, video clips of famous footballers training at home have become widespread on social media. The lives of those often regarded as superhuman have also beenbrought to a standstillby a virus that does not discriminate. Like the rest of us, their futures too areuncertain.
  
  No one can say with certainty when normality will return. No one knows when thousands will again gather in stadiums and joyously cheer a goal, a kick or spectacular save. In the meantime, players must stay at home and work from home.
  
  But the backyard is no substitute for the intoxicating hit to the senses that comes with entertaining thousands, so how will footballers manage to keep in shape, both mentally and physically? After all, they are the people who never seem to be alone; training with teammates, performing magical feats around the world, their almost every move analyzed and recorded.
  
  Brighton manager Graham Potter has admitted this week“one or two”of his players were not sleeping well as they worry aboutunprecedented events.
  
  Dr. Craig Duncan, a human performance strategist currently supporting the Professional Footballers of Australia (PFA), tellsCNN Sport:  “The postponement of competitions, the cancellation of training and, in many instances, the isolation of players, this could come at a psychological cost.
  
  “Football players have a strict daily, weekly and season routine.  What time to sleep, eat and train is all determined by this schedule so at this stage there are obvious changes. The daily connection in a team environment is also vital, as in any workplace.”
  
