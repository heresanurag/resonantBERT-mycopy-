title: "SoftBank stock jumps nearly 12% after US judge approves T-Mobile-Sprint merger"
date: "2020-02-11"
section: "Investing"
url: "https://www.cnn.com/2020/02/11/investing/softbank-stock-t-mobile-sprint/index.html"
content: |
  A massive bet onSprintis finally paying off for Masayoshi Son.
  
  Shares in his company SoftBank(SFTBF)rallied on Wednesday, after aUS court approved the $26 billion mergerbetween T-Mobile(TMUS)and Sprint(S), the carrierSoftBank(SFTBF)acquired nearly a decade ago.
  
  SoftBank stock closed up nearly 12% ahead of its quarterly earnings Wednesday in Tokyo.
  
  Son has been trying to combine the United States’ third- and fourth-largest wireless carriers for years, with the goal of creating a heavyweight challenger to AT&T(T)and Verizon(VZ).
  
  “All necessary federal approvals required for the [merger] to close have been obtained,” SoftBank said in a press release Wednesday.
  
  Masa Son's big tech dream is fading as more bets sour and key people leave
  
  Getting this deal across the finish line is a much needed win for Son, who has been grappling with a string of high profile losses tied to his $100 billion Vision Fund. In November, the fund reported a $9 billion hit because ofthe WeWork bailoutand losses in investments such as Uber(UBER)and Slack(WORK).
  
  The company reported after trading hours Wednesday that profitshave been almost entirely wiped outas it continues to feel the pain from big losses in its massive tech fund.
  
  Son, an ambitious dealmaker, masterminded SoftBank’s 2013 takeover of Sprint with the aim of quickly merging it with T-Mobile. But concerns about regulatory challenges from the Obama administration effectively killed that plan, and talks with T-Mobile ended in 2014.
  
  “I lost my confidence that moment … I really didn’t like the world anymore, I did a lot of thinking, and I lost my hair,” Sonjoked at a 2017 earnings presentation, gesturing to his bald pate.
  
  T-Mobile and Sprint finallyreached a massive telecom merger agreementin 2018.
  
  Sprint stocksoared more than 70%in New York on Tuesday after the court approval. T-Mobile finished up nearly 12%.
