id: cnn_2020_01413
title: "Amy Schumer tells 2020 grads: ‘Live today in a way that you’re proud of’"
date: "2020-05-16"
section: "Entertainment"
url: "https://www.cnn.com/2020/05/16/entertainment/amy-schumer-graduation-special-trnd/index.html"
content: |
  Comedian Amy Schumer addressed 2020 graduates during the CNN special “Class of 2020: In This Together.” Here’s what she said:
  
  “Congratulations class of 2020. I am honored to get to say a couple of words to you.
  
  I would say my best advice is honestly, you just learned everything you need to know. You don’t know what’s going to happen tomorrow so you better live today in a way that you’re proud of and a way you can be present for.
  
  And my other advice would be don’t try and make your parents proud of you. Try and make yourself happy. Be happy and healthy and live every day like you don’t know what’s going to happen tomorrow, because you don’t.
  
  Proud of you guys. Good luck”
