  Boeing has discovereda possible new design flaw within its troubled fleet of 737 Max planes. A safety audit ordered by the Federal Aviation Administration seems to show new concerns that the wiring in the part of the plane that controls the tail section may be too close together, which could cause a short circuit and, in a worst-case scenario, lead to a crash. All 737 Max jets, numbering in the hundreds, have been grounded since March after two crashes killed 346 people. The FAA audit ispart of the long process requiredto get the planes recertified and ready to fly again. However, a Boeing spokesperson said it’s too early to speculate whether this wiring issue will lead to more redesigns of the jet or delay the recertification process.
  
  Both the House and the Senate are knee-deep in preparations and negotiations as the first full week of impeachment proceedings in the new year begins. No, Speaker Nancy Pelosi still hasn’t sent the articles of impeachment to the Senate so a trial can start,but the House could vote to get that done as early as Tuesday. Meanwhile, Senate Minority Leader Chuck Schumer has done the math:Senate Democrats need four Republicans to side with themto have any hope of getting the type of impeachment trial they want. That would give them a simple majority of 51 votes, which would be enough to compel witnesses to testify, demand certain documents and pursue other trial proceedings Democrats want (and Republicans have been fighting tooth and nail to withhold).
  
  Support poured in from around the world asAustralia faced one of its worst weekends ever in the fight against deadly bushfiresravaging the country. Twenty veteran firefighters from California areheaded to Australia to join the 2,700 or so firefightersalready battling the blazes. Married superstarsNicole Kidman and Keith Urban– both native Australians – have pledged $500,000 to wildfire efforts. SingerPink has pledged the same. Several huge names from the world of tennis have pledged donations, includingMaria Sharapova, Australian Nick Kyrgios, and the Tennis Australia Organization, which pledged $700,000 to the cause (the Australian Open tournament begins later this month).
  
  One US service member and twoAmerican civilian contractors were killed in a terror attackat a Kenya Defense Force base in Manda Bay, Kenya, on Sunday.Al-Shabaab, a group affiliated with Al Qaeda, claimed responsibility for the attack, and said the attack also destroyed US military equipment. However, those claims are unsubstantiated, and US Africa Command (which is responsible for military relations with several African nations) says the group often exaggerates reports of damage on the ground. Africa Command also said US and Kenyan forces successfully secured the base and killed four terrorists responsible responsible for the attack.
  
