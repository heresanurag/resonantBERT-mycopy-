  # What’s open and closed on Labor Day 2020
  
  By [Alaa Elassar](https://www.cnn.com/profiles/alaa-elassar)
  
  Updated Sep 7, 2020
  
  Updated Sep 7, 2020, 1:33 AM ET
  
  PUBLISHED Sep 6, 2020, 12:57 PM ET
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2020%2F09%2F06%2Fus%2Flabor-day-open-closed-trnd "Share with email")Link Threads
  
  Link Copied!
  
  ![Image 1: Beachgoers enjoy a warm sunny day ahead of the Labor Day holiday weekend near the San Clemente pier in California on Wednesday, September 2.](https://media.cnn.com/api/v1/images/stellar/prod/200903154805-labor-day-preview-0902-restricted.jpg?q=w_4200,h_2800,x_0,y_0,c_fill/w_860)
  
  Beachgoers enjoy a warm sunny day ahead of the Labor Day holiday weekend near the San Clemente pier in California on Wednesday, September 2.
  
  Allen J. Schaben/Los Angeles Times/Getty Images
  
  Every year on Labor Day, Americans celebrate the US labor movement, as well as the countless hard workers who built this country and keep it running strong.
  
  As of July 2020, there were more than [159 million people](https://www.bls.gov/news.release/pdf/empsit.pdf) in the US civilian labor force – and, in honor of the federal holiday, many of them are taking the day off this Monday, September 7.
  
  To help you navigate Labor Day, here’s a list of what businesses are open and closed:
  
  Ad Feedback
  
  ## OPEN
  
  *    Target – Open regular hours
  
  *    Walmart – Open regular hours
  
  *    Kroger– Open regular hours
  
  *    Trader Joe’s – Open regular hours
  
  *    Movie theaters – Some movie theaters are open, depending on coronavirus restrictions in your state. Call your local theater to check.
  
  *    Zoos – Open regular hours
  
  *    Malls – Most malls and department stores are open. Call your local stores to check.
  
  *    National parks – Some National Parks across the US are open. Call before visiting the park.
  
  ## CLOSED
  
  *    Government buildings – Anything government-owned, such as the DMV and public libraries, is most likely closed.
  
  *    Banks – Financial institutions are generally closed, although ATMs are always available if you need to deposit a check or get some cash.
  
  *    Post office – The US Postal Service will not deliver mail Monday, and US post offices are closed as well.
  
  *    FedEx – Offices will be open with modified hours, but there will be no deliveries on Labor Day.
  
  *    Museums – If you plan to visit a museum, call to make sure it isn’t closed. While some museums are open, others aren’t.
  
  The best way to confirm whether a business or institution is open is to call ahead.
  
