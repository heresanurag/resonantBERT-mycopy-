id: cnn_2020_01242
title: "There will soon be only 14 Lord & Taylor stores left"
date: "2020-08-20"
section: "Business"
url: "https://www.cnn.com/2020/08/20/business/lord-and-taylor-bankruptcy-store-closures/index.html"
content: |
  Bankrupt department storeLord & Taylor is liquidating and closing more locations than it originally planned when it filed for Chapter 11 earlier this month.
  
  Five more stores are closing their doors, bringing the total number of Lord & Taylor stores shutting down to 24. That leaves just 14 locations open, a remarkable decline for the nearly 200-year-old retailer — the first department store established in the United States.
  
  Sales on inventory will be up to 40% off, the company announced Thursday, with even the stores’ fixtures being sold at “compelling prices.” It’s unclear how long the sales will last. Lord & Taylor primarily has locations on the east coast.
  
  Lord & Taylor filed for bankruptcy on August 2, joining astring of upscale retailers filing for Chapter 11in recent months, includingNeiman Marcusand Brooks Brothers.
  
  The company was once a mainstay of high-end fashion. Hudson’s Bay Companyacquired Lord & Taylor in 2012before selling it in 2019 to Le Tote, Inc., a fashion rental subscription service, for $75 million. Le Tote tried reviving the brand with apop-up store in New York Cityand remodeling its remaining stores with a focus on technology.
  
