title: "He’d go to bed every night with a photo of his late wife. Then a care worker gave him a gift to remember her"
date: "2020-04-21"
section: "World"
url: "https://www.cnn.com/2020/04/21/world/wwii-veteran-pillow-late-wife-trnd/index.html"
content: |
