id: cnn_2020_01522
title: "Puerto Rico rocked by a magnitude 5.8 earthquake, with more tremors expected"
date: "2020-01-06"
section: "US"
url: "https://www.cnn.com/2020/01/06/us/puerto-rico-earthquake/index.html"
content: |
  A damaging earthquake struck Puerto Rico early Monday, with plenty of aftershocks expected.
  
  The magnitude 5.8 tremor happened at 5:32 a.m. ET, the US Geological Survey said.
  
  It was centered about 8 miles south-southeast of Indios, Puerto Rico, at a depth of about 3.7 miles below ground.
  
  No major injuries were reported, Puerto Rico Director of Emergency Management Carlos Acevedo said.
  
  He said some homes were damaged in Guanica, and a home collapsed in Guayanilla.
  
  Some victims of the earthquake posted photos of deep cracks in walls.
  
  Facebook post not found.
  
  Post has been removed or is no longer public.
  
  There were also reports of rock slides along Route 2, Acevedo said.
  
  No tsunami warningwas issued after the quake. But geologists warn of more tremors to come.
  
  Earthquakes fast facts
  
  “More earthquakes than usual (called aftershocks) will continue to occur near the mainshock,”the USGSsaid.
  
  “When there are more earthquakes, the chance of a large earthquake is greater which means that the chance of damage is greater.”
  
  The agency advised anyone in or near vulnerable structures to be extra cautious and said those caught in potential quakes shoulddrop, cover and hold on.
