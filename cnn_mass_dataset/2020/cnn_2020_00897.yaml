title: "UFC champion Conor McGregor has announced his retirement"
date: "2020-06-07"
section: "Sport"
url: "https://www.cnn.com/2020/06/07/sport/conor-mcgregor-retirement-sprt/index.html"
content: |
  Mixed martial arts fighterConor McGregorannounced his retirement from the sport on social media Sunday.
  
  The former two-division UFC World Champion said he was done fighting in a statement posted to his verified Twitter early Sunday morning.
  
  “Hey guys I’ve decided to retire from fighting,” the tweet said. “Thank you all for the amazing memories! What a ride it’s been! Here is a picture of myself and my mother in Las Vegas post one of my World title wins! Pick the home of your dreams Mags I love you! Whatever you desire it’s yours”
  
  Hey guys I’ve decided to retire from fighting.Thank you all for the amazing memories! What a ride it’s been!Here is a picture of myself and my mother in Las Vegas post one of my World title wins!Pick the home of your dreams Mags I love you!Whatever you desire it’s yours ❤️pic.twitter.com/Dh4ijsZacZ
  
  This isn’t the first time the mixed martial arts star has announced his retirement on social media.
  
  The controversial Irish fighter, whose nickname is “The Notorious,”announced his retirement from the sport in March of 2019butreturned to the ringearlier this year to battle American fighter Donald “Cowboy” Cerrone in Las Vegas, Nevada.
  
  He went on to beat the Cowboy witha technical knockoutafter 15 months of retirement.
  
  And in 2016, he tweeted, “I have decided to retire young. Thanks for the cheese. Catch ya’s later.”
  
  The fighter, a former trainee plumber, is considered one of the best in the UFC.
  
  He’s even moved from the octagon of mixed martial arts into the ring to fight boxing legend Floyd Mayweather Jr.
  
  McGregor wasbeaten in the 10th roundby the champion, going further than many thought.
  
  The fight cost him his featherweight and lightweight belts and ended his bragging rights as the only fighter to simultaneously hold two UFC titles.
  
  In a previous interview with CNN, the fighter said part of his success is due to his family’s legacy.
  
  “The McGregor name is historic when it comes to combat,” he says proudly. “Way back, study my family’s name, study my family’s heritage. We were a feared clan.
  
  “At one stage, it was punishable by death to have the surname McGregor. It’s in my blood to fight – and that’s it. It’s what my ancestors have been doing long before me,” he added.
  
  In 2019, McGregor’s fighting spirit led him into a large brawl following his fourth round loss against Russian fighter Khabib Nurmagomedov.
  
  Both fightersreceived bansand McGregor was given a six-month suspension and $50,000 fine. His opponent received a $500,000 fine and was banned for nine months for his part in the dust up.
  
  McGregor leaves the sportranked 8th on the Ultimate Fighting Championship(UFC) pound-for-pound list.
