id: cnn_2020_02516
title: "Calls to boycott French products grow in Muslim world after Macron backs Mohammed cartoons"
date: "2020-10-26"
section: "Europe"
url: "https://www.cnn.com/2020/10/26/europe/france-boycott-muslim-countries-macron-intl/index.html"
content: |
  Calls are growing in parts of the Muslim world to boycottFrenchgoods in protest after President Emmanuel Macron publicly defended cartoons of the Prophet Mohammed, which are considered blasphemous inIslam.
  
  Macron made the remarks last week at a tribute to the murdered high school teacherSamuel Paty, who was beheaded earlier this month during a terror attack in a northern suburb of Paris.
  
  Paty was killed after he showed cartoons of the prophet during a class on freedom of expression.
  
  Macron said that France would not “give up” the caricatures and pledged to tackle extremeIslamismin the country, sparking demonstrations and triggering boycotts in Muslim-majority countries.
  
  “I am calling on the people, do not go near French goods, do not buy them,” Turkish President Recep Tayyip Erdogan said Monday during a speech in the capital Ankara. “European leaders must say ‘stop’ to Macron and his campaign of hatred.”
  
  In Kuwait, a non-governmental chain of hypermarkets said that over 50 of its outlets planned to boycott French products. A boycott campaign is also underway in Jordan, where some grocery shops hung signs declaring that they were not selling French goods.
  
  A range of stores in Qatar are doing the same, including supermarket chain Al Meera, which has more than 50 branches in the Arab country. Qatar University also said that it was postponing its French Cultural Week indefinitely.
  
  On Tuesday Saudi Arabia condemned the publication of “offensive” cartoons of the Prophet Mohammed but stopped short of calling for action against France. Riyadh also condemned terrorist acts, in a reference to Paty’s death.
  
  Paty’s murder has reignited tensions surrounding secularism, Islamism and Islamophobia in France, but public anger in Islamic countries over the Macron’s handling of the attack threatens to make it a diplomatic and economic issue too.
  
  Amid the backlash, the French embassy in Ankara advised French citizens in Turkey on Monday to exercise caution and avoid public gatherings.
  
  A teacher is beheaded, and France's war over secularism, freedom of speech and religious equality reignites
  
  In a controversal speech in early October, before Paty’s murder, Macron vowed to fight “Islamist separatism” with a new law that will “reinforce secularism” in France.
  
  “There is in this radical Islamism, a methodical organization to contravene the laws of the Republic and create a parallel order, to erect other values,” Macron said during the speech.
  
  “We have concentrated populations often according to their origin, their social backgrounds,” he added. “We have concentrated educational and economic difficulties in certain neighborhoods of the Republic. “
  
  The French leader also declared that Islam was a religion “in crisis all over the world,” according toBFM TV.
  
  In a statement issued on Sunday, France’s foreign ministry called the latest boycotts of its products “unjustified,” and demanded that they “end immediately.”
  
  The ministry said the reaction distorted the President’s remarks for political aims, and that “the positions defended by France [were] in favor of freedom of conscience, freedom of expression, freedom of religion and the refusal of any call to hatred.”
  
  The statement added that Macron’s policies were aimed at “fighting against radical Islamism, and to do so with the Muslims of France, who are an integral part of French society, history and the Republic.”
  
  “We will not give in, ever,” Macron tweeted on Sunday. “We respect all differences in a spirit of peace. We do not accept hate speech and defend reasonable debate. We will always be on the side of human dignity and universal values.”
  
  Paty’s death has sparked a security crackdown in France, where officials are targeting hate speech on social media and organizations and non-profits with possible links to Islamism.
  
  The Mohammed caricatures that Paty used in his class originally appeared in Charlie Hebdo, and were cited as the motivation for aterror attackon the satirical magazine in 2015 that left 12 people dead. Macron fiercely defended the right to display such cartoons in France at the memorial event for Paty.
  
  France will keep “loving debates, reasonable arguments, we will love science and its controversies,” the French leader said. “We will not give up caricatures, drawings, even if others are retreating.”
  
  Jordan, Pakistan, Egypt and Iran are among the Islamic countries to condemn France for the publication of the caricatures, and Macron’s response.
  
  “We condemn publication of satirical cartoons depicting Prophet Mohammed,” Ayman Al-Safadi, Jordan’s foreign minister, tweeted on Saturday.
  
  Pakistan’s leader Imran Khan, Egypt’s highest religious authority, the Grand Imam of Al-Azhar, and Iran’s foreign ministry have also all criticized France.
  
  But fellow European leaders spoke out in support of Macron, including German Chancellor Angela Merkel, whose spokesperson swiftly condemned Erdogan’s comments on Monday.
  
  German Foreign Minister Heiko Maas said Berlin stood in solidarity with Paris. The leaders of Greece and Austria have also expressed support for Macron.
  
  Pierre Bairin in Paris, Chris Liakos and Sarah Dean in London, Nadine Schmidt in Berlin and Mostafa Salem in Abu Dhabi contributed to this report.
