  Parachuting in multiple justices selected precisely for their willingness to deliver the goods on high-profile issues would all but guarantee big jolts.
  
  And when you consider it, if the other side began plotting its own counter-pack up to 15 or 19 – or whatever the number is to be after the next round – then it could lead to repeated big lurches back and forth over time.
  
  It’s important that we not start.
