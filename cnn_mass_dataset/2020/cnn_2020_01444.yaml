title: "Ryder Cup and Solheim Cup to be played in ‘two-week festival of golf’ in 2023"
date: "2020-10-20"
section: "Golf"
url: "https://www.cnn.com/2020/10/20/golf/solheim-cup-ryder-cup-2023-back-to-back-spt-intl/index.html"
content: |
  The 2023Ryder Cupand the Solheim Cup will be played in back-to-back weeks in what has been billed a “two-week festival ofgolf.”
  
  On Monday, it wasannouncedthat Finca Cortesin in Spain will host the Solheim Cup between September 22-24 before Italy’s Marco Simone Golf & Country Club hosts the Ryder Cup between September 29 to October 1.
  
  The two competitions are usually scheduled in alternate years but due to the postponement of the 2020 Ryder Cup because of thecoronaviruspandemic, fans will be treated to two weeks in which the best golfers from Europe and the US will be pitched against one another.
  
