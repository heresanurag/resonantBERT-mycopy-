  “Given this lack of evidence of any benefit on mortality, the risk of ending up on a ventilator or the time to clinical improvement, the World Health Organisation have reasonably recommended against the use of remdesivir in patients hospitalised with COVID-19, whatever their disease severity,” Horby said in the statement distributed by the UK-based Science Media Centre.
  
  “Remdesivir is an expensive drug that must be given intravenously for five to ten days, so this recommendation will save money and other healthcare resources,” Horby said. “Remdesivir has been recommended in several COVID-19 treatment guidelines so this new analysis will necessitate a rethink about the place of remdesivir in COVID-19.”
