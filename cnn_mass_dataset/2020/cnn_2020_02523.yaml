title: "Many parents may have to stop working entirely if schools don’t reopen, Goldman Sachs says"
date: "2020-08-04"
section: "Economy"
url: "https://www.cnn.com/2020/08/04/economy/schools-reopening-economy-jobs/index.html"
content: |
  The new school year is just around the corner and parents and teachers are fretting about returning to the classroom during the pandemic. Economists are worried, too, because alack of childcare could damageAmerica’s recovery.
  
  Single parents, parents with young children and parents who can’twork from home are the groups most atrisk to stop working entirelybecause they have no child care, said Goldman Sachs(GS)economists David Choi and Joseph Briggs in a note to clients on Tuesday.
  
  Nearly a third of the pre-pandemic US labor force has kids at home, and about 15% of the work force fallsinto at least two of those three risk categories above, Choi and Briggs said. That totals about 24 million people.
  
  Since May, some 7 million people per week have not workedbecause they didn’t have access to childcare, according to data from theCensus Household Pulse Survey, a number that accounts for about 14% of virus-related reasons for missing working.
  
  Historically, childcare policies have affected people’s participation in the labor force and, unfortunately,women are more affected by it than men. While the gender split in the US labor force wasroughly 50:50 women and men late last year, Covid could tilt the scales back in favor of men.
  
  Long story short, it’s bad for the recovery if parents are forced to stop working to care for their kids. America lostmore than 20 million jobsin March and April due to the pandemic lockdown, but the labor market has been recovering since hitting that trough.
  
  Reopening schools is also about more than childcare.
  
  While the employment of teachers is back to its pre-Covid levels, schools employ plenty of additional staff, such as cafeteria and custodial workers, who canonly return to their jobs once schools reopen. And if support staff don’t, that could drag the unemployment rate by some 0.2 percentage points, the Goldman economists said.
  
  The spring shutdown in the education sector alone shaved 2.2 percentage points offannualized economic growth in the second quarterof the year, Choi and Briggs added.
  
  For students, learning from home may also have plenty of long-run effects, including lower-quality education, a lack of development in social skills and food insecurity for kids reliant on school lunches. All of that can translate intoworsening income and educational inequalitylater in life.
  
  All that considered, the argument to reopen schools seems strong, especially because preliminary evidence suggests younger children are less likely to transmit Covid-19. That is why some countries have managed to reopen schools without triggering a spike in infections.
  
  But thecountries that have succeeded at that so faralso had less virus spread to begin with, the Goldman economists cautioned. The lesson seems to be that the reopening of schools has to be done with a lot of caution and discipline.
  
  States across the US are currentlyexperiencing the virus at different rates. While cases the Northeast peaked early, Southern states, for example, are battling very high infection rates now, making it much riskier there to reopen schools.
