title: "Covid-19 anti-vaxxers use century-old arguments"
date: "2020-10-22"
section: "Health"
url: "https://www.cnn.com/2020/10/22/health/anti-vaxxers-old-arguments-covid-19-wellness-partner/index.html"
content: |
  Editor’s Note:The views expressed in this commentary are solely those of the writers. CNN is showcasing the work ofThe Conversation, a collaboration between journalists and academics to provide news analysis and commentary. The content is produced solely by The Conversation.
  
  As we get closer to an effective vaccine for Covid-19, we should expect to see a renewed push of disinformation and vocal resistance from the anti-vaccination movement.
  
  Over the past year, seemingly endlessconspiracy theoriesandmisinformation campaignshave gained traction online amidrising Covid-19 infection ratesworldwide.
  
  Looking at the history of these movements can help us understand why they can be so effective at capturing a popular following.
  
  As a historian of medicine, it has become clear from researching the history of vaccines that those who promote anti-vaccination consistently use a standard set of strategies. Although it can be hard to see patterns of argument in the modern context, looking back at a historical instance of epidemic and misinformation provides a useful case study for revealing today’s recurring anti-vaccination strategies.
  
  One popular pamphletpublished in 1885 during the smallpox epidemic in Montreal is a great example. Over a century later, we have the benefit of living in a world that haseradicated smallpox using a vaccine. Yet in the past, smallpox vaccination was hotly contested, despite the evidence in favor of its effectiveness.
  
  Published by a leading anti-vaccinationist, Dr. Alexander M. Ross, this pamphlet was widely circulated during the smallpox epidemic of 1885 in Montréal, as public health officials were seeking to increase vaccination coverage.
  
  Ross seized on the opportunity of increased health measures to gain authority, notoriety and personal fame. He painted himself the hero of his own story, the “only doctor; who had dared to doubt the fetish” of vaccination. Despite this, it was discovered thathe had been recently vaccinated during the epidemic, a fact that was gleefully reported by the major newspapers at the time.
  
  His pamphlet serves as a prime illustration of the strategies used by anti-vaccinationists — both then and now. These arguments are not new and have changed little over time. Learning to recognize their repackaging in modern form can help with effectively combating their power.
  
  Ross and his anti-vaccination associates were quick to dismiss the threat of smallpox. Despitemortality rates of between 30% and 40%, and the extreme contagiousness of the disease, it was common for anti-vaccinationists to claim that smallpox was only a minor threat to a population.
  
  Ross decried the “senseless panic” caused by health officials and physicians over the epidemic, claiming that smallpox was not, in fact, epidemic, and that the city had “very few cases.” Official numbers for the epidemic would eventually rise to 9,600 reported cases with 3,234 deaths — nearly 2% of Montreal’s population at the time. An additional 10,000 cases were recorded in the province of Quebec, but historians believe the actual numbers were likely much higher. These numbers and the story of this epidemic have been narrated by historian Michael Bliss in his non-fiction account, “Plague: A Story of Smallpox in Montreal.”
  
  The minimization of threat is a common tactic in contemporary debates as well. Many who promote the anti-vaccination agendaclaim vaccines to be more dangerous than the disease.
  
  Although modern arguments have focused on thefalse claim that vaccines causeautism, historic arguments were much more varied in their allegations of infections from the smallpox vaccine. The anti-vaccinationists of the past claimed that vaccination caused a full spectrum of diseases, from smallpox itself to syphilis, typhoid, tuberculosis, cholera and “blood-poisoning.”
  
  These claims were not always groundless, but their risks were consistently exaggerated. Cases had been known to occur ofsecondary disease transmission due to poor practice. Some physicians used arm-to-arm vaccination — meaning they would use the same instrument to vaccinate a whole line of people — or used vaccine prepared from a human source rather than a bovine source. The lack of sterile cleaning between operations or the use of vaccine prepared from an infected person could lead to rare cases of secondary disease transmissions.
  
  The discovery of such transmissions (years earlier) sparked some of the first regulations around vaccine preparation and administration, and generated a keen concern within the medical community about vaccine safety — a concern which has continued to be amainstay of vaccine production to this day.
  
  Ross’ pamphlet was adamant about the role of both the press and the medical profession in stoking fears over infection as part of a “mad” campaign for gaining money. Much like today, epidemics created opportunities for both employment and research in the medical field.
  
  Yet this employment was painted as an unethical exploitation of the poor, worth “one million pounds sterling” to the profession, rather than an effort in combating the suffering and death of thousands.
  
  Additionally, public health measures were depicted as an assault on personal rights and an overreach of government power. “Talk no longer of Russian Tyranny,” Ross declared, for there was “none so formidable” as the city health officials. His arguments are still echoed over a century later in the current pandemic, as we see continued support behind the belief in a conspiracy to limit freedoms (among other, more extreme,conspiracy theories).
  
  Last but not least is an appeal to authorities that help legitimize the anti-vaccination argument. The modern anti-vaxxer movement has an abundance of these, led by Andrew Wakefield, the now discredited former physician who originally published thefraudulent studylinking the MMR (measles, mumps, rubella) vaccine to autism.
  
  But the anti-vaccination movement has had a long tradition of promoting the words of “experts” who support their narrative. In the 19th century, vaccination debates often brought in asimilar small circle of medical menwho spoke against vaccination, calling it a “filthy” and “evil” practice.
  
  Although their arguments were refuted by many in the medical community, they gained a lasting mantle of prestige amongst anti-vaccinationists as the authoritative voices that offered the “proof” that was needed.
  
  This is not an exhaustive list of anti-vaccination strategies — either historical or contemporary. There have always been individuals who capitalize on medical crises to push their own agenda, and in the modern age of digital media,strategies of misinformationhave evolved and expanded. Much like Ross, the leaders of these movements gain social power by painting themselves as lone crusaders.
  
  As we get closerto a worldwide distribution of Covid-19 vaccine, we can expect to see more and more such crusaders publishing arguments against vaccination. Breaking down patterns of arguments seen repeatedly in the past can provide a useful lesson for combating them in the future.
  
  Paula Larssonis a doctoral student at the University of Oxford’s Centre for the History of Science, Medicine, and Technology.
