id: cnn_2020_02735
title: "Stunt driver successfully jumps canal three times as hometown fans watch"
date: "2020-10-24"
section: "US"
url: "https://www.cnn.com/2020/10/24/us/travis-pastrana-jumps-car-over-ego-alley-trnd/index.html"
content: |
  X-Games competitor and stunt driverTravis Pastranasuccessfully jumped Ego Alley, a canal in Annapolis, Maryland, three times earlier this week.
  
  The stunt’s goal was to jump the canal as a powerboat sped underneath the airborne car. Pastrana, an  Annapolis native, successfully cleared the popular downtown canal in his Subaru WRX three times, but only the last jump proved perfect timing with the boat.
  
  Pastrana made the jump as part of a stunt video forHoonigan Productions, which organized the event and other racing stunts around the city Thursday. The footage will be featured in the 11th edition of Hoonigan’s “Gymkhana” series. No release date has been set.
  
  The jump was postponed due to early morning fog, according toCNN affiliate WJZ, but the show went on as soon as it was safe.
  
  The delay did not stop the crowd from coming to cheer on Pastrana and see the stunt for themselves.
  
  This isn’t Pastrana first impressive jump over water.In 2009, he broke a world record set by Ken Block, another popular stunt driver, by jumping 269 feet across the Pacific from a pier to a barge in Long Beach, California.
