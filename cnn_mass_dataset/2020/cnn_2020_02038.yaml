title: "Syracuse University suspends 23 students after ‘incredibly reckless’ gathering"
date: "2020-08-22"
section: "US"
url: "https://www.cnn.com/2020/08/22/us/syracuse-university-party-covid-19-trnd/index.html"
content: |
  An “incredibly reckless” gathering has brought the suspensions of 23 Syracuse University students, school officials say in a letter.
  
  The gathering was Wednesday night about 10 p.m., wrote the dean of students, Marianne Thomson, and the head of public safety, chief Bobby Maldonado, on Thursday.
  
  The two called the gathering “incredibly reckless behavior.”
  
  The simple reason why colleges are reopening
  
  Syracuse University is investigating and reviewing security footage, interviewing witnesses and “processing a number of tips,” according tothe letter.
  
  In a separate campus-wide letter Thursday, Vice Chancellor for Strategic Initiatives and Innovation J. Michael Haynie said the gathering of first-year students “may have done damage enough to shut down campus, including residence halls and in-person learning, before the academic semester even begins.”
  
  The university is set to begin classes this Monday.
  
  All returning students who do not opt for online-only learning must show proof of a negative virustestbefore retuning to campus, according to acampus letter on testing. New first-year and transfer students coming from states on New York’s travel advisory list wereallowed to arriveAugust 2 to complete their self-quarantine requirement on campus.
  
  There are currently seven active Covid-19 cases across students, staff, and faculty, according to theuniversity’s Covid-19 dashboard.
  
  Nearly 70,000 lives could be saved in the next 3 months if more Americans wore masks, researchers say
  
  This comes after otheruniversities across the countryhave had to suspend students who gathered in large groups and cancel in-person classes.
