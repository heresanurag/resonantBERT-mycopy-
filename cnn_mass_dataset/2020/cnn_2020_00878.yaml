id: cnn_2020_00878
title: "What to know about Monday’s Michigan State Board meeting to certify election results"
date: "2020-11-20"
section: "Politics"
url: "https://www.cnn.com/2020/11/20/politics/michigan-election-results-certification/index.html"
content: |
  Certification is usually a formality, but President Donald Trump is trying to block or delay the process in key states as part of a long-shot effort to overturn the election that he lost to President-elect Joe Biden.
  
  Monday is the day when the Michigan State Board of Canvassers is scheduled to meet to certify the state’s results. The board’s certification of election results is what triggers electors to be selected, which is what gets sent to the Electoral College.
  
  But the Trump campaign and its allies are continuing to try to intervene.
  
  On Saturday, the Michigan Republican Party and Republican National Committee sent a letter to the State Board of Canvassers asking them to delay certification for 14 days and wait for an audit of the election results in Wayne County, which includes Detroit, and is the state’s largest county – even though state law doesn’t allow that.
  
  The letter is part ofa desperate effort from Trump and Republican allies, including making baseless claims about fraud, filing multiple lawsuits in several states to try and delay the finalization of results and even putting pressure on local officials.
  
  Leaders from the state’s GOP legislature who met with Trump at the White House on Friday delivereda blow to the Presidentwhen they said they hadn’t seen any evidence that would change the outcome of the election in Michigan – undercutting Trump’s baseless claims of fraud. Biden leads Trump by more than 154,000 votes in the state.
  
  Earlier in the week, Trump called two Republican canvass board members from Wayne County to offer his support, after theywent back and forth on voting to certify the election resultsfrom the country. The board members filed affidavits Wednesday seeking to “rescind” their votes to certify the election result, though Michigan Secretary of State spokeswoman Tracy Wimmer told CNN no legal mechanism exists from them to do so.
  
  Writing to the state board on Saturday, Michigan Republican Party Chairwoman Laura Cox and Republican National Committee Chairwoman Ronna McDaniel, who’s from the Wolverine State, called for a “full audit and investigation” into what they claimed were “anomalies and irregularities.”
  
  There has been no evidence of widespread fraud nationwide.
  
  Wimmer told CNN that they expect the board of state canvassers to certify at their scheduled meeting on Monday.
  
  “We have no reason to doubt the canvassers will carry out their duty to certify. Every one of Michigan’s 83 counties have done so, Republican and Democrat clerks have confirmed there is no evidence of widespread irregularities, and the board has previously certified elections with more clerical mistakes and much narrower margins of victory,” Wimmer said in a statement to CNN.
  
  The Michigan State Board of Canvassers is made up of two Democrats and two Republicans. The members are appointed by the governor “with the advice and consent of the Senate,” according tothe law.
  
  The role of the board is very narrow and limited. It is to canvass and certify election results. Michigan election law experts told reporters on a press call Friday that the language ofthe law, which states that the board “shall canvass the returns,” is key to understanding the requirements of the board.
  
  “That’s a mandatory requirement,” John Pirich, a former assistant attorney general to the state of Michigan and current law professor at Michigan State University, said when explaining the laws that govern the board.
  
  “The Michigan Supreme Court has been very clear that ‘shall’ means ‘shall.’ It’s mandatory. It’s ministerial. They have no choice,” said Mark Brewer, the longest serving chair of the Michigan Democratic Party and an attorney at the lawfirm Goodman Acker.
  
  The board cannot ask for an audit prior to certification, according to Michiganlaw.
  
  “It’s clear. It says after certification, and it’s not to be used for recounts or certification issues,” Pirich said, referring to the law.
  
  One of the Republican board members toldthe Washington Posthe was considering an audit.
  
  “I do think with all of the potential problems, if any of them are true, an audit is appropriate,” Norman Shinkle said. CNN has reached out to Shinkle multiple times for comment. CNN has also not received responses from the other board members.
  
  The board cannot try to certify part of the results for the state and not all of it, as was suggested by the Republican chair of the Wayne County Board of Canvassers at their certification meeting, which received a lot of pushback at the time.
  
  The only reason the board would be able to delay certification, hypothetically, would be if they did not have all of the results or information they needed to certify. But given that all counties have certified their results, there is no reason for the board to delay certification passed their Monday meeting.
  
  “Historically, the board has always unanimously certified on that day,” Brewer said.
  
  If the board becomes locked in a 2-2 partisan deadlock, like what initially happened with the Wayne County Board of Canvassers on Tuesday, two parallel processes can occur.
  
  Steve Liedel, the chief legal counsel for former Gov. Jennifer Granholm, said this kind of deadlock has happened before, but mainly over ballot proposals.
  
  The first avenue to force certification is through the courts. If the board fails to certify on November 23, the Michigan Court of Appeals will order the board to certify. Liedel said the court has proceeded with contempt proceedings in the past for members of the board failing to certify and that board members refusing to certify could be charged with a misdemeanor or willful neglect of duty. If the issue is not resolved by the Court of Appeals it would go to the Michigan Supreme Court, but Michigan election lawyers agreed Friday that it going to that level is unlikely.
  
  At the same time, Gov. Gretchen Whitmer, a Democrat, has the power to remove and replace any board member, according to Michiganlaw, and can act without waiting for a court or anyone else. This would be a very politically complicated move for Whitmer to pursue.
  
  When asked if Whitmer was prepared to step in if board members refuse to certify, her press secretary Tiffany Brown told CNN, “We’re not to that point and hope individuals will do the right thing and respect the will of the voters.”
  
  If a board member fails to show up, the board can still act as long as a member from each party is present. If there is more than one vacancy, the governor fills the vacancy.
  
  The short answer, according to Michigan election experts, is no.
  
  Even if the State Board of Canvassers refuses to certify results and the issue goes to the courts and Whitmer potentially steps in, Michigan election lawyers explained that the legislature cannot try to appoint their own electors.
  
  “You can look through the entire Michigan election code that was written by the legislature and signed by governors of both parties. There is no role for the legislature in this process,” Brewer said.
  
  “Michigan has a pretty strong separation of powers clause. And appointing members of the Electoral College is not legislating, it’s not passing a law. And there’s nothing in the Michigan Constitution that would authorize the legislature to do that,” Liedel said.
  
  Liedel added that the only thing the legislature could do in this regard is to try a pass a bill, which would change the law, but that would require the governor’s signature.
  
  Both parties adopted their slate of electors at their respective fall conventions.
  
  In Wayne County, after the board certified its results, the two Republican members of the board submitted affidavits trying to recall their votes. Since the affidavits were submitted after the deadline for certification at the county level, there was no way to recall their votes.
  
  The same is true at the state level. Once the board certifies the results, the meeting is adjourned. To recall votes, the board would have to call another meeting, but Michigan election experts said Friday that would not happen.
  
  This story has been updated with additional developments Saturday.
