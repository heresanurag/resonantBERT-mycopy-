title: "Global stocks and US futures retreat on coronavirus caution"
date: "2020-04-07"
section: "Investing"
url: "https://www.cnn.com/2020/04/07/investing/global-stocks/index.html"
content: |
  Global stocks and US futures lost ground Wednesday as economic damage from the coronavirus pandemic continued to mount.
  
  Hong Kong’s Hang Seng(HSI)Index fell 1.2% and China’s Shanghai Composite dropped 0.2%, while benchmark indexes in Australia and South Korea also retreated. Japan’s Nikkei(N225)bucked the trend, finishing with a gain of over 2%.
  
  In Europe, France CAC 40(CAC40)shed 1.8% in early trading, while Germany’s DAX(DAX)lost 1%. The FTSE 100(UKX)dropped 1.6% in London.
  
  US stock futures were slightly lower after declines Tuesday on Wall Street. Dow(INDU), S&P 500(SPX)and Nasdaq Composit(COMP)e futures were all down by less than 0.2%.
  
  Caution has once again taken hold as investors weigh the effects of the pandemic, said Jingyi Pan, a strategist for IG Group.
  
  Germany’s top economic research institutes said Wednesday that Europe’s biggest economy is likely to shrink by 4.2% this year. It expects a contraction of 9.8% in the current quarter, which would be the sharpest decline recorded since record keeping began in 1970.
  
  The dire prediction came as France’s central bank estimated the country’s economy shrank by around 6% in the first three months of the year. The central bank said the last contraction of a similar magnitude came in the second quarter of 1968, when weeks of demonstrations and general strikes sharply curtailed economic output.
  
  There are some signs of progress in fighting the pandemic.
  
  Fatalities and infections appear to beslowing in Italy, Spain and France, which are among the hardest-hit countries in Europe. Chinalifted its lockdown on Wuhan, the original epicenter of the coronavirus crisis, on Wednesday, two days after the countryreported no new deaths for the first timesince late January.
  
  This week is also a shortened one for many stock exchanges. Those in the United States, Europe, Hong Kong, and Australia will close later this week for the Easter holiday.
  
  US crude futures settled Tuesday sharply lower at $23.63 a barrel, down 9.4% from the previous day. Futures rebounded 2.8% on Wednesday to trade at $24.29 a barrel.
  
  Brent crude — the global benchmark — was little changed at $31.91 a barrel.
  
  The moves come ahead ofan OPEC meeting with Russiaon Thursday to discuss oil production cuts in response to plummeting demand and to deescalate a price war.
  
  — Anneken Tappe contributed to this report.
