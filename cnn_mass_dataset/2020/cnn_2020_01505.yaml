id: cnn_2020_01505
title: "Canada’s Ambassador to China granted virtual consular access to detained Canadians"
date: "2020-10-11"
section: "Asia"
url: "https://www.cnn.com/2020/10/11/asia/canada-ambassador-china-access-spavor-kovrig-intl-hnk/index.html"
content: |
  Canadian Prime MinisterJustin Trudeauand United States President Donald Trump discussed on the phone the issue oftwo Canadian citizens detained in Chinasince late 2018 and to whom China granted rare consular access on Friday and Saturday, the Canadian government said.
  
  Dominic Barton, Canada’s Ambassador to China, was granted virtual consular access toMichael Spavor, a businessman, on Friday and to Michael Kovrig, a former diplomat, on Saturday, the Canadian government said.
  
  “The Canadian government remains deeply concerned by thearbitrary detention by Chinese authoritiesof these two Canadians since December 2018 and continues to call for their immediate release,” Global Affairs Canada, which manages the government’s diplomatic and consular relations, said.
  
  Trudeau attacks China's 'political' detention of two Canadians, as prison letters sent from Beijing are published
  
  Trudeau thanked Trump in a phone call on Saturday for the United States’ support in “seeking the immediate release of the two Canadian citizens arbitrarily detained by China,” the prime minister’s office said in a readout statement of the call.
  
  The statements did not give more information. The White House had no immediate comment on further details about the call.
  
  China arrested Canadian citizens Kovrig and Spavor in late 2018 and later charged them with espionage. Their arrests had come soon after Canada hadarrested Meng Wanzhou, the chief financial officer of Huawei Technologies, on a US warrant.
  
  Two Canadians got caught in a spat between the US and China. They've been in prison for a year
  
  The relations between Canada and China have since been tense.
  
  The US’ own tensions with China have also increased recently over the handling of the coronavirus outbreak, the ongoing trade war between the two countries, China’s imposition of a national security law on Hong Kong and the subsequent end to Hong Kong’s special status under US law by Trump.
  
  The Trump administration has restricted technology exports to Chinese companies, notably Huawei, citing national security risks. The company has denied such charges.
