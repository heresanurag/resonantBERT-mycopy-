id: cnn_2020_00731
title: "Business jet maker Bombardier cuts 2,500 jobs"
date: "2020-06-05"
section: "Business"
url: "https://www.cnn.com/2020/06/05/business/bombardier-job-cuts/index.html"
content: |
  Demand for business jets has dried up during theCovid-19 pandemic.
  
  A precipitous drop in orders prompted aircraft maker Bombardier to announce it is cutting 2,500 jobs, mostly in Canada, its home base.
  
  Business jet deliveries are expected to fall 30% this quarter, Bombardier said Friday.
  
  “Bombardier must adjust its operations and workforce to ensure that it emerges from the current crisis on solid footing,” the company said in a statement. It will take a charge of 40 million Canadian dollars, or about $30 million, to cover the costs of the layoffs.
  
  Commercial aircraft maker Boeing(BA)has already announced plans tocut 16,000 jobsbecause of the sharp drop inorders from airlines, which are racing to cut spending in the face of the sharp decline indemand for air travel.
  
  Rival Airbus(EADSF)has yet to announce permanent job cuts, but it hasfurloughed 6,000 workers.
  
  A year ago, the companysold its regional jet businessto Airbus. That business built smaller commercial aircraft that are used to feed the hubs of major airlines.
