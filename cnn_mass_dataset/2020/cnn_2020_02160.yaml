title: "The Fortune 500 now has a record number of female CEOs: A whopping 39"
date: "2020-09-10"
section: "Business"
url: "https://www.cnn.com/2020/09/10/business/fortune-500-women-ceos-citigroup/index.html"
content: |
  Citigroup just hired Jane Fraseras its next CEO, the first woman to lead a major US bank and the 39th female chief executiveon the Fortune 500 list.
  
  The history-making announcement Thursday from Citigroup elevates Fraser from her current role leading Citi’s consumer bank.
  
  Fraser joins just 38 other women on the largely white and male Fortune 500 CEO list.
  
  Last month,Linda Rendlebecame the 38th when Clorox announced her as the new chief executive. She takes the helm on Monday.
  
  The figure is inching up, but women still represent only 7.8% of the Fortune 500 CEO list, highlighting the slow pace of change at the highest levels of business.
  
  Women have been on the list for 48 years, ever since Katharine Graham became chief executive of The Washington Post in 1972.
  
  A tiny fraction — less than 1% — of Fortune 500 companies have Black CEOs. And only three women on the list of Fortune 500 female CEOs are women of color, according to Fortune. Those women are Sonia Syngal, the CEO of Gap(GPS)Inc., Lisa Su, the CEO of Advanced Micro Devices(AMD)and Joey Wat, the CEO of Yum China(YUMC).
  
  More women have climbed the ranks this year, but at the same time, someveterans have stepped downfrom their posts.
  
  In June, Marillyn Hewson stepped down from her role as Lockheed Martin’s CEO aftermore than seven years. She is now the executive chairman of the board.
  
  Ginni Rometty retiredas CEO of IBM(IBM), Cheryl Miller took a medical leave from her role as CEO at AutoNation(AN), andKathryn Marinelloresigned from her role as Hertz’s CEO.
