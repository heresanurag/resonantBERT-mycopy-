  Elektra (Delaware):  What’s the difference between a pardon and commutation, and does it impact further proceedings involving Roger Stone?
  
  A pardon essentially wipes out both a conviction and a sentence, whereas a commutation eliminates only the sentence but leaves the conviction in place.
  
  So, as a result of his commutation, Stonedoes not have to serveany of his 40-month prison sentence. But his case remains alive in the courts. Stone hasappealedhis conviction, and the Court of Appeals will eventually rule on whether Stone’s conviction will be affirmed (upheld) or reversed. This decision will be largely – though not entirely – symbolic. For example, if the Court of Appeals upholds Stone’s conviction, then the conviction will remain on Stone’s criminal record. And Stone, like any federal felon, will lose certaincollateral rightsincluding the right to possess firearms, vote, and serve on a jury.
