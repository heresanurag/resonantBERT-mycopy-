title: "As Election Day drags on, waiting is the hardest part"
date: "2020-11-06"
section: "Politics"
url: "https://www.cnn.com/2020/11/06/politics/trump-biden-election-high-turnout-waiting-on-results/index.html"
content: |
  We were warned what could happen.
  
  Premonitions of a “red mirage” from in-person votes favoring President Donald Trump tallied before mail-in ballots skewing to Democratic nominee Joe Biden. Trumpcasting doubton the entire process far ahead of November 3. Key swing states withlaws barring them from counting the mountain of mail-in ballots before Election Dayitself.
  
  More than anything, we were told to be patient.
  
  Yet for those eager to put the 2020 election to a close, that wait is proving easier anticipated than done.
  
  In each episode of his weekly YouTube show, Chris Cillizza will delve a little deeper into the surreal world of politics. Click to subscribe!
  
  Here’s what we know so far.
  
  Biden is planning a prime-time address at 8 p.m. ET from Delaware. Trump hasno plans to concede, reports CNN’s Kevin Liptak, Kaitlan Collins and Jamie Gangel.
  
  No matter what happens – or who wins – apeaceful transition of powercan and will happen at noon on January 20, every four years.
  
  Here’s what else we know.Georgiais about to become the center of the political universe – even after a recount – thanks to potentially two runoff elections that could determine control of the US Senate.
  
  On top of that,more Americans than ever before voted this year, assisted by heroic poll workers and election officials, all ensuring everyone had the chance to cast a ballot. Despite a deadly pandemic, historic unemployment, concerns of Election Day unrest and everything else, the nation cast these votes at a historic clip.
  
  The Point: There’s still a lot to be determined. But we know this: The nation has successfully pulled off another election, with historic turnout, under incredible circumstances. And for that, we should be very proud.
