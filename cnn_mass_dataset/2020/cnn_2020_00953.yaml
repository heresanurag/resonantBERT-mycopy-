id: cnn_2020_00953
title: "Google Chrome users may have been impacted by a massive spying campaign, report says"
date: "2020-06-18"
section: "Tech"
url: "https://www.cnn.com/2020/06/18/tech/google-chrome-extensions-spyware/index.html"
content: |
  Google Chromeextensions downloaded more than 32 million times were used to spy on the popular browser’s users in a massive global surveillance campaign, according to anew report.
  
  Thereport, from cybersecurity firm Awake Security, found at least 111 “malicious or fake” Chrome extensions capable of taking screenshots, stealing login credentials and capturing passwords as users typed them. The campaign impacted a wide range of sectors including financial services, healthcare and government organizations, it added.
  
  Extensions allow users to add features and capabilities to their browsers, such as a recently popular one that allows multiple laptops tostream Netflix showssimultaneously and another from Google that lets usersflag suspicious websites.
  
  But the new report highlights the potential for fraudulent extensions to do harm and compromise a wide variety of systems.
  
  “The actors behind these activities have established a persistent foothold in almost every network,” researchers at Awake said.
  
  Google confirmed that all the browser extensions flagged by Awake have since been removed.
  
