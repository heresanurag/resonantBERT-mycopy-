id: cnn_2020_01985
title: "The quest for trans rights has exposed a deep divide in the UK. Scotland may show a way forward"
date: "2020-04-04"
section: "UK"
url: "https://www.cnn.com/2020/04/04/uk/trans-rights-reforms-scotland-gbr-intl/index.html"
content: |
  Edinburgh native James Morton was 24 years old when his employers realized he was trans after he applied for a pension scheme requiring him to provide a birth certificate. He told CNN that a data protection errorouted himto colleagues, who began asking Morton about his private parts and “made offensive jokes at my expense,” he said.
  
  The traumatic time “very much made me think that I do not want this document (his birth certificate) undermining my privacy,” Morton said of his decision to change his gender marker in the eyes of British law.
  
  To do so, Morton applied to a tribunal, which issues a gender recognition certificate (GRC) that would in turn allow him to change his birth certificate. To be successful, an applicant needs to provide the panel proof of living in the “acquired gender” for at least two years and a detailed medical and psychiatric report, outlining a diagnosis of gender dysphoria and any relevant treatment or surgery. There is no requirement to undergo sex reassignment surgery to receive the GRC.
  
  A man beat a transgender woman for using the correct bathroom -- the women's. Now he's guilty of a hate crime
  
  His petition was ultimately approved, but only after what he describes as a pedantic, burdensome process.
  
  In a bid to be in step with some European countries, Scotland’s governmentwants to ease the current pathway, criticized as too expensive and intrusive. The simplified self-declaratory system would shed away the panel and the medical reports. And where it has been a requirement for applicants to prove having lived in accordance with one’s gender identity for 24 months, the new system would require just three months. It  would also reduce the minimum age of recognition to 16, from 18.
  
  The move has reinvigorated the quest for more rights for the structurally disenfranchised community,blighted by high rates of discrimination, harassment, suicide, and whoreport facing difficulty obtaining gender-affirming healthcare in the UK.
  
  A consultation began on a new draft law in December, which has the backing of the country’s biggest women’s groups and major players in the ruling Scottish National Party (SNP), including Scotland’s First Minister Nicola Sturgeon. ​But that law, along with other legislation, has now been placed on hold while officials work to contain the coronavirus pandemic. In an April 1letterto activists with the Scottish Trans Alliance, the Scottish government expressed its “strong commitment to reform the Gender Recognition Act 2004 and improve the current process for trans people.”
  
  Yet campaigners who spoke to CNN are wracked with apprehension after a UK-wide attempt at canvassing public opinion in 2018 manifested a toxic culture war. They say reform will create a more humane and equitable society, whereas critics have pitted one of the world’s most maligned minorities against a historically oppressed group: trans women against cis-gender women – that is, women whose gender identity aligns with the sex assigned to them at birth.
  
  Some opponents of the new draft law, who say that trans women are not women, believe trans women pose a threat in spaces that are for women. “The Scottish government is creating a loophole for predators and pretenders to exploit,” Fair Play for Women, a campaign group that opposes the inclusion of trans women in women’s sports, wrote about Scotland’s draft billon its website in March.
  
