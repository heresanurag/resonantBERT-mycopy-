title: "Halsey and Bernie Sanders shared their thoughts on America’s future"
date: "2020-10-05"
section: "Entertainment"
url: "https://www.cnn.com/2020/10/05/entertainment/halsey-and-bernie-sanders-trnd/index.html"
content: |
  Halsey andSenator Bernie Sandersrecently shared their thoughts on the upcoming presidential election and the wealth tax.
  
  In a conversation recorded on September 30 and released over the weekend, the artist and former Democratic presidential candidate discussed the future of America and why they’ll be voting for Joe Biden this November.
  
  The singer posted their conversation to her Instagram and Twitter accounts.
  
  The two referenced last week’s presidential debate, with Halsey calling it “one of the most frustrating pieces of television that I’ve ever ad the misfortune of witnessing.” She compared it to a “reality television show.”
  
  “It certainly was not one of the great moments in American history,” he said.
  
  BERNIE AND HALSEY DISCUSS AMERICA. I sat down with@sensandersto bring you the first of many more episodes like this one. Register to vote athttps://t.co/kfJH9NT9RApic.twitter.com/g0ot1jgYRu
  
  Halsey and Sanders also discussed her upbringing, saying she is from a “lower-class family” with parents that dropped out of college to have her.
  
  “Now, as an adult at 26 years old I’m part of the one-percent,” Halsey said. “There is no amount of money that I think is worth personally contributing to the alienation, the disenfranchisement of millions, hundreds of millions of people across this country. Which is why despite being in the one percent, I support the wealth tax. Because I believe that the people who oppose it are motivated by greed.”
  
  Sanders that we “have an economy that is controlled by people who are incredibly greedy.”
  
  “They want more and more and more, so that we end up with three people in America owning more wealth than the bottom half of our society. Three people. The top one percent owns more wealth than the bottom 92 percent,” Sanders added.
