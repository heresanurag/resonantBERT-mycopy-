  You’ve heard the line before from company leaders: Family is most important.
  
  But one CEO admitted he wasn’t always practicing what he was preaching.
  
  I was not acting in concert with what I was saying,” said Netflix co-CEO Reed Hastings about touting the importance of family, while often staying late at the office.
  
  “That in particular created real integrity issues,” he recently toldCNN’s Poppy Harlow.
  
  It was a marriage counselor who helped him see that he was “a systematic liar.”
  
  Hastings is also working on his work relationships and encourages radical candor from his employees – even when the feedback is hard to hear.
  
  Read and watch more about the interviewhereandhere.
  
  If you’re thinking about switching careers, you aren’t alone.
  
  It’s normal for big events (like a global pandemic) to cause some workers to rethink their current job.
  
  More than half of Americans in a recent survey who are currently looking for a new job are doing so because of the pandemic, reportsCNN Business’ Alexis Benveniste.
  
  The survey, which includes people who are looking for new jobs and people who are unemployed, was conducted by Morning Consult and commissioned by Amazon.
  
  Read more aboutwhat’s going onandget tips about switchingto a new career.
  
  Good managers are checking in with their employees to see how they’re doing during the pandemic.
  
  So how should workers respond?
  
  Do they slap a smile on their face and say everything is fine – even when they’re really struggling with a mental health issue? Or is it okay to talk about what’s really going on?
  
  “There’s more stigma out there than we would like to think,” a psychology professor toldThe Wall Street Journal’s Rachel Feintzeigabout approaching the conversation. “Less is more.”
  
  But some employees Feintzeig spoke with say they are finding that talking about mental health at work can be beneficial both on a personal and professional level.
  
