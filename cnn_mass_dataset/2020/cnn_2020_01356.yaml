  Editor’s Note: A version of this story appeared in CNN’s Work Transformed newsletter. To get it in your inbox,sign up for free, here.
  
  The pandemic has forced almost every company to change how they do business.
  
  And co-working company WeWork has been no exception.
  
  “We saw a drop off in April and May,” WeWork CEO Sandeep Mathrani told me.
  
  But business is picking up again as companies look to rent space and keep workers safely distanced.
  
  “We were very quickly able to de-densify our common areas, our lounges, our office space,” Mathrani said.
  
  WeWork is also attracting new types of clients, especially in the fields of education and health sciences.
  
  This summer, the company started working with colleges and universities. The schools needed a place for students to go between classes now that there are space limitations in places like libraries and coffee shops.
  
