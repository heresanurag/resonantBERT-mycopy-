  Looking to take your remote work lifestyle up a few notches?
  
  I am talking beach views (or a desk on the beach, if you prefer), laundry service and daily free yoga, fitness and meditation classes.
  
  A luxury resort in the Maldives is offering a “Workation Package”that includes all this and more, reportsTamara Hardingham-Gill for CNN.
  
  But be ready to fork over some serious $$$.
  
  A seven-night stay in a beach house costs more than $23,000.
  
  That can be expensed, right?
