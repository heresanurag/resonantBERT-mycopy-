id: cnn_2020_01509
title: "Jackson State University president resigns on the heels of his arrest in a prostitution sting"
date: "2020-02-10"
section: "US"
url: "https://www.cnn.com/2020/02/10/us/jackson-state-william-bynum-prostitution-arrest/index.html"
content: |
  The president of Jackson State University resigned Monday after he was arrested over the weekend in a prostitution sting at a Mississippi hotel.
  
  William Bynum Jr. is accused of procuring services of a prostitute, false statement of identity and simple possession of marijuana, theClinton Police Department said. He was among 17 people arrested in the two-day prostitution sting at a hotel in Clinton, Police Chief Ford Hayman told reporters.
  
  Bynum posted a $3,000 bond over the weekend. The date of his first court appearance was not immediately known.
  
  It was not immediately known whether Bynum had an attorney. Bynum couldn’t be reached Monday.
  
  Bynumtendered his resignation Mondayto the Board of Trustees of State Institutions of Higher Learning, state education officials said. His resignation is effective immediately, officials said.
  
  The board planned aspecial emergency meeting Mondayafternoon to discuss the issue.
  
  Bynum wasnamed president of Jackson State, located in Jackson, in May 2017.
