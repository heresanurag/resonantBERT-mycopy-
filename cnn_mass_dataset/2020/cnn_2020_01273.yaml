title: "Everton holds up Liverpool’s title charge in goalless Merseyside derby"
date: "2020-06-21"
section: "Football"
url: "https://www.cnn.com/2020/06/21/football/football-merseyside-derby-liverpool-everton-spt-intl/index.html"
content: |
  Liverpool took a stuttering step towards its first English league title in 30 years as the champion-elect was held to a goalless draw by Everton in the Merseyside derby at Goodison Park on Sunday.
  
  It was not the result that Jurgen Klopp’s men wanted on their return to action after a three-month hiatus, but with a 23-point lead over Manchester City, celebrations will not be long delayed.
  
  Everton, improved under new manager Carlo Ancelotti, came closest to securing victory with Tom Davies seeing his late effort roll against a post and Brazilian striker Richarlison forcing a smart save from Liverpool goalkeeper Alisson Becker.
  
  Despite concerns over fans congregating near the stadium with Liverpool’s Anfield less than a mile away, permission was given for the match to go ahead at Goodison. But in an empty stadium, the usually fevered atmosphere of the derby was lacking.
  
  Also lacking was clear-cut chances for either side, with Liverpool, leaving a not fully fit Mo Salah on the bench, rarely troubling home goalkeeper Jordan Pickford.
  
  Joel Matip should have done better from a Trent Alexander-Arnold free kick in the first half and Liverpool started the second half strongly with Roberto Firmino and Naby Keita combining well to set up a chance.
  
  But Everton survived the pressure and came very close to causing an upset in the last few minutes as a clever flick from Dominic Calvert-Lewin was kept out by Alisson with a first-time attempt from Davies striking the woodwork and away.
  
  The draw leaves Liverpool unbeaten in the last 22 Merseyside derbies, but still five points from guaranteeing the coveted English Premier League crown.
  
  The Liverpool manager said his team didn’t create enough chances for the amount of time it possessed the ball.
  
  “Most of the time we were dominant but then they had the biggest chance out of the blue, we were lucky in that moment,” Klopp said.
  
  “Both teams showed it was a derby, even without a crowd,” Klopp said.
  
  Before the match, both teams took the knee in support of the Black Lives Matter movement and stood for a minute’s silence in honor of those who have died in the Covid-19 pandemic.
  
