  Earlier on Sunday, Chelsea cemented its grip on fourth place with a 2-1 win at relegation-threatened Aston Villa.
  
  Kortney Hause put Villa ahead against the run of play just before halftime, but after the break it continued to be one-way traffic as Chelsea dominated possession without carving out a string of chances.
  
  Manager Frank Lampard sent on US international Christian Pulisic in a bid to spark his attack and it paid almost immediate dividends as he connected with a Cesar Azpilicueta cross to half-volley an equalizer in the 60th minute.
  
  The winner came just two minutes later as Olivier Giroud was allowed time to turn in the penalty box and his deflected shot beat Orjan Nyland in the Villa goal.
  
  Villa had a late chance to level as Jota pulled his shot wide, but Dean Smith’s team was well beaten and remains second bottom in the standings.
  
  The victory completed a good week for Chelsea, which has strengthened its squad with the acquisition of RB Leipzig striker Timo Werner, and moved five points clear of Manchester United in fourth spot and only three adrift of third-place Leicester City.
  
  Sheffield United faltered in its bid for a Champions League spot, losing 3-0 at Newcastle,who could be under new ownershipby a controversial Saudi-backed consortium.
  
  Manager Steve Bruce admitted before the match that it had been a “distraction” but it did not prevent his side from securing an impressive victory, helped by the second-half dismissal for two yellow cards of visiting defender John Egan.
  
  The lively Allan Saint-Maximin scored the opener soon after Egan departed and Matt Ritchie doubled Newcastle lead with a well-hit strike 14 minutes later.
  
  SB on Joelinton:"We're all delighted for him. He probably suffered more in the lockdown, he had no family over and he was stuck in an apartment somewhere. It's been difficult for him but I'm delighted for him because he's a really good pro and he can only get better."pic.twitter.com/cn7JkBzp2r
  
  The icing on the cake for Newcastle fans was the third — a rare goal for Brazilian striker Joelinton, who earlier had missed a cast-iron first-half chance to put his side ahead.
  
  It was his first goal in the league since August 25 against Tottenham and only his fourth of the season following his £40 million ($44 million) move from Hoffenheim last year.
  
  Despite a draw and a loss since the restart of the campaign, Chris Wilder’s United are just two points behind fifth-place Manchester United,which drew 1-1 with Tottenham on Friday.
