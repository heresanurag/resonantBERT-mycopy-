id: cnn_2020_01871
title: "An Australian runner found dangerous spikes hidden on a popular nature trail"
date: "2020-01-25"
section: "World"
url: "https://www.cnn.com/2020/01/25/world/austrlain-homemade-spikes-trnd/index.html"
content: |
  Police in Australia are urging the public to stay alert after a runner found homemade spikes methodically hidden on a popular running trail Monday.
  
  The man was on Alexanders Trail in Lake Macquarie, a city in New South Wales, when he noticed a pile of leaves in the middle of the track.
  
  He found wine corks with nails protruding from them, police said in astatement posted to Facebook.They resembled caltrops, illegal weapons that have at least two sharp points sticking out of a base.
  
  He continued along the trail and found another pile of leaves with more spikes hidden. Further along, he found another.
  
  Police are investigating.
