title: "Weight loss drug Belviq tied to ‘possible increased risk of cancer,’ FDA says"
date: "2020-01-15"
section: "Health"
url: "https://www.cnn.com/2020/01/15/health/belviq-cancer-risk-fda-bn/index.html"
content: |
  The US Food and Drug Administration warns that prescription weight loss medicine Belviq might be associated with an increased risk of cancer.
  
  The findings were the result of a clinical trial assessing the safety of the drugs Belviq and Belviq RX, or lorcaserin, theFDA announced on Tuesday.
  
