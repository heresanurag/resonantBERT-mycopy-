  Weight loss drugsapproved for long-term use include orlistat (brand name Xenical), lorcaserin (Belviq) and liraglutide (Saxenda) as well as the combination drugs naltrexone-bupropion (Contrave) and phentermine-topiramate (Qsymia).
  
  In one recent study, these drugs helped overweight or obese peoplelose at least 5% of their body weightat the end of a year – that’s at least 10 pounds if you weigh 200 – compared with a placebo. Qsymia and Saxenda were associated with the highest odds of achieving that amount of weight loss.
  
  For many, losing 5% to 10% of your body weight is associated with improved blood pressure, triglycerides and blood sugar, factors that lower the risk for heart disease and diabetes.
