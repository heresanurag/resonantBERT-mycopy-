  The Weekly Newsquiz tests your knowledge of events in the news
  
  With the 2020 Summer Games less than six months away, an Olympic organizer is voicing concerns about the potential impact of the Wuhan coronavirus. After completing a historic mission, a NASA astronaut explains why she hopes the record she set will soon be broken. And a camera in California captures an unlikely alliance of animals.
  
  1. Name the two men who participated in NASA’s “Twins Study,” which compared the effects of spending almost a year in space with those of staying on Earth.
  
  2. During what political event did problems with an application and a phone line prevent results from being released on Monday night and much of Tuesday?
  
  3. Name the economic and political alliance that the United Kingdom officially left on January 31, more than three years after Britons voted to leave it.
  
  4. Britain’s departure from the alliance referenced in question 3 became popularly known by what one-word term?
  
  5. On Tuesday night, U.S. President Donald Trump delivered his annual message to Congress, a speech that since 1947 has been known as what?
  
  6. Name the governor of Michigan, who gave the Democratic party’s response to the Republican president’s annual message.
  
  7. Even though results from Monday’s contests haven’t been finalized, U.S. presidential hopefuls are focusing on what other state, which holds its primaries next Tuesday?
  
  8. Which chamber of the U.S. Congress voted to acquit President Trump of the impeachment articles against him, allowing the U.S. leader to continue in office?
  
  9. An organizing committee member is concerned that the Wuhan coronavirus could have an impact on what event, which begins in Japan on July 24?
  
  10. Name the NASA astronaut who recently set a new record for the longest single spaceflight by a woman, which lasted 328 days.
  
