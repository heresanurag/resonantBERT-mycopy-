id: cnn_2020_02630
title: "Chad Daybell case can proceed to trial, judge rules"
date: "2020-08-04"
section: "US"
url: "https://www.cnn.com/2020/08/04/us/chad-daybell-hearing-tuesday/index.html"
content: |
  An Idaho judge ruled Tuesday that the case against Chad Daybell, the stepfather of two children whose remains were found on his property, can proceed to trial.
  
  Daybell is charged with two felony counts of conspiracy to commit destruction, alteration or concealment of evidence and two felony counts of destruction, alteration or concealment of evidence.
  
  In June, law enforcementofficials found the remainsof Tylee Ryan, 16, and JJ Vallow, 7, on rural property in Fremont County, Idaho, belonging to Daybell, who is married to the children’s mother, Lori Vallow. The two children had last been seen on different dates in September.
  
  After two days of evidence and testimony from more than 10 witnesses, Judge Faren Eddins ruled the state had shown probable cause.
  
  The prosecutor linked Daybell to the separate case of his wife. Vallow was charged in March with two felonies after a deadline to turn over her children to authorities passed.
  
  Madison County Prosecuting Attorney Rob Wood said Daybell helped hide evidence in that case.
  
  “Those bodies were concealed, one of them was destroyed, they were located on Chad Daybell’s property,” Wood said.
  
  Daybell’s attorney, John Prior, however, argued the state didn’t even “come close” to having enough evidence to prove Daybell concealed the bodies of JJ or Tylee.
  
  “There’s been no indication of any evidence that this act took place on the night of the 22nd or 23rd, or whatever day it was,” Prior said in his closing argument.
  
  “And quite honestly, judge, they don’t even come close on the concealment of Tylee. They don’t even come close on the concealment of JJ and the conspiracy,” he added.
  
  Daybell is scheduled to be arraigned August 21 in Idaho district court.
  
  Cell phone pings from Lori Vallow's late brother led investigators to the bodies of her children
  
  Authorities have not said how the children died and no one has been charged with killing them.
  
  Authorities in June used pings from the cell phone of Vallow’s now-deceased brother, Alex Cox, to pinpoint potential search areas on Daybell’s property. The children’s remains were found June 9 and 10. Tylee was last seen September 8 and JJ was last seen September 22.
  
  Vallow had already been jailed on two felony counts of desertion and nonsupport of children and three misdemeanor charges. She pleaded not guilty. Last month, prosecutors added the same charges as Daybell, but she has not appeared in court on those counts. Her preliminary hearing is scheduled for next week.
  
  Correction:A previous version of this story gave the wrong age for Tylee Ryan. She was 16 at the time of her death.
