  This isbrand newfrom Emma Loop and Jason Leopold, looking at how often Sean Hannity came up during the Mueller probe: The Fox host “is mentioned more than a dozen times in documentsBuzzFeed News has obtainedfrom the Mueller investigation so far.” Hannity, who loves to claim that “journalism is dead,” told the reporters that “I stand by my incredible investigative team and our great sources and reporting.”
  
