title: "Gwyneth Paltrow, star of ‘Contagion,’ is taking her coronavirus worries seriously"
date: "2020-02-26"
section: "Entertainment"
url: "https://www.cnn.com/2020/02/26/entertainment/gwyneth-paltrow/index.html"
content: |
  Gwyneth Paltrow isn’t taking any risks.
  
  On her way to Paris, the actress posted a picture to Instagram showing herself taking precaution against the coronavirus.
  
  “Paranoid? Prudent? Panicked? Placid? Pandemic? Propaganda? Paltrow’s just going to go ahead and sleep with this thing on the plane,” she wrote. “I’ve already been in this movie. Stay safe. Don’t shake hands. Wash hands frequently.”
  
  The movie to which Paltrow referred is likely “Contagion,” the 2011 film about a quick-spreading pandemic that (spoiler alert) leaves Paltrow’s character dead in the first few minutes of the film.
  
  Instagram post not found.
  
  Post has been removed or is no longer public.
  
  It also starred Marion Cotillard, Matt Damon and Laurence Fishburne.
  
  There are currently60 confirmed casesof coronavirus in the United States, according to an update Wednesday from Health and Human Services Secretary Alex Azar.
  
  In the photo posted by Paltrow, she appears to be wearing an N95 mask, which is “very efficient filtration of airborne particles,” according to theFood and Drug Administration.
  
  On Tuesday, Azar explained that N95 masks are “mostly for health care workers.”
  
  Regular surgical masksaren’t considered particularly effectivein preventing coronavirus transmission by the CDC as they don’t filter smaller particles.
  
  This info, seemingly got to actress Kate Hudson a little late.After posting a photoof herself wearing a surgical face mask on Instagram on Tuesday, Hudson commented on Paltrow’s saying, “At least you have the right mask!!!”
