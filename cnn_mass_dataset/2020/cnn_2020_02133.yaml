title: "Tiger Woods mulling details of proposed lucrative global golf tour"
date: "2020-02-12"
section: "Golf"
url: "https://www.cnn.com/2020/02/12/golf/tiger-woods-premier-golf-league-pga-tour-riviera-record-spt-intl/index.html"
content: |
  He says it is a “natural evolution” butTiger Woodsis wary of jumping ship to a proposed new world golf tour.
  
  Woods said Tuesday he had been approached by the fledgling Premier Golf League (PGL) and has been digesting the details with his team.
  
  The British-based World Golf Group hopes to lure the biggest stars to a highly lucrative global circuit to rival the PGA Tour and the European Tour – the game’s two major leagues.
  
  The suggested format is for 48 of the top players to compete in 18 tournaments a year – each with a purse of $10 million – starting in 2022. The new tour would reportedly offer atotal prize fund of $240 million.
  
  “Have I been personally approached? Yes, and my team’s been aware of it and we’ve delved into the details of it and trying to figure it all out, just like everyone else,” Woodstold reportersahead of the PGA Tour’s Genesis Invitational at Riviera Country Club in Pacific Palisades, California.
  
  “There’s a lot of information that we’re still looking at and whether it’s reality or not.”
  
