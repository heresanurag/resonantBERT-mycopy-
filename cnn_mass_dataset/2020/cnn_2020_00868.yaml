id: cnn_2020_00868
title: "American Airlines plans to return the 737 Max to service in December"
date: "2020-10-18"
section: "Business"
url: "https://www.cnn.com/2020/10/18/business/boeing-737-max-american-airlines/index.html"
content: |
  American Airlines is planning to return the Boeing 737 Max to service for passenger flights by the end of the year.
  
  The return-to-service dates are “highly dependent” on recertification from the Federal Aviation Administration, the airline said on Sunday. The Max has beengrounded worldwide since March 2019following two crashes that killed 364 people.
  
  American(AAL)said after it’s certified, it would phase in the 737 Max, beginning with a daily 737 Max flight once-a-day between Miami and New York, starting December 29 through January 4. It will also consider extending flights beyond that time period.
  
  “We remain in contact with the FAA and Boeing on the certification process and we’ll continue to update our plans based on when the aircraft is certified,” the company said in a statement.
  
  The new slate of flights will be available for booking as early as October 24 and customers will be made aware they will be flying on a Max, the airline said.
  
  The announcement follows American’scut of 9,000 jobsafter calls for more coronavirus federal aid failed. The airline is also expected to report earnings on October 22. In the first half of the year, the company lost $5 billion, as the coronavirus pandemic continues to take its toll on the airline industry.
  
  Earlier in October, the FAA published a draft of the proposed pilot training for the Max — just one of a half-dozen procedural steps the agency has laid out that will need to be completed before it grants final approval for airlines to fly the plane again. On Friday, EU Aviation Safety Agency confirmed it isalso getting close to giving the all-clear. But it will still take more than a month to complete that final approval.
