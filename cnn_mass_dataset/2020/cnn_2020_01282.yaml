title: "Big wave surfer Alex Botelho ‘stable’ after suffering sickening wipeout at Nazare"
date: "2020-02-12"
section: "Sport"
url: "https://www.cnn.com/2020/02/12/sport/big-wave-surfer-alex-botelho-spt-intl/index.html"
content: |
  Big wave surfer Alex Botelho is “stable and conscious” in hospital after suffering a sickening wipeout during a competition at Nazare, Portugal Tuesday.
  
  The Portuguese was being towed back out by jet-ski driver Hugo Vau when both were flung into the air in a collision between two huge waves at the notorious Atlantic coast spot.
  
  We have an update on Alex Botelho's condition. We're happy to report that Alex remains stable. He is currently in the hospital under close observation for the next 48/72 hours. We are all wishing Alex a full and quick recovery.pic.twitter.com/8tlQ9Y1Ce5
  
  The surfers and their jet-ski were engulfed by a wall of breaking whitewater and tossed violently towards the shore before rescuers were able to retrieve Botelho, who appeared to be unconscious and was floating face down in the sea.
  
  He was placed on a backboard and rushed to hospital as shocked onlookers and surfing fans around the world watched what the World Surf League (WSL) deemed a “very serious incident.”
  
  “Currently, he is stable and conscious. He will stay at the hospital for further evaluation,” said a statement Tuesday for WSL, which runs the professional surfing circuit and is the organizer of the Nazaré Tow Surfing Challenge.
  
  An update on Botelho’s condition released Wednesday said: “Alex remains stable. He is currently in the hospital under close observation for the next 48/72 hours.”
  
