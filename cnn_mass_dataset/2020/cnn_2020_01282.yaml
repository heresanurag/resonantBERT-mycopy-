  Nazaré is a notorious hunting groundfor big wave surfers with storms out in the Atlantic creating huge breakers.
  
  Big wave surfers wrestle with death to feed addiction thrill
  
  In 2017,Brazilian surfer Rodrigo Koxabroke the world record for the biggest wave surfed, after riding a wave measuring 80 feet (24.38 meters) tall.
  
  Koxa’s record beat the previous mark of 78 feet (23.77 meters) surfed in 2011 by HawaiianGarrett McNamara, also in Nazaré.
  
  The incident with Botelho has renewed calls for the WSL to consider removing big wave locations like Nazaré from the league’s calendar.
  
  Carve Surfing Magazineposted on Twitter: “we have to ask when is enough enough and we have to watch someone die live on TV before [World Surfing League] draws a few lines in the sand.”
  
  Fellow surferNic von Rupptook to Instagram to voice his thoughts, saying: “Today I was confronted with the reality of our sport, heartbreaking watching my brother [Alex Botelho] between life and death right in front of the eyes of the world.
  
  “Honestly, very few would have survived, just a beast of a human like Alex to pull thru.. not only because the strong human he is, but mostly for the love many people have for him praying to pull thru.
  
  “Love you brother, to many more sessions!!! Best recovery to you guys @hugovau @alex_botelho.”
