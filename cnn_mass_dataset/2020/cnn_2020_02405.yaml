title: "Newly discovered Triassic lizard could float underwater to pick off prey"
date: "2020-10-28"
section: "World"
url: "https://www.cnn.com/2020/10/28/world/triassic-marine-reptile-intl-scli-scn/index.html"
content: |
  Scientists have discovered a new lizard-like speciesthat lurked in shallow water to pick off its prey – with the help of a short, flat tail used as a float.
  
  Some 240 million years ago, the Triassic predator Brevicaudosaurus jiyangshanensis skulked, nearlymotionless, in the sea – and researchers found clues in its skeleton that could explain its unusual hunting methods.
  
  Scientists at the Chinese Academy of Scientists in Beijing and Canadian Museum of Naturein Ottawa studied two skeletons discovered in a thin layer of limestone in two quarries in southwest China. The most complete skeleton, measuring just under 60 centimeters long, was found in a quarry in Jiangshan.
  
  Experts identified the 240 million-year-old remains as a previously unknown species of nothosaurs: small-headed marine reptiles with fangs, flipper-like limbs and a long neck. Usually, nothosaurs had a longer tail, which experts think was used for propulsion – but the newly discovered reptile had a short and flat tail.
  
