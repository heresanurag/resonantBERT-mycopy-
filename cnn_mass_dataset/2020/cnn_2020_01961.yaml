title: "American Music Awards 2020: See who won"
date: "2020-11-22"
section: "Entertainment"
url: "https://www.cnn.com/2020/11/22/entertainment/2020-amas-winners-list/index.html"
content: |
  TheAmerican Music Awardsaired live Sunday night and some of the biggest names in music took home awards.
  
  Taraji P. Henson hosted the show from The Microsoft Theater in Los Angeles and with Covid-19 protocols in place, the show had multiple live performances, in person presenters and even a small audience.
  
  The Weeknd and Roddy Ricch led going into the event with eight nominations each.Justin Bieber and Shawn Mendes opened the showwith their new single, “Monster.” Bieber also performed two of his hit singles, “Lonely” and “Holy.”
  
  Katy Perry took the stage for the first time since becoming a mom and performed “Only Love” with Darius Rucker.Megan Thee Stallionalso had a standout performance.
  
  Doja Cat won new artist of the year and Becky G won favorite female Latin artist, a brand new category at the AMAs.
  
  Artist of the year, the top prize of the night, went to Taylor Swift. Swift said she was unable to accept the award in person because she was busy rerecording her early music catalog, whichwas recently sold.Swift also wonmusic video of the yearand favorite female pop artist. She holds the record for most AMA career wins by a single artist with 32.
  
  A full list of nominees follows below with winners indicated in bold.
  
