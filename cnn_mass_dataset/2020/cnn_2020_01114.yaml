id: cnn_2020_01114
title: "Trump and Rouhani trade warnings after killing of top general"
date: "2020-01-04"
section: "Middle East"
url: "https://www.cnn.com/2020/01/04/middleeast/qasem-soleimani-airstrike-saturday/index.html"
content: |
  Iranian President Hassan Rouhani said Saturday the United States committed a “grave mistake” inkilling Iranian commander Qasem Soleimaniand US President Donald Trump responded on Twitter, writing that if Tehran attacks American assets, the US will strike “very hard and very fast.”
  
  The US hasa list of 52 Iranian targets, Trump tweeted. The number was chosen to match the number of hostages taken in the 1979 takeover of the US Embassy, he said.
  
  Rouhani said earlier Americans would face consequences for killing Soleimani “not only today, but also in the coming years.”
  
  Rouhani’s remarks came on the same day mourners in neighboring Iraq had chanted “Death to America” at a funeral procession for Soleimani and an Iraqi militia leader who died with him in a US airstrike in Iraq early Friday.
  
  Crowds gather in Baghdad to mourn military leaders killed by US airstrike
  
  “The Americans did not understand what grave mistake they committed,” Rouhani said while visiting the house of Soleimani’s family in Tehran, according to a statement his office released.
  
  Iranian Foreign Minister Javad Zarif seemed to suggest a goal of any Iranian retaliation,tweeting Saturday: “End of US malign presence in West Asia has begun.”
  
  In a phone conversation with Turkish President Recep Tayyip Erdogan, Rouhani said Iran’s neighbors in the region should work in unison against the US presence there or the whole area will be in jeopardy, Iranian state news agency IRNA reported.
  
  The strike killedSoleimaniat Baghdad International Airport, along with Abu Mahdi al-Muhandis, deputy head of the Iran-backed Iraqi Popular Mobilization Forces. At least six people were killed in the strike, an Iraqi security source told CNN on condition of anonymity.
  
  Maj. Gen. Ismail Qaani, who served for years alongside Soleimani, has been appointed his replacement.
  
  It marks a major escalation in regional tensions that have pitted Tehran against Washington and its allies in the Middle East.
  
  Trump on Fridaysaid he ordered the deathof Soleimani, one of Iran’s most powerful men, tostop a war, not start one, as tensions between the two nations were already escalating.
  
  Trump administration privately warns Congress Iran could retaliate against US 'within weeks'
  
  Trump said Soleimani was plotting “imminent and sinister attacks” on Americans.
  
  The Pentagon blamed Soleimani and Iran-backed Iraqi militias for recent assaults on coalition bases in Iraq, including aDecember 27strike that killed an American civilian contractor and wounded several US and Iraqi military personnel.
  
  After retaliatory US airstrikes against the militias last month, hundreds of protesters stormed theUS Embassy compound in Baghdadon December 31, an attack the US blamed on Soleimani.
  
  Soleimaniwas the head of Quds Force, anIslamic Revolutionary Guard Corpsunit in charge of foreign operations, and he became the architect of Tehran’s proxy conflicts in the Middle East. The Pentagon blamed Soleimani for hundreds of deaths of Americans and their allies over the years.
  
  Rockets hit parts of Baghdad on Saturday, including the parade grounds in Baghdad’s fortified Green Zone and the Al-Jadriya area just south of the Green Zone, injuring no one, the Iraqi army said. The Green Zone contains Parliament, ministries and foreign embassies.
  
  Rockets targeted Balad Air Base, which houses US and Iraqi forces and contractors, the Iraqi army said. No injuries were reported.
  
  Separately, an Iraqi civilian contractor there told CNN that four rockets landed outside the base’s southern gate.
  
  It wasn’t immediately clear who fired the rockets. It’snot uncommonfor rockets to be fired at US positions in Iraq.
  
  During Rouhani’s visit with Soleimani’s family Saturday, Soleimani’s daughter asked him: “Who will take revenge for my father?”
  
  Who was Qasem Soleimani, the Iranian commander killed by a US airstrike?
  
  “Everyone will take revenge,” he replied, in video aired by Iranian state television.
  
  In a letter to the United Nations, Iran described the attack as state terrorism and an unlawful criminal act.  European officials and the UN have called for de-escalation.
  
  It was “tantamount to opening a war,” Majid Takht Ravanchi, Iran’s ambassador to the UN, told CNN’s “Erin Burnett OutFront” on Friday. He said the strike had escalated a war that started whenthe US pulled out of a nuclear dealwith Tehran in 2018.
  
  Some Democratic lawmakers have said theyweren’t yet convinced the strike was merited. Sen. Chris Van Hollen, a Maryland Democrat, said Friday one of his representatives attended a classified briefing, and “nothing that came out of the briefing changed my view that this was an unnecessary escalation of the situation in Iraq and Iran.”
  
  He said the strike will increase threats to US interests.
  
  Who are the Islamic Revolutionary Guard Corps?
  
  “Today the administration announced we’re sending 3,000 more troops to the region,” he said. “So, clearly the administration recognizes that this action has actually dramatically increased the risks in the Middle East, increased the risks of an attack from Iran.”
  
  The Trump administrationhas warned members of Congressthat Iran is expected to retaliate against the US within weeks for the strike. Authorities in the United States are increasing vigilance andfortifying defenses.
  
  Acting Homeland Security Secretary Chad Wolf issued a new National Terrorism Advisory System bulletin. “Iran maintains a robust cyber program and can execute cyberattacks against the United States,” according to the bulletin, which expires January 18.
  
  Wolf maintained in a statement that there is “no specific, credible threat against the homeland.”
  
  In Iraq’s capital on Saturday, thousands of people attended a funeral procession, mourning Soleimani and al-Muhandis as they chanted “Death to America.”
  
  Mourners wept as they walked alongside the vehicle carrying his coffin down the streets of Baghdad. Some carried signs that read, “We are all Muhandis and Soleimani.”
  
  Iraqi Prime Minister Adil Abdul Mahdi was among the crowd of mourners walking next to the cars carrying the coffins.
  
  Some women carrying flags of the Iraqi Popular Mobilization Forces erupted into tears when the slain commanders were mentioned. Many mourners said the attack strengthened their resolve to expel US forces from Iraq.
  
  How Trump's decision unfolded to kill a top Iranian general
  
  “This strike killed our heroes, but it created a thousand more Hajji Soleimanis and Muhandises,” said Assifa Abbas, 50, a mother of three PMF fighters. “If Parliament doesn’t vote to expel US troops, they will see the true face of the Iraqi street.”
  
  Abbas walked in the procession with an image of al-Muhandis and Soleimani taped on her black chador. She said she would refuse to allow her sons back into her house until they pushed the “last American” from Iraq.
  
  Former Parliament member Fawzi Akram, from Iraq’s Turkmen ethnic minority, predicted the attack would end US dominance in the country. “The map of a new Iraq will be drawn with the blood of these martyrs,” Akram said.
  
  Mourner Mohammad al-Fadli said the killings came as an “indescribable shock.” “These are the people who got rid of ISIS for us,” al-Fadli said.
  
  The PMF – Shia militiafirst mobilized in 2013 to confront the advance of ISIS– were key ground forces in the early days of an offensive to push ISIS out Iraq, eventually recapturing several towns from the extremist group. Soleimani was reported to be on the ground directing battles against ISIS in Iraq, as well as Syria.
  
  In another part of Baghdad, some anti-government demonstrators have been demanding, among other things, an end to heavy-handed Iranian influence in Iraq. But many haven’t been happy about the US strike.
  
  Since the anti-corruption protests began in October, Iraqi security forces have tried to violently quash them, killing hundreds of demonstrators and wounding many more.
  
  Still, people at Baghdad’s main protest site, Tahrir Square, said Saturday that the US should not have conducted an attack on their soil.
  
  “We are the people of Iraq. We don’t want outsiders to rule us,” protester Muthana Salman said.
