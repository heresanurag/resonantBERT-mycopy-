title: "Trump has had the power to address medical supply shortages. Why hasn’t he used it more?"
date: "2020-04-06"
section: "Opinion"
url: "https://www.cnn.com/2020/04/06/opinions/trump-power-medical-shortage-dpa-opinion-honig/index.html"
content: |
  Editor’s Note:In this weekly column “Cross Exam,” Elie Honig, a CNN legal analyst and former federal and state prosecutor, gives his take on the latest legal news. Post your questions below. The views expressed in this commentary are his own. Viewmore opinionon CNN. Watch Honig answer readers’ questions on “CNN Newsroom with Ana Cabrera” at 5:40 p.m. ET Sundays.
  
  Under theDefense Production Act (DPA), President Donald Trump holds enormous power to put essential lifesaving equipment into the hands of medical professionals on the front lines of the coronavirus crisis. Trump typically exercisesexecutive poweraggressively but thus far he has taken a tepid, confused approach to the DPA, at the potential cost of human life.
  
  The house is on fire, the law has handed Trump a hose and he’s using it to water the flowers.
  
  The DPA gives the Presidentauthority not only to order private companies to produce and expedite production of certain essential items – in this case, ventilators, masks and other essential medical resources – but also to allocate such materials. This allocation power means the President can, if he so chooses, order that a specific quantity of goods be made available to a certain buyer. For example, the President can purchase 1,000 ventilators from a private company and then allocate 600 of them to State A, 300 to State B and 100 to State C, all at set prices.
  
  On March 18, Trump said that he would invoke the DPA – likening himself to “a wartime president” – and issued a broad order mentioning the act but not directly ordering production of any specific equipment under the law.
  
  A few days later,on March 22, Trump expressed hesitancy about using the DPA: “You know, we’re a country not based on nationalizing our business. Call a person over in Venezuela, ask them how did nationalization of their businesses work out?  Not too well.” (This mischaracterizes the DPA; the law does not permit the government to take over or “nationalize” private industry, but rather to order, expedite and pay private industry for essential goods, and has done so in the past on numerous occasions.)
  
  But as the crisis escalated, Trump quickly changed his tune, talking big about his intention to use the staggering legal power granted to him by the DPA. He claimed on March 24 that the act was “in full force,” but he didn’t have to use it because companies were already doing what he wanted.  He then seemed to reference the act by bizarrely tweeting “invoke P.”
  
  Since then, the administration has used the DPA, though – inexplicably – sparingly.
  
  It has ordered two private companies,3MandGeneral Motors, to manufacture ventilators (without specifying publicly how many, on what timetable and at what price), and 3M has agreed to manufacture 55 million protective masks – according to Trump, under threat of a potential order under the DPA. The administration also has ordered the Department of Health and Human Services to help six other manufacturers get the materials necessary for production (again, without specifics). In the context of the entire industrial might of the United States, these orders are relatively limited.
  
  The Supreme Court didn't need to make this decision
  
  Trump also has issued an orderallocating vital equipment for domestic purposes generally. This is a good start, as it ensures that crucial supplies will not be shipped out of the United States. But it does not go nearly far enough. Throughout the pandemic,governors and other officialshave called on the President to exercise his allocation power far more aggressively within and among the United States.
  
  They argue that allocation will prevent bidding wars between states, keeping costs lower to states seeking to purchase vital lifesaving equipment (at the expense of corporate profits).  And by allocating scarce but essential goods, the President can ensure optimal distribution to the states most in need. Simply put: If one state has excess ventilators while another state runs short, then people will die, unnecessarily.
  
  With the stroke of a pen, Trump has the power to get crucial lifesaving equipment to the states and medical professionals who need it most. He has talked much about the DPA but has deployed it meagerly and ineffectively. That continuing failure is simply inexcusable as the death toll mounts.
  
  Mike (South Carolina): Are quarantine and stay-home orders issued by state governors legally binding? Don’t Americans have a constitutional right to travel freely?
  
  Quarantine and stay-home orders issued by state governors absolutely are legally binding – and enforceable.
  
  The Constitution does not explicitly contain the phrase “right to travel,” but several of its provisions, taken together, do form a latticework of rights relating to free movement: the general right, recognized by theSupreme Court, of citizens to move freely between states; thePrivileges and Immunities Clause, which ensures that citizens of one state have the same legal rights when visiting or located in another state; and theDue Process clause, which prohibits the federal government from interfering with the liberty of citizens to move between states without due process of law.
  
  But the right to travel is not absolute, and it can be limited when necessary to protect the general welfare.  Indeed,every state has lawsempowering the governor, or other official, to limit the movement of people through a quarantine or other similar order.
  
  Violations of such orders are punishable by fines or, in some states, by potential criminal prosecution. While police appropriately regard arrests generally as alast resort of enforcement, in some cases authoritieshave arrested peoplewho have violated quarantine or other similar orders.
  
  Amy (Delaware): Should prosecutors and other officials consider releasing certain prisoners in light of the health risks posed by coronavirus?
  
  Yes, prosecutors can and should consider early release for certain categories of low-risk inmates.
  
  It is difficult to think of a location more susceptible to the spread of disease than a jail.
  
  David Patton, the head the federal public defender’s office in New York City, called jails in the age of coronavirus a “disaster waiting to happen.” Indeed, many jails are crowded or overcrowded and offer sub-par health services. Coronavirus threatens to spread not only among inmates, but also to guards and staff who return home after their shifts.
  
  Given this reality, several states – includingNew York,New Jersey,OhioandCalifornia– have begun to release certain inmates early with the goal of reducing overcrowding and potential spread of the virus.  While the specifics vary state to state, generally states have focused on releasing nonviolent offenders, pre-trial detainees who have not yet been tried or convicted and elderly inmates. TheJustice Departmenthas said it is considering its options, including potentially expanding home confinement, but has not yet adopted an early-release program.
  
  1. Will the administration use the Defense Production Act more aggressively to ensure the manufacture and optimal distribution of ventilators and other essential goods?
  
  2. Will more states and the Justice Department release certain nonviolent inmates early?
  
  3. How long will theSupreme Courtstay out of session, and will it adopt available technology to continue functioning?
