title: "East Wing maintains social distancing vigilance"
date: "2020-05-11"
section: "Politics"
url: "https://www.cnn.com/2020/05/11/politics/melania-trump-face-mask-protocols/index.html"
content: |
  While the West Wing is grappling with implementing procedures in the wake of two staffers testing positive forcoronavirusin recent days, in the East Wing and the Executive Residence, first ladyMelania Trumphas been more vigilant inpracticing social distancing or wearing a maskand requiring staff to do the same.
  
  The first lady increased coronavirus prevention methods to include mandatory masks in the East Wing and in the residence in early April, according to her chief of staff, Stephanie Grisham.
  
  If Trump finds herself in a situation where she is with someone in the White House who cannot social distance or wear a mask, that person is tested before she makes contact within six feet.
  
  “She has strictly abided by the face covering and distancing protocols because she is the one who set them in place for the residence and East Wing,” a White House official told CNN.
  
  One exception, however, was the World War II memorial event with President Donald Trump and elderly veterans which the first lady attended last week. A White House official with knowledge of the event, told CNN the first lady inquired before the event about ensuring social distancing was maintained, but the President and the first lady both opted not to wear masks and there were times when they were closer than six feet to the veterans.
  
  Melania Trump encourages face mask use with photo of herself
  
  In the 132-room White House, cloth face coverings are now worn by all residence staff, at all times, the official said.
  
  Melania Trump scaled back on residence staff in mid-March, as the pandemic spread throughout the country, requiring the handful of the approximately 90 full-time staffers who remained at work for the Trump family to social distance and have their temperatures checked upon entry to the White House campus.
  
  Any non-essential staff – from the White House social secretary to in-house florists and calligraphers, multiple support staff in the kitchen and housekeeping teams, and several of the regular six butlers and eight ushers – were told by the first lady to stay home and work only on an on-call basis.
  
  Those who remain to assist in the upkeep of the 132-room, 55,000 square foot White House, must adhere to the rules about face masks, and have been tested at an increasing frequency. This goes for the 12 staffers who work directly for the first lady in her suite of offices on the second floor of the East Wing.
  
  “We are all teleworking, and if I do have to go in to the East Wing, I get tested,” Grisham said.
  
  Trump was the first administration member, and Trump family member, to release a photo of herself via social media wearing a face covering, on April 9. The image accompanied a video about updated US Centers for Disease Control and Prevention guidelines urging face coverings.
  
  Karen Pence has also maintained a different standard than her husband for staff during the pandemic. Her team of seven members have been teleworking since March 17, according to the second lady’s communications director Kara Brooks.
  
  Two additional staff members at the Pence’s One Observatory Circle residence, the residence manager and deputy manager, were also asked by Pence to telework on March 17, Brooks said. The second lady has offices for her staff in the Eisenhower Executive Office Building, as well as a smaller office space for staff at the vice president’s residence.
