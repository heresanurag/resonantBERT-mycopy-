title: "David Blaine successfully flies over the Arizona desert holding onto helium balloons"
date: "2020-09-02"
section: "US"
url: "https://www.cnn.com/2020/09/02/us/david-blaine-helium-balloons-stunt-trnd/index.html"
content: |
  David Blaine just managed to do what so many can only dream of – flying up into the air using a bunch of balloons.
  
  The illusionist floated over the Arizona desert on Wednesday by holding onto about 50 helium balloons.
  
  The latest stunt, titled “Ascension,” is his most ambitious feat yet.
  
  “Every single stunt that I’ve ever done is about endurance and pushing past what I thought would be possible,” Blaine said in a videobefore the performance. “I can’t imagine that many people would dream of doing it.”
  
  He began his ascent on Wednesday morning, and the performance took about an hour from lift off to landing. The event was live streamed on YouTube.
  
  Though his initial goal was to reach an altitude ofabout 18,000 feet, he ended up floating 24,900 feet – or about 4.7 miles – before skydiving and parachuting back to the ground.
  
  “Wow!” he exclaimed as he landed. “That was awesome!”
  
