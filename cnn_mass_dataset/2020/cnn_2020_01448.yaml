title: "Gwen Stefani and Blake Shelton are engaged: ‘Yes please!’"
date: "2020-10-27"
section: "Entertainment"
url: "https://www.cnn.com/2020/10/27/entertainment/gwen-stefani-blake-shelton-engaged-trnd/index.html"
content: |
  Blake Shelton popped the questionto girlfriendGwen Stefani and she said yes.
  
  The couple took toInstagramon Tuesday with a picture of Stefani sporting a new ring, with the caption “@blakeshelton yes please!” Shelton shared the same post and captioned it, “Hey @gwenstefani thanks for saving my 2020… And the rest of my life. I love you. I heard a YES!”
  
  The two coaches on “The Voice”met on the setof the singing show in 2015, and their friendship soon turned into a partnership.
  
  The singers have collaborated together throughout their relationship. Shelton’s track “Turnin’ Me On” is about Stefani, and Stefani’s 2016 song, “Make Me Love You” is about Shelton. They have performed together multiple times and have duets “Go Ahead and Break My Heart,” off of Shelton’s 2016 album, “If I’m Honest” and “You Make It Feel Like Christmas” together.
  
  Last week, the couple won a CMT Music Award for their “Nobody But You” collaboration.
  
  Stefani shares three children, Kingston, Zuma and Apollo with her ex-husband Gavin Rossdale. Shelton and his ex-wife Miranda Lambert finalized their divorce in 2015.
