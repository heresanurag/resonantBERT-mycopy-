title: "CNN’s My Election: Personalize your election night experience"
date: "2020-11-01"
section: "Politics"
url: "https://www.cnn.com/2020/11/01/politics/follow-cnn-election-coverage-my-election-tool/index.html"
content: |
  On November 3, Americans will choose a president, senators, representatives, governors, and a host of local officials. To help you follow the races that are most important to you and your community, we developed a tool calledMy Election.
  
  My Election allows you to select races to follow prior to election night. When results begin to come in on November 3, the races you’ve selected will be conveniently available in theMy Election drawer, which can be opened anywhere inCNN’s Election Center.
  
  1. Go to theCNN Election Centerand openMy Election.
  
  2. Create or sign in to your CNN account so you can save races you follow.Learn moreabout data privacy.
  
  3. Search for a race by typing a candidate’s name, a state, or a type of race such as “president”, “senate”, or “house.” Then, click “Follow” to save that race.
  
  4. On election night you’ll be able to discover and follow races from all over CNN’s website andElection Center.
  
  5. Once results begin to come in, your saved races will automatically update.
  
  6. Not sure which races to follow? CNN Collections offer suggestions from CNN’s top political anchors, analysts and contributors. Select “Follow” to instantly add that collection’s races to your list of favorites with one click. We’ll automatically ignore any races that you’ve already followed.
  
  Not sure what races to follow? We’ve asked CNN’s top political anchors, analysts and contributors to recommend the races they think are most important to watch. We’ve grouped their recommendations into CNN Collections – lists of races that you can add to your favorites with one click.You can find the races they will be watching below.
  
  What kinds of races can I follow?
  
  You can follow any state’s presidential, Senate, House, or governor races.
  
  How do I add races to My Election?
  
  There are several ways to discover and follow races:
  
  How do I remove races from My Election?
  
  Once you’ve followed a race, the “Follow” button will change to say “Following”. Clicking this button again, or tapping it on mobile devices, will remove the race from your list.
  
  Does My Election work on mobile devices?
  
  Absolutely! You’ll be able to follow races and collections on your mobile device, and accessMy Electionon your mobile phone using a smaller button in the lower right corner of the screen anywhere inCNN’s Election Center.
  
  Why do I need to create a CNN account in order to use My Election?
  
  Your CNN account allows us to both save the races you follow, and show those races inMy Electionfrom any browser or mobile device into which you’ve signed in with your CNN credentials.
  
