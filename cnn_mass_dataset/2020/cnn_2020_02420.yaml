  Among the cases heard in earlier arguments during this 2019-2020 term and still awaiting resolution involve whether federal law protects LGBTQ workers from discrimination, whether Louisiana abortion regulations infringe a woman’s constitutional right to end a pregnancy, and whether the Trump administration’s plan to deport certain undocumented immigrants who came to the US as children can proceed.
  
  Now it appears that those earlier cases and the new select slate, including the Trump controversies, would be decided by summer.
