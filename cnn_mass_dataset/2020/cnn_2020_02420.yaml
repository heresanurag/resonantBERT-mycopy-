  “This is good for public education. It’s good for the court coming into the 21st century,” said Barbara Perry, a longtime Supreme Court expert at the University of Virginia’s Miller Center.
  
  Perry wondered whether the justices might be against regular livestreaming when the country returns to regular ways.
  
  “Could it be the tip of the camel’s nose under the red velvet curtains? … I’d say probably not,” Perry said, adding that televised hearings are unlikely to come in the near future.
  
  Among the controversies to be heard in May are two Trump challenges to US House subpoenas for financial documents from his longtime accounting and banking firms. That pair and a third case that will be heard, arising from a New York grand jury’s investigation tied to Trump tax records, had been scheduled for March 31.
  
  Lee Arbetman, executive director of Street Law, which helps high school teachers develop materials about the court, said airing the Trump-US House document dispute would enhance civic awareness.
  
  “There’s a potential for a greater understanding of democracy, on the checks and balances of government,” he said. “But does one oral argument an educated citizen make?”
  
  For lawyers, justices, and the public, the hour-long public sessions are an important but not crucial part of the decision-making process. Lawyers put their most comprehensive arguments in written briefs. But the oral arguments allow lawyers to address tough questions about their cases and give the justices themselves an opportunity to telegraph their views and begin persuading each other.
  
  The justices have often expressed concerns that listeners would get the wrong impression from arguments, for example, if they play “devil’s advocate” in their questions or focus on a relatively minor issue for clarity. Some justices try not to tip their hand or, perhaps, are truly uncertain about which side they favor before the case is put to a vote in their private meetings.
  
  Still, the sessions are invaluable to the public. The arguments provide the only opportunity to see all the justices wrestling with the case, in the open, and to witness their personal predilections and interactions. Spectators visit the courtroom, especially, to see a newly appointed justice, such asBrett Kavanaughin 2018, or to watch an enduring icon, such asRuth Bader Ginsburg, “The Notorious RBG.”
  
  Arbetman and other educators said the value of Monday’s development would rest in livestreaming becoming the rule rather than the exception and in eventual televising.
  
  Until Monday, some 20 cases were in a suspended state, delayed but with no signal from the justices of whether they would resolve them before the court’s usual end-of-June recess. The justices said they will hear a designated 10 cases in the first two weeks of May and the rest of the cases in early fall. It is not known whether that latter group, which could be aired in the courtroom, would be livestreamed.
  
  Many state courts already televise their proceedings, and plenty of state and lower US courts have already opened up teleconferences to the public during the pandemic.
  
  On Saturday, the Kansas Supreme Court allowed the public to watch a Zoom argument session of judges questioning lawyers in a controversy over the governor’s ban on public gatherings, including for religious observances. (The court upheld the governor’s order.)
  
  The justices’ initial moves to handle the pandemic were ambiguous. They issued orders regarding the allotment of argument time between parties but left open when those cases would actually be heard. Until Monday, lawyers, who continued to prepare filings and cautiously try to be ready for arguments, had not received any formal word about alternative methods for airing the March and April disputes.
  
  For some of the pending March and April cases, there appeared more urgency. One dispute, relevant to the upcoming presidential election, tests whether states mayfine or remove Electoral Collegedelegates who refuse to cast their ballots for candidates to whom they were pledged. That will be heard in May.
  
  And lawyers for the US House have been seeking clarity on their power to compel information from the President and scrutinize the White House. Lower court judges upheld the House subpoenas issued to Trump’s accountants and banks. But the high court in December had accepted the Trump appeal of the disputes.
  
  The earlier high court postponement increased the likelihood that Trump would not be forced to turn over personal business documents before the November election and cast doubt on the investigative authority of the House of Representatives.
  
