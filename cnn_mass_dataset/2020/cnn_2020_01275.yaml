title: "13 St. Louis Cardinals players and staff tested positive for Covid-19, MLB says"
date: "2020-08-03"
section: "US"
url: "https://www.cnn.com/2020/08/03/us/mlb-st-louis-cardinals-coronavirus/index.html"
content: |
  Seven St. Louis Cardinals players and six team staffers have tested positive for Covid-19 in the past week, Major League Baseball announced Monday.
  
  As a result of the positive tests, the Cardinals’ four-game series against the Detroit Tigers, set for Tuesday to Thursday, has been postponed. The Cardinals have been in quarantine since last Thursday and will stay in Milwaukee, and their personnel will continue to be tested daily, MLB said.
  
  The outbreak among Cardinals’ players and staff raisesfurther questions about MLB’s plans to safely hold the seasonamid the coronavirus pandemic. Last week, 21 players and staff on theMiami Marlins tested positivefor coronavirus, and the Philadelphia Phillies have also had several positive tests.
  
  Commissioner Rob Manfred warned union leader Tony Clark in a Friday call that if the league and players don’t do a better job of following Covid-19 protocols and managing the virus, Manfred could shut down the shortened season,ESPN reported.
  
  Baseball commissioner warns he might end season if coronavirus isn't managed better, ESPN reports
  
  MLB is tentatively planning for the Cardinals to resume their season August 7 against the Chicago Cubs.
  
  The league’s extensive protocols for holding the season includedbanning high-fives and spittingby players and keeping fans out of stadiums. But teams are still traveling the country to play games in empty stadiums and are not isolated from the general American public.
  
  In contrast, theNHL, NBA and WNBA have restartedtheir leagues without positive tests by holding all games in “bubbles,” where players are consistently tested, are required to masks and remain apart from the public.
  
  Manfredhas saidthat holding the baseball season in a “bubble” would not have worked because MLB has large teams and wants to hold a 60-game season.
  
  “The duration would have been much longer, and the longer you go, the more people you have, the less likely it is that you can make the bubble work,” he said.
