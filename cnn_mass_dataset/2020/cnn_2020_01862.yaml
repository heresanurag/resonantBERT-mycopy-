title: "Walmart unveils $98-a-year subscription service"
date: "2020-09-01"
section: "Business"
url: "https://www.cnn.com/2020/09/01/business/walmart-plus/index.html"
content: |
  Walmart on Tuesday unveiled a subscription service that will go toe-to-toe with Amazon Prime.
  
  The $98-a-year Walmart+ membership plan includes free shipping on items $35 and over, including same-day deliveries oncertain items from stores, such asgroceries. Members will also get 5-cent-per-gallon discounts on gasoline and the ability to scan items with theWalmart appwhile they shop in physical stores (and pay without waiting in a checkout line).
  
  Walmart(WMT)called thenew Walmart(WMT)+ service the “ultimate life hack.” It will replaceDelivery Unlimited, which cost the same amount but was limited to about a quarter of the 4,700 stores that will ship items to Walmart(WMT)+ customers.
  
  Although Walmart+ undercuts Amazon(AMZN)Prime by $21 a year, it lacks many of its rival’s benefits. For example, Prime requires no minimum purchase to qualify for free shipping, and it includes a number of other perks, such as free streaming of music, TV shows and movies and unlimited photo storage. It also gives customers discounts at Whole Foods in addition to free two-hour grocery delivery.
  
  So Walmart has some serious catching up to do. The company said it will add more features to its membership plan over time.
  
  But the key attraction of Walmart+ may be its stores. About90% of Americans live within 10 miles of a Walmart, according to the company. The fact that 2,700 of its stores will ship items on the same day may help it beat Amazon in delivery speeds in many areas, Walmart says.
  
  Walmart+ will begin offering its service to customers September 15.
  
  Walmart’s stock rallied around 2% during early trading. The company’s stock has jumped 16% this year heading into Tuesday
  
  More customers are shopping online for groceries during the pandemic, and some analysts say the new membership program will help Walmart reach these shoppers. Groceries are Walmart’s most important business, making up around 56% of annual sales.
  
  However, consumers are “overloaded” with subscription options, including Amazon Prime, Netflix, and Spotify, and it’s unclear whether they will be willing to pay for a new $98 one, Chuck Grom, analyst at Gordon Haskett Research Advisors, said in a note to clients Tuesday.
  
  “The jury is still out on the ultimate potential of this new offering,” he said.
  
  Walmart last week said it haspartnered with Microsoftto buy video app TikTok. Oliver Chen, analyst at Cowen, said in a report last week that Walmart could market the new service on the app to appeal to TikTok’s younger user base.
