id: cnn_2020_00943
title: "Fact Check: Trump continues to tweet baseless claims of election fraud in swing states"
date: "2020-11-09"
section: "Politics"
url: "https://www.cnn.com/2020/11/09/politics/trump-tweets-swing-state-fraud-fact-check/index.html"
content: |
  In a series of tweets on Monday, President Donald Trump continued to question the legitimacy of the vote count in Pennsylvania, Nevada, Georgia and Wisconsin, four battleground states that have been the subject of much scrutiny this election.
  
  As has been the case with almost everything he’ssaid about the election since last week, none of the claims Trump levied on Monday were true and most were flagged by Twitter as being misleading.
  
  Here are the facts on the situation in each state:
  
  As one of the key states for both parties and one of themost competitiveof this election cycle, Pennsylvania has been the target of many false allegations of fraud.
  
  On Monday, the Presidenttweeted, “Pennsylvania prevented us from watching much of the Ballot count. Unthinkable and illegal in this country.”
  
  Though the content of the tweet is still visible on the President’s Twitter feed, Twitter has since added a warning label to it, noting: “This claim about election fraud is disputed.”
  
  Facts First:There is zero evidence to back up this claim. Local, state and federal officials have not reported any major incidents that could call into question the legitimacy of how poll watchers were treated in Pennsylvania. There have been someinstanceswhere poll workers did not understand the rules and those were handled by the district attorney but registered poll watchers have been allowed at polling places.
  
  After complaints from Trump campaign representatives over observers in Philadelphia, an Election Day judgedecidedthat the city’s board of elections complied with the law in how it allowed observers access to the canvassing process. The law allows the observers to be present, the judgewrote, but they do not have the right to inspect or look over the shoulders of the workers counting the ballots.
  
  Issues involving poll watchers have been at the heart of severalelection-related lawsuitsacross the country, including in Philadelphia where Trump campaign lawyers claimed GOP poll observers were not allowed to watch ballot counting in Philadelphia or weren’t close enough to election workers in the room. But at a court hearing Thursday, Trump’s lawyersadmitted, and a federal judge confirmed, that these allegations were unfounded. City officials also told the judge there were Trump observers in the room.
  
  In his first tweet of the series, Trumpclaimed, “Nevada is turning out to be a cesspool of Fake Votes” and implied shocking revelations in that vein were imminent.
  
  Facts First:The President didn’t provide any specific examples or evidence for this claim.
  
  Republican lawyers havepointedto more than 3,000 individuals “who appear to have violated the law by casting ballots after they moved from NV.” However, elections officials in the state say several of these so-called instances of voter fraud are actually service members who legally voted in Nevada after being transferred to serve elsewhere, the Wall Street Journalreported.
  
  And in two separate lawsuitsfiledlast week, Republican lawyers did not provide any evidence of voter fraud. A judge has already dismissed one of the cases.
  
  Responding to the President’s claim, Jon Ralston, editor of the Nevada Independent,tweeted, “It’s over in NV,” and called Trump’s tweet a lie.
  
  Georgia, a state Joe Biden may flip from red to blue, and one Trump claimedpremature victoryover, also came up in the President’s tweet thread.
  
  “Georgia will be a big presidential win, as it was the night of the Election!” hetweeted.
  
  Facts First:This is another falsehood. Trump did not win Georgia on election night. He was ahead at the time but not all the votes were tallied.
  
  While Bidencurrentlyholds an 11,000-vote lead in the state, CNN has not yet projected a winner in Georgia.
  
  On Friday, Georgia Secretary of State Brad Raffensperger said there would be a recount in the state due to the tight vote margin. As of 4:30 p.m. EST Monday, Biden wasaheadby 0.2% according to CNN’s calculations. If the margin of victory remains within 0.5%, candidates can request a recount after results are certified by the state, which should be by November 20 at the latest.
  
  Perhaps the most puzzling of Trump’s Monday tweets was about Wisconsin. Hewrote, “Wisconsin is looking very good. Needs a little time statutorily. Will happen soon!”
  
  Facts First:While we cannot check predictions about what may happen soon, it’s misleading for Trump to claim Wisconsin is “looking very good” for him. CNNcalledthe state for Biden onNovember 4, noting that a recount would be unlikely to change the final result.
  
  Nevertheless, the Trump campaign iscallingfor a recount in the battleground state. But under Wisconsinlaw, a campaign can’t petition for said recount until the Wisconsin Election Commission completes the canvass from county election boards. As of 6 p.m. EST on Friday, Biden wasleadingby more than 20,500 votes with 99% of ballots counted.
