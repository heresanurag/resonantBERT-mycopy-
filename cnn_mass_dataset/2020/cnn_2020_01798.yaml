  Hawaii has thehighest “insured unemployment rate” in the nation: 20% of workers who were in jobs covered by traditional unemployment benefits were receiving those benefits as of August 22. Hours worked by employees at small businesses were down 50% from March. And as of early September,restaurant reservations in the statewere still down a whopping 98% from March.
  
  As of last week, theBack-to-Normal Indexfor the country overall stood at 80%, showing there’s still a long way to go before the economy is back to “normal.”
  
  Looking ahead, Moody’s Analytics economists say the recovery will continue to depend on how state and local governments act to prevent a resurgence in the virus.
  
  “If a resurgence is strong enough across large parts of the country to incite mitigation efforts like those imposed in March and April, the economy would almost certainly double dip into recession,” DeAntonio and Colyar say. “However, if rising case counts are localized or mitigation efforts are more moderate, as we saw in June and July, then it is possible the economy would avoid a double-dip recession and instead tread water for a longer period of time.”
  
  The Back-to-Normal Index is updated weekly atCNN.com/Recovery.Check back on Fridays to see the latest numbers. You can also learn more about themethodology behind the index here.
