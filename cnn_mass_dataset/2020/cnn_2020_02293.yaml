title: "The alarming reason people aren’t going to drug stores as often"
date: "2020-10-14"
section: "Business"
url: "https://www.cnn.com/2020/10/14/business/drug-stores-retail-cvs-walgreens/index.html"
content: |
  Drug stores likeWalgreens, Rite Aid and CVS have remained open throughout the pandemic for shoppers looking to fill prescriptions andstock upon essential items.
  
  But people aren’t going to such chains as much as they used to— and one of the reasons is alarming to some medical experts.
  
  People have been filling fewer prescriptions in storesduring the pandemic with some doctor’s offices closed, many elective procedures on hold and more shoppers switching to mail order. This has also choked offimpulse purchasesand unplanned items that customers grab when they visit stores to pick up their prescriptions.
  
  That’s squeezing drug store chains like Walgreens(WBA), which reports earnings Thursday, and CVS(CVS). Visits to drug stores fell around 12.8% from the prior year for the four weeks ending on October 4, according to market research firmIRI.
  
  Amazon's stock is getting beat by a warehouse chain this year. And it's not Costco
  
  The number of prescriptions filled in August fell 4% compared with the same period last year, according to the latest data from investment bank Evercore ISI.
  
  Health experts and analysts say prescriptions have fallen because elective procedures were suspended in the early months of the pandemic. Elective procedures often involve prescriptions before or after surgery.
  
  Additionally, some people have been visiting doctors offices and health clinics less often than usual in the pandemic for annual and routine checkups, say experts.
  
  “Volume to primary care practices has decreased,” said Dr. Russell Phillips, director at the Center for Primary Care and a professor of medicine at Harvard Medical School. This has meant fewer people are being diagnosed or treated for health conditions and thus do not need to renew their medications or fill new ones.
  
  Health experts say prescription lapses are worrisome for people with chronic issues such as diabetes, hypertension and heart disease and may have longer term health implications.
  
  For someone with high blood pressure or diabetes, “if you miss those medications and your blood pressure gets too high, it could lead to a heart attack or a stroke,” said Denise Fu, clinical programs manager at the Johns Hopkins Home Care Group, part of the Johns Hopkins Medicine network.
  
  It’s not just the trend of people filling fewer prescriptions that’s hurting drug stores.
  
  Consumers are also limiting their trips to stores because of the coronavirus and buying in bulk more often. Before the coronavirus hit, Americans shopped an average of 4.4 stores each week, according to consulting firmMcKinsey. By late May, that number had dropped to 2.8.
  
  This has hurt drug stores, which carry a smaller variety of products and are designed to be fill-in stops for customers outside of their bigger weekly hauls at grocery stores or warehouse clubs.
  
  It's not just Amazon: Why the pandemic will make Aldi and Dollar General more dominant
  
  “You can’t do a full shop at CVS, Walgreens and Rite Aid,” said Mickey Chadha, analyst at Moody’s.
  
  That means that drug stores haven’t done as well other types of retailers even though sales have increased. For the 31 weeks ending on October 3, sales at drug stores have inched up 2.5% from the same stretch last year, while they have increased 19.9% at grocery stores, according to Nielsen.
  
  Wall Street has taken notice of drug stores’ performance compared to their competitors, driving down shares of CVS(CVS), Walgreens(WBA)and Rite Aid(RAD), the three largest US drug store chains, more than 20% this year.
  
  CVS, Walgreens and Rite Aid are trying to fight back by offering home delivery andcurbside pickupand improving their food selection.
  
  Rite Aid and CVS have partnered with Instacart to offer delivery on prescriptions and other items, while Walgreens has teamed up with DoorDash and Postmates. Walgreens struck a partnership with Kroger for mini“Kroger Express” storesthat offer fresh groceries within around 50 Walgreens locations.
  
  They are also trying to become larger stops for customers’ primary care needs.
  
  Walgreens is planning on opening up to 700 full-service medical clinics in partnership with VillageMD located next to its stores within the next five years. CVS plans to open 1,500“HealthHub” locationsby the end of next year that have on-site dietitians and lab services.
