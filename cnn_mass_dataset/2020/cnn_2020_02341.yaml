title: "Uber wants to sell you bus tickets on your next trip to Vegas"
date: "2020-01-06"
section: "Tech"
url: "https://www.cnn.com/2020/01/06/tech/uber-bus-tickets-ces-las-vegas/index.html"
content: |
  Uber just took one more step toward becoming aone-stop shopfor all our transportation needs.
  
  Uber users in Las Vegas can now buy bus ticketsusing the app. Customers can compare public transportation prices and arrival times with Uber’s service, and then pay for whichever option they prefer, the company announced at this week’sConsumer Electronics Show.The servicewill gradually roll out to users in the coming weeks.
  
  Las Vegas is the second city in which Uber(UBER)is offering the service. Uber(UBER)started selling public transit tickets in Denver last May.
  
  The offering adds an interesting twist to thecomplicated relationshipthat ridesharing companies have with publictransit. Public transportation ridership hasdeclined nationwideas travelers have shifted to the ease and comfort of ridesharing. But as more Uber and Lyft drivers take to the streets, cities have grown more congested, and experts warnthat it’s not sustainable.
  
  Buses and trains are the mostspace efficientways totransport people in cities. And sometimes those modes can be quicker – and much cheaper – than hailing an Uber or Lyft.
  
  “It’s a little bit of a risk on Uber’s part,” David Reich, who leads transit at Uber, told CNN Business. “We’re taking riders who are opening the Uber app planning to take an Uber and saying in some situations, taking public transportation is better.”
  
  Lyft started featuring some public transit information in2018, and made the option more prominent in anapp updatethis fall. It may expand into ticketing like Uber, but hasn’t said when that may happen.
  
  The ridesharing companies say theysee themselves as a complement to public transportation, as they both offer alternatives to car ownership, a cultural norm they hope to end.
  
  “We can’t do it alone,” Reich said. “Public transportation is the backbone of how people move about their cities and for Uber to thrive, public transportation has to thrive.”
  
  Reich said Uber’s ticketing partnerships grew out of conversations with transit officials, and gaining a better understanding of their needs.
  
