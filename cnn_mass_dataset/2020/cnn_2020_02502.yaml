  Several Jewish advocacy groupscame out against Macgregor’s ambassador nomination after it came to light that he dismissed German remembrance of the Holocaust and downplayed the country’s Nazi history.
  
  KFile reviewed additional comments from Macgregor in which he said that US involvement in World War II was a “disaster,” and incorrectly said there was no desire in the US to go to war with Nazi Germany. In 2012,he claimedthere was evidence that conflict with Japan was engineered to end the Great Depression.
  
  “People were not terribly happy about having to fight the second [war]. There was certainly no support for fighting the Germans during the Second World War. There was obviously for fighting the Japanese because Japan made the serious mistake of attacking us, but there was, there was great reluctance to be involved in these wars,” Macgregor said.
  
