title: "California has now sued the Trump administration 100 times"
date: "2020-09-01"
section: "Politics"
url: "https://www.cnn.com/2020/09/01/politics/california-ag-xavier-becerra-sue-donald-trump/index.html"
content: |
  Late last week, the state of California hit an absolutely remarkable milestone: It filed its 100th lawsuit against President Donald Trump and his administration.
  
  Yes, you read that right:100 lawsuits. (By way of comparison, Texas sued the Obama administration48 timesduring his two full terms.)
  
  “I am surprised that any president in any administration would at least 100 times be caught red-handed violating the law,” California Attorney General Xavier Becerra, a Democrat,told the Los Angeles Times of the feat. “I am not surprised we have had to sue, because we have to protect our people, our resources and our values, and we use the rule of law to do that.”
  
  In each episode of his weekly YouTube show, Chris Cillizza will delve a little deeper into the surreal world of politics. Click to subscribe!
  
  And California’s litigation against the Trump administration has actually picked up speed as his first term has progressed. As of May 14, 2019,California hit the 50 lawsuit mark– meaning Becerra has filed another 50 lawsuits over just the last 475(ish) days.
  
  As you might imagine given the sheer number of suits, their contents run the gamut from immigration to the census to gun control to, yes, the US Postal Service. More than half of the lawsuits,according to the LA Times, deal with environmental policies put in place (or removed) by the Trump administration.
  
  This is far from a one-way street. Trump, throughout his presidency, has cast California as the nightmare scenario of what happens to Americans when liberals are given free rein in government.
  
  “In California, Democrats have intentionally implemented rolling blackouts — forcing Americans in the dark,”tweeted Trump in mid-August. “Democrats are unable to keep up with energy demand. Meanwhile, I gave America energy independence in fact, so much energy we could never use it all. The Bernie/Biden/AOC Green New Deal plan would take California’s failed policies to every American!”
  
  And then there wasthis one from December:
  
  “California leads the nation, by far, in both the number of homeless people, and the percentage increase in the homeless population - two terrible stats. Crazy Nancy should focus on that in her very down district, and helping her incompetent governor with the big homeless problem!”
  
  Why so much back-and-forth between the President and Becerra/California? Because it’s good politics forbothsides.
  
  Trump supporters loathe California, viewing it as indicative of liberal government run amok. It reeks of the coastal elitism and nanny government that they view as anti-capitalist. For Becerra, who abandoned his seat in Democratic congressional leadership in 2017 to fill the AG vacancy left by Kamala Harris’ Senate victory, being seen as the lead plaintiff against Trump is a very good thing for his personal politics.
  
  Becerra ismentioned as a possible Senate appointeeif Harris is elected vice president in November and his name is also regularly mentioned in conversations about future governor’s races.
  
  The Point: Because this is good politics for both sides, don’t expect California’s flood of lawsuits – or Trump’s bashing of the Golden State – to slow anytime between now and November 3. At least.
