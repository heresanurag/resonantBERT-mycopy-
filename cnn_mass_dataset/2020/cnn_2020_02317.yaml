title: "Discovering the source of Biden’s empathy on night two"
date: "2020-08-19"
section: "Opinion"
url: "https://www.cnn.com/2020/08/19/opinions/empathy-joe-biden-democratic-national-convention-louis/index.html"
content: |
  Editor’s Note:Errol Louis is the host of “Inside City Hall,” a nightly political show on NY1, a New York all-news channel. The opinions expressed in this commentary are his own. View moreopinion articleson CNN.
  
  Throughout the second night of their national convention, Democrats wisely highlighted Joe Biden’s encounters with personal tragedy. At a time when Americans are reeling from the raw horror of an average of1,000 deaths a dayfrom the coronavirus – and with a president, Donald Trump, who hasdismissedthe death toll with a stoic “it is what it is” – Democrats are showing that Biden would be a president capable of genuine empathy for families shaken and sorrowful in a time of catastrophe.
  
  A biographical video noted that Biden, while still in his twenties, was sworn in as a US senator inside a hospital while still mourning the loss of his first wife and infant daughter in a car accident that also left his young sons with injuries. Multiple speakers referenced Beau Biden, the candidate’s late son, who served as attorney general of Delaware anddiedof a brain tumor in 2015.
  
  His wife, Jill Biden, in her speechsaysthese experiences deeply affected Biden, noting “all those people Joe gives his personal phone number to, at rope lines and events — the ones he talks to for hours after dinner — helping them smile through their loss — letting them know that they aren’t alone.”
  
  She explicitly connected his personal grief to his ability to lead. “How do you make a broken family whole? The same way you make a nation whole,” she said. “With love and understanding — and with small acts of kindness. With bravery. With unwavering faith.”
  
  It’s impossible to imagine anyone offering a comparable assessment of Trump, who in March famously answered a question about the nation’s inability to implement a robust coronavirus testing program with adismissive“I don’t take responsibility at all.”
  
  Opinion: The phrase Trump may wish he didn't use
  
  Biden’s close encounters with personal tragedy make him relatable to countless Americans who are still grappling with the loss of a friend, neighbor, co-worker or family member from Covid-19 during the global pandemic.
  
  The number is vast: Back in May, when The New York Times tried tomemorializesome of the 100,000 people who had died from the coronavirus up to that point, the mini-obituaries of 1,000 people took up pages and pages of the broadsheet newspaper – even though those listed only represented 1% of losses. The death tollnow standsat nearly 172,000, and the number keeps growing.
  
  A big part of the Democratic case against Trump is that he lacks the emotional maturity to comfort the nation in this moment of fear and sorrow. As Michelle Obamaput iton the first night of the convention, “Whenever we look to this White House for some leadership or consolation or any semblance of steadiness, what we get instead is chaos, division and a total and utter lack of empathy.”
  
