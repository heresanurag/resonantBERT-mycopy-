  Democratic strategists are betting that Biden’s ability to connect with people will translate into votes. A June Pew Research Pollfoundthat Biden beats Trump by 13 points on the question of which candidate “cares about the needs of ordinary people.”
  
  In the era of the pandemic, ordinary people are lonely, frightened and grieving. A big part of Biden’s appeal – and a major theme of the convention – is that he can connect with them because he’s been there.
