  _May 11, 2020_
  
  _Creative expression in the time of coronavirus is our first subject on today’s program. And if you have the foggiest idea where the world’s foggiest place might be, you’ll have no trouble with 10-Second Trivia. After a report on fog, we’re taking you lobster fishing in Maine. And we’re making a splash in a “bearbath.”_
  
