title: "With TikTok’s future uncertain, users are jumping to these other apps"
date: "2020-08-04"
section: "Tech"
url: "https://www.cnn.com/2020/08/04/tech/tiktok-alternatives/index.html"
content: |
  The past few days have been anemotional roller coasterfor TikTok fans, with the news shifting from the threat of animpending banto the possibility of an imminent acquisition by Microsoft(MSFT)and back to talk of a ban again if a deal doesn’t materializeon terms agreeable to President Trump.
  
  Against that uncertainty, TikTok creators – many of whom spent years building up a fan base and career on the platform – have started to weigh what comes next.
  
  For some, like 22-year-old Frankie Lagana, the answer is shifting to a more established rival: YouTube. “I’ve seen it work for so many people and friends of mine,” Lagana said about the Google-owned platform. “On TikTok, we’ve now hadtwo threatsof it being deleted. It’s this fear in our hearts, of like ‘This is my career.’”
  
  How TikTok users are reacting to Trump's possible US ban
  
  For others, it’s a mix of big and small platforms. SinceTrump’s comments Friday nightthreatening a ban, Tati Mitch has been scrambling to get her millions of TikTok fans to follow her on other social media platforms, including Instagram, YouTube and even a new upstart called Triller, at the urging of some of her followers.
  
  “Right now, everyone is transferring over from TikTok to Triller,” Mitch said, adding that the app has been glitchy as a result and she’s unsure of how often she’ll use it.
  
  The mad dash to find a new app shows how much the social media landscape could be upended if a ban of TikTok actually goes through in the US. Large companies like Google(GOOG)and Facebook(FB), which have eachborrowed featuresfrom TikTok, could find themselves further entrenched as the dominant players in the digital market. For Facebook(FB), the timing is particularly fortuitous as Instagram is aboutto roll out Reels, its TikTok clone, in the US and 50 other countries.
  
  But the upheaval in the TikTok community also serves as a potentially painful reminder of the risks social media stars, young and old, face in building and maintaining a livelihood that depends largely on one platform.
  
  “There’s now going to be a fire under my butt to work so much harder in creating YouTube videos,” Lagana said. “There’s a difference in having a presence on TikTok compared to having a presence on YouTube. … All these YouTubers they’re actually real-life celebrities. On TikTok, it’s kind of like you’re a TikTok celebrity.”
  
  TikTok has 100 million US users, while YouTube has over 2 billion users globally.
  
