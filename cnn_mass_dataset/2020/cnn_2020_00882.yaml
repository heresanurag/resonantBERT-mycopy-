title: "Lego minifigure creator and ‘unsung hero’ of the toy industry Jens Nygaard Knudsen dies"
date: "2020-02-25"
section: "Business"
url: "https://www.cnn.com/2020/02/25/business/lego-minifigure-creator-dies-scli-intl/index.html"
content: |
  Jens Nygaard Knudsen, creator of theLegominifigure, has passed away at the age of 78.
  
  The former designer was responsible for developing the smallLegofigures before they were released to the public in 1978.
  
  “We’re very sad to hear that Jens Nygaard Knudsen, the creator of the LEGO Minifigure, has passed away,” tweeted Lego.
  
  “Thank you Jens, for your ideas, imagination, and inspiring generations of builders.”
  
  Nygaard Knudsen had amyotrophic lateral sclerosis (ALS) and passed away on February 19 in western Denmark, former colleague Niels Milan Pedersen told the AFP news agency.
  
  We're very sad to hear that Jens Nygaard Knudsen, the creator of the LEGO Minifigure, has passed away. Thank you Jens, for your ideas, imagination, and inspiring generations of builders ❤️pic.twitter.com/7YixYvHtRW
  
  “His imagination was so fantastic. If we had a brainstorm it was more like a brain hurricane, because he had so many ideas,” Milan Pedersen told AFP.
  
  Nygaard Knudsen worked at Lego from 1968 to 2000 and also developed the company’s space and castle sets.
  
  Matthew Ashton, vice president of design at Lego, paid tribute and thanked the “amazing” man who left behind an “incredible” legacy.
  
  “Jens was not only responsible for designing the #LEGO #Minifigure he also drove the development of many early LEGO Product lines including my childhood favorite Classic Space,”tweetedAshton.
  
  “He was truly one of the unsung heroes of the toy industry.”
  
  Ashton added: “Without him, I would have never been inspired to do the things I do today, without him I wouldn’t even have my job today.”
  
  Without him, I would have never been inspired to do the things I do today, without him I wouldn’t even have my job today! What an amazing man, and what an incredible legacy he leaves behind. RIP - Jens Nygaard Knudsen, 25th January 1942 - 19th February 2020.@LEGO_Grouppic.twitter.com/rqLfvkHZHX
  
  Honestly, on reflection it is such an honour that this little piece of toy history is now under the care of myself & the@LEGO_GroupDesign team . I promise as long as my#LEGOcareer lasts, I will protect, care and nuture this little fella/gal! Thank you Jens for#LEGOMinifigurehttps://t.co/Rne9pmLc7H
  
  His widow Marianne Nygaard Knudsen hailed her late husband as a “man of ideas” in an interview with Danish broadcaster TV2, reports AFP.
  
  “The figure was created so that there would be life in the houses,” she said.
  
  “At the time Lego’s houses were empty, but then he drew this man.”
  
  Lego’s chief marketing officer Julia Goldin also extended the company’s “deepest sympathies” to his family.
  
  “Jens spent 32 years with the LEGO Group and made an impact few can match,” she said in a statement to CNN.
  
  “He was a true visionary whose ideas brought joy and inspiration to millions of builders around the world and we thank him for helping to create some of our most loved play themes such as LEGO Castle, LEGO Space and of course, the iconic LEGO minifigure.”
  
  Lego was founded in 1932 by Ole Kirk Kristiansen, according to the privately held company’s website.
  
  The present form of the Lego brick was first released in 1958, and the company is now one of the largest toy manufacturers in the world.
