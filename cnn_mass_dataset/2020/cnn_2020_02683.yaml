title: "Nobel Prize in economics awarded to Paul Milgrom and Robert Wilson for auction theory"
date: "2020-10-12"
section: "Business"
url: "https://www.cnn.com/2020/10/12/business/nobel-prize-economics/index.html"
content: |
  American economists Paul Milgrom and Robert Wilson have been awarded the 2020NobelPrize in economics for their contributions to auction theory, the Royal Swedish Academy of Sciences said on Monday.
  
  Milgrom and Wilson, who are both professors atStanford Universityin California, were recognized for theoretical discoveries that improved how auctions work. According to the Royal Swedish Academy of Sciences, they also designed auction formats for goods and services that are difficult to sell in a traditional way, such as radio frequencies.
  
  “This year’s Laureates in Economic Sciences started out with fundamental theory and later used their results in practical applications, which have spread globally. Their discoveries are of great benefit to society,” Peter Fredriksson, chair of the prize committee, said in a statement.
  
  According to the Royal Swedish Academy of Sciences, the economists invented new formats for auctioning many interrelated objects on behalf of a seller motivated by doing good for society rather than simply achieving the highest price possible.
  
  World Food Programme wins Nobel Peace Prize for fight against 'hunger as a weapon of war'
  
  In 1994, US authorities first used one of their formats to sell bands of radio spectrum. Doing so helped ensure that taxpayers were benefiting from the sale of radio frequencies that were owned by the government but of enormous value to mobile network operators.
  
  The prize for economics is officially known as the Sveriges Riksbank Prize in Economic Sciences. It was established by Sweden’s central bank and has been awarded since 1969 in memory of industrialist Alfred Nobel.
  
  Milgrom and Wilson will share 10 million Swedish kroner ($1.1 million) in prize money.
  
  In 2019, theeconomics prize was awardedto Abhijit Banerjee, Esther Duflo and Michael Kremer for their work to alleviate global poverty. Duflo, a professor at the Massachusetts Institute of Technology, was the youngest person and only the second woman to be awarded the prize.
  
  Last week, theWorld Food Programmewas awarded the 2020 Nobel Peace Prize for its efforts to combat hunger and its “contribution to bettering conditions for peace in conflict-affected areas.”
