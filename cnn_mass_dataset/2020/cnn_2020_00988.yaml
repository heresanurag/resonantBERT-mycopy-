title: "How to vote and to make sure everyone else does too"
date: "2020-10-10"
section: "Opinion"
url: "https://www.cnn.com/2020/10/10/opinions/us-elections-five-steps-voter-turnout-nickerson-rogers/index.html"
content: |
  Editor’s Note:David Nickerson is a professor of political science at Temple University and served as director of experiments for the analytics department of the 2012 Obama reelection campaign. Todd Rogers is a professor of public policy at Harvard University and was the founding executive director of the Analyst Institute, an institute that measures voter engagement tactics for progressive organizations, and currently serves on its board. The views expressed in this commentary are solely their own. Viewmore opinionon CNN.
  
  As behavioral scientists who study how to increase election turnout, we have become quite accustomed to receiving this desperate message from friends and colleagues: “I don’t live in a battleground state. How can I increase turnout?” They badly want to participate in the election, but because their vote may have little influence in determining the outcomes in their home states, they want to help drive turnout where it will make the most difference.
  
  They ask our advice not just because of our experience in politics, but because they know our advice is based on hundreds of randomized controlled experiments that we and others have conducted measuring what actually increases turnout during elections.
  
  Similar to how drug trials work, voter mobilization experiments randomly assign participants to either a treatment group that receives a specific get out the vote message; or, a control group that gets no specific contact from the researchers. Theonly systematic differencebetween the groups is our experimental encouragement to vote (e.g., a door knock). Thus, when we see a difference in turnout between the treatment and control groups, we know that the cause is the specific tactic being studied. This allows us to estimate the effectiveness of individual tactics, likedoor knocks,volunteer phone calls,leafletsandemails.
  
  The voting process is much more complicated in the US than other countries, and more complicated this election than in the past. In most states, voters must first register to vote by acertain deadline. They then have an opportunity to apply to vote by mail — a method of voting expected to be usedmore than everbefore this November. If the application is accepted, voters receive a vote by mail form and must complete, seal, sign and mail it by a certain deadline according to each state’s rules. If they do not decide to vote by mail, they can vote in person at a polling place on Election Day — or even a few days or weeks before, depending on state rules.
  
  This complicated process means there are several stages where even motivated citizens can be derailed. For people who are motivated to get others to the polls, especially in battleground states, here are five ways you can help increase turnout:
  
  1. Make sure you vote yourself.Many people who intend to vote,fail to. Voting early by mail or in-person helps to ensure that nothing prevents you from voting, allows you to correct possible problems with your ballot and will increase your credibility when you encourage other people to vote.
  
  2. If you or people close to you are voting by mail,track the statusof your ballots. To ensure that votes are secret and cast by the intended person, states impose a number of requirements on mailed ballots to be counted. Even experienced voters can run afoul of these rules, especially thesignature requirements, so it is good to check on the status of your ballots. If you discover that your initial submission isn’t accepted,many statesprovide ways to “cure” your ballot and ensure your voice is heard — but they all take time, so vote early.
  
  The three biggest myths about battleground states
  
  3. Nudge family and friends in battleground states.Look over the list of states mostlikely to be pivotalin the presidential election and think about who you know in these states. According to researchers, communication from friendsis more effectivethan strangers at motivating behavior. Not only are you trusted and respected by the people in your network, but someone in a battleground state will be more likely to answer your call or read your text.
  
  4. Volunteer with a national campaign. Advocacy groups and the parties themselves havesophisticated mobilization campaigns. By signing up to volunteer, campaigns will find ways for you to get in touch with the peoplemost likelyto be mobilized in critical states. They will provide you with activities and with tested scripts. The activities may range from postcard writing to texting, from phone calling to door-to-door canvassing. Canvassing tends to beespecially powerful, but be sure to wear a mask and practice social distancing while doing it. The scripts will incorporate messaging insights that we and others have found maximize the impact of your efforts. These includeprompting peopleto make a voting plan,emphasizinghigh expected turnout,underscoringthat people will check in on whether they actually vote, and more.
  
  5. Donate to candidates, campaigns and parties. Campaignsare expensiveto run. Field organizers, who are needed to train and coordinate volunteers, must be paid. Sending mailto encourageturnout requires money. Getting candidates and their staffs to states to conduct rallies requires travel funds.
  
  There are lots of reasons to vote: Changing specific policies, loving or despising one candidate or party, making sure the voices of under-represented people are heard, or honoring and protecting our fragile democracy.  Whatever your reason, please vote, and take the steps described above to make sure others do.
