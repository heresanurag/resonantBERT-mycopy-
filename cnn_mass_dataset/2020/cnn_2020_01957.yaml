id: cnn_2020_01957
title: "Amazon may take over old JCPenneys and Sears to try and speed up deliveries"
date: "2020-08-10"
section: "Business"
url: "https://www.cnn.com/2020/08/10/business/amazon-malls-sears-jcpenney-simon-property/index.html"
content: |
  Amazon may replace closed department stores at struggling malls.
  
  The company is in talks with Simon Property Group(SPG), the largest mall owner in the United States, to convert former or current JCPenney(JCP)and Sears(SHLDQ)stores into distribution hubs to deliver packages, the Wall Street JournalreportedSunday. Both retail chains have filed for bankruptcy (Sears(SHLDQ)has since emerged from Chapter 11) and are closing hundreds of stores. Simon malls have 63 JCPenney(JCP)and 11 Sears(SHLDQ)stores, according to its most recent public filing.
  
  The deal could make sense for both Amazon and Simon as the e-commerce landscape shifts and manytraditional brick-and-mortar storesare in collapse.
  
  Amazon(AMZN)wants more space closer to where customers live as it builds out itsone-day delivery strategy. Malls are typically located closer to highways and residential areas than mammoth warehouses, which would allow Amazon(AMZN)to speed up shipping times to customers.
  
  Mall owners need cash-rich tenants to replace their bankrupt anchor stores. Although Amazon warehouses won’t be attracting much foot traffic, they’ll help to pay the bills.
  
  “It is a win-win for both sides,” said Chris Walton, a former Target(TGT)executive and now CEO of the retail blog Omni Talk. “Simon gets an anchor tenant and Amazon gets a more localized fulfillment center. For Amazon, the deal would also give it “a front row seat into developing the mall infrastructure for the future.”
  
  It isn’t clear how many stores are under consideration for Amazon, and it is possible that the two sides may fail to reach an agreement, the Journal reported, citing people briefed on the matter. Amazon declined to comment to CNN Business. Simon did not respond to a request for comment.
  
  The talks between Amazon and Simon reflect a growing trend in the retail industry of stores and malls turning into warehouses.
  
  “Underperforming retail sites have become an ideal location for last-mile warehouse developers,” real estate research firm CBRE said in areportlast month. “The disruption to the retail sector and the growth of e-commerce will continue to increase the viability” of these conversions.
