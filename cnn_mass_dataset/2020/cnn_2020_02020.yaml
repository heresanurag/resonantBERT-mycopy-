title: "Cameron Boyce’s mom draws attention to epilepsy on Mother’s Day"
date: "2020-05-10"
section: "Health"
url: "https://www.cnn.com/2020/05/10/health/cameron-boyce-mothers-day-trnd/index.html"
content: |
  Libby Boyce penned an emotional letter for Mother’s Day to draw attention to sudden unexpected death in epilepsy(SUDEP), which her son, Disney star Cameron Boyce, died of last year.
  
  Cameron Boyce, who starred in Disney Channel’s “Jessie” from 2011 to 2015, died in his sleep ofSUDEPin July of 2019 at the age of 20.
  
  Cameron Boyce's death 'unexpected,' coroner says
  
  Although he was diagnosed with epilepsy at 17, Libby Boyce said she had never heard of SUDEP prior to her son’s death. But she feels the kinship with other mothers who have lost a child to SUDEP has given her life meaning.
  
  “These past 10 months have been life-changing for me in a way that is beyond words. You can’t compare it to anything because it is a trauma that is dissimilar to anything in the world. It has created a gaping hole that is raw and gut-wrenching,” Libby Boyce wrote in a letter, published Friday byABC’s Good Morning America.
  
  “Mother’s Day is a cherished day for mothers across the nation. For others, it can be a day of reflection for those who have a challenging relationship with their children; or a day of regret for those who never had children; or it can be a day of sheer grief for those who have lost a child.”
  
  The letter, she wrote, was also her way of paying “tribute to all of the SUDEP mom warriors who live with this horrific burden.”
  
  How seizures can kill people with epilepsy in their sleep
  
  Every year, about1 in 1,000people with epilepsy suddenly die.Doctors call these deaths SUDEPfor short, and most occur during or after seizures, which can cause people to stop breathing and can trigger dangerous irregular heart rhythms.
  
  An estimated 3.4 million Americans have epilepsy, according to theUS Centers for Disease Control and Prevention, and those with uncontrolled seizures are at higher risk for unexpected death.
  
  Cameron Boyce's death shines a light on fatal stigma
  
  Libby Boyce said she refuses to believe her son died in vain.
  
  “Epilepsy can be a lethal medical condition, yet very few people think of epilepsy as potentially life-threatening,” she wrote. “It is something that has for far too long been swept under the carpet and I hope that sharing Cameron’s story and the stories of other SUDEP mom warriors will be the catalyst for change.”
  
  Boyce’s family also set upThe Cameron Boyce foundationlast year to raise funds in his memory.
