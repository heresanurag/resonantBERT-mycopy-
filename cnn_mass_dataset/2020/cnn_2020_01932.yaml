title: "Pelosi says infrastructure may have to wait past fourth coronavirus bill"
date: "2020-04-03"
section: "Politics"
url: "https://www.cnn.com/2020/04/03/politics/pelosi-cnbc-infrastructure/index.html"
content: |
  House Speaker Nancy Pelosi said Friday that Democrats could put on hold a host of their infrastructure priorities and instead advance a new stimulus measure that mirrors thehistoric $2.2 trillion stimulus packagePresident Donald Trump signed into law last week.
  
  Her comments signal Democrats’ willingness to collaborate on emergency legislation yet again — even if it doesn’t include some of their key priorities. Congressional Republicans have resisted moving forward with Democratic proposals for a fourthcoronaviruspackage, but the White House is now signaling it could be open to supporting a targeted bill that would extend the emergency provisions enacted in the third response measure.
  
  “We’ve had three bills that have been bipartisan. I think right now we need afourth bipartisan bill. And I think the bill could be very much like the bill we just passed,” Pelosi said during an interview on CNBC. She specified that she would want to see more money for state and local governments, small businesses, more direct payments to individuals, and extensions of some of the other provisions in the recently-enacted $2.2 trillion stimulus bill.
  
  LISTEN: The Coronavirus: Fact vs. Fiction Podcast
  
  “I’m very much in favor of doing some of the things that we need to do to meet the needs of clean water, more broadband, and the rest of that. That may have to be for a bill beyond this,” she said. “Right now, I think that we have a good model. It was bipartisan, it was signed by the President, but it’s not enough.”
  
  A senior administration official indicated the White House is open to this approach.
  
  “POTUS has been clear that if we need to do more from Phase 3, he won’t hesitate to ask, and expects Congress to act,” the official said, adding that the other ideas Pelosi and House Democrats put forward “aren’t relevant to the challenges we face right now.”
  
  The official said the focus now is on “making sure Phase 3 works and being prepared to restock and reload: Phase 3.5.”
  
  Pelosi’s comments came after House Democrats spent much of the weekadvocating for their infrastructure prioritiesto be wrapped into a fourth coronavirus response package, including funding for broadband, water systems, roads, and public transit. Democratic lawmakers gained optimism about the possibility of addressing infrastructure when Trump on Tuesday called for a $2 trillion infrastructure package to boost the economy.
  
  Top congressional Republicans, including Senate Majority Leader Mitch McConnell and House Minority Leader Kevin McCarthy, have not only pushed back on the idea of an ambitious infrastructure effort, but they have also taken issue with the notion that a fourth coronavirus stimulus bill is even needed yet.
  
  On Thursday, McCarthy told reporters that a fourth response measure “is not appropriate at this time.” Republicans say Congress should instead wait and see how the third package plays out before crafting new legislation.
  
  Pelosi on Friday urged quick action on a new stimulus bill, saying lawmakers “don’t need a long time to figure out what we need to do next. … We know, and we have a model.”
