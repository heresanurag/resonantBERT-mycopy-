  Marlett told CNN this is something he saw as routine.
  
  “I would hope it’s something that anybody would have done,” Marlett said. “If you take care of your customers, they take care of you.”
  
  LaFreniere said she got the doorbell mostly for security.
  
  “Since we live in a remote area, our driveway is a half mile long so for delivery people it’s quite the drive to get to our house.”
  
  LaFreniere said she hopes Marlett gets some special recognition from FedEx for his act of kindness.
  
  “Although we see many acts of kindness in the Upper Peninsula, it was still surprising to see that he went the extra step,” she said. “I shared it with my coworkers immediately because I couldn’t believe it. It made my day.”
