title: "This FedEx driver delivered more than a customer’s package. He shoveled snow off the stoop"
date: "2020-01-25"
section: "US"
url: "https://www.cnn.com/2020/01/25/us/michigan-fedex-driver-trnd/index.html"
content: |
  A delivery driver’s good deed is being shared with the world, thanks to a doorbell camera.
  
  A FedEx driver delivering in Michigan’s Upper Peninsula was dropping off a package for Jodi LaFreniere at her Manistique home Thursday morning.
  
  LaFreniere, a kindergarten teacher, told CNN she was at school when she got an alert on her phone from her doorbell camera.
  
  'This is sweet!' A delivery driver is overjoyed at treats left for him on a family's porch
  
  “I was wondering who was at my house since my fiance was away in Alaska, teaching,” she said.
  
  When she went to look at the alert, she saw the FedEx delivery driver shoveling the snow on her front porch.
  
  Facebook post not found.
  
  Post has been removed or is no longer public.
  
  In the video, the driver can be seen carrying LaFreniere’s package to her front door but stops in his tracks once he takes a look at the snow covering the floor of the porch.
  
  Within seconds, he puts the package down and grabbing a shovel near the front door, begins clearing a pathway without any hesitation.
  
  LaFreniere hadn’t spoken to the delivery driver but said her fiance, Rodney Riesland, has chatted with him a lot because he’s usually home when deliveries are made. She said Riesland says the driver – Melvin J. Marlett – is a great guy.
  
  Marlett has been working for FedEx for 23 years.
  
  Through a friend on Facebook, LaFreniere said she was able to thank Marlett for his kindness.
  
  FedEx took notice of Marlett’s actions and contacted LaFreniere via Facebook to ask if they could share her story.
  
  “FedEx is proud of the many contributions our team members make to the communities we serve every day,” FedEx spokesperson Heather Wilson told CNN. “We commend our courier, Mel Marlett, who went above and beyond to help shovel snow for our customer while making a delivery.”
  
