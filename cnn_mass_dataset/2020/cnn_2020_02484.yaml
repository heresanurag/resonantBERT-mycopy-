  Relief goods, heavy machinery and personal protective equipment are already positioned in key areas, Filipino Grace America, mayor of Infanta town in Quezon province, told DZBB radio. “But because of the Covid-19 pandemic, our funds for calamity concerns and expenses are insufficient.”
  
  Local officials canceled port operations and barred fishers from setting sail. Airlines canceled dozens of flights.
  
  Typhoon Goni, moving westward at 25 kph (15.5 mph) from the Pacific Ocean, will bring intense rains over the capital and 21 adjacent provinces early on Sunday, and threats of floods and landslides.
  
  Another typhoon, Atsani, with 55 kph sustained winds and gusts of up to 70 kph, is gaining strength just outside the Philippines.
  
  An average 20 typhoons, bringing heavy rains that trigger deadly landslides, hit the Philippines annually.
