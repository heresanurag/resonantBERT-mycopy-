title: "Bernie Sanders would ‘ruin our economy,’ former Goldman Sachs CEO says"
date: "2020-02-12"
section: "Business"
url: "https://www.cnn.com/2020/02/12/business/blankfein-sanders-tweet-trnd/index.html"
content: |
  Former Goldman Sachs CEO Lloyd Blankfein thinks Bernie Sanders would be a bad president. That’s not a surprise, considering that the Vermont senator has spent much of his campaign criticizing Wall Street and billionaires.
  
  In the wake ofSanders’ New Hampshire primary winTuesday night,Blankfein sent out a tweet that took shots at both Sanders and President Donald Trump.
  
  If Dems go on to nominate Sanders, the Russians will have to reconsider who to work for to best screw up the US.  Sanders is just as polarizing as Trump AND he’ll ruin our economy and doesn’t care about our military. If I’m Russian, I go with Sanders this time around.
  
  Sanders’ proposals include major increases in corporate taxes and taxes on the rich, breaking up big tech companies that have helpedlift the overall market,curbing stock buybacksand instituting Medicare for fall to provide government-run health care for all Americans.
  
  Sanders wasn’t too heartbroken over Blankfein’s criticism when asked about it by CNN on Wednesday.
  
  “Let me see, a billionaire executive on Wall Street doesn’t like me. Hmm, I am shocked by that, Annie. I am really shocked,” he told CNN’s Annie Grayer.
  
  Many of his supporters responded on Twitter, and cheered the fact that Blankfein was saying bad things about their candidate.
  
  I'm totally for ruining this economy. It only works for rich people. Saying "he'll ruin our economy" doesn't scare me at all.I think prioritizing military over human well-being is obscene. So I am glad he doesn't care about our military. Again, not scared.Are you scared, bro?
  
  Blankfein hasn’t donated money to any presidential candidates this election cycle, according to OpenSecrets.org, which tracks campaign finance records. He has given money to both Democrat and Republican candidates and political action committees in the past. The last time he backed a presidential candidate financially wasin 2007 when he gave the legalmaximum donation of $4,600 to Hillary Clinton.
  
  This isn’t the first time Blankfein criticized a 2020 Democratic presidential candidate’s potential harm to the US economy. He also criticized Senator Elizabeth Warren, another vocal critic of the rich and Wall Street, telling CNN that he believed she would bring “cataclysmic change” to the economy. Warren was a front runner when he made that statement. But she finished a distant fourth in Tuesday’s primary vote.
  
  Investors aren't panicking about Bernie Sanders. Here's why
  
  Still investors do not appear to be worried about thepossibility of a Sanders presidency, despite his success in New Hampshire and a strong showing last week in the Iowa caucus. Market analysts say investors seem to be betting that Sanders can’t win the presidency, despite his early success. They may also believe that even if he wins he won’t have the support in Congress to pass major parts of his agenda.
  
  Blankfein retired as Goldman(GS)CEO in 2018.
  
  The S&P 500 is up 4.5% so far this year and was higher in early trading Wednesday. Investors are encouraged by thestrength of the US economyand hopes that the worst has passed on thecoronavirusthat has already killed more than 1,000 people.
