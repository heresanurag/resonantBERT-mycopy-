id: cnn_2020_02257
title: "Google increases family leave for employees to 14 weeks"
date: "2020-04-16"
section: "Tech"
url: "https://www.cnn.com/2020/04/16/tech/google-family-leave-policy/index.html"
content: |
  Google is giving its workers eight extra weeksof paid leave to take care of their families as thecoronavirus outbreakforcesschools to remain closed.
  
  The tech giant is now offering 14 weeks of additional leave due to theglobal pandemic, the company confirmed to CNN Business. Last month it gave two weeks of leave for caregivers in its workforce, with an option to take four more. Employees can take consecutive weeks off or adjust their working hours over several days, a spokesperson said.
  
  The policy will only apply to Google’s full-time global workforce — which numbersmore than 100,000— and not to its thousands of vendors and contractors, the spokesperson added.
  
  Google(GOOG)’s move follows a similar one by tech rival Microsoft(MSFT), which last week gave its employees12 weeksof paid parental leave.
  
  The coronavirus has forced schools around the world to shut, with UNESCO estimating that school closures across 188 countries are impactingmore than 91%of the world’s student population — around 1.6 billion children and young adults. Several US states haveextended school closures, with some governors already announcing schools will remain shut for the rest of the academic year.
