id: cnn_2020_02412
title: "The NFL punished the Raiders and Steelers for violating the league’s Covid-19 protocols"
date: "2020-11-06"
section: "US"
url: "https://www.cnn.com/2020/11/06/us/nfl-raiders-steelers-covid-trnd/index.html"
content: |
  The NFL is punishing the Las Vegas Raiders andPittsburgh Steelersfor not adhering to the league’sCovid-19protocols.
  
  The Raiders have been fined $500,000, head coach Jon Gruden has been fined $150,000 and the team will lose a sixth-round draft pick, a source with knowledge of the penalties confirmed to CNN. Yahoo was the first to report the news.
  
  Some of the violations include Gruden not consistently wearing a mask, players attending a large indoor gathering and the team allowing an unauthorized person into the locker room following a game. Gruden had already beenfined $100,000in September for not wearing a face mask.
  
  Denver Broncos' John Elway tests positive for Covid-19, experiences minor symptoms
  
  The Raiders are the first team to lose a draft pick for violating Covid-19 protocol.
  
  The Steelers were fined for infractions during the team’s game against the Baltimore Ravens last Sunday, the Steelers confirmed to CNN. ESPN first reported the news.
  
  A source with knowledge of the penalty told CNN the team was fined $250,000 for not wearing face coverings, while head coach Mike Tomlin received a $100,000 fine for the same violation.
