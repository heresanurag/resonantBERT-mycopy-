  In Bolivia, a country withrestrictive abortion laws, the government has also implementedstrict travel restrictions, making it difficult to access public health facilities. Even if women are able to get to a facility, gynecology and obstetrics services are often understaffed and women may not be able to receive reproductive health services.
  
  This shortage of health-care workers has been highlighted during Covid-19, according to our country director, Malena Morales. Ipas is now using social media and telecommunicationsto counsel womenon unsafe abortion and to provide information on contraceptives.
  
  As police and the military are still permitted to move about freely,Ipas Bolivia is workingwith police unitsthey have already trained in reproductive health and rightsto transportcontraceptive supplies to health facilities.
  
  In Kenya, the government has responded to the Covid-19 pandemic by mandating a country-wide overnight curfew and travel restrictions in and out of the capital city Nairobi, Mombasa and two other counties.
  
  TheReproductive Health Network Kenya(RHNK), a network of health professionals in private and public health facilities, is working to broaden access to medication abortion (abortion induced by pills).
  
  This is a nonsurgical method using a combination of pharmaceutical drugs that can be used by women up to 10 weeks pregnant.The WHO has approvedthe use of medication abortion as a safe and effective way to end a pregnancy that does not require a physician, but rather, a trained health care provider to screen the woman for eligibility and give her all the information on the dosage regimen, possible complications, and follow-up care.
  
  Pharmacists are important, particularly now when the risk of infection is higher in busy hospitals and frontline health workers are stretched providing Covid-19 care. The Ipas team in Kenya, in partnership with RHNK andDKT International, a nonprofit organization that provides products for family planning, HIV/AIDS prevention and safe abortion, is training pharmacists via WhatsApp videos on how to dispense medication abortion drugs for women who do not want to go to health facilities out of fear of being infected. The pharmacists are linked to the network providers across the counties for referral in case of any arising complications from the abortion procedure.
  
  Abortion has been safe, legal and supported by thegovernment in Nepal since 2002. But with communities spread across immense rural and mountainous areas, a woman might spenda full day or morewalking to access health care.  Now, strict travel restrictions mean most cannot access health facilities even on foot.
  
  The Ipas Nepal team is working with the Ministry of Health and Population and other partners to ensure abortion remains included as an essential service and has also proposed that counseling and provision of medication abortion and contraceptive services through telemedicine be allowed.
  
  These kinds of innovations – bolstered by the World Health Organization (WHO) guidelines,which state, “women’s choices and rights to sexual and reproductive health care should be respected regardless of COVID-19 status, including access to contraception and safe abortion to the full extent of the law”– have led many governments to recognize that abortion care is, in fact, essential.
  
  And whileseveral statesin the USdo not sharethe WHO’s sentiments, all countries – developed or developing – should remain committed to providing women their reproductive rights. In order to move forward, after the worst of the pandemic has passed, we need a collective vision for how to build back an even stronger world. Reproductive health advocates and their partners are helping to lead the way – let’s follow them.
