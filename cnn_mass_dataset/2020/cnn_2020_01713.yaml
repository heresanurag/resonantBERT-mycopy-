title: "Keeping women’s health essential despite Covid-19 shortages"
date: "2020-05-06"
section: "Opinion"
url: "https://www.cnn.com/2020/05/06/opinions/covid-19-womens-health-abortion-access-kumar/index.html"
content: |
  Editor’s Note:Anu Kumar is the president and CEOof Ipas, an international reproductive health and rights organization. She provides strategic leadership for Ipas teams in countries across Asia, Africa and the Americas. The views expressed in this commentary are her own. View moreopinionon CNN.
  
  The world is changing daily as a result of Covid-19. Like millions of people, I now have a virtual workday. I am fortunate – I’m safe and comfortable at home with my family in North Carolina, practicing social distancing.
  
  I can’t help but think of the impact of Covid-19 on places like Dharavi, a slum in India with no running water and intermittent electricity. I visited many years ago and I remember well the look of the place, dusty narrow roads filled with potholes, mountains of trash where the rag pickers worked, and the smell of raw sewage. Soap and clean water are a dream, and social distancing nearly impossible.
  
  Imagine living there or somewhere like it. Now, imagine you need access to contraception or a safe abortion in this setting. The limited health facilities and providers that werepreviously available are gone, at least temporarily, due to the pandemic.
  
  Realities like this make access to abortion and contraceptives urgent, even when the world isn’t facing a pandemic, but perhaps never more so than now.
  
  As more countries impose necessary lockdowns and restrictions on in-person medical treatment and allocation of resources, contraception and abortion are becoming harder to access, particularly in low-income countries. As a result, there will likely be an increase in unplanned pregnancies and unsafe abortions, compounded by restricted mobility, disruption incontraceptive supply chainsand higher rates of reportedinterpersonal violence.
  
  According to the World Health Organization (WHO), women and girls around the world haveroughly 25 million unsafe abortionseach year. Tens of thousandsdie from complications, and millions more suffer serious, often permanent injuries. The Guttmacher Institute, a research organization devoted to advancing sexual reproductive rights, says these numberswill rise as clinics closeand health facilities stop providing abortion care.
  
  In fact, they posit we may see an additional 3 million unsafe abortions and over 1,000 maternal deaths this year.
  
  10 steps to save Native Americans from Covid-19 catastrophe
  
  With government and health systems urgently focused on curbing coronavirus infections, and despite the bleak realities confronting women in need and their families, reproductive health advocates are still finding ways to keep sexual and reproductive health care, including contraception and abortion, essential.
  
  And some of these efforts have been quite effective.
  
  While governments and health systems focus on fighting the virus and protecting citizens’ health, it is important that policymakers and providers prioritize sexual and reproductive health as well. Abortion in particular is time-sensitive and cannot be delayed without profound consequences for women and their families. This looks a little different in countries around the world.
  
  In Bangladesh, according to Ipas’s country director, Dr. Sayed Rubayet,the organization supports28 health care facilities for Rohingya in the Cox’s Bazar district, one of the world’s largest refugee camps. These facilities provide essential and legal abortion services (known as “menstrual regulation” in the country), post-abortion care and family planning services to many of the900,000 refugeesstruggling for survival.
  
  But mobility restrictions imposed by the government during the pandemic and the fact that abortion is not considered a critical service have left six of these clinics without trained health providers, forcing them to suspend services, Rubayet says. They are rapidly trying to ensure that more clinics don’t lose service providers – and at the 22 clinics that remain open and operational.
  
  After weeks of advocacy efforts, Rubayet reports he was successful in convincing the Refugee Relief and Repatriation Commissioner and the WHO office in Cox’s Bazaar to recognize reproductive health care workers in the facilities as critical providers and issue vehicle passes to them so they can continue to provide reproductive health services to Rohingya women and girls. All clinics are once again in operation.
  
  In South Africa, the government hasissued travel restrictions, prohibiting non-essential movement. But there islittle informationfrom government sources on sexual and reproductive health services. Local and international NGOsare usingsocial media platforms, SMS messaging and community radio to share information informally to help women find reproductive health care while navigating lockdown restrictions.
  
  And in other parts of Africa, Ipas isjoining the cause, using social media – Twitter, Facebook and WhatsApp – to raise awareness about safe abortion care andamplify Covid-19 public health messages.
  
