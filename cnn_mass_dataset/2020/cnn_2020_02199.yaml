id: cnn_2020_02199
title: "GBI investigating police shooting that left Georgia teen dead"
date: "2020-10-26"
section: "US"
url: "https://www.cnn.com/2020/10/26/us/georgia-teen-killed-by-police/index.html"
content: |
  A police officer is on paid administrative leave as theGeorgia Bureau of Investigation probes the shootingof a 19-year-old in south Georgia, according to the GBI and Sylvester Police Department.
  
  Jakerion Shmoud Jackson died Saturday, the GBI said.
  
  A police officer tried to pull over a vehicle around 2:30 a.m. Saturday, the bureau said, and “a brief car chase ensued with the subject fleeing the scene on foot.”
  
  About three hours later, after receiving 911 calls about someone matching the description of the man involved in the case, a Sylvester officer responded and encountered Jackson, the GBI said.
  
  “This encounter led to the officer discharging his firearm, resulting in Jackson being struck,” the GBI said.
  
  Philadelphia police killed a man in a shooting that raises questions, chief says. Then 30 officers were hurt in protests
  
  No information was disclosed about what led the officer to shoot Jackson.
  
  The teen was pronounced dead at a hospital. A GBI medical examiner will conduct an autopsy, the agency said. No officers were injured, authorities said.
  
  The Sylvester Police Department didn’t release the officer’s name. He is on paid administrative leave, Chief Shawn Urquhart said.
  
  The officer was wearing a body camera, she said, adding she didn’t know whether his car had a camera on the dashboard.
  
  The GBI’s findings will be turned over to the district attorney for the Tifton Judicial District.
  
  Sylvester Mayor Pro-Tem Larry Johnson said he did not know whether Jackson’s family had contacted the city about the incident or whether they had hired an attorney.
  
  The city of about 5,800 residents is located in Worth County. Its police department has 23 officers, according to its website.
