title: "Jeff Bezos is now worth a whopping $200 billion"
date: "2020-08-27"
section: "Tech"
url: "https://www.cnn.com/2020/08/27/tech/jeff-bezos-net-worth-200-billion-intl-hnk/index.html"
content: |
  Jeff Bezos was alreadythe world’s richest man. Now his net worth has skyrocketed once again, setting another new record.
  
  On Wednesday, the Amazon CEO’s wealth reached an estimated $202 billion, according to theBloomberg Billionaires index, as the company’s shares soared. That’s up about $87 billion since January.
  
  The explosive growth in Bezos’ fortune is being driven by his holdings in Amazon(AMZN). The company’s stock is up about 25% over the last three months and 86% so far this year, according to data from Refinitiv.
  
  Bezos, whofounded Amazonin 1994, keeps breaking records with his wealth. In 2017, he becamethe richest person on the planet. And last month, his estimated net worth jumped to almost $172 billion,marking a new global high.
  
  Jeff Bezos Fast Facts
  
  The billionaire isn’t alone — other tech tycoons have been getting much wealthier throughout the pandemic as demand for their companies’ goods and services continue to grow.
  
  Earlier this month, Facebook(FB)CEO Mark Zuckerberg was dubbed a “centibillionaire,” as hiswealth surpassed $100 billion.Tesla(TSLA)CEO Elon Musk, with anet worth of $96 billion, is close to achieving that extraordinary status. Microsoft(MSFT)founder Bill Gates has already made it.
  
  And Apple(AAPL)CEO Tim Cook alsobecame a billionairerecently as shares of his company — nowthe world’s most valuable— have soared. Cook is a rare example of an executive who didn’t help found their company breaking into the ranks of the super rich.
  
  Though Amazon is Bezos’ biggest asset, it’s not the only big brand he oversees. Outside the company, Bezos also owns Blue Origin, the space travel company hefounded in 2000, and The Washington Post newspaper, which heacquired in 2013.
  
  Last year, Bezos and his ex-wife MacKenzie Scott, formerly MacKenzie Bezos,announced their divorce. Thatgrantedher a quarter of the couple’s Amazon shares, equating to a4% stakein the company.
  
  Months later, shesignedthe Giving Pledge, an initiative started by Warren Buffett and Bill and Melinda Gates to encourage the world’s richest to donate the bulk of their fortunes to charity. Scott is worth more than $65 billion,according to the Bloomberg index, making her the 13th richest person in the world.
