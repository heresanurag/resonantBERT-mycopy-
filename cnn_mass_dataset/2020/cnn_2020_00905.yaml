title: "Colorado sold a record $1.75 billion of cannabis last year"
date: "2020-02-18"
section: "Business"
url: "https://www.cnn.com/2020/02/18/business/colorado-cannabis-record-sales-2019"
content: |
  This time last year, it appeared that Colorado’s industry was plateauing. Now it’s surging.
  
  Colorado cannabis shops notched sales of nearly $1.75 billion during 2019, setting a new annual sales record for the state home to the nation’s longest-established recreational cannabis industry, according toColorado Department of Revenue datafirst reported by theDenver Westword.
  
  Cannabis giant Canopy Growth posts earnings surprise
  
  The new high water mark for sales netted more than$302.4 million in tax revenuefor the state’s coffers, where that money is divvied up into various bucketsto fund programssuch as school construction, law enforcement, public health, drug education and public safety.
  
  The 2019 figures showcase a surprising surge in growth from a market that a year ago appeared to be flattening out. Colorado’s cannabis sales increased 13% from 2018, bouncing back from a 2.5% year-over-year growth rate from 2017 to 2018.
  
  Those slow growth rates were largely driven by price drops on flower, or cannabis bud, Tom Adams, managing director at cannabis market research firm BDS Analytics, told CNN Business.
  
  “To see it turn around in 2019 is a bullish indicator that price compression can’t keep the popularity of legal cannabis down,” he  said.
  
  Adams attributed the rebound in Colorado’s sales growth to two key factors: the increasing prevalence of non-flower products and changes in consumer behavior.
  
  The profusion of edibles, beverages, vapes and concentrates resulted in a smaller market share for the familiar flower. Separately, people are growing comfortable with buying cannabis products and integrating those purchases into their shopping patterns, he said, notingrecent BDS studiesthat showed increases in the number of adults who reported consuming cannabis in the prior six month period.
  
  “It’s just become a part of people’s lives more and more,” he said.
