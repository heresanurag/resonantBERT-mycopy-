title: "Boxing champ Floyd Mayweather will pay for George Floyd’s funeral, ESPN reports"
date: "2020-06-02"
section: "US"
url: "https://www.cnn.com/2020/06/02/us/floyd-mayweather-george-floyd-funeral-spt-trnd/index.html"
content: |
  Boxing champion Floyd Mayweather will pay for George Floyd’s funeral, a representative for the athlete toldESPN.
  
  Floyd died at the hands of Minneapolis policelast week as former officer Derek Chauvin kneeled on his neck and two other officers restrained him. A fourth officer stood by as it happened. The former officers have all been fired by the department but only Chauvin has been charged in the death.
  
  Afuneral for Floydwill be held in his hometown of Houston on June 9, family attorney Ben Crump told CNN.
  
  Leonard Ellerbe, the CEO ofMayweather Promotions, confirmed the boxer’s involvement in a statement to ESPN. “He’ll probably get mad at me for saying that, but yes, (Mayweather) is definitely paying for the funeral,” Ellerbe said.
  
  Ellerbe also told ESPN that Mayweather did not want to talk about what he is doing.
