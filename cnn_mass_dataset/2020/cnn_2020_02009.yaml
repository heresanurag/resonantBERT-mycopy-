  “To disrupt the long-planned election procedures as relators would have us do would threaten voter confusion,” Chief Justice Nathan Hecht wrote in the opinion.
  
  Other recent court rulings have limited no-excuse mail votingin Texas only to senior citizens. And Abbott is currentlyfacing two challengesto his order earlier this month restricting ballot boxes to one per county in the sprawling state.
