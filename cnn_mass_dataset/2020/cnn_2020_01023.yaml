title: "Iran’s legendary classical singer and composer Mohammad-Reza Shajarian dies"
date: "2020-10-09"
section: "World"
url: "https://www.cnn.com/2020/10/09/world/mohammad-reza-shajarian-iran-legendary-classical-singer-dies/index.html"
content: |
  Iranians around the world flooded their social media accounts with tributes, songs and poetry dedicated to legendary Iranian singer and composer Mohammad-Reza Shajarian, who died from complications due to a long standing battle with kidney cancer on Thursday.
  
  “Our nightingale has flown to another tree,” Iranian-American U.S. based musician Farid Shafinury said about Shajarian’s passingin an Instagram post.
  
  Video posted to Twittershows hundreds of fans gathered in front of Jam Hospital in Tehran where Shajarian was hospitalized earlier this week, defying a partial lockdown order imposed on Tehran after it was reported that Iran had recorded the highest daily coronavirus count since the start of the pandemic.
  
  Many held cellphones over their heads as the crowd sang Shajarian’s songs.
  
  Shajarian’s son Homayoun, also a classical singer, emerged from the hospital Thursday night and addressed fans, saying that his father will be buried next to revered 9th century Persian poet Ferdowsi.
  
  “When they asked me where my father deserved to be buried as a national figure declaring his place in the nation’s history, I said next to Ferdowsi,” Homayoun said.
  
  Regarded as a great ostad – or maestro – of classical Persian music, Shajarian was adored by fans across Iran and around the world.
  
  Born in Mashhad in 1940, Shajarian started singing at the age of five under the supervision of his father, and at the age of 12 began studying traditional classical music styles, according to his official biography.
  
  He launched his musical career as a 19-year-old, performing at Radio Khorasan. By 1960, he had become a prominent figure in classical Persian music in Iran.
  
