  This isn’t the first time that public health agencies have reminded people not to ingest certain disinfectants or use such products improperly.
  
  In April – just a day after President Trump suggested during a White House briefing that injecting disinfectant might be a possible coronavirus treatment – theCDC posted on Twitter: “Household cleaners and disinfectants can cause health problems when not used properly. Follow the instructions on the product label to ensure safe and effective use.”
