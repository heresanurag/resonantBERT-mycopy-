title: "The Future of Work: Dr. Sanjay Gupta’s coronavirus podcast for June 3"
date: "2020-06-03"
section: "Business"
url: "https://www.cnn.com/2020/06/03/business/gupta-coronavirus-podcast-wellness-june-3/index.html"
content: |
  As workplaces around the country are reopening, some employees have big questions. CNN Chief Medical Correspondent Dr. Sanjay Gupta is joined by CNN Business Senior WriterKathryn Vaselto discuss what to expect when you head back to work.
  
  You can listen on your favorite podcast app, or read the transcript below.
  
  Store owner:It’s today. It’s the first day back for everyone. I think everyone’s kind of just trying to figure it out.
  
  Hafsa Hassan, Amazon worker:Now workers have to decide, do I stay home, keep my family safe, end up facing termination? Or do I go to work, risk my life and risk my family’s life?
  
  Mike Bauer, Amazon worker:They actually have employees that are dedicated to making sure that the other employees stay 6 feet apart.
  
  Dr. Sanjay Gupta:As some people start returning to work, there are a lot of questions abouthow to keep everyone as safe as possible.
  
  Last week the Centers for Disease Control and Prevention released new guidelines for reopening offices. They’re suggesting things like wearing masks, temperature checks and prohibiting handshakes. But every sort of workplace is going to be facing its own unique challenges.
  
  So what can you expect? Andwhat are your rights?
  
  I’m Dr. Sanjay Gupta, CNN’s chief medical correspondent. And this is “Coronavirus: Fact vs. Fiction.”
  
  Kathryn Vasel, CNN Business senior writer:This is brand-new territory for all of us. Employers want their workers to feel comfortable, and employees want to feel safe in their workspace.
  
  Gupta:That’s CNN Business Senior Writer Kathryn Vasel. She covers careers and the workplace and has been writing CNN’s “Work Transformed” newsletter, which looks at how the pandemic is changing the way we work.
  
  Vasel:If you’re going back to work, you’re going to see a little bit of a different office than you did when you left. First of all, you’re probably not going to bring everybody back all at the same time. You might do staggered shifts where some people work in the mornings and some are people working later in the evening.
  
  If you have ADHD, here's how to manage working from home
  
  You also are going to see a lot more space in between desks too, to allow for that social distancing. And you might see partitions between workers to offer more protection.
  
  Those big community rooms and gathering places like the meeting rooms or the kitchen spaces, they might be closed off now to avoid people from gathering in groups there. And also, hallways and stairways, they might make them one way to also make sure that there isn’t congestion among workers.
  
  Gupta:So that’s in an office, but what about factory workers?
  
  Vasel:The CDC came out with some guidelines for meat and poultry processing workers. The problem there is that often they work close together on processing lines. They also tend to have longer shifts, which means they have prolonged closeness to their coworkers.
  
  So the CDC is recommending that they try to institute 6 feet apart on the processing lines, try to avoid having workers face to face on the processing lines and then even creating partitions to separate the workers as well.
  
  Gupta:And retail workers? They have to interact with customers all day every day.
  
  Vasel:The goal there is just to minimize the face-to-face contact as much as you can.
  
  You’re going to start seeing more displays in grocery stores and retail stores, maybe at the checkout line, to kind of remind people this is where you need to stand to maintain 6 feet of social distancing.
  
  As you get close to the checkout, you might see Plexiglas partitions, kind of blocking off contact between the customer and the worker.
  
  Stressed pets: How to stop it now and when you go back to work
  
  Also, things like handling money, right? Having the customer place the money down instead of doing it hand to hand — or having the customer swipe the credit card on their own, maybe they’ll shift, you know, their big primary restocking activity to off-peak hours when there isn’t a lot of movement and customers in the stores.
  
  Gupta:So offices, factories and stores are all trying to plan ahead and put safety measures in place to keep everyone safe. But it can still be scary.
  
  Vasel:It’s normal to feel very nervous or anxious about returning to work. And the key here really is to have an open dialogue with your employer.
  
  Gupta:But what legal protections do you have? For example, can you refuse to go back to work if you’re not ready?
  
  Russell Adler, attorney:From a legal perspective, it’s pretty difficult. The generalized fear or anxiety that I might catch coronavirus or that I would be exposed to it, is not in and of itself a basis to refuse to come to work.
  
  Gupta:That’s Russ Adler, a New York-based labor and employment attorney.
  
  Adler:There’s been a lot of guidance issued by state departments of health, the CDC, OSHA, the Occupational Safety and Health Act. And these are all guidances on what employers should be doing as far as cleaning and PPE. These are best practices, but you can’t sue for a violation of these recommendations.
  
  5 natural ways to boost your mental health during stressful times
  
  Gupta:Let’s say you do go back to work, and your employer is ignoring safety recommendations. What do you do if you’re put in this potentially risky situation and you feel uncomfortable? First off, Adler says you should make your concerns explicit.
  
  Adler:If you’re going to be vague about it and speak about it, later on, someone could say, “Well, that’s not what you complained about” or “You didn’t complain about that issue. You only complained about something else.”
  
  So I’d want to have contemporaneous documentation to support that I actually did complain about, for example, the absence of PPE or not enforcing social distancing guidelines.
  
  The other general rule is there’s federal OSHA, which requires an employer provide a workplace that’s “free from recognized hazards that are causing or likely to cause death or serious physical harm.” So that’s a very general standard.
  
  I would not have tremendous faith in an OSHA claim in this context. You’d have to be able to show that there was some specific event or circumstance that rendered that workplace unsafe. Simply saying, you know, “I saw some didn’t have a mask on or they were being loose about PPE” may not be sufficient.
  
  Gupta:The National Labor Relations Act may also give you certain protections when you speak out.
  
  Adler:That basically says when employees act for the concerted benefit of their coworkers — it’s called “protected concerted activity” — they may have some certain legal protections. The scope of that is not clear. And when is it “concerted protected activity” versus “activity on your own behalf”? That can be sort of unclear.
  
  Gupta:And what happens if, God forbid, you do get sick at work? What legal protections do you have then?
  
  Parents and child care providers are falling apart. It could get much worse
  
  Adler:I guess the first question becomes, how do you know you got it at work? Because the nature of the illness is that it’d be very difficult to identify the source of infection.
  
  But I think you’d probably be able to make a claim for worker’s compensation, an on-the-job illness or injury, in which case you’d have protection of the Workers Compensation Law, which provides a certain amount of income replacement.
  
  Gupta:Many companies are talking about doing health screenings or medical tests among employees. Can your employer force you? What are your rights?
  
  Adler:Prior to Covid, there are very strict rules about what kind of medical testing could be done. Generally speaking, you could not do medical testing to current employees.
  
  Gupta:But now, theEqual Employment Opportunity Commission saysemployers can administer temperature checks and even Covid-19 tests, because an infected employee poses a threat to the health of others.
  
  Adler:You can ask, “Do you have the following symptoms?” That is permissible. You could not ask, for example, “Do you have a family member who has coronavirus?” That might be a violation of the genetic discrimination law, that would prohibit that question.
  
  But you could say, “Have you been exposed to someone who has Covid? Do have the following symptoms? Do you have a fever?” And you could take a temperature test.
  
  Sign up here to getThe Results Are In with Dr. Sanjay Guptaevery Tuesday from the CNN Health team.
  
  Gupta:Can your employer require you to use personal protective equipment, like a mask?
  
  Adler:If you’d refuse to wear a mask without a medical basis, that would probably be grounds for disciplinary action, which could include termination.
  
  An employer would be within its rights to mandate use of PPE.
  
  Gupta:Remember: Federal laws and guidelines can be complicated, and specific labor rights differ by state.
  
  Adler:It would be very dangerous for anyone listening to any sort of advice via the internet to say: “That applies to me.” Every situation is very much unique.
  
  Again, they’re writing a lot of these laws and there are just nuances that no one could think of, because until you sort of get these things out into the workforce, there are pieces of it that no one thought of, not because they didn’t plan, but because we’re acting quickly.
  
  And frankly, this whole situation is going to cause a lot of very interesting legal issues that are going to come up over the next couple of years.
  
  Gupta:If you have concerns about going back to work, try talking to your employer. They may be able to make some accommodations.
  
  It can be tough to keep up with all these new regulations, but there are resources you can turn to, like your workplace policies and local or state laws. The CDC and Department of Labor also have useful information on their websites.
  
  And if you have an issue that is not clearly addressed by current laws or policies, you may want to consult an employment lawyer.
  
  Because whether you are returning to an office, factory or store, you do have a right to work in a safe environment.
  
  You can subscribe to the “Work Transformed” newsletterhere.
  
  We’ll be back tomorrow. Thanks for listening.
  
  If you have questions, please record them as a voice memo and email them toasksanjay@cnn.com— we might even include them in our next podcast.
  
  You can also head tocnn.com/coronavirusand sign up for our daily newsletter, which features the latest updates on this fast-moving story from CNN journalists around the globe. For a full listing of episodes of “Coronavirus: Fact vs. Fiction,” visit the podcast’s pagehere.
