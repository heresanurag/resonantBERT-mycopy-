title: "Kyrgyzstan’s acting president may seek constitution change to run for full term"
date: "2020-10-19"
section: "Asia"
url: "https://www.cnn.com/2020/10/19/asia/kyrgyzstan-president-constitution-change-intl/index.html"
content: |
  Kyrgyzstan’s new acting President Sadyr Japarov, who came to power last week in a popular uprising, may run for a full term if the country amends its constitution to allow it, Russia’s TASS news agency quoted him as saying on Monday.
  
  The Central Asian nation’s constitution bars caretaker Presidents from running in the elections they oversee. Japarov took over as acting President last week after unrest toppled his predecessor Sooronbai Jeenbekov’s government.
  
  Kyrgyzstan president Jeenbekov resigns after unrest
  
  As Prime Minister and acting head of state, Japarov must now oversee a rerun of an October 4 parliamentary election which was annulled after prompting violent protests, and a presidential election due to be held by mid-January.
  
  A nationalist opposition figure who had been serving a sentence for attempting to kidnap a political opponent, he was freed from prison by his followers during the protests and named Prime Minister last week. The uprising was the third popular revolt to topple a president in Kyrgyzstan since 2005.
  
  The former Soviet republic, which is closely allied with Russia and borders China, has yet to set the dates of either vote. Amending the constitution to allow Japarov to run might require holding a referendum before the presidential election.
  
  Japarov last week named his closest ally Kamchybek Tashiyev head of state security in the country of 6.5 million that hosts a Russian military air base, and published a long-term program hinting he planned to become more than a temporary leader.
