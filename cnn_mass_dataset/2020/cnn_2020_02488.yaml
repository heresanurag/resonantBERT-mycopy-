  The Dutch Eredivisie recently decided to end the season without crowning a champion for the first time in the league’s 64-year history. With nine matches left to play, Ajax was top of the table, albeit on goal difference from AZ Alkmaar, but would have been considered favorite to win a staggering 35th league title and sixth in the past 10 years.
  
  Van der Sar notes the players and supporters are “disappointed,” but “we know health is important and there’s no way to finish the league.”
  
  Ever the realist, Van der Sar realizes that even with the Bundesliga in Germany returning on May 16 – a scenario the Premier League would reportedly like to replicate – it pales in significance compared to a country’s priorities.
  
  “How do you test players if staff from hospitals or bus drivers or teachers are lacking those tests?” he wonders.
  
  “So that will be more like an ethical question.”
  
  Van der Sar, 49, exudes the same no-nonsense approach as he did when organizing his defenders.
  
  Weighing in on the impending transfer window he says “it will be difficult for the first club who was going to sign a player for a substantial amount of money” and admits Ajax cannot rely solely on TV revenue, adding “at most our income is from supporters, from business, from corporate boxes … so we rely immensely on filling a stadium.”
  
