  His unwavering belief in manager Erik ten Hag’s squad to deliver trophies at the highest level is evident. He wryly observes “it took five seconds too long” to reach last season’s Champions League final, withTottenham Hotspur breaking Dutch hearts as Lucas Moura completed his hat-trick with effectively the last kick of the semifinal.
  
  But the knocking out of European giants Real Madrid and former club Juventus, featuring a certain Cristiano Ronaldo, showed the world that Ajax were indeed capable of kicking on in their efforts to sit at the top table of European football.
  
  READ:Potential Premier League return divides fans at top and bottom
  
  Rather poignantly, the break from modern day football has afforded the legendary goalkeeper the opportunity to watch back, for the first time, the historic 1995 Champions League triumph Ajax enjoyed, defeating AC Milan 1-0.
  
  That team was stacked with wonderful Dutch masters such as Frank Rijkaard and Frank de Boer, midfielders Edgar Davids and Clarence Seedorf, to say nothing of the striker who came off the bench to score the winning goal, Patrick Kluivert.
  
  “As a young guy, you want to play football, you want to become a professional, then you want to come to the national team,” Van der Sar reflects. “And of course, winning a Champions League or a World Cup, a European Championship, those are the highest you can go. And that way, it’s been amazing.”
  
  An eventual return to the pitch for Ajax, and the rest of the world’s sides, will surely feel just as amazing in its own special way.
