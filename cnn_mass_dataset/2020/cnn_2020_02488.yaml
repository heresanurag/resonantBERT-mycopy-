  “In my view, with the type of football they played and the points they are ahead, it would be extremely harsh,” Van der Sar tellsCNN Sport.
  
  “The Premier League is a well-run league and of course there are big interests on the financial side, the commercial sides,” he continues. “But I’m sure they will make a wise decision if they keep on playing or if the league stops, what the results will be depending for Champions League places, relegation or awarding a title to Liverpool.
  
  “If the league doesn’t resume, I presume everybody will be OK if Liverpool wins the title.”
  
  It’s a far cry from the opinion espoused by his former teammate Gary Neville who – with tongue in cheek –recently noted that while it would be “ridiculous” not to award Liverpool the title, “I’d have my little asterisk T-shirt printed … just for a bit of fun” if Jurgen Klopp’s was essentially handed the league by default.
  
  Yet Neville’s opinion is possibly one shared by many football fans, rather than Van der Sar’s stance, which some might view as unlikely as looking out of the window and seeing cats chasing dogs down the street.
  
  READ:Chaos beckons as European soccer season is devastated by pandemic
  
  Van der Sar represented United with distinction from 2005 to 2011, winning four Premier League titles and the Champions League, and cannot help but observe the recent progress the Red Devils had been making under another former United star before football came to a sudden halt in March.
  
  Current United boss Ole Gunnar Solskjær made management look ridiculously easy when he succeeded Jose Mourinho in the Old Trafford dugout at the end of 2018.
  
  The Norwegian won 10 of his first 11 matches as caretaker manager and went on to win 14 out of 19 games – including a memorable Champions League victory against Paris Saint-Germain – before being appointed permanently in March 2019.
  
  For the remainder of the year, league victories were harder to come by but in 2020 there was an uptick in form, with United moving to fifth in the league thanks to four league wins in five matches which came as part of an 11-match unbeaten run.
  
  “The honeymoon period was great,” Van der Sar recalls of Solskjær’s time in charge.
  
  “Then they hit a rocky patch and I think the last seven, eight, nine weeks, they’ve been playing better football. The points were coming in. They had some good results against good teams also.
  
  “Of course, for them, I hope that the league is going to resume because they probably will need those Champions League places. I think the main thing for them is to focus on the next season and hopefully with two or three additions, they’ll be competitive again to Liverpool and Manchester City.”
  
