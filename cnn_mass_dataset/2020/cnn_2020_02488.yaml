title: "‘Extremely harsh’ if Liverpool isn’t awarded title, says Manchester United great"
date: "2020-05-12"
section: "Sport"
url: "https://www.cnn.com/2020/05/12/sport/edwin-van-der-sar-man-united-liverpool-ajax-cmd-spt-intl"
content: |
  When he played football, Dutch goalkeeper Edwin van der Sar was known for his prodigious ability to stop, deflect and parry nearly everything that came his way. But for all the occasions he came to the salvation of his sides, has the former Manchester United shot stopper pulled off a more surprising save by coming to Liverpool’s defense?
  
  The global coronavirus pandemic could deny United’s bitter rival Liverpool a first English Premier League title if the season cannot be played to its conclusion, despite holding a 25-point lead over nearest challengers Manchester City.
  
  On Monday, the UK government offered some clarity, by publishing a 50-page guidance document detailing how England hopes to ease lockdown measures.
  
  However, a number of leading players notablySergio Aguero, as well asDanny Rose and Raheem Sterlinghave raised concerns about the Premier League’s return. Before the season was interrupted, the Premier League had been due to conclude on May 17.
  
  When it comes to the resumption of professional sport, the UK government document confirmed that nothing can take place, even behind closed doors, in England until June 1 at the earliest. There are still 92 games left to play in the EPL.
  
