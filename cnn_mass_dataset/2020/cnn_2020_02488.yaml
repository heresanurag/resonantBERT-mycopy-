  But just what will it take for the club – which lifted 13 Premier League titles, before being starved of success following Sir Alex Ferguson’s retirement in 2013 – to start wining again?
  
  “Consistency, a winning mentality,” believes Van der Sar, who hopes that “maybe they can solve what’s going to happen with Paul [Pogba], is he going to stay?
  
  “I’m sure that with De Gea, with Maguire, with Fernandes, with Rashford, with Martial, they have a good line, I think, in the middle. And besides that, they’ve also a lot of young players developing as always at United, so in that way I’m positive for next season for them.”
  
  While that sounds more in keeping with the role required to run the Old Trafford club from the boardroom – a position the Dutch great has previously ruled himself out of – Van der Sar is more focused on his current day job at Ajax, the club he returned to as CEO in 2016.
  
