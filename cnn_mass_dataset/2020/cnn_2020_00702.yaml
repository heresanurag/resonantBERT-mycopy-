title: "Top White House aide Stephen Miller tests positive for Covid-19"
date: "2020-10-06"
section: "Politics"
url: "https://www.cnn.com/2020/10/06/politics/stephen-miller-tests-positive-coronavirus/index.html"
content: |
  Stephen Miller, a top policy adviser toPresident Donald Trump,has tested positive for coronavirus, he confirmed in a statement Tuesday.
  
  “Over the last 5 days I have been working remotely and self-isolating, testing negative every day through yesterday. Today, I tested positive for COVID-19 and am in quarantine,” Miller said in a statement.
  
  After working from home for several days, Miller showed up to work Tuesday and tested positive, a source familiar with what happened told CNN. He is the latest official caught up in an outbreak at the White Housethat has seen at least 10 others test positive.He’s also the latest memberof the President’s team who prepped him for last week’s presidential debate to test positive.
  
  Of that team, former New Jersey Gov. Chris Christie, former White House counselor Kellyanne Conway, Trump campaign manager Bill Stepien, aide Hope Hicks and Miller have all tested positive. Former New York City Mayor Rudy Giuliani and Trump campaign aide Jason Miller are the only other members of that debate prep team and have each tested negative in recent days.
  
  Miller also traveled aboard Air Force One on a Minnesota campaign trip with Trump and Hicks. Officials have told CNN that Hicks began feeling sick while on the flight back to Washington after a fundraiser and campaign rally in the Land of 10,000 Lakes. She isolated in a separate cabin after she began displaying symptoms.
  
  Miller’s wife, Katie Miller, is Vice President Mike Pence’s communications director.She already had coronavirus several months agoand tested negative again on Tuesday morning. She traveled with Pence to Salt Lake City ahead of the vice presidential debate scheduled for Wednesday, but left the trip Tuesday out of an abundance of caution, per an official.
  
  Current US Centers for Disease Control and Pervention guidelines on possible reinfection state that people who recovered from Covid-19 may not need to be tested or quarantined for up to three months after their last positive test.
  
  “There are no confirmed reports to date of a person being reinfected with COVID-19 within 3 months of initial infection,” the CDC guidance states. “However, additional research is ongoing.”
  
  Devin O’Malley, Pence’s press secretary,said on Twitter Tuesday nightthat the vice president had tested negative earlier in the day.
  
  Stephen Miller’s diagnosis is likely to fuel new scrutiny of the White House’s decision to decline offers from the CDC to help investigate the outbreak at the complex and to begin contact tracing of those who attended events with the President.
  
  “The White House has plans and procedures in place that incorporate current CDC guidelines and best practices for limiting COVID-19 exposure and has established a robust contact tracing program led by the White House Medical Unit with CDC integration,” White House spokesman Judd Deere said in a statement.
  
  The day before she tested positive, White House press secretary Kayleigh McEnany told reporters the White House would not disclose how many officials tested positive, citing privacy concerns even though other officials had committed to releasing the information. Instead, every positive case that has been later confirmed by the White House was first reported in the media.
  
  The outbreak is spreading throughout the West Wing. At least four press aides have tested positive and are working from home, in addition to a military aide assigned to the Oval Office and residence.
  
  As Trump returned home, a supply of medical gowns, goggles and respirator masks had been secured for use by his health and security teams – and potentially residence staffers – should they need to come into close proximity to the President.
  
  Miller, who has become one the highest profile White House advisers in part because of his hardline immigration views, has championed the President’s message that the coronavirus pandemic doesn’t represent an outsized threat to the US.
  
  Leading the writing team that crafted Trump’s final Republican National Convention speech, Miller helped to put forward a misleading message from the President that predicted a quick resolution to the ongoing crisis using dubious claims and figures.
  
  After the President’sApril proclamation limiting green cards,Miller told allies in a phone call it was important to “turn off the faucet of new immigrant labor” to protect Americans’ jobs, according to a participant.
  
  He has previously tried to use diseases, like influenza and the mumps, as grounds to tighten the border,The New York Times reportedand confirmed by a former administration official.
  
  This story has been updated with additional background and developments.
