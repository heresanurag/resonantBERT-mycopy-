  It was his 26th league goal of the season and totally took the sting out of the home side, which offered little in return with top goalscorer Sebastian Andersson kept on the bench until the closing moments.
  
  The second half was almost a training ground exercise for Bayern, with the excellent Pavard sealing the three points with a neat header from a Joshua Kimmich corner, briefly hugging David Alaba in contravention of the new guidelines as he celebrated his third goal of the season.
  
  It was all a far cry from the intimidating atmosphere that had greeted other visiting teams this season, with only a maximum of 300 people, mainly players, officials and media, allowed in the stadium.
  
  Bayern stalwart Mueller admitted that the lack of Union fans had helped his side.”It felt a bit like the atmosphere you get for old man’s football, 7pm, under floodlights, but as soon as the ball started to roll, the game took our focus,” he said.
  
  Before the match, police were also on patrol in the woods near the ground to stop fans gathering and the nearby Koepenick train station was quiet in contrast to the usual bustling scenes on matchday.
  
  While spectators were left out in the cold by the new restrictions, the televised coverage of the restart drew record audiences for Sky Germany.
  
  Saturday’s round of matches attracted over six million viewers, according to specialist website DWDL.de, more than double the usual figure after the two-month hiatus.
  
  Earlier Sunday, struggling Mainz came from two goals down to salvage a precious point in a 2-2 draw at Cologne.
