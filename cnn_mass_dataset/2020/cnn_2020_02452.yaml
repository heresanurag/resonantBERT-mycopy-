id: cnn_2020_02452
title: "The National Zoo confirms its new baby panda is a boy"
date: "2020-10-05"
section: "US"
url: "https://www.cnn.com/2020/10/05/us/national-zoo-panda-cub-is-a-boy-trnd/index.html"
content: |
  The6-week-old giant pandaat the Smithsonian’s National Zoo is a boy.
  
  The sex was announced after obtaining a DNA sample from the cub at his first veterinary exam September 19, the zoo saidin a news release. Scientists at the Smithsonian Conservation Biology Institute determined that a swab sample taken by the zoo’s veterinarians confirmed the cub is a male.
  
  Giant panda gives birth at the National Zoo
  
  During his most recent exam on October 1, veterinarians said the cub weighed 3.6 pounds and measured 14 inches from nose to tail tip. They also confirmed he is healthy and strong, and his eyes are starting to open.
  
  The zoo said it had the cub’s father, Tian Tian (tee-YEN tee-YEN), “paint” an image to reveal the sex to the giant panda keepers and fans online.
  
  The cub was born August 21 to 22-year old Mei Xiang (may-SHONG) by artificial insemination. It was the first time a zoo in the United States experienced a successful pregnancy and birth via artificial insemination using only frozen semen, according to the release.
  
  This cub is Mei Xiang’s fourth surviving cub. Her other three live in China.
  
  The zoo has encouraged the public to watch the panda family and the new cub on its24-hour panda cam.
