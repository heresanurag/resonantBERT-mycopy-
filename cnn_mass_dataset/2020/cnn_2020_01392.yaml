title: "The pandemic is turning into a super-expensive business quagmire"
date: "2020-08-20"
section: "Investing"
url: "https://www.cnn.com/2020/08/20/investing/companies-costs-burden-coronavirus/index.html"
content: |
  Businesses will need to put in placenew safety measuresto combat the spread of the coronavirus pandemic. That will change how companies, employees, customers and the government interact with one another. And it will cost the private sector — and the customers they serve — a pretty penny.
  
  Companies will have to invest heavily insafety measures and new protocols, in many caseschanging the way they operate. That will leave less money to invest in growth and paying down debts, according to a new report from ratings agency Moody’s.
  
  Not all sectors will have to adapt in the same way. But offices, for example, will all have to make drastic changes. They will have to bevirus-safe for the full workforce to return, which will require companies to spend money on upgrading their technology and capabilities. Even employees outside of infection hotspots will expect a certain degree of safety measures.
  
  For retailers, the pandemic has accelerated America’s shift to e-commerce.Online shopping boomed during the spring lockdownand consumers concerned about safetywill probably continue their habiteven asshops reopen. This means companies will have to update sales approaches, supply chains and operating strategies.
  
  Retailers are struggling with different aspects of the pandemic. Although some don’t have enough demand, others struggle to stem the tide. Amazon andWalmart, for example, announced they wouldhire hundreds of thousands of workersto keep up with heightened demand.
  
  All this means spending more money that will weigh on profits and balance sheets. Many of those costs will be passed along to the customer.
  
  More people shopping online will also hurt the real estate sector andlower commercial property values. Physical stores will continue to close — dozens of traditional retailershave gone bankrupt this year.
  
  All of these changes will affect corporate credit ratings as well, Moody’s said.
  
  Lower profit margins and higher costs, as well as weaker growth prospects  during theyears of recoveryand a slower pace of repaying of debt, will weigh on companies’ creditworthiness.
  
  So far, and unsurprisingly, Moody’s has downgraded the highest number of credit ratings in the sectors that have been hit the hardest by the pandemic. That includes the leisure industry, complete with cruise lines and restaurants, as well as airlines, shipping, autos, gaming, retail and export-oriented manufacturing. For firms in these industries, business as usual has changed dramatically.
