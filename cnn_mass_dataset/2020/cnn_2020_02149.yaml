title: "Asia’s richest man, Mukesh Ambani, is now among the world’s 10 wealthiest people"
date: "2020-06-22"
section: "Tech"
url: "https://www.cnn.com/2020/06/22/tech/mukesh-ambani-ten-richest-people/index.html"
content: |
  Asia’s richest man,Mukesh Ambani, is now among the world’s top 10 wealthiest people.
  
  Ambani is the chairman and chief executive of one of India’s most valuable companies, Reliance Industries. His net worth recently surged to $64.5 billion, edging out Oracle’sLarry Ellisonand French L’Oreal heiressFrancoise Bettencourt Meyersfor the No. 9 spot on the list, according to theBloomberg Billionaires Index. Ambani is the only person from Asia on the list.
  
  Under Ambani’s leadership, Reliance has grown from an oil and energy company into a sprawling conglomerate that includes retail shops, a mobile and broadband carrier, digital platforms and more.
  
  This new milestone comes shortly after Ambaniamassed more than $16.5 billion in investmentsin just around three months for Reliance’s digital technology arm, Jio Platforms, anddespite challengesto the oil side of Reliance’s business.
  
  How Asia's richest man is trying to build the next global tech giant
  
  The fundraising blitz and a recent share sale have made Reliance Industries debt-free, the company said in June. The company said its net debt at the end of March was 1.61 trillion rupees ($21 billion).
  
  Shares of the conglomerate have more than doubled since a low in March and are up 17.2% since the beginning of this year to 1,752.50 rupees, or $23. While Reliance’s stock has recovered, many other companies continue to suffer from the economic fallout of the coronavirus pandemic, and India’s economy appears to beheaded for a major slump.
  
  Therecent investmentsin Jio Platforms include more than $15 billion from the likes of Facebook and top Silicon Valley investors Silver Lake and TPG. It also received $1.2 billion from Abu Dhabi’s sovereign wealth fund and $1.5 billion from Saudi Arabia’s sovereign wealth fund. The deal with Saudi Arabia valued Jio at close to $68 billion.
  
  The investments will fuelAmbani’s ambitionsto make Jio Platforms into an internet giant that could rival Google or Alibaba. Facebook’s $5.7 billion bet on the company, one of the social media company’s biggest-ever deals, signaled that Ambani and Facebook are aiming to create a platform similar to Tencent’s WeChat, where users have access to messaging, mobile banking, social media and other services.
