  Editor’s Note:Halie Soifer is executive director of the Jewish Democratic Council of America (JDCA), which is a national organization that endorses Democratic candidates for elected office and advocates for progressive policy. She previously served as national security adviser to Sen. Kamala Harris, as foreign policy adviser to Sens. Chris Coons and Ted Kaufman, and as senior policy adviser to U.S. Ambassador to the UN Samantha Power. The opinions expressed in this commentary are those of the author. Viewmore opinionarticles on CNN.
  
  My Jewish husband grew up in 1970s Germany. When asked to give up his seat on public transit for senior citizens, he would often hesitate, wondering whether those individuals played passive or active roles during the Third Reich. While perhaps unfair, younger generations judged Germans who lived through the Nazi era as though they were complicit and could have changed the course of history.
  
  Similarly, we will all be judged by what we do – or do not do – at this moment in American history. This is not in any way to compare the atrocities of the Holocaust with what we are seeing in the US today, but there aresimilarities to this moment and the rise of Nazism in the 1930s. Today, we stand at a precipice, yet unlike Germans in the lead-up to World War II, we have the chance to vote a rising authoritarian out of power.
  
  For four years, President Donald Trump has increasingly threatened our country and our future. He hasassaulted, undermined, and weakened our democracy, using hatred anddisinformationto divide Americans, sow confusion, andincitedomestic unrest. He has repeatedlyalignedhimself with America’s adversaries andalienatedour allies. Amid an unprecedented public health crisis, he hasdemonstrateda wanton disregard for human life, intentionallymisledus, anddeniedscience as Americans die in record numbers. He’s explicitly threatened Americans exercising their First Amendment rights, including hispolitical opponentsand the media, issued statements widely viewed ascalls to armsandincitementto violence.
  
  Trump has a clear record of fanning the flames of hatred, includingequating neo-Naziswith peaceful protestors in Charlottesville, usingracist epithets, repeatinganti-Semitic tropes, and fuelingxenophobicconspiracy theories, whichI have argued contributedto the worst anti-Semitic attack in American history. At the first 2020 presidential debate, Trump had a chance to demonstrate to the American people where he stood on the issue of racially motivated violent extremism, which his own FBI director recentlywarnedis one of the greatest threats facing Americans.
  
  First-time voter: I needed to vote as if my life depended on it
  
  Instead of denouncing this virulent form of hatred, Trump pointedly refused and insteadencourageda far-right extremist groupto “stand back and stand by.” He latertried to walk back his remarks, after they werecelebratedby the far-right. Less than three weeks later, Trump repeated the same offense at a presidential townhall when helegitimizeda QAnon conspiracy theory, and refused to denounce this dangerous movement that hasinfiltrated the Republican Party.
  
  The threat posed by Trump to our democracy has become even clearer in the lead-up to the election. In July, hesuggestedthe illegal postponement of the election. Despite constitutional term limits, Trump hasassertedhe’s entitled to more than two terms as president. He’srefusedto commit to the peaceful transfer of power if he’s defeated, and questioned the validity, without proof, of mail-in ballots, which he himself previouslyused to vote.
  
  He has baselesslyrepeated claims of voter fraud,as the Justice Department hasloosened its 40-year policyon launching an investigation on voter fraud during an election cycle, andindicatedhe expects the Supreme Court to rule in his favor if the election is litigated. All of this comes at the end of a presidential term that was rife with illegality, impropriety, and his impeachment by the House.
  
  The real question of this election
  
  Now, on the eve of the election,reportsindicate that Trump plans to prematurely claim victory if it looks like he is close to 270 electoral votes on election night. White House press secretaryKayleigh McEnanyandTrumphave denied that the claims are true, but Trump and his team havesignaledtheir plans to litigate the counting of mail-in ballots after Election Day.
  
  But if the President is indeed planning on do this, it would improperly disregard postmarked mail-in ballots in states like Pennsylvania.  According to thePennsylvania secretary of state, there may be as many as 10 times the number of mail-in ballots in 2020 than there were in 2016 in this critical swing state, which canlegally acceptmail-in ballots postmarked by Election Day until November 6. The dubious legal groundwork for this position was recentlylaid by Supreme Court Justice Brett Kavanaugh, who served on the Republican legal team that stopped the presidential election recount20 years ago.
  
  Though some of us have become numb to the daily outrages, we cannot forget this simple fact: Trump’s behavior is that of an authoritarian. What may feel like a tumultuous and frenetic daily news cycle is the clear erosion of our democracy during Trump’s presidency.
  
  Stay up to date on the latest opinion, analysis and conversations through social media. Join us atFacebook/CNNOpinionand follow us@CNNOpinion on Twitter. We welcome your ideas and comments.
  
  As this monumental election comes to a close, it’s important to remember what’s at stake and how future generations will view the choice facing Americans at this critical crossroads. Will we choose the path of authoritarianism and hatred with Trump, or will we choose decency and democracy with Joe Biden? While we cannot know the outcome at this point, we do know that history will judge those who abandon their values and allow rise of bigotry and hate. Your children and grandchildren will someday ask whether you stood up for your values or whether you were a passive bystander, and a vote for Biden must be part of your answer. It’s the only decent choice.
