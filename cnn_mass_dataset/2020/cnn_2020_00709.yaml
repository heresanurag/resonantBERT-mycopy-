title: "Trump’s defense team failed at their most important job"
date: "2020-01-27"
section: "Opinion"
url: "https://www.cnn.com/2020/01/27/opinions/donald-trump-defense-fail-impeachment-psaki/index.html"
content: |
  Editor’s Note:Jen Psaki, a CNN political commentator, was the White House communications director and State Department spokeswoman during the Obama administration. She is vice president of communications and strategy at theCarnegie Endowment for International Peace. Follow her at@jrpsaki. The opinions expressed in this commentary are solely those of the author. Read moreopinion articlesat CNN.
  
  On Monday, President Donald Trump’s defense team failed at their most important job – making a clear and compelling argument that there was no need to hear from former National Security Adviser John Bolton.
  
  On Sunday night, just hours before the White House counsel was set to deliver the second day of opening arguments, anexplosive storybroke in The New York Times – providing details from John Bolton’s forthcoming book, “The Room Where It Happened: A White House Memoir.” The book appears to undercut Trump’s main argument – that his decision to withhold military aid to Ukraine and his request for an investigation into the Bidens were wholly independent of each other.
  
  Shortly after the story broke, Trumpresponded on Twitter, “I NEVER told John Bolton that the aid to Ukraine was tied to investigations into Democrats, including the Bidens… If John Bolton said this, it was only to sell a book.”
  
  We might consider believing the President’s version of history, except that this tweet comes from a leaderwho claimshe had a “perfect” phone call with the President of Ukraine (when the transcript of the call indicates otherwise); whohas allegedUkraine – and not Russia – intervened in the 2016 election (when no intelligence supports this); andwho saidthat Article II of the US Constitution allows him to “do whatever” he wants.
  
  Pardon me if I don’t take him at his word.
  
  So, what was a loyal legal team, who may or may not have known about the content of the book before their opening argument, supposed to do?
  
  Impeachment will help Dems in November
  
  Jay Sekulowbrushed it offas irrelevant – arguing, “We deal with transcript evidence … We do not deal with speculation, allegations that are not based on evidentiary standards at all.” He did, however, show a video of House Speaker Nancy Pelosi handing out pens during the signing of the impeachment documents – as if that was somehow an action that should rise to the level of outrage of the President of the United States.
  
  Ken Starr, yes that Ken Starr – the prosecutor whose report on Bill Clinton led to the President’s impeachment –had the chutzpahto take the moral high road decrying the overuse of impeachment, arguing the process “is filled with acrimony and divides the country like nothing else.” Lovely, if not bizarre, given the lack of self-reflection it required for him to deliver that message. Still, his argument included no real defense of the President or his actions.
  
  Pam Bondiwas clearly taskedwith making the case for why Hunter Biden’s role on the board of Burisma, a Ukrainian gas company, is more troubling than the President of the United States attempting to force a foreign power to bend to his personal will. Never mind that the theory that Hunter Biden used his role on the board of Burisma for nefarious means has been completely debunked – not just byevery reputable news organization– but by President Trump’s own former homeland security adviserTom Bossert.
  
  While day two of White House counsel’s arguments introduced some new arguments in defense of Trump, it likely did not change the interest from the public, and even some Republicans, to hear from witnesses like Bolton. Republican Sen. Mitt Romney, already on the list of possible votes in favor of witnesses,told reporters, “John Bolton’s relevance to our decision has become increasingly clear.”
  
  Though the President may not be on the path to conviction, the trial may bring the Senate one step closer to allowing witnesses. And day two of the defense did not change those odds.
