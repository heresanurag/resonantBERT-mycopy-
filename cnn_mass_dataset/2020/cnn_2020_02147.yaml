title: "Dozens more children hospitalized in New York with rare symptoms that could be linked to coronavirus"
date: "2020-05-07"
section: "Health"
url: "https://www.cnn.com/2020/05/07/health/new-york-children-coronavirus-kawasaki/index.html"
content: |
  A growing number of children are showing up at New York hospitals with troubling new symptoms that state health officials believe could belinked to coronavirus.
  
  First ICE detainee dies from coronavirus
  
  In an advisory to health care providers, state officials said 64 children in New York  have been hospitalized with a condition doctors described as “pediatric multisystem inflammatory syndrome.”
  
  New York City had alerted Monday that 15patients between ages 2 to 15 were hospitalized over the past three weeks with the Covid-related syndrome. Most of them tested positive for coronavirus or had positive antibody tests.
  
  Some of the children had persistent fever, toxic shock syndrome and features similar toKawasaki disease, the state health advisory said.
  
  Kawasaki disease causes inflammation in the walls of the arteries and can limit blood flow to the heart. While it’s usually treatable and most children recover without serious problems, it can also be deadly. It mainly affects children under age 5.
  
  Symptoms include a high temperature lasting over five days along with a rash, swollen neck glands, dry cracked lips, swelling of the hands and feet, andredness in both eyes.
  
  Kawasaki is a leading cause of acquired heart disease in the United States, with complications that include coronary artery enlargement and aneurysms, according tothe Centers for Disease Control and Prevention.
  
  Experts caution 'covid slide' looming for children out of school
  
  While older adults are mostly at risk for severe coronavirus, children can also get infected, health officials said.
  
  The new syndrome has appeared in children elsewhere.Seattle has also reporteda case along with a team atStanford Children’s Hospital in California.
  
  In the UK, pediatric specialists recently warned that a small number of children wasbecoming ill with the rare syndromethat could be linked to coronavirus. Experts there said abdominal pain, gastrointestinal symptoms and cardiac inflammation are common in those cases.
  
  Similar cases have been reported in Italy and Spain.
