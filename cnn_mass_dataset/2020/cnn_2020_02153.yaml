id: cnn_2020_02153
title: "Why Ben & Jerry’s statement on white supremacy is so extraordinary"
date: "2020-06-03"
section: "Business"
url: "https://www.cnn.com/2020/06/03/business/ben--jerrys-george-floyd/index.html"
content: |
  Let there be no doubt where Ben & Jerry’s stands.
  
  The ice cream maker has called on Americans to “dismantle white supremacy” and “grapple with the sins of our past” as nationwideprotestsagainst racial injustice stretch into theireighth day.
  
  There are just four black CEOs of Fortune 500 companies. Here's how they are addressing the death of George Floyd
  
  In a forceful statementposted to the company’s website late on Tuesday, Ben & Jerry’s describes thedeath of George Floyd, an unarmed black man, at the hands of a white police officer as the result of “inhumane police brutality that is perpetuated by a culture of white supremacy.”
  
  “What happened to George Floyd was not the result of a bad apple; it was the predictable consequence of a racist and prejudiced system and culture that has treated Black bodies as the enemy from the beginning,” said the brand, which is owned by Unilever(UL).
  
  Companies including Nike(NKE), Netflix(NFLX), Twitter(TWTR), Disney(DIS), Facebook(FB)and Intel(INTC)have condemned racism and injustice in recent days. But the statement from Ben & Jerry’s is unusually comprehensive and direct, addressing the historical roots of discrimination in the United States and calling out systemic racism, while advocating specific policies to prevent further police abuses and redress racial inequality.
  
  “Slavery, Jim Crow and segregation were systems of legalized and monetized white supremacy for which generations of Black and Brown people paid an immeasurable price. That cost must be acknowledged and the privilege that accrued to some at the expense of others must be reckoned with and redressed,” the company said in its statement.
  
  Ben & Jerry’s, which also publicly supported theBlack Lives Mattermovement, called on President Donald Trump to disavow white supremacists and nationalist groups that “overtly support him.”
  
  The ice cream maker also called for the US Department of Justice to reinvigorate its Civil Rights Division, and for Congress to passH.R. 40, a bill that would create a commission to study the effects of discrimination since African slaves first arrived in North America in 1619 and recommend remedies.
  
  Ben & Jerry’s has a long history of political activism under founders Ben Cohen and Jerry Greenfield, who werearrested in 2016for protesting against money in politics.
  
  Ben and Jerry's founders arrested at protest (2016)
  
  The company’ssaleto British-Dutch consumer goods giant Unilever(UL)in 2000 has not prevented it from speaking out on issues such as racial injustice, climate change and refugee rights. As part of the deal, Ben & Jerry’s kept an independent board of directors. “We’re a wholly owned subsidiary [of Unilever(UL)], but we still act according to Ben & Jerry’s mission, vision and values,” a spokesperson told CNN Business.
  
  The brand has even used its ice cream to lobby for change, launching theJustice ReMix’d flavorin September to promote criminal justice reform andPecan Resistin 2018 to protest Trump administration policies it described as “regressive and discriminatory.”
  
  The company was praised by activists on social media for the strength of its statement on Floyd’s death.
  
  “Unless and until white America is willing to collectively acknowledge its privilege, take responsibility for its past and the impact it has on the present, and commit to creating a future steeped in justice, the list of names that George Floyd has been added to will never end. We have to use this moment to accelerate our nation’s long journey towards justice and a more perfect union,” the statement concluded.
  
  Unilever CEO Alan Jope also commented on the issue. “Systemic racism and social injustice have to be eradicated. Business has a critical role to play in creating an equitable society which is intolerant of intolerance,” he said Monday onTwitter.
