title: "Hawaii will fine self-quarantine violators $5,000 or send them to prison"
date: "2020-04-01"
section: "US"
url: "https://www.cnn.com/2020/04/01/us/hawaii-self-quarantine-fine-trnd/index.html"
content: |
  If you were thinking of riding out the pandemic insunny Hawaii, think again: Anyone traveling between the state’s islands mustquarantine themselvesfor two weeks.
  
  And breaking that quarantine order to gulp some fresh air could earn you a hefty fine – or a prison sentence.
  
  These states have implemented stay-at-home orders. Here's what that means for you
  
  Hawaii Gov. David Ige signed a proclamationon Monday that requires residents and visitors who travel between islands to quarantine themselves for 14 days.
  
  Anyone who violates the mandatory quarantine could face up to $5,000 in fines or a year in prison, if convicted.
  
  In this case, quarantined people cannot leave their hotel rooms or receive visitors. People traveling for health care aren’t required to quarantine themselves, though they must follow the social distancing measures laid out in a previous supplementary proclamation.
  
  “The dangers of Covid-19 require the serious attention, effort, and sacrifice of all people in the State to avert unmanageable strains on our healthcare system and other catastrophic impacts on the State,” the recent proclamation read.
  
  For weeks, public health officials have pleaded with the American public to stay home to prevent new coronavirus cases.
  
  Police are arresting and fining people for violating social distancing orders
  
  Several states are taking that seriously, and now, violating social distancing orders is an arrestable offense.
  
  In Florida,a megachurch pastor was arrestedand charged with unlawful assembly and a violation of health emergency rules for holding services for hundreds of churchgoers. ALouisiana pastor who held servicesand said the virus was a political ploy was hit with similar charges.
  
  Police have broken upweddings and house parties in New Jersey and charged hosts with disorderly conduct.Maryland Gov. Larry Hogansaid residents who violate the stay-at-home order could face a misdemeanor charge or be jailed for up to a year.
