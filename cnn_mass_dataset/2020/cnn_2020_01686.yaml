id: cnn_2020_01686
title: "Amy Coney Barrett is winning even as Trump is losing"
date: "2020-10-17"
section: "Politics"
url: "https://www.cnn.com/2020/10/17/politics/amy-coney-barrett-analysis/index.html"
content: |
  President Donald Trump’s decision to nominate Amy Coney Barrett to the Supreme Court has not been a game changer in the presidential race. He isstill well behindformer Vice President Joe Biden with less than three weeks to go.
  
  But while Trump is losing, Barrett is winning. She’s very likely to be confirmed and doing fairly well in the court of public opinion.
  
  Republicans have always had the numbers in the Senate to confirm Barrett. Theyhold 53 seats, and they only need 50 votes to confirm Barrett.
  
  Beyond some disqualifying scandal for Barrett, the only way Democrats likely could stop her nomination is for Republicans to face insurmountable public pressure not to put her on the Supreme Court.
  
  Ihave notedin the past that public opinion has been important in determining how many votes a Supreme Court nominee gets. Even the most qualified and moderate nominees tend to get fewer votes if the public doesn’t like them. On the other end, nominees that traditional metrics deem unqualified or extreme ideologically get more votes when the public likes them.
  
  Part of the reason Justice Brett Kavanaugh’s confirmation vote was so close in 2018 was that he was unpopular. Just 38% of registered voters had a positive view of Kavanaugh as he was getting confirmed, according toCNN/SSRS polling. The plurality, 48%, had a negative view. Kavanaughfaced accusationsof sexual assault.
  
  This net popularity of -10 point rating was the worst for a Supreme Court nominee since Robert Bork in 1987, who came in with a -11 point rating. Despite this low rating, Kavanaugh was still confirmed. Bork was attacked for conservative views by Democrats.
  
  By comparison, Barrett is well liked.CNN/SSRS’ pollearlier this month had her with a +10 point net positivity rating among registered voters. That’s basically on-par with the +12 and +13 point ratings Elena Kagan, a Barack Obama nominee, and Neil Gorsuch, a Trump nominee, got in 2010 and 2017 respectively.
  
  Now, the polling isn’t all fantastic for Barrett. Beyond her own personal popularity, polls from CNN,Fox NewsandNBC News/Wall Street Journalshow voters are split basically evenly on whether the Senate should confirm her.
  
  Still, that’s a fairly important development given the polling prior to Barett getting named as Trump’s nominee.
  
  The clear majority (57%) of voters toldCNN in Septemberthat the winner of the 2020 election should be the one who got to choose the next Supreme Court justice. Just 43% said Trump should make the appointment.
  
  That 14-point split looked more like the polling that had Biden clearly ahead in the presidential race than the polling on Barrett now.
  
  Indeed, what makes Barrett’s polling so strong is that she’s doing it despite Trump being unpopular. In theCNN poll, her net popularity rating is running 28 points ahead of Trump’s net favorability rating.
  
  The average Supreme Court nominee since 1987 has run about 15 points ahead of the popularity rating of the president at the time.
  
  Perhaps, Barrett’s relative popularity wouldn’t have been too surprising in the 1990s or even in the 2000s, when polarization wasn’t as high as it is today.
  
  But just before a presidential election in the year 2020, it’s notable. And by being as popular as she is, Barrett seems to have shut off the last avenue opponents have to derail her nomination.
