title: "The many times Trump has praised China’s handling of the coronavirus pandemic"
date: "2020-04-21"
section: "Politics"
url: "https://www.cnn.com/2020/04/21/politics/trump-china-praise-coronavirus-timeline/index.html"
content: |
  Editor’s Note:Editor’s Note: This story was published on April 21, 2020. It was updated on May 19 after President Donald Trump wrote to the World Health Organization threatening to permanently withdraw US funding.
  
  President Donald Trump is escalating his threatsagainst the World Health Organization, telling the agency he will permanently pull US funding if it does not “commit to major substantive improvements in the next 30 days.”
  
  Trump challenged the WHO to “demonstrate independence from China,” in the letter that he posted on Twitter late Monday.
  
  In April, Trump repeatedlycriticized the WHOfor being “China-centric” and failing to “objectively assess the situation on the ground and to call out China’s lack of transparency” as the coronavirus death toll increases globally.
  
  Trump’sheightened rhetoriccomes as he and his administration are facing scrutiny over their own handling of the pandemic, with early missteps that included downplaying the threat the virus posed and delays and shortages in coronavirus testing.
  
  Trump and Biden launch battle over China that could define 2020 election
  
  Although Trump has recently expressed some displeasure with China, his tough comments of late are a far cry from his past statements on the nation and its leader, Xi Jinping, whom he praised for his transparency and management of the outbreak.
  
  Trump’s stance contrasted with those of other senior members of the administration, including Secretary of State Mike Pompeo, who have called out Beijing for its failures to share key information at the outset of the pandemic, hindering the global response and costing lives.
