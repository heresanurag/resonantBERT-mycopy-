  Hailey Bieber also has a big presence in Bieber’s new YouTubedocumentary series, “Seasons,” where she is often seen accompanying the singer on his travels and supporting him in the studio while he makes music.
  
  In the documentary, Bieber opens up about his past drug use and how his new life with his wife has calmed him.
