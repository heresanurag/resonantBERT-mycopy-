title: "Activision Blizzard CEO gives his personal phone number to 10,000 employees"
date: "2020-04-15"
section: "Tech"
url: "https://www.cnn.com/2020/04/15/tech/activision-blizzard-ceo-bobby-kotick-phone-number-trnd/index.html"
content: |
  Activision Blizzard CEO Bobby Kotick is using thecoronavirus pandemicto (safely) get closer to his employees.
  
  Kotick revealed Tuesday that he gave out his personal phone number to 10,000 workers and said he “encouraged every single employee that has a concern that relates to their health care” to contact him. A “few hundred” have reached out so far,he told CNBC.
  
  Kotick said that luckily only a “small number” of the video game-makeremployees have contracted Covid-19. He’s using the pandemic tobolster the company’s health careoptions, including making private doctors available, paying for some employee drug co-pays, andoffering telehealth options.
  
  Similar to other companies, Activision Blizzard(ATVI)isletting employees work from home. Kotick said that will continue for the “foreseeable future” and the collaborative spirit among its global offices has made it aseamless transition.
  
  “I don’t think we’ve had the same challenges from a work from home perspective as other companies, but people are feeling the isolation, frustration and anxiety,” Kotick admitted. He doesn’t envision life returning back to normal until there’s a low cost, widely available vaccine and testing.
  
  The pandemic is creating huge challenges for esports
  
  Activision Blizzard makes popular video games, like Call of Duty and World of Warcraft. He said that video game production “remains on track for now.” To ensure there isn’t much disruption between the transition from office to home, the company is paying for higher broadband speeds and new equipment if needed.
  
  The company’s business has struggled over the past year because of rising competition and popularity fromFortnite. Activision Blizzard announced last year that it wascutting 8% of its workforceand took a $150 million charge in order to de-prioritize games that aren’t doing as well.
  
  Still, Activision’s fourth-quarter results beat the company’s outlook and analyst expectations, buoyed by thesuccessful launch of “Call of Duty: Mobile.”The stock is up more than 8% this year.
  
  CEOs vary in how they’ve responded to the pandemic. A number of CEOs and other top executiveshave announced they’re taking pay cuts, for example.
  
  Others havedonated large sums of moneytoward Covid-19 research. Twitter cofounder and CEO Jack Dorsey announced earlier this month he’s donating more than a quarter of his wealth to a new fund for charitable causes, with the immediate focus on coronavirus relief efforts.
  
  Amazon(AMZN)CEO Jeff Bezos and Microsoft(MSFT)cofounder Bill Gates — the world’s two wealthiest people — have also each pledged $100 million toward coronavirus relief.
