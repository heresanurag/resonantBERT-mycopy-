id: cnn_2020_02028
title: "Ryanair will cut 3,000 jobs and keep 99% of flights grounded through June"
date: "2020-05-01"
section: "Business"
url: "https://www.cnn.com/2020/05/01/business/ryanair-job-cuts/index.html"
content: |
  Ryanair is planning to cut up to 3,000jobsand operate less than 1% of flights through June after warning that passenger demand and pricing will takeat least two yearsto recover from thecoronavirus pandemic.
  
  Europe’slargest airlineby passenger numbers said in a statement Friday that its restructuring program will begin in July and could result in the loss of as many as 3,000 jobs among pilots and cabin crew, or about 15% of its workforce.
  
  Pay cuts of up to 20% and the closure of a number of aircraft bases across Europe are also on the cards, Ryanair(RYAAY)said.
  
  CEO Michael O’Leary will take a 50% pay cut for the rest of the financial year to March 2021, it added.
  
  The news follows asimilar announcementby British Airways this week, which said it could cut more than a quarter of its workforce, or 12,000 jobs, as the outlook for aviation deteriorates.
  
  Ryanair usually operates low-cost flights to more than 200 destinations mostly in Europe, playing a vital role in supporting smaller regional airports and the continent’s massive tourism industry.
  
  The sector is expected to be particularly hard hit this summer, with countries such as Spain, Italy, France and Greece — among the world’s most visited destinations — bracing for a dramatic decline in international visitors.
  
  The budget carriersaid it expected to carry fewer than 150,000 passengers in the April to June period, compared with its budget target of 42.4 million. For July to September, it now expects to carry no more than 50% of its original traffic target of 44.6 million passengers.
  
  “Ryanair now expects the recovery of passenger demand and pricing (to 2019 levels) will take at least two years, until summer 2022 at the earliest,” it said, adding that it expects to report a net loss of over €100 million ($109.7 million) in the April to June quarter, with more losses to come.
  
  The airline said that when it returns to “meaningful flying” from July, Europe’s competitive landscape will be distorted by more than €30 billion ($33 billion) in what it described as “unlawful” state aid given to competitors, including Air France-KLM, Norwegian Air and airlines owned by Lufthansa.
  
  This will allow these carriers to fund “many years of below cost selling,” Ryanair said, adding that it plans to challenge these bailouts in court because it believes they are in breach of EU state aid rules.
