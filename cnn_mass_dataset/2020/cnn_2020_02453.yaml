id: cnn_2020_02453
title: "Top health officials vanish from national TV interviews as White House refocuses messaging"
date: "2020-05-14"
section: "Media"
url: "https://www.cnn.com/2020/05/14/media/fauci-birx-redfield-interviews/index.html"
content: |
  The nation’s top physicians have stopped appearing on national television for interviews as the White House exertsincreased control over communicationsduring the coronavirus pandemic and refocuses its message toward reopening the economy.
  
  The last national television appearance from a doctor on the coronavirus task force was a full week ago on May 7 when Dr. Deborah Birx, the White House coronavirus response coordinator, appeared on CNN for a town hall.
  
  Fox News dumps coronavirus coverage for anti-Obama conspiracy theory
  
  Prior to that, Dr. Anthony Fauci, the nation’s top infectious disease expert, appeared on CNN on May 4 for an interview with Chris Cuomo.
  
  Dr. Robert Redfield, the director of the Centers for Disease Control and Prevention, has not appeared on national television since April 17 when he was interviewed on the “Today” show on NBC News.
  
  Dr. Stephen Hahn, the commissioner of the Food and Drug Administration, has not appeared on national television since April 28 when he spoke with Fox News host Maria Bartiromo.
  
  And Dr. Jerome Adams, the surgeon general, has not appeared on national television since April 17 when he appeared on “Fox & Friends.”
  
  All five officials are part of the White House coronavirus task force responsible for managing and overseeing the health crisis in the United States.
  
  A spokesperson for Adams noted that while the surgeon general hasn’t done any national television interviews lately, he was interviewed by other publications in May. A CDC spokesperson also noted Redfield was interviewed for a story published by The Washington Post on April 21. A spokesperson for Hahn did not respond to a request for comment.
  
  While the health officials haven’t been on national television doing interviews, they have been present at moments with press availability. Birx, for instance, was at the meetingbetween Trump and two governorson Wednesday when members of the media had the opportunity to ask questions.
  
  Additionally, Fauci, Redfield, and Hahn alltestified remotely before the Senateearlier this week. All three of them have been self-isolating after possible exposure to the virus.
  
  A White House official cautioned to CNN that the recent absences from television interviews doesn’t mean the American public won’t see health officials appear with an anchor in the future.
  
  The conspicuous absence of the county’s top health officials from the television airwaves has occurred as a newly implemented White House communications team clamps down on its public relations strategy.
  
  Trump abruptly ends press conference after contentious exchange with reporters
  
  President Trump, who previously held freewheeling news conferences on a daily basis has stopped doing so,following an effort among aides and allieswho believed the briefings damaged him politically.
  
  Kayleigh McEnany, who took over in April as White House press secretary,told reportersthat the briefings might “have a new look” and a “new focus.”
  
  Since then, the White House has prioritized its economic message of reopening the country over the public health message that had been on center stage since the pandemic erupted in the United States.
