title: "Opinion: Justice Department probe of John Bolton is payback for his daring to criticize Trump"
date: "2020-09-16"
section: "Opinion"
url: "https://www.cnn.com/2020/09/16/opinions/bolton-book-justice-department-investigation-honig/index.html"
content: |
  Editor’s Note:Elie Honig is a CNN legal analyst and former federal and state prosecutor. The views expressed in this commentary are his own. Viewmore opinionon CNN. Watch Honig answer readers’ questions on “CNN Newsroom with Ana Cabrera” on weekends.
  
  The Justice Department’sdecisionto open a criminal investigation into former Trump administration National Security Adviser John Bolton relating to the publication of his book, asreported by the New York Times on Tuesday, is equal parts futile and dangerous.
  
  The move to investigate Bolton stands little chance of resulting in a criminal charge and conviction on the merits alone. And, bigger picture, the move appears to signal a pernicious effort to use the Justice Department’s might to punish perceived political enemies of President Donald Trump.
  
  Bolton is no sympathetic figure. By his own account (as told in his book), he held damning and potentially pivotal firsthand information about Trump’s dealings with Ukraine, for which Trump was impeached. Boltonclaimsin his book that Trump directly linked hundreds of millions of dollars in foreign aid to Ukraine publicly announcing an investigation of former Vice President Joe Biden and his son, Hunter, a claim which Trump denies.
  
  Yet Boltonrefused to testifyduring House impeachment proceedings, and later claimed he would testify in the Senate if subpoenaed; to the surprise of virtually nobody, the Republican-controlled Senatevotedto block all witnesses. Bolton could have come forward and testified, like other courageous officials including formerUS Ambassador to Ukraine Marie Yovanovitch, top US diplomatBill Taylor, andLt. Col. Alexander Vindman. Instead, Bolton clammed up and waited tocash inwhen his book went on sale, months after impeachment ended.
  
  The Justice Department isinvestigatingwhether Bolton unlawfully disclosed classified information in his book.  The problem, however, is that the factual record is too muddled to make out a criminal case by the lofty “beyond a reasonable doubt” legal standard.
  
  High-ranking federal employees and former employees, includingBolton, sign an agreement that they will submit any book manuscript to national security officials for pre-publication review.  Bolton did just that, and hereceived an emailfrom the top reviewing official saying she was satisfied that an edited version of Bolton’s manuscript did not contain any classified information, but another review took place with a different official without Bolton knowing. In that review, the official determined that there was classified information in the manuscript,according to the New York Times.
  
  Why this Woodward book is devastating to Trump
  
  The problem is that Bolton never received final, formalized sign-off before publishing his book. He may well have jumped the gun as an administrative matter, but it will be exceedingly difficult for prosecutors to convict Bolton of a crime beyond a reasonable doubt, given that he received written approval from a top reviewing official (albeit in an arguably informal manner).
  
  Trump’s own public attacks on Bolton further complicate any potential prosecution.  Trump has railed against Bolton and his book, calling Bolton a“Creepster,”a “lowlife” andmore. Trump has also argued that Bolton should be “jailed” and have his assets seized.  The Justice Departmentsued Bolton a week before the book’s release, in an attempt to stop it from publishing. If charged, Bolton likely could argue that he has been singled out for politically vindictive purposes which, inextreme scenarios, can result in dismissal of an indictment.
  
  In the broader view, the Bolton investigation signals an escalation in the use of the Justice Department for political purposes (or at a minimum, the public appearance of such).  It is bad enough that Attorney General William Barr already has selectively intervened in prosecutions to seek unprecedented leniency for Trump’s former political aidesMichael FlynnandRoger Stone.  Using the Justice Department to protect the President’s political allies is a gross abuse of power.  But it is even worse to use the Justice Department, with its staggering might, as a vehicle for political payback.
  
  At this stage, the investigation of Bolton is just that – an investigation, with no assurance that a criminal charge will follow.  But if it does, then mark this down: Bolton will not be convicted, and history will remember that Trump and Barr have politicized the Justice Department like none before them.
  
  Roger (California): If Trump wins a second term, could he replace Mike Pence as vice president and appoint a different person of his choosing?
  
  No. While Trump (or any presidential candidate) is under no obligation to choose any particular person as a vice presidential running mate, once that person has been elected and takes office, the president cannot unilaterally remove or replace him.  A vice presidentcan be removedonly through resignation (or death), or impeachment and conviction.
  
  If there is a vacancy in the vice presidency, the25th Amendment, which wasratifiedin 1967, provides that (1) the president selects a new vice president and (2) that person must then be confirmed by majority votes of both the House and Senate. The 25th Amendment has been used twice in our history. In 1973, Vice PresidentSpiro Agnewresigned in the midst of a federal bribery investigation. Then-PresidentRichard Nixonselected Gerald Ford as the new vice president, and Ford was confirmed by the House and Senate. Then, in 1974, Nixon resigned during the Watergate scandal. Ford became president and selected Nelson Rockefeller as vice president, who was then confirmed by both houses of Congress.
  
  Jason (North Dakota): If the state of New York brings criminal charges against the President, can the Department of Justice file superseding indictments and move the case to federal courts?
  
  No. There is no legal mechanism for the Justice Department or the federal courts to take over a state-level criminal case, or for a defendant charged criminally in a state court to have the case moved to federal court. This is different fromcivil cases,where parties can and often do seek to have cases “removed” (in legal lingo) from state to federal court.
  
  If state-level prosecutors, such as theManhattan District Attorneyor theNew York Attorney General,do charge the President while he is in office (or afterward), he almost certainly would move to dismiss those charges on the merits. But there is no way to get state criminal charges moved over to federal courts.
  
  Christopher (Illinois): How long can an official serve as “acting” head of a federal executive branch department?
  
  TheFederal Vacancies Reform Actlimits who can serve as an “acting” department head or secretary, and for how long. Generally, an official only can serve for either210 daysbeginning on the date the vacancy occurs or while aformal nominationof that official is pending before the Senate.
  
