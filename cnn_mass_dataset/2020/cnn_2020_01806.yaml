  Trump has madeextensive useof “acting” officials to fill key Cabinet roles, far more than his predecessor, former President Barack Obama. Trump has openlydeclaredthat “I like ‘acting’ because I can move so quickly. It gives me more flexibility.” A federal court recentlyruledthat the appointment of Ken Cucinelli to an “acting” post in the Department of Homeland Security was illegal, due to Cucinelli’s lack of constitutional qualifications (but not due to the length of his service), and just on Tuesday afederal judge in Maryland ruledthat the acting appointment of Chad Wolf to lead Homeland Security was likely unlawful.
  
