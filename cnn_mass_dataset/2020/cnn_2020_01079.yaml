id: cnn_2020_01079
title: "Justice Department asks Supreme Court to let Trump block his Twitter critics"
date: "2020-08-20"
section: "Politics"
url: "https://www.cnn.com/2020/08/20/politics/trump-twitter-blocking-supreme-court/index.html"
content: |
  The president who complains about censorship by Twitter wants to censor people himself.
  
  On Thursday, the Justice Departmentasked the Supreme Courtto overturna lower court’s decisionand grant President Donald Trump the ability to block his critics on Twitter.
  
  The petition seeks to revive a case decided by a New York federal judge in 2018. At the time, Judge Naomi Buchwald said Trump violated the First Amendment when he sought to stifle his online critics because portions of his Twitter account are considered a public forum. A three-judge panelupheld the ruling on appeal.
  
  Thursday’s Supreme Courtpetitionargues that the lower courts got it wrong.
  
  “The President uses his account to speak to the public, not to give members of the public a forum to speak to him and among themselves,” the petition reads.
  
  Trump's Twitter blocking violates Constitution, appeals court rules
  
  The Knight First Amendment Institute, which brought the original case, said the court should reject the petition.
  
  “This case stands for a principle that is fundamental to our democracy: government officials can’t suppress speech simply because they disagree with its message,” said Jameel Jaffer, the organization’s executive director, in a statement.
