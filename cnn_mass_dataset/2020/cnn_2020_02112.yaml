  # It’s not just Brad and Jennifer: A list of celeb couples we have never gotten over splitting
  
  By [![Image 1: Lisa Respers France](https://media.cnn.com/api/v1/images/stellar/prod/181001011452-lisa-france-byline.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/lisa-france)[Lisa Respers France](https://www.cnn.com/profiles/lisa-france)
  
  Jan 20, 2020
  
  PUBLISHED Jan 20, 2020, 9:01 AM ET
  
  Facebook Tweet[Email](mailto:?subject=CNN%20content%20share&body=Check%20out%20this%20article%3A%0Ahttps%3A%2F%2Fwww.cnn.com%2F2020%2F01%2F20%2Fentertainment%2Fbrad-pitt-jennifer-aniston-breakups "Share with email")Link Threads
  
  Link Copied!
  
  ![Image 2: Jennifer Aniston and Brad Pitt called it quits in 2005, but fans couldn't help but hold out hope for a reunion in 2018 after the actress announced her separation from Justin Theroux. Now every time they are in the same time zone (<a href="https://www.cnn.com/2020/01/19/entertainment/jennifer-aniston-brad-pitt/index.html" target="_blank">let alone the same room like at the 2020 Screen Actors Guild Awards</a>) people start longing for a reconciliation. ](https://media.cnn.com/api/v1/images/stellar/prod/160920121720-02-pitt-aniston-file-restricted.jpg?q=w_2075,h_1168,x_0,y_0,c_fill/w_860)
  
  Celebrity breakups we have never gotten over
  
  17 photos
  
  Jennifer Aniston and Brad Pitt called it quits in 2005, but fans couldn't help but hold out hope for a reunion in 2018 after the actress announced her separation from Justin Theroux. Now every time they are in the same time zone ([let alone the same room like at the 2020 Screen Actors Guild Awards](https://www.cnn.com/2020/01/19/entertainment/jennifer-aniston-brad-pitt/index.html)) people start longing for a reconciliation.
  
  Ron Galella/WireImage/Getty Images
  
  Celebrity breakups we have never gotten over
  
  ![Image 3: One of Hollywood's happiest divorced couple, Bruce Willis and Demi Moore split in 1998 after a 10-year relationship. The pair, who knew each other for three months before wedlock, have three daughters. Moore was married to Ashton Kutcher from 2005 to 2013. Wilis married Emma Heming in 2009 and <a href="https://www.eonline.com/news/1026017/demi-moore-attends-ex-bruce-willis-vow-renewal-to-wife-emma-heming-willis" target="_blank" target="_blank">Moore attended their vow renewal in March 2019. </a>](https://media.cnn.com/api/v1/images/stellar/prod/121008065419-splits-bruce-willis-and-demi-moore.jpg?q=w_270,h_360,x_0,y_0,c_fill/w_1182)
  
  -1 / 17
  
  One of Hollywood's happiest divorced couple, Bruce Willis and Demi Moore split in 1998 after a 10-year relationship. The pair, who knew each other for three months before wedlock, have three daughters. Moore was married to Ashton Kutcher from 2005 to 2013. Wilis married Emma Heming in 2009 and [Moore attended their vow renewal in March 2019.](https://www.eonline.com/news/1026017/demi-moore-attends-ex-bruce-willis-vow-renewal-to-wife-emma-heming-willis)
  
  Jim Smeal/WireImage/Getty images
  
  ![Image 4: Gwyneth Paltrow's marriage to Coldplay frontman Chris Martin seemed to be unshakeable (<a href="http://marquee.blogs.cnn.com/2013/04/30/overheard-gwyneth-paltrows-amazing-relationship-advice/?iref=allsearch" target="_blank">she even had great relationship advice!</a>). But in March 2014, <a href="http://www.cnn.com/2014/03/25/showbiz/celebrity-news-gossip/gwyneth-paltrow-chris-martin-split/index.html?iref=allsearch" target="_blank">the A-list couple announced that they were undergoing a "conscious uncoupling."</a> The pair may be better friends than spouses. <a href="https://www.cnn.com/2019/01/10/entertainment/gwyneth-paltrow-chris-martin-honeymoon/index.html" target="_blank">Martin went on the honeymoon with Paltrow and her new husband, producer Brad Falchuk.</a>](https://media.cnn.com/api/v1/images/stellar/prod/140326112437-gwyneth-paltrow-chris-martin-file.jpg?q=w_2369,h_1579,x_0,y_0,c_fill/w_1182)
  
  0 / 17
  
  Gwyneth Paltrow's marriage to Coldplay frontman Chris Martin seemed to be unshakeable ([she even had great relationship advice!](http://marquee.blogs.cnn.com/2013/04/30/overheard-gwyneth-paltrows-amazing-relationship-advice/?iref=allsearch)). But in March 2014, [the A-list couple announced that they were undergoing a "conscious uncoupling."](http://www.cnn.com/2014/03/25/showbiz/celebrity-news-gossip/gwyneth-paltrow-chris-martin-split/index.html?iref=allsearch) The pair may be better friends than spouses. [Martin went on the honeymoon with Paltrow and her new husband, producer Brad Falchuk.](https://www.cnn.com/2019/01/10/entertainment/gwyneth-paltrow-chris-martin-honeymoon/index.html)
  
  Fame Pictures
  
  ![Image 5: Jennifer Aniston and Brad Pitt called it quits in 2005, but fans couldn't help but hold out hope for a reunion in 2018 after the actress announced her separation from Justin Theroux. Now every time they are in the same time zone (<a href="https://www.cnn.com/2020/01/19/entertainment/jennifer-aniston-brad-pitt/index.html" target="_blank">let alone the same room like at the 2020 Screen Actors Guild Awards</a>) people start longing for a reconciliation. ](https://media.cnn.com/api/v1/images/stellar/prod/160920121720-02-pitt-aniston-file-restricted.jpg?q=w_2075,h_1168,x_0,y_0,c_fill/w_1182)
  
  1 / 17
  
  Jennifer Aniston and Brad Pitt called it quits in 2005, but fans couldn't help but hold out hope for a reunion in 2018 after the actress announced her separation from Justin Theroux. Now every time they are in the same time zone ([let alone the same room like at the 2020 Screen Actors Guild Awards](https://www.cnn.com/2020/01/19/entertainment/jennifer-aniston-brad-pitt/index.html)) people start longing for a reconciliation.
  
  Ron Galella/WireImage/Getty Images
  
  ![Image 6: Once upon a time in 1999, a young blonde pop star named Jessica Simpson met another young blond-ish pop star, Nick Lachey, at a Teen People party, and they immediately fell in love. Lachey even wrote a song about their passion -- that would be "My Everything" -- and then he and his new bride signed up to film their love for an MTV reality show called "Newlyweds." But instead of finding "happily ever after," Lachey and Simpson found grounds for divorce in 2005 after three years of marriage. They both are now parents and married to others. ](https://media.cnn.com/api/v1/images/stellar/prod/150911073322-restricted-simpson-lachey-file.jpg?q=w_3000,h_2000,x_0,y_0,c_fill/w_1182)
  
  2 / 17
  
  Once upon a time in 1999, a young blonde pop star named Jessica Simpson met another young blond-ish pop star, Nick Lachey, at a Teen People party, and they immediately fell in love. Lachey even wrote a song about their passion -- that would be "My Everything" -- and then he and his new bride signed up to film their love for an MTV reality show called "Newlyweds." But instead of finding "happily ever after," Lachey and Simpson found grounds for divorce in 2005 after three years of marriage. They both are now parents and married to others.
  
  Paul Drinkwater/NBC/NBCU Photo Bank via Getty Images
  
  ![Image 7: In 2001, every teenager with access to MTV and Teen People wanted to find the Britney Spears to their Justin Timberlake (or vice versa). With those two ruling pop music, not even their questionable fashion sense could mar the public's love for their romance. Sadly, matching denim outfits wasn't enough to make this last: The couple broke up in 2002, and many listeners believe Timberlake's "Cry Me a River" is about his relationship with Spears. Spears had a super brief marriage to friend Jason Alexander in 2004 and was married to backup dancer Kevin Federline from 2004 to 2007. Timberlake married actress Jessica Biel in 2014. ](https://media.cnn.com/api/v1/images/stellar/prod/130318141941-jt-britney-spears-denim-2001.jpg?q=w_2000,h_1125,x_0,y_0,c_fill/w_1182)
  
  3 / 17
  
  In 2001, every teenager with access to MTV and Teen People wanted to find the Britney Spears to their Justin Timberlake (or vice versa). With those two ruling pop music, not even their questionable fashion sense could mar the public's love for their romance. Sadly, matching denim outfits wasn't enough to make this last: The couple broke up in 2002, and many listeners believe Timberlake's "Cry Me a River" is about his relationship with Spears. Spears had a super brief marriage to friend Jason Alexander in 2004 and was married to backup dancer Kevin Federline from 2004 to 2007. Timberlake married actress Jessica Biel in 2014.
  
  LUCY NICHOLSON/AFP/Getty Images
  
  ![Image 8: Johnny Depp and Winona Ryder had amazing chemistry on- and off-screen, from "Edward Scissorhands" to the tattoo parlor, where Depp had "Winona Forever" inked on his arm. Alas, although we adored their courtship, Depp and Ryder weren't meant to be. ](https://media.cnn.com/api/v1/images/stellar/prod/140307093038-03-couples-broken-up-restricted.jpg?q=w_3000,h_2207,x_0,y_0,c_fill/w_1182)
  
  4 / 17
  
  Johnny Depp and Winona Ryder had amazing chemistry on- and off-screen, from "Edward Scissorhands" to the tattoo parlor, where Depp had "Winona Forever" inked on his arm. Alas, although we adored their courtship, Depp and Ryder weren't meant to be.
  
  Barry King/WireImage/GETTY IMAGES
  
