  Researchers at the London School of Economics offer aset of toolsto help parents talk to their kids about the kinds of information websites are collecting about them online.
  
  They offer videos that can help explain processes by which online platforms can collect data and then copy, analyze, store, share or sell it to other groups. One way they do this is by placing “cookies” on a device that can track and record users’ actions and sell that information to outside companies.
  
  For instance, Spotify enables more than 60 different companies — such as Google, Amazon and Facebook — to put cookies on users’ devices, the LSE researchersnoted. Many kids simply can’t comprehend the degree to whichdata collectiontakes place without them knowing.
  
