  Women are leading the charge
  
  Taiwan, Germany, and New Zealand have all received accolades for their impressive handling of the pandemic. So what do their successes have in common? Women. Female-led governments seem to be doing disproportionately better at dealing with the crisis, and that’s all the more noteworthy, given that women make up less than 7% of world leaders,Leta Hong Fincher writes.
  
  New Zealand’s leader, Jacinda Ardern, announced today that she and her ministers will take a 20% pay cut for the next six months.
  
  China’s wet markets aren’t what you think
  
  The coronavirus is believed to have originated in a wet market in the city of Wuhan, and America’s top infectious disease specialist has called for similar shopping areas to be “shut down right away.” But most wet markets – as opposed to dry markets, which sell non-perishable goods such as grain or household products – are not virus petri-dishes filled with exotic animals ready to be slaughtered,Ben Westcott and Serenitie Wang write.
  
  How workers are coping
  
  A harpist in Argentina wonders where her next paycheck will come from. A business owner in Ghana worries about the health of her employees. Sixteen people across 15 countries toldEoin McSweeneyhow they’re coping with the economic fallout of the crisis.
  
