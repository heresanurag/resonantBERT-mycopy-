  “[Health experts] are hopeful that antibody testing could help get the country back on its feet, but it would have to be hand-in-hand with more diagnostic testing for the virus itself, contact tracking and increasing hospital resources.” – CNN Chief Medical Correspondent Dr. Sanjay Gupta
  
