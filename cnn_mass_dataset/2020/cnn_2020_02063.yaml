  A version of this story appeared in the April 15 edition of CNN’s Coronavirus:Fact vs. Fiction newsletter.Sign up here to receive the need-to-know headlines every weekday.
  
  As the worst pandemic in more than a century consumes the world, the need for strong international institutions and coordination between countries has arguably never been more important.
  
  But yesterday,President Donald Trumpstunned the globe by announcing the United States would halt funding to the World Health Organization. The President, deflecting blame for his own handling of the pandemic, accused the WHO of mismanaging the spread of the coronavirus.
  
  Trump’s move, which could strip the leadingUN health agencyof a big chunk of its budget, has been condemned as“dangerous”by experts.
  
  In yet another wild White House news conference yesterday, the President backed off of his claim that he had absolute authority to reopen America and pledged to cooperate with the states, aftergovernors banded togetheragainst what one described as Trump’s “very premature” plans to relax restrictions.
  
  The President and the nation’s governors can argue all they want about who has the power to bring the country back online. But it seems the crisis won’t be ending any time soon.
  
  Anew study by Harvard researcherssuggests that social distancing could last until 2022 if a vaccine isn’t found quickly. And one of the methods that could in theory get people back to school or work — antibody tests — also seems to be a long way off,scientists have told the White House.
  
  Q: What does the WHO actually do? And who pays for it?
  
  A:TheWHO is a UN agencycreated to coordinate international health policy, particularly on infectious disease. In the 70 years since it was founded, it has helped eradicate smallpox, reduce polio cases by 99%, and battle outbreaks like Ebola. But it’s also faced criticism for being overly bureaucratic, politicized, and dependent on a few major donors. The WHO is funded by international organizations, private benefactors, the UN, and member states — of which the US is by far the largest donor.
  
