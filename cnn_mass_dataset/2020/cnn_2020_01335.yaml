title: "Uber lost out on its pursuit of Grubhub"
date: "2020-06-10"
section: "Tech"
url: "https://www.cnn.com/2020/06/10/tech/grubhub-just-eat-takeaway-uber/index.html"
content: |
  Uber has lost out on a high-profile deal that would have given a big boost to its food delivery business that has seen surging demand during the pandemic.
  
  Weeksafter reportsthat Uber was in discussions with Grubhub about a possible merger, a Netherlands-based company, Just Eat Takeaway.com,confirmedWednesday that it has struck a deal with Grubhub.
  
  The all-stock deal values Grubhub at $7.3 billion. Its shares jumped 6% in after-hours trading.
  
  The merger, which is subject to approval by the companies’ shareholders and is anticipated to close early next year, will mark Just Eat Takeaway’s entrance into the US. The company currently has operations in 23 countries.
  
  Earlier Wednesday, Just Eat Takeaway.com said it was “in advanced discussions with Grubhub regarding an all-share combination.” CNBC and theWall Street Journalreported the deal could be struck as early as Wednesday, with CNBCreporting thatUber “is likely” to pull out over antitrust concerns, citing two people familiar with the matter.
  
  Uber reportedly approached Grubhub(GRUB)earlier this year with an acquisition offer before the pandemic led to widespread lockdowns and the companies continued to discuss a potential deal,according to a report last month from The Wall Street Journal, citing sources familiar with the matter. Bloombergreportedat the time that a deal could be reached as soon as May.
  
  Delivery workers navigate a pandemic, protests and curfews to make ends meet
  
  With skyrocketing demand for delivery during the coronavirus pandemic, Uber’s meal service, Uber Eats, has been viewed as a bright spot for the company at a time when its core ride-hailing business has declined due to people increasingly staying home.
  
  Shortly after the reports about Uber and Grubhub, Democratic Sens. Amy Klobuchar, Patrick Leahy, Richard Blumenthal and Cory Bookerwrote a letterurging the Department of Justice and the FTC to “monitor the negotiations” and “to initiate an investigation if the parties reach an agreement to merge.”
  
  In a statement Wednesday afternoon, Uber spokesperson Noah Edwardsen said, “Like ridesharing, the food delivery industry will need consolidation in order to reach its full potential for consumers and restaurants. That doesn’t mean we are interested in doing any deal, at any price, with any player.”
  
  Grubhub was founded in 2004 and helped popularize the concept of meal deliveries. In recent years, however, the company has faced fierce competition in the market from the likes of Uber, DoorDash and Postmates, each of which were well funded by venture capital. Uber, in particular, was not afraid to lose billions to expand into new markets and categories.
