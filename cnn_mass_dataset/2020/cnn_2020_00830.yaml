title: "Bitcoin soars again after BlackRock says it could replace gold"
date: "2020-11-20"
section: "Investing"
url: "https://www.cnn.com/2020/11/20/investing/bitcoin-prices-gold-blackrock/index.html"
content: |
  Bitcoin is often referred to as digitalgold. And now a top strategist at the world’s largest asset management firm says the cryptocurrency could one day replace the yellow metal as a go-to safe haven investment.
  
  Bitcoin pricessurged 4% Friday to above $18,700—inching closerto the all-time high of just under $20,000 from December 2017 — after BlackRock(BLK)’s chief investment officer of fixed income, Rick Rieder, said in aCNBC interviewthat bitcoin is here to stay.
  
  “Do I think it’s a durable mechanism that could take the place of gold to a large extent? Yeah, I do, because it’s so much more functional than passing a bar of gold around,” Rieder said.
  
  Theendorsement from BlackRock, whichmanages nearly $8 trillion in assets, is the latest sign of validation of bitcoin from the mainstream financial world.
  
  Bitcoin rockets past $18,000. The all-time high is in sight
  
  Square(SQ)and PayPal(PYPL)have endorsed it as aviable form of payment, and influential hedge fund managers Stanley Druckenmiller and Paul Tudor Jones have touted it as a investment.
  
  Still, gold moved higher on Friday, too. Gold andbitcoin have benefitedfroma weaker dollar. Investors increasingly view bitcoin as a viable alternative to paper, government-backed currencies.
