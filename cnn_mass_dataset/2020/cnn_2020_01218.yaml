content: |
  Editor’s Note:Bill McGowan is the founder and CEO ofClarity Media Group, a global communications coaching firm based in New York. He is the author of “Pitch Perfect: How to Say It Right the First Time, Every Time.” Follow him on Twitter@BillMcGowan22. Juliana Silva is a strategic communications adviser at Clarity. The views expressed in this commentary are solely those of the author. View moreopinion articleson CNN.
  
  If the Las Vegas oddsmakers were handicapping the upcoming Presidential debates, they might be inclined to favor President Donald Trump to win – and Trump has only himself to blame for that.
  
  After weeks of ham-handedattemptsat convincing the electorate that Joe Biden is a doddering fool, Trump has put himself in an impossible situation. He has committed the amateurish political mistake oflowering the baron his opponent’s performance to floor level.
  
  A low bar is easy to step over. Just ask the twice-elected George W. Bush. Only now, at the 11th hour, is Trump trying to climb out of the hole he’s dug for himself by claiming that he assumes Biden, the former Vice President, will“do great” in the debates.
  
  So, barring any major cognitive meltdown, Biden should at the very least be able to debate Trump to a draw. That’s bad news for Trump, who can ill afford these debates being a wash. Trump is like the heavyweight boxer heading into the bout’s final round trailing on points, asvirtually every national poll has confirmed. So, he has been throwing political haymakers for weeks.  He will likely intensify that strategy during the debates.
  
  In boxing, a haymaker is a wildly thrown punch, delivered in desperation. If it connects, it can immediately and completely change the outcome of  a fight. Most often it doesn’t.
  
  Trump has been throwing every haymaker he can think of,suggesting thatBiden is drugged up, that he’s senile, thathis administration will bedispatching poor people to terrorize the suburbs,that he is“against God,”that he’s apuppet for a Marxist cabal that will destroy America, and so on.
  
  Trumpis on the ropes, trailing Biden on favorability, trust and confidence in seeing the country through the pandemic –and campaign cash. And, perhaps most crushingly, he was evenbehind inconvention ratings, with Biden’s speech drawing more viewers, according to Nielsen.
  
  Debate coach: The best debate advice Joe Biden will ever get
  
  As Trump’s niece, Mary Trump,has observed, “He’s grasping at straws.”
  
  Not too long ago, Trump was the Teflon candidate. Even numerous indictments of his former associates and advisers, and allegations of sexual misconduct from a long list of women (he vigorously denies them all) haven’t been able to put a debilitating dent in him.  But as we head into the debates, it appears that Biden suddenly is besting him in the non-stick department. That leaves Trump in a bind. He has tried all of his anti-Biden material in advance, and the audience hasn’t bought it.
  
  Like some second-rate comic, Trump is telling the same jokes from 2016: that he’s the Washington outsider, his opponent is a swamp creature, it should be the 1950’s all over again and the election is rigged. Four years ago, these attacks may have seemed novel, but now these jabs have little sting. He’s proven to be a one-trick phony. Oh, how he must miss Hillary Clinton.
  
  In light of that, one might argue that he’s going to unveil some surprise attacks in the debates that help him actually land some punches. But keep in mind we are talking about a President who loves Tweet storming and television watching andhas claimed he isn’t keen on basic debate prep(though reportstell a slightly differentstory).
  
  The potential staging of these debates doesn’t favor Trump either. Physical distancing will eliminate any possibility of Trump lurking and stalking behind Biden, the weird attempt at intimidation heappeared to pullon Clinton. That’s assuming both men will even be on a stage together. The prospect that one or more of the debates might be held virtually must be a terrifying possibility for the Trump camp, given his robotic and wooden delivery when looking straight into a camera.
  
  Trump needs a crowd to play to; he feeds off the energy an audience provides. Without spectators, Trump has no one to gasp, laugh and dramatically react to his reality show shots,like telling Clintonin 2016 that if he were in charge, she’d “be in jail.”  It was the audience’s audible reaction that made that zinger a memorable moment.
  
