  The safe prediction is that Trump will attempt to bait Biden into a mud-wrestling match, since that’s where Trump feels most comfortable. This potential trap is not lost on Bidenwho sayshe’s determined to focus his efforts on the issues and not bitter, personal attacks. “I’m looking forward to getting on the debate stage with Trump and holding him accountable … I think I know how to handle bullies.”
  
  So, while Biden might have appeared wobbly during the first two or three Democratic debates, keep in mind, that was 12 debates ago. Biden’s much more prepared for this. Trump holding rallies and doing interviews with Fox News isn’t even light sparring. Perhaps the only way Trump will win these debates is if he can get someone else to climb into the ring for him.
