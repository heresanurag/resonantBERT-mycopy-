  5. A majority of voters want criminal justice and policing reform in the next congressional relief bill.
  
  While House Democrats included several important provisions related to criminal justice in theHEROES Act, the Senate has so far failed to include them. Formerly incarcerated business owners have beenblocked from accessing PPP Loansand prisons still remain clusters for coronavirus outbreaks due to the lack of PPE and testing. As Congress goes back to the table for negotiations, theopportunityis open for either party to champion relief for millions of justice involved people and their families.
  
  Fortunately, in just four years in the US Senate, Harris has become one of the Democrats’ most outspoken advocates for reforming a broken system of mass incarceration that counts more than2.3 million peoplebehind bars, and over6.7 million peopleon correctional control, according to the Prison Policy Initiative.
  
  Harris haspartnered with Republicanson bail reform and led Democrats to call for systemic changes to policing. She introduced one of the Democratic primary’s mostcomprehensive justice reform plans, advocating to legalize marijuana, reform sentencing and mandatory minimums, end the death penalty and solitary confinement, and put a stop to privatized prisons.
  
  Democrats and Republicans up and down the ballot in 2020 would be smart to follow Harris’ proactive lead on criminal justice reform.
  
  And, on Wednesday, I hope she seizes the moment to tell the world why she is the ideal leader to turn a new national consensus for reform into real change – as the next vice president of the United States of America.
