title: "Residents are digging out of record-breaking snowfall in Newfoundland, Canada"
date: "2020-01-19"
section: "Americas"
url: "https://www.cnn.com/2020/01/19/americas/newfoundland-snow-trnd/index.html"
content: |
  A record-breaking snowfall in Newfoundland, Canada, has left residents with the enormous task of digging themselves out of piles and piles of snow.
  
  St. John’s International Airport recorded 76.2 cm (30 inches) of snow Friday, according to Environment Canada, breaking the previous daily snowfall record set on April 5, 1999, of 68.4 cm (26.93 inches).
  
  Footage from the area this weekend showed residents digging themselves out of deep of snow covering streets and cars.
  
  Among those residents was Lola Parsons. She walked out to her car on Saturday morning but was surprised to find it wasn’t completely covered in snow, she said in a videoshared on Twitter. That’s because she forgot to roll her window up, and several inches of snow had piled inside.
  
  “It was so chaotic she forgot to put it back up” on Friday as she was pulling into her driveway, Parsons’ son, Kenny Sharpe told CNN.
  
  But his mother took it in stride, Sharpe said, as is apparent by her laughter in the video.
  
  “A good laugh this weekend during a trying time in this weather,” Sharpe said.
  
  Of course it’s not a laughing matter for everyone. A state of emergency remained in effect for parts of the province of Newfoundland and Labrador on Sunday morning, includingSt. John’sandParadise.
  
  St. John’s officials still wanted people to stay off the roads, butlifted some restrictionsSunday morning, allowing gas stations to open and pharmacies to open from noon until 7 pm.
  
  On Saturday,CNN news partners CBCreported that the federal government had approved the province’s request for assistance.
  
  “Whatever assistance we have available and we can mobilize on the ground will happen,” Natural Resources Minister Seamus O’Regan, who’s also Member of Parliament for St. John’s.
  
  TheCanadian Armed Forces announcedit was planning a response to the “unprecedented winter storm.”
  
