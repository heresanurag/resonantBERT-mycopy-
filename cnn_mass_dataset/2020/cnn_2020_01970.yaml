  Sala, who scored 42 goals for Nantes following his move from Bordeaux in 2015, had signed for then English Premier League club Cardiff for a reported £15 million ($19.3 million).
  
  However, the Welsh team has sinceappealed against the decisionordering it to pay six million euros ($6.65 million) for the forward.
  
  The Court of Arbitration for Sport says it expects to hold a hearing later in this year, though a decision is not expected before June 2020.
  
  Cardiff hasinvited fans to pay their respectsto both Sala and Ibbotson.
  
  Cardiff told CNN it plans to release a statement on Tuesday to mark the anniversary of Sala’s death.
