title: "UK launches coin to mark Brexit… again"
date: "2020-01-26"
section: "UK"
url: "https://www.cnn.com/2020/01/26/uk/brexit-coin-gbr-intl-scli/index.html"
content: |
  A commemorativeBrexitcoin has been unveiled by Britain’s finance minister Sajid Javid as the UK prepares to leave theEuropean Unionon Friday.
  
  The inscription on the 50 pence coin (worth about 65 cents) reads: “Peace, prosperity and friendship with all nations. 31 January 2020.”
  
  Around 3 million of the Brexit coins will enter circulation from Friday, with a further 7 million later this year.
  
  It's been a year of scandal and missteps for Britain's royals. Now the 93-year-old Queen is needed more than ever
  
  The introduction of the coins is one of several commemorative measures intended to mark Brexit – government officials confirmed thata projection of a clock counting downto the second the United Kingdom leaves the European Union on January 31 would shine onto the bricks of Downing Street, and light displays would illuminate government buildings.
  
  As part of the plans for Brexit day, UK Prime Minister Boris Johnson is due to give an address in the evening of January 31 and Union flags will be flown in Parliament Square. But not all of the celebrations scheduled to mark Brexit have gone smoothly.
  
  Queen appoints Prince William to new role amid royal shakeup
  
  In October, the Treasury confirmed to CNN that the UK’s Royal Mint hadstopped making a different batch of commemorative coins, which had the inscription of the October 31, 2019 – the scheduled date for the UK’s departure, which was later pushed to  January 31.
  
  The UK government had also come under pressure to back a bid for Big Ben to chime to mark Brexit, but, plans were scuppered after Commons authorities ruled out the proposal because it could cost £500,000.
  
  On Friday, EU chiefs Charles Michel and Ursula von der Leyen announced they had signed the Withdrawal Agreement, paving the way for European Parliament to ratify the UK’s departure. The European Parliament is expected to vote on the ratification on Wednesday.
