  CDC pressured by White House to change testing guidance
  
  The fallout from the CDC’s change to its coronavirus testing guidance continues after it was revealed yesterday that pressure from the Trumpadministration led to the move.
  
  Earlier this week, the CDC announced that it was no longer recommending coronavirus testing for most people without symptoms of Covid-19.  The administration’s testing czar, Adm. Brett Giroir, told reporters the guideline change had approval from Dr. Anthony Fauci and other members of the White House coronavirus task force.
  
  But Fauci told CNN he was not at the meeting as he was undergoing surgery, and warned that the guidance  would “give people the incorrect assumption that asymptomatic spread is not of great concern.”
  
  Asymptomatic peopleplay a major role in spreading the virus, and the Infectious Disease Society of America and IDSA’s HIV Medicine Association called for the immediate reversal of the revision on Wednesday. California said it would defy the CDC’s new guidelines and announced a new partnership aimed at increasing testingto 250,000 a day.
  
  Inside China’s push for a vaccine
  
  Scientists globally are racing to find a way to stop the virus. CNN visited the sprawling Beijing plant at the center of China’s vaccine drive, which was purpose-built in recent months to produce the country’s CoronaVac vaccine candidate,David Culver and Nectar Gan report.
  
  “If everything goes well, we hope that we can have some results around the end of the year,” said Helen Yang from the Chinese pharmaceutical company Sinovac Biotech, which developed the vaccine.
  
  Meanwhile in the US, a experimental vaccine from Moderna appears to be safe and elicits an immune response in all age groups, including the elderly, the firm said. But concerns are mounting that the Trump administration could pressure agencies to speed along approvals of vaccines.
  
  Yesterday, the American Medical Association and the Infectious Diseases Society of America both called on the US Food and Drug Administration to develop a plan for greater transparency in thedevelopment of coronavirus vaccines.
  
  Woman may have caught coronavirus in airplane toilet
  
  Researchers say they have evidence that a woman caught the coronavirus on a flight – perhaps in the plane’s restroom. The 28-year-old woman was one of roughly 300 South Koreans evacuated from Italy at the height of the pandemic in March. She wore a mask on the flight, except when she used the toiletwhich was shared by passengersseated nearby – including an asymptomatic patient.
  
  Officials who organized the flight had put into effect full infection control measures and tested everyone before they boarded. All the passengers and crew were quarantined when they got to South Korea. Six passengers tested positive soon after arrival, the woman developed symptoms eight days after the flight.
  
  There has been very little evidence about whether people can catch the virus on planes, although airlines have changed their policies – and evidence already shows aircraft ventilation systems can clean the air thoroughly.
  
  Europe’s second wave rustles feathers and takes down politicians
  
  In Spain, students have announced a national strikeover the conditionsfor a return to school. The Sindicato de Estudiantes is demanding smaller class sizes and for more teachers to be hired. The students plan to strike in mid-September.
  
  In Berlin, authorities have banned a protest planned for this weekend over the government’s coronavirus restrictions. Organizers had planned to march through the center of theGerman capital on Saturdayand as many as 17,000 participants had been expected to take part.
  
  And in Brussels,EU Trade Commissioner Phil Hoganbecame the latest – and one of the most high profile –  politicians to resign after breaching coronavirus-related restrictions. The Irish politician attended a political golf event in Galway in mid-August with 80 other people, a day after Ireland’s government imposed new restrictions to tackle a surge of cases. “Golfgate” has prompted the resignations of several other Irish politicians.
  
