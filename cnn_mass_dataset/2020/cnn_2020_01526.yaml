content: |
  A version of this story appeared in the August 27 edition of CNN’s Coronavirus:Fact vs. Fiction newsletter.Sign up here to receive the need-to-know headlines every weekday.
  
  The US is being hammered by twin disasters today. The coronavirus outbreak is complicating efforts to evacuate people as Hurricane Laurabarrels into the Gulf Coast.
  
  More than 1.5 million Texas and Louisiana residents wereunder evacuation ordersafter the National Hurricane Center warned of “unsurvivable” storm surges of 20 feet or higher. Laura, which made landfall as a Category 4 storm before being downgraded to a Category 2 as it made its way inland, could overwhelm coasts and lead to surges reaching some 30 miles inland.
  
  Evacuations have been hampered by Covid-19 safety protocols. Social distancing measures meant extra buses were needed to transport people out, and Louisiana residents were taken to hotels instead of shelters in an effort to keep numbers down,Theresa Waldrop writes.
  
  But the financial fallout from the pandemic may have affected some people’s ability to pay for hotel rooms. “They can’t necessarily get a hotel room, or they can’t afford the gasoline and the cost of traveling hundreds of miles out of town, or out of an evacuation zone,” former Federal Emergency Management Agency Administrator Brock Long told CNN.
  
  A pre-print study byColumbia University and the Union of Concerned Scientists (UCS)warned in early August that a large-scale hurricane evacuation would increase Covid-19 cases in evacuees’ origin and destination counties.
  
  But the storm also presents another challenge: Keeping up with the testing needed to detect and contain coronavirus outbreaks. “The challenge is we are going to be blind for this week,” said Gov. John Bel Edwards of Louisiana, after coronavirus testing in the state was paused due to the storm.
  
  Q: Why waste a test kit on a person without symptoms?
  
  A: Some people with Covid-19 have mild symptoms, or no symptoms at all. And in some cases, symptoms don’t appear until up to 14 days after infection.
  
  During that incubation period, it’s possible to get the coronavirus from someone with no symptoms. It’s also possible you may have Covid-19 without feeling sick and are accidentallyinfecting others.
  
