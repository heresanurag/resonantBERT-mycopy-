  The start of the college football season is just around the corner, but only a few teams will be lining up on the gridiron as the NCAA has cancelled its fall championships. CNN’s Chief Medical Correspondent Dr. Sanjay Gupta talks to Dr. Hainline about the risks that college athletes face and how the NCAA is responding.Listen Now.
