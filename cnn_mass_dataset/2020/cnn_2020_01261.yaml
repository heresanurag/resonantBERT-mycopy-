title: "ICYMI: Trump’s massive India rally"
date: "2020-02-24"
section: "Politics"
url: "https://www.cnn.com/2020/02/24/politics/donald-trump-india-rally-modi/index.html"
content: |
  President Donald Trump traveled abroad to India and received a very special treat: A large crowd of supporters.
  
  But it wasn’t just any large crowd – it could beTrump’s largest crowd ever.
  
  Thanks to Indian Prime Minister Narendra Modi, the “Namaste Trump” rally was held in India’s largest cricket stadium with a capacity of 110,000.
  
  Rather than Trump’s iconic red hat-wearing supporters back in the US, those in this audience wore white “Namaste Trump” hats. Before Trump walked out, the stadium played musical mainstays from Trump’s rallies, includingElton John and “Macho Man.”
  
  In each episode of his weekly YouTube show, Chris Cillizza will delve a little deeper into the surreal world of politics. Click to subscribe!
  
  The 36-hour trip as a whole highlights the bond between Trump and fellow populist Modi. Trump praised Modi as a “true friend” and an “exceptional leader” whose rise to leadership as the son of a tea seller was an example of the country’s “limitless potential.”
  
  The President and first lady Melania Trump also toured the Taj Mahal. On Tuesday, Trump will have formal talks with Modi in the capital New Delhi and a state banquet on Tuesday evening.
  
  This isn’t the first international Trump visit designed to impress the President. Trump so enjoyedFrance’s Bastille Day celebrationduring a trip to Paris in 2017 that he used it as inspiration for hisrebooted July 4th celebrationin Washington, DC.
  
  The Point: India and Modi wooed Trump with a gift the President loves – a massive crowd.
