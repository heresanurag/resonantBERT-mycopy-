title: "Inside the federal prison where three out of every four inmates have tested positive for coronavirus"
date: "2020-08-08"
section: "US"
url: "https://www.cnn.com/2020/08/08/us/federal-prison-coronavirus-outbreak-invs/index.html"
content: |
  When James Giannetta first called his brother Russ in late June to tell him that the coronavirus was beginning to spread in his Texas federal prison, Russ could hear the fear in his voice. “This place is exploding,” James warned.
  
  Russ soon got another call: James, a 65-year-old inmate with diabetes and HIV, had tested positive for the virus himself. Within days, he was rushed to a hospital as his oxygen levels plummeted. A few weeks later, after his condition deteriorated and he was placed on a ventilator, he was dead.
  
  As coronavirus has spread rapidly through prisons and jails around the country in recent months, the Texas lockup where Giannetta spent his last days has emerged as the hardest-hit federal prison in the United States. More than 1,300 of the roughly 1,750 prisoners at FCI Seagoville prison and camp have tested positive for the virus, according todatafrom the federal Bureau of Prisons – a stunning three out of every four inmates. So far, three inmates at the prison, including Giannetta, have died from Covid-19.
  
  Five Seagoville inmates told CNN in phone interviews from behind bars that they feared for their lives as the virus rushed through the Dallas-area prison, and that the crowded conditions made it all but impossible for them to stay socially distanced.
  
  “It came through here so fast that it’s out of control,” said Bobby Williams, an immunocompromised inmate who has about three years left on a more than two-decade drug sentence. He said he came down with severe pneumonia after contracting Covid-19 in June. “We’re packed like sardines.”
  
  As the BOP has scrambled to stanch the spread of the virus in its facilities, the toll at Seagoville and elsewhere raises questions about whether the Trump administration is doing enough to release elderly and medically vulnerable prisoners – even as several high-profile inmates like former Trump campaign manager Paul Manafort, former Trump lawyer Michael Cohen and the rapper Tekashi 6ix9ine have beenreleased from prisonto home confinement.
  
  The BOP declined repeated requests for an interview with officials at Seagoville or national officials involved in setting coronavirus policy. A spokesperson said the agency distributed cloth masks to every inmate and guard, began mass testing of inmates in the prison by late June and stepped up sanitation procedures, among other policy changes.
  
  But the low-security men’s prison – whichonce heldJapanese and German detainees during World War II, among others – is now a cautionary tale for how quickly the coronavirus can take deadly hold in correctional facilities.
  
  Since the beginning of May, when there was only a single coronavirus case at Seagoville, the number of inmates who have tested positive has soared to 1,333, according to BOP data (including prisoners at a minimum-security camp next to the prison). Twenty-eight of the roughly 300 prison employees have also tested positive.
  
  The outbreak means that the facility has more coronavirus cases than about 85% of the counties in the US.
  
  Dr. Homer Venters, the former chief medical officer for New York City’s jail system, who has inspected federal prisons’ coronavirus response plans, said outbreaks at Seagoville and other prisons were like “popcorn kernels popping off over an extended period of time.”
  
  “There are many facilities that either have gone through the same thing or will,” he predicted. “This is really a tragic situation that’s playing out all over the country.”
  
  Prisoner rights advocates say that the BOP has fallen short on the most effective way to save inmate lives: reducing the number of vulnerable people inside the prisons.
  
  Federal inmates have two paths to early release during the pandemic. The BOP is evaluating inmates forhome confinement, which is granted based on factors like inmates’ age, risk factors for Covid-19, the seriousness of their offense and their conduct in prison. Manafort and several other high-profile inmates were released under this method, which was expanded under the CARES Act earlier this year.
  
  The agency has released 7,444 inmates to home confinement nationwide over the last four-and-a-half months, according todata releasedby the agency, out of the more than 157,000totalin the federal system. A spokesperson declined to provide specific numbers for Seagoville or other individual prisons, citing “the fluid nature of the pandemic situation.”
  
  Inmates can also apply for compassionate release, a procedure that was streamlined with the passage of theFirst Stepcriminal justice reform act in 2018. Inmates with health issues can ask a judge to reduce their sentence; they can also apply to their warden for the federal government to file a court motion for release on their behalf. So far, roughly 900 additional inmates have been released through that track this year, according to Families Against Mandatory Minimums, a criminal justice reform group that has helped recruit attorneys to represent inmates in coronavirus cases.
  
