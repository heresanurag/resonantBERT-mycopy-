title: "Sarah McBride wins Democratic primary in Delaware on path to become first-ever transgender state senator"
date: "2020-09-16"
section: "Politics"
url: "https://www.cnn.com/2020/09/16/politics/sarah-mcbride-delaware-primary/index.html"
content: |
  Transgender activistSarah McBrideon Tuesday won her party’s nomination in Delaware for a state Senate seat, CNN projects, putting her on the path to become the first person in the US who publicly identifies as transgender elected to that position.
  
  McBride won over 91% of the vote for the Democratic primary in Delaware’s 1st District, according to the DelawareDepartment of Elections.
  
  “Tonight sends a powerful signal that candidates like me can win,” McBride wrote onTwitterTuesday night. “Everyone deserves to see themselves in government, to follow their dreams, and to be accepted by their community. I will never take for granted the honor of carrying that mantle.”
  
  Her Democratic opponent in the primary, Joseph McCole, told CNN he concedes the race to McBride and wishes her well.
  
  McBride, who serves as a Human Rights Campaign’s spokesperson, is favored to win in November against Republican candidate Steve Washington in the heavily Democratic district, which includes the city of Wilmington.
  
  The district’s incumbent, Democratic state Sen. Harris McDowell, plans to retire at the end of his term in 2020, after serving for nearly four decades in the state legislature.
  
  McBride ran on expanding access to health care and paid leave, increasing Delaware’s minimum wage, and reforming the criminal justice system.
  
  If elected in November, McBride would also be Delaware’s first out LGBTQ person elected to the state legislature.
  
  McBride has already made history, becoming the first transgender person to speak at a major party convention when she addressed theDemocratic National Convention in 2016. She was also the first out transgender White House staffer when she interned in the Obama White House.
  
  At age 21, she was student body president at American University, when she came out in 2012 as transgender in a Facebook post and an op-ed in the student newspaper.
  
  In 2013, she advocated for the passage of Delaware’sgender identity non-discrimination act, which was signed into law that year.
  
  McBride also worked on the late Beau Biden’s campaign for Delaware attorney general, and former Vice President Joe Biden wrote the foreword for her 2018 memoir, “Tomorrow Will Be Different.”
  
  “She was honest and heartfelt,” Biden wrote, recalling McBride’s coming-out essay in 2012. “Even at that young age she was a leader. Not because she thought she was better than anyone else, but because she treated everyone as equals. She was a Biden even then.”
  
  The head of a political action committee that aims to elect LGBTQ politicians to office said McBride’s victory “will inspire more transgender people to run for elected office.”
  
  “At a time when the Trump administration, cynical politicians and too many state legislatures are attempting to use trans people as political weapons, Sarah’s win is a powerful reminder that voters are increasingly rejecting the politics of bigotry in favor of candidates who stand for equality,” Mayor Annise Parker, the president and CEO of the LGBTQ Victory Fund, said in astatement.
  
  McBride is one of a handful of transgender candidates running for state legislative office this election.
  
  “As the first transgender speaker at a national party convention, Sarah spoke for a community long ignored and pushed to the sidelines. As the first transgender person to work at the White House, she spoke truth to power advocating for her community in halls that were unfamiliar to anyone similar to her,” Human Rights Campaign President Alphonso David said in a statement Tuesday. “Next year, as the first transgender state senator in our nation, Sarah will show that any child can achieve their dream, no matter their gender identity or sexual orientation.”
