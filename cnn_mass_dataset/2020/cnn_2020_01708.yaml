title: "Melania Trump used private email to conduct official White House business, former senior adviser says"
date: "2020-09-02"
section: "Politics"
url: "https://www.cnn.com/2020/09/02/politics/melania-trump-private-email-wolkoff-cnntv/index.html"
content: |
  First lady Melania Trump used private email accounts rather than her White House email to discuss official White House business, according to her former senior adviser Stephanie Winston Wolkoff.
  
  “Melania was never working on policy, no excuses. But again, a very difficult road to go down with as far as what the White House was willing to open her avenue to participate,” Wolkoff told CNN’s Alisyn Camerota on “New Day” Wednesday.
  
  A first lady is not a federal employee and not subject to the samelawas those working for the President or vice president restricting the use of a personal email account to conduct official government business. However, Trump’s reported use of private email accounts came after her husband, President Donald Trump, railed against Hillary Clinton for her use of a private email server – instead of a government email account – during her time as secretary of state, and made it a central part of his campaign against her in the 2016 election.
  
  The first lady’s spokeswoman, Stephanie Grisham, told CNN in a statement Wednesday evening, “In consultation with White House ethics officials, from the beginning of the Administration, the First Lady and her staff have taken steps to meet the standard of the Presidential Records Act, relating to the preservation of records that adequately document official activities.”
  
  Asked by CNN why Trump would use a private email after her husband’s attacks against Clinton, Wolkoff said Wednesday, “Does it really surprise you? … I think the Trumps are the Trumps. And they do whatever they want to do and they go by their own rules. It’s unfortunate.”
  
  Wolkoff also told CNN that she and Trump corresponded on private email accounts because Wolkoff lacked access to a White House email account for the first month.
  
  Wolkoff’s claims about the first lady’s use of a personal email was first reported byThe Washington Post.
  
  Wolkoff told the Post that Trump used a private Trump Organization email account, a MelaniaTrump.com email account, iMessage and Signal, an encrypted messaging app.
  
  The Post reported Tuesday that it viewed messages that appeared to be from Trump discussing government hires and contracts, the Trumps’ schedules for the Israeli and Japanese state visits, the first lady’s “Be Best” initiative, the White House Easter egg roll, and the presidential inauguration finances.
  
  Wolkoff did not mention Melania’s private email use in her new book “Melania and Me,” out Tuesday, in which she alsodetails the allegedly contentious relationshipbetween Melania and first daughter Ivanka Trump.
  
  Grisham previously told CNN that Wolkoff’s book was “not truthful” and said Wolkoff overstated her friendship with Trump.
  
  “This book is not only wildly self-aggrandizing, it’s just not truthful. It is an exercise in bizarre twisting of the truth and misguided blame for the sake of self-pity. It’s unfortunate and concerning that she’s overstated their friendship and her very brief role in the White House to this degree,” Grisham said.
  
  Wolkoff, a former director of special events for Vogue magazine, helped organize events around Trump’s inauguration and was Melania Trump’s first hire in the East Wing, briefly working as an unpaid special government employee. But as investigations into inaugural activities progressed, the$26 millionWolkoff’s firm was paid, nearly all but $1.6 million of which went to subcontractors, caused a rift with the Trump family.
