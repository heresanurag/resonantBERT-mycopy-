title: "The Dow just hit 30,000. It was a long road to get there"
date: "2020-11-24"
section: "Investing"
url: "https://www.cnn.com/2020/11/24/investing/dow-path-to-30000/index.html"
content: |
  Dow 30,000 is a milestone nearly 125 years in the making.
  
  The average began tracking themost powerful corporate stocksin 1896, and it has served as a broad measure of the market’s health through 22 presidents, 24 recessions, a Great Depression and two global pandemics. Along the way, it also weathered at least two stock market crashes and innumerable rallies, corrections, bull and bear markets.
  
  The blue chip index took just over 120 years tocrack the 20,000 markfor the first time in early 2017, just after President Donald Trump took office. It needed just less than a year after that to reach the25,000 markon January 4, 2018.
  
  But the last three years have been more of a roller coaster ride. The Dow and the S&P 500 bothclosed lower in 2018, marking the worst year for blue chip stocks in a decade.
  
  The market bounced back withgains in 2019but then amassive sell-offin February and March brought an end tohistory’s longest bull market, as the coronavirus pandemic hit stateside. That plunge included the threelargest one-day point dropson record in the course of only six trading days in mid-March.
  
  Fortunately for equity investors, thebear marketturned out to be short-lived. With theFederal ReserveandCongressproviding economic relief,the blue chip indexes have recapturedall of their earlier losses, and then some, since that March sell-off.
  
  Withuncertainty about the outcomeof thepresidential electionlifted and new hopes that a Covid-19vaccine could soon be available, the market is on a roll once again. It crossed the 30,000 mark for the first time in trading Tuesday.
  
  Here are some important stops along the Dow’s road to 30,000:
  
  Dow is formed:The first daily close, on May 26, 1896, was 40.94. The Dow did not get off to a good start, plunging 30% to an all-time low of 28.48 by August that year.
  
  Dow 100:The Dow first closed in triple digits in January 1906. That marked an impressive rally for the average, which had hit an all-time low when Teddy Roosevelt was president. The Federal Reserve would not be created for seven more years.
  
  Crash of 1929:The Dow fell 38 points on Oct. 28 and 31 more points the next day. That might not sound bad today, but it represented back-to-back declines of 13% and 12% of the Dow’s value. They are still two of the worst one-day percentage declines in the index’s history.
  
  Dow 1,000:Nov. 14, 1972. Richard Nixon had just won re-election by taking 49 states. The Dow’s components, which had been unchanged for 13 years, included Woolworth, Eastman Kodak and International Nickel.
  
  Crash of 1987:On Oct. 19, the Dow plunged 508 points, a 23% drop that is still the largest one-day percentage decline in history. A week later it took an 8% plunge. But the damage was short-lived: Within a year, the Dow was back to pre-crash levels.
  
  Dow 10,000:March 29, 1999. The “irrational exuberance” of the tech bubble was in full swing as the Dow gained 1,000 points in less than a year to hit this benchmark. It gained 1,000 more points in just the next month.
  
  A year later, thedot-com stock bubble burst, sending the Dow down nearly 30% by September 2001.
  
  Meltdown of 2008-2009:The financial crisis caused the Dow to lose about half its value in less than a year, bottoming out to close at 6,547 on March 9, 2009. The worst day was Sept. 29, 2008, when the Dow lost what was then arecord 778 pointsafter Congress rejected a $700 billion bank bailout. The bailout was later approved.
  
  Dow 15,000:May 7, 2013. As the economy continued to recover from the Great Recession, the Dow had one of the current bull market’s strongest periods. It crossed the 15,000 mark and finished the year up 26.5%, marking the best full-year performance of the current bull market. The Dow nearly matched that in 2017, rising 25%.
  
  Dow 20,000:January 25, 2017. The stock market had enjoyed a nice runstarting on the day after the 2016 election, with the Dow gaining nearly 10% as investors looked forward to lower taxes and less regulation under the Trump administration.
  
  Dow 25,000:Jan. 4, 2018. Thepassage of the Trump tax cuts, especially the lowering of the corporate tax rate in December 2017, helped feed the quick move between 20,000 and 25,000.
