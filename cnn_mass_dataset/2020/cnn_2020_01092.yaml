title: "MLB postpones Cardinals’ series against Pirates after more test positive for Covid-19"
date: "2020-08-10"
section: "US"
url: "https://www.cnn.com/2020/08/10/us/cardinals-covid-emergency-room-spt/index.html"
content: |
  Major League Baseballhas postponed scheduled games between theSt. Louis Cardinalsand thePittsburgh Piratesafter additional members of the Cardinals’ team and staff tested positive for Covid-19.
  
  The Cardinals organization told CNN Sunday that John Mozeliak, the team’s president of baseball operations, confirmed one additional Cardinals player has tested positive.
  
  A total of 17 members of the organization – 10 players and seven staff – have tested positive for the virus, resulting in the postponement of the three-game series between the teams scheduled for Monday through Wednesday atBusch Stadiumin St. Louis.
  
  The Cardinals have now had 13 games postponed. The team has not played a game since July 29.
  
  “In light of the most recent positive test results,MLBand the Club believe it is prudent to conduct additional testing while players and staff are quarantined before the team returns to play,” the MLB said of the postponement in a statement Sunday.
  
  St. Louis Cardinals have another series postponed because of positive coronavirus tests
  
  At least three teams in the league have had games postponed since the start of the shortened season after members tested positive for the virus.
  
  TheMiami Marlinshad an outbreak that put their season on hold after 21 members of the organization tested positive. ThePhildelphia Phillieshave had two staff members test positive for the virus.
  
  As a result, theleague announced stricter guidelinesfor teams as they continue to play through the season.
  
  The changes include reducing the size of traveling parties, requiring staff members and players to wear face coverings while on the road and prohibiting players and staff from meeting in hotel rooms without special permission.
  
  Some members of the Cardinals have had to go to the emergency room after experiencing symptoms of Covid-19, manager Mike Shildt revealed during a radio interview with KMOX Sunday.
  
  Mozeliak confirmed one player and one staff member of the Cardinals visited a hospital, although neither was hospitalized. Both are back at home.
  
  MLB teams struggling to contain outbreaks and one CEO says cases may be a wakeup call
  
  “There are people that have symptoms, and have had a few visits to the ER for some IVs and a little more clarity.” Shildt said during a radio interview withradio station KMOXSunday.
  
  “Nobody has had to stay. But there are people dealing with – I mean, this is real. And people are experiencing a lot of the symptoms that we hear about, that are associated with this. A variety of them. Most of them are experiencing multiple ones. Seems like they rotate with them,” Shildt told the station. “And again, nobody is in close to any critical shape, but people are having to deal with some things that aren’t comfortable at all.”
  
  As the team continues to battle the virus, the MLB will make a decision about the Cardinals return to the field and announce it later this week, the league said in a statement.
