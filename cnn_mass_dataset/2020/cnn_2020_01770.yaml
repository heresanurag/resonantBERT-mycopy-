title: "When it comes to Covid-19, another case of white flight"
date: "2020-05-11"
section: "Opinion"
url: "https://www.cnn.com/2020/05/11/opinions/covid-19-case-white-flight-johnson/index.html"
content: |
  Editor’s Note:Derrick Johnson is the president and CEO of the NAACP, America’s largest civil rights organization. Follow him on Twitter@DerrickNAACP. The views expressed in this commentary are those of the author. Viewmore opinionon CNN.
  
  For a minute there, it looked like we were all in this together. And then we weren’t.
  
  From embracing stay-at-home orders to stop the spread of Covid-19, we’ve come to see armed protestersstorm state capitolsto end the lockdown. Why has the attitude toward the pandemic crisis shifted so greatly?
  
  Dataemergedthat, for the first time, specified infection and death rates by race – and the face of the pandemic changed. It became Black. And the fragile sense of social solidarity that was keeping millions of Americans at home to protect themselves and each other began to crumble.
  
  Call it white flight.
  
  Throughout the 20th century – andeven today– as Black people moved into previously segregated neighborhoods, the existing white residentsmoved outin large numbers. The coronavirus pandemic and worldwide lockdowns may be new to the globe, but the racial dynamics underlying our nation’s response are wearyingly familiar.
  
  I was not surprised to learn that Black people arethe hardest-hitby the virus or the least-served by the institutions, systems, and leaders charged with addressing the pandemic. African Americans, who comprise 13% of the US population,make up nearly 28%of Covid-19 cases.
  
  We knew that people of colorare overrepresentedin poorly paid but suddenly essential frontline jobs, that African Americansare more likelyto live in crowded housing making social distance difficult. We recognized that Black peopletend to livein highly polluted neighborhoodsresulting in higher ratesthan white people of the respiratory conditions that make patients most vulnerable to dying from Covid-19.
  
  Van Jones: I'm someone Covid-19 could easily kill. Here is what I'm doing about it
  
  It wasn’t a surprise to many of us that the shortage of hospitals and health care providers serving our communities, combined with thebiased assumptionsthat lead doctors to undertreat Black people’s pain andheart attacks, would result in African Americans finding it harder to get tested and treated.
  
  And we knew that as soon as the pandemic became racialized, many Americans would no longer be willing to make sacrifices in order to address a crisis that suddenly seemed to be not about “us” but about “them.”
  
  Take a look at the timeline. On April 8, the the Centers for Disease Control and Preventionreleased a reportshowing that Black people were dramatically over-represented among Covid-19 patients sick enough to be hospitalized.
  
  Five days later, on April 13, a small but furious group of protesters, virtually all white, some wearing MAGA hats,gathered outsidethe Ohio statehouse to demand Gov. Mike DeWine reopen the state.
  
  It didn’t stop there. From Texas to North Carolina the protesters gathered – organized byright-wing groupsandsupported by Republican legislators, including the president – many wearing Trump gear, and some displaying Confederate flags and brandishing automatic weapons. The same scene repeated onApril 30 in Michigan, when armed protesters stormed the state house and tried to push their way in.
  
  A Fox Nation hostlikenedthe nation’s stay-at-home orders to “willful slavery” in a since-deleted tweet. A state senator in Michiganmade the connectioneloquently but silently, by wearing onto the legislative floor a face mask that resembled the Confederate flag.
  
  This racialization of public events is nothing new. From former President Richard Nixon’s war on drugs, which a top aidelater acknowledgedwas designed to criminalize Nixon’s “two enemies: the antiwar left and black people;” to former President George H.W. Bush’suse in 1988of the infamous “Willie Horton” campaign ad, which became the very definition of a racist dog whistle; to the Russiansswamping social mediawith posts about the Black Lives Matter movement in order to drive white voters to Trump in 2016, racist scare tactics have long been used to pit Americans against one another. During this pandemic, racism has already been weaponized to splinter any national unity.
  
  Lives and livelihoods are at stake, most acutely in Black and brown communities – but so is our democracy. We are seeinghigh levels of scarcity, withextreme unemployment numbers, while the nation’s chief executive uses his bully pulpit to sow division and demonize otherness. With the elections approaching, our country could sink to a level of tribalism that leads to violence.
  
  We could make this another instance of white flight – from public health realities, from collective responsibility, from the recognition that the pandemic imperils people of all colors and communities. Or we could answer the call to rise together and fight the pandemic, using science and reason as our guides and democracy as our beacon.
  
  Our nation’s fractured history does not need to be our destiny. As the virus burns through our communities, upending life as we knew it, let’s take this chance to reject the habits of hatred and move forward together, rebuilding our country and a future in which health and economic mobility are within reach for us all.
