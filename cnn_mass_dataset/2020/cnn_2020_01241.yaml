title: "Instacart now valued at nearly $14 billion after ‘unprecedented surge’ in demand during pandemic"
date: "2020-06-11"
section: "Tech"
url: "https://www.cnn.com/2020/06/11/tech/instacart-funding-valuation/index.html"
content: |
  Almost exactly three years ago, industry watcherswondered if Instacart was doomedafter Amazon acquired Whole Foods — one of Instacart’s biggest partners at the time. Now, the grocery delivery service is more valuable than ever thanks in large part to the pandemic.
  
  Instacart announced Thursday that it has raised $225 million in an investment round led by venture capital firms DST Global and General Catalyst, pushing its valuation up to $13.7 billion.
  
  The influx of cash comes as Instacart “continues to experience an unprecedented surge in customer demand,” the company said, as households increasingly ordered groceries online because of nationwide lockdowns.
  
  “Overnight, Instacart became an essential service for millions of families across North America,” the company’s founder and CEO Apoorva Mehta said in a statement Thursday.
  
  To meet the surge in demand, Instacarthired 300,000 new workersearlier this year and later said it wouldhire another 250,000. The rapid growth sets Instacart apart from some other on-demand companies such as Uber and Lyft, which were hit by steep declines in bookings for their core ride-hailing businesses.
  
  Instacart changes policy after CNN Business report on tip baiting
  
  While Instacart has emerged as one of the big winners from the pandemic, it hasfaced accusationsof not doing enough to protect its on-demand workers,who are not treated as employees. Some of those workers, known as shoppers, began protesting in March, calling for several changes including a form of hazard pay or an extra $5 per order, as well as a default tip of 10%.
  
  The company alsochanged its tipping policyfollowing areport from CNN Businessabout the practice of “tip baiting,” where customers entice shoppers with tips as large as $50 or more only to change the tip to zero after the order is completed. The policy change came days after four democratic senators called on the Federal Trade Commission toinvestigate the practice.
