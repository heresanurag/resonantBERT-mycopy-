title: "What the US can learn from how African countries handled Covid"
date: "2020-11-03"
section: "Africa"
url: "https://www.cnn.com/2020/11/03/africa/africa-coronavirus-lessons-opinion-intl/index.html"
content: |
  Editor’s Note:Ahmed Mushfiq Mobarak is a professor of economics at Yale University and Rifaiyat Mahbub is the program manager of the Yale Research Initiative on Innovation and Scale. The opinions expressed in this commentary are those of the author. View moreopinion articleson CNN.
  
  Epidemiologists had expected weak health systems in Africa to crumble under the weight of Covid-19. Eight months into the pandemic, Africa with a population of 1.3 billion, reported nearly1.8 million Covid infections, while the US, on its way to its third peak, has reported more thannine million cases.
  
  While some of this low reporting could be attributed to poor testing, Africa as a continent appears to have handled the pandemic more effectively than the US has.
  
  As of November 1, Rwanda and Senegal, for example, have reported0.28 and 2.04 Covid deaths per 100,000 peoplerespectively, while the corresponding number for the US is a staggering 70.4.
  
  Rwandans are now allowed to travel to Europe, whileAmericans remain prohibited.
  
  Countries that have managed to contain Covid-19 have attained greater normalcy in their lives, while the everyday activities of ordinary Americans remain constrained, their lives lessened and threatened.
  
  This great reversal of fortune is stunning when one accounts for the immense differences in wealth in these two locations.
  
  Scientists are puzzling over the underlying factors driving Africa’s success – is it the relatively young population, lower connectivity to disease epicenters, cross-reactive immunities, or differences in lifestyle?
  
  While many factors contribute to differences in Covid-19 outcomes, there are striking differences in the quality of leadership, disaster preparedness, conformity to scientific advice, and coherence in pandemic response strategies that appear to have played important roles.
  
  Tackling this pandemic effectively requires collective behavior change and instilling a sense of civic duty. Leaders must inspire citizens to make sacrifices to protect one another. President Macky Sall of Senegaldecided to self-quarantineeven after testing negative for SARS-COV2, only because he was exposed.
  
  In contrast, several ofUS government leaderscontinue to ignore basicsocial distancingandmask guidelinesset by their own Centers for Disease Control and Prevention. They continue to host largerallies, and have encouraged people to gather in groups andprotest against social distancing. This is a failure of leadership.
  
  The experience of dealing with prior epidemics prompted several African leaders to quickly enact aggressive measures that closed airports in mid-March and restricted people’s movement to slow the spread of coronavirus.Senegal,Rwanda,MauritiusandLiberiabegan planning their COVID response as soon as the virus alerts were sent internationally and began screening and quarantining travelers at the airport. Ghana and Nigeria banned travel between cities and implemented curfews.
  
  Within a week of its first reported case,Kenya shut its schools, banned gatherings, and enforced a mandatory 14-day quarantine for incoming travelers.South Africaimplemented one of the toughest lockdowns in the world.
  
  In contrast, the US was slow to react, and remained indecisive. Although the federal government banned travel by foreign nationals from China and eventually other countries, including parts of the EU, they failed to follow it up with any coherent plan, continueddenying the severity of Covid, and made unscientific statements about how thevirus will disappear like a miracle. There were failures at both the federal and state levels.
  
  Another key difference between the leadership of many African nations and the US is the extent to which people with public health policy and pandemic expertise were allowed to set guidelines.
  
  Many African countries focused on expanding testing capacity on the advice of epidemiologists. WHO and its technical partners sourced more than2.1 million tests to the region and trained 100,000 health workers.
  
  Within six months, Africa’s readiness score in infection prevention and control hadrisen from 62% to 78%. Fourteen countries in Africa now perform more than 100 tests per 10,000 people.
  
  Senegal builtinfrastructurethat allows Covid test results early on to be generated within 24 hours. Rwanda andSierra Leonerepurposed HIV and Ebola equipment for Covid tracking, testing, and quarantining.Ghanaand Rwanda pursued creative innovations such as pooled testing – where multiple blood samples are first tested and if a positive result is found, individual tests carried out.
  
  Senegal partners with UK lab to develop a hand-held coronavirus test kit
  
  Contact tracing is another critical public health tool to slow disease spread. Many African countries used networks of community health workers and volunteers to conduct extensive contact tracing.South Africa, Cameroon, Mauritania, Ghana, Rwanda, Senegal, and parts of Nigeria have set up large-scale community door-to-door campaigns to test, treat, and isolate potential Covid patients.
  
  In contrast, President Donald Trump has continuously attributed the number of cases in the US directly to testing, but experts say that testing alone doesn’t explain the high rate of infection. After President Trump contracted Covid, theWhite House did not appearto carry out thorough contact tracing efforts for those who attendedAmy Coney Barrett’s Supreme Court nomination celebration held at the Rose Garden, thought to be a super spreader event after multiple guests tested positive for the virus.
  
  Moreover, the federal government has takena hands on approachin setting CDC guidelines often leading toconflicting information. This has eroded public trust in the CDC, an agency that had previously successfully contained the transmission of several diseases globally. Top scientists managing the US government’s responsehave resigned. These developments have had immediate, real effects:vaccine hesitancyis now at record highs in the United States.
  
  Theglobal Covid-19 response indexranks New Zealand and Senegal as the two best responders to Covid-19. Their leaders followed scientists’ recommendations, and relayed clear, consistent messages to their citizens to encourage positive behavior change.
  
  Many African countriesemployed communication strategiesthat led to rapid changes in norms around mask-wearing, sanitizing and distancing. Rwanda useddronesattached to loudspeakers, chastising pedestrians for not wearing masks. Senegalese musicians encouraged people to stay at home and wash hands. Political leaders in Sierra Leone made cameo appearances in such music videos. Trusted local community leaders and town criers were deployed to relay health messaging.
  
  In contrast, American leaders often provided conflicting,misleadingandinaccuratemessages, politicized theadoption of basic preventative measuresandeven ridiculed mask use. This has led tosocietal conflicts.While imposing lockdowns may be complicated and costly, implementing basic hygiene protocols, and masking requirements are not, and they cancut transmission rates by halfor more.
  
  The Covid-19 pandemic is global, and effective responses requireinternational cooperation.
  
  The US, which had taken the lead coordinating role in most global crises over the past century, abdicated its leadership position early during this pandemic. Other global powers will have to fill that vacuum, but African countries took on promising regional coordination roles.
  
  In February, Institut Pasteur in Senegal and the National Institute of Communicable Diseases in South Africa were theonly two laboratories in Africathat had coronavirus testing capacity. This institute trained staff from dozens of other countries on how to test for Covid and by April, 43 countries in the African continent were able to diagnose coronavirus.
  
  The rapidly escalating death toll in the US is tragic because much of it was avoidable. But African nations offer a hopeful message for the future.
  
  Epidemics are inevitable, but clear-headed, evidence-informed leadership can mitigate the human consequences of this disease.
