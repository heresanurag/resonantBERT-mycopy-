id: cnn_2020_01986
title: "Georgia GOP lieutenant governor says ‘no credible examples’ of voter fraud"
date: "2020-11-09"
section: "Politics"
url: "https://www.cnn.com/2020/11/09/politics/geoff-duncan-georgia-election-fraud-cnntv/index.html"
content: |
  Georgia Lt. Gov. Geoff Duncan, a Republican, said Monday his office has not seen any evidence of widespread voter fraud or irregularities in his state as President Donald Trumpcontinues to claima second term in office was stolen from him.
  
  Joe Biden, who declared victory in the election after winning Pennsylvania Saturday, is ahead of Trump in thePeach Stateby at least 10,498 votes as of Monday morning. CNN has not projected a winner in Georgia.
  
  'Trump can still win': The President's supporters remain defiant after Biden's victory
  
  Trump has not conceded the election, and he continues to makeunfounded claims about voter fraud.
  
  Last week, the President and Republican allies filed several lawsuits in key states challenging the election process and alleging voter fraud. Alawsuit filedby Georgia Republicans to prevent the “unlawful counting of ballots received after the election” in Savannah was dismissed by a state judge Thursday.
  
  Duncan told CNN’s John Berman on “New Day” when asked if he’d seen any evidence of widespread systemic voter fraud or irregularities, “We’ve not seen any get to our office yet.”
  
  “And certainly we’ll make sure that every sort of legal opportunity to make sure that – if there’s an issue out there, we want to make sure we understand it, investigate it and be able to make sure we were able to rectify it,” Duncan said. “We’ve not had any sort of credible incidents raised to our level yet and so we’ll continue to make sure that the opportunity to make sure every legal ballot is counted is there, but you know at this point, we’ve not seen any sort of credible examples.”
  
  The Trump campaign set up avoter fraud hotlinelast week although there has been no evidence of widespread voter fraud. The President has claimed publicly and falsely that he won the election, but sources told CNN that Trump is not denying the outcome privately.
  
  Asked if people should be making claims of widespread voter fraud at a national level without evidence, Duncan said everybody has the right to have their opinion heard and election officials are “here and available for anybody who has a credible example of some sort of fraud to bring it forward.”
  
  “We’ve got the secretary of state’s office, the attorney general’s office,” he said. “We have every reason to listen to those claims and to investigate them, and so if something arises in the next few days, then certainly we want to make sure we investigate that and that’s what our job is.”
