title: "John Bolton’s statement should scare Trump"
date: "2020-01-06"
section: "Opinion"
url: "https://www.cnn.com/2020/01/06/opinions/bolton-statement-scare-trump-honig-cross-exam/index.html"
content: |
  Editor’s Note:In this weekly column “Cross Exam,” Elie Honig, a CNN legal analyst and former federal and state prosecutor, gives his take on the latest legal news. Post your questions below. The views expressed in this commentary are his own. Viewmore opinionon CNN. Watch Honig answer reader questions on “CNN Newsroom with Ana Cabrera” at 5:40 p.m. ET Sundays.
  
  Former National Security Adviser John BoltonannouncedMonday that “if the Senate issues a subpoena for my testimony, I am prepared to testify” at the impeachment trial of President Donald Trump. This is what Trump should fear most, and it is why Senate Majority Leader Mitch McConnell is so determined to hold a witness-free, substance-less trial. More than any other person, Bolton can blow apart Trump’s defenses and change the trajectory of the case for the impeachment.
  
  Bolton’s testimony is potentially explosive because he has direct, firsthand knowledge of Trump’s reasons for withholding foreign aid to Ukraine.  According to prior testimony from former White House adviserTimothy Morrison, Bolton met one-on-one with Trump in August 2019 to try to convince Trump to release nearly $400 million in aid for Ukraine.  Morrison said he does not know precisely what happened during that meeting buthe testifiedthat, after the meeting ended, Bolton said Trump “was not yet ready to approve the release of the assistance.”
  
  And theNew York Timesreported recently that Bolton – along with Secretary of State Mike Pompeo, and Secretary of Defense Mark Esper – met with Trump in the Oval Office in late August 2019. Thepurposeof the meeting, according to the Times: to convince Trump that releasing the held-back foreign aid to Ukraine was “in interests of the United States.” Bolton, Pompeo, and Esper reportedly “tried but failed” in their mission.
  
  Bolton can testify about both of these crucial meetings.  And that testimony could be game-changing.  Perhaps Trump gave legitimate reasons for not releasing the aid, or perhaps Trump confirmed that his intent was to pressure Ukraine to investigate his political rivals.  Either way, we need to know – whoever it may help or hurt.  Only two people on the planet know what happened in one of those meetings:  Trump and Bolton, and there’s no way we’ll hear about it (under oath) from Trump.
  
  It remains unclear why Bolton made his remarks on Monday, yet is staying otherwise silent about his meeting with Trump.  He has hisbook deal, he isback on Twitter, yet he has not spoken publicly about what he knows.  While a subpoena would legally compel Bolton to testify, there is nothing at all stopping him from disclosing publicly what he knows.
  
  The Trump cover-up is unfolding before our eyes
  
  And it must be asked: If Bolton is so willing to testify if subpoenaed by the Senate, would he be similarly willing to testify in the House?Senate Majority Leader Mitch McConnell is dug inagainst Democratic efforts to call witnesses to testify at trial, but Democrats control the House.  House Democrats curiously refrained from subpoenaing Bolton before, but there is no legal reason why House Democrats could not subpoena him now; although the House has voted on articles of impeachment, it retains the ability to investigate and, if necessary, amend or vote on new Articles.  If Bolton is willing to honor a command from the Senate to testify, he should be just as willing to talk in the House.
  
  Bolton’s statement ups the pressure on McConnell.  Either the impeachment trial will be a real, substantive fact-finding process that will move us towards the truth, or it will be a meaningless, illegitimate political whitewash.  McConnell and the Senate are running out of excuses, fast.
  
  And now, your questions:
  
  Legally, there is nothing to prevent House or Senate Democrats from using evidence discovered after the passage of the articles of impeachment.
  
  Several important new pieces of evidence have emerged recently, primarily through intrepid journalism and reporting.  A cache of internal administrationemailsreleased byJust Securityestablished that the hold on Ukrainian foreign aid was based on “clear direction from POTUS.”  Then, there’s the August 2019 Oval Office meeting between Trump, Pompeo, Bolton and Esper.
  
  Mechanically, House Democrats could approach the new evidence in any of three ways.  First, they could amend the current articles of impeachment, if necessary, to adjust the charges to fit the new evidence.  Second, the House could pass new articles of impeachment.  Both of those options would, however, require full House votes, and the new evidence does not seem to necessitate amended or new articles.  Third, and most likely, Democrats can use the newly-discovered evidence to bolster their case on the articles of impeachment that already have been passed.
  
  This new evidence strengthens the hand of Congressional Democrats who arepushingfor a substantive Senate trial including witnesses and other evidence.  The argument, in essence, is: we have enough evidence to impeach, but there still is much more that we do not know – in large part because the administration has fought to keep it hidden.  Thus, it is essential that the Senate trial have a genuine fact-finding function, and not be a mere political rubber stamp.
  
  The Supreme Court can rule essentially as quickly as it wants, or as the situation demands.  The court controls its own docket; it alone decides which cases to take (based on a vote of at leastfour of the nine justices) and how to prioritize those cases.  As an extreme example, in the aftermath of the contested November 2000 presidential election, the court took less than a week to take up and rule onBush v. Gore.  That decision stopped ballot recounts in Florida, effectively ending the election in favor of George W. Bush.
  
  The Trump administration is hiding something
  
  The court already has granted certiorari – meaning, agreed to take and decide on – theTrump tax returnscases.  So the tax returns ruling could come at any time between now and the end of the court’s current term in June 2020.  The court has not given any particular indication that it will expedite that ruling because of Trump’s impeachment or any other factor.
  
  If an urgent case should arise relating to the impeachment trial – for example, a dispute over a subpoena – then the court first will decide if it wants to take the case at all.  Given that courts generally steer clear of what they deem “political questions,” it likely will try to stay out of impeachment if possible.  But if the court does decide that it must or should take an impeachment-related case, it can do so essentially as quickly as it determines the situation demands.
  
  TheDOJ opinioncounseling against indictment of a sitting president concludes that criminal prosecution is inappropriate because, among other things, it might “unduly interfere in a direct or formal sense with the conduct of the Presidency.”
  
  While an impeachment proceeding also certainly commands a president’s time and attention, there are important differences in degree.  As theDOJ opinionnotes, the “stigma” and burden imposed by indictment is more severe than impeachment.  And, perhaps most importantly, indictment – unlike impeachment – could result in a prison sentence, “which would make it physically impossible for the President to carry out his duties.”  (Of course, in the event of impeachment, the President would be immediately replaced by the vice president, who would carry on the duties of the office).
  
  Fundamentally, impeachment and indictment are different Constitutional creatures, with different consequences.  Indictment is brought by the executive branch (through the Department of Justice) to punish people for criminal wrongdoing; impeachment is brought by the legislative branch to remove individuals from office who have abused or misused power.  The argument that impeachment is too much of a distraction to the person being impeached would effectively undo the Constitutional remedy altogether and leave Congress without any recourse to remove corrupt officials from power.
  
  1. Will morenew evidenceemerge, and will it bolster Democrats’ call for witnesses at trial?
  
  2. How long will Speaker Pelosi try to holdarticles of impeachmentwithout sending them to the Senate?
  
  3. Will Senators McConnell and Schumer make any progress towards negotiating terms of the impeachment trial?
