title: "Boeing faces more trouble after crash of a Ukrainian 737 jet in Iran"
date: "2020-01-08"
section: "Business"
url: "https://www.cnn.com/2020/01/08/business/boeing-iran-crash/index.html"
content: |
  Another tragic airline crash Wednesday could cause more problems for Boeing.
  
  A three-year old Boeing 737-800 jet operated byUkraine International Airlines crashed soon after takeofffrom Tehran’s international airport early Wednesday, killing all 176 people on board.
  
  Iranian aviation authorities have begun an investigation. Anearly report fromIran’s semi-official news agency ISNA blamed some kind of engine failure. But Ukrainian officials say it’s too early to determine the cause, and Ukraine’s embassy in Iran retracted a statement that also attributed the crash to an engine malfunction.
  
  The 737-800 is not the 737 Max, which has gotten so much attention sincetwo fatal crashescaused thegroundingof the jetworldwidein March of 2019. All those planes remaingrounded.
  
  But the 800 version of the jet, also known as a 737 Next Generation or NG, has had its own problems. Boeing has delivered about 6,700 of these jets to airlines around the world.
  
  In April 2018, parts of the engine on a Southwest Airline(LUV)s flight hit the side of the plane and shattered a window after a fan blade broke. The cabin depressurized and thewoman sitting next to the window was killed.
  
  In November 2019, the USNational Transportation Safety Boardrecommended that Boeing redesign the outer covering of the planes’ engines to prevent it from flying into the plane should a fan blade break on a future flight. It said that all Boeing 737 Next Generation series airplanes should be retrofitted with whatever fix Boeing comes up with.
  
  Boeing said in November it is working on a fix for the jet covers.
  
  But the 737 NG has other problems.Cracks have been discoveredon structural supports that hold the wings in place, and several dozen have beengroundedas a result. But while the FAA has ordered inspections, most of the 737 NGs have continued to fly.
  
  Boeing(BA)’s stock was down 1% in trading following the crash, though shares recovered some of their earlier losses.
  
  The company issued a statement Wednesday expressing condolences for the latest crash.
  
  “This is a tragic event and our heartfelt thoughts are with the crew, passengers, and their families. We are in contact with our airline customer and stand by them in this difficult time. We are ready to assist in any way needed,” said Boeing’s statement.
  
  The investigation will be made more difficult by where the crash took place, just outside Tehran, in the midst of rising tensions between Iran and the United States.
  
  Ukrainian Boeing plane crashes in Iran shortly after takeoff, killing 176 on board
  
  Iran says it will not hand over the black boxes from the Ukrainian Airlines Boeing 737 to American authorities. Speaking to Iran’s semiofficial Mehr news agency, the head of Iran’s Civil Aviation Authority, Ali Abedzadeh said that the black boxes would be analyzed in the country where the accident took place, in accordance with International Civil Aviation Organization rules. He also said Ukrainian investigators would be a part of the process.
  
  “We will not give the black box to the manufacturer [Boeing] or America,” he said.
  
  Tensions between the United States and Iran have escalated after the recent US strike thatkilled Iranian military commander Qasem Soleimani. Iranfired missileslate Tuesday at two Iranian bases in Iraq where American military personnel are located. Initial reports indicated there wereno fatalitiesfrom that attack, which occurred just hours before the plane crash.
  
  Correction:An earlier version of this story gave the wrong date for the grounding of the 737 Max.
