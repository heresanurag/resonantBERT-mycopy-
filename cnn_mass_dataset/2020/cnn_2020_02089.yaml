  _August 20, 2020_
  
  _Today’s show begins with a down-the-middle explanation of two controversies: One involves the issue of mail-in voting, and the other involves the U.S. Postal Service. Afterward, we’re looking at how a heat wave, wildfires, and blackouts are affecting California. And we’re introducing you to a tiny mammal that was recently “rediscovered” in Djibouti._
  
