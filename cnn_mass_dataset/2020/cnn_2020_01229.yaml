id: cnn_2020_01229
title: "Polls closed in Georgia after a day marked by voters waiting for hours to cast their ballots"
date: "2020-06-09"
section: "Politics"
url: "https://www.cnn.com/2020/06/09/politics/georgia-primary-election-delays/index.html"
content: |
  Polls are finally closed in Georgia after voting delays across the state led officials there to call for investigations into why voters spent hours standing in lines on a hot June day.
  
  Voting was extended at some precincts in eight counties around the Peach State. Voting was extended to 9:30 p.m. in DeKalb County, more than two-and-a-half hours after polls were supposed to close, and at least one precinct stayed open until 10:10 p.m. Voters reported standing in the hot summer sun for upward of four hours attempting to cast their ballots.
  
  The delays ledGeorgia’s secretary of state and state House speaker on Tuesday called for investigations into voting delays in Atlanta and across Georgia on the day of the state’s primary. The announcement of the investigations came after a rocky start for the state’s primary on Tuesday morning as voters, primarily in the populous Atlanta area, were met with long lines and delays.
  
  It’s another bumpy election day in the Peach State, where access to voting has become a hot button issue in recent years, especially following the closely contested 2018 gubernatorial race that saw Gov. Brian Kemp defeat Democrat Stacey Abrams. Kemp narrowly beat Abrams in that election, which was marred by claims ofvoter suppressionthat included ballots being rejected over the state’s “exact match” standard and voter registration issues for many African American voters.
  
  This year’s election has presented new obstacles for the state amid the pandemic. Georgia’s primary waspostponed twiceover health concerns regarding Covid-19 exposure, and the state has mailed absentee ballot requests to the state’s 6.9 million registered voters.
  
  Tuesday’s election includes the presidential preference primary, general primary, nonpartisan general election and a special election. Democrats are looking todefeat two Republican senators in 2020in a state where a Democratic senator has not been elected in 20 years.
  
  In a change from years past, Georgia will not be releasing results until all of the precincts are closed, meaning it will likely be later Tuesday night before results start coming in. Absentee mail-in ballots must be received by county elections offices by 7 p.m. ET Tuesday.
  
  State election officials have blamed inexperienced election workers for the problems as well as safety issues related to the coronavirus, including the heightened use of absentee ballots, and have pushed back on suggestions that malfunctioning equipment is causing delays.
  
  “The reality of what you’re seeing in Georgia today is a function of the Covid situation in large part,” said Gabriel Sterling, the state’s voting implementation manager, in an interview with CNN’s Chris Cuomo on “Cuomo Prime Time.”
  
  “We did lose many polling places because it’s summertime so schools are closed, churches opted out, VFW halls opted out. And Fulton County specifically – they lost 40 locations and collapsed many of those locations into mega-precincts, which saw a lot of these amazingly long lines. We said this is not a good idea. You need to find other alternative locations – and those kind of polling closures and things you’re discussing are literally county decisions.”
  
  However, several voters with whom CNN has spoken have said they were having difficulty using election machines.
  
  It didn’t take long for state and local officials to start calling for investigations into how the primary was carried out.
  
  “The voting situation today in certain precincts in Fulton and DeKalb counties is unacceptable,” Secretary of State Brad Raffensperger, a Republican, said. “My office has opened an investigation to determine what these counties need to do to resolve these issues before November’s election.” The city of Atlanta is encompassed in the two counties.
  
  Separately, Speaker David Ralston has directed the House Governmental Affairs Committee to investigate irregularities in Tuesday’s primary election across Georgia, particularly in Fulton County, where a majority of issues have been reported.
  
  “The sanctity of our elections – being free and fair – is the very foundation of our system of government. Our elections must be efficient and voters must be confident that their votes will be properly counted,” Ralston, a Republican, said in a statement on Tuesday. “The legislative branch of government has an obligation to go beyond the mutual finger-pointing and get to the truth and the real reasons underlying these frustrations and concerns.”
  
  Prior to Tuesday’s election, the State Election Board was already investigating Fulton County for its handling of absentee ballots though the State Election Board.
  
  “Fulton County has made unfortunate decisions that the state did not agree with. For example, they decided to process email applications last. Fulton County’s handling of the current election is under investigation by the State Election Board,” Georgia Elections Director Chris Harvey told CNN on Monday.
  
  Late Tuesday night, the DeKalb County CEO also joined officials in calling for an investigation into Tuesday’s issues.
  
  Michael Thurmond called “for a comprehensive, top-to-bottom investigation” into the voting issues and how the secretary of state’s office prepared ahead of the primary.
  
  Atlanta Mayor Keisha Lance Bottoms was one of the first officials to highlight the issues early Tuesday morning, after receiving reports that several voting machines throughout the city of Atlanta and Fulton County may not have been working. She urged voters to remain in line.
  
  “If you are in line, PLEASE do not allow your vote to be suppressed. PLEASE stay in line. They should offer you a provisional ballot if the machines are not working,” shetweeted.
  
  Machines were reported down at multiple locations by voters, including at First Baptist Church in downtown Powder Springs in Cobb County. Voter Monica Hickman told CNN she was in line starting at about 6:45 a.m. and was finally able to vote about two hours later due to 10 machines being down.
  
  “It was after 7:30 when we went inside the voting area only to be told the machines were down. We had to use provisional ballots. I filled it out and left it there,” Hickman said. “When it’s time to vote, everything should work properly because we’re living in critical times and this is one of the ways our voices can be heard.”
  
  Dan Upshaw was in line to vote at the Joseph McGhee Tennis Center in Atlanta starting at 8 a.m. because poll workers told him they only had one functioning voting machine.
  
  “We were told Fulton County was on site working on them,” he told CNN. “Last official update was that there were three machines working, but voters are saying there are only two.”
  
  When he spoke to CNN, he believed he had about 45 minutes longer to wait until he could vote.
  
