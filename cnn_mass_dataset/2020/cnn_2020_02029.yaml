  Also, cannabis is metabolized differently by women and men. “Because of the female hormone, estrogen, women are more sensitive to the effects of the chemical compounds within cannabis – cannabinoids and terpenes,” Chin said, though she added that this is more pronounced with psychoactive THC than CBD.
  
  And even within your own body, you can build up a tolerance level, which may mean taking a break every once in a while. “I suggest women take periodic cannabis fasts to allow the endocannabinoid system to reset,” Chin said.
  
  “It’s a complex relationship with a plant that can provide incredible well-being and wellness – but you have to be willing to put in the work,” Frankel added.
  
  Lisa Drayeris a nutritionist, an author and a CNN health and nutrition contributor.
