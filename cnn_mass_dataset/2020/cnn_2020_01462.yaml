  “It’s always important to remember,” Blumenthal said, “good lifestyle habits are the cornerstone of prevention.”
  
  Heart disease is theNo. 1 killerin the world and the number of people dying from heart problems has been rising and will likely continue to rise with the obesity epidemic. It’s an expensive disease, too. Each year, heart disease and stroke cost the United States nearly $1 billion a day in medical costs and lost productivity,studies show.
