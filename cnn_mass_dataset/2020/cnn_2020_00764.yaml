title: "If you’re a blue-collar worker, Trump is not your friend"
date: "2020-08-11"
section: "Opinion"
url: "https://www.cnn.com/2020/08/11/opinions/how-trump-has-betrayed-blue-collar-workers-greenhouse/index.html"
content: |
  Editor’s Note:Steven Greenhouse was a New York Times reporter for 31 years and is author ofBeaten Down, Worked Up: The Past, Present, and Future of American Labor. The opinions expressed in this commentary are solely his own. Read moreopinionarticles at CNN.
  
  It has long been confounding that President Donald Trump’sstrongest supportersare Whites with only a high school education. This is bewildering because the Trump administration has repeatedly and systematically hurt America’s blue-collar workers and favored corporations over them.
  
  Although Trump ran in 2016 as a champion of the working class, he has undermined them again and again. His administration has adopted no enforceable rules whatsoever to protect these workers from the spread of Covid-19, not for factories, construction sites, warehouses or any other places where his most loyal followers are at risk of getting sick and dying.
  
  Trump ispushing hardtokill theAffordable Care Act, which has made health coverage available and affordable to millions of working Americans, including those with pre-existing conditions.
  
  Trump has made it easier for Wall Street firms to take advantage of workers when handling the hard-earned money in their 401(k)’s by scrapping the “fiduciary rule” that required the firms to act in the best interest of workers, rather than in the firms’ best interests.
  
  The administration has joined Senate Republicans in pushing to take awayworkers’ righttosue an employerif they contract Covid-19 on the job.
  
  So if a meat-packing plant, auto plant, steel mill, coal mine, construction site, trucking depot or big box store fails to do enough to protect its employees from Covid-19 –  tough luck,  under thisproposal they would not beable to sue.
  
  Trump replaced an Obama-era rule that had extended overtime protections to millions more workers with a far narrower rule,  meaning that millions of blue-collar Americans will no longer qualify for overtime pay.
  
  Nor has Trump done anything to lift the minimum wage, a basic step that would not only help lift many low-wage workers out of poverty, but alsolift the wages for millions of blue-collar workerswho make more than the minimum.
  
  During the 2016 campaign, Trump vowed to spend $1 trillion to improve the nation’s decaying roads, bridges and airports. His nebulousinfrastructure planwas supposed to create hundreds of thousands of good-paying middle-class jobs, especially for construction workers. But Trump has not gotten to square one on infrastructure. Could it bedue to Trump’s2017 tax cutsthattilted in favor of rich Americans and corporations?
  
  Childcare challenges force some working moms to put their careers on hold
  
  Trump’s Council of Economic Advisorspromisedthatthose tax cuts would raise the income ofaverage families by$4,000 a year. They didn’t.
  
  Trumphas appointed federal judges whohave systematically favored corporate America over workers.
  
  His Supreme Court appointee, Neil Gorsuch, provided the deciding vote to let corporations prohibit workers from bringing class actions to sue their companies, for instance, for cheating workers on overtime or not paying government-required wages on construction projects. That ruling relegates aggrieved workers to individual, behind closed doors arbitrations, which greatly favor companies over workers.
  
  Trump’s administration and judicial appointees have worked aggressively to weaken labor unions, the one institution that does most to speak for workers and increase their pay.  Under Trump, theNational Labor Relations Board has taken many steps to make it harder for workers – whetherUber drivers, retail workers, or McDonald’s workers –to unionize.
  
  Whether or not you like unions, there’s no denying that when unions are stronger in the workplace and politics, workers get a fairer shake and higher wages, and corporations have less power to push through laws that help businesses and block worker protections.
  
  Once Covid-19 arrived, Trump did astonishingly little to save workers’ jobs; he has done far lessthan European governments– including Boris Johnson’s conservative government in Britain.
  
  The USjobless ratesoared from 3.6% in January to 14.7% in April – the highest rate since the Great Depression – whilein Germany it inched upto 6.1%  in May from 5.2% in Januaryand in Britain it remained unchangedat 3.9% between January and May
  
  The reason: many European governments made sure that workers kept their jobs by agreeing to underwrite 80 or so percent of corporate payrolls so long as companies didn’t lay off their workers. But the Trump administration did little to deter large corporations from laying off workers, and its Paycheck Protection Program – which sought to discourage small businesses from laying off workers by making federal loans available to them that would be forgiven if they kept their employees –was not nearly as effective in preventing layoffs as hoped.
  
  Women are in a terrible new bind
  
  Trump promised that factory closings would end on his watch, but the 1,600 workers atGM’s shuttered auto plant in Lordstown, Ohio, saw that that was an empty promise.
  
  Trump promised to do wonders to boost coal mining employment, eliminating many air-quality rules to do so, but between his inauguration and the time the pandemic hit,coal mining employment roseby a mere 200 jobs.
  
  Many blue-collar workersapplaud Trump’s tough talk on trade, but the truth is that Trump, despite his tirades against the North American Free Trade Agreement, agreed to a revised Nafta with only modest improvements for American workers and a pathetic enforcement mechanism to stop violations by Mexico.
  
  Only when Congressional Democrats demanded that Trump negotiate further improvements was the updated Nafta agreement changed to include an enforcement mechanism with real teeth and measures to prevent Mexican corporations from improperly undercutting American workers.
  
  As for China,many business executives and foreign policy expertssay Trump has badly bungled his trade war, forcing American consumers to pay billions in tariffs, causing supply shortages that hobbled many American businesses, and sparking retaliation that injured America’s exports.
  
  Labor law makes it too hard to start unions. Workers deserve a bigger voice
  
  Moreover, Trump failed to line up our traditional allies, including Europe, Canada and Japan, to join us in pressuring China. That hugely reduced our bargaining leverageand made it easy for Beijingto single out America’s businesses and workers for retaliation.
  
  If you are a blue-collar worker who cares about opportunities for your children, you should realize thatTrump has in ways made it harder for them.He has repeatedly pushed to scale back federal loans and grants for non-affluent students, changes that could increase the cost of higher education for student borrowers by more than $200 billion over 10 years.
  
  His administration has blocked efforts to stop for-profit colleges from ripping off veterans – many from blue-collar families – after many veterans were bilked out of tens of thousands of dollars.
  
  If you’re a blue-collar worker, whether White, Black or brown, who cares primarily about banning abortions or bashing immigrants or having right-wing judicial appointments, then Trump is your guy. But if you are a blue-collar worker who cares about your economic well-being and opportunities for your children, Trump is not your friend
