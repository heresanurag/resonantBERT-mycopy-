id: cnn_2020_02365
title: "Must-watch videos of the week"
date: "2020-11-27"
section: "App News Section"
url: "https://www.cnn.com/2020/11/27/app-news-section/videos-of-the-week-mobile-nov-27/index.html"
content: |
  A mock nuclear bomb test, a mysterious monolith in the desert, penguins on an NFL field. These are some of the videos you don’t want to miss this week.
  
  The US Air Force declassified video of a mock nuclear test from August 2020 where a F-35A Lightning II jet was used to drop an inert nuclear bomb.
  
  A pianist in Thailand is attempting to calm the rambunctious wild macaques of the Lopburi province by playing classical music.
  
  YouTube used artificial intelligence to create a unique tribute to Billie Eilish’s ‘Bad Guy’ music video.
  
  Utah state officials found more than the bighorn sheep they were looking for during a recent flyover in the desert.
  
  Chicago’s Soldier Field was a recent field-trip destination for some feathered friends.
