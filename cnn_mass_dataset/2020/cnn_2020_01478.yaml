  The pain of losing his daughter spurs Bode Miller and his wife to keep fighting to prevent other parents from knowing the anguish that pierced his family’s life two years ago.
  
  “I wish I could have one more day to hold you, but until that day comes, continue to work through me and give me the strength to bring awareness, my love,” Morgan Miller wrote in anInstagram tributeto their daughter two months after her death.
  
  That caption accompanied a photo of the couple’s fragile daughter as she was hooked up to tubes, unable to be saved by doctors and nurses.
  
  “I told you as I held you in this moment that you could still change the world, you could still move mountains,” she wrote.
