id: cnn_2020_02111
title: "Trump campaign demands CNN apologize for poll that shows Biden leading"
date: "2020-06-10"
section: "Politics"
url: "https://www.cnn.com/2020/06/10/politics/trump-campaign-cnn-poll/index.html"
content: |
  President Donald Trump’s campaignis demanding CNN retract and apologize fora recent pollthat showed him well behind presumptive Democratic presidential nomineeJoe Biden.
  
  The demand, coming in the form of a cease and desist letter to CNN President Jeff Zucker that contained numerous incorrect and misleading claims, was immediately rejected by the network.
  
  “We stand by our poll,” said Matt Dornic, a CNN spokesman.
  
  READ: CNN's response to Trump campaign's demand for an apology over poll that shows Biden leading
  
  TheCNN poll conducted by SSRSand released on Monday shows Trump trailing the former vice president by 14 points, 55%-41%, among registered voters. It also finds the President’s approval rating at 38% – his worst mark since January 2019, and roughly on par with approval ratings for one-term Presidents Jimmy Carter and George H.W. Bush at this point in their reelection years – and his disapproval rating at 57%.
  
  In the letter to Zucker, the Trump campaign argued that the CNN poll is “designed to mislead American voters through a biased questionnaire and skewed sampling.”
  
  “It’s a stunt and a phony poll to cause voter suppression, stifle momentum and enthusiasm for the President, and present a false view generally of the actual support across America for the President,” read the letter, signed by the Trump campaign’s senior legal adviser Jenna Ellis and chief operating officer Michael Glassner.
  
  View Trump and Biden head-to-head polling
  
  The campaign formally requested that CNN retract the poll and publish a “full, fair, and conspicuous retraction, apology, and clarification to correct its misleading conclusions.”
  
  David Vigilante, CNN’s executive vice president and general counsel, told the campaign that its “allegations and demands are rejected in their entirety.”
  
  “To my knowledge, this is the first time in its 40-year history that CNN had been threatened with legal action because an American politician or campaign did not like CNN’s polling results,” Vigilante wrote inhis response. “To the extent we have received legal threats from political leaders in the past, they have typically come from countries like Venezuela or other regimes where there is little or no respect for a free and independent media.”
  
  Biden builds largest lead this year
  
  After CNN released the poll earlier this week, Trumptweetedthat he had hiredRepublican pollsterMcLaughlin & Associates to “analyze” the survey and others “which I felt were FAKE based on the incredible enthusiasm we are receiving.” McLaughlin ranks as one of the least accurate pollsters in the industry, asmeasured by FiveThirtyEight.
  
  But several other polls released over the past few weeks – including polls byABC News/Washington Post,Monmouth University,NPR/PBS Newshour/Marist College,NBC News/Wall Street Journal,Quinnipiac UniversityandFox News– also show Biden well ahead of Trump. These polls, averaged with the CNN poll, find Biden up by double digits, a result well outside any margin of error.
  
  The campaign’s letter, which heavily cites findings by McLaughlin, makes several incorrect and misleading claims.
  
  “It’s a poll of 1,259 adults – not even registered voters, let alone likely voters,” the letter says, citing a McLaughlin memo from earlier this week.
  
  While it’s accurate that 1,259 adults were reached on landlines or cell phones by a live interviewer for the survey, the 14-point margin by which Trump is trailing Biden came from a question posed only to 1,125 registered voters. It’s typical for polling to sample registered voters rather than likely ones at this stage of the race, as it’s difficult to project whether voters will participate in an election that is five months away. CNN, as do most public pollsters, typically reports results from likely voters around Labor Day.
  
  It should be noted that in CNN’s poll, Biden expands his lead among those who are most (i.e. extremely) enthusiastic to vote.
  
  Joe Biden hits a milestone Hillary Clinton never did: 50%
  
  McLaughlin says CNN’s survey is a “skewed anti-Trump poll of only 25% Republican.” That percentage of respondents, however, is consistent withseveralothermajorpolls that use live telephone interviews, which provide the most reliable snapshot of the race. McLaughlin this weekarguedthat pollsters should include a third of Republicans in surveys to reflect the33%that they represented in the 2016 vote, but exit polls nearly always have higher shares of partisans and lower shares of independents than pre-election phone polls.
  
  Among the entire sample, 32% identified themselves in CNN’s poll as Democrats, 25% identified themselves as Republicans, and 44% described themselves as independents or belonging to another party. Results for the full sample have a margin of sampling error of plus or minus 3.4 percentage points. It is 3.6 points among registered voters.
  
  The letter to Zucker also includes McLaughlin’s criticism that the poll, conducted between June 2 and 5, was taken “before the great economic news,” animprovement in the jobless ratethat was released on Friday, even though the poll was still being conducted throughout that day.
  
  And the survey comes amid an especially turbulent time in Trump’s presidency, including the ongoing coronavirus pandemic, outrage and concern over race relations in the wake of George Floyd’s killing at the hands of police officers, and the US officially entering a recession.
  
  Visit CNN’s Election Center for full coverage of the 2020 race
  
  McLaughlin has also argued that the poll unfairly includes “questions on issues including race relations, not job creation, which could have biased the poll further,” though CNN’s survey does ask registered voters who would better handle the economy (Trump leads 51% to Biden’s 46%) and was conducted at the height of the Floyd protests.
  
  Trump has regularly chafed at polls that do not reflect favorably on him while promoting ones that do. Last month, Trump bashed Fox News, a network he often touts and gives interviews to, for a telephone-conductedpoll that showed him behind Biden by 8 points, and instead pointed to aCNN poll released earlier in the monthwhere he was leading Biden in battleground states. That CNN poll, however, showed Biden had a 5-point lead over Trump among registered voters nationwide.
  
  “Why doesn’t @FoxNews put up the CNBC POLL or the (believe it or not!) @CNN Poll? Hope Roger A is looking down and watching what has happened to this once beautiful creation!” Trumptweetedat the time, referring to the late Fox News founder Roger Ailes.
  
  Trump has also credited CNN’s polling when it has suited him, as hedid in December 2015when he thanked several on-air reporters for their “very professional reporting of the new CNN Poll” that showed him ahead in the Iowa caucuses.
  
  This story has been updated to include additional response from CNN.
