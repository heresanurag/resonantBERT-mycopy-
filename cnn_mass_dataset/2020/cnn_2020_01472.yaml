title: "Nick Cordero’s widow Amanda Kloots talks about Thanksgiving without him"
date: "2020-11-25"
section: "Entertainment"
url: "https://www.cnn.com/2020/11/25/entertainment/amanda-kloots-nick-cordero-thanksgiving/index.html"
content: |
  Thanksgiving is sure to be difficult foranyone who has lost someoneto Covid-19, andAmanda Klootsunderstands that well.
  
  Her husband, Broadway actor Nick Cordero,died in Julyafter losing his monthslong battle against the coronavirus. He was 41.
  
  Klootschronicled his illness on social media, where thousands rallied behind him, her and their toddler son, Elvis.
  
  She recentlyposted a photo of Elvis on her verified Instagram account,writing, “I read a passage today that said to find the little things everyday that God gives you.”
  
  “Collect them, one by one, and by the end of the day you’ll see you have a beautiful bouquet!” she wrote. “It would be very easy to go into this Thanksgiving week counting my losses but I’m choosing to count my blessings. This guy is at the top of my list.”
  
  Klootsalso posted a photo of her and Corderofrom their early dating days and wrote she plans to soon go live with a fellow widow “to talk about the ‘firsts’ in efforts to help others that are missing someone this year from their table.”
