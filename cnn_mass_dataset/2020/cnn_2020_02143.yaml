title: "Gender identity: The difference between gender, sex and other need-to-knows"
date: "2020-06-10"
section: "Health"
url: "https://www.cnn.com/2020/06/10/health/gender-identity-explainer-wellness/index.html"
content: |
  Controversialcomments made by “Harry Potter” author J.K. Rowlinghave sparked another online discussion about gender identity.
  
  Rowling came under fire over the weekendfora tweetin which she mocked aheadlinethat read, “people who menstruate.”
  
  “‘People who menstruate.’ I’m sure there used to be a word for those people,” she tweeted. “Someone help me out. Wumben? Wimpund? Woomud?”
  
  ‘People who menstruate.’ I’m sure there used to be a word for those people. Someone help me out. Wumben? Wimpund? Woomud?Opinion: Creating a more equal post-COVID-19 world for people who menstruatehttps://t.co/cVpZxG7gaA
  
  Amid thebacklashin which Twitter users accused her of transphobia, Rowlingdoubled downon her initial comment, saying that “erasing the concept of sex removes the ability of many to meaningfully discuss their lives. It isn’t hate to speak the truth.”
  
  The phrase “people who menstruate” was intended to be inclusive of women, non-binary people, trans men and gender-fluid and gender-nonconforming people.
  
  Rowling said that if “sex isn’t real,” the realities of cisgender women (women whose gender identity conforms with the sex they were assigned at birth) globally are erased.
  
  But the people she excluded in her initial tweet were trans men, non-binary and gender-fluid people, by emphasizing the idea that it’s only cisgender women who menstruate. It also left out trans women by implying that if they cannot menstruate, they are not women.
  
  Trans women are people who were assigned male at birth but identify as women. Trans men are people who were assigned female at birth but identify as men.
  
  Her comments were a “fundamental misconception of the difference between sex and gender,” said Amit Paley, CEO and executive director ofThe Trevor Project, a suicide prevention and crisis intervention organization for LGBTQ youth.
  
  “Your sex is what you are assigned at birth, and your gender is the way that you experience your own sense of gender identity,” Paley said. “It’s important [that we recognize] very clearly that trans women are women and that trans men are men. … and that we respect people for the way that they identify and live their own gender.”
  
  Rowling’s tweets also “demonstrate a clear misunderstanding of who trans people are, what we want, what we need and what the medical consensus is,” said Sarah McBride, a transwoman and national press secretary of theHuman Rights Campaign, a civil rights organization working to achieve equality for LGBTQ Americans.
  
  Daniel Radcliffe responds to J.K. Rowling's tweets about gender identity
  
  “Beyond that,” she added, Rowling’s tweets “are part of a prejudice that results in discrimination and violence in too many circumstances.”
  
  A representative for Rowling did not immediately respond toCNN’s previous requestfor comment regarding the situation.
  
  Understanding the difference between gender and sex is important to understanding the spectrum of experiences based on the two concepts. Here’s what gender and sexmean and how they impact a person’s identity.
  
  Some medical associations have recognized the difference between gender and sex.
  
  TheAmerican Medical Association, theAmerican Psychological Associationand theAmerican Psychiatric Association, as well as centuries of transgender people’s lived experiences, have affirmed transgender people, McBride said.
  
  Gender refers to the attitudes, feelings and behaviors that a culture associates with a person’s biological sex, according to theAmerican Psychological Association. In other words, gender is a social construct and a social identity.
  
  This year, at least six states are trying to restrict transgender kids from getting gender reassignment treatments
  
  Sex describes the biological sex a person was assigned at birth. It’sbased on biological characteristicsof maleness or femaleness as indicated by chromosomes, gonads, hormones and genitals.
  
  Gender identity is a component of gender that describes a person’s psychological sense of their gender.
  
  “Many people describe gender identity as a deeply felt, inherent sense of being a boy, a man, or male; a girl, a woman, or female; or a nonbinary gender (e.g., genderqueer, gender-nonconforming, gender-neutral, agender, gender-fluid) that may or may not correspond to a person’s sex assigned at birth, presumed gender based on sex assignment, or primary or secondary sex characteristics,” theAmerican Psychological Association described.
  
  People identify as transgender when their gender identity, expression and/or role doesn’t align with what has culturally been associated with their sex assigned at birth. Those who do identify with the gender that’s in accordance with cultural associations are called “cisgender,” as described by theAmerican Psychological Association.
  
