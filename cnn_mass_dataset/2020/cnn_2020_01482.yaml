  _April 7, 2020_
  
  _The impact of Covid-19 on Holy Week is today’s first subject on CNN 10. Then, we’re explaining how the blood of coronavirus survivors is helping those who are dangerously ill. And we’re looking at the perseverance of CNN Heroes, who are finding ways to continue helping their communities despite the challenges of the coronavirus pandemic._
  
