title: "Joseph Shabalala, Ladysmith Black Mambazo founder dies at 78"
date: "2020-02-11"
section: "Africa"
url: "https://www.cnn.com/2020/02/11/africa/joseph-shabalala-ladysmith-black-mambazo-dies/index.html"
content: |
  Joseph Shabalala, founder of Grammy award-winning Ladysmith Black Mambazo, has died at the age of 78, the group said Tuesday.
  
  “Bhekizizwe Joseph Shabalala. Our Founder, our Teacher and most importantly, our Father left us today for eternal peace. “We celebrate and honor your kind heart and your extraordinary life. Through your music and the millions who you came in contact with, you shall live forever,” the group saidon it’s official Twitter.
  
  South Africa’s parliament also issued a statement paying tribute to the music legend.
  
  Shabalala’s death comes on the 30th anniversary of the prison release of the late anti-apartheid hero, Nelson Mandela, who was a fan of the group.
  
  Mandela once described the musical group as “South Africa’s cultural ambassador.”
  
  “We find it particularly poignant that Mr Shabalala’s death comes today, when we are commemorating the 30th anniversary of the release from prison of former President Nelson Mandela,” South Africa’s parliament said in astatement.
  
  “Our thoughts are with Mr Shabalala’s wife, family and friends at this sad time.”
  
  Ladysmith Black Mambazo: How we inspired Mandela
  
  Joseph Shabalala created the all-male acapella music group in the 1960s. He did this in the hopes of using music as a vehicle to unite South Africans during the apartheid.
  
  The soulful Choral group gained international prominence after working with American singer and songwriter, Paul Simon.
  
  Over the years, they have wowed fans around the world with their harmonious singing in the traditional Zulu performance style known as isicathamiya.
  
  Their work has earned them 19 Grammy nominations,five of which they won.
  
  The South African government also tweeted a condolence message on his passing on Tuesday.
  
