title: "Julie Walters reveals she was diagnosed with bowel cancer"
date: "2020-02-20"
section: "Entertainment"
url: "https://www.cnn.com/2020/02/20/entertainment/julie-walters-bowel-cancer-scli-gbr-intl/index.html"
content: |
  British actress Julie Walters has revealed she was diagnosed with bowel cancer in 2018.
  
  The “Mamma Mia!” and “Billy Elliot” actress said she was shocked to be diagnosed with stage three of the disease around 18 months ago, but has now been given the all clear.
  
  The experience has led the Academy Award-nominated actress to reevaluate her workload and step back from projects.
  
  Walters, 69, told the BBC’s Victoria Derbyshire that she visited her doctor after suffering from a number of symptoms, including indigestion, stomach pain and vomiting.
  
  While filming “The Secret Garden,” due to be released in April, Walters found out that a CT scan had revealed an abnormality in her intestine, which specialists feared was cancer.
  
  In an interview which aired on Thursday, the BAFTA-winning actress said she initially thought a mistake had been made. “I couldn’t believe it,” she said.
  
  Walters also described telling her husband the news. “I’ll never forget his face. And tears came into his eyes,” she said.
  
