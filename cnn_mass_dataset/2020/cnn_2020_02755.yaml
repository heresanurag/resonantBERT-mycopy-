  One foot of her colon was removed during surgery, Walters said, adding that she also underwent chemotherapy.
  
  The experience has “completely changed” her perspective towards acting, she said.
  
  “I feel like the person before the operation is different to this person,” said Walters, adding that she enjoyed stepping back from her intensive workload.
  
  Walters added that there was a sense of “relief” she felt at being able to get off the “merry-go-round” of acting projects she had lined up.
  
  Walters has been nominated for two Academy Awards – for her supporting roles in “Educating Rita” and “Billy Elliot” – and also played Molly Weasley in the “Harry Potter” movie franchise.
  
  Walters said: “I’m not saying I’ll never act again,” but added she would likely not star in a film that required her to work 14-hour days, five or six days a week.
  
  A scan has shown Walters has recovered, the actress said.
  
  Bowel cancer, also known as colorectal cancer, is the third most common cancer in both men and women in the UK, according to Cancer Research UK.
  
  In the United States it is the third most common cancer, excluding skin cancers, withexperts last year estimating more than 51,000 people would die in 2019 due to colorectal cancer,according to the American Cancer Society.
