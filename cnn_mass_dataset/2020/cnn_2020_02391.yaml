  “A contemporary brain just dissolved, but the Heslington brain continued to reveal more and more proteins,” Petzold said.
  
  This has implications for neurodegenerative diseases like Alzheimer’s and dementia, which involve harmful protein folding, according to the researchers.
  
  Petzold wants to “explore means of long-term data storage to investigate more gentle and less harmful ways to tackle neurodegenerative disease and to inspire as many children and young researchers as possible to think about this and solve the unanswered questions.”
