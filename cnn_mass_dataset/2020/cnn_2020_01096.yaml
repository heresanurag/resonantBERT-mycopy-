title: "Roberts agrees to put lower court mandate on temporary hold in Mueller grand jury secrets case"
date: "2020-05-08"
section: "Politics"
url: "https://www.cnn.com/2020/05/08/politics/supreme-court-robert-mueller-grand-jury/index.html"
content: |
  Chief Justice John Roberts on Friday put a temporary hold on therelease of Mueller grand jury materials to the Housewhile the court considers the Trump administration’s request for a longer delay.
  
  A lower court ruled in March that the House Judiciary Committee has a “compelling need” to view the secretive details prosecutors had collected from witnesses about President Donald Trump. The court set a May 11 deadline.
  
  On Thursday, Solicitor General Noel Francisco asked the Supreme Court to put the May 11 deadline on hold, while the DOJ prepares its appeal.
  
  Roberts agreed to a temporary stay and asked for a response from the House by May 18.
  
  The administration hadsaid last month that it planned to make the requestto the high court. Should the nine justices decide they want to hear the case, it could be months before it’s resolved.
  
  This story has been updated to include additional background information.
