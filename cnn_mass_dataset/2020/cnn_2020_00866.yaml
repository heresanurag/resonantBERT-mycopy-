  The report also looked atscience and technology in the workforceand the role ofSTEM.
  
  “Women, blacks, Hispanics, and American Indians or Alaska Natives are underrepresented in the US [science and engineering] workforce compared to their presence in the overall population, even though their participation in absolute numbers has grown,” according to the report.
  
  While women account for about half of the college-educated workforce, women only account for 29% of science and engineering jobs. That rose from 26% in 2003. By comparison, underrepresented minorities hold 13.3% of those jobs.
  
  Despite efforts to increase STEM, or a focus on Science, Technology, Engineering and Math, in US schools, average math scores have remained flat over the last decade.
  
  First US observatory named in honor of a female astronomer, Vera Rubin
  
  “In international mathematics and science assessments, US eighth grade students rank in the middle of advanced economies,” the authors of the report wrote.
  
  At the higher education level, the US still leads in awarding the most science and engineering doctorate degrees.
  
  But the enrollment of foreign students in US universities has declined the last four years. International students, who receive 34% of doctorates in science and engineering from US universities, tend to stay and contribute to the workforce and research and development.
  
  “Research is now a truly global enterprise. Opportunities are everywhere and humanity’s collective knowledge is growing exponentially,” Souvaine said. “To remain a leader, we need to tap into our American ‘can do’ spirit and recommit to strong partnerships among government, universities and industry that have been the hallmarks of our success. I believe we should react with excitement, not fear, because we are well positioned to compete, collaborate and thrive.”
  
  Going forward, the research will be broken down into a series of streamlined report in order to be more timely and better meet the needs of policymakers and industry leaders, said Arthur Lupia, assistant director of the National Science Foundation’s Social, Behavioral and Economic Sciences directorate.
