title: "Former investment firm CEO sentenced to 9 months in college admissions scam"
date: "2020-02-07"
section: "US"
url: "https://www.cnn.com/2020/02/07/us/douglas-hodge-college-admissions-scam/index.html"
content: |
  The former CEO of one of the world’s largest investment management companies was sentenced Friday to ninemonths in prison for using fraud and bribes to try to get five of his children into exclusive colleges as fake athletic recruits,the US District Attorney’s Office in Massachusetts said.
  
  Douglas Hodge, who led the Pacific Investment Management Company, agreed to use Rick Singer’scollege admissions “side-door” scamfor five of his children, paying bribes totaling $850,000 over the course of a decade, according to prosecutors.
  
  Prosecutors had asked that he be sentenced to 24 months in prison. The nine-month sentence is the longest of any parent charged in the case, surpassing thesix-month sentence given in November to Toby MacFarlane, who also pleaded guilty. By comparison, actress Felicity Huffman wassentenced to just two weeksin prison for her admitted role in the scam.
  
  Two of Hodge’s children were accepted to Georgetown University as false tennis recruits, two children were accepted to the University of Southern California as a false soccer recruit and a false football recruit, and Hodge attempted to use bribes to get a fifth child into Loyola Marymount University, according to prosecutors.
  
  Hodge also lied to the IRS by deducting these bribe payments from his income taxes as purported charitable donations, prosecutors said in a sentencing memo.
  
  Hodgeinitially fought the chargesin the case, but in October he agreed to plead guilty to conspiracy to commit mail and wire fraud and money laundering conspiracy. His attorneys asked for a sentence at the low end of the sentencing guidelines range, comparable to other parents who received sentences measured in weeks.
  
  “Doug participated in Rick Singer’s process not out of ego or a desire for self-aggrandizement, but rather out of love for his children and an overriding, but misguided desire to be helpful to them,” his attorneys wrote in their sentencing memo.
  
  Hodge spent 28 years at Pimco, one of the largest money managers in the world, and served at least two as CEO. He left in 2017.
  
  Singer, themastermind of the sprawling scam, has pleaded guilty to racketeering conspiracy and other charges.
  
  According to thecriminal complaint releasedlast year, Singer forwarded to Hodge two falsified athletic profiles for one of Hodge’s sons. One of the profiles portrayed him as a star football player and the other portrayed him as a star tennis player.
  
  Cheat. Bribe. Lie. Here's how the college admissions scam allegedly worked
  
  “Obviously we have stretched the truth but this is what is done for all kids. Admissions just needs something to work with to show he is an athlete,” Singer wrote in an email, according to the complaint.
  
  His son was accepted to USC as a football recruit, but he did not actually join the team, the complaint says. In exchange, Hodge paidUSC athletics official Donna Heinela $75,000 check payable to the USC “Womens Athletic Board,” $125,000 to Singer’s business The Key and $125,000 to Singer’s fake charity Key Worldwide Foundation.
  
  In aNovember 30 recorded phone callmade at the direction of investigators, Singer and Hodge agreed to lie to the IRS to cover up their crimes, prosecutors said.
  
  “So you don’t have to worry. I’m not going to– I’m not– I’m not going off script here,” Hodge said in the call, federal records show.
