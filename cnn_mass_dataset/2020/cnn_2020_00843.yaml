  Previous computer simulations of the Grand National have proved surprisingly accurate given the unpredictability of the race, with the 2018 version won by subsequent winner Tiger Roll.
  
  Potters Corner trainer Christian Williams had been targeting Aintree success after the Welsh Grand National victory but must now wait a year to see if it can become a reality.
  
  “I’m delighted, it’s great and great to cheer everyone up in tough times - - I think even people from outside of racing were tuned in,” Williams said.
  
  “It was something for people to cheer on, people are stuck in their houses and it probably got a good viewing. It was something to watch together and have a bit of banter leading up to it.”
  
  Limited betting was allowed on the race, with a maximum stake of £10 (12 USD), with bookmakers announcing Sunday that £2.6 million ($3.12m) had been raised, the proceeds going to National Health Service charities.
  
  As a precursor to the big event, a Champion of Champions race was run, resulting in victory for Red Rum, a three-time winner in the 1970s, with 19th century hero Manifesto second and Tiger Roll in third.
