title: "Welsh raider Potters Corner wins Virtual Grand National"
date: "2020-04-04"
section: "Sport"
url: "https://www.cnn.com/2020/04/04/sport/potters-corner-wins-virtual-grand-national-aintree/index.html"
content: |
  Potters Corner won Saturday’s Virtual Grand National, foiling pre-race favorite Tiger Roll in his bid for an unprecedented third straight victory, in a computer simulation of the famous steeplechase that had been canceled due to the coronavirus pandemic.
  
  Ridden by 17-year-old Jack Tudor, the 18-1 shot held off a late challenge from Walk in the Mill, with a fading Tiger Roll having to settle for fourth place.
  
  Potters Corner is the winner of the 2⃣0⃣2⃣0⃣ Virtual Grand National!A Welsh winner of the Virtual National! 🏴󠁧󠁢󠁷󠁬󠁳󠁿pic.twitter.com/OUwK8pBdjK
  
  Using the latest  CGI technology and special algorithms, the race was shown as live on UK terrestrial broadcaster ITV, with 40 runners bidding for virtual glory and nearly five million people watching.
  
  Tiger Roll, with jockey Davy Russell, triumphed at Aintree in 2018 and 2019, and had been hoping to emulate the legendary Red Rum with a third victory in the grueling four-mile race (6.4km) with 30 challenging fences until the decision to cancel the race on March 16.
  
  What are the odds? Legendary Grand National horse race to take place virtually
  
  In the CGI version, Tiger Roll looked to have every chance of victory after shock frontrunner Aso took a heavy fall with two fences remaining, but fell away under top weight in the long run in to the finishing post at Aintree.
  
  Tudor, who rode Potters Corner to victory in the Welsh Grand National last year, would have been the youngest winner of the Grand National since 1938 if a real race had matched the virtual one.
  
