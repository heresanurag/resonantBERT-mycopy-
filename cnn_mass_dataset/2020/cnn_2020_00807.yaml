  As for aspirin, the over-the-counter drug can help reduce the risk of blood clotting – and evidence has shown thatCovid-19 can trigger the formation of blood clotsin some patients.
  
  Studies atXijing Hospitalin China andLouisiana State University Health Sciences Centerin New Orleans are investigating possible effects aspirin could have in Covid-19 patients.
  
  It’s not clear what dose of aspirin Trump was taking and whether he had already been taking it. Many people are prescribed low-dose aspirin for heart health.
