  Dmitriev said that “Russia is open to international cooperation” and “we do believe that there will be other vaccines coming up and the more vaccines we get the better.”
  
  There are now30 candidate vaccines in clinical evaluationaround the world, according to the World Health Organization. The WHO list classifies the Russian vaccine as being in Phase 1 trials.
