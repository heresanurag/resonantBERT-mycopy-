title: "Toronto Raptors president says he was shoved by police officer because he is Black"
date: "2020-08-21"
section: "Sport"
url: "https://www.cnn.com/2020/08/21/sport/masai-ujiri-toronto-raptors-push-police-officer-follow-up-spt-intl/index.html"
content: |
  Toronto Raptors PresidentMasai Ujirisays that the reason he was pushed by a law enforcement officer last year as he tried to join his NBA champions in celebration is because he is Black.
  
  “There are some people, including those who are supposed to protect us, who will always and only see me as something that is unworthy of respectful engagement. And, there’s only one indisputable reason why that is the case – because I am Black.”
  
  In body camera footage obtained this week by CNN, Ujiri is seen attempting to gain access to the court to celebrate with his team following the Raptors decisive game 6 victory in theNBAFinals against the Golden State Warriors in 2019.
  
  As Ujiri reaches into his jacket to show his all access credentials, Sheriff’s Deputy Alan Strickland twice shoves him away, grabbing him by the suit jacket and telling him to “back the f*** off.” Ujiri then shoves the officer back.
  
