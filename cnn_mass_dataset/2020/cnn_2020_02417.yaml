  Relatedly, Biden should end the Trump administration’s warm embrace of the de facto ruler of Saudi Arabia, Mohamed bin Salman, known as MBS, who launched a catastrophic war in Yemen in 2015 that helped to precipitatethe worst humanitarian crisis in the world, according to the UN, and did not achieve its goal to reduce the role of the Iran-backed Houthi rebels in Yemen.Biden says he will cease any US backing for Saudi Arabia’s war in Yemen, according to the piece he wrote in Foreign Affairs.
  
  Above all, Biden should be, as he has promised, the leader of all Americans, not just the ones who voted for him.
