title: "Can Joe Biden clean up the mess?"
date: "2020-11-07"
section: "Opinion"
url: "https://www.cnn.com/2020/11/07/opinions/joe-biden-election-2020-clean-up-bergen/index.html"
content: |
  Editor’s Note:Peter Bergen is CNN’s national security analyst, a vice president at New America and a professor of practice at Arizona State University. He is senior editor of theCoronavirus Daily Briefand author of the new book “Trump and His Generals: The Cost of Chaos.” The opinions expressed in this commentary are his own; view moreopinionat CNN.
  
  The biggest question facing the world after Donald Trump’s defeat is: Can Joe Biden clean up the mess?
  
  It took days for Biden to be declared the winner of the presidential election because the race was tight in key battleground states, but still he won, and as commander in chief he has broad latitude to put forward his own foreign policy and national security agenda.
  
  Biden needs to assemble the right team andadopt policies that can restore America’s global reputation, reassert its leadership of the alliance of liberal democracies and expunge the cramped and counterproductive “America First” policies of the Trump administration.
  
  There was no “blue wave” that some had predicted and Republicans may well retain control of the Senate, so Biden will have to pick his confirmation battles carefully as he selects his cabinet.
  
  Since “personnel is policy,” Biden should assemblea strong national security team that in his words “looks like the country”– racially diverse and with women in senior roles.
  
  Michèle Flournoy is widely and rightly regarded to be the leading contender for secretary of defenseand would be the first woman to hold that position. Flournoy knows the Pentagon and its massive bureaucracy well because she served in the key role of undersecretary for policy in Barack Obama’s Pentagon.
  
  Why Donald Trump lost
  
  She is also widely respected on both sides of the aisle, so much so that Trump’s first secretary of defense,Jim Mattis, wanted Flournoy to be his top deputy at the Pentagon. Flournoy went to meet with a couple of officials on the Trump transition team, but in the end, she decided to drop out of consideration for the job given her misgivings about Trump.
  
  Biden should advance Flournoy’s nomination to be secretary of defense as soon as is feasible.
  
  For secretary of state, Biden should pick Susan Rice. The new President seriously considered Rice as his running mate. He worked closely with her during the Obama administration when she was national security adviser. Rice has the requisite experience to re-energize the State Department, wheremorale has suffered under Trump: he hasoften presented the department as part of a purported “deep state,”and many senior diplomats have departed as a result.
  
  If she were tapped for the role, Rice would likely get some tough questions during her Senate confirmation hearing about the 2012 terrorist attack on the US consulate in Benghazi, Libya, during which four Americans were killed. But the statute of limitations has long run out on this pseudo-scandal, which revolves around the fact that immediately after the Benghazi attackRice recited Obama administration talking points about the incident that turned out to be inaccurate.
  
  Tony Blinken has worked closely with Biden for decades. He served as both deputy national security adviser and deputy secretary of state during the Obama administration, and he would be the best choice for national security adviser, since he understands how to make the interagency process work well andBiden trusts him implicitly. Jake Sullivan, who served asBiden’s national security adviser when he was vice president, would make a strong deputy national security adviser.
  
  This is a huge and historic win
  
  Trump has deeply politicized the Department of Homeland Security (DHS), one of the largest US government agencies. Biden should install a savvy leader to help to restore morale there. A great pick would beRep. Val Demings (D-FL)whoBiden had seriously considered to be his running mate. Demings, theformer police chief of Orlando, sits on the House committees on Homeland Security, Intelligence, and Judiciary  and understands well many of the issues that would come with running DHS.
  
  Trump has consistently undermined the US intelligence community. To fix that, Biden needs to install an adept leader as the director of national intelligence to coordinate the work of the17 US intelligence agencies.Avril Haines was tapped by Biden to run his foreign policy and national security transition teamand is both a former deputy director of the CIA and deputy national security adviser for Obama. Haines has the intelligence experience and political savvy to be an effective director of national intelligence.
  
  The Trump administration has turned the once-important job of US ambassador to the United Nations into a Trivial Pursuit question. At the beginning of his administration Trump selected a national figure, former South Carolina Gov. Nikki Haley, to be his UN ambassador. Quick: Who can name today’s American ambassador to the UN? It isKelly Craft, a hitherto obscure diplomat whose main qualification for the job appears to be the large sums she and her husband have donated to the 2016 Trump campaign. Two years ago,the Trump administration downgraded the UN ambassador position to a non-cabinet level role– as it was during both Bush administrations. It is a job that was once held by diplomatic heavy hitters such as Richard Holbrooke and Susan Rice.
  
  The UN ambassador job should be reinstated to its former status to show that the Biden team is serious about re-engaging with the UN. The former mayor of South Bend, Indiana,Pete Buttigieg, who ran for the Democratic nomination and is now on the Biden transition team, would be an excellent pick for this position.Buttigieg speaks several languages, including Arabic, Dari, French, Italian and Spanish, which would make him quite a hit at the UN.  If he were to be selected and confirmed, he would be only the second person who identifies as gay to serve in an American cabinet.
  
  Biden should also follow an honorable post-9/11 bipartisan tradition when it comes to counterterrorism as was the case even during the Trump administration which, until 2017, kept National Counterterrorism Center (NCTC)  Director Nick Rasmussen, who held that role during the Obama administration. The current NCTC director,Christopher Miller, a former Special Forces officer, was Trump’s senior director for counterterrorism at the White House and is well qualified to remain in his current position.
  
  See the moment CNN called the race for Joe Biden
  
  Similarly, the Trump administration kept in placeBrett McGurk,who oversaw the “Global Coalition to Defeat ISIS” at the Department of State under Obama. The Biden team should leave in place his successorAmbassador James Jeffrey, a senior career diplomat, and his deputy, Syria envoy and retired armyColonel Joel Rayburn, both of whom have deep expertise in the Middle East.
  
  Biden should do something a little unexpected at the CIA and tapone of the nation’s top retired military officers who have publicly endorsedhim to be the director of the agency. It could be someone likeGen. Stanley McChrystal, who revolutionized Joint Special Operations Commandto make it the superlative war fighting machine that it is today, or his successor in that role,Admiral Bill McRaven, the architect of the operation that killed Osama bin Laden. Both McChrystal and McRaven have deep knowledge of the intelligence world and of how to connect the various elements of the US national security enterprise to make them work effectively.
  
  This national security team would signal to the world that Biden wants to restore America’s place in the world as the first among equals in a  rules-based international order that has served American interests so well since World War II.
  
  (Disclosure: I have reported on national security issues in Washington DC for more than two-and-half decades, so I know many of the current and former officials mentioned in this story; some well and others only slightly.)
  
  Trump has styled himself as a “wartime president”fighting Covid-19, but his response has been at best feckless and he has barely acknowledged themore than 230,000 Americans killed by the disease.
  
  A White dad talks to his Black daughter about Vice President-elect Kamala Harris
  
  The New York Timesreportsthat as soon as Biden takes office, he will begin “ramping up testing, ensuring a steady supply of protective equipment, distributing a vaccine and securing money from Congress for schools and hospitals.” And Biden would lead by example, which Trump is incapable of doing, by wearing a mask in public consistently and only attending events with proper social distancing.
  
  But Biden could go further by creating a new White House position for the Covid-19 era, a deputy national security adviser for health who is a public health expert. This would do more than simply restore the pandemic directorate atthe National Security Council which was dissolved by the Trump administration and which Biden has pledged to bring back, and it would help to coordinate the government response to the most serious public health crisis in a century.
  
  It’sa role that could be filled by Dr. Anthony Fauciwho has advised six presidents and is widely trusted by the public, or by someone likeMichael Osterholm of the University of Minnesotawho is one of the nation’s leading infectious disease experts and who served as the Science Envoy for a year at the State Department during the Trump administration. He has spent much of his career publiclywarning of the type of global pandemic that we now face.
  
  Biden’s national security team should also bring badly needed regular order to American national security decisions that are now often made by presidential tweet rather than by the deliberations of the National Security Council.
  
  To give one telling example: In October, commander-in-chief Trump tweeted thatall American soldiers should be going home from Afghanistan by Christmas, and his national security adviser, Robert O’Brien, said that there will be a drawdown from Afghanistan from the 4,500 troops currently there to 2,500 soldiers by early 2021.
  
  But General Mark Milley, chairman of the Joint Chiefs,told NPR that on the matter of withdrawing troops from Afghanistan, “Robert O’Brien or anyone else can speculate as they see fit. I’m not going to engage in speculation. I’m going to engage in the rigorous analysis of the situation based on the conditions and the plans that I am aware of and my conversations with the president.”
  
  Donald Trump is a one-term president who can't admit he's a loser
  
  Does anyone have a clue what the Trump administration’s Afghan policy is? The confusion surely only benefits the Taliban, whose main aim is the withdrawal of all US troops from Afghanistan.Trump officials are now negotiating some kind of peace deal with the Taliban, but they have zero leverage since Trump is already volunteering that all US troops will leave soon anyway.
  
  Biden,who had long been a skeptic of large-scale US troop deployments in Afghanistan, should retain a light Special Operations Forces footprint for counterterrorism missions in Afghanistan and he should say publicly that the US commitment to Afghanistan is a durable one, rather than making constantly muddled statements, as President Trump has done, about US intentions in Afghanistan that confuse America’s allies and give comfort to her enemies.
  
  As soon as he assumes office,Biden has promised that he will reverse the Trump administration’s moves to exit the World Health Organization (WHO), which made some early missteps combatting the coronavirus by not challenging Chinese falsehoods about the virus when it first emerged. This is the right move since the WHO is still the only body that can respond around the world to what is, after all, a global pandemic.
  
  In anarticlehe wrote for Foreign Affairs earlier this year, Biden says he will immediately rejoin the Paris climate agreement, which is a sound decision, as2020 is on course to likely be the hottest yearsince record-keeping began, according to meteorologists. The agreement calls for theUS to cut greenhouse gas emissions by at least 26% of their 2005 levels within the next five years.  Under theTrump administrationthe US has formally left the Paris agreement on Wednesday.)
  
  Biden says he will reenter the Iran nuclear deal if the Iranians observe their end of the agreement. After the Trump administration left the agreement in 2018, the Iranians restarted their production of nuclear fuel, albeit at a relatively low level that is not weapons-grade. Whatever your view of the theocratic regime in Iran, surelyit would be much worse if it were on a path to acquire nuclear weapons, whichthe Obama administration delayed until at least 2030 with its 2015 nuclear agreementwith that nation.
  
  'The club' of former presidents will never be the same
  
  The President-elect should also take the simple step of no longer disrespecting our close allies, such as the Germans and the Canadians, as Trump has done repeatedly.  He should also cut off praise–such as Trump has delivered– for autocrats like North Korea’s Kim Jong Un. This approach to allies and enemies has yielded Trump precisely nothing over the past four years;the North Korean nuclear program continues to grow according to North Korea experts, whilePresident Trump is widely reviled among America’s closest North Atlantic Treaty Organization (NATO) allies, according to Pew polling released in September.
  
  What is the strategic benefit of all this geopolitical trumpery to the United States? It has never been clear, although it’s certainly long been a key aim of Russian President Vladimir Putin to weaken the NATO alliance.
  
  Biden should reaffirm American commitments to NATO which Trump’s then-secretary of defense, Jim Mattis,publicly described in 2017as the “most successful and powerful military alliance in modern history,” something that Mattis’ former boss has never seemed to understand.
  
  At the same time, Biden should make it clear to Putin that the Russian leader’s  bromance with Trump was an aberration in US foreign policy and that the US will take a strong stand on any interference in American electoral processes–including by indicting and sanctioning any of Putin’s allies who are involved in these activities.
  
  To its credit, the Trump administration took a skeptical view of China’s military expansionism and its unfair trade practices. Biden should continue with this, but should do more to publicly criticize China’s imprisonment of some one million Uyghurs—who the Chinese government claim are only being held in  “re-education camps”  – and China’s deconstruction of a democratic Hong Kong.
  
  GOP leaders, demand that Trump stop his outrageous assault on America's vote now
  
  The new president should also reverse some of the more odious immigration policies of the Trump administration, whichseparated more than 500 children from their families at the southern border. Biden has vowed toform a task force to reunite the kids with their families.
  
  TheTrump administration says it will let in only 15,000 refugeesin the next yearwhen the world has more refugees than at any time since World War II, according to the UN. Rightly,Biden has said he would allow 125,000 refugees to settle in the US.
  
  Biden says he will end the “travel ban,”aimed mostly at Muslim-majority countries. The ban did nothing to prevent thejihadist terrorist attacksthat occurred over the past four years in the United States which were carried out variously by US citizens, legal permanent residents of the United States anda Saudi military officer who killed three American sailorsat the Naval Air Station in Pensacola, Florida in December 2019. Saudi citizens are not subject to the travel ban.
  
