  ##### Say no to pumpkin spice lattes. Here is the real thing
  
  The calendar says August, which means it’s officially time for everything [pumpkin spice](https://www.cnn.com/2021/10/01/health/pumpkin-spice-smell-wellness/index.html) once again. Too soon? Starbucks doesn’t think so — [it’s putting its PSL](https://www.cnn.com/2023/08/23/business/pumpkin-spice-latte-anniversary/index.html)back on the menu starting August 24.
  
  So if you catch a whiff of sugary spices in the air, it’s not your imagination, It’s just the smell of manufactured autumnal nostalgia. And since “pumpkin spice latte” isn’t a flavor found in nature anyway, maybe this is a sign to step away from the processed drinks and turn over a new leaf. (Because you know that pumpkin is a squash and doesn’t really taste like cinnamon and syrup on its own, right?)
  
  ### Homemade pumpkin spice blend
  
  If what gets you going every [fall](https://www.cnn.com/2021/09/22/health/fall-autumn-wisdom-project-wellness/index.html)is the taste of pumpkin spice, it’s not the actual pumpkin you’re craving. It’s the spice blend (amped up with sugar) that flavors lattes, cereal, Twinkies and more.
  
  Ad Feedback
  
  But now that we’re all experts in cooking from our pantry, why not stir together a simple homemade pumpkin spice blend so you can pumpkin spice-ify anything your heart desires at home?
  
  Pumpkin spice blend is a simple combination of cinnamon, ginger, nutmeg, allspice and cloves. Try[this recipe](https://www.mybakingaddiction.com/pumpkin-pie-spice-recipe/)and adjust the proportions as desired to make a custom blend that’s perfectly suited to your taste.
  
  ### Pumpkin butter
  
  For a mostly hands-off project that pays in dividends, pumpkin butter is the way to go. It can be made in a slow cooker, on the stove or in the oven. And once everything’s in the pot, the mixture cooks down while you get everything else done.
  
  It’s vegan comfort food. Really.
  
  Use 1 cup granulated sugar and 1½ teaspoons pumpkin spice blend for every 3 pounds cubed pumpkin. Stir together in a large Dutch oven or slow cooker. Simmer over medium-low heat or cook in a 350-degree oven for 1-2 hours, or set the slow cooker to low for 10 hours.
  
  Once the pumpkin is soft, puree with a stick blender or mash by hand for a more rustic texture.
  
  [![Image 14: LBB jalapeno thumb 7](https://media.cnn.com/api/v1/images/stellar/prod/230727160011-lbb-jalapeno-thumb-7.jpg?c=16x9&q=h_720,w_1280,c_fill/w_256) This trick will keep the heat in the pepper and off your skin while cutting a jalapeño](https://www.cnn.com/videos/health/2023/07/28/how-to-cut-a-jalapeno-lbb-contd-wl-orig.cnn)
  
  ### Pumpkin fries
  
  If you like sweet potato fries, give pumpkin fries a try. Just like their root vegetable cousins, pumpkin fries can be[baked in the oven](https://www.uchealth.org/today/cooking-with-pumpkins-savory-oven-baked-pumpkin-fries/)or[crisped up in the air fryer](https://www.tasteofhome.com/recipes/air-fryer-pumpkin-fries/), and can skew savory or sweet depending on your cravings. This method also works with other squash varieties, like delicata or kabocha.
  
  Peel and slice pumpkin into matchsticks and toss with olive oil and your preferred spice blend, then bake in a 400-degree oven for 30 minutes or cook in an air fryer, stirring halfway through, for 15 minutes until browned.
  
  Want them even crispier? Bread them in panko, just like you would a chicken cutlet, and add spices like cinnamon and sugar for churro-style pumpkin fries or Parmesan and garlic for Italian fries.
  
  ### Pumpkin fondue
  
  Dinner parties might not be on the calendar anytime soon, but even family dinner nights can get a little thrill when you serve fondue out of a real pumpkin.
  
  You can either fill a pumpkin with layers of bread, cheese and cream, then[roast the whole thing](https://sweetpealifestyle.com/pumpkin-fondue/), or pour[stovetop-made fondue](https://www.foodandwine.com/recipes/classic-swiss-cheese-fondue)into a pumpkin. Either way, it’s cheesy fun. The second option also allows for you to serve a[white chocolate fondue](https://www.theseasonedmom.com/white-chocolate-champagne-fondue/)for dessert.
  
  And because the pumpkin itself doesn’t have to be eaten — just the gooey fondue inside — you can make mini fondues for everyone in the family with smaller pumpkins.
  
  ### Roasted pumpkin
  
  Is an oven-roasted pumpkin not ambitious enough for you? How about roasting a whole pumpkin in your backyard fire pit or in a campfire?
  
  [![Image 15: 04 beans longevity wellness chickpea](https://media.cnn.com/api/v1/images/stellar/prod/230627091613-04-beans-longevity-wellness-chickpea.jpg?c=16x9&q=h_720,w_1280,c_fill/w_256) David McLain Eating this food may be a reason why some people live to 100](https://www.cnn.com/2023/06/29/health/beans-longevity-blue-zone-wellness)
  
  [The method](https://stacylynharris.com/pumpkin-pie-pioneer-style/)is almost too simple: Nestle a hollowed-out pumpkin directly in the coals of a fire and let it cook until a knife inserted into the pumpkin goes through easily, keeping the hot coals and fire going around it.
  
  Once your pumpkin is roasted, it will be deeply charred on the outside. No matter — you’re not here for the skin. Move it out of the coals until it’s cool enough to handle, then scoop out the soft flesh inside and blend until smooth. Use this homemade puree for any pumpkin treat that strikes your fancy, like a[pumpkin pie milkshake](https://www.allrecipes.com/recipe/255333/quick-and-easy-pumpkin-pie-milkshake/).
  
  (You can also roast a pumpkin[on the grill](https://heygrillhey.com/how-to-grill-pumpkin/), but it’s not quite as dramatic.)
  
  ### Pumpkin beer chili
  
  Even if you’re not a fan of pumpkin beer, chances are you might have a can or two left in the fridge by some well-meaning friends. Don’t dump them down the drain — make recipes that use the slight sweetness and spice of the beer style to their advantage, like chili.
  
  Substitute any pumpkin beer for the hard cider in[this recipe](https://www.aspicyperspective.com/pumpkin-chili/), which gives you a chance to use homemade pumpkin puree from your roasted pumpkin. You can also cube the pumpkin in place of butternut squash in any chili recipe, like[this one](https://www.spicesinmydna.com/pumpkin-beer-chicken-chili-with-butternut-squash-and-kale/)that also includes pumpkin beer.
  
  And don’t forget, roasted pumpkin seeds make a great chili topping.
  
  [![Image 16: Middle Eastern cuisine: freshly made hummous, a spread made from chickpeas and seasoned with sumac and oil. Served with flat bread.](https://media.cnn.com/api/v1/images/stellar/prod/getty-images-1478516891.jpg?c=16x9&q=h_720,w_1280,c_fill/w_256) Middle Eastern cuisine: freshly made hummous, a spread made from chickpeas and seasoned with sumac and oil. Served with flat bread. Ionut Groza/500px/Getty Images How to spice up your pantry the Mediterranean way](https://www.cnn.com/2023/07/09/health/mediterranean-diet-spices-wellness)
  
  ### Pumpkin beer bread
  
  Or are you in the mood for beer bread? Pumpkin bread? How about both?
  
  Pumpkin beer bread has two things going for it: The yeast in the beer works with sugar, baking powder and flour as a turbocharger to help the bread rise quickly in the oven. Adding pumpkin puree gives it moisture and structure.
  
  And when you’re using real pumpkin and not a canned puree, you control the level of sugar and spices in the finished loaf.
  
  Try[this recipe](https://www.goodfoodstories.com/pumpkin-beer-bread/)and get all the fall feels without any of the fake flavors.
  
