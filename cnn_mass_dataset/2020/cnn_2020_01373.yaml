  To make “nice cream,” simply place frozen banana slices, unsweetened almond milk, cocoa powder, a little maple syrup and a splash of vanilla extract in a blender. Blend until smooth, then dig in!
  
  Instead of:ground beef for tacos or burgers
  
  Choose:half beef; half sauteed mushrooms
  
  Cutting back on meat doesn’t have to mean replacing meat entirely in a recipe. “Even if you add a little bit of chopped mushroom to a ground beef patty mixture, that can help to reduce the meat you consume,” saidDr. Robert Graham, chef and co-founder of FRESH Med, an integrative health and wellness center in New York City. What’s more, you’ll boost fiber and save saturated fat in a taco or burger recipe.
  
  Instead of:pre-popped popcorn
  
  Choose:homemade popcorn trail mix
  
  Making your own air-popped popcorn is ahealthier alternativeto many pre-popped popcorn found in supermarkets or traditional movie theater popcorn.
  
  To give air-popped popcorn a sweet and savory boost that will also upgrade its nutritional profile,mix indried cranberries or chopped dried apricots, along with almonds, pistachios, peanuts or sunflower seeds. You can also add some chocolate chips if you wish.
  
  Instead of:store-bought breakfast burritos
  
  Choose:homemade veggie burritos
  
  While store-bought burritos are convenient, they can be high in sodium. Instead trymaking your ownfreezer-friendly versions.  Simply saute vegetables for about 10 minutes, scramble some eggs, then fill and roll the tortillas. Then heat for about five to 10 minutes in the oven.
  
  “The great part about making your own is you can use up any leftover veggies you have sitting in the fridge,” McGrane added.
  
