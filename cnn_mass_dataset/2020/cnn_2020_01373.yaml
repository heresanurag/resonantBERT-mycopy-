title: "Brownies, truffles and pasta: Healthful food swaps you will love"
date: "2020-06-11"
section: "Health"
url: "https://www.cnn.com/2020/06/11/health/healthy-food-swaps-wellness/index.html"
content: |
  When I think of healthy food swaps, I’ll be honest: Most of the time, I’m uninterested. I’m the type who would rather have a tiny portion of the real thing than a larger portion of a less satisfying diet substitute.
  
  But I must say, the landscape for healthful food swaps has changed over the years. There are some terrific ingredient swaps you can include in dips and baked goods; foods with more healthful nutrient profiles that don’t sacrifice flavor; and delicious recipes you can make that are actually more filling than their traditional versions.
  
  Want to eat less meat? Take a page from these cultures that already do
  
  When making a swap, taste and texture are key, according to Denver-based registered dietitian nutritionist Kelli McGrane, who said we’ve come a long way from replacing butter or oil with applesauce in cookies.
  
  “People are playing around with different kinds of flour and using avocado in brownies — and these foods offer the same mouthfeel, but they are healthier.”
  
  Here are some tasty swaps that are not only lower in calories than their traditional cousins; they also offer a lot more nutrients that will satisfy your palate in addition to nourishing you so that you feel energized throughout the day.
  
  They are organized into three categories: food swaps, ingredient swaps and recipe swaps. Note: The nutritional data for swaps was provided by digital health and fitness platformLose It!
  
  Instead of:regular wheat pasta
  
  Choose:chickpea pasta
  
  “Chickpea and other legume-based pastas provide about five times more fiber and two times more protein than traditional pasta noodles,” said McGrane, who is also a contributing dietitian for Lose it!
  
  Because chickpea pasta has more fiber and protein, “it will be a more filling meal, but you’ll still get that nice chew that you expect from your pasta dishes,” McGrane said.
  
