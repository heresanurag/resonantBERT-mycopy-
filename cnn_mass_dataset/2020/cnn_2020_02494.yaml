title: "A 3,000% jump in jobless claims has devastated the US job market"
date: "2020-04-02"
section: "Economy"
url: "https://www.cnn.com/2020/04/02/economy/unemployment-benefits-coronavirus/index.html"
content: |
  The last three weeks have marked one of the mostdevastating periods in historyfor the American job market, as first-time claims for unemployment benefits have surged more than 3,000% since early March.
  
  Businesses continue to lay off andfurlough workersamid the coronavirus outbreak.
  
  6.6 million US workers filed for their first week ofunemployment benefitsin the week ending March 28, according to theDepartment of Labor— a new historic high.
  
  That was far greater than economists had expected, and more than 3,000% the pre-pandemic levels. Unemployment claims at this level suggest a severe job market decline hardly any American alive has ever seen in their lifetimes.
  
  Economists characterized the increase as “monstrous,” “stunningly awful,” and “a portrait of disaster.”
  
  Including the prior week’s3.3 million initial claims, Americans have filed nearly 10 million jobless claims in the last two weeks alone.
  
  That corresponds to roughly 6% of America’s 165 million strong work force, which in turn implies a 9.5% unemployment rate, according to Citi economist Andrew Hollenhorst.
  
  “Further job loss expected in coming weeks is very likely to push unemployment above 10%, even taking account of a potential steep decline in the labor force participation rate, as some displaced workers are neither furloughed nor looking for work,” Hollenhorst wrote in a note.
  
  The rules ofwho can file for unemployment benefitsvary by state. But in the face of the coronavirus outbreak, the government has waived some restrictions. Independent contractors and self-employed people, for example, who don’t usually qualify, can now temporarily receive benefits through a pandemic unemployment assistance program Congress created.
  
  Whether this week’s massive claims number was the worst of it remains to be seen. Ahead of the coronavirus outbreak, weekly first-time claims had been hovering in the low 200,000s.
  
  This “tectonic shift” in the US labor market “implied a real-time unemployment rate of 10.1% at a minimum,” said Joseph Brusuelas, chief economist at RSM.
  
  As companies continue to close their doors and shed workers to limit the spread of coronavirus throughout the population, more workers will need government aid to make ends meet.
  
  Brusuelas said in his view, the Trump administration should work on a next-phase fiscal aid package to “target plugging the holes that are being blown in state and local budgets, in addition to Federal Reserve purchases of state and municipal debt.” The governmentpassed the CARES Actto combat the effects from the coronavirus outbreak last week.
  
  TheMarch jobs report, which is due Friday at 8:30 am ET, isnot expected to look quite as dire. The Refinitiv consensus estimate is for a loss of 100,000 jobs, with the unemployment rate inching up to 3.8%, from its historic low of 3.5%.
  
  The March report will be more muted because the survey it is based on concludes around the middle of the month – which was before millions of Americans filed for unemployment benefits for the first time.
