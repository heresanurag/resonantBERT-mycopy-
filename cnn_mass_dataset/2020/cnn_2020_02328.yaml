title: "Jack Dorsey sets aside $1 billion for charity. His initial focus: coronavirus relief efforts"
date: "2020-04-07"
section: "Tech"
url: "https://www.cnn.com/2020/04/07/tech/jack-dorsey-coronavirus-donation/index.html"
content: |
  Twitter co-founder and CEO Jack Dorseysayshe’s dedicating more than a quarter of his wealth to a new fund for charitable causes, with the immediate focus on coronavirus relief efforts.
  
  Dorsey willtransfer $1 billionof his equity in Square(SQ)— the digital payments company he also co-founded — to a limited liability company called Start Small, he said in a series of tweets on Tuesday. Dorsey said that amount accounts for around 28% of his wealth.
  
  The first of those grants from Start Small, for $100,000, will go to America’s Food Fund to provide meals to those impacted by the coronavirus, according to aGoogle Doche shared for tracking all the grants.
  
  Dorsey did not specify how much of the $1 billion commitment will be directed toward coronavirus relief as opposed to other charitable efforts after the pandemic ends.
  
  Google is donating $800 million to help with the coronavirus crisis
  
  “After we disarm this pandemic, the focus will shift to girl’s health and education, and UBI,” he said, referring to the concept of universal basic income. “I believe they represent the best long-term solutions to the existential problems facing the world.”
  
  Dorsey’s announcement follows similar efforts by other big tech players. Amazon(AMZN)CEO Jeff Bezos and Microsoft(MSFT)co-founder Bill Gates — the world’s two wealthiest people — have each pledged $100 million toward coronavirus relief.
  
  Some of the industry’s biggest companies are also putting their immense resources behind the fight against the global pandemic.
  
  Googl(GOOGL)e last monthcommitted $800 million— much of it in ad grants to small businesses and healthcare organizations. Facebook(FB)has adopted a similar ad credit strategy, while working with global authorities tofight misinformationon its platforms. Apple(AAPL), SoftBank(SFTBF)and Alibaba(BABA)are collectively donating millions of respirator masks to healthcare workers.
