title: "Ex-Federal Reserve Chairman Alan Greenspan: I’ve never seen anything like this"
date: "2020-11-19"
section: "Economy"
url: "https://www.cnn.com/2020/11/19/economy/greenspan-pandemic-economy/index.html"
content: |
  The incoming administration of President-elect Joe Biden has its work cut out for it, andgetting the virus under controlshould bethe number one priority, according to former Federal Reserve Chairman Alan Greenspan, a move that will help save the economy.
  
  “I’ve never seen a particular situation during my professional experience anything like this,” the 94-year-old Greenspan told CNN’s Julia Chatterley on her show First Move on Thursday.
  
  Although he wasn’t working in finance when he was a boy, he lived through the Great Depression.
  
  Greenspan headed the Fedfrom 1987 to 2006, the second-longest tenure in that role. (He missed being first by four months.)
  
  Although multiple drug makershave announced encouraging resultsfrom their vaccine trials, infection rates are still on the rise around the world, as well as in the United States.
  
  Trying to forecast where the virus is going at this stage is little more than a guess, Greenspan said. It might be possible to get back to normal by next spring, he added, but only if the virus’s spread is controlled and stays that way.
  
  Alan Greenspan on the Fed's pandemic response
  
  Current Fed Chairman Jerome Powell has repeatedly said that theeconomy will fully recover onlywhen the Covid-19 pandemic is under control. Even then, we likelywon’t go back to the economy we knewbefore the pandemic hit.
  
  Millions of Americans stillneed benefitsto make ends meet because they have lost their jobs due to the crisis and areunable to find new ones.
  
  The government spent trillions through the CARES Act in the spring, butWashington hasn’t been able to agree on any additional stimulussince then. This mustchange, Greenspan and many economists agree.
  
  “I thinkPelosi has a particular set of ideasto confront the problems right now in front [that]seem quite credible to me,” the former central banker said. “All they have to do is implement them.”
  
  As long as there is general agreement that something needs to get done, passing a new stimulus package should be easy, Greenspan said. But in a situation this precarious, one should always ask what might go wrong.
  
  “I’m not convinced at all that we have enough information to know how to deal with this type of problem,” Greenspan said, adding that there could be unintended consequences for society.
