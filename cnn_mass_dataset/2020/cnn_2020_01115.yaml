content: |
  Uber and Lyft are threatening to shut down services in California this week, but with a drop in ridership from the pandemic, will it really even matter?
  
  Here’s what else you need to know toGet Up to Speed and On With Your Day.
  
  (You can also get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  Democrats and several state leaders arepushing back on what they see as the Trump administration’s attemptto throttle the US Postal Service to influence the upcoming presidential election. House Speaker Nancy Pelosi is calling on the House to return to Washington, likely next weekend, for an unheard of session during presidential convention season to address the concerns. Democrats also wantthe new Postmaster General Louis DeJoyto testify andaddress charges that his controversial new policy changesare intended to deliberately slow mail-in voting.At least a half dozen states including Colorado, North Carolina and Virginiaare also considering legal action against the Trump administration and the United States Postal Service to stop these changes from going into effect. At DeJoy’s behest, the USPS has slowed delivery,removed high-speed letter sortersand will no longer automatically give priority to mail-in ballots.
  
  New Zealand’s Prime Minister Jacinda Ardern isdelaying the country’s parliamentary election by four weeksafter a resurgence of coronavirus in the country. Ardern said she made the decision “in the best interests of voters and our democracy,” and with assurance from the country’s Electoral Commission that the country could deliver a safe election on the new date, October 17. Meanwhile, in the US, the chief of staff and deputy chief of staffat the Centers for Disease Control have both voluntarily resigned. The CDC is also contending with President Trump’s unexpectedannouncement that the agency could deploy teams to assist schools with safely reopening in the fall. Clusters of the disease have already popped up on several college campuses, including theUniversity of North Carolina. At the University of Oklahoma,nine football players have tested positiveas the school moves forward with plans to play during the fall season.
  
  The Democratic National Convention kicks off today. The completely virtual event will play out among four stage setups in New York City, Los Angeles, Milwaukee and Wilmington, Delaware, and will culminate with the formal nomination of former Vice President Joe Biden and his newly minted vice-presidential running mate, Sen. Kamala Harris. Usually, these conventions are over-the-top affairs with hours of programming, but experts say this year’s scaled-down versions (the DNC will only air two hours of prime-time programming a day) could have along-term impact on how conventions are held. This week’s conventioncomes as a new CNN poll reveals Biden’s lead over Trump tightening significantly over the last few months.
  
  We’re learning more about the aftermath of the wide-reaching Russia investigation that concluded last spring. According to the Washington Post, Republican and Democratic leaders of theSenate Intelligence Committee told the Justice Department last Julythey believed several people close to President Donald Trump, including his son Donald Trump Jr., son-in-law Jared Kushner and former adviser Steve Bannon, may have misled them during testimony in the investigation. It’s not clear whether their suspicions led to any further inquiries, or any ongoing investigations. This news comes after Senate Committee chairmen announced this month they had adopted a fifth and final report – yet to be released to the public – which they compiled on Russian interference in 2016.
  
  Tens of thousands of protesters gathered in the Belarusian capital of Minsk this weekendto demand a new presidential election. The country’s recent contest ended with longtime President Alexander Lukashenko claiming victory amid accusations that he had manipulated the election. His main opponent Svetlana Tikhanovskaya fled the country to Lithuania in the aftermath. What happens next in Belarus is of interest to both the US and Russia. The US would like to see Belarus come out from under the influence of Russia but, as things stand now, that will be difficult.Lukashenko had two calls with Russian President Vladimir Putin last week,and the two leaders agreed to “regular contacts at various levels and the disposition to strengthen allied relations.”
  
