title: "NASCAR honors frontline health care workers as drivers return to the track"
date: "2020-05-17"
section: "US"
url: "https://www.cnn.com/2020/05/17/us/nascar-race-today-darlington-trnd/index.html"
content: |
  NASCAR racing returned Sunday aftermore than two months offdue to the coronavirus pandemic that shut down much of the country.
  
  The comeback race at Darlington Raceway in South Carolina, dubbedThe Real Heroes 400, was held without fans, according to NASCAR.
  
  Driver Kevin Harvick won Sunday’s race,NASCAR said on Twitter, making him the 14th driver in NASCAR’s history to claim 50 victories.
  
  The event honored health care workers as part of theThe Real Heroes Project,a collaborative initiative among more than a dozen sports leagues to recognize and pay tribute to medical professionals on the front lines fighting Covid-19.NASCAR is one of the first professional sports leaguesto resume competition amid the pandemic.
  
  “As the coronavirus challenges our country in unprecedented ways, the frontline healthcare workers – the nurses, paramedics, emergency physicians and many others – continue to inspire us with their strength and bravery in caring for their fellow Americans,” saidJill Gregory, NASCAR executive vice president and chief marketing and content officer.“These men and women are the real heroes and the NASCAR industry is incredibly proud to honor their selflessness and service.”
  
  The names of health care workers currently battling the coronavirus pandemic replaced  driver’s names above their driver-side window, NASCAR said.
  
  Those honored also served as grand marshals for the race and appeared in a montage to give drivers the command to start their engines. NASCAR also tweeted out the video.
  
  We can never thank these people enough.#TheRealHeroesgive the command to start today's race at@TooToughToTame!pic.twitter.com/SLbQ55dQ6p
  
  Michelle Vaughan, an ICU nurse at theBon Secours St. Mary’s Hospital in Richmond, Virginia, was among the health care workers honored by NASCAR.
  
  Vaughan came up with a creative way to connect Covid-19 patients and their loved ones who cannot be together due to increased restrictions at hospitals.
  
  She developed theBe There Bearsproject to help ICU patients hear their loved ones’ voices by placing recorded phone messages from family members into teddy bears, Bon Secours said.
  
  “After calling several families and hearing the messages they left for their loved ones, it brought me to tears. Taking it one step further, getting to put the bears in the arms of the patients, I was overcome with pride and happiness to know that my patients might be able to feel their families’ presence,” Vaughan said. “It’s so important not only for our patients to feel the love and support of their families, but for us as nurses to feel connected to our patients and their families as well.”
  
  Vaughan’s name appeared on FedEx Racing driver Denny Hamlin’s car during Sunday’s race. Hamlintweeted a video messageabout the honor on Thursday, noting he’s “lucky enough to go back to work” this weekend “and it’s because of the frontline heroes like Michelle Vaughan.”
  
  To Michelle Vaughan and all the COVID-19 frontline workers, we can’t thank you enough for all you’re doing for us. This weekend, we race for you.#TheRealHeroes#NASCARIsBackpic.twitter.com/rVuiVjVLf0
  
  Sunday’s race also marked the comeback of driver Ryan Newman, who was injured in afiery crashin final seconds of the Daytona 500 in February.
  
  NASCAR driver Ryan Newman says he has no recollection of Daytona 500 crash
  
  “Great day in America,” Newmantweetedon Sunday. “Thankful to get back at it for all of us.”
  
  Great day in America.  Thankful to get back at it for all of us.@oscarmayer@CocaColaRacing#nascar#partnerspic.twitter.com/FvUQ1tmYKC
  
  Newman had been in the lead during the final lap of Daytona 500 when another driver hit his bumper, sending his car into the wall and causing it to flip into the air. Then, his car was hit by another after it landed back on the track, sending him airborne again. Newman’s car burst into flames as it skidded, upside down, across the finish line.
  
  Rescue crews had to cut the car’s roof off to pull Newman from the vehicle. He miraculously walked out of the hospital two days later.
  
  At anews conference on Thursday,Newman said he has no memory of his horrific crash, nor does he remember his hospital stay until he was leaving with his kids.
  
  “I was medically treated to not know (about my condition),” he said last week. “They were trying to keep me in a somewhat of a medically-induced coma from what I’ve been told, and that medicine kind of zoned me out, so I really don’t have any memories or recollection of any of my crash until I actually had my arms around my daughters walking out of the hospital.”
  
  Newman madehis 22nd Cup Series start at Darlington – a track where he has 13 top-10 finishes with seven top-five finishes.
  
  “I’m hoping to do every lap and then one more after that,” Newman, who was cleared to return to racing April 28, said of Sunday’s race. “I think they are having a victory lap still. I was ready to do that in Daytona.”
