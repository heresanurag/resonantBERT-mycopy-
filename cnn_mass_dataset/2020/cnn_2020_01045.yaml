title: "Beer unsold during Australia’s coronavirus lockdown has been turned into renewable energy"
date: "2020-08-11"
section: "Australia"
url: "https://www.cnn.com/2020/08/11/australia/coronavirus-australia-beer-energy-intl-hnk-scli"
content: |
  When Australia’scoronaviruslockdown forced bars and restaurants to shut down in March, breweries were left with huge inventories of unsold, stale beer.
  
  But instead of going to waste, some expired ales and lagers in the state of South Australia have been serving a new purpose: powering a water treatment plant.
  
  At the Glenelg Wastewater Treatment Plant to the west of the state capital Adelaide, millions of liters of unused beer from local breweries have beenconvertedinto renewable energy to power its water treatment process in recent months.
  
  The plant mixes organic industrial waste with sewage sludge to produce biogas, which is then turned into electricity to power the whole facility. It usually generates enough biogas to provide about 80% of its energy needs.
  
  But the recent influx of beer has boosted its energy generation to new levels, reaching 654 megawatt hours in a single month, Lisa Hannant, senior manager of production and treatment at SA Water, said in a statement.
  
  “By adding around 150,000 litres of expired beer per week, we generated a record 355,200 cubic meters of biogas in May and another 320,000 cubic metres in June, which is enough to power 1,200 houses,” Hannant said.
  
  Australia's oldest micronation, Hutt River is no more thanks to Covid-19
  
  Beer worked well for the plant’s “digesters,” Hannant said, referring to the large sealed concrete tanks where sewage sludge is heated in an oxygen-free environment and decomposed to produce methane-rich biogas. The booze’s high calorific value – the amount of heat released during combustion – makes it “perfect” for the anaerobic digestion process, she added.
  
  “Honorably, our thirsty digesters have been doing their bit for the environment by drinking themselves silly and with such a horrific diet it’s no wonder they produce so much gas!” she said.
  
  Imposed in late March, Australia’s coronavirus lockdown hit the brewing industry hard. In May, Lion Beer Australia, one of the country’s largest breweries, said it was emptying 90,000 kegs – or 4.5 million liters (1.188 million gallons) – of unwanted beer, according to CNN affiliate7News.
  
  The beer was tipped into the onsite wastewater treatment plants at its breweries across the country to create biogas, which can be used to brew new beer, 7News reported.
