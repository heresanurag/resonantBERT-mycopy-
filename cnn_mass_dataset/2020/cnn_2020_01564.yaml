title: "Mookie Betts earned everyone in America a free Taco Bell taco when he stole a base in the World Series"
date: "2020-10-21"
section: "US"
url: "https://www.cnn.com/2020/10/21/us/mookie-betts-taco-bell-spt-trnd/index.html"
content: |
  Mookie Betts did it all for theLos Angeles Dodgerson Tuesday night in a Game 1World Seriesvictory over the Tampa Bay Rays, including winning free tacos for everyone in America.
  
  Taco Bell is running its“Steal a Base, Steal a Taco” promotionthrough the World Series, and Betts’s first stolen base earned all the chance to get a free Doritos Locos Taco.
  
  It's time for the World Series and it's going to be a weird one
  
  Betts actually stole two bases in the bottom of the fifth inning, but the promotion’s rules only allow people to claim one free taco.
  
  On October 28, anyone in the US and the District of Columbia can get a free Doritos Locos Taco at participating locations, according to the company’s website.
  
  The Dodgers beat the Rays 8-3 in Game 1. Betts had two hits, two runs, one home run and one RBI. It’s no coincidence that the Dodgers’ best inning was in the fifth, when Betts stole those two bases.
  
  Betts has been down this road before: He stole a base in Game 1 of the 2018 World Serieswhile Taco Bell was running that same promotion when he played for the Boston Red Sox against his current team, the Dodgers.
