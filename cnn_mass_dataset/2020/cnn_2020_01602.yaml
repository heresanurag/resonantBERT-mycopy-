title: "Kroger and Walmart test one-way aisles as a coronavirus preventative measure"
date: "2020-04-06"
section: "Business"
url: "https://www.cnn.com/2020/04/06/business/coronavirus-grocers-one-way-aisles/index.html"
content: |
  The one-way aisle is the latest traffic-control measure to be implemented by US grocery retailers to encourage physical distancing during the coronavirus pandemic.
  
  Kroger(KR), the nation’s largest supermarket operator, is testing one-way aisles at stores in certain markets to determine their effectiveness in providing appropriate distancing between customers, according to a statement releasedMonday.
  
  Retailers such asHy-Veeand Walmart havemade similar moves, according to areport from industry news source Grocery Dive, which noted that inplaces like Connecticut, one-way aisles are mandated as emergency regulations.
  
  “We expect this to help more customers avoid coming into close contact with others as they shop,” Dacona Smith, Walmart US’ executive vice president and chief operating officer, wrote in anApril 3 announcement.
  
  The efforts to direct in-store shopping flow are part of a growing slew of measures put in place by retailers in recent weeks to help protect both employees and shoppers. Essential businesses like grocery stores and pharmacies haveinstalled acrylic glass partitionsat checkouts,designated shopping hoursfor older and immune-compromised individuals, installed distancing decals and signage, and started to meter store traffic.
  
  Starting Tuesday, Kroger will reduce its store capacity by 50% to limit the number of customers who are shopping at the same time.
  
  “By leveraging QueVision, our technology system that uses infrared sensors and predictive analytics, we will be able to more efficiently support our new capacity limits, creating a safer environment for our customers and associates,” Yael Cosset, Kroger’s chief technology and digital officer, said in the announcement.
  
  Kroger is encouraging employees to wear protective masks and gloves. The grocer said it has ordered masks for its US workforce and also plans to expand employee temperature checks to stores.
  
  A Kroger spokesperson could not be immediately reached for comment.
