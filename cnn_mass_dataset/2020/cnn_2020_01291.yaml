title: "Bill Gates: It’s ‘outrageous’ Americans can’t get coronavirus test result in 24 hours"
date: "2020-09-20"
section: "Media"
url: "https://www.cnn.com/2020/09/20/media/bill-gates-outrageous-coronavirus/index.html"
content: |
  Bill Gates isfrustrated by the waycoronavirus testing is behind handled in the United States.
  
  “Even today, people don’t get their results in 24 hours,” Bill Gates said on “Fox News Sunday.” “It’s outrageous that we still have that.”
  
  And when it comes to the technology behind the testing, Gates made it clear thatthere’s no excusefor the slow timeline. “The US has more of these machines, more of this capacity than other countries by a huge amount,” he said.
  
  As for the way the US handled the pandemic overall, “We did a very poor job and you can just see that in the numbers,” Gates said.
  
  The Bill & Melinda Gates Foundation has been very involved with the race for a coronavirus vaccine. Thefoundation is backingCureVac, a German biotech that is working on a Covid-19 vaccine. CureVac recently received approval from the governments of Germany and Belgium to start clinical trials for one of its Covid-19 vaccines.
