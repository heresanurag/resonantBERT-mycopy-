title: "Son Heung-Min to undergo military training in South Korea"
date: "2020-04-06"
section: "Football"
url: "https://www.cnn.com/2020/04/06/football/son-heung-min-south-korea-military-service-tottenham-spt-intl/index.html"
content: |
  Tottenham Hotspur star Son Heung-Min will undertake military service in South Korea duringfootball’songoing shutdown, his agent, Son Seung-hyuk, confirmed to CNN.
  
  Son is currently completing two weeks of self-quarantine after returning to South Korea last month with thePremier Leaguesuspended amid thecoronavirusoutbreak.
  
  Visit CNN.com/sport for more news, videos and features
  
  The 27-year-old, who captains his national team,avoided military conscription in 2018after winning the Asian Games with South Korea, but exempt athletes are still required by law to undertake four weeks of national service, or three weeks with the Marine Corps.
  
  “(Son) will move to Jeju Island as soon as he has completed self-quarantine, and will receive three weeks of basic military training at the 9th Brigade of the Marine Corps beginning on April 20,” said his agent.
  
  “Basic military training in the army is usually scheduled for four weeks, but the navy (the Marine Corps) has been changed to three weeks from 2019.”
  
