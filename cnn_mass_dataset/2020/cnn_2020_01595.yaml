title: "What you should know about Kobe Bryant’s memorial"
date: "2020-02-23"
section: "US"
url: "https://www.cnn.com/2020/02/23/us/what-to-know-kobe-bryant-memorial-trnd/index.html"
content: |
  Crowds of mourners will gather in Los Angeles on Monday to honor the lives ofKobe Bryantand his 13-year-old daughter, Gianna.
  
  Numerous tributes have taken place since the Bryant, Gianna and seven others were killed in a helicopter crash last month. Bryant and his daughter werelaid to rest in a cemetery in Southern Californiaon February 7.
  
  Fans will pack Staples Center today to honor Kobe Bryant and his daughter
  
  But Monday’s memorial service will be a chance for the public to reflect on Bryant’s life and mourn the loss of the basketball legend and his daughter.
  
  Here’s what you should know.
  
  The “Celebration of Life” is set to begin at 10 a.m. PT (1 p.m. ET) on Monday, February 24, Vanessa Bryant, Kobe’s wife and Gianna’s mother, announced on Instagram.
  
  The date, 2/24, is symbolic. Bryant wore the number 24 in the latter part of his NBA career, while Gianna wore the number 2 for her youth basketball teams.
  
  “#2, #24 #20 years as a Laker and the amount of years Kob and I were together,” Vanessa wrote in a caption.
  
  Instagram post not found.
  
  Post has been removed or is no longer public.
  
  The memorial will be held at the Staples Center, where Bryant played for the Los Angeles Lakers and where his fans gathered to comfort each another after his death,building a makeshift monumentout of flowers, letters,basketballsand jerseys.
  
  The arena has hosted large-scale memorials in the past,most recently for rapper Nipsey Hussle last April.
  
  Hours after the Bryant memorial, the Staples Center will host a scheduled NBA game between the Los Angeles Clippers and the Memphis Grizzlies.
  
  Vanessa Bryant will attend the public service, a source close to the Lakers and the Bryant family told CNN.
  
  It’s unclear who will speak at the memorial, but thousands of people from Los Angeles and beyond are expected to attend.
  
  The Staples Center can seat about 20,000 people for non-sports events. About 17,000 tickets were given away forMichael Jackson’s memorial in 2009.
  
  A limited number of tickets were sold,ranging in price from $24.02 to $224— another homage to the numbers Bryant and his daughter wore on their jerseys.
  
  Proceeds from ticket sales are being donated to the Mamba and Mambacita Sports Foundation.
  
  Coverage of the event will be available on CNN’s website, but many local Los Angeles TV stations are expected to broadcast the event live, according to organizers.
  
  Kobe Bryant talked family and elevating female athletes in last interview with LA Times columnist
  
  NBA TV will carry the memorial service,according to the schedule on its website, with a 4-hour block beginning at 1 p.m. ET.
  
  According to the Los Angeles Lakers’ website, live streams will be available on Facebook, YouTube and elsewhere.
  
  The celebration of lifewill not play on the screens outside the Staples Centernor at nearby LA Live. There will not be any overflow locations for the public to watch the event, organizers said.
  
  People without tickets are strongly urged to not travel downtown, and many of the streets around the Staples Center will be inaccessible.
  
  Kobe Bryant wasn’t just one of the greatest basketball players of all time. He was also passionate about philanthropy and championing youth sports.
  
  If you’d like to honor Bryant and his legacy, here are a few charities you can donate to.
  
  Honor Kobe Bryant's legacy through the charities he supported
  
  •The Mamba and Mambacita Sports Foundation:Previously known as the Mamba Sports Foundation,Vanessa Bryant announcedearlier this month that the foundation had changed its name to honor Gianna. It provides funding to underserved communities and athletes in hopes of positively impacting their lives through sports.
  
  •Make A Wish Foundation:Kobe Bryant granted the wishes of more than 250 children battling life-threatening illnessesvia the Make A Wish Foundationover the years.
  
  •After-School All-Stars: Bryant was an honorary ambassador forthis nonprofit organizationthat works with schools across the country to extend school hours for low-income students. Bryant regularly gave motivational speeches and raised money for its Los Angeles chapter.
