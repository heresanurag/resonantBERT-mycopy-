title: "Sanders exits as pandemic redeems his core ideas"
date: "2020-04-08"
section: "Opinion"
url: "https://www.cnn.com/2020/04/08/opinions/bernie-sanders-exits-pandemic-redeems-ideas-jones/index.html"
content: |
  Editor’s Note:CNN host Van Jones is a former Obama administration official, a bestselling author and the CEO of the REFORM Alliance, a criminal justice organization. The views expressed in this commentary are his own. View moreopinionon CNN.
  
  Even though he is 78 years old, history will someday remember Vermont Sen. Bernie Sanders as a leader who was ahead of his time.
  
  In the age of the pandemic, Sanders’ ideas no longer seem like radical throwbacks to 1960s idealism. Today, they feel like hard-headed responses to the deadly challenges of the 21st century.
  
  Just consider the following:
  
  Sanders’ supporters may be disappointed, but they should not be disheartened. Though Sanders’ base was not broad enough to get him the nomination, the people who stood behind him represent much of America’s future.
  
  Many of today’s young peoplerevere Sanders, and they will play a growing role in our society. He had strong showings with Latino/Latina voters, whowill make upan increasing share of the American electorate in the decade to come. And, if you look only at people under the age of 35, Sandersmay have ledthe strongest, multiracial progressive movement in modern American history.
  
  Now that Sanders is out, Dems should cancel convention
  
  Sanders was the first progressive candidate since former President Barack Obama, who ran by inspiring and leading a true movement by the people and for the people. And that movement is not going away.
  
  Why? Because Sanders has a youthful, charismatic and powerful set of successors to carry on the fight – and many of them are younger women of color. Nina Turner, a former Ohio state senator and Sanders campaign surrogate, has become a fixture of American politics. And the so-called #Squad – Reps. Alexandria Ocasio-Cortez of New York, Ilhan Omar of Minnesota, Ayanna Pressley of Massachusetts, and Rashida Tlaib of Michigan – will be fighting for (and possibly implementing) Sanders-like ideas for decades to come.
  
  In other words, he transformed the Democratic Party without winning its nomination or even joining it. Along the way, he made the impossible seem possible. That counts for something.
  
  There is a reason, of course, that Sanders lost his final shot at the presidency. His condemnation of wealthy peoplewas always too sweeping, in my view. After all, Oprah Winfrey and Jay-Z are both in the “billionaire class.” Does anyone blame them for America’s woes? Categorically condemning all rich people, as he often seemed to do, turned potential allies into determined adversaries.
  
  Sanders: Path towards victory is virtually impossible
  
  Secondly, he showed too little passion even for Americans who run small businesses or who aspire to do so. At a minimum, he could have expanded his circle by enthusiastically embracing the growing cadre of business leaders – like those in theSocial Venture Circle,Green AmericaorGreenBiz– who are socially and ecologically responsible. Unfortunately, he generally missed those opportunities.
  
  And, in the end, hisinsistence on defendingthe finer qualities of Cuban dictator Fidel Castro’s literacy programs was probably fatal.
  
  But I am a Gen X-er. America’s youth read Sanders quite differently than do those of us who survived the Cold War.
  
  My youngest colleague at theREFORM Alliance– the criminal justice organization I lead – summed him up this way: “Bernie managed to be cool in a way that wasn’t cheap. Radical in a way that felt real. Aggressive – but passionate, not a bully,” said Gus Alexander. “One of the oldest candidates – he managed to rise as the most relevant for young people. The one who got it. Understood. People are pointing to how he reshaped the conversation, the landscape, moved the needle in such a big way. That’s my take on Bernie, too. And I’m grateful to him for it.”
  
  As he exits the race for president, the times are tragically thrusting Sanders’ core ideas to the forefront. On the issues of health care for all, worker empowerment and many others, presumptive Democratic nominee Joe Biden and the Democratic Party would be quite wise to catch up to the Vermont senator.
