  By [![Image 6: Lauren Dezenski](https://media.cnn.com/api/v1/images/stellar/prod/181205133827-lauren-dezenski.jpg?c=16x9&q=h_270,w_480,c_fill/c_thumb,g_face,w_50,h_50)](https://www.cnn.com/profiles/lauren-dezenski)[Lauren Dezenski](https://www.cnn.com/profiles/lauren-dezenski)
  
