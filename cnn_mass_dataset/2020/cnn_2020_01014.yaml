id: cnn_2020_01014
title: "Detroit teachers authorized a potential strike over Covid-19 safety fears"
date: "2020-08-19"
section: "US"
url: "https://www.cnn.com/2020/08/19/us/detroit-teachers-strike-coronavirus-reopening/index.html"
content: |
  The union representing teachers in Detroit has voted in favor of a potential strike to push school officials to make changes to the district’s reopening plan.
  
  The Detroit Federation of Teachers, which represents teachers in the Detroit Public Schools Community District, announced Wednesday that 91% of its members voted to authorize the union’s leadership to launch a “safety strike” in the future.
  
  Negotiations between the union and Michigan’s largest school district began after school officials approved a reopening plan in July.
  
  Pediatricians' group updates guidance on how to open schools safely
  
  The plan included online learning, “smaller in-person class sizes and daily safety protocols such as thorough cleaning, wearing masks and social distancing,” the district says.
  
  After it was approved, teachers argued that in-person learning would put their health and their students at risk due to the ongoing coronavirus pandemic.
  
  “If we go online now and remain safe, we will be able to safely return to our classrooms and stay put in the building rather than risk outbreak, after outbreak, after outbreak,” a teacher said ina video posted onlinethat details the union’s concerns.
  
  NYC teachers' union president says no one should be allowed in school without proof of a negative Covid-19 diagnostic test or a positive antibody test
  
  Terrence Martin, the union’s president, said Wednesday in a virtual news conference that more than 80% of his members want to teach only online classes.
  
  Wednesday’s vote is not “a work stoppage,” the union said ina statement, adding that members have agreed to teach and work remotely.
  
  “The action we took today is not an action we wanted to take but an action who had to take. It is not an action that we take lightly,” Martin said about Wednesday’s vote.
  
  In aseries of tweetson Wednesday, the school district said 75% of its 51,000 students are planning to start the school year completely online while 25% prefer in-person classes.
  
  The district noted in aseparate tweetthat “Teachers Have Options. No Teacher is Required to Teach Face to Face.”
  
  Nikolai Vitti, the school district’s superintendent, and the school district’s board acknowledged the union’s vote ina joint statementreleased Wednesday night, saying they were confident the district’s ongoing talks with the union “will result in a safe reopening of schools.”
  
  “Conversations with DFT have increased over the past week and we are both bargaining in good faith. The reopening process is very hard, on multiple levels, but we will get this right for our students, families and employees,” Vitti hadtweetedearlier on Wednesday.
  
  Students are set start the upcoming school year on September 8.
