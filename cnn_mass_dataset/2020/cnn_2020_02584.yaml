title: "Microsoft is giving workers 12 weeks of paid parental leave because of school disruptions"
date: "2020-04-09"
section: "Tech"
url: "https://www.cnn.com/2020/04/09/tech/microsoft-12-weeks-parental-leave/index.html"
content: |
  Microsoft is giving its workers an additional three months of paid parental leave to deal withextended school closuresdue to thecoronavirus outbreak.
  
  Parents whowork forMicrosoft(MSFT)can choose how and when to use the leave — whether it’s a three-month stretch or a few days a week —  a company spokesperson told CNN Business. The company is calling the program “12-Week Paid Pandemic School and Childcare Closure Leave.”
  
  The news was first reported byBusiness Insider.
  
  The policy is meant to “give our employees greater flexibility and time off as they face extended school closures,” the spokesperson added.
  
  The coronavirus has forced schools around the world to shut, with UNESCO estimating that school closures across 188 countries are impactingmore than 91%of the world’s student population — around 1.6 billion children and young adults. Several US states haveextended school closures, with some governors already announcing schools willremain shutfor the rest of the academic year. ThatincludesWashington, where Microsoft is headquartered.
  
  Coronavirus lockdown could give online education a lasting boost in India
  
  Microsoft’s move is one of several measures tech companies are taking to adapt to lockdowns, as most of their employees transition to working remotely due to the global pandemic. Facebook(FB)announced last month that it wouldgive $1,000to each of its 45,000 employees, and will continue to pay its hourly and contract workers in full despite reduced workloads. Google(GOOGL)and Twitter(TWTR)have also said they will continue to pay contractors.
  
  But other tech companies, such as Amazon(AMZN), havecome under firefor their treatment of workers amid the outbreak, particularly those at their warehouses and distribution facilities.
