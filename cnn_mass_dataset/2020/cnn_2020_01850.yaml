title: "Disinformation dystopia: Is Big Tech prepared for the 2020 election?"
date: "2020-02-20"
section: "Media"
url: "https://www.cnn.com/2020/02/20/media/2020-election-disinformation/index.html"
content: |
  A version of this article first appeared in the “Reliable Sources” newsletter. You can sign up for ithere.
  
  In 256 days, Americans will head to the polls to vote on whether to re-elect Donald Trump as President or to go in another direction. A lot will happen between now and then. But one thing is near certain: disinformation campaigns, both domestic and foreign, will be waged on the American electorate.
  
  On Thursday,NYT reported(andCNN confirmed) that House lawmakers were warned by an intel official that Russia was taking steps to interfere in the 2020 election and get Trump re-elected. If the Russians follow a similar playbook from 2016, that effort will include exploiting divisions and spreading misinformation on tech platforms like Facebook and Twitter.
  
  Is Big Tech ready for this challenge? Is America ready? A Thursdayopinion piece in WaPoeloquently said, “As Americans approach November worrying about foreign interference, they should remember that it cannot succeed without willing Americans. Americans can and must safeguard their own elections, and those who refuse … must be called out for their actions.” So what is being done? What’s being ignored? Let’s take a look at a few stories published Thursday that touch on this topic…
  
  First let’s take a look back into the past. WaPo’s Craig Timberg published adeeply reported storyThursday detailing what took place inside Facebook in the aftermath of the 2016 election. According to Timberg, “Facebook created ‘Project P’ — for propaganda — in the hectic weeks after the 2016 presidential election and quickly found dozens of pages that had peddled false news reports ahead of Donald Trump’s surprise victory.”
  
  As Timberg noted, “In a world of perfect neutrality, which Facebook espouses as its goal, the political tilt of the pages shouldn’t have mattered.” But that, apparently, wasn’t the case. Timberg reported that Joel Kaplan, a Republican who is now the head of Facebook’s Washington office, brought forward a concern: “We can’t remove all of it because it will disproportionately affect conservatives.”
  
  The statement is both troubling and revealing. As Timberg noted, the “Project P” debate “exemplified the political dynamics that have reigned within Facebook since Trump emerged as the Republican Party’s presumptive nominee to the White House in 2016.” As Timberg succinctly summarized, “Such factors have helped shape a platform that gives politicians license to lie and that remains awash in misinformation, vulnerable to a repeat of many of the problems that marred the 2016 presidential election.”
  
  “The ‘deep state’ is trying to inject our health system with socialist price controls,” one recent Hulu ad said, according toa story by WaPo’s Tony Romm. The ad urged viewers to text “SOCIALISM SUCKS” to the FreedomWorks, the group behind the ad.
  
  But as Romm noted, neither FreedomWorks nor Hulu are “required to reveal much more to the public about the 30-second spot or whom it targeted, leaving watchdogs and regulators fearful that federal election laws aren’t fit for the digital age — and that voters remain vulnerable to manipulation.” Other streaming services, like Roku, offer similar loopholes, which as Romm noted stand “in stark contrast” to regulations governing traditional television channels, like ABC, NBC, CBS, and Fox.
  
  Romm’s conclusion? “Four years after Russian agents exploited popular online platforms to push propaganda, sow unrest and promote the Trump candidacy, the U.S. government has made virtually no progress on bringing more transparency to paid political speech. The risks remain high that voters could be duped and deceived by foreign governments, U.S. candidates and advocacy groups — particularly online, where major regulatory gaps exist.”
  
  If you haven’t yet,read this storyfrom CNN’s Donie O’Sullivan. The story revealed how an account that threatened Sleeping Giants, a group that persuades companies not to run ads with media orgs that spread misinformation or hate speech, with potentially embarrassing information used a profile image created by artificial intelligence.
  
  “Most of the major social media platforms have rules against using other people’s pictures in this way and have an option for people to make impersonation complaints if their identity is being used,” O’Sullivan reported. “But by using AI-generated faces of people that do not exist, trolls can potentially avoid being reported for impersonation.”
  
  >> O’Sullivan’s big takeaway: “AI-generated images can potentially help lend credibility to online harassment campaigns as well as coordinated information campaigns…”
  
  When you log-on to Twitter in the future and come across misinformation, it a bright orange caution label might be attached to it. That’s according to NBC’s Ben Collins, whoobtained a leaked demoshowing new methods Twitter is testing to combat misinformation online.
  
  In the version that Collins obtained, the orange caution label would inform users that the claim was potentially misleading and it would feature fact-checks from verified users. You can check outscreen grabsshowing how this work in Collins’ story…
  
