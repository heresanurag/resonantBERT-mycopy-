id: cnn_2020_01099
title: "Roger Goodell encourages NFL teams to sign Colin Kaepernick"
date: "2020-06-16"
section: "US"
url: "https://www.cnn.com/2020/06/16/us/nfl-roger-goodell-colin-kaepernick-spt-trnd/index.html"
content: |
  NFL commissionerRoger Goodell told ESPNMonday that he would support and encourage a team interested in signing Colin Kaepernick.
  
  “Well, listen, if he wants to resume his career in the NFL, then obviously it’s going to take a team to make that decision,” Goodell said. “But I welcome that, support a club making that decision and encourage them to do that.”
  
  Kaepernick, the former San Francisco 49ers quarterback, has been unsigned to a team since 2017, after hebegan kneeling during the National Anthemto protest police brutality.
  
  Goodell’s comments come after he said in avideo posted to the NFL’s social media accountsthat the league should have listened earlier to players’ racism concerns.
  
  Goodell’s video, in response to NFL players calling on the league to condemn racism and support its black players, did not mention Kaepernick, an omission for whichthe commissioner was criticized.
  
  Colin Kaepernick reveals what led him to risk his career kneeling for social justice
  
  Referring to Kaepernick in the ESPN interview, Goodell said: “If his efforts are not on the field but continuing to work in this space, we welcome (him) to that table and to be able to help us, and guide us, help us make better decisions about the kinds of things that need to be done in communities.”
  
  Kaepernick has been invited into these conversations before, Goodell said.
  
  “We want to make sure that everybody’s welcome at that table, and trying to help us deal with some very complex, difficult issues that have been around unfortunately for a long time,” Goodell said. “But I hope we’re at a point now where everybody’s committed to making long-term, sustainable change.”
  
  The NFL’s discussions come as the nation has been gripped by prostests and conversations about police brutality and racism in the wake of the deaths ofGeorge Floydin Minneapolis,Breonna Taylorin Louisville andRayshard Brooksin Atlanta, at the hands of police.
  
