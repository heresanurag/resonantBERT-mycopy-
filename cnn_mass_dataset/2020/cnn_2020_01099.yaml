  Kaepernick hasn’t played in the leaguesince the 2016 season — the same season he first sat during the playing of the National Anthem. The protest evolved into kneeling after onetime Seattle Seahawk and Green Beret Nate Boyer convinced Kaepernick it would be more respectful to the nation’s military, the quarterback has said.
  
  Kaepernick, who led the 49ers to the 2013 Super Bowl, played his last game on January 1, 2017. He became a free agent after.
  
  No team offered him a contract, and that October, he filed a grievance against the league. Kaepernick accused NFL team owners of colluding to keep him from being signed. The NFL denied any collusion but in 2019,they reached a settlementwith Kaepernick and former teammate Eric Reid, who knelt with him.
  
  In November 2019,Kaepernick called off an NFL workout in Atlantaafter his representatives said his request to have a film crew was denied. He ended up holding his own workout session in Riverdale, Georgia.
