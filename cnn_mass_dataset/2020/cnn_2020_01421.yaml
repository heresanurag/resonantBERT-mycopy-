content: |
  A version of this story appeared in the September 14 edition of CNN’s Coronavirus:Fact vs. Fiction newsletter.Sign up here to receive the need-to-know headlines every weekday.
  
  Secondary lockdowns are coming into force and restrictions being renewed, as countries struggle to get a handle on new waves of coronavirus cases while attempting to keep their economies afloat.
  
  In a sign that the worst is far from over,the World Health Organizationreported the highest single-day increase in global infections since the pandemic began on Sunday.
  
  Israelwill bring back a nationwide lockdown – one of the first countries to do so – reimposing many of the same severe restrictions seen earlier this year, as an outbreak widens there. The government, wary of mass gatherings ahead of the high holidays, said the measures will come into force on Friday, the start of the Jewish new year.
  
  Meanwhile, in Britain,a government adviserhas warned that failure to contain a surge of cases could put the country “right back in hard lockdown in short order.” In an attempt to contain the virus’ spread, Prime Minister Boris Johnson has reduced the number of people allowed to meet from 30 to six, starting Monday.
  
  As Europe sees a spike in cases,WHO’s director for the continent told Agence France-Pressethat the crisis was only going to get tougher, and to expect more deaths in October and November. “It’s a moment where countries don’t want to hear this bad news, and I understand,” Hans Kluge said, adding that we all have to “learn how to live with this pandemic.”
  
  Q:Since there are multiple vaccines in trials, what happens if you get a vaccine, but a more effective one comes out later? Can you take more than one Covid-19 vaccine?
  
  A:It’s too early to say for sure with Covid-19 vaccines, said Dr. Francis Collins, director of the National Institutes of Health.
  
  “But that’s certainly plausible,” Collins said. “Look at where we are with shingles right now, where we had a vaccine that was pretty good, and then there was one that was a lot better, and everybody took both.”
  
