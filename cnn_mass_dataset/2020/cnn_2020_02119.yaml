title: "Quickly catch up on the day’s news"
date: "2020-02-04"
section: "App News Section"
url: "https://www.cnn.com/2020/02/04/app-news-section/quickly-catch-up-february-4/index.html"
content: |
  Here’s what you might have missed Tuesday on CNN:
  
  – Partial results from the Iowa Democratic caucuses finally arrived afterissues with a new applicationused to report results caused a massive delay.Follow live updates.
  
  – Republicanssidestepped questions about President Trump’s conduct on Ukraine, as senators continued giving speeches today explaining their impeachment vote.
  
  – ActressShannen Doherty says she has stage 4 breast cancer, after announcing in 2017 that she was in remission for the disease.
  
  – A Wuhan doctor tried to warn people about the coronavirus but was silenced by authorities.Now, he speaks out from intensive care, having been infected himself.
  
  – Trump is set to deliver his third official State of the Union address tonight at 9 p.m. ET.Here are four things to watch for.
  
  – The US militarydeployed a new submarine-launched low-yield nuclear weapon– a tool the Pentagon views as key to countering Russia.
  
  – Sephora is opening100 new storesin its largest single-year expansion ever.
  
  – Commuters beware: An artisttricked Google Maps into creating traffic jam alertsby pulling 99 phones slowly around this capital city.
