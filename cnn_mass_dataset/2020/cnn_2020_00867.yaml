id: cnn_2020_00867
title: "Stars support John Boyega following rousing Black Lives Matter speech"
date: "2020-06-04"
section: "Entertainment"
url: "https://www.cnn.com/2020/06/04/entertainment/john-boyega-support-protest-speech-intl-scli-gbr/index.html"
content: |
  Filmmakers and actors including Jordan Peele and Olivia Wilde are standing by John Boyega after hedelivered a rousing speech at a Black Lives Matterprotest on Wednesday.
  
  The “Star Wars” actor rallied crowds at the large demonstration in London’s Hyde Park following the death ofGeorge Floyd, telling activists that “now is the time” to demand racial equality.
  
  “I need you guys to understand how painful this s**t is,” the 28-year-old British-Nigerian star said into a megaphone.
  
  'Now is the time': Emotional John Boyega addresses protesters at London Black Lives Matter rally
  
  “It is very, very important that we keep control of this movement, and we make this as peaceful as possible,” he added.
  
  Boyega joined crowds who braved the bad weather to protest, following the lead of activists who have organized demonstrations in the US in response to Floyd’s killing at the hands of a Minneapolis police officer.
  
  Hollywood heavyweights have assured Boyega he has their full support after he was widely reported as saying he did not know if he would “have a career” after speaking out.
  
  Retweeting pictures of Boyega at the protest, Peele – who won an Academy Award for his horror film “Get Out” – wrote: “We got you, John.”
  
  Boyega’s “Star Wars” co-star Mark Hamill – known for playing Luke Skywalker –declared on Twitterhe had “never been more proud” of Boyega following the public stand, before signing off with “dad.”
  
  Actor and director Wilde chimed in that she would be “honored” to work with Boyega before adding: “We’ve got your back, John. Don’t hold back.”
  
  Absolutely. I would be honored to work with@JohnBoyegaand can only hope to have the chance. We’ve got your back, John. Don’t hold back.https://t.co/4d5gA3RRkj
  
  J.J. Abrams, who directed Boyega in the “Star Wars” franchise,insisted“as long as I’m allowed to keep working, I’ll always be begging to work with you.” He added: “Deep respect and love, my friend.”
  
  Black Mirror creator Charlie Brookersaidhe “would crawl through a barrel of broken glass to have John Boyega even so much as *glance* at one of my scripts,” while responding to a tweet director Matthew A. Cherry had posted in support of the actor.
  
  On Wednesday Minnesota Attorney General Keith Ellison announced that former Minneapolis police officer Derek Chauvin, who pressed his knee on Floyd’s neck for nearly nine minutes, would face second-degree murder charges.
  
  Thethree officers involved in the arrestwill also be charged with aiding and abetting second-degree murder.
