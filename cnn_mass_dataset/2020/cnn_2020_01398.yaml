id: cnn_2020_01398
title: "England and Wales coronavirus death toll 41% higher than UK government’s daily figures"
date: "2020-04-21"
section: "UK"
url: "https://www.cnn.com/2020/04/21/uk/uk-death-toll-coronavirus-statistics-gbr-intl/index.html"
content: |
  The true death toll fromcoronavirusin England and Wales up to April 10 was about 41% higher than the UK government’s daily update, according to data released by the country’s Office of National Statistics (ONS).
  
  The daily updates on the government’s website only includedeathsin hospitals – not other locations, including hospices, care homes and private residences. They also don’t account for the lag in reporting some deaths.
  
  The weekly data released by the ONS records deaths where coronavirus is mentioned on the death certificate – even if only suspected. The latest ONS data for deaths up to April 10 (but recorded by April 18) is13,121.
  
  Our weekly deaths data show that- of all deaths in England and Wales that occurred up to 10 April (registered up to 18 April), 13,121 involved COVID-19- Comparatively@DHSCgovukfigures show that 9,288 deaths occurred by 10 Aprilhttps://t.co/g3G5KGuOel#COVID19#coronaviruspic.twitter.com/0tu6lP9WyT
  
  By comparison, the ONS says the corresponding figure released on the UK government website for England and Wales was 9,288.
  
  That’s a difference of 41%.
  
  The data also shows the number of coronavirus-related deaths in nursing homes has almost doubled in the five weeks that the ONS has been recording Covid-19 statistics.
  
  The total number of deaths registered in England and Wales in the week ending 10 April was18,516– the highest weekly total since 2000.
  
  The number of deaths in care homes has doubled from four weeks earlier, when the first Covid-19 deaths were registered, and there has been a 72.4% increase in hospitals, and a 51.1% increase in private homes, according to the ONS.
  
  The largest number and proportion of Covid-19 deaths were among those aged 75 to 84 years old.
  
  The highest number of deaths involving the coronavirus was recorded in London, while the lowest number was in the North East of England.
