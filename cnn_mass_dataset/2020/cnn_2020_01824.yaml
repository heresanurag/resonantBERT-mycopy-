id: cnn_2020_01824
title: "Police arrest Georgia man who threw a smoke grenade, pointed gun at protesters"
date: "2020-10-06"
section: "US"
url: "https://www.cnn.com/2020/10/06/us/georgia-man-arrested-smoke-grenade-gun-protesters-trnd/index.html"
content: |
  A Georgia man is facing several charges for allegedly throwing a smoke grenade and pointing a gun at a group of protesters last weekend.
  
  Fredrick James, 34 of Decatur, Georgia, was charged on Saturday with aggravated assault and reckless conduct.
  
  A group of 30 to 40 demonstrators were lying in the intersection in front of City Hall blocking traffic in protest of the death of Breonna Taylor on Sunday evening when James drove up to the area and threw the grenade, the Savannah Police Department said in a news release.
  
  Some protesters fled, while others struck his vehicle. James then exited the vehicle and drew his firearm, police said.
  
  When officers arrived no one was at the scene, however James was located a short time later.
  
  James was booked in the Chatham County Jail where he is currently still being held, according to Parla Parker, spokeswoman for the Chatham County Sheriff’s office.
  
  He made his first appearance in records court on Monday and did not receive bond, according to the Chatham County Sheriff’s Office. His case is being held over to Superior Court.
