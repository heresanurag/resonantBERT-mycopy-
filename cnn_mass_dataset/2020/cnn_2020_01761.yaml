id: cnn_2020_01761
title: "Avalanche in Colorado partially buried a snowmobiler, and it was all caught on video"
date: "2020-02-23"
section: "US"
url: "https://www.cnn.com/2020/02/23/us/avalanche-colorado-buries-snowmobiler-video-trnd/index.html"
content: |
  Two snowmobilers in Colorado narrowly escaped disaster when they accidentally triggered an avalanche.
  
  The Colorado Avalanche Information Center on Saturday shared a video on Facebook showing the terrifying incident, which partially buried one of the riders.
  
  In the video, the snowmobilers are riding up a mountain when the one in front sets off an avalanche that sweeps the other down the mountainside.
  
  There were people skiing in the same area just moments before the avalanche. However, their presence did not cause the event, CAIC said.
  
  “The skiers were fortunate to not trigger an avalanche,” CAIC said. “Moments later the snowmobiler, a larger trigger, was able to collapse the weak layer and trigger an avalanche.”
  
  The avalanche occurred on February 11 near Leadville in Birdseye Gulch, according to theCAIC. The elevation in the area ranges from 10,000 to 12,000 feet.
  
  “It’s really quite terrifying,” CAIC Director Ethan Greene told CNN affiliateKDVR. “Fortunately, the fellow that was caught in the avalanche ends up with his head above the snow.”
  
  Greene told KDVR that the center recommends checking thestate’s avalanche forecastbefore venturing out.
  
  Two snowmobilerswere killedlast week after triggering an avalanche in the area of Muddy Pass, north of Vail. A third person who was snowmobiling with the group was able to free himself and alert authorities.
  
  The avalanche center warned that large and deadly avalanches are likely to continue occurring in the area.
