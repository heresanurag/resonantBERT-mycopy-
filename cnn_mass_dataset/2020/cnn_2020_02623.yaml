  The commissionannouncedMonday that both Trump and Biden will have their microphones muted during portions of second presidential debate that will take place on October 22. Debate commission co-chair Frank Fahrenkopf told CNN’s Wolf Blitzer Tuesday that muting non-speaking candidate’s microphones is a “necessary” after the interruptions during the first presidential debate in Cleveland last month.
  
  “There’s no question that the first debate was a disappointment for everybody, I think particularly for the American people,” Fahrenkopf said during aninterviewon “The Situation Room.” “We, as a commission, knew we couldn’t change rules without the consent of both (campaigns), but saying to the candidates that what’s going to happen is when the moderator asks candidate number one to begin their two minutes to talk uninterrupted, the candidate’s mic will not be live. When those two minutes are up, it is then candidate B’s chance to talk.”
