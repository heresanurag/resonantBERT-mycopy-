title: "Member of debate commission rebukes Trump and says President’s attacks are ‘just wrong’"
date: "2020-10-21"
section: "Politics"
url: "https://www.cnn.com/2020/10/21/politics/debate-commissioner-john-danforth-trump-attacks"
content: |
  A member of the Commission on Presidential Debates saidPresident Donald Trump’sattacks on the commission are “just wrong,” a rare rebuke coming from a member of an organization that strives to stay neutral.
  
  Trump has repeatedly attacked debate moderators and the commission, falsely claiming during aninterviewon “Fox & Friends” on Tuesday that his matchup with former Vice PresidentJoe Bidenthis week is “so set up,” even though the debate topics and moderator were agreed to by both campaigns weeks ago.
  
  Build your own road to 270 electoral votes with CNN’s interactive map
  
  “The president’s apparent strategy is to challenge the validity of the election should he lose,” John Danforth, a Republican and former US senator from Missouri who has been on the commission since 1994, wrote in a Washington Postop-edTuesday. “We saw this strategy initially in his claims that mail-in ballots are the tools for massive election fraud. Now we see it as well in his assertion that the debates have been rigged by the commission to favor former Vice President Joe Biden.”
  
  Danforth noted that like other members of the commission he has maintained a “strict vow of silence” regarding personal feelings about the campaign, but now that the President and his supporters “have attacked the commission’s integrity, I feel compelled to respond.”
  
  Mentioning Trump’s attacks on Fox News anchor Chris Wallace, who moderated the first presidential debate, Trump campaign senior adviser Steve Cortes accused the commission in atweetof a “scheme to protect their preferred candidate” – Biden.
  
  Visit CNN’s Election Center for full coverage of the 2020 race
  
  But, Danforth wrote, “the conclusion that any commission member would eschew fair play to push a partisan position is, to put it mildly, ironic.”
  
  “The same people who decline to extend the presumption of fairness to members of the commission rightly assert that Amy Coney Barrett will put aside her personal beliefs on the Supreme Court,” he wrote. “But more importantly, the attack is just wrong.”
  
  Courtney Parella, deputy national press secretary for the Trump campaign, told CNN Wednesday, “the debate commission’s refusal to allow the American people to hear more from the two candidates is the real attack on our elections.”
  
  After an intense back-and-forth with both campaigns, the commissioncanceledthe October 15 debate after Trump tested positive for coronavirus and refused to do a virtual format. The Trump campaign criticized the move, blaming the commission for lack of communication and not negotiating another debate date. Both campaigns instead held dueling in-person town halls. Danforth wrote that Trump’s charge that the commission opted for a remote-town hall debate to favor Biden was “nonsense.”
  
  “(Speaking again for myself, had I wanted to help the Biden campaign, the last thing on my mind would have been to restrain the technique President Trump exhibited in the first debate),” Danforth wrote.
  
  He added that although it is fair to question an organization’s decisions and that the commission “is not above criticism,” there is “an enormous difference between criticizing good-faith efforts and accusing the commission of corrupt favoritism.”
  
  “The first is helpful for improving our work. The second destroys public confidence in the most basic treasure of democracy, the conduct of fair elections,” he wrote. “The second paves the way to violence in the streets.”
  
