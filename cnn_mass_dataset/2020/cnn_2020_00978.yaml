id: cnn_2020_00978
title: "More than 2,300 people evacuated after explosions at munitions depot in Russia"
date: "2020-10-08"
section: "Europe"
url: "https://www.cnn.com/2020/10/08/europe/russia-munitions-factory-explosion-intl-scli/index.html"
content: |
  More than 2,300 people were evacuated from villages in the Russian region of Ryazan after awildfireset off explosions at an ammunition depot, Russian state media reported Wednesday, citing the Ministry of Emergency Situations.
  
  The fire had not been contained as of Thursday morning, and more than 20 people were taken to hospital, the state news agency TASS reported, citing local officials.
  
  Local authorities imposed a state of emergency in the region, located in western Russia.
  
  The fire broke out Wednesday afternoon as strong winds spread a wildfire onto a military storage facility leading to “sporadic explosions” of ammunition, the Russian Defense Ministry said in a statement.
  
