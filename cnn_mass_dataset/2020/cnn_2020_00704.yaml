  A version of this story appeared in the August 17 edition of CNN’s Coronavirus:Fact vs. Fiction newsletter.Sign up here to receive the need-to-know headlines every weekday.
  
  New Zealand Prime Minister Jacinda Ardern delayed parliamentary elections by four weeks to October 17 after the reemergence of Covid-19 in the country last week.
  
  The election delay, announced today, has the backing of the country’s opposition. Auckland is currently under lockdown, meaning any candidates based there would be unable to campaign as usual,Julia Hollingsworth writes.
  
  Ardern said that New Zealand’s electoral commission had assured her that a safe and accessible election would be possible on the new date.
  
  More than 7,000 miles away, questions are growing about the integrity of America’s own election on November 3.
  
  President Donald Trumphas been falsely claiming for monthsthat postal voting – widely considered the safest way for Americans to vote in a pandemic – will result in widespread electoral fraud. Now, Democrats arewarning that the White Houseis trying to sabotage the US Postal Service in order to suppress the vote.
  
  Trump admittedas much last week during a Fox News interview, saying he opposed much-needed funding for USPS because he believes an uptick in mail-in ballots during the pandemic will favor Democrats. USPS, which is mired in a financial crisis, warned nearly all 50 states that mail-in ballots may not be received by election offices in time to be counted, Maeve Reston writes.
  
  Several states say they’reconsidering legal actionagainst the Trump administration over the matter, and on Sunday Democrats launched an emergency effort to block changes at the post office.
  
  The pandemic has created large logistical and political challenges for elections around the world,and dozens of countrieshave postponed electoral events due to outbreaks.
  
  But that does not mean it can’t be done.South Korea’s parliamentary electionin April attracted the highest voter turnout in nearly 30 years.
  
  Q: Why can’t some people accept Covid-19’s realities?
  
  A:With so much information available about the severity of the coronavirus and the need to follow guidelines, some people still refuse to accept reality.
  
  The denial manifests itself in many ways, whether that be refusing to wear a mask or attending large gatherings. Using denial as a coping mechanism is not always a bad choice. Short-term, it gives someone the time to adjust to a situation. When it becomes a long-termcrutch and puts others in harm’s way, it can be dangerous.
  
  “When they’re in periods where there’s a lot of anxiety and it’s perceived as a threat, then people develop strategies to protect themselves, their sense of security and safety. And one of these is simply to deny whatever the threatening source is exists. In this case, you would simply say, “Well the epidemic is a hoax. It doesn’t really exist,” said Mark Whitmore, an associate professor in the College of Business.
  
