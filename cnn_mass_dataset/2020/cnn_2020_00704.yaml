  Covid-19 vaccine trials have been slow to recruit Black and Latino people
  
  The multi-billion-dollar effort to get a coronavirus vaccine on the market could see delaysbecause researchers haven’t recruited sufficient numbers of minorities to join the clinical trials.
  
  Of the 350,000 people who’ve registered online for a coronavirus clinical trial, 10% are Black or Latino, according to Dr. Jim Kublin, executive director of operations for the Covid-19 Prevention Network.
  
  That’s not nearly enough, as study subjects in trials are supposed to reflect the population that’s affected. Research shows that more than half of US coronavirus cases have been among Black and Latino people.
  
  New saliva-based Covid-19 test could be a ‘game changer’
  
  A new saliva-based test from researchers at the Yale School of Public Health could give Americans a fast and inexpensive option to learn if they have Covid-19. It was given emergency use authorizationby the Food and Drug Administration on Saturday.
  
  Unlike some other tests that require specialized supplies, the SalivaDirect test doesn’t require a specific swab or collection device. It can also be used with reagents from multiple vendors, CNN’s Holly Yan and Christina Maxouris writes.
  
  Japan reports its worst GDP on record
  
  Japan just reported its worst GDP on record as the ongoing Covid-19 outbreak dented consumption.
  
  The world’s third-largest economyshrank 7.8% in the second quarter comparedwith the previous quarter, the country’s cabinet office said on Monday. That translated to an annual rate of decline of 27.8%, the worst since modern records started in 1980 and the third consecutive quarter of contraction, CNN’s Kaori Enjoji writes.
  
  But Japan performed better than other major economies in the April-June period, when the United States and Germany both recorded 10% falls over the previous quarter and British output crashed 20.4%.
  
  South Korea warns of another outbreak tied to a religious group
  
  South Korean authorities arepursuing legal action againstthe pastor of the Sarang Jeil Church in Seoul after 315 people connected to the parish tested positive for Covid-19.
  
  A criminal complaint filed against the church’s leader, Rev. Jun Kwang-hoon, accuses him of holding gatherings in violation of the city’s infectious disease prevention law. The church’s legal team denied the allegations on Monday, claiming that they had fully cooperated with the authorities and threatening to sue the government for defamation.
  
  Thetiff revives memories of an outbreak at another religious groupin February, primarily in the city of Daegu. Authorities barred all 7,560 churches in the South Korean capital from holding any gatherings due to the pandemic except for the usual weekly services, during which worshippers must abide by social distancing regulations.
  
  Deadliest day for Australian state at center of outbreak
  
  The Australian state of Victoriarecorded 25 new coronavirus deaths on Sunday, the highest single-day increase in fatalities since the outbreak of the pandemic.
  
  In May, Australia was held up as a global model for its handling of the outbreak. But Covid-19 cases in Victoria have risen suddenlyin recent weeks, with many new infections in aged care homesand among healthcare workers. At the beginning of August, Victoria and its capital Melbourne were put under strict new restrictions to curb the spread of the virus.
  
