title: "Trump and Giuliani may be useful to Putin, but they’re no idiots"
date: "2020-10-16"
section: "Opinion"
url: "https://www.cnn.com/2020/10/16/opinions/trump-russia-giuliani-vinograd/index.html"
content: |
  Editor’s Note:Samantha Vinograd is a CNN national security analyst. She is a senior adviser at the University of Delaware’s Biden Institute, which is not affiliated with the Biden campaign. Vinograd served on President Barack Obama’s National Security Council from 2009 to 2013 and at the Treasury Department under President George W. Bush. Follow her@sam_vinograd. The views expressed in this commentary are her own. View moreopinion articleson CNN.
  
  President Donald Trump is a consistent creature in a lot of respects, especially when it comes to helping Russia and hurting the US. For years, Trump has engaged in behavior that makes Russian President Vladimir Putin’s job of sowing discord, spreading disinformation and undermining our democracy a lot easier – especially when Trump thinks it might benefit him. Trump has also signaled that he’sopen to receiving dirton a political rival from a foreign country. What’s more, no other President has afriends-and-family listso littered with people  with connections to Russia.
  
  Trump associates “presented attractive targets for foreign influence, creating notable counterintelligence vulnerabilities,” according to a Senate Intelligence Committeereportreleased in August. But Trump has refused to change his own behavior – let alone tell his team to clean up their counterintelligence posture. That’s why new reports that US intelligence agencies warned the White House last year that Trump’s personal lawyer, Rudy Giuliani, wasbeing targeted by Russian intelligencecome as no surprise.
  
  US intelligence officials– according to four former officials, cited by theWashington Postas familiar with the matter– were concerned that Giuliani, who was interacting with people linked to Russian intelligence, would act as a foot soldier in Moscow’sinformation warfareagainst the US and feed misinformation back to Trump. Despite these direct warnings, however, Trump didn’t tell Giuliani to cease and desist. Instead, Trump simply shrugged and kept him close. Every American should remember what this means: Trump has given Russia a free pass to attack our democracy.
  
  Trump should know full well what Russia is up to. For four years, the President has been briefed on malign Russian activities. He has access to detailed, classified information, and the FBI alerted Trump to foreign intelligence threatsback in 2016, when he was still a candidate. His own administration has publicly imposed sanctions againstRussian entitiesand individuals for their election interference. The Special Counselreportalso detailed ways Russia targeted Trump campaign officials as part of a wider influence campaign, and the Senate Select Committee on Intelligence report did the same in even greater detail.
  
  Last year, news reports indicated that Rudy Giulianiwas the subject of an FBI counterintelligence probe, which reportedly looked into whether foreign governments were trying to take advantage of his business ties in Ukraine and with wealthy foreigners. While we don’t know the status of this investigation, we do know one thing: If the FBI was investigating Giuliani as a potential counterintelligence risk, he should not have gone anywhere near the President or the White House. Any patriotic President would want to steer clear of an individual who could be doing double duty for a foreign government, including Russia. We also learned just this week thatthe FBI is now investigatingwhether unverified emails,  which the New York Post said were provided to the paper by Giuliani, about Joe Biden and his son Hunter Biden are linked to a foreign intelligence operation.
  
  Donald Trump's horrifying QAnon dodge
  
  To make matters worse, Rudy Giuliani has hadclose ties to Andrii Derkach, a Russian intelligence agent, and acted as amegaphonefor Derkach’s anti-Biden campaign late last year. In a statement announcingnew sanctions against Derkachin September, the Treasury Departmentsaidhe waged a “covert influence campaign” centered on “cultivating false and unsubstantiated narratives concerning US officials in the upcoming 2020 Presidential Election.” Well before this public announcement was made, President Trump would have been privately briefed on Derkach’s real activities. And yet, Trump didn’t back away from Giuliani – or Derkach. In fact, Trump evenretweetedmaterial in August that Derkach released, amplifying alleged audio recordings of Biden which the US government labeled as Russian propaganda.
  
  There is no chance that Trump doesn’t know what he is doing. While he likes to play the implausible ignorance card onissues like QAnon, it’s impossible that Trump doesn’t know that he’s helped Russia by siccing Giuliani on Biden, retweeting Russian propaganda or spreading lies that Trump’s own senior intelligence official saysour foreign adversaries are taking advantage of.
  
  The fact is, that’s likely why so many Trump team members have been targeted by Russian intelligence: At this point it seems Trump and his inner circle are willing to help Russia as long as there is some perceived personal, financial or political gain on the table. Giuliani has been laundering Russian propaganda that’s helpful to Trump, and Trump uses the presidential podium to push out Russian propaganda to service his political needs.(Giuliani toldNPR, “I never tried to influence the election, and my work with [Derkach] was over months ago well before the election.”)
  
  The Russians likely know that the President doesn’t mind being surrounded by counterintelligence risks (former Director of National Intelligence Dan Coatsthought Trump himself may be compromisedand an active counterintelligence concern, according to Bob Woodward’s book “Rage”) as long as he gets what he thinks he needs to stay in power.
  
