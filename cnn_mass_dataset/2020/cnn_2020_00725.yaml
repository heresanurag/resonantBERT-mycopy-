  We are used to hearing the phrase “useful idiot” thrown around when discussing Soviet intelligence operations - it references westerners who were manipulated by the Soviets. Last month, Lt. Col. Alexander VindmancalledTrump Putin’s useful idiot. And while I agree that Trump and Giuliani may be useful to Russia, they aren’t idiots on this front – no one is duping them. Trump and Giuliani clearly know the impact of their actions on our democracy. It seems they just don’t care.
