title: "Back to work. Ford, GM and Fiat Chrysler restart US factories"
date: "2020-05-18"
section: "Cars"
url: "https://www.cnn.com/2020/05/18/cars/gm-ford-fiat-chrysler-restart-us-factories/index.html"
content: |
  General Motors, Ford and Fiat Chrysler will begin to gradually restart their US factories Monday, with some big changes put in place to help protect workers from the coronavirus.
  
  At Ford 59,000 factory workers, about 80% of the workforce, are expected to show up for work, according to the company. At GM, about 15,000 of the company’s 48,000 factory workers are expected to report to work on Monday, with more expected to report in coming weeks as the ramp up in production continues, a spokesperson for the company said. Meanwhile, about a third of Fiat Chrysler’s hourly workforce, or about 16,000, are expected to start Monday, according to the company.
  
  The workplaces they will be returning to will look somewhat different from the ones they left in mid-March.
  
  “We work really hard at imagining a world with Covid-19 in an assembly plant,” said Ford CEO Jim Hackett in an interview with CNN Friday. “So they have lots of consideration, of course, for social distancing. We used to have two people, for example, that would be inside the vehicle as it’s going down the assembly line. We stopped that.”
  
  All three companies have said they would thoroughly and frequentlyclean facilities and allot extra time between work shifts to do so. At Ford, for instance, factories that had been running on three shifts, or essentially around the clock, will work on two shifts to allow extra time for cleaning. At Fiat Chrysler factories, 10 minutes per shift will be allotted for cleaning.
  
  The world's biggest car factory just reopened. Here's what Volkswagen had to do
  
  The automakers said they will also screen employees with questionnaires before they leave for workand administer temperature checks as they enter plants or other facilities.
  
  Employees who have recently been exposed to someone with the coronavirusor exhibit a high temperature or other Covid-19-related symptoms will be sent to local clinics for testing before they are allowed to return to work.
  
  While in factories, employees will workat least six feet apartfrom one anotherwhenever possible,thecompanies said. Employee workstations will be separated by clear plastic panels. Workers will also wear surgical-style face masks and clear plastic face shields or goggles whenever they’re required to work close to one another. Ford will also be testing watches that warn wearers if they get too close to someone who is also wearing one of the devices, Hackett said.
  
  All three companies will also make changes to how “common areas,” such as dining areas, are used in order to keep employees apart from one another. Fiat Chrysler shared an image of a break area table that normally seats six that now has plastic dividers that reduce its seating to three.
  
  These practices are based, in part, on the experiences at the companies’ factories that have reopened in Asia and Europe.
  
  “Absolutely, I would feel comfortable sending my family to work at Ford,” Ford’s chief operating officer, Jim Farley, said recently when asked how confident he felt in the steps the company was taking.
  
  Both Ford(F)and GM(GM)have also been operating a few plants in the US inorder to makepersonal protective equipment andventilators for healthcare workers. Ford(F)has also beenmanufacturing face masksfor its own workers around the world. Both companies also have some warehouses operating to distribute parts for repairs. Workers at those US plants have been trying out the safety protocols and equipment that will go into wider usein the USas factories reopen.
  
  Automakers are racing to make ventilators. But it's not that easy
  
  Employees at Ford’s currently operating US plants will be sharing their experiences with other employees. Among other things, they will describe what it’s like working with masks and face shields on and the best ways to wear and use them, said Kiersten Robinson, Ford’s chief human resources officer.
  
  Auto plants may look different in the future, too, said Jim Glynn, GM’s vice president for global safety. Future factories may take physical distancing into account in their initial design, he said in an interview with CNN.
  
  “Because we could face another pandemic at some point in time. And so we want us to definitely be much better prepared, he said. “So I think this will definitely play a part in how we lay out facilities.”
