id: cnn_2020_02816
title: "Barcelona in turmoil as president Josep Maria Bartomeu resigns along with entire board of directors"
date: "2020-10-27"
section: "Football"
url: "https://www.cnn.com/2020/10/27/football/barcelona-turmoil-president-bartomeu-resign-spt-intl/index.html"
content: |
  A major shake-up is underway at Barcelona afterJosep Maria Bartomeuresigned as club president with immediate effect.
  
  Bartomeu had stood firm amid increasing scrutiny but announced he and the entire board of directors would step down during an explosive press conference on Tuesday.
  
  Lionel Messi aims a dig at Barcelona hierarchy after posting emotional farewell to Luis Suarez
  
  The 57-year-old had become a divisive figure during his near seven-year spell at the club and was facing a vote of no confidence next month after fans and club members had called for him to leave.
  
  Most recently, Bartomeu had been the focus of a very public fallout with Lionel Messi after the Argentine had requested to leave the club this year.
  
  Messi criticized the former president for not keeping his word and only stayed to avoid taking his beloved club to court.
  
  The team’s performance on the pitch has also put pressure on Bartomeu. His departure comes just three days after Barcelona lost 3-1 tofierce rivals Real Madridin the El Clasico.
  
  In truth, the writing may have been on the wall after last season’s 8-2 defeat to Bayern Munich in the Champions League.
  
  The Catalan club won four La Liga titles and the Champions League during Bartomeu’s reign and is now preparing to face Juventus on Wednesday.
