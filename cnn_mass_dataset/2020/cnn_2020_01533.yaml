title: "Coronavirus cluster linked to a University of New Hampshire frat party, state says"
date: "2020-09-07"
section: "US"
url: "https://www.cnn.com/2020/09/07/us/university-new-hampshire-frat-party-covid-cluster-trnd/index.html"
content: |
  A cluster of Covid-19 cases has been linked to a fraternity party at the University of New Hampshire, health officials say.
  
  The state Department of Health and Human Services said Sunday that it is investigating a potential outbreak tied to a Theta Chi event last weekend.
  
  The psychology behind why some college students break Covid-19 rules
  
  University officialssaidmore than 100 people, including students, attended the August 29 partyand few wore masks.
  
  Eleven people connected to the party have tested positive for the virus, according to university officials.
  
  “Let me be clear: this is reckless behavior and the kind of behavior that undermines our planning and will lead to us switching to a fully remote mode,” UNH President James W. Dean Jr. said in a statement.
  
  This is thelatest clusterat campuses across the nation, many linked to fraternity parties.
  
  The simple reason why colleges are reopening
  
  It’s a challenge for colleges and universities, since preventing large parties has proven difficult.
  
  TheUniversity of North Carolina-Chapel Hilland theUniversity of Notre Damehave had to transition to virtual classes, at least for a time, after cases cropped up days into the semester.
  
  New York UniversityandNortheastern Universityhave suspended students found to have participated in gatherings that violate safety protocols.
  
  Earlier in the summer, clusters of Covid-19 cases theUniversity of Washington,University of California, Berkeleyand theUniversity of Mississippiwere linked to fraternity parties.
  
  UNH  said it would pursue student conduct charges against the organizers and people who went to the party, and that the Theta Chi fraternity has been suspended.
  
  Still, the university’s president said in a message to the campus community that the “overwhelming majority” of students were abiding by safety measures.
  
  New Hampshire reported 7,447 Covid-19 casesas of Sunday. About 91% have recovered, while 248 cases are active.
  
  CORRECTION: An earlier version of this article misstated the action taken by Notre Dame when Covid-19 cases spiked after the start of school. Notre Dame transitioned to virtual classes, but the students remained on campus. They have since transitioned back to in-person classes.
