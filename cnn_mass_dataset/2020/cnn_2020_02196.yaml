  Since 2016, it hasrecalled17.3 million units in the United States and received nearly 300 reports of incidents causing 144 injuries to children.
  
  A lawsuit filed by the Dudek family in June 2018 alleges that Ikea knew of the deaths associated with the dressers but “failed to take adequate measures” to improve their safety and stability.
  
  As part of the settlement, Ikea has agreed to broaden its outreach to consumers about the Malm product recall,according to the family’s lawyers.
  
  The lawyers saidthe furniture maker will also meet with representatives of Parents Against Tip-Overs, an advocacy group lobbying for safer furniture designs and more stringent testing standards.
