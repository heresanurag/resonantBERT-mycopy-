title: "You no longer have to wait in a Genius Bar line to get your Mac fixed"
date: "2020-08-17"
section: "Tech"
url: "https://www.cnn.com/2020/08/17/tech/apple-mac-independent-repair-shop-program/index.html"
content: |
  If you’ve found yourself sprinting into an Apple Store with a coffee-drenched Mac in hand, only to find yourself in an hour-long line for the Genius Bar, you may soon be in luck.
  
  Apple(AAPL)is making it easier to access repairs for Mac computers by expanding a program that allows independent repair shops to fix its devices. The program, which launched last fall, was previously available only foriPhones.
  
  Apple’s independent repair program supplies qualifying repair shops with Apple-certified tools, parts, repair manuals and diagnostics, as well as free training.
  
  The expansion could make it faster and easier to access repairs for most common out-of-warranty issues with Macs. Problems that fall under Apple’s warranty need to be fixed at an Apple Store or an Apple Authorized Service Provider, such as Best Buy.
  
  More than 140 independent repair businesses with more than 700 US locations are now a part of the program, and this summer Apple announced the program’s expansion to Europe and Canada. The repair shops will complement Apple’s global network of more than 5,000 Authorized Service Providers, and will have access to parts and tools at the same price as those providers.
  
  The iPhone 12 feature that could help convince millions of people to upgrade their phones
  
  The news comes after Mac sales rose nearly 22% year-over-year duringthe quarter that ended in June, likely boosted by work-from-home policies during the coronavirus pandemic. And it’s not just Apple — there is a widespread laptop shortage as remote working continues and as many students prepare to attend school from home this fall.
  
  During the pandemic, Apple has had toclose, reopen and then re-closesome of its retail stores as coronavirus spread throughout the United States.
