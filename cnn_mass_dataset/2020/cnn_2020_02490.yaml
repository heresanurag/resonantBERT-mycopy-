  _January 7, 2020_
  
  _As several Middle Eastern nations hope tensions between Iran and the U.S. subside, thousands of additional American troops are deploying to the region. Scientists say they’ve discovered the deepest point on land, but it’s not on a continent most people will visit. And the shopping cart of the future could have its own checkout process, but it could also eliminate jobs._
  
