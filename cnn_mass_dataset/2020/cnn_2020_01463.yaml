title: "Google owner Alphabet is now worth $1 trillion"
date: "2020-01-16"
section: "Investing"
url: "https://www.cnn.com/2020/01/16/investing/google-trillion-dollar-market-value-apple-microsoft/index.html"
content: |
  The exclusive $1 trillion club on Wall Street just got a new member. Shares of Google parent company Alphabet hit a new all-time high Thursday, pushing the company’s market value to $1 trillion in the process.
  
  Alphabet(GOOGL)joins Apple(AAPL)and Microsoft(MSFT)as companies worth at least $1 trillion. Apple(AAPL)is the most valuable company in the United States, with a market value of nearly $1.4 trillion. Microsoft(MSFT)is worth almost $1.3 trillion.
  
  This is the first time that three American companies are worth at least $1 trillion at the same time.
  
  The most valuable company on the planet, oil giant Saudi Aramco,went public last month at a valuation of $2 trillionand iscurrently worth around $1.8 trillion.
  
  Amazon(AMZN), which is now valued at about $930 billion, was the second US firm to ever hit the $1 trillion level back in September 2018. But at that time, Apple was the only other company with a market valuation in excess of $1 trillion.
  
  Google CEO Sundar Pichai gets a big pay raise as CEO of Alphabet
  
  Shares of Alphabet are off to a red hot start this year, surging more than 8% already in 2020.
  
  The rest of the tech sector – as well as the broader market – is soaring too thanks to optimism about the phase one trade deal between the United States and China and solid fourth quarter earnings from many big banks.
  
  TheDow,S&P 500andNasdaqall closed at record highs on Thursday.
