title: "These 9 hand sanitizers may contain a potentially fatal ingredient, FDA warns"
date: "2020-06-22"
section: "US"
url: "https://www.cnn.com/2020/06/22/us/hand-sanitizer-fda-trnd/index.html"
content: |
  The US Food and Drug Administration isadvising consumersnot to use hand sanitizer products manufactured by Eskbiochem SA due to the potential presence of a toxic chemical.
  
  The FDA has discovered methanol, a substance that can be toxic when absorbed through skin or ingested, in samples of Lavar Gel and CleanCare No Germ hand sanitizers, both produced by the Mexican company.
  
  Eskbiochem did not immediately respond to a request for comment from CNN.
  
  The FDA recommends that consumers avoid the following brands of hand sanitizers produced by Eskbiochem:
  
  Drug smugglers used bottles of hand sanitizer to conceal meth shipments
  
  Exposure to significant amounts of methanol can result in nausea, vomiting, headache, blurred vision, permanent blindness, seizures, coma, permanent damage to the nervous system or death.
  
  Anyone exposed to these hand sanitizers should seek immediate treatment, the FDA warns.
  
  The FDA asked Eskbiochem SA to remove its hand sanitizer products from shelves on June 17 but has yet to receive a response from the company. The agency recommends that consumers stop using these products immediately and dispose of them in “appropriate hazardous waste containers.”
