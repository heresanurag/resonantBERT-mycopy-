id: cnn_2020_02300
title: "Sean Hannity said George Floyd and Donald Trump are both victims of bad cops"
date: "2020-06-10"
section: "Media"
url: "https://www.cnn.com/2020/06/10/media/sean-hannity-george-floyd-comment/index.html"
content: |
  Fox News host Sean Hannity, a nightly champion of President Donald Trump, highlighted the similarities between Trump’s sparring with the US Justice Department and the death of George Floyd.
  
  On Tuesday’s show, Hannity noted that bothFloyd, who died in police custody in May, and Trump were victims of law enforcement.
  
  Hannity said that law enforcement officials “tried to rig an election and destroy Donald Trump at all costs” in reference to the FBI’s investigation of the President’s alleged Russian connections that led to the impeachment. The Justice Department’s inspector general found that the FBIproperly opened its investigationinto Russian election interference but said there were major errors in how the agency conducted the probe.
  
  Hannity denied he was comparing Floyd’s death and Trump – but did so anyway.
  
  “It’s not the same thing to what happened to George Floyd, but it’s horrific. He was a victim of crooked cops. Now, again, not the same circumstances, I’m not making any comparison — a bad cop is a bad cop. By all means … the damage [in Minneapolis] was real to the country.”
  
  A spokesperson for Fox News reiterated Hannity was not drawing a comparison between Trump and Floyd.
  
  Floyd’s death has sparked nationwide and international protests demanding police reform.
