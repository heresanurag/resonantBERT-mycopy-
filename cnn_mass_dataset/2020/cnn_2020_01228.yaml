id: cnn_2020_01228
title: "Grindr pulls feature that lets users sort by race. It says it’s supporting Black Lives Matter"
date: "2020-06-03"
section: "Tech"
url: "https://www.cnn.com/2020/06/03/tech/grindr-ethnicity-filter-intl-scli/index.html"
content: |
  Grindris removing its “ethnicity filter” in what it says is a show of support for theBlack Lives Mattermovement.
  
  The gay dating and hookup app announced the change on Monday, saying: “We will continue to fight racism on Grindr, both through dialogue with our community and a zero-tolerance policy for racism and hate-speech on our platform.”
  
  Google removes app that claimed to detect Chinese apps on Indian phones
  
  “As part of this commitment, and based on your feedback, we have decided to remove the ethnicity filter from our next release.”
  
  Grindr — which describes itself as “the world’s largest social networking app for gay, bi, trans and queer people” — had previously come under fire for allowing users to filter for matches based on ethnicity as part of its paid “Xtra” service.
  
  We will not be silent. Black Lives Matter.https://t.co/K671PrwJc0pic.twitter.com/93ninYt2u9
  
  Currently, users of the technology can filter prospective partners by height, weight, age and ethnicity, though it is not the only dating app to offer these filters.
  
  Representatives for the company hadpreviously defendedits ethnicity filter, arguing that the feature was used by members of minority groups looking for others of the same race.
  
  White supremacists pose as Antifa online, call for violence
  
  Criticshave arguedthat Grindr’s filter promoted discrimination. Research from Cornell Universityfound thatdating apps that allow users to filter their searches by race, or rely on algorithms that pair people of the same race, “reinforce racial divisions and biases,” whilean Australian surveyof gay and bisexual men found many participants to be “remarkably tolerant” of online sexual racism.
  
  On Monday, Grindr framed the policy change as one motivated by solidarity with protesters in the United States.
  
  “We stand in solidarity with the #BlackLivesMatter movement and the hundreds of thousands of queer people of color who log in to our app every day.”
