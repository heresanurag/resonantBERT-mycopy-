title: "Why Netflix is partnering with Goop and its controversies"
date: "2020-01-07"
section: "Media"
url: "https://www.cnn.com/2020/01/07/media/netflix-goop-lab/index.html"
content: |
  Netflix(NFLX)debuted a trailer on Monday for its latest original series, “The Goop Lab,” and even though the six-episode series doesn’t premiere until later this month, it’s already causing controversy.
  
  Goop, for the uninitiated, is actress Gwyneth Paltrow’s lifestyle content and retail brand which was valued at anestimated $250 million in 2018. The brand has garnered afair share of criticismregarding some of its products and health claims and was even hit with penalties for “unsubstantiated claims” two years ago.
  
  Inits brief trailer, “The Goop Lab” appears to be embracing the controversy rather than avoiding it. The trailer teases Paltrow and her team, talking about everything from energy healing to psychedelics to exorcisms. Netflix describes the series as “a revelatory look at the boundary-pushing theories that can transform our mental, physical, and emotional wellness.”
  
  The show hasn’t premiered yet, so it’s tough to know more details. But even so, why would Netflix want to partner with a brand that has such controversy surrounding it? Well, controversy may be a selling point, according to Zak Shaikh, vice president of programming and entertainment at research-based media firm, Magid.
  
  “Netflix and streaming services at large haven’t had the same level of success with unscripted content that they have with scripted series,” Shaikh told CNN Business. “Perhaps they see partnering with a somewhat controversial brand as a way to get that attention.”
  
  Shaikh also pointed out that controversial subjects have less of an impact on Netflix than traditional television because the streaming service’s business model is based on subscribers rather than ads from companies, which might not want to be associated with Goop.
  
