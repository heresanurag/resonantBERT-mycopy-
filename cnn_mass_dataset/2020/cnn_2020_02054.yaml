id: cnn_2020_02054
title: "Joe Biden maintains big cash advantage in campaign’s waning days"
date: "2020-10-23"
section: "Politics"
url: "https://www.cnn.com/2020/10/23/politics/biden-trump-cash-on-hand/index.html"
content: |
  Former Vice PresidentJoe Bidenand aligned Democratic committees maintained a substantial cash advantage of more than $107 million over PresidentDonald Trumpand his political operation in the final weeks of the campaign, according to a new round of filings that capture last-minute fundraising and spending.
  
  And the reports show Biden outspending the President in the campaign’s homestretch: Biden’s campaign alone brought in $130 million during the first two weeks of October and spent more than $145 million. That’s a spending rate of more than $10 million a day over the two-week period.
  
  Visit CNN’s Election Center for full coverage of the 2020 race
  
  Trump, by comparison, raised nearly $43.6 million between October 1 and October 14 and spent $63.1 million, according to filings Thursday night with the Federal Election Commission.
  
  The President’s political operation has struggled to compete financially with Biden in recent months, and Trump has headed to high-dollar fundraising events to shore up his cash position in the waning days of the presidential campaign.
  
  On Thursday – just hours before the pair’sfinal confrontation on the debate stage– Trump made an appearance at a Nashville fundraiser that was expected to bring in $8 million for the campaign. On Friday, Trump campaign officials announced a $26 million haul around the debate for the campaign and affiliated GOP committees, marking the reelection effort’s largest digital fundraising day.
  
  The President insists he has enough funds to prevail on Nov. 3 – as he did four years ago, despite being outspent by his then-rival Hillary Clinton.
  
  “We don’t need money,” Trump said during Thursday night’s debate. “We have plenty of money. In fact, we beat Hillary Clinton with a tiny fraction of the money that she was able” to raise.
