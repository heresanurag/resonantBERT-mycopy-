  He said onInstagram: “It was nothing but lovely playing with you, Dhoni. With my heart full of pride, I choose to join you in this journey. Thank you India. Jai Hind!”
  
  Raina is also the second-highest run-scorer in the history of the IPL only behind Kohli.
