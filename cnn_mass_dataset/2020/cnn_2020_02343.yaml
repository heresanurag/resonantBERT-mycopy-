title: "Something showed up on this weather radar, but it wasn’t rain. Would you believe it was birds?"
date: "2020-02-17"
section: "US"
url: "https://www.cnn.com/2020/02/17/us/migratory-birds-weather-radar-key-west-trnd/index.html"
content: |
  A weather radar in Key West, Florida, exploded in a wave of hundreds of red, orange, and green dots early Monday morning.
  
  📡 Key West radar has had a busy night, but not because of weather! The most impressive display of migratory birds so far this year occurred overnight. This product shows biological targets in green/yellow flying north over the Keys. Showers/rain are depicted in darker blues. 🐦pic.twitter.com/V2PJfucxJA
  
  It would have been quite a storm, if the activity wasn’t almost completely due to migrating birds.
  
  The birds showed up on the radar in green and yellow. Rain was visible on the radar in darker blue colors, according to the Twitter post.
  
  New York Times: Trump administration to 'weaken' protections for migratory birds
  
  The National Weather Service wrote in a separate tweet that this activity is typical during this time of year, as birds migrate back to their homes after flying South for winter.
  
  Curious Twitter users wanted to know what types of birds were showing up on the radar, but the National Weather Service could only narrow it down to 118 possibilities.
  
  Agraphiccreated by Cornell University researchers shows the migratory patterns of 118 types of birds across North and South America.
  
  Last September, the National Weather Service Key West posted a gif toTwittershowing multiple flocks of birds migrating south over the island.
