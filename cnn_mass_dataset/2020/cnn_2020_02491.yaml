  Good morning, overachievers!NASA is hiring a new class of astronautsin preparation for a moon landing in the next few years.
  
  Here’s what you need to know toGet Up to Speed and Out the Door.
  
  (You can also get “5 Things You Need to Know Today” delivered to your inbox daily.Sign up here.)
  
  Any hopes that the Wuhan coronavirus was slowing down have beendashed after 242 deaths and 14,000 more casesof the virus were reported yesterday. The spike is partly due to the fact that doctors are now diagnosing patients based on their symptoms and not just the results of a test. However, the World Health Organization says it’s common during an outbreak to adapt the definition of a case. A vast majority of cases have been confined to mainland China, but theWHO cautioned that, at this stage, the virus would “create havoc”if it reached a country with inadequate medical infrastructure. Several major events in China have been shuttered over virus fears,including Shanghai’s Fashion Weekand the Hong Kong and Singapore legs of the World Rugby Sevens Series. The Tokyo Olympics, however, are still on track for this summer.
  
  The fallout from the Roger Stone sentencing controversy, coupled with general post-impeachment uneasiness, is boosting tensions at the Department of Justice.Attorney General William Barr is under scrutiny from DOJ colleagues and Democratic opponentsfor his role in requesting a lighter sentence for Stone, Trump’s former associate, after the President complained. Barr has played a role in other high-profile cases of interest to Trump and regularly faces allegations of political tampering within the DOJ. The Stone incident just adds to those claims. Democrats want to investigate Barr’s conduct, butRepublicans say they see no reason to. However, Barr hasagreed to testify before the House Judiciary Committee next monthand will likely have to answer questions about the Stone sentencing and other controversies.
  
  Iowa Democratic Party Chairman Troy Pricehas resigned following last week’s Iowa caucus debacle. Price and other Democratic officialsagreed there was no wayhe could continue being the head of the state’s party after a glitch delayed caucus results by days. The Iowa Democratic Partywill soon begin a partial recanvass of voting precinctsflagged as having potentially inaccurate results. If there are no major discrepancies, the party will declare Pete Buttigieg the winner, followed closely by Bernie Sanders. Meanwhile, Democratic candidate Michael Bloomberg, who was not on the ballot in Iowa or New Hampshire, is facing backlash for a 2015 video in which heuses racially charged language to praise New York City’s controversial stop-and-frisk policy. Bloomberg said the comments do not reflect his thinking now or how he led as mayor.
  
  Israeli leaders are furious after the United Nationspublished a database of more than 100 companiesit says are doing business in Israeli settlements in occupied Palestinian territories. That kind of business activity is a no-go since the settlementsare considered illegal, having been built on land captured from Jordan by Israel in the 1960s. (Israel and the US dispute these definitions.) Most of the 112 businesses listed are Israeli, but others include Motorola Solutions, General Mills, Trip Advisorand Airbnb. Israel’s foreign minister said the list, which was commissioned by the UN Human Rights Council, is discriminatory against Israel. Palestinian leaders and others say it holds Israel and other nations accountable for actions in the highly contested area.
  
  The catastrophic Deepwater Horizon oil spill that ravaged the Gulf of Mexico in 2010 wasactually about 30% bigger than originally thought, according to a new study. Researchers say layers of “invisible and toxic oil” that weren’t detectable by satellites made the spill much worse than it appeared. This oil was discovered using computer simulations, and the results suggest that satellites and other observation equipment now in use may not be enough to properly determine the magnitude of oil spills. The 2010 spill began after a deadly explosion on a BP-contracted Transocean Ltd. Deepwater Horizon rig and is consideredone of the worst environmental disasters in US history.
  
