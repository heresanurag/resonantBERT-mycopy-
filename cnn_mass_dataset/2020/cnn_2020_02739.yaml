title: "Must-watch videos of the week"
date: "2020-02-21"
section: "App News Section"
url: "https://www.cnn.com/2020/02/21/app-news-section/videos-of-the-week-mobile-february-21/index.html"
content: |
  A life-changing hug, a date night doesn’t go as planned and an unexpected discovery gives a glimpse into the past. Here are the must-watch videos of the week.
  
  If you need proof of the power of pizza to bring people together, look no further than a boy in Rhode Island who provided a heartwarming moment for a delivery man. The man said the boy’s gesture filled him with hope after unexpectedly losing his teenage daughter.
  
  Two off-duty cops were at the right place at the right time when they foiled a robbery at a Kentucky restaurant. The twist? The pair are married and were enjoying a date. They revealed the Raising Cane’s location was the same place they ate right after they got married.
  
  A long-lost purse is serving as a time capsule after a custodian discovered it wedged between a locker and a wall at an Ohio middle school. Its contents provide a fascinating glimpse into 1950’s life for the relatives of one former student.
  
  Have a fear of heights? This video isn’t for you. Blake Wallenda of the “Flying Wallendas” dazzled onlookers as he performed a dizzying 200-foot skywalk between two hotels in Hawaii. As if that wasn’t daring enough, he added an extra pinch of drama by dashing across the final portion of the wire.
  
  Meet, Fred, the miniature horse. He is a therapy animal who upped his skills after flying first class with his handler. Fred is housebroken, and his owner hopes his trip will help reduce the stigma of therapy animals.
