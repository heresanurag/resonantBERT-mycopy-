  “EPA regulations have been very successful at improving air quality in the US. It’s important that these aren’t rolled back, and indeed the cross-state rule could be enhanced to include other sectors.”
  
  Under President Trump’s administration, theEPA has moved to slash several rules aimed at regulating emissions, including aplan to freeze an Obama-era rulemandating that automakers work to make cars more fuel efficient.
