  Remember Blockbuster?
  
  Not only is there still one operating in the US, but local residents will have a chance to spend the night in it.
  
  The world’s last Blockbuster is located in Bend, Oregon, andit’s being listed on Airbnb. The space can be booked for three individual, one-night reservations on September 18, 19 and 20.
  
  Guests will have the run of the place, whether they want to watch a preselected lineup of ’90s titles or anything else they find in the store, reportsCNN’s Brekke Fletcher.
  
  Just remember to rewind!
