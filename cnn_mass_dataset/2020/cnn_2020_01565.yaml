id: cnn_2020_01565
title: "Apple to pay $113 million over deliberately slowing down iPhones"
date: "2020-11-19"
section: "Tech"
url: "https://www.cnn.com/2020/11/19/tech/apple-battery-settlement/index.html"
content: |
  Apple has agreed to pay millions of dollars to 34 states over its controversial previous practice of deliberately slowing down older iPhones to extend their battery life.
  
  The company will pay $113 million tosettle an investigationby states including California and Arizona over howApplewasn’t transparent about its iPhone battery problems that led to unexpected device shutdowns. Instead of disclosing the issue to consumers or replacing the batteries, it pushed a software update in December 2016 that impacted the performance of older iPhone models.
  
  News of the practice upset Apple(AAPL)consumers, igniting what some called “batterygate.” Many believed it was an effort to encourage users to buy new iPhones.
  
  Apple will pay up to $500 million to settle lawsuit over slowing down older iPhones
  
  “Big Tech companies must stop manipulating consumers and tell them the whole truth about their practices and products,” said ArizonaAttorney General Mark Brnovich, who helped lead the investigation, in apress releaseon Thursday. “I’m committed to holding these goliath technology companies accountable when they conceal important information from users.”
  
  At the time, the company issued arare apology, temporarily dropped the price of replacement batteries from $79 to $29, and added a feature to allow iPhone users to monitorbattery health.
  
  “We know that some of you feel Apple has let you down. We apologize,” the company said in a 2017statement. “First and foremost, we have never — and would never — do anything to intentionally shorten the life of any Apple product, or degrade the user experience to drive customer upgrades.”
  
  Despite the mea culpa, it faced legal ramifications. In March, Apple agreed topay up to half a billion dollarsto settle a class action lawsuit accusing it of slowing down iPhones to compel users to buy new ones.
  
  In addition to paying states millions of dollars, Apple agreed to provide updates about iPhone battery health, performance and power management on its website or installation notes.
