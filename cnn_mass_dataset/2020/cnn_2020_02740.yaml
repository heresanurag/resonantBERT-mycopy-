id: cnn_2020_02740
title: "Apple will offer coronavirus tests to employees returning to its headquarters, Bloomberg reports"
date: "2020-06-05"
section: "Tech"
url: "https://www.cnn.com/2020/06/05/tech/apple-headquarters-coronavirus-testing/index.html"
content: |
  Apple employees returning to itsSilicon Valley headquarterswill reportedly have the option of getting tested for the coronavirus.
  
  The company started bringing back some workers to its Apple Park office in Cupertino, California, last month, offering them nasal-swab tests for the virus and requiring temperature checks and masks, according toBloomberg News. Other precautions include closed kitchens and a two-person limit in elevators that normally accommodate 10.
  
  Apple(AAPL)did not respond to requests for comment.
  
  The company closed its offices and retail outlets around the world because of the pandemic but has gradually been reopening them with additional safety measures.Operations resumedat more than100 stores across the USlast month, though many of them will only be open for curbside pickup of online orders. Stores allowing customers inside will require masks and temperature checks.
  
  Apple is tracking iPhones stolen from its stores
  
  Big tech companies have taken differing approaches to bringing their workforce back to the office. Facebook(FB)said its employees maywork from home through the end of 2020if they so choose, with CEO Mark Zuckerberg estimating that as much as50% of the company’s workforcecould be permanently remote within the next decade. Twitter(TWTR)will allow employees towork from home “forever”if their roles allow it, the company said last month.
  
  Google(GOOGL)said it wouldreopen some offices in Julyand aim to have them operating at 30% of capacity by September.
