title: "A water main break in New York City flooded streets and disrupted subway commutes"
date: "2020-01-13"
section: "US"
url: "https://www.cnn.com/2020/01/13/us/nyc-water-main-break-trnd/index.html"
content: |
  A water main break in New York flooded streets, caused water damage to buildings, and disrupted subway commutes just before the Monday morning rush hour.
  
  The break occurred on Manhattan’s Upper West Side around 5 a.m. ET, officials said at a news conference. It causedsignificant delayson the 1, 2 and 3 subway lines andstreet closureson Broadway from 72nd Street to 61st Street.
  
  Emergency crews are on the scene working to repair the problem, officials said, and the water was shut off around 8 a.m.
  
  Emergency crews are working to resolve this morning’s water main break on the UWS. It continues to have an effect on transit and traffic. 1 and 3 trains are suspended and the 2 is running on the 5. Broadway is closed in the area of West 62nd St.https://t.co/Tt6kx0eBW0
  
  It likely will take days to complete work and restore streets, said Vincent Sapienza, Commissioner of the Department of Environmental Protection.
  
  Update: an@fdnyofficial says they are “close” to fixing this water main break, which turned Broadway on the upper West side into a river#abc7NYpic.twitter.com/rx14YRpxQM
  
  Video posted by Derick Waller, a reporter forCNN affiliate WABC, shows the flooding virtually turning a section of Broadway into a river.
  
  The water main break that flooded the Upper West Side this morning also resulted in a packed commute.  This was the tunnel between Port Authority and Times Square!   Updates:https://t.co/LNHwO0iAKvpic.twitter.com/d9IoSCA4hQ
  
  Transit authorities were assessing damage and working to restore service late Monday morning. Officials said they expect things will return to normal by the evening rush hour.
  
  Video shows cars under water this morning in this underground garage with more water gushing in at 62/Broadway#abc7NYpic.twitter.com/9mEOHLQwjb
  
  Three buildings reported significant damage, Fire Department of New York Deputy Assistant Chief Joseph Ferrante said.
  
  Residents also reported tea-colored water coming out of their faucets.
  
  Sapienza said there are no concerns about water quality and residents should let the water run until clear.
  
  The city experiencedextreme weather fluctuationsover the weekend, with temperatures reaching the 60s on Saturday and Sunday before dropping Sunday evening. Officials said they will look into whether that played a role.
