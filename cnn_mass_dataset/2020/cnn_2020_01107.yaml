title: "McDonald’s social media person cries for help: I am more than just the McRib"
date: "2020-10-26"
section: "Tech"
url: "https://www.cnn.com/2020/10/26/tech/mcdonalds-social-media-brands-trnd/index.html"
content: |
  The McDonald’s social media managerignited a conversationon Twitter Friday, gathering people who run brand social accounts to vent and talk aboutmental health.
  
  Many companies have tried injecting more personality into their Twitter feeds to humanize their brands. Companies often interact with each other on Twitter. Many of them are competitive: Dunkin’ and Wendy’sgot into a Twitter spatin mid-October.
  
  But the McDonald’s Twitter conversation was actually heartwarming. Here’s how it all went down.
  
  First,McDonald’s(MCD)tweeted:it’s always “when is the McRib coming back” and never “how are you doing person who runs the McDonald’s(MCD)account.”
  
  Then the responses started pouring in.
  
