title: "FBI delivers to America a chilling reminder about al Qaeda"
date: "2020-05-18"
section: "Opinion"
url: "https://www.cnn.com/2020/05/18/opinions/pensacola-shooting-terrorist-bergen/index.html"
content: |
  Editor’s Note:Peter Bergen is CNN’s national security analyst, a vice president at New America and a professor of practice at Arizona State University. He is the editor of theCoronavirus Daily Briefand author of the new book“Trump and His Generals: The Cost of Chaos.” The opinions expressed here are his own. Readmore opinionat CNN.
  
  Did al Qaeda strike a blow to the United States at the end of last year?FBI Director Christopher Wray told a press conference on Mondaythat Mohammed Alshamrani, a member of the Royal Saudi Air Force who killed three US sailors at the Pensacola Naval Air Station last December, was a terrorist associated with al Qaeda in the Arabian Peninsula, or AQAP, an al Qaeda affiliate based in Yemen.
  
  This means that the FBI may have determined that, unlike other recent acts of terrorism perpetrated by self-radicalized domestic terrorists, the Pensacola attack may be the first time since 9/11 that a foreign terrorist organization was able to strike successfully in the United States. (Though, asCNN noted, the officials “stopped short of saying that Alshamrani had been directed by the terror group.”)
  
  It is also a reminder that the Trump administration’s travel ban, which primarily targets Muslim-majority countries, is likely not the shield the president says it is. Saudi citizens like Alshamrani are not subject to the ban and the Trump administration continues to enjoy warm relations with the Saudi royal family.
  
  AQAPhad claimedresponsibility for the Pensacola attack in February, but such boasts are not always genuine. Wray said evidence gathered from Alshamrani’s two iPhones showed that he had been coordinating “planning and tactics” with AQAP.
  
  Wray and Attorney General William Barr, who also spoke at Monday’s press conference, had harsh words for Apple, which manufactured Alshamrani’s phones, saying that the company had not helped to unlock them. Barr said it was only the FBI’s own computer experts who were able to find the encrypted information that tied Alshamrani to AQAP.
  
  Apple said in Januarythat it had already helped the FBI by giving it access to the data from Alshamrani two phones that was stored in cloud storage, but that it was unable to help with the encryption on the devices that was essential to protect its customers from hackers and criminals.
  
