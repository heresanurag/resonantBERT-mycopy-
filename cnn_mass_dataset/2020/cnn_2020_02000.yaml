  No doubt Alshamrani’s case will be cited often in the future by the FBI and Department of Justice to argue that they need to be able to break into encrypted phones when they have a lawful search warrant, as they did in Alshamrani’s case. And Apple will continue to assert that the encryption they place on the phone is a necessary part of their business model to assure their consumers that their data is safe and that installing any kind of “back door” on their phones could be exploited by all sorts of bad actors.
  
  In a2016 letter to customers, Apple said that the issue was so important that even Apple can’t unlock its own phones saying, “We have even put that data out of our own reach, because we believe the contents of your iPhone are none of our business.”
  
  The letter from Apple was issued after the FBI said Apple had to bypass the encryption on one of their iPhones after two ISIS-inspired terrorists killed 14 people in San Bernardino, California, in 2015. Despite a court order, Applerefused to hack intothe terrorists’ phone, and eventually the FBI found a technical solution on its own.
  
  Aside from highlighting the ineffectualness of the administration’s travel ban, thePensacola attack is also a reminderthat although al Qaeda and its affiliates have been greatly damaged by US drone strikes and other counterterrorism measures, they still remain focused on attacking American targets and very occasionally they may succeed.
