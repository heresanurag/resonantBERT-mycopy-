title: "Pompeo backs away from theory he and Trump were pushing that coronavirus originated in Wuhan lab"
date: "2020-05-17"
section: "Politics"
url: "https://www.cnn.com/2020/05/17/politics/mike-pompeo-coronavirus-wuhan-lab/index.html"
content: |
  Secretary of State Mike Pompeo appears to be backing away from a theory he and President Donald Trump were pushing that thecoronaviruspandemic may have originated ata lab in Wuhan, China.
  
  Pompeo said in an interview with Breitbart that aired Saturday that “we know it began in Wuhan, but we don’t know from where or from whom, and those are important things.”
  
  “We have repeatedly asked to have teams go in to assist them in identifying where the virus originated,” the secretary said.
  
  Pompeo has for weeks publicly espoused the theory that the virus that has infected more than 1,400,000 Americans originated from the Wuhan Institute of Virology, claiming in an interview earlier this month thatthere was “enormous evidence” and a “significant amount of evidence”this was the case. He later conceded that he couldn’t be certain of its origin and that the evidence that it came from “the vicinity” of the Wuhan lab “could be wrong.”
  
  While Trump has similarly claimed that he has seen evidence linking the outbreak to the Wuhan lab, assessments by scientists and those circulated among US intelligence-sharing allies have posited that it is “highly unlikely” the virus originated in a lab. The US intelligence community has said it is looking into both possibilities.
  
  The Chinese government has pushed back on the claim, describing it as a “smear” intended to bolster Trump’s reelection chances.
  
  Pompeo has repeatedly condemned Beijing for a lack of transparency about the pandemic.
  
  In his interview with Breitbart, Pompeo emphasized that knowing where the outbreak began is “key” forscientists working on developing a vaccine,and blamed China for “attempting … to undermine the central understandings of transparency that every country has a responsibility to deliver.”
  
  Pompeo also reiterated thatthe US intends to punish Chinafor the global pandemic, but noted that “the precise mechanisms that we will choose – I want to make sure that (Trump) gets the chance to get fully briefed and make those decisions.”
