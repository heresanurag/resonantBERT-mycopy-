title: "Someone in Arizona just won the $410 million Mega Millions jackpot"
date: "2020-06-10"
section: "US"
url: "https://www.cnn.com/2020/06/10/us/arizona-mega-million-410-million-trnd/index.html"
content: |
  Someone in Arizona paid for a $2Mega Millions ticketand walked away with the whole $410 million jackpot.
  
  The mystery millionaire is the first person in the state to win the Mega Millions jackpot, lottery officialssaidWednesday. The prize is worth about $316.8 million in cash.
  
  Their single ticket matched all six numbers, including a “golden Megaball,” which multiplies non-jackpot prizes by two. And 13 other tickets matched the first five balls – nine of them are worth $1 million and four more are worth $2 million (not $410 million, but nothing to sniff at), the lottery said.
  
  “Lucky” is an understatement. Theodds of winning the Mega Millionsjackpot are 1 in 302,575,350 in the 45 states where it’s offered, plus Washington and the US Virgin Islands.
  
  Interestingly, you have a1 in 55,000,000 chance of having quintuplets naturally– about one-fifth the chance of winning the jackpot.
  
  But someone else already won it this year – in February, a New Jersey customer won the $202 million jackpot. Thatwinner got to stay anonymousthanks to a new law New Jersey Gov. Phil Murphy signed one month prior that lets lottery champs remain unknown.
  
  And in 2018, Mega Millions turned into MegaBillions, whensomeone in South Carolina won the $1.537 billion jackpot, a historic first since the game started in 2002.
  
  The jackpot will reset on Friday to $20 million.
