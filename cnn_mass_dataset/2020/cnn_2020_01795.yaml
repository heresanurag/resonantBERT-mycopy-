  “Our forecast is that mortgage rates will be trending higher in 2021,” he said. “That was going to be happening anyway leading to lower refinance volumes next year. This fee will add to that.”
  
  The FHFA says that the fee is necessary because it is needed to cover billions in Covid-19-related losses at Freddie and Fannie. Specifically, actions taken by the enterprises during the pandemic to protect renters and borrowers – including offeringforbearance programs, buying loans in forbearance andmodifying mortgage termsto reduce monthly payments and simplify repayment – which are conservatively projected to cost at least $6 billion, according to the FHFA.
  
  Currently, the FHFAanticipates $4 billion in loan losses due to projected forbearance defaults, $1 billion in foreclosure moratorium losses and $1 billion in servicer compensation and other forbearance expenses.
