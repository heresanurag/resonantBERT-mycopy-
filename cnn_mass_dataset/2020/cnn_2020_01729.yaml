id: cnn_2020_01729
title: "Edward Snowden says he will apply for Russian citizenship"
date: "2020-11-02"
section: "Europe"
url: "https://www.cnn.com/2020/11/02/europe/edward-snowden-russian-citizenship-intl/index.html"
content: |
  Former US National Security Agency contractorEdward Snowdenhas announced that he and his wife are applying for Russian citizenship while also keeping their US nationalities.
  
  “After years of separation from our parents, my wife and I have no desire to be separated from our son. That’s why, in this era of pandemics and closed borders, we’re applying for dual US-Russian citizenship,” Snowden said in a tweet posted early Monday.
  
  Last week, Snowden’s wife, Lindsay Mills,announced the coupleis expecting their first child.
  
  “Lindsay and I will remain Americans, raising our son with all the values of the America we love – including the freedom to speak his mind. And I look forward to the day I can return to the States, so the whole family can be reunited,” Snowden said.
  
  Snowdenrecently obtained a permanent residencypermit in Russia, his lawyer Anatoly Kucherena told state-run news agency RIA Novosti last month.
  
  Snowden is accused of espionage and theft of government property in the US for leaking troves of information on American intelligence and mass surveillance programs to the media.
  
  He has been living in exile in Moscow since 2013.
  
  Until recently, Russian law stated that foreigners must renounce any other citizenship in order to apply for a Russian passport. New legislation passed this April lifted that requirement, allowing Snowden to apply for dual citizenship.
