  The US Centers for Disease Control and Prevention includes a “new loss of taste or smell” on its list ofCovid-19 symptoms to watch for.
  
  “What’s called anosmia, which basically means loss of smell, seems to be a symptom that a number of patients developed,” CNN Chief Medical CorrespondentDr. Sanjay Gupta told CNN anchor Alisyn Camerotaon “New Day” in July.
  
  That symptom appears to be more prevalent in mild or moderate cases of Covid-19, and tends to appear at the beginning of the illness. It may even be one of the first signs that you are sick.
