title: Ex-Royal Marine's prosthetic legs stolen in Premier Inn car park - BBC News
date: '2024-01-11'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-67937156
content: |-
  Mark Ormrod said the legs were taken from his car overnight while it was outside a Premier Inn.

  Mark Ormrod is a former Royal Marine and Invictus Games athlete

  Former Royal Marine Mark Ormrod told his followers on social media that a set of his prosthetic legs were stolen from his car in west London.

  The car was parked at a Premier Inn in Chiswick, which said its security cameras did not capture the incident.

  The triple-amputee is a gold-medal winning Invictus Games athlete and was appointed MBE for his services to the Royal Marines and veterans.

  Premier Inn says it is looking into what happened.

  The back window of his car was smashed

  Mr Ormrod, who filmed the damage to his car, said it had not been the best start to his day.

  He posted on X (formerly Twitter): "Had my car broken into last night.

  "They stole a bag full of sweaty gym cloths, another bag with my JiuJitsu Gi in and what's really inconvenient is they took a set of my prosthetic legs!"

  He added: "Despite having 3 cameras pointing at my car I was told by the staff at the hotel that they couldn't see any activity as the view to my car was blocked by another car (might be time to reposition those cameras).

  "The sad thing is to think that someone would break into a car parked in a disabled parking space and steal equipment someone needs to live independently and not even care."

  Mr Ormrod was serving in Afghanistan in 2007 when he was hit by an improvised explosive device. It resulted in the amputation of both legs and his right arm.

  Since then, he has gone on to work for The Royal Marines Charity, and has used his own experiences to help other injured service personnel.

  He was awarded the BBC South West Sports Personality of the Year award for 2018 for his participation in the Invictus Games.

