title: 'Chelsea: Multiple bids lodged to buy Premier League club - BBC Sport'
date: '2022-03-19'
section: General
url: http://www.bbc.co.uk/sport/football/60800380
content: |-
  Chicago Cubs owners, a consortium featuring Lord Coe and another group led by British property investor Nick Candy all submit offers to buy Chelsea.

  Last updated on .From the section Chelsea

  The Ricketts family, who own Major League Baseball team the Chicago Cubs, a consortium featuring Lord Coe and another group led by British property investor Nick Candy have all submitted offers to buy Chelsea.

  A deadline for bids was set for 21:00 GMT on Friday after the Premier League club had been put up for sale by Russian owner Roman Abramovich.

  Chelsea fan Candy said that he had secured additional investment from South Korea and that his bid is "over £2bn".

  Also among the confirmed bidders is a group consisting of Swiss billionaire Hansjorg Wyss, US businessman and Major League Baseball's Los Angeles Dodgers part-owner Todd Boehly, American PR executive Barbara Charone, British businessman Jonathan Goldstein and British journalist Daniel Finkelstein.

  The consortium is working with America-based investment firm Clearlake Capital, which has about $60bn (£45.6bn) of assets under management.
