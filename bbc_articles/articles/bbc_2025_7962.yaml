title: Big queues at Birmingham waste collection site amid bin strike - BBC News
date: '2025-04-05'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/c5y4g7pp7d8o
content: |-
  The council has set up mobile bin collections for residents to unload their waste amid the strike.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Mobile bin collection points in Birmingham have seen mile-long queues as residents try to get rid of their uncollected rubbish. There were traffic delays around Woodgate Valley Park on Friday after Birmingham City Council opened a mobile site at 07:45 BST. The move was amid the all-out strike, which was declared a major incident on Monday. Elsewhere, striking bin workers, who are members of Unite the Union, claimed they were "threatened" with arrest and fines if they continued to delay bin lorries leaving a depot in Tyseley. The council previously said Unite was stopping them from operating a contingency service, which would allow them to make one bin collection to every household a week.

  There were traffic delays as people tried to unload rubbish at a mobile bin collection in Woodgate Valley Country Park

  One person, who did not want to be identified, told the BBC there was a large police presence in the area earlier. He said: "Wagons started to make their move out of the front gate and nobody was allowed to hamper them. "I was told anybody getting arrested today was facing a £1,000 fine per person." During the all-out strike that began on 11 March, workers on the picket line have walked slowly in front of the bin lorries being driven out. Unite national lead officer Onay Kasab said the only thing that would end the strike was for the council to resolve its "horrific pay attacks". He said: "The council is responsible for squandering millions of pounds worth of public resources trying to fight a dispute that it could resolve at a fraction of the cost. "It is spending more than £6m a year on employment agency fees in the refuse service. "It is also wasting huge amounts of valuable police time, employing security guards that have nothing to do and pouring untold resources into declaring a major incident. "These costs dwarf what it would take to undo the pay cuts."

  Timothy Huxtable said piles of rubbish blocked a children's play area in Tyseley

  Responding to the claims, West Midlands Police told the BBC officers had not issued fines yet due to bin workers on the picket line co-operating. The strike has led to more than 17,000 tonnes of uncollected waste being left on the streets. Timothy Huxtable, a councillor who represents Hall Green South, said a "mini tip" had been created by fly-tippers outside Tyseley Community Centre on Thursday. "I've never seen so many black bags piled up. Bags had piled up so high, it blocked the access to the play area - there were kids inside, blocked in," he said. Residents have been advised about booking slots at recycling centres but some people said they struggled to get appointments. But on Friday there were reports the Lifford Lane recycling centre, in Kings Norton, was quiet. One resident said there had been huge piles of rubbish along Broadmeadow Lane but that the tip had been "dead" with even staff surprised at how quiet it was. William Timms, a pest controller in Birmingham, said since the strikes had begun, this was the busiest he had ever been. He said: "Calls have gone up by 60%. I actually pulled out a rat from a trap two weeks ago that was 22 inches in length. "In a perfect habitat, which is what they're in at the moment, they give birth every three weeks. That's six to 12 pups per female, so we're going to be absolutely inundated." Mr Timms said even if all the rubbish was collected, the pest issue would still linger, with the rodents likely to start nesting in residents' homes or cars. He called the piles of rubbish a 24-hour banquet and added: "They have all the protein there, so they're getting bigger. They're the size of small kittens." The pest controller advised residents to store their rubbish in outdoor sheds with hard floors so the rats were unable to get through. Birmingham City Council told the BBC all waste trucks were deployed across the three depot sites by 08:00 BST. A spokesperson said: "By being able to deploy all the trucks today, we can now concentrate on clearing up the tonnes of waste we have been unable to, due to Unite the Union, across the city. "We hope to continue being able to collect residual waste next week."

  Pest controller William Timms says residents should store rubbish in sheds with hard flooring so the rats are unable to get through

  The BBC has seen a leaked letter from Unite general secretary Sharon Graham to Deputy Prime Minister Angela Rayner, where Graham described local negotiations as a farce. She said the government needed to stop sitting on its hands and called for the Treasury to restructure the council's debts. Chief Secretary to the Treasury Darren Jones denied the government was failing to act. He added: "We've continued to support the council and its leaders in Birmingham when it was declared a major incident. "It was right that we supported the council with that decision, and that's the decision we're having now - to understand what we can do to help resolve it with the immediate issue with the bins not being collected but also to draw a line under the dispute." The government said Unite should focus on "negotiating in good faith, drop their opposition to changes needed to resolve long-standing pay issues and get round the table" to bring the Birmingham bin strike to an end. A Number 10 spokesman said: "The residents of Birmingham are our first and foremost priority and, as you will have seen, the local government minister Jim McMahon was in Birmingham yesterday meeting council leaders and commissioners to discuss the council's response and make sure this is being gripped. "Following that meeting, police have installed barriers at the picket line to prevent waste lorries being recklessly blocked from leaving the depots this morning to start dealing with the backlog." But Ms Graham responded to say the statement issued by Number 10 said bin workers are being made to pay the price for bad decisions made by the council She said: "This authority is determined to impose cuts on workers at any cost and has moved the goalposts again. "Unite's team of decision makers has been in negotiations in good faith for weeks. "The government is going to have to wake up and smell the coffee that they are part of this dispute, as the commissioners report directly to them and they own the £3.9 billion debt of the council." She said if the government were concerned about residents they would "ensure that Unite's solutions on the table" were adopted, adding: "Yet again workers and communities pay the price for government inaction."

