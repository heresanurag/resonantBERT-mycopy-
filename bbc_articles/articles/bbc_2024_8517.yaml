title: Energy secretary defends approach on climate after criticism - BBC News
date: '2024-04-21'
section: UK Politics
url: http://www.bbc.co.uk/news/live/uk-politics-68861335
content: |-
  Claire Coutinho joins the show a day after the head of the climate change watchdog said the UK is now "less ambitious" with green policy.

  We're on the topic of Tory MP Mark Menzies, who was suspended over claims he misused party funds.

  Laura asks whether it's acceptable that the Conservative party knew about his actions for several months but only suspended him when the allegations were reported in the media.

  Coutinho says the events are under investigation at the moment and being dealt with after more information came to light, but she doesn't know what was known and when.

  She insists the party takes these issues very seriously.

  Laura says more than a dozen Conservative MPs elected in 2019 have been suspended from the party over breaches to the rules, but Coutinho says all parties have had issues.

  There are 650 MPs and the vast majority are "hardworking, decent people" she tells Laura.

  You can read more about the Mark Menzies scandal here.

