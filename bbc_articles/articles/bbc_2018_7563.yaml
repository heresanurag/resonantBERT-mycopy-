title: 'World Cup 2018: Fox apologises after Robbie Williams gives finger - BBC News'
date: '2018-06-16'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-44494286
content: "No reason has been given for the former Take That singer's gesture during\
  \ the World Cup opening ceremony.\n\nUK viewers were not shown Robbie's provocative\
  \ gesture (not shown here either)\n\nUS broadcaster Fox has apologised to viewers\
  \ for the offensive gesture Robbie Williams gave during his World Cup opening ceremony\
  \ performance.\n\n\"As it was broadcast live, we did not know what would happen\
  \ during [the] performance and we apologise,\" the network told the Hollywood Reporter.\n\
  \nNeither the Take That star nor his representatives have explained why he showed\
  \ his middle finger.\n\nThe incident was not seen by UK viewers but has been widely\
  \ circulated online.\n\nITV had already cut away from the opening ceremony when\
  \ Williams \"flipped the bird\" while singing his 2000 track Rock DJ.\n\nThe 44-year-old\
  \ altered the lyrics from the song, adding the line \"But I did this for free\"\
  \ before giving his one-finger salute.\n\nThis video can not be played To play this\
  \ video you need to enable JavaScript in your browser.\n\nRobbie's gesture, potentially\
  \ seen by millions around the globe, recalled the middle finger MIA gave to the\
  \ camera while appearing with Madonna at the 2012 Super Bowl.\n\nWilliams had previously\
  \ tweeted that he was \"very excited to be returning to Russia to perform at the\
  \ opening of the @FIFAWorldCup\".\n\nYet he did admit, in an interview with Reuters,\
  \ that he had been asked not to sing Party Like a Russian, his 2016 song about hedonistic\
  \ Russian oligarchs.\n\nThe track prompted some Russian media outlets to call for\
  \ him to be banned from performing in the country.\n\nThis YouTube post cannot be\
  \ displayed in your browser. Please enable Javascript or try a different browser.\
