  \ The BBC is not responsible for the content of external sites. YouTube content\
  \ may contain adverts.\n\nRobbie's performance began with Let Me Entertain You and\
  \ included his songs Feel and Angels, which he performed with Russian soprano Aida\
  \ Garifullina.\n\nIt preceded the opening match between Russia and Saudi Arabia,\
  \ an uneven contest that Russia easily won five goals to nil.\n\nFollow us on Facebook,\
