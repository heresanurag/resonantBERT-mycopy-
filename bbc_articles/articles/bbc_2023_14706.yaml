title: Rare 'Dumbo' octopus filmed on deep sea live stream - BBC News
date: '2023-09-24'
section: General
url: http://www.bbc.co.uk/news/science-environment-66903382
content: |-
  An octopus with ear-like fins resembling the Disney character is seen at a depth of more than 1,000m.

  A "Dumbo" octopus, with ear-like fins similar to the 1940s Disney cartoon character, has been seen in a broadcast on a EVNautilus live stream, which is exploring the Papahānaumokuākea Marine National Monument in the north Pacific Ocean.

  The octopus can live at depths of up to 7,000 metres and has been filmed by a remotely operated Ocean Exploration Trust vehicle.
