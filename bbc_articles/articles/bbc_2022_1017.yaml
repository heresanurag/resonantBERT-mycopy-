title: 'Covid: Visualising 150,000 UK coronavirus deaths - BBC News'
date: '2022-01-09'
section: General
url: http://www.bbc.co.uk/news/health-59915289
content: |-
  Health and Science Reporter Laura Foster tries to help us understand the impact Covid-19 has had on the UK.

  150,000 people in the UK have now died with Covid-19.

  It is a bleak, sobering figure after nearly two years of daily coronavirus statistics.

  But the problem with statistics, is that a person can forget that behind every number is a person.

  Here, Health and Science Correspondent Laura Foster tries to help us understand the impact Covid-19 has had on the UK.
