title: Four killed by gunfire near Gaza aid centre, local health workers say - BBC
  News
date: '2025-06-08'
section: Middle East
url: http://www.bbc.co.uk/news/articles/c5y5wpz49xlo
content: |-
  It is the latest deadly incident to occur near aid distribution points set up by the controversial Gaza Humanitarian Foundation.

  Gaza health workers say four killed by Israeli gunfire near aid centre

  Several deadly incidents have taken place near aid distribution centres in Gaza (file photo)

  At least four Palestinians have been killed by Israeli gunfire as they were heading to an aid distribution centre, health workers in Gaza have said. The Israel Defense Forces (IDF) said troops had directed warning shots after issuing a verbal challenge at a group that was moving towards them and was deemed a threat. It is the latest deadly incident to occur near aid distribution points in Gaza that have been set up by a new organisation, the Gaza Humanitarian Foundation (GHF), which is backed by Israel and the US. The IDF said it was aware of reports that people had been injured, adding: "The number... does not align with the information currently held by the IDF."

  The latest incident occurred before dawn, near an aid distribution site close to Rafah in the south of Gaza. Palestinian paramedics said they had evacuated four people who were killed, as crowds gathered in the hope the aid centre would open and they could get food. One woman said her husband was shot in the head as he was waiting to collect food for their family. The Israeli army has declared that Palestinians should only move to and from the GHF distribution sites between 06:00 and 18:00 local time - and that at all other times it should be considered an "active combat zone". The GHF has said it opened three sites on Sunday - one in central Gaza at 06:00 and then two more in Rafah at noon.

  Israel recently began to allow limited aid into Gaza after a three-month blockade, prioritising distribution through the GHF. The distribution sites are part of a new aid system - widely condemned by humanitarian groups - aiming to bypass the UN, which Israel says has failed to prevent Hamas diverting aid to its fighters. The UN says this had not been a widespread issue, and that the GHF system is unworkable and unethical. GHF has been mired in controversy, after several deadly incidents took place during its first week of operation. More than 60 Palestinians were killed by gunfire over the foundation's first three days distributing aid, according to reports from medics and local health authorities. The IDF said it had fired warning shots on the first two days and shot near to Palestinian suspects advancing towards their positions on the third, adding that it is investigating the incidents. On Saturday, six Palestinians were killed and several others were wounded by Israeli gunfire, the Hamas-run Civil Defence agency said. The Israeli military again said it fired warning shots at suspects who approached them in a threatening manner.

  Meanwhile, a flotilla attempting to defy Israel's blockade is currently 160 nautical miles from Gaza, according to the activists organising it. The Freedom Flotilla Coalition, in charge of the Madleen vessel which has climate activist Greta Thunberg among its crew, said it was "actively preparing for the possibility of interception" while en route. Israel's Defence Minister Israel Katz has told the military to stop the boat reaching Gaza. "You'd better turn back, because you will not reach Gaza," he warned.
