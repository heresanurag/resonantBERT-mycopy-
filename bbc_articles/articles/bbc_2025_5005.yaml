content: |-
  Scotland forwards coach John Dalziel and England assistant Richard Wigglesworth are confirmed as part of the British and Irish Lions coaching staff to take on Australia this summer.

  Richard Wiggleworth, Simon Easterby, Andy Farrell, John Dalziel, Andrew Goodman and John Fogarty (left to right) will lead the Lions in Australia

  Scotland forwards coach John Dalziel and England senior coach Richard Wigglesworth have been confirmed as part of the British and Irish Lions coaching set-up to take on Australia this summer. Head coach Andy Farrell's staff draws most heavily from the Ireland set-up that he has left on secondment to lead the tourists. Simon Easterby, who served as Ireland's interim head coach for this year's Six Nations, is joined by attack guru Andrew Goodman and scrum specialist John Fogarty. There is no Welsh representation among the coaching staff however with Farrell opting against hiring Neil Jenkins, who has aided the Lions on four previous tours as a kicking coach. It is the first time since 2001, when New Zealander Graham Henry took a break from his job with Wales to lead the Lions in Australia, that there is no Welshman among the Lions coaches.

  Shaun Edwards, who played rugby league alongside Farrell at Wigan and most recently oversaw defence for France's victorious Six Nations campaign, had previously said he would "swim" to Australia to be part of the Lions tour., external However, he is instead committed to France, who tour New Zealand for a three-Test series this summer. "Putting together a Lions coaching team is an honour and a privilege - and the five phone calls made to this group of coaches reminds you just how special and unique it is," said Farrell. "This coaching group has versatility and are interchangeable in their skillset, which is a vital asset to have on a Lions Tour. "I think we have a fantastic mix and every one of these guys will bring their own character and personality to the team." Ex-England scrum-half Wigglesworth, who coached his country to a second-place Six Nations finish this month, said: "Proud is probably an understatement to how I am feeling right now. "I never got to play with Andy, but he was my coach at Saracens and England so I know his calibre and I am thoroughly looking forward to working with him." Dalziel, who has been Scotland forwards coach since 2020, added: "It's a huge honour and I am massively thankful for the opportunity. It's a real pinch-yourself moment. "Even from our first meeting as coaches you could feel the energy in the room and it is hugely exciting to work with these guys."

