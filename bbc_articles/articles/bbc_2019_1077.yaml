id: bbc_2019_1077
title: 'In pictures: Firefighters rush to Paris bakery blaze - BBC News'
date: '2019-01-12'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-46849345
content: |-
  Firefighters, upturned cars and debris fill the streets after an explosion at a Paris bakery.

  A huge explosion has ripped through a bakery in central Paris, killing firefighters and injuring dozens of civilians.

  Police believe a gas leak caused the explosion on Rue de Trévise, in the French capital's 9th Arrondissement on Saturday morning.

  Pictures from the scene show firemen in the debris-littered streets, damaged vehicles, and entire front walls blown off apartment blocks.
