title: CCTV show cars skidding around fire at Bedfordshire meet - BBC News
date: '2024-07-02'
section: General
url: http://www.bbc.co.uk/news/uk-england-beds-bucks-herts-68014030
content: |-
  Business owners on the industrial estate are worried somebody will get seriously injured.

  CCTV footage has been released showing cars at an illegal meet on an industrial estate skidding around a "ring of fire".

  It shows somebody pouring a circle of fuel on the floor before setting light to it - at which point other spectators stand in the centre of the ring as cars hurtle around the outside.

  It was recorded on 13 January by Flitwick Mowers in Bedfordshire. Owner Gordon Taylor said he was concerned about the safety of people, as well as his property.

  "There's gas pipes here, petrol here. It's dangerous, it's not the right place," he said.

  Festus Akinbusoye, Bedfordshire's police and crime commissioner, said: "Intelligence is being gathered and actions are being taken."

