  Ring announcer Kody 'Big Mo' Mommaerts: "It's a great fight. It will be tough for both of them but I have to give AJ the edge based on experience in big fights. He's only been in big fights for the past few years and Dubois is just stepping into that zone." Former lightweight world champion Anthony Crolla: "I cannot wait for this. It's a real fascinating fight. Dubois has come on so much in recent times, in terms of how he has boxing and mentally. "I think it could be a shoot out where Joshua will land a little too often early on and it's over inside six. But if Dubois does not take much punishment in the first four rounds and he's still there, there is a great chance he could get AJ late on." Super-flyweight Shannon Ryan: "Joshua will knock him out in round seven and it will be done in spectacular fashion." Middleweight Chris Eubank Jr: "Joshua is going to be too experienced, too strong and his boxing IQ will be too high for Dubois. It is a cliche but there are levels to the game and Joshua is just a few too many levels above Dubois." Former undisputed light-welterweight champion Josh Taylor: "I've been in the GB squad with the two of them. Dubois used to give Joshua nightmares in sparring and hurt him a couple of times. "I've seen him give him Joshua the wobbly legs. So it's a very, very interesting fight. Me personally, I'm kind of edging just towards Joshua, but if anyone's going to be able to put him over, I think Dubois can do it because he can seriously punch. He's a devastating puncher."

