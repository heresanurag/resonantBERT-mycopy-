content: |-
  As Anthony Joshua challenges Daniel Dubois for the IBF heavyweight world title, BBC Sport asks the world of boxing for their predictions.

  This video can not be played To play this video you need to enable JavaScript in your browser. Listen to radio commentary and follow live text commentary from 19:00 BST on BBC Sport website & app

  Daniel Dubois will defend his IBF belt against Anthony Joshua in an all-British heavyweight title fight at London's Wembley Stadium this weekend. A post-war record crowd of 96,000 will be in attendance as Joshua, 34, bids to become a three-time world champion. You can follow live text and radio commentary of Dubois-Joshua from 19:00 BST on Saturday on the BBC Sport website and app. Dubois, 27, won the interim title earlier this year and was elevated to full champion status when Oleksandr Usyk vacated the IBF strap. Fans are expecting an explosive finish. Dubois has won 21 bouts, with 20 stoppages, and two defeats. Joshua has lost three times but has 28 wins, 25 by knockout. So will Dubois prove his worth as a champion with a crowning moment? Or will Joshua - with his wealth of experience - prevail in north London? BBC Sport has asked the world of boxing for their predictions.

  Heavyweight Frazer Clarke: "As heavy-handed as Dubois is and as good a fighter as he's becoming, I still have to go for Joshua. That's through no favouritism but my professional opinion that the experiences of Joshua and the magnitude of the fight is something which is a lot more normal to AJ than it is to Dubois. "I'm not saying Dubois is going to bottle it under the lights, but it's going to be difficult. Joshua has been there, seen it and done it." Former Joshua opponent Francis Ngannou: "Even though Joshua lost against Usyk twice and Dubois fought Usyk and almost knocked him down and almost won, I would still give this to Joshua." Heavyweight Johnny Fisher: "I've had the privilege of sparring Dubois several times, and out of everyone I've sparred he's definitely the hardest puncher I've been in with. He's got a tough task, though. Joshua is proven and has fought on the biggest stage several times. "But I make AJ only a slight favourite. The run of Dubois recently has been fantastic. He's in the ascendancy and Joshua is in a good bit of form too, so it will make for an even match-up."

  This video can not be played To play this video you need to enable JavaScript in your browser. I've been through a lot of pain - Joshua

  Cruiserweight Richard Riakporhe: "I am going for Joshua within the distance, although I think it will be a great fight while it lasts. It's going to be back and forth and I think both men will have some success. "The deciding factor will be who can take the shots best. Both can punch but AJ probably punches harder. I don't think it's wise taking big shots from AJ and analysing Dubois' last few fights - even though he's come through in great fashion he also took quite a lot of damage. We saw what AJ did to Francis Ngannou when he landed those clean shots." Former middleweight world champion Hannah Rankin: "I'm going with a late KO for AJ. He's at Wembley where he's had brilliant success before, and I think he feels disrespected by Dubois and will want to put on a devastating performance. Dubois is durable and has youth on his side, but I feel the size and experience of AJ will play a big part in him eventually dominating to take the KO." English cruiserweight champion Viddal Riley: "I believe AJ will win by knockout in five rounds. It's going to be an explosive start but AJ is more refined with his technique. He will land the clean punches and get Dubois out of there early."

  Light-welterweight Ohara Davies: "It will go to points and be a draw. I see a 12-round scrap and I honestly can't pick between the two." Welterweight world champion Lauren Price: "It's a 50-50 fight. Both men can punch hard and have knockout power, but Dubois has been more active. Even though AJ is looking good under Ben Davison, he hasn't fought anyone to test him yet. But this will be the fight to bring the best out of him. If I had to pick a winner, I'd say AJ wins down to his experience." Middleweight Tyler Denny, who will fight on the undercard: "It's going to be a real fire-fight and Dubois is dangerous, but I believe Joshua will win. I don't see it going the distance." Two-weight world champion Terri Harper: "I must admit, I am a bit of a boxing casual and only ever really watch the big fights on TV, but I do think AJ will win."

