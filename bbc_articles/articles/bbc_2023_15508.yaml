  The BBC's Ione Wells conveys the atmosphere at Labour party conference ahead of Keir Starmer's speech.

  With Keir Starmer due to deliver his speech to Labour party conference in Liverpool, how does this event compare to previous years?

  The BBC's Ione Wells assesses the atmosphere at this year's Labour party conference, possibly their last conference before the next general election.
