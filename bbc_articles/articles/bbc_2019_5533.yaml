title: Will a trade deal end US-China rivalry? - BBC News
date: '2019-05-10'
section: General
url: http://www.bbc.co.uk/news/business-48205665
content: |-
  The US and China are trying to hammer out a trade deal. But will an agreement end their rivalry?

  Trade negotiators from China are in Washington to hammer out a deal between the world’s two largest economies.

  Both sides are keen to resolve the trade dispute as their economies are coming under increasing pressure.

  BBC Asia business correspondent Karishma Vaswani explains how we got here, and whether a trade deal will end the rivalry.
