title: Nazanin Zaghari-Ratcliffe says freedom should have happened six years ago -
  BBC News
date: '2022-03-21'
section: UK
url: http://www.bbc.co.uk/news/live/uk-60819859
content: |-
  The British-Iranian woman tells of the "very emotional moment" she was reunited with her husband and daughter.

  Morad 'should've come home with us'

  Nazanin says there were many moments when her hopes were dashed while awaiting her release from prison. "I felt like I was left behind," she says, adding that she fully understands what Morad Tahbaz is going through at the moment. "You can easily lose faith in everything" she says, and she herself had been through it at least twice over the course of six years. "It should not have happened to Morad" she says - or the other dual nationals still being held. "He should have come home with us."
