title: Lidl remove 'death trap' hedgehog huts from sale - BBC News
date: '2024-08-22'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c2edj7l3lymo
content: |-
  A hedgehog rescue charity claimed hedgehogs could become trapped in the huts and die

  Lidl has removed hedgehog huts from its stores after a hedgehog conservation group raised safety concerns about the product. The hedgehog huts are described as a "natural shelter for hedgehogs" and suitable for "feeding, shelter and nesting". But a hedgehog rescue charity claims that hedgehogs can freeze and become trapped in the hideouts. Lidl said it had been selling the product across Europe for a number of years "with no reported issues regarding safety".

  The exterior and interior of the hedgehog huts

  The hedgehog hideout is a small igloo shaped hut with a wire frame, with a layer of canvas and a wicker style exterior. A label on the product describes it as a "comfortable winter shelter" and "quiet housing protected from the wind". Andrea Cowan, who runs Loughgall hedgehog rescue in County Armagh, has rescued more than 500 hedgehogs in the past six years. After the huts appeared in the Lidl's popular "middle aisle" earlier this week, she raised her concerns with the store.

  Andrea Cowan from Loughgall hedgehog rescue called for Lidl to remove the huts from sale

  She described the huts as "shocking death traps" in a post on the rescue's Facebook page. , external "They serve no purpose as far as hedgehogs are concerned, in fact they are dangerous and sadly many hogs have perished because of them," she alleges. "They offer zero protection from the weather and in cases the hogs have frozen to death because damp inside has frozen their nesting material. "The metal cage inside has repeatedly trapped hedgehogs because their spines get caught leaving them to starve to death." Lidl said: "All products we sell comply with all EU and National Regulation."

  Speaking to BBC News NI Ms Cowan said that wildlife rescues have been trying to get products like this banned from sale and has called for more regulation. "There are no laws around products like this and people are free to make them," she said. "We've seen them for sale in other stores before and usually once we explain our concerns to management they usually remove them from sale."

  The hedgehog huts were on sale in Lidl's infamous 'middle aisle' earlier this week

  BBC News NI asked Lidl for a response to what was said in the Facebook post. A spokesperson for Lidl in Northern Ireland said the store had recently introduced the product across 41 stores in Northern Ireland. In a statement they said the product had "been sold in Lidl stores across Europe for several years and has proved exceptionally popular with customers, with no reported issues regarding safety. "Lidl takes animal welfare extremely seriously and all products we sell comply with all EU and National Regulation. Prior to being stocked by Lidl in any of its stores, this specific product was subject to stringent SGS testing to ensure all quality and compliance standards were met. "However, we take all feedback and concerns received regarding products on sale in our stores seriously, including feedback received about this product from a local hedgehog rescue organisation. As a precaution, we have removed the product from our stores in Northern Ireland this afternoon while we continue to seek expert advice on the matter."
