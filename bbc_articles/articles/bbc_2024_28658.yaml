title: 'England v Japan: Marcus Smith getting ''better and better'' - BBC Sport'
date: '2024-11-20'
section: Rugby Union
url: http://www.bbc.co.uk/sport/rugby-union/articles/cwy128ne54lo
content: |-
  Fly-half Marcus Smith is getting "better and better" at having a deeper understanding of Test rugby, says England assistant coach Andrew Strawbridge.

  Marcus Smith has nailed down his spot as England's starting fly-half this autumn

  Coverage: Listen to live commentary on BBC Radio 5 Sports Extra and BBC Sounds, follow live text commentary on the BBC Sport website and app

  Fly-half Marcus Smith is improving the way he dovetails with the rest of England's attack, says assistant coach Andrew Strawbridge. Smith, 25, has been one of England's standout performers in three Autumn Nations Series defeats against New Zealand, Australia and South Africa. However, despite Smith's creativity in attack and accuracy from the kicking tee, England are still on their worst run since 2018 after five straight defeats. "I have found Marcus really open to discussions about the game," Strawbridge told BBC Sport. "He is getting better and better at having a deeper understanding of the game and his role in it." Since his Premiership debut for Harlequins as an 18-year-old, regular eye-catching performances left many calling for Smith to be England's long-term option at fly-half. Now capped 38 times, he has started six Tests in a row for the first time since 2022, but five have resulted in defeats - four of which came down to the final play. England's opening try on Saturday against South Africa came when Smith opted against a drop-goal, darted to the blindside and set up Ollie Sleightholme for a run into the corner. Strawbridge says that England's attack allows for such improvisation, and is also confident Smith's game management is improving. "In some environments I have been in we put all the pressure on the 10 like a quarterback in American Football - they make all the decisions, the calls and the plays. That isn't the case here," he added. "We are spreading the decision-making and we are trying to sharpen that edge. Marcus' decisions are within that structure."

  Strawbridge joined England's coaching set-up on a full-time basis in April after spending four weeks in the camp as a consultant during the Six Nations

  The last time England lost five straight games was under Eddie Jones, who returns to his former employers on Sunday as Japan boss. Having defeated Jones' side - in their most recent victory by 35 points in June - England go in as heavy favourites to end their miserable run. "We have had growth this campaign," Strawbridge added. "I get people from the outside finding that hard to believe, but this is a further opptortunity for us consolidate some of our practices in seeing things and executing things. "This is a step, not a launching pad or a saving grace, in the development of a good, good Test team."
