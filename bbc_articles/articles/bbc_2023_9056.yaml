content: |-
  Jordan Thomson was also found taking coffee, washing detergent, vodka and meat from Worthing stores.

  A man has been caught on CCTV stealing 144 bars of chocolate from a shop.

  Jordan Thomson, 30, was also found taking coffee, washing detergent, vodka and meat from stores in Worthing, West Sussex, not long after he was released from prison for similar offences.

  Thomson pleaded guilty to all offences and was jailed for a total of 22 weeks.
