title: Cuba plane crash site 'very painful' scene - BBC News
date: '2018-05-19'
section: General
url: http://www.bbc.co.uk/news/world-44175554
content: |-
  More than 100 people have died in the crash near Havana but three women were pulled from the wreckage alive.

  More than 100 people have died after a Boeing 737 airliner crashed near Cuba's main airport in Havana.

  Three women survived the impact and subsequent fire, and are in a critical condition in hospital.
