title: Zahawi tax claims make his position 'untenable' - Labour - BBC News
date: '2023-01-21'
section: General
url: http://www.bbc.co.uk/news/uk-politics-64357735
content: |-
  Labour deputy leader Angela Rayner calls for Nadhim Zahawi to resign from government over tax claims.

  Deputy Labour leader Angela Rayner has called for Conservative Party chairman Nadhim Zahawi to resign from government, calling his position "untenable".

  It has been reported that the former chancellor paid a penalty to HMRC as part of a multi-million pound tax settlement.

  The ex-chancellor has been under pressure over claims he tried to avoid tax and has now had to pay it back.

  The BBC has approached Mr Zahawi for comment on the latest allegations.
