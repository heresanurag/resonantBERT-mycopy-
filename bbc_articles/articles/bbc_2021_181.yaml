content: |-
  Details and reaction to a briefing by Wales' chief medical officer and NHS Wales chief executive.

  The numbers of care home residents and staff testing positive for Covid-19 have hit their highest levels.

  There were 1,507 positive tests in care homes in Wales in the most recent week, a 78% rise on the week before.

  Across Wales, 37,026 residents and staff were tested by either the NHS or the Lighthouse laboratories the week beginning 4 January, according to Public Health Wales.

  Broken down, 6,466 care home residents were tested in the most recent week and 582 (9%) were positive in results from NHS laboratories.

  Also, 248 care home workers tested positive, with about 96% of tests negative.

  But there were another 677 positive test results from Lighthouse labs, which do not distinguish between residents and care home staff.

  All of these categories saw the highest numbers yet recorded.

  Residents and staff are supposed to be tested weekly at care homes in Wales.

  Care Home Inspectorate Wales also now publish separate figures around testing , which showed 137 care homes in Wales (13%) had notified one or more positive cases in staff or residents in the most recent week available and 31.8% within the last month.

  Swansea had 17 care homes which had notified at least one case in the week ending 1 January; Cardiff had 15 homes with at least one case and Bridgend was next with 13 care homes.
