title: 'Surrey: Sinkhole investigation delayed due to safety concerns - BBC News'
date: '2025-02-23'
section: Surrey
url: http://www.bbc.co.uk/news/articles/crkn4jlpkxdo
content: |-
  Tandridge District Council said its "priority" is to support affected residents and businesses.

  The sinkhole swallowed up a large part of a Surrey road

  Investigations into a sinkhole which swallowed a large part of a Surrey road have been delayed due to safety concerns, a council has said. Residents from 30 properties in High Street, Godstone, were told to evacuate in the early hours on Tuesday. Godstone Parish Council said investigations would continue next week to determine the cause of the sinkhole and to establish the full extent of the damage. It said the earliest expected date for stabilisation work to begin was 26 February and once the area was stabilised, a repair and reconstruction plan would be developed.

  Families had previously said they had been left "homeless" by the sinkhole and had "no idea" when they would be allowed home. Six families were allowed to return to their homes on Friday. CCTV cameras have been installed at the empty properties and an overnight security guard has been provided by Tandridge District Council (TDC).

  Tandridge District Council said updates would be shared as "soon as they become available"

  A spokesperson for Riverdale Developments, which built the new flats in William Way, said: "While we are not the current freeholder, we have contacted the managing agent to offer our support in reassuring residents. "Extensive ground investigations were carried out prior to commencement, and the development is on piled foundations to suit the ground conditions and was overseen by approved contractors in accordance with NHBC [National House Building Council] standards."

  TDC said it would offer tax relief to affected residents and businesses. It said some insurance companies had "refused" to provide accommodation and urged anyone having issues finding somewhere to stay to call the council. Council leader Catherine Sayer said providing support was a "priority", adding: "We are committed to helping the community during this challenging time." An information centre will open on St Nicholas Youth Centre from 14:00 to 16:00 GMT on Monday and Thursday. A public meeting is due to take place on Tuesday at 18:30 GMT at St Nicholas Youth Centre, Godstone.

