content: |-
  Charlotte City Councilman Tariq Bokhari shared video of Lake Lure, describing it as "post apocalyptic”.

  Videos reveal extensive damage in North Carolina in the aftermath of Hurricane Helene, which tore through the state causing catastrophic flooding.

  At least 30 people have died and scores more are unaccounted for in just one county.

  Charlotte City Councilman Tariq Bokhari shared footage of Lake Lure filled with debris, describing the scene as "post apocalyptic”.
