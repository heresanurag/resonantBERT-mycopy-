content: |-
  Kameel Ahmady escaped while appealing against a sentence for collaborating with a hostile country.

  This video can not be played To play this video you need to enable JavaScript in your browser. Kameel Ahmady travelled high over the mountains on foot to escape Iran's Revolutionary Guards

  A British-Iranian academic facing nine years in jail in Iran has told the BBC how he escaped on foot over mountains to start a new life in the UK.

  Kameel Ahmady was convicted two months ago of collaborating with a hostile government. He denies the charge.

  He decided to try to flee while on bail and appealing against the sentence.

  Mr Ahmady trekked over a mountainous border to escape the Revolutionary Guards - a journey he described as "very long, very dark and very scary".

  Mr Ahmady was born of Kurdish stock in western Iran. But his parents sent him to Britain when he was 18 for his education.

  He remained there many years, studying at the University of Kent and the London School of Economics. Such was his affection for Britain that he applied for British citizenship before returning to Iran as an anthropologist.

  His research focuses on child marriage and female genital mutilation (FGM) in Iran. This brought him to the attention of the authorities because he campaigned to raise the age at which girls can marry, which is currently set at 13 years old.

  Kameel Ahmady travelled high over the mountains on foot to escape Iran's Revolutionary Guards

  One morning in August 2019, a man came to his door in Tehran saying he was a postman. Mr Ahmady opened the door and 16 Revolutionary Guards stormed in. He was arrested and taken to the notorious Evin prison.

  Mr Ahmady said he had been targeted not just because he was a dual national, but also because Iran wanted to retaliate after Britain seized an Iranian oil tanker off Gibraltar that was suspected of breaking EU sanctions.

  "Being a dual national, you are always a potential case," he told the BBC.

  "My chief interrogator said, 'You're very delicious,' a) because I was Kurdish; b) I was coming from a Sunni religious background as opposed with the majority of the Shia in Iran; and c) I was a researcher who was digging up sensitive issues. And I wasn't only a simple researcher, I was actually acting on my research and using it for awareness raising."

  Kameel Ahmady decided to flee Tehran while out on bail and appealing against his sentence

  He spent three months at Evin prison where, he said, his interrogators played mind games with him.

  "They treated me, on a human level, well. But don't underestimate the concept and the seriousness of so-called 'white torture' - the psychological pressure they put on you. And all these games are played stage by stage, and they're very well trained as to how to put a little bit of extra pressure on you when it's needed."

  "There are all sorts of mind games, it's almost like a trade. You give me this, I'll give you that - a minute of a phone call needs all sorts of negotiation with your interrogators. Five minutes more extra fresh air than the half an hour that you're entitled to. And it is becoming really sad and petty because you want to be interrogated even more, not going back to the cell, which is almost like a grave."

  After three months he was released ahead of the trial but monitored closely.

