  Last December, Mr Ahmady was convicted of collaborating with a hostile government, something he denies, after prosecutors claimed that a charity he had once done some work for had once received some funding from the United States. He also faced various other charges, including promoting homosexuality in his research.

  He was sentenced to more than nine years in jail and given a fine of more than £500,000 ($683,000). But while out on bail, he decided to flee Iran.

  He said: "The appeal was overturned. That was the moment that I decided to escape because I couldn't see myself staying in prison for 10 years and watching my son from a distance growing up. By the time I would have been released - if I was released - my son would have been 15."

  So, without telling anyone but his immediate family, Mr Ahmady fled in secret, travelling over the mountains on foot to escape.

  "I just simply left. I packed my bag with a shaving kit, a few books of mine, and a laptop."

  "And warm clothes, because I knew I had to smuggle myself out of that train in the mountains. It was very cold, very long, very dark and very scary."

  "I had to leave behind everything I loved, I worked for, all my human connections. It was so sad and scary. If I got arrested, I would have been back before the judge, and God knows what other scenarios that would be.

  "It was a very hard and difficult decision. It was emotionally difficult. It was physically, mentally difficult. It was a move a made against my will. They pushed me out. And that was just so sad."

  Last September Mr Ahmady was accused of sexual misconduct towards female colleagues. The allegations were anonymous, and emerged shortly before his court hearing. But the Iranian Sociological Association revoked his membership. Mr Ahmady denied both the allegations and the suggestion they played a role in his decision to leave.

  Mr Ahmady said: "I find these allegations very upsetting. As I said at the time I take full responsibility for my actions and I find the sociological association's decision rushed and unfair. I do not accept any of these allegations. They are not related to the charges brought against me by the court which led me to escape, to restart my life in safety with my family."

  Mr Ahmady now faces an uncertain future in Britain, without a job.

  "I had to do what I needed to do. I couldn't stay and spend 10 years [in prison]. I can be much more useful outside and I have a responsibility towards my family."

  The question now is how Tehran might respond and what impact may be felt by other British-Iranian dual nationals.
