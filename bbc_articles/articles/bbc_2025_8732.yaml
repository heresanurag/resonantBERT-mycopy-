title: Starmer makes 'promise' migration will fall - BBC News
date: '2025-05-12'
section: General
url: http://www.bbc.co.uk/news/videos/clyg2dlxdw2o
content: |-
  The prime minister refused to set a cap on immigration but has promised it will fall “significantly”.

  Prime Minister Keir Starmer has promised migration to the UK will fall under his new rules, set out in a white paper.

  Starmer has promised to "tighten up" the immigration system, which he says is "broken".

  The plans include the introduction of English tests for all visa applicants and their adult dependants, and 10-year wait before migrants can apply to settle in the UK.

  The plans bring together months of research by officials and set out Labour's strategy to get tougher on migration.
