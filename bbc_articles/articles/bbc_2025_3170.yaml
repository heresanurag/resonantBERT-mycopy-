content: |-
  The Runcorn and Helsby MP saw his reputation shattered when footage emerged of a shocking assault.

  Mike Amesbury: 'He did some good but he must go'

  Mike Amesbury had his jail sentence suspended on appeal - but his political career appears to be as good as over

  That was the reaction from Frodsham residents to the violent CCTV footage that appears to have sunk the political career of Runcorn and Helsby MP Mike Amesbury. Many of the people who voted Amesbury into parliament last year - with a healthy majority of more than 14,000 - seem bewildered and appalled after his assault conviction for repeatedly punching 45-year-old Paul Fellows on a Frodsham street on 26 October last year. Some constituents expressed sympathy and surprise that Amesbury was initially sent to prison for a first offence after he had pleaded guilty to assault - but most agreed his political career should be over.

  The 55-year-old, who was suspended by the Labour Party in October, was described by several constituents as someone who had "done a lot of good" and who you could pass the time of day with. The vast majority of that goodwill though appears to have evaporated after they watched the true extent of the attack on Mr Fellows captured on CCTV and widely shared online.

  Dorothy and Bob Cummings say they were "astonished" at the video footage of the assault

  Married couple Bob and Dorothy Cummings, originally from Scotland, have lived in Frodsham for 16 years and said they had bumped into their MP in the town centre on several occasions. "We see him round town a lot, he seems like quite a nice guy", said Mr Cummings. "We see him in Costa Coffee a lot, he chats to people, yeah astonished." Ms Cummings added: "He's done a lot of good for Frodsham, for the area." They both agreed Amesbury's behaviour was "wrong", but said they felt the immediate 10-week prison sentence, handed down at Chester Magistrates' Court, was harsh and they welcomed Thursday's judgment to suspend the sentence on appeal. Mr Cummings said: "I just thought it was daft because they're releasing prisoners because there's no room in jails. "It was a first offence and it's highly unlikely he'll do it again."

  Nan Haworth says she is glad Amesbury's sentence was suspended but thinks he should probably step down

  Nan Haworth, another Frodsham constituent, was "horrified" by the video footage of the attack, but glad to see Amesbury released on appeal. "He really laid into him didn't he? - a second time and a third time," she said. "I was surprised because he's got a good reputation that guy... but I think he's got his just desserts." Asked if she would like to see Amesbury step down, she said: "Possibly, yes." Others across the constituency were less forgiving. Chris Howard, owner of the Curiosity Bookshop in Runcorn Old Town, also described Amesbury as having "done a lot of good". But he was appalled by the extent of Amesbury's violence in the early hours of the morning.

  Chris Howard said the assault could have ended much more seriously

  "To see anybody doing that would be a terrible thing," he said. "It was a sustained attack, it wasn't just a one off, he carried on and he had to be pulled off." Mr Howard highlighted the words of Chester's deputy chief magistrate Tan Ikram, who told Amesbury he had seen examples of punches to the head ending in fatality. "It could have easily gone a lot worse," Mr Howard said. "I can't see how he can carry on afterwards, not seeing what people have seen - it shouldn't be allowed that he carries on." Delivery driver Paul Rowlands, from the village of Mickle Trafford between Frodsham and Chester, said Amesbury's sentence being suspended on appeal was "not a fair result".

  Paul Rowland says if Amesbury stays in his position it could lead to "controversy dragging on"

  He said: "The video footage of him striking that man, I think, was quite disgusting for anybody, let alone an MP. "So I think it's a fair sentence and I think he should really carry out that sentence, especially with this the position he has." He called on Amesbury to step down immediately to avoid "controversy dragging on longer and longer". For Runcorn butcher Danny Shaw, Amesbury's behaviour meant there was no question of carrying on as the local MP. "He needs to stand down now," he said.

  Danny Shaw says trust has been lost after the assault

  Mr Shaw added: "I think we need to start afresh again because the thing is, now he's done what he's done and he is all over the news for what he has done." Amesbury was ordered to carry out 200 hours of unpaid work, undertake an alcohol monitoring programme, go on an anger management course, and carry out 20 days of rehabilitation work. Leaving Chester Crown Court on Thursday, he refused to answer questions from the waiting media about whether he would resign as an MP. But he said: "I'd like to reiterate that I sincerely apologise once again to Mr Fellows and his family. "I'm now going to go and see my family, and go home, and I'll give a statement at a later stage." As it stands, his constituents could get the power to force him out if they so choose. Any prison sentence, whether immediate or suspended, triggers a recall petition. If 10% of voters sign on the dotted line, then a by-election is triggered. There would be nothing to stop Amesbury standing in that election if he wished, as only prison sentences of more than 12 months result in disqualification from holding office. But for many constituents, that process should be unnecessary. Mr Shaw said: "I don't think there'll be any trust there at all, so I think the right thing would be to stand down now and let somebody else take over."

