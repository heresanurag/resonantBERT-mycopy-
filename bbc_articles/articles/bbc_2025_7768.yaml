title: Flamstead hawk finally captured after terrorising village - BBC News
date: '2025-04-03'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/clywdlyv4p3o
content: |-
  A resident says he was able to humanely catch the hawk, which has attacked an estimated 50 people.

  A falconer arrived to tame the hawk after the resident managed to trap it

  A Harris's hawk that has been repeatedly attacking villagers has been captured by a resident with the same name. Steve Harris, 40, told the BBC he had managed to humanely catch the hawk in his garden in Flamstead, Hertfordshire. The bird, which is believed to have escaped from captivity, swooped on an estimated 50 people in recent weeks, drawing blood from several victims. "It's a relief for us and the whole village," said Mr Harris, whose children had been unable to use the back garden after the hawk took up residence in one of their trees.

  Residents in the village initially reported being attacked by the bird early last month with a video showing the moment it swooped down on a man. Nearby Whipsnade Zoo confirmed the bird was not theirs, but said it would not be "actively hostile toward humans" unless it felt threatened. Royal Mail also confirmed postal deliveries had been disrupted by the bird as it continued to attack people. More recently an elderly man was treated in hospital when the hawk drew blood on his head. "Every morning, we wake up and see it up in the tree, getting braver and braver," Mr Harris continued. "I've been working from home watching it, thinking we've got to get this bird gone."

  Steve Harris (right) says it is "ironic" that he was the person to capture the Harris's hawk, which has been living in a tree in his garden

  Mr Harris said he acted spontaneously to capture the bird on Thursday morning. "It had been chasing me around the village when I went for a run, and when I got back it flew down to the top of my shed. "The falconer had left me a cage. I was using it to protect myself and I got brave enough when the bird was about a foot away, and I threw it over the top of it, trapping it. "I screamed out for the falconer to come and help, and he came and tamed it." Alan Greenhalgh, a falconer from the area, helped Mr Harris trap the bird and told BBC Radio 4's Today Programme he saw it "terrorising two or three people". "Steve came running out of his garden, 'Quick, quick, quick, I think I've got it'," he explained. "I ran into Steve's garden and the bird was having a go at him again... we managed to get hold of it before it got loose and luckily otherwise we would have been back to square one." Mr Greenhalgh theorised the bird was a young male and "hormonal", potentially being the reason behind the attacks. He added the bird was "as fat as a barrel" after villagers had attempted to catch it with food over the weeks. Fellow falconer Wayne is now caring for the hawk, which is a non-native South American species. Wayne, who declined to give his last name, said the hawk had been raised in captivity and the dried-out leather tags on its feet suggested "he's been loose for over a year".

