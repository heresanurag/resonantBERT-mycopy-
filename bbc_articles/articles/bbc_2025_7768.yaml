  Jim Hewitt was the man taken to hospital covered in blood after he felt a "smack" on the back of his head while walking to the shop. The 75-year-old said he was "delighted" the hawk had been caught, and had vowed: "I won't get beaten by a poxy bird." Mr Harris said the situation had started to become dangerous. "I got whacked over the head yesterday trying to get into my car... it was getting to the stage where it was attacking people with consistency."

  This video can not be played To play this video you need to enable JavaScript in your browser. Jim Hewitt was worried the hawk would attack a child

  Flamstead Parish Council thanked Mr Harris for his "quick thinking", which saw the bird "trapped quickly and safely". A spokesperson for Hertfordshire Police said that while police had not led the response to the attacks, a "low-level presence has been maintained in the area". "Rural specialist Special Chief Inspector Steve Meredith has been facilitating communication with expert agencies and local partners to try and bring the situation to a safe conclusion," the force said.

