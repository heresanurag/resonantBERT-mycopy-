id: bbc_2020_12732
title: 'US election 2020: A night of voting and results - BBC News'
date: '2020-11-04'
section: In Pictures
url: http://www.bbc.co.uk/news/in-pictures-54803440
content: |-
  The US is on course for its highest voter turnout in more than a century.

  People gather to watch the results in Times Square, New York

  Americans went to the polls on 3 November to elect the next US president.

  Republican President Donald Trump is up against Democratic challenger Joe Biden.

  About 100 millions voters had cast their ballots early.

  By the early hours of the morning both Mr Biden and Mr Trump told their supporters they were on course to win. The final result may take some time to emerge.

  Donald Trump addresses his supporters in the White House's East Room where he says he is winning and - with millions of legitimate ballots left to count - declares victory.

  In the early hours Biden, accompanied by his wife Jill, speaks to supporters in Wilmington, Delaware. He says: "We knew this was going to go long, but who knew we would go into maybe tomorrow morning, maybe even longer!"

  Here are pictures from the election day and a night of results.

  With a tight race in key states, the candidates need 270 electoral college votes to secure the presidency.

  Donald Trump, 74, is seeking to avoid becoming the first incumbent president to lose a re-election fight since George HW Bush in 1992.

  On Tuesday, President Donald Trump visits his campaign headquarters in Arlington, Virginia

  Joe Biden visits The Warehouse, a support organisation for teenagers, on election day in Wilmington, Delaware

  With a rise in gun sales in the run-up to election day following a bitter campaign, there were fears of violence and disruption on Tuesday.

  But there have been only a few reported incidents of run-ins at polling stations or in the streets.

  Voters cast their ballots at the Cross Insurance Center polling location in Bangor, Maine

  In Chicago, a man told police that a group of people attacked his car with baseball bats near a polling station, the New York Times reports.

  And in Charlotte, North Carolina, an armed man wearing a Trump hat was arrested after he reportedly intimidated people at a rally.

  Voters deliver their sealed mail-in ballots in green envelopes at David Crockett Elementary School in Phoenix, Arizona

  Artist Dababy shows off his shoes at a polling location in Charlotte, North Carolina

  Overall, most Americans went out to vote peacefully - and of course millions stayed home after voting early. The highest turnout in more than a century is expected.

  A voter fills out his ballot in Vancouver, Washington

  The FBI is investigating a series of automated calls spreading misinformation.

  Dana Nessel, the Michigan attorney-general, said she had received reports of robocalls trying to trick people into staying home on election day.

  A voter shows off her "I Voted" sticker in a polling place at the Weisman Art Museum in Minneapolis, Minnesota

  A voter drops off her ballot in Rollinsville, Colorado

  A woman wears a Black Voters Matter mask while welcoming voters outside of a polling place at the Hadley Park Community Center in Nashville, Tennessee

  A poll worker waves a flag to get the attention of a waiting voter in San Diego, California

  The Fearless Girl statue is given an "I'm a Future Voter" sticker outside the New York Stock Exchange in Manhattan, New York City

  A poll worker works behind protective plexiglass at downtown Summerlin in Las Vegas, Nevada

  Election workers open ballots at the Palm Beach County Elections Office in West Palm Beach, Florida

  People watch early results on television as they gather at Black Lives Matter Plaza near the White House in Washington

  People watch early results come in from Pennsylvania in downtown Brooklyn, New York
