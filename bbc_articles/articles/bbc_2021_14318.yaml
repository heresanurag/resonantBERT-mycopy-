title: 'Bobbi-Anne McLeod: Man in court charged with murder - BBC News'
date: '2021-11-26'
section: Devon
url: http://www.bbc.co.uk/news/uk-england-devon-59427722
content: |-
  Cody Ackland, 24, from Plymouth, appeared in court charged with the murder of the 18-year-old.

  The 18-year-old was reported missing on Saturday after she failed to meet friends in the city

  A man has appeared in court charged with the murder of Bobbi-Anne McLeod, who disappeared in Plymouth.

  The 18-year-old was reported missing on Saturday after she failed to meet friends in the city.

  A woman's body, which has not been formally identified, was found at Bovisand, south of the city on Tuesday.

  Cody Ackland, 24, of Southway, Plymouth, was remanded in custody to appear at Plymouth Crown Court on 29 November.

  Cody Ackland confirmed his name, age and address at Plymouth Magistrates' Court

  Mr Ackland, wearing a Covid-19 mask, grey sweater and jogging bottoms, spoke only to confirm his name, age and address in a two-minute-long hearing.

  Ms McLeod left her home in Leigham at about 18:00 GMT on Saturday and was last seen waiting at a bus stop close to her house.

  A candlelit vigil was held by the local community at the site of the bus stop in Plymouth where Ms McLeod was last seen

  Hundreds of people gathered by the spot she was last seen to hold a candlelit vigil in her memory on Thursday.

  A bank of flowers dotted with candles has been laid by local residents over the past few days.

  A vigil was held on Plymouth Hoe on Friday evening

  Ms McLeod's family are being supported by specialist officers, said police.

  On Friday evening, a vigil was held for Ms McLeod at Smeaton's Tower on Plymouth Hoe.

  The structure was lit up purple on Wednesday in tribute to her.

  Attending the vigil, Plymouth University student Maisy Walker, 20, said: "It was quite overwhelming and it was nice to see so many men here as well and young people."

