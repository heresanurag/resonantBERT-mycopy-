id: bbc_2020_11238
title: Europe's streets empty... again - BBC News
date: '2020-10-25'
section: General
url: http://www.bbc.co.uk/news/world-europe-54681420
content: |-
  With infections rising across Europe, tighter Covid restrictions are being enforced.

  Many countries have introduced a night-time curfew to try to curb the spread of the disease, meaning places usually filled with people are empty.
