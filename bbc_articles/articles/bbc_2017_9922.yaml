title: Koala survives 16km ride on car axle in Adelaide, Australia - BBC News
date: '2017-09-16'
section: Australia
url: http://www.bbc.co.uk/news/world-australia-41293163
content: |-
  The female is released into the wild after recovering from the traumatising journey.

