title: 'Levi Fishlock: Man gets joint-longest sentence for summer riots - BBC News'
date: '2024-12-12'
section: South Yorkshire
url: http://www.bbc.co.uk/news/articles/c878p3l93rqo
content: |-
  Levi Fishlock and others spread "a hateful message of violence and racism", a court hears.

  Levi Fishlock was part of a mob which attacked a hotel housing about 200 asylum seekers

  A man who tried to set fire to a hotel housing asylum seekers has been jailed for nine years, the joint-longest prison sentence in connection with the UK's summer of riots. Levi Fishlock smashed windows and stoked a flaming bin at the Holiday Inn Express in Manvers, Rotherham, during a spate of disorder on 4 August. Fishlock, 31, of Sheffield Road, Barnsley, initially denied violent disorder and arson with intent to endanger life but later pleaded guilty to the charges. Jailing him, the Recorder of Sheffield, Judge Jeremy Richardson KC, said: "This is one of the worst cases of its kind stemming from the Rotherham disorder."

  Fishlock's sentence, which also includes a five-year licence period after he is released from jail, is the same as that of Thomas Birley, who was also part of the 400-strong crowd, some of whom attempted to torch the hotel in South Yorkshire. Large-scale disorder saw more than 60 police officers injured as rioters, many armed with weapons, circled the hotel. During the violence, security staff and people inside the hotel were told by police to hide in bedrooms and lock the doors to protect themselves. The two-day sentencing hearing at Sheffield Crown Court was told Fishlock had been wearing "a very identifiable" purple T-shirt as he smashed the hotel's windows by throwing bricks and broken paving slabs. Fishlock, whose shirt bore the name Bellingham and the number 10 on the back, told arresting officers that throwing missiles and stoking the fire was for a "good cause" despite about 200 asylum seekers plus hotel staff being trapped in the besieged building.

