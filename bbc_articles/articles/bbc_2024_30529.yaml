  He also used fencing slats and metal poles "as weapons against officers" and was seen "smashing up" an air conditioning unit outside the hotel. Fishlock also grasped a "sharp-edged object" while making threatening gestures towards those in the hotel as well as setting fire to makeshift barricades, the court heard. Alisha Kaye, prosecuting, said: "In his pre-sentencing report he stated he just came upon the incident and had no intention to go there deliberately. "It's remarkable coincidence that he was wearing an England shirt. He is deliberately tapping his England badge [on footage]."

  Fishlock, in a purple England shirt, smashed the hotel's windows by throwing bricks and paving slabs

  Father-of-one Fishlock had no previous convictions but was reprimanded in 2007 for violent disorder and given a caution in 2010 for assault occasioning actual bodily harm. Judge Richardson told him: "You were a prominent participant. You played a part in almost every aspect of the racist mob violence on that terrible day in August in Rotherham. "You and many like you were intent on spreading a hateful message of violence and racism. "From first to last, the venom of racism infected the entirety of what occurred." Benn Robinson, mitigating, told the court Fishlock had a "problematic relationship with drugs in various junctures of his life" following his brother's death in his teenage years. He said his client struggled with anxiety and depression and had, upon reflection, felt "genuine shame and remorse" over his conduct in Manvers.

  Pictures taken the morning after the disorder at the hotel show smashed windows which had showered glass in the hotel's dining room

  BBC research suggests that Fishlock is the 80th person sentenced for their part in the trouble in and around the hotel. Chris Hartley, from the Crown Prosecution Service, said Fishlock's prominent part in the riot "terrified the residents and staff of the hotel and caused significant amounts of physical damage." He said: "Highly experienced police officers described the disorder as the worst they had ever seen in their careers. "The violence had left them in fear for their lives." Mr Hartley said the tough sentence imposed should "serve as a lesson for anyone considering taking part in this type of disorder in future."

