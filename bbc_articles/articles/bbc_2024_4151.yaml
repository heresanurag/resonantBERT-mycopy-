title: Diane Abbott stands to catch Speaker's attention 46 times - BBC News
date: '2024-03-13'
section: General
url: http://www.bbc.co.uk/news/uk-politics-68558133
content: |-
  A spokesperson for the Speaker said he "ran out of time" to call the MP during PMQs.

  Veteran MP Diane Abbott stood up to catch the Speaker's eye 46 times during a PMQs dominated by a debate about racist comments.

  Alleged comments by a Tory donor that Ms Abbott made him "want to hate all black women" dominated the session on Wednesday.

  Despite standing many times to ask a question of the prime minister, she was not selected to do so.

  A spokesperson for the Speaker said he "ran out of time" to call Ms Abbott.

