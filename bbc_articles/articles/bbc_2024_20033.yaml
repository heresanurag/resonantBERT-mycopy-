title: Katie Price to face bankruptcies questions in private - BBC News
date: '2024-08-27'
section: England
url: http://www.bbc.co.uk/news/articles/cm2n8r8xdp9o
content: |-
  The former model is scheduled to appear at a private interview about her finances next month.

  Katie Price was previously arrested at Heathrow Airport after failing to attend a court hearing

  A hearing in which Katie Price was due to be questioned over her bankruptcies has been adjourned so she can attend a "private interview" instead. The former glamour model, 46, had been due to face questions in court from barristers after being warned by a judge that she must attend with "no ifs or buts". She was arrested at Heathrow Airport earlier this month after failing to attend a previous hearing relating to her finances. But a judge agreed to adjourn the public hearing on Tuesday, with a private interview scheduled for 24 September.

  At the Insolvencies and Companies Court after the arrest, on 9 August, Judge Daniel Schaffer told Ms Price she would be "brought back into custody" if she did not attend Tuesday's hearing. Ms Price arrived in a black cab, wearing all black and sunglasses, at the specialist court at the Rolls Building in London.

  Ms Price did not speak to reporters as she arrived at court on Tuesday

  Bertie Boer-Roberts, representing the media personality, told the court: “We are asking the court to adjourn the examination generally.” “The general purpose is to permit Price to attend a private interview with the trustee and then to continue to engage constructively," he said. Mr Boer-Roberts added that Ms Price's "mental wellbeing and privacy” could be impacted by a public hearing, and that her health conditions “would be exacerbated by public examination of her financial affairs”.

  Ms Price has been declared bankrupt twice

  He said she would be able to "give more answers" in a private interview "where there was no pressure from the media". Ms Price agreed to attend the private hearing next month. As she left the court on Tuesday, she told journalists: “I hope you reporters write a good story today, won’t you", before she criticised their work and called them "scumbags".

  Katie Price's former husband Alex Reid attending the hearing on Tuesday

  She was first declared bankrupt in 2019 and then again in March this year because of a tax debt worth more than £750,000. Last week, a judge ruled that her TikTok income would be suspended as part of efforts to pay off money Ms Price owes. Ms Price has previously been ordered to pay 40% of her monthly income from adult entertainment website OnlyFans to the trustee of her bankruptcies for the next three years. Her ex-husband Alex Reid, who is one of the people she owes money to, was also at the hearing.
