id: bbc_2019_1946
title: 'Moorland blaze: Fire crews tackle huge blaze near Marsden - BBC News'
date: '2019-02-27'
section: General
url: http://www.bbc.co.uk/news/uk-england-leeds-47381120
content: |-
  The blaze, near Marsden on the outskirts of Huddersfield, can be seen for miles around.

  Emergency crews are dealing with a moorland fire in West Yorkshire.

  The blaze is near Marsden, started at about 19:30 GMT on Tuesday.

  Five fire engines from West Yorkshire and two from Greater Manchester have been sent to the scene.
