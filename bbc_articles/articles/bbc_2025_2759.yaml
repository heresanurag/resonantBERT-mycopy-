title: Safety warning issued over Red Sea dive boat trips - BBC News
date: '2025-02-06'
section: Politics
url: http://www.bbc.co.uk/news/articles/c863dqv97eqo
content: |-
  It comes after 16 accidents involving liveaboard dive boats in the Red Sea in the last five years, UK investigators say.

  A file photo of the Sea Story yacht, which sank in the Red Sea in November

  Britons are being warned "to book through reputable vendors only" when planning trips on Egyptian liveaboard dive boats in the Red Sea, due to safety concerns. Sixteen incidents involving liveaboard vessels operating in the area have occurred in the last five years, UK investigators said, with a number resulting in deaths. A Marine Accident Investigation Branch (MAIB) report published on Thursday found boats were "poorly constructed" and essential lifesaving equipment was "defective, out-of-date for service and, in some cases, missing". It comes after a BBC investigation heard accusations of safety failings on the Sea Story, an Egyptian dive boat that sank in the Red Sea last November.

  Up to 11 people died or are still missing, including two Britons, Jenny Cawson and Tarig Sinada from Devon. Liveaboard boats are vessels equipped with living facilities on board allowing passengers to stay overnight or for extended trips. At the time of the Sea Story incident, Egyptian authorities attributed the disaster to a huge wave of up to 4m (13ft). However, survivors and family members have since raised concerns over alleged safety failings on board. These claims have been supported by a leading oceanographer, who told the BBC weather data from the time suggests a wave could not have been responsible, and that a combination of crew error and failings in the boat were the likely cause. One survivor said there had been a lack of functioning emergency equipment, making evacuation difficult when the vessel started taking on water. Witnesses also claimed that the Sea Story boat had undergone structural modifications that may have compromised its seaworthiness. Egyptian authorities launched an investigation into the disaster but the findings are yet to be publicly released. The BBC previously contacted the company that ran the boat trip for comment but received no response. As well as the Sea Story incident, the MAIB report also referenced the dive boat Carlton Queen, which capsized and foundered in April 2023 with 33 people on board - all were rescued but many were injured, including UK nationals. The report also looked at a fire on the dive boat Hurricane in June 2023. Three British passengers died in the incident. Chief Inspector of Marine Accidents, Andrew Moll, said the MAIB was aware of 16 incidents in the area in the last five years and it was "deeply regrettable that a number of these accidents have resulted in the loss of life". That number included three liveaboard dive boats lost in the last 20 months that resulted in numerous deaths, including some UK nationals, investigators added. Mr Moll said: "While MAIB does not have the jurisdiction to investigate accidents involving non-UK flagged vessels operating within the territorial waters of another coastal state, we have made the appropriate authorities aware of our national interest and offered every assistance with any safety investigation they conduct. "It is important to remember that such vessels are unlikely to be built, maintained, equipped, and operated to the standard of similar vessels in the UK and we urge the exercise of extreme caution when choosing a boat." Other safety issues identified by the MAIB included emergency escape routes being unmarked, via lockable doors and with no emergency lighting. Investigators also found that safety briefings to passengers "were of a poor standard or not conducted at all and crews appeared poorly trained and were unfamiliar with their vessels". As part of safety recommendations, the MAIB told potential passengers to ensure they request a thorough safety briefing from the crew when arriving on liveaboard vessels, before departure.
