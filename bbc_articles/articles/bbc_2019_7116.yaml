content: |-
  From Marilyn Monroe to Nelson Mandela - who else has visited Shannon Airport?

  From Marilyn Monroe to Nelson Mandela, some big names have graced the tarmac of Shannon Airport over the years.

  As Donald Trump makes his first visit as US president, we look back at some of the other famous faces who have visited the airport in County Clare.
