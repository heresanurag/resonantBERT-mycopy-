content: |-
  SpaceX has launched a capsule designed to carry people from the Kennedy Space Center in Florida.

  The SpaceX company has launched a capsule designed to carry people from the Kennedy Space Center in Florida.

  SpaceX founder Elon Musk said this could be a step towards opening space travel to commercial customers.
