title: '''Marauding predator'' Jake Killick jailed for sex attacks - BBC News'
date: '2018-03-16'
section: General
url: http://www.bbc.co.uk/news/uk-england-norfolk-43437942
content: |-
  The 23-year-old was convicted of rape, sexual assault, false imprisonment and robbery.

  A man has been jailed for life with a minimum term of 12 years after repeatedly raping an 18-year-old woman on a three-hour crime spree in Norwich.

  Jake Killick, 23, also carried out three further sexual assaults and three robberies and was also charged with false imprisonment.

  Sentencing, Judge Stephen Holt said Killick was a "high risk of serious harm to the public."
