content: |-
  New queens prepare to land on Drag Race UK runway

  RuPaul's Drag Race UK is revving its engine again. The hit series is set for another rhinestone-covered ride to find the country's next drag superstar. They'll be joined by guests as 12 new queens compete in challenges - from dancing, live comedy and sewing to the show's famous lip sync battle performances.

  But many racing to be top of the class of 2024 already have thousands of miles on the clock. The cast is telling BBC Newsbeat about starting life as far from Drag Race's runway as Australia, the Caribbean and off Scotland's west coast on the Isle of Bute.

  "Even Glastonbury's bigger than my island," says Rileasa Slaves, who is originally from St Lucia and lives in London. "I only recently found out that there's even drag back home. When I left, that wasn't even a thing."

  As for choosing her drag name, Rileasa says she wanted to reference historical enslavement of Caribbean people by the British and some other European countries. "I love it because it's all about bringing up discussion," says the 32-year-old. "It's about shedding light on a part of history. It's in my ancestry, it's all tied in. "I think it's a very important conversation. "I'm happy to represent my island and my Caribbean flavour is seasoned throughout my entire persona."

  All UK nations are represented in a cast that includes queens whose careers have taken them around the world. "I was born in Australia but my parents are originally from the Philippines," says Saki Yew, who now lives in Manchester. "There's a UK influence too. My background is like a little melting pot, a Frankenstein of drag." It's proof, Saki says, that it's possible to take your own route to RuPaul's world-famous runway. "It's a really strong, fierce cast and I think people are going to be very surprised by us."

  The cast, including Saki Yew, were asked to showcase 'Bond girl villain' looks for their photoshoot

  The Drag Race brand has spread across the world since its 2009 US debut, sparking numerous international series and spin-offs. One of the original version's stars Jinkx Monsoon appeared in Doctor Who playing villain Maestro opposite Ncuti Gatwa's Doctor. In the UK, 2023 winner Ginger Johnson has since premiered a show at the Edinburgh Festival Fringe and toured the country. Danny Beard followed snatching series 4's crown by presenting shows on BBC Radio 1. But this year, being on stage in Edinburgh is already on one queen's CV - even if big audiences weren't always there to see her. "I've performed to a room of three people," says 25-year-old Chanel O’Conor. "I've been someone who's failed disastrously on stage. "It makes you a better person and performer and when you go on Drag Race, you can roll with the punches."

  Chanel O'Conor grew up on the Isle of Bute before learning more about drag in Edinburgh, Glasgow and Manchester

  Chanel grew up on the Isle of Bute where she says its population of under 6,500 offered little drag inspiration. But her place on Drag Race UK's starting grid is getting attention at home. "A ferry service has decided to rename itself in honour of drag queens and its name is Foghorn Fanny," she says. "So far the only drag queens [from Bute] are Chanel O'Conor and Foghorn Fanny." Inspiring such a renaming is likely to be unique to Chanel this series but she's confident everyone will enjoy the ride ahead. "I'm so proud to be part of Drag Race. It's so diverse and we have so many amazing skills, talents, looks, everything," she says. "Series six is fresh and I can't wait for the world to see it. "And all the people on the ferry. I'm sure they'll be watching."

  The new series of RuPaul’s Drag Race UK premieres on BBC iPlayer on Thursday 26th September at 8pm.

