title: 'Bologna crash: Tanker truck fireball kills two and injures dozens - BBC News'
date: '2018-08-06'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-45087884
content: |-
  Dozens more are injured as a truck collides with a lorry on a motorway bridge, triggering an explosion.

  This video can not be played To play this video you need to enable JavaScript in your browser. The collision happened on the outskirts of the northern city of Bologna

  A tanker and a lorry have collided on a motorway on the outskirts of the northern Italian city of Bologna, causing a major fire and explosion.

  Images released by police show the tanker ploughing into the back of the lorry that had come to a stop in motorway traffic.

  They then caught fire, triggering a huge fireball, and the bridge they were on partly collapsed.

  Two people have died and more than 60 have been injured, Italian media say.

