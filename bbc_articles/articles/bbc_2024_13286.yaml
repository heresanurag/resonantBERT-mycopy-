content: |-
  The club's founder says the group, formed in 1983, is closing due to a lack of new members.

  Vintage cycle club closes after more than 40 years

  The March Veteran and Vintage Cycle Club at its height had 90 members nationwide

  A specialist cycling club that ran for more than 40 years and at its height had 90 members nationwide has been forced to close. The March Veteran and Vintage Cycle Club was formed in 1983 in March, Cambridgeshire. The club's founder, Colin Bedford, 87, said membership had dwindled over the past few years. "[The club] thrived for many years, but nowadays younger people are just not interested," he said.

  "I am really sad about it - it was my baby," said Mr Bedford. "I have always loved cycling and when I bought a garage business in March town centre in 1962, I found the previous owner had left around 25 old bikes on the premises which he didn't want, so that started a passion for collecting them. "We were thriving and even had members in Scotland. We did displays at fêtes [and] country shows, and were booked by the Tour de France as a warm up to the races. "I have enjoyed every minute of it, we have met so many great people, made new friends, it has been wonderful," he added.

  The club opened on Broad Street in March, Cambridgeshire, in 1983

  "We only have four members left who can still ride a bike, so we can't do displays with so few people. "The youngsters today are more interested in social media, computers and smart phones, we just can't seem to get them excited about it," Mr Bedford said.

  "The Peterborough Vintage Cycle Club ceased last October - they started in 1953," said Mr Bedford. "We experienced the same thing as them, declining numbers and youngsters not wanting to get involved."

  Mr Bedford said he had no plans to sell his large collection of vintage cycles and wanted to "carry on collecting". "I will continue giving talks and doing displays just by myself," he said. "I have been booked by the family of a lady turning 100 in July, and I will dress in period costume and take a vintage bike along to show her."
