content: |-
  The chancellor is defending his tax rises and spending cuts in front of the Commons Treasury Committee.

  'We have to be honest that things may change in the wrong direction'

  Hunt is then asked by Danny Kruger how confident he is that energy prices will go down - a contingent part of meeting the loosened fiscal rules announced in the Autumn Statement. He announced last week that underlying debt must fall as a percentage of GDP within five years, instead of three, and that public sector borrowing must be below 3% of GDP. The chancellor tells the committee that to be sensible, there needs to be "a central scenario based on our best guess of what's going to happen to energy prices" and to produce a set of accounts based on that but also recognise that when it comes to next year's Budget and Autumn Statement, "these things may change". On what might happen if there's less money than expected in the spring, he says it's not helpful to speculate on what might happen or what might go wrong. "I think you have to be honest with people and say the situation might change and our response might have to change, but on the basis of the facts now, I think we have a good plan, the right plan that brings down inflation, shows we can balance the books and repay our debts," Hunt says.
