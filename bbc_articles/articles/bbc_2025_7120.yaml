  Departures from Gatwick Airport were an average of more than 23 minutes behind schedule in 2024.

  Departures from Gatwick Airport were an average of more than 23 minutes behind schedule in 2024

  Gatwick has retained its position as the UK's worst airport for flight delays, as it continues to suffer from air traffic control (ATC) disruption, data shows. Departures from the West Sussex airport, which mainly serves London, were an average of more than 23 minutes behind schedule in 2024, according to Civil Aviation Authority (CAA) data. This is an improvement from the more than 27 minutes during the previous 12 months - but is still longer than at any other UK airport. A Gatwick Airport spokesperson said: "Air traffic control restrictions in other parts of Europe have continued to impact the airport. Together with our airlines, we've put in place a robust plan... to improve on-time performance further in 2025."

  Gatwick, which is the UK's second busiest airport, was badly affected by ATC staff shortages across continental Europe in 2024, suffering the same issue in its own control tower. Flights from Stansted Airport had the second poorest punctuality record last year, with an average delay of more than 20 minutes, while in third place was Manchester Airport with a similar average delay time.

  Gatwick has been affected by ATC staff shortages in continental Europe and its own control tower

  Belfast City Airport recorded the best punctuality performance in the UK for the second year in a row, with an average delay per flight of under 12 minutes. Depending on the distance of the route and length of delay, passengers booked on flights from UK airports which are running behind schedule may be entitled to compensation. However, ATC issues are considered to be an "extraordinary circumstance", meaning affected passengers are not entitled to compensation.

  The Gatwick spokesperson said the airport was "the world's most efficient single-runway airport, with flights departing or arriving every 55 seconds". Transport Secretary Heidi Alexander said in February that she was prepared to support Gatwick's expansion plan to bring its emergency runway into routine use, if the project is adjusted. The airport has until Thursday to respond. A Manchester Airport spokesperson says it is "committed to doing everything in our power to support all our carriers to achieve the best possible on-time departure rates". The 10 worst UK airports on average for delays are:
