title: 'San Francisco: Two-storey houseboat towed through bay - BBC News'
date: '2024-04-11'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68778690
content: |-
  The unusual sight - complete with a white picket fence - was seen passing through the bay.

  A two-storey houseboat - complete with a white picket fence - was towed through San Francisco Bay after the owners were asked to leave Redwood City marina. The floating home took the precarious journey across the bay to San Rafael.

  According to local news outlets, Redwood City council told people living in houseboats in the marina to leave because the boats were blocking public access to a state waterway. As part of an ongoing legal battle, the council offered compensation for the move.
