title: 'Watch: Video appears to show Russian tanker sinking - BBC News'
date: '2024-12-15'
section: General
url: http://www.bbc.co.uk/news/videos/c3vrd9565k2o
content: |-
  At least one crew member was reportedly killed and footage showed an oil spill amid a heavy storm

  Footage released by Russia's Southern Transport Prosecutor's Office shows a Russian oil tanker broken in half and sinking amid a heavy storm, with streaks of oil visible in the water.

  The Ship is one of two Russian vessels with 29 crew members on board which have been heavily damaged in the Black Sea authorities in Russia have said.

  At least one crew member was reportedly killed. The second ship was said to have drifted after sustaining damage.

  The incident took place in the Kerch Strait, which separates Russia from Crimea - the Ukrainian peninsula illegally annexed by Moscow in 2014.

  Read more: Two Russian oil tankers wrecked in Black Sea
