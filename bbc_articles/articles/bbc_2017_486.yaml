content: |-
  A man has been sentenced to life in prison for a hammer attack on police in Crawley, captured on bodycam.

  A man has been sentenced to life in prison for a hammer attack on two police officers in Crawley, captured on bodycam.

  Two tasers failed to contain Jamshid Piruz, 34, who was hiding in a bin area. One of the officers received minor injuries to his neck.
