  He said: "I would like you to know how very sorry I am for my part in the accident".

  Prince Philip said he had used the crossing many times and was aware of the "amount of traffic that uses that main road".

  He said it was a bright sunny day and at about three in the afternoon, the sun was low.

  "In other words, the sun was shining low over the main road. In normal conditions I would have no difficulty in seeing traffic coming... but I can only imagine that I failed to see the car coming, and I am very contrite about the consequences," he wrote.

  He added: "I was somewhat shaken after the accident, but I was greatly relieved that none of you were seriously injured."

  The duke said a crowd began to gather and he had been advised to return to Sandringham by a local police officer.

  Prince Philip was spotted driving a replacement Land Rover two days after the crash

  Mother-of-two Ms Fairweather, from King's Lynn, told the Sunday Mirror: "I thought it was really nice that he signed off as 'Philip' and not the formal title. I was pleasantly surprised because of the personalised nature."

  The paper reported Buckingham Palace has confirmed the letter is genuine and it is understood a similar note was sent to the driver of the Kia.

  The Duke of Edinburgh, who took delivery of a replacement Land Rover after the crash, was later reportedly spoken to by police after being pictured driving without a seat belt two days after the crash.
