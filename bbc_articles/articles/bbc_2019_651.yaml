title: Prince Philip 'deeply sorry' after Sandringham car crash - BBC News
date: '2019-01-27'
section: UK
url: http://www.bbc.co.uk/news/uk-47017855
content: |-
  Prince Philip wishes a passenger a "speedy recovery" in a note after an accident near Sandringham.

  The Duke of Edinburgh has written to a woman injured in a car crash he was involved in near Sandringham in Norfolk to say that he is "deeply sorry".

  Prince Philip wished Emma Fairweather a "speedy recovery", adding that he was "somewhat shaken after the accident".

  The 97-year-old suggested he did not see the car she was a passenger in on 17 January because of bright sun.

  His Land Rover Freelander collided with a Kia driven by Ms Fairweather's friend after he pulled out of a driveway.

  The duke's vehicle flipped over in the crash, which took place on the A149 near the Queen's country estate, and he was helped out by a passing motorist.

  The other car involved was also carrying a nine-month-old baby boy, and his mother who was driving.

  The crash took place on an A-road near the Queen's Sandringham estate

  Ms Fairweather, 46, who broke her wrist, described the letter from the duke, dated 21 January, as a "nice touch".

  She had previously complained of a lack of direct communication from Prince Philip, saying she had only been contacted by a police family liaison officer and one of the Queen's ladies-in-waiting.

  In the note on Sandringham House headed paper, which has been reproduced in the Sunday Mirror, the Duke acknowledged her "very distressing experience".

