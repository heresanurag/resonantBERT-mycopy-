  Newsreader fears for the mental health of children

  Home schooling is causing stress in millions of homes across the UK. BBC newsreader Kate Silverton, who is also a trainee child psychotherapist and a mother-of-two, has like most parents found lockdown a very challenging time. "Home schooling may have been a success for some but in my overall experience - and that of the parents I have spoken to - those successes have been few and far between," she writes. "Whether at the school gates, or in the counselling arena, mums and dads tell me they cannot cope. I would go so far to say that anyone who thinks working and schooling young children from home has been a success is sadly ill-informed." "My husband and I have tried to make the memories of this time more joyful and positive. So we camped in our (courtyard) garden and have had more late nights, cuddled up watching movies than we would have done previously. However, it has inevitably been a very demanding time for everyone. "When people ask how I am doing, I often joke that I am "surviving not thriving". When the work calls start, it is very hard to be there for our children." Read the full story.
