title: 'Eurovision: Remember Monday singer says she''s lost wedding ring after contest
  - BBC News'
date: '2025-05-19'
section: Culture
url: http://www.bbc.co.uk/news/articles/cjdzx5v21ldo
content: |-
  Singer Holly-Anne Hull revealed the loss in a video shared from a plane the morning after the contest.

  Holly-Anne Hull (right) said in a video posted the day after Eurovision that she had lost her wedding ring

  A member of the UK's Eurovision entry Remember Monday said she lost her wedding ring in a video posted the morning after their Basel performance. "I've lost my wedding ring and my engagement ring," Holly-Anne Hull said in footage posted on Instagram on Sunday. In the clip, the singer and her two bandmates are sitting on a plane, seemingly leaving Switzerland. Hull did not give further details, such as where she might have lost the ring or when it happened. The country-pop trio came 19th of the 26 countries in this year's Eurovision Song Contest with their track What The Hell Just Happened.

  Hull got married in Surrey in June 2023. In the video posted on Instagram the group parodied the lyrical style of their entry - which tells the tale of the morning after a big night out - saying they are still wearing "last night's hair gel" and their knees hurt, before Hull jokes: "I'm gonna have a breakdown 'cause I've lost my wedding ring." Lauren Byrne adds the trio are "so grateful" for their supporters and Charlotte Steele says their fans are "amazing".
  • None Eurovision: 'What the Hell Just Happened' to the UK entry?

  Remember Monday got 88 points on Saturday night, all of which were from the jury - like last year's entrant Olly Alexander, the band received no points from the public vote. Austrian singer JJ won the competition with his electro-ballad Wasted Love, with a total of 436 votes, after beating Israel at the last minute. Estonia came third, followed by Sweden, which had been the frontrunner going into Saturday night. The country's entrant, comedy troupe KAJ, performed Bara Bada Bastu, a song about saunas, which has has topped Swedish music charts for three months.

  Remember Monday came joint 10th in the jury vote

  Though Remember Monday's song performed poorly with the public vote, the group came joint 10th in the jury vote, along with Finland, and Italy even gave the UK its 12 points. The trio, who all have musical theatre backgrounds, danced around a giant chandelier in Bridgerton-inspired colourful dresses as they sang about the aftermath of a big night out, where they lost their keys, broke their heels and went to bed in their make-up. The BBC's music correspondent Mark Savage wrote that the band "got a lot of things right" and "hit every harmony in their song... with pinpoint precision". But the public was less convinced. Only one other country, host nation Switzerland, got zero from the public vote. Remember Monday, who met at sixth-form college in Farnborough studying performing arts, have been friends for 12 years, and quit their jobs in late 2023 to be in the band full-time. They were announced as the UK's Eurovision entry in March. Earlier this month the group announced a UK and Ireland tour, and are performing at events including the Capital Summertime Ball, Latitude festival and the Isle of Wight Festival this summer. They called Saturday night "one of the most surreal and emotional moments of our lives".
