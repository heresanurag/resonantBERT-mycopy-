content: |-
  Queen Camilla joined the pair as they met D-Day veterans at an event in Portsmouth.

  King Charles III and the Prince of Wales gave speeches at an event in Portsmouth to mark the 80th anniversary of D-Day.

  Speaking to a crowd which included veterans of the Normandy landings, the King said the nation should always "remember, cherish and honour" those who served that day.

  The King and Prince William were also joined by Queen Camilla to meet veterans.
