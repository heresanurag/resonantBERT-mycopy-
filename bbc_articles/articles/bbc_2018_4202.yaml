id: bbc_2018_4202
title: 'Trump: Syria air strikes to deter chemical weapons use - BBC News'
date: '2018-04-14'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43763406
content: |-
  US is prepared to "sustain" strikes until Syrian regime stops using chemical agents, Mr Trump says.

  President Donald Trump says he has approved US military strikes against Syria, in collaboration with the UK and France.

  The strikes are in response to an alleged chemical attack on the Syrian town of Douma last week.
