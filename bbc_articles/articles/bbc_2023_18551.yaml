title: 'Hackney: Mother appears in court charged with the murder of her son, 4 - BBC
  News'
date: '2023-12-22'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-67797089
content: |-
  Kobi Macharia Dooly was found with knife injuries and was taken to hospital, where he died.

  Emergency services were called to a home on Montague Road on Wednesday night

  A mother charged with the murder of her four-year-old son in east London has appeared in court.

  Police were called to an address in Montague Road, Hackney, on Wednesday night following concerns about the welfare of a child.

  Inside, officers found Kobi Macharia Dooly, who had suffered knife injuries, and arrested his 41-year-old mother, Keziah Macharia.

  The child was taken to hospital but later died from his injuries.

  Ms Macharia appeared in custody at Thames Magistrates' Court earlier and she is scheduled to appear at the Old Bailey on 28 December.

  The Met said that the boy's death has caused shock and distress in the local community

  A post-mortem examination of Kobi will also take place on 28 December.

  Irish broadcaster RTÉ reports that Kobi's father is from County Waterford.

  The Irish Department for Foreign Affairs said it was providing consular assistance in the case.

  On Thursday, the Met's Det Ch Supt James Conway said: "This is an extremely distressing incident which will understandably cause shock and disbelief amongst the local community and those who attended the scene.

  "We are working with our partners, including Hackney Council and the school community, to ensure support is there for people who need it."

