content: |-
  Police remain at a pub in Knockholt where a woman was seriously injured amid reports of a shooting.

  Manhunt after woman seriously injured at village pub

  Kent Police said officers were called on Friday evening to a report of a disturbance at the pub

  A search is under way for a man after a woman was left seriously injured in an incident at a village pub near Sevenoaks. Kent Police said it was called to a "disturbance" at the Three Horseshoes on Main Road, Knockholt, just after 19:00 GMT on Friday. Officers attended along with South East Coast Ambulance Service and found a woman in her 40s had "suffered serious injuries". Witnesses reported to the BBC that they heard "bangs" and were told the woman had been shot, although this has not been confirmed by police.

  A police cordon has been put up around the pub after the incident

  Officers said the man and woman were thought to know each other. Steve Maines, a parish councillor in Knockholt, told the BBC he heard a "commotion" outside the venue and was told someone had been shot. He said: "We were sitting having our Valentine's Day meal when all of a sudden we heard this huge commotion outside in the car park. "We were told someone had been shot so we had to leave."

  Villager Dorothy Wong said: "I heard around three to four bangs outside and loud shouting from a woman's voice." Ray Picot has lived in the village for 30 years. He said: "We looked out and saw the whole area cordoned off with ambulances, police and flashing lights. "It's hard to believe that something like this has happened in our village."

  A notice on the pub's Facebook page said it would be closed on Saturday "following a tragic incident outside the pub last night".

