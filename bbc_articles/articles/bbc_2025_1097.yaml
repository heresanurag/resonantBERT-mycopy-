  The Three Horseshoes is located about five miles (8km) north-west of Sevenoaks. A Kent Police spokesperson said: "The suspect, a man who is believed to be known to the victim, left the area and is currently outstanding. "Enquiries to locate him and to establish the full circumstances are ongoing." BBC reporter Daniel MacLaren said on Saturday morning the area immediately around the pub remained cordoned off with police tape. Police officers are standing by at the scene to prevent access.

  Police forensic teams are working around the pub's exterior
