content: |-
  Ten fire engines and about 70 firefighters are tackling the fire near Silvertown Way, Canning Town.

  Seven hospitalised after fire at construction site

  This video can not be played To play this video you need to enable JavaScript in your browser. The fire broke out at a 10-storey construction site

  Seven people have been hospitalised after a fire broke out at a construction site in east London. Ten fire engines and about 70 firefighters were called to the blaze near Silvertown Way in Canning Town just after 08:20 BST, the London Fire Brigade (LFB) said. One person was rescued from the second floor of a building. Seven people were taken to hospital after inhaling smoke and a further three were treated at the scene, LFB said. It happened at a 10-storey construction site, where the ground floor of a commercial unit caught light.

  During the fire a person was seen standing on the edge of a crane surrounded by smoke

  Thick black smoke was seen billowing between high-rise buildings in video footage from the scene. The LFB spokesperson said: "The fire has been producing significant amounts of smoke. People in the area are advised to keep windows and doors closed and avoid the area where possible." They said that the one of the brigade's 64m ladders had been deployed to the scene.

  The brigade received more than 30 calls reporting the fire

  "Firefighters from Plaistow, Poplar, East Ham and surrounding fire stations are attending the scene," the spokesperson added. The A1011 Silvertown Way has been closed between the A13 Canning Town Flyover and Hallsville Road. LFB said the cause of the fire was not yet known.

