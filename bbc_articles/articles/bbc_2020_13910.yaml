title: 'US Covid vaccine: Three key questions answered - BBC News'
date: '2020-12-10'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-55249771
content: |-
  How will Americans receive the vaccine? Will it be free? And will enough people take it?

  The United States could move a step closer to approving the Pfizer-Biontech Covid vaccine on Thursday, as the Food and Drug Administration's advisers meet to discuss its authorisation.

  But how will Americans get it? Will it be free? And will enough people take it?
