title: Diddy is calling witnesses from prison, prosecutors say - BBC News
date: '2024-11-18'
section: Culture
url: http://www.bbc.co.uk/news/articles/c80lmpn4kk9o
content: |-
  The star is accused of paying inmates for their phone privileges, and trying to influence witnesses.

  Diddy is facing both civil and criminal lawsuits in the US

  Sean "Diddy" Combs has been breaking prison rules by contacting potential witnesses in his upcoming sex trafficking trial, prosecutors have alleged. The music mogul is accused of making "relentless efforts" to "corruptly influence witness testimony", by using other inmates' telephone accounts, and using three-way calls to speak to people who are not on his approved contacts list. Prosecutors said a review of recorded calls also found that Mr Combs instructed his family to contact potential witnesses in his case, they said in a court filing. The 55-year-old rapper, who has pleaded not guilty to all the charges and vehemently denied any wrongdoing, appeared in court on Tuesday as a judge weighed the new evidence, part of which was found in a notebook in his jail cell.

  At the hearing on Tuesday, a judge ordered that prosecutors destroy copies of materials seized in Mr Combs' jail cell as the judge weighed whether they could be used in court. Judge Arun Subramanian, who is overseeing the case, ruled that the US Attorney's Office for the Southern District of New York cannot use the material or any excerpts from it during Combs’ upcoming bail hearing on Friday. The judge said he would examine the materials and weigh in on whether that can be used at trial. Mr Combs’ defence team claimed that government prosecutors illegally seized his personal notes during a search of his jail cell at the Metropolitan Detention Center in Brooklyn, where he has been detained since his arrest on 16 September in the lobby of a Manhattan hotel. They argued some of the materials detailed information that is protected under attorney-client privilege, which shields information discussed between a client and an attorney. The government detailed that a "filter" team went through all materials before they were given to prosecutors. "The information at issue is not protected," prosecutor Mary Slavik said at the hearing. They argued the information could be considered obstruction of justice and negate the typical protections of attorney-client privilege. The musician, who is best known for 1990s hits such as I'll Be Missing You and Mo' Money, Mo' Problems, has been denied bail since his arrest, with multiple judges citing a risk that he might tamper with witnesses. He's currently in custody in Manhattan. His lawyers made a renewed bid for bail last week, proposing a $50m (£39.6m) package that would see Mr Combs be monitored around the clock by security personnel, while under house arrest. Lawyer Alexandra Shapiro argued it was impossible for the musician to prepare for trial from behind bars because of the "incredibly voluminous" amount of material to review, especially without a laptop computer. She also said his preparation has been hampered by conditions at the jail, including frequent lockdowns and officers taking away the pens he uses to take notes. Detention is stripping Mr Combs of "any real opportunity" to be ready for trial, violating his rights under the US Constitution, Shapiro said. In response, prosecutors argued that the request for bail should be denied, alleging that Mr Combs "poses serious risks of danger and obstruction of these proceedings".

  The musician was previously denied bail at court hearing in September

  In court documents, they accused the star of orchestrating social media posts in order to "influence a potential jury pool" at his trial. Amongst those efforts, they cited an Instagram statement posted by a woman known only as "witness two", countering allegations made by singer Dawn Richard in a civil lawsuit against Mr Combs. Prosecutors alleged that her statement was drafted with Mr Combs during "multiple texts" and "multiple calls" from prison. They further alleged there was a "strong inference" that Mr Combs "paid witness two, after she posted her statement".
