  • None Chaos reigns - the notorious jail where Diddy is being held A video posted by the star's seven children on 5 November was also cited as evidence of a "public relations strategy to influence this case". The video, which was reported by multiple media outlets, showed the family wishing Mr Combs a happy birthday during a prison phone call. "The defendant then monitored the analytics - ie audience engagement - and explicitly discussed with his family how to ensure that the video had his desired effect on potential jury members in this case," prosecutors said.

  Sean Combs (back row, third from left) poses with his seven children, in a photo he posted on Instagram in March 2023

  Mr Combs was also accused of using the phone accounts of at least eight other inmates to make calls, which is against prison regulations; and of "directing others" to orchestrate payment for this access. Prosecutors characterised Mr Combs as running a "relentless" scheme to "contact potential witnesses, including victims of his abuse who could provide powerful testimony against him".

  Urging the judge to deny Mr Combs' request for bail, the prosecutors wrote that "no set of conditions" could eliminate the potential risks to the trial. "The defendant has demonstrated an uncanny ability to get others to do his bidding - employees, family members, and [prison] inmates alike," they claimed. "There is no reason to believe that private security personnel would be immune." Prosecutors also rejected criticism of the conditions at the Metropolitan Detention Center in Brooklyn, citing an interview, external from the star's lawyer Marc Agnifilo, who said "food’s probably the roughest part" of Mr Combs' adjustment to life behind bars. The BBC has contacted his legal team for a response.

  Cassie and Diddy in 2017. She later accused him of abuse and exploitation.

  Mr Combs' legal troubles began last November, when his ex-partner Cassandra "Cassie" Ventura filed a civil lawsuit, alleging incidents of rape and physical assault between 2007 and 2018. Although the case was quickly settled out of court, it led to a flurry of similar accusations and an investigation by the US Government. The star's properties were raided by federal agents in March, and he was arrested in New York in September. Mr Combs was charged with three counts of sex trafficking and racketeering, in a federal indictment that described allegations of drug-fuelled, days-long sexual performances dubbed as "Freak Offs". The musician is simultaneously facing more than two dozen civil cases by men and women accusing him of sexual assault, rape and sexual exploitation. The star has vehemently denied all of the charges against him, and the claims in the civil suits, arguing that the sexual encounters at the heart of his criminal case were all consensual.

  In a separate development on Monday, two separate lawsuits were filed against one of the lawyers known for spearheading more than 120 lawsuits against Mr Combs. One lawsuit, filed by an unnamed "high-profile individual" against Texas attorney Tony Buzbee, alleged that Mr Buzbee attempted to extort him by threatening to make public “entirely fabricated and malicious allegations of sexual assault". In court documents obtained by the BBC, the plaintiff identified himself as a former associate of Diddy and acknowledged attending events with the embattled music mogul. The lawsuit against Mr Buzbee claims the Houston attorney follows a "clear playbook" for extorting celebrities involving fabricating allegations and demanding letters seeking payment. The lawsuit alleges that if the demands are not met, he turns to the media to apply public pressure. Mr Buzbee, who denies wrongdoing, described the filing as a “last-ditch attempt” to stop him from naming the individual. “It is obvious that the frivolous lawsuit filed against my firm is an aggressive attempt to intimidate or silence me and ultimately my clients,” he said in a statement sent to the BBC. "No amount of money was included in the demand letters," he wrote. "No threats were made. The demand letters sent are no different than the ones routinely sent by lawyers across the country in all types of cases.” A second legal claim was filed Monday, by an unnamed woman, in New York alleging abusive behaviour toward women. The summons states Mr Buzbee abused his power as an attorney and violated the3 unnamed woman while representing her as a client. “Plaintiff brings these causes of action to address Defendant's misconduct, which began with his assault of Plaintiff and escalated during his representation of her in divorce proceedings, where he prioritized concealing his actions over safeguarding her legal interests,” the claim states. In a statement to the BBC, the attorney who filed the suit, Jeremy Bohrer called Mr Buzbee a hypocrite. “There is nothing worse than when a black hat masquerades as a white hat.” Mr Buzbee has not yet responded to the second lawsuit. BBC News has reached out for comment.
