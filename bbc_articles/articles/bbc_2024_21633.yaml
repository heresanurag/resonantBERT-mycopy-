title: Van passenger pushes cyclist off bike in Nottinghamshire - BBC News
date: '2024-09-12'
section: General
url: http://www.bbc.co.uk/news/videos/c1k3k400jk8o
content: |-
  The cyclist suffered facial injuries, bruising to his arms and legs, and a swollen knee.

  Police have released "shocking" footage showing the moment a cyclist was pushed off his bike by a man in a passing van.

  The cyclist was travelling along Nottingham Road, between Toton and Long Eaton, on the Derbyshire-Nottinghamshire border.

  Police said he suffered facial injuries, bruising to his arms and legs, and a swollen knee.

  The handlebars, brake levers, and rear axle of his bike were also damaged in the early hours of Saturday 9 March.

  Nottinghamshire Police has asked anyone who has any information to contact the force.
