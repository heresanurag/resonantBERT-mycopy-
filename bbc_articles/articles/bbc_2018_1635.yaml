title: 'Winter Olympics: Anna Gasser wins women''s big air final with last jump -
  BBC Sport'
date: '2018-02-22'
section: Winter Olympics
url: http://www.bbc.co.uk/sport/winter-olympics/42981294
content: |-
  Austria's Anna Gasser produces the best score of the day with the last jump to win gold in the women's big air final.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Austria's Anna Gasser produced the best score with the last jump to snatch Winter Olympic gold from Jamie Anderson in the women's big air in Pyeongchang. American Anderson, who won slopestyle gold, scored 90.00 on her first run and still led after run two. But Gasser, 26, then posted 96.00 to take gold, with 16-year-old New Zealander Zoi Sadowski-Synnott third. The two best scores of three runs were taken for the final total, with Gasser scoring 185.00 and Anderson 177.25.

  "I was standing up there and I knew I had the silver and I was like 'no, I'm going to go full risk,'" Gasser said. "I thought, 'if it works out, then I deserve this medal'. Thankfully it worked out and it's a dream come true." Anderson, 27, started well, while Sadowski-Synnott managed only 65.50 in her first run at the Phoenix Snow Park. But Sadowski-Synnott jumped 92.00 - the best score of run two - to move into bronze-medal position, and may have challenged for gold had she landed her ambitious third attempt.

