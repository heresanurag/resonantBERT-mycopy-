  Jamie Smith says Ben Foakes has helped him with his Test debut despite replacing his Surrey team-mate as England’s wicketkeeper.

  'Foakes has helped me with England debut' - Smith

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Jamie Smith says Ben Foakes has helped him with his Test debut despite replacing his Surrey team-mate as England's wicketkeeper. Foakes, arguably the best keeper in the world, is Surrey's first choice, with Smith usually playing as a specialist batter in county cricket. But England have chosen Smith to keep in the first Test against West Indies and he responded by making 70 on day two at Lord's. "We've got a very good relationship and he has helped me a lot with my keeping," Smith told Test Match Special. "He spoke to me about what to expect from this experience." Smith was the wicketkeeper on his previous appearances for England, in two one-day internationals against Ireland last year. A talented stroke-player, Smith has been picked with an eye on the Ashes tour of 2025-26 largely because of his ability with the bat. And, on the day before his 24th birthday, he showed his ability to score at different tempos. Smith took 47 deliveries to make his first 30 runs then, with only the tail for company, hit 40 off his next 42 deliveries. One of his two leg-side sixes went on to the roof of the Tavern Stand. "It has been an amazing day," said Smith, who usually bats at number four or five for Surrey, but lined-up at seven for England. "Batting seven and keeping is a new role for me, but I'm happy to adapt. Batting with the tail is new for me as well, so I am learning on the job a bit."

  Smith's effort helped England to 371, a first-innings lead of 250. West Indies then slumped to 79-6, leaving England poised for an innings win inside three days. He added: "It was the most nervy I've been when going out to bat for a long time, so to go on and contribute and put the team in a winning position is most the important thing. "We are close to a perfect position. We wanted to start the summer strongly and get on the front foot, which we have done. Hopefully we'll get the last four wickets as quickly as possible tomorrow." Smith's first Test for England is also the last for their all-time leading wicket-taker James Anderson. When Anderson made his debut against Zimbabwe on this ground 21 years ago, England's wicketkeeper was Alec Stewart, now Surrey's director of cricket and 37 years Smith's senior. Anderson briefly joined Smith in the middle, but did not face a ball because Smith was last man out when he was caught on the square-leg boundary later in the same over. The 41-year-old then took two wickets to move his career tally to 703 and is poised to end his legendary international career on Friday. "It was surreal," said Smith. "I am slightly gutted I didn't see that last ball go for six so he could have his moment. That's one thing I regret about that innings, I think. "Everyone is going to miss Jimmy when he goes and to be part of this is pretty special."

