title: YouTube star apologises for ‘acid attack’ style prank - BBC News
date: '2018-02-05'
section: General
url: http://www.bbc.co.uk/news/stories-42950528
content: |-
  A YouTube star accused of uploading a prank video resembling an 'acid attack' has apologised, but says "you've got to push boundaries to get the views".

  A YouTube star accused of uploading a prank video resembling an "acid attack" has apologised, but vows to continue posting pranks and says "you've got to push boundaries to get the views".

