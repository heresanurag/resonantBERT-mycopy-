content: |-
  Now called Quadball, the sport was made famous by JK Rowling's bespectacled wizard.

  From page to pitch: How Harry Potter's Quidditch became a real-life sport

  There are several Quadball tournaments for university and community leagues each year

  Quaffles, bludgers and the elusive golden snitch - it has been nearly 20 years since Quidditch moved from the pages of Harry Potter to real-life playing fields. The sport, made famous by JK Rowling's orphaned wizard, is now known as Quadball and believed to be one of the only mixed-gender, full-contact sport in the world. Unlike Harry and co, who would perform hair-raising manoeuvres while soaring through the air on broomsticks, real-life players try to outwit their opponents astride PVC pipes. While it may have originally been viewed as a sport for hardcore "Potterheads", Quadball has long transcended the fictional series and carved out its own identity as a competitive sport which continues to keep thousands of players under its spell.

  "I don't even like Harry Potter," says Sheffield Quadball Club player Henry Patten. Henry discovered his love for the sport after reluctantly attending a training session in 2021. "Sports I've been in before were all about competitiveness, trying to win at all cost," the 22-year-old says. "Quadball is just so much more about inclusivity and having a good time more than anything."

  Rowling's Quidditch is portrayed as a dangerous game, where players frequently endure high-speed collisions and aggressive tactics. The real-life adaptation, created by students in the United States in 2005, is equally fast-paced and sees so-called chasers trying to throw quaffles - semi-deflated volleyballs - through the opposition's hoops. While doing so, they have to avoid being knocked out by bludgers, rubber dodgeballs thrown by beaters. Perhaps the best-known element of the game is the golden snitch, famously very nearly swallowed by Harry Potter during his first-ever Quidditch match. But instead of a winged, walnut-sized ball, real-life seekers chase a flag runner dressed in yellow, who has a sock with a tennis ball in attached to their shorts.

  A flag runner tries to evade the grasp of a seeker to prevent them grabbing the Quadball equivalent of the golden snitch

  Sarah Abramson, who plays for Bristol Quadball Club, says Quadball combines disciplines from well-known childhood favourites. "It's like if you play dodgeball, soccer and capture the flag all at the same time," Sarah, who is from the US, says. "It's a really visually interesting sport to watch." Quadball teams usually comprise three chasers, two beaters, one keeper and one seeker, who play on a pitch roughly half the the size of football field. Rather than buying a broomstick in Diagon Alley, it is store-bought PVC pipes players use to hold between their legs. "It's really fun but it's also really silly," Sarah, 25, says. "You have to have the ability to laugh at yourself." Following its inception, Quadball quickly captured hearts and minds across the globe, leading to the emergence of new teams, tournaments and eventually the first World Cup in Oxford in 2012.

