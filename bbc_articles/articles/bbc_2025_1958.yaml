  Unusual because of its rules and origin, players say being confronted with questions such as 'oh, do you fly?' and 'is this even a real sport?' is not uncommon. Equally, people often underestimate how physically demanding the sport can be, says Chloe Durkin, the president of Olympians Quadball Club Leeds. "A lot of people who do fitness for the sport say they do high-intensity interval training (HIIT) to put up with it," they say. Quadball has earned a reputation for being trans-inclusive and features a gender rule, which limits the number of players of the same gender on the pitch at the same time. Chloe, who is also the international relations officer for governing body Quadball UK, says playing a mixed-gender, full-contact sport feels "empowering". "There is always this assumption that men are stronger than women, but in reality that's not entirely true," the 26-year-old says. "There are lots of men in the community who would still find me a challenging opponent."

  Players can be identified by the colour of their headbands. White is for chasers, green for keepers, black for beaters and yellow for seekers

  While Quadball's links to the Harry Potter series are undeniable, the sport has taken active steps to move away from the franchise. In 2022, the decision was made to rename Quidditch to Quadball, in part because of JK Rowling's comments on gender identity but also due to trademark issues. At the time, Quadball UK said the name change indicated "a firm stance with our trans players and members" and opened up "greater opportunities for funding". Sheffield Quadball Club player Izzy Hecks says the Harry Potter association is no longer "a marketing point" when it comes to recruitment. "The books probably are a big factor why people know about the sport, but I'd like to think people are discovering it through other sources now."

  Sheffield Quadball Club players say the sport is for people of all backgrounds and abilities

  For some players, like James Martin, Quadball presented an attractive alternative to other full-contact sports, like rugby. The Warwick Quadball Club president and coach says: "It's much more fun because you get a lot more of the ball and freedom of movement. "I actually stopped playing rugby because I got much more into Quadball." Michael Ansell, who used to play American Football, says he signed up to the Oxford Mammoths in 2013 as "almost like a joke". "Looking back, it's the best joke that I ever went through with," the 30-year-old says. "It's the only sport I've ever played that you can turn up as a new person and you forget you didn't know anyone before because they take you in so willingly."

  Sam (blue trousers) at his first-ever Quidditch match in Oxford in 2012

  Since the coronavirus pandemic, recruitment has been challenging for both community and university teams, with some clubs even on hiatus. Oxford Mammoths player Sam believes better collaboration between societies and targeting non-students could sustain growth. Sam was 12 when he watched the British Quadball Cup in Oxford in 2012 and is now a proud player himself. Despite the current challenges, the 23-year-old is optimistic about the future of the sport. "I think we are struggling to figure out how to sell it, but I think it can be done," he says. "I refuse to believe that a whimsical sport like this is losing popularity." Listen to highlights from South Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
