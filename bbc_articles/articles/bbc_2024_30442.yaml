content: |-
  Two people are in hospital after an explosion at a terraced house in Ilford.

  Explosion at house leaves two in hospital

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Two people have been taken to hospital after an explosion at a terraced house in north-east London, the London Fire Brigade (LFB) has said. Footage on social media showed a huge blast at the house in Ilford - which has been converted into flats - with chunks of masonry being thrown into the street. LFB sent eight fire engines and about 60 firefighters to deal with the blaze, in Ley Street, just after 16:00 GMT. The brigade said that at the fire's height the first floor and loft conversion were "fully alight". The extent of the injuries suffered by the two people taken to hospital has not been revealed.

  Station commander Darren McTernan, who was at the scene, said: "Firefighters worked hard to bring this fire under control. Crews will remain on scene throughout the evening. "Ley Street remains closed between Eastern Avenue and Vicarage Road, impacting traffic in the surrounding area, so please continue to avoid the area if you can." The fire was brought under control by 18:23. Its cause is being investigated. A London Ambulance Service spokesman said: "We sent resources including ambulance crews, an advanced paramedic practitioner, an incident response officer and members of our hazardous area response team (Hart). "We treated three people. We took two to hospital and discharged a third at the scene."
