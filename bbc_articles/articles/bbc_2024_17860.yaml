content: |-
  In a traditional part of the process, the successful candidate pretends to be reluctant to take up the role.

  Sir Lindsay Hoyle was dragged to the Speaker's chair in the House of Commons, after being re-elected to the role.

  A traditional part of the process, the successful candidate pretends to be reluctant to take up the role and is physically dragged to the Speaker's chair by other MPs.

  Read more on the what the role of the Speaker of the House entails here.
