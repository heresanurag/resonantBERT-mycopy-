  The RHS said 'Catherine's Rose' will raise awareness of how nature and gardening can help to heal.

  Rose named after Princess of Wales to celebrate 'power of nature'

  A rose has been named after Catherine, Princess of Wales to highlight the healing power of nature. The Royal Horticultural Society (RHS) said it called the flower 'Catherine's Rose' to raise awareness of the role that spending time outdoors plays in supporting people's mental, physical and spiritual wellbeing. The floribunda rose has coral-pink blooms with a scent of Turkish Delight and mango. Proceeds from every sale will go to the Royal Marsden Cancer Charity. The princess was treated at the hospital, in west London, for cancer last year.

  The Princess of Wales revealed she was in remission after making a surprise visit to the hospital in January, where she thanked staff and reassured cancer patients that there was "light at the end of the tunnel". She first revealed her diagnosis in March last year and underwent a course of preventative chemotherapy, announcing in September that it had been completed. Catherine's Rose will have flowers that attract pollinators and will thrive in a mixed border, as a hedge, in a large container or in a rose bed, according to the RHS. Clusters can have up to 15 blooms, each flower measuring between 8 and 12cm, while the plant that supports it can grow to about 1.2m tall by 90cm wide.

  Clare Matterson, RHS director general, said the flower would "raise awareness of how nature and gardening can help to heal". "We know how important this message is as every day we see how accessing nature and being outside is vital for our health and happiness," she added. There will be 15,000 Catherine's Rose available this autumn, with further roses becoming available next year.
