title: Driver in M53 school bus crash died of natural causes - BBC News
date: '2024-03-15'
section: Liverpool
url: http://www.bbc.co.uk/news/uk-england-merseyside-68579736
content: |-
  Schoolgirl Jessica Baker, 15 was killed in the crash after Stephen Shrimpton collapsed at the wheel.

  Stephen Shrimpton was described as a "loving husband and father"

  The driver of a school bus which crashed on a motorway killing a teenage girl died from natural causes, a coroner's office has said.

  Stephen Shrimpton, 40, collapsed at the wheel as he was driving the coach north on the M53 in Wirral, Merseyside, on 29 September 2023.

  He was taking about 50 children to West Kirby and Calday Grange grammar schools.

  Jessica Baker, 15, was killed in the crash just after 08:00 GMT.

  On Friday, a spokeswoman for Liverpool Coroner's Office said Mr Shrimpton's case had been closed as his death was classed as resulting from "natural causes".

  No more details regarding the cause of his death were shared.

  When his inquest was opened in October, Andre Rebello, senior coroner for Liverpool and Wirral, said CCTV footage showed Mr Shrimpton slump to his left while driving the coach, which at the same time left the carriageway and went up an embankment before ending up on its side.

  At the time, the coroner said further medical examinations would be needed to establish Mr Shrimpton's cause of death, with focus on the examination of the condition of his heart.

  In a statement released after the crash, Mr Shrimpton's family said: "Stephen was a loving husband and father to his wife and his wonderful children, a caring and thoughtful man who would always prioritise others over himself."

  An inquest for Jessica will be held at a later date, with a review hearing scheduled for July, the coroner's office spokeswoman said.

  The inquest opening heard the teenager, from Chester, was partially ejected from the vehicle and suffered head injuries which proved "instantly" fatal.

  After the crash, four other children were taken to hospital, including a 14-year-old boy whose injuries are said to be "life-changing", according to Merseyside Police.

  The coach overturned during the morning rush hour

  Other victims were treated at an emergency training centre, with 13 described as suffering from minor injuries.

  Following her death, Jessica's family paid tribute to the talented climber, who they described as a "warm-hearted, wonderful daughter, granddaughter and niece, devoted sister and loyal friend".

  More than £6,500 was raised through an online fundraising site for Climbers Against Cancer in her memory.

