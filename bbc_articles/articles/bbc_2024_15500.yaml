title: England fan admits Euro 2024 winners tattoo is 'bonkers' - BBC News
date: '2024-07-17'
section: General
url: http://www.bbc.co.uk/news/videos/c8vdrydq67eo
content: |-
  But Dan Thomas says he is confident the Three Lions will win at Euro 2028.

  A football fan has admitted his decision to get a tattoo with the words "England Euro 2024 winners" before the tournament's final was "bonkers".

  The England team lost 2-1 against Spain on Sunday.

  However, Dan Thomas, from Swindon in Wiltshire, said he did not regret the inking, and even has a plan to modify the design in four years time.

