title: Who is Zohran Mamdani? - BBC News
date: '2025-06-25'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cly2rgzye9no
content: |-
  He is set to be the Democratic candidate for New York City Mayor in a race that could have implications for the party nationally.

  To play this video you need to enable JavaScript in your browser. This video can not be played Watch: Left-wing Democrat Zohran Mamdani could be the next mayor of NYC

  Zohran Mamdani, a 33-year-old state assemblyman, is set to be the Democratic candidate for New York City Mayor, making history as the first Muslim nominee. With 95% of ballots counted, Mamdani leads former governor Andrew Cuomo - who resigned that post after sexual harassment allegations in 2021 - 43% to 36% in the Democratic primary, propelled by a wave of grassroots support and a bold left-wing platform. "Tonight, we made history," Mamdani told supporters. "I will be your Democratic nominee for the mayor of New York City." New York's ranked-choice voting system means the final result could still evolve, but Mamdani's lead and momentum appear decisive. His victory over Cuomo - once a dominant figure in state politics - marks a watershed moment for progressives and signals a shift in the city's political centre of gravity.

  Born in Kampala, Uganda, Mamdani moved to New York with his family age seven. He attended the Bronx High School of Science and later earned a degree in Africana Studies from Bowdoin College, where he co-founded the campus chapter of Students for Justice in Palestine. The millennial progressive, who would be the city's first Muslim and South Asian mayor, has leaned into his roots in a diverse city. He's posted one campaign video entirely in Urdu and mixed in Bollywood film clips. In another, he speaks Spanish. Mamdani and his wife, 27-year-old Brooklyn-based Syrian artist Rama Duwaji, met on the dating app Hinge. His mother, Mira Nair, is a celebrated film director and his father Professor Mahmood Mamdani, teaches at Columbia. Both parents are Harvard alumni.

  Zohran Mamdani with his parents Mahmood Mamdani (R) and Mira Nair (L) and wife Rama Duwaji (C)

  Mamdani presents himself as a candidate of the people and an organiser. "As life took its inevitable turns, with detours in film, rap, and writing," reads his state assembly profile, "it was always organising that ensured that the events of our world would not lead him to despair, but to action." Before entering politics, he worked as a housing counsellor, helping low-income homeowners in Queens fight eviction. He has also made his Muslim faith a visible part of his campaign. He visited mosques regularly and released a campaign video in Urdu about the city's cost-of-living crisis. "We know that to stand in public as a Muslim is also to sacrifice the safety that we can sometimes find in the shadows," he said at a rally this spring. "There's nobody who represents the totality of the issues that I truly care about that's running for mayor currently other than Zohran,"Jagpreet Singh, political director for social justice organization DRUM, told the BBC.

  Mamdani said that voters in the most expensive US city want Democrats to focus on affordability. "This is a city where one in four of its people are living in poverty, a city where 500,000 kids go to sleep hungry every night," he told the BBC at a recent event. "And ultimately, it's a city that is in danger of losing that which it makes it so special."
  • None Universal childcare for children aged six weeks to five years His plan also includes "overhauling" the Mayor's Office to hold property owners responsible and massively expanding permanently affordable housing. In his campaign, he linked these policies to highly visual, and viral, gestures. He plunged into the Atlantic to dramatize rent freezes and broke a Ramadan fast on a subway train with a burrito to underscore food insecurity. Days before the primary, he walked the entire length of Manhattan, pausing for selfies with voters. While he insists he can make the city more affordable, critics question such ambitious promises. The New York Times did not endorse anyone in the city's mayoral primary and criticised the candidates generally. Its editorial board said Mamdani's agenda is "uniquely unsuited to the city's challenges" and "often ignores the unavoidable trade offs of governance." His rent freezes would restrict housing supply, said the board.

