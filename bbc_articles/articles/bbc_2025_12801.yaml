  Cuomo and others frame Mamdani as untested and too radical for a city with a $115 billion budget and over 300,000 municipal workers. Cuomo, backed by big donors and centrist endorsements including Bill Clinton, insisted experience matters, saying: "Experience, competence, knowing how to do the job, knowing how to deal with Trump, knowing how to deal with Washington, knowing how to deal with the state legislature, these are basics. I believe in on-the-job training, but not as the mayor of New York."

  Nine candidates were running to be the Democratic nominee - here they appear at a mayoral debate in New York City 4 Jun.

  But Trip Yang, a political strategist, said "experience" isn't necessarily a game changer in this political era. And whether or not Mamdani wins, Mr Yang believes his campaign has done "the unthinkable." "Zohran is powered by tens of thousands of volunteers, hundreds of thousands of unique donors. It's very rare to see a local Democratic primary New York campaign with this much amount of volunteer and grassroots excitement," he said. "He understand us. He belong to us. He's from our community, you know, the immigrant community," added supporter Lokmani Rai.

  At a recent Mamdani campaign event at a park in Jackson Heights, one of the most diverse communities in the country, children ran and played on swings, as Latino food vendors sold ice cream and snacks. In many ways, the scene perfectly captured the city's diversity - what many Democrats consider New York's greatest asset. But the city is not without its racial and political tensions. Mamdani said he's received Islamophobic threats daily, some targeting his family. According to police, a hate-crimes investigation into the threats is underway. He told the BBC that racism is indicative of what's broken in US politics and criticised a Democratic Party "that allowed for Donald Trump to be re-elected" and fails to stand up for working people "no matter who they were or where they came from". The candidates' stances on the Israel-Gaza war was also likely on voters' minds. Mamdani's strong support of Palestinians and staunch criticism of Israel goes further than most of the Democratic establishment. The assemblyman introduced a bill to end the tax-exempt status of New York charities with ties to Israeli settlements that violate international human rights law. He has also said he believes Israel is committing genocide in Gaza, is an apartheid state, and that the Israeli Prime Minister Benjamin Netanyahu should be arrested. Israel vehemently rejects accusations of genocide and apartheid. Mamdani has been pressed numerous times by press in interviews to state whether he supports Israel's right to exist as a Jewish state. In a response this month, he said: "I'm not comfortable supporting any state that has a hierarchy of citizenship on the basis of religion or anything else, I think that in the way that we have in this country, equality should be enshrined in every country in the world. That's my belief." Israel says all religions have equal rights under the law. Mamdani has also said he accepts Israel's right to exist as a state, telling the Late Show on Monday that "like all nations, I believe it has a right to exist and a responsibility also to uphold international law". Mamdani has also said that there is no room for antisemitism in New York City, adding that if he were elected, he would increase funding to combat hate crimes. Cuomo, on the other hand, has described himself as a "hyper supporter of Israel and proud of it". In many ways the issues facing New York Democrats are the same ones the party faces in future elections, and afterwards, the primary may be dissected nationally for what it says about the party - and how it should take on Trump.
