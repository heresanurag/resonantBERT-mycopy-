  LAS said on 13 June, when temperatures hit 28C (82F), it received 7,000 calls compared with 5,500 on a typically busy day. The service has activated plans to manage high demand, including deploying community response cars, increasing clinicians for phone assessments, and speeding up patient handovers at hospitals. Stuart Crichton, director of 999 operations at LAS, said: "We have been very busy this week and expect to be even busier this weekend as temperatures climb even further. "We would will like to remind Londoners to only call 999 in a life-threatening emergency." He said that older people, the very young and those with pre-existing conditions are particularly vulnerable to heat-related issues. "Look out for neighbours, family or friends who may need some help and make sure they are able to keep cool during the heat," Mr Crichton added.

  Dr Lorna Powell, an NHS urgent care doctor in east London, said: "We are seeing cases of heat-related illnesses rising in our urgent care departments. "Heat exhaustion can quickly trigger more serious illnesses as dehydration sets in and the cardiovascular system becomes overwhelmed."

  Swimmers took an early morning dip at Charlton Lido to mark the solstice

  Andrew Lewington, from London Fire Brigade, told the BBC that 15 people have died so far this year in the capital's waterways. He said there had been an increase of 15% in the number of callouts for water rescue, equating to 12 a week. "People need to understand what lies beneath water and think twice about jumping in," said Mr Lewington.
