title: 'Boris Johnson on US-Iran tensions: ''I don''t want a military conflict'' -
  BBC News'
date: '2020-01-17'
section: General
url: http://www.bbc.co.uk/news/uk-51103287
content: |-
  Speaking to BBC Breakfast, Boris Johnson has said he doesn't want "a military conflict" in the region.

  The prime minister has addressed ongoing tensions between the US and Iran in an interview with BBC Breakfast.

  Boris Johnson said that "clearly Iran made a terrible mistake", but added that the "most important thing is tensions in the region calm down".

  Iranian President Hassan Rouhani, has called the shooting down of a Ukrainian passenger plane that killed 176 people an "unforgivable error".

  The incident followed the killing of Gen Qasem Soleimani, Iran's second most powerful man, in a US drone strike in Iraq.

