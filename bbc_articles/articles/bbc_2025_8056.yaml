title: Elton John 'can't watch sons play rugby' after eyesight loss - BBC News
date: '2025-04-06'
section: Culture
url: http://www.bbc.co.uk/news/articles/c7vnep51d59o
content: |-
  The 78-year-old star has been struggling with his eyesight after an infection last summer.

  Sir Elton John stepped back from touring last year, but his music continues to sell

  Sir Elton John has said he can't see his sons playing rugby after an infection last summer left him struggling with his eyesight. "I can't see TV, I can't read. I can't see my boys playing rugby and soccer," the 78-year-old superstar told The Times, external. "It has been a very stressful time because I'm used to soaking it all up. It's distressing," he added. In September, the singer wrote on Instagram that a "severe" infection had left him with "only limited vision" in one eye, adding that his recovery would "take time".
  • None Elton John left with 'limited vision' in one eye
  • None Elton John album on hold because he 'can't see' Sir Elton and his filmmaker husband David Furnish have two sons, Zachary and Elijah. The songwriter said he "can't see the telly", adding: "I haven't been able to see anything since last July." He admitted he does get "emotional" about his sight loss. "But you have to get used to it, because I'm lucky to have the life I have. I still have my wonderful family, and I can still see something out of here," he said, pointing at his left eye. "So you say to yourself, just get on with it."

  Sir Elton John pictured during his headline set at Glastonbury in 2023

  Sir Elton previously said he'd been unable to finish his new album due to his eyesight issues. In November, he said "it's been a while since I've done anything". But on Friday, he released his new collaborative album with US musician Brandi Carlile, Who Believes In Angels? The pair worked with producer Andrew Watt and his long-term songwriting partner Bernie Taupin on the album. Sir Elton said that they "didn't all agree", adding that he became "frustrated" when they stood up to him. He said: "If I want to make a great album aged 76 or 77 I've got to be told and they put up with my little foibles, which were really about anxiety, self-doubt and not feeling very well at the time. "I was tired so I thought, I'm going to abandon this. "The problem was three other people were involved and I knew that if I walked away from it I would hate myself for the rest of my life." He added that it is not the first time he has had doubts about his music. "You wouldn't be human if you didn't have fear and doubt. It's good for artists. Every album I've done, good, bad or indifferent, I've had doubts about," he said. "And the most doubts I've ever had have been with this one." The album has mostly been praised by critics. Writing in the Guardian, Lisa Wright awarded it four stars, external, praising its "poignant moments", while The Telegraph's Neil McCormick gave it five stars, external, calling it a "glorious return to his bombastic, melodious 1970s pomp". In January, Sir Elton's career-spanning greatest hits collection, Diamonds, reached number one after 374 weeks on the charts. Featuring signature songs like Tiny Dancer, I'm Still Standing and Rocket Man, the 51-track collection gave the star his ninth number one album. Last year, Sir Elton also won his first Emmy Award which finally gave him EGOT status, meaning he joined an exclusive club of performers who have won an Emmy, Grammy, Oscar and Tony award.
