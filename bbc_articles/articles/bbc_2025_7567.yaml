  Newspaper headlines: Ukraine's 'only choice' and Gregg Wallace's defence

  The Times, external has been told by a source close to Donald Trump's special envoy, Steve Witkoff, that a US-proposed peace deal - that reports suggest could force Ukraine to make territorial concessions to Russia - is "set in stone". The source explains that if President Zelensky refuses, the war could go on for years, trying the patience of Europeans as their governments fund and arm Ukraine, at the same time as dealing with a possible recession caused by US tariffs. President Trump's levies on Chinese imports have prompted Apple to accelerate its plans to make more iPhones in India, according to the Financial Times, external. Sources tell the paper that the tech giant is aiming to supply the entire US iPhone market with devices assembled in India by the end of next year. Apple declined to comment on the report. The Daily Telegraph, external leads on Home Office contractor Serco launching a drive for landlords to house asylum seekers at taxpayers' expense. Serco is reported to be hosting an event for landlords at a four-star hotel, promising five-year deals with guaranteed full rent. The Home Office tells the paper that such arrangements have been in place for years, and it has a statutory duty to support destitute asylum seekers who cannot pay for utilities or council tax. The Guardian, external reports that the EU is prepared to make major concessions in negotiations with Britain over a youth mobility scheme. Member states are said to be willing to accept shorter visas, allowing those aged 18 to 30 to travel freely and work in certain sectors. The paper says an agreement would pave the way for a long-awaited reset with Brussels. A Downing Street spokesperson is quoted saying both sides are discussing a wide range of issues. Gregg Wallace - who stepped away from presenting MasterChef last November in the wake of the claims against him - has defended himself against allegations about him, insisting "they're not all true". In an interview with the Daily Mail, he says he felt "under attack" and that he had contemplated suicide.

