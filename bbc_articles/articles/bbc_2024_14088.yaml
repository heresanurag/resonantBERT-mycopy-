title: Moment giant wind turbine blade carried through Hawick - BBC News
date: '2024-06-05'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-67696665
content: |-
  Small roads in the Scottish Borders mean turbine blades have to be transported to a wind farm pointing upwards.

  Watch the moment a giant wind turbine blade is transported through the town of Hawick in the Scottish Borders.

  Small streets in the area mean the 65-metre blades have to be carried pointing upwards - helping them to squeeze past buildings, trees and lamp-posts.

  A number of turbines are being constructed at the Pines Burn wind farm, eight miles (13km) south of the town.
