title: 'Banksy: Chelsea wall artwork repaired after paint attack - BBC News'
date: '2024-09-24'
section: London
url: http://www.bbc.co.uk/news/articles/cly48kx3wxeo
content: |-
  An elephant mural is restored to its original state and protected from further graffiti.

  The work was the second of nine works by Banksy to appear in London

  One of London’s recent animal-themed Banksy artworks, vandalised shortly after being discovered, has been restored and will now be protected by an "anti-graffiti solution". The work - of two elephants poking their heads out of blocked-out windows - was painted on the side of a house in Chelsea, before it was defaced with white stripes. Council workers removed the unwanted additions and added a special coat to protect the artwork. It was the second of nine works by Banksy that appeared across the capital over nine days in August.

  The artwork was vandalised with white stripes of paint

  Kensington and Chelsea council said the liquid was specially designed not to alter the appearance of the surface it was applied to. Josh Rendall, who represents the ward where the piece is located, said: “We hope that residents and visitors enjoy this and our other Banksy piece on Portobello Road for many years to come.” The appearance of Banksy’s works last month led to speculation about their significance, if any.

  James Ryan, CEO of Grove Gallery which sells Banksy originals and prints, told BBC London he initially thought the works had "politically charged and motivated messages, so the goat - references to Palestine and Gaza, and then the wolf crying for help - some kind of persecution". Some of the works were removed shortly after appearing, while one, a howling wolf sprayed on a satellite dish in Peckham, south-east London, was seemingly stolen. Two others were removed by London authorities - a silhouette of a cat on a billboard in Cricklewood was taken down for safety reasons, and a City of London Police sentry box which had piranhas painted on it was moved so it could be viewed safely.
