title: Jeremy Allen White sings as Bruce Springsteen in Deliver Me From Nowhere trailer
  - BBC News
date: '2025-06-19'
section: Culture
url: http://www.bbc.co.uk/news/articles/crk6ded7krdo
content: |-
  After Timothee Chalamet's Bob Dylan, White plays The Boss in new film biopic Deliver Me From Nowhere.

  Jeremy Allen White plays Bruce Springsteen at a pivotal point in his career

  Bruce Springsteen fans have been given their first glimpse of Jeremy Allen White's portrayal of The Boss, in the trailer for new biopic Deliver Me From Nowhere. The film follows Springsteen as he records his sixth album, the stark and stripped-down Nebraska, testing the patience of a record label who want a follow-up to his 1980 pop hit Hungry Heart. White, who has won three Emmys for his lead performance in The Bear, is seen playing harmonica and singing Nebraska's title track, as well as Springsteen's breakthrough hit Born To Run. The film comes after another legendary US singer-songwriter got the biopic treatment, with Timothee Chalamet receiving an Oscar nomination for playing Bob Dylan in A Complete Unknown.

  To play Springsteen, White studied hundreds of archive videos to capture the singer's characteristic New Jersey rasp and athletic stage moves. "There's just so much footage," he told GQ magazine last year, external. "It's really great to go down a YouTube rabbit hole and find him at all these different periods in his life and be able to listen to his speaking voice as well as his singing voice. It's been really fun preparing." Springsteen, a regular visitor to the film set, praised White's performance, calling him "a terrific actor" who sings "very well". "He's got an interpretation of me that I think the fans will deeply recognise and he's just done a great job, so I've had a lot of fun," said the star.

