content: |-
  Ilona Maher is a social media phenomenon and the Bristol Bears new signing says rugby needs to learn the secrets behind her numbers.

  A viral sensation, a financial necessity - why Maher became rugby's biggest star

  Ilona Maher has signed a three-month deal with Bristol, beginning in January

  Ilona Maher is not the best rugby player in the world. She is big, strong and fast, with deceptively good hands. But she is not, by her own admission, the best. "I'm amazing at rugby, but realistically I'm maybe not the best at it, which is fine," she told Rugby Union Weekly. "There are so many great athletes like Portia Woodman [New Zealand's two-time Olympic gold winner] and Maddi Levi [Australia's World Sevens Player of the Year]. "But I have something else I can bring, which is personality." That "something else" is something else. Because Maher is a social media Jonah Lomu. Her numbers accelerate upwards, with eight million followers and counting clinging to her shirttails. While the sport's suits warn gravely about demographic collapse and the need to connect with a younger audience, a 28-year-old sevens player from a nation where rugby is barely a blip on the radar has apparently cracked it. She is the biggest rugby player ever, of either gender, online, thanks to funny, sassy posts advocating for femininity in all forms, body positivity and Olympic village flirting.

