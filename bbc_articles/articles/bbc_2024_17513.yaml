content: |-
  BBC Sport's bringing fans unrivalled access to all the action, analysis and entertainment from Germany

  The UEFA Men’s Euro 2024 is almost at a close in Germany and BBC Sport is bringing fans unrivalled access to all the action, analysis and entertainment across TV, BBC iPlayer, Radio, BBC Sounds and Online. Spain and England go head-to-head in the final in Berlin on Sunday 14 July, with kick off at 8pm BST.
  • UEFA Euro 2024 Spain v England - How to watch the final

  Broadcasting favourites Gary Lineker, Gabby Logan, Mark Chapman and Alex Scott lead coverage across TV and BBC iPlayer, broadcasting from the studio in the heart of Berlin with live match commentary from all ten host cities across Germany including Hamburg, Berlin, Gelsenkirchen, Dortmund, Leipzig, Dusseldorf, Cologne, Frankfurt, Stuttgart and Munich. The brand new BBC iPlayer Euros Channel is the place-to-be for all football fans, with build-up content including special features and matches from the Euros archive spotlighting the greatest games from the tournament. During the tournament fans can watch 27 live matches, and it’ll also be home to additional analysis, mini highlights, home nations camp reports and new highlights programme Euros Breakdown with Alex Scott which will delve deeper into the biggest matches providing exclusive match reaction and insights around the most exciting matchups. Representing England in the studio are former England internationals, Micah Richards, Wayne Rooney, Alan Shearer, Rio Ferdinand, Frank Lampard, Ellen White and Joe Hart. David Moyes, James McFadden and Rachel Corsie represent Scotland across coverage. Joining the team in the studio are two-time European Championship winner and legend of the game, former Spanish midfielder Cesc Fabregas. Brentford manager Thomas Frank joins us in the studio for England v Denmark as well as some other group matches. Ashley Williams, who captained Wales during their remarkable semi-finals run in 2016 also joins the team. Reporting on the England camp throughout the tournament is Kelly Somers. Eilidh Barbour will be with the Scotland team. On TV commentary duties there’s Guy Mowbray, Robyn Cowen, Vicki Sparks, Steve Wilson, Steve Bower and Jonathan Pearce. Joining them on co-comms are Jermaine Jenas, Danny Murphy, Martin Keown, James McFadden as well as Alan Shearer who will be in the commentary box for England’s opener against Serbia on 16 June. Mark Chapman, Kelly Cates and Steve Crossman lead live radio presentation from Germany for matches on BBC 5 Live and BBC Sounds. Radio commentary comes from John Murray, Ian Dennis, Alistair Bruce-Ball and Vicki Sparks. They’re joined by a host of former internationals with Chris Sutton, Matthew Upson, Pat Nevin, Izzy Christiansen, Conor Coady and Dion Dublin all on co-commentary. Also featuring are Theo Walcott, Clinton Morrison, Paul Robinson, Euro 2016 winner Jose Fonte, Jen Beattie, Robert Huth, Stephen Warnock and Mario Melchiot.
