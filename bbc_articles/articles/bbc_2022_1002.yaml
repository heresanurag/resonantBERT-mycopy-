title: BBC reporter covered by snow flurry while filming - BBC News
date: '2022-01-09'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-59919101
content: |-
  Laura Trevelyan's piece to camera in Washington DC is interrupted by a sudden white-out.

  BBC correspondent Laura Trevelyan got caught in a snow drift while filming in Washington DC on Monday and had "snow" way out.
