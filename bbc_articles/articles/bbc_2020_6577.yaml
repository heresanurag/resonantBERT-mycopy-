title: Coronavirus in Scotland - 'Don't attend mass gatherings' - BBC News
date: '2020-06-05'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-52838335
content: |-
  The latest updates on the coronavirus pandemic in Scotland.

  Quote Message: Nicola Sturgeon made it clear the economic forecast is pretty grim, and any recovery may be more gradual than we anticipated or hoped. She said of course it was difficult, striking a balance between tackling the virus and restarting the economy. But if the government has to re-impose tight constraints, it would not just be bad for people socialising but would be calamitous for the economy, so she said it would be a tough call. She appealed particularly to young people not to gather indoors, telling them they are not immune to the virus. Chief constable Iain Livingstone was also asked what neighbours should do if people hold house parties. He said police would take very robust action and if people spot parties happening, they should contact the police and they will sort it out."

