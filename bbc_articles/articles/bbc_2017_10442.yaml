title: 'Accrington shooting: Second murder arrest - BBC News'
date: '2017-10-26'
section: Lancashire
url: http://www.bbc.co.uk/news/uk-england-lancashire-41757657
content: |-
  A 49-year-old man is arrested and a boy, 14, remains in custody on suspicion of murdering Lee Holt.

  Lee Holt died of a single shot wound to the chest

  A second person has been arrested on suspicion of murder after a man was fatally shot in the chest.

  Lee Holt, 32, from Accrington was pronounced dead in hospital on Wednesday after police were called to Barnard Close in Oswaldtwistle at about 20:25 BST.

  A 14-year-old boy from Oswaldtwistle was arrested shortly after the shooting and remains in custody.

  A 49-year-old man was arrested on Thursday afternoon and is in custody.

  Police were called to Barnard Close in Accrington

  Lancashire Police said the investigation is ongoing.

  Det Ch Insp Jill Johnston from the Force Major Investigation Team said: "Our thoughts and condolences remain with Lee's family at this very difficult time. We have specially trained officers supporting them.

  "I would like to reassure the community that this was an isolated incident."

  She added those involved were known to each other and "we do not believe there is a wider threat to local residents."

  The police do not think it is linked to two other firearms discharges in Accrington in June, Det Ch Insp Johnston added.

  Students at Rhyddings Business and Enterprise School were told at assembly they could receive counselling and support.

  A statement from the school said: "As Oswaldtwistle is a small town, it is inevitable some students will be directly or indirectly affected by these events."

