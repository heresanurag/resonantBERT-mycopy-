title: Princess Catherine stops royal car to say hello to young fan - BBC News
date: '2025-02-02'
section: General
url: http://www.bbc.co.uk/news/videos/czep8p75x8yo
content: |-
  Catherine, Princess of Wales, has delighted a three-year-old by stopping the royal car to have a chat.

  "Hello princess," calls out three-year-old Lily-Rose outside the Corgi socks factory in Ammanford, Carmarthenshire.

  Catherine, Princess of Wales, had been at the site as part of a visit to south Wales on Thursday.

  As she approached, Lily-Rose handed the princess a toy banana.

  Stacey Chorley, Lily-Rose's mum, said: "It was so exciting, we had no idea that was going to happen."
