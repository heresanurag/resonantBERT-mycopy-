title: Bridgerton actress fights back phone theft attempt in London cafe - BBC News
date: '2025-06-13'
section: General
url: http://www.bbc.co.uk/news/videos/cz635ynjvyvo
content: |-
  Video shows the moment Genevieve Chenneour's phone is stolen from a table in a Kensington cafe.

  Watch the moment a Bridgerton actress fights back for her phone after it was stolen from her table in a London cafe.

  Genevieve Chenneour, 27, was in Joe and the Juice on Kensington High Street on 8 February where a man is seen taking her phone and assaulting a separate member of the public who confronts him.

  The Metropolitan Police were called to the cafe following reports of a theft and an assault.

  Zacariah Boulares, 18, is due to be sentenced over theft and assault charges at Isleworth Crown Court on 17 June.

