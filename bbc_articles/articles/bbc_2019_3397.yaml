title: 'André Previn: Composer and conductor remembered as ''a musical giant'' - BBC
  News'
date: '2019-03-01'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-17342940
content: |-
  Friends and fellow musicians pay tribute to "witty and brilliant" conductor and composer André Previn.

  In rehearsals for Andre Previn's Music Night on BBC TV in 1976

  Conductor and composer André Previn has been remembered as "a musical giant", "an incomparable talent" and "one of a kind" following his death on Thursday.

  The musician, whose career spanned film scores, classical and jazz, was 89.

  Conductor Leonard Slatkin said: "Versatile, witty and brilliant, he will be remembered as an outstanding musician who touched so many people."

  Ex-wife Mia Farrow said: "See you in the Morning beloved Friend. May you rest in glorious symphonies."

