content: |-
  Former TOWIE star Danielle Armstrong says she bought cannabis oil for her friend who was dying from breast cancer.

  Former TOWIE star Danielle Armstrong lost her best friend Sammy to breast cancer in May.

  She told Victoria Derbyshire she had to find a drug dealer in order to find cannabis oil to help ease her friend's symptoms.

  Watch the BBC's Victoria Derbyshire programme on weekdays between 09:00 and 11:00 on BBC Two and the BBC News Channel in the UK.
