title: West Midlands Police guns secured by seat belts - whistleblower - BBC News
date: '2024-10-15'
section: England
url: http://www.bbc.co.uk/news/articles/c39lyge9vdmo
content: |-
  The regulator was contacted by a member of the public concerned how weapons were being transported.

  The Health and Safety Executive asked West Midlands Police to carry out a review of its firearms use

  West Midlands Police teams have been strapping loaded guns into cars using seat belts, instead of secure boxes, a whistleblower has alleged. Officers have raised concerns that the public could be at risk if the cars were involved in a crash, which could lead to the guns firing. The Health and Safety Executive (HSE) confirmed that it has been liaising with the force after a member of the public contacted it. The force has confirmed that, in exceptional circumstances, standard squad cars were used instead of the armed response vehicles in which weapons are stored in secure cases.

  The HSE was contacted in July by a member of the public who was concerned how police weapons were being transported. They believed that loaded guns, in cases, had been strapped into marked police vehicles using seat belts, instead of being in purpose-built secure boxes. The member of the public said firearms officers had raised concerns about this within the force. They also asked the HSE to investigate what weapons cases were being use, as they believed some were not bullet proof. As a result, West Midlands Police was contacted by the regulator and asked to review how weapons were transported and stored. The HSE said it was satisfied further action had been taken by the force to reduce risk.

  West Midlands Police said it was continuing to liaise with the health and safety executive

  West Midlands Police said all its armed response vehicles were fitted with secure gun boxes. A force spokesperson said: "It is vital that, as the second biggest police force in the country, we have the appropriate armed response resources available across the West Midlands 24/7. "In exceptional circumstances, for example where these vehicles are off the road, another police vehicle can be used. "Firearms are then stored in a hard case and secured in an appropriate part of the vehicle. "We are continuing to liaise with the HSE following a report they received."

