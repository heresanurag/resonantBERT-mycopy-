title: 'Dame Vera Lynn: Funeral held for ''Forces'' Sweetheart'' - BBC News'
date: '2020-07-10'
section: General
url: http://www.bbc.co.uk/news/uk-england-sussex-53363853
content: |-
  The streets were lined with people wanting to pay their respects, while two Spitfires flew past.

  The funeral of wartime singer Dame Vera Lynn has taken place.

  She died in June at the age of 103.

  People lined the streets of her home town of Ditchling, East Sussex, to pay their respects to the woman who came to be known as the Forces' Sweetheart.
