  Spanish newspaper Marca reported four-time Olympic medallist Fuentes as saying she had jumped in "because the lifeguards weren't doing it". And speaking to Spanish radio, she said: "It felt like a whole hour. I said things weren't right, I was shouting at the lifeguards to get into the water, but they didn't catch what I said or they didn't understand. "She wasn't breathing. I went as quickly as I could, as if it were an Olympic final." Alvarez scored 87.6333 points for her routine, finishing seventh in the final.

