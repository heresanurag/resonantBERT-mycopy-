title: 'World Aquatics Championships: US artistic swimmer Anita Alvarez rescued by
  coach after fainting in pool - BBC Sport'
date: '2022-06-23'
section: Swimming
url: http://www.bbc.co.uk/sport/swimming/61906249
content: |-
  American artistic swimmer Anita Alvarez is rescued from the bottom of the pool by her coach after fainting at the World Aquatics Championships.

  American artistic swimmer Anita Alvarez was rescued from the bottom of the pool by her coach after fainting at the World Aquatics Championships. The 25-year-old was not breathing and had sunk after completing her routine in the solo free final in Budapest. Her coach, Andrea Fuentes, pulled Alvarez to the surface before she was taken away on a stretcher. The US swim team later released a statement from Fuentes saying Alvarez "feels good now". Alvarez previously fainted following a routine during an Olympic qualifier in Barcelona last year, with Fuentes also rescuing her on that occasion. Of the more recent incident, Fuentes said: "Anita is OK - the doctors checked all vitals and everything is normal - [her] heart rate, oxygen, sugar levels, blood pressure etc. All is OK. "We sometimes forget that this happens in other high-endurance sports [such as] marathon, cycling, cross country. We all have seen images where some athletes don't make it to the finish line and others help them to get there. "Our sport is no different than others, just in a pool, we push through limits and sometimes we find them. "Anita feels good now and the doctors also say she is OK. Tomorrow she will rest all day and will decide with the doctor if she can swim free team finals or not."

