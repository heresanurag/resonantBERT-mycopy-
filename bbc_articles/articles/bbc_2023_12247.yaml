title: Florida deputy jumps onto a speeding runaway boat - BBC News
date: '2023-08-04'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66411750
content: |-
  Dramatic bodycam footage captures a Florida deputy's daring leap onto an out-of-control vessel.

  Dramatic bodycam footage captured a deputy in Clearwater, Florida taking on a thrilling chase to stop a runaway boat, culminating in a daring leap to halt the out-of-control vessel.

  The boat's driver had fallen overboard but was safely rescued.

  After preliminary efforts to stop the boat failed, the officers matched the speed of the vessel and leapt aboard.
