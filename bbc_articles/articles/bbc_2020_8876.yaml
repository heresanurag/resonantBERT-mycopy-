  The global health organisation says the world will reach 20 million Covid-19 cases this week.

  Tourists and locals on holidaying in the UK

  BBC Radio 5 Live's Your Call programme asked listeners whether holidaying at home is good for the UK, as people head to traditional British tourist spots. In some places, local residents have complained about littering and poor social distancing. Rod and Helen Chatfield run the Varley House guest house in Ilfracombe. They have brought in extra measures to make sure they are able to offer eight rooms to guests. Rod told 5 Live that it’s meant a lot more work, including offering table service, but said they are getting plenty of bookings. “It is definitely more of a thing for us, but I think the guests what we’re doing and are very receptive to what we’re doing.” Rod chairs Ilfracombe’s District Tourism Association and says businesses are adapting. “There is a pub in this town here which only opens until 16:00 because [the landlord] is worried about social distancing within his property." Jason is on holiday in Newquay. He said he and his wife are “astonished” by the lack of space people are giving and how people are “blatantly ignoring” one-way systems on beaches. “I’m seeing lots of people take their mess away from the beaches... but still we’re seeing people walking through towns... Padstow for example, lovely place to visit, absolutely rammed. Any chance of social distancing? Not a chance.” Click here to listen back to the programme on BBC Sounds.
