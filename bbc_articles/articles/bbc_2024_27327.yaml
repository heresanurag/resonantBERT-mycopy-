  Alexander Dale is charged with sexual assault and inciting a child to engage in sexual activity.

  Man in court after sexual assault of girl, 11

  Alexander Dale, 31, is charged with inciting a child to engage in sexual activity and sexual assault by touching a girl under 13

  A 31-year-old man has appeared in court accused of two sexual crimes involving young girls. Alexander Dale, of Adamsdown, Cardiff, is accused of sexually assaulting an 11-year-old girl as she walked her dog alone in Pontprennau, Cardiff, on 25 October. He also faces a separate charge of inciting a child to engage in sexual activity following an incident involving a 15-year-old girl on a bus between Barry and Cardiff on 23 October. He entered no plea at the Cardiff Magistrates Court hearing and will appear at Cardiff Crown Court on 29 November following a full psychiatric assessment.

  Mr Dale was denied bail due to the seriousness of the allegations and was remanded in custody until the crown court pre-trial preparation hearing.
