title: 'Newspaper headlines: Trump picks VP and body found in Jay Slater search -
  BBC News'
date: '2024-07-15'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c10lq4znvejo
content: |-
  The latest from the US presidential race and the discovery of a body in Tenerife lead the papers.

  Donald Trump's decision to pick Ohio senator JD Vance as his running mate leads the Daily Telegraph

  The latest from the US presidential race features on many of Tuesday's front pages. The Daily Telegraph, external leads on Republican nominee Donald Trump's decision to pick Ohio senator JD Vance as his running mate, describing Mr Vance as a "firebrand" and an "heir to the Make America Great Again movement". It notes he was once a fierce critic of Mr Trump - who he called "cultural heroin" - but has since re-invented himself. The paper also notes that Mr Vance was one of those blaming Joe Biden's rhetoric for the attempted shooting of Mr Trump on Saturday. The Times, external reports on new polling which puts Mr Trump ahead of Mr Biden in seven key battleground states. The data suggest that, since March, Mr Trump has overtaken his rival in three swing states and increased his lead in the others. It adds the advantage is expected to widen after the attempt on Mr Trump's life. The Financial Times, external reports that shares in the group behind Mr Trump's social media site "leapt" more than 30% as traders reacted for the first time since the attack. UK Prime Minister Sir Keir Starmer's personal call to Donald Trump after the assassination attempt is covered by the i, external. It says Sir Keir overruled his advisers, who suggested sending a note instead. The paper says the call was quickly accepted and lasted 10 minutes, with Trump congratulating Sir Keir on his election win. The headline sees the conversation as a start in building "their new special relationship". The Guardian, external quotes the head of the government's new defence review saying that the UK and its allies are facing a threat from the "deadly quartet" of China, Russia, Iran, and North Korea. The paper says Lord Robertson, the former Nato secretary general, believes the UK has to be prepared to take on all four if necessary amid concerns that they are "increasingly sharing arms, components and military intelligence".

  The Daily Express, external and the Daily Mirror, external both lead on the discovery of a body in Tenerife in the search for missing British teenager Jay Slater. The Express says "dramatic video footage" shows rescue workers using a helicopter to reach a ravine where the body is believed to have been discovered. The Mirror describes the news as a "family's worst nightmare". The Royal College of Physicians (RCP) has issued guidance telling doctors to raise the issue of climate change in consultations and to use remote appointments to cut their emissions, according to the Daily Mail, external. The paper says the guidance amounts to an instruction to doctors to "lecture" their patients. The RCP has said the NHS is "responsible for around 40% of the UK’s public sector emissions and 4% of total emissions", and that doctors have a "vital role to play" in tackling climate change. And the Guardian, external also carries a report that the climate crisis is making the length of each day longer as the melting of polar ice reshapes the planet. It explains that the scale is in milli-seconds but says that is enough to potentially disrupt internet traffic, financial transactions, and GPS navigation, which all rely on precise timekeeping. It says the melting ice is redistributed nearer the equator, making the earth fatter and slowing its rotation.

