  At the time, the IDF said in response to reports of the strike that "an aircraft struck several suspects identified by IDF forces as operating in a building near troops in the Khan Younis area, a dangerous combat zone that had been evacuated of civilians in advance for their protection. The claim of harm to uninvolved individuals is being reviewed." Israel launched a military campaign in Gaza in response to Hamas's cross-border attack on 7 October 2023, in which about 1,200 people were killed and 251 others were taken hostage. At least 55,104 people have been killed in Gaza during the war, according to the territory's Hamas-run health ministry.
