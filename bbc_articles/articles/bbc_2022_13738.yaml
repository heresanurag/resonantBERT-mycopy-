title: 'Robbie Coltrane: From art to acting - BBC News'
date: '2022-10-15'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-26967084
content: |-
  Robbie Coltrane has played Hagrid in the Harry Potter films and won three Baftas for Cracker, but most people do not know that in the 60s his dreams were about art, not acting.

  He was once a student at The Glasgow School of Art, and on Wednesday he returned there to open their newest building.

  The BBC's Colin Paterson caught up with him to find out more about his early years.
