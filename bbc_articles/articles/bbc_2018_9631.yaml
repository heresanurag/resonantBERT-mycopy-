  A video timeline of the main moments in the inquiry to find midwife Samantha Eastwood.

  Here is a video of the main moments in the investigation of the disappearance of Samantha Eastwood.

  The 28-year-old midwife was last seen leaving Royal Stoke University Hospital at 07:45 BST on Friday 27 July and did not return for her night shift later that day.
