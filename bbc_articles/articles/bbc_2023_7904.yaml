title: Ron DeSantis launches 2024 White House presidential bid with Elon Musk interview
  - live updates - BBC News
date: '2023-05-24'
section: US & Canada
url: http://www.bbc.co.uk/news/live/world-us-canada-65676382
content: |-
  Florida Governor Ron DeSantis says he wants to "lead our great American comeback" with his campaign.

  Quote Message: I think DeSantis has done a stellar job in Florida and has proven to be a great leader as seen during the pandemic. I live in California where Governor Newsom is just the polar opposite. I love DeSantis's educational background - Yale undergrad and Harvard Law, you can't beat that. He is certainly qualified - and has military service, too. I believe Trump should be worried - all my friends now like DeSantis. The only thing that worries me is that DeSantis is moving too conservative regarding abortion rights to get the independent vote. Florida recently went from a 15-week abortion ban to just six weeks - that will lose a lot of independent women voters right there.

