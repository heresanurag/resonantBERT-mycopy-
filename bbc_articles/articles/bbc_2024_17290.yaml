  An inquest into the deaths of Carol Hunt and her daughters Hannah and Louise opens in Hatfield.

  Daughter texted for help before crossbow deaths

  Carol Hunt and her daughters Louise and Hannah were killed in the attack in Bushey on 9 July

  One of the daughters of racing commentator John Hunt texted for help saying she had been "tied up" during a crossbow attack at their home, an inquest has heard. Hannah Hunt, 28, her sister Louise, 25 and their mother Carol, 61, were found fatally injured at their home in Ashlyn Close, Bushey, Hertfordshire, just before 19:00 BST on 9 July. The inquest heard Mrs Hunt died from stab wounds to her chest and abdomen, while her daughters both died from crossbow bolt injuries. Senior coroner Geoffrey Sullivan was told that Hannah Hunt had managed to call the police and provide her address - before the call cut out.

  The inquest into their deaths opened at Hertfordshire Coroner's Court in Hatfield. Mr Sullivan adjourned the brief hearing on Tuesday to allow for any criminal proceeding to take place.

  Hertfordshire Coroners' Court heard that Hannah Hunt had texted for help during the attack

  Hannah Hunt texted an unnamed member of the public asking them to call the police and telling them the person responsible was still in the house, a coroner's officer said. Ms Hunt then dialled 999 and reported that she had been shot, as had her mother and sister, the 10-minute hearing was told. She gave her address before the call cut out. When officers arrived they found Ms Hunt alive in the main doorway of the home with a crossbow bolt still in her chest, the coroner was told.

  Kyle Clifford, 26, has been arrested and remains in a serious condition in hospital

  Police launched a manhunt for suspect Kyle Clifford in Hertfordshire and north London on 10 July. The 26-year-old was found injured just under 24 hours later in Enfield, north London and was arrested on 11 July on suspicion of three counts of murder. Mr Clifford remains in a serious condition and has yet to be questioned by investigators.

