  "I took eight weeks off, so it's back to work when I get back from here," she said. "A week from today, I am back to work." While it may have been a disappointing Games for TeamGB overall - this gold and the silver won by the men's curlers on Saturday their only medals - the final day will live long in the memory of Muirhead and her rink. "I'm so proud of the girls, how we played today, because if you can bring your A-game in the Olympic finals that just shows how great and what fantastic abilities we all have," Muirhead said. "To stand on the podium and get that gold medal around your neck is honestly a moment I'll never forget."
