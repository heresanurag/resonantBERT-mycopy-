  In February, his lawyers submitted nine grounds to the High Court on which they believed Ms Patel's extradition order was unlawful.

  Six were rejected outright - however, in a written judgment on Tuesday, Dame Victoria Sharp and Mr Justice Johnson said Mr Assange had an "arguable case" on their remaining grounds for appeal.

  The first two boil down to whether or not Mr Assange would have freedom of expression protections under the US constitution as a foreign national.

  The judges also accepted there are insufficient guarantees Mr Assange will not face the death penalty in the US, which his lawyers argue should have prohibited the UK government from agreeing to send him there.

  Mr Assange is not charged with any offence in the US which carries the death penalty - however, his lawyers fear he could be further charged with a treason or espionage crime in the future which does.

  In their evidence, they pointed to comments made by former US President Donald Trump - who is set to be the Republican nominee in the election later this year - which were supportive of Mr Assange receiving the death penalty.

  The US has repeatedly pointed out Mr Assange is not charged with a death penalty offence, and has previously given the courts an assurance they would allow him to serve his prison sentence in Australia if convicted.

  If the US does give further assurances in the next three weeks, a final hearing could take place on 20 May.

  "If assurances are not given then we will grant leave to appeal without a further hearing," said Dame Victoria in the court's ruling.

  "If assurances are given then we will give the parties an opportunity to make further submissions before we make a final decision on the application for leave to appeal."

  If Mr Assange's latest appeal is not granted, he will have exhausted all of his legal avenues in the UK. His remaining option would be to take his case to the European Court of Human Rights.

  Speaking to the crowd gathered outside the court, his wife Stella Assange described her husband as a "political prisoner".

  She added: "The case should have just been thrown out and Julian should not have spent a single day in prison.

  "The United States is bringing a case based on the persecution of a journalist for his political opinions."

  Mr Assange's lawyers say he faces up to 175 years in jail if he is convicted - but the US government has previously said a sentence of between four and six years is more likely.

  They took his case to the European Court of Human Rights in 2022, but it was dismissed without a hearing.

  Australia's parliament has passed a motion calling on the UK and US to release Mr Assange, though this has no legal bearing on either government.
