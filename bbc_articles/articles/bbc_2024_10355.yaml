title: 'Post Office: Fujitsu sacked top boss at height of Horizon scandal - BBC News'
date: '2024-05-19'
section: Business
url: http://www.bbc.co.uk/news/business-68936973
content: |-
  Global president Rod Vawdrey then returned to Australia and made millions in a "train wreck" float.

  Rod Vawdrey, pictured in December 2020, ringing the bell at the Australian Stock Exchange to mark the start of trading in Nuix shares

  Fujitsu, the company that built the flawed Horizon IT system, sacked a top boss at the height of the scandal. Rod Vawdrey, 67, was dismissed as Fujitsu's global president in 2014 for personal conduct issues, former colleagues say. He returned to his native Australia, where he is now being sued for his involvement in a "train wreck" stock market float which made him millions. Mr Vawdrey told the BBC he wasn't involved in the Horizon project. Mr Vawdrey had responsibility for the UK operation from 2011 to 2014 - a crucial time in the Horizon scandal. If the Horizon issue was discussed by the UK board, Mr Vawdrey must have been aware of it. Companies House filings say he was executive chairman of Fujitsu Services Ltd, the UK company and sat on its audit and corporate governance committees. At this time details were beginning to emerge in public, with MPs and journalists raising concerns. But until 2013 the Post Office was still prosecuting dozens of people every year based on evidence from the flawed branch computer system. Alarm bells were ringing internally too. In 2013, a barrister warned the Post Office that a Fujitsu employee was giving incomplete evidence in court, failing to disclose information about bugs in his witness statements. This was a crucial turning point in the story, but neither Fujitsu nor the Post Office came clean about problems with Horizon until years later, piling yet more suffering on the hundreds who had been unfairly convicted. Mr Vawdrey was the only Westerner on the main Fujitsu board, with responsibility for its operations outside Japan, including the UK which was an important market. Two well-placed former colleagues of Mr Vawdrey told the BBC that he was "terminated for cause" by the company early in 2014. This was due to personal conduct issues, not anything related to Horizon, the sources allege, including running up too many expenses. "Living high on the hog," as one put it. One described his management style as "rumbustious", sometimes shouting at colleagues - either a "bulldog" or a "bully", depending on which side you were on; the other source agreed. His tenure was relatively brief - a little more than two years - and Fujitsu's UK accounts show no record of a departure payment to Mr Vawdrey, unlike the multimillion-pound sums paid to departing bosses before and afterwards. Mr Vawdrey is not currently due to appear at the Horizon Inquiry, though it will hear from Duncan Tait, who was UK chief executive and reported to him. Foreign nationals can give evidence, but the Inquiry has no powers to compel them unless they return to the UK. After Fujitsu, Mr Vawdrey moved back to Australia and was involved in another public scandal, which left him a very wealthy man.

  After a break, Mr Vawdrey joined what was then a small Australian start-up, a software company called Nuix, and became chief executive in 2017. It was a considerable commercial success, and launched on the Australian stock exchange in December 2020, the biggest market debut of the year, and many private investors bought in. Mr Vawdrey himself took home nearly AUS$28m (£15m; $18m) in cash straight away, and was left with another AUS$8m worth of shares. However, within months the share price collapsed, leaving many investors sitting on big losses. Mr Vawdrey resigned on 15 June 2021, and the following week Australian police raided the company HQ. Last year Rolf Krolke, a former senior executive-turned-whistleblower, told an investigation by the Australian parliament that the Nuix float was a "train wreck waiting to happen". Nuix said it "rejects" his assertions. The stock exchange regulator, ASIC, is now taking Nuix and its board, including Mr Vawdrey, to court for allegedly "breaking continuous disclosure laws" and "breaching their director's duties". The case was heard last December and the court has yet to reach a decision, ASIC said. In an email statement Nuix said: "Nuix and the relevant directors have disputed the matters which are the subject of the ASIC proceeding." Mr Vawdrey said: "I'm not interested in talking to journalists about [Horizon], I wasn't involved," and gave no further comment on the detailed allegations put to him.
