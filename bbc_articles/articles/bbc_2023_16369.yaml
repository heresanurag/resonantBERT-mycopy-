content: |-
  Drone video shows the extent of the car park fire, which destroyed more than 1,400 vehicles.

  Drone video showed the extent of the damage caused by a fire at a Luton Airport car park.

  From above, mangled wreckage of the partially collapsed structure can be seen alongside damaged cars.

  More than 1,400 vehicles were destroyed in the fire, which started on level three of Terminal Car Park 2 on 10 October.

  Some have since been removed from the top deck of the building to try to stabilise it.
