title: 'Euro 2024: Gareth Southgate says England reaching final feels ''normal'' -
  BBC Sport'
date: '2024-07-12'
section: England Men
url: http://www.bbc.co.uk/sport/football/articles/c4ngjxzx9pro
content: |-
  England will appear in a second consecutive European Championship final on Sunday when they take on Spain.

  This video can not be played To play this video you need to enable JavaScript in your browser. Euro 2024: Reaching final 'feels a little bit more normal' for England - Southgate

  Gareth Southgate says England felt "perhaps less satisfaction" at reaching the Euro 2024 final compared to their Euro 2020 experience. The Three Lions' 2-1 victory against the Netherlands on Wednesday set them up for a second consecutive European Championship final. England finished runners-up at the delayed Euros in 2021, losing 3-2 to Italy in a penalty shootout at Wembley following a 1-1 draw. That was the men's first final appearance since the 1966 World Cup, and now another awaits them on Sunday when Spain will provide the opposition. Southgate has guided England to the semi-finals or further in three of his four major tournaments in charge - World Cups and Euros - without yet winning a trophy. Including fixtures decided on penalty shootouts, Southgate's England have won nine knockout games and lost three, also losing a third-place game. "There's a different feel [than 2021]. We're now in a different moment as a team, two tournaments on and a lot more big match experience," Southgate told BBC Sport. "I guess there was less of a celebration, perhaps less satisfaction at reaching a final. "I wouldn't say it becomes run of the mill but it's a little bit more normal for us. That statement in itself is probably a bit ridiculous given our history." When asked if that meant that winning was now essential, Southgate said: "Yeah, we needed to win the last one! We didn’t. What we do know is that in the end, how we’ll be viewed by others will be determined by the result on Sunday." Southgate says England will need to be "tactically close to perfect" against a Spain side that have been "excellent with and without the ball". "I’ve got to keep a professional focus. A bit of detachment from the enormity of the occasion, if you like. It would be easy to be overwhelmed by that."

  After being named the Football Association's head of elite development in 2012, Southgate was appointed England's Under-21 manager a year later. He replaced Sam Allardyce as manager of the senior team in 2016. "What that journey's taught me is what it means to English football really to have credibility on the European and world stage," said Southgate. "I know what it means to people working at every level from youth development all the way through to senior football."

  Southgate's England deal, which he extended in November 2021, is due to expire in December. The 53-year-old said he would not be discussing his future before Sunday's final. "Emotionally it would be impossible for me to make a logical decision at the moment on any of that because my sole focus for two years has been winning this tournament," said Southgate. "The last five or six weeks have been an absolute rollercoaster, so I don't really know where I am with anything other than very focused on preparing the team for this game and determined to keep leading them in the way we have over the last month."
