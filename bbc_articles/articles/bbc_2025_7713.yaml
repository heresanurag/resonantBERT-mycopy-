title: Ryan Reynolds and Wrexham players celebrate after promotion - BBC News
date: '2025-04-27'
section: General
url: http://www.bbc.co.uk/news/videos/cx251wd04kzo
content: |-
  Club's celebrity co-owner hugs players and poses for selfies after team seals historic promotion.

  Wrexham's Hollywood co-owner Ryan Reynolds hugged players and posed for selfies with their families after the team sealed a historic promotion.

  The Dragons beat Charlton Athletic 3-0 to secure their third successive promotion and a place in the Championship next season.

  Crowds raced on to the pitch at the end of the game to celebrate with the players who were also joined by Reynolds and fellow actor and co-owner Rob McElhenney.
