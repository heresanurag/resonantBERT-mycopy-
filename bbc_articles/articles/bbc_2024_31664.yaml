content: |-
  Devices rigged with explosives killed and wounded thousands of people in Lebanon.

  Ex-Israeli agents reveal how pager attacks were carried out

  Dozens of people were killed and thousands injured in the attacks

  Two former Israeli intelligence agents have revealed how members of the Lebanese Shia militant group Hezbollah used Israeli made walkie-talkies booby-trapped with explosives for 10 years before they were detonated in a surprise attack in September this year. The two ex-Mossad agents told CBS News how Hezbollah was duped into buying thousands of rigged walkie-talkies and pagers without realising they were made in Israel. Dozens of people were killed and thousands injured in the attacks. Israel said it was tailored to target only Hezbollah members, but civilians were among the victims, Lebanese officials said.

  At the time of the attack, Israel and Hezbollah were fighting a conflict which had spiralled since Hezbollah fired at Israeli positions a day after Hamas's unprecedented attack on southern Israel on 7 October 2023. On 17 September this year, thousands of pagers simultaneously exploded across Lebanon, mainly in areas with a strong Hezbollah presence. The blasts wounded or killed users and some people nearby, spreading panic and confusion. The following day walkie-talkies exploded in the same way, killing and injuring hundreds more. Israeli Prime Minister Benjamin Netanyahu admitted that Israel was responsible two months later, Israeli media reported at the time. In an interview with CBS, external, the BBC's US media partner, the two former agents divulged details of the operation. One of the agents, given the name Michael, said Mossad had concealed an explosive device inside the batteries operating the walkie-talkies, which he said would typically be carried in a vest nearer the wearer's heart.
  • None What we know about the Hezbollah device explosions

  He said Hezbollah had unwittingly bought over 16,000 walkie-talkies at "a good price" from a fake company 10 years ago. "We have an incredible array of possibilities of creating foreign companies that have no way of being traced back to Israel," Michael said. "Shell companies over shell companies to affect the supply chain to our favour. "We create a pretend world. We are a global production company. We write the screenplay, we're the directors, we're the producers, we're the main actors, and the world is our stage." The operation expanded two years ago to include pagers, CBS said. Mossad said it found that at the time Hezbollah was buying pagers from a Taiwanese company called Gold Apollo. It set up a fake company which used the Gold Apollo name on pagers rigged with explosives, without the parent company realising. CBS said Mossad put explosives inside that were powerful enough to hurt only the user. "We test everything triple, double, multiple times in order to make sure there is minimum damage," said the second agent, whom the programme called Gabriel. It said Mossad specifically chose a ringtone which would sound urgent enough for someone to check an incoming message. Gabriel said the agency duped Hezbollah into buying the pagers, making advertising films and brochures, and sharing them on the internet. "When they are buying from us, they have zero clue that they are buying from the Mossad," he said. "We make like [movie] Truman Show, everything is controlled by us behind the scene." Hezbollah had bought 5,000 of the booby-trapped pagers by September 2024, CBS reported. They were triggered from Israel when Mossad feared Hezbollah began to have suspicions, it said. The explosions caused shockwaves across Lebanon, with detonations happening everywhere the pagers were being carried, including in supermarkets. Hospitals were overwhelmed with casualties, many of whom had been maimed. Gabriel said there was a "strong rumour" that people also fell victim in front of the Hezbollah leader at the time, Hassan Nasrallah. Days later, with Hezbollah still reeling from the attack, Israel began intense waves of air strikes against Hezbollah targets, followed by a ground invasion of Lebanon. The two sides agreed to a ceasefire on 26 November. Lebanon strongly condemned the pager and walkie-talkie attacks, while the UN's human rights chief, Volker Turk, said they had left him "appalled", external. The method of attacks, he said, "violates international human rights law and, as applicable, international humanitarian law".
