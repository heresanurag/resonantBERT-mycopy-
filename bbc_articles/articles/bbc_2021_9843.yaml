content: |-
  A 40-year-old man is arrested over the death of William Leiper, whose severely burned remains were found on 4 August.

  William Leiper's body was discovered in Househill Park in Pollok on Wednesday 4 August

  A man has been charged over the death of a man, whose charred remains were found at the site of a park fire in Glasgow.

  The severely-burned body of 31-year-old William Leiper from Glasgow was found in Househill Park in Pollok on 4 August.

  Police Scotland said a 40-year-old man was arrested over the death on Friday and charged on Saturday.

  He is due to appear at Glasgow Sheriff Court on Monday.

  A police spokesman said inquiries were continuing to establish the full circumstances of Mr Leiper's death.

  They have appealed for dog walkers, joggers, cyclists or anyone in the area who may have information about the case to come forward.

