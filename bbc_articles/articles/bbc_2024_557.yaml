title: Hollesley Bay prisoner serving robbery sentence absconds - BBC News
date: '2024-01-09'
section: Suffolk
url: http://www.bbc.co.uk/news/uk-england-suffolk-67928674
content: |-
  Police want help finding Matthew Smith, 29, who is an inmate at HMP Hollesley Bay in Suffolk.

  Matthew Smith was described as 5ft 10in tall (1.78m) and of stocky build

  A 29-year-old man serving a five-year sentence for robbery has absconded from prison, police have said.

  Suffolk Constabulary said it was told at about 18:30 GMT that Matthew Smith was missing from HMP Hollesley Bay.

  The 29-year-old, previously from Worcestershire, is described as 5ft 10in tall (1.78m) and of stocky build.

  Anyone who thinks they may have seen him or knows his whereabouts is asked to contact the force.

  Hollesley Bay is a category D open prison, where inmates can typically leave the grounds during the day on licence for work or education.

