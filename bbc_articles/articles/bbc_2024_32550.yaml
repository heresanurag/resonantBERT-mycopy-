  A selection of news photographs from around the world.

  About 1,000 people took part in a re-enactment of the Battle of Austerlitz to mark its 219th anniversary. In six hours on 2 December 1805, 75,000 soldiers of Napoleon's Grande Armee defeated a Russo-Austrian force of 90,000 on fields near the town of Austerlitz, in what was then the Austrian empire.
