  The BBC has identified at least 30 demonstrations being planned by far-right activists around the UK over the weekend, including a new protest in Southport. An extra 70 prosecutors are on standby this weekend to charge people arrested in connection with violent disorder. Shadow home secretary James Cleverly called on Sir Keir and the home secretary to "do more" to restore public order and "send a clear message to the thugs". Earlier this week, the prime minister announced a new national violent disorder programme to help clamp down on violent groups by allowing police forces to share intelligence. With additional reporting by BBC News reporters across England.

