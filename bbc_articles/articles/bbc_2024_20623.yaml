title: More than 90 arrests made after unrest breaks out at protests - BBC News
date: '2024-08-04'
section: UK
url: http://www.bbc.co.uk/news/articles/c0jqjqxl3dyo
content: |-
  Buildings are burned and police officers attacked after protests linked to far-right groups become violent.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Clashes and burning cars at protests in UK

  More than 90 people were arrested after demonstrations organised by far-right groups descended into riots in UK towns and cities on Saturday. There was unrest in Hull, Liverpool, Bristol, Manchester, Stoke-on-Trent, Blackpool and Belfast, with missiles thrown, shops looted and police attacked in some places. Other smaller demonstrations elsewhere did not turn violent. Prime Minister Sir Keir Starmer has pledged to give police forces the government's "full support" to take action against "extremists" attempting to "sow hate". Tensions have been high after the killing of three young girls at a Taylor Swift-themed dance party in Southport, Merseyside, on Monday.

  In Liverpool, bricks, bottles and a flare were thrown at police, one officer was hit in the head when a chair was thrown, and another was kicked and knocked off his motorbike. Around one thousand anti-immigration protestors, some of whom were shouting Islamophobic slurs, were confronted by counter-protesters. A few hundred anti-fascist demonstrators gathered near Liverpool’s Lime Street station at lunchtime, calling for unity and tolerance, chanting “refugees are welcome here” and “Nazi scum, off our streets”.
  • None Follow live: Disorder breaks out in towns and cities across England Police in riot gear with dogs struggled to keep the two sides apart and reinforcements were called to try and maintain order. The unrest continued into the early hours of Sunday morning, with fireworks launched towards police officers wearing riot gear. A library was set on fire in the Walton area of the city and rioters tried to prevent firefighters from putting it out, Merseyside Police said. Shops were broken into and a number of wheelie bins were set on fire, it added. The force confirmed a number of officers had been injured in what they described as "serious disorder", adding that two had been taken to hospital - one with a suspected broken nose and one with a suspected broken jaw. It said 23 people had been arrested. Assistant Chief Constable Jenny Simms said: "The disorder, violence and destruction has no place here in Merseyside, least of all after the tragic events that took place in Southport on Monday". “Those who engaged in this behaviour bring nothing but shame to themselves and this city. "

  More protests are expected on Sunday, though not as many as on Saturday. At a meeting of government ministers earlier on Saturday, a spokesperson for Sir Keir Starmer said the PM told those assembled that "the right to freedom of expression and the violent disorder we have seen are two very different things." He added: "there is no excuse for violence of any kind and reiterated that the government backs the police to take all necessary action to keep our streets safe". On Saturday, the home secretary also warned that anyone engaging in "unacceptable disorder” would face imprisonment and travel bans amongst other punishments, adding that "sufficient" prison places had been made available. "Criminal violence and disorder has no place on Britain's streets," Yvette Cooper said. Police have the government's full backing in taking action against those engaging in "thuggery", she added.

  Police in Liverpool were able to create a buffer zone between groups of protesters

  In Bristol, protesters and counter-protests were engaged in a standoff. One group could be heard singing Rule Britannia, "England 'til I die" and "we want our country back". Beer cans were thrown at the anti-racism group, and some of the rival protesters were baton-charged by officers. Avon and Somerset Police said 14 people in the city had been arrested, with Chief Inspector Vicks Hayward-Melen anticipating there would be "further arrests over the coming days". In Manchester, there were scuffles with police, and at least two arrests. While in Belfast, two people were arrested as protesters outside a mosque threw objects at members of the media and earlier smashed windows in a cafe.

  A police officer speaks to a man as people protest in Nottingham's Market Square

  In Bristol, officers on horseback lined up to protect a hotel housing asylum seekers from a demonstration

  In Hull, protesters smashed a window at a hotel used to house asylum seekers, and bottles and eggs were thrown at police. City Hall was placed on lockdown as the British Chess Championships took place inside. Humberside Police said three police officers had been injured and 20 people arrested after disorder in the city centre also saw shops ransacked and items set on fire.

  Police officers in Manchester worked to keep groups of demonstrators apart

  Burning shoe boxes outside a ransacked Shoezone shop in Hull during the disorder

  In Blackpool, protesters faced off against punks attending Rebellion Festival. There was little police presence as skirmishes broke out between the two groups, with bottles and chairs thrown. Lancashire Police said it had arrested more than 20 people. The force said its focus had been on Blackpool but there had also been "minor disruption" in Blackburn and Preston. In Stoke-on-Trent, bricks were thrown at officers. Staffordshire Police said that two men at the centre of online claims they had been stabbed had actually been hit by an object that was thrown, and were not seriously injured. The force said 10 people had been arrested and three officers suffered minor injuries. Elsewhere Leicestershire Police arrested two people in Leicester city centre. And West Yorkshire Police said a protest on the Headrow in Leeds "passed off largely without incident", despite one arrest being made. Not all demonstrations held across the UK descended into violence on Saturday, and in some places protesters dispersed by the evening. Saturday's protests follow a night of violence in Sunderland on Friday, which saw four police officers hospitalised. Hundreds of people rioted, beer cans and bricks were thrown at riot police outside a mosque and a Citizens Advice office was torched. Twelve people have been arrested in connection with the violence.

