content: |-
  The gates to Glastonbury Festival have opened for the 2024 celebration of performing arts and music.

  Glastonbury Festival organiser Emily Eavis has unbolted the green gates to Worthy Farm.

  She led festival-goers in a countdown before they surged on to the field in the hopes of securing a prime camping spot.

  This year’s event will see headline performances from global stars including pop singer Dua Lipa, British rock band Coldplay and American soul singer SZA, while Canadian country star Shania Twain will play the coveted Legends slot.
