content: |-
  Tom Daley announces his retirement from diving after winning a silver medal at the Paris Games.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Five-time Olympic medallist Tom Daley has confirmed his retirement from diving. The 30-year-old won silver alongside Noah Williams in the men's synchronised 10m platform in Paris to complete his set of medals, now with one of every colour. Daley, who first competed in the 2008 Games at the age of 14, won bronze in London 2012 and in Tokyo in 2021 in the 10m platform, as well as bronze in the men's synchronised 10m platform in Rio 2016. He won gold in the synchronised 10m platform with Matty Lee in Tokyo and had effectively retired after those Games, before deciding to return for Paris in order to compete in front of his two children. "I'm really happy with how everything's gone," an emotional Daley told the BBC's Meghan Owen as Team GB arrived back in London from Paris. "It's always hard when you say goodbye to your sport. Lots of things to process, but I think it's the right time. This year felt like such a bonus and I got to compete in front of my family, my kids. I got to be flagbearer. So yeah, bucket list ticked off on every occasion." Asked what he has in store for retirement, Daley said: "I want to be with my family. I'm really excited to be able to spend some time with them and just be able to feel a bit normal for a couple of days."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  After fulfilling a lifetime goal of winning gold in Tokyo in 2021, Daley took two years out of diving. But he was persuaded to return to the pool when his son Robbie, now aged six, said he wanted to see his dad dive at an Olympic Games. Daley's husband Dustin Lance Black, Robbie and their youngest son Phoenix were in attendance as he won silver alongside partner Williams. Daley said he had decided before the Games that his appearance in Paris would be his last. "It was emotional at the end, up there on the platform, knowing it was going to be my last competitive dive," Daley told Vogue., external "But I have to make the decision at some point, and it feels like the right time. It's the right time to call it a day." Daley competed in five Games and he retires as Team GB's most decorated diver in Olympic history.

  Daley is Team GB's most decorated diver in Olympic history
