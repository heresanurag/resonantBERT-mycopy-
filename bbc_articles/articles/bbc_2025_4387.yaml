title: Houthi missile fired at Israel intercepted as fresh air strikes hit Gaza -
  BBC News
date: '2025-03-20'
section: Middle East
url: http://www.bbc.co.uk/news/articles/czed9y97z4go
content: |-
  A ballistic missile was fired toward Ben Gurion Airport near Tel Aviv, with sirens sounding in several areas of Israel.

  The Houthis say they are acting in support of the Palestinians in the war between Israel and Hamas in Gaza

  Yemen's rebel Houthi group has said it has fired a missile at Israel, which was intercepted. The ballistic missile was fired toward Ben Gurion Airport near Tel Aviv, the group's military spokesperson said in a televised statement. Sirens sounded in several areas of Israel, the Israeli Defense Forces said. No injuries have been reported and the IDF says the missile was stopped before entering Israel. Meanwhile, Gaza's Hamas-run civil defence agency said Israeli strikes early on Thursday have killed at least 10 people. Israel has extended its ground operations in Gaza, after launching a wave of air strikes that the Hamas-run health ministry says killed more than 430 people in two days.

  The air strikes on Thursday reportedly targeted six homes east of Khan Younis, a spokesman for the Hamas-run civil defence agency said, and also injured dozens of people. "A missile launched from Yemen was intercepted by the IAF prior to crossing into Israeli territory. Sirens were sounded in accordance with protocol," the Israeli military said in a statement, referring to its air force. The Houthi group have vowed to retaliate, including against Israel, after the US carried out deadly strikes against them in recent days. The Iranian-backed rebel group, which considers Israel its enemy, controls Sanaa and the north-west of Yemen, but it is not the country's internationally recognised government. The Houthis said they are acting in support of the Palestinians in the war between Israel and Hamas in Gaza. US President Donald Trump has warned Iran that it will face "dire" consequences if Yemen's Houthis continue to attack international shipping lanes. The Pentagon said it had struck 30 targets in Yemen since Saturday, in the biggest US military operation in the Middle East since Trump returned to the White House. The Houthi group first tried to attack the USS Harry S Truman in the Red Sea on Sunday following deadly US strikes on Yemen. The Israel Defense Forces (IDF) said troops had moved in up to the Netzarim Corridor, which divides the north and south of the Gaza Strip. The renewed assault on Gaza marks the end of the fragile ceasefire deal that had been in place since January. Earlier, the UN said two people - including one of its staff - had been killed after an explosion at its compound in Deir al-Balah. The 7 October 2023 attack by Hamas on Israel saw about 1,200 people killed and the capturing of 251 hostages - 25 of whom were released alive during the first phase of the ceasefire. Israel responded with a massive military offensive, which has killed more than 48,500 Palestinians, the Hamas-run health ministry says, as well as causing large-scale destruction to homes and infrastructure.
