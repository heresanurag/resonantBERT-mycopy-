  The Hollywood actor dons silk pyjamas and a crocheted cardigan to read Tiddler by Julia Donaldson.

  Hollywood actor Jason Momoa donned silk pyjamas and a crocheted cardigan to read Julia Donaldson's book Tiddler, for CBeebies Bedtime Stories.

  The popular children's story is about "a little fish with a big imagination".

  Momoa is the latest in a long line of celebrities reading the stories for young audiences (and their parents and carers).

  Other recent big names include actors Tom Hardy and David Tennant, exercise guru Mr Motivator and Spice Girl Geri Halliwell Horner.

  Momoa's episode also airs on the same day the Aquaman film sequel is released in cinemas.

  The story will be broadcast on Friday at 1850 GMT.
