  One airline trade body says testing people before they travel - an idea known as "pre-departure testing" - was becoming the "international norm" and should be adopted in the UK too "as soon as practically possible".

  "Aviation is at a critical juncture and we have no time to lose," added Airlines UK's chief executive, Tim Alderslade.

  Many industry figures also called for the taskforce to bring in changes - rather than just recommendations - within weeks.

  A joint statement from the CEOs of Easyjet, Heathrow, Manchester Airports Group (MAG) and Virgin Atlantic said a testing regime must be in place by early November because without "rapid" action, "the UK will fall even further behind our competitors and the economic recovery will fail to get off the ground".

  Almost 900 jobs are at risk at MAG's three UK airports - Manchester, London Stansted and East Midlands Airport - after the pandemic resulted in the "toughest summer ever".

  Shadow transport secretary Jim McMahon said the government had been "incompetently slow to react".

  "They've had months to set up a taskforce, months to look into airport testing and months to sort out the flaws of their quarantine proposals," the Labour MP added.

  He also called for a financial support package for the aviation sector.
