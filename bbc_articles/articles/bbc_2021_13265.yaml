  A selection of your pictures of Scotland sent in between 8 and 15 October.

  The lighthouse family: "We decided to take an end of season trip to the Bass Rock as our four-year-old had suddenly become interested in coastal birds", says Andy Gillies. "It was a great trip - the light and the gannets were spectacular."
