title: Basel hopes for diversity and inclusion at Eurovision amid tensions - BBC News
date: '2025-05-12'
section: Europe
url: http://www.bbc.co.uk/news/articles/c331ndp780xo
content: |-
  The city at the crossroads of France, Germany and Switzerland gears up amid global tensions over diversity and inclusion.

  Swiss host city Basel promises 'everyone is welcome' at Eurovision

  Executive head of production Tobias Aberg is preparing St. Jakobshalle in Basel for the 2025 Eurovision Song Contest

  The Swiss city of Basel is going into party mode this weekend, as it prepares to welcome the Eurovision Song Contest. It's been 36 years since Switzerland last hosted the contest, after Celine Dion won in 1988, so the wait to roll out Eurovision's famous turquoise carpet has been long. Switzerland hosted the first ever Eurovision at Lugano in 1956, but its record since Dion's victory in Dublin has been mixed. Between 2007 and 2010, and again between 2015 and 2018, its entries failed to even qualify for the final. Swiss singer Nemo finally won last year with The Code.

  The Swiss broadcaster, SRGSSR, has put up posters emphasising unity

  Perhaps because of that, Basel is determined to make this contest memorable for all the right reasons. At 1.3km (0.8 miles), its turquoise carpet will be Eurovision's longest ever, stretching from Basel town hall, across the river Rhine all the way to the Eurovision village. The head of Basel's government, Conradin Cramer, believes his city of just 175,000 residents is the natural home for Eurovision's estimated half a million visitors. Because of its borders with both France and Germany, Basel is "the heart of Europe", he says. What's more, he points out, the city has a long humanist tradition; when other cities in medieval Europe were cracking down on free thinkers, Basel welcomed them. So Basel, with its geographic location and its history of tolerance, and Eurovision with its tradition of inclusivity and diversity are, he says "the perfect match".

  Last year's contest in Malmo attracted thousands of pro-Palestinian demonstrators and further protests against the war in Gaza are expected in Basel too. Police have not yet released their plans to manage this, but have said that everyone should have the right to express their opinion, as long they stay within the law, and do not risk the safety of others. Throughout the contest they say 1,300 officers will be on duty. Basel has also unveiled a security operation to ensure visitors can enjoy the song contest safely. They are promising "mobile awareness teams", safe retreats for victims of violence or hostility and a 24-hour hotline. The concept, which Basel officials describe as unique, aims to prevent violence, sexual assault or harassment, and racist aggression and insults. The awareness teams, recognisable by their pink jackets, will be available 24 hours a day across the city. Basel's security director Stephanie Eymann said the teams were a "low-threshold" measure to give visitors a chance to report harassment or assaults, and seek protection, even if some might not want to approach the police. The entire town appears to have embraced the event, with turquoise welcome flags now waving from every lamp post. Tickets for the contest itself sold out in minutes, but Basel is promising that there will be "something for everyone", ticket or no ticket, and most of it will be free. "There will be concerts all over the city, there will be art projects," says tourism director Letizia Elia. Basel has 40 museums and galleries in a space of just 37 square kilometres, a record for a European city, and they are all getting involved. An exhibition featuring works by Andy Warhol, Mark Rothko, Wassily Kandinsky, and Pablo Picasso has opened at the Beyeler Foundation, where Swiss artist Ugo Rondinone's We are Poems rainbow sculpture sits on the roof. There's also a Glitz and Glam exhibition at Basel's museum of natural history. The celebrations have spread across Switzerland, with competitions across the country for the best school band – the top four will get a spot on stage in Basel.

  Head of Basel's government, Conradin Cramer, Raphael Bouvier, curator of the Beyeler foundation, Basel tourism director Letizia Elia. Diana Segantini, of ESC's public value section present an exhibition on Eurovision

  But hosting an event like Eurovision is never hitch-free, and this one is no exception. The final choice of Basel as a venue was only made at the end of August last year, allowing just over seven months to organise everything. Then came objections from evangelical Christian groups, who claimed Eurovision undermined traditional family values and that performers regularly sang about satanism and the occult. They gathered enough signatures to force a referendum aimed at banning public money for the event. But on 24 November voters gave a huge yes to the song contest; with 66.6% approving Basel's budget of almost $40m. Conradin Cramer had expected a referendum, because "that's how Switzerland works, it's perfectly fine." But he was still delighted at the size of the vote in favour: "It shows this is a city where people really want to do this." He is very conscious that the global debate around diversity and inclusion has changed in the year since Swiss singer Nemo became the first non-binary person to win Eurovision. The overriding message of Basel, Mr Cramer says, is "everyone is welcome".

  Last year's winner Nemo was greeted by fans offering non-binary flags upon their return to Switzerland

  On-stage and in the dressing rooms though, things are stricter. EBU, which runs the contest itself, has stuck to its rules saying performers can only bring their own national flags onstage or into the green rooms. This means that they will not be able to fly the Pride flag or that of any other gender identity or sexuality. Fans, however, will be able to bring whatever flags they like into the arena. Last year Swiss winner Nemo did wave a non-binary flag during the performance, but said they had to 'smuggle' the flag in. This year LGBTQ+ groups say they are disappointed the EBU has not relaxed the rules. "Banning our symbols is a slap in the face for the LGBTIQ community', said Swiss group Pink Cross. "It sends the wrong message at a time when queer communities across Europe are facing increasing hostility." EBU has said that the guidelines were designed to create clarity and balance explaining: "Eurovision needs no flag to demonstrate its alliance and celebration of the LGBTQ+ community." Across the Atlantic, Donald Trump's administration is actively removing government support for diversity and inclusion measures, and he is asking partnered European institutions (including some Swiss universities) to do the same. That's why Basel, says Mr Cramer, should take a stand, even if the EBU will not. "These are our European values. People and nations are coming together in a friendly championship. Whoever you are, if you are young, if you are not that young, if you are straight, if you are gay, if you are female, male, or if you are non-binary, this is all perfectly fine. And I think this is not just what Basel stands for, this is what Europe should stand for." So if everyone is welcome, how do they get there? The host country being Switzerland, punctual transport is catered for. Swiss railways is laying on hundreds of extra trains. In Basel, the trams will run 24 hours a day. And, for those who are really in Eurovision mode, there is even a karaoke tram, where passengers can take a free 90-minute journey right across town, all the while singing their hearts out.
