content: |-
  The UK PM announced a "conditional plan" to reopen society as the coronavirus lockdown continued, on 10 May.

  When the UK began its lockdown, photographer Tom Skipp had been due to visit his mother, who lives in a care home about four hours' drive from him.

  No longer able to travel, he decided instead to photograph the many rainbows that had sprung up in and around Bristol.

  "Millie, Sophia and Maddie coloured the bricks all the way across their adjoining houses," Skipp said. "It made it look like one home, bringing them together." Image caption: "Millie, Sophia and Maddie coloured the bricks all the way across their adjoining houses," Skipp said. "It made it look like one home, bringing them together."

  "When Finn found out that somebody wanted to take a photo of him in the window he had created, he was very excited," Skipp says. "He asked if it would be OK if he dressed up as a superhero. I was greeted by Spider-Man." Image caption: "When Finn found out that somebody wanted to take a photo of him in the window he had created, he was very excited," Skipp says. "He asked if it would be OK if he dressed up as a superhero. I was greeted by Spider-Man."

  Toby and Lara are still going to school, Skipp explained, because their mum is a doctor. "When I met them after the school day, they were really tired because they had been doing 'sports' all day. They lit up when they got to the window - they worry about their mum working in the NHS." Image caption: Toby and Lara are still going to school, Skipp explained, because their mum is a doctor. "When I met them after the school day, they were really tired because they had been doing 'sports' all day. They lit up when they got to the window - they worry about their mum working in the NHS."

