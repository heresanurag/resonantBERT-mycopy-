content: |-
  Footage of a fracas at the airport's Terminal 2 building in July last year was widely shared online.

  Two brothers have denied assaulting police officers in a disturbance at Manchester Airport. Footage of a fracas at the airport's Terminal 2 building on 23 July last year was widely shared online. Mohammed Fahir Amaaz, 20, and Muhammad Amaad, 25, from Rochdale, pleaded not guilty when they appeared at Liverpool Crown Court earlier. A trial, expected to last three weeks, has been scheduled at the same court on 30 June.

  The court heard Mr Amaaz is alleged to have assaulted PC Zachary Marsden and PC Lydia Ward at the terminal's car park paystation, causing them actual bodily harm. He is also accused of the assault of PC Ellie Cook in the same incident and assaulting a member of the public earlier at a nearby Starbucks cafe. Mr Amaad is alleged to have assaulted PC Marsden, causing actual bodily harm. Both men, of Tarnside Close, had their unconditional bail extended after they entered not guilty pleas.

