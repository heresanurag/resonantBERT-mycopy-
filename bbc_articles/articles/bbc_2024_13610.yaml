content: |-
  Americans voice strong opinions on the sparring between Joe Biden and Donald Trump.

  Watch parties were held in venues across the US as millions tuned in to the presidential debate.

  In Arizona, California and Michigan, voters gave their opinions on how Joe Biden and Donald Trump performed.
