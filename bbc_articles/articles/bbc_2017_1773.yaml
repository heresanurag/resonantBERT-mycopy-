title: How virtual reality is transforming art - BBC News
date: '2017-02-03'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-38852720
content: |-
  Virtual reality is offering artists the chance to express themselves in ways that were unimaginable just a few years ago.

  London's Royal Academy's been showcasing the work of three pioneering artists.

  The BBC's Karin Giannone went along to immerse herself in the creative possibilities of the future.
