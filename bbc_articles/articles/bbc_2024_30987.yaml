title: 'Kyran Durnin murder: Man arrested and questioned found dead - BBC News'
date: '2024-12-17'
section: Europe
url: http://www.bbc.co.uk/news/articles/cm2ev0el91go
content: |-
  Kyran, who was six when last seen alive, was reported missing from his home in County Louth in August.

  A man arrested on suspicion of the murder of Kyran Durnin in the Republic of Ireland is believed to have died. Gardaí (Irish police) and emergency services found the body of 36-year-old, named locally as Anthony Maguire, at his home in Drogheda shortly before midday on Tuesday. Kyran, who was six when last seen alive, was reported missing from his home in Drogheda in County Louth in August. In October, gardaí launched a murder investigation, saying they were treating Kyran as missing, presumed dead.

  A man and a woman have both been arrested on suspicion of murder before later being released without charge. Gardaí have confirmed on Tuesday they were "alerted following the discovery of a body of a male aged in his 30s". "The local coroner has been notified and a post-mortem examination will be arranged," a gardaí spokesperson said. "The outcome of the post-mortem will determine the course of the investigation."

  Last week, a search of a home in Drogheda was supported by a cadaver dog

  Although the missing person inquiry began in August, detectives believe Kyran may have been killed more than two years ago. Kyran was a pupil at the national [primary] school near his home in Dundalk in 2022. It is understood authorities were told he would be moving to Northern Ireland and attending a new school in Newry. School officials in Dundalk, where Kyran lived with his mother, were reportedly told at the end of the 2022 summer term that he would be attending school over the border – but that claim was not confirmed. Investigating gardaí carried out searches at two houses in Drogheda last week in order to find any information on Kyran's whereabouts or what happened to him. The search one of the houses was supported by a cadaver dog. Gardaí said that the house and gardens would involve an intrusive search, as well as technical and forensic examinations. The results of the searches have not been made public.

  Kyran Durnin and his mum were reported missing in August. She was located but the young boy wasn’t, and police now believe the child disappeared over two years ago. Mandy McAuley follows the trail back to the last reported sightings of Kyran, and searches for explanations to the pressing question: how could two years pass before anyone noticed the six-year-old was gone?
