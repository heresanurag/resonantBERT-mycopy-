  Johnstone replied: "In line with long-standing convention and in common with my predecessors I do not give reasons for selection decisions. "I consider each question lodged carefully and in line with published criteria. There are many important questions submitted each week." In a heated exchange, she said she did not expect challenges to her "authority", adding that members had opportunities throughout the week to raise the issue. After Ross repeatedly shouted out "when" from his seat, Johnstone rebuked him. "You are an experienced member of this parliament and I am sure you are wholly aware of the opportunities that are available to you," she said. Ross then raised another point of order, asked the presiding officer what opportunities he would have to raise the issue as she had "refused" his party's previous requests for questions in the chamber. She replied: "I have explained the situation quite clearly. I am not sitting here explaining matters that you understand wholly thoroughly."
