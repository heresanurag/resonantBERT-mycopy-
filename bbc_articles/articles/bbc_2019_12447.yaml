id: bbc_2019_12447
title: Republican Congress members storm impeachment hearing - BBC News
date: '2019-10-23'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-50161376
content: |-
  They demanded to hear the closed-door impeachment deposition of a Department of Defense official.

  Department of Defense official Laura Cooper was giving testimony behind closed doors as part of the ongoing impeachment inquiry.

  House representatives barged into the deposition and demanded they be allowed to see the closed-door proceedings.
