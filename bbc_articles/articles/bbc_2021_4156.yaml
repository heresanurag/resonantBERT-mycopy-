title: 'Prince Philip funeral: Royal Family members walk behind coffin - BBC News'
date: '2021-04-17'
section: General
url: http://www.bbc.co.uk/news/uk-56783931
content: |-
  The Duke of Edinburgh's four children were among those following him to St George's Chapel.

  The Duke of Edinburgh's four children, and three of his grandchildren including Princes William and Harry, were among the mourners as his coffin was transported to St George's Chapel in a modified Land Rover.
