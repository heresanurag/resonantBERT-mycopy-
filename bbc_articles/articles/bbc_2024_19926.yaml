title: 'Everton: Maupay responds to fans who verbally abused players - BBC Sport'
date: '2024-08-26'
section: Everton
url: http://www.bbc.co.uk/sport/football/articles/cz07n1rrgedo
content: |-
  Everton striker Neal Maupay responds to a group of supporters who verbally abused Toffees players at London Euston station.

  'Imagine another job where it's normalised to get abuse'

  Neal Maupay has not played a competitive game for Everton since August 2023

  Everton striker Neal Maupay has responded to a video showing a group of supporters verbally abusing Toffees players at London Euston train station. The video shows fans shouting and swearing at several players as they walked past on Saturday following Everton's 4-0 defeat at Tottenham. Maupay, who was an unused substitute at the Tottenham Hotspur Stadium, responded to the video on X, writing: "Imagine another job where it's normalised to get abuse like this. "Hanging around at a train station to scream at men who are trying their best." The video also shows some fans high-fiving players. A number of Everton fans have criticised the behaviour of the supporters in the video. The Everton Fans' Forum said: "We echo those condemning the scenes at Euston Station on Saturday. "The behaviour was conducted by a very small minority and put Evertonians in the spotlight for all the wrong reasons. "We will continue to support the fans, some of whom form part of the forum, in working to raise a positive pre-match atmosphere in the stands with the overall aim of best assisting the players on the pitch."

  Everton are bottom of the Premier League after losing 3-0 to Brighton on the opening day before Saturday's defeat in north London. It is the first time in the club's history that they have lost their first two games of the season by three or more goals. Maupay, 28, joined Everton from Brighton for £15m in the summer of 2022 but has scored just one goal in 32 appearances in all competitions. The Frenchman spent last season on loan at Brentford, where he scored eight goals in 31 games. The Toffees rejected a loan offer from Marseille for Maupay earlier this month.

  Following Maupay's comments, BBC Sport asked Everton fans for their views on the incident and the striker's remarks. While many noted that they understood the frustrations of their fellow supporters, the abuse aimed at the players was widely condemned. Dave: Everton fans have had an incredibly rough few years and I can understand why a section of the fanbase are reacting to our horrible start to the season, but big picture - we ARE course-correcting, albeit slowly. Mark: There can be no excuse for swearing at and abusing your own team's players. How can you call yourself a fan and do that? Ian: Abuse is never acceptable in any shape or form. Fans have to accept that players will have a bad day at the office. But get over it, it's only a game. I understand fans have an investment in the club and spend huge amounts following the team. But if you can't handle your emotions then stay away from the players after games. CS: It's disgusting and embarrassing for our club. However, it's a very small minority of fans and Maupay should be concentrating on his game rather than spending hours on social media criticising fans while taking tens of thousands each week. David: A lot has gone wrong at Everton over many years and the part played in that by some of our 'fans' toxic behaviour needs to stop.
