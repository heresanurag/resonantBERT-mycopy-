title: 'Lisburn: Care home firm fined £50k after woman''s death - BBC News'
date: '2024-11-20'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cy872ppryp2o
content: |-
  Mary ‘Pat’ Thompson needed the help of two carers to move but fell while in the care of just one.

  Mary ‘Pat’ Thompson, who was 89, needed the help of two carers but fell while being cared for by just one

  A health care company has been fined £50,000 after the death of an elderly resident who fell off the edge of her bed in a County Antrim care home. Mary ‘Pat’ Thompson was receiving personal care at Rose Lodge Nursing home in Lisburn on 18 May 2020 when she was left sitting unattended on her bed. The 89 year old suffered multiple injuries when she fell forwards onto the floor. She died days later in hospital. The care home's previous owner, Harmony CCS Limited, which is based in Belfast, was prosecuted and pleaded guilty to a single health and safety breach.

  In a statement, the company said its directors wished to express their "sincere apologies" to Mrs Thompson's family, adding that their "deepest sympathies" are with the family. "Pat was a lovely person and a much loved resident and we remain deeply sorry and saddened by the incident," the statement added.

  The accident was investigated by the Health and Safety Executive for Northern Ireland (HSENI). It found that Mrs Thompson had care plans in place which indicated she required the assistance of two carers in order to stay safe while being moved. However, the care plans provided no formal indication about the level of assistance Mrs Thompson required while she was having personal care. On the day of the fall, a junior staff member was directed by a senior staff member to provide personal care for Mrs Thompson on her own. "As a result, Mrs. Thompson was moved by one carer and left unattended at the edge of the bed from which she fell," a HSENI statement said. Speaking after the court hearing, HSENI inspector Kiara Blackburn said: “Care plans must identify the specific care needs of each resident and should be followed by all care staff."

  The current owners of Rose Lodge Nursing Home, who purchased the home in 2021, after the incident took place, said in a statement that they wished "to express their sympathy for the family" of Mrs Thompson.
