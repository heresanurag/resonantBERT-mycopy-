title: All Southport victims treated at Alder Hey discharged - BBC News
date: '2024-08-07'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/c7033y4yxdyo
content: |-
  All children admitted to Alder Hey Children's Hospital have now been safely discharged.

  Flowers, balloons and tributes have been left near the scene since the killings

  All children injured in the knife attack in Southport who were treated at Alder Hey hospital have been discharged. Three girls were killed when a knifeman entered a Taylor Swift-themed holiday club on 29 July and began stabbing those inside. Ten people, including two adults, were also seriously injured and taken to hospitals across Merseyside. Alder Hey confirmed that all children admitted to its site with injuries linked to the attack had now been safely discharged.

  Elsie Dot Stancombe, Alice da Silva Aguiar and Bebe King were killed in the Southport attack

  It said in a statement: "We would like to take this opportunity to thank all those involved in responding to the incident or caring for anyone affected by it, especially our colleagues in the NHS, Merseyside Police and North West Ambulance Service. "We also want to say thank you to all who sent well wishes to Alder Hey and to the families affected. "Our heartfelt sympathies remain with all those impacted by last week’s tragic events." It was initially thought all children injured in the attack had been discharged, but Merseyside Police clarified one child was still under hospital care at a different site on Merseyside. Bebe King, six, Elsie Dot Stancombe, seven, and Alice da Silva Aguiar, nine, were killed during the attack in a studio in Hart Street. Yoga teacher Leanne Lucas, 35, had arranged the workshop and was severely wounded.

  Her cousin Chris Rimmer called her a "hero" and said she had "shielded two girls". Jonathan Hayes, who runs a business next door, was also stabbed in the leg after rushing to help. On Monday, Merseyside Police Chief Constable Serena Kennedy said some of her officers had been "completely traumatised" by what they experienced that day. But they were also struggling to come to terms with the outbursts of violent disorder in Southport, Liverpool city centre and Walton in the days that followed. More than 80 police officers were injured responding to the violence, and Ms Kennedy said some had told her they had feared they would not make it home to their families. Axel Muganwa Rudakubana, 17, has been charged with three counts of murder and 10 counts of attempted murder. Rudakubana, from Banks, is next due to appear at Liverpool Crown Court on 25 October for a pre-trial preparation hearing.
