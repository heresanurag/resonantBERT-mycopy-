title: Watch Liz Truss step down as PM - BBC News
date: '2022-10-20'
section: General
url: http://www.bbc.co.uk/news/uk-63328193
content: |-
  Just five weeks after arriving at Downing Street, Liz Truss announces she is stepping down from the job.

  Liz Truss has been in office for just 45 days - the shortest tenure of any UK prime minister.

  She said she could not deliver the mandate she was elected on and had notified the King that she was resigning as Tory leader.

  There will be a Conservative leadership election to be completed within the next week, she says.
