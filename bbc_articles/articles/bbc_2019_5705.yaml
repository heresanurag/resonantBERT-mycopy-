title: Funeral of Celtic great Stevie Chalmers is held - BBC News
date: '2019-05-08'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-48200572
content: |-
  Footballers past and present are among the mourners at the funeral of Celtic's 1967 European Cup-winning goal scorer.

  Crowds gathered at Celtic Park as the funeral procession made its way past the stadium

  The funeral of Stevie Chalmers, who scored Celtic's winning goal in the 1967 European Cup final, has been taking place in Glasgow.

  Members of his family were joined by footballers past and present at St Mary's Church, Calton.

  The funeral cortege then made its way to Celtic Park, where hundreds of fans gathered, before a private cremation.

  Chalmers was in the Celtic team that beat Inter Milan to become the first British club to lift the European Cup.

  Fans threw team scarves and strips as the hearse passed by

  Hundreds of messages have been left at Celtic Park

  The Scotland forward spent 12 seasons at Celtic, scoring 236 goals, and also played for Morton and Partick Thistle.

  Fans paid their final respects at the stadium as the cortege made its way through

  Archbishop Tartaglia blessed the coffin as it left St Mary's Church

  Stevie Chalmers with the European Cup in 2014

  Chalmers' death at 83 came a week after Billy McNeill, who captained the Lisbon Lions, passed away aged 79.

  Among those attending his funeral were fellow Lisbon Lions Bobby Lennox, Bertie Auld, Jim Craig and John Hughes, as well as current Celtic manager Neil Lennon.

  Jim Craig said he was heartened by the large turnout for his friend.

  He said: "It has been a difficult week, losing another teammate. Stevie was a popular guy amongst fans and players alike. My thoughts are with the family and we hope the public in general will remember him greatly, as they will with that goal in Lisbon."

  Celtic manager Neil Lennon joined in the tributes to Stevie Chalmers

  Former Rangers goalkeeper Peter McCloy was also among the mourners.

  Chalmers, who scored three times and won five caps for Scotland, won four league titles, three Scottish Cups and four League Cups with Celtic.

  After he died last week, Celtic chief executive Peter Lawwell said: "Stevie was a much-loved husband, father and grandfather, and our thoughts and prayers are with the family at this desperately sad time."

  Ex-Manchester United and Aberdeen manager Sir Alex Ferguson was a long-time friend of Stevie Chalmers

  Celtic manager Neil Lennon said Chalmers was "always a quiet and unassuming man whenever I met him, and happiest spending time with his fellow Lions".

  Former Celtic player and manager David Hay, left, was joined by ex-captain Roy Aitken

  Celtic skipper Scott Brown, front centre, is flanked by Celtic team-mates Odsonne Edouard and Kieran Tierney
