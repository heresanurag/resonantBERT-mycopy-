title: 'Harlesden: Detectives appeal to people linked to triple shooting - BBC News'
date: '2024-12-20'
section: London
url: http://www.bbc.co.uk/news/articles/cz9g15xy5qqo
content: |-
  An image shows people speaking to the occupants of the car from which the shots were fired.

  Police are seeking the people speaking to the occupants of the black Kia Niro

  Detectives investigating a triple shooting in north-west London - in which a woman was killed - have issued an image of people who may hold "important" information. A black Kia Niro with distinctive alloys and the number plate LA23 XRE was being driven by the suspects who then fired a number of shots in Gifford Road, Harlesden, on 14 December, the Met Police said. Michelle Sadio, 44, died at the scene and two men, both in their 30s, were injured. Police have released an image of a number of people who were seen speaking to the occupants of the black Kia Niro on Church Road, Harlesden, at 20:50 GMT just before the shooting.

  Michelle Sadio died at the scene of the shooting in Harlesden

  The shots were fired about 25 minutes later, less than half a mile (800m) away, on Gifford Road. Det Ch Insp Phil Clarke, who is leading the investigation, said: "Are you one of the people pictured in the white Mercedes or on the pavement nearby, or do you recognise anyone? "Did you hear or see something either before or after the shooting that may help with the investigation?" He added: "I would like to stress that none of those pictured have done anything wrong. "They may not live in the area but they could hold information that is important to the investigation and I urge them to contact us." Ms Sadio was standing outside the River of Life Elim Pentecostal Church on Gifford Road following a wake when the shots were fired. Following the shooting, the car was driven more than two miles (3.2km) to Barnhill Road in Wembley Park where it was abandoned and set alight, police said.
