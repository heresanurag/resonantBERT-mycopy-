  • None What is Nato and why isn't Ukraine a member? Ukrainian MP Kira Rudik told BBC Radio 5 Live Breakfast on Thursday she was "concerned" by Trump's conversation with Putin because the end of the Russian leader's "isolation" would give the "illusion" he wanted peace. "How do we know that Putin really wants peace and wants to negotiate, and then who or what will make sure that Putin will keep his part of the bargain?" she asked. Asked if she could conceive of Ukraine agreeing to a settlement that would concede territory to Russia, Rudik said: "We will not give up on our territories." "However, we may, as President Zelensky said, delay our goal to regain them." In an interview with The Guardian, external published on Tuesday, Zelensky suggested that Russian-held territory in Ukraine could be swapped for Ukrainian-held territory in Russia's western Kursk region as part of a peace deal. Putin's spokesman Peskov said this was "impossible". "Russia has never discussed and will not discuss the exchange of its territory. Ukrainian units will be expelled from this territory. All who are not destroyed will be expelled." Zelensky also insisted that the US, and not just European countries, would need to be part of any security package for his country. "Security guarantees without America are not real security guarantees," he said. Separately, Trump said that at "some point you're going to have an election" in Ukraine, in what was seen as a reference to the expiry of Zelensky's presidential term in May 2024. Zelensky says the continuing Russian invasion and martial law in Ukraine make it impossible to hold a new presidential election. Russia's Putin has repeatedly questioned Zelensky's legitimacy to hold any negotiations with Moscow.

  Meanwhile, fighting between Russia and Ukraine has continued overnight. Ukraine's air force said there had been 140 drone attacks, starting on Wednesday evening in the Odesa and Kharkiv regions - 85 of which had been shot down. Following the overthrow of Ukraine's pro-Russian president in 2014, Moscow annexed the Black Sea peninsula of Crimea and backed pro-Russian separatists in bloody fighting in eastern Ukraine. The conflict burst into all-out war when Russia invaded Ukraine nearly three years ago. Moscow's attempts to take control of the capital Kyiv were thwarted, but Russian forces have taken around one-fifth of Ukraine's territory in the east and south, and have carried out air strikes across the country. Ukraine has retaliated with artillery and drone strikes, as well as a ground offensive against Russia's western Kursk region. Accurate casualty counts are hard to come by due to secrecy by both the Russian and Ukrainian governments, but it is estimated that hundreds of thousands of people, most of them soldiers, have been killed or injured, and millions of Ukrainian civilians have fled as refugees.
