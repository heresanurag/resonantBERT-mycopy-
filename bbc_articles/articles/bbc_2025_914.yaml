  While it has long been known the new US administration would be less sympathetic to Ukraine than its predecessor, the words from Trump and his defence secretary will have only pleased Moscow. Zelensky has repeatedly argued there "can be no talks on Ukraine without Ukraine" - but the Trump-Putin phone call proved otherwise. Western help – and the Ukrainian forces who benefitted from it – are the reason Kyiv did not fall within days of Russia's invasion, as was expected by some. But the road to a "just peace", as Zelensky puts it, is neither going to be straight nor smooth for Ukraine. The Ukrainian president said his own call with Trump had been a "good and detailed discussion" about a variety of issues, and that he had also met US Treasury Secretary Scott Bessent, who is visiting Kyiv. "No one wants peace more than Ukraine. Together with the US, we are charting our next steps to stop Russian aggression and ensure a lasting, reliable peace," Zelensky wrote. The Ukrainian leader added: "We agreed to maintain further contact and plan upcoming meetings."
