content: |-
  The US and Russia leaders spoke over the phone after Trump said Nato membership for Ukraine is unlikely.

  Ukraine war talks start now, Trump says after Putin call

  US President Donald Trump has said he had a "lengthy and highly productive" phone call with Vladimir Putin on Wednesday in which the leaders agreed to begin negotiations to end the war in Ukraine. In a post on his Truth Social platform, Trump said he and the Russian president had "agreed to have our respective teams start negotiations immediately". Later, Ukrainian President Volodymyr Zelensky said he had spoken with Trump about a "lasting, reliable peace". The calls with the warring sides came as both Trump and his defence secretary said it was unlikely Ukraine would join Nato, which will come as a bitter disappointment to Kyiv.

  On Thursday, US Defence Secretary Pete Hegseth claimed Trump was the "one man in the world" capable of bringing both sides together and insisted US attempts to negotiate peace were "certainly not a betrayal" of the Ukrainian soldiers fighting invading Russian forces. Earlier, Trump wrote on social media: "It is time to stop this ridiculous War, where there has been massive, and totally unnecessary, DEATH and DESTRUCTION. God bless the people of Russia and Ukraine!" He did not set a date for a face-to-face meeting with Putin, but later told reporters at the White House: "We'll meet in Saudi Arabia." He wrote on social media the pair had also invited each other to their respective capitals. Zelensky said he would meet Vice-President JD Vance and Secretary of State Marco Rubio during a defence summit on Ukraine in Munich on Friday. Kremlin spokesman Dmitry Peskov said Putin supported Trump's idea that the time had come to work together. The phone call between Putin and Trump lasted nearly an hour-and-a-half, during which the Russian president extended an invitation to visit Moscow, Peskov said. Trump also told reporters at the White House that it was unlikely Ukraine would return to its pre-2014 borders but, in response to a question from the BBC, he said "some of that land will come back". The president said he agreed with Hegseth, who told a Nato summit earlier on Wednesday that there was no likelihood of Ukraine joining the military alliance. Speaking to reporters ahead of the defence meeting in Brussels on Thursday, Hegseth said Russia's invasion of Ukraine was a "factory reset" for Nato which signalled the alliance needed to be "robust", "strong" and "real". Hegseth said the US had made an "incredible commitment" to Nato and reiterated calls for fellow members to increase defence spending. He added that no country had shown a larger commitment to Ukraine than the US. On Wednesday, seven European countries including Britain, France and Germany insisted they be part of any future negotiations on Ukraine's fate. "Our shared objectives should be to put Ukraine in a position of strength," read the joint statement released after a meeting of foreign ministers in Paris. "Ukraine and Europe must be part of any negotiations." They called for strong security guarantees for Ukraine and said they were looking forward to discussing the way forward with their American allies.

