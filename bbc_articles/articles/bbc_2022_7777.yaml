title: 'As it happened: Platinum Jubilee latest: Queen appears on balcony for Jubilee
  finale - BBC News'
date: '2022-06-05'
section: UK
url: http://www.bbc.co.uk/news/live/uk-61680135
content: |-
  The Queen smiles as she stands alongside Prince Charles, Camilla and the Duke and Duchess of Cambridge with their children.

  As celebrations come to a close, a thank you message from the Queen has come from Buckingham Palace.

  She says: "I have been humbled and deeply touched that so many people have taken to the streets to celebrate my Platinum Jubilee.

  "While I may not have attended every event in person, my heart has been with you all; and I remain committed to serving you to the best of my ability, supported by my family.

  "I have been inspired by the kindness, joy and kinship that has been so evident in recent days, and I hope this renewed sense of togetherness will be felt for many years to come.

  "I thank you most sincerely for your good wishes and for the part you have all played in these happy celebrations."
