title: Uncertainty grips Damascus as rebels approach Syrian capital - BBC News
date: '2024-12-07'
section: Middle East
url: http://www.bbc.co.uk/news/articles/ce8eel196j9o
content: |-
  There is a "sense of fear" about the days to come as rebels sweep towards the capital in the face of limited opposition.

  The streets of Damascus are uncharacteristically empty on Saturday night, Zaina Shahla, a 42-year-old journalist living in the centre of the Syrian capital, tells the BBC. After a "normal" morning, she said the streets were filled with people trying to stock up on supplies as reports emerged of rebel fighters - who now claim to be capturing Homs, Syria's third largest city - heading toward the capital. Now, everyone seems to have gone home - the uncertainty of the situation creating a "sense of fear" among residents. "We are afraid because we really don't know what's going to happen," Ms Shahla said. "Nobody wants to see fighting in Damascus." She added: "Everything is ambiguous and nothing is clear for anyone."

  Her sentiments are echoed by Rim Turkmani, director of the Syria Conflict Research Programme at the London School of Economics. Her sister in Damascus told her that shops are closing, supplies are running low and ATMs are out of cash, she said. "No one knows what's happening," Ms Turkmani told the BBC. Damascus has not seen the same degree of violence in Syria's decade-long civil war, creating a sense of stability among some of its residents, Ms Shahla said. "If any change is going to happen, it won't be easy." But reports suggest a turning tide is already sweeping through the city's suburbs as rebel fighters led by opposition group Hayat Tahrir al-Sham (HTS) make sweeping territorial gains from the north of the country. An unnamed US official told the BBC's US partner, CBS News, that Damascus appeared to be "falling suburb by suburb to the rebels". The rebels themselves claim to have "encircled" the city. Video footage appeared to show a statue of President Bashar al-Assad's late father, Hafez al-Assad, being torn down by protesters in the southern suburb of Jaramana.

