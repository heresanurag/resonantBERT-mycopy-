title: 'War in Ukraine: Kyiv shopping centre hit by Russian missile - BBC News'
date: '2022-03-22'
section: General
url: http://www.bbc.co.uk/news/world-europe-60819030
content: |-
  A nearby camera captured the moment the shopping centre in Kyiv was struck by a missile.

  Video released by Ukraine's State Emergency Service captured the moment when a shopping centre in Kyiv was hit by a Russian missile.

  Authorities say at least eight people were killed when the Podilskyi district of Kyiv was struck.

  Firefighters were seen trying to rescue people stranded beneath the rubble.
