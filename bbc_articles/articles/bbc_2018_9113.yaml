title: 'Thai cave: Rescuers continue search for missing boys - BBC News'
date: '2018-07-02'
section: General
url: http://www.bbc.co.uk/news/world-asia-44684717
content: |-
  The Thai Navy is still searching for 12 boys and their football coach, missing since 23 June.

  The Thai Navy has released footage of rescuers trying to reach a group of 12 boys and their football coach, who have been missing since 23 June.

  The search has been hampered by low visibility and narrow tunnels.
