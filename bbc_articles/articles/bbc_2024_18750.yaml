id: bbc_2024_18750
title: Men found dead in car in Sweden confirmed as missing Britons - BBC News
date: '2024-08-15'
section: Europe
url: http://www.bbc.co.uk/news/articles/cvgxe31j933o
content: |-
  Swedish prosecutors say their investigation into the deaths is ongoing.

  Farooq Abdulrazak (left) and Juan Cifuentes had travelled to Scandinavia on a business trip

  Two men found dead in a burned-out car in Malmö have been confirmed as British nationals reported missing in July. Farooq Abdulrazak, 37, and Juan Cifuentes, 33, both from north London, were reported missing after they failed to return home from a business trip. Their bodies were found in the shell of a Toyota Rav 4 on 14 July. Family members have been informed and are being supported by specially trained officers, the Metropolitan Police said. The Swedish Prosecution Authority said its investigation into the deaths was ongoing.

  Statements released by the Met on behalf of the two men's families said they were "sincerely devastated" to lose "two beautiful, innocent, hardworking souls". Their deaths have "impacted our local community deeply", the families said. Mr Abdulrazak's family described him as "a beautiful, selfless, humble soul" and "a huge pillar in our family and community". Mr Cifuentes was "a pillar of strength and compassion", his family said. "His legacy lives on in his children, who embody the love and values he instilled in them," they added.

  The burned-out Toyota Rav 4 was discovered in an industrial area of Malmö

  The deaths are being investigated as a suspected double murder. Swedish police have said both men were shot before the car was set on fire. They believe the two men rented the vehicle at an airport in Denmark hours before the bodies were discovered in the Fosie industrial area of Malmö. The Met said it was supporting Swedish authorities as they investigate the "incredibly tragic and complex incident". Met Det Ch Insp Sarah Lee said: "Juan and Farooq’s families are suffering profoundly and we sincerely hope they are provided with much needed answers to the many questions they have about what happened to their loved ones." Mr Abdulrazak and Mr Cifuentes were business partners who co-owned a travel agency. Mr Cifuentes was also a former player for Welwyn Garden City FC. The club paid tribute to him on social media in July, saying he was "a very good player and a great person". A UK Foreign Office spokesperson said: “We are supporting the families of two British men who died in Sweden and are in touch with the local authorities.” In July, local police urged people to come forward if they had information that could help with the case. So far, no arrests have been made.
