content: |-
  A BBC film follows children over nine months including one boy, 11, who volunteered at al-Aqsa hospital.

  Article removed: 'We followed lives of three children surviving war in Gaza. Here's what we found'

  Update 21 February: Since the transmission of this documentary, the BBC has become aware that the father of the film's narrator, a child called Abdullah, has worked as a deputy agriculture minister for the Hamas-run government in Gaza. The film features important stories we think should be told - those of the experiences of children in Gaza. In light of continuing questions about the programme, the BBC has published an updated statement on our Corrections and Clarifications page explaining the film will not be available on iPlayer while we conduct further due diligence with the production company and so this article has been removed on the same basis.
