title: Joanne Tulip stabbing killer Steven Ling recommended for release - BBC News
date: '2024-09-10'
section: Tyne
url: http://www.bbc.co.uk/news/articles/c36n944p7lwo
content: |-
  Joanne Tulip's mother has condemned the decision, calling Steven Ling a "very dangerous man".

  The parole hearing heard that Ling, who stabbed Joanne Tulip 60 times, felt "shame" about his "monstrous past"

  A killer who stabbed a woman 60 times has been cleared to be freed by the parole board. Steven Ling, a farm worker, was jailed for life in December 1998 after murdering Joanne Tulip, 29, in Stamfordham, Northumberland, on Christmas Day a year earlier. A charge of rape was left on file. Ling was initially ordered to serve at least 20 years behind bars, but in 2009 a High Court judge cut the minimum term to 18 years. Ms Tulip's mother, Doreen Soulsby, has condemned the decision, calling Ling "a very dangerous man".

  Doreen Soulsby believes her daughter's killer should never be released

  A public parole hearing was held in July, although Ling was allowed to give his evidence in private. Two psychologists gave evidence to that hearing recommending Ling's release from prison on a risk management plan. One of the psychologists said she believed the risk Ling posed was "not imminent" and was "manageable in the community", adding: "I believe that now means his risk is at a level where he does not need to be kept in prison any more."

  A public parole hearing was held in July, although Ling was allowed to give his evidence in private

  Mrs Soulsby says the decision to allow his release has shocked her and her family. "I'm just worried sick for the safety of women and girls on the streets that this man should be in the community," she said. "If he sees a pretty girl walking down the street what's he going to do? He might not reoffend straight away, but he will reoffend. "We heard a lot of shocking things at the parole hearing in July, it's just the way this man is wired." The Parole Board’s report said Ling had always accepted that he raped Ms Tulip. But as he was not formally convicted of rape he was not classed as a convicted sex offender. In its decision summary, it said it had considered the circumstances of Ling's offending, the progress made while in custody, and a risk management plan before concluding "imprisonment was no longer necessary for the protection of the public". The panel said his release would be subject to a set of standard licence conditions imposed on all offenders released under supervision and additional licence conditions imposed by the Parole Board. These include being subject to GPS tracking for 12 months, restrictions on the use of electronic technology and exclusion zones to avoid contact with the victim's family.

  This story was updated on 19 September 2024 to include further details from the Parole Board report which stated Ling had always accepted he raped Ms Tulip.
