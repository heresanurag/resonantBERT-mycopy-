  However, Trump said on Wednesday a meeting he held with Zelensky on the sidelines of the Nato summit in The Hague "couldn't have been nicer". He told BBC Ukraine's Myroslava Petsa at a press conference afterwards that he was considering supplying Kyiv with US Patriot air defence missiles to defend itself against Russian strikes. "We're going to see if we could make some available. You know, they're very hard to get," he said.
