content: |-
  Jenny Minto makes a statement after the publication of a landmark review of gender services in England.

  What have others said about the Cass Review and puberty blockers?

  Dr Emilia Crighton, NHS Greater Glasgow and Clyde's director of public health said: "The findings informing the Cass review are important, and we have reviewed the impact on our clinical pathways. "The next step from here is to work with the Scottish government and academic partners to generate evidence that enables us to deliver safe care for our patients." Vic Valentine, of Scottish Trans and the Equality Network, said pausing puberty blockers was the wrong decision and said it would "harm trans children and young people". A statement said: "This decision has been taken within the context where the reality of trans people's experiences and lives is questioned almost daily in some of the media and some political circles. "This makes us worry that the decision has been influenced by that context rather than solely through consideration of the best interests of trans children and young people." The Rainbow Greens published an open letter calling for an emergency general meeting to discuss the future of the power-sharing agreement. Speaking at a protest in Glasgow, Rainbow Greens co-convener Jen Bell said: "In the Bute House Agreement the Scottish government promised to dismantle the gatekeeper system and put trans patients at the heart of decisions on their own healthcare.
