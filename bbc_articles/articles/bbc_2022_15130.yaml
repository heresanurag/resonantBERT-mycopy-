content: |-
  One person is taken to hospital after an incident on a ride at Cardiff's Winter Wonderland.

  One person was taken to hospital after an incident on the Ice Skater ride at Cardiff's winter wonderland

  A passenger on a ride at Cardiff's Winter Wonderland has been taken to hospital.

  An ambulance was called at about 17:15 GMT on Saturday after an incident on the Ice Skater Sizzler ride.

  Two people were injured, with one taken to the University Hospital of Wales, the Welsh Ambulance Service said.

  Cardiff's Winter Wonderland said the ride would remain closed while an investigation into the incident took place.

  In a statement it said: "We are aware of an incident that occurred on the 'Ice Skater' ride at Cardiff's Winter Wonderland on the evening of Saturday 26th November."

  Cardiff Council said: "We are aware of the incident which occurred at Winter Wonderland on Saturday evening and will be supporting any investigations that will be undertaken in due course."

  The Health and Safety Executive said it was "making the appropriate inquiries".

  The Ice Skater ride remained closed after the site reopened on Sunday
