  The woman was stabbed in the groin, a court hears as three men appear charged over the incident.

  Woman stabbed at carnival in coma and may lose leg

  Three brothers appeared at court charged in connection with the stabbing

  A mother who was stabbed while attending Notting Hill Carnival with her young child is in a coma and may lose her leg, a court has heard. Cher Maximen, 32, remained "fighting for her life" in hospital after being injured at the west London event on Sunday evening, police said. Shakiel Thibou, 20, from Hammersmith, appeared at Westminster Magistrates' Court charged with attempted murder, violent disorder and possession of a knife. His brothers, Sheldon Thibou, 24, from Hammersmith, and Shaeim Thibou, 22, from Fulham, also appeared charged with violent disorder and assaulting an emergency worker.

  Sheldon Thibou was also charged with possession of a stun gun. The Met said officers deployed in Notting Hill for the Carnival "became aware of a woman who had been stabbed" shortly before 18:00 BST on Sunday. On Wednesday the court heard Ms Maximen tried to intervene in a fight at the west London event while with her three-year-old daughter and other family and friends, and was stabbed in the groin. Ms Maximen is in a coma after she lost 20 units of blood and one of her lungs collapsed, and she may also need to have her leg amputated, the court was told. Shakiel Tibou, of Masbro Road, and Sheldon Thibou, of Star Road, gave no indication of pleas during the hearing. Shaeim Thibou, of Charleville Road, indicated a not guilty plea. District Judge John Zani denied all three defendants bail and remanded them into custody to next appear together for a hearing at the Old Bailey on 25 September.
