title: 'Gay marriage: First couples wed in Australia - BBC News'
date: '2018-01-09'
section: General
url: http://www.bbc.co.uk/news/world-australia-42615844
content: |-
  Craig Burns and Luke Sullivan are one of the first couples to tie the knot under new legislation.

  Some of Australia's first same-sex marriages have taken place, following a 30-day notice period after new legislation was signed into law in December.

  Among the first couples to tie the knot, were Commonwealth Games sprinter Craig Burns and his partner, fellow athlete Luke Sullivan, who were married just after midnight local time in New South Wales.

  Read more: The first weddings after midnight
