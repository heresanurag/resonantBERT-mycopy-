  The bride wears a white, silk crepe halter-neck evening dress as the newlyweds leave for a private party.

  Meghan has chosen a lily white, silk crepe Stella McCartney halter-neck dress for the newlyweds' private party.

  The couple left Windsor Castle in a silver blue Jaguar E-Type Concept Zero, for a reception hosted by Prince Charles at Frogmore House.Castle.
