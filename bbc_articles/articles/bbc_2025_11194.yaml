content: |-
  Simon Yates produces a stunning performance on the penultimate stage of the Giro d'Italia to snatch the pink jersey from Isaac del Toro - and effectively ensures his second Grand Tour title.

  Simon Yates' first Grand Tour win came seven years ago at the Vuelta a Espana

  British rider Simon Yates produced a stunning performance on the penultimate stage of the Giro d'Italia to snatch the pink jersey from Isaac del Toro and effectively ensure his second Grand Tour title. Del Toro came into stage 20 - the final mountain stage - with a 43-second lead over Richard Carapaz, with Yates trailing by one minute and 21 seconds in third. Mexico's Del Toro, 21, would have clinched victory in his maiden Giro by successfully negotiating the Colle delle Finestre, the highest point of this year's race and where Yates' hopes of winning evaporated in 2018. But Yates, 32, exorcised those ghosts as he attacked on the brutal ascent to leave Del Toro, who had held the race lead since stage nine, and Carapaz in his wake. He not only wiped out Del Toro's advantage but was one minute 41 seconds clear of his general classification rivals when he crested. His Visma-Lease a Bike team had pulled off a masterstroke as team-mate Wout van Aert was in the breakaway group and allowed Yates to catch him on the descent, helping him build a comprehensive lead over the final 20km. Jayco-Alula's Australian rider Chris Harper, who was the first over the Colle delle Finestre summit, claimed the first individual Grand Tour stage win of his career, with Yates crossing one minute 57 seconds later, third on the day. Yates was in tears as he hugged team staff at the finish, surrounded by media, with Del Toro of UAE Team Emirates crossing the line five minutes after him. It means the Briton leads Del Toro by three minutes 56 seconds, with Carapaz in third, heading in to Sunday's processional stage in Rome. "I'm not really an emotional person but I couldn't hold back the tears," said Yates. "It's something I've worked towards year after year and I've had a lot of setbacks but I've finally managed to pull it off." Yates lost 30 seconds to Del Toro during Friday's stage but recovered to ensure he will become just the third British rider to win the Giro, after Chris Froome (2018) and Tao Geoghegan Hart (2020).

  Froome memorably snatched the pink jersey on the penultimate mountain stage in 2018, as Yates cracked and ultimately lost more than 38 minutes. Once this year's route was announced, with the same climb late in the 205km stage from Verres to Sestriere, Yates said he "always had in the back of my mind to try to do something here and close the chapter, let's say". "I'm still a bit speechless that I was able to do it," added Yates, who bounced back from the 2018 Giro to win that year's Vuelta a Espana. The 18.5km Finestre climb has an average gradient of 9.2% and started 43km from the finish. Within a kilometre of the climb, Carapaz's EF Education team attacked, but Del Toro was alert to the danger and soon closed the gap to Carapaz, with the rest of the peloton dropping back. Yet Yates then came from nowhere to join his general classification rivals and made a series of attacks before ultimately breaking clear. When Yates hit the gravel section, he extended his lead, while Del Toro and Carapaz - the 2019 Giro winner - continued to trade blows. But by the time they also reached the summit - some 2,178m above sea level - they knew the race was gone and Yates would be wearing the pink jersey for the first time since Froome took it from him in 2018. "It's incredible," said Van Aert. "It was such a brave effort from Simon to go all in from so far. I love it when people are not racing for a place of honour."
