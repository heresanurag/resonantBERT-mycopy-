id: bbc_2024_1649
title: Woman stuck on mountain scattering dad's ashes rescued - BBC News
date: '2024-02-04'
section: General
url: http://www.bbc.co.uk/news/uk-wales-68193166
content: |-
  Kitty Harrison felt "proper doom" while precariously perched on a ledge on a notorious mountain.

  Scattering her dad's ashes on one of the UK's most recognisable peaks almost ended in tragedy for Kitty Harrison.

  The 32-year-old had just given her father Steve Parry an emotional send-off on the summit of Tryfan, one of Wales' highest mountains, when she slipped.

  Kitty doesn't know how far she fell but managed to cling to a tiny ledge where she balanced precariously above a 300ft (91m) drop for more than three hours.

  She has thanked the "heroes" who saved her life in a seven-hour rescue.
