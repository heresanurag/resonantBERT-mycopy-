  News and updates on the response to the pandemic in Wales.

  Advice to stay at home and work from home if possible is not changing in Wales, First Minister Mark Drakeford says.

  It comes after Prime Minister Boris Johnson said he wanted to see a "significant return to normality" by Christmas with employers in England being given more discretion to bring staff back to workplaces if it is safe to do so.

  But Mr Drakeford said he did not want to see people returning to offices “in the way we did before coronavirus".

  He said one of the few positives of the last few months was learning how possible it is to work “very effectively” from home, without the need for large numbers to travel to and from office locations.

  “We have managed extraordinarily well by working differently," Mr Drakeford said.

  "I think that’s been a positive lesson we can draw from coronavirus.

  “I will not be doing things to undermine our ability to learn from those lessons in Wales.”

