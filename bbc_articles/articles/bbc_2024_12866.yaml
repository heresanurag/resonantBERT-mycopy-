  He said a march was added in 2012 and the name was changed to Pride Cymru in 2014. "Today, there are Pride events all over Wales and we can celebrate in our local communities," he said.

  Sam Taylor, a gay woman from Aberdare, Rhondda Cynon Taf, attended Pride in the early 2000s when it was a free event. "It was brilliant, and just really exciting that it was happening here. "With the huge Mardi Gras' happening in London it felt really exciting. Being gay felt still quite underground so to have something of our own rather than having to travel was just great." The 46-year-old said Pride had "changed loads" but it was important to understand its history. "People have sacrificed so much, it is a celebration but we have to remember the people before us and the meaning behind it. "It's fantastic it is still going 25 years on, and in the current climate we are in I think that having Pride is very important."

  Sam says it is important to understand the history of where Pride came from and why it was started

  Chair of Pride Cymru, Gian Molinu said: "Looking back over 25 years, the progress that has been made in advancing LGBTQ+ equality is vast. "When this event first started, there was no equal marriage, no adoption rights and the cruel Section 28 was still in force. "Pride is an opportunity to come together for us to celebrate the achievements of activists but also to fight for further action where there is still progress to make. "In the last few years, there has been a worrying creeping trend towards using LGBTQ+ lives to score political points and divide communities."
