  Seven men and three women were questioned about allegations dating back to the 1970s at the former residential school in North Ayrshire.

  Ten new arrests over alleged historical abuse at Kerelaw school

  Ten new arrests have been made in connection with allegations of historical abuse at a residential school in North Ayrshire, BBC Scotland News has learned. Police Scotland confirmed the seven men and three women, aged between 52 and 77, were questioned about the treatment of children at Kerelaw in Stevenston. Two years ago a former teacher and a care worker were jailed for sexually and physically abusing 28 children at the site, which closed in 2006. The police investigation is looking at allegations against other individuals dating as far back to the 1970s.

  Kerelaw opened in 1970, initially as a council-run residential unit for boys but later became co-educational, with a mixed sex secure unit added in 1983. It catered for young people with behavioural or psychological challenges - many of whom had been involved in alcohol or drug use, or petty crime. The site was the largest council-run establishment of its kind in Scotland. In 2022, the trial of former art and PE teacher Matthew George and care worker John Muldoon heard that violence and sexual abuse were "rife", with vulnerable children too scared to report their ordeals.

  Matthew George and John Muldoon have twice been convicted of abusing children at Kerelaw

  The trial heard evidence that boys were lined up in the gym hall and hit with golf balls, and one child was beaten with a mop and forced to eat soap. George was jailed for 16 years, while Muldoon was given a 12-year-sentence for crimes including rape. It was the second time the pair had been convicted of abuse at Kerelaw.

  The Crown and Procurator Fiscal Service said reports from police relating to 10 individuals had been received. It is understood a case is also being prepared against another person, aged in their 70s, who was arrested separately. A court hearing is expected in the near future. The school at Kerelaw closed in 2004, but the secure unit stayed open until 2006. A 2009 investigation by Glasgow City Council - which had taken over running the school from the old Strathclyde Regional Council - found Kerelaw had been badly managed. Evidence about Kerelaw has also been heard by the Scottish Child Abuse Inquiry which has yet to publish its findings.
