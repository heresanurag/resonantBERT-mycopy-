content: |-
  Every year, around 1,200 deer are fitted with GPS monitors before being rereleased into the wild.

  This is what it looks like to airlift deer from the wild.

  Every year, the Utah Division of Wildlife Resources captures around 1,200 deer to conduct health assessments.

  The deer are fitted with GPS monitors before being rereleased unharmed.
