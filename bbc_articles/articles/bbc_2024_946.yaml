title: 'Watch: BBC visits earthquake region in Japan - BBC News'
date: '2024-01-02'
section: General
url: http://www.bbc.co.uk/news/world-asia-67861078
content: |-
  Jean Mackenzie assesses the damage in Ishikawa prefecture battling against cut off roads.

  The BBC's Jean Mackenzie visits the earthquake-hit region, Ishikawa prefecture, to assess the damage.

  She tries to get as close as possible despite significant damage cutting off routes in the region.

  A 7.6-magnitude earthquake struck on Monday killing at least 48 people. Japan's prime minister says there is a "race against time" to rescue survivors.
