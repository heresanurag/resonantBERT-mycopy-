id: bbc_2022_16221
title: Cyndi Lauper and Sam Smith sing at White House - BBC News
date: '2022-12-14'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-63966881
content: |-
  The White House invited the musical artists to perform as President Biden signed a same-sex marriage bill.

  The musical stars belt out the hits to mark the enactment of the Respect for Marriage Act.

  President Joe Biden signed the bill in front of thousands of guests on the White House's South Lawn.
