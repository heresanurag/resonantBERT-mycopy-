  LVGA member Tony Montalbano runs his cucumber growing company, Green Acre Salads, from Roydon in Essex.

  Tony reduced his crop this season and delayed planting because of the high cost of energy, and the prices offered by UK customers.

  "I normally do three crops in a season starting in January, and then harvest around the middle of February. I've had to remove the first crop, and start with my second and third crop to try and save costs over the winter period," he said.

  The prices growers get for produce in the UK compared with Europe are unsustainable, he added.

  "A cucumber is selling for around 75p on the shelves here in the UK. In Europe, you're looking at £1.50. And it's cheaper to grow there.

  "I looked at the prices I would get for my cucumbers and thought to myself, 'I can't see us making it this year'."

  The BRC said retailers were working with farmers to ensure customers could access a wide range of fresh produce.

  BRC director of food and sustainability Andrew Opie said: "Retailers have long established relationships with the farmers in the UK and beyond, and they understand they need to pay a sustainable price for these goods."

  A survey from the Office for National Statistics (ONS) suggested that more people are struggling to find the food they want when they go shopping.

  The ONS said that between 8 and 19 February, 25% of adults said they could not find a replacement when the food they needed was not available, up from 15% in a similar period a year ago.

