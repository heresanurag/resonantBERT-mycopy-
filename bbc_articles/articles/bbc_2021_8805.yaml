  Officer Gonell gave an emotional statement during the first day of the US Capitol riot inquiry.

  Officer Aquilino Gonell gave an emotional statement during the first day of the US Capitol riot inquiry. He talked about returning home to his family after spending the day protecting the Capitol building.
