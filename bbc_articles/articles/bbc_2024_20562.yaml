  Typhoon Gaemi, which made landfall on Taiwan's east coast on Wednesday, has killed three people and injured hundreds more on the island, officials said.

  Typhoon Gaemi which made landfall on Taiwan's east coast on Wednesday, has killed three people and injured hundreds more on the island, officials said.

  On Thursday, schools and offices remained closed, while flights to and from Taiwan have been cancelled.

  A second landfall is expected in the Fujian province in south-eastern China later on Thursday. Several rail operators in China have also suspended operations.
