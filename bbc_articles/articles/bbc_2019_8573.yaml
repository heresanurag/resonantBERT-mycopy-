id: bbc_2019_8573
title: 'Battersea crash: Several hurt as car is driven at them - BBC News'
date: '2019-07-15'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-48978808
content: |-
  Five men are arrested on suspicion of affray after the crash in south-west London.

  Police were called to reports of a fight

  Several people were injured when a car was driven into them on a road during a fight in London on Saturday night.

  Five men have been arrested on suspicion of affray after the crash in Lombard Road, Battersea, at about 23:15 BST.

  One man in his 20s suffered a broken leg while another had head injuries from the crash, the Met Police said.

  Two other people were taken to hospital treatment and "a number of others" were treated for injuries at the scene.

  Police are looking for the driver of the car, who "fled the scene" before officers arrived.

  Police said the driver of the car fled the scene

  It is understood the altercation began after a group of people left a nearby hotel, and police are not treating the crash as terrorism-related.

  Ambulance crews were also called to the scene.

