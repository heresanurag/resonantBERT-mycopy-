  Families of those killed in the crashes attended Tuesday's hearing in Congress and held up photographs of loved ones. “I flew from England to Washington DC to hear in person what the Boeing CEO has to say to the Senate and to the world about any safety improvements made at that corporation,” said Zipporah Kuria, whose father was killed in the 2019 crash of a Boeing 737 MAX 8 jet. “I also continue to press the US government to hold Boeing and its corporate executives criminally responsible for the deaths of 346 people. We will not rest until we see justice.”
