title: 'Liam Payne: Dad Geoff Payne greets fans as Cheryl pays tribute - BBC News'
date: '2024-10-19'
section: Culture
url: http://www.bbc.co.uk/news/articles/cn4ye7dz1ddo
content: |-
  The Girls Aloud singer shares a seven-year-old son, called Bear, with the One Direction star.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Liam Payne's father has viewed tributes outside the hotel where his son died, as the star's former partner Cheryl says her son Bear has to “face the reality of never seeing his father again”. Payne, 31, died on Wednesday when he fell from the balcony of the third-floor hotel room where he had been staying in Buenos Aires, Argentina. In Argentina, Geoff Payne was followed by a scrum of photographers as he visited the hotel, prompting fans to shout at the press and attempt to block the building's entrance to stop them entering. Mr Payne travelled to Buenos Aires after his son's death and the journey from his hotel to the Casa Sur hotel was broadcast on Argentine television, despite family requests for privacy.

  Girls Aloud singer Cheryl, who was in a relationship with Payne from 2016 to 2018, also criticised "abhorrent" media coverage following his death. Posting on Instagram, Cheryl said: "As I try to navigate this earth shattering event, and work through my own grief at this indescribably painful time, I'd like to kindly remind everyone that we have lost a human being." Along with her statement Cheryl shared a black and white image of Payne with their son Bear and a broken heart emoji.

