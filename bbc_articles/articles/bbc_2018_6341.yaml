title: Saudi women prepare to hit the road - BBC News
date: '2018-05-16'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-44133403
content: |-
  Women received driving lessons at an exhibition ahead of next month's lifting of the female driving ban.

  Women in Saudi Arabia received driving lessons at an exhibition which took place ahead of next month's lifting of the female driving ban.

  The Pinkish exhibition is part of a "vision" to "support women's important roles in society".
