title: Lambeth Country Show injuries not life-threatening, say police - BBC News
date: '2024-06-10'
section: London
url: http://www.bbc.co.uk/news/articles/c6pprzq06dvo
content: |-
  A man and woman in their 40s are no longer in a life-threatening condition, police say.

  A man and woman who were taken to hospital after a funfair ride malfunctioned at a country show in south London are no longer believed to be in a life-threatening condition, the Metropolitan Police has said. Officers and the Health and Safety Executive continue to investigate the incident on Saturday evening at Lambeth Country Show in Brockwell Park. Police had previously said the pair, both in their 40s, had "life-threatening injuries". Two other people, a man in his 50s and an 11-year-old girl who were injured in the incident, have since been discharged from hospital.

  Thousands of people attended the show on Sunday

  The problem occurred during the first day of the free event and funfair rides were closed on Sunday. One of the fairground rides was seen covered in tarpaulin, although it was not clear which ride had malfunctioned.

  The council said emergency services had arrived at the scene shortly after the incident at 18:20 BST and the funfair had been closed. Additional safety checks were being carried out on all rides and attractions at the show, Lambeth Council said. "Officers have attended the scene on Sunday alongside the Health and Safety Executive as enquiries continue to establish the full circumstances," a Met Police spokesperson added.
