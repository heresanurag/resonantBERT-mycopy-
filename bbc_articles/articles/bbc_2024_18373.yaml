  Thousands of protesters have taken to the streets in Venezuela and other Latin American countries since the official poll result was contested. The government says more than 2,000 people have been detained, some of which it accuses of “terrorism”. Some opposition figures have also been seized in the last few weeks. María Oropeza, a campaign co-ordinator for opposition coalition Vente Venezuela, live-streamed her detention on Instagram. In a video, loud bangs could be heard in the background as she told her followers that she had done nothing wrong. Officials from Venezuela’s military counter-intelligence agency then burst through her door and the video cuts to black. Members of the security forces have seized Freddy Superlano and Roland Carreño – both of whom worked for the opposition party Popular Will – and Ricardo Estévez, a technical adviser for the same opposition movement as Ms Oropeza. Last week, Mr González refused to appear at the country's Supreme Court after it summoned all presidential candidates for an audit of the disputed vote. He later said he would have risked his freedom and "the will of the Venezuelan people" by attending. Venezuela's Supreme Court, which is stacked with allies of President Maduro, said on Saturday that it was continuing to assess the election and that its ruling would be "final and binding".
