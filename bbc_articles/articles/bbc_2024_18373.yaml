title: 'Venezuela election: Opposition calls for protests over presidential poll -
  BBC News'
date: '2024-08-12'
section: Latin America
url: http://www.bbc.co.uk/news/articles/c4gqlnpk4v9o
content: |-
  The opposition says it will keep up the pressure on the Maduro government, which it accuses of election fraud.

  Venezuelans living in Mexico City took to the streets to protest against President Nicolás Maduro being given a third term after last month's election

  Venezuela's opposition coalition has called for protests to be held worldwide on 17 August in support of its claim to have won the country's presidential election. President Nicolás Maduro was declared the winner by the government-controlled electoral commission, which handed him a third consecutive term in office. The opposition says its candidate, Edmundo González, was the real winner, and has called for the commission to release detailed data from polling stations. This call has been backed by the European Union and the US while a number of other Latin American nations have so far held off recognising Mr Maduro as the winner of last month's poll.

  Opposition leader María Corina Machado posted a video on social media in which she said Venezuelans should "take to the streets" worldwide on Saturday 17 August in support of her party's claim of victory. "Let's shout together for the world to support our victory and recognize truth and popular sovereignty", she said on Sunday. The opposition published a data set online shortly after the 28 July election which it says proves Mr González won by a wide margin. US Secretary of State Antony Blinken said there was "overwhelming evidence" that Edmundo González had won the most votes. The Maduro government, however, insists that the result announced by the National Electoral Council (CNE), which is stacked with its allies, is the only valid one. Mr Maduro has said he will publish the vote tallies, but has not specified when. He accused the opposition of producing fake evidence to contest the result of the election and said the US was behind what he described as a farce and a coup attempt. Mr González, who replaced Ms Machado as the opposition's candidate after she was banned from running, also called for national and worldwide protests in support of "the truth". Both have been in hiding - Ms Machado wrote in the Wall Street Journal that she is fearing for her “life” and “freedom”. The government has said Ms Machado should be arrested.

