title: Is the Signal chat leak involving Trump officials a big deal? - BBC News
date: '2025-03-27'
section: General
url: http://www.bbc.co.uk/news/videos/clynkzxwx1vo
content: |-
  The BBC's Nomia Iqbal looks at the implications for the Trump team members involved in leaked messages about US air strikes on Yemen.

  The Atlantic magazine released new screenshots of messages showing Pete Hegseth sharing information about US air strikes on Yemen with other top US officials on the Signal messaging app.

  Despite the release of the screenshots, Trump administration officials still claim the information was not classified.

  The BBC's Nomia Iqbal takes a closer look at the newly released messages and what it means for those involved.
