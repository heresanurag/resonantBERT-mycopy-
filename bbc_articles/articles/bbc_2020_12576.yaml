title: Parents' plea after Walsall teenager dies with Covid-19 - BBC News
date: '2020-11-25'
section: General
url: http://www.bbc.co.uk/news/uk-england-birmingham-55071614
content: |-
  The death of 19-year-old Cameron Wellington shows coronavirus can affect anyone, his parents say.

  The family of a 19-year-old wrestler who died with Covid-19 are urging younger people to be aware of the dangers of the virus.

  Cameron Wellington, from Walsall in the West Midlands, died on 19 November, a week after first falling ill.

  His parents, Norman and Jane, said some people wrongly believed it "couldn't happen to them".

  Cameron was taken to Walsall Manor Hospital, before being transferred to a hospital in Leicester where he later died.

  More than £5,900 has been raised online in Cameron's memory.
