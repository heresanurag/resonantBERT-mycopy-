title: 'Watch: Counter-protesters attack UCLA pro-Palestinian camp - BBC News'
date: '2024-05-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68935876
content: |-
  Video shows pro-Israeli demonstrators trying to tear down barricades and striking campers with sticks and bats.

  Violence erupted at the University of California, Los Angeles after pro-Israeli counter-demonstrators attacked a pro-Palestinian campus encampment.

  Footage shows fireworks thrown and tear gas deployed after masked counter-protesters attempted to tear down barricades, and struck campers with sticks and bats.
