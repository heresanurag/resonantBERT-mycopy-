  Barcelona and Bayern Munich will meet each other for the 11th time in Champions League history when they face off on Wednesday night.

  Bayern Munich have won eight of their past 11 Champions League matches against Barcelona

  Barcelona and Bayern Munich will play each other for the 12th time in Champions League history when the two meet in the competition's league phase on Wednesday night (20:00 BST). To mark the occasion, we've picked five of their best encounters to remind you of Lionel Messi's brilliance and Thomas Muller's magic. Wait for the box below to load, and enjoy!

  Watch highlights of every Champions League game from 22:00 BST on Wednesday on BBC iPlayer and the BBC Sport website and app. There will also be a Champions League Match of the Day on BBC One on Wednesday, from 22:40 to 00:00.
