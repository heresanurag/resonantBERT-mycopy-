content: |-
  It is the latest in a series of landslips at Lulworth Cove on the Jurassic Coast in Dorset.

  A section of cliff collapsing on to a popular beach on the Jurassic Coast has been captured in a video.

  Rob Payne filmed the moment the landslip happened at Lulworth Cove in Dorset at about 15:00 GMT on Saturday.

  There have been a number of similar rockfalls at the same cove, including a major landslip earlier this year, which occurred after days of heavy rainfall.

