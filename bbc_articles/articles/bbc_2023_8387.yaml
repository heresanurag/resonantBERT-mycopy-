title: 'Watch: Trapper wrestles massive crocodile from US pool - BBC News'
date: '2023-06-13'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65883859
content: |-
  Wildlife specialists got the call from a Florida resident and were able to release the 10ft (3m) reptile.

  Trappers in the US were dispatched to a Florida home after a massive 10ft (3m) crocodile was discovered in the pool in the middle of the night.

  Todd Hardwick and Jeff Peterla worked to pull the reptile from the pool and restrain it, with some help from a police officer, according to their Instagram page.

  The pair later removed the restraints from the crocodile, a threatened species in Florida, and were able to safely return it to its habitat.
