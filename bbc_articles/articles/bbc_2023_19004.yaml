content: |-
  The event was felt just before 15:30 on Saturday in parts of the region and in the Inner Hebrides.

  Residents in Mallaig felt a 'weak trembling' during the quake

  An earthquake measuring 2.1ML on the Richter scale has hit parts of the Highlands.

  The event was felt just before 15:30 on Saturday in Mallaig and Morar and by islanders on Lismore in the Inner Hebrides.

  The British Geological Survey asked for people to share their experiences of the quake online.

  Villagers in Mallaig and Morar said they also "felt a weak trembling", as well as experiencing the same noise.

  Since 10 October, Morvern has been hit by 10 earthquakes.

  On 3 December, a quake measuring 1.1ML was recorded, and all the previous ones were smaller.
