content: |-
  Hudson Meek, 16, sustained blunt force trauma in the fall and died of his injuries two days later, authorities said.

  Hudson Meek had roles in films, TV and video-game voiceovers

  Tributes have been paid to Baby Driver actor Hudson Meek, who died after falling from a moving vehicle in Alabama. The 16-year-old actor also appeared in TV series including the NBC drama Found and did video game and commercial voice-overs. Meek fell from a vehicle in Vestavia Hills, a suburb of Birmingham, Alabama, on 19 December, authorities said. He sustained blunt force trauma in the fall and died of his injuries two days later. "His 16 years on this earth were far too short, but he accomplished so much and significantly impacted everyone he met," his mother Lani Wells Meek posted on Facebook.

  "Please pray for our family and friends as we all process this sudden and tragic loss," she said. His obituary, external said that Meek "was an organ donor, and his family is comforted by knowing that he will continue to help others for years to come". The obituary called him "confident, convicted in his beliefs, spontaneous, and quick-witted" and noted that he played football, enjoyed the outdoors and had visited all 50 US states. Acting Out Academy, a performing arts academy in Vestavia Hills, released a statement after his death: "We are all devastated at the loss of one of AOA's first and brightest stars. May you shine forever Hud. You will be deeply missed." The Vestavia Hills Police Department is investigating how the fatal incident occurred, according to local reports.
