content: |-
  Climate activist Greta Thunberg urges US lawmakers to end fossil fuel subsidies, or face catastrophe.

  Climate activist Greta Thunberg urged US lawmakers to end fossil fuel subsidies, or face catastrophic consequences in future decades.

  "I don't believe for a second that you will actually do this," she told politicians on the House Oversight Committee's environmental subcommittee.
