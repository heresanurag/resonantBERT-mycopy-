title: 'Coronavirus: Household visit ban returning in Glasgow area - BBC News'
date: '2020-09-01'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-53991534
content: |-
  The first minister reintroduces restrictions on visiting other households in the Glasgow area after an increase in coronavirus cases.

  The first minister has reintroduced restrictions on visiting other households in the Glasgow area after an increase in coronavirus cases.

  Nicola Sturgeon said the local lockdown measures will apply to people living in Glasgow, West Dunbartonshire and East Renfrewshire.

  They will be in place for two weeks, but will be reviewed after a week.
