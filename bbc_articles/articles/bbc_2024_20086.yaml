title: 'Chelsea star Noni Madueke told: ''You''ve not seen real Wolverhampton'' -
  BBC News'
date: '2024-08-27'
section: Wolverhampton
url: http://www.bbc.co.uk/news/articles/cn0l9dde6e2o
content: |-
  England Under 21 international Noni Madueke was forced to apologise after Sunday's match in Wolverhampton.

  Noni Madueke, 22, apologised after the match but does not seem to have won over the city

  The leader of Wolverhampton Council has leapt to the defence of his city after Chelsea's Noni Madueke's rather critical comment ahead of his team's 6-2 thrashing of Wolves on Sunday. The winger seemingly insulted residents on Saturday with his now deleted Instagram post which suggested the city was perhaps, not very good. He went on to score a hat-trick, but apologised in his post-match interview. Council leader Stephen Simkins suggested the England Under-21 international could only have seen glimpses of the city through a coach window.

  "I would suggest that this footballer, this highly paid footballer, has not really seen Wolverhampton," he told BBC News. "He could only have been here 48 hours or so and that would have been at a hotel or a training ground, so what he's seen was probably through a coach window too. "You can't make snap judgements like that about a place - it's a great city." He cited the top music headliners the city has attracted through its newly renovated Halls concert venue in the city centre, along with its neighbouring towns of "Beautiful Bilston, Wonderful Wednesfield and Tantalising Tettenhall".

  Council leader Stephen Simkins suggested Madueke should get to know the city more before commenting on it

  "We were the first to bring in floodlit football and through Wolves, the first to bring European club teams over," he added. "We've had headline acts - the Gallagher brothers, Kings of Leon, Blur, The Stranglers and now Bob Dylan - so I guess we're doing something right. "All that transfer money that gets spent - we've got a debt of about £30m, that could cancel our debt. "Wolverhampton is wonderful and what makes cities and places are the people." The city attracted more than 10 million visitors in 2023 with its award winning parks, market and Premiership football team, while it was also undergoing major redevelopment in and around the city centre. Local resident Chris, from Heath Town, said he had not heard of the Chelsea player until Saturday and said "people should think before they talk".

  The refurbishment of historic music venue The Halls in Wolverhampton has been shortlisted for a construction award

  "How can you talk about somewhere you've never really been to before?" he said. "He should come to Wolverhampton and see the other side of it, not just the Molineux dressing room and the pitch. "You can't describe somewhere that you've not really been to and explored." He added: "People are good-hearted people here in the main." Cherry, originally from Coventry who has now lived in Wolverhampton for six years, said his comments were not justified.

  Resident Terry told BBC WM he did not accept Madueke's post-match apology

  She said there were pretty buildings and architecture in the city with the free art gallery "a great bonus". Wolves fan, Katherine, said she was at the game on Sunday and heard the booing for the player but said while he was not entirely wrong, it was a rude thing to say and only someone from the city could really make that comment. "If it comes from anyone else you take offence to it, but if it's from someone from Wolves, you can agree with it," she said. She said she would probably say to the footballer "don't come back if you don't like it then".

  West Park was among six parks and nature reserves in Wolverhampton to have been named among the best in the UK last month

  Terry, born about 50 metres from the Wolves stadium, said there was nothing wrong with Wolverhampton and he did not like anyone criticising it - neither did he accept the post-match apology. "I thought it was inappropriate to say the least," he said. "He should come and visit the place and meet the people. Mr Simkins added: "Our city is great - we can't all be in Knightsbridge can we, like the Chelsea players?"

  The Grand Theatre contributed towards the city’s visitor economy, which was worth £458m in 2023
