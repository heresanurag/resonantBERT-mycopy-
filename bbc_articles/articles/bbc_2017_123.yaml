title: Video shows Cairngorm mountain rescue of missing couple - BBC News
date: '2017-01-03'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-highlands-islands-38492670
content: |-
  Video is released of the mountain rescue of a couple who went missing overnight in "Arctic" weather.

  Video has been released of the mountain rescue of a couple who went missing overnight in "Arctic" conditions.

  The GoPro footage was shot by the Cairngorm Mountain Rescue Team who located the couple, both in their 50s, in the Cairngorm Plateau.

  The couple are thought to be from England.
