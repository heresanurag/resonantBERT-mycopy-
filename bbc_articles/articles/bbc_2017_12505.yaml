id: bbc_2017_12505
title: 'Greece: Deadly floods near Athens after heavy rain - BBC News'
date: '2017-11-16'
section: General
url: http://www.bbc.co.uk/news/world-europe-41998379
content: |-
  Torrential rain overnight created fast-flowing torrents of red mud in towns near the capital Athens.

  Flash flooding west of the Greek capital, Athens, has killed at least 14 people, officials say.

  Torrential rain overnight created fast-flowing torrents of red mud, with a mayor calling it a "biblical" disaster.
