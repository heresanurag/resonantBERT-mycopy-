title: Elton John 'blown away' by Telford students' music video - BBC News
date: '2020-06-16'
section: General
url: http://www.bbc.co.uk/news/uk-england-shropshire-53071670
content: |-
  Superstar Sir Elton John has said he was "blown away" by a music video made by a group of students.

  A school cover of I'm Still Standing by Elton John found its way to the singer, who sent pupils a personal message to say it had "really cheered me up".

  The video of the students' performance has been shared hundreds of times on Facebook.

  In the video message, Sir Elton said: "I watched it three times in a row because I couldn't believe how good you sang and played it.

  "You did something brilliant and made a brilliant version of I'm Still Standing."

  He also promises the students from Telford Priory School, in Shropshire, will be guests at a future show in the UK.
