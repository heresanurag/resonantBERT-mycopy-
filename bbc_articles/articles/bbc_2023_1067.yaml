title: Police surround white van after California shooting - BBC News
date: '2023-01-23'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-64368686
content: |-
  Aerial video shows a vehicle which may hold the suspect after 10 people were shot dead in Monterey Park.

  Police have surrounded a white van in Torrance, California more than 12 hours after a deadly shooting in nearby Monterey Park.

  Aerial video shows the reported stand off which police say may hold the suspect but details are still very unclear.
