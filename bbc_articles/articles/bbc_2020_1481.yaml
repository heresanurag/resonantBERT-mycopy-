  During cross-examination Mr Weinstein's defence focused on her continued contact with him after the alleged incidents and presented email exchanges between the two including one she signed off with "lots of love".

  Throughout the week further "prior bad acts" witnesses continued to testify. Former actress Dawn Dunning alleged Mr Weinstein put her hands up her skirt and touched her genitals at a hotel in Soho in 2004 and later tried to offer her film roles in exchange for sex.

  Tarale Wulff alleged Mr Weinstein masturbated in front of her in 2005 when she worked as a waitress. She said she was later invited to read scripts by Weinstein Company staff and was taken to his apartment, where he allegedly raped her.
