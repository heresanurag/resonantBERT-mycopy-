id: bbc_2017_249
title: Gambia's President-elect offers Yahya Jammeh 'direct talks' - BBC News
date: '2017-01-13'
section: General
url: http://www.bbc.co.uk/news/world-africa-38606595
content: |-
  Gambia's President-elect, Adama Barrow, urges the incumbent, Yahya Jammeh, to engage in direct talks.

  The winner of Gambia's presidential election, Adama Barrow, has called on the incumbent, Yahya Jammeh, to engage in direct talks to resolve the country's political crisis.

  He made the call in a BBC Newsday interview, one week ahead of his inauguration ceremony.

  Newsday's Julian Keane began by asking him whether he believed the event would go ahead on 19 January.
