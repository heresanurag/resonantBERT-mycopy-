  Ms Ebert's great-grandson, Dov Forman, wrote on X: "[Her] story touched hundreds of millions worldwide, reminding us of the resilience of the human spirit and the dangers of unchecked hatred. "She was the queen of our large, loving family. "A light that shone so brightly has gone dark. She was our hero". Labour MP Wes Streeting said: "What an extraordinary life and example to all of us", the National Jewish Assembly described her as "a remarkable woman", and the London Victims' Commissioner said: "I am so sorry to read this sad news. What a legacy she leaves."

  King Charles III (then the Prince of Wales) met Ms Ebert at an exhibition in Buckingham Palace in 2022

  Karen Pollock from the Holocaust Educational Trust, said: "Lily Ebert was the epitome of strength and determination. "She will be remembered for her incredible story, her unparalleled tenacity and her zest for life. "She belongs in the list of Jewish heroines." Ms Ebert is survived by a daughter and son, 10 grandchildren, 38 great-grandchildren and one great-great-grandchild. Her family said her funeral will be held in London and she will be buried in Israel.
