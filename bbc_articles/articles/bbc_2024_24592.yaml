title: Auschwitz survivor who was honoured by King Charles dies aged 100 - BBC News
date: '2024-10-10'
section: London
url: http://www.bbc.co.uk/news/articles/c20m8lv8xkeo
content: |-
  Lily Ebert, taken to Auschwitz in 1944, spent her later years educating people about the Holocaust.

  Lily Ebert, who was sent to Auschwitz during World War Two, died on Wednesday

  A 100-year-old Holocaust survivor, whose story became famous as she searched for the family of a soldier who saved her, has died. Hungarian-born Lily Ebert, who lived in north-west London, was taken to Auschwitz-Birkenau in 1944 with her family when she was 20. Her story went viral four years ago when she tried to find out more about the American soldier who liberated her from a death march in Germany. The King is among those who paid tribute to Ms Ebert, praising her "extraordinary resilience and courage".

  Ms Ebert had been determined to reach as many people to share her experiences, which led her to embrace social media. King Charles wrote: "As a survivor of the unmentionable horrors of the Holocaust, I am so proud that she later found a home in Britain where she continued to tell the world of the horrendous atrocities she had witnessed, as a permanent reminder of the depths of depravity and evil to which humankind can fall, when reason, compassion and truth are abandoned." She answered questions and explained the ordeal to younger generation, and with the help of her great-grandson, Dov, she gained two million followers on TikTok.

