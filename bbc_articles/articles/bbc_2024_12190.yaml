content: |-
  Two men have been arrested on suspicion of manslaughter, say Nottinghamshire Police.

  Three arrested as boy, 16, killed by falling tree

  The boy was pronounced dead at the scene

  A 16-year-old boy has died after being injured by a falling tree in Nottinghamshire. Three people have been arrested in connection with the death in Carlton-in-Lindrick on Saturday, including two held on suspicion of manslaughter. Nottinghamshire Police and East Midlands Ambulance Service were called to Rotherham Baulk at about 11:20 BST. The boy was pronounced dead at the scene.

  Two men, aged 28 and 31, have been arrested on suspicion of manslaughter while a 28-year-old woman has been arrested on suspicion of assisting an offender. All three remain in police custody. Det Insp Simon Harrison said the boy's family were being supported by specialist officers. He said: "This was a tragic incident and my thoughts are with the boy's family. "The family are being supported by specially-trained officers as we continue to investigate exactly what happened." The village sits about three miles (4.8km) to the north of Worksop and about 17 miles (27km) east of Sheffield. Anyone with information that could help the investigation has been asked to make contact. Follow BBC Nottingham on Facebook, external, on X, external, or on Instagram, external. Send your story ideas to eastmidsnews@bbc.co.uk, external or via WhatsApp, external on 0808 100 2210.
