title: Watch Jurassic Park reborn on Welsh Christmas pub crawl - BBC News
date: '2023-12-21'
section: General
url: http://www.bbc.co.uk/news/uk-wales-67781397
content: |-
  Dinosaurs prowl the streets as friends recreate classic blockbuster movie scene for annual day out.

  There was no sign of Steven Spielberg or terrifyingly realistic velociraptors and T. rexes.

  But a group of friends from the south Wales valleys have breathed new life into the daddy of all dinosaur movies.

  They took to the streets of Porth in Rhondda Cynon Taf dressed as both beloved characters and prehistoric beasts from Jurassic Park for their Christmas fancy dress pub crawl.

  For their 19th annual night out they chose the 1993 blockbuster as their theme, and recreated a classic shot in a kiddies' playground.

  Member Matthew Jones remembered one year when they dressed as Oompa Loompas from the Willie Wonka films.

  “And an article appeared in the local paper asking if people could help explain why there were 20 Oompa Loompas around Porth," he said.
