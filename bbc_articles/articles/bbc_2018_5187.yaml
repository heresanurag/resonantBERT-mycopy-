title: 'Korea: Hoping for peace at a fake DMZ - BBC News'
date: '2018-05-21'
section: General
url: http://www.bbc.co.uk/news/world-asia-44154748
content: |-
  A replica of the Demilitarised Zone (DMZ) separating North and South Korea is drawing tourists.

  After a historic summit, a replica of the Demilitarised Zone separating North and South Korea has drawn hordes of tourists with hopes for peace.
