title: Trump and Macron say ‘progress’ has been made in Ukraine peace deal - BBC News
date: '2025-02-25'
section: General
url: http://www.bbc.co.uk/news/videos/cly24jllvdzo
content: |-
  The two leaders met at the White House on the third anniversary of Russia's full-scale invasion of Ukraine.

  During a joint news conference at the White House, US President Donald Trump and French President Emmanuel Macron discussed the 'progress' made between countries on peace talks concerning the Russia-Ukraine war.

  President Macron told reporters that they've been "working with President Zelensky" to have a proposal that is acceptable with Ukraine.

  Both presidents met on the third anniversary of Russia's full-scale invasion of Ukraine.
