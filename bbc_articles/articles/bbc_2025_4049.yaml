content: |-
  Work and Pensions Secretary Liz Kendall will set out reforms to the benefits system on Tuesday afternoon.

  Some claimants to lose out under benefits overhaul

  Eligibility criteria for disability benefits are expected to be tightened under government reforms

  Plans to overhaul the benefits system are to be announced later in a move aimed at cutting the growing welfare bill. Changes to personal independence payments (PIP) are expected to mean some may no longer qualify, while those with the most serious conditions may not have to be assessed again. Unemployed people in receipt of universal credit, who are actively looking for work, are also expected to see their benefit levels rise, though this is likely to be by a relatively modest amount. Cabinet Office Minister Pat McFadden told the BBC protection would "always be there for people who need help" - but there is concern in Labour ranks on the impact on vulnerable claimants.

  Speaking earlier, McFadden confirmed reassessment of conditions to qualify for benefits would be part of the announcement. He said the government did not "believe that every time someone is signed off sick that it's a permanent condition". "What we won't do is sit back and relax and pretend it's a progressive thing to watch millions go onto benefits," he added. Cabinet ministers are meeting in Downing Street on Tuesday morning, before Work and Pensions Secretary Liz Kendall announces the welfare changes in the House of Commons around 12.30 GMT. The government is hoping to reassure some recipients of PIPs , and indeed some restless Labour MPs, that they will not lose out when the plans are unveiled. Initial reports had suggested PIP - the main disability benefit in England, Wales and Northern Ireland - would be frozen for a year. But reforms are now expected to focus on eligibility for the benefit instead, after pushback from Labour MPs. In practice, this is likely to mean that those clearly unable to work will not face further reassessments of their condition, and will keep the entirety of their payments. However, the eligibility criteria are set to be tightened for those with less severe conditions, meaning some current recipients will lose out. It is expected that unemployed people in receipt of Universal Credit, and who are actively looking for work, will see their benefit levels rise - though this is likely to be by a relatively modest amount. It is also expected that people with disabilities who try out a job will not lose their existing benefit entitlement if it goes wrong. The Times reports, external that sick and disabled benefit claimants will face more frequent reassessments under the reforms, but that people with "permanent or degenerative conditions" may never have to be reassessed. The government is still facing resistance from within its own party, with Labour peer Baroness Shami Chakrabarti telling the BBC it was "wrong in principle" to cut benefits from people suffering from disabilities and illnesses. Speaking to the BBC, McFadden admitted there had been "difficult" discussions about welfare with his party. But he said Labour had been "elected on a platform of change". "And part of the change we need is a welfare state that is better suited to the 21st Century," he said.

  Chancellor Rachel Reeves is set to deliver a spring statement on 26 March against the backdrop of worsening economic forecasts, which have increased the need to find savings to allow the government to meet its self-imposed spending rules. The prime minister's policy team met Labour MPs last week to discuss savings in the range of £5bn to £6bn from potential welfare reforms. But Downing Street has said its overhaul is not purely driven by financial concerns. "I think the prime minister has been clear there is both a moral and an economic case for fixing our broken social security system that's holding our people back, and our country back," Sir Keir Starmer's official spokesman told reporters on Monday. He added that the changes would put the welfare system "back on a more sustainable path". Several disability benefit claimants have told the BBC that speculation about the prospect of looming cuts has been upsetting. "It's not a case of not wanting to [work]," said Alison, 56, who lives with her brother in a council property in Southampton. "I think about it all the time. Being on benefits doesn't make me feel happy." Speaking in the Commons on Monday, Social Security minister Sir Stephen Timms admitted speculation in the run-up to the official announcement had been a source of "anxiety" for claimants, adding: "I'm sad that that's happened, and that people have been concerned." Claimant numbers for PIP and Universal Credit payments have increased significantly in the four years since the pandemic, with total spending on health and disability benefits forecast to rise from £64.7bn in 2023-24 to £100.7bn in 2029-30. Kendall said on Monday that the government would not "shy away from the decisions that we believe are right to give opportunities to people who can work" but would also maintain "security for those who can't". She added the changes would ensure "trust and fairness in the social security system". The previous Conservative government had explored making it harder for younger people with mental health conditions to claim PIP. But no detailed proposals were announced ahead of the general election last July, which saw Labour return to power after 14 years out of office. The Conservatives' shadow work and pensions secretary, Helen Whately, questioned Kendall on Monday reports about unease among the Cabinet. Whately asked the minister whether there was "collective agreement" on the plans, with Kendall responding that the shadow secretary would have to "show a little patience".
