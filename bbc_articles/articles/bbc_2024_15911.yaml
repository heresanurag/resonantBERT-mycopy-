id: bbc_2024_15911
title: 'Newspaper headlines: ''Postal vote chaos'' and Trump has ''broad immunity''
  - BBC News'
date: '2024-07-02'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cv2g4rvp767o
content: |-
  Concerns over delays to ballot deliveries and a US Supreme Court ruling lead the papers.

  The build-up to the election leads many of Tuesday's front pages.

  In an interview with the Times, external, Sir Keir Starmer says a large Labour majority would mean a stronger mandate to deliver what he calls "difficult changes". He goes on to say people would feel "materially better off" and public services would be "working again" after a Labour government with a five-year term.

  Business Secretary Kemi Badenoch warns readers of the Daily Express, external that voting for Reform UK could wipe out hundreds of Tory MPs - in return for what she describes as a "few inexperienced Reform candidates". The paper says Reform is promising to be the "real opposition" in parliament on Friday morning.

  The Daily Mail, external says Britain's depleted military capability has left the armed forces unable to defend the country properly. That claim is based on an assessment by Rob Johnson, who led a government team that spent two years assessing the country's readiness for war. It concluded that Britain would rapidly run out of ammunition, be unable to stop missile attacks, and that the RAF and Navy are short of aircraft and ships.

  The Liberal Democrat leader, Sir Ed Davey, has told the Guardian, external that the election is a once-in-a-lifetime event that could reshape the political landscape for decades. Sir Ed also tells the paper that his campaign - which has been marked by unorthodox photo opportunities - has led to more awareness of his party's policies.

  The Daily Telegraph, external leads on a report that postal ballots haven't been delivered on time in 90 constituencies. Its editorial says "this is simply not good enough" and that "even at this 11th hour, efforts should be made to ensure that everyone who wants to vote and who registered on time should be able to do so".

  Writing in the Daily Mirror, external, former prime minister Gordon Brown urges voters to consider child poverty - and Labour's focus on tackling the issue - a priority on Thursday. He describes the hardship faced by millions of children as "a stain on the soul of our country" and a "scar on our conscience unless something is done".

  Another former Labour leader, Jeremy Corbyn, has spoken to the i, external, saying he believes Sir Keir Starmer will "crush dissent" within the party if he secures a large majority. He says he sees "no appetite for diversity by the Labour leadership" and that its approach could lead to a "fool's paradise of agreement". Mr Corbyn also says the optimism surrounding any victory this week would quickly disappear unless left-wing policies are delivered.

  "Supreme Court hands Trump broad immunity over actions as president" is the headline in the Financial Times, external. The paper says the ruling is likely to delay Trump's trial on charges of trying to overturn the 2020 US election and that - if elected - he could instruct officials to dismiss the case.

  Emma Raducanu, punching the air in her winning return to Wimbledon, is the image on numerous front pages. The Times, external says she drew inspiration from England's footballers by grinding out a result. "I won ugly" she says "but they all count".
