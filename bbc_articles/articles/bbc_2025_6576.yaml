title: 'Newspaper headlines: ''Bin strike blues'' and ''China handed NHS records''
  - BBC News'
date: '2025-04-16'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cpq7vq47wg3o
content: |-
  A range of stories on the front of Wednesday's papers including the latest on bin strikes in Birmingham.

  Trade is the focus of the Daily Telegraph, external saying Sir Keir Starmer is closing in on new agreements with the European Union, which could imperil a deal with the US. It says British negotiators are on the verge of accepting European food and veterinary standards - which could shut out some American goods. The Times, external says government officials are "scrambling" to save the pharmaceutical industry from tariffs. It reports that President Donald Trump has suggested duties of 25% on foreign drugs, which could cost firms such as AstraZeneca and GlaxoSmithKline billions of pounds. Analysis of Ministry of Justice statistics in the Sun, external shows prison officers face attacks almost 30 times a day. The figures show almost 10,500 assaults in the year to last September - an increase of nearly 2,000 on the previous year's figures. The Daily Mail, external is highly critical about the prospect of China potentially being able to access information from NHS patients. It says the data is being uploaded to the UK Biobank - a research hub for universities, scientific institutes and private companies. It says one in five successful applications to use the information comes from China. UK Biobank tells the Mail it is continually in dialogue with MI5 about the use of its data, while the government said it had strict security procedures in place.

  The Guardian, external leads on a decision by delegates at the National Education Union's annual conference to label Reform UK "far-right and racist". It also says the union's head, Daniel Kebede, called Nigel Farage a "pound shop Donald Trump". The paper says Farage hit back - accusing Mr Kebede of poisoning children's minds. The Daily Mirror, external has a full front page splash showing bin bags piled high in Birmingham - as refuse workers continue their walk out. "Sort out this mess" the paper demands, calling the situation a "shambles". Analysis in the i Paper, external says the ongoing freeze on income tax thresholds will pull millions more into the tax system over the next three years. It says more than eleven million people will be pulled into paying the basic rate of income tax for the first time -and more than five million of the new contributors will be over sixty.

