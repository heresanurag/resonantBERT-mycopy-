title: 'International Women''s Day: Stories of love amid Eastern Ghouta''s bombs -
  BBC News'
date: '2018-03-09'
section: World
url: http://www.bbc.co.uk/news/world-43173323
content: |-
  Syrian illustrator Dima Nachawi draws pictures showing the true stories of people in love, in the middle of a conflict.

  Friends sitting round a Christmas tree, two long-distance lovers talking on the phone, a man fixing the internet connection for his partner.

  At first glance, some of Dima Nachawi's illustrations could show couples from almost anywhere in the world - but the rest of the collection tells a very different story; of air strikes, injuries and death.

  These pictures illustrate how real people live - and love - in Eastern Ghouta, an area of Syria where conditions have been described as "hell on earth" by UN Secretary General Antonio Guterres.

  "They [the residents] still live their daily lives, they still fall in love and try to protect their beloved ones," says Dima.

  'On her first Christmas in Ghouta, friends surprised them in the shelter with a smuggled Christmas tree and handmade lights that worked on a generator. They celebrated with her with the few candies that they could find'

  Dima grew up in Syria, but left the country a number of years ago and now lives in Beirut, where she has a career as an artist.

  She has worked on a variety of creative projects, looking at the situation in Syria.

  This "Love is..." collection, published on social media, shows real people and and the effect the conflict has had on their relationships.

  Each illustration depicts a different, anonymous couple and Dima only reveals a few details about the people she draws.

  "This project was very difficult, especially the one in which the woman died," she says, describing the image below.

  "I was imagining how the illustration was going to look but at the same time it weighed very heavy on my heart.

  "It's very difficult to illustrate something that has an unhappy ending."

  'When the airstrikes hit again they ran toward each other and hugged. He was trying to face where he thought the hit was going to be so he could protect her. He got injured trying to save her. But she passed away from the glass that shattered into her body'

  "But I was also grateful that I had this chance to reflect on the other lives of the Syrians, where they survive, they love, they are not victims, they are people that can take action and they have agency.

  "This is what I want to reflect through my illustrations."

  Some aid has been able to reach the rebel-held area but charities say much more is needed.

  More than 700 people have been killed in recent weeks, many of them children.

  'She loves to play Smurfs and Plants vs Zombies, but the siege means he has to go to great effort to ensure the generator is able to charge her phone, and she has an internet signal'

  Dima is critical of the way the international media portrays the people of Syria.

  "On the human level, we are stereotyped as refugees and victims," she says.

  "I prefer to talk to people [in Syria] to see how they're doing in their daily life and how they are trying to live and survive."

  'She, besieged in Eastern Ghouta, and he, in Idlib [also a rebel area], talk for hours over WhatsApp, drink coffee and share their favourite poems and music. She prays for his safety and he for hers, waiting for the moment they can finally be together'

  Dima says she finds it "very difficult" to watch the conflict from afar.

  "Every time I feel bad, I try to do something. I know that I have followers all around the world and I'm conveying a message, telling those people something that they don't know about Syria.

  "I try through illustration and art to do something about it and maybe I can't massively change the current situation but I know that my illustrations are preserving something for the cultural memory, for the next generation to see and know what happened."

