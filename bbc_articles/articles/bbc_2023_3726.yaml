title: CCTV image released after elderly man set on fire outside mosque - BBC News
date: '2023-03-10'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-64913582
content: |-
  An 82-year-old man was doused in a liquid and set alight in west London.

  The Met Police has released an image of a man detectives want to speak to following the attack

  Police have released an image of a man detectives want to speak to after an 82-year-old man was set alight outside a mosque in west London.

  The elderly man was attacked in West Ealing on the evening of 27 February, as he and the suspect left the West London Islamic Centre.

  The attacker doused the victim in a liquid, believed to be petrol, before setting him alight using a lighter.

  The victim received hospital treatment for severe burns to his face and arms.

  Metropolitan Police Det Sgt Steven Constable said the force was carrying out a full investigation into the "incredibly shocking incident".

  "A key part of that is identifying the man in the image we have released," he said. "If you recognise this man I would urge you to get in touch."

  He added: "Understandably, there is a great deal of local concern in the wake of this incident and local officers have been carrying out reassurance patrols daily at the mosque."

  He said that the West London Islamic Centre is assisting the Met with its enquiries.

