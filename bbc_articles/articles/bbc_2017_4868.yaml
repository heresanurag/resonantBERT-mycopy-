  • None Arsenal have scored 4+ goals in five away league games this season. It's their most in a season since 1936-37 (also five).
  • None Sanchez became the eighth player to score 50 Premier League goals for Arsenal, with only Thierry Henry (83 games) and Ian Wright (87) reaching the milestone faster than the Chilean (101).
  • None Sanchez is also the first player to record double figures for both goals (21) and assists (10) in the Premier League this season.
  • None The South American also scored his 15th away goal in the Premier League this season - only Kevin Phillips (16 in 1999-00) has scored more in a single campaign.
  • None Peter Crouch scored his ninth Premier League goal against Arsenal - more than he has against any other opponent in the competition.
  • None Only Wayne Rooney (11) and Robbie Fowler (10) have scored more against the Gunners in the competition.
  • None Since the start of last season, only Ozil (31) and Sanchez (25) have recorded more assists for Arsenal in all competitions than Hector Bellerin (13), with the Spaniard picking up two today.
