title: 'Sturgeon: PM''s plan to quit could make Brexit worse - BBC News'
date: '2019-03-27'
section: Scotland politics
url: http://www.bbc.co.uk/news/uk-scotland-scotland-politics-47707247
content: |-
  The PM's pledge to stand down if her Brexit deal is approved could make "an already bad project even worse", Nicola Sturgeon claims.

  Nicola Sturgeon believes the case for Scottish independence is stronger than ever

  Theresa May's pledge to stand down if her Brexit deal is approved risks making "an already bad project even worse", Nicola Sturgeon has claimed.

  Ms Sturgeon said it could see Scotland "shackled to a disastrous Brexit driven by a Tory party lurching even further to the right".

  She predicted that this would "further reinforce" the case for independence.

  Ms Sturgeon was speaking after Holyrood voted for Brexit to be cancelled if the UK faces leaving the EU without a deal.

  Later MPs at Westminster voted on a series of eight alternative Brexit options and rejected them all.

  It led to SNP Westminster leader Ian Blackford raising the prospect of an election amid what he described as a "mess" and a "shambles".

  "Parliamentary democracy as we know it has broken down," he told the BBC.

  "I would really appeal to people, appeal to parliamentarians, given where we are, we haven't been able to resolve this. I think the right thing to do is we need to come together and recognise we put this back to the people.

  "If that doesn't happen then the only other option we've got is a general election."

