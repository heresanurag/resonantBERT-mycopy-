title: The digital epidemic killing Indians - BBC News
date: '2018-11-13'
section: General
url: http://www.bbc.co.uk/news/stories-46152427
content: |-
  India has seen a rise in public lynchings caused by social media messages spreading fake news.

  Smartphones are making it easier for millions of Indians to communicate and share messages on social media.

  But misinformation is spreading fast and can often turn deadly. This is one such story.

  This story is part of a series by the BBC on disinformation and fake news - a global problem challenging the way we share information and perceive the world around us.

  To see more stories and learn more about the series visit www.bbc.co.uk/beyondfakenews
