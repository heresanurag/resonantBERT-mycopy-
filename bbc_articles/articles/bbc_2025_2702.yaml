title: Artist inspired by Bradford for City of Culture competition - BBC News
date: '2025-02-05'
section: General
url: http://www.bbc.co.uk/news/videos/c8r5vem1kx6o
content: |-
  Nigel Wray says the city and its architecture should be enough to inspire anyone.

  Amateur artist Nigel Wray had not drawn for more than 40 years when he picked up his pencils again during the pandemic.

  Now, inspired by the architecture of Bradford, he has created more than 200 pencil sketches of the city and is submitting one to the nationwide project Draw - part of Bradford City of Culture.

  Supported by artist David Hockney, people are being asked to create a drawing inspired by a particular theme each month, with some of the submitted work set to feature in an exhibition at the end of the year.

  Mr Wray said: "I spend 10 to 15 hours on these drawings. They take ages, but it is a labour of love."

