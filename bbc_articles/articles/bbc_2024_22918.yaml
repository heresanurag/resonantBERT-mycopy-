  "I just want her to have justice - I want her to be able to walk out of here with her head held high and be able to say 'you did wrong, you did a bad thing to me but I have come out on top'," added Emma. A year on, Celyn still has occasional pain in her head but the psychological impact remains. "I get nervous going out - I have been out three times since it happened," she said. "I used to go out every weekend." Emma added: "She's 21, she should be living her best life. "This has traumatised her. I wouldn't want anyone else to have to go through it - to have to fight so hard when you are the victim of a horrific crime."

  South Wales Police said it acknowledged the disappointment of Celyn and her family "We strive to put the victim at the heart of any investigation and it is disappointing when a positive outcome is not achieved for them," said Supt Michelle Conquer. "A Victim's Right to Review is now underway for this matter. This is being conducted by an independent officer who has not been involved with the case previously, to ensure a thorough objective review. "We will ensure the victim is fully updated upon its completion. “We apologise for the delay in this process. We will ensure the victim is fully updated upon its completion.”
