title: Tonteg glassing victim feels 'let down' by South Wales Police - BBC News
date: '2024-09-23'
section: Wales
url: http://www.bbc.co.uk/news/articles/cm2yn8dk98no
content: |-
  Celyn Williams says she looked like a character from a "horror movie" after she was attacked.

  Glassing victim feels let down by police

  Mum, Emma and Celyn say they feel "let down" as victims

  A woman has said she still has anxiety about going out, a year after an alleged glassing attack in a pub left her with a head injury. Celyn Williams, from Tonteg near Pontypridd, Rhondda Cynon Taf, said she looked like a character from a horror movie after she was attacked in a pub beer garden in September 2023. The 21-year-old and her family said they felt let down by police who investigated the case and had "no faith" in the system as victims. South Wales Police said it acknowledged the disappointment and strived to put the victim at the heart of any investigation.

  For Celyn, the moment she was hit with a glass is still clear in her mind - her face turning warm after feeling a drink thrown at her. "I thought I was embarrassed but it was my blood which warmed me and I looked down and there was just blood pouring everywhere, I could taste it in my mouth," she said. "I couldn't see properly because there was all blood in my eyes - it was scary." Her mother, Emma, said she could not believe it when she saw her daughter covered head to foot in blood after receiving a call to pick her up and take her to hospital.

  Celyn's 2.5-inch (6.4cm) gash required multiple stitches from a maxillofacial surgeon, with the doctor warning if the cut had been in a slightly different place, her face could have been paralysed. As Celyn returned home to her "heartbroken" family after the incident, they were visited by two "wonderful" and "thorough" officers from South Wales Police who gave them hope that the alleged attacker, who Celyn was able to name, could be brought to justice. "The impression we were given was 'let us do our jobs, you have nothing to worry about'," said Emma.

  Celyn on the night she was attacked

  But as the weeks and months went on, the family became frustrated at the investigation, including what they have said was a lack of contact, with the family regularly chasing for updates, only to be left for long periods without callbacks. "I felt like I was being told off," Celyn recalled of one conversation with another officer. "We felt like we were the criminals and they were working against us, like we were so inconvenient and a waste of their time." After the family raised concerns, the force did publish an appeal for witnesses in the winter of 2023.

  In April 2024, seven months after the attack, the family were finally told police would not be taking the case forward due to a lack of witnesses and poor quality CCTV. They asked to see the CCTV on two occasions but have never been able to do so. "We feel so let down by the people who are supposed to be protect us," explained Emma. In May, the family's solicitor asked for a review of the police's decision not to charge the suspect, as part of the Victims' Right to Review (VRR) Scheme, external. South Wales Police said it would update the family with the result of the review by the end of July 2024 but Celyn and Emma are still awaiting a response. "It makes you feel like you are making a song and dance over nothing - it's not nothing," said Celyn, who now feels there would be "no point" going to the police in future.

