content: |-
  Being labelled 'ugly' brought curious visitors to the Belgian city

  Being labelled the ugliest place in the world felt like a blow to the Belgian city of Charleroi.

  In fact it brought curious tourists and wealthy investors into the heart of the run down rust belt of Northern Europe.
