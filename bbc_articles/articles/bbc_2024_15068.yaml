  Send us your messages about what an England victory on Sunday would mean to you.

  What would England winning Euro 2024 mean to you?

  We are asking you to send in messages about what an England victory in the final of Euro 2024 would mean to you. Are you from the same town as a member of the squad and feel a close connection? Have you seen your children be swept along by England's journey? Does it bring back memories of family members? Have you got an awkward double booking on Sunday night? Is it just a massively enjoyable watch? Use the form below to let us know your story, and we'll publish a selection of them on the BBC Sport website and app before Sunday's final against Spain.
