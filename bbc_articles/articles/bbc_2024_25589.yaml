title: Women who claimed to be child refugee sentenced over social worker stabbing
  - BBC News
date: '2024-10-19'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/ceqn38jq5xlo
content: |-
  Fiyori Kesete attacked the victim without warning, stabbing her in the arms and head.

  A 25-year-old woman has been jailed for stabbing a social worker in what the judge said was a "vicious and terrifying ordeal". Fiyori Kesete, originally from Eritrea, admitted causing grievous bodily harm at an earlier appearance in Dungannon Crown Court. She attacked the victim without warning, stabbing her in the arms and head. At the time of the incident, Kesete was under the care of the Southern Health and Social Care Trust’s 14+ team, living in accommodation in Dungannon in County Tyrone, as she had claimed to be a child. The assault happened in 2022, after police brought her back to her accommodation when she had been missing for days, accompanied by her social worker.

  Upon entering the property, Kesete went to the kitchen where the social worker was unpacking groceries, saying: "I’ve bought you all your favourite things." Without warning, the victim was stabbed multiple times in the arm and head. Police, still outside the property, quickly contained Kesete while paramedics arrived. The social worker was rushed to the hospital for emergency surgery. During a police interview, Kesete admitted to the attack but provided no explanation for her actions. A sentence of six years imprisonment was handed down but, having deemed Kesete to be dangerous, the judge extended the period of licence on release by two years. During sentencing the judge described the assault as "a vicious and terrifying ordeal with far-reaching and lasting effects". He noted that Kesete showed "limited remorse or victim awareness," and had blamed the social worker and police for making her angry.

  The court was told that at the time she was arrested her identity remained unconfirmed and there are five different dates of birth and six variations of her age registered with the Home Office. An assessment established Kesete’s correct date of birth and she was transferred from youth custody to Hydebank Women’s Prison. The judge rejected the suggestion that she had been trafficked to Northern Ireland but noted that she did "arrive illegally, and it may well be she was smuggled in." He also said her behaviour in custody had been persistently aggressive and violent. He recommended that Kesete should be deported at the end of her sentence. Police Service of Northern Ireland (PSNI) Detective Constable Dunlop described the incident as a "completely unprovoked attack which no one should ever have to encounter in the course of their work." Det Cons Dunlop hoped the sentencing "will provide the victim with some comfort that justice had been served".
