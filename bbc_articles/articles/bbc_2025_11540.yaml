title: AJ Tracey says new album more personal than before - BBC News
date: '2025-06-13'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/cj93knmwdvjo
content: |-
  The rapper releases Don't Die Before You're Dead on Friday after a four-year break from music.

  AJ Tracey says he's ready to open up on his new album

  AJ Tracey performed at Radio 1's Big Weekend festival in May

  AJ Tracey is back with his first album in four years, and this time it's personal. "I've avoided speaking about quite personal things," he says, reflecting on his earlier music. The rapper, real name Ché Wolton Grant, tells 1Xtra's DJ Target he's always preferred to keep his real self separate. "I like to keep AJ Tracey as a persona and a person that I don't have to always be connected to," he says. "When I speak about personal things I've gone through as AJ Tracey, then I can't really get away from it." But on his latest album, Don't Die Before You're Dead, he says that's about to change.

  As his career's progressed, Ché and AJ Tracey can be "quite hard to separate", he says. It's made even harder as an independent artist, AJ says, because "you don't want to ever miss an opportunity". "I feel like when I should be turning off, I'm still awake." Now though, the 31-year-old says he feels "secure and stable enough" to open up more in his music. "If Ché's gone through something and I can speak about it as AJ Tracey I'm willing to receive whatever conversation arises as AJ or as Ché," he says. "I'm happy to divulge, especially if it's going to help someone." Don't Die Before You're Dead delves into British identity, resilience and stories of the west London rapper's journey from Ladbroke Grove to the heights of the UK scene.

  Cousins AJ and Big Zuu used to write bars together in AJ's front room

  Single 3rd Time Lucky, which was released in advance of the album, explores AJ's relationship with his mum and her recovery from cancer. She's meant "everything" to his journey, he says. "My mum gave the mandem somewhere to just chill that's away from danger and let us really foster our talent and be creative without being outside on the roads. "Instead of having mandem outside on the streets, it's better that we're in the house and she knows she can keep an eye on us. Even just that gave us the platform to jump off and go do what we're doing." AJ Tracey is speaking to DJ Target at an intimate gig at Maida Vale Studios, performing tracks from the new album in front of friends and family. TV chef and rapper Big Zuu, who's also AJ's cousin, is there and says they used the family's front room as a "harbour". "We would go there and write bars," he says. "It gave us a safety net to just be ourselves, have fun, connect." AJ has been a passionate supporter of dedicated services for young people, lending his voice to calls for more youth clubs and even partnering with Children in Need and McDonald's to pair restaurants with youth workers. "It's essential," he says. "We need safe spaces."

  With more personal tracks, AJ says it's important his music stays relatable. "That's how you build your fanbase and keep them locked in, by giving them things and showing them you're human," he says. "Like some of Drake's lyrics, I'm not rich enough to relate to any of that stuff. "It's nice to sometimes show people it's not easy but we're kicking on." AJ acknowledges four years has been a long time to keep his followers waiting for new music, and in a promotional video announcing the album earlier this year fans at his beloved Tottenham Hotspur Stadium ask "where is he?" But he thinks it will be worth the wait. "I don't like rushing music," he says. "Music lasts forever - when I'm not here no more the music will still be here and if you put out music that you rush, it's just going to leave a legacy you're not really proud of. "I want to be proud of all my music."

  1Xtra's Album Launch Party with AJ Tracey is available on BBC Sounds and will air on DJ Target's 1Xtra show at 20:00 on Monday 16 June. It's also available to watch on YouTube, external and BBC iPlayer.

