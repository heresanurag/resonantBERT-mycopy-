  The Royal Incorporation of Architects in Scotland have named 14 buildings as their 2021 award winners.

  This is the first hospice in the UK to follow the Scandinavian-inspired "Sengetun" model of care which puts patients and families first, providing private, dignified and compassionate care. The hospice creates light-filled and familiar places that look and feel like home, with medical assistance sitting firmly in the background.
