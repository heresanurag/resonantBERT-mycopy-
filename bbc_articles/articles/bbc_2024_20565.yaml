title: 'Transfer news: Scott McTominay and Billy Gilmour sign for Napoli - BBC Sport'
date: '2024-08-30'
section: Football
url: http://www.bbc.co.uk/sport/football/articles/cdx6g3vy514o
content: |-
  Napoli complete the signings of Manchester United midfielder Scott McTominay and Brighton midfielder Billy Gilmour.

  Billy Gilmour (right) and Scott McTominay were both part of Scotland's squad at Euro 2024

  Napoli have completed the signings of Scotland midfielders Scott McTominay and Billy Gilmour. McTominay, 27, joins for £25.7m having spent his entire career at Manchester United - first attending a soccer school at the club aged five. Gilmour has moved to Italy from Brighton for an initial £12m, with add-ons worth a potential further £4m. The 23-year-old played 60 times for Brighton having joined from Chelsea in 2022. McTominay, who debuted for United in 2017 and made 255 club appearances under four permanent managers, scored 10 goals in 43 matches last season. However, his game time was set to be limited by the arrival of Uruguay midfielder Manuel Ugarte from Paris St-Germain. In a farewell message to United fans, McTominay said he would have "snapped your hand off" for the Old Trafford career he has had. "I've absolutely loved it and I'm very, very grateful for the football club and I'm ready for a new challenge and I'm ready to go and embrace it and take it by storm," he added. "I want to see Manchester United win, I want to see us do really, really well and I'll be watching as well. Thank you for having me and I have enjoyed every minute."

  The deal is also beneficial to United because, as a homegrown player, McTominay's departure gives the club more flexibility within the Premier League's Profit and Sustainability Rules (PSR). Manager Erik ten Hag said his feelings were "mixed" about the transfer. "I'm very happy for him," said the Dutchman. "It's also [a good deal] for us, but it is mixed because I wouldn't prefer to lose him because he's Manchester United in everything. "He was so important for our team, for Manchester United, but unfortunately it's the rules. "We have to discuss the rules, when you have to sell and obviously homegrown and academy players bring more value, that's not the right thing to do. "But I think for everyone, for all parts it's a good deal. For Scott, he's happy with it, for Napoli a very good player, but also for us." Napoli, who are managed by former Chelsea and Tottenham boss Antonio Conte, also signed striker Romelu Lukaku from Chelsea on Thursday.

  Brighton and Napoli have been in protracted talks over a deal for Gilmour, but the transfer was put into doubt by the injury to the Seagulls' new midfield signing Matt O'Riley. Napoli boss Conte helped drive the move for Gilmour, who made his debut after the Italian had left Chelsea but was part of the youth teams during the manager's Stamford Bridge reign. On Gilmour's departure, Brighton manager Fabian Hurzeler said: "I have thoroughly enjoyed the short time I worked with Billy. "He’s a great professional and I wish him all the best for the future."
