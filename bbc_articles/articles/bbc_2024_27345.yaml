title: Rioter Peter Lynch, 61, found hanging in cell, inquest told - BBC News
date: '2024-11-01'
section: South Yorkshire
url: http://www.bbc.co.uk/news/articles/c3vlwxw6wweo
content: |-
  Peter Lynch was found dead two months into his two years and eight months prison sentence.

  Peter Lynch was found dead at HMP Moorland, near Doncaster, on 19 October

  A grandfather who was found dead in prison after being jailed for taking part in rioting outside a hotel housing asylum seekers died as a result of hanging, an inquest has heard. Peter Lynch was found unresponsive in his cell at HMP Moorland, in South Yorkshire, on 19 October, Doncaster Coroner's Court heard. The 61-year-old was serving two years and eight months after pleading guilty to violent disorder and being part of unrest at the Holiday Inn Express in Rotherham on 4 August. The inquest heard that "ancillary investigations" are ongoing into his cause of death, with senior coroner Nicola Mundy adding she does not yet have a full report from the pathologist.

  Members of his family joined the inquest by video link, with his son, Casey, asking a number of questions about the investigation. Some of his concerns included “whether my dad should've been there in the first place", as well as why two previous suicide attempts by his father were not "taken seriously". The coroner told him that he and his family will have input in the investigation and will be able to share their concerns in other hearings.

  Det Sgt Gareth Gent, of South Yorkshire Police, told the inquest Lynch was last seen alive on Friday 18 October during a roll-call at 19:00 GMT. He was found to be unresponsive and not breathing in his cell by staff the next morning. Mr Gent said CPR was carried out by officers until paramedics arrived, with Lynch pronounced dead at 06:42. He said investigations so far suggested he had been alone in his cell when he was found. Ms Mundy adjourned the inquest to a date to be fixed, adding the full inquest will eventually be held in front of a jury.

  Lynch, of Burman Road, in Wath-upon-Dearne, had been married for 36 years, had four adult children and three grandchildren. He also had diabetes, thyroid issues, angina and had recently had a heart attack. During his trial at Sheffield Crown Court in August, a judge heard he was at the front of a crowd protesting against immigration and had shouted "scum" and "child killers" at police. He was also pictured holding a placard that accused MPs, judges, the media and the police of corruption. He was one of more than 70 men who have now been jailed at Sheffield Crown Court following the Rotherham rioting, which left 64 police officers injured, as well as four dogs and a horse. Listen to highlights from South Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
