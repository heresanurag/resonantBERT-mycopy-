content: |-
  Queen Elizabeth II leaves Buckingham Palace for the final time as her coffin makes its way to Westminster Hall.

  Queen Elizabeth II has left Buckingham Palace for the final time.

  Her coffin makes its way towards Westminster Hall where Her Majesty will lie in state for four days. Members of the public will be able to pay their respects 24-hours-a-day until 06:30 BST on Monday 19 September.
