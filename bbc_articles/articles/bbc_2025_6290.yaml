title: Top Gear driver The Stig breaks 20-year-old lap record in Surrey - BBC News
date: '2025-04-13'
section: Surrey
url: http://www.bbc.co.uk/news/articles/c5y6p321neyo
content: |-
  Top Gear editor Jack Rix says the record at Dunsfold Aerodrome was thought to be "untouchable".

  The Top Gear record was broken in a McMurtry Speirling Pure VP1 track car

  Top Gear's anonymous racing driver The Stig has broken a 20-year-old record for the fastest lap around the BBC motoring show's test track in Surrey. The Stig completed the 1.75-mile (2.8km) figure of eight circuit at Dunsfold Aerodrome in 55.9 seconds in a McMurtry Speirling Pure VP1 electric track car, beating the previous record by 3.1 seconds. The new lap time broke the 2004 record of 59 seconds in a Renault R24 Formula One car, also set by The Stig, who has been portrayed by a number of drivers. Jack Rix, editor of Top Gear, said: "Being there to witness a 20-year-old lap record being shattered – one we thought was untouchable – was an incredible moment."

  He added: "It's a record that might never be broken, unless any F1 teams are feeling brave?" The lap record is part of BBC Studios' new Top Gear YouTube series Stig Laps, where the unknown racer attempts to break lap records on the Top Gear test track in some of the world's fastest and rarest cars. Thomas Yates, co-founder and managing director of McMurtry Automotive, added: "Achieving the fastest lap ever on this legendary circuit is an immense achievement."

