  "Eddie Jones was brought in by the Rugby Football Union for weekends such as this.

  "The players are relaxed. There is an inner-confidence about this England team. I genuinely do think there is total self-belief and that is coming from the top, from Jones.

  "There are English rugby legends in waiting but they have got to do what the 2003 lot did. On the flip side you've got New Zealand, a captain in Kieran Read who has been there and done it but has not won a World Cup as skipper.

  "Both these teams have serious hunger to take themselves into the history books for their respective countries. It feels like a real game for the ages."
  • None New Zealand have won 15 of their last 16 matches against England, the exception in that run being a 21-38 defeat at Twickenham in 2012.
  • None This will be the fourth World Cup clash between England and New Zealand, the All Blacks have won each of the previous three (1991, 1995, 1999) including the only knock-out encounter when Jonah Lomu scored four tries in the 1995 semi-final in South Africa.
  • None New Zealand have won their last 18 World Cup matches, the longest run in the tournament's history. They last lost a game in the 2007 quarter-finals against France. Lock Sam Whitelock has played in all 18 of those games and holds the individual record for most consecutive wins in World Cup history.
  • None The All Blacks have averaged the most points (51), tries (7.3), metres (642), clean breaks (22), defenders beaten (39) and offloads (17) of any side at the 2019 World Cup, they are also one of four sides yet to lose a scrum on their own feed (30/30).
  • None England are one of just four sides yet to receive a card of either colour at this World Cup and the only one of the four semi-finalists.
  • None Neither England nor New Zealand have conceded a first-half try in this tournament so far, the only sides to manage this. Both have conceded three tries in the second half.
  • None Maro Itoje has won more turnovers (7) than any other player at this World Cup. Ardie Savea (5) tops New Zealand's standings but has won the joint most jackal turnovers of any player (5).
  • None Billy Vunipola is in line to win his 50th cap for England. New Zealand are the one side he has yet to beat in an England shirt, notching up victories against each of the other 11 nations he has faced.
  • None Jonny May needs one try to equal Jason Robinson on 28 tries for England, the joint fifth most for the country. It will be May's 51st match - Robinson won 51 caps for England.

