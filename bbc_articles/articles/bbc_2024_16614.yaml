content: |-
  Habibur Masum denies murdering Kulsuma Akter as she pushed the pram along a city street in April.

  Man denies killing wife as she pushed baby in pram

  A man has denied murdering his wife as she pushed their baby in a pram along a street in Bradford. Habibur Masum, 26, is accused of fatally stabbing Kulsuma Akter as she walked in the Westgate area of the city on 6 April. Appearing at Bradford Crown Court, Masum, of Leamington Avenue in Burnley, pleaded not guilty to murdering the 27-year-old and possession of a bladed article.

  Mr Masum also denied two counts of assault by beating, one charge of making threats to kill and one charge of stalking, all against Ms Akter. He also pleaded not guilty to possession of a bladed article. Ms Akter was attacked at about 15:20 BST as she pushed her baby in Bradford city centre. Emergency services were called, but Ms Akter was pronounced dead at the scene a short time later. The court heard the allegations of assault and threats to kill related to two days last November. Mr Masum is accused of stalking Ms Akter between November and April, with the charge alleging he "tracked her movements and located her at a safe house, sent her messages of a menacing nature which contained threats to kill another and photos and videos of the area and premises where she was residing". He is also alleged to have "loitered in the area of her temporary residence". The charge alleges he caused her "alarm or distress" and to "fear that violence would be used against her".

  Monwara Begum spoke to the BBC from her home in Sylhet in Bangladesh

  Speaking after Ms Akter's death, her mother Monwara Begum said she had been left "heartbroken". From her home in Bangladesh, she said: "I am in shock. She was my youngest daughter and I adored her greatly. "When she moved to the United Kingdom I was alone, but Kulsuma would call me every day by video. The only day I didn't hear from her was the day she was attacked." Judge Jonathan Rose remanded Mr Masum into custody until his next hearing at the same court on 27 September. A trial is scheduled to begin on 2 December. Follow BBC Yorkshire on Facebook, external, X (formerly Twitter, external) and Instagram, external. Send your story ideas to yorkslincs.news@bbc.co.uk.
