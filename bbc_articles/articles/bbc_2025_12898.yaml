content: |-
  A total of 452 plants were seized during the raid near Burbage in Leicestershire.

  A police force has shared a video showing the inside of a large cannabis farm during a raid.

  Leicestershire Police said it had exercised a search warrant at the premises near Burbage in Leicestershire on Wednesday.

  According to the force, £300,000 worth of cannabis was seized during the raid.

  It said Vani Budkaj, 42, and Gazion Kraja, 22, both of no fixed address, had been charged with producing a controlled drug of Class B and remanded into custody.

  They will appear at Leicester Magistrates' Court on 11 August.

  A third man - a 38-year-old from Coventry - was arrested on suspicion of the same offence but released on police bail while inquiries continue.
