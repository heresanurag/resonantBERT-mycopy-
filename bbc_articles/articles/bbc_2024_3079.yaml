content: |-
  Charles Kinston, 23, was found fatally shot in a field in Derbyshire, police say.

  Charles Kinston, 23, was found dead in a field near Swadlincote

  Tributes have been paid to a young farmer who was shot dead in a field in Derbyshire.

  Charles Kinston, 23, was found on land off Brizlincote Lane, Bretby, near Swadlincote, on 29 January.

  Police said a man in his 30s was arrested at the scene on suspicion of murder before being released on bail as inquiries continue.

  Leicestershire Federation of Young Farmers' Clubs described Mr Kinston as a "kind and generous character".

  A spokeswoman said the organisation was "devastated" at the news of his death and offered "deepest condolences" to his family.

  "Charles has been a member of Netherseal YFC for more than 12 years and will be hugely missed by the YFC community," she said.

  "We are supporting the club and anyone involved in YFC who was close to Charles at this incredibly difficult time.

  "He was a much-loved, kind and generous character who knew how to make everyone laugh.

  "In his long association with YFC, he touched the lives of many and his loss will be difficult to come to terms with."

  Derbyshire Police said officers had been called to the field about 18:30 GMT and Mr Kinston was subsequently pronounced dead.

  Det Ch Insp Matt Croome, from the East Midlands Major Crime Team, said: "Due to the ongoing investigation, we are limited about the information that can be passed to the public at this time.

  "However, I want to be clear that the two individuals involved in this incident are known to one another, and officers have mitigated any risk to the wider public at this time.

  "Any further updates will be passed as soon as the investigation allows."

