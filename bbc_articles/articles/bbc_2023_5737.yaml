title: Watch US police officers save 84-year-old from burning car - BBC News
date: '2023-04-27'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65408141
content: |-
  Dashcam shows the minivan burst into flames after driving with a flat tyre that sent sparks flying.

  Police dashcam has captured the moment officers pulled an 84-year-old driver away from a burning car in Wisconsin.

  The minivan had refused to stop for police whilst driving with a flat tyre before it erupted into flames.

  Officers pulled the driver to safety. He escaped without any major injuries.
