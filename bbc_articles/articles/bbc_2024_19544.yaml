title: 'Megan Havers: Team GB archer, 16, celebrates GCSE results - BBC News'
date: '2024-08-22'
section: Leicester
url: http://www.bbc.co.uk/news/articles/clyn6n1e623o
content: |-
  The Olympian says she passed all of her GCSEs apart from PE, "ironically".

  Megan Havers represented Team GB in archery at the Paris 2024 games

  A 16-year-old Olympian who was the youngest archer at the Paris 2024 games is celebrating passing her GCSEs despite "ironically" failing PE. Megan Havers, from Leicester, received her results on Thursday, just weeks after getting through to the last 16 of the women's individual competition at the Olympics. The teenager juggled training, competitions abroad and revision ahead of her summer of exams and sport. She said she felt more nervous about taking her GCSEs than competing in front of thousands in Paris.

  Havers said she could not have tackled both her training and revision without the support of the staff at South Charnwood High School. "I passed everything apart from PE, ironically," she said. "It was always going to be difficult. "But my school allowed me to train and compete abroad and they gave me all of the necessary resources to study abroad as well."

  Steve Havers said he was "blown away" by his daughter's achievements

  The Olympian is now planning use her eight GCSEs to go to Loughborough College to complete an elite athletes course, which will allow her to study online while training at the Performance Archery Centre in Shropshire. Her dad, Steve Havers, said his year watching his daughter compete at the Olympics and complete her exams had been a "rollercoaster". "She's absolutely smashed it," he said. "There aren't words to describe it - the emotional rollercoaster that we've all been on, because it's not just Megan, it's a whole team effort. "I'm just blown away by her complete dedication to her revision and the Olympics." Follow BBC Leicester on Facebook, external, on X, external, or on Instagram, external. Send your story ideas to eastmidsnews@bbc.co.uk, external or via WhatsApp, external on 0808 100 2210.
