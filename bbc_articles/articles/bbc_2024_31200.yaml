title: 'Igor Kirillov: Russia detains Uzbek man over general''s killing in Moscow
  - BBC News'
date: '2024-12-19'
section: Europe
url: http://www.bbc.co.uk/news/articles/cge9rv38x98o
content: |-
  A 29-year-old Uzbekistan citizen admits he was recruited by Ukraine's special services, Russia claims.

  Flowers have been placed close to where Kirillov and his assistant were killed

  Russia's authorities say a 29-year-old man from Uzbekistan has been detained over the killing of senior general Igor Kirillov and his assistant in Moscow. Lt Gen Igor Kirillov, head of the Radiation, Chemical and Biological Protection Forces, was outside a residential block early on Tuesday when an explosive device hidden in an electric scooter was detonated remotely, the authorities say. Russia's Investigative Committee (SK) says the suspect - who has not been publicly named - has admitted he was recruited by Ukrainian special services. The SK provided no evidence to back its claim. Ukraine's security service SBU had already claimed it was behind the killing, a source told the BBC on Tuesday.

  The suspect has not been publicly named

  The Ukrainian source said Kirillov, 54, was "a legitimate target" and alleged he had carried out war crimes. On Monday, the day before the killing, Ukraine charged the Russian general in absentia, saying he was "responsible for the mass use of banned chemical weapons". Moscow denies the allegations. In a statement on Wednesday, the SK said the detained man - born in 1995 - was a citizen of Uzbekistan. It said he was "suspected of committing a terrorist act" and that during interrogation, "he explained that he was recruited by the Ukrainian special services". The explosive device had been placed on the scooter parked near the entrance to the residential building where Kirillov lived, the SK said. To monitor the location, the suspect had rented a car, where he installed a video camera that was livestreaming to the attack organisers in Ukraine's city of Dnipro, the investigative committee added. When Kirillov and his assistant Ilya Polikarpov left the building, the explosive device was remotely activated, the statement said.

  Kirillov was killed outside an apartment block on Tuesday

  Meanwhile, Russia's Federal Security Services (FSB) published a video of the suspect's interrogation. In the footage, a dark-haired man wearing handcuffs with what appears to be a visible rip in his coat is seen speaking directly to the camera. He is heard saying in Russian that he had been offered a reward of $100,000 and a European passport in exchange for killing Kirillov. The FSB added that on Ukraine's instructions, he arrived in Moscow and received a homemade explosive device. It is unclear whether the suspect's confession was made under duress.

  Kirillov is thought to be the most senior military figure assassinated inside Russia since President Putin launched a full-scale invasion of Ukraine in February 2022. As well as being charged by Ukraine, Kirillov had previously been sanctioned by the UK over the alleged use of chemical weapons in Ukraine. Ukraine's SBU security service has claimed Russia used chemical weapons more than 4,800 times under the general's leadership. Moscow denies this and says it destroyed the last remainder of its vast chemical weapons stockpile in 2017. Pictures from the scene outside Kirillov's apartment block in south-eastern Moscow on Tuesday showed the badly damaged entrance, with scorch marks on the walls and a number of windows blown out. Two body bags could also be seen on the street. Also on Wednesday, the Russian Foreign Ministry said Russia would raise Kirillov's assassination at the meeting of the United Nations Security Council on Friday. Russian officials have vowed to find and punish those involved in the killing.
