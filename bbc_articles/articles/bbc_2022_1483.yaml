title: 'As it happened: Energy price cap: Sunak says government plan is right and
  fair - BBC News'
date: '2022-02-03'
section: UK
url: http://www.bbc.co.uk/news/live/uk-60236456
content: |-
  The chancellor says the government is sharing the burden with households of higher energy bills.

  Do you accept council tax is poorly targeted?

  The chancellor is asked about issues with people on low incomes who happen to live in properties valued 30 years ago in a higher tax band. Does he accept that it's poorly targeted as a way to support people? Sunak says he accepts that no system could be "perfectly targeted", but he says there is a discretionary fund of £150m for councils to support people in this situation. He says there are about 300,000 people living on benefits who live in houses that are rated about council tax band D, so wouldn't automatically get the £150 discount. But he defends using the council tax system, saying it has the advantage of working on a household basis, as energy bills do, and being quick. "People will feel that £150 in April and that’s really good," he says.
