  Zero daily Covid deaths announced in UK for first time since pandemic began.

  Debate needed over UK's long-term approach to virus, says expert

  With rising cases of the Covid variant first identified in India there is some debate among experts about whether England's planned 21 June lockdown lifting should go ahead. Downing Street says the prime minister has seen nothing in the data to divert from the proposed date but will continue to look at the latest scientific advice. Danny Altmann, professor of immunology at Imperial College London, is one of those who cautions against lifting restrictions in England on 21 June. He tells BBC Radio 4's the World at One programme: "If we got to a stage where we have a two dose vaccine delivered through the age group, I think we'd be in a fairly safe situation but we're not there yet." Asked whether it should be accepted that there will be a constant background level of infection, he says: "That boils down to a profound policy debate maybe we need to have, and can't be whisked through by a sleight of hand, that says what kind of country do we want to be in the next one or two or five years or 10 years. "And different countries will make different choices about whether they want to try to get as close as possible to elimination or whether they want to tolerate a percolating level of susceptibility to this variant and the next variant forever more and those will have enormous implications."
