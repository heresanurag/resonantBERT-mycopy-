title: Teen arrested after death of 70-year-old in Glasgow - BBC News
date: '2024-04-13'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-68806342
content: |-
  Police arrested the boy after reports of an assault on a man on the city's Victoria Road on Friday.

  Police were called to the scene on Victoria Road on Friday night

  A 15-year-old boy has been arrested in Glasgow in connection with the death of a man.

  Police were called to the Victoria Road area of the city's south side at 23:55 on Friday after reports of a serious assault of a 70-year-old man.

  A Police Scotland spokesperson said: "The man was subsequently pronounced dead at the scene.

  "A 15-year-old male has been arrested in connection with the incident and inquiries are ongoing."
