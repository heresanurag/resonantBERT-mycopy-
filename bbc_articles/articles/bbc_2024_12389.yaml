  Another former baseball player, CC Sabathia, wrote that Mays “changed the game forever and inspired kids like me to chase our dream.” Despite having not played professional sports for over 50 years, the MLB added 10 more hits to Mays's career record earlier this month, after deciding to incorporate statistics from the Negro League. His record now stands at 3,293 hits, including the 10 he hit for the Birmingham Black Barons in 1948. As recently as Monday, Mays said he would not be able to attend a game in his honour that was scheduled for Thursday in Birmingham. “My heart will be with all of you who are honouring the Negro League ballplayers, who should always be remembered, including all my teammates on the Black Barons," he said. “It’ll be a special day, and I hope the kids will enjoy it and be inspired by it." Mays was born and raised in Westfield, Alabama, and began his professional baseball career while still in high school in 1948. In 1950, he joined the New York Giants - who later became the San Francisco Giants - and in 1951 hit 20 home runs for the team as a 20-year-old. After the 1951 season Mays was drafted into the US Army to serve in the Korean War.

  After missing the 1952 and 1953 seasons due to his military service, Mays returned in 1954 to earn his first MVP award. That same year, he helped the team defeat Cleveland in the World Series. The famous over-the-shoulder catch he made during the game helped the team clinch the win with a score of 5-2 after 10 innings. In 1972 he was traded to the New York Mets at the age of 41, where he played for two more seasons before retiring. After his playing career, he was still a regular face in the Giants dugout, offering advice on and off the field to young players. “He always had time for you. He had a way about him that you could talk to him about baseball and he would give you honest opinions,” retired Giants player JT Snow told the BBC. “Baseball is a hard game, and we go through ups and downs. I remember him saying: ‘Just keep playing and having fun.’” Snow said Mays kept the noise of analytics and statistics out of his head, sticking with a simple philosophy that saw him change the game: “I see the ball and hit the ball, and I run the bases and I catch it.”
