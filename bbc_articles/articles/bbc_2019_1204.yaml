title: Brazil's new president, Jair Bolsonaro, takes office - BBC News
date: '2019-01-02'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-46731638
content: |-
  Jair Bolsonaro uses his inaugural speech to pledge to free Brazil of corruption, crime and economic mismanagement.

  Brazil's far-right President, Jair Bolsonaro, has used his inaugural speech to promise to build a "society without discrimination or division".

  He told Congress he wanted to free Brazil of corruption, crime and economic mismanagement.
