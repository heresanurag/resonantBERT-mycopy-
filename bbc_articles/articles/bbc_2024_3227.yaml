  Forecasters expect heavier downfalls later, and are warning of possible travel disruption.

  How cold does it need to be to snow?

  Why is raining and not snowing where I am? It basically comes down to temperature. Fractions of a degree can be crucial to the balance between rain and snow, and for a large area of north Wales, northern England and Northern Ireland that will be the case today. First of all, the temperature doesn’t have to be below 0C. Even if your thermometer is reading 2 or 3 Celsius, temperatures a little higher up in the atmosphere can be sub-zero. Snow falling from the clouds above may not have had the chance to melt before hitting the ground. This is also the reason why hillier areas may get snow, but the valleys don’t. The intensity of precipitation can be crucial too. The heavier it is, the more likely it is to cause the temperature to drop and what falls will be snow. This is why you may see it chopping and changing between rain and snow over small periods of time. With cold air in place for some today, and mild air pushing up from the south, that balance will be a fine one for some.
