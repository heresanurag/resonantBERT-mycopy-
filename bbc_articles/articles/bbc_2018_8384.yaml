  • None 'It's quite emotional' - pundits react to England win 'That was for the fans' Alli, 22, became the second youngest England World Cup goalscorer after Michael Owen, who was 18 when he scored at France 1998. "It's a great achievement for the team and we owe it to the fans," said the Tottenham midfielder. "They have been believing in us. It was a great performance from the team. "It's always nice to score especially in occasions like this. I don't think it was my best performance but to get a goal is unbelievable and it's an amazing feeling to get to the semi-final." Choose who you would pick in the England starting XI to face Croatia in the World Cup semi-final - and then share it with your friends using our team selector.
