title: Injured loggerhead turtle found in Cumbria released into wild - BBC News
date: '2024-09-17'
section: England
url: http://www.bbc.co.uk/news/articles/c4g554gkkg5o
content: |-
  The creature has been released in the Azores after a successful rehabilitation programme.

  An injured loggerhead sea turtle has been released back into the wild. The turtle, named Nazaré, washed up on a beach in Cumbria in February, showing no signs of movement and covered in algae. The creature had a successful rehabilitation programme at various Sea Life facilities. Nazaré was flown to the Azores and released back into the wild earlier this month.

  The reptile was rescued from a beach on Walney Island, Barrow-in-Furness, on 4 February. It was found severely cold-stunned, suffering from pneumonia, and covered with a thick build up of algae and seaweed upon its arrival at Sea Life Blackpool.

  The turtle was found covered in algae and cuts

  Nazaré's care involved gradually raising its body temperature, hydration injections, and closely monitoring condition around the clock. The team created floats to make sure Nazaré did not drown, as well as using a toothbrush to clean the turtle's shell. Within days, it began showing signs of improvement, eating and moving independently. Once the team at Sea Life were happy Nazaré was fit, healthy and ready to be returned to the wild, they secured a turtle passport, enabling it to be flown to the Azores.

  Following the rehabilitation, Nazaré was flown to the Azores and released back into the wild

  Nazaré was temporarily housed at Porto Pim aquarium in Portugal, before the release back into the wild this month.

  The reptile was found to have a satellite tracking device fitted to its shell and had previously been microchipped. Sea Life learned the turtle had been previously released in June, having been found stranded before at Saint-Hilaire-de-Riez, France. Sea Life Scarborough curator Todd German said: "She is an incredibly lucky turtle, having been rescued and rehabilitated not once, but twice."
