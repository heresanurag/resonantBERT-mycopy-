title: 'Coventry: Boy, 12, killed in Radford Road hit-and-run - BBC News'
date: '2024-06-15'
section: Coventry & Warwickshire
url: http://www.bbc.co.uk/news/articles/c3gg255yz0lo
content: |-
  Police say the BMW involved has been found, but the search continues for the suspects.

  The boy died at the scene in Coventry on Friday afternoon

  A boy has died after he was struck by a car in a hit-and-run crash in Coventry. The 12-year-old was fatally injured on Radford Road at about 16:30 BST on Friday. A BMW that was involved has been seized, but police are appealing for help to identify the people who were in the car at the time of the crash. "We would appeal to the driver or for any of the passengers who were in the vehicle to do the right thing and to contact us," said Sgt Rich Evans from West Midlands Police.

  Floral tributes have been left at the roadside

  "A 12-year-old boy has tragically lost his life and we need you to come forward and hand yourselves in." Officers are appealing for witnesses and dashcam footage from the scene as they work to trace the suspects. Sgt Evans said officers were supporting the family.
