title: 'Six Nations 2023: Wales to play match against England as strike action averted
  - BBC Sport'
date: '2023-02-22'
section: General
url: http://www.bbc.co.uk/sport/rugby-union/64718572
content: |-
  Wales' Six Nations match against England will go ahead on Saturday after the Welsh players decide against strike action.

  Last updated on .From the section Welsh Rugby

  Coverage: Live on BBC One, S4C, Radio 5 Live, BBC Radio Wales, BBC Radio Cymru, the BBC Sport website & app; live text commentary on BBC Sport website & app.

  Wales' Six Nations match against England will go ahead after the Welsh players decided against strike action.

  Saturday's game in Cardiff was in doubt with players threatening not to play because of a dispute with Welsh rugby bosses over contracts.

  But the Welsh Rugby Union (WRU) and Wales squad players have reached a compromise on some key issues.

  Warren Gatland's players return on Thursday for his team announcement after a scheduled Wednesday off.

  During it, the players and WRU chiefs agreed to amend a rule that stopped players who had moved outside the country and not won 60 caps from playing for Wales again.

  Players based outside Wales will now be free to play for the country if they have won 25 caps or more.
