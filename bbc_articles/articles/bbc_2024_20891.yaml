  The elusive artist unveils an elephants stencil piece in Chelsea, south-west London.

  Second Banksy artwork in two days appears in London

  The new Banksy artwork appeared in Chelsea, south-west London

  Banksy has unveiled a second new artwork in south-west London, this time depicting two elephants poking their heads out of blocked out windows. The artwork has been painted on the side of a house in Edith Terrace in Chelsea. The Bristol-based street artist shared a photo of the wall art on Instagram, external, which is his usual method of claiming his work. It comes a day after he revealed a goat stencil on a wall near Kew Bridge in Richmond.

  It appears to have been painted on the side of a house

  That piece featured a silhouette of a goat painted on top of a ledge with rocks falling down below it and a CCTV camera pointed towards the animal. Banksy did not write a caption for either Instagram post causing fans to speculate on the meaning of the artworks.
