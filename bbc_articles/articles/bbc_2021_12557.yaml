title: Brighton and Hove Albion footballer bailed over alleged sex assault - BBC News
date: '2021-10-07'
section: Sussex
url: http://www.bbc.co.uk/news/uk-england-sussex-58820803
content: |-
  The Brighton and Hove Albion player was arrested at a nightclub in the Sussex city.

  Brighton and Hove Albion FC said it was helping police with the investigation

  A Premier League footballer who was arrested on suspicion of sexually assaulting a woman has been bailed.

  The Brighton and Hove Albion player, in his 20s, was held at a nightclub in Brighton early on Wednesday.

  On Thursday morning he was released on conditional bail until 3 November while inquiries continue.

  A man in his 40s was also questioned and bailed to the same date, Sussex Police said. The woman is receiving specialist support from officers.

  Brighton and Hove Albion FC said it was helping police with the investigation.

  "The matter is subject to a legal process and the club is therefore unable to make further comment at this time," it added.

