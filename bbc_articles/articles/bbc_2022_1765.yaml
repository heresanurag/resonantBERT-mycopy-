id: bbc_2022_1765
title: Screaming Trees frontman Mark Lanegan dies at 57 - BBC News
date: '2022-02-22'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-60487917
content: |-
  The US rocker is remembered as "one of the great singers of the last 30 years".

  Screaming Trees frontman and former Queens of the Stone Age member Mark Lanegan has died at the age of 57.

  Known for his deep, melancholy vocals, the American singer-songwriter died at his home in Killarney, Ireland, a statement on his Twitter account said.

  During his career he collaborated with musicians including Kurt Cobain, PJ Harvey, Isobel Campbell and Moby.

  Last year, he was in hospital for months after contracting Covid, and was put into a medically-induced coma.

  No cause of death has been given.

  A statement said: "Our beloved friend Mark Lanegan passed away this morning at his home in Killarney, Ireland.

  "A beloved singer, songwriter, author, and musician he was 57 and is survived by his wife Shelley [Brien]."

  Born in Washington state in 1964, Lanegan joined Screaming Trees in the 1980s and went on to produce eight studio albums until the group's split in 2000.

  The band pioneered a sound that combined 1960s garage rock with 1970s punk - which later became known as grunge. Although they never achieved the mainstream success of contemporaries like Soundgarden and Nirvana, they scored hits in the US with Nearly Lost You in 1992 and All I Know in 1996.

