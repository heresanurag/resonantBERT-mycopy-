title: 'We''ll be coming: Munich fills up with Tartan Army arrivals - BBC News'
date: '2024-06-14'
section: Scotland
url: http://www.bbc.co.uk/news/articles/c9774pzy7g7o
content: |-
  With one day to go, the Tartan Army arrives in Munich ahead of Scotland's opening Euro 2024 game against Germany.

  We'll be coming? We're already here. Tartan Army descends on Munich

  This video can not be played To play this video you need to enable JavaScript in your browser.

  It's started... The German city of Munich is awash with tartan and navy blue football shirts as the Tartan Army start their takeover ahead of the Euro 2024 opening game. Scotland face Germany in tomorrow night's showpiece opener and if hope and humour count for anything, Scotland should be heading for a win. The BBC Scotland News online team is among the Scotland faithful for the build-up to the first game of the glittering tournament.

  It's the first tournament for this gang from Larbert - Mitchell McIntyre, Jack Lynch, Luke Campbell, Alfie Lynch, Chris Lynch, Stuart Campbell, Duncan McIntyre.

  The beer has been flowing and the sun is shining in the Marienplatz

  Fans young and old join in the singing as the Tartan Army sets up camp in Munich

  Stewart Wilson (left) and his sons Grant and David were on a "bucket list" trip together for the Euros. Grant thinks Scotland will win 4-0 on Friday night against Germany.

  A more agile member of the Tartan Army practicing for the day he might be playing in a major tournament

  Father and daughter Andreas and Selina from Munich were enjoying the antics of the visitors - "We love the Scotland fans and the atmosphere," said Selina. "A little bit crazy like German fans."

  Caitlin Moran (left), Charlize Mcfadyen and Erin Sludden from Coatbridge were soaking up the atmosphere in Munich town centre

  Scotland fan Fraser Smith, from Glasgow, entertained members of the Tartan Army in Marienplatz with an unusual tune for the bagpipes - the German national anthem.

  Scotland fan Ethan Walker (centre), who has cycled 1,200km to watch his heroes play in Germany arrived to a warm welcome in Marienplatz central square.

  The flags are flying all over Munich as the Scotland fans arrive

  Fiona McGinty, from Oban was relaxing in the sun at Viktualienmarkt food market. She has been going to Scotland games since 2003. "After years of pain this is the reward,"' she said.

  Euan Souter, 61, (right) from Lossiemouth and Colin Jamieson, who turned 85 last Friday and is from Shetland, met through the Scotland travel club. Between them have been to Mexico '86, Italia '90 and France '98.

  Fans enjoying the cold beer and warm hospitality in the centre of Munich.
