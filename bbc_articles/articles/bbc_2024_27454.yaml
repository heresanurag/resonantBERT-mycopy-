title: 'Watch: Royals and veterans attend Cenotaph ceremony - BBC News'
date: '2024-11-10'
section: General
url: http://www.bbc.co.uk/news/videos/cdj3zk9e9dno
content: |-
  King Charles led two minutes of silence in remembrance of those who lost their lives in the two world wars and other conflicts.

  King Charles, Prince William and politicians were among those who attended the annual National Service of Remembrance at the Cenotaph in central London.

  Tens of thousands of veterans and civilians joined the King in paying their respects to those who died in the two world wars and other conflicts.
