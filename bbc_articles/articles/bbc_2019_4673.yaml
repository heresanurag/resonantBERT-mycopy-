title: 'Heidi Allen: ''I''m glad I publicly revealed my abortion'' - BBC News'
date: '2019-04-01'
section: General
url: http://www.bbc.co.uk/news/health-47774293
content: |-
  Heidi Allen of The Independent Group said she received "overwhelming support" after her speech in the Commons.

  The MP Heidi Allen has told the BBC's Victoria Derbyshire programme she received "overwhelming support" from the public after revealing in the Commons last year that she had had an abortion.

  Ms Allen, of The Independent Group, which is applying to become a political party, spoke of her own experience during a debate about Northern Ireland abortion law.

