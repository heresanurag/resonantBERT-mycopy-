title: Emotional moment Adele hugs Celine Dion at Vegas show - BBC News
date: '2024-10-27'
section: General
url: http://www.bbc.co.uk/news/videos/c86qq5jqevdo
content: |-
  Fans could be heard clapping and cheering as the two icons met at Caesars Palace.

  British superstar Adele burst into tears after spotting Celine Dion at her concert residency in Las Vegas.

  The two singers then shared an emotional hug in the Colosseum Theater at Caesars Palace, a venue originally built for Dion's 2003 debut residency.

  "This truly felt like she was proudly handing the keys to Adele," Nasser, who was in the audience and filmed the moment on his phone, told BBC News.

  "And when Adele gave her that hug, everyone felt what they felt."

  Adele is known to idolise the Canadian icon, while Dion has also spoken in glowing terms about Adele.
