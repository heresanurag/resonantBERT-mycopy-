title: Protesters clash with police in central London - BBC News
date: '2020-06-14'
section: General
url: http://www.bbc.co.uk/news/uk-53034153
content: |-
  Groups from around the country, including right-wing activists, said they were protecting statues.

  Aerial footage shows protesters gathering in central London, despite police warnings to avoid demonstrations.

  Various groups from around the country, including right-wing activists, said they had come to London to protect symbols of British history.

  A Black Lives Matter demonstration planned for Saturday was brought forward by a day over fears there could be clashes with far-right groups.

  Organisers urged people not to join any anti-racism rallies planned for the weekend.
