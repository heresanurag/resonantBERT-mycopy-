content: |-
  Petroineos said the closure of Grangemouth was due to it being unable to compete with more modern foreign sites.

  Scotland's only oil refinery confirmed to close next year

  Petroineos announced their intention to close Grangemouth in November last year

  Scotland's only oil refinery is to close by the summer of next year, with the loss of 400 jobs. Petroineos said the closure of Grangemouth was due to it being unable to compete with sites in Asia, Africa and the Middle East. The company said the decision would "safeguard fuel supply for Scotland" by converting the site into a terminal able to import petrol, diesel, aviation fuel and kerosene into Scotland - but would require a workforce of fewer than 100 employees compared to the current 475. The company announced last November it intended to close the plant, but union leaders had hoped the facility could remain open longer to provide time for a green alternative to be established at the site.

  The BBC understands the refinery - the oldest in the UK - is currently losing around $500,000 (£383,000) a day and is on course to lose around $200m (£153m) in 2024. Petroineos said they expected the new hub for finished fuels to open by early summer next year. First Minister John Swinney said he was "deeply disappointed" at the news, while a joint three-point plan was unveiled by the Scottish and UK governments regarding the future of the site. Workers said the announcement was a "kick in the teeth" while unions labelled it a "terrible indictment" of both governments and of the company. The refinery was opened by BP in 1924. It expanded into petrochemicals in the 1950s and serves as the primary supplier of aviation fuel for Scotland's main airports, while being a major supplier of petrol and diesel ground fuels across the Central Belt. It accounts for about 14% of the UK's overall refining capacity and supplies almost two-thirds (65%) of demand for refined oil products in Scotland. Ineos acquired the site in 2005 and are responsible for the entire plant, while the the refinery itself is owned by Petroineos - a joint venture between Ineos and PetroChina.

  Petroineos stated that the size of the site meant that "high levels of capital expenditure each year" were spent on it, which outweighed the company's earnings. Franck Demay, the company's CEO, said: "Demand for key fuels we produce at Grangemouth has already started to decline and, with a ban on new petrol and diesel cars due to come into force within the next decade, we foresee that the market for those fuels will shrink further. "That reality, aligned with the cost of maintaining a refinery built half a century ago, means we are exploring ways to adapt our business. “The action we are taking to create an import terminal will safeguard fuel supply for Scotland. We currently expect Grangemouth to be ready to operate as a national distribution hub for finished fuels in Q2 next year." Between 250 to 280 of the redundancies are expected to occur in the three months after the plant closes, with 100 retained for between six to 12 months to help decommission and to build up the import business: , with a further 20 working on decommissioning and10 to manage demolition, which will continue until 2030. 20 jobs will go at Finnart on Loch Long, which is the pipeline terminal taking much of the Gulf of Mexico and South American crude oil.

  Workers marched in August to protest against the proposed closure

  In a social media post the first minister stated the Scottish government would work closely with the UK government to "deliver an investment plan" that would help to "secure an industrial future for the site". This will see £100m of funding to support local energy projects, and examining options - via a feasibility study called Project Willow - to build a new long-term industry at the refinery site. But a source close to the firm said even if such plans were viable they would not come in time to save the jobs which are expected to be lost next year. The UK government energy secretary Ed Milliband said the two governments were "working in lockstep" to protect jobs and invest in the area. Chris Hamilton, a plant operator who has worked at Grangemouth for 11 years, told BBC Scotland News the closure would have a huge impact on the area. He said: "This site dominates the local skyline, it has dominated the local economy and it has dominated the local jobs market. As a worker, we have known about this since last November but hearing it today isn't any easier." Mr Hamilton, a union official at the plant, added: "It's a kick in the teeth. It seems like we have not really started [looking at] the alternative possibilities for the site and yet here we are facing closure next year. I don't know where I'll go next."

  Petroineos said it has invested more than $1.2bn (£900m) in the refinery since 2011 while recording losses of more than $775m (£594m) during the same period. The company had also been under pressure to decide whether to spend money on securing a new licence for its crude distillation unit, which was due to expire next spring. Insiders say that doing so would have involved an investment of £40m, said to be an unattractive prospect given the scale of the plant's losses. Derek Thomson, the Scottish secretary of trade union Unite, said: "There's been no plan by the UK or the Scottish government and what we're effectively going to see is 400 workers put on the scrapheap". He added that the decision would have "devastating consequences" for the wider area. Consultation on the redundancies will begin this month. The firm said the new terminal would be able to import petrol, diesel, aviation fuel and kerosene into Scotland from vessels arriving via the Firth of Forth. Grangemouth is one of six refineries in the UK and the only one in Scotland. In recent years the site has been targeted by environmental protestors calling for it to be closed. Michelle Thomson, the Falkirk East MSP, called for similar support for Grangemouth as that provided for Tata Steel earlier this week, to help ease the green transition. At First Minister's Questions she said she had been in discussions with a third party regarding a purchase of the refinery, and later told BBC Scotland it was an international company not based in Russia. A spokesman for Petroineos told BBC Scotland that there had been "plenty of time" for potential buyers to express an interest and that it would "have engaged seriously with any credible proposition". The spokesman added the company had reached out to Thomson for further details. The INEOS businesses at Grangemouth - INEOS O&P UK and INEOS FPS - released a statement saying it was "“business as usual” for those companies.

  This is what the energy transition looks like, and it’s neither "just" nor attractive for those at the sharp end. Not only has Grangemouth refinery faced competition from more modern, efficient plants elsewhere: not only is the flow of North Sea oil reducing to uneconomic levels: but with the demise of petrol and diesel vehicles, and eventually greener aircraft, demand is expected to plummet in its domestic market. So from a climate change perspective, no further oil refining should be welcomed. But it looks less welcome from the point of view of a strategic economic asset in a world where energy security is a much higher priority than it was, with the decision to close being taken by a joint venture half of which is very close to the Chinese government. To make this a "just transition", as governments would like it to be for energy workers and consumers, a biofuel or hydrogen refinery would be taking its place as the oil business winds down. At Grangemouth, that’s a long way over the horizon, and long after 400 jobs have gone. As with the steelworks at Port Talbot, seeing many more job losses this week in a tougher Welsh jobs market than Grangemouth, the newer, greener replacement technology requires fewer workers. The transition also requires better advance planning. The biofuels market doesn't exist at scale. It requires the UK government to shape it, providing a price floor for Sustainable Aviation Fuel, for instance, so as to reduce investor risk.
