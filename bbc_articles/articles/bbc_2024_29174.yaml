content: |-
  Bundee Aki or Sione Tuipulotu? Jac Morgan or Tom Curry? The analysts at Opta have crunched the numbers to produce a Lions XV based on autumn performances.

  A Lions XV from the autumn - according to the data

  Ireland coach Andy Farrell begins his role as British and Irish Lions head coach on 1 December

  In the 12 months building up to a Lions tour, the autumn internationals often mark the point at which fans and pundits start to deliberate over their potential Lions XV. With the final full round of fixtures having just taken place, we take a look at which British and Irish players stood out during the Autumn Nations Series, according to the data. Using the unique Opta Index - which objectively scores each player's performances throughout the campaign - we can select the best XV of the series and back up those selections with some key stats. Seven Scotland players make the team, perhaps benefitting from a slightly easier schedule, with England and Ireland contributing four players apiece. Wales' miserable autumn means they have no players who made the line-up, although the likes of Jac Morgan, James Botham and Dewi Lake were not far off selection.

  Jordan will move to Bristol from Glasgow Warriors for the start of next season

  The Glasgow fly-half made his debut for Scotland during this year's Autumn Nations Series, featuring at full-back, and settled in comfortably. Of Lions eligible players to feature for 100+ minutes, he was the only one to gain 100+ metres per game (104), also ranking in the top three for line breaks (2.1), defenders beaten (6.2) and offloads (2.1) per 80 minutes.

  Four of Graham's tries over the autumn came in the 57-17 win over Fiji

  After a long period out with injury, Darcy Graham returned to international action and picked up where he left off, crossing for five tries in total - more than any other player in the Autumn Nations Series. He also averaged the most line breaks (2.1) and second most defenders beaten (6.8) per game of any British or Irish player this autumn (minimum 100 minutes played).

  Scotland had eight players involved in the 2021 Lions tour to South Africa and Jones will hope to be part of another healthy contingent in Australia

  Huw Jones always shines for Scotland and was at his best once again this month, crossing for two tries and assisting a further two - the only player from any nation to register multiple tries and multiple try assists. He also assisted five line breaks, the most by any non-half-back, while he made the joint-most line breaks of any British or Irish player (six, level with Darcy Graham).

  Aki started the third and decisive Test against South Africa on the Lions' last tour

  At 34, Bundee Aki is still as important as ever in the Irish midfield, proving to be one of their key attacking outlets again this autumn. Aki averaged 2.1 line breaks per 80 minutes with only Graham (fractionally) making more, of players eligible for the Lions.

  Van der Merwe has scored a record 30 tries for Scotland

  The Edinburgh winger holds the record for most defenders beaten in a Six Nations campaign and it is no surprise to see him top the charts during the Autumn Nations Series (22). This autumn, Duhan van der Merwe and Graham tussled for the accolade of being Scotland's all-time top try scorer in men's Test rugby history, and it was the former who edged in front with a try against Australia. Could we see him doing the same in a Lions shirt next summer?

  Smith has shown his versatility by dropping into a full-back role at times this autumn

  Marcus Smith has scored the most points of any player in this year's Autumn Nations Series (53), landing 22 of 26 kicks at goal including all nine of his penalty shots. His accuracy with the boot extended to open play too, registering two 50-22 kicks - a tally only France's Thomas Ramos could equal, while only Antoine Dupont (eight) has made more line break assists than Smith this month (seven).

  Spencer made his first start for England against New Zealand after six replacement appearances for his country

  The number nine jersey for the Lions is very much up for grabs and the Bath scrum-half did his chances no harm this month. His average of 1.3 line breaks per 80 minutes was the most of any British or Irish scrum-half, while his kicking game was solid too. England team-mate Jack van Poortvliet, who kicked more often than Spencer, was the only scrum-half from any nation to see more kicks retained with five to Spencer's four.

  South African-born Schoeman made his Scotland debut in 2021 after qualifying on residency grounds

  Wearing the number one jersey means Pierre Schoeman might be the first name on the team sheet when coach Gregor Townsend picks his Scotland XV, however, regardless of position, he is one of Scotland's most important players. The 30-year-old has started in 20 of Scotland's 21 games against top-tier opposition since the beginning of 2022-23. He was at his best once again this month, making 36 tackles without missing a single one, with Ireland's James Ryan the only British or Irish player to make more dominant tackles.

  George took over the England captaincy from former Saracens team-mate Owen Farrell

  Jamie George was his usual steady self at the line-out, finding an England player with 30 of his 31 line-out throws. His 97% success rate was the best of the 16 hookers to attempt 15 or more throws in the Autumn Nations Series. He was effective with ball in hand too, with Peato Mauvaka (100) the only front row to gain more metres than George (67), who also scored two tries this autumn.

  Fagerson was part of the 2021 Lions tour to South Africa but did not feature in any of the three Tests

  Zander Fagerson hit 32.5 rucks per 80 minutes on average this autumn. Of the British and Irish players to feature for 160 or more minutes only three (Josh van der Flier, Maro Itoje and Rory Darge) had a better rate than the Scottish prop, who had the highest tally of any front row. At the scrum, Scotland won seven penalties on their own feed while Fagerson was packing down in the front row. South Africa's Gerhard Steenekamp was the only other prop to be part of as many penalty-winning efforts (also seven).

  Itoje, recently promoted to captain of his club Saracens, is among the contenders to skipper the Lions

  One of just three Englishmen to play every minute of England's Autumn Nations Series campaign, Itoje won five turnovers, more than any other player during this month's Tests. No British or Irish player hit more attacking rucks per 80 minutes than Itoje (27.3), while he was also the only English player to average 10 or more defensive rucks hit per 80 minute (11.8).

  Beirne was named as part of World Rugby's men's team of the year for 2024 on Sunday

  Although two of his three appearances came in the back row, Tadhg Beirne slots into our team in the second row where 80% of his Ireland starts have come. He has been Ireland's main line-out target this month, claiming 11 line-outs including one steal, while ranking in the top three Irishmen for tackles (41), turnovers (3) and rucks (60).

  Fagerson won his 50th Scotland cap in the weekend's win over Australia

  Matt Fagerson will be hoping he can replicate his brother by touring with the Lions next summer, as Zander did in 2021, and he will surely be in head coach Andy Farrell's thoughts after a strong Autumn Nations Series in which he ranked in the top three Scotland players for both tackles (45) and rucks hit (78).

  Van der Flier, the 2022 World Player of the Year, is yet to make a Lions tour

  Van der Flier is one of the hardest-working players in the Ireland team and his stats so far this autumn have epitomised this. He has made 27 carries, 45 tackles and hit 101 rucks in his 203 minutes of action, a combined average of 68 carries, tackles and rucks per 80 minutes, the most of any player of any nation to feature for 100 or more minutes. He also crashed over the line for tries against the All Blacks and Fiji.

  Doris has captained Ireland in the absence of the injured Peter O'Mahony this autumn

  World Rugby Player of the Year nominee Caelan Doris will certainly be in the frame for the next Lions tour, although he will face incredibly stiff competition for the number eight jersey. Doris has been busy in both attack and defence this autumn, making the most carries of any Ireland player (36) with only team-mate Van der Flier making more tackles than the Ireland skipper's 43.
