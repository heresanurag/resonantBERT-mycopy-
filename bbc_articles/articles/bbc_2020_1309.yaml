  Replacements: Joseph for Tuilagi (16), Cowan-Dickie for George (49), Genge for Marler (52), Ludlam for Lawes (54), Kruis for Ewels (57), Heinz for Young (62), Stuart for Sinckler (73), Devoto for Ford (76).
