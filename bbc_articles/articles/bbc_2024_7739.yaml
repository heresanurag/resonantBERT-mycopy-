title: Cat looks fur-ious after being chiselled out of wall - BBC News
date: '2024-04-15'
section: Lancashire
url: http://www.bbc.co.uk/news/uk-england-lancashire-68812872
content: |-
  A photo of a firefighter holding a mortified-looking moggie attracts hundreds of comments on social media.

  Cat-titude: This kitty's photo attracted hundreds of comments about its angry expression

  A cat that was chiselled out from between two walls by firefighters appeared more angered than relieved after its rescue.

  Lancashire Fire and Rescue Service posted a photo of a "curious cat" that got into a "tight squeeze" in Preston.

  The caption said crews "carefully chiselled" out the cornered kitty and that it was now "safe and sound".

  But far from looking like the cat that got the cream - Facebook users remarked that this feline appeared furious.

  The cat looked rather unhappy despite being rescued by Lancashire Fire and Rescue Service

  The photo attracted hundreds of comments about the cat's less than impressed expression including: "The level of gratitude in that cat's face!"

  Another user wrote: "Curious cat looks fuming. He was the reigning hide'n'seek champion until you guys turned up."

