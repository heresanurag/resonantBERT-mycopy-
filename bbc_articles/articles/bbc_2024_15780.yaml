url: http://www.bbc.co.uk/news/articles/cjjwy5dxdy2o
content: |-
  Donald Trump pays tribute to a "truly incredible" journalist whom he describes as a "friend".

  Former US news anchor Lou Dobbs dies at 78

  Conservative US political commentator and vocal Donald Trump supporter Lou Dobbs has died at 78, according to a statement posted on Thursday on his X account by his team. "It's with a heavy heart that we announce the passing of 'The Great Lou Dobbs'," the statement read. "Lou was a fighter till the very end - fighting for what mattered to him the most, God, his family and the country." Dobbs, who formerly worked for CNN and Fox, had been running his own podcast, called The Great America Show, and hosting a show on local radio station 77WABC. He is survived by his wife Debi, children and grandchildren.

  Trump praised Dobbs in a post on his Truth Social account as a "friend, and truly incredible Journalist, Reporter, and Talent". He had understood the world "better than others", had been "unique in so many ways" and had loved the US, Trump said, offering condolences. In 2021, Fox cancelled the TV programme hosted by Dobbs after he was accused of using his platform to spread baseless claims of fraud in the 2020 election and was named in a defamation lawsuit filed by a voting machine maker against the network. A statement from Fox News said the company was "deeply saddened" by his death. "An incredible business mind with a gift for broadcasting, Lou helped pioneer cable news into a successful and influential industry," it said. "We are immensely grateful for his many contributions and send our heartfelt condolences to his family.”
