content: |-
  Video filmed by a bystander shows police chasing a suspect as he climbs over garage roofs in Hainault.

  Video filmed by a bystander shows police in pursuit of a man suspected of stabbing people with a sword.

  Police were called to reports of a vehicle driven into a house in Hainault, east London shortly before 0700 BST.

  Several people, including two police officers, have been attacked.

  A 36-year-old man is now in custody.

  Police say the incident is not terror-related.
