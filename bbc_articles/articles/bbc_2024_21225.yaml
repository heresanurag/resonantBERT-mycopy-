  Police operations have now found links between large-scale cannabis production and other offences, such as human trafficking and violent crime. Mr Lewis has urged the public to pass on intelligence to the police if they believe a property is being used to grow drugs. Some of the tell-tale signs are windows being taped-up and bright lights shining in the early hours of the morning. They may also have tents outside, he added: “The properties are too hot in order for people to be there throughout the night."
