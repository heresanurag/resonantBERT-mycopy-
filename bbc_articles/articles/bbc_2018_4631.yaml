title: 'Syria air strikes: Views from the UK - BBC News'
date: '2018-04-15'
section: General
url: http://www.bbc.co.uk/news/uk-43769353
content: |-
  We get your views, after a YouGov poll suggested only a fifth of voters backed attacks on Syria.

  A YouGov poll for The Times newspaper this week indicated only a fifth of voters believed that Britain should launch attacks on Syrian military targets, and 43 per cent were opposed.

  We got some views from London.
