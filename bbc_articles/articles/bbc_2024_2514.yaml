content: |-
  Large hailstones covered roads as a rare weather phenomenon hit the United Arab Emirates.

  Large hailstones were seen covering roads in the United Arab Emirates, after a rare hailstorm struck the region.

  Some locals were shocked to see the falling hail, which caused damage to homes and vehicles, according to local media.

  But is this weather phenomenon really so exceptional for a desert nation?
