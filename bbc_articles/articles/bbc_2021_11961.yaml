  Mam describes an idyllic childhood, in which war couldn't have been further from their minds.

  "One of my earliest memories is catching an aeroplane from Heathrow to Lagos, then a smaller plane to Port Harcourt," she recalls.

  "I remember the blistering heat as they opened the plane doors. I thought I'd never be able to survive it, but within weeks I'd got used to it."

  She was enrolled at Santa Maria school, and soon became a fixture at the Humkorshe swimming club.

  Swimming at the Humkorshe Club is one of Gaynor's fondest memories

  "Getting up at about 05:00 to catch the minibus twenty miles to school was the worst part, and the nuns who ran the school were very, very strict. But on the up-side, we'd be finished by 12:30 and could spend the best part of the day doing as we pleased.

  "For me that was swimming at Humkorshe, doing length after length and diving in the wonderful sunshine."

  Mam soon made friends, and acquired an extended Nigerian family.

  "We had a gang of five: Two girls, Ezikama and Stella who were my Nigerian friends, then there was Angelo, an Italian lad, and Michael from the north of England, both of those were the sons of oil workers.

  "We'd cycle for miles and miles. Once we discovered an abandoned steam engine and made a den there.

  "That turned out not to be such a good idea, as I got a poisonous spider in my hair, and had to cycle as fast as I could back to Michael's house, where his servant probably saved my life."

  She speaks with fondness about the people who worked for them, but looking back she reflects on the inequity of the situation.

  "It probably sounds wrong nowadays to say that we had servants, but Simon and Sunday weren't just servants, they were part of our family. They were my friends, confidants and fellow mischief-makers. I'd hate for anyone to think we were exploiting them, but in today's terms I suppose we were," Mam reflected.

  "I still have a photograph of Simon which I sent back to my sister Susan, but so many of them, including all the ones of Sunday, I had to leave behind when we left."

  Gaynor was a pupil at Santa Maria School in Port Harcourt

  Then came the day in 1966 when Alan returned from work with troubling news.

  Mam says: "Dad was very quiet. After a while he explained that the Igbo tribe had risen up in an attempt to establish an independent Biafran state.

  "I said, 'but that won't affect us though right? Simon and Sunday are Igbo, there's no way they'd hurt us...?'"

  What Mam hadn't considered was that Britain had backed the northern-dominated Nigerian army against the Biafran separatists.

  Meanwhile, France was supporting the Igbo, setting up a proxy war between the two so-called allies for influence over West Africa and its oil reserves.

