  Days later my grandmother, Doreen, received a call from Alan at work. They were given hours to flee the country.

  "I don't know how close the fighting was to us, but the one thing which sticks with me is the sense of urgency. We had to get out that minute," Mam explains.

  "I do remember we flew out on a Dakota [military transport aircraft], we had to get in from a ramp underneath."

  Only women and children could leave Port Harcourt on the emergency flights. Alan had to travel overland to Malawi, and catch a flight home from there, which took several weeks.

  Mam adds: "In the immediate weeks afterwards, I was of course terrified for Dad. Every night I cried myself to sleep about what had happened to Nero, but what I recall more than anything is my sister Susan being so angry that I'd taken all her teddy bears out to Nigeria, and had had to leave them all behind."

  In the months and years which followed, Mam became increasingly traumatised by the fate of the extended family she'd left behind.

  The Igbo people who had assisted British oil workers were persecuted within Biafra for their perceived treachery.

  The region as a whole was blockaded by the Nigerian army. An estimated one to two million people starved to death before a ceasefire was finally signed in 1970.

  "There's barely a day goes by that I don't think about what happened to all of them.

  "If there's one thing I can do with this story," Mam says, "if a refugee, say from Afghanistan, ends up in the house next door to you, please please be kind to them. You have no idea what they've been through or who they've had to leave behind."
