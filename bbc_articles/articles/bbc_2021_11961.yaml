title: '''Mam fled civil war in Nigeria as a child 55 years ago'' - BBC News'
date: '2021-09-19'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-58584839
content: |-
  Fleeing Nigeria on the brink of civil war in 1966 gave my mother empathy for today's refugees.

  This is the only photograph Gaynor has of her extended family in Nigeria

  It would leave over three million people dead, including over a million starved to death in a blockade of the Biafran south-east.

  Many foreign nationals working on Nigeria's oilfields were also caught up in the fighting, including Gaynor Prior, the mother of reporter Neil Prior.

  It's Sunday afternoon. After a roast dinner at my mother's home in Swansea, talk turns to our childhoods.

  Mam, who's usually quite gregarious, suddenly becomes very withdrawn. "It's 55 years since I left Nigeria," she says.

  I've always known Mam had to flee Nigeria as a ten-year-old in the wake of the 1966 Biafran Coup, but it wasn't something we talked about.

  Don't get me wrong, she often reminisces about the four highly enjoyable years she spent living in Port Harcourt, but rarely touches on the last few days when she had to abandon all her friends, belongings and her African bush dog, Nero.

  I ask her if she'd like to talk about it. I meant as a son rather than a journalist, but to my amazement, she says: "Yes, I want people to read about what it's like, if only so they can better understand what these poor poor Afghani people will be going through right now."

  Mam's father, Alan Maggs, was a chemical engineer for British Petroleum (BP). In 1962, just two years after Nigerian independence, he was posted to the newly discovered oilfields of the Niger Delta.

  My family - my grandparents and their six-year old daughter Gaynor, my mother - arrived in Port Harcourt that year. Mam's elder sister, my Aunty Susan, remained in Swansea to complete her O-Levels.

  They lived alongside the Igbo people of south-east Nigeria, an area known as Biafra, which was predominantly Christian.

  The civil war was portrayed in the press as a religious conflict, but many other factors were at play, including oil revenues and historical tensions over the way Britain had amalgamated disparate tribes into one artificial nation.

