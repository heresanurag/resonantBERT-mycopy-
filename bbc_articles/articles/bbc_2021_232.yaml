title: Boris Johnson condemns 'disgraceful scenes' in US - BBC News
date: '2021-01-07'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-55568492
content: |-
  The PM leads UK politicians from all parties condemning the riot at the US Capitol building.

  Prime Minister Boris Johnson has condemned the "disgraceful scenes" in the US, after supporters of President Donald Trump stormed Congress and clashed with police.

  Rioters breached the Capitol building where lawmakers met to confirm Joe Biden's presidential election victory.

  The PM said it was "vital that there should be a peaceful and orderly transfer of power".

  And Labour leader Sir Keir Starmer said it was a "direct attack on democracy".

  "The United States stands for democracy around the world and it is now vital that there should be a peaceful and orderly transfer of power," Mr Johnson tweeted.

  Scottish First Minister Nicola Sturgeon, meanwhile, called the events "utterly horrifying".

  Friend of President Trump and leader of Reform UK - formerly the Brexit Party - Nigel Farage tweeted: "Storming Capitol Hill is wrong. The protesters must leave."

  The US Congress has now reconvened after the violence - spurred on by Mr Trump's unproven claims of electoral fraud - to certify Mr Biden's victory in the US election in November

  Hundreds of the president's supporters stormed the Capitol, and staged an occupation of the building in Washington DC.

  Both chambers of Congress were forced into recess, as protesters clashed with police and tear gas was released.

  Four people died on Capitol grounds during the violence, including a woman shot by police and three others, who died as a result of "medical emergencies", local police said.

