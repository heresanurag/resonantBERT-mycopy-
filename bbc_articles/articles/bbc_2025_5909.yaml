title: Missing 11-year-old girl was seen paddling in River Thames - BBC News
date: '2025-04-01'
section: London
url: http://www.bbc.co.uk/news/articles/c15v3kp3pp1o
content: |-
  Residents near the scene in east London say she was playing in the water during a day off from school.

  Missing girl was seen paddling in River Thames

  The girl entered the river close to Barge House Causeway, near London City Airport

  An 11-year-old girl who went missing after she entered the River Thames had been paddling in the water during a day off from school, according to residents living near the scene. Metropolitan Police was called to reports the girl had entered the river close to Barge House Causeway, near London City Airport, east London, at about 13:15 BST on Monday. The force later led a search of the river, which involved boats and helicopters from HM Coastguard, the Royal National Lifeboat Institution (RNLI) and London Fire Brigade (LFB). Kerry Benadjaoud, 62, said she discovered shoes, a sock, a coat and a phone near the river, and had handed the items to the police.

  This video can not be played To play this video you need to enable JavaScript in your browser. Police search for girl in Thames near City Airport

  "Apparently she was paddling, so her socks and shoes were off, her coat, then she must have slipped and gone down," she added. The child had been playing near the water with a young boy and girl, residents said. On Monday emergency services launched a "large-scale response" to the incident, the force said, but crews from the London Ambulance Service, LFB and the RNLI were later stood down. Ms Benadjaoud said a boy who had been with the girl appeared to be about eight or nine years old. Shaleen Rajaendram, 59, who lives on Barge House Road, which leads onto the causeway, told PA: "I heard upstairs a guy was screaming 'wait there, wait, the police is coming'." The man was standing on a balcony in a block of flats overlooking the river and later told Ms Rajaendram he had been alerted to the incident by the children "shouting, screaming", she said. Ms Rajaendram continued: "Then I saw suddenly two kids were coming out to the top of the bridge, I said 'what happened?' "Then they said 'one of my friends was playing in the water, one of my friends has gone into water and she's gone underneath and we can't find her'." Barge House Causeway is a concrete slope that goes directly into the River Thames and is used to transport boats. Residents said that the slope appeared to be covered in moss and was slippery.
