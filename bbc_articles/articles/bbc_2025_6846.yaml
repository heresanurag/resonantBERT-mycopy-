title: Cardiff City sack Omer Riza as Wales' Aaron Ramsey takes charge - BBC Sport
date: '2025-04-19'
section: Championship
url: http://www.bbc.co.uk/sport/football/articles/c3dk0vj425lo
content: |-
  Wales international Aaron Ramsey will take charge of Cardiff City's final three games of the Championship season following the departure of Omer Riza.

  Cardiff City have won just once in their past nine Championship games

  Wales captain Aaron Ramsey will take charge of Cardiff City for the remainder of the Championship season after the Bluebirds parted company with Omer Riza. Riza was told of the decision on Saturday after defeat at Sheffield United left the Bluebirds one point from safety in the Championship relegation places. Ramsey, 34, will lead the side for the first time during Monday's game against Oxford United at Cardiff City Stadium (15:00 BST). He will be assisted by former Wales team-mate and current Wales Under-19s manager Chris Gunter, as well as Bluebirds midfielder Joe Ralls. Gavin Ward, who is expected to continue in his role as goalkeeping coach, makes up the remainder of the technical staff alongside under-21s coach Matt Bloxham and under-18s manager Tom Hutton.

  A club statement read: "We'd like to thank Omer for his passion and effort during his time as Cardiff City manager and wish him the very best for his next steps in the game."

  Ramsey has no frontline managerial experience but has harboured coaching ambitions for some time, being tipped by Wales boss Craig Bellamy as someone who could work at a high level at the end of his playing career. The 86-cap international will be the third man in the Cardiff dugout this season, one that began with Erol Bulut at the helm before he was sacked after picking up just one point from their opening six games as the club endured its worst ever start to a season. Former Watford coach Riza - drafted in to assist Bulut last summer - was initially appointed on a caretaker basis before being handed a contract until the end of the season in December after an upturn in form. However, he has come under increasing pressure with Cardiff unable to pull away from trouble. It is believed some of the club hierarchy had considered a change last month - with former manager Neil Warnock considered as a replacement - only for Riza to retain the support of owner Vincent Tan. But with fans calling for Riza to be removed after Friday's 2-0 loss at Bramall Lane – their fifth game without a win - the club have taken action in a late bid to avoid dropping into the third tier for the first time since 2002. Cardiff will hope the appointment of Ramsey - one of the club's most decorated youth products - will at least galvanise supporters ahead of final games against Oxford, West Bromwich Albion and Norwich City. The midfielder became the club's youngest ever player after breaking into the first-team at the age of 16 in 2007 before moving to Premier League Arsenal, where he twice won the FA Cup. He returned to his boyhood club in 2023 following spells at Juventus and Nice, although his impact on the field had been limited because of injury. Ramsey had been ruled out from any playing involvement during the Championship run-in after having surgery on a hamstring injury sustained in defeat against Luton Town last month. He has worked at the club's academy during his time back in south Wales while has also provided tactical analysis for Riza from games during a previous injury lay-off earlier in the season.
