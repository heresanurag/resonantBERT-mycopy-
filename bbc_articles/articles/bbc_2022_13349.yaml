title: 'Corwen: A5 blocked for hours as chicken lorry overturns - BBC News'
date: '2022-10-26'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-63396594
content: |-
  The birds were removed from the lorry so it could be put back on its wheels, the fire service says.

  Crates of chickens had to be removed safely from the overturned lorry

  About 6,400 birds had to be taken out of the vehicle before it could be put back on its wheels, according to North Wales Fire and Rescue Service.

  It happened near the Goat Inn at Maerdy, Conwy county.

  A lorry from the same firm was sent to help remove the chickens and part of the A5 was shut between the pub and Druid, near Corwen, at about 06:00 BST but the road is now open.

  The lorry ended up lying on an angle near the Goat Inn at Maerdy, Conwy county

  The fire service said a crew from Wrexham and its environmental protection unit were also called to the scene to prevent fuel entering any nearby streams or rivers.

  The lorry had been lying at an angle before recovery crews put it on its side.

  The incident closed the road for most of Wednesday
