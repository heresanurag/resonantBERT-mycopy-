id: bbc_2019_15180
title: '''You''re a damn liar, man'' - Biden in heated exchange with voter - BBC News'
date: '2019-12-06'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-50679136
content: |-
  The Democratic presidential hopeful reacts after being challenged over his son's Ukraine activities.

  Former US Vice-President Joe Biden angrily challenged a man at a town hall hustings in Iowa.

  The local claimed the 2020 presidential hopeful had sent his son to work in Ukraine.

  During his response Mr Biden appeared to call the man 'fat', although his team suggested he had used the word 'fact'.
