title: '''Last Concorde'' makes its final journey - BBC News'
date: '2017-02-07'
section: General
url: http://www.bbc.co.uk/news/uk-38899344
content: |-
  As the 'last Concorde' made its final journey, we look back at the iconic plane's history.

  It will be the centrepiece of the £16m Bristol Aerospace Centre, which has been built around a listed WW1 hangar.
