content: |-
  The BBC’s analysis editor looks at what we know about the Ukraine dam collapse at Nova Kakhovka.

  The BBC’s analysis editor Ros Atkins looks at what we know about the Ukraine dam collapse at Nova Kakhovka and the flooding it has caused.

  Thousands of people are being evacuated downstream and President Zelensky has said 80 towns and villages are at risk of flooding.
