title: 'Saunton Sands: Kitesurfer dies as Storm Erik batters North Devon - BBC News'
date: '2019-02-09'
section: Devon
url: http://www.bbc.co.uk/news/uk-england-devon-47166254
content: |-
  A man dies after getting into difficulty while kitesurfing off the coast of North Devon.

  The man was kitesurfing on Saunton Sands when he got into difficulty

  A kitesurfer has died after getting into difficulty amid strong winds off the north coast of Devon.

  Police said the man, who has not been identified, was fatally injured on the beach at Saunton Sands near Barnstaple just after 11:00 GMT.

  He was taken to North Devon District Hospital by air ambulance, but was confirmed dead at 13:27.

  Winds of up to 56mph were recorded in the area earlier, according to the Met Office, as a result of Storm Erik.

  A spokesman for Devon and Cornwall Police said: "This incident is not being treated as suspicious at this stage.

  "The incident will remain in the hands of the coroner and a file of evidence will be submitted to the coroner.

  "It is then a matter for an inquest."
