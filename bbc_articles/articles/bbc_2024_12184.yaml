  Dario G was originally a duo, formed by Paul and Scott Rosser when they met studying music in Manchester in the 1990s. After graduating, they set up a small studio at Paul's Cheshire home and later invited a third member, Stephen Spencer (who was unrelated to his bandmate), to join. They scored a massive hit in 1997 with the summer dance anthem Sunchyme, built around a sample of Dream Academy's Life In A Northern Town. It sold more than 600,000 copies in the UK, and was only held off the number one spot by Elton John's tribute to Princess Diana, Candle In The Wind. The band - who were named after the then-manager of Crewe Alexandra FC, Dario Gradi - followed it up with another top five smash, Carnaval De Paris. The song became an unofficial anthem of the 1998 World Cup in Paris, and was later re-released for the 2002 tournament.

  The star was performing live until May last year

  Other hits included Sunmachine, Voices and Dream to Me, which sampled the chorus of the Cranberries' Dreams. Scott and Stephen eventually left the band, with Paul continuing the act as a solo project. During that period, he recorded a track called We Got Music with Dame Shirley Bassey, and collaborated with Clean Bandit and Jess Glynne on a remix of Real Love - which incorporated elements of Sunchyme. Paul announced his cancer diagnosis last June, telling fans he was "gonna give it my best shot though" and urging them to "stay positive, 'cos I am". Over the next months, he documented his treatment on social media, and released a song Savour the Miracle of Life, to raise money for Macmillan Cancer Support. In his last post, just three weeks ago, he was still maintaining a positive attitude. "I know you’ve been all been showing overwhelming support, love and strength for me," he wrote. "I'm infection free now but feel I already have the energy to defeat this fully." He had been planning to play his first gig of the year at Chris Moyles' 90s Hangover concert in Swindon on 25 May, but pulled out due to his failing health.
