title: Dario G, who made 90s dance anthem Sunchyme, dies aged 53 - BBC News
date: '2024-06-17'
section: Culture
url: http://www.bbc.co.uk/news/articles/cy00dgr4yjvo
content: |-
  The musician, whose had a smash hit with Sunchyme, was diagnosed with stage four cancer last year.

  Dario G was the stage name of Crewe musician Paul Spencer

  Dance producer Dario G, whose hits included Sunchyme and Carnaval de Paris, has died at the age of 53. The musician, whose real name was Paul Spencer, had been diagnosed with stage four rectal cancer last year. "He was positive until the end but this was one battle he could not fight any more," wrote his family on his official Instagram page, external. "He leaves behind a wonderful musical legacy and many happy memories."

  "Lost for words," wrote dance duo Phats and Small. "One of the good guys, you’ll be deeply missed brother." "A true inspiration, he brought joy to so many people and will live on forever through his music," remembered Sigala. "Paul told me many times over the last year, 'Go get yourself checked,' so I’m passing on that message to anyone reading this, as I’m sure he would want me to." Chart star Sonique added: "Rest in peace my friend. We will miss you, that’s for sure." "Sleep tight Paul," wrote dance act K Klass, while Alice Deejay simply wrote: "We will miss you lots".

