title: 'Ukraine in maps: Tracking the war with Russia - BBC News'
date: '2025-03-14'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-60506682
content: |-
  How are Russia and Ukraine placed after three years of fighting and with Donald Trump suggesting talks on ending the war could begin soon?

  Fighting has raged in Ukraine since Russia launched a full-scale invasion three years ago. Russian forces have slowly expanded the amount of territory they control over the past year, mostly in the east of Ukraine. US President Donald Trump has been pushing for an end to the war since taking office in January and negotiations are continuing. Ukraine had agreed to a 30-day ceasefire following talks which Ukraine's defence minister called "productive and focused". In separate talks, Russian President Vladimir Putin says he supports a ceasefire in principle but that there are "issues that we need to discuss". Here is a recap of recent significant events and the situation in Ukraine.

  In eastern Ukraine, Moscow's war machine has been churning mile by mile through the wide open fields of the Donbas, enveloping and overwhelming villages and towns. Despite this, Ukrainian forces claim to have recaptured a village in the Luhansk region - their first successful counter offensive in the east of the country for many months.

  Russia's biggest advantage is manpower and it has shown a willingness to throw soldiers at Ukrainian positions to gain a few metres at a time. Ukrainian military intelligence says about 620,000 Russian soldiers are operating in Ukraine and Kursk, according to experts at the Institute for the Study of War.

  They also expect Russian forces to focus on seizing frontline Ukrainian towns and cities over the winter. The Russian recently took the town of Kurakhove and have continued advancing to the north east, towards the city of Pokrovsk, where they have been met by Ukrainian forces.

  The Russian advance towards Pokrovsk is the most notable change in control of the front line near Donetsk for several months, but innovative tactics by Ukrainian forces, combining the use of drones and ground forces, have inflicted significant losses of troops and equipment and slowed the offensive. It has taken a year for Russia's troops to advance about 40km (25 miles) west - Ukraine was forced to withdraw from Avdiivka, just north of Donetsk, in February 2024 after months of fighting. Almost all of Avdiivka's pre-war population of more than 30,000 people have left and the town itself is almost completely destroyed.

  In addition to its operation on the eastern front, Russia began what the ISW describes as its "subordinate main effort" when it crossed the international border to the north of Ukraine's second-biggest city, Kharkiv, in May 2024. Several villages were seized and thousands of civilians fled.

  The Russian push took place at the end of a four-month period when the US was not supplying weapons to Ukraine, due to a stalemate in the US Congress which was resolved last April. Ukrainian forces eventually held firm and even though the city of Kharkiv has come under repeated attack from glide bombs fired by Russian warplanes, it remains beyond the range of Russian artillery.

  Eastern Ukraine has been contested territory since 2014, when Russian-backed fighters seized large swathes of the eastern Donetsk and Luhansk regions. Russia had already seized the southern peninsula of Crimea in February 2014 before annexing it soon afterwards. Trump has said it is unlikely Ukraine will return to its pre-2014 borders but, in response to a question from the BBC, he said "some of that land will come back". In an interview with the Guardian, published on 11 February,, external Ukrainian President Volodymyr Zelensky suggested that Russian-held territory in Ukraine could be swapped for territory seized by Ukraine in Russia's western Kursk region in recent months as part of a peace deal. Ukraine seized control of part of the region in a surprise attack launched across the border by Ukrainian troops in August, advancing up to 18 miles (30km) into the Russian region. After two weeks, Ukraine's top commander claimed to control more than 1,200 sq km of Russian territory and 93 villages. However, by 13 March 2025 Putin said the situation in the region was "fully under our control", adding Ukrainian equipment had been "abandoned." The head of Ukraine's military, Oleksandr Syrsky, also indicated that some of its troops were withdrawing from Kursk.

  Ukraine says Russian forces are continuing their attempts to invade the Sumy region, while Ukrainian soldiers have compared fighting in Russia's Kursk region to a "horror movie". Russia took control of the city of Sudzha and cut the Ukrainian access to the Sudzha-Sumy highway, which was vital for the Ukraine troops logistics.

  Trump has threatened consequences if Russia rejected the 30-day ceasefire proposal agreed by US and Ukrainian officials, and the White House has resumed sending military aid and intelligence to Kyiv. Posting on social media, Zelensky said Ukraine is "determined" to work "as quickly as possible" with its partners toward a ceasefire. Putin responded saying Russia agreed with a Ukraine ceasefire but it should lead to "enduring peace and remove underlying causes of this crisis". He said there were issues that needed to be discussed and raised questions about how a ceasefire would be monitored and maintained. Talks are continuing in Saudi Arabia, though there have still been no direct negotiations between Ukrainian and Russian officials.

  Russia's full-scale invasion began with dozens of missile strikes on cities all over Ukraine before dawn on 24 February 2022. Russian ground troops moved in quickly and within a few weeks were in control of large areas of Ukraine and had advanced to the suburbs of Kyiv. Russian forces were bombarding Kharkiv, and they had taken territory in the east and south as far as Kherson, and surrounded the port city of Mariupol.

  But they hit very strong Ukrainian resistance almost everywhere and faced serious logistical problems with poorly motivated Russian troops suffering shortages of food, water and ammunition. Ukrainian forces were also quick to deploy Western supplied arms such as the Nlaw anti-tank system, which proved highly effective against the Russian advance. By October 2022, the picture had changed dramatically and, having failed to take Kyiv, Russia withdrew completely from the north. The following month, Ukrainian forces recaptured the southern city of Kherson. Since then, the battle has mostly been in the east of Ukraine with Russian forces slowly gaining ground over many months, with at least 70,000 Russian troops killed - and an estimated 500,000 being either killed or injured in total, according to the UK Ministry of Defence.

  To indicate which parts of Ukraine are under control by Russian troops we are using daily assessments published by the Institute for the Study of War, external with the American Enterprise Institute's Critical Threats Project, external. The situation in Ukraine is often fast moving and it is likely there will be times when there have been changes not reflected in the maps.
