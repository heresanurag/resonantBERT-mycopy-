title: Woman arrested after two men die at house in east London - BBC News
date: '2021-01-10'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-55605181
content: |-
  The woman, who was Tasered by officers, is taken to hospital with non life-threatening injuries.

  A 28-year-old woman has been arrested on suspicion of murder after two men died at a property in east London.

  Police were called to an address in Tavistock Gardens, Ilford, at 04:24 GMT to reports of a disturbance.

  Two men were found seriously injured inside the property and both died at the scene.

  The woman, who was Tasered during the arrest, also suffered non life-threatening injuries. She has been taken to hospital, the Met Police said.

  A man who lives a short way down the street said he was awoken by the sounds of a woman screaming.

  Kuddus Miah, 44, said: "She was screaming 'help, help, call the police'.

  "The police and ambulances were there very quick."

  The men who were found seriously injured on Sunday morning died at the scene

  "I got changed out my PJs and went outside and asked one of the neighbours opposite what happened.

  "She said a woman was coming in and out of the house crying out for help.

  "Apparently they were new tenants. We've lived here around 15 years and it's a very quiet neighbourhood, it's shocking."

  Several forensics officers were seen outside the house and a large police cordon has been put in place.

  Forensic officers have been seen working in the house

