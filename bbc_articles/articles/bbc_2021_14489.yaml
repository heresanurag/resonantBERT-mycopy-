content: |-
  The climate activist is speaking to protesters on the streets in Scotland on day six of the climate summit.

  Ineza is an inspirational campaigner but a bad selfie taker... Image caption: Ineza is an inspirational campaigner but a bad selfie taker...

  Ineza Umuhoza Grace, 25, is a environmental advocate from Rwanda who has been at COP26 events this week campaigning for greater financial support for communities already experiencing damage because of climate change.

  She's been speaking to BBC Young Reporters Maisie Goodwin and Nel Richards in between a packed schedule at the conference centre. They started by asking what affects of climate change she had personally experienced:

  Quote Message: I was exposed to climate change from a very young age - five or six - because I have the memory of floods in my house and my bedroom was like a lake. I was exposed to climate change from a very young age - five or six - because I have the memory of floods in my house and my bedroom was like a lake.

  Quote Message: When I finished my secondary school classes, I wanted to study to become a pilot or a mechanical engineer because I was good in science. Then when I watched the news, I had the information that in one particular area in my country, a rural area, women and children were being forced to move because of erosion and flooding. When I saw the news, it reminded me of how hopeless I felt. Then I wanted to study environmental engineering because I wanted to learn how to contribute to my community. When I finished my secondary school classes, I wanted to study to become a pilot or a mechanical engineer because I was good in science. Then when I watched the news, I had the information that in one particular area in my country, a rural area, women and children were being forced to move because of erosion and flooding. When I saw the news, it reminded me of how hopeless I felt. Then I wanted to study environmental engineering because I wanted to learn how to contribute to my community.

  Quote Message: In 2020 our country lost 4,000 hectares of crops, due to flooding and intense rainfall. This especially affects women and children - when they are forced to move their crop fields this is very problematic. We also see a lot of damage to schools and homes.” In 2020 our country lost 4,000 hectares of crops, due to flooding and intense rainfall. This especially affects women and children - when they are forced to move their crop fields this is very problematic. We also see a lot of damage to schools and homes.”

  Next up, Mail and Nel asked her about how she stays motivated and positive.
