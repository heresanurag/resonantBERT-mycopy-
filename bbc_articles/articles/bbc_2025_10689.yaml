  Man and woman charged with murder of baby

  The pair appeared at North Staffordshire Justice Centre on Friday, according to police

  A man and a woman have been charged with murder after the death of a five-week-old baby. Sean Jefferson, 34, of Walsall, and Amy Leigh Clark, 33, of Lichfield, were charged with murder and with causing or allowing the death of a child. The pair were also charged with two counts of grievous bodily harm with intent and three counts of causing or allowing a child to suffer serious physical harm. They appeared at North Staffordshire Justice Centre on Friday, and were remanded into custody, police said. They will next appear at Stafford Crown Court on 11 June.

