  Bournemouth manager Andoni Iraola gave a coy response when asked about his future after the frustrating goalless draw at Crystal Palace, but supporters remain desperate for him to extend his stay at Vitality Stadium.

  Iraola guides Bournemouth to another record - can they keep him?

  Bournemouth manager Andoni Iraola gave a coy response when asked about his future after Saturday's frustrating goalless draw at Crystal Palace, but Cherries supporters will be desperate for the Spaniard to extend his stay at Vitality Stadium. The draw at Selhurst Park lifted Iraola's team to 49 points - a club record in the Premier League - with five games remaining, surpassing their tally of 48 in Iraola's first season. Bournemouth were disappointed not to claim all three points in south London after failing to capitalise on Palace defender Chris Richards' first-half dismissal, but Iraola - whose existing deal is set to expire next summer - could yet guide the Cherries into Europe for the first time in their history. Owner Bill Foley is due to attend next weekend's game at home to Manchester United before talks with the 42-year-old former Rayo Vallecano manager. Tottenham are reported to be interested in securing Iraola's services after a disappointing campaign under Ange Postecoglou, while reports have also linked him to Real Madrid as a potential replacement, external for Carlo Ancelotti. However, sources at Bournemouth suggest Iraola is open to extending his time on the south coast. "We'll talk, but nothing special," Iraola, who was appointed in June 2023, told BBC Match of the Day after Saturday's stalemate. The Spaniard was also quick to deny reports that talks have already started about a contract extension. He went on to describe the result as a "missed opportunity" for his side, but former Brighton striker Glenn Murray says the Cherries are heading firmly in the right direction. "Of course they want Europe, but this is the best season Bournemouth have had," Murray told Final Score. "Things are progressing in the right way for them."

  In December 2023 - a year after taking control of the club - Foley said he was confident Bournemouth would qualify for Europe within the next five years. After following an impressive 2023-24 campaign with another outstanding season including wins over Arsenal, Manchester City, Manchester United and Newcastle, Iraola could be about to lead the Cherries into continental competition far quicker than Foley or anyone else had anticipated. They could end the weekend eight points outside the top seven, but eighth place may still be enough to secure European football in 2024-25. For a club who were playing in League One as recently as 2013, it is a tantalising prospect. Indeed, Iraola's downcast demeanour following Saturday's draw only serves to highlight how far Bournemouth have come. "We cannot be happy with this point," he said. "Before the game, [we thought a draw] is not a bad result, coming to a stadium this difficult. "But considering how the game has gone, we cannot be happy. I feel we have not used the extra player in the proper way." Bournemouth were fortunate not to be reduced to 10 men themselves after referee Sam Barratt opted against showing midfielder Alex Scott a second yellow card 10 minutes before Richards' dismissal. It may be nothing more than a silver lining for Iraola and his players, but the point does at least extend Bournemouth's unbeaten league run to three games - their longest streak since going 11 games without defeat between November 2024 and January 2025. "Iraola has been able to grow and develop his squad," former England goalkeeper Paul Robinson told Final Score. "They have been able to establish themselves in the Premier League. "He is very tactically astute and uses his bench well, which is a credit to his in-game management and squad depth." Next up for Bournemouth is a home match against Manchester United, a team they beat 3-0 at Old Trafford this season. By the end of next weekend, Bournemouth may not only be closing in on European qualification, they may have moved a step closer to ensuring Iraola remains at the helm.
