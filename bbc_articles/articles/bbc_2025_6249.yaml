title: Ardrossan Harbour campaigners hold protest on ferry route - BBC News
date: '2025-04-13'
section: General
url: http://www.bbc.co.uk/news/videos/c2lzed02ly8o
content: |-
  Islanders are frustrated by the lack of progress around the future of Ardrossan Harbour

  Island campaigners have held a 'protest sail' in Ayrshire over stalled progress over the future of Ardrossan harbour.

  The Arran for Ardrossan Harbour group boarded the Glen Sannox ferry in Brodick on Saturday and headed for the mainland.

  The harbour needs an £80m upgrade to fit two new ferries, but there has been no agreement between owner Peel Ports, the Scottish government and North Ayrshire Council over who should pay.

  Services are being diverted along the coast to Troon in the meantime.

  The campaigners marched off the vessel chanting and waving placards.
