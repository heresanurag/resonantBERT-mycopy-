  Liverpool goalkeeper Caoimhin Kelleher says he wants to leave Anfield to prove himself with the club seemingly having chosen to go "in a different direction".

  Kelleher wants Liverpool exit to 'be a number one'

  Caoimhin Kelleher filled in for Liverpool when Alisson Becker was injured last season

  Liverpool goalkeeper Caoimhin Kelleher said he wants to leave Anfield to prove himself, with the club seemingly having chosen to go "in a different direction". The Republic of Ireland international, who was speaking before his country's Nations League game with Greece in Dublin on Tuesday night, made 26 appearances for Liverpool last season after injury to first-choice keeper Alisson Becker. New manager Arne Slot has, however, made a move to sign Georgia goalkeeper Giorgi Mamardashvili from Valencia in a deal worth up to £29m, with the 23-year-old due to arrive in time for the 2025-26 season. "I've made it clear in the last few years that I want to go and be a number one and play week in, week out," said Kelleher. "The club's made that decision to get another goalkeeper and from the outside looking in, it looks like they've made a decision to go in a different direction."

  The Merseyside club reportedly turned down approaches from Premier League rivals for Kelleher's services this summer. "Sometimes from the outside looking in, it looks like that's 100% my decision but at times it's not always in my hands," he added. "It's been reported that Liverpool have rejected a few bids as well. My ambition is clear that I think I'm good enough and I want to go out and prove it." For his country, injury to Southampton's Gavin Bazunu has led to Kelleher's promotion to the number one jersey. The 25-year-old performed well in the 2-0 defeat to England at Aviva Stadium on Saturday, but took little satisfaction from his showing given the result in what was Heimir Hallgrimsson first game in charge. "I had a few saves to make and was able to help the team but it's not about that , it's about the team and getting the right results for the country. "Personally, happy with my own performance but we need to perform as a team and it's a big game on Tuesday."
