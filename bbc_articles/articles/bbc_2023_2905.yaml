title: 'Snowdonia: Climber dies after falling from mountain - BBC News'
date: '2023-02-06'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-64541154
content: |-
  The man fell from Gribin Ridge in Eryri, also known as Snowdonia after a handhold broke away.

  A man has died after falling from a mountain rockface after a piece of rock he was holding on to broke away.

  Three men were climbing the Gribin Ridge in Eryri, also known as Snowdonia, on Saturday, when the handhold collapsed.

  The recovery attempt continued until Sunday lunchtime. However, the man did not survive his injuries.
