id: bbc_2024_7726
title: Georgian opposition leader punches MP during debate - BBC News
date: '2024-04-15'
section: General
url: http://www.bbc.co.uk/news/world-europe-68821150
content: |-
  A scuffle erupted in Georgia's parliament as the leader of the opposition punched an MP.

  Critics say the "foreign influence" bill is inspired by authoritarian laws neighbouring Russia uses to crush dissent.

  Thousands of protesters demonstrated in the Georgian capital Tbilisi on Monday demanding the withdrawal of the bill.
