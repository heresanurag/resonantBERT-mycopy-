  BBC Radio 1's longest serving DJ, who has died aged 83, spoke about how her career in broadcasting started.

  BBC Radio 1's longest serving DJ who has died aged 83 spoke about how her career in broadcasting started.

  When asked if she knew how to work a desk, Annie asked "What do you mean?"

  The first female Radio 1 DJ describes how switching to evening music allowed her to explore more adventurous music.

  Annie Nightingale: Bird on the Wireless was first broadcast in June 2011.
