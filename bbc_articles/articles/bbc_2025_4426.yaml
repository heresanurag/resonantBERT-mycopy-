  Nottingham Forest's Neco Williams remembers his late grandfather and discusses how he owes his Wales career to his family.

  'For him, for them' - Williams' family inspiration

  This video can not be played To play this video you need to enable JavaScript in your browser. Neco Williams: Wales defender more confident than ever

  Coverage: Watch on BBC One Wales, iPlayer, BBC Sport website and app, plus S4C via iPlayer. Text commentary and highlights on BBC Sport website and app. Listen live on BBC Radio Wales, BBC Radio Cymru, BBC Radio 5 Sport Extra.

  When you play international football, you do more than represent your country. You carry the memory of those who wore the shirt before you, as well as the dreams of millions – and of those you love most dearly. When Neco Williams plays for Wales, he plays for his family. As a child in Liverpool's youth ranks, Williams was driven to training from his home in north Wales by his parents and grandfather. Without them, the 23-year-old would not be the accomplished Premier League full-back he is today, riding high with Nottingham Forest as they chase a Champions League place. Williams is also a shining light for Wales, already with 44 caps to his name five years into an international career that arguably peaked when he helped his country qualify for their first World Cup in 64 years. But just a day before Wales' opening game in Qatar in November 2022, Williams was told his grandfather, Kelvin Jones, had died. "My grandad played a big part in my football career. He passed away a day before the game. It was probably one of the toughest moments I have had in football," Williams says. "I had just lost someone really close to me, who helped me a lot with my football. He used to take me training a lot and come to lots of games. He used to give me lots of advice. "Then, the day after, I had one of the biggest games of my career. It was obviously a tough time. But if he had still been there, he would have said to me, 'you're playing'. Regardless of what's happened, you're playing. So that's what I had to do."

  Neco Williams has had a tattoo and ring made in tribute to his late grandfather

  Williams was in tears after the game as he pointed to the sky in tribute to his grandfather, who would have been proud of his performance in the 1-1 draw against the United States. To honour that moment, the full-back had the date of the game added to an existing tattoo on his hand that reads 'blessed', and he has since added another tribute. "I've had a ring made with his name on it," Williams explains. "It's sat next to my medals I have won over my career. It's always a little reminder to myself when I go home to see the achievements that I have done in my career with my medals and trophies. "He wasn't just my grandad, he played a huge part. He used to take turns with my mum and dad to take me to training four times a week. It wasn't just down the road either - it was to Liverpool so it was an hour there and another hour back. "They all made the sacrifices and I wouldn't be sitting here without them."

