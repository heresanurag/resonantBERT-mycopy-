  At the border, men and women pass through separate gates, under the watch of armed Pakistani and Afghan guards. Some of those returning were elderly – one man was carried across on a stretcher, another in a bed. Military trucks shuttled families from the border to temporary shelters. Those originally from distant provinces stay there for several days, waiting for transport to their home regions. Families clustered under canvases to escape the 30C degree heat, as swirling dust caught in the eyes and mouth. Resources are stretched and fierce arguments often break out over access to shelter. Returnees receive between 4,000 and 10,000 Afghanis (£41 to £104) from the Kabul authorities, according to Hedayatullah Yad Shinwari, a member of the camp's Taliban-appointed finance committee. The mass deportation is placing significant pressure on Afghanistan's fragile infrastructure, with an economy in crisis and a population nearing 45 million people. "We have resolved most issues, but the arrival of people in such large numbers naturally brings difficulties," said Bakht Jamal Gohar, the Taliban's head of refugee affairs at the crossing. "These people left decades ago and left all their belongings behind. Some of their homes were destroyed during 20 years of war." Nearly every family told the BBC that Pakistani border guards restricted what they could bring – a complaint echoed by some human rights groups. Chaudhry said in response that Pakistan did "not have any policy that prevents Afghan refugees from taking their household items with them". One man, sitting on the roadside in the blistering sun, said his children had begged to stay in Pakistan, the country where they were born. They had been given temporary residency, but that expired in March. "Now we'll never go back. Not after how we were treated," he said.
