date: '2024-12-09'
section: England
url: http://www.bbc.co.uk/news/articles/cp3zd40kdgyo
content: |-
  BBC hears how people felt pressured to grant lasting power of attorney to a man called Ron Hiller.

  Bank accounts locked and cash withdrawn after elderly gave power to law firm partner

  Elderly and vulnerable people in south-east England have told the BBC how they lost control of their money and property after dealing with a law firm based in Essex. They described how they were persuaded - and sometimes felt under pressure - to grant lasting power of attorney (LPA) to a man called Ron Hiller, a partner in the firm. LPA is a legal agreement in which someone appoints an "attorney" to make decisions on their behalf, either for finance or health and welfare. Attorneys are supposed to act in their clients' best interests. But we investigated 30 cases involving Mr Hiller and his firm, Craybeck Law, and found a disturbing pattern of events:
  • None People found they had no access to their bank accounts and no idea how much Mr Hiller was charging for being their attorney
  • None Large amounts of cash were withdrawn without a reasonable explanation
  • None Properties were sold for what owners and others considered was lower than market value, and possessions were cleared and disposed of without owners' knowledge or informed consent

  There has been a massive rise in LPAs in England and Wales in recent years. In 2023, more than one million people registered - a rise of 37% on the year before. I spoke to dozens of vulnerable people, as well as their friends, family and neighbours, who expressed concern about Ron Hiller's business practices. My findings also raise concerns about the potential lack of oversight within the system, and whether the body that regulates attorneys - the Office of the Public Guardian (OPG) - is able to deal with such problems. A spokesperson for Craybeck Law has denied any wrongdoing but said the firm could not respond to claims about specific individuals, because of client confidentiality. We made repeated attempts to speak to Mr Hiller in person, including at his home, but he did not respond.

  Carole was in her 60s, living alone in a house in Uxbridge, west London. In April 2022 she was admitted to hospital with an infection. She never came back. Her friends and neighbours, Bert and Hazel, wanted to visit her in hospital but Covid restrictions were in place. Then the hospital told them she had been transferred to a care home. They rang the home repeatedly but were never put through. They left messages but their calls were not returned. Within months, Carole's house had been completely cleared out and sold for £355,000 - a low price, the neighbours thought, considering other houses in the street were fetching up to half a million. Hazel and Bert were worried about what was happening, but they had no legal right to know any more details. They wrote asking for my help, as they knew I had investigated a similar case. Together we paid a visit to Carole's care home in the Hertfordshire town of Rickmansworth. Carole told us she was desperate to leave, but was stuck there. She said she had been introduced to Ron Hiller at the care home, and he had convinced her to grant him lasting power of attorney over her finances.

  Carole found herself stranded in a care home without ready access to her finances

  Most people appoint family members to be their attorney but for Carole, this had not been an option. Her closest relative was Sandie - however, she lived about a 100-mile drive away and suffered from serious health problems. A property and finance LPA can be activated as soon as it is registered. Carole told us she had been in a lot of pain when she arrived at the care home, and her LPA shows she agreed to grant these powers to Mr Hiller straight away. Since that point, she had been without her bank cards and had received no statements. She was also in the dark about how much she was paying Mr Hiller to manage her finances. She had wanted to call Hazel and Bert, but Mr Hiller had given her a new phone that didn't contain any of her old contacts. Carole told us he had advised her to sell her house in order to pay the care home fees, then later told her it had fetched a low price because nobody had wanted to buy in her area. As we sat talking, Sandie looked at her phone and discovered the house was on the market again. This time, the asking price was almost £100,000 more than when Mr Hiller had sold it for Carole.

  The hidden scandal of Power of Attorney - how one man controls the finances of scores of vulnerable people. Read less

  After meeting Carole in the care home, Sandie asked for detailed accounts from Craybeck Law. What came was a slow drip-feed of bank statements, with no real explanation of Mr Hiller's charges and hardly any receipts. However, they did show that large sums of money had been taken from Carole's account. Her bank card had been used to make a series of £300 cash withdrawals from ATMs in the Essex town of South Benfleet, near Mr Hiller's office. He told Sandie that Carole had authorised the withdrawals - but later, when Carole asked to see invoices, they were not produced.

  The statements also showed a charge for arranging for Carole's house to be cleared. I later discovered the work was given to Silverback Commerical Removals, and that the director of this firm was David James Hiller - the son of Ron Hiller. Craybeck Law denied there was any conflict of interest and said the decision to use Silverback was reached after quotes were sought from alternative providers. Carole has no record of these. I heard a similar story about house sales a few miles away in Watford. Ron Hiller was appointed to oversee the finances of an elderly woman called Elizabeth - her house had been sold for £350,000 after she went to live in a care home. It was then left empty and sold on a few months later for £525,000 - without any signs that improvements had taken place. Craybeck Law said it would not comment on individual cases but told us that the properties it handled were often in poor condition and that sometimes they needed to be sold quickly to cover care home fees, and "to avoid the risk of a sale falling through".

  Many of the people I spoke to, felt Ron Hiller had put them under pressure to appoint him as attorney. Some also told me they had been introduced to him by care professionals, who had led them to believe he was a qualified solicitor. On the website for Craybeck Law, Ron Hiller is described as a partner in the firm's elder client division. However, the letters after his name - MCICM - denote a diploma in credit management and debt collection. There is no mention of Ron Hiller on the official register of qualified solicitors either. A spokesperson for Craybeck Law denied Mr Hiller had ever given the impression he was a qualified solicitor. They added that changes to the law in 2008 meant that individuals who were not qualified solicitors were permitted to become partners in law firms.

  In the Hertfordshire town of Letchworth, a woman called Petra told me how an NHS social worker called Margaret Falegan had brought Mr Hiller to her house during a professional visit. Petra suffers from anxiety and had previously told Ms Falegan - whom she described as her mental health nurse - that she was having trouble with her bills. She felt she was being put "very much" under pressure to grant Mr Hiller power of attorney, even though she felt uneasy about him. The next day, she went to her local Citizens Advice Bureau and - with the help of the staff there - suspended the process. A few weeks later, she received a letter from Mr Hiller. It read: "I've informed the mental health team, Stevenage, of your decision, as this may impact on the level of support they may have planned to provide you in the future." Whatever Mr Hiller had meant by this, Petra read it as a threat. She told me she was still upset about the letter months later, and it had destroyed her trust in the mental health team.

