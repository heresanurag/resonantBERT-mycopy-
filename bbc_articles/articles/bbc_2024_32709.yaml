  I have heard of other cases where Margaret Falegan introduced Mr Hiller to potential clients in the course of her professional duties. In one, the appointment was made in spite of objections from the man's relatives that he had dementia and did not understand what he was signing. When I approached Ms Falegan for a response, she denied putting pressure on her clients to sign with Mr Hiller. However, she did not say whether her employer, Hertfordshire Partnership University NHS Foundation Trust (HPUFT), knew that he had accompanied her on client visits. In response to my findings, HPUFT said it had now launched an investigation into Ms Falegan, as well as other social workers who had introduced Ron Hiller to clients. The trust said it had also raised the matter with the appropriate professional bodies and the police. "If an NHS or care worker is making introductions between their clients and potential attorneys that is very concerning," says consultant psychiatrist James Warner. "If [elderly or vulnerable people] don't have the ability to decide who they want to appoint as their attorneys, they shouldn't be appointing attorneys." Craybeck Law said that when a potential client was introduced to the firm, a qualified individual - usually a social worker - would have a discussion with that person, to ensure they had the mental capacity to make the decision to appoint the firm as their attorney. They said this would take place without a Craybeck Law representative present. It also said the firm had processes to ensure that no individual felt coerced into signing powers of attorney.

  In several of the cases I looked at, Craybeck Law - and chiefly Ron Hiller - not only acted as attorney but also executor of clients' wills. An executor is legally responsible for carrying out the instructions in a person's will and handling their estate. However, in at least two cases, Mr Hiller seems to have ignored the instructions he was given. One client was surprised when I told her that the will he had drawn up for her split her estate between four charities - including one she had never heard of. Another client told me he had not seen a copy of a will Mr Hiller had drawn up for him, and did not understand its contents. Valerie in Borehamwood also appointed Mr Hiller as attorney and executor of her will. After she died in 2022, it emerged that her family had been left out of her will and her entire estate - estimated at about £220,000 - was left to a police charity. Her brother and sister-in-law, John and Kaye, live in Australia and were not well-placed to challenge the will. The fact that family members were no longer beneficiaries also meant they were not entitled to any financial information. "We couldn't see how much [Ron Hiller] was charging for probate or how much he charged every year for being her power of attorney," Kaye told me. Ann Stanyer, a leading lawyer in this field, told me that if an attorney is also the executor of a will, there is much less scope for proper scrutiny: "They can both operate the powers of attorney during their lifetime and take fees through that, but they can then take big fees from the estate as well."

  This video can not be played To play this video you need to enable JavaScript in your browser. Sue Mitchell tries to speak to Ron Hiller at his home

  Craybeck Law said that the firm was governed by the Solicitors Regulation Authority's (SRA) rules and principles, including strict conduct and ethical guidelines that it upheld. It said that much of what had been put to it was inaccurate and based on second- or third-hand hearsay and that it fully refuted the insinuations made about the way it supported its clients. The SRA has now confirmed it is looking into allegations made in this article.

  Carole has now moved out of the care home in Rickmansworth, and into a small flat in Folkestone near her cousin Sandy. She has the added work and expense of buying all the basics for her new home, because Ron Hiller disposed of all her furniture and most of her possessions. However, she is happy to be making a fresh start.

  Carole has now cut ties with Ron Hiller and moved to a new flat in Folkestone

  Her story, and the others in this article, were only a few of those I heard about Ron Hiller. He has acted as attorney for scores of people - a fact that Ann Stanyer finds odd. "You've got to run [LPA] properly and you can't possibly do that if you've got volumes of these things," she says. "I have four or five which are active and that's more than enough." The Office of the Public Guardian doesn't appear to track when an attorney has an unusually large number of clients. A former senior judge at the Court of Protection, external, Denzil Lush, is concerned that the OPG is not designed to spot potential problems with the system. For instance, if an attorney's powers are revoked by more than one of their clients, the OPG does not automatically look at why this is happening. The issue has caught the attention of Parliament - a private members bill, which has gone to its second reading, proposes greater safeguards. Many MPs feel it is an urgent problem because of the sheer numbers involved. More than eight million people in England and Wales have now registered an attorney to act for them. The system was designed to protect elderly and vulnerable people, but the danger is that without better safeguards, it could be leaving them open to harm.

