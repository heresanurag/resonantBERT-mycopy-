content: |-
  "Unacceptable behaviour" will not be tolerated on Strictly Come Dancing, the director general says.

  BBC boss says sorry over Strictly complaints

  The BBC is conducting an internal investigation into the complaints about Strictly

  The BBC's director general has apologised to Strictly Come Dancing contestants after complaints of abusive behaviour on the show. Tim Davie said he was "disappointed" to hear that several celebrities had complained about how their dance partners treated them in rehearsals. The BBC One show's professionals should not cross the line between being competitive and "unacceptable behaviour", he warned - but did confirm the show would return. "There will be a degree of competitiveness and will to do well, but there are limits and the line should never be crossed," he said. "We never tolerate unacceptable behaviour of any kind."

  Graziano Di Prima has said he deeply regrets "the events that led to my departure from Strictly"

  Strictly professionals Graziano Di Prima and Giovanni Pernice have both left the show after allegations about their behaviour in training. Pernice has denied "any accusations of abusive or threatening behaviour". Di Prima's spokesman has admitted the dancer kicked partner Zara McDermott in rehearsal last year. Di Prima has said he deeply regrets "the events that led to my departure from Strictly", and that his "intense passion and determination to win might have affected my training regime". Speaking to journalists on Tuesday, Mr Davie said he was "very sorry that anyone has had an experience that hasn’t been wholly positive". "That’s something we do need to reflect on and I’m sorry about that," he added. "There are clearly learnings specifically about oversight in the training rooms that we had needed to address." With the "benefit of hindsight, you think could we have done more?" he added.

