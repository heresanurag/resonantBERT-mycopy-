title: Moment French diver slips during Olympic pool inauguration - BBC News
date: '2024-04-05'
section: General
url: http://www.bbc.co.uk/news/world-europe-68738072
content: |-
  Alexis Jandard laughs off the incident on social media, posting, “My back is fine, but my ego...”.

  French diver Alexis Jandard slipped during the inauguration of an Olympic aquatics centre north of Paris, his awkward moment on the board caught on camera.

  Laughing off the incident later on social media, the 26-year-old thanked people for their support, saying: “For your information, my back is fine, but my ego...”

  The event at the venue, one of two purpose-built for the Paris 2024 Games, was attended by President Emmanuel Macron.
