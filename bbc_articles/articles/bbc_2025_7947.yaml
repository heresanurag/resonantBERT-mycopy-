content: |-
  Peter and Barbie Reynolds have been detained for nine weeks in Afghanistan, where they have lived for 18 years.

  Son of British couple held by Taliban asks US for help

  Peter Reynolds, 79, and wife Barbie, 75, have been in prison since the start of February

  The son of a British couple who were detained by the Taliban nine weeks ago is calling on the US to help secure their release from an Afghan prison. Peter Reynolds, 79, and wife Barbie, 75, were arrested on 1 February while returning to their home in the central Bamiyan province. Their son, Jonathan, called on the White House to intervene after Faye Hall, an American who was detained alongside them, was released last week by the Taliban, which returned to power in Afghanistan in 2021. He told BBC News the detention of his parents - who have lived in Afghanistan for 18 years and ran education projects - had been "harrowing and exhausting" for their family.

  Mr Reynolds said: "Anybody who has the ability to unlock that key and let them out, whether it be the Taliban, whether it be the British government or whether it be the American government, I would ask - do it now, please. "And if you have the ability to put the pressure on the people who hold that key, do it now, please." Ms Hall became the fourth US citizen to be released by the Taliban since January after talks between officials in Kabul - in what the group described as a "goodwill gesture" towards the Trump administration. That prompted Mr Reynolds to appeal to US President Donald Trump directly to aid in Peter and Barbie's release, in a video taken outside the White House earlier this week. Mr Reynolds, a US citizen, told BBC News that his parents had not been formally accused of any crime. He said: "They've been in and out of court, which is infuriating for them because there's no charges and they are told every single time: yes, they are innocent, it's just a formality, we've made a mistake." An Afghan interpreter was also arrested alongside the British couple. Mr Reynolds said his parents had sought to work with the Taliban and had "been open" about their work in the country. He said he believes his mother received "the only certificate for a woman to actually teach and train even men", despite women typically being banned from employment under Taliban rule. "They deeply love the country," he added.

  Jonathan Reynolds said his parents' detention had been "harrowing and exhausting"

  The couple married in Kabul in 1970 and later became Afghan citizens. They are being held separately in prison and Peter's health has deteriorated while detained, Mr Reynolds said. He said he had been able to speak to his parents via a prison payphone and described the conversations as "excruciatingly painful". "Just to think of your parents, elderly parents and grandparents to my kids - and they've got great-grandkids even - and wondering if we're going to see them again," he said. "We want to see our parents again, to hug them and hold them." Mr Reynolds said securing his parents release was "complex" as they wish to remain in Afghanistan and continue their education work. "They want to be released from prison because they've done nothing wrong, but they want to be released so they can carry on doing the work they're doing - which just speaks to the character and the stamina and the vision and conviction that they have," he added. He said the UK government had been "very supportive" and discussions with he US State Department had been "encouraging". A Taliban official told the BBC in February that the group planned to release the couple "as soon as possible". The UK shut its embassy in Kabul after the Taliban returned to power. The Foreign Office said this means its ability to help UK nationals in Afghanistan is "extremely limited".
