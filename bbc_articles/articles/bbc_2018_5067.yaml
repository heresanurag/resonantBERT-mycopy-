id: bbc_2018_5067
title: Tourist takes crowdfunded trip to British islands - BBC News
date: '2018-04-20'
section: General
url: http://www.bbc.co.uk/news/world-europe-jersey-43842740
content: |-
  American Joe Hill thought a Facebook group for Jersey, the Channel Island, was for New Jersey.

  Six years ago Joe Hill, from Plymouth, Massachusetts, was wondering why people were using "British slang" in what he thought was a New Jersey Facebook group.

  After a couple of years, he realised the group was actually based in the Channel island of Jersey - and admitted his mistake.

  A crowdfunding campaign by islanders later, and he has been on holiday with his girlfriend in the British crown dependancy, seeing what all the fuss was about.
