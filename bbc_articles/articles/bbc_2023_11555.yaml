title: Labour plan to give teachers £2,400 to stop them quitting - BBC News
date: '2023-07-02'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-66078820
content: |-
  The party would also make it compulsory for new joiners to have a formal teaching qualification.

