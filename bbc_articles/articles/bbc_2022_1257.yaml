title: 'Alps murders: Man released without charge over 2012 killings - BBC News'
date: '2022-01-12'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-59963434
content: |-
  A man arrested over the deaths of a British family and a French citizen is ruled out as their killer.

  Saad al-Hilli was shot dead with his wife and mother-in-law

  A man arrested in France this week over the unsolved 2012 murder of a British family and a French citizen in the Alps has been freed.

  Prosecutors said the man had been ruled out as the killer and his detention ended at 17:30 local time (16:30 GMT).

  The arrest had fuelled hopes of a breakthrough in the high-profile case.

  Saad al-Hilli, his wife Iqbal, Mrs al-Hilli's mother Suhaila al-Allaf and a cyclist, Sylvain Mollier, were found shot dead on a road near Lake Annecy.

  The al-Hillis' two young daughters survived the attack.

  Zeena, then aged four, was discovered hiding under her mother's body inside the family car.

  Zainab, seven at the time, was found with serious head injuries after being shot and beaten.

  The have since been given new identities and in 2020 were interviewed again to try to make progress on the case.

  French investigators have explored several theories, such as a family feud or Mr al-Hilli's work as a satellite engineer, as reasons for the attack but the case remains a mystery.

  Investigators have said that Mollier had no link to the British family and was simply in the wrong place at the wrong time.

  A number of people have been arrested in connection with the deaths but no charges have ever been brought.

  On Thursday prosecutors said in a statement: "Investigations continue to identify those who committed these crimes."

  However, they said that the recently arrested man had provided explanations and proof that excluded his possible participation in the killings.
