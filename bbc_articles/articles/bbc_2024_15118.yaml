  The one time England have really been exposed during this tournament was against the Netherlands, and it came from us trying to press them in their own half. Jude Bellingham and Phil Foden had gone high and hard on the press but the Dutch played some good football to get around that, and then opened us up. It was an example of how something that many England fans and pundits want and have been crying out for, which is that kind of high pressing, can actually be counter-productive. We will have to be especially careful not to commit too many people forward like that against Spain because their players will love to be put under pressure. The quicker we go in to try to win the ball back from them, the easier it is to be beaten with a good first touch or fast, precise passing. So, I actually would not be surprised if we see England drop into a kind of middle to low block on Sunday, rather than go after Spain. Our fans might get frustrated about that but I think they need to understand that it is happening for a reason, because Spain are so good at playing fast passes forward under pressure. There are going to be moments in the game where England are going to have to be brave and go for it, but we definitely cannot press for 90 minutes anyway and we have got to be careful we do not run out of gas too soon. Whatever the approach, it is going to be a game where energy from the bench is going to have a massive impact. In my opinion, Gareth Southgate has really delivered so far in terms of the timings when he has done that. There has been a big call for him to bring on his substitutes sooner, but I agree with what he has done, and when. He has shown he has a real sense of how each game is going, and what is needed to make a difference. Again, fans should not be frustrated if Southgate is patient before making his changes. He will be waiting for a reason.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'Not hard to put friendship aside' - Walker on facing Rodri in final

  You cannot talk about Spain without mentioning Rodri. He is at the base of everything they do, as the most competent and complete holding midfielder in the world. His form alongside Ruiz in the heart of their midfield has helped them win every game they have played in Germany. That is hardly surprising considering the season he just had at Manchester City, when they lost only once with him on the pitch, but England are still capable of opening Spain up the way the did in the first half against the Netherlands. I would love to see Foden get on the ball the way he did against the Dutch, because he was exceptional in those pockets of space in front of their defence. He shifted from right to left and the way he went hunting for the ball was like he had been given licence to do that. England had created a box in midfield with Foden, Bellingham, Declan Rice and Kobbie Mainoo, and Bellingham drifted left which created that space for Foden. It was like he had a City shirt on again. What is interesting about Sunday's game is that Rodri plays with him every week so he has got a really good understanding of where Foden will want to operate. Because of that, I would not be surprised if he nullifies him. That is going to shift a lot of our attacking focus on to Saka, who is likely to be on the right, and ask him to take on his defender one-on-one again like he did against Switzerland's Michael Aebischer, but this time against Marc Cucurella.

  I am not sure how that will go, but it is an example of how England are going to have to be very precise at identifying any potential weaknesses Spain have, and go absolutely all out to make the most of them. For me, the weakness involving Cucurella is not when people run at him, but when he is defending the back-post area. We saw that early on against France. When Randal Kolo Muani scored with a header from Kylian Mbappe's cross, he won a header against Cucurella, who had not locked down the back stick. If England are going to expose that too, we are going to need a left-footer at left wing-back, to put those balls in from that side of the pitch and target those areas for Bellingham and maybe Kane to attack, with our other forwards distracting the defence. From an attacking sense, though, there are lots of other ways we can carry a threat. Foden and Saka's creativity are probably up there as being the most likely way we can do something and of course if Bellingham performs the way he can, he will have an impact as well. To win, we are going to have to stop Spain from performing and, at the same time, match the levels we reached at our best against the Netherlands, but I think we are in a good place to do that. If it does come down to who we can bring off the bench again, then we have so many good options there. Southgate has got so much out of everyone who has come on as a substitute at this tournament that he is able to look at how each game is going and react rather than saying "we need a certain player now". Ollie Watkins was the perfect example of that in the semi-final, but who knows who Southgate will turn to this time if we need a goal. Spain will not know either, and hopefully that unpredictability will make the difference again. Izzy Christiansen was speaking to BBC Sport's Chris Bevan in Berlin
