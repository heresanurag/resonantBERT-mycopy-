  With the Spanish sides that won three major finals in four years between 2008 and 2012, their build-up play was based on getting numbers around the ball with relatively few forward passes. Now, however, this Spain team are committed to fast forward passes, with large gaps in between, because they are so confident that Williams and Yamal are able to retain the ball, go one-on-one, come inside and combine. They are relentless whenever they win the ball, so they will just keep on doing it - Fabian Ruiz in particular looks for Williams on the left a lot with his line-breaking passes - but I think England will be ready.

  The Three Lions have been strong in defensive wide areas so far, and a lot of that is down to how disciplined they are at tracking back. Everyone has noticed the threat Bukayo Saka has posed when we have the ball but his positioning when we are out of possession isn’t really talked about. Saka has been excellent at doubling up with his full-back or nearest central defender, whichever side he has ended up being on, and that has nullified the strength of any wide players we have faced. If he is on the right again on Sunday then holding up that Ruiz-Williams combination and supporting Kyle Walker will be a big part of his job. Spain will not stop trying to isolate England's defenders, so it is vital they keep on giving them help.

