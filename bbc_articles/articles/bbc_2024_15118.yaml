title: 'Euro 2024 final: ''Plenty to fear for England from Spain''s flying wingers''
  - Izzy Christiansen - BBC Sport'
date: '2024-07-14'
section: European Championship
url: http://www.bbc.co.uk/sport/football/articles/cqv58xv1g20o
content: |-
  Former England midfielder Izzy Christiansen explains how Spain's quick service to their wingers means Bukayo Saka's defensive work will be crucial in Sunday's Euro 2024 final.

  There is lots to like - or fear - about this Spain team, but it is the way they attack that has impressed me the most. Under Luis de la Fuente they have kept a little bit of the identity that was the hallmark of their great teams of the past - those short, sharp passes in tight spaces - but they have been way more direct, way more often. That is credit to De la Fuente, because he has clearly looked at his squad to work out where they are strongest, and then thought about how he can knit that together so they carry the biggest possible threat. He has done it by using an attacking set-up almost like an upside-down triangle with Rodri deep in central midfield, and then Nico Williams and Lamine Yamal stretched out at the other points on the left and right. Alvaro Morata gives them balance by playing a very unselfish role in the middle, where he is used to lock in the centre-backs and stop them going out wide to prevent one-on-ones, with Dani Olmo linking play and also looking to arrive in the box to finish chances. It works. Spain have scored more goals, 13, than any other team at these Euros - almost double the seven England have mustered in their six matches - and have had nine different goalscorers. It is their wingers, in particular, who will be especially dangerous in Sunday's final because they take the ball in any area of the pitch and the team is set up to feed them as quickly as possible.

