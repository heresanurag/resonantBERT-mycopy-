  England face France in a mouth-watering World Cup quarter-final on Saturday - here's all the key details.

  Last updated on .From the section World Cup

  Host nation:Dates: Coverage: Live on BBC TV, BBC iPlayer, BBC Radio 5 Live, BBC Sounds and the BBC Sport website and app.

  England will take on holders France in a mouth-watering World Cup quarter-final after beating Senegal 3-0 in the last 16 on Sunday.

  You can listen and follow that quarter-final tie live across the BBC. Here's everything you need to know before the game...

  When do England play next?

  England play France on Saturday, 10 December at the Al Bayt Stadium in Al Khor.

  The last-eight tie kicks off at 19:00 GMT - 22:00 local time in Qatar.
  • None England beat Senegal to reach last eight

  What TV channel is England v France on?

  ITV are showing the match live with highlights and clips on BBC TV, BBC iPlayer and the BBC Sport website.

  Is England v France on the radio?

  England's quarter-final is on BBC Radio 5 Live and BBC Sounds. World Cup coverage begins at 12:00, including commentary on Saturday's earlier last-eight tie at 15:00.

  How else can I follow England's quarter-final?

  The BBC Sport website will have live text commentary of England v France. There will also be a live text providing pre-match news throughout the day.

  France are the reigning world champions, beating Croatia 4-2 in the 2018 final in Russia.

  They are ranked fourth in the world, one place above England. Didier Deschamps' side have gone one better than they did at the last major tournament - the delayed 2020 European Championship - where they lost to Switzerland on penalties in the last 16.

  France also have Kylian Mbappe in their attack, who leads the race for the Golden Boot with five goals so far, two more than any other player.

  Have England and France met before?

  England and France have not met in the knockout rounds of a men's major tournament before.

  They have played each other 31 times, with England winning 17 to France's nine victories.

  The last time they met was in a friendly in June 2017, when France were 3-2 winners.

  Who will England play if they beat France?

  Gareth Southgate's team could face several teams in the semi-finals, with last-16 ties still to be played.

  The possible opposition are Morocco, Spain, Portugal and Switzerland. Morocco will play Spain and Portugal face Switzerland on 6 December.

  If they make it, England's semi-final, will take place on Wednesday, 14 December, with a 19:00 kick-off.

  The final will take place at the Lusail Stadium in Qatar on 18 December. Potential opponents include Argentina and Brazil, who are on the opposite side of the draw.

  How to follow the other quarter-finals on the BBC

  BBC Radio 5 Live and BBC Sounds will provide coverage of all four quarter-finals.

  The BBC will show two last-eight ties live on TV and BBC iPlayer. Highlights of non-live games and selected replayed matches will be available on BBC One and BBC iPlayer.

  Fans will also be able to watch highlights of every match and all the goals on TV, BBC iPlayer and the BBC Sport website.

  There will also be live text commentary on the BBC Sport website and app for all matches.
