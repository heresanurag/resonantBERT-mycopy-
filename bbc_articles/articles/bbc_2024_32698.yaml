title: 'Wizard of Oz: Dorothy''s ruby slippers worn by Judy Garland sell for $28m
  at auction - BBC News'
date: '2024-12-09'
section: Culture
url: http://www.bbc.co.uk/news/articles/crk008xemvno
content: |-
  The shoes, worn by Judy Garland in the classic 1939 movie, went for $25m more than the auctioneer's estimate.

  A pair of ruby red slippers worn by actress Judy Garland in the classic movie The Wizard of Oz have been sold for $28m (£22m) at a US-based auction on Saturday. One of four surviving pairs used in the film, the famed sequined pumps were once stolen from a Minnesota museum. Online bidding started a month ago, with the slippers expected to fetch as much as $3m (£2.35m) at auction, according to Heritage Auctions - an under-estimate by $25m (£20m). The auctioneers called the slippers the "Holy Grail of Hollywood memorabilia" and said their selling price made them the most valuable movie memorabilia ever sold at auction.

  Garland was only 16 when she played Dorothy

  The winning bid prompted applause in the auction room in Dallas, with the sale coinciding with a renewed interest in the musical following the recent release of the prequel movie Wicked. Garland was only 16 when she played Dorothy in the classic 1939 musical The Wizard of Oz. Media outlet Variety ranked it second in its inaugural list of "100 Greatest Movies of All Time". The film is a musical adaptation of L Frank Baum's 1900 children's book The Wonderful Wizard of Oz. While in the book, the magical slippers are silver, the producers for the film changed them to red to take advantage of the new Technicolor technology. In the film, as in the book, a pivotal moment occurs when Dorothy must click her heels three times as she repeats "There's no place like home" in order to leave the magical land of Oz and return to Kansas and her Auntie Em.

  While several pairs of shoes were worn by Garland during filming, only four are known to have survived. One of the pairs is on exhibit at the Smithsonian's National Museum of American History. But this pair up for auction has its own unique history. Collector Michael Shaw had loaned the slippers out to the Judy Garland Museum in her hometown of Grand Rapids, Minnesota, when they were stolen in 2005. Professional thief Terry Jon Martin used a hammer to smash the glass case and snatch the slippers, believing that their insured value of $1m must be because they were covered in actual gemstones. But when he took them to a "fence" - an intermediary who sells stolen goods to discreet buyers - he discovered they were just glass. So he gave the shoes to someone else. It wasn't until 2018 that the FBI recovered the shoes in a sting operation. What happened to them in those 13 years is still not known. In 2023, Martin - who was in his 70s and used a wheelchair - pleaded guilty to stealing them, and was sentenced to time served. "There's some closure, and we do know definitely that Terry Jon Martin did break into our museum, but I'd like to know what happened to them after he let them go," John Kelsch, curator of the Judy Garland Museum, told CBS News Minnesota in 2023, external. "Just to do it because he thought they were real rubies and to turn them over to a jewelry fence. I mean, the value is not rubies. The value is an American treasure, a national treasure. To steal them without knowing that seems ludicrous."
