title: Space X Starship makes successful splashdown - BBC News
date: '2024-06-06'
section: General
url: http://www.bbc.co.uk/news/videos/cv22w92wvn7o
content: |-
  The rocket made it much further in its planned mission profile than on previous tests, splashing down in the Indian Ocean.

  SpaceX's Starship rocket has returned to Earth on its fourth test flight, landing in the Indian Ocean.

  The rocket made it much further in its planned mission profile than on previous tests, with both the ship and booster making controlled landings over water.
