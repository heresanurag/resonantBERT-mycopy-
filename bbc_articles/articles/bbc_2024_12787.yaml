title: Cheltenham swimmers enjoy early morning dip to mark summer solstice - BBC News
date: '2024-06-21'
section: General
url: http://www.bbc.co.uk/news/videos/cg33rypxdn9o
content: |-
  Early birds gathered at Cheltenham's Sandford Parks Lido to watch the sunrise on Thursday morning.

  Swimmers enjoyed a beautiful sunrise while enjoying an early morning dip to celebrate the summer solstice.

  Sandford Parks Lido in Cheltenham opened early to mark the longest day of the year and visitors were rewarded with a vibrant and colourful sky.

  The solstice always occurs between 20 and 22 June, and during a leap year (such as 2024) it always falls on 20 June.

  The exact date shifts slightly each year because the calendar year doesn't match exactly the time it takes the earth to orbit the sun.

