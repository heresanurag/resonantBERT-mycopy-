title: Vaughan Gething revealed as Wales' next FM - BBC News
date: '2024-03-16'
section: General
url: http://www.bbc.co.uk/news/uk-wales-68585142
content: |-
  Vaughan Gething set to be Wales' next first minister after winning Welsh Labour leadership election.

  Vaughan Gething is set to be Wales' next first minister after winning the Welsh Labour leadership election.

  Mr Gething, who will become the first black man to lead Wales, beat his only rival Jeremy Miles to the top job.

  He is expected to replace Mark Drakeford as first minister next week.

  In his acceptance speech Mr Gething said "Today, we turn a page in the book of our nation's history. A history we write together."
