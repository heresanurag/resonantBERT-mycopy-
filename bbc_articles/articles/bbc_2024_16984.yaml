content: |-
  New messages suggest the 20-year-old gunman was on the radar of law enforcement earlier than thought.

  Trump to be interviewed by FBI in shooting investigation

  Multiple investigations have been launched into what went wrong in securing Butler Fair Show grounds on 13 July

  Donald Trump has agreed to be interviewed by the FBI as part of its investigation into the assassination attempt at his rally in Pennsylvania earlier this month. In a call with reporters on Monday, the FBI did not give a date for the interview, but said it would be "a standard victim interview we do for any other victim of crime". "We want to get his perspective on what he observed," FBI Special Agent Kevin Rojek said. Despite poring over mountains of evidence, investigators are yet to determine a motive to explain why Thomas Matthew Crooks opened fire on 13 July.

  Newly released text messages, meanwhile, have revealed the 20-year-old was spotted by a local Swat team more than 90 minutes before the shooting - much earlier than previously thought. The messages obtained by the New York Times and ABC News will add to the list of security failures that preceded the assassination attempt against the former president. On Monday, the FBI said investigators believe Crooks conducted "careful planning" ahead of the 13 July rally and made "significant efforts" to conceal his activities. That planning - which included six purchases of components for explosive devices - was conducted in a manner that would not "significantly raise the suspicions of his parents", Mr Rojek said. Multiple investigations have been launched into what went wrong in securing Butler Fair Show grounds on 13 July. On the day of the shooting, the agency was in charge of security within a fenced area and local law enforcement were responsible for areas beyond that.
  • None The plan and the botched security at Trump rally
  • None What we know about Trump gunman At 16:19 local time (21:19 BST), the local police sniper texted two colleagues who were in the second floor of a warehouse overlooking the site, telling them he was clocking off. As he left the building, he saw a young man sitting at a picnic table and notifed the others, saying in a text "someone followed our lead and snuck in and parked by our cars just so you know". By 17:38 Crooks had moved from the table to the warehouse, an American Glass Research (AGR) building, and pictures of him were taken and shared in a group chat. "Kid learning around building we are in. AGR I believe it is. I did see him with a range finder looking towards stage. FYI. If you wanna notify SS snipers to look out. I lost sight of him.” Other messages obtained by CBS, the BBC's news partner, showed that at 17:51 a picture of Crooks was forwarded to a local officer, who said that commanders were "asking for a direction of travel". About 20 minutes later, Crooks was dead, shot by the Secret Service after opening fire from the roof of an adjoining warehouse.

