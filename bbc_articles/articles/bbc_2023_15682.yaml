id: bbc_2023_15682
title: Fire destroys Iowa wind turbine after emergency workers fail to reach top -
  BBC News
date: '2023-10-18'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67147288
content: |-
  Emergency crews in Iowa did not have ladders tall enough to reach the top and put the fire out.

  A wind turbine has been destroyed by fire in Adair County, Iowa.

  Video shows smoke billowing from the turbine, and a giant blade crashing to the ground in flames.

  Emergency crews could only watch as they did not have ladders tall enough to reach the top of the wind turbine.

  Authorities said they were investigating the cause of the fire.
