  Gatland's position was under threat in December following a winless 2024 and was challenged to show improvements in this Six Nations campaign. But after the 43-0 drubbing in Paris last week, Gatland highlighted Wales' handling errors and indiscipline in a sloppy performance at Stadio Olimpico as well as missed opportunities. The record 14 successive wins in his first stint in charge of Wales has now been matched by the number of back-to-back Test losses in his second spell. Wales are at home for two of their remaining three Six Nations games, starting with defending champions Ireland in two weeks. "I've been clear and said before that I understand about professional sport and [Test] rugby is about performance and winning," said Gatland. "We have to focus on the next three games which are are important. "We knew today was pretty vital for us and we're disappointed and frustrated with aspects of our performance."

