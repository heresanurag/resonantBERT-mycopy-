content: |-
  Wales slump to their 14th consecutive defeat with the latest loss to Italy in Rome.

  Gatland vows to fight on as Wales head coach

  Warren Gatland has won just six of 26 Tests in his second spell as Wales head coach

  Warren Gatland has vowed to carry on as Wales head coach despite their record losing run hitting a new low. Wales are now down to 12th in the world rankings - their lowest ever position - following the 22-15 loss to Italy. It was their 14th straight defeat, a first in Rome for 18 years and equalled their worst series of results in championship history. But Gatland insists he is seeing enough progress and spirit in his team to remain in the firing line. "It's not the easiest position to be in but you have to be strong," he replied, when asked whether he wanted to continue. "There's no doubt it's challenging. You do question yourself in terms of [being able to turn things round]. "We talked [after the game] about continuing to work hard and staying tight as a group. "Everyone is pretty frustrated, the players, staff and coaches. There's no-one more disappointed than we are. "We will review and highlight areas where we can still get better, and for me personally."

