  The prospect of back-to-back Wooden Spoons is now a distinct possibility for Wales and will mark a new milestone for Italy in avoiding that unwanted chalice two years in a row. The Azzurri know all about losing runs having lost 36 games in a row in the Six Nations before their 2022 success in Cardiff. But their captain Michele Lamaro has no sympathy for their rival's woes. "It's sport. I don't feel for them, honestly," he said. "We all have moments where we're struggling. Most of our players were there when we were not performing as we wanted. "But no one gave us anything for free. Absolutely nothing. Everyone we played [did so] as if they were playing the All Blacks. "So I don't feel for them, but they are a young team with a big [rugby] culture and with some good motivation, they might get back very soon."
