title: 'Timperley ATM blast: Bomb squad called in over failed raid - BBC News'
date: '2020-03-08'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-51789695
content: |-
  A number of homes are evacuated as the bomb squad remove parts of the failed device to make it safe.

  The failed robbery happened at a Co-op shop at about 03:15 GMT

  Bomb squad officers were called out after thieves made a botched attempt to blow up a cash machine.

  The failed robbery happened at a Co-op shop at about 03:15 GMT in Stockport Road in Timperley, Greater Manchester Police (GMP) said.

  The offenders did not make off with any cash, the force said.

  GMP said a "small number" of homes were evacuated and streets closed while the bomb squad removed parts of the failed device to make it safe.

  A worker at Timperley News said the attempted robbery left a stream of customers wondering where their Sunday papers were.

  Munaf Mohamed said he arrived to open the newsagents at 05:30 but could not get in for more than four hours because "it was all cordoned off".

  The offenders did not make off with any cash

  Munaf Mohamed said people were wondering why their Sunday papers were late

