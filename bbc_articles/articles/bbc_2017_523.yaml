title: Pakistan test launches submarine cruise missile - BBC News
date: '2017-01-10'
section: General
url: http://www.bbc.co.uk/news/world-asia-38561939
content: |-
  Pakistan's military says it has test launched a submarine cruise missile from the Indian Ocean.

  The nuclear-capable missile is seen flying over the coast and hitting its flag target.
