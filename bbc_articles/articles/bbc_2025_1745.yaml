title: Elon Musk waves chainsaw gifted by Argentinian President Milei - BBC News
date: '2025-02-21'
section: General
url: http://www.bbc.co.uk/news/videos/crmj284d0k8o
content: |-
  Argentina's president gifted Elon Musk a chainsaw to symbolise cuts to bureaucracy.

  Argentina's President Javier Milei gifted Elon Musk a chainsaw during the Conservative Political Action Conference (CPAC) in Washington DC on Thursday.

  Waving the chainsaw above his head on stage, Musk told attendees it was "the chainsaw for bureaucracy".

  The chainsaw was engraved with 'Viva la libertad, carajo', Spanish for 'Long live liberty, damn it'.

  Milei famously wielded the power tool during his successful 2023 run for Argentina's presidency - a symbol of the deep cuts he has made to the country's state spending.
