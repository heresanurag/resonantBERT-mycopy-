  In their semi-final, England once again had to come from behind after Xavi Simons rifled in an early goal for the Netherlands. And they were indebted to a good bit of fortune when Kane was awarded a controversial penalty. He stepped up to equalise from the spot and change the momentum of the tie. And with extra time looming, Ollie Watkins, on as a substitute for Kane fired in a 90th-minute winner with an excellent low strike from an acute angle to propel England into a second successive Euros final.
