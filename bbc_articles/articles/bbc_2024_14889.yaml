content: |-
  The Three Lions have reached the Euro 2024 final through a combination of luck, determination and sheer brilliance.

  Ollie Watkins scored the decisive goal to send England to the Euro 2024 final

  "Who cares how we are playing? We are winning." Those words were uttered by former England centre-back Matt Upson during the Three Lions' run to the Euro 2024 final. Whether through luck, grit or just sheer brilliance, Gareth Southgate's team have found a way to succeed. Football tournaments are decided in moments and, with England playing Spain in Sunday's final in Berlin, we look back at the decisive ones from their journey in Germany.

