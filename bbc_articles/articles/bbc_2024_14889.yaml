  The Three Lions entered Euro 2024 on the back of a 1-0 defeat by Iceland at Wembley, but began Group C in positive fashion by edging Serbia 1-0 in Schalke. Bukayo Saka's right-sided cross looped up via a fortunate deflection and an eager Jude Bellingham powered in a header. Start as you mean to go on.

  England drew 1-1 with Denmark in their second group match, with a performance described as "very poor" by former striker Alan Shearer. But it meant Southgate's team entered the final round of fixtures with the knowledge that a win over Slovenia would crown them as Group C winners. A drab 0-0 stalemate followed but Denmark's draw with Serbia meant England topped the group and ended up on the perceived 'easier' side of the knockout-stage draw. Germany would have been on England's side of the draw had Niclas Fullkrug not headed in a late equaliser against Switzerland that meant they finished top of Group A. France, who were favourites to win Group B, limped through in second place, meaning they too ended up on Germany's side, as did Belgium. Wednesday's semi-final against the Netherlands was the first time England had faced a team from inside the world's top 10.

