  England's last-16 tie against Slovakia was looking bleak when the Three Lions trailed 1-0 to an early Ivan Schranz goal. And they could have been facing an embarrassing exit had David Strelec's opportunistic second-half effort from the halfway line, after he spotted England keeper Jordan Pickford off his line, not curled wide.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Strelec's miss was a lifeline for England, and Bellingham grasped it with both hands to haul his nation level in the 95th minute. The Real Madrid star acrobatically volleyed the ball past Slovakia keeper Martin Dubravka with the last kick of normal time, bringing the Three Lions back from the brink of elimination and sparking a comeback that was completed by Harry Kane's extra-time winner to seal a 2-1 victory.

  The Three Lions had to come from behind once more in the quarter-final against Switzerland, following Breel Embolo's neat effort. This time Saka was the saviour. The Arsenal winger forced extra time by brilliantly cutting in from the right and arrowing a low left-foot finish into the bottom corner.

  England certainly rode their luck at Euro 2024, with the woodwork sparing Pickford's blushes in extra time against the Swiss. With three minutes to go until the penalty shootout, former Liverpool forward Xherdan Shaqiri tried to catch the Everton keeper out with a clever corner that struck the crossbar as the game ended 1-1.

