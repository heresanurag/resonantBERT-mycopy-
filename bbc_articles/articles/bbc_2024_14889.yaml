  While lucky to avoid conceding from Shaqiri's corner, there was nothing fortunate about Pickford's brilliance in the penalty shootout. He reacted well to deny Manuel Akanji and ensure that as long as England's takers made no errors – an Achilles heel for the Three Lions in past major tournaments - they would progress to the last four. Cole Palmer, Jude Bellingham, Bukayo Saka, Ivan Toney and Trent Alexander-Arnold all dispatched their spot-kicks with ice-cold composure, putting preparation from the training ground into practice under intense pressure.

