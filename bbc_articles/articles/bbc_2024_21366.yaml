title: Paris 2024 Paralympics triathlon postponed because of poor water quality -
  BBC Sport
date: '2024-09-01'
section: Disability Sport
url: http://www.bbc.co.uk/sport/triathlon/articles/cn9lqqw9pwdo
content: |-
  The Para-triathlon events at the Paris 2024 Paralympics are postponed by 24 hours because of poor water quality in the River Seine.

  Dave Ellis (left), with guide Luke Pollard, is a leading British medal hope in the Paris 2024 para-triathlon

  The Para-triathlon events at the Paris 2024 Paralympics have been postponed by 24 hours because of poor water quality in the River Seine. All 11 triathlon races had been due to take place on Sunday but heavy rain in Paris has caused water quality in the Seine to drop, World Triathlon said in a statement. The events will now take place on Monday, subject to further tests. It is the latest difficulty for Paris 2024 organisers surrounding Olympic and Paralympic events taking place in the River Seine. The Olympic triathlon events were subject to several delays caused by heavy rain during the early stages of the Games. And the Paralympic triathlon was originally supposed to take place over two days - Sunday 1 and Monday, 2 September - before all the events were switched to Sunday because of the forecast of bad weather. That weather arrived earlier than expected, meaning the triathlon is now due to happen on Monday - the day initially vacated by organisers.

  A statement from World Triathlon confirmed the decision to postpone was made after tests at 02:30 BST on Sunday - just under five hours before races were due to begin. "The latest tests show a decrease in water quality in the river following the rain episodes over the last two days," the statement read, external. "As a result, the water quality at the competition venue on Sunday, 1 September is not suitable for swimming and above the threshold established by World Triathlon. "It has been decided to schedule all 11 Para-triathlon medal events on 2 September. This is subject to the forthcoming water tests complying with the established World Triathlon thresholds for swimming. "Paris 2024 and World Triathlon reiterate that their priority is the health of the athletes and with these conditions, the Para-triathlon events cannot take place today." Great Britain has 11 athletes competing across seven of the triathlon events at the 2024 Paralympics. These include reigning PTS5 women's Paralympic champion Lauren Steadman, who is set to defend her gold against team-mate Claire Cashmore. The world, European and Commonwealth champion Dave Ellis will look to finally win Paralympic gold in the men's PTVI, while Rio 2016 silver medallist Alison Peasgood will try to go one better in the women's PTVI.
