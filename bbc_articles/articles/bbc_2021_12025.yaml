title: 'Your pictures of Scotland: 17 - 24 September - BBC News'
date: '2021-09-24'
section: Scotland
url: https://www.bbc.co.uk/news/uk-scotland-58623663
content: |-
  A selection of your pictures of Scotland sent in between 17 and 24 September.

  Send your photos to scotlandpictures@bbc.co.uk. Please ensure you adhere to the BBC's rules regarding photographs that can be found here.

  Please also ensure you follow current coronavirus guidelines and take your pictures safely and responsibly.

  Conditions of use: If you submit an image, you do so in accordance with the BBC's terms and conditions.

  David Baker captured this stunning shot of the aurora borealis over Embo in the Highlands.

  Banksy eat your heart out! Andrew Smith from Inverness took this picture of his four-year-old daughter Lucy, who had the idea to pretend to let go of the balloons on the mural.

  Christov B said: "I went for a drive and a bit of an explore near Crianlarich. The weather was just turning, which led to a fairly dramatic sky."

  Wild beauty! Joanne Baird submitted this photo of her daughters at Glencoe.

  Simon Flower took this atmospheric photo of Dibidil Bothy on Rum

  Chris Watters from Brookfield, Renfrewshire said: "I couldn't resist trying to get a photo of this beautiful wee wasp climbing up my window. On reflection I guess I was risking getting stung."

  Grant McKenzie captured this dreamy photo of Achmelvich Bay on a North Coast 500 holiday with his wife Rachael.

  "Off on a cycle and met this very confident duck on Dores beach, Loch Ness," said Jo Kinghorn.

  What lies beneath? Mhairi Hastie Smith from Edinburgh was captured exploring the clear water of Devils Punch Bowl on the River Quoich

  Bob Muirhead from Kirkcaldy said: "The dark clouds made the Dolphin at Portsoy look like a pencil sketch."

  Craig Coventry was in the perfect spot to capture this photo of northern gannets on the Bass Rock.

  Sue Wensley took this photo of Loch Leven. She said: "Evening over the loch, evolving reflections as the light and cloud change second-by-second."

  Clemence Lynch snapped this storm of gannets flying high above the lighthouse on the Bass Rock

  Carol Blain sent us this glorious panoramic shot of the Five Sisters of Kintail

  Iain Cruickshank said: "My cat woke me at 04.00, so I thought I would head down to the East Beach at Lossiemouth to photograph the stunning sunrise and early-morning surfers."

  Jack Childs said: "Thought I'd stumbled across paradise in the hills between Loch Moidart and the River Shiel, Lochaber."

  Maud Cow: Kath O'Connor took this photo in Maud, Aberdeenshire. She said: "This curious cow moo-ed when I took its picture! Perhaps telling us to keep on moo-ving."

  Keith Dolan took this photo at Beecraigs Country Park near Linlithgow. He said: This is our border collie Brodie who was watching the squirrels jumping from tree to tree."

  Louisa Johnston said: "After a steep wee climb up Morven, the evening light was stunning on the walk out. Maiden Pap looked like a smoking volcano."

  Rosie Mill from Baldernock took this photo of curious 18-month-old Joni on their first trip to the Kelpies

  Helen Turner happened upon this perfect scene on the Isle of Mull. She said: "We were lucky that the rain and rainbows cleared in time for some amazing coastal views and a BBQ in the evening!"

  Chris Reekie said: "As the sun rises through the morning mist, the green-keeping staff on the Eden Course, St Andrews, make ready for the day's golfers."

  John Lang took this impressive photo of Kilchurn Castle, Loch Awe

  Kenneth Gilmour took this moody shot of the Girdle Ness Lighthouse in Aberdeen. He said: "The misty conditions helped created this moody scene."

  Kayleigh Hamilton said: "Here's a pic of our highland coos from our little farm Glenfia, enjoying the sunsets just outside Ellon."

  Annika Rieley from Glasgow took a photo of friends doing their stretches in Loch Linnhe in Kentallen

  David Clark said: "Stunning sunrise on Nairn Beach, Arthur was enjoying his morning walk."

  David Ellison captured this lovely photo of dogs Truman and Harris. He said: "We left Kingussie in grey mist and came up to glorious early morning sunshine."

  David Hughes said: "Some gulls taking to the wing as the rising sun starts to colour the sky at Aberdeen Beach."

  Gerry Macdonald took this photo of Nick Cave and Warren Ellis at Aberdeen Music Hall. He said: "It is great to see live music again."

  Hao Yang from Falkirk said: "I noticed this cute wee fella so I got out the camera, quickly made a few snaps, and later noticed that in one of them the snail looked as if it was staring right at me!"

  Myles Fitt said: "I took this photo when walking my six-month-old cockapoo Oscar in North Queensferry."

  Kay Anderson said: "Here is a photo of our Airedale, Olive. She loves running around the stubble fields at this time of year and almost took flight this morning!"

