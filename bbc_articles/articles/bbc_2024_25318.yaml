title: King Charles's Australia tour - and why it nearly did not happen - BBC News
date: '2024-10-17'
section: Australia
url: http://www.bbc.co.uk/news/articles/c93y2r75ky7o
content: |-
  Eight months after his cancer diagnosis was revealed, this royal tour is important for Charles - and the monarchy.

  King Charles III and Queen Camilla are due to arrive in Australia on Friday on a historic royal tour. Eight months ago, I didn’t think I’d be writing those words. In February, Buckingham Palace announced the King had cancer and all his “public-facing duties” stopped - on doctors’ orders. Back then, a trip to Australia seemed unthinkable. A flight of around 24 hours, a punishing time difference, and days of royal engagements would surely be too much for a 75-year-old dealing with a cancer diagnosis and embarking on treatment. But palace aides never took this trip completely off the table - whenever it came up, their language was careful. “It’s not been ruled out”, they’d say, or “decisions will be made on the advice of doctors”, and “the King needs to focus on treatment for cancer first”. And by late Spring, there were signs the visit might still go ahead. Some of the King’s team travelled to Australia and Samoa to assess what was possible and finalise arrangements, liaising with the Foreign Office and both the Australian and New Zealand governments. Would the King be well enough to cope with the rigours of the tour? The answer was yes - with some important changes.
  • None King and Queen land in Sydney on tour of Australia

  On medical advice, New Zealand was removed from the schedule. Buckingham Palace said it was a choice made “in collaboration” with the Australian and New Zealand governments, and acknowledged it was a “tough decision”. Royal aides have been open about the King’s diagnosis and treatment but they have never revealed the type of cancer the King has nor offered details of the kind of treatment he’s receiving. “His health is on a positive trajectory,” they tell us. What is clear is the King’s treatment is ongoing and his cancer requires regular medical management. But he is well enough for his doctors to sanction this trip, and while he is away his cancer treatment has been paused. Removing New Zealand and keeping this trip short means he can return to his regular routine of treatment as early as possible.

  Earlier this month, the King hosted a reception to celebrate the UK's Commonwealth diaspora at St James' Palace in London

  The programme of events for the King and Queen also looks a bit different from regular royal tours. When they arrive they will have a day to recover before starting engagements. It’s a long journey - they are both in their 70s and the day off is again a nod to the King’s condition. The timetables in Australia and Samoa do not include evening engagements. There are no state dinners, and no trips out late in the day. But we will see more of the King over the next nine days than we have for most of this year. Buckingham Palace says a lot of thought has gone into “balancing the programme” and it has been planned to “preserve the King’s energies”. This is Charles’ first visit as King to one of the 14 realms where he remains Head of State. It will also be his first Commonwealth Heads of Government Meeting (CHOGM), where he is head of the association of 56 countries. The King’s reign has been compromised by his cancer diagnosis, but this trip gives a real sense of him being back in business.

  King Charles and Queen Camilla will take time to acclimatise after arriving in Sydney

  As well as doctors' orders, the King has also had to operate under the Queen’s orders. His wife has found herself going solo more than she might have anticipated this year, continuing with several engagements she was due to carry out alongside her husband. Queen Camilla is an influential figure within the royal household and has referenced her husband’s “workaholic” mindset at several public engagements – even after his cancer diagnosis. She has been key to ensuring the King follows medical advice and takes time out to recover during his treatment. And she will be doing the same in Australia and Samoa over the course of this visit, as well as taking on some of her own engagements around issues including literacy and supporting victims of domestic violence.

  Royal tours require precision planning. There is a choreography to them and a check list of moments to hit – parliaments, dignitaries, military, environment and culture. On paper, the Australia element of this trip is traditional and safe territory. But it is also significantly different from what has gone before. The King first visited Australia in 1966 as a 17-year-old starting two terms of teaching experience at a private school in Victoria. He returns as a 75-year-old monarch receiving treatment for cancer, towards the end of a year during which he has faced immense personal challenges. His public life has been restrained, restricted by illness. And although his schedule became busier as he progressed with his treatment, he then retreated to the solace of Balmoral for a summer break and to prepare for this trip. “How’s the King doing?” is a question I have been asked repeatedly this year - and it’s been tricky to answer at times. The coming days will allow us to see the King at work day after day. Up close, a head of state, King of Australia. This tour is are big showcase for the monarchy, and monarchies need to be seen – even more so in a country where an Australian republic has been an active topic of political debate in recent times. The optics matter for Buckingham Palace. A King looking well, engaging with the public, managing a full timetable of events, doing some soft diplomacy and embracing what Australia and Samoa have to offer is the goal. Getting here hasn’t been easy. But there is confidence from royal aides that this visit will give a strong sense of normal service resuming.

