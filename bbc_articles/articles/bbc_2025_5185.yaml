title: TikTok investigated by UK watchdog over use of children's data - BBC News
date: '2025-03-03'
section: Technology
url: http://www.bbc.co.uk/news/articles/c62xxz141plo
content: |-
  It will look into how the social media platform uses the data of 13 to 17-year-olds to recommend content.

  TikTok investigated over use of children's data

  The UK data watchdog has launched what it calls a "major investigation" into TikTok's use of children's personal information. The Information Commissioner's Office (ICO) will inspect the way in which the social media platform uses the data of 13 to 17-year-olds to recommend further content to them. John Edwards, the Information Commissioner, said it would look at whether TikTok's data collection practices could lead to children experiencing harms, such as data being leaked or spending "more time than is healthy" on the platform. TikTok told the BBC its recommender systems operated under "strict and comprehensive measures that protect the privacy and safety of teens".

  It added that the platform also has "robust restrictions on the content allowed in teens' feeds". Mr Edwards said TikTok's algorithm "feeds" on personal data gleaned from user profiles, preferences, links clicked and how long they spend watching a particular video - making it subject to UK rules. In addition to the probe into TikTok, the ICO is also checking the age verification processes of Reddit and Imgur, an image-sharing platform. The investigation will look into whether the companies are complying with both the UK's data protection laws, and the children's code. The code is set to design principles for online platforms aimed at protecting children in the UK. Platforms which collect UK children's user data must minimise the amount they gather and take extra care when processing it.

  The ICO's investigations into Reddit and Imgur will focus on how the platforms check the ages of their users and their enforcement of age checks. Ofcom said in October Reddit had overtaken X as the UK's fifth most popular platform. Imgur, meanwhile, says on its website that it reaches more than 250 million people a month. However, it does not state in which countries their users are based, so there is no figure for the number of people using it in the UK. "I don't want to pre-judge how we might look at the Imgur and Reddit matters, but if there are age limits for accessing services, then the platforms have to enforce those in some ways," the Information Commissioner told the BBC. "There are a number of different technologies and techniques that are available, I would say, and the degree of rigor, I think, depends in part upon the kinds of risks, the likelihood that children will be accessing those sites. "I guess a baseline would be: self-declaration is probably not going to cut it if there is content on the site or services on the site that are unsuitable for children under the age of 13." A Reddit spokesperson told the BBC that 95% of their users are adults but that they "have plans to roll out changes this year that address updates to UK regulations around age assurance". Imgur has not responded to the BBC's request for a comment.

  The investigations do not necessarily mean any of the three platforms have broken the law. But companies which are found to have done so can be punished with enforcement notices and fines. "We are patrolling, and there will be consequences for breaches of the law," said Mr Edwards. It is not the first time TikTok has faced scrutiny from the ICO. The platform is appealing against an ICO fine of £12.7m in 2023 for misusing children's data issued in 2023.
