title: 'Matheus Cunha transfer news: Manchester United interested in signing Wolves
  forward - BBC Sport'
date: '2025-04-22'
section: Football
url: http://www.bbc.co.uk/sport/football/articles/cz01p51mz8xo
content: |-
  Manchester United are said to be keen on signing Wolves and Brazil striker Matheus Cunha this summer.

  Manchester United are interested in signing Wolves forward Matheus Cunha this summer. The Brazilian, who has a £62.5m release clause in his Wolves contract, is expected to leave Molineux at the end of the season. Multiple club sources have told BBC Sport the 25-year-old is one of a number of attacking options on United's shortlist, with Ipswich Town striker Liam Delap, 22, also of interest. Improving United's scoring record is a priority for head coach Ruben Amorim. Only Southampton, Leicester City, Ipswich, Everton and West Ham have scored fewer than the 38 goals United have managed in 33 Premier League matches this season.

  Cunha is viewed as an ideal addition to play in one of the two attacking midfield positions in Amorim's preferred 3-4-2-1 formation. Cunha - Wolves' top scorer this season with 16 goals to his name in all competitions - plays in a similar system under current boss Vitor Pereira. United are set to face competition from a number of Premier League clubs for Cunha, with Liverpool, Arsenal, Chelsea and Newcastle all known to be looking to sign a forward this summer. Cunha has scored 32 times in 87 appearances for Wolves but his disciplinary record may be of some concern to suitors. The former Atletico Madrid striker has been sent off twice this season, missing six games in total through suspension. The forward said in an interview with the Observer in March that he has told Wolves he needs to "take the next step" and fight for titles. United's planning for next season is hindered by uncertainty over their financial situation. At a conservative estimate, the club stand to gain around £100m in additional funds if they win this season's Europa League and qualify for the Champions League. But, with each league position worth £3m in the Premier League, United stand to lose around £24m should they finish in their current position of 14th compared to an eighth-placed finish last season. Following Sunday's home defeat by Wolves, Amorim said the club have a "plan" to improve the squad but that the situation could not be addressed until the summer.

  Cunha would seem to be a very good fit for Manchester United. An aggressive attacking player, capable of dropping deeper and linking play or threatening the opponents' goal - and scoring. He is the kind of player Amorim's squad has been crying out for all season, with neither Rasmus Hojlund or, before his season-ending injury, Joshua Zirkzee looking like the answer in the most advanced position. Work is going on behind the scenes at Old Trafford to come up with a summer transfer plan. However, there is a big but. It is quite obvious United's status, in terms of the finances they have to spend, will be shaped by whether they win the Europa League or not. If they beat Athletic Bilbao in the semi-final, then either Tottenham or Bodo/Glimt in the final, United can count themselves fortunate the damage of this appalling campaign has not been too extensive and can create a more rounded squad in the belief results will be far better in 2025-26. If they don't, a decision will have to be made over whether they prioritise a couple of positions, believing all the spare midweek fixture slots will give Amorim a chance to work with his players, or lower their sights and bring in more players with the profile the former Sporting boss wants. It is clear United are desperate for forwards. But they probably need more than one. They also need wing-backs, central midfield players and central defenders. The interest in Cunha is real. It doesn't mean the signing will happen.
