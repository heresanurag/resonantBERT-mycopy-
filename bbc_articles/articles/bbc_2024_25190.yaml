title: Scotland fans pay tribute to Alex Salmond with minute's applause - BBC News
date: '2024-10-16'
section: Scotland Politics
url: http://www.bbc.co.uk/news/articles/cdje0zjk7d9o
content: |-
  Fans were asked to join the tribute to Alex Salmond ahead of the Scotland v Portugal match.

  Both sides joined in with the applause paying tribute to Salmond

  Scotland football fans have paid tribute to the former first minister by holding a minute's applause ahead of the Scotland v Portugal match. Fans were asked to join the tribute as a mark of respect for Alex Salmond, described as a "passionate supporter of the national team who frequently attended matches". The Scotland team and manager, Steve Clarke as well as the Portuguese players joined in with the applause ahead of the Nations League match which finished 0-0. The Alba Party founder, ex-SNP leader and first minister died of a heart attack while attending a conference in North Macedonia on Saturday.

  After tributes were paid to Salmond in the House of Commons on Monday, the Scottish Football Association confirmed a minute's applause would be held before Scotland's match against Portugal at Hampden on Tuesday evening. Alex Salmond was a regular member of the Tartan Army, attending matches including the Euros in Germany this summer. News of his death at the of 69 broke during the Scotland men's team match against Croatia in Zagreb. The SFA sent condolences to Salmond's family, external and said they were "saddened" to hear of his death ahead of the game.

  Fans across the stadium could be seen applauding during the minute

  The process of repatriating Salmond's body is under way with officials in North Macedonia confirming it is ready to be brought home to Scotland. The North Macedonian ministry of foreign affairs said the "technical work" of repatriation had been completed, and that they were "waiting for information regarding the departure time from the Scottish side". Friends of Salmond, including the Conservative MP David Davis, have been lobbying the UK government to allow the RAF to fly his body to Scotland.

  Alex Salmond joined tens of thousands of Scotland supporters in Germany this summer

  But the BBC understands it is unlikely a British military aircraft would be involved in the repatriation. Such arrangements are usually reserved for members of the Royal Family. The UK Foreign Office said it was providing consular support to Salmond’s family and is in contact with local authorities and the Scottish government. The Scottish government has been in regular discussions with the Foreign Office about support for the family and the repatriation.

  The former first minister was in Ohrid, North Macedonia, to attend an Academy for Cultural Diplomacy (ACD) conference when he collapsed during lunch with other delegates on Saturday afternoon. Paramedics were called and attempts were made to revive him using CPR but they failed. Chris McEleny, general secretary of the Alba Party, flew to the city following Salmond's death. He called on the UK government to grant approval for his body to be flown directly back to Scotland as it would be far quicker than using a commercial flight. He told BBC Scotland's Drivetime programme: "For his family’s sake, friends, we should get him home as quickly as possible. "And for all that he’s done for Scotland, I think it’s the least that we can do for him."
