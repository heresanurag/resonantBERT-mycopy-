title: Blazing wildfires force evacuations in California - BBC News
date: '2024-07-03'
section: General
url: http://www.bbc.co.uk/news/videos/cllyzngqp0go
content: |-
  Low humidity, gusty winds, and a dangerous heatwave are exacerbating fire risks in the northern part of the state.

  Authorities in northern California have ordered thousands of people to evacuate because of the Thompson and Toll fires, which have burned more than 3,000 acres.

  The Thompson fire, which began Tuesday morning, is under investigation and has damaged several structures, although no fatalities have been reported.

  Low humidity, gusty winds, and a dangerous heatwave with high temperatures are exacerbating fire risks.
