title: Kilauea volcano lava creeps closer to Hawaii homes - BBC News
date: '2018-06-24'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-44592537
content: |-
  An eruption from Kilauea volcano continues to threaten homes.

  Kīlauea volcano is the most active volcano on Hawaii's Big Island.

  More homes have been threatened by the flowing lava.
