url: http://www.bbc.co.uk/news/articles/c8x89vqxwdro
content: |-
  Residents are visitors are being warned to stay away from the affected area after the landslip on Saturday.

  Part of the cliffs at Atherfield Point on the south-west coast of the Isle of Wight have collapsed

  Warning signs have been put up and path closures are in place following a coastal landslip on the Isle of Wight. Part of the cliffs at Atherfield Point on the south-west coast of the island collapsed on Saturday. Isle of Wight Council said "due to recent ground movement" its Rights of Way team put the closures in place "to ensure public safety while the area is assessed". Resident Glenn Martin told the BBC a "considerable chunk" of about 100m (328ft) by 25m (82ft) collapsed following heavy rain on Friday night.

  Isle of Wight Council warned islanders and visitors to stay away from cliff edges

  He first noticed a "really big, long crack where the grass had pulled away and the ground had dropped about six inches" while walking his dogs in the area on Thursday. He said: "The council have now closed the entire coastal path all along there, about four miles, because it's quite unstable. "It's scary. I've been going to that beach for 38 years. The rate of erosion has stepped up, especially over the last five years."

  Glenn Martin noticed cracks appearing on Thursday while walking his dogs in the area

  The council said the closures were put in place to ensure public safety

  Following the landslip, the council warned islanders and visitors to stay away from cliff edges and coastal paths in the area, and not to walk directly under the cliffs. The south coast of the island has experienced several recent major landslips. In 2024, a council director warned that the Military Road, which runs near Atherfield Point, could fall into the sea within two years.

