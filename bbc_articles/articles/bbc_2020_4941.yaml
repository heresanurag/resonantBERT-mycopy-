id: bbc_2020_4941
title: Police officer attacked during West Hendon chase - BBC News
date: '2020-05-07'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-52568273
content: |-
  A man is held on suspicion of attempted murder after an officer is seriously assaulted, police say.

  Police officers had been following a vehicle along Dartmouth Road, West Hendon

  A Met Police officer was attacked while pursuing a suspect in north-west London.

  Police had been pursuing a vehicle in Dartmouth Road, West Hendon, shortly after 19:00 BST when one occupant got out.

  Scotland Yard confirmed one officer, who found the suspect in an alleyway, was seriously assaulted during a "struggle".

  The suspect fled but was later arrested on suspicion of attempted murder.

  A force spokesperson said the officer, whose injuries are not thought to be life-threatening, had not been stabbed.

