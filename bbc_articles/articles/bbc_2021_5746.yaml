title: 'Prince Harry: I want to break cycle of pain for my children - BBC News'
date: '2021-05-14'
section: UK
url: http://www.bbc.co.uk/news/uk-57110267
content: |-
  The Duke of Sussex compares his life to a mixture of the film the Truman Show and being in a zoo.

