title: Jess Phillips admits 'mistake' over unrest tweet - BBC News
date: '2024-08-14'
section: Politics
url: http://www.bbc.co.uk/news/articles/c70jw7xjggzo
content: |-
  The minister has been criticised for her response to a video of masked men confronting a reporter.

  Home Office minister Jess Phillips says she made a "mistake" in her response to a video showing masked men confronting a reporter last week. The footage showed a Sky News broadcast in her Birmingham Yardley constituency cut short after men in masks surrounded a journalist. Responding to the clip on social media at the time, Ms Phillips said the gathering had been due to "misinformation" spread in the area. Her comments have been criticised by political opponents, including Tory leadership candidates Tom Tugendhat and James Cleverly. Speaking to reporters on Wednesday, Ms Phillips admitted she "would choose my words more carefully" in the future.

  But she added that she was "trying to get across that this gathering of people had been manufactured by misinformation". A clip of the broadcast, shared by Reform UK deputy leader Richard Tice, showed a group of men gathering in the Bordesley Green area of Birmingham last week. Police said "a large number of people" gathered in the area on Monday amid reports of a far-right march that did not take place. According to some social media posts, that crowd of mainly young Asian men was nearly 300 in number.
