  The clip shared by Mr Tice showed a man on a motorbike driving up to the Sky reporter, before swearing about the English Defence League (EDL) and shouting "Free Palestine". Other masked men then surrounded the reporter before making gestures to the camera, prompting Sky to bring the broadcast to an end. Sharing the video on X, Mr Tice said: "[Keir] Starmer and Labour no doubt think these pro-Gaza masked folk are far-right too? "All violence, rioting and assault is totally unacceptable. Two tier policing must stop." In response, Ms Phillips replied: "These people came to this location because it has been spread that racists were coming to attack them. "This misinformation was spread entirely to create this content. Don't spread it Mr Tice!"

  Asked whether she regretted her response to the video on Wednesday, Ms Phillips told reporters: "I think I almost certainly could have phrased it better." She added that "intelligence being spread amongst the community" that "people were coming to harm them" had caused "upset and fear". "Anybody, regardless of who they are, whichever flag they wish to wave, anyone being a thug on our streets should not be tolerated. “Of course I would choose my words more carefully. I’m more than happy to say that when I make a mistake, absolutely”. Ms Phillips's comments have been criticised by shadow home secretary and Tory leadership hopeful James Cleverly. He wrote on X: "Home Office ministers should not be making excuses for masked men shouting, abusing, and intimidating members of the media. "Ministers are not commentators or casual observers, they are decision makers and need to think about the consequences of their words and actions." On Tuesday shadow security minister Tom Tugendhat said Ms Phillips had chosen to "justify" the men's behaviour "instead of condemning it," adding that Sir Keir Starmer should have sacked her for the comments. Ms Phillips, who has represented Birmingham Yardley since 2015, has one of the biggest followings on X among Labour MPs. She resigned as a shadow minister to call for a ceasefire in Gaza during a vote in Parliament last November. But she returned to the Labour frontbench after the party's landslide election victory last month, when she was appointed Safeguarding and Violence Against Women and Girls Minister at the Home Office.
