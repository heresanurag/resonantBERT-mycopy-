  Actress Jenna Coleman returned as Doctor Who companion Clara Oswald in the Christmas programme alongside David Bradley.

  Bradley playing the first Doctor, originally played by the late William Hartnell, while Pearl Mackie returned as companion Bill Potts.

  It was the last episode for Potts and the show also marked an end for the programme's writer Steven Moffat, who has stepped down after seven years.

  He has been replaced by Broadchurch creator Chris Chibnall.

  Fans reacted to Whittaker's introduction and Capaldi's departure on Twitter, with some praising the Doctor's gender.

