  Elsewhere, Whittaker's predecessor in the role had a few words of comfort for one young fan who was sad to see his favourite Doctor depart this week.

  Nine-year-old David McGilloway, from Londonderry, found a letter from Capaldi in his Christmas stocking, which read: "The new Doctor always becomes your favourite and the one that goes... well, he never really goes..."

  After all, the Doctor is for life - not just for Christmas.

