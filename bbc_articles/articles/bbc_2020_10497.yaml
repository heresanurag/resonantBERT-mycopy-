id: bbc_2020_10497
title: 'Spot the difference: John Boyega gets ad change apology - BBC News'
date: '2020-09-15'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-54156036
content: |-
  Jo Malone London reshot a John Boyega advert he made for them with a Chinese actor for the Chinese market.

  British perfume brand Jo Malone London has issued an apology to John Boyega for dropping an ad he made for them and replacing him with a Chinese actor.

  The firm reshot the personal video the Star Wars actor made, in his home town of London, for the Chinese market.
