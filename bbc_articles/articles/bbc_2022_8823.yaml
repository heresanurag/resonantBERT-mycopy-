  Problems at Dover started "well before a minor technical incident in the Channel Tunnel", Eurotunnel's John Keefe tells the BBC.

  After six hours we're giving up for the day

  We've just abandoned our attempt to get to France after getting stuck eight miles from Dover after six hours of travelling. We set off from our Bromley home at 06:00 for a 09:30 crossing, hitting queues on the outskirts of Folkestone at 07:30. After very slow progress we decided to throw in the towel at midday after travelling only 300 yards in three hours with an increasingly hysterical two year old. At one stage my six year old and I were so desperate we went into a lovely woman's house to use her toilet. With news of accidents on the main roads and hours more queuing ahead, we've decided to stay in Folkestone and try again first thing tomorrow. If it were just my husband and I we could have sat it out but it's just too hard with small kids. Hopefully our holiday will improve from here.
