content: |-
  Dramatic video shows an avalanche burying a group of snowmobilers on the same day another slide kills four.

  Dramatic video captures an avalanche as it buries a group of snowmobilers in eastern Utah.

  On the same day, another slide in Millcreek Canyon killed four skiers while four survivors had to be airlifted to safety.
