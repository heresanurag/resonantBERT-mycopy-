id: bbc_2017_458
title: The NHS is making people sick, GP tells BBC - BBC News
date: '2017-01-14'
section: General
url: http://www.bbc.co.uk/news/health-38622003
content: |-
  Doctors tell of their "guilt" and "distress" over the care they can provide amid pressures on the NHS.

  Doctors have told BBC Newsnight that the NHS "is making people sick".

  It comes after the prime minister said she wanted to help reduce pressures on hospitals by extending GP surgeries' hours.
