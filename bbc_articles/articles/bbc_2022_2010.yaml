title: 'Storm Eunice: Somerset church spire brought down by winds - BBC News'
date: '2022-02-18'
section: General
url: http://www.bbc.co.uk/news/uk-england-somerset-60434329
content: |-
  The spire, at St Thomas's Church in Wells, Somerset, fell as the storm reached its peak.

  St Thomas's Church spire, in Wells, Somerset, fell on Friday morning as people watched from neighbouring houses.

  The Grade II-listed church, on St Thomas Street, was built in the 1850s.

  Storm Eunice, which has generated extremely high winds, has caused travel disruption across the south of England and led to two rare red weather warnings.
