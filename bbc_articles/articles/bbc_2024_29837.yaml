  On defence, Badenoch echoed calls from Trump that European countries should increase their defence spending and urged the prime minister to match her party's commitment to raise defence spending to 2.5% of GDP by 2030. Sir Keir reiterated his government's commitment to the 2.5% target - although it has not set a deadline for meeting the goal. He added that, unlike the previous Labour government, the Conservatives had failed to meet the target while in office. He also attacked the Conservatives for leaving a £17bn black hole in the Ministry of Defence's finances.

  Labour accused Badenoch of misleading Parliament when she incorrectly told MPs that the “chancellor's Budget did not even mention defence”. Badenoch's spokesman insisted she had not got it wrong because it was "obvious" from the context of what she had said in her previous question that “she was referring to the fact that there was no reference to how Labour intend to get to that 2.5%”. In her Budget speech last week, the chancellor said “we will set a path to spending 2.5% of GDP on defence at a future fiscal event.”

  Scottish First Minister John Swinney said Scotland and the US "share many social, cultural and economic links". "In that relationship, we will stand fast in support of our values of fairness, democracy and equality – ideals that America was built upon." Badenoch said: "The world faces many serious challenges and I look forward to our two countries working together to confront them." Nigel Farage, Reform UK leader and a friend of Trump, said the president-elect was a "genuine friend of the United Kingdom" and urged the prime minister to "roll out the red carpet" for him. "This is a huge opportunity to be grasped."

  Other UK party leaders have been more critical. Lib Dem leader Sir Ed Davey called the election result, external "a dark, dark day for people around the globe". "The world’s largest economy and most powerful military will be led by a dangerous, destructive demagogue. "Fixing the UK’s broken relationship with the EU is even more urgent than before - we must strengthen trade and defence cooperation across Europe to help protect ourselves from the damage Trump will do." "On this dark day, we stand in solidarity with all US citizens who fear a convicted criminal and a fascist in the White House." And Labour London Mayor Sadiq Khan, who has repeatedly clashed with Trump, said many Londoners would feel "anxious" and "fearful" about what the outcome of the election would mean for democracy, women's rights, the Middle East, Ukraine or tackling the climate crisis.

