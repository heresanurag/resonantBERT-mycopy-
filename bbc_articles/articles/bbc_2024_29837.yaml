title: Keir Starmer congratulates Donald Trump in first call after US election - BBC
  News
date: '2024-11-07'
section: Politics
url: http://www.bbc.co.uk/news/articles/cz0m9d2dng1o
content: |-
  The PM and president-elect agreed UK-US relations will "continue to thrive", No 10 says.

  Sir Keir Starmer and Donald Trump have agreed the relationship between the UK and US is "incredibly strong" and will "continue to thrive", Downing Street has said. In the first phone call between the pair after the US election, the PM offered his "hearty congratulations" to Trump after his "historic victory" and said he looked forward to working closely with the President-elect, a No 10 spokeswoman said. It comes after Kemi Badenoch urged Sir Keir to apologise for "derogatory" comments made about Trump by David Lammy before he was foreign secretary. In her first appearance in Parliament as Conservative leader, she pressed Sir Keir on how Trump's election would affect UK policies on trade and defence.

  Badenoch asked the prime minister if he would push for Trump to get an invitation to address Parliament, but did not receive a direct reply. In their phone call, Downing Street said the pair also discussed the situation in the Middle East and the PM "underscored the importance of regional stability". "The leaders fondly recalled their meeting in September, and President-elect Trump’s close connections and affinity to the United Kingdom and looked forward to working with one another," a spokeswoman added. Sir Keir and his foreign secretary held a dinner with Trump in New York in September, when the pair met for the first time.

  In opposition, Lammy labelled Trump a "neo-Nazi sympathising sociopath" but since getting into government has sought to build bridges with the president-elect and his team. Earlier, the PM's spokeswoman was pressed on whether Lammy would keep his job for the entire Parliament in light of his past comments, and replied: "Yes, he is the foreign secretary."

  During Prime Minister's Questions, Badenoch said the US was the UK's single biggest trade partner and warned the prime minister he would need to "look after the special relationship". She said there was now a "risk of increased tariffs on UK exports" and asked if he would revisit talks on establishing a free trade agreement with the US. Since leaving the European Union, UK ministers have been keen to reach a trade deal with the US - however, there has been little progress. During his election campaign, Trump pledged to dramatically increase tariffs on foreign exports. Replying to Badenoch, Sir Keir said: "Of course we will discuss issues of our economy with the president-elect, as we already have done." Later, Chancellor Rachel Reeves told MPs on the cross-party Treasury Select Committee the UK's trading relationship with the US was "crucial", but she was "confident those trade flows will continue under President Trump". She added: "[He's] been President before, we continue to have a good and strong economic relationship... I’m optimistic about our ability to shape the global economic agenda."

