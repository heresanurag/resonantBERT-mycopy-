title: Gifts for babies spending Christmas in hospital - BBC News
date: '2017-12-20'
section: General
url: http://www.bbc.co.uk/news/uk-england-shropshire-42417827
content: |-
  A couple whose son spent his first Christmas in hospital are giving presents to premature babies.

  The parents of a premature baby who spent last Christmas in hospital are trying to spread some festive cheer with gifts for mums and dads in the same situation this year.

  When Arlo Watson, from Broseley in Shropshire, was born at 25 weeks doctors said he had a 50% chance of surviving until his first birthday, but he is now out of hospital and will be spending this Christmas at home.
