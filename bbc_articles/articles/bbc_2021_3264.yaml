id: bbc_2021_3264
title: 'Sexual assault: ''One in 40'' young women experience it each year - BBC News'
date: '2021-03-18'
section: UK
url: http://www.bbc.co.uk/news/uk-56444275
content: |-
  The number of offences police record is "well below" the estimated number of victims, the ONS says.

  The killing of Sarah Everard has prompted a public debate on women's safety

  One in 40 women aged between 16 and 24 in England and Wales experience rape or assault by penetration, including attempts, each year, Office for National Statistics estimates suggest.

  Overall, 0.1% of men and 0.8% of women aged over 16 said they were victims of these crimes in the year to March 2020.

  Some 773,000 adults aged 16 to 74 said they were victims of any type of sexual assault during the same period.

  The survey captures crimes that were not reported to or recorded by police.

  It comes amid a wider discussion of women's safety following the killing of Sarah Everard.

  This week hundreds of people joined a vigil in memory of the 33-year-old, who disappeared on her way home in south London on 3 March.

  Flowers and messages have been placed at a memorial to Sarah Everard in south London

  The ONS figures also found that, of people who had ever experienced rape or penetration (including attempts),

  There were almost four times as many female victims of sexual assault as men, at 618,000, compared to 155,000.

  Police in England and Wales recorded a total of 162,936 sexual offences in the year ending March 2020, a drop of 0.7% compared to the previous year, the ONS said.

  Helen Ross, from the ONS Centre for Crime and Justice, said: "The drop was driven by reductions in indecent exposure or unwanted sexual touching, however there was no change in the prevalence of rape or assault by penetration.

  "In the same period, the number of sexual offences recorded by the police has fallen slightly, after nearly tripling in recent years.

  "The number of offences recorded by the police remains well below the number of victims estimated by the survey, with fewer than one in six victims of rape or assault by penetration reporting the crime to the police."

  Sarah Everard had been walking to her home in Brixton when she disappeared

  Ms Everard went missing while walking home from a friend's house. Her body was later found in woodland in Kent.

  Prime Minister Boris Johnson has said women must feel "properly heard" in the wake of her killing, while Labour leader Sir Keir Starmer has described it as a "turning point" for how violence against women and girls is dealt with.

  Met police officer Wayne Couzens, who is accused of her kidnap and murder, is due to go on trial in the autumn.
