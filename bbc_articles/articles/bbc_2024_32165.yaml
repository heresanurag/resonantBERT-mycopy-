title: British band Sports Team robbed at gunpoint on US tour - BBC News
date: '2024-12-03'
section: Culture
url: http://www.bbc.co.uk/news/articles/cy09gkr08lpo
content: |-
  The band had just arrived in California when their tour van was looted by an unidentified gunman.

  British band Sports Team robbed at gunpoint on US tour

  Sports Team's energetic riffs and dry humour have seen them championed by stations like BBC 6 Music

  The British band Sports Team have been robbed at gunpoint on the first day of their US tour. The indie group, who have scored two top 10 albums in the UK, lost their passports, stage equipment and personal belongings in the incident, as a thief looted their tour van in the city of Vallejo, in the Bay area of California. In footage shared with the BBC, external, the thief can be seen brandishing a gun at the group's tour manager as she approached the van. "Obviously, if someone pulls a gun, you run for cover," said singer Alex Rice. "But the thing that struck me about it was the resignation. The people around us weren't very panicked at all. It seemed like a very everyday occurrence."

  The incident happened around 4:45pm UK time (8:45am in California), as the group set off for the opening date of their tour, in nearby Sacramento. They had stopped at a Starbucks for breakfast when a passerby alerted them to the robbery in progress. "Somebody opened the door and was like, does anybody have a white Sprinter van? Because you're being robbed right now," drummer Al Greenwood told the BBC. "So we all ran out, shouting. Lauren, our tour manager, was slightly ahead of me, and somebody else ran past us in the opposite direction, and said, 'Careful, he's holding something.'" "I really thought I was about to watch someone get shot, because it took a while for our tour manager to realise," she added. "In the video, you can hear me screaming at her to get down."

  In a video of the incident, members of the band's touring crew can be seen running away from the van (in the background of the image), which has its passenger window smashed, and the door hanging open.

  The footage was filmed by another band member from inside Starbucks. In it, you can hear staff calmly advising the group to get off the street. "Guys, get inside. Please stay inside," says a female voice, as the bandmates duck back inside the entrance. "It was very discombobulating because they just carried on with their shift," said Greenwood. When they contacted the police, the band say they were advised to "fill out an online form" about the robbery, and that no officers were sent to investigate. The BBC has contacted the local police department for comment.

  According to the group, the thief smashed the passenger window of their tour van, as they took cover inside. He mainly targeted electronics, including film cameras and laptops they use on stage. They also lost all of their passports and documents, as well as suitcases containing their clothes, "so we're going to wearing the same things for the next two weeks". Greenwood also lost her journal in the incident. "I know it sounds ridiculous," she said, "but that's almost the worst part".

  Sports Team were formed in Cambridge and are based in London

  Luckily, the group's instruments were housed in a separate, locked compartment at the back of the van. The band, who are promoting their forthcoming third album, Boys These Days, remain hopeful they can play the opening show of their tour on Tuesday night. 'We're definitely not going to let this put us off," said Greenwood. "And ultimately, it really makes you reflect on things to be grateful for, both here and at home." The tour will even return to the Bay Area on Saturday night. "We're gonna keep playing," said Rice. "We've got nothing against the Bay Area. We think it's great here - but it's sad that it's kind of got to this sort of place with gun violence."
