content: |-
  Nicola Sturgeon faces questions about the government's mishandling of harassment complaints against Alex Salmond.

  Scottish Liberal Democrats leader Willie Rennie says there are still "areas of outstanding concern" to emerge from Nicola Sturgeon's evidence yesterday, but these are matters for the committee and the independent investigator.

  He says it should not take the threat of a vote of no-confidence before the government complies with the will of the parliament, and says "a belligerent and secretive 14-year-old government" was "more interested in defending itself than aiding the process of democracy".

  He asks the first minister why she can't see that situation needs to change?

  Nicola Sturgeon says they will have to agree to disagree on that.

  She says the deputy first minister, John Swinney, had a discussion with the committee which led to the committee having access to summaries of the legal advice.

  It is a "really important principle" that governments should be able to take proper legal advice and for that advice to remain confidential, the FM adds.

  "There are many lessons to be learned here, I do not dispute that, but they have to be learned in the round," Ms Sturgeon says.
