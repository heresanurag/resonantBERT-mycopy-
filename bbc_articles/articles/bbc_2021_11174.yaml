  Demand for NFTs has recently boomed, with some selling for millions of dollars in high-profile auctions.

  In March, a collection of NFTs by artist Beeple was sold at auction house Christie's for $69m ($50m).

  The same month, Twitter founder Jack Dorsey sold an NFT of his first-ever tweet for more than $2.9m.

  Critics say the digital tokens have a huge environmental impact. Others have suggested their current popularity is an investment bubble.
