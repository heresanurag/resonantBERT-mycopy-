id: bbc_2022_6046
title: Russians caught on CCTV killing unarmed grandfather - BBC News
date: '2022-05-14'
section: General
url: http://www.bbc.co.uk/news/world-61429812
content: |-
  The BBC has obtained CCTV footage of the killing of two civilians in cold blood by Russian soldiers that is now being investigated by prosecutors as a suspected war crime.

  The BBC's Eastern Europe Correspondent Sarah Rainsford has studied the video and spoken to those who tried to rescue one of the victims before he died.

  This video has been optimised for mobile viewing on the BBC News app. The BBC News app is available from the Apple App Store for iPhone and Google Play Store for Android.
