title: 'Stalybridge and Dove Stone fire: Moorland reignites - BBC News'
date: '2018-06-27'
section: General
url: http://www.bbc.co.uk/news/uk-england-manchester-44612761
content: |-
  Firefighters tackle the moorland blaze after first being alerted to it on Sunday evening.

  A huge moorland wildfire in Greater Manchester that fire crews first extinguished on Sunday has reignited.

  The blaze, on land near to Buckton Vale, was initially brought under control in a couple of hours.

  Now, however, the fire is spreading once again – leading to some people being evacuated from their homes.
