title: 'Romford: Family of woman killed by firework arson ''massively affected'' -
  BBC News'
date: '2024-11-01'
section: London
url: http://www.bbc.co.uk/news/articles/c86q38pqp5po
content: |-
  The son of a woman killed when a firework was put in her letterbox calls for tighter regulation.

  'Sometimes I can't cope with Mum's firework death'

  Josephine Smith was killed when two teenagers put a lit firework through her letterbox

  "People are going to get terrorised tonight - what are the good ones to let off at people?" This is what teenager Kai Cooper asked the man running a fireworks shop on the night of 28 October 2021. Later, the 18-year-old, from Leatherhead, Surrey, and Callum Dunne, 15, from Southend, Essex, stuffed a lit firework through the letterbox of 88-year-old Josephine Smith's home, starting a fire that killed her. The shopkeeper would later plead guilty to selling fireworks to Dunne, an underage boy.

  The pair, who were detained last year for Mrs Smith's manslaughter, had thrown fireworks at passing cars and into shop doorways before they targeted her house in Romford, east London. "The experience of being there that night, and seeing Mum coming out that building, was just horrible," Mrs Smith's son Alan told BBC London. "I don't want it happening to anybody else - losing Mum that way and to see the way [fireworks] are sold so indiscriminately and irresponsibly. "The anniversary was really difficult. Sometimes I just flip and can't cope, it's the same for the rest of my family. We've all been massively affected by it." He said his mother had been a lovely woman, who was always "immaculately turned out". "She was a massive part of the community and a massive part of our family. She was amazing, she is greatly missed," he said.

  CCTV recorded Kai Cooper asking what were the "good ones to let off at people"

  Mr Smith is campaigning for tighter rules on the sale and use of fireworks, including checking the ID of anyone who looks under 25, and banning cheaper, smaller firework purchases. He said: "I'm not trying to ruin people's fun. They are tiny changes we need. Mum is never going to come back, but something in her name, some sort of change.

  "I would like to see fireworks banned from the high street. I don't think you should be able to buy a pint of milk or something from the newsagents, as well as fireworks. "You shouldn't be able to buy explosives that kill people, on the high street.” Currently it is illegal in England to set off fireworks between 23:00 and 07:00, except on Bonfire Night, New Year's Eve, Diwali and Chinese New Year. It is also illegal for anyone under 18 to buy fireworks or handle them in a public place.

  Josephine Smith was a "massive part of the community"

  It comes as London Fire Brigade issued a warning about the dangers of misusing fireworks in the lead-up to Bonfire Night, following a spate of firework-related incidents across the capital over the past month. In 2023, more than 2,000 emergency calls were made on Diwali, Halloween and Bonfire Night, a 13% increase on the previous year. Bonfire Night alone saw a 14% spike in calls, making it the busiest for the brigade since 2016. Diwali also saw the highest number of 999 calls in 14 years.

  Alan Smith hopes a change in the law around firework sales will prevent future deaths

  London Fire Brigade's assistant commissioner for prevention and protection, Craig Carter, said: “Our advice has always been that it’s safer to attend professional displays rather than using fireworks at home. It’s also cheaper and usually easy to get to, as there are plenty of displays taking place across the capital. “If you do choose to host your own display, it’s important to ensure you are buying safe fireworks. Only buy fireworks from a reputable, licensed seller and make sure they have a CE safety mark. Secure them properly in the ground, and keep them far away from buildings, trees, animals, and people. “Always follow the Fireworks Code and remember there are strict laws around when you can purchase and use fireworks. Never set them off if you’ve been drinking alcohol and once a firework is lit, never go back it."

  A Department for Business and Trade spokesperson said: “This tragic death could have been avoided and our thoughts are with Josephine’s loved ones. “We endeavour to keep the public safe and have launched a new fireworks safety campaign to help people use them safely and appropriately, and to ensure they are bought from licensed or registered retailers.”
