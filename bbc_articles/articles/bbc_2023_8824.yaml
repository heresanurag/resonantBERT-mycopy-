id: bbc_2023_8824
title: '''Chaos'' outside hospital after India train crash - BBC News'
date: '2023-06-04'
section: General
url: http://www.bbc.co.uk/news/world-asia-india-65799373
content: |-
  A collision between three trains in Odisha state left at least 288 people dead and over 800 injured.

  At least 288 people were killed and more than 800 injured after three trains collided in Odisha state on Friday.

  The sounds of ambulance sirens have been going off every 30 minutes outside a major hospital in India, where critically injured passengers have been taken.

  Reporting from outside the SCB hospital in the city of Cuttack, BBC correspondent Archana Shukla described the scenes of "despair, distress and chaos".
