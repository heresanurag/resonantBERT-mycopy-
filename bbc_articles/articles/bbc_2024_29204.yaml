title: 'Watch: CCTV shows bus crash into Wisbech ditch - BBC News'
date: '2024-11-26'
section: General
url: http://www.bbc.co.uk/news/videos/cy87ped85jzo
content: |-
  Six children are rescued unhurt and a driver is taken to hospital as a precaution after the crash.

  The moment a double-decker bus carrying school children careered off a main road and into a ditch has been captured on CCTV.

  It happened on Leverington Common, near Wisbech, Cambridgeshire, at about 17:15 GMT on Thursday.

  The six children were evacuated from the vehicle and were not thought to be injured, police said. The driver of the bus was taken to hospital as a precaution, they added.

  Emergency services remained at the scene to carry out investigations and recover the vehicle.
