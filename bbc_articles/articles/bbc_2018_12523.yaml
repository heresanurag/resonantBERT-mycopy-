content: |-
  Newcastle University is doing Freshers' Week differently this year.

  Fewer young people are choosing to drink but what does that mean for Freshers' Week?

  Today found out how this year, Newcastle University sold £70 wristbands giving freshers access to 80 different activities as an alternative way to spend their first week.
