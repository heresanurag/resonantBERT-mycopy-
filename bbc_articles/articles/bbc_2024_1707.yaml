title: Welsh Labour ballot opens to choose next first minister - BBC News
date: '2024-02-16'
section: Wales politics
url: http://www.bbc.co.uk/news/uk-wales-politics-68306647
content: |-
  The new Welsh Labour leader will govern three million people, but be elected by thousands.

  Vaughan Gething and Jeremy Miles are the only two candidates for the Labour leadership contest

  The ballot opens on Friday in the contest to lead Welsh Labour and become Wales' next first minister.

  Vaughan Gething and Jeremy Miles are the only two candidates in the race to succeed Mark Drakeford, and they took part in an online hustings on Thursday night, the eve of voting starting.

  The ballot of Labour members and members of affiliated organisations will close on 14 March.

  The new leader of his party and of Wales will be announced on 16 March.

  Thursday night's event was hosted by Welsh Labour with written and video recorded questions from party members.

  Mr Miles said as leader he would make Welsh Labour the "natural political home" for people across the country.

  Mr Gething said that being "tested in the fiercest heat" of the Covid pandemic and Tata steel crisis showed that he would be the best leader.

  Both said they were ready to lead a Welsh Labour campaign in the next UK general election.

  Mr Miles said: "Our members need a leader who can make a powerful case that the natural political home of people in all communities right across Wales is Welsh Labour".

  "I believe that I am that leader and I believe our political opponents believe that too. Let's be clear, Plaid Cymru and Tories do not want me to win this election".

  Mr Gething said: "You are choosing a leader to take Wales through a high stakes moment".

  "From the global pandemic to the crisis facing our steel industry, I've shown that I can meet those demands", adding: "I've been tested in the fiercest heat, I've proven that my values are strong".

  Those entitled to vote receive a letter which will give them a choice to vote either online or by post.

  The candidate with the most votes will win, with everyone's votes counting equally.

  That has not always been the case in Labour leadership elections - before Mr Drakeford's election in 2018 an electoral college was used, giving MPs and Members of the Senedd and affiliated groups a bigger say.

  More than 100,000 people will be given a vote, but the number taking part is likely to be much smaller than that.

  The party does not give updates on how many people are members of Welsh Labour, but sources put it at about 16,000 and there are thought to be about 100,000 people with an affiliate vote.

  They could be members of the big unions like Unite, Unison and GMB, or smaller bodies such as the Musicians Union.

