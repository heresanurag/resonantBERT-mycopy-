title: TikTok star and Wales' oldest woman dies at 110 - BBC News
date: '2021-09-13'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-58549830
content: |-
  Amy Winifred Hawkins became a TikTok hit when a video of her singing was seen over 150,000 times.

  Amy Winifred (right) with her sister Lilian, who is 102

  Wales' oldest woman, who became a social media star earlier this year, has died at the age of 110.

  A clip of Amy Winifred Hawkins, from Monmouth, singing It's A Long Way to Tipperary reached more than 150,000 views on TikTok in January.

  The footage showed her singing the wartime hit surrounded by her family as she celebrated her 110th birthday.

  Her daughter, Rosemary Morris, 73, said she was a "lovely lady who dedicated her life to me as her daughter".

