  Labour manifesto: What they plan to do in government

  Labour has won a big majority in the general election. That means it should be able to pass the new laws it wants easily. But what are those likely to be? During the election campaign, Labour released a manifesto - a list of pledges explaining to voters what it would do if elected. Use our interactive guide below to find out what the party said it would do on key issues that interest you - whether that's the economy, the environment or immigration.

  Because of devolution, the UK parliament has limited powers over some of the issues highlighted in the guide. For example, health policy is devolved to Northern Ireland, Scotland and Wales. If you want to find out what was promised by other parties around the UK during the election campaign, you can find out in our full manifesto guide.
