title: 'Kenneth Cope: Randall and Hopkirk and Coronation Street star dies - BBC News'
date: '2024-09-13'
section: Culture
url: http://www.bbc.co.uk/news/articles/c1d7drw4yw2o
content: |-
  The actor also appeared in Brookside, The Bill, Coronation Street and That Was The Week That Was.

  Cope, pictured in 2014, appeared in Brookside, Doctors, Coronation Street and The Bill

  British actor and writer Kenneth Cope, best known for appearing in the detective TV series Randall and Hopkirk (Deceased), has died aged 93. A statement from his agent said Cope "passed away peacefully in his sleep" on Wednesday, with his wife and family by his side. In Randall and Hopkirk, Cope played Marty Hopkirk, a man who is murdered but returns as a ghost. The show, first broadcast in 1969 and 1970, developed a cult following and was remade in 2000 by Vic Reeves and Bob Mortimer.

  L-R: Randall and Hopkirk stars Mike Pratt, Annette Andre, and Kenneth Cope in 1969

  Cope also appeared in Coronation Street, as Jed Stone, and was part of the Carry On Team. The statement released by his agent described Cope as a "natural comedy actor". "A proud native Liverpudlian," the statement continued, Cope was "a loyal supporter of Everton Football Club". "We are deeply saddened by his passing and ask that his family are given privacy at this time. He is survived by his loving wife Renny Lister and his children Nick, Mark and Martha." Cope began his acting career in theatre before securing several roles in film and television. His other credits included Brookside, That Was The Week That Was, Doctors, The Bill, Truckers and Last of the Summer Wine. As character Jed Stone, Cope appeared in more than 100 episodes of Coronation Street in the 1960s, and briefly returned in 2008 and 2009. A spokesman for the ITV series said: "Kenneth's portrayal of Jed Stone, also known as Sonny Jim, on Coronation Street between 1961 and 1966 made him a firm favourite with the soap's fans. "He was a talented actor and writer and we were delighted when he agreed to reprise the role 42 years later in 2008. "We are sorry to hear of his passing and our thoughts are with his family and friends." Cope also portrayed Ray Hilton in Brookside for 171 episodes between 1999 and 2002. Michael Starke, who played Sinbad in Brookside and worked alongside Cope in the soap in the late 1990s, described him as a “proper gentleman”. He said: “We had a few scenes together, and I remember he was a sweet man. He never had a cross word for anyone and was always really generous. I liked him a lot.” Cope also had leading roles in Carry On at Your Convenience (1971) and Carry On Matron (1972).
