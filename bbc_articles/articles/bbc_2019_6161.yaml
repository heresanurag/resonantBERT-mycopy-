id: bbc_2019_6161
title: 'Islington stabbing: Two teens in hospital after ''linked'' attacks - BBC News'
date: '2019-05-06'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-48181654
content: |-
  The teens were attacked within 10 minutes of one another in Islington, north London.

  Two teenagers are recovering after being stabbed in north London in attacks which are being linked by the Met police.

  Officers found a 17-year-old boy injured in Fairbridge Road in Upper Holloway, Islington, at about 17:35 BST on Monday.

  He remains in a serious but stable condition.

  Ten minutes later a man believed to be 18 years old was found stabbed less than half a mile away in Sussex Close.

  His condition is said to be no longer life-threatening.

  No arrests have been made. Police said there would be an increased number of officers in the area.

  A Section 60 order - which gives officers the right to stop and search anyone - was authorised for the borough of Islington until 07:00 BST on Tuesday.
