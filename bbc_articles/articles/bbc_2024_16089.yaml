title: 'Strictly: Amanda Abbington accuses Giovanni Pernice of ''cruel'' behaviour
  - BBC News'
date: '2024-07-21'
section: Culture
url: http://www.bbc.co.uk/news/articles/c720kqvnzw9o
content: |-
  The actress says she feared a backlash if she complained about her former dance partner's behaviour.

  Abbington accuses Pernice of 'cruel and mean' behaviour

  Amanda Abbington says she found her former Strictly Come Dancing dance partner Giovanni Pernice’s alleged behaviour “unnecessary, abusive, cruel and mean”. The actress, who withdrew from last year's series in October, told the Sun on Sunday, external she feared a backlash if she complained and claimed the BBC had known about Pernice's behaviour for years. Pernice's spokesperson said he refuted the allegations and denied any accusations of abusive or threatening behaviour. The BBC would not comment on the latest claims, but has previously said it has robust duty of care procedures.

  Strictly has been at the centre of controversy after complaints about former dancers Pernice and Graziano Di Prima. It had been widely reported that Sherlock star Abbington experienced difficulties with her dance partner Pernice. In her interview on Sunday, Abbington said: "I found Giovanni's behaviour unnecessary, abusive, cruel and mean. I couldn't sit back and let him do that to other people. "I had to think long and hard about making a complaint because I knew the backlash I would get. But I would not have been able to live with myself for future people going on that show." She said whatever had happened in the training room was "on video", adding: "I have no problem with anyone seeing that."

  Amanda Abbington was partnered with Giovanni Pernice on Strictly

  Abbington said she felt rehearsal rooms should be "a safe space", with "a duty of care and kindness". "That courtesy wasn't extended to me on this job," she said. She said she wanted to complain as she did not think it was fair. "It's insane what has happened to me, with the death threats and backlash," she added. She claimed concerns about Pernice's alleged behaviour were flagged to producers in the past and "nothing was done". "It wasn't an isolated experience with me. I should never ever have danced with him." Last month, it was announced Pernice would not return to Strictly for this year's series. In a statement provided to BBC News, Pernice's spokesperson said: “The BBC has shared allegations from the inquiry with Giovanni, who has cooperated fully. None of the allegations carried in the Sun on Sunday are included in any shape or form. “Giovanni refutes these allegations and denies any accusations of abusive or threatening behaviour. "He has provided substantive evidence to the investigation, and he remains fully confident of clearing his name." The BBC said it does not comment on specific matters related to individuals. It urged people not to indulge in "speculation", adding: "Anyone involved in a complaint has a right to confidentiality and fair process. If a complaint is made to the BBC, we assess and take any necessary steps to establish the facts, whether there is a case to answer, and, if appropriate, what action should be taken. "This is all within the context of the BBC having duties of care to everyone linked to a complaint - that applies to those that have raised the complaint and to those that have been complained about.”

  Zara McDermott, who was partnered with Graziano Di Prima, has said she was involved in "distressing" incidents during training

  Separately, the Sunday Mirror carries allegations, external against an unnamed female professional dancer on the show. The paper says an unnamed male contestant complained the dancer screamed in his face in a rage. He is said to be critical of senior staff for failing to support him on and after he left the show. The male contestant claims they argued every day and that the dancer "saw red, off camera" if he didn't master his routines, according to the paper. In response to this story, the BBC said it would not comment on individuals or engage in speculation. "However, as we have said previously we will always listen if people want to make us aware of something or raise it with us directly and we have appropriate procedures and processes in place to manage this.” The second former Strictly dancer at the centre of the controversy so far has been Di Prima. On Tuesday, TV presenter Zara McDermott - who was paired with Di Prima on last year's show - posted a statement saying she was involved in incidents in the Strictly training room that she now finds "incredibly distressing" to watch back. Two days later, Di Prima's spokesman confirmed the star kicked McDermott once during rehearsals last year, which led to his removal from the show. Di Prima has said he deeply regrets "the events that led to my departure from Strictly". Following McDermott's revelations earlier this week, the corporation announced it would put chaperones in all future rehearsals. There will also be two new dedicated welfare producers, as part of a string of extra measures.

