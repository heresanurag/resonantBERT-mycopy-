  It is the second defection to Labour for Prime Minister Rishi Sunak in less than two weeks, after Dr Dan Poulter also quit the Tories last month. Mr Poulter was viewed as more on the centre of the Conservative party, however. Canterbury MP Rosie Duffield said Labour MPs were "baffled" by Mrs Elphicke's defection, describing it as "really peculiar". She said she did not "believe for a second that [Mrs Elphicke] has suddenly transformed into a Labour MP". John McDonnell, who was shadow chancellor under former Labour leader Jeremy Corbyn, told LBC he was "surprised and shocked", adding: "I'm a great believer in the powers of conversion, but I think even this one would have strained the generosity of spirit of John the Baptist, quite honestly." Labour backbencher Mick Whitley called the defection "outrageous," adding Mrs Elphicke did not share the "values of the Labour movement". Foreign secretary - and former prime minister - Lord Cameron said the defection demonstrated that Labour stood for nothing. He told an audience at the National Cyber Security Centre that when he first heard about it he thought "Oh no, not another one". However, he went on to say that "by the end of the day it was like 'that says so much more about Keir Starmer and the Labour Party having a complete lack of a plan than it does about a prime minister who is a good man doing a great job at a difficult time'." Other Conservatives expressed surprise with Education Secretary Gillian Keegan labelling Mrs Elphicke's move "bewildering" and showing "a real lack of principles". "She's very much on the right wing of the party. I know all parties are a broad church, but she was an ERG member and big Liz Truss supporter, I believe," she told GB News. Transport Minister Huw Merriman branding her "shameless" and an "opportunist", adding "I'm just disappointed for politics that she's done what she's done". Mish Rahman, a member of Labour's ruling National Executive Committee, said that he did not welcome Mrs Elphicke's defection, saying the party is getting "grubbier". He said the Labour Party should be in the business of changing the country, "not saving the careers of Tory politicians who the British public are rejecting because of the damage they've done to the country". "She's not fit to be a Labour Party member, let alone an MP," he added.

