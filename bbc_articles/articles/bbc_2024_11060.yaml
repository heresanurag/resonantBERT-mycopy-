title: 'Natalie Elphicke: Labour insists ex-Tory MP is ''good fit'' for party - BBC
  News'
date: '2024-05-09'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-68982095
content: |-
  Some Labour MPs are unhappy about Tory defector Natalie Elphicke's past comments.

  Labour has defended welcoming Tory defector Natalie Elphicke into the party after anger from some backbench MPs at the decision. Labour chair Anneliese Dodds said the Dover MP was a "good, natural fit" for her party. Some Labour MPs have expressed concern about Mrs Elphicke's political views and past criticism of Labour. "People can change their minds," Ms Dodds said. Mrs Elphicke defected to Labour in a surprise move on Wednesday, hitting out at the "broken promises of Rishi Sunak's tired and chaotic government". Speaking to BBC Breakfast, Ms Dodds said: "What she set out [in her statement] is absolutely fundamental to the Labour Party."

  She added: "Natalie Elphicke is not the first Conservative MP who's taken this decision... [she's] taken the same decision as so many other former Conservative supporters up and down the country. "I think it's absolutely right she's done so because she's clearly here putting her constituents first." Mrs Elphicke has said she will not be standing to remain as an MP at the general election and has not been offered a peerage by Labour as a reward for defecting. She will be given an unpaid role advising Labour on housing policy. She has campaigned for rent freezes and against homelessness - areas where she has common ground with Labour. But she has also previously accused Labour of being soft on human rights and migration. Many Labour MPs are deeply uncomfortable with remarks she made about her ex-husband Charlie Elphicke, whom she replaced as Dover MP in 2019. In an interview with the Sun after his conviction in 2020 for sexual assault, she was reported to have said being "attractive" and "attracted to women" had made him an "easy target". She has not commented on those previous remarks since defecting on Wednesday. Labour said: "all those issues have been dealt with previously both in Parliament and in public." But Jess Phillips, the former shadow minister for domestic violence and safeguarding, said Mrs Elphicke should "account for her actions". The Labour MP told ITV's Peston: "I'm all for forgiveness but I do think that that needs some explaining." Leader of the Opposition Keir Starmer said on Wednesday he was "delighted" with her defection, telling reporters it showed Labour was "the party of the national interest". In her defection statement, Mrs Elphicke said Labour had "changed out of all recognition" under Keir Starmer and now occupied the "centre ground" in British politics. "For me key deciding factors have been housing and the safety and security of our borders," she added.

