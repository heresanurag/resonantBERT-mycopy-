title: Record rainfall causes major flooding in South Florida - BBC News
date: '2024-06-13'
section: General
url: http://www.bbc.co.uk/news/videos/cp998wjy9pro
content: |-
  Heavy downpours on Wednesday prompted flash flood alerts for more than 8 million residents.

  Heavy downpours on Wednesday left many South Florida streets flooded, halting traffic and prompting detours for commuters.

  More than 8 million residents were under flash flood alerts throughout Miami-Dade, Broward, and Collier counties. Rainfall reached 5-6 inches (13cm) in many places, with forecasts predicting more showers over the weekend.

  In Sarasota, Florida, nearly 4 inches of rain fell in one hour Tuesday evening, the most rain the city has ever seen in a single hour.
