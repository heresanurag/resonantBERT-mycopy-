  The latest updates on the coronavirus pandemic in Scotland.

  Dr Muge Cevik has studied cases from around the world Image caption: Dr Muge Cevik has studied cases from around the world

  The World Health Organisation said this week that coronavirus could be transmitted by people who never develop symptoms, so may not know they are carrying the virus.

  Dr Muge Cevik, an infectious diseases expert at St Andrews University, has studied a range of asymptomatic cases from contact tracing around the world.

  "What we found is that while asymptomatic patients can certainly transmit the virus to others, they transmit the infection to fewer cases, which means they are less contagious compared to someone with symptoms," she told Politics Scotland.

  Ms Cevik said transmission rates depend on many different aspects, including the duration of the contact, proximity, and the environment.

  She explained that 'super-spreaders' - cases when maybe 20 people are infected at the same time - occur when someone at their most infectious goes to an all-day meeting for example, or a crowded indoor event, and then might go out for dinner afterwards.

  "If the same person had an evening at home, we might not see any transmission," she added.

  Quote Message: We still need to understand when patients are at their most infectious, but it seems to be when they start to develop symptoms or feel mildly unwell." from Dr Muge Cevik We still need to understand when patients are at their most infectious, but it seems to be when they start to develop symptoms or feel mildly unwell."
