title: Sir Geoff Palmer, Scotland's first black professor, dies aged 85 - BBC News
date: '2025-06-13'
section: Edinburgh, Fife & East
url: http://www.bbc.co.uk/news/articles/c93lry1e6z5o
content: |-
  Sir Geoff moved to the UK from Jamaica as a teenager and became known as both an academic and a human rights advocate.

  Sir Geoff Palmer became Scotland's first black professor in 1989

  Sir Geoff, chancellor and professor emeritus at Heriot-Watt University, moved to the UK from Jamaica as a teenager and became known as both an academic and a human rights advocate. Scottish Labour MSP Foysol Choudhury paid tribute to Sir Geoff on social media - describing him as a "father figure" and a "courageous voice for justice and equality". Prof Richard A Williams, the principal and vice-chancellor of Heriot-Watt University, said: "Sir Geoff was an inspiration not just to me but to colleagues past and present, and countless students around the world.

  "His infectious enthusiasm and passion for education was impossible to ignore and this University was all the richer for having such a strong association with him over the years. "He will be dearly missed, and our thoughts are with his loved ones at this difficult time."

  In a social media post, external Mr Choudhury said he was "deeply saddened" to share the news of the passing of Sir Geoff. He added: "He was not only a distinguished scientist & academic, but also a courageous voice for justice & equality. My sincere condolences to his family & all who knew and admired him. "May his soul rest in peace." He later thanked people for their messages of sympathy, saying: "Geoff wasn't just my dad's best friend, he was a father figure to me, took me under his wing as a teen and continued to inspire me his entire life. "It's a huge loss, but I'm grateful for the memories." First Minister John Swinney said he was saddened to hear about Sir Geoff's death. He said: "Sir Geoff Palmer was a pioneer and an outstanding intellectual. He had a hugely positive impact on Scotland and will be sorely missed." Scottish Labour leader Anas Sarwar said the academic was "a gentleman, a pioneer and an intellectual giant" who would be dearly missed.

  Sir Geoff's links to Heriot-Watt began in the 1960s

  Sir Geoff moved to London from St Elizabeth, Jamaica, in 1955, joining his mother in the city. After studying at the University of Leicester, he completed his PhD in grain science and technology jointly with Heriot-Watt College and the University of Edinburgh in the 1960s. Following a spell in Surrey, he returned to Heriot Watt in 1977, going on to become Scotland's first black professor in 1989 before eventually retiring in 2005. Sir Geoff's academic work saw him invent the barley abrasion process, external - which involves deliberately damaging the protective husk of grains to speed up the process of malting. His efforts won him the American Society of Brewing Chemists Award of Distinction, an honour dubbed the Nobel prize of the beer world, while the success of his discovery attracted funding that established the International Centre for Brewing and Distilling as part of the Heriot-Watt campus.

  Sir Geoff later served as leader of Edinburgh's Slavery and Colonialism Legacy Review Group

  Sir Geoff was also known as a passionate advocate for the rights of black communities, work which saw him invited by Edinburgh City Council to chair a review group looking at the city's colonial legacy. The group presented a number of recommendations, including that the city council should apologise for Edinburgh's past role in slavery and colonialism. In 2014 Sir Geoff was knighted for services to human rights, science and charity and four years later he he was appointed Jamaica's first Honorary Consul in Scotland. He was the 2020 recipient of the Jamaican national honour, the Order of Distinction (Commander Class) and in 2021 was appointed chancellor of Heriot Watt university, external. Last year he was awarded Scotland's highest royal honour, the Order of the Thistle, in recognition of his significant contributions to national life and public service. Edinburgh's Lord Provost Robert Aldridge called Sir Geoff a "true inspiration" who will "leave a lasting impression on Edinburgh". He added: "In chairing the Edinburgh Slavery and Colonialism Legacy Review Sir Geoff made a vital contribution to recognising and profiling the capital's links with slavery and colonialism in the public realm. "I know Sir Geoff's legacy in academia and activism will live on for years to come, inspiring future generations. He will be dearly missed – my thoughts are with his friends, family and all those who knew him."
