content: |-
  Famine is not currently occurring in Gaza, the assessment says, but it calls for urgent action to increase humanitarian aid.

  Entire Gaza population at critical risk of famine, UN-backed assessment says

  A UN-backed assessment has said that Gaza's population of around 2.1 million Palestinians is at "critical risk" of famine and faces "extreme levels of food insecurity" as an Israeli blockade on humanitarian aid continues. The latest report by the Integrated Food Security Phase Classification (IPC) said there had been a "major deterioration" since October 2024, but concluded famine was not currently occurring. The two-month ceasefire between Israel and Hamas "led to a temporary reprieve" in Gaza, the report said, but renewed hostilities and an Israeli blockade on aid - ongoing since early March - had "reversed" any improvements. Some 244,000 people were currently experiencing the most severe, or "catastrophic" levels of food insecurity, it said, and called for urgent action to prevent the "increasingly likely" risk of famine.

  Israel renewed its military operations in Gaza in mid-March and has prevented food, medication and other aid from entering Gaza for 70 days, saying it is putting pressure on Hamas to release its remaining hostages.

  There has been international condemnation of the blockade, including from the UN which has said it has supplies at Gaza's border crossings, ready to enter if Israel allows. Aid agencies have said the blockade could be a war crime and amounts to a policy of starvation. The IPC assessment, released on Monday, found half a million people - or one in five - were facing starvation in Gaza. It said nearly 71,000 children under the age of five are expected to be acutely malnourished over the next 11 months to April 2026. It added: "Many households are resorting to extreme measures to find food, including begging, and collecting garbage to sell to buy something to eat." The report said the current situation, compared to its October 2024 analysis, represented "a major deterioration in one of the world's most severe food and nutrition crises driven by conflict and characterised by untold human suffering". Its analysis found that 1.95 million people, or 93% of Gaza's population, were living through high levels of acute food insecurity, including 244,000 experiencing "catastrophic" levels. The IPC - a global initiative by UN agencies, aid groups and governments - is the primary mechanism the international community uses to conclude whether a famine is happening. Israeli officials have denied there is a hunger crisis in Gaza because of the quantity of aid that entered during the ceasefire. It comes as Hamas said it would release Israeli-American hostage Edan Alexander as part of efforts to reach a ceasefire agreement. The group said it was also intended to facilitate a deal for the entry of humanitarian aid to Gaza. The Israeli PM's office said it had not committed to any ceasefire but only to a "safe corridor" for Mr Alexander's release. US President Donald Trump arrives in the Middle East on Tuesday, and Israel has vowed to expand its military offensive against Hamas if no deal is reached by the end of his visit. Israeli officials have said the plans for their expanded offensive include seizing all of the territory indefinitely, forcibly displacing Palestinians to the south, and taking over aid distribution with private companies despite opposition from the UN and its humanitarian partners, who say they will not co-operate because it appears to "weaponise" aid. In its report, the IPC said the aid distribution plans were estimated to be "highly insufficient" and it was expected that large parts of the population would "face significant issues in accessing the proposed distribution sites". The war was triggered by the Hamas-led attacks on southern Israel on 7 October 2023, which saw about 1,200 people killed and more than 250 taken hostage. Some 59 hostages remain in Gaza, up to 24 of whom are believed to be alive. Israel's military campaign has killed 52,862 people in Gaza, according to the Hamas-run health ministry.
