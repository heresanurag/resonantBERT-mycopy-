title: Crystal Palace Park set for £17m regeneration - BBC News
date: '2024-08-14'
section: General
url: http://www.bbc.co.uk/news/videos/cly8r686984o
content: |-
  The south London park's dinosaurs and Italian terrace will be restored as part of the project.

  Plans to revamp Crystal Palace Park have been given the go ahead by Bromley Council.

  About £17m has been approved to upgrade the historic Grade II* listed space .

  The money will be spent on repairing the famous Grade I listed dinosaur sculptures, restoring the Italian terrace, which had fallen into a state of disrepair, as well as adding meadows, paleo-inspired plants, wildlife-friendly shrubs, sustainable water features and also improving accessibility in the park.

