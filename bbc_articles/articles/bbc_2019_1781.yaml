id: bbc_2019_1781
title: Seven MPs resign from Labour party - BBC News
date: '2019-02-18'
section: General
url: http://www.bbc.co.uk/news/uk-47279312
content: |-
  MPs Chuka Umunna, Luciana Berger, Chris Leslie, Angela Smith, Mike Gapes, Gavin Shuker and Ann Coffey announce they've resigned from the Labour Party.

  The seven MPs said they will sit in parliament as a 'new independent group of MPs'.

  Luciana Berger, MP for Liverpool Wavertree, made the announcement on Monday morning. She said Labour had become institutionally anti-Semitic and she was "embarrassed and ashamed" to stay in the party.
