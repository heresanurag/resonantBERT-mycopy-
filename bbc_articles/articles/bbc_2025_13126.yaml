title: Child Q violated and demeaned in strip-search, hearing told - BBC News
date: '2025-06-03'
section: London
url: http://www.bbc.co.uk/news/articles/cev4k0zke24o
content: |-
  Three officers are facing gross misconduct proceedings over the strip-search of a 15-year-old girl.

  Child Q, a 15-year-old black girl, was strip-searched by police in her school in 2020

  A schoolgirl was "demeaned" and "physically violated" when she was strip-searched at school by police while on her period. She was wrongly suspected of carrying cannabis, a misconduct hearing for the three Metropolitan Police officers involved has heard. The girl, who was 15 at the time, will not be giving evidence at the three-week tribunal in south-east London, "because of the psychological effects that this strip search has had on her", the panel heard. Det Con Kristina Linge, PC Victoria Wray and PC Rafal Szmydynski all deny gross misconduct over their treatment of the girl known as Child Q.

  All three officers were PCs at the time of the search which allegedly took place without an appropriate adult present in Hackney, east London on December 3 2020. Outrage over Child Q's treatment led to protests outside Stoke Newington Police Station after a safeguarding review revealed she had arrived at school for a mock exam and was taken to the medical room to be strip-searched while teachers remained outside. On Tuesday Elliot Gold, for the Independent Office for Police Conduct (IOPC) which is bringing the case, said: "The search involved the removal of Child Q's clothing including her underwear, her bending over and, thus, the exposure of her intimate parts including, necessarily on the (IOPC) director general's case, her vagina and anus. "Child Q was menstruating at the time, as she told the two officers who searched her, but they nevertheless proceeded with the search. It is not disputed that Child Q's sanitary pad was thereby exposed. "The object was to search for cannabis. No cannabis was found."

  The point where Child Q said she was on her period was "an obvious opportunity for the two officers to reconsider the necessity and proportionality of the search" but they instead told her "we are all women here", or said that they were all "females", and thereby treated Child Q as an adult rather than a child", Mr Gold said. PCs Linge and Wray performed a search that exposed the girl's intimate parts when this was "disproportionate in all the circumstances", according to the allegations. PCs Linge and Wray also performed or allowed the search in a manner which was "unjustified, inappropriate, disproportionate, humiliating and degrading". All of this happened without authorisation, in the absence of an appropriate adult, and with no adequate concern being given to Child Q's age, sex, or the need to treat her as a child, it is also alleged. It is also claimed that PCs Szmydynski and Linge both gave a misleading record of the search afterwards. No contemporaneous record was made about the search, either in the officers' pocket notebooks or on a standard form - as would be routine for any stop and search in the street.

  The IOPC asked the panel to think of "why the officers overreacted to such an extent and why their actions fell so far below what was required of them". Black people were more likely to be stopped and searched than white people and discrimination is a "contributing factor" in stop and search, it was suggested. Mr Gold also told the panel "black schoolchildren are more likely to be treated as older and less vulnerable or in need of protection and support than their white peers". He said: "She was treated as being older than she was, more likely to be involved in criminality, and subjected to a more intrusive search, than she would have been had she been a white schoolgirl in the same situation, arriving at school, smelling of cannabis. "Child Q is black. It is the director general's case that this kind of gross overreaction by the police - to strip search a school pupil on suspicion of something relatively minor, possession of cannabis - would not have happened to a white pupil and is, regrettably, explained by Child Q's race, whether or not the officers were consciously aware of this at the time."

  Mr Gold said that sacking the officers would be "justified" if the allegations are proved, adding: "Their actions and omissions have resulted in Child Q suffering harm to her mental health and feeling physically violated. "They have caused Child Q and her mother to feel demeaned and disrespected. "They have brought discredit on the Metropolitan Police and upset race relations yet further between the police and minority communities." The panel heard that this "most intrusive" form of search of a child should only be used where "necessary and reasonable", must have authorisation from a sergeant, and involve an appropriate adult if it concerns a child. It must be recorded and two same sex officers are needed if intimate parts will be exposed.
