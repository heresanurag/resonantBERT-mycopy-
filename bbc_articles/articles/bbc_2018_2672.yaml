title: Paralympics 'pit lane’ where athletes get repairs - BBC News
date: '2018-03-17'
section: General
url: http://www.bbc.co.uk/news/health-43421549
content: |-
  Have you ever wondered how athletes cope when their prosthetic limbs or wheelchairs break?

  The BBC met University of Bristol PhD student, Maddy Nichols who is helping technicians mend broken parts at the PyeongChang Paralympic Winter Games.
