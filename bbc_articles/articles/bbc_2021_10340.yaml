title: Man arrested as Katie Price taken to hospital - BBC News
date: '2021-08-23'
section: Essex
url: http://www.bbc.co.uk/news/uk-england-essex-58257403
content: |-
  Police are called to reports of an assault in the early hours of Monday morning.

  Katie Price was taken to hospital after Essex Police was called to Little Canfield

  A man has been arrested on suspicion of assaulting former model and TV personality Katie Price.

  Ms Price, 43, was taken to hospital after sustaining a facial injury, Essex Police said.

  The force said it was called by the ambulance service shortly after 01:30 BST to reports of an assault in Little Canfield, near Stansted Airport.

  A 32-year-old man was arrested on suspicion of assault and remained in custody, police said.

