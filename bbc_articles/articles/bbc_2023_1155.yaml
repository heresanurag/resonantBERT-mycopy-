content: |-
  Bolsonaro supporters wearing Brazilian colours wave flags and cheer after invading the building.

  Supporters of Brazil's ex-president Jair Bolsonaro who stormed the presidential palace could be seen dressed in Brazilian colours and waving flags inside the building.

  Thousands of Mr Bolsonaro's supporters invaded the country's Congress, Supreme Court and presidential palace in the capital Brasília.

