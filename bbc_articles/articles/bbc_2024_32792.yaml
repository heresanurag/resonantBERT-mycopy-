content: |-
  A court heard that the dog's owner, Justin Allison, didn't do anything to help the girl under attack.

  Owner 'not bothered' by XL bully attack on girl, 12

  This is the dog suspected of attacking the 12-year-old girl in Blaenau Gwent in October

  A man was "not bothered" as his XL bully attacked a 12-year-old girl, a court has been told. Justin Allison, 37, from Ebbw Vale, pleaded guilty to charges of owning a banned breed, being in charge of a dog that was dangerously out of control and possessing a knife. Newport Magistrates' Court heard the dog attacked the girl as she got out of a car in Nantyglo, Blaenau Gwent, in October - with the animal running towards her "very fast" and "reaching her in seconds". Prosecutor Lisa Lewis said the dog was " growling" and the girl was "very scared".

  The girl told the court Justin Allison "didn't come close and wouldn't do anything" while she was under attack by his dog

  The court heard how the dog jumped on the girl's back and then "latched onto her arm" as she tried to cover her head, with the girl's father eventually wrestling with the dog. Ms Lewis said the girl recalled how the owner appeared but "didn't come close and wouldn't do anything" and was "not bothered" about helping her father. The girl was eventually taken to hospital and underwent surgery on her arm. Magistrates were shown images of the "horrific injury" with the bone, tendons and nerves of the child's arm visible under a flap of skin. The court also heard Mr Allison had no licence for the XL bully dog, which was destroyed following the incident. The case was adjourned for sentencing at Newport Crown Court in January.
