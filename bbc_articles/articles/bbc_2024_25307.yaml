  ACD director Mark Donfried said he had returned to North Macedonia from his home in Germany to help ensure Salmond was repatriated as soon as possible. He told BBC Scotland News: "I was taught as a I grew up you don't leave any man behind and, here, I definitely feel a responsibility to make sure that everything goes perfectly with the highest level of respect." Tributes have been paid to former SNP leader Salmond from across the political spectrum in recent days. During Prime Ministers' Questions, Sir Keir Starmer described him as a "monumental figure in Scottish and UK politics". Tory leader Rishi Sunak and Lib Dem leader Sir Ed Davey also paid tribute in the Commons. Scotland football fans held a minute's applause before Tuesday's match against Portugal at Hampden.
