title: The moment MPs pass amendment delaying Brexit - BBC News
date: '2019-10-19'
section: General
url: http://www.bbc.co.uk/news/uk-politics-50109909
content: |-
  MPs vote in favour of the Letwin amendment, delaying Brexit until legislation is passed by Parliament.

  MPs have voted in favour of an amendment, which will delay Britain's departure from the European Union.
