title: The self-taught pianist drawing crowds - BBC News
date: '2019-02-17'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-47260320
content: |-
  Hundreds of thousands of people have seen this student play after he learned the piano using online videos.

  Hundreds of thousands of people have seen student Nuradean Arreythe's piano skills after he learned how to play using online videos.

  He practised on an old keyboard until it broke – but even that hasn't stopped him from playing where he can.

