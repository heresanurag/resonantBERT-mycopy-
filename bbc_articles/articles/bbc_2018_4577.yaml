  England's Alicia Blagg and Katherine Torrance win Commonwealth Games silver in the women's synchronised 3m springboard.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England's Alicia Blagg and Katherine Torrance won Commonwealth Games diving silver in the women's synchronised 3m springboard. Australians Esther Qin and Georgia Sheehan won gold and Malaysia's Mun Yee Leong and Nur Dhabitah Sabri bronze. Blagg said she and Torrance, who first competed together in January, only had two weeks training before the Games. "We were like, 'we'll just wing it, throw the dice and see what happens' and it went pretty well," she said.

  Australian favourites Maddison Keeney and Anabelle Smith failed their final dive and fell from first to last. Blagg and Torrance were also helped when Canadians Jennifer Abel and Melissa Citrini-Beulieu scored just 33.48 in their fourth dive, having led earlier in the dramatic final. Blagg was reigning champion in the event having won gold in Glasgow with Rebecca Gallantree, who has since retired.
