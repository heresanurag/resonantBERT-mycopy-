content: |-
  The emotional moment came at the end of the first Rob Burrow Leeds Marathon.

  This is the emotional moment Kevin Sinfield carried Rob Burrow over the finish line at the end of the first Rob Burrow Leeds Marathon.

  The former rugby league star was diagnosed with MND in 2019 and has gone on to raise awareness of the condition and millions of pounds, with his friend as his biggest supporter.

  Burrow and Sinfield were Leeds Rhinos teammates and both played for England.

