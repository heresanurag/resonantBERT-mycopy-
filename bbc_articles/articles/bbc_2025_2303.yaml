title: 'Watch: London shoplifter tackled off e-scooter - BBC News'
date: '2025-02-26'
section: General
url: http://www.bbc.co.uk/news/videos/cy8p8y4z32eo
content: |-
  A plain-clothes police officer tackled the thief as he tried to flee from a shop in Barnet.

  This is the moment a wanted thief was tackled off an e-scooter while trying to flee from a shop in north London.

  CCTV captured the man emptying the contents of a meat-chiller into a bag. As he fled the store in Barnet on an e-scooter, he was quickly tackled to the ground by a plain-clothes police officer.

  Gavin Nicholls, 44, who was wanted for a string of thefts in the area, admitted stealing from the store plus five counts of theft from a nearby BP Garage on 3 February at Willesden Magistrates' court.

  He was sentenced to 20 weeks in prison.

  Nicholls, of no fixed abode, was sentenced alongside four others who were caught as part of a police operation in the Colindale area, that led to 18 arrests and 85 charges in the space of four days.

  Last month, it was revealed that in the 12 months to September last year, incidents of customer theft reported by retailers in the UK had risen by 3.7 million to 20.4 million, and cost retailers £2bn.

