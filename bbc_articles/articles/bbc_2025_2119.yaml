title: CCTV shows £4.8m gold toilet raid at Blenheim Palace - BBC News
date: '2025-02-25'
section: General
url: http://www.bbc.co.uk/news/videos/cm2y7yrldx0o
content: |-
  The footage played in court showed armed hooded individuals breaking into the palace.

  CCTV footage showing the moment thieves stole a solid gold toilet worth £4.8m has been shown in court.

  The work of art, called America, was taken from Blenheim Palace in Oxfordshire in the early hours of Saturday, 14 September 2019.

  Michael Jones, 39, from Oxford, denies one count of burglary. Fred Doe, 36, from Windsor and 41-year-old Bora Guccuk, from west London, both deny conspiring to transfer criminal property.

  The footage played at their trial at Oxford Crown Court showed two vehicles driving across the Great Courtyard, before hooded individuals armed with sledgehammers and a large crowbar broke into the palace.

  One raider could be seen leaving carrying a golden toilet seat.

