title: Smuggled spider monkeys found in backpack in Texas - BBC News
date: '2023-08-08'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66420623
content: |-
  The US Border Patrol seized seven animals as a person was arrested in Fort Brown, Texas.

  Border Patrol agents found seven spider monkeys in a backpack when they detained a man trying to smuggle the animals into the US from Mexico.

  At least six spider monkey species living in Central and South America are considered endangered, according to the International Union for Conservation of Nature and Natural Resources.

  The monkeys were handed over to the US Fish and Wildlife Service.
