title: Election 2024 push notifications - BBC News
date: '2024-06-20'
section: Politics
url: http://www.bbc.co.uk/news/articles/cnllvxwpr0eo
content: |-
  We will be sending out extra alerts to expert news and analysis pieces in the run-up to the 4 July vote.

  Thank you for signing up for additional push alerts about the 4 July general election. On top of the notifications you have been receiving already, we will send some additional links to news and analysis from our experts, key factchecks and what audiences are telling us through Your Voice, Your Vote. The additional notifications will be clearly labelled Election 2024 Extra. We really hope you find this service interesting and useful but, just in case, we will be a sending a weekly push alert giving you the option to unsubscribe from these extra notifications.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: How to get personalised election results sent straight to your phone

  You will continue to receive breaking news alerts as usual, as well as some notifications linking to key pieces of analysis. On 10 June, you may have received a push alert with a link to a constituency page showing who is standing in your area. It was based on the postcode you have given on your BBC account. If you wish to add or change that, you can do so here. And, finally, if you are in Northern Ireland, Scotland or Wales, we hope to send you a few alerts on big stories that are specific to your nation.

  Sign up for our Election Essential newsletter to read top political analysis, gain insight from across the UK and stay up to speed with the big moments in the general election campaign. It’ll be delivered straight to your inbox every weekday.
