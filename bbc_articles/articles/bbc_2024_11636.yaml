  Some advocates argue that the brutal depiction unveiled in the high-profile trial could lead to more beneficial conversations around addiction and accountability. “We need to get substance use out in the public, people talking about it, and developing the policies and strategies and tools put in place to holistically help people,” said Pat Aussem, vice president at Partnership to End Addiction who works on programmes for families. There are precedents for America’s first families forever changing - and improving - the conversation around addiction. As the trial reached its conclusion this week, Patti Davis, daughter of late former president Ronald Reagan, published a New York Times op-ed, external detailing her own struggles with substance abuse and the unique pressure of recovery as a member of the first family. “Families of presidents have struggled with substance use issues forever,” said Mr Moyers, who works with the clinics founded by first lady Betty Ford, who challenged taboos when she came forward about her struggles with substance abuse in the 1970s. “In this era and age of hyperfocus on social media, I think the debate and conversation are more intense now than ever,” he said.

