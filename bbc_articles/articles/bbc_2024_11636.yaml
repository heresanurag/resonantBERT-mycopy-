  Some images if used as political weapons could have a negative impact. “We’re constantly trying to destigmatise substance use treatment, so that people come forward,” said Dr Trautman. “Any time we use a public figure who has a substance abuse disorder for political gain and paint them in a nefarious light, it could stigmatise other people suffering from addiction.'' The trial focused on a dark chapter in Hunter Biden’s life: his descent into drug addiction following the death of his older brother, Beau, in 2015. He says he has been in recovery for about five years. Jurors saw graphic images of him with drug paraphanalia and heard audio excerpts from his memoir, Beautiful Things, describing this period. "After my uncle died, things got bad," Hunter Biden’s daughter, Naomi, testified during the trial, choking back tears. Prosecutors showed a text message from Biden in which he described “sleeping on a car smoking crack”.

