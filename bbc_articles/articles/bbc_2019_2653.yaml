title: Mother of murdered Julie Reilly will bury remains - BBC News
date: '2019-03-07'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-47482907
content: |-
  Police investigating the murder of Ms Reilly found her remains in the garden of a Glasgow tenement block.

  The mother of murdered Glasgow woman Julie Reilly has welcomed the discovery of her daughter's remains.

  Margaret Hanlon told BBC Scotland's The Nine her family will now hold a funeral for Ms Reilly - and thanked her killer for revealing the location where she was buried to police.

  Ms Hanlon said she was "happy that we've found all of Julie".

  Andrew Wallace is serving at least 28 years in prison for killing Ms Reilly, 47, in her Govan flat in February 2018.

  Police investigating Ms Reilly's murder confirmed human remains were found in the back garden of a tenement block.

  Forensic teams made the discovery while searching the area at Lorne Street, Cessnock, on Wednesday.

  The back garden of a tenement block has been searched

  Andrew Wallace was given a mandatory life sentence for Julie Reilly's murder

  Ms Hanlon said: "We only buried two parts of her and we can do a proper funeral now.

  "We had the inspector this morning who told us they had found remains and said they were Julie.

  "We asked if it was all of her, and he said yes."

  Wallace, 42, cut off her legs with a knife and put the remains in plastic bags and suitcases, before burying them near her home.

  The convicted killer was arrested for Ms Reilly's murder after the discovery of two leg bones close to her home.

  Forensic teams have been searching at the property

  The High Court in Glasgow was told that Ms Reilly had a brain injury which caused problems with her memory, slowed her reactions and affected her speech.

  She was befriended by Wallace, and had allowed him to stay with her at her home in Shieldhall Road after he split up with his girlfriend in December 2017.

  She thought he would help to care for her, but the court heard he saw her as being "easy to manipulate and rip off".

  The last recorded sighting of Ms Reilly was on 6 February last year.

  Police cars outside the flats in Lorne Street

  The following day Wallace told a friend he needed "to get rid of a body".

  He also sent texts claiming that Ms Reilly had moved to the Penilee area of Glasgow.

  In the following days he was seen at the homes of two friends with heavy suitcases.

  Following the latest discovery, a Police Scotland spokesman said a post-mortem examination would take place, with further tests required to confirm formal identification.

  A report will be submitted to the procurator fiscal.
