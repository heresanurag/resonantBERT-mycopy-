title: 'Watch: Massive crowds in London demand ceasefire - BBC News'
date: '2023-11-13'
section: General
url: http://www.bbc.co.uk/news/uk-67393761
content: |-
  Video shows the scale of the biggest UK pro-Palestinian rally since the start of the war.

  Some 300,000 protesters calling for a ceasefire in Gaza marched through central London on Saturday, according to a police estimate.

  Watch aerial and ground footage of the biggest pro-Palestinian rally in the UK since the Israel-Gaza war began.
