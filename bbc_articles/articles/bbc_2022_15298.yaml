title: 'China Covid: Angry protests at giant iPhone factory in Zhengzhou - BBC News'
date: '2022-11-23'
section: China
url: http://www.bbc.co.uk/news/world-asia-china-63725812
content: |-
  Videos showed workers marching, with some confronted by people in hazmat suits and riot police.

