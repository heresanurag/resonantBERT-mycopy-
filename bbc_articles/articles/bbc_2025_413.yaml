  Coverage: Listen live on BBC Radio 5 Live, BBC Radio Wales & BBC Radio Cymru; text commentary and highlights on BBC Sport website and app; watch on ITV1 and S4C.

  Head coach Warren Gatland says Wales cannot hide from the importance of a Six Nations trip to face Italy in Rome after they were demolished 43-0 by France. Wales suffered a record Six Nations loss against France, and it was the first time since the tournament expanded 25 years ago that Wales failed to score a point. In a demoralising start for Wales, they also finished only one point short of equalling their all-time worst Six Nations defeat margin of 54-10 against Ireland 23 years ago. It was also a 13th successive Test loss under Gatland which is an ongoing Welsh record. Former Wales fly-half Dan Biggar says the match at the Stadio Olimpico is Wales' biggest for "15-20 years" with Gatland's side desperately needing a victory. "It is an important game for Wales, it is not about where it ranks for me," said Gatland. "Next week becomes pretty important for us. We can't hide away from that. We need to get the monkey off our back."

  Owen Watkin was forced off injured in the first half against France

  Wales will travel to Nice on Saturday to spend the week preparing for the Italian test. "The players have worked hard over the last couple of weeks and the players are aware of how important next week is," said Gatland. "We go to Nice tomorrow for the week and that's going to be important for this group." Wales have also suffered notable injuries, losing number eight Aaron Wainwright and centre Owen Watkin in the first half. A bloodied Wainwright took a blow to his head, while Watkin suffered a suspected serious knee injury that will require further assessment. "They are not looking great," said Gatland. "Owen is in a brace with his knee, and it looks like it could be an ACL [anterior cruciate ligament] and Aaron needs another HIA [head injury assessment] and has quite a nasty gash in his face down through his lip."

