  Gatland says he was encouraged by aspects of the performance. "I can't question the effort of the players," said Gatland. "They are disappointed. They realise what a quality side they were up against. "I don't think it was a complete bad night at the office. There were times when we had them under pressure and didn't capitalise. "We started well, but when we look back we have put ourselves under pressure at times by over-playing. "That is the game-management the players will learn from tonight."

