  France were widely expected to dominate the tournament opener, and so it proved as they secured a bonus point before half-time after wings Theo Attissogbe and Louis Bielle-Biarrey each scored two tries. Dupont, back on the Six Nations stage after missing last season's tournament due to Olympics sevens commitments, played havoc with Wales' defence, showcasing his creative brilliance. Forwards Julien Marchand, Emilien Gailleton and Gregory Alldritt added second-half touchdowns, while full-back Tomas Ramos kicked four conversions. But there was a late blow for the French when fly-half Romain Ntamack had a yellow card upgraded to red following a high challenge, and he is now set to miss Les Bleus' appointment with England.

