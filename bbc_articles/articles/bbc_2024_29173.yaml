title: Elton John album on hold because he 'can't see' after eye infection - BBC News
date: '2024-11-26'
section: Culture
url: http://www.bbc.co.uk/news/articles/c62jm0p2vjmo
content: |-
  He says he "can't see anything, I can't read anything, I can't watch anything" after an eye infection.

  Elton John album on hold because he 'can't see'

  Sir Elton appeared at the opening night of his Broadway musical Tammy Faye earlier this month

  Sir Elton John has said he's been unable to finish his new album because he is still struggling with his eyesight after getting an infection in July. He has not been able to see out of his right eye for the past four months, and his left eye is "not the greatest", he told ABC's Good Morning America, external. "I can do something like this [interview] but going into the studio and recording, I don't know, because I can't see a lyric for start," the singer said. He added: "It's never fortunate for anything like this to happen, and it kind of floored me and I can't see anything, I can't read anything, I can't watch anything."

  Sir Elton shared a joke with the King at the Royal Variety Performance on Friday

  Asked about the status of the album, the pop star said he did not know and "it's been a while since I've done anything" and he is "kind of stuck at the moment". Sir Elton said he was having treatment, and "there's hope and encouragement that it will be OK". "At the moment, that's really what we're concentrating on," he continued. In November 2023, Sir Elton told the Rock 'n' Roll Hall of Fame ceremony he had "just finished" a new album with lyricist Bernie Taupin. "It's absolutely wonderful and it's full of youth and full of vitality," he said at the time. Sir Elton's last studio album of new material was released in 2016. However, his Good Morning America interview suggests the next album is still some way off being completed.

  He was driven down the red carpet in a buggy at the Toronto Film Festival in September

  His comments come almost three months after he told fans he had been left with "only limited vision" in one eye after a "severe" infection. It has not stopped him making a number of public appearances. He was at the premieres of his new documentary Never Too Late in Toronto and London. In October, he joined Dua Lipa on stage at her concert at the Royal Albert Hall to perform their hit duet Cold Heart. He was at the opening of his musical Tammy Faye on Broadway earlier this month, then on Friday he appeared at the Royal Variety Performance in London to introduce a song from another new stage show, The Devil Wears Prada.
