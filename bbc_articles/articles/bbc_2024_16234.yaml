title: Joe Biden's legacy of accomplishment is unmatched - Kamala Harris - BBC News
date: '2024-07-22'
section: General
url: http://www.bbc.co.uk/news/videos/c51y936y9g2o
content: |-
  The US Vice-President praised Joe Biden's track record as US president.

  Kamala Harris made her first public appearance since President Biden left the 2024 race on Sunday.

  The US vice-president began her remarks on the White House South Lawn by paying tribute to Joe Biden, who was not there because he has Covid-19.

  Ms Harris said she was "deeply grateful for his service to our nation".
