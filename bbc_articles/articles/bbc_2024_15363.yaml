title: JD Vance formally picked as Trump's vice-presidential nominee - BBC News
date: '2024-07-16'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cx992q2nyx0o
content: |-
  Mr Vance, 39, is a former "never Trump" Republican, venture capitalist and author of the memoir Hillbilly Elegy.

  Donald Trump has named former "never Trumper" Republican and Ohio Senator JD Vance as his vice-presidential nominee. Republican National Convention (RNC) delegates formally selected Mr Vance, 39, on Monday after Trump announced on his social media platform he had chosen him after "lengthy deliberation and thought". Mr Vance is a Yale-educated venture capitalist and author of the bestselling memoir-turned-film Hillbilly Elegy. He has previously criticised his new running mate, once suggesting privately that Trump could be "America's Hitler", but has since become an ardent supporter. In the 2022 midterm elections, he won a seat in the US Senate with Trump's endorsement - his first time being elected to public office. After his confirmation as Trump's running mate, Mr Vance took aim at Joe Biden, claiming on Fox News that Americans elected an "empty vessel" in 2020 who is now "an incapacitated president". He claimed Democrats had lied about Mr Biden's health, and voters could "either reward or punish that behaviour" in November. Mr Vance added that he had said "bad things" about Trump but it was important to admit he was wrong. A native of Ohio, Mr Vance gained attention after the release of Hillbilly Elegy, which tells of his blue-collar upbringing and how it affected his politics. Trump said on the Truth Social platform that the book "championed the hardworking men and women of our country". "As Vice President, J.D. will continue to fight for our Constitution, stand with our Troops, and will do everything he can to help me MAKE AMERICA GREAT AGAIN," he continued.

  Mr Vance was confirmed at the RNC, which is taking place this week in Milwaukee, Wisconsin. He entered the venue on Monday accompanied by his wife, Usha, and greeted delegates as a country song played with the chorus "let's build America first". Addressing the crowd in the basketball arena where the event is taking place, Bernie Moreno, an Ohio Senate candidate, said: "To JD, America First isn't just a slogan. It's his north star." "It's an incredible pick," said Donald Trump Jr, Trump's son, at the RNC. "Truly a great choice." The choice came before the opening of the RNC in Milwaukee on Monday, and two days after Trump survived an attempt on his life at a rally in Pennsylvania. In the aftermath, Mr Vance tweeted that Democratic Party rhetoric had "led directly to President Trump’s attempted assassination". Trump has said he will tone down his RNC speech and call for national unity.

