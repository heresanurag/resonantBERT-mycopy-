title: 'Joshua vs Dubois: AJ heavier than champion for world title fight at Wembley
  - BBC Sport'
date: '2024-09-20'
section: Boxing
url: http://www.bbc.co.uk/sport/boxing/articles/cnvdqj6prllo
content: |-
  Anthony Joshua was slightly the heavier man than Daniel Dubois as the heavyweights weighed in for their world title fight on Saturday.

  This video can not be played To play this video you need to enable JavaScript in your browser. Listen to radio commentary and follow live text commentary from 19:00 BST on BBC Sport website & app

  Anthony Joshua said he is "still in the battlefield" and quashed any suggestion of nearing the end of his career as the Briton weighed in heaviest for Saturday's world-title challenge against Daniel Dubois Two-time unified heavyweight champion Joshua, 34, takes on Dubois, 27, for the IBF belt at Wembley Stadium on Saturday. Joshua tipped the scales at 18st during an elaborate weigh-in at Trafalgar Square, with Dubois at a career-heavy 17st 10lb. "I look at myself as a gladiator and I'm going to step into the arena tomorrow to perform for the people," Joshua said. "I started late in boxing but it shows you can achieve anything. I'm not a warrior in the garden yet, I'm still on the battlefield." The central London landmark was cordoned off for arguably Britain's most extravagant fight week location ever. Double decker buses and black cabs provided the backdrop, with Nelson's Column towering behind a stage placed between the two iconic fountains. Greenwich-born Dubois - just as he was at Thursday's news conference - kept his words to a minimum. "I'm ready to fight," he repeated three times. The world title fight will be broadcast live from 19:00 BST on BBC Radio 5 Live and BBC Sounds.

  Joshua has twice been a unified world champion at heavyweight

  Traditionally, the champion would weigh-in first, but such is the lure of household name Joshua, he was second to make his way out. There was a respectful but quiet reception for Dubois, who was upgraded from 'interim' to world champion after Oleksandr Usyk vacated the IBF belt. While many felt Dubois may come in lighter, he weighed four pounds heavier than his previous bout – an impressive stoppage victory over Filip Hrgovic. Joshua - who also weighed 18st for his destructive knockout of Francis Ngannou in March - has been in demand throughout the week, signing autographs and obliging with selfie requests with fans. "I want to thank you for sticking with me through thick and thin," he told the hundreds of fans who chanted his name. "f I can ask one favour, go home tonight and pray for my success tomorrow and that I become a three-time champion of the world."

  Dubois was upgraded to IBF champion during the summer without fighting

  The event has been organised by Turki Alalshikh, chairman of Saudi Arabia's general entertainment authority. Alalshikh says all 96,000 tickets have now been sold, eclipsing the 94,000 attendance for Tyson Fury v Dillian Whyte in 2022. In a clear sign of the Kingdom's growing influence on the sport, fight week festivities were rounded off by yet another quintessential British setting. Earlier in the week, there was a Hollywood red carpet-style grand arrivals event in Leicester Square and Wembley Arena was transformed into Buckingham Palace for the open workouts. Thursday's news conference was held in Guildhall, a 15th century governmental building steeped in history. There will be a performance from Liam Gallagher on Saturday, with Oasis fans hoping for an unlikely appearance by brother Noel. Most importantly, though, the best entertainment should occur in the ring. Joshua boasts 25 knockouts in 28 wins and Dubois has stopped 20 in 21 victories. This is probably the closest you will get to a guaranteed knockout.
