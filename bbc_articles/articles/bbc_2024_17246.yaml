title: Biker among eight weekend crash deaths named - BBC News
date: '2024-07-30'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/cv2gyjee1wyo
content: |-
  Candice Adam was among those who died in four crashes over the weekend, prompting a road safety appeal.

  Candice Adam died in a motorbike crash in Argyll and Bute on Sunday

  A biker who was one of eight people who lost their lives in road crashes over the weekend has been named. Candice Adam, from Dalry in Ayrshire, died after her motorbike crashed on the A83 in Lochgilphead, Argyll and Bute, at about 14:45 on Sunday. Police released the 29-year-old's name following a road safety appeal, after officers attended four serious crashes across the country in just 48 hours. Ms Adam's family said: "We are devastated and heartbroken at the loss of our beautiful, kind-hearted daughter Candice. She was such a unique and special girl."

  Three other people died in a separate crash involving two motorbikes on the A6088 in the Scottish Borders at about 14:30 on Sunday. The riders, a 37-year-old man, a 29-year-old man and a 23-year-old woman, were pronounced dead at the scene between Bonchester Bridge and Carter Bar. Two earlier car crashes had claimed the lives of three young men in their 20s near Falkirk, and a 37-year-old man in South Ayrshire.

  On Monday, Chief Supt Hilary Sloan - Police Scotland's head of road policing - said every death on the roads was tragic. She said: "A collision affects more than just you and your car – it impacts your family, the victim’s family, emergency services and people who witness it. "I urge every driver and road user to think about their behaviour on the road, be considerate towards others and help us make Scotland’s roads safe for everyone. "We all have a responsibility to use our roads safely and to help save lives." The force said inquiries into the crash involving Ms Adam was ongoing and anyone with information has been urged to contact officers on the non-emergency line, external.
