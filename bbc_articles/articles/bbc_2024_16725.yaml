content: |-
  BBC Verify's Richard Irvine-Brown analyses the footage from Manchester Airport's Terminal 2.

  CCTV footage has emerged showing what happened before a Greater Manchester Police (GMP) firearms officer was filmed by eyewitnesses kicking and stamping on a man’s head at Manchester Airport.

  The video, obtained by Manchester Evening News, shows officers trying to restrain one man before a second intervenes.

  A fight breaks out, with two officers punched to the ground. The officer later filmed stamping on a man’s head has since been suspended.

  This video was updated on 1 August with additional CCTV footage from the incident.
