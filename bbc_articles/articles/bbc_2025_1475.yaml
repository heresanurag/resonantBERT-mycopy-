  Molly Rainford, who plays Anna Knight, was introduced to the Square in 2023. She is the daughter of George Knight and Cindy Beale and is part of the first black and dual heritage family to run a pub on any UK soap. In February 2024, the soap aired scenes of Molly and her on-screen sister, Gina Knight (Francesca Henry), discussing colourism and how differently they are treated because of their different skin tones.

  Since arriving to the soap in 2023, actors Francesca Henry (Gina Knight, left) and Molly Rainford (Anna Knight) have had storylines highlighting issues including spiking and colourism

  Colourism is prejudice against people who have a darker skin tone or the preferential treatment of those who are the same race but have lighter skin. Speaking about the storyline, Rainford says: "These are conversations that happen in every mixed-raced family's life. All of these conversations are so important and so valid, especially right now." Rainford says parents told her their children had "conversations on the playground that day after seeing that".

  In 2015, Riley Carter Millington became the first transgender man to play a recurring trans character in a British soap, with his portrayal of Kyle Slater in EastEnders. Carter Millington says "there wasn't a lot of on-screen representation" for trans people and he was "overwhelmed" and grateful to have been cast in the role.

  Riley Carter Millington who plays Kyle Slater (right) says he felt really welcomed by his co-stars like Lacey Turner who plays Stacey Slater (left)

  "I understood the weight of it and I didn't take it lightly," the actor says, adding that despite leaving the soap in 2016, he still gets messages from fans about his character. Kemp adds that EastEnders is "ever-evolving" with society - and that while there will "always be a certain crowd that will poo poo it and look down upon it", it has made some "landmark television" over the last 40 years. If you have been affected by any of the issues raised in this story, you can visit BBC Action Line, including for issues related to sexual abuse and violence and domestic abuse. As part of EastEnders' 40th anniversary week, BBC News will be hosting live coverage of the live episode on Thursday 20 February, which you can watch on BBC One and iPlayer, and follow on our live page. From Wednesday, you'll be able to cast your vote here on who Denise decides her future is with, Jack or Ravi.
