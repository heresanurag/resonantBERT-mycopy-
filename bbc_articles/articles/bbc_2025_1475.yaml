title: 'Kisses and colourism: How EastEnders tackles taboos - BBC News'
date: '2025-02-19'
section: Culture
url: http://www.bbc.co.uk/news/articles/ce3n6rznz1qo
content: |-
  EastEnders stars and commentators reflect on times the soap tackled social taboos over 40 years.

  EastEnders characters Colin (Lord Michael Cashman, left) and Barry (Gary Hailes, right) took part in the first kiss between two gay men on a British soap

  Over its 40-year run, EastEnders hasn't just been plot twists, emotions and gripping "doof doof" cliffhangers. It's also tackled social issues head-on, its stars say. The series has "done more to create social awareness" on these issues "than probably any documentary", says actor Ross Kemp, who plays leather-jacket-wearing Grant Mitchell. Kemp, who is hosting a BBC documentary on the history of the soap, says over the last four decades EastEnders has been able to take on subjects many feel are taboo - and it continues to do so with recent storylines including topics such as spiking. "You can introduce those things through a continuing drama, a soap like EastEnders, and inform more people than you possibly would do with a government campaign," he says.

  On 17 November 1987, EastEnders aired a kiss between characters Colin Russell (played by Lord Michael Cashman) and his boyfriend Barry Clark (Gary Hailes) on the side of the head. There was a "furore" after the kiss was broadcast, Kemp recalls, adding "it wasn't even a kiss on the lips". Former actor Lord Cashman speaks to Kemp about the reaction during the new documentary EastEnders: 40 Years on the Square. "The media went berserk," he says. "There were calls for 'this kind of filth to be taken off our screens'." Lord Cashman says "it was a weird and dark time," adding "there was rampant homophobia".

  Three decades after the characters Colin and Barry broke up in 1988, they were shown back together in Albert Square in a 2022 episode

  In 1988, Section 28 of the Local Government Act was introduced, which banned places like schools and libraries from "promoting homosexuality". Lord Cashman's character Colin went on to share the first mouth-to-mouth kiss between two gay men on a British soap with character Guido Smith (Nicholas Donovan) in 1989. However, the former actor, later an activist and politician, recalls the reaction from fans: "There was one guy and he said: 'I used to stand behind the sofa so that my mum and dad couldn't see me looking at you and I knew I wasn't alone.' It made a difference."

  According to Ofcom's first review of public service television broadcasting, external, audiences said early evening programmes, like soaps, had an important social role in airing complex and controversial issues. One example came in the early 2000s, when the soap featured a domestic violence and coercive control storyline featuring Little Mo Slater (Kacey Ainsworth) and her brutal partner Trevor Morgan (Alex Ferns).

  Kacey Ainsworth (left) says she received hundreds of letters a week after the domestic violence storyline between her character Little Mo Slater and Trevor Morgan (played by Alex Ferns, right) aired

  EastEnders at 40: Behind the Scenes As EastEnders hits four decades on our screens, the BBC went on set at Albert Square to talk to the soap's stars about how it's celebrating its birthday.

  Actor Ainsworth says members of the public would often confuse her for her character and offer sympathy to her in the street. "People would try and sit me down in places, they'd put their arms around me," she says. "They'd want to look after me." The actor adds she received "hundreds" of letters a week from victims of similar violence. Though one watchdog at the time said the show went "too far" for pre-watershed TV, research for a national domestic violence helpline highlighted the storyline as the most significant TV portrayal of violence in the home, external in 30 years.

