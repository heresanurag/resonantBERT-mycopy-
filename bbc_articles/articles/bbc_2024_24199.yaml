title: Oasis ticket blunder grandma gets £2,700 refund - BBC News
date: '2024-09-07'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/cz6x4dx988go
content: |-
  Elizabeth Buxton says she thought the tickets were £90 each.

  Tickets to Oasis's gigs went on sale at the end of August to massive demand

  A 79-year-old woman trying to surprise her granddaughter with tickets to see Oasis at Wembley said she was "devastated" to discover she had paid £2,700 by mistake. Elizabeth Buxton from Houghton Regis, Bedfordshire, thought she was buying two tickets at £90 each from the online marketplace Gigsberg. Gigsberg, which is not one of the official resale sites for the re-formed band's 2025 concerts, said "all prices were clearly shown at the time of the checkout" and that Mrs Buxton had purchased two tickets at £1,100 each plus fees. Although it only issues refunds for cancelled events or missing tickets, the company told Mrs Buxton it would "make an exception" and provide a full refund.

  Oasis have said the "only official resale platforms" are Twickets and Ticketmaster fan-to-fan and tickets purchased elsewhere would be "cancelled". Mrs Buxton was using her mobile phone to look for tickets on Ticketmaster on 2 September, when a link to Gigsberg popped up advertising the same event. She said: "I’ve been on Ticketmaster for years, we’ve been to see the likes of Adele – I'm not stupid. "I clicked on the Gigsberg page and I ordered two tickets and gave my bank details. "The next day, I looked at my phone and saw £2,700 was pending from my bank account. I don’t know how it even happened. It’s actually devastating, to put myself in debt for that amount of money."

  Elizabeth said she was "devastated" to put herself in debt to the tune of £2,700

  Mrs Buxton and her husband, Thomas, 81, are both on the state pension and she said there was no way they could afford to spend that kind of money. She said her granddaughter had "tried to sort it" with the company but at first they "refused to give a refund". "My granddaughter went ballistic. She said, ‘Nan I know you were thinking of me, but you should never have done that,'" said Mrs Buxton. A spokesperson for Gigsberg said it was a "secondary ticket marketplace" and therefore the "tickets were purchased from a private individual", meaning they could not be cancelled. "As stated in our terms and conditions, all sales on our site are final, a refund will not be issued unless the event is cancelled or the seller fails to provide the tickets bought by the buyer before the event starts." However Gigsberg - after being contacted by the BBC - informed Mrs Buxton "our management has made an exception and we will fully refund you".

