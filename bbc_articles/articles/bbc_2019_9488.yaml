content: |-
  The Environment Agency says it does not know what changed the colour of the River Frome tributary.

  The Environment Agency said it did not know what caused the water to turn bright blue

  A tributary of a river in Somerset has been turned bright blue by a mystery substance.

  The Environment Agency said it was carrying out tests on the tributary of the River Frome after the water turned a luminous colour.

  It said it was treating it as a suspected "pollution incident" but there were no reports of dead wildlife.

  Test results are expected on Monday and the agency said it would continue to monitor the stream over the weekend.

  A spokesman asked for anyone with information to contact them.

  The result of tests carried out on the water are expected on Monday

