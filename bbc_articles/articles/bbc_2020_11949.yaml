content: |-
  Why does the divergence between science and politics appear to be wider than it has ever been?

  Manchester has resisted being put into the "very high risk" tier

  Early in the pandemic, the government consistently said it was "following the science" - but what does that really mean, and is the divergence between politics and science now wider than it has ever been?

  Some with heels clacking on the cobbles, others capturing the moment on their phones - it's like the aftermath of a big win in the football, or the Saturday after pay day. The videos show Concert Square in Liverpool heaving with crowds.

  And this in a city on the crest of a second wave of coronavirus, where almost all the intensive care beds in the hospitals are full.

  It was Tuesday night, hours away from the Liverpool City Region entering the toughest restrictions in the country. But the footage sparked anger, and on Twitter there was a fight over the damage to the city's reputation.

