  "Some Conservatives are now realising you've got to be careful what you wish for," an early advocate of them says.

  "And remember this, Boris Johnson was a mayor. There is a path to Downing Street that can pass via a town hall. Perhaps Andy Burnham has realised that too."

  What we are seeing is how different parts of the UK have tilted in different directions. Loyalty to region, to nation, to party. The legacies of past perceived slights and injustices. The realities of perceived injustices now.

  "We owe a big thanks to George Osborne for bequeathing us this incredible standoff," a senior Conservative says about the row.

  Some Conservative ministers ponder privately that - in the end - Mr Sunak will be forced to be more generous to those unable to work under tier three restrictions. They don't think it'll be politically sustainable to pay people normally on the minimum wage, less than the minimum wage, for months on end.

  The rows between local and central government leaders are "very dangerous" and "very damaging to public health", according to Prof Sir Jeremy Farrar, Sage member, and director of the Wellcome Trust.

  But these are not the only rows that have been taking place. Across the scientific and medical community tempers are frayed and the pandemic is taking its toll.

  There is a network of committees that feed into Sage, bringing together a wide range of experts from sociologists and public health directors to epidemiologists.

  Many are not paid for their advice and instead are fitting it in around their day jobs. "We do it because we care and it's our life's work," said Prof Devi Sridhar, an expert in global public health at Edinburgh University, who has been advising the Scottish government.

  Talk to these experts and it is clear they are exhausted.

  "The requests just keep coming in," one said. "We're fed up, especially when we hear that test-and-trace consultants are getting paid £7,000 a day, and we have to put up with MPs going on the TV telling the world we are naïve and don't live in the real world. It's demoralising."

  But it is not just between politicians and scientists that disputes have developed. Rival camps of scientists are clashing. Two online petitions have now been established: the Great Barrington declaration for those who want to see controlled spread of the virus and protection of the vulnerable, and the John Snow Memorandum for those arguing for outright suppression until a vaccine is developed.

  Prof Francois Balloux, director of the UCL Genetics Institute, says the toxic atmosphere that is developing is really "unhelpful".

  Brought together, it has created a climate where almost every utterance or development is examined for double-meaning.

  The problem facing advisers and decision-makers is two-fold. First, the nature of the virus means it is a lose-lose situation - whatever decision is taken has negative consequences either for the spread of the virus, or for the economy, education and wider health and well-being. What's more, there is not a simple binary choice of one thing or the other.

  For example, much has been made in recent weeks about the need for the NHS to also focus on non-Covid work, which has taken a terrible hit during the pandemic.

  Referrals for urgent cancer check-ups and the number of people starting treatment have dropped, while the amount of routine surgery being done is still half the level it was before the pandemic.

  This can have tragic consequences. This week the British Heart Foundation warned the number of younger adults dying of heart disease had increased by 15% during the pandemic.

  The argument put forward by some is that the government should choose to do more non-Covid work. But, and this is a point the health secretary has been making week after week, if hospitals fill up with coronavirus patients, it makes non-Covid work harder to do.

  The second key issue - and this goes to the heart of the disagreements we have seen bubble up in recent weeks among the scientific and medical community - is that there are huge gaps in the evidence and knowledge.

  This is true on everything from the numbers infected already and the level of immunity exposure brings to the true impact of "long Covid", and exactly what effect any restrictions beyond a full lockdown actually have.

  In normal times, the scientific and medical community is able to reach more of a consensus off the back of rigorous randomised controlled trials and painstaking peer review.

  But in a fast-moving pandemic with a new virus, that has simply not been possible. Paul Hunter, a professor of medicine at the University of East Anglia, says it means there is such "uncertainty in the science" that he does not think any plan is guaranteed to work.

  And then there is the human factor - the unintended consequences of actions that are impossible to take into account in the modelling. Hence the prospect of scenes like the ones we saw in Liverpool, which were not taken into account by Sage in its latest advice.

  But Prof Keith Neal, an infectious disease expert at Nottingham University, says it shouldn't come as a surprise that people react in the way they do. Both young and old are suffering, he says, from not being able to meet up with people. "This degree of isolation is not allowed in prisons under human rights legislation."

  People from different households will not be able to drink together inside, after London went into tier two

  It is, he says, therefore natural that some people will ignore the rules. Closing pubs may sound good on paper, he says, but it could lead to an increase in house parties where people are "far more at risk".

  So where has this left us?

  The complexity of competing interests, uncertainty in the science and general exhaustion across society both among decision-makers and the public has, some fear, left us in the worst of both worlds.

  Delay and deliberation, says Sir Jeremy Farrar is a "decision in itself".

  But by reaching a decision by default there is a risk - another adviser says - of making the same mistakes we made at the start of the pandemic.

  "In March we toyed with the Swedish model of limited restrictions with the hope of developing immunity and then hesitated. But we then went for a lockdown, but it was introduced bit by bit and it was too late anyway.

  "The same thing has happened again - we have delayed and then gone for some half measures. I can understand why. This is bloody difficult."

  The government is now hoping it will be just enough that we can get through this wave without a devastating number of deaths or hospitals being overwhelmed. But it's a big risk - it could all unravel.
