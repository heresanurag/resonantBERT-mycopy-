  Dozens of tweets insisted that those present must have been students, that no true Liverpudlian would set foot in Concert Square, let alone behave like that. The tweeters were adamant - these people came from outside.

  The mayor and the metro mayor condemned the scenes - but that wasn't the only thing they were angry about.

  They accused the government at Westminster of not providing enough financial support - workers affected by the closure of businesses such as bars and gyms will only get two-thirds of their wages.

  On the first day of lockdown, one gym owner showed his defiance by remaining open and was fined for it.

  Gyms have indeed provided a source of confusion. Liverpool mayor Joe Anderson questioned why gyms in the Liverpool City Region had to close when the area moved into tier three - very high alert - but those in Lancashire, which went into tier three on Saturday, were allowed to stay open.

  Liverpool was the first place in England to go into the strictest measures

  In Blackburn, with 438 cases per 100,000 (in the week to 13 October), you can work out, but in Wirral, with 284 cases per 100,000, you can't.

  Prime Minister Boris Johnson has acknowledged inconsistencies. "There are anomalies, that's inevitably going to happen in a complex campaign against a pandemic like this."

  But do these discrepancies encourage those who feel the government's decision-making sometimes veers away from the science?

  "Following the science" was a phrase we heard a lot of earlier in the year. It's what, we were repeatedly told, the government at Westminster was doing.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The reality was always more nuanced. There was a range of scientific views on a topic about which precious little was known at the outset, and there are still vast amounts to learn.

  Added to that, from the perspective of ministers, this could never only be about scientific advice.

  There was a constant swirl of broader considerations, what we might call the three Ls - lives, liberties and livelihoods. Ministers have been tussling with the three Ls from the start of the pandemic. But the divergence has never been wider than it is now.

  Claire Hamilton is the BBC's political reporter for Merseyside @chamiltonbbc

  The critical moment in recent weeks can be traced back to 21 September, when Sir Patrick Vallance, the UK's chief scientific adviser and Prof Chris Whitty, the UK's chief medical adviser, warned of the need for immediate action.

  In a televised briefing, Sir Patrick warned cases could reach 50,000 a day by mid-October if they doubled every seven days, as had happened in recent weeks.

  We now know that on that same day, the government's Scientific Advisory Group for Emergencies (Sage) met and suggested the "immediate introduction" of a "short period of lockdown," and a series of longer term measures, including:

  A day later, what actually happened?

  The prime minister said people should work from home if they could and a 22:00 curfew for pubs and restaurants was introduced. In other words, not a lot of change.

  What happened to "following the science"?

  Plenty at Westminster whispered, even before we had seen the minutes from the Sage meeting, that this was a victory for those in government, like Chancellor Rishi Sunak, who worried about the pandemic's crippling economic consequences.

  Mr Sunak has been consistent - warning again, just this week, of the danger of "rushing to another lockdown". He warned, instead, of the "economic emergency", touching on another of the three Ls - livelihoods.

  When you speak to people in the Treasury, you get an insight into what informs this outlook.

  "We have to keep an eye on the medium term. There may not be a vaccine. Listening to the scientists recently, the mood music has changed. They're more pessimistic," says one.

  This is no longer about dealing with a short-term emergency, but being resilient through a medium or long-term slog of a crisis.

  And that means the Treasury is well aware of what is going out - in public spending - and what is coming in, in taxes.

  "There isn't the headroom there was," an insider says - a reference to the £200bn already spent.

  And there is a keen awareness of the economic consequences of shutting pubs. "Our economy is comparatively very reliant on social consumption," is how it is described.

  The experts know the ministers have to take into account a variety of factors. One Sage member said: "Our job is to give clear unvarnished science advice so they can do that with their eyes open."

  On Tuesday, Labour leader Sir Keir Starmer advocated a short, limited lockdown - the circuit-breaker suggested by the scientific advisers.

  But does Sir Keir calling for a circuit-breaker make it more or less likely to happen?

  Since then, the government - to quote Foreign Secretary Dominic Raab - has been "leaning in" to its regional response for England.

  Political convention says, everything else being equal, it is harder to adopt a policy advocated by your opponents than it is by independent advisers.

  Then there's the last of the three Ls. Liberties.

  Among the most influential Conservative backbench voices is Sir Graham Brady, who said ministers had got used to "ruling by decree" and "the British people aren't used to being treated like children".

  This unease at how the pandemic has, in their view, swept away some of the checks and balances on those in power, is widely held in Parliament.

  Then there's the question of geography. First there was devolution for Scotland, Wales and Northern Ireland, but now we're all aware of the big English cities that have metro mayors because they are fighting back against Westminster.

  According to well-placed sources, Health Secretary Matt Hancock had argued for tougher measures in private. But the need to get local leaders on board has meant the tiered system has had to leave some wriggle room for negotiation.

  Ministers were stung when Middlesbrough mayor Andy Preston said he flatly rejected the restrictions that the government announced there in early October. "It was a real problem for us - it undermined the public health message and threatened to undo what we were trying to achieve," one government source said.

  Steve Rotheram, Metro Mayor of the Liverpool City Region, had been asking for a lockdown circuit-breaker for at least two weeks - but he said any measures must come with a bespoke financial support package for businesses. It appears this hasn't been forthcoming.

  But the mayor of Greater Manchester, Andy Burnham, has gone much further than his colleague in Liverpool. On Friday, he was described as "effectively trying to hold the government over a barrel" by Mr Raab.

  Mr Burnham, a former Labour cabinet minister, who lost out to Jeremy Corbyn in the 2015 Labour leadership contest, is suddenly back on the national stage. He is demanding noisily and frequently the need for more generous support for those unable to work because of tier three restrictions.

  There is nervousness within the Labour Party nationally, and elsewhere in the north of England, about this stance. Some worry it imperils people's health, others that it's become "the Andy show" - as one figure put it.

  The idea of "metro mayors" voted for directly by the people of the region has long been championed by the Conservatives. David Cameron was a particular fan.

