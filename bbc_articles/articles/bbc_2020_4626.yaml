title: 'Coronavirus: The unexpected items deemed ''essential'' - BBC News'
date: '2020-04-16'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-52272652
content: |-
  Cheese shops and gun stores are among the services still open in locked down places around the world.

  As entire countries shut down to prevent the spread of Covid-19, "essential" services remain open.

  In some countries, that's gun shops and chocolate stores.

  BBC journalists in five countries around the world explain.
