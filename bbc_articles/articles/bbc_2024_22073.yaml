  Who has made Troy's Premier League team of the week?

  After every round of Premier League matches this season, BBC football pundit Troy Deeney will give you his team and manager of the Week. Here are this week's choices. Do you agree? Give us your thoughts using the comments form at the bottom of this page.

  Robert Sanchez (Chelsea): He made a great save from Evanilson's penalty, although I think he got stitched up with the backpass that led to it. All in all, a good night's work for him. He's come under a lot of pressure - it was between him and Andre Onana but I decided to go with Sanchez because he's had stick.

  Axel Tuanzebe (Ipswich): He absolutely dealt with Kaoru Mitoma. He is obviously really good - excellent defending and he did well going forward. He contributed to another clean sheet for Ipswich on the road. Matthijs de Ligt (Manchester United): He struggled at the start, got found out in one-on-one situations with Kyle Walker-Peters and got sent to the shops. But his goal sent United on their way, plus another clean sheet. After he scored, he got more confident and we saw the class and quality he has. Gabriel (Arsenal): What a monster. Great header for the goal. It was just a monstrous display from Arsenal defensively. The two centre-halves stepped up but Gabriel gets it because of that wonderful goal. Jan Paul van Hecke (Brighton): He's wonderful on the ball, looks so calm and composed. I think he'll be the one they end up selling next year to someone like Liverpool. He's naturally left-footed and never looks flustered. A clean sheet for a Brighton team who keep on rolling.

  Moises Caicedo (Chelsea): I think the £100m price tag is starting to wear off now. He's started to deliver and become the player that we saw at Brighton. Defensively he was excellent and everyone that needed to be tackled, he tackled. Carlos Baleba (Brighton): I was at this game and very rarely do you go to a Premier League match and someone looks a level above both teams. He was running over £50m Kalvin Phillips like he wasn't there. If he can keep that up, he will not be at Brighton much longer. Emile Smith Rowe (Fulham): He's decided to turn into an absolute monster and is just doing his thing. He probably had to leave Arsenal to go to a smaller pond and be that big fish. Anything good that comes out of Fulham is through him. He was excellent.

  Ollie Watkins (Aston Villa): He's had a poor start to the season in terms of chance conversion but not travelling with England probably helped him get a rest in after a long summer. Hopefully those two goals get him up and running. It's a big week with the Champions League so good for him to get off to a flyer. Jean-Philippe Mateta (Crystal Palace): He was a beast and an absolute joy to watch. Big, powerful and obviously scored the decisive goal to get them back on track. He just led the line really well with Eddie Nketiah behind him. A real threat. Erling Haaland (Manchester City): You can't not mention the record man. He's probably going to get 110 goals and 47 hat-tricks this season! He had a tough week with personal issues but came, scored two and even looked frustrated he didn't get a hat-trick.

  Mikel Arteta (Arsenal): He changed the team's style of play because of injuries to key players and still secured a crucial win against their biggest rivals.

