  “Unbelievable - that's why he (Bevan French) is special. He's an unbelievable talent. He's a special player and a pleasure to coach. “Coaches can take no credit for that whatsoever. It's just instinct and it's Bevan knowing his team-mates want to back him “The biggest thing for coaches is we give the players the keys to play. It was a fantastic night for Super League, for Leigh as well." “They’ve come out fresh after a week off and were physical. We made too many errors and compounded the issue, That’s the bottom line. “I’m extremely proud (of the players). They’ve worked really hard to work away into this position tonight, the furthest the club has got in Super League. “We’re not delighted with the result but we’re building. We won the Championship two years ago, the Challenge Cup and finished fifth last year and now we’ve finished fourth, so we’re heading in the right direction."
