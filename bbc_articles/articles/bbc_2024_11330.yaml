title: Conservatives plan to recruit 8,000 new police officers - BBC News
date: '2024-06-10'
section: Politics
url: http://www.bbc.co.uk/news/articles/c8vvyd52e44o
content: |-
  New police powers to seize knives and recover stolen goods are also being proposed.

  The Conservative Party is promising to recruit 8,000 additional police officers over the next three years if they win the General Election. Under the plans, the new neighbourhood police officers would also be given increased powers to seize knives and recover stolen goods. The policing uplift programme would partly be paid for by increasing visa fees and removing the student discount to the Immigration Health surcharge, the party said. Labour said the government had "decimated neighbourhood policing" since coming to power in 2010, describing the pledge as "another empty promise".

  The Tory party suggested the new, "fully warranted" officers would join neighbourhood policing teams across the country - promising the equivalent of one additional police officer for every ward in England and Wales. "Abstraction" of the new recruits - where officers are pulled off their beat to fill gaps elsewhere in the force - would only be permitted in "exceptional circumstances", the Conservatives said. Policing minister Chris Philp told BBC Radio 4's Today programme the new officers would be "dedicated" to neighbourhood policing. "That means policing our local areas and responding to local crime investigation requirements," he added. He said his party had kicked off a "recruitment spree" in 2019 and were now proposing to go "even further". The new police officers would join the 20,000 already recruited since 2019, the Tories added. However, critics say the 20,000 officers recruited since the last general election - as part of a major 2019 election pledge by the Conservatives - had simply replaced the 20,000 officers who left the force between 2010 and 2019, after government funding was cut by 20%. In addition to boosting neighbourhood policing teams, the new measures would strengthen police powers to seize and destroy blades such as "Zombie" knives and machetes, the Conservatives said. Police would also be able to enter premises without a warrant to seize stolen goods such as phones, the party added. Prime Minister Rishi Sunak said: "More bobbies on the beat and increased powers will give police forces the tools they need to drive down neighbourhood crime even further."

  The Conservatives took aim at Labour's pledge to boost local police patrols by 13,000 if they win the general election, claiming only 3,000 officers would be "fully warranted" and "full time". This is because part of Labour's total number of new recruits would be comprised of PSCOs - officers who share some, but not all of the powers afforded to police - as well as special constables, external, who work on a voluntary basis. Labour told the BBC all the positions created under a Labour government would be "full time". The party says it would fund the move by cutting "back-office waste". Yvette Cooper, the shadow home secretary, said: “The Tories have repeatedly promised more police on the beat but instead they have cut 10,000 neighbourhood police, 90% of crimes are going unsolved, prisons are in crisis and more than twice as many people now say they never see the police on the beat."

  She said the Conservatives had costed the policy on the basis of "a fudge that seem to depend on continued high migration which they promised to bring down". Meanwhile, the Liberal Democrats said the Conservatives had funnelled money "into pet projects instead of bobbies on the beat". "6,000 crimes are still going unsolved every day, including three in four of all burglaries and car thefts," Liberal Democrats spokesperson Alistair Carmichael said. "Clearly, the Conservative Party's previous uplift pledge has not delivered the community policing that British people deserve. "What makes these half-baked plans any different?"
