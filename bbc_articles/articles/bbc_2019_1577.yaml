id: bbc_2019_1577
title: No snow for Scotland's ski resorts - BBC News
date: '2019-02-22'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-47337315
content: |-
  A mild winter creates problems for snow sports enthusiasts on Scotland's slopes.

  The "beast from the east" blanketed the country in 2018.

  One year later, those same ski resorts have been left without any snow.
