title: Tyler Kerry was drinking before Turkey lift shaft fall - police - BBC News
date: '2024-12-06'
section: Essex
url: http://www.bbc.co.uk/news/articles/cdr0dvm7rpgo
content: |-
  Turkish police say there is no evidence of "intervention" after he was found dead in a lift shaft.

  Tyler Kerry, 20, died in Turkey after he was found at the bottom of a lift shaft

  A British tourist found in a lift shaft in a Turkey hotel died after falling from the first floor while "under the influence of alcohol", police said. Tyler Kerry, 20, from Basildon, Essex, was discovered a week ago at the Trendy Lara Hotel in Antalya. His younger brother, Mason Read, previously told the BBC he believed Mr Kerry had been murdered. Turkish police said according to statements Mr Kerry had been in drinking in a nightclub before he fell from height and there was no evidence of "intervention" on his body. His grandmother said she was "disgusted" by their response.

  Officers investigating took statements from hotel staff and an autopsy was conducted on Mr Kerry's body. The first autopsy confirmed "there was no intervention" to the outside of Mr Kerry's body, police added. A final autopsy result is expected in two months' time. The lift had been out of use, according to police, and there was "no proof of firearm or sharp object injuries". Mr Kerry's grandmother, Collette Kerry, said she was "absolutely disgusted" by the police's response and handling of the investigation. The family said they had not heard directly from Turkish authorities.

  Mason Read believed his brother had been murdered

  Mr Kerry had been visiting Turkey along with his girlfriend Molly, his grandparents and other relatives on 27 November. They had been enjoying a drink at the hotel bar in the early hours of 29 November when Mr Kerry, who had fallen asleep on a sofa, vanished. Mr Read said he found his brother, who was an office fitter, at the bottom of the lift shaft in the hotel basement during a panicked search. "My brother's been killed, 100%," Mr Read previously said. "I want to see justice for my boy. "It's killing me sitting here thinking of everything that could've happened to him. "Me and the family, we can't cope just living in the dark. We need to know now." The family previously said he was found "flat on his face" with just a pair of boxers and socks on. A spokesperson for the hotel said staff had been supporting the family, but were unable to comment further due to the police investigation.

