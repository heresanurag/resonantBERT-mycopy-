title: Abuse and blackmail - Cassie shares Diddy relationship at trial - BBC News
date: '2025-05-15'
section: General
url: http://www.bbc.co.uk/news/videos/c04e74x6g21o
content: |-
  The prosecution wrapped up its questioning of Ventura, who will return to the stand on Thursday for cross-examination by Combs' lawyers.

  R&B singer Casandra Ventura, known as Cassie, gave her second day of testimony as the prosecution's key witness in the federal sex-trafficking trial of Sean "Diddy" Combs.

  Ventura detailed beatings and sexual violence she says she experienced during the relationship and described the toll it took on her mental and physical health.

  The BBC's Nada Tawfik runs through the key points in Ventura's testimony, so far.

  You can find organisations offering mental health support and advice through the BBC Action Line. Help and support outside the UK can be found at Befrienders Worldwide, external, external or you can call the US Suicide and Crisis Lifeline on 988.
