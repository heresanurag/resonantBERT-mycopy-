title: Fraudster repays £86,000 stolen from friend's cancer charity - BBC News
date: '2025-03-06'
section: Tayside & Central Scotland
url: http://www.bbc.co.uk/news/articles/c99n4d1y38lo
content: |-
  Lindsay MacCallum defrauded £86,000 from Rainbow Valley and £9,505 from the Anthony Nolan Trust.

  Lindsay MacCallum (right) stole money donated in memory of her friend Angela MacVicar's (left) daughter

  A woman who stole £86,000 from a cancer charity set up in memory of her best friend's daughter has repaid the money. Lindsay MacCallum defrauded Rainbow Valley after launching it with Angela MacVicar. She also embezzled £9,505 from her former employer, the Anthony Nolan Trust. Falkirk Sheriff Court heard MacCallum had fully reimbursed both charities before the payment deadline. The fraudster, who did not appear in court, was jailed last October for three years.

  After the hearing Ms MacVicar told BBC Scotland News: "She's put me through three years of hell. "Nobody believed she was ever capable of this. "I miss the person I thought she was but she never was that. "It's just time to move on and look to the positives, and the people we can actually help."

  MacCallum, of Aberfoyle, near Stirling, had worked as a fundraising manager for the Anthony Nolan Trust from 1995 to 2012 before she left to set up Rainbow Valley with Ms MacVicar. The foundation was launched in memory of her daughter, Johanna, who died from leukaemia in 2005. The court previously heard MacCallum had already paid back £25,000 of the stolen money. Ms MacVicar feared that if a criminal confiscation order was granted, the remainder of the cash owed would have gone to the Treasury. But instead a compensation order was put in place so any money would go back to the charities. And on Wednesday it was confirmed the remaining outstanding funds - £60,000 to Rainbow Valley and £9,505 to the Anthony Nolan Trust - had been paid.

  The court previously heard MacCallum was given a charity credit card in 2014 to replace using a Friends of Rainbow Valley bank account. But the account remained in use and it was not until August 2022, after a row between the friends, that questions were raised over transactions from this account. MacCallum, a former Royal Navy servicewoman, pleaded guilty to two fraud charges totalling £95,483. Last year the court heard she forged signatures of charity staff and rerouted cash from fundraising accounts for her own use between 2011 and 2021. MacCallum was told by a sheriff she had "systematically and deliberately" perpetrated "calculating" frauds on the third sector organisations.
