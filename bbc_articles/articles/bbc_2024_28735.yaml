content: |-
  While on the campaign trail in 1994, the Labour stalwart lived up to his man of the people reputation.

  Labour stalwart and former deputy prime minister John Prescott has died at the age of 86.

  On the campaign trail for the party leadership in 1994, he lived up to his man of the people reputation by downing a pint in five seconds while visiting a working men's club.

  He ultimately lost the contest to Tony Blair but nonetheless proved his unique ability to connect with voters, going on to serve as Blair's deputy for a record 10 years.
