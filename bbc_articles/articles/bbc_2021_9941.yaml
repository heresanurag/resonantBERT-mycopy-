content: |-
  USA's Sydney McLaughlin smashes her own world record as she takes gold in the women's 400m hurdles at the Tokyo Games.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The USA's Sydney McLaughlin smashed her own world record with a sensational run as she took Olympic gold in the women's 400m hurdles at the Tokyo Games. McLaughlin, 21, powered down the home straight to finish in 51.46 seconds as she shaved almost half a second off the old mark to reel in compatriot and rival Dalilah Muhammad. The Netherlands' Femke Bol took bronze behind the reigning world champion. In a race featuring five personal bests, McLaughlin's blistering time lowered the mark she set at the US trials in June, when she clocked 51.90. "I can't really get it straight in my head yet. I'm sure I'll process it and celebrate later," McLaughlin said. After a near 16-year period of the record remaining intact, Muhammad and McLaughlin have now exchanged the world best on four occasions in two years.

  McLaughlin superbly judged her effort in chasing down Rio 2016 champion Muhammad, who set the early pace and still held a slim advantage over the final hurdle. "The race doesn't really start until hurdle seven. I just wanted to go out there and give it everything I had," added McLaughlin. "I am grateful to be out here celebrating that extraordinary race and representing my country. I saw Dalilah ahead of me with one to go. I just thought, 'run your race'. The new women's best follows Norway's Karsten Warholm obliterating his own world record in the men's 400m hurdles on Tuesday.

