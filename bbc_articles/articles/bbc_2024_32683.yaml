content: |-
  Stephanie Hill, a former Miss England, says her stalker sent hundreds of messages.

  'I lost a year of my life when stalker moved to UK'

  Stephanie Hill, 29, said she lost a year of her life due to the ordeal

  A former Miss England who said her stalker moved from India to the UK to be closer to her has voiced her support for new government proposals. Stephanie Hill, from Derbyshire, said she lost a year of her life when she was sent hundreds of messages by Dhawal Chaudhary over 11 months from May 2020. Chaudhary, now 29, was arrested and later sentenced to a hospital order at Derby Crown Court in May 2022 after admitting stalking and harassment. This week, the proposed "right to know" statutory guidance was announced, which the government said would inform stalking victims of their abuser's identity at the earliest chance.

  Stephanie Hill: "I would block him, then he started creating more profiles"

  Ms Hill, who was crowned Miss England 2017, said although she knew the identity of her stalker, she welcomed the news, describing it as the "beginning of a lot of change". Talking about her experience, the 29-year-old told the BBC that as Miss England she was required to have social media profiles to promote work she was doing. "Sadly this has a global reach and some of the work we were doing did catch the attention of a gentleman internationally," she said. Ms Hill, who works in healthcare, said what transpired was "horrendous", as the man began to stalk her and her family. "He decided to make the move from his home country over to the UK to be in closer proximity. "He tried to get involved in my career and get me fired from my work." She would block him online but he created about 50 new social media accounts to continue contacting her, she said.

  Ms Hill said she was "constantly looking over" her shoulder

  She said "everything changed" when Chaudhary moved to the UK. "All of a sudden he could find us at any moment." He also tried to incite other people to act on his behalf, Ms Hill said. "So that anonymous element really came into effect because he could have spoken to someone willing to intimidate on his behalf, or willing to carry out any kind of harmful activity. "You never knew who you were passing in the street," she added. "I lost a year of my life. I don't remember a lot because of the trauma. You just survive." Ms Hill says the new proposal would give victims of stalking "more agency in the process". She added: "For people who are dealing with anonymous stalkers, the whole principle of stalking is they feel entitled to that person's time, their life, a relationship with them. "That is where the victim feels incredibly powerless. "If that victim is allowed to know at the earliest opportunity who that is, it gives them a bit more agency in the process and puts a face to the name, and takes some of that power away from the person doing the stalking." Chaudhary, of no fixed abode, was handed a hospital order "until further order", as well as restraining and restriction orders. If you have been affected by any of the issues in this article, you can visit the BBC's Action Line.

