title: Three men badly hurt as crashed pick-up overturns in Trethomas - BBC News
date: '2019-04-06'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-47837487
content: |-
  Three men have been seriously injured in a crash after previously failing to stop for police.

  The white pick-up truck overturned in the crash

  Three men have been seriously hurt in a car crash after they had earlier failed to stop for police in the early hours.

  The men have been taken to hospital after the Mitsubishi L200 pick-up truck they were in crashed, shutting the main road between Newport and Caerphilly.

  The car failed to stop for police twice after officers had initially tried to pull them over in the Adamsdown area of Cardiff at 04:00 GMT on Saturday.

  The car was found overturned after a crash on the A468 near Machen.

  The three men were found near the crashed white pick-up after it came off the road and overturned in woodland near the main road between Machen and Trethomas in Caerphilly county.

  The casualties were taken to the Royal Gwent Hospital in Newport with serious but non life-threatening injuries.

  Gwent Police said the pick-up truck has been recovered and the road has since re-opened.

  The main road between Newport and Caerphilly has re-opened since the crash

  The force said the car had been seen travelling at speed on the A48 road near Newport before the one-vehicle crash at about 05:30.

  Officers say the men are helping with their enquiries.

  Newport Road between Trethomas and Machen was closed in both directions for seven hours as police examined the scene near the Waterloo road junction at a place known locally as Ash Tip Bend.
