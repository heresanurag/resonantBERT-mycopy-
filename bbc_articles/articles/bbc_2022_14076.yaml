  Fiona Bruce presents topical debate from Cheltenham in Gloucestershire. On the panel, Graham Stuart MP, Jess Phillips MP, Tony Danker, Rachel Johnson and Camilla Cavendish.

  Fiona Bruce presents topical debate from Cheltenham in Gloucestershire. On the panel, Graham Stuart MP, minister of State for Climate; Labour’s shadow minister for Domestic Violence and Safeguarding, Jess Phillips MP; the director general of the Confederation of British Industry, Tony Danker; columnist and broadcaster Rachel Johnson; and Camilla Cavendish, former director of policy for prime minister David Cameron. Also live on iPlayer at 2000.
