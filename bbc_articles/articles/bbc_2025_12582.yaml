title: Brothers jailed after Luton machete attack on policeman - BBC News
date: '2025-06-23'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/cgq71p1v8edo
content: |-
  The pair are jailed after an off-duty officer is attacked while out shopping in a town centre.

  Humar and Hannan Mahmood left their victim with a stab wound to the chest

  Two robbers have been jailed after attacking an off-duty police officer with a machete who confronted them while out shopping. Brothers Hannan Mahmood, 20, and Humar Mahmood, 19, attacked PC Darren Attwood in a pedestrianised area in Luton town centre on Saturday, 2 November. The pair, both of Belmont Road in the town, admitted assault with intent to cause grievous bodily harm, robbery, possession of a bladed article in a public place, and dangerous driving. They were jailed for seven years each at Luton Crown Court and Metropolitan Police Commissioner Sir Mark Rowley hailed PC Attwood's "bravery".

  Judge Allison Hunter said PC Attwood, who works for the Met Police, needed to be commended - and gave him a High Sheriff's Award, external and the sum of £500. Children were in the area when the "highly dangerous" attack took place, she added.

  To play this video you need to enable JavaScript in your browser. This video can not be played The attack, in daylight on a Saturday in the town centre, was captured on CCTV

  Barrister Jonathan Mole, prosecuting, told the judge the two brothers were armed with machetes and had robbed a man of his dirt bike, external, which was worth about £1,000. Mr Mole said PC Attwood identified himself as a police officer when he approached the pair.

  CCTV footage from the town centre was shown in court as well as footage of the victim recounting events while in hospital. Humar Mahmood could be seen to produce a machete and swing it at PC Attwood. As he backed away, the brothers then rode towards him before riding off, having left the officer with a stab wound to the chest.

  The off-duty officer suffered injuries to his chest during the confrontation in front of Luton Town Hall

  PC Attwood said he did not know at the time the pair had committed a robbery. The Met officer said he had photographed the brothers and pulled down some plastic barriers in front of their bikes in an attempt to stop them escaping and he felt "lucky to be alive". Describing the attack, former soldier PC Attwood said: "I felt one [blow] on my arm. "The second one [said] 'just... kill him' and I thought 'this is not ideal' [but] I cannot let [them] get away." Pc Attwood said after the hearing: "There is a saying that the police are never off duty and in my case at this time, that was true."

  The judge heard the brothers had previous convictions - Humar for wounding and knife offences; Hannan for robbery and assault. Hannan had been given a nine-month custody sentence in 2024 and had been released on licence when he attacked PC Attwood.

  PC Darren Attwood was praised for his action while he was off-duty and out shopping

  Barrister Kevin Molloy, for Humar, said his client's behaviour could be a reaction to bullying suffered at school. He told the judge: "The violence was in an attempt to get away rather that just attacking someone for the sake of it." Mr Molloy said Humar had taken "responsibility" by pleading guilty. Marcus Rickard, for Hannan, said PC Attwood had been "heroic" and there was no doubt the brothers behaviour was "appalling". He said Hannan had also suffered "horrific" bullying at school and been diagnosed with post-traumatic stress disorder (PTSD), external. Mr Rickard said Hannan was a "very conflicted young man" but added: "There is a good person in there."

  Sir Mark said: "PC Attwood's actions demonstrated the very best of policing – bravery, dedication, a commitment to service and a passionate drive to protect people. "All of us at the Met are incredibly proud to call him a colleague." Det Insp Caeva Taylor, from the Bedfordshire, Cambridgeshire and Hertfordshire Major Crime Unit, said his "bravery" helped her team gather evidence: "PC Attwood risked his life to protect the public."

