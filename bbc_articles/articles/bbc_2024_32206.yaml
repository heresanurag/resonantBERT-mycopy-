content: |-
  The money is the "first step" towards major Send reforms, the education secretary tells BBC News.

  Schools given £740m to adapt buildings for Send pupils

  Education Secretary Bridget Phillipson says funding will help mainstream schools adapt buildings for Send pupils

  The government has announced £740m of funding to increase the number of places for pupils with special educational needs and disabilities (Send) in mainstream schools in England. ​​The money, part of the £6.7bn of education spending announced in the Budget, will be targeted towards adapting school buildings to make them more accessible. ​​In October, the National Audit Office (NAO) said parents had lost faith in a Send system “in urgent need of reform”. ​​Education Secretary Bridget Phillipson told BBC News she "hears the frustration" of parents but significant changes would take time.

  BBC News analysis suggests the number of Send pupils in mainstream education in England has increased by a third since the 2015-16 academic year. At Brighouse High School, in West Yorkshire, head teacher Richard Horsfield worries about not having enough funding to support pupils with Send - in terms of both educational support and capital spending on the school building. The school supports them well - but more money is needed.

  Head teacher Richard Horsfield says the school cannot afford to fix its broken lift

  Over the summer holidays, the school spent about £10,000 on building adaptations, such as handrails and accessible bathrooms, for incoming students, making a “big dent” in its budget. But the school lift remains broken and would cost about £250,000 to fix, which there is “absolutely no way” the school can afford. And this means one wheelchair-using pupil has to go outside and through car parks to reach some classrooms. “On wet December mornings, it's just not good enough,” Mr Horsfield says. But he still believes most children with Send should be in mainstream schools and sees them "flourishing" when they have the right support. “We should be supported to do that at a level that we want to do that at,” Mr Horsfield says. “We are being constrained at the moment, due to the lack of funding and lack of resources.” Over the past few years, the number of learning support assistants at the school has nearly halved and fewer pupils are able to access specialist counselling from outside services. But the school still provides specialist workshops for those needing extra support, both for academic lessons and social, emotional and mental health.

  Charlie, Freya and their Send co-ordinator, at Brighouse School

  Pupil Charlie says he could not attend school at all without the Send support he receives. “I can’t concentrate at all by myself," he says. "I would just daydream, do nothing, and I'd probably get told off a bunch." Fellow pupil Freya says access to a nurturing space helps her calm down. “It helps me because sometimes I don’t really want to be around a lot of people,” she says. “I’ve got loads of supportive teachers I can trust.” Phillipson told BBC News the £740m was “to make sure we have the right specialist provision in place”.

