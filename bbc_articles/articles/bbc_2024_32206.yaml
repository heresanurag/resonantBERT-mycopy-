  The money would be used to adapt classrooms and create SEN units that delivered more intensive specialist support, the Department for Education said. Increasing funding alone was not enough, Phillipson said, but large-scale reform would take time. “Just putting more money in the system without reforming it isn’t the answer,” she said. “What I’m also keen to make sure we do is reform the system overall. “I know it’s frustrating but it’s so important we get it right.” The government says children with Send should be able to go to school closer to home and wants more of them to remain in mainstream education. “We've had schools that have done excellent work to put in place that provision but they didn't have government backing to do it - and that’s what we have to change,” Phillipson added.

