title: Nigel Farage's Reform UK commits to reinstating winter fuel payment - BBC News
date: '2025-05-25'
section: Politics
url: http://www.bbc.co.uk/news/articles/cvg9v0ylv8vo
content: |-
  Reform UK also plans to scrap the two-child benefit policy, as part of plans to outflank the government.

  Nigel Farage has backed scrapping the two-child benefit cap and reinstating winter fuel payments

  Reform UK has said it will fully reinstate winter fuel payments to pensioners and scrap the two-child benefit cap, if the party gets into government. The commitments - to be unveiled at a news conference next week - come after Prime Minister Sir Keir Starmer faced pressure from Labour MPs to change his approach to both policies. By the time of the next general election there may be no need to reverse either policy. Sir Keir has already announced plans to ease cuts to winter fuel payments - without saying when or how. And ministers say he has privately indicated he would like if possible to find a way to scrap the two-child benefit cap - although a formal decision may be many months away.
