title: Attacked Middlesbrough couple facing jail in Thailand - BBC News
date: '2025-03-11'
section: Tees
url: http://www.bbc.co.uk/news/articles/cy5nqzwddxgo
content: |-
  The pensioners, who emigrated in 2021, are charged over a neighbour dispute that left them injured.

  Desmond and Mary Byrne were counter sued after being attacked by neighbours

  A couple who retired to Thailand said they have been told to prepare to be sent to prison after they were attacked by neighbours. Mary Byrne, 69, and her husband Desmond, 77, who emigrated from Middlesbrough in 2021, said they became embroiled in a dispute with a younger couple over access and a small garden. In December 2023 the Byrnes were alerted to a commotion in their garden but found themselves being kicked and punched in an incident which was caught on CCTV. Their neighbours were prosecuted, but now Mr and Mrs Byrne have been charged themselves and said they have been told by the British Embassy the outcome could go "either way".

  Mrs Byrne said their neighbours were Thai kickboxers and that the woman "continually stamped on my head" while her husband was "ferociously thumped 22 times". "At one stage Des did kick his leg up in defence and as far as we know he did not have contact," she said. "I strongly believe, 100%, it was in defence." After initially denying charges, the younger couple are understood to have pleaded guilty. But in May last year Mr and Mrs Byrne were called to a police station and told they were being charged with injuring their neighbours.

  Mrs Byrne said her head was stamped on while her husband was "thumped 22 times".

  The Byrnes said they had their fingerprints taken and passports confiscated. "We were extremely shocked," Mrs Byrne said. "The superficial injuries to both of these people is laughable." The couple are due back in court on Wednesday to learn the outcome, but said they "feel trapped" waiting. "We can't get out, we can't leave. So in one way or another, we feel trapped," Mrs Byrne said.

  Luke Myer, the couple's former MP, told BBC Radio Tees: "I'm doing everything I can to raise Mary and Desmond's case with the Foreign Office. "Of course, it is a matter for the Thai legal system and we can't interfere with that. "I think raising the profile of the issue is really important to make sure they are treated fairly and ultimately they are able to come home." A Foreign Office spokesperson said they are supporting two British nationals in Thailand and are in touch with the local authorities. "We are not pessimistic, we both know we've done nothing wrong," said Mrs Byrne. "But we have to prepare for whatever they're going to do for us."

