title: Red Arrows take dramatic flight over Niagara Falls on Canada tour - BBC News
date: '2024-09-14'
section: General
url: http://www.bbc.co.uk/news/videos/ce3137lr03lo
content: |-
  The RAF display team is helping celebrate the centenary of the Royal Canadian Air Force.

  The Red Arrows have performed a colourful flypast at Niagara Falls as part of their tour of Canada.

  The five-week Maple Hawk tour is marking the Royal Canadian Air Force’s centenary.

  Susannah Goshko, the UK's high commissioner to Canada, said: "It’s fantastic that on the 100th anniversary of the RCAF, the Red Arrows have chosen to come to Canada to celebrate our shared military ties."

  Based at RAF Waddington, Lincolnshire, the Red Arrows have also taken part in displays at the Air Show Atlantic in Nova Scotia and the Canadian International Airshow in Toronto as part of their trip.

  This year marks the 60th anniversary of the display team, officially called the Royal Air Force Aerobatic Team.
