  Kalani Smith, from Tennessee, reviews staples of British cuisine to his three million followers.

  Viral US TikToker's mission to prove British food isn't bland after all

  US TikToker Kalani Smith, from Mount Juliet, Tennessee, reviews British food to millions of viewers on his social media

  A TikTok star from a small city in Tennessee has made it his mission to show the world British food is not all that bad. Food reviewer Kalani Smith, who goes by Kalani Ghost Hunter (KGH) online, racks up millions of views posting his reviews on social media - from Welsh cakes to Greggs. After initially building up a following investigating the paranormal, a pivot to reviewing British culinary staples has seen Mr Smith's follower count balloon to more than three million on TikTok alone. Having recently toured south Wales, Mr Smith boldly declared Cardiff Market's food beats London's Camden Market's "10 times out of 10".

  “The most interesting thing about this journey... is that the perception around the world, especially in the US, is that the food in the UK is bland, it's bad," said Mr Smith. “I think my whole objective up until this point has been is to document that this is not the case. "There's obviously things that are not good in every country, but there's also some things that are absolutely incredible."

