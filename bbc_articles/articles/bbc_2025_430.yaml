  In the Newsnight interview, the prince said he had not seen or spoken to Epstein since December 2010, when he visited the financier's home in New York. The duke said this meeting was to end their relationship. However, documents from a separate court case released on Friday suggested they were in touch via email in February 2011. The case involves the Financial Conduct Authority (FCA) and banker Jes Staley, who was banned from senior positions after he mischaracterised his relationship with Epstein. Staley is appealing against the FCA, but the financial watchdog's evidence about Staley's contact with Epstein also contains emails relating to a "member of the British Royal Family", showing what seem to be friendly and familiar exchanges. According to the court documents, on 27 February 2011, Epstein emailed: "jes staley will be in London on next tue afternoon, if you have time," in messages first reported by business news agency Bloomberg. There was a reply from the "member of the British Royal Family" with a question: "Jes is coming on 1st March or next week?" The court documents said there was a "discussion of press articles" and then the message: "Keep in close touch and we'll play some more soon!!!!" Prince Andrew is believed to have first met Epstein in 1999, with the financier attending parties on royal estates between 2000 and 2006. In 2008, Epstein was convicted in the US for procuring a minor for prostitution and was sentenced to 18 months in prison. In July 2019, Epstein was arrested on charges of the sex trafficking of minors. He died in prison in August 2019 while awaiting trial. In November that year, Prince Andrew was interviewed by Newsnight and in the subsequent fallout stepped down from royal duties.

  This has been another bad day for Prince Andrew. With some spectacular understatement, his close aide has been revealed as telling an alleged Chinese spy that the prince's appearance on Newsnight had been "unsuccessful". That could sum up much of the following years, as he's become an increasingly isolated figure, no longer a working royal. The King, his brother, has cut him off financially, and there has been such pressure on him to move out of his Windsor mansion that it has been called the Siege of Royal Lodge. The latest claims about his links to Jeffrey Epstein and his Chinese business connections will add to questions about his judgement. Buckingham Palace will once again be alarmed by details such as the claim to the alleged spy that they had "found a way to get the relevant people unnoticed in and out the house in Windsor". The Duke of York's office has been contacted for comment.
