title: Two hurt in Glasgow St Enoch Christmas market gas explosion - BBC News
date: '2022-12-05'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-63861339
content: |-
  Emergency services were called to the market on St Enoch Square in Glasgow at about 11:00.

  The market on St Enoch Square was sealed off following the gas explosion

  Two people have been hurt in a gas canister explosion at a Christmas market in Glasgow.

  Emergency services, including three fire engines, were called to St Enoch Square following reports of the incident at about 11:00.

  The Scottish Fire and Rescue Service said the two casualties were handed into the care of the Scottish Ambulance Service.

  Police sealed off the area while they were taken to Glasgow Royal Infirmary.

  A Police Scotland spokesperson said: "Work is ongoing to establish the full circumstances."
