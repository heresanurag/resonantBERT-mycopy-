title: Royals follow Queen's coffin on sombre journey - in pictures - BBC News
date: '2022-09-15'
section: In Pictures
url: http://www.bbc.co.uk/news/in-pictures-62905962
content: |-
  Royals follow in procession as Queen Elizabeth II leaves Buckingham Palace for the last time.

  In a slow and sombre procession, the Royal Family has followed the Queen's coffin from Buckingham Palace to Westminster Hall. Mournful music played during the ceremonious cortege, as guns were fired in Hyde Park and Big Ben was tolled every minute.
