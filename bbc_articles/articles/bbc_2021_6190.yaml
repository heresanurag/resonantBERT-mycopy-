  With Priti Patel MP, Nick Thomas-Symonds MP, Dr Jenny Harries and Dame Esther Rantzen.

  Andrew Marr is joined by Priti Patel MP, Nick Thomas-Symonds MP, Dr Jenny Harries and Dame Esther Rantzen. The newspapers are reviewed by Chris Mason and Kate Garraway.

  Andrew Marr is joined by home secretary Priti Patel MP, shadow home secretary Nick Thomas-Symonds MP, UK Health Security Agency chief executive Dr Jenny Harries, and broadcaster Dame Esther Rantzen. The newspapers are reviewed by BBC political correspondent Chris Mason and presenter of ITV's Good Morning Britain Kate Garraway.
