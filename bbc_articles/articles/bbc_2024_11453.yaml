  A laptop abandoned by Hunter at a Delaware repair shop, and the seedy contents of its hard drive, also featured prominently in the 2020 presidential campaign. The Biden team argued at the time it was a "smear campaign" engineered by Russian disinformation, but the hard drive has been authenticated by US media and the FBI has it. Analysis of its contents has provided proof of Hunter's extensive earnings from his work in China and Ukraine, as well as evidence of his alcohol- and drug-fuelled escapades. As the president revs up his re-election campaign, the extensive fallout from his son's legal drama, business interests and tabloid-friendly life is proving to be an unwelcome distraction.
