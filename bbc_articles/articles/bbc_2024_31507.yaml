  Campaigners from the Labrats International group met Sir Keir Starmer in July 2021 when he was leader of the opposition

  More than 20,000 military personnel served as part of UK nuclear weapons tests during the 1950s and 60s in Australia, Fiji and other Pacific islands, with an estimated 1,500 still alive. Thousands have suffered cancers and other conditions, while some of their children have been born with disabilities. Campaigners say evidence suggests these illnesses were caused by exposure to radiation during tests - and that the UK military knew at the time the risk it was subjecting people to. The Ministry of Defence has long insisted research has found no link between the tests and ill health or genetic defects in children, and that no records have been withheld. But campaigners have renewed their calls for compensation following the emergence of new potential evidence. Back in 2019, then-Labour leader Jeremy Corbyn pledged £50,000 for each surviving British nuclear-test veteran. His successor, Sir Keir Starmer, met campaigners in 2021 but has made no promises on payouts. The government says it is listening to the concerns of veterans - but whether this results in financial compensation remains to be seen.
