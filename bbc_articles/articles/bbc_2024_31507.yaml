  Although homosexuality started to be decriminalised in the UK in 1967, it was illegal for gay people to serve in the British military until 2000. An independent report in 2023 detailed decades of homophobia and bullying, with those perceived to be gay often subjected to abusive investigations and medical examinations before being discharged. The previous Conservative government accepted the report's recommendation of compensation for those impacted by the ban. Earlier this month the new Labour administration announced LGBT veterans who were dismissed from the armed forces for being gay would be eligible for up to £70,000 each. The total amount available for payouts has increased from the £50m initially proposed by the report, to £75m. Up to 4,000 veterans are expected to be eligible, according to the National Audit Office.
