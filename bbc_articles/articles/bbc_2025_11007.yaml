title: Sotheby's postpones Buddha jewels auction after India threatens legal action
  - BBC News
date: '2025-05-08'
section: Asia
url: http://www.bbc.co.uk/news/articles/ce9299nln2ko
content: |-
  The jewels are described as one of the most astonishing archaeological finds of the modern era.

  A screen displays an image of the Piprahwa gems at the auction house Sotheby's in Hong Kong.

  The auction house Sotheby's has postponed its sale in Hong Kong of hundreds of sacred jewels linked to the Buddha's remains, after a threat of legal action by the Indian government. The sale of the collection - described as one of the most astonishing archaeological finds of the modern era - had drawn criticism from Buddhist academics and monastic leaders. India had said it offended the global Buddhist community. Sotheby's said the suspension would allow for discussions between the parties. A British official named William Claxton Peppé unearthed the relics in northern India nearly 130 years ago, alongside bone fragments identified as belonging to the Buddha himself.

  The auction of the collection, known as the Piprahwa Gems of the Historical Buddha Mauryan Empire, Ashokan Era, circa 240-200 BCE, was due to take place on 7 May. In a letter to the auction house two days earlier, the Indian government said that the relics constituted "inalienable religious and cultural heritage of India and the global Buddhist community. Their sale violates Indian and international laws, as well as United Nations conventions". A high-level Indian government delegation then held discussions with Sotheby's representatives on Tuesday. In an emailed statement, Sotheby's said that in light of the matters raised by India's government "and with the agreement of the consignors, the auction ... has been postponed". It said updates on the discussions would be shared "as appropriate". Notice of the gems sale had been removed from its auction house by Wednesday and the website page promoting the auction is no longer available.
  • None Jewels linked to Buddha remains go to auction, sparking ethical debate

  William Claxton Peppé was an English estate manager who excavated a stupa at Piprahwa, just south of Lumbini, the believed birthplace of Buddha. He uncovered relics inscribed and consecrated nearly 2,000 years ago. The findings included nearly 1,800 gems, including rubies, topaz, sapphires and patterned gold sheets, stored inside a brick chamber. This site is now in the state of Uttar Pradesh. Sotheby's had said in February that the 1898 discovery ranked "among the most extraordinary archaeological discoveries of all time".
