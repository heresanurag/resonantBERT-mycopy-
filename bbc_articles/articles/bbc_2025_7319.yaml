title: ChatGPT maker wants to buy Chrome from Google - BBC News
date: '2025-04-23'
section: Technology
url: http://www.bbc.co.uk/news/articles/c1dr6neg766o
content: |-
  An OpenAI executive told a US judge the company would be interested in buying the popular browser.

  ChatGPT-maker OpenAI would be interested in buying Chrome, the world's most popular browser, if Google was forced to sell it. Nick Turley, an executive at the artificial intelligence (AI) company, was testifying on behalf of the US government in an ongoing monopoly trial against Google. The US wants the tech giant to be broken up, arguing it has too much dominance in the online search market. But Google says Chrome is not for sale and has called for the antitrust lawsuit to be thrown out.

  It is estimated that around 64% of people online use Chrome, according to analytics company Similarweb., external The next most popular browser, Apple's Safari, is used by 21% of people. Mr Turley was testifying at the trial in Washington DC, the latest in a series of cases brought by the US Department of Justice (DOJ) against big tech dominance in social media, searching the internet and AI. Last year, the court ruled Google had a monopoly in online search, while last week it was ruled to have an illegal monopoly in online advertising technology. Google says it will appeal both decisions. Its head of regulatory affairs, Lee-Anne Mulholland, said in a blog, external the government's proposals "would hurt America's consumers, economy, and technological leadership".

  The current trial is looking at remedies to curtail Google's dominance in online search, as the recent explosion in generative AI services such as ChatGPT has expanded the market. Newer AI models search the internet to improve results and reduce hallucination, which has been a problem from developers since chatbots started to become popular. Last year, OpenAI offered to do a deal with Google which would have integrated Google search results into ChatGPT, according to Mr Turley's testimony. But he says their offer was rejected. "We have no partnership with Google today," Mr Turley said, according to Reuters., external OpenAI does however have a partnership with Microsoft, which makes the Bing search engine and Edge browser. Meanwhile, Google has its own suite of generative AI products such as Gemini - a direct competitor to ChatGPT. The trial is expected to last three weeks and other big tech companies - including Meta, Amazon and Apple - will be keeping a close eye on it, given they are also facing their own monopoly lawsuits from the DOJ. Separately, reports in the past week suggest OpenAI is looking into creating its own social network. The Verge reported, external the project is "still in early stages," but the company and its boss Sam Altman have privately been asking for feedback on a potential rival to X. OpenAI boss Sam Altman and X boss Elon Musk used to be business partners until a bitter falling-out over the direction of OpenAI a few years ago. X has its own AI tool Grok, which it has integrated into the social platform.
