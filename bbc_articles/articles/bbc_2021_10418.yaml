title: 'UK renewable energy: Major expansion confirmed on Humber - BBC News'
date: '2021-08-09'
section: Humberside
url: http://www.bbc.co.uk/news/uk-england-humber-58143027
content: |-
  The government says the Humber region is key to the growth of the UK's offshore wind industry.

  Siemens Gamesa's current blade factory will be doubled in size

  A wind turbine blade factory in Hull is to be doubled in size after the government confirmed it would provide financial support for the expansion.

  Siemens Gamesa said the £186m upgrade to its Alexandra Dock site, the UK's largest offshore wind manufacturing facility, would create 200 jobs.

  The scheme, first outlined in February, is set to be complete by 2023.

  It will receive a grant from a £160m fund but the government has not yet revealed the exact amount.

  The Hull plant, which has manufactured more than 1,500 offshore wind turbine blades since it opened in 2016, currently employs about 1,000 people.

  The giant turbines are used in wind farms being constructed in the North Sea, as well as exported around the world.

  They are currently being supplied to the 1.4-gigawatt Hornsea Two project off the Yorkshire coast which will be the world's largest offshore wind power plant, powering the equivalent of 1.3 million homes.

  The expansion will help Siemens Gamesa prepare for the next generation of wind turbine blades

  Hull City Council leader Daren Hale said the decision was "fantastic news" for the city, which he said was at the "forefront of the green economy revolution".

  "This additional £186m investment will create hundreds more jobs, and the expansion will support the recovery of the city post-Covid," he added.

  Prime Minister Boris Johnson, who has previously pledged to power every home in the UK via offshore farms, said: "The Humber region embodies the UK's green industrial revolution, with new investment into developing the next generation of wind turbines set to create new jobs, export opportunities and clean power across the country.

  "With less than 100 days to go until the climate summit Cop26, we need to see more countries embracing new technologies, building green industries and phasing out coal power for a sustainable future."

  Clark MacFarlane, Siemens Gamesa's UK managing director, said: "Our investment in our existing offshore blade factory, logistics, and harbour facilities in Hull has been a key driver of the growth of the UK's world-leading offshore wind industry."

  Meanwhile, it was announced that a further £78m will be invested by GRI Renewable Industries (GRI) to build a wind turbine tower factory at the Able Marine Energy Park, at Killinghome, North Lincolnshire.

  The company said it would create 260 jobs at the site which lies on the other side of the Humber estuary.

  Rob Waltham, leader of North Lincolnshire Council, said he was delighted the company had chosen Killinghome as its base.

  "This latest development will create even more well-paid sustainable jobs - helping to create a more prosperous future," he said.

  GRI is the second company to commit to the planned energy park at Killinghome

  Business Secretary Kwasi Kwarteng said the Humber region was "vitally important" for the growth of the UK's offshore wind industry.

  "Our announcement backed by private investment will give a boost to this important industrial heartland, creating and supporting thousands of good quality jobs across the region while ensuring it is on the frontline of developing the next generation of offshore wind turbines."

  The announcement comes as the UN's Intergovernmental Panel on Climate Change (IPCC) publishes the first of a series of reports on climate change.

  It says humanity's damaging impact on the climate is a "statement of fact" and action is urgently needed to cut emissions to avert a "climate catastrophe".

