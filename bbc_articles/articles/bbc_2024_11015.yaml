id: bbc_2024_11015
title: Moment Edinburgh tenant records rent row on secret video - BBC News
date: '2024-05-08'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-68088938
content: |-
  Jason Chen secretly recorded a video of a row during which a man is seen waving a stool toward him.

  A tenant has told of the moment he was confronted by a man he believed to be his landlord during a row over a rental payment.

  Jason Chen secretly recorded a video of the incident where the man is seen waving a stool during the dispute over Mr Chen's Edinburgh flat going without hot water for 28 days.

  Mr Chen told BBC News he believes the man in the video is flat owner and controversial businessman Mark Fortune.

  Mr Fortune denied this and said he was at the dentist in France at the time.
