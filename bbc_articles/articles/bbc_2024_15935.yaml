content: |-
  Eminem now joins Taylor Swift, David Bowie, and U2 with 11 chart-topping albums.

  Eminem's latest album becomes his 11th number one

  The Death of Slim Shady (Coup de Grâce) is the US rapper's 12th album

  Eminem has earned his 11th number one album with The Death of Slim Shady (Coup de Grâce). He joins a club of Taylor Swift, David Bowie, and U2, who have also had 11 chart-topping albums. The US rapper’s 12th album – in which, he kills off his alter ego, Slim Shady – had a mixed critical reception. But that doesn’t seem to have mattered this week on the charts. Houdini, from the album, is number four on this week’s singles charts – it previously reached number one last month.

  Ahead of its release, Eminem told fans The Death of Slim Shady was a "conceptual album" and the songs should be listened to in order. Taylor Swift’s The Tortured Poets Department is still second on the albums chart, with popstar Griff making a new entry at number three, with debut album Vertigo.

  Meanwhile, in the singles chart, Sabrina Carpenter’s summer smash hit Espresso has hit number one for the seventh time. And she’s also at number two on the singles chart, with Please Please Please. Both songs will feature on her forthcoming album Short ‘n Sweet, set to be released in August. The only other female artists to have held the number one and two spots simultaneously are Madonna (in 1985) and Ariana Grande (2019). A Bar Song (Tipsy) by Shaboozey is at three. And Eminem’s Houdini – from The Death of Slim Shady (Coup de Grâce) – is fourth on the singles chart. And while England might not have won the Euros, the tournament has seen David Baddiel, Frank Skinner and The Lightning Seeds Three Lions hit number eight.
