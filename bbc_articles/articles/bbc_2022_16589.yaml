title: CCTV shows thieves driving away cars worth £700,000 in Essex - BBC News
date: '2022-12-05'
section: General
url: http://www.bbc.co.uk/news/uk-england-essex-63859995
content: |-
  The vehicles, including two Porsches and a rare Ariel Atom car, were taken from an industrial unit.

  CCTV video showed the moment five cars worth more than £700,000 were stolen from an industrial unit.

  Thieves cut the bolts on a front gate in Brentwood Road, in Bulphan, near Thurrock, Essex, just after midnight on 11 November and were later seen driving the vehicles away.

  They included two Porsches, a Mercedes and a rare Ariel Atom car.

  Essex Police appealed for CCTV or dashcam video from the area.
