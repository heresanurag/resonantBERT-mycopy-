id: bbc_2021_15429
title: Two detained after UK boat's fatal collision off Sweden - BBC News
date: '2021-12-13'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-59633882
content: |-
  One person is dead and one missing after a Danish ship collides with a UK vessel in the Baltic Sea.

  The damage to the upturned Danish boat was clear after it was towed aground by rescuers

  Two people have been detained after a UK cargo ship collided with a Danish boat in the Baltic Sea off the Swedish coast, killing at least one person.

  Prosecutors are investigating allegations of gross negligence and gross drunkenness at sea involving the UK-flagged Scot Carrier.

  Two crew members on the Scot Carrier were found to be over the limit.

  Rescue teams searched for hours by sea and air after the much smaller Danish boat, Karin Hoej, capsized.

  Officials said a British and a Croatian citizen had been arrested.

  A distress call was made at about 03:30 local time (02:30 GMT) on Monday and a spokesman for the Swedish Maritime Administration (SMA) said screams had been heard from the water.

  "It is very cold and dark," Jonas Franzen told the BBC. "The water is about 4C (39F) and the air is about 5C (41F)."

  The collision happened between the southern Swedish coastal town of Ystad and the Danish island of Bornholm. Johan Nilsson, in charge of the rescue operation, told Swedish media the hull of the Danish boat had signs of being completely run over.

  Scotline, the Scot Carrier's owner, said that all crew members on the boat were tested for drugs and alcohol "with two crew members exceeding the legal limit".

  Two helicopters and several boats from Sweden and Denmark helped with the search, but rescue efforts at sea were stopped hours later.

  The Inverness-registered Scot Carrier also initially assisted, with teams attempting to turn the Danish ship back upright. It was later towed back to shore.

  All those on board the Scot Carrier were said to be safe and well.

  The cause of the collision is not yet clear. According to reports, the boats were travelling in foggy conditions with poor visibility.

  Prosecutors have opened an investigation into alleged gross negligence at sea, and causing death by gross negligence. The coastguard told the BBC there had been "some criminal suspicions, including gross drunkenness at sea".

  Under Swedish law, having a blood alcohol level of 0.02% or more is a criminal offence on the sea as well as on the road, a lower limit than in the UK, where it is 0.05%.

  Causing death by gross negligence can carry a prison sentence of up to six years in Sweden.

  The Karin Hoej was heading to Nykobing Falster in southern Denmark after leaving Sodertalje, near Stockholm, in Sweden on Saturday. It was not carrying any cargo at the time of the incident.

  The Scot Carrier was en route to the east coast of Scotland. It is not clear what cargo it was transporting or how many people were on board.
