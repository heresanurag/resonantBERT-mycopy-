  The Villalobos family eats dinner around an island inside a big kitchen in their Phoenix home

  There are an estimated 12 million undocumented migrants in the US, and many have lived and worked here for decades. When discussing Trump's mass deportation proposals, Ms Villalobos's niece, 19-year-old university student Alexandra de Leon, said they were "terrifying". “It’s your neighbours, it's the people you see in the grocery store, it's your teachers, it's your friend’s parents,” she said. “To know that those people are in danger and their families could be torn apart at any moment... it's heartbreaking.” One of the main storylines of election night was the extent to which Trump racked up huge support from Latino voters nationwide. He saw a mammoth 14 percentage-point bump compared to the 2020 election, according to exit polls. One of these supporters is Jorge Gonzalez, Sr, who moved his family to Arizona from Mexico 20 years ago in the hope of building a more prosperous future. Now the proud owner of a body shop in Phoenix, he believes Trump’s policies will help him as a business owner.

  Jorge Gonzalez Jr says he thinks Trump's mass deportation plan will not become a reality

  “As a person I don’t like him, but as a politician, I like how he ran the economy. Many Latinos probably think he managed the country better,” he said. “He allowed a large number of undocumented workers to come here and get work visas. I didn't see any family separations,” he added. “I saw that he integrated and allowed undocumented immigrants to live and work here in a regulated way." Across the yard, Jorge’s son, Jorge Jr, was under a car examining brake pads and checking an engine. As he swapped out wrenches, he said Trump had the right tools to be a successful president. “I don't like his attitude. His mouth gets the better of him a lot of times, but when you are in a position of power or leadership, you need to be able to be a little bit tough,” he said. When asked about the mass, militarised deportations Trump campaigned on in his home state, Jorge Jr just laughed. “That's impossible!” he said, noting the millions of undocumented immigrants in the US. “You will need a lot of resources, planes, food, detention centres, police, more ICE officers, so I don't think it will be feasible.” If the Trump administration were to move forward with mass deportations, they would likely face a host of challenges. Experts are wary that federal immigration authorities do not have proper staffing to track down migrants, or the capacity to hold them until a court date. “You learn to develop a thick skin, especially coming from where we come from,” Jorge Jr said. “We don't pay attention to a lot of the things that people say, because we know those are just words and there's a long gap between the things that we say and the things that we actually do.” Others are excited to see Trump's proposals come to fruition. Mark Lamb, the sheriff in Pinal County - a conservative area just south-east of Phoenix - said Trump winning the White House would deter migrants. “Once you start holding people accountable, securing the border, you're going to start to see a lot of these folks will go back on their own. And then we can start to go after the criminals, people that are causing problems in communities.” But how Trump’s policies will actually work on the ground is still anyone’s guess. “I don't think anybody has the resources right now,” Sheriff Lamb said. “But the people he picks are going to really have to figure out what that looks like.”

