title: Divided Arizona contends with Trump's sweeping border plan - BBC News
date: '2024-11-08'
section: World
url: http://www.bbc.co.uk/news/articles/c2069w5lxw5o
content: |-
  The state is likely to be on the frontline of the president-elect's immigration policies.

  Donald Trump made immigration a focus of his recent rallies in Arizona

  Donald Trump has offered a sweeping immigration pitch that he has promised to begin on the first day of his presidency, including mass deportations and a major crackdown on illegal border crossings. Arizona could find itself on the frontline of these moves, and the sharply divided state is contending with what they could mean. In the Phoenix home of the Villalobos family, members across three generations discussed Donald Trump's decisive election victory with their friends. Over Latin jazz and a dinner of empanadas, beans and rice, the group - mostly women - were close to tears. “I really had hope for humanity, and I feel like we were let down,” said Monica Villalobos, 45. “It changes the way we think about ourselves in the Latino community.” Her family made America their home after immigrating from Jalisco, Mexico. They worry that friends and relatives' families could be torn apart with deportations. Trump has promised the biggest mass deportations of migrants in US history, and has pledged to seal the border and stop the “migrant invasion". He is also promising to hire 10,000 Border Patrol agents and says he will ask Congress to give all agents a 10 % pay raise. His message is one that resonates with many voters here who consistently rank immigration and border security as top concerns. Many detail seeing the impacts of illegal migration firsthand, but voters are divided on how to handle it. Arizona was, for a time, a Republican stronghold. Trump was the first to lose here in more than 20 years when Joe Biden came out victorious in 2020. The 2024 result is still too close to call - a testament to just how split residents are. Voters on Tuesday, however, overwhelmingly approved a Republican-supported measure that gives sheriffs, police and state law enforcement the authority to enforce federal immigration laws and arrest those who cross the border illegally. It had faced opposition from Democratic and Latino groups, who argue it could result in racial profiling.
