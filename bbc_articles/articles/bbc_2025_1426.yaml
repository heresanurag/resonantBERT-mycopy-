title: 'South China Sea: Chinese navy helicopter flies close to Philippine plane -
  BBC News'
date: '2025-02-19'
section: General
url: http://www.bbc.co.uk/news/videos/cvgdrqgxyg3o
content: |-
  Manila says it will file a formal protest over the latest incident in the South China Sea.

  Footage release by the Philippine coast guard shows a Chinese navy helicopter flying close to a Philippine aircraft patrolling over a disputed area of the South China Sea on Tuesday, 18 February.

  According to the coast guard, the helicopter flew within 3m of the Philippine plane, prompting the pilot to say: "You are flying too close, you are very dangerous," over the radio.

  The Philippine government said it would file a formal protest over the incident.

  The Scarborough Shoal in the South China Sea has been contested between the countries since China seized it from the Philippines in 2012.
