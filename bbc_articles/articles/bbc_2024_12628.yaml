title: BBC's Nick Owen left in tears by son's MBE message - BBC News
date: '2024-06-20'
section: General
url: http://www.bbc.co.uk/news/videos/cyxx7rv4vzxo
content: |-
  The BBC Midlands Today presenter is surprised on-air as audience tributes include his son Tim.

  An on-air tribute to Nick Owen after his MBE award in the King's Birthday Honours left the BBC Midlands Today presenter in tears - after a message from his son was read out.

  On Friday, it was announced he was being honoured for his services to charity and broadcasting.

  Many hundreds of congratulatory messages were posted on social media over the weekend and a few of them were read out on Monday evening's programme.

  Correspondent Ben Godfrey surprised his colleague with the final message from Tim Owen.

  Last year, his father underwent treatment for prostate cancer and talking publicly about his treatment saw a surge in people being tested for the disease.

  After a broadcasting career spanning more than 50 years, he was also last year named best on-screen personality at the Royal Television Society Midlands awards.
