  The two leaders' meeting came as Nato agreed further support for Ukraine at the Washington summit. Sir Keir also confirmed that the UK's £3bn a year military aid for Kyiv would continue. President Biden said “things are moving in the right direction, I’m feeling really optimistic". The prime minister congratulated President Biden on hosting the summit, adding it was "a bigger Nato, a stronger Nato and a Nato with the resolve that we need". The Labour leader - on his first overseas visit as prime minister - is a season ticket holder at Arsenal Football Club and gave President Biden a personalised team shirt as a present. It has President Biden's surname on the back and the number 46 - a reference to him being the 46th US president. Sir Keir also gave him a copy of the Atlantic Charter - the 1941 US-UK declaration which paved the way for the formation of the military alliance - featuring amendments from the then Labour leader Clement Attlee. Foreign Secretary David Lammy, who accompanied Sir Keir on the trip, met his US counterpart Antony Blinken. The State Department said the pair "re-affirmed the importance of ensuring Ukraine has the economic, security, and humanitarian assistance it needs to defend its sovereignty and territorial integrity". They "discussed the need to reach a ceasefire in Gaza that secures the release of hostages and lays the groundwork for durable peace". New UK Defence Secretary John Healey met his US counterpart Lloyd Austin.

  There was no mention of Sir Keir's Arsenal shirt gift when the two leaders spoke to reporters before their White House meeting - but there was a little time for both men to hail England’s 2-1 victory over the Netherlands in the semi-finals of Euro 2024. Substitute Ollie Watkins's last-minute winning goal in the match was scored just before Sir Keir arrived for the talks. Asked by reporters about the result, President Biden said, “I heard”. “Good news indeed,” he added, joking that “it’s all because of the prime minister". And the prime minister, when asked by the BBC's political editor Chris Mason, "is football coming home?", replied: “It looks like it.” Sir Keir has confirmed he will be attending the final against Spain in Berlin on Sunday. At one point during the Nato summit, a video clip posted on X by Sir Keir, external showed him stopping between meetings to watch England captain Harry Kane take a penalty.
