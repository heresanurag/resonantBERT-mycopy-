content: |-
  The UK PM says his talks with the US president were a chance to "recommit" to Nato and the "special relationship".

  UK-US relations 'strong' says PM as he meets Biden

  UK Prime Minister Sir Keir Starmer says his first face-to-face talks with US President Joe Biden were an opportunity to "recommit" to Nato and the "special relationship" between the UK and US. Facing reporters in the White House, Sir Keir told the president: "The special relationship is so important. It's forged in difficult circumstances, endured for so long, and stronger now than ever." The new prime minister met President Biden for the first time at Nato's 75th anniversary summit in Washington just hours before their private talks in the Oval Office. President Biden called the US and UK the "best of allies", saying the UK was "the transatlantic knot" that ties Nato together with its European members. It comes as Sir Keir is looking to form a new security pact with EU nations to strengthen co-operation on defence.

