title: 'Antalya: Moment man rescued from Turkey cable car - BBC News'
date: '2024-04-14'
section: General
url: http://www.bbc.co.uk/news/world-europe-68808613
content: |-
  A military helicopter hoists the stranded passenger to safety in a rescue basket.

  A cable car cabin collided with a broken pole on Friday evening, killing one person and injuring 10 others. Dozens of passengers were stranded in mid-air overnight.

  Footage released by the Turkish Defence Ministry shows a stranded cable car passenger hoisted into a military helicopter on Saturday.

  Seven helicopters and more than 500 rescuers, including specialist mountaineers, helped rescue the passengers, the Turkish interior ministry said in a social media post.

  An investigation into the accident has been opened, the justice ministry said.
