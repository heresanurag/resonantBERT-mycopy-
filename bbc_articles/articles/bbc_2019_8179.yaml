title: 'Yemen conflict: Six-year-old Yusra’s new eye - BBC News'
date: '2019-07-10'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-48751748
content: |-
  A girl from war-torn Yemen who had an aggressive tumour in her eye has been fitted with a prosthetic.

  In October, the BBC met Yusra and her family in war-torn Yemen. She had an aggressive tumour in her left eye, but couldn’t get the life-saving treatment she needed.

  Now she’s been fitted with a prosthetic eye in Jordan and is returning to her homeland.

  She is now cancer-free but has a genetic condition, so follow up checks are being arranged in Yemen.

  International Correspondent Orla Guerin reports for the BBC News at Ten.
