  BBC Sport readers picked Ollie Watkins as their man of the match in the England v Netherlands player rater.

  Watkins is your man of the match against the Netherlands

  This video can not be played To play this video you need to enable JavaScript in your browser.

  We asked you to rate the players during England's Euro 2024 semi-final victory against the Netherlands. You named England striker Ollie Watkins - who scored a stoppage-minute winner - as your man of the match with a score of 8.61 out of 10. Midfielder Phil Foden was England's next best player with a score of 7.81.

