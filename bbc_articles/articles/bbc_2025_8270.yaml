  Suspended Labour MP, John McDonnell, who represents Hayes and Harlington in Parliament and previously held the position of shadow chancellor, also told Access All of his "shock and anger" at the plans, and said he was "praying" for a government U-turn. Initially, the government's reforms to benefits were intended to make savings of £5bn a year by 2030, but the Office for Budget Responsibility has revised government figures, projecting a lower net saving of £3.4bn. The government says that without radical reforms to the benefit system it could cost the tax payer as much as £70bn annually by the end of the decade. To make savings, other planned changes include freezing extra payments for existing claimants of Universal Credit and almost halving them for new applicants. The government says some of the money saved will be reinvested into work programmes targeting youth unemployment. Alongside the 12-week consultation, which ends on 30 June, the government has announced the formation of "collaboration committees" which will involve civil servants working with disability experts and those with lived experience to "provide discussion, challenge, and recommendations" to inform government proposals. You can listen to Sir Stephen Timms on BBC Access All on BBC Sounds. Subscribe and email your thoughts to accessall@bbc.co.uk
