title: 'Manchester Arena attack: Hashem Abedi jailed for minimum 55 years - BBC News'
date: '2020-08-20'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-53850642
content: |-
  Hashem Abedi is sentenced for the murders of 22 people in the Manchester Arena suicide bombing.

  Hashem Abedi was arrested in Libya the day after the bombing

  The brother of the Manchester Arena bomber has been jailed for at least 55 years for the murders of 22 people.

  Hashem Abedi helped his older sibling Salman to plan the atrocity that killed 22 men, women and children and injured hundreds more on 22 May 2017.

  He was convicted after a court heard he was "just as guilty" as his brother, who detonated the bomb at the end of an Ariana Grande concert.

  Abedi, 23, refused to leave his cell at the Old Bailey for the sentencing.

  Mr Justice Jeremy Baker told the court "the stark reality is, these were atrocious crimes. Large in scale, deadly in intent, appalling in their consequences".

  "The despair and desolation of the bereaved families has been palpable," he added.

  He told Abedi, formerly of Fallowfield, Manchester, he would spend at least 55 years in prison before he could even be considered for parole, adding he "may never be released".

  Family members gasped as the sentence - a record for a determinate prison term - was handed down.

  Because he was under the age of 21 at the time of the murders, the law forbids the imposition of a whole life order, meaning a life sentence with no minimum term.

  Top (left to right): Lisa Lees, Alison Howe, Georgina Callander, Kelly Brewster, John Atkinson, Jane Tweddle, Marcin Klis, Eilidh MacLeod - Middle (left to right): Angelika Klis, Courtney Boyle, Saffie Roussos, Olivia Campbell-Hardy, Martyn Hett, Michelle Kiss, Philip Tron, Elaine McIver - Bottom (left to right): Wendy Fawell, Chloe Rutherford, Liam Allen-Curry, Sorrell Leczkowski, Megan Hurley, Nell Jones

  Manchester-born Abedi, who had travelled to Libya before the bombing, was arrested shortly after the terror attack and extradited to Britain to face trial.

  The court heard how the brothers spent months ordering, stockpiling and transporting the deadly materials required for the attack.

  Abedi was found guilty by a jury in March of 22 counts of murder, attempted murder - encompassing the remaining injured - and conspiring to cause explosions.

  This video can not be played To play this video you need to enable JavaScript in your browser. Figen and Stuart Murray said their lives "have been deeply affected by what happened"

  Figen Murray, the mother of Martyn Hett who was killed in the blast, said: "Abedi has now faced justice for his crimes.

  "My life completely changed due to the horrific crimes spoken of today."

  She added she would continue to spread "messages of kindness and tolerance so that those who seek to divide us never win" as well as campaigning for Martyn's Law, which would make it compulsory for every venue to assess the risk of a terror attack.

  The families of Liam Curry and Chloe Rutherford said "we've had our children ripped from us in the most horrific way", adding Abedi was "an absolute coward" for refusing to attend court.

  Mr Justice Jeremy Baker paid tribute "to the tremendous dignity and courage" of those affected by the attack

  Prime Minister Boris Johnson said the jailing of Abedi was "an opportunity to reflect on the importance of tolerance, community and kindness".

  "The Manchester Arena attack was a horrifying and cowardly act of violence which targeted children and families," he said.

  "Those who were taken from us will never be forgotten, nor will the spirit of the people of Manchester who came together to send a clear message to the entire world that terrorists will never prevail."

  Mayor of Greater Manchester Andy Burnham said the attack was an act of "pure evil".

  "This attack on our city and everything it represents caused untold misery. But ultimately it failed," he added.

  "It was meant to divide us but it only brought us closer together."

  Salman Abedi in the foyer of the Manchester Arena just seconds before he blew himself up

  Over the two-day sentencing hearing, the court heard emotional testimonies from bereaved relatives.

  Parents broke down in tears as they recalled the moment they discovered their loved ones had died.

  Some held up photos of their children as they paid tribute to them and described the "devastating" effect of their grief.

  Salman Abedi and his brother lived in Fallowfield, four miles south of Manchester city centre

  Victoria Higgins, a lawyer for Slater and Gordon acting on behalf of 12 of those who were killed, said: "This is the end of one chapter for those affected by this terrible atrocity.

  "The families have waited a long time to see this man brought to justice and facing a life sentence for his crimes."

  But she added "the next phase is about to begin" with a public inquiry into the attack due to start later this year.

  Greater Manchester Police Chief Constable Ian Hopkins described the bombing as "one of the worst terrorist attacks this country has seen, and one of the darkest days in our city's history".

  "The division and hatred he sought to foster was, amidst the pain, met by strength and unity - by the courage of the victims' families, the bravery of the survivors and the kindness and generosity of Greater Manchester as a whole," he said.

  An image of a young Hashem Abedi from his father's Facebook page

  BBC home affairs correspondent Danny Shaw said Abedi's 55-year minimum term is the longest ever handed down by a court in British legal history.

  The trial in its entirety was the "largest murder case in English legal history", Jenny Hopkins from the Crown Prosecution Service said.
