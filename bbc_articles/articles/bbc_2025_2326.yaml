title: 'Gold toilet theft trial: Staff thought raid was boiler explosion - BBC News'
date: '2025-02-27'
section: England
url: http://www.bbc.co.uk/news/articles/ce8my7ydg04o
content: |-
  Three men are standing trial over the theft of a gold toilet which had been part of an exhibition.

  This video can not be played To play this video you need to enable JavaScript in your browser. Security footage showing the moment thieves stole the toilet was shown in court on Tuesday

  A gang that broke into Blenheim Palace to steal a solid gold toilet worth £4.8m made so much noise that staff thought a boiler had exploded, a court heard. The artwork, called America, was taken from the Oxfordshire stately home in the early hours of 14 September 2019, two days after it went on display. Michael Jones, 39, from Oxford, denies one count of burglary. Fred Doe, 36, from Windsor, and 41-year-old Bora Guccuk, from west London, both deny conspiring to transfer criminal property. The toilet was most likely broken up and has never been recovered, Oxford Crown Court was told.

  Palace night duty manager Abel Clarke said his room was above the golden toilet exhibition and that he was awoken by a fire alarm. "I heard two loud bangs coming from below my room," he said in a statement read to jurors. "My first thought was that the boiler had exploded." He went to see colleague Reza Haghighi, who was monitoring CCTV, who told him there were vehicles outside and people were breaking in.

  The solid gold toilet disappeared from Blenheim Palace in 2019

  Mr Clarke said he saw headlights facing in his direction but only got a glimpse of what was happening. He looked into the courtyard and saw two vehicles, including a truck, were pulling away "at speed". "At one point I was running alongside the pick-up for a few seconds but could not see the person inside," Mr Clarke added. Mr Haghighi was working overnight monitoring 48 CCTV cameras stationed around the Unesco World Heritage Site until 06:00 GMT on 14 September. He said at 04:50 he saw vehicles enter the palace's quadrangle and zoomed in to see the gang approach. Mr Hagigi said he pressed a panic button and then the fire alarm, which turned on lights around the site. Footage previously played to the jury showed two vehicles driving across the Great Courtyard, before hooded individuals armed with sledgehammers and a large crowbar broke into the palace. The 18-carat gold toilet was part of an exhibition by Italian conceptual artist Maurizio Cattelan. It weighed 98kg (216lb) and was insured for $6m (£4.8m). Gold prices at the time would have seen the metal alone worth £2.8m, the court was told. The palace is the birthplace of Sir Winston Churchill. A fourth man, James Sheen, a 40-year-old from Wellingborough in Northamptonshire, has previously pleaded guilty to burglary, the court heard earlier in the trial.

  The prosecution said photos found on Michael Jones' phone showed him during a visit to the palace the day before the raid

