title: Mother accused of killing daughter weeps at Ipswich trial - BBC News
date: '2024-10-08'
section: England
url: http://www.bbc.co.uk/news/articles/c0lwj9w5p6do
content: |-
  Chelsea Gleason-Mitchell and Scott Jeff deny murdering two-year-old Isabella, a court hears.

  A former nursery worker accused of murdering her two-year-daughter wept in court as she went on trial. Chelsea Gleason-Mitchell and Scott Jeff, both 24 and of no fixed address, have denied murdering Isabella Wheildon during a trial at Ipswich Crown Court. Sally Howes KC said emergency services found the child dead at a temporary housing unit run by Ipswich Borough Council in Sidegate Lane, Ipswich, on 30 June 2023. A prosecuting barrister told jurors that Isabella was living with Ms Gleason-Mitchell and Mr Jeff, who were a couple at the time, and the child was the daughter of Thomas Wheildon.

  Ms Gleason-Mitchell and Mr Jeff both deny Isabella's murder between 26 and 30 June 2023. Mr Jeff denies causing or allowing the death of a child and child cruelty. Ms Howes told jurors that Ms Gleason-Mitchell had admitted to causing or allowing the death of a child and child cruelty. Isabella's body had been found after a woman told police that she had received a communication on Facebook Messenger "from a friend", jurors heard.

  Scott Jeff has denied murder, causing the death of a child and other offences

  Ms Howes said a post-mortem examination of Isabella identified "extensive external traumatic injuries" on her body. The two-year-old had sustained fractures to both wrists and a "complex pelvic fracture involving several bones". The damage to Isabella's pelvis was described as "severe" with the "likely cause... either kicking or stamping or both", said Ms Howes. The cause of Isabella's death had been given as "bone marrow embolism caused by skeletal trauma", jurors were told. Ms Gleason-Mitchell and Mr Jeff were arrested in Bury St Edmunds, Suffolk, on 1 July 2023.

  "It's the prosecution case that Isabella Wheildon was a healthy, contented, well-cared for little girl until Scott Jeff came into her young life," Ms Howes told jurors. "She was two years and nine months old at the time of her death. "Towards the end of May 2023, he entered a relationship with Chelsea Gleason-Mitchell. "From that time up to her death, Isabella was subjected to a regime of escalating brutality which was callous, cruel and ultimately fatal." She said Isabella's "own mother Chelsea Gleason-Mitchell stood back, watched, did nothing and allowed this to happen".

  Isabella was found dead in a locked bathroom in a temporary housing unit in Ipswich

  Mr Jeff had told police that he "didn't assault or commit any unlawful act in relation to Isabella at any time", jurors were told. He said he had "started to notice bruising on her face" and "raised concerns with my partner who suggested those marks were nothing to worry about". Ms Howes said Ms Gleason-Mitchell told police that "she didn't kill her daughter and she thinks it's the harm Scott Jeff did to her that killed her". She said that the "violence started when there were problems with potty training", adding: "If Isabella said she was a mummy's girl Scott would hit her." "[Ms Gleason-Mitchell] said [Isabella] had no injuries before going away with Scott Jeff," said Ms Howes. "She admitted she should have got help."

  Ms Gleason-Mitchell's family home was in the Biggleswade area of Bedfordshire, Ms Howes said. Mr Jeff's last-known address was in the same area. They had left the area together, staying at hotels in Great Yarmouth, a caravan park and "camping in a very small tent on Caister Beach" in Norfolk before arriving in Ipswich, jurors heard. Ms Howes said Ms Gleason-Mitchell had been in contact with housing services at Great Yarmouth Borough Council. "She stated she, her daughter and her partner were homeless, that they had been kicked out of their home in Bedfordshire and were escaping domestic abuse from her ex-partner," Ms Howes said. "She also stated Scott Jeff was Isabella's father." The council had determined that Ms Gleason-Mitchell was the responsibility of authorities in Bedfordshire. It later offered her "a place for her and Isabella, but that wasn't acceptable to her as she wanted to remain with Scott Jeff", Ms Howes said. The trial, due to last between six and eight weeks, continues.

