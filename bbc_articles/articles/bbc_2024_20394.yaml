content: |-
  Dame Elan Closs Stephens says she was not aware of the "terrible details which have come to light this week".

  Huw Edwards thanked by ex BBC chair after arrest

  Edwards admitted having 41 indecent images of children, which had been sent to him by another man on WhatsApp

  The former chair of the BBC publicly thanked disgraced newsreader Huw Edwards for his "huge contribution" despite knowing he had been arrested in November last year. Dame Elan Closs Stephens was appointed interim chair a few weeks before the Sun newspaper first made allegations about Edwards' private life, leaving shortly before his resignation from the BBC in March this year. She also referred to him as "poor Huw" on Welsh-language radio programme Beti a'i Phobol last month. In a statement to BBC-produced Newyddion S4C, Dame Elan confirmed she was aware of the arrest in her capacity as interim chair of the BBC, but was not aware of the "terrible details which have come to light this week" after he pleaded guilty to three counts of making indecent images of children.

  BBC director general Tim Davie confirmed on Thursday that he was aware of Edwards' arrest and the nature of the allegations made against him in November last year, but not the specifics, and has defended the corporation's handling of the case. On 2 July, Dame Elan said on Welsh-language radio programme Beti a'i Phobol she was "proud to thank him [Edwards] personally for all his huge contribution and all the skills he has demonstrated that will help those who will succeed him". Discussing the initial allegations made by The Sun newspaper about Edwards' personal life, published in July 2023 and prior to the criminal charges later brought against him, Dame Elan said: "It was a sad story, and it was obvious The Sun newspaper was going to make the most of the occasion because poor Huw was so well-known."

  Dame Elan said in the programme recorded on 2 July that she was proud to personally thank Edwards for his "huge contribution"

  "Of course, the Queen's death and funeral and the Coronation had happened within a few months. "The first thing of course was ensuring Huw was alright and that the family received care and protection. "More than that, they have obviously come to an agreement after my time [as BBC chair] has ended so that matter is a private one." BBC Wales contacted Dame Elan initially to ask for her response to Edwards' guilty plea on Wednesday. She declined to comment. Newyddion S4C subsequently asked whether she stands by her comments on the 'Beti a'i Phobol' programme following Edwards' guilty plea this week. In her written statement, she did not address that point directly. Dame Elan said revelations from the the court had come as a shock to her and that she was "horrified by it all". She added her "thoughts are with the children whose images are central to this story".

