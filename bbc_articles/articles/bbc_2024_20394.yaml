  Newyddion S4C also asked the BBC whether Dame Elan was informed of Edwards' arrest last November and the nature of the investigation, but it is yet to receive a response. The BBC launched an internal investigation into allegations about Edwards' conduct, but the findings have not been published. Newyddion S4C made a freedom of information request asking for any notes or correspondence relating to that investigation earlier this year. It was rejected on 20 May, citing data protection laws relating to personal data.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  After publication of the Sun's initial story, police confirmed that there had been no criminality. But Edwards was arrested in November last year in relation to allegations of making indecent images of children. Mr Davie has confirmed he was made aware of the arrest and the nature of the allegations against Edwards, though not the specifics revealed this week, and said the police requested the information remained confidential. Edwards was charged in June, information not made public until this week in court listings He admitted having 41 indecent and illegal images of children on his phone. Seven of the images were in the most serious category, with two images depicting children between around seven and nine years old. Edwards was one of Wales’ most high-profile public figure as a main presenters on BBC One's News at Ten and often fronting coverage of major national events until last year. He pleaded guilty to three counts of making indecent images of children on Wednesday.
