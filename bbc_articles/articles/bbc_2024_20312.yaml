content: |-
  Riot police in Argentina's capital have tried to disperse protesters outside Congress, where lawmakers have been debating reforms.

  Riot police in Argentina's capital Buenos Aires have fired tear gas, rubber bullets and a water cannon to disperse protesters outside Congress, where lawmakers have been debating budget-slashing reforms.
