title: 'Your pictures of Scotland: 15-22 October - BBC News'
date: '2021-10-23'
section: Scotland
url: https://www.bbc.co.uk/news/uk-scotland-58957716
content: |-
  A selection of your pictures of Scotland sent in between 15 and 22 October.

  Send your photos to scotlandpictures@bbc.co.uk. Please ensure you adhere to the BBC's rules regarding photographs that can be found here.

  Please also ensure you follow current coronavirus guidelines and take your pictures safely and responsibly.

  Conditions of use: If you submit an image, you do so in accordance with the BBC's terms and conditions.

  It dawned on me: Gary Ward left at 03:30 to hike up Stob Dubh and Stob Coire in Glencoe to see the sunrise.

  Monster view: Gordon Page said he took this picture of 'beautiful Loch Ness from Fort Augustus'.

  Watered down: Niall Fraser The beautifully picturesque Invermoriston Falls on a moody autumn morning.

  Mushrooming out of control: Audrey Macdonald spotted this stunning array of fungi on an early morning autumnal walk in Nairn.

  The calm before the storm: Heidi Muir took this photo of Ardvasar Marina on Skye looking over to the mainland.

  Fish supper: Derek Brown took this photograph of a grey heron feeding

  Edin-brrrr Castle: Rachel MacSween took this picture of Edinburgh Castle on a cold but clear and beautiful day.

  Pigment of your imagination: Marianne Mann said the colours were very impressive at Tobermory on the Isle of Mull.

  Grave danger: Alistair Stevenson took this picture of a plant taking over a gravediggers hut at St Mungo in Lockerbie.

  In plane sight: Rob Young took this photograph of a low flying USAF MC130 just skimming the trees in the Great Glen near Laggan dam.

  Outstanding in your field: Alan Bond took this drone picture of a combine harvester, harvesting the wheat from just behind his house in Stuartfield.

  Beak-a-boo: Freck Fraser took a picture of the often shy and reclusive Eurasian Jay, taken in his garden at Belladrum.

  Ewe funny sheep: Jillian Neil took a picture of her friendly neighbours during a stay in Lindores

  Soaperstar: Gayle McIntyre took this picture of a student being hosed down after the Raisin Monday foam fight at the University of St Andrews – the first to be held in two years.

  The fountain of youth: Ryan Laverty's daughter Aria, taking full advantage of the water fountains just recently opened next to the V&A Dundee, as part of the Waterfront renovation project.

  Orange you glad it's autumn? Victor Tregubov saw the beautiful colours of the changing leaves near Pitlochry.

  Living on the edge: Pamela MacQueen took this picture on a "journey to the edge of the world" to the archipelago of St Kilda.

  Lamborghini: Lyndsay Saunders took this snap of a Hebridean 'taxi' on the Isle of Harris whilst travelling in her campervan

  Little shredder: Kirsty Brien took this picture of her seven-year-old son, Seth, on Harris where she has moved with her family.

  Catch of the day: Chris Boyle took this picture of a salmon leaping at Buchanty Spout, Perthshire.

  I have so mushroom in my heart for you: Howard Dodds took this photo of a fly agaric at Carron Valley Reservoir.

  Go with the flow: Glenys Norquay said her visit to the Birks of Aberfeldy in Perthshire was full of autumn colour.

  Feet first: Lindsey Harper said her son Rory was having so much fun on the zip wire at Crieff Hydro.

  Swan Lake: Patrick Hutton said this young swan was dipping its feet in the Musselburgh Lagoon.

  The ghostess with the mostest: Mark Reynolds took this spooky snap of the ruined Jedburgh Abbey and its ghastly face in the windows.

  Time to reflect: Seria Hogg took this photo at the start of the Caledonian Canal in Fort William during a cycling trip around Scotland.

  Hailey Beaupre said this photo of the Quiraing on the Isle of Skye is the best she has ever taken.

  Duck giving itself a quack: Shona Finlayson thought it looked like this duck was clapping at at Biggar boating pond.

  Squirrel Nutkin: John Kerr took this picture of squirrels looking for nuts at Argaty near Doune on a beautiful calm day.

  Unbeleafable: Elaine Malone took this picture of one of the "new helpers" at the Royal Edinburgh Hospital community garden.

  Peak preview: Richard Cooper waited for 20 minutes for the cloud to clear to reveal a light dusting of snow on the pinnacles of An Teallach.

  Fairy umbrellas: Liz Hamilton took this picture of these porcelain mushrooms growing on a beech tree at Haddo Country Park, Aberdeenshire.

  Red flag: Marianne McKiggan took this picture on Portobello Beach in Edinburgh showing Kinetika Beach of Dreams, an installation of 500 pennant flags.

  View from above: Danny McCafferty took this picture of Hope street in Glasgow from his office window.

  Good mood: Curtis Welsh took this picture of Armanda, the Highland Cow, quietly chewing her cud and admiring the peaceful and empty golden sands at Hushinish on the Island of Harris.

  Go ahead: Margaret Winton said she was "intrigued" by the Floating Heads installation at Kelvingrove Art Gallery & Museum in Glasgow.

  I'm hearing what you sea: Charlie Scott took this picture of the "impressive" waves at Fraserburgh in Aberdeenshire.

  Leap of faith: Scott Renton took this picture of his daughter, Elspeth, during a trip to Nairn in the October holidays.

  Please ensure that the photograph you send is your own and if you are submitting photographs of children, we must have written permission from a parent or guardian of every child featured (a grandparent, auntie or friend will not suffice).

