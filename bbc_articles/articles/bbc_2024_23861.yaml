  What I really enjoy about the Chiefs is that they traded Tyreek Hill (in 2022) and everybody thought that would be a negative thing but actually, it's almost made it more challenging for opponents because you no longer have a key receiver to really focus on. All of their receivers and tight ends could be potential threats so you have to adjust your defensive scheme to almost defend everywhere, as opposed to doubling up on one athlete. That's what Reid ultimately wants - a team full of dudes who are able to do whatever you need them to do. Last year was Rashee Rice's rookie year and he became almost their number one receiver. This year they've drafted another receiver, Xavier Worthy. Some people call him a 'poor man's Tyreek Hill', but that's just because he's being paid far less and has the same speed and skillset that Tyreek offers. The Chiefs have also brought in Marquise 'Hollywood' Brown (receiver), they've still got Isiah Pacheco (running back), and they've got continuity on defence. Reid has built a team who show up every day, believe in the culture and do the hard yards. As a player, you know what the standard is, you know that the veterans like Mahomes and Kelce are going to get you in line. You know that they've been there and done it, so you're going to listen to whatever they say and do whatever they do.

  This video can not be played To play this video you need to enable JavaScript in your browser. Super Bowl 2024: Watch Travis Kelce and the Kansas City Chiefs celebrate beating the San Francisco 49ers in Las Vegas

  That's why I think it's a no-brainer to compare them to Tom Brady's New England Patriots of the 2000s and 2010s. Their legacy was built on everyone buying into the programme’s culture, beliefs and actions. It's really the same thing now with the Chiefs. You had the Patriots Way. Well, we've now got the Chiefs Way. It’s a bit more fun, a bit more creative, but it's the same concept. A lot of that starts from your quarterback, that leadership on and off the field, so as long as the Chiefs have Mahomes, they can be successful. I think this is the year that another team can give them a run for their money, though. I've predicted the Bengals to win the Super Bowl, but honestly, I think it's a coin flip. The AFC Conference is so stacked, it's difficult to pick between the Bengals, Chiefs, Jets and Texans. However, I was a bit surprised the Chiefs didn't keep Louis Rees-Zammit. It seemed like they had some positive experiences with him, but hey, I guess you're not an NFL player until you get fired from somewhere. Louis just needs time, and perhaps the Jacksonville Jaguars are in a better position to give him that time and attention. If you're letting a guy go, coaches do talk about players and are open about them. I think the Chiefs would have recommended him to the Jags - and hopefully we'll see him again soon as the Jags are again playing two games in London in October.
