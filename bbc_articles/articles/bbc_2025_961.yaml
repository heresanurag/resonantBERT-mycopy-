  The Pope has had bronchitis symptoms for several days leading to other officials reading his speeches.

  Pope to be admitted to hospital for bronchitis

  The Pope has had several bouts of bronchitis in recent years

  Pope Francis will be admitted to hospital in Rome to undergo treatment and tests for bronchitis, the Vatican has said. The 88-year-old will arrive at the Gemelli hospital after his morning audiences on Friday, a short statement said. The Pope has had bronchitis symptoms for several days and has delegated officials to read his prepared speeches at recent events. "This morning, after his audiences, Pope Francis will be admitted to the Agostino Gemelli Polyclinic for necessary diagnostic tests and to continue hospital treatment for his ongoing bronchitis," the statement said.

  On Wednesday, the Pope asked a priest to read part of his speech because of his difficulties with the illness. "Let me ask the priest to continue to read, because I cannot yet, with my bronchitis. I hope that next time I can," the 88-year-old said shortly after starting the speech. He had also asked aides to read on his behalf at a mass on Sunday and at last Wednesday's general audience. He held meetings at his Vatican residence last week in an attempt to rest and recover. The Pope was treated for bronchitis at the same hospital in March 2023, spending three nights there. In December the same year, he was forced to cancel his trip to the United Arab Emirates for the COP28 climate summit because of another bout of illness. The Argentine pontiff has spent nearly 12 years as leader of the Roman Catholic Church. He has suffered a number of health issues throughout his life, including having part of one of his lungs removed at age 21.
