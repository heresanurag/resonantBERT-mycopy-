title: Is Russia's Arctic presence 'aggressive?' - BBC News
date: '2017-02-16'
section: General
url: http://www.bbc.co.uk/news/world-europe-38986210
content: |-
  The BBC's Jonathan Beale reports from the Arctic circle, where Russia is building up its forces.

  The BBC's Jonathan Beale reports from the Arctic circle in Norway, where Russia is building up its forces - causing concern for the US, which has called its conduct there "aggressive".

  Meanwhile, US Defence Secretary James Mattis is expected to call on European nations to spend more on defence, when he attends a meeting of the NATO alliance in Brussels.
