title: Russian ballet visits to Northampton and Wolverhampton cancelled - BBC News
date: '2022-02-27'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/uk-england-birmingham-60538275
content: |-
  Wolverhampton's Grand Theatre says cancelling the visit "is absolutely the right thing to do".

  The Russian State Ballet had been due to appear at the Wolverhampton Grand Theatre from Monday

  Performances by the Russian State Ballet at theatres in Northampton and Wolverhampton have been cancelled following the invasion of Ukraine.

  The decision "is absolutely the right thing to do given the circumstances", the Wolverhampton Grand Theatre said in a statement.

  The ballet company had been due to appear for three days from Monday.

  The Royal and Derngate in Northampton said it had cancelled Saturday's performances by the company.

  Members of the Ukrainian community in Wolverhampton had previously been calling for the visit to the city to be cancelled.

  "We would have thought they would have shown some compassion to our community," Andrew Duda, branch chairman of the Association of Ukrainians said before the cancellation.

  The theatre said discussions between management, producers and agents had been taking place since Thursday.

  The cancellation will have "a significant financial impact", it added, following its closure during the pandemic.

  All customers who bought tickets for the ballet in Wolverhampton and Northampton have been promised a full refund.

