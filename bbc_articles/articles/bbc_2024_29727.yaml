title: 'Malton: Pet dog which killed girl was XL Bully, police say - BBC News'
date: '2024-11-06'
section: North Yorkshire
url: http://www.bbc.co.uk/news/articles/c154ne70kzeo
content: |-
  North Yorkshire Police say family pet had Certificate of Exemption under new rules and was neutered.

  The dog involved in the fatal attack was an XL bully breed (stock image)

  A pet dog which fatally injured a 10-year-old girl was an XL bully, police have confirmed. North Yorkshire Police said the animal had been euthanised after it killed Savannah Bentham at her family home near Malton in North Yorkshire on Friday. Savannah died at the scene despite efforts by medical professionals and a member of the public who came to the family's aid. A spokesperson said the dog had been with the family for four years and had a Certificate of Exemption under new legislation introduced in February.

  It had also been neutered in line with the law change, they added.
  • None How dangerous are XL bullies and how does the ban work? The police spokesperson confirmed the dog was destroyed by a vet on Tuesday after "detailed independent assessments" to determine its breed. "To aid the report for the coroner, an autopsy is due to take place on the dog to help determine if there were any medical factors involved," they said. "These findings will be outlined at the inquest into the death of Savannah Bentham in due course." In a statement issued on Monday, Savannah's family said they were "utterly shocked and devastated" by the death of their "wonderful girl". Savannah attended West Heslerton C of E Primary School in Malton, with her former head teacher, Rachel Wells, describing her as a "model student" and a "friend to everyone". Listen to highlights from North Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
