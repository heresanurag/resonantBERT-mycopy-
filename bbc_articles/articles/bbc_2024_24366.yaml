  Woman and child die at property in Cornwall

  Police were called to the scene following a welfare check

  Police are investigating the unexplained deaths of a woman and child in Cornwall. Devon and Cornwall Police said officers were called by the ambulance service at 10:10 BST on Saturday, following a report of concern for the welfare of two people in the Bodmin area. The force said emergency services were called to a property in the Fletchersbridge area, where a woman and a child were given emergency medical treatment, but both were confirmed dead at the scene. Det Insp Neil Blanchard said: “This is a tragic and incredibly sad incident. The deaths are currently being treated as unexplained and we are investigating them to establish the full circumstances of what occurred."

  He added: “I would like to reassure the community that this is being treated as an isolated incident and at this time we are not seeking anyone else in connection to the deaths.” The force said their next of kin had been informed and were being supported by specially trained officers.
