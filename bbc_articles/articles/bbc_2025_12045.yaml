content: |-
  Jazwell Brown's teenage son says the drug-fuelled stabbings were "like watching a horror film".

  Christmas Day killer jailed for at least 39 years

  Joanne Pearson (left) and Teohna Grant (right) died at the scene in Santa Cruz Avenue in Bletchley in December

  A man who stabbed two women to death and attacked his son on Christmas Day while high on drugs has been jailed for at least 39 years. Jazwell Brown, 49, smoked crack cocaine before murdering his partner Joanne Pearson, 38, and neighbour Teohna Grant, 24, at a block of flats in Bletchley, near Milton Keynes. Brown admitted the two murders and also attempting to murder his son, Jake, who was 17, and his neighbour Bradley Latter, 30. Mr Justice Kerr sentenced Brown to life in jail and told him he would serve a minimum of 39 years before being considered for parole.

  Luton Crown Court heard Ms Pearson and Ms Grant died at the scene after being repeatedly stabbed. Ms Pearson lived with Brown in a block of flats where they had been smoking crack cocaine. Brown's son Jake, now 18, arrived and he was also attacked, but survived. Ms Grant lived in a neighbouring flat and was murdered, while her partner Mr Latter was also attacked, but survived. Brown fled the scene but was spotted by eyewitnesses and captured on CCTV.
  • None Live updates from the sentencing hearing as it happened He was arrested shortly afterwards and told officers: "I lost my cool tonight" adding it was "not self-defence... plain murder, it's plain murder, not self-defence'." Family members were in court and heard how Brown's behaviour on the day was triggered by drug use.

  A forensic officer at the flats in Bletchley after the attacks on 25 December

  Deanne Heer KC, prosecuting, said Brown, his son Jake and Ms Pearson had been in the living room smoking crack cocaine before Brown "began attacking" his partner after she refused to hand over the crack pipe. She told the court that the teenager had described the scene as "like watching a horror film". Ms Heer described how Jake was attacked after he attempted to save Ms Pearson. He suffered a stab wound before grabbing his phone and shutting himself in a bathroom to call 999. Ms Pearson could be heard on the emergency call screaming: "Jaz, no, you're killing me, tell my children I love them." She suffered 31 stab wounds to her face, neck, chest, abdomen and arms as well scratches that were believed to have been inflicted after her death. Brown then made his way next door and attacked Ms Grant and her partner Mr Latter.

