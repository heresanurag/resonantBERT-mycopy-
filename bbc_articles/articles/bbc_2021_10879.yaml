  As I flew back to the UK, I reflected how it is often claimed that selfishness, greed and conflict are the hallmarks of humanity, but that is wrong.

  The defining human characteristic is actually our ability to co-operate - our ability to solve problems together explains the dominance our species has achieved.

  For the first time since I had been to the front of the glacier I began to feel the stir of something I was worried I'd lost entirely: a sense of purpose.

  I retell this story now because I want that sense that we can come together and take control of the processes driving climate change to underpin my reporting in my new role as climate editor.

  Of course, the BBC has been reporting climate change for decades and we'll be keeping up that tradition, especially during a crucial UN climate conference in Glasgow in November, where nations will be asked to renew their commitments to cutting emissions.

  But however ambitious the deal there is, we need to continue to report the latest science on climate change and the effect it is having on our world.

  And use that science as a yardstick to judge the progress our societies are making to reduce emissions.

  That means scrutinising what politicians, business people and - yes - all of us consumers are doing to try to reduce our impact on the climate.

  I do not want to nag or hector. We all face the same dilemmas over how the choices we make in our lives affect the climate.

  And I am optimistic about what we can achieve.

  We humans are wary of change but we are actually extraordinarily adaptable - another key to our success as a species. And we have a vast capacity for innovation.

  Think of the huge offshore wind industry flourishing here in the UK, or the way our car industry is retooling as the ban on new petrol and diesel vehicles approaches.

  Look at the UK companies at the forefront of all sorts of exciting low-carbon technologies - from nuclear fusion to plant-based foods - and consider the fortunes to be made as these new markets go global.

  And look at the progress being made to mobilise international finance behind the effort to tackle climate change - an endeavour being led by the City of London.

  But I will not forget what I saw in Antarctica. It reminds us that climate change is a process that is likely to take centuries to play out, and tens of thousands of years to reverse.

  Consider this: the last time CO2 levels were this high is reckoned to have been around four million years ago and it is estimated that the sea level then could have been as much as 30-40 metres higher than it is now.

  That's a measure of how important the climate issue is and also explains why I'm so pleased to be given this opportunity to play a role in covering it for the BBC.

  Tackling global warming will be the central project of the 21st Century and it is an incredible privilege to have been given a front row seat.
