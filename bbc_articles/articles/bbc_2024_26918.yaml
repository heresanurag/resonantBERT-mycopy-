title: 'Fatal Alloa blast: Neighbour describes ''almighty explosion'' - BBC News'
date: '2024-10-07'
section: Tayside & Central Scotland
url: http://www.bbc.co.uk/news/articles/cy4dgr9v0wro
content: |-
  Police confirm a man died at the scene and three others were injured in the blast in Clackmannanshire.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A restaurant manager said an explosion that killed a man and injured three others at a flat in Alloa, Clackmannanshire sounded "like a sonic boom." The man, who has not yet been identified, was inside the property when the explosion occurred and was pronounced dead at the scene. Police and emergency services declared a major incident at the property in Kellie Place on Sunday evening. Two men, aged 72 and 19, and a 49-year-old woman were treated at Forth Valley Royal Hospital.

  The man who died was in the property at the time of the explosion

  The explosion was captured on CCTV from the nearby Alba Restaurant. Restaurant manager Garry Singh said: "We heard a big bang and my initial reaction was that someone had crashed into the side of the building. "It was like a sonic boom, I've never heard anything like it in my life." His colleague Kuran Aujla said: "People from miles away could probably hear it, it was that bad. "Credit to all the community for coming out and supporting each other and making sure they're ok."

  Garry Singh and Kuran Aujla from Alba Restaurant rushed to help following the explosion

  Rosie Adamson, who lives near the property, said she "felt sick" thinking about the incident. Ms Adamson said: "I was just sitting watching TV and I heard this almighty explosion and I thought, 'oh my god what’s happened?'" "It was horrible, I was on edge all night." Ms Adamson said the emergency services were "so quick" to respond to the incident.

  Rosie Adamson said she was "still shaking" following the explosion

  She said: “I wasn’t sure what had happened, I just saw the flames, it was frightening. "I could see the police putting tape up so cars couldn’t get by." Ms Adamson said she was "still shaking" seeing the aftermath of the explosion. She said: “I don’t know the person but my thoughts are with their family. You just don’t think it’s going to happen in your wee town, it was unbelievable. “When I came out this morning I really didn’t want to see what I was going to see. I can’t stop thinking about the guy who died, and his family."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Police Scotland Sgt Neill Drummond said the force was "still working to establish the full circumstances of what happened at this property" though the cause of the explosion was still unknown. "However, we can confirm that one male has passed away," he added. "Our inquiries to confirm his identity and provide his next of kin with all the necessary support they may require are ongoing." Three other individuals who were injured were taken to Forth Valley Royal Hospital for treatment. Police Scotland said they had been alerted at about 18:00 that a building had been badly damaged. Eleven vehicles were sent including specialist units, the Scottish Fire and Rescue Service said.

  Gas engineers attended the scene of the explosion

  A spokesperson for gas distribution company SGN said: “Our sympathies are with all those affected following the explosion at Kellie Place in Alloa. “Our engineers have been on site since yesterday evening, as part of the emergency response, and are continuing to support the incident today while ensuring the area is safe.”

  The explosion happened in Kellie Place, Alloa, on Sunday evening

  Alloa Town Hall has been open as a respite centre for occupants of the other flats in the building, while gas and electrical work is checked. Police said they would be "appropriately supported" with alternative accommodation if their homes were not deemed safe to return to. The fire service said specialist urban search and rescue units and a heavy rescue unit were among the resources it had deployed. A spokesperson said: "Crews are working with emergency service partners to make the area safe." Local MP Brian Leishman described the incident as "absolutely awful" and thanked the emergency services and first responders who attended after the blast. In a social media post, external he said: "My thoughts go to the family and friends of everyone connected to the tragic incident that happened in Kellie Place." Keith Brown, MSP for the Clackmannanshire and Dunblane constituency, said his immediate thoughts were with the family and friends of the man who died. He added: “There will be understandable concerns, particularly amongst residents of neighbouring properties, about the cause of this explosion and the extent of the damage to other homes. “I know that the relevant authorities will be working hard to provide information, reassurance and assistance as quickly and efficiently as they can.”
