content: |-
  The birds would be "taken off air" if viewers could hear what they were saying, says the park CEO.

  Lincolnshire Wildlife Park near Skegness has created a separate enclosure for a growing group of swearing parrots.

  Three African grey parrots - Eric, Captain and Sheila, have been placed with an original group of five with "quite a bad language problem".

  Steve Nichols, CEO of the park, told BBC Breakfast's Jon Kay and Sally Nugent that the language was so bad, the parrots couldn't appear on the programme.
