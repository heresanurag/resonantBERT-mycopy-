title: Missing boy, 11, found 'safe and well' - BBC News
date: '2024-09-03'
section: London
url: http://www.bbc.co.uk/news/articles/c785yj5dz8jo
content: |-
  Police say Ibrahim went missing on Monday but has now been found.

  An 11-year-old boy who became separated from his mother in west London has been found.

  In a message on X, formerly Twitter, the Metropolitan Police said: "Pleased to confirm that Ibrahim, 11, who was missing from Hayes has been found safe and well."

  Ibrahim became separated from his mother outside a branch of Poundland at 16:20 BST on Monday.

  The police thanked the public for their help in locating him.
