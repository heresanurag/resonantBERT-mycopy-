title: Pedestrian dies following road crash in Crossmaglen - BBC News
date: '2024-11-02'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cwyg69zrxxjo
content: |-
  When police arrived at the scene in Cullaville Road, they found a man in the road with serious injuries.

  Officers were called shortly after 23:50 GMT following a report of a man lying on Cullaville Road

  A man has died following a road traffic collision in County Armagh late on Friday, police have said. The Police Service of Northern Ireland (PSNI) is appealing for witnesses after the male pedestrian's death in Crossmaglen. Officers were called shortly after 23:50 GMT with a report of a man lying on the Cullaville Road, which links Crossmaglen with Cullaville. When police arrived at the scene, they found a man in the road with serious injuries.

  Det Insp Michael Winters said: "CPR was commenced until the arrival of ambulance staff but sadly the man was pronounced dead at the scene." The PSNI is appealing for anyone who was travelling on the Cullaville Road around the time of the collision, or anyone who witnessed the accident, to contact officers. They are also appealing for dash-cam footage. The Cullaville Road has since re-opened. Newry, Mourne and Down Slieve Gullion councillor Aoife Finnegan said it was "devastating news" for the community. "I have spoken to the PSNI and want to follow up with a multi-agency meeting to see how we can prevent this from happening," she said "Our condolences go to the family and friends of this individual."
