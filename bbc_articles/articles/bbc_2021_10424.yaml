title: 'Covid: 25,161 new cases and UK falls just short of vaccine landmark - BBC
  News'
date: '2021-08-09'
section: UK
url: http://www.bbc.co.uk/news/live/uk-58142926
content: |-
  The figure for newly-confirmed Covid infections is bang in the middle of the range for the past two weeks.

  While these are impressive figures on the vaccination front, the Uk has faced another accusation that it is "hoarding" Covid vaccines.

  The Global Justice Now campaign group says the UK's unused doses of vaccine could cover the 10 least-vaccinated countries in the world, which includes Syria, Yemen and South Sudan.

  The group says low and middle income countries are left "fighting for scraps".

  The UK has ordered more than 500 million doses of seven of the most promising vaccines, including the four so far approved for use.

  There would be millions of doses to spare even if all over-16s were jabbed and third doses were given to high-risk groups, Global Justice Now says, citing data from life science analytics company Airfinity.

  Nick Dearden, director of the campaign group, says: "It's an insult to the thousands dying each day from Covid-19."

  China and India have administered the highest number of vaccine doses, with almost 1.8 billion and more than 500 million respectively. The US ranks third, with around 350 million.

  While countries in Europe and the Americas are progressing well with their vaccination campaigns, many states in Africa have experienced supply issues.

  Read more: How fast is progress around the world?
