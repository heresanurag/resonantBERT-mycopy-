title: Former volunteer Ukrainian soldier challenges LGBT taboos - BBC News
date: '2019-01-17'
section: General
url: http://www.bbc.co.uk/news/world-europe-46897341
content: |-
  The LGBT community in Ukraine is often under attack but one volunteer soldier has now gone public about his sexuality.

  The LGBT community in Ukraine is often under attack but one volunteer soldier has gone public about his sexuality.

  Viktor Pylypenko, 31, decided to come out after hearing how the LGBT community was being talked about.

  The BBC's Zhanna Bezpiatchuk went to meet him.
