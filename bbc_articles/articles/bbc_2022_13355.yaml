  The new prime minister reverses Liz Truss's plan to allow fracking in some areas to boost energy supplies.

  Is there wiggle room on the Tories' 2019 election pledges?

  Speaking to journalists after this afternoon’s Prime Minister’s Questions, Rishi Sunak’s press secretary stressed the prime minister wants to deliver “on the promise of the 2019 manifesto”. Pressed on whether that’s the same as committing to all the promises IN that manifesto, they repeated the focus was “the promise of the 2019 manifesto”. A small difference in words, but the government obviously thinks this will give them some wiggle room – allowing them to keep things more vague than being held to every single pledge in that 2019 document. So Sunak believes this philosophy means he has the mandate to re-instate the moratorium on fracking - a 2019 pledge ripped up, momentarily, by Liz Truss - and bring down net migration. But, his team also think this form of words avoids Sunak being held to every single line of the last manifesto. Something he may feel he’s ultimately unable to do. For example, at this point he’s refusing to guarantee "triple lock" on pensions - which means they rise with the highest of inflation, wages or 2.5% - will continue. That pledge was page 16 of the last manifesto. What else was in the manifesto? Here's how we explained 13 of its key policies at the time.
