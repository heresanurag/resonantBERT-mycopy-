title: BBC Radio 1 pays tribute to legendary DJ Annie Nightingale - BBC News
date: '2024-01-12'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-67961559
content: |-
  The station's first female presenter and longest-serving host has died at the age of 83.

  BBC Radio 1 presenter Mollie King and Matt Edmondson have paid tribute to the station's legendary DJ Annie Nightingale, after her death at the age of 83.

  Nightingale became Radio 1's first female presenter in 1970 and remained the only woman on the line-up for 12 years, also becoming its longest-serving host.

  She was known for her passion for a wide range of music, championing everything from prog rock and punk to acid house and grime.
