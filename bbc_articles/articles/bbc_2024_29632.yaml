content: |-
  Watch the moment phone thieves were caught after stealing 35 phones in south-east London.

  A man and two teenage boys have been sentenced for a series of 35 separate phone thefts in south-east London last year.

  Using electric motorbikes, the trio targeted people in Bermondsey and Greenwich snatching phones worth over £20,000, according to the Met Police.

  Kie Joyce, 21, from Bermondsey, was sentenced to three and a half years' imprisonment for conspiracy to steal and driving offences, on 19 September at Inner London Crown Court.

  Two 16-year-old boys, who cannot be named for legal reasons, were also involved in the thefts. One boy was sentenced to six months' imprisonment, at the Old Bailey on 1 November. The other received a nine-month supervision requirement, on 26 February, at South London Magistrates' Court.

  Thirty of the phones have been successfully returned to their owners, the Met said.

