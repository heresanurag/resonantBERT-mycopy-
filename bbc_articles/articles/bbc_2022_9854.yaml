  The rising costs are also a concern for those who are about to graduate.

  Jade Calder, a history student at the University of Oxford, will graduate next month and has said the cost of living crisis makes her wonder if she will be able to access the right career opportunities in the future.

  Her family is not be able to support her financially.

  "How am I supposed to be optimistic about the future when I know it is going to be difficult?", she said.

  "It is not a good time to be a young person in this country, trying to have a career."

  Bianca Capatina, 20, a journalism student at Solent University in Southampton, also said that rising costs and the thought of the future had caused her anxiety.

  "It's stressing me out, just the thought of what will happen after university with prices escalating," she said.

  A spokesperson for the Department for Education (DfE) said no student should have to worry unduly about their financial situation while they are focusing on their studies.

  "We have asked the Office for Students to protect the £256m available to support disadvantaged students and those who need additional help - which is in addition to universities' own hardship funds," the spokesperson added.

  Maximum grants and loans for living costs are set to increase by a further 2.3% next year, while maximum tuition fees are expected to be frozen for the next three years, according to the DfE.

