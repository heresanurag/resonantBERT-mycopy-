title: Two lorry drivers killed in A15 crash in Lincolnshire - BBC News
date: '2024-12-24'
section: Lincolnshire
url: http://www.bbc.co.uk/news/articles/czr34yep18mo
content: |-
  The collision happened on the A15 north of Caenby Corner, police say.

  The crash happened on the A15 near the Snitterby junction, Lincolnshire Police said

  Two men have died after two lorries crashed on a major road in Lincolnshire. The collision, which involved a Volvo and Scania lorry, happened near the Snitterby junction on the A15 north of Caenby Corner at about 09:30 GMT, Lincolnshire Police said. One of the men was from the Barnsley area of South Yorkshire and the other was from Cleethorpes in north-east Lincolnshire, police added. The road remains closed and officers have appealed for witnesses or anyone with dashcam footage of the scene to contact the police.

  The force had previously said a car was also involved but has since clarified the incident only included the two lorries. "Officers attended following the collision near the Snitterby junction, which involved a Volvo lorry and a Scania lorry," Lincolnshire Police said in a statement. "Sadly, the drivers of both lorries were pronounced dead at the scene."

