content: |-
  BBC News NI looks at the legal twists the victims' families have faced over the Real IRA bombing.

  This video can not be played To play this video you need to enable JavaScript in your browser. BBC News NI looks at the events of 15 August 1998, the day of the Omagh bombing

  The Omagh bomb exploded on 15 August 1998, killing 29 people including a woman pregnant with twins.

  No-one has ever been convicted of the atrocity.

  BBC News looks back at the many legal twists and turns in the families' two-decades campaign for justice.

  The bomb detonated in a car parked in the middle of the main street in the town

  A large car bomb explodes on a Saturday afternoon in the centre of Omagh, County Tyrone. The town's main street is crowded with shoppers and more than 200 people are injured. Twenty-nine of the victims, including a woman pregnant with twins, will die as a result of their injuries. In terms of the final death toll, it is the worst single atrocity after almost 30 years of the Troubles in Northern Ireland.

  A recently-formed dissident republican group, calling itself the Real IRA, claims responsibility for the bomb. In a statement, the paramilitary group says its targets were "commercial" and offers an apology to the "civilian" victims.

  The judgement and leadership of the head of the police in Northern Ireland during the Omagh bomb investigation is described as "seriously flawed". The comments come in a damning report by Police Ombudsman Nuala O'Loan. Chief Constable Sir Ronnie Flanagan says the report does not represent a "fair, thorough or rigorous investigation". He says both he and the force are considering legal action to quash the report.

  Sir Ronnie Flanagan was the head of the police at the time of the bombing in 1998

  A dissident republican is found guilty of plotting to cause the Omagh bombing Colm Murphy, then 49, is the only person charged in connection with the bombing. Murphy, a builder and publican originally from south Armagh, had denied one charge of conspiring to cause an explosion but three judges at a non-jury court in Dublin deliver a guilty verdict.

  The Police Service of Northern Ireland rejects a number of key allegations made in the ombudsman's report. Sir Ronnie Flanagan accepts that some mistakes were made but insists that nothing could have been done to prevent the bombing.

  The alleged founder and leader of the Real IRA, Michael McKevitt, is found guilty of directing terrorism and membership of an illegal organisation in the Republic of Ireland. The businessman, from Blackrock in County Louth, is not charged over the bomb but is the first person to be prosecuted for directing terrorism. The Irish government introduced the new offence in response to the Omagh attack.

  Colm Murphy's conviction is ruled unsafe due to alleged irregularities surrounding evidence given by detectives at his trial. He faces a re-trial.

  This video can not be played To play this video you need to enable JavaScript in your browser. Who were the victims of the Omagh bombing?

  County Armagh man Sean Hoey is formally charged in court with the murders of 29 people in the 1998 Omagh bombing. The electrician, from Molly Road in Jonesborough, is the first person to face a murder charge in relation to the attack.

  Sean Hoey is found not guilty of 58 charges, including the murders of 29 people in the Omagh bombing. Clearing Mr Hoey, the judge criticises police witnesses for "deliberate and calculated deception" during the 10-month trial.

  Sir Ronnie Flanagan, the head of the police at the time of the Omagh attack, apologises to the families of the victims of the bomb. He says he is "desperately sorry" people have not yet been brought to justice.

  The victims' families begin a landmark civil case, suing five men they allege were involved. The case breaks new legal ground, and is believed to be the first time anywhere in the world that alleged members of a terrorist organisation have been sued.

  The judge in the civil trial rules that Michael McKevitt, Liam Campbell, Colm Murphy and Seamus Daly were all liable for the Omagh bomb. He orders them to pay a total of £1.6m in damages to 12 relatives who took the case. A fifth man, Seamus McKenna, is cleared of liability.

  Colm Murphy, the only man jailed in connection with the bombing, is cleared following a retrial. The judge says interview evidence from members of An Garda Síochána (Irish police force) is inadmissible.

  In 2009, Michael McKevitt, Liam Campbell, Colm Murphy and Seamus Daly were found responsible for the bombing in a landmark civil trial

  Michael McKevitt and Liam Campbell lose their appeal against the civil trial verdict. Colm Murphy and Seamus Daly both win their appeals but will face a civil retrial.

  Seamus Daly and Colm Murphy are both found liable for the Omagh bombing after a civil retrial.

  Northern Ireland Secretary Theresa Villiers says she has decided not to hold a public inquiry into the circumstances surrounding the Omagh bombing, adding that she does not believe there are sufficient grounds to justify a further inquiry beyond those that have already taken place.

  Seamus McKenna, who was acquitted in the civil action taken by relatives of the bomb victims, dies age 58. His death is a result of injuries he sustained in a fall while repairing a roof at a school in Dundalk, County Louth. A major security operation is put in place for his funeral four days later.

  Police in Northern Ireland charge Seamus Daly with the murders of 29 people in the Omagh bomb attack. They also charge him with an attempted bomb attack in Lisburn, County Antrim, that took place in 1998.

  Seamus Daly was released from Maghaberry Prison in County Antrim

  The prosecution case against Seamus Daly collapses. The Public Prosecution Service decides there is no reasonable prospect of conviction after a key witness contradicted his own previous testimony. Mr Daly, who has always denied any involvement in the bombing, is released from prison.

  A bid by two men to overturn a landmark civil ruling that found them liable for the Omagh bombing is rejected by the European Court of Human Rights. Liam Campbell and Real IRA leader Michael McKevitt took their case to Europe, arguing that the civil trial in Belfast High Court had been unfair.

  Belfast's High Court allows some evidence connected to the 1998 Omagh bombing to be heard in secret. The government had applied for a "closed material procedure" (CMP) for a judge to examine whether public disclosure of information would be damaging to national security. After viewing a sample of sensitive documents, the judge ruled that a CMP would be allowed.

  It emerges that relatives of the Omagh bomb victims are to sue Northern Ireland's police chief for failings they believe allowed the killers escape justice. A writ is issued against the chief constable, focusing on what happened after the car bomb and why no-one has been convicted of murder.

  This video can not be played To play this video you need to enable JavaScript in your browser. The BBC's Ireland correspondent Chris Page reports from a ceremony marking the 20th anniversary of the Omagh bombing

  Events including a cross-community memorial ceremony are held to mark the 20th anniversary of the Omagh bomb. As well as prayers, speeches and music, a minute's silence is held in remembrance of those who died. A bell is rung 32 times in memory of the victims, with the extra single peal for all who have lost their lives in atrocities around the world.

  A Fermanagh and Omagh District Council committee passes a motion opposing the extradition of Liam Campbell to Lithuania over allegations he was part of an operation to buy guns and bombs for the Real IRA. Put forward by an independent councillor, the motion is supported by Sinn Féin and the SDLP. Shortly afterwards SDLP leader Colum Eastwood says it is wrong and his party subsequently withdraws its backing.

  Michael McKevitt dies, having been diagnosed with cancer. The 71-year-old had been released from prison in 2016 after his conviction in 2003 for directing terrorism.

  Northern Ireland First Minister Arlene Foster says the relatives of those murdered in the bombing deserve an apology over the length of time a court is taking to rule on a call for a public inquiry. The lord chief justice's office blames the situation on the assessment of "sensitive" documents.

  Belfast High Court rules it was plausible that the bomb could have been prevented by security services and Mr Justice Mark Horner calls for new investigations in the UK and the Republic of Ireland. Michael Gallagher, who brought the legal action, calls again for a full public inquiry.

  Explaining its reasons for urging new investigations, the High Court in Belfast says it had heard that in the six months before August 1998 there had been 24 dissident attacks - many of the suspects would later be involved in the Omagh bomb. Mr Justice Horner said: "There is no doubt the authorities could have made life very uncomfortable for those dissident republicans. It is arguable that such a proactive policy would have had the real prospect of preventing the Omagh bomb." The Northern Ireland Office says it will "carefully consider" calls for a fresh investigation.

  The Northern Ireland Secretary Chris Heaton-Harris meets some of the families of those killed and asks for more time to consider if there should be an investigation or public inquiry.

  A decision on whether to order a new investigation or public inquiry into the Omagh bombing is expected to be made in January, the High Court in Belfast hears.

  The UK government announces there will be an independent statutory inquiry into the Omagh bombing. It will have the full powers of the Inquiries Act 2005, the act under which public inquiries are normally held. It was described by Michael Gallagher as an "important step forward".

