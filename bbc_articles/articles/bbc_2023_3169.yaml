  Lord Turnbull, a senior judge in Scotland, is appointed as the chairman of the inquiry.

  The Irish government said it would consider its next steps when it has more clarity on the UK's inquiry. Tánaiste (deputy prime minister) Micheál Martin said his government needed to see the terms of reference. "As we approach the 25th anniversary of the attack, we will not be found wanting," he added.
