title: 'By-election 2023: Lib Democrats win Somerton and Frome from Tories - BBC News'
date: '2023-07-21'
section: General
url: http://www.bbc.co.uk/news/uk-politics-66264363
content: |-
  Sarah Dyke wins the seat with 21,187 votes after David Warburton resigned earlier this year.

  Sarah Dyke of the Liberal Democrats has won a by-election in the constituency of Somerton and Frome, receiving 21,187 votes.

  Tory MP David Warburton previously held the seat before resigning earlier this year.
