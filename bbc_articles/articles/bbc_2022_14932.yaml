title: 'Jeremy Hunt: We want Scandinavian quality alongside Singaporean efficiency
  - BBC News'
date: '2022-11-18'
section: General
url: http://www.bbc.co.uk/news/uk-politics-63663033
content: |-
  The chancellor says he wants the NHS to join all public services in tackling waste and inefficiency.

  Chancellor Jeremy Hunt has asked the NHS "to join all public services in tackling waste and inefficiency".

  "We want Scandinavian quality alongside Singaporean efficiency", he said, which would deliver "better outcomes for citizens".

  But Mr Hunt added this did not mean front-line workers, who are "often exhausted and burned out", should work harder.

