content: |-
  Kristine Fishell was the second winner of Musk’s giveaway at a town hall event in Pennsylvania on Sunday night.

  Kristine Fishell was the second winner of tech billionaire Elon Musk’s $1m-a-day giveaway (£766,000) at a town hall event in Pennsylvania on Sunday night.

  Musk said he will run the give away for registered voters in key swing states until the US presidential election on 5 November.

  The winner will be chosen at random from those who sign a pro-US Constitution petition by Mr Musk’s campaign group AmericaPAC, which he set up to support Republican nominee Donald Trump's bid to return to the White House.
