title: 'Newspaper headlines: ''Fuel duty next'' and ''Brexit reset'' - BBC News'
date: '2024-08-29'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c990kl9xm7po
content: |-
  Sir Keir Starmer's visit to Germany features on a number of Thursday's front pages.

  Sir Keir Starmer laid out plans for a new treaty with Germany as part of a wider 'reset' of relations with the EU

  A number of Thursday's front pages lead with the prime minister's trip to EU states which began on Wednesday. "Brexit reset" is the headline on the Daily Mirror, external, which leads with Sir Keir Starmer's attempts to foster a closer relationship with Europe. The paper points out that new plans on trade, illegal migration, security and technology feature in a treaty being "hammered out" with Germany. But EU sources tell the i newspaper, external if Sir Keir wants to improve relations, he will have to agree to a key demand from Brussels - the easing of immigration rules for young Europeans. Government insiders tell the Financial Times, external ministers want to "bolster education and cultural exchanges". However, they insist that wouldn't be comparable to youth mobility schemes suggested by some within the bloc. Elsewhere, the Daily Mail, external reports that drivers are being warned to prepare for a fuel duty hike as Chancellor Rachel Reeves lines up tax rises in a "painful" Budget.

  The same story features on the front of the Daily Telegraph, external which says Sir Keir Starmer has opened the door to a rise in fuel duty in this autumn’s Budget. The Sun, external leads on its exclusive about leaked government plans which it says feature "drastically toughened up" proposals to "phase out smoking". The chief inspector of probation tells the Times, external it is "inevitable that things will go wrong" when thousands of prisoners are released early next month, in an effort to tackle overcrowding in jails. Finally, a new report by a leading think tank, the Institute for Fiscal Studies, is highlighted on the front page of the Guardian, external. The IFS says that "woeful budgeting" by the Home Office - under the Conservative government - led to repeated overspending on asylum support.

