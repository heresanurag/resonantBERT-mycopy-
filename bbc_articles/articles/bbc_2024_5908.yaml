title: 'BBC Elite British Sportswomen''s Study 2024: Sportswomen discuss their use
  of the contraceptive pill - BBC Sport'
date: '2024-03-26'
section: General
url: http://www.bbc.co.uk/sport/68631176
content: |-
  There is a pill that you feel supports your athletic performance.

  You also worry it makes you feel a bit low, you are not 100% sure of the research behind it and feel a bit strange about putting synthetic hormones into your body.

  Would you take it?

  This is the dilemma faced by some sportswomen when it comes to contraceptive pills.

  A quarter of respondents in a BBC Sport study of elite British sportswomen said they take a contraceptive pill specifically to control the impact their period has on their performance.

  Many athletes spoke about using the combined pill to time their bleed so that it does not interfere with training or competition.

  British Sailing Team athlete Lily Young used the pill in this way, but says she feels research around how to take it "is a bit, not confirmed".

  The main purpose of the combined pill is to stop pregnancy and hormones are used to achieve this.

  Patients usually take the pill for 21 days, then have a break for seven days, which brings on a bleed.

  Young used to skip these breaks, taking the pill continuously for up to three months at a time.

  "I think they're never quite sure on how long to take it for," the 25-year-old says.

  "They [medical professionals] seem to say no longer than three months back-to-back is a good place."

  She adds: "I try to have as few periods throughout the year as possible.

  "We go out on the water for long periods of time and wearing a tampon - I don't like it that much.

  "I always try to plan by taking the pill back-to-back for three months at a time sometimes, to get rid of any of those symptoms happening.

  "I never feel quite the same on my period. I always feel a bit hot when I try to work out."
