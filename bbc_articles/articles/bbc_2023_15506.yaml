title: Protester throws glitter over Starmer at conference - BBC News
date: '2023-10-10'
section: General
url: http://www.bbc.co.uk/news/uk-67065235
content: |-
  A man disrupts the start of Sir Keir Starmer’s speech approaching the Labour leader on the podium.

  Sir Keir Starmer’s conference speech was disrupted as a man approached the Labour leader as he prepared to speak.

  The man shouted about "true democracy" and "crisis" before he was dragged off the stage.

  Sir Keir laughed off the protest and took off his jacket to deliver his speech.
