  At 19:57 on , SFRS Fire Control received a call reporting a fire classified as Persons Reported Fire in Myddle, Shrewsbury.

  4 fire appliances were mobilised from Baschurch, Oswestry, Shrewsbury and Wem. Operations and Fire Investigation officers were in attendance.

  Crews used the following equipment to tackle the fire:

  Also at the scene of the incident were: the Land Ambulance Service and the Police.

  Fire in kitchen of domestic property. One female casualty rescued by fire service from first floor bedroom using a 9metre ladder.

