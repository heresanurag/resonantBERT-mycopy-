title: Tory candidate linked to pastors accused of homophobia - BBC News
date: '2024-06-03'
section: Wales
url: http://www.bbc.co.uk/news/articles/cn4475ld055o
content: |-
  Darren Millar, who is standing in Clwyd North, says he does not share the views of Yang Tuck Yoong.

  The Conservatives have selected a parliamentary candidate with links to preachers accused of homophobia and Islamophobia. Darren Millar, who is currently a member of the Welsh Parliament, has been selected to stand for the new parliamentary seat of Clwyd North in North Wales. Mr Millar has previously attracted controversy for his association with a pastor called Yang Tuck Yoong, who was criticised for homophobic views. Mr Yoong said homosexuality was an “abomination” and a “sin” and was reported to police in 2013 after saying it was “far more rampant, militant and organised than most of us actually believe it to be” in a sermon titled ‘The Sin of Sodom'. Mr Millar has said he does not endorse his views.

  In 2019, it emerged that a charity Mr Millar was a trustee of – the Evan Roberts Institute – had financial links to Mr Yoong’s Cornerstone Community Church. He said at the time he did not share his views but human rights campaigners had called for him to cut ties with the church. The latest accounts of the Evan Roberts Institute show that the charity still leases a chapel it bought in 2014 to the Cornerstone Community Church, earning it income of £11,000 in ‘Freehold Reversionary Interest.’ Mr Millar told the BBC he did not endorse the views of the pastors and said “no one should be discriminated against on the basis of their sexual orientation or religious beliefs". The refurbishment work on this chapel in Loughor, Swansea, was also paid for by the Cornerstone Community Church.

  In a video seen by the BBC from 2015, Mr Millar can also be seen at the opening of Mr Yoong’s Bible College of Wales pictured alongside two other controversial preachers. The footage shows Mr Millar at an event bowing with separate US preachers who have been accused of Islamophobic and homophobic views - Lou Engle and Dutch Sheets. A former Labour member of the Welsh Parliament, Edwina Hart, is also visible in the video. She is no longer an elected politician and is not running to be an MP in the general election. In 2018, Mr Engle allegedly told a conference in Singapore that Muslims were "taking over the south of Spain" and said he "had a dream, where I will raise up the church all over Spain to push back a new modern Muslim movement". After the conference, hosted by the Cornerstone Community Church, police in Singapore reportedly investigated him over whether his comments could undermine religious harmony in Singapore. It was reported that Mr Yoong later apologised, external to Muslim community leaders for comments made by Mr Engle. Mr Engle has also reportedly called for "martyrs" to stop the "homosexual agenda", external and accused Muslims of "fuelling the demonic realm" in sermons., external Also pictured with Mr Millar in the footage is the pastor Mr Sheets - a Christian nationalist. Mr Sheets has previously said that America must "refuse to give this nation to demons" including "Hinduism" and said that "Christianity will invade Islam". In a comment about the event at the time, Mr Millar said he was “delighted” to be at the event and said: “I thank God immensely how He shook a guy in Singapore and attracted him to this place in order to invest in what I believe is a project that would have ramification for the kingdom of God for many years to come. And I am delighted to be part of it.” A Conservative Spokesperson said: "The Conservative Party does not condone homophobia or discrimination of any sort. Mr Millar has been clear that he does not share the views of these individuals."
