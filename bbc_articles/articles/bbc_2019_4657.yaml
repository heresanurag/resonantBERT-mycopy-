  And he praised the addition of Steven Graham to the cast. "Graham, a compact parcel of Scouse gelignite, doesn't tend to play softies, so his simmering aggression felt all too credible."

  He did sound a note of caution though. "Elsewhere there were hints that the script is overcooking itself... and how cartoonish were those silly biker villains seeking their long-lost drugs?" he wrote.

  Express reviewer Neela Debnath wrote: "Episode one has all the verve and energy we've come to expect from Line of Duty but season five also feels like it's now a continuation of a much bigger story that fully emerged at the end of the series four finale."

  Metro gave the BBC One drama five stars. Keith Watson wrote: "Few actors do menacing and brooding better than Stephen Graham and he's perfectly cast as John Corbett, a man on a short fuse with a steely coldness to his eyes and a way of making everything he says drip with sinister threat. Corbett's agenda is the lifeblood of this Line of Duty.

  "It's got balaclavas, it's got the mystery of the letter H, it's got spine-tingling interrogations to come. Line of Duty has the next five Sunday nights under house arrest."

