title: Line of Duty hooks 7.8m to become most-watched show of 2019 so far - BBC News
date: '2019-04-01'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-47773182
content: |-
  The return of Line of Duty was the most watched episode in the history of the police drama.

  Sunday's episode of Line of Duty was the most-watched show of 2019 so far, according to overnight figures.

  The first instalment of series five was watched by 7.8 million viewers. That also made it the most-watched episode in the history of the police drama.

  In comparison, series four's opener was seen live by 5.4 million, with the finale watched by 7.5 million.

  The series five premiere went up against Victoria on ITV, with the period drama attracting 3.1 million.

  Line of Duty's return follows the success of writer Jed Mercurio's other hit show, Bodyguard, the opening episode of which was seen live by 6.6 million last year. Its finale drew a record-breaking 10.4 million viewers, according to overnight ratings.

  Rochenda Sandall (left) and Stephen Graham (second from right) are part of a criminal gang

  Line of Duty's series five opener, which was described by its star Martin Compston as "the scariest yet", received largely glowing reviews.

  The Times critic Carol Midgley gave it four stars and wrote: "[Jed] Mercurio knows how to begin an episode and is a master at ending one, last night giving us two final shocks like successive thwacks to the head.

  "It is a dependable, wily machine, superior in my view to Mercurio's other baby, Bodyguard."

  No love lost: Sandall reveals there is a rivalry between her character and Graham's

  The Guardian's Lucy Mangan gave it a maximum five stars.

  "As ever, nothing is wasted; not a scene, not a line, not a beat," she wrote. "For every morsel of information gathered by the team and by the viewer, another turn reveals 100 hidden possibilities.

  "It fits together flawlessly - you can imagine Mercurio sitting like a watchmaker at his table with the parts spread before him and fitting the loupe to his eye before assembling the whole thing and listening for its perfectly regulated tick. Good times await. OMG."

  The Telegraph's Jasper Rees, giving the episode four stars, was also impressed. "Mercurio's script cleverly comes at a familiar scenario from a new angle," he wrote.

