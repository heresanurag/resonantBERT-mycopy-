title: Weston-super-Mare funeral director offering free limo rides to prom - BBC News
date: '2025-06-16'
section: General
url: http://www.bbc.co.uk/news/videos/cdj948el0zwo
content: |-
  A social media post offering lifts has spread "like wildfire" in the community, says Luke Reynolds.

  Prom season is upon us, but for some families the monumental school event can be a financial burden.

  Elms Funeral Directors in Weston-super-Mare, north Somerset, is helping to make the night memorable for teenagers by offering free limo rides.

  Enquiries can be made confidentially, and those attending prom can even request things like bows and ribbons to personalise the limo for their special night.

