  Evans, despite a difficult season where he has struggled for form and fitness, is a reassuring presence in this British team. He has dropped to outside the world's 150 in recent months but, in front of about 6,500 fans at Manchester Arena, demonstrated his value. Those watching would have been forgiven for thinking Evans would breeze past the unheralded Vasa, a regular on the bottom-rung Futures Tour. However, the 27-year-old Vasa surprised the crowd - if not Evans - by playing well above his ranking. "It was a difficult match," he said. "He played great at the start. I knew he would come out and play aggressive. "I found it tough for a long time to get the ball-striking and I started to play better in the second and better at the end."

  Evans is playing his 26th Davis Cup tie, moving him past the recently-retired Andy Murray into joint second on the list of most British appearances

  Having missed out on last year's Davis Cup Finals knockout stage, Spain got past the Czech Republic in Valencia in their quest to avoid the same fate in 2024. There was a brief scare for Carlos Alcaraz, who dropped the opening set of his match against Tomas Machac before recovering to level at 6-7 (3-7) 6-1. Machac, seemingly cramping, then retired in the opening game of set three. Spain's Roberto Bautista Agut had earlier defeated Jiri Lehecka 7-6 (7-1) 6-4. Italy beat Brazil in Bologna behind singles wins for Matteo Berrettini and Matteo Arnaldi. The United States fended off Chile 3-0 in Zhuhai, China, with third-set tie-break wins for Reilly Opelka, Brandon Nakashima and the doubles pairing of Austin Krajicek and Rajeev Ram. Canada also beat Argentina 2-1 in Manchester, Belgium overcame Netherlands in Bologna by the same score, Australia defeated France 2-1 in Valencia, and Germany sunk Slovakia 3-0 in Zhuhai.
