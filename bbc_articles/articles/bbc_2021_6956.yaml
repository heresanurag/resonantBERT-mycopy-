title: 'Bridgend: Woman seriously injured after hit-and-run - BBC News'
date: '2021-06-25'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-57614576
content: |-
  The woman has been taken to hospital as police urge the unknown driver to come forward.

  A woman has been taken to hospital with serious injuries after a hit-and-run.

  South Wales Police said the pedestrian was hit by an unknown vehicle on Barnes Avenue, Bridgend, at 11:00 BST on Friday.

  The Welsh Air Ambulance was called to the scene, although the woman was taken to University Hospital of Wales, Cardiff, by road.

  The force has urged the driver, witnesses or anybody with information to come forward.
