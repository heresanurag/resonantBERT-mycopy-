  The battle to earn selection for the British and Irish Lions squad continued in the second round of the Six Nations, but who staked their claim?

  This video can not be played To play this video you need to enable JavaScript in your browser. Ashton & Marler pick Lions XVs after Six Nations week two

  The battle to earn selection for the British and Irish Lions squad continued in the second round of the Six Nations, but which players staked their claim? Lions head coach Andy Farrell was at Murrayfield on Sunday to watch his Ireland team overpower Scotland, while England overcame France in a thriller to claim their first win. Six Nations Rugby Special pundits Joe Marler and Chris Ashton have selected their starting XVs based on the weekend's matches, and here are three positions under consideration. You can list your own picks in the comments section below.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Fin Smith produced an inspired second-half display at Twickenham to turn the tide in England's favour over France. Smith, on his first Test start, began slowly before creating two late tries. He changed the direction of attack to clip the ball wide for Northampton Saints team-mate Tommy Freeman to gather and score, before timing his pass for Elliot Daly to glide through the French defence in the penultimate minute. Smith's conversion handed England victory and he was named player of the match to stake his claim for the number 10 jersey. Marcus Smith, who started at fly-half in the opening round defeat by Ireland, had a solid game from full-back but will be targeting a return to his preferred position. It remains to be seen whether Farrell considers Marcus Smith as an option at fly-half or elsewhere but Fin Smith has certainly boosted his chances. In the Scottish capital, Finn Russell was denied the chance to impose himself on Ireland and strengthen his claim to the Lions' 10 shirt which he wore in South Africa in 2021, after colliding with team-mate Darcy Graham in the first half. His opposite number Sam Prendergast ended the game with the player-of-the-match award after a balanced and controlled display. The 21-year-old, on his fifth cap, fired an excellent long pass for Calvin Nash to score the opening try and kicked 12 points from the tee. Former Scotland captain Johnnie Beattie told BBC Rugby Union Weekly: "He is 21 years old and is only going to get better. "He needs game time to mature and grow in confidence but in terms of raw material, with his kicking game and his ability to take time on the ball and choose the right option, his distribution was excellent." BBC rugby union correspondent Chris Jones added: "The 10 is a really interesting debate. It is still Finn Russell's shirt from 2021 because he finished the third Test. "He didn't get a chance against Ireland to show what he can do but knowing Finn, he will have a blinder against England at Twickenham and cement himself. "But then there is Fin Smith, Sam Prendergast, Jack Crowley and Marcus Smith, whether he goes at 10 or as more of a floating outside back."

  Tom Curry has been one of the standout England performers under Steve Borthwick and he continues to excel after recovering from hip surgery. He carried with intensity, making valuable metres in the build-up to Fin Baxter's try, and was tireless at the breakdown. When fit, Curry is one of the first names in Borthwick's XV and former England wing Ashton says the Sale Sharks flanker is also a cert in the Lions back row, alongside Ireland captain and number eight Caelan Doris. "Having had such a big hip operation and coming back to play the way he is, is impressive," said Ashton. "He could hardly walk off the pitch because he put such a shift in. "We have so many good back rows but I think seven and eight are nailed on." England's Ben Earl also impressed after moving to the flank with his powerful ball-carrying and energy around the field, but both Ashton and former England prop Marler picked replacement Ollie Chessum in their Lions teams from round two. Chessum was dynamic in the loose and shored up England's line-out, from which they were able to lay the platform for Daly's winning try. Ireland's Josh van der Flier, the 2022 World Player of the Year, was at the centre of the visitors' dominance in Edinburgh, making the most tackles of any player on the field (19) while Jac Morgan was the Welsh silver-lining in a disappointing defeat by Italy.

  Ireland loosehead prop Andrew Porter was in supreme form against Scotland. He battled hard against Zander Fagerson, who is also tipped for Lions selection, before folding up replacement Will Hurd in the scrum. It was his power and exuberance in open play, however, which shone through. Porter charged at Scotsmen with ball in hand and at the breakdown all afternoon. His clear-out of the ruck allowed Ireland quick ball for James Lowe to score their third try before his neat hands created the opportunity for Jack Conan to claim the fourth. Marler picks Porter as his loosehead of round two, while he also selects former England team-mate Will Stuart. Like Porter, tighthead Stuart was influential in the set-piece and from open play as England claimed revenge for their record defeat by Les Bleus two years ago. "I have been really impressed with Will Stuart," said Marler. "He has had a number of chances over the last couple of seasons but has not really been able to bring his club form with Bath to the international stage. "He is now putting in some really big performances." Ashton, meanwhile, selects England loosehead Ellis Genge for his tenacity in the loose and leadership as Borthwick's vice-captain.

