  FA chief executive Mark Bullingham said: "We are honoured to be the sole bidder for the Fifa Women's World Cup 2035. The hard work starts now to put together the best possible bid by the end of the year." Scottish FA chief executive Ian Maxwell said: "We look forward to working together to finalise our proposal and lay the foundations for a tournament that will excite football fans around the world and inspire girls and women across Scotland." Patrick Nelson, chief executive of the Irish FA, said: "There's still a lot of hard work to be done along with our partners in bringing it all together, however this will be a brilliant opportunity to show the world what Northern Ireland and Belfast have to offer." Noel Mooney, chief executive of the Welsh FA, said: "With our first ever participation in a Women's Euro's coming up this summer and the hosting of major women's finals coming to Cymru [Wales], we are on an incredible journey so we must make the most of this to inspire the next generation of players, volunteers and supporters." England women's manager Sarina Wiegman said: "We know from the experience of the Euros [in 2022] how big the game is already here and what the momentum did in the country. "Another tournament on an even bigger stage would be incredible and give another boost to the game." Formal bids for the 2035 World Cup must be submitted this winter, with a vote taking place to confirm the hosts in a Fifa congress in 2026. Infantino also confirmed that the 2031 Women's World Cup will be a 48-team tournament, up from 32 in 2027. Should the UK's bid be confirmed, the 2035 Women's World Cup will be the second time a World Cup has been held in the home nations after the 1966 men's tournament in England.

  English FA insiders are delighted by the news and see it as a hugely significant moment for both women's football in the UK as well as the governing body's relationship with Fifa, which officials have been trying to improve. England failed to win the right to host the men's World Cups in both 2006 and 2018, and then in 2022 a proposed UK and Ireland bid for the 2030 tournament was abandoned after it became clear it was futile. But assuming this bid for the 2035 Women's World Cup is ratified at next year's Fifa congress - and it appears a formality - the UK can finally look forward to staging a global senior football competition for the first time since 1966. The hosting of men's Euro 2020 games in England and Scotland, and then all of the women's Euros in England in 2022, will have helped restore trust - along with the fact the men's Euros in 2028 is being played across England, Scotland, Wales and the Republic of Ireland. While details are yet to be finalised, England is expected to host the bulk of the games in 2035, and the final is also expected to be at Wembley.
