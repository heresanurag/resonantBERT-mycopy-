  The UK is set to host the 2035 Women's World Cup as the sole "valid" bidder for the tournament, Fifa president Gianni Infantino says.

  UK set to host 2035 Women's World Cup as only 'valid' bid

  Spain won the 2023 Women's World Cup in Australia and New Zealand

  The United Kingdom is set to host the 2035 Women's World Cup as the sole "valid" bidder for the tournament, Fifa president Gianni Infantino says. England, Scotland, Wales and Northern Ireland submitted a joint expression of interest in March to hold the World Cup across the home nations. Under Fifa rotation rules, the tournament must be in Europe or Africa. Spain's federation president Rafael Louzan said last week that they were "working on" a joint bid alongside Portugal and Morocco. However, the deadline for expressions of interest passed on Monday and Infantino says the UK's bid is the only one received for 2035, while the United States are set to host the 2031 edition. "Today I can confirm as part of the bidding process that we received one bid for 2031 and one valid bid for 2035," Infantino said at a Uefa congress in Belgrade. "The 2031 bid is the United States of America and potentially some other Concacaf members and the 2035 bid is from Europe and the home nations. "So the path is there for the Women's World Cup in 2031 and 2035 to take place in some great nations and further boost the women's football movement."

