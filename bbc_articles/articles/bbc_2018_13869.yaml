  Fothergill said he hoped the show, which will premiere on 5 April 2019, would "inspire and delight hundreds of millions of people across the world."

  According to Netflix, the series will "showcase the planet's most precious species and fragile habitats, revealing amazing sights on Earth in ways they've never been seen."

  It is a collaboration between Netflix, the WWF and Silverback Films.

  Our Planet marks the first Netflix series for Sir David, who has previously fronted programmes for Sky and digital channel Eden.

  His latest series, Dynasties, begins on Sunday on BBC One.

