title: 'England v New Zealand: Emily Scarratt to start her 100th Red Roses game -
  BBC Sport'
date: '2024-09-13'
section: Rugby Union
url: http://www.bbc.co.uk/sport/rugby-union/articles/clywy5pyp7no
content: |-
  Centre Emily Scarratt will start her 100th game for England on Saturday against New Zealand in the first fixture at the newly-named Allianz Stadium.

  Coverage: Watch live on BBC One, BBC iPlayer and online; updates on BBC Radio 5 Live; text commentary on BBC Sport website & app

  Centre Emily Scarratt will start her 100th game for England on Saturday against New Zealand in the first fixture at the newly named Allianz Stadium. The 34-year-old is set to follow Sarah Hunter and Rochelle Clark in becoming the third England player to make 100 starts, and is one of five changes from the starting XV that defeated France 38-19 in Gloucester last weekend. In a new-look front row, Mackenzie Carson, Lark Atkin-Davies and Sarah Bern all come in for Hannah Botterman, Amy Cokayne and Maud Muir. Lock Abbie Ward returns from injury for Sale's Morwenna Talling, who is named as a replacement. Scarratt's Loughborough Lightning team-mate Helena Rowland is named on the bench following her try-scoring return against France, as the only backline change. The game against the world champions is the second warm-up match before WXV later this month, and will be the first played since Twickenham's naming rights were sold to Allianz. Scarratt was moved from her usual position of outside centre to inside centre by England head coach John Mitchell for this year's Six Nations, but struggled to nail down her new position after only returning from neck surgery, which ruled the 34-year-old out for over a year. "It [100 starts] is a fantastic achievement and we need those kind of people in our game. She is an inspiration to the future and now," Mitchell said. "She will still stay in the game outside of playing as she is a good person. You can tell her game still means a lot to her. "Some players, when they get to a point of a series of cumulative injuries, make it a big challenge to come back but she has got some finishing goals [in her career] there which is really important. "I am more interested in experience and enthusiasm, she has both."

