  The Black Ferns were the last side to beat England, securing a dramatic victory in the World Cup final in 2022, although Mitchell's side gained some revenge by defeating them in Auckland to win last year's WXV tournament. Mitchell, who coached the All Blacks from 2001–2003, also comes up against his native country. "I am respectful but like any opponent I am as competitive as anyone, regardless of being born in New Zealand or holding a New Zealand passport," the 60-year-old added. "It gave me the opportunity to be here now, I will never forget that." Gloucester-Hartpury's Georgia Brock is set to make her debut in the back row off the bench. Exeter Chiefs flanker Maddie Feaunati made her first start for the Red Roses against France at Kingsholm Stadium and is retained in the starting XV. The 22-year-old is joined by captain Marlie Packer and number eight Alex Matthews in an unchanged back row. Inside centre Tatyana Heard will partner the 112-cap Scarratt in midfield, while the ever-present back three of Abby Dow, Jess Breach and Ellie Kildunne remains unchanged. Only scrum-half Natasha Hunt, Packer and Scarratt survive from New Zealand's last visit to Twickenham in December 2012. The Black Ferns are boosted by the return of several key players with Kennedy Tukuafu, Kate Henwood, Maama Mo’onia Vaipulu and Ayesha Leti-I'iga all back from injury. More than 40,000 fans are expected on Saturday and New Zealand director of rugby Allan Bunting urged their players to savour the chance to play at the home of English rugby. "We want them to play with freedom," Bunting said. "But most importantly, enjoy the occasion and embrace the opportunity to play at Allianz Stadium."
