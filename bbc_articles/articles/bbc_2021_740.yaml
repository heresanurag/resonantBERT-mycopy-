  Boris Johnson faced questions from MPs why the UK's coronavirus death toll is the highest in Europe.

  Starmer: Get a grip on getting laptops to children

  Sir Keir says he is "no wiser" over where the PM stands on vaccinating teachers. But he moves on to the supplies of technology for children at home. "The government has got a duty to make sure every single child can learn at home," says the Labour leader. But he says a third of families say they don't have enough laptops or home computers, and over 400,000 children are still not able to get online at home. He asks if the PM understands the anger of families that the government "still haven't got to grips with this". Johnson says he "fully understands the frustration and impatience across the country." He says the government has provided 1.3 million laptops to children and a £1bn catch up fund, but he promises more details in his statement this afternoon on "what more we propose to do on reopening of schools".
