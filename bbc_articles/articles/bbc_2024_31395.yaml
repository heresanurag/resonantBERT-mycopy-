  The special counsel overseeing both cases, David Weiss, has flatly rejected claims that the younger Biden was singled out because of his family background. "There was none and never has been any evidence of vindictive or selective prosecution in this case," Mr Weiss' team wrote in a court filing on Monday. US First Lady Jill Biden said on Monday from the White House: “Of course I support the pardon of my son.” The president's decision sparked furious reaction from Trump and other top Republicans, who have long accused the Biden administration of "weaponising" the justice department against their enemies. House of Representatives Speaker Mike Johnson said that "trust in our justice system has almost been irreparably damaged by the Bidens and abuse of it". House oversight committee chairman James Comer said Biden had "lied from start to finish about his family's corrupt influence peddling activities".

  Criticism from Democrats - who have regularly accused Trump of disregarding the rule of law - was more muted. "President Biden's decision put personal interest ahead of duty and further erodes Americans' faith that the justice system is fair and equal for all," Colorado Senator Michael Bennet posted on X, formerly Twitter. Congressman Greg Stanton, an Arizona Democrat, rejected Biden's claim that the case was unfair. “This wasn’t a politically motivated prosecution," he said. "Hunter committed felonies and was convicted by a jury of his peers.” Among them was Texas Democrat - and former defence lawyer - Jasmine Crockett, who told BBC Newshour that she believes that "we would be hard pressed" to find prosecutions similar to the younger Biden's across the US. "Let me be clear - this is a father and a president who did not only what was right by his son, but also did right to basically correct what I would consider a wrong," she said. Neama Rahmani, a former federal prosecutor, told the BBC that he believed Biden had misled the American people. "President Biden was disingenuous this entire time when he said that he would not pardon his son," Mr Rahmani said. "A pardon was the plan from the beginning, but President Biden misled the American people because he, then Kamala Harris, were in the middle of an election." When he takes office in January, Trump will not be able to rescind his predecessor's pardon, said Mr Rahmani. The president's power to pardon people is "absolute", he said. "There is nothing Donald Trump or the Republicans can do to stop it," Mr Rahmani added.
