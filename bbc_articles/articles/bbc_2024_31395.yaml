title: White House defends Hunter Biden pardon amid backlash - BBC News
date: '2024-12-02'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cgl92p0yjw7o
content: |-
  Republicans and some Democrats have accused Joe Biden of damaging trust in the justice department.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: From charge to pardon - how did we get here?

  The White House has defended President Joe Biden's pardon of his son, Hunter, after repeatedly insisting he had no plans to grant such executive clemency. The press secretary said Biden had pardoned his son, who was facing sentencing later this month in two federal cases, to shield him from potential persecution by the outgoing president's political foes. The sweeping pardon covers any potential federal crimes that 54-year-old Hunter may have committed over the course of a decade. Republicans have lambasted the move, with President-elect Donald Trump calling it "an abuse and miscarriage of justice".

  Press secretary Karine Jean-Pierre told reporters on Monday that Biden had "wrestled" over the decision during the family's Thanksgiving break on the island of Nantucket, Massachusetts, at the weekend. The Democratic president issued the pardon on Sunday evening before heading off on an official trip to Africa. Ms Jean-Pierre told reporters on Air Force One en route to Angola: "He believes in the justice system, but he also believes that the raw politics infected the process and led to a miscarriage of justice."
