content: |-
  The building was allegedly set on fire by looters amid an eruption of riots across South Africa.

  Naledi was forced to throw her baby from a burning building in Durban, South Africa.

  It happened as riots and lootings erupted across South Africa, following the jailing of former President Jacob Zuma.

  She told the BBC's Nomsa Maseko what happened.
