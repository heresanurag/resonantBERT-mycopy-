title: 'Erik ten Hag: Decision over Manchester United manager ''not my call'', says
  Sir Jim Ratcliffe - BBC Sport'
date: '2024-10-04'
section: Man Utd
url: http://www.bbc.co.uk/sport/football/articles/cden69x385lo
content: |-
