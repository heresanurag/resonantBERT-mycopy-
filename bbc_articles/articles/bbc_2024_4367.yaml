  Ireland head coach Andy Farrell names an unchanged team for Saturday's title-deciding Six Nations match against Scotland in Dublin.

  Last updated on .From the section Irish Rugby

  Coverage: Listen live on BBC Radio Ulster and BBC Radio 5 Live [coverage also available on Sports Extra from 16:30 GMT]; text commentary and highlights on the BBC Sport website

  Ireland head coach Andy Farrell has named an unchanged team for Saturday's title-deciding Six Nations match against Scotland in Dublin.

  Farrell opts against a reshuffle despite last week's defeat by England which ended Ireland's hopes of back-to-back Grand Slams.

  Wing Calvin Nash is fit to start after passing a head injury assessment (HIA).

  Garry Ringrose is set to feature for the first time this year after being named on the bench.

  Leinster centre Ringrose missed the first three games of the tournament with a shoulder injury, but was not selected for the England game as Farrell opted to name two backs on the bench.

  Ringrose's return sees Farrell revert to a split of five forwards and three backs on the bench, with scum-half Conor Murray and Harry Byrne selected as the other backline replacements.

  Byrne featured off the bench in Ireland's 36-0 win over Italy in Dublin.

  With Ryan Baird chosen as second row cover, there is no place for Iain Henderson, who came off the bench in the England game.

  Ciaran Frawley, who replaced Nash against England only to also be forced off with a head injury, is also not included.

  While last weekend's loss at Twickenham ended Ireland's bid to become the first team to win successive Six Nations Grand Slams, they will retain the championship by avoiding defeat or securing two losing bonus points at the Aviva Stadium on Saturday.

  Ireland have won their past nine meetings with Scotland, the last of which was a comprehensive 36-14 success at the World Cup in October.

  Farrell's side also beat the Scots 22-7 at Murrayfield last year on their way to winning the Grand Slam.
