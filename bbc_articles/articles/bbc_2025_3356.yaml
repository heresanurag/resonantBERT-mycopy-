title: Cargo ship's captain arrested over North Sea crash - BBC News
date: '2025-03-11'
section: Hull & East Yorkshire
url: http://www.bbc.co.uk/news/articles/c1w093exx4qo
content: |-
  Humberside Police says an investigation has been launched into the collision between the two ships.

  The fire is still burning on the Solong container ship, which was in a collision with the Stena Immaculate oil tanker in the Humber Estuary

  The captain of a cargo ship has been arrested after it collided with an oil tanker in the North Sea. The Portuguese-flagged Solong and the US-registered tanker Stena Immaculate crashed off the East Yorkshire coast at about 10:00 GMT on Monday. Humberside Police said the 59-year-old man had been arrested on suspicion of gross negligence manslaughter following searches for a missing crew member of the Solong. Crowley, the Florida-based joint owners of the stricken oil tanker, said the fire on board its vessel had "greatly diminished with no visible flames".

  The company said it was continuing to help the UK authorities during initial salvage activities but its priorities were the wellbeing of its 23-strong crew and efforts to limit the environmental impact of the crash. It added that it was unclear how much of the jet fuel it was carrying had been released into the sea but an "initial review shows impacts have been limited due to exposure to the fire and evaporation of the fuel". German firm Ernst Russ, which owns the Solong, confirmed to the BBC that the man arrested is the master of the ship. It said he, along with the rest of the crew, were assisting the investigation. A crew member from the cargo ship was still missing and presumed dead after a search and rescue operation ended on Monday evening, according to Transport Minister Mike Kane.

  Whitehall sources have told the BBC there were Russians and Filipinos among the crew of the Solong. The BBC understands all of the crew on board the Stena Immaculate are Americans who are currently in Grimsby and will be repatriated in due course.

  Police said they had begun a criminal investigation into the cause of the collision and was working with the Maritime and Coastguard Agency. The Marine Accident Investigation Branch was also undertaking a parallel preliminary assessment to establish the causes of the crash, police said. HM Coastguard confirmed 36 people had been taken safely to shore. Det Ch Supt Craig Nicholson said: "Humberside Police have taken primacy for the investigation of any potential criminal offences which arise from the collision between the two vessels." He said the arrested man was in custody. "Following inquiries undertaken by my team, we have arrested a 59-year-old man on suspicion of gross negligence manslaughter in connection with the collision. "This follows the conclusion of search operations by HM Coastguard for the missing crew member of the Solong. "Our thoughts are with the family of the missing crew member, and I have appointed family liaison officers to make contact and provide support to the family."

