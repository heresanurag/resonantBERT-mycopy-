  Smoke is continuing to billow from Solong. The ship's German owner, Ernst Russ, said it was supporting the missing crew member's family. It also confirmed there were no containers on board carrying sodium cyanide, as had been initially feared. "There are four empty containers that have previously contained the hazardous chemical and these containers will continue to be monitored," the firm said. Crowley said its tanker was struck by Solong while anchored off the coast of Hull, causing "multiple explosions" on board and an unknown quantity of jet fuel to be released. The Stena Immaculate was carrying 220,000 barrels of jet fuel in 16 segregated cargo tanks, at least one of which was ruptured when it was struck. Graham Stuart, MP for Beverley and Holderness, said officials had told him there was no evidence so far of any of the heavy engine oil leaking from either ship, or pollution in the water or the air.

  Tug boats shadow the Solong container ship as it drifts in the Humber Estuary while alight

  On Tuesday, Kane told the House of Commons the "working assumption" was that one crew member from the cargo ship had died. Transport Secretary Heidi Alexander said she had met with the Maritime and Coastguard Agency and been informed that early indications suggest both vessels are now expected to stay afloat. She added the Solong could be "towed away from the shore, and salvage operations can get under way". Stena Immaculate was operating as part of the US government's tanker security programme, a group of commercial vessels that can be contracted to carry fuel for the military when needed, according to Crowley. It had been anchored while waiting for a berth to become available at the Port of Killingholme on the River Humber, the company said.
