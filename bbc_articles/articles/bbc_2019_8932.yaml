title: Three Rhos-on-Sea children missing overnight found safe - BBC News
date: '2019-07-24'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-49094200
content: |-
  A police helicopter had been flying in the search for the children aged 12, nine and eight.

  Lewis and Lilly-Mae Owen-Roberts have been missing since Tuesday evening

  Police have found three children who had been missing overnight.

  The police helicopter was out looking for Kiya Williams, 12, Lewis Owen-Roberts, nine, and eight-year-old Lilly-Mae Owen-Roberts, from Rhôs-on-Sea, Conwy county.

  Police said they had been missing since Tuesday evening but have now been found safe and well.

  Large parts of the UK saw thunderstorms overnight and north Wales was the wettest place in the UK.

  It saw 15mm of rain fall in one hour.

