  Geoff Keal of Planning Portal, which is used by councils for people to apply for planning permission, said there needed to be a "substantial" increase in planning applications being made, to make up for applications that get rejected and those where no development takes place. But he added: "The government has an intent to build and that's really powerful for [developers], knowing they're going to be supported and they're going to remove blockages. "I think there are reasons to be optimistic, for sure."

  Housing market analyst Neal Hudson, of BuiltPlace, said: "It can take longer to turn the planning pipeline around than a container ship, and developers are currently squeezed on both sides by high interest rates and constrained viability." Victoria Hills, chief executive of the Royal Town Planning Institute, said: "These latest figures show that developers are submitting fewer applications, significantly limiting the number of projects that planners can approve." She said securing planning permissions would not automatically translate into new homes, adding: "The planning system is more than just numbers; it's about building quality places for the future, protecting nature and ensuring communities can adapt to climate change." The government said it was bringing forward "pro-growth" measures to fix a "broken" planning system. A spokesman for the Ministry of Housing, Communities and Local Government said: "These figures show the scale of the housing crisis we inherited along with a broken planning system that stunted growth. "That's why we're already bringing forward pro-growth measures to fix this and deliver the 1.5 million new homes we need, including mandatory housing targets through an updated National Planning Policy Framework and our newly introduced landmark Planning and Infrastructure Bill that will overhaul planning committees to fast track and streamline decisions. "This is alongside an additional £100m to bolster local resources with increased planning fees to cover costs, and funding to recruit 300 planning officers, making sure councils have the staff and capacity needed to approve homes for local people."
