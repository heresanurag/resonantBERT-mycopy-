title: Planning permission for homes in England falls to record low - BBC News
date: '2025-03-20'
section: BBC Verify
url: http://www.bbc.co.uk/news/articles/cvgp51d7zy2o
content: |-
  Just over 30,000 projects got the go ahead, the lowest yearly figure since records started in 1979.

  Planning permissions for homes in England fall to record low

  The number of housing projects granted planning permission in England in 2024 hit a record low, according to new government figures. Just over 30,000 projects - ranging from single homes to large housing developments - got the go ahead, the lowest full-year figure since records started in 1979 and a further fall from 2023. Deputy Prime Minister Angela Rayner has pledged to deliver 1.5 million new homes before the next general election and a rise in planning applications would be one of the first positive signs. Despite the low, experts said there was optimism in the sector because the government had "an intent to build", and that turning around the planning system would take time.

  Labour's plans include giving councils new powers to seize land and speed up building. The number of decisions on housing, included those rejected, was also at a record low in 2024. The figures cover the number of permissions granted, not the number of individual homes. They include minor projects of fewer than 10 homes and major projects of 10 or more.

  Data analysed by BBC Verify suggests the number of completed new homes also decreased during the second half of 2024. Every council in England has been given a target for new homes that they should help deliver each year. In some areas, this means more than five times as many new homes as they typically add. You can see the figures for your area in the BBC's housing tracker.

