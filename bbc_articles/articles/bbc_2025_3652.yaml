content: |-
  The Prince and Princess of Wales are in the Principality Stadium to watch England crush Wales.

  William and Kate cheer on rival teams as England beat Wales

  This video can not be played To play this video you need to enable JavaScript in your browser. The Prince and Princess of Wales met injured players ahead of Wales' crushing defeat to England in the Six Nations

  The Prince of Wales and Catherine, Princess of Wales, have resumed their rugby rivalry at the Wales vs England Six Nations match. The pair were at the Principality Stadium in Cardiff as England demolished Wales 68-14. The match had special significance for the couple as Prince William is patron of the Welsh Rugby Union while Catherine took over as patron of the English Rugby Football Union from the Duke of Sussex in 2022. Before the game, the couple met injured players supported by the Welsh Rugby Charitable Trust at the Sir Tasker Watkins Suite, a space dedicated for use by injured players and their families.

  Founded in 1972, the Welsh Rugby Charitable Trust supports severely injured players in Wales. It invites them to all home games and, each year, the WRU hosts a "family day" for players and their families. In the suite, Prince Williams and Catherine chatted with the former players about their rugby careers and how they are continuing to enjoy the game.

  Princess Kate was spotted taking selfies with fans at the Principality Stadium

  The royal couple also spoke of how they watch Princes George and Louis play rugby in "freezing" weather. Prince William said on weekends "they go from one competition to the next". Catherine added: "Louis is six and he's just started touch rugby and George is 11 and he plays a bit more. They do really enjoy it, actually." On arrival at the stadium, the pair met the third battalion The Royal Welsh's Goat Major and mascot, Lance Corporal Shenkin. They were also introduced to Morfudd Meredith, the Lord Lieutenant of South Glamorgan, Terry Cobner, president, Richard Collier-Keywood, chairman, and chief executive Abi Tierney, all of the Welsh Rugby Union, as well as Rob Udwin, president of the Rugby Football Union.

  Before the game, the couple met injured players at the Sir Tasker Watkins Suite

  England's victory leaves them in with a chance of claiming a first Six Nations title since 2020 and cemented Wales' place at the bottom of the table, extending their worst losing sequence in history to 17 successive international defeats. The couple's visit to the capital comes almost three weeks after their visit to Pontypridd, where they learnt how the community is coping following recent devastating flooding. It marked the couple's first appearance in Wales together since Catherine announced last March she had begun cancer treatment, following the King's own cancer diagnosis. The princess has made a gradual return to public duties since completing chemotherapy last summer.
