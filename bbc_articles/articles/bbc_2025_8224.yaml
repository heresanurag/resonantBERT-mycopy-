id: bbc_2025_8224
title: Green Party aims for 'record-breaking' local elections - BBC News
date: '2025-04-08'
section: Politics
url: http://www.bbc.co.uk/news/articles/cly8rvlky8lo
content: |-
  The Greens argue they offer credible "positive change" compared to "old tired parties".

  The Green Party of England and Wales is aiming for a "record" number of councillors as it looks to increase its power base for an eighth election in a row, party co-leader Adrian Ramsay has said. The party is looking to build on its successes, after passing 800 councillors for the first time last year. The local elections in England on 1 May will be a major test for the Greens who quadrupled their number of MPs to four at last year's general election - but have failed to match the poll increases seen by Reform UK. Speaking at the Green Party's campaign launch on Tuesday, co-leader Carla Denyer said her party offers a "positive change" compared to "old tired parties".

  The Green Party leadership predict these elections will lead to a "record-breaking" year for the party. The party is seeking to win over voters "disillusioned" with mainstream politics. Ramsay argued the UK was at a "crossroads", where political instability means smaller parties can help shape the future direction of the country. Reform is "throwing everything" at the local election "because they want to take advantage of voters feeling understandably let down by Labour and the Conservatives", Denyer told campaigners. "But we are here to say that voters have another choice - a positive choice - instead of one of the tired old parties, or worse a party that is divisive, dishonest, in disarray," she added. The Greens have failed to match the recent polling successes of Reform, which has overtaken the Tories and been neck-and-neck with Labour in recent national polls. In contrast the Greens have remained on around 9% in the polls since the general election - while the Liberal Democrats have remained around 14%. Asked about the party's polling, Ramsay to BBC Breakfast: "The polls that matter are how people vote in elections."

  The Greens argued their "track record of delivering" is a key point of difference with smaller parties like Reform who are also looking to make in-roads at the local elections. Green councillors are part of the ruling administration on 40 councils - including Bristol City Council, where the party took control in 2024. Last year the Greens also became the largest party on Hastings Borough Council and have big numbers on councils including East Hertfordshire, Babergh, East Suffolk, Mid Suffolk, Lewes, Folkestone and Hythe and the Forest of Dean. The party unveiled its local election pitch in Warwickshire - where the Greens are the largest party on Warwick District Council. Green leadership of Warwick Council had led to a £5m investment "in improving the quality of council homes to keep bills down and keep homes warm", Ramsay said. He added: "These are the sorts of practical things that Green councillors are doing - both for the environment, for people and for affordable housing right around the country."

  About 1,650 seats will be contested on 14 county councils, eight unitary authorities, one metropolitan district, and in the the Isles of Scilly. There will also be mayoral elections in the West of England, Cambridgeshire and Peterborough and - for the first time - in Hull and East Yorkshire and Greater Lincolnshire. Elections to all 21 county councils in England were due to take place. But last month, the government announced elections would be postponed in nine areas, where the councils are undertaking reorganisation and devolution. Those areas are Norfolk, Suffolk, Essex, Thurrock, Surrey, East and West Sussex, Hampshire and the Isle of Wight.
