title: Papua New Guinea minister Jimmy Maladina charged with assault in Australia
  - BBC News
date: '2024-07-07'
section: World
url: http://www.bbc.co.uk/news/articles/cyr7x7r26e0o
content: |-
  Jimmy Maladina says he is cooperating with police following reports of domestic assault.

  Police say a woman was allegedly attacked in Sydney by a man who was known to her

  Papua New Guinea's influential Petroleum Minister Jimmy Maladina has been charged with assault following an alleged "domestic dispute" in Australia, according to court documents. Police said a 31-year-old woman was allegedly attacked in Sydney by a 58-year-old man who was known to her on Saturday morning local time. Mr Maladina was granted conditional bail ahead of a court appearance on 11 July. In a statement, he said he was "aware of the recent media reports" and was "cooperating with the authorities to address this matter".

  "I understand the gravity of this situation and the concerns it raises," said Mr Maladina. "As a public servant, I hold myself to high standards of conduct, both personally and professionally. "I want to make it clear that violence in any form is unacceptable, and I am committed to handling this situation with integrity and transparency." Police said the woman who was allegedly attacked had suffered facial injuries. Mr Maladina became Papua New Guinea's petroleum minister earlier this year and is a key adviser to Prime Minister James Marape. He is heavily involved in the country's lucrative project to commercialise its natural gas resources.
