title: Norwegian teen arrested in UK hotel over national security case - BBC News
date: '2025-04-08'
section: UK
url: http://www.bbc.co.uk/news/articles/c9w8p0kqdd9o
content: |-
  The 18-year-old, who was arrested in West Yorkshire and charged with firearms offences, flew to Manchester from Stavanger.

  A Norwegian teenager has been arrested in a West Yorkshire hotel room and charged with firearms offences in a case connected to national security, the BBC can reveal. Johannes Kongsnes Natland, 18, was arrested by firearms officers in Huddersfield on 19 March. The Metropolitan Police's Counter Terrorism Command, which deals with espionage and threats from hostile states, took over the case after the arrest. But "the matter is not being treated as terrorist-related at this time", the force said in a statement.

  Mr Natland is charged with possessing a Luger semi-automatic pistol, a revolver, and ammunition. He was initially also arrested by West Yorkshire Police on suspicion of conspiracy to murder, but has not been charged with such an offence at this time. He had flown into Manchester Airport from Stavanger, Norway, on 17 March. In a statement, the Met said: "Due to various ongoing lines of inquiry - including a number of international enquiries relating to this - the investigation is being dealt with by detectives from Counter Terrorism Policing, although the matter is not being treated as terrorist-related at this time. "Officers from the Met's Counter Terrorism Command are leading the investigation, with support from colleagues in North East CTP and West Yorkshire Police, and enquiries remain ongoing." Mr Natland appeared at Westminster Magistrates' Court on 21 March. He is next due to appear at the Old Bailey on 11 April.
