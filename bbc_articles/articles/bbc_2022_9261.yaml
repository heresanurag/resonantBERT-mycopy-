id: bbc_2022_9261
title: Three dead after Highlands crash at Slochd Summit - BBC News
date: '2022-07-05'
section: Highlands & Islands
url: http://www.bbc.co.uk/news/uk-scotland-north-east-orkney-shetland-62058184
content: |-
  Police closed the A9 at Slochd Summit after the three-vehicle collision on Tuesday morning.

  Three people have died after a road crash on the A9 in the Scottish Highlands.

  An air ambulance was dispatched to the three-vehicle collision at Slochd Summit, near Carrbridge, at about 11:40 on Tuesday. Four people were taken to hospital.

  The Scottish Fire and Rescue Service said three fire engines and specialist resources were sent to the incident.

  The road was closed with diversions in place until 21:30.

  A Police Scotland spokesperson said: "Three people have died following a road crash on the A9 at Slochd Summit.

  "Inquiries are ongoing to establish the full circumstances of the collision."
