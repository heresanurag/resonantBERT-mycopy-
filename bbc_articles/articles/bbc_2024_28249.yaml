content: |-
  Beinash Batool and Faisal Malik decline to give evidence in their trial for Sara's murder.

  Sara Sharif's body was found at her home in Woking on 10 August last year

  The stepmother and uncle of Sara Sharif will not give evidence in their defence during their trial for the 10-year-old’s murder. At the Old Bailey, Mr Justice Cavanagh asked if each of the defendants’ barristers had advised their clients that the “jury may draw such inference as is proper” from their failure to do so, and they confirmed they had. Sara's stepmother Beinash Batool, 30, and uncle, Faisal Malik, 29, along with the girl's father, Urfan Sharif, 42, have denied murder and causing or allowing her death. The court previously heard that Sara's body was found with dozens of injuries at the family’s home in Woking, Surrey, last year, and that she had been hooded, burned and beaten during more than two years of abuse.

  The jury were asked to return on Wednesday and later this week legal directions will start, the judge told the court.

  A post-mortem examination found Sara had suffered injuries including "probable human bite marks", an iron burn and scalding from hot water before she died on 8 August 2023. Prosecutor Bill Emlyn Jones KC previously said a bloodstained cricket bat, a rolling pin with Sara’s DNA on it, a metal pole, a belt and rope were found near the family’s outhouse.

  Urfan Sharif, Beinash Batool and Faisal Malik are each facing two charges relating to the death of Sara Sharif

  Under cross-examination, Mr Sharif previously accepted “full responsibility” for Sara's death, but later denied intending to kill her. He also told the jury he was lying when he called his wife, Ms Batool, a “psycho” earlier in the trial. Mr Sharif admitted beating Sara, but denied biting or burning her. The court previously heard Mr Sharif, Ms Batool and Mr Malik travelled to Islamabad, Pakistan, with Sara's five brothers and sisters on 9 August 2023, the day before her body was found.

