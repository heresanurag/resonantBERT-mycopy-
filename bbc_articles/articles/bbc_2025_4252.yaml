content: |-
  The majority of Republicans say Zelensky was at fault for the spat, but one accused the president of "embracing Putin".

  Most Republicans laud Trump after Zelensky showdown, but some express dismay

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch in full: The remarkable exchange between Zelensky, Vance and Trump

  Most Republicans have backed US President Donald Trump and Vice-President JD Vance following their public row in the Oval Office with Ukrainian President Volodymyr Zelensky. Senator Lindsey Graham suggested Zelensky should resign, adding that Friday's altercation had imperilled future US military support for Kyiv, but another Republican senator accused Trump of "embracing Putin". Zelensky was asked to leave the White House without signing a deal with the US that would have jointly developed Ukraine's valuable minerals. On Saturday, Zelensky enjoyed a much warmer reception from UK Prime Minister Keir Starmer in Downing Street, a day ahead of a meeting with King Charles.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The Ukrainian leader also made a plea on Saturday to the US to "stand more firmly" with Kyiv, adding that he was ready to sign the minerals deal with Trump, but wished for defined security guarantees. Trump has suggested that Ukraine should concede territory to Russia to end its invasion and has opened peace talks between Washington and Moscow. The American president has also warned Russia that he will impose high tariffs and further sanctions if President Vladimir Putin fails to end the "ridiculous" war. Before leaving for Florida after the Oval Office clash with Zelensky, Trump told reporters that the Ukrainian leader had "overplayed his hand".

  This video can not be played To play this video you need to enable JavaScript in your browser.

  "Either we're going to end it or let him fight it out, and if he fights it out, it's not going to be pretty," Trump said. "Because without us, he doesn't win." National Security Adviser Mike Waltz, who was in the Oval Office during the meeting, told Breitbart News on Saturday that Zelensky was too focused on fact checking and compared the Ukrainian leader to an "ex-girlfriend". "It's like an ex-girlfriend that wants to argue everything that you said nine years ago, rather than moving the relationship forward," Waltz said. While Democrats said they were horrified by the showdown with a US ally, the majority of Republicans in Washington backed Trump.
  • None Putin can afford to sit back and watch events unfold "What I saw in the Oval Office was disrespectful, and I don't know if we can ever do business with Zelensky again," said Senator Graham, a longtime advocate for Ukraine aid and a foreign policy hawk, as he left the White House on Friday. "The question for me is, 'is he redeemable in the eyes of Americans?' Most Americans witnessing what they saw today would not want Zelensky to be their business partner, including me, and I've been to Ukraine nine times since the war started."

  Alabama Senator Tommy Tuberville posted on X on Saturday: "The best thing President Trump has done so far is kick that Ukrainian weasel out of the WH."
