content: |-
  BBC Verify examines key areas which the government has promised to make improvements

  Is the government meeting its pledges on illegal immigration and asylum?

  The prime minister has made tackling illegal immigration and "restoring order" to the asylum system a priority for the government. Sir Keir Starmer has promised to "smash the gangs". It follows predecessor Rishi Sunak's pledge to "stop the boats". Yet small boat crossings have reached record levels for this point in the year - with about 800 migrants arriving on Wednesday alone. BBC Verify looks at key government pledges - from ending the use of asylum hotels to returning more failed asylum seekers.

  Labour promised to "end asylum hotels, saving the taxpayer billions of pounds, external" in its general election manifesto. The government wants to fulfil this pledge by the end of this Parliament - meaning by 2029, unless an early election is called. However, recent figures show there were more asylum seekers staying in hotels in March 2025 than at the end of June 2024, a few days before the general election.

  At the end of June, 29,585 people were in hotels. By March, there were 32,345 - though the number has dropped compared with December. The government does not regularly publish figures on the number of actual hotels in use but figures obtained by BBC Verify show there were 218 asylum hotels in December, up from 212 in July. Once someone applies for asylum, they gain legal protections while awaiting a decision - including accommodation if they cannot support themselves financially. Almost everyone who arrives by small boat claims asylum - they made up a third of all asylum applications over the past 12 months. Another large group of claimants were people already in the UK who had overstayed their visas. The asylum process determines whether a person can remain in the UK because they have a "well-founded fear of persecution" in their home country. Since 2020, the government has been increasingly reliant on hotels, partly because the supply of other types of asylum accommodation has not kept up with the numbers arriving in small boats. But using asylum hotels is expensive - costing £8m per day in 2023-24, external.

  As of 20 May, 12,748 people had arrived in the UK in small boats - up by nearly a third compared with this time last year. To reduce the number of crossings, the government has pledged to disrupt the people-smuggling gangs behind them.

  But it is unclear how the government plans to measure its progress, or when the goal will be met. The Home Office told us data on actions taken by officials to disrupt criminal gangs was "being collected and may be published in the future". There is some information on efforts to prevent small boat crossings by French authorities - who, under a 2023 deal, are receiving £476m from the UK over three years. They say about 24,791 people were prevented from crossing between July 2024 and May 2025. We do not know what happened to them or whether they tried to cross again. There have been high-profile cases of UK-based smugglers being sentenced, including a man who helped smuggle more than 3,000 people and raids on the continent. And at the recent UK-EU summit both sides pledged , externalto work together on finding solutions to tackle illegal immigration. This includes people who arrive on small boats, or hidden in lorries, and people who remain in the UK after their legal visa expires. The vast majority of UK immigration is legal - this includes people who have been granted permission to come to work, study, claim asylum or for other authorised purposes. Over the past 12 months about 44,000 people entered the UK illegally - about 5% of the nearly one million people who immigrated to the UK between April 2024 and March 2025.

  The government has also promised "to clear the asylum backlog, external". This refers to the backlog of claims by asylum seekers who are waiting to hear whether they will be granted refugee status and be allowed to remain in the UK. Since last summer, there has been a 58% increase in decisions on asylum cases.

  This, combined with a recent fall in applications has meant the overall backlog of asylum cases has fallen compared with the end of June 2024. Under Labour, 40% of asylum claims were granted between January and March 2025.

  Another backlog the government wants to clear is the mountain of court appeals from asylum seekers following rejected claims. That backlog has got worse since last summer's election. There were about 33,000 cases at the end of June, rising to nearly 42,000 in December - the highest total since at least 2015.

  The government has also promised to "increase returns" of people with no legal right to be in the UK. It said it would set up a new returns and enforcement unit with 1,000 extra staff. Between July 2024 (when Labour came to power) and May 2025, there were 29,867 returns recorded by the Home Office, external. This is up 12% compared with the same period 12 months ago. So the government is meeting this pledge but it is worth noting that just 7,893 people were forcibly removed - which could involve being escorted on a plane by an immigration official. The figures also show 8,511 failed asylum seekers were returned in this period but they do not say how many were enforced or voluntary. Separate government figures from January to March gave a fuller breakdown showing many of those who did leave voluntarily did so without government assistance or even its knowledge at the time, as BBC Verify has previously pointed out.

  This is despite repeated claims from ministers that the government has "removed" or even "deported" this many people. The Home Office says all returns outcomes are the result of collective efforts by the department.
