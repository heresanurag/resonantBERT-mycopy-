  Many young people 'no longer advised to shield'

  The vast majority of children will no longer need to shield from the end of this month, England's deputy chief medical officer has said. Dr Jenny Harries has backed guidance from the Royal College of Paediatrics and Child Health (RCPCH) which says that most young people with conditions such as asthma, diabetes, epilepsy, and kidney disease do not need to continue to shield and could, for example, go back to school. The government has now said the majority of children in England who are currently considered extremely clinical vulnerable to Covid-19 will be able to be removed from the shielded patient list over the summer. Data from NHS Digital shows 92,633 children under the age of 18 were on the shielded list. Dr Harries said: "As our understanding of this novel virus has developed, evidence shows most children and young people are at low risk of serious illness and will no longer be advised to shield after July."
