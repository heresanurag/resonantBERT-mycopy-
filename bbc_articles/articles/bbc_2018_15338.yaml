title: Obama plays Santa at children's hospital in Washington - BBC News
date: '2018-12-20'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-46634652
content: |-
  Former US President Barack Obama plays Santa - delivering gifts, singing and greeting patients.

  Barack Obama has paid a Christmas visit to staff, patients and their parents at the Children’s National Medical Center in Washington DC.

  The former US president donned a Santa hat to give out gifts, and lead some festive singing.
