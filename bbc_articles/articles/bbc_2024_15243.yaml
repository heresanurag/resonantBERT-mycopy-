title: 'Dublin: Irish PM condemns ''reprehensible'' violence at protest - BBC News'
date: '2024-07-15'
section: Europe
url: http://www.bbc.co.uk/news/articles/c51yvww23nxo
content: |-
  Fifteen people who appeared in court in Dublin charged with public order offences have been bailed.

  In total 19 people were arrested during the disturbances.

  Fifteen people have appeared at a special court sitting in Dublin following violence during a protest at a site which had been earmarked for asylum seekers. Some protestors set pallets and construction machinery alight at the former Crown Paints factory in Coolock in north Dublin, resulting in a large fire. It is understood work was due to begin on the Malahide Road site later in the week. Taoiseach (Irish Prime Minister) Simon Harris described the disturbances as "reprehensible". The 15 people who appeared at Dublin District Court on Monday evening were charged with public order offences, including failure to comply with the orders of a garda (police officer) and with threatening or abusive behaviour. All 15 were released on conditional bail, provided they stay away from the scene of the disorder They are all due to appear in court again on 18 September. Another four people who were arrested are due to appear in court on Tuesday morning. More than 200 gardaí were deployed to the incident. Three Garda cars were been damaged, one of which was set on fire, Irish broadcaster RTÉ reported. It said pepper spray was used by police as a security guard and a number of gardaí were injured during clashes with protesters. Petrol bombs and fireworks were thrown, mattresses were set on fire damaging a JCB and fires were lit on the roads during the disturbances.

  Gardaí described the disturbances as a public order incident and the road was closed for a period. They said officers were "subjected to both verbal and physical abuse throughout the day, which escalated into rocks, fireworks and other objects being launched towards them". "A number of fires were lit and official Garda vehicles seriously damaged," a spokesperson said. "As the situation intensified, members of An Garda Síochána used force to defend themselves as part of an escalated response to the situation." Garda Commissioner Drew Harris said: it had been a difficult day for his officers and condemned what happened. "We have seen attacks on gardaí, criminal damage and offences of serious public disorder," he said. "All of these will be fully investigated. We have 15 people charged and we will have further charges overnight."

  A large crowd gathered at the Coolock site in north Dublin

  The Irish justice minister said she was "appalled at the criminal behaviour that took place in Coolock". Helen McEntee said anybody involved would face "the full rigours of the law".

  Fires were lit at the protest site

  Dublin city councillor Mícheál Mac Donncha described the incident as "deplorable" and that "violence, intimidation and arson should have no place in our communities". "The burning of vehicles and attempted burning of the building are violent criminal acts and must be strongly condemned," the Sinn Féin representative said. He said the Department of Integration had said the site was being developed to accommodate families seeking international protection. "This is an effort to spread fear and hate in our communities and the vast majority of decent people want nothing to do with it."
