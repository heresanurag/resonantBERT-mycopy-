  Lorraine Fraser says facing repeated parole hearings for her sons' killers is "horrendous".

  Murdered teen's mum wants changes to parole system

  Tyrone's mother, Lorraine Fraser, said she believes the probation system was "outdated"

  The mother of a teenager murdered 20 years ago has called for changes to the parole system after facing repeated hearings for her son's killers. Tyrone Clarke, 16, was attacked by a gang and stabbed to death in Beeston, Leeds, in April 2004. Four men were later given life sentences for murder, but, since being released on parole at the end of their minimum terms, two have been recalled to prison for breaching their licence conditions. Tyrone's mother, Lorraine Fraser, said each recall prompted a fresh round of parole hearings, which she described as "horrendous" and forced her to "relive everything again".

  Tyrone Clarke was murdered in Leeds in April 2004

  The Ministry of Justice has confirmed two of the men, Anjum Amin and Islamur Rahman, had been recalled to prison for breaching licence conditions since their release. Ms Fraser said Amin has had his licence revoked three times. She said: "It's with me every day. Some days when I think it's a good day I get hit with something again, parole hearings, impact statements, it's horrendous. "What I'm saying now is these parole boards, they're outdated. You can't keep revoking your life licence and getting away with it. “After the second revoking of a licence, I think they should be locked up and do the full sentence again, because clearly they haven’t learned anything."

  The Probation Service said offenders who were given a life sentence were subject to strict conditions for the rest of their life and faced recall to prison if these were breached. A spokesperson said: “We know this process can be distressing for victims, which is why the victim contact scheme provides support including important updates. “Victims can also opt out of the scheme at any point during a sentence.”

  Tyrone was chased by a 20-strong gang in Brett Gardens, in Beeston, and was attacked with weapons including metal poles, planks of wood and CS spray. While four people were convicted of murder following a trial at Leeds Crown Court a fifth suspect, Qasim Majid, fled to Pakistan and remains wanted by police. Earlier this year the daughter of Wendy Speakes, who was raped and murdered in Wakefield in 1994 launched a campaign to change the parole process. Like Ms Fraser, she said the impact of repeated parole hearings forced her to relive the trauma. Tracey Millington-Jones said she had faced four parole hearings in six years as her mother's killer, Christopher Farrow, made repeated attempts to be released. Speaking in March she said: "I spend months preparing a victim impact statement, then have to face the ordeal of going into the prison, where the man who murdered my mum is being kept, to read it out." Backing her campaign, Joanne Early, the CEO of the charity Support After Murder and Manslaughter, said parole hearings "retraumatise" victim's families and called for the time between requests for parole to be extended. Follow BBC Yorkshire on Facebook, external, X, external and Instagram, external. Send your story ideas to yorkslincs.news@bbc.co.uk, external.
