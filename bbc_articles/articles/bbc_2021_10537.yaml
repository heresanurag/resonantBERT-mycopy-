title: At risk Afghan journalists to be offered UK relocation - BBC News
date: '2021-08-06'
section: UK
url: http://www.bbc.co.uk/news/uk-58121472
content: |-
  The foreign secretary says they can move to the UK if they are under "imminent threat" from the Taliban.

  Afghan government forces and allied militia are fighting against the Taliban in key cities across the country

  Afghan journalists who work for the British media will be allowed to relocate to the UK if they are under "imminent threat" from the Taliban, the foreign secretary has said.

  In a letter to UK media organisations, Dominic Raab said cases would be considered "on an exceptional basis".

  British news outlets had urged No 10 to treat Afghan journalists the same as the British Army's Afghan interpreters.

  It comes as a top Afghan media officer was killed by the Taliban on Friday.

  Dawa Khan Menapal, the director of Afghanistan's media and information centre, was shot dead as he was leaving a mosque in his car in the Afghan capital of Kabul. The Taliban said he had been "punished for his deeds".

  Taliban militants continue to make rapid advances in Afghanistan, taking swathes of countryside and targeting key cities, following the decisions by US and Nato forces to leave the country.

  Local officials said insurgents had captured the city of Zaranj, in Nimroz province, on Friday afternoon, in a significant blow to government forces.

