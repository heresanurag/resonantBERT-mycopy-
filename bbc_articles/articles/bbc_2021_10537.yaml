  Earlier this year plans to relocate hundreds more Afghan interpreters and their family members were announced, with more than 3,000 expected to be allowed to settle.

  On Thursday a flight of 104 people, made up of interpreters and their family members, arrived at a Midlands airport as part of the UK's ongoing relocation programme.

  One interpreter, called H, said that while he was happy for his wife and children to be in Britain he was sad to have left his family behind.

  Last month, Prime Minister Boris Johnson said all British troops assigned to Nato's mission in Afghanistan would be returning home, and most had already left.

  The US has said it will withdraw all forces by 11 September.

  But Britain's most senior general, General Nick Carter, warned Afghanistan could slide into civil war once foreign troops leave.
