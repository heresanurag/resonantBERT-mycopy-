title: Iconic banyan tree showing signs of life after Maui wildfire - BBC News
date: '2024-08-09'
section: General
url: http://www.bbc.co.uk/news/videos/cp9rzk8zvv3o
content: |-
  The tree, which was shipped from India as a gift, is once again sprouting due to the efforts of arborists.

  One year after the Maui wildfire in the town of Lahaina, an iconic banyan tree is showing signs of life due to the efforts of arborists.

  The 150-year-old banyan tree, which was shipped from India as a gift to commemorate the 50th anniversary of the arrival of the first Protestant missionaries to live in Lahaina, had been badly burned by the August 2023 wildifre.

  More than 100 people died in Lahaina as a result of the fire.
