title: Chaos unfolds at Gaza UCLA campus protest - BBC News
date: '2024-05-03'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68946573
content: |-
  Flash bangs made a thunderous noise as police attempted to dismantle the pro-Palestinian protester's camp.

  A night of chaos unfolded on the campus of the University of California in Los Angeles.

  Bangs were heard and smoke could be seen as police tried to deter pro-Palestinian protesters that had set up a camp outside the university buildings.

  Demonstrations are continuing at dozens of universities across the US; there have been more than 1,000 arrests in total.

  The BBC's Helena Humphrey was at the scene.
