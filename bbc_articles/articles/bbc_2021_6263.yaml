  Winning candidates in the four force areas are named as parties still mull over the Senedd results.

  'Proud of campaign - disappointed with results'

  Another new face heading to the Senedd is Plaid Cymru's Sioned Williams. While she failed in her bid to become the new member of the Senedd (MS) for Neath, she was elected on the regional list for South Wales West. "I'm extremely proud of the very positive campaign we fought, based on transformational ideas we had for Wales - and that work is ongoing," she told the BBC's Politics Wales programme. But she admitted the overall result for Plaid in the election had been "disappointing". "It is also a disappointing result for Wales," she claimed. However, Ms Williams said the new Plaid Senedd members heading to Cardiff have "fire in our bellies". "We're going to work together to hold this Welsh government to account," she said.
