  • None What could have caused Air India plane to crash in 30 seconds? An opportunity presented itself last week when Mr Asari's daughter, who wants to become a police officer, travelled to Ahmedabad to write the entrance examination. Aryan decided to accompany her. "He told me he wanted to buy new notebooks and clothes," Mr Asari said. The siblings arrived at their father's house around noon on Thursday, roughly an hour-and-a-half before the crash. The family ate lunch together, after which Mr Asari left for work, leaving the children at home. Aryan stepped out on the terrace and started making videos of the house to show to his friends. That's when he spotted the Air India plane and began filming it, he told BBC Gujarati. Aryan soon realised that something was not quite right about the aircraft: "It was shaking, moving left and right," he said. As the plane went on a downward spiral, he kept filming it, unable to grasp what was about to happen. But when thick smoke filled the air and fire spewed out of the buildings, he finally realised what he had just witnessed. He sent the video to his father and called him up.

  When a London-bound Air India plane crashed in the Indian city of Ahmedabad moments after take off, it killed all but one onboard. We hear from eyewitnesses, experts and relatives of those who died.

  The plane lost altitude and crashed into a residential area of the city called Meghaninagar

  "He sounded so frightened - 'I saw it papa, I saw it crash,' he said to me and kept asking me what would happen to him. I told him to sit tight and not to worry," Mr Asari said. "But he was beside himself in horror." Mr Asari also asked his son to not share the video further. However, too scared and shocked, Aryan sent it to a few of his friends. "The next thing we knew, the clip was everywhere." The next few days were a nightmare for the family. Neighbours, reporters and camera persons flooded Mr Asari's small house day and night, requesting to speak to Aryan. "We could do nothing to stop them," he said. The family also received a visit from the police, who took Aryan to the station and recorded his statement. Mr Asari clarified, that contrary to reports, Aryan was not detained, but that police questioned him for a few hours about what he saw. "My son was so disturbed by then that we decided to send him back to the village." Back at home, Aryan has resumed school but is "still not feeling like himself. His mother tells me that every time his phone rings, he gets scared", Mr Asari said. "I know he will be fine with time. But I don't think my son will try looking for airplanes in the sky again," he added.
