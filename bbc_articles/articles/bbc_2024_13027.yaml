title: 'Children in care: How Neath Port Talbot council is tackling rise - BBC News'
date: '2024-06-24'
section: Wales
url: http://www.bbc.co.uk/news/articles/c033e21l9p2o
content: |-
  The number of children in care is rising, but one council is doing things differently.

  'My kids are in care, don’t judge me'

  Kayleigh said: 'I'm a single mum of seven and I'm smashing it'

  "You’ve got no right to judge, we’re still parents and that’s our baby that’s just been taken." Two of Kayleigh’s seven children moved into care after she was in a volatile relationship. They are among more than 107,000 children in care in the UK - a rise of 16% over 10 years. Wales has seen an increase of 79% in 20 years, but one council is bucking the trend.

  In 2012, Neath Port Talbot (NPT) council in south Wales had more than 500 children in care - the highest rate in the country. Since then, it has halved the number of children in care and has one of the lowest rates in Wales, despite contacts to the team increasing by 53%. BBC News has spent a year-and-half looking at what it is doing differently, speaking to an emergency social worker, families who have worked with social services and a 15-year-old girl who talks about her experience of being taken into care.

  As Kayleigh, 35, sits cuddling her baby on the sofa, it is difficult to picture her two eldest children going into care. She said it felt like her heart had been ripped out when they left. "I honestly felt a darkness I’ve never felt before. It’s really, really hard. Ask any mother about having a child taken away, you don’t see the point in living," she said.

  Kayleigh has no social services involvement with her five children at home

  Teatime at Kayleigh's house in south Wales is a juggle, but also a well-oiled routine. When we visit, she is teaching her eldest daughter to make chicken fajitas while the others draw, read or play computer games. All of this happens while Kayleigh prepares baby food, washes the dishes and does a load of laundry. It is a happy and lively atmosphere. She also sees her two children in care regularly and they have a good relationship.

  The number of children in care is on the rise. But can one council do things differently, and keep families together? Watch on iPlayer now or on BBC One Wales at 22:40 BST on Wednesday 3 July

  Things have improved for Kayleigh in part due to one of the projects that supports families in south Wales. The Parenting Advocacy Network (PAN) runs a parent cafe, facilitated by social workers, but led by parents who have all had social services involvement in their lives. Kayleigh said it had given her confidence and a second family - free from judgement.

  Being judged by others - even in earshot of her children in the playground - is something Kayleigh is used to, but does not bother her so much anymore. "My kids are happy, healthy and they all know I love them to bits," she said. "I might be a single mum to seven kids, but I’m smashing it. I’m doing it."

  Keri Warren, head of children and young people services at Neath Port Talbot Council

  Helping stay together is a priority for Neath Port Talbot (NPT) council, according to the head of children and young people services Keri Warren. Care is incredibly expensive and outcomes for care-experienced children are not always positive. When Keri joined the senior management team at NPT in 2012, she said it was a "very difficult place to work", with high caseloads and low morale.

  Keri focused on retaining experienced staff and intervening early with families, very few of whom deliberately hurt their children, she said. Most are under pressure and need help. And what her team is doing is nothing "big and clever", she said, adding they had gone back to basics with "good old-fashioned" social work.

  Social workers identify what the issues are – whether it’s a volatile relationship, an addiction or a dirty house unsuitable for children to live in – and then set about with a team to help that family turn things around. "If they get help at the right time with the right approach, we’ve had some very good outcomes with families that perhaps historically would have ended up either in the child protection arena or with their children in foster care," she said.

  In 2023, there were 107,057 children in care in the UK, a rise of 16% over the past 10 years. They live with their family under a care order, in foster or kinship care or in children’s homes.

  Lauren, now 15, went into care when she was 11

  Lauren said it "hit her like a bomb" when she heard she was moving into care, aged 11. Four years on, Lauren said she was happy about being in care and was starting to feel safe again.

  "I felt positive, I felt loved and that really helps me feel happy again," she said. "I never thought I’d make it to my teenage years to be honest, but I’m turning 15 soon so it’s like, wow, I am actually doing it. I’m making it." Lauren now campaigns for change for children in care, with Neath Port Talbot’s Hope project – a girls' rights group that aims to give children who have been in care a voice. She said the group was like her second family.

