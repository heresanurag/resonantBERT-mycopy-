  Lauren is one of 7,210 children in care in Wales, a number that has risen by 79% over the past 20 years. The cost of residential care in Wales alone has risen from £65m in 2017-18 to £200m this year. NPT has reduced spending on care placements from £13.1m in 2012-13 to £9.1m in 2023-24. Rather than spending money on expensive residential care and court cases to remove children, Neath Port Talbot invests in services to keep families together where possible.

  Linda Davies has been a social worker for nearly 30 years

  Often that starts with Linda Davies, a team manager in social services. She spends evenings and weekends at home answering calls from people who need urgent help and often it can be a child protection referral from the police. When we film with her on shift, she gets a call relating to concerns about a baby who has a bruise. She visits the mum and baby to assess if the baby is at risk. When she meets us afterwards, Linda tells us she is reassured the baby is safe and refers the family for more support.

  Linda said sometimes there is pressure to remove children, but it is her job to slow that process down wherever possible. "The evidence is there, they gravitate back to their families, the outcomes are not great for children in foster care," she said.

  "It’s also doing away with the myth that social workers just remove children, that we’re child snatchers, that’s a wrong impression of social work."

  Gaz, who grew up in care, says there is no way to be a perfect parent but there are a million ways to be a good one

  Lorry driver Gaz has a good relationship with social services now but that was not always the case. “I had a lot of hatred with social services because I feel they took my childhood away," he said. After spending time in the Army, he is now settled with a partner, a son and a stepson, who has additional learning needs.

  By his own admission, Gaz struggled to be a good dad initially and different parenting styles caused conflict with his partner which would sometimes lead to the police being called. At first, he struggled to ask for help, but was inspired by his partner and has since attended a number of courses run by family workers who have helped him deal with confrontational situations at home.

  Gaz said he now "strikes when the iron is cold". "It was hard at the start, because men don’t cry or ask for help, but I was relieved because I had someone to listen [who was] willing to help me," he said. "I’m committed to my job, to my partner, my kids. I’m a parent now, I’ve got to be a role model."

  He lives by a saying taught to him on the course: "Monkey sees, monkey does." And he has changed his reactive approach to parenting and tries to stay calm, which has transformed his relationship with his stepson. "He calls me 'the fun daddy' now, not 'the grumpy daddy', and that melts me," he said. "We’re a team. We’re building memories. He loves me and I’m really proud of him."

  Despite these successes, the pressure on the council is increasing. Tata Steel is cutting 2,800 UK jobs - the bulk of which are in Port Talbot. A report found it could affect as many as 6,800 jobs in the area.

  Keri and the team will continue their focus on supporting families through turbulent times. "The downward trajectory continues and what we’ve said is those children that need to be looked after, will be looked after," she said. "What we’ve been able to do over the years is build up a workforce that is experienced. There’s no substitute."
