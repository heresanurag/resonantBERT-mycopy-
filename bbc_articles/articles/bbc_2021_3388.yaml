content: |-
  Officials believe the missing person quarantined at home but are carrying out extra testing in the area they live.

  Hancock pays tribute to Test and Trace for finding Brazil case

  Sky News asks the health secretary about the time it took find the Brazil variant, and Dr Susan Hopkins how helpful it would be to close the UK's borders at the moment. Matt Hancock says it's a tribute to Test and Trace "that despite the fact the case was one of the few where the correct details weren't attached to the test itself, they managed to track down the individual". He also says it's "reassuring that all the evidence shows that that individual and all six where we found this variant of concern followed the rules and we obviously then put in the testing around that". And he adds: "We wouldn't know about any of this without the huge testing and sequencing capacity." On border restrictions, Dr Susan Hopkins says people coming into the country and leaving should only be doing it for essential reasons. She also says the day two and day eight tests in quarantine give extra reassurance in terms of detecting cases. And she details other restrictions currently in place, saying that even with smaller numbers of individuals coming into the country these work to minimise the risk.
