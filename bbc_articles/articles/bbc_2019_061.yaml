title: Strictly's AJ Pritchard tells of home town attack ordeal - BBC News
date: '2019-01-03'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-46746042
content: |-
  AJ Pritchard and his brother Curtis say they were attacked on the dance floor of nightclub in Nantwich.

  A festive night out turned into a nightmare for Strictly Come Dancing star AJ Pritchard and his brother Curtis - when they were attacked in a nightclub in their home town, Nantwich.

  Speaking to the BBC, the professional dancers described being left battered and bruised, with Curtis needing emergency surgery on his knee.

  A 20-year-old man arrested following the incident at the Nakatcha nightclub has been released under investigation.
