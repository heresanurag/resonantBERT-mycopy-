title: King Charles III unveils life-sized statues of Elizabeth II and Prince Philip
  - BBC News
date: '2023-11-12'
section: General
url: http://www.bbc.co.uk/news/uk-67394815
content: |-
  The new statues are installed at the Royal Albert Hall as part of its 150th anniversary.

  King Charles III and Queen Camilla have unveiled new bronze statues of Elizabeth II and Prince Philip at the Royal Albert Hall.

  Poppy Field's two-metre-high artworks, installed as part of the concert hall's 150th anniversary, were uncovered as the royals were arriving for the Royal British Legion Festival of Remembrance.
