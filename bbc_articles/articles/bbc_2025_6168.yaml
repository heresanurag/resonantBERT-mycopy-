content: |-
  Hundreds turn out for a march and to urge the government to throw a lifeline to British Steel.

  We want our steel back, say Scunthorpe's workers

  Steelworkers and their families make their voices heard in Scunthorpe on Saturday

  While MPs were being recalled to Westminster to pass a bill designed to keep British Steel going in Scunthorpe – and save 2,700 jobs – hundreds of those directly affected took to the streets to make their feelings known. BBC News spoke to them on a campaign march before the bill was passed. Scunthorpe United FC's crest depicts a hand gripping an iron bar – an apt metaphor for a town desperate to keep hold of its steelworks in the face of global forces and tense talks in Westminster. The club's nickname, The Iron, marks the town's long association with the steel industry (although in the 20th Century they were also known as The Nuts, after a local reverend quipped they were "tough nuts to crack" when presenting them with a trophy).

  Scunthorpe United has close ties with the town's steelmaking industry

  As hundreds of men, women and children spill on to Doncaster Road on their way to Glanford Park – the home of the football club and, for many, the heart of this proud, working class town in North Lincolnshire – there is the same air of stoicism and defiance. "We want our steel back!" chants the crowd, as passing motorists toot their horns in support.

  Officials from Jingye, British Steel's Chinese owners, were reportedly unable to access the Scunthorpe site this morning

  Among the crowd are Dave Palmer and his stepson Ethan Unitt, both wearing Scunthorpe United jerseys. Mr Palmer, 65, says: "My dad and uncles worked at the steelworks. I did for a bit, too. Those works are the beating heart of Scunthorpe – lose it and you lose the town. Simple as." He says the club has historically had close ties with the steelworks. "Back when the club played at the Old Showground, kick-off was always 3.15pm – 15 minutes after other fixtures – to accommodate the steel lads on the 6am to 2pm shift, giving them enough time to get to the game." Pointing to the crest on his Scunthorpe Unit shirt, Mr Unitt adds: "This town is the steelworks. That's why we're The Iron."

  Scunthorpe United supporters Dave Palmer and Ethan Unitt fear for the future

  Word filters through quickly to those on the march that Business Secretary Jonathan Reynolds says nationalisation may be a "likely option", with the bill to help the plant stay open clearing the House of Commons. "It's brilliant news," says Thomas Smith, branch secretary for the Community union, which organised the march. He believes nationalisation represents the best chance of saving steelmaking in Scunthorpe. "We're not there yet but we're close," he says. Mr Smith, a British Steel plant operator, shouts to others to get the banners to the front of the procession, before continuing: "If we lose the works, we lose the beating heart of Scunthorpe." Some in the crowd direct insults at Jingye, British Steel's Chinese owner, which has said the plant is "no longer financially sustainable" and is losing about £700,000 a day. Jingye officials were unable to access the site this morning, sources have told the BBC. But Mr Smith doesn't join in the chanting. "Jingye took us over when no-one else would," he says. "Without them, British Steel would be gone now. So I'm saying to them, 'Thank you, Jingye. But now it's time for us to go our separate ways, with us under the British government'." Looking around at the families on the march, he adds: "All this isn't just for us. It's for future generations that will suffer if it closes." Mr Barroclough is wearing a British Steel hoodie. He is with his two young sons. He says his wife, back home with their daughter, is expecting their fourth child in May.

  British Steel worker Thomas Smith, in the green shirt, says he does not hold any animosity towards the firm's Chinese owner

  His sons are clutching a placard that says, "Our town, our jobs, our futures". "We are one steel family," explains Mr Barroclough. "Our family, like many others, is built around the steelworks. Who knows? My boys might end up working there one day, if it can be saved." He tells of the strain of the past few weeks. "There have been a lot of very emotional, dark nights," he says. "We're hoping for the best but planning for the worst." Another worker, Nick Adams, 28, wearing a British Steel polo shirt, tells me he is heartened by the turnout. He started working in the steelworks' rod mill in September 2022, and in August next year he is due to get married. "My partner and I also have a mortgage to pay," he says. "It's a huge worry for us both. "If the works close, I'll end up having to commute out of the town."

  British Steel worker Nick Adams is saving for his wedding

  Mr Adams tells of the likely impact on the town should the works close. "It won't just be felt by those directly employed by British Steel," he says. "It'll impact the butchers, the cafes, even the football club." Fifth generation steelworker, Kieran, 30, who does not want to give his surname, looks lost. "I've worked at the steelworks since I left school. I couldn't imagine working anywhere else," he says. "I had to come down here. We need to show the country how much our steelworks mean to us."

  Before the march, Martin Hopper, Glanford Park's stadium manager, said the club was only too happy to back the steelworkers. "We are a community-based club and a lot of our fans are current steelworkers, retired steelworkers or know someone who is, so it's really important we support them," he said. While he admitted he "does not know the ins and outs" of complex discussions happening 170 miles away in Westminster, he hoped a solution can be found to keep the site open. "Anything the government can do to make British Steel in Scunthorpe sustainable has got to be welcomed," he said. "Steel is a massive part of this town and has been for a number of years." Listen to highlights from Lincolnshire on BBC Sounds, watch the latest episode of Look North or tell us about a story you think we should be covering here, external.
