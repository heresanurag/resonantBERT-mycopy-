title: Aerial footage shows Nashville tornado damage - BBC News
date: '2020-03-03'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-51730262
content: |-
  At least 22 people have died after two tornadoes ripped through central Tennessee.

  At least 22 people have died after two tornadoes ripped through central Tennessee, including the state's biggest city Nashville.

  Officials said the tornadoes also caused widespread damage to buildings in the city.
