  Bringing you the latest news from across England about the coronavirus pandemic.

  What happened to the contact-tracing app?

  The news that the full test-and-trace programme might not be up and running until September has led some to think this applies to the NHS contact-tracing app, rather than the wider manual tracing effort. The confusion is understandable - after all it's not long ago that ministers talked as if the app was the centrepiece of the programme rather than the "cherry on top" as it has been described. My understanding is that the app, which has suffered a number of delays, should still be rolled out nationwide by late June or early July - although there is no guarantee over that. After a first trial with an app with very limited capabilities on the Isle of Wight, version two, which features five questions about symptoms instead of two and integrates the testing process,is undergoing testing at a secret location in London.
