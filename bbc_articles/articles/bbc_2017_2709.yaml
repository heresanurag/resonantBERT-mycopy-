title: 'Clarke: Brexit hopes ''like Alice in Wonderland'' - BBC News'
date: '2017-02-01'
section: General
url: http://www.bbc.co.uk/news/uk-politics-38811312
content: |-
  Veteran Conservative Ken Clarke likens post-Brexit trade hopes to Alice in Wonderland.

  Mr Clarke, who was speaking as MPs began two days of debate on a bill to give the go-ahead to the official two year process of leaving the EU, said he had been told he was being too pessimistic about prospects for the UK after Brexit.

  Watch more: Ken Clarke on why he's voting against Brexit
