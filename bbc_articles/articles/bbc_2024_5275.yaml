content: |-
  Conor McGregor is the most drug-tested fighter in the UFC this year as he continues to tease his return.

  Conor McGregor is expected to fight lightweight contender Michael Chandler on his return

  Conor McGregor is the most drug-tested fighter under the UFC's new anti-doping regime as the Irishman continues to tease his return to fighting. McGregor has been drug tested five times, external since January 1. No other fighter has been tested more than twice. The former UFC champion has spoken at length this week about his desire to return this summer having not fought since 2021. But the UFC are yet to officially announce his return. McGregor has been promoting his acting debut in the film Road House this week and has used the tour as an opportunity to appeal to the UFC to officially confirm a fight date. The 35-year-old is expected to face American Michael Chandler on his return. McGregor caused a stir when it emerged he had removed himself from the United States Anti-Doping Agency's (Usada) testing pool following his defeat by Dustin Poirier in 2021.

  The Dubliner suffered a broken leg in that fight but he returned to the anti-doping programme last year. The UFC has since ended their anti-doping partnership with Usada and have now teamed up with Drug Free Sport International. Combat Sports Anti-Doping (CSAD) oversee the anti-doping programme and on Thursday heavyweight Walt Harris, of the USA, became the first UFC athlete to be given a ban in the new era. Harris has been given a 48-month suspension for two separate anti-doping violations, occurring in July and August last year.
