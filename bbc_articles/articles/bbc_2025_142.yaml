title: 'Kiena Dawes: Manslaughter-accused Ryan Wellings tells trial ''I''m not a monster''
  - BBC News'
date: '2025-01-02'
section: Lancashire
url: http://www.bbc.co.uk/news/articles/cz0r5z4jdj3o
content: |-
  Ryan Wellings, 30, of Bispham, denies driving Kiena Dawes to kill herself through domestic abuse.

  A man accused of driving his vulnerable partner to suicide through domestic abuse and violence has told jurors he drank prosecco and took cocaine after he was charged with her manslaughter. The trial has previously heard that Kiena Dawes, 23, of Fleetwood, left a suicide note saying "I was murdered... Ryan Wellings killed me" before she took her own life on a railway line in July 2022. Mr Wellings, 30, told the court he was sleep deprived when he left the police station and recorded and uploaded a video to Facebook in which he blamed Ms Dawes' mother. The landscape gardener from Bispham denies manslaughter, assault and coercive and controlling behaviour between January 2020 and July 2022.

  Preston Crown Court has heard Ms Dawes, a hairdresser, had left their eight-month-old daughter with a friend before taking her own life on 22 July 2022. Mr Wellings was asked about a short video he made within an hour of leaving the police station on 3 June 2024.

  The clip, with loud backing music, showed him being driven in a car, wearing sunglasses and holding a bottle, saying: "I'm driving around with a bottle of prosecco. "I have been told off an hour ago on a manslaughter charge." He then swore before continuing: "Angela Dawes, you need to take the blame for abandoning your daughter and going to Greece." Mr Wellings then swore again and used an offensive term about Ms Dawes's mother. Prosecutor Paul Greaney KC told Mr Wellings: "You uploaded it on purpose to intimidate the Dawes family and show them who is boss. "What we see there is the real Ryan Wellings. Ryan Wellings the bully. "The entitled person. The person who thinks he can do what he wants to people and say what he wants." Mr Wellings replied: "I did not know what I was doing. I know I did wrong and did some stupid things. "That's me hurting. Being blamed for killing my kid's mum, the woman I loved."

  Mr Wellings said he had downed bottles of prosecco and taken drugs at the time. He said he had uploaded the video to Facebook by accident and had later deleted it. Mr Greaney then moved on to discuss the suicide note left by Ms Dawes. He pointed out she did not blame her family for her death, writing: "I will always love my family. I love them unconditionally." Mr Greaney said the note blamed Mr Wellings for her death, calling him a "monster" and a "bully". "She says you killed her in that note, just hours before she took her own life. "At the time Kiena took her own life, she was thinking about you and regarded you as a monster." Mr Wellings, wiping away tears, replied: "I'm not a monster. Never have been."

  Jurors have seen photos of Ms Dawes' injuries from alleged assaults by Mr Wellings, as well as text exchanges between the pair in which she accused him of hurting her. The defendant maintained he had never intentionally hit her, adding that any injuries sustained by her were a result of him "restraining" her while she attacked him. He has admitted previously assaulting a former girlfriend, the mother of his twin daughters, but denied ever attacking Ms Dawes. Ms Dawes, who had struggled with poor mental health, first met Mr Wellings in January 2020 and was "swept off her feet", her mother has told the court. He had her name and face tattooed on his body after only a few days and proposed within three months. It is alleged that Mr Wellings began physically and emotionally abusing Ms Dawes soon after, and she told a friend that their relationship was a "fairytale [that had] turned into a nightmare".

