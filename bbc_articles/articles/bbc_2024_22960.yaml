title: Police Scotland 'absolutely committed' to solving doorstep murder - BBC News
date: '2024-09-23'
section: Scotland
url: http://www.bbc.co.uk/news/articles/c70wegw32dno
content: |-
  The family of Alistair Wilson have been critical of Police Scotland's investigation into the 2004 murder.

  This video can not be played To play this video you need to enable JavaScript in your browser. Chief Constable Jo Farrell said Police Scotland was determined to get justice for Alistair Wilson's family

  The chief constable of Police Scotland has said the force remains “absolutely committed” to solving the murder of a bank manager in the Highlands nearly 20 years ago. Alistair Wilson was fatally wounded when he was shot at his home in Nairn in November 2004 in what became known as the "doorstep murder". His killer has never been caught. Scotland's top law officer, the lord advocate Dorothy Bain KC, last week announced a new team of detectives and prosecutors was taking over the case.

  It came as Mr Wilson's family said they had lost confidence in Police Scotland over its handling of the investigation. Chief Constable Jo Farrell said the case had been the subject of “very extensive investigations” and it was important to let the new senior officer in charge of the inquiry build a relationship with the family.

  Alistair Wilson's wife Veronica and other members of the family have been critical of the chief inspector

  She said: "We are absolutely committed to getting justice for that family. "Nearly 20 years on, the effect on the family is unimaginable. "There is a new senior investigating officer, there is a new team and there are further lines of investigation and inquiry which we will commit to in order to get justice." Mr Wilson, 30, was shot on 28 November 2004 and died in hospital from the injuries. He and his wife Veronica had been bathing their two young sons and getting ready to read them a bedtime story when the killer came to the door. A stocky man aged 20 to 40 years old and wearing a baseball cap spoke to Mrs Wilson, asking for her husband by name. When he came downstairs, the man handed him a blue envelope with the word "Paul" on it. Mr Wilson went inside briefly and when he returned the man opened fire with a handgun. The gun involved was found on 8 December 2004 in a drain on Seabank Road, Nairn, by council workers carrying out gully cleaning. Forensic analysis identified it as the murder weapon.

  Alistair Wilson was shot on the doorstep of his home in Narin

  When she announced the re-investigation of the murder, Lord Advocate Dorothy Bain said it was a "deeply disturbing" crime and the Wilson family had suffered a devastating loss. She said: "It is my sincere hope that this secures justice for Alistair Wilson’s family and for the wider community who have been affected by this violent crime." Chief Constable Jo Farrell said she had no plans to meet Mr Wilson's family, who accused her of turning down a previous request. She insisted it was more important for the new investigating team to "build a productive relationship" with them. "That’s the important relationship at this stage in order to bring about confidence and justice," she said. “We have always been committed to this investigation but the family’s views in relation to us are not positive. "We’re trying through the new senior investigating officer and family liaison officers to build these bridges and provide confidence to the family that we can get justice for them." In December last year, Mr Wilson's family complained to the Police Investigations and Review Commissioner (Pirc) about the handling of the police investigation. Police Scotland and the Crown Office and Procurator Fiscal Service (COPFS) said at the time they had met the family to discuss the matters raised by them.
