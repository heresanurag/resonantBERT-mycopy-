  • None Pavkov became the first Serbian player to net a brace in the Champions League since Aleksandar Prijovic for Legia Warsaw against Borussia Dortmund in November 2016.
  • None Red Star Belgrade have won both of their European home matches against Liverpool, also triumphing 2-1 in October 1973 in the first leg of a Last 16 tie in the European Cup.
  • None Liverpool have lost two of their last three Champions League group games (W1), as many as they suffered in their previous 11 combined (W4, D5, L2).
  • None And their first shot on target of this match came in the 71st minute. The Reds failed to land a shot on target in their other away game in the competition this season, against Napoli.

  Liverpool host Fulham in the Premier League on Sunday (12:00 GMT), before returning to Champions League action away to Paris St-Germain on 28 November (20:00 GMT).
