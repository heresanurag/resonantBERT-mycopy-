  Peter McNaney, Chairman of the Belfast Trust, apologised but said the trust had already taken steps to address some of the concerns outlined in the inquiry "including the introduction of clinical record review" and a system that gathers and holds all of the trust's information about its doctors.

  Mr McNaney has said steps are being taken to address issues highlighted in the inquiry

  "However, first and foremost, our thoughts today are very much with those patients who suffered avoidable and unnecessary harm whilst under the care of Dr Watt," Mr McNaney said.

  The report, released on Tuesday, highlights concerns with management and found a culture of medical professionals "apprehensive in raising a concern about the practice of a colleague or querying discrepancies that arose".

  "A pre-existing and deeply rooted medical culture which inhibits a flow of relevant information to the medical director's office was, in the view of the inquiry panel, a major factor in failing to identify potential problems with Dr Watt at an earlier stage."

  Doctors raising concerns about other doctors may be "wary of committing themselves to a position", it continued.

  "Consequently, matters which may urgently need investigation or a further review, are passed over."

  In the case of Dr Watt, "there was sufficient information accessible prior to November 2016 to demonstrate a pattern of potential aberrant practice".

  From as early as 2006, a "narrative" surrounding the consultant's work had developed, the inquiry found, with a "perception that Dr Watt's clinical ability was not in question".

  Issues were defined as "administrative", while the former neurologist had a "history of either failure to comply with or unreasonable delay in providing or undertaking annual appraisals".

  Dr Watt also had a private practice at the Ulster Independent Clinic, where there had also been "significant complaints" about his work.

  The inquiry had defined terms of reference, but reflected that concerns raised about complaints and challenging the work of medical professionals will not be "unique to the Belfast Trust".

  He added the "combined effect" of an "inadequate investigation" by the General Medical Council into a clinical complaint in 2012, the "failure to disclose significant complaints" to the Belfast Trust by the Ulster Independent Clinic, alongside failures of other health and social care trusts "compounded a pre-existing problem in the Belfast Trust".

  The report, which is about 1,000 pages long, makes 76 recommendations; among them ensuring that healthcare providers apply the principle of "you cannot unknow what you know".

  Such conversations about raising complaints cannot be regarded as "informal" or "off the record", Mr Lockhart explained.

  The statutory public inquiry was established in 2020 by Health Minister Robin Swann.

  Professor Hugo Mascie-Taylor, who had previously been involved in the Mid-Staffordshire inquiry, was also a member of the panel.
