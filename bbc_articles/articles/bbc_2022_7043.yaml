title: 'Michael Watt: Trust failed to intervene on neurology misdiagnoses - BBC News'
date: '2022-06-21'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-61856714
content: |-
  A report is published on the practice of a doctor which led to NI's largest ever patient recall.

  5,448 patients were eligible for recall of which 4,179 people attended appointments.

  The Belfast Health Trust failed to intervene quickly enough in the practice of a doctor which led to Northern Ireland's largest ever patient recall, an inquiry has found.

  More than 5,000 former patients of neurologist Dr Michael Watt were invited to have their cases examined for possible misdiagnoses.

  Health Minister Robin Swann said the report made very difficult reading.

  Among the conditions being treated were stroke, Parkinson's disease and multiple sclerosis (MS).

  The Independent Neurology Inquiry concluded that the combined effect of the failures ensured that patterns in the consultant's work were missed for a decade.

  Dr Cathy Jack, Chief Executive of the Trust, apologised to Dr Watt's patients.

  "The Belfast Trust let you down and many of you have suffered avoidable and unnecessary harm as a result," Dr Jack said.

  "Whether that was through being given a diagnosis that was not correct, receiving incorrect treatment or medication, or having a procedure you did not need."

  Patients who were affected by the inquiry results said they had been failed.

  Health Minister Robin Swann apologised to those "who have been so badly let down".

  "Today's report makes very difficult reading," he said.

  Robin Swann has said he will be sharing the findings with his counterparts in Great Britain to ensure similar mistakes aren't made

  While the reputation of the health service had been tarnished, Mr Swann said his priority was to ensure failures were not repeated.

  Of the 5,448 people, including some children, who were recalled, 4,179 attended.

  About one in five were told they had not been given an appropriate management plan for their condition, while a similar number had not been issued an appropriate prescription.

  The inquiry, chaired by Brett Lockhart QC, has recommended that Northern Ireland's Department of Health should review its guidance in relation to complaints to ensure that patient safety is the overriding objective.

  It also found a culture of medical professionals who were "apprehensive in raising a concern about the practice of a colleague".

  The inquiry was set up to examine the governance arrangements into how complaints were identified and handled.

  Dr Watt's clinical practice has been investigated separately, by the Regulation and Quality Improvement Authority (RQIA) and in a final outcomes report which was published by the Department of Health this month.

  Dr Michael Watt worked at the Royal Victoria Hospital as a neurologist

  In 2021, he also voluntarily removed himself from the medical register ahead of a public Medical Practice Tribunal Hearing.

  Dr Watt, who worked at the Royal Victoria Hospital in Belfast, did not give evidence to the inquiry and a lawyer for the former consultant has referenced that he is experiencing ongoing mental health issues.

  Mr Lockhart QC concluded it was a "source of significant and understandable public concern" that he did not appear before the panel.

  This is an extremely critical report on the workings and governance of the Belfast Health Trust and the Department of Health.

  The regulator, the General Medical Council, also comes in for some bashing.

  In straight-talking language, the panel highlights numerous failings by management across a number of healthcare organisations.

  While the intention of this inquiry was never to examine the clinical practice of Michael Watt, patients should get some comfort in the criticism of managers who have been named and a culture where it was easier to pass problems over.

  Yet again, Northern Ireland is dealing with another public inquiry which highlights extreme failures in healthcare.

  Again, patients are at the centre of a dysfunctional system which failed to put them first.

  Mr Lockhart said the report was "fundamentally about the safety of patients".

  He said the inquiry had sought to examine if patients were let down, if opportunities were missed to identify problems with Dr Watt's practice, and if earlier intervention would have made a difference.

  In answer to all three questions, he said the panel answered "yes".

