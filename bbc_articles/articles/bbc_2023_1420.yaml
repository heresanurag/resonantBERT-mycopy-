  Mr Biden said on Tuesday he was "surprised" when he found out and he was "co-operating" with the justice department's review.

  But the discovery of another batch of classified documents in a second location increases the possibility that this story is not one of isolated carelessness on the part of Joe Biden and his team, but rather something more systemic. It also increases the chances that this is not the last new revelation of document mishandling.

  It is an iron rule of presidential scandals that bad news dripping out over an extended period of time is much more politically damaging than one-time revelations, however bad they may be.

  There have now been multiple days of dripping revelations on the documents story, and it's already distracting from the issues Mr Biden wants to focus, such as dropping inflation levels and the Republican efforts to enact abortion restrictions in the House of Representatives.

  The controversy also comes as the Democratic president faces scrutiny from a new Republican majority in the US House of Representatives.

  "Now that Democrats no longer have one-party rule in Washington, oversight and accountability are coming," James Comer, the new chairman of the House Oversight Committee, said on Wednesday.

  The committee is launching inquiries into the president and his family, including a request for the White House to turn over documents and communications related to the classified files.

