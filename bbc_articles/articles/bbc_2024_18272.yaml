title: 'Eastbourne: Penny farthing uphill time trial rides into Sussex - BBC News'
date: '2024-08-11'
section: Sussex
url: http://www.bbc.co.uk/news/articles/c0rw8rxvljro
content: |-
  It is the seventh year of the uphill race from Eastbourne to Beachy Head.

  What is billed as the world's only uphill penny farthing race is taking place later in East Sussex. The Beachy Head World Championship Penny Farthing Hill Climb Time Trial sets off on Sunday morning for the seventh year. Riders start at one-minute intervals from the Western Lawns in Eastbourne at 10:00 BST and tackle the three-mile (4.7km) climb to Beachy Head. Visit Eastbourne describes it as "the only cycling event of its kind in the world specifically for penny farthings".

  The time trial is held on an open road course with an elevation gain of 150m (492ft). It is an amateur event open to anyone with a traditional or modern penny farthing with a wheel diameter in excess of 116cm (46 inches). The quickest riders are expected to take just over 13 minutes to reach the finish line at Beachy Head. Between 25 and 30 riders have signed up to compete. A spokesperson for Visit Eastbourne said: "This event is free to watch and we encourage spectators to cheer on the riders from the pavements along the course."
