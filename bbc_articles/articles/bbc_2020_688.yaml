id: bbc_2020_688
title: 'Seamus Mallon funeral: Tribute to ''peacemaker'' and ''statesman'' - BBC News'
date: '2020-01-27'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-51258201
content: |-
  The funeral was followed by a special sitting of the Northern Ireland Assembly.

  Seamus Mallon was a peacemaker who "made a real difference to the world", mourners at his funeral have been told.

  The former deputy first minister of Northern Ireland, who was one of the key architects of the 1998 Good Friday Agreement, died on Friday aged 83.

  Past and present government ministers were among the mourners in St James' Church in Mullaghbrack, County Armagh.

  Archbishop Eamon Martin said he was a "shining example of someone who gives their life in a vocation of service".

  Northern Ireland's First and Deputy First Ministers Arlene Foster and Michelle O'Neill, Taoiseach (Irish PM) Leo Varadkar and Northern Ireland Secretary Julian Smith were part of the congregation.

  Other mourners included former Taoiseach Bertie Ahern and former Northern Ireland First Minister Lord Trimble.

  Irish PM Leo Varadkar was one of many politicians to pay their respects

  Tributes were later paid to Mr Mallon by MLAs at a special sitting of the Northern Ireland Assembly.

  SDLP deputy leader Nichola Mallon described the former deputy first minister as "a man of peace" and "a man of non-violence".

  "I am forever grateful that I got to stand on the shoulder of an Irish political giant," she said.

  First Minister Arlene Foster offered her condolences to Mr Mallon's family and the SDLP, describing him as "a fierce critic of violence" and "a commanding orator".

  Deputy First Minister Michelle O'Neill said: "Seamus has left a legacy of hard work and commitment to creating a better society and a better Ireland."

  This video can not be played To play this video you need to enable JavaScript in your browser. 'He was dedicated to a culture of life and peace'

  The sitting was followed by procession at Stormont to open a book of condolence.

  Archbishop Martin, leader of the Catholic Church in Ireland, told those gathered in the tiny County Armagh church that the politician was determined to "make a real difference, and to leave the world a better place than it was when he entered it".

  He said having lived through "the worst of the Troubles" in Northern Ireland, Mr Mallon "personally played a central role in the landmark events of our peace process".

  The archbishop described him as a peacemaker, a bridge builder, a leader and a statesman.

  But he added "whether he was with presidents, prime ministers, party colleagues, or his own good neighbours and friends here in Markethill, he was the same Seamus".

