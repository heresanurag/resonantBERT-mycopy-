title: 'Ireland rugby squad: Caelan Doris named captain for autumn internationals
  - BBC Sport'
date: '2024-10-23'
section: Irish Rugby
url: http://www.bbc.co.uk/sport/rugby-union/articles/cvgwxldqx4vo
content: |-
  Caelan Doris is named Ireland captain for next month's autumn series with Peter O'Mahony not yet back to full fitness.

  Doris captained Ireland against Italy and South Africa earlier this year

  Caelan Doris says being named captain for Ireland's autumn internationals is an "enormous honour". The Leinster back row, 26, will skipper the side in matches against New Zealand, Argentina, Fiji and Australia in Dublin next month. Flanker Peter O'Mahony, who had taken over as captain following Johnny Sexton's retirement, is named in the squad although the Irish Rugby Football Union (IRFU) says he will "continue his rehabilitation with Munster next week as he builds towards a return to action over the coming weeks". Doris previously stood in as skipper for Ireland's Six Nations win over Italy in February and the epic summer tour victory over South Africa in Durban. "I am very fortunate to have had so much support from my family and friends and many others along the way from Mayo to Blackrock and on to Leinster and Ireland," said Doris. "I am extremely proud to lead this squad and I know that there’s an experienced group of leaders who will work hard to achieve success in the weeks ahead."

  With first-choice hooker Dan Sheehan out until the new year, head coach Andy Farrell has included Connacht's Dave Heffernan in the squad. Hookers Ronan Kelleher and Rob Herring have also been selected despite their recent injury troubles while Leinster's uncapped Gus McCarthy is one of five training panellists along with Thomas Clarkson, Alex Kendellen, Shayne Bolton and Jack Boyle. Farrell has included the uncapped duo of Ulster forward Cormac Izuchukwu and Leinster fly-half Sam Prendergast, both of whom were part of the recent Emerging Ireland series in South Africa. Ciaran Frawley has also made the cut after having injured his ankle in Leinster's win over Connacht last weekend. Frawley is expected to challenge Munster's Jack Crowley for the starting fly-half berth after his starring role in Ireland's win over South Africa in Durban when he came off the bench to kick two drop-goals and seal a famous win. After missing the Six Nations and South Africa summer Tests, Connacht wing Mack Hansen returns to the squad as one of four wingers with James Lowe, Jacob Stockdale and Calvin Nash. Leinster scrum-half Jamison Gibson-Park also returns as expected after a hamstring injury forced him to miss the South Africa series, but there is no place for 2021 Lions tourist Jack Conan.

  Ciaran Frawley (left), the hero of Ireland's win over South Africa, is included after an injury scare last week while Ulster's Cormac Izuchukwu (right) is one of two uncapped players in the squad

  This will be Farrell's last window as Ireland coach before he takes his sabbatical to lead the British and Irish Lions in next summer's tour to Australia. "There is a blend of youth and experience, but all of the players are selected on merit carried from their form in recent months from the summer tour, the early rounds of the URC [United Rugby Championship] and at the Emerging Ireland Tour," said Farrell. “While some of the players have been sidelined of late, collectively they are making positive strides on the injury front and we are hopeful that they will come into the selection frame over the course of the coming weeks as they ramp up their respective rehab programmes. “The Emerging Ireland Tours have presented a crop of less experienced players with the opportunity to impress and it was great to see a number of them take their chance." Ireland face New Zealand in a rematch of their World Cup quarter-final encounter on 8 November at the Aviva Stadium before hosting Argentina, Fiji and Australia in Dublin. The squad will assemble in Dublin on Monday before travelling to Portugal for a warm-weather training camp.
