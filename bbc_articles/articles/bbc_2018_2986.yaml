title: Crews tackle wildfires on Isle of Barra - BBC News
date: '2018-03-04'
section: Highlands & Islands
url: http://www.bbc.co.uk/news/uk-scotland-highlands-islands-43277232
content: |-
  Coastguard and RNLI volunteers and members of the public also helped to extinguish the flames.

  Firefighters have been tackling three wildfires on Barra in the Outer Hebrides.

  They were joined by coastguard and RNLI volunteers and members of the public to try to extinguish the flames.

  The fires, which were all in close proximity, near Cuithir, were reported at 19:38, 23:15 and 05:40.

  A Scottish Fire and Rescue spokesman said a nearby property was evacuated but there was now "no threat to livestock or properties".

