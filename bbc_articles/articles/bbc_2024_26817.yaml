  Police said they were called to the property in Cardiff on Saturday afternoon.

  Police said they were called to the property on Saturday afternoon

  Police have launched an investigation after the sudden deaths of two people at a property in Cardiff. Emergency services were called to the house in Morfa Crescent, Trowbridge, at about 14:50 BST on Saturday, South Wales Police said. The force thanked the local community for its patience and understanding while cordons are in place.

  A semi-detached house on Morfa Crescent is sealed off, with four police vans on the street – one of which belongs to the Crime Scene Investigation Unit. The crescent is in a quiet area of Trowbridge made up of homes and four schools – two primary and two secondary.
