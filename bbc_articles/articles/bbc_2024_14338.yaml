title: Childminder admits killing baby boy in her care - BBC News
date: '2024-06-07'
section: Lancashire
url: http://www.bbc.co.uk/news/articles/cekkdmr0l14o
content: |-
  Karen Foster, 62, admits shaking baby Harlow Collinge "out of frustration" after he had fallen over.

  Harlow Collinge was a "funny, playful baby", his family said

  A childminder has admitted shaking and killing a nine-month-old baby she was supposed to be looking after. Karen Foster, 62, claimed Harlow Collinge had fallen over and banged his head and that she shook him "out of frustration". The boy was taken to hospital from the address in Hapton, near Burnley, Lancashire, on 1 March, 2022, but died four days later. Foster was due to stand trial at Preston Crown Court for Harlow's murder but the prosecution accepted a plea of manslaughter.

  Karen Foster, 62, claimed she shook Harlow Collinge "out of frustration"

  The basis of her plea was that her "forceful shaking" caused Harlow's death after he fell out of his high-chair and began crying, the court heard. Foster, a registered childminder with nine years experience, called 999 to say he was not breathing, and told a paramedic he had "suddenly collapsed". In legal arguments, the court heard a CT scan of Harlow's head showed significant injuries to the brain, with bleeding on both sides and swelling. He had been described as a "healthy and happy boy" beforehand. Foster had also been charged with assaulting a two-year-old girl in her care in 2019, which she denied. That count was ordered to lie on the file.

  Harlow's mother, sitting in the public gallery, sobbed when the guilty plea was entered. Judge Mr Justice Cotter told Foster, who appeared in the dock leaning on crutches: "I am sure you have been advised that the likely sentence is one of a substantial period in custody and you should be well aware of that." She is due to be sentenced on Thursday. Since his death Harlow's family said they had been campaigning for cameras to be installed on premises where childminders work. In a tribute posted on a crowdfunding page, they said: "He was a funny, playful baby who loved Peter Rabbit, milkshakes and pink wafer biscuits. "He loved it when his sister sang songs to him, he loved his doggies and running around in his baby walker. "He loved his family, his mummy and daddy, brother and sisters, and his grandparents so much. "He has left a Harlow shaped hole no one can fill"
