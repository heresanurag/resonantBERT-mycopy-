title: 'South Africa election: IFP agrees to join ANC and DA in government of national
  unity - BBC News'
date: '2024-06-12'
section: Africa
url: http://www.bbc.co.uk/news/articles/cd11gpdw2k1o
content: |-
  This is the first official indication that a government of national unity has been agreed.

  The Inkatha Freedom Party leader says they won't "lose their identity" when they join the government of national unity

  The leader of South Africa's Inkatha Freedom Party (IFP) says his party has agreed to form part of a government of national unity that includes the African National Congress (ANC) and the biggest opposition party, the Democratic Alliance (DA). Velenkosini Hlabisa told reporters at a media briefing in Durban on Wednesday: "The only options were to become part of the government, or part of the opposition." "The people of South Africa who voted said that political parties must find a common ground," Mr Hlabisa said. South Africans have been eagerly waiting to know who would form the next government after the ANC lost its majority in last month's elections.

  This is the first official indication that a government of national unity has been agreed, although the DA and ANC have not yet commented. The ANC has previously said it wanted to form a unity government and had engaged with all of the country's opposition parties. The new parliament is due to be sworn in on Friday, after the country's top court dismissed a bid by former President Jacob Zuma’s party, MK, to stop its first sitting. This is when the parliament is expected to elect a president, so the ANC would hope to have agreed a deal by then. It insists that Cyril Ramaphosa must remain the country's leader. The ANC vote fell below 50% for the first time since Nelson Mandela led them to victory in 1994 and ended the racist system of apartheid, forcing them to look for coalition partners. The ANC got about 40% of the vote, with the centre-right Democratic Alliance (DA) on 22%, the MK party on 15% and the radical Economic Freedom Fighters on 9%. The IFP, which is a conservative party with a strong Zulu base, got about 4% of the vote share in the election. Many ANC activists would prefer to do a deal with the EFF and MK, which are both led by former senior ANC officials. However, such a coalition would alarm investors because these parties favour seizing white-owned land without compensation and nationalising the country's mines. The business community would prefer a coalition between the ANC and DA. Bringing in other parties, such as the IFP, would help deflect criticism that the ANC leadership was "selling out" by working with the DA, seen by some South Africans as representing the country's white minority. The DA opposes two of the ANC's core policies - its black empowerment programme, which aims to give black people a stake in the economy following their exclusion under apartheid, and the National Health Insurance (NHI) Bill, which promises universal healthcare for all. "We will participate in the government of national unity for the sake of our country and for the sake of our people, who want life to continue with a stable government that will address their challenges," Mr Hlabisa said. Mr Hlabisa assured IFP supporters the party would not "lose its identity" as they have worked in a coalition government before. Following the historic 1994 elections, Mr Mandela's ANC worked with his former enemies in the National Party, which was responsible for the implementation of apartheid, as well as the IFP, whose supporters had frequently clashed with ANC activists, leading to thousands of deaths.
