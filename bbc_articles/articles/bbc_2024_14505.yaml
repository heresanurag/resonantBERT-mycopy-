  The set is interrupted twice, however. At first, Swift pauses so a fan can receive medical attention. Then, midway through I Know Places, she appears to need a medic herself. “I have done a million shows on this tour and my hand has never decided to just like... It’s forming a claw!” But after massaging her palm for a few seconds she is, thankfully, able to resume. It’s a tiny stumble, but one that focuses fans’ attention – a commodity that ebbs and flows throughout the concert. There’s a definite lull during the downbeat new material from The Tortured Poets Department, and the atmosphere is more attentive than excited during the Folklore / Evermore era.

  But the show is structured in such a way that you’re never far from a hearty singalong (best bit: Everyone chaotically trying to hit the high notes I Knew You Were Trouble) and the Eras conceit allows fans who’ve joined at different stages of Swift’s career to each have their moment. The jumbled chronology evades anything as simple as a narrative arc – but by presenting 20 years of diary deriven hits, Swift is making a sweeping statement about young adulthood. Her songs contain everything: Growing pains, political awakenings, strained friendships, broken hearts, self-realisation, self-reliance, re-invention and, ultimately, survival. She ends with Karma - a weird and funny entry in her catalogue. It’s an ode to former enemies, whose downfall she watches with a cat purring on her lap, like some sort of pop star Bond villain. But the song also has a valedictory air that makes it an apt concert closer. Success, Swift sings, is just reward for her determination and perseverance, no matter what life throws at her. “Ask me what I learned from all those years / Ask me what I earned from all those tears. “Ask me why so many fade, but I'm still here / I'm still here, I'm still here.” The question, then, is where she goes next? Taylor Swift is an artist at the peak of her imperial phase. There are few ways to top a world tour that's demolished box office records and become a cultural phenomenon. Some lyrics on her latest album hint she’s ready for a new challenge - but, for now, she can still make the whole stage shimmer.

