  As Swift sings Cardigan, she spots something happening to the left of the stage. “I’m pretty sure I just saw someone get engaged!” she announces in delight. “I normally never get to see that because it’s dark [on stage] but it’s not right now, so congratulations!” “Man, that’s amazing. Thanks for doing that at my concert. It’s a big moment.”

  The show is studded with little moments like this. During 22, Swift chooses a young fan from the audience and presents her with the hat she's been wearing. On We Are Never Ever Getting Back Together, she hands the mic to a backing dancer who emphasises her answer with a cheeky Scottish “nae chance”. And while introducing the song Betty, Swift claims the Scottish highlands inspired her lockdown companion albums, Folklore and Evermore. “There was so much TV, so much white wine, [I was] covered in cat hair,” she explained. “That was my reality. So I thought, ‘I’m going to create an imaginary world and escape into it’. This foresty, mossy, beautiful, natural world which I now realise is probably just based on videos I’ve seen online of Scotland.” Needless to say, this gets one of the biggest cheers of the night... and her comments are instantly picked up by Scotland’s national newspapers.

  Swift is a master at this. Even as she approaches the 100th show of this mammoth tour, she is still creating new moments to keep the conversation circulating. Even fans who tune into livestreams of every concert are given something fresh to discuss, as the singer constantly updates her outfits and switches up her setlist. Key to this is the much-anticipated acoustic set, which comes towards the end of every show, and features two or more "exclusive" tracks. For Scotland, Swift crammed in four songs: A mash-up of Would’ve, Could’ve, Should’ve and I Know Places; and a medley of ‘Tis The Damn Season and Daylight.

