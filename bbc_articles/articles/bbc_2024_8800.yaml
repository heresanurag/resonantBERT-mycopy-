content: |-
  The two leaders discuss defence and security cooperation between Germany and the UK.

  Welcome to our live coverage of UK Prime Minister Rishi Sunak's press conference with the German Chancellor Olaf Scholz.

  They are in Berlin, Germany, and are expected to discuss security, trade and shared issues like illegal migration.

  We won't be providing text updates, but press the Play button at the top of the page to watch the live stream.
