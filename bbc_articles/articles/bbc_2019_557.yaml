id: bbc_2019_557
title: 'Rory Stewart: Brexit red lines ''could shift'' - BBC News'
date: '2019-01-18'
section: General
url: http://www.bbc.co.uk/news/uk-politics-46913484
content: |-
  Rory Stewart suggests there could be some movement from the PM in Brexit talks with other parties.

  Tory MP Rory Stewart suggested there could be some give and take for the PM when it comes to Brexit talks with other parties.

  Speaking on BBC Question Time, the prisons minister said if other parties were "serious" about wanting a deal "then of course we can shift red lines".
