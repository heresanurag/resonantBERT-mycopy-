title: 'Oroville Dam: Aerials show damaged overspill - BBC News'
date: '2017-02-14'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38961400
content: |-
  Water gushes down a damaged overspill at the country's highest dam, where 180,000 people have been evacuated.

  More than 180,000 people in northern California have been told to evacuate after two overflow channels at the US's tallest dam were found to be damaged.

  The 770ft (230m) high Oroville Dam is not itself at risk of collapsing, but its emergency spillway was close to caving in, officials said.

  The excess water has now stopped flowing.
