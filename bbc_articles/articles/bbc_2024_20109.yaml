content: |-
  Labour scraps the ex-PM's 'VIP helicopter service', saying it was a waste of public money.

  Rishi Sunak used government-funded helicopters on several occasions to travel across the UK during his time as PM

  The prime minister has scrapped a government helicopter contract - thought to be worth £40m. Rishi Sunak was criticised for his use of helicopters during his time in No 10. The contract was set to be renewed, but is now being scrapped by Downing Street and the Ministry of Defence. It is designed to illustrate a break with the previous administration - ahead of a speech in which the prime minister will argue things will not be "business as usual" when parliament returns next week.

  Rishi Sunak used RAF jets and helicopters for domestic flights more frequently than the UK's previous three prime ministers, a BBC investigation found in 2023. Speaking about the cancellation, a Labour source said that the "Tories' VIP helicopter service" was a "grossly wasteful" symbol of their government that was "totally out of touch with the problems facing the rest of the country". "It's only right that this service is brought to an end," the source added, claiming that the government is "getting a grip of the public finances." They said: "It tells you everything that, on top of the £22 billion black hole that the Tories were blowing in the public finances, Rishi Sunak's priority was keeping his VIP helicopter service. While in opposition Labour frequently attacked Mr Sunak for his use of domestic flights. Last month, Conservative MP John Glen asked, external the new Labour government if it was planning to reduce the number of domestic flights taken by minister. In response Cabinet Office minster Ellie Reeves did not say if the number would be cut back but said travel plans would be “decided with consideration of the best use of a minister’s time and in the interests of the taxpayer”. Using domestic flights allowed ministers to "visit more parts of the United Kingdom" and reduced the need for overnight accommodation, she added. Former defence secretary Ben Wallace accused the new Labour government of "dishonesty," adding that he had decided not to renew the contract "a year ago" and it was "never going to happen". However, the leader of the RAF squadron that operates the helicopter has said Mr Wallace's decision was subsequently reversed under Mr Wallace's successor as defence secretary Grant Shapps, at the request of Mr Sunak. An advert on the government website for a five-year renewal of the contract was live until around a month ago, at which point it was replaced with a withdrawal notice, external. Meanwhile, the government has also restarted the recruitment process for a new national security adviser. Rishi Sunak had appointed General Gwyn Jenkins to take up the role, replacing Sir Tim Barrow. But it is understood Downing Street has now taken the decision to cancel the appointment and restart the process. A source emphasised General Jenkins would still be able to apply.
