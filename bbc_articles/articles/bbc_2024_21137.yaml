title: Kent councillor Ricky Jones arrested over counter-protest remarks - BBC News
date: '2024-08-08'
section: Kent
url: http://www.bbc.co.uk/news/articles/cz074vyvjzvo
content: |-
  Labour says the behaviour is "completely unacceptable and it will not be tolerated".

  Ricky Jones has been a councillor in Dartford since 2019

  Suspended Labour councillor Ricky Jones has been arrested on suspicion of encouraging murder after comments at a London counter-protest. Videos had emerged online reportedly showing Mr Jones telling a crowd in Walthamstow that far right demonstrators needed to have their throats cut. A Labour spokesperson said: “This behaviour is completely unacceptable and it will not be tolerated." Mr Jones, and Dartford's newly elected Labour MP Jim Dickson, have been approached for comment.

  On Thursday, the Metropolitan Police said a man in his 50s had been arrested in south east London on suspicion of encouraging murder and for an offence under the Public Order Act. He remains in custody. In video that has circulated on social media, a man at the rally was filmed apparently saying: “They are disgusting Nazi fascists and we need to cut all their throats and get rid of them all.” Reform leader Nigel Farage had called on X for Dartford councillor Mr Jones to be arrested. Mr Jones, who has represented the Princes ward since 2019, will be unable to sit on the Labour benches at Dartford Borough Council meetings.
