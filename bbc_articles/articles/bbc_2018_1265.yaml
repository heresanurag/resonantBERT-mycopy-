title: 'Dolores O''Riordan: Funeral arranged for next week - BBC News'
date: '2018-01-20'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-42747970
content: |-
  A private Requiem Mass will be celebrated for The Cranberries singer in County Limerick on Tuesday.

  Tests are being carried out to determine O'Riordan's cause of death

  The funeral of The Cranberries singer Dolores O'Riordan will take place in Ireland next week.

  A private Requiem Mass will be said at the Church of St Ailbe in Ballybricken, Co Limerick, on Tuesday, followed by a burial attended only by family.

  Earlier on Friday, an inquest into O'Riordan's death was opened and adjourned until 3 April while the coroner awaits the results of tests.

  O'Riordan, 46, was found dead in a London hotel on Monday.

  She had been in the city for a recording session. Police are not treating the death as suspicious.

  There will be a public reposal this Sunday, 21 January, at St Joseph's Church in Limerick, from 12:30 to 16:00 GMT.

  Canon Liam McNamara, a close friend of the O'Riordan family, will act as chief celebrant of the Requiem Mass, which will begin at 11:30 on Tuesday.

  The funeral will be "strictly reserved for extended family and close friends".

  Originally from Limerick, the musician rose to fame in the 1990s when The Cranberries enjoyed global success with hits including Dreams, Zombie and Linger.

  Their 1993 debut album Everybody Else Is Doing It, So Why Can't We? has sold more than 40 million records worldwide.

  O'Riordan and her former husband Don Burton had three children together.

