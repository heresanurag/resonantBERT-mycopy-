title: 'Champions Trophy 2025: England captain Jos Buttler admits future as skipper
  on the line - BBC Sport'
date: '2025-02-25'
section: Cricket
url: http://www.bbc.co.uk/sport/cricket/articles/cly8782n8x3o
content: |-
  England captain Jos Buttler admits his future as captain may be on the line against Afghanistan in the Champions Trophy, but will continue to focus on the positives.

  Jos Buttler has won 12 of 33 ODIs since being named England's permanent white-ball captain

  England captain Jos Buttler says his future as skipper may be on the line against Afghanistan in the Champions Trophy. England know they must win the Group B match in Lahore on Wednesday to avoid being eliminated from the competition. Were they to go out it would be a third disappointing white-ball tournament in a row under Buttler after their failed defences of the 50 and 20-over World Cups in 2023 and 2024 respectively. Asked if the stakes were high for his future after the poor run, Buttler said: "Yes, absolutely. "Any time as an England captain, you want to perform well and you want to lead your team to winning games of cricket. "We haven't been doing that enough in the recent past." Despite the pressure on him, batter Buttler, who took over as white-ball captain after Eoin Morgan retired in 2022, said he will continue to focus on the positives. "As soon as you catch yourself thinking about any negative things, you just try and completely forget that and focus on all of the positive things that could go right and where you can take the team," he said. "I'm very much focused on that." Buttler confirmed the only change to England's XI is Jamie Overton replacing injured fellow fast bowler Brydon Carse.

  England's poor form has not only been in major white-ball events. Defeat by Australia in their group opener - when they scored 351-8 but lost by five wickets - was their 11th in 15 one-day internationals since the 2023 World Cup and fifth in a row. They have also lost their past four bilateral series, although Buttler was injured for two of those. Australia's washout against South Africa means England will be guaranteed to progress to the semi-finals if they beat Afghanistan and the Proteas. Barring more rain affecting results in the group, defeat in either game will eliminate them. "We need to make sure we build on the things we did well the other day, try and execute a little better in certain areas as well," Buttler told BBC Sport. "Scoring 350 is a great effort and we probably left a few out there, which is a nice sign for the batting unit. "With the ball we did a lot of things right but we could have just been a bit more consistent to build the scoreboard pressure." The match will be played at the same ground as England's defeat by Australia, albeit on a fresh pitch. In recent days, England players have suggested the dew had a significant impact on that match, making conditions easier for batting during Australia's chase - with the advantage possibly worth as many as 60 runs. Dew usually hampers spinners, who are unable to get as much turn from the damp surface, or grip a wet ball. Afghanistan have a fearsome spin attack, including world-class leg-spinner Rashid Khan. "They are a stiff challenge but we like focus on that and be really well prepared and focus on ourselves individually and collectively performing to the best of our ability to win the game," said Buttler.
