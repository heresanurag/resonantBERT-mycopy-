content: |-
  Overnight storms in Georgia delay Monday's practice round at Augusta National at the start of Masters week.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Monday's practice round for this week's Masters was ruined by stormy weather in Augusta. A little more than three hours of practice were possible before the course was evacuated of players and patrons at 11:25 local time (16:25 BST) because of the threat of electrical storms. Augusta National released a statement at 14:55 (19:55 BST) to say the course would remain closed to patrons for the rest of the day. And the players did not get back out on the course either with heavy rain and the threat of thunderstorms continuing into the evening. Tuesday's weather is expected to be sunny with little chance of rain and that positive forecast continues throughout the rest of the week - apart from Friday, when there could be some showers.

  There are hundreds of houses in a similar state across the city of Augusta

  The whole of Georgia, and many surrounding states in the US, is still recovering from the effects of Hurricane Helene last September, which left hundreds dead or missing and caused billions of dollars worth of damage. There were 37 reported deaths in Georgia, many of those as the result of falling trees. Roadsides are still populated by fallen trees; oaks, ash and giant pines. Long-established homes bear scars of severe roof damage, much of it protected only by flimsy tarpaulins. Augusta National immediately donated $5m towards the local relief operation. It was a natural disaster that brought together a community which otherwise only comes into the spotlight in the second week of April. The famed course was hammered. Trees came down in their hundreds, damaging one of golf's most famous greens on the par-three 16th. Walking the course now is a lighter, less claustrophobic experience. You can now see through wooded areas that previously screened individual holes and made them their own isolated stations. Now, the separation of the ninth and first fairways is less cluttered. Coming down the 11th it is possible to see into the course at neighbouring Augusta Country Club. The wooded area to the right of the newly laid 16th green has been denuded, which means there will be fewer shadows on the putting surface when the world's best golfers begin their challenge for the famous Green Jacket on Thursday.
