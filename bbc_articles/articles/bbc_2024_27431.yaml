title: Child killed by falling tree branch in Surrey - BBC News
date: '2024-11-10'
section: Surrey
url: http://www.bbc.co.uk/news/articles/c1lg8jj9dyjo
content: |-
  Emergency services were called to Banstead, Surrey, just after 16:00 BST on Saturday.

  Emergency services were called to Grove Place in Banstead

  A child has died after being hit by a falling tree branch in Surrey, the Met Police has said. Emergency services were called to Grove Place in Banstead shortly after 16:00 BST on Saturday, and police officers attended along with London Fire Brigade and Ambulance Service. The incident is not believed to be suspicious, but inquiries to establish the circumstances are ongoing. The age of the child is not known, and officers are in the process of ensuring all family members have been informed, a police spokesperson said.

  London Fire Brigade (LFB) said they arrived to the scene following reports a child was trapped by part of a fallen tree. They worked with paramedics from London Ambulance Service and a fire engine crew from Surrey Fire and Rescue to coordinate a rescue operation. "Despite the despite the effort of emergency service personnel in attendance, the child was declared dead at the scene," said LFB Assistant Commissioner Pat Goulbourne. "The thoughts of our crews and staff across the entire Brigade are with the child's family at this difficult time." A report will be prepared for the coroner in due course, police added.

