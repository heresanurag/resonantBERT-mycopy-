  Many of the visitors who arrive at Collector's Cardhouse come with large binders tucked under their arms filled with cards they stashed away in their childhood. Many of these collections are, unfortunately, not worth anything. If, however, PokiChloe does deem a card valuable, it then has to be "graded". The process involves sending the card to a grading company who analyse it for signs of wear and then award it a graded score, usually out of 10, which denotes its quality and potential value. PokiChloe compared those cards that get a 10 to "gold dust". "It has to be completely clean," she says. "There can't be scratches on the holographic part, there can't be any whitening or damage on the back, it can't be creased. It has to be perfect like it's never been touched before. "We had a Charizard that was graded a 10. It was a special card that was given out to employees at Creatures, who own Pokémon. I think there's only 300 of them and we had a 10 and we sold it for just under £40,000."

  Chloe Webb is invited to card events around the world

  Mrs Webb said a common misunderstanding is that a card has to be old to be valuable. "There are packs that you could open today from the shop that cost you about £30," she says. "If you got the best card in the set and it was graded a 10, you'd be looking at a couple of thousand. "And they're cards that only came out a few years ago. So they're not even what we would call vintage. They're modern cards." A graded card, regardless of how damaged it is, is sealed in plastic to preserve its condition. Mrs Webb said: "We get people that send off cards that aren't in good condition. They just want to encapsulate it and keep it as a memory. So that's quite nice to see. "I know the money is a big part of it and obviously people are blown away by the prices, but for some people it's about the memories, the nostalgia and just having some memories from when they were kids."

  It's not just older Pokémon cards that have worth, those from newer packs can also fetch big prices

  Next year Pokémon is celebrating its 30th anniversary. PokiChloe has ambitious plans for the future of Collector's Cardhouse. "I want to keep this growing," she says. "If you'd asked me about this five years ago I wouldn't have believed it. I used to work in an office, I had a very normal job before this, and now this is my life... So, as long as people enjoy it, I'm going to keep doing it."

  Although most of the shop's stock is Pokémon related, it also sells other types of collectable cards such as Dragon Ball, One Piece and Digimon

