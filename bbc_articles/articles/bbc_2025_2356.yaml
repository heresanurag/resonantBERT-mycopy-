content: |-
  Chloe Webb now runs a specialist store - and travels the world buying and selling Pokémon cards.

  'I quit my job to live and breathe Pokémon cards'

  Youtuber and business owner Chloe Webb - aka PokiChloe - has travelled the world buying and selling Pokémon cards

  Chloe Webb was explaining how she recently sold a Pokémon card in her shop for £40,000 when a young boy and his dad politely interrupted to ask for her autograph. Ever since the 31-year-old quit her office job and opened Collector's Cardhouse in the picturesque Hertfordshire village of Chorleywood in April, it has become a destination for fans around the world. "Every week we have an international visitor - Japan, America, United Arab Emirates - I've made so many friends all over the world, which is crazy to me because I never used to leave my little bubble when I had a normal job," she says.

  "I've travelled everywhere around the world, made lifelong friends," she adds. "It has completely transformed every part of my life and I've got a really successful business now because of it."

  Pokémon card value is set by the rarity, popularity and condition of the card

  The Japanese franchise started life in 1996 on the Nintendo Game Boy, with players having to catch, train and battle virtual monsters called Pokémon. When it arrived on UK shores in 1999, it had evolved. There was an animated series and packets of trading cards were available at most newsagents across the country. That's when Mrs Webb, from Watford, became a fan. She began a business with her husband, Harry, selling the cards online just before the pandemic. During lockdown, it "really blew up".

  Mrs Webb started making YouTube videos under the name "PokiChloe" to reach new fans. The couple joined forces with another Youtuber, Dean Leander - AKA PokeDean - to open a physical business. Today her Youtube channel, which mostly shows daily life in her Chorleywood shop, has more than 118,000 subscribers.

  Collectors from around the world buy and sell cards at the Hertfordshire shop

  In recent years, Pokémon cards have become valuable collectors' items and many shop visitors hope they too could be sitting on a gold mine. Last year, a Nottinghamshire man made £55,000 when he sold a collection of cards from the 1990s and 2000s. But a collector from Suffolk failed to sell his fourth print Charizard card when it did not reach its reserve of £8,000. Mrs Webb explained: "It could be anything that makes a card collectable. "It could be that they're rare... It could be that it's a really popular Pokémon. "Sometimes overnight prices change on cards and I can't tell you why that card is now valuable."

  On her YouTube channel PokiChloe documents daily life in the shop

  Sometimes cards worth up to £100,000 have been brought into the shop, although PokiChloe admits the big sums no longer surprise her. "It's going to sound really awful: I'm very used to it now," she says. "It is very surreal to think that this little bit of cardboard is worth that sort of money because to some people that's a deposit for a house - that could buy them two or three cars. "But with what we do now we're exposed to it. Often it's just another day and another Pokémon card."

