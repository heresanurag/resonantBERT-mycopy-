title: Government 'has no plan' for Northern Ireland - Sinn Féin - BBC News
date: '2018-02-21'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-43133707
content: |-
  Sinn Féin's president says 'doing nothing is not an option' after power-sharing talks broke down.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The government "does not have a viable plan" to deal with the political stalemate in Northern Ireland, Sinn Féin's president has said.

  Mary Lou McDonald said she feared "entrenchment and drift" in efforts to restore the executive, which collapsed 13 months ago.

  PM Theresa May has held talks with Sinn Féin and the DUP at Westminster.

  In an interview with the BBC's political editor Laura Kuenssberg, Ms McDonald accused Mrs May of "facilitating the DUP blocking" the restoration of power-sharing.

  "I believe whether intentionally or not, Theresa May is actually facilitating the DUP blocking advancement and resolution on these core issues," she said.

  Mrs May has emphasised that her government remains committed to doing all it can to restore devolution.

  At a press conference outside Westminster earlier, the Sinn Féin president said: "We can only surmise from our meeting with the British prime minister that the government doesn't have a viable plan for carving a pathway for the restoration of the institutions.

  "We're disappointed that the government seems wedded to what they are calling 'a reflection period',"

  Ms McDonald added that her party called for the "reconvening of the inter-governmental conference as per the Good Friday Agreement" - the 1998 deal which brought an end to the Troubles in Northern Ireland.

  "We tried to impress upon the prime minister and secretary of state that standing still and doing nothing is simply not an option," she said.

  "Just because the DUP have crashed the bus, does not mean that everyone has to sit at home now and cross their fingers and hope against hope that things will improve and that these issues will be resolved."

  Nigel Dodds and Arlene Foster said the DUP was not contemplating introducing an Irish language act in Northern Ireland

  Following the DUP's meeting, Arlene Foster said she was hopeful a new budget would be in place for Northern Ireland "within weeks".

  "The people of Northern Ireland deserve to have a budget in place as soon as possible," she said.

  Her party colleague, MP Nigel Dodds added that the party "want to see devolved government" reinstated.

  "In the absence of the devolution that we all want, we can't continue to have Northern Ireland left in limbo as it has been in the last 13 months," he said.

  "We simply want a commonsense interim position, whereby ministers are taking decisions, budgets are being set, whilst we continue to work through the issues."

