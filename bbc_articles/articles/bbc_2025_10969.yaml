title: James Rew replaces injured Jordan Cox in England squad for Zimbabwe Test -
  BBC Sport
date: '2025-05-08'
section: England
url: http://www.bbc.co.uk/sport/cricket/articles/cd90dnej854o
content: |-
  Somerset batter James Rew replaces the injured Jordan Cox in the England squad for their Test against Zimbabwe later this month.

  James Rew scored 152 for Somerset in a County Championship draw against Worcestershire in April

  Uncapped Somerset batter James Rew has replaced the injured Jordan Cox in the England squad for their one-off Test against Zimbabwe later this month. The 21-year-old has been in fine form in the County Championship so far this season, averaging 54.21 with a top score of 152. He was part of the England Under-19 squad that reached the U19 World Cup final in 2022, and toured Australia with England Lions last winter. Rew will link up with the squad for a training camp next week in preparation for the first Test of the summer, which begins on 22 May at Trent Bridge. Cox, 24, was injured while scoring a century in Essex's County Championship defeat by Somerset on Sunday.

  The right-hander was realistically in England's squad for the four-day Test as a spare batter, but the injury is a cruel blow. He was set to make his Test debut last November in New Zealand but broke a thumb in practice before the first Test. Cox has been in good form for Essex this season, scoring 82 against Nottinghamshire and 117 against Surrey before retiring hurt while on 103 against Somerset. Zimbabwe's last Test in the UK was in 2003, a series famous for the Test debut of James Anderson, England's all-time leading wicket-taker. England's five-Test series against India begins on 20 June at Headingley. Highlights of all England's home international cricket and live coverage of The Hundred will be across BBC TV, iPlayer and the BBC Sport website, beginning with England women's T20 international against West Indies on 21 May.
