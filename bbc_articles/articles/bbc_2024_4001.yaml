title: 'Watch: I''m just... Slash?! Ryan Gosling brings the Kenergy - BBC News'
date: '2024-03-12'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-68531110
content: |-
  The actor steals the show in his live performance with the Guns N' Roses rock legend.

  Ryan Gosling showed he's more than "Kenough" when he performed with Mark Ronson and rock legend Slash and at the Oscars on Sunday night.

  Gosling got a standing ovation during his "Kenergetic" performance in front of his castmates and director Greta Gerwig.

  The song, I'm Just Ken, from Barbie, was nominated for best original song.

  Spoiler alert: It didn't win the Oscar but Gosling and co. will be pleased that another song from the Barbie film did, with pop star Billie Eilish picking up the top prize for her song, What Was I Made For?
