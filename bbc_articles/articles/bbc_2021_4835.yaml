title: 'Covid-19: NI ministers agree plan to ease restrictions - BBC News'
date: '2021-04-15'
section: Northern Ireland
url: http://www.bbc.co.uk/news/live/uk-northern-ireland-56759989
content: |-
  Reopening dates were announced at Stormont following a meeting of the executive.

  'There will be new variants' of the virus

  Pam Cameron is the deputy chair of the health committee and wants to know if there’s been any agreement on a passenger locator form for those travelling to NI from the Republic of Ireland. That’s something that hasn’t yet been resolved, says Arlene Foster. The first minister adds that earlier today, the chief scientific adviser outlined the possible outcomes and spread of the virus in the six months at the executive. “From what we’ve seen there will be new variants unfortunately” of Covid-19, says Mrs Foster. Is the test, trace and protect system able to cope with the “increased burden” that PCR testing of all contacts of a positive case will place on the system, asks DUP MLA Ms Cameron. Michelle O’Neill says the system “needs to be 100% perfect” and “actively finding cases and dealing with them head on”. The deputy first minister adds that “we need to try and avoid” another circuit of lockdown.
