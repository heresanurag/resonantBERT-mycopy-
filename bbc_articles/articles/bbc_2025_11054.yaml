title: Putin leads Victory Day celebration in Moscow under tight security - BBC News
date: '2025-05-09'
section: Europe
url: http://www.bbc.co.uk/news/articles/cly3807exyno
content: |-
  Putin used his speech to tie Russia's three-year war in Ukraine to the war against Nazi Germany 80 years ago.

  To play this video you need to enable JavaScript in your browser. This video can not be played The BBC's Vitaly Shevchenko looks at three things we learned from Putin's Red Square parade

  Vladimir Putin has led Russia's Victory Day commemorations with a parade in Red Square and heightened security after days of Ukrainian strikes targeting the capital. China's Xi Jinping joined Putin as the Russian president told thousands of soldiers and more than 20 international leaders that Russia remembered the lessons of World War Two. Putin used his speech to tie the war to today's full-scale invasion of Ukraine, and said all of Russia was behind what he called the "special military operation" - now well into its fourth year. For the first time, a column of trucks carrying various combat drones took part in the Victory Day parade, apparently because of their widescale use in Ukraine.

  A unilateral, three-day ceasefire was announced by Russia to coincide with the lavish 80th anniversary event, which Ukraine rejected as a "theatrical show". Kyiv has labelled the truce as a farce, accusing Russia of launching thousands of attacks since it came into force at midnight on Wednesday. Russia says it has observed the ceasefire and accuses Ukraine of hundreds of violations. Germany's new chancellor, Friedrich Merz, said he had high hopes that a full ceasefire could be agreed as soon as this weekend. Russia's three-day truce is set to end on Saturday night, but Merz said it could be extended to 30 days and the "ball is now entirely in Moscow's court". Heavy security and restrictions were in place in the centre of Moscow on Friday as Russia marked the Soviet Union's victory over Nazi Germany.

  Before Putin's address and a one-minute silence, the commander of ground troops, Oleg Salyukov, led 11,000 troops into Red Square, including some 1,500 who had fought in Ukraine. They were then inspected by Defence Minister Andrei Belousov. Putin insisted that Russia "was and will be an indestructible barrier against Nazism, Russophobia, antisemitism". The Russian leader has repeatedly and falsely referred to Ukraine's leadership as Nazis. "Truth and justice are on our side," he said, insisting that "the "entire country, society and people support the participants" of the Ukraine war. Russia said 27 world leaders were attending the event, but it was the presence of China's leader, alongside Putin and more than 100 Chinese soldiers marching on Red Square, that stood out. China's Xi Jinping had pride of place, sporting an orange and black St George ribbon, which Russia sees as a symbol of military glory but which has been banned by several neighbouring countries. Russian state TV spoke of relations between the two countries as being at their highest-ever level, united against the "collective West". Russia's pivot to the east was underlined by military contingents from North Korea, Vietnam and Mongolia, although the North Koreans did not march during the parade. Thousands of North Koreans have fought against Ukrainian forces in Russia's Kursk region and Putin made a point of personally greeting some of them on Red Square. He hugged three-star general Kim Yong-bok, considered the commander of North Korean forces deployed in Russia as well as deputy chief of the army's general staff. North Korea's Kim Jong Un visited the Russian embassy in Pyongyang to highlight his country's increasing ties with Moscow.

  Brazil's Luiz Inácio Lula da Silva and Venezuelan President Nicolas Maduro were among the assembled guests, along with Serbian President Aleksandar Vucic and Robert Fico, Slovakia's prime minister, who is the only European Union leader to travel to Moscow. EU foreign policy chief Kaja Kallas had earlier made clear that leaders of EU member states and countries aspiring to join the union should not take part in the event because of Russia's war in Ukraine. Serbia is an EU candidate country and Vucic said he expected he would face consequences because of his decision to go.

  Members of the Chinese army took part in the parade

  For Putin, the attendance of China's Xi on Victory Day is seen as a significant achievement, and he praised the "courageous people of China" as he paid tribute to Russia's allies in World War Two. Although Chinese forces played a prominent role in fighting against Japan, the government in Taiwan said Beijing and Moscow had distorted history. Taiwan said Chinese communist forces had made "no substantial contribution" in the war, unlike China's then republican government, which later fled to Taiwan. Putin and Xi held two rounds of talks before the parade as well as an informal chat on the war in Ukraine, Chinese reports said. Joining the parade was a wide variety of Russian military hardware, including Yars missile systems, tanks and armoured personnel carriers. Six Su-25 military jets then flew over Red Square to complete the parade.

