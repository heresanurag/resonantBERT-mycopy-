  Ukraine's Volodymyr Zelensky had earlier warned that he could not guarantee the safety of anyone attending the event and has urged heads of state not to travel to Moscow. Mykhailo Samus, a Ukrainian military analyst and director of the New Geopolitics Research Network, told the BBC he believed that Ukraine would forego attacking the parade, largely because of the presence of foreign leaders. But should Ukraine choose to do so, it would constitute a legitimate military target, Mr Samus said. During his evening address on Thursday, Zelensky said that Ukraine was "ready for a full ceasefire starting right now". "But it must be real," he said in a video on X. "No missile or drone strikes, no hundreds of assaults on the front." He called on Russia to support the ceasefire and "prove their willingness to end the war". Ukraine has accused Russia of violating its own truce thousands of times since it was supposed to come into effect on Wednesday night. On the second day of the truce, Ukraine said there had been nearly 200 clashes along the front line, eighteen Russian air strikes and almost four thousand instances of shelling by Russian troops. In Prymorske, a village in the Zaporizhzhia region, a woman was reportedly killed after a Russian drone struck her car. Russia's defence ministry has said that all groups of Russian forces in Ukraine "completely ceased combat operations and remained on the previously occupied lines and positions". However, they were reacting in a "mirror-like manner" to violations by Ukrainian forces. Zelensky has repeatedly dismissed Putin's proposal as a "game" and called for a longer truce of at least 30 days, something that is supported by Ukraine's allies in Europe and the US. He said he had spoken with US President Donald Trump to reiterate his readiness for a "long and lasting peace" and talks "in any format". He said he had told Trump that a 30-day ceasefire was a "real indicator" of moving towards peace. Writing on his social media platform Truth Social on Thursday, the US president reiterated the call for an unconditional ceasefire and warned of further sanctions for any party failing to sign up to it.
