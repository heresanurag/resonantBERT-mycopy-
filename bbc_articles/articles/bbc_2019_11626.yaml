title: 'Chile protests: Clashes in Santiago as unrest continues - BBC News'
date: '2019-10-21'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-50119654
content: |-
  Demonstrators in the Chilean capital clash with security forces as a wave of protests continues.

  Protesters have clashed with security forces in Chile's capital Santiago as violent demonstrations continued for a third day across the country.

  At least seven people have died in the unrest, sparked by a now suspended metro fare hike. Residents are now venting their discontent over the high cost of living and inequality in one of Latin America's most stable countries.
