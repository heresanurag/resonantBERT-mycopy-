title: Cornwall nail art project helps addicts in recovery - BBC News
date: '2018-02-03'
section: General
url: http://www.bbc.co.uk/news/uk-england-cornwall-42878601
content: |-
  A nail art project is improving recovering addicts' self esteem and motivating them with mini messages.

  A nail art project is helping women in their recovery from drug addiction.

  Nail Exchange, a social enterprise in Cornwall funded by a grant from support group Unltd, is designed to improve women's self esteem and motivate them with messages on their nails.
