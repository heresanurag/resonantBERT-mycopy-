  David Lammy says the UK "a shared military and intelligence interest" with the US in the territory.

  Chagos deal will not go ahead if Trump rejects it - Lammy

  The Chagos Islands deal will not go forward without the support of US President Donald Trump, the foreign secretary has said. David Lammy told ITV's Peston programme, the UK had "a shared military and intelligence interest" with the US "and of course they've got to be happy with the deal or there is no deal". The UK is in talks with Mauritius about handing over the territory but continuing to lease one of the islands, Diego Garcia, which contains a UK-US military airbase. However, progress has been delayed to allow the new US administration to look at the details of the deal.

  It comes as Prime Minister Sir Keir Starmer heads to Washington for talks with Trump, where the focus is expected to be on the Ukraine war. Asked if Trump had a veto on the Chagos deal, Lammy, who is also in the US for the visit, told ITV: "If President Trump doesn't like the deal, the deal will not go forward and the reason for that is because we have a shared military and intelligence interest with the United States and of course they've got to be happy with the deal or there is no deal." The foreign secretary added that he still believed "it's the best deal". Earlier this month Mauritian Prime Minister Navin Ramgoolam said US representatives would be present in negotiations over the islands.

  The plan to cede sovereignty of the archipelago, known officially as the British Indian Ocean Territory, was announced last October after a deal was reached with former Mauritian leader Pravind Jugnauth. But he was swept from power in a general election a month later, and Ramgoolam has criticised the deal negotiated by his predecessor. The agreement has also been mired in uncertainty after Trump's re-election as US president, given several US Republicans have argued it could deliver a potential security boost to China.

  Earlier, Sir Keir faced questions over whether the money to pay Mauritius for leasing back the military base would come out of the increase in defence spending announced on Tuesday. Pressed over the issue by Conservative leader Kemi Badenoch during Prime Minister's Questions, Sir Keir refused to say directly whether this would be the case. He told the Commons the hike in defence spending was "for our capability on defence and security in Europe". The PM added that the Chagos deal was "extremely important for our security" and the details and cost would be put before MPs when finalised. The UK government has never confirmed the estimated cost of payments under the deal, but there have been reports of a figure ranging from £9bn to £18bn. Sir Keir said "the figures being bandied around are absolutely wide of the mark".

  Mauritius, a former British colony, has long argued that it was illegally forced to give the Chagos Islands away in return for its own independence in 1968. The UK has come under increasing international pressure to hand over control of the archipelago after various United Nations bodies, including its top court and general assembly, sided with Mauritian sovereignty claims in recent years. The previous Conservative government opened negotiations over their legal status in late 2022, but has attacked the agreement struck by Labour.

