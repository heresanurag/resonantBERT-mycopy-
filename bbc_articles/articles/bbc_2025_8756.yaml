content: |-
  Owen Lawrence, who lived in Headingley, died two days after the attack on two women, inquest hears.

  Owen Lawrence died on 28 April, two days following the attack in Headingley

  A 38-year-old man suspected of attacking two women with a crossbow in Leeds died of a self-inflicted gunshot to the head, an inquest has heard. Owen Lawrence died at Leeds General Infirmary on 28 April, two days after the women, aged 19 and 31, suffered serious injuries in Headingley, along the route of the Otley Run pub crawl. An inquest into Mr Lawrence's death, which opened at Wakefield Coroner's Court on Monday, was told the suspect was born Owen Lawrence Eames, before changing his name by deed poll. He lived on Wood Lane in Headingley and was registered disabled at the time of his death.

  Mr Lawrence's fatal injuries were caused by an airgun, it was said. The inquest was adjourned to a later date yet to be fixed to allow for a full investigation to be completed, area coroner Oliver Longstaff said. Noting that Mr Lawrence's death had "already attracted a deal of media and public attention", Mr Longstaff concluded the hearing by urging people to "refrain from speculation" before the inquest resumes.

  The attack happened on Otley Road in Headingley on 26 April

  The 19-year-old woman injured in the attack had to undergo emergency surgery following the incident. Both women were subsequently discharged from hospital. The attack took place while people were taking part in the Otley Run, a pub crawl popular with students, which features about 19 pubs stretching from Headingley to the centre of Leeds. There have since been calls for the crawl to be made safer, as well for tighter restrictions on the purchase of crossbows.

