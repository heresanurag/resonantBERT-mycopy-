title: 'Ellie Downie: Gymnast announces retirement at 23 after her mental health ''was
  taking a beating'' - BBC Sport'
date: '2023-01-24'
section: Gymnastics
url: http://www.bbc.co.uk/sport/gymnastics/64370363
content: |-
  Great Britain's Ellie Downie has announced her retirement from gymnastics at the age of 23.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'I had to put myself first and be happy' - Ellie Downie on retiring age 23

  Great Britain's Ellie Downie has said she chose to retire from gymnastics because her mental health "was taking a beating". Downie, 23, announced her retirement with a statement on social media on Monday. Downie won 12 medals during her senior career, including a historic all-round European Championship gold in 2017. "It wasn't the sport itself, I still very much love gymnastics," Downie told BBC Sport's Laura Scott. "I want to stay within realms of it, but it was how people were treating me." In 2020, Downie and her sister Becky spoke out about abusive behaviour in British Gymnastics, saying it was "ingrained" and "completely normalised". Last year, the Whyte Review found systemic abuse in the sport in Britain, but Downie says speaking out hindered her further selection. "At the time I was pretty confident to [speak out]," she said. "Ultimately it did really hinder us a lot, we both didn't make the Tokyo Games. But I really wanted to make a positive change. "When I got to the last trial [before Tokyo], I decided to pull out. But the whole scenario around it, no-one came up to me, I sat on the bench crying, the coaches ignored me. "I went home without anyone speaking to me before I left, - that was absolutely heart-breaking."

