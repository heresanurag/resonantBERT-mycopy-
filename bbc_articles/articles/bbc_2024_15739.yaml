  When Seamus Coleman returns to Sligo Rovers’ Showgrounds stadium on Friday, the Everton full-back will have come full circle.

  'We have to believe the future is bright for Everton'

  Seamus Coleman's £60,000 transfer fee means he has cost the club £142 a game

  When Seamus Coleman returns to Sligo Rovers' Showgrounds stadium on Friday, the Everton full-back will have come full circle. Having left for England in 2009 as a timid 20-year-old, Coleman heads back home 15 years later after growing into a leader of men. Sean Dyche's side play their first pre-season friendly against the League of Ireland club following a five-day training camp just outside of Dublin. "It is very special," says Coleman. "When I left Sligo Rovers to go to Everton, I was a young, shy, reserved player, way out of my depth. "I am going back as club captain, someone who has played over 400 games for the club. "I am not one to stop and look at what I have done because if you do that you lose the drive and hunger, but it has given me a bit of time to reflect on a crazy journey. "I just worked hard for the football club and gave it my all. It's not like I've been the most talented player to put an Everton jersey on. "I respected my managers, respected the Everton badge and in return I think Evertonians respect that."
  • None 'Everyone knows what Everton means to me' - new contract for Coleman

  Coleman is now entering his 16th season as an Everton player

  Coleman has become an Everton mainstay, amassing 422 appearances in all competitions and has the honour of being the club's longest-serving Premier League player, featuring 364 times in the top flight. He cost the Toffees £60,000 - a fee that works out at £142 a game. Despite the churn of players and managers during his time at the club, serving 11 different bosses, Coleman remains – at the age of 35 – the first-choice pick at right-back when fit. The team has battled against relegation in recent seasons, a period which Coleman describes as being "tough for everyone". "It is a special club full of hardworking and honest people like the fans," he says. "There are times when it is tough and they tell you the home truths but don't we all need that sometimes? “I think I have been very fortunate that I didn't leave the city and I am very grateful that I didn't. "It wasn't until we had the last two or three years that I did fully realise and understand how massive this football club is to the people. "I know it sounds extreme but the people I have seen and talked to, they live for Everton. That is what gets them out of bed on a morning."

  Coleman signed a one-year contract extension last month and said there has never been a time when he wanted to leave the club. After breaking his leg in 2017, the offer of a new five-year deal remained on the table without any changes. This will be Everton’s final season at their Goodison Park home before moving to Bramley-Moore Dock for the start of the 2025-26 campaign. Coleman says: "This club is massive and it's just waiting for things to click into place. It has to be right off the pitch too as well as on it, but the gaffer has been steady, solid and calm. "I'm getting a bit older but I want to feel that I’ve played a part in weathering the storm and Everton kicking on to the new stadium and being a giant of the club again." New owners are also on the horizon, with the Friedkin Group agreeing to buy the club from Farhad Moshiri and Coleman is hoping it can kick-start a period of success. "I was lucky enough to play in some European nights under Roberto [Martinez]," he says. "We went to Kiev and we lost a game we probably should not have lost. "But you don't realise how lucky you have it until it is gone and you are watching the West Hams in Europe and thinking: 'Oh, that was us. Were we taking that for granted?' Yeah, we probably did. "So we need to make sure that when we get these times back - and I fully believe we will - and if we get things run properly then the football club is too big not to be successful again. "We have all had a tough time being Evertonians, but we have got to believe that the future's bright. We have to."
