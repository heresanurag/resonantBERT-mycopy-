  Police said they began an operation at 10:00 local time (08:00 GMT), after gunshots were heard from inside the school. A specialist Cobra tactical unit - which handles attacks and hostage situations - was deployed to the school, police said. Authorities evacuated all pupils and teachers from the building. Police confirmed the school had been secured and there was no further danger posed to members of the public. "Locally, we have seen people crying on the streets, talking to friends that have been at the school when the shooting happened, who have maybe lost a friend," said Fanny Gasser, a journalist for the Austrian daily newspaper Kronen Zeitung. She told BBC News "everybody knows somebody" at the school because Graz - despite being the second-largest city in Austria - is "not that big". She said the school was likely unprepared for the possibility of an attack. "We are not living in America, we are living in Austria, which seems like a very safe space." European Commission Vice-President Kaja Kallas said she was "deeply shocked" by the news. "Every child should feel safe at school and be able to learn free from fear and violence," she posted on X.

  Astrid, a woman living with her husband Franz in the ground floor flat of the residential building next to the school, told the BBC she had just finished hanging out the washing when she heard gunfire. She said: "I heard shots. Lots of them, one after the other. 'Poof... poof... poof.... poof... poof...' again and again. I went into the flat to my husband and I told him: 'Someone is shooting!' "He thought it was maybe something else, but we heard I reckon 30 to 40 shots. Then my husband rang the police." "We saw one pupil at the window - it looked like he was getting ready to jump out... but then he went back inside," Franz said, adding they also saw a teacher. The pair later saw the students had "got out of the school on the ground floor, from the other side" where they "gathered on the street", Franz said.

  By Tuesday afternoon, long queues had formed outside a blood donation centre in Graz. "Today is a hard day for all of us in Graz. I'm here to [donate] my blood to help other people who need it," 25-year-old Stephanie Koenig told Reuters. "Today I'm here because I wanted to do something. I felt helpless with the news," Johanna, 30, said. Another person standing in line told Reuters giving blood felt like the "only way possible to help".

  The incident is the deadliest mass shooting in the country's recent history. In 2020, jihadist gunman Kujtim Fejzulai shot four people dead and wounded 23 others on a rampage through Vienna's busy nightlife district. Meanwhile, in 2016, a gunman opened fire at a concert in the town of Nenzing, killing two people before shooting himself dead. Eleven other people were injured in the attack.
