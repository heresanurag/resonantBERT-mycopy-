title: South Lakes Safari Zoo to close at end of month - BBC News
date: '2024-12-16'
section: Cumbria
url: http://www.bbc.co.uk/news/articles/cy9qxrvp7evo
content: |-
  Bosses at the attraction say they are working to find long-term homes for the animals.

  Zoo at centre of welfare concerns to close

  A zoo at the centre of animal welfare concerns has announced it is to close at the end of this month. South Lakes Safari Zoo, near Dalton, in Cumbria, has had a troubled past and in October a BBC investigation heard allegations of avoidable animal deaths, welfare issues and a bullying culture, which it denied. In July, Westmorland and Furness Council added conditions to the zoo's licence after inspectors found "major causes for concern", including a work experience student being left alone with dangerous animals. Karen Brewer, chief executive of the zoo's operator, Cumbria Zoo Company Limited (CZCL), said it would shut on 31 December and the company was working to find homes for the animals.

  Warning: This article contains images of injuries to animals some readers may find distressing. The firm is looking to focus on a 120-acre site about 40 miles (65kms) away at Tebay, which it will run as a nature and wildlife park. "In transition, the animals will all continue to be looked after and given the best veterinary care," Ms Brewer said in a statement. "We are working with various agencies, including two zoo consultants, to find them all new homes that are appropriate for their longer-term needs. "The initial development enables the movement of two of our rhinos to the land at Tebay in a safe and efficient manner knowing they will be happy with the environment we have created."

  Earlier this year, former staff showed the BBC pictures of injured animals including this capybara and a giraffe

  CZCL took over the operation of the zoo in 2017 when its previous owner, David Gill, was refused a licence following the deaths of almost 500 animals in a three-year period. In 2013, keeper Sarah McClay was killed by a tiger, which got through an open door into the corridor where she was working. Formed from the old owner's board of directors, it promised a raft of improvements. However, six people who worked at the site between 2017 and 2022 told the BBC major problems persisted. They alleged a number of animals "suffered greatly" and that some deaths "could have been avoided". In response to that investigation, Ms Brewer said CZCL was not in ownership of the zoo at the time of Ms McClay's death and therefore it was not appropriate to comment. Since 2017, she said 33 independent government inspectors had visited the zoo "and each have approved our standards". "Our priority at all times is the high quality of care for all of our animals," she added. CZCL has also been involved in a dispute with the Zoo Investment Company (ZIC), which owns the land the attraction operates on and which wants control of the park. Separately, both companies own animals housed and exhibited at the site.
