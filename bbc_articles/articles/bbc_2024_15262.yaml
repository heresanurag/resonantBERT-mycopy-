  Mr Dutch is from the Pennsylvania city of New Kensington and is a long-time employee of the technology company Siemens, according to his sister. Jennifer Veri-Grazier told the New York Times that the 57-year-old suffered damage to his liver and broken ribs in the shooting and has had to have more than one operation. She described him as a long-time Trump supporter. “He was exercising his rights and went to the rally, and he didn’t deserve any of this,” Ms Veri-Grazier said. The Pennsylvania branch of the Marine Corps League, a veterans' association, has identified Mr Dutch as one of its members on social media.

  Mr Copenhaver, 74, is from Moon Township, Pennsylvania, and was a registered Democrat, the New York Times reports. Albert Quaye, a supervisor in Moon Township, told the newspaper that Mr Copenhaver was retired and had become very interested in local politics. Mr Copenhaver is listed as a member of Moon Township's Military Banner Committee, which organises tributes for the area's veterans.
