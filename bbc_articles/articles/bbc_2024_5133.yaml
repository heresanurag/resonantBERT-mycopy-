  "So it's better if we read the decision from Cas that it was a contaminated supplement, it wasn't doping. "I never had something to do with doping. I never doped, so I'm not a cheater. "Only one person being negative about me is not that important because I have hundreds of people that giving me love, so I will take that." Halep impressively raced through the first set against former world number two Badosa, of Spain, but struggled to maintain those levels. With the French Open running between 26 May and 9 June, Halep is looking to build up time on the court. Halep won the French Open in 2018 and lifted the Wimbledon title in 2019. Elsewhere at the Miami Open, 43-year-old Venus Williams, a three-time winner of the event, was beaten 6-3 6-3 by 19-year-old Russian Diana Shnaider.
