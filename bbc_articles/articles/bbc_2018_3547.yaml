id: bbc_2018_3547
title: Crowd catches girl after ride fall - BBC News
date: '2018-03-06'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-40411198
content: |-
  A father describes the moment it happened at a Six Flags theme park in New York.

  Footage shows the moment a 14-year-old girl was caught after falling off a theme park ride in the US.

  Matthew Howard Sr was at the Six Flags theme park in New York State with his daughter when he joined the effort to save her.

  The girl suffered no serious injuries. Six Flags has closed the ride while it investigates.
