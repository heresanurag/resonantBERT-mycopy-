title: 'Victoria Atkins: MP criticised for behaving ''abominably'' - BBC News'
date: '2024-07-20'
section: Lincolnshire
url: http://www.bbc.co.uk/news/articles/c2lk9yd04vgo
content: |-
  Ms Atkins has been criticised after attempting to interrupt another MP during a Commons debate.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Conservative MP Victoria Atkins has been reprimanded by the deputy speaker over her behaviour during a parliamentary debate when she attempted to loudly interrupt another MP. Footage from the House of Commons on Friday showed the shadow health and social care secretary standing at the despatch box and speaking over Environment Secretary Steve Reed. Deputy Speaker Christopher Chope called for order and said Ms Atkins "behaved abominably". Ms Atkins' office said she was "trying to get answers" during the debate.

  As the Commons discussed the greenbelt and rural economy, Shadow Environment Secretary Steve Barclay was critical of decisions taken so far by the new Labour government. "This King's speech does nothing for the farming and fishing communities and the decisions we've seen so far are ones that take vast amounts of farmland out of food production in order to prioritise the eco-zealotry, which we've heard so often in this house," he said. During his response Mr Reed declined interventions from Mr Barclay as well as Conservative front-benchers Kemi Badenoch and Ms Atkins. Ms Atkins stood at the despatch box as Mr Reed continued to speak and Tory members continued to call for interventions.

  A spokesperson for Ms Atkins' office said: “Conservative MPs were trying to get answers about their budgets for farming, flood defences and food security, which the minister ignored. “She will always stand up fearlessly for farmers and our rural area in Westminster, even if that means a rare admonishment from the Chair.” But, her actions have attracted criticism from other MPs including Labour's Perran Moon who said called for appropriate action to be taken. Lib Dem MP Helen Morgan, who was in the Commons, said: "I witnessed this first-hand. The Conservatives proved the electorate got it right: they are not fit for government." Closing the debate shortly after the brief row, Mr Reed said: "I thank all members who have taken part in this constructive and insightful debate for their perceptive contributions and their dedication to making progress on important matters. "After 14 years of chaos, there is once again hope for our environment, hope for our countryside, and hope for our rural communities." Follow BBC Lincolnshire on Facebook, X (formerly Twitter), external, and Instagram. Send your story ideas to eastyorkslincs.news@bbc.co.uk, external
