title: 'Sarah Everard: Vigil protesters'' emotional on-camera reunion - BBC News'
date: '2023-09-14'
section: General
url: http://www.bbc.co.uk/news/uk-66808578
content: |-
  The two women didn't realise they had met before police arrested them during a vigil until speaking to the BBC.

  Two women arrested at the Sarah Everard vigil at Clapham Common two years ago had an emotional on-camera moment while speaking to the BBC.

  Patsy Stevenson and Dania Al-Obeid didn't realise they had met before police arrested them during the vigil, until they were both interviewed by the BBC's Lucy Manning.

  Both took legal action against the Metropolitan Police over their arrests at the south London protest during Covid restrictions.

  A settlement has been reached and "substantial" damages paid, said the law firm representing the pair.
