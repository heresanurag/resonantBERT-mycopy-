content: |-
  Belfast is set to stage its first St Patrick's Day parade since the coronavirus pandemic.

  Belfast is to stage its first St Patrick's Day parade in two years after a hiatus due to the coronavirus pandemic.

  One group is working to increase diversity in the parade.

  Beat Carnival's theme for this year's pageant parade is “we are all Patrick”.
