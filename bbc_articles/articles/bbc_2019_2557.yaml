id: bbc_2019_2557
title: Donald Trump attacks his opponents in Maryland speech - BBC News
date: '2019-03-03'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-47431369
content: |-
  In the longest speech of his presidency, President Trump railed against the inquiry into alleged collusion between his campaign and Russia.

  He was speaking at the Conservative Political Action Conference in Maryland.
