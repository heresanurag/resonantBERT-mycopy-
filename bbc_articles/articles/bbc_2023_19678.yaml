title: I'm a Celeb producers sorry for liking 'unacceptable' Instagram comment - BBC
  News
date: '2023-12-02'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-67599643
content: |-
  Producers say they "apologise for the mistake made and any offence caused" after liking the post.

  Producers of the long-running ITV reality show have apologised for the mistake

  I'm A Celebrity... Get Me Out Of Here! producers have apologised after the show liked a comment about a campmate on social media which "contained unacceptable language".

  A statement from the ITV show said it "seeks to champion all our campmates" and "urges users to be kind".

  The Instagram post has been deleted, but it referred to YouTuber Nella Rose.

  Rose is a 26-year-old social media star with more than 750,000 subscribers on YouTube.

  The show's statement said: "Yesterday we accidentally liked a comment on Instagram while scrolling down through viewer comments.

  "The post in question contained unacceptable language about one of our campmates and we apologise for the mistake made and any offence caused.

  "We seek to champion all our campmates and would always urge our audience to be kind when commenting on social media."

  Nella Rose is an influencer and YouTube star with more than 750,000 subscribers

  On social media, some users welcomed the show's apology.

  One said "the hate towards Nella has been way [too] much. I disagree with some of her actions in the jungle but people are acting like she's the worst human being alive and that's unfair."

  But others said the apology did not go far enough.

  The incident came hours after tensions rose in the jungle between Rose and First Dates star Fred Sirieix on Friday's episode.

  The YouTuber claimed Sirieix had made her life "hell" over his attitude to camp life including washing dishes - it follows several disagreements between the pair.

  Earlier in the series, Rose also clashed with fellow campmate Nigel Farage over accusations of him being anti-immigration.

  Another contestant, This Morning host Josie Gibson, was seen in tears during Friday's episode, before explaining that she was missing her five-year-old son.

  "I just miss my little boy, I shouldn't have ever left him this long," she said, adding that she felt "very guilty" about the decision.

  Campmate Danielle Harold comforted her, telling her: "You're the best mum."

  Both food critic Grace Dent and Britney Spears' younger sister Jamie Lynn Spears left the show, filmed in the lush forests of New South Wales, Australia, on medical grounds this week.

  This year's series has so far attracted a lower audience than last year's - which featured former health secretary Matt Hancock.

  While the previous series' launch episode attracted an overall audience of nearly 12 million, this year's launch has only been watched by seven million in its first week.
