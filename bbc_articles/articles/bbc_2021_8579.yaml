content: |-
  It's day three of the Tokyo Olympics, where Adam Peaty has won Team GB's first gold medal of the Games.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Adam Peaty won Team GB's first gold medal of the Tokyo 2020 Olympics after Alex Yee won triathlon silver on his Games debut. Peaty became the first British swimmer to defend an Olympic title with his dominant victory in the 100m breaststroke. Earlier on day three, 23-year-old Yee cemented his position as the new star of British triathlon with his second-place finish, as Jonny Brownlee missed out on a medal. Elsewhere, Japan's Momiji Nishiya won women's street skateboarding gold at just 13 years old. Britain's men began their rugby sevens campaign with a convincing 24-0 win over Canada, while GB's men's hockey team also beat Canada 3-1. Olympic organisers say a typhoon will hit Tokyo tomorrow, but it is not expected to cause much disruption to the Games. Rowing and archery events have already been moved because of the anticipated strong winds, but there are no plans to make any other changes to the schedule unless the forecast changes.

  If you're just waking up, here's what else you've missed on Monday morning:
  • None GB's Duncan Scott won his 200m freestyle semi-final while Kathleen Dawson qualified for the women's 100m backstroke final.
  • None In badminton, Marcus Ellis and Lauren Smith won their mixed doubles tie against Thailand to top their group, but Ben Lane and Sean Vendy lost to Chinese Taipei in the men's doubles.
  • None Britain's sole fencer Marcus Mepstead lost to Egypt's Mohamed Hamza in the first round of the men's foil.
  • None Australian swimmer Ariarne Titmus beats American great Katie Ledecky to gold in the women's 400m freestyle final.
  • None Japan's Naomi Osaka cruised into the third round of the tennis women's singles.

