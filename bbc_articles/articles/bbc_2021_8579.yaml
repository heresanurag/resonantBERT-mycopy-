  Japan's Nishiya made history in becoming the first to win women's skateboarding Olympic gold in the street discipline. It's even more impressive when you consider she is just 13 years 330 days old. Silver medallist Rayssa Leal of Brazil is also 13, while bronze medallist Funa Nakayama of Japan is 16. That meant the podium's average age was 14 years and 191 days, the youngest individual podium in Olympics history. Skateboarding is one of the sports making its Olympic debut in Tokyo.
