  The BBC's Analysis Editor, along with BBC Verify, takes a look at material from the scene to assess what we know.

  Ukrainian sources have told the BBC that the country's security service was behind the killing of a high-ranking general in the Russian armed forces and his assistant.

  The BBC's Analysis Editor Ros Atkins, along with BBC Verify, takes a look at material from the scene to assess what we know - and what we don't.
