title: 'Abergele holiday park incident: Man held as girl, 15, dies - BBC News'
date: '2021-08-01'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-58048295
content: |-
  A 15-year-old girl dies and a 19-year-old man has been arrested after the incident on Saturday.

  A 15-year-old girl has died after an incident at Ty Mawr Holiday Park, near Abergele, on Saturday

  A 15-year-old girl has died following a "domestic disturbance" at a holiday park.

  North Wales Police said a 19-year-old man had been arrested following a "serious" incident at Ty Mawr Holiday Park, near Abergele, on Saturday.

  Det Supt Mark Pierce said it was a "tragic but isolated incident".

  "Our thoughts are with the family who are being supported by specially trained officers at this time," he said.

  On Saturday, bosses at the park in Conwy county said they were "shocked and saddened by this tragic incident" that took place inside a caravan "which is now a crime scene".

  Det Supt Pierce added: "We would like to thank the staff and management of Ty Mawr, and members of the public both locally and those holidaying, for their support whilst we carry out our investigations.

  "Our thoughts are with the family who are being supported by specially trained officers at this time."
