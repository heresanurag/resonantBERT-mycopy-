  Zola the Collie was once kicked out of obedience school but is now off to Crufts.

  'Badly behaved' rescue dog Zola now competing with the best

  Zola will compete at Crufts on Thursday morning

  A rescue dog that was once kicked out of obedience school and struggled in the company of other dogs is to compete at Crufts. Zola, a black, white and tan Collie, was being cared for by an animal charity when she was rescued three years ago by Jessica Gibson from Limavady in County Londonderry. Jessica, 19, said Zola's journey to the world's biggest dog show has not been an easy one. "She had a lot of problems but we worked through them," she said. " I cannot get over how far she has come, she is nothing like the dog she used to be."

  Zola will compete in Crufts, the Kennel Club's most prestigious event, on Thursday morning in the agility category.

  Jessica was not sure at first if Zola was the right dog for the challenge of agility competitions

  When Jessica and Zola first met, the Collie was being cared for by rescue charity Pet FBI. "She was very excited, jumping up on the side of the kennel, just buzzing to get out," Jessica told BBC Radio Foyle's North West Today. "We took her to obedience school and she got kicked out. She was very bad around other dogs."

  It was not long before Zola had mastered the skills required

  It was then the work began. Jessica watched a raft of online videos and training began in earnest. "I have always liked watching agility, but it seemed so out of reach and I didn't think Zola would be the dog for it. "We started agility training two years ago – it's been a long and hard journey with a lot of set backs," said Jessica.

  Jessica and Zola began competing in and winning competitions in 2024

  Jessica and Zola began to train on a regular basis at an agility park near Coleraine where Zola has dispelled those initial doubts. She soon mastered the twists and turns, the leg weaves and other skills needed to compete in agility at the top level. "I am over the moon, I cannot get over how far she has come, she is nothing like the dog she used to be," Jessica said. The pair earned their place at this year's Crufts by winning at the Kennel Club qualifying competition in Northern Ireland. "Zola pulled it out of the bag, Jessica said. Crufts will be held at the National Exhibition Centre (NEC) in Birmingham from 6 to 9 March.
