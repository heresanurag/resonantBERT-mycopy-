title: 'Mocejón stabbing: Man arrested after boy, 11, killed playing football - BBC
  News'
date: '2024-08-19'
section: Europe
url: http://www.bbc.co.uk/news/articles/cp8ndp6n196o
content: |-
  The boy was attacked on a football pitch by a masked person with a sharp object, Spanish media report.

  The attack is reported to have happened on the pitch of a sports centre in Mocejón

  A person has been arrested on suspicion of killing an 11-year-old boy on a football pitch in Mocejón, central Spain. The arrest follows an "extensive" two-day search operation, in which two raids were carried out on homes in the town, the Spanish Civil Guard said. Local media reports the suspect is a 20-year-old man from the area. The victim, who has been named as Mateo, is thought to have been playing with other children when he was attacked by a person with a sharp object on Sunday morning.

  The suspect is said to have fled the scene in a grey Ford Mondeo. The attack happened at the Ángel Tardío sports centre in Mocejón, at about 10:00 local time (09:00 BST). Broadcaster RTVE said a government delegation had confirmed that the victim suffered 10 stab wounds. A dozen patrols had reportedly been deployed to look for the suspect, aided by an underwater unit and air surveillance. Mayors and councillors gathered at the entrance of Toledo's Provincial Palace at 12:00 (11:00 BST) on Monday for a minute's silence for Mateo and a 17-year-old girl shot dead on Saturday in nearby Otero. Asell Sánchez, a cousin of Mateo said to be acting as a spokesman for the family, told Spanish media they had no idea who was responsible. He was quoted as saying: "He was a super good boy, super affectionate, he was playing with his friends, someone arrived, we have no further information. These are difficult times." Mocejón, with a population of about 5,000, has declared three days of official mourning. Emiliano Garcia-Page, president of the Castilla-La Mancha region, expressed his support for law enforcement agencies involved in the search. In a post on X on Monday, external, he promised "the full weight of the law will fall" on the perpetrator, adding: "My thoughts are with Mateo's family, with his friends and with the entire municipality." Concepción Cedillo, mayor of Mocejón, told reporters on Sunday: "It is a sad day, with a town broken by pain, and if every murder is painful, how much more so the murder of an innocent child who was playing football with his friends this morning." Milagros Tolon, the Spanish government's representative in the Castilla-La Mancha region, posted on X: "It is with great sadness that I receive the news of the murder of a minor in #Mocejón [Toledo] after being attacked with a sharp object. "All my love to the family and friends of the deceased, as well as to the people of Mocejón."
