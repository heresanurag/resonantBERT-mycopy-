title: Watch moment US fighter jet crashes into San Diego Bay - BBC News
date: '2025-02-13'
section: General
url: http://www.bbc.co.uk/news/videos/cy8p3qg4911o
content: |-
  Two navy pilots safely ejected from the aircraft and were rescued by a nearby fishing boat.

  Two US Navy pilots are safe after ejecting from their EA-18G Growler before it crashed into San Diego Bay on 12 February.

  The pilots were rescued by a nearby fishing boat soon after they splashed down into the water and were taken to hospital in a stable condition.

  The jet was flying in low visibility conditions and crashed while attempting to land near Naval Base Coronado. The cause of the crash is under investigation.
