title: 'Heather Knight: England captain admits social media post charge - BBC Sport'
date: '2024-09-23'
section: England Women
url: http://www.bbc.co.uk/sport/cricket/articles/cx2mx4dp07no
content: |-
  England women captain Heather Knight admits a charge over a historical social media post when she was pictured in blackface.

  Heather Knight has been England captain since 2016

  England captain Heather Knight has admitted a charge over a social media post in 2012 when she was pictured in blackface. Knight, who was 21 at the time, was attending an end-of-season fancy dress party at a cricket club in Kent. A picture of Knight in blackface was posted to the Facebook account of another individual. She has been reprimanded by the Cricket Discipline Commission and fined £1,000, which is suspended for two years. "I'm truly sorry for the mistake I made in 2012," said the 33-year-old in a statement issued via the England and Wales Cricket Board (ECB). "It was wrong, and I have long regretted it. Back then, I simply was not as educated as to the implications and consequences of my actions as I have become since. There was no ill-intent meant. "Whilst I can't change the past, I am passionate and committed to using my platform to promote inclusivity across the game, ensuring under-represented groups are afforded the same opportunities and fulfilment within the game as I have." Knight has been captain of the England women's team since 2016 and will continue to lead the side at the T20 World Cup in the United Arab Emirates next month. The batter has been with England on their training camp in Abu Dhabi since 13 September.

  Heather Knight will lead England in the T20 World Cup in the UAE

  ECB chief executive Richard Gould added: "Heather recognises this was a serious error of judgment which took place more than 10 years ago and has rightly apologised. "As a public figure and leader, Heather has worked tirelessly to foster a more inclusive and equitable future for cricket. "She has championed initiatives to promote diversity and strongly advocated for marginalised communities. She has shown herself to be a positive role model. "While we cannot change the past, we can certainly learn from it. This incident serves as a reminder of the ongoing work to combat racism and discrimination." When Knight attended the party with a 'sports stars' theme 12 years ago she had already been an England player for more than two years. The photograph of Knight was reported to the Cricket Regulator in July of this year and she was charged in August. At the time she was captain of London Spirit in The Hundred, which the side went on to win. Interim director of the Cricket Regulator Dave Lewis said: "Cricket is working to become a more inclusive sport and the Cricket Regulator is committed to acting positively and impartially whenever racist behaviour is reported to us. "In this case, Ms Knight's behaviour was discriminatory and offensive, however the Cricket Discipline Commission accepted there was no racist intent in her conduct. I welcome her acknowledgment of the potential impact of her behaviour, and her unreserved apology."
