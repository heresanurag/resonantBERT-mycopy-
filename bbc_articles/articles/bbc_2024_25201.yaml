title: 'Chris Kaba: Officer ''thought colleague had been hit by car'' - BBC News'
date: '2024-10-16'
section: London
url: http://www.bbc.co.uk/news/articles/cp3wkjwwv08o
content: |-
  An officer at the fatal shooting of Chris Kaba tells a court she believed a colleague had been hit by a car.

  A firearms officer has told the Old Bailey she feared one of her colleagues had been hit by a car moments before Chris Kaba was fatally shot during a police stop. The officer, referred to as HA10 to protect her anonymity, said it had been an “incredibly frightening” event that culminated in the death of the 24-year-old in London, on 5 September 2022. That night, Met Police officer Martyn Blake shot Mr Kaba through the windscreen of an Audi car which had been linked to a shotgun incident the night before. HA10 was giving evidence for the defence in the trial of Mr Blake, 40, who denies Mr Kaba’s murder.

  The court heard HA10 was in a convoy of armed police vehicles that had followed the Audi to Streatham, south London, where a decision was made to initiate an enforced stop and extraction. Giving evidence, HA10 told jurors she immediately got out of her vehicle and crossed the road behind an unmarked police vehicle which was rammed by the Audi in front. HA10 told the court: “It became apparent the Audi was ramming and smashing into the vehicle ahead of it and the police vehicle behind it." Asked what she thought the danger was, she said: “I realised in a matter of milliseconds what was happening and I was aware I had to make decisions on what my next step would be, otherwise I was putting myself in danger, potentially being hit by a vehicle.”

  She added: “There was an awful lot of crashing and smashing as you would expect of a collision. “There was an incredibly clear scream. It was a standout memory without having to watch the body-worn video back. “I absolutely thought that one of my colleagues had been possibly hit by the vehicle." Cross-examining, prosecution barrister Louise Oakley said: “Do you accept you were never at risk yourself of being struck by that Audi?” HA10 agreed and also acknowledged there was no scream, saying: “I have been advised the noise has been attributed to a noise of a tyre screeching.”

  On the moment Mr Kaba was fatally injured, she said: “I remember a very clear and distinctive gun shot which was recognisable over and above all the other noise occurring at the time.” The officer told jurors she gave “hands-on” first aid to Mr Kaba, who died later that night from the gunshot to the head. Patrick Gibbs KC, defending, asked what the witness thought about the risk on the night. She replied: “At the time, I was very concerned I was going to be hit by the Audi." The officer added: "It was an incredibly frightening, chaotic experience.”

  HA10 told jurors she knew Mr Blake as part of the team but that he was not her direct line manager. Asked to describe him, she said: “I cannot confess to knowing him very well but any interaction I had with him he was entirely friendly, very calm, very knowledgeable, very pleasant to be around.” The witness added she never saw him angry, frustrated or annoyed, the court heard.
