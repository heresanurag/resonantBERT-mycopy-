  Hamilton 'could not be more excited' as Ferrari career starts

  Lewis Hamilton says he "could not be more excited" as he embarks on his new career at Ferrari in 2025. The seven-time champion, whose contract with the Italian team started on 1 January, said he was "embracing new opportunities, staying hungry, and driving forward with purpose". Hamilton chose a post on LinkedIn to make his first comments since joining Ferrari, adding: "Let's make it one to remember." He wrote: "Moving to Scuderia Ferrari, there's a lot to reflect on. "To anyone considering their next move in 2025: embrace the change. "Whether you're switching industries, learning a new skill, or even just taking on new challenges, remember that reinvention is powerful. Your next opportunity is always within reach." Hamilton has also posted on social media a picture of him racing in karting as a boy wearing a helmet in red, Ferrari's colour.

