  Earlier, the UK government accused the GRU of being behind four high-profile cyber-attacks whose targets included firms in Russia and Ukraine; the US Democratic Party; and a small TV network in the UK.

  Russia has called the accusations a "diabolical cocktail" of allegations as well as a "rich fantasy of our colleagues from Britain".

  A statement from Nato called on Russia to halt its "reckless pattern of behaviour, including the use of force against its neighbours".

  Nato also said it would "strengthen its defence and deterrence to deal with hybrid threats".

