id: bbc_2022_2794
title: Australian floods cut off outback towns and major supply routes - BBC News
date: '2022-02-02'
section: General
url: http://www.bbc.co.uk/news/world-australia-60225482
content: |-
  The military has been called in to deliver food and supplies as floods cause transport chaos.

  Flooding across South Australia has disrupted major supply chains and left outback communities cut off.

  The military has been called in to deliver food and essential items.
