  The UK health secretary also says the UK has identified 77 cases of the Covid South Africa variant.

  Watch: Vaccine plea to prioritise those with learning disabilities

  As high risk groups continue to be immunised, there are growing concerns that people with learning disabilities have been missed out. "Just because we've got a learning disability, doesn't mean we should sit in the corner and rot," says Amanda. "We need help now." "There are so many people that are going to die, and it's not fair." "Even before Covid, more than four in 10 people with a learning disability died of a lung condition like pneumonia," says Professor Tuffney-Wijne, of Kingston University. "As a group of people, they really are at risk." Legal action is being taken against the Department of Health and Social Care, which says it is working hard to vaccinate all those at risk. The Joint Committee on Vaccination and Immunisation said it had made "a clinical decision to prioritise those with profound and severe learning disabilities within our first six categories".
