title: Big Ben’s iconic bongs return after restoration work - BBC News
date: '2022-11-12'
section: General
url: http://www.bbc.co.uk/news/uk-politics-63600578
content: |-
  The bells of the Elizabeth Tower will return to regular service on Remembrance Sunday.

  After five years of restoration work, the bells of the Elizabeth Tower - including Big Ben - are returning to regular service.

  Big Ben will be struck 11 times at 11:00 on Remembrance Sunday to mark the beginning of the two-minute silence.

  Clockmakers Ian Westworth and Alex Jeffrey spoke to the BBC about bringing the iconic bells back into service.
