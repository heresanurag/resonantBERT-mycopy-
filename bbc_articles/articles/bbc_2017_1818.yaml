id: bbc_2017_1818
title: Louvre visitors in lockdown after attack - BBC News
date: '2017-02-03'
section: General
url: http://www.bbc.co.uk/news/world-europe-38852723
content: |-
  Footage shows the scene outside the Louvre in the immediate aftermath of the attack and visitors inside sitting on the ground in a locked room.

  A French soldier guarding the Louvre in Paris has shot a man who tried to attack a security patrol with a machete shouting "Allahu Akbar", police say.

  Visitors inside the museum were told to sit on the ground in a locked room as the area was put on lockdown.
