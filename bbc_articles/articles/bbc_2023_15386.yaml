title: 'Watch: Boats collide in South China Sea''s disputed waters - BBC News'
date: '2023-10-22'
section: General
url: http://www.bbc.co.uk/news/world-asia-67186031
content: |-
  The Philippines armed forces said their video showed a Chinese vessel colliding with a Philippine ship.

  The Philippines has accused China's coast guard of colliding with a Filipino supply boat in disputed waters of the South China Sea, endangering its crew.

  China said the Philippines "deliberately stirred up trouble".

  In a second incident also near Second Thomas Shoal on Sunday, Filipino authorities said a Chinese militia vessel bumped into a Philippine coast guard ship.

  The armed forces of the Philippines have released footage they say show the collisions.
