  The BBC's Nomia Iqbal looks at constituent backlash facing both parties over the Trump administration's sweeping cuts.

  In recent weeks, both Democratic and Republican lawmakers have faced constituent backlash during town hall meetings over the Trump administration's sweeping cuts.

  The BBC's Nomia Iqbal takes a closer look at the recent events and what they reveal about voter sentiment.
