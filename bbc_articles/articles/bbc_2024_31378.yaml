title: 'Newspaper headlines: ''DisasterChef'' and ''Syrian warplanes hit back'' -
  BBC News'
date: '2024-12-02'
section: The Papers
url: http://www.bbc.co.uk/news/articles/crk0mnmy8zlo
content: |-
  The Gregg Wallace scandal continues to take front and centre on many of the papers on Monday, as does the latest in the conflict in Syria.

  The Financial Times features this image of a rebel fighter tearing up an advertisement for Syrian President Bashar al-Assad in Aleppo on its front page

  The i leads on, external a poll that suggests Britons want the prime minister to prioritise closer economic ties with the European Union over a trade deal with the United States. Almost half of respondents, 49%, picked the bloc, while 28% opted for America. And finally, the Daily Telegraph reports, external on the rebranding of rugby union's Six Nations. The new logo reads "M6N" in orange font in front of a rugby ball. Tournament organisers say the choice of colour signifies "the optimism fans feel when they come together at the end of winter to experience the Six Nations together". But social media users are reportedly unimpressed, one has compared the logo to the artwork used for the Looney Tunes cartoons, while another has likened it to a Mars bar wrapper.

