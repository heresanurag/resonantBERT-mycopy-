  After taking a two-year break from diving following his gold medal at the Tokyo Games, Tom Daley decided to return to action when his eldest son Robbie, six, asked to see him compete at an Olympics. Daley was chosen to be one of Team GB's flagbearers, alongside rower Helen Glover, and the 10m synchro was his one chance to win a medal in Paris as he is not competing in the individual events. He and Noah Williams were impressive across all six of their dives but world champions Lian Junjie and Yang Hao of China proved a class above to claim gold. A silver medal means Daley has completed the Olympic set, having won three bronze and one gold medal since making his debut as a 14-year-old at Beijing 2008. And as the British pair stood on the podium, Daley blew kisses towards his family.
