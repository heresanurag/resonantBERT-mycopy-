  Great Britain are having a terrific Games in the canoe slalom so far. After Kimberley Woods claimed bronze in the women's singles yesterday, Burgess went one better in the men's event. Burgess is ranked 11th in the world, but was on form throughout this competition as he qualified fourth fastest for the final. When it counted, he produced an excellent run of 96.84 seconds and was leading the standings when the final racer, France's Nicolas Gestin, took to the water. To the delight of the home crowd, Gestin produced a flawless run and won gold in a time more than five seconds quicker than Burgess. Nevertheless it was a terrific effort from the Brit, and another medal on a fine day for his team.

