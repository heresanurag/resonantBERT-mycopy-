  It was an unfortunate case of deja vu for the British swimming team, as Richards took silver in the men's 200m freestyle. In a sensational swim from the outside lane, Richards finished just 0.02 seconds behind winner David Popovici of Romania - the same margin by which Adam Peaty missed out on 100m breaststroke gold on Sunday. Earlier on Monday, British swimming great Peaty was confirmed by Team GB to have tested positive for Covid-19. The team said the 29-year-old six-time Olympic medallist was "feeling unwell" before that final. Peaty is scheduled to compete in relay events later in the programme but his involvement is now uncertain. "Adam Peaty began feeling unwell on Sunday, ahead of his men's 100m breaststroke final," Team GB said in a statement. "In the hours after the final, his symptoms became worse and he was tested for Covid early on Monday morning. He tested positive at that point. "He is hopeful to be back in competition for the relay events later in the swimming programme. As in any case of illness, the situation is being managed appropriately, with all usual precautions being taken to keep the wider delegation healthy." There was further heartbreak as Duncan Scott came fourth in the men's 200m freestyle, after Freya Colbert finished in the same position in the women's 400m individual medley. Angharad Evans was sixth in the women's 100m breaststroke final, while Oliver Morgan came eighth in the men's 100m backstroke medal event.

