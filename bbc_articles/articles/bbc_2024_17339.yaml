  Few gold medals at these Games will be won in such dramatic fashion as the men's mountain biking by Pidcock. The British rider, wearing the number one on his jersey, started the race as favourite for gold and was leading the way - until a puncture disrupted his plans. It sent Pidcock down to ninth place and 40 seconds behind the leaders - but he would not be denied. He battled his way back through the field and retook the lead, before a sensational to-and-fro battle with France's Victor Koretzky. In the final stages through the woods on Elancourt Hill, Pidcock surged back in front - narrowly avoiding a collision with Koretzky - and raced away to win a historic gold medal.

