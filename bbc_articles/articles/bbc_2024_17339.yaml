  Team GB medalled in five of the six equestrian events at Tokyo 2020, including team eventing gold and an individual silver for Tom McEwen. McEwen and Laura Collett were both part of the triumphant team in Tokyo and were joined in Paris by Ros Canter, with the trio well placed after the dressage and cross country phases. Coming into the jumping phase on Monday GB were top of the team standings, although a jumping penalty against Canter in Sunday's cross country cut their lead over hosts France to just 4.7 penalty points. It also dropped Canter from sixth to 24th in the individual standings, meaning McEwen replaced Canter in sixth, while Collett was second. There was no repeat of Sunday's drama though as McEwen, Canter and Collett held their nerve to secure gold. The top 25 in the individual standings qualified for the jumping final on Monday afternoon, where Collett collected her second medal of the day with a bronze. Germany's Michael Jung took gold, while McEwen suffered heartbreak as he finished fourth.

