title: 'Capitol riot: Committee to seek charges for Trump - reports - BBC News'
date: '2022-12-17'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-64009203
content: |-
  The committee will reportedly seek an unprecedented charge of insurrection against an ex-US president.

  Mr Trump spoke to the crowd shortly before a riot broke out

  The congressional inquiry into last year's Capitol riot will reportedly recommend three criminal charges against former President Donald Trump.

  The House of Representatives panel will seek an unprecedented charge of insurrection against a former US president, according to US media.

  The criminal referrals to the justice department will be disclosed on Monday, along with most of the final report.

  The department is already investigating Mr Trump's role in the unrest.

  Trump supporters stormed Congress on 6 January 2021 in a bid to stop Joe Biden's certification as president.

  The justice department is not obliged to consider referrals from any congressional panel.

  Mr Trump denies wrongdoing. On Friday his spokesman, Steven Cheung, said in a statement: "The January 6th un-Select Committee held show trials by Never Trump partisans who are a stain on this country's history."

