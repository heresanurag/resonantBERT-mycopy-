  The BBC's Jonny Dymond on what to expect from the US president's three-day state visit to the UK.

  US President Donald Trump arrived in the UK for a three-day state visit on Monday.

  It follows a four-day working visit in July 2018.

  The BBC's Jonny Dymond takes a light-hearted look at what to expect, this time around.

