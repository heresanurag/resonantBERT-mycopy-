title: 'Syria air strikes: Eyewitness describes moment missiles struck - BBC News'
date: '2018-04-14'
section: General
url: http://www.bbc.co.uk/news/world-43763410
content: |-
  CBS reporter Seth Doane in Damascus, Syria, describes the moment the air strikes started.

  A CBS reporter in Damascus has described the moment air strikes against Syria started.

  Seth Doane also said he saw and heard anti-aircraft fire after the US, UK and France bombed multiple government targets.

  The strikes were in response to a suspected chemical attack on the Syrian town of Douma last week.
