id: bbc_2020_14264
title: Electoral college affirms Joe Biden as president-elect - BBC News
date: '2020-12-15'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-55311990
content: |-
  Electors across the US have cast their votes and while some met virtually, others received police escorts.

  Electors from states across the US cast their votes in the 2020 presidential election, affirming Joe Biden as president-elect.

  While some votes were conducted virtually, other electors met in state capitols or undisclosed locations due to security risks.
