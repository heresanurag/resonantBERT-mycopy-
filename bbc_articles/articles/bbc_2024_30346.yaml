title: 'Sara Sharif trial: Father and stepmother found guilty of murder - BBC News'
date: '2024-12-11'
section: Surrey
url: http://www.bbc.co.uk/news/articles/cn0dper5nx4o
content: |-
  The 10-year-old's body was found with dozens of injuries at the family’s home in Surrey last year.

  Sara Sharif's body was found at her home in Woking on 10 August last year

  The father and stepmother of 10-year-old Sara Sharif have been found guilty of her murder after subjecting her to "horrific suffering" for more than two years. Sara was hooded, burned and beaten during a campaign of abuse before her body was found with dozens of injuries at the family's home in Woking, Surrey, last year. Her father, Urfan Sharif, 43, and stepmother, Beinash Batool, 30, were found guilty of murder on Wednesday, while her uncle, Faisal Malik, 29, was convicted of causing or allowing a child's death. Following the verdict, Det Ch Supt Mark Chapman of Surrey Police said he had never seen "such horrific suffering of a young person" in his 30-year career.

  “It's one of those cases that touches every single person who's involved in it, and I'm sure has touched many members of the community as well,” he added. Det Ch Insp Craig Emmerson added that Sara's murder was "one of the most difficult and distressing" cases that Surrey Police had ever dealt with. In a statement read outside the Old Bailey, he said: "The murder of a child is absolutely shocking, but the abuse Sara suffered during her short life has made this case particularly disturbing." Children's commissioner Dame Rachel de Souza said Sara's murder highlighted "profound weaknesses in our child protection system". "There can be no doubt that Sara was failed in the starkest terms by the safety net of services around her," she said. "Even before she was born, she was known to social care, and yet she fell off their radar so entirely that by the time she died, she was invisible to them all. "We can have no more reviews, no more strategies, no more debate. When we say 'never again', we have to mean it – let that be Sara's legacy." The commissioner called for a raft of changes including "proper oversight" for children, like Sara, being home schooled.

  Warning: This article features details that some people might find distressing

  The trial heard how a post-mortem examination found Sara had suffered injuries including "probable human bite marks", an iron burn and scalding from hot water before she died on 8 August last year. Next to Sara's body, which was found by police in a bunkbed, was a note in her father's handwriting, which read: "Whoever see this note, it's me Urfan Sharif who killed my daughter by beating."
  • None Behind Sara's smile was a life of violence and torture
  • None Listen to the 999 call Urfan Sharif made to Surrey Police Sharif initially claimed that Batool was responsible for Sara's death, and told the jury he had made a false confession in the note and a subsequent phone call in order to protect his wife. However, in a dramatic U-turn under cross-examination, Sharif later accepted "full responsibility" for his daughter's death. Sara's mother, Olga Domin, has paid tribute to her, stating: "Sara's smile could brighten up the darkest room." She said her child had beautiful brown eyes, an angelic voice and a unique character. "She will always be in our hearts, her laughter will bring warmth to our lives," she said. "We miss Sara very much. Love you, princess." Sharif married Ms Domin in 2009 but they separated in 2015, with accusations of abuse made against each other in a custody battle. In 2019, Sara was living with her mother when Guildford's family court awarded custody to Sharif, who had by then divorced Ms Domin and married Batool.

  Sara's father Urfan Sharif and stepmother Beinash Batool have been convicted over her death

  Sara had more than 70 new external injuries when her body was found by police. She had suffered 11 fractures to her spine, burns to her buttocks caused by a domestic iron, signs of a traumatic brain injury and six probable human bite marks. Dental impressions ruled out that the bite marks had been caused by the male defendants, but Batool had refused to provide samples. Prosecutor Bill Emlyn Jones KC previously said a bloodstained cricket bat, a rolling pin with Sara’s DNA on it, a metal pole, a belt and rope were found near the family’s outhouse.

  A bloodstained cricket bat was found near the family’s outhouse in Woking

  Sara's primary school noticed a bruise under her left eye in June 2022, a bruise on her chin and a dark mark on her right eye in March 2023. She gave multiple conflicting tales of how she got the injuries and began wearing a hijab to hide her facial injuries in January 2023. By April last year she had been withdrawn to be home-schooled. Accounts from neighbours were shared with the court, including a woman who lived near the family's previous address in West Byfleet, who recalled “shockingly loud” sounds of smacking and “gut wrenching screams” of young girls.

  During the trial, Sharif claimed he came home on the evening on 8 August 2023 to find his wife sitting on the floor in the couple's bedroom, holding Sara. Giving evidence, he said Batool told him the girl had fallen down the stairs while playing with another child, and that she was “being dramatic". Sharif said he told Sara to “get up” and took her arm, but it was limp. His reaction was to "whack" Sara in the stomach twice with a pole for "pretending", jurors heard. He previously said he also gave his daughter CPR for 10 minutes, but Batool told him to stop. Sharif said that when he asked where the ambulance was, Batool replied: “There’s no need because she’s dead.”

