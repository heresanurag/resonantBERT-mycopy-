  When the family fled to Pakistan, Sharif called police in England about an hour after their flight had landed and told the operator that he killed Sara. In the call, which lasted eight minutes and 34 seconds, he said he “legally punished her” and she died. Later in the call, he said that Sara had been naughty and that he then beat her up. “It wasn’t my intention to kill her, but I beat her up too much," Sharif went on to tell the operator.

  Urfan Sharif left a note found near Sara's body, tucked under a pillow, in which he confessed to killing his daughter

  In his evidence at the Old Bailey, Sharif began by claiming his confessions were false before relenting and admitting “full responsibility” for Sara’s death. He unexpectedly told the jury: “I admit what I said in my phone call and my written note. Every single word.” However, he later denied intending to kill Sara and declined to change his plea. He told the court he was lying when he called his wife, Batool, a “psycho” earlier in the trial. Sharif admitted beating Sara, but denied biting or burning her. Batool and Malik did not give evidence during the trial. Mr Justice Cavanagh told the Old Bailey on Wednesday: "This case, above any other, has been stressful and traumatic."

  CCTV images of the family at Heathrow Airport

  Libby Clark, of the Crown Prosecution Service, said Sara was a "happy, outgoing and lively child" who died at the hands of those closest to her. "In a small house with such a big family, it would have been immediately obvious to all the adults what was happening to Sara. Yet none of them took any action to stop it or report it," she said. "They all played their part in the violence that led to her tragic death." NSPCC acting chief executive Maria Neophytou said the abuse Sara sustained raised questions regarding child safeguarding. "It is vital that the Child Safeguarding Practice Review identifies any ways in which Sara could have been better protected, in an effort to prevent such tragedies from happening in the future," she said. Surrey County Council's Rachael Wardell said the authority was determined to play a "full and active part in the forthcoming review" to understand the wider circumstances surrounding Sara's death. Sentencing is due to take place next week.
