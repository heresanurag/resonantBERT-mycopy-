title: Why Spain's government is exhuming General Franco's remains - BBC News
date: '2018-12-07'
section: General
url: http://www.bbc.co.uk/news/world-europe-46477888
content: |-
  The country’s current socialist government has promised to remove the body of fascist dictator General Franco from its mausoleum.

  The country’s current socialist government has promised to remove the body of fascist dictator General Franco from its mausoleum – one of a number of moves made in a country still trying to overcome its buried, divided past.
