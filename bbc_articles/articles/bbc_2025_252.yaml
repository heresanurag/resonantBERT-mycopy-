content: |-
  A video showing what the infamous fishing trip has finally been revealed.

  Uncle Bryn and Jason's mysterious fishing trip has long been the stuff of Gavin and Stacey legend.

  Now a video has been released which gives us a glimpse of the two on that very trip.

  In the clip Rob Brydon and Robert Wilfort play younger versions of their characters.

  "Who do we have here?" says Bryn. He gestures towards Jason who is holding a large fish.

  "No one will go hungry in this camp tonight," Bryn adds.

  The film then cuts and he asks: "Enjoy your soup?"

  Perhaps what happens on fishing trips should stay on fishing trips.
