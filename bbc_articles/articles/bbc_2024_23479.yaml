  A selection of striking news photographs taken around the world this week.

  Two unknown Scottish soldiers killed in World War One have been laid to rest in northern France, after their bodies were found during work to build a hospital. Soldiers from the Royal Regiment of Scotland carried the coffins during a service at the Loos British Cemetery of the Commonwealth War Graves Commission.
