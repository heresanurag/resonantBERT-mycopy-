content: |-
  Jack Draper cannot inspire Great Britain to a Davis Cup comeback win over Argentina as his first match since reaching the US Open semi-finals ends in defeat.

  Jack Draper was playing his first Davis Cup tie as British men's number one

  Jack Draper could not inspire Great Britain to a Davis Cup comeback win over Argentina as his first match since reaching the US Open semi-finals ended in defeat. The British number one was given an electrifying ovation in Manchester but the mood flattened as he went on to lose 7-6 (7-4) 7-5 against Francisco Cerundolo. Draper’s defeat means the host nation could not beat Argentina in the best-of-three tie and missed the chance to reach the Davis Cup Finals knockout stage at the earliest opportunity. British team-mate Dan Evans was beaten 6-2 7-5 by Tomas Martin Etcheverry in the first singles match earlier on Friday. Evans later teamed up with Neal Skupski to claim a consolation 6-3 7-5 win in the doubles against Maximo Gonzalez and Andres Molteni, leaving Argentina as 2-1 winners overall in the tie. Leon Smith’s squad, who beat Finland on Wednesday, would have progressed with two wins from their opening two ties. Instead, they are likely to need to beat Canada on Sunday in what could be a nerve-shredding contest. Britain’s defeat means Group D has been blown wide open and, with Argentina playing Finland on Saturday, any of the four nations could still finish in the top two. Only two teams from the Manchester group will progress to the 'Final Eight' event which takes place between 19-24 November in Malaga.

  Back on home turf following his exploits in New York, Draper had been the centre of attention in Manchester - even before playing. The 22-year-old British number one was rested for the opening tie against Finland, with Evans and rookie Billy Harris justifying Smith's decision with victories. But, after being the talk of the town and receiving wonderful receptions when introduced to the crowd before the ties, Draper had the chance to make an important impact on the court against Argentina. The left-hander had a short turnaround - emotionally and physically - after Friday's semi-final defeat by world number one Jannik Sinner in New York. While understandably not at his best, Draper said he “felt good” and had plenty of chances to avoid a straight-set defeat. Unable to convert eight of 10 break points was a telling - and unwanted - statistic for the Briton. Cerundolo, a clay-court specialist who is ranked 31st in the world, produced an impressive level which rarely dropped throughout. No wonder he described it as "the match of my life" afterwards. Draper was regularly punished by Cerundolo's easy power on the forehand wing, while the Argentine produced a magical drop-shot to create a break-back point which he took for 1-1 in the second set. Not taking any of three break points at 1-1, plus another three at 4-4, proved crucial as Cerundolo pounced at 6-5 to earn a rare hard-court victory for the South Americans. “A lot of the time you play someone and they’re playing high level, you think you’ll get your chances, their level will drop, but his didn’t today. “Fair play to him, he beat me fair and square.”

