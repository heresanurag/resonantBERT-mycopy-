  Evans, 34, is the most experienced player in a British squad which has a fresh look following the retirement of Andy Murray and Cameron Norrie's absence with an arm injury. On the day where he surpassed Mike Sangster to go second in the British all-time list of Davis Cup ties played, Evans was also left to rue not being able to convert his chances against Etcheverry. Seeing four break points come and go in a gruelling fourth game was pivotal. Sensing a freedom to attack in the fifth game, 34th-ranked Etcheverry quickly broke to take the wind out of Evans' sails and rattled off the next three games for the opening set. It has been a tough year for Evans, who has dropped out of the world's 150, and his confidence dipped dramatically. Little gets the best out of Evans like the Davis Cup, however, and he showed trademark tenacity to reset in the second set. Rediscovering his serve helped as the pair traded holds, but the frustration and fragility reappeared as he crucially lost serve in the 11th game. More resistance came as Evans fought off five match points - and created three break points - before a relieved Etcheverry eventually served out victory.

  Dan Evans was playing his 27th Davis Cup tie for Great Britain - moving into sole second place for the most appearances
