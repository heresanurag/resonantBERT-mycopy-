id: bbc_2018_1507
title: Lana Del Rey's defiant response to stalker - BBC News
date: '2018-02-07'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-42976541
content: |-
  "You can't let one person stop you from doing your favorite things," she told the crowd in Atlanta.

  US singer Lana Del Rey spoke emotionally to her fans after a man was arrested with a knife last week at her concert in Orlando, having made threats to kidnap her.

  "You can't let one person stop you from doing your favourite things," she told the crowd in Atlanta.
