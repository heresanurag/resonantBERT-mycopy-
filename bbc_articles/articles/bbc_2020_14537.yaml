  Tennant was one of the most famous British models of the last 30 years, alongside the likes of Campbell and Kate Moss, and later worked on campaigns to reduce the environmental impact of fast fashion.

  US model and actress Cindy Crawford, meanwhile, added that she "always admired her fearlessness and style".

  On Wednesday, designers Versace - one of many big labels that Tennant modelled for - were among the first to pay tribute to the late runway star.

