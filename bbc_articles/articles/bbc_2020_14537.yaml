  Beckham, like McCartney, posted a picture of the 1990s fashion star online, alongside her own memories of her.

  "She was an incredible talent and someone I had so much admiration and respect for," wrote the Spice Girl-turned-designer.

  "I just loved everything about her. My thoughts are with her family," she added.

