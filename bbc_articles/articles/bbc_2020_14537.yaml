content: |-
  Big-name fashion designers and models pay tribute to the late star, who has died aged 50.

  (Left to right) Designer Stella McCartney and models Stella Tennant and Naomi Campbell

  Big-name fashion designers including Stella McCartney and Victoria Beckham have paid tribute to the late model Stella Tennant, who has died aged 50.

  Fellow models Naomi Campbell and Cindy Crawford have also offered tributes.

  The Scottish catwalk icon was confirmed dead by her family on Wednesday, and police said there were no suspicious circumstances.

  "My darling Stella, I love you and will miss you so, so terribly," wrote McCartney on Instagram.

  "What sad, horrific news to end this already shocking year! My heart goes out to your stunning family who must be in such undeserving pain. I am speechless."

  "Rest in peace, you inspiring woman," she added. "Your soul and inner beauty exceeded the external perfection, Stella. May you ride high above us all on the most perfect horse, eternally in peace."

  Campbell described Tennant "a class act in every way. Humble, loyal, balanced, practical, a rare beauty inside and out".

