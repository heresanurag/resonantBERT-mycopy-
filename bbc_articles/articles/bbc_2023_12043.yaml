title: 'Women''s World Cup: Spain''s jubilant champions arrive in Madrid - BBC News'
date: '2023-08-22'
section: General
url: http://www.bbc.co.uk/news/world-66576890
content: |-
  The Spanish football team celebrate their win as they land at Madrid airport.

  The Spanish football team continued to celebrate their Women's World Cup win as they landed in Madrid.

  Defender Ivana Andrés held the trophy aloft as they exited the plane.

  "This is amazing, amazing, just amazing," said fellow player Irene Paredes, clutching the golden trophy, as she boarded the team's coach.

  Spain beat England 1-0 in the World Cup final in Sydney on Sunday.
