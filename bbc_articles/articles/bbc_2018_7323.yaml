  \ this content choose ‘accept and continue’. The BBC is not responsible for the\
  \ content of external sites.\n\nParts of Oxford experienced flash flooding overnight.\
  \ Didcot Parkway station was more than a foot under water and 100 people had to\
  \ be evacuated from the Old Fire Station arts centre after water started coming\
  \ through the roof.\n\nIn Herefordshire, homes were flooded and lightning started\
  \ a small fire at a house in Colwall.\n\nThis Twitter post cannot be displayed in\
