  \ The BBC is not responsible for the content of external sites.\n\nA yellow warning\
  \ for rain covering much of the UK is in place until 22:00 BST on Friday.\n\nHeavy\
  \ showers and thunderstorms could cause sudden flooding, power cuts and a potential\
  \ risk to life and property, the Met Office warned.\n\nMuch of the rest of the country,\
  \ however, can expect warm weather and sunshine over the weekend.\n\nThis Twitter\
