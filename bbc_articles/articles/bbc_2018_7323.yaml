  \nThe Environment Agency has urged people to check their flood risk - especially\
  \ if they are travelling to unfamiliar areas over half term.\n\nThe organisation\
  \ also said that south-west England, Hampshire and the West Midlands were most at\
  \ risk, with urban areas most likely to suffer from any flash flooding later.\n\n\
  Kate Marks, flood duty manager at the Environment Agency, said teams would work\
  \ \"24/7\" to operate flood defences, clear blockages in rivers and streams and\
  \ offer support at incidents of surface water flooding.\n\nThis video can not be\
