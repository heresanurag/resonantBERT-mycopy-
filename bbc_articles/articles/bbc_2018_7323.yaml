title: 'UK weather: Rain and storms cause travel delays - BBC News'
date: '2018-06-01'
section: UK
url: http://www.bbc.co.uk/news/uk-44317432
content: "A Met Office yellow warning is in force across northern and western parts\
  \ of the UK.\n\nThis video can not be played To play this video you need to enable\
  \ JavaScript in your browser. BBC Weather's Ben Rich says thunderstorms will drift\
  \ north and westwards\n\nTravellers are dealing with disruption after torrential\
  \ rain and flooding hit parts of the UK - with warnings of more severe weather to\
  \ come.\n\nRail networks have been affected by the storms, and a number of roads\
  \ closed.\n\nSome flights at Gatwick have been cancelled, while several travellers\
  \ said they had been \"stranded\" abroad.\n\nA Met Office yellow warning for rain\
  \ is in force across northern and western parts of the UK, as heavy showers are\
  \ due to continue throughout Friday.\n\nA spokesman for Gatwick Airport advised\
  \ passengers to check their flight status with their airline, adding: \"Due to thunderstorms\
  \ and fog across Europe, we are experiencing some delays and cancellations to flights\
  \ today.\"\n\nBritish Airways also said it was was \"working tirelessly\" to minimise\
  \ disruption, after storms caused problems for airlines on Thursday.\n\nEasyJet\
  \ cancelled 48 flights in and out of Gatwick Airport amid yesterday's bad weather,\
  \ while Ryanair cancelled or delayed a \"small number\" of flights.\n\nChris Harper,\
  \ from Epsom, has been trying to get home from Paris since Thursday evening, but\
  \ has had two flights with EasyJet cancelled.\n\n\"Myself and 179 passengers were\
  \ left stranded at the airport last night by EasyJet,\" he said.\n\nHe said he hoped\
  \ to return to the UK on a flight on Friday night.\n\nThis Twitter post cannot be\
  \ displayed in your browser. Please enable Javascript or try a different browser.\
