  \ content of external sites.\n\nMeanwhile, Great Western Railway trains, which serve\
  \ south Wales, and southern and western England, were earlier running more slowly\
  \ than usual after Network Rail imposed a precautionary blanket speed restriction.\n\
  \nAnd there was severe disruption across the Northern rail network.\n\nNational\
  \ Rail said services across central England were expected to be disrupted during\
  \ the morning.\n\nThis Twitter post cannot be displayed in your browser. Please\
