title: 'Archie Battersbee: Family devastated as legal routes exhausted - BBC News'
date: '2022-08-06'
section: Essex
url: http://www.bbc.co.uk/news/uk-england-essex-62444331
content: |-
  The mother of Archie Battersbee says she has done everything she promised her son she would do.

  Archie Battersbee suffered brain damage in an incident at home on 7 April and has not regained consciousness

  The mother of Archie Battersbee says she has done everything she promised her son she would do as the family prepare for his life support to be withdrawn on Saturday.

  They had asked the European Court of Human Rights (ECHR) to intervene, but were told it "fell outside" its scope.

  The 12-year-old must spend his final days in hospital after the High Court ruled he could not move to a hospice.

  Her son has not regained consciousness since being found at his home in Southend, Essex, in April.

  In an interview with Sky News, Ms Dance said: "The last however many weeks since 7 April, I don't think there's been a day that hasn't been awful really."

  She added: "It's been really hard. Despite the hard strong face and appearance obviously in front of the cameras up until now, I've been pretty broken."

  She said the hospital had made it clear there were no more options and that life support would be withdrawn on Saturday.

  Asked if there was anything more she could do, Ms Dance, of Southend, Essex, said: "No. I've done everything that I promised my little boy I'd do. And I've done it."

  Archie's mother, Hollie Dance, had said she wanted him "in a peaceful hospice to say goodbye"

  The family's long legal battle to continue his life-sustaining treatment ended when the ECHR said it "would not interfere" with the UK courts' rulings, paving the way for support to be stopped.

  They hoped to move him to a hospice but doctors warned he was too unstable to move by ambulance and it would "hasten premature deterioration".

  The High Court ruled Archie should remain at Royal London Hospital in Whitechapel, east London.

  The family sought permission to appeal against the decision, but that bid was rejected by three justices at the Court of Appeal.

  They then asked the ECHR to intervene, but late on Friday, the court said the request could not be dealt with.

  A spokesman for campaign group Christian Concern, which is supporting Archie's family, said: "All legal routes have been exhausted.

  "The family are devastated and are spending precious time with Archie."

  Archie's family said a breakdown in trust meant Archie would not die with peace and dignity in hospital

  Archie was found unconscious at home and his mother believes he may have been taking part in an online challenge.

  He suffered "catastrophic" brain injuries and doctors think it is "highly likely" he is brain-stem dead.

  Life-sustaining support, including mechanical ventilation and drug treatments, has been in place since April.

  In her ruling earlier on Friday, taking into account medical evidence, Mrs Justice Theis concluded it was not in Archie's best interests to be moved.

  She said: "Archie's best interests must remain at the core of any conclusions reached by this court.

  "When considering the wishes of the family, why those wishes are held, the facilities at the hospice, what Archie is likely to have wanted... the risks involved in a transfer... and the increasing fragility of his medical condition, I am satisfied... he should remain at the hospital when treatment is withdrawn."

  Mrs Justice Theis also noted Archie's family's "unconditional love and dedication", which she said had been a "golden thread that runs through this case".

  "I hope now Archie can be afforded the opportunity for him to die in peaceful circumstances, with the family who meant so much to him as he clearly does to them."

  Archie is found unconscious by his mother after an incident at their home in Essex. He is taken to Southend Hospital. Archie is transferred to The Royal London Hospital in Whitechapel where he has been treated ever since. The NHS trust that runs the Royal London starts High Court proceedings by asking for Archie to undergo brain stem testing. Mrs Justice Arbuthnot rules that brain stem testing should be carried out. Two specialists try to administer brain stem function tests, but they are unable to as Archie did not respond to a peripheral nerve stimulation test, a precursor to the brain stem test. A hearing is held to decide if further MRI scans should be conducted. Archie's parents did not consent on the basis that moving Archie could harm him. The court approves further MRI scans, which are carried out on 31 May. A final hearing is held to hear evidence on whether Archie's life-support treatment should continue. The High Court judge rules that Archie is "dead" based on MRI scan results and that treatment could be withdrawn. The family ask the Court of Appeal to reconsider the case. The Court of Appeal says that a new hearing to determine Archie's best interests should take place. A new hearing is held in the High Court with evidence given before Mr Justice Hayden. Mr Justice Hayden rules that life-support treatment should end, saying continuing it is "futile". Three Court of Appeal judges support the High Court ruling that treatment can end. The Supreme Court rules out intervening in the case and supports the Court of Appeal ruling. The family make an application to the United Nations. Archie’s mother and father, Paul Battersbee, outside the Royal London Hospital A UN Committee writes to the UK government asking for a delay in withdrawing treatment while they consider the case. The government asks for an urgent hearing to review the case. The Court of Appeal refuses to postpone withdrawal of treatment until the UN can hear the case. The Supreme Court refuse the family's application for permission to appeal the Court of Appeal ruling. European Court of Human Rights refuses an application from the family to postpone the withdrawal of Archie’s life support. Archie's parents make a legal application to move their son to a hospice for end of life care. A High Court judge rules that Archie cannot be moved to a hospice for withdrawal of treatment. Archie passes away at the Royal London Hospital after treatment is withdrawn in line with court rulings about his best interests. Members of his family are at his bedside.

