  Incredible images from the Olympic Games

  The Paris Olympics has come to an end in a captivating closing ceremony in the French capital, bringing down the curtain on 16 days of thrilling action.

  More than 10,000 athletes competed in Paris across hundreds of events in a hugely entertaining Olympic Games.

  The city's landmarks provided an enthralling backdrop for many of the events.

  Some events were held outside the capital, with the sailing and windsurfing in the Bay of Marseilles and the surfing contest almost 10,000 miles away in Tahiti, French Polynesia.

  For the athletes, the Games was the culmination of years of training and sacrifice.

  For some the hard work paid off.

  But for others the Games ended in heartbreak.

  After the drama and emotion of the Olympics, the countdown now begins for the Paralympic Games, which begins on 28 August and is also being held in Paris.
