  Deputy District Attorney Habib Balian criticised the former DA George Gascón, whose backing of the resentencing effort allowed it to move forward. He said the decision by Gascón to announce his support for the brothers to be resentenced just before the November election, which Gascón lost to Hochman by a wide margin, was politically driven. The DA's office has argued the brothers have not fully taken responsibility and have continued to grasp at alleged lies in the case to shed blame.
  • None Three possible paths to freedom: What's next for the Menendez brothers?
  • None Menendez brothers feel 'hope' for parole after decades in jail Mark Geragos, an attorney for the Menendez brothers, argued that the district attorney's office was more concerned with re-litigating the previous trial and hadn't examined what the pair had been doing the last 35 years in prison. The pair had completed schooling while behind bars and worked to start rehabilitation programs for disabled and elderly inmates, along with incarcerated individuals suffering with trauma, he said. The judge ruled that prosecutors failed to show why the resentencing effort should not continue and emphasised the importance of maintaining consistency even with shifts in leadership. "There's no new information," the judge said. "None of this is really new. They've stuck with their story. It goes to whether they've been rehabilitated." The case was thrust back into the public eye last year as new evidence emerged and the release of a new Netflix drama, Monsters: The Lyle and Erik Menendez Story. The series introduced the case to a new generation and garnered attention from celebrities - including Kim Kardashian and Rosie O'Donnell - who called for the brothers to be released.

