  Legal experts say the outcome of the Menendez brothers' resentencing hearing could take several forms, depending on how the judge rules. The most straightforward path would be to deny resentencing altogether, leaving their current sentence—life without the possibility of parole—intact. This is the outcome Los Angeles District Attorney Nathan Hochman is pushing for, arguing the brothers have not fully accepted responsibility for their crimes and therefore don't qualify for a reduced sentence. Alternatively, the court could side with former DA George Gascón's earlier recommendation and resentence the brothers to 50 years to life. This would make them immediately eligible for parole, as they've already served more than 30 years. But eligibility doesn't guarantee release; they would still need to convince a parole board they are no longer a danger to society. Another possibility is that the judge opts for a modified sentence that reduces their punishment but does not immediately open the door to parole. In that case, the brothers could face several more years behind bars before becoming eligible. The resentencing bid is one of three routes the brothers have been chasing in recent months in hopes of being freed. California Gov Gavin Newsom is still weighing another option: granting the brothers clemency. Newsom said the brothers were scheduled to appear before the state's parole board on 13 June to discuss the findings of a risk assessment he'd ordered, examining whether Erik and Lyle pose a danger to society. Depending on the results, the governor could grant clemency, commuting their sentences to make them eligible for parole or even releasing them outright. The third route the brothers have eyed - asking for a new trial - hit a roadblock when Hochman's office announced they would oppose the request.
