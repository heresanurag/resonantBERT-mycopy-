title: 'Stalybridge mill fire: Drone footage shows extent of blaze - BBC News'
date: '2018-03-19'
section: General
url: http://www.bbc.co.uk/news/uk-england-manchester-43453055
content: |-
  At the height of the fire at Ray Mill, Stalybridge, five storeys of the building were alight.

  Drone footage has show the extent of a major fire at a mill building in Greater Manchester.

  The fire broke out late on Saturday night at Ray Mill, Stalybridge.

  At its height, five storeys of the building were alight.
