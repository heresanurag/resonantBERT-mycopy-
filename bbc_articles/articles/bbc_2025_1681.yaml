title: Lava and smoke emerge from a snowy Mount Etna - BBC News
date: '2025-02-20'
section: General
url: http://www.bbc.co.uk/news/videos/c1kmdvynz4wo
content: |-
  Drone footage shows plumes of smoke and molten lava spewing from Europe's most active volcano.

  Lava and ash emissions have increased in the last few days, primarily from the summit craters.

  Located on the Italian island of Sicily, Etna is also Europe's most active volcano, though its outbursts rarely cause significant damage.
