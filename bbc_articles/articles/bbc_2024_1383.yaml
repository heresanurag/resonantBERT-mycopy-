title: 'Haverfordwest: Papaipit Linse charged with murdering boy, seven - BBC News'
date: '2024-01-12'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-67959335
content: |-
  Papaipit Linse is due to appear in court on Saturday, accused of killing the boy.

  Police were called to Upper Market Street in Haverfordwest on Wednesday

  A woman has been charged with the murder of a seven-year-old boy in a town in west Wales.

  Police were called to Upper Market Street in Haverfordwest, Pembrokeshire, at about 10:45 GMT on Wednesday.

  Dyfed-Powys Police said the boy died shortly after officers were called.

  On Friday night, the force said Papaipit Linse, 42, who was arrested at the scene, had been charged with murder and would appear at Swansea Magistrates' Court on Saturday.
