title: New York skyscrapers hidden by snow storm - BBC News
date: '2024-03-03'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68288126
content: |-
  Videos from the city and parts of the state show what areas look like after being hit by the snow storm.

  Videos from New York City show the world famous skyline obscured by snow as a powerful winter storm barrels across the north-eastern US.

  Other parts of the state also show areas blanketed by the storm which could bring the highest snowfall in two years.

