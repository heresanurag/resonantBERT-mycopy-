  The Paris metro was not the only transport system to honour its World Cup team.

  Brussels changed Arts-Loi to Hazarts-Loi, in reference to Belgium playmaker Eden Hazard. Belgium won third place at the World Cup and the team enjoyed their own heroes' welcome in the centre of Brussels on Sunday.

