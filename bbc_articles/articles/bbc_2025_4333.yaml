content: |-
  Sir Keir Starmer's plans to form a "coalition of the willing" to end the war in Ukraine leads most of Monday's papers.

  'New Ukraine peace deal' and Zelensky's 'king-size welcome'

  The summit of European leaders in London on Saturday to discuss the war in Ukraine dominates the front pages. The i paper says, external Britain and France have "taken over" efforts to secure a peace deal with Russia, after Friday's shouting match between Donald Trump and President Zelensky. The Times says, external Sir Keir Starmer and President Macron intend to act as a "bridge" to the US, in negotiations about an agreement. But, the paper says, there's further signs of worsening relations between Kyiv and Washington, after allies of President Trump suggested on Sunday that President Zelensky would have to stand down, as part of any deal. According to the Guardian, external, the prime minister's proposed plan would "counter-balance" the talks already under way between the US and Russia, which have so far involved neither Ukraine, nor European countries. Government sources tell the paper that while the main objective of securing an American security guarantee has yet to be been achieved, they are delighted that the prime minister has shown that post-Brexit Britain can play a global leadership role. Senior allies of the prime minister tell the Times that President Zelensky should learn from Sir Keir's approach. "He needs to play the game" a source explains, adding, "Trump wants respect."

