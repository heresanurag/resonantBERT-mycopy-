title: 'Six Nations rights deal: BBC and ITV agree new free-to-air TV deal to 2029
  - BBC Sport'
date: '2025-03-14'
section: Rugby Union
url: http://www.bbc.co.uk/sport/rugby-union/articles/c0kg15j0kl6o
content: |-
  The BBC and ITV agree a new four-year deal for the Men's Six Nations to remain on free-to-air TV until 2029.

  Ireland won the Men's Six Nations last year

  The BBC and ITV have agreed a new four-year deal for the Men's Six Nations to remain on free-to-air TV until 2029. BBC Sport will provide live coverage, TV highlights and digital clips of the championship, including five matches involving Scotland and Wales each year. ITV will broadcast 10 live games each season including every England fixture for the duration of the deal, which starts in 2026. The BBC will also offer live coverage of the Women's Six Nations and Under-20 Six Nations across TV and iPlayer, and continue providing live audio commentary across platforms including radio, BBC Sounds and the BBC Sport website and app. "This deal is fantastic news for rugby and the BBC, keeping the sport accessible for as many people as possible," BBC director of sport Alex Kay-Jelski said. "We are proud to bring the biggest sporting moments to our audiences and this new deal is the perfect news ahead of our exclusive broadcast coverage of the Women's Rugby World Cup this summer. "This is an exciting time for rugby, and we are proud to share every thrilling moment with audiences across the UK." ITV director of sport Niall Sloane said it was a "monumental deal for rugby fans". "We are proud to be the home of all England matches for the duration of the deal including England's much revered clashes with Ireland, Scotland and Wales," he added. "The tournament is always one of the sporting highlights of the year, so we look forward to continuing to work with Six Nations Rugby and each union and federation moving forward."

  In January, RugbyPass reported that TNT Sports was considering bidding for the rights,, external but the broadcaster responded by saying it would be "very challenging", external to buy because of the links to free-to-air TV. Last month England captain Maro Itoje called for Six Nations organisers to keep the championship on free-to-air TV, external on the grounds that rugby union needs more exposure. The tournament has been free to air since 2003. Six Nations Rugby chief executive Tom Harrison added: "The significance of these new and innovative free to air partnerships for the Six Nations cannot be overstated. "By strengthening rugby's relationships with ITV and BBC, the sport can continue to give as many fans as possible in the UK access to enjoy live coverage of the Six Nations." Rugby Football Union chief executive Bill Sweeney said the organisation was "pleased" to have retained a broadcast deal with the BBC and ITV. "It is testament to the significance of the Six Nations that, in an increasingly challenging and competitive broadcast market, ITV and BBC remain committed to providing free-to-air coverage of rugby's most loved annual championship and ensuring maximum visibility of our sport," he added. "We have worked hard to maintain Six Nations on free-to-air channels, and also achieving our financial targets, which is critical in supporting RFU investment in the sport." Culture secretary Lisa Nandy said the Six Nations is "one of the crown jewels in the sporting calendar" that brings the home nations together. "I am very pleased that it will remain on free-to-air television so that it can be enjoyed by fans and inspire the next generation of rugby players right across the UK," she added.

