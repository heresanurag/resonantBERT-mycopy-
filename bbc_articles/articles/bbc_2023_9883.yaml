title: 'Bangor: Man shot in the leg in Greenside, Whitehill - BBC News'
date: '2023-06-02'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-65785226
content: |-
  Police appeal for information after an attack in the Whitehill estate at about 23:00 BST on Thursday.

  About 15 officers were at the scene on Friday morning

  Police have appealed for information after a man was shot in the leg in Bangor, County Down.

  Officers said the incident happened in the Greenside area of the Whitehill estate.

  The attack was reported to police shortly after 23:00 BST on Thursday - the man is understood to have been shot a short time earlier.

  PSNI Insp Donnelly said injuries inflicted on the man were "a stark violation of his basic human rights".

  The man was shot close to Valentine Playing Fields, a popular spot for sport and dog walkers

  "Attacks like these not only place the victim at risk, but also the local community," Insp Donnelly added.

  On Friday morning, police serched the area on the edge of Valentine Playing Fields, near Bangor Aurora Aquatic and Leisure Complex.
