  In his Autumn Statement, the chancellor says his plan seeks to tackle the cost of living crisis.

  Opening his Autumn Statement, the chancellor has said he will deliver a plan to tackle the cost of living crisis and "rebuild our economy".

  Jeremy Hunt told MPs he would protect the vulnerable as to "be British is to be compassionate" and he was speaking for a compassionate Conservative government.

  Live: Chancellor setting out billions in tax rises and spending cuts
