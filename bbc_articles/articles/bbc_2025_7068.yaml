content: |-
  Newsreel footage from 1960 shows cubs Aurora and Polaris playing in their enclosure at Whipsnade.

  Archive video shows the first polar bear twins born in the UK exploring their enclosure.

  The black-and-white newsreel footage from April 1960 was filmed at Whipsnade Zoo in Bedfordshire.

  Female cubs Aurora and Polaris are seen enjoying some playtime with their mother Sonja.

  Whipsnade first housed a polar bear in the 1930s but stopped keeping them in 1984.

