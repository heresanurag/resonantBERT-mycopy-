title: 'Thailand shooting: Gunman shot dead by security forces - BBC News'
date: '2020-02-09'
section: General
url: http://www.bbc.co.uk/news/world-asia-51431822
content: |-
  At least 20 people were killed and dozens more injured in the attack in Nakhon Ratchasima.

  Security forces have shot dead a gunman who killed at least 20 people in Nakhon Ratchasima, Thailand, say Thai police.
