title: Joe Biden signs with Los Angeles talent agency CAA - BBC News
date: '2025-02-04'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cvgl55wng87o
content: |-
  The former president was signed to the same agency between 2017 to 2020, which also represents the Obamas.

  Former US President Joe Biden has signed with a Los Angeles talent agency - marking a significant step in shaping his post-presidency career. The signing marks a reunion with Creative Artists Agency (CAA), which previously represented him from 2017 to 2020. "President Biden is one of America's most respected and influential voices in national and global affairs," Richard Lovett, co-chair of CAA, said in a statement. "His lifelong commitment to public service is one of unity, optimism, dignity, and possibility," Mr Lovett said. "We are profoundly honored to partner with him again." The talent agency also has ties to former President Barack Obama and former First Lady Michelle Obama.

  Mr Biden, 82, has remained largely quiet about his plans following his five-decade career in public service, but when leaving the White House in January, he reassured supporters saying, "We're leaving office, we're not leaving the fight." With only two weeks having passed since his departure from office, there's no clear indication that he has a new book or project in the works.

  The Bidens bid farewell to staff just over two weeks ago on the day Donald Trump was sworn in as president

  During his previous stint signed to the talent agency, he published his memoir, Promise Me, Dad: A Year of Hope, Hardship, and Purpose in 2017. The book, which chronicled the loss of his eldest son, Beau, became a New York Times number one bestseller and inspired his American Promise book tour, widely seen as a stepping stone to his 2020 presidential bid. While keeping a relatively low profile, the former president has been spotted around his Delaware home and remains in contact with former aides and associates. He also recently became a great-grandfather, with the birth of his granddaughter, Naomi's son. Though CAA is usually tied with big movie stars and A-list celebrities, it's not uncommon for the agency to also work with politicians and social advocacy groups. The Obamas' partnership with CAA through their production company, Higher Ground has led to the creation of award-winning films and television shows, including the Oscar-winning documentary, American Factory. Additionally, former presidential nominee and Secretary of State Hillary Clinton signed with CAA to represent her book projects, including Hard Choices, which chronicled her tenure as America's top diplomat.
