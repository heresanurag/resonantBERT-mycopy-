title: Five women make further claims against Norfolk head Greg Hill - BBC News
date: '2024-10-01'
section: Norfolk
url: http://www.bbc.co.uk/news/articles/c4gxxjxgzjyo
content: |-
  Five staff members say a head teacher made sexually inappropriate comments towards them.

  'Head teacher said he imagined me in a bikini'

  Hannah Gidman said Hill acted inappropriately towards her

  Further allegations of inappropriate behaviour have been made by female staff members against a head teacher who was convicted of harassment earlier this year. Gregory Hill was jailed for 20 weeks in August after he was found to have made unwanted advances over an 11-month period towards a 23-year-old trainee, while working at Howard Junior School in King's Lynn, Norfolk. Hannah Gidman, 26, worked at the school in 2019, and said that Hill also acted inappropriately towards her, such as telling her he had imagined her in a bikini. The BBC has spoken to four other women who claimed they experienced similar behaviour from Hill when working at the school. Hill did not respond to the allegations.

  Head teacher Gregory Hill was found to have harassed a colleague for almost a year

  Ms Gidman had recently qualified as a teacher when she moved to the UK from Australia in 2019. She was 22 when she began working at Howard Junior School and said her first interaction with Hill was positive but "intense". She said problems began when she went out for dinner with colleagues and Hill, then 44, complained that he had not been invited. “That was the first red flag,” she said.

  Hannah Gidman joined the Howard Junior School after she moved from Australia to the UK

  She added the head teacher later told her he could imagine her on the beach in a bikini, which she said made her feel "icky" and "uncomfortable". Ms Gidman said Hill would make "sexualising comments" towards her “at least once a week”. She did not complain at the time as she was worried that it could lead to her losing her job. “I don’t think anyone should have to go through what me and other people I worked with went through,” she said. Ms Gidman did not tell the police and Hill did not respond to the BBC’s invitation to comment on any of the allegations.

  Ms Gidman said Gregory Hill (far right) would regularly make "sexualising comments" to her

  In addition to Ms Gidman's claims, four other women - who have asked to remain anonymous - said they experienced inappropriate behaviour from Hill when they worked with him. None of these women were involved in Hill's conviction for harassment in August. They all allege Hill would frequently comment on their looks. “My looks should have nothing to do with how I'm doing my job,” one of the women said. One woman told the BBC that Hill made them constantly feel “uncomfortable”, and his conduct made her leave her job, which she "loved". The BBC asked the women why they did not make complaints at the time, and they said they were worried it could lead them to lose their jobs. Hill did not respond to the BBC’s invitation to comment on any of the allegations.

