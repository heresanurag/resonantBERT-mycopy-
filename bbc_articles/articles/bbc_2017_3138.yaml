content: |-
  Chelsea Cameron explains why she's grateful to her drug addict parents.

  A woman raised by drug-addicted parents has written a letter to thank them.

  Chelsea Cameron's parents missed many important moments as she grew up, like exam results and prize giving.

  She told the Victoria Derbyshire programme why she's grateful.
