title: Reaction as MPs discuss Commons culture - BBC News
date: '2019-09-26'
section: Parliaments
url: http://www.bbc.co.uk/news/live/uk-politics-parliaments-49837185
content: |-
  MPs condemn Boris Johnson's language over Brexit and accuse him of "inflaming divisions".

  Miller: 'Part of the cut and thrust of politics'

  Maria Miller says MPs "faced a perfect storm" in Parliament yesterday, debating questions "at the very heart of the principles of democracy", such as freedom of speech and the rule of law. The Tory MP says both language and behaviour matter in politics. But she says the accusations being levelled at the prime minister were examples of "inflammatory language accusing others of being inflammatory", and that is "as damaging as damaging can be". "We must tread carefully", she says, comparing last's night's debate as "high politics" which "risks people feeling as if they can't speak out". And she defends the much-repeated phrase used by Boris Johnson - "the surrender bill". "It is not [inflammatory]. It is simply explaining to people who did not... read it word for word," she says. "This is part of the cut and thrust of politics."
