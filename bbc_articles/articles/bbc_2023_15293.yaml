  British sprinter Bianca Williams tells BBC Sport that she feels "hurt and scared" after she and her partner Ricardo dos Santos were stopped by police.

  British sprinter Bianca Williams tells BBC Sport she feels "hurt and scared" after she and partner Ricardo dos Santos were stopped by police.

  They have accused the Metropolitan Police of racial profiling and acting violently towards them.

  Police say the vehicle had been on the wrong side of the road and the driver sped off when asked to stop.
