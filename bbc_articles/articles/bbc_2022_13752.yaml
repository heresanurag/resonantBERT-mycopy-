id: bbc_2022_13752
title: 'Tory leadership: Labour ''not complacent'', says Keir Starmer - BBC News'
date: '2022-10-23'
section: General
url: http://www.bbc.co.uk/news/uk-politics-63363877
content: |-
  Sir Keir Starmer is asked whether the party's current lead in the polls is down to Tory party tribulations.

  Labour leader Sir Keir Starmer has said he is not complacent about the party's current lead in the polls - and that every single vote must be fought for.

  He told the BBC's Laura Kuenssberg he preferred not to focus on the ''chaotic circus'' in the top ranks of the Tory party.
