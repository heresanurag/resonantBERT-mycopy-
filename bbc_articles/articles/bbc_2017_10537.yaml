  The global fast food chain apologised to fans on social media but repeated their warning that the release was going to be "super limited".

  Pots of the sauce are now listed for sale on online auction websites for hundreds of dollars.

  Angry customers posted pictures of breaded chicken and dipping sauces from other fast-food chains in protest at the stunt.

  Others posted pictures of large bowls of the sauce they had made for themselves at home.
