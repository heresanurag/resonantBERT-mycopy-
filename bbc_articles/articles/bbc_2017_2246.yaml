id: bbc_2017_2246
title: Icy US road pile-up caught on camera - BBC News
date: '2017-02-04'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38865942
content: |-
  Amateur footage captures a pile-up on an icy stretch of road in Oregon, but no-one is seriously hurt.

  An icy stretch of road in Oregon in the US caused a 30-vehicle pile-up.

  The crashes were filmed by a onlooker, with all the people involved escaping serious injury.
