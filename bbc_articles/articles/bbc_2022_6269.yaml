  The PM pledges to look at "all the measures" needed to help people struggling after inflation hits a 40-year high.

  Will the UK stay at wrong end of G7 inflation league table?

  The raw headline figures among the major economies now show the UK has the highest inflation in the G7. Now, it is important to note that this is just a single month and there are important methodological differences in how inflation is calculated, especially with the US. However, the comparison tells a broad story - for example, versus France, where inflation is about half the level in UK. This is a direct result of the French government forcing mainly state-owned energy companies to limit electricity bill rises to single digits, rather close to the presidential election. The shareholders of EDF paid the price. It is well worth watching if the UK stays at the wrong end of this league table. The IMF recently predicted UK high inflation would linger for longer - over the course of next year being the highest in the G7 - and higher than all EU members, and only exceeded in the G20 by crisis-ridden Argentina, Turkey and Russia. Many economists predicted that as a result of the post-Brexit end to free-flowing trade with the EU, and a shortage of European workers, that the UK would be more inflation-prone. So far the UK record has, more or less, moved in line with the rest of the world. The question is if this might be the start of a divergence.
