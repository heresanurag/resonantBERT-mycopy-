content: |-
  Danny Hodgson, who was in a coma, will be allowed home for a short family celebration.

  Danny Hodgson's family paid tribute to the staff at Fiona Stanley Hospital in Perth that had cared for him

  A footballer who suffered major brain injuries after being punched will be allowed out of hospital for Christmas, his family have said.

  Danny Hodgson, 26 and originally from Cleator Moor in Cumbria, was left in a coma by an unprovoked attack in September in Perth, Australia.

  His family said having him out of hospital was the "perfect gift".

  A 17-year-old boy is due to be sentenced in January after admitting causing grievous bodily harm.

  Following the attack on 5 September, Mr Hodgson - who played for Western Australian side ECU Joondalup - spent weeks in the intensive care unit at Royal Perth Hospital, before being moved to a rehabilitation hospital.

  Danny Hodgson suffered serious brain injuries after being punched

  His parents Nicola and Peter, who have flown to Perth to be with him, said they had been on an "unimaginable journey that no family should ever have to take".

  They released a photograph on Christmas Eve of the family together, and in a statement wished everyone a Merry Christmas.

  "Today, Danny is preparing to leave hospital for a very short time with his beautiful [partner] Jess at his side to be part of our family Christmas," they said.

  "Our heartfelt appreciation goes to the medical and rehabilitation staff at Fiona Stanley Hospital who have helped to make this possible.

  "Danny's home visit is the most perfect gift we could ask for and all the proof we need that Christmas miracles do happen."

