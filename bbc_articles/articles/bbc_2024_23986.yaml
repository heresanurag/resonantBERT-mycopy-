title: 'Watch: Council ''failed'' Grenfell residents says leader - BBC News'
date: '2024-09-05'
section: General
url: http://www.bbc.co.uk/news/videos/c1k313ne780o
content: |-
  Council leader Elizabeth Campbell, told the BBC she accepted the findings of the report.

  Kensington and Chelsea Council leader Elizabeth Campbell, who took on her role shortly after the fire, has told the BBC that she accepts all the findings of the report.

  She added that she wanted to apologise to residents of Grenfell Tower for being "failed" by the Council both before and after a devastating fire in the building left 72 people dead.

  Campbell's comments came after Grenfell victims said they were still waiting for justice after the release of a damning report.
