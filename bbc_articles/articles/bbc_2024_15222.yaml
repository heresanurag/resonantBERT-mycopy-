title: 'Euro 2020 final: Video shows fans breaking into Wembley - BBC News'
date: '2024-07-15'
section: General
url: http://www.bbc.co.uk/news/uk-england-57802259
content: |-
  Videos shows football fans forcing their way into the stadium at Sunday's Euro 2020 final.

  This video has been removed for rights reasons.

  The Football Association's said there'll be a full review after fans broke through Wembley Stadium's security barriers at the Euro 2020 final on Sunday evening.

  Police said a number of ticketless fans did make it inside the stadium.
