id: bbc_2017_12435
title: 'Remembrance Sunday: UK falls silent to remember war dead - BBC News'
date: '2017-11-12'
section: General
url: http://www.bbc.co.uk/news/uk-41960243
content: |-
  For the first time the Queen watched from a balcony during the Cenotaph service on Remembrance Sunday.

  A two-minute silence was held across the country and wreaths were laid at memorials to those who died in conflict.

  For the first time the Queen watched from the Foreign Office's balcony, as Prince Charles laid her wreath.
