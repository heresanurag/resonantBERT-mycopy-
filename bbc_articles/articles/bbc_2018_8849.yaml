title: 'Mexico fireworks blast: Fatal explosions at depot - BBC News'
date: '2018-07-06'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-44735426
content: |-
  Explosions have killed at least 24 people and injured many more in the town of Tultepec.

  A series of explosions at a fireworks depot in Mexico has killed at least 24 people and injured more than 40 others.

  The biggest blasts took place as emergency responders arrived at the scene in the town of Tultepec.
