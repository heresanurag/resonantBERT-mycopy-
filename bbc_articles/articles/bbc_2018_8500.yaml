title: 'Charlotte Brown: First date speedboat owner describes crash - BBC News'
date: '2018-07-27'
section: General
url: http://www.bbc.co.uk/news/uk-44978593
content: |-
  Jack Shepherd told police he never asked if Charlotte Brown could swim.

  A man found guilty of killing a woman in a speedboat crash in London during their first date has handed himself into police in Georgia. been sentenced to six years imprisonment.

  Jack Shepherd told police how he took Charlotte Brown out on the Thames before they were thrown overboard.

  The 30-year-old skipped bail before his trial at the Old Bailey began and was sentenced to six years imprisonment in his absence.

