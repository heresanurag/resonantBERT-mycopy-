title: 'Azerbaijan GP: Oscar Piastri wins as Lando Norris gains on Max Verstappen
  - BBC Sport'
date: '2024-09-15'
section: Formula 1
url: http://www.bbc.co.uk/sport/formula1/articles/cly3331prdeo
content: |-
  Lando Norris drives an extraordinary race to catch as his McLaren team-mate Oscar Piastri wins an engrossing Azerbaijan Grand Prix.

  Piastri wins as Norris gains on Verstappen in Azerbaijan

  Norris, left, gained on Verstappen in the title race while Piastri took his second career win

  Lando Norris drove an extraordinary race to catch and pass title rival Max Verstappen as his McLaren team-mate Oscar Piastri won an engrossing Azerbaijan Grand Prix. The race ended under a virtual safety car after a crash between Red Bull’s Sergio Perez and Ferrari’s Carlos Sainz, who collided while disputing third place with two laps to go. Piastri pulled off an audacious pass on Charles Leclerc, who had led from pole position, to take the lead shortly after both had made their only pit stop for fresh tyres and held on for the rest of the race under immense pressure from the Ferrari. And Norris fought back after his late pit stop, having started from 15th place on the hard tyre while the leaders chose mediums, to pass Verstappen with three laps to go. He took fourth place, promoted from sixth by the Perez-Sainz crash, one ahead of Verstappen, who had started nine places ahead of the McLaren driver. The result means Norris, who also scored the point for fastest lap, reduced Verstappen’s championship lead by three points on a day he would have started expecting to lose ground. Norris is 59 points behind Verstappen with seven races to go and a maximum of 206 still available. And McLaren have taken the lead in the constructors’ championship from Red Bull, taking a 20-point lead.

