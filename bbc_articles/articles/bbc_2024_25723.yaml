content: |-
  Emergency services are searching the River Freshney in Grimsby.

  The coastguard and fireservice assisted in the search

  Two teenage boys have been found "unwell" near a river and the area is being searched in case there are more casualties. Humberside Police said the boys were found on the bank at 05:00 BST near the River Freshney in Grimsby. A multi-agency response has since seen rescue services work to establish whether there were "other persons who require assistance". Police are appealing for anyone with information to contact them.

  The search was carried out around the Cromwell Road area.

  Witnesses at the scene said that the Coastguard helicopter and an air ambulance had also been sent and police divers were seen in the water. Humberside Fire and Rescue Service confirmed it had sent three appliances and a boat. HM Coastguard said that they received a request to assist the police with a search near the River Freshney at 03:45 BST. Rescue teams from Cleethorpes and Donna Nook were sent. There are police cordons in place around the Cromwell Road area. Listen to highlights from Lincolnshire on BBC Sounds, watch the latest episode of Look North or tell us about a story you think we should be covering here, external.

  HM Coastguard said they had been called to help at 03:45 BST
