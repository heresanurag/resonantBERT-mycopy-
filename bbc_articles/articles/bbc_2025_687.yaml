title: Harlow school punishes pupils for scoring below 90% in maths - BBC News
date: '2025-02-11'
section: Essex
url: http://www.bbc.co.uk/news/articles/c75zg47gzp3o
content: |-
  A parent says the school's policy for top set students is "overtly cruel".

  Pupils punished for scoring below 90% in maths

  Stephen Drew says the purpose of the detentions is to help students with their progress

  A school's policy of giving detentions to top set pupils who score below 90% on maths homework has been described as "overtly cruel" by a parent. Joseph's son is in Year 7 at Stewards Academy in Harlow, Essex, and scored 13 out of 16 for his maths homework, which is 81%. "I thought [the detention] was unjustified: I've worked with children and I find trying to foster aptitude through negative reinforcement doesn't really work," he said. Head teacher Stephen Drew – who appeared on the TV series Educating Essex, external – said the school offered homework support and "the work is set at a level that reflects exactly what they've been taught in the previous week".

  "The teachers are available during the week – lunchtimes, after school – to help. We have a homework club in the library every single day," Mr Drew said. He explained that the maths homework threshold varied according to which ability set pupils were in. The Department for Education guidance, external lists a detention as a "sanction" for pupils who misbehave.

  Pupils in the top set for maths at Stewards Academy get a detention if they score below 90% in their homework

  Joseph was shocked to receive a notification that said his son had got a 30-minute detention "for not completing his homework or to a required standard". "He'd done the homework with his mum. She'd supported him with it, and they'd struggled," he said. "If children have made an attempt to do something and then they're being punished for that attempt, I feel it will have negative consequences for children's mental wellbeing and confidence. "It seems schools are under pressure to provide excellent results all the time, and that 90% isn't good enough." Mr Drew said the school was under pressure after receiving a requires improvement rating from Ofsted in May 2024. He said: "I joined as head in September and I'm very, very clear we have a significant amount of work to do in order to enable our young people to reach the standards they are capable of. "We are doing everything we can to support our students."

  Joseph said he believed the policy had been detrimental to children who were "in a higher set but not able to get a higher result". "We have to face the reality that children - and adults in fact - have varying levels of aptitude and skill and intelligence, and not all will get over 90%. "Those children in the middle ground are going to be continuously in trouble for not quite hitting those thresholds. "And that would be really depressing as a child: trying to do your best and not quite hitting the mark, and so having to attend mandatory detention," he said. Mr Drew said: "Yes, it is a challenge for young people to say, 'you have to reach this standard', but in order to help them do that we are putting in place the support in the classroom."

  The Department for Education said: "It is for school leaders to develop and implement a policy that works for their own schools and school community. "The department does not endorse any one approach to behaviour and head teachers should use their professional judgement when implementing a behaviour policy where both staff and pupils can work in safety and are respected."

