title: 'Dermot Murnaghan: TV presenter reveals stage four cancer - BBC News'
date: '2025-06-24'
section: Culture
url: http://www.bbc.co.uk/news/articles/cp8mql4j8e8o
content: |-
  The ex-BBC and Sky journalist says he is "responding positively" to treatment and is "feeling well".

  TV presenter Dermot Murnaghan has revealed he has been diagnosed with stage four prostate cancer. The former ITV, BBC and Sky News journalist, 67, said he was "responding positively" to treatment and was "feeling well". "I'm fortunate to have a simply outstanding medical team looking after me, who I can't thank enough - they are administering the best possible care with expertise, compassion and sensitivity," he wrote on X, external. Murnaghan presented the main news programmes on ITV and the BBC before spending 16 years as one of Sky's lead anchors, and has also hosted BBC Two quiz show Eggheads.

  His post started: "Some personal news......I've been diagnosed with Stage IV advanced prostate cancer." He continued: "I'm responding positively to their excellent treatment, and feeling well. "I'm blessed to be fortified by the monumental love and support of my wife, family and close friends. "Needless to say my message to all men over 50, in high risk groups, or displaying symptoms, is get yourself tested and campaign for routine prostate screening by the NHS. "Early detection is crucial. And be aware, this disease can sometimes progress rapidly without obvious symptoms." He added that he is hoping to take part in a charity bike ride organised by Olympic champion Sir Chris Hoy, who also has prostate cancer, in Glasgow in September. The Tour De 4 ride will aim to change the perception of people living with stage four cancer.

  Murnaghan started his career at Channel 4 News before fronting ITV programmes including The Big Story and the News at 10 from 1993-97, and the channel's Evening News and Nightly News from 1999-2001. He moved to the BBC in 2002, as one of the main hosts of BBC Breakfast, the Six O'Clock News and the Ten O'Clock News. He also presented Eggheads for 11 years from 2003, and was one of the faces of Sky News from 2007-23. Murnaghan has also hosted the documentaries Crimes That Shook Britain for Channel 5, and Killer Britain for the Crime + Investigation UK channel. He also currently presents the podcast Legends of News, speaking to other seasoned journalists and correspondents about major stories they have covered.
  • None The prostate is a gland about the size of a walnut, which sits just below the bladder within the pelvis, and is part of the male reproductive system
  • None Common symptoms can include needing to urinate more frequently, particularly at night; difficulty starting to urinate, weak flow and it taking a long time; and blood in urine or semen
  • None It is most common in older age - among men over 75
  • None Prostate cancers can behave very differently - some can spread quickly, but others are very slow growing and may need minimal or even no treatment
  • None Your risk of prostate cancer is higher if you have a close relative who has had prostate cancer, and it is also more common in black men
  • None Stage four means the cancer has spread to other parts of the body
  • None About 50% of men will survive their cancer for five years or more after being diagnosed with stage four prostate cancer, according to Cancer Research UK
