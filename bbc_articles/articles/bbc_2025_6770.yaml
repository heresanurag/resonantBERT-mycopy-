  Norris being forced to drive in 'uncomfortable ways'

  Lando Norris won the first race of the 2025 season in Australia

  Lando Norris says he is being forced to drive in a different manner this season in order to get the best out of the McLaren. The 25-year-old Briton is leading the drivers' championship by three points from his McLaren team-mate Oscar Piastri after finishing third in Bahrain. However, Norris was searingly honest about his sixth-place qualifying performance last week, saying he felt "clueless" and like he had "never driven an F1 car before". Speaking on Thursday before the Saudi Arabian Grand Prix, Norris said he was having to "adapt a lot in uncomfortable ways".

  He added his approach to the high-speed nature of the Jeddah circuit will change slightly, partly because he is struggling to replicate the same form in the car that saw him finish second in the title race to Max Verstappen in 2024. "It is clear that there are things... things that have changed since last year, when I was feeling very comfortable. And that's not allowing me to do as good of a job this year," Norris said. "It's not that I'm doing a bad job, it's just I'm not able to be at the level I should be, and know I can be and want to be. "In order to perform better, I'm being forced to drive in a different way, in a different manner that I'm not used to. And that is not normal for me at all." Norris has been on the podium at every race so far and won the season opener in Melbourne in March, but his downcast nature in Sakhir was in stark contrast to Piastri's. The Australian, 24, won in China and Bahrain, and is much happier with the McLaren. "The pace of the car has been everything I could ask for," said Piastri. He added: "Very proud of the whole job that we have done, firstly giving us a great car and also helping me get the most out of it. "I think that's been a real strength so far this year and I feel like I am in a good place, on and off the track, and just trying to keep that going."

