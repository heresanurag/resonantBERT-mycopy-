title: Biden considering pre-emptive pardons for Trump critics - sources - BBC News
date: '2024-12-06'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c23v824g4v3o
content: |-
  The outgoing president is reported to be weighing up ways to protect those the new administration may go after.

  Joe Biden's recent pardoning of his son Hunter has caused controversy

  Outgoing US President Joe Biden is considering pre-emptive pardons for prominent critics of his successor Donald Trump, multiple people familiar with the discussions have told CBS, the BBC's US partner. That is in a bid to shield them from potential retribution after Trump - who has vowed to take revenge against those who have opposed him - takes office. CBS reports that while Biden is said to have debated the possibility of issuing the pardons with senior White House aides, no specific names had been formally recommended to him. Sources have told AFP that officials are also considering the message it would send to pardon people who have not committed crimes.

  That is in the wake of the controversy surrounding Biden's unconditional pardoning of his son Hunter, who was set to face sentencing this month on federal felony gun and tax convictions. Republicans and some Democrats have criticised the move, which came after the president previously said he would not take such a step.

  US media reports that those who could be in line for the potential pre-emptive pardons from Biden include Dr Anthony Fauci, who has been critical of Trump's Covid response, and California's Senator-elect Adam Schiff, who led the first impeachment effort against Trump. Other Democrats who, like Schiff, had a role in the Trump impeachment cases, or who investigated the 2021 US Capitol riots, could also be granted them. In an interview with NPR last month, Schiff said he did not think pre-emptive pardons were a good idea because he believed the courts were capable of withstanding threats from Donald Trump. "I think this is frankly so implausible as not to be worthy of much consideration," he said of the reports that such pardons were being considered. "I would urge the president not to do that. I think it would seem defensive and unnecessary." White House Press Secretary Karine Jean-Pierre said earlier this week that more pardons could be expected from President Biden before the end of his term in January but did not give further details. "He's thinking through that process very thoroughly." Among those who could be given the more traditional presidential pardons for crimes committed are nonviolent drug offenders or others who've served time for various offences, CBS reports. Donald Trump is not the only person to threaten retribution against those perceived to have opposed him in the past. His nominee for FBI director, Kash Patel, has said he would go after politicians and members of the media who he alleges without evidence helped overturn the 2020 US presidential election results. "We're going to come after you, whether it's criminally or civilly," Patel said. "We'll figure that out. But yeah, we're putting you all on notice... We're actually going to use the Constitution to prosecute them for crimes they said we have always been guilty of but never have." Democratic Congressman Brendan Boyle said in response that he thought Biden should issue blanket pardons to those targeted on what he called Donald Trump's "enemies list". "By choosing Kash Patel as his FBI Director, Trump has made it clear that he is more focused on settling personal scores than on protecting the American people or upholding the rule of law," said Boyle.
