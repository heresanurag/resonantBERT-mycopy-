title: Bristol project aims to cut plastic waste from takeaways - BBC News
date: '2019-03-09'
section: General
url: http://www.bbc.co.uk/news/uk-47503018
content: |-
  A project in Bristol is trying to help takeaways solve their plastic container problem.

  Takeaways in south west England are being encouraged to use less plastic – much of which ends up in the bin.

  The organisation Plastic Pollution Awareness & Action Projects is linking scientists with takeaways to solve their plastic container problem.

  Read more: Takeaways told 'use less plastic'
