title: Banksy print stolen from Toronto exhibit by brazen thief - BBC News
date: '2018-06-14'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-44459206
content: |-
  Toronto police release surveillance footage of the suspect grabbing the framed print off a wall.

  Canadian police are investigating the brazen apparent theft of a Banksy print from an unauthorised exhibit of the artist's work in Toronto.
