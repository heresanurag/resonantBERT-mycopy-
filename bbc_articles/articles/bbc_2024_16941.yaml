title: 'In pictures: Cambridge Folk Festival - BBC News'
date: '2024-07-28'
section: Cambridgeshire
url: http://www.bbc.co.uk/news/articles/cx82rg27lr7o
content: |-
  Big names, such as Robert Plant, and new arrivals perform at the world-renowned folk festival.

  • None Robert Plant (with Suzi Dian) was on the main stage on Friday evening showcasing his folkier side, that was evident on some of his former band Led Zeppelin's recordings
  • None Capercaillie delighted fans on Stage One on Friday, some 40 years after the Scottish band's debut album Cascade
  • None After the wet spring, festival goers were able to bask in some sunshine at Cherry Hinton Hall Park
  • None Rebecca Lovell, of US sisters duo Larkin Poe, said: "Having played The Den we have been looking forward to coming back and playing the main stage. We hope the audience will like the way we have evolved as a band."
  • None Norwich country rock band Brown Horse hot-hooved it from the Latitude festival in Suffolk to appear in The Den on Friday for a rousing performance
  • None Norwich act Kitewing combine members of the Shackleton Trio, with Christina Alden and Alex Patterson
  • None Three-time US Grammy (Blues) award winner Fantastic Negrito, from Oakland in California, regaled the crowd in a gold cloak
  • None Cornwall/London singer Lily Lyons opened The Den on Thursday and said it was "amazing to be playing a really iconic festival"
  • None Australian singer songwriter Ernest Aines said playing the festival was "dream come true"
  • None Festival favourite Katherine Priddy has supported folk royalty including Richard Thompson and Loudon Wainwright III... as well as featuring on an album of covers by former Cambridge University student Nick Drake
  • None The festival also features music workshops and children's activities
  • None Australian singer and cellist Monique Clare was another who said it was a "dream come true" to play at the festival, and she treated The Den to a version of Beyonce's Crazy In Love
  • None Irish singer-songwriter Lorraine Nash said her first UK festival appearance was "a little bit daunting, but there is such a supportive atmosphere"
  • None Harpist and singer Anna McLuckie has been nominated for the festival's Christian Raphael Prize for emerging talent
  • None Tricia Collins, from Roscommon in Ireland, said she was "over the moon to be playing Cambridge, to play among such fantastic musicians"
  • None Now approaching his 80s, Ralph McTell told his audience on Thursday that he first played the festival in 1969
  • None Now in her late 80s, Peggy Seeger performed on Sunday. The US-born singer is the widow of Britain's Euan MacColl and half sister of Pete Seeger
  • None The festival will return to the site in south-east Cambridge in 2025

