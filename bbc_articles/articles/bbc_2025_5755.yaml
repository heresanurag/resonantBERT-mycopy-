content: |-
  The monument near Dorchester is redated to about 200 years earlier than previously thought.

  Burial site revealed to be older than Stonehenge

  After a recent archaeological research, Flagstones monument has been redated to about 3,200 years BC

  An ancient burial site has been revealed to be the earliest known large circular enclosure in Britain. Archaeological research by the University of Exeter and Historic England has shed new light on the origins of the prehistoric Flagstones monument located near Dorchester, Dorset, during the Neolithic period. It has been redated to about 3,200BC, or about two centuries earlier than previously thought. The university said the findings suggested Flagstones may have served as a prototype to Stonehenge.

  At least four burials were found to have been placed in the site's enclosure pits

  Human remains, red deer antlers and charcoal are among the finds discovered at the site thanks to advanced radiocarbon analysis. Combining the radiocarbon dates with archaeological information revealed that early Neolithic activity, including the digging of pits, took place around 3,650BC. The circular ditched enclosure was created around 3,200BC, with burials placed within it immediately afterwards. "The chronology of Flagstones is essential for understanding the changing sequence of ceremonial and funeral monuments in Britain," Dr Greaney said. "The 'sister' monument to Flagstones is Stonehenge, whose first phase is almost identical, but it dates to around 2900 BC. "Could Stonehenge have been a copy of Flagstones? "Or do these findings suggest our current dating of Stonehenge might need revision?"

  Red deer antlers are among the finds discovered at the site thanks to advanced radiocarbon analysis

  Flagstones was discovered in the 1980s during the construction of the Dorchester bypass, with excavations revealing it was formed of a circular ditch made of intersecting pits. Today, half of the site lies beneath the bypass, with the remainder located beneath Max Gate, Thomas Hardy's former home. Flagstones also has connections to other significant sites, including Llandygái 'Henge' A in Gwynedd, Wales, and artefacts and burial practices implied even locations in Ireland. The university said the findings highlighted "the interconnectedness of Neolithic communities across Britain and beyond".

