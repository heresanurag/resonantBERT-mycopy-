title: 'Prince Philip: Royals release new photos of the Duke of Edinburgh - BBC News'
date: '2021-04-15'
section: UK
url: http://www.bbc.co.uk/news/uk-56753327
content: |-
  Members of the Royal Family release previously unpublished photographs of the Duke of Edinburgh.

  Members of the Royal Family have released previously unpublished photographs of the Duke of Edinburgh, following his death at the age of 99.

  The Prince of Wales and Duchess of Cornwall, the Duke and Duchess of Cambridge, and Buckingham Palace shared the new images on social media.

  A new image from 2018 shows the Queen and Prince Philip with seven of their great grandchildren. They are: (from left to right) Prince George, Prince Louis, Savannah Phillips (standing at rear), Princess Charlotte, Isla Phillips holding Lena Tindall, and Mia Tindall.

  The Queen and Duke of Edinburgh seen with the Duke and Duchess of Cambridge, Prince George and Princess Charlotte at Balmoral in 2015

  The Duke of Edinburgh beside the Prince of Wales playing polo in 1966

  Clarence House shared an image of the Duke of Edinburgh laughing with the Prince of Wales on the day of Prince William's wedding in 2011

  Buckingham Palace also shared a photograph of the duke alongside Princess Beatrice and Princess Eugenie at the Derby Festival in 2012
