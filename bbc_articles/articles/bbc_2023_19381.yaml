  Sewell has two children from previous relationships, a 21-year-old son with his ex-wife Amy Gardner who he married in 2003 and divorced in 2006, and a 10-year-old daughter with ex-girlfriend Ami Komai.

  He was first married in 1999 to long-term girlfriend Yasmin Abdallah, but the couple divorced the following year.

  The Holiday, the 2006 film which has become a staple film of the Christmas season, saw Sewell play Jasper, the former partner of Kate Winslet's character Iris.

  Sewell starred opposite Kate Winslet, as her character Iris's ex partner Jasper, in 2006's The Holiday

  After learning Jasper is now engaged to someone else, Iris escapes the country and rents out her cottage to Cameron Diaz's character Amanda Woods, who in turn offers Iris her large home in Los Angeles.

  Sewell, who has also appeared in The Diplomat and The Man in the High Castle, is set to play Prince Andrew in a dramatisation of the Duke of York's interview on BBC Newsnight in 2019.

  Then-presenter Emily Maitlis questioned the duke over his relationship with convicted sex offender Jeffrey Epstein.

  The adaptation, based on the book Scoops: Behind The Scenes of the BBC's Most Shocking Interviews, will also star Gillian Anderson as Maitlis.

