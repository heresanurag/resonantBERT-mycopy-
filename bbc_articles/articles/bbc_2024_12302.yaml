title: 'Taylor Swift: Cardiff Eras gig begins with Welsh greeting - BBC News'
date: '2024-06-18'
section: Wales
url: http://www.bbc.co.uk/news/articles/cv22vererzlo
content: |-
  Taylor Swift's record-breaking Eras Tour brings the house down in Cardiff.

  Taylor Swift made her fans' Wildest Dreams come true in Cardiff on Tuesday night as she greeted them in Welsh. The 34-year-old kicked off her much anticipated show in Wales with a smattering of hit tracks such as Cruel Summer, before trying her hand at the language. "Shwmae," Swift told the sell-out crowd at the Principality Stadium as she struggled to be heard above the screams. "Croeso i daith Eras," she added, which means: "Welcome to the Eras Tour."

  "This is my very first time getting to play a show in Wales and look at this," the singer continued. "You’ve got 67,000 people in here, this is ridiculous. Thank you Cardiff."

