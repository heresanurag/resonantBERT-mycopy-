title: D-Day veterans visit King and Queen at Buckingham Palace - BBC News
date: '2024-06-05'
section: UK
url: http://www.bbc.co.uk/news/articles/crggew8e1kvo
content: |-
  The King and Queen were told detailed stories of what it was like to be part of the D-Day landings.

  The King and Queen Camilla meeting D-Day veterans Arthur Oborne, Jim Miller, Bernard Morgan and John Dennett

  Four D-Day veterans have been invited to Buckingham Palace to share their memories of the Normandy landings with the King and Queen. John Dennett, 99, Arthur Oborne, Bernard Morgan and Jim Miller, all 100-years-old, brought mementos and keepsakes from the time to show the royal couple. In return, King Charles read a diary extract written by his grandfather, King George VI, documenting the events of 6 June 1944. Their visit was filmed as part of a BBC documentary marking the 80th anniversary of the largest military naval, air and land operation ever attempted.

