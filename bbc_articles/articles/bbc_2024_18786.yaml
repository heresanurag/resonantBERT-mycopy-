content: |-
  Roger Haywood had "chosen to face the mob" and "beckoned them" to breach police lines, a court hears.

  Man who instigated violent rioting in town is jailed

  Judge Robert Altham said Roger Haywood had "chosen to face the mob" and "beckoned them" to breach police lines

  A man described as a "leader and instigator" of rioting in Blackpool has been jailed. Roger Haywood hurled abuse at police officers and then attempted to pull up the shutters of a store in the town's Hounds Hill shopping centre before attacking a member of its security team, Lancashire Police said. The 41-year-old, of Yew Tree Close, earlier pleaded guilty to violent disorder and two offences of assaulting an emergency worker. He was jailed for two and a half years at Preston Crown Court.

  The court heard he had encouraged a group of people to follow him to various spots around the resort, including the Cenotaph and Blackpool Tower, at a time busy with families.

  He was arrested on suspicion of two counts of assault and violent disorder and was later charged with two counts of assault. On 7 August, Haywood was arrested again on suspicion of violent disorder and charged. Judge Robert Altham said Haywood had "chosen to face the mob" and "beckoned them" to breach police lines. He said he was later seen visibly "too intoxicated" to work out how to use a loudhailer to speak to the crowds. Judge Altham said Haywood was an "instigator and leader" in the unrest, and that his drunkeness was an "aggravating feature". District crown prosecutor Sarah Gallagher said: "When a violent mob descended, Roger Haywood took a leading role in the disorder, encouraging others and behaving aggressively towards members of the public and police officers. "This vile behaviour cannot go unchallenged. "Those taking to the streets, taking part in violent conduct and spreading fear in our communities must face the consequences of their actions."
