title: 'John McDonnell: £150bn fund plan for ''human emergency'' - BBC News'
date: '2019-11-07'
section: General
url: http://www.bbc.co.uk/news/uk-politics-50333378
content: |-
  Shadow Chancellor John McDonnell outlines plans for a social transformation fund for public services.

  Shadow Chancellor John McDonnell has outlined plans for a £150bn social transformation fund to be spent over five years under a Labour government.

  During a speech in Liverpool, he said it would deal with the "human emergency created by the Tories". The money would be spent on upgrading or replacing public services such as schools, hospitals, care homes and council housing.
