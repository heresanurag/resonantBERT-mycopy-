title: 'Paris 2024: Marathon swimming goes ahead after Seine concerns - BBC Sport'
date: '2024-08-06'
section: Olympic Games
url: http://www.bbc.co.uk/sport/olympics/articles/c3ejj29exzjo
content: |-
  Triathlon's mixed-team relay included a swim in the Seine on Monday

  The women's marathon swimming event at Paris 2024 has gone ahead as planned despite ongoing concerns over water quality in the River Seine. Familiarisation sessions had been cancelled five times because of pollution in the river, but Wednesday's test went ahead before the 10km race on Thursday. "After the daily situation meeting this morning, it has been decided that the women's 10km marathon swimming race will take place today," a statement from organisers said. It provides respite for Paris 2024 organisers after issues with events taking place in the Seine have dogged these Olympics. The men's triathlon had to be postponed by a day because of low water quality. And the marathon swimming familiarisation had previously been cancelled after tests showed levels of bacteria in the water had dropped below the required standard. Heavy rainfall has increased the levels of bacteria in the Seine, although hot weather helps to reduce the count.

  Following the women's 10km marathon swimming race, the men's event is set to take place on Friday. If the Seine is deemed unsuitable on the day of marathon swimming, organisers said the 10km races can be moved to Vaires-sur-Marne, east of Paris, where the rowing and canoeing competitions take place.
