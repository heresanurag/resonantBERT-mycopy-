  His fiancée, who police confirmed said "Yes", puts her hands to her face when she realises what has happened.

  She crouches down next to him, trying to help but they are unsuccessful.

  The man then lies down on the floor by the grate, trying to reach the piece of jewellery but again they are unable to retrieve it.

  Officers from the New York Police Department clearly have a romantic side and, more importantly, access to the grate, so could get it out quite easily.

  Earlier, they had put out a plea for the man and woman to come forward.

  Later on Sunday they released an image of the cleaned-up ring on their Twitter account with the caption: "Here's a photo of the ring our officers recovered (and cleaned!) Call 1-800-577-TIPS or DM @NYPDTips if you know the happy couple so we can return it to them!"

