  Claire Button appears in court for the first time after the death of Lincoln Button on 15 December.

  Woman in court charged with murder of son, 5

  A woman has appeared in court for the first time after she was charged with the murder of her five-year-old son. Lincoln Button died at an address in Windstar Drive in South Ockendon, Essex, on 15 December. Claire Button, 35, of Windstar Drive, appeared at Southend Magistrates' Court and only spoke to confirm her identity. She was remanded in custody and is due to appear at Chelmsford Crown Court on Tuesday via video link.

  On the Sunday that Lincoln was found, Essex Police said it initially responded to reports of serious concerns for the welfare of a child and a woman. The force added it worked alongside paramedics to try to save the boy's life. A woman was taken to hospital for treatment and arrested once her condition improved.

