content: |-
  Ben Proud successfully defends his 50m freestyle title at the Commonwealth Games before helping England win silver in the men's 4x100m medley relay.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Ben Proud successfully defended his 50m freestyle title at the Commonwealth Games before helping England win silver in the men's 4x100m medley relay. Proud's team-mates Holly Hibbott and Ellie Faulkner won silver and bronze in the women's 400m freestyle. Scot Duncan Scott won 200m individual medley silver and Wales' Daniel Jervis finished second in the 1500m freestyle. Georgia Davies took 50m backstroke bronze before helping Wales come third in the women's 4x100m medley relay. Proud, 23, had set a new Games record of 21.30 seconds in Monday's semi-finals before clocking 21.35 in the final. "I'm in the shape of my life," he said. "There's no reason why I can't be breaking 21.3. I want to push the boundaries and see what I can do."

  Davies, 27, was unable to retain her title from Glasgow 2014 as Australia's Emily Seebohm won gold. Scott's medal was his sixth on Australia's Gold Coast, capped by 100m freestyle gold as the 20-year-old became Scotland's most decorated athlete at a single Commonwealth Games. England finished second in the swimming medal table with nine golds and 24 overall, with Scotland sixth and Wales seventh.

  Proud proved too strong for South Africa's Bradley Tandy and Australia's Cameron McEvoy, who took silver and bronze respectively. English team-mate David Cumberlidge finished fourth, missing out on bronze by eight hundredths of a second.

