  Proud came within touching distance of securing another gold in the 4x100m medley relay, beaten by Kyle Chalmers in the final leg as Australia won by nine one hundredths of a second. That saw the host nation finish with 28 golds in the pool and 73 swimming medals overall. Earlier in the Games, Proud was disqualified in his 50m butterfly heat for a false start, moments after setting what would have been a new Games record, and he said he was apprehensive heading into the freestyle. "Obviously before the race I was being a little bit reserved, waiting for the starting signal and making sure there was no account of whatever, so I could get through the heat," he said. "As soon as I hit the water I knew I was safe. I didn't hold back or anything. It's just a morning swim. I wasn't putting in any emotion so I'm really happy with that."

  As the defending champion and a world medallist in both the 50m butterfly and 50m freestyle, Ben Proud had expected to be the standout sprinter of Gold Coast 2018. His controversial disqualification in the 50m fly denied him the chance of multiple individual honours and there were definitely a few nerves tonight in the 50m freestyle final, but the Turkey-based swimmer delivered what he needed. His time of 21.35 was marginally slower than his time in the semi-finals but as his coach told me earlier "this will mean so much to him," after struggling to recover mentally from his shock DQ. Proud - who's 23 - is a real 50m Olympic freestyle medal contender for Tokyo 2020 and given sprinters usually peak in their late 20s, he could go on to become a dominant force over the coming years.
