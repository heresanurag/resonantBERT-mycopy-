content: |-
  As the latest statistics on rough sleeping in England are due to be released, BBC News investigates the problem of homelessness in Birmingham.

  As the latest statistics on rough sleeping in England are released, BBC News investigates the problem of homelessness in Birmingham.

  The city is among the top 10 English areas with the most rough sleepers, according to data from the Department for Communities and Local Government.

  A film crew spent a night on the streets of the city with homeless charity worker Paul Atkin.
