  Human Rights Watch said on Wednesday that a prolonged communications blackout could "provide cover for atrocities and breed impunity while further undermining humanitarian efforts and putting lives at risk".

  Mr Lazzarini also said that he believed there was a "deliberate attempt to strangle" Unrwa's work in Gaza, warning that the agency might have to entirely suspend its operations if its fuel supplies ran out.

  Unrwa, which is hosting 813,000 displaced people in its facilities, says it needs at least 160,000 litres of fuel every day to maintain its basic operations.

  "If the fuel does not come in, people will start to die because of the lack of fuel," Mr Lazzarini warned.

  "Exactly as from when, I don't know. But it will be sooner rather than later."

  The head of the UN World Food Programme meanwhile said that supplies of food and water were "practically non-existent" and that "only a fraction of what is needed is arriving through the borders".

  "With winter fast approaching, unsafe and overcrowded shelters, and the lack of clean water, civilians are facing the immediate possibility of starvation," Cindy McCain warned.

  An estimated 1.5 million Palestinians have been displaced by the conflict

  But a spokesman for the Israeli defence ministry body overseeing policy for the Palestinian territories, Cogat, told the BBC: "As far as I know, there is no lack of food and no lack of water in Gaza."

  Col Moshe Tetro said Israel was fulfilling its obligations to facilitate the delivery of aid and that the number of lorries crossing from Egypt was increasing every day. The UN says 1,139 aid lorries have entered since 21 October, compared to about 500 each day on average before the war.

  Col Tetro also stressed that Israel was doing everything it could to reduce civilian casualties, including by telling residents in the north of Gaza to flee southwards for their own safety as it focuses its air and ground assault on what it sees as Hamas's stronghold.

  Many of the 1.5 million displaced people have fled to Khan Younis, where the pre-war population of 300,000 has tripled.

  On Thursday, there were reports that Israeli forces had dropped leaflets urging people to evacuate four towns east of the city - Bani Shuhaila, Khuzaa, Abasan and Qarara - where tens of thousands of people have been sheltering.

  An Unrwa spokeswoman said the south had "not been safe at all", and an expansion of Israel's ground assault into the region would be bad news.
