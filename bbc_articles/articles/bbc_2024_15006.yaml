title: Eminem's The Death of Slim Shady album a mixed bag, say critics - BBC News
date: '2024-07-12'
section: Culture
url: http://www.bbc.co.uk/news/articles/cn384lg0l37o
content: |-
  The US rapper apparently kills off his alter ego Slim Shady on his hotly anticipated 12th album.

  Eminem's latest album, The Death of Slim Shady (Coup de Grâce), has been released and is being met with mixed reviews by critics. In the US rapper's 12th album, his alter ego Slim Shady is killed off - the artwork shows Shady in a body bag, and in the music video for Tobey, Eminem takes a chainsaw to him. Clash called the album, external "a mixed bag" and described it as "at once an effective piece of fan service, while also being a record that disappoints". "It doesn’t quite feel like an ending, but neither does it feel like a continuation," Robin Murray wrote. "A mixed, often muddled album, it features some of Eminem’s best rapping in a decade – those fast, skippy-yet-intricate flows will never fail to thrill – but his pen is often blunted." Ahead of the release, Eminem told fans this is a "conceptual album" and the songs should be listened to in order.

