  The 19 tracks include previously released singles Tobey and Houdini, as well as a sequel to his 1999 hit Guilty Conscience with Dr Dre. Billboard ranked the latter song, external as one of the best on the new album and said "it’s not the original, but is a worthy second coming". "At one point, Slim Shady puts Marshall on blast for creating him as an alter-ego to stir up controversy and essentially be a shield to say jarring things that he didn’t really have the courage to stand on," Michael Saponara wrote.

  USA Today said, external the 51-year-old is a "lyrical pugilist throughout, except when he turns misty-eyed dad rapping about daughter Hailie Jade". His song Temporary starts with old recordings of the rapper and his daughter talking as a child. Melissa Ruggieri said it was the most memorable song on the album "because it gives Eminem permission to drop the shtick and explore his vulnerability – which isn’t often apparent elsewhere on the album". Eminem calls on his 28-year-old daughter to "be strong" and that he will always be her rock. On his track Fuel, Eminem references the multiple sexual assault allegations against fellow rapper Sean "Diddy" Combs. "I'm like an R-A-P-E-R/I got so many S-As/S-As/Wait, he didn't just spell the word rapper and leave out a 'P', did he?" the lyrics say. Pitchfork said, external Eminem, real name Marshall Mathers III, "reckons with his controversies while taking pains to create new one". The track Antichrist "take pains to offend as crudely as possible" with references to pronouns, woke society and "the harrowing video of Diddy attacking his then-girlfriend Cassie in a hotel in 2016". Mr Combs, one of rap's most successful moguls, apologised for his "inexcusable" actions shown in that video, and has denied all allegations of sexual assault. A review by the Independent gave the album two stars , externaland said the rapper was "punching downwards, joylessly and without inspiration". "Much of The Death Of Slim Shady resembles a Telegraph op-ed: the ham-fisted mashing of people’s buttons, the blethering about 'the PC police' and 'Gen Z' coming to get him. Anything to get a reaction," Stevie Chick wrote.
