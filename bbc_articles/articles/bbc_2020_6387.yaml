title: 'As it happened: George Floyd death - Conviction ''will be hard'' says Minnesota
  attorney general - BBC News'
date: '2020-06-04'
section: US & Canada
url: http://www.bbc.co.uk/news/live/world-us-canada-52903545
content: |-
  Keith Ellison warns that convicting the four ex-officers charged in the case "will be hard".

  AG Ellison: US has under-prosecuted police killings in the past

  Attorney General Ellison ends the press conference by promising to "hold everyone accountable for behaviour we can prove in court". "As the people who are legal professionals, professional prosecutors – we are taking our duty seriously, and we are working with the people who gather the facts, and we have done the work that we begin is possible, ethical and right." When asked about the lack of trust between the public and the authorities, he says: "Our country has under-prosecuted these matters, in Minnesota and throughout the country." This, he says, is "the origin of the trust problem" - as "people who have public guardians" have not been held accountable in similar situations in the past. "We can’t control the past – all we can do is take the case we have in front of us right now, and do our best to bring justice to the situation."
