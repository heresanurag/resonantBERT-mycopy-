title: 'Kylian Mbappe: Real Madrid move is childhood ''dream'' come true - BBC Sport'
date: '2024-07-16'
section: European Football
url: http://www.bbc.co.uk/sport/football/articles/cd19kjl88j9o
content: |-
  More than 80,000 fans were in attendance at the Bernabeu for Kylian Mbappe's unveiling as a Real Madrid player.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Kylian Mbappe said his childhood dream of joining Real Madrid had come true as he was unveiled to a packed Bernabeu. The France forward, 25, signed a five-year deal at the club in July after the expiry of his Paris St-Germain contract. His presentation was delayed due to France's involvement at Euro 2024, where they were knocked out at the semi-final stage by Spain. But, speaking to a crowd of more than 80,000 spectators at the Bernabeu, Mbappe told supporters he had dreamed of the moment he could call himself a Real Madrid player. "I spent endless nights dreaming about one day playing for Real Madrid and today I am one happy guy," said Mbappe. "My family are so happy here, I can see my mum crying. "It's an incredible day for me, I've dreamed of this day since I was a kid and this day means a lot to me."

  This video can not be played To play this video you need to enable JavaScript in your browser. Why Mbappe makes Real Madrid 'almost impossible to stop'

  Mbappe, who was wearing the club's new home kit and addressed spectators in Spanish, was introduced to the crowd by Real president Florentino Perez. Speaking to Mbappe before the Frenchman spoke to the crowd, Perez said: "The love that you felt for Real Madrid, and you identifying with this club since your childhood, made it possible for you to be here and to overcome those obstacles on the way to your dream." For Perez, Mbappe's arrival was a long time in the making and comes three years after Real failed with a £137m offer for the World Cup winner. PSG accepted a world record bid of £259m from Saudi Arabian side Al-Hilal in 2023, but Mbappe rejected the deal as it became apparent he wanted to move to the Bernabeu. Mbappe, who was offered a contract extension by the French club, was left out of PSG's pre-season tour as a result but he was eventually reintegrated by manager Luis Enrique. The forward left PSG having scored 256 goals in 308 appearances.

  Former Real Madrid manager and player Zinedine Zidane was present at the unveiling

  Mbappe has been handed the no.9 shirt
