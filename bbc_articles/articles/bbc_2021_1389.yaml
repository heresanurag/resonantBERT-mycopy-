title: 'Pablo Hasel: Luxury stores looted and vehicles ablaze in Barcelona protests
  - BBC News'
date: '2021-02-21'
section: General
url: http://www.bbc.co.uk/news/world-europe-56143296
content: |-
  The arrest of the Catalan rapper has ignited a debate over freedom of speech in Spain.

  Protesters took to the streets of Barcelona for the fifth consecutive night on Saturday following the arrest of Catalan rapper Pablo Hasel.

  Hasel was arrested on Tuesday for insulting police and Spanish royalty in his song lyrics and tweets, igniting a debate over freedom of expression laws in Spain. He is facing a nine-month jail term for glorifying terrorism.

  Before being detained, he had barricaded himself inside the University of Lleida to try and avoid jail.
