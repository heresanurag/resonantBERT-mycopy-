  More than 150 people were also injured at a wedding in the northern Nineveh province after fireworks were lit.

  What do we know about Qaraqosh - the town hit by the blaze?

  Last night’s blaze ripped through al-Haitham Hall, which is located on the outskirts of the town of Qaraqosh. Also known as Bakhdida, it is the main centre of al-Hamdaniya district and is about 15km (9 miles) south-east of the city of Mosul. It was the biggest Christian town in Iraq - with a population of about 50,000, most of them Assyrians - before it was overrun by militants from the Sunni Muslim jihadist group Islamic State (IS) in 2014. Most residents fled, but those who refused or were unable to leave were issued an ultimatum by IS to pay a protection tax, convert to Islam or be killed. IS militants committed many atrocities against the Christians who remained before they were driven out by Iraqi and US-led coalition forces in 2016. They also desecrated and torched the ancient Church of the Immaculate Conception - Iraq’s largest - and reportedly burned more than 2,000 homes to the ground. About half of Qaraqosh’s residents are said to have returned since the town was liberated, and the Church of the Immaculate Conception was restored in time for a visit by Pope Frances in 2021. But many of the destroyed homes have yet to be rebuilt.
