  "I never underestimate any of my fights, that's where mistakes are made. I go into the fight knowing what they do, and knowing what I'm capable of doing. With my best performance, I know I can beat some of the top players and today showed that." Giles had lost to eventual gold medallist Japan's Uta Abe in the quarter-finals, but beat Charline van Snick of Belgium in the repechage to give herself a medal chance. It follows the bronze medal won in the sport by Sally Conway at Rio 2016 and the silver and bronze which Gemma Gibbons and Karina Bryant picked up at London 2012.

