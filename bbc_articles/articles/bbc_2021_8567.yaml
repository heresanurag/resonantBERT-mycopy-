content: |-
  Judoka Chelsie Giles wins Team GB's first medal of the Tokyo Olympics with bronze in the women's -52kg event.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Judoka Chelsie Giles claimed Great Britain's first medal of the Tokyo Olympics with bronze in the women's -52kg event. The 24-year-old from Coventry beat Switzerland's Fabienne Kocher by ippon. An early scoring waza-ari gave Giles the advantage and she showed the greater composure to secure success. "It feels so special to do it in Japan. I believed I could do it, my coach has always believed I could and it showed in today's performance," she said. "I felt really good in the warm-up, and I was taking each fight as it came. It's an amazing arena and the atmosphere was amazing. To do it where Japan started it, it makes it extra special.

