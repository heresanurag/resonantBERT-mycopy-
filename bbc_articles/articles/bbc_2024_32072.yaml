content: |-
  Yoon Suk Yeol made the announcement in a surprise, late night televised address.

  South Korean President Yoon Suk Yeol has declared martial law in the country.

  In a surprise, late night televised address, Yoon said the decision was made to remove "pro-North Korean forces" from South Korea and to "protect the free constitutional order".
