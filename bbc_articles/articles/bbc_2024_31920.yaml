  It's the second Edinburgh derby of the season on Thursday

  When the Christmas Day leftovers are in the fridge and the wrapping paper is heading to the recycling bin, there's a full Boxing Day Scottish Premiership fixture card to be savoured. With action from lunchtime right through until evening, here are some names and games hoping to make a festive flourish.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Boxing Day kicks off with a festive cracker at Tynecastle as Edinburgh's big two, Hearts and Hibernian, meet for the second time this season. Last time out, it was 1-1 draw at Easter Road, with Hearts striking late to deny Hibs. The city rivals have largely struggled this season but both have improved of late, particularly Hibs. David Gray's side left Aberdeen's Pittodrie with all three points on Saturday - their third win in four league games. Hearts moved off the foot of the table and sent St Johnstone bottom by beating the Perth side 2-1 at home on Sunday. European games may have been a distraction for Neil Critchley's side this season but it is just domestic games from here on in this term. Victory for the hosts and they will move above David Gray's Hibernian. Should Hibs win, they will increase the gap between the sides to five points. Four of the past five meetings have ended drawn and the last two wins in the fixture have been by a solitary goal. To save their league season, both teams really need to be pushing into the top six and Thursday's game could be just the springboard if one of them can pick up all three points.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Aberdeen started December as leaders Celtic's closest challengers. Six games without a win later and they are third, trailing Rangers by a point and having played a game more. Things were looking up for the Dons on Saturday when Topi Keskinen scored a deflected opener against Hibernian but Hibs roared back with three goals to claim all three points. The Finnish winger, 21, was one of Aberdeen's top performers during the Dons' impressive start to the season and has scored five goals since his summer arrival from HJK, also providing a couple of Premiership assists. Kilmarnock play host to Aberdeen on Thursday, having lost 2-0 at Pittodrie back in August. Former Aberdeen manager Derek McInnes' Killie side may have designs on the top six but Jimmy Thelin's Dons are in need of inspiration to get their season back on track and Keskinen is just the type of player that can stretch teams. And the winger could do with a strong start to 2025 too if he wants to force his way back into the Finland side, with their World Cup qualifying campaign starting in March.

  Topi Keskinen (right) was back on the scoresheet on Saturday

  One of the Premiership's newest managers, Simo Valakari, is facing a big challenge at St Johnstone. With just one point from a possible 12 so far in December, the Perth side are a point adrift in 12th place. However, Saints supporters will know their three defeats so far this month have been by a margin of one goal, while the point they picked up away to Aberdeen came only after the Dons had battled back from a goal down. The short version is that it's tight in this league and Valakari's side need to find a way to end up on the right end of marginal games. Dundee United are their Boxing Day visitors, aiming for their second straight win over Saints. With three wins and a draw out of 11 so far, Finnish former Motherwell player Valakari has not enjoyed the strongest of starts at McDiarmid Park but he's not alone. Hearts' Neil Critchley has five wins from 15 while David Gray at Hibernian has only recently pushed his win percentage in to the high 20s. Again, it's tight in the Scottish top flight but that also means a win can go a long way and Valakari still has it within his gift to guide St Johnstone off the bottom of the table in time for the New Year.
