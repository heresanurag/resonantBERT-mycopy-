  Neighbours tried to help after some youngsters raised the alarm. One woman who lives nearby got a lifeguard ring and ran over - but she said she couldn't find the girl. "I found her clothes - socks, shoes and jacket and a mobile phone and gave them to the police.

  Nearby residents tried to help the girl but could not see her

  The LFB, which used its drone team and fire boat, said search operations for firefighters concluded at about 15:50 BST, when "responsibility for the incident was left with the police". Also in attendance were HM Coastguard, the RNLI, the London Ambulance Service, including a hazardous area response team, and the Metropolitan Police Service.

