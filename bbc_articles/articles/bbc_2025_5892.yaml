title: Girl missing in river at Woolwich prompts emergency search - BBC News
date: '2025-04-01'
section: London
url: http://www.bbc.co.uk/news/articles/cm2x807n7p8o
content: |-
  Police are searching water in North Woolwich after reports of an 11-year-old girl in the Thames.

  The girl is believed to have gone into the water near Bargehouse Causeway

  An 11-year-old girl is missing after she went into the River Thames in east London, police have said. Metropolitan Police were called to reports the girl had entered the river close to Bargehouse Causeway in North Woolwich, at about 13:15 BST. A "large scale" search was launched - but it was scaled down a few hours later, with London Ambulance Service (LAS) and London Fire Brigade (LFB) saying the police were now in charge of the operation. It is believed the girl and some friends were on a slipway by the waterside before the girl went into the water.

