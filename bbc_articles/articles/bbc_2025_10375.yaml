title: Swinfen Hall prison lockdowns harming rehabilitation - families - BBC News
date: '2025-05-27'
section: Stoke & Staffordshire
url: http://www.bbc.co.uk/news/articles/c9vgg7wemv1o
content: |-
  The BBC speaks to families of criminals in a prison where there have been serious outbreaks of violence.

  Families of Swinfen Hall prisoners say they are not being rehabilitated

  Criminals at a prison where some cells have been locked down during the day due to serious violence could pose an even higher risk to the public when released, their families have warned. Staff members and inmates at HMP Swinfen Hall, in Lichfield, have been hurt in attacks, including a prison officer who was stabbed in the head. The BBC has spoken to families who fear the disorder means their loved ones are not being rehabilitated and could come out more dangerous than they went in. The Ministry of Justice said it did not recognise claims made by relatives, but was working to protect staff and improve prisoner access to education.

  About 600 men aged between 18 to 28 are housed in the jail, including 130 serving life sentences. The prison is designed to help inmates get training, with bosses promising a "safe, decent and respectful environment for personal growth". But six families have told the BBC they are worried about violence, drug use, prison officer behaviour, mental health support and access to education. Three mothers agreed to speak on camera but asked to remain anonymous. They believe their sons could be targeted by fellow inmates or staff at the prison for speaking out. They each insisted it was right their children were being punished for serious offences, but said change was needed to stop them coming out and potentially reoffending.

  Swinfen Hall prison is home to 600 young men but has been plagued by issues

  One mother said she used to be "judgemental" and shared online stories about sex offenders before her own son became one. He is currently serving an eight-year sentence for offences including rape, which he committed when he was 17. The woman doesn't expect any sympathy, but warns any young person can take a wrong turn. "My son deserves to be where he is, no doubt," she said. "But what is the point in locking him up if he's not going to come out a better man?"

  Inmates' mothers told the BBC it was important to provide effective rehabilitation in prison

  Unlike other prisons, sex offenders are not housed on a separate wing in Swinfen Hall, meaning they are easily singled out by gang members. The mother explained her son had spent long periods self-isolating in his cell eating noodles, because he was too scared to visit the canteen or showers. During one incident, she alleged fellow inmates urinated over her son's freshly-washed clothes while guards stood and watched. She also claimed he was threatened with a weapon for attempting to enrol on to classes, and told by fellow inmates there was a "rule" sex offenders did not do education. A report published by HM Inspectorate of Prisons (HMIP) in November said staff-prisoner relationships were "problematic" and also highlighted the amount of time inmates spent in locked cells during the working day. A report by Ofsted rated the effectiveness of education, work and skills at the site as "requires improvement". Previous inspections by HMIP have also criticised "high rates of violence" and "significant use of force" at Swinfen Hall, although the most recent report said violence was reducing.

  Prison officers are alleged to have taunted prisoners whose families have complained

  Multiple parents said their sons had been targeted further by staff and fellow inmates after complaining. The mother added: "I'll write to the governor and then the guard will say really degrading things to him like 'are you going to keep writing to your mummy?'" Another parent, originally from the Black Country but based in South Wales, said she was in a "living nightmare" of battling for her son to get support for his mental health conditions. The 21-year-old has been at Swinfen Hall since October, after being jailed for more than seven years for sexual offences. The mother insisted the jail was not suited to deal with his personality disorder, because there was no wing for vulnerable prisoners. "I worry about what he's going to be if he ever comes out," she said. "These are still human beings. "The way they're being treated in prisons is why they are reoffending. The system is not working."

  Concerns have been raised about mental health support and access to education

  A third mother, from Warwickshire, said her inmate son had changed for the worse, explaining crimes he once found "horrendous" now amused him. "It's like he's got no heart," she said. The 26-year-old was sentenced to seven a half years for wounding with intent. His mother said it was his first significant offence, but he was now fighting most days - she believes because of the lack of structure and training. "He can't get on any courses," she claimed. "I just want him to have some rehabilitation. "You can't [put someone] in a little cell and say see you in five years and expect them to come out and be a model prisoner."

  Geoff Willetts, of the POA, said more work was needed to recruit the best staff

  The Prison Officers' Association (POA) has demanded a "reset" at Swinfen Hall, saying: "It is clear senior leaders have lost control." Geoff Willetts, the union's Midlands representative, said he did not recognise concerns raised by parents about staff, but more vetting and investment was needed to get the best officers. "No one should go to work to feel they are going to be hurt or hospitalised," he said. "The welfare and wellbeing of our members should be paramount."

  The Ministry of Justice said it did not recognise concerns raised to the BBC

  Last week, the Justice Secretary announced "landmark" sentencing reforms and said they would help cut crime, boost rehabilitation and reduce reoffending. Ministers want to create 14,000 new prison places by 2031, with £2.3bn committed to build new jails. A Ministry of Justice spokesperson said the government had inherited a prisons crisis. "We do not recognise many of these claims," a statement read, responding to the families' comments. "All prisoners have daily access to showers and open air, and welfare checks are carried out in response to family concerns reported through the safety hotline. "We recognise that more needs to be done across the prison estate to protect staff and improve prisoner access to education and training."

