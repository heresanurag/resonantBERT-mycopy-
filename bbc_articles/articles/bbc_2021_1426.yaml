title: 'Captain Sir Tom Moore: Nation claps for NHS fundraiser - BBC News'
date: '2021-02-03'
section: England
url: http://www.bbc.co.uk/news/uk-england-55923671
content: |-
  Prime Minister Boris Johnson leads tributes to the 100-year-old, who raised £33m for NHS charities.

  Prime Minister Boris Johnson said the event reflected Capt Sir Tom Moore's "spirit of optimism"

  People have been taking part in a national clap to honour Captain Sir Tom Moore.

  Prime Minister Boris Johnson led the tributes to the 100-year-old fundraiser who died with coronavirus on Tuesday.

  Residents of Marston Moretaine in Bedfordshire, where Capt Sir Tom lived, also joined in the applause.

  The centenarian's family said they were "incredibly touched" by the event and "taking part with huge love in their hearts".

  This video can not be played To play this video you need to enable JavaScript in your browser. Capt Sir Tom won the nation's hearts with his fundraising walk which took in 100 laps of his garden

  Captain Sir Tom Moore's family said they were "incredibly touched" by the event

  The Army veteran won the nation's affections by walking 100 laps of his garden last spring during the first coronavirus lockdown, raising money for NHS Charities Together.

