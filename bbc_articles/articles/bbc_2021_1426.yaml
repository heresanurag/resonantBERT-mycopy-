  Workers at Bedford Hospital, where Capt Sir Tom died, also clapped for the fundraiser

  Simon Linnett, chairman of Bedfordshire Hospitals NHS Trust, said: "He raised millions of pounds which will give huge benefits to colleagues and patients.

  "But more than that was the contribution he made to raising the morale of staff in the NHS and the public - he was a source of huge inspiration and pride."

  A BBC News special, Captain Tom: We Salute You, presented by Michael Ball, is being broadcast on Wednesday at 19:30 GMT on BBC One and will be available on the BBC iPlayer.
