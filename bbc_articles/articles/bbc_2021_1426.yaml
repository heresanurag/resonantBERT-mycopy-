  Capt Sir Tom tested positive for Covid-19 last week. His family said due to other medication he was receiving for pneumonia, he was unable to be vaccinated.

  He had initially set out to raise £1,000, but he eventually raised £32,794,701 - which totalled £39m with Gift Aid - from more than 1.5 million supporters, and was knighted by the Queen in July.

  Junior soldiers at the Army Foundation College in Harrogate, North Yorkshire, took part in the nationwide clap

  NHS staff at Chelsea and Westminster Hospital joined in the applause

  At the daily Downing Street briefing shortly before the clap, Mr Johnson urged people to join in the event to reflect Capt Sir Tom's "spirit of optimism".

  "Let's also clap for all those he campaigned for - our brilliant NHS staff and care workers - and let's do everything we can to carry on supporting them," he said.

  "Because if we stay at home, protect our NHS and save lives then, in the words of Captain Tom, tomorrow will be a good day."

  Players from Burnley and Manchester City paid tribute to the army veteran before their Premier League match

  At Bedford Hospital, nurses and doctors directly involved in the care of Capt Sir Tom joined the national clap to celebrate his life.

  Hospital leaders said the centenarian was a "source of huge inspiration and pride" and announced plans to create a memorial for him at the site.

