title: Watch as police target fishing boat over ‘modern slavery’ claim - BBC News
date: '2024-11-07'
section: General
url: http://www.bbc.co.uk/news/videos/cm20l14g87jo
content: |-
  A 38-year-old man was arrested and two Ghanaian men were removed from the vessel as part of the operation.

  Police in Scotland have targeted a fishing vessel over claims of modern slavery and labour exploitation.

  BBC Scotland News witnessed the multi-agency operation which took place at a port on the west coast.

  A 38-year-old man was arrested and two fishermen from Ghana were removed from the boat. A second man aged 50 was arrested at another port and charged with human trafficking offences.

  Police said reports would be submitted to the procurator fiscal.

  Earlier this year, BBC Disclosure investigated claims of modern slavery and labour abuse of migrant workers in Scotland’s fishing fleet.
