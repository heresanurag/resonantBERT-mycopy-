content: |-
  British number three Cameron Norrie suffers a first-round exit at the Barcelona Open as he prepares for the start of the French Open this month.

  Britain's Cameron Norrie reached the semi-finals of Wimbledon in 2022

  British number three Cameron Norrie has suffered a first-round exit at the Barcelona Open as he prepares for the start of the French Open this month. Norrie, now ranked 88 in the world rankings and who came through qualifying in Barcelona, was beaten 6-7 (3-7) 6-4 6-3 by 27th-ranked Karen Khachanov of Russia. Former Wimbledon semi-finalist Norrie, 29, saved a set point on his way to winning the first set on a tie-break, and led 4-3 with a break in the second. But Khachanov came back to progress in two hours and 18 minutes and will face Jaume Munar of Spain in the next round. Earlier, Carlos Alcaraz was forced to work hard to beat underdog Ethan Quinn to reach the last 16. The world number two was a break down in the second set against Quinn, ranked 126th in the world, before fighting back to win 6-2 7-6 (8-6).

  Carlos Alcaraz is building up to the French Open, which he won in 2024

  After saving five break points and breaking Quinn twice in the opening set, Alcaraz was pushed much harder by the 21-year-old American in the second. The players exchanged breaks on three occasions and Alcaraz, 21, had to save a set point in the tie-break before finally winning through. "I made some mistakes, I found it hard to maintain my level, but I am happy to have solved the problems that came in the second set, and to end up winning in two sets," Alcaraz told TVE. Alcaraz, who won on clay at the Monte Carlo Masters last week, is building up to the French Open where he is aiming to defend his title at Roland Garros. Earlier, defending Barcelona champion Casper Ruud sailed into the last 16 with a 6-4 6-3 win over Colombia's Daniel Elahi Galan. Norwegian world number 10 Rudd, who has not won a tournament this season, hit 25 winners and did not face a set point.
