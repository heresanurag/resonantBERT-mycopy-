content: |-
  Larry Lamb is going on tour from Essex to Barry.

  Gavin and Stacey star says show will not return

  Larry Lamb has announced that he is going on a book tour with a quirky twist

  It looks like Gavin and Stacey fans will never know what happened on that fishing trip after a star of the comedy put to bed any slim hopes of a reboot. Larry Lamb, who played Mick Shipman on the BBC's hit show for 17 years, said filming the Christmas episode last year was an "extraordinary experience.". He added: "At the time, we all thought it probably won't be the end, I'm sure we will be doing it again, but gradually what's happened over the months, what I've realised is that was the end." Lamb said he would always carry a part of Mick with him, and his upcoming tour for his new book, All Wrapped Up, has a Gavin and Stacey theme.

  The final episode aired on BBC One on Christmas Day 2024

  The Christmas episode of the show racked up 19.11 million views, and Lamb said while it was sad it ended, it was a "masterpiece, no doubt about it". He added: "That scene in the wedding - that's up for the moment of the year. "It was the way to end this story, you can't keep going on with it. Ruth and James brought it to a grand finale."

  While he has moved on to a new chapter, he clearly will always have a soft spot for the show, as seen with his new book tour. "We're starting in Billericay in the Reading Rooms and we're going to finish in Barry in Marcos' cafe at a date to be arranged," he told BBC Essex. In between, Lamb will visit several bookshops and read extracts of his new novel. "It's an adventure, it is all about a film crew going to a Caribbean island to make a film, and from the minute they set off, things go wrong," he revealed. "It's letting me show people the inside story of what film and television is all about because that is something I have been asked countless times."

