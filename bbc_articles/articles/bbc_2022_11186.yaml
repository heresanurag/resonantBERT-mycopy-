content: |-
  The former Tory leadership rival calls Truss the "hope candidate" in the race against Rishi Sunak.

  Only weeks ago Penny Mordaunt and Liz Truss were bitter rivals to make the final two in the leadership race

  Liz Truss has received a boost in her bid to become the next prime minister after her candidacy was backed by former leadership rival Penny Mordaunt.

  The trade minister was knocked out of the race after finishing third behind Ms Truss and ex-chancellor Rishi Sunak.

  Ms Mordaunt gave Ms Truss her support, calling her the "hope candidate", as she appeared at a leadership hustings.

  Earlier in the contest some of Ms Mordaunt's allies accused Ms Truss's team of a dirty-tricks campaign.

  During a second hustings event - held in Exeter - Mr Sunak once again attacked Ms Truss's tax plans and promised he would cut taxes responsibly.

  The pair are vying to win over Conservative Party members, whose votes will determine which of them will become the next Tory leader and British prime minister.

  The party's roughly 160,000 members started receiving ballot papers on Monday, with the result due on 5 September, when Prime Minister Boris Johnson will leave office.

  Tax policy has become the main battleground, while both have announced a string of competing policy proposals to woo Conservative members.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: I could be sipping pina coladas right now, says former leadership hopeful Penny Mordaunt

  Ms Mordaunt is the latest cabinet minister to back Ms Truss, joining Defence Secretary Ben Wallace and Chancellor Nadhim Zahawi in endorsing her candidacy.

  Meanwhile, Mr Sunak has received the support of senior Tory MPs, including former cabinet ministers Liam Fox and Damian Green.

  Ms Mordaunt said at the event - along the south coast from her own Portsmouth North constituency - choosing between the two candidates was hard but it was "too important" to "leave this to chance".

  She said: "At the start of this final phase of this contest, I didn't know the answer to those questions, but I've seen enough to know who the person I'm going to put my faith in is - and that is Liz Truss."

  In her opening speech, Ms Truss said Ms Mordaunt was "a great patriot and I'm proud to call her my friend".

  The warm words marked a change in tone, after allies of Ms Mordaunt accused Ms Truss's team of a dirty-tricks campaign to block her from reaching the final stage of the leadership contest.

  Mr Sunak had his own Tory big hitter to introduce him on stage - in the form of Mr Fox, the former international trade secretary who has himself stood twice to be party leader.

  Mr Fox said Mr Sunak had the ability to win over swing voters and stop a Labour-SNP coalition "tearing our nation apart".

  "We will need a leader and a prime minister, with the right policies, yes, but with character, with courage, with experience and with intellect, and the downright decency to swing those voters behind us and get them to vote Conservative," Mr Fox said. "I believe that leader, that prime minister, will be Rishi Sunak."

  He said character was shown by Mr Sunak's performance during the pandemic, making "difficult but vital decisions", including the introduction of the furlough scheme.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: I ripped up the rule book as chancellor, Rishi Sunak tells audience at second leadership hustings

  When Mr Sunak spoke, he said he would focus on three priorities if he became PM - "restore trust", "rebuild the economy" and "reunite our country".

  He once again attacked Ms Truss's plans to slash taxes and reiterated his belief that he had not taken the "easy path" in setting out his vision for the country.

  He said he would "cut taxes", outlining his plan to cut the basic rate of income tax from 20% to 16% by the end of the next parliament.

  But he added: "We are going to do that responsibly. We are not going to ask our kids to pay for it. We are going to do it by being tough on public spending, reforming public services, and by growing the economy."

  Following the hustings, Ms Truss announced a "war on Whitehall waste" in her campaign's latest policy offering.

  She claimed she would save taxpayers £11bn by cutting civil service time off, ending national pay deals and scrapping jobs aimed at increasing inclusion and diversity in the public sector.

  Her campaign said most of the savings would come from tailoring pay to living costs where civil servants work.

  But a source close to Mr Sunak's campaign said Ms Truss "seems to have confused the wage bill of the civil service with front line public sector workers".

  "This means stretching the NHS to breaking point and fewer police fighting crime as we head into a general election."

  Alex Thomas, from the Institute for Government think tank, said the £8.8bn proposed savings from regional pay bargaining would not come from Whitehall.

  "The whole Civil Service pay bill is only about £9bn," he told BBC Radio 4's Today programme.

  "You're not going to reduce the Civil Service pay bill to £200m unless you pretty radically reshape the state.

  "I know she wants to be radical but possibly not quite that much, so it's going to come from the wider public sector, it's going to come from nurses and teachers and local authorities.

  "This is not a war on Whitehall, it's more like war on Workington," he added.

  Unions and Labour also warned Ms Truss that her proposals would face resistance if she were to implement them.

  Dave Penman, general secretary of the FDA union, said Ms Truss's pledge to cut regional pay for civil servants was "astounding", calling her plans "recycled failed policies".

  Deputy Labour leader Angela Rayner condemned her plans, saying: "This wannabe prime minister is stuck in the past, fighting old battles, and promising a race to the bottom on public sector workers' pay and rights."

  Ms Truss has also been endorsed by West Midlands mayor Andy Street, who said she had a "bold, optimistic vision" for the country.
