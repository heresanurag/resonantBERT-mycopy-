content: |-
  Russ Cook, nicknamed "Hardest Geezer", has finished his challenge of running the length of Africa.

  Russ Cook, nicknamed "Hardest Geezer", has completed his challenge of running the length of Africa.

  He arrived in Tunisia's Ras Angela after running more than 10,000 miles (16,000 km) on a charity run that took him through 16 countries.

  The British runner started his journey in South Africa's Cape Agulhas and has raised more than £570,000 for charity.
