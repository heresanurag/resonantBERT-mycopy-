id: bbc_2021_11249
title: Boris Johnson and Joe Biden hold White House talks - BBC News
date: '2021-09-22'
section: General
url: http://www.bbc.co.uk/news/uk-politics-58647031
content: |-
  Boris Johnson and Joe Biden have held face-to-face talks in the White House.

  President Biden thanked Mr Johnson for "making the effort to be here".

  Mr Johnson responded by thanking him for making it possible for people from the UK with two jabs to travel to the US from November.
