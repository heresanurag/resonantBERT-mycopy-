content: |-
  The White House says anyone coming into contact with the president has to take a Covid-19 test first.

  Flattening the curve - with masks and without

  The president spoke about officials with the federal Centers for Disease Control and Prevention (CDC) and their recommendation that people wear facial masks when they go out. He said that he will not be wearing a mask, however. In this way, he shows his attitude towards the CDC’s efforts to combat the virus: he is willing to announce their advice from a podium, but he is not willing to follow it himself. He has long downplayed the severity of the disease, and today, too, he showed he does not take all of the recommendations from federal officials as seriously as many would like. He spoke about the disease in a room where people were practising social distancing, another one of the recommendations from the federal officials. Before the pandemic, dozens of reporters crowded into the room; today, as in recent days, there are 15, sitting several feet apart. The journalists, as well as the president, are trying to find ways to flatten the curve, but they have different ways of interpreting the guidelines.
