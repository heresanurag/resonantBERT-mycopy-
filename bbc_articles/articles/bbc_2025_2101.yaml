  Macron arrived at the White House on Monday morning

  Those convergences refer to Washington's sudden policy shift in engaging Russia directly. Within a month of taking back the White House, Trump had Putin on the phone and sent a delegation of US representatives to meet with Russian counterparts in Saudi Arabia. Those talks resulted in an agreement to appoint teams from both countries to start negotiating the end of the war. Russia also said it would not accept peacekeeping forces from Nato countries in Ukraine under any peace deal, a proposal that had ben raised a day earlier at a meeting of European members of Nato in Paris arranged hastily by Macron. Macron's meeting with Trump comes ahead of UK Prime Minister Sir Keir Starmer's own visit, which is due on Thursday. Like the French leader, Starmer has also been accused by Trump of having done nothing to end the war. The UK leader also responded to Trump calling Zelensky a "dictator" by saying he was his country's "democratically elected leader". Both Macron and Starmer will be looking to present a united front to Trump to convince him against making decisions about Ukrainian and European security without involving Europeans, Mr Maillard said.
