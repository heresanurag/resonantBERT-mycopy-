  More broadly, Macron's visit is likely to be part time-buying operation for Europe and part fact-finding mission, according to Mr Maillard. "This is a last chance mission because Europe senses that things are hurrying up - they are afraid that this could be done too quickly and badly," Mr Maillard said. He added that the international community was "bewildered" by this "new Putin-Trump axis", and that "Macron wants to understand what the future of Nato is". "So that he is not taken by surprise at the next speech or next tweet," Mr Maillard added. An advisor to Macron's office said that the French president would also use the meeting to present "proposals for action that reflect the convergences that emerged", AFP reported.
