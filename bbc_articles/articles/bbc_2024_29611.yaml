title: Boeing workers end 7-week strike after 38% pay rise deal - BBC News
date: '2024-11-05'
section: Business
url: http://www.bbc.co.uk/news/articles/c0mz9ml473mo
content: |-
  The damaging walkout by around 30,000 unionised Boeing workers started on 13 September.

  Boeing workers in the US have voted to accept the aviation giant's latest pay offer, ending a damaging seven-week-long walkout. Under the new contract, they will get a 38% pay rise over the next four years. Striking workers can start returning to their jobs as early as Wednesday, or as late as 12 November, the International Association of Machinists and Aerospace Workers (IAM) union says. The walkout by around 30,000 Boeing workers started on 13 September, leading to a dramatic slowdown at the plane maker's factories and deepening a crisis at the company.

  IAM said 59% of striking workers voted in favour of the new deal, which also includes a one-off $12,000 (£9,300) bonus, as well as changes to workers' retirement plans. "Through this victory and the strike that made it possible, IAM members have taken a stand for respect and fair wages in the workplace," union leader Jon Holden said. The union had previously called for a 40% pay increase and workers had rejected two previous offers from the company. "While the past few months have been difficult for all of us, we are all part of the same team," said Boeing's chief executive Kelly Ortberg. "There is much work ahead to return to the excellence that made Boeing an iconic company." In a sign of how seriously the White House took the strike at one of the country's most important companies, acting US Labor Secretary Julie Su flew to Seattle last month to help with negotiations.

