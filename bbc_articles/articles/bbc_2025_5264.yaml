  The US President deepened the shock and anger around his ideas when he posted an AI-generated video of a golden Gaza on his Truth Social account which featured a shimmering statue of himself, his close ally Elon Musk enjoying snacks on the beach, and he and the Israeli leader Benjamin Netanyahu sunning themselves, shirtless. All to a catchy tune, with lines like "Trump Gaza is finally here". "They had President Trump in mind," remarked one Western diplomat who attended a briefing about Egypt's plan at the foreign ministry in Cairo. "It's very glossy and very well-prepared." Cairo's proposal is said to have drawn on a wide range of expertise, from World Bank professionals on sustainability, to Dubai developers on hotels. There are also lessons learned from other ravaged cities which rose from the ruins including Hiroshima, Beirut, and Berlin. And the proposed designs are also influenced by Egypt's own experience in developing its "New Cairo", its grand megaproject which has seen a new administrative capital rising from the desert – at great expense. The American President has said he won't "force" his ideas on anyone but still insists his plan is the one "that really works". Now it is up to the Arab states and their allies to prove that their plan is the only plan.
