title: 'Ursula Keogh: Body found in stream is missing Halifax girl - BBC News'
date: '2018-01-23'
section: Leeds & West Yorkshire
url: http://www.bbc.co.uk/news/uk-england-leeds-42783932
content: |-
  West Yorkshire Police say Ursula Keogh's death is not thought to be suspicious.

  Police have confirmed a body found in a stream in Halifax is that of a missing 11-year-old schoolgirl.

  Ursula Keogh was last seen at about 15:30 GMT on Monday dressed in her school uniform.

  Her body was found by police in the Hebble Brook at Paris Gates on Monday evening.

  West Yorkshire Police are working to establish the full circumstances but a spokesman said her death was not thought to be suspicious.

  The spokesman said Ursula's family were being supported by specialist officers.

  In a statement on Tuesday, Lightcliffe Academy, where Ursula was a pupil, said: "Following the tragic death last night of our student Ursula Keogh, the academy is open today as we look to support students and the whole academy community with this heartbreaking loss

  "Our thoughts and prayers are with Ursula's family and friends and at this very difficult time."

