content: |-
  British speed skater Elise Christie says she will "still be racing fearless" at the Winter Olympics despite falling in the 500m short-track final.

  This video can not be played To play this video you need to enable JavaScript in your browser. Support since crash is 'amazing' - GB's Elise Christie thanks fans

  Great Britain's Elise Christie says she will "still be racing fearless" at the Winter Olympics, despite falling in the 500m short-track speed skating final. The 27-year-old, disqualified in each of her three events at Sochi 2014, was clipped by Yara van Kerkhof and crashed before finishing fourth on Tuesday. Scot Christie will race again in the 1500m on Saturday and the 1,000m on Tuesday in Pyeongchang. "It was nowhere near as traumatic as Sochi," Christie told BBC Sport. Four years ago, Christie had suffered online abuse and death threats after a collision with a South Korean skater Park Seung-hi. "I didn't come off to thousands of abuse," she added about Tuesday's final. "I didn't get a penalty, what happened I couldn't have done anything about it. As frustrating as it is I've got to move forward now." Christie said she has received messages of support from British Olympic gold medallists Jessica Ennis-Hill and Kelly Holmes.

  "It is great to see other sportsmen understand that sport is crazy and is harsh at times," said the three-time world champion. "They've gone through things like this before, and I can get through this and come out the other end. "I want to thank everyone who has sent me love and messages of support and I will do my best to turn this around for the country." The Scot says she has now refocused her attention on winning medals in her final two events in Pyeongchang. "1,000m is the one I'll really be trying to get for gold in," said Christie. "And I've still got the World Championships to become world champion in the 500m, so there are a lot of chances still."

