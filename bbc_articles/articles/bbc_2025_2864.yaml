  "All the prisoners who were released today are in need of medical care, treatment, and examinations as a result of the brutality they were subjected to during the past months," the group's Abdullah al-Zaghari said. One of those released was Jamal al-Tawil, 61, a prominent Hamas politician in the occupied West Bank and former mayor of the village of al-Bireh, who has spent more than 19 years in and out of Israeli prisons. His daughter Bushra al-Tawil was freed in an earlier prisoner release in January. Both father and daughter were most recently held without charge, media reported. Khadra al-Daghma, the mother of another released Palestinian prisoner, described feeling "so happy, overjoyed" having seen her son for the first time in 15 years. "My heart is filled with happiness," she told a reporter in Gaza, adding that her son, Ammar Fadel al-Daghma, had "changed a lot" and was "not the same". According to the Israeli Prison Service, he was detained for offences including arson, attempted murder and service to an illegal organisation.
  • None Who are Israeli hostages released and rescued from Gaza Hamas seized 251 hostages and killed about 1,200 people when it attacked Israel on 7 October 2023, triggering the war. At least 47,500 Palestinians have been killed in Israel's offensive, according to Gaza's Hamas-run health ministry. About two-thirds of Gaza's buildings have been damaged or destroyed by Israel's attacks, the UN says.

