  Photographs of (L-R) Or Levy, Ohad Ben Ami and Eli Sharabi show them before 7 October 2023

  Netanyahu's co-ordinator of prisoners and missing persons said Israel treated the issues with "great severity" and would raise them with ceasefire mediators and take action. Mr Sharabi's brother-in-law, Steve Brisley, told the BBC that having confirmation he is alive is "what we've been working toward for the last 16 months". It was "incredibly difficult" to see him "thin, gaunt" and being paraded by Hamas, Mr Brisley said. "It's the light that's gone from his eyes that's really struck home for me." Eli Sharabi, 52, was taken from Kibbutz Beeri with his brother, Yossi, whose death has since been confirmed. Eli's British-born wife, Lianne, and two British-Israeli daughters, Noiya and Yahel, were murdered in the attack. During his release, Mr Sharabi was filmed saying he was "very happy today to return to...my wife and daughters", adding to concerns he was unaware his family had been killed. In a statement, UK Prime Minister Keir Starmer said: "I shared the relief of so many at Eli Sharabi's release earlier today but was dismayed to see his frail condition and the circumstances of his release." The Hostages and Missing Families Forum said in a statement that "the disturbing images" of the release "serve as yet another stark and painful evidence that leaves no room for doubt - there is no time to waste for the hostages! We must get them all out, down to the very last hostage". Meanwhile, the International Committee of the Red Cross (ICRC), which facilitated the handover, said it was "increasingly concerned about the conditions surrounding release operations". "We strongly urge all parties, including the mediators, to take responsibility to ensure that future releases are dignified and private," it said.

  The three hostages on a stage in Deir al-Balah, central Gaza, before their release

  Later on Saturday, Israel released 183 Palestinian prisoners. More than 70 are serving life or long sentences, and 111 are Gazans detained during the war. Seven are due to be deported. Seven of the released prisoners were admitted to hospital in Ramallah because of poor health, the Palestinian Prisoners' Club told AFP.

