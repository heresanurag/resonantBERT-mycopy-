  Ohad Ben Ami, 56, was also taken from Kibbutz Beeri, along with his wife, Raz. She was later released by Hamas. Mr Ben Ami, an accountant, is "known for his good judgment and sense of humour", according to the Hostages Families Forum. Or Levy, 34, a computer programmer from Rishon LeZion, a city south of Tel Aviv, fled the Nova festival with his wife Eynav, when gunmen attacked the event. Mr Levy was taken hostage and Eynav's body was found in a bomb shelter where the couple had been hiding. In a statement, Mr Levy's family said: "Our hearts tremble and our minds struggle to comprehend the sight of Or, who has returned to us in such a devastating state. His face bears witness to the hell he endured during 491 days in the hands of Hamas monsters. "After an unbearable period of darkness, we can finally embrace him again and begin healing his body and spirit," the statement said.
  • None Jeremy Bowen: Trump's Gaza plan won't happen, but it will have consequences On Friday, Hamas accused Israel of failing to abide by its commitment to boost the amount of humanitarian aid allowed into Gaza as part of the ceasefire deal. The head of Hamas's media office in Gaza, Salama Marouf said "the humanitarian situation remains catastrophic due to Israeli obstruction". He said only 8,500 out of an expected 12,000 aid lorries had entered Gaza since 19 January, and medical equipment and shelter supplies had been deliberately delayed. The allegation contradicts UN humanitarian chief Tom Fletcher, who on Thursday said 10,000 lorries with food, medicine and tents, external had crossed into Gaza since the start of the ceasefire. Saturday's exchange took place as US President Donald Trump continued to push his widely criticised proposal to move all Palestinians from Gaza and redevelop it as an international travel destination. His announcement - for the US to "take over" the Gaza Strip, resettle its Palestinian population and turn the territory into the "Riviera of the Middle East" - has complicated talks on the planned next stage of the ceasefire. But Israeli negotiators are still expected to meet mediators in Qatar later on Saturday. Trump's idea was strongly condemned by Arab countries and the UN.
