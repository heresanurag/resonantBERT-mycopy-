content: |-
  Concerns have been raised about the appearance of the Israelis, while representatives for the released Palestinians say they all needed "medical attention".

  (L-R) Eli Sharabi, Or Levy and Ohad Ben Ami were released by Hamas on Saturday

  Hamas has freed three Israeli hostages in Gaza, while Israel released 183 Palestinian prisoners in the latest exchange as part of an internationally brokered ceasefire deal. The three hostages - Eli Sharabi, Ohad Ben Ami and Or Levy - were handed over to the Red Cross on Saturday morning before reuniting with their families in Israel. Concerns have been raised about their wellbeing, with Mr Sharabi's family - who live in the UK - describing their shock at his "gaunt" appearance. Returning Palestinian prisoners were greeted with scenes of celebration at Ramallah in the occupied West Bank. Representatives claimed they all needed "medical care", without giving specifics.

  So far, 16 Israeli hostages and 566 prisoners have been freed since the ceasefire began on 19 January. By the end of the first stage of the ceasefire in three weeks time, 33 hostages and 1,900 prisoners are expected to have been freed. Israel says eight of the 33 are dead. Five Thai hostages have also been released during this period following a separate agreement. As Mr Sharabi, Mr Ben Ami and Mr Levy were handed over to the Red Cross in Deir al-Balah, central Gaza, crowds lined up, cordoned off by a row of armed fighters, to watch and film on mobile phones, as Hamas and Palestinian flags flew. A Hamas official and Red Cross representative signed paperwork on a stage to complete the handover. The hostages were then paraded on stage, flanked by men with guns. The three men posed holding certificates and answered questions into a microphone, before waving as they were ushered into Red Cross vehicles. Israeli President Isaac Herzog expressed horror at the physical state of the men who he said were "returning after 491 days of hell, starved, emaciated and pained". Prime Minister Benjamin Netanyahu also criticised the men's state, saying "we have seen again what the monsters of Hamas are". He also accused Hamas of "repeated violations" of the ceasefire deal, without providing specifics. Speaking to BBC Arabic on Saturday, Hamas spokesman Hazem Qassem said the latest release of Israeli hostages had been carried out in a "civilised manner". He also accused Israel of "dragging its feet" on implementing humanitarian relief agreed as part of the ceasefire.
