title: Man arrested after Shoreham woman stabbed several times - BBC News
date: '2018-09-05'
section: Sussex
url: http://www.bbc.co.uk/news/uk-england-sussex-45418195
content: |-
  Earlier police said they wanted to question Liam Hanley, 32, on suspicion of attempted murder

  A man has been arrested after a woman was stabbed several times.

  She was found with multiple knife wounds in Sussex Wharf in Shoreham, West Sussex, at about 20:15 BST on Tuesday.

  The 36-year-old was taken to the Royal Sussex County Hospital in Brighton in a serious but not life-threatening condition.

  Earlier police said they wanted to question Liam Hanley, 32, on suspicion of attempted murder.

  Armed officers were deployed to Sussex Wharf, Shoreham, at about 20:15 BST on Tuesday

  Sussex Police said they are treating the incident as attempted murder

  In a statement Sussex Police confirmed a 32-year-old man went into a police station in Slough, Berkshire.

  He was detained on suspicion of attempted murder and taken into custody.

  Det Insp Chris Leech said: "A man has been arrested in connection with the attempted murder of a woman in Shoreham.

  "We would like to thank the public and media for their assistance in this investigation."

