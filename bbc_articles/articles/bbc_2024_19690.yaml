title: Nick Grimshaw's Ibiza villa targeted by gang during birthday trip - BBC News
date: '2024-08-23'
section: Culture
url: http://www.bbc.co.uk/news/articles/ckg2zpz8ddmo
content: |-
  The former BBC Radio 1 breakfast host was celebrating his 40th birthday on the island with family.

  Mr Grimshaw was sleeping inside the villa when it was raided

  Nick Grimshaw's rented villa in Ibiza was targeted by thieves while he, his family and friends were sleeping inside during a recent trip. The former Radio 1 breakfast host was on the island to celebrate his 40th birthday. A source told The Sun, external that Mr Grimshaw and his family were shaken up but unhurt. The property was broken into by a gang who are known for burgling luxury apartments and villas. The location appeared on a hit list because it was associated with housing the rich and famous, not because of who was staying there. “The gang would have had no idea who he was. Sadly it’s a case of the wrong place at the wrong time but it’s scary to say the least," the source said.

  Grimshaw (left) with his podcast co-host Annie Macmanus at Radio 1's Biggest Weekend in 2018

  It is believed the gang targets properties by filling them with sedative gas and then enters wearing protective suits, but it is unknown if this method was used on Mr Grimshaw and his family. Mr Grimshaw has removed any evidence of his trip to the Spanish island from social media and has chosen not to speak publicly about the incident. In a now-deleted post, he was pictured sunbathing outside the villa with the caption "Waking up 40". Amongst those staying in the property were his mother Eileen and fiancé Mesh Henry. Mr Grimshaw and Mr Henry are now thought to be back home in London. The 40-year-old rose to prominence in 2012 when he took over from Chris Moyles as host of the Radio 1 Breakfast show. He then went on to become a judge on The X Factor in 2015 after taking over from Louis Walsh.
