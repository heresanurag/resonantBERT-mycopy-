content: |-
  It unveiled the console on Wednesday just hours before the president announced a wave of global tariffs.

  Nintendo pulls Switch 2 pre-orders in US over Trump tariffs

  Nintendo says it will no longer open pre-orders for the Switch 2 in the United States next week, following the introduction of steep tariffs on exports from Japan. The firm unveiled the much-anticipated console on Wednesday, the same day US President Donald Trump announced his sweeping new global tariffs. It said then that US pre-orders would open in a matter of days, but it has been now been forced to revise its plans. "Pre-orders for Nintendo Switch 2 in the US will not start April 9 in order to assess the potential impact of tariffs and evolving market conditions," it said in a statement. It says it still intends to launch the console on June 5, as originally planned.

  Nintendo confirmed the announcement applies to the US market only, so UK pre-orders will not be affected. Tariffs are taxes charged on goods imported from other countries. Japan, where the gaming company is based, has been hit with a 24% tariff - a cost which the firm must swallow or pass onto consumers. Trump says that his global tariffs will boost the US economy and protect jobs - but Japanese Prime Minister Shigeru Ishiba called them a "national crisis" on Friday according to local media, external. "The government will do its utmost to respond to this crisis, involving the entire country," he said.

  The decision may raise concerns amongst fans that Nintendo could be considering a change in prices in the US. The cost of the console's games has already emerged as an area of concern. On Wednesday, it revealed the Switch 2 would cost $449.99 in the US, with a physical copy of its big game Mario Kart World coming in at $79.99 - though it can be purchased for less if bought with the console. It is not known whether Nintendo factored potential tariffs into its original pricing - though, even if it did, it is unlikely it would have expected the rate to be as high as the 24% announced by Trump.
