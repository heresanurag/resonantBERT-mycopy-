title: 'Llandudno: Dolphin found injured and stranded on beach front - BBC News'
date: '2024-12-10'
section: General
url: http://www.bbc.co.uk/news/videos/ce32lp94k8vo
content: |-
  Medics scrambled to the scene but made the "difficult decision" to put down the animal.

  A dolphin was found injured and stranded on a beach front in north Wales in the wake of Storm Darragh.

  British Divers Marine Life Rescue was alerted on Sunday to the animal in Llandudno, Conwy county.

  Medics attended but found the dolphin had been "put back into the surf and was floundering around 30 metres offshore in high waves".

  The young male animal had extensive and deep injuries on the underside of its tail fin, around the eye and along its beak from being rolled around by the tide on a pebble beach.

  The "difficult decision" was taken to euthanise him to end his suffering and the team thanked locals for their support in the attempts to save the dolphin.
