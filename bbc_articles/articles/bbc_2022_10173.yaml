title: Biden tests negative for Covid after 'rebound' case - doctor - BBC News
date: '2022-08-07'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-62449704
content: |-
  The US president will stay in isolation until he has a second negative test, his doctor says.

  This video can not be played To play this video you need to enable JavaScript in your browser. WATCH: Biden seen leaving White House for first time since contracting Covid-19

  US President Joe Biden has tested negative for Covid-19 days after getting a second bout of the virus, his doctor says.

  Mr Biden, 79, first tested positive for the virus more than two weeks ago.

  He had been in isolation for a second time after getting what White House doctor Kevin O'Connor described as a "rebound" case.

  The president will now return to public life, after he tested negative on both Saturday and Sunday.

