  President Donald Trump posted that he was "saddened" by Biden's diagnosis but later questioned - without providing any evidence - whether Biden's team had known earlier about his illness and concealed the news from the public. "I am surprised that the public wasn't notified a long time ago because to get to stage nine that takes a long time," he said at the White House on Monday afternoon. "It could take years to get to this level of danger," he said, adding: "I feel very badly about it, and I think people should try and find out what happened." Late-stage diagnoses for cancer are not unheard of, however. One UK study in 2014 found 46% of cancer diagnoses in that country were only made at an advanced stage. Biden's office said that he was diagnosed on Friday with prostate cancer "characterised by a Gleason score of 9 (Grade Group 5) with metastasis to the bone". "While this represents a more aggressive form of the disease, the cancer appears to be hormone-sensitive which allows for effective management." A Gleason score of nine means his illness is classified as "high-grade" and the cancer cells could spread quickly, according to Cancer Research UK.
  • None What we know about Biden's prostate cancer diagnosis Biden said his diagnosis was made after he reported urinary symptoms which led doctors to find a small nodule on his prostate. In the wake of the cancer diagnosis, many have offered Biden their support including former President Barack Obama and former Vice-President Kamala Harris. King Charles has written privately to Biden offering his support and best wishes, Buckingham Palace said. The king, 76, who has met Biden a number of times, is also receiving treatment for an unspecified type of cancer after his diagnosis in 2024. Biden had then sent his best wishes, saying: "I'm concerned about him. Just heard about his diagnosis. I'll be talking to him, God willing."

  To play this video you need to enable JavaScript in your browser. This video can not be played Vance raises questions on Biden's health during time in office

  Vice-President JD Vance offered well wishes, but questioned whether the American people had a clear picture of Biden's health while the former president was in office. "We really do need to be honest about whether the former president was capable of doing the job," Vance said on Monday. "And that's that's ... you can separate the desire for him to have the right health outcome with a recognition that whether it was doctors or whether there were staffers around the former president, I don't think he was able to do a good job for the American people." Vance also said he blamed the people around him more than Biden himself. "This is not child's play, and we can pray for good health, but also recognise that if you're not in good enough health to do the job, you shouldn't be doing the job," he added. The announcement comes as Biden staves off criticism from a forthcoming book that claims he and his advisers hid his deteriorating health while he was in the White House. Details revealed last week from the book entitled, Original Sin: President Biden's Decline, Its Cover-Up, and His Disastrous Choice to Run Again, include Biden not recognising actor and frequent Democratic donor George Clooney at a fundraiser last year and aides discussing putting the former president in a wheelchair. The book will be released on Tuesday. Nearly a year ago, the former president was forced to drop out of the 2024 US presidential election because of concerns about his health and age.
