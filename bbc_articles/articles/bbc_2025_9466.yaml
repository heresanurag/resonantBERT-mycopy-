title: Cancer touches us all, says Biden after outpouring of support - BBC News
date: '2025-05-19'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cyvmq997y9go
content: |-
  The former US president has been diagnosed with an aggressive form of prostate cancer that has spread to his bones, his office says.

  Cancer touches us all, says Biden after outpouring of support

  Joe Biden expressed his gratitude for the words of support that have poured in from across the world, including a private letter from Britain's King Charles, after the former US president announced his cancer diagnosis on Sunday. "Cancer touches us all," Biden wrote on social media on Monday morning. "Like so many of you, Jill and I have learned that we are strongest in the broken places. Thank you for lifting us up with love and support." On Sunday, Biden's office disclosed that he was diagnosed with an aggressive form of prostate cancer that has spread to his bones. The news comes as fresh questions are being raised about the former president's health while he was in office.

