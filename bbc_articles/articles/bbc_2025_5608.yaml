title: Watchdog reopens probe into contact with Nottingham attacks killer - BBC News
date: '2025-03-07'
section: Nottinghamshire
url: http://www.bbc.co.uk/news/articles/cp9y8z7m099o
content: |-
  The Independence Office for Police Conduct (IOPC) said Leicestershire Police had "provided new evidence".

  Ian Coates, Barnaby Webber and Grace O'Malley-Kumar were stabbed to death on 13 June 2023

  An investigation into contact police had with the Nottingham attacks killer has been reopened after "significant new information" came to light. Valdo Calocane was reported to have attacked two co-workers at a warehouse in Leicestershire about five weeks before he fatally stabbed Ian Coates, Grace O'Malley-Kumar and Barnaby Webber in Nottingham on 13 June 2023. Three officers were due to face a misconduct meeting, which was later postponed by Leicestershire Police. The Independence Office for Police Conduct (IOPC) said the force had "provided new evidence, which had not previously been available to the IOPC".

  The families of the three people killed in the Nottingham attacks have been pressing for more information

  The announcement of the reopening of the investigation comes weeks after it was confirmed a judge-led public inquiry will take place into the Nottingham attacks. A review into the NHS's treatment of Calocane also found major failings, with an independent report finding "the system got it wrong". In February 2024 the IOPC confirmed it was opening an investigation into Leicestershire Police's contact with Calocane, but this was concluded in September last year. The families of the Nottingham attacks victims had criticised the IOPC's work as "flawed, hastened and incomplete".

  IOPC director Derrick Campbell said the organisation's director general has offered to meet the victims' families to discuss developments. "For a matter to be reopened by the IOPC - it has to meet one or more criteria including significant new information coming to light that requires further investigation," he said. "That applies in this case and after careful consideration of this new information, we are carrying out further enquiries in respect of what officers actually saw on police systems about Calocane, and in particular an outstanding warrant for his arrest." He added: "Those who are closely impacted by our decision, including the bereaved families and the officers involved, have been notified and we will complete this work as quickly as possible. "Any decision on the disciplinary outcome of our investigation will only be made once the new evidence and the results of these enquiries have been analysed." Dr Sanjoy Kumar, father of Ms O'Malley-Kumar, said the family had been asking "so many questions" about the IOPC and police investigations, and called for them to "be transparent and open". "The thing that needs to happen now is that we need to get all the facts on the table before we proceed with anything," he said. "The only reason that people proceed too quickly is when there is something to cover up or there is an inadequacy."

