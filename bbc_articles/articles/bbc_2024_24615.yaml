title: Sheriff rescues 14-year-old stranded on floating hurricane debris - BBC News
date: '2024-10-10'
section: General
url: http://www.bbc.co.uk/news/videos/ce8v4kgd5zro
content: |-
  The teenager was found alone in a flooded area of Hillsborough County in Florida.

  Sheriff Chad Chronister and his department's Marine Unit rescued a 14-year-old boy in Hillsborough County, Florida, in the aftermath of Hurricane Milton.

  The sheriff's office posted video of the rescue online.

  The teenager was found alone and half-submerged on floating debris from the storm. It is not known why he was alone or how long he was stranded for.
