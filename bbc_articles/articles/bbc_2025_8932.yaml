  Netanyahu has said Israel is planning to expand its military offensive in Gaza and that nothing will stop the war. He told injured reservist soldiers on Monday that Israeli forces would go into the territory in the coming days "with full force to complete the operation" to destroy Hamas. "There will be no situation where we stop the war. A temporary ceasefire might happen, but we are going all the way," he added. Hamas has refused to release the remaining hostages unless Israel agrees to a permanent ceasefire and withdraws from Gaza. On Tuesday, a massive Israeli air strike on the European hospital's compound in Khan Younis killed at least 28 people, according to local officials. The Israeli military described it as "a precise strike on Hamas terrorists who were operating in a command-and-control centre" underneath the hospital. Israeli media reports said the target was Mohammed Sinwar, who is believed to have become the top Hamas leader in Gaza after his brother Yahya was killed by Israeli forces last October. Israel launched a military campaign to destroy Hamas in response to an unprecedented cross-border attack on 7 October 2023, in which about 1,200 people were killed and 251 others were taken hostage. At least 52,928 people have been killed in Gaza since then, including 2,799 since the Israeli offensive resumed, according to the territory's Hamas-run health ministry.
