id: bbc_2024_4627
title: 'Iceland volcano: Huge lava flows as volcano erupts - BBC News'
date: '2024-03-16'
section: General
url: http://www.bbc.co.uk/news/world-europe-67974967
content: |-
  A volcano has erupted in south-west Iceland, forcing residents of the nearby fishing town of Grindavik to evacuate for their safety. This is the second volcanic eruption on the Reykjanes peninsula in a month.

  Local residents were also told to evacuate in November after another eruption, but some were allowed home for periods of time.

  Iceland's public broadcaster RUV says it is not clear which direction the lava is flowing.
