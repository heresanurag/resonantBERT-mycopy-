title: Silicon Valley parents banning tech for their kids - BBC News
date: '2019-06-06'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-48533999
content: |-
  "You don't teach creativity by going into the creativity app," says one father limiting screen time.

  Some of the creators of the apps and technology we spend so much time on are now on a mission to keep it away from their kids.

  Colleen Hagerty meets two dads - and tech experts - with different views on screen time at schools.
