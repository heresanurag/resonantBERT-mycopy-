content: |-
  A start-up has a smartphone gadget that lets users create high-resolution models of their faces.

  A Silicon Valley start-up believes it has developed the next-generation selfie.

  Bellus3D is showing off a face-scanning solution for Android devices at the CES tech show in Las Vegas.

