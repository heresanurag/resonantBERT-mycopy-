title: Fatman Scoop dies after collapsing on stage during US show - BBC News
date: '2024-09-01'
section: Culture
url: http://www.bbc.co.uk/news/articles/clyn0z93p11o
content: |-
  The New Yorker, who has collaborated with artists like Mariah Carey, collapsed during a gig in Connecticut.

  US rapper Fatman Scoop dies after collapsing on stage

  US rapper Fatman Scoop has died aged 56 after collapsing at his concert on Friday in Connecticut, his representative has told the BBC. He was halfway through his set at the Town Center Park in the city of Hamden when he collapsed on stage. Mayor Lauren Garrett said in a post to Facebook that the rapper was taken to a local hospital by ambulance. But his booking agency, MN2S, confirmed his death in a statement to the BBC, saying the New York native's "legacy will live on through his timeless music".

  "Scoop was a beloved figure in the music world, whose work was loved by countless fans across the globe," an agency spokesperson. "His iconic voice, infectious energy, and great personality made an indelible mark on the industry." In a tribute on social media, Scoop's family said he was "a radiant soul, a beacon of light on the stage and in life." "FatMan Scoop was not just a world class performer, he was a father, brother, uncle and a friend," his family said. "He was the laughter in our lives, a constant source of support, unwavering strength and courage." Scoop, whose legal name is Isaac Freeman III, has been credited as an influential figure in New York City’s hip hop scene in the 1990s. He has featured on popular songs including Grammy award-winning Lose Control by Missy Elliott and It’s Like That by Mariah Carey. Scoop is also known for his sleeper hit Be Faithful, which was originally released in 1999 but garnered international success in 2003, topping the charts in Ireland and the UK. In 2004, the rapper was featured in the UK TV series Chancers on Channel 4, which featured musicians mentoring aspiring UK artists looking to achieve success in the US. Fatman Scoop was also a contestant on Celebrity Big Brother 16: UK vs USA, which was housed in the UK and aired in 2015. He was the third housemate to be evicted. His tour manager, DJ Pure Cold, wrote in a post on Instagram that he was “lost for words” at the news of his friend’s death. “You took me all over the world and had me performing alongside you on some of the biggest and greatest stages on this planet,” he wrote. “The things you taught me have truly made me the man I am today.” Fatman Scoop was due to perform at the UK’s Reminisce Festival on 7 September. In a post on Instagram, the festival called the news of his death “devastating”. “He was not just one of our most popular performers, he was a cherished member of the Reminisce family,” the festival said. “His energy, talent and infectious spirit will be missed more than words can express.” Update 3 September 2024: This article has been amended to say that Fatman Scoop was 56, after widespread reports incorrectly said he was 53.
