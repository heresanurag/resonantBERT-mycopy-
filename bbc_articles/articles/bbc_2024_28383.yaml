title: Zara Aleena killer has charge dropped over 'prison relationship' - BBC News
date: '2024-11-19'
section: London
url: http://www.bbc.co.uk/news/articles/clyjpn54m1ko
content: |-
  A charge against Jordan McSweeney is dropped as a prison worker admits "inappropriate relationship".

  Jordan McSweeney was charged with encouraging or assisting the commission of an indictable offence

  Charges have been dropped against Zara Aleena's murderer after a prison workshop instructor pleaded guilty to having an inappropriate relationship with him. Hayley Jones, 33, had admitted to misconduct in a public office over an inappropriate relationship with Jordan McSweeney, 31, between 6 March 2023 and 7 April 2023 at HMP Belmarsh. McSweeney was charged with encouraging or assisting the commission of an indictable offence. On Tuesday, during a hearing at Woolwich Crown Court, a prosecutor said the Crown Prosecution Service (CPS) had decided to drop the charge against McSweeney "in light of" Jones' guilty plea.

  Hayley Jones admitted to misconduct in a public office over an inappropriate relationship with Jordan McSweeney

  "Some of the evidence was that he was getting special favours or treatment," Judge David Miller said of the killer's case. "He may have been bragging to another prisoner about the power that he had over this person." Prosecutor Polly Dyer told the court a "full review" of the case against McSweeney had been undertaken "at the highest level of the CPS". "The Crown's view is to offer no evidence," she said. Ms Dyer declined to offer any more details about the decision when invited to do so by the judge. A CPS spokesperson said after the hearing there was "insufficient evidence" to prove McSweeney's guilt. Neither Jones or McSweeney were required to attend the hearing. Jones, of Strood in Kent, will be sentenced on 4 February after she has been psychologically assessed.

  McSweeney killed 35-year-old Ms Aleena as she walked home from a night out in Ilford, east London, in the early hours of 26 June 2022. He was handed a life sentence with a minimum term of 38 years at the Old Bailey in December 2022 after admitting to sexually assaulting and murdering her. In November 2023, he won a Court of Appeal bid to reduce the minimum term of his life sentence to 33 years.
