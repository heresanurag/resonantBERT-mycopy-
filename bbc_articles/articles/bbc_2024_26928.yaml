title: Teenager dies after police chase near Central Middlesex Hospital - BBC News
date: '2024-10-07'
section: London
url: http://www.bbc.co.uk/news/articles/cp3929wkxz7o
content: |-
  Another occupant of the car that crashed was critically injured, the Met Police said.

  A 17-year-old boy has died in a crash following a police chase in north-west London.

  The teenager was one of three males taken to hospital after the collision on Park Royal Road outside Central Middlesex Hospital at about 05:25 BST on Monday.

  One of the other occupants is in a critical condition and the third is not believed to be seriously injured, the Met Police has said.

  Police watchdog the Independent Office for Police Conduct (IOPC) will investigate the circumstances and the Met's directorate of professional standards has been informed, Scotland Yard said.
