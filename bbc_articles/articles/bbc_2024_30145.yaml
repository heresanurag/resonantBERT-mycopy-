  The rebels took control of Aleppo's airport and dozens of nearby towns, according to SOHR. They also announced an overnight curfew which came into force at 17:00 local time on Saturday (14:00 GMT). SOHR also said the rebel fighters had advanced south toward Hama and that the Syrian army had withdrawn. But a military source quoted in Syrian state media on Saturday night disputed this claim. The Syrian army said rebels had launched "a broad attack from multiple axes on the Aleppo and Idlib fronts" and that battles had taken place "over a strip exceeding 100km (60 miles)". Dozens of its soldiers have been killed, it said. A US spokesperson said Syria's "reliance on Russia and Iran", along with its refusal to move forward with a 2015 UN Security Council peace plan, had "created the conditions now unfolding" in the country. Pictures showed the roads leading out of Aleppo jammed with cars on Saturday as people tried to leave, and smoke rising out of the city's skyline.

  Rebels have reportedly taken control of Aleppo's airport and dozens of nearby towns
