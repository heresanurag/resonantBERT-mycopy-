  Jamie Smith will take the gloves and bat at number three in England's Champions Trophy opener against Australia on Saturday.

  Smith to bat at three in England's Champions Trophy opener

  Smith has not played since the third ODI in India on 28 January because of a calf injury

  Wicketkeeper Jamie Smith will bat at number three in England's Champions Trophy opener against Australia on Saturday. Smith, 24, has only batted in the position once in professional 50-over cricket. He will also take the gloves from Phil Salt. Salt remains as opener alongside Ben Duckett while Joe Root drops down to number four. Durham's Brydon Carse also returns after a toe injury in a three-strong pace attack that also includes Mark Wood and Jofra Archer.
