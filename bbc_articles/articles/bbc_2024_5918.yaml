content: |-
  Men dressed as devils - "talciguines" - whip the faithful in a playful Easter tradition in El Salvador.

  Men dressed as devils - "talciguines" - whip the Catholic faithful in a playful Easter tradition in El Salvador.

  The event in the town of Texistepeque is meant to symbolise the triumph of good over evil. It draws people from all over El Salvador.

  Apart from the "talciguines" - Nahuatl for devilish men - one character represents Jesus.
