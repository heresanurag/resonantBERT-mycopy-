  In making a superb 165, Duckett played how most have requested. The attacking intent was reined in, gaps worked and a score steadily built rather than thrown up in a hurry. England's top order has been asked to score hundreds – to overcome their tendency to start well and depart - and Duckett produced England's highest score in a Champions Trophy or World Cup. Their score of 351-8 was the highest at a Champions Trophy. Another 30 may not have mattered the way Inglis was going. In truth, England's biggest failure on this occasion was not made in Lahore on Saturday but before Christmas in London – or at least after Jacob Bethell pulled a hamstring in Nagpur. Their squad has four wicketkeepers, one specialist spinner and one batting all-rounder, meaning England will always lose their fight in search of the perfect balance. With four frontline bowlers against Australia, Buttler had nowhere to turn when Brydon Carse had his most difficult day to date in an England shirt – even if Liam Livingstone and Joe Root performed admirably as the fifth bowler. It leaves a feeling that Bethell's injury was more damaging to England than it first appeared, given his left-arm spin would have provided another option. Without him Buttler now faces a defining week in his reign as England's white-ball captain. After a dismal defence of their 50-over world title in 2023 and an uninspired attempt at retaining their T20 crown last year, he cannot afford a group-stage exit here. Matthew Mott was dispensable enough to take the fall for the previous failures but Brendon McCullum, given the keys to all England sides to mould as he pleases until 2027, is not. Instead, it will be Buttler in the firing line if this group stage is not turned around. Next is Afghanistan in four days' time – a side who beat England during the World Cup 16 months ago – and then South Africa, some people's favourite for the title, with wins likely to be needed in both. England have questions again and some do not have an easy answer. Inglis has given England the (sky) blues.
