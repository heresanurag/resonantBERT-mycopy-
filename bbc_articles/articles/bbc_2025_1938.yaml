content: |-
  How a cricketer born in Yorkshire and brought up supporting Coventry City put England in a spin.

  This video can not be played To play this video you need to enable JavaScript in your browser. Australia chase down highest Champions Trophy score to beat England in classic

  Josh Inglis has his priorities in order. Having played the innings of his life in Lahore - 120 not out to power Australia to victory over England in the Champions Trophy - he immediately checked his phone. Coventry City had beaten Preston North End 2-1. It turned a good night for the Australian into a great one. For Inglis, Australia's match-winner who was born and raised in Yorkshire, supports the Sky Blues. The 29-year-old lived on the outskirts of Leeds until he was 14, played for Yorkshire's youth teams and when named Sportsman of the Year at St Mary's Comprehensive in Menston, was presented with an award by the Kaiser Chiefs - the famous musical sons of the West Yorkshire city. Inglis even admitted to still supporting England as recently as 2017 while trying to win a place in Australia's XI. "Those days are long gone, I think," said the right-hander, shortly after his innings propelled Australia to the highest run-chase in the 50-year history of cricket's global white-ball events.

  A 13-year-old Josh Inglis received an award for outstanding sporting achievement from the Kaiser Chiefs in his school days on the outskirts of Bradford

  Inglis moved to Western Australia as a 15-year-old when his England-born mum, Sarah, and father, Martin, who was born in Coventry hence the football allegiance, moved the family down under. Any hint of a Yorkshire twang was left on t' plane. He now speaks with a broad Australian accent, has a thick moustache and addressed the media with his cap backwards and sliders on his feet. There were no split loyalties during his stunning assault. Australia were 136-4 when Inglis began - England overwhelming favourites with Adil Rashid, Inglis' former Yorkshire second XI team-mate, spinning a web. He began by timing the ball to all corners of Lahore before flogging England's bowlers whenever they dropped too short. By the end, he was playing the trademark shot of another Yorkshireman - Joe Root - with a reverse scoop over the third man rope. It meant a chase of 352, the ninth-highest in one-day international history, was completed with 15 balls to spare.

  Inglis has flickered in international cricket but the past month has been his breakout moment. He scored a Test century on debut last month but ranks this as his greatest day. "It was really special," Inglis said. "Under the circumstances, in an ICC [International Cricket Council] event, you want to have an impact and win a game." For much of Saturday it looked like Ben Duckett who had landed the warning shots before this winter's Ashes, followed by Jofra Archer and Mark Wood with their dismissals of Travis Head and Steve Smith. It may in fact be Inglis who has done the most to aid his cause of striding out at Perth on 21 November.

  For the side Inglis used to support, talk of the Ashes must wait. There were no clouds in Lahore, but for England - beaten in 11 of their past 15 matches - it still poured. This was the day their batting finally clicked – the highest score in Champions Trophy reached, only for a player born in their heartlands to better it. Sometimes you can only smile. "I just think, you've got to sometimes credit the opposition," said a phlegmatic captain Jos Buttler. "I thought Josh Inglis played a fantastic innings." This time, it is hard to argue.

