  • None They also visited to mark St David's Day, which is on 1 March
  • None An anti-monarchy demonstrator waving a flag saying 'I lawr â'r Brenin' which means 'down with the king' Slide 1 of 6 , The Prince and Princess (second right) of Wales help prepare and cook a batch of Welsh cakes at the Welsh Cake Shop as shop owner Theresa Connor (centre), looks on, during a visit to Pontypridd Market in Wales to talk to local business owners about the impact of the flooding caused by Storm Bert and Storm Darragh , The Prince and Princess of Wales helped prepare and cook a batch of Welsh cakes at the Welsh Cake Shop in Pontypridd Market

  The Prince of Wales and Catherine, Princess of Wales, have been baking Welsh cakes to mark the upcoming St David's Day. They visited Pontypridd on Wednesday to learn how the community is coping following recent devastating flooding. The visit to Rhondda Cynon Taf, delayed by almost an hour due to train disruptions, marks the couple's first visit to Wales together since Catherine announced last March she had begun cancer treatment, following the King's own cancer diagnosis. The princess has made a gradual return to public duties since completing chemotherapy last summer.

  At The Welsh Cake Shop the prince and princess rolled out dough, as Prince William asked owner Theresa Conner: "Is it thick enough?" The royal couple's skills were honed when they appeared with TV baking queen Mary Berry on A Berry Royal Christmas show, and Prince William praised her influence. With flour stuck to the sleeve of his maroon sweater, he smiled and said: "Well I don't know, my stunning baker skills, Mary Berry taught me everything I need to know." The couple made their cakes on a hot plate, keeping an eye on them and turning them after five minutes. Madison Conner, daughter of the shop owner told them: "They're perfect, they're great - they're bangin'."

  This video can not be played To play this video you need to enable JavaScript in your browser. The royal couple were in Pontypridd to see how the community was coping following floods

  Prince William and Catherine also met residents in the town who had been affected by recent storms. Storm Bert hit in late November and caused serious damage when the River Taff burst its banks and brought widespread flooding to Pontypridd, which had previously been badly hit by Storm Dennis in 2020. A few weeks after Bert, Storm Darragh brought extremely high winds to the region. Barbershop owner Josh Downes, who runs the Lost Boys Club, in Pontypridd, was among those whose businesses were flooded. On Wednesday he chatted to William and Catherine telling them how he had lost thousands of pounds of stock to flooding.

  This video can not be played To play this video you need to enable JavaScript in your browser. William and Catherine spoke to cafe owner Enrico Orsi and barber Josh Downes

  Recalling what had happened Mr Downes told the couple: "I could see all my stuff floating around and had to get in there. And as I opened the door it all came crashing in." Afterwards Mr Downes said he and the couple had discussed what had been done since 2020. "[It was] more of a conversation about how we keep flooding and how much stress it must be causing owning a business in Ponty[Pontypridd] with the constant worry of flooding on your mind," he said. Cafe owner Enrico Orsi said: "William was very empathetic to how it must be for us, juggling the stress of, essentially what is climate change, and the uncertainty of what can happen in the winter here, which we all know. "And he said he is going to look into it for us." During their trip the prince and princess also visited butcher Kevin Kidner privately at his home. The 61-year-old, who runs his business from the town's market, was alerted to last year's flooding by a neighbour.

  Butcher Kevin Kidner and Zsuzsanna were joined by the royal couple for a cup of tea

  The water was soon three-feet deep and his family went into "adrenaline mode" putting up defences. Afterwards Mr Kidner said: "They asked plenty of questions and were obviously concerned. "I think if they can push other people to help us it would be great, but it happens all over, not just in Wales." Outside Pontypridd Market hundreds of people lined the streets hoping to see the royals. As they waited they sang Calon Lân.

  Gavin Hailes and his sister Hannah Jones brought his sons Ralphie, 12 and Joseph, 8, to meet the royal couple

  Gavin Hailes, 41, brought his sons Ralphie, 12, and Joseph, aged eight, to try to meet the royal couple. He said they arrived early to get to the front and then waited through hail and rain before the sun came out as the prince and princess arrived. Mr Hailes said the flood did not affect them personally but said it was "horrific" and "devastating" for Pontypridd which was hit twice by floods.

  Lisa Maunder said she and her children Darcy, 10, and Quade, 8, had waited hours to see the couple

  Lisa Maunder, 46, said she was "really proud to have them come to Pontypridd". "It lifts the spirits of everyone," she said. "[Pontypridd] is a bit of a dying town so I think it's a nice thing to have people come here, spend money and look after all the businesses."

  Patricia Thomas said her grandson Harrison was able to give Princess Catherine a sunflower

  Patricia Thomas said her grandson Harrison was able to give Catherine a sunflower as she walked past. The princess asked him how to grow them, to which he responded "you plant them". Prince William also reminisced with people in the crowd about his visits to the town 20 years ago, and another when he was very young about 40 years ago.
