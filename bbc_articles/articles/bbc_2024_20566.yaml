content: |-
  The Russian mercenaries were helping Burkina Faso fight Islamist insurgents, who recently staged a huge attack.

  The Russian paramilitaries are set to leave Burkina Faso amid a worsening insurgency

  Russia is withdrawing 100 of its paramilitary officers from Burkina Faso to help in the war in Ukraine. They are part of about 300 soldiers from the Bear Brigade - a Russian private military company - who arrived in the West African nation in May to support the country's military junta. On its Telegram channel, the group said its forces would return home to support Russia’s defence against Ukraine’s recent offensive in the Kursk region. There are fears the pull-out could embolden Islamist insurgents in Burkina Faso, who recently killed up to 300 people in one of the biggest attacks in years.

  Burkina Faso has since 2015 suffered regular jihadist attacks, with more than two million people displaced in what aid groups call the world’s “most neglected, external” crisis.
  • None How Russia has rebranded Wagner in Africa The junta under interim President Capt Ibrahim Traoré, who came to power in a coup in September 2022, promised to end the attacks but has struggled, even after seeking new security partnerships with Russia. With nearly half the country outside government control, jihadist groups are increasingly targeting civilians and military units. Survivors say up to 300 people were killed on Saturday in the northern town of Barsalogho, in an attack which was claimed by an al-Qaeda-linked armed group, Jamaat Nusrat al-Islam wal-Muslimin (JNIM). They were reportedly both civilians and military personnel helping to dig trenches to help protect the town against jihadist attacks. The authorities have not said how many people were killed but Communication Minister Rimtalba Jean Emmanuel Ouedraogo called the attack “barbaric”. The Bear Brigade is said to be responsible for guarding senior Burkinabè officials, including Capt Traoré, whose leadership has been threatened before. They arrived in the same month when gunshots were fired in the Burkinabè capital near the presidential palace, heightening speculation about growing opposition to the junta leader, who claimed to have thwarted a coup attempt last year. Videos which circulated on social media and reportedly confirmed by the group showed the Burkinabè military leader being guarded by men in uniforms featuring Russian flags. The group says it is guarding the Russian ambassador in Ouagadougou, the Burkina Faso capital. About 100 members of this specialised unit are set to leave the West African country, only three months after arriving. Their sudden departure is linked to the recent Ukrainian offensive in Russia’s Kursk region. "When the enemy arrives on our Russian territory, all Russian soldiers forget about internal problems and unite against a common enemy," Bears Brigade commander Viktor Yermolaev told France's Le Monde newspaper (in French), external. On Tuesday, the group posted on its Telegram channel that the unit was returning to its base in Russian-occupied Crimea "in connection with recent events." It is not clear how the Burkina Faso junta plans to compensate for the loss of military support after the partial withdrawal of the Bear Brigade. Burkina's Faso, like its neighbours, Mali and Niger, is battling various Islamist groups, which operate in the semi-arid Sahel region, south of the Sahara Desert. The military has seized power in all three countries, and formed the Alliance of Sahel States. They have cut ties with former colonial power France and befriended Russia instead, buying weapons and deploying fighters with the mercenary Wagner Group, now known as the Africa Corps. However, armed groups have stepped up their attacks, particularly in Burkina Faso, despite massive recruitment by the paramilitary Volunteers for the Defence of the Homeland, a self-defence militia.
