  The deal to save the chain will see more than 30 of its restaurants close.

  TGI Fridays: 1,000 UK jobs to go despite rescue deal

  More than 1,000 TGI Fridays' UK staff will be made redundant despite a rescue deal from the owners of restaurant group D&D London. They have bought the UK operator of the American-themed chain, after its owner fell into administration last month. The deal will save nearly 2,400 jobs at 51 restaurants, but the administrators, Teneo, said 35 branches have closed. TGI Fridays UK said it was working with landlords on a deal to save the closed restaurants.

  "We are doing everything possible to retain our team and support those impacted," said chief executive Julie McEwan. She added she was "devastated for our colleagues who will be leaving TGIs and thank them for their loyalty and contribution during their time with us". The buyers, Breal Capital and Calveton UK, already own restaurant chains Byron Burgers and Vinoteca as well as restaurant group D&D London. A spokesperson for the new owners said it wanted to "both modernise the business and capitalise on the heritage of this iconic brand". They added that the deal "preserves a significant proportion of jobs and will hopefully provide the business with the stability and support it needs to recover and grow".

  However, Unite lead organiser for hospitality Bryan Simpson called the treatment of TGI Fridays' UK staff "a national disgrace". The union claimed that staff were locked out of their workplaces when some of the sites closed. It has also said that its members are uncertain whether or not they will receive wages, holiday pay or tips earned.

