  The company declined to comment when asked about these allegations by the BBC. The restaurants being closed are Barnsley, Birmingham Hagley Road, Bracknell, Brighton Marina, Bristol Cabot Circus, Cardiff Newport Road, Chelmsford, Cheltenham, Croydon, Derby, Dundee, Durham, Edinburgh Fort Kinnaird, Enfield, Gateshead, Gloucester Quays, Halifax, Jersey, Leeds, Leeds Trinity, Leicester, Lincoln, Manchester Royal Exchange, Newcastle Eldon Square, Newport, Northampton, Prestwich, Romford, Sale, Solihull, Southampton West Quay South, Speke, Sutton Coldfield, Swansea, and Watford North. Breal and Calveton secured the deal on Monday after TGI Fridays' UK owner Hostmore fell into administration due to debt. Retail experts have blamed the collapse of TGI Fridays' UK business on a failure to adapt its American-inspired, meat-heavy menu to changing consumer tastes for healthier options. "With some investment and more importantly enthusiasm, the brand can really connect with diners again," said analyst Catherine Shuttleworth. She added it was notable the new owners had chosen to keep locations in shopping centres and retail parks "where younger diners and families choose to spend their money". TGI Fridays opened its first restaurant in New York in 1965 and its first UK restaurant on Hagley Road in Birmingham two decades later.

