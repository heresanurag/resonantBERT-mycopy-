  Officers were reportedly head-butted and kicked, with blood also being spat at them.

  Nine police officers injured in Londonderry and Strabane

  Ch Insp Luke Moyne said all of the officers remained on duty which was a "testimony to their resilience" during the "difficult challenges" they faced

  Nine police officers were injured over a 48-hour period in Londonderry and Strabane over the weekend. According to police, between Friday 7 February and Sunday 9 February, the officers were met with aggression from people who, in some instances were armed. Some were also subjected to "racial and sectarian abuse". Ch Insp Luke Moyne said all of the officers remained on duty which was a "testimony to their resilience" during the "difficult challenges" they faced.

  Ch Insp Moyne said one officer was punched in the face while during another callout a woman ran towards an officer with a knife. Other officers were also reportedly head-butted and kicked, with blood also being spat at them. Two more officers were also assaulted when attending a large fight in Derry city centre involving a crowd. During another incident an officer sprained her wrist while restraining a man and another officer was kicked in the head.

  "All of these shameful attacks will be investigated rigorously," he added. "We are supporting these officers following a very difficult weekend. They are receiving the appropriate care and our welfare support has been set up. "However, assaults across this weekend from just one policing district in Northern Ireland, shows the often grim reality of what our officers on the ground are facing each and every day."
