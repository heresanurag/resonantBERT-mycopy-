  'More to do' to tackle discrimination, says first minister

  First Minister Mark Drakeford says there "certainly is more to do" in addressing tackling discrimination and disadvantage for black, Asian or minority ethnic (BAME) people in Wales. He pointed to the "need for us to do more" to ensure decision-makers in Wales "reflect the society in which we live". Mr Drakeford added that "we have had a proud cross-party commitment in Wales throughout the devolution era" to addressing discrimination people from different backgrounds face in Wales, but said "there is more to do." The first minister was responding to a question about the Welsh Government advisory group report into the impact of Covid-19 on Wales' BAME communities, which highlighted a "lack of action on race equality". Mr Drakeford added: "Before the coronavirus crisis hit, we had commissioned and concluded a radical review of the way in which public appointments are made here in Wales. "[The review is to] make sure the people who are appointed to those important positions reflect the diversity of Wales. "We are going to implement that report and we're going to begin its implementation as soon as we are able to resume making public appointments in Wales."
