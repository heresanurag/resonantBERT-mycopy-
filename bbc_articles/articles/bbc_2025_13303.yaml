content: |-
  England recall Jacob Bethell for the first Test against India and respond to a lengthy pace-bowling injury list by naming Jamie Overton in the squad.

  Bethell and Overton in England first Test squad

  Jacob Bethell (left) has won three previous Test caps, Jamie Overton has one

  England have recalled Jacob Bethell for the first Test against India and responded to a lengthy pace-bowling injury list by naming Jamie Overton in the squad. Bethell, 21, makes an immediate return after not featuring in the victory over Zimbabwe because of Indian Premier League (IPL) commitments, but could miss out on a place in the final XI. Fast bowler Gus Atkinson is likely to be absent for the first two Tests of the five-match series with the hamstring injury he suffered against Zimbabwe, and joins Mark Wood, Jofra Archer and Olly Stone on the sidelines. Chris Woakes and Brydon Carse are back, while Surrey's Overton is in a Test squad for the first time since the tour of Pakistan in 2022. Josh Tongue and Sam Cook are also in, but there is no place for Matthew Potts in the group of five frontline seamers for the series opener at Headingley on 20 June.

  England squad for first Test against India: Ben Stokes (captain), Zak Crawley, Ben Duckett, Ollie Pope, Joe Root, Harry Brook, Jacob Bethell, Jamie Smith (wicketkeeper), Chris Woakes, Jamie Overton, Brydon Carse, Sam Cook, Josh Tongue, Shoaib Bashir.

  Overton's only previous Test came at the same ground in 2022, when he made 97 against New Zealand. The 31-year-old is currently recovering from a broken little finger sustained in the first one-day international against West Indies last week. Woakes, Carse and Tongue are the most likely trio to make the XI in Leeds. Despite the absentees, all three would have reasonable claims to be in England's first-choice team even if all the seamers were fit. England's fast-bowling reserves have been further depleted by injuries to youngsters Josh Hull and Sonny Baker, who have heel and ankle problems respectively. Both have pulled out of England Lions' second four-day game against India A, due to start on Friday. Woakes and Tongue will feature for the Lions, but Test captain Ben Stokes, who considered playing as he recovers from hamstring surgery, has opted out.

  England were hopeful Atkinson would be available for the beginning of the India series, while Archer's long route back to Test cricket has been delayed by a thumb injury that prevented him playing for the Lions. His next target would be to play for Sussex in the County Championship before the end of this month. Warwickshire's Bethell impressed in three Tests in New Zealand before Christmas, making half-centuries in the second innings of each, batting at number three. When he missed the Test against Zimbabwe, England were spared the decision on whether to include him in their team and reverted back to their established top seven. In Bethell's absence, Ollie Pope made a sublime century in his regular spot of number three. Whereas Stokes appeared to suggest before the Zimbabwe Test Bethell would come straight back into the XI for the India series, he later clarified that the left-hander would merely return to the squad. Stokes also claimed his comments were "twisted to suit an agenda". Since then, Bethell has further impressed in England's one-day team, making a sparkling 82 in the first ODI against West Indies. Stokes at least seemed to confirm that England's choice would be between Bethell and Pope, rather than opener Zak Crawley or spinner Shoaib Bashir being candidates to be left out.
