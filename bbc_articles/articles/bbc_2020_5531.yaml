content: |-
  Babies born to surrogate mothers are stuck in Ukraine due to coronavirus lockdown measures.

  Babies born to surrogate mothers have been left stuck in Ukraine because of coronavirus lockdown measures.

  The BBC's Jonah Fisher has visited a hotel in Kyiv, where the children are being cared for.

