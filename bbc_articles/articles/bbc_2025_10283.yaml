  Officials say a 28-year-old with US citizenship had Molotov cocktails in his backpack and called for "death to America".

  US arrests man for allegedly trying to firebomb embassy in Israel

  Police say the suspect brought Molotov cocktails in a backpack and planned to "burn down" the building

  A dual US-German citizen has been deported from Israel to the US after allegedly trying to burn down the US embassy in Tel Aviv, American officials say. Joseph Neumayer, 28, was first arrested in Israel after his backpack, which allegedly contained explosive devices, was found near the embassy. After being sent to the US, he was met on Sunday by officials at New York's John F Kennedy Airport. He appeared in court the same day and was being held in jail, the US justice department said. "This defendant is charged with planning a devastating attack targeting our embassy in Israel, threatening death to Americans, and President Trump's life," said Attorney General Pam Bondi.

  US officials say Mr Neumayer arrived in Israel in April and on 19 May headed to the US embassy in Tel Aviv with a dark-coloured backpack. The 28-year-old spat on an embassy guard as he walked by, the officials said. When the guard tried to detain him, Mr Neumayer allegedly ran away and left behind a backpack with three Molotov cocktails - which are small bombs made with flammable liquids that are meant to start fires once they are lit and thrown. Israeli police later found Mr Neumeyer at his hotel where he was arrested, the US justice department said. He had earlier allegedly posted on his social media account pledging to "burn down the embassy in Tel Aviv", and calling for "death to America, death to Americans". Officials said Mr Neumeyer also threatened to assassinate Trump in social media posts on another account believed to be connected to him. He was sent back on Sunday to the US, where he faces a maximum of 20 years in prison if convicted. News of Mr Neumeyer's reportation comes just days after a gunman killed two Israeli embassy staff members in Washington DC. Last Wednesday, a young couple, Yaron Lischinsky and Sarah Lynn Milgrim, were shot dead outside an event at the Capital Jewish Museum. Police identified the suspect as 30-year-old Elias Rodriguez from Chicago, who they say shouted "free Palestine" after he shot the pair. Homeland Security Secretary Kristi Noem is expected to attend a memorial in Israel for the victims on Monday.
