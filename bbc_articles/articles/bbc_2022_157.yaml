  The education secretary says the fall in daily Covid cases means England's rules could be eased.

  No 10 staff risked being ostracised for not drinking - former adviser

  Drinking alcohol during the working day has been "very routine" at Downing Street for years, a former government special adviser says. Sonia Khan, who was a special adviser before the pandemic in the first months of Boris Johnson's time as prime minister, says the drinking doesn't feel like a party because "drinks is part of your work day" and "usually sandwiched between pieces of work". She tells BBC Radio 4's World at One programme drinks were used as a way to say thank you and keep people motivated when they were working very long hours. Khan, who also worked as a civil servant in No 10 under David Cameron and Thersea May, adds "there was a very strong sense" people should take part, especially for junior staff members who could get access to senior people through such events, and there was a risk of being "ostracised" if you didn't drink. She recalls a few instances when people would wake up in Downing Street the next day in the same clothes after sleeping on sofas overnight following a heavy evening of drinking. Khan was sacked from her role as special adviser to then Chancellor Sajid Javid in August 2019, after a confrontation with Dominic Cummings.
