id: bbc_2017_733
title: Obama to 'process amazing experience' - BBC News
date: '2017-01-18'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38671712
content: |-
  US President Barack Obama has spoke of his plans for life after the White House as a private citizen "to process this amazing experience we've gone through".

  In his final news conference, Mr Obama told the White House press corps: "I want to do some writing, I want to be quiet a little bit and not hear myself talk so darn much.”
