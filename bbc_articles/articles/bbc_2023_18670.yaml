title: Why does the Scottish government keep losing court cases? - BBC News
date: '2023-12-10'
section: Scotland politics
url: http://www.bbc.co.uk/news/uk-scotland-scotland-politics-67648200
content: |-
  The failed challenge over the fate of Holyrood's gender reform bill is the latest in a series of legal setbacks.

  The Scottish government's failed legal challenge against the blocking of Holyrood's gender reform bill is the latest in a series of judicial defeats.

  One of the country's most senior judges, Lady Dorrian, told MSPs last week that 4,946 civil cases involving the government have come to court between April 2016 and November 2023.

  Some of those have been high-level litigation, from challenges to domestic policy to constitutional clashes between governments. And in many, the government has come out on the wrong side.

  Why has our politics ended up in the courts so frequently? And why does the Scottish government keep losing?

  Disagreements between the SNP-led administration in Edinburgh and the Conservative one in London are unsurprisingly frequent.

  The schism between the governments has widened during the turbulent times of late, and tumbles into the courts on a regular basis.

  The Supreme Court has been called in on multiple occasions to rule on the scope of Holyrood's powers.

  Brexit lit the blue touchpaper when the UK government decided to plough ahead with its flagship Withdrawal Bill against the express wishes of MSPs - prompting them to pass their own legislation.

  UK law officers then challenged the Holyrood "continuity bill" at the Supreme Court.

  The bill fell down on one ground, but the judges said it could have stood up on most others - "as a whole" it was within devolved competence.

  However it transpired that after the bill passed, UK ministers had added their own Withdrawal Act to a special list of bills which cannot be modified by the devolved administrations.

  That meant great swathes of the continuity bill were rendered unlawful - and Scottish ministers were furious, saying the goalposts had been moved mid-match.

  Legislative disputes between the Scottish and UK governments are heard in the Supreme Court in London

  Since then, the two governments have rarely hesitated to take each other to court.

  UK law officers have challenged several pieces of Holyrood legislation - one of which, on incorporating a UN charter on children's rights into Scottish law, has just undergone the parliament's first ever "reconsideration stage" to rectify issues flagged up by judges.

  The Supreme Court actually said the bill had been "drafted in terms which deliberately exceed the legislative competence of the Scottish Parliament", and it had to be stripped back.

  The era of so-called "muscular unionism" continued with the UK government stepping in to block Holyrood's gender reform bill, with the first ever use of section 35 of the Scotland Act.

  Scottish ministers then launched an equally unprecedented judicial review of that decision at the Court of Session, arguing that the Scottish Secretary Alister Jack had acted unlawfully.

  That challenge was unsuccessful, with Lady Haldane ruling that Mr Jack had followed proper procedure - although the case may yet be subject to appeal.

