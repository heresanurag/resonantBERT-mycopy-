title: Jacob Bethell gives England 'headache', says Brendon McCullum - BBC Sport
date: '2024-12-17'
section: Cricket
url: http://www.bbc.co.uk/sport/cricket/articles/c20w7n3qej0o
content: |-
  Jacob Bethell hit 260 runs, with three fifties, at an average of 52 in the series

  Jacob Bethell has given England a selection decision to make, says head coach Brendon McCullum. The 21-year-old played in his maiden Test series in New Zealand, effectively standing in for wicketkeeper Jamie Smith, who has been on paternity leave. Bethell made three half-centuries, including top-scoring for England with 76 on the fourth and final day of their massive 423-run defeat in the third Test in Hamilton. "It's a good headache to have," McCullum told BBC Sport. "That's what you want. You want that conversation, you don't want to be scrambling around looking for talent. "We've got a couple of months to work out what we're doing." The place of Smith, England's first-choice keeper, was due to go to Jordan Cox for the New Zealand series, only for Cox to break his thumb in the days leading up to the first Test. England reshuffled their side, handing the gloves to Ollie Pope, who slid to number six in the batting order. Bethell went to number three, despite never previously batting higher than number four in his first-class career and not owning a century in professional cricket. He took the chance with an unbeaten 50 in the first-Test win in Christchurch and followed with 96 in the victory in Wellington. Along with his knock in Hamilton, all three scores of 50 or more have come in the second innings. Bethell has become only the second England batter, after Sir Alastair Cook, to reach 50 three times in the same series before the age of 22. Captain Ben Stokes had previously said he expects England to revert to the original line-up when Smith is available, with keeper Smith slotting into the middle-order and Pope back at three. But McCullum has now hinted Bethell could force England to review their options, much like they did after the series defeat in India earlier this year. Their next Test is against Zimbabwe in May.

  "He's been outstanding, I've been so impressed with him," said New Zealander McCullum. "I feel like he's been around the team for three or four years. "His maturity, his level of organisation off the field is phenomenal, too. "We've also got some players who have done exceptionally well for us over a period of time now and we're starting to build a bit of talent, which is lovely." Smith seems certain to return, so Bethell could possibly pressure Pope, or opener Zak Crawley, who averaged only 8.66 in his six innings in New Zealand. Of Bethell, Stokes said: "I know there was a lot said about him getting the opportunity up the order. "I don't think there will be much said anymore, because that kid can play." England had already secured their first series win in New Zealand since 2008, but the defeat in Hamilton was their largest in terms of runs against the Black Caps. "The series is an amazing result and that shouldn't be forgotten," said Stokes. "We hold our hands up. We were nowhere near our best this game. "We walked out there with the exact same mindset and attitude of the first two games. We just weren't at our best. We're OK with that. We know we're a much better team than what we showed this week." England end 2024 with a record of nine wins and eight defeats from their 17 Tests. They won three of their five series ahead of a mouth-watering 2025 that includes hosting India in the summer before a trip to Australia for the Ashes. Looking towards next year, Stokes said: "Just be excited. It's great. We love doing what we do. We love the support that we get. "We see them as opportunities to impress, to show the world what we can do."
