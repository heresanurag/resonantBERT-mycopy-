  The incident at Chernobyl comes after increased military activity around the Zaporizhzhia Nuclear Power Plant in southern Ukraine, the IAEA said. In December, Ukraine and Russia accused each other of launching a drone attack on a convoy of vehicles transporting IAEA experts heading to the Zaporizhzhia plant, which is Europe's largest nuclear station. The agency last year urged restraint when an attack on Zaporizhzhia raised the risk of a "major nuclear incident". Russia and Ukraine traded blame over the attack in August. "I'm more concerned about Zaporizhzhia than Chernobyl," Prof Smith said. "The reactors [at Zaporizhzhia] are currently shut down but there is more live fuel there. Chernobyl is still very radioactive, but it's not in a 'hot state' because of its age." The number of people who died in the Chernobyl disaster remains disputed. According to the official, internationally recognised death toll, just 31 people died as an immediate result of Chernobyl while the UN estimates that 50 deaths can be directly attributed to the disaster. In 2005, it predicted a further 4,000 might eventually die as a result of the radiation exposure.
