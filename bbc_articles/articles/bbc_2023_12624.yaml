title: 'Metropolitan Police: Ex-officers charged over racist WhatsApp posts - BBC
  News'
date: '2023-08-15'
section: UK
url: http://www.bbc.co.uk/news/uk-66512440
content: |-
  Six former police officers will appear in court next month, following a BBC Newsnight investigation.

  Six former Metropolitan Police officers have been charged with sending racist messages on WhatsApp after a BBC Newsnight investigation.

  The officers served in various parts of the force but all spent time in the Diplomatic Protection Group, now known as the Parliamentary and Diplomatic Protection Command.

  They were not serving during their alleged participation in the group.

  But the BBC believes serving officers were in the group until early 2022.

  A statement from the Met said: "The charges follow an investigation by the Met's Directorate of Professional Standards which was launched following coverage by the BBC's Newsnight programme in October last year."

  It said the officers, who retired between 2001 and 2015, have been charged by post with offences under Section 127(1) (a) of the Communications Act 2003.

  They will appear at Westminster Magistrates' Court on 7 September.

  Last year Newsnight was passed dozens of messages shared within the chat by a member of the group.

  The BBC has not reproduced the messages because some of them contain strong racial slurs.

  Some of the posts referenced the government's Rwanda policy, while others joked about recent flooding in Pakistan, which left almost 1,700 people dead.

  The Duke and Duchess of Sussex also featured in several images alongside racist language.

  Commander James Harman, who leads the Met's Anti-Corruption and Abuse Command, said: "As soon as we were made aware of these allegations we acted to launch an investigation.

  "I am pleased that following the determined work of officers we have been able to secure these charges.

  "The honest majority of Met officers are fully behind this work.

  "They are tired of being let down by a minority in policing and they are aware of the damage poor behaviour can do to our relationship with the communities we serve.

  "I recognise announcements about the outcome of our investigations may have the potential to cause further public concern, but I hope it demonstrates our absolute commitment to investigate any corrupt and abusive behaviour from the Met."
