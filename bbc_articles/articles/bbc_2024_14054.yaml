title: 'Vaughan Gething: Why Wales'' FM may lose no-confidence vote - BBC News'
date: '2024-06-05'
section: General
url: http://www.bbc.co.uk/news/videos/czddj422n03o
content: |-
  Labour holds half of the 60 seats in the Welsh Parliament, but two politicians are off sick.

  Wales' First Minister Vaughan Gething looks set to lose a vote of no confidence in his leadership later, despite Labour holding exactly half of the 60 Senedd seats.

  This is because two members, Hannah Blythyn and Lee Waters, are off sick and may be unable to vote.

  Ms Blythyn was sacked from the Welsh government by Mr Gething and Lee Waters is the former transport minister.

  However, Vikki Howells, chairwoman of the Labour group of Members of the Senedd, said Mr Gething would not stand down if he lost as it was a "gimmick" and it was up to the "voting public to decide who is in the Senedd".
