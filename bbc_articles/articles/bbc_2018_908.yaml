title: Bid to find family of man who collapsed on 26 December - BBC News
date: '2018-01-01'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-42527910
content: |-
  He suffered a heart attack outside University College Hospital in London the day after Christmas.

  The man collapsed outside University College Hospital at around 16:30 GMT on 26 December

  A photo of a man found collapsed outside a hospital the day after Christmas has been released in a bid to find his family.

  The man is in an induced coma at University College Hospital, having suffered a heart attack outside the central London site at about 16:30 GMT.

  He is in a life-threatening condition and the Met wants to trace his family "as soon as possible".

  The man is described as being of light-skinned black or Asian origin.

  Police said the man had not been carrying any identification when he was discovered.

  A spokesperson said the force wanted to find the man's family soon "due to his poor state of health" and added that "it is possible that he may be homeless".

