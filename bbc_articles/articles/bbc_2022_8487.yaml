title: Texas school shooting victim's parents mourn 'best friend' - BBC News
date: '2022-06-02'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-61669234
content: |-
  The parents of Alithia Ramirez say they want the world to remember their daughter through her art.

  Last week 10-year-old Alithia Ramirez was shot and killed when a gunman opened fire at her primary school in Uvalde, Texas.

  Her parents say they want the world to remember their daughter was good and kind and had dreams of healing the world with her artwork.
