title: Baby Reindeer 'a big problem' for Netflix and Gadd - Morgan - BBC News
date: '2024-05-21'
section: General
url: http://www.bbc.co.uk/news/world-europe-69034417
content: |-
  Journalist Piers Morgan says there are issues to be addressed by the programme makers.

  Journalist Piers Morgan has said issues with the TV show Baby Reindeer are "a big problem for Netflix, Richard Gadd and Clerkenwell Films".

  Speaking to the BBC's Laura Kuenssberg, he referenced his recent interview with Fiona Harvey on Piers Morgan Uncensored.

  Harvey has identified herself as the woman portrayed as Martha the stalker in the series - which neither Netflix nor Richard Gadd have confirmed.

  Piers Morgan criticised the series for saying it was a true story, after Harvey told him she has not been convicted of stalking and that she denied stalking Gadd.

  He questioned if there has been failure of duty of care, given how the story was told on screen, which included using real posts from Fiona's social media accounts.
