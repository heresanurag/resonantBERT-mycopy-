title: Harvey Weinstein led away in handcuffs - BBC News
date: '2018-05-25'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-44258229
content: |-
  After being charged with rape and other sex offences, Harvey Weinstein is led from a police station in cuffs.

  Hollywood mogul Harvey Weinstein handed himself in to police in New York on Friday and was charged with rape and several other counts of sexual abuse.

  He left the police station in handcuffs.
