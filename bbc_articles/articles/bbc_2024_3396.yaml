id: bbc_2024_3396
title: Moment surprise party is accidentally revealed on BBC News - BBC News
date: '2024-02-17'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-68325170
content: |-
  BBC Weather's Kawser Quamer went into a bit too much detail in her forecast on North West Tonight.

  Surprise parties are difficult to manage and organise, you've got to make sure that the decorations aren't found and that guests keep tight-lipped about the arrangements.

  One thing that most people don't have to worry about though, is whether it's going to be inadvertently announced on television.

  Unfortunately, that's exactly what happened when BBC Weather's Kawser Quamer was asked about her weekend plans, at the end of Friday evening's North West Tonight.
