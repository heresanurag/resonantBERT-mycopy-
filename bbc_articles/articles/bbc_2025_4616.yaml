content: |-
  Authorities say the actor's wife called for medical help a day after she was thought to have died.

  Police release new evidence in timeline of Hackman and his wife's death

  Authorities have discovered new information changing the timeline of when they believe Academy Award winning actor Gene Hackman and his wife, Betsy Arakawa, died. The couple were found dead in their New Mexico home last month with officials saying the pair had been dead for some time before they were discovered by neighbourhood security. Officials initially said they believed Arakawa died on 11 February and Hackman died one week later. The Santa Fe County Sheriff's Office now says they have confirmed that Arakawa made multiple calls to a health clinic on 12 February for medical treatment, which the clinic told BBC she never was able to receive.

