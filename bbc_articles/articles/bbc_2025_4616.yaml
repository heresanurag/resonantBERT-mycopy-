  The sheriff's office said they learned of the calls when they received cell phone data from her phone. They said there were three calls made that morning to Cloudberry Health, a personalized concierge medical practice in the area. She received a fourth call, also from the clinic. The sheriff's office noted it never reported an official date of death for her and said that initially they'd stated that Arakawa's last known activity was on 11 February. Authorities say she'd exchanged emails with a massage therapist and visited a grocery store, pharmacy and a pet store. Garage clicker data showed she returned home around 5:15 p.m. that day. Dr Josiah Child, who leads Cloudberry Health, told the BBC that while the clinic had never treated Hackman or Arakawa, she had reached out for medical advice.

  Gene Hackman and his wife Betsy Arakawa had been married more than 30 years

  "She called and described some congestion but didn't mention any respiratory distress, shortness of breath, or chest pain," he said. Arakawa initially had scheduled an appointment for 12 February but cancelled on 10 February, explaining that she needed to care for her husband, Dr Child said.
