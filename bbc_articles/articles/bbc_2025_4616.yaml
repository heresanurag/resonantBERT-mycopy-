  • None What is hantavirus, disease that killed Gene Hackman's wife? On the morning of 12 February, she called again seeking treatment but because no doctor-patient relationship had been established, the clinic told her she needed to be seen in person. "There were a couple calls back and forth to just schedule that appointment for the afternoon, but she never showed up," Dr Child explained. "Our office called back several times and never got an answer." The couple were both found dead on 26 February. Chief Medical Investigator Dr. Heather Jarrell stated that "based on the circumstances, it is reasonable to conclude that [Betsy] passed away first." The Santa Fe medical examiner determined she died from hantavirus pulmonary syndrome, a rare rodent-borne respiratory disease. Authorities believe Hackman died on 18 February - the date of his last recorded pacemaker activity, which showed an abnormal rhythm of atrial fibrillation. His cause of death was severe heart disease, with advanced Alzheimer's disease listed as a contributing factor. Experts believe his Alzheimer's may have prevented him from realising his wife of more than 30 years was dead in the home where he was living. If he did, experts told the BBC, he likely went through various stages of confusion and grief, trying to wake her up before the disease caused him to become distracted or too overwhelmed to act - a process that likely repeated for days before he, too, died. A necropsy report also revealed that one of the couple's three dogs, which had been crated while recovering from surgery, died from starvation and dehydration. As the investigation continues, representatives for Hackman and Arakawa's estate have taken legal action to block the release of body camera footage and other visual evidence from their home when their remains were discovered. A New Mexico judge has issued a temporary restraining order that prevents their release, with a hearing set for March 31.
