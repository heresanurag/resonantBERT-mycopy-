  Boris Johnson answered MPs weekly questions by video link for the first time.

  Thanks for following along with us

  As we step away from our live coverage today, we leave you with our favourite story today... This week's Beano comic includes a pull-out section called Bean-OLD, designed to cheer up adults in the midst of the pandemic - with a comic strip featuring Boris Johnson, his outgoing aide Dominic Cummings and some other famous faces from 2020. Our colleague Justin Parkinson was given a sneak preview here. Our reporters on the live page today were Gavin Stamp, Kate Whannel, and Richard Morris, with Johanna Howitt in the editor's chair. Hope you will join us again next week.
