title: 'Newspaper headlines: ''You''re rehired'' and ''Well, this is awkward!'' -
  BBC News'
date: '2024-11-07'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cx24gj94edeo
content: |-
  One man dominates all of Thursday's front pages after Donald Trump's presidential election win.

  'You're rehired' and 'Well, this is awkward!'

  A smiling Donald Trump is on every front page. "Landslide" is the headline in the i, external, which says he has won a mandate for a radical right-wing agenda to reshape America. The Sun, external says he has been rehired after he was "shot, sued, tried, insulted and written off". The paper says it is not bewildered by the second coming of President Trump because most Americans love capitalism, freedom and aspiration and detest socialism, meddling regulations and wokery. The Daily Mirror, external strikes a different tone, asking, "What have they done... again?" The paper says there are fears Trump will be even more divisive and brutal than in his first term. In a separate editorial, paper declares this is a dark day for America. It says US allies must prepare for a new world order under a president who favours tyrants and strongmen such as Russia's Vladimir Putin over them. For the Daily Mail, external his victory is a "comeback to Trump all comebacks". The paper says liberals in the US and Britain have been "left bewildered and tearful" and the result is a nightmare for "Starmer and his Donald-loathing Cabinet". The paper's columnist, Sarah Vine, argues that one of Kamala Harris' biggest mistakes was to assume that all women would side with her just because she was a woman of colour. The author says Harris showed "spectacularly poor judgement" by believing that women were more interested in abortion rights than in improving the economy and tackling illegal immigration. Under the headline "American dread" the Guardian, external says people in the US have woken up to a transformed country and a rattled world, while the Financial Times , externalwarns that Trump's comeback is expected to pitch American democracy, US alliances and global markets into an "era of upheaval".

  A giant screen displays footage of Trump during a news bulletin at a shopping complex in Beijing

  The political editor of the Daily Express, external, Sam Lister, says the "relentless and often over-the-top attacks" on Donald Trump made by many of the most senior ministers in Sir Keir's Cabinet from the safety of opposition are now coming back to haunt the prime minister. She says Trump is not known for being a man who takes kindly to personal attacks and Sir Keir is in the position of coming close to grovelling to the leader of the Free World. In an editorial, the Times, external says the global economy could suffer a heart attack if Trump carries out his threat to impose a 60% tariff on imports from China and 20% from the rest of the world. The paper is also concerned that he might force Ukraine to make territorial concessions to Russia, thereby validating Moscow's invasion, which could be seen as a green light for attacks by other authoritarian regimes. And finally the Guardian says US polling agencies are under fire because they did not foresee Trump's triumph. The paper says the failure occurred despite pollsters claiming they had recalibrated their methodology after they seriously underestimated Trump's support in 2016 and 2020.

