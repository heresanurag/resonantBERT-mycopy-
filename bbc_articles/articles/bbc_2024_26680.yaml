  The UK will prioritise and increase investment in major projects in the Budget, Rachel Reeves says.

  Rachel Reeves signals plan to spend more on big projects

  The government will prioritise and increase investment in major projects at this month’s Budget, Chancellor Rachel Reeves has said. In addition, she announced a nearly £22bn investment in two major new carbon capture schemes over 25 years. She criticised plans she inherited from the previous government to cut investment as a share of the economy, saying she would not repeat “those mistakes”. But the Conservatives said it was thanks to them that funding had already been announced for the carbon capture projects.

  After weeks of hints about the chancellor changing her self-imposed borrowing rules to allow significantly more investment in major projects, Ms Reeves has given her strongest indication yet of a significant increase to levels of state investment. The green schemes are two new carbon capture and storage projects on Merseyside and Teesside. The government said they would create and support thousands of jobs, draw in private investment and help the UK meet its climate goals. The chancellor said contracts such as this were never signed by the previous government because it did not prioritise capital investment - which is money spent on items such as buildings, equipment, and IT. She directly criticised the fact that the UK's capital budget is due to fall from 2.5% of the size of the economy to 1.6%. However, shadow energy secretary Claire Coutinho said the previous Conservative government had paved the way for the carbon capture projects. She also said the announcement would "not make up for the mass deindustrialisation pathway that Ed Miliband’s costly net zero and energy policies are leading us to, with the devastating impact of his zealotry on jobs already seen in steel-making, refineries and in the North Sea".

  But Ms Reeves said the previous government had been "cutting back on investment at exactly the time we needed to be increasing investment in our economy". "I’m not going to make those mistakes,” she said. Her words are the clearest confirmation of a shift in approach to spending on major projects at the Budget and Spending Review, connected with attempts to attract significant private investment at the upcoming International Investment Summit. That summit will be a "massive opportunity for us to show what Britain has to offer to some of the biggest investors", she said, including private equity, venture capitalists, and sovereign wealth funds. She also denied suggestions that the government’s Budget rhetoric had spread gloom among consumers and businesses, saying there would be a “drum beat” of major investments in the coming days.
