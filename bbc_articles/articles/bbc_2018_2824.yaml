title: Kingsnorth Power station chimney reduced to rubble - BBC News
date: '2018-03-22'
section: General
url: http://www.bbc.co.uk/news/uk-england-kent-43503116
content: |-
  One of the most prominent landmarks in Kent has been reduced to rubble in a controlled explosion.

  One of the most prominent landmarks in Kent has been reduced to rubble.

  The chimney, at the decommissioned Kingsnorth Power Station in Hoo, stood at more than 656ft (200m) but was demolished in a controlled explosion.
