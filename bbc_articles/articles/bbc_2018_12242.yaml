id: bbc_2018_12242
title: Google iPhone data privacy case blocked by High Court - BBC News
date: '2018-10-08'
section: Technology
url: http://www.bbc.co.uk/news/technology-45784852
content: |-
  Campaign group Google You Owe Us wanted compensation for people whose handsets were allegedly tracked.

  An attempt to tackle Google over data tracking has been blocked by the courts

  The High Court has blocked a bid to sue Google for allegedly unlawfully taking data from 4.4 million UK iPhone users.

  The legal case was mounted by a group called Google You Owe Us, led by former Which director Richard Lloyd.

  It sought compensation for people whose handsets were tracked by Google for several months in 2011 and 2012.

  Mr Lloyd said he was "disappointed" by the ruling and his group would appeal, but Google said it was "pleased" and thought the case was "without merit".

  The campaign was believed to be the first mass legal action of its kind in the UK.

  Mr Justice Warby who oversaw the case explained that it was blocked because the claims that people suffered damage were not supported by the facts advanced by the campaign group.

  Another reason for blocking it, he said, was the impossibility of reliably calculating the number of iPhone users affected by the alleged privacy breach.

  Mr Lloyd said in a statement: "Today's judgement is extremely disappointing and effectively leaves millions of people without any practical way to seek redress and compensation when their personal data has been misused."

  He added that he would seek permission to appeal against the verdict on behalf of the 20,000 people who signed up to the campaign.

  In response to the court ruling, Google said: ""The privacy and security of our users is extremely important to us. This claim is without merit, and we're pleased the court has dismissed it."

  The case revolved around how Google used what are known as cookies - small computer text files that log information as people browse the web and use online services.

  The complaint made by Google You Owe Us alleged that the cookies were used by Google to track people and get around settings on Apple's Safari browser that blocked such monitoring.

  Ads were sold on the basis of the personal information gathered by Google's cookies.

  The Safari workaround was used by Google on lots of different devices but the UK case centred on iPhone users. The group hoped to win £1bn ($1.3bn) in compensation for affected users.

  The first stage of the legal case was getting the UK courts to recognise that the group had a legitimate complaint.

  In an earlier court appearance, Google argued that the type of action being brought by Mr Lloyd was unsuitable and should not be given the go-ahead.

  Google has paid $39.5m in the US to settle earlier claims against it over similar data-gathering claims.
