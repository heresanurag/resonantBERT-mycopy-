  Two women died and two men remain in hospital following a crash in Barry on Saturday.

  Ex-dance teacher and former BBC worker die in crash

  Madeline Elaine Brooks and Beverly Pugsley died in the crash in Barry, Vale of Glamorgan

  A retired dance teacher and a former BBC Wales employee have died following a crash. Police have named Madeline Elaine Brooks, 85 and Beverly Pugsley, 69, as the two women killed in the collision on the A4050 in Barry, Vale of Glamorgan, at about 13:40 GMT on Saturday. The road was closed from the junction of Port Road East and Barry Dock Link Road to Pugh’s Garden Centre. Two men, aged 24 and 67, remain in hospital and officers are appealing for information, particularly regarding a grey Audi RS 4.
  • None Two women die and one man critical after crash

  Mrs Brooks was a mother, nanna, great grandmother and aunt who was born in Penarth and lived in Barry for more than 65 years. Her family described her as “a lively lady” who loved ballroom dancing and said she was a teacher at many venues around Wales, still attending afternoon dances in recent years. “She was always very active, loved gardening and always out and about, shopping, visiting places and holidaying, mostly in Devon in later years,” they said. Mrs Pugsley was born in and lived in Llandaff, Cardiff and spent most of her career in various roles for the BBC, followed by work as a researcher for TV programmes. “Beverley was a quiet lady who loved her job,” her family said. “She spent her time socialising with her cousin and aunt, visiting places around the Vale, and loved going off on trips especially to Devon."
