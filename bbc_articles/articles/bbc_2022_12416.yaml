title: 'Cardiff Bay: Radio sculpture with Marconi links approved - BBC News'
date: '2022-09-06'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-62805835
content: |-
  It's over 120 years since the world's first radio signal was broadcast over the sea from south Wales

  A controversial four-metre wooden sculpture to mark the first radio broadcast is to be erected in Cardiff.

  The first radio signal of its kind was transmitted by Guglielmo Marconi between nearby Lavernock Point and Flat Holm island in 1897.

  But earlier this year there were calls to scrap the sculpture after councillors learned of Marconi's fascist links.

  Cardiff Council said there will be no reference to Marconi on the sculpture.

  The artwork will be approximately four metres high and will sit on a concrete plinth half a metre high, near the Cardiff Bay barrage.

  The application was made in April this year for the sculpture, which was granted at the end of August.

  On 13 May 1897, the world's first radio message was sent across open water.

  A transmitter was placed on Flat Holm, an island halfway across the Bristol Channel, and began sending a signal through a radio frequency.

  Marconi's receiver was examined by post office officials in Lavernock

  The first attempt ended in failure, with the team member at Lavernock Point sat waiting for a non-existent signal.

  But on 13 May, the instruments rang out with a clear spark, with a message of "CAN YOU HEAR ME," which was received loud and clear.

  The team then travelled to Brean Down Fort in Somerset to see if the transmission could travel further.

  A message was sent a distance of nearly 10 miles - a record at the time.

  The message that was sent across the Bristol Channel from Brean to Lavernock in Wales

  Despite the scientific importance of the transmission, the idea of a commemorative statue is controversial.

  In 2002, documents were found which show Marconi blocked Jewish scientists joining the Academy of Italy.

  He marked shortlisted candidates with the letter "E", standing for Ebreo - the Italian word for Jew.

  Marconi was appointed to lead the Academy of Italy by the country's fascist leader Benito Mussolini.

  Mussolini also made him a member of the Grand Council of Fascism, a ruling body of the government.

  A Cardiff Council spokesperson said: "The work carried out by Marconi is just one small part of Flat Holm island's fascinating history, which stretches all the way back to the Bronze Age.

  "The purpose of the proposed sculpture has always been to act as a symbol and encourage them to explore the full range of the island's history.

  "None of that history, good or bad, can be deleted, but we have a responsibility to learn from it, and ensure it is presented in a way that's consistent with Cardiff's values as a tolerant and welcoming city.

  "Therefore, while the intention is to move forward with the initial 'Radio Flat Holm' design, following a full review of the plans, there will be no reference to Marconi on the sculpture."

  They added that they "in no way condone Marconi's links to fascism and antisemitism".
