title: 'Reece Richards: Police probe actor''s mistaken pepper-spray arrest - BBC News'
date: '2024-09-17'
section: London
url: http://www.bbc.co.uk/news/articles/c5ywrvpvpx5o
content: |-
  Reece Richards' arrest by officers in west London is being investigated by the Metropolitan Police.

  Mr Richards has made a formal complaint to the police and the police watchdog

  The mistaken arrest of an actor who says he was pepper-sprayed, kicked and thrown to the ground by officers in west London is being investigated by the Metropolitan Police. Reece Richards, who appeared in the Netflix show Sex Education, was returning home to Fulham on 4 September after performing in the musical Hairspray when he says he witnessed a car crash and two men fleeing on foot. Despite pointing out the direction in which the two men had fled, he says four officers sat on him, worsening injuries to his back, ribs and stomach. The force has admitted pepper spray was used and said its directorate of professional standards, which investigates complaints, had been informed.

  The Met said officers were pursuing a suspected stolen car with false plates before the incident involving Mr Richards, who has accused the force of "racial profiling". Scotland Yard added that before Mr Richards had been de-arrested on Fulham Palace Road "a Taser was pointed but not discharged". The police watchdog the Independent Office for Police Conduct (IOPC) said it was "not aware of any referral [from the Metropolitan Police] at this time". A video, shared by Mr Richards and Hairspray director Brenda Edwards, appears to show a number of police officers holding an individual to the floor.

  Writing on Instagram, Mr Richards said he had complained to the Metropolitan Police and the police watchdog about what he called "racial profiling" in the incident, in the early hours of 4 September. The actor said: "In a flash, I was face-down on the pavement with multiple officers holding me down, forcing my head into the ground. "I couldn't see anything, but I could hear my mum nearby, screaming and crying, begging them to let me go. "That feeling of helplessness will never leave me. The whole experience was embarrassing, deeply upsetting, and exhausting. "I won’t rest until I’ve gotten to the bottom of this and I am deeply saddened for anyone else who has been through this." He added: "I do everything I can to avoid interactions with the police, yet this experience has made it painfully clear that racial profiling remains a significant issue."

  The Hairspray UK Tour Instagram account posted: "We stand in full support and solidarity with Reece Richards , a valued member of our cast who was wrongfully targeted by the Met Police whilst making his way home after a performance of Hairspray the Musical." It added that it "strongly condemns any form of racism" and was "offering him our full support during this difficult time". The Met said the driver, aged 15, had been arrested at the scene for failing to stop, dangerous driving and burglary. Scotland Yard said two passengers, aged 20 and 21, had run off but were located nearby. Both were arrested on suspicion of theft of a motor vehicle, while the 20-year-old was also held on suspicion of being in possession of a pointed or bladed article. As a precaution, all three were taken to hospital where their injuries were assessed as not being life-threatening or life-changing.
