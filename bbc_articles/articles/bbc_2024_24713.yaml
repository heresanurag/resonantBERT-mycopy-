title: 'Watch: Bedfordshire Police find wanted man hiding inside a sofa - BBC News'
date: '2024-10-11'
section: General
url: http://www.bbc.co.uk/news/videos/cew1pdz22x0o
content: |-
  The man is in custody, which is a "little less of a squeeze" for him, say police.

  A suspect hoping to elude the police was discovered by officers hiding within a sofa.

  Bedfordshire Police turned up at an address in Potton with a warrant to arrest the man at about 07:20 BST.

  While searching the property, they overturned a large sofa to find the man hiding in its base.

  A force spokesperson said: "We thought the man would be more comfortable tucked into bed, so he’ll be spending the next few hours in a custody cell – little less of a squeeze that way."

  "[The Biggleswade Biggleswade Community Policing Team] thought there was nothing more to be found in the property bar a friendly dog," the spokesperson said.

  "Upon a closer search, officers found the suspect tucked into the base of his sofa.

  "We’ve seen some things in our time, but we must say this is a first."

  Bedfordshire Police said they could not give any more details about the arrest for operational reasons.

