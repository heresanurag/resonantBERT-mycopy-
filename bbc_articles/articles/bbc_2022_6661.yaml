  • None Taylor-Serrano one of best fights at MSG - Hearn

  'Look what we've just done'

  It was the first time two females had headlined the famous venue and after the first fight smashed every expectation, an even bigger rematch is surely in the works, with Dublin's Croke Park mentioned as a potential venue.

  "Absolutely. We have to do this again," Taylor said after the result.

  "It was an absolute war for 10 rounds. I'm grateful to be in this position and sell out Madison Square Garden. Look what we've just done.

  "I said before that when you think Madison Square Garden, you think Muhammad Ali v Joe Frazier, but now everyone will be thinking of Katie Taylor v Amanda Serrano.

  "I knew I was going to have to dig deep and go to the trenches. I have the heart as well as the skill. I knew I was going to be able to pull through.

  "She's a phenomenal fighter. A great, great person. It was a privilege to fight her again."

  On such a seminal night for women's boxing, two of its greatest servants delivered. Matchroom promoter Eddie Hearn might talk a big game but he could never have envisioned selling out Madison Square Garden, 19,187 tickets to be exact, with Taylor.

  The build-up was dominated by the significance of the event, but Taylor and Serrano's performances showcased women's boxing's incredible rise.

  It has been the talent of the fighters and Taylor's unshakable resolve that has dragged women's boxing out of the shadows and into the spotlight.

  The fight quickly took shape in the first four rounds, Serrano the aggressor as the southpaw and Taylor looking to counter at speed.

  Serrano would move in close and fire off big shots, with Taylor happy to let the challenger advance on her, falling back on her renowned ability to respond in volume in a blink of an eye.

  The dangerous strategy from Taylor appeared to be working as she landed some clean shots, but then came the fifth round.

  Serrano cornered Taylor against the ropes and fired off crunching shots, connecting with the head of Taylor and drawing blood. With the referee watching closely, an unsteady Taylor pushed forward in reply and managed to bring the fight further into the ring.

  Taylor might have been swinging, but for only the second time in her stellar career she looked one punch away from hitting the deck. The first was in this same venue against Delfine Persoon in 2019 when Taylor was lucky to retain her titles. Three years on Taylor was unsteady on the MSG canvas again, but did brilliantly to survive the round.

  She met more fire in the sixth as Serrano was able to plant her feet when she needed to, hurting Taylor repeatedly with heavy hooks. Again the Irishwoman withstood the onslaught and appeared to rediscover her feet in the seventh.

  Taylor could control the fight in the middle of the ring if she kept moving and finally it seemed like Serrano took her foot off the gas. After her slowest round, Serrano came out swinging again in the eighth, eager to re-establish herself.

  Serrano backed Taylor into a corner post but this time the defending champion pivoted away from danger, learning her lesson from earlier exchanges.

  Into the final two rounds and Taylor was yet to hurt Serrano, but that was soon to change.

  The ninth round saw Taylor manage to take some sort of control but it was short-lived. The final round was a scintillating affair of back and forth. Serrano swinging from the hips at times while Taylor responded with painful counters.

  There was now blood on Serrano's face, but the Puerto Rican refused to step back and so punches flew from every direction. The final 10 seconds was a remarkable feat of power and cardio from the two women.

  Taylor had Serrano hurt but was then cracked by a powerful shot. Both women were unsteady on their feet but swinging when the final bell arrived.

  The tension was almost indescribable as both teams stood in the centre of the ring waiting to hear the results. Taylor was lucky to keep her titles three years ago and it was a nervous wait again under the bright lights of MSG.

  Taylor edged it in a fight that was in truth very close, and Serrano's apparent lead might have slipped away in the moments she slowed down.

  Opinions will be split on who won the fight and the debate will likely rage on until the two champions step in the ring again.

  Deafening noise on a night like no other at Madison Square Garden

  Boxing has seen many nights like these, but never for two female headliners. Inside MSG, the support for both fighters was feverish, loud and constant.

  Every punch was cheered like a knockout blow. The noise rose and fell, but never dropped below near-deafening levels.

  The applause was as relentless as the action in the ring. Who wants to watch women's boxing? Everyone, it seems.
