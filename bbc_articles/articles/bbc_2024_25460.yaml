title: 'Newcastle house explosion: Boy named as seven-year-old Archie York - BBC News'
date: '2024-10-18'
section: Tyne
url: http://www.bbc.co.uk/news/articles/c3vk40xn936o
content: |-
  Archie York's aunt says her nephew was "a loving boy, with a cheeky little grin on his face".

  Archie York, seven, was killed in the blast on Wednesday, in which a man also died

  A seven-year-old boy who died in a house explosion has been named locally as Archie York. The blast, which happened at about 00:45 BST on Wednesday, destroyed six flats on Violet Close in Benwell, Newcastle. A body of a man, believed to be in his 30s, which was found in the rubble, is yet to be identified. Abbie York, Archie's aunt, described him as a "loving boy, with a cheeky little grin on his face all of the time".

  The family had moved to the Benwell property just after Archie was born and the primary school pupil had been learning how to swim and enjoyed playing the violin, she said. His parents and two-month-old brother had been treated in hospital and were now being looked after by relatives, she added. She left a soft toy at the police cordon along with a message for her nephew, which read: "This life is so cruel and unfair... your life was snatched away so viciously... our hearts are broken and can never be repaired."

  Eyewitnesses told the BBC they heard a "very loud bang" and saw a "bright flash"

  Northumbria Police said five adults and a child were taken to hospital with varying degrees of injuries after the explosion, with all but one discharged following treatment. Following the find of a man's body in the rubble, the force confirmed there were no reports of people related to the properties still missing. A cousin of the man who died paid tribute to him, describing him as "one in a million". Cordons around the site are expected to be in place for some time. An investigation by emergency services is continuing.

  A number of families were forced to flee their homes after the blast at the council-maintained property. Labour-led Newcastle City Council said housing officers had ensured all those living nearby and who had been evacuated had a place to stay. It said some were with friends and family while others were in temporary hotel accommodation, and it was working to secure "suitable long-term options". Meanwhile, the local community has been rallying around to help those affected, with donations including baby clothes as many of those were young families.

  Archie's aunt said he was learning how to swim and enjoyed playing the violin

  Northumbria Police and Crime Commissioner, Susan Dungworth, said: "It’s been a terribly sad situation for everyone affected but heartwarming how the people of the West End have come together showing incredible community strength. "I hope everyone affected takes great comfort in the outpouring of support from communities near and far, with well wishes and donations."
