title: 'England 4-0 Sweden at Euro 2022: ''Is this real? Someone pinch me'' asks Scott
  - BBC Sport'
date: '2022-07-27'
section: General
url: http://www.bbc.co.uk/sport/football/62314241
content: |-
  Alex Scott says "everyone involved in women's football has been waiting for this" as England hammer Sweden 4-0 at Bramall Lane to reach the Euro 2022 final.

  Last updated on .From the section Women's Euro 2022

  Former England defender Alex Scott says "everyone involved in women's football has been waiting for this" after they hammered Sweden 4-0 at Bramall Lane to reach the Euro 2022 final.

  England will face Germany or France at Wembley on Sunday as they bid to win their first major trophy.

  "Is this real? Someone pinch me. It's hard not to get emotional," said Scott.

  "The amount of investment and everything that's gone into the women's game is for a moment like this."

  She added: "For this team to get to Wembley is something special. They deserve every accolade coming their way. The FA investment, everyone involved in women's football have been waiting for this."

  The successful Female Development Programme, launched in 2013, was funded by £3.7m from the FA and Sport England to get more women and girls involved in football.

  Last year, the FA reached a £7m to £8m deal with the BBC and Sky to broadcast the Women's Super League (WSL).
