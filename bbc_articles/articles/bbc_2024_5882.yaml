content: |-
  Captain Ben Davies says he could never have envisaged being on the brink of a fourth major tournament with Wales.

  Coverage: Live on S4C, BBC Radio 5 Live, BBC Radio Wales, BBC Radio Cymru, BBC Sounds, BBC Sport website and app, plus live text Highlights: Match of the Day Wales, BBC One Wales from 22:40 and

  Captain Ben Davies says he could never have imagined being on the brink of a fourth major tournament with Wales.

  Wales aim to reach their third consecutive European Championship by beating Poland in their Euro 2024 play-off final in Cardiff on Tuesday.

  The Tottenham defender, 30, is one of four survivors from Chris Coleman's squad that qualified for Euro 2016, reaching the semi-finals in France.

  "Welsh football was in a pretty sticky place before Euro 2016," said Davies.

  "I remember before that campaign we felt that would be our best opportunity to qualify and I think breaking down that barrier [was important] and showing it is possible that if you put just a run of a couple of games together then qualification is there in your hands.

  "We have shown we have big players stepping up in big moments over and over and a chance to do it four times is something I probably never imagined happening."

  Since the historic 2016 qualification - Wales' first major tournament finals since the World Cup in 1958 - Davies has been an integral part of the squad which reached the delayed Euro 2020 finals and the 2022 World Cup in Qatar. Now he and Wales have the big stage in their sights once more.

  Goalkeepers Danny Ward and Wayne Hennessey also played in the France finals, along with Cardiff City midfielder Aaron Ramsey, who is now the squad captain but likely to be on the bench against Poland.
