  A selection of striking images from around the world, taken over the past seven days.

  The largest tunnelling machine ever used on a UK rail project has completed its 10-mile (16km) journey. Florence - named after Florence Nightingale - cut through the chalk beneath the Chiltern Hills. The tunnel will form part of HS2, the high-speed rail link between London and Birmingham.
