title: 'Rebecca Joynes: Teacher guilty of sex with two boys - BBC News'
date: '2024-05-17'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-69026069
content: |-
  Rebecca Joynes is told to expect to go to jail after being convicted by jury.

  Teacher Rebecca Joynes groomed the two teenage boys from the age of 15, the trial heard

  A teacher has been found guilty of having sex with two schoolboys. Rebecca Joynes, 30, groomed both boys from the age of 15, Manchester Crown Court was told. Joynes was convicted of four counts of sexual activity with a child and two counts of sexual activity with another child, She was on bail for sexual activity with the first child, boy A, when she began sex with the second, boy B, who she went on to become pregnant by. Neither teen must be identified. Joynes closed her eyes and grimaced before beginning to shake as the guilty verdicts were returned by the jury foreman. Her mother and father, sitting in the public gallery, made no reaction. But yards away the parents of the boys stifled cheers as Joynes was convicted. Judge Kate Cornell warned Joynes: "There's a baby in this case who has done nothing wrong and is entirely innocent of all wrongdoing, and you will obviously want to see her before the sentence is passed, I do understand that. "But you must be under no illusion what's going to happen on the fourth of July."

  The court previously heard that Joynes was 28, had just come out of a nine-year relationship, and was "flattered" by the attention of teenage schoolboys. Boy A worked out her mobile number after she gave him all but one digit, and the pair connected on Snapchat. He sent her flirtatious texts and they agreed to meet secretly. Boy A lied to his mother that he was staying over at a friend's house after school finished on Friday, but instead Joynes picked him up near his home in her Audi A1, took him to the Trafford Centre, and bought him a £350 Gucci belt.

  Joynes was on bail when she got pregnant by one of the boys

  Back at her flat they kissed and had sex twice. The next day the boy's mother noticed a love-bite on her son's neck, which he dismissed as "nothing". But police received a tip-off and visited the school along with boy A's "distraught" mother, who stormed into reception after being told her son had spent the night with a teacher. Joynes was bailed on condition she have no unsupervised contact with anyone under 18. She said she had a "breakdown" and moved back to her parents in Wirral. She was at a low point when boy B messaged her on Snapchat asking how she was. Joynes moved back to Salford Quays, and Boy B visited and they had sex for the first time. She was arrested for breaking bail conditions and spent five months in custody until she was bailed in November last year, giving birth in early 2024. Jane Wilson, senior crown prosecutor for CPS North West, said: "Rebecca Joynes is a sexual predator. "She abused her position to groom and ultimately sexually exploit schoolboys. Her behaviour has had a lasting impact on them." Listen to the best of BBC Radio Manchester on Sounds and follow BBC Manchester on Facebook, external, X, external and Instagram, external? You can also send story ideas to northwest.newsonline@bbc.co.uk, external
