content: |-
  The highly anticipated meeting between the two leaders began with a question and answer with the press.

  US President Donald Trump has welcomed UK Prime Minister Sir Keir Starmer to the White House, commencing a highly anticipated meeting between the two leaders.

  Sir Keir's visit comes days after France's Emmanuel Macron visited the US, for talks on Ukraine and defence.

  On Friday, Ukraine's President Zelensky will arrive in Washington DC to sign what Trump calls a "very big agreement" on minerals.
