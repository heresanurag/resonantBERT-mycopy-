  Health Secretary Matt Hancock dropped the statistic on 21 May as he announced plans to roll out "antibody certificates".

  Hancock: 17% of Londoners and 5% of rest of England have had coronavirus

  Earlier, at the UK government's daily briefing, we heard news of a study which suggests that 17% of people in London and around 5% of the rest of the nation have virus antibodies. The new data comes as the government agreed a deal with a large pharmaceutical firm for more than 10 million antibody tests, to see if people have had the virus. The first in line for them will be health and social care staff, patients and care home residents. It's still unclear what level of immunity people develop once they have had it, but some experts hope a degree of immunity would last a year or two. However, there is no guarantee that having antibodies means a person will not pass the virus on to somebody else. At the briefing, Health Secretary Matt Hancock said certificates were being looked at for people who test positive for coronavirus antibodies. "It's not just about the clinical advances that these tests can bring," he said. "It's that knowing that you have these antibodies will help us to understand more in the future if you are at lower risk of catching coronavirus, of dying from coronavirus and of transmitting coronavirus."
