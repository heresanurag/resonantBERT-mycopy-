  Reform UK has launched what it calls its 'contract' with voters, BBC Verify looks at the numbers.

  Reform UK has launched what it calls its 'contract' with voters, which includes income tax and spending cuts.

  Reform's planned tax cuts would cost nearly £90bn per year, and spending increases would cost about £50bn per year, the party says.

  BBC Verify's Ben Chu gives us his quick take on Reform UK proposals.

