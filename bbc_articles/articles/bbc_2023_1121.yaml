title: West Cowick woman charged with murder after fatal stabbing - BBC News
date: '2023-01-01'
section: Humberside
url: http://www.bbc.co.uk/news/uk-england-humber-64133644
content: |-
  Teresa Hanson, 53, appeared at Hull Magistrates' Court charged with killing her husband Paul Hanson.

  A woman has appeared in court charged with murdering her husband.

  Paul Hanson, 54, died in hospital after he was found with a stab wound at property in Little London Lane in West Cowick, near Snaith, on 28 December.

  Teresa Hanson, 53, of West Cowick, appeared at Hull Magistrates' Court charged with his murder.

  No plea was entered and Mrs Hanson was remanded in custody to appear before Hull Crown Court on Tuesday.

  Officers were called to a property in West Cowick on 28 December

  Dressed in a grey tracksuit the defendant spoke only to confirm her address and date of birth.

  As she stood in the dock, family members could be heard sobbing in the public gallery.

  Describing the case as a "difficult situation for all concerned" the presiding magistrate said it was so serious it could only be dealt with by the Crown Court.

