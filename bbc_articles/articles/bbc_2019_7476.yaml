title: 'D-Day Arromanches: Piper marks moment a British soldier landed - BBC News'
date: '2019-06-06'
section: General
url: http://www.bbc.co.uk/news/uk-48539265
content: |-
  A lone piper marks the exact moment a British soldier landed on Gold Beach in Arromanches.

  Pipe Major Trevor Lily played on a section of the Mulberry Harbour in Arromanches at the exact time the first British troops landed on the beaches in 1944.

  D-Day veterans are being joined in northern France by Theresa May, Donald Trump and Emmanuel Macron for a second day of events to mark the 75th anniversary of the Normandy invasion.
