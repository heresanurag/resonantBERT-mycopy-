id: bbc_2020_10001
title: Minute's silence held for Croydon police officer - BBC News
date: '2020-09-25'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-54301834
content: |-
  Mayor of London Sadiq Khan and Home Secretary Priti Patel joined Met Police Commissioner Cressida Dick at New Scotland Yard.

  A long-serving police officer has been shot dead at Croydon Custody Centre in south London.

  The male sergeant was shot in the chest before the suspect turned the firearm on himself, sources have told the BBC.

  Met Police Commissioner Cressida Dick, Sadiq Khan and Priti Patel all took part in the silence at New Scotland Yard, while colleagues of the killed officer gathered outside the Croydon Centre.
