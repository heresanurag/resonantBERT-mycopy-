  Russia: 'No decision yet' on Biden-Putin news conference

  A spokesman for Russia's Kremlin says he does not expect the leaders of the US and Russia to hold a joint press conference when they meet in Geneva on Wednesday. Dmitry Peskov told CNN that the two sides are still negotiating the terms of the meeting, which is highly anticipated by both countries. “We heard about such a possibility from our American counterparts, but we are still waiting for final confirmation but since the very beginning President Putin has been open to any alternatives,” Peskov told the US network. Biden's predecessor, Donald Trump, was often criticised for allegedly being too cosy with Putin. Biden has sought to take a tougher line, but has so far given no indication as to what he is planning to tell the Russian president. Asked by reporters on Friday what his message will be, Mr Biden responded: “I’ll tell you after I deliver it.”
