title: '''Anti-Khan'' bikini balloon launches - BBC News'
date: '2018-09-01'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-45382259
content: |-
  Protesters fly a 29ft balloon of a bikini-clad Sadiq Khan to campaign to oust the London mayor.

  A giant balloon of a bikini-clad London Mayor Sadiq Khan has been flown above the capital as part of a campaign to oust him.
