title: King Charles receives Scottish crown jewels... in 85 seconds - BBC News
date: '2023-07-05'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-66114446
content: |-
  A service of thanksgiving has been held at St Giles’ Cathedral in Edinburgh to mark the King’s coronation.

  King Charles has been presented with the Honours of Scotland - the nation’s crown jewels - at a ceremony in Edinburgh to mark his Coronation.

  The day began with a ‘People’s Procession’ which travelled from Edinburgh Castle to St Giles’ Cathedral, where a service of thanksgiving for the King was held.

  Take a look at some of the key moments from the day.
