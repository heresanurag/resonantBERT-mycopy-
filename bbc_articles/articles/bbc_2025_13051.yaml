title: Brentford appoint Keith Andrews as Thomas Frank's successor - BBC Sport
date: '2025-06-27'
section: Brentford
url: http://www.bbc.co.uk/sport/football/articles/cn4lj9gv7lno
content: |-
  Brentford appoint Keith Andrews as their new head coach to replace Thomas Frank, who joined Tottenham earlier in June.

  Keith Andrews was capped 35 times by the Republic of Ireland

  Keith Andrews says Brentford's potential is "massive" after he was appointed as their new head coach on a three-year deal following Thomas Frank's departure to Tottenham. Former Wolves midfielder Andrews, 44, joined the Bees last summer to work under Frank as the club's set-piece coach. Having previously been on the coaching staff with Sheffield United, MK Dons and the Republic of Ireland, Andrews' promotion to the top job is the Irishman's first step into management. "The ceiling is massive in terms of what we can achieve," Andrews said. "I don't know where to start in terms of what's exciting me because there's so much: the potential of the football club, the potential of the players and the potential of the staff that underpin what has brought success to this brilliant football club."

  Brentford considered a number of external candidates for the job including Ipswich Town's Kieran McKenna and Francesco Farioli, who left Ajax last month. While owner Matthew Benham's decision to hand Andrews the reins may be considered a gamble, it does represent a level of continuity in keeping with what has gone before. Frank was promoted from his role as an assistant to take charge in 2018 when Dean Smith left for Aston Villa, having managed Brondby for nearly three years as well as Denmark's youth teams. Andrews takes the helm during a period of turbulence at Gtech Community Stadium. Republic of Ireland goalkeeper Caoimhin Kelleher has arrived from Liverpool to replace Netherlands stopper Mark Flekken, who has moved to Bayer Leverkusen. Denmark midfielder Christian Norgaard is poised to head to Arsenal and last season's top scorer, Bryan Mbeumo, has been the subject of an improved bid worth £60m from Manchester United. Andrews wants Brentford to be a team which "the fans feel represents them" and said he will be quite hands on in terms of his coaching style as he "loves being on the grass" improving players. "We want to play winning football, we want to be competitive, we want to have an edge, we want to play dynamic, relentless football but we want to be organised," he added. "We want to have huge moments, huge games, and I think the big one is that we want to have an attitude and a relentlessness of progression. We really need to maintain that, and that's on a daily basis. "There will be a clear plan to try and develop our talented young players and also our older players, because development doesn't just stop when you get to a certain age."
