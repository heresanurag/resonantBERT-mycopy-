title: 'Carson Shephard: Missing boy, 7, found hiding in gran''s loft - BBC News'
date: '2021-09-20'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-58621345
content: |-
  Schoolboy Carson Shephard was discovered inside a wall cavity in his own home after an overnight search.

  Police went back to search the house with specialist equipment

  Missing Ayrshire schoolboy Carson Shephard was found hiding in the loft of his own home, it has been confirmed.

  The seven-year-old sparked a major search operation after apparently disappearing from the Afton Bridgend area of New Cumnock in Ayrshire at about 19:20 on Sunday.

  As the search continued into Monday morning, police confirmed the young boy had been found safe and well.

  He was hiding in a space in the wall which was inaccessible to adults.

  A police helicopter, marine and dog units had been joined by a large number of local residents who turned out to help in the search - many of whom spent the night checking sheds and outbuildings.

  Carson's mother, Gemma Glover, 27, from Glasgow, said Carson had been staying with his grandmother in New Cumnock for the past few months.

  Local people gathered near the missing boy's home to offer help in the police search on Monday morning

  She told reporters: "It's such a massive relief.

  "Police searched the loft three times last night but came in with specialist equipment this morning.

  "I've never felt anything like it, it was crazy. All night I was thinking how cold it was and in my mind I was like 'he's not survived that'.

  "It was so cold last night and we genuinely thought he was out the house. The main thing is he's all right. I can't explain the emotion, it's crazy."

  Carson had wrapped himself in insulation and was tucked away at the end of the loft, she added.

  East Ayrshire police division confirmed on Monday morning that the boy has been found.

