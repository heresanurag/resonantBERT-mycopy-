  They posted on Twitter: "Carson traced - We are pleased to report that seven-year-old Carson Shephard, reported missing from New Cumnock has been found safe and well.

  "Officers would like to thank everyone who assisted in this inquiry."

  About a dozen police vans and cars which had been scouring the area for the child were seen leaving the town of New Cumnock after he was found.

  Later, a police spokeswoman confirmed what had happened.

  She said: "He was found hiding in a wall cavity during a detailed search of his home address by specialist officers."

  Police Scotland also said that officers normally carry out varying levels of searches at different points in an enquiry, and it is standard for areas to be searched more than once.

