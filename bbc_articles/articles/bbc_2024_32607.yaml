  Boy, 4, dies after being hit by bus

  Police were called to High Street in Tipton just before 16:55 GMT on Friday

  A four-year-old boy has died after being hit by a bus. West Midlands Police was called to High Street in Tipton, near Dudley in the West Midlands, just before 16:55 GMT on Friday. The force said the boy was found with serious injuries and nothing could be done to save him. They added that the bus driver remained at the scene and is assisting police with their inquiries.

  The force has appealed for anyone with dashcam footage or other information to contact them.

