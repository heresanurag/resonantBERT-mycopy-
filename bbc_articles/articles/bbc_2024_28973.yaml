content: |-
  Brazil legend Marta celebrates the first NWSL championship of her glittering career after the Orlando Pride beat the Washington Spirit 1-0 on Saturday.

  Brazil legend Marta celebrated the first NWSL championship of her glittering career after the Orlando Pride beat the Washington Spirit 1-0 on Saturday.

  Zambia striker Barbra Banda scored in the 37th minute in Kansas City to give Orlando their first NWSL title.

  The Pride were also indebted to Anna Moorhouse as the English goalkeeper, who hails from Oldham, made a fine second-half save to ensure Orlando became champions in Englishman Seb Hines' second full season as coach.

  The Pride began the 2024 season with a 23-match unbeaten run and set the league record for points with 60 from 26 games.

  Banda, 24, ended her first season in Orlando with 13 goals in the regular season and four in the play-offs - an NWSL post-season record.

  Marta, 38, scored nine in the regular season then two in the play-offs, and Saturday's win marks a triumphant end to her eighth season in Orlando and the 24th year of her professional career.

  "I didn't expect ever [to be] in this moment here, but I believe so much that God knows what time is the right time for things to happen," the six-time Fifa Best award winner told CBS.

  "This means so much. Playing with these players, it's something really special that I never had at any other club, so I'm so happy."
