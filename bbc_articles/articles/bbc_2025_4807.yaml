  Wheelchair for sheep which 'keeps falling over'

  An animal sanctuary is raising funds to buy a wheelchair for a rescued sheep that arrived at the charity in a critical condition and "keeps falling over". Lotus Lamb & Sheep Sanctuary rehabilitates animals rescued from extreme cases of neglect and abuse. The West Sussex sanctuary took in Hope, a Wiltshire horn sheep, two weeks ago. Hayley Hubbard, who runs the charity, said Hope was "severely malnourished, dehydrated, and unable to stand" and they were now looking to raise money for a wheelchair.

  Hayley Hubbard, founder of Lotus Lamb & Sheep Sanctuary, says they aim to raise money to buy a wheelchair for Hope

  "We thought Hope would have died if she had not been brought to our sanctuary," Ms Hubbard said. She says the sanctuary has been helping Hope to regain her strength. Hope has undergone numerous tests to identify any other health concerns, however all have come back inconclusive, Ms Hubbard said. "The vets have taken a blood test and we are waiting for the results."

  The sanctuary says the vets have not been able to determine why Hope is unable to stand properly

  Ms Hubbard said: "When Hope is able to get up, she eats well, drinks water and is bright. However, she keeps falling over." She says the sanctuary aims to raise £800 to pay for a quad wheelchair to support Hope. "At this stage, we are unsure if Hope needs the wheelchair permanently but even if she does, the sanctuary will look after her and give her a second chance in life."
