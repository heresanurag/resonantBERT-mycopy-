  Great Britain's Marc Scott finishes second in the men's race, while compatriot Eilish McColgan comes fifth in the women's race.

  Scott finishes second and McColgan fifth in Great North Run

  Marc Scott rounded off a strong weekend by finishing in second place in the Great North Run men's race. Scott, who won the UK Athletics 5K Road Running Championship on Friday night, finished the half marathon in one hour one minute 11 seconds, 11 seconds faster than his race-winning time in 2021. Kenyan Abel Kipchumba won the race in 59:52, while Norway's Sondre Noen came third. In the women's race, Eilish McColgan, who returned from injury to compete for Great Britain at the Paris Olympics, placed fifth after an impressive sprint finish. McColgan was part of a six-strong breakaway group that led throughout, but Kenya's Mary Ngugi-Cooper and Ethiopia's Senbere Teferi and Alemu Megertu edged ahead in the closing 400m. It was the Kenyan who crossed the line first with a time of 1:07:40, with Terefi second and Megertu third. "It was amazing. It has always been a dream to come and race here," Ngugi-Cooper told the BBC. "For me to come here, do it and win it is a dream come true."

