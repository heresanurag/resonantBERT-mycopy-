  Great Britain's Jade Hall won the women's wheelchair race by over eight minutes. Hall was competing in her first half marathon since giving birth in March and clocked a time of 58:26. "I am really happy with how today went and I have been training really hard," said Hall. "I do feel like I have a different body now, I'm working with a different body and learning how that works for me now. "Timings are all different, juggling motherhood and training is completely different but I am enjoying it." Her compatriot Claudia Burrough finished second in 1:06:52 and Spain's Carmen Gimenez placed third. In the men's wheelchair race, Britain's Johnboy Smith won in 48:59, with compatriot Sean Frame finishing close behind in 49:39.
