title: Tiger Woods confirms relationship with Vanessa Trump - BBC News
date: '2025-03-24'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cm2n7d03x8xo
content: |-
  The veteran golfer announces he is dating Vanessa Trump, who used to be married to Donald Trump Jr.

  Golfer Tiger Woods has announced he is dating Vanessa Trump, the former daughter-in-law of US President Donald Trump. Vanessa, 47, was married to Donald Trump Jr for 13 years. The pair, who have five children, divorced in 2018. On Sunday, Woods, 49, posted pictures of Vanessa and himself on social media saying: "Love is in the air and life is better with you by my side! We look forward to our journey through life together." "At this time we would appreciate privacy for all those close to our hearts." It is unclear what prompted the public announcement, but rumours of their relationship had been reported in gossip magazines in recent weeks.

  Woods, who has won 15 major championships, is known for being guarded about his personal life after exposure of his marital infidelities and sex scandals damaged his public standing in the 2000s and affected his playing career. He admitted himself into a sex addiction rehab clinic, and went through an acrimonious split from his first wife Elin Nordegren months later after six years of marriage. The couple have two children together. US media outlets report that Tiger Woods' children attend the same school as Vanessa Trump's. As the former wife of Donald Trump's eldest son, Vanessa had been a regular attendee at official events involving Trump's extended family during his first term in office.

  Vanessa Trump looks on as Ivanka Trump (left) greets Michelle Obama at Donald Trump's first presidential inauguration in 2017

  Woods, the former world number one, is also known to have played golf with President Trump on several occasions, including last month. Trump loves golf and owns more than a dozen courses. In February, Woods attended a meeting with Trump and Professional Golfers' Association (PGA) heads at the White House about the future of the sport's tournaments and current division with the Saudi Arabia-LIV league. Woods wore his Presidential Medal of Freedom, which was bestowed on him by Trump in 2019 during the president's first term.

