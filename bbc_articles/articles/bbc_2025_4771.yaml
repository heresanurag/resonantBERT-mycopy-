  Woods announced an achilles tendon injury earlier this month that has sidelined him from professional competition. He has not suggested a timeline for when he might return to the courses. He has not competed in a PGA Tour event this season, following the death of his mother, Kultida, in February. The new couple both have children who are junior golfers. Kai Trump, 17, has announced her commitment to playing collegiate golf at the University of Miami in 2026. She and Charlie Woods both played at a junior invite-only tournament in South Carolina last week. Woods has previously announced relationships with World Cup champion ski racer Lindsey Vonn and Erica Herman, his former restaurant manager. That relationship ended badly - Herman filed law suits against Woods and his trust in 2023, which she later withdrew.
