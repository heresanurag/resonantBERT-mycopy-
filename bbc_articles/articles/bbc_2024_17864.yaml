  In contrast, Spain have been the team of the tournament. Their quarter-final win over Germany took a little while to get going, but it was brilliant once it did. Spain are doing it a very different way to France, and England too, and they have been very impressive in everything they have done - other than maybe not being ruthless enough at times. Their manager Luis de la Fuente will have to make changes for this game, because Robin le Normand and Dani Carvajal are both suspended, while Pedri will miss the rest of the tournament with a knee injury. If I was being logical about this, I would still say Spain will win - Lamine Yamal is so exciting, Nico Williams has arguably been the player of the tournament, and Rodri and Fabian Ruiz run things in the middle of the pitch - but I just have a feeling that France will get through. Of course Mbappe could play like the superstar he is, or Dembele could cause Marc Cucurella problems if he starts... but it is more likely that France will just smother Spain and, even if they do not play well, get the job done.

  Wout Weghorst's physicality made the difference for the Dutch against Turkey after he came on at half-time when they were 1-0 down. England manager Gareth Southgate has been accused of not being decisive enough with his substitutions, but Ronald Koeman got it right for the Netherlands there. Rather than trying to be intricate and playing through Turkey, they got the ball wide, crossed it in and Weghorst was a massive threat. I do not necessarily think he will start against England, but they will have him as an option on the bench if they need him. It is not just Weghorst that England have to watch out for though, because Cody Gakpo will be dangerous too. Gakpo probably has not delivered the form we expected from him for Liverpool, but he has had his moments. For the Netherlands, though, he has been their best player at this tournament.

