  There is the possibility that, like England against Switzerland, the Netherlands will move to playing with three at the back for this game. Koeman often does that when he faces stronger teams. If the teams do match up with the same formation, I think England have a better midfield than the Dutch duo of Jerdy Schouten and Tijjani Reijnders. The problem is that, in an attacking capacity, England just have not turned up yet. They have relied on some big moments so far, but the equalisers Jude Bellingham and Bukayo Saka scored against Slovakia and Switzerland were both with their team's first shot on target of the game. So, how do you call this? I don't think anything is going to drastically change in the way England play - they are not going to suddenly find some amazing patterns of play that break the Netherlands down. Instead, if England are going to reach their second successive Euros final, they are going to have to rely on individual brilliance again. I have not just been blindly backing them to get through each knockout round in Germany but they are definitely on the more gentle side of the draw. This is their toughest game yet, and it is going to be very close, but I do think England will edge it... somehow.
