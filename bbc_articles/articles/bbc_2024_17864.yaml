content: |-
  BBC pundit Chris Sutton makes his predictions for the semi-finals of Euro 2024 - and you can make yours too.

  The finishing line is in sight, but which of the four teams left in Euro 2024 will make it to the final in Berlin on 14 July? Like England's penalty takers against Switzerland, BBC Sport football expert Chris Sutton did not put a foot wrong with his predictions for the quarter-finals, getting all four results correct. The majority of you were spot on each time too - although, out of more than 160,000 votes, only 57% of you thought England would beat the Swiss, the lowest proportion of the teams you correctly backed. Still, that means like Sutton you have a success rate of 54% overall, after getting a total of 26 predictions right from the 48 games played in Germany so far. Can you get the better of him in the semi-finals? You can make your predictions below for France - Sutton's pre-tournament pick to win the European Championship - versus Spain and England against the Netherlands.

  I'm in a bit of a pickle here, because before a ball was kicked I went for France to win Euro 2024. Plus, I am at Allianz Arena for Radio 5 Live, so I cannot close my curtains and pretend Didier Deschamps' side are not playing. Didier is an old friend of mine because we joined Chelsea at the same time in 1999 and stayed in the same hotel. We used to play cards together, as a pair, and he was always quite cautious then... but nothing compared to how he has got his team playing now. When I think of the France football team, I think of flair and flamboyance, starting with Michel Platini's side that won the 1984 European Championship. Their sides that have won major honours in the years since then have been the same. This version of Les Bleus, though, has been utter dross to watch. Defensively, they have been excellent. As a centre-half pairing, William Saliba and Dayot Upamecano have been absolutely outstanding and Mike Maignan has been superb in goal too. Attack-wise though, I was just shocked by their level of performance against Portugal. Ousmane Dembele came on and made a difference, but Kylian Mbappe has not got going at all.

