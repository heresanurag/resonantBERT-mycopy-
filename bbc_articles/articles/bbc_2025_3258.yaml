  Conservative shadow businesses secretary Andrew Griffith said Sir Keir had "rightly" talked about the problem of millions of working-age people on welfare. "That is a stain on our country's character," Griffith told the BBC. "But it also holds back the economy and it's one of the reasons why we're not growing." However, Liberal Democrat work and pensions spokesman Steve Darling said "slashing support without fixing broken public services is not the answer". "We need long-term reform and investment in health and social care, not short-term cuts that balance the nation's finances on the backs of the most vulnerable," he said.

