content: |-
  The BBC's Lyse Doucet witnesses Afghan men, women and children fleeing the Taliban regime.

  Kabul airport has become the epicentre of the crisis in Afghanistan, with many thousands seeking to flee the country after the Taliban swept to power last week.

  The BBC's chief international correspondent Lyse Doucet witnesses the atmosphere on the tarmac as men, women and children are evacuated from their homeland.
