title: Birmingham factory blaze leads to power cut at 380 homes - BBC News
date: '2025-04-20'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/c705rkle9nvo
content: |-
  More than 75 firefighters have been tackling the Sparkhill fire and crews will be there all night.

  Several roads in the area have been closed by police

  Firefighters tackling a major blaze at a factory in Birmingham are expected to be at the scene all night, it has been confirmed. About 75 crew members have been tackling the fire, which led to a power cut affecting nearly 400 homes. Fifteen fire engines were sent to the single-storey industrial premises on Warwick Road, Sparkhill, at about 07:15 BST. West Midlands Fire Service (WMFS) said the blaze had also spread to three separate businesses nearby, although no casualties had been reported.

  It has confirmed the fire also affected an electrical substation, which had been isolated remotely by the National Grid, leaving 380 homes without power. In the latest update, a WMFS spokesperson said there had been a crew changeover at 18:00 and the fire was still being treated as "significant", having affected up to 75% of the factory. People living nearby had been urged to avoid the area and close all windows and doors. National Grid said it had hoped power would be restored to all homes by 18:30.

  About 75 firefighters have been tackling the blaze in Sparkhill, Birmingham

  Warwick Road has been closed in both directions between the junctions with the B4146 Tyseley Hill Road and B4146 Wharfadale Road, according to travel monitoring system Inrix. A West Midlands Police spokesperson said officers were supporting the fire service with the road closures.

