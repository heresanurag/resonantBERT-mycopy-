  There has still been no claim of responsibility for the damage, SNCF said. The company said its staff had "worked all night under difficult conditions in the rain" to repair damage. The "strategic" vandalism saw cabling boxes at junctions on the North, Brittany and South-West lines set alight hours before the Olympics opening ceremony was due to begin in the capital. Saboteurs cut and set fire to specialised fibre optic cables essential for the safe functioning of the rail network, government officials said. A source linked to the investigation told the AFP news agency that the operation was "well-prepared" and organised by "a single structure". Rail workers foiled an attempt to destroy safety equipment on a fourth line. "At this stage, traffic will remain disrupted on Sunday on the North axis and should improve on the Atlantic axis for weekend returns," a spokesman for the rail network said on Saturday morning.
