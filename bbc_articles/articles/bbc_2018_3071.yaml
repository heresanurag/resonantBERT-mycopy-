  • None Chris Hughton, meanwhile, has managed five away matches at Old Trafford in all competitions and lost all five without seeing his sides score a single goal.
  • None Romelu Lukaku has scored 12 goals in his last 11 FA Cup appearances - the only match he failed to score in of those 11 games was against Man Utd for Everton in the semi-final in April 2016.
  • None Lukaku has been directly involved in 14 goals in his 14 appearances in 2018 (10 goals, four assists).
  • None Indeed, the Belgian striker has either scored or assisted in each of his last five appearances for Manchester United.
  • None Nemanja Matic has both scored and assisted in a game for the first time since August 2014 for Chelsea against Everton.

  Manchester United's Premier League season resumes after the international break with a home game against Swansea on Saturday, 31 March (15:00 BST); Brighton host Leicester at the same time.
