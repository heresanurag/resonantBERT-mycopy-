  The body has not been formally identified but the Met said Kaliyah Coa's family has been informed.

  Body found in search for girl, 11, in River Thames

  Kaliyah Coa went missing in the River Thames on 31 March

  A body has been found in the search for an 11-year-old girl who went missing in the River Thames nearly two weeks ago. Kaliyah Coa, who had been playing during a school inset day, went missing after going in the water at Bargehouse Causeway, North Woolwich in east London, on 31 March. The Met Police said the body is yet to be formally identified but Kaliyah's family have been informed and are being supported by specialist officers. The force said it was alerted to a body found in the river in Maritime Quay near the Isle of Dogs in east London, at about 09:00 BST on Sunday.

  Emergency services conducted a large-scale search in an effort to find her, and the next day the Met said a "recovery mission" was under way. Shortly after she went missing, people living nearby had said Kaliyah had been playing near the water with a young boy and girl.

  Kaliyah entered the river close to Bargehouse Causeway, near London City Airport

  They said they had heard shouts and screams and that other children who were playing had said a girl had disappeared in the water and they could not find her. One woman, who later found shoes, a sock, a coat and phone by the river, had taken a life ring to the water but could not see Kaliyah. Bargehouse Causeway is a concrete slope that goes directly into the River Thames and is used to transport boats. Some residents previously pointed out that it appeared to be covered in moss and is slippery.
