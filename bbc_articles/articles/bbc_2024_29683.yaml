title: Dan Cole surprised by Joe Marler's retirement timing - BBC Sport
date: '2024-11-05'
section: English Rugby
url: http://www.bbc.co.uk/sport/rugby-union/articles/cg7g11yyrnmo
content: |-
  England prop Dan Cole says he was surprised by the timing of Joe Marler's retirement from international rugby union.

  Dan Cole and Joe Marler toured New Zealand with England together in July

  England prop Dan Cole says he was surprised by the timing of Joe Marler's retirement from international rugby because "his close friend" was closing in on 100 caps. Marler, 34, fought back from breaking his foot against New Zealand in July to make England's Autumn Nations Series squad. But the Harlequins prop withdrew for personal reasons last week before announcing his retirement on Sunday, finishing his England career with 95 caps. "Did I think he would go last Sunday? No," Cole said. "But we both knew in the end, the older we're getting, it was coming at some point. "I thought part of him wanted 100 caps but unfortunately he hurt his foot in that New Zealand Test. "The good thing is he has gone out on his own terms, so he's alive, well and healthy." Despite not featuring in Saturday's opening defeat by the All Blacks,, Marler made headlines by saying the New Zealand haka was "ridiculous" and needs "binning". In his England retirement statement on social media, Marler revealed how Cole was the first team-mate he told, that the pair hugged and exchanged an "I love you" before Marler said "I am done". Cole, 37, said he was missing his "good friend" in camp, but added the squad needed to "keep moving forward". The Leicester player told BBC Sport: "It was great, having a close friend in the team. "We came from different backgrounds and are different people in regards to how quiet I am, with Joe the opposite. "We have similar values, rugby-wise and off the field, which is why we have become friends. "I have learned a lot from him - that it is OK to have a personality and offer an opinion, and not think too much about the consequences of what you are doing, and I hope he has maybe learned something like self-control from me."

  Cole's favourite memory with his close friend came against South Africa in England's World Cup semi-final defeat last year, after the duo managed to hold off the power of the world champions' scrum. "The 2023 semi-final when I came off and he had come off just before me, we shared a hug and said 'well done'," he recalled. "After what happened in previous World Cups that was my favourite moment on the field together." Uncapped Sale Sharks prop Asher Opoku-Fordjour was called up to the England squad to replace Marler, with Saturday's Test against Australia the first potential opportunity for the highly rated 20-year-old to feature. "He's obviously been playing fantastically well in the Premiership for Sale," added Cole. "But it's not about replacing like-for-like, it's not about him replacing Marler. "It's about bringing your own personality. It's not trying to be someone else."
