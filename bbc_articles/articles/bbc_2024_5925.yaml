content: |-
  England and Harlequins scrum-half Danny Care announces his retirement from international rugby.

  Last updated on .From the section Rugby Union

  England and Harlequins scrum-half Danny Care has announced his retirement from international rugby.

  The 37-year-old played in all five of England's Six Nations matches this year and earned his 100th cap in the 23-22 win over Ireland on 9 March.

  Care, who has a record 369 Harlequins appearances, said: "To play for England once was a dream come true.

  "Never in my wildest dreams did I think I'd get the opportunity to do it over 100 times."

  Care added: "After a lot of reflection the past few months the time feels right, for myself and the team, to retire from international rugby.

  "The past 12 months in this England team have been arguably my favourite, making memories that my family and I will cherish and remember forever."

  Care made his England debut at the age of 21 when he was brought on during a 37-20 defeat by New Zealand in June 2008.

  He helped England achieve the Six Nations Grand Slam in 2016, in addition to winning titles in 2011 and 2017.

  Care also featured at two Rugby World Cups, earning selection in 2015 and helping England reach the semi-finals in France in 2023.

  He retires as one of only six men's players to achieve 100 caps for England, finishing with 101 caps after 15 years of playing at international level.

  Speaking on the BBC's Rugby Union Weekly podcast, Care said: "I have been thinking, 'I can't keep doing this forever'. I've got a young family at home that I've spent a lot of time away from, and I'm missing out on a lot of stuff.

  "In the past nine months, we've been away for about six of them.

  "You know what it's like with kids at home. They're missing me. When they start to ask 'You're not going away again, are you?' it's harder every time leaving them.

  "It's the right time for the team to have another nine or another few nines that can come in and show what they can do because there are some brilliant young lads out there.

  "I never want to stand in anyone's way. The team comes first."

  Care will continue to represent Harlequins, where he has won two Premiership Rugby titles.

  "I want to thank all the England fans from the bottom of my heart who have supported me and the team unconditionally throughout the years, all over the world," added Care.

  "It means the world and nothing will ever beat the feeling of walking out to all of you at Twickenham."

  Harlequins director of rugby Billy Millard said: "We're incredibly proud of Danny and everything he has achieved for England.

  "He's been the ultimate professional for the past 15 years and worked extremely hard to fight his way back to achieve 101 caps.

  "It's a huge testament to his character, hard work and professionalism and we congratulate him on a fantastic England career and look forward to his continued impact at Quins."
