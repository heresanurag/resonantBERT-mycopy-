title: Man dies after dog attack in Stratford, east London - BBC News
date: '2024-12-06'
section: London
url: http://www.bbc.co.uk/news/articles/c785ded89rdo
content: |-
  A woman, 32, has been charged over the attack, which took place on Wednesday morning.

  Police sealed off the scene of the alleged attack in Stratford on Wednesday

  A 42-year-old man has died after being attacked by a dog in east London on Wednesday morning, the Metropolitan Police has said. Leanne McDonnell, 32, has been arrested and charged over the attack, which took place on Shirley Road in Stratford. Police were called to the scene at 04:53 GMT on Wednesday, following reports that a man had been seriously wounded. He was taken to hospital where he later died, the Met said.

  Ms McDonnell has been charged with owning a dog dangerously out of control causing injury resulting in death; failing in the duty, as a person responsible for an animal, to ensure its welfare; and having custody of a fighting dog. She has also been charged, in relation to a separate incident on 18 November, with three counts of owning a dog dangerously out of control causing no injury. The dog involved in both incidents has been seized by police, the force confirmed. Ms McDonnell was remanded in custody and is due to appear at Barkingside Magistrates' Court on Friday.
