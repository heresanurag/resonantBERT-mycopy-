  In Europe, the tariffs could drag down growth by nearly a percentage point, with a further hit if the bloc retaliates, according to analysts at Principal Asset Management. In the US, a recession is likely to materialise without other changes, such as big tax cuts, which Trump has also promised, warned Seema Shah, chief global strategist at the firm. She said Trump's goals of boosting manufacturing would be a years-long process "if it happens at all". "In the meantime, the steep tariffs on imports are likely to be an immediate drag on the economy, with limited short-term benefit," she said.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Three things to know about Trump's tariffs announcement

  On Thursday, Stellantis, which makes Jeep, Fiat and other brands, said it was temporarily halting production at a factory in Toluca, Mexico and Windsor, Canada. It said the move, a response to Trump's 25% tax on car imports, would also lead to temporary layoffs of 900 people at five plants in the US that supply those factories. On the stock market, Nike, which makes much of its sportswear in Asia, was among the hardest hit on the S&P, with shares down 14%. Shares in Apple, which relies heavily on China and Taiwan, tumbled 9%. Other retailers also fell, with Target down roughly 10%. Motorbike maker Harley-Davidson – which was the subject of retaliatory tariffs by the EU during Trump's first term as president – fell 10%. In Europe, shares in sportswear firm Adidas fell more than 10%, while stocks in rival Puma tumbled more than 9%. Among luxury goods firms, jewellery maker Pandora fell more than 10%, and LVMH (Louis Vuitton Moet Hennessy) dropped more than 3% after tariffs were imposed on the European Union and Switzerland. "You're seeing retailers get destroyed right now because tariffs extended to countries we did not expect," said Jay Woods, chief global strategy at Freedom Capital Markets, adding that he expected more turbulence ahead.
