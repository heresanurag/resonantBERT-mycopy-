id: bbc_2020_12609
title: Woman seriously hurt in Bargeddie suspected gas blast - BBC News
date: '2020-11-22'
section: Scotland
url: http://www.bbc.co.uk/news/uk-scotland-55034078
content: |-
  Emergency services were called to a house in North Lanarkshire after it was badly damaged on Sunday morning.

  Damage to the back of the house could be seen after the explosion

  A woman has been seriously hurt in a suspected gas explosion in North Lanarkshire.

  Emergency services were called to a house in Cedars grove, in Bargeddie, near Coatbridge at about 06:25 on Sunday after reports of a blast.

  Fire crews, police and ambulance were all in attendance.

  Police confirmed a 43-year-old man and a 39-year-old woman were taken to University Hospital Monklands in Airdrie.

  A spokeswoman for Police Scotland said: "The man received treatment and has been discharged.

  "The woman has been transferred to Glasgow Royal Infirmary with serious injuries.

  "Neighbouring properties have been evacuated as a precaution. Officers remain at the scene."

  The Scottish Fire and Rescue Service said two fire engines were sent and a fire within the house was extinguished.

  Fire service personnel left the scene just before 08:00.

  Two fire appliances were at the scene as well as police and an ambulance
