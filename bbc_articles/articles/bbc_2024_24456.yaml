  Who has made Troy's Premier League team of the week?

  After every round of Premier League matches this season, BBC football pundit Troy Deeney will give you his team and manager of the week. Here are this week's choices. Do you agree? Give us your thoughts using the comments form at the bottom of this page.

  Mads Hermansen (Leicester City): I know he was on the losing team but he made five world-class saves that kept Leicester in the game against Arsenal and gave them a chance of taking something from it. Honestly, it was one of the best performances I've seen from a goalkeeper on a losing team in my life.

  James Justin (Leicester City): I don't remember him having much to do defensively, with all the troubles coming down Arsenal's right. He then popped in the second half with a decent header for his first goal, while the volley he hit to equalise was unbelievable. So much could've gone wrong with that but the technique was excellent. Micky van de Ven (Tottenham Hotspur): This is the second time he's been in my team of the week already. Defensively he's just a joke, I'm so impressed. His pace gets a lot of plaudits but the way he defends, the way he sees situations and covers his full-backs is excellent. And obviously another assist to add to a clean sheet in the win at Manchester United, so perfect for him. Joachim Andersen (Fulham): They were the only team to get a clean sheet having played 11 v 11 at Nottingham Forest. They were excellent, he was excellent. The Dane been a real strong addition for Fulham. He has a passing ability which is quite under-rated. He hit some lovely diagonal balls which got them moving forward. Josko Gvardiol (Manchester City): He scored a lovely goal and I thought the Croatian was really outstanding at Newcastle. I like the way he plays, he's a big strong boy who puts himself about, but he obviously also has that lovely footwork to get the goal.

  Lewis Cook (Bournemouth): In midfield, this is where the fanbase will come for us in the comments! After two poor results, for Cook to really stand up and drive that Bournemouth team forward, get two assists against Southampton - that's why he's in team of the week. Sandro Tonali (Newcastle United): I'm going for a little wildcard here. I think he's one of those people who's obviously made a mistake, but he's so naturally gifted as an athlete he's been able to come back in to the Newcastle side like he hasn't left. I know he's had a couple of games off the bench, but he covered a lot of ground, he got after the Manchester City players and made sure Newcastle were on the front foot.

  Antoine Semenyo (Bournemouth): I've been wanting to put him in for a little while but whenever he's done well someone else has scored two or three. The Ghana international has been great all season and scored a lovely, well-taken goal against Southampton. He's really surprised me because when he was at Bristol City I thought he was good, but I didn't think he was this good. He's taken his game to another level. Dwight McNeil (Everton): He scored two monstrous goals against Crystal Palace - monstrous in the season for where Everton are. They are going to need his goals. It is a working man’s team - it is quite poor. But little bits of quality show why McNeil is going to be crucial moving forward. Cole Palmer (Chelsea): Cold Palmer. There's not much we can say other than exceptional. I have heard links to him being as good as Dennis Bergkamp and people asking if he’s better than Eden Hazard - I would say let this young man keep doing what he is doing. He is oozing confidence, he has said "give the ball to me and I’ll show you how it is done". At first I actually thought the keeper should have got to his free-kick... but it is ridiculous. Liam Delap (Ipswich Town): I was critical of him for his performance against Brighton, but as well as scoring two against Aston Villa his all-round game was miles better. His back-to-goal play was miles better. And he gets two goals in a week Erling Haaland decided to not score a hat-trick!

  Sean Dyche (Everton): It was a massive game, he had to win and he pulled it out of the fire. There was a lot of pressure, a lot of expectation on him potentially being sacked with the new ownership and he pulls out a massive result to get Everton moving forward.

