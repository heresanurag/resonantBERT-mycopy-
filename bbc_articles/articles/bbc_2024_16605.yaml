title: Arrest over A61 crash which killed six people including two girls - BBC News
date: '2024-07-25'
section: West Yorkshire
url: http://www.bbc.co.uk/news/articles/c29d2lenkp1o
content: |-
  Police appeal for information about a grey Porsche 911 spotted in the area before the crash.

  Arrest after A61 crash that killed six people

  Shane Roller and his partner Shannen Morgan were killed alongside two of their daughters Rubie, nine, and Lillie, four

  A man has been arrested on suspicion of causing death by dangerous driving after six people, including four members of the same family, were killed in a crash. Nine-year-old Rubie Morgan-Roller and Lillie Morgan-Roller, four, died alongside their mother Shannen Morgan and father Shane Roller when their car collided with a motorbike. Christopher and Janine Barton, who were both travelling on the motorcycle, also died in the crash on the A61 between Barnsley and Wakefield on Sunday afternoon. Police have appealed for anyone who saw a grey Porsche 911 being driven in the area around the time of the collision to come forward.

  Christopher Barton, 56, and Janine Barton, 48, were killed in the collision on the A61

  West Yorkshire Police said the man was arrested earlier and remained in custody. They also urged anyone who may have dashcam, CCTV or doorbell footage of the Porsche and the manner it was being driven to contact them. Det Sgt Steven Suggitt said: “I would like to appeal for anyone who may have seen this grey Porsche 911 being driven on the roads around the south of Wakefield or north of Barnsley to please contact us." The Bartons' BMW S100 XR motorbike and the family's Ford Focus collided on the road at about 15:55 BST. Mr Roller and his partner, from Barnsley, had another daughter, aged 11, who was not with them at the time of the crash. Paying tribute in a post on social media, Mr Roller's father said his son, who was aged 33, and daughter-in-law "thought the world of their little family".

  Forensic teams have been carrying out investigations at the scene

  He said: "Shane wasn't just a son but an amazing father and he had a heart of gold . "Shannen, our daughter-in-law, was funny and was also an amazing mum and they thought the world of their little family." Mr Barton, 56, and Mrs Barton, 48, had recently celebrated their 25th wedding anniversary. In a tribute issued by police, their son described the couple, who lived in Barnsley, as “a loving, caring mum and dad who always put me before everything else”.

  Rubie (left) and Lillie's teachers said the girls were "a delight"

  Clare Storr and Kirsty Wordsworth, co-head teachers of Athersley North Primary School, which Rubie and Lillie attended, said the girls were "a delight to teach". “The girls were a credit to their parents, who were always incredibly supportive and who will also be greatly missed," they said. More than £340,000 has been raised for the surviving daughter of Ms Morgan, 30, and her partner after a GoFundMe campaign was set up by family friend Paul Hepple. Mr Hepple said the youngster had "lost her whole world in an instant" and the donations would "ensure she has a stable, loving environment where she can heal and grow". A special service was held earlier at St Helen's Church in Athersley to allow people to pay their respects to those who died. The service, led by Father Peter Needham, was attended by about 50 people. David Leech, a governor at Athersley North Primary School, said several teachers attended the service. "To say they were quite upset is an understatement, they are devastated", he added.
