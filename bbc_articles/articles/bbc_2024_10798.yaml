title: 'Whaley Bridge: Farmer bailed after burglary shooting death - BBC News'
date: '2024-05-05'
section: Derby
url: http://www.bbc.co.uk/news/uk-england-derbyshire-68956503
content: |-
  The farmer was held on suspicion of murder and attempted murder after the shooting in Whaley Bridge.

  A farmer arrested on suspicion of murder and attempted murder over the shooting of two men during a burglary has been bailed. Derbyshire Police was called to reports of a burglary in Eccles Road, Whaley Bridge, at 01:20 BST on Wednesday. Officers found 19-year-old Marcus Smith with fatal gunshot wounds and another teen with a gunshot wound nearby. The force said the arrested man, in his 50s, had been bailed while investigations continue. Mr Smith, of Chapel-en-le-Frith, played football for a local team and was a DJ at a pub. The second man who was shot remains in hospital with injuries not thought to be life-threatening. Derbyshire Police said three other men arrested in connection with the burglary had also now been bailed as inquiries continue. They are a man in his 30s arrested on suspicion of conspiracy to commit burglary, a man in his 20s arrested on suspicion of aggravated burglary and a man in his late teens held on suspicion of assisting an offender. Officers are continuing to appeal for witnesses and information.

