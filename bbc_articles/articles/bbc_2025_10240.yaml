content: |-
  Tom Kopke is among the winners at the annual event down Cooper's Hill in Gloucestershire.

  To play this video you need to enable JavaScript in your browser. This video can not be played The highlights from the 2025 Gloucestershire cheese rolling races

  German Tom Kopke was victorious at the Gloucestershire cheese-rolling event for the second year in a row, saying he "risked his life" to win. Mr Kopke, 23, who runs his own YouTube channel, was one of dozens of competitors who took part in the traditional annual event down the slopes of Cooper's Hill in Gloucestershire. Each race sees people chase a 7lb (3kg) wheel of Double Gloucester down one of the UK's steepest hills, with the winner claiming the cheese. "Last year the hill was muddy and this year it was dry and dangerous and people got injured," Mr Kopke said after his victory. There were seven races in all, two of them in memory of former cheese rolling winners who have since died.

  Like many competitors, Mr Kopke did not escape injury free from the steep hill

  "It was crazy. This year was different," said Mr Kopke, who publishes content to his 366,000 subscribers under the name Tooleko. "I shut off my brain and went for it. "All the people at the top said they were going to steal my title, but this is mine. "I worked for this. I risked my life for this. It's my cheese - back to back." One spectator from Mr Kopke's race was taken to hospital from the event, which the local authorities say is dangerous and puts a strain on the county's ambulance service.

  Seven races took place down the steep slope of Cooper's Hill

  The races were watched by thousands of spectators

  Thousands of people watched the races from the side, top and bottom of Cooper's Hill. The second men's race was won by Luke Preece, from Gloucester, who flew down the hill race dressed in a Superman costume. "I am absolutely buzzed, amazing... the adrenaline," he said afterwards. "My dad did it, I can't believe it, it's amazing."

  Some participants had to be helped off to receive medical attention

  The women's race was won by London university student Ava Sender Logan, 20. "This is my first time," she said. "I thought it was such a tradition, and I will probably feel it tomorrow. "It felt quite long coming down and then I hit my head. I'm down - that's what matters." But what about Ava's prize of a wheel of Double Gloucester? "I don't like cheese," she admitted.

  The final men's downhill race was won by Byron Smith, 33, from New Zealand, who had to settle for second place last year. "It feels great, yeah," he said. "I did it last year and came second in my heat and I thought I could do it this year and I did. "I ran as fast as I could and tried to get back up, and this year I did."

