title: 'Kinmel Bay: Five bitten by dog at holiday park, police say - BBC News'
date: '2023-09-16'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-66830871
content: |-
  Police arrest two men after a dog bites five people at Palins Holiday Park in Kinmel Bay.

  The dog attack happened at Palins Holiday Park in north Wales

  A man has been taken to hospital with serious injuries after he and four others were bitten by a dog.

  North Wales Police said it happened during a "disturbance" at Palins Holiday Park, Kinmel Bay, Conwy county, on Friday at about 22:00 BST.

  Two men, aged 58 and 28, have been arrested and the dog has been seized.

  Det Sgt Jon Rich said the dog is not believed to be a bully XL and the force was in the process of confirming its exact breed.

  The condition of the man in hospital is not known. Police said the four other people suffered minor injuries.

  Holiday park staff and security responded "as swiftly as possible", the park says

  Palins Holiday Park said there were two local men and a dog involved, who were not customers of the park, in an "incident" in its car park.

  It added staff and security responded "as quickly as possible".

