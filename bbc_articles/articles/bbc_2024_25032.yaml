title: 'Llanrumney: Goalkeeper has knee broken after football game - BBC News'
date: '2024-10-14'
section: Wales
url: http://www.bbc.co.uk/news/articles/crl8wldz1g6o
content: |-
  Joel Collins was attacked by a group with baseball bats and other weapons at the game on Saturday.

  Joel Collins was hurt as he left to go home after the game

  A football player had his kneecap smashed after being attacked by a group carrying weapons including a baseball bat after a Saturday league match. Joel Collins, 32, is undergoing surgery after sustaining a "life-changing injury" to his leg following his team Avenue Hotspur's away game against Llanrumney Athletic in Cardiff. Attendees at Saturday's game told BBC Wales a group attacked some of the Avenue Hotspur players as they left the changing rooms at Eastern Leisure Centre, Llanrumney, with baseball bats, bike seats and other weapons. Police are investigating and Llanrumney Athletic said it "condemned the actions of the individuals involved" and believed its players and coaching staff did not take part.

  Joel needs surgery and will be recovering for months.

  According to the FAW’s results app, three red cards and two yellows were shown by the referee after the final whistle. South Wales Police said it was investigating "violent disorder" which resulted in a "life-changing injury". Goalkeeper Mr Collins is now in hospital waiting for surgery and is said to be in "good spirits".

  Avenue Hotspur players - in red and blue - were playing an away match in Llanrumney before Mr Collins (wearing the number one shirt) was attacked

  His club, Avenue Hotspur, based in Ely, thanked those who had already given donations in an "overwhelming" response to a fundraiser for him, with fears he may be off work for four months. A spokesman for the club said: "This shocking incident, in which several players were violently attacked as they left the changing rooms, is completely unacceptable and was a really distressing and frightening experience for everyone involved. "As a family-focused community football club proud to represent the Ely community, we are committed to providing a fun filled, safe and inclusive environment for all and are hoping to return to playing in the next few weeks."

  In a statement via the club’s X account, Llanrumney Athletic said it wished "anyone injured in the incident a speedy recovery" and said it was "co-operating with the authorities". "We strongly condemn the actions of the individuals involved in this incident," the statement said. "To the club’s knowledge, no players or coaching staff were involved in this incident and should any information contradict this, they will be dealt with accordingly." South Wales Police confirmed "several assaults" had been reported after the match, as well as a vehicle being damaged. Det Insp Daniel Todd said: "The level of violence was appalling and will not be tolerated. “This incident has understandably shocked the community, and it must have been very frightening for all involved."
