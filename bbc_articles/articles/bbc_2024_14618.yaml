title: 'Antrim: Home of disabled boy attacked in ''sectarian hate crime'' - BBC News'
date: '2024-07-01'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/crglnnwl49lo
content: |-
  One of the houses in Antrim has been specially designed for Jessy Clark who has spina bifida.

  Nine-year-old Jessy suffers from spina bifida and uses a wheelchair

  The great-grandmother of a disabled child whose home was targeted in a sectarian attack has called those behind the incident heartless thugs. A bungalow specially designed for nine-year-old Jessy was one of two new-build properties damaged in Antrim at the weekend. His great-grandmother Pauline O'Loan told the Irish News, external those responsible are “cowards”. Jessy suffers from spina bifida and has a range of other complex medical needs which require him to use a wheelchair. Four people, dressed in dark clothing, threw objects in the Reford Grove development at about 03:00 BST on Sunday, the Police Service of Northern Ireland (PSNI) said. Police are treating the incident as a sectarian-motivated hate crime. “Jessy doesn’t have anywhere else to go - no other property can accommodate Jessy,” Ms O'Loan told the newspaper. She said those responsible have “no empathy”. “I want this condemned," Ms Loan said, adding that she wanted any threats lifted. "That’s what I am calling for, so that Jessy is safe," she said.

  Two properties in Reford Grove, Antrim, were damaged in what police are treating as a sectarian attack

  The PSNI said that on arrival at the scene, officers noted two windows had been smashed and paint damage had been caused to both properties. One of the houses was occupied at the time, police said. Insp Parkes said the PSNI had increased "proactive patrols" in the area and the neighbourhood policing team would talk to community representatives "to monitor any impact or concerns". “There is no place in our society for such behaviour. We take a zero tolerance approach to those wanting to cause fear, or incite and promote hatred," Insp Parkes added.
