title: Murder arrest after mobility scooter robbery victim dies - BBC News
date: '2023-01-23'
section: Gloucestershire
url: http://www.bbc.co.uk/news/uk-england-gloucestershire-64377516
content: |-
  The man in his 60s was found unresponsive in a Tesco car park after the suspected robbery in Stroud.

  The man was found unresponsive in the car park of Tesco on Stratford Road in Stroud

  A woman has been arrested on suspicion of murdering a man who was thought to have been robbed of his mobility scooter.

  The man in his 60s was found unresponsive in the car park of Tesco on Stratford Road in Stroud early on Sunday morning.

  Police said the man was taken to hospital but died later that day.

  A woman from Stroud has been arrested on suspicion or murder and robbery and remains in police custody.

  Gloucestershire Police believe that the victim was the subject of a robbery and his mobility scooter was taken.

  A mobility scooter was found abandoned on Bisley Old Road by a member of the public later that morning.

  The man was found without the mobility scooter he used to get around

  Police would like to hear from anyone who saw a black mobility scooter being used in the Paganhill area between 02:00 and 04:00 GMT on Sunday.

  The scooter is described as having four wheels, a basket on the front and arm rests.

  Investigating officers are asking for anyone who lives in the area to review their doorbell cameras and CCTV to see if they have any footage of the mobility scooter.

  Police would also like to hear from any motorists who were driving in the area who may have dashcam footage.

