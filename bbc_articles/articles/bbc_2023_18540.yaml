id: bbc_2023_18540
title: Shocking video shows officer pull woman from burning car - BBC News
date: '2023-12-22'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67807373
content: |-
  Dashcam footage captured the rescue and the woman was taken to hospital with non life-threatening injuries.

  A police officer pulled a woman to safety after she was trapped in a burning vehicle by the side of the road in Detroit.

  The dramatic rescue was caught on camera by the police vehicle's dashcam.

  Cameron Rieper, from Fraser Police Department, ran to the scene and reached into the car to rescue the woman. She was hospitalised with non life-threatening injuries and the officer was praised for saving her life.
