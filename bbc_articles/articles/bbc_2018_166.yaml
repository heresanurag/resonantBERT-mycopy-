title: Mayor Sadiq Khan's speech interrupted by protesters - BBC News
date: '2018-01-13'
section: General
url: http://www.bbc.co.uk/news/uk-politics-42677726
content: |-
  A speech by Sadiq Khan was suspended for several minutes while demonstrators were removed by police.

  London Mayor Sadiq Khan's address to the Fabian Society was suspended for several minutes by protesters shouting support for Brexit and US President Trump.
