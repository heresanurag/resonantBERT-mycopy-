title: 'Meghan praises Harry during Nigeria visit: He''s so smart - BBC News'
date: '2024-05-11'
section: General
url: http://www.bbc.co.uk/news/world-africa-68990498
content: |-
  The Duchess of Sussex compliments the Duke as he speak about mental health at a school in Abuja.

  The Duke and Duchess of Sussex began their three-day visit to Nigeria with a tour of Lightway Academy, a primary and secondary school in the capital city, Abuja.

  They were greeted by traditional dancers and met some of the primary schoolchildren.

  The couple launched a two-day mental health summit. Harry told the audience it was "ok not to be ok."

  His speech moved Meghan who told the schoolchildren: "Do you see why I married him?"
