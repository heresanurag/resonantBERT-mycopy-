title: Man appears in court charged with Eltham hammer attack - BBC News
date: '2018-08-21'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-45254803
content: |-
  Joe Xuereb faces two counts of attempted murder after a mother and daughter were critically injured.

  A man has appeared in court charged with two counts of attempted murder after two women were injured in a hammer attack in south-east London.

  City worker Ania Gos, 30, and her 64-year-old mother were attacked at Adderley Gardens, Eltham, on Sunday.

  Both remain in a critical condition in hospital, the Metropolitan Police said.

  Joe Xuereb, 27, of Greenwich, appeared at Bromley Magistrates' Court earlier and was also charged with possession of an offensive weapon - a claw hammer.

  Mr Xuereb was arrested in Sidcup following a media appeal.

  Ania Gos and her mother remain in a critical condition, police said.

  Ms Gos's mother was visiting from Poland when she was attacked, according to neighbours. Neither woman is said to have known Mr Xuereb.

  Mr Xuereb was remanded in custody to next appear at the Old Bailey on 18 September.

