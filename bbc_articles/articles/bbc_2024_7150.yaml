title: Guide dog dubbed Dogfather retires after fathering 300 puppies - BBC News
date: '2024-04-10'
section: Oxford
url: http://www.bbc.co.uk/news/uk-england-oxfordshire-68779132
content: |-
  Trigger, who fathered 39 litters of pups, will now be adopted by his volunteer in Banbury.

  The charity said that the eight-week-old puppies were about to start their guide dog journeys and would be living with volunteer "puppy raisers" for the next year of their lives.
