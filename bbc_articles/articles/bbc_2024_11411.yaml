title: Victorian brass lectern stolen from Edgbaston church - BBC News
date: '2024-06-11'
section: General
url: http://www.bbc.co.uk/news/videos/cevvzxz2wg5o
content: |-
  Revd Matthew Tomlinson says the eagle was given to the church when it opened in 1868.

  A vicar has said he is "bereft" over the theft of a brass eagle off a church lectern. CCTV footage was shared by St Augustine's Church in Edgbaston, Birmingham, in a bid to identify the man involved.

  Revd Matthew Tomlinson said the video showed the man walk in on Monday before removing the eagle and walking off with it.

  He believes the theft was pre-planned because the thief went straight for the lectern and was carrying a blanket to conceal it.
