content: |-
  Victim's father says his daughter's potentially life-changing injuries have been "devastating".

  Acid attack victim has pain and trauma, says father

  The 14-year-old victim's father said his daughter's injuries needed "urgent and long-term medical care, surgeries, rehabilitation, and mental health support"

  The father of a 14-year-old girl who was the victim of a suspected acid attack outside her school said the potentially life-changing injuries she has suffered have been "devastating". The attack took place outside Westminster Academy, Westbourne Park in west London, after school hours on Monday afternoon. Police said the manhunt continues to trace the "lone suspect", who they described as a male wearing a mask or balaclava and riding an e-scooter. Corey McFarlane said in an online fundraiser for his daughter that words could not "express the shock, pain, and trauma she is going through right now, both physically and emotionally".

  Lessons at Westminster Academy moved online and staff were working from home following the attack

  Mr McFarlane said his daughter was a "fighter", but said "she needs her community behind her more than ever". He added: "This senseless act of violence has left her with severe injuries that require urgent and long-term medical care, surgeries, rehabilitation, and mental health support." The father also appealed for anyone with information to come forward, and said: "Any support we can get from the community to spread awareness, gather information, and assist in the investigation would be deeply appreciated."

  The school was closed on Tuesday

  The substance which was thrown also injured another teenager and a staff member. The girl remains in hospital with potentially life-changing injuries. A 16-year-old boy remains in hospital with non life-changing injuries, and the staff member, a 27-year-old woman, has been discharged. Westminster Academy said the injured boy was a member of the public and not a pupil. The school was closed on Tuesday, with lessons taking place online and many staff working from home. On Wednesday the school opened as normal with staff told to expect a police presence. The Met said the two teens were approached on Alfred Road by a male "who threw a substance at them before fleeing down Harrow Road". The force described the suspect as a tall and slim black male wearing dark clothing and riding an e-scooter.
