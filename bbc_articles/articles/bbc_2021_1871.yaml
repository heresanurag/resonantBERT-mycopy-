  Meanwhile, health staff have criticised the paperwork needed to gain NHS approval to give the coronavirus vaccine, with some medics being asked for proof they are trained in areas such as preventing radicalisation.

  The first doses of the Oxford-AstraZeneca vaccine are due to be given on Monday after the jab was approved for use in the UK last week.

  The Pfizer-BioNTech vaccine was the first vaccine approved in the UK, and 944,539 people have had their first jab.
