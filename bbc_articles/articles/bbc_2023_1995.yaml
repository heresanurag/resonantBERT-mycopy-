content: |-
  The US president met other leaders in the alliance, who called for enhanced security in Eastern Europe.

  It's with that recap of today's events that we'll pause today's live coverage. Thanks as always for coming on the journey with us.

  We saw a show of solidarity with Ukraine from Nato countries in Eastern Europe, including Hungary, whose prime minister has attempted to maintain cordial relations with Russia. There were also warm words between Russia and China - with Moscow showing gratitude to the latter for its "balanced" position on Ukraine.

  My colleagues in the BBC's digital news team will be updating you throughout the week, as the anniversary of the Russian invasion of Ukraine approaches on Friday. Head here for an article on today's events.

