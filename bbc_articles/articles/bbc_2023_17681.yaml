title: 'Reading fire: Crane rescues worker next to burning high rise - BBC News'
date: '2023-11-23'
section: General
url: http://www.bbc.co.uk/news/uk-england-berkshire-67510298
content: |-
  Footage shared on social media shows a worker being rescued from a roof next to a burning building.

  Dramatic footage shared on social media shows a crane rescuing a worker from a roof close to a burning building.

  Royal Berkshire Fire and Rescue Service was called to a premises on Station Hill in Reading, which has since been cordoned off, at 11:40 GMT.

  Video footage from social media shows a person being lifted by a crane from the roof of a building, prompting applause from a crowd below.

  The blaze, which created a huge amount of black smoke, has now been put out by the fire service.

