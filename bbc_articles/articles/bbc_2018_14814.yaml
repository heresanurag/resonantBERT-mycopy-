title: 'President George HW Bush: Sully visits coffin at US Capitol - BBC News'
date: '2018-12-05'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-46435484
content: |-
  The 41st president's service dog attended along with past and present CIA directors.

  Past and present CIA directors were among those paying their respects to George HW Bush at the US Capitol.

  The 41st president's service dog was also brought to the Rotunda where Bush's body is lying in state.
