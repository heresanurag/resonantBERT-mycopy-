  The latest releases mean that under the ceasefire, Hamas is due to free another 14 hostages. However Israel says eight are of them are dead, meaning six living Israelis are still expected to be returned in the first phase. A total of 141 hostages have now been freed, including 81 Israelis and 24 foreign nationals released as part of a previous deal between Israel and Hamas. About 1,200 people were killed and 251 taken back to Gaza as hostages when Hamas attacked Israel on 7 October 2023. This triggered a massive Israeli military offensive in Gaza, which has killed more than 48,000 Palestinians, the Hamas-run health ministry says.
