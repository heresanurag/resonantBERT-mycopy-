title: 'Watch: Huge fire breaks out at Russian oil facility - BBC News'
date: '2024-04-25'
section: General
url: http://www.bbc.co.uk/news/world-europe-68888835
content: |-
  Ukrainian sources said the drones hit two facilities in the Smolensk region.

  A huge fire has broken out at an oil facility in Russia after an attack by Ukrainian drones, sources say.

  Ukraine's intelligence service said its drones hit two facilities in the Smolensk region, both owned by Russian oil giant Rosneft.
