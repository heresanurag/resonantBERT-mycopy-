title: 'Daniel Anjorin: Marcus Monzo in court over death of schoolboy in Hainault
  - BBC News'
date: '2024-05-03'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68941125
content: |-
  Marcus Arduini Monzo is remanded in custody after being charged with murdering Daniel Anjorin, 14.

  Daniel Anjorin's family say he was "well loved" and "hard working"

  A man charged with murdering schoolboy Daniel Anjorin with a Samurai sword in London has appeared in court. Marcus Arduini Monzo, 36, was remanded into custody over the attack in Hainault on Tuesday morning. Westminster Magistrates' Court heard Daniel, 14, suffered fatal stab wounds and four other people were injured. It is alleged he also hit a pedestrian with a van, attacked him, and broke into a family's home - where a couple were asleep with their young child. The prosecutor alleged a series of "horrific offences" had been carried out. Earlier, Daniel's family said he was a wonderful child who was "well loved" and "hard working". "No family should have to go through what we are experiencing," they said. "Any family will understand it's an absolute tragedy."

  Marcus Arduini Monzo is due back in court next week

  Mr Monzo, from Newham, east London, has also been charged with two counts of attempted murder, two counts of causing grievous bodily harm, aggravated burglary, and possession of a bladed article. The dual Spanish-Brazilian national stood in the dock in a grey tracksuit holding his left arm across his chest. He spoke slowly to give his name and is due to appear at the Old Bailey on 7 May if a hearing is not available on Friday, the chief magistrate, Paul Goldspring, said. All of the alleged offences are said to have happened in Laing Close, apart from the offence of GBH which is alleged to have taken place in Franklyn Gardens nearby. The court heard Mr Monzo crashed a van into a fence at about 07:00 BST on Tuesday, hitting a member of the public. He then got out of the van, said he would kill the man and slashed his neck with a Samurai sword, the court was told. Prosecutor David Burns told the court Mr Monzo broke into a nearby home where a couple were asleep with their four-year-old daughter. He allegedly went into the bedroom and attacked the child's father, shouting about believing in God and causing injuries to his neck and arm, the court heard. Mr Monzo is accused of then running up behind Daniel, who was walking to school, and attacking him.

  The defendant arrived at court on Thursday morning

  The court heard police officers arrived and tried to help the teenager, before Mr Monzo appeared from a bush. The officers then chased him. The court was told that he jumped out at a female officer and attacked her with the sword while she was on the ground, leaving her with arm wounds described by police as "horrifically serious". He is also accused of injuring a male officer, who has a serious hand injury.

  People have been paying their respects in Hainault

  Speaking to the Press Association (PA), Aiste Dabasinskaite, Daniel's neighbour, said: "We were shouting and waving towards Daniel as he came out. He had his headphones in so he wouldn't hear us. It just happened right before our eyes, it was horrible." Another neighbour said she could no longer sleep at night "because all I can see is him standing there with the sword".

  Daniel's school, Bancroft's, in Woodford Green, said he was a "true scholar" who had a "positive nature and gentle character". In a statement, it described him as a "core member" of the community, adding: "Losing such a young pupil is something we will always struggle to come to terms with." A fundraising page, set up by a friend of Daniel's brother on Wednesday, has already raised £35,000.

  Damage to a property on Laing Close near the scene of the attack

  Meanwhile, the sister of a man wounded in the sword attack has described her brother as a "hero" for protecting his family. Henry De Los Rios Polania, 35, an IT engineer from Hainault, is in hospital after being stabbed in his home. His sister, Jessica De Los Rios, 31, said her brother had been left "traumatised" by the event, adding: "To us, he's our hero. He protected them - my niece and my sister-in-law." Ms De Los Rios said her brother was recovering in hospital after sustaining a deep wound to his hand. She said he was awake but had lost a lot of blood and it would be a "really long, traumatising recovery for him". In Hainault, the police cordon has been lifted and floral tributes continue to be laid. Sue, a retired minister, was among those paying her respects. She said: "It's just lovely the way in which this community is here for each other and supporting one another. "We just hope and pray something like this will never happen again here."

