title: 'Burgess Hill: Charity offers £20k in missing father and son case - BBC News'
date: '2024-12-09'
section: Sussex
url: http://www.bbc.co.uk/news/articles/cdr0yevy0ygo
content: |-
  Crimestoppers says the reward is for information that leads to an arrest and murder conviction.

  Two arrests had been made in the case of father and son, Daniel Poole and Liam

  A charity is offering a reward of £20,000 for information relating to a father and son who disappeared in Spain more than five years ago. Daniel Poole and his son Liam, from Burgess Hill in West Sussex, travelled to Malaga in 2019 and a decision to treat their disappearance as a murder investigation was made by Sussex Police in 2022. Annabelle Goodenough, Sussex regional manager at the charity Crimestoppers, said Daniel and Liam's family deserved "justice, answers and closure". On Wednesday, Sussex Police said two men in the UK had been arrested and questioned on suspicion of murder and had been released under investigation.

  Crimestoppers said its reward was for information given exclusively to the charity "that leads to the arrest and conviction of any person responsible for their murder". The charity is independent of the police but is supporting the investigation. Sussex Police had previously also offered a reward, of £10,000 for information relating to an arrest and charge. Daniel and Liam hired a grey Peugeot 308 with the registration number 0254 KTM when they arrived in Spain on 31 March 2019. The car was never returned, and their luggage was left in their hotel, together with their passports. The vehicle was later found abandoned by Spanish Police. Ms Goodenough said: "We know it can be hard for some people to speak directly to the police which is why our charity is here for you. "We are hoping that with the passage of time it will be easier to share what you know." The reward is available until 9 March 2025.
