title: 'Hawaii wildfires: Volunteers bring aid by boat to devastated Maui - BBC News'
date: '2023-08-14'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66493892
content: |-
  Volunteers formed a human chain to pass aid off the boat as quickly as possible.

  The BBC's John Sudworth travels with volunteers delivering supplies by boat to the people of Maui, who have been affected by devastating wildfires.

  Supplies of fuel, water and other essentials were brought ashore by people who formed a human chain.

  Dozens of people on the island have died in the wildfires, with scores of buildings and vehicles also being destroyed.
