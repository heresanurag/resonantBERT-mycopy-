title: 'Wrexham: From local gigging to supporting Kings of Leon - BBC News'
date: '2023-04-24'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-65368716
content: |-
  Ryan Reynolds and Rob McElhenney have been serenaded with songs by Wrexham's The Declan Swans.

  The Declan Swans have been writing songs about Wrexham for more than 20 years

  Hollywood magic has not just rubbed off on Wrexham's footballers, but also on some of its musicians.

  The Declan Swans have gone from local gigs to a date supporting Kings of Leon at the Racecourse ground in May.

  Made up of Michael Hett, Mark Jones and Ben Jones, the band have been together for more than 20 years.

  Their song It's Always Sunny In Wrexham was featured in the Welcome To Wrexham documentary and promoted by club owners Ryan Reynolds and Rob McElhenney.

  Fans have even been known to sing it to the superstar club owners.

