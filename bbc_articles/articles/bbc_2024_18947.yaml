title: 'Galway: Teen arrested after stabbing at Irish army barracks - BBC News'
date: '2024-08-17'
section: Europe
url: http://www.bbc.co.uk/news/articles/ckg1x6jxrd7o
content: |-
  Fr Paul Murphy has been taken to hospital in Galway, where his injuries are said to be serious but not life-threatening.

  A car has been preserved for examination at Renmore Barracks

  An army chaplain has been stabbed several times during an attack at Renmore Barracks in County Galway. Fr Paul Murphy, who is in his 50s, was taken to University Hospital Galway and his injuries are described as serious but not life-threatening. In a Facebook post, the chaplain with the Irish Defence Forces thanked the public for their prayers and said he was awaiting surgery. Gardaí (Irish police) said a teenage boy was restrained by soldiers and then arrested. They also said a terror motivation was one line of enquiry.

  The special detective unit is involved in the investigation. "At this time it is not believed this incident is part of a wider conspiracy," police added.

