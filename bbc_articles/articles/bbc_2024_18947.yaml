  Fr Murphy was approached by the youth outside the barracks and attacked. The chaplain then entered through the barracks gate and followed by the youth. The injured priest was given first aid by on-duty personnel. Irish broadcaster RTÉ reported the priest had undergone surgery for his injuries.

  The Defence Forces said warning shots were fired by personnel during the incident. "Soldiers on duty responded to the immediate threat with appropriate force to ensure the safety of personnel and secure the area," they said. "The assailant was quickly detained and handed over to An Garda Síochána. "The injured Defence Forces member was provided with immediate first aid at the scene before being transported to hospital for further treatment." Members of the Garda's armed support unit were also sent to the incident on Thursday night.

  Gardaí said a possible terror motivation was one line of enquiry

  Taoiseach (Irish prime minister) Simon Harris has described the incident as "shocking". "My thoughts are with the member of the Defence Forces in hospital. I want to thank the Defence Forces and gardaí for their action and response," he said.

  Tánaiste (Irish deputy prime minister) and Minister for Defence Micheál Martin condemned the attack. "I commend the members of the Defence Forces on duty at the time, whose intervention was critical. "Our thoughts are with the Defence Forces member injured in the attack."

  Justice Minister Helen McEntee said her "first thoughts are with Fr Paul Murphy" and she wished him a speedy recovery. "I would also like to pay tribute to the members of the Defence Forces who intervened bravely at the scene," she added.

  Bishop of Galway the Right Reverend Michael Duignan said news of the assault was "deeply shocking and upsetting". He said he would pray for the injured man's full recovery as well as for his family, army colleagues and medical personnel.
