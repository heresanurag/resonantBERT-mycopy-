title: Ukraine says North Korean troops back on front line - BBC News
date: '2025-02-08'
section: World
url: http://www.bbc.co.uk/news/articles/cednp7q41l2o
content: |-
  Kyiv had indicated last week the North Koreans may have been withdrawn due to heavy losses in battle.

  North Korean soldiers have been deployed to fight for Russia in recent months

  Ukraine's president says North Korean forces have returned to the front line in Russia's western Kursk region, after reports they were withdrawn last month due to heavy casualties. In a video address on Friday, Volodymyr Zelensky said the Russian army had "brought back in North Korean soldiers" who were carrying out "new assaults" in the region partially occupied by Ukraine. He added "hundreds of Russian and North Korean military" personnel had been "destroyed". In January, Western officials told the BBC they believed at least 1,000 of the 11,000 troops sent from North Korea had been killed in the past three months. North Korea and Russia have not commented.

  Russian President Vladimir Putin launched a full-scale invasion of Ukraine in February 2022. The fighting has led to heavy losses on both sides.
  • None What are North Korean troops doing in Ukraine war? Last week, Ukrainian special forces fighting in Kursk told the BBC they had not seen any North Korean troops there for the past 21 days. A spokesman said it was probable they had been pulled out after suffering heavy combat losses. The spokesman added that he was only referring to areas where his forces were fighting, without giving any details about how long that front line was. Recent reports attributed to South Korean intelligence have suggested the North Koreans soldiers are unprepared for modern warfare, and are especially vulnerable to Ukrainian drones. Military experts say the reports of North Korean casualties, if they continue at this pace, are unsustainable. The soldiers were deployed after Russian President Vladimir Putin and North Korean leader Kim Jong Un deepened bilateral ties in recent months, including signing a security and defence treaty. Pyongyang's assistance to Moscow now also extends to large amounts of ammunition and weapons. The troops were also seen to have been sent to boost Russia's fighting forces who have seen significant losses. Russia's military has not publicly revealed its battlefield casualties since September 2022, when it said 5,937 soldiers had been killed. But Ukraine's president said this week up to 350,000 Russian soldiers had been killed, and other reports suggest that number could be significantly higher. Zelensky put Ukraine's military casualties at 45,100 - but a number of military experts in both Ukraine and the West believe the losses are much higher. Ukrainian troops launched a lightning offensive in Kursk six months ago, seizing more than 1,000 sq km (386 sq miles) of Russian territory. Since then, Russian forces have managed to retake a sizeable chunk of the region. However, Zelensky on Friday told Reuters news agency that Ukraine had launched a new offensive in Kursk on Thursday, advancing 2.5km (1.5 miles). Russia's military said the Ukrainian attacks had been repelled. The claims by the warring sides have not been independently verified. In other key developments on Friday:
  • None Russia's military said its forces captured a key town of Toretsk in Ukraine's eastern Donetsk region - but a Ukrainian military spokesman said fighting was continuing in the industrial hub
  • None US President Donald Trump said he would "probably be meeting President Zelensky next week, and I will probably be talking to President Putin. I'd like to see that war end".
