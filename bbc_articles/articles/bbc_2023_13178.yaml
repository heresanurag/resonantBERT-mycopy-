  England goalkeeper Mary Earps is named your player of the match after saving a penalty in their 1-0 Women's World Cup final defeat by Spain.

  World Cup final: Spain v England - how you rated the players Last updated on .From the section Football

  England goalkeeper Mary Earps was named your player of the match after saving a penalty in the Lionesses' 1-0 Women's World Cup final defeat by Spain. We asked you to rate the players out of 10 and Earps led by the way by a mile with an average score of 7.55. No other player from either side got more than 6.27.
