title: 'Watch: US CCTV shows airport staff allegedly stealing from bags - BBC News'
date: '2023-09-15'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66816550
content: |-
  Footage shows two officers at Miami International Airport allegedly taking cash at a security point.

  Surveillance footage shows two Transportation Security Administration officers at Miami International Airport in Florida allegedly taking cash from bags at a security checkpoint.

  The officers were arrested in July and are facing charges of grand theft. They have pleaded not guilty.
