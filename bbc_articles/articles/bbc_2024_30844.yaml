title: 'Ryder Cup 2025: USA to pay players £400,000 for Bethpage matches - BBC Sport'
date: '2024-12-16'
section: Golf
url: http://www.bbc.co.uk/sport/golf/articles/clyg859jed5o
content: |-
  Players on next year's United States Ryder Cup team will be paid to compete for the first time in the history of the matches.

  US players to be paid £400k for playing in Ryder Cup

  Patrick Cantlay (without cap) has made about £4.75m this year on the PGA Tour

  Players on next year's United States Ryder Cup team will be paid to compete after a package was agreed by the PGA of America. It will be the first time in the 98-year history of the matches that either side has been paid to play. The 12 players will each receive $500,000 (£400,000), with $300,000 (£240,000) donated to a charity or charities chosen by each member of the team. The PGA of America, which organises the event, approved the package despite saying "no players asked to be compensated". Six players will qualify automatically via the US Ryder Cup points list and captain Keegan Bradley will make six wildcard selections. "The players and captains, past and present, are responsible for the Ryder Cup becoming the most special competition in golf and one of the most in-demand events on the international sports scene," the PGA of America said in a statement. Last year's contest in Rome was marked by Patrick Cantlay not wearing the American team cap in what was reported to be a protest, external at the fact the players were not being remunerated to compete. Europe's Rory McIlroy said last month he would pay to play in the matches, which will be held at Bethpage in New York. "I personally would pay for the privilege to play on the Ryder Cup," McIlroy told BBC Sport. "The two purest forms of competition in our game right now are the Ryder Cup and the Olympics, and it's partly because of that, the purity of no money being involved."

  Europe won the 2023 Ryder Cup in Rome, where Cantlay's cap stance led to home fans removing their headwear as he approached in an attempt to taunt the American. It ultimately led to a spat between McIlroy and Cantlay's caddie Joe LaCava, who waved his cap close to the Northern Irishman as he lined up a putt after his player had holed a long effort on the 18th in a match against the four-time major champion and Matt Fitzpatrick. That episode spilled into angry scenes in the car park at Marco Simone afterwards, which McIlroy and captain Luke Donald said fired up Europe for Sunday's singles. "I don't think any of the 24 players on either team needs 400 grand," McIlroy said. "Every two years, there are 104 weeks and 103 weeks you can play golf and get paid." Europe, who have not won on American soil since 2012, will again be captained in 2025 by Donald.
