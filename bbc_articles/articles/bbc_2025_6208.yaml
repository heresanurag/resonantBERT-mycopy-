content: |-
  The force was called at about 20:40 BST on Thursday after a report of a fight in Plymouth.

  The force were called to an ongoing fight in Roman Way, Plymouth

  Police are appealing for information after an incident of violent disorder involving a number of people in Plymouth. Devon and Cornwall Police was called at about 20:40 BST on Thursday after a report of an ongoing fight in Roman Way, St Budeaux. Officers attended, but all parties had left the scene and no victim was located, the force said. A man in his 50s, from Plymouth, was later found at an address elsewhere in Plymouth and arrested on suspicion of affray.

  Police said there was no wider threat to the public, but officers would continue to carry out patrols in the area.
