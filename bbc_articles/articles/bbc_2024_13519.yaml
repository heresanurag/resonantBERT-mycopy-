title: 'Ian Maatsen: Aston Villa sign defender from Chelsea - BBC Sport'
date: '2024-06-28'
section: Premier League
url: http://www.bbc.co.uk/sport/football/articles/ceqd09exwqqo
content: |-
  Chelsea left-back Ian Maatsen becomes Aston Villa's second signing of the summer while the Blues are closing in on a deal for teenager Omari Kellyman.

  Maatsen made 16 appearances for Chelsea after signing in 2019

  Aston Villa have completed the signing of Chelsea left-back Ian Maatsen for £35m. Maatsen, 22, spent the second half of last season on loan at Borussia Dortmund and helped the Bundesliga club to reach the Champions League final. The defender is with the Netherlands at Euro 2024 as they prepare for a last-16 tie against Romania on Tuesday. He is Villa's second signing of the summer after striker Lewis Dobbin joined from Everton. Chelsea signed Maatsen in 2019 from PSV Eindhoven and he impressed during loan spells at Charlton Athletic, Coventry City, Burnley and Dortmund. He played a major role in helping Burnley win promotion to the Premier League in 2022-23, scoring four goals in 39 appearances as he was named in the Championship Team of the Season. Maatsen started the last campaign at Chelsea but struggled for regular minutes under Mauricio Pochettino, although he appeared in 15 games across all competitions. A six-month loan move to Dortmund was agreed in January after he penned a one-year contract extension that ran until June 2026 which included a release clause that was expected to lead to his departure this summer. During his time in Germany, Maatsen featured 23 times and scored three goals as Dortmund finished fifth in the Bundesliga and lost 2-0 against Real Madrid in the Champions League final. He leaves Stamford Bridge after making 16 appearances for the west London club.

  Also leaving Chelsea is Morocco winger Hakim Ziyech, who has completed a permanent transfer to Galatasaray. Ziyech, 31, joined the Blues from Ajax for £33.3m in 2020 and scored 14 goals in 107 appearances, winning the Champions League, Uefa Super Club and Fifa Club World Cup, He spent last season on loan at Galatasaray, winning the Turkish Super Lig, but has now moved on a free transfer.
