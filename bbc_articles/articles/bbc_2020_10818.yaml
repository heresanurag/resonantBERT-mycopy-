title: George Floyd murder suspect Derek Chauvin appears in court - BBC News
date: '2020-09-12'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-54126940
content: |-
  Former Minneapolis police officer Derek Chauvin is seen leaving court after a pre-trial hearing.

  The former Minneapolis police officer charged with murdering George Floyd has appeared in court for the first time.

  Derek Chauvin was filmed pressing his knee on Mr Floyd's neck for almost nine minutes before he died in May.

  Three other former officers are charged with abetting and aiding murder.
