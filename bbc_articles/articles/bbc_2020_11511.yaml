title: 'Covid circuit-breaker: Wales lockdown plan ''weighs heavily'' - BBC News'
date: '2020-10-18'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-54583892
content: |-
  Officials are "not blind" to impact a new lockdown would have on Wales, the health minister says.

  Welsh Government ministers are meeting again on Sunday to discuss a 'fire-break' national lockdown

  Officials are "not blind" to the impact another national lockdown would have on the economy, Wales' health minister has said.

  Vaughan Gething said the concern being voiced "weighs heavily" on ministers.

  A decision on a two or three-week "fire-break" lockdown is expected on Monday.

  However, Conservative leader in the Senedd Paul Davies said he would not support the measure "until I know what the details are".

  Mr Gething told BBC Politics Wales he recognised a circuit-breaker lockdown to slow the infection rates would have real impacts "in terms of people being able to pay their bills".

  "We're also not blind to the fact that doing nothing means that Covid will continue to grow and we will continue to see harm," he added.

  "We want to be able to get to the end of the year with a pattern that people can live with.

  "What we can't do though is give people a guarantee that things will not happen during the winter. That depends on all the choices that we make."

  The Welsh Government cabinet met on Sunday afternoon to continue its discussions, and agreed to meet again on Monday ahead of the expected announcement from First Minister Mark Drakeford.

  A Welsh Government spokesperson said: "Ministers have held a number of meetings over the weekend with senior Welsh Government officials, scientists and public health experts to consider their advice on a potential need for a 'fire break' set of measures to control the virus.

  "The Welsh cabinet met this evening to consider that advice. The cabinet will meet again tomorrow morning to make a final decision. The first minister will update the people of Wales on any decisions taken tomorrow."

  Seventeen areas in Wales currently have local lockdown rules in place

  Prior to the cabinet meeting, Mr Gething insisted no final decision had been taken on lockdown measures.

  It follows the publication of a letter on possible dates for a short, Wales-wide lockdown.

  It prompted calls from the Welsh Conservatives for an emergency recall of the Senedd on Monday.

  "They should come now to the Senedd tomorrow to make a statement to explain that (letter), and also to explain what their plans are, because it's unacceptable that they are actually briefing organisations and the media," said Mr Davies.

  "They should be making the decisions and making the announcements in the Senedd, that's the point we're making."

  The letter was sent to all Confederation of Passenger Transport members by the Welsh director

  In the letter to members of the Confederation of Passenger Transport, Wales director John Pockett said lockdown would start at 18:00 on 23 October and end on 9 November.

  But Mr Pockett has since told PA Media he was assuming what would happen.

  "The letter is genuine and it contains what I assume or surmised would be the position," he said.

  "It was me advising my bus operator members to be prepared for something and this is what it may well be.

  "It could be more - it could be anything. I think other associations have communicated with their members in the same way."

  The speculation over the possible lockdown has led to "frustration", said one of Wales' police and crime commissioners.

  Dyfed-Powys Police and Crime Commissioner Dafydd Llywelyn told BBC Radio Wales' Sunday Supplement: "We have had meetings last week in relation to the preparation for what may be happening in the future.

  "The reality, and I will be very open about this, the detail of that has not necessarily been shared in a huge amount with us and there is sometimes - and has been during the whole period - some frustration on the part of policing."

