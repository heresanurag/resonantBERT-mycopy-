title: '''Zero excitement'' on a predictable Super Tuesday - BBC News'
date: '2024-03-06'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68487166
content: |-
  The big primary day further consolidated Trump's lead over Haley, and was an unsurprising sweep for Biden.

  President Joe Biden and Donald Trump swept the state primaries held on Super Tuesday - making a presidential rematch between them even more likely. While Nikki Haley did manage to take the Vermont primary, Trump is the projected winner of at least 12 Republican contests, which further cement his strong overall lead over his rival.

  Neither Biden nor Haley made any appearances Tuesday night.
