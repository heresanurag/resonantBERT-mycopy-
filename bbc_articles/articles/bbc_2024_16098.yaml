  How 'Dracula' the ex-miner became the snooker world's best

  Ray Reardon was the first Welsh player to win the world title, with compatriots Terry Griffiths and Mark Williams subsequently lifting the trophy

  Ray Reardon, who has died aged 91, dominated the sport of snooker for the best part of a decade as he won six world titles between 1970 and 1978. The popular Welshman, who was nicknamed 'Dracula' because of his distinctive "widow's peak", external hairstyle, was soon a household name as the game became hugely popular on television. He won the first Pot Black series on the BBC in 1969, and was made an MBE in the 1985 Queen's Birthday honours. As well as outstanding potting ability and tactical nous, Reardon also benefited from fortunate timing. The introduction of colour television in the late 1960s allowed snooker to emerge from the smoky back rooms of clubs and into the living room, where it found a keen audience. And as the best player of the time, Reardon was ideally placed to take advantage of the sport's newly acquired profile.

  This video can not be played To play this video you need to enable JavaScript in your browser. Ray Reardon recalls how Pot Black - and the introduction of colour TV - boosted snooker

  Born in Tredegar, Reardon worked as a coal miner and a police officer while building a reputation in the amateur game before turning professional at the relatively late age of 34 in 1967. It was a major step to leave a secure job at a time when he did not own a home, but the gamble paid off handsomely as he quickly established himself as one of the most popular characters in the game. His rivalries with John Spencer and the flamboyant Alex 'Hurricane' Higgins made for some of the most compelling sporting contests on television at the time. His first world title came in 1970, when he beat John Pulman 39 frames to 34. There followed a gap until 1973, when he beat Australian Eddie Charlton in the final. That was the first of four consecutive titles, culminating in his victory over Higgins in 1976 - the last championship before the move to the Crucible Theatre in Sheffield. Reardon won the title again in 1978, and topped the world rankings until 1981, when the emergence of Steve Davis heralded a new era. He reached the World Championship final again in 1982, but lost to Higgins.

  John Spencer (left), Alex Higgins (third left) and Ray Reardon (far right) won 10 successive world titles between them, between 1969 and 1978; Eddie Charlton (second left) was twice a losing finalist

  Reardon retired from the professional game in 1991 at the age of 58. He was later hired by Ronnie O'Sullivan as a consultant and was credited with helping the unpredictable Londoner claim the world title in 2004. In 2016, the trophy awarded to the winner of the Welsh Open was named the Ray Reardon Trophy in his honour. In spite of the Dracula nickname, Reardon will be remembered for his ready wit and cheeky winks to the audience as much as the measured tactical play which made him the most consistent and successful player in the world for nearly a decade.
