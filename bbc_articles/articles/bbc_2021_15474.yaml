  Camilla, wearing an Archers badge, was joined by 102-year-old June Spencer who plays Peggy Woolley to cut an Archers-themed tractor cake.

  She told the cast and crew it was nice to put names to the faces, adding: "Now let us look forward to the next 70 years in Ambridge. Please don't let anything hinder your broadcasts."

  In 2011, Camilla's cameo, during a visit to BBC Birmingham, was part of a special episode to mark the 60th anniversary.

