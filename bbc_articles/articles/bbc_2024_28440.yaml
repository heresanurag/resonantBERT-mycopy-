title: 'Harshita Brella: Post-mortem shows death from strangulation - BBC News'
date: '2024-11-19'
section: Northamptonshire
url: http://www.bbc.co.uk/news/articles/cvg5zw812z0o
content: |-
  Police are hunting for the 24-year-old's husband after her body was found in a car boot.

  A woman whose body was found in a car boot died of strangulation, a post-mortem examination has found. Police believe Harshita Brella, 24, of Corby, Northamptonshire, was murdered by her husband Pankaj Lamba before he drove to Ilford, east London, and left her body in the car. Detectives think she was killed on the evening of 10 November, four days before her body was found. Prime suspect Mr Lamba, 23, is thought to have fled the country and his current whereabouts are unknown.

  Officers visited Ms Brella's home on Skegness Walk, Corby, on 13 November over concern for her welfare. When she could not be located, a missing person investigation was launched, leading to the discovery of her body in the boot of a car on Brisbane Road, Ilford. Since discovering Ms Brella's body, Northamptonshire Police has released new CCTV images as part of its investigation. They include photos of a silver Vauxhall Corsa, which they believe Mr Lamba used to drive her body to Ilford on the morning of 11 November.

  An international manhunt for Pankaj Lamba is ongoing

  Det Ch Insp Johnny Campbell, of the East Midlands Special Operations Major Crime Unit, said: "We suspect Harshita's body had been placed in the boot of the vehicle by Lamba before leaving Corby. "Lamba then abandoned the vehicle in Brisbane Road, Ilford, and made his getaway." A police spokesman confirmed Ms Brella had previously been the victim of domestic violence and was made subject of a Domestic Violence Protection Order (DVPO) at Northampton Magistrates' Court in September. Northamptonshire Police has referred itself to the Independent Office for Police Conduct (IOPC) because of previous contact with Ms Brella. Sonia Dabas, Ms Brella's sister, said the family "thought something was wrong" by 13 November after her phone was off for two days. A neighbour said she heard two blistering rows, involving one in which a woman "sounded scared", days before Ms Brella's body was found.

  Police have released a CCTV image of a silver Vauxhall Corsa, which they believe was driven by Pankaj Lamba

  In a BBC interview, Ms Brella's father, Satbir Brella, said: "I want my son-in-law to be brought to justice and I want my daughter's body brought home." Det Ch Insp Campbell added: "I would urge anyone who may have seen anything suspicious or had any sightings of Pankaj Lamba in Corby, Ilford or elsewhere in the days leading up to the discovery of Harshita’s body, to contact police as soon as possible. "Any information, no matter how small, may be relevant to the investigation and help us get justice for Harshita." An inquest into Ms Brella's death will be opened at 09:45 BST on Wednesday in Northampton.

