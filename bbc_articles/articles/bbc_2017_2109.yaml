id: bbc_2017_2109
title: MoD owes soldiers duty of care - father - BBC News
date: '2017-02-14'
section: General
url: http://www.bbc.co.uk/news/uk-38963634
content: |-
  One father on why the Ministry of Defence owes soldiers a duty of care, and should be held accountable in court when it fails.

  Soldiers and their families must be able to sue the Ministry of Defence for negligence in court, a father has told the BBC.

  The MoD says proposals to assess compensation claims in-house would see better payouts for service personnel injured or killed in combat.

  But Colin Redpath, whose son was killed in Iraq, says they should be held accountable by the legal system.
