title: Virginia home explodes as police respond to call - BBC News
date: '2023-12-05'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67629626
content: |-
  A huge explosion destroys at least one home in Arlington, Virginia as police carried out a search warrant.

  A huge explosion has destroyed at least one home in a suburb near Washington DC as police executed a search warrant.

  Officers were called to the home in Arlington, Virginia, on Monday after reports of someone firing a flare gun.

  When they tried to enter, there were shots fired then a big explosion.

  Officers on the scene reported only minor injuries while the suspect inside the home is unaccounted for.
