  Bringing you the latest updates and news as pupils begin to return to schools across England.

  'My son can only go to nursery for two hours a day'

  BBC Radio 5 Live has been putting questions from listeners to experts on this morning's Your Call programme. Sarah in Cardiff got in touch about the issue juggling work around reduced nursery hours - her three-year-old's nursery hours have been reduced to just two hours a day. "I'm able to work flexibly but his hours have been cut to 09:10 until 11:10, so that they can manage the amount of children going in, and if you work then that is nigh on impossible. “I have a lot of parents saying to me that they don't know how they're going to cope with it and wraparound care. They've got unsympathetic employers." Anne Longfield, England's children's commissioner, said: "School hours have never fitted with office hours and as school hours start being more flexible it makes it more difficult. "We may all think because schools are opening that it is going to be much easier now for parents to be able to work, but it isn't always going to be the case." "Employers really need to support their workers,” she added. Click here to listen back to the special Your Call programme on BBC Sounds.
