content: |-
  Nile Wilson and Max Whitlock shine as England secure gold in the men's gymnastics team final, with Scotland taking bronze.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Nile Wilson and Max Whitlock shone as England won gold in the men's Commonwealth Games gymnastics team final, with Scotland taking bronze. England finished with a total of 258 points, 10 marks clear of second-placed Canada. Scotland finished strongly to fight their way back into third - one place below where they finished four years ago in Glasgow. Wilson and English team-mate James Hall also reached the all-around final.

  England took the top three spots in the all-around standings in the team event, but only two competitors from each country can qualify for the individual final, meaning Dominick Cunningham misses out. Team-mate Whitlock was not in contention to make the all-around final as he only competed in the final two apparatus on Thursday, by which time England's retention of the title was already all but assured. "It was quite a different experience for me dropping to two pieces," said Whitlock. "It was difficult but it's something I've learned from this competition. The team did incredibly well and I'm really pleased with what we've done," he added. Hamish Carter, 19, finished in fifth place and will compete in the all-around final for Scotland alongside Frank Baines. Fellow Scot and Olympic bronze medallist Dan Purvis failed to land his vault and although he delivered a great floor performance, it was not enough to seal qualification for the all-around final. Scotland's Kelvin Cham injured his ankle landing at the end of his rings routine.

  Scotland's Dan Purvis, here competing on the rings on Thursday, won a bronze medal in the London 2012 Olympics
