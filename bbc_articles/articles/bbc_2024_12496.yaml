title: 'UK inflation rate calculator: How much are prices rising for you? - BBC News'
date: '2024-06-02'
section: Business
url: http://www.bbc.co.uk/news/business-62558817
content: |-
  Use our calculator to find out how much the cost of living is going up in your household.

  Every month there's a new figure for inflation - it estimates how much prices are rising across all the goods and services in the economy.

  In the 12 months to June 2024, the figure was 2.0%. That means things costing £1 in June 2023 cost £1.02 the same time the following year.

  Our personal inflation calculator, built by the Office for National Statistics (ONS) in collaboration with the BBC, shows you what the inflation rate is for your household, and identifies the items in your household budget that have gone up the most in price over the past year.

  Note: in the calculator, the ONS compares your personal inflation rate with CPIH, a measure of inflation that includes housing costs for those who own their home, rather than the more widely-reported measure called CPI. In June 2024 this was 2.8%.
