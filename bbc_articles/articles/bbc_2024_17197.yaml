  Glamorgan fall short in record chase of 593 in tie

  Gloucestershire and Glamorgan played out an epic last-ball tie as Glamorgan came within one run of setting a new world-record chase of 593. Wicketkeeper James Bracey took a stunning catch to dismiss Glamorgan’s last man Jamie McIlroy as Glamorgan were left 592 all out. Sam Northeast made a marathon 187 and Marnus Labuschagne hit 119 to take Glamorgan close to victory in the County Championship Division Two match. But with two needed off the final over, Gloucestershire seamer Ajeet Singh Dale only conceded a single and then removed McIlroy with the last ball. It means West Zone's 541-7 in India's domestic league in 2010 is still the highest winning total in first-class cricket. Middlesex hold the record for the biggest chase in the County Championship - scoring 502-6 to beat Nottinghamshire in 1925, while Surrey scored 501-5 to overcome Kent last season. In this game at Cheltenham, both sides looked favourites to win at times in a dramatic last session. The huge second-innings scores came after both sides were bowled out for under 200 first time around. Starting the day on 222-3, Labuschagne and Northeast took their stand to 153 as Labuschagne notched up his second century in his fourth and probably final Championship match of the season. Beau Webster’s spell of seam caused the batters problems and the giant Tasmanian struck in unusual fashion as Labuschagne was caught at backward square leg for 119 to provide the only morning wicket. Chris Cooke, another man capable of a long innings, lasted 50 minutes for a watchful 14 before edging a fine ball from Matt Taylor as Bracey claimed the catch. But Dan Douthwaite (39) played a sensible support role in a century stand with Northeast before blasting Ollie Price to cover just before tea as the home side seized back the initiative.

  Glamorgan needed 140 with just four wickets standing going into the last session in the gloom. Timm van der Gugten chipped in a valuable 31 before being caught behind off Singh Dale, before Gloucestershire finally removed Northeast driving at Taylor to give Bracey his ninth victim of the game. He had faced 277 balls and struck 22 fours in a magnificent display of skill and concentration, but his dismissal left the Shire on top. Marchant de Lange removed Andy Gorvin for seven with 43 balls left, leaving Crane to farm the strike and protect number 11 McIlroy. Webster thought he had McIlroy caught behind with three overs to spare, but umpire Naeem Ashraf turned down the impassioned appeals. As Glamorgan looked set to settle for a draw, Crane hit three successive fours in the 150th over. McIlroy glanced a four in the penultimate over leaving two needed off Singh Dale’s last over, but Crane turned down an early single before taking one off the fifth ball. McIlroy edged the last delivery for a soaring Bracey to take a county record-equalling 10th catch of the game, prompting delirious celebrations from his team-mates. Glamorgan’s score was the highest ever fourth-innings score in the Championship, while Bracey’s 10 catches equalled the Gloucestershire county record for a first-class match.

  “I’m extremely disappointed to be honest, we should probably have won the game, though as it settles in we’ll probably see it as eight points gained going into the last ball rather than eight lost. “We’ll look at it as a positive and there’s still a long way to go in the campaign so we’re gunning for the top two spots. “(After the first innings) you wouldn’t have seen it going to the last ball with a chase close to 600, so it’s pretty remarkable on all counts. “Sam and Marnus played brilliant innings, three of our guys got hundreds so there’s a lot to be said for the quality of the batting but our bowlers worked tirelessly. You’d probably say eight points each is very fair.” “The boys are pretty down after getting so close, but what an extraordinary game of cricket, it’s special to be a part of it and a good advert for the county championship. “There were so many unbelievable performances throughout the week, it’s come down to the last over and a great battle though it’s a shame we couldn’t come away with the win. Everyone’s just emotionally exhausted. “It’s up there (among important innings for me), but Mason played phenomenal at the end, so calm under pressure to get us close, and Marnus showed his class as well, Timm bowled brilliantly in the first innings. “We’d gone so far trying to chase it down that we had to go for it nine wickets down, and it was nearly an incredible win.”
