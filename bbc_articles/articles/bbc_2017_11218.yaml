title: 'Zimbabwe: Dancing breaks out as Mugabe resigns - BBC News'
date: '2017-11-21'
section: General
url: http://www.bbc.co.uk/news/world-africa-42072197
content: |-
  There were scenes of celebration on the streets of the capital, Harare.

  President Robert Mugabe has resigned after a 37-year rule as his party prepared to impeach him.
