  The tariffs would come as a major blow to China's manufacturers, for whom the US is a key market for exports. China's top exports to the US include electrical products and other machinery, computers, furniture, toys, vehicles and equipment. The US's top exports to China are oilseeds and grains, as well aircraft, machinery and pharmaceuticals. Uncertainty around the tariffs led to a turbulent day on global stock markets. Markets worldwide have plunged since Trump announced the global tariffs. The value of US stock markets dropped sharply again on opening on Monday, although they later pared those losses, while Europe's biggest markets, including London's FTSE 100, closed more than 4% down. Asian share indexes had nosedived on Monday, with Hong Kong's Hang Seng index falling by more than 13%, its biggest one-day fall since 1997. However, most major markets made gains on Tuesday with some notable exceptions. The key index in mainland China was broadly flat on Tuesday morning but there were more losses in Taiwan and Singapore. After being closed for national holidays, Thailand and Indonesia also saw stocks fall by more than 4% and 9% respectively.

  A cargo ship at the Qianwan Container Terminal in Qingdao, China

  Trump's post on Monday also indicated that negotiations on countries' tariff rates would "begin taking place immediately". Trump met Benjamin Netanyahu, Israel's prime minister, on Monday in the White House. Netanyahu said that his country would eliminate the trade imbalance with the US, which he said was the "right thing to do". "We intend to do it very quickly... and we're going to also eliminate trade barriers." The US president also posted earlier, external that Japan was sending a negotiation team to discuss tariffs. And Ursula von der Leyen, the president of the European Commission, offered Trump a "zero-for-zero tariff" deal - although she previously said that she had not ruled out retaliation. "We are also prepared to respond through countermeasures and defend our interests," she said. Trump said later that the EU had been formed "to really do damage to the United States and trade".
