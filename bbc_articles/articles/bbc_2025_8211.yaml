title: Donald Trump threatens new 50% tariffs on China - BBC News
date: '2025-04-08'
section: World
url: http://www.bbc.co.uk/news/articles/c8rgkkl7v8lo
content: |-
  The US president warns of the extra tax unless China withdraws its own 34% counter-tariff on US goods.

  Donald Trump has threatened China with an extra 50% tariff on goods imported into the US if it does not withdraw its 34% counter-tariff, as global markets continue to fall. Beijing retaliated on Sunday, following last week's decision by Trump to slap a 34% tax on Chinese imports as part of his "Liberation Day" that set a minimum 10% levy on nearly all of America's trading partners. In a social media post on Monday, Trump gave China until Tuesday to scrap its countermeasure or face the 50% tax. China's commerce ministry labelled the additional levy as "a mistake on top of a mistake" saying it will never accept the "blackmail nature" of the US.

  If Trump acts on his threat, US companies could face a total rate of 104% on Chinese imports- as it comes on top of 20% tariffs already put in place in March and the 34% announced last week. There are fears that this could deepen a trade war between the world's two biggest economies and global rivals.

  In his post on Truth Social, Trump also warned that "all talks with China concerning their requested meetings with us [on tariffs] will be terminated!" Also on Monday, the US president said he was not considering a pause on the global import tariffs to allow for negotiations with other countries. "We're not looking at that. We have many, many countries that are coming to negotiate deals with us, and there are going to be fair deals," he said. Trump said China had introduced its countermeasure "despite my warning that any country that Retaliates against the U.S. by issuing additional Tariffs... will be immediately met with new and substantially higher Tariffs". Beijing shot back, saying that "pressuring or threatening China is not a right way to engage". "The US hegemonic move in the name of 'reciprocity' serves its selfish interests at the expense of other countries' legitimate interests and puts 'America first' over international rules," Chinese embassy spokesman Liu Pengyu said in a statement. "This is a typical move of unilateralism, protectionism and economic bullying." Speaking from the White House, the US president said there could be both permanent tariffs and negotiations. "We have $36tn (£28tn) debt for a reason," he said, adding that the US would be talking to China among other countries to make a "fair deal and a good deal". "It's now America first," Trump said.

