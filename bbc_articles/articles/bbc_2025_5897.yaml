content: |-
  The sentencing judge says Kyle Shaw made a "menacing threat" against Shirley Ballas and her family.

  Man who stalked Shirley Ballas for six years sentenced

  A stalker who believed Strictly Come Dancing judge Shirley Ballas was his aunt has been given a suspended prison sentence. Kyle Shaw's "persistent campaign" saw him send abusive messages and a "menacing" threat to Miss Ballas as well as her friends and colleagues. Liverpool Crown Court heard the 37-year-old thought Miss Ballas's late brother, David Rich, was his father. Shaw, who admitted stalking the 64-year-old dancer, causing her serious harm or distress between 31 August 2017 and 29 November 2023, was sentenced to 20 months, suspended for 20 months.

  Passing sentence, Judge Gary Woodhall said: "This was a menacing threat against her and her family." Shaw, from Whetstone Lane in Birkenhead, was also made the subject of a restraining order for life. It means he will never be allowed to contact either Miss Ballas or her niece, mother or former partner. Nicola Daley, prosecuting, said: "He believed, and it's evident from what he was told by his mother, that her late brother was his father." The court heard that while there was no evidence his belief was incorrect, there was only "limited evidence" it was correct.

  Shirley Ballas moved her mother, who is now 86, from Merseyside to London because of Shaw's actions

  Ms Daley said that, in his messages, Shaw had accused Miss Ballas of being responsible for the death of her 44-year-old brother, who took his own life in 2003. The court heard Shaw also set up social media accounts in her brother's name. The prosecution said Shaw approached Miss Ballas's mother, 86-year-old Audrey Rich, when shopping in Wirral in 2019. Shaw told Ms Rich she was his grandmother and continued to follow her around the shop when she did not want to speak to him, the court heard. This incident resulted in Miss Ballas moving her mother from Merseyside to London. The court also heard Shaw posted messages on Twitter, now X, which included an image of the BBC One star's home address along with a message which said: "You ruined my life, I'll ruin yours and everyone's around you." As a result of Shaw's actions, Ms Daley said Miss Ballas became reluctant to socialise with colleagues and stopped using public transport. The prosecutor added: "She described having sleepless nights worrying about herself and her family's safety and being particularly distressed when suggestions were made to her that she and her mother were responsible for her brother taking his own life."

  Shirley Ballas has been head judge on the BBC show since 2017

  The court was told in October 2020 Ballas contacted police after he messaged her and said: "Do you want me to kill myself, Shirley?" The court also heard Shaw sent messages to Miss Ballas's niece Mary Assall, work colleagues from Loose Women and Strictly Come Dancing as well as her former partner Daniel Taylor. He called him in November 2023 and in an "implied threat" told him he knew where they lived and described what he knew about the TV star's movements, the court was told. And when the Strictly judge had book signings planned in Wirral, Shaw messaged her saying: "I can't wait to meet you for the first time Aunty Shirley. Hopefully I can get an autograph." Sentencing Shaw, the judge said: "Since 2017 you have engaged in persistent, unwanted online contact with Shirley Ballas and her family. You did so because your mother told you Shirley Ballas's late brother was your biological father. "I'm satisfied your motive for this offending was a desire to seek contact with people you genuinely believed were your family. "Whether in fact there's any truth in that belief is difficult, if not impossible, to determine." He added: "This was not an offence driven out of delusional beliefs, physical attraction or simply an obsession with a celebrity."

  John Weate, defending, said Shaw had suffered complex mental health issues since childhood and in his mid-to-late teens was told by his mother that David Rich was his father. Mr Weate said: "He now accepts that Miss Ballas and her family don't wish to have any contact with him and, importantly, he volunteered the information that he has no intention of contacting them again." He said Shaw's use of cannabis had "not helped him". Shaw was ordered to do 20 days of rehabilitation activity and undertake a 12-month drug rehabilitation requirement.

  Natassia McAdam, of the Crown Prosecution Service, said: "Kyle Shaw's attempts to contact (her) were clearly stalking. "They were persistent and became abusive and caused anxiety and distress over a prolonged period of time. "His behaviour became increasingly erratic, and she feared he would become violent. He knew what he was doing would cause her alarm and distress." Miss Ballas, originally from Wallasey, Wirral, has been head judge on the BBC show since 2017. By the age of 21, she had won several international competitions, including the World Latin American Championships. She retired from competitive dancing in 1996.

