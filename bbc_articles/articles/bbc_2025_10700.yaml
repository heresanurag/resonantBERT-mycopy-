title: No 10 resists Labour calls for winter fuel rethink - BBC News
date: '2025-05-06'
section: Politics
url: http://www.bbc.co.uk/news/articles/cy0xee5krnno
content: |-
  Calls to abandon cuts to the pensions top-up have grown in the wake of local election losses last week.

  The government has insisted it will not reverse cuts to winter fuel payments, despite growing calls within Labour ranks for a rethink on the policy. Calls within the party for the cuts to be abandoned have grown louder in the wake of losses at last week's local elections in England. But Sir Keir Starmer's spokesman told reporters there "will not be a change to the government's policy". He insisted last year's move to restrict eligibility for the annual payments was required to "ensure economic stability and repair the public finances". It comes after the Guardian reported ministers were considering softening the effect of the cuts later this year.

  Speaking to the BBC earlier, Health Secretary Wes Streeting insisted the winter fuel policy was not being formally reviewed. But he added ministers were "reflecting on what the voters told us" at last week's elections, where Labour lost around two-thirds of the council seats it was defending. Streeting acknowledged many voters "aren't happy" with the cuts. Labour Welsh First Minister Baroness Eluned Morgan called on the UK government to "rethink" the policy in a speech on Tuesday, adding it "comes up time and again" with voters.

  The winter fuel payment is a lump-sum amount of £200 a year for pensioners under 80, increasing to £300 for over-80s, paid in November or December. Last year, the government restricted the payments to those who qualify for pension credit and other income-related benefits, in a bid save £1.4bn. The move, which did not feature in Labour's general election manifesto, means around 9 million pensioners will no longer qualify for the top-up. It has been seen as a key issue at last week's local elections, at which Labour lost 187 council seats and control of the only council it was defending.

  The Guardian has reported, external ministers are considering raising the effective £11,500 earnings threshold to continue qualifying for the payment. Some Labour MPs believe reversing the policy would provide the prime minister with a clear way to show the public he "gets it" - as he said said last week after the local election results came in. But others closer to government thinking question whether there would be any political benefit to changing course at this stage, believing the political damage has already been done. Former cabinet minister Louise Haigh, who resigned last year, has hit out at the winter fuel cuts, adding that they had become a "totemic" issue for many voters. Writing in the Sunday Times over the weekend, she argued that winter fuel and proposed benefits cuts were "primary examples offered as to why the Labour government simply did not look like it understood their priorities". The move has also been opposed by unions and the main opposition parties.

