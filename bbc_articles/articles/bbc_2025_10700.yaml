  Speaking to the BBC earlier, Streeting said he would not be "pretending that winter fuel didn't come up on the doorstep, of course it did". "I know that people aren't happy about the winter fuel allowance in lots of cases," he said. "We did protect it for the poorest pensioners, but there are a lot of people saying they disagree with it regardless." However, he also defended the move as part of a wider package of changes, that would provide the "means of raising the investment" in public services. "Unfortunately when you look across the board at the breadth and depth of the multiple crises that we've inherited, in order to deliver the change that people voted for we have had to do heavy lifting at the Budget," he added. But Liberal Democrat Treasury spokeswoman Daisy Cooper said the government's decision to rule out a change was a "tone deaf response" to last week's polls.

  The winter fuel payment was introduced in 1997 by New Labour as a universal payment for all pensioners. It was billed as a way to guarantee they would be able to pay for increased heating costs over the winter - although in practice it is a pension top-up, which recipients can spend on whatever they want. From 2010 onwards, the state pension gained additional protection under the "triple lock" policy - under which pensions go up each year by the highest of inflation, average earnings or 2.5%. Last year the state pension went up by 8.5%, an annual rise of £691.60 for those on the full basic state pension or £902.20 for those on the full new state pension. This year state pensions are going up by 4.1% - a rise of £363 a year for those on the basic pension or £472 for those on the new pension.

