title: Deadly Dubai floods made worse by climate change - BBC News
date: '2024-04-25'
section: Science & Environment
url: http://www.bbc.co.uk/news/science-environment-68897443
content: |-
  But it rains so rarely in the region that scientists do not have enough data to be fully sure.

