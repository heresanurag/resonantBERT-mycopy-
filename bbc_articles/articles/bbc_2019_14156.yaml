  'One day you're the best, the next a team knocks you off'

  England head coach Eddie Jones speaking to BBC Radio 5 Live: "We just couldn't get on the front foot. We were dominated in the scrum particularly in the first 50 minutes. When you're in a tight, penalty-driven game, it's difficult to get any sort of advantage.

  "We needed to fix up the scrum, little things around the line-out, then get a bit more accurate in how we attacked. We did that for a while, got ourselves back into the game, but in the end we had to force the game and gave away a couple of tries.

  "They were too good for us at the breakdown today. That's the great thing about rugby, one day you're the best team in the world and the next a team knocks you off."

  South Africa coach Rassie Erasmus: "It's weird, I didn't think two years ago we could realistically do it, but six months ago began to and four weeks ago I really did. I am so proud of the players and my country. We stand together, we really believed it and I am proud to be South African.

  "The country have gone through some bad times, and we have over the last two years but our challenge is to make South African rugby strong for the next six or seven years.

  "I will make this my mission to make this a springboard to take it the right way."

  The stats - Springboks score first tries in a final
  • None South Africa have lifted the Webb Ellis Cup on three occasions, no side has won the Rugby World Cup more often (level with New Zealand).
  • None South Africa are the only side to have a 100% win rate in World Cup finals, winning on each of their three appearances at this stage.
  • None South Africa's 20-point victory is the joint second biggest in a final, after Australia's 23-point win against France in 1999. New Zealand also won by 20 points in 1987.
  • None The Springboks scored two tries against England, the first time they'd ever crossed for a try in a final, they are yet to concede a try at this stage.
  • None England have lost the Rugby World Cup final on three occasions, no side has lost at this stage more often (level with France).
  • None Owen Farrell scored 12 points in this match, taking him past 100 points in the Rugby World Cup, the second player to reach that milestone for England in the tournament after Jonny Wilkinson (277).
  • None Billy Vunipola made 19 carries against South Africa, the most in the match and the most by any player in a World Cup final, surpassing Israel Folau's tally of 16 in 2015.
  • None Maro Itoje made 16 tackles against South Africa, the joint second most in a final behind Richie McCaw (18 in 2011) and level with Jonny Wilkinson (16 in 2003).
  • None Makazole Mapimpi scored his 14th try in 14 Tests for South Africa, including six tries in six games at this year's World Cup.
