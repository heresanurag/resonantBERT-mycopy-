  All the latest news and reaction to an inquest into the deaths of 10 people in west Belfast in 1971.

  Soldier who tried to help attack 'hit with the butt of a rifle'

  Janet Donnelly, the daughter of Joseph Murphy, tells the press conference that for 50 years her family have lived with the knowledge that her father was “an innocent civilian murdered by British paratroopers”. Ms Donnelly says that when her family requested the original inquest papers “there were missing documents, no forensic report, no post-mortem photographs”. She says after her father was shot in the right thigh he was taken to the Henry Taggart Memorial Hall where he was beaten and “shot again into his open wound”. She says a soldier who tried to help her father while he was there was “hit with the butt of a rifle”. She thanks the soldier for his courage, along with witnesses “who have lived through this harrowing inquest”.
