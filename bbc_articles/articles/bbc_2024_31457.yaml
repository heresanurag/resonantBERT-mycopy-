title: Zoe Ball says presenting Radio 2 breakfast show has been 'absolute privilege'
  - BBC News
date: '2024-12-20'
section: Culture
url: http://www.bbc.co.uk/news/articles/c70e8rn1np5o
content: |-
  Ball says it's time "to step away from the very early mornings and focus on family" after six years.

  This video can not be played To play this video you need to enable JavaScript in your browser. Zoe Ball gets tearful after a surprise message from her son on her last Radio 2 Breakfast show.

  Zoe Ball has described presenting Radio 2's breakfast show as "an absolute privilege", as she signed off from her final programme. The 54-year-old announced her departure in November, saying that after "six incredible years" it was "time to step away from the very early mornings and focus on family". In her closing comments on Friday, Ball thanked everyone who had worked on the show since 2019, whom she said she was going to miss "mighty amounts". "It's been such a gift to do this show... pretty cool to be the first lass to host, and I won't be the last - remember girls, you can do anything," she said.

  "To the biggest stars of our breakfast show, the listeners, young and old, and those in the middle, thank you for tuning in, whether as a lone listener, a family, a work gang, on your morning jogs, dog walks, truck drives, train commutes, or hiding in bed, it's been a real privilege to keep you company through your morning maneuvers. "You're just there, and I'm just here, having a chat with a mate, it's such a special, intimate relationship, that is never lost on me. "We've been through life's little highs and lows, and I really do hope we've managed to bring some sunshine and light when you've most needed it, a daft distraction from the harder stuff. "I've been bowled over by your messages, texts, emails, cards and letters throughout the years. Thank you for sharing your stories with me." Ball said she would be back on air on Radio 2 in the spring, but details of her next show have not yet been announced. "As the song says, you give a little love, and it all comes back to you. Well, I have most definitely felt that love from you listeners. I feel very lucky to have been here. I send buckets of love to you and your dear ones this Christmas. "Take care of yourself, lovely peeps, my top cats," she concluded, before closing with Keeping The Dream Alive by Münchener Freiheit.

  Kylie Minogue and David Tennant were among the stars who paid tribute to Ball throughout the show. In a pre-recorded message, singer Minogue said: "Thank you for an incredible six years. The nation loves you and I love you, and every time I've been in to see you, it's been so much fun. "We've danced around the studio, you, me and your fabulous prod[ucing] squad, shout out to them... it has all happened with you Zoe." Minogue concluded: "Zoe I wish you all the love success and joy and everything you want moving on... we love you." Ball's on-air colleagues Mike Williams, Richie Anderson and Tina Daheley also paid tribute to her. Other Radio 2 personalities including Jeremy Vine, Dermot O'Leary, Sara Cox, Jo Whiley, Vernon Kay, Rylan Clark and Trevor Nelson also sent well wishes. When she opened the programme on Friday, Ball delivered a few adapted lines of One Day More from the musical Les Miserables. "Another day, another destiny, one final show from me, ZB - only joking I'm not going to sing, let's have some Daft Punk," she said. She then played the French electronic duo's One More Time, followed by a message she read out from a man who said he was driving home for Christmas early so he could listen to her last show. Doctor Who star David Tennant was among the other stars paying tribute in a series of voice messages. "You've been so amazing over the last six years, the country is going to miss you," the actor said. "[You're] the best person to have breakfast with. Thank you for letting me come on to your show multiple times and annoy you." Speaking on Pause for Thought, Reverend Kate Bottley told Ball: "It's time for you to leave this particular party, and it's going to take a bit of adjusting for everyone. "But we know you, you'll just keep sparkling and lighting up the room somewhere else... Thank you for keeping this particular party going, particularly on those days when you didn't feel like dancing." During the programme, Ball paid tribute herself to former Radio 2 presenter Steve Wright, who died in February. "We miss you, darling man, but your magic is always with us, thank you so much for being an amazing broadcaster and a friend to all of our broadcasters," she said.

  She will be replaced by Radio 2 afternoon show host Scott Mills

  Ball will be replaced by Scott Mills, who will move from his afternoon slot in January. Mills was among the Radio 2 DJs who sent messages in for Ball's final programme. "You're our friend, a friend to all of us, and in the last few years in particular, an arm round the shoulder when we really needed it," he said. "And you also make it seem really easy, so no pressure!" As well as tributes, Ball's final programme featured children calling in to speak to Santa Claus, who is in the studio with her. Last month, Ball revealed that she'd had treatment for a jaw condition called TMJ disorder, which she said gives her "awful headaches" when she wakes up. Ball became the station's first full-time female breakfast presenter when she took over from Chris Evans in 2019. She took a six-week break from the show over the summer, after a previous break in the spring following the death of her mother. Announcing her departure last month, she said she would stay "in the Radio 2 crew", promising further details in the New Year about what that would involve. She promised that her final show would take place "just in time for Christmas with plenty of fun and shenanigans".

  Earlier this week on her show, Ball held back tears as Robbie Williams surprised her with a heartfelt message. "I just want to say thank you for your services so far to the entertainment world, to BBC Radio 2, to all that have gone before you and who will come after you," Williams said. "But for you in particular, the transformative thing you do and the kindness you exude is important, and has been important and will be important to people's lives, so congrats to you." The teary-eyed DJ responded: "Robbie, I love you to bits."

  Ball also became the first female host of the Radio 1 breakfast show in 1998, after having co-presented the Saturday morning children's TV programme Live & Kicking. Ball's Radio 2 programme is the most listened to breakfast show in the UK. But her audience dipped from nine million when she started to 6.28 million this summer, according to industry figures from Rajar. She was listed as the BBC's highest-paid on-air female presenter for the 2023/24 period - with a salary between £950,000 and £954,999 - and second overall behind outgoing Match of the Day host Gary Lineker.
