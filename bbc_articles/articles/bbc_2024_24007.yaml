title: Asteroid caught on camera soaring above English Channel - BBC News
date: '2024-09-05'
section: General
url: http://www.bbc.co.uk/news/uk-64621115
content: |-
  The asteroid was also seen in the sky above northern France.

  An asteroid lit up the sky as it streaked above the English Channel at around 03:00 GMT on Monday.

  The spectacle was caught on camera by enthusiasts who made sure they were awake to capture the moment. It could also be seen in the skies above northern France.
