title: 'June Fox-Roberts: Report criticises killer Luke Deeley''s care - BBC News'
date: '2024-10-07'
section: Wales
url: http://www.bbc.co.uk/news/articles/ced0x9x922yo
content: |-
  Luke Deeley was sentenced to an indefinite hospital order for killing June Fox-Roberts.

  Care failings before woman dismembered in her home

  June Fox-Roberts was described by her family as a "force of nature"

  Multiple failings have been identified in the case of a woman who was killed and dismembered in her own home. Luke Deeley, 26, walked into June Fox-Roberts' home in Pontypridd, Rhondda Cynon Taf, and killed her in November 2021. Family of Ms Fox-Roberts, 65, believe her death could have been avoided. A safeguarding review concluded that opportunities had been missed and made a number of recommendations, while Cwm Taf Morgannwg health board apologised and accepted the recommendations.

  Ms Fox-Roberts’ body was discovered on 21 November by her daughter Abi Sheppard and a family friend, who had become concerned after being unable to contact her. Deeley, who had earlier been diagnosed with psychosis, had been living rough in Llantwit Fardre and Church Village, got into the house on St Anne’s Drive through an unlocked door in the early hours. At his subsequent sentencing, the court was told he had been diagnosed with paranoid schizophrenia. Due to his illness the Crown accepted his plea of manslaughter by reason of diminished responsibility.

  It is thought Ms Fox-Roberts came downstairs and was attacked by Deeley in the hallway. She suffered head injuries before being dragged into the dining room where she was placed on a tarpaulin, decapitated and dismembered using an axe. Deeley, then 25 and an art student, was arrested two days later after being spotted on CCTV living rough at a nearby tyre depot.

