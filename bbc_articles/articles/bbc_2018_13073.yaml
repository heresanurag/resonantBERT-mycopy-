id: bbc_2018_13073
title: Broadcasting icon Richard Baker dies at 93 - BBC News
date: '2018-11-17'
section: General
url: http://www.bbc.co.uk/news/uk-46247500
content: |-
  He introduced the first news bulletin broadcast on BBC TV.

  The son of a plasterer, London-born Baker introduced the BBC's first TV news bulletin broadcast in July 1954.

  He went on to front the Last Night of the Proms and present on Radio 2 and 4.
