title: 'Victoria Taylor: Missing Malton woman may have gone into river - BBC News'
date: '2024-10-09'
section: England
url: http://www.bbc.co.uk/news/articles/cm28500gg2vo
content: |-
  Victoria Taylor, 34, was last seen in Malton, North Yorkshire, nine days ago, with searches continuing.

  Missing woman may have gone into river - police

  Victoria Taylor's family say they have been left "distraught" by her disappearance

  There is a "significant possibility" missing woman Victoria Taylor went into the River Derwent, according to police searching for her. Ms Taylor, 34, went missing nine days ago from her home in Norton, Malton, with search operations launched by emergency services and volunteers. CCTV footage showed her heading towards a riverside playground on 30 September, North Yorkshire Police said, with items belonging to her found at the location. Ch Supt Fiona Willey told a press conference: "Based on the discovery of Victoria’s belongings so close to the water’s edge, we must accept the significant possibility that Victoria has entered the River Derwent."

  Posters asking people to keep looking for Ms Taylor have been placed around the area

  During the briefing on Wednesday afternoon, Ch Supt Willey said no indication of any third-party involvement in care home nurse Ms Taylor's disappearance had been established. "As with any investigation, we are very open-minded and will continue to explore all lines of inquiry," she said.

  Specialist equipment has been brought in to support the police search

  Teams are conducting searches both above and below the water's surface for the mum, who has a young child, with experts using specialist sonar equipment. “This search is slow and complex and the team are working methodically in very difficult conditions. “The use of these specialist resources will continue in the coming days and we are very much supported in this work on a national level by police and advisers,” she added.

  The media gathered near the River Derwent, where Ms Taylor was last seen

  The rain stopped in time for the briefing this afternoon, but it’s obvious that search conditions remain very difficult here. The river is right in front of us and it’s swollen and fast-flowing, but this huge operation continues with police using specialist sonar equipment and underwater cameras to search below the surface. It’s hard to imagine how Victoria’s friends and family are coping after nine days of this. We heard today that they were suffering an “unimaginable level of distress” and that specialist officers were supporting them.

  A CCTV image showing Ms Taylor, who is originally from Huddersfield in West Yorkshire, was snapped at Malton Bus Station at 11:53 BST on the day she vanished. In the image she was wearing a camouflage green cap, as well light blue jeans and white trainers. She was also carrying a rucksack. Before then, she was captured on camera at 11:35 BST at a BP garage on Welham Road in the Norton area of the town.

  Ms Taylor was seen on CCTV at Malton Bus Station at 11:53 BST on Monday 30 September

  Ms Taylor’s family had been caused “unnecessary anguish” following a “small amount of misinformation and speculation” on social media, the officer told the media at the briefing on the riverbank. The family had made it clear that it would only want to work with North Yorkshire Police, Ch Supt Willey added. Anyone with information can contact North Yorkshire Police. Listen to highlights from North Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
