title: 'Jonas vs Price: Caroline Dubois retains WBC lightweight title with majority
  decision win over Bo Mi Re Shin - BBC Sport'
date: '2025-03-07'
section: Boxing
url: http://www.bbc.co.uk/sport/boxing/articles/crlx53kzx79o
content: |-
  Britain's Caroline Dubois is taken the distance by Bo Mi Re Shin but claims victory by majority decision to retain her WBC lightweight title at the Royal Albert Hall.

  Caroline Dubois (right) has won five of her 12 fights by knockout

  Britain's Caroline Dubois was taken the distance by Bo Mi Re Shin but claimed victory by majority decision to retain her WBC lightweight title at the Royal Albert Hall. Dubois, 24, showed great shot selection and neat footwork to come through her second defence of the belt on the all-female card to mark International Women's Day on Saturday. The scorecards read 98-93 98-92 to Dubois, with one judge seeing it as a 95-95 draw. "It was very rough and tough. Watching her fights previously with the team, that's what she does. Charges in, head down and swings. She did exactly what I expected," Dubois told Sky Sports. "I feel like I need to learn how to fight on the inside. It's one thing doing it in sparring, but it's another thing doing it in the ring. The crowd, the lights, the judges, it's important to master that. I tried to do it, I don't know if I was successful but I tried." Dubois was upgraded to world champion after Katie Taylor vacated her belt. Her first defence, against Jessica Camara in January, ended in a technical draw after a clash of heads. The Englishwoman is undefeated in 12 professional fights and has expressed a desire to be "undisputed champion by the end of the year".

  Underdog Shin was on a three-fight winning streak since losing a close decision to former world champion Delfine Persoon in May 2023. The contest was chief support to the welterweight unification world-title fight between Natasha Jonas and Lauren Price, which takes place later on Friday. Shin looked game in the opening round, landing a left hook as Dubois attacked the body, but the champion proved far too slick and sent the challenger stumbling across the ring with a right hook of her own. Dubois invested in shots to the body early and showed great agility to create angles before resetting and coming again. Shin was rocked twice in the fourth, initially by a three-punch combination before a Dubois right hook drew a reaction on the bell. Trainer Shane McGuigan urged Dubois to take her time before round six and she responded by picking her shots more carefully. South Korean Shin, who has not lost inside the distance in 23 previous fights, showed durability - even if she was unable to match the output of her opponent. Dubois was stung with a straight right in the ninth and looked reckless in the final round as both fighters let their hands fly for a highly entertaining two minutes. An all-British affair with WBO lightweight champion Terri Harper, who faces Natalie Zimmerman on 23 May, could be on the agenda for Dubois next, while Beatriz Ferreira holds the IBF belt and Stephanie Han is the WBA champion.

  Karriss Artingstall has won six of her seven professional bouts on points

  Karriss Artingstall made easy work of Raven Chapman, winning by unanimous decision to become the inaugural women's British featherweight champion. Artingstall landed a straight left in round two to send Chapman down to the canvas and fought smartly at range with her jab throughout. Chapman's corner stressed that she needed to "empty the tank" when sending her out for the final round, but the Norfolk fighter was unable to close the distance and land clean. It is a second successive defeat for Chapman after falling short against WBC featherweight champion Skye Nicolson in October. Artingstall, who beat Nicolson on her way to winning a bronze medal at the Tokyo 2020 Olympics, has won all seven fights since turning professional. The 30-year-old is targeting a world title fight later this year with Nicolson and IBF champion Nina Meinke in her sights. "I'd love to go back and speak to my team to see what they think is next," Artingstall told Sky Sports. "I believe Nina Meinke has got a world title. I believe if I can get that off her then it makes for a perfect fight against Skye Nicolson. I'd love to get that fight at the end of the year. "I think if I get a world title off Meinke, why shouldn't that happen? It would be a cracking fight, give her a chance at getting revenge from the Olympics." Earlier in the night, Francesca Hennessy extended her perfect record to six with a unanimous decision win over Gemma Ruegg. Jasmina Zapotoczna handed a first defeat to Chloe Watson, winning by split decision, to claim the European flyweight title.
