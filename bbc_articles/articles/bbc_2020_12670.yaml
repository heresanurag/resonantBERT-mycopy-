id: bbc_2020_12670
title: 'School laptops: Unions warn of devices shortage - BBC News'
date: '2020-11-10'
section: General
url: http://www.bbc.co.uk/news/education-54890509
content: |-
  Teaching unions say despite a push for more devices, many students still don't have access at home.

  A report by the education standards body, Ofsted, says many children have slipped back since the first lockdown. A lack of resources, enabling children to learn at home, has been one factor. The government has supplied laptops to schools in England but has struggled to deliver the amount originally promised to many schools this term.

  One of the UK’s most successful tech entrepreneurs is calling on businesses to step into the breach to recycle obsolete laptops and tablets to bridge the gap.
