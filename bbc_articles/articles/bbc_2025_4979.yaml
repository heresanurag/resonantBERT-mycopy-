  Craig Bellamy shed his new 'Mr Calm' nickname after a wild conclusion to Wales' World Cup qualifier in North Macedonia.

  Mr Calm no more - Bellamy revels in Wales' chaos

  Craig Bellamy's new nickname did not last long. On Saturday, the Wales head coach was described as "Mr Calm" by captain Ben Davies after his half-time speech following a frustrating first half against Kazakhstan. For those familiar with Bellamy the player – a combustible, volatile sort – Davies' moniker will have raised a few eyebrows. But Bellamy the coach is not the young footballer who his former Newcastle United manager Bobby Robson had said could start an argument in an empty room. Now 45 and managing his country, Bellamy has mellowed. After periods of introspection and self-analysis, Bellamy the coach is a different person, one who prides himself on his composure and analytical eye. Players have talked of his considered team talks and detailed tactical presentations; his interviews with the media have been measured, thoughtful and wide-ranging. But in North Macedonia on Tuesday night, when Wales bundled in an added-time equaliser after a conclusion of stupefying drama, that cool veneer disappeared in an instant. As David Brooks' shot crept over the line, an ecstatic Bellamy leapt in the air and roared with delight. His feet had barely touched the ground when he was asked to summarise his feelings. "My main reaction? Probably shock, still," he said. "Calm? Not at all. Even now, I'm not. I thought it would have been difficult to accept losing today. But you have to accept certain things as much as you don't want to. "As a coach you try to teach the players. I hope they learn from me but, I always feel as a coach, you learn from the players. Today's given me so much, like the character."

