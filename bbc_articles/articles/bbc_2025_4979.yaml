  The injury-time chaos warped the narrative arc of the game. Wales had dominated for 90 minutes but looked to have fallen for a sucker punch when substitute Joe Allen's backpass was picked off by Bojan Miovski, whose goal had sparked jubilant celebrations among the home players and fans. Then came the bedlam as Wales disposed with Bellamy's modus operandi of patient build-up play and launched the ball to big Kieffer Moore, who nodded the ball down for fellow substitute David Brooks to force the ball over the line from close range. For all the unfiltered joy of that moment, however, Bellamy could not hide his frustration. "To watch it happen was like 'Wow' but, at the same time, to come away with a point actually leaves me disappointed, I have to be honest, due to the performance," he said. "In the manner, then we have to take it of course. If I look at the game, we were in control but football can find a cruel way sometimes. "Maybe because I haven't suffered defeat in a short reign but I still felt there was something more." This was Bellamy's eighth game in charge of Wales and he still hasn't lost yet, with four wins and four draws leading to Nations League promotion and a solid start to World Cup qualifying. His frustration was understandable in Skopje. North Macedonia offered very little, while Wales could not convert their possessional domination into the three points it warranted. Once the elation of the celebrations subsides, Bellamy will ensure that Wales know this was an opportunity missed. Wales are second in Group J, behind early leaders North Macedonia on goal difference, but greater challenges await with top seeds Belgium yet to play. "It could have been a very precious one [point]. I feel probably on the performance, I think the way I looked at the game today, I think we needed three. It could turn out to be an important point but time will tell," Bellamy added. "We know in international football, chances can be limited at times but we had our big chances as well. On reflection of the game, maybe we needed to take three."
