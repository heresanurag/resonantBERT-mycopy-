  Farmers on why they're protesting about inheritance tax

  Farmers are protesting in London over inheritance tax changes announced in the Budget, as the row grows over how many farms it might affect.

  The National Farmers' Union calls the move “disastrous", whilst Prime Minister Sir Keir Starmer has insisted the "vast majority" of farms will be unaffected by the changes.
