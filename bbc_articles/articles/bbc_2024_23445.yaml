  Leigh Leopards set up a Super League play-off semi-final, having come from behind to beat Salford Red Devils in a gripping eliminator.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Leigh Leopards set up a Super League play-off semi-final after coming from behind to beat Salford Red Devils in a gripping eliminator at Salford Community Stadium. In a bruising first half where only two points were scored, Marc Sneyd kicked Salford ahead after they had a try disallowed when Chris Hankinson knocked-on in the build-up to touching down. But Josh Charnley's dive to the corner put the visitors on top after the break as Gareth O'Brien and Edwin Ipape gave them a 12-point lead. A tense finale was set up when Leigh's Jack Hughes was sent to the sin-bin for obstruction, leading to Ethan Ryan going over for Salford, but Sneyd missed his conversion and Salford's late momentum ran out of steam. Leigh will find out their opponents in next week's semi-final after Warrington play St Helens in Saturday's second eliminator. League Leaders' Shield winners Wigan will then face the team which finished lowest in Super League this season, while second-placed Hull KR will face the team that finished higher. The victory caps off an amazing rise for the Leopards under Adrian Lam as they reached the semi-final stage of the Super League play-offs for the first time in their history. Their victory came off the back of an impressive 10 wins from 12 at the end of the regular season to reach the top six - an immense achievement having lost seven of their opening nine games in all competitions.

  In an edgy yet energetic first period, Salford earned a slender lead at the hooter courtesy of Sneyd's kick - that coming through a rare Leigh defensive blip in the aftermath of Hankinson's disallowed try. That Leigh could not manage to get off the mark in the first half when they had threatened with the ball themselves was testament to Salford's impressive defensive efforts, with Nene Macdonald ending a promising Leopards move shortly before the break. Leigh's pressure finally told when a flowing set of passes sent Charnley through at the corner as he brought up his Super League try tally to 248, moving him second and above Danny McGuire in the list of all-time try-scorers in the Super League era. A finely-poised tie stayed in the balance when Matt Moylan's conversion attempt fell short but Oliver Partington's slip saw Ipape race through as he eventually sent through O'Brien for Leigh's second try. There was concern soon after, however, when Charnley was stretchered from the field following a lengthy delay and taken to hospital, having come off worse in a battle to the line with Salford's Ryan Brierley. Leigh will also enter their play-off semi-final further depleted having lost Frankie Halton in the first half to a failed head injury assessment after a tackle from Tim Lafai. Moments after Charnley's departure, Leigh struck again as Ipape turned and grounded for his side's third, and decisive, try. Ryan's late try caused some nerves but Leigh held out to put themselves within 80 minutes of a debut Super League Grand Final.

  Leigh Leopards have reached the Super League play-offs in successive seasons, but Adrian Lam's side have never reached the semi-final stage before

  "I'm very proud of the players. I thought it was a really tough game. We shaded the first half and the scoreboard said we did as well. "Second half, 10 minutes in, we only had 25% of the possession, which really took its toll, and people like Edwin Ipape are too good to give so much possession and territory to when you're getting low on energy. "The overriding emotion is frustration but not at the players, I'm very proud of them." "It's a difficult place to come to. They've had two weeks off and were really physical. Just our resilience to hang in there during that difficult time, it was just class from everyone. "There's a real strong and big belief in the group. The way we've handled the second half of the year is absolutely top class and I'm forever grateful to them for sticking together and having that belief." "He's in a brace and on his way to hospital, sadly. But he is conscious so fingers crossed he's OK."
