id: bbc_2017_1945
title: Thousands executed in prison, claims charity - BBC News
date: '2017-02-07'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-38890900
content: |-
  Amnesty International says as many as 13,000 people, most of them civilian opposition supporters, have been executed in secret at a prison in Syria.
