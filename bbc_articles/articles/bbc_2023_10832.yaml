title: BBC reporter at scene of Rhodes wildfire - BBC News
date: '2023-07-27'
section: General
url: http://www.bbc.co.uk/news/world-europe-66316398
content: |-
  BBC Correspondent Jenny Hill reports from the village of Vati in Rhodes, as fires continue to spread across the region.

  Tens of thousands of people have been forced to leave their homes and abandon holidays on Greek islands including Rhodes and Corfu.
