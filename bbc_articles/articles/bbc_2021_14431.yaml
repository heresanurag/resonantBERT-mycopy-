title: Transport secretary Grant Shapps has operation after bike fall - BBC News
date: '2021-11-08'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/uk-england-beds-bucks-herts-59205076
content: |-
  The Hertfordshire MP Grant Shapps thanks "brilliant staff" at two local hospitals.

  Secretary of state for transport, Grant Shapps, is the Conservative MP for Welwyn Hatfield

  The Transport Secretary Grant Shapps has had an operation on his face after coming off his bicycle at the weekend.

  The MP for Welwyn Hatfield in Hertfordshire said he was "patched up" by "brilliant staff" at the new QEII hospital in Welwyn Garden City and the Lister Hospital in Stevenage.

  In a Facebook post, he said he had to have a "minor op" on his lip.

  "Thank goodness for the bike helmet, without which it could have been worse," he said.

  Mr Shapps' post did not say where or how the fall happened but a Department for Transport spokeswoman said it did not take place in his constituency and no other vehicle or person was involved.

  He had had a minor operation on his lip and was now fine and in "good spirits", she added.

