  Mark-Paul Gosselaar, who played Zack Morris, tweeted that Diamond was "a true comedic genius" and Saved by the Bell star Dustin Diamond dies at 44said he "will miss those raw, brilliant sparks that only he was able to produce".

  Tiffani Thiessen , who played Kelly Kapowski, posted that she was "deeply saddened" by the news.

  "Life is extremely fragile and it's something we should never take for granted. God speed Dustin," she wrote.

  The cast of Saved by the Bell in 1993

  Lark Voorhies, who played Lisa Turtle in the show, said in a statement given to Entertainment Weekly: "Words cannot express the grief that I am feeling right now. Dustin and I had a warm and special friendship, he was a caring gentleman, and my memories of him will always be cherished.

  "I am so very sorry he is gone. But it's exceptionally sad for his close loved ones who have to deal with his tragic death and their own great loss. My heart goes out to them at this trying time."

  Elizabeth Berkley Lauren, who appeared in the show as Jessie Spanno, wrote that Dustin "was a truly gifted talent".

