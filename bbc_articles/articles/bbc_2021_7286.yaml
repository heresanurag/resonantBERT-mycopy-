title: '''My Paralympic dreams dashed by 1.5mm'' - BBC News'
date: '2021-06-08'
section: General
url: http://www.bbc.co.uk/news/uk-57404811
content: |-
  Swimmer Levana Hanson had her sights on a medal – that all changed when she was told one stump too long for her classification.

  Swimmer Levana Hanson had her sights on a Paralympic medal. That is, until she was called in for a classification check in 2012.

  Paralympic classification should make competition between athletes fair. They’re assessed by trained classifiers and their medical records should be reviewed so that they compete against people with the same level of ability. But some athletes believe the system is unfair.

  Levana says her hopes of glory were dashed when she was reclassified because one stump was deemed to be 1.5mm too long, a decision that was later reversed.

  UK viewers can watch Paralympics: The Unfair Games? on Thursday 9 June on BBC One at 19:30 BST, or on BBC iPlayer afterwards.
