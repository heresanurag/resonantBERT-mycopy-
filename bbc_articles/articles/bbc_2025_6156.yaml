title: US fires Greenland military base chief for 'undermining' JD Vance - BBC News
date: '2025-04-12'
section: World
url: http://www.bbc.co.uk/news/articles/creq99l218do
content: |-
  The US military said it had lost confidence in Colonel Susannah Meyers' ability to lead.

  Col Susannah Meyers (left) was fired after reportedly distancing herself from JD Vance's remarks

  The head of the US military base in Greenland has been fired after she reportedly sent an email distancing herself from Vice-President JD Vance's criticism of Denmark. The US military's Space Operations Command said Col Susannah Meyers had been removed from her role at Pituffik Space Base due to a "loss of confidence in her ability to lead". Last month, Vance said Denmark had "not done a good job" for Greenlanders and had not spent enough on security while visiting the Danish territory. The alleged email, released by a military news site, told staff Vance's comments were "not reflective" of the base. A Pentagon spokesman cited the article, saying "undermining" US leadership was not tolerated.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Following Vance's trip, on 31 March, Col Meyers is reported to have written: "I do not presume to understand current politics, but what I do know is the concerns of the US administration discussed by Vice-President Vance on Friday are not reflective of Pituffik Space Base." Military.com - which published the email, external - said the contents had been confirmed as accurate to them by the US Space Force. Appearing to confirm this was the reason for her firing, chief Pentagon spokesman Sean Parnell linked to the Military.com article in a post on X, writing: "Actions [that] undermine the chain of command or to subvert President [Donald] Trump's agenda will not be tolerated at the Department of Defense." The Space Force's statement announcing Col Meyers' removal on Thursday said that Col Shawn Lee was replacing her. It added: "Commanders are expected to adhere to the highest standards of conduct, especially as it relates to remaining nonpartisan in the performance of their duties." Col Meyers had assumed command of the Arctic station in July last year. Col Lee was previously a squadron commander at the Clear Space Force Station in Alaska. During his whirlwind trip, Vance had also reiterated Trump's desire to annex Greenland for security reasons. Since the US delegation's visit, both Greenland and Denmark have shown a united front, opposing a US annexation of the autonomous Danish territory. Earlier this month, Danish Prime Minister Mette Frederiksen's official visit saw her stand side-by-side with her Greenlandic counterpart Jens-Frederik Nielsen and his predecessor, Mute Egede. Speaking to reporters, Frederiksen directly addressed Trump, telling him: "You can't annex other countries." She added that Denmark was fortifying its military presence in the Arctic, and offered closer collaboration with the US in defending the region.

  The US has long maintained a security interest in Greenland as a strategically important territory. It has had a military presence on the island since occupying it following the occupation of Denmark by Nazi Germany during World War Two. "If Russia were to send missiles towards the US, the shortest route for nuclear weapons would be via the North Pole and Greenland," Marc Jacobsen, an associate professor at the Royal Danish Defence College, previously told the BBC. "That's why the Pituffik Space Base is immensely important in defending the US." Greenland, the world's largest island, has been under Danish control for around 300 years. Polls show that the vast majority of Greenlanders want to gain independence from Denmark - but do not wish to become part of the US. Greenland has had the right to call an independence referendum since 2009, though in recent years some political parties have begun pushing harder for one to take place.
