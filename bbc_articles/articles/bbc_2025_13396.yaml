title: Multiple fire crews tackle blaze at old pub in Norwich - BBC News
date: '2025-06-06'
section: General
url: http://www.bbc.co.uk/news/videos/cdd2l4dg6rno
content: |-
  Aerial pictures show water being sprayed on the building from all directions as smoke billows.

  Aerial pictures showed water being sprayed on a former pub from multiple directions as smoke billowed from a fire.

  Norfolk Fire and Rescue Service said seven crews were sent to the Cat and Fiddle on Magdalen Street in Norwich after it broke out at about 14:50 BST on Thursday.

  The crews were stood down just after midnight on Friday, after using a thermal imaging camera to check for hotspots.
