  On Thursday, a howling wolf on a satellite dish - which looked like the animal was howling at the Moon - was installed on to a garage roof in Peckham. But just a few hours later it was seen taken down by men and carried off down Rye lane. The artist is neither connected to nor endorses the theft of the wolf design and they have "no knowledge as to the dish's current whereabouts", Banksy's press team confirmed.

  Monkeys swing along the concrete under a railway line in Brick Lane

  On Friday, locals in Walthamstow woke up to find two pelicans fishing above a fish shop. And on Saturday, a stencil of a cat having a stretch appeared on an empty billboard in Cricklewood.

  Banksy's sixth artwork this week was a stretching cat in Cricklewood, an area in north-west London

  Crowds booed as the piece in Cricklewood was dismantled by three men who said they had been "hired" by a "contracting company" to take down the billboard for safety reasons. In the historic Old Bailey courts on Monday, Judge Mark Lucraft KC discharged a jury after it failed to reach a verdict in a death by careless driving trial and suggested they might enjoy the weather with a visit to the nearby Banksy instead.
