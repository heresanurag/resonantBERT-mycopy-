title: Banksy Rhino artwork in Charlton, London, defaced - BBC News
date: '2024-08-12'
section: London
url: http://www.bbc.co.uk/news/articles/c5yd66w769zo
content: |-
  The mural in Charlton, south-east London has been spray painted with a tag by a man in a balaclava.

  This video can not be played To play this video you need to enable JavaScript in your browser. Moment Banksy rhino artwork is defaced by man in balaclava - Image credit: Stephanie Lester

  A new mural unveiled by street artist Banksy in Charlton, south-east London, has been partially defaced. The piece, which shows a rhino mounting a Nissan Micra with a traffic cone on its bonnet, was spray painted with a tag by a man wearing a black balaclava at around 19:45 BST. Stephanie Lester, a witness who spoke to BBC News, said the man had "walked away from a jeering crowd". It had earlier appeared on Westmoor Street and was confirmed on Banksy's Instagram account.

  The now-defaced rhino was the eighth new London piece by Banksy in eight days. Another witness, Devan Vadukul, told the BBC a "random youth" in a balaclava had "brazenly walked up and defaced the installation with a graffiti tag". He added: "The whole incident took place within less than 30 seconds before he disappeared with another male accomplice further down the road."

  The incident comes a day after Banksy painted swimming piranhas on to a City of London Police sentry box, which was first spotted on Sunday morning. The translucent fish formed the seventh piece in an animal-themed art series across the capital. On Monday, the City of London Corporation said the artwork had been removed to a "safe location". A spokesperson said: "We have moved the artwork to Guildhall Yard to ensure it is properly protected and open for the public to view safely. "A permanent home for the piece will be decided in due course." On 5 August, a goat appeared on the side of a building near Kew Bridge, followed by an image of two elephants touching trunks on the side of a house in Chelsea on Tuesday. Three monkeys hanging from a bridge in Brick Lane then drew crowds on Wednesday.

  The translucent fish in the police box formed the seventh piece

