title: 'Merthyr Tydfil sinkhole: Wall falls into hole mid-interview - BBC News'
date: '2024-12-06'
section: General
url: http://www.bbc.co.uk/news/videos/c0rnw2vlykjo
content: |-
  Residents from the estate where a sinkhole appeared say things "keep falling into it".

  A section of garden wall has fallen into a massive sinkhole just as one concerned resident was being interviewed nearby.

  Cameras caught the moment the wall disappeared into the hole, which appeared on the driveway of a bungalow on Nant Morlais, Merthyr Tydfil, on the weekend.

  Estimated to be 30-40ft (9-12m) deep and five metres (16ft) wide, it also swallowed up part of the pavement and road.

  About 30 homes had to be evacuated and one local described the situation as "very scary".
