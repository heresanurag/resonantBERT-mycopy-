title: Audi brings Disney VR to back seat - BBC News
date: '2019-01-08'
section: General
url: http://www.bbc.co.uk/news/technology-46788110
content: |-
  The car maker worked with Disney to create a concept that reacts to the movements of the car a passenger is riding in.

  Audi has created a VR system that reacts to the actual movements of the car a passenger is riding in.

  The car maker worked with Disney's Games and Interactive Experiences division to produce the game concept which adapts to turns and acceleration.

  The team behind the tech insisted it would not make people feel sick, but our reporter Dave Lee wasn't so sure after his test drive at the CES tech expo in Las Vegas.
