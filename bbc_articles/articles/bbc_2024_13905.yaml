title: Missing Cryptoqueen Ruja Ignatova’s links to Bulgaria underworld - BBC News
date: '2024-06-04'
section: Europe
url: http://www.bbc.co.uk/news/articles/c2llvlx2ez9o
content: |-
  The BBC investigates Ruja Ignatova’s close ties to a suspected organised crime boss.

  Ruja Ignatova has not been seen since she took a flight from Sofia to Athens in October 2017

  In September 2019 a BBC podcast started reporting on the extraordinary tale of Ruja Ignatova, a Bulgarian woman wanted by the FBI after scamming investors out of $4.5bn (£3.54bn) through her fake cryptocurrency, before vanishing into thin air. Now we have gone on her trail to try to discover her fate. BBC Eye Investigations and Panorama have looked at her close ties to a suspected Bulgarian organised crime boss and allegations she was brutally murdered. Did Ms Ignatova enjoy the stolen billions or was she killed by the very people paid to protect her?

  Oxford University graduate Ruja Ignatova was born in Bulgaria and raised in Germany, pursuing a successful career in finance before launching the cryptocurrency OneCoin in 2014. Ms Ignatova convinced millions of people around the world to invest in OneCoin, promising to eclipse the kind of huge returns seen by early Bitcoin investors. But in reality, Ms Ignatova - known to many as Dr Ruja - had created a cleverly-disguised investment fraud, without the digital record that underlies legitimate cryptocurrencies like Bitcoin. As investigators from Germany and the US closed in on Ms Ignatova in October 2017, she took an early morning Ryanair flight from Sofia to Athens, never to be seen again. For the past year, BBC World Service’s Eye Investigations and Panorama have been trying to find out more about what happened to her, and whether she is even alive. Key to this was establishing who her inner circle was. Richard Reinhardt, who began the investigation into OneCoin for the US Internal Revenue Service alongside the FBI, told the BBC about a key character investigators have never publicly named before.

  CEO of fake cryptocurrency OneCoin, Ruja Ignatova, is the FBI’s most wanted woman. She stole billions, then vanished. New evidence reveals what may have happened. Is she missing or was she murdered? Watch now on BBC iPlayer (UK only) or on BBC One at 20:00 on Monday 3 June (22:40 in Wales). Outside of the UK, watch on YouTube, external

  The search for Dr Ruja Ignatova takes an unexpected turn when a story emerges alleging she's been murdered. But with sightings of Dr Ruja still coming in, can it be true?

  The BBC understands it is the man who had been given the role of keeping Ms Ignatova safe - Hristoforos Nikos Amanatidis, commonly known as Taki. “We were told, allegedly a big-time drug guy was in charge of her physical security,” Mr Reinhardt told us in his first interview since retiring in late 2023. “Taki came up more than once, it wasn’t like it was a one-off. That was a recurring theme.” This chimed with the information we already had - US government lawyers had said in 2019 that Ms Ignatova’s head of security was a major organised crime figure in Bulgaria but hadn’t named him. “We do have evidence that a very significant, if not the most prolific, drug trafficker of all time in Bulgaria, was closely linked to OneCoin - served as [Ruja Ignatova’s] personal security guard,” an assistant attorney said. This was the same “head of security” a different US government lawyer said was “involved in the disappearance” of Ms Ignatova in court a day earlier.

  Richard Reinhardt, the former IRS investigator who opened the case into OneCoin

  According to Mr Reinhardt, Ms Ignatova was a far more sophisticated criminal than most people realise. “This is like a white-collar criminal combined with a drug trafficker or mafia guy on steroids.” This theory appears to be supported by leaked Europol documents, seen by the BBC, which show that - before Ms Ignatova disappeared in 2017 - Bulgarian police had established connections between her and Taki. In the documents, police suspect Taki of using OneCoin’s financial network to launder the proceeds of drug trafficking. In his native Bulgaria, Taki has an almost mythical status - an El Chapo or Pablo Escobar. He is widely suspected of being the head of a Bulgarian organised crime organisation and a prolific drug smuggler. He and his associates have been investigated there for armed robbery, drug smuggling and murder, but he has never been successfully prosecuted for anything.

  At one time, Taki was the subject of an Interpol "Red Notice"

  “When we talk about Taki, he’s the head of the mafia in Bulgaria. He's extremely powerful,” says a former Bulgarian deputy minister, Ivan Hristanov, who in 2022 investigated allegations Taki ran a criminal network with the help of corrupt officials - and believes that was the case. “Taki is the ghost. You'll never see him. You only hear about him. He's talking to you through other people. If you don't listen, you just disappear from earth.” “The only person who can protect her [Ignatova] from all those investigations, including from foreign agencies - it was Taki.” The BBC wrote to the Bulgarian government about the allegations regarding corrupt officials. It did not respond. The prosecutor’s office in the capital Sofia says it “does not cover up crimes and persons who have possibly committed crimes”. Taki is now believed to live in Dubai, where Ms Ignatova bought a luxury penthouse and where her bank accounts received tens of millions of dollars from the OneCoin fraud. While it’s not known how Taki and Ms Ignatova met, or whether he was involved with OneCoin from the start, multiple sources say they had a close personal relationship and that he was the godfather to her daughter. One Bulgarian source close to Ms Ignatova told the BBC she may have paid Taki up to €100,000 a month for protection There appear to be other financial ties between Ms Ignatova and Taki. The Europol documents mention a complex deal to sell a plot of land, on Bulgaria’s Black Sea coast, that links one of Ms Ignatova’s companies to Taki’s wife. The secret police documents were passed to the BBC by Frank Schneider, a former spy and adviser to Ms Ignatova who has since disappeared. He told us that his old boss was working with “crooks” and “gangsters”.

  Just a few months after speaking to us, Frank Schneider also disappeared

  When we interviewed Mr Schneider at his home in France, he was under house arrest, awaiting extradition to the US in connection to the OneCoin scam. He was not, however, prepared to reveal names. “I'm not going to tell you who, because I have a family... This is real serious organised crime.” But in the end, Ms Ignatova’s protector may have turned aggressor. In 2022, Bulgarian investigative journalist Dimitar Stoyanov and his colleagues at the investigative news outlet bird.bg were handed a police report that had been found at the home of a murdered Bulgarian police officer. In the document, a police informant details overhearing Taki’s brother-in-law drunkenly saying Ms Ignatova had been murdered on Taki’s orders in late 2018, and her body dismembered and dumped off a yacht in the Ionian Sea. Mr Stoyanov says this account is “very, very possible”. The authenticity of the police document was confirmed by Bulgarian officials, and multiple criminal associates of Taki believe the theory he had her murdered to be true, Mr Stoyanov says. However, the BBC has been unable to independently verify the claim. The associates’ rationale being that the wanted Ms Ignatova became a liability to Taki, who wished to eliminate his links to the OneCoin fraud. Those associates include Krasimir Kamenov, known as Kuro, wanted by Interpol on murder charges. Mr Stoyanov says Kuro told him he had heard Taki discussing his criminal business in front of Ms Ignatova, and when Kuro had challenged Taki on whether he should be doing that, Taki had answered: “Don't worry, she's as good as dead.” Kuro had also claimed to have talked to the CIA about Taki, including about the allegation that Taki had ordered Ms Ignatova’s murder. Sources close to Kuro confirmed to the BBC that this meeting took place in late 2022. In May 2023, Kuro was assassinated in his Cape Town home, along with his wife and two others who worked for him. South African police are still searching for the killers, but Bulgarian former deputy minister Hristanov believes Kuro’s murder is linked to Taki. “Certain people had to be removed because they knew too much about Taki. “It was kind of a public execution that looked more like a statement. Be careful who you deal with,” he told us. Since publishing allegations of Ms Ignatova’s murder, journalist Dimitar Stoyanov says he and his colleagues have faced death threats, forcing him to temporarily leave Bulgaria for the fourth time in his career. Mr Stoyanov doesn’t claim to know a motive for any alleged murder, but property records show, and eyewitnesses have told him, that since her disappearance, a number of her Bulgarian properties are now being used by people connected to Taki.

  Evidence suggests Ruja Ignatova's mansions are now being used by people connected to Taki

  Taki has never been arrested over claims he had Ms Ignatova murdered. Her body has never been found and investigators say they don’t have enough evidence to prosecute him. But former IRS investigator Richard Reinhardt thinks Ms Ignatova is likely to be dead. Although he has not seen any evidence linking her death to Taki, he says it fits with how drugs cartels operate. “There's no honour among thieves... knowing how violent cartels are, if [Taki] thought she was a threat to him... he would probably take her out instead of getting caught.” The BBC wrote to Taki’s lawyers about the allegations in this investigation - they didn’t respond. In 2022, Ms Ignatova was placed on the FBI’s Ten Most Wanted list - where she remains today. The BBC team behind The Missing Cryptoqueen podcast has received various sightings and tip-offs about Ms Ignatova’s whereabouts after her alleged murder took place - including details of an unsuccessful police operation in Greece to catch her in 2022. It could be that rumours of her death are just another brilliant manoeuvre to throw everyone off the scent. If that is the case, as the years go by, it is likely to become increasingly difficult for her to stay on the run. “At some point it becomes like Elvis Presley might be still alive... It's not really very likely,” says Mr Hristanov. According to Mr Reinhardt, the FBI “don't just keep people in [the] Top Ten list for fun”. But they would only remove someone if there was “definitive proof” they were dead. And given the circumstances, with Ruja Ignatova there may never be. And that means, for now at least, the missing Cryptoqueen remains a hunted woman. If you have information about Dr Ruja Ignatova, you can email BBC journalists at cryptoqueen@bbc.co.uk
