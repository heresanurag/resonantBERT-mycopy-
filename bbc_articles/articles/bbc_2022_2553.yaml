title: Shaun White set to retire after Winter Olympics in Beijing - BBC Sport
date: '2022-02-06'
section: Winter Olympics
url: http://www.bbc.co.uk/sport/winter-olympics/60270755
content: |-
  Three-time Winter Olympic snowboarding champion Shaun White says he will retire from the sport after the Games in Beijing.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Three-time Winter Olympic snowboarding champion Shaun White will retire from the sport after the Games in Beijing. American White, 35, who won his first gold in 2006 in Turin, said he is "enjoying every moment" of his final Games. The five-time Olympian, the world's most decorated snowboarder, also took gold in Vancouver and Pyeongchang. In addition, White has won 15 gold medals at the Winter X Games, 13 of them in snowboarding.

  White, who is chasing a fourth Olympic halfpipe gold medal at Genting Snow Park, attributed his decision to lingering knee and back problems. "It's this and it's that, all these things are major things that brought me to this conclusion," he said. Nicknamed 'The Flying Tomato' because of his long red hair, White became a global star as the sport rose in popularity, having been first included at the Winter Games in 1998. "The thing I'm the most proud of would be staying on top of a sport that's ever-changing for as long as I have," he said. "It's almost like fashion, it's ever changing - you're trying to guess the trend of what's going to happen and have your finger on the pulse." White added that watching other riders - some half his age - pull off "heavier and heavier" tricks was also a factor in his decision and that "everyone is catching up" to his level. Making the Games in Beijing was an achievement in itself, he said, but added that he was "still incredibly competitive in any situation". He is one of only six athletes to have won at least two medals in the discipline.

