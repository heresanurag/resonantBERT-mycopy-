title: Kamala Harris endorses Joe Biden as Democratic presidential candidate - BBC
  News
date: '2020-03-08'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-51792561
content: |-
  California senator Kamala Harris says Joe Biden is the Democratic candidate to "unify the people".

  Former Vice-President Joe Biden and Senator Kamala Harris after a debate in September 2019

  California Senator Kamala Harris has endorsed Joe Biden with "great enthusiasm" as the Democratic party's US presidential candidate.

  "Biden has served our country with dignity and we need him now more than ever," she said in a Twitter post.

  Her announcement is another boost for Mr Biden, the Democratic front runner to take on Donald Trump in November.

  Ms Harris, seen as a rising star within the party, dropped out of the presidential race in December.

  Support for Mr Biden surged in the Super Tuesday Democratic primaries last week, with the 77-year-old winning 10 of the 14 states that voted.

  The race to the Democratic nomination has in effect become a contest between Mr Biden, a centrist, and left-wing Senator Bernie Sanders.

  Throwing her support behind Mr Biden on Sunday, Ms Harris, 55, said in a recorded message on Twitter: "I really believe in him and I have known him for a long time."

