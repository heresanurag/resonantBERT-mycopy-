title: Man charged after three-week-old dies in Worcestershire crash - BBC News
date: '2024-10-27'
section: Hereford & Worcester
url: http://www.bbc.co.uk/news/articles/c89vv8498jeo
content: |-
  Craig Nunn, 39, is charged with causing death by dangerous driving.

  The crash happened on the A451 between Kidderminster and Stourport

  A man has been charged over the death of a three-week-old baby in a crash. Craig Nunn, 39, has been charged with causing death by dangerous driving over the fatal collision on the A451 at about 00:10 BST on Saturday, said West Mercia Police. A black Ford Focus and a black Suzuki Vitara crashed between Kidderminster and Stourport in Worcestershire - the baby was in the Suzuki and died at the scene. Mr Nunn, of Sandy Lane, Stourport, has also been charged with causing serious injury by dangerous driving and will appear at Kidderminster Magistrates' Court on Monday.

  Two other people who were in the Suzuki, a man and a woman in their 20s, were taken to hospital for treatment Their injuries were not thought to be life-threatening. Mr Nunn, the driver of the Ford Focus, was not hurt in the crash, officers said on Sunday. “A young baby boy has tragically died and our thoughts are very much with the baby’s parents and wider family at this incredibly distressing time," Insp Steph Arrowsmith said.

