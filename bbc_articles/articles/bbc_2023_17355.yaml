title: 'Delhi pollution: Smog rises over skyline in drone footage - BBC News'
date: '2023-11-08'
section: General
url: http://www.bbc.co.uk/news/world-asia-india-67358305
content: |-
  Schools in the Indian capital have shut as air pollution there rises to alarming levels.

  A drone has captured footage of a thick blanket of smog rising over Delhi in India on Wednesday.

  Air pollution in Delhi has risen to alarming levels. On Tuesday, the air quality index for the Indian capital hit 300 on 7 November, nearly reaching the hazardous levels of 301-500.

  Authorities there have halted some construction, closed primary schools and will impose restrictions on the use of vehicles from next week to combat pollution.
