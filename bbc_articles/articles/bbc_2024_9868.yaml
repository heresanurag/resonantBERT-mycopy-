title: Hainault attack is second tragedy for Bancroft's School - BBC News
date: '2024-05-01'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68934437
content: |-
  The boy, 14, attended the same school as one of the Nottingham stabbing victims, the BBC understands.

  The independent day school is in Woodford Green

  The 14-year-old boy killed in a sword attack in north-east London attended the same school as one of the Nottingham stabbing victims, the BBC understands. The teenager, Daniel Anjorin, died in Tuesday's attack in Hainault. He was a student at Bancroft's in Woodford Green where Grace O'Malley-Kumar attended. The headteacher said the killing was "scarcely believable" so soon after Grace's. In a letter to parents, the school's headteacher, Simon Marshall, wrote: "Naturally this event will have a profound effect on the whole school, but this will be especially true of his peers. "It seems scarcely believable that less than a year on from the terrible death of Grace O'Malley Kumar in the Nottingham attacks we are facing fresh sorrow. "All we can do for now is to look after one another and respect the privacy of Daniel's family - it is a time of profound grief and as a community we will endure best if we come together in kindness and compassion." Jubilee Church, which Daniel was a member of, expressed their "immense sadness" at the "sudden and tragic death". Grace died in a knife attack in Nottingham where she was at university. Her mother, Dr Sinead O'Malley, sent her condolences to the family of the teenage boy. She said: "I don't think there's anything anybody can say that can really do anything to alleviate their hurt and their pain." A flag was seen flying at half-mast at Bancroft's School on Wednesday.

  During the attack in Hainault, four others, including two police officers, were injured. A 36-year-old man was arrested on suspicion of murder. The Met Police said he was injured and, due to his condition, had not yet been interviewed.

  Flowers have been left at the scene

  The teenage boy died from stab wounds shortly after being taken to hospital. His family are being supported by specially trained police staff. Speaking to LBC, Met Police Commissioner Sir Mark Rowley said: "The first thing you have to say is for the parents involved, who've lost their 14-year-old, and that is just horrific, and it's everyone's worst nightmare. "I'm sure we're all thinking about them." Grace's father Dr Sanjoy Kumar described the attack in Hainault as "horrific". Speaking to Good Morning Britain, he said the grief likely felt by the 14-year-old's family was "only felt by a few like us who have lost children in these absolutely appalling circumstances". Her mother said she hoped the family would heal in time. The O'Malley-Kumar family are from Woodford Green, east London, which is about 15 minutes by car from Hainault.

