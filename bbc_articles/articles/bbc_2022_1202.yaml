title: 'Ukraine tension: Could conflict escalate to war, and other questions - BBC
  News'
date: '2022-01-24'
section: World
url: http://www.bbc.co.uk/news/world-60088871
content: |-
  Two of the BBC's journalists in the region, Paul Adams and Steve Rosenberg, shed light on the conflict.

  Russia and the US have held "frank" talks as fears mount of a Russian military offensive against Ukraine.

  An estimated 100,000 Russian troops have been deployed near Ukraine, although Russia denies it has any plans to invade.

  The US and its allies have threatened new sanctions, but the two sides have agreed to keep talking.

  As the situation intensifies, two of the BBC's most senior journalists on the region answer your questions.

  You can read the full question and answer exchange here.

  1. Are the countries around Ukraine safe from a bigger war? - Hristo, Bulgaria

  There's no war, yet, and hopefully conflict can be avoided. The diplomats are still talking.

  But, yes, it's not only Ukraine that's worried about the possibility of war.

  Other countries in the region - like the Baltic states of Latvia, Lithuania and Estonia - are concerned that any future conflict could spread to their countries.

  2. In the event of an invasion, how likely are civilian casualties? - Danil Gorbununov, Ukraine

  This could play out in any number of ways, from so-called "hybrid" attacks - hacking, disinformation, etc - all the way up to a full-scale invasion, the likes of which Europe has not seen since World War Two.

  One way or another, civilians will be caught up in it. They might find themselves freezing in their homes as the power grid collapses, or trapped behind Russian lines if, as some have speculated, Russian tanks move in from the territory of neighbouring Belarus (personally I find this unlikely, but Russia seems happy to keep everyone guessing).

  This conflict has already claimed around 14,000 Ukrainian lives. If Russia tries to take more territory or install a more friendly regime in Kyiv, it's hard to see how this won't result in many, many casualties.

  Russia's Foreign Minister Sergei Lavrov and his US counterpart Antony Blinken held "frank" talks in Geneva

  3. Why does Russia fear Nato? - Mike Hancock, US

  I don't believe Russian officials really fear Nato, which is a defensive alliance.

  According to the US Secretary of State, only 6% of Russia's borders touch Nato countries. Is that a threat to Russian national security?

  Also, many Nato countries actually have good relations with Moscow, and Russia even sells weapon systems to Turkey, a Nato member.

  I think this is more about the Kremlin trying to carve out a sphere of influence for itself on its doorstep - and using Nato as an excuse to do that.

  4. Would this story be very different if Ukraine was already a Nato member? - Ryan Johnston, Belfast, Northern Ireland

  Ukraine (and Georgia) have been on a theoretical path to Nato membership since a summit in Bucharest in 2008. But it's a long and rocky path.

  Since 2014, when Ukrainians got rid of a president they thought was going to side with Russia rather than Europe, the country has been at war with Russia.

  First Russia took over Crimea. Then it encouraged pro-Russian separatists in the south-east of the country (the area called the Donbas).

  Nato can't welcome members who are already involved in conflicts of this kind. There are also all sorts of other things Ukraine needs to do, in terms of political reforms and improving their military.

  Right now, to welcome Ukraine into Nato would be seen as the ultimate red rag to a Russian bull. So no-one thinks it's going to happen any time soon.

  In many ways, this is a red herring, as President Putin knows perfectly well that membership is not around the corner.

  5. If Putin says he won't invade Ukraine, why is the US warning Russia? - Assad Ullah, China

  Words are one thing (and you're right - the Russians keep saying they won't invade), but their actions point in another direction.

  There has been the massing of forces, the support for separatists in the Donbas (including handing out around one million Russian passports), and the threat of dire consequences if Ukraine does anything provocative (which, until now, it sensibly hasn't).

  Plus, President Putin's rejection of Ukraine's independent identity is not a secret - he wrote a long essay on the subject last year. You can read it online, but be prepared for a deep dive into ancient Russian history.

  6. What is Putin's justification for so many troops on the border? - Richard Sullivan, Gloucestershire, UK

  Basically, Russia's position is: "Hey, this is our country: we can move our troops wherever we want to on our territory."

  The result - an estimated 100,000 Russian soldiers near its border with Ukraine, plus more Russian troops arriving in Belarus for snap war games.

  A potential invasion force, says the West. Moscow denies it.

