content: |-
  The popular app was trialling a new way of choosing postage but users said it made selling more difficult.

  Vinted U-turns on delivery changes after backlash

  Vinted provides an online marketplace for users to buy, sell and exchange clothes

  Second-hand clothes app Vinted has abandoned an update to its delivery options after users said it would make selling more difficult. Vinted is popular in part because of the range of courier options it offers, with sellers able to deselect those that don’t suit them - for example, if a company requires them to print a label and they don’t own a printer. But users reported this week that this list of shipping options had disappeared from their profiles, and voiced their anger on social media. Vinted told the BBC its in-app shipping options had returned to their previous settings, after listening to user feedback about the change.

  There are more than 16 million Vinted accounts in the UK. Olivia Lott, who lives in rural Devon, said she had previously turned off InPost as a shipping option because her nearest drop-off point was a 30-minute drive away in Exeter. "[This week]I had a buyer ask me if I could do InPost, and I said that was fine, but I went into my settings and I couldn’t turn it on," she said, because the list of couriers wasn't there.

  Olivia Lott said she has to drive 30 minutes to post parcels with a drop-off locker

  While Olivia said the change was inconvenient to her, others were more frustrated. TikTokker Kerry said: "I've had to go and cancel five orders, which I'm really annoyed at. That was £60 worth of orders." Some, like Theodora Philcox, hoped it was a glitch. She posted on X, formerly Twitter: "@Vinted Please fix the glitch in the shipping settings. I have had to cancel sales and others are doing likewise. This will ruin your platform if it doesn't get fixed quickly. A huge number of people don't have printers - you're making Vinted impossible to use as a seller."

