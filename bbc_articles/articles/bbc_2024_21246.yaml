  Users in certain areas cannot access all shipping options - InPost does not operate postal lockers in Northern Ireland, for example. Twenty-five-year-old Abbie from Yorkshire said that she couldn’t use InPost or Yodel to send packages as there are no drop-off points near her. “Additionally, Royal Mail post offices are only open when I work, so it rules them out,” she told BBC News. Vinted told the BBC that the change was made on Monday. In a statement, the company said: "We regularly test and trial different things to evolve Vinted. "Recently, we made some changes which meant some of our members had a different experience with managing their shipping options. "We heard the feedback and confirm the shipping options have returned to their previous settings, there are no further actions needed from the members."
