title: 'Chris Kaba''s mother: ''My heart is broken'' - BBC News'
date: '2022-09-14'
section: General
url: http://www.bbc.co.uk/news/uk-62828819
content: |-
  The parents of 24-year-old Chris Kaba accuse the Metropolitan Police of racism.

  The mother and father of 24-year-old Chris Kaba - who was shot dead by police in south London - have accused the Metropolitan Police of racism.

  Chris Kaba was killed in a residential street in Streatham Hill on Monday night following a police chase.

  The police watchdog, the IOPC, is investigating the incident. A spokesman for the Met said the force is "co-operating fully" as the IOPC carries out a "thorough and independent investigation".
