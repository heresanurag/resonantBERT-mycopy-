  Man dies after getting into difficulty at Craigavon Lake

  The PSNI said the man got into "difficulties" in the water near Lake Road

  A man in his 20s has died after getting into difficulty at Craigavon Lake in County Armagh. The Police Service of Northern Ireland (PSNI) said the man entered the water near Lake Road shortly after 18:00 BST on Saturday and "encountered difficulties". A multi-agency search operation was immediately launched involving police, Northern Ireland Fire and Rescue Service, and Community Rescue Service volunteers. A PSNI statement said: "Enquiries into the circumstances surrounding the man's death are ongoing, and a post-mortem examination will take place in due course, however at present the death is not believed to be suspicious. "Our thoughts are with the family and friends of the deceased."

  Search and rescue volunteer Sean McCarry urged people to be aware that water can be deadly

  Sean McCarry from the Community Rescue Service said "we have a very serious problem" with young men and water safety. He urged swimmers and young people to be "very cautious" around water, especially as we get into the warmer months. "This is the second incident of this kind that we’ve had in just over a week," he said. "Don’t take any chances around water – it can be deadly," he added.
