title: What impact could the 2024 general election have on Scottish independence?
  - BBC News
date: '2024-06-29'
section: BBC InDepth
url: http://www.bbc.co.uk/news/articles/c0447rxk7jxo
content: |-
  Whatever the outcome, it seems unlikely that the constitution will vanish as an issue in Scottish politics.

  When Scotland declared its independence from England, the words came from the heart.

  "It is in truth not for glory, nor riches, nor honours that we are fighting, but for freedom alone, which no honest man gives up but with life itself."

  Seven centuries have passed since the Declaration of Arbroath, external, and Scottish nationalism now strikes a rather different tone.

  "We are a moderate left-of-centre party in the mainstream of Scottish public opinion," said the Scottish National Party (SNP) leader, John Swinney, as he unveiled his party's manifesto for the general election.

  Independence, he said, can deliver "a stronger economy and happier, healthier lives".

  Braveheart it was not. Nowadays, independence is presented not as a cry for freedom, but as a practical solution to financial hardship and inequality.

  That strategy has worked well for the SNP during a prolonged period of Conservative government at Westminster.

  But now, polls suggest, the nationalists’ decade-long dominance of Scottish politics is under threat from a resurgent Labour Party which hopes to gain at least a couple of dozen seats from the SNP while trying to form the next UK government.
