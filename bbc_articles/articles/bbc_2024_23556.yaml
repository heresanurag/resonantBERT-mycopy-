title: 'Watch: Maori MP performs haka before swearing oath to King - BBC News'
date: '2024-09-29'
section: General
url: http://www.bbc.co.uk/news/world-asia-67622272
content: |-
  Rawiri Waititim, an advocate for Maori rights, broke protocol as he was inducted into New Zealand's parliament.

  New Zealand politician Rawiri Waititi broke protocol by performing a Maori allegiance before swearing an oath to King Charles.

  He and five other parliamentarians chose to first pledge allegiance to their grandchildren, to young people and to the country’s founding document, the Treaty of Waitangi.

  Waititi is the co-leader of Te Pati Maori, which advocates for Maori rights.

  His induction on Tuesday came amid controversy about government plans to review affirmative action policies and wind back the use of Maori language.
