title: CCTV shows moment fox plays with dog toy in Nottinghamshire - BBC News
date: '2025-06-18'
section: General
url: http://www.bbc.co.uk/news/videos/cvg1dneed2qo
content: |-
  A woman has said she had never seen anything like it before.

  A fox has been filmed on CCTV playing with a dog toy in a woman's back garden.

  Karon, from Nuthall in Nottinghamshire, regularly leaves dog food out for the fox which visits her garden every evening.

  Her security cameras started recording in the early hours on Sunday as the fox wandered around the back of her property and began to play with her dog's soft toy.

  Karon said: "We usually bring all the toys in but on this occasion we hadn't.

  "We thought how super cute it was, he is a young fox and was lovely to see him having fun.

  "I've never seen anything like it and couldn't believe it."

