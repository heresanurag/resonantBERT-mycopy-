content: |-
  People “should be very concerned” about sexist, hateful content on social media and “every single one of us” needs to do something about it, she says.

  Misogyny is an epidemic fuelled by social media, Amy Hunt tells BBC in first interview

  To play this video you need to enable JavaScript in your browser. This video can not be played If this was a women's issue we'd have fixed it already, Amy Hunt tells BBC

  Amy Hunt, whose mother and two sisters were murdered in their own home last year, has told the BBC there is an "epidemic" of misogyny in society that has "the most horrific, devastating consequences". In her first interview since the murders of her mum, Carol, and sisters, Hannah and Louise, Amy says the UK "should be very concerned" about sexist, hateful content on social media - calling on media platforms, people in power, schools and "every single one of us" to do something about it. She tells the BBC people are "slowly waking up" to the links between hate posted on social media and violence against women by men in real life. The man who killed her loved ones was Kyle Clifford, her youngest sister's ex-boyfriend. The attacks came two weeks after Louise ended their 18-month relationship.

  Amy describes Clifford as a man filled with hatred, self-loathing, and a deep insecurity. "It's very clear he hates women," she says. "But what I often say is, he doesn't hate women as much as he hates himself." She says there is "a serious obligation as a society to change men's behaviour, because this is a man's issue - it is not a woman's issue". Amy has been speaking to the BBC's Victoria Derbyshire alongside her father, racing commentator John Hunt. The pair describe the legacy of love Carol, Hannah and Louise have left. John says it is this that has helped sustain them through their trauma and grief. The three women remain a constant presence in their lives, he says. Amy adds that her mother and sisters were "the best of us" and says "the world is a much emptier place without them". Clifford fatally stabbed 61-year-old Carol in July last year after he followed her into her home, in Bushey, Hertfordshire, on the pretext of bringing over some of his former partner Louise's belongings. He then lay in wait for Louise, 25, before raping her, and using a crossbow to shoot both her and her sister Hannah, 28. You can watch the full interview, Standing Strong: The John and Amy Hunt interview, with Victoria Derbyshire at 21:00 BST on BBC1 and on iPlayer

