title: Rishi Sunak 'incredibly angry' over alleged election betting - BBC News
date: '2024-06-21'
section: Politics
url: http://www.bbc.co.uk/news/articles/c844je9nq89o
content: |-
  The prime minister promises to "boot out" anyone found to have broken gambling laws from the Conservatives.

  Rishi Sunak has said he was "incredibly angry" to learn of allegations that Tory insiders were betting on the election and promised to "boot out" anyone found to have broken gambling laws. Four people linked to the prime minister are being looked into over allegations of bets- including the Conservative Party’s director of campaigning Tony Lee and a police officer in Mr Sunak's close protection team. Two Tory election candidates - Laura Saunders and Craig Williams - have confirmed they were being looked into by the Gambling Commission. Asked about the cases at special election edition of BBC's Question Time, Mr Sunak said he was "incredibly angry, incredibly angry, to learn of these allegations". Speaking to the audience he said: "It's a really serious matter - it's right that they're being investigated properly by the relevant law enforcement authorities. "The integrity of that process should be respected. "But what I can tell you is if anyone is found to have broken the rules, not only should they face the full consequences of the law, I will make sure that they are booted out of the Conservative Party."

  Labour Leader Sir Keir Starmer told the Question Time audience some politicians "think that making money or self entitlement is the reason they're in politics, so we need to return it to service". In response to Mr Sunak's comments, Liberal Democrat spokesperson Munira Wilson said: "If he was truly angry about this scandal these Conservative candidates would have been suspended. “He is more interested in taking away young people’s bank accounts if they don’t do National Service than investing in their education."

