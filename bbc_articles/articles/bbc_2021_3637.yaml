title: UK meteor spotted above Midsomer Norton and Bath - BBC News
date: '2021-03-01'
section: General
url: http://www.bbc.co.uk/news/uk-56237536
content: |-
  Social media users reported seeing a 'flash' with a 'tail of orange light' in the night sky.

  Video footage captured on security cameras shows a meteor lighting up the sky above Midsomer Norton and Bath.

  Twitter users reported spotting a "flash" with a "tail of orange light" in the night sky.
