  Robert Downey Jr won his first Oscar, Emma Stone had a wardrobe malfunction and more best bits in 60 seconds.

  Oppenheimer may have swept the Oscars but a special performance by Ryan Gosling put Barbie back in the picture for the last of the Barbenheimer showdowns.

  Robert Downey Jr won his first-ever Oscar, Emma Stone had a wardrobe malfunction and more of the best bits from the awards in 60 seconds.
