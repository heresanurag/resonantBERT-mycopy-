  India captain Jasprit Bumrah strikes twice in two balls removing Usman Khawaja and Steve Smith to reduce Australia to 3-19 in during the first Test between Australia and India in Perth.

  India captain Jasprit Bumrah strikes twice in two balls removing Usman Khawaja and Steve Smith to reduce Australia to 19-3 in reply to the tourists' 150 all out on day one of the first Test in Perth.

  Available to UK users only.

