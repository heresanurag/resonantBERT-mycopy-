  Claims have been spreading on social media alleging voter fraud in Pennsylvania - BBC Verify examines them.

  Claims of electoral malpractice in Pennsylvania, a key swing state, have been spreading on social media. They include allegations about illegal immigrants and voting. BBC Verify has been speaking to election officials - at the sites involved - to find out what has been going on.
