title: Police name man wanted for Coventry boy's hit-and-run death - BBC News
date: '2024-06-16'
section: Coventry & Warwickshire
url: http://www.bbc.co.uk/news/articles/ckddp4d477do
content: |-
  Police say Dolars Aleksanders, 21, is wanted over the death of 12-year-old Keaton Slater.

  Keaton Slater enjoyed making people laugh and smile, his family said

  Police have named a man wanted on suspicion of killing a 12-year-old boy in a hit-and-run crash in Coventry. West Midlands Police appealed for information on the whereabouts of 21-year-old Dolars Aleksanders, suspected of causing death by dangerous driving. Earlier on Sunday police identified the boy who died as Keaton Slater. In a tribute released by the force, Keaton's family said he was "so beautiful inside and out," and "our fun-loving little comedian" who "just wanted to make everyone laugh and smile".

  A black BMW found abandoned in New Arley on Friday evening has been seized, with officers continuing to appeal for the driver or anyone else who was in the car to come forward. One person came forward on Saturday evening and has been voluntarily questioned and released while inquiries continue, said West Midlands Police.

  Dolars Aleksanders is suspected of causing death by dangerous driving

  "A family has lost a 12-year-old boy in an appalling incident and our thoughts remain with them," said Sgt Rich Evans. "We are offering them support at this most dreadful of times, and we're keeping them informed as our work to trace those responsible goes on." Sgt Evans urged those involved in the crash, or anyone who knows them, to search their consciences and "do the right thing". Police are continuing to check CCTV from the area around the crash, and are appealing for any other witnesses to get in touch, particularly if they had dashcam or doorbell footage. An online fundraiser to support Keaton's family had raised more than £31,000 by Sunday morning.

  Tributes to the young Coventry City fan were left at the side of the road
