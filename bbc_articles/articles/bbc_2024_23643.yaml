content: |-
  The stars behind the much-loved characters of Nessa, Stacey and Smithy are spotted in Barry Island.

  First pictures from final Gavin and Stacey show

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Ruth Jones, James Corden and Joanna Page have been spotted filming for the Gavin and Stacey Christmas Day special in Barry Island. Corden and Jones, dressed as her character Nessa, were seen with their arms around each other on Barry seafront in south Wales. Earlier on Tuesday morning, Jones was seen in a rickshaw with her co-star Joanna Page, as Stacey, in the back. Corden told BBC News it was "wonderful" to be back in Barry.

  Back together: Co-writers and stars Ruth Jones and James Corden on the set of the Gavin and Stacey Christmas special in Barry

  "There's so much history over the past 17 years here," he said. "And I think it's an incredibly special place with really, really special people."

  "It's lovely to be here, but it's also the feeling of being like, this is the last time I think we'll be on the island," Corden added. "I remember when we were here and Matt [Horne] and Jo [Page], when she comes off the bus and jumps into his arms, or the episode we did down on the beach. "It feels fantastic to be here."

  Joanna Page, as Stacey, and Ruth Jones, as Nessa, filming on Barry Island seafront

  James Corden was also pictured on the set on Barry Island seafront

  Joanna Page as Stacey walking near Marco's cafe in Barry

  Filming for the one-off final episode, which is expected to last for several weeks, began on Monday. The BBC shared an image of a clapperboard from the first day on set, with the caption: "The final episode of Gavin & Stacey started filming today. Truth be told, we’re a little bit excited."

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Ruth Jones and James Corden on set for the Christmas special

  On Tuesday morning, Corden shared a picture of Page and Jones on Instagram, external, with the caption: "Day 2. One last time on the island." Jones and Corden announced in May that the much-loved comedy series would return for one last episode, to be aired on BBC One on Christmas Day.

  Jones, Corden and Page laughing together on set

  Jones, surrounded by crew, smiles during filming for the special episode

  The rickshaw Joanna Page and Ruth Jones were riding was decorated with a Wales flag

  The sitcom, which aired for three series between 2007 and 2010, followed the central characters of Gavin and Stacey - played by Mathew Horne and Joanna Page - as they pursued a relationship across Essex and south Wales. It returned in 2019 for a Christmas special that ended on a cliffhanger when Nessa got down on one knee to propose to Smithy.
