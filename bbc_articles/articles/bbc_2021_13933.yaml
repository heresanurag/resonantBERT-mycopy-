content: |-
  Video shows the cab going up in flames, in what police have called a terror incident.

  Video has emerged of the moment a taxi exploded outside Liverpool Women's Hospital on Sunday.

  Footage, which some viewers may find distressing, shows the cab going up in flames in what the police have called a terror incident.

  The passenger was killed and the driver injured. Read more here
