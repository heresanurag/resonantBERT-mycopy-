  An alternative backstop proposed by the EU would see Northern Ireland effectively remain in the customs union and single market, while the rest of the UK shifted away from Brussels' rules.

  However, the prime minister has already said it would be unacceptable and it is strongly opposed by Northern Ireland's Democratic Unionist Party (DUP), on which Mrs May's government relies to secure a majority in Parliament.

  DUP leader Arlene Foster warned it would be "catastrophic" to create a barrier between Great Britain and Northern Ireland as she travelled for talks with the EU's chief Brexit negotiator Michel Barnier on Tuesday.
