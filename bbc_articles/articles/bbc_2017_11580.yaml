title: 'Grangela: Labour''s Angela Rayner is grandmother at 37 - BBC News'
date: '2017-11-22'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-42078457
content: |-
  Labour's Angela Rayner becomes the youngest grandmother in the House of Commons.

  Labour MP Angela Rayner has become a grandmother at the age of 37.

  The shadow education secretary announced the birth of her first grandchild in an early-morning tweet in which she gave herself the new nickname, Grangela.

  The Ashton-under-Lyne MP had her first son, Ryan, at the age of 16 and said being a teenage mother "saved me".

  Ms Rayner, now the youngest grandmother in the House of Commons, said her grandchild was born just before 06:00.

