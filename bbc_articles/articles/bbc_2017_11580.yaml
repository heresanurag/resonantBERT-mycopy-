  Ms Rayner grew up on a Greater Manchester council estate with a brother and sister, and a mother who could not read or write.

  In a profile on her official website, she says: "For the most part, I was raised by my grandma who worked at three jobs to put food on the table and didn't stop until the day she died - three days before her 65th birthday. "

  Mrs Rayner, who left school without any qualifications has said that becoming a mother made her determined to prove that she was not the "scumbag" that people thought.

  Now a mother of three boys, Mrs Rayner is critical of politicians who think of teenage mums as "just failures" with "nothing in their lives". She has also hit back at attacks on her because of her northern accent.

