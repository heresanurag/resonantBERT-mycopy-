  After working as a council care worker and being elected as a Unison representative, Ms Rayner was selected as the Labour candidate for Ashton-under-Lyne in 2015, increasing the party's majority in the constituency

  In her maiden speech in the Commons, the avid Star Wars fan said she would do things in her "own little northern way".

  She was appointed shadow education secretary in 2016 - becoming the youngest-ever holder of that position - and according to the New Statesman has been "increasingly spoken of as a future Labour leader".
