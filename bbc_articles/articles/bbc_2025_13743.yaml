title: Prosecution case like a movie script, Mark Gordon says - BBC News
date: '2025-06-09'
section: UK
url: http://www.bbc.co.uk/news/articles/c1ld16y9vmpo
content: |-
  In his closing speech, Gordon says the prosecution case is "just a show, an act".

  A court sketch of Mark Gordon giving evidence during his retrial last month

  A man on trial with his partner over the death of their newborn baby has described the prosecution case against him as "like a script from a movie". Mark Gordon said in his closing speech that the prosecution had "just made things up" during his retrial with Constance Marten at the Old Bailey in London. He rejected the prosecution's central allegation that their baby, Victoria, had died of hypothermia after they had negligently taken her camping in January 2023, telling the jury: "We are experienced campers." Gordon, 51, and Marten, 38, both deny manslaughter by gross negligence and causing or allowing the death of a child.

  Victoria's decomposed body was found in a shopping bag in an allotment shed in Brighton in March 2023. She had died in a tent in the South Downs in January 2023. Gordon made his own closing speech because his lawyers had withdrawn. During their evidence in the retrial, the couple both said their baby died on the second day of camping, with Marten having woken up to find she had slumped over Victoria, who was no longer breathing. "We didn't move from the body for three whole days," Gordon said, adding that the couple had considered suicide after their daughter's death. In his closing speech last week, prosecutor Tom Little KC said Victoria had been exposed to "cold, damp and windy conditions with wholly inadequate clothing inside that tent". "It was simply too cold, she could not maintain her temperature and death was inevitable," he told the jury. But Gordon said on Monday that the prosecution's case that Victoria had died of hypothermia was a "hypothesis". He reminded the jury that Marten had told the court they had erected their tent in a "sheltered area with a fallen tree". They wore several layers of clothing and the tent was well ventilated so there was no condensation, he added. "The whole prosecution in this case is like a script from a movie, indeed a fictional novel," he told jurors. "The prosecution has just made things up and filled in the blanks in support of the plot, the narrative, the theme of the story. "Despite all the barking, all the theatrics, it is just a show, an act." The jury has heard that because their four older children had been taken into care, the couple was trying to hide Victoria's birth. But when their car caught fire in January 2023, with a placenta found on its back seat, they became the subjects of a police manhunt. "We were not on the run, we were being chased," Gordon told the court, claiming that the government caused his daughter's death. "Members of jury, support those who stood up to government overreach, in the spirit of the Magna Carta," he said. "In this trial acquit us. Me and my wife. Mark Gordon and Constance Marten. "We were two vulnerable people (who were) misunderstood and continuously persecuted due to racial (and) class stereotypes. But none of that stuff matters, as love conquers all." Marten and Gordon were found guilty at an earlier trial of concealing the birth of a child and perverting the course of justice by not reporting her death. The jury in that case could not come to a verdict on the outstanding charges. A retrial began in March.
