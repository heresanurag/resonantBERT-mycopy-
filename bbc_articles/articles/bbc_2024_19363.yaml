title: Somerset House begins phased reopening after fire - BBC News
date: '2024-08-20'
section: London
url: http://www.bbc.co.uk/news/articles/cz73l72vye4o
content: |-
  More than 100 fire crews responded to a blaze at the former stately home on Saturday.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Somerset House will undergo a "phased reopening" this weekend after more than 100 fire crews responded to a blaze at the former stately home on Saturday. In a statement on X, Somerset House said: "We are pleased to confirm that we are able to commence a phased reopening of Somerset House, following Saturday's fire." It added the fire had been "successfully contained to one part of the building". "London Fire Brigade's operation onsite has ended and its investigation will continue."

  There were no artworks in the part of the building that was on fire

  The fire broke out in the west wing just before midday on Saturday. The house is used as an arts venue, and is also home to the Courtauld Gallery, an art museum that houses the collection of the Samuel Courtauld Trust, including masterpieces ranging from the Middle Ages to the 20th century. Van Gogh's famed Self-Portrait with Bandaged Ear is one of the masterpieces housed in the gallery. However, there were no artworks in the part of the building that was on fire, a spokesman for the venue previously said.

  The spokesperson thanked the London Fire Brigade, emergency services and staff for "ensuring everyone's safety and preventing much greater destruction". “We have been very moved by expressions of support from around the world over the last few days, which has served as a reminder of how cherished Somerset House is as an arts destination and the home of cultural innovators, housing its unrivalled creative community of talented individuals and enterprises,” they added. “We would like to thank our audiences and community for their patience as we begin this reopening process.” The venue will reopen on Saturday, with its exhibition The Lore of Loverboy and evening event the Mighty Crown Ball. The spokesperson said its “community of artists, makers and creative start-ups” based in its New Wing had begun to return to the site on Tuesday.

  Fire crews tackled flames which were "located in part of the building's roof"

  Residents based in the workspaces of West and South Wing will follow as soon as possible, they added. Somerset House’s Georgian era buildings and square were built on the site of a palace dating back to the Tudors. ​​​​It regularly hosts exhibitions, experiences and ice skating within its famous courtyard.
