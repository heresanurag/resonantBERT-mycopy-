  In among the well-choreographed but also genuine celebrations of a new season, though, there was one 'gulp' moment, when Christian Horner was booed loudly as he came out on stage to host during his Red Bull team's presentation. Anyone wondering whether that was directed at Horner personally or the team found out the answer shortly afterwards when the cheers for four-time champion Max Verstappen drowned out a few boos. F1 had pulled out all the stops for this event, the first of its kind. It was nominally held to mark the 75th anniversary of the World Championship, but one imagines F1 owners Liberty Media may well be pushing for a repeat after this. The attendance of all 10 teams and 20 drivers was required, and while some were more willing participants than others - Verstappen, in particular, was known not to be a fan - all were on their best behaviour, during the seven hours of media build-up to the event at a next-door hotel, and during the show itself. Rock musician Machine Gun Kelly opened the show, and Take That closed it; there were other acts during it. Whitehall was a warm and witty host, poking fun at the "beef" between George Russell and Verstappen - "how can anyone have a beef with George?" he said. "He's the nicest guy in the world."

  This video can not be played To play this video you need to enable JavaScript in your browser. Russell: 'Me and Max won't be best mates'

  Everything went off with an almost military precision, each team using their seven-minute allocation during the evening for their own unique style of presentation. Many in F1 had questioned what the show was for, but on the evidence of the night, that was obvious. A normal pre-season is marked by a drip-feed of individual launches by the teams. Some garner more attention than others, but none attract the sort of worldwide attention this event seems to have drawn - the audience on F1's YouTube channel peaked at 1.1m concurrent viewers, and totalled 4.6m across the live broadcast. "This is a new milestone, such an amazing event," Mercedes F1 boss Toto Wolff said. The presentations were done in reverse order of last year's constructors' championship, so the last team to do their presentation were McLaren. "It's a pleasure to be here tonight," Norris said. "We're all excited. A lot of hard work and today it starts." The last word spoken by a competitor on the evening went to his ultimate boss, McLaren Racing chief executive officer Zak Brown. He judged it perfectly. "We never stop racing," Brown said. "Let's go."

