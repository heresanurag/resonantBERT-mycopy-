  Alcaraz recovered from a nervy start in last year's championship match to beat Djokovic 1-6 7-6 (8-6) 6-1 3-6 6-4. The 21-year-old, now a three-time major champion, could become the youngest back-to-back men's singles winner at Wimbledon since Boris Becker in 1986. This is only Alcaraz's fourth appearance at the Championships. However, the Spaniard - a crowd favourite wherever he plays - says he is "not thinking about taking the crown" off Djokovic as the next tennis superstar. Alcaraz is unbeaten in Grand Slam finals, a feat he admitted he "thinks about" but believes will "be difficult" to keep up. Five weeks ago he lifted his first French Open title and should he win on Sunday, he would be the youngest man to win at Wimbledon and Roland Garros in the same year. "Sometimes I feel like I'm 26 or 27 and then I realise that I'm just 21 and everything is coming too fast and too quick," Alcaraz told BBC Sport. "It could be better if I had to wait a little bit, but I've put in the hard work every day and I am glad people get to see me achieve my dreams."

  Alcaraz has won two and lost three of his previous matches against Djokovic

  Alcaraz has had a trickier run to this year's final and narrowly avoided a shock loss to Frances Tiafoe in the third round, eventually winning in five sets. He has dropped a set in each of his three matches since that scare, against seeds Ugo Humbert, Tommy Paul and Daniil Medvedev. The third seed, who has won 13 consecutive matches at Wimbledon, had the support of most of the crowd during last year's final, although he may be pushing his luck by jokingly poking fun at England supporters this week before his nation's Euro 2024 final with the Three Lions. He received gentle boos during an on-court interview following his semi-final win when he said Sunday will be a "good day for Spanish people". And asked if the football match - which kicks off at 20:00 BST in Berlin - might be a distraction, Alcaraz said: "I am going to play first so it's going to be difficult for me. I will try not to think about it and leave everything on the court."

