  Novak Djokovic says "history will be on the line" when he faces Carlos Alcaraz in the Wimbledon men's singles final on Sunday.

  'History on the line' for Djokovic in Alcaraz final

  Novak Djokovic is hoping to avenge his loss to Carlos Alcaraz in last year's Wimbledon final

  Novak Djokovic says "history will be on the line" when he faces Carlos Alcaraz in the Wimbledon men's singles final. Djokovic has the opportunity to equal Roger Federer's record of eight men's Wimbledon titles and secure a record 25th Grand Slam singles triumph with victory on Sunday. The Serb, 37, who had knee surgery three weeks before the start of the tournament, is level with Australian Margaret Court on the all-time list with 24 singles majors. "Of course, it serves as a great motivation," Djokovic said. "But at the same time there is also a lot of pressure and expectation. "Wimbledon just extracts the best of me and motivates me to always show up and perform the best I can." The highly anticipated showdown is a repeat of last year's final which Alcaraz won in five thrilling sets after four hours and 42 minutes. It starts at 14:00 BST and will be live on BBC One, BBC iPlayer, BBC Radio 5 Live, BBC Sounds and the BBC Sport website and app.

  This video can not be played To play this video you need to enable JavaScript in your browser. Wimbledon crowd boos as Novak Djokovic performs a violin celebration after his semi-final win

  Djokovic has not always seen eye to eye with fans at Wimbledon this year, accusing some of the Centre Court crowd of using their bellowing of Holger Rune's name as "an excuse to boo" during his fourth-round win. Following the second seed's semi-final victory over Lorenzo Musetti, some fans booed him as he imitated playing a violin - a light-hearted celebration intended for his six-year-old daughter Tara. But he has also shown a lighter side. Given an extra day's rest after quarter-final opponent Alex de Minaur withdrew, he spent it playing tennis with his children on Wimbledon's practice courts. He pretended to take a penalty after his third-round match was momentarily delayed by fans celebrating England's shootout win over Switzerland at the Euros. And he kept up the football banter on Friday by telling reporters he expects Gareth Southgate's side to "bring it home".

  Djokovic has reached 10 Wimbledon finals, two behind Federer's record

  Djokovic is having - by his lofty standards - a below-par 2024. He has not won a title yet, his worst start to a year since 2006, while Wimbledon will be his first final since the ATP Finals in November. But he has seemingly regained top form at SW19, playing his usual brand of dominant tennis and dropping just two sets in six matches. "I wasn't sure until three, four days before the tournament whether I'm going to take part," added Djokovic who had surgery in June after tearing the medial meniscus in his right knee at the French Open. "I made an extra effort to recover as quickly as possible just because it was Wimbledon."

