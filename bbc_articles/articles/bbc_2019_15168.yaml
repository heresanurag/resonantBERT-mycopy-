content: |-
  The cooling towers finally come down after 50 years, as hundreds of people watch from surrounding hills.

  Demolition 'too emotional' for some former staff

  People who used to work at Ironbridge Power Station have said there was a great sense of community among the staff and some will miss the cooling towers when they are gone. Trevor Sidaway from Wiltshire (second right) worked there for 20 years, before leaving in 1997 and said: "If you had a problem you could ask anyone and they would help you. You were never stuck for anything." Trevor Childs (far left) from Much Wenlock agreed and said "power stations tend to be like that, but Ironbridge was particularly so. We looked after each other." Some will watch the cooling towers come down and they were invited to be part of the event, but Andy Holden from Shrewsbury (second left) said: "I've spent nearly 40 years maintaining the place, running the place, looking after it, doing my job as best that I could. Don't want to be part of the demolition." He explained: "The power station has been part of my life, it was nearly 40 years. It's helped me raise my children, it's helped me pay off my mortgage and it's gone now and I do miss the place, I miss the camaraderie and the work." Trevor Childs said: "They looked nice, they blended in, but they were part of a power station, the cooling towers. The problem is, to keep them would have cost an absolute fortune." Do you have memories of the power station or its cooling towers? Email us
