title: Oxford soup kitchen founder Ma Smith given award - BBC News
date: '2018-11-01'
section: General
url: http://www.bbc.co.uk/news/uk-england-oxfordshire-46062626
content: |-
  Icolyn "Ma" Smith was given a Pride of Britain award for her work feeding the homeless for 28 years.

  The founder of an Oxford soup kitchen has received a Pride of Britain award for 28 years of feeding the homeless.

  Icolyn "Ma" Smith, 87, started the Oxford Community Soup Kitchen in 1990 after she saw a young man eating from a bin.
