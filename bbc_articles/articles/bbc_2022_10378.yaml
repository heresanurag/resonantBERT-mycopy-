content: |-
  Liz Truss and Rishi Sunak have been taking questions from an audience in a show hosted by Sky News.

  Sunak defends honesty despite wanting to take ex-PM's role

  Alexander asks Rishi Sunak what does honesty mean to him in politics and leadership? "Honesty in a sense means telling you the truth, even when that's not easy. I think you can see in this leadership election that's why I'm doing - I'm saying some things are not the easiest thing in the world to hear. "I'm not standing here promising you tens and tens of billions of pounds of goodies straight away because it's not right for our economy. "My life would be far easier if I wasn't saying that but I want to be honest with you and straight about the challenges we face and what going to be required to fix them." Audience member Steve responds by pointing out that Sunak worked with Boris Johnson but now wants to take over his role. Sunak says that while he is proud of the work they did together, "it got to a point where it was too difficult for me to stay. "It came to a point where the government was on the wrong side of an ethical dilemma that I could not defend," Sunak says.
