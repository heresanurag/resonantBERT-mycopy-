content: |-
  The Prince of Wales delivers his first full message in Welsh to mark St David's Day.

  This video can not be played To play this video you need to enable JavaScript in your browser. It is understood the prince has been learning some conversational Welsh

  The Prince of Wales has used his first message delivered in Welsh to wish Wales a "Happy St David's Day". Prince William pre-recorded a social media video to mark 1 March, the day Wales's patron saint is honoured and to "celebrate Wales – its history, culture and incredible people". His words in Welsh follow a trip to Wales with his wife, Catherine, Princess of Wales, on Wednesday, when the couple visited Pontypridd. Elsewhere, First Minister Eluned Morgan led celebrations in Wales at the annual Dragon Parade in St David's, Pembrokeshire.

  While he is not having formal lessons, it is understood the prince has been learning some conversational Welsh, though is it unclear who is teaching him the language, or if he is attending classes. In his message, he said: "Hello. Today, on St David's Day, we come together to celebrate Wales – its history, its culture, and its incredible people. "From its breathtaking landscapes to its language, Wales continues to inspire. "Today, we will celebrate everything that is magical about Wales. "To the people of Wales and everybody around the world, Happy St David's Day."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  William has been known to greet people with a few words of Welsh when in the country, but has not spoken fully in public before. King Charles had formal lessons in the Welsh language, studying from April to June 1969 at Aberystwyth University, ahead of his investiture as the Prince of Wales in July that year at Caernarfon Castle. The King's tutor was Welsh nationalist Tedi Millward, but despite their apparent differences the two men became firm friends. William has not had an investiture since his father announced he had created his eldest son and heir as Prince of Wales during his first televised address as monarch, the day after the death of Queen Elizabeth II in 2022.

  The first minister Eluned Morgan led the Dragon Parade at St David's

  Elsewhere, the first minister led the annual Dragon Parade in St David's, near to where the patron saint is though to have been born. Organised by Pembrokeshire Coast National Park, the parade was one of number held across Wales to celebrate the patron saint. Local school pupils and care in the community members - many dressed up as dragons or daffodils - took part as it marched through the UK's smallest city.
