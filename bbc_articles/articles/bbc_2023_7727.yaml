title: 'Russia Victory Day: Putin says world at ''turning point'' at scaled back parade
  - BBC News'
date: '2023-05-09'
section: Europe
url: http://www.bbc.co.uk/news/live/world-europe-65528705
content: |-
  Russia's president says the Ukraine war represents a "decisive" moment for civilisation, claiming Russia has the moral high ground.

  Russia’s Victory Day parade is typically a bombastic affair, intended to show off the country’s military might, but this year things were drastically slimmed down in the Russian capital.

  Russia attributed the cut-backs to security concerns. The country has experienced a number of attacks across the country in recent months, which it has blamed on Ukraine, but which Kyiv denies involvement in.

  The most high profile of these came last week, when Russia’s air defences brought down two drones over the Kremlin. Ukraine denied carrying out the strike, claiming it was staged by Russia.

  Recent months have seen other acts of apparent sabotage across the country.

  A few days ago, an oil refinery in the southern region of Krasnodar, about 200km (124 miles) from the Crimean border, was targeted by drones, according to Russian media reports. Drones have also been brought down in other towns and villages well inside Russian territory.

  In recent days Zakhar Prilepin, a Russian pro-war writer, was severely injured in a car bomb explosion, while last month Vladlen Tatasrky, a Russian military blogger, was killed in an explosion in a St Petersburg cafe.
