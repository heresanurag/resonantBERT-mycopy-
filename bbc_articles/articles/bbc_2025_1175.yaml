title: Met Police refers itself to watchdog over man's death in Norwood - BBC News
date: '2025-02-16'
section: London
url: http://www.bbc.co.uk/news/articles/c1m5ml2n84po
content: |-
  The 45-year-old died after officers found him having a medical emergency at a South Norwood property.

  Met refers itself to watchdog over London man's death

  File photo of the Metropolitan Police's headquarters at New Scotland Yard

  The Metropolitan Police has referred itself to the policing watchdog following the death of a man in south London after officers were called to reports of a child being assaulted. The force said officers entered a property on High Street, South Norwood, around 01:27 on Sunday morning and found a 45-year-old man having a medical emergency. The Met said the man was "very agitated and actively resisting against officers". After being restrained, he lost consciousness and was taken to hospital, where he died shortly after 03:30, the force said. The Independent Office for Police Conduct (IOPC) has now launched an investigation to the incident.

  A referral to the IOPC does not, in these circumstances, indicate that officers are thought to have done anything wrong, but is a requirement when a person dies or suffers serious injury after contact with the police or while in custody. The man's next of kin have been informed and The Met's Directorate of Professional Standards has been made aware, the force said. Commander Andy Brittain, who is overseeing the Met's response to the incident, said: "Our thoughts are with the family of the man who has died. We will ensure they are fully supported. "I know the community in South Norwood will want to be reassured that the incident was handled appropriately. The IOPC is conducting an investigation to provide that independent scrutiny." He added that officers who attended "were met with a very challenging situation" and will also receive support. An IOPC spokesperson said that after being notified of the incident, it sent investigators to the scene to gather evidence and obtain statements from the officers involved. "Our thoughts are with the family of the man who has died and we will be in contact with them to explain our role," they added.
