title: 'New Delhi Railway Station: Eighteen people killed in crush - BBC News'
date: '2025-02-15'
section: Asia
url: http://www.bbc.co.uk/news/articles/czj3r0y7849o
content: |-
  Eyewitnesses tell the BBC a "huge crowd" had gathered at the Indian capital's central train station.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A crush at New Delhi Railway Station has left around 18 people dead and at least 10 injured. Thousands of people reportedly crammed into the railway station on Saturday night as they tried to board delayed trains. Four of the victims were children, while 10 were women, according to a list released by officials. Indian Prime Minister Narendra Modi said his thoughts were "with all those who have lost their loved ones" in a post on X.

  Crowd crushes are common in India where there is frequent overcrowding at religious events, festivals and public spaces. The incident comes weeks after 30 people were killed in a pre-dawn crush at the religious festival, Kumbh Mela, in northern India, where tens of millions of Hindus had gathered to bathe in sacred river waters on one of the holy days of the six-week event. In Delhi, witnesses told BBC Hindi that a "huge crowd" had gathered at the station, through which many people were travelling to and from the Kumbh Mela, which is being held in Prayagraj city in neighbouring Uttar Pradesh state. Hundreds of people were also waiting for trains to other places. According to officials, two trains had been delayed at the station, while a third - heading to Prayagraj - was waiting to depart.
  • None Families mourn loved ones who died in Kumbh Mela crush Ruby Devi said the crowd at the Indian capital's main railway station had been so big she was unable to get inside. Umesh Giri, whose wife Shilam Devi died in the crush, said that the crowd was "uncontrollable" as he tried to board the Prayagraj Express. Dharmendra Singh, who was also travelling to Prayagraj, told India's PTI news agency that there were" far more people than I have ever seen at this station". "In front of me, six or seven women were taken away on stretchers. KPS Malhotra, deputy commissioner of police (railways), said that authorities were investigating what led to the crush. "This happened due to a delay in two trains arriving and more people gathering at the station," he said. Opposition leaders have criticised the government, accusing them of administrative failure. "Considering the large number of devotees going to Prayagraj, better arrangements should have been made at the station," Rahul Gandhi, the leader of opposition in India's parliament, posted on X.
