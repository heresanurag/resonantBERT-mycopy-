title: 'Bradford toddler window fall murder case: Woman remanded in custody - BBC
  News'
date: '2017-10-23'
section: Leeds & West Yorkshire
url: http://www.bbc.co.uk/news/uk-england-leeds-41720061
content: |-
  Emergency services were called to a block of flats in Bradford on Saturday evening.

  Gemma Procter spoke only to confirm her name, age and address

  A woman has appeared in court charged with the murder of an 18-month-old boy who fell from a sixth-floor flat window.

  Emergency services were called to the Newcastle House block of flats in Bradford city centre at 17:10 BST on Saturday after Elliot Procter fell.

  West Yorkshire Police said it "quickly became apparent" the boy had died by the time officers arrived.

  At the city's magistrates' court, Gemma Procter was remanded in custody.

  Ms Procter, 23, of Barkerend Road, Bradford, spoke only to confirm her name, age and address to district judge Michael Fanning.

  She is due to appear at Bradford Crown Court on Wednesday.

  The seven-storey Newcastle House is in Bradford city centre

  Enquiries into the "extremely traumatic" incident remain ongoing, a force spokesperson said.

  Newcastle House, which is in the city centre, is a seven-storey block of flats with shops on the ground floor.
