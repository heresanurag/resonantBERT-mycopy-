content: |-
  President Biden has faced intense pressure to step aside since his faltering debate performance.

  US President Joe Biden has announced that he will end his candidacy for re-election, saying "it is in the best interest of my party and the country".

  Biden faced intense pressure from fellow Democrats to step aside after a faltering debate performance against Donald Trump in June, gaffes during the Nato summit, and looking frail after a Covid diagnosis.

  He said in his statement he would address the nation on the matter next week and thanked Vice-President Kamala Harris, saying she was an "extraordinary partner".
