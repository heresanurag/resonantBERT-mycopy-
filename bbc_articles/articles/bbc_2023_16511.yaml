  The 97-year-old presents Planet Earth III, the third instalment of the landmark award-winning programme.

  Sir David Attenborough, 97, will present Planet Earth III, the third instalment of the landmark award-winning programme.

  The eight-part series follows some of the world’s most amazing species and aims to "look at the world through a new lens".

  The BBC's climate editor Justin Rowlatt discusses what's in this new series.

  Planet Earth III will begin on Sunday 22 October on BBC One and iPlayer.
