title: 'Dartford: Labour councillor in court over counter-protest remark - BBC News'
date: '2024-08-09'
section: Kent
url: http://www.bbc.co.uk/news/articles/credz9gl92yo
content: |-
  Ricky Jones was remanded in custody until a pre trial preparation hearing on 6 September.

  Ricky Jones was remanded in custody when he appeared in court on Friday

  Suspended Labour councillor Ricky Jones has been remanded in custody after he was charged with encouraging violent disorder in connection with comments at a London counter-protest. The Dartford councillor was arrested by the Metropolitan Police on Thursday and was charged on Friday, said the Crown Prosecution Service (CPS). “Jones was filmed addressing a crowd in Walthamstow on Wednesday 7 August during which he appeared to make remarks and a gesture to encourage others to act violently towards far-right protestors," the CPS said. Mr Jones, 57, appeared at Westminster Magistrates' Court on Friday. BBC reporter Lucy Grey said no indication of a plea was given.

  Deputy senior district judge Tan Ikram said: “It is alleged that using a microphone you addressed a crowd at an anti-fascist protest and, talking about others you described as ‘disgusting Nazi fascists’, you said ‘we need to cut their throats and get rid of them’. “The Crown says that those words were capable of encouraging others to commit acts of serious violence, and further that you believed that your words would encourage violence against others.” The case was adjourned for a pre-trial prepation hearing on 6 September. Ahead of the councillor’s appearance in court, Jaswant Narwal, chief crown prosecutor for CPS London North, said: “The Crown Prosecution Service has authorised the Metropolitan Police to charge Ricky Jones, 57, with one count of encouraging violent disorder. “We remind all concerned that criminal proceedings are active and that he has the right to a fair trial. “It is extremely important that there should be no reporting, commentary, or sharing of information online which could in any way prejudice these proceedings.” Mr Jones has been a councillor in Dartford, Kent, since 2019. He has been suspended by the Labour Party.

