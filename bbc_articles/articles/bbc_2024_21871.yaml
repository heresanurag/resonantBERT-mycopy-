  Former Blackburn striker Sutton called it a "masterclass" by Forest boss Nuno Espirito Santo. The manager brought on pacy duo Hudson-Odoi and Anthony Elanga in the second half and they combined for the goal. "Nottingham Forest were outstanding," said former England captain Alan Shearer on BBC Radio 5 Live. "The way they defended as a team was magnificent, and this was no fluke. They stopped Liverpool every time they got into the box. "Then they went and hit them on the break - what a finish from Callum Hudson-Odoi. What a start to the season they've had." Forest have won two and drawn two of their opening four games. "We are proud and very happy to win. I know the miles and the distances they put in," Nuno told BBC Match of the Day. "We had to overrun them, that is the only way at Anfield. Our fans haven't celebrated in Liverpool for so long, so enjoy it." The last time Forest won at Anfield, it was five months before the first man landed on the moon. "If you ignore the quality Liverpool have it is a mistake, and we didn't," added a delighted Nuno. "It’s all about taking your chances at the right moment, and we did."

