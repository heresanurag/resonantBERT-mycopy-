title: 'Liverpool 0-1 Nottingham Forest: ''Honeymoon'' over as Arne Slot rues ''setback''
  - BBC Sport'
date: '2024-09-14'
section: Premier League
url: http://www.bbc.co.uk/sport/football/articles/c8xel9w4g5no
content: |-
  "A setback" is how Arne Slot describes his first defeat as Liverpool manager, while pundit Chris Sutton declares "the honeymoon is over".

  This video can not be played To play this video you need to enable JavaScript in your browser. How 'almost perfect' Forest put brakes on Liverpool

  "A setback" was how Arne Slot described his first defeat as Liverpool manager, while pundit Chris Sutton declared "the honeymoon is over". Slot had led Liverpool to three wins out of three without conceding since replacing Jurgen Klopp in the summer. But they were frustrated by Nottingham Forest, who claimed their first win at Anfield since February 1969 thanks to Callum Hudson-Odoi's strike. It was not a proper smash-and-grab, but Liverpool did have the better chances - and Slot said his team made too many errors. Liverpool were frustrated by Forest breaking up play in the first half and their best chance came when Luis Diaz struck a post. One team's unbeaten start was in all the headlines - and the other team's was not. And now one of them, Forest, remain without defeat. In fact this was Slot's first defeat in 30 games - a run stretching back to Feyenoord's 2-1 Champions League loss at Celtic on 13 December 2023. "Not to the process, but it is a big setback," said Slot of the Anfield reverse. "If you lose a home game it’s always a setback, especially if you face a team, we never know, maybe they will go all the way to fight for Champions League places but normally this team is not ending up in the top 10. "So if you lose a game against them it’s a big disappointment." The Anfield faithful were clearly frustrated at how the game was panning out and many started to leave the ground before full-time. Former Celtic striker Sutton, at Anfield for BBC Radio 5 Live, said: "Arne Slot's honeymoon period is over - there's plenty of work to do. "Arne Slot will have not wanted the international break. His side this afternoon have been out-thought by this Forest team." In a short post-match news conference, Slot added: "They played a lot of long balls. "We had a lot of ball possession but only created three or four quite good chances. That’s not enough if you play so much in their half. We lost the ball so many times in simple situations. "The other team played over our press a lot with a lot of long balls. Too many individual performances in ball possession were not up to the standards that I’m used to from these players." Liverpool visit AC Milan on Tuesday in their first Champions League league phase game. Slot has named the same side for the past three matches - but he may well decide it is time for a change.

