title: Met Police suffers from 'institutional racism, misogyny and homophobia' - Baroness
  Casey - BBC News
date: '2024-07-20'
section: General
url: http://www.bbc.co.uk/news/uk-65025324
content: |-
  Baroness Casey's year-long review condemned systemic failures in London's police force.

  The Metropolitan Police suffers from "institutional racism, misogyny and homophobia", according to the woman in charge of a blistering year-long review into the force.

  Baroness Casey told Radio 4's Today programme that it was time for the force "not to be in denial about these deep-rooted issues".
