title: Bristol woman feared perimenopause symptoms were dementia - BBC News
date: '2025-05-14'
section: General
url: http://www.bbc.co.uk/news/videos/crldl1ykw9ko
content: |-
  Lauren Chiren, from Bristol, is now using her own experiences in her role as a menopause consultant.

  A woman who began experiencing brain fog and sleep problems in her 40s, has said she feared she had early onset dementia.

  Lauren Chiren said she felt something was "seriously wrong" but after three months of worrying she went to her doctor who confirmed it was perimenopause.

  She described the moment as a feeling of "real relief" and now works as a menopause consultant to help other women going through the same thing.

