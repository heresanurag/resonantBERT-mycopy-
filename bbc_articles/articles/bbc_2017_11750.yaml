  "Today I am crushed with indescribable pain," he said in the post.

  "Just three days after falling ill with Acute Myloid Leukaemia, my dear wife Gemma passed away yesterday evening surrounded by her family and friends.

  "If you are a prayer - pray for my boy Ethan. 8yrs, precious and in bits. Thank you."

  A Sky Sports spokesman said: "We are shocked and devastated to hear Simon's news. All our thoughts are with him and his family during this terribly sad time."

  Footballers, including England striker Jamie Vardy and England women's captain Steph Houghton, also tweeted their sympathy.

  Norwich City Football Club - the team Thomas supports - said the thoughts of everybody at the club were with the presenter and his family.

