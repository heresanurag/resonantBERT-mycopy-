content: |-
  State nuclear power head Petro Kotin accuses Russian soldiers of turning the Zaporizhzhia nuclear power plant into a military base.

  Since Russia began its attacks on Ukraine in February, we've seen images of destruction and hardship throughout the country.

  Five months later, life for its citizens contrasts significantly from region to region. Here are some recent photos showing how life varies around the country.

  Life is hard in the eastern city Sloviansk, north of Donetsk - residents fill up canisters with clean water on Saturday Image caption: Life is hard in the eastern city Sloviansk, north of Donetsk - residents fill up canisters with clean water on Saturday

  In neighbouring Kramatorsk, an elderly woman is among civilians evacuating by bus, hoping to find safety away from the eastern region - they are embarking on a long trip to Germany Image caption: In neighbouring Kramatorsk, an elderly woman is among civilians evacuating by bus, hoping to find safety away from the eastern region - they are embarking on a long trip to Germany

  The evacuation of citizens from Donetsk region continues - Sanya is on a train with her two children and her mother Lumelia, heading towards Dnipro Image caption: The evacuation of citizens from Donetsk region continues - Sanya is on a train with her two children and her mother Lumelia, heading towards Dnipro

  Shoppers in a Kharviv supermarket on Sunday are met with the sight of an armed Ukrainian soldier pushing a trolley while he stocks up on supplies Image caption: Shoppers in a Kharviv supermarket on Sunday are met with the sight of an armed Ukrainian soldier pushing a trolley while he stocks up on supplies

  Meanwhile, in the capital Kyiv, life is returning to some normality - opera lovers watch Giuseppe Verdi's opera Rigoletto at the National Opera of Ukraine, on Saturday Image caption: Meanwhile, in the capital Kyiv, life is returning to some normality - opera lovers watch Giuseppe Verdi's opera Rigoletto at the National Opera of Ukraine, on Saturday

  Sunbathers in the eastern port of Chornomorsk watch the cargo ship Fulmar S arrive at the port on Sunday - it is one of the ships that will transport grain, now exports have resumed Image caption: Sunbathers in the eastern port of Chornomorsk watch the cargo ship Fulmar S arrive at the port on Sunday - it is one of the ships that will transport grain, now exports have resumed
