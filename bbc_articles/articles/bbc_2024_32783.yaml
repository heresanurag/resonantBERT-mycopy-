  An amber warning for wind - the second highest level of weather warning - was issued from 01:00 GMT until 15:00 on Saturday. A yellow wind warning had them come in until 06:00 on Sunday. The Department for Infrastructure (DfI) said it responded to about 900 incidents, mainly debris on roads, fallen trees and flooding. Essential travel only was advised on Saturday and there were several road traffic accidents. A substantial number of road closures remain in place, external and road users are advised to plan their journeys in advance.

  At one point on Saturday morning, there were no trains running in Northern Ireland but many lines have now resumed albeit with delays. Bus services, flights and ferries were also affected. Electricity generation was temporarily suspended at Ballylumford, one of Northern Ireland's main power stations, after the natural gas-fired power station reported structural damage to one of its smaller chimneys. A number of festive events were cancelled and councils closed some facilities on Saturday and Sunday. All six Irish Premiership games were cancelled, with late postponements having left fans in an "appalling situation", according to Communities Minister Gordon Lyons.

  Storm Darragh is the fourth named storm of the season, following Ashley, Bert, and Conall. In the Republic of Ireland, gusts of 87mph (140kmh) were recorded in County Galway as the storm moved in from the Atlantic. At the height of the storm, around 400,000 homes and businesses were without power in the Republic. ESB Networks said a "significant number" of homes and businesses could remain without supply over the coming days due to the damage caused.

  In England, two men were killed by trees falling on their vehicles during the storm. Gusts of up to 93mph (150km/h) battered some areas as the storm caused significant disruption in south Wales and western England. About three million people were sent an emergency alert from the government as Storm Darragh approached the UK.

