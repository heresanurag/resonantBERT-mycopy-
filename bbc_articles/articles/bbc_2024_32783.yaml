content: |-
  NIE Networks says it may be a number of days before all affected customers are reconnected.

  Thousands still without power after Storm Darragh

  This scene in Markethill Road, Craigavon, has been replicated across Northern Ireland

  Community assistance centres are open for the thousands of households who are still without power after Storm Darragh. Latest figures from NIE Networks show that about 95,000 homes were affected by power cuts over the course of the storm, with about 3,000 customers remaining without power. NIE Networks say it may be a number of days before they can reconnect all those affected. The energy provider said it had deployed 600 staff and was working to bring in additional personnel from across the UK.

  NIE Networks operations manager Alex Houston said: "Most of the faults affecting high numbers of customers have been repaired which has allowed us to restore significant numbers of customers. "However, there are still around 1,200 faults across the network some of which are affecting very small numbers of customers so we do anticipate that it will take some time before we can get all of these cleared."

  The operation to restore power is under way in Markethill Road in Craigavon

  Stephen Haughey was getting ready for bed on Saturday morning when he heard an "unmerciful bang" as a large tree fell 15m away from his family's home in Bayview Gardens in Londonderry. "I looked out and there was the tree on two cars, within 10 seconds it was down," he told BBC Radio Foyle's North West Today programme. One of the vehicles had been written off, he said. "Soft top it looks like... it's totally ruined now," he added. Mr Haughey said the other car suffered "superficial damage" and he is "quite pleased with that one".

  "We're just very thankful nobody was injured," says Stephen Haughey

  Describing the incident as unbelievable, Mr Haughey said he was in a "state of shock" on Saturday morning. "It was an anxious night, there's quite a few big trees around us," he said. "We're just lucky no one was injured, I'd a young family in the house."

  Paul and his son Luca had been without electricity for about 24 hours

  Paul Wright and his son Luca were among those affected by power cuts on the Markethill Road area in Craigavon. "We've been without electricity for about 24 hours. "So we're doing a lot of talking to each other instead of playing with our tablets. "We've been lucky to have family close by."

  NIE Networks will open community assistance centres across Northern Ireland from 12:00 - 14:00 and 17:00 - 19:00 on Monday to offer assistance to those still without power. The centres will be at the following locations: The centres will offer warm drinks, charging and changing facilities and NIE Networks staff will be on hand to answer any queries. The Red Cross will also be working with NIE to provide support in a number of locations across Northern Ireland.

