content: |-
  PM recalls navy's hurricane relief efforts and fight against IS in Christmas message to troops.

  Prime Minister Theresa May has used her Christmas message to the armed forces to pay tribute to the "valiant hearts" of British servicemen and women who are working to keep the UK safe.
