  Sqn Ldr Mark Long was killed when the plane he was flying crashed in a field in Lincolnshire.

  Sqn Ldr Mark Long was killed when the Battle of Britain Memorial Flight (BBMF) plane he was flying crashed in a field in Lincolnshire on 25 May

  A pilot who was killed in a Spitfire crash in a field in Lincolnshire died as a result of head and neck injuries, an inquest has heard. Sqn Ldr Mark Long was killed when the Battle of Britain Memorial Flight (BBMF) plane he was flying crashed in a field in Lincolnshire on 25 May. The cause of the crash is not yet known but the Defence Accident Investigation Branch has been examining the site and wreckage. The remaining aircraft of the BBMF remain temporarily grounded while investigations continue and will not take part in D-Day commemoration events.

  Sqn Ldr Long was flying the Spitfire to take part in a display when the aircraft crashed at RAF Coningsby. It is understood he issued a Mayday call soon after take off and the Spitfire was seen turning just before it plunged toward the ground. At the opening of the inquest into the pilot's death in Lincoln, senior coroner Paul Smith gave a provisional cause of death as head and neck injuries following a post-mortem at Leicester Royal Infirmary. Lincolnshire Police are currently investigating the circumstances of the crash and preparing a file which will be passed to the coroner. The inquest was adjourned until 24 November. Tributes have been paid to the "incredible" RAF pilot, who had spent four years flying with the BBMF. His family described how he "lived his life with an unwavering passion with laughter, love and dedication". Follow BBC Lincolnshire on Facebook, X (formerly Twitter), external, and Instagram. Send your story ideas to eastyorkslincs.news@bbc.co.uk, external
