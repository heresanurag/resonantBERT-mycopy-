title: 'Watch: Firefighters tackle raging Texas Tesla fire - BBC News'
date: '2023-11-11'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67389134
content: |-
  The car's owner told local news outlets that they heard a hissing sound from the vehicle before the fire.

  Firefighters were called to tackle a Tesla fire outside a home in Plano, Texas, after flames were spotted shooting from the vehicle.

  No one was injured and the blaze was extinguished.

  The car's owner told a local news outlet that they heard a hissing sound from the car, which had recently had a new battery installed, prior to the fire.

  The cause of the fire is being investigated.
