title: 'Erdington crash: Children, aged 3 and 5, among injured - BBC News'
date: '2019-03-25'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/uk-england-birmingham-47683040
content: |-
  Five people are taken to hospital following a crash involving a people carrier and a car in Birmingham.

  Five people were taken to hospital following the crash

  Two children, aged three and five, have been injured in a "serious" crash in Birmingham.

  Two adults suffered "possible life-changing injuries" in the crash involving their people carrier and a car in Summer Road, Erdington, just before 23:00 GMT on Saturday.

  The five-year-old child suffered a broken leg and the three-year-old has suspected internal injuries.

  All four have been taken to hospital along with the driver of their car.

  The driver of the Volkswagen Golf is also suspected to have serious injuries.

  Three other children who were in the people carrier were not badly hurt and were treated at the scene.

  Police closed Summer Road at its junction with Sutton New Road and York Road and have appealed for witnesses.

