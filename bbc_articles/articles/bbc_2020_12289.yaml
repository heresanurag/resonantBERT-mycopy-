title: Man in court after toddler dies in Edinburgh - BBC News
date: '2020-11-21'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-55030631
content: |-
  Lucasz Czapla was charged with assault among other charges after a two-year-old boy was found injured in Edinburgh.

  Police were called to an address in the Muirhouse area of Edinburgh

  A man has appeared in court charged with assault following the death of a two-year-old boy in Edinburgh.

  Emergency services were called to a property in the Muirhouse area of the city at about 09:30 on Saturday morning.

  The boy had serious injuries and died at the scene shortly afterwards.

  Lucasz Czapla, 40, was also charged with driving over the alcohol limit, dangerous driving and failing to stop a vehicle.

  He appeared at Edinburgh Sheriff Court on Monday where he made no plea and was remanded in custody.

  Det Ch Insp Lynn McFall said: "I'd like to thank the local people in the Muirhouse community for their help during this inquiry. This was an isolated incident."
