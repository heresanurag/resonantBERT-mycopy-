title: A rave at a Nottingham chippy - 'a night to remember' - BBC News
date: '2024-10-26'
section: Nottingham
url: http://www.bbc.co.uk/news/articles/cvg0l5w4wg9o
content: |-
  A city centre fish bar hosted its first gig with Nottingham MC Window Kid.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Music fans gathered at a city centre fish bar as it transformed into a one-night rave venue. The menu at Nottingham's Lace Market Fish Bar is typically a variety of fish and chips, kebabs and burgers, but on Wednesday night it served up something different. In the first night of its kind for the chippy, it hosted local grime and garage MC Window Kid and British DJ Nathan Dawe. The floor shook as the event spilled on to the streets and staff said people could not wait for the next one.

  The Window Kid from Arnold, known to friends as Greg, has been a regular customer of the Lace Market Fish Bar for years. "It's my local chippy, and we thought it was a place where everyone's welcome," he said.

  MC Window Kid and DJ and producer Nathan Dawe performed a new song

  With 24 hours' notice, the micro-rave sold 35 tickets, but hundreds more attended, the MC said. "It couldn't have gone any better. Everyone was just loving life; it was bang on," he added. The 30-year-old had played gigs in Nottingham since he was 18, so he was no stranger to a crowd, albeit in a slightly different setting. But for staff members Dorina Gjoshi and Sam Abbas, it was a night like no other at the fish bar.

  Ms Gjoshi said she hoped the rave on Wednesday night would not be the last

  "I was here serving drinks, and the floor was actually shaking," Ms Gjoshi said. The 35-year-old added: "We've had quite special occasions like the playoffs and hockey finals, but not like this. "It was a great night - something to remember."

  "Everyone was happy", Mr Abbas said

  Mr Abbas, 43, said it was an "amazing night". "People are asking about [doing it] one more time. Maybe we will after New Year's," he added.

