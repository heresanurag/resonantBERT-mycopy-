title: Floods kill more than 60 in Sudan - BBC News
date: '2019-08-25'
section: Africa
url: http://www.bbc.co.uk/news/world-africa-49466722
content: |-
  Nearly 200,000 people have been affected by floods since the beginning of July.

  Torrential rain and floods have killed 62 people in Sudan, according to the official state news agency.

  The country has been battered by heavy rains since early July, affecting almost 200,000 people across 15 states. White Nile state in the south of the country has been hit hardest.

  The UN said that more than 37,000 homes have been destroyed or damaged while more flashfloods are expected.

  The rainy season continues until the end of October.

  This house in Wad Ramli, 75km (45 miles) north of the capital Khartoum, was destroyed by flooding several days ago

  Residents of Wad Ramli returned by boat to try to salvage their possessions

  They moved what they could to dry ground

  Geli was another town which suffered serious damage in the floods

  A camp for people displaced from their homes has been established near Wad Ramli
