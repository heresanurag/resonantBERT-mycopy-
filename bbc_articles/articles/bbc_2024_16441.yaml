content: |-
  Michael McIntyre, Bradley Walsh and Alex Jones are among the stars whose salaries will not appear.

  The stars you won't see on the BBC salaries list

  Michael McIntyre does not appear on the list despite hosting two Saturday night primetime shows for BBC One

  The BBC's annual report has been published, with the usual names dominating the star salaries list. Once again, Gary Lineker and Zoe Ball are among the corporation's top earners, thanks to their jobs hosting Match of the Day and Radio 2's breakfast show respectively. But there are many, many more stars who earn huge amounts of money from the BBC, several of them almost certainly more than Lineker and Ball, whose names are absent. That's because the BBC does not have to disclose the salaries of stars who are paid through production companies, including the corporation's own commercial arm, BBC Studios. As a result, the hosts of some of the BBC's biggest shows are missing and escape the glare of media and public scrutiny every year. Winkleman's Strictly co-anchor Tess Daly is also absent, as are the show's judges Craig Revel Horwood, Shirley Ballas, Motsi Mabuse and Anton Du Beke. And we know nothing of the sizeable number of actors and creatives connected to major soaps and dramas such as Doctor Who, Casualty, EastEnders and Call The Midwife.

  Bradley Walsh, pictured with son Barney, presents BBC shows such as Gladiators and Blankety Blank

  The BBC has disclosed the salaries of talent and executives earning above a certain threshold (currently £178,000) since 2017, when it was compelled by parliament to start including the information in its annual report. But salaries of stars paid via production companies are not published, including those who receive payments through BBC Studios. It's not difficult to guess, however, which names might be near the top of the salaries list if it was a complete picture. As the host of both The Wheel and Michael McIntyre's Big Show, Michael McIntyre is regularly seen on BBC One in primetime on Saturday nights throughout the year. With that kind of real estate and his high profile, there is no way McIntyre would not be one of the corporation's top earners. But he has never appeared on the list. Similarly, Bradley Walsh is one of the UK's best-loved presenters. Despite being well known for ITV's The Chase, he fronts several high-profile shows for the BBC too, including Blankety Blank and Gladiators. Other stars would likely appear on the list thanks to the sheer number of episodes they film. Alexander Armstrong, for example, presents hundreds of episodes of Pointless, which is broadcast every weekday on BBC One. Even factoring in that some of these are repeats, it's likely Armstrong will be on a healthy salary. Richard Osman, who still appears alongside Armstrong on Pointless Celebrities as well as fronting his own show House of Games, would also probably appear if the rules were different, as would quiz show hosts Ross Kemp, Sandi Toksvig and Victoria Coren-Mitchell. Romesh Ranganathan, meanwhile, hosts several programmes for the BBC, including documentaries and The Weakest Link, for which he is not listed. (We'll find out next year if the salary for his new Radio 2 weekend show is made public.) Other big BBC names not featured include Paddy McGuinness, who has fronted shows including Top Gear, Catchpoint and I Can See Your Voice, and Later host Jools Holland. Panel show regulars Ian Hislop and Paul Merton, from Have I Got News For You, and Rob Brydon, David Mitchell and Lee Mack, from Would I Lie To You?, are also missing. It's almost certain Graham Norton would also appear on the list, although his salary would be significantly less than it used to be, following his Radio 2 exit in 2020 and the recent reduction in the number of episodes of his BBC One chat show.

  Only part of Amol Rajan, Fiona Bruce and Evan Davis's earnings are listed

  Some presenters occupy a slightly different category; those who do appear on the list, but only for some of their BBC work. Amol Rajan is listed due to his role as a news presenter, fronting Radio 4's Today programme and its podcast, but not for his work presenting quiz show University Challenge. Similarly, Evan Davis appears for his role as the host of Radio 4's PM, but not for voicing BBC Two's Dragons' Den. Another news presenter, Fiona Bruce, is listed for Question Time and news bulletins, but not the Antiques Road Show. Clive Myrie appears for his work as a newsreader but not for hosting Mastermind or his travel documentaries. You may have noticed the pattern here - news presenters are included for their journalistic and radio presenting work, but their TV entertainment programmes are exempt.

  Claudia Winkleman hosts Strictly Come Dancing and The Traitors, two huge hits, but is absent from the list

  Because BBC Studios is a commercial organisation, not underpinned by the licence fee, it is in competition for business with the BBC, streaming services and other broadcasters. As a result, the corporation successfully convinced the government several years ago that BBC Studios' salaries should not be listed, so that there is a level playing field for it to compete in the commercial market. There was one year, however, where some stars paid via commercial entities were included on the list. The very first annual report to include salaries, published in 2017, did feature many of the commercially-paid names, before most of them were privatised in time for the following year. But since 2018, everybody paid via a production company, BBC or otherwise, has vanished. The One Show's Alex Jones, for example, was listed as earning around £400,000 in 2017, but her name has been removed from the list in recent years. Claudia Winkleman also used to appear as earning £450,000 for fronting a variety radio and TV programmes including Strictly Come Dancing. Since then, she has left BBC Radio 2, but she's taken on a new TV presenting role hosting The Traitors, a huge hit for the BBC.

  Ant and Dec are thought to be employed by ITV on a deal worth more than £30m over three years

  Most stars who appear on the list understandably hate having their salaries published. Former BBC presenter Simon Mayo previously described the publication as an "annual turkey shoot" - in other words, a chance for the press to bash the BBC. Graham Norton told BBC News in 2018 the list was "frustrating, because it's so inaccurate," drawing attention to the large number of missing names. The publication of the salaries is still highly controversial within the media industry today, particularly considering other broadcasters do not have to do it. Ant and Dec are likely to be the most well-paid TV presenters in the UK,, external with their most recent deal with ITV said to be worth more than £30m over three years. They present several shows for the network - Britain's Got Talent, I'm A Celebrity... Get Me Out of Here!, and, until it was rested recently, Saturday Night Takeaway. When some presenters on commercial networks are paid as much as this, does anyone particularly care how much Craig Charles gets for hosting a specialist show on BBC 6Music? Well, yes actually, the BBC's critics say. The fact the BBC is publicly funded via a mandatory licence fee, many argue, means it's only right that the BBC tells the public how their money is being used. Ultimately, however, it's unlikely the names of those paid via production companies will ever be put back on the list. So you can expect Gary Lineker and Zoe Ball to continue dominating the headlines every July for a while yet.
