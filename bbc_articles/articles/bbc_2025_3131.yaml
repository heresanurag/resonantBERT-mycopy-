title: 'Burslem: Three arrested over woman''s ''unexplained'' death - BBC News'
date: '2025-02-09'
section: Stoke & Staffordshire
url: http://www.bbc.co.uk/news/articles/c4gwyg1y5lgo
content: |-
  Police are investigating the death of the woman in Burslem, Stoke-on-Trent.

  Police were called to Bank Hall Road in Burslem following concerns for the welfare of a woman

  Three people have been arrested in connection with the death of a woman in Stoke-on-Trent. The victim, in her 40s, was found at a property on Bank Hall Road in Burslem at about 08:20 GMT after police received reports of concern for her welfare. She was confirmed dead at the scene by paramedics and Staffordshire Police has said it is treating her death as unexplained. A 30-year-old woman and two men aged 30 and 38 - all from Stoke-on-Trent - have been arrested and remain in custody.

  The force said the investigation into the death was ongoing and witnesses or anyone with relevant CCTV or dashcam footage have been urged to contact police.

