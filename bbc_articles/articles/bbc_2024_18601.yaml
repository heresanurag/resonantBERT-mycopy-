id: bbc_2024_18601
title: 'Lux: Belfast nightclub removes online videos after backlash - BBC News'
date: '2024-08-14'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cdjwyz9wn7po
content: |-
  Interview-style videos showing young customers appeared across Lux's social media platforms.

  Lux said it had a two-tier step system for obtaining consent from participants

  A Belfast nightclub has removed a number of videos on its social media pages after concerns were raised about the content and informed consent. Lux on Dunbar Street in the Cathedral Quarter posted interview-style videos under its Fat Wednesdays brand - a club night aimed at students. In the videos, an interviewer asks customers a range of questions such as dating red flags or "naming and shaming" their friends' worst story. The club's management said after listening to concerns from a number of people, it had engaged with the promoter and the videos were being removed.

  Lux in Belfast's Cathedral Quarter has removed a number of videos showcasing young customers being interviewed

  It also said it was stopping any content that is similar and will review the campaign going forward. "This content is suppose to be a bit of fun for students/customers and for the most part that's what it is," a statement said. "They are very popular with our customers as they enjoy being involved in these videos." Green Party councillor Áine Groogan said it was an "incredibly irresponsible campaign" which had been dismissed as a bit of fun. "If you listen to some of the more graphic stuff, it is pretty damaging and there is a question about these young people's ability to consent," she told BBC News NI's Evening Extra programme.

  Lux said the style of promotional video is popular amongst the club's demographic and similar videos had been used across the UK. There is also a "two-tier step" system when it comes to the issue of consent, it added. When customers purchase tickets online, the terms and conditions state they agree to photography and videography of the event "which may include yourself being used across our social media platforms". "Then on the night a follow up consent question is asked by the interviewer," a statement explained on Wednesday. Participants are then asked if consent to the video being shared on social media. "If the answer is no, the videos are deleted and unused."

  The club said staff are trained to cut off customers when they are too intoxicated

  In regard to questions about intoxication, Lux management said security and bar staff are well trained and know when customers have had too much to drink. Customers will be cut off and given water, or taken to a safe space before leaving the venue. "We always take a customers safety & enjoyment as a top priority," it said.

  Áine Groogan said some of those involved were "clearly highly intoxicated" and raised concerns about giving consent to content that could exist online forever. She criticised the club for not thinking of the "lasting impact" of the videos, and that its understanding of consent is "quite concerning". "I really would worry about the potential consequences," Ms Groogan added.

  Áine Groogan said there are questions still to be asked about consent in the videos

  Tegan Nesbitt, who is involved in a number of campaigns affecting young women, said the videos use young people as "marketing probes" for the nightclub. She also said they raise an important issue around libel and slander. Often in the videos full names are used with zero discretion. "It's beyond damaging," she said. "You're not in school anymore, you can be trialled as an adult if you're participating or even sharing these videos so it's extremely, extremely damaging both for the community and personally." Koulla Yiasouma, chief executive of non-profit organisation Parenting Focus, said she felt Lux had a “huge lapse of judgement” in this instance. “I think in 2024, we expect companies to have a greater sense of social responsibility," she told Evening Extra. “I would be fairly confident that most of those young people, in the cold light of day, in sobriety watching those videos will be mortified.”
