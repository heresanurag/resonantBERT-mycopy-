title: 'Newspaper headlines: ''Blood on their hands'' and ''Starmer warns Iran'' -
  BBC News'
date: '2024-08-13'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c9d150xy277o
content: |-
  Tuesday's papers cover the Nottingham attacker's medical history and tensions in the Middle East.

  'Blood on their hands' and 'Starmer warns Iran'

  Ian Coates, Barnaby Webber and Grace O'Malley-Kumar were stabbed to death by Calocane

  A number of the papers react to the report on the failings in the treatment of the Nottingham attacker, Valdo Calocane. "Blood on their hands" is the headline in the Daily Mail, external, quoting the reaction of the families. The paper describes the findings as "devastating". The Daily Mirror's front page says, alongside Calocane's mugshot: "They were told he could kill", external. Emma Webber, whose teenage son Barnaby was among the three people stabbed to death, tells the Sun that she felt "visceral and genuine shock" when reading the report, external. Describing Calocane as "evil, twisted, and vicious", she accuses mental health services of "washing their hands" of him, leaving him free to carry out the attacks.

  The i reports that the government is drawing up plans to evacuate British nationals from across the Middle East, external in the event that an Iranian attack on Israel triggers a wider war in the region. Whitehall sources tell the paper that officials are "really, really concerned” about what they call an "uncontrollable" move towards escalation. According to the Daily Telegraph, such a strike "could come within days", external, possibly before Gaza ceasefire talks resume on Thursday. The former home secretary, James Cleverly, tells the Daily Express that the government needs to "get a grip, and fast" on illegal migration, external, after more than 700 people crossed the Channel in a single day. The Conservative leadership hopeful accuses Sir Keir Starmer of "doing nothing" to "stop the boats". Downing Street insists it is working to "smash the gangs responsible". According to the Telegraph, one way Sir Keir is planning to do that is by working with his Italian counterpart, Giorgia Meloni. The paper says he has expressed support for Ms Meloni's plans to overhaul the EU's police force, external, to make it focus on tackling people smuggling. Sir Keir is said to have floated the idea of officers from the UK conducting joint operations with Europol.

  Sources tell the Financial Times that the Chancellor, Rachel Reeves, is considering turning to the private sector to pay for a £9bn highway and tunnel crossing the Thames, external. The paper says that investors in the Lower Thames Crossing, which is due to link Kent and Essex, would receive returns from the toll road. The Guardian says that Labour MPs are closing their accounts on X, external, formerly known as Twitter, because of what they call the spread of hate and disinformation on the platform. One backbencher tells the paper that the website has become a "megaphone for foreign adversaries and far-right fringe groups" with an unnamed government minister saying they have cut down on posting on the site and are "reluctant to return". And the Times reports on the dying out of an age-old British tradition - a trip to the pub after work. It highlights research by the think tank, the Work Foundation, which suggests that remote working, and a tendency among some younger employees to remain sober, mean that companies should instead host "breakfast socials and away days", external. But, defending a post-work pint in its leader column, the paper says the pub " remains the best place to let off steam, imbibe the wisdom of elders and turn workmates into lifelong friends".

