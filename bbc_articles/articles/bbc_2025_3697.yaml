  Who would you select to start for England in the upcoming World Cup qualifiers in Thomas Tuchel's first matches in charge?

  Pick your England XI for World Cup qualifiers - and fans have their say

  Myles Lewis-Skelly, Jarell Quansah and Dan Burn could all make their England senior debuts - but who would you start?

  England boss Thomas Tuchel has named his first squad with a few surprises. The Three Lions play World Cup qualifiers at Wembley against Albania on 21 March and Lativa three days later. Who would you start in those games, from the squad Tuchel has selected? Would you put Myles Lewis-Skelly, Dan Burn or Jarell Quansah in for an immediate debut at the back? Is there a place for former first-team regulars Jordan Henderson or Marcus Rashford in your team? Has Cole Palmer's form cost him a place in your XI? Pick your team below - and share with your friends on social media.

  The Team Selector cannot be displayed in your browser. Please enable JavaScript or try another browser. Who would you start for England in World Cup qualifiers?

  BBC Sport readers have already been having their say on the squad, with the selection of Ajax midfielder Henderson, 34, a big talking point - and not in a good way. Richard in Kent said: "Rather disappointed with the England squad. It's almost like Southgate hasn't gone. If the answer is Henderson, what was the question?" Mike in Surrey added: "Henderson? Walker? I was hoping to get excited about a New England era. Same old." But Sean said: "Here's a wild idea: maybe, as this is his first England squad, Tuchel wants the experience of Henderson and Walker to help him bed in and get the rest of the team onside. Here's another wild idea: maybe we should give Champions League winner Thomas Tuchel the benefit of the doubt." A few absentees caused some surprise too - mostly with Henderson's call-up still in mind. "So Conor Gallagher is good enough to start and score against Real Madrid but doesn't get in the England squad, but Jordan Henderson does," said Max in Maidstone. Neil in Sale said: "Most bizarre omission is Branthwaite. Literally head and shoulders above all England centre backs this season. Runner up is Gibbs White, who has had a great FULL season as opposed to bit part challengers Foden and Rashford. Henderson getting a recall is just plain weird." Tom added: "Henderson in while leaving out Wharton is frankly laughable. Has Southgate picked the squad for him?"
