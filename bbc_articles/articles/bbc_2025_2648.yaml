  The fight ensued after a local activist disgraced the mayor of Dolton, Illinois, prompting her boyfriend to confront him

  A board of trustees meeting in Thornton Township, Illinois took a turn after activist Jedidiah Brown referred to Tiffany Henyard, the mayor of Dolton, Illinois using an expletive.

  Kamal Woods, the mayor's boyfriend, shouted at Brown and the exchange of punches began.

  There were no reports of serious injuries reported from the fight.

  Brown was confronting Henyard about an investigation into her alleged mismanagement of funds.
