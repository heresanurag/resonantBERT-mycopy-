  Snow drives north on Sunday as bitter conditions are set to return for much of the UK next week.

  Your pictures of Sunday snow across UK

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Snowy Sunday in parts of the UK

  Snow and freezing rain have swept parts of the UK as amber weather warnings remain in place for northern England and Wales on Sunday. Parts of the south saw snow on Saturday night, which has now turned back to rain - but heavy snow is set to continue further north. Frosty conditions are expected to return next week, with forecasters warning of a risk of ice causing treacherous conditions.
