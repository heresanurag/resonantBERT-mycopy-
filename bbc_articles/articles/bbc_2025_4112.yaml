content: |-
  Brian Haw camped out in Parliament Square for nearly 10 years to protest against UK foreign policy.

  Brian Haw camped out in Parliament Square for nearly 10 years to protest against UK and US foreign policy

  A statue of peace campaigner Brian Haw has been unveiled in London. Mr Haw camped out in Parliament Square for nearly 10 years to protest against UK and US foreign policy. He was removed shortly before his death in 2011 aged 62. The statue was unveiled facing the Imperial War Museum in Lambeth by three of his children on Sunday. Actor Sir Mark Rylance, who campaigned for the statue, admired Mr Haw and said he was inspired by his "bright sense of conscience". "His great call was to stop killing the children," said Sir Mark, who is a patron of the Stop the War coalition.

  Mr Haw was closely associated with dissent against the wars in Afghanistan and Iraq

  The actor added: "No matter what conflict we have as adults, they didn't create that conflict and we should find a peaceful way of resolving the conflict." After moving from Redditch in Worcestershire, Mr Haw spent nearly a decade in Parliament Square surrounded by anti-war placards. He bellowed through his megaphone at politicians heading into work and became closely associated with dissent against the wars in both Afghanistan and Iraq.
  • None The man who spent a decade in a tent outside Parliament

  The 72cm bronze statue, sculpted by artist Amanda Ward, sits at the School of Historical Dress just outside the one-mile radius exclusion zone of Parliament created in 2005 in an attempt by authorities to derail Mr Haw's protest. Underneath his likeness are the words: "Stop killing the kids!" Ward said: "I hope to capture in him his determination and his commitment. I'm hoping that he will be remembered and seen as a symbol of peace."

  Sir Mark Rylance said he was inspired by Mr Haw's "bright sense of conscience"

  In February 2023, a group of supporters and friends, including Sir Mark, launched a campaign to create a permanent public reminder of Mr Haw's sacrifice in the name of peace. More than 1,000 members of the public contributed to raise more than £25,000 towards the costs of the statue and its installation.
