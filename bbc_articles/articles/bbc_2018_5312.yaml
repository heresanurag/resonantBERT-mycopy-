id: bbc_2018_5312
title: 'Eurovision: UK''s SuRie carries on after stage invasion - BBC News'
date: '2018-05-13'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-44096520
content: |-
  It is thought the stage invader also stormed January's National Television Awards and The Voice.

  A man stormed the stage, grabbing SuRie's microphone at the competition in Lisbon.

  The singer was left visibly shaken, but managed to complete her performance.

  The European Broadcasting Union said: "The person responsible is currently in police custody." SuRie declined to perform again, saying there was "absolutely no reason to" because she and her team were "extremely proud of her performance".

  It is thought the same man invaded the stage at the National Television Awards this year and The Voice in 2017.
