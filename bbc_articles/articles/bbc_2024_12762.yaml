content: |-
  Each line is named after a different album and drawn in sequin colours.

  The Tube map has been re-envisioned for Taylor Swift's tour

  A new Tube map has been created to coincide with Taylor Swift's Eras Tour which has stopped off in London. Each line is named after a different album and drawn in sequin colours to match. Stations are named after songs such as I Knew You Were Trouble and All Too Well. Gemstones have also been added to reflect locations with links to the pop star which fans can visit, like Wembley Stadium and Hampstead Heath.

  The star is performing a total of 12 nights in London

  Swift is due to play a total of eight nights at Wembley Stadium as part of her tour, with the first on Friday, then Saturday and Sunday. She will then return to the capital for five more dates in August. It means London will host more performances of the Eras Tour than any other city in the world, with nearly 700,000 people attending the shows. Emma Strain, Transport for London’s customer director, said the Tube map "brings two icons together" and pays "homage to Swift's love of London". She added: "London is blessed to have eight dates for The Eras Tour, and we’re encouraging people to get out on the transport network to explore the many locales namechecked in Swift’s songs and see the exciting range of live music events across the city this summer."
