title: Diddy smashed Cassie Ventura's door with hammer, court told - BBC News
date: '2025-05-20'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c8jgedg040go
content: |-
  Sean "Diddy" Combs' sex trafficking trial heard more allegations of violence against his former girlfriend.

  A courtroom sketch of Assistant US Attorney Meredith Foster questioning Kerry Morgan at Sean "Diddy" Combs' sex-trafficking trial

  Sean "Diddy" Combs allegedly used a hammer to try to break into his ex-girlfriend's apartment after the now-infamous assault at an Intercontinental Hotel in 2016, a New York court has heard. Security video of Mr Combs' assault on his then-girlfriend Casandra "Cassie" Ventura has been shown to the jury several times in his sex-trafficking trial. Ms Ventura's former best friend Kerry Morgan on Monday recounted how Mr Combs allegedly tried to smash his way into Ventura's apartment in the aftermath, and described the incident as terrifying. Mr Combs, 55, has pleaded not guilty to racketeering, sex trafficking and transportation to engage in prostitution. He could face life in prison if convicted.

  Ms Morgan told the court she was at Ms Ventura's Los Angeles apartment after the hotel incident and watched through the peephole as Mr Combs was "banging on the door with a hammer". Ms Morgan told the court that as it unfolded, she didn't think Ms Ventura cared if Mr Combs "came in and killed her". Mr Combs did not enter the apartment and police officers arrived about three hours later, Ms Morgan said. No complaint was filed. The court heard more allegations of violent outbursts by the hip-hop mogul. Ms Morgan said that during a vacation in Jamaica, she saw him drag Ms Ventura down a 50-yard hallway by her hair because she was "taking too long in the bathroom". The witness told the court she too had experienced violence at the hands of Mr Combs, alleging he choked her and threw a wooden hanger at her head in 2018 while demanding to know who Ms Ventura was cheating on him with. The court heard Ms Morgan had a concussion and had to go to urgent care. The two women were best friends for 17 years, but after that, their friendship was over, Ms Morgan said. She told the court that Ms Ventura met her at a West Hollywood pizza place about a month later and offered her $30,000 (£22,450) to sign a non-disclosure agreement. They agreed, and have not spoken in the seven years since. "I draw my line at physical abuse," Ms Morgan said. After Ms Morgan stepped down from the witness stand, David James, the former personal assistant of Mr Combs, testified. Mr James, who told the court he often worked 20 hours a day for six to seven days a week, was once shown a photograph of Mr Combs at his Bad Boy Entertainment office and a high-ranking staff member told him "this is Mr Combs' kingdom. We're all here to serve it". The former assistant also recounted a conversation he overheard in Manhattan, when he was in an Escalade SUV with Combs and some of his entourage. When a friend asked how Ms Ventura was, Mr Combs allegedly said: "Cassie's good. I got her right where I want her, she's young". "He said she was very mouldable," Mr James recalls his boss saying. The trial will continue on Tuesday with Mr James on the witness stand.
