  But former cabinet minister Iain Duncan Smith, who campaigned for Brexit, questioned why the UK had gone for a plan which "was so obviously not going to cut the mustard with the EU".

  He added that the EU had "behaved appallingly" towards Mrs May and he described Mr Tusk's Instagram photograph as "quite insulting".

  The UK and EU are trying to reach a deal in time and want to avoid a hard border - physical infrastructure like cameras or guard posts - between Northern Ireland and the Irish Republic but cannot agree on how.

  The EU insists on its own "legally binding Irish backstop" - what it describes as an insurance policy to prevent a hard border, if no other solution can be found.

  Theresa May and her government have been trying to pursue a middle way, to find a stance between the basic options - a close "Norway style", or free trade deal roughly like Canada.

  It feels that the search for something else has been in vain.

  Sources on the EU side express irritation at the UK's approach, at what they see as the strident tone the prime minister took in the last 48 hours.

  The European Council is not the same as Prime Minister's Questions, it's suggested.

  But to kick out publicly as they did in Salzburg certainly runs the risk of pushing Mrs May too far.

  It suggests Northern Ireland should stay aligned with the EU in key areas, in effect staying in the customs union and single market. But the UK says this is unacceptable as it would split Northern Ireland from the rest of the UK.

  Transport Secretary Chris Grayling told BBC Newsnight: "At the moment what the European Union is asking in and around Northern Ireland is simply impossible for any UK government to accept. And actually if they stick with that position, there will be no deal."

  Mrs May has said the UK will come forward "shortly" with new proposals on the so-called "backstop" arrangements, but also insisted Chequers was the "only serious and credible proposition" for an overall deal.

