  Scotland's First Minister Nicola Sturgeon tweeted: "Now that the EU has explicitly rejected it, the Chequers pretence has to stop.

  "At the very least, single market/customs union membership must be back on the table and the Article 50 clock [the time-limited process taking Britain out of the EU] must be stopped to avoid a cliff edge."

  Shadow Brexit secretary Sir Keir Starmer told the BBC that if the negotiations ended without a deal, it "would be catastrophic for our economy, plunging it into real crisis".

  "Really, the next few weeks should be all about how does the prime minister avoid that," he told the BBC.

  "She needs to accept that we need a customs union and a strong single market deal, both for the Northern Ireland border and for our economy."

  Leading Conservative Remainer Dominic Grieve said he believed a deal would be offered but one that would be "very difficult" for the UK to accept - "which is why we are going to have to reconsider what we are doing".

  He said the EU could only show limited flexibility towards a non-member: "We are asking for something that the EU, as an international treaty organisation, cannot readily give us."

  Mr Tusk said on Thursday that October would be the "moment of truth" for reaching a deal, and that "if the conditions are there" an additional summit would be held in November to "formalise" it.

  Meanwhile, pro-European Scottish politicians seeking a ruling on whether Brexit can be halted have been given permission to take their case to Europe's highest court.

  The cross-party group of politicians argue that Article 50 can be revoked if MPs vote to do so.

  They won an appeal at the Court of Session in Edinburgh, Scotland's highest court, and the European Court of Justice will be asked to give a definitive ruling.
