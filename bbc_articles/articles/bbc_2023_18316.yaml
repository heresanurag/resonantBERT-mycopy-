title: Police trace woman who was 'carried into vehicle' in Dundee - BBC News
date: '2023-12-03'
section: Tayside and Central Scotland
url: http://www.bbc.co.uk/news/uk-scotland-tayside-central-67606593
content: |-
  Detectives have traced a woman after issuing an appeal following a street disturbance in Dundee.

  Police Scotland had earlier released an image of the vehicle the woman was driven off in

  Detectives have traced a woman who was "carried into a vehicle" after issuing an appeal following a street disturbance in Dundee.

  Officers said the incident happened on Turnberry Avenue at about 23:50 on Saturday.

  Police Scotland earlier released an image of a dark Range Rover, which was last seen on the A90, and said they were concerned for the woman's welfare.

  But the force later confirmed she had been located safe and well.

