title: Brookside star Philip Foster jailed for modelling fraud - BBC News
date: '2025-03-02'
section: England
url: http://www.bbc.co.uk/news/articles/c86pj0dg7ejo
content: |-
  Foster, who played Christian Wright, gets a jail term of more than eight years but remains at large.

  A former Brookside actor who masterminded a £13.6million fraud operation that conned thousands of would-be models has been jailed. Philip Foster, 49, who played Christian Wright in the Liverpool soap, ran a network of fake modelling agencies for more than eight years. Foster, who lived in Marbella, Spain, was given an eight-and-a-half-year prison sentence at Sheffield Crown Court on Friday for conspiracy to defraud. Eight other people were sentenced in relation to the fraud and an arrest warrant was issued for Foster and an associate after both failed to appear in court.

  More than 6,000 victims parted with money on the false promise of securing paid modelling work from Foster, whose address was given as Chermside Road, Liverpool, but who operated from his base in Spain. He used a network of associates in England to operate a string of sham modelling agencies and photography studios in cities including London, Manchester, Leeds, Bristol, Coventry and Nottingham. The scam was uncovered in a six-year investigation by National Trading Standards (NTS). After sentencing, NTS chairman Lord Bichard said Foster's "cruel exploits left thousands of victims in serious debt, causing lasting emotional distress and significant financial pressures".

  Victims first received emails telling them they had potential after they responded to a social media advertising campaign. They were invited to a "free" test shoot at a photographic studio where they were handed glossy brochures and told they had passed their studio test, but would need to buy a portfolio of images for the modelling agencies who were interested in them. Some victims used credit deals arranged by the fraudsters or expensive payday loans to make the upfront payment. In return, they got poor quality digital photographs which stood no real chance of landing them professional jobs and most did not get paid modelling work.

  Eight other defendants received jail terms or suspended prison sentences

  The sham agencies, which paid no tax, existed for short periods before being dissolved and rebranded. Money from the scam was laundered through UK bank accounts before being transferred to Spain, or carried in cash on commercial flights by co-conspirators, the NTS said. North Yorkshire councillor Greg White said: "Foster and his fellow scammers cruelly exploited young hopefuls trying to break into one of the most competitive industries. "In some cases, parents borrowed money or sacrificed savings believing they were investing in their children's futures." Foster bought high-end watches and cars with his share of the proceeds, while many victims told NTS investigators they had been left financially and emotionally devastated and felt humiliated and betrayed. Some experienced lasting distress that affected their confidence, wellbeing and ability to trust others, the court heard.

  The other defendants sentenced for conspiracy to defraud were:
  • None Michael Foster, 27, of Florence Gardens in Hereford and who failed to turn up to court, was jailed for three and a half years
  • None Lisa Foster, 42, of Manchester Road in Astley, was given an 18-month suspended prison sentence
  • None Atif Qadar, 44, of Larkswood Drive in Crowthorne, got a suspended 12-month prison sentence Additionally, the following sentences were passed for charges relating to money laundering:
  • None Paul Evans, 39, of no known address, jailed for three and a half years

