  In a statement, President Donald Trump said his administration was "totally engaged". "So sad to see the plane go down in Philadelphia, Pennsylvania. More innocent souls lost," he said. Mexican President Claudia Sheinbaum said she "mourns the passing of six Mexicans in the aviation accident", in a statement translated from Spanish. "My solidarity is with their loved ones and friends," she added. The Mexican foreign ministry said personnel at the country's consulate in Philadelphia were in contact with next-of-kin.

  This crash comes just two days after a much larger collision happened between a commercial jet and a military helicopter in Washington DC, where officials believe all 67 people aboard both aircraft were killed. It was the deadliest plane crash in the US in more than 20 years. Ms Homendy said on Saturday her agency was "highly skilled" and it was "not unusual for the NTSB to be investigating two major accidents".

