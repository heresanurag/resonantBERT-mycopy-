title: Watch video footage shown to jurors in Sycamore Gap tree trial - BBC News
date: '2025-05-01'
section: General
url: http://www.bbc.co.uk/news/videos/c75dg9ry41go
content: |-
  The BBC's Emma Vardy talks through the footage shown in court as two men are accused of illegally chopping down the tree.

  Jurors were shown mobile phone footage in court on Wednesday, which prosecutors claim shows the moment the "iconic" Sycamore Gap tree was felled.

  Body-worn camera footage from the first police officer at the scene was also shown at Newcastle Crown Court.

  The BBC's Emma Vardy talks through the footage shown in court and explains what prosecutors say happened on the evening the tree was felled.

  The tree had stood for more than 100 years in a dip on Hadrian's Wall in Northumberland before it was felled in a "moronic mission" in the early hours of 28 September 2023, Newcastle Crown Court heard.

  Daniel Michael Graham, 39, from Carlisle and Adam Carruthers, 32, from Wigton in Cumbria, each deny two counts of criminal damage relating to the tree and the Roman wall.

  More on this story.
