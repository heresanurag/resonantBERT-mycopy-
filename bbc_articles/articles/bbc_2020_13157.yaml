id: bbc_2020_13157
title: 'Turkey earthquake: Search for survivors continues - BBC News'
date: '2020-11-01'
section: General
url: http://www.bbc.co.uk/news/world-europe-54764386
content: |-
  Rescuers workers have pulled people from the rubble in Izmir after Friday's powerful earthquake.

  The search for survivors in Izmir, Turkey continues after a powerful earthquake on Friday.

  Work continued through the night to search for survivors in buildings that were destroyed as a result of the earthquake.

  Around 100 survivors have been pulled out alive from the rubble so far, Turkey's Environment and Urbanisation Minister Murat Kurum told reporters.

  However many people are still trapped and aftershocks have hampered rescue workers.
