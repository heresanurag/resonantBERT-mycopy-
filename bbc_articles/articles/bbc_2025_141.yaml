title: Blue plaque marks Sheffield FC's first away game - BBC News
date: '2025-01-02'
section: England
url: http://www.bbc.co.uk/news/articles/c1keyl4enjvo
content: |-
  Sheffield FC played its first away match in Nottingham in 1865.

  Stephen Wood and John Clarke from Sheffield Home of Football have ambitious plans for Sheffield to be recognised as the home of football

  A new blue plaque has been unveiled at the Wicker Arches in Sheffield to mark the 160th anniversary of Sheffield FC's first away game. On 2 January 1865 a party from Sheffield FC boarded a train from the nearby station to travel to Nottingham where they played Nottinghamshire. This is the latest in a number of plaques unveiled by the charity Sheffield Home of Football (SHOF). The game itself was played at Meadows Cricket Ground in Nottingham. The Nottinghamshire team which went on to become Notts County had only formed the previous month at the George Hotel.

  Sheffield Football Club, which was founded in 1857, won the game 1-0. The blue plaque has been fixed to an archway on Walker Street in the Wicker area of Sheffield. Listen to highlights from South Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
