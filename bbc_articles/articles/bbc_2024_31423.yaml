content: |-
  The French president spoke to residents on Mayotte while touring the devastation caused by Cyclone Chido.

  French President Emmanuel Macron spoke to a booing crowd in Mayotte, while touring the devastation caused by Cyclone Chido.

  "I had nothing to do with the cyclone," Macron said. "You can blame me, but it wasn't me."

  The territory, located north of Madagascar, is the poorest part of France. It suffers from extensive social and economic problems, including high rates of illegal immigration from neighbouring Comoros and poor-quality housing and public services.
