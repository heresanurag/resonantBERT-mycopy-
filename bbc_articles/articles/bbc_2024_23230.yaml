title: Met officers accused of gross misconduct over Sarah Everard case - BBC News
date: '2024-09-26'
section: London
url: http://www.bbc.co.uk/news/articles/c749nj43222o
content: |-
  Met Police officers face misconduct hearings for unnecessarily looking at files about Ms Everard.

  Sarah Everard was was kidnapped, raped and murdered in 2021 by a Met officer

  Seven Metropolitan Police officers face a gross misconduct hearing next month for accessing files relating to the case of Sarah Everard. Ms Everard, 33, was kidnapped, raped and murdered in 2021 by Met officer Wayne Couzens as she walked home from a friend's house in Clapham, south London. Five serving officers and two who have resigned were found to have accessed the information, allegedly without proper policing purpose. All of the serving officers under investigation have been placed on restricted duties.

  PCs Myles McHugh and Clare Tett, Det Con Tyrone Ward, Det Sgt Robert Butters and Sgt Mark Harper - and former officers trainee Det Con Hannah Rebbeck and Insp Akinwale Ajose-Adeogun - will answer allegations that their conduct breached the Met's standards of professional behaviour, in respect of confidentiality, discreditable conduct, and orders and instructions. It is alleged that each of the seven individuals accessed a police system relating to Ms Everard's case between 5 and 15 March 2021, some on multiple occasions, and that this was not undertaken in the course of their duties. The Met said it would not be making any comment prior to or while proceedings were taking place, but added the allegations were serious enough to justify dismissal. 16 October 2024: This article has been amended to reflect the nature of the officers’ access to the files has yet to be determined
