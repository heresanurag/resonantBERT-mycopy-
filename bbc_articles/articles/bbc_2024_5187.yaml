title: Overtaking van narrowly avoids crash in Cambridgeshire - BBC News
date: '2024-03-20'
section: General
url: http://www.bbc.co.uk/news/uk-england-cambridgeshire-68600639
content: |-
  Dashcam footage shows other drivers swerving out of the way to avoid a collision.

  Dashcam footage showed an overtaking van driver narrowly avoiding head-on collisions with other vehicles.

  Albert Loveridge, 63, can be seen moving back on to the correct side of the carriageway while a car and another van swerve out of his way.

  Cambridgeshire Police said it received a report that a white van had crashed into a hedgerow shortly afterwards.

  It happened on the A10 between Chittering and Stretham on 16 February.

  Loveridge, of Church Road, Wicken, near Ely, admitted dangerous driving, driving while disqualified and driving without insurance.

  He was sentenced at Cambridge Crown Court on 13 March and disqualified from driving for six years, given a 12-month community order and must pay a £500 fine.

