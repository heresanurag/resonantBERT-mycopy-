title: Why British Muslims care about Jerusalem - BBC News
date: '2017-12-09'
section: General
url: http://www.bbc.co.uk/news/uk-42289551
content: |-
  After Donald Trump officially recognised the city as Israel's capital, UK Muslims tell us why that matters.

  This week US President Donald Trump said his country would officially recognise Jerusalem as the capital of Israel, reversing decades of American policy.

  Israelis (predominantly Jewish) and Palestinians (predominantly Muslim) have been in conflict for years over the city.

  We asked Muslims in Bradford, which has one of the UK's largest Muslim populations, whether Jerusalem matters to them.
