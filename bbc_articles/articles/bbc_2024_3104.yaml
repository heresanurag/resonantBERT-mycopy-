content: |-
  A CBS journalist was about to go live when he and his crew heard multiple loud bangs coming from the crowd.

  A CBS news journalist, one of BBC News' partners, was about to go live when he and his crew heard multiple bangs coming from the crowd - thought to be gunshots.

