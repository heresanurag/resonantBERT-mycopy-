title: 'Dan Bongino: Trump names podcaster as deputy FBI director - BBC News'
date: '2025-02-25'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cpwd2qrn1e2o
content: |-
  The former New York City police officer will supervise daily operations and serve under new FBI director Kash Patel.

  US President Donald Trump has appointed podcaster and commentator Dan Bongino as deputy director of the FBI. Trump posted on social media that Bongino was "a man of incredible love and passion for our Country" and would serve under newly confirmed FBI Director Kash Patel. Bongino, 50, who has worked for the New York police department and the Secret Service, is a staunch Trump ally who has pushed false claims about the 2020 election. His appointment, which does not require Senate confirmation, means neither of the top two people running the agency has FBI experience.

  "Thank you Mr President," Bongino wrote on social media on Sunday night. The deputy director, who is responsible for supervising all domestic and international operations, is usually a career agent with years of experience. Bongino hosts daily podcast The Dan Bongino Show, whose Facebook posts often attract more attention than those of Fox News and CNN combined. In Friday's episode there was a segment about the FBI, in which he praised Patel and tried to allay Democratic fears the agency will be used to target Trump's enemies.
  • None Who is Kash Patel, the new FBI boss?
  • None Has Trump kept his day one promises? "Kash Patel is there for one reason, he is there to make the FBI great again," he said. He's committed to fighting crime and only that, he added, calling his new boss the "change agent" the FBI needs. "How amazing would it be in four years to look back with a good, high-quality, reformed FBI free of woke culture and DEI that goes out making headline, big arrests of real bad guys destroying your community. How good would that be?"

