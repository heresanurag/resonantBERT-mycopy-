title: 'Premier League Darts: Nathan Aspinall wins night five in Exeter - BBC Sport'
date: '2024-03-01'
section: Darts
url: http://www.bbc.co.uk/sport/darts/68442284
content: |-
  Nathan Aspinall beats Rob Cross to claim a maximum five points from night five of Premier League Darts in Exeter.

  Nathan Aspinall reached the Premier League final in 2020 but lost on that occasion to Glen Durrant

  Nathan Aspinall thrashed Rob Cross to claim a maximum five points from night five of Premier League Darts in Exeter. Aspinall defeated his fellow Englishman 6-2, having reached his second straight nightly final by beating Peter Wright and world champion Luke Humphries. Cross is third in the league table courtesy of his first appearance in a final in this year's event. Michael van Gerwen's lead in the table was reduced to six points following his quarter-final loss to Humphries. Van Gerwen was bidding for a fourth successive night win after triumphs in Berlin, Glasgow and Newcastle, but was beaten 6-3 in the opening quarter-final. Aspinall failed to win a match in the first three weeks of the competition, but two final appearances in a row have catapulted him into the top four. He told Sky Sports: "I'm just very happy. In the past two weeks, I've really dug deep. "Everyone knows I'm a fighter. I've been down for the first three weeks, but a final and a win in the past two weeks - I'm over the moon."

  Cross had looked in imperious form in a 6-1 quarter-final success against Gerwyn Price and he followed that by beating teenager Luke Littler 6-3 in his semi-final. But he started slowly in the final, losing the first five legs, with Aspinall landing a 160 checkout to move within one leg of victory. Former world champion Cross added some respectability to the score, but Aspinall eventually closed out a comfortable win. The eight Premier League competitors will next be in action in Minehead at the UK Open, which starts on Friday. Often described as "the FA Cup of darts", players enter at various stages of the tournament based on their ranking, but are not seeded and can be paired with any other player in an open draw. World number four Aspinall won the UK Open in 2019 and added: "That started my career. I've got fond memories of Minehead. "What a fantastic start to the weekend. I'm on cloud nine. Fingers crossed, I get a nice draw on Friday and I can win another major."

