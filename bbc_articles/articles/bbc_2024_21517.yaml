  Aaron Rodgers' return from injury ends in defeat as the San Francisco 49ers beat the New York Jets 32-19 in the NFL at Levi's Stadium in California.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Aaron Rodgers' return from injury ended in defeat as the New York Jets lost 32-19 to the San Francisco 49ers at Levi's Stadium in California. Rodgers was back on the field almost a year after tearing his Achilles on his Jets debut, which ruled him out for the whole of last season. The 40-year-old quarterback, who won four NFL MVPs in his time with the Green Bay Packers, threw for 167 yards, with one touchdown and an interception on Monday night, but it was not enough to overcome last year's Super Bowl runners-up. "It felt great," said Rodgers. "A lot of gratitude just to be back in pads. So many people helped me get to this spot. "I'm really thankful for my surgeon, my loved ones, my friends, the staff and the training staff to help me get back. Obviously I wanted to take a shot and feel the physicality of it. "Once I threw a couple of balls and took a shot, it felt good." The home team had to secure the win without running back Christian McCaffrey, who was ruled out shortly before kick-off. The 28-year-old did not play because of a calf and Achilles injury. That left an opportunity for Jordan Mason, who started a game for the first time in what is his third NFL season. He finished with an impressive 28 carries for 147 yards and a touchdown. Mason was not the only 49er to shine, with Jake Moody also adding a franchise-record-tying six field goals.

  Ricky Pearsall was shot in the chest just over a week ago

  49ers wide receiver Ricky Pearsall was also in attendance at the game, just 10 days after he was shot in San Francisco. Pearsall was pictured with the first responders who helped him. The 24-year-old was taken to hospital and released the following day. A 17-year-old is in custody after being charged with attempted murder and robbery.
