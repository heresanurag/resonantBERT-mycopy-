  How I overcame anorexia and what to look for if you're worried someone you know has an eating disorder

  Rebecca was anorexic and bulimic for 12 years.

  She explains what helped her and what didn't, as well as some of the signs people can look for if they're worried someone they know may have an eating disorder.

  Rebecca's story was featured on Trust Me I'm A Doctor on BBC Two - @BBCTrustMe on Twitter

