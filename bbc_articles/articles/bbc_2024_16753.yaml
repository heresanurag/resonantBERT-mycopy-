title: 'Newspaper headlines: ''Council house revolution'' and ''£20bn black hole''
  - BBC News'
date: '2024-07-27'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c4ng3l4py67o
content: |-
  Headlines include Labour pledging to kickstart home building and a reported shortfall in public finances.

  "Council house revolution" is the headline in the Sunday Mirror. It says Labour will reveal plans on Tuesday for the biggest building programme of council and affordable housing, external in decades. The paper's editorial says the party is "right to do whatever it takes to put a decent roof over the heads of all who need it". Deputy Prime Minister Angela Rayner tells the Observer that "local leaders who know their areas best" will be key to delivering the proposals, external. The Sunday Express has a positive assessment of Dame Priti Patel's bid, external to become the next leader of the Conservatives. The paper says the former home secretary has "constructed a compelling argument" for uniting the party in order to focus on the issues that matter to voters. The Sun on Sunday has spoken to an insider with knowledge of another leadership hopeful's campaign. They say Robert Jenrick will offer "the politics of Nigel Farage with the presentation of David Cameron", when he delivers a key speech this week.

  The Sunday Telegraph says Sir Keir Starmer has discussed the possibility of a youth free movement deal, external with the Spanish Prime Minister, Pedro Sánchez. A government source cautions against over-interpreting Sir Keir's openness to the idea - saying he might have just been polite when meeting leaders for the first time. Pat McFadden, a senior member of Sir Keir's cabinet, has written in the Sunday Telegraph, external ahead of a Treasury statement about the health of the public finances on Monday. He says one of his first acts as head of the Cabinet Office was to get a "thorough analysis" of the state of government departments. Mr McFadden tells the paper he found "announcements without proper funding" and "long-term spending pressures piling up without a serious plan to address them". But the Mail on Sunday calls the government "blazingly dishonest", external. It says Labour's claims that they were unaware of the true state of the nation's accounts before taking office are "quite astonishing".

  The Observer says former Strictly Come Dancing production staff have complained about a "toxic" working culture, external, in what it calls a "fresh blow" for the show. Former crew members have accused the BBC of failing to take their complaints seriously. The corporation says it does not recognise the claims relating to a negative workplace culture. The Sunday Times has the first interview with the British tech tycoon Mike Lynch, external since his return from the US, where he has spent 13 months under house arrest. A court in California cleared him of fraud and conspiracy charges relating to the sale of his software company to the technology giant Hewlett-Packard. He is calling for an overhaul of the extradition treaty between America and Britain, which critics say is onesided. The paper says he was "put in chains" and bundled into the back row of a passenger plane, when he was handed over to US marshals at Heathrow Airport.

