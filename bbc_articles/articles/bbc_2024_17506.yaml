  Read Sir Keir Starmer's full speech from outside No 10, after Labour won the 2024 General Election.

  'Work of change begins' - Keir Starmer's No 10 speech in full

  The new prime minister Sir Keir Starmer has delivered his first speech outside Number 10 Downing Street after Labour's landslide victory over the Conservatives. Here it is in full.

  I have just returned from Buckingham Palace where I accepted an invitation from His Majesty the King to form the next government of this great nation. I want to thank the outgoing prime minister, Rishi Sunak, for his achievement as the first British Asian prime minister of our country. The extra effort that will have required should not be underestimated by anyone. We pay tribute to that today. And we also recognise the dedication and hard work he brought to his leadership. But now our country has voted, decisively. For change. For national renewal. And a return of politics to public service. When the gap between the sacrifices made by people and the service they receive from politicians grows this big, it leads to a weariness in the heart of a nation. A draining away of the hope, the spirit, the belief in a better future that we need to move forward, together. Now, this wound, this lack of trust, can only be healed by actions not words. I know that. But we can make a start today with the simple acknowledgment that public service is a privilege. And that your government should treat every single person in this country with respect. If you voted for Labour yesterday we will carry the responsibility of your trust, as we rebuild our country.

  But whether you voted Labour or not - in fact especially if you did not - I say to you, directly: My government will serve you. Politics can be a force for good - we will show that. And that is how we will govern. Yet, if I’m honest, service is merely a pre-condition for hope. And it is surely clear to everyone that our country needs a bigger reset, a rediscovery of who we are. Because no matter how fierce the storms of history, one of the great strengths of this nation has always been our ability to navigate a way through to calmer waters. And yet this depends upon politicians - particularly those who stand for stability and moderation - as I do - recognising when we must change course. For too long now we have turned a blind eye as millions slid into greater insecurity. Nurses, builders, drivers, carers, people doing the right thing, working harder than ever, have been recognised at moments like this before. Yet as soon as the cameras stop rolling, their lives are ignored. I want to say very clearly to those people - not this time. Changing a country is not like flicking a switch. And the world is now a more volatile place. But have no doubt that the work of change begins - immediately. Have no doubt - that we will rebuild Britain, with wealth created in every community. Our NHS back on its feet, facing the future. Secure borders. Safer streets. Everyone treated with dignity and respect at work. The opportunity of clean British power. Cutting your energy bills for good. And, brick by brick, we will rebuild the infrastructure of opportunity. The world class schools and colleges, the affordable homes that I know are the ingredients of hope for working people, the security that working class families like mine could build their lives around. Because if I asked you now whether you believe that Britain will be better for your children, I know too many of you would say no. And so my government will fight, every day, until you believe again. From now on, you have a government unburdened by doctrine, guided only by a determination to serve your interests. To defy, quietly, those who have written our country off. You have given us a clear mandate and we will use it to deliver change. To restore service and respect to politics, end the era of noisy performance, tread more lightly on your lives. And to unite our country, four nations standing together again. Facing down, as we have so often in our past, the challenges of an insecure world... So with respect and humility, I invite you all to join this government of service in the mission of national renewal. Our work is urgent. And we begin it today.
