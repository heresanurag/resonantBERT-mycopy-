content: |-
  Cyclists pass through Derbyshire and Nottinghamshire towns in stage four of the race.

  Cyclists competing in the Tour of Britain 2024 have passed through a number of Derbyshire and Nottinghamshire towns in stage four of the race.

  The competitors set off from Derby Arena on Friday morning and cycled a total of 86.06 miles (138.5km), passing through towns including Elvaston, Heanor and Southwell before they crossed the finish line in Newark-on-Trent.

  Frenchman Paul Magnier, 20, from team Soudal Quick-Step won the stage - his second in four days as he edged across the line in a bunched finish.

  The tour is now set to move to Northamptonshire for stage five, for a ride of 91.28 miles (146.9km) around the county.

