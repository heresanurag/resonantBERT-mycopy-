title: 'Zara Aleena: ''Paperwork delayed recalling Jordan McSweeney to prison'' -
  BBC News'
date: '2024-06-05'
section: London
url: http://www.bbc.co.uk/news/articles/c3gg4rw2q1yo
content: |-
  The inquest into Zara Aleena's murder hears paperwork to recall Jordan McSweeney to prison was delayed.

  Zara Aleena's family say the system failed them

  There were delays in recalling Zara Aleena’s murderer to prison days before he killed her, an inquest has heard. Jordan McSweeney, a sexual predator with 28 previous convictions, killed the 35-year-old law graduate as she walked home from a night out in Ilford, east London, early on 26 June 2022. He had been released from prison on licence nine days before. After breaching the conditions of his licence, his recall to prison was initiated on 22 June but the paperwork was not signed until two days later.

  East London Coroner's Court heard police were then given powers to arrest him at 16:00 BST that same day, 24 June. He had been in prison for criminal damage, racially aggravated harassment and unauthorised possession of a knife. Rajeev Thacker, barrister for Ms Aleena's family, put to Kim Thornden-Edwards, chief probation officer for England and Wales, there were delays in sending the paperwork to initiate the recall of McSweeney, to which she replied "correct". Ms Thornden-Edwards also accepted that there were delays in allocating a probation officer to McSweeney.

  Ms Aleena's aunt, Farah Naz, gave evidence to the inquest on Monday

  The court also heard from Annie Rudge, a probation service officer, who told the court that prior to McSweeney's release from prison in 2020, she did not have any direct contact with him. "The partnerships would have spoken about his case before he was released, but I don't remember having any direct contact with Mr McSweeney prior to his release," she said. The inquest heard McSweeney had previously been assessed as being of medium risk of reoffending to cause serious harm.

  17 June - McSweeney leaves prison on licence but fails to attend a probation appointment 24 June - In the afternoon, the police are told McSweeney has been recalled 25 June - In the early hours, officers visit McSweeney's mother's house to arrest him - but he is not there

  Ms Aleena's aunt, Farah Naz, told the jury on Monday the family was "tortured by thoughts that (Zara's) death was preventable and that our state system that we entrusted failed our Zara, failed us". She added that her niece's murder highlighted "the crumbling justice system that is meant to protect all of us, especially women and girls". McSweeney was handed a life sentence with a minimum term of 38 years at the Old Bailey in December 2022 after admitting Ms Aleena's murder and sexual assault. In November 2023, he won a Court of Appeal bid to reduce the minimum term of his life sentence.
