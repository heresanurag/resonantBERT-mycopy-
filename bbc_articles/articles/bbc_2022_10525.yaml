title: Man arrested after girl, 7, abducted in Droylsden and sexually assaulted -
  BBC News
date: '2022-08-18'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-62581476
content: |-
  Police arrest a 35-year-old man on suspicion of abduction and sexual assault in Greater Manchester.

  Police said the girl was believed to have been taken by a man on Warne Avenue and into a wooded area

  A man has been arrested on suspicion of abducting and sexually assaulting a seven-year-old girl, police have said.

  Greater Manchester Police said the girl was thought to have been taken into woods in Droylsden at about 16:00 BST on Wednesday.

  She was safely reunited with her family shortly after.

  The force has released CCTV images of a second man they want to speak to who was acting suspiciously in the area at the time.

  Officers have released CCTV images of another man they are searching for

  A spokesman said the girl was believed to have been taken by a man on Warne Avenue and into a wooded area near to a disused railway track towards Manchester Road.

  He said she was sexually assaulted before being taken back to the woods and she then found her own way to a nearby park.

  He said a 35-year-old man had been taken into custody for questioning.

  He added that a search was continuing regarding the second man and anyone with information about him should contact police.

