  That's when one of the key events in the whole mission occurs.

  Engineers are most concerned to learn that Orion's heatshield will cope with the extreme temperatures it will encounter on re-entry to our planet's atmosphere.

  The capsule will be coming in very fast - at 38,000km/h (24,000mph), or 32 times the speed of sound.

  A shield on its underside must cope with temperatures approaching 3,000C.

  Artwork: The upper-stage of the rocket put the Orion capsule on a path to the Moon

  The rocket headed high and east from Kennedy, out over the Atlantic Ocean

  The United Kingdom is playing its part in the Artemis adventure, and not just as a member state of the European Space Agency.

  On Wednesday, the Goonhilly Earth Station in Cornwall picked up the Orion ship's radio signal as it came off the top of the rocket. By analysing the shift in frequencies as the capsule moved through space, it enabled Nasa to more accurately calculate the trajectory for a later course correction.

  Goonhilly will be sending commands to six of the 10 small satellites that were also lofted by the SLS rocket.

  "We started our company here less than 12 years ago with an ambition to do deep space communication," explained Goonhilly CEO Ian Jones.

  "We thought we'd be picking up scraps here and there by now, not to be actually commanding spacecraft on Nasa's first return to the Moon, which is brilliant."

  Goonhilly tracked the Orion capsule across the sky, helping Nasa to work out its exact path

  Goonhilly will also be sending commands to small satellites launched with Orion

  Huge crowds gathered in and around the Kennedy Space Center to watch the launch

  The SLS produces 39 meganewtons, or 8.8 million pounds, of thrust off the pad
