title: Ancient trees dedicated to Queen for Platinum Jubilee - BBC News
date: '2022-05-01'
section: UK
url: http://www.bbc.co.uk/news/uk-61286592
content: |-
  Sir Isaac Newton's apple tree is among those included in the project launched by Prince Charles.

  Prince Charles announced a project to protect 70 ancient woodlands and 70 trees to mark the Queen's Jubilee

  The Prince of Wales has urged people to protect "dwindling" ancient trees in honour of the Queen's Platinum Jubilee.

  A network of 70 ancient woodlands and 70 ancient trees is being dedicated to the Queen, marking her 70-year reign.

  The woodland that inspired the 100 Acre Wood in Winnie the Pooh and the apple tree where Sir Isaac Newton discovered gravity are among those included.

  We need to "protect the precious ancient woodland habitats for generations to come", the prince said.

  The Queen's Green Canopy, of which Prince Charles is patron, has been encouraging people to plant a tree for the Jubilee and create a legacy to the Queen.

  "If we are to create the ancient trees of the future we must plant more trees and hedgerows, in fields, churchyards and avenues," the prince added.

  As Prince Charles unveiled the collection of woodlands and trees due to be protected across the UK, he asked for the "dwindling" historic natural habitat to be renewed.

  He said woodlands and trees do not only exist for "everyone to enjoy", but also to support biodiversity and provide materials for craft workers.

  The dedication of ancient trees and woodlands aims to honour the Queen and raise awareness of the importance of conserving ancient trees and woodlands.

  Prince Charles said their steadfast and reassuring presence was "a reminder of our long-serving sovereign and her enduring dedication".

  "Let us ensure that in her name we can now protect and strengthen this wonderful living canopy for the next 70 years and, hopefully, way beyond," he added.

  The ancient trunks of the yews framing the North Door of St Edward’s Church, Stow-on-the-Wold, are said to have inspired the magical Doors of Durin in JRR Tolkien’s The Fellowship of the Ring

  Under an apple tree at Woolsthorpe Manor in Lincolnshire, Isaac Newton wondered why objects always fall downwards

  The Crom Castle Yew, County Fermanagh, is a female yew conjoined with a much younger male tree

  The range of locations - from rural to urban - being dedicated to the monarch reflects "the unique diversity of all corners of the United Kingdom", he said.

  The chosen locations also reflect a range of themes including history, children, education, creative arts and science.

  Prince Charles launched the project in a video message recorded under one of the ancient trees. The old Sycamore tree at Dumfries House in Scotland was planted around the reigns of Queen Elizabeth I and King James VI.

  "It is remarkable that this ancient tree is as old as Shakespeare's Hamlet and Caravaggio's David and Goliath," he said.

  The Birks of Aberfeldy, near the Falls of Moness, was immortalised in song by the poet Robert Burns

  The so-called Pulpit Yew in St James Churchyard, Denbighshire, is home to a flight of steps leading to a seat and podium within the hollow of the tree

  He said more than one million trees had already been planted as part of the "treebilee" campaign for the jubilee.

  It has also been announced that primary school children in the UK will be given a book to mark the jubilee, which includes famous quotes from the Queen and details about significant Commonwealth figures such as Nelson Mandela.

  The book will be handed out to children in state-funded primary schools, the Department of Education said.
