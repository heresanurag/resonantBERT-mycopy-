title: Two British Thomas Cook holidaymakers die in Egypt - BBC News
date: '2018-08-23'
section: Lancashire
url: http://www.bbc.co.uk/news/uk-england-lancashire-45282947
content: |-
  The British holidaymakers died in Hurghada, Thomas Cook says, as an investigation is launched.

  Two British holidaymakers have died in Egypt, a travel company has said.

  John Cooper, 69, and wife Susan, 63, from Burnley, Lancashire, died at the hotel Steigenberger Aqua Magic, in Hurghada on the Red Sea.

  Mrs Cooper who worked at a branch of travel firm Thomas Cook in Burnley, was described as "loyal and long-serving" member of staff by the company.

  The company said it was "deeply saddened", adding it was supporting the couple's family.

  It said it was also working with the hotel and local authorities.

  The Foreign Office said it was in contact with the local tour operator.

  Hurghada is a resort on the Red Sea

  No further details about the deaths have been released.

