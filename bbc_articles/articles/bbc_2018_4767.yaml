id: bbc_2018_4767
title: Trump promises 'major decision' on Syria chemical attack - BBC News
date: '2018-04-09'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43705128
content: |-
  The US president called the chemical attack "barbaric" and said no response was "off the table".

  The US president condemned a chemical attack in Syria, saying a major decision would follow in the next 24 hours.
