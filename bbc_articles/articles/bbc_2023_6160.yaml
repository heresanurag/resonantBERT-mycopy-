title: Nicola Sturgeon pulls out of event as two-day police search ends - BBC News
date: '2023-04-06'
section: Scotland politics
url: http://www.bbc.co.uk/news/uk-scotland-scotland-politics-65199565
content: |-
  The former Scottish first minister's decision comes the day after her husband was questioned by police.

  Ms Sturgeon was due to speak at an Edinburgh Science Festival event

  Nicola Sturgeon pulled out of a speaking event after her husband was questioned by police on Wednesday.

  Peter Murrell, the former SNP chief executive, was arrested and then released without charge pending further investigation into party finances.

  The couple's Glasgow home was searched by police over two days.

  Ms Sturgeon said Màiri McAllan, the cabinet secretary for net zero would take her place at the Climate of Change event.

  Her spokesperson said: "In order to keep the focus of this event on the critical issue of the climate emergency and ambassador Patricia Espinosa's contribution, Nicola Sturgeon has made the decision not to participate this evening.

  "She is grateful to the festival and ambassador Espinosa for their understanding, and to Màiri McAllan for taking her place."

  Mr Murrell was arrested at 07:45 BST on Wednesday and released shortly before 19:00.

  Ms Sturgeon was at the house when police arrived but said she had "no prior knowledge" of Police Scotland's plans.

  Mr Murrell was questioned while officers searched their Glasgow home.

  A police tent was erected at the front of the property on Wednesday morning and removed on Thursday afternoon. It covered the length of the driveway, up to the front door, and housed a van.

  During the search, several officers were stationed outside while plain clothes officers could be seen entering and leaving, one carrying two large rolls of bubble wrap.

  One of the uniformed officers was wearing white protective foot coverings.

  Peter Murrell's home has been searched by police

  A search of the Scottish National Party's headquarters in Edinburgh was also carried out.

  In a statement issued on Wednesday, Police Scotland said: "Officers carried out searches today at a number of addresses as part of the investigation.

  "A report will be sent to the Crown Office and Procurator Fiscal Service."

  Mr Murrell, who has been married to Ms Sturgeon for 13 years, resigned as SNP chief executive last month, after holding the post since 1999.

