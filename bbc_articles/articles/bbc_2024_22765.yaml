  Liverpool head coach Arne Slot says he did not want Darwin Nunez to shoot in the lead-up to the Uruguayan’s sensational strike against Bournemouth on Saturday.

  'Why does he shoot?' – but stunning strike shows Nunez quality

  Darwin Nunez's goal was his 21st in the Premier League for Liverpool

  Liverpool head coach Arne Slot says he did not want Darwin Nunez to shoot before the Uruguayan struck a sensational goal in the 3-0 win over Bournemouth on Saturday. Nunez, making his first start under the Dutchman, collected the ball wide on the right, cut on to his left foot and sent a magnificent, curling drive into the far corner with eight minutes of the first half remaining. The striker's stunning effort completed the scoring at Anfield after a quickfire Luis Diaz double had given Liverpool a 2-0 lead. Slot said: "My first instinct when he shot was, 'why does he shoot?'. I would have said, 'why don't you keep on dribbling?'. He made the ball free and I think the defender was on the ground. "But then it was a fraction of a second later when I saw the ball go in off the post. Then I was like, 'OK, maybe you are a better football player than I was in the past'." Nunez, whose finishing has come under scrutiny during his time at the club, has now scored 21 times for Liverpool in the Premier League. Saturday's effort was his first for the club in five months and 17 days, since a 3-1 win over Sheffield United last season.

