title: 'The Vivienne: RuPaul''s Drag Race UK and musical theatre star dies aged 32
  - BBC News'
date: '2025-01-05'
section: Culture
url: http://www.bbc.co.uk/news/articles/c4gw1v51yezo
content: |-
  James Lee Williams, better known as drag queen The Vivienne, died aged 32 over the weekend.

  James Lee Williams, better known as drag queen The Vivienne, has died aged 32. Publicist Simon Jones said the performer, who died over the weekend, was "an incredibly loved, warm-hearted and amazing person". The Vivienne starred in musical theatre and TV productions, and won the first series of RuPaul's Drag Race UK in 2019. The show paid tribute to the drag star on social media, saying they were "deeply saddened" by the news of the performer's death. Cheshire Police say there are no suspicious circumstances surrounding the performer's death.
  • None How The Vivienne became a breakout star of British drag

  In a post on X, external, RuPaul's Drag Race said: "She will be dearly missed, but her legacy will live on as a beacon of creativity and authenticity - she embodied what it means to be a true champion". It added: "Our hearts go out to her family and fans during this difficult time." The show's judge Michelle Visage also called the star "a beacon to so many".

  Writing on social media, external, Visage called the news "heartbreaking", adding: "My darling The Vivienne, we go back to when I started coming over here to the UK." "You were always there, always laughing, always giving, always on point." "Your laughter, your wit, your talent, your drag. I loved all of it but I loved your friendship most of all." Drag Race UK star Bimini Bon Boulash also reacted to the news, writing on Instagram: "I'm so sorry I'm in total shock". Cheryl - who used to go by Cheryl Hole - took part in the same series of Drag Race as The Vivienne. The performer wrote on Instagram: "I will love you forever Viv." John Hyland, community partnerships lead at Sahir, a LGBTQ+ and HIV charity in Liverpool, also paid tribute. Drag fans have been donating to Sahir's latest campaign as a mark of respect for The Vivienne, who posted about the appeal just days before their death. John said: "It says a lot to Viv's character that her last social post was about our Pound for Sahir campaign. She just wanted to give back. "If you look at the response tonight, I think we're going to be in mourning in this city for a long time. The Vivienne was an amazing character, an amazing influence." Dexter Clift, better known as River Medway, competed on the third series of Drag Race UK and went on to perform with The Vivienne in various projects including shows and music videos. They told the BBC: "He was the blueprint of a drag superstar. So talented, so funny, so entertaining. I used to love getting a gig with Viv because it meant I would get to watch her. "The Viv has been around doing drag for so long but I thought we were going to see the next Paul O'Grady. I was convinced The Viv was going to host Drag Race UK one day. "I find it very difficult to think that this is the end of that story." He wrote: "My heart literally sank when I got the call! My heart is shattered!" Natasha Von Spirit, a Liverpool drag queen, said that The Vivienne had put British drag "in the mainstream" and that they would be playing songs in tribute to them throughout the night. They said: "Whenever she was out on the scene after drag race she was just one of the Liverpool gays. "I'm going to play all sorts for Viv tonight - definitely Walking in Memphis because before Drag Race she sung that none stop, and definitely a bit of her own music as well."

  Williams was born in Wales, and adopted the drag name because of a love for wearing Vivienne Westwood clothing. Rydal Penrhos school in Colwyn Bay, where Williams was a former pupil, said it was "deeply shocked and saddened" by the star's death. "The Vivienne's successful career as a performer and artist proved a source of inspiration and joy to so many", the school said in a statement. As well as winning Drag Race, The Vivienne came third on the 2023 edition of Dancing On Ice, and performed as the Wicked Witch of the West in a UK and Ireland tour of The Wizard Of Oz musical. The performer reprised the role in the West End at the Gillian Lynne Theatre last year. The Vivienne also competed on an all-winners season of the RuPaul franchise in the US in 2022, and starred in BBC Three show The Vivienne Takes On Hollywood in 2020. In an Instagram post, external on Boxing Day, The Vivienne put up a series of photos, captioning it: "24' highlights." "What a year it's been. Here's to reaching new heights and achieving dreams in 25," the star wrote, before signing off: "Viv xxx." Mr Jones said words announcing The Vivienne's death were ones he "never ever wanted to write". "No one has ever made me laugh in my life as much as Viv did. Their comic genius and quick wit was like no other," he said. "I'm so proud and lucky that Viv was such a big part of my life every day for the last 5 years." Mr Jones asked for privacy for the star's family and said no further details would be released at this time. Fiona Campbell, BBC controller of youth audience, called the news "deeply sad", adding: "We are fiercely proud of The Vivienne's achievements, including winning the first ever series of RuPaul's Drag Race UK. "Right now our thoughts are with their family and friends, the Drag Race sisterhood and their many fans."

