title: Syrian charged over plot to attack Taylor Swift Vienna concert - BBC News
date: '2025-06-27'
section: Europe
url: http://www.bbc.co.uk/news/articles/cn4ljq94vy3o
content: |-
  A young Syrian national is suspected of supporting a foreign terror group over a foiled plot in Vienna last August.

  Tens of thousands of fans had bought tickets for Taylor Swift's Vienna shows

  A young Syrian national has been charged with supporting a foreign terror group over a foiled plot to attack a Taylor Swift concert in Vienna last August. Mohamed A, who is described by German authorities as a juvenile and not in custody, is accused of following the ideology of jihadist group Islamic State (IS) and helping another suspect to prepare the attack. Concert organisers called off Taylor Swift's three sold-out gigs on the eve of the first show at Vienna's Ernst Happel Stadium last year, disappointing tens of thousands of fans during her Eras Tour. Authorities arrested several suspects at the time saying they appeared to have been inspired by IS and al-Qaeda.

  "Mohammad A has adhered since April 2024 at the latest to the ideology of the terrorist organisation Islamic State (IS)," Germany's federal public prosecutor said in a statement. "Between mid-July and August 2024, he was in contact with a young adult from Austria who was planning a bomb attack on a concert by singer Taylor Swift in Vienna." Sixty-five thousand fans had bought tickets for Swift's three concerts on 8-10 August, and the singer later apologised for the cancellation, speaking of the "tremendous amount of guilt" she felt. She said she had decided to throw all her energy into the shows at the end of her European tour in London. The main suspect in the case has been identified as Beran A, who authorities say was part of an IS cell in eastern Austria. Beran A, who is now 20 and from Ternitz south of Vienna, was arrested before the concerts following a tip-off by the CIA, which said the plotters had hoped to kill a large number of concert-goers. Investigators allege he had also planned to carry out an earlier attack in Dubai in March 2024. Reports suggested it was part of a co-ordinated plot involving three simultaneous IS attacks but Beran A had changed his mind at the last minute. According to the federal prosecutor in Germany, Mohammad A had helped the main suspect with a translation of bomb-making instructions from Arabic as well as making contact with a member of IS abroad over the internet. He is also accused of providing the text for an oath of allegiance to the main suspect to join IS.
