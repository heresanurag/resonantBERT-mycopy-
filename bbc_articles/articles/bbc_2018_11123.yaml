  \ privacy policy, external before accepting. To view this content choose ‘accept\
  \ and continue’. The BBC is not responsible for the content of external sites. Facebook\
  \ content may contain adverts.\n\nHoliday-makers in Boston were surprised to learn\
  \ a day before their cruise departed on Friday that they would be travelling to\
  \ Canada instead of Bermuda, due to hurricane conditions.\n\nNorwegian Dawn passengers\
  \ arriving in Halifax on Sunday were greeted by bagpipes and quickly turned to local\
  \ shops to stock up on warmer clothing.\n\n\"We were hoping for really nice weather,\
  \ but instead we have the same weather as at home,\" one passenger told the Canadian\
  \ Broadcasting Corporation.\n\nTwo other hurricanes are currently churning in the\
  \ Atlantic Ocean.\n\nHurricanes Isaac and Helene are expected to accelerate, but\
  \ at this point, are not expected to threaten the US mainland.\n\nHurricanes are\
  \ violent storms that can bring devastation to coastal areas, threatening lives,\
  \ homes and businesses. Hurricanes develop from thunderstorms, fuelled by warm,\
  \ moist air as they cross sub-tropical waters. \n\nWarm air rises into the storm.\
  \ Air swirls in to fill the low pressure in the storm, sucking air in and upwards,\
  \ reinforcing the low pressure. The storm rotates due to the spin of the earth and\
  \ energy from the warm ocean increases wind speeds as it builds. When winds reach\
  \ 119km/h (74mph), it is known as a hurricane - in the Atlantic and Eastern Pacific\
  \ - or a typhoon in the Western Pacific. \"Everybody has a plan until they get punched\
  \ in the face. Well, we're about to get punched in the face.\" \n\nFlorida Mayor\
  \ Bob Buckhorn, ahead of Hurricane Irma (2017) The central eye of calmer weather\
  \ is surrounded by a wall of rainstorms.\n\nThis eyewall has the fastest winds below\
  \ it and violent currents of air rising through it. A mound of water piles up below\
  \ the eye which is unleashed as the storm reaches land. \n\nThese storm surges can\
  \ cause more damage from flooding than the winds. \"Urgent warning about the rapid\
  \ rise of water on the SW FL coast with the passage of #Irma's eye. MOVE AWAY FROM\
  \ THE WATER!\"\n\nTweet from the National Hurricane Center The size of hurricanes\
  \ is mainly measured by the Saffir-Simpson scale - other scales are used in Asia\
  \ Pacific and Australia. Winds 154-177km/h\n\nRoofs and trees could be damaged.\
  \ \n\nStorm surge +1.8m-2.4m Hurricane Sandy (2012) caused $71bn damage in the Caribbean\
  \ and New York Hurricane Ike (2008) hit Caribbean islands and Louisiana and was\
  \ blamed for at least 195 deaths \"For everyone thinking they can ride this storm\
  \ out, I have news for you: that will be one of the biggest mistakes you can make\
  \ in your life.\" \n\nMayor of New Orleans Ray Nagin ahead of Hurricane Gustav,\
