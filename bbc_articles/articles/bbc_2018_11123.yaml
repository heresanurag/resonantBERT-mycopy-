  \ accepting. To view this content choose ‘accept and continue’. The BBC is not responsible\
  \ for the content of external sites.\n\nRed flag warnings are keeping swimmers off\
  \ beaches, as residents sandbag their homes in the communities of Myrtle Beach in\
  \ South Carolina, and the Outer Banks in North Carolina.\n\n\"Literally, they are\
  \ filling buggies full of water, shopping carts full of water,\" Ryan Deeck, grocery\
  \ department manager at a Walmart, told The Sun News in Myrtle Beach.\n\nNaval Station\
  \ Norfolk, the largest naval installation in the world, is preparing to send ships\
  \ away from bases to weather the storm out at sea.\n\nThis Facebook post cannot\
