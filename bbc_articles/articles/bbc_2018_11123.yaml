title: 'Hurricane Florence: ''Extremely dangerous'' storm sparks US exodus - BBC News'
date: '2018-09-11'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-45474706
content: "South Carolina's governor orders the evacuation of about one million residents\
  \ on its coastline.\n\nForecasters say the hurricane will certainly hit the US coastline\n\
  \nEvacuations have been ordered as the US East Coast braces for Hurricane Florence\
  \ - in what may be the strongest storm to hit the region in decades.\n\nSouth Carolina's\
  \ governor ordered the evacuation of its entire coastline while North Carolina and\
  \ Virginia have declared states of emergency.\n\nOfficials say Florence is now a\
  \ category four storm with 130mph (195km/h) winds, and gaining strength.\n\nIt is\
  \ expected to strike the Carolinas by Thursday.\n\nFlorence - which was 1,200 miles\
  \ (2,000km) southeast of Cape Fear, North Carolina, on Monday morning - started\
  \ the day as a category two storm.\n\nInternational Space Station astronaut Ricky\
  \ Arnold took this photo of Florence on 6 September\n\nThe weather system could\
  \ reach category five as its draws strength from the warm Atlantic waters, say forecasters.\n\
  \nIt would be the first category four storm to hit the region since Hugo ravaged\
  \ North Carolina in 1989, wreaking $7bn (£5.3bn) in damage and claiming 49 lives.\n\
  \nThe National Hurricane Center (NHC) says Florence has the makings of an \"extremely\
  \ dangerous\" meteorological event.\n\nIt may bring catastrophic levels of rain\
  \ and flooding to coastal and inland regions.\n\nThe NHC said: \"There is an increasing\
  \ risk of life-threatening impacts from Florence: storm surge at the coast, freshwater\
  \ flooding from a prolonged and exceptionally heavy rainfall event inland, and damaging\
  \ hurricane-force winds.\"\n\nNational Weather Service meteorologist Dan Miller\
  \ told The State newspaper in South Carolina: \"Somebody is going to suffer devastating\
  \ damage if this storm continues as it is currently forecast.\"\n\nUS President\
  \ Donald Trump has cancelled plans for a rally on Friday in Mississippi because\
  \ of the hurricane.\n\nThis video can not be played To play this video you need\
  \ to enable JavaScript in your browser. Will hurricanes like those in 2017 wreak\
  \ havoc yet again?\n\nSouth Carolina's governor has ordered the evacuation of its\
  \ entire coastline starting at noon on Tuesday in a move affecting about a million\
  \ residents.\n\nNorth Carolina officials on Monday ordered residents to evacuate\
  \ the state's Outer Banks barrier islands while the governor described the state\
  \ as \"the bulls-eye\" of the storm.\n\nThere have been long queues in supermarkets\
  \ around communities near waterways and coastlines as residents clear shelves of\
  \ water, batteries and plywood.\n\nSouth Carolina's state emergency management agency\
  \ said on Sunday that it is \"preparing for the possibility of a large-scale disaster\"\
  .\n\n\"Pretend, assume, presume that a major hurricane is going to hit right smack\
  \ dab in the middle of South Carolina and is going to go way inshore,\" said South\
  \ Carolina Governor Henry McMaster.\n\nIn North Carolina, Governor Roy Cooper waived\
  \ agricultural transportation restrictions in order to allow farmers to move goods\
  \ more quickly.\n\n\"During harvest, time is of the essence. Action today can avoid\
  \ losses due to Florence.\"\n\nThis Twitter post cannot be displayed in your browser.\
