title: Volunteer firefighter rescues two-year-old from burning building - BBC News
date: '2024-11-12'
section: General
url: http://www.bbc.co.uk/news/videos/c2e7mjdye98o
content: |-
  Body camera footage shows the moment a boy was saved from his home in Texas after his mother couldn't reach him in the fire.

  Body camera footage shows the moment volunteer firefighters rescued a two-year-old boy from a burning building in Granbury, Texas on Sunday night.

  When a fire started in the apartment, the child's mother saved her four-year-old son but couldn't reach his younger brother through the flames and smoke.

  Volunteer firefighters of the Granbury Fire Department arrived shortly after and saved the boy through a window.

  The boy was transported to a hospital where he was treated for carbon monoxide poisoning. His mother, Phylicia Keen, told the BBC he has now been released and is "doing well".
