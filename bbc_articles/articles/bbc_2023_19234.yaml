title: 'Hackney shooting: Boy charged over Lianne Gordon killing - BBC News'
date: '2023-12-09'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-67669578
content: |-
  The 16-year-old is charged with murdering Lianne Gordon, who was shot in east London.

  Lianne Gordon has been described as loved by the community

  A 16-year-old boy has been charged with the murder of a woman who was shot in Hackney, east London.

  Lianne Gordon, 42, died at the scene of the attack outside a home in Lower Clapton on Tuesday evening.

  The 16-year-old was arrested in the early hours of Friday and charged on Saturday.

  He was also charged with the attempted murder of a 20-year-old man and a 16-year-old boy.

  The Met Police brought a further charge of possession of a firearm with intent to endanger life and with possession with intent to supply Class A drugs.

  He is due to appear at Barkingside Magistrates' Court on 11 December.

