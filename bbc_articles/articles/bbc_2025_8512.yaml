title: Will Canada's newly-elected PM agree to meet Trump? - BBC News
date: '2025-05-01'
section: General
url: http://www.bbc.co.uk/news/videos/c62zqlk5130o
content: |-
  As the polls closed in Canada, Mark Carney told the BBC there's a partnership to be had with the US, but it will be "on our terms".

  Speaking exclusively to the BBC's Economics Editor Faisal Islam as the polls were closing, Prime Minister Mark Carney said he would only visit Washington DC, when there was a "serious discussion to be had" that respected Canada's sovereignty.

  Carney also spoke on Canadian-UK relations and on seeking fresh agreements in response to barriers to trading with the world's largest economy.
