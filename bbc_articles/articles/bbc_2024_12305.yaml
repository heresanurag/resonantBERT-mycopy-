  Three children missing after day out at Thorpe Park

  Thorpe Park said as soon as staff were alerted safety procedures were implemented

  Police have issued an urgent appeal for help to locate three children who are missing after a day at Thorpe Park. Khandi, 14, Amelia, nine, and Malik, seven, were reported missing at about 19:00 BST on Monday after a visit to the attraction in Chertsey. All three were seen walking towards Staines town centre at about 15:17, Surrey Police said. It is believed they have travelled to London, Surrey Police said.

  The children have since been found safe and well. Khandi is described as slim and 5ft 2in (160cm) tall. She was wearing black or grey jogging bottoms, a white top, white trainers and black framed glasses. Amelia is described as slim and 3ft 6in (110cm) tall. She was wearing grey jogging bottoms, a grey long-sleeved top with “Believe” written on it and white trainers. Malik is described as slim and 3ft 6in (110cm) tall. He was wearing black jogging bottoms, black trainers and a green long-sleeved top with stripes. The two youngest children are related, police said.

  A florist in Chertsey said children fitting the description of those missing came into the store at 15:50 on Monday. This was captured on CCTV. Samantha Williams from House of Flowers, said the oldest child, a girl, asked for directions before the group exited the shop in the direction of a nearby train station. “They were rushing a bit. The kids were just wandering around the shop, not distressed at all,” she told BBC News. “She was watching them. I got the impression they didn’t know the area." Police have not confirmed if the sighting was of the missing children.

  Surrey County Council said the children do not live in Surrey and are not known to the authority. A Thorpe Park spokesperson said it was continuing to support police in their investigation. “As soon as our staff were alerted that three children were missing after a day at the park, they immediately implemented well-rehearsed safety procedures,” they said. “The team worked closely with Surrey Police and CCTV footage confirmed that the children had left the attraction, heading towards Staines.”

