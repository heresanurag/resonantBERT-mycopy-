content: |-
  President Joe Biden defends the justice system during his first comments on Trump's guilty verdict.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'Reckless' to say Trump verdict was 'rigged' - Biden

  US President Joe Biden has said it was "reckless" for his predecessor, Donald Trump, to call his trial rigged, a day after the historic conviction. In his first public remarks about the guilty verdict for Trump on 34 counts of falsifying business records, Mr Biden defended the US justice system. "The American principle that no-one is above the law was reaffirmed," said Mr Biden of the outcome. Earlier on Friday, Trump delivered a fiery news conference at Trump Tower in Manhattan, calling the judge "crooked", the trial a "sham" and Democrats "thugs". Mr Biden's comments on Friday afternoon came at the beginning of a White House news conference where he discussed the Middle East and a new Israeli proposal for Gaza. Mr Biden said his Republican opponent in November's presidential election had been given "every opportunity" to defend himself and be heard by a jury of 12 American citizens, and had no right to complain that the process was not fair. "It's reckless. It's dangerous. It's irresponsible for anyone to say this was rigged just because they don't like the verdict," he said, adding that Trump was welcome to file an appeal. Mr Biden, who has rarely spoken publicly about Trump's legal troubles, said the justice system was the "cornerstone of America". "The justice system should be respected and we should never allow anyone to tear it down. It's as simple as that. That's America. That's who we are," he said.
