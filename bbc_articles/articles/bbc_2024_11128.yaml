  • None 'Twice I backed Trump but no more' - voters split on verdict

  Trump spoke briefly outside the court on Thursday to argue that he had been unfairly treated and that it should have been a "non-case". He slammed Manhattan District Attorney Alvin Bragg for bringing it to court. "This was a disgrace, this was a rigged trial," he said. Trump reiterated his complaints at Friday's news conference, in which he did not take questions from reporters and confirmed his team would appeal the conviction. He repeated that the trial was "rigged" and argued that the New York case was politically motivated and a "witch hunt". He added that one witness called by his defence team was "literally crucified" and told his supporters that if "they can do this to me, they can do this to anyone".

  This video can not be played To play this video you need to enable JavaScript in your browser. Americans across the US react to Trump's guilty conviction

  Both Mr Biden and Trump are seeking to ramp up donations to their campaigns following Thursday's verdict. Mr Biden took to X, formerly Twitter, on Friday to post a fundraising link to ActBlue, a Democratic fundraising tool. "Donald Trump is threatening our democracy. First, he questioned our election system. Then, he questioned our judicial system. And now, you can stop him," he posted. Trump's campaign said it raised more than $34.8 million in six hours after the guilty verdict - roughly half of what the campaign made in the entire month of April. It said the money mostly came from small donors, and that 30% of the funds came via WinRed, the Republican Party's fundraising platform. Trump's Truth Social account posted fundraising requests within a few minutes of his conviction. His campaign has also sent out emails, asking for donations. Trump's digital fundraising system had a record number of supporters following the guilty verdict on Thursday afternoon, according to Trump campaign senior adviser Brian Hughes. The increase in traffic caused intermittent delays, he added.
