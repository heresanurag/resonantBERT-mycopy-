title: 'Red Sea: UK missiles intercept two Houthi drones - BBC News'
date: '2024-07-17'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-68526215
content: |-
  Defence Minister Grant Shapps says the missiles were fired from HMS Richmond to protect shipping lanes.

  Defence Minister Grant Shapps has shared video footage of a UK missile intercepting a Houthi drone in the Red Sea, on Saturday morning.

  Mr Shapps said two drones were shot down by HMS Richmond, using Sea Ceptor missiles.

  Mr Shapps said the UK joined US and French forces to repel illegal attacks by Iranian-backed Houthis.

  According to the US military, at least 28 uncrewed aerial vehicles (UAVs) were downed on Saturday.
