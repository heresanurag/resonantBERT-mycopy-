title: Potholes are drivers' biggest bugbear, RAC finds - BBC News
date: '2024-08-11'
section: Business
url: http://www.bbc.co.uk/news/articles/crrl92rr12ko
content: |-
  Punctures, wheel damage and broken suspension springs are the most common damage, finds survey.

  Alan from Macclesfield climbed into a pothole to show how deep it was

  Potholes damaging cars is the biggest bugbear among drivers in Britain, a motoring survey suggests. The state of Britain's roads was the main concern for almost six in 10 people in research by the RAC. It topped the list of motoring complaints for the first time - ahead of insurance costs and fuel prices. Pothole damage cost drivers on average £460 - with punctures, wheel damage and broken suspension springs the most commonly reported in the past 12 months, RAC research suggested. Some drivers get so frustrated with the motoring menace they come up with creative ways to capture the size of the problem. Alan from Macclesfield climbed inside the crater and sent the pictures to his local council. “They did finally fill” it, he said. The Department for Transport said it was helping councils to fix "up to one million more potholes a year".

  One BBC Breakfast viewer used a ready meal to illustrate the issue

  Potholes can prove dangerous and costly, the RAC's research warned. BBC reader Elizabeth Atter said her 89-year-old mother had been knocked out after falling in a pothole in Caversham, near Reading. Ms Atter said her mother also “broke her nose and glasses and was badly shaken up” when she fell five years ago. Another reader, Richard Underhill from Milford-on-Sea in Hampshire, said his Porsche needed two tyres replaced after he hit a pothole. “A car in front of me at the tyre depot had hit the same pothole,” he said.

  Angela and Chris Hudson had their compensation claim turned down

  Claiming for compensation can prove time-consuming and costly. Angela and Chris Hudson, both 64, were driving on the M60 near Middleton in April when their car hit a pothole. “We were driving along at 70mph, we were coming up behind vehicles on the inside lane, we started to pull out, and bang – we hit a pothole,” said Mr Hudson. Repairs to one wheel including a new tyre, a new wheel and wheel alignment, cost £3,000. The Hudsons’ said their claim for compensation against National Highways, the organisation in charge of maintaining the road, was denied. This is due to a rule, external in the Highways Act which says that if it has taken reasonable steps to ensure the road is safe, it does not have to pay damages to road users. "They said it wasn’t a safety issue," said Mrs Hudson. "But it is a safety issue. Those holes were really well established when we saw them." A spokesperson for National Highways said the organisation was "concerned to learn about the incident involving the Hudsons and have been in correspondence with them". “We carry out regular carriageway inspections, and any dangerous or safety critical defects are made safe either immediately or within 24 hours. Our inspections at the time found no such defects," they added.

  Richard Broadbent from Cirencester put a claim in to Gloucestershire County Council after the wheel of his Volkswagen Golf was damaged in May last year when his wife was driving his daughter to school. A bent wheel and split tyre cost the family £189.60 to repair. The legal battle lasted more than a year before the out-of-court settlement was agreed, in which the council paid for the damage to the car and Mr Broadbent's legal costs, with no admission of fault. But Mr Broadbent is one of few drivers who bother to stay the course when trying to claim compensation over pothole damage to vehicles.

  Mr Broadbent said the damage was caused by this pothole

  Louise Thomas, an insurance expert at price comparison website Confused.com, told the BBC the majority of drivers end up paying for repairs out of their own pocket because it is quicker and more convenient, adding that claiming on insurance could see future premiums rise. "What they should do is go to the council. Councils are responsible for maintaining roads, therefore they’re also responsible for paying out any claims for damage to your vehicle," she said. According to the RAC, almost three-quarters of drivers said the condition of local roads they use regularly is poorer than a year ago. The motoring group said its research suggested the problem of potholes was worse in rural areas. It said its own data showed there were more than 25,000 pothole-related breakdowns in the 12 months to the end of June.

  "Unfortunately our roads are deteriorating, there's no question about that. This is really unacceptable, given the amount of money that drivers pay in motoring taxation, we estimate that to be around £45bn," said Simon Williams from the RAC. The previous Conservative administration had pledged to put an extra £8.3bn towards road maintenance in England over the coming decade. As part of that, £150m in additional funding for last year and this year has already been given to councils. Both the RAC and the Local Government Association (LGA) called for the new Labour government to commit to maintaining those spending plans. Claire Holland from the LGA said councils, who are responsible for local road maintenance, had "limited resources" and a backlog of repairs costing some £16.3bn. The Department for Transport said it was supporting local authorities to fix "up to one million more potholes a year", but did not say how much money would be allocated. With additional reporting from Bernadette McCague and Emma Haslett.

