content: |-
  The seldom-seen creature, said to be a one-in-100,000 occurrence, wowed locals in Ystrad Mynach.

  What appears to be a rare white squirrel has been spotted on a south Wales street.

  The creature, said to be a one-in-100,000 genetic occurrence, wowed locals in Ystrad Mynach, Caerphilly, as it bounded about outside the town's library.

  Video of the squirrel running down the road was shared on Facebook and plenty of people have commented about how beautiful it is.

  It is estimated only about 50 of them exist in the UK.
