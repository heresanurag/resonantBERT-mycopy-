content: |-
  Police no longer treat a 53-year-old woman's death as suspicious and release a man without charge.

  A 46-year-old man arrested on suspicion of murder has been released without charge

  Police are no longer treating the death of a 53-year-old woman as suspicious following a post-mortem examination.

  A 46-year-old man who had been arrested on suspicion of murder has been released without charge.

  North Wales Police was called by the ambulance service to a property in Penrhyndeudraeth, Gwynedd, at about 11:50 GMT on Wednesday.

  The force said the released man is now assisting with the coroner's investigations.

  "The woman's next of kin have been kept informed throughout and our thoughts are with them at this difficult time," said a North Wales Police spokesperson.

  "We would like to thank the local community for their assistance whilst we carried out our inquiries yesterday."
