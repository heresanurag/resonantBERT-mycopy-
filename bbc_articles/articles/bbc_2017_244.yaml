title: 'The art of Obama: A painting a day - BBC News'
date: '2017-01-13'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38575586
content: |-
  Rob Pruitt has painted a single image for every day of Obama’s time in office. That’s nearly three thousand paintings.

  As the presidency of Barack Obama draws to a close, so too does the work of an artist who has followed the US leader's daily life for eight years.

  Rob Pruitt has painted a single image for every day of Mr Obama’s time in office. That’s nearly 3,000 paintings.

  Every one of those works is now on display at the Gavin Brown gallery in New York, where the BBC caught up with Pruitt.
