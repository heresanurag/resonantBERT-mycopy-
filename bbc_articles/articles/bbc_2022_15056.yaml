title: Multiple Tornadoes hit southern US states - BBC News
date: '2022-11-05'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-63530394
content: |-
  One dead and several injured as powerful storms hit Texas, Oklahoma and Arkansas

  Several tornadoes have hit the southern US states of Texas, Oklahoma and Arkansas leaving one dead and multiple people injured.

  The storm also caused flash flooding and caused the destruction of dozens of homes in the north-east of the lone star state.
