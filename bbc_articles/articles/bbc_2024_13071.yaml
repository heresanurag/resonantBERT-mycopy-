  • None How the Kremlin uses comics to glorify its war in Ukraine The PISM noted that the Africa Corps is intended to be used "more openly" than Wagner was on the continent with the intention of replacing Western - and particularly French - influence in Africa. BBC Russian reported that only in the Central African Republic (CAR) is Wagner still operating in any shadow of its former shape, allegedly controlled by Prigozhin’s son Pavel. "Moscow has given the heir the go-ahead to continue doing what his father did in Africa, on condition that it does not contradict Russia's interests," a source who used to work with Yevgeny Prigozhin told BBC Russian.

  There is a makeshift memorial to Wagner in Moscow, but the anniversary of the group's uprising has passed largely without incident

  Last week, Le Monde reported that around 1,500 Wagner troops had assisted local security forces in attacks on rebel-held areas. However, the PISM observed that the overall importance of the CAR in Moscow's strategic thinking "is diminishing". Dr MacLeod suggested that Wagner's original goal in the CAR had been to show "proof of concept" that mercenary groups can be "used as a successful counter-terrorism actor", a goal Moscow may now view as having been achieved. But she added that Wagner was "utterly enmeshed" within the CAR, making it harder to replace it with the new, developing Africa Corps. Despite the threat posed by Prigozhin's mutiny, Sunday's anniversary largely passed without incident in Russia. Dan Storyev of the OVD-Info monitoring group told the BBC that Prigozhin's legacy mostly lay with those aligned with the Kremlin. "Generally speaking the Wagner mutiny hasn’t had much, if any, real grassroots support for there to be, say, mass rallies marking the anniversary - perhaps because it had no genuine anti-war messaging," he noted. "There are people who organise protests in Russia, but they’re focused on anti-war activism and don’t have anything to do with [Prigozhin]."
