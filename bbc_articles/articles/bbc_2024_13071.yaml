  UK intelligence officials have suggested that some of the group's infantry units have been subsumed by the Rosgvardia, or National Guard. The unit, established in 2016, has been described as Mr Putin’s “private army” and is controlled by his former bodyguard Viktor Zolotov. The UK Ministry of Defence (MoD) has said elements of the Wagner Group started coming under the National Guard’s control in October 2023. Referred to as “volunteer formations”, the ex-Wagner troops were to be deployed to Ukraine on six-month contracts and to Africa on nine-month contracts, it said. Anton Yelizarov – a long term Wagner operator who is said to have commanded the mercenaries' bloody operations in Bakhmut – appeared to confirm the integration days later. In a video posted to a Wagner-linked Telegram channel, he said he was present at the construction of a camp where Wagner troops would “work for the good of Russia” and join with National Guard units in a new formation. UK officials said the “incorporation of former Wagner assault detachments into Rosgvardia’s Volunteer Corps highly likely indicated that Wagner has been successfully subordinated into Rosgvardia, increasing the Russian state control over the Wagner Group”. Other ex-Wagner forces have signed up to fight with Vladimir Putin’s strongman in Chechnya – Ramzan Kadyrov – and his Akhmat forces, a recent BBC Russian investigation found. A tangible example of the group’s decline came when its logo was reportedly stripped from the tower block it had occupied in Russia’s second city of St Petersburg.

  Only in the Central African Republic (CAR) is Wagner still operating in any shadow of its former shape, allegedly controlled by Prigozhin’s son Pavel

  In the days after the mutiny, Prigozhin was said to have cut a deal with Mr Putin to focus his group’s operations in Africa, propping up regimes and securing resources for Russia. Following Prigozhin's death, deputy Defence Minister Yunus-Bek Yevkurov reportedly toured African capitals, assuring officials that the services provided by the group would not dissipate. Earlier this month the Polish Institute of International Affairs (PISM) think tank observed that in the wake of Prigozhin's death "the Russian state’s attention in [Africa] not only did not weaken, but strengthened". In February, the BBC obtained documents revealing that Moscow was offering a “regime survival package” in exchange for access to strategically important natural resources – an approach previously favoured by the Wagner Group. The plan was being offered by a so-called Russian “expeditionary group” – nicknamed the Africa Corps – and commanded by former GRU Gen Andrey Averyanov. He previously oversaw secretive operations specialising in targeting killings and destabilising foreign governments. Experts told the BBC that the Africa Corps has effectively replaced Wagner in West Africa. On Telegram, the unit boasted of offering recruits salaries of up to 110,000 roubles a month ($1,250; £990) and service “under the leadership of competent commanders with extensive combat experience”. In January, it announced its first deployment of 100 troops to Burkina Faso. Another 100 reportedly arrived in Niger in April. Ruslan Trad, a security analyst with the Atlantic Council, told the BBC that, in effect, Wagner "became the Africa Corps and now serves the full purposes of military intelligence" and the ministry of defence. "In Africa, these soldiers are doing much the same thing - guarding trade routes, securing resources that Moscow uses to circumvent sanctions, and more - serving local juntas and directing the flow of migrants," he observed.
