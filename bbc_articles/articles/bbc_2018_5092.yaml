title: Mary Berry was once arrested at airport and put in a cell - BBC News
date: '2018-04-20'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-43844007
content: |-
  The former Bake Off judge had packed baking ingredients, which staff thought were drugs.

  Mary Berry was appearing on The Graham Norton Show

  Mary Berry says she was once arrested at an airport after baking ingredients were mistaken for drugs.

  The former Bake Off judge had packed flour and sugar in plastic pouches to take with her on a flight.

  Speaking on The Graham Norton Show, she said the incident took place 25 years ago as she was travelling to the US to take part in cookery demonstrations.

  "When I arrived at the airport the sniffer dogs made a bee-line for me," she recalled on the BBC One show.

  Berry described the experience as "alarming".

  The chef has a number of cookery shows including Classic Mary Berry

  "Suddenly I was surrounded by uniformed people and my assistant and I were put in separate cells," she added.

  "When I was asked if I was going to make money from the stuff, I said, 'I do and my fee has already been agreed.'"

  She explained she had "thought there might be problems" so weighed the ingredients in advance and put them in the "little plastic bags" - not expecting they might be mistaken for illicit substances.

  Berry was appearing on the show with Claudia Winkleman to talk about their new BBC series, Britain's Best Home Cook.

  The Graham Norton Show is on Friday at 22:35 on BBC One.

