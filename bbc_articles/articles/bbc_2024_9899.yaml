  Former chairman Henry Staunton was sacked by Ms Badenoch in January after little more than a year in the role - leading to a bitter public row between the two. After his exit, Mr Staunton claimed in an interview with the Sunday Times that he had been advised by a civil servant to stall compensation payments to allow the government to "limp into the election" without the impact of a large pay-out. The government strongly denied the allegation and Ms Badenoch claimed Mr Staunton was under a "formal investigation" for "serious matters such as bullying". Mr Staunton refuted this. He then disclosed in February that it was actually current chief executive Nick Read who was under investigation after a Speak Up complaint was made against him. The Post Office confirmed at the time there were complaints against Mr Read and other staff, however he has since been cleared of all misconduct allegations following an investigation carried out by an external barrister. The row has been criticised by former sub-postmasters, including campaigner Alan Bates, who described it as a "sideshow" to the inquiry.
