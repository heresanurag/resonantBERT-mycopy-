title: 'Six Nations 2025: Huw Jones hat-trick makes difference for Scotland against
  Italy - BBC Sport'
date: '2025-02-02'
section: Scotland
url: http://www.bbc.co.uk/sport/rugby-union/articles/cqx9yeqwenzo
content: |-
  BBC Scotland assesses how Huw Jones' try-scoring ability made the difference for Gregor Townsend's side in their Six Nations opener.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  On the hour mark of Scotland's Six Nations opener against Italy at Murrayfield, there was a hushed tension in the stands. Scotland had dominated possession and territory, had scored three excellent tries, but found themselves level at 19-19 having coughed up penalties that allowed Tommaso Allan to take points off the tee. Their healthy lead had been surrendered. They desperately needed someone to stand up and take the game by the scruff of the neck. Huw Jones did just that. The former Stormers and Harlequins back had already scored one try, having kept up with winger Duhan van der Merwe down the left flank and finished off a fine team move in the opening 10 minutes. However, it was his second-half contribution that decided the contest. Jones' second try of the contest was made by a magnificent jinking run by winger Darcy Graham, but the centre did what all good attackers do. He went with Graham in support and cruised to the line. If his second was a walk-in, his third was anything but. Faced with three Italian defenders, Jones left Paolo Garbisi and Monty Ioane for dead with a right-foot step and then held off Michele Lamaro's tackle to stretch out and score. "He has improved so much in both attack and defence," former Scotland prop Peter Wright said. "He's always there, he's always on a shoulder and he always takes defenders away from other people."

  You only have to look at Jones' numbers to appreciate what he brings to the table. He now has 22 tries in 54 internationals, a record most wingers would be delighted with. Saturday's three scores put him above Tommy Seymour and level with Chris Paterson on Scotland's all-time try-scoring list. Van der Merwe leads the way with 30. Jones is a silky runner with deft hands and a remarkable try-scoring instinct. He also possesses great humility. "I'm pretty happy," he said afterwards. "It's not every day you manage to get on the end of three so thanks to the boys for setting me up." Jones carried for 131 metres from 13 carries against Italy, and he appreciated the importance of his second try in the context of the match. "It was a big turning point," he added. "There wasn't really anything on for him but Darcy will find a gap when there isn't one. I just had to try and keep up with him."

