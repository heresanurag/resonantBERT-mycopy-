  The build-up to the game was dominated by Jones' usual centre partner, Scotland captain Sione Tuipulotu, being ruled out of the championship with injury. Tuipulotu is a world-class operator, a leader who combines both power and precision. He was a key part of Glasgow's URC triumph last season and is a shoo-in for this summer's Lions tour if he finds fitness in time. However, alongside another Glasgow man in Stafford McDowall, Jones delivered a reminder of his capacity to trouble any defence in world rugby. "Huw was outstanding today," co-captain Finn Russell said. "I thought Stafford was really good at 12 as well. "The backs worked really well together, created a lot of chances and if we're going to do anything in this tournament we have to try and finish those off." When Jones first burst onto the international scene he had all his attacking verve, but lacked the defensive steel to go with it. Teams targeted his channel to good effect and Jones lost his Scotland spot as a result, missing the 2019 World Cup. He went away and worked it out, though, returning to the national team set-up a more complete package. "Huw is such an all-round player now," head coach Gregor Townsend said. "He runs brilliant lines, finishes well and is a very good defender. Today he supported very well and it's great he got those tries."

