title: Andrew RT Davies returns as Welsh Conservatives leader - BBC News
date: '2021-01-24'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-55781864
content: |-
  He replaces Paul Davies who quit after drinking alcohol with other politicians in the Senedd.

  Andrew RT Davies has taken over as leader of the Welsh Conservatives for the second time

  Andrew RT Davies has been named as the new leader of the Welsh Conservatives in the Senedd for a second time.

  Mr Davies succeeds Paul Davies who resigned from his post on Saturday after drinking with other politicians in the Senedd, four days into a Wales-wide alcohol ban in licensed premises.

  In a statement, Andrew RT Davies said it was "a great honour and privilege".

  He has already announced his shadow cabinet, which includes four women.

  There are no responsibilities for Paul Davies or Darren Millar, who also previously apologised for being part of the group who were drinking at the Senedd.

  Mr Davies said his party "will put forward a positive plan to get Wales moving again" and "unleash our country's potential" at the Senedd election, scheduled for May.

  "I'm pleased to have moved quickly this afternoon and announce my Welsh Conservative shadow cabinet which is built on the strong foundations of experience, talent and vision," he said.

  "We are in a moment like no other, and the Covid-19 pandemic has sadly only served to shine a spotlight on the challenges in people's everyday lives.

  "We shouldn't doubt our country's potential. Wales is full of ambitious people and communities that crave the opportunity to succeed."

  The Conservatives' shadow cabinet reshuffle sees Angela Burns MS replace the new leader as shadow health minister and Mark Isherwood MS replace Darren Millar MS as chief whip.

  David Melding MS has been appointed shadow minister for mental health, wellbeing, culture and sport.

  Janet Finch-Saunders MS remains as shadow minister for environment, energy and rural affairs, and Suzy Davies MS in education, skills and Welsh language.

  Laura Anne Jones MS stays as shadow minister for equalities, children and young people, but with extra responsibilities for housing and local government.

  Russell George MS remains in the shadow cabinet, responsible for the economy, transport and mid Wales.

  In 2018, Mr Davies, the Member of the Senedd for South Wales Central, quit as leader of the Conservative group after seven years in charge.

  He was given the unanimous backing of fellow Welsh Conservatives in the Senedd.

  Welsh secretary Simon Hart, MP for Carmarthen West and South Pembrokeshire, tweeted his congratulations to "a formidable campaigner".

