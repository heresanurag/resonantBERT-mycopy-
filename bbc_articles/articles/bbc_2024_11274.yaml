content: |-
  Police say formal identification has confirmed the body found last week was Xielo Maruziva.

  Body confirmed to be boy, 2, who fell into river

  Xielo Maruziva fell into the River Soar in February

  Police have confirmed a body found at a nature reserve in Leicester last week is a two-year-old boy who fell into a river. Xielo Maruziva entered the water while with his family in February, prompting a major search operation involving specialist teams. A body was found on Thursday morning after workers had been in the area of Aylestone Meadows, near the River Soar. Leicestershire Police said formal identification had now taken place and the body was confirmed to be Xielo, adding the coroner had been informed.

  Specialist officers continue to provide support to his family, the force added.

  A number of specialist teams were deployed to the area where Xielo had fell into the water

  Officers were first called to the River Soar, close to Marsden Lane, at about 17:00 GMT on 18 February after Xielo fell into the water. Police said people at the scene had not able to find Xielo, and a dedicated search was launched involving hundreds of officers. Assistant Chief Constable Michaela Kerr said: “We are so sorry to bring this news. This is a devastating and tragic incident and our thoughts are with all of Xielo’s family at this most difficult and unimaginable time. "We ask that the privacy of the family continues to be respected at this time. “Full support also continues to be provided to the workers who were in the area of Aylestone Meadows on Thursday morning and I continue to thank them for their support and co-operation in the most horrendous circumstances.” Follow BBC Leicester on Facebook, external, on X, external, or on Instagram, external. Send your story ideas to eastmidsnews@bbc.co.uk, external or via WhatsApp, external on 0808 100 2210.
