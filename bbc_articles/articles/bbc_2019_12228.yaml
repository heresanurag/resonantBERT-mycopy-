title: Justin Bieber defends buying designer kittens - BBC News
date: '2019-10-05'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-49944571
content: |-
  Justin Bieber told Peta to 'suck it' after they criticised him for buying two designer kittens.

  Justin Bieber has told animal rights group Peta to "suck it" after it criticised him for buying designer kittens rather than re-homing cats from a shelter.

  According to the Hollywood Reporter, the singer spent $35,000 (£28,000) on a pair of kittens named Sushi and Tuna.

  The Savannah cats are a cross between a domesticated cat and a medium-sized, large-eared wild African Serval cat.

  Peta said the popstar is" fuelling the dangerous demand for hybrid cats".

