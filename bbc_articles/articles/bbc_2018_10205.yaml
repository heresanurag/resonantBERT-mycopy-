title: BBC's James Cook, North America correspondent, hit by tree during report -
  BBC News
date: '2018-08-24'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-45298629
content: |-
  The BBC's James Cook had a lucky escape after a tree hit him as he gave a radio report.

  The BBC's James Cook had a lucky escape after a tree hit him as he delivered a radio report about Hurricane Lane in Hawaii. Cook suffered no injuries, but his laptop was destroyed. Listen to his report.
