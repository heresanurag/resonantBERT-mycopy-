content: |-
  Britain's Lucy Charles takes silver in the Ironman World Championship behind Daniela Ryf who wins despite being stung by a jellyfish.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Britain's Lucy Charles took silver in the Ironman World Championship behind Daniela Ryf, who was stung by a jellyfish just before the start. The 31-year-old Swiss said the pain was so bad she considered pulling out of the race in Kona, Hawaii. After the swimming section, she was nine minutes off the lead but fought back to win in record time. In the men's race, Patrick Lange retained his title and then proposed to his girlfriend on the finish line. Germany's Lange, 32, set a course record, breaking the eight-hour mark for the first time, while Britain's David McNamee finished third. "This was the most intense, most beautiful, most amazing thing that I've ever experienced in my life after just asking Julia to marry me," he said.

  Ryf, who won for the fourth successive year, said she was stung in the armpit by the jellyfish moments before the race began. "I didn't know if I could make it through the swim in such pain - it was horrible," she said. "I thought 'I can't give up' because I'm the defending champion, and I knew little kids would be watching the race. "But I told myself that I couldn't give up because you never know what can happen out here." She finished in a course record of eight hours 26 minutes 16 seconds, beating the previous best by 20 minutes. Charles, 25, broke the course swimming record on her way to matching the second place she recorded on her debut at the event last year. The Ironman triathlon sees competitors complete a 3.8km swim followed by a 180km cycle section and finally a 42.2km run.

  After the race Lange proposed to his girlfriend Julia Hofmann

