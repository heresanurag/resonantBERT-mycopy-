  Case rates have risen in every area of England apart from the South West, Public Health England says.

  Covid cases rise in almost all regions of England

  Covid-19 case rates are rising in all regions of England except the South West, according to the latest weekly surveillance report from Public Health England. North-east England has the highest rate, with 378.6 cases per 100,000 people in the seven days to 5 September, up from 320.3. Yorkshire and the Humber has the second highest rate at 378.4, up from 343.0. London has the lowest rate at 240.0, up slightly from 237.5. Case rates are also continuing to rise in most age groups, the figures showed. The exceptions are 20 to 29-year-olds, 60 to 69-year-olds and people aged 80 and over. The highest rate is among 10 to 19-year-olds, with 681.4 cases per 100,000 people in the seven days to 5 September, up sharply week-on-week from 478.3. The second highest rate is among 20 to 29-year-olds, down from 412.1 to 373.2. The lowest rate is among people aged 80 and over, at 114.0, down slightly from 115.4.
