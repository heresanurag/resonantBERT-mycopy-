  Passing sentence, Judge Richardson said: "[This was] nothing to do with legitimate public protest. It was mob rule. The venom of racism affected the entirety of what occurred. "People inside thought they were going to die. The lives of at least 50 people were endangered. They were all mentally scarred and in peril of being killed or injured. "You were encouraged by malicious and ignorant posts on social media." Birley was the first person connected with the South Yorkshire disorder to plead guilty to the charge of arson with intent to endanger life. Describing his involvement, Ms Kaye said: "It was persistent, it was sustained, it was widespread acts of violence to people and property." The previous highest sentences were handed out to two men who were part of a "baying mob" who attacked a car containing three Romanian men in Hull on 3 August. David Wilkinson was jailed for six years and John Honey was jailed for four years and eight months. At Sheffield Crown Court, the judge said Birley would serve nine years in prison with a further five years on licence. He said a pre-sentence report stated that Birley held views which “raised alarm” with the probation officer and there were hints of a “white supremacist mindset”.

  Birley was sentenced to nine years in prison at Sheffield Crown Court
