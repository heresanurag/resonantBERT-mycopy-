content: |-
  Thomas Birley, 27, receives the longest prison sentence passed to date for his role in the disorder.

  Rioter who stoked asylum hotel fire gets nine years

  Thomas Birley previously admitted violent disorder, arson with intent to endanger life and having an offensive weapon

  A man who stoked a fire outside a hotel housing more than 200 asylum seekers has been jailed for nine years - the longest sentence passed to date after widespread violence erupted across the UK last month. Thomas Birley, 27, was seen piling chipboard onto a burning bin outside the Holiday Inn Express in Manvers, South Yorkshire, during rioting on 4 August. Sheffield Crown Court heard those inside feared they were "going to burn to death", while Judge Jeremy Richardson KC described it as "one of the worst of many cases" he had dealt with. Birley, of Rowms Lane, Swinton, was jailed after he admitted arson with intent to endanger life, violent disorder and possession of an offensive weapon, namely a police baton.

  Birley was pictured holding a police baton in front of a line of officers

  CCTV played to the court showed Birley, dressed in a black puffer jacket and a red face covering, abusing officers as large crowds gathered outside the building. Prosecutor Alisha Kaye said the painter and decorator was then part of the group that smashed the ground floor window of the hotel. He was also seen putting chipboard onto a fire that had been started in an industrial-sized waste bin which had been pushed up against a fire door. During the violence 22 staff in the hotel barricaded themselves into the hotel's panic room while more than 200 asylum seekers were trapped inside the building, despite automated fire alarms telling them to leave.

