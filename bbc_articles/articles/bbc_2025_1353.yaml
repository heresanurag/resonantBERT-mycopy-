title: 'Zhenhao Zou: Rape accused denies buying drug to assault women - BBC News'
date: '2025-02-18'
section: London
url: http://www.bbc.co.uk/news/articles/cz9e947yyj5o
content: |-
  A Chinese PhD student accused of 10 rapes bought drugs online in order to get high, a court hears.

  Mr Zou is accused of drugging and raping three women in London and seven in China between 2019 and 2023, which he denies

  A PhD student accused of raping 10 women using alcohol and drugs has denied buying a drug from China in order to carry out sexual assaults on women. Zhenhao Zou, who denies all charges, began giving evidence during his trial at Inner London Crown Court on Monday. Asked about his online purchase of two bottles of Butanediol that were found in his wardrobe by police, Mr Zou said he intended to take the drug in nightclubs to get high. He said he poured it into drinks and drank them himself in order to feel "happier in parties".

  Asked if he intended to use that substance to carry out sexual assaults on women, he replied: "No." The 27-year-old is accused of drugging and raping three women in London and seven in China between 2019 and 2023. He denies the charges. On Monday he told the court that he came into contact with drugs like cocaine and ketamine from parties and going to nightclubs while he was a PhD student at University College London (UCL). In a prepared statement he gave to police in January 2024 following his arrest, which was read to jurors, Mr Zou said: "The two bottles in my room were bought in July 2023 and the substance is Butanediol which I use for moisturising my face and body. "The bottles are sealed because I had not used it yet as I had not finished my moisturiser." Earlier in court he said he purchased the drug from online retailer Taobao in China and had it delivered to him in the UK. Asked by his barrister if it was true that he used Butanediol as a moisturiser, he said no. Mr Zou said he did not tell the police about taking the drug because he didn't want to be considered as a drug user.

  In his January 2024 statement to police, Mr Zou also said: "I am in the habit of taking pictures of my sexual activity with my sexual partners. The pictures are only taken with her consent and agreement. "As to the allegation of rape I deny having sexual intercourse with a partner without her consent and I always believed she consented to it." Earlier on Monday Mr Zou told the court his "favourite" pornography involved sleeping women. Asked by his lawyer Mark Cotter KC why that type of pornography appealed to him, Mr Zou said: "I like it because the girl appears to be still and quiet when they are having sex." Mr Cotter then asked Mr Zou: "What about being asleep?" The student replied: "Yes, that's my favourite type. But I could not find that." The jury has previously been shown videos the prosecution alleges show Mr Zou having sex with drunk and unconscious women. At the trial two women have testified that he raped them as they drifted in and out of consciousness. Mr Zou said told the court he grew up in China and then came to study at university in the UK. He said he returned to China between March 2020 and July 2021 because of the Covid pandemic. Prosecutors said Mr Zou appears to be "a smart and charming young man" but is in fact "a persistent sexual predator, a voyeur and a rapist". He denies 11 charges of raping 10 different women. The trial continues.
