content: |-
  Paul Chuckle shares memories of his late brother - and talks about the challenges of going solo.

  Chuckle brother says Barry is 'always by my side'

  The Chuckle Brothers spent more than 30 years on BBC television

  Chuckle Brothers star Paul Chuckle made a promise to his late brother Barry that he would keep on making people laugh. Here he talks about life without his comic sidekick and how humour and happiness can exist alongside grief. If you were a child of a certain generation, then chances are you were familiar with the farcical adventures of the Chuckle Brothers. The duo, born Paul and Barry Elliott from Rotherham, were a staple in British homes with their TV show ChuckleVision, which aired nearly 300 episodes during the 1990s and 2000s. Its premise was good old-fashioned, family humour. Paul and Barry were the well-meaning but hapless, accident-prone brothers who unintentionally caused chaos wherever they went, often with the mutterings of "To me, to you".

  Their intuitive performance style and natural chemistry made the pair's bond even more special. When Barry died from bone cancer aged 73 in 2018 and asked whether Paul would carry on entertaining, there was never a question of doing anything else.

  In 2019, ChuckleVision was named the greatest CBBC series of all time

  Paul, 77, reflects: "He said, 'you're not going to pack it in are you?' and I said 'no of course I'm not'. I mean what else would I do? It's too late to join a football team." Having forged an inseparable bond on screen and off over decades of performing together, it was a difficult adjustment. Paul says: "I was always the straight one and Barry was the comedian. "I would feed the jokes and he would give the punchline but now I've got to do it on my own." But from panto appearances to frequent DJ stints in nightclubs, Paul continues to keep busy and fulfil his brother's wish. Although no longer physically by his side, Paul says Barry stays close in spirit, especially when he is performing which brings "immense comfort". "Since 1963 I'd never really been on stage without him by my side. "But I'm used to it now and I feel he's with me all the time. Whenever I walk on stage I feel he's there and it's a lovely feeling." His career has seen a slight directional change with a new gangster film, Fall to the Top, set to air next year showing a more serious side to the comical brother. "Everyone expects me to be silly and stupid but now I'm a stupid killer," he adds. "It's completely different to other things I've done but I really enjoyed it." Asked whether Barry would approve of his role, he replies: "He loves it, I know he does. He's always said I was a nasty so-and-so."

  Paul Chuckle is supporting Marie Curie's Great Daffodil Appeal, the charity's biggest annual fundraising campaign

  As well as doing what he does best - entertaining - Paul is an ambassador for Marie Curie, the end-of-life charity that provides support for people living with terminal illness and their families. He talks warmly about his role and how helping with fundraising enables Barry's legacy to live on. "They were there for Barry at the end and for my father-in-law as well when he died. "The nurses were such a huge support to our family, coming in at such a difficult time and their visits gave us all a moment to breathe." Though heartbroken by the loss of his beloved Barry, Paul says the outlook has to be positive. "Life doesn't end for the people who are left behind, it's hard but you have to keep on going." He adds: "You have to get out there and enjoy yourself because you never know how long it will last." Listen to highlights from South Yorkshire on BBC Sounds, catch up with the latest episode of Look North.
