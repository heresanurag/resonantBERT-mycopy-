title: 'Tory leadership contest: 10 rivals face first ballot of MPs - BBC News'
date: '2019-06-13'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-48616776
content: |-
  At least one contender will be knocked out later in the race to become the next prime minister.

  Tory MPs have voted in the first round of the contest to select a new party leader and the next prime minister.

  A secret ballot was held in the House of Commons, with a result expected some time after 13:00 BST.

  Outgoing leader Theresa May refused to say which of the 10 contenders she had voted for, telling reporters: "That's none of your business."

  Any candidate who fails to secure at least 17 MPs' votes will be eliminated from the contest.

  Further ballots will be held next week, with the two most popular MPs moving to a run-off of Tory party members.

  The winner of the contest to succeed Mrs May is expected to be announced in the week of 22 July.

  Esther McVey was the first candidate to cast her vote and Boris Johnson the last.

  Mr Johnson - who launched his leadership campaign on Wednesday - is regarded as the frontrunner in the contest, with many more public endorsements from MPs than any of his rivals.

  In his pitch to MPs, the former foreign secretary pledged to take the UK out of the EU by the end of October. He gave little detail of his plan but stressed it was not his aim to leave without a deal.

  This video can not be played To play this video you need to enable JavaScript in your browser. The BBC's Jessica Parker explains how the new leader - and new PM - will be selected

  He also defended what he called his straight-talking style, saying the public wanted to hear what politicians genuinely thought. But he dodged questions on whether he had ever taken cocaine.

  One rival, Home Secretary Sajid Javid, described Mr Johnson as "yesterday's news".

  "We need tomorrow's leader, today," he said. "Not the same old insiders with the same old school ties - but a new generation, with a new agenda."

  Mr Javid told BBC Radio 4's Today programme he wanted to leave the EU with a deal, but would choose no deal over no Brexit.

  He said there needed to be changes to the controversial Irish backstop - designed to avoid a hard border on the island of Ireland - of either a time limit "or some proper exit clause", and UK government should offer to pay for any "alternative arrangements" for the border.

  Mr Javid, Environment Secretary Michael Gove, former Brexit Secretary Dominic Raab and Foreign Secretary Jeremy Hunt have all received enough public endorsements to suggest they will make it through to the next round.

  The remaining five candidates - Matt Hancock, Rory Stewart, Andrea Leadsom, Mark Harper and Ms McVey - are hoping to make it through and to build momentum.

  What we can say, in terms of the public declarations, is that Boris Johnson is way ahead with well over 80 nominations.

  Then at the bottom there are three or four candidates perhaps, who have been struggling to get to the mark they need to stay in the race, which is 16 votes (from other MPs).

  There is Rory Stewart, who has been pitching himself at the left of the Tory party and has completely ruled out leaving the EU without a deal; Mark Harper, the former chief whip, and then two Brexiteers Esther McVey and Andrea Leadsom, on the other side of the party.

  All four of those are in the danger zone. I think it's likely that at least two of those will go out.

  But it is really hard to read: it is unpredictable and it's a secret ballot.

  More than a quarter of the 313 Conservative MPs eligible to vote have yet to state openly whom they are supporting - and, with it being a secret ballot, MPs could vote differently to their declared intention.

  The leadership race has so far been dominated by Brexit and arguments over whether a deal can be renegotiated with the EU by 31 October, and whether talking up a no-deal Brexit is a plausible promise.

  On Wednesday afternoon, MPs rejected a Labour-led effort to take control of Parliament's timetable, thereby blocking the latest attempt to stop a no-deal Brexit.

  The Commons opposed the move by 309 votes to 298, prompting cheers from the Tory benches.

  If passed, it would have given opponents of a no-deal Brexit the chance to table legislation to thwart the UK leaving without any agreement on the 31 October deadline.

  Conservative former minister Sir Oliver Letwin, who has been behind a series of cross-party attempts to block a no-deal, said Parliament may have run out of options.

  "On October 31, the UK leaves the EU regardless of whether we do or don't have a deal in place unless somebody does something to alter that," he told the BBC Radio 4 Today programme.

  "We have run out of all the possibilities any of us can - at the moment anyway - think of for Parliament to be able to insist on having a view," he added.

  Thursday's ballot is taking place under new rules agreed by the Conservative Party earlier this month designed to speed up the contest.

  Any candidate who fails to gain 5% of the vote in the first round will be out.

  If all 10 candidates receive 17 votes, then the one with the fewest votes will drop out of the contest.

  If the two weakest candidates receive the same number of votes, then a decision will be taken between them on how to proceed. The candidates are allowed to vote for themselves.

  Subsequent ballots are scheduled to take place on 18, 19 and 20 June to whittle down the contenders one by one until only two are left.

  The final pair will then be put to a vote of members of the wider Conservative Party from 22 June, with the winner expected to be announced about four weeks later.

