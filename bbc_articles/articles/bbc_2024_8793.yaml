content: |-
  Video shows Army horses running loose through the city, colliding with vehicles and causing havoc.

  Four people have been injured after five Household Cavalry horses ran loose through central London, causing chaos and colliding with vehicles.

  The horses - one of which was covered in blood - had been spooked by noise from a building site near Buckingham Palace.

  The Army said three soldiers had incurred injuries, which were not life-threatening and the horses were undergoing veterinary care.

  The fourth person injured in the incident is believed to be a cyclist and member of the public.

