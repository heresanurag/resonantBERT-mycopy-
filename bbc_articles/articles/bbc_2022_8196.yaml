id: bbc_2022_8196
title: 'Cardiff Bay: Chemical leak sees three taken to hospital - BBC News'
date: '2022-06-19'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-61858136
content: |-
  The fire service describes it as a "small scale gas release" which has now been resolved.

  Police are advising people to avoid the area

  Three port workers have been taken to hospital as a precaution after a chemical leak in Cardiff Bay.

  People were advised to keep doors and windows closed around Queen Alexandra Docks, Butetown.

  By 17:30 BST, emergency services said there was no risk to to the public.

  Specialist teams from South Wales Fire and Rescue Service (SWFRS) and the Welsh Ambulance Service were called out shortly after 11:00.

  "The incident was a small scale gas release, which was resolved with the assistance of an on-site engineer," a SWFRS spokesman said.

  "Three workers have been transferred to hospital for precautionary checks."

  The ambulance service sent a rapid response car, ambulance and its hazardous area response team to the scene.
