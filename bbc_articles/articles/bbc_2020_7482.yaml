  Concerns have also been raised about litter left in beauty spots since restrictions were eased, and visitors returned to popular beaches and mountains.

  North Wales Police said the amount of litter being left on The Great Orme, Llandudno, by people picnicking was "unacceptable" at the weekend.

  Helen Pye said people were queuing at the top to reach Snowdon's summit

  Snowdonia National Park Authority said they were holding urgent talks with partners, including police and other national parks.

  Helen Pye, of SNPA, said: "We've had things in place to cope with a busy period as lockdown eases, but there's only so much that one mountain can take. "It's almost as if people are working out their pent up longing for open spaces and the countryside. "It's lovely that people want to come and visit, but we do need everyone to check the car park situation before they arrive and park sensibly when they do.

  "Once people are on the mountain, everything seems fine. Our wardens at the top of Snowdon itself say that there are queues for the summit, but people are being good natured and are social distancing."
