title: 'Snowdon: Dangerous parking at beauty spots put ''lives at risk'' - BBC News'
date: '2020-07-25'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-53469337
content: |-
  Hundreds of cars parked illegally on Snowdonia roads, while a lifeboat station was blocked by motorbikes.

  This video can not be played To play this video you need to enable JavaScript in your browser. More than 500 cars were parked along the roads in Snowdonia

  Visitors to Welsh beauty spots are "putting lives at risk" with dangerous parking, officials have warned.

  Over the weekend more than 500 cars parked on mountain roads in Snowdonia, with people camping in laybys to hike up Snowdon.

  In Barmouth visitors blocked a potential rescue by parking on the lifeboat forecourt.

  The RNLI warned they were "putting lives at risk".

  Snowdonia National Park Authority said it was holding "urgent talks" to plan and agree a way forward after chaotic scenes near Snowdon.

  Helen Pye, of SNPA, said staff and volunteers said the number of visitors to Snowdon at the weekend "was nothing like they'd ever seen before".

