  Ms Jefferies said people were camped in laybys, and the Sherpa bus to bring hikers to the mountain could not get through due to the "reckless parking".

  Hundreds of people were fined by police, but with the fine only being about £30, Ms Jefferies said it was not a deterrent.

  "People just think they want to go up it because it is the highest mountain in Wales, but there are so many other places," she added, calling for Visit Wales to actively promote other routes.

  Ms Jefferies said while business owners were desperate for tourists to return to the area, people needed to respect the national park and think about the consequences of their actions.

  "We are lucky we have the scenery, I know lockdown has been hard for people living in cities, but people are not respecting the environment or other people," she said.

  "It was just so haphazard, fancy stopping on a mountain on a bend, and not thinking about the consequences, and just going for a walk, it's so selfish."

  Tickets have been issued to some cars

  Plaid Cymru politicians said the scenes were "truly shocking" and called for a park and ride scheme to be brought in urgently.

  "Nothing can excuse the behaviour of those who wantonly abandoned their vehicles on an exceptionally busy stretch of the A4086," they said in a statement.

  "What events over the weekend underscored is that we cannot wait any longer for a lasting solution to this problem."

  Snowdonia National Park Authority, Gwynedd and Conwy councils have been reviewing parking and transport for the area.

  Ms Jefferies said having a park and ride service could be a solution, to get people to spend in villages and towns, or passes for local residents.

  In Barmouth, Gwynedd, the RNLI said people had parked outside the lifeboat station, blocking spaces for volunteers.

  In a tweet the service said: "We need this space for crew to park in case of a shout and to get the lifeboats out.

  "You are potentially putting lives at risks parking here."

