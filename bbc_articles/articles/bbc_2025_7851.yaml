  Look beyond the actions and theatre of the Trump White House to the macro trends of the 21st century. There is the migration of economic and political heft to the East. There is the migration of many, many people towards the West, digitally savvy about the relative riches here, climate change and conflict among the push factors for some too. There is the internet revolution upending business models and working patterns, inventing social media and concentrating vast wealth and influence among a clutch of global behemoths like Apple, Meta, Amazon and X. And there is the artificial intelligence revolution in the infancy of its influence. All this is the context and in part the explanation for the political tussles playing out and the personalities at the centre of them. And, my goodness, it is not an easy time to be leading a western democracy. Ask any of those in office now, or any of those recently ejected. President Trump is arguably an illustration of this and a collective reaction from America to some of the changes I've mentioned above. And meanwhile, the prime minister is hoping for the best – that he can find the money to boost defence spending, convince the country and the markets that he can manage the national finances and negotiate a better trade deal with President Trump. Pull these things off and perhaps a few others and maybe just maybe that longed for economic growth comes next. But again and again events pop up to complicate and confound any apparently linear path towards it.

