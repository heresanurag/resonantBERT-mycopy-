  Aberdeen's crisp-stealing seagulls strike again.

  Aberdeen's shoplifting seagulls are back - swooping in to steal crisps from a late night shop.

  Zaman Iqbal filmed this one being chased out of his 24 Hour Sweet News on the city's Crown Street.

  Gulls have been blamed for a series of similar raids in Aberdeen in recent years.
