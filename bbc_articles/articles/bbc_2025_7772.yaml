content: |-
  The fires on Monday and Tuesday were captured on camera by crews tackling the blazes.

  Video shows the extent of a fire at a country park that broke out in woodland.

  Firefighters were tackling further hotspots on Wednesday at Moors Valley Country Park on the Dorset-Hampshire border near Ringwood.

  Footage from the fire service was published on social media after wildfires broke out in woodland on Monday and again near the main entrance on Tuesday afternoon.

  The fires have led to the park's closure and destroyed several hectares of woodland.

