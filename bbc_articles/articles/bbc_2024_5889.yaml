title: 'Euro 2024 play-off final: Wales fans distraught after defeat - BBC News'
date: '2024-03-26'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-68668930
content: |-
  There is a subdued atmosphere outside the stadium, but many fans expressed pride in the team.

