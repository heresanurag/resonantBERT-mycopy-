  Former Manchester United manager Erik ten Hag says he wishes the club's fans "nothing but success, trophies and glory" following his sacking on Monday.

  Ten Hag wishes Man Utd 'trophies and glory' after 'end of dream'

  Erik ten Hag's 54.6% win record is the second best of any Manchester United manager since Sir Alex Ferguson's retirement – behind only Jose Mourinho's 58.3%

  Erik ten Hag says he wishes Manchester United fans "nothing but success, trophies and glory" after he was sacked on Monday. The 54-year-old was dismissed following last weekend's 2-1 Premier League defeat at West Ham, and United have appointed Sporting boss Ruben Amorim as the Dutchman's permanent successor. Ten Hag, who won two trophies in as many seasons at United, thanked supporters in a statement released by his representatives SEG. "Thank you for always being there for the club," he said. "Whether it was at a game far away or a tough match at Old Trafford, your support has been unshakeable. The atmosphere at Old Trafford has always been electrifying, thanks to you. "I also want to thank the staff in every department of the club for their unwavering support in good times and bad."

  The former Ajax manager took charge in the summer of 2022, ending the club's six-year wait for silverware by winning the Carabao Cup and achieving a third-placed finish in the Premier League in his first season. Ten Hag also led United to an FA Cup final victory over neighbours Manchester City in May, but the club finished a disappointing eighth in the league. He was sacked following a poor start to the 2024-25 campaign, leaving United 14th after nine games. "We won two trophies - achievements that I will cherish for the rest of my life," added Ten Hag. "Of course my dream was to bring more trophies to the cabinet. Unfortunately, that dream has come to an end. "I wish all Manchester United fans nothing but success, trophies and glory. "Your support, and the warmth I received from everyone at the club, helped me feel at home. Thank you for this chapter in my life." United confirmed on Friday that 39-year-old Portuguese coach Amorim will move to Old Trafford from Lisbon club Sporting on 11 November, on a contract until June 2027. Former United striker Ruud van Nistelrooy, who took charge on an interim basis after Ten Hag was sacked on Monday, will stay on for the club's next three fixtures.
