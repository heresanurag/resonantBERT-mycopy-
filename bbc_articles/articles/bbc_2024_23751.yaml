  Several windows of a bungalow in Newtownards were blown out during the blast in Dakota Avenue.

  Two injured in explosion at house in Newtownards

  Windows of the house were blown out during the explosion

  Two people have been injured during an accidental explosion at a house in Newtownards, County Down. Firefighters, police and ambulance staff attended the scene in Dakota Avenue on Tuesday afternoon. Several windows of the bungalow were blown out during the blast which was reported shortly before 15:00 BST. Both people who were injured were treated at the scene before one of the casualties was brought to hospital by ambulance staff.

  Neighbours described the explosion as sounding "like a bomb" this afternoon, as they rushed to check on friends and relatives. One told me they didn't know what had happened, they just ran. The bungalow, on the West Winds estate, overlooked by Scrabo Tower in Newtownards, has had 3 of its 4 front windows blown out, and back windows also destroyed. Curtains and blinds bellow out into the air.

  A cordon was put in place around the damaged house

  In a statement, the Northern Ireland Fire and Rescue Service (NIFRS) said: "Firefighters wearing breathing apparatus used gas monitors and thermal imaging cameras to inspect and make the property safe." Firefighters also checked adjacent homes to ensure there was no further danger. The operation ended just before 17:15 BST. "The cause of the explosion was determined as accidental and the scene was left with NI Housing Executive," the NIFRS added.
