title: 'Heysham fire: Student who murdered stepfather''s mother jailed - BBC News'
date: '2021-11-12'
section: Lancashire
url: http://www.bbc.co.uk/news/uk-england-lancashire-59258857
content: |-
  Tiernan Darnton, 21, must spend a minimum of 15 years in jail for murdering his stepfather's mother.

  Student Tiernan Darnton, 21, confessed in a game of truth or dare he had killed his stepfather's mother

  A "composed and calculating" student who murdered his stepfather's mother in a house fire has been jailed for life.

  Tiernan Darnton, 21, trapped 94-year-old Mary Gregory in a blaze at her home in Heysham, Lancashire in 2018.

  Her death was treated as an accident until Darnton, who had confessed to the killing in a game of truth or dare, made a similar confession during counselling in 2019.

  He was sentenced to life with a minimum term of 15 years.

  Darnton had denied murder but was convicted by a jury on Thursday at Preston Crown Court.

  At the sentencing hearing, the judge said she rejected the notion that it had been "an act of mercy" by the then 17-year-old.

  Darnton claimed he had disabled a fire alarm and started the fire because he did not want Mrs Gregory to suffer any longer from dementia.

  But Mrs Justice Yip said: "No-one could seriously think that trapping an elderly woman in a burning building was an act of mercy."

  She added: "Murder had been on your mind for some time... You were fascinated by serial killers and their crimes. You had dark thoughts."

  The court also heard that "disturbing material," which was not presented to the jury during the trial, had also been found in Darnton's possession, including plans to stalk and attack women and a "kill list" with people's names on.

  Mrs Gregory died in hospital four days after being pulled from the fire at her home in Heysham

  The jury was told an initial investigation had concluded that Mrs Gregory, who was a heavy smoker, had died in an accidental fire on 28 May 2018.

  However, police reopened the case in May 2019 after Darnton told a counsellor he had killed his stepfather's mother by using a lighter to set a curtain on fire at the house in Levens Drive.

  The court heard he had also confessed several weeks after Mrs Gregory's death, during a game of truth or dare with two friends in which he revealed his "darkest secret".

  But he later claimed he only wanted to impress his "edgy" friends in the truth or dare game and was "attention-seeking" with the counsellor, who he claimed had fabricated parts of their conversation.

  The judge told him: "It is hard to imagine the horror Mrs Gregory must have felt when she realised her house was on fire and was filling with smoke.

  "Neighbours heard her screams. Despite her frailty, she tried to get out, but she had been trapped.

  "The fire service found her near to the conservatory doors, where you had blocked her exit."

  She added that he had been "composed and calculating" when giving "untruthful evidence" to the jury and his actions pointed to "a significant degree of planning and premeditation".

  The jury was shown detailed drawings found at Darnton's home which outlined the floorplan of Mrs Gregory's home.

  Police found drawings at Darnton's home which outlined the floorplan of Mrs Gregory's bungalow

  They contained labels including "good hiding place" and "quick exit" and references for needing a "good alibi".

  Detectives also found searches on his mobile phone and computer from June 2018 which read "murderer filled with despair" and "I'm a monster and I'm going to hell".

  Mrs Gregory's son Peter told the court that the actions of Darnton, who had "no biological or legal connection with our family whatsoever," continue to have repercussions throughout his family.

  "Having learnt that my mum's death was at the hands of Tiernan Darnton, whom we had willingly welcomed into our family home, is disgusting and shattering," he said.

  "He was frequently in mum's house in the final months leading to [her] death.

  "She despised and distrusted him, and did not want him anywhere near her."

  He said he must "live with the burden" that his brother, Chris Gregory, Darnton's stepfather, "did not heed [his mother's] warnings" and "even gave him keys".

  He added that he never accepted that Mrs Gregory died in an accident.

  Victoria Agullo, senior crown prosecutor at CPS, said Darnton had deliberately started the fire and then "took steps to prevent [Mrs Gregory] from calling for help and escaping".

  "I cannot begin to imagine the devastation this has caused to the family, losing their beloved relative in this way," she said.

