title: Big Brother edits out pro-Palestine symbol on t-shirt - BBC News
date: '2024-10-24'
section: Middle East
url: http://www.bbc.co.uk/news/articles/cd9nd5ln2xno
content: |-
  ITVX re-uploaded Tuesday's episode after removing a watermelon symbol on a contestant's T-shirt.

  Ali said she was not aware of the implications of the symbol on her t-shirt

  ITV has edited out a pro-Palestinian symbol from an episode of Big Brother, which could be seen on the T-shirt of a housemate. On Tuesday night's episode, contestant Ali Bromley was seen wearing a black T-shirt displaying a watermelon in the shape of Israel, while she was in the garden of the Big Brother house. The watermelon symbol has been used to show solidarity with Palestinians, external during the Israel-Gaza war. The episode has since been edited and ITV said the housemate had told them she was "unaware of the implications" of the symbol and "did not wish to cause offence".

  After the episode aired, it was removed from ITVX and re-uploaded on Wednesday with the watermelon symbol removed from Bromley's T-shirt. A spokesman for Big Brother said it did not "allow any personal items into the house that could be deemed harmful". "We regret that the implications of this particular item of clothing were not fully understood in our bag checks or prior to broadcast of last night’s show," the broadcaster said. "We apologise to any viewers who have been offended by the broadcast and assure viewers that Big Brother was unaware of the implications of the image." It added that the item of clothing had now been removed from the house and the housemate "expressed that they are unaware of the implications and did not wish to cause any harm or offence". Tuesday's episode of Big Brother Late & Live was also edited to remove the footage of Bromley wearing the top. More than 42,000 Palestinians have been killed since the Hamas attack on 7 October, in which around 1,200 people were killed and 251 taken hostage. The watermelon symbol is synonymous with the pro-Palestinian movement as the colours of the fruit are the same as those on the Palestinian flag. Following Tuesday's episode, charity Campaign Against Antisemitism said it had submitted a complaint to Ofcom as the "incident represents a serious violation of broadcasting standards". In a statement on X, the organisation said the graphic was anti-Semitic and "caused significant distress among the British Jewish community, who regard it as a genocidal message similar to the slogan From the River to the Sea which calls for the elimination of the world’s only Jewish state." The Palestine Solidarity Campaign and other activists contest this, saying the slogan refers to "the right of all Palestinians to freedom, equality and justice".
