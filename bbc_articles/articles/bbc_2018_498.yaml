id: bbc_2018_498
title: Hero fiancé tackles jewellery shop thief - BBC News
date: '2018-01-26'
section: General
url: http://www.bbc.co.uk/news/uk-england-lancashire-42830580
content: |-
  The man is seen on CCTV casually removing his jacket before taking down the raider.

  CCTV has been released of a have-a-go hero tackling a thief in a jewellery shop in Preston.

  The husband-to-be, who was with his fiancée collecting her engagement ring, sprang into action when the burglar burst in.

  Gary Shaw, 55, co-owner of DJM Goldsmiths, said Andy Fiddler, 52, was "fantastic" for tackling the thief.

  "It was impressive the way he took his jacket off and just jumped in there," he added.

  The thief was later jailed for 16 weeks for burglary.
