  Mother-of-six Donna Conniff, 40, was sentenced to two years for violent disorder after she threw a brick and a rock at officers during a violent protest in Hartlepool. She was identified from footage of the protest, which took place in the town on 31 July. She was seen handing a brick to a child and encouraging him to throw it at the police "Your behaviour and the behaviour of others around you was truly disgraceful," Judge Francis Laird KC told her. She will have to serve up to half of her 24 month sentence in custody before being released on licence.

  David Notley, 67 has been jailed for 20 months after pleading guilty to violent disorder and causing religiously aggravated distress. He was sentenced at Inner London Crown Court, after he shouted "you're not English any more" at police officers during a demonstration on Whitehall.

  Kelly Wildego, a 41-year-old mother, was given a four-month suspended sentence, after assaulting an emergency worker during a demonstration in central London. Prosecutors said Wildego shouted expletives at police officers and rushed at them after most of the violence had stopped. Joseph Lord, defending, said Wildego is "wholly ashamed" of her actions and got herself arrested to be with her husband, who had been detained by police earlier. She was given a suspended sentence because she is a full-time carer for her son, who has learning difficulties.

  Dean Groenewald, 32, has been sentenced to two years and two months imprisonment

  Dean Groenewald, 32, was sentenced to two years and two months at Newcastle Crown Court, for his part in rioting in Sunderland - described by the judge as "an orgy of violence" - on the day after three girls were stabbed to death in Southport. Groenewald has 30 previous convictions including for affray, criminal damage and common assault and was on licence for a previous offence at the time of the Sunderland disorder.

  David Engleby, Paul Dryhurst and Luke Summerfield were all jailed for throwing missiles at police near to a Southport mosque. Engelby, 29, from Southport, was jailed for two years and four months, Dryhurst, 33, from Litherland, received two years, and Summerfield, 33, from Aston under Lyne in Greater Manchester, was jailed for two years and two months. The court heard Dryhurst’s parents both work for the ambulance service and were “baffled” at their son’s behaviour. Judge Watson said: “It would be wrong and misleading to look at the actions of individuals in isolation, because violence feeds on itself. Events gain a momentum of their own.”

  Graham Brookes, 42, had not previously been in trouble with the police but was caught on camera throwing a pint of cider towards officers, aiming a kick at one, in Manchester city centre crowd violence on 3 August. He has been jailed for 20 months for violent disorder. A "legion of testimonials" praising him was given to Judge Patrick Field KC, who questioned how a "family man with a good work record" could behave "like a hooligan". Also sentenced for his role in the Manchester rioting was Thomas Ward, 35, who was jailed for 32 months after exposing his genitals to female police officers. He was seen on social media footage stamping on fences and throwing a plank of wood at officers.

  On Monday Downing Street confirmed it has activated emergency measures to ease prison overcrowding in parts of northern England and the Midlands. As of last Friday morning there were 87,893 people in jails in England and Wales. This means institutions were left with an operating margin of 1,298 beds, about 1.5% of the system's total capacity. The emergency measures, known as Operation Early Dawn will mean defendants will only be summoned to a magistrates' court when a space in prison is ready for them. Court cases could be delayed, with people kept in police holding cells or released on bail while they await trial Meanwhile the Prisons Service, courts and police will assess which defendants can be transferred from police cells to courts to ensure there is a space for them if they are remanded in custody. Speaking on a visit to east Belfast on Monday, the prime minister said recent racially motivated violence in Northern Ireland was "intolerable". Dozens of police officers were injured as they dealt with racially-motivated trouble on Belfast's streets in recent weeks, linked to anti-immigration protests. Referring to unrest that also took place in Londonderry, Sir Keir Starmer said the violence was "clearly racist and does not represent the modern forward looking Northern Ireland that I know this place is”.
