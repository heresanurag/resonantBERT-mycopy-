title: Crews say firework attack disorder 'like Gotham City' - BBC News
date: '2024-11-06'
section: Manchester
url: http://www.bbc.co.uk/news/articles/czxre442g8no
content: |-
  Bonfire night disorder in parts of Greater Manchester saw police make a flurry of arrests.

  This video can not be played To play this video you need to enable JavaScript in your browser. The disorder in Salford and part of Manchester led to several arrests

  Firefighters who came under attack by masked men hurling fireworks have described the scenes of disorder as "like Gotham City". Crews in Salford said they were targeted by rockets that exploded just 20 yards (18m) away as they hosed down a car fire on Liverpool Street in the city. Meanwhile, three teenagers were arrested after fireworks were used as missiles to throw at police and firefighters in Gorton, Manchester. One crew member said the scenes were reminiscent of the fictional city setting for superhero Batman, and joked that he "wouldn't use the q-word" to describe this year's Bonfire Night.

  Supt Richard McNamara said three males aged 16-18 had been arrested on suspicion of causing violent disorder in Gorton, with further arrests to follow.

  "It is shocking that we are seeing fireworks being used as weapons towards emergency services as they try and keep our communities safe," he said. "Thankfully, there were no reported injuries made to us and, despite fireworks being aimed at our officers, I am pleased to say that none were injured." The attacks came after the fire service warned of consequences for anyone targeting the emergency services during what remains one of the busiest times of the year.

  Three arrests were made in the Gorton area of Manchester, police said

  Crews in Salford were at one point attempting to manage 33 ongoing incidents, according to the Local Democracy Reporting Service. One saw a team of four firefighters threatened when trying to deal with a large bonfire near homes - due to fears it could spread. They reported being surrounded by about 20 people and told by a man in a balaclava "we're like a pack of wolves ready to attack". Later, another group threw a shopping trolley in front of their vehicle to stop it attending another fire on Goodiers Drive.

  Crews said they were threatened trying to put out fires across Salford

  Supt McNamara said officers were pursuing several lines of enquiry after the Gorton attacks. He said Greater Manchester Police had been working alongside others in the area throughout the evening, deploying joint patrols with youth services and Greater Manchester Fire Service.
