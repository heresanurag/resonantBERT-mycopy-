content: |-
  India captain Virat Kohli needs a replay on the big screen to convince him to leave the crease after being bowled by England's Moeen Ali.

  India v England: Virat Kohli refuses to walk after being bowled by Moeen Ali Last updated on .From the section Cricket

  Kohli went into the second Test with an average of 53.24 Outside edges are one thing, but India captain Virat Kohli took it to another level when he refused to leave the crease despite being bowled by Moeen Ali in the second Test against England. Kohli, the country's sporting hero and batting superstar, was cheered to the crease by a 15,000-strong crowd on the opening morning in Chennai. He failed to score off his first four deliveries. The fifth, tossed up outside off stump, tempted Kohli into an ambitious cover drive. The ball turned sharply, went between bat and pad and clipped the top of middle and off stump. England celebrated. The crowd fell silent. And Kohli just stood there. A look of disbelief etched on his face as he glanced back at the bails on the ground, he looked pleadingly towards batting partner Rohit Sharma. The umpire even had to ask for the replay to be shown on the big screen before Kohli finally left the field, still struggling to grasp what had happened to him. His depature to Moeen was the first time Kohli had been bowled for a duck by a spinner in Test cricket "It was an extraordinary performance. Presumably the umpires had to show him a review to get him off the field," said BBC cricket correspondent Jonathan Agnew. "The last person that stood like that after being clean bowled was WG Grace." Legend has it that Grace refused to walk and once said "they came to see me bat, not you umpire" when given out lbw. Within moments of Kohli's dismissal, Grace was trending on Twitter.
  • None 'It's a bit like VAR' - Leach jokes about review system after TV umpire controversy It was only the second time Kohli had been bowled by an off-spinner in 89 Tests, while all-rounder Moeen savoured the perfect start to his first Test since August 2019. "It did turn big but Moeen did him with the drift - he lured him in," former England captain Alastair Cook said on The Cricket Social. "That was a beautiful ball. If Graeme Swann bowled that we would be saying 'that's amazing'." Former England captain Michael Vaughan joked that the wicket was similar to his dismissal of India legend Sachin Tendulkar in 2002... Vaughan bowled Tendulkar for 92 at Trent Bridge in 2002 'The great man is gone' Moeen bowled Kohli in his fifth over 'Spilled coffee and a stubbed toe' - how you reacted England fans were rewarded for an early-morning wake-up... Dr. Ben: Crowd silent. Kohli refusing to walk. Worth waking up so early. Niall Davey: Seeing Kohli getting clean bowled for a duck has definitely justified my decision to get up ridiculously early on a Saturday for the cricket! Time for a spam sandwich... Angus: Spilt half a coffee on my leg and stubbed my toe after being caught off guard by that Kohli dismissal. I can offer no higher reward for Moeen than that. Stuart Broad's Bandana: Think I'll watch the replay of that Kohli dismissal on loop for the whole of the lunch interval. Charlie: You would have to actually hate cricket to not absolutely love seeing Moeen do that! And one even penned a poem... Ruth Brooksbank: Couldn't resist this: There once was a captain called Kohli, Who to the Indian supporters is holy. But it was comedy gold, As he got clean bowled, And walked off ever so slowly.
