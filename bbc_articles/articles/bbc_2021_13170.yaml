title: 'Energy crisis: Kwarteng says price cap will stay - BBC News'
date: '2021-10-11'
section: General
url: http://www.bbc.co.uk/news/uk-politics-58857205
content: |-
  The business secretary says the consumer protection will be maintained despite soaring gas prices.

  Kwasi Kwarteng has said that the energy price cap will stay, despite calls from suppliers for the cap to be scrapped amid soaring gas prices.

  Speaking to Andrew Marr, the business secretary said that energy supply was a global issue but consumers would continue to be protected with the cap.
