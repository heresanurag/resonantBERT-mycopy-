title: 'London knife crime: Who was Jermaine Goupall? - BBC News'
date: '2018-09-26'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-45629599
content: |-
  Family members and friends remember Jermaine Goupall, who was 15 years old when he was murdered.

  Jermaine Goupall was 15 years old when he was stabbed to death in August last year, during his school summer holidays.

  The police behind Jermaine's murder investigation said that he was caught in the crossfire between two rival gangs in Croydon, south London.

  The teenager was a victim of being in the wrong place at the wrong time.

  A year on from his death we speak to those closest people to Jermaine to see the impact his death has had on them and their lives.
