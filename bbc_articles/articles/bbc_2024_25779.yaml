title: Natalie Shotter's mother says daughter's killer has no remorse - BBC News
date: '2024-10-20'
section: London
url: http://www.bbc.co.uk/news/articles/clylmze1kx2o
content: |-
  The mother of a woman who was repeatedly raped until she died said she is glad he has faced justice.

  The mother of an NHS worker raped and killed on a park bench in west London has described sitting through the killer's trial as "absolutely unbearable". The Old Bailey heard Natalie Shotter, 37, died of a heart attack caused by Mohamed Iidow, 35, repeatedly raping her as she lay unconscious on a bench in Southall Park in July 2021. Cas Shotter Weetman said she had not been afraid of meeting Iidow's gaze as he was convicted by a jury on Friday and that he had shown "no remorse". She also said she was "over the moon" that "justice has been served" ahead of Iidow's sentencing on 13 December.

  Natalie Shotter was raped until she died, the Old Bailey heard

  During his trial, the court heard how Iidow had prowled the park looking for a vulnerable woman to rape on the night of the attack. Jurors heard Ms Shotter was lying down, showing "no clear movement" for about half an hour before Iidow approached her. CCTV showed the defendant moving Ms Shotter's body around in different positions as he raped her. Ms Shotter was found dead by a passer-by in the park early on the morning of 17 July 2021. Iidow, formerly of Hounslow, west London, denied the charges against him. He did not give evidence at his trial.

  Dr Shotter Weetman, an NHS cardiology practitioner, told PA Media: "I mostly would be looking at him wherever I could, I was more than happy to meet his gaze and not afraid at all. "But obviously there was a feeling of absolute contempt towards him as he showed no remorse." Dr Shotter Weetman said society needed to tackle "horrific" violence towards women, saying many cannot walk freely and feel safe. She went on: "We need to change our thoughts about how we behave. "There are people out there who continue to act in a very deviant and horrendous way and think that they can get away with it." She also paid tribute to her daughter, saying she was a "beautiful soul" and the "kindest girl" who would help others. Ms Shotter was also a "great mum" to her three children aged five to 19, her mother said.

  Mohamed Iidow showed "no remorse" for killing Natalie Shotter, her mother said

  Ms Shotter's children have laid tributes to their mother at a tree in the grounds of West Middlesex University Hospital. Dr Shotter Weetman said: "We've kept as much of her alive as we possibly can in our heads, in our hearts. "Talking about her with the children, there's lots of memories of Nat."
