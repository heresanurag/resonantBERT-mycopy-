title: 'Watch: Keir Starmer explains his ''presidential look'' - BBC News'
date: '2024-05-19'
section: General
url: http://www.bbc.co.uk/news/uk-politics-69023349
content: |-
  Sir Keir Starmer tells the BBC he's "leading from the front" as he launches six pledges at an event in Essex.

  Speaking to the BBC's Chris Mason, the Labour leader said he wanted to "get on with the delivery" of bringing change to Britain if Labour wins this year's general election.
