content: |-
  BBC pundit and ex-Germany international Thomas Hitzlsperger says he scouted Jamal Musiala when he was at Chelsea, but thought something was lacking.

  'Don't worry England fans - I missed out on Musiala too'

  I could not have asked for a better start to Euro 2024 - speaking as a German, a pundit and a football fan. I have enjoyed every second so far, from the tournament opener in Munich to my travels to watch games in Dortmund, Dusseldorf and now Leipzig. It’s been amazing to experience games in so many different cities already, and meet so many different people. The football has delivered too and, so far, it has felt like the party that everyone wanted to happen is actually here. For lots of reasons, Germany’s win over Scotland on Friday was very special, and the entire day was exactly what I was hoping for from a fan’s perspective - friendly, peaceful and a fantastic atmosphere. I went to the game with a friend who is Scottish and, although I had to cheer him up because he was quite depressed after the first half, the beauty of it was that the result did not change anything about how the tens of thousands of Scotland fans in Munich behaved afterwards. As for Germany, well everything fell into place. The team put on their best performance so far under Julian Nagelsmann, and Scotland just were not ready for it.

