title: 'Northern Lights in UK: Spectacle caught on camera - BBC News'
date: '2023-11-06'
section: General
url: http://www.bbc.co.uk/news/uk-67329638
content: |-
  Pictures and videos shared on social media capture the brightly coloured phenomenon.

  The Northern Lights have put on a stunning show across parts of the UK - stealing the limelight from Bonfire Night fireworks.

  Pictures and sped-up videos shared on social media show vivid shades of red, green and magenta - over places like Northumberland and Aberdeenshire.

  And the aurora was seen much further south than usual due to a major geomagnetic storm, including in Kent and the Isle of Wight.
