content: |-
  The Great British Bake Off judge says his family has faced 'vindictiveness' over Smarden pub sale.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Great British Bake Off judge Paul Hollywood has said criticism over the closure of the Kent pub owned by his wife's family has been "unforgivable". Melissa Hollywood was supported by husband Paul as she was given permission by Ashford Borough Council on Wednesday to turn the 600-year-old Chequers Inn into a home. Speaking to BBC South East on Friday, Paul Hollywood said: "The vindictiveness from the locals towards the family who have been here 18 years is unforgivable." The request, submitted in January, faced opposition from some residents and from Smarden Parish Council, which feared the loss of the village pub as a "heritage asset".

  Following the tense planning meeting, Mr Hollywood explained his wife's family wanted to sell the pub as a business and had no plans to turn it into a house. He said they received an offer a few months ago which was "not realistic". The celebrity baker continued: "If the villagers themselves want to get their act together and put a bid in and buy it, that’s fine. "At the end of the month it’s earmarked to close because they cannot sustain the money that's coming in because there's no money coming in."

  Mr Hollywood, who married the landlady last September, said the business was failing even though the family had spent tens of thousands on a renovation and new car park. He said: "I'm going to have to step in and help them out, personally, but I'm not a charity. "I have given a substantial amount of money to turn it into what it is now. It is a beautiful pub but it is a business that is losing money."

  Mrs Hollywood told the meeting her family planned to close the Grade II-Listed pub by the end of August due to declining trade and because it is no longer a viable business. Mrs Hollywood told the committee: “The last six months has shown us the worst in people’s behaviour, the personal insults and attacks have been unforgivable." The pub, run by Mrs Hollywood for the past 16 years and owned by her father Glenn Spalding, was originally put up for sale in November 2020 and remains on the market, reported the Local Democracy Reporting Service. Documents submitted to the council show the owners have gone through four estate agents since first listing the property at just under £1m.

  Melissa Hollywood attended the council planning meeting with her husband Paul

  Lea Randolph, of Smarden Parish Council, said at the meeting: “To get more money, they want the borough council to turn a Grade II 14th Century heritage asset into a residence and deprive the village of a pub that has been part of village life for over 600 years.” But Ashford councillors acknowledged Mrs Hollywood and her family's attempts to sell the historic pub as a business.

  A visibly emotional Mrs Hollywood said the financial difficulties had placed a strain on her elderly father. She said: “Ask yourself – would you work a 12-16 hour shift every day just to make a loss, and would you do it if you were 80 years old with a life threatening heart condition?” Councillors voted seven to five in favour of approving the application, which gives Mrs Hollywood and her family several years to implement the change of use.
