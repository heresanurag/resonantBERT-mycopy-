  After not dropping a set in his opening three matches, Federer looked on his way to another controlled victory when he eased to the opener in 33 minutes.

  However, the warning signs were clear from the start of the second set.

  Federer's reliable serve has been the bedrock of his game over the years but an uncharacteristically erratic display allowed Millman to fight back and earn a memorable win.

  His struggles were shown by him making:
  • None 10 double faults - his second highest at the US Open and joint third at a Grand Slam
  • None 49% of first serves - his second lowest percentage in 98 US Open matches and fifth lowest in 393 Grand Slam matches

  The world number two produced a contender for one of the ugliest service games of his career, unable to find his timing as he landed just six of his 24 first serves in a 14-minute second game.

  He somehow managed to hold after fighting off seven break points, before breaking Millman's serve himself to lead 3-2.

  But, with his first serve percentage down at 31%, Federer still looked uncomfortable.

  He blew two set points when serving at 5-4 and a double fault at break point gifted Millman the game and the Australian broke again as he won four games in a row to level the match.

  Willed on by a supportive crowd on Arthur Ashe Stadium, Federer managed to steady his service game in a tight third set and had set point but Millman hit an outrageous 100mph second serve down the middle.

  The Australian wasted one of his own with a long return as Federer battled to stay in the set, only to take his second chance and leave Federer facing an uphill task.

  Federer came back from two sets to one against Russian veteran Mikhail Youzhny at Flushing Meadows last year and briefly looked as though he could do the same when he broke in the sixth game of the fourth set.

  But he handed the advantage straight back as Millman continued to keep his nerve.

  Federer's tension was clear in both his game and his demeanour during a stuffy night in New York.

  The five-time champion was continuing to toil with his groundstrokes, often opting to use drop shots which were frequently punished by Millman.

  Federer hit 35 dropshots throughout the match - more than he had previously hit in the whole tournament - as he lost belief from the baseline.

  And, in turn, his increased perspiration and some signs of irritation illustrated how tough he was finding it to turn the match around.

  A brief rally came when he trailed 30-0 at 5-5, finding his first serve with three in a row to fight back and hold.

  But back-to-back double faults - his ninth and 10th of the match - gave Millman a 4-1 lead in the tie-breaker which he would not relinquish.
  • None Struggled throughout his career with injuries and has never won an ATP title
  • None Needed shoulder reconstruction in 2013. Slipped to 1,193 in the rankings the following year
  • None He needed groin surgery in 2016 when he had just reached a career-best 60th
  • None At Wimbledon this year, had to send his father to buy new underwear after he was told his colourful briefs broke the strict all-white rule
  • None Reached a career-high ranking of 49 in July 2018 although retired from qualifying in Cincinatti last month with a back injury
  • None Bidding to become the first Australian man to win a Grand Slam since Lleyton Hewitt won Wimbledon in 2002

  Millman played an outstanding match, and showed great class at its climax with his understated celebration.

  Federer had little confidence in his game, misfired regularly on serve, and frequently resorted to the drop shot to try and dig himself out of trouble.

  Let's not forget he will remain the world number two at the conclusion of these championships, but the match conjured up memories of his fourth round defeat by Tommy Robredo here in New York in 2013.

  Then, Federer had back problems, and was five years younger. I thought he was unlikely to win another Grand Slam and I am so delighted he proved me wrong three and a half years later with his astonishing victory at the 2017 Australian Open, which paved the way to two further Grand Slam triumphs.

  I do not want to make the same mistake again. When refreshed at the start of the year in Melbourne, or on the grass of SW19 ... who knows?

  But bear in mind that Ken Rosewall is the only man in the Open Era to have won a Grand Slam after celebrating his 37th birthday. In this phenomenal era, and over five sets in the sapping humidity of New York, we should not be at all surprised Federer has fallen short.

  But we are allowed to feel a little glum.
