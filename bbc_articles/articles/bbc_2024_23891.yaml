title: Hastings' family 'heartbroken' as wife Jenny confirmed missing - BBC News
date: '2024-09-05'
section: Edinburgh, Fife & East
url: http://www.bbc.co.uk/news/articles/ceq5ej0dex3o
content: |-
  Jenny Hastings family fear she is dead after "struggles with her mental health" for several years.

  Jenny Hastings had become an advocate for mental health

  Former Scotland rugby player Scott Hastings has confirmed his wife Jenny is missing and feared to be dead after disappearing at a wild swimming spot in the Firth of Forth. She was reported missing in Wardie Bay, Edinburgh, shortly before 15:00 on Tuesday. A statement released on behalf of the Hastings family says Jenny "struggled with her mental health for a number of years". The statement adds: "We know that you all care for us deeply and as soon as we hear any update from the police we will advise you accordingly."

  HM Coastguard was alerted to a "report of concern" on Tuesday and a number of lifeboats and helicopters were deployed in the search alongside other emergency services. The search was stood down in the evening without Jenny being found, the coastguard said. The Hastings family statement says the incident is being treated by the police as a "high risk missing person case". It says: "The Hastings family are absolutely heart broken. "Jenny and Scott have a huge following of friends from all walks of life including those that work in the media and we ask that at this moment in time we are allowed to grieve privately with family members. "For the time being we request that you hold off from messaging us directly and/or posting on any social media until further news. "We know that you all care for us deeply and as soon as we hear any update from the police we will advise you accordingly. "We miss our Jenny. She leaves a gaping hole in all our hearts and hope that she is returned to us safely so that we can celebrate her remarkable life." The statement is attributed to "Scott, Corey, Daniel, Kerry-Anne & Ian".

  Scott Hastings (far left) and his brother Gavin (far right) with their wives Jenny and Diane

  Scott Hastings, the younger brother of former Scotland rugby captain Gavin, won 65 caps as a centre for Scotland from 1986 to 1997. Jenny Hastings, 60, has previously spoken openly about her struggles with mental health. She disappeared from the couple's Edinburgh home for 36 hours in March 2017 and walked for miles to the Pentland Hills while she was suffering from depression. She eventually got help by going into a police station and praised the officers for the support they gave her. The couple later spearheaded a charity campaign to keep people active and improve their mental wellbeing. The 100 Streets challenge encouraged people to get out for exercise with friends.
