content: |-
  A police officer who killed an unarmed man has told the Old Bailey he did it to save his own life.

  Officer 'sorry' for 'necessary' shooting, court told

  Chris Kaba was shot in the head and died soon after in hospital

  A police officer who shot an unarmed man dead has said he is "truly sorry" for the "enormous distress" felt by the family, but insisted it was "entirely proportionate, lawful and necessary". Metropolitan Police firearms officer Martyn Blake, 38, denies murdering 24-year-old Chris Kaba who was shot in the head during an armed police operation in Streatham, south London, in September 2022. The Old Bailey has been hearing a detailed witness statement Mr Blake gave to the the Independent Office for Police Conduct (IOPC) following the shooting. He said he believed his his colleagues were in “grave danger” of being crushed or killed by a car used on the night of the shooting.

  Mr Blake described the events of that night as “extremely violent and dangerous" lasting "just a few seconds". In his statement, Mr Blake said Mr Kaba had been driving his Audi vehicle at “great speed” and he had “a propensity to use violence”. “It was a genuine held belief that my colleagues could have be killed at any cost," Mr Blake told the police watchdog, and he confirmed he “took one aimed shot at the driver". Mr Blake was a qualified tactical adviser and operational firearms commander at the time of the shooting. He had been the navigator in one of the marked police vehicles. “These events have had a considerable effect on me," the court heard from the statement. "The fact I’ve taken the life of another was deeply shocking.” But he insisted he “acted lawfully and appropriately to save the lives of my colleagues”. He added he was “well aware of the enormous distress to Mr Kaba and his family" and was "truly sorry”. The vehicle Mr Kaba was driving had been linked to a shooting the previous night in Brixton, south London, and the firearm had not been recovered.
