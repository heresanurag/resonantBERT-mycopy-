  Mr Blake said the armed police operation that night had been “very dynamic and fast moving” and that he believed the driver of the Audi they were tracking was “highly experienced and dangerous”. “I remember feeling quite frightened and filled with dread as I did not know what would happen,” the statement read. "I could see the vehicle ... a black male, who looked comparatively young and athletic. His hands were on the wheels. “I did fear for the lives of my colleagues. The driver of Audi was starting to use his car as a weapon. I believe I would have been killed.”

  Mr Blake told the IOPC that Mr Kaba had "purposefully and intentionally" rammed the vehicle "with no regard for his life or lives of officers". “I had good firearms cover," the court heard in his statement. "I pointed my green laser dot in his direction to try and indicate to him to stop. As the car has paused, I could hear the revving really high. “I heard a sudden roar of the engine and I saw the movement of his hands.” He said in that split second he made the decision to “exercise some tactical option to incapacitate the driver. “If I had done nothing, I would have failed my colleagues,” he added. The prosecution claims that it was not necessary for Mr Blake to fire a bullet into Mr Kaba’s head and that he became angry, frustrated and annoyed before he used his gun.
