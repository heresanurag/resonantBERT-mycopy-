content: |-
  Al-Hilal, Saudi Arabia's most decorated team, have broken the world record for most consecutive wins by a men's top-flight side.

  Last updated on .From the section Football

  Saudi Pro League side Al-Hilal have set a new world record for most consecutive wins by a men's top-flight team.

  Tuesday's 2-0 win over Al-Ittihad in the Asian Champions League was the 28th victory in a row for Al-Hilal, Saudi Arabia's most decorated team.

  It surpasses the 27 straight wins by Welsh side The New Saints in 2016.

  Al-Hilal, whose players include former Fulham forward Aleksandar Mitrovic, have won every game since a 1-1 draw with Damac on 21 September.

  Ex-Wolves midfielder Ruben Neves also plays for Al-Hilal, as does Brazil forward Neymar, who joined from Paris St-Germain last summer in a deal understood to be worth about 90m euros (£77.6m) plus add-ons.

  However, Neymar has been out with a serious knee injury since October.
  • None Cristiano Ronaldo's Al-Nassr knocked out of the Asian Champions League

  Managed by former Benfica and Flamengo boss Jorge Jesus, Al-Hilal are 12 points clear of Cristiano Ronaldo's Al-Nassr at the top of the Saudi Pro League.

  Mitrovic has scored 26 of his side's 81 goals during the winning run. The streak includes 16 league games, three domestic cup matches and nine in the Asian Champions League.

  Tuesday's victory gave Al-Hilal a 4-0 aggregate win to seal a spot in the Asian Champions League semi-finals.
