content: |-
  Ukraine says "critical infrastructure" near the capital was hit, while a block of flats in the southern city of Mykolaiv was also targeted.

  Difficult to see how Ukraine would negotiate with Russia

  Turkey has tried to act as a mediator in this war, helping negotiate a deal that allowed the resumption of Ukrainian grain exports and prisoner swaps between Ukraine and Russia. The country, a Nato member with good relations with Kyiv and Moscow, is now calling for a ceasefire. It is difficult – nearly impossible – to see how Ukraine would engage in any negotiations. Officials here say Russia may be trying to find a way to freeze the conflict as Ukrainian forces reclaim territory and force Russia to abandon long-held positions. At home, the Kremlin is facing criticism for its setbacks, amid a chaotic military mobilisation that led to rare anti-war protests and the exodus of tens of thousands of military-age men. Russia has stepped up attacks on civilian sites in Ukraine, damaging critical infrastructure ahead of winter, in what Kyiv has described as President Putin’s response to defeats on the battlefield. The barrage of missiles on cities across the country on Monday shocked some and angered many, but did not affect Ukraine’s resolve to fight. Last week, in the wake of Russia’s annexation of four Ukrainian regions (a declaration Kyiv has described as a farce and illegitimate), President Zelensky signed a decree formally stating the prospect of negotiations with President Putin “impossible”. But he let the door open to dialogue with Russia. Ukraine, empowered by sophisticated weapons provided by the West, has vowed to reclaim all areas that have been invaded, including those before February. Most Ukrainians appear to support that.
