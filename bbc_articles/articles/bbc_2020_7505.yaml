title: Prime Minister's Questions and the Russia report - BBC News
date: '2020-07-22'
section: UK Politics
url: http://www.bbc.co.uk/news/live/uk-politics-53497379
content: |-
  Boris Johnson takes MPs' questions amid fallout from the Russia report.

  SNP's Ronnie Cowan highlights that the ISC report found that it has been difficult to establish which government department had responsibility for what, in dealing with Russian activity in the UK.

  The government's response to the report alludes to the responsibilities of various government departments, he says.

  But he says, "At 1000am this morning we still did not know who would come to the House to defend the indefensible.

  "Is the report, the government's delay in publishing it and its reaction, an example of the incompetence and arrogance we have come to expect of this government?"

  "I am very comfortable underlining the commitment this government has to our defence and nation security.

  "It is about a whole government approach," he says, with each part of government engaged, and accountable through the National Security Council.
