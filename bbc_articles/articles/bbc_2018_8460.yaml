  Bruno Mars and Cardi B collaborated on the song Finesse.

  She says pulling out of the tour has has been a really hard decision for her and hopes her fans will understand.

  Bruno Mars has responded on Twitter supporting her decision: "The most important thing is you and your family's health."

  Cardi B and Bruno Mars on stage at the Grammy Awards

  He added: "We love you Cardi and we will play Bodak Yellow every night in your honour.

  "Please give your baby girl a hug from me and a hug on behalf of everyone on The 24k Magic Tour."

