title: 'Cardi B: ''I underestimated this whole mommy thing'' - BBC News'
date: '2018-07-27'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-44977432
content: |-
  The rapper says she isn't ready to leave her baby after giving birth earlier this month.

  Cardi B has pulled out of her tour with Bruno Mars in the autumn.

  The rapper says she "underestimated this whole mommy thing" and isn't ready to leave her baby.

  Cardi became a mum on 10 July when she gave birth to a baby girl with her husband Offset from Migos.

  The 25-year-old was due to join Bruno Mars on tour for 24 dates across North America on the final leg of his 24K Magic tour.

  Offset and Cardi B have been together since 2017

  She made the announcement on Instagram.

  "I thought that after giving birth to my daughter that six weeks would be enough time for me to recover mentally and physically.

  "I also thought that I'd be able to bring her with me on tour, but I think I underestimated this whole mommy thing."

