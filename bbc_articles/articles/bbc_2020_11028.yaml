title: Missing cockatiel returned after singing Addams Family - BBC News
date: '2020-10-03'
section: General
url: http://www.bbc.co.uk/news/uk-england-merseyside-54387941
content: |-
  A bird who flew from his cage is found after farmers heard him singing the TV theme.

  A cockatiel who flew from his cage has been returned to his owner after he was heard singing The Addams Family theme by farmers.

  Six-month-old Smidge escaped from his travel cage, which was accidentally left open by his owner Rhys Owen, in Hoylake, Merseyside, on Tuesday.

  The bird was found after he was heard singing his favourite song - the catchy, finger-snapping theme to The Addams Family - in a tree at a farm nearby.
