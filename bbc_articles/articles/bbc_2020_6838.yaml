title: Zodiakos wins first race at Newcastle, Judd Trump also triumphs - BBC Sport
date: '2020-06-01'
section: General
url: http://www.bbc.co.uk/sport/horse-racing/52877872
content: |-
  Zodiakos creates history with victory at Newcastle racecourse and Judd Trump wins at the snooker as elite sport returns to England after coronavirus.

  Last updated on .From the section Sport

  The sun shone in Newcastle on Monday but as Zodiakos passed the post a neck ahead of stablemate Al Ozzdi to win a thrilling opening race shortly after 13:00 BST, there was nothing but an eerie silence.

  After 76 days without horse racing in Britain, this was how it returned - with a behind-closed-doors victory for a 22-1 chance, ridden by Jimmy Sullivan and trained by Roger Fell, in the Welcome Back British Racing Handicap.

  Those involved with the sport were glad to be back, although there was sadness too: December Second - trained by Philip Kirby - died after suffering a fall in the 17:05 race.

  The news cast a shadow over a significant day. Preparations for the all-weather meeting at Gosforth Park had been meticulous as elite sport in England made its return after the coronavirus lockdown.

  The car park at the track was empty, with racegoers, owners, bookmakers and most of the media kept behind a ring of temporary wire fencing encircling the racecourse.

  Each of the 10 races were limited to 12 runners and apart from jockeys, the course was only open to a few people: trainers' representatives, stable staff, officials and a small number of media.

  Those allowed in had to complete a three-stage screening process, including medical checks before departure and on arrival.

  Masks were also required by jockeys and stalls handlers, with the heat adding to feelings of unfamiliarity and discomfort.

  "Riding in the mask, it is very warm and after pulling up I pulled it down a little just to get a few breaths in," said Sullivan after his win.

  "It wasn't too bad, though. It's manageable and it's the sort of thing that, in a week, you won't even notice."

  Social distancing measures were strictly enforced at the course, with markers on the floor, two-metre warnings on the walls and a one-way system in place.
