  'Just to get playing again is a relief' - snooker returns

  As racing resumed at a near-deserted venue, there was the same eerie feeling in Milton Keynes as snooker returned behind closed doors.

  The Championship League was the first sports event in the UK to be shown on free-to-air TV since the easing of restrictions - with an on-site hotel at the Marshall Arena allowing players to isolate before play.

  World champion Judd Trump had to isolate for 18 hours after being given a Covid-19 test at 16:00 BST on Sunday. With Trump - along with the tournament's seven other players and 35 staff working at the venue - returning a negative result, play began on Monday.

  Trump, who progressed as winner of his group, had to wear a face mask and adhere to social distancing guidelines - with players sitting two metres apart and barred from sharing equipment, such as rests and cue extensions.

  The event was broadcast on ITV4, with presenter Jill Douglas and the pundits all working from home.

  World number one Trump - and the rest of the snooker circuit - is getting used to a rejigged calendar; the season would normally end in May, at the conclusion of the World Championship, which is now set to start on 31 July.

  Trump told BBC Sport: "In an ideal scenario, I would be on holiday somewhere now with another world crown. But for me, the last month was starting to get quite difficult, being stuck inside all the time.

  "Nothing is ideal and it is changing week on week - but just to be able to get to some kind of normality in playing snooker again is a nice relief.

  "When you are playing out there, it takes your mind of things for a couple of hours and you can forget about anything else that is going on."
