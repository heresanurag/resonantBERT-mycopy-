id: bbc_2023_17674
title: Moment car flew before exploding at US-Canada border crossing - BBC News
date: '2023-11-23'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67504994
content: |-
  Surveillance video shows the speeding vehicle go airborne before an explosion that killed two people.

  Two people were killed after a car accelerated before being engulfed in flames near Niagara Falls in New York.

  The incident took place on Wednesday on the Rainbow Bridge, a border crossing between the US and Canada. Surveillance video shows the speeding vehicle go airborne before it was engulfed by a fireball.

  New York Governor Kathy Hochul said there was "no sign of terrorist activity" in the crash.
