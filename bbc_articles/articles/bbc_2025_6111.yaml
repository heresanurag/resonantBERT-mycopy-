title: China braces for strong winds with millions told to stay indoors - BBC News
date: '2025-04-11'
section: Asia
url: http://www.bbc.co.uk/news/articles/ceqrggg8424o
content: |-
  State media is warning that people weighing less than 50kg (110lbs) may be "easily blown away".

  Millions told to stay indoors as China braces for strong winds

  The winds are expected to be stronger than anything the region has seen in years

  Workers have been told to hurry home, classes have been suspended and outdoor events have been cancelled as northern China braces for extreme winds this weekend. Millions have been urged to stay indoors, with some state media outlets warning that people weighing less than 50kg (110lbs - about eight stone) may be "easily blown away". Winds reaching 150kph (93mph) are expected to sweep Beijing, Tianjin and other parts of Hebei region from Friday to Sunday, as a cold vortex moves southeast from Mongolia. For the first time in a decade, Beijing has issued an orange alert for gales - the second-highest in a four-tier weather warning system.

  Strong winds sweeping from Mongolia are not uncommon, especially at this time of the year. But the impending winds are expected to be stronger than anything the area has seen in years. Temperatures in Beijing are expected to drop by 13C within 24 hours, when the strongest winds hit on Saturday, authorities said. "This strong wind is extreme, lasts for a long time, affects a wide area, and is highly disastrous," the Beijing Meteorological Service said. China measures wind speed with a scale that goes from level 1 to 17. A level 11 wind, according to the China Meteorological Administration, can cause "serious damage", while a level 12 wind brings "extreme destruction". The winds this weekend are expected to range from level 11 to 13. Several sporting events slated for the weekend have been suspended, including the world's first humanoid robot half marathon, which will now be held on 19 April. Parks and tourist attractions have been closed as authorities have told residents to avoid outdoor activities, while construction works and train services have been suspended. Thousands of trees across the city have been reinforced or pruned to prevent them from falling. Officials have warned people to avoid entering mountains and forests, where gusts are expected to be especially strong. As residents hunker down, social media users are finding humour in their shelved weekend plans. "This wind is so sensible, it starts on Friday evening and ends on Sunday, without disrupting work on Monday at all," said a Weibo user. Hashtags about the strong winds, and the warning that those weighing less than 50kg could be swept away, have been trending on Chinese social media. One Weibo user quipped: "I eat so much all the time, just for this day." Beijing has also issued an alert for forest fires and prohibited people from starting fires outdoors. The winds are expected to start weakening on Sunday night.
