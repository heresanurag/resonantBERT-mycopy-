title: 'French Open 2023: Iga Swiatek earns double bagel at Roland Garros, Coco Gauff
  beats Mirra Andreeva - BBC Sport'
date: '2023-06-03'
section: General
url: http://www.bbc.co.uk/sport/tennis/65797691
content: |-
  Iga Swiatek says she has to "remain disciplined" after thrashing Wang Xinyu, while Coco Gauff fights back to beat 16-year-old Mirra Andreeva.

  Last updated on .From the section Tennis

  Coverage: Live text and radio commentaries of selected matches across BBC Radio 5 Sports Extra, the BBC Sport website and app

  Top seed Iga Swiatek says she does "not want to get lazy" after thrashing China's Wang Xinyu 6-0 6-0 to reach the French Open fourth round.

  Poland's Swiatek, going for a third Roland Garros title, has won four of her six sets without dropping a game.

  Coco Gauff used her greater experience to fight back from a set down against 16-year-old Russian Mirra Andreeva.

  American sixth seed Gauff, who is still only 19, remained calm and turned the match around to win 6-7 (5-7) 6-1 6-1.

  Swiatek, who beat Gauff in last year's final on the Paris clay, needed just 51 minutes to record her first 'double bagel' at a Grand Slam.

  "I always try to kind of be careful, because you don't want to get lazy after winning these matches," Swiatek told a news conference.

  "It's never easy to win these matches. But on the other hand, sometimes all your head can remember is the score, and I always want to kind of be ready for every situation."

  Seventh seed Ons Jabeur secured her place in the fourth round after coming back from a set down to beat Serbian qualifier Olga Danilovic.

  Tunisian Jabeur initially struggled against Danilovic, who had not dropped a set at Roland Garros this year, but she regrouped to win 4-6 6-4 6-2.

  Jabeur will face Bernarda Pera next after the American beat Italy's Elisabetta Cocciaretto 6-4 7-6 (7-2).
