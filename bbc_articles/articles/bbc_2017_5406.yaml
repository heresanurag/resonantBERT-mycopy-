  Harry Kane or Diego Costa up front? Jordan Pickford or Tom Heaton in goal? Create your own XI from this season's best players.

  Last updated on .From the section Football

  The Premier League season ends on Sunday, with Chelsea already champions and Middlesbrough, Hull and Sunderland relegated.

  Manchester City, Liverpool and Arsenal are fighting it out for the two remaining Champions League qualification spots, and there's one more thing to be decided - who's in your team of the season?

