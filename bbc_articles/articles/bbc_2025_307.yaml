  Campaigners, politicians and athletes are among those receiving the US's highest civilian award.

  Biden honours Wintour, Bono and Soros with Medal of Freedom

  This video can not be played To play this video you need to enable JavaScript in your browser. Joe Biden awards Presidential Medal of Freedom to Michael J Fox, Bono and Anna Wintour

  Vogue editor Dame Anna Wintour, U2 frontman Bono and billionaire George Soros are among those who have received America's highest civilian honour from outgoing President Joe Biden. Former US Secretary of State Hillary Clinton joined actors Denzel Washington and Michael J Fox as they also received the Presidential Medal of Freedom at a White House ceremony. Nineteen people received the honour this year, spanning the worlds of culture, politics and activism. The White House said the recipients had been chosen because are they are "good people who have made extraordinary contributions to their country and the world".

  At Saturday afternoon's ceremony, Biden told the recipients: "Together, you leave an incredible mark - and I mean this sincerely, this group - you leave an incredible mark on our country." Bono, whose real name is Paul David Hewson, has already been awarded the highest cultural honour of France and received an honorary knighthood. He is known for campaigning against poverty and supporting those with HIV/Aids. Wintour, one of the most significant players in fashion, has been serving as editor-in-chief of Vogue since 1988 and among other charities helped raised more than $20m for Aids research. She also raised money for UK arts organisations following funding cuts in 2022.

  Director, producer and actor Denzel Washington is known for roles on stage and screen

  The White House said in a statement that billionaire philanthropist and Democratic megadonor George Soros had "supported organizations and projects across the world that strengthen democracy, human rights, education and social justice". Back to the Future star Michael J Fox looked emotional as Biden praised his accomplishments, including his advocacy for Parkinson's disease research. The president embraced actor and director Denzel Washington after presenting him with his medal. Hillary Clinton received a standing ovation from attendees when her turn came. She was the Democratic White House candidate who lost to Donald Trump in the 2016 election. Inter Miami soccer star Lionel Messi, retired Los Angeles Lakers basketball player Earvin "Magic" Johnson and fashion designer Ralph Lauren also received the medal.

  American Film Institute founder George Stevens Jr and former Kennedy Center chair David Rubinstein were among the cohort receiving medals. Other recipients include humanitarian and chef José Andrés, whose World Central Kitchen has helped provide food for civilians in war zones and areas hit by natural disasters; acclaimed British conservationist Jane Goodall and science educator Bill Nye.

  Former US Attorney General Robert F Kennedy, former Defence Secretary Ash Carter, civil rights leader Fannie Lou Hamer and former Governor of Michigan George W Romney will receive the award posthumously. Established under former president John F Kennedy, the medal is awarded at the discretion of the president on the advice of an external advisory panel. Previous recipients of the award include the most decorated gymnast of all time Simone Biles, Oscar-winning actress Michelle Yeoh and Apple founder Steve Jobs.
