title: 'Australia: Crocodile sinks his teeth into a flying drone - BBC News'
date: '2021-10-02'
section: General
url: http://www.bbc.co.uk/news/world-58773120
content: |-
  A ''croc'' leaps from the water to take down a drone in Darwin, Australia.

  A crocodile leapt out of the water at a wildlife park in Darwin and sank its teeth into a low flying drone.

  The Australian Broadcasting Corporation caught the moment the reptile snapped.
