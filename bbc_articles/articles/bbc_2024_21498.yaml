title: 'iPhone 16: Apple banks on AI to boost sales - BBC News'
date: '2024-09-10'
section: Technology
url: http://www.bbc.co.uk/news/articles/c8erzx2n3j7o
content: |-
  The firm says its new handset has been built for artificial intelligence as it looks to regain its edge.

  Apple banks on AI to boost sales of new iPhone 16

  With business slumping, Apple has been under pressure to show what it will offer buyers to jumpstart a new wave of iPhone sales. On Monday, the technology giant revealed its hand - the iPhone 16 which has a camera button on the outside of the handset. The button is an external clue to the changes Apple said it had made inside its latest smartphone, aimed at harnessing the latest in artificial intelligence (AI). Apple's chief executive Tim Cook said the upgrades would "push the boundaries of what a smartphone can do" but the firm has tough competition, as other brands have already integrated generative AI features into their handsets.

  Apple's share price fell during its "Glowtime" event, where it unveiled the iPhone 16 as well as other products, and ended the day flat. The company, worth $3 trillion, is facing concern that it is losing its edge in the burgeoning area of artificial intelligence. Sales of the iPhone - Apple's most important product which accounts for around half of its total sales - have stalled in recent months. They slipped by 1% over the nine months ended 29 June compared with a year earlier. Apple said its new phones, which come with longer lasting batteries, more powerful chips and enhanced privacy features, were its first built specifically to handle AI and its new "Apple Intelligence" tools, many of which were announced in June. Those include new tools for writing and creating new emojis as well incorporating OpenAI's chatbot ChatGPT into Siri to help users with some queries and text generation requests. On Monday, Apple also announced updates to its Apple Watch and its AirPod headphones, which will allow them to automatically drop the volume when users start in-person conversations and to decline calls with the shake of a head. It said the Pro version of its AirPods would be able to be used as a "clinical grade" personal hearing aid for people with mild or moderate hearing loss. The company said it was expecting marketing approval from regulators for the device "soon" and the feature would be available this autumn in more than 100 countries, including the US, Germany and Japan. Previously, the company had a feature that allowed people to pair hearing aids with iPhones and other devices. The products were rolled out at a glossy event where protestors gathered in a designated free speech area across the street, urging executives to ramp up efforts to protect children from dangerous content in the company’s App Store.

  Sales of the new range start in September, with prices for the iPhone16 starting at $799. But the Apple Intelligence features are not set to be available on operating systems until October, starting in the US and heading to other countries in the following months. They will be available in the UK in December. Ben Wood, chief analyst at the market research firm CCS Insight, said it was likely that many people would dismiss the company's new camera control as a "glorified shutter button". But he said it offered "very significant" upgrades, including visual, AI-powered search and he came away from the presentation persuaded that Apple would win over customers. "The combination of Apple Intelligence and new camera features on the iPhone 16 will help spur upgrades from loyal Apple customers," he said. "Particularly as Apple is positioning this latest update as being a future-proof purchase for customers wanting to get Apple Intelligence features as they roll out over the next few years."

  People will be able to decline phone calls with a shake of the head with Apple's new AirPods

  Apple has been slower than rivals Samsung and Google to bake generative AI features for photo editing, translation and web browsing into its devices. Competitors are now building them into folding, flipping and even tri-folding smartphones. Pre-orders for Huawei's new tri-fold phone, the Mate XT, reportedly, external hit more than three million on Monday. Gartner analyst Annette Zimmermann said because Apple was rolling out AI-ready smartphones later than rivals, it was "critical" they deliver. She warned that rolling the features out before they were ready could risk their reputation or prompt sales losses.
