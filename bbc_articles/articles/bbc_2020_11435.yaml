title: 'Covid-19: Andrew Marr challenges PM over ''complacency'' comment - BBC News'
date: '2020-10-04'
section: General
url: http://www.bbc.co.uk/news/uk-politics-54407957
content: |-
  Boris Johnson was also asked by the BBC One presenter Andrew Marr whether he thought the 10pm pub curfew works.

  Andrew Marr has challenged the prime minister over comments in which he said "probably... everybody got a bit, kind of complacent and blasé" over Covid-19.

  The BBC One presenter also asked Boris Johnson whether the 22:00 curfew on pubs and bars was working.

  Read more: Act fearlessly but with common sense on Covid - PM
