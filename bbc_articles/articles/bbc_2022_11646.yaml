title: 'Queen Elizabeth II: Walking behind coffin brought back memories of Diana''s
  funeral, says William - BBC News'
date: '2022-09-14'
section: UK
url: http://www.bbc.co.uk/news/live/uk-62897146
content: |-
  Prince William says he found Wednesday's procession difficult as he met well-wishers at Sandringham.

  Thursday has been a quieter day than others over the last week - with King Charles at Highgrove House before he heads to Wales tomorrow, and the Queen's coffin lying in state for a first full day.

  But there's still been a wave of activity across the country, including a walkabout in Norfolk by the new Prince and Princess of Wales.

  Let's take a look at some of the key moments of the day.

  Thursday began with an early-morning rehearsal of the Queen's funeral. This photo was taken at around 03:00 BST Image caption: Thursday began with an early-morning rehearsal of the Queen's funeral. This photo was taken at around 03:00 BST

  The new Prince and Princess of Wales, William and Kate, headed to Sandringham House to see flower tributes to the Queen Image caption: The new Prince and Princess of Wales, William and Kate, headed to Sandringham House to see flower tributes to the Queen

  London school children joined Muslims from across the UK at Regent's Park Mosque to honour the life of Queen Elizabeth II and to mark the accession of King Charles III Image caption: London school children joined Muslims from across the UK at Regent's Park Mosque to honour the life of Queen Elizabeth II and to mark the accession of King Charles III

  Scottish Secretary Alister Jack (centre left) and Defence Secretary Ben Wallace (centre right) stood guard by the Queen's coffin at Westminster Hall. They're both members of the Royal Company of Archers Image caption: Scottish Secretary Alister Jack (centre left) and Defence Secretary Ben Wallace (centre right) stood guard by the Queen's coffin at Westminster Hall. They're both members of the Royal Company of Archers

  Thousands are still queuing to see the Queen's coffin lying in state; the estimated wait time is at least eight hours Image caption: Thousands are still queuing to see the Queen's coffin lying in state; the estimated wait time is at least eight hours

  This aerial shot shows dozens of people leaving Westminster Hall after paying their respects to the Queen Image caption: This aerial shot shows dozens of people leaving Westminster Hall after paying their respects to the Queen

  Over in New York, the UN General Assembly held a special session as a tribute to Queen Elizabeth II Image caption: Over in New York, the UN General Assembly held a special session as a tribute to Queen Elizabeth II
