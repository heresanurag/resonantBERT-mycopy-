title: Where does England's shambles against Greece leave Lee Carsley? - BBC Sport
date: '2024-10-11'
section: England Men
url: http://www.bbc.co.uk/sport/football/articles/cglkdw0646jo
content: |-
  Where does England's shambolic defeat against Greece at Wemble leave interim manager Lee Carsley?

  Lee Carsley took on the England manager's job on an interim basis following Gareth Southgate's exit in July

  England's interim manager Lee Carsley gambled with his team selection - and potentially his future - when he rolled the dice against Greece at Wembley. He walked away empty-handed and embarrassed. Carsley could have been forgiven for playing it safe, with his credentials to succeed Gareth Southgate on a permanent basis bolstered by two wins from two in the Uefa Nations League. Instead, straddling that fine line between being brave and being foolhardy, Carsley decided to throw it all up in the air with an attacking game-plan that looked thrilling on paper. Perhaps it should have stayed exactly there. It looked an ill-judged, flying by the seat of the pants, piece of management from the first moments of a humiliating 2-1 loss to Greece. Carsley's response to the absence of injured captain Harry Kane was to dispense with a recognised striker when he could have used either Dominic Solanke or Ollie Watkins, choosing instead to pack his side with the attacking talents of Jude Bellingham, Phil Foden, Cole Palmer, Anthony Gordon and Bukayo Saka. The result of Carsley's experimentation was an unseemly shambles, a confused tactical mess that was desperate defensively, with Greece having the ball in England's net five times only to see three ruled out for offside. Two from Vangelis Pavlidis counted, condemning them to defeat. England's heavily front-loaded team could only muster two shots on target, one in the third minute from Bellingham and the other his equaliser three minutes from time, even then Carsley’s team were unable to hang on for a point they barely deserved when Pavlidis scored the winner deep into added time. What this means for Carsley, who looked to be moving unhindered to his coronation as Southgate's successor, remains to be seen. But make no mistake: this was a serious mis-step, and he accepted full responsibility for the shapeless fiasco that unfolded at Wembley. He even caused confusion post-match when he said "hopefully" he'd be returning to the under-21s, but, when pressed, he insisted "nothing had changed" and he was not ruling himself in or out of the job. It appeared to be a verbal slip, and that he was trying to say he would be comfortable returning to his old position if that was what the Football Association wanted. It was an unsatisfactory, muddled conclusion to an eminently forgettable night for Carsley. Greece were able to muster 12 shots, with three on target, an illustration of their constant threat as a result of England's tactical open invitation to steam through midfield and down the flanks with numbers on the counter-attack. It was Greece's first win at Wembley in 10 attempts. Pavlidis' opener was their first goal at Wembley, this victory making them the lowest-ranked side (48th) to beat England in a competitive match since Northern Ireland (116th) in September 2005 and the lowest on record to do so on home soil. And it was no more than they, or indeed England, deserved.

