  China sends message to not eat wild animals during Lunar New Year

  It is now just under 24 hours until the Lunar New Year for people in China (12 February) and during this period it is common for people in the country to gather for family meals, or large banquet gatherings. This year, China’s official People’s Daily newspaper is urging people not to eat wild animals during the holidays. It is sharing posters that show the silhouette of animals including snakes, hedgehogs and turtles, and telling people to avoid contact with them. “Do not illegally hunt, trade or eat wild animals,” it says. The campaign, which uses the hashtag #DontEatWildAnimalsDuringSpringFestival, has so far been seen by more than 9.5 million people. The posters have echoes of ones that circulated nationally last year at this time , back when the first coronavirus outbreak in Wuhan drew international attention. At the time, there was evident nervousness in the country about animal consumption being a possible reason for Covid-19. In May, the original epicentre of the coronavirus, Wuhan, banned eating and hunting wild animals amid these fears. And over the last year, other regions have stepped up regulations to ban the consumption of animals. In recent weeks, Chinese officials have also been updating “China’s law on animal epidemic prevention” to limit contact between animals and humans that could lead to disease. In late January, it became a requirement that pet owners keep their dogs on leads, to prevent potential diseases such as rabies.
