title: 'Fir Vale School crash: Two arrests after car hits entrance - BBC News'
date: '2018-02-13'
section: Sheffield & South Yorkshire
url: http://www.bbc.co.uk/news/uk-england-south-yorkshire-43043368
content: |-
  One eyewitness described hearing "kids screaming" as the BMW hit Fir Vale School in Sheffield.

  Police said a black BMW had been seen driving at speed around the car park at Fir Vale School

  A car crashed into the front entrance of a secondary school at the height of the morning run.

  The black BMW was seen driving "at speed" around the car park of Fir Vale School in Sheffield at about 08:25 GMT before it hit the building.

  Two men, aged 23 and 20, have been arrested on suspicion of dangerous driving and causing criminal damage.

  The school, in Owler Lane, has been closed while inquiries are carried out. No-one was injured in the crash.

  One eyewitness described hearing "kids screaming from the main entrance" of the school and seeing "extensive damage" to the building.

  The crash happened at about 08:25 GMT

  Fir Vale School, in Owler Road, has been closed following the crash

  Det Ch Insp Steve Ashmore, of South Yorkshire Police, said: "The school will remain closed for the remainder of the day as officers conduct inquiries to establish the exact circumstances surrounding the incident and provide reassurance.

  "We are confident that this is an isolated incident and there is no current risk to the school or the surrounding community."

  A spokesperson for the school said any children who were unable to go home would be looked after on site.

  Gill Furniss, MP for Sheffield Brightside and Hillsborough, said she hoped to meet with police to discuss how schools can be protected against similar incidents.

  She said: "I am incredibly relieved that on this occasion no-one was harmed.

  "As a society, we have a duty to ensure that our young people can learn and live free from danger and an incident such as this must be treated with the utmost seriousness."

