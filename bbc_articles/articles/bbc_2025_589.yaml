content: |-
  President Trump and Taylor Swift in attendance as Philadelphia Eagles beat Kansas City Chiefs in Super Bowl 59 at Caesars Superdrome, New Orleans

  Swift, Trump and a dynasty in ruins - how Super Bowl 59 unfolded

  This video can not be played To play this video you need to enable JavaScript in your browser.

  They came expecting a gripping contest between the NFL's two best teams. But President Trump, Taylor Swift and the rest left New Orleans wondering what had happened to two-time champion Kansas City Chiefs as they were steamrollered 40-22 by the Philadelphia Eagles. Inspired by quarterback Jalen Hurts and a bone-crunching defence, the Eagles left the Chiefs' dreams of an unprecedented 'three-peat' in ruins - and served notice on their plans to build their own kingdom at the top of the NFL.

  The Chiefs were the first consecutive winners in history to make it to a third straight Super Bowl

  Last season's Super Bowl was watched by a record 123m as the Chiefs edged the San Francisco 49ers in overtime to win their second straight Lombardi Trophy. It was an illustration of their recurring ability to find their best form when it mattered. After another commanding season, the Chiefs hoped to be the first team to win three in a row - but they wilted in the New Orleans heat. After a quiet first quarter, the Eagles defence exploded in the second, bullying and battering the Chiefs' offensive line and panicking the NFL's most reliable quarterback Patrick Mahomes into a catalogue of uncharacteristic errors. In that period, the 28-year-old threw two interceptions, one that was immediately returned for a touchdown by a brutal Eagles defence and the other turned into a score by receiver AJ Brown from the resulting play. It left the scoreless Chiefs well beaten before Kendrick Lamar's half-time stage had even been assembled. By the time Worthy finally got the Chiefs on the board, the Eagles had extended their lead through DeVonta Smith and a field goal from Jake Elliott, the kicker later adding two further scores. The Eagles did not even need a performance from Saquon Barkley, their brilliant running back who only had 57 yards on the ground but still managed to break Terrell Davis' record for most rushing yards in a season, including the play-offs. While Mahomes ended up with three late touchdowns, he was tackled for a loss a career-high six times and was intercepted twice as Philadelphia dethroned the king of the NFL - and thoroughly humbled their former head coach Andy Reid.

  There has never been a sitting US president at a Super Bowl but within 20 days of returning to the White House, Donald Trump has changed that. Trump has a complicated relationship with the NFL - during his first term in office he was embroiled in a row with players who took a knee during the national anthem as part of a protest against racism. His appearance in New Orleans coincided with the NFL's decision to remove the words "End Racism" from the end zone messaging, instead replacing them with "Choose Love" for Super Bowl 59. For this showpiece event, the US commander-in-chief arrived about an hour before kick-off and walked round the field flanked by his daughter Ivanka and a large entourage. After that, when shown on the big screen to mostly cheers from the thousands in the stadium, the president was understated during the anthems, offering plenty of opportunity for photographers to drink their fill of patriotic pictures.

  Before this game, the Chiefs had a 9-0 winning record this season when Taylor Swift was in the stands

  While Trump commanded much of the attention, last season's most noteworthy spectator Taylor Swift was also in attendance, with boyfriend Travis Kelce once again trying to win the Super Bowl. In 2024, Swift offered a tremendous subplot to the Super Bowl, jetting in from the Tokyo leg of her record-breaking Eras tour to witness Kelce haul in nine catches for 93 yards in their victory. This year however, she shared a wry smile as her first appearance on the big screens was greeted with resounding boos from the raucous Philadelphia fans. And her boyfriend was given similarly short shrift on the field - Kelce anonymous as the Eagles' NFL-leading defence demolished the previously untouchable Chiefs. "The only one that had a tougher night than the Kansas City Chiefs was Taylor Swift. She got booed out of the stadium. MAGA is very unforgiving," Trump posted on his Truth platform. Swift had endorsed Trump's presidential rival Kamala Harris during the 2024 election. Tennis legend Serena Williams, who appeared in the half-time show, wrote on X: "I love you Taylor Swift, don't listen to those booos!!"

  Resplendent in star-spangled hat and jacket, Hollywood legend Samuel L Jackson played host as Uncle Sam to announce multiple award-winning rapper Kendrick Lamar for the half-time show. After scooping five Grammys last week in Los Angeles, the US rapper was on top form in the Superdome, bristling through a 13-minute set. Frequent collaborator SZA joined him on stage for their hits 'All the Stars' and 'Luther' while 23-time grand slam winner Williams also made a surprise cameo as a dancer. The title song on his Grammy-winning Record of the Year 'Not Like Us' was the culmination (and the fatal blow) in an escalating rap beef with Drake - in which he accused his nemesis of cultural appropriation and paedophilia. With the song the subject of an active defamation lawsuit, it was unclear whether Lamar would be permitted to perform it. In the end, he did, self-censoring the word "paedophile" but leaving other lyrics intact, including the one that went viral. That was the only moment in Lamar's 13-minute set where the crowd audibly joined in with the words.

  Just five weeks ago, the city of New Orleans was struck by terrible tragedy. Early on 1 January, a US Army veteran drove a high-speed truck into a crowd of people, killing 14 and wounding dozens before being apprehended and killed by police fire. For Super Bowl 59, with 65,719 fans in attendance, thousands more in the city and the US president in town, security was heavy throughout the build-up. Police lined the streets and, in the balmy 25C weather, their reassuring presence brought a lively and convivial atmosphere, far removed from the terror of last month. It was classic New Orleans for the pre-match anthems, jazz musicians and Louisiana natives Trombone Shorty and Jon Batiste bringing local heritage and elegance to the regalia. There was a poignant moment too immediately before kick-off as members of the New Orleans emergency services held up framed photos of the victims of the January attack and family members participated in the honorary coin toss. Done with class and dignity, the Big Easy's 11th time of hosting the Super Bowl - a record with Miami - once again made putting on America's biggest game look simple.
