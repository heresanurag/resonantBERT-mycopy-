  After the verdicts were announced, the court heard there was a dispute over the valuation of the tree although all parties agreed it would not actually affect the sentence the men eventually get, which according to sentencing guidelines, external could be up to 10 years in prison. Prosecutors had initially valued the damage to the tree at £622,191, but Graham's barrister, Christopher Knox, said the authorities had since lowered their estimate to about £450,000 while his team reckoned the true figure to be "much lower than that". Gale Gilchrist, chief crown prosecutor at CPS North East, said the tree had stood for more than a century, adding: "In just under three minutes, Graham and Carruthers ended its historic legacy in a deliberate and mindless act of destruction."
