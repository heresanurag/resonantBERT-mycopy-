content: |-
  The trio behind "Insane Magic" pulled a trick that left BBC reporter lost for words.

  "I don't know what to say, because that was actually really freaky," she said after the trick.

  The trio of perfomers behind the Edinburgh Fringe show ''Insane Magic'' asked for the journalist to pick a word and a page from a book.

  The rest is... magic. Performers Cameron Gibson, Elliot Bibby and Luke Osey combined mind-reading and illusion to stage a snippet of their Edinburgh Fringe performance.
