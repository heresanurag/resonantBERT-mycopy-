title: Trump co-defendant Rudy Giuliani pleads not guilty in Georgia case - BBC News
date: '2023-09-02'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-66692207
content: |-
  Rudy Giuliani, Donald Trump's ex-lawyer, has waived his right to appear at an upcoming Georgia hearing.

  Rudy Giuliani, who served as Donald Trump's personal lawyer, in a police booking mugshot released by Fulton County Sheriff's Office

  Donald Trump's long-time confidant Rudy Giuliani and six other alleged co-conspirators have pleaded not guilty to state charges in Georgia.

  Mr Giuliani is charged with 13 crimes related to efforts to overturn the 2020 presidential election in the state.

  They join Mr Trump and several other co-defendants in entering not guilty pleas, waiving their right to appear in person for a hearing next week.

  All 19 have been allowed to go free pending trial after paying bail.

  On Thursday, the judge overseeing Mr Trump's case announced that the trial would be streamed on YouTube.

  A date for the trial has not yet been set, but it could be next year, in the middle of the former president's run for re-election.

  The next court date is an arraignment on Wednesday, a short hearing at which charges are read.

  Mr Trump and the other alleged co-conspirators briefly travelled to Atlanta last week to turn themselves in at Fulton County Jail and have their mugshots taken.

  All 19 defendants in the case - including Donald Trump - are charged with violating Georgia's Racketeer Influenced and Corrupt Organisations Act, commonly known as the Rico act.

  They have denied any wrongdoing.

  Across the US and at the federal level, Rico laws are used to help prosecutors connect underlings who broke the law with those who gave orders or organised the crime.

