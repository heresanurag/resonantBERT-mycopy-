title: King Charles and Camilla meet Ryan Reynolds in Wrexham - BBC News
date: '2022-12-09'
section: General
url: http://www.bbc.co.uk/news/uk-wales-63923288
content: |-
  King Charles III and the Queen Consort visited Wrexham to mark its new city status.

  King Charles lll and Camilla, the Queen Consort, met Hollywood stars Ryan Reynolds and Rob McElhenney on the pitch at Wrexham football club.

  Reynolds and McElhenney, who own Wrexham football club, gave King Charles and Camilla a tour of the ground and spoke to them about redevelopment plans.

  The visit was to mark Wrexham achieving city status.
