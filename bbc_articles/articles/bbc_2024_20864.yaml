title: '''Hero'' father killed in Cooktown crocodile attack - BBC News'
date: '2024-08-06'
section: Australia
url: http://www.bbc.co.uk/news/articles/c3ejjxv3qeqo
content: |-
  Dr David Hogbin was walking when a path gave way and he fell into water, before being taken by a crocodile.

  Dave Hogbin was on a trip with his family in Queensland

  An Australian father-of-three was killed by a crocodile after falling into a river when a path gave way, his family have said. Dr Dave Hogbin was on holiday in Queensland with his wife and three boys when a riverbank gave way and he fell into the Annan River in Cooktown. His wife tried to pull him out of the water, but she too began slipping down the river bank, prompting him to let go of her arm. His family called him a "hero", hailing his "final selfless act". Queensland Police said they believed human remains found in a crocodile in Cooktown to be of a 40-year-old man, from New South Wales, who went missing on Saturday. The remains are yet to be formally identified.

  Writing for News.com.au, journalist Alexis Carey, sister-in-law of Dr Hogbin, said his family wanted to speak out to raise awareness over how dangerous the area is and so his children "know exactly how amazing a man he really was". The GP, from Newcastle, New South Wales, had been on a camping holiday with his wife Jane and three sons - aged seven, five and two - when he was taken by a 4.9m (16ft) crocodile on Saturday afternoon, she wrote. Clearing up an initial suggestion from police that he had been fishing, Ms Carey said the family had been walking along a path on a 5m high (16ft) river bank when a portion of it gave way and he was unable to get out of the water. She said his wife, also a GP, slid down to pull Dr Hogbin out and was able to grab his arm, but she also began slipping into the river herself. "Dave’s final, decisive act was to let go of Jane’s arm when he realised she was falling in, despite knowing she was his only lifeline. Within moments, he was taken," Ms Carey said. "Dave’s brave decision in that terrifying moment very likely saved his wife’s life, ensuring she was able to return to their boys." She said the fact his children did not witness their dad's final moments was a "small piece of consolation".

  Police have suspended the search for the 40-year-old

  Dr Hogbin's wife, Jane, said: “We were just enjoying a standard day of our holiday and everything just changed within 30 seconds. He wasn’t doing anything wrong – in fact, he was doing everything right, and this still happened... “He saved me – his last act was to not pull me in with him." Paying tribute to her husband, she described him as a dedicated father and "fiercely loyal and protective". A GoFundMe page set up to help support the family has raised more than A$56,600 (£28,880). Queensland Police said the remains found in the crocodile would be tested further to aid identification. A report for the coroner is being prepared and the search has been suspended. Last month, police found human remains while searching for a 12-year-old who they believe was the victim of a crocodile attack. In April, a 16-year-old boy died in a suspected crocodile attack in Torres Strait waters while trying to swim ashore from a broken-down dinghy.
