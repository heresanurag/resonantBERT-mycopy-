title: 'The O2 arena Silvertown fire: Film set controlled explosion sparks blaze -
  BBC News'
date: '2024-09-01'
section: London
url: http://www.bbc.co.uk/news/articles/c74jv94ggl0o
content: |-
  One van was destroyed by the fire, and most of a car and lorry were damaged at a film set in Silvertown.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A "controlled explosion" on a London film set sparked a fire that destroyed a van and damaged two other vehicles near the O2 arena. The London Fire Brigade (LFB) said they had sent 25 firefighters and four fire engines to the scene, near Dock Road and Trinity Buoy Wharf in Silvertown, at 7.51pm on Saturday. Images showed a burning red lorry with the words "BBC World News" emblazoned on its trailer. But BBC News has confirmed there was no BBC News involvement in the event.

  The burning lorry was marked 'BBC World News' but it was not an official BBC vehicle

  Terrified residents posted on social media site X about the noise and smoke billowing across the Thames towards the venue - before police said the incident was part of pre-planned filming. "There is no risk to the public", the Metropolitan Police said of the blaze at an open-air yard across the river from the venue. The controlled explosion spread and became out of control, the LFB said in a statement. One van was destroyed by the fire and most of a car and lorry were damaged but the blaze was under control by 9.02pm, the statement explained. There are no reports of injuries, and crews will be at the site for the rest of the evening, it added. Local residents have spoken of their surprise and shock following the fire, with one calling the scene "carnage" on social media. Kieran McHugh told BBC News he had been on his computer when he heard three loud bangs. On looking out of his window, he saw a huge plume of black smoke with flames leaping into sky. Mr McHugh said he had not seen any notification of any filming this weekend from the local authority. Earlier on Saturday, the Metropolitan Police had said the incident was "part of a pre-planned filming event in the Canning Town E16 area" and there had been no risk to to public. A spokesman for BBC News said: "There is no BBC News involvement in the events of this evening in the Docklands.”
