title: Police investigate MP Rupert Lowe over alleged threats - BBC News
date: '2025-03-11'
section: Politics
url: http://www.bbc.co.uk/news/articles/c4gm5dr95jqo
content: |-
  The Great Yarmouth MP is accused of making "verbal threats" against Reform UK's chairman.

  The Metropolitan Police has launched an investigation into suspended Reform UK MP Rupert Lowe over an allegation of "verbal threats". Reform reported the Great Yarmouth MP to police on 6 March over alleged threats of physical violence against the party's chairman Zia Yusuf. A spokesperson for the Met Police said the force had launched an investigation "into an allegation of a series of verbal threats made by a 67-year-old man". Writing on social media, external, Lowe said he was "unaware of the specific allegations" but denied "any wrongdoing". Lowe said his lawyers "have made contact with the Met Police and have made them aware of my willingness to co-operate in any necessary investigation".

  Lowe added that his lawyers "have not yet received any contact from the police" and said it was "highly unusual for the police to disclose anything to the media at this stage of an investigation". The Met Police said "further enquiries are ongoing at this stage". The police force also clarified that it had originally "referred to alleged threats made in December 2024" but in fact the alleged threats were "made between December 2024 and February 2025".

  As well as reporting Lowe to police, Reform have hired a lawyer to investigate allegations of workplace bullying in his office made by two female employees. On Friday Reform said it had suspended Lowe from the party over the allegations. The party claimed Lowe had made "threats of physical violence" against Yusuf "on at least two occasions". It also said it had received evidence of "derogatory and discriminating remarks made about women" by Lowe. Lowe has insisted the accusations, and his suspension from Reform, were a politically motivated retaliation for his criticism of Reform's leader Nigel Farage in a newspaper interview last Wednesday. Speaking to the Daily Mail, external, Lowe criticised Reform's decision-making processes, saying Farage had a "messianic" style. Reform have claimed the alleged bullying and threats predate Lowe's article. Lowe insisted last week that the top lawyer investigating the allegations had said she was "shocked" by the process and that no evidence against him had been provided. The lawyer denied this to the BBC. Reform, the successor to Farage's Brexit Party, has been riding high in recent polls. But the row has exposed divisions within the party and means its five MPs are now down to four.

