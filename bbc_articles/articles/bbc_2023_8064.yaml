title: 'Watch: News crew rescue dog stuck in tornado rubble - BBC News'
date: '2023-05-16'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65602303
content: |-
  A news crew for broadcaster ABC helped the pup escape the wreckage of a damaged home in Texas.

  An ABC News crew came across a dog trapped underneath a damaged home in Texas, in the US, while covering a tornado that hit the area over the weekend.

  Two members of the crew heard the dog's cries coming from underneath a house, and phoned animal control. While they waited, they found a nearby shovel and began to dig.
