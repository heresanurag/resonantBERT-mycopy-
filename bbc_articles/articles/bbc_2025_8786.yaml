title: Pope Leo calls for journalists to be released from prison - BBC News
date: '2025-05-12'
section: General
url: http://www.bbc.co.uk/news/articles/cg71gne9ydko
content: |-
  The new pontiff expressed solidarity with journalists who had been jailed for "reporting the truth".

  Pope calls for journalists to be released from prison

  Pope Leo XIV has called for the release of imprisoned journalists in his first address to members of the media at the Vatican. He expressed solidarity with journalists who were jailed "for seeking and reporting the truth" and said their suffering "challenges the conscience of nations and the international community". Press freedom must be defended, he said. The media must ensure that the "precious gift" of free speech is protected. The Committee to Protect Journalists said 361 journalists were in jail in 2024.

  Pope Leo, who was chosen as the new leader of the Catholic Church on Thursday, also highlighted the role journalists can play in bringing attention to injustice and poverty in the world. He urged the media to focus on reporting the truth instead of taking part in partisan divisions, and not to give space to "fanaticism and hatred." Speaking in the Vatican's Paul VI audience hall, he said "the way we communicate is of fundamental importance: we must say 'no' to the war of words and images, we must reject the paradigm of war." "We do not need loud, forceful communication," he said, "but rather communication that is capable of listening and of gathering the voices of the weak who have no voice." The new pope also raised concerns about artificial intelligence, telling the assembled media they should use AI with "responsibility and discernment." Reporters should ensure that AI can be used for the "benefit of all of humanity," he said.

  The pope called on the media to gather the voices of people "who have no voice"

  Leo XIV spoke mainly in Italian, but opened with a quip in English about the huge round of applause he received when he walked into the room. "Thank you for this wonderful reception," he said. "They say that when they clap at the beginning, it doesn't matter much. If you're still awake at the end and still want to applaud, thank you very much."
