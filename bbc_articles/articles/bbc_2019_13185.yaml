title: 'Grace Millane murder: CCTV shows timeline of backpacker''s death - BBC News'
date: '2019-11-22'
section: General
url: http://www.bbc.co.uk/news/uk-england-essex-50400839
content: |-
  Footage shows Grace Millane's final moments and her murderer's actions after her death.

  A man who strangled a British backpacker and hid her body inside a suitcase has been found guilty of murder.

  Grace Millane was found buried in bushland outside Auckland, New Zealand in 2018.

  A jury at the city's high court rejected claims by the 27-year-old man, who cannot be named, that she died accidentally during "rough sex".

  The trial was shown CCTV footage of the pair on a date in a bar and arriving back at his hotel before he is seen taking a suitcase out of his hotel on a luggage trolley, said to contain the 21-year-old’s body.
