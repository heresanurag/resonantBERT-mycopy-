  Events are being held in towns and cities across NI to mark the 80th anniversary of the Normandy landings.

  • None Army Cadets Hope Durnin and Evie Sloan from Northern Ireland said it was emotional being part of a dawn vigil at Sword Beach on the 80th anniversary of D-Day
  • None The Royal Ulster Rifles 2nd Battalion landed on this stretch of the Normandy coast on 6 June 1944
  • None Army Cadets and the Royal Irish Regiment are involved in events and services this week to remember the almost 200 RUR fatalities in the Normandy campaign
  • None Maj Gen Colin Weir said the Royal Ulster Rifles was a unique band of brothers, coming from across Ireland and Britain
  • None Local people stopped to watch as the vigil was held at the edge of the beach
  • None A military flyover took place as the service ended Slide 1 of 7 , Evie and Hope , Army Cadets Hope Durnin and Evie Sloan from Northern Ireland said it was emotional being part of a dawn vigil at Sword Beach on the 80th anniversary of D-Day

  Events have been held across Northern Ireland and France to mark the 80th anniversary of D-Day. The Royal Irish Regiment (R Irish) took part in a sunrise service on Thursday at Sword Beach in Normandy - the spot where soldiers landed 80 years ago to begin their fight against the occupying German forces. In Northern Ireland, beacons were lit in towns and cities on Thursday night. A veterans’ charity also lit one at the top of Slieve Donard to coincide with commemorations at the UK’s other highest peaks. Buildings have also been lit up blue.

  A beacon was lit outside St Macartin's Cathedral in Enniskillen

  Events were held across Northern Ireland throughout the day. A remembrance service took place at the cenotaph in Londonderry on Thursday morning, where DUP leader Gavin Robinson laid a wreath. In Lisburn events also began early, with a D-Day proclamation read by a town crier from the Irish Linen Centre and Lisburn Museum. This was followed by the unveiling of a flag of peace and a wreath laying by the Royal British Legion. A beacon was later lit in Castle Gardens. Beacons have also been lit in Newtownards, Bangor and Ballyhalbert. In Armagh, a service was held at St Patrick’s Church of Ireland Cathedral at 20:00 before the city’s beacon was lit in Market Square.

