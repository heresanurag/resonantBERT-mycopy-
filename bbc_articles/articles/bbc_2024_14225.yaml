  A town crier read a proclamation at Enniskillen Castle on Thursday morning, and a service was held at St Macartin’s Cathedral. Enniskillen Castle was also turned blue to mark the occasion.

  A service held by the Royal Irish Regiment at sunrise on Sword Beach

  A blue plaque was unveiled at Brookeborough in honour of World War Two Field Marshal Viscount Alan Brooke. In Ballynahinch, swing time and ballroom music events were held in Market Square on Thursday evening before the lighting of a beacon. Portrush East Strand held an event featuring members of the armed forces and a pipes and drum performance. Elsewhere, in County Mayo, events were held at Blacksod Lighthouse, where the crucial weather forecast to give D-Day the green light originated.

  Maj Gen Weir, pictured with Royal Irish Honorary Chaplain Rev Andrew Totten, added there is a duty on his regiment to carry on the RUR’s legacy

  At first light on Sword Beach, there was silence on the sand as soldiers from the Royal Irish Regiment paused to reflect along with young Army Cadets. They were there to pay respect to the Royal Ulster Rifles; the only British regiment to land by air and sea on D-Day. Teenagers Hope Durnin and Evie Sloan said it was emotional to be involved. Massed pipes and drums were played on the spot where Piper Bill Millin came ashore on D-Day. Piper Millin was commander Lord Lovat's personal piper in the 1st Commando Brigade when he landed at the beach in Normandy on June 6, 1944. He was the only man who wore a kilt during the landings - the same Cameron tartan kilt his father had worn in Flanders during World War One.

  Maj Gen Colin Weir of the Royal Irish Regiment said the Royal Ulster Rifles (RUR) who served on D-Day were a “unique band of brothers”. It was made up of soldiers from across Ireland and Great Britain, volunteers for the “great crusade to secure freedom for Europe”. Maj Gen Weir said it was the duty of his regiment to carry on their legacy and pass on “some of that experience of service and sacrifice”.

  US envoy Joe Kennedy in a World War Two American jeep at an event at Enniskillen Model Primary School

  US Special Envoy for Northern Ireland Joe Kennedy met pupils at Enniskillen Model Primary School where wartime American vehicles were on display. The school’s playing fields were the site of a World War Two army camp where Allied Commander General Dwight D Eisenhower inspected troops making final preparations for D-Day.

  Ninety-six-year-old Phyllis McCartney was 16 when D-Day happened. She recalled memories from that time while at a D-Day tea dance in Lisburn. "When you are younger you think of the people and are sorry," she said. "But now, listening to men talking about how their friend was killed beside them, it breaks my heart. “I know one family who lived up the street – he was called Marley – he was in it and he was killed."
