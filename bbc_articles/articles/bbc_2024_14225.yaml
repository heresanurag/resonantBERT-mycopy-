  Codenamed Operation Overlord, the Allies’ invasion of France on 6 June 1944 marked a breakthrough in the war. Shortly after midnight gliders landed as troops seized key locations on the flanks of the Normandy beaches. By morning, tens of thousands of troops, involving soldiers from across Ireland, landed on five assault zones. They were met by machine gun fire, mortar shells and snipers, but managed to push inland. The battles to come would lead to the liberation of France and a push towards Berlin.
