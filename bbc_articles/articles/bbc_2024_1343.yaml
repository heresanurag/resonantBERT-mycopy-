id: bbc_2024_1343
title: 'Watch: Fighter jets strike targets in Yemen - BBC News'
date: '2024-01-12'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-67955835
content: |-
  Footage from UK and US authorities shows jets launch from Cyprus and a Red Sea carrier.

  US and UK forces carried out air strikes against Houthi rebel targets in Yemen on Thursday night.

  Strikes were reported in the capital Sanaa, Hudaydah, Dhamar and the north-western Houthi stronghold of Saada.

  Footage from the UK and US authorities shows fighter jets departing on their mission, and targets being struck in Yemen.
