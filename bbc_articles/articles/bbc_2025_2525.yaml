title: Travelodge killer's family sought help before woman's death - BBC News
date: '2025-02-04'
section: England
url: http://www.bbc.co.uk/news/articles/cvgpvn0vlmyo
content: |-
  Marta Elena Vento was killed by a guest on her second shift at a Travelodge hotel in Bournemouth.

  Marta Elena Vento was killed while she was working alone at a Travelodge hotel

  The family of a man who killed a hotel worker during a psychotic episode tried to get medical help for him immediately before the attack, an inquest has heard. Stephen Cole, 32, launched a 42-minute assault on Marta Elena Vento, 27, who was on a solo night shift at the Travelodge in Christchurch Road, Bournemouth, on 9 December 2020. In the week before, his family called 999 and also took him to a GP as his mental health deteriorated, the Dorset coroner was told. His father Roy Cole said the GP declined to renew a prescription for antipsychotic pills, leaving his son "crying" and "in the worst state I've ever seen him".

  Ms Elena Vento died after being punched, kicked and attacked with hair clippers on her second shift at the Travelodge, where Cole was staying. In 2021, he pleaded guilty to manslaughter by reason of diminished responsibility and was given an indefinite hospital order.

  Stephen Cole was "crying" when he could not obtain antipsychotic drugs from a GP, his father said

  In a statement read out in court, Roy Cole said his son seemed "paranoid" shortly before the killing and claimed he was being watched by the fire alarms in his room. The father took his son to Orchid House GP surgery in Ferndown on 8 December 2020, the day before Ms Elena Vento's death, the court heard. However, the GP refused to prescribe medication without a further psychiatric assessment, the coroner was told. Mr Cole told the court his son lived with him and his wife, until they moved from Reading to Dorset. He added: "Stephen turned violent towards us. He had me grabbed round the neck once. "I reported it to the police but the case was dismissed at court." The parents won a restraining order which prevented their son from visiting them, it was heard. The killer's brother Philip Cole said he was disappointed their father had been forced to breach the order in order to take him to the GP. The brother's statement, read by the coroner, said: "The responsibility to get Stephen the help he needed should have been taken by someone else other than my parents."

  Ms Elena Vento's parents have demanded to know whether her death could have been prevented

  Previously, the inquest heard Stephen Cole was evicted from the Russell Court Hotel in Bournemouth on 4 December 2020 after allegedly attacking guests and security guards. Police civilian officer Julian Humphries described a "strange, unusual encounter" with Stephen Cole in his Travelodge room three days later. Giving evidence, the offender manager said: "He was completely disengaged and almost blank. "I noticed he was staring at me and then he told me 'they' were banging on the windows on the fourth floor. "He stood up... He took a step towards me. I stepped back and the decision was easy to leave the room. "It left me, I have to say, a little shaken, wondering what had just transpired." Later, the officer said he took a phone call from Philip Cole, who informed him his brother had run out of medication for schizophrenia. Senior Dorset coroner Rachael Griffin asked whether the officer had considered whether Stephen Cole was a risk to the public. She said: "You thought he was delusional, you were aware he had been violent, you were aware he was not taking medication and you removed yourself from the room because something wasn't right." Mr Humphries said he did not think Stephen Cole was dangerous and did not inform the hotel about the encounter. He added: "I did not feel that Mr Cole was going to attack me or was in need of immediate mental health care." Previously, the inquest was told the killer was released from HMP Winchester on 27 October 2020 with a four-week supply of the antipsychotic drug olanzapine. A prison psychiatrist had noted: "His risk to others will have to be closely monitored as he has assaulted prisoners and staff in an unprovoked manner." Prison healthcare contractor PPG previously told the coroner it had not alerted Cole's former GP about his release. Ms Elena Vento's parents, from Valencia, Spain, are following the six-week Bournemouth inquest by video link. In a statement before the hearing, they said: "Now we desperately need answers about how such a brutal assault can have happened and whether it could have been prevented."
