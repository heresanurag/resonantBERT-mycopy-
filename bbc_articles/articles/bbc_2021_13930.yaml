title: Britney Spears discusses life after conservatorship - BBC News
date: '2021-11-17'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-59322526
content: |-
  Britney Spears has posted a video on her social media platforms answering questions following the termination of the conservatorship.

  She said that she's "grateful for each day" and being able to have her car keys, and ATM card

  She also credited the 'Free Britney' movement with saving her life.
