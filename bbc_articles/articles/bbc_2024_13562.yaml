title: North Korea censors sunglasses, weddings and slang - report - BBC News
date: '2024-06-28'
section: Asia
url: http://www.bbc.co.uk/news/articles/c9r3pv1dyg2o
content: |-
  The South Korean report uses defectors' accounts to build a picture of human rights in the North.

  North Korea cracking down on wedding dresses and slang - report

  Wedding dresses need to be traditional, like this bride's outfit from 2019

  North Korea is carrying out a widespread crackdown on everything from wedding dresses to slang as it seeks to counter the South's influence, a new report has revealed. The report - released by South Korea's Unification Ministry - is based on the testimony of hundreds of defectors. It includes the case of a 22-year-old who was executed after admitting listening to South Korean music and distributing films, first reported by the BBC last year. North Korea described last year's report as "slander and fabrication", but has yet to respond to the new document. According to the collected accounts, searches of homes have increased since 2021, with officials looking for signs of outside culture, news agency Yonhap reports. Signs are said to include wearing a white wedding dress or the groom lifting the bride on his back. People's phones are also being searched and checked for slang from South Korea in messages and contacts, it adds. Sunglasses have also been deemed counter-revolutionary, the report says, despite North Korean leader Kim Jong Un being know to don a pair. His father, however, also labelled certain everyday clothes items as counter-revolutionary - including jeans.

