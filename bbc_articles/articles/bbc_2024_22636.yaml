title: 'M25: Eleven miles of traffic following "serious" lorry fire - BBC News'
date: '2024-09-20'
section: England
url: http://www.bbc.co.uk/news/articles/c5y38ev486qo
content: |-
  National Highways said traffic had been delayed by up to three hours between Kent and Surrey.

  Overnight resurfacing work will be required following the fire, National Highways said

  Motorists faced delays of up to three hours on a section of the M25 after a "serious" lorry fire. National Highways reported 11 miles (17.1km) of congestion on Friday morning after two lanes of the clockwise carriageway between junction five, near Sevenoaks in Kent, and junction six, near Godstone in Surrey, were closed at one point. Congestion had also spread to the A25 through Sundridge, Oxted and Godstone, it added. As of 14:15 BST, one lane was still closed and there were 30-minute delays due to three miles of traffic.

  Delays of about 55 minutes had also been affecting traffic travelling westbound on the M26 leading up to the M25 at junction five. Surrey Police said it was made aware of the lorry incident at about 01:30.

  Delays were still expected despite a lane being reopened

  The fire and rescue service left the scene at about 03:15 once the blaze had been extinguished. National Highways said the lorry's load had been removed and clean up work could begin as the vehicle had been lifted onto a recovery van. It said resurfacing work was required and would be completed overnight, although the road was unlikely to be fully closed. All lanes will be open throughout the day once recovery work has been completed. Surrey Fire and Rescue Service said there were no casualties.
