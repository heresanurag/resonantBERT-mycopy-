title: Liverpool agree deal to sign Georgia goalkeeper Giorgi Mamardashvili from Valencia
  - BBC Sport
date: '2024-08-28'
section: Premier League
url: http://www.bbc.co.uk/sport/football/articles/c23lrvk8r72o
content: |-
  Liverpool agree to sign Georgia goalkeeper Giorgi Mamardashvili from Valencia in a deal worth up to £29m.

  Liverpool have agreed to sign Georgia goalkeeper Giorgi Mamardashvili from Valencia in a deal worth up to £29m. The 23-year-old will join, subject to a work permit and international clearance, for a fee of £25m plus £4m in add-ons. However, he will remain with the La Liga club this season before moving to Merseyside for the start of the 2025-26 campaign. Brazil international Alisson Becker remains the Reds' first-choice goalkeeper, while new manager Arne Slot also has Republic of Ireland stopper Caoimhin Kelleher at his disposal this season. Mamardashvili played in Georgia's four games at Euro 2024 before they were knocked out by eventual winners Spain in the last 16. He has made 102 appearances for Valencia since joining them in 2021 and started both their fixtures this season - defeats against Barcelona and Celta Vigo.

  Liverpool moved for Mamardashvili now as it appeared that with growing interest he may not have been available to them in the next 12-24 months. Alisson has two years and the option of a further year left on his Liverpool contract. The 31-year-old Brazilian has been aware and supportive of the move for Mamardashvili, who is seen as being capable of strengthening the club's depth of talent in that position for the future.
