  This all comes in the wake of a high-profile arrest of one of Columbia's students. Mahmoud Khalil, a Columbia graduate and campus activist, was detained by federal immigration authorities earlier this month. Mr Khalil, a legal permanent US resident, faces deportation for his role in the 2024 campus protests. US President Donald Trump has repeatedly alleged that Mr Khalil, and other pro-Palestinian activists, support Hamas, a group designated a terrorist organisation by the US. The 30-year-old's lawyers say he was exercising free speech rights to demonstrate in support of Palestinians in Gaza and against US support for Israel. They accused the government of "open repression of student activism and political speech".
