title: 'Wrexham FC: Ryan Reynolds to help ex-player see Wembley game - BBC News'
date: '2022-04-10'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-61057175
content: |-
  Wrexham FC's Hollywood owner pledges to get 72-year-old club legend with dementia to FA Trophy Final.

  Gareth Davies seen celebrating his 70th birthday with his grandchildren

  Wrexham FC's celebrity owners have pledged to help a 72-year-old club legend watch their Wembley game.

  Former captain Gareth Davies, 72, who made 612 league and cup appearances, has dementia and lives in a care home.

  Fans set up a campaign to help his family get him to the Buildbase FA Trophy Final against Bromley in May.

  But Hollywood actor Ryan Reynolds tweeted to say that he and co-owner Rob McElhenney would "make sure Gareth makes it to Wembley in comfort".

  Reynolds said the retired footballer had "showed up" for the club in the past "and we'll show up for him".

  "We are pretty overwhelmed," said son-in-law Chris Braisdell.

  "His battle with dementia is hard, but he always remembers the good old days."

  Mr Braisdell said neither he nor wife, Kate, knew in advance that a campaign had been launched to help her father get to watch the match at the ground in London.

  He said they were "flabbergasted" at Reynolds' response as well as the support from other supporters.

  "We didn't expect quite a reaction from the fans," he said.

  Ryan Reynolds and Rob McElhenney took control of the National League Club in 2021

  He said the grandfather-of-two had committed his career to Wrexham so he believed the appeal showed people saw it as an "opportunity to thank him for what he has done for the club".

  "It takes more of the burden off us, like looking after his care."

