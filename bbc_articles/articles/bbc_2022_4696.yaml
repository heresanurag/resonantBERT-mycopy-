  Wrexham Supporters' Trust previously said Mr Davies was "our most successful skipper", who led the club to the Third Division championship in 1978, and was part of their promotion winning side of 1969-70.

  It said he also captained the club to the quarter finals of the FA Cup in 1974 and 1978; the quarter-finals of the European Cup-Winners' Cup in 1976; the quarter-finals of the Football League Cup in 1978; and was capped three times for Wales.
