title: 'Bobbi-Anne McLeod: Brother pays tribute to sister - BBC News'
date: '2021-11-24'
section: Devon
url: http://www.bbc.co.uk/news/uk-england-devon-59399944
content: |-
  Bobbi-Anne McLeod, described as "beautiful and talented" by her brother, disappeared in Plymouth.

  The 18-year-old was reported missing on Saturday after she failed to meet friends in the city

  Tributes have been paid to a "beautiful and talented" 18-year-old woman who disappeared on her way to see friends.

  Police searching for Bobbi-Anne McLeod found a woman's body at Bovisand, south of Plymouth city centre, on Tuesday.

  Her brother Lee posted on Facebook: "To have you as my little sister, the adventure and journey we had been on will always be treasured."

  Police are questioning two men on suspicion of murder.

  Ms McLeod left her home in Leigham at about 18:00 GMT on Saturday to catch a bus to Plymouth city centre to meet friends but never arrived.

  Devon and Cornwall Police said the suspects, aged 24 and 26 and both from the city, were still in custody.

  In a statement on Wednesday afternoon, Assistant Chief Constable Nikki Leaper said formal identification had not taken place, but her family had been informed.

  She added that "extensive searches of a number of scenes" would "continue over the coming days".

  "We apologise to our communities but we will see a lot of police on our streets", she said.

  In his social media post, Mr McLeod said: "Until we meet again sis, I love you.

  "You didn't deserve this, such a beautiful and talented girl."

  Jaden Bauer, 19, said he and his family, who lived on the same street as Ms McLeod, were "devastated" to hear the news.

  He said: "Bobbi was such a sweet individual, she shone bright amongst the rest and to hear she is no longer with us is truly heartbreaking.

  "I am truly horrified to hear somebody I know, somebody so sweet and kind, be taken from us."

  People have been leaving flowers opposite a bus stop where forensic police officers have been investigating

  Neighbours are comforting Bobbi-Anne's family at their home in Plymouth.

  They all knew Bobbi-Anne well, and told me they were all in shock, nothing like this ever happens around here they said.

  A few hundred metres away, off this cul-de-sac on a main road into the city, a bus stop has been cordoned off with police tape.

  Bobbi-Anne was last seen heading to catch a bus at about 18:00 GMT on Saturday.

  A little further on there are more police cars, a road closed and a woodland is also taped off, where searches for Bobbi-Anne were taking place on Tuesday.

  Jodie Cox, who was among people who left flowers near a bus stop which has been cordoned off by police, said the case had "hit the whole city".

  She said: "It's truly heartbreaking, it's really affected me even though I didn't know her."

  Brendan Cavey, who also brought flowers, said: "It just saddens me and it's crazy for Plymouth to go through that."

  Smeaton's Tower in Plymouth has been lit up purple for Bobbi-Anne McLeod

  A GoFundMe page set up by Amanda Isaacs, a neighbour of Ms McLeod, to pay for her funeral, has so far raised more than £12,000.

  Ms Isaacs said: "She was a beautiful young girl, only aged 18 with her whole life ahead of her."

  She said Ms McLeod's family were "going through hell", adding that she hoped the fundraiser would lessen some of the stress on them.

  The Lord Mayor of Plymouth joined those paying their respects

  Johnny Mercer, Conservative MP for Plymouth Moor View, which includes Leigham, said it was a "shocking incident" which was "felt palpably across the community".

  He said: "It's a tragedy and it's hard to believe it's happened.

  "These things are very rare in Plymouth but it does not feel like that when it is your friends or family.

  "It is so sad and we will do everything we can to wrap our arms around the family."

  Bobbi-Anne McLeod was reported missing on Saturday after failing to meet her friends in Plymouth

  Luke Pollard, Labour MP for Plymouth Sutton and Devonport, said the death, which comes about three months after a mass shooting in Keyham, Plymouth, was "another dark day" for the city.

  "Our city was starting to heal and come to terms with those awful events," he said.

  "And to see in the past couple of days more and more people worried about Bobbi-Anne's whereabouts and now the discovery of a body, I think there will be an awful lot of people in our city hurting.

  "And hurting doubly because of the pain of losing someone so young here."

  Police said investigations were continuing and anyone with information is asked to contact them

  The Lord Mayor of Plymouth, Terri Beer, visited the floral tributes and said: "For the city of Plymouth we have been through such a tragedy at Keyham, and to see this now again right on our doorsteps is absolutely shocking.

  "I'm sure I'm not the only mother in Plymouth, or the only wife, who feels like this. It's absolutely devastating."

  Police said investigations were continuing and anyone with information was asked to contact them.

  They are searching a beach close to where the body of a woman was found.

  A cordon has been set up blocking off access to the road leading to the Bovisand cafe and car park, and also the holiday park, where a number of people are still staying in caravans.

  Forensic teams are searching the area around Sheepstor Road, including Grimspound Close

  A road leading to Bovisand beach, cafe and car park has been closed

  Smeaton's Tower in Plymouth was lit purple on Wednesday evening, the national colour used when shining a light on abuse and violence towards women.

