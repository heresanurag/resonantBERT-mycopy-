content: |-
  Osea Island, a secluded retreat reached by a causeway, is popular with stars seeking privacy.

  Island where Stormzy wrote album on sale for £25m

  Stormzy said writing an album on Osea Island was a "surreal, spiritual experience"

  A secluded island where Stormzy wrote an album is on sale - and expected to go for more than £25m ($33m). Osea Island in the Blackwater Estuary near Maldon in Essex is owned by music producer Nigel Frieda. The 380-acre (1.5-sq-km) private estate - where the grime artist worked on his most recent album, This Is What I Mean - has also been rented by the singer Rihanna and used as a film location. One of the estate agents listing the island, which is cut off at high tide, said there had already been considerable interest.

  Osea Island is for sale with a guide price of £25m

  "We already have several bids on it and some of them are in excess of the guide price," said Simon Pelling, of Fine and Country. "We see it going to operators who will use it in a similar way to how it is used now - as a venue, an event space or high-end letting facility," he added. Essex singer Olly Murs got married there in 2023.

  An estate agent said it had already had several bids in excess of the guide price

  The 1989 television adaptation and the 2012 film of The Woman in Black were both filmed there. During World War One, torpedo-carrying speedboats operated from a secret naval base on the island. Mr Pelling added: "Its proximity to London is a major selling point and it's beautiful."

