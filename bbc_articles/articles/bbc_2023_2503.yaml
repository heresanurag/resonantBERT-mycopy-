title: Two Southampton nurses killed in crash near Grand Canyon - BBC News
date: '2023-02-11'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/uk-england-hampshire-64597264
content: |-
  Friends Tatiana Brandão and Raquel Moreira died while on holiday together in the US.

  Two NHS nurses have died in a car crash while on holiday together in the US.

  It was reported they died in a crash involving a Jeep and a bus near the Grand Canyon, Arizona, on 3 February.

  The hospital said the two friends were "much-loved" by their colleagues and that staff had been left "shocked and saddened" by news of their deaths.

  The nurses had moved from Portugal to work at University Hospital Southampton

  Gail Byrne, the trust's chief nursing officer, said Ms Brandão and Ms Moreira had "bright careers ahead of them" after joining the hospital seven and five years ago respectively.

  "The friends were well-known for their kindness, empathy and enthusiasm," said Ms Byrne.

  "Both were passionate about nursing and providing the very best care for our patients.

  "Outside of work they shared a love for new experiences, adventure and living life to the fullest."

  She said the pair would be "sorely missed" and and that the hospital was sending its "love and condolences" to their families.

