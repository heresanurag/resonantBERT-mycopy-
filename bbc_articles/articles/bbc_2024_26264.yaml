content: |-
  Callum Parslow is convicted of attempted murder over the attack at a hotel in Worcestershire.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A white supremacist who stabbed an asylum seeker at a hotel in a "protest" against small boat crossings has been found guilty of attempted murder. Callum Ulysses Parslow, 32, stabbed Nahom Hagos in the chest and hand at the Pear Tree Inn at Smite near Worcester, Leicester Crown Court heard. Parslow told the jury he travelled to the hotel on 2 April to stab "one of the Channel migrants" because he was "angry and frustrated". Mr Hagos is a 25-year-old Eritrean national who has been granted leave to remain in the UK until November 2028. Parslow was remanded in custody and will be sentenced at Woolwich Crown Court on a date to be fixed.

  Parslow will be sentenced at Woolwich Crown Court on a date to be fixed

  Parslow, who has a tattoo of Adolf Hitler's signature on his left forearm, tried to send a post to X before his arrest which claimed he "just did my duty to England" by trying to "exterminate" his victim, the trial heard. He had admitted a lesser charge of wounding. The three-week hearing was told how Parslow attacked Mr Hagos with a "specialist" knife he had bought online for £770. Prosecutor Tom Storey KC told the jury Mr Hagos had previously lived at the Pear Tree Inn and had returned to visit a friend. Mr Hagos told Parslow he was from Eritrea when the defendant asked where he was from. Shortly after, while Mr Hagos was eating a meal, Parslow produced a knife and proceeded to stab and lash out at Mr Hagos, inflicting wounds to his chest and the back of his hand. The hotel manager and a builder used a van to take Mr Hagos to hospital in Worcester, as they felt he was losing too much blood.

  This video can not be played To play this video you need to enable JavaScript in your browser. Callum Parslow (marked in yellow) attacked his victim as he ate a meal, before chasing him to the car park

  Parslow, who wrote his own "manifesto," ran off towards a canal after the stabbing, where he was seen with what appeared to be blood on his hands. As police closed in, he tried to post the document to X, tagging Tommy Robinson and prominent politicians including Sir Keir Starmer, Rishi Sunak, Nigel Farage and Suella Braverman. But the message failed to send because he had copied in too many recipients.

  Parslow has a tattoo of Adolf Hitler's signature on his left forearm

  In the document, Parslow railed against what he termed the "evil enemies of nature and of England" who he identified as "the Jews, the Marxists and the globalists" that he said were responsible for demonising Christianity, white people and European culture. Mr Storey said it was clear the manifesto was intended for publication online, as it ended with a list of X handles or tags, which also featured those of Ukip and news outlets including the BBC and GB News. A police search of Parslow's flat in Bromyard Terrace, Worcester, led to the recovery of a second knife in a sheath, an axe, a metal baseball bat, a red armband bearing a swastika, a Nazi-era medallion and copies of Mein Kampf. Details of the trial could not be reported until a court order was lifted on Friday, after Parslow pleaded guilty to an unconnected sexual offence and two charges under the Malicious Communications Act.

  Nazi memorabillia was seized at Parslow's bedsit in Worcester

  The head of West Midlands counter-terrorism unit, Det Ch Supt Alison Hurst, said it was "a carefully planned violent attack with an individual with extreme right-wing mindset". During a conversation, the victim told Parslow he was from eastern Africa, at which point "the offender took a knife out and stabbed him to the chest and to the hand," she stated. Det Ch Supt Hurst said the victim required extensive medical treatment in hospital. "Thankfully, he has physically made a full recovery but emotionally, understandably, he is still struggling and obviously feels very shocked from this horrendous, traumatic event that he has experienced."

  Det Ch Supt Alison Hurst said the victim required extensive medical treatment in hospital

  West Mercia Police Assistant Chief Constable Grant Wills said attacks "of this nature are not something we deal with day-to-day, but we are always ready". The hotel was not being used to house asylum seekers at the time of the attack, he stated, as it was closed for renovation. But he said it had previously been used to house asylum seekers. He added: “At the centre of this, was a victim who suffered some significant injuries.”

  Nahom Hagos was injured in April at the Pear Tree Inn in Smite in Worcestershire

