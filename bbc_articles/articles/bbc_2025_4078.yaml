title: Net Zero by 2050 'impossible' for UK, says Kemi Badenoch - BBC News
date: '2025-03-18'
section: Politics
url: http://www.bbc.co.uk/news/articles/cly3pnjyzp4o
content: |-
  The Tory leader says the target is impossible "without a serious drop in our living standards".

  Net zero by 2050 'impossible' for UK, says Badenoch

  Kemi Badenoch has said it is "impossible" for the UK to meet its net zero target by 2050 - a goal set by a previous Conservative government. The UK is legally committed to reaching net zero by 2050 under a law passed by former Tory Prime Minister Theresa May in 2019. It means the UK must cut carbon emissions until it removes as much as it produces, in line with the 2015 Paris Climate Agreement. In a speech, Badenoch said net zero cannot be achieved by 2050 "without a serious drop in our living standards or by bankrupting us". The Conservative leader did not set out an alternative target date, but said she would consider doing so if her party found a better way of delivering net zero.

  Hitting back at Badenoch's speech, Baroness May said the 2050 target was "challenging but achievable". "Delaying action will only harm the next generation and increase both the economic and social costs of climate change," she added. Badenoch's words mark a sharp break from years of political consensus on net zero. The shift in approach comes after Reform UK set out more details of how it would scrap net zero targets, one if its key pledges at the last general election. Last month, the party's deputy leader Richard Tice said his party would focus on extracting more fossil fuels and recover money paid in subsidies to wind and solar companies via a series of new taxes. In her speech, Badenoch called lower energy costs and environmental protection "noble aims" but said current policies were "largely failing" to improve nature, while raising energy prices. She said: "We're falling between two stools - too high costs and too little progress. "Net zero by 2050 is impossible. "I don't say that with pleasure. Or because I have some ideological desire to dismantle it - in fact, we must do what we can to improve our natural world." She said she was not making a "moral judgment" on net zero or debating whether climate change exists. But she said her Tory party was going to "deal with the reality" of the target, something she argued Labour and past Conservative governments ignored. Speaking afterwards, Badenoch said she still backed net zero, but insisted she was not going to "rush out" a target. Badenoch told reporters party would consult experts and if "we do find a target is necessary, then yes we will have one".

  Badenoch's speech kicks off a new chapter in her leadership, launching an overhaul of Conservative policies - starting with energy and net zero. Badenoch won her party's leadership on a promise to return the Conservatives to "first principles" before setting out detailed policies. She has now announced a "policy renewal programme" - putting each of her shadow cabinet in charge of a policy area. Her comments come as governments worldwide are investing in renewables to meet international climate targets and lower carbon emissions to net zero by 2050. The UN and Intergovernmental Panel on Climate Change (IPCC) have warned that global CO2 emissions must reach net zero by then to limit global temperature rises to 1.5C. Labour is expanding renewable energy, and said in its election manifesto it would invest £8.3bn in Great British Energy, a state-owned company to invest in clean energy projects, over five years. Electricity is increasingly generated from renewable energy in the UK, and the cost of renewable generation has significantly fallen in the past decade. Labour promised to bring down household energy bills by "up to £300 by 2030" - and Energy Secretary Ed Miliband has stood by the pledge. But UK energy bills went up in January, and are expected to rise again in April. The main reason for high energy prices in the UK has been an increase in the price of gas, which has been the largest source of fuel for years.

  A Labour spokesperson said: "Kemi Badenoch claims she's ready to 'deal with reality' while remaining in complete denial about the reality of the Tories' appalling record in government. "The Tory leader's position is at odds with her own historic views. In government, she openly championed net zero. "It's clear the Conservatives stand for nothing and have learned absolutely no lessons. They haven't changed." The Liberal Democrats said Badenoch was "taking a leaf straight out of Nigel Farage's playbook". "Scrapping net zero and renewable energy targets will simply increase our reliance on foreign fossil fuels," the party's deputy leader Daisy Cooper said. As a minister, Badenoch promoted the 2050 target as "crucial" to "achieve a cleaner, green future". Sam Hall, Director of the Conservative Environment Network, called it a "mistake" and argued Badenoch's speech "undermines the significant environmental legacy of successive Conservative governments". He said Badenoch was right to criticise Labour's approach, but argued "the net zero target is driven not by optimism but by scientific reality; without it climate change impacts and costs will continue to worsen". But Lord Craig Mackinlay, a Conservative peer and net zero sceptic, praised Badenoch's "reality check" on the 2050 target. "Most of the world has already given up any pretence that it is affordable or achievable," he added. "Intermittent renewables that only stack up on the back of buckets of taxpayer cash are not the answer when we need cheap, reliable and secure energy."
