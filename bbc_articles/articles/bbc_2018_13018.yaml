id: bbc_2018_13018
title: 'China bus plunge: Fight blamed for causing fatal crash - BBC News'
date: '2018-11-03'
section: General
url: http://www.bbc.co.uk/news/world-asia-china-46069327
content: |-
  Footage from a bus that plunged into a river in China shows an altercation between the driver and a passenger.

  Security footage from a bus which crashed into a river in China has revealed that the driver was fighting with a passenger moments earlier.

  The bus plunged 50m (164ft) off a bridge into the Yangtze River in Chongqing on Sunday - at least 13 people died and two more are missing.
