title: 'Gabalfa: Serious fire at suspected cannabis factory - BBC News'
date: '2021-12-20'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-59725029
content: |-
  Crews called to the scene in the early hours of Monday say the blaze is now under control.

  The fire broke out on North Road, Cardiff, in the early hours of Monday morning

  More than 40 firefighters tackled a serious fire at a suspected cannabis factory on Monday.

  Eight crews were called to North Road, Gabalfa, Cardiff, at 03:45 GMT after a blaze broke out in a two-storey terraced building with flats above commercial businesses.

  Police said there was evidence the property at the top of the building had been used to grow cannabis.

  Neighbours were evacuated as the fire spread, but no one was hurt.

  The fire had ripped through the first floor and attic space of one property but the adjoining buildings were checked and saved from serious damage.

  The property was cordoned off while it was made safe and police launched an investigation into the cause of the fire.
