title: Trump sows uncertainty - and Xi Jinping sees an opportunity - BBC News
date: '2025-02-04'
section: World
url: http://www.bbc.co.uk/news/articles/c78xj7j719jo
content: |-
  President Xi Jinping has made no secret of his ambition for China to lead an alternate world order.

  If China was angry at the United States for imposing an extra 10% tariff on all Chinese goods, it did a good job of hiding it. It urged Washington to start talks after repeated warnings that there would be no winners in a trade war. It held its fire until midnight in Washington - and then just as the tariffs on China kicked in, Beijing announced retaliatory tariffs of 10-15%, starting 10 February, on various US imports, including coal, crude oil and large cars. The Chinese government may have remained calm in the hope of doing a deal with Washington to avoid further tariffs - and to keep the relationship between the world's two largest economies from spiralling out of control. After all, US President Donald Trump agreed to reprieves with Canada and Mexico just hours before the tariffs on them took effect. Trump and China's President Xi Jinping are expected to talk this week. The US levy will sting - especially because it adds to a slew of tariffs Trump imposed in his first term on tens of billions of dollars of Chinese imports. And China's population is already concerned about their sluggish economy. Beijing and Washington have gone toe-to-toe on tariffs before. But a lot has changed since Trump 1.0. For one, the Chinese economy is not as reliant on the US as it was back in 2020. Beijing has strengthened its trade agreements across Africa, South America and South East Asia. It is now the largest trading partner of more than 120 countries. A deal could still be in the offing but the additional 10% may not offer the leverage that Trump wants, says Chong Ja Ian from Carnegie China.

  President Xi Jinping may also see a bigger opportunity here. Trump is sowing division in his own backyard, threatening to hit even the European Union (EU) with tariffs - all in his first month in office. His actions may have other US allies wondering what is in store for them. In contrast, China will want to appear a calm, stable and perhaps more attractive global trade partner. "Trump's America-first policy will bring challenges and threats to almost all countries in the world," says Yun Sun, director of the China programme at the Stimson Centre. "From the perspective of US-China strategic competition, a deterioration of US leadership and credibility will benefit China. it is unlikely to turn well for China on the bilateral level, but Beijing surely will try to make lemonade..."

  Cambodia has become a major importer of Chinese raw materials - and a destination for Chinese businesses seeking to skirt US tariffs

  As a leader of the world's second-largest economy, Xi has made no secret of his ambition for China to lead an alternative world order. Since the end of the Covid pandemic, he has travelled extensively, and he has supported major international institutions such as the World Bank and agreements such as the Paris climate accords. Chinese state media have portrayed this as embracing countries across the world and deepening diplomatic ties. Before that, when Trump halted US funding to the WHO in 2020, China pledged additional funds. Expectations are high that Beijing may step in to fill America's shoes again, following Washington's exit from the WHO. The same applies for the aid freeze that is causing such chaos in countries and organisations that have long depended on US funding - China may wish to fill the gap, despite an economic downturn.

  On his first day back in office, Trump froze all foreign assistance provided by the US, which is by far the world's biggest aid donor. Hundreds of foreign aid programmes delivered by USAID ground to a halt. Some have since restarted, but aid contractors describe ongoing chaos as the future of the agency hangs in the balance. Trump's "America First" doctrine could further weaken Washington's position as a global leader, says John Delury, a historian of modern China and Professor at Yonsei University in Seoul. "The combination of tariffs on major trade partners and freezing of foreign assistance sends a message to the Global South and OECD alike that the US is not interested in international partnership, collaboration," he tells the BBC. "President Xi's consistent message of 'win-win' globalisation takes on a whole new meaning as America retreats from the world." In its bid for global governance, Beijing has been looking for a chance to upend the the American-led world order of the last 50 years - and the uncertainty of Trump's presidency may well be it.

  "Whether it really confers Beijing a key advantage - of that I'm a little less sure," Mr Chong says. "Many US allies and partners, especially in the Pacific, have a reason to work with Beijing, but they also have reasons to be wary. That's why we've seen Japan, South Korea, the Philippines and Australia move closer together, in part because of the apprehensions they harbour towards China." There is "gathering momentum" for a possible trilateral relationship among Australia, Japan and South Korea, motivated by "the impact of a second Trump administration", according to The Australian Institute of International Affairs.

  Tensions in the South China Sea mean some of China's neighbours are already wary

  All three are concerned about China's assertiveness in the South China Sea, along with the Philippines. They are also worried about a possible war over the self-governed island of Taiwan - Beijing sees it as a breakaway province that will, eventually, be part of the country, and has not ruled out the use of force to achieve this. Taiwan has long been one of the most contentious issues in US-China relations, with Beijing condemning any perceived support from Washington for Taipei. But it may be difficult for Washington to hit back at signs of Chinese aggression when Trump repeatedly threatens to annex Canada or buy Greenland. Most countries in the region have used a military alliance with Washington to balance their economic relationship with China. But now, wary of Beijing and unsure of the US, they could create new Asian alliances, with neither of the world's biggest powers.

  Trump announced the US tariffs on the weekend, as Chinese families were celebrating the New Year and inviting the God of Fortune into their homes. Bright red lanterns currently swing over empty Beijing streets as most workers have left for their hometowns during the biggest holiday of the year. At first, China's only response had been that it would take legal action and use the World Trade Organisation to air its grievances. But this poses little threat to Washington. The WTO's dispute settlement system has been effectively shut down since 2019 when Donald Trump - in his first term then - blocked the appointment of judges to handle appeals. Then China announced retaliatory tariffs. As the holiday draws to a close and party officials return to Beijing and to work, they have decisions to make. Officials had been encouraged in recent weeks by signs that the Trump administration may want to keep the relationship stable especially after the two leaders had what Trump called "a great phone call" last month. But that is going to get harder, as both Republicans and Democrats increasingly view China as America's biggest foreign policy and economic threat. "Mr Trump's unpredictability, his impulsiveness and recklessness will inevitably lead to significant shocks in the bilateral relationship," says Wu Xinbo, professor and director at the Centre for American Studies at Fudan University. "Additionally, his team contains quite a few hawks, even extreme hawks on China. It is unavoidable that the bilateral relationship will face serious disruption over the next four years." China is certainly concerned about its relationship with the US and the harm a trade war could do to its slowing economy. But it will also be looking for ways to use the current political pendulum to swing the international community its way and within its sphere of influence.
