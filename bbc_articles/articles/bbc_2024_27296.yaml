  Riding under the influence is also now punishable with prison time.

  Cyclists on phones face jail under Japan’s new laws

  The number of cyclists in Japan surged during the pandemic, and authorities are now racing to regulate them.

  Cyclists using a mobile phone while riding in Japan could face up to six months jail under strict new rules introduced Friday. Those who breach the revised road traffic law can be punished with a maximum sentence of six months in prison, or a fine of 100,000 yen ($655; £508). The number of accidents involving cyclists started climbing in 2021, as more people opted to cycle instead of using public transport during the pandemic, according to local media. Authorities are now racing to regulate riders. Besides cracking down on phone usage, the new rules also target cyclists riding under the influence of alcohol, with a penalty of up to three years in prison or a fine of 500,000 yen ($3,278; £2,541).

  Hours after the new laws came into effect, Osaka authorities confirmed on Friday that they had already recorded five violations, including two men who were caught riding bicycles while drunk. One of the men had collided with another cyclist, but no injuries were reported. Under the new rules, cyclists who cause accidents can be fined up to 300,000 yen ($2,000; £1,500 ) or jailed up to a year. The total number of traffic accidents across Japan may be declining, but bicycle accidents are on the rise. More than 72,000 bicycle accidents were recorded in Japan in 2023, accounting for over 20% of all traffic accidents in the country, according to local media. In the first half of 2024 there was one fatality and 17 serious injuries from accidents involving cyclists using their phones — the highest number since the police started recording such statistics in 2007. Between 2018 and 2022 there were 454 accidents caused by cyclists using phones, according to police — a 50% increase from the previous five-year period. The latest rules come amid a series of safety regulations aimed at protecting the safety of riders and pedestrians. Last year, authorities made it compulsory for cyclists to wear helmets. In May, Japan’s parliament passed a bill allowing police to fine cyclists for traffic violations. Unlike in many other countries, cycling on pavements is legal in Japan, and is a common practice.
