title: Bletchley man admits murdering two women on Christmas Day - BBC News
date: '2025-04-15'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/articles/cd7vywjdp18o
content: |-
  Police describe 49-year-old Jazwell Brown's attack on the two women as "brutal".

  Joanne Pearson (left) and Teohna Grant (right) died at the scene at the address on Santa Cruz Avenue in Bletchley

  A man has pleaded guilty to murdering his partner and neighbour on Christmas Day. Jazwell Brown stabbed Joanne Pearson, 38, and Teohna Grant, 24, at a block of flats in Santa Cruz Avenue, Bletchley, in Milton Keynes. At a hearing at Luton Crown Court on Tuesday, Brown, 49, also admitted attempting to murder 29-year-old Bradley Latter and a teenage boy during the same attack. He is due to be sentenced on 22 May.

  Thames Valley Police described Brown, who will be sentenced in May, as "dangerous"

  Brown, also of Santa Cruz Avenue, spoke only to confirm his identity and enter pleas. He also admitted unlawfully possessing a knife in a public place and causing unnecessary suffering to a Staffordshire bull terrier. The two women were pronounced dead at the scene after officers arrived at the flats at 18:36 GMT on 25 December. Charles Miskin KC, representing Brown, said the 49-year-old had shown remorse for his actions and was "profoundly sorry". Mr Justice Kerr also ruled that the child victim of attempted murder could not be identified in media reports of the case.

  A forensic officer at the flats in Bletchley after the attacks on 25 December

  Det Ch Insp Stuart Brangwin, of Thames Valley Police, said: "Jazwell Brown is a dangerous man and I am glad that he has pleaded guilty, accepting responsibility for his actions that day, but the deaths of Joanne and Teohna cannot be undone. "This was a brutal attack on his own partner and neighbour, in their respective homes, where they should have been able to feel safe and secure." Celia Mardon, a Crown Prosecution Service (CPS) lawyer, said: "This was an inexplicable attack which has done irreversible damage - robbing two women of their lives and seriously injuring two others. "The strength of the prosecution's case, which featured compelling witness, CCTV and forensic evidence, gave Jazwell Brown little choice but to admit his guilt, and we are pleased that those affected by this tragic event have been spared the process of a trial.

  "While we may never know why Brown committed such mindless violence, we must remember the two lives that were needlessly lost. "Our thoughts remain with the loved ones of Joanne and Teohna, and we hope that today's result provides them with some closure."

  The Christmas Day attacks took place in a shared flat block

  The CPS said Brown and the two women had lived in a shared flat block and he had also stabbed Joanne's dog, Tilly, during the incident.

  In a statement released after Tuesday's hearing, the CPS said Brown had "fled the scene", but had been spotted by eyewitnesses and captured on CCTV. It added: "Responding to emergency calls, officers with Thames Valley Police quickly apprehended Brown and brought him into custody where he made several incriminating statements. "These included 'I lost my cool tonight' and describing the incident as 'not self-defence, plain murder, it's plain murder, not self-defence'."

