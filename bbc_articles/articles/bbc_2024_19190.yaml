title: Police separate crowds of protesters outside Liverpool mosque - BBC News
date: '2024-08-02'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/c80x0gqvq7ro
content: |-
  Liverpool officers stepped up patrols amid more demonstrations in the aftermath of the Southport attack.

  Groups of opposing protesters near a mosque exchanged chants and gestures

  Police moved to separate crowds of opposing protesters outside a mosque in Liverpool as more demonstrations began in the aftermath of the Southport attack. Merseyside Police formed a barrier between the two groups close to the Abdullah Quilliam Mosque on the city's Brougham Terrace from about 20:00 BST on Friday. A scuffle broke out between protesters at one stage as pro-refugee chants began from one side and others shouted "go home" in retaliation. Police had earlier insisted they were "fully prepared for anyone intent on causing disorder" as speculation built throughout Friday of protests being planned across the weekend.

  A short stretch of the road from the junction of Everton Road and Walker Street to the other side of the mosque was closed during the demonstration. The gathering was among several which began around England in the wake of the knife attack at a children's dance workshop in Southport on Monday. Elsewhere, protesters clashed with police in Sunderland as they gathered for a planned demonstration, also outside a mosque. Stones and beer cans were thrown at police in riot gear, while mounted officers pushed back demonstrators, some of whom were in masks.

  Some members of the crowds held up placards during the protest

  Merseyside Police said extra officers were being deployed, with extra stop-and-search powers in place in both Southport and Liverpool into the weekend. Bebe King, six, Elsie Dot Stancombe, seven, and Alice Dasilva Aguiar, nine, died after they were attacked by a knifeman at the Taylor Swift-themed dance class. Five children and two adults injured in the attack remain in hospital, while two other children have since been discharged from Alder Hey Children's Hospital. Prime Minister Sir Keir Starmer paid a visit to the hospital earlier as part of a second visit to Merseyside, where he thanked staff for their hard work and professionalism in responding to the attack.

  Elsie Dot Stancombe, Alice Dasilva Aguiar and Bebe King died after the attack

  Southport witnessed a night of disorder in the aftermath of the stabbings

  The chairman of a mosque that was attacked in Southport on Tuesday has said "hate will never prevail" as he joined other religious leaders on Friday to say hate "must not be allowed to fester in our society". Senior Imam Qari Asim read out a joint statement from Muslim, Jewish and Christian leaders outside Southport Mosque. "There are some who have chosen to use what should be a moment of collective grief to sow the seeds of division, spread Islamophobia and attack the mosque here in Southport," the joint statement said. "People from all of our faiths live as minority communities in different places across the world and understand what it is like to be persecuted. "And in times like this, we must all stand together and not let division destroy community cohesion in our cities and towns".

  The community of Southport came together to repair the damage caused on Tuesday

  Imam Ibrahim Hussein, chairman of Southport Mosque, said he felt like "the luckiest man in the whole country" after seeing the support of the local community. "But it is not about Southport Mosque, it is not about our suffering," he added. "We should have been focused all along about these poor people who have suffered in the most horrific way. "Instead these people try to destroy what is so beautiful about our community." Axel Muganwa Rudakubana, 17, from Banks in Lancashire, appeared in court on Thursday charged with murder and attempted murder over the attack. Chief Constable Gavin Stephens, chairman of the National Police Chiefs' Council, said officers "will not stand by and let criminals carry out unnecessary violence in our communities".

  He continued: "I'd like the public to know there is a robust and united response in place across the country, and police chiefs have agreed to step up resourcing this weekend. "Our message to anyone thinking of getting involved in this type of criminality is clear - if you cause violence, you will face the full force of the law and we have the full backing of our criminal justice partners." Det Ch Insp Tony Roberts said Merseyside Police had now made seven arrests following the disorder in Southport on Tuesday evening, adding that further arrests would be made over the coming weeks. He said the force was reviewing hundreds of hours of footage and images "to identify everyone involved".

  Balloons and teddies are among tributes which have been left in Southport

  The disorder in Southport was followed by a number of incidents across the country on Wednesday. Eight people were arrested following disorder in Hartlepool, while two were arrested following an incident in Manchester, and over 100 arrests were made following disorder in central London. Several police officers have been injured in the incidents. On Thursday, Sir Keir announced that police forces across the country would be working more closely to tackle violent disorder. Home Office Minister Lord Hanson told LBC Radio that would-be protesters needed to "be prepared to face the full force of the law on this criminal activity".
