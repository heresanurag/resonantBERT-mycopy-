  The prime minister said the public needs to remember to take preventative measures to stop the spread of Covid-19.

  Speaking at the latest government briefing on coronavirus, Prime Minister Boris Johnson said the public needs to remember to take preventative measures to stop the spread of Covid-19. as the number of infections rises sharply across England.
