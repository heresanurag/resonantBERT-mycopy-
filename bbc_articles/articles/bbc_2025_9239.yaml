title: Five men stabbed at Thamesmead music event arrested - BBC News
date: '2025-05-17'
section: London
url: http://www.bbc.co.uk/news/articles/cp85lwllnd7o
content: |-
  The five men, who were all taken to hospital, are arrested on suspicion of violent disorder.

  Emergency services were called to Nathan Way in Thamesmead shortly after 04:15 BST

  Five men who were stabbed at a music event in south-east London have been arrested on suspicion of violent disorder, police have said. Emergency services were called to Nathan Way in Thamesmead shortly after 04:15 BST to reports that a number of people had been injured. The Met Police said the men, aged 22, 24, 24, 31 and 32, had suffered stab injuries and were taken to hospital. Three of them sustained injuries which were not believed to be life-threatening or life-changing. Two others were still undergoing medical assessment, the force said.

  The BBC understands the stabbings happened after a fight broke out during the music event, where there were around 300 people present. A cordon remained in place and inquiries were ongoing, the Met said.

  Det Insp Steven Andrews, who is leading the investigation, said: "Officers responded quickly to provide medical assistance to the five injured people alongside the London Ambulance Service and ensure the safety of around 300 people, who were at this music event. "The five men who have been injured have been arrested for violent disorder and we continue to work to establish any wider involvement. "There will be a continued police presence on Nathan Way throughout today while we continue this investigation. "We encourage anyone with any information to contact police to assist with inquiries."
