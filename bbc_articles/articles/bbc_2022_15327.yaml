title: N-Dubz cancel show 'at the last minute' after support acts perform - BBC News
date: '2022-11-23'
section: Nottingham
url: http://www.bbc.co.uk/news/uk-england-nottinghamshire-63726742
content: |-
  The sudden announcement was made just before N-Dubz were due to take to the stage on Tuesday.

  The group recently announced their return after 11 years

  Fans were left angry and disappointed after N-Dubz cancelled a show "at the very last minute" after their support acts had performed.

  The concert, at the Motorpoint Arena in Nottingham, was part of the group's The Back To The Future tour following their recent return after 11 years.

  One fan said she felt "mugged off" by the cancellation.

  N-Dubz apologised but said singer Dappy had been advised by doctors to rest and would be unable to perform.

