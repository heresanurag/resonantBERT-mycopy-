content: |-
  Two weeks after the explosion that shattered Beirut, we meet families whose lives changed forever.

  On 4 August, a massive explosion devastated the Beirut port area, killing more than 200 people.

  Two weeks after the explosion that shattered Lebanon's capital, the BBC's Tom Bateman meets families and individuals whose lives have changed forever.
