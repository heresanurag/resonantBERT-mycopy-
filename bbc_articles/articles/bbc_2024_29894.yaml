title: Actor Jason Hoganson found after 'evading arrest' - BBC News
date: '2024-11-07'
section: Tyne
url: http://www.bbc.co.uk/news/articles/c238gp5pxzlo
content: |-
  Jason Hoganson, who starred in 1987's Empire State, has now been found by police.

  Jason Hoganson was initially released from prison in September

  A former Hollywood actor who was released early from prison has been found after "evading" arrest for breaching his bail conditions, police say. Jason Hoganson, who had a leading role in 1987 film Empire State, was released from Durham Prison on 10 September. The following day, the 53-year-old was arrested in Newcastle's West End on suspicion of two counts of breaching a restraining order and one count of assault. After appearing at North Tyneside Magistrates' Court on 12 September and pleading not guilty to the charges, Hoganson had been on conditional bail.

  Northumbria Police said Hoganson was wanted for breaching his licence conditions. He was released after serving half of an 18-month jail sentence at HMP Durham earlier this month. The Ministry of Justice has been approached for comment.
