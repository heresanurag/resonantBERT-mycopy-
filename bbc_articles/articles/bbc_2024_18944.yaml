title: 'Ballycastle: Tributes paid to boy killed in quad bike accident - BBC News'
date: '2024-08-17'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c2l1k9278qjo
content: |-
  The six-year-old, named locally as Joe Hegarty, was a "lovely wee lad" who was "friends with eveyone".

  Carey Faughs Hurling Club said Joseph Hegarty was "at the heart" of the club

  Tributes have been paid to a six-year-old boy who was killed in a quad bike accident. The boy, named locally as Joseph Hegarty, died after the incident in Ballynagard Road area, near Ballycastle. Sean McBride, chairman of Carey Faughs Hurling Club, described Joseph, who was known as Joe, as a "lovely wee lad" who was "at the heart" of the club. The club said "it wouldn't have been a Carey match if Joe wasn't there, cheering the boys on".

  Joe's hurling club placed this shirt tribute at the grounds

  Naomh Padraig GAA club said "wee Joe" was "a ray of sunshine at all our games, never happier than with a hurl in his hand running on to the pitch". The team at Little Rascals summer scheme said he was friends with everyone and if "Joe didn't know you, he made sure he got to know you". They said he entertained them with his dancing, football skills and hurling knowledge, and he provided them with "endless laughs". St Patrick's & St Brigid's Primary School said Joe was a "much loved pupil" who was friends with everyone. Sian Mullholland, who is an Alliance Party member of the legislative assembly, said her son played in the same hurling team and "everyone in our Carey Parish and the wider area are devastated". "Joe’s mum and dad give so much to our children through their coaching, and we’re heartbroken this has happened to one of theirs," she added. A Health and Safety Executive spokesperson said it was aware of the incident and it is liaising with the police. The police said they were treating it as a sudden death.
