title: 'Hurricane Dorian: Search teams scour Bahamas wreckage for victims - BBC News'
date: '2019-09-11'
section: General
url: http://www.bbc.co.uk/news/uk-politics-49664059
content: |-
  Nearly two weeks after Hurricane Dorian, search operations continue to find the dead.

  At least 50 people have died as a result of Hurricane Dorian, a number that is expected to rise as search operations continue.

  Nearly two weeks after the category five storm devastated parts of the island chain, thousands have been left without homes and essentials such as water and electricity.
