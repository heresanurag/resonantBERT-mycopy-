  The meeting comes after the Trump administration mistakenly deported a Maryland resident due to an 'administrative error.'

  President Nayib Bukele of El Salvador paid a visit to President Trump at the White House. The meeting comes after the Trump administration mistakenly deported a Maryland resident to El Salvador due to an 'administrative error'. President Bukele said that he could not release Kilmar Abrego Garcia from the country's mega-prison.
