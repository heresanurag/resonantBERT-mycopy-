  Coverage as it happened as people across NI paid tribute to flowers and tributes at focal points as Northern Ireland marks the Queen's death.

  Video caption: Former First Minister Peter Robinson speaks to EvEx about his memories of the Monarch Former First Minister Peter Robinson speaks to EvEx about his memories of the Monarch

  Quote Message: The Queen strongly wanted to make a contribution towards reconciliation and demonstrated that both in Northern Ireland and with her visit to the Republic of Ireland. The response from the ordinary person on the street [in the Republic], indicated the welcome there was in the south for a new beginning and for relations north south and east west." from Peter Robinson Former NI first minister The Queen strongly wanted to make a contribution towards reconciliation and demonstrated that both in Northern Ireland and with her visit to the Republic of Ireland. The response from the ordinary person on the street [in the Republic], indicated the welcome there was in the south for a new beginning and for relations north south and east west."

  The Queen was "prepared to go the second mile, she was an encourager all the way" for the peace process in Northern Ireland, former first minister Peter Robinson told Radio Ulster.

  In his role, he met the Queen on a number of occasions and also got to know her in private audiences.

  "She was a wonderful person, she was driven by faith and duty," he said.

  "Those who met her personally found that infectious spirit she had."

  When the cameras were not around, Mr Robinson said that he found she had been "well briefed" and had a ""really acute inquiring mind".

  "She went for the kind of areas you weren't expecting. She'd ask: What is it like to work with him?" he said.

  This was not just about Sinn Féin's Martin McGuinness, the late deputy first minister, but other politicians well known in Northern Ireland, he said.

  Speaking about the historic handshake between Her Majesty and Mr McGuinness, he said: "It wasn't an easy occasion for either of the two individuals.

  "There was a lot of history on both sides. It was an important part of our overall process.
