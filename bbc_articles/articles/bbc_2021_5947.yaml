  New rules permit quarantine-free travel to just 12 countries, including Gibraltar, from 17 May.

  Fears about the Covid pandemic could be stopping you from sleeping - or giving you crazy dreams, psychologists say.

  The pandemic and lockdowns have made it harder to maintain routines and to fall asleep, with many people reporting feeling more anxious than usual, according to a survey by the Sleep Charity.

  Vicki Dawson, the charity's chief executive, says working from home and socialising on screens has had a huge impact on our sleep, as well as worries about health and finances.

  Emeritus professor of clinical neuropsychology, and trustee of The Brain Charity, Gus Baker, says the pandemic has disrupted our "sleep architecture".

  "When we're not in a pandemic, we would normally be going out to work, we'd be exercising, we'd be eating meals regularly, we'd be looking after ourselves and we'd be engaging in social activities.

  "What the pandemic has done is to interfere with that [and] that impacts upon our sleep."

  So how do we get more sleep, and why does it make a difference? Read on.
