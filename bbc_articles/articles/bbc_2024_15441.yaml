  What tests are in place to ensure that a driver is passed fit to drive? Specifically, are there certain eye tests to be taken and passed? – Tim There are no specific tests required for a driver to be given a licence to drive in F1, which is called a super licence, other than to meet the qualifying criteria in terms of career results. However, before applying for a superlicence, drivers have to have an international licence granted by their national sporting authority (ASN) and that requires them to pass a medical. If an F1 driver is involved in a heavy crash, then there is an alert system in place that means they must report to the medical centre for tests and evaluation. The tests are outlines in the FIA’s sporting code, appendix L, chapter 2., external
