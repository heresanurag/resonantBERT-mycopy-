title: Cuts to US national parks and forests spark outrage - BBC News
date: '2025-03-01'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/czx7kez4vx2o
content: |-
  Employees who maintained America's most wild places say they are concerned for public safety and for wildlife.

  Cuts to national parks and forests met with backlash

  The Trump administration's steep cuts to staff at national parks, forests and wildlife habitats have triggered a growing backlash, as public access and conservation efforts in these remote wild landscapes fade away. The impacts have already been felt by visitors - who are seeing longer park entrance lines, reduced hours at visitor centres, trails closed and dirty public facilities - and workers who not only are worried about their futures as their jobs vanish, but also the state of these outdoor marvels eroding. Each season, Kate White and her team typically carry 600lbs (270kg) of litter on their backs out of the Enchantments, a sensitive alpine wilderness located in Washington state that welcomes over 100,000 visitors a year. Remote and often covered in snow and ice, staff are needed to maintain backcountry toilets that must be serviced with helicopters, which Ms White says may overflow without proper maintenance. "I'm not totally sure what the plan is to get that done," she says. "That's probably gonna be very damaging to the ecosystem in that area, and maybe to the visitor experience." But one of the most important parts of her job was to keep people safe - and be there if the worst happened. As a National Forest wilderness ranger for over nine years, she has seen her share of tragedy when hikers or campers are confronted with severe weather and remote and tricky terrain. She has comforted people who have faced life-threatening injuries and even recovered bodies of hikers who died while out in the steep and often icy mountain region. "We were kind of usually first on scene if something were to happen," she says. On any typical Saturday in the summer months, she'd speak to an average of 1,000 visitors. She and her team published reports on trail conditions and helped hikers who appeared unprepared - wearing sandals or not carrying enough water - and guided them to easier and safer routes. Now, those jobs are gone. She worries what the cuts will mean for the future of public safety and how people experience US parks and forests, especially ahead of the busy spring and summer months when millions travel to visit.

  Multiple people have died hiking Aasgard Pass (seen on the left) in the Washington peaks known as The Enchantments

  Mass terminations, first announced on 14 February, have led to 5% of the National Park Service staff – around 1,000 workers - being forced out. The cuts have hit the US Forest Service, which maintains thousands of miles of popular hiking trails, even harder. Around 10% of the Forest Service's staff - about 3,400 people, including Ms White and her team - have been fired. The cuts have upended the management of national parks, which get around 325 million visitors annually, as well as national forests, which see about 159 million visitors each year. Long queues of cars were stuck outside Grand Canyon National Park over President's Day weekend, one day after the mass firing, due to a lack of toll operators to check people in at the gate. Similar lines of cars have been growing at other parks as well. A popular trail outside Seattle was closed indefinitely only hours after the cuts were announced, with a sign at the trailhead explaining that the closure is "due to the large scale termination of Forest Service employees" and "will reopen when we return to appropriate staffing levels".

  At Yosemite National Park, the annual "firefall" spectacle led to a different kind of display this year when a group, which reportedly included employees, hung an upside-down American flag at the park in protest of the Trump administration's recent deep cuts to staff. Andria Townsend, a carnivore biologist who supervised a team of eight people at Yosemite National Park before she was fired in an email, told the BBC she "100%" supports the protest. "It's bringing lots of good attention to the issue," she says. She says she is especially worried for the future of the endangered species that she had been working to protect. Ms Townsend studied and attached GPS collars to the Sierra Nevada red fox and the Pacific fisher, which is related to a badger, in attempts to track and preserve the species. "They both are in dire straits," she says, with only about 50 fishers and 500 red fox left in the wild. Staff at a sister site conducting similar research were also cut. "I don't want to be doom and gloom, but it's really hard to say what the future is now," she says. "The future of conservation just feels very uncertain."

  Former Yosemite employee Andria Townsend worries that cuts will affect the survival of the Sierra Nevada red fox, which is critically endangered

  Long-time couple Claire Thompson, 35, and Xander Demetrios, 36, have worked for the Forest Service for about a decade, most recently maintaining trails in central Washington state so that hikers could explore the snow-capped Cascade mountains. The email firing them and thousands of other staff cited "performance" issues – something they took issue with. "Especially with the amount we've gone above and beyond," says Mr Demetrios, explaining that his work in the backcountry had carried significant risk to his safety, and sometimes involved rescuing people from dangerous situations, including one person who had fallen in a river and become hypothermic. He and Ms Thompson have carried heavy equipment through rugged terrain, through foul weather at times, to clear trails and repair bridges and outhouses – and never being paid more than $22 (£17.40) an hour. "It's been hurtful - insulting - to just feel like your work is so devalued, and by people who I'm quite certain have like zero concept of what we do at all," Ms Thompson added.

  Claire Thompson and Xander Demetrios have spent years working for the Forest Service, but are now both out of a job

  Following a backlash, dozens of national park staff were reportedly rehired since the mass terminations on Valentine's Day. Interior Secretary Doug Burgum, whose department oversees the National Park Service (NPS), has also committed to hiring over 5,000 seasonal workers during the coming warm months. "On a personal level, of course, I've got great empathy for anybody that loses a job," Burgum told Fox News last Friday, external. "But I think we have to realise that every American is better off if we actually stop having a $2 trillion a year deficit." The Department of Government Efficiency (Doge) being spearheaded by Elon Musk claims to have saved over $65bn from the widespread cuts which have hit dozens of federal agencies across government. However, it has produced no evidence to back that figure, which would represent around 0.9% of the entire 2024 federal budget, external.

