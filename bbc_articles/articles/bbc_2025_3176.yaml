  Outdoor advocates say that travellers currently planning their outdoor vacations to national parks should expect numerous issues, including increased litter, a shortage of lodging and the unavailability of many services they have come to expect. "If the administration doesn't reverse these policies, visitors are going to need to lower their expectations," says John Garder of the National Parks Conservation Association (NPCA) in Washington DC. Some of these cuts are already being felt: Yosemite has fired their only locksmith, Gettysburg fired the staff who handle cabin reservations for visitors, and hurricane damage to the Appalachian Trail won't get repaired in time for through-hikers trying to complete the 2,200-mile (3,540km) trail. Meanwhile, private businesses that operate in and around parks stand to lose out on billions of dollars if visitors drop off, according to the NPCA. Concerns are also growing about the absence of park and forest service personnel who assist in wildfire fighting during the dry season. Wildland firefighters, like Dan Hilden, have so far been exempted from forest service cuts. He says the roles of the people who were terminated are "completely crucial" to fire safety. Many directly fight fires, while others are responsible for "sweeping" backcountry trails - telling people to leave and ensuring that no one is in danger from expanding fires. "I don't know how we'll be doing that this summer, because we're heavily dependent on them," says Hilden, explaining that it takes several days to travel into the wilderness for these sweeps. "Every year things have been getting worse as the staffing issues go. This year is going to be a lot worse."
