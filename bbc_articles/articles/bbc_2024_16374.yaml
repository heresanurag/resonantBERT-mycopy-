  Three Gladiators from the hit BBC One show take on three Olympians in a series of school sports day events.

  Gladiators Diamond, Apollo and Bionic take on Olympians Delicious Orie, Chelsie Giles and Joe Clarke in a series of school sports day events. Will sheer strength and power win the day or will speed and technique triumph?

  Follow the Paris 2024 Olympics across the BBC from Friday, 26 July.
