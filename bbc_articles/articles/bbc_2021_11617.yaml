title: 'Covid: UK records another 37,960 coronavirus cases - BBC News'
date: '2021-09-27'
section: World
url: http://www.bbc.co.uk/news/live/world-58703376
content: |-
  Another 40 people have died in the UK within 28 days of a positive Covid test.

  The fuel supply problems in parts of the UK have an impact on the NHS like the rest of society.

  Ambulance services have their own fuel pumps at their depots so there is no immediate risk that a crew in need of fuel should not be able to fill up their tanks today.

  Those in-house pumps will need restocking at some point and clearly ambulance services will be prioritised for supplies.

  There is – as one service put it – no realistic scenario where ambulances run out of fuel.

  But the bigger concern is for staff who are travelling around in their own vehicles, either to get to work or to see patients in the community.

  Nearly all are reliant on using public petrol stations. Already the UK Homecare Association has raised concern that the service provided by carers in people’s homes has been disrupted with staff running out of petrol and caught in queues, ending up late for calls.

  The association, along with others like the British Medical Association, are calling for health and care staff to be prioritised for fuel.

  During previous fuel shortages councils have arranged systems to ensure essential workers are able to fill up their cars.

  The message coming from a number of health and care bodies is that this must be brought in and quickly.
