content: |-
  Details and reaction to a briefing on the pandemic by First Minister Mark Drakeford.

  Wales' first minister says he hopes to make a decision on whether parts of the tourism sector can reopen next weekend “by the end of next week”.

  At last Friday’s review of lockdown rules Mark Drakeford said he hoped to lift the stay-local rule and allow people to stay in self-contained accommodation from 27 March.

  Speaking at today’s press conference Mr Drakeford said: “Provided things continue as they are - stable and improving - then I’m hopeful that I'll be able to confirm that by the end of next week.”

  The first minister warned that “there are some parts of Wales where the position is not as good as we would like it to be".

  He added: “Paris has gone back into a lockdown again, so we've known all along how fast circumstances can change in coronavirus.

  "That's why it's important to wait until the last moment you can in order to make these decisions, because that way you have the best and latest data.”

