title: 'Nigeria election results 2023: Bola Tinubu takes strong lead over Atiku Abubakar
  and Peter Obi - BBC News'
date: '2023-03-01'
section: Africa
url: http://www.bbc.co.uk/news/world-africa-64805024
content: "Opposition parties condemn the election as a sham as Bola Tinubu wins 36%\
  \ of the vote.\n\nBola Tinubu based his campaign on his record of rebuilding Lagos\n\
  \nBola Tinubu from Nigeria's ruling party has taken a strong lead as results are\
  \ declared from Saturday's presidential election, amid opposition protests.\n\n\
  Mr Tinubu, 70, a wealthy businessman and former governor of Lagos state, has won\
  \ 36% of the vote.\n\nFormer Vice-President Atiku Abubakar has 29%, while third-party\
  \ candidate Peter Obi has 25%.\n\nThe parties of both Mr Abubakar and Mr Obi have\
  \ called for the election to be cancelled and rerun.\n\nThey alleged that the inability\
  \ of the electoral commission to upload results to its website showed that the results\
  \ had been manipulated.\n\nMany voters reported problems with uploading results\
  \ through the new electronic voting system, which was intended to speed up the process.\n\
  \nThere were also widespread delays, with many polling stations opening several\
  \ hours late, and some attacked by armed men. Voting was held overnight, and on\
  \ Sunday in some areas.\n\nThe electoral commission says the opposition parties\
  \ should take their complaints to court and is pressing ahead with the release of\
  \ results.\n\nA candidate needs to have the most votes nationwide and at least a\
  \ quarter of ballots cast in 25 of the 36 states, plus Abuja, to be declared the\
  \ winner.\n\nIf those thresholds are not reached then there will be a run-off round\
  \ between the top two candidates.\n\nPresident Muhammadu Buhari is stepping down\
  \ after serving two terms, marked by economic stagnation and growing insecurity\
  \ around the country - from an Islamist insurgency in the north-east, a nationwide\
  \ crisis of kidnapping for ransom and separatist attacks in the south-east.\n\n\
  The election had been seen as a referendum on his time in office but Mr Tinubu seems\
  \ to have managed to mobilise his supporters to vote.\n\nEarlier on Tuesday, a group\
  \ of angry protesters denounced the electoral commission, known as Inec, outside\
  \ the national collation centre in the capital, Abuja.\n\n\"Everything happening\
  \ there is all lies, all lies, lies... they are cooking up results,\" one man told\
  \ the BBC.\n\nAnother group held a counter-protest, urging the electoral commission\
  \ to \"complete your job\" and calling on \"Nigerians to stand up for democracy\"\
  .\n\nThis video can not be played To play this video you need to enable JavaScript\
  \ in your browser. Bina was hit with a sharp object while she was waiting to vote\
  \ in Lagos\n\nEuropean Union observers said the electoral body's poor planning and\
  \ communication had undermined trust in the process.\n\nThe ruling All Progressives\
  \ Congress (APC) and Mr Atiku's Peoples Democratic Party (PDP) have dominated Nigeria\
  \ since the end of military rule in 1999.\n\nMr Obi ran for president for the first\
  \ time, promising to challenge the two-party system.\n\nHe has the support of many\
  \ young people, who make up a third of registered voters. There are 15 other candidates.\n\
  \nNigerians cast their votes in Saturday’s general election. They had 18 candidates\
  \ to choose from for president and people also voted for senators and members of\
  \ the house of representatives. The BBC is using data provided by Nigeria’s Independent\
  \ National Electoral Commission (Inec) to tally the results. To win in the first\
  \ round, a candidate must have the largest number of votes nationwide and at least\
  \ 25% of the votes in two-thirds of the 36 states and Federal Capital Territory\
  \ (Abuja) To win in the first round, a candidate must have the largest number of\
  \ votes nationwide and at least 25% of the votes in two-thirds of the 36 states\
  \ and Federal Capital Territory (Abuja) \n\n \n\n \n\n Click on map to see results\
  \ in detail"
