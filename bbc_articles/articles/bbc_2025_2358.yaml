title: Which strikers could Arsenal buy in the summer to lead them to the title? -
  BBC Sport
date: '2025-02-27'
section: Premier League
url: http://www.bbc.co.uk/sport/football/articles/ceqjldng12jo
content: |-
  Arsenal, Manchester United and Chelsea are among the sides looking for a new striker in the summer. BBC Sport takes a look at who could head to the Premier League.

  'We lacked spark' - strikers who could be 'final piece of Arsenal jigsaw'

  This video can not be played To play this video you need to enable JavaScript in your browser. Match of the Day: Why 'vulnerable' Arsenal are failing to score

  Arsenal's Premier League title challenge looks all but over this season, even if manager Mikel Arteta will not publicly admit it. The second-placed Gunners are 13 points adrift of leaders Liverpool after a goalless draw at Nottingham Forest again saw the conversation centred around their lack of striking options. In their past two Premier League matches, Arsenal have had 33 shots, but just three on target and no goals. It is the first time since May 2023 they have failed to score in back-to-back league games, with midfielder Mikel Merino forced to play up front due to having no available strikers. Arteta said: "We dominated the game. We tried in many different ways. We insisted but lacked that spark, that final pass to unlock a well-organised team. We have to generate more shots on target." While Arsenal undoubtedly have not been helped by injuries to forwards Gabriel Jesus, Bukayo Saka, Gabriel Martinelli and Kai Havertz, there seems little doubt they will be stepping up their search for a goalscorer in the summer. Former Gunners goalkeeper David Seaman, speaking on BBC Radio 5 Live admitted: "We have always needed a striker. We tried in the transfer window and now hopefully there is one lined up in the summer, but that will be a bit too late. "It will be the final piece of the jigsaw. That will hopefully be what makes it (winning the title) happen next season." But with Premier League rivals Manchester United, Chelsea, Tottenham and Aston Villa also likely to be in the market for a striker this summer, finding that missing piece is not going to be easy for Arsenal. Here are some options of forwards likely to dominate the transfer market this summer...

  Jonathan David's goals in the Champions League include strikes against Real Madrid, Atletico Madrid (two), Juventus and Liverpool

  Lille striker Jonathan David is currently the third-top scorer in France's Ligue 1 with 12 goals from 21 matches as well as eight goals in the Champions League qualifying rounds and league phase. The 25-year-old Canada international is expected to be one of the most in-demand players in the summer with his current deal expiring at the end of this season.

  Liam Delap came through the ranks at Manchester City but left having never started a Premier League game for them

  England Under-21 striker Liam Delap has been a big hit for Ipswich Town since his move for an initial fee of £15m from Manchester City in the summer, scoring 10 goals in the Premier League, despite his club struggling at the wrong end of the table. If they are relegated, Ipswich will not be short of offers in the summer to sign their main forward.

  As well as being in fine scoring form for Sporting, Viktor Gyokeres has been prolific for Sweden, scoring four times in a 6-0 win over Azerbaijan in November

  One of two Swedish strikers on this list, former Coventry City striker Viktor Gyokeres has been in fine form for Portuguese side Sporting this season. The 26-year-old has been linked with a move to Manchester United, which would see him reunited with former Sporting boss Ruben Amorim, but his goalscoring record is attracting clubs from across Europe. His contract reportedly has a release clause of 100m euros (£83.1m).

  Only Liverpool's Mohamed Salah has scored more Premier League goals than Alexander Isak this season

  Sweden international Alexander Isak has been one of the stars of the Premier League season and played a vital role in getting Newcastle to the final of the Carabao Cup. Newcastle are adamant they do not want to sell the 25-year-old, who has become the seventh-fastest player to reach 50 Premier League goals. But will he be looking to leave if his side miss out on European football, as they did for this campaign?

  Jean-Philippe Mateta helped France win a silver medal at the 2024 Olympics, with the side managed by Arsenal legend Thierry Henry

  Crystal Palace's Jean-Philippe Mateta is enjoying a fine season and is a man in form with eight goals in nine games in 2025. Earlier this month on Match of the Day, former Arsenal winger Theo Walcott said he hoped the 27-year-old would move to the Gunners and said: "Mateta is playing with so much confidence. He's always a threat and constantly on the move. "He likes to start the press and the connection he has with the players behind him is so key."

  Victor Osimhen scored 26 goals in 32 games to help Napoli win the Serie A title two seasons ago

  In 2022-23, Nigeria striker Victor Osimhen helped Napoli win their first Italian title since 1990. He looked set to leave the club last summer on a permanent transfer but went on loan to Turkish side Galatasaray, where the 26-year-old has been in prolific form. Among his goals this season was a double in his side's 3-2 Europa League win over Tottenham in November.

  Mateo Retegui scored four times for Atalanta in their 5-0 win at Verona earlier this month

  Italy international striker Mateo Retegui is the top scorer in Serie A with 21 goals for Atalanta in 2024-25. The 25-year-old has played in the Champions League for his side this season and has been linked with a Premier League move this summer, with Arsenal and Manchester United among those reportedly interested.

  Benjamin Sesko has been linked with a number of English clubs over the past two seasons

  Slovenia striker Benjamin Sesko has long been linked with a move to the Premier League as he continues to rapidly build his reputation at RB Leipzig. The 21-year-old is 6ft 5in and will not come cheap as he signed a new long-term deal with the German side in the summer.

  Serbia striker Dusan Vlahovic, whose contract runs until June 2026, is another big target man who has been linked with a move to the Premier League for a long time. The 25-year-old is 6ft 3in and enjoying another fine season in Italy with Juventus, who had signed him in January 2022, when Arsenal missed out on the forward. Vlahovic also scored when Juventus beat Manchester City 2-0 in their Champions League tie in December.

  Ollie Watkins has played 18 times for England, scoring five goals, including the last-minute winner in the Three Lions' 2-1 victory over Netherlands in the semi-finals of Euro 2024

  Arsenal made a late bid for England striker Ollie Watkins in the final few days of the winter transfer window with Aston Villa refusing the reported £40m offer. Villa are in the last 16 of the Champions League, but only 10th in the Premier League table and if Unai Emery's side fail to qualify for Europe then the Gunners may consider another move for the 29-year-old.
