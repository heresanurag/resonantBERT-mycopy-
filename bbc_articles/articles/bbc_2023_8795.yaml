id: bbc_2023_8795
title: Drone footage shows extent of India train crash destruction - BBC News
date: '2023-06-04'
section: General
url: http://www.bbc.co.uk/news/world-asia-india-65796254
content: |-
  More than 260 people are known to have died in the train collision in the Indian state of Odisha.

  Footage filmed in the daylight has revealed the extent of damage in the wake of a train collision in the Indian state of Odisha.

  At least 260 people have been killed and 650 are injured, with officials saying the death toll is expected to rise.

  One passenger train derailed on to the adjacent track and was struck by an incoming train on Friday, also hitting a nearby stationary freight train.
