title: Chelmsford teenager charged with murder of Kieran Shepherd - BBC News
date: '2024-10-19'
section: Essex
url: http://www.bbc.co.uk/news/articles/cy4d3jknk7xo
content: |-
  A murder investigation is under way after the death of 30-year-old Kieran Shepherd following an assault.

  Kieran Shepherd, 30, died following an incident in Great Baddow

  A teenager has been charged with murder in connection with the death of a 30-year-old man in a residential street, police have said. Kieran Shepherd died at the scene of a serious assault in Meadgate Avenue in Great Baddow near Chelmsford, Essex on Tuesday at about 12:30 BST. In a statement, Essex Police said Harrison Carpenter, 19, of Ben Wilson Link, Springfield, Chelmsford, had appeared on Saturday at Chelmsford Magistrates’ Court accused of murder. The force said Mr Carpenter had been remanded in custody. He is due to appear at Chelmsford Crown Court on Monday.

  A murder investigation began on Tuesday after an assault in Great Baddow

  Two men, aged 19 and 20, who were arrested on suspicion of murder on Friday remain in police custody. Mr Shepherd's family have described him as a "kind and loving son, brother and father". "Our lives will never be the same without him; he will be forever in our hearts," a statement read. "His loss has left a massive hole in the lives of his family and friends."

