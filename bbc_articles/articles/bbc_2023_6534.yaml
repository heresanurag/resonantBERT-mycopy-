content: |-
  The BBC reports from an Afghan hospital where dozens of children are critically ill with preventable diseases.

  The BBC's South Asia correspondent Yogita Limaye reports from an Afghan hospital where dozens of children are critically ill with preventable diseases.

  It comes as Unicef estimates 167 children under five die each day from these types of illnesses.
