title: Government could miss cladding removal target date - watchdog - BBC News
date: '2024-11-04'
section: London
url: http://www.bbc.co.uk/news/articles/c0qd1pxqe08o
content: |-
  It says up to 60% of buildings with dangerous cladding have still not been identified.

  Watchdog says cladding removal deadline may be missed

  The National Audit Office (NAO) said up to 60% of buildings with dangerous cladding still haven't been identified by the government

  The government could miss its own cladding removal completion date if progress is not made to speed up the process, the UK's spending watchdog has said. In a new report, external, the National Audit Office (NAO) said up to 60% of buildings with dangerous cladding had still not been identified by the government, and at its current rate of progress it was due to miss its own estimated completion date of 2035 for the works. The NAO also warned that more than £500,000 may have been lost to fraud in a payment to one applicant, which led to a review of counter-fraud structures. Building Safety Minister Alex Norris said the pace of works had been "unacceptably slow" and the government would set out its Remediation Acceleration Plan soon.

  The report follows the conclusion of the Grenfell Inquiry in September, which found risks had been ignored and there was “systematic dishonesty” from those who made and sold the cladding involved in the fire in west London in 2017, in which 72 people died. The report assessed how fast the Ministry of Housing, Communities and Local Government (MHCLG) was completing work to replace dangerous cladding from tower blocks in England, and aimed to provide an update to a previous NAO report in 2020.

  Cladding on Grenfell Tower was made of highly flammable polyethylene, which was added to the sides of the 1970s building in 2016

  It found there had been "a substantial increase in remediation activity" since then, with 4,771 buildings taller than 11 metres being brought under the government's remedial works scheme as of August. However, an estimated 7,200 more buildings in England with such cladding still had not been identified and some "may never", the NAO continued. Progress with replacing the cladding was also slow, it found. Although the MHCLG spent £2.3bn carrying out work on identified buildings, the report said work had only been completed on roughly a third of them and was yet to start on half. The government's suggested end date for completing cladding works on these buildings was 2035 but it was not on course to meet this deadline and "there are significant challenges to overcome", the report stated.

  The NAO also warned that the government had chosen approaches to funding that prioritised speed but "increased the risks of poor value for money and fraud". It said that the department had identified potential losses of more than £500,000 through fraud in 2023-24. This led to a review of counter-fraud structures and developed plans to improve fraud management in 2024, the report said.

  Gemma Lindfield, who lives in a block of flats in east London with dangerous cladding, said she wasn't surprised but hoped the report would spur the government into action. She said multiple issues were found in her building including with fire doors and a panel block system, but still have not been fixed - including the cladding. "I had to pay for the waking watch and our building insurance since 2020 has more than doubled," Ms Lindfield explained. "It's all very well doing the cladding but until they fix the wider issues, we will remain in a building that isn't safe."

  Gemma Lindfield said: "I had to pay for the waking watch and our building insurance since 2020 has more than doubled"

  She added her developer is being "very rigid in terms of what they will remediate". "Because it's not possible to sell the property, the price of it has effectively fallen by about 25%," she said, and that until a resolution is found "people cannot move on".

  The NAO recommended that if progress with identifying buildings with dangerous cladding did not improve by the end of 2024, the government should consider other measures. These include mandatory registration for medium-rise buildings - and as with high-rise buildings under the Building Safety Act 2022, external, tougher enforcement activity and action to help with disputes between residents and building owners. "Many people still do not know when their buildings will be made safe, contributing to residents suffering significant financial and emotional distress," the report said. Building Safety Minister Alex Norris said: "The pace of remediation to make homes safe has been unacceptably slow. "This government is taking action - meeting our commitment to invest £5.1bn to remove dangerous cladding and making sure those responsible pay for the rest. "Since coming into office, we have ramped up work with local authorities and regulators to speed up remediation and we will set out a Remediation Acceleration Plan soon."

  The watchdog also highlighted there were issues with keeping taxpayers' contributions to the works capped at £5.1bn. The MHCLG's estimate for costs for all the works amounted to £16.6bn and the NAO said although the government planned to recoup about £3.4bn from a new Building Safety Levy, this was not expected to be introduced until autumn 2025 at the earliest. In London, more than £1bn has been paid out to take dangerous cladding off tower blocks in the past six years. The Greater London Authority, which manages the schemes on behalf of government, said 58% were now either fully remediated, or work was under way.

  Some buildings which had cladding removed, like this one in London, are still waiting for it to be replaced years later

  The report findings come after Chancellor Rachel Reeves announced in the Budget that the government would invest more than £1bn for repairs to buildings with dangerous cladding in 2025-26, which includes new investment to speed up remediation of social housing. Gareth Davies, head of the NAO, said: "There is a long way to go before all affected buildings are made safe, and risks MHCLG must address if its approach is to succeed. "To stick to its £5.1bn cap in the long run, MHCLG needs to ensure that it can recoup funds through successful implementation of the proposed Building Safety Levy." Sir Geoffrey Clifton-Brown, chair of the Commons' Public Accounts Committee, who previously met survivors of the Grenfell fire, said "the programme is falling behind schedule and MHCLG needs to pick up the pace to get it back on track," adding "the government must take steps to better protect the taxpayer". "It urgently needs to ensure its fraud controls are working and that developers contribute their fair share to the costs."
