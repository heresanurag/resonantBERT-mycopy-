title: 'Joanne Jones: Body found confirmed as missing Pontypridd woman - BBC News'
date: '2024-10-27'
section: Wales
url: http://www.bbc.co.uk/news/articles/c14ll7jxm6po
content: |-
  The body found during the search for missing Joanne Jones is formally identified as her.

  Police believe Joanne Jones headed on to Graigwen Road, Pontypridd, in the direction of Llanwonno Forest before she went missing

  A body found during a search for a missing woman has been confirmed as that of Joanne Jones, who disappeared six days ago. Mrs Jones, 49, was last seen in Vale Gardens, Pontypridd, Rhondda Cynon Taf, prompting a search by police and the wider community. South Wales Police said on Saturday night that a body had been discovered, and on Sunday officers confirmed she had been formally identified. The force said her family had expressed their gratitude to everyone involved in the search to find her and they now asked for privacy "so they can begin to come to terms with their loss".
  • None Arrest over woman, 37, who disappeared in July

  CCTV footage shared by police showed Joanne Jones was last seen wearing a dark green coat, black rucksack, leggings, and walking boots

  Det Chief Insp Emma Hampton said: "I want to express my sympathies to Joanne's family at what is a very sad time for them. "I also want to thank our emergency services colleagues and members of the public who assisted in our search effort over the last week. "I can also confirm that we are not treating Joanne's death as suspicious." Police called in mountain rescue volunteers, specialist search dogs and drones as part of the search for Mrs Jones, who was last seen at 09:45 BST on Monday 21 October. Missing person flyers were also circulated to local dog walkers and hikers. Before the identification was confirmed, Pontypridd MP Alex Davies-Jones called the discovery "devastating" and said her heart went out to her "loved ones and the whole community". Ms Davies-Jones - who is a junior minister in the Ministry of Justice - also wrote on X, formerly known as Twitter: "If anyone needs support at this difficult time don’t hesitate to reach out."

