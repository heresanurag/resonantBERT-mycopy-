  Members of the community had joined the search for Mrs Jones, with some scouring nearby Llanwonno Forest as police said they believed she had headed in its direction after being seen on Graigwen Road. Before the search, Chief Insp Matt Rowlands had urged those volunteering to take part to take care of the "terrain and conditions" so as not to put themselves in danger. "I understand how distressing this is for Joanne’s family and friends, and we are grateful for the ongoing support offered by the local community over the past few days," he said at the time.
