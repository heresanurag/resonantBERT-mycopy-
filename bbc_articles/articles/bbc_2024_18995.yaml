id: bbc_2024_18995
title: 'Prison overcrowding: Influx of rioters may trigger emergency plan - BBC News'
date: '2024-08-18'
section: UK
url: http://www.bbc.co.uk/news/articles/c5y8q0wkx1go
content: |-
  The Prison Officers' Association warns plans to keep defendants in police cells could affect arrests.

  An emergency plan to avoid prison overcrowding could be triggered in coming days as more rioters are sentenced, the Prison Officers' Association has said. Operation Early Dawn, a contingency that allows defendants waiting for a court appearance to be kept in police cells until prison space is available, could be used. The government announced quick sentencing for those involved in the riots that followed the fatal stabbing of three girls in Southport, leading to hundreds appearing in courts across the UK. But the POA's national chairman told BBC Radio 4's Broadcasting House programme this risked "clogging up prison cells".

  Speaking on Sunday, Mark Fairhurst said he would not be "surprised" if the Ministry of Justice at some point on Monday morning announced that "Operation Early Dawn kicks into play at some point next week". A Ministry of Justice spokesperson told the BBC it would "update on operational decisions in the normal way", adding that the government would "always make sure we have the prison places we need". But keeping defendants waiting for a court appearance in police cells unless it is confirmed there is a prison bed available for them could delay court dates. Mr Fairhurst warned that this had a "massive knock-on effect on the entire justice system" as police cells got clogged up, meaning officers had not "got the power to arrest people and put them away". He said last week had seen 397 new receptions, the "biggest influx" he had seen for some time, and that on Friday, the adult male closed estate only had 340 spaces left. Pressure on the prison system is "really, really tight", he warned, adding offenders could be sent hundreds of miles from home to serve a sentence in a prison with spaces. Justice Secretary Shabana Mahmood announced plans to cut the proportion of the sentence inmates must serve behind bars from 50% to 40%. The temporary move - which does not apply to those convicted of sex offences, terrorism, domestic abuse or some violent offences - is expected to result in 5,500 offenders being released in September and October. Last week, the government confirmed those involved in recent unrest would not be excluded from its plans to release some inmates from jail early. On Sunday, Cleveland Police said two women aged 24 and 52, had been charged with violent disorder, and Merseyside Police said a 47-year-old man had been charged with the same offence. MPs have already approved the laws allowing the plan to be put into action and any changes could require updating the legislation in a short space of time if additional exemptions are to be included. Operation Early Dawn was previously triggered by the Conservative government in May in a bid to tackle overcrowding in jails.
