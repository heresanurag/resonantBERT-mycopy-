content: |-
  Everton forward Rikke Madsen has a comeback to remember as her boyfriend proposes after her first appearance in more than a year.

  Everton forward Rikke Madsen had a comeback to remember as her boyfriend proposed after her first appearance in more than a year.

  The Denmark international made her return to action in Saturday's 3-0 Women's Super League victory over Crystal Palace.

  Madsen was named in Brian Sorensen's matchday squad for the first time since giving birth to her daughter Fritsen in October.

  The 27-year-old came on as a second-half substitute and, when the team were celebrating their win on the pitch afterwards and she held her baby, her partner Martin Thomsen got down on one knee to propose.

  "I've been waiting for this moment for so long now, a year," Madsen told the BBC. "Ever since becoming pregnant I've been aiming to get back as quick as possible.

  "Today my little baby is turning five months so it is so nice to be back. Ending off with my boyfriend asking me to marry him, that was a little twist - I did not expect that."

  Martin initially came onto the pitch carrying Frida to give Madsen a bouquet of flowers, before the two posed for photos.

  He then made the proposal and Madsen accepted before the happy couple celebrated with her team-mates.

  Her last appearance for Everton was on 10 March 2024, but she was not sure of a return date.

  "A very happy day," she added. "I had no idea I was going to come on and I had especially no idea he was going to propose to me. The first thing I said to the other girls was that I hate surprises, but this one was alright."
