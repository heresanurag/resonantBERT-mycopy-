title: 'Watch: Beachgoers narrowly escape West Bay cliff collapse - BBC News'
date: '2023-08-10'
section: General
url: http://www.bbc.co.uk/news/uk-england-dorset-66467059
content: |-
  A group of people have a "lucky escape" when a rockfall starts close to them in Dorset's West Bay.

  Beachgoers had a "lucky escape" after a cliff collapsed in Dorset's West Bay.

  Daniel Knagg captured the moment the rockfall started on Tuesday along the South West Coast Path - with a number of people narrowly avoiding the collapse.

  Dorset Council has released a warning that "rockfalls and landslips" can happen at any time.

  The authority confirmed the South West Coast Path is currently closed due to the incident.

