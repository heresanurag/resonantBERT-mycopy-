  Rate the players in Ukraine v Belgium at Euro 2024

  Ukraine are out of Euro 2024 after a 0-0 draw with Belgium in their final Group E game - a result which meant Kevin de Bruyne's team reached the last 16. You can rate the players out of 10 below and come back 30 minutes after full-time to see the final ratings.

