title: 'Logan Mwangi: Mother and 14-year-old charged with murder - BBC News'
date: '2021-10-22'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-58994108
content: |-
  Logan Mwangi was discovered in the River Ogmore, Bridgend county, on 31 July.

  Logan was found dead in the River Ogmore on 31 July

  The mother of a five-year-old boy who was found dead in a river has been charged with his murder.

  Angharad Williamson, 30, from Sarn, becomes the third person to be charged with the murder of Logan Mwangi.

  A 14-year-old boy, who cannot be identified because of his age, has also appeared in court charged with murder.

  Logan Mwangi, also known as Logan Williamson, was discovered in the River Ogmore in Bridgend county on 31 July.

  Logan's stepfather John Cole, 39, from Sarn, has already been charged with the murder.

  Angharad Williamson and John Cole have both been charged over the death of Logan

  Both John Cole and Logan's mother Angharad Williamson have also been charged with perverting the course of justice.

  The 14-year-old has been remanded into care of the local authority.

  Teddies and balloons were left next to the River Ogmore in memory of Logan

  Following Logan's death, residents left floral tributes, teddies and cards near the part of the river where he was found.

  Logan's classmates have described him as a happy boy who liked Spiderman and playing hide and seek.

  His friends were "heartbroken" by his death.
