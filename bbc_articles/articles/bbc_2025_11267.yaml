content: |-
  Jobe Bellingham joins Borussia Dortmund from Sunderland on a five-year contract.

  Jobe Bellingham made 43 appearances for Sunderland last season, scoring four goals across all competitions

  Jobe Bellingham has joined Borussia Dortmund from Sunderland on a five-year contract until June 2030. Sunderland say the fee is a club record, believed to be 32m euros (£26.96m) plus 5m euros (£4.2m) in add-ons. The 19-year-old midfielder has played for the Black Cats since 2023, making 90 appearances, and helped them secure promotion to the Premier League last season. Bellingham began his career at Birmingham City, coming through the academy before playing two years of senior football for the club. In a statement, Bellingham said he is proud of the "strong" relationship he has with Sunderland supporters. "I will always represent Wearside in all that I strive to achieve for the rest of my career, wherever that may be," he said. Bellingham was named Championship young player of the season for his performances during Sunderland's promotion-winning campaign.
  • None Jobe Bellingham following brother's path but wants 'own identity'

  Later on Tuesday Dortmund named Bellingham in their squad, external for the Club World Cup, which begins on Sunday. Dortmund's opening group game is against Brazilian side Fluminense on 17 June at 17:00 BST. Bellingham had been named in the England squad for the European Under-21 Championship, to be held in Slovakia from 11-28 June. But head coach Lee Carsley had said he would release players so they can compete at the Club World Cup in the United States. Bellingham is following in the footsteps of older brother Jude by moving to the Bundesliga, as the England midfielder - who also came through the Birmingham City youth system - spent three years with Dortmund before joining Real Madrid in 2023. He added in his farewell to Sunderland fans: "I hope that I have made you proud along the way, and in return, you have made me the player that has reached the heights I find myself at today. "I will love and remember you fondly for the rest of my life." Dortmund, who have won eight German league titles, secured Champions League qualification by finishing fourth in the Bundesliga last season.
