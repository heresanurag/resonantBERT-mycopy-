  Sara,10, had more than 70 new external injuries, along with internal injuries and older wounds.

  Sara Sharif had more than 70 injuries, court hears

  Sara Sharif's body was found at her home in Woking on 10 August last year

  Warning: This article features details that some people might find distressing

  A 10-year-old girl who allegedly died at the hands of her father, stepmother and uncle had more than 70 new external injuries when her body was found, a court has heard. Sara Sharif was also found with internal injuries, and wounds inflicted before the assault which led to her death at the family home in Woking, Surrey, last year, the Old Bailey was told. She suffered puncture wounds, burns, bruising and abrasions, and a post-mortem examination found Sara had "probable human bite marks", an iron burn and scalding from hot water. Her father Urfan Sharif, 42, stepmother Beinash Batool, 30, and uncle, Faisal Malik, 29, have denied murder.

  Pathologist Dr Nathaniel Cary, who conducted the post-mortem, told the court Sara had a "gaping" puncture wound to her head, as well as signs of being hit by an elongated object below her belly button. He also confirmed that Sara’s bruising had indicated there had been a blunt impact of some description. Sara’s cause of death was given by the pathologist as “complications arising from multiple injuries and neglect”. Her body also had a number of scars from previous injuries, he added.

  Urfan Sharif, Beinash Batool and Faisal Malik are each facing two charges relating to the death of Sara Sharif

  The court previously heard that Sara was hooded, burned and beaten during more than two years of abuse. She had suffered 11 fractures to her spine, burns to her buttocks, caused by a domestic iron, and signs of a traumatic brain injury, the court was told. Prosecutor Bill Emlyn Jones KC previously said a bloodstained cricket bat, a rolling pin with Sara’s DNA on it, a metal pole, a belt and rope were found near the family’s outhouse.

  The court also previously heard Mr Sharif, Ms Batool and Mr Malik travelled to Islamabad, Pakistan, with Sara's five brothers and sisters on 9 August 2023, the day before her body was found. Prosecutors said Mr Sharif called police from Pakistan and admitted he killed Sara about an hour after his family’s flight had landed in Islamabad. Jurors were told Mr Sharif's case was that Ms Batool was responsible for Sara's death, and he made a false confession on the phone call and also in a note to protect his wife. The three defendants, who lived with Sara before her death, are also charged with causing or allowing the death of a child, which they deny.

