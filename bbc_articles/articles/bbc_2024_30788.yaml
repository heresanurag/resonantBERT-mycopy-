content: |-
  The success of blind Strictly contestant Chris McCausland has prompted new interest in dance.

  Strictly Come Dancing has been on our screens for 20 years but this year is the first it has had a blind contestant.

  And it seems the success of comedian and actor Chris McCausland has had a knock-on effect with one inclusive London dance company seeing an increase in the numbers of those wanting to take lessons.

  Step Chance Studios in Holborn, central London, wants to recruit more volunteers, so that more visually impaired Londoners can discover a world of expression beyond sight.

