  Bayern Munich reject a joint bid from Manchester United for Matthijs de Ligt and Noussair Mazraoui, Newcastle to discuss new deal with Anthony Gordon, plus more.

  Bayern Munich reject Manchester United's joint bid for Matthijs de Ligt and Noussair Mazraoui, Newcastle plan to discuss contract offer with Anthony Gordon, West Ham close in on signing Guido Rodriguez, plus more. Bayern Munich have rejected Manchester United's joint bid for Netherlands centre-half Matthijs de Ligt, 24, and 26-year-old Morocco full-back Noussair Mazraoui. (Telegraph - subscription required), external Newcastle are planning to open talks over a new contract with England winger Anthony Gordon, 23, when he returns from a break following Euro 2024. (Athletic - subscription required), external West Ham are working on a deal to sign Argentina midfielder Guido Rodriguez, 30, as a free agent after his exit from Real Betis. (Standard), external QPR and Celtic are interested in Liverpool's 21-year-old Welsh left-back Owen Beck. (Sky Sports), external Rennes midfielder Desire Doue, 19, prefers a move to Bayern Munich over staying in his native France with Paris St-Germain. (Sky Germany), external

  Nottingham Forest owner Evangelos Marinakis wants to persuade Arsenal sporting director Edu Gaspar to leave Emirates Stadium and move to the City Ground. (Universo Online - in Portuguese), external

  Inter Milan have joined West Ham in the race to sign 26-year-old English right-back Aaron Wan-Bissaka from Manchester United. (Football Insider), external Bournemouth are considering Aston Villa's English forward Cameron Archer, 22, as a potential replacement if his compatriot Dominic Solanke, 26, is sold to Tottenham. (Football.London), external Tottenham are not interested in signing Federico Chiesa, 26, from Juventus despite reports linking them to the Italy forward. (Football Insider), external Aston Villa have made a formal offer to Sunderland for 17-year-old England age grade forward Mason Cotcher. (Fabrizio Romano), external Manchester City have agreed to send 19-year-old Finland defender Tomas Galvez on loan to Austrian champions LASK. (Teamtalk), external
