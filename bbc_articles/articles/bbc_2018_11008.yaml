title: Dettori misses Haydock Park race after plane drama - BBC News
date: '2018-09-08'
section: Liverpool
url: http://www.bbc.co.uk/news/uk-england-merseyside-45459721
content: |-
  Haydock's runway was closed when a plane carrying horse trainer Richard Hannon clipped a helicopter.

  A pilot has been praised for doing an "amazing job" regaining control of a light aircraft that apparently skidded on landing at Haydock Park racecourse.

  The light aircraft was carrying horse trainer Richard Hannon and collided with a stationary helicopter at the Merseyside venue. No-one was injured.

  Champion jockey Frankie Dettori was set to fly in for the Sprint Cup, but the runway was closed following the crash.

  Anna Lisa Balding was on the plane and said the weather had been "bad".

  Mrs Balding said it was "absolutely terrifying", adding: "How we didn't get killed was unbelievable."

  "Our pilot did an amazing job," she added.

  "I don't know what happened, but I do know I saw my own life slip away from me very quickly, but we're all alive and safe."

  BBC horse racing correspondent Cornelius Lysaght said it was believed the plane skidded on rain-soaked ground.

  Kirkland Tellwright, clerk of the course, said: "The bigger plane coming in skidded on landing, apparently spun and clipped the smaller plane.

  "No-one was hurt, but neither plane will be flying today."

  Jockey Dettori had been scheduled to ride James Garfield in the 32Red Sprint Cup but was replaced by Richard Kingscote.

  Dettori was injured in 2000 when the light aircraft he was travelling in crash-landed shortly after take-off at Newmarket racecourse. The pilot Patrick Mackey died in the accident.

