  Mr Hunt's talks in France came on the back of a visit to China where he made headlines for a different reason - getting his wife's nationality wrong.

  On Monday, the foreign secretary mistakenly told his hosts his Chinese wife was Japanese before correcting himself and admitting he had made a "terrible mistake".

  He has since tweeted his apologies to his "long-suffering" wife - and he used his trip to France to make amends, choosing her some flowers in Paris:

