title: 'Adam Toledo: Chicago police release bodycam footage of shooting - BBC News'
date: '2021-04-16'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-56768449
content: |-
  The footage was released after city leaders and the victim's parents had called for full transparency.

  Adam Toledo, 13, was shot dead by a Chicago police officer on 29 March. The footage of the encounter was released the victim's parents had called for full transparency.

  The investigation into the boy's death is continuing.
