title: Teenager plotted mass shooting 'like Columbine' at Edinburgh school - BBC News
date: '2025-02-22'
section: Edinburgh, Fife & East
url: http://www.bbc.co.uk/news/articles/c3w1pg65wz7o
content: |-
  The boy, now 17, was obsessed with the Columbine High School massacre in the US, which saw 12 students and a teacher murdered.

  The boy pleaded guilty to a charge under the Terrorism Act at the High Court in Glasgow

  A teenager obsessed by murder wanted to carry out a mass shooting at his own school in Edinburgh. A court heard how the boy "idolised" the killers behind the Columbine High School massacre in Colorado in the United States in 1999, which saw 12 students and a teacher murdered. He repeatedly spoke about doing the same at his own secondary school - describing the "Doomsday" when he would "clear it out". But a large-scale police probe was sparked in the summer of 2023 after a social media photo of him at school in full combat gear and carrying an imitation gun caused panic among pupils and parents.

  The boy, who also held racist and pro-Nazi views, had already been referred to a UK-wide programme designed to stop people becoming terrorists or supporting terrorism. The now 17-year-old appeared in the dock at the High Court in Glasgow. He pleaded guilty via his defence KC Shelagh McCall to a breach of the peace and a charge under the Terrorism Act.

  The crimes spanned between June 2022 and July 2023. The teenager, who cannot be identified due to his age, had his bail revoked by judge Lord Arthurson pending sentencing next month. Ms McCall KC told the court: "This is a vulnerable young person. He has mental health difficulties. "He is a transgender person - that would need to be taken into account." Prosecutor Greg Farrell told how, on 20 June 2023, the boy had turned up at school wearing cargo trousers and carrying a military tactical vest and helmet. Mr Farrell: "He was later seen at the school carrying an imitation firearm while wearing the vest and helmet. "A photograph was circulated on social media. It was taken and published without his knowledge. "The image provoked a considerable degree of fear and alarm among pupils and parents. "Police were advised by a parent who saw the image."

  Until 2012, the Columbine shooting was the deadliest school shooting in US history

  Officers went on to discover that the boy had a TikTok account which had footage of him in black combat clothes as well as a skeleton mask. Police, however, went on to take statements from other pupils who knew the boy. Mr Farrell: "They provided information that the boy had exhibited a variety of alarming behaviours over a period of time. "The greatest concern was the suggestion he had divulged to various people a desire to carry out a school shooting similar to that which had taken place in 1999 at Columbine High School in Colorado in the USA." Classmates recalled how the boy "spoke excitedly and with considerable enthusiasm" when he talked about Columbine and other school shootings. He "sympathised" with the pair behind it - Dylan Klebold and Eric Harris - and would copy how they had dressed. One girl said he "idolised school shooters in America". Mr Farrell said: "In November 2022, he told her how he would go about carrying out a school attack. "He explained that he would start on the second floor and that he would 'clear it out' using guns. "He would then move downstairs continuing to shoot until police arrived, at which point he would turn the gun on himself."

  The boy described a possible mass shooting at his school as "Doomsday". He was said to be so "interested" in Columbine that he stated he wanted to change his name "in an act of homage" to Klebold. Mr Farrell said: "One pupil told police that the boy wore the same black trousers, trench coat, cap worn backwards and circular glasses as favoured by one of the Columbine pair. "He often made comments that he 'looked like a school shooter'." The boy told another classmate that he would "place a bomb in every second classroom". He would then shoot people as they fled the building. The boy told one girl he met online that he wanted to carry out a shooting as he was being bullied and was "fed-up" being there. The teenager was stopped by police under the Terrorism Act as he returned from holiday with his family on 9 July 2023.

  A number of his electronic devices were seized. There were various files on a mobile phone with some about "homemade" firearms and poisons. The court heard he had 65 videos of Columbine and had added music which appeared to "glamourise" the mass killing. He had recorded another clip of him at his own school which seemed to "mimic the actions" of the American shooters. Police also seized a journal in which the boy had made various sinister remarks. The hearing was told the teenager had twice previously been referred to the Prevent counter-terrorism programme while at school due to concerns but that he had "engaged" with the police. The court heard a more recent concern was flagged up by the college the boy now attends of him allegedly remarking that he was "annoyed at getting caught". Judge Lord Arthurson ruled not to continue bail while sentence was deferred for reports. The boy is expected to be sent to a secure unit for young people or what was described as a "place of safety".
