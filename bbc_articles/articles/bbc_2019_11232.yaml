content: |-
  The glitz, the glamour and the glitter ahead of this year's ceremony.

  The brightest stars in television gathered in Los Angeles on Sunday night for the 71st annual Primetime Emmy Awards.

  But before the ceremony had even kicked off, there had already been enough glitz, glamour and glitter on the red carpet to power an episode of Strictly Come Dancing.

  Here's a round-up of some of the most eye-catching suits and dresses.

  She had faced competition in the category from her own co-star Sandra Oh

  Leading drama actor nominee Sterling K Brown brought the red to the red carpet

  Better Call Saul star Bob Odenkirk was also nominated for leading drama actor

  Glow's Betty Gilpin was nominated for best supporting comedy actress

  Orange is the New Black star Laverne Cox waved to fans

  This Is Us star Mandy Moore was nominated for leading drama actress

  Game of Thrones star Gwendoline Christie was nominated for best supporting drama actress

  She faced competition from her co-stars Lena Headey, Maisie Williams and Sophie Turner (but Julia Garner ended up winning for Ozark)

  Brit actor Alfie Allen, was among the nominees for supporting drama actor for Game of Thrones

  The Good Place star Jameela Jamil was among the other British stars who walked the red carpet

  The Emmy Awards took place Sunday night at the Microsoft Theatre in Los Angeles.
