  New swarms of locusts are developing Earlier this year, the worst swarms of desert locusts in decades decimated crops and pasture across East Africa and beyond, threatening the food security of the entire sub-region. The ravenous insects spread rapidly in January and February through a number of countries in East Africa - including Kenya, Ethiopia and Somalia - as well as areas of Pakistan. It became the worst infestation in Kenya for 70 years and the worst in Somalia and Ethiopia for 25. The FAO now fears that favourable wet weather in March and beyond will lead to a second wave of swarms posing an "unprecidented threat" to livelihoods once again. Insect numbers could grow another 20 times, the FAO warns, unless control activities are stepped up. A number of countries are on locust alert This could be particularly devastating in East Africa - a region already suffering widespread food insecurity because of conflict, droughts and floods. But the situation is also worrying in Iran and Yemen, the FAO says, where new swarms are also developing. Tens of thousands of hectares of croplands and pasture have already been damaged by locusts throughout East Africa. At their peak earlier this year, swarms were eating 1.8m tonnes of vegetation a day across 350 sq km (135 sq miles), the FAO says. The organisation believes one swarm in Kenya covered an area 40km by 60km (25 miles and 40 miles). How much can a locust consume? An adult desert locust can eat its own weight in food every day - about 2g The prospect of a new wave of locusts in Kenya and Ethiopia, possibly bigger than the first, is worrying in itself, but the timing couldn't be worse, says Keith Cressman, the FAO's senior locust forecasting officer. "Now is the beginning of the rainy season in those countries and the beginning of planting. Seeds are germinating and they're sprouting and now you've got locust swarms." These current maturing swarms will soon lay eggs that will produce another generation of locusts maturing around harvest time, Mr Cressman says, threatening crops twice. The locust crisis also comes at a time when countries are dealing with a rise in coronavirus cases as well as the asssociated restrictions on movements, complicating control operations. Ali Bila Waqo, a 68-year-old farmer working in north-eastern Kenya, was one of those affected by the recent swarms. He was hopeful of a good grain harvest this season, with recent rainfall ending a long period of drought. But locusts destroyed all his maize and beans in February. "They ate most of our grains and what they didn't eat, dried up," he says. "That has hurt us a lot. We saw the food with our eyes but we never even got to enjoy it." Mr Waqo, who remembers a previous locust infestation in the 1960s, describes how the swarms blacken the skies. "It gets dark and you can't even see the sun," he says. The causes of the current infestation go back to the cyclones and heavy rains of 2018-19. Desert locusts typically live in the arid areas of about 30 countries between West Africa and India – a region of about 16 million sq km (6.2 million sq miles). But the wet, favourable conditions two years ago on the southern Arabian Peninsula allowed three generations of locusts to flourish undetected, the UN says. The upsurge has been developing since 2018 By early 2019, the first swarms headed to Yemen, Saudi Arabia and Iran, breeding further before moving to East Africa. Further swarms formed and by the end of last year had developed in Eritrea, Djibouti and Kenya. Spring breeding is now expected to cause further infestations in East Africa, Yemen and southern Iran in coming months. Even though such infestations are notoriously hard to battle because of the wide geographical area affected, the FAO's Mr Cressman believes more could have been done earlier to tackle this particular locust upsurge. "If there were greater and more successful efforts of control made in some of the key countries, it might have minimised the situation," he said. People are trying to tackle the huge swarms With the locust swarms in East Africa unprecedented in terms of their size and destructive potential, countries are scrambling to deal with them. Containment of the outbreak depends on two major factors - monitoring and effective control. The Desert Locust Information Service, run by the FAO, provides forecasts, early warning and alerts on the timing, scale and location of invasions and breeding. But once populations reach critical levels, such as in East Africa, urgent action needs to be taken to reduce locust populations, as well as prevent more swarms from forming and spreading. Although there is ongoing research into more environment-friendly solutions, such as biological pesticides or introducing natural predators, the most commonly used control method is pesticide spray. Showered onto the pests via hand pumps, land vehicles or aircraft, whole swarms can be targeted and killed with chemicals in a relatively short period of time. For this reason, the FAO is currently working with governments to carry out a number of aerial pesticide spraying campaigns. So far, more than 240,000 hectares across 10 countries have been treated and hundreds of people have been trained to carry out ground operations. The campaign is much more efficient than it was earlier in the year, Mr Cressman says, and restrictions on movements caused by coronavirus have not hampered operations to any significant extent. But controlling such large populations of insects over large, remote areas remains a logistical challenge. You never really know what percentage of the locust population you have successfully targetted, explains Mr Cressman. But action taken now will determine what happens next. If the current upsurge crosses more borders and infests more regions, devastating more crops, it could be declared a "plague". For this reason it crucial to "join hands and share knowledge and skills" to prevent further deterioration of the situation, Mr Cressman adds. Yet, for Kenyan farmer Ali Bila Waqo, such action comes too late. The only thing he and his family could do to battle the pests when they descended was to bang on jerrycans and shout. Yet, he remains philosophical about what has happened. "It is God's will. This is his army," he says.

