id: bbc_2023_11182
title: 'Dan Wootton: GB News host admits ''errors of judgement'' - BBC News'
date: '2023-07-19'
section: UK
url: http://www.bbc.co.uk/news/uk-66240304
content: |-
  Sun and MailOnline publishers say they are looking into claims against the broadcaster.

  Broadcaster Dan Wootton has admitted making "errors of judgement in the past" but denied any criminality as he responded to claims made against him.

  Reports have included claims he offered media colleagues thousands of pounds for explicit material of themselves.

  Wootton said on his GB News show he was the victim of a "witch hunt" by "nefarious players".

  The publishers of the Sun and MailOnline say they are looking into allegations against him.

  Various claims made on social media and in publications including the Byline Times, which first reported the story, and the Guardian, formed part of a campaign to get Wootton "cancelled", he told viewers of GB News' Dan Wootton Tonight.

  Wootton was previously executive editor at the Sun, whose publisher News UK told the BBC: "We are looking into the allegations made in recent days. We are not able to make any further comment at this stage."

  He later became a columnist for MailOnline, owned by DMG Media, a spokesperson for which said: "We are aware of the allegations and are looking into them."

  The claims include that he used fake online identities and offered money to individuals in return for filming themselves carrying out sex acts.

  Byline Times said it had given a dossier of evidence to the Metropolitan Police.

  A spokesman for the force said it had been contacted in June "with regards to allegations" of offences committed by a man.

  "Officers are assessing information to establish whether any criminal offence has taken place," they said. "There is no police investigation at this time."

  Wootton said the allegations had been spread by a "race to the bottom" on social media, and claimed that "dark forces" were trying to bring down GB News.

  He said: "These past few days I have been the target of a smear campaign by nefarious players with an axe to grind.

  "I, like all fallible human beings, have made errors of judgement in the past. But the criminal allegations being made against me are simply untrue.

  "I would like nothing more than to address those spurious claims. I could actually spend the next two hours doing so, but on the advice of my lawyers I cannot comment further."

  GB News said it had no comment at this time.

  Wootton declined to comment further when contacted by BBC News.

  During his time at the Sun, Wootton was known for breaking stories such as the Duke and Duchess of Sussex stepping down from royal duties.

  He previously edited the newspaper's showbiz column Bizarre. He left his role as executive editor of the Sun in early 2021, and joined the MailOnline.

  He was also previously showbiz editor at the News of the World and appeared on ITV's Lorraine as the programme's showbiz correspondent. He was named showbiz reporter of the year at the British Press Awards three times.

