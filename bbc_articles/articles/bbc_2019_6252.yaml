title: Massive waterspout filmed near southern shore of Singapore - BBC News
date: '2019-05-12'
section: General
url: http://www.bbc.co.uk/news/world-asia-48239073
content: |-
  Witnesses posted images on social media showing the swirl near the Marina Bay Sands hotel.

  A massive waterspout has been filmed near the southern shore of Singapore.

  Witnesses who filmed the natural phenomenon said the waterspout was seen for around 20 minutes.

  A waterspout is a rapidly rotating column of air over water, under a shower cloud.
