title: Bushey killer Kyle Clifford refuses to answer police questions - BBC News
date: '2025-03-07'
section: General
url: http://www.bbc.co.uk/news/videos/cgkmrl30e20o
content: |-
  Video shows Kyle Clifford repeatedly saying "no comment" when asked about why he killed three women.

  Video of a triple murderer refusing to answer a detective's questions in custody has been released by police.

  Kyle Clifford, 26, of Enfield in London, was found guilty at Cambridge Crown Court of raping his ex-girlfriend in an attack in which he killed her and her sister with a crossbow and their mother with a knife.

  Louise Hunt, 25, and Hannah Hunt, 28, suffered fatal crossbow bolt injuries at the family home in Bushey, Hertfordshire, in July 2024, while Carol Hunt was stabbed to death.

  Footage shows Kyle, in a wheelchair, being asked about his motive and is accused by the questioning officer of being "self-centred", to which he repeatedly responds "no comment".

