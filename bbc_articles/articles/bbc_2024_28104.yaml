  Steward admitted that memories of that semi-final are similarly raw for him and replied with one word when asked if there were scores to settle with the Springboks: “Definitely.” The fall-out from that most recent meeting – with final-whistle scuffles and an allegation, denied by Bongi Mbonambi, of a racial slur aimed at Tom Curry – means the reunion is set to be both personal and physical.

  Owen Farrell and Danny Care reacted after being goaded by Willie Le Roux on the final whistle in Paris last autumn

  But, with dry weather forecast, South Africa can wield the scalpel as well as the sledgehammer. A back three of Kolbe, Arendse and silky full-back Aphelele Fassi can cut England to ribbons on the counter, particularly if the hosts over-cook their kicks or loose-ball broken-field chaos results. Fly-half Manie Libbok, who was replaced by Pollard a little over half an hour into the France 2023 semi-final, has plenty of motivation and the game-breaking ability to spring England's blitz defence. England need to balance blood-and-thunder intensity with cunning and co-ordination, otherwise they risk being led into making all-too-familiar errors. It is a huge challenge. But it is always is with South Africa. Fortunately for - and partly because of - Borthwick, it is one that England invariably rise to.
