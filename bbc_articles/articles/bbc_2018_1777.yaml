id: bbc_2018_1777
title: 'Keir Starmer: ''Labour champions being in customs union'' - BBC News'
date: '2018-02-26'
section: General
url: http://www.bbc.co.uk/news/uk-politics-43189390
content: |-
  Shadow Brexit Secretary Keir Starmer says the benefits to the UK are clear.

  Shadow Brexit Secretary Keir Starmer has said he wants Britain to remain part of "a" customs union after Brexit.

  Speaking to the BBC's Andrew Marr, he said the benefits to the UK were clear.
