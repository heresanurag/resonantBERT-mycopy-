title: Thunderstorms cause flash-flooding in Devon - BBC News
date: '2021-09-08'
section: Devon
url: http://www.bbc.co.uk/news/uk-england-devon-58487733
content: |-
  Businesses are affected and roads made impassable due to flood water caused by downpours.

  Roads in West Alvington were hit by flood water

  Thunderstorms have caused flash-flooding and travel disruption in some parts of Devon.

  The South Hams has been the worst affected area, with a number of businesses in Salcombe saying torrential rain saw them flooded.

  Several roads in Kingsbridge, West Alvington and Plymouth also became impassable due to flood waters, and a Plymouth school was hit by lightning.

  Devon and part of Cornwall are on a yellow warning for thunderstorms.

