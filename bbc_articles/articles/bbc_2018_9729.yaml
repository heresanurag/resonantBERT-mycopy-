title: 'India monsoon: Rescue operation in Kerala flooding - BBC News'
date: '2018-08-18'
section: General
url: http://www.bbc.co.uk/news/world-asia-45224415
content: |-
  Hundreds of troops have been rescuing trapped residents in Kerala, including a pregnant woman who was airlifted to hospital.

  Hundreds of people have died in monsoon floods in India's southern state of Kerala.

  Troops have been rescuing trapped residents, including a pregnant woman who was airlifted to hospital by the navy.
