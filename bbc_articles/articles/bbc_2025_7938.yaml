title: Iranian president sacks deputy for 'lavish' Antarctic cruise - BBC News
date: '2025-04-05'
section: Middle East
url: http://www.bbc.co.uk/news/articles/cwy0xy21m7lo
content: |-
  President says trip by Shahram Dabiri, the vice-president for parliamentary affairs, was "indefensible" while Iran's economy suffers.

  State media released a picture of Shahram Dabiri and his wife, superimposing a marker on the name of the ship to the South Pole, Plancius

  Iranian President Masoud Pezeshkian has fired one of his deputies for taking a "lavish" trip to Antarctica with his wife during Nowruz, the Persian new year. The president's office described Shahram Dabiri's trip as "unjustifiable and unacceptable given the ongoing economic challenges" in Iran. A picture of Dabiri and his wife posing in front of MV Plancius, which was bound for Antarctica, circulated widely on social media and caused outrage in Iran. In a statement on Saturday, Pezeshkian said Dabari had been removed as vice president of parliamentary affairs for "indefensible" actions, regardless of whether they were financed from his own pocket.

  "In a government that seeks to follow the values of the first Shia Imam (Imam Ali), and amid significant economic pressures on our people, the lavish travels of government officials, even when personally financed, are indefensible," Pezeshkian said. Iran's economy is under significant strain, and subject to Western sanctions due in part to its support of groups including Hamas and Hezbollah, which have been proscribed terrorist organisations by the US, UK and the EU. Iran's unemployment rate as of October 2024 was 8.4%, according to the International Monetary Fund (IMF), while its annual inflation rate was 29.5%, external. Pezeshkian said Dabiri's actions "starkly contradict the principle of simplicity that is paramount for those in positions of authority".

  The Antarctica expedition on the MV Plancius reportedly has a starting cost equivalent to $6,685 (£5,187). Usually, visits to the coldest and least populated continent in the world are carried out by scientists and seasoned explorers. However, tourism voyages on cruises have surged in popularity in recent years. The Dutch vessel pictured in the picture of Dabiri, for example, was used by the Royal Netherlands Navy for military and civilian research between 1976 and 2004. It is not clear what expedition package Dabiri chose or what mode of transport he took from Iran to Antarctica. On one of the many package deals available online, explorers need to embark and disembark from Ushuaia, one of the southernmost points of Argentina. The town is about 3,079km (1,913 miles) from Buenos Aires, the Argentinian capital. The Iranian president was elected last year with a promise to revive the economy and improve Iranians' daily lives. He replaced Ebrahim Raisi, who died in a helicopter crash. Iranian media reported that many of Pezeshkian's supporters urged him to remove Dabiri from post as the public grew disgruntled over the trip.
