content: |-
  All five of Saturday's Premier League 15:00 games went ahead despite adverse weather conditions in the UK.

  Last updated on .From the section Sport

  All of Saturday's 15:00 GMT games in the Premier League went ahead despite adverse weather conditions in the UK.

  But six games in the Championship, including those at Aston Villa and Wolves, were postponed as were most of those in League One and League Two.

  All Scottish league games were called off, but the Scottish Cup quarter-finals went ahead as planned.

  Watford fans, whose team faced West Brom, were asked to go to Vicarage Road from 08:30 GMT to help clear snow.

  Supporters of Southend - who hosted Walsall in League One - and Carlisle - who faced Grimsby in League Two - also helped clear their respective pitches.

  Both of the main lunchtime kick-offs - Burnley v Everton in the Premier League, and Celtic v Greenock Morton in the Scottish Cup - went ahead.

  Elsewhere, horse racing fixtures at Lingfield, Newcastle and Chelmsford all passed morning inspections and went ahead.

  There is no jump racing this weekend because of the weather.

  Three of Friday's Super League games were postponed, with St Helens and Wakefield moving their games to Sunday.

  Wigan's match against Widnes went ahead as scheduled, while Hull FC's home game against Warrington was also played despite parts of the M62 being closed and Wolves cancelling their supporters' coaches.

  In rugby union, Exeter Chiefs' top-of-the-table Premiership match against Saracens has been put back 24 hours to Sunday (15:00 GMT), with Harlequins following suit for their match against Bath.

  Friday's Pro14 games at Cardiff Blues, Edinburgh and Ulster were all off.

  Mo Farah takes part in a half marathon in London on Sunday called the Big Half, and organisers have confirmed the event will go ahead.

  The four-time Olympic gold medallist will race for the first time in nearly six months, after retiring from track events to focus on road events.

  The Scottish Ski & Boarder Cross Championships, scheduled for Saturday and Sunday, have been cancelled after heavy snow caused roads to be closed around the Glenshee Ski Centre, in the Cairngorms National Park.

  Sunday's BBL Trophy final between Sheffield Sharks and Leicester Riders in Glasgow still goes ahead.

  The UK Open darts tournament in Minehead began as scheduled on Friday, but no fans were allowed to attend because of "safety concerns".
