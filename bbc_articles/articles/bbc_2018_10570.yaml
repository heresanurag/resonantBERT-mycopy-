  Mrs May's comments came days after Conservative MPs opposed to her Brexit plan met to discuss how and when they could force her to stand down.

  About 50 Brexit-supporting members of the European Research Group (ERG) met on Tuesday to discuss a leadership challenge.

  Mrs May has said she wants to strike a trade deal with the EU for after the UK leaves on 29 March 2019.

  She has also said there needs to be "friction-free movement of goods" with no customs or regulatory checks between the UK and EU on the island of Ireland, in order to avoid a hard border there.

  The UK and EU are hoping to agree a way forward next month, at the same time as they settle the terms of the UK's withdrawal, including a transition period up to the end of 2020.

  We voted in 2016 – why is it taking so long to leave? Well, none of the major players has ever left the European Union before... So there are some BIG problems to solve Such as how we don’t end up worse-off economically The EU has a "single market" - goods from other EU countries aren't taxed at the border And people can also move around as if the EU was a single country Outside the EU, the UK might have to pay more to buy from and sell to EU countries This could also slow the flow of goods and parts, disrupting production for UK firms The EU says Britain can’t cherry pick – keeping some benefits without membership But that could mean the UK is freer to make other trade deals around the world Any special deal the UK wants has to be approved by MPs first Then the deal has to be agreed by 27 national parliaments across Europe That’s a lot of people who need to agree with each other... So, the date UK is meant to leave is 29 March 2019 But there are already plans for a 21-month transition period after that During which the UK could still be governed by some EU laws A trade deal between Canada and the EU took seven years to agree However, as the UK’s already fully aligned with the EU, it could be quicker But it is likely that we will all be talking about Brexit for a long time yet...

  BBC Panorama, Inside No 10: Deal or No Deal? is on Monday 17 September at 20:30 BST on BBC One as part of a week on in-depth coverage across the BBC to mark Brexit: Six Months to Go.
