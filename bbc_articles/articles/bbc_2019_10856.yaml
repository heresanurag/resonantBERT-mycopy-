title: England thrash United States 45-7 in Rugby World Cup - BBC Sport
date: '2019-09-26'
section: General
url: http://www.bbc.co.uk/sport/rugby-union/49840190
content: |-
  Last updated on .From the section Rugby Union

  England hit their World Cup straps with a seven-try demolition of the USA to make it two bonus-point wins from two. Billy Vunipola and Luke Cowan-Dickie scored first-half tries from driving mauls after skipper George Ford went under the posts after six minutes. Four more in the second half - two from Joe Cokanasiga, one apiece from latecomers Ruaridh McConnochie and Lewis Ludlum - were a fitting reward for a much-improved performance in the heat and humidity of Kobe. In a World Cup becoming defined by safe tackling technique, US flanker John Quill was sent off for a horrible shoulder charge on replacement Owen Farrell, the England talisman lucky not to suffer serious injury. But the man Farrell had come on for, Piers Francis, may himself face retrospective action after a questionable challenge in the opening moments of the game. England's set-piece was dominant, the US forwards unable to cope at the scrum or to find an answer when their opponents set the maul. Tougher tests lie ahead in the shape of Argentina and France but England will travel to Tokyo this weekend in much improved mood. Joe Cokanasiga scored two of England's four tries in the second half Eddie Jones had promised a fast start and his team delivered, Ford slicing through a stretched defence on the angle - after Vunipola's initial run and Francis's foray down the left - to touch down under the posts. Four penalties conceded in the first 15 minutes slowed the charge, World Cup debutant Willie Heinz over-exuberant and indisciplined at a scrum and ruck and then spilling the ball forward with England three metres out. But with Ford pulling the strings England kicked a penalty to the corner, Cowan-Dickie went to Tom Curry at the back of the line-out and Vunipola rumbled over at the back of the driving maul. The US pack was splintering at the set-piece, and after Ford kicked a scrum penalty into touch, another maul sent Cowan-Dickie in for a replica try down the right. And England nearly had their fourth try just before the interval as Ford's cute chip was gathered by Jonathan Joseph, Cokanasiga not able to gather the centre's pass with the line beckoning. Their 19-0 half-time lead was a fair reflection of the balance of power, England with 66% of possession and 76% territory. Owen Farrell carried on after receiving medical attention following a dangerous high tackle Jones took off Vunipola, Dan Cole and Joe Marler at the break with Mark Wilson, Kyle Sinckler and Ellis Genge coming into the fray. Sinckler and Wilson combined beautifully in midfield before Joseph's dummy foxed the remaining cover, the centre stepping and spinning to within two metres before Cokanasinga crashed over. On came Farrell, Ben Youngs and Courtney Lawes, Jones trying to manage the workload on his players with the short turnaround between games. Winger McConnochie blew one opening when he opted to step in rather than pin his ears back for the corner, but the late bolter for England's World Cup squad made amends moments later as he rolled in after England ran another scrum penalty. Ludlum was another who was nowhere near this team six months ago yet his dynamic performance was capped with a try of his own after Ford's sidestep down the left. And Cokanasiga grabbed his second and England's seventh after a storming 70-metre run from Genge, who left white-shirted defenders scattered in his wake like tenpins. Quill was rightly dismissed by Australian referee Nic Berry for his charge on Farrell before a late consolation score from Bryce Campbell with the clock red. Ford scored the opening try in the sixth minute as England dominated from the start A smart try and 10 points from the tee capped a confident display, England's skipper for the night making the most of the time given him by his dominant pack. What they said England head coach Eddie Jones: "The conditions were such it was like a wet weather game but we found our rhythm and tempo really well in the second half. We made some handling mistakes but we will improve. "They had 14 players in the line and it was hard to get a numerical advantage. As soon as we started to play through them we were much better." England World Cup winner Matt Dawson on Radio 5 Live: "The highlight for me was the discipline. I think there were only three penalties, that were all in the first half. It is in stark contrast to where they were last week and the team needed to move on. "If they can get anywhere near four or five penalties against Argentina, they will blow them away. If they keep progressing like that, they are going to be a difficult team to beat."
  • None England had gone 240 minutes without conceding a try in World Cup matches before Campbell scored at the end
  • None England have won all 18 of their World Cup matches against non-tier one opposition, those wins coming by an average margin of 41 points.
  • None England's tally of 54 defenders beaten is the second most they have managed in a World Cup match (60 v Uruguay in 2003).
  • None George Ford scored one and assisted two tries in this match, the first England fly-half to score a try and assist another in a World Cup match.
  • None Joe Cokanasiga gained over 75 metres with the ball in hand for the sixth time in seven starts for England.
  • None Ben Youngs and Dan Cole won their 91st England caps, drawing level with Jonny Wilkinson as the joint third most capped England players in Test history, behind Jason Leonard (114) and Dylan Hartley (97).
