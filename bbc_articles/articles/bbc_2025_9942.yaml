title: Shotton Colliery skydive inquest into Jade Damarell death begins - BBC News
date: '2025-05-22'
section: Wear
url: http://www.bbc.co.uk/news/articles/clynln5vxkgo
content: |-
  Marketing manager Jade Damarell crashed onto farmland in Shotton Colliery, the inquest hears.

  No suspicion of equipment failure in skydive death

  An inquest hearing for a 32-year-old woman who died while skydiving was told "there was no reason to suspect equipment failure". Marketing manager Jade Damarell died after crashing on to farmland near Fleming Field, Shotton Colliery, County Durham, on 27 April. A post-mortem examination at the Royal Victoria Infirmary in Newcastle found she died as a result of "blunt trauma". The brief opening hearing in Crook, County Durham, was adjourned until a full inquest on 21 August.

  Ms Damarell was born in Kowloon, Hong Kong, and lived in Caerphilly, Wales, coroner's officer Alexis Blighe told the court. Ms Blighe said: "I understand the circumstances to be that Ms Damarell was involved in a parachute incident on 27 April." Coroner Jeremy Chipperfield asked Ms Blighe: "There's no reason to suspect equipment failure?" Ms Blighe replied: "No reason at all."

  After her death, her family had told reporters: "Skydiving and its fantastic community meant so much to Jade and we're incredibly comforted by how admired, respected and deeply loved she was. "We miss her beyond words but Jade's love, brilliance, courage and light will live on in our family and among all those who knew and loved her." Her body was identified by Bryn Chaffe, who was chief instructor at the skydiving firm she used, Ms Blighe said. Following her death, Sky-High Skydiving said: "It is with great sadness that we confirm a tragic incident took place involving a valued member of our community."

