title: 'Christian Horner: Red Bull boss says ''time to draw a line under'' controversy
  over accusation about his behaviour - BBC Sport'
date: '2024-03-07'
section: Formula 1
url: http://www.bbc.co.uk/sport/formula1/68497997
content: |-
  Red Bull team principal Christian Horner and driver Max Verstappen chat during practice at the Saudi Arabia GP

  Red Bull team boss Christian Horner says it is "time to draw a line under" the controversy over accusations about his behaviour towards a female employee. Red Bull has suspended the woman who accused Horner of inappropriate behaviour, which he has denied. "An awful lot has been made out of this," said Horner. "It is of great interest in different areas of the media for different reasons." Speaking at the Saudi Arabian Grand Prix, he added: "The time now is to draw a line under it." Red Bull said it "could not comment" on the reasons for the woman's suspension. BBC Sport has learned the reason given by Red Bull to the employee was that she had been dishonest. Red Bull's engine partner Honda has called for more details about the matter. A spokesperson for the Japanese company said: "We do not have full details on the matter at this point, therefore Honda are not in a position to make any detailed comment. We look forward to full clarity as soon as possible." Horner emphasised that Red Bull's board dismissed the complaint last week. He said: "The reality is that there was a grievance raised, it was dealt with in the most professional manner by the group, that appointed an independent KC, one of the most reputable in the land. "He took time to investigate all the facts. He looked at everything and he came to a conclusion where he dismissed the grievance. "As far as I'm concerned, as far as Red Bull is concerned, we move on." Red Bull has refused to name the lawyer involved or give any insight into the report compiled, or explain why the decision to dismiss the complaint was made. Horner, whose wife Geri was in the Spice Girls, added: "I am fortunate I have a beautiful family and a very supportive wife. It has been very trying, and very challenging. "My wife has been hugely supportive, as has my family, but the intrusion on my family is now enough, and we need to move forward and focus on what we are here for. "It is time now to focus on why we are here which is to go Formula 1 racing."

  Horner continued: "There is a grievance process in any company and that process is confidential between the individuals and the company itself. "I am not at liberty due to the confidentiality and out of respect to the company and the other party. "We are all bound by the same restrictions, even if I would like to talk about it, I can't. "The only reason this has gained so much attention is because of the leakage and attention in the media which has been very trying in many respects." Last week, Jos Verstappen, father of Max Verstappen, said the controversy over Horner was "driving people apart" and that the team would "explode' if Horner remained in his position. Horner said: "I spoke to Jos following the grand prix and it's in everybody's interests collectively that we have agreed to move on and focus on the future. "We both have a vested interest in his son to get the best out of him."

