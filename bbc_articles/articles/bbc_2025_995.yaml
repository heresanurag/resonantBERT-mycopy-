  • None Ukraine in maps: Tracking the war with Russia Ukraine's European allies also rejected any move towards a forced settlement on Kyiv:
  • None UK Defence Secretary John Healey said there could be "no negotiation about Ukraine without Ukraine, and Ukraine's voice must be at the heart of any talks"
  • None German Chancellor Olaf Scholz rejected a "dictated peace" and his defence minister said it was "regrettable" Washington was already making "concessions" to the Kremlin.
  • None EU foreign policy chief Kaja Kallas accused Washington of "appeasement" towards Russia. "We shouldn't take anything off the table before the negotiations have even started because it plays to Russia's court and it is what they want," she said.

  Donald Trump said he will likely meet with Vladimir Putin in Saudi Arabia

  Trump, who made the first publicly acknowledged White House call with Putin since Russia's full-scale invasion of Ukraine in 2022, said he would meet Putin in Saudi Arabia. without giving details. Speaking to reporters on Wednesday in the Oval Office, he said Putin wanted the war to end and he expected a ceasefire soon. When asked if Ukraine was an equal member in the peace process, he said: "They have to make peace." His Defence Secretary Pete Hegseth told a press conference at a Nato summit on Thursday that peace negotiations would be "had with both" Putin and Zelensky" and he described Trump as the "perfect dealmaker". Hegseth, who on Wednesday said it was "unrealistic" to expect Ukraine to return to pre-2014 border and downplayed the prospect of Ukraine joining Nato, appeared to row back on his remarks, saying "everything was on the table" and the conversations were being led by the president. The defence secretary also suggested financial aid to Ukraine during negotiations could be on the table, as well as US troop numbers in Europe.

  Following the overthrow of Ukraine's pro-Russian president in 2014, Moscow annexed the Black Sea peninsula of Crimea and backed pro-Russian separatists in bloody fighting in eastern Ukraine. The conflict burst into all-out war nearly three years ago. Moscow's attempts to take control of the capital Kyiv were thwarted, but Russian forces have taken around a fifth of Ukraine's territory in the east and south, and have carried out air strikes across the country. Ukraine has retaliated with artillery and drone strikes, as well as a ground offensive against Russia's western Kursk region.

