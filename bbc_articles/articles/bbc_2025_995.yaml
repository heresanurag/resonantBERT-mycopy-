title: Volodymyr Zelensky says no peace deal without Ukraine involvement - BBC News
date: '2025-02-14'
section: World
url: http://www.bbc.co.uk/news/articles/ckg051z21zno
content: |-
  Ukraine's president says he will not be shut out of peace negotiations after Trump says he agreed to start talks with Putin.

  Zelensky says no peace deal without Ukraine involvement

  Ukraine will not agree to any peace deal proposed by the US and Russia without its involvement, President Volodymyr Zelensky has warned, after Donald Trump and Vladimir Putin pledged to begin talks to end the war. "We cannot accept it, as an independent country," Zelensky said. The US president had talked of a "good possibility" of ending the war after he and Putin spoke by phone. It was not "practical" for Ukraine to join Nato, Trump said, and "unlikely" it could return to its pre-invasion borders. He has now suggested that Russian respresentatives will meet Americans on Friday in Munich, which is hosting a security conference.

  "Russia is going to be there with our people," Trump said. "Ukraine is also invited, by the way. Not sure exactly who's going to be there from any country but high-level people from Russia, from Ukraine and from the United States. "I'd love to have them [the Russians] back. I think it was a mistake to throw them out. Look, it's not a question of liking Russia or not liking Russia." Russia, which is not taking part in the annual forum, did not immediately comment on Trump's claim. Zelensky adviser Dmytro Lytvyn told reporters that "talks with Russians in Munich" were "not expected". Zelensky is to meet Trump's Vice-President, JD Vance, in the German city on Friday.

  The Ukrainian leader, who also had an individual call with Trump on Wednesday, said his country could not accept "any agreements [made] without us". "Europeans needed to be at the negotiating table too," he said, and he told Trump his priority was "security guarantees", something he did not see without US support. Elsewhere, he said that Nato membership for Ukraine would be the "most cost-effective" option for its partners, without giving details. "I also warned world leaders against trusting Putin's claims of readiness to end the war," he added.
