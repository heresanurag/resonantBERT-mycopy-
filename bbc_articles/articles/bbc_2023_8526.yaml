content: |-
  Video shows Suleman Dawood wowing people as he successfully matches up colours on each side of the puzzle.

  This video shows the moment Titanic sub victim Suleman Dawood solved a Rubik's Cube in under 20 seconds.

  The 19-year-old died with his father, Shahzada Dawood, and three others, after a submersible they were travelling in to see the Titanic wreck faced a catastrophic implosion.
