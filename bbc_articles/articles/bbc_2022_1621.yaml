  Leto could have the last laugh on Tuesday though, if he gets an Oscar nomination for best supporting actor for the same film.

  The film Karen - about a racist white woman on a mission to displace the new black family that has just moved in next door to her - got five nominations, including worst picture, actress and director, for Coke Daniels.

  Psychological thriller The Woman in the Window also received five nominations, including worst actress for Adams and worst director for Joe Wright, while both films are up for worst re-make, rip-off or sequel.

  Adams also got a supporting actress nod for Dear Evan Hansen.

  Ben Affleck is up for worst supporting actor for The Last Duel, along with Mel Gibson for Dangerous.

  Worst actor contenders alongside Hartrampf include LeBron James for Space Jam: A New Legacy, Ben Platt for Dear Evan Hansen and Mark Wahlberg for Infinite, while Ruby Rose is up for worst actress for Vanquish, along with Megan Fox for Midnight in the Switchgrass (which is also in the Bruce Willis category). Space Jam: A New Legacy got four nominations in total.

  Last year singer Sia was named worst director for her controversial film Music, and the awards, now in their 41st year, have previously honoured films including Cats and Showgirls.
