content: |-
  England’s Katarina Johnson-Thompson and Scotland’s Eilish McColgan earn hugely popular Commonwealth Games titles on the loudest night yet at Alexander Stadium.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England's Katarina Johnson-Thompson and Scotland's Eilish McColgan earned hugely popular Commonwealth Games titles on the loudest night yet at Birmingham's Alexander Stadium. Johnson-Thompson's heptathlon win marks her return to the top of an international podium after three years of injury and coaching changes. She finished on 6,377 points, 144 clear of Northern Ireland's Kate O'Connor. McColgan's 10,000m victory marks her first major title at the age of 31. Her triumph also follows in the footsteps of her mother Liz, who won the same title at Edinburgh 1986 and Auckland 1990. As the volume rose and the laps counted down, McColgan found herself locked together with Kenya's Irine Cheptai. Cheptai, who finished sixth ahead of McColgan at last year's Tokyo Olympics, opened up a metre's lead with 250m to go. But McColgan reeled her in, surged on and, after checking over her shoulder for a response that never came, landed her biggest win yet. "This is the most incredible moment of my career," McColgan said. "I couldn't hear myself think or breathe, in that last 100m the crowd carried me. "It's just been such an up and down year with Covid, another illness and a couple of other niggles. I knew the fitness was somewhere in me but I could not have asked for anything more tonight to have my family here." Liz McColgan embraced her daughter before paying tribute to her dedication and determination. "As a mother to witness your daughter win is amazing," she told BBC Sport. "She just ran the race I always knew she was capable of running. It was amazing to watch and very nerve-wracking but it's been a long time coming and she put it together tonight."

  McColgan ran faster than her mum did for either of her Commonwealth Games golds. Her time of 30 minutes 48.60 seconds is a Games record and adds gold to a season that has already been littered with new landmarks. McColgan broke the European 10km, British half-marathon and Scottish 10,000m records this year, but an untimely hamstring niggle hindered her chances at last month's World Championships.

