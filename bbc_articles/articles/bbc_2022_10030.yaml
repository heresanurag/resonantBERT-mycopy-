  Former world champion Johnson-Thompson said she hoped this win could reinvigorate her career after a run of bad luck and behind-the-scenes disruption, after dedicating gold to her grandmother Mary who died last week. "It has been tough couple of years so hopefully this can kickstart another part of my career," Johnson-Thompson said. "It has been hard, I had moments where I didn't know if I wanted to carry on but to come out here and get the gold and prove to myself that pushing through was worth it." Johnson-Thompson came into the 800m finale with a healthy lead over second-placed O'Connor, but left nothing to chance as she chased hard to the line to finish more than half a second ahead of her 21-year-old rival. The 800m may have been the coronation, but it was in the javelin that Johnson-Thompson saw off the young pretenders to her throne. The throwing events are where the 29-year-old is most vulnerable. She had not been within three metres of her personal best of 43.93m since she threw it in 2019. In Wednesday's penultimate event, O'Connor's opening-round 50.83m, in reply to Johnson-Thompson's initial 36.19m, heaped pressure on the defending champion. But Johnson-Thompson mustered a final-round 44.33m before clasping her face in her hands in a mix of surprise and delight. Further than she has ever thrown before, it was a performance few others had seen coming either after her spell of faltering form and fitness.

  Elsewhere Wales' three-time Paralympic champion Aled Sion Davies claimed F42-44/61-64 discus gold, with team-mate Harrison Walsh taking bronze behind Sri Lanka's Palitha Halgahawela Gedara. Davies' best effort of 51.39m was short of the F42 discus world record of 56.21m he set in July, but was good enough to justify his decision to switch to the event after successive Paralympic shot put golds in 2016 and 2021.

