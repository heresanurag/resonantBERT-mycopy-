id: bbc_2024_5429
title: Ukraine's largest dam ablaze after Russian strikes - BBC News
date: '2024-03-22'
section: General
url: http://www.bbc.co.uk/news/world-europe-68637596
content: |-
  Large areas of Ukraine are suffering blackouts after Russian missiles targeted energy infrastructure.

  Ukraine's state hydropower company said a Russian strike had hit its largest dam, the DniproHES in Zaporizhzhia.

  The BBC has verified this footage of the incident, which was posted on social media.
