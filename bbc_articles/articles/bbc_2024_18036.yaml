content: |-
  Relatives of Connor Page, Lewis Soden and Reece Williams paid tribute to the men who died in the first of a series of fatal road incidents.

  Three men who died in car crash near Falkirk named

  Connor Page, Lewis Soden and Reece Williams were all killed in the crash

  Three men who died in a single-car crash on a rural road near Falkirk have been named. Reece Williams, 23, Lewis Soden, 24, and Connor Page, 21, died when the car they were travelling in crashed near Dunmore at about 18:15 on Friday. The 20-year-old female driver of the car was taken to Forth Valley Hospital for treatment and has since been released. The crash was the first in a series of fatal incidents on Scotland's roads last weekend which claimed a total of eight lives.

  The families of the three men have issued tributes through Police Scotland. Mr Williams' family said he was a much-loved son, brother, grandson, nephew, cousin, and friend. They added: "There will not be a day where we don’t hold space to remember Reece and the memories that we made together." Mr Soden's family said he was a much-loved son, brother, grandson, nephew, and friend to many. Mr Page's family said: "Connor was loved beyond words." The families also thanked the emergency services and witnesses. The road was closed for seven hours following the crash for accident investigations. Sgt Elaine Scott said: “Enquiries remain ongoing to establish the full circumstances of the crash and we continue to appeal to anyone who witnessed the crash and who has not already spoken to officers to please get in touch.", external

  The three men were among eight people killed in a spate of fatal road crashes from Friday evening through to Sunday. A 37-year-old man died as a result of a car crash in South Ayrshire on Saturday. Three bikers Andrew Lartey, 30, Georgia Tate, 23, and Jason Gibbon, 37, died when two motorbikes crashed between Bonchester Bridge and Carter Bar on the A6088 at 14:30 on Sunday. Fifteen minutes later Candice Adam, from Dalry in Ayrshire, died after her motorbike crashed on the A83 in Lochgilphead, Argyll and Bute.
