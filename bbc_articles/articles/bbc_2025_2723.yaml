  Suffolk Police says the death is being treated as "unexplained" but "not suspicious".

  Woman dies after 'falling on to seawall rocks'

  Floral tributes have been left at the scene close to the The Esplanade in Lowestoft

  The death of a woman who reportedly fell on to seawall rocks on a beach in Suffolk is being treated as "unexplained" but "not suspicious". Police officers, paramedics, coastguard rescue officers and the East Anglian Air Ambulance were called to Lowestoft at 20:03 GMT on Sunday. They had received reports of a serious incident on the coastline near The Esplanade. Suffolk Police confirmed a woman, aged in her 30s, had died at the scene.

  A police spokesperson said: "The death is currently being treated as unexplained but there are not believed to be any suspicious circumstances at this time. "A file will now be completed for the coroner."

  The emergency services attended the scene on Sunday evening where a woman in her 30s died

