title: Man visits London for 100th birthday - BBC News
date: '2018-07-27'
section: General
url: http://www.bbc.co.uk/news/uk-england-bristol-44977804
content: |-
  A man from Bristol has made his first visit to London since World War Two to mark his 100th birthday.

  A man from Bristol has made his first visit to London in more than 70 years to mark his 100th birthday.

  The last time Raymond Kendall visited the capital, World War Two was taking place and he travelled by steam train.
