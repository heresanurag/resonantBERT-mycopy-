content: |-
  Police searching for Sophie Lambert from Harrogate say a body has been discovered in the River Nidd.

  Sophie Lambert went missing from her home in Harrogate on Friday

  Police searching for a missing woman in North Yorkshire have found a body.

  Sophie Lambert, 22, from Starbeck in Harrogate, was first reported to have gone missing from her home at about 22:10 BST on Friday.

  A body was found in the River Nidd near Knaresborough on Wednesday morning, North Yorkshire Police said.

  Officers said it was too early to confirm the identity, but Ms Lambert's relatives had been informed and were being supported by specialist officers.

  Extensive searches have taken place in woodland and along the riverside in the nearby Nidd Gorge.

  A member of the public found Ms Lambert's mobile phone, bank card and jumper there on Saturday morning.

  Police officers looking for missing Sophie Lambert searched woodland near the River Nidd

  Police have also made house-to-house inquiries in the area since her disappearance.

  Mountain rescue teams and a drone pilot assisted with the search operation.

  A spokesperson for the force said: "We thank everyone who has supported the missing person appeal over the last few days."

  A North Yorkshire Police drone pilot assisted with searches in the area

