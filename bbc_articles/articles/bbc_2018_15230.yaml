  Two people have been killed and 10 others wounded in a shooting in the eastern French city of Strasbourg, officials say.

  Officials say two people have been killed and 10 others wounded in a shooting in the eastern French city of Strasbourg.

  Pater Fritz described hearing gunshots and attending to a victim, while France24 journalist James Franey said police are evacuating the city centre.

  Read more: Strasbourg shooting: Two dead, 10 wounded and gunman at large
