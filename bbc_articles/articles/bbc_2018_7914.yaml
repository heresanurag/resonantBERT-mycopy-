  From RuPaul to Jeff Daniels and John Oliver.

  Jeff Daniels won for his role in Godless, Rachel Brosnahan for hers in The Marvelous Mrs Maisel

  The 70th annual Primetime Emmy Awards have taken place in Los Angeles.

  It was a big night for British talent - with Thandie Newton, Claire Foy, Charlie Brooker, Matthew Rhys and John Oliver among the winners.

  Here's the full list of winners from Monday's ceremony (the less high-profile awards were handed out last week at the Creative Arts Emmys).

  Amy Sherman-Palladino won both the writing and directing Emmys for comedy series The Marvelous Mrs. Maisel

  Best lead actress in a limited series or movie

  Best lead actor in a limited series or movie

  The Assassination of Gianni Versace L-R: Edgar Ramirez, Penelope Cruz, director Ryan Murphy, Ricky Martin, and Darren Criss

  Regina King, winner of best lead actress in a limited series or movie for Seven Seconds

