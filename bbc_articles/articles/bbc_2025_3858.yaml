  Team principal Frederic Vasseur admitted Ferrari had made the "wrong decision" and they would review the matter before next weekend's second race of the season in China. "It was the first time we have to communicate between the pit wall and car, we can do a better job, it was not a clean one at all. "We will have to learn a lot for next weekend and improve the communication. And learn what Lewis is expecting from the communication. Let's learn from today and be much better next week." Ferrari had a difficult weekend. Charles Leclerc, who made the same strategy decisions, started a place ahead of the Briton and finished two places in front after overtaking Hamilton at the final restart. Vasseur said he believed Ferrari had not optimised their car for the track at Albert Park and that their real position in the field was right behind McLaren, as they had been up to the final part of qualifying. "The conditions today are not representative of the performance," Vasseur said. "Friday to Q2 is more representative. "As soon as you overheat the tyres you have a big drop. The real picture of the performance is more what we saw on Friday and Saturday but even then McLaren is one step ahead. "If you don't adapt the car to the weekend to the tyres, to the track temp, you are out of the range of performance. Next weekend will be a different one."
