title: 'Australian Grand Prix: Lewis Hamilton says first drive for Ferrari ''a big
  crash course'' - BBC Sport'
date: '2025-03-16'
section: Formula 1
url: http://www.bbc.co.uk/sport/formula1/articles/cg5d4ypeev4o
content: |-
  Lewis Hamilton says his first race for Ferrari was "a big crash course" after he finished 10th in a chaotic Australian Grand Prix.

  It was the first wet Australian Grand Prix since 2010

  Lewis Hamilton said his first race for Ferrari was "a big crash course" after he finished 10th in a chaotic Australian Grand Prix. The seven-time champion led the race briefly but an incorrect strategy call as rain hit late in the race led to him dropping down the field. Hamilton said: "It felt like I was in the deep, deep end." The 40-year-old added that he "didn't have any confidence in the car and was nearly in the wall most of the time". McLaren's Lando Norris won in Melbourne from Red Bull's Max Verstappen with Hamilton's former Mercedes team-mate George Russell in third.

  It was a chaotic start to the season at Albert Park for a race that started wet, dried up and ended wet again, and featured three safety cars, an aborted start and a series of crashes. Hamilton, who had qualified eighth, said: "I'm grateful I got through it, came out of it with a little bit of something, at least one point. "Obviously I didn't go off or spin. Lacking pace, for sure, but I do believe the car has more performance than we were able to extract this weekend." He said that the team left it too late to stop for treaded tyres when the rain came with 13 laps to go - he stopped three laps after Norris and one after Verstappen. Hamilton said: "The last sector (of the lap), everyone was going off but I was managing to hold on, so I was just passing people, and once we got to the start line, it was dry. "So I was like: 'This is fine for me, I've just got to hold this out, I've only got a few laps to go.' "But then it pelted down just in the last two laps or something, it was coming down, and that's the moment we probably should have come in. "In that moment, I was like, 'oh my God, I'm third'. I was leading for a second. But I mean, yeah, I don't know if we have anywhere near the pace as the McLarens had today. But I do think in the actual car, there is a lot more performance, I just don't think we unlocked it this week."

