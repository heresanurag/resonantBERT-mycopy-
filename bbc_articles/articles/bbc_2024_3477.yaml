title: Huge water leak shoots into air on Texas street - BBC News
date: '2024-02-20'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68342272
content: |-
  Dramatic video shows the leak towering close to power lines blocking a road in College Station, Texas.

  Police in Texas have released dramatic footage of a water leak shooting into the air with such force it towers above trees.

  The road was closed on Sunday in the city of College Station but authorities said the leak was isolated/
