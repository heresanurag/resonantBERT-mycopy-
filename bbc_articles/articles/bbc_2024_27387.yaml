content: |-
  Britain's Mark Cavendish, the most successful sprinter in cycling history, ends his career with victory in the Tour de France Criterium in Singapore.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Britain's Mark Cavendish, the most successful sprinter in cycling history, ended his career with victory in the Tour de France Criterium in Singapore. The 39-year-old from the Isle of Man, who said on Saturday that this would be his final race before retirement, triumphed in a sprint finish to end a 19-year career. Cavendish, riding for Astana-Qazaqstan, wore race number 35 to mark his record for stage wins in the Tour de France. He signed autographs and took selfies with fans before the race and received a 'wheel of honour' - other riders held their bikes up on one wheel and spun the other - on the start line of the race, made up of 25 laps of a 2.3km course. "I'm quite emotional," said Cavendish, who was close to tears after the race. "I realised in the last five laps it was the last 15km of my career. "I was nervous about crashing or something if I fight [for the lead]. I really wanted that so bad. I've always loved this sport."

  Cavendish won 165 races in his career, including the road world title in 2011, 17 stages in the Giro d'Italia and three in the Vuelta a Espana. He received a knighthood in October. On the track, he won omnium silver at the 2016 Olympics and was a three-time madison world champion. Having delayed his retirement by a year, Cavendish broke the record for most Tour de France stage wins with victory in Saint Vulbas in July. "Cycling is such a form of freedom," he said. "It's a way to meet people; it's a way to be alone with your thoughts. It has so much potential as a sport, a mode of transport, a pastime. "I've always tried to do anything I can to help this move forward and and that won't stop even if I'm not riding a bike any more. In fact, I might be able to put more into that. "I'm looking forward to what the rest of my career holds. I couldn't have wished for a better send-off. I'm so grateful. I hope everyone enjoyed that." Alpecin–Deceuninck's Jasper Philipsen finished second and Arnaud de Lie third for Lotto–Dstny.

  Mark Cavendish twice won the green jersey - awarded to the rider with the most points - at the Tour de France

  Cavendish was nicknamed the 'Manx Missile' because of his finishing speed in bunch sprints

  Cavendish celebrated with his wife Peta after his win in Singapore
