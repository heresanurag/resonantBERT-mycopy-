  Your day-by-day guide to what is happening when - and who to watch out for - at the Paris 2024 Olympics.

  What's happening and when at the Paris Olympics?

  Just one day of competition remains at the Paris Olympics, with only a handful of gold medals to be decided before Sunday's closing ceremony - all times BST. Team GB has named a squad of 327 athletes and UK Sport has set a target of 50 to 70 medals at the Games. They will enter the final day on 63 medals, one short of their tally in Tokyo three years ago. There will be live coverage of Paris 2024 across the BBC on TV, radio and online. The Games officially opened at a unique and spectacular opening ceremony along the River Seine on Friday, 26 July and will close on Sunday, 11 August.

  The final day of the Games brings three more gold medals to be won in the velodrome if Team GB are looking for a late boost. Option one: the women's sprint (final from 11:45). While you have to go back to Victoria Pendleton in 2008 to find the last Briton who took gold in this event, GB's Emma Finucane is the defending world champion. Option two: the men's keirin (final at 12:32), an event beloved first by Sir Chris Hoy with gold in 2008 and 2012, then by Sir Jason Kenny with gold in 2016 and 2021. Imagine adding your name to that list. That's the task ahead of GB’s Commonwealth silver medallist Jack Carlin and Hamish Turnbull, but the likes of the Netherlands’ Harrie Lavreysen could be hard to defeat. Option three: the women's omnium (decided at 12:56). This is the final event in the velodrome at Paris 2024 and presents one last opportunity for GB, but perhaps even more of an opportunity for US rider Jennifer Valente, the defending world and Olympic champion. Emily Campbell took Britain's first medal in women's Olympic weightlifting with silver in Tokyo. She has since added world silver and has won four successive European titles. Her +81kg category begins at 10:30, with China's Li Wenwen the favourite for gold. The Paris 2024 closing ceremony is due to begin at 19:00. This time, we are back in the traditional stadium setting as the Stade de France hosts the world's athletes for a final goodbye. The show you will see performed during the closing ceremony is titled Records, although not too much has been given away by its creators. This also marks the handover to Los Angeles 2028 for the next Olympics and to the Paris 2024 Paralympics, which begin on Wednesday, 28 August.

