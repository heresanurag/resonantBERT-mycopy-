content: |-
  Torrential rainfall and flash flooding left a man stranded on top of his truck in Houston.

  Torrential rainfall and flash flooding brought on by Hurricane Beryl have left a man stranded on top of his truck in Houston. A fire engine extended its ladder over flood waters to rescue the man.

  At least two people have died as the hurricane hit southeast Texas, leaving more than two million people without power.
