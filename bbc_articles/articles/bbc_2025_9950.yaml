title: Actor Timothy West 'died peacefully' after hospital stay - BBC News
date: '2025-05-22'
section: Bradford
url: http://www.bbc.co.uk/news/articles/cgq377gyeglo
content: |-
  The Bradford-born actor had been receiving palliative care after suffering a head injury in a fall.

  Timothy West died in November at the age of 90

  Actor Timothy West died "peacefully with his family around him" at a care home where he was being looked after following a fall, an inquest has heard. West, who was married to actress Prunella Scales for over 60 years, appeared in TV comedies such as Brass and Not Going Out, dramas such as Bleak House and Gentleman Jack, and soaps Coronation Street and EastEnders. Westminster Coroner's Court heard the Bradford-born actor had a fall on 11 August, causing a "significant traumatic brain injury". Assistant coroner Ellie Oakley said he had been treated in hospital for about three months before being moved to Wandsworth Common Care Home where he received palliative care before he died on 12 November.

  She said: "It is not possible to determine how the fall happened and there is no evidence of others being involved. "Unfortunately he was not well enough to be discharged to his home despite receiving appropriate care in the care home." The care home's general manager, Thomas Holden, said in a statement read out at the inquest: "On 12 November his family were with him all day. "They continued to stay with him in his room during the evening and he passed away peacefully with his family around him at 19:20." In a statement announcing his death last year, West's children Juliet, Samuel and Joseph said: "After a long and extraordinary life on and off the stage, our darling father Timothy West died peacefully in his sleep yesterday evening. He was 90 years old. "He leaves his wife, Prunella Scales, to whom he was married for 61 years, a sister, a daughter, two sons, seven grandchildren and four greatgrandchildren. All of us will miss him terribly."

