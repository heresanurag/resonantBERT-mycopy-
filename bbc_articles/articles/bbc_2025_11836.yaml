  Kylie Minogue spots boy's sign and invites him to perform one of her hits at Birmingham concert.

  A nine-year-old boy was invited to perform in front of thousands of music fans - after superstar Kylie Minogue spotted his concert sign.

  Leo, from Coventry, went to the concert in Birmingham with his mum Claire dressed up as Jason Donovan, in a tribute to the pair's 1989 worldwide hit Especially For You.

  The Australian star noticed Leo holding up a sign which read: "I'm dressed as Jason, especially for you."

  So she called Leo up on stage and asked him if he would like to perform a duet, with Leo telling her: "I can't sing."

  Kylie posted their encounter at BP Pulse Live on her Instagram, external account.
