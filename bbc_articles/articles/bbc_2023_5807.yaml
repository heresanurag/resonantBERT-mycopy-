title: Biden lands in Belfast for Good Friday Agreement anniversary - BBC News
date: '2023-04-11'
section: General
url: http://www.bbc.co.uk/news/uk-northern-ireland-65246855
content: |-
  US President Joe Biden steps off Airforce One to greet UK Prime Minister Rishi Sunak in Belfast.

  US President Joe Biden was greeted by Prime Minister Rishi Sunak as he stepped off Airforce One in Belfast.

  His visit is to mark the 25th anniversary of the Good Friday Agreement - a peace deal which helped end 30 years of violent conflict in Northern Ireland.

  During his four-day visit, Mr Biden is also set to meet Irish President Michael D Higgins, and to visit County Mayo, where he has ancestral ties.
