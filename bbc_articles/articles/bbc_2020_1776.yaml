  Three other skaters have accused Mr Beyer and two other coaches - who are all from the FFSG - of abusing and raping them when they were minors. Jean-Roland Racle denies the accusations and Michel Lotz has not commented.

  Ms Abitbol and her skating partner, Stéphane Bernadis, are 10-time French national champions, and have won seven European medals. At the 2000 World Championships, the two became the first French pair to win a world medal in nearly 70 years.

  But in her book, Such a Long Silence, Ms Abitbol alleged that she was raped by Mr Beyer between 1990 and 1992. "He started to do horrible things leading to sexual abuse," she told L'Obs magazine. "It was the first time a man touched me."

  Sarah Abitbol and Stéphane Bernadis performing at the 2002 European Figure Skating Championships

  The former skater rejected Mr Beyer's apology and said that she wanted accountability for "all those who covered up [the crimes] both in the club and the federation".

  Mr Beyer, after coaching Ms Abitbol, went on to direct France's national skating teams. In the early 2000s, he was the subject of two investigations into misconduct.

  The second investigation, conducted by France's sports ministry, found repeated "serious acts" against young skaters. His contract as a technical adviser was terminated in 2001.
