title: Belfast International passengers complain of long delays - BBC News
date: '2019-03-11'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-47521609
content: |-
  Travellers complain as security lines stretching outside the building see 70 people miss flights.

  Passengers were waiting outside the door of the airport's departure terminal on Monday morning

  Belfast International Airport has been heavily criticised over long delays which saw passengers queuing outside the airport in freezing conditions.

  The Consumer Council said customers were "frustrated" by the length of time it was taking to get through security.

  Last month, the airport said it was expanding its security area from six to eight search lanes.

  But on Sunday the airport said it would have to reduce the number of lanes to carry out expansion work.

  This video can not be played To play this video you need to enable JavaScript in your browser. Graham Keddie said things would improve after delays on Monday caused dozens of passengers to miss flights.

  Travellers have taken to social media to complain about security lines stretching outside the terminal.

  Graham Keddie, managing director of Belfast International Airport, asked customers for "more forbearance", adding that work on the lanes would be finished before Easter.

  Some 70 people missed their flights on Monday, Mr Keddie told BBC Radio Ulster's Talkback programme.

