  • None Germany decides to leave history behind and prepare for war Although his government will feature almost entirely new names - Merz himself has never been a cabinet minister - there will be continuity at the defence ministry. Boris Pistorius, the Social Democrat defence minister in the outgoing government, is expected to remain in post. This will be the fifth so-called grand coalition (GroKo) - involving the big parties of the centre right and centre left since World War Two - but the parties were at pains to say it would not be like any previous government. With Germany in economic recession, though, one leading politician on the populist left, Sahra Wagenknecht, said they offered no answer either to Germany's economic crisis or the trade war. She said Germany was threatened with a third and fourth year in recession, which she dubbed "Merzession". Merz said he was confident that the coalition deal would be approved by their respective parties and they would be able to get to work in early May. Meanwhile, an Ipsos poll on Wednesday put Merz's conservatives in second place on 24% support, a point behind Alternative for Germany (AfD), whose co-leader Alice Weidel hailed the survey as unprecedented, and promised that "political change will come".
