content: |-
  The chancellor-in-waiting's conservatives have reached a coalition agreement with Germany's Social Democrats, five months after the last government collapsed.

  Germany is back, says Merz, after sealing government deal

  Friedrich Merz said the draft deal - with Germany's Social Democrats - aimed to create a strong government with courageous responses

  Germany's conservatives under Friedrich Merz have reached a deal with the Social Democrats to govern Europe's biggest economy, five months after the previous government collapsed. Merz, 69, said their agreement sent "a strong and clear signal" to Germans and the EU that they would get "a strong government capable of action". Germany was already in recession before it was buffeted by economic turbulence, caused by US President Donald Trump's trade tariffs. "The key message to Donald Trump is Germany is back on track," said the chancellor-in-waiting, promising to fulfil defence commitments and revive economic competitiveness.
  • None Follow live updates as China and EU hit back at Trump tariffs Merz and his coalition partners have been under intense pressure to put an end to Germany's political limbo since his Christian Democrats won federal elections in February. He has also just seen his party overtaken in an opinion poll by the far-right, anti-immigration Alternative for Germany (AfD). Announcing the government deal, Merz promised to reform and stabilise Germany, with a focus on migration, the economy and defence. "Europe can rely on Germany," he said, promising "a strong plan to bring our country to the forefront again". He will have to wait for the week starting 5 May for the new parliament to elect him as chancellor, but should have no problem with a 13-seat majority.

  The coalition parties had already signalled their urgency last month, when they pushed through significant reform of Germany's strict debt rules. Such changes mean the new government will be able to plough significant investment into the military and the country's crumbling infrastructure. Included in Wednesday's agreement were a series of measures to "control and largely end irregular migration", and impose border controls aimed at addressing one of the big concerns of voters in the February election. The AfD complained that the plans did not go far enough, accusing Merz of capitulating to the Social Democrats. In a recent report to parliament, Germany's armed forces commissioner highlighted dramatic shortages in the military across the board, from ammunition and soldier numbers to dilapidated barracks. Another significant part of the coalition deal is for defence spending to be increased, and for boosting the strength of the military. Although there will be no conscription, Merz said the coalition was aiming to follow a "Swedish model" of voluntary military service. "We hope that with enough volunteers, we will also be able to achieve an expansion of the Bundeswehr [German armed forces]," he said.
