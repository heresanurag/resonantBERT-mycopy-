title: Yes Sir, I Can Boogie singer dies aged 69 - BBC News
date: '2021-09-12'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-58533613
content: |-
  María Mendiola, one of the members of the duo Baccara, has died in Madrid at the age of 69.

  Baccara at the height of their success in 1977. María Mendiola (right) with Mayte Mateos

  María Mendiola, who sang the disco anthem Yes Sir, I Can Boogie, has died at the age of 69.

  The singer, who was one half of the Spanish duo Baccara, died in Madrid surrounded by her family on Saturday morning.

  "My dear Maria, a wonderful artist but above all my friend left us today," her bandmate Cristina Sevilla wrote on Instagram, announcing the news.

  "I can only thank so much love for how I have received from you."

