  LFB said firefighters were using a drone to survey the area affected by floodwaters, and traffic in the local area would be "heavily impacted". Crews from Euston, Islington, Soho and surrounding fire stations were at the scene on Sunday. The Metropolitan Police said officers were assisting fire crews, while the council said members of its emergency response team were also on site.
