id: bbc_2024_9995
title: 'Iceland: Northern Lights captured glowing over erupting volcano - BBC News'
date: '2024-05-11'
section: General
url: http://www.bbc.co.uk/news/world-europe-68693519
content: |-
  Volcanic eruptions have been taking place in the region since 14 January.

  A timelapse video has captured a volcano in Iceland spewing ash and clouds of smoke against the backdrop of the Northern Lights.

  The volcano on the Reykjanes peninsula has erupted several times this year, leading to a state of emergency being declared in southern Iceland in March.

  The Northern Lights, also known as aurora borealis, is caused by the interaction of the solar wind - a stream of charged particles escaping the Sun - and Earth's magnetic field and atmosphere.
