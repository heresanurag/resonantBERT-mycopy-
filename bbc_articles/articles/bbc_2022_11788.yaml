content: |-
  Max Verstappen's serene march to a second title continues with a comfortable victory in an eventful Dutch Grand Prix.

  Last updated on .From the section Formula 1

  Verstappen could clinch his second world title as soon as the Singapore GP later this month Max Verstappen's serene march to a second title continued with a comfortable victory in an eventful Dutch Grand Prix. The Red Bull driver had to pass Lewis Hamilton's Mercedes after a late safety-car period to take his 10th win in 15 races this year to extend his lead to 109 points. Hamilton was left fuming after Mercedes failed to change his tyres during the caution period. That left him vulnerable and allowed team-mate George Russell and Ferrari's Charles Leclerc to pass him after the restart to take the other podium places. Hamilton, who briefly had slim hopes of a victory with about 20 laps to go, saw them evaporate in a situation remarkably similar to the way in which he lost his eighth world title in Abu Dhabi last year. He managed to hang on to fourth ahead of Red Bull's Sergio Perez, Fernando Alonso's Alpine and Lando Norris' McLaren. Ferrari's Carlos Sainz finished fifth on the road but was demoted to eighth after a five-second penalty for an unsafe pit stop release.
  • None Hamilton taken to 'breaking point' as win slips away Verstappen has won 10 grands prix in a season for the second successive year. With seven races remaining in 2022, he has a chance to eclipse the all-time record of 13 wins in a season held jointly by Michael Schumacher and Sebastian Vettel Verstappen had been cruising to victory until a couple of caution periods in the final part of the race. Hamilton and Russell had moved past Leclerc using what was planned to be a one-stop strategy rather than the two used by Verstappen and Ferrari. Verstappen would have had to pass both Mercedes after his second stop but he was saved needing to by a bizarre sequence of events involving Yuki Tsunoda, driving for Red Bull's sister Alpha Tauri team. Tsunoda stopped on track after a pit stop saying a wheel was not on, but was told by the team that it was and to continue. He pitted, only to stop on track and force a virtual safety car. Verstappen used the VSC to pull in for his second stop and switched on to the hard tyre for what he expected to be the remainder of the race. Mercedes, who had already made what they expected to be their only stop at that point, took the opportunity of the VSC to stop again and fit medium tyres. When the VSC period ended, Hamilton began closing in on Verstappen, reducing his lead from 15.4secs to 10.7secs in six laps. But then with 16 laps to go there was a safety car when the engine in Valtteri Bottas' Alfa Romeo failed and he stopped on the pit straight. Verstappen pitted again for soft tyres, putting him behind both Mercedes but on better tyres, and then a lap later, as the field was directed through the pits, Russell made the call to do the same, while Mercedes did not change Hamilton's mediums. That left Verstappen right behind Hamilton for the restart on much grippier tyres, and he swept around the Mercedes at the first corner after the restart to take back control of the race. Hamilton swore on the radio to his team, saying he could not believe how much they had messed him up, as first Russell and then Leclerc passed him and deprived him of the podium place it appeared he had earlier locked away. Verstappen's second home win in as many years since Zandvoort returned to the calendar last year sent a capacity crowd of 105,000 wild, on a weekend that was effectively a festival devoted to worshipping a national hero. "We had to push the whole race," said Verstappen. "Of course with the virtual safety car, making the right calls is always a bit of a question mark but it worked out really well once we got back to the soft tyres. We had great pace again. "I had a good run in the restart [after the full safety car period], we had a bit more top speed and that helps to attack into Turn One and from there onwards we had really good balance in the car again. "It's always special to win your home grand prix, this year I had to work for it even more. An incredible weekend." Ferrari mechanics scramble to fit the left-rear tyre to Sainz's car at his opening pit stop Ferrari had started the race with Leclerc and Sainz in second and third, but the team that a few races ago had designs on the title had yet another bad afternoon. Sainz's race unravelled at his first pit stop, when the team did not have his left rear tyre ready - team boss Mattia Binotto said the call for him to pit had been made too late, when he was in the final corner, and did not give the mechanics time to ready the tyres. And Leclerc was demoted to what was looking to be a fourth place by Mercedes' strong race pace and one-stop strategy. The late safety car, and Mercedes' decision not to change Hamilton's tyres, gave him a second chance, though, and he followed Russell past the seven-time champion to take third. "To be honest, much better [than third] was difficult to do," said Leclerc. "We were a little unlucky with the VSC. I don't know if this would have changed anything, Max was too quick today. "As I said in Spa, the gap [in the championship] is now really big, we will take it race by race and try to maximise our potential and let's see what's possible." Leclerc may not be giving up the title fight yet, but Verstappen, it seems, is likely to clinch it when F1 goes to Asia after the next race in Italy this coming weekend. If he leaves the following race in Singapore with a lead of 138 points or more, he is world champion. Leaving Japan a week later, it needs only to be 112. It is coming, the only question is when.
