content: |-
  Firefighters inspect the smouldering remains of the recycling plant that exploded after a lightning strike.

  Firefighters inspect the smouldering remains of the food waste recycling plant that exploded after a lightning strike.

  The strike caused a biogas tank to explode at about 19:20 BST on Monday. There are no reported injuries from the blast at the facility near Yarnton, Oxfordshire.
