title: Korean leaders in ‘Hollywood’ meeting - BBC News
date: '2018-05-27'
section: General
url: http://www.bbc.co.uk/news/world-asia-44267234
content: |-
  South Korea's movie-style video shows its president meet Kim Jong-un for only the second time.

  South Korea has made a movie-style video showing its president, Moon Jae-in, meet his North Korean counterpart, Kim Jong-un, for only the second time.

  It comes as the two sides continue efforts to put a historic US-North Korea summit back on track.

  On Thursday US President Donald Trump cancelled the summit, scheduled for 12 June, but later suggested it might still go ahead.
