  Follow comprehensive live BBC Sport coverage of the Winter Games from South Korea on TV, Red Button, radio and online.

  The 23rd Winter Olympics take place in Pyeongchang, South Korea, from 9-25 February and BBC Sport will deliver comprehensive digital coverage. There will be network TV coverage around the clock from live action to highlights programmes brought to you by presenters Clare Balding, Hazel Irvine, Eilidh Barbour and Radzi Chinyanganya. There will be live action on the BBC Sport website and app, catch-up video highlights and on-demand clips, analysis, insight and news from the Games to audiences wherever they are, on whichever device they want, across all 17 days of action as well as on social media. Great Britain are aiming for their most successful Winter Olympics in history after UK Sport set a target of at least five medals from the Pyeongchang Games.

  Full coverage details (All times GMT and subject to late changes)

  It's the final day of competition at the Winter Olympics and medals are up for grabs in the four-man bobsleigh, women's curling and men's ice hockey.

