content: |-
  The Netflix programme will contain previously unseen police video and unheard audio recordings.

  New documentary on Fred and Rose West released

  The new documentary about Fred and Rose West will be released in May

  A new documentary about serial killers Fred and Rose West will contain "previously unseen police video and unheard audio recordings", Netflix has said. Fred & Rose West: A British Horror Story will detail how they tortured, raped and murdered an unknown number of women in Gloucester between 1967 and 1987. The new documentary will be centred on the victims' families, and how Gloucestershire Constabulary uncovered the crimes. Netflix said the documentary would give "insight into the pain and torment" that the families "went through for decades".

  Rose West is currently serving a life sentence after being found guilty in 1995 of murdering 10 girls and women, which included her 16-year-old daughter Heather and her eight-year-old stepdaughter Charmaine. Fred West never stood trial as he took his own life in prison in January 1995 after nine sets of bones were found under the couple's house.

  The documentary series will begin with Fred West being questioned regarding Heather's disappearance, before her remains were discovered at their home in Cromwell Street, Gloucester. The series will also focus on the subsequent trial, and the search for bodies away from the West's home. An ITV documentary, Fred and Rose West: Reopened, released in 2021, found potential evidence that suggested 15-year-old Mary Bastholm could be buried in the cellar of what is now the Clean Plate café in Gloucester. When the documentary was released, a detective chief inspector claimed Fred West was thought to be involved in her disappearance, as he had been a regular at the café, where Mary had worked as a waitress. However, Gloucestershire Constabulary did not uncover any human remains in the cafe. Fred & Rose West: A British Horror Story will be released on Netflix on 14 May.

