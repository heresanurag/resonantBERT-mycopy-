id: bbc_2018_15027
title: 'Lightwater crash: Nine people injured, three seriously - BBC News'
date: '2018-12-01'
section: Surrey
url: http://www.bbc.co.uk/news/uk-england-surrey-46411679
content: |-
  The crash between two vehicles happened at about 06:50 GMT on the northbound carriageway of the A322.

  The crash happened close to the junction with the M3, police said

  Nine people have been injured, three seriously, in a crash which closed a major road in Surrey.

  Seven people were taken to hospital after the crash between two vehicles at about 06:50 GMT on the A322 in Lightwater near the M3 junction.

  Police reopened the main carriageway at about 10:30 GMT but said slip roads remained closed for recovery work.

  The crash involved a white van and black saloon car and officers said both drivers had been spoken to.

  Of those hurt, three have "serious but non life-threatening injuries", four have minor injuries and two are "walking wounded".

