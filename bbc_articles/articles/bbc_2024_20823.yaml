  The Paris Olympics are getting under way, but how well do you remember Team GB successes from Games gone by? Try our quiz.

  Quiz: How well do you know Team GB's athletes?

  Team GB are taking more than 320 athletes to the Olympics in Paris as they aim to surpass the 64 medals, including 22 golds, won at Tokyo 2020. How closely have you followed the team over the years? With the Games getting under way, take our quiz to test your knowledge.
