  Andrew Main, 33, from Falkirk was allegedly assaulted near a Travelodge in Swansea.

  Murder probe as man dies four weeks after assault

  Andrew Main died in hospital on Wednesday following an assault in Swansea on 17 July

  A murder investigation has been launched after a 33-year-old man died four weeks after a serious assault in Swansea. Andrew Main, from Falkirk, died in hospital on Wednesday after the assault near the entrance to the Travelodge on Princess Way at about 02:00 BST on 17 July. South Wales Police previously charged two men, a 26-year-old man from Frome, Somerset, and a 27-year-old man from Bath, in connection with the incident. Det Ch Insp Matt Davies said: "Our thoughts are with the victim’s family."

  South Wales Police said its thoughts are with Andrew's family

  Family friend Nicola Whelan, who has organised a fundraising campaign for Mr Main's family, said she wants him to be remembered as "a hero". "It's really important for us all that Andrew is remembered as a hero, because he absolutely was one," she said. "He was fun-loving, carefree and, above all, a great dad, brother and friend. "We cannot put into words how much he will be missed." The force has urged anyone who may have witnessed the incident to come forward.
