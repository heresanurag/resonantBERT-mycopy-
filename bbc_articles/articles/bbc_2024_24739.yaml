content: |-
  Lee Carsley's time as interim England boss ends on 17 November - so who are the contenders to be named next permanent manager?

  Who will be England's next permanent manager?

  Three months ago, England were looking for a new manager. After Gareth Southgate's resignation, England Under-21s head coach Lee Carsley was named interim manager, but his hopes of landing the job on a permanent basis were dented by Thursday's 2-1 defeat by Greece in the Nations League. When Southgate stepped aside in July BBC Sport gave you seven candidates for the job. Former Liverpool boss Jurgen Klopp was first choice with 29% of the vote, while just 7% of voters selected Carsley. But the managerial landscape has changed since then, with high-profile options like Klopp and Mauricio Pochettino both taking new roles. So who are the contenders to be named England's next permanent manager?

  His chances of getting the job permanently may have been hit at Wembley on Thursday, but Carsley is still a frontunner. He had a 100% win record in charge of the Three Lions before defeat by Greece and the football played in his opening two fixtures was easier on the eye than it had been under Southgate. But his tactics against Greece - where he selected Jude Bellingham as a false nine and packed the midfield - raised eyebrows. Carsley has been pressed about whether he wants the job full-time and seemed to suggest on Thursday that he would want to return to his role within the Under-21s set-up if he didn't get the senior job. "My remit has been clear from the start - I'm doing three camps," said Carsley. As it stands, his time as interim manager is due to end in November, following games against Greece and the Republic of Ireland in the Nations League.

  The Manchester City boss has made it clear that he intends on managing an international side in the future. "I would like to train a national team for a World Cup or a European Championship," Guardiola said in February. His contract at City expires at the end of the season and no announcement has been made about his future. City, clearly, are keen to extend his deal but Guardiola's decision could be impacted by director of football Txiki Begiristain's decision to step down at the end of the season. Guardiola may see it as the perfect time for him to leave. Would the Football Association be happy to wait for the Spaniard, even if it meant going without a permanent manager until the summer of 2025?

  The Newcastle United boss was the most favoured Englishman on our list back in July, with 19% of the votes. Howe has enhanced his reputation since joining the Magpies in 2021, leading the club to fourth in the Premier League during his first full season in charge. The 46-year-old has a long-term deal at St James' Park and the club are keen to keep him. Howe was reportedly frustrated with the club's transfer activity in the summer, saying in July: "As long as I am happy and feel supported and feel free to do the work that I love to do at Newcastle, I’ll be very happy - and I am very happy."

  The German said he would take an extended period away from management after stepping down at Liverpool at the end of last season. But the 57-year-old took a role as the global head of soccer at the Red Bull group earlier this week - fewer than five months after his final game at Anfield. Klopp starts the role on 1 January 2025 but he reiterated during the announcement that he does not intend to return to management. "A few months ago I said I don't see myself on the sidelines any more and that is still the case," Klopp said on Instagram. Any slim hopes of appointing the German now look to be over.

  The former Chelsea and Brighton boss ticks a number of boxes for the FA given that he is English, plays an attractive brand of football and is available. Potter has been without a job since being sacked at Stamford Bridge in April 2023. The 49-year-old recently seemed to suggest he preferred the "day-to-day" of club management in a newspaper interview, but then said he is open to managing in both club and international football, during an appearance on Sky. "As an Englishman, of course it's a fantastic job but I'm supportive of whatever the FA decide to do and whoever the coach is," Potter told Sky Sports' Monday Night Football. "I think Gareth [Southgate] did a fantastic job and I'm sure Lee [Carsley] - for however long it is - will do really well. "I'm open to anything, to be honest."

  The Northern Irishman was one of the most coveted managers in the English game last summer. Both Manchester United and Chelsea were linked with the Ipswich Town boss before McKenna was convinced to sign a new four-year deal at Portman Road. McKenna guided the Tractor Boys to back-to-back promotions during his first two full seasons in charge, having been appointed in 2021, as they rose from League One. Ipswich are without a win in the Premier League this season but McKenna has a growing reputation for working with young players - particularly having been involved in the youth setups at both Manchester United and Tottenham previously - and playing in an attractive style. Whether McKenna, 38, would be willing to give up the day-to-day running of club management is questionable.

  Former Tottenham and Chelsea boss Pochettino had been an option until he was recently named manager of the United States. Thomas Tuchel is available having left Bayern Munich at the end of last season and the German would be the big name that many supporters crave. Jose Mourinho, now at Fenerbahce, has turned down approaches from the FA in the past while former Chelsea boss Frank Lampard remains out of work.

