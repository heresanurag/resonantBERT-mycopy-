title: 'County Tyrone: Four rescued from Dungannon house fire - BBC News'
date: '2025-02-04'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cn8x7jvd5nmo
content: |-
  Twelve people in total were taken to hospital after the fire at a semi-detached house in Dungannon.

  Four rescued from house fire by police officers

  As fire crews arrived the people had been led to safety by police officers

  Four people have been rescued from a house fire in Dungannon by police officers. Several of the officers were treated for smoke inhalation, with a total of 12 people taken to hospital. The Northern Ireland Fire Service were called to the incident in Cunninghams Lane at about 20:30 GMT on Monday. As fire crews arrived the people had already been led to safety from the house.

  A number of PSNI officers have also been treated for smoke inhalation

  Crews, wearing breathing apparatus, extinguished the fire and gave people first aid. They were then left in the care of Northern Ireland Ambulance Service (NIAS). Two fire appliances from Dungannon and one from Pomeroy were sent. The NIAS said a number of emergency crews were dispatched to the scene, as well as rapid response paramedics. Following initial assessment and treatment at the scene, 12 patients were taken to Craigavon Hospital by ambulance.

  The cause of the fire is being investigated. Cunninghams Lane had been closed but has now reopened.

  The flames had been extinguished by the time we arrived, but the smell of smoke hangs in the air. The paintwork on the front of this semi-detached property is scorched black in parts - the signs of extensive fire damage are evident. Only remnants of a front door remained at the entrance of the house, with shards of glass on the floor inside. A ladder was perched against the property, leading to an upstairs bedroom window which remained wide open, with curtains still hanging from the frame. Two fire officers were at the scene where they appeared to survey the damage with torches. A cordon was in place while officers in an unmarked police car kept watch.

  The road had been closed but has since reopened

  Democratic Unionist Party assembly member for Fermanagh and South Tyrone Deborah Erskine said it was a "disturbing incident". SDLP councillor Malachy Quinn added that there were "concerning news and images coming from Dungannon".
