title: 'Abergavenny fire: Town centre outbreak forces evacuation of homes - BBC News'
date: '2024-11-11'
section: Wales
url: http://www.bbc.co.uk/news/articles/c7v38dd65dpo
content: |-
  More than 100 firefighters have been involved in tackling the blaze in Abergavenny.

  Emergency services were called to the large town centre fire on Sunday evening

  Buildings have been destroyed after a large town centre blaze which was tackled by more than 100 firefighters. Gwent Police and 14 fire crews were called to the scene on Frogmore Street, Abergavenny, Monmouthshire, at about 20:35 GMT on Sunday. The Magic Cottage charity shop and other nearby buildings have been destroyed and a building remained alight on Monday morning, but no injuries have been reported. About 12 nearby residents from three properties, who had been evacuated to Abergavenny Leisure Centre, have now left the leisure centre, according to Monmouthshire council's leader.

  More than 100 firefighters have been tackling the blaze which has destroyed buildings

  Mary Ann Brocklesby said: "I can only imagine how awful they must’ve felt being woken in the middle of the night and being taken to the leisure centre." She said some residents have been able to return home, while others were with friends. Those who had been in social housing were "being supported to go to a place where they feel safe". "This is dreadful, absolutely dreadful, horrific, the scene, the fire, the smoke, the fear, so frightening for residents and for people living around here," she added.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Firefighters have been using four water bowsers, two aerial ladder platforms, and a high volume pump (HVP) to tackle the flames. A cordon covering Frogmore Street, Regent Street, Princes Street and Baker Street is expected to remain in place for some time. Police urged residents to ensure all windows and doors were closed due to the smoke.

  Emergency services remain at the scene on Monday following the break out of a large fire

  South Wales Fire and Rescue Service said the fire had caused the first and second floors and roof of a building to collapse. "Crews [are] working arduously to prevent further spread to neighbouring properties," it added. A "thorough investigation" alongside Gwent Police crime scene investigators will be carried out to establish the cause.

  Local resident Joe Pugh said the "air was thick with smoke" in the town centre on Sunday night. “From what I could see it was widespread damage," he told BBC Radio Wales Breakfast. “It was centred around a lovely old row of shops which are well known to residents. The reports were that it was spreading quite rapidly which was alarming, but thankfully no-one [was] hurt."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Mr Pugh said the affected building was best known for formerly being home to family-run business Richards of Abergavenny. "Frogmore Street is one of the main arteries through town for pedestrians and that building is one that was occupied for 90, 100 years by a family business... I think the whole town will feel the effects of this for some time." Louise Dryland, another local resident who went to the scene after seeing reports of the fire on social media, said she saw the building collapse in front of her. "You could hear the snapping and cracking, and then [the firefighters] pointed their hoses back, and it all when down in front of us," she said.

  The blaze broke out at the rear of the Magic Cottage charity shop, which was destroyed by the flames

  Mustafa Burak Karaoz, who also lives nearby, said he saw crews "using water from the river to fill the fire engines" as he passed by. Richard John, a Conservative councillor for Mitchel Troy and Trellech ward, described the fire as "horrendous" and "heartbreaking" as he thanked emergency services on X, external, formerly known as Twitter.

  The Magic Cottage charity shop had moved into the building last year, as shown in this Google Streetview photo from 2023

  Laura Wright, a Labour councillor for Grofield ward, said the fire was "absolutely devastating". She spoke of her gratitude, external to those "working hard to get everything under control and make sure that residents are safe".
