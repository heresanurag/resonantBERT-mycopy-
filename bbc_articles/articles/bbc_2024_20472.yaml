title: 'Watch: Moment road collapses from severe flash flooding - BBC News'
date: '2024-08-30'
section: General
url: http://www.bbc.co.uk/news/videos/c93p1690gq3o
content: |-
  New York Governor Kathy Hochul visited the area that was damaged by the storm, calling the aftermath 'extraordinary'.

  Video shows the moment a road in Suffolk County, New York collapses due to flash flooding late last week. The heavy rainfall also caused severe flooding to homes, businesses and institutions, damaged roads and causing the breach of two dams.

  Governor Kathy Hochul visited the area that was damaged by a storm calling it 'extraordinary'.

  Hochul has secured a Federal Emergency Declaration from President Biden, which means that the county will have access to assistance from the Federal Emergency Management Agency.
