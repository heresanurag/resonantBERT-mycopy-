  It is believed the Bayesian was struck by a tornado over the water - otherwise known as a waterspout - which caused the vessel to capsize and sink to the seabed. There are also reports that the boat's mast snapped, while other factors include water entering through hatches which may have been open due to hot temperatures. The Italian coastguard said on Tuesday afternoon that their search was continuing and that divers were working out how to safely enter the wreckage. Earlier a member of the diving team, Marco Tilotta, said accessing it had been difficult because the hull of the Bayesian is titled at a 90 degree angle on the seafloor. He told Reuters news agency that there was a "a world of objects" obstructing the narrow stairs leading into the cabins. "We are not stopping," he added. "We have resources, manpower and means. Our goal is to find all the people who are missing, so that is our job." Divers are only able to spend around 12 minutes under water, meaning that by the time they reach the wreckage, they only have about 10 minutes to search it. As well as several teams of divers, the coastguard said they had five patrol boats, at least two helicopters and a remotely operated underwater vehicle. Specialist divers trained to operate in small spaces have been flown in from Rome and Sardinia.

  The sailing vessel, which was 56m (183ft) long and flying a British flag, was carrying 10 crew and 12 passengers when it sank. Among the missing are Mike Lynch and his 18-year-old daughter Hannah, as well as Jonathan Bloomer and his wife Judy. Neda Morvillo, an American jewellery designer, and her husband Chris are also missing. The news was confirmed by his law firm Clifford Chance. Mr Lynch was acquitted in June of multiple fraud charges relating to the $11bn (£8.6bn) sale of his company Autonomy to the US computing giant Hewlett-Packard in 2011. A relative of one of the survivors said lawyers who had represented Mr Lynch in the legal proceedings - where Mr Bloomer had been a defence witness - had been invited on board the Bayesian to celebrate. Ayla Ronald, a senior associate at Clifford Chance, and her husband were among the people rescued from the yacht when it sank. Separately, it was confirmed on Tuesday that Mr Lynch's co-defendant Stephen Chamberlain, 52, died after being hit by a car while out running in Cambridgeshire on Saturday. His family described him as a "much-loved husband, father, son, brother and friend".
