title: 'Bayesian yacht sinking: Recovered body believed to be chef Recaldo Thomas
  - BBC News'
date: '2024-08-21'
section: Europe
url: http://www.bbc.co.uk/news/articles/c3rd9gr8vd8o
content: |-
  Recaldo Thomas, an experienced and respected sailing chef, was saving money to restore his late parents' house.

  Canadian-Antiguan national Recaldo Thomas was working on the Bayesian as a chef

  A body recovered near the luxury yacht which sank off the coast of Sicily is believed to be that of chef Recaldo Thomas. The Canadian-Antiguan national was understood to be one of 22 people aboard the Bayesian when it sank during a violent storm on Monday. His friend Gareth Williams described him as well-loved and kind, with "the deepest, most sultry voice in the world, and a smile that lit up the room". Divers are struggling to reach the cabins of the sunken vessel as they search for six missing passengers including the British tech entrepreneur Mike Lynch and the Morgan Stanley International bank chairman Jonathan Bloomer.

  Mike Lynch and his 18-year-old daughter Hannah are among the six people still missing

  British investigators arrived in Italy on Tuesday to assess what happened during the extreme weather that hit the yacht. The Bayesian capsized around 700m (2,300ft) from Porticello, just east of Sicily's capital Palermo, early on Monday morning. It now lies on the seabed at the depth of 50m. Of the 22 people on board, 15 survived - including a British mother who described holding her baby girl above the surface of the sea to save her from drowning. Dr Fabio Genco was part of the local emergency medical service that treated the survivors. He told the BBC's Newsnight programme that the word all of them "kept repeating was the 'darkness' during the shipwreck." "They spoke of about five minutes, from three to five minutes, from the moment the boat was lifted, raised by the waves of the sea until it sank." Dr Genco added that all the survivors had been discharged from hospital.

  So far only one body, that of Recaldo Thomas, has been found. Mr Williams said he had known the chef for 30 years as they had grown up together in Antigua, where Thomas lived during yachting’s off-season. "He told me just the other day that he needed to work two more seasons to fix up his late parents' house. He loved yachting, but he was tired," Mr Williams told the BBC's Insaf Abbas. Another friend, Eli Fuller, said he first met the chef 25 years ago and that he was a role model to young people. "Personality was very important in his job. The world's richest people want to hang out with someone social. He was sought after," Mr Fuller said. "The kids would see all these white people working on yachts. For them to see an Antiguan man travelling all over the world – it was important for our community," he added.

