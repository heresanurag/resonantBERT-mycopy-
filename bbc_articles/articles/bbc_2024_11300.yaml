title: Parties pressed over funding of election pledges - BBC News
date: '2024-06-10'
section: Politics
url: http://www.bbc.co.uk/news/articles/c844wzmnzjzo
content: |-
  Labour and the Tories say their policies are fully funded - but have ruled out major tax rises.

  Labour and the Conservatives have been challenged over how they would fund their election pledges, ahead of their manifestos being launched next week. The independent Institute for Fiscal Studies has warned the next government would have to cut the scope of what the state provides or increase taxes to maintain levels of departmental spending. Both parties have said they will not raise the rate of income tax, National Insurance or VAT. On the campaign trail on Sunday, Labour announced plans to build more prisons, while the Tories focused on welfare reform and the Liberal Democrats on support for carers.

  Speaking on a visit to Essex, Labour leader Sir Keir Starmer refused to rule out spending cuts to public services but said his party would "not be raising taxes on working people". "All of our plans are fully funded and fully costed and none of them require tax rises over and above the ones that we've already announced," he said. Labour has already said it would end tax breaks for private schools which exempt them from VAT and close the loopholes allowing some people with non-dom status to avoid paying tax in the UK if it wins power. It has also promised a time-limited windfall tax on the excess profits of oil and gas companies. Asked if he could rule out spending cuts, Sir Keir said: "We are not returning to austerity. We will grow our economy." However, the Scottish National Party challenged Sir Keir to "finally start being straight with the public and explain where the Labour axe will fall on public services". The party said £18bn of public service cuts were coming down the line "because of the decisions made by both the Conservatives and Sir Keir Starmer's Labour Party".

  Appearing on the BBC's Sunday with Laura Kuenssberg programme, Conservative Work and Pensions Secretary Mel Stride was also pressed on how his party would fund their spending commitments. These include £1.3bn to allow higher earners to keep child benefit payments, £2.4bn to raise the tax-free pensions allowance and £2.5bn to introduce mandatory national service for 18 year olds. Mr Stride said his party would pay for these policies by raising £6bn from cracking down on tax avoidance. Asked why this had not already been done already by past Conservative governments, Mr Stride said: "We have been doing it and there’s more we can do."

  Meanwhile, Reform UK has said it would save £50bn a year by cutting "wasteful spending" and bureaucracy. Asked which public services his party would get rid of, leader Nigel Farage told the BBC: "It’s not about getting rid of public services, it’s about making them more efficient. "It’s about the National Health Service not swallowing up huge amounts of money in diversity training, and things like this." He called for an "open debate" about the future of the health service, arguing "the NHS is not working the way it was 20 years ago", despite taking up a higher percentage of government spending. He added that a "mass simplification of the tax system" would "bring us enormous savings". Reform has said it would increase the threshold when people start paying tax to £20,000 a year, as well as abolishing inheritance tax for all estates worth less than £2m.

  On Sunday, Labour set out plans to build more prisons in England by allowing ministers to bypass the traditional planning process. However, shadow justice secretary Shabana Mahmood declined to rule out continuing a scheme that allows some prisoners to be freed early to deal with overcrowding, despite Sir Keir criticising it. Ms Mahmood said it would be "irresponsible" to make a decision on the future of the scheme without seeing figures on how many offenders had been released. Elsewhere, the Tories pledged almost £730m to expand NHS mental health treatment in England as part of moves to cut rising welfare costs.

