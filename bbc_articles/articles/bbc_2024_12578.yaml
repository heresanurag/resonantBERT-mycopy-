  Player of the match, India batter Suryakumar Yadav: "When I go into the game I'm very clear in my mind what I want to do. "Rashid Khan is very difficult to pick, he's the best bowler in the world, you can't let him dominate, you have to be a step ahead. I managed to be on the right side. India captain Rohit Sharma: "We adapted well and got 180, which was a great effort from the batters. "We know Jasprit Bumrah's class and what he can do. It's important for us to use him smartly regardless of conditions." Afghanistan captain Rashid Khan: "We could've done it had we executed smarter. "My bowling has been coming out well, I am hitting the right areas consistently, but it's the match result that matters most."
