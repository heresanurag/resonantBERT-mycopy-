  Details and reaction as First Minister Mark Drakeford announced changes to lockdown rules.

  Barry Island was popular with visitors when the first lockdown was lifted last summer Image caption: Barry Island was popular with visitors when the first lockdown was lifted last summer

  Wales is in for a "better summer" this year than in 2020, the first minister has forecast.

  Mark Drakeford was not talking about any potential for a heatwave, but about us being able to do more in our daily lives due to less tight lockdown measures.

  "I remember saying some months ago, when I was being asked to look forward and my ambitions for dealing with coronavirus, I said what I hoped we will be able to do would be to lift restrictions earlier in the year than we were able to do last year, and for them to last longer over the summer," he said at today's press conference.

  "Some of the things that I have announced today - indoor hospitality, the reopening of the whole of tourism accommodation and so on - we were doing that well into the summer last year, and we will be doing it in May, I hope, this year.

  "So we are certainly further ahead than we were 12 months ago."
