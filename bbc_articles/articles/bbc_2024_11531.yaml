  Who can I vote for in the general election?

  The UK general election takes place on Thursday, when people can vote for the person who goes to represent their area in the House of Commons. You can use our lookup to find out which constituency you are in, who is standing as a candidate in your area and to which polling station you can go to vote.

  A modern browser with JavaScript and a stable internet connection is required to view this interactive. Opens in a new browser tab More information about these elections Who won in my area? Enter your postcode or constituency name to find out There is currently a problem with the service. Please try later. Please select an area on the map or try another postcode search. To make sure you get the correct information, please choose your address:

  If you want to browse through the constituencies you can use our A-Z page. Big changes have been made to the political map since 2019. Boundaries have changed and many constituencies will be new or different from the last general election for millions of people. There are 650 constituencies across the UK and each returns one MP to the House of Commons in Parliament in Westminster. In England there are 543; 57 in Scotland; 32 in Wales and 18 in Northern Ireland. Your vote decides who becomes the local MP and which party wins the UK's general election overall. You can vote in person on 4 July between 07:00-22:00 BST and you will need ID to vote.

  There are more than 4,500 candidates from about 100 different parties. No party is standing in every constituency. There are also more than 450 independent candidates, who are not affiliated to any party, standing across the UK at this election.
