title: 'Covid-19: Sajid Javid expects a ''normal Christmas'' despite coronavirus pressure
  - BBC News'
date: '2021-10-25'
section: UK
url: http://www.bbc.co.uk/news/live/uk-59034005
content: |-
  The health secretary says it is his belief that the UK will avoid another Christmas lockdown.

  There was no legal requirement for fans at this Manic Street Preachers gig in Cardiff to social distance Image caption: There was no legal requirement for fans at this Manic Street Preachers gig in Cardiff to social distance

  Wales' top doctor has expressed concern that some people are behaving as if the pandemic is over by ignoring Welsh laws on face coverings and not social distancing.

  Wales' case rate is at a record high of 716.9 cases per 100,000 people - the highest of all the UK nations.

  It has led ministers to look at extending the use of NHS Covid passes for a wider range of venues, such as cafes, bars and restaurants.

  Wales' chief medical officer Dr Frank Atherton tells BBC Wales: "A very significant proportion of the Welsh population is still behaving with extreme caution and realises that we are not out of the woods with this yet, but there is a sense other places that it is all over."

  He says he worries when he sees people not wearing face coverings or crowding into indoor spaces without observing social distancing.

  Dr Atherton warns that unless people follow Covid rules, some of the "more draconian" measures and laws may have to return.
