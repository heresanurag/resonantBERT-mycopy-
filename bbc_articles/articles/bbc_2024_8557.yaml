content: |-
  Lloyd Martin says anyone can run a marathon as he aims to set a record in the London Marathon.

  A teenage runner with Down's syndrome is hoping to become the youngest person with a learning disability in his category to complete a marathon.

  Lloyd Martin, 19, whose family is from Cardiff, will run the London Marathon on 21 April with his mum Ceri Hooper, 54, as his guide.

  "I love running with my mum. She's a marathon runner. I love her, she's a legend," he said.

  Guinness World Records has created a record title for Lloyd to attempt, his family said, which would would make him the youngest to finish a marathon in what it calls the intellectual impairment category (LL2).
