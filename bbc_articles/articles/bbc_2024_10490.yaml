title: Michael Cohen faces brutal questioning at Trump trial - BBC News
date: '2024-05-21'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68980353
content: |-
  The BBC's Nada Tawfik explains how Donald Trump's lawyer accused Cohen of lying in his testimony.

  On his third day on the stand in Donald Trump's criminal trial, Michael Cohen described talking to his boss, the former president, directly about a hush-money payment to adult-film star Stormy Daniels.

  But Todd Blanche, Trump's attorney, accused Cohen of lying, saying the alleged call was not about the hush money.

  The BBC's Nada Tawfik explains why Thursday was one of the most intense days of cross-examination yet.
