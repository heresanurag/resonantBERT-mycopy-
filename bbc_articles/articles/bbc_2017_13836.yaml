id: bbc_2017_13836
title: 'Ex Met detective: Sex cases review will highlight police cuts - BBC News'
date: '2017-12-20'
section: General
url: http://www.bbc.co.uk/news/uk-42423593
content: |-
  Former Met Police Det Insp Hamish Brown says "there has to be some give somewhere" when police are faced with cuts.

  Former Met Police Det Insp Hamish Brown says the force "fell short" in the two collapsed sex cases of Liam Allan and Isaac Itiary.

  However, he says with 10,000 officers cut from the organisation, "there has to be some give somewhere".
