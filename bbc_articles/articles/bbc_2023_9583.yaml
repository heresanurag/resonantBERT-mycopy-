  • None He was four guys in one - how do Celtic replace Postecoglou? Spurs have spent 10 weeks searching for Conte's successor, with Julian Nagelsmann, Luis Enrique, Arne Slot, Graham Potter, Julen Lopetegui, Rodgers and Pochettino all linked with the role at some point. Since losing 2-0 against Liverpool in the 2019 Champions League final, they have claimed just one top-four finish in the subsequent four seasons. Postecoglou is no stranger to arriving at a club facing a significant task though, having taken over Celtic in the summer of 2021 after they had finished the season 25 points behind champions Rangers. When he arrived at Celtic, chief executive Peter Lawwell had been replaced by Dominic McKay, Nick Hammond stepped down as head of football operations and long-serving captain Scott Brown left to join Aberdeen. There are several similarities as he walks through the door at Tottenham Hotspur Stadium, with chairman Levy searching for a new sporting director following the exit of Fabio Paratici, who resigned after losing his appeal against a 30-month ban from football. Addressing the uncertainty surrounding the future of striker Harry Kane - with Real Madrid showing interest in the England captain - will be high on the agenda this summer as the new manager looks to shape a squad capable of taking Tottenham back into the Champions League. Postecoglou won five trophies across two seasons with Celtic Postecoglou's playing career was spent in Australia, primarily with South Melbourne, where he played under Ferenc Puskas, the legendary Hungarian to whom he attributes his coaching philosophy. He stepped into management in 1996 with South Melbourne before winning back-to-back A-League titles with Brisbane Roar between 2009 and 2012. After a season with Melbourne Victory he became manager of Australia in 2013 and guided his country to the 2014 World Cup as well as victory in the 2015 Asian Cup. Further silverware followed during his time in Japan with Yokohama F Marinos, where he ended the club's 15-year wait for a J-League title in 2019. Few in Scotland knew much about Postecoglou when Celtic appointed their new manager two years ago, but after initially struggling he delivered five trophies across two seasons.
