  Speaking to the same programme, Chief of the UK Defence Staff Sir Tony Radakin said Russia had suffered its worst ever month for casualties since the start of the Ukraine war, with around 1,500 dying or wounded every single day. Sir Tony said the losses were "for tiny increments of land" but that there was "no doubt that Russia is making tactical, territorial gains and that is putting pressure on Ukraine". "Russia is spending over 40% of its public expenditure now on defence and security - that is an enormous drain on Russia as a country. "I’m saying the longer the war goes on, the more difficult it is." He reiterated the UK government's stance that Western allies would be resolute for "as long as it takes" adding: "That’s the message President Putin has to absorb and the reassurance for President Zelensky." Former Labour minister Lord Peter Mandelson said: "Whatever happens to the fringes of Ukraine territory - and in that I don’t think anyone should be dictating to the Ukrainians what they do - what is sacrosanct is their freedom. That’s not up for grabs." He said the UK should work with the US to secure Ukraine's freedom and its borders to ensure Russia "can't invade again". He added that would be possible, not by offering Ukraine Nato membership, but by building "stronger, deeper" economic relationships with the country. There have been reports that Lord Mandelson could be appointed the UK's new ambassador to the United States. Asked if he was in the frame for the high-profile position, he said: "Nobody has spoken to me about this job." On whether he would be interested, he said he would be "very interested indeed in giving advice about trade to whoever is appointed".

  In addition to criticising the amount the US is spending to support Ukraine, Trump has also repeatedly urged Nato members to spend more on their own defence, accusing European countries of free-riding on America. Nato countries are expected to spend 2% of their national income on defence. At the moment 23 countries - including the UK - meet the target, compared to just six in 2021. The Labour government has committed to increasing spending from 2.3% to 2.5% - but has not set a date for hitting the figure. Jones said the government would not commit to a deadline until it had completed its strategic defence review into the current state of the armed forces.
