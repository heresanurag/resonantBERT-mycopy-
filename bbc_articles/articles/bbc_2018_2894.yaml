title: 'Stephen Hawking: Empty chairs, black holes and #PiDay - BBC News'
date: '2018-03-14'
section: BBC Trending
url: http://www.bbc.co.uk/news/blogs-trending-43397847
content: |-
  People have been creating and sharing online tributes to Professor Stephen Hawking

  Many on social media have been sharing this image of Professor Hawking performing The Galaxy Song during a Monty Python tour in 2014

  Millions of people across the globe have flooded social media with tributes and illustrations expressing their sadness at the death of the renowned physicist Professor Stephen Hawking.

  Many artworks posted in honour of the professor focus on his iconic mobility chair.

  One such image which has been widely shared depicts the famous chair with an array of glowing stars emanating from the seat.

  The picture was originally posted by news website Pictoline with the caption, "Goodbye, Stephen Hawking".

