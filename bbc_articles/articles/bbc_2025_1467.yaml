title: 'Watch: Trump and Musk discuss conflict of interests - BBC News'
date: '2025-02-19'
section: General
url: http://www.bbc.co.uk/news/videos/c1enp4gpdgqo
content: |-
  Asked about potential conflicts between his businesses and US government role, Musk said he’s “never asked the president for anything.”

  President Donald Trump and Elon Musk defended the role of Doge, the non-governmental agency which he is in charge of, during their first joint TV interview on Tuesday evening.

  Asked about potential conflicts between his businesses and US government role, Musk said he's "never asked the president for anything."

  "If there's a conflict, he won't be involved," Trump added.
