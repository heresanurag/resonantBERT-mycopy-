title: 'General election 2024: Treasury Letter in full - BBC News'
date: '2024-06-05'
section: Politics
url: http://www.bbc.co.uk/news/articles/cd1122q14dxo
content: |-
  A letter sent by a top Treasury official says the Tory attack on Labour's tax plans was not produced by the civil service.

  A letter sent by James Bowler, chief Treasury civil servant to Labour's Darren Jones said the Conservatives' assessment of Labour's tax plans shouldn't "be presented as having been produced by the civil service". Here is the letter in full:

  Thank you for your letter dated 24 May 2024 regarding the presentation of opposition policy costings. As you will be aware, when costing the policies of opposition parties HM Treasury and the wider Civil Service follow established guidance set out in the directory of the Civil Service guidance. As per this guidance, the costing produced by HM Treasury and the wider civil service are published on the gov.uk website. As you will expect, civil servants were not involved in the production of presentation of the Conservative Party's document 'Labour's Tax Rises' or in the calculation of the total figure used. In your letter you highlight that the £38bn figure used in the Conservative Party's publication includes costs beyond those provided by the civil service and published online by HM Treasury. I agree that any costings derived from other sources or produced by other organisations should not be presented as having been produced by the Civil Service. I have reminded Ministers and advisers that this should be the case.
