content: |-
  The families of the two people killed in Friday's attack issue tributes as they are officially named by police.

  University vice-chancellor: 'Not the time' for policy discussion

  The vice-chancellor of the University of Cambridge says "now is not the best time to be trying to formulate public policy" on the early release of prisoners. He was speaking amid a row between the Tories and Labour over the timing of the introduction of the laws that allowed attacker Usman Khan to be released from prison last year. Asked about the debate, Prof Stephen J Toope says: "Frankly I'm not a politician." He says he is thinking about the grieving families and the injured recovering in hospital. "This is an attack on our community and it was intended as such," the vice-chancellor says. "It was meant to produce a form of terror and sadness and it's clearly done that... it's made people very very sad,"
