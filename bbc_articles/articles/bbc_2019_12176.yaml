id: bbc_2019_12176
title: US troops leave Syria border ahead of Turkish offensive - BBC News
date: '2019-10-08'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-49965076
content: |-
  Footage of US-military vehicles leaving the Syrian border area ahead of a planned Turkish offensive.

  Kurdish fighters in northern Syria have accused the US of betrayal, after American forces abruptly began to pull back from the border area ahead of a planned offensive by Turkey.

  US-military vehicles were filmed leaving positions near the border towns of Sari Kani and Tal Abyad
