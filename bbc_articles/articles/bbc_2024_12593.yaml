  You named Denmark's Morten Hjulmand as your player of the match in England's 1-1 draw with Denmark at Euro 2024.

  Denmark's Hjulmand is your man of the match

  This video can not be played To play this video you need to enable JavaScript in your browser.

  We asked you to rate the players during England's 1-1 group-stage draw with Denmark at Euro 2024. Denmark's Morten Hjulmand was your man of the match after scoring an excellent equaliser, being given an average mark of 7.03 out of 10. Defender Marc Guehi was rated as England's best player with a score of 5.60.

