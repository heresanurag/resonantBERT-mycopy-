title: Adele gives first taste of new song Easy On Me and confirms release date -
  BBC News
date: '2021-10-05'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-58802096
content: |-
  The pop star posts a 21-second clip of a black-and-white video for a song called Easy On Me.

  Adele is seen looking in the rear view mirror of a car in the video

  Adele has released a snippet of her first new music for six years, and revealed that the full song will be out next week.

  The pop star posted a 21-second black-and-white clip on Twitter, showing her putting a cassette bearing the song's title, Easy On Me, into a car stereo.

  That's followed by 13 seconds of the song's instrumental piano introduction.

  Her tweet said Easy On Me will be released on Friday, 15 October, with her fourth album expected to follow.

  It comes after posters and projections appeared around the world bearing the number 30, which is expected to be the title of the highly anticipated album.

  The clip was watched five million times in the first hour on Twitter and Instagram, a figure that had doubled by the end of the day.

  According to La Presse, the clip was shot in the Canadian Eastern Townships in September.

  It was directed by Quebec filmmaker Xavier Dolan, who previously provided the visuals for her hit Hello. The 2015 video now has more than 3 billion views.

