id: bbc_2021_928
title: 'Covid-19: Futures of drinking Senedd members questioned - BBC News'
date: '2021-01-23'
section: General
url: http://www.bbc.co.uk/news/uk-wales-55733457
content: |-
  It is claimed they were seen drinking on Welsh Parliament premises when a ban on its sale in pubs was in force.

  Questions should be asked if politicians who drank on Welsh Parliament premises during a pub alcohol ban can stand for re-election, an ex-standards official has said.

  Senedd Tory leader Paul Davies, Darren Millar and Labour's Alun Davies have apologised - they are not thought to have broken the rules, but the two Tories admitted it would not be seen as in their spirit.

  A fourth Senedd Member Nick Ramsay has denied being part of the gathering.
