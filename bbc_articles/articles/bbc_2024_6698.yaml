title: 'Southampton Fire: Drone video shows fire burn into the night - BBC News'
date: '2024-03-07'
section: General
url: http://www.bbc.co.uk/news/uk-england-hampshire-68499487
content: |-
  Flames could be seen coming from a building late into Wednesday near Southampton's St Mary's Stadium.

  Video shows fire crews working into the night at the scene of a huge fire near a football stadium.

  It broke out at industrial units close to St Mary's Stadium in Southampton sending a vast plume of smoke into the sky over the city on Wednesday, at about 13:00 GMT.

  At its height more than 100 firefighters were at the fire which led to the Saints Championship match against Preston being called off.

  Marine Parade remains closed and people are being asked to avoid the area.

