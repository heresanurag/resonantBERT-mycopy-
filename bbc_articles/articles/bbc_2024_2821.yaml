title: Jennifer Crumbley takes stand at involuntary manslaughter trial - BBC News
date: '2024-02-02'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68176413
content: |-
  The mother of Ethan Crumbley said she was unaware he had serious mental health issues despite warnings, ahead of the 2021 school shooting.

  Jennifer Crumbley took the stand in her own defence at her trial for involuntary manslaughter.

  The mother of Michigan school shooter Ethan Crumbley, who killed four students and injured seven people at Oxford High School in 2021, is accused of failing to stop her son from carrying out a deadly school shooting. The boy's father had given him a gun as an early Christmas gift.

  In her testimony, Ms Crumbley said she was unaware of her son's mental health issues despite warnings from a school counsellor.

