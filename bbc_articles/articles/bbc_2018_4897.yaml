title: 'Commonwealth Games: Sarah Vasey and Alice Tai win gold for England - BBC Sport'
date: '2018-04-06'
section: Commonwealth Games
url: http://www.bbc.co.uk/sport/commonwealth-games/43669159
content: |-
  Sarah Vasey wins gold in the women's 50m breaststroke while England team-mate Alice Tai wins the women's S9 100m backstroke.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England's Sarah Vasey won gold in the women's 50m breaststroke on her Commonwealth Games debut. Alice Tai won another gold for England in the women's S9 100m backstroke while compatriot Lewis White took silver in the men's S9 100m freestyle. Scotland's Duncan Scott won bronze in the men's 200m freestyle before team-mate Mark Szaranek took silver in the men's 400m individual medley. England took silver ahead of Scotland in the men's 4x100m freestyle relay. Australia won gold in three minutes 12.96 seconds with England's Ben Proud, David Cumberlidge, Jarvis Parkinson and James Guy clocking 3:15.25. Scotland's Scott won his second bronze of the day alongside Jack Thorpe, Kieran McGuckin and Stephen Milne as his team finished a further 0.61 back. Adam Peaty also set a new Games record in reaching the 100m breaststroke final. England's Olympic champion won his semi-final in 58.59 seconds and will face compatriot James Wilby, the 200m breaststroke champion, in Saturday's final (10:48 BST). Overall, it was Australia's day in the pool as the hosts won 15 medals, six of them gold.

  Vasey beat Jamaica's Alia Atkinson in a time of 30.60 seconds to claim her gold before Scotland's Szaranek was beaten by Clyde Lewis in the 400m individual medley, clocking four minutes 13.72 seconds to finish 0.60 behind by the Australian. Scott (1:46.30) was third in the 200m freestyle behind Australians Kyle Chalmers and Mack Horton, with England's James Guy finishing in fourth. South African Chad le Clos won the men's 50m butterfly but finished seventh in the 200m freestyle shortly afterwards.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Le Clos was favourite heading into the race but could not keep up the pace he set in the first 100 metres as Chalmers and Horton, the 400m champion, charged to gold and silver respectively. Guy, the 2015 world champion, had hoped to challenge but failed to add to the 400m bronze he won on Thursday as he was just beaten to a place on the podium by British 100m record-holder Scott. Tai's gold medal-winning time of one minute 8.77 seconds was just short of her own world record and it claimed England's 100th Commonwealth gold medal in swimming. Scotland's Kathleen Dawson beat England's Lizzie Simmonds in a race-off to qualify for Saturday's women's 100m backstroke final after both finished their semi-finals in a time of one minute 00.67 seconds.
