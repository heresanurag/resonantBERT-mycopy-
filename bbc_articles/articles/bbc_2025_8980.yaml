id: bbc_2025_8980
title: 'Newspaper headlines: ''I''m not bitter'' after 38 years in jail and ''golden
  age'' of weight-loss drugs - BBC News'
date: '2025-05-14'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cql252n2qd7o
content: |-
  Peter Sullivan's release after 38 years wrongly spent behind bars features on many of Wednesday's papers.

  With the headline, "cleared after 38 years", The Daily Mirror, external is one of several papers to highlight the case of Peter Sullivan, after his conviction for the murder of Diane Sindall in 1986 was dramatically quashed yesterday.

  The Sun, external describes the 68-year-old as "the victim of Britain's longest-running miscarriage of justice", and says he was "seen sobbing" on a video link from jail as he learned he would be freed on DNA evidence.

  The Daily Mail, external focuses on what it calls Mr Sullivan's "extraordinary reaction" to his release, noting he said was "not angry" and "not bitter", but "simply anxious" to make the most of the rest of his life.

  The Daily Telegraph, external says counter-terrorism police, investigating the arson attacks on properties and a car linked to Sir Keir Starmer, are considering the possibility that a hostile state may be involved.

  The paper suggests the targets have "raised suspicions" there was a "significant degree of planning".

  It says the head of Counter Terrorism Command has issued a "rare" statement, urging any MPs who may be concerned to contact police.

  Research suggesting that weight-loss drugs can delay diseases associated with aging and halve deaths from heart attacks is featured by The Times, external, which says the jabs are being hailed as ushering in a "golden age" of medicine.

  Ministers are reported to be examining ways to "rapidly increase" the availability of drugs including Wegovy, after a series of breakthroughs were presented at the European Congress of Obesity in Malaga.

  The Guardian, external looks ahead to possible peace talks between the leaders of Ukraine and Russia tomorrow, after the Kremlin called for direct negotiations in Turkey.

  President Zelensky has told the paper that he'll travel to the country, despite uncertainty over whether President Putin will turn up, in the hope that a potential appearance by President Trump will push his Russian counterpart to attend.

  The Financial Times, external suggests that efforts by the government to rebuild relations with China could be "hurt" by Beijing's criticism of the tariff deal struck between the UK and US last week.

  It says China has warned that the agreement should not be used to squeeze its products out of British supply chains.
