title: Second murder charge following fatal Wolverhampton house fire - BBC News
date: '2024-09-21'
section: England
url: http://www.bbc.co.uk/news/articles/cj6e5nk0pryo
content: |-
  Daniel Tatters, 25, is also charged with four counts of attempted murder.

  Akashdeep Singh, who was trapped upstairs with his family, died in hospital

  A second man has been charged with murder after a house fire in Wolverhampton. Daniel Tatters, 25, from Basford, Stoke-on-Trent, faces the charge alongside four counts of attempted murder and one count of arson with intent to endanger life. Dale Francis, 36, also from Basford, faces the same charges in relation to the incident on Plascom Road, East Park, in the early hours of 25 June. Akashdeep Singh, 26, died in hospital after being trapped upstairs with family members - who were seriously injured in the fire.

  Mr Tatters has been remanded in custody to appear before Wolverhampton Magistrates Court on Saturday. Mr Francis appeared before the same court earlier this month and was remanded into custody before his appearance at Wolverhampton Crown Court on 11 October. Crimestoppers said it was offering a reward of up to £20,000 for information that leads to the arrest and conviction of anyone involved in the incident.

