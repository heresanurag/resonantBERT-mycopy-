  Find out who's got their hands on the golden statuettes at this year's Academy Awards.

  Regina King's best supporting actress award was her first Oscar win

  This year's Academy Awards have been handed out in Los Angeles - here's a complete list of all the winning and nominated stars and films.

  Spike Lee won an Oscar for best adapted screenplay for BlacKkKlansman while Mahershala Ali celebrated his second win for best supporting actor in Green Book

  Ruth E Carter, winner of best costume design for Black Panther, holding her new favourite accessory

