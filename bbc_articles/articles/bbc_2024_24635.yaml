  I have not yet mentioned the knees, which cost Nadal a lot of time on court. He often said he loved to play on hard courts but his body did not appreciate it as much. "Maybe we are going to pay the price at the age of 45," he said in Indian Wells in 2019. "When I see some old legends walking around the tour, it is tough to see." The upside is 22 Grand Slam titles, Olympic gold in both singles and doubles, a part in four Spanish Davis Cup victories and 209 weeks as world number one - as well as something much harder to achieve, and perhaps more special than anything which can fit in a trophy cabinet. "I think Rafa went further than being a great tennis player," compatriot Feliciano Lopez told the BBC in a 2015 documentary on Nadal. "In society in general in Spain everybody loves him as a person. The way he behaves on the court - always fighting till the end - this is what makes the connection with the people possible. "He is the son every mum would love to have."
