title: Russian man rescued after spending 67 days adrift - BBC News
date: '2024-10-16'
section: Europe
url: http://www.bbc.co.uk/news/articles/cn7yn542648o
content: |-
  Officials say Mikhail Pichugin was found with the bodies of his brother and his 15-year-old nephew.

  A Russian man has been rescued after spending more than two months adrift in a small inflatable boat in the Sea of Okhotsk in the far east of Russia. Officials say a man, named by Russian media as Mikhail Pichugin, 46, was found by a fishing boat crew nearly 1,000km (620 miles) from where he set off in early August. The bodies of his brother and his 15-year-old nephew were reportedly found in the boat. Mr Pichugin's wife said the trio had gone to sea to watch whales and taken food supplies for two weeks. She told Russia's state-run Ria Novosti news agency his weight may have been a factor in his survival - he was 100kg (15st 10lb) when he left for the trip, and reports say only half that when he was rescued 67 days later.

  "We don't know anything yet. We just know that he's alive... It's some kind of miracle!" she told the Russian agency. She also said their daughter was supposed to go on the ill-fated trip, but she had decided she wanted to return home. A helicopter search had found no trace of the trio after their disappearance was reported, according to Ria. The boat was discovered on Monday as it floated past a fishing boat in the Sea of Okhotsk, off the coast of Kamchatka Peninsula, which lies in the far east of Russia, the Russian news agency reports. A bearded man in a life jacket is seen shouting at the fishermen: "I have no strength left," as he is taken to safety, in a video posted by the prosecutor's office. He was named by Ria as 46-year-old Mikhail Pichugin. The bodies of his brother Sergei, 49, and nephew Ilya, were still on the boat. As to how he was able to survive for so long in the Sea of Okhotsk - the coldest in East Asia - a representative from the far eastern branch of the Russian seafarers' union suggested a supply of fish may have played a part. Nikolai Sukhanov, told Ria Novosti in such a situation you can survive by catching fish while eking out whatever provisions are left on the boat. Mr Pichugin is now recovering in hospital, where he is described as being in a "more or less stable" condition by doctors. Prosecutors have said they are launching a criminal investigation, with the small boat being inspected and investigators trying to establish the circumstances into the incident. It is not the first time that castaways have been found after many days adrift - an expert told the Ria Novosti four Soviet soldiers had survived 49 days on a small boat in the Pacific Ocean in 1960, before being picked up by a US aircraft carrier.
