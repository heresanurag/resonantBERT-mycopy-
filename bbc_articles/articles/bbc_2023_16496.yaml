content: |-
  The Tartan Army celebrates qualifying for the 2024 tournament in Germany.

  Scotland's Tartan Army have been celebrating after qualifying for Euro 2024.

  Scotland qualified for the tournament on Sunday night with two games to spare thanks to Spain's 1-0 win over Norway - a result which has guaranteed Steve Clarke's side a top-two finish in Group A.

  Scotland fans in Lille celebrated the news ahead of Scotland's friendly game against France.

