  While conditions were predicted to be worst in north Wales, a 60mph (96km/h) gust was recorded at Pembrey Sands in Carmarthenshire. There has also been disruption to some Transport for Wales services. Services were at a standstill between Caerphilly and Rhymney due to a fallen tree on the line at Pengam. There were six flood alerts along the coast, although that number was down from earlier.

