title: 'Storm Lilian: Shell Island campers leave early over poor weather - BBC News'
date: '2024-08-23'
section: Wales
url: http://www.bbc.co.uk/news/articles/ckgjee5e163o
content: |-
  Storm Lilian is expected to bring strong winds during Friday, with warnings of travel disruption.

  More than 70% of campers left the Shell Island site in Gwynedd early due to poor weather

  Many holidaymakers at one of the UK's biggest campsites have left early due to poor weather. Shell Island near Llanbedr, Gwynedd, had been exposed to strong winds which have caused damage even before Storm Lilian hits. The site said 70% of visitors had packed up and gone, which Richard Workman, one of its directors, said had scuppered hopes for a bumper bank holiday weekend. A 72mph (115km/h) gust of wind was recorded in Eryri, also known as Snowdonia, early on Friday, and the Met Office issued a yellow weather warning for strong winds affecting parts of north Wales.

  Despite the warning affecting only north Wales, a New Order gig in Cardiff due to take place on Thursday evening was cancelled on health and safety grounds. The poor weather has caused travel disruption with the M48 Severn Bridge closed between J2 A466 Wye Valley Link Road (Chepstow) and J1 A403 (Aust) due to strong winds. The A55 Britannia Bridge between J9 A487 (Treborth) and J8 A5 (Llanfair PG) was closed to high-sided vehicles, motorcycles, bikes and caravans. North Wales Police warned drivers to take extra care after reports of fallen trees and branches on roads.

