  In south Wales a large marquee at Colliers Adventure Farm in Treharris, Merthyr Tydfil, was blown over. Alison Harris, who works there, said: "We went home last night and at 7.30am this morning that's what we came back to. "We've got our Crazy Science event this morning but we've managed to relocate it inside. "The marquee is where we hold our events, so today we have managed to move it inside and we have been able to manage. "It's such an expensive item and after this event, we were getting it ready for Halloween, so we'll have to reorder but thankfully life at the park is still the same," she added.

