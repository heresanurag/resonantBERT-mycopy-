title: Women who died at national park beauty spot were uni students - BBC News
date: '2025-06-17'
section: Wales
url: http://www.bbc.co.uk/news/articles/cy4ny3gn4yko
content: |-
  Hajra Zahid and Haleema Zahid were pulled from water on a path leading to the summit of Yr Wyddfa.

  Friends' tributes to sisters who died in national park

  Hajra Zahid and Haleema Zahid were studying for a masters degree at the time of their deaths

  Tributes have been paid to two sisters who died after being pulled from the water at one of Wales' national parks. Hajra Zahid, 29, and Haleema Zahid, 25, were found in pools on the Watkin Path - which leads to the summit of Yr Wyddfa - also known as Snowdon - on 11 June. University of Chester said the women "touched the lives of many" since starting master's degrees in international business earlier this year. An inquest into their deaths is due to be opened on Wednesday by the coroner for north-west Wales.

  "The University of Chester community is in mourning for the tragic loss," said the vice-chancellor, Prof Eunice Simmons. "They touched the lives of many here at Chester – their friends, the cohort on their course and the staff who taught them – and they will be deeply missed."

  A former colleague of Haleema Zahid at a telecommunications company in Islamabad, Pakistan, said in a tribute that she was "an exceptionally compassionate, hardworking and kind individual". Dr Bilal Saeed added she had "touched the lives of many with her warmth, professionalism and unwavering dedication". Ms Zahid had left the firm to pursue higher education in the UK, he added. Sheharyar Shahnawaz, another ex-colleague, said Haleema Zahid was an "amazing lady, very lively and energetic, someone you would want in your life". He said that she became the pillar of her family after the death of her father last year and he had seen her just before she left for the UK when she told him she was "really excited for this new chapter".

  The Watkin Path is one of the main routes to the summit of Wales' highest mountain. North Wales Police said officers were called to Nant Gwynant, Gwynedd, at 21:31 BST after a report one woman had been pulled from the water and another was said to be in one of the pools.

  Det Ch Insp Andy Gibson of North Wales Police said: "Our thoughts and sympathies remain with the families and friends of both women. "An investigation to establish what happened is now under way." Chairman of Llanberis Mountain Rescue Team Jurgen Dissmann added: "I extend our deepest sympathies to the families and friends of the two women who sadly lost their lives."
