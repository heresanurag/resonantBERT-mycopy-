  Quiz: Have these ever been Olympic sports?

  The Olympic Games in Paris take place from 26 July to 11 August

  Breaking is featuring on the Olympic programme for the first time in Paris. Since the first modern Games in 1896, there have been new sports introduced and others dropped. Can you tell the real Olympic sports from the fakes? Test your knowledge by tackling our quiz.
