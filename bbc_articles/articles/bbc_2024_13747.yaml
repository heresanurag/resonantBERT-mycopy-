content: |-
  Finley, 6, wants to join the police when he is older and directs traffic outside his house.

  A six-year-old boy who says he "loves the police" had his dreams come true when some real-life officers came to visit.

  Finley, from Clevedon, has started directing traffic outside his house, supervised by his mother.

  He has autism and ADHD and his mum, Emma, said she is happy to go along with his passion and let him live out his dreams.
