title: Minjee Lee wins PGA Championship to claim third major - BBC Sport
date: '2025-06-22'
section: Golf
url: http://www.bbc.co.uk/sport/golf/articles/cy8ky2ezn04o
content: |-
  Australia's Minjee Lee wins the PGA Championship by three strokes in Frisco.

  Minjee Lee's other major wins came at the 2021 Evian Championship and 2022 Women's US Open

  -4 M Lee (Aus); -1 A Kim (US) C Wannasaen (Tha); +1 C Iwai (Jpn) +1 J Thitikul (Tha) Selected others: +5 C Hull (Eng); +6 N Korda (US), L Maguire (Ire)

  Australia's Minjee Lee claimed her third major with a three-shot victory at the Women's PGA Championship. The 29-year-old shot a two-over-par 74 in the final round to finish on four under at Fields Ranch East in Frisco, Texas. In windy conditions, Lee was one of only three players to shoot below par for the weekend. "That is my ultimate goal," said Lee when asked about the prospect of completing the career grand slam.

  "I really wanted to be in the Hall of Fame. That's why I started golf and that's why I wanted to be on the LPGA Tour." The average score for the field was more than 75, the highest for an LPGA Tour major in a decade. Lee initially struggled with the conditions, hitting three bogeys in her opening six holes. Kim and Wannasaen finished an hour before Lee with rounds of 68, but Lee steadied on the back nine and carded birdies on the 14th and 15th.
