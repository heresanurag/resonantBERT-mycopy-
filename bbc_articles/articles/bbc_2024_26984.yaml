title: Pupils injured after school bus crash in County Down - BBC News
date: '2024-10-07'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cglk8lgkzd6o
content: |-
  More than 40 pupils and a driver were involved in the crash on the Ballyblack Road East on Monday afternoon

  Pupils injured after school bus crash in County Down

  More than 40 school children were in the bus when it crashed

  A double-decker bus carrying more than 40 school children has crashed in County Down. The Northern Ireland Ambulance Service (NIAS) declared it as a "major incident", but has since stood it down. It said the bus was carrying 43 school children, as well as the driver. Four children were taken to hospital with non-life threatening injuries, the Police Service of Northern Ireland (PSNI) has confirmed. The incident happened on the Ballyblack Road East, near Carrowdore after 16:00 BST.

  Translink said the bus was carrying students from Strangford College to Bangor. In a statement, the PSNI said that NIAS treated and discharged 33 people at the scene. Several patients also self-presented at the Ulster Hospital.
  • None As it happened: Children injured after school bus crash in County Down

  Northern Ireland Fire and Rescue Service (NIFRS) deployed five fire appliances to the scene. Firefighters used specialist cutting equipment to rescue two casualties from the bus.

  This video can not be played To play this video you need to enable JavaScript in your browser. Four children were taken to hospital with non-life threatening injuries

  Pictures on social media showed the vehicle on its side in a field having left the road. The Ballyblack Road will remain closed while police conduct an investigation into the collision.

  Were you in the area? Did you witness the incident? If it is safe to do so, please get in touch.

  Strangford Integrated College principal Clare Foster said it was "a very difficult and distressing experience for the pupils, their families and the wider school community". "We are working closely with the Education Authority (EA) and trained staff from the EA Critical Incident Response Team and our core focus over the coming days will be on supporting our pupils and staff at this time," she added. Ms Foster thanked the emergency services for "their quick actions, including a number of staff and parents who provided support and first aid".

  This video can not be played To play this video you need to enable JavaScript in your browser. Strangford College pupil Dylan was sitting on the top deck of the bus when it crashed.

  Twelve-year-old Strangford College pupil Dylan said he was sitting with his friend on the top deck of the bus when it crashed. "The bus driver crashed into some sort of pole and he stalled the bus," he told BBC News NI. "We started going down the hill and then we just tipped sideways." Dylan said after opening his eyes, he was laying on the floor of the bus. "It was scary, very scary. "People came down and they were smashing the windows...I was crawling under the bars and the school bags were on the floor and stuff."

  The crash happened after 16:00 BST on Monday

  Dylan's mother Stacey said her son rang her "screaming" about the crash. "Everyone was screaming in the background behind him - it was deafening," she said. "I just ran out of my house... my neighbour heard about this and brought us straight here." Stacey said her son hurt his head and arm in the crash, but was glad he was safe. A casualty centre was set up at the school for a period of time after the incident, the PSNI said. A small police presence was also on site, with a multi-agency meeting believed to be going on inside the school. The EA will be working with the school to provide support for any children impacted.

  The bus was travelling from Strangford College to Bangor when it overturned, Translink said

  Northern Ireland Secretary Hilary Benn said he was "deeply concerned" about the incident. "Our thoughts and prayers are with all those involved and their families, and with the emergency services who are on the scene," he said. Writing on X (formerly Twitter), First Minister Michelle O'Neill said: "My heart goes out to everyone injured, their families, and the emergency services who are on the scene in Carrowdore." Education Minister Paul Givan said his "thoughts and prayers are with the children and families of all those involved". DUP MP for Strangford, Jim Shannon said, "we are unsure of the scale, however the fear is palpable. "Thoughts and prayers will be with parents and children during this uncertainty." He also thanked emergency services for their efforts.

  Health Minister, Mike Nesbitt, said it was a "shocking incident" and his thoughts are with those affected and their families. "I want to express my heartfelt thanks to the emergency crews attending the scene and to the hospital staff caring for those who have been injured," a statement said. “I know I am speaking for the entire community in expressing my gratitude for the fast and efficient way in which they responded, and for their expertise and professionalism. "I am proud of everyone involved in responding to the major incident today.” Mayor of Ards and North Down Council, Alistair Cathcart, said he was "very concerned". "Staff at Strangford College, which the pupils attend, are working hard to speak to students and parents and provide support to all those affected," he added. Speaking to BBC Radio Ulster's Evening Extra programme, UUP councillor Peter Wray said: "As well as the people who are directly affected, it can also cause some distress for other pupils or other people who have seen this incident and have been distressed by it.”

  The Ballyblack Road East is closed and motorists are asked to avoid the area

  The South Eastern Health Trust said staff in the nearby Ulster Hospital were treating a "number of patients" involved in the bus crash. "We would ask any patient not requiring emergency care to please use alternative services," a statement added.
