title: 'Watch: Raging waters and rescues as Hurricane Helene hits Florida - BBC News'
date: '2024-09-27'
section: General
url: http://www.bbc.co.uk/news/videos/czxdw657979o
content: |-
  The category four storm hammered Florida's coast, bringing heavy rains and strong winds.

  Hurricane Helene is one of the biggest ever storms to hit the US Gulf Coast, with wind gust speeds of 140 mph (225 km/h).

  Florida's Lee County Sheriff's office shared footage of its rescue efforts, as flooding trapped some residents in their homes and vehicles.

  The storm has now swept into Georgia and been downgraded but officials urge caution, saying the situation remains dangerous.

  At least 20 people are known to have died across the two states since the storm made landfall on Thursday.
