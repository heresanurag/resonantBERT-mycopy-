title: Second boy dies after M4 slip road minibus crash near Reading - BBC News
date: '2025-06-07'
section: Berkshire
url: http://www.bbc.co.uk/news/articles/c62816p3xe9o
content: |-
  Othniel Adoma, 11, has died more than three weeks after a minibus overturned on the M4 near Reading.

  Othniel Adoma, from Bracknell, has died more than three weeks after the crash

  An 11-year-old boy has become the second child to die after a minibus overturned on a motorway slip road. Othniel Adoma, from Bracknell, Berkshire, died on Thursday, more than three weeks after the single-vehicle crash, said police. A white Ford Transit minibus overturned on the link road at junction 10 of the M4 to the A329(M) near Reading, Berkshire, at about 14:25 BST on 11 May. A six-year-old boy was also killed in the crash. Five other children injured in the incident have since been discharged from hospital, Thames Valley Police said.

  The 11-year-old's family have released photographs in his memory

  The force said its serious collision investigation unit was investigating the crash and confirmed no arrests had been made. Det Sgt Lyndsey Blackaby said: "My thoughts, and the thoughts of everyone at Thames Valley Police, are with the family and friends of Othniel Adoma. "Othniel's family has released these beautiful pictures of Othniel in his memory."

