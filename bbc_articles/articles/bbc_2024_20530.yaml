content: |-
  Eight years since their last single, the duo talk to BBC Newsbeat their return to music.

  Rizzle Kicks: We needed to grow up out of the spotlight

  Harley Alexander-Sule (left) and Jordan Stephens are back as Rizzle Kicks

  Imagine going from writing songs in your bedroom to selling out tours, working with the biggest stars and bagging a platinum-selling album, all in just a few years. It’s what Jordan Stephens and Harley Alexander-Sule did with Rizzle Kicks – a pop/hip-hop duo which, after an almost decade-long break, are coming back. Eight years after their last single, they've released a new one, Javelin, out Friday, with an album also on the way. "I think our music reminds people of a time where everyone was generally happy. The [London 2012] Olympics, summer," Harley tells BBC Newsbeat.

  In 2011, the duo had top ten hits like Down with the Trumpets and Mama Do The Hump, and even bagged a UK Number 1 in 2013 with Olly Murs and the song Heart Skips a Beat. And even though plenty of fans have told the band they remind them of "better times", Rizzle Kicks say they want fans to be excited about their new music as well. "I love that this return is making people feel nostalgic, but also hope people will catch on and feel the same way about our new stuff," Jordan says. "We’re shocked that so many people were buzzing about [our return]. It’s overwhelming and exciting. "I remember seeing a tweet saying, ‘I didn’t know Rizzle Kicks had fans like this' - and we were like: 'Neither did I!'"

  A different time: Rizzle Kicks back in 2012, pictured at the premiere of James Bond film Skyfall

  Rizzle Kicks' first album Stereo Typical reached number 5 in the UK charts, with their second, Roaring 20s, doing even better – reaching number 3. But the pair stopped making music together in 2016, due to problems including addiction and mental health. "We started when we were 18, 19, thrown into this crazy world," Harley says. "We made an attempt to do another album, which never came out," Jordan says. "A tour was booked, which never happened. "Harley was trying to prevent a panic attack after a show. Lying on the floor doing deep-breathing. I had got to the state of acknowledging my addictive habits. "It was a pop-rollercoaster we hadn’t intended to be on. I was way too sensitive for that." Jordan says the panic attack caused a moment of reflection. "We stood there and thought, 'Is it worth it?' At the expense of Harley’s peace of mind? My peace of mind? "We needed some time to grow up out of the spotlight." He feels it was pressure from their labels and within the music industry which got a bit too much. "We were put on a hamster wheel. I wish we had the time to appreciate what we’d done and taken the time with no pressure to get back in and write, write, write. "We literally said: 'Maybe we should grow up?'"

  Both Harley and Jordan have released solo music during their years apart. But after writing for "years" and scrapping songs – they tell Newsbeat why now feels like the right time to tackle the issues they’ve had in the industry together. "I don’t hide away from my own battles with addiction, and we talk about that," Jordan says. "We delve into stressful times, but also lighter – be there with your mate and have fun. "I literally rap about drinking water now – that’s my flex. "This is all bonus rounds to us. We’re doing this because we love it. "This album's about where we’re at right now. Which is love, and having a good time," he says. What is success for Rizzle Kicks in 2024? There’s a focus for both of them to come off-stage feeling good. Jordan says their "metrics of success are very different". "We’re not trying to be global megastars, or working off nostalgia, we’re working on what we love right now. "We just wanna deliver quality for the foreseeable," he says. "Having a laugh and enjoying it," Harley adds. "As long as this return allows us to continue for the next five, 10 years - that’s success."

