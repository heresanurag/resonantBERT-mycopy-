title: Wembley to be allowed at least 60,000 fans for Euro 2020 semi-finals and final
  - BBC Sport
date: '2021-06-22'
section: General
url: http://www.bbc.co.uk/sport/football/57546042
content: |-
  The crowd capacity at Wembley will be increased to more than 60,000 for the semi-finals and final of Euro 2020, says the UK government.

  Wembley to be allowed at least 60,000 fans for Euro 2020 semi-finals and final Last updated on .From the section European Championship

  Wembley has hosted 22,500 fans - 25% of its capacity - for England's Group D games at Euro 2020 Dates: Venues: Coverage: Live on BBC TV, BBC Radio 5 Live, iPlayer and the BBC Sport website and app. Click here for more details The crowd capacity at Wembley will be raised to more than 60,000 for the semi-finals and final of Euro 2020, says the UK government. It means the stadium will be at 75% capacity for the games. The increase will also see the largest crowds assembled for a sporting event in the UK in more than 15 months. "It is great news that so many fans will be able to watch the final three matches of Euro 2020 at Wembley," said Uefa president Aleksander Ceferin. The UK government has postponed lifting all restrictions until 19 July but the game at Wembley, along with certain other sporting events, is being allowed extra crowd capacity under its Events Research Programme. Wembley's capacity has been reduced to 22,500 for group fixtures at Euro 2020, but that is set to be expanded to 45,000 - around 50% of full capacity - for two knockout games in the last 16 before the semi-finals on 6 and 7 July and final on 11 July. Italian Prime Minister Mario Draghi had called for the final to be moved from England because of rising Covid-19 cases in the country but Uefa said it had "no plans" to do so. There was also speculation the semi-finals and final could be moved from London to Budapest if VIPs were not given an exemption to England's strict quarantine rules, and talks on that issue are continuing. "This tournament has been a beacon of hope to reassure people that we are returning to a more normal way of life and this is a further step along that road," added Ceferin. "I am grateful to the prime minister and the UK government for their hard work in finalising these arrangements with us, to make the tournament final stages a great success in Wembley." Fans attending the games at Wembley will need to follow a number of strict entry requirements, including having a negative Covid-19 test or proof of full vaccination, which means two vaccine doses, 14 days before the fixture they are attending.
