id: bbc_2017_2957
title: The female soldiers serving in Israel's army - BBC News
date: '2017-02-12'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-38939834
content: |-
  The BBC speaks to women in the Israeli army - one of the few in the world to conscript females.

  In most western armies women are taking a more and more prominent place on the front line, and in Israel, there are already mixed gender infantry battalions.

  The BBC travelled to a training base in southern Israel and spoke to some of the soldiers being recruited.
