title: 'Watch: BBC reporter treated to on-air dance battle - BBC News'
date: '2023-07-24'
section: General
url: http://www.bbc.co.uk/news/uk-66288826
content: |-
  Children at a dance school in Manchester show the BBC's John Maguire their moves.

  A high energy form of street dance, known as breaking, will feature at the Olympics for the first time next year.

  The BBC's John Maguire has been to a dance school in Manchester, where he was treated to an on-air dance battle - with commentary from the school's coach.
