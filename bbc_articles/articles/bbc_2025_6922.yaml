  Wisconsin voters have elected a Democratic-backed judge to serve on the state supreme court, according to projections, following the most expensive judicial election in US history. Susan Crawford is on course to beat conservative rival Brad Schimel, which would keep intact the 4-3 liberal control of the Midwestern state's highest court. President Donald Trump's billionaire adviser Elon Musk was a prominent fundraiser in the campaign, and was the subject of Democratic attack ads. More than $100m (£77m) was spent by the candidates and their allies, including $20m by Musk. The result is expected to have far-reaching implications, potentially even affecting the balance of power in the US Congress.

  Susan Crawford's win means liberal control of the state's top court is retained

  That is because the state's supreme court is expected to play a key role in cases related to congressional redistricting ahead of midterm elections in 2026 and the next presidential election, in 2028. With the majority of ballots tallied, Crawford had won about 54% of the vote, and Schimel had around 45%, according to the BBC's US partner CBS News. Addressing the fundraising by Musk, Crawford told supporters in her victory speech: "Wisconsin stood up and said loudly that justice does not have a price. Our courts are not for sale." The Dane county judge was formerly a private lawyer for Planned Parenthood and she backed abortion rights during her campaign. After giving his personal backing to Schimel, Tuesday's result was a setback for Trump in a crucial swing state that he won by less than a percentage point during last November's presidential election. However, he took consolation from fellow Republicans managing to hold on to two congressional seats in Florida elections on Tuesday. The contest was seen as a test of Musk's powerbroking status. The SpaceX and Tesla boss travelled to the state to give out millions of dollars to voters who pledged to support conservative causes. In celebrating Crawford's win, Democrats framed her victory as Musk's defeat. "Wisconsin cannot be bought. Our democracy is not for sale. And when we fight, we win," Democratic Senator Elizabeth Warren wrote in a post on social media. Musk addressed the defeat of his candidate in a post on his social media site X, writing: "I expected to lose, but there is value to losing a piece for a positional gain." In the city of Milwaukee, which leans Democratic, officials reported a shortage of ballots on Tuesday "due to unprecedented and historic voter turnout", the city's election commission said in a statement. Wisconsin separately voted on Tuesday to enshrine into the state constitution a law requiring voters to show ID to cast their ballots. Voters were already required to show ID, but adding it to the state constitution made it harder to change in the future. Crawford had opposed the voter ID constitutional amendment.

  At an NBA game in Milwaukee on Tuesday, several voters spoke to the BBC about their concerns. Milwaukee Bucks fan Mike McClain said he was motivated by a dislike for Musk, who he referred to as "the real president". "I don't know how a billionaire, almost a trillionaire, can decide what's going on," he said. "You can't even relate with common people." Crawford also benefited from large donations by billionaire donors, including financier George Soros, Illinois Governor JB Pritzker and LinkedIn co-founder Reid Hoffman. But Musk outspent them all. A Schimel supporter who did not want to give his name said he was supporting the conservative out of loyalty to Trump. "We got to take it back home here and reinforce everything that Donald Trump has done," he said. Much of the liberal campaign focused on the role played by Musk in the Department of Government Efficiency (Doge), a cost-cutting taskforce that has moved to fire thousands of government workers and slash the federal payroll. During a rally on Sunday, Musk distributed two $1m cheques to voters at a rally who signed a petition of his against "activist judges". Others who signed it received $100 from Musk.

