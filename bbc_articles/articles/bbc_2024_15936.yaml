title: 'South Belfast: Two arrested in inquiry into sudden death - BBC News'
date: '2024-07-20'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c2lk8dxw02eo
content: |-
  A male and a female have been arrested following the sudden death in south Belfast on Saturday.

  Police have been granted an extra 36 hours to question a man and a woman who have been arrested after a sudden death in Belfast.

  The Police Service of Northern Ireland said its officers arrested two people after the sudden death in Donegall Avenue in the south of the city on Saturday.

  A spokesperson said they were both helping police with their inquiries.

  Police did not give any further details about the incident.
