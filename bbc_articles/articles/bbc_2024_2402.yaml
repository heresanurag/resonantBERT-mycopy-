title: How do UK weather warnings work? - BBC Weather
date: '2024-02-07'
section: General
url: http://www.bbc.co.uk/weather/features/45593113
content: |-
  BBC Weather carries National Severe Weather Warnings which are issued by the Met Office. But how does the warning system work?

  BBC Weather carries National Severe Weather Warnings which are issued by the Met Office. The colour-coded warnings indicate severe weather is forecast.

  Weather warnings can be issued for rain, snow, wind, fog, ice, thunderstorms and lightning. In June 2021, the Met Office introduced a new type of weather warning for extreme heat.
