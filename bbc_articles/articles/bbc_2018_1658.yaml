title: Boris Johnson focuses on the 'positive Brexit agenda' - BBC News
date: '2018-02-14'
section: General
url: http://www.bbc.co.uk/news/uk-politics-43060512
content: |-
  Foreign Secretary Boris Johnson sought to talk up the "positive agenda" as he took questions after his London speech on Brexit.

  Foreign Secretary Boris Johnson said he wants to persuade people of the positives of Brexit as he answered questions after a major speech on the issue in London.
