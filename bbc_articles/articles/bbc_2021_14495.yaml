title: 'Greta Thunberg: COP26 ''a global north greenwash festival'' - BBC News'
date: '2021-11-05'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-59179317
content: |-
  Climate activist Greta Thunberg has branded the COP26 climate summit a "global north greenwash festival".

  She was speaking at a rally in the city's George Square after joining thousands of young protesters on the streets of Glasgow.

  The Climate Strike march was organised by Fridays For Future Scotland, to put pressure on countries gathered for the COP26 summit.
