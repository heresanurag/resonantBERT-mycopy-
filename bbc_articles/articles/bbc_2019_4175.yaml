title: Bodycam footage shows California police officer saving infant - BBC News
date: '2019-04-10'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-47871463
content: |-
  The baby's older sister led him to the car where her mother struggled to help her sister breathe.

  Officer Cappell responded to a call of a choking baby in Culver City, California. Upon arriving, the baby's older sister led him to the car where her mother struggled to help her sister breathe.
