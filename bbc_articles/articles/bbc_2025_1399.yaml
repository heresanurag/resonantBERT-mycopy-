  Toronto Pearson Airport had been experiencing weather-related delays over the last few days, with heavy snowfall and freezing temperatures battering parts of Ontario. Two storms - one on Wednesday and one on Sunday - covered the city with a total of 30-50cm (11.8-19.6 inches) of snow. The BBC's US partner CBS reports that there was light snow falling at the time of the crash. Earlier on Monday, the airport warned that "frigid temperatures and high winds were moving in". It said a "busy day" was expected, with airlines "catching up after this weekend's snowstorm". The crash is at least the fourth major aviation incident in North America in the past month. The worst was a deadly in-air collision between a passenger plane and a military helicopter near Washington DC which killed all 67 people on board.
