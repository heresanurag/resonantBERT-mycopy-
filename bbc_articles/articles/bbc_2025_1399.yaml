content: |-
  Eighteen of the 80 people on board were injured after the Delta plane overturned on landing.

  All passengers survive crash landing as plane flips at Toronto airport

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Passenger films his escape from upside down crashed plane

  All 80 people on board a plane which crashed and overturned while landing in Toronto have survived, officials said. The Delta Air Lines flight from Minneapolis skidded along the runway with flames visible and it came to a halt upside down as firefighters came to the rescue. Survivors said they were suspended upside down in their seats and had to release themselves, dropping on to the ceiling before clambering out on to the snow-covered tarmac. Eighteen people were injured but only a small number are thought to be seriously hurt, and investigators are looking into what caused the crash.

  There were 76 passengers and four crew on board the 16-year-old CRJ900 aircraft, made by Canada's Bombardier company. In an evening briefing, Deborah Flint of the Greater Toronto Airports Authority called the response by emergency personnel "textbook" and credited them with helping ensure no loss of life.
  • None Why did the plane crash in Toronto, and how did everyone survive?
  • None 'I've been in a plane crash' - survivors tell their stories
  • None Did you witness the plane crash? Contact us, external The US Federal Aviation Administration said the plane was operated by Delta's subsidiary Endeavor Air. Delta said the incident happened at about 14:15 ET (19:15 GMT) on Monday.

  Twenty-two passengers were Canadian nationals and the rest were "multinational", Ms Flint said. The airport was closed after the incident, but flights into and out of Toronto Pearson resumed at about 17:00 local time. Canada's Transportation Safety Board (TSB) said it was working to "gather information and assess the occurrence". Two runways will remain closed for several days for investigation and passengers have been told to expect some delays. Toronto Pearson Fire Chief Todd Aitken said "the runway was dry and there was no cross-wind conditions". That contradicted earlier reports of wind gusts of more than 64km/h (40mph) and a crosswind.

  Video footage shared on social media shows people clambering out of the overturned aircraft, with fire crews spraying it with foam. Passenger John Nelson told CNN that there was no indication of anything unusual before landing. "We skidded on our side, then flipped over on our back," he said, adding that "there was a big fire ball out the left side of the plane". Like Mr Nelson, Ashley Zook took immediately to social media to express her disbelief, filming herself saying: "I was just in a plane crash. Oh my God." Of the eighteen people taken to hospital, a child, a man in his 60s and a woman in her 40s suffered the worst injuries, said Ontario air ambulance service Ornge. After the crash, the airport's arrival and departure boards showed scores of delays and cancellations to flights. Some passengers told the BBC that they were now stuck in Toronto for days. James and Andrea Turner were in customs - located right before the departure gates - when they were suddenly told to evacuate. "They got rid of everybody from customs to security, and then put everybody back to the general area," James said, adding that the departures hall was packed as a result.

