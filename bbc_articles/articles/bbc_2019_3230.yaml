content: |-
  The pilot of the Kenya-bound flight had reported difficulties and asked to turn back.

  People gather at the Jomo Kenyatta International Airport in Nairobi, Kenya as they wait for information about the crashed airline Image caption: People gather at the Jomo Kenyatta International Airport in Nairobi, Kenya as they wait for information about the crashed airline

  Kenya Airports Authority (KAA) workers hang an information notice of Ethiopian Airlines Flight ET 302, at the Jomo Kenyatta International Airport Image caption: Kenya Airports Authority (KAA) workers hang an information notice of Ethiopian Airlines Flight ET 302, at the Jomo Kenyatta International Airport

  Relatives talk to airport staff at a help desk set up to give information about the airline Image caption: Relatives talk to airport staff at a help desk set up to give information about the airline

  A civilian takes a photograph of the wreckage at the scene of the plane crash Image caption: A civilian takes a photograph of the wreckage at the scene of the plane crash

