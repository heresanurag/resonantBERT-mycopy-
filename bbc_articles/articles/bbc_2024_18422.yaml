content: |-
  This is the moment a person was spotted scaling Paris's most iconic landmark before being arrested.

  Videos shared on social media show the moment a man was spotted climbing the Eiffel Tower in Paris at about 14:45 local time (13:45 BST) on the final day of the Olympics.

  Officers immediately intervened and arrested him, police have said.

  No more details were immediately available on the man’s motivation and nationality.
