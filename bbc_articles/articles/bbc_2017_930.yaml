title: Maria Balshaw is NOT the new director of Tate... yet - BBC News
date: '2017-01-11'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-38583773
content: |-
  Despite media reports - we don't yet know who'll replace Nicholas Serota at the Tate.

  Is Maria Balshaw the new director of the Tate? No.

  It is possible, although extremely unlikely, that the prime minster will choose not to ratify what is reported to be the recommendation being put before her by the Tate's trustees.

  We are in that hiatus period you get in football games when a manager is making a substitution. The sub (whose name has already been given to the ref) is warmed up and ready to enter the fray; the player being replaced is anxiously looking towards the touchline; the exchange is inevitable - but nothing can happen until the referee has given it the nod.

  Keep stretching, Maria. The prime minister is waiting for a break in play.

