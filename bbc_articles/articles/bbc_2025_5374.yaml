title: Most areas in England to cut eating-disorder help for under-18s - BBC News
date: '2025-03-05'
section: Health
url: http://www.bbc.co.uk/news/articles/c3rn998ydl2o
content: |-
  The Royal College of Psychiatrists worries children and young people will be put at risk, as demand rises.

  Most areas cut eating-disorder help for under-18s

  Most areas in England are planning cuts to specialist eating-disorder services for children and young people this year, an analysis shows. Of the nation's 42 NHS integrated care boards, 24 are due to reduce spending for under-18s in 2024-25, once inflation is taken into account. Overall spending is due to go up by 2.9%, with budgets rising in the other areas, but the Royal College of Psychiatrists (RCPsych), which carried out the analysis, said this was too little to cope with increased in demand. NHS England said improving care was "vital" and more action was being taken in the community to support young people before their condition became a crisis.

  Spending had been increasing for a number of years but "more work needs to be done", an official added.

  Veronika, 20, has been struggling with an eating disorder for five years. "Shrugged off" by services in the past, she says cuts could be "catastrophic" for people like her. "It will have a knock-on impact and people won't want to seek help even from their GP, even for physical-health monitoring," Veronika says. "It will just spiral on and on. "It is horrible living day in and day out with it. "And if you are not seen quick enough, I know myself how quickly things can spiral in a matter of weeks or days. "It is going to be tragic for some and just long and horrible for others".

  Eating-disorder services cover a range of different support, from therapy and counselling to crisis support and hospital treatment. But they were already underfunded, the RCPsych said, and it had had to ration care to the under-18s most affected. Last year, referrals went up by 13%. By the end of 2024, more than 6,000 under-18s were on waiting lists. And targets for routine and urgent waits are not currently being met.

  Dr Ashish Kumar, of the RCPsych, said: "Eating disorders, in particular anorexia, have high rates of mortality yet are treatable conditions. "And with the right care and support in a timely manner, most patients can make a full recovery." Tom Quinn, of the eating disorder charity Beat, said: "We are extremely concerned at the prospect of funding cuts to children and young people's eating-disorder services. "These vital services are already on their knees." It comes after the All-Party Parliamentary Group on Eating Disorders warned "woefully inadequate care" meant lives were being lost and families torn apart.
