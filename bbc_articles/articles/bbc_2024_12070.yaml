  If Kane starts against Serbia, as is expected, he will make his 23rd major tournament appearance and play his 12th game at the Euros, both new Three Lions records. The team's 63-goal record scorer will also become the first player to captain England's men at four major tournaments. Kane said playing at such a level is "the pinnacle" of any English footballer's career. The former Tottenham Hotspur striker, now at Bayern Munich, also said he is "extremely proud" of his record for his country. He said: "It's not easy to play for England, first and foremost - even harder to get into the major tournaments. "It's a proud achievement because I think it shows consistency, good work ethic, professionalism, and to be able to make yourself available for all the tournaments is not always easy."
