title: 'Harry Kane: England captain says Euros is best chance of winning a trophy
  - BBC Sport'
date: '2024-06-16'
section: England Men
url: http://www.bbc.co.uk/sport/football/articles/c2vv2144n7jo
content: |-
  England captain Harry Kane says this summer's European Championships are the Three Lions' best chance of winning a major trophy.

  Harry Kane is England's record goalscorer, with 63 goals from 91 games

  Captain Harry Kane says England have a "great opportunity" to win major silverware at Euro 2024. England begin their European Championship campaign on Sunday against Serbia at 20:00 BST, live on BBC One. They also play Denmark and Slovenia in Group C. Kane says England, who were defeated on penalties by Italy in the final of the last Euros, have "probably not" had a better opportunity to win a trophy than at this summer's tournament in Germany. "We all want to be remembered to have won a major tournament with England - not just to have had good campaigns - so we know it is something to respect and be proud of, and to keep pushing ourselves," Kane told BBC Sport. England were knocked out of the 2022 World Cup by France in the quarter-finals after losing the Euros final the year before. Kane said that this time, nothing less than lifting the trophy can be regarded as good enough. "If we don't win, we're going to be disappointed," he said. "As much as you can be unlucky and go out on penalties, we really want to win and start winning as a national team because we have been taking steps towards this moment. It is going to be tough, we know that, but we're ready for the challenge."

