  Protesters are urged to follow social distancing while tourist sites reopen with new restrictions.

  Campaigners have renamed some streets in central Glasgow as part of the Black Lives Matters demonstrations Image caption: Campaigners have renamed some streets in central Glasgow as part of the Black Lives Matters demonstrations Anti-racism campaigners in Glasgow have temporarily renamed streets in the city centre with the names of black activists and those believed to have been victims of racism, including Rosa Parks and George Floyd. Cochrane Street - named after Andrew Cochrane, an 18th-Century tobacco lord - has been renamed Sheku Bayoh Street after a man who died in police custody in Fife, Scotland. But his sister - a nurse - said her family would not attend the Black Lives Matters demonstration this weekend because the danger of spreading coronavirus is "still too great". Kadi Johnson joined Scotland's Justice Secretary Humza Yousaf and Labour MSP Anas Sarwar to issue a statement urging demonstrators to keep any protest virtual due to the coronavirus pandemic. The statement highlighted the disproportionate impact of Covid-19 on the BAME community. "As a staff nurse I know the deadly impact of the virus, and I would worry about social distancing and the lives of family and others being put at risk," Ms Johnson wrote separately. Sheku Bayoh died in 2015, aged 32, after he was restrained by police officers responding to a call in Kirkcaldy, Fife. He was found to have suffered 23 separate injuries. The officers involved have always denied any wrongdoing. No prosecutions were made and Mr Bayoh's death is to be the subject of a public inquiry. Ms Johnson told the BBC that younger members of her family were angry too. "When they saw George Floyd's video they were angry and hurt, remembering their uncle and how he died.
