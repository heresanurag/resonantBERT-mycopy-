title: Missing goat Belle found at Sale tram stop - BBC News
date: '2019-03-16'
section: General
url: http://www.bbc.co.uk/news/uk-england-manchester-47589933
content: |-
  Did you hear the one about the goat that was trying to board a tram?

  You have goat to be kidding, right?

  Belle the pygmy goat went missing from her home for more than a week.

  Her owner could not believe it when she eventually turned up 25 miles away at a tram stop in Sale.
