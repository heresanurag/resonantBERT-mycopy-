title: Sunak denies 'just let people die' Covid claim - BBC News
date: '2023-12-11'
section: General
url: http://www.bbc.co.uk/news/uk-politics-67566941
content: |-
  The PM says he looks forward to giving his evidence to the ongoing Covid inquiry.

  The PM said he looked forward to giving his evidence to the ongoing Covid inquiry.

  Rishi Sunak denied a claim from Labour MP Tulip Siddiq, who read a quote to PMQs saying: “Rishi thinks just let people die and that’s OK.”

  He told her that if she checked the evidence, the chief science adviser “confirmed” he did not hear him say it, adding: “That’s because I didn’t.”
