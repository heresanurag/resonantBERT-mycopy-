  Eight teams are left in the World cup - but can you spot their Russian names?

  Can you identify the World Cup quarter final teams in Russian? Last updated on .From the section World Cup

  Those who have travelled to cheer on their teams may have an advantage but - after three weeks of the World Cup - how's your Russian? Can you guess which country is which in the Russian cyrillic alphabet?
