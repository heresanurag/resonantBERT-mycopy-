title: Trump administration seeks to pull up to $100m in Harvard funding - BBC News
date: '2025-05-27'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c20n1n1kygzo
content: |-
  Federal agencies will review their grants to the top university to decide whether they should be terminated.

  Harvard University is preparing for graduation this week

  The Trump administration will direct US federal agencies to review Harvard University's grants to potentially end or redistribute funding, as part of the White House's escalating battle with America's oldest university. The Government Services Administration (GSA) plans to circulate a letter to agencies asking them to identify whether Harvard contracts could be "cancelled or redirected elsewhere", a senior White House official said. The administration estimates about 30 contracts, collectively worth $100m (£74m), could be reviewed. It already had frozen $2.65bn in federal grants and tried to revoke Harvard's ability to enrol international students.

  On its website, the university says that its "cutting-edge medical, scientific, and technological research" has historically been "supported by the federal government" and other entities. Touting the institution's research on cancer, heart disease, infectious diseases and obesity, the university website warns that "without federal funding, this work will come to a halt midstream". The White House will not revoke the funds automatically, but rather kick off a review of money Harvard receives from the federal government to determine whether that funding is critical in the eyes of the administration. GSA will recommend each agency "terminate for convenience each contract that it determines has failed to meet its standards", and consider reallocating those funds elsewhere. A draft of the letter accuses Harvard of engaging in discrimination and antisemitism as justification for the move. Students and faculty at the university have criticised the Trump administration for its penalties against Harvard. On Tuesday evening, a few dozen gathered in protest. "The administration's excuse that these policies somehow address antisemitism are so absurd," said Jacob Miller, a student and former head of Harvard Hillel, the Jewish social hub on campus. An administration official told the BBC that potential cuts would not affect hospitals affiliated with Harvard University. And if a federal grant was deemed critical to a particular agency's functions, they said, that agency could make a case to preserve funding. The White House and Harvard have been locked in a political, legal and financial battle - the stakes of which have dramatically escalated over the past two months. This is not the first time the administration has attempted to block Harvard's funding. In April, the White House threatened the university's tax exempt status and froze $2.2bn in federal funding, prompting a lawsuit. A month later, it cut another $450 million in grants. Last week, the Trump administration also tried to revoke Harvard's ability to enrol international students or host foreign researchers, prompting mass confusion among thousands of impacted students and another lawsuit from Harvard. A judge later issued a temporary restraining order blocking the move.

