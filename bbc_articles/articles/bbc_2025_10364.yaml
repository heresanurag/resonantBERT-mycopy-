  Before news broke of the latest attempt at cuts, Harvard University president Alan Garber told NPR on Tuesday morning: "Why cut off research funding? "Sure, it hurts Harvard, but it hurts the country because after all, the research funding is not a gift. "The research funding is given to universities and other research institutions to carry out work – research work – that the federal government designates as high-priority work. "It is work that they want done. They are paying to have that work conducted." One department hit by funding cuts is the Sinclair Lab at Harvard Medical School, which studies aging and seeks to find interventions for Alzheimer's disease, multiple sclerosis, cancer, infertility, immune disorders, and more. "We aim to understand and reverse the underlying mechanisms of aging to develop treatments for a wide range of diseases and tissue injuries," the lab's founder, anti-aging geneticist David Sinclair, told the BBC via email.

