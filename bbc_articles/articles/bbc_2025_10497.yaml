title: 'Garcia vs Romero: Shock Ryan Garcia loss scuppers Devin Haney rematch - BBC
  Sport'
date: '2025-05-03'
section: Boxing
url: http://www.bbc.co.uk/sport/boxing/articles/c5ylnklkrpro
content: |-
  Ryan Garcia suffers a points loss to fellow American Rolando Romero at New York's iconic Times Square, scuppering a planned rematch with Devin Haney.

  Ryan Garcia (right) lost for only the second time in 26 professional fights

  Ryan Garcia suffered a shock points loss to Rolando Romero at New York's iconic Times Square, denting hopes of a planned rematch with Devin Haney. American Garcia, 26, was dropped in the second round by a left hook and outboxed in large parts of the welterweight bout. Underdog Romero, 29, was deservedly awarded a unanimous decision with scores of 115-112, 115-112 and 118-109. "He fought a good fight; caught me early. No excuses, man. Congrats to him - he did a great job," Garcia said.

  Garcia was competing for the first time since serving a one-year doping ban after testing positive for banned substance ostarine following his victory over Haney in April 2024, which was overturned into a no-contest. "A whole year took a lot of my body physically and mentally," Garcia said, adding that he would now go "back to the drawing board". Earlier, Haney, 26, kept his side of the bargain with a unanimous yet underwhelming win against fellow American Jose Carlos Ramirez. Haney boxed on the back foot as neither fighter threw anything of note in a forgettable 12-round contest. In the performance of the night, American two-weight world champion Teofimo Lopez defended his WBO light-welterweight title with a stylish points win over compatriot Arnold Barboza Jr.

  Former undisputed lightweight champion Devin Haney (left) extended his record to 32 professional wins

  Organisers in Saudi Arabia were lining up the rematch for later this year, as long as Haney and Garcia won. After a year lay-off, an overly cautious Haney, who was dropped three times by Garcia last year, never really got going in a below-par showing. He circled around the ring, landing the occasional lead left hook, but neglected his jab as single shots did enough to edge the rounds. Defensively, it was a sound performance by Haney, largely because gun-shy Ramirez did so little. The judges scored it 119-109, 119-109 and 118-110. The bout was best summed up by Scotland's former undisputed light-welterweight world champion Josh Taylor, who said on social media that Haney looked "terrified" and "frantic". Haney-Ramirez sapped the 'Big Apple' of its energy and vibe but the early drama in the headline bout lifted the mood. Romero landed a stinging double left hook to floor Garcia. It was a flush and hurtful punch which he later followed with a clubbing right before Garcia regained his senses. With both fighters unwilling to over-commit, Romero edged the rounds with better use of the jab, coupled with Garcia's tentativeness. "Get busy," trainer Derrick James pleaded with Garcia before the championship rounds. The pep talk had no impact as Romero landed a combination to head and body in the 11th. Haney, now ringside, was left shaking his head at the final bell.

  Times Square - located where Broadway and 7th Avenue meet at 42nd Street - was turned into a boxing venue.

  In a first for the sport, a ring was constructed in the middle of the city's iconic landmark. Fighters were driven through the New York traffic in distinctive vehicles, including classic yellow cabs and monster trucks. Garcia arrived in a Batmobile. They walked up a short runway and into the ring, a journey which took no more than 30 seconds at a leisurely pace. The action was shown on screens to spectators outside the venue. Inside, about 300 invited guests, including boxing greats Mike Tyson and Roberto Duran, watched as downtown Manhattan's iconic high-rise buildings, dazzling neon signs and LED advertising provided a famous backdrop. This unprecedented event may be a sign of the future. Saudi Arabia's boxing powerhouse Turki Alalshikh has grand plans to host a boxing card at the notorious former Alcatraz prison in San Francisco, California.
