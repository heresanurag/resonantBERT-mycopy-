title: 'Tottenham Street: Fire crews tackle central London blaze - BBC News'
date: '2025-03-06'
section: London
url: http://www.bbc.co.uk/news/articles/cvg137y10vjo
content: |-
  Six fire engines and 40 firefighters were called to Tottenham Road in Euston on Thursday morning.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  About 40 firefighters have tackled a fire in central London, as smoke was seen spreading across the capital's skyline. Crews were called to a fire at two buildings near Tottenham Street at 07:43 GMT on Thursday, the London Fire Brigade (LFB) said. Six fire engines were called to the scene, and two hours later, the fire was under control, the brigade said. The LFB said an investigation had begun into the cause of the fire.

  Alec McNally, station commander at the LFB, said the fire spread towards the roof of the building

  Alec McNally, station commander at the LFB, said: "This morning crews were called to a fire at Tottenham Street that involved two buildings. "[They] had to put out a fire that had developed onto an atrium-style conservatory, which was towards the roof of the building." He added that the fire was now under control and one adult was rescued by firefighters and taken to hospital with "mild smoke inhalation". The brigade urged people to avoid the area and keep windows and doors closed to avoid smoke.

  BBC reporter Gem O'Reilly, at the scene, described the smell of the smoke as "horrendous" and "like burning chemicals". One local resident added that it was a "toxic and acrid" smell. The London Ambulance Service said that its first paramedic arrived at the scene less than two minutes after the emergency alert was received. "We sent a number of resources to the scene, including ambulance crews and members of our Hazardous Area Response Team," a spokesperson said. "We treated one patient at the scene and took her to hospital."

  Police and ambulance crews are also at the scene

  The LFB said half of the ground floor of the building was alight, and the brigade used one of its 32m turntable ladders to help fight the fire from above. Crews from Soho, Euston, Islington and surrounding fire stations were at the scene. On Thursday afternoon, the LFB said one fire engine remained at the scene alongside its fire investigation unit. The cause of the fire is not yet known, the LFB said.

  Black smoke was seen from various points in central London on Thursday morning
