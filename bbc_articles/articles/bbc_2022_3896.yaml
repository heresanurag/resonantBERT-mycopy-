title: 'Ukraine war: Drone footage shows level of devastation in Mariupol - BBC News'
date: '2022-03-19'
section: General
url: http://www.bbc.co.uk/news/world-europe-60800581
content: |-
  Video shows destroyed blocks of flats and a shopping mall in the besieged Ukrainian port city.

  Blocks of flats and a shopping mall have been completely destroyed in Mariupol, Ukraine.

  The besieged port city has faced constant shelling since the war started three weeks ago.

  The Mayor of Mariupol Vadym Boichenko told the BBC that fighting has reached the city centre.

  Read more on the attack on Mariupol here.

  This video has no sound
