title: 'Organ donation: Anglesey man killed in tractor accident saves four lives -
  BBC News'
date: '2024-09-23'
section: Wales
url: http://www.bbc.co.uk/news/articles/czd1595pldyo
content: |-
  Macauley Owen helped to save the lives of four others by donating his organs.

  Delyth Owen says she feels like her late partner Macauley lives on in the four people his organs helped to save

  A "hero" 26-year-old man who was killed in a farming accident has helped to save the lives of four others by donating his organs, his partner has said. Macauley Owen, a groundworks engineer from Anglesey, died in hospital on 6 January 2023 after he was hit on the head by the rear gate of a tractor trailer. His partner, 43-year-old Delyth Owen, said: "His heart still goes on somewhere, in somebody." She said she felt like he still lived on in the four people who received organs from him - including one patient who wrote to thank Macauley for saving her life.

  Macaulay's accident, which caused severe brain and chest injuries, occured on 3 January 2023. He died three days later, on Delyth's birthday. With no hope of survival, specialist nurses discussed with Delyth and Macauley’s parents the sensitive issue of donating his organs.

