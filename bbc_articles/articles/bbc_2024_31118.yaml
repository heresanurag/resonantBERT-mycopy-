title: JLR whistleblower sacked for publishing concerns about VinFast cars - BBC News
date: '2024-12-18'
section: England
url: http://www.bbc.co.uk/news/articles/c20nr3zdppjo
content: |-
  Mechanical engineer Hazar Denli lost his job after publishing online concerns about an electric car.

  Mechanical engineer Hazar Denli says he was sacked after raising safety concerns

  The BBC has seen evidence the multinational corporation that owns Jaguar Land Rover (JLR) arranged for a whistleblower to be sacked for raising concerns about the safety of electric cars it designed. Confidential emails between executives at Tata Group reveal they retaliated against mechanical engineer Hazar Denli for posting concerns on Reddit that lives were being put at risk. He was then blacklisted. US authorities are now investigating an earlier model of the same car after 28 reports of safety defects and a crash in which a family-of-four were killed. In response to a detailed right of reply letter from the BBC, both JLR and Tata Group declined to comment.

  Mr Denli, from Milton Keynes, first raised concerns internally while working at a different division of Tata Group, its global engineering consultancy Tata Technologies. He told the BBC that in test-driving prototypes, designed by Tata Technologies for Vietnamese car maker Vinfast, he identified improperly designed components in the car's chassis, including its suspension system. At low mileages, some of them were snapping off, he said. That created a risk that under stress, such as hitting a pothole at speed, the wheels could become misaligned, causing the car to veer to the left or right without prompting, and the driver could lose control, Mr Denli added. "We saw, for example, the front strut-to-knuckle connection was loosening, which could be extremely dangerous," he said. "It could cause a loosening of the entire structure that could cause wheels to come off. "In a crash scenario, it could be completely unsafe. It could cause the vehicle to lose control."

  US authorities have started an investigation into the VinFast VF8 after drivers reported flaws

  Mr Denli, a specialist in chassis design, was appointed to lead the engineering team working on the car's front suspension and chassis from September 2022, halfway through a design and testing phase he says had an unusually tight timetable. He soon became concerned VinFast was cutting corners with safety, keeping costs down by employing a small team of inexperienced engineers. His concerns grew when he heard three of his predecessors had quit after short spells on the project. He says in February and March 2023, while running vigorous testing on VinFast cars at the Mira Technology Park near Nuneaton, two components snapped off and another two failed. He reported the "extremely concerning" incidents to colleagues at Tata Technologies Limited (TTL), the consultancy's UK division, based in Leamington Spa, Warwickshire. In subsequent testing, he alleges further components failed. Mr Denli said they were failing after fewer than 25,000 km (15,534 miles), when normally they would be expected to last for at least 150,000 km (93,205 miles). "In the drive units, some of the brackets were completely failing and falling out on to the road," he said. "We're talking one or two kilograms worth of aluminium. "These [incidents] started causing alarm bells to go off just a short time before we we went into production."

  He escalated his concerns to senior executives at TTL and VinFast and said he had recommended they redesign the faulty components and manufacture safer, higher quality parts. That would have sharply boosted costs and required VinFast Group to postpone production of the car, he added. But VinFast, which was preparing to sell shares in itself and raise funds by floating on the New York Stock Exchange, instead pushed ahead with production. Mr Denli asked Tata Technologies to reassign him to another project but senior managers refused. Unhappy to be associated with the VinFast car, he says, in May last year he resigned.

  With his skills as a consultant engineer in demand, Mr Denli later found new work via an agency at JLR in Gaydon, also owned by the Tata Group. But he said he kept seeing reports online appearing to show serious safety defects in earlier models of the same VinFast car – including a video that appeared to show a car reversing with no driver in it – and crashed cars where the wheels had come off. In another report, a VinFast car at a showroom in Germany caught fire. The same components he was testing in VinFast's VF6 and VF7 models had been carried over from two earlier models already on sale in the United States, Vietnam and Europe - the VF8 and VF9. Then on 24 April this year, a family-of-four was killed in a crash, external in Pleasanton, California. Police reported the vehicle lost control, veered off the road, hit a pole and caught fire. The following month, US safety regulator the National Highway Traffic Safety Administration (NHTSA), announced it was reviewing the VinFast VF8. VinFast said it was cooperating with the investigation. The reports of the crash prompted Mr Denli to publish the posts on a Reddit account, external saying he had worked on the design of the car and it was a vehicle he believed endangered lives. "I would get into every other vehicle I have designed from other brands... and every vehicle has flaws... But Vinfast, I wouldn't get into one... never will and I won't let my loved ones get into one either," he wrote. Two months later, on 18 July this year, Mr Denli's contract at JLR was terminated.

  Internal documents obtained through a Data Subject Access Request (DSAR) reveal a senior executive at his former employer Tata Technologies had been in touch with JLR executives to seek his dismissal. After he saw the Reddit posts, Tata Technologies HR director Patrick Flood discussed his company's wish to have Mr Denli's new employment terminated with JLR's HR director and board member Dave Williams. Mr Flood told Mr Williams that Tata Group's client VinFast had conducted its own investigation and identified Mr Denli as the author of the Reddit posts: "The concern is if he has done this now, he could do the same at JLR." The same day he was sacked, Mr Denli was blacklisted on industry recruitment platform Magnit, which told JLR he had been "red-flagged" so any applications from him for other work via the platform would be automatically declined. On 19 July, Mr Flood emailed JLR corporate investigators: "I just wanted to check whether the individual's services have been terminated with JLR?" The investigator confirmed they had. The internal documents show another Tata Technologies engineer had also told JLR there were problems with components Mr Denli had warned about on Reddit. Mr Denli said his bosses at JLR knew he had done nothing wrong in his JLR employment and told him he had been dismissed because Tata Group was embarrassed by his postings about its client, VinFast. He is now taking JLR to an employment tribunal. "I was distressed as to what was happening around the world where innocent people were paying the price - a very high price," he said. "I thought that if some people would start to speak up about it, they would actually be forced to make some changes. Unfortunately, their response was not to make these improvements, but, 'Hey, who said this? Let's go and shut him up'."

  On 12 September, the NHTSA launched an investigation into the Vinfast VF8. It announced it was looking into 3,118 VinFast vehicles, external sold in the US after 14 drivers reported the Lane Keep Assist systems were flawed in VF8 cars bought in 2023 and 2024. The NHTSA said the drivers reported the system "has difficulty detecting lanes on the roadway, provides improper steering inputs and is difficult to override by the driver". VinFast said it would cooperate fully with the NHTSA throughout this process. "We take all safety concerns seriously and will continue to monitor the situation closely," VinFast told Reuters, expressing the company's confidence in its safety standards. The number of reports of safety issues received by the NHTSA has now grown to 28, external.

  Stronger protections are needed for whistleblowers, supporters say

  In UK employment law, workers have some protection from employer retaliation if they disclose information they reasonably believe shows the health and safety of any individual is likely to be endangered. Under the Public Interest Disclosure at Work Act 1998, any clause in a contract that seeks to bind them to silence is void. However, there is growing pressure in Parliament for stronger safeguards for whistleblowers amid concerns existing protections are too weak. A bill will be introduced on Wednesday proposing to set up an Office of the Whistleblower to protect workers who speak up. Supporters such as Baroness Susan Kramer, a former transport minister, says Mr Denli's case is not exceptional and underlines why the bill is needed. "Whistleblowers very typically find themselves fired, blacklisted for future jobs and they pay a huge price in terms of their personal career," she said. "It is not acceptable, because we need whistleblowers to deter wrongdoing and to expose wrongdoing." Georgina Halford-Hall, chief executive of Whistleblowers UK, said: "This story is one of hundreds we hear every year from whistleblowers who have been rewarded for doing the right thing with retaliation. "Currently whistleblowers have to decide between speaking up and their personal wellbeing. The best incentive that MPs can deliver is to ensure whistleblowers are properly protected and that wrongdoing will be investigated." The BBC offered both Tata Group and JLR the opportunity to comment in detail. Tata Group, the multinational corporation that owns JLR, did not respond. JLR said it did not comment on ongoing legal proceedings. VinFast said: "We do not interfere in the recruitment or HR activities of the Tata Group or its companies. We have no further comment on the matter."

