title: 'Newspaper headlines: Putin''s ''peace plan'' and tariffs ''shock'' - BBC News'
date: '2025-04-23'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cpwz0501rkvo
content: |-
  The latest twist in Ukraine talks features on many front pages as well as the IMF's verdict on Trump's tariffs

  "Trump to let Putin keep seized land," declares the Daily Telegraph on its front page. The paper says the demand is part of a seven-point plan to try to end the war in Ukraine that will be discussed in London on Wednesday. According to the Financial Times, Vladimir Putin has offered to halt the invasion along current front lines. The Financial Times describes the proposal as the "first formal indication" from Putin that Russia could step back from its "maximalist demands". Many front pages feature images of Pope Francis lying in an open coffin in the Vatican. "In the arms of god," says the Daily Mirror. The Guardian reports that his funeral will begin at 10:00 local time (09:00 BST) on Saturday and it will be led by Giovanni Battista Re, the dean of the college of cardinals. The guest list for the funeral includes US President Donald Trump and Ukraine President Volodymyr Zelensky - with the i Paper focusing on the "intense diplomatic challenge" of coming up with a seating plan. "PM owes apology to so many women" is the message from Conservative leader Kemi Badenoch in the Daily Mail. Sir Keir Starmer had earlier said that he had dropped his belief that transgender women are women, in light of the Supreme Court's ruling on gender. The editorial in the Times says the prime minister has handled the issue "badly" while the Telegraph leader column accuses him of "hypocrisy". The Guardian reports on a "stark assessment" of the global economy by the International Monetary Fund (IMF). The UK is forecast to grow by 1.1% this year, down from the 1.6% predicted in January. The Daily Express says the government cannot blame Trump, describing the chancellor's "tax raid" on employers as an "act of economic vandalism". And under the headline "it's a kind of tragic", the Sun says the sister of Freddie Mercury secretly spent £3m buying Queen memorabilia after it was put up for sale by his ex-girlfriend. The lots included a Wurlitzer jukebox and a waistcoat worn in a music video. Kashmira Bulsara was said to be "furious" at the sale, believing the items should remain in the family.

