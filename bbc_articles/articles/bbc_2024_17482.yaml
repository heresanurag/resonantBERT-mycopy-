content: |-
  Rachel Reeves has won with a majority of more than 12,000 votes. She is likely to become the next chancellor.

  Rachel Reeves wins Leeds West & Pudsey. She is likely to become Keir Starmer's chancellor, and if so, would be the first woman to hold that job.
