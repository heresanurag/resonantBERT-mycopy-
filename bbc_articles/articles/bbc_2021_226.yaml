  Elswhere, Southampton's FA Cup third-round game against Shrewsbury on Sunday was called off on Thursday after a significant number of Shrews players and staff tested positive for coronavirus.

  Wayne Rooney and Derby's first-team squad will miss their FA Cup tie at Chorley on Saturday following a Covid-19 outbreak which closed their training ground on Monday.

  The Rams' team for the game at Victory Park will be made up of under-23 and under-18 players.

  Villa will be doing all they can to ensure Friday's tie goes ahead but the Covid-19 outbreak could also have Premier League ramifications.

  Villa are scheduled to face fourth-placed Spurs at Villa Park on Wednesday and they currently stand only three points behind Jose Mourinho's team.

  There must now be question marks over whether that game will take place.

  If the game is off it will only add to the fixture congestion both clubs are likely to face in an already crowded calendar this season.

  Villa, even though they planned to leave out several established first-team players against Liverpool, still had high FA Cup ambitions and would have wanted to maintain the momentum that has given them such an impressive start to the season after only surviving in the top flight on the final day of last season.

  They will hope the latest testing brings no further complications in the FA Cup context - then attention will turn to what has the potential to be a hugely significant game on Wednesday.
