title: 'Center Parcs Woburn Forest: Teen dies after skateboard fall - BBC News'
date: '2023-11-05'
section: Beds, Herts & Bucks
url: http://www.bbc.co.uk/news/uk-england-beds-bucks-herts-67325725
content: |-
  The company says it has been a "distressing time" and its thoughts are with the boy's family.

  Emergency services were called to Center Parcs Woburn Forest during what was the half-term break for many schoolchildren

  A teenage boy has died after falling from a skateboard at a Center Parcs resort.

  Paramedics were called to the company's Woburn Forest site in Millbrook, Bedfordshire, shortly before 16:00 BST on 26 October.

  East of England Ambulance Service (EEAS) said he was taken to Bedford Hospital for treatment but later died.

  A Center Parcs spokesman said: "This is a distressing time and our thoughts are with their family and friends."

  "At this time we are also supporting colleagues who assisted the emergency services and express our gratitude to both," he added.

  An EEAS spokesperson said: "We were called at 15:54 on Thursday, 26 October to Center Parcs Woburn Forest, with reports that a teenage boy had fallen off his skateboard.

  "An ambulance, ambulance officer vehicle and a response car from the air ambulance were sent to the scene. The boy was transported by road to Bedford Hospital South Wing for treatment."

  His death comes a month after a female member of staff died following a collision at the site.

