title: 'Jo Swinson: Lib Dems would scrap business rates - BBC News'
date: '2019-11-19'
section: General
url: http://www.bbc.co.uk/news/uk-politics-50462265
content: |-
  Lib Dem leader Jo Swinson says the plan would "breathe new life" into high streets.

  Lib Dem leader Jo Swinson says her party would scrap business rates if elected, in order to support small businesses.

  Business rates are a tax based on rental values of the property that businesses occupy. Business lobby groups often complain that rates have gone up faster than inflation since the current regime was introduced in 1990.

  Speaking to business leaders in London, Ms Swinson said her government would provide "clear action" to breathe new life into high streets.
