  Scotland's Marc Austin wins triathlon bronze at the Commonwealth Games as England's Brownlee brothers miss out on medals.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Scotland's Marc Austin won triathlon bronze at the Commonwealth Games on the Gold Coast as England's Brownlee brothers missed out on medals. Two-time Olympic champion Alistair Brownlee faded to finish 10th, while brother Jonny came home seventh. Earlier, Jessica Learmonth won England's first medal of the Games with silver in the women's race.

  The Commonwealth triathlon is held over a sprint distance, consisting of a 750m open-water swim, a 20km cycle and a 5km run. The Brownlee brothers were looking to repeat their one-two from Glasgow 2014 but Schoeman - who finished third behind them at the 2016 Olympics - left the Englishmen behind with a strong run. Jonny Brownlee, 27, was alongside 24-year-old Austin for much of the 5km but could not keep pace with the Scot and finished in 53 minutes nine seconds.

  Brother Alistair, 29, exited the second transition in the lead but faded to come home one minute, six seconds behind Schoeman. Northern Ireland's Russell White (14th) and James Edgar (22nd), Scotland's Grant Sheldon (17th) and England's Thomas Bishop (19th) all completed the course in wet conditions.

  Alistair, who carried the England flag during the opening ceremony, said his build-up had been hampered by a calf injury. He said: "I would have preferred my calf to be good two months ago. If it was and I was able to train in that time, I reckon I would have been able to win that race." Jonny said his training had been disrupted by an issue with his thigh. "It was pretty terrible today," said Jonny. "My first thought was 'I wish I was fit'." The Brownlees have a second chance to win a medal when they compete in the mixed team relay on Saturday, 7 April at 04:01 BST.
