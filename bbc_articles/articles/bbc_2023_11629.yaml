title: Nurse Lucy Letby to be sentenced for murdering seven babies - BBC News
date: '2023-08-21'
section: Liverpool
url: http://www.bbc.co.uk/news/uk-england-merseyside-66545358
content: |-
  Letby has indicated she will not be in court for sentencing, sparking calls for more powers to force criminals to attend.

  Lucy Letby was convicted following a two-year investigation by Cheshire Police

  Nurse Lucy Letby is due to be sentenced later after being found guilty of murdering seven babies, making her the UK's most prolific child serial killer in modern times.

  The 33-year-old was also convicted of trying to kill six other infants at the Countess of Chester Hospital.

  The trial lasted for more than 10 months and is believed to be the longest murder trial in the UK.

  She has indicated she will not be in court for the hearing.

  Her legal team said she also does not want to follow proceedings via a videolink from prison, the reasons for her non-attendance at Manchester Crown Court have not been disclosed.

  If Letby does fail to show up to the hearing, she will not hear the families' victim impact statements - where people have a chance to tell the court about how a crime has affected them and those around them.

  She will also not hear the judge, Mr Justice James Goss, give his sentencing remarks where he will explain the reasons for the length of the prison sentence handed down to her.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch the moment police arrest Lucy Letby at her home

  Letby - who deliberately injected babies with air, force fed others milk and poisoned two of the infants with insulin between June 2015 and June 2016 - refused to appear in the dock as the latest verdicts were read out on Friday.

  They had been delivered over several hearings, but could not be reported until all the verdicts were returned.

  Letby, originally of Hereford, broke down in tears as the first guilty verdicts were read out by the jury's foreman on 8 August after 76 hours of deliberations.

  She cried with her head bowed as the second set of guilty verdicts were returned on 11 August.

  The refusal to attend court last week has led to renewed calls for a new law to compel convicted criminals to attend court for sentencing hearings.

  Letby's expected absence from the dock is the latest in a series of high-profile trials where convicted murderers have refused to turn up, including the killers of Zara Aleena in London and nine-year-old Olivia Pratt-Korbel in Liverpool.

  Former prison governor Prof Ian Acheson told the BBC judges should have the power to compel criminals into the courtroom "to be sentenced in front of the people they have harmed".

  Earlier this year, the government said it was committed to introducing legislation to ensure criminals are made to appear in the dock for sentencing.

  Former justice secretary Sir Robert Buckland backed the government's announcement, saying defendants should face tougher consequences if they refuse to appear in the dock, such as receiving longer sentences.

  Facilitating "better ways in which defendants really have nowhere to hide" when it comes to listening or seeing the court "even if they're in the cell" is another option for the government to explore, Sir Robert added.

  "We use television, video links all the time when it comes to defendants who might be on a live link from the prison, for a procedural hearing or even a sentence hearing," he told BBC Radio 4's Today programme.

  He said this would avoid "disruptive behaviour" that would "cause upset to the victims and the wider public".

  Families of victims said they will "forever be grateful" to jurors who had to sit through 145 days of "gruelling" evidence.

  The defendant was found not guilty of two attempted murder charges and the jury was undecided on further attempted murder charges relating to four babies.

  Nicholas Johnson KC, prosecuting, asked the court for 28 days to consider whether a retrial would be sought for the remaining six counts of attempted murder.

  During the trial, which started in October, the prosecution labelled Letby as a "calculating and devious" opportunist who "gaslighted" colleagues to cover her "murderous assaults".

  She was convicted following a two-year investigation by Cheshire Police into the alarming and unexplained rise in deaths and near-fatal collapses of premature babies at the hospital.

  The government has ordered an independent inquiry into the circumstances behind the baby murders.

