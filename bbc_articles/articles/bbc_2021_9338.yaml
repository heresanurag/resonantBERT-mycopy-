title: 'Germany floods: Helicopter rescues residents from rooftops - BBC News'
date: '2021-07-16'
section: General
url: http://www.bbc.co.uk/news/world-europe-57849206
content: |-
  Residents of Merzbach were rescued by helicopter after floods devastated the area.

  Dozens of people have died and many more are missing after severe floods in Germany.

  Other areas of Europe, such as Belgium and the Netherlands, have also been badly affected.
