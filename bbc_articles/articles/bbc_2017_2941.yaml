title: Catwalk models put cancer in spotlight - BBC News
date: '2017-02-12'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38948705
content: |-
  Cancer patients took to the catwalk as part of New York Fashion Week.

  The event was organised by Say Yes to Hope a charity which provides support for people with advanced cancer.
