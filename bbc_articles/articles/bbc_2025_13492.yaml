title: Man, 46, arrested as Glasgow roads re-open after 'disturbance' - BBC News
date: '2025-06-07'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/cj93g8pkzzeo
content: |-
  The incident, which was reported at 04:45, delayed the opening of the city's Mitchell Library by more than two hours.

  Police were alerted before 05:00 to the incident

  A man has been arrested after a number of roads in Glasgow city centre were closed for seven hours due to a disturbance. Police Scotland said the alarm was raised at about 04:45, near St Vincent Street. Officers said no one was injured and there was no threat to the wider public. A force spokesman confirmed a 27-year-old man had been arrested in connection with the incident.

  The roads closed were Berkeley Street at North Street, Granville Street at Sauchiehall Street, Kent Road from North Street to Elderslie Street, Cleveland Street and Cleveland Lane. A number of police vehicles and an ambulance were parked near the city's Mitchell Library, which opened more than two hours later than planned. Officers said inquiries into the incident were ongoing and thanked members of the public for their patience.
