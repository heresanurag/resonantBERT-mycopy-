title: President Donald Trump 'does not want war with Iran' - BBC News
date: '2019-05-17'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-48307445
content: |-
  The US president reportedly tells top officials he does not want a war with Iran as tensions mount.

  Tensions have risen between Iran under President Hassan Rouhani and the US under President Donald Trump

  US President Donald Trump has said he does not want a war with Iran amid rising tensions between the two countries, according to senior officials.

  In a meeting on Wednesday the president told aides he did not want US pressure to turn into a conflict.

  The US has deployed warships and planes to the Gulf and withdrawn diplomatic staff from Iraq in recent days.

  Officials cited threats from Iran for the moves.

  The latest frictions come after Iran suspended its commitments under the 2015 international nuclear deal, and threatened to resume production of enriched uranium.

  The accord aimed to cut sanctions on Iran in exchange for an end to its nuclear programme, but the US unilaterally withdrew from the agreement last year and imposed new sanctions.

  Tehran has allegedly placed missiles on boats in the Gulf, and US investigators reportedly believe the country damaged four tankers off the coast of the United Arab Emirates - claims Iran has denied.

  But when asked by reporters on Thursday if the US was going to war with Iran, Mr Trump answered: "I hope not."

  The president's National Security Adviser John Bolton warned Iran there would be "hell to pay" if they harmed the US or its allies last September.

  Iran's Foreign Minister Mohammad Javad Zarif on Friday called on China and Russia to protect the 2015 nuclear deal with "concrete action".

  "So far the international community has mostly released statements rather than taking action," Mr Zarif said at a meeting in Beijing with China's Foreign Minister, Wang Yi.

  A Twitter account linked to Iranian MP Heshmatollah Falahatpisheh meanwhile reportedly called for a "red desk" in a third country to attempt to manage current tensions between Iran and the US.

  The UN Security Council is meeting to discuss the tensions on Friday.

