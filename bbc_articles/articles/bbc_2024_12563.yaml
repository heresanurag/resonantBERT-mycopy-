title: 'Kirkby: Man shot in ''targeted attack'' after group seen on bikes - BBC News'
date: '2024-06-02'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/c888pmy4gego
content: |-
  Police said “a group of males” were seen riding bikes on the street just before the shooting.

  Police are appealing for information after the shooting on Ormonde Crescent

  A man has been shot and injured in what police believe is a targeted attack. The victim, in his 30s, self-presented at hospital after suffering a leg injury in the attack in Ormonde Crescent, Kirkby, at about 21:00 BST on Saturday, Merseyside Police said. He is in a serious but stable condition. Police appealed for information, saying “a group of males” in black clothing were riding bikes on the road just before the shooting. They then fled towards Mintor Road and Simonswood Lane.

  Ch Insp Paul Rannard, from Merseyside Police, said the force believed "this was a targeted attack”. "Fortunately, the man’s injuries are not life threatening, but I understand this is a shocking incident for the local community and they will be understandably concerned by what has happened.” Police officers will patrol the area in coming days and have appealed for anyone with footage to contact them.
