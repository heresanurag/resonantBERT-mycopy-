content: |-
  The BBC follows one Northern rail user, Lorna, on her daily commute from Burnley to Leeds.

  This week, train services scrapped after a timetable shake-up at Northern have begun running again - but passengers have been facing more cancellations.

  The BBC spent the day with one rail user, 24-year-old Lorna, on her daily commute from Burnley to Leeds.
