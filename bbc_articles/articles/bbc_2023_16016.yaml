content: |-
  The foreign secretary says he has "raised this in every conversation" he has had with the Israeli government.

  Israel has right to defend itself but they have duty to civilians too - Cleverly

  Foreign Secretary James Cleverly is now in the hot seat. Victoria Derbyshire asks him about whether the UK is giving a "green light" to the Israeli government for its actions in Gaza. He says that "the Palestinian people are suffering because of the actions of Hamas - as well as the Israeli people with the most brutal attack for decades". "We are very clear that Hamas are causing death and pain to Israelis as well as Palestinians," he continues. Asked about the looming ground offensive and Israel's plan to attack by land, air and sea, Cleverly says he is of course worried by the loss of life in Gaza. But he adds: "Israel has the right to defend itself and protect itself from terrorist attacks from Hamas coming out of Gaza. "They do have a duty to minimise civilian casualties and I've raised this in every conversation I've had with the Israeli government about this issue."
