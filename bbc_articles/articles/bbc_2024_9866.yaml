  Rishi Sunak and Sir Keir Starmer clash in the Commons on the last day of campaigning before polls in England and Wales.

  No, the first asylum seeker who arrived in Rwanda was not ‘deported’

  Earlier we heard from Conservative MP Jonathan Gullis, who claimed during PMQs that: "We can see the Rwanda deterrent is working and we've now deported our first illegal migrant." The Tory MP was talking about reports that the first UK failed asylum seeker had arrived in the east African nation earlier this week. Deportation is a type of return that is enforced by the government. This usually happens after a person has been convicted of a crime or when their removal is judged to be in the public interest. But the unnamed man in the reports arrived in Rwanda through a voluntary government scheme, which offers some failed asylum seekers up to £3,000 to relocate there from the UK. It is separate from the government's main Rwanda scheme, which aims to forcibly remove some migrants from the UK. The voluntary scheme is a variation of an existing voluntary returns scheme, where failed asylum seekers receive cash to return to their home country.
