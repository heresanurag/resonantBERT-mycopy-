title: Woman guilty of breaching abortion clinic protection zone - BBC News
date: '2025-04-05'
section: Dorset
url: http://www.bbc.co.uk/news/articles/c4gr30z4lnlo
content: |-
  Livia Tossici-Bolt, 64, is ordered to pay £20,000 for breaching a Public Spaces Protection Order.

  Livia Tossici-Bolt was found guilty of two charges of breaching the Public Spaces Protection Order on two days in March 2023

  A woman at the centre of a free speech controversy involving the US government has been convicted of breaching an abortion clinic protection zone. Livia Tossici-Bolt, 64, has been given a two-year conditional discharge and ordered to pay £20,000 for two charges of breaching the Public Spaces Protection Order (PSPO) on two days in March 2023. The anti-abortion campaigner held a sign saying "Here to talk, if you want" outside a clinic in Bournemouth. Her case caught the attention of the US State Department and US Vice-President JD Vance.

  It was highlighted by the Bureau of Democracy, Human Rights, & Labour - a bureau within the US State Department - which said it was "concerned about freedom of expression in the United Kingdom". It said later it was "disappointed" by the ruling in a post on X. "Freedom of expression must be protected for all," it said. At Poole Magistrates' Court on Friday, District Judge Orla Austin said Tossici-Bolt "lacks insight that her presence could have a detrimental effect on the women attending the clinic, their associates, staff and members of the public". The judge continued: "I accept her beliefs were truly held beliefs. Although it's accepted this defendant held pro-life views, it's important to note this case is not about the rights and wrongs about abortion but about whether the defendant was in breach of the PSPO." The prosecution had been brought by Bournemouth, Christchurch and Poole Council for breach of a PSPO under the Anti-social Behaviour, Crime and Policing Act 2014, external. The zone at Ophir Road came into force in October 2022, running from 07:00 to 19:00, Monday to Friday.

  Rosalind Comyn, defending, said Tossici-Bolt had no previous convictions. She added: "The council hasn't produced any evidence that Ms Tossici-Bolt was in fact either observed by any service user or any other forms of harm were caused by her behaviour. "My point is not that breaches can never cause harm, rather that there is no evidence that Ms Tossici-Bolt's conduct did in this case." Tossici-Bolt, a retired medical scientist living in Bournemouth, previously said she was grateful to the US State Department for taking note of her case. "Great Britain is supposed to be a free country, yet I've been dragged through court merely for offering consensual conversation," she said. "Peaceful expression is a fundamental right - no-one should be criminalised for harmless offers to converse." She went on to say it was tragic to see "that the increase of censorship in this country has made the US feel it has to remind us of our shared values and basic civil liberties". She added: "It deeply saddens me that the UK is seen as an international embarrassment when it comes to free speech."

  Heidi Stewart, CEO of British Pregnancy Advisory Service (BPAS), said the reproductive health charity welcomed the verdict, "which will protect women and the staff who provide abortion care". She added: "The clinic in Bournemouth has been subjected to many years of anti-abortion protests which resulted in more than 500 reports of harassment before this local safe access zone was brought into force. "This case was never about global politics but about the simple ability of women to access legal healthcare free from harassment. "It is up to the police and judicial system to determine whether individuals have broken the law. "I, meanwhile, stand shoulder to shoulder with our staff who work so tirelessly to protect our patients from the impact of anti-abortion harassment outside the clinic gate." In October 2024, buffer zones were brought in nationally to prohibit protest within a 150-metre radius around abortion services. They were introduced through the Public Order Act 2023, external, and those convicted of breaking the law could face an unlimited fine. A conditional discharge is a conviction, external where the recipient could still get a sentence if conditions set by the court are broken.

