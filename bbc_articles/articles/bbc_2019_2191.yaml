id: bbc_2019_2191
title: 'Ren Zhengfei: ''When the mask fell'' - BBC News'
date: '2019-02-19'
section: Business
url: http://www.bbc.co.uk/news/business-47286166
content: |-
  The founder and boss of China's Huawei is confident the firm can withstand Western governments' scrutiny.

  For a man known as reclusive and secretive, Ren Zhengfei seemed confident in the conviction that the business he's built for the last 30 years can withstand the scrutiny of Western government.

  "There's no way the US can crush us," the 74-year-old founder of Huawei told me in a room filled with ornate European chairs and dining tables.

  This is a man who seemed unfazed by the claims of spying and intellectual property theft. Remarkably jovial and humorous, he cracked jokes throughout the entire interview.

  When I asked him whether the US's pressure on its allies would succeed in keeping Huawei out of Western markets because it said Huawei was a tool of the Chinese government - he told me that Huawei has lots of options.

  "If the lights go out in the West, the East will still shine. And if the North goes dark, there is still the South. America doesn't represent the world. America only represents a portion of the world."

  Mr Ren is right, the US makes up only a fraction of his overall business.

  But the US allegations against Huawei have started to influence his more important markets, like Europe and the UK where plenty of concerns have been voiced.

  This is a man who wants the world to believe that his company stands strong in the face of pressure from the US.

  But where I saw his mood change was when I asked him about his current links to the Chinese military and the government.

  While he answered all my questions, he refused to be drawn into a conversation on this, only to say that these were not facts, simply allegations - and insisted that political connections are not what has led Huawei to be successful today.

  When I put to him the reports that his former chairwoman, Sun Yafang, had once worked with China's Ministry of State Security, he told me that her profile was up on the company's corporate website and that he didn't think it was "OK to suspect or guess where this person used to be".

  Politics has played a part though, in the arrest of his daughter, and chief financial officer of the company Meng Wanzhou.

  Up until now, Mr Ren has chosen to stay clear of wading into the motivations behind his daughter's arrest - but today he pointed the finger at the US for her predicament.

  "I object to what the US has done," he said, speaking of his daughter's arrest.

  "This kind of politically motivated act is not acceptable. The US likes to sanction others, whenever there's an issue, they'll use such methods."

  "But now that we have gone down this path, we'll let the courts settle it."

  He also confirmed that there is a Communist Party committee in Huawei, although he said this is what all companies - foreign or domestic - operating in China must have in order to abide by the law.

  On whether his equipment was potentially vulnerable to Chinese interference, he was far more clear - and practical.

  He said that the Chinese government had officially stated they have never required companies to install backdoors, yet the reality is that there is no law in China that would protect him if he were asked to provide the government with access.

  And that in itself will prove to be the deciding factor for many governments as they weigh up whether to let Huawei in to their 5G networks.

  Chinese companies like Huawei have only started to threaten the dominance of Western businesses in the last decade.

  As they have come up, the world has had to grapple with the very different system they operate in.

  Central to that is the fear that they are obliged to serve the interests of the Communist Party. Whether they do or not may be beside the point.

  The perception itself could determine Huawei's success in the future.

  You can hear more from Ren Zhengfei in a special edition of Asia's Tech Titans: The Man Who built Huawei this weekend on BBC World News.
