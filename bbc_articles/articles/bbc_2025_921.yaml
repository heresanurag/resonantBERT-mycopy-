title: Dozens injured in suspected car ramming attack in Munich - BBC News
date: '2025-02-14'
section: Europe
url: http://www.bbc.co.uk/news/articles/czdl6594835o
content: |-
  The driver, who was detained at the scene, was a 24-year-old Afghan asylum seeker, police said.

  The driver, an Afghan asylum-seeker, was detained at the scene, officials said

  At least 30 people were injured, some seriously, when a car was driven into a crowd in Munich, 10 days before Germans vote in federal elections. The driver was a 24-year-old Afghan asylum seeker, police said, and was identified in local media as Farhad N. He was arrested at the scene and due in court on Friday. Police said counter-terrorism officers had taken over the investigation, but Bavaria's state premier later clarified that there was no immediate indication of "previous extremist backgrounds". Events in the centre of Munich came after a series of deadly attacks in Germany, all allegedly involving immigrants. Chancellor Olaf Scholz said the driver "must be punished and he must leave the country".

  The incident also took place on the eve of the Munich Security Conference - with world leaders, including Ukraine's President Volodymyr Zelensky and US Vice President JD Vance, due to arrive in the city. The ramming occurred during a transport workers' union rally at around 10:30 local time (09:30 GMT) on Thursday. The car was seen approaching police cars at the rally in Dachauer Strasse, a short distance from Munich's main train station, before speeding up and driving into a crowd police said. Police shot at the vehicle before detaining the man. Rescue helicopters were quickly at the scene and Munich's mayor Dieter Reiter said children were among those injured. Eyewitnesses told the BBC they saw people running for shelter in shops and residential buildings as the "distressing" scene unfolded. "It is obviously very unsettling," said a student who had been studying in a nearby coffee shop. "I can't concentrate on anything else." Issues of immigration and security were already at the forefront of 23 February elections because of recent attacks. According to the the German Press Agency, the suspect came to Germany in 2016 as a minor and had his request for asylum turned down the following year. The agency said he was meant to be deported in autumn 2020. Bavarian interior minister Joachim Herrmann said he had not been forced to leave Germany due to security concerns in Afghanistan. He later clarified that the suspect had a valid residence and work permit and that everything about him was legitimate.

  "Something has to change something in Germany – and quickly," he said. He later told German TV that "previous extremist backgrounds are not so easily recognisable at first glance". There were "smaller things", he added, but they had to be evaluated in detail. For Germans there were immediate reminders of an attack on a Christmas market in Magdeburg less than two months ago that killed six people and injured 300 others. "When you get the news that someone has once again driven a car into a crowd of people, the fact that there are many injured, is a slap in the face," said Söder. "We will clarify all the details, but we react cautiously to every attack like this." Police said they could not confirm whether anyone else was involved, following unconfirmed reports of a second person in the car. They appealed for witnesses to come forward with information and footage of the incident.

