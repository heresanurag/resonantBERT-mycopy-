title: Chinese balloon capable of gathering intelligence - US official - BBC News
date: '2023-02-09'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-64587228
content: |-
  US lawmakers have also passed a non-binding resolution condemning China use of the balloon.

