title: 'Ed Sheeran: I would not be here without Jamal Edwards - BBC News'
date: '2022-02-24'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-60504704
content: |-
  The singer-songwriter pays tribute to the late Jamal Edwards, who helped to launch his career.

  Jamal Edwards helped to launch the careers of the likes of Ed Sheeran (pictured), Dave, Skepta and Jessie J

  Ed Sheeran has paid tribute to Jamal Edwards, the late music entrepreneur and YouTube star, saying he played a big role in helping to forge his pop career.

  Tributes flooded in earlier this week, after news broke of the death of the influential 31-year-old.

  Posting on Instagram on Wednesday evening, Brit Award-winner Sheeran said he "would not be here without him".

  "Jamal is my brother," wrote Sheeran, alongside a picture of the two of them.

