content: |-
  Joe Anderson spoke to BBC Breakfast's Louise Minchin after his eldest brother's death in October.

  Liverpool Mayor Joe Anderson spoke to BBC Breakfast's Louise Minchin about his eldest brother's death from coronavirus.

  The politician's brother Bill died in mid-October in hospital.

  Liverpool is in tier three of the new lockdown system.
