content: |-
  Jack Draper bids for a first Grand Slam quarter-final as he faces Czech Tomas Machac at the US Open on Monday.

  Jack Draper lost in four sets to Andrey Rublev in the US Open fourth round in 2023

  Jack Draper will aim to reach a Grand Slam quarter-final for the first time when he faces Tomas Machac at the US Open. The British number one beat Botic van de Zandschulp in straight sets on Saturday to match his best showing at a major - a fourth-round run at Flushing Meadows last year. That performance came during an injury-ravaged season and a year on, a fully-fit Draper believes he is in a much better position to go deeper in the tournament. "I feel very different to last year," he said. "I think I barely played any tennis in the year, struggling with injuries all the time, and then obviously came here. "I think I was still sort of very nervous and unsure before matches, whether I would get through this one, [thinking] am I going to cramp in this one? Am I going to break down physically in this one? "I feel very different now. I'm not waking up every day worried about playing five sets." He will face Czech Machac at around 18:00 BST on Monday. Draper has enjoyed a memorable year to this point, winning his first ATP title at the Stuttgart Open in June before beating Wimbledon champion Carlos Alcaraz at Queen's a few days later. Machac, 23, beat Belgium's David Goffin in straight sets to reach the fourth round of a major for the first time. The Czech won his only previous ATP Tour meeting with Draper 7-6 (8-6) 6-1 in Geneva in May.

  The top seeds in the men's and women's singles are both in action during the evening session on Arthur Ashe Stadium. Poland's Iga Swiatek is yet to drop a set in the tournament and goes up against 16th seed Liudmila Samsonova at 00:00 BST. That is followed by Italy's Australian Open champion Jannik Sinner taking on American 14th seed Tommy Paul. Sixth seed Jessica Pegula of the United States opens play on the main showcourt against Russia's Diana Shnaider. Daniil Medvedev, the only former New York champion left in the men's singles draw, then faces Portugal's Nuno Borges. Former world number one Caroline Wozniacki faces 22nd seed Beatriz Haddad Maia before an all-Australian clash between 10th seed Alex de Minaur and Jordan Thompson in the men's singles. There is also plenty of British interest in the doubles with Joe Salisbury and American partner Rajeev Ram continuing their bid for a fourth successive title in the men's doubles. Henry Patten and Finn Harri Heliovaara, the Wimbledon champions, are also in action, as are eighth seeds Neal Skupski - another British former Wimbledon doubles winner - and New Zealander Michael Venus. Olivia Nicholls and partner Tereza Mihalikova of Slovakia proceed Skupski and Venus on Stadium 17 in the women's doubles. Harriet Dart and French team-mate Diane Parry are first up on court five.
