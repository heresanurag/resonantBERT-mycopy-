  More than 80 years on, Kit is not sure of the exact date of the meeting, but Gibson spent much of the war in Lincolnshire, including at Digby, Coningsby and Scampton. And when his face appeared in several newspapers, Kit was able to reaffirm that he was indeed the mysterious visitor to their home that morning. He had eaten with her family as they had peppered him with questions. Everything had now fallen into place. The cloud of mystery that surrounded their breakfast guests had cleared. These airmen were no strangers. They were part of history.
