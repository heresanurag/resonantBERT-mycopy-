title: 'School meals: Ysgol Dyffryn Nantlle U-turn on 2p debt threat - BBC News'
date: '2021-11-12'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-59265837
content: |-
  Footballer Marcus Rashford is among critics of the school's initial warning to pupils 2p in arrears.

  This video can not be played To play this video you need to enable JavaScript in your browser. "I understand that people should pay their bills but, at the same time, people are struggling"

  Governors of a school which said it would refuse meals to pupils more than 1p in debt have announced they will review its payment system.

  Ysgol Dyffryn Nantlle, in Penygroes, Gwynedd, had told parents the decision was due to a deficit in the school meals budget.

  But it sparked anger, joined by Manchester United footballer and anti-poverty campaigner Marcus Rashford.

  Gwynedd council has now apologised for concern caused by the letter's wording.

  The school's governing body has also called the online payment system "inefficient".

  The letter, sent by strategic head teacher Neil Foden, had said all debts over £10 would be transferred to the council and parents would be invoiced by the authority.

  And those with debts over 1p would receive a message from the school and asked to "clear its debts and credit the system" by next Friday, 19 November.

  The letter was sent out to all parents, not just those with debts, says Mr Foden

  The cook at the school had been told "not to give food to any child" if debts had not been cleared.

  It sparked outrage among some parents, with one father who owed 36p saying he was "absolutely fuming".

  Marcus Rashford took to Twitter to also express concern after the initial decision.

