content: |-
  Pregnant women and babies were moved outside of St Michael's Hospital, supported by midwives.

  To play this video you need to enable JavaScript in your browser. This video can not be played Dramatic footage shows the scale of the blaze

  Pregnant women were moved to safety earlier after a large fire broke out on the roof of a maternity hospital. Emergency services were called to reports of a fire involving solar panels at St Michael's Hospital, on Southwell Street in Bristol, shortly before 16:30 BST. Mothers-to-be and babies were moved outside of the building, supported by midwives who brought out milk and fruit. The fire was extinguished within an hour and the hospital reopened by 19:00. Jess Hutchinson, 22, whose waters had broken, said it was "scary" hearing the fire on the roof, where a number of solar panels have been destroyed by the flames.

  Zainab Badaki, who is 32-weeks pregnant, said: "It was very frightening, because everywhere was dark, the smoke was just all over the place. It was quite scary really. "I saw a lady who had just had a baby, I think, and she was crying, people had to hold her. It was heartbreaking to see." No injuries have been reported and the cause of the fire will be investigated, Avon Fire and Rescue Service said. The public has been asked to avoid the area where possible.

  Matthew Burden was able to speak to his partner who was safe inside the hospital while firefighters tackled the blaze

  Matthew Burden, from Weston-super-Mare, was inside the maternity unit with his wife when the fire broke out. He said she was in labour with their third baby and had been allowed to stay inside. "I went out to get some food, came back and obviously the alarm went off," he said. "They said all partners had to leave. Everyone was going down the fire exit quite fast. "When we came out I saw black smoke, all up in flames." Some of the women were taken to the Bristol University Life Sciences building before being allowed to return to the hospital.

  Black smoke was seen across the city centre

  This is a major maternity unit that deals with women antenatally, during birth, as well as looking at complications before birth. The hospital had to do its best to try to treat women who were still in labour on site, but some women had to be evacuated from the building, one in particular whose waters had just broken. There are around 5,000 babies born each year at this maternity unit, on average around 14 a day.

  Prof Stuart Walker, hospital managing director for University Hospitals Bristol and Weston NHS Foundation Trust, thanked their "amazing staff" who worked closely with the fire service to partially evacuate the hospital. "The hospital, including the delivery suite, has now reopened to women who need to access our services and people with appointments tomorrow should attend as planned," he added.

  A spokesperson for the fire service said crews from 10 different stations were called to "reports of a fire on the roof of a hospital involving solar panels". "Upon arrival, crews located a fire on the roof of the building and began firefighting efforts," they said. "We can confirm that the fire has now been extinguished. "The cause of the fire is unknown. A full investigation will take place following the incident." Avon and Somerset Police said it was supporting the fire service at the scene. In a statement on X, the force said: "St Michael's Hill is closed to vehicles and pedestrians and people are urged to avoid the area if at all possible."

  Emergency services are at the scene and pregnant women are being helped by midwives

