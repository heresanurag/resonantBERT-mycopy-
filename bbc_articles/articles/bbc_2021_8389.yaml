title: 'Wildfires: Firefighters battle blaze from top of moving train - BBC News'
date: '2021-07-22'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-57922181
content: |-
  Officials in California are pulling out all the stops to contain the state's largest wildfire.

  In California, firefighters are fighting the state's largest wildfire from atop a moving train. Wildfires continue to rage throughout the western US and Canada and even cities on the east coast are feeling the effects.
