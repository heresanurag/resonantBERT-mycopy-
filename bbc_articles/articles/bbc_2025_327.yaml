title: King's Lynn detectorist unearths warrior's gold scabbard stud - BBC News
date: '2025-01-05'
section: England
url: http://www.bbc.co.uk/news/articles/c5y74yyewxlo
content: |-
  Experts say the stud, found at a detecting rally, could be one of "less than a dozen in the country".

  The scabbard stud, or boss - about 13mm (0.5in) in diameter and inlaid with red stones separated by strips of sheet gold - was found in September

  A tiny Sutton Hoo-era gold and garnet mount for an Anglo-Saxon warrior's sword belt has been found during a metal detecting event. Treasure expert Helen Geake described the find as one of "probably less than a dozen in the country" and "only the fifth" on the British Museum's Portable Antiquities database, external. The late 6th to early 7th Century mount, or boss, was unearthed during an event organised by Digging History UK near King's Lynn, Norfolk. Paul Mortimer, who has created replicas of weapons found at Sutton Hoo, in Suffolk - where an Anglo-Saxon burial ship was discovered - said it probably attached a sword scabbard to a warrior's belt "with some form of very thin fabric or leather".

  "Swords are usually detachable from the belts in some way and it [the boss] was probably used to help attach the belt to the sword - that's what I've done with the Sutton Hoo replica," said the retired teacher, who lives near Chelmsford in Essex.

  Paul Mortimer said the only part of his replica not evidenced by Sutton Hoo's archaeology was the hemp string connecting the two ends of the scabbard loop holding the bosses (above)

  The boss would have been mounted on to a thick rim of white organic material such as bone, ivory or antler, which has long since vanished. Dr Geake, who is Norfolk's finds liaison officer, said there is little evidence of how they would have been used - which is why Mr Mortimer's research is helpful. "They are never identical - even the two found on the Sutton Hoo sword are slightly different from each other," she added. She speculated it might have been a peace band, which were referenced in the Norse Sagas. The sagas retell stories from the Viking era, but were written hundreds of years after the events, from 1200 onwards, external. "Unfastening a peace band is something you had to do before taking a sword out of a scabbard... to make someone go through a step before taking out their sword, to stop violence erupting quickly," Dr Geake said.

  A replica of the sword was part of an exhibition at the National Trust-owned Sutton Hoo site in 2022

  But Mr Mortimer said: "I think it's possible to speculate it's about eyes - one of the early writers called the bosses, on their white backing, the eye of the sword, which I think is a fairly good insight." He has written a paper with Neil Price, currently professor of archaeology at the University of Uppsala, Sweden, about ritual depictions of the one-eyed Norse god Odin, external. As Sutton Hoo is "exceptional in having two bosses", he wondered if most swords would have had just the one - "honouring the eye of the god", he said.

  Finding a boss with its sword "is vanishingly rare" and the "very rare" artefacts are usually discovered by metal detectorists, said Mr Mortimer

