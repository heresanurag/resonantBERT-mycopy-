title: Kate hugs young girl with cancer at Windsor Castle - BBC News
date: '2024-10-02'
section: UK
url: http://www.bbc.co.uk/news/articles/c62d5d2w2jgo
content: |-
  The Princess of Wales meets a 16-year-old girl with a rare and aggressive form of cancer.

  The Princess of Wales hugs Liz Hatton at Windsor Castle

  The Princess of Wales has embraced a teenage girl with an aggressive form of cancer during an an investiture at Windsor Castle. The princess, who last month ended chemotherapy, met with Liz Hatton, 16, after inviting the teenager to take photos. Liz, a budding photographer from Harrogate, North Yorkshire, who was told by doctors earlier this year she had between six months and three years to live, has a photography bucket list. Prince William and Catherine, who herself is a keen photographer, said the young girl had inspired them both.

  Liz was given the opportunity to take photos of the investiture, featuring cyclist Mark Cavendish and ex-footballer Ally McCoist, after Prince William heard about Liz through his patronage of London Air Ambulance Charity. After taking photos, the royal couple met Liz and her family at a private meeting. Prince William and Catherine wrote in a post on X: "A pleasure to meet with Liz at Windsor today. "A talented young photographer whose creativity and strength has inspired us both. Thank you for sharing your photos and story with us." A Kensington Palace spokesperson said: “Following the investiture both the Prince and Princess of Wales met Liz privately with her family to hear about her day and journey." Liz said she was "over the moon" after meeting the couple at the castle. “Such lovely, genuine and kind people, I’m over the moon that my family and I had this experience,” she wrote on social media. The event is a rare appearance for Catherine who has been out of sight of the public for much of the year. The Palace previously indicated it is not possible at this stage to say whether the princess is cancer-free, despite completing chemotherapy treatment.

  Liz and her family met the Prince and Princess of Wales at a private meeting after the investiture

  Liz drew up a photography bucket list "to create a lifetime of memories" after being diagnosed with desmoplastic small round cell tumour in January. The rare nature of the cancer means there is currently no standard care treatment. Liz took up photography in Year 6 after saving up to buy her first camera and got the highest grade possible in the subject at GCSE, before starting an A-level in it at Harrogate Grammar School. Her mum, Vicky Roboyna, previously told the BBC her daughter's hobby had given her a "focus" since her diagnosis.

