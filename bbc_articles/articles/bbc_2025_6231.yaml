title: Sir Elton John celebrates 'extraordinary' 10th UK number one album - BBC News
date: '2025-04-12'
section: Culture
url: http://www.bbc.co.uk/news/articles/c9w8g7jlkpwo
content: |-
  The star says he's "blown away" to top the UK album chart, 52 years after he first achieved the feat.

  Who Believes In Angels? is Sir Elton's first album with country singer Brandi Carlile

  Sir Elton John says he is "blown away" after scoring the 10th UK number one album of his career. Who Believes In Angels?, a collaboration with US country star Brandi Carlile, has topped the charts 52 years after the star's first number one. "It seems quite extraordinary that my career has gone on so long," Sir Elton told the BBC. "It always feels good to top a chart, no matter where it is. And with this album, I'm especially thrilled because I think it's the finest album I've done for a long time."

  Written and recorded over three weeks in late 2023, Who Believes In Angels? has received rave reviews from critics, who have called it "a gutsy, flamboyant tearjerker, external" and a "late-career high, external". But the album had a difficult gestation, which was captured in a warts-and-all documentary posted on YouTube. Sir Elton was seen slamming down his headphones, shouting at his collaborators, ripping up song lyrics and threatening to quit.

  The star was "nervous" and "irritable", partly because he was recovering from a hip replacement, he said, but also because he was working in a new way - writing live in the studio with Carlile, producer Andrew Watt and long-term lyricist Bernie Taupin. "It was an enormous challenge, getting those four people together," he told the BBC. "And the challenge really was at my feet. "I was very nervous [because] I wanted the album to stand a certain way, but you can't always guarantee it will. "I think my nerves and my insecurities and my doubt led to a few bad behaviour moments, which was just about frustrations within myself." Once they had recorded the opening track, The Rose of Laura Nyro, "everything fell into place", Sir Elton said. "In two and a half weeks, we recorded 14 songs and finished them." The album's release was delayed last year after an eye infection left the star with vision difficulties. Last week, he told the Times he could no longer watch his sons playing rugby.

  Sir Elton has now received 10 "number one trophies" from the Official Charts Company

  With the album finally released, there has been particular praise for the single Swing For The Fences, which Carlile conceived as rallying call for the LGBTQ community. "I'm a gay woman, Elton's a gay man and we both have families, and our dreams have come true," she told the NME, external. "I was thinking, wouldn't it be cool to write an anthem for young gay kids out there that calls them into a bigger, more elegant, more fabulous life? Just like, 'Go, go! Don't let anything hold you back!'" "It's a tough time out there for LGBTQ+ people," Sir Elton told BBC News. "At the moment when Brandi wrote this lyric, she wanted to say, 'Listen, fight for yourself. Be proud of yourself who you are, never be ashamed of who you are, and you will win through.'"

