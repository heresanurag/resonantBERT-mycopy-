  In the UK, the album sold more than 15,000 copies in its first two days and was the week's best-seller on vinyl. Sir Elton has now drawn level with Abba, Queen, Kylie Minogue and Michael Jackson on the list of artists with the most UK number one albums. The Beatles and Robbie Williams share the top spot, with 15 number ones apiece.
  • None Don't Shoot Me I'm Only The Piano Player (1973)
  • None The Very Best Of Elton John (1990)
  • None Good Morning To The Night (with Pnau) (2012)

  The other new entry in this week's Top 10 came from Cambridge indie band Black Country, New Road, whose third album Forever Howlong debuted at number three. The band's first release since the departure of frontman Isaac Wood, it trades itchy, off-centre guitar riffs for a more soothing, baroque-pop sound, with lyrics that focus on friendship and camaraderie. It was the week's biggest-seller in independent record shops, according to the Official Charts Company. In the singles chart, Alex Warren's Ordinary remained in pole position for a fourth week, with Chappell Roan's Pink Pony Club at number two. Ed Sheeran had the highest new entry at number three with his comeback single Azizam. The Persian-flavoured track is the star's 42nd Top 10 hit in the UK - but it's the first time since the start of his career that the lead single from an album has failed to enter the chart number one.
