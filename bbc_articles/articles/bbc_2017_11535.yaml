content: |-
  The government will "express its resolve to look forwards not backwards", Philip Hammond says.

  The government will "express its resolve to look forwards not backwards", Philip Hammond said opening his Budget speech.

  He spoke about the UK's future outside the EU, but said his speech was about "much more than Brexit",
