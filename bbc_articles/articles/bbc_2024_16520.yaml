title: 'England v West Indies: Ben Stokes says bowlers'' opportunities will come ''naturally''
  - BBC Sport'
date: '2024-07-25'
section: Cricket
url: http://www.bbc.co.uk/sport/cricket/articles/cjk3ppm24m6o
content: |-
  Captain Ben Stokes says opportunities for fast bowlers will come “naturally” after England name an unchanged team for the third Test against West Indies on Friday.

  Ben Stokes' England side have already completed their first series win since 2022

  Captain Ben Stokes says opportunities for fast bowlers will come “naturally” after England named an unchanged team for the third Test against West Indies on Friday. The home side have already won the series 2-0 but have resisted the opportunity to recall Matthew Potts or hand a debut to Dillon Pennington at Edgbaston. James Anderson retired after the first Test following talks with the England management, who indicated they want to build the experience of younger bowlers. "At the moment we have stuck with the same team because we don't feel it's necessary to change," said Stokes. Following the West Indies series, there is a break of almost a month before three Tests against Sri Lanka. So far this summer, the only change England have made to their XI is moving on from Anderson. England's all-time leading wicket-taker played in the first Test at Lord's, then was replaced for the second Test by Mark Wood. Since Stokes and coach Brendon McCullum took charge of the England side two years ago, they have looked to avoid rotating their bowlers where possible. And Stokes said it is not "difficult" for England to simultaneously play their strongest team and give opportunities to bowlers.

  "When you look at the guys we've got playing at the moment, with Woody being the standout because of how he bowls, it's very unlikely we'll get the remaining Tests out of him because of how hard it is on his body," said Stokes. "Even though we've got a decent break to the next series, fast bowling is very hard so naturally we may see a change in the bowling line-up. It's not required yet. "It's tough to not play, but for Pottsy and Dillon it's great for them to be in the squad." In the 241-run win in the second Test at Trent Bridge, Wood sent down the fastest over recorded by an England bowler in a home Test, at one stage registering in excess of 97mph. He struggled with cramp in Nottingham, but has been passed fit to take his place in the side at Edgbaston. Even though Wood only managed to take two wickets at Trent Bridge, Stokes said his Durham team-mate brings an "electric" feeling to a Test match. In West Indies' second innings, a Wood bouncer struck Kevin Sinclair, fracturing the forearm of the spinner and forcing him out of the third Test. "The whole game changes," said Stokes. "When his name gets read out, the whole crowd is up, then when the speeds are on the big screen, everyone gets going. Woody is always looking up at the screen as well to see what he's clocking. "He's got the heart of a lion. He runs in spell after spell, ball after ball. Although he didn't get the rewards he wanted last week, he knows he affects the game in more than just wickets. That showed last week. I think someone will pay this summer, either West Indies this game or Sri Lanka." In Sinclair's absence, left-arm spinner Gudakesh Motie, who missed the second Test through illness, comes back into West Indies' squad of 12. Akeem Jordan is named as cover for pace bowler Shamar Joseph, who is struggling with illness. "It's all about fighting," said West Indies captain Kraigg Brathwaite. "If we continue to create that sort of attitude around this team, there will be growth. That's what we're after."
