id: bbc_2018_5368
title: Gun violence on London's streets 'must stop' - BBC News
date: '2018-05-07'
section: UK
url: http://www.bbc.co.uk/news/uk-44026796
content: |-
  The mother of a dead teenager pleads for an end to the violence after a spate of shootings in London.

  Rhyhiem Ainsworth Barton was "trying to make a difference" by learning to work with children, his mother said

  The mother of a 17-year-old boy who was killed over the weekend has called for an end to violence on London's streets.

  "Let my son be the last and be an example to everyone. Just let it stop," said Pretana Morgan, whose son Rhyhiem was shot in Southwark on Saturday.

  The teenager was one of five people shot in the capital over the bank holiday weekend.

  Home Secretary Sajid Javid said serious violence was "robbing too many young people of their futures".

  In Wealdstone, three people, including two boys aged 13 and 15, were injured, and a 22-year-old was shot in Lewisham.

  The 13-year-old was believed to be an "innocent bystander", police said.

  None of them has injuries which are considered to be life-threatening.

