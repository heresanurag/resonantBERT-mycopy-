title: 'Chelsea: Millie Bright signs new contract until 2026 - BBC Sport'
date: '2025-03-06'
section: Women's Football
url: http://www.bbc.co.uk/sport/football/articles/c07zpmnmrgmo
content: |-
  England defender Millie Bright extends her Chelsea contract until next summer, with the option of a further year.

  Chelsea captain Millie Bright has extended her contract until next summer, with the option of a further year. The 31-year-old England defender is the Blues' longest-serving player, having joined from Doncaster Belles in 2014. Her current contract was due to expire at the end of this season. 'Representing this club and continuing our journey together was never a question to me," said Bright. "This club is my home. Chelsea runs through me. The legacy continues."

  Bright has won seven Women's Super League (WSL) titles, five FA Cups and two League Cups and made 280 appearances for Chelsea. She was part of the England side that won Euro 2022 and reached the final of the 2023 World Cup. Chelsea are top of the WSL with six games remaining, eight points ahead of second-placed Manchester United, who have a game in hand.
