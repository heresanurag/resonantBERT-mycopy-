  To Yee's astonishment, Kipchoge was among those to offer him advice and said in January that he would like to meet and help mentor the Briton when they are in London. So the former mini marathon runner and Kenya's two-time Olympic champion have arranged to meet after the race. In the meantime, Kipchoge, widely regarded as the greatest distance runner of all time, has offered wisdom via WhatsApp - something Yee describes as "surreal". "His big piece of advice was to get to the start line. It sounded silly at the time, but after unfortunately seeing people forced to pull out, it's probably the strongest piece of advice of all," says Yee. They are likely to have much to discuss. Both are passionate about using the power of sport to inspire, with Yee now keen to utilise his platform as Olympic champion. He intends to provide opportunities to school children through the launch of his own foundation, initially in the south London area he grew up in. Yee also hopes documenting his marathon journey on YouTube can demonstrate that elite athletes are not "superhuman", before he stars on the other side of the barriers he used to watch behind. "The more we share our story I feel like people realise that we're just like anyone else, and there's no reason why they can't dream to achieve what I have - or even so much more," says Yee. "You start to feel this urgency with the fortunate position I'm in, being an Olympic champion, that I can and I want to make a difference. "I'm not expecting to leave this big legacy behind. If I can change one person's life, that's good enough for me."
