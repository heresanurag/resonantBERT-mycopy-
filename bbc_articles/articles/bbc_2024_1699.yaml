id: bbc_2024_1699
title: Alexei Navalny jokes in January video from penal colony - BBC News
date: '2024-02-16'
section: General
url: http://www.bbc.co.uk/news/world-europe-67941119
content: |-
  The Russian opposition leader was moved to a prison in the Arctic Circle in December.

  Jailed Russian opposition leader Alexei Navalny has died, the prison service has said.

  He was seen in a video call in January, joking about his prison outfit at the Arctic penal colony he had been moved to a month earlier.

  The IK-3 colony, nicknamed "Polar Wolf", is in the northern town of Kharp, some 1,900km (1,200 miles) northeast of Moscow.

  It's seen as one of the toughest jails in Russia and most detainees held there have been convicted of serious crimes.

  Speaking to journalists on the video call, Navalny appeared to be in good spirits, joking that he was yet to receive any Christmas mail, due to being "quite far away".
