title: Videos show police interviewing Sara Sharif's father, stepmother and uncle
  - BBC News
date: '2024-12-12'
section: General
url: http://www.bbc.co.uk/news/videos/c786e2qj9j8o
content: |-
  Sara's father and stepmother were found guilty of murder. Her uncle was found guilty of causing or allowing the death of a child.

  Surrey Police have shared video from interviews with the father, stepmother and uncle of Sara Sharif who died on 8 August 2023.

  Urfan Sharif and Beinash Batool were found guilty of her murder, whereas her uncle Faisal Malik was found not guilty of murder, but guilty of causing or allowing the death of a child.

  Police say Sara suffered "brutal abuse" and "unspeakable violence" at the hands of her father and stepmother.

  Sara's mother released a statement saying: "God to please take care of my little girl, she was taken too soon".
