title: Teenagers charged with Nottingham murder of Esrom Ghide - BBC News
date: '2018-09-09'
section: Nottingham
url: http://www.bbc.co.uk/news/uk-england-nottinghamshire-45462931
content: |-
  Three 14-year-olds are among those charged with stabbing a man to death in Nottingham.

  Esrom Ghide, known as Hanny, was found in Hawksley Road with stab wounds to his chest

  Five teenagers, including three 14-year-old boys, have been charged with murdering a man in Nottingham.

  Esrom "Hanny" Ghide, 20, was found stabbed in Hawksley Road, Hyson Green, on Wednesday. He died of his injuries in hospital.

  The three boys, along with two others both aged 16, are due before Nottingham magistrates on Monday.

  Another 16-year-old boy has been arrested on suspicion of murder and is being questioned by detectives.

  He has also being held on suspicion of attempting to pervert the course of justice.

  In a statement, Mr Ghide's family, from Radford, said he "was loved, is missed, and will always be cherished".

  They added: "His passing has left a big hole in our lives."

