title: 'Lewes Bonfire: Crowds line streets as processions begin - BBC News'
date: '2024-11-06'
section: Sussex
url: http://www.bbc.co.uk/news/articles/cj9n3m9l99lo
content: |-
  The bonfire societies spend months producing effigies which are paraded through the streets.

  This video can not be played To play this video you need to enable JavaScript in your browser. Effigies are paraded through the narrow streets and burned at various bonfire sites

  Crowds of people lined the streets of Lewes as the town’s bonfire societies marched with burning torches for Guy Fawkes Night. Tens of thousands of people were expected to turn out for the annual celebrations, a tradition still very much alive since the first recorded event in 1795. Each society spends months producing an effigy - or tableau - which are paraded through the streets and then burned at the bonfire sites. Just before 23:00 GMT, firework explosions could be heard for miles as the festivities reached a conclusion.

  BBC Radio Sussex reporter George Carden said there was a "celebratory feeling" in the town as the processions began earlier on Tuesday evening. He added: "Smoke has filled the air and flames are lighting up the faces of those who've come to watch, while faint echoes of drumming come from over the hill."

  The bonfire societies paraded through the streets with blazing torches

  Kevin and Cathy Mooney, from Arizona, said they were in Lewes for the first time. Mr Mooney said: "I'm pretty overwhelmed by it. It really has been amazing. "I come from the United States and really can't think of anything that comes close to this."

  Kevin and Cathy Mooney have been watching their first Lewes Bonfire from a hotel balcony

  Ms Mooney said she hoped Donald Trump would make an appearance as a tableau in Tuesday night's celebrations.

  Sewage spills and water quality controversies were the theme of another design

  Previous effigies have included Rishi Sunak riding a train, Suella Braverman as an octopus and Jeremy Clarkson driving a skip. On Tuesday night, one tableau highlighted sewage and water quality concerns, while another featured former Post Office chief executive Paula Vennells.

  Paula Vennells, former chief executive of the Post Office, appeared with Postman Pat

  Earlier, a grinning effigy of Nigel Farage holding a cigarette and a pint of beer was spotted in the town.

  A tableau of Nigel Farage was seen in Lewes earlier on Tuesday

  Sussex Police had urged non-locals to stay away from the event due to the risk of "crowd crushing and crowd movement" in the narrow streets. “The celebrations are always busy, challenging and complex,” Ch Supt Howard Hodges told BBC Radio Sussex. “This is an event steeped in history, culture and tradition but it’s one we can’t be complacent about. “There are inherent risks and that’s why the police, ambulance and fire service work really closely to make sure people can attend safely.”

  Spectators perched on a window sill to get a good view of the procession

  While Guy Fawkes and the gunpowder plot of 1605 dominate the UK's autumnal bonfire tradition, the town also remembers the 17 Protestants who were burnt to death by the Catholic queen, Mary I, in Lewes in the 1500s. There are a total of six processions through Lewes between 17:30 and 23:30 GMT. Following the processions, the bonfire societies burned their tableaus and let off fireworks in their respective fields.

  The town also remembers the "Lewes martyrs" burnt to death in the 1500s
