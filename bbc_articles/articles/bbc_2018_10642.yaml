id: bbc_2018_10642
title: 'Plastic pollution: Giant barrier to clean up eastern Pacific - BBC News'
date: '2018-09-07'
section: General
url: http://www.bbc.co.uk/news/science-environment-45453282
content: |-
  The ambitious project aims to tackle a collection of waste known as the Great Garbage Patch.

  Every year millions of tonnes of plastic waste flows into seas around the world.

  Now, for the first time, there is going to be an attempt to get into the middle of the Pacific Ocean to try to clean it up.

  But there are still concerns about its environmental impact.
