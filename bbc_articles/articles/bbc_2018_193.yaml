title: 'Fire and Fury: Author on Trump mental health concerns - BBC News'
date: '2018-01-07'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42589633
content: |-
  Michael Wolff, the author of an explosive new book on Donald Trump, speaks to Radio 4's Today programme.

  Donald Trump's mental health is a subject of concern within the White House, according to the author of a controversial new book.

  Speaking to BBC Radio 4's Today programme, Michael Wolff also said that President Trump is "intellectually incapable" of carrying out his role.
