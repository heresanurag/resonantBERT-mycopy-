content: |-
  England fans celebrated England's win over Serbia, but are still unsure if the team can win the Euros.

  England fans have celebrated the team's victory over Serbia in their first Euro 2024 match.

  Despite the win, some questioned whether the squad has what it takes to win the tournament.

  "I still don't think we're playing hard enough," said a fan in a bar in South London.
