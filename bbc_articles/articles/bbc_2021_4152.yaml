title: 'Prince Philip: The Patriarchs - An Elegy - BBC News'
date: '2021-04-17'
section: General
url: http://www.bbc.co.uk/news/uk-56785412
content: |-
  Poet laureate Simon Armitage has written an elegy for Prince Philip, entitled The Patriarchs - An Elegy.

  It starts with the snow on the day Prince Philip died, the "unseasonal singular flakes", and notes that to "eulogise one man is to pipe up for a whole generation".
