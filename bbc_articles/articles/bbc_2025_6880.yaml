title: Ryan Gosling cast as lead in new Star Wars film Starfighter directed by Shawn
  Levy - BBC News
date: '2025-04-19'
section: Culture
url: http://www.bbc.co.uk/news/articles/clyq9d35ljro
content: |-
  The new Disney project, titled Star Wars: Starfighter, is set to be released in May 2027.

  Ryan Gosling to star in new Star Wars film

  Ryan Gosling is to star in a new Star Wars film, which is set to be released in two years' time. The new Disney project is titled Star Wars: Starfighter, and will be directed by Deadpool & Wolverine director Shawn Levy. "The reality is that this script is just so good. It has such a great story with great and original characters," said Barbie actor Gosling at a Star Wars Celebration in Tokyo. "It's filled with so much heart and adventure, and there just really is not a more perfect filmmaker for this particular story than Shawn."

  Gosling's lifelong passion for the franchise was on display at the event, which showed his childhood Star Wars bedsheets on screen. "You can see from the picture, I guess I was probably dreaming about Star Wars before I even saw the film," he said. "And it's probably framed my idea of what a movie even was," he said.

  Ryan Gosling and Shawn Levy will pair up on the new Star Wars project

  Set to be released on 7 May 2027, the film is a standalone story and won't follow the main plotline of the Skywalker family and recent sequels starring Daisy Ridley. Not many details about the storyline have been revealed yet. According to the Star Wars website, it is "set approximately five years after the events of Star Wars: The Rise Of Skywalker" with Gosling playing a new character. The new space adventure is "not a prequel, not sequel, it's a new adventure. It's set in a period of time that we haven't seen explored yet", added Levy. The next Star Wars film release is set to be The Mandalorian And Grogu, a sequel to The Mandalorian starring Pedro Pascal and directed by Jon Favreau. Gosling was nominated at the Oscars for his portrayal of Ken in 2023's Barbie blockbuster, which also starred Margot Robbie. The Canadian actor, known for roles in La La Land and The Notebook, also starred as a stuntman in last year's The Fall Guy.
