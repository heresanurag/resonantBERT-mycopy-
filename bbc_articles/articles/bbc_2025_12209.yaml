title: Jess Phillips apologises for grooming gangs report delay - BBC News
date: '2025-06-02'
section: Politics
url: http://www.bbc.co.uk/news/articles/cx2qjd95q1eo
content: |-
  Home Office minister Jess Phillips tells MPs an audit into grooming gangs will be published "very shortly".

  Home Office Minister Jess Phillips has apologised to MPs for a delay to the publication of a report on grooming gangs. In January, the government asked Baroness Louise Casey to lead a "rapid" three-month audit into the data and evidence on the nature and scale of group-based child sexual abuse. Speaking in the House of Commons on Monday, Conservative frontbencher Katie Lam said Baroness Casey's review, along with a framework for local grooming gang inquiries, had been due for publication in May and asked for an updated timeline. Phillips told MPs she was sorry for the "month's wait" but added "I've waited 14 years", a reference to the length of time the Conservatives were in government.

  The minister said Baroness Casey had requested a "short extension" to her work and that it was expected "very shortly". "When we have the report the government will respond to it and lay out its plans with all the evidence in hand," she added.

  At the start of the year, the government dismissed calls for a national inquiry into grooming gangs, arguing it had already been examined in a seven-year inquiry, led by Prof Alexis Jay. Instead Home Secretary Yvette Cooper announced a "rapid audit" led by Baroness Casey to examine the "data and evidence to draw a comprehensive picture of the nature, scale and profile of group-based child sexual abuse offending". She also announced an initial pot of £5m for "victim-centred locally-led inquiries" to be held in Oldham and four other areas, yet to be named. In April, Phillips told the House of Commons she expected there would be further inquires beyond the initial five announced. She told MPs she would provide more details about the local inquiries once Baroness Casey's audit had been published. The Conservatives have continued to call for a nationwide inquiry with powers to compel people to give evidence, arguing that some local areas would be unwilling to hold their own reviews. Phillips said if Baroness Casey identified problems with particular local authorities, "I will pursue them".
