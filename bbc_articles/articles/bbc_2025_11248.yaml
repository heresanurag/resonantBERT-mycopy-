title: 'Ballymena: Seventeen police officers injured during second night of violence
  - BBC News'
date: '2025-06-10'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c0k3le25r8ro
content: |-
  Police say a number of homes and businesses were attacked as violence erupted again on Tuesday night.

  Seventeen police officers injured during second night of Ballymena violence

  To play this video you need to enable JavaScript in your browser. This video can not be played

  Protesters threw petrol bombs, bricks and fireworks at police during another night of disorder in Ballymena on Tuesday. Five people were arrested and a further 17 officers were injured overnight, bringing the total to 32. Officers fired baton rounds and used a water cannon to disperse protesters as cars were set on fire and the windows of several houses were smashed. The disorder began on Monday after a peaceful protest over an alleged sexual assault in the County Antrim town.

  The first protest was organised hours after two teenage boys appeared before Coleraine Magistrates' Court . They spoke through an interpreter in Romanian to confirm their names and ages. Their solicitor said they would be denying the charges. Crowds gathered in the Clonavon Terrace area for a second night of violent disorder, which has been described by police as "racist thuggery". Riot officers from the Police Service of Northern Ireland (PSNI) had been deployed to Ballymena. Police said they also dealt with sporadic incidents of disorder in Newtownabbey, where a man was arrested, and Carrickfergus in County Antrim and north Belfast. One man, 29, has been charged with riotous behaviour, disorderly behaviour, attempted criminal damage and resisting police after Monday's violence.

  Mika Kolev and her family have been living and working in Ballymena for about 10 years

  Mother-of-two Mika Kolev, who lives and works in Ballymena, said she was now fleeing her home with her family and is considering moving back to Bulgaria after her house was damaged in Tuesday's disorder. "We know what's going to happen so it's not possible to wait and see what's going to happen," she said. "I have to save my children, I have to save them." The family was in the process of moving following Monday night's violence. Mika said she watched her home being attacked on social media by "angry children". "This is my house, I pay rent. I feel like this is my country, this is my city. My daughter was born here. It's very scary."

  Prime Minister Sir Keir Starmer said he "utterly condemns" the violence. "It's absolutely vital that the PSNI are given the time they need to investigate the incidents concerned rather than face mindless attacks as they seek to bring peace and order to keep people safe," he told the House of Commons. First Minister Michelle O'Neill said what was happening in Ballymena was "pure racism, there's no other way to dress it up". "Those responsible for this violence bring nothing to our communities but hatred, fear and division," she said. Deputy First Minister Emma Little-Pengelly said the violence was "serving no purpose whatsoever" and was only damaging communities.

  Debris was strewn across the streets on Wednesday morning

  PSNI Chief Constable Jon Boutcher said the violence endangered lives and risked the ongoing criminal justice process. He said the PSNI would pursue those responsible and images would be released to identify offenders. "To those who have been threatened or affected by this violence: we are with you," he added. He said the PSNI was "critically underfunded" and would be "making arrangements to activate mutual aid resources". "Our resourcing levels are not just inadequate - they are dangerous," he said. The police have also said there was no evidence of paramilitary involvement.

