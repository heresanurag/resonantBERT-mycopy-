title: 'Haverfordwest: Mum pleads guilty to killing son, 7, at their home - BBC News'
date: '2024-11-22'
section: Wales
url: http://www.bbc.co.uk/news/articles/c1kny239dmpo
content: |-
  Papaipit Linse admits manslaughter on the grounds of diminished responsibility.

  Papaipit Linse is receiving psychiatric treatment while she awaits her sentencing

  A woman has admitted killing her seven-year-old son at their home. Papaipit Linse denied murder at Swansea Crown Court on Friday, but admitted the manslaughter of Louis Linse on the grounds of diminished responsibility. Linse called 999 herself to report the death of her son, who was found in bed in their home on Upper Market Street in Haverfordwest, Pembrokeshire, on the morning of 10 January. He died in Withybush General Hospital a short time later. Linse, 43, who spoke only to confirm her name and enter her pleas, will be sentenced on 13 December.

  Prosecutor Caroline Rees KC told the judge a trial would not be sought on the murder charge as a result of the manslaughter plea. She said the guilty plea "did not come as a surprise" to the prosecution. Judge Paul Thomas KC called it "clearly a very sensitive as well as a very tragic case". Linse is receiving treatment at the Caswell Clinic, a mental health unit in Bridgend, and the court heard that psychiatric evidence would be heard during the sentencing hearing.
