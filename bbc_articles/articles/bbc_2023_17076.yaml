title: King Charles speaks Korean at state banquet to honour president - BBC News
date: '2023-11-22'
section: General
url: http://www.bbc.co.uk/news/uk-67490898
content: |-
  His speech at Buckingham Palace opened with words of welcome to the South Korean president and his wife.

  King Charles and Queen Camilla have been hosting the South Korean President Yoon Suk Yeol and his wife, Kim Keon Hee, at a state banquet in Buckingham Palace.

  The King opened his speech to the assembled 170 guests with some welcoming words in the Korean language.

