title: Harry and Meghan reach out to Kate and wish her 'health and healing' - BBC
  News
date: '2024-03-23'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-68639477
content: |-
  Prince Harry and Meghan say they hope Catherine and her family can heal "privately and in peace".

  The Duke and Duchess of Sussex have reached out to the Prince and Princess of Wales following the announcement of Catherine's cancer diagnosis, the BBC understands.

  Kensington Palace has not commented, but the contact is understood to have been made privately.

  Earlier Prince Harry and Meghan said they wished "health and healing" for Catherine.

  And they called for her and her family to heal "privately and in peace".

  Catherine said on Friday the news had been a "huge shock".

  In a short video message, she said it had been an "incredibly tough couple of months" but she was feeling "well" and "getting stronger every day".

  Details of the cancer have not been disclosed. Kensington Palace says the princess is confident that she will make a full recovery.

  Catherine had abdominal surgery in January, but it was not known then there was any cancer.

  Harry and Meghan stepped down as senior royals in January 2020.

  They moved to California that June, saying they wanted space to raise their son, Archie. A second child, Lilibet, was born the following year.

