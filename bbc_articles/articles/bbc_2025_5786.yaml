title: Boy, 14, charged in connection with Amen Teklay death - BBC News
date: '2025-03-09'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/cyve61lqe9eo
content: |-
  A vigil has been held by friends of Amen Teklay, who died after an incident in Glasgow last Wednesday.

  Amen's friends and family say he was a "kind and "bright" boy

  A 14-year-old boy is due to appear at Glasgow Sheriff Court on Monday, charged in connection with the death of teenager Amen Teklay. The 15-year-old died in the street last Wednesday, after being found injured following a violent incident in the city's St George's Cross area. Amen's friends held a vigil in Glasgow on Sunday as the police investigation into his murder continued. Another boy, aged 15, has also been arrested in connection with the death.

  Police Scotland said Amen's family is being supported by specially trained officers. Det Ch Insp Campbell Jackson said: "Our thoughts remain with Amen's family and friends at this very difficult time. "I would also like to thank the community for their support so far."

  People gathered to hold a vigil for Amen at a football park in Scotstoun

  The afternoon vigil was held at a football park where Amen played near his home in Scotstoun. A statement was read out on behalf of Amen's father, in which he thanked the community and everyone who had come to the vigil. "We are gathered today in sorrow, mourning the tragic and unexpected loss of my son, Amen, who was proudly a member of this community. We are all still in shock, and none of us are ready to fully comprehend this devastating loss," the statement said. "Amen was a remarkable young man, loved by everyone who knew him, and it breaks our hearts that such a tragedy has occurred. This should not happen to anyone." He appealed for anyone with information about his son's death to come forward and share it with police. "This city is our home, and it is only through working together that we can make it safer for everyone," he said. "Today, we have lost our son, but it is important to remember that one or more lives will be affected by the loss of Amen. His death is not only a tragedy for our family but also a tragedy for the person or people responsible. This cycle of violence must be stopped." He asked that people work together to make Glasgow "safer for all".

  Images of Amen were worn by some of those attending the vigil

  Earlier, Amen's support worker at Kingsway Community Connections, Jamie O'Neill, said the teen's friends wanted to hold an event. "The last few days have been a mixture of grief and numbness, and people sharing stories of happiness when they speak about Amen," he said. "His young friends at school were wondering what they could do and came up with the idea that they should hold a vigil. "It's their way to pay tribute to their friend, come together and support each other." Police Scotland said their investigation into Amen's death was ongoing. Emergency services attended the incident on Clarendon Street at 22:30 on Wednesday but the teenager was pronounced dead at the scene. Following a post-mortem examination the force said his death was being treated as murder. Amen, who is originally from Eritrea, lived with his father in Glasgow and had recently been granted 'right to remain' status in the UK.

  Amen was killed in a incident on Clarendon Street in Glasgow

  Amen's sister Delina Teklay, 17, said he had hopes of gaining UK citizenship and becoming either a basketball player, a doctor or engineer. She told BBC Scotland News that Amen was "not just my brother, he was my best friend". She said he was a "really sweet person, so kind and so bright".

  The force said "answers lie with the local community" and officers have been reviewing CCTV and carrying out door-to-door inquiries. Supt Christopher Stewart said: "We are continuing to support Amen's family and continue to engage with the local community affected by this incident. "There will continue to be a visible policing presence in the area and I would urge anyone with questions or concerns to approach a local officer – they are there to help." The force asked anyone with information to contact them via a major investigations public portal, external.
