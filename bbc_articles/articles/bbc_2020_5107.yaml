content: |-
  The day's news, stories and information on the pandemic in Wales.

  The pavement on Castle Street in Cardiff city centre will be widened on Sunday to help social distancing during the coronavirus outbreak.

  The work will involve the traffic lane next to Cardiff Castle being removed so there is more space for both pedestrians and cyclists to use.

  This new shared space will run from the Cathedral Road/Cowbridge Road junction, over Canton Bridge, along Castle Street, Duke Street and up to the North Road-Boulevard De Nantes junction.

  Cardiff Council said: "This is the first city-centre project that will be installed to keep the public safe and able to socially distance on the highway network."

  Earlier works were introduced around Roath Park Lake to create a one-way footpath to aid social distancing, as well as the removal of visitor parking bays nearest to the lake to provide additional space for cyclists and joggers.

  Councillor Caro Wild said a similar scheme on Wood Street is "currently being looked into", while a pilot scheme to enable better social distancing in shopping areas at Wellfield Road in Plasnewydd is expected soon.

  "It's not possible for us to transform all public space in the city overnight, but we are doing all that we can, with the resources available, to bring in these social-distancing schemes as quickly as possible," she added.

