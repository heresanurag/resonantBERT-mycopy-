title: 'Wimbledon 2024 results: Emma Raducanu wins, but Heather Watson among British
  defeats - BBC Sport'
date: '2024-07-02'
section: Tennis
url: http://www.bbc.co.uk/sport/tennis/articles/c97dl3j9w7no
content: |-
  Emma Raducanu makes a winning return to Wimbledon, but fellow Britons Heather Watson, Charles Broom, Liam Broady and Arthur Fery lose on day one.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Emma Raducanu says "winning ugly" on her Wimbledon return was all that mattered as she came through a testing first-round battle against Mexican lucky loser Renata Zarazua. The 21-year-old Briton, who missed last year's tournament through injury, claimed a 7-6 (7-0) 6-3 victory on Centre Court. Raducanu said she used England's dramatic 2-1 comeback win over Slovakia in Sunday's Euro 2024 last-16 tie as "motivation" to find a way past Zarazua on Monday. "I was nervous, I think everyone could see that in my tennis, but at the end of the day you have to do whatever it takes to get over the line," said 135th-ranked Raducanu, who was given a wildcard to play in the tournament. "Honestly, watching the football last night, it was winning ugly – it all counts." Raducanu was supposed to be playing 22nd seed Ekaterina Alexandrova and thought she would be the "complete underdog" in her first appearance at the All England Club since losing in the second round two years ago. Instead, the 2021 US Open champion found herself in a role reversal when the Russian withdrew through illness on Monday morning. "For the past three days, I've been playing and setting up practice for similar opponents and then it is a change of plan," said Raducanu. "It took a little bit of adjusting and finding my feet. "But I’d like to thank everyone for their support in the crucial moments. I enjoyed playing back here." Zarazua, who lost in the third round of qualifying, benefited from Alexandrova's absence and was handed her main-draw debut at Wimbledon. Despite the size of the occasion, she pushed Raducanu in what was a tense performance at times from the home favourite. But the Briton, who was fired up and showed her passion throughout, had enough quality to eventually come through. After Zarazua saved a match point on her own serve at 5-2, Raducanu set up another with a superb dash to the net to pick up a drop shot and clinched victory when her opponent put a sliced backhand long. Raducanu said her love for the sport had returned this summer and the beaming smile which greeted the success signalled her happiness. "I said I'd be over the moon if I won my first round here - and I really am," added Raducanu, who plays Belgium's Elise Mertens next. "I feel the joy to be on site, the joy to be part of the buzz. I'm really just enjoying myself."

  Raducanu was the first Briton to reach the second round and, moments later, was joined by Lily Miyazaki. The British number four secured her first victory in the Wimbledon main draw with a 6-2 6-1 success against Germany's Tamara Korpatsch. The 28-year-old's reward is a meeting with 14th seed Daria Kasatkina on Wednesday. Born in Japan, Miyazaki moved to London aged 10 and began playing for Britain in 2022. After earning her first Grand Slam main-draw win at the US Open in August, she added another with a confident display against 73rd-ranked Korpatsch. Miyazaki dropped just seven points on serve, and took five of nine break points for a success that took just 58 minutes. "It's one of the best wins of my career," said Miyazaki, who admitted the £93,000 earned for reaching the second round was "huge" for her future. Qualifier Sonay Kartal ensured it was a hat-trick of home wins with a stunning 3-6 6-2 6-0 victory over 29th seed Sorana Cirstea. The 22-year-old Londoner had never won a match on the WTA Tour before shocking an opponent ranked 267 places higher. After suffering "scary" health issues at the start of the year, Kartal said it was the "greatest and definitely proudest" win of her career. "I won't disclose what it was, but I didn't think I would be back potentially at all this year," she added. "Getting a first win at any Slam, and to have it at Wimbledon, makes it extra special."

