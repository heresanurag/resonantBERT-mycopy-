  Heather Watson opened one of the jewels of the British sporting summer from a home perspective, playing first on a packed court 18 which was hopeful of the home players getting off to a positive start. However, the 32-year-old Briton lost 7-5 6-4 to Belgium's world number 80 Greet Minnen - who is also Watson's doubles partner. Shortly after, Charles Broom lost 6-3 7-5 6-4 to three-time Grand Slam winner Stan Wawrinka on his main-draw debut at a major. Broom, 26, was given a wildcard after an impressive run to the Nottingham Open final last month, then further rewarded with an eye-catching draw against the 39-year-old Swiss. After a nervous start, the British number 11 settled to lead 5-2 in the second set but became tight as he tried to serve out and level the match. Arthur Fery twice led before losing 4-6 7-6 (8-6) 1-6 6-3 6-1 to German Daniel Altmaier. The 21-year-old, who was brought up close to the All England Club, produced some fine tennis before losing momentum in the fourth set, where he received treatment from the physio at the change of every end. Liam Broady valiantly lost 6-2 4-6 6-3 6-2 to Dutch former world number 22 Botic van de Zandschulp - after being unsure if he would play. The 30-year-old suffered concussion last month when he hit his head on the boot of his own car and has continued to get migraines. The freak accident came after an ankle injury which sidelined Broady, who reached the third round in 2022 and 2023, for three months. "I felt well enough to play. I'm glad I did. I am pleased I got through the match and managed to find some semblance of the tennis I know I can play," he said.

