title: Hampshire pupils 'sob' as vicar discusses existence of Santa - BBC News
date: '2024-12-15'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/articles/cvgr9v1ppglo
content: |-
  The vicar told children that Father Christmas did not exist during a Religious Education lesson.

  The vicar gave a talk on Father Christmas during a religious education lesson

  A vicar has been forced to apologise after telling a group of schoolchildren aged 10 and 11 that Father Christmas was not real. Pupils reportedly began to sob as Rev Dr Paul Chamberlain made comments during a Religious Education lesson at Lee-on-the-Solent Junior School in Hampshire. One parent described his talk as "absolutely disgusting", while another said her daughter reckoned the vicar was mistaken and had "lost the plot", The Times reported., external The Anglican Diocese of Portsmouth said Rev Chamberlain accepted it was an "error of judgement".

  A 10-year-old pupil, quoted in The Times, said some children "gasped" during the vicar's lesson, in which they were also told that parents ate the cookies left out for Santa. One parent told the newspaper: "I don't know how it can be undone, but I think it's absolutely disgusting. "I don't want him anywhere near my daughter. I hope he never comes into the school again."

  In a statement, a diocese spokesperson said: "We understand that the vicar of St Faith's, Lee-on-the-Solent, the Rev Paul Chamberlain, was leading an RE lesson for 10 and 11-year-olds at Lee-on-Solent Junior School. "After talking about the Nativity story from the Bible, he made some comments about the existence of Father Christmas. "Paul has accepted that this was an error of judgement, and he should not have done so. "He apologised unreservedly to the school, to the parents and to the children, and the headteacher immediately wrote to all parents to explain this."

