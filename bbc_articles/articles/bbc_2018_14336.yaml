title: Cornwall cliff collapse caught on camera - BBC News
date: '2018-12-17'
section: General
url: http://www.bbc.co.uk/news/uk-england-cornwall-46514434
content: |-
  A woman out walking captured part of a cliff falling on to rocks below near Bude.

  Part of a cliff collapsing in Cornwall has been caught on camera by a woman out walking.

  Deborah Smith was at Lynstone Road, Bude, when she said she noticed "some little bits going, then saw the rocks moving and quickly videoed it".

  The video was recorded at about 16:00 on Monday afternoon. Mrs Smith can be heard gasping in shock as a large section of cliff falls away.

  Falmouth Coastguard, which covers the area of the collapse, said the cliff fall had been reported to them and warned walkers to take care.
