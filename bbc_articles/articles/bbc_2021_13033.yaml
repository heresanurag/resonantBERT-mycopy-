title: Spotlight on women's safety at Conservative conference - BBC News
date: '2021-10-05'
section: General
url: http://www.bbc.co.uk/news/uk-58742866
content: |-
  Priti Patel has announced a policing inquiry during a Conservative conference focused on women's safety.

  Home Secretary Priti Patel has announced an inquiry into "systematic failures" that allowed Sarah Everard's murderer, Wayne Couzens, to serve as a Met police officer.

  The move came during a Conservative party conference dominated by questions around women's safety and tackling misogyny in the wake of the deaths of both Sarah Everard and Sabina Nessa.
