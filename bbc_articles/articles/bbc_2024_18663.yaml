  At the stroke of midnight, as India completed 77 years of Independence, the soundscape of protest changed. The air filled with a spontaneous chorus of the national anthem. Then it began raining, but the protesters walked in the rain, or holding umbrellas over their head. “We have never seen anything like this before in the city, such a huge gathering of women marching at night,” a reporter belonging to a news network said. It was a night of barely concealed rage and frustration. A woman, who joined the march well after midnight with her 13-year-old daughter said: “Let her see whether a mass protest can set things right. Let her become aware of her rights”. “Women have no respect!” said another. “Our worth is less than cows and goats." "When do we get our independence? How long do we have to wait to work without fear? Another 50 years?” asked a student.

  Smaller midnight protests were held in a number of other Indian cities like Mumbai and Delhi

  Sanchari Mukherjee, editor of a digital magazine, said she marched with thousands of others from a bus terminus in Jadavpur, undeterred by the rain. She met "people of all ages, from all classes, the well-to-do, the middle class and the poor". "I saw an elderly couple, the husband helping the woman to walk,” she said. "One family brought their little girl along, perhaps so the memory of this event would be etched in her mind - how her parents stood up against injustice, and how she, too, can protest one day." Ms Mukherjee said the entire city seemed awake as the marchers passed by illuminated homes, with people peering out of windows and crowding verandahs to watch. “They may not have participated but they were with us in spirit," she said.

  "'We want justice' had become the anthem of the march, and it didn’t feel like just a slogan," Ms Mukherjee said. "It felt like every young woman was deeply hurt and determined, frustrated that they still face these issues in 2024." Ms Mukherjee added that she had to walk a few miles to join the march because the streets were gridlocked late at night. "I was instantly swept up in a sea of people heading to the protest site. There was no excitement, just a stoic determination to create an event which would become a symbol for the times to come." The protests have been fuelled by anger over local authorities’ handling of the young trainee doctor's rape and murder. Police later arrested a hospital volunteer worker in connection with what they said was a case of rape and murder. But there have been accusations of cover-up and negligence. The case has since been transferred from local police to the federal Central Bureau of Investigation.

  A woman holds a placard as she attends a candlelight vigil held outside Jadavpur University campus in Kolkata

  Despite scant resources, Kolkata’s Reclaim the Night march appeared to have been meticulously organised. In an advisory, organisers welcomed women and people from marginalised sexual and gender identities to the march. “Men are welcome as allies and observers,” the advisory added. They also emphasised that politicians were not welcome and requested that no party flags be brought to the protest. It was not the first time that a Reclaim the Night march has been staged in India. Inspired by similar marches elsewhere in the world by women to assert their rights to walk in public areas without fear, a march was held in 1978 in Bombay (now Mumbai) in protest against the rape of a woman on the street. Blank Noise, a community-based art project and activist collective, has organised several midnight walks in Delhi to encourage women to assert their right to walk freely at night. But in terms of scale, the Kolkata march, echoed by smaller ones across other cities, stands as the largest yet. "We seized the night. We've never seen anything like this in the city. This is unprecedented. I hope it wakes up the authorities," said Chaitali Sen, a protester.
