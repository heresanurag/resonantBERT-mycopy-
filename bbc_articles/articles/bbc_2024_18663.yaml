title: 'Kolkata: Massive night protests after doctor''s rape and murder - BBC News'
date: '2024-08-15'
section: Asia
url: http://www.bbc.co.uk/news/articles/crmwj4z1xpko
content: |-
  Tens of thousands of women march through Kolkata in protest against the rape and murder of a doctor.

  'We are seizing the night', the protestors at the march said

  Tens of thousands of women in West Bengal state marched through the streets on Wednesday night in protest against the rape and murder of a trainee doctor at a state-run hospital in Kolkata last week. The Reclaim the Night march was the culmination of nearly a week of frenzied protests ignited by the brutal killing of the 31-year-old at the RG Kar Medical College last Friday. After a gruelling 36-hour shift, she had fallen asleep in a seminar room due to the lack of a designated rest area. The next morning, her colleagues discovered her half-naked body on the podium, bearing extensive injuries. A hospital volunteer worker has been arrested in connection with the crime.

  Responding to calls on social media, women from all walks of life marched across Kolkata city and throughout the state on a rainy Wednesday night. Though protests were largely peaceful, they were marred by clashes between the police and a small group of unidentified men who barged into the RG Kar Hospital, the site of the doctor’s murder, and ransacked the emergency department. Police fired tear gas to disperse the unruly crowd. Some police vehicles were also damaged. Smaller protests were also held in many other Indian cities like Delhi, Hyderabad, Mumbai and Pune.

  The protesters held flaming torches and candles during the marches

  In Kolkata, women marched resolutely, holding placards of protest, their faces illuminated by the glow of mobile phones, candlelight and flaming torches. Some carried India's flags. They were joined by men, both young and elderly. During the marches and at many gatherings near a university, theatre hall and bus terminus, they stood united, holding hands as the humid air echoed with loud and powerful chants of “we want justice”. Protesters blew conch shells - the sound is considered auspicious.

