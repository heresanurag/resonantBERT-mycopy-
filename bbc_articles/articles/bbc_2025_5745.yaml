id: bbc_2025_5745
title: Two teenagers arrested in Amen Teklay murder probe - BBC News
date: '2025-03-08'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/c20dekl0mxpo
content: |-
  The 15-year-old died after being found seriously injured on a Glasgow street on Wednesday.

  Amen's family and friends paid tribute to a "kind and "bright" boy

  Two boys, age 14 and 15, have been arrested in the police investigation into the murder of Amen Teklay in Glasgow. Amen, 15, was found seriously injured after violence on Clarendon Street, in the city's St George's Cross area, at about 22:30 on Wednesday. Emergency services attended but he was pronounced dead at the scene. Police Scotland said the pair had been arrested in connection with the death and its inquiries were ongoing.

  The force said the killing was an isolated incident and detectives were keeping an "open mind" to all motives.

  A police cordon was set up on Clarendon Street in the west end of Glasgow

  It is understood that Amen, who is originally from Eritrea, lived with his father in Glasgow and had recently been granted 'right to remain' status in the UK. His sister Delina Teklay, 17, said Amen had hopes of gaining UK citizenship and becoming either a basketball player, a doctor or an engineer. She told BBC Scotland News that Amen was "not just my brother, he was my best friend". She said he was a "really sweet person, so kind and so bright". Headteacher Claire McInally said his death was a "shock to the school community".

  Flowers and tributes were left on the street at the scene of Amen's death

  Det Supt Cheryl Kelly said that "answers lie with the local community" and officers were reviewing CCTV and carrying out door-to-door inquiries. She said: "Our thoughts are with Amen's family and friends at this distressing time. We will continue to provide specialist support for them." The force has urged anyone with information to contact them via a major investigations public portal, external.
