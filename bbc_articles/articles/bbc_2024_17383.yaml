title: 'Feltham: Attacker remains at large after triple stabbing - BBC News'
date: '2024-07-04'
section: London
url: http://www.bbc.co.uk/news/articles/cldyegzxrd4o
content: |-
  Officers were called to two areas of Feltham within minutes of each other and found three injured.

  Police found two males with stab injuries on Walsham Road, six minutes after another stabbing nearby.

  A search is under way for the person responsible for a triple stabbing in Feltham, west London, the Metropolitan Police has said. Officers were called to two separate areas within six minutes on Thursday afternoon, with three people found injured. The Met said the incident is not linked to terrorism and is not connected with the election or polling day. Police in the area have been given additional search powers, following the stabbings.

  The force said police were called at 14:07 BST to Alcott Close in Feltham to reports of a stabbing. It added: "On police arrival officers found a male with a stab injury. The suspect was no longer on scene. The male received medical treatment. "Six minutes later, police were called to Walsham Road to reports of a stabbing at the location. "On arrival, officers found two males with stab injuries. The suspect was no longer on scene." No arrests have been made yet, police said. None of injuries received by all three men were life-threatening. A Section 60 order, giving officers additional search powers, is in force in the area, Hounslow Police said on X, formerly known as Twitter.
