title: Wife of Northamptonshire councillor in court for race hate charge - BBC News
date: '2024-08-10'
section: Northamptonshire
url: http://www.bbc.co.uk/news/articles/cm23y9ggz33o
content: |-
  Lucy Connolly, from Northampton, appeared in court via video link but did not enter a plea

  Lucy Connolly posted the comments on X following the fatal stabbing of three schoolgirls in Southport

  The wife of a Tory councillor has appeared in court charged with publishing written material to stir up racial hatred. Lucy Connolly, 41, a childminder from Northampton, appeared at Nottingham Magistrates' Court on Saturday morning, via a videolink, but did not enter a plea. She was remanded in custody until her next appearance at Northampton Crown Court on Monday. The court heard it is alleged that Mrs Connolly, from Parkfield Avenue, posted on X, calling for attacks on hotels housing asylum seekers.

  It is alleged that on 29 July, the day of the Southport knife killings, she posted on X saying: "Mass deportation now, set fire to all the f****** hotels full of the bas***** for all I care... If that makes me racist, so be it." District Judge Rahim Allen-Khimani told Connolly the matter was "too serious for this court to deal with". Mrs Connolly, who was wearing a pink jumper, is married to Conservative West Northamptonshire councillor Raymond Connolly.

