title: A record number of sea lions gather in San Francisco - BBC News
date: '2024-05-04'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68953705
content: |-
  More than one thousand of the animals visited a city pier - the region's biggest spike in 15 years.

  More than one thousand sea lions have visited Pier 39 in San Francisco, California. It's the biggest group of the marine animals seen in the area in the last 15 years.

  Experts say the dramatic showing is a sign of a healthy ecosystem in the bay.
