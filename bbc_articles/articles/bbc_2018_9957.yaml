title: Teenager recovers after lightning strike in Arizona - BBC News
date: '2018-08-15'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-45189869
content: |-
  A teenager has described the moment he was struck by lightning in a park in Arizona.

  A teenager has described the moment he was struck by lightning in a park in Arizona, USA.

  Josiah Wiedman and his friend, both 13, were injured by the strike. Josiah was given first aid treatment by a passer-by and put in an induced coma in hospital.
