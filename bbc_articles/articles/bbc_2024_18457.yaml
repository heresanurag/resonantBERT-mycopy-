title: Food company fined £300,000 after worker loses four fingers - BBC News
date: '2024-08-13'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/c8dp982pynro
content: |-
  The man's fingers were amputated after they came into contact with the blades of a mixer at a factory in Hillington.

  A food company has been fined £360,000 after one its workers lost four of his fingers while unblocking a machine at a Glasgow factory. The 39-year-old man had to have the fingers on his right hand amputated after they came into contact with the blades of a mixer at the Hillington factory in August 2021. The man has since had to learn to do everything with his left hand. The Bristol-based firm, which produces dry seasoning mixes for the food industry, pled guilty to a breach of the Health and Safety at Work Act.

  An investigation by the Health and Safety Executive (HSE) found that the worker inserted his hand into the machine in an attempt to clear a blockage. There were no fixed guards preventing access to the blades from the underside and there were not any interlocked guards which would stop the rotating blades. The company also pled guilty to being in breach of the Provision and Use of Work Equipment Regulations. HSE principal inspector Hazel Dobb said: “This incident could so easily have been avoided by simply carrying out correct control measures and safe working practices. “Companies should be aware that HSE will not hesitate to take appropriate enforcement action against those that fall below the required standards.”
