title: 'Geoff Capes: World’s strongest man and British shot put record holder Capes
  dies aged 75 - BBC Sport'
date: '2024-10-24'
section: Athletics
url: http://www.bbc.co.uk/sport/athletics/articles/c36pn5d7eydo
content: |-
  Geoff Capes, British shot put record holder and two-time world's strongest man dies aged 75.

  Geoff Capes still holds the British shot put record, which he set in 1980

  Geoff Capes, the British shot put record holder and two-time world's strongest man, has died aged 75. Capes set the record for the longest shot put by a British man with a distance of 21.68m in 1980. In a statement, Capes' family said: "The family of Geoffrey Capes would like to announce his sad passing today, 23rd October. Capes had an illustrious career, twice winning gold in the shot at both the Commonwealth Games and the European Indoor Championships. He was a three-time Olympian and came closest to winning a medal with a fifth-place finish at the 1980 Games in Moscow. Capes, who was born in Lincolnshire, was also a six-time champion at the World Highland Games. His victories in the prestigious World's Strongest Man event, which made him a household name, came in 1983 in Christchurch, New Zealand and 1985 in Cascais, Portugal. Fellow World's Strongest Man winner Eddie Hall, who won in 2017, paid tribute to Capes by saying he was a "true legend of strength". "Not only was Geoff a two-time World's Strongest Man and a record-breaking shot putter, but he was also a giant in heart and spirit," said Hall. "He paved the way for athletes like me, showing that British grit and determination could conquer the world. "Geoff was an inspiration to so many of us growing up, a man whose incredible achievements and character left a lasting mark on the strength community. "His legacy will continue to inspire the next generation of strongmen and athletes around the world. "Rest easy, big man. You'll always be remembered as one of the greatest."

  Geoff Capes won six titles at the World Highland Games, making him the most successful competitor in the history of the event

  According to the Geoff Capes Foundation website, Capes was 6ft 5.5in tall and weighed 170kg in his physical prime. Following his retirement from competition Capes took up coaching and helped many aspiring athletes, as well as appearing on two reality television shows. Britain's Carl Myerscough threw longer than Capes' shot put record with a distance of 21.92m in Sacramento, United States, but that 2003 result was not ratified. In later life, Capes lived in the Lincolnshire village of Stoke Rochford. He had two children as well as grandchildren. Capes served as a policeman for 10 years in Cambridgeshire, earning £9.50 a week. He resigned before the 1980 Olympics in Moscow after "political pressure" to boycott the Games following Russia's invasion of Afghanistan. "Russia invaded Afghanistan, and Margaret Thatcher banned all the services from going – army and police – because they paid their wages," Capes told the told the Telegraph, external last year. "So I resigned from the police just before the Olympics. I lost my career, lost my pension, lost my income. They had total control over you." Capes was famously a budgerigar enthusiast and in 2008 he served a year as president of the Budgerigar Society. In a statement following news of his death, British Athletics said: "British Athletics are saddened to hear the news of former British shot putter, Geoff Capes' passing. "Our condolences go out to his family and friends at this time." Team GB said it is "deeply saddened" by Capes' passing. Tessa Sanderson, the Olympic javelin champion in 1984, said Capes was a "great person and a giant of an athlete", while reigning British shot put champion Scott Lincoln said he was the man who put the sport "on the map in the UK". He added on Instagram: "An icon, hero, legend, role model, friend and all round good guy. Will be sorely missed by not only me but so many around the athletics community." World Athletics president Lord Coe said: "Geoff's passing is a sad moment for so many of us in both British and global athletics. "He was a huge figure in British athletics and brought the crowds back to our sport. Fiercely independent, competitive, but always protective of the teams that he captained with distinction."

  Geoff Capes set a world record in truck pulling in August 1983 at the Crystal Palace Sports Centre, London
