title: Your pictures of Scotland 11 - 18 December - BBC News
date: '2020-12-19'
section: Scotland
url: https://www.bbc.co.uk/news/uk-scotland-55248968
content: |-
  A selection of your pictures of Scotland sent in between 11 and 18 December. Send your photos to scotlandpictures@bbc.co.uk. Please ensure you adhere to the BBC's rules regarding photographs that can be found here.

  Please also ensure you follow current coronavirus guidelines and take your pictures safely and responsibly.

  Conditions of use: If you submit an image, you do so in accordance with the BBC's terms and conditions..

  First light house: Beautiful sunrise from Aberdeen beach silhouetting the harbour’s south breakwater wall and lighthouse, thanks to David Hughes.

  A creel Christmas tree: "We found this delightful, unusual Christmas tree made out of fishing equipment whilst walking a section of the Moray coastal path at Hopeman Harbour in Moray", says Wilson Metcalfe.

  A grand, national view: "My wife Mags and I were admiring great views of Arkle and Foinaven - from which Grand National winners took their names - when all of a sudden a Brocken spectre appeared", says Stephen Wells. "Our heads were in the middle of theses circular rainbows and our long leg shadows ran all the way back to us!"

  A tree line trip: "The dappled winter sun through the trees on an early afternoon walk through the grounds of Crathes Castle in Aberdeenshire", courtesy of Matt Donachie.

  Sun dogs: "Beautiful morning in Nairn" says David Clark. "Chester, Cooper, Parker, Walter and Arthur all decided to have a sit down and watch it after their walk along the beach."

  What Mor could you ask for: Buachaille Etive Mor looking spectacular, courtesy of Karolina Samerek.

  Ship shape: "This image is the MV Loch Shira and the MV Caledonian Isles silhouetted under Ailsa Craig, with Great Cumbrae making an appearance", says Peter Ribbeck. "Taken from Largs in North Ayrshire".

  Street art: "Hope you like Buchanan Street with the low winter sun streaming up the street", says Jim Johnston in Glasgow.

  A frosty reception: The snowman image welcoming entry into this garage in Spean Bridge is courtesy of Mark Reynolds.

  Nutting to see here: "I caught this squirrel peeking out at me in Dundee whilst out for a walk", says Cara Rogers.

  Just face it: "Do you see a man with a Van Dyke beard?", asks Peter Crane. "Simply a beautiful sunrise over Glenmore in Cairngorms".

  Loch and quay: "Loch Lomond, just before sunrise", says Victor Tregubov.

  Swan around: Nicola Thorne captured this "calm" scene at Irvine beach, Ayrshire, her hometown.

  Heaven sent: "Spotted this beautifully decorated stone on the footpath from Dornoch to Embo", says Anne Maclean.

  Breakfast club: "Our especially tame Robin getting its daily morning feed from our eight-year-old daughter", says Jamie Stoddart in Port of Menteith.

  Cold snap: "This is Lochinver Women's Swimming Group", says Franci Hutchison. "We swim at the Whiteshore and have nicknamed our group the 'Blue Boobys' after an exotic looking bird with blue feet. We love the sea, wild swimming, a laugh and a good blether!"

  Mud bath: Caroline Eadie spotted this very Scottish scene at Pollok Country Park.

  Social bubble: "I snapped this lucky shot on my phone while my two-year-old daughter and I played in the garden in Oldmeldrum, Aberdeenshire", says Rachel Smith.

  You really otter have expected to see me: Richard Melvin sent us this image from Arthur’s Seat in Edinburgh.

  Rear window: "Colours on my car back windscreen as the ice melted on it" says Bill Crookston. "It was unexpected and really beautiful".

  Sailing into the sunset: "Watching the Isle of Arran ferry with Ailsa Craig on the Firth of Clyde", says Patricia Strong.

  City lights: "I finally completed my Christmas shopping and took this picture of Glasgow City Chambers in George Square on my way home", says Hannah McLatchie. "So close to Christmas that even the puddle is festive! Hope you like it and that it was worth squatting for!"

  A pony for your thoughts: "An Exmoor pony at North Berwick Law looking like he was either admiring the view or snoozing", says Sylvia Beaumont.

  Catch of the day: "I am a fisherman so get good sunsets and sunrises from the boat and at home around the harbour area where I spend most of my time", says Rowan Davies from Dunbar, East Lothian.

  Decorated hero: "The WW1 centenary 'Tommy' Maybole silhouetted against the town's Christmas tree", says Alistair Hastings. "Reminded me of the Christmas truce in 1914".

  Me and my shadow: "We're stuck inside with bad weather, so Caty and daddy amused themselves making shadow puppets," says Alison Escobar.

  Flight of fancy? "Apparently this plane is flying from Chicago to Baku", says Gemma Brown from her garden in Insch, Aberdeenshire. "But I feel it's flying past Cassiopeia, through Perseus on its way to the moon!"

  Cast away: Robert Kerr sent this shot of fishing at sunset near Moscow, in Ayrshire.

  Why the long face? "We had a friendly horse come over to say hello and get some of the nice grass on our side of the fence when out walking by Countesswells woods in Aberdeen", says Ewan Martin.

  Golden wonder: "I was just heading out of the Botanic Gardens when I noticed the low sun coming down", says Henry Memmott. "I waited for a while in the warm sun, and was rewarded with some gorgeous golden colours and beautiful silhouettes, just before the sun disappeared completely"

  Santa claws: Guinea pigs Shakira and Boba getting into the Christmas spirit in Aberdeen. Hats off to Daisy Banks for this one.

