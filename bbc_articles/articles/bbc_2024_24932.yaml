content: |-
  A dog was "deliberately attacked" and died later from its injuries, police say.

  Two arrested over death of suspected XL bully

  (Stock image) The dog, not pictured, was believed to be an XL bully

  Two men have been arrested after a dog was attacked and fatally injured. Thames Valley Police said the animal, believed to have been an XL bully, was deliberately attacked on Burnham Lane, Slough, on 29 September. The dog, whose breed remains unconfirmed, was taken for emergency treatment but died from its injuries. Two men from Slough, aged 20 and 22, were arrested on Friday on suspicion of criminal damage, causing unnecessary suffering to a protected animal and possession with intent to supply class B drugs.

  The 20-year-old was also arrested on suspicion of possessing an offensive weapon. Both men have been released on police bail until January.

