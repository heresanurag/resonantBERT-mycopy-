  The mother of Ahmaud Arbery delivers an emotional court statement as her son's killers are sentenced.

  The mother of Ahmaud Arbery delivered an emotional court statement as her son's killers were sentenced.

  A father, son and neighbour were sentenced to life for shooting dead the 25-year-old black jogger.

  Arbery's mother, Wanda Cooper-Jones, said the verdict won't bring her son back.
