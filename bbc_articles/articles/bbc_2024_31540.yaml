title: 'Newspaper headlines: ''Free to kill'' and Rachel Reeves ''the Grinch'' - BBC
  News'
date: '2024-12-21'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cpvn1gdrg0vo
content: |-
  Sunday's papers are dominated by Friday's attack on a Christmas market in Germany.

  Most of Sunday's newspapers report that the Saudi doctor suspected of driving a car into a busy Christmas market in Magdeburg, Germany, had warned on social media that something big was going to happen. "Free to kill", external is the headline of the Sun on Sunday. The Mail on Sunday describes him as a softly spoken psychiatrist, external, who was unfailingly polite in his brief exchanges with his neighbours, while expressing a kaleidoscope of paranoiac views in his posts on social media.

  According to the Observer, the government is resisting demands to rush through measures to block Elon Musk from handing millions of pounds to Nigel Farage's Reform UK party, external. The paper says ministers are facing calls to urgently limit the amount of money a foreign national can donate via their UK-based companies, but there are concerns at the heart of government that any hurried attempt could hand Farage the chance to claim that his party was being sabotaged by the establishment.

  In his column in the Sunday Times, external, Rod Liddle criticises those calling for tighter rules to prevent Elon Musk from donating to Reform. He says he is staggered by what he calls the conviction among our liberal elite that challenges to the established Conservative-Labour order must be strangled at birth.

  The Sunday Telegraph says the government's plan to introduce a levy on packaging could cost an average household up to £56 a year, external. The paper says the scheme would see retailers and manufacturers charged per tonne of packaging material they use and the cost for plastic wrapping would be higher than for paper or cardboard. A spokesman for the government said it was determined to tackle our throwaway society and stop the avalanche of rubbish that is filling up the streets.

  On its front page the Mail says 45p in every pound donated to charity now goes to the government because of tax increases announced in October's Budget. The shadow paymaster general, Richard Holden, tells the paper that Chancellor Rachel Reeves is a modern-day Grinch, external - the mean-spirited Doctor Seuss character who steals a whole town's Christmas gifts. The Treasury said its tax regime for charities was among the most generous in the world.

  Writing in the Times, external, Health Secretary Wes Streeting says he feels both pride and shame after visiting a number of emergency departments in recent days to see first-hand the pressure the NHS is under. He says he is proud of the people who work in the NHS and ashamed after seeing patients being treated on trolleys in corridors. Streeting says the health service is "broken but not beaten" and he can see the road to recovery in the New Year.

  The Sunday Express, external claims that Britain would be able to deploy only one of its two aircraft carriers if we were attacked by a hostile power such as Russia. The paper says budget cuts and a shortage of sailors mean that one of the carriers, Queen Elizabeth, will in effect be left in a dock, from where it would require a full six months' notice to prepare for action. A Royal Navy spokesman said it was fully committed to operating both carriers.

  And finally the Telegraph says the King has been named the second hardest working royal this year, external, despite receiving treatment for cancer. He took part in 186 engagements, while his sister, the Princess Royal was first, with 217.
