title: Yemen's industrial-scale prosthetic limb factory - BBC News
date: '2017-11-17'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-42006159
content: |-
  Inside one of Yemen's only prosthetic limb factories.

  The Orthopaedic and Prosthetic Centre in Taiz offers hope for the seriously injured in Yemen’s war.

  The BBC's Clive Myrie saw inside one of the few places in the country that can produce prosthetic limbs.
