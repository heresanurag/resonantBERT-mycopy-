title: CCTV of missing Norfolk mum Gaynor Lord released by police - BBC News
date: '2023-12-13'
section: General
url: http://www.bbc.co.uk/news/uk-england-norfolk-67708216
content: |-
  Police release footage of Gaynor Lord’s last known movements as part of an appeal for information.

  CCTV pictures of woman who has been missing since Friday has been released by police.

  Footage of Gaynor Lord’s last known movements in Norwich has been released to help jog the memory of anyone who may be able to provide information.

  The 55-year-old was reported missing after failing to return home from work on Friday afternoon.

  Later that day her belongings, including clothing, jewellery and a mobile phone were found at "various locations" in Wensum Park and her coat was discovered in the water, Norfolk Constabulary said.
