  Mary, who listens to every City game on the radio, said her love for the team had started when her family introduced her to them. "Oh my family love Manchester City, and I join in with them," she said. "I'm hoping to meet some of the players, shake hands with them, kick a football around."

  Mary has received cards from King Charles and Queen Camilla

  She said she felt "like a celebrity" after receiving so many cards. "I believe I've got a whole post-box downstairs," she said. "I keep saying 'I'm a celebrity get me out of here!'" Genesi Carroll, the care home's lifestyle coordinator, said they had never expected to get such a huge response, adding: "My first guess was around 80 or 90 cards. I thought that would be difficult, so to see so many arriving has been amazing."
