title: Jack Grealish's message to 106-year-old Manchester City fan - BBC News
date: '2024-08-19'
section: Manchester
url: http://www.bbc.co.uk/news/articles/c4gd27q54epo
content: |-
  Mary Spiers celebrates her birthday with a special video message from the midfielder.

  Manchester City football star Jack Grealish has sent a special birthday gift to one of his team's oldest fans. Mary Spiers celebrated the milestone on Sunday and was handed a signed shirt from the Manchester City players alongside a video message from the midfielder. BBC Radio Manchester reached out to City after Mary's home at Bowerfield Court Care in Stockport appealed for people to send in cards for the birthday girl. More than 300 cards have now been sent to celebrate Mary's big day.

