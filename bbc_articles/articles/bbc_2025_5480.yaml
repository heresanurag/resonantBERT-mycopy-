  Menoncello memorably describes Allianz Stadium as "the temple of rugby", but Italy are no longer a straightforward sacrifice for the hosts. Brex and Menoncello played excellently in a narrow 27-24 defeat in Rome when the teams last met. If they get ball on the front foot, they can cause damage once again. And this might be the final chance for prime Brexoncello to leave a lasting imprint on Twickenham. Menoncello's contract with Treviso runs out at the end of next season. He will likely leave for a club in France's Top 14 when it does. His partnership with Brex may well continue for Italy, but the day-to-day connection will be lost. "If one day I don't play with him every day, it is OK," says Brex. "He has to grow, that's the truth. As long as he is happy, I am happy." If their one-two midfield punch lands right on Sunday, Brex, Menoncello and their Italy team-mates might all be very happy indeed.

