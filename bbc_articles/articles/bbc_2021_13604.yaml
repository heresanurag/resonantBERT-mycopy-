title: '''I can''t leave people without a tree at Christmas'' - BBC News'
date: '2021-10-12'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-58847229
content: |-
  Matthew Corrie hopes his customers will make deliveries for him because he cannot find staff.

  Matthew Corrie said he was struggling to recruit staff

  A Christmas tree seller is asking his customers to make deliveries for him because he cannot find staff to fill vacancies.

  Matthew Corrie, of Fife Christmas Trees in Dunfermline, said he came up with the idea because more and more people were opting for a delivery service.

  Before the pandemic, most customers collected their tree in person.

  He is offering customers a discount if they collect their own tree and deliver one to someone else near their home.

  Businesses in a range of sectors have been reporting difficulties in attracting workers.

  A shortage of HGV drivers and specialised workers has led to gaps on supermarket shelves and problems with fuel supplies across the UK in recent weeks.

  Matthew Corrie (left) with his children on the Harburn Estate, where he buys his Christmas trees from Charlie Spurway (R)

  There have also been shortages of workers in sectors such as hospitality and the care sector, and some retailers have warned that they may struggle to ensure supplies are in place for the Christmas trading period.

  Mr Corrie, who has some delivery drivers, said he had tried advertising everywhere for extra staff to deliver his trees this year, but without success.

  He said he had been deluged with delivery orders last year, and this year was already looking like it would be even busier.

  "As with other businesses, I'm very short staffed and cannot get vacancies filled so I had to sit down and think of a way around it," he said.

  "There is no way I can't deliver them and leave people without a tree at Christmas. There was no option but to think outside of the box."

  There are more than one million Christmas trees, which take 10 years to grow, on 1,000 acres of the Harburn Estate

  He said he came up with the plan while looking at the list of addresses on the orders he has already received.

  He is offering customers a £10 discount if they will deliver a tree to someone else living nearby.

  Mr Corrie said: "I've put this idea to friends and some laughed but others said they think people will help, especially when they know how desperate I am.

  "Customers know of the global staff shortage so I'm sure most will be willing to help.

  "Quite often people have room on their roof racks for more than one tree."

  His business sells about 1,500 trees each year, supplied by Charlie Spurway at the Harburn Estate in West Lothian.

