id: bbc_2025_5285
title: Trump threatens to jail or deport students for 'illegal protests' - BBC News
date: '2025-03-04'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cqly0zrnnv3o
content: |-
  The move comes less than a year after massive Gaza war protests swept across US college campuses.

  Thousands of students were arrested during last year's Gaza war protests.

  US President Donald Trump said he would cut funding for universities that allow what he called "illegal" protests and prosecute and deport foreign students who participate. On his Truth Social social media platform, Trump said that "all federal funding will STOP" for schools that permit students to protest illegally. Trump's announcement comes less than a year after massive student protests against Israel's war in Gaza swept across US college campuses, including Columbia University in New York and the University of California, Los Angeles (UCLA). American students will be expelled, Trump said.

  Trump did not specify what would constitute an "illegal" protest. Broadly speaking, the right to protest is protected by the First Amendment of the US Constitution. The Foundation for Individual Rights and Expression, also known as Fire, swiftly condemned Trump's announcement. "Colleges can and should respond to unlawful conduct, but the president does not have unilateral authority to revoke federal funds, even for colleges that allow 'illegal' protests," the statement said. The group added that the move will "cast an impermissible chill on student protests about the Israeli-Palestinian conflict". In a separate announcement, the US Department of Education, General Services Administration and the Department of Health and Human Services said they would conduct a "comprehensive review" of Columbia's federal contracts amid an ongoing investigation into compliance with Title VI, a federal law that bans discrimination based on ethnicity or ancestry. In a statement, the education department said that it is considering stop work orders for $51.4m (£40.19m) in contracts with the New York City-based university, and will review more than $5bn in grant commitments to the school. "Americans have watched in horror for more than a year now, as Jewish students have been assaulted and harassed on elite university campuses - repeatedly overrun by antisemitic students and agitators," Trump's new Secretary of Education, Linda McMahon, said in a statement. McMahon added that "unlawful encampments and demonstrations have completely paralysed day-to-day campus operations, depriving Jewish students of learning opportunities to which they are entitled". In January, Trump signed an executive order that called for the removal of foreign students who participated in protests. The order also directed government departments to make recommendations that could allow educational institutions to "monitor for and report activities by alien students and staff" and, if warranted, remove them. A White House fact sheet on the order specified that it seeks to "protect law and order, quell pro-Hamas vandalism and intimidation, and investigate and punish anti-Jewish racism in leftist, anti-American colleges and universities". In April 2024, student protests against the war in Gaza drew national attention after students at Columbia were arrested at a student encampment set up on campus. Thousands of arrests were ultimately made at dozens of universities across the country. At Columbia, the university authorised New York Police Department officers to swarm the campus, a controversial decision that led to the arrests of about 100 students who were occupying a university building. Four months after protests rocked the campus, Columbia president Minouche Shafik resigned. Earlier this week, a federal task force announced it would visit 10 prominent US universities that have been the scene of anti-semitic incidents.
