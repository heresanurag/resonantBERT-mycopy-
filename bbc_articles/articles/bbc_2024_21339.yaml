title: 'Sol Bamba: Football world pays tribute to ''great man'' - BBC Sport'
date: '2024-09-01'
section: Cardiff
url: http://www.bbc.co.uk/sport/football/articles/cm2n9dz8n2jo
content: |-
  The football world is paying tribute to Sol Bamba who has passed away aged 39.

  The football world has paid tribute to Sol Bamba following his death aged 39. The former Cardiff City, Leeds United and Hibernian defender overcame non-Hodgkin lymphoma in 2021 but died on Saturday in Turkey, where he was working for Adanaspor, after being admitted to hospital. The Ivory Coast defender - who also had spells with clubs including Leicester City, Middlesbrough and Dunfermline Athletic - won promotion with Cardiff in the 2017-18 season. Bamba's former team-mates, clubs and fans have reacted to the news of his death.

  Sol Bamba played in all 46 Championship matches during the 2017-18 season as Cardiff City gained promotion to the Premier League under Neil Warnock

  Former Cardiff defender Lee Peltier wrote on X: "Love you brother. Rest easy my big brother - always there for me, will never forget." Ex-Cardiff defender and manager Mark Hudson said: "Never had the chance to witness what a truly great man and leader you were. "We have shared stories and I loved our chats, however brief. My heart goes out to Sol's family. I am devastated for you." Former Middlesbrough defender Cyrus Christie said: "This news has shook me to my core. Only the other day we spoke as you started your managerial career. "Fly high brother, may your soul rest in peace. One of the nicest and most humble guys to grace this game. Thoughts and prayers go out to your family." Junior Hoilett, who won promotion with Cardiff alongside Bamba, said: "RIP Big Bro. Love Always." Andy Campbell, who played for both Cardiff and Boro, said: "Awful news, a genuinely gorgeous human being." Ipswich Town's Sam Morsy, who was with Bamba at Middlesbrough, wrote: "Ahhh man big Sol .. incredible human one of the best I've shared a dressing room with, at the start of his coaching career." Writing in Arabic, Morsy added: "We belong to Allah and to him we shall return." Current Cardiff left-back Callum O'Dowda said: "Heartbroken. Despite everything you went through, you epitomised the most positive outlook on life. A lesson I will hold forever. My thoughts are with your family."

  Bluebirds goalkeeper Jak Alnwick wrote: "Rest in peace Sol, one of the nicest guys I've ever come across in football." And Neil Etheridge, a team-mate of Bamba's at Cardiff, said: "One of the nicest guys I have met off the field and on it. "Always smiling, always so happy, always seeing the brighter side of life. "When I joined the club, before he knew me, Sol treated me as a brother. When we got to know each other we became family. Rest in peace Sol." Ex-Cardiff winger Nathaniel Mendez-Laing wrote: "My guy always looked out for me. Love you brother." Neil Warnock, who made Bamba his first signing at Cardiff, wrote on X: "I can’t believe I won’t see that beaming smile again. "I’m so happy that Sol was part of my life and we had such brilliant memories together. "I’m heartbroken for Chloe and the family and all my thoughts are with them. "Sol was a ray of sunshine and I’ll miss him so much."

  Football clubs around the world have also paid tribute to Bamba. Cardiff City, where Bamba made 118 appearances, said the centre-back was a "hero" and described his impact at the club as "immeasurable". Leeds United, where Bamba played between 2015 and 2016, said he was "one of the nicest people in football". A Football Association of Wales statement read: "The FAW is devastated to hear the sad news of Sol Bamba's passing. "Sol obtained his coaching badges with the FAW and was currently studying for his Uefa pro licence, where everyone he worked with admired his positivity and his love for the game. "Our thoughts and deepest condolences are with Sol's family, friends and everyone that knew him during this difficult time." "For the last few years I have watched Sol fight his cancer head on with an astounding mental and physical strength and stoicism," she wrote. "Unfortunately, it was never a fair fight and just when things were looking up he took a downturn and finally succumbed on 31 August. "These years have been indescribably difficult but we still managed to find joy and laughter in it. I've experienced my worst days but also some of my best. "Sol accepted his fate as God's will and left this earth knowing, without a shadow of a doubt, that he was loved wholeheartedly. I made sure of that. "It was an honour to have loved and been loved by Sol. I learnt so much from him. He is my hero. My heart is breaking. What a gift, what a gift, what a gift to have been loved by him."
