title: Greenwich stab murder suspect, 19, arrested - BBC News
date: '2019-07-15'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-48986190
content: |-
  The 19-year-old was detained after the victim, 22, died from stab wounds on a street in Greenwich.

  The victim died in hospital after being found with a "number of stab wounds"

  A teenager has been arrested on suspicion of the murder of a man who was stabbed to death in London.

  The 19-year-old man is in custody after the 22-year-old victim was found with a "number of stab wounds" in Greenwich on Wednesday, police said.

  Despite "extensive efforts of medical staff" to save the victim's life, he died about six hours after being found in Tellson Avenue at about 14:45 BST.

  The Met said the suspect was arrested at an address in Lambeth on Sunday.

  It is believed the 22-year-old victim was attacked in an alleyway

