content: |-
  Ireland captain Caelan Doris is passed fit to start Saturday's Six Nations game against France, but Mack Hansen is ruled out through injury.

  Captain Caelan Doris returns from injury but Mack Hansen misses out

  Coverage: Listen live on BBC Radio 5 Sports Extra, Radio Ulster & BBC Sounds; text commentary and highlights on BBC Sport website and app; watch on ITV1

  Ireland captain Caelan Doris has been passed fit to start Saturday's Six Nations game against France, but Mack Hansen is ruled out through injury. Back row Doris missed the win over Wales because of a knee problem, but returns to lead the team as he wins his 50th cap. Wing Hansen is out with a quad injury, having missed the win over Scotland in round two because of a hamstring issue. Hansen's injury means Jamie Osborne switches to the right wing after starting at full-back against Wales. Osborne, 23, has played on the wing for Leinster, but this will be his first time in the position at Test level. Ronan Kelleher (neck) remains sidelined, so Rob Herring is set to make his first appearance of the tournament as replacement hooker with Dan Sheehan starting. Garry Ringrose's suspension means Bundee Aki returns to partner Robbie Henshaw in midfield, the latter switching to outside centre. Finlay Bealham returns at tight-head prop and Thomas Clarkson drops to the bench. Tadhg Furlong is still ruled out despite stepping up his rehabilitation from calf and hamstring injuries. Like Doris, Bealham and Jack Conan are set to win their 50th caps. Conan is one of six forwards named on the bench as Ireland opt to go for a 6-2 split for the first time this year. "Caelan has done incredibly well to get back to full fitness," said Ireland interim boss Simon Easterby. "It says a lot about him that he has done as many other players might not have been able to do that in such a short space of time."

  After announcing they will retire from Test rugby at the end of the tournament, Peter O'Mahony, Cian Healy and Conor Murray will play in their final home match. Munster flanker O'Mahony retains his place after starting against Scotland and Wales, while Healy and Murray are named on the bench. "This weekend gives the Irish public the chance to mark the final home international appearances for Peter, Cian and Conor – three stalwarts of Irish rugby who help drive the highest standards in our camp," added Easterby. Herring, Healy, Clarkson, Conan, James Ryan and Ryan Baird provide the forwards cover with Murray and Jack Crowley named as the two replacement backs. It is the first time Ireland have opted for a 6-2 split on the bench since last year's loss in England - a result which ended Irish hopes of back-to-back Grand Slams. Ireland did, however, use a 6-2 split in last year's resounding victory over France in Marseille. France, who named their team earlier on Thursday, have retained a 7-1 split on the bench having used the tactic against Italy last time out.

