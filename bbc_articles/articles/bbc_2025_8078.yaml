content: |-
  Interim Rangers manager Barry Ferguson fulminates after his side suffered a fifth consecutive home defeat.

  'Raging' Ferguson not scared to make Rangers changes

  This video can not be played To play this video you need to enable JavaScript in your browser.

  "Raging" Rangers interim manager Barry Ferguson has vowed to "make changes" for the final few matches of the Scottish Premiership season after Hibernian meted out a record-breaking fifth consecutive defeat at Ibrox. Only three of those have come on Ferguson's watch but this latest one - with Hibs ending a wait of more than seven years for a win in Govan - has pushed the patience of the stand-in boss beyond breaking point. Ferguson cut an irate figure as he spoke to BBC Scotland after just his seventh match in charge of the club he served with distinction as a player. "Angry, really angry in fact - that's the most simple way I can put it. There's no way I'm accepting that," the 47-year-old said. "I said at half-time 'I need to see more, I want to see more aggression in our play' and I never saw it. That's the thing I'm raging with. "I'm not going to kid anybody on. Hibs deserved it. They tackled harder, ran harder and wanted it more. It's sore for me to say that.

  "I'll take the responsibility. I pick the team and I need to go away with the players and have a long hard look in the mirror." The good work of a first derby win at Parkhead in five years has now been undone. Should leaders Celtic win at bottom club St Johnstone on Sunday, they can wrap up a 13th Premiership title in 14 seasons when they host Kilmarnock next Saturday. Both of those games come before Rangers are next in domestic action. The Ibrox side have long since been out of any nominal title race but Ferguson won't accept that as an excuse for under-performance. "It's about pride," he said. "This [season] is in real danger of just petering out. I know we're in the Europa League, but those are easy games to get up for. "I will make changes; I'm not scared to make changes. I need a team that's willing to put their bodies on the line."

  Rangers will indeed have to "get up for" the visit of Athletic Bilbao - the fourth-placed side in La Liga - on Thursday. Ferguson will be desperate not to be the man who presides over a sixth successive Ibrox defeat. Furthermore, two matches against the Spaniards are also the only remaining fixtures with any real significance attached for Rangers. A place in a European semi-final is up for grabs but they will have to improve in all aspects of their game if they're to compete with a side who are among the favourites to win the Europa League in their own stadium in May. Given Hibs can now add their names to a list of recent Ibrox winners that includes Queen's Park, St Mirren, Motherwell and Fenerbahce, the leap in performance levels required to be competitive on Thursday is of the quantum variety. The Easter Road side were ahead inside 10 minutes when Jack Butland failed to deal with a Dylan Levitt shot, but visiting goalkeeper Jordan Smith was only tested a couple of times, with Ferguson furious Hibs showed a greater appetite for the fray. That view was shared by former Ibrox midfielder Ian McCall on Sportsound. "Rangers were defensively really poor, the goalkeeper doesn't inspire confidence, and your number nine isn't putting the ball in the back of the net," he said. "Whoever the manager is going to be, there are big problems to fix, the balance of the team and their mental attitude."

  Scottish Football Podcast: 'There are big problems to fix'

  The number nine in question is Cyriel Dessers. The Nigernian could - arguably should - have had a hat-trick but again spurned the chances that came his way. The 30-year-old has 23 goals for the season - a respectable return - but were he more clinical, he could have double that. If Dessers be one of the players Ferguson is losing patience with, one option would be to move Hamza Igamane up front. The other would be to restore Danilo to the starting XI. Butland may also be sweating on his place in the team. The former England international goalkeeper should have kept out Levitt's opener, the latest in a line of mistakes that has grown worrying long. Ferguson may feel his experience is needed in the white-hot atmosphere of a European tie, while the Englishman's role in the impressive win at Fenerbahce should not be forgotten. After watching Rangers' Jekyll and Hyde performances as a pundit and club ambassador all season, Ferguson has now witnessed them from pitchside. His patience has finally snapped. "Absolutely miles off it," was how he described the performance against Hibs. There were over 20 minutes, plus stoppage time, to play after Martin Boyle sprinted through the wide open Ibrox spaces to put the visitors two goals up. Rangers offered precious little in response. It appears that will now be left to a manager who demands one simple thing from whichever line-up he picks for the remainder of the season - "pride". Depending on Thursday's result against Bilbao, it may be all Rangers have to play for in a sorry season of failure.
