title: The nightclubs getting young people vaccinated - BBC News
date: '2021-08-09'
section: General
url: http://www.bbc.co.uk/news/uk-58146198
content: |-
  Venues across the UK are offering jabs in an effort to get more young people immunised.

  Nightclubs and other venues across the UK are offering vaccine shots in an effort to get more people immunised.

  At some events, free food and drink are being offered as incentives. But there are still some young people who are hesitant to take the vaccine.
