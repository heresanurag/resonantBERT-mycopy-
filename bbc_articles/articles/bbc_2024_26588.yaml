  When Villa were searching for Gerrard’s replacement, Emery was on a four-man list with Ruben Amorim, now much-coveted at Sporting Lisbon, Mauricio Pochettino and Julen Lopetegui. Emery, who had rejected Newcastle United at the 11th hour, was particularly favoured by owner Nassef Sawiris, unmoved by his sacking at Arsenal. He was more impressed by Emery winning the Europa League three times with Sevilla and a fourth at Villarreal, allied to his ability to fashion formidable teams. The Spaniard even reached the final in his supposed one full season of struggle at Arsenal. The feeling was that Emery had walked into a difficult situation at Emirates Stadium as successor to Arsene Wenger, who had been there almost 22 years, and that his record was not as bad in hindsight as others thought. Arsenal finished fifth, one point behind Tottenham in the Champions League places, and also reached that Europa League final, which they lost 4-1 to Chelsea in Baku. Pochettino was unlikely to come back into football with Villa at that stage but there were no doubts about Emery's pedigree and his suitability for Villa Park. And he was impressed enough with the club's vision and ambition that they succeeded where Newcastle United had failed in tempting him away from Villarreal. He is the driving force behind Villa's renewal, his imprint all over this win against Bayern, from the fierce defensive organisation to the midfield pressing and a winner on the counter-attack, Duran lifting Pau Torres' long pass over the stranded Manuel Neuer.

