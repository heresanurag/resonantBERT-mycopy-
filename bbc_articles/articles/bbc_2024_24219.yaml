  Jack Draper says being sick on court in his US Open semi-final defeat was "the worst feeling ever", but Grand Slam success is "just a matter of time".

  Jack Draper will move into the world's top 20 after his US Open run

  Jack Draper says being sick on court in his US Open semi-final defeat was "the worst feeling ever", but he believes Grand Slam success is "just a matter of time". The Briton vomited three times during his 7-5 7-6 (7-3) 6-2 defeat by world number one Jannik Sinner in New York. Reaching the last four was the best run of the 22-year-old's career at a major. "When you're playing long matches, you need to be able to drink and give your body the supplies it needs to keep on going," Draper said. "But obviously when you're feeling sick, you can't put anything inside your body, and it's the worst feeling ever. "You can't move around the court when that happens. It's a horrible feeling."

