content: |-
  BBC Wales presenter Wynne Evans becomes the eighth star to leave Strictly Come Dancing.

  Opera singer Wynne Evans has become the eighth star to leave this year's Strictly Come Dancing after his charleston left judges cold. The BBC Radio Wales presenter performed the routine in a dance-off during the result's show episode on Sunday at Blackpool Tower Ballroom. The 52-year-old Welshman, who found fame in insurance adverts, had earlier in the series been caught up in controversy with dance partner Katya Jones after what they called a "running joke" backfired. The pair found themselves in the bottom two in the latest programme, opposite Gladiators star Montell Douglas and Johannes Radebe after a public vote and the judges' scores.

  The judges' decision to save Douglas, who performed a salsa to Thelma Houston's Don't Leave Me This Way was unanimous. Evans, who performed to Carmen Suite No 1: 5. Les Toreadors by Georges Bizet, said he had had a "wonderful time" on the BBC One show. "It's been wonderful, I've got to say," Evans said, "I feel like it's what Strictly is all about. "If I can come and do Strictly and last until week nine, then anybody can get out there and dance."

  Sunday was the last dance for Wynne Evans, with his partner Katya Jones, and presenter Tess Daly

  Jones said: "The smile hasn't left my face since the first day of our training, since the day we got partnered up." She said Evans had made the show "joyous", adding: "I'm sure everybody was jealous, because you're the kind of guy that everybody wants in their life. "You bring light, you bring laughter, you bring charisma, you fill up every room you walk into with those qualities." After their "running joke" was poorly received the pair apologised. It saw Jones move her dance partner's hand from her waist following heightened scrutiny of the long-running series. He said on radio he was "heartbroken" by the backlash, and believed the moment had been misinterpreted. Celebrities have been outspoken about their treatment recently, and the show has put in place heightened welfare measures including chaperones in rehearsals. The remaining seven couples will take to the dancefloor next week.
