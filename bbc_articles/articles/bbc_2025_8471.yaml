content: |-
  Rajasthan Royals' 14-year-old batter Vaibhav Suryavanshi is dismissed for a two-ball duck as his side lose by 100 runs to Mumbai Indians.

  Suryavanshi, 14, out for duck after record century

  Vaibhav Suryavanshi's 35-ball hundred on Monday was the second fastest hundred in IPL history and the fastest by an Indian player

  Fourteen-year-old batter Vaibhav Suryavanshi experienced the lows of elite sport just three days after his record-breaking century as he was dismissed for a two-ball duck in the Indian Premier League. The prodigious talent became the youngest player to hit a men's T20 century in Monday's victory over Gujarat Titans, but in his following outing he lobbed a catch to Will Jacks inside the first over of Rajasthan Royals' chase. His dismissal was just the start of his side's woes, as Mumbai Indians' bowlers tore through the Rajasthan line-up, bowling them out for 117 in the 17th over to win by 100 runs. A sixth consecutive win takes Mumbai top of the table while Rajasthan remain in eighth and can no longer qualify for the end of season play-offs.

  Having struck 101 from 35 balls in just his third outing in the IPL, all eyes were on Suryavanshi as Rajasthan embarked on a chase of 218. He was unable to repeat his feat of hitting his first ball in the competition for six, fending his first ball into the covers before chipping to Jacks at mid-on from Deepak Chahar's next delivery. His opening partner Yashasvi Jaiswal struck two sixes off Trent Boult in the following over, but the veteran New Zealand seamer then took his revenge, bowling the India international. Rajasthan slid to 47-5 as Jasprit Bumrah dismissed Riyan Parag and Shimron Hetmyer with consecutive deliveries, before 37-year-old spinner Karn Sharma took three wickets for 23 to ensure there would be no Rajasthan fightback. Jofra Archer held up the Mumbai victory, top-scoring with 30, but he became the last man out as Boult returned to have the England seamer caught at short fine-leg and finish with figures of 3-28. Having been put into bat, Mumbai openers Rohit Sharma and Ryan Rickelton got their team off to a strong side with an opening partnership of 116. South African Rickelton was bowled by Maheesh Theekshana for 61 and Rohit followed in the next over, lofting Parag to Jaiswal at long-off having scored 53. The wickets brought Suryakumar Yadav and Hardik Pandya to the crease and they each scored an unbeaten 48 from 23 balls as Mumbai closed on 217-2, a total Rajasthan proved incapable of chasing. Mumbai move up two places from third and now sit at the top of the standings with seven wins and four losses - ahead of Royal Challengers Bengaluru on net run-rate, having played one game more.
