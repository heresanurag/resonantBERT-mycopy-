title: 'The Sims: Movie adaptation with Margot Robbie''s company confirmed - BBC News'
date: '2024-09-17'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/cqjr049lzp1o
content: |-
  A rumoured adaptation of the hit videogame is confirmed by its makers and Amazon MGM studios.

  Margot Robbie's production company Lucky Chap is also linked with a planned Monopoly movie

  The makers of The Sims have confirmed that a movie based on the hit videogame series is on the way. Rumours about the adaptation of the popular life simulator, which first launched more than 20 years ago in 2000, had been swirling for several months. Gaming giant Electronic Arts (EA), which publishes the series, announced it was working with Amazon MGM Studios on the film. It also confirmed Margot Robbie's production company LuckyChap and Loki director Kate Herron were involved.

  British author and comedian Briony Redman will co-write the film, EA said. She previously worked with Herron, who also directed episodes of Netflix's Sex Education, on a script for the most recent series of Doctor Who. EA said it was "too early to share more" but promised updates next year, when The Sims marks its 25th anniversary. Developed by Maxis, the game puts players in charge of cartoonish characters known as Sims, putting them in control of various aspects of their lives. The game receives regular updates, and over the years the developers have included themed expansion packs introducing new elements, relationship dynamics and, in one case, allowing players to turn their Sims into vampires.

  The Sims - now on its fourth main instalment - has sold millions of copies since its 2000 release

  Margot Robbie starred in last year's Barbie movie - one of the most successful product to film crossovers ever - and her production company is also working on a Monopoly adaptation. Speaking to Variety in February, she said: "We want to make more films that have the effect that Barbie has. "Why can't it be another big, original, bold idea where we get an amazing filmmaker, a big budget to play with, and the trust of a huge conglomerate behind them to go and really play? I want to do that." LuckyChap previously worked with Amazon on the release of Saltburn - which was a massive success when it became available on its Prime Video service towards the end of last year.

