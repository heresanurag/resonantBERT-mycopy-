  Murs said he hoped he would be fit to play his weekend shows and would update fans after medical checks. He added: "As you can probably hear from my voice it just sounded rubbish. "And it's unfair for you guys who spent all that money to come and see me, you deserve the best show, and me being at my best. "Hopefully I can recover from this." Murs said it was the first time he had walked off during a show in 15 years of playing concerts.

  Murs was performing at the OVO Hydro

  Fan Chloe Banning, who has seen the singer perform more than 20 times, said fans could tell Murs was disappointed when he left the stage. She told BBC Scotland News: "It wasn't 100% noticeable [he was struggling] as he was still putting on such a good show, but I thought something was a bit off as there were certain lines he wasn't singing. "Some people thought he was joking, I personally thought he was taking 10 minutes and coming back on. "But then he left the stage and we realised he wasn't coming back. You could tell he was really upset and kicking himself." Ms Banning said the majority of fans at the venue were sympathetic, though a minority were angry over the cancellation. The singer, from Essex, rose to fame on the X Factor and went to have hits with tracks like Troublemaker, Dance With Me Tonight and Up. Promoters SJM Concerts have been contacted for comment regarding whether fans will be refunded or if the gig will be rescheduled.

