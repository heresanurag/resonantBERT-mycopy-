title: Olly Murs pulls plug on Glasgow Ovo Hydro show in stage walk-off - BBC News
date: '2025-05-23'
section: UK
url: http://www.bbc.co.uk/news/articles/cn9jyz9r9p5o
content: |-
  The singer apologised to fans after struggling with his voice during the gig at the Ovo Hydro.

  Murs performed at the O2 in London earlier this month

  Olly Murs has pulled the plug on his show in Glasgow, after walking off stage because he was struggling with his voice. The singer left the 14,000-capacity Ovo Hydro venue after about 20 minutes on Thursday night, just six songs into his set. In a video on social media after the concert, Murs offered fans an apology "from the bottom of my heart". The 40-year-old said he was seeing a doctor before arena gigs in Manchester, Birmingham and London this weekend.

  In the video posted on Instagram, an emotional Murs said: "Glasgow, I'm so sorry that I had to walk off after six songs and cancel the show. "Most of the time as singers, you can get through it if your voice is not 100%. "But I walked out tonight thinking my voice is great, I maybe felt a little bit run down, but I didn't think I couldn't do the show or I wouldn't have come out otherwise."

