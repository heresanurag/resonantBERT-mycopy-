  On Wednesday, MPs will get another chance to put forward a range of amendments in the Commons to show what direction they want Brexit to take.

  One - drawn up by Labour's Yvette Cooper and Conservative Oliver Letwin - would, if passed, give MPs the power to demand a delay to Brexit if a deal cannot be agreed by 13 March.

  Three cabinet ministers, Greg Clark, Amber Rudd and David Gauke, signalled they could be prepared to vote for it if there is no breakthrough in the next few days.

  Ms Cooper told the BBC that the move was not intended to stop Brexit as it would be up to the government, not Parliament, to determine the length of any delay.

  Ms Rudd told reporters on Monday morning that she was "completely committed" to making sure the UK leaves the EU and she supported the prime minister.

  But, she added: "What I don't think is acceptable is plans to move ever closer to no deal."

  Monday: The PM meets with EU leaders, including Angela Merkel and Jean-Claude Junker, on the fringes of the EU-League of Arab States summit.

  Tuesday: Mrs May gives a statement to the House of Commons updating them on her progress on Brexit. Brexit Secretary Stephen Barclay and Attorney General Geoffrey Cox return to Brussels to continue talks with the EU.

  Wednesday: MPs debate an amendable motion tabled by the government. Speaker John Bercow chooses which amendments to put forward, and MPs vote on the next step proposals.

  There's also the proposal of a new amendment from a group of Conservative backbenchers, led by Andrew Percy and Simon Hart, which calls for a "strictly time limited" delay to Brexit if there is no formal deal by 13 March.

  It would avoid handing control of Brexit to Parliament, and its proposers hope it will attract support from MPs who have indicated they might support the Cooper-Letwin amendment a "last resort" to avoid no-deal, as well as colleagues who are relaxed about no-deal, on the basis that it will provide more time for planning.

  Defence Minister Tobias Ellwood told BBC Radio 4's Today programme he was "encouraging" the prime minister to announce a delay to prevent a no-deal Brexit.

  But Education Secretary Damian Hinds said a delay would "just prolong these issues".

  It's absolutely plain that Theresa May doesn't want to delay Brexit in any way. An extension, in her view, doesn't solve any of the dilemmas.

  But she has also never actually 100% said that she would never, ever, ever end up doing that. Simply, she can't, because Parliament might take the decision out of her hands, or the prospect of a defeat might force her to move.

  Indeed, a senior figure in government is convinced that Number 10 will find a way, if the votes are stacking up, of taking leaving without a deal off the table by implication, next week.

  Labour is also likely to table an amendment on Wednesday, putting its own Brexit plan - one which backs a permanent customs union with the EU and a close relationship with its single market - to MPs.

  That move could take the party a step closer to supporting another EU referendum.

  Theresa May is continuing to push Brussels for extra legal promises that the backstop - the controversial policy that aims to prevent a hard border returning to the island of Ireland - would, if ever implemented, be temporary.

  UK proposals include "alternative arrangements", seeking a time limit to the backstop or agreeing a way the UK can choose to leave it at any time.

  However, Irish Foreign Minister Simon Coveney warned on Sunday that the EU would not re-open the withdrawal agreement, adding his government could not be asked to "compromise on something as fundamental as the peace process", on which the border played a key part.
