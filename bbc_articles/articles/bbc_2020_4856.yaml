title: ‘I self-isolated from coronavirus at sea’ - BBC News
date: '2020-05-17'
section: General
url: http://www.bbc.co.uk/news/world-europe-52582616
content: |-
  Irish man Darragh Carroll left Norway on a traditional wooden boat in November 2019.

  The former chef has just arrived back home in Ireland after a perilous journey.

  He spent two months stranded on a beach in Loch Eriboll in the north of Scotland after the engine of his boat was flooded during a storm.

  As the coronavirus began to spread across the UK, he made the decision to isolate at sea as much as possible.

  The 25-year-old had been in Norway learning about the country’s travelling culture.

  He is now back home in Rathfarnham on the south side of Dublin.
