content: |-
  Greece is grappling with devastating wildfires that have forced thousands to flee their homes and hotels.

  Devastating wildfires have forced Greek islands to issue evacuation orders, with fires on Rhodes forcing 19,000 people to leave their homes and hotels.

  A drone has captured the scale of the destruction on the seaside town of Kiotari in Rhodes.

