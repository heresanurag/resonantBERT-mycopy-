  A hospital patient who occupied a bed for more than years was evicted after a hospital applied for a court order.

  A patient who occupied a bed for more than two years was evicted after a hospital applied for a court order.

  The unnamed man was treated at the James Paget Hospital, in Gorleston, Norfolk.

  The hospital said he had been "fit for discharge".
