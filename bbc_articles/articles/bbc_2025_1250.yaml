  Who has made Troy's Premier League team of the week?

  After every round of Premier League matches this season, BBC football pundit Troy Deeney gives you his team and manager of the week. Here are this week's choices. Do you agree? Give us your thoughts using the comments form at the bottom of this page.

  Mark Flekken (Brentford): Brentford have been iffy but he was a huge part of why they were able to walk away with a 1-0 victory against West Ham. It was close to being Ederson because of a goalkeeper getting an assist, but I think Flekken was the better goalkeeper on the day.

  Jan Paul van Hecke (Brighton): I watched the Brighton game in person when they beat Chelsea in the FA Cup last Saturday, and it was the same level of performance when they played the same opposition on Friday. When you look at Brighton, they are a pass, pass, pass team. He's the one who looks up and is a bit brave. He's not afraid to give the ball away. Gabriel (Arsenal) and John Stones (Manchester City): Both needed to have big performances for their teams in terms of keeping on with what they're trying to do. Arsenal are trying to win the league and Man City are trying to close the gap and stop this awful run, but with Stones back in the last couple of games they have looked miles better. Gabriel is now getting marked ridiculously closely from set pieces but is still able to get away and cause trouble, but defensively he was very good as well.

  Mikel Merino (Arsenal): Merino shouldn't really get in my team of the week, but to come on and have the impact he had on that game at Leicester was absolutely massive. So I'm kind of breaking my own rule and giving a sub a place in my team. Ryan Christie (Bournemouth): Southampton are poor but he was excellent against them - the energy and ability for the cross for the assist, and then the goal was a lovely touch and he whipped it into the far corner. Kaoru Mitoma (Brighton): He is in it for one of the best touches I think I've ever seen. That is it, I don't care if there are other wingers that fans want to put in, that touch alone gets you in team of the week. It was an unbelievable touch and then to have the calmness to finish was excellent. Yankuba Minteh (Brighton): He got two goals, was excellent, and was a thorn in the side of Chelsea all day. Newcastle obviously didn't want to get rid of him and you can see why. His potential with his pace and power is frightening. Omar Marmoush (Manchester City): I have said since he joined Man City he would be a good player, and we're starting to see now that he's going to be an exceptional player for Man City. He has what Kevin de Bruyne and David Silva have in terms of their link-up play. He is so quick and can glide past people. He can also finish. Three goals in 14 minutes gets you in team of the week.

  Chris Wood (Nottingham Forest): Big Chris Wood just continues to score. He scores goals when he has no right to score. Beto (Everton): He had half a good season at Udinese, which is obviously why Everton bought him, but he struggled to get involved under Sean Dyche. Since David Moyes has been in, he has been excellent. He has been a whole different player. Another goal, fitter, stronger, braver.

  Ange Postecoglou (Tottenham): It was a huge game for him against Manchester United, and they had to win it.

