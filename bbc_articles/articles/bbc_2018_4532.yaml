title: 'Korean summit: Welcoming Kim Jong-un with pomp and peace rituals - BBC News'
date: '2018-04-27'
section: General
url: http://www.bbc.co.uk/news/world-asia-43917141
content: |-
  South Korea's Moon Jae-in has welcomed the North Korean leader with a series of symbolic rituals.

  How do you welcome a North Korean leader who just months ago was threatening your country? With lots of elaborate pomp and a series of symbolic rituals.
