title: 'Australia fish deaths: Thousands found floating in New South Wales - BBC News'
date: '2019-01-09'
section: General
url: http://www.bbc.co.uk/news/world-australia-46812117
content: |-
  Hundreds of thousands of fish were seen floating in the Darling River and washed up on its banks.

  Hundreds of thousands of fish have been found floating in the Darling River and washed up on its banks.

  Local officials say falling temperatures killed an algae bloom, which then decomposed causing oxygen depletion in the water.

  But critics say the state and federal governments have been mismanaging the environment.

  Video shared by local residents showed the scale of the issue.
