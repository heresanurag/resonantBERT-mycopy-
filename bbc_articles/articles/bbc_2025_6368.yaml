content: |-
  The Democrat and his family were not injured, and a 38-year-old man faces charges of attempted murder and terrorism.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A 38-year-old man has been arrested and is due to be charged following an alleged arson attack on the official residence of Pennsylvania Governor Josh Shapiro, authorities have said. The arrest came hours after Shapiro, often touted as a future White House contender, woke up in the middle of the night to authorities banging on the door of his home as a fire spread. At a news conference on Sunday, Shapiro said he was "obviously emotional" as he recalled what had happened. The Democrat and his family were able to evacuate unscathed, but their home in the state capital of Harrisburg was severely damaged.

  "I refuse to be trapped by the bondage that someone attempted to put on me by attacking us as they did last night," he told reporters. Hours before the fire, Shapiro and his family had celebrated the first night of Passover, a Jewish holiday, at home. "When we were in the state dining room last night, we told the story of Passover," he said - adding that Balmer's motives were not known. Police Deputy Commissioner George Bivens said the suspect had a homemade incendiary device in his possession and was arrested in the Harrisburg area. Authorities believe the suspect was able to hop a fence surrounding the home and get inside to start the blaze, which is still being investigated.

  The inside of the governor's home was heavily damaged by the fire

  State authorities said the blaze - which was extinguished - had caused "a significant amount of damage to a portion of the residence". The governor and his family were in a different part of the brick home when the fire was set, police explained. The Harrisburg Bureau of Fire said it had worked to put out the blaze while police focused on evacuating Shapiro and his family. Authorities had offered a $10,000 (£7,600) reward for information that led to any arrest. It is unclear whether a tip led to the arrest of Balmer, who remains in custody. Shapiro and his wife, Lori, have four children together: Sophia, Jonah, Max and Reuben. The governor was considered as a possible running mate for former Vice-President Kamala Harris during her run for president last year. She ultimately chose Minnesota Governor Tim Walz. The Pennsylvania Governor's Residence, in Harrisburg, is a 29,000 sq ft Georgian-style home from 1968 that has housed eight governors. Shapiro has served as Pennsylvania's governor since 2023, after working as the state's attorney general.
