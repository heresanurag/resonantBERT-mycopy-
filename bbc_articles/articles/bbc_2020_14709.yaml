content: |-
  Secretary General Antonio Guterres says our "war" on the natural world will come back to haunt us.

  This video can not be played To play this video you need to enable JavaScript in your browser. United Nations chief Antonio Guterres issues a stark warning to world leaders about the state of the planet

  "Our planet is broken," the Secretary General of the United Nations, Antonio Guterres, has warned.

  Humanity is waging what he describes as a "suicidal" war on the natural world.

  "Nature always strikes back, and is doing so with gathering force and fury," he told a BBC special event on the environment.

  Mr Guterres wants to put tackling climate change at the heart of the UN's global mission.

  In a speech entitled State of the Planet, he announced that its "central objective" next year will be to build a global coalition around the need to reduce emissions to net zero.

  Net zero refers to cutting greenhouse gas emissions as far as possible and balancing any further releases by removing an equivalent amount from the atmosphere.

  Mr Guterres said that every country, city, financial institution and company "should adopt plans for a transition to net zero emissions by 2050". In his view, they will also need to take decisive action now to put themselves on the path towards achieving this vision.

  The objective, said the UN secretary general, will be to cut global emissions by 45% by 2030 compared with 2010 levels.

  Here's what Mr Guterres demanded the nations of the world do:

  Our war on the natural world will come back to haunt us, says Mr Guterres

  It is an ambitious agenda, as Mr Guterres acknowledged, but he said that radical action is needed now.

  "The science is clear," Mr Guterres told the BBC, "unless the world cuts fossil fuel production by 6% every year between now and 2030, things will get worse. Much worse."

  This video can not be played To play this video you need to enable JavaScript in your browser. Is it possible to reverse the climate crisis? The BBC's Justin Rowlatt explains

  Climate policies have yet to rise to the challenge, the UN chief said, adding that "without concerted action, we may be headed for a catastrophic three to five-degree temperature rise this century".

  The impact is already being felt around the world.

  "Apocalyptic fires and floods, cyclones and hurricanes are the new normal," he warned.

  "Biodiversity is collapsing. Deserts are spreading. Oceans are choking with plastic waste."

  Mr Guterres said the nations of the world must bring ambitious commitments to cut emissions to the international climate conference the UK and Italy are hosting in Glasgow in November next year.

  As well as pressing for action on the climate crisis, he urged nations to tackle the extinction crisis that is destroying biodiversity and to step up efforts to reduce pollution.

  We face, he said, a "moment of truth".

  But he does discern some glimmers of hope.

  More from Our Planet Now:

  He acknowledged that the European Union, the US, China, Japan, South Korea and more than 110 other countries have committed to become carbon neutral by the middle of this century.

  He said he wants to see this momentum turned into a movement.

  Technology will help us to reach these targets, Mr Guterres said he believes.

  Technology could help forge a more sustainable path, says Antonio Guterres

  "The coal business is going up in smoke," because it costs more to run most of today's coal plants than it does to build new renewable plants from scratch, he told the BBC.

  "We must forge a safer, more sustainable and equitable path", the UN chief concluded.

  He said it is time for this war against the planet to end, adding: "We must declare a permanent ceasefire and reconcile with nature."

  And you can hear the full speech exclusively on BBC World News and BBC World Service, on our special programme State of the Planet at 1600 GMT on 2 December.

  I've travelled all over the world for the BBC and seen evidence of environmental damage and climate change everywhere. It's the biggest challenge humanity has ever faced. Tackling it means changing how we do virtually everything. We are right to be anxious and afraid at the prospect, but I reckon we should also see this as a thrilling story of exploration, and I'm delighted to have been given the chance of a ringside seat as chief environment correspondent.
