title: Search for missing man near Northumberland ford flooded in storm - BBC News
date: '2024-12-10'
section: England
url: http://www.bbc.co.uk/news/articles/ckgnx7d5k5eo
content: |-
  Northumbria Police says searches continue after reports of concern for welfare of a man in his 40s.

  Search for missing man near ford flooded in storm

  Abberwick ford lies in a rural part of Northumberland near the village of Bolton

  Mountain rescue teams have been searching for a missing man in an area which flooded during Storm Darragh. Northumbria Police said there had been "extensive inquiries" after reports of concern for the welfare of a man in his 40s on Sunday. North of Tyne Mountain Rescue Team and Northumberland National Park Mountain Rescue Team confirmed 22 volunteers had been involved in the search near Alnwick. They have been scouring the area around Abberwick ford where a minor road crosses the River Aln near the village of Bolton in North Northumberland.

  A Northumbria Police spokesperson said: "On Sunday, we received a report in relation to concern for the welfare of a man in his 40s. "Extensive inquiries have been ongoing since then, including searches being carried out, and these continue."

  Northumberland National Park Mountain Rescue Team, pictured here on the Cheviot Hills, are one of two teams involved in the search

  The storm brought severe weather to the UK from the early hours of Saturday morning, prompting a number of flood warnings. Road and rail travel was disrupted and thousands left without power across the UK. Two men were killed in separate incidents when trees fell on their cars. Gusts of 58mph were recorded along the Northumberland coast with more than 48mm of rain measured at Redesdale Camp on Saturday. Northumberland Fire and Rescue Service dealt with a number of calls relating to fallen trees, power cuts and surface water flooding affecting roads.
