content: |-
  Derek Paton, 19 and Leon Fitzpatrick, 18 died in the incident on Ryde Road, Wishaw on Thursday.

  Derek Paton (l) and Leon Fitzpatrick died in the crash in Wishaw on Thursday

  Two teenagers have died in North Lanarkshire after a crash involving an off-road motorbike and a van.

  The incident happened on Ryde Road, Wishaw, near the junction with Waverley Drive, at about 16:30 on Thursday.

  Derek Paton, 19, who was in control of the Kawasaki bike, died from his injuries at Wishaw General Hospital following the crash.

  Police said his pillion passenger, Leon Fitzpatrick, 18, was pronounced dead the scene.

  Both victims were from the Wishaw area.

  The 34-year-old driver of the white Volkswagen Crafter van suffered minor injuries.

  Flowers were left near the crash scene on Friday morning

  Sgt Ryan McAuley said: "Our thoughts are with everyone affected by this crash.

  "Our inquiries to establish the full circumstances are ongoing and we would urge anyone with information to come forward."

  He urged anyone with relevant dashcam or private CCTV footage to contact officers.

  The road was closed for investigations until about 23:00 on Thursday to allow an investigation at the scene.

