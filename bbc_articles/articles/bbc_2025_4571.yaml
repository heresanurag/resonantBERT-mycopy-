  Outside the White House on Friday, a journalist asked Trump about the signing of last week's presidential proclamation invoking the Alien Enemies Act. "I don't know when it was signed because I didn't sign it," he said. The White House later told the BBC that Trump did personally sign the executive order, external. Their emailed statement said the president was talking about the 1798 law when he said he did not sign it. The deportations case has raised constitutional questions given that US government agencies are generally expected to comply with a federal judge's ruling. At another hearing on Thursday, Judge Boasberg dismissed a government court filing on the migrant deportation flights as "woefully insufficient". Trump has called for the judge to be impeached, and accused him of trying to usurp the presidency. Earlier this week Supreme Court Chief Justice John Roberts issued a rare admonishment, without naming Trump, saying impeachment was "not an appropriate response". The government has appealed against Judge Boasberg's temporary restraining order. A hearing is due at the city's court of appeals on Monday.
