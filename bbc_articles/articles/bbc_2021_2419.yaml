title: 'Covid vaccines: Boris Johnson pledges surplus to poorer countries at G7 -
  BBC News'
date: '2021-02-19'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-56117120
content: |-
  Boris Johnson is encouraging other rich countries to donate vaccine doses at a virtual G7 meeting.

  Boris Johnson is pledging to donate most of the UK's surplus vaccine supply to poorer countries in a speech to a virtual G7 meeting on Friday.

  He urged rich countries to back a 100-day target for the developing new vaccines for future emerging diseases.

  The UK has ordered more than 400 million doses of various vaccines, so many will be left over once all adults are vaccinated.

  But anti-poverty campaigners say the UK is not doing enough.

  Decisions on when and how much of the surplus will be distributed will be made later this year, with ministers taking into account the supply chain and whether booster shots are needed in the autumn.

  The prime minister told his fellow leaders: "Science is finally getting the upper hand on Covid. Around the world [we need to] make sure everyone gets the vaccines that they need, so that the whole world can come through this pandemic together."

  "There is no point in us vaccinating our individual populations - we've got to make sure the whole world is vaccinated because this is a global pandemic and it's no use one country being far ahead of another, we've got to move together."

  He said he wanted to "ensure that we distribute vaccines at cost around the world - make sure everybody gets the vaccines that they need so that the whole world can come through this pandemic together."

  After the meeting, the G7 leaders issued a statement committing to "intensify cooperation on the health response to Covid-19".

  It reaffirmed the group's support for "affordable and equitable access to vaccines, therapeutics and diagnostics, reflecting the role of extensive immunisation as a global public good."

