title: Zoe Bread's TikTok campaign forces council to refund parking fines - BBC News
date: '2025-05-19'
section: Manchester
url: http://www.bbc.co.uk/news/articles/czdy3gj97y2o
content: |-
  A woman dons a bread mask and launches social media campaign to win a battle over a parking ticket.

  A woman has won a long-running battle over a parking fine after sharing her ordeal to TikTok under her alter-ego Zoë Bread. Zoë Bread's campaign started when she received a penalty for parking on Collier Street in Manchester and claimed confusing signs meant she bought a ticket from the wrong machine. Manchester City Council has now backed down and Zoë wants to help other people who have been caught out in the same way. Council leader Bev Craig said the signs "could be clearer" and that some other fines issued on the street over the past year would be quashed.

  After a month-long campaign that included challenging Greater Manchester metro mayor Andy Burnham on a BBC Radio Manchester phone-in, she finally won her battle. "The only part of it that I think is bad is the amount of effort it took to get heard, which is obviously not possible for a proper person to do," she told the BBC. She added that "their system doesn't work, but my system does," putting down her success to being "persistent and annoying". Zoë Bread said her problems began because the 'Pay At Machine' sign on the street pointed to both a council-run car park and private one. After unsuccessfully arguing her case, she submitted a Freedom of Information (FOI) request to the council about how many fines had been issued on the street. But the council knocked it back.

