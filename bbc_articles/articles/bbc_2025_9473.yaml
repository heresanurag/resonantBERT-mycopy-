  She then scoured council documents and found there had been a significant rise in the number of penalties issued in the first year the SIP car park was open. But he said it "shouldn't have taken the social media pressure that was largely due to Zoë's following". He said the council should cancel fines going back further than the last 12 months, considering the big rise in penalties in 2018, when the privately-run car park was first opened.

