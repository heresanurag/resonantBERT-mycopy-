  Council leader Craig - who directly contacted the campaign - said she thanked Zoe for drawing attention to the situation. She said the signs on the street complied with all the rules, but that there would be changes. Craig added: "We're going to address this as soon as possible with new signs, by relocating the meter and by asking the owners of the nearby private car park to take down their signs which have contributed to confusion. "As a goodwill gesture, we will also quash any pending or unpaid tickets relating to Collier Street - including Zoe's - and review our records of fines for the last 12 months in that location. "We will refund anyone who said at the time that they believed they had paid for their parking."

