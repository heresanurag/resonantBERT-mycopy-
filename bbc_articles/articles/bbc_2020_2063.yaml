content: |-
  Dramatic images from the famous annual event which celebrates Shetland's Norse heritage.

  Shetland's famous Up Helly Aa fire festival has again seen the burning of a replica Viking galley light up the Lerwick sky.

  Up Helly Aa - the biggest fire festival in Europe - is held on the last Tuesday in January.

  Warriors parade through the streets by torchlight as visitors from across the world gather to watch the spectacle.

  The day culminates with the dramatic burning of a replica Viking long ship.

  People of all ages take part

  Up Helly Aa offers much for photographers to savour in daylight hours as well as at night

  It was not only humans who got into the Up Helly Aa spirit this year

  As darkness descends, the torches are lit

  The day culminates with the dramatic burning of a replica Viking long ship - and the party then continues into the night
