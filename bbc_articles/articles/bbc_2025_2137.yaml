content: |-
  A number of bill rises will come into force at the start of what some commentators have described as "awful April".

  The seven bills due to go up in April

  Energy costs are one of a number of bill rises which will come into force at the start of what some commentators have described as "awful April". The exact amount you pay will depend on your individual circumstances, and where you live. Although minimum wages will increase from April, and wages on average have been outpacing inflation, household finances could still come under extra pressure. Here are seven ways in which you could be affected.

  Water bills for households are due to go up in England and Wales by £10 more per month on average, but there's a lot of variation depending on the company, external. For example, the annual Southern Water bill will jump 47% to £703, while Anglian Water customers will pay 19% more, or £626. Factors including whether households have a meter and how much water used will also impact bills, which are being front-loaded for the next five years, meaning the big increase is coming in April. Water companies in England and Wales have said the increases are needed to invest in creaking infrastructure, including sewage, and to build more reservoirs. In Scotland, water bills are set to rise by almost 10%. Scottish Water, which is a public body, said spending was needed to cope with periods of "drought and intense rainfall" brought on by climate change. Domestic customers in Northern Ireland are not billed for water, with the system funded by the devolved government.
  • None How much will I have to pay for my water?

  The annual energy bill for a household using a typical amount of gas and electricity will go up £111 a year to £1,849 from April. Regulator Ofgem increased the energy price cap because of higher wholesale costs and inflation. The cap is set every three months and limits the amount suppliers can charge for each unit of gas and electricity, but not the total bill, so if you use more, you will pay more. It affects 22 million homes in England, Wales and Scotland. Standing charges - fixed fees to connect to a gas and electricity supply and vary by region - are rising again for gas but dropping for electricity, but it depends on where you live. Ofgem is suggesting households consider a fixed tariff for a bit of stability, even though there's speculation of prices dropping in July.
  • None Energy price cap: Why are gas and electricity bills going up and can I fix?

  From April, the standard rate of tax for cars registered after April 2017 rises £5 to £195 a year. According to the RAC,, external you may pay less or more if your car was first used before 2017. The exact amount for your road tax will depend on the year your car was registered and the type of fuel it uses. One big change is that electric vehicles (EVs) will no longer be tax exempt. EVs registered from April 2025 will pay the lowest rate of £10 in the first year, then move to the standard rate. The standard rate will also apply to EVs first registered after April 2017.

  Rule changes introduced by the telecoms regulator this year mean that mobile and broadband providers must now tell customers "in pounds and pence" about any price rises, as well as when they occur. The new rules typically only apply to new customers, so any price rise will depend on when you took your contract out. For instance, under the new rules, someone with a mobile Sim only contract with EE will see their bill go up by £1.50 a month, or £18 a year. But for the majority of customers who took their contract out before 10 April 2024, they will face an increase of 6.4%, based on the inflation rate last December, plus an additional charge. Similarly, most Virgin Media broadband customers will face a 7.5% rise in bills, but for anyone who took out a contract after 9 January this year, their monthly bill will go up by £3.50. The cost of a TV licence will also go up by £5 to £174.50, and for a black and white TV it will go up by £1.50 to £58.50.

  House buyers in England and Northern Ireland will start paying stamp duty on properties over £125,000 in April, instead of over £250,000 at the moment. First-time buyers currently pay no stamp duty on homes up to £425,000, but this will drop to £300,000. Anyone starting a search for a property now would likely struggle to move before the stamp duty changes.
  • None What is stamp duty land tax and how is it changing?

  The government has kept in place the freeze on tax thresholds on income tax and National Insurance until 2028, a policy brought in by the previous government. This is often dubbed a stealth tax - as governments don't explicitly label it as a tax. But the policy amounts to a tax rise because of a process called "fiscal drag", which sees more people "dragged" into paying higher rates of tax as wages rises. According to figures from the government's financial watchdog, external by 2028-29, nearly four million additional people will be expected to pay income tax - and three million more will have moved to the higher rate - due to the threshold being frozen.
