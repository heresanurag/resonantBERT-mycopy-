  James Oliver, who led the BBC Panorama investigation, and Fergus Shiel, ICIJ managing editor, answered your questions.

  Three days of revelations later: Thanks for joining us

  We're going to wrap up our live coverage of the Pandora Papers here. Over the last three days we've unpicked one of the biggest financial leaks in history and have seen 35 current and former world leaders - and hundreds more public officials - named in the files. There's undoubtedly been a lot to take in. If you've still got questions:
  • Watch the BBC Panorama's exposé on world leaders here, and on political donors here (UK only)
  • Listen to this special edition of Newscast where the BBC's Andy Verity explains everything you need to know
  • Keep up to date with all the latest Pandora Papers news here.
