title: '9/11 anniversary: Queen tells Biden the victims are in her prayers - BBC News'
date: '2021-09-11'
section: UK
url: http://www.bbc.co.uk/news/uk-58522061
content: |-
  After sunset, 67 candles were lit to remember British victims as part of remembrance events in the UK.

  A private service of remembrance has been held in the September 11 Memorial Garden in Grosvenor Square, London

  The Queen has sent a message to US President Biden marking 20 years since the 11 September attacks, saying her thoughts and prayers are with the victims, survivors and their families.

  In her message, she also paid tribute to the resilience of the communities who joined together to rebuild.

  UK Prime Minister Boris Johnson said the terrorists had failed to "shake our belief in freedom and democracy".

  After sunset, 67 candles were lit to remember the British victims.

  Commemorations have been taking place at a memorial garden in Grosvenor Square, London, where a private service of remembrance was held earlier, organised by a support group for victims' families.

  Other events have been held around the world to remember the 2,977 people killed.

  The attacks, which were planned by al-Qaeda from Afghanistan, saw four US passenger jets seized by suicide attackers - two of which were flown into the Twin Towers of the World Trade Center in New York.

  Another plane crashed into the Pentagon, just outside US capital Washington DC, and a fourth plane crashed in a field in Pennsylvania after passengers fought back.

  Candles have been put out in the September 11 Memorial Garden in Grosvenor Square, London, to remember British victims

  People comforted each other after attending the Memorial Garden

  Flowers have been laid in Grosvenor Square

  In her message to President Biden, the Queen said: "As we mark the 20th anniversary of the terrible attacks on September 11 2001, my thoughts and prayers, and those of my family and the entire nation, remain with the victims, survivors and families affected, as well as the first responders and rescue workers called to duty.

  "My visit to the site of the World Trade Center in 2010 is held fast in my memory.

  "It reminds me that as we honour those from many nations, faiths and backgrounds who lost their lives, we also pay tribute to the resilience and determination of the communities who joined together to rebuild."

  And in a defiant message to mark the anniversary, the prime minister said while the terror threat remained, people refused "to live in permanent fear".

  "That we are coming together today - in sorrow but also in faith and resolve - demonstrates the failure of terrorism."

  The Queen laid a wreath at Ground Zero during her 2010 visit

  Events have also been taking place at Windsor Castle, where a special changing of the guard ceremony took place, during which the US national anthem was played. It was an echo of the playing of the Star Spangled Banner at Buckingham Palace 20 years ago on the day after the atrocity, as a gesture of solidarity.

  There was a minute's silence after the Band of the Welsh Guards performed the anthem, watched by hundreds who had gathered at the castle.

  Acting US ambassador Philip T Reeker said the events were a reminder that the US had "no closer ally and no closer friend in good times and in bad times" than the UK.

  He said: "This has shown the special relationship remains so crucial to all of us."

  Mr Reeker was among those attending another event at Queen Elizabeth Olympic Park in London, organised by education charity Since 9/11 for survivors of the attacks.

