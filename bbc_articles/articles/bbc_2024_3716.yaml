title: 'Bangladesh fire: At least 46 dead in Dhaka building blaze - BBC News'
date: '2024-03-01'
section: Asia
url: http://www.bbc.co.uk/news/world-asia-68442375
content: |-
  The fire in the capital Dhaka ripped through a seven-floor block - dozens were rescued.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'Jumped to save my life': Survivor on deadly Dhaka fire

  A huge fire that broke out in a multi-storey building in the Bangladesh capital Dhaka has killed at least 46 people and injured dozens of others.

  According to local media, the blaze began in a restaurant in the seven-floor property at around 22:00 local time (16:00 GMT) on Thursday.

  Seventy-five people were rescued and dozens taken to hospital. The fire was brought under control after two hours.

  The fire's cause is being investigated - firefighters blamed safety lapses.

  A fire service official said the building did not have an emergency exit and cooking gas cylinders were kept in stairwells and restaurant kitchens.

  Health Minister Samanta Lal Sen said that at least 33 people, including women and children, had been declared dead at the Dhaka Medical College Hospital.

  At least 10 others died at the city's main burns hospital. Twenty-two were in critical condition, Mr Sen said.

  The emergency services were called to the Kacchi Bhai restaurant in the seven-floor block, according to the Daily Bangladesh newspaper. The complex that the building is in also contains other restaurants, as well as several clothing and mobile phone shops.

  Fires in commercial and residential buildings are common in Bangladesh and are often blamed on poor safety awareness

  The fire could have originated from a gas leak or stove, said the head of the Bangladesh Fire Service and Civil Defence, Brigadier General Main Uddin, according to AFP news agency.

  "It was a dangerous building with gas cylinders on every floor, even on the staircases," Brig Gen Uddin told reporters.

  "We were at the sixth floor when we first saw smoke racing through the staircase," said a restaurant manager called Sohel, according to AFP.

  "A lot of people rushed upstairs. We used a water pipe to climb down the building. Some of us were injured as they jumped from upstairs."

  Another survivor, Mohammad Altaf, told Reuters that he narrowly escaped the blaze through a broken window.

  He said two of his colleagues, who had helped to get people out, both later died.

  Fires in commercial and residential buildings are common in Bangladesh. They are often blamed on poor safety awareness and an inadequate enforcement of regulations.
