  Mr Ábrego García is among 238 Venezuelans and 23 Salvadorans deported under the Trump administration to El Salvador's notorious mega-prison. Officials allege they are gang members and therefore are subject to deportation. Mr Ábrego García, who is married to a US citizen, does not have any gang ties and has never been charged with a crime, his lawyer says. He was also protected by a "withholding of removal" order, which means the US government cannot send him back to El Salvador because he could face harm. The order dates back to 2019, when ICE first took Mr Ábrego García into custody and alleged he belonged to the MS-13 criminal organisation, an allegation he denied at the time. Such orders are common, immigration lawyers told the BBC, and are an alternative to asylum protections. "It was an unlawful act, for the US to return him to the country where he could not be returned," said Amelia Wilson, director of the Immigration Justice Clinic at Pace University. A judge ultimately granted Mr Ábrego García the 2019 order after he "testified about how he was a victim of gang violence in El Salvador when he was a teenager and he came to the US to escape all of that," his wife, Jennifer Vásquez Sura, wrote in a March 2025 affidavit. Department of Justice attorney Erez Reuveni acknowledged that at the time the "government did not appeal that decision, so it is final". The Trump administration now reiterates allegations that Mr Ábrego García belonged to MS-13, but Judge Xinis said the government made this claim "without any evidence" and had not produced a removal order or warrant.

  The Trump administration continues to press its case to the nation's highest court, setting up a potential showdown over the White House's deportation strategy. Chief Justice John Roberts issued an administrative stay on Monday night, pausing lower court rulings while the US Supreme Court considers the government's appeal. President Trump touted the stay as a victory, writing on Truth Social that the ruling allowed the president "to secure our Borders, and protect our families and our Country, itself." Immigration lawyers, meanwhile, are watching Mr Ábrego García's case closely, considering it a test for how much power the administration can exert over US immigration. "If the Trump administration is trying to remove these individuals by bypassing the immigration courts," said Ms Wilson, "there's a direct and obvious line between what they're doing, and an effort by the administration to completely usurp judicial and due process."
