title: Can the US return Kilmar Abrego Garcia from El Salvador? - BBC News
date: '2025-04-09'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cx27gzdzqrgo
content: |-
  Lawyers and experts say the case has the potential to upend due process for immigrants in the US.

  Can the US return man deported to El Salvador? Immigration lawyers think so

  Kilmar Ábrego García, who was sent to a prison in El Salvador during a Trump administration deportation initiative

  On 12 March, Kilmar Ábrego García was driving home with his young son in Maryland when he was stopped by agents from US Immigration and Customs Enforcement (ICE). Agents took Mr Ábrego García into custody, then shuttled him to detention facilities in Louisiana and Texas. According to a federal judge, after three days, "without any notice, legal process, or hearing", Mr Ábrego García found himself back in his native El Salvador at an infamous prison known for housing gang members. The government said he was deported due to an "administrative error". But despite that, Mr Ábrego García remains incarcerated in El Salvador as lawyers debate the unusual intricacies of the case. A Maryland court ordered Mr Ábrego García be returned to the US, but Trump officials argued that they cannot compel El Salvador to return Mr Ábrego García. The administration also argued that the judge ordering his return lacked the authority to do so. On Monday, the Supreme Court put a temporary hold on lower court orders while they consider the matter. Immigration experts say that as US President Donald Trump takes a hardline approach on illegal immigration, this case has the potential to upend due process for immigrants. "If the US Supreme Court were to accept [the Trump administration's] position, it would completely eviscerate any rule of law in the immigration process," Maureen Sweeney, director of the University of Maryland's Chacón Center for Immigrant Justice, told the BBC. "Because they could pick up anybody, at any time, and send them anywhere with no repercussions whatsoever."

  US District Judge Paula Xinis wrote in a filing Sunday that ICE officials did not follow procedures in the Immigration and Nationality Act when they deported Mr Garcia to El Salvador. She ruled the US must bring him back before midnight on Monday. The Fourth Circuit Court of Appeals agreed, writing that the US "has no legal authority to snatch a person who is lawfully present in the United States off the street". Yet the Trump administration has argued that it cannot comply, saying Judge Xinis' filing is outside her jurisdiction. "Neither a federal district court nor the United States has authority to tell the Government of El Salvador what to do," US Solicitor General D John Sauer wrote in an appeal to the Supreme Court.
  • None Judge rules US must return man deported to El Salvador in 'error'
  • None US judge scolds Trump officials for failing to return man deported in error Nicole Hallett, a professor at the University of Chicago Law School said that while it is true - US district judges cannot order El Salvador to take action - they can order the US government to have Mr Ábrego García returned. She also said the US has previously facilitated the return of mistakenly deported individuals. Prof Hallett also questioned the government's claim that the US is powerless to compel El Salvador to release Mr Ábrego García, citing an agreement between the two countries. The US, under the Trump administration, paid El Salvador's government $6m to house prisoners it sends, according to CBS News, the BBC's US partner. Top officials like Secretary of State Marco Rubio and Trump himself have publicly touted the arrangement. "It's almost as if the Salvadoran government is acting as an agent of the US government," Ms Hallett said, arguing that this makes the release more plausible. Mr Ábrego García's lawyers argued that because El Salvador was detaining Mr Ábrego García "at the direct request and pursuant to financial compensation" from the US, the court could order the US government to request his return. The Department of Justice, however, has resisted calls to take such action. US Attorney General Pam Bondi said Tuesday that "it was an administrative error as to why he was deported," but maintained the allegation that Mr Ábrego García belonged to a gang. "We believe he should stay where he is," she said.

