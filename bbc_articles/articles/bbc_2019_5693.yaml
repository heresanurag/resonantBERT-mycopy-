  Joseph McCann, of Aylesbury, will appear at Westminster Magistrates' Court on Thursday.

  Joseph McCann is due to appear at Westminster Magistrates' Court on Thursday

  A man has been charged with kidnapping and raping multiple women.

  Joseph McCann, of Aylesbury, is accused of the kidnap and rape of a 21-year-old woman at knifepoint in Watford in the early hours of 21 April.

  He is also charged with two counts of kidnap, four counts of rape, one count of false imprisonment and three other sexual offence charges - all in London.

  The 34-year-old has been remanded in custody to appear at Westminster Magistrates' Court on Thursday.

  Mr McCann has also been charged with two counts of causing a female to engage in sexual activity and one count of assaulting a female by penetration in London between 24 and 27 April.

  Prosecutors are considering a file of evidence relating to further alleged offences, the Met Police said.

