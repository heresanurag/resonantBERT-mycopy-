title: Washington soldier killed in Cyprus remembered 50 years on at service - BBC
  News
date: '2024-07-21'
section: Wear
url: http://www.bbc.co.uk/news/articles/cv2grqqdd95o
content: |-
  Guardsman Graeme Lawson, who died in 1974 is not forgotten, say his comrades and family members.

  The ceremony was described as "absolutely excellent" by the Washington History Society

  A memorial service has marked the 50th anniversary of the death of a 17-year-old soldier in Cyprus. On 21 July 1974, Guardsman Graeme Lawson, from Barmston, Washington, of the Coldstream Guards, became the first soldier to be killed while serving with the UN in Cyprus. More than 50 people attended the ceremony, which was held at Washington Cemetery. Ged Parker, chairman of the Washington History Society which organised the event, said the service had been "absolutely excellent".

  "It just seemed the right thing to do to remember his passing," Mr Parker said. The service was also attended by Guardsman Lawson's uncle, Doug Melton, who said he was "quite moved".

  Guardsman Lawson's uncle, Doug Melton (centre), was at the service

  Guardsman Lawson is understood to have been killed when a weapon he was unloading exploded. He had been in Cyprus for four weeks and it was his first posting. Turkish forces had invaded the island a day earlier in response to a military coup, which was backed by the government of Greece. He was buried in Washington, Sunderland, on 1 August 1974, leaving behind his parents and brothers and sisters.

  Representatives of the Coldstream Guards, the Washington Royal British Legion, and Holy Trinity Church all attended the service. Bob Hardy, 71, from Killingworth, North Tyneside also served in the Coldstream Guards and was in Cyprus in 1974 when Guardsman Lawson died. "I don't remember him myself but I have spoken to colleagues who knew him who said he was a quiet lad but then he'd only just joined, he'd only been out there for such a short time," he said. He said he had never forgotten what had happened to Guardsman Lawson, adding: "I remember hearing about his death and it really affected the whole battalion." Mr Parker said the next step in remembering the young soldier would be adding his name to Washington War Memorial, hopefully before Remembrance Day this year. "If that happens before this November, on that occasion, he will be referred to as another resident of the area who lost his life, and therefore the wider public of the town will learn of this incident," he added.
