  The court heard the car reached a top speed of 109mph before three police vehicles boxed it in near the border.

  Man in court after more than £300k seized in car chase

  More than £300,000 of cash was seized from the car

  A 44-year-old man has been remanded into custody after between £300,000-£400,000 was seized following a high-speed car chase. Eoin Morrow, of no fixed abode, appeared at Newry Magistrates' Court on Wednesday morning via videolink from Musgrave police station in Belfast. He was been charged with possessing criminal property, dangerous driving, failing to stop for police and entering an arrangement which facilitated the acquisition, retention, use or control of criminal property on behalf of another person. The charges follow an incident that began on the Dublin Road in Newry on Monday afternoon.

  A detective constable told the court that at about17:27 BST police attempted to stop a black Audi car. The car drove off, in rush hour traffic, on the wrong side of the road. The vehicle then made its way onto the southbound carriageway of the A1 towards the Irish border. The car was driving at about 90mph when a mobile phone was seen being thrown from it across to the northbound carriageway. The detective constable said the car reached a top speed of 109mph but that three police vehicles managed to box it in and prevent it crossing the border. As well as recovering the phone that had been thrown onto the road, police found another phone in the vehicle. They also found two bags filled with pound sterling bank notes. When searched, police said the defendant had a note on him saying "389,740". The detective constable said the cash has not yet been counted but was estimated to amount to between £300,000 and £400,000. The police officer told the court Mr Morrow’s solicitor had said he was under duress but wouldn’t elaborate on this during interview. During the short hearing Mr Morrow spoke only to confirm his name, age and that he understood the charges against him. No bail application was made and he was remanded into custody. He is due to appear in court again on 16 October.
