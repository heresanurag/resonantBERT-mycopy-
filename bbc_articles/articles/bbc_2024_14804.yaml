content: |-
  Rory McIlroy rebounds from US Open heartbreak with a strong start to his Scottish Open title defence - before Justin Thomas surges into the lead.

  Thomas leads as McIlroy starts well in Scottish Open defence

  Rory McIlroy has good memories of The Renaissance Club after last year's victory

  -8 J Thomas (US); -7 S Im (Kor); -6 T Detry (Bel), L Aberg (Swe), M Kieffer (Ger), H Li (Chn), J Lower (US); -5 R McIlroy (NI), T Fleetwood (Eng), D Brown (Eng), Y Paul (Ger), U Coussaud (Fra), D Thompson (US), C Conners (Can), A Noren (Swe), A Fitzpatrick (Eng), BH An (Kor), B Todd (US), A Rozner (Fra), C Morikawa (US), B Griffin (US), N Taylor (Can) Selected others: -3 R MacIntyre (Sco), V Hovland (Nor), A Scott (Aus), B Harman (US); -2 W Clark (US); -1 X Schauffele; E P Harrington (Ire); +1 H Matsuyama (Jpn), J Spieth (US)

  Rory McIlroy rebounded from US Open heartbreak by starting his Scottish Open title defence in imposing fashion before Justin Thomas surged into the lead with a blemish-free 62. McIlroy, in his first appearance since a late collapse at Pinehurst a month ago extended his 10-year major drought, posted an opening five-under 65 at the Renaissance Club. That left the Northern Irishman three shots behind Thomas, who carded eight birdies for a one-stroke cushion at the top of the leaderboard. South Korea's Sungjae Im headed the challenge on seven under, while Belgium's Thomas Detry - who holed from 119 yards for an eagle two on the fourth - and Swede Ludvig Aberg were among those two back. England's Tommy Fleetwood, Alex Fitzpatrick and Daniel Brown were well placed alongside McIlroy on five under after a day of benign conditions and low scoring in North Berwick. Home favourite Robert MacIntyre, the runner-up last year, was on three under alongside fellow Scot Grant Forrest.

  Former world number one Thomas, sporting a pair of tartan trousers, said a sub-60 round had been in his thoughts after he covered the first 13 holes in eight under. The American, who was among the later starters, drained a 13-foot putt for an opening birdie then reeled off four in a row from the fifth to reach the turn in 30. Three more birdies - including a 42-foot putt on the par-three 12th - followed in the next four holes before the run dried up just as he was eyeing a 59. "Honestly, I thought the par was 71 and then I looked up and saw even-par 70 and I was like, 'I just need a couple more [birdies] and I can shoot 59,'" Thomas said. "Then, shocking, I made five pars in a row. "I definitely wanted a 59 and was even thinking a couple lower, so we all know how that works out when you get ahead of yourself." Earlier, McIlroy, starting on the 10th, began with a birdie but immediately dropped a shot after twice finding heavy rough. Bogeys on 14 and 16 bookended a birdie in an untidy front nine for the world number two in which he hit only three of six fairways. But he came alive after the turn, with a birdie on the first followed by a delightful chip-in eagle from the right-hand side of the par-five third. He picked up another shot at the next and chances for further birdies from inside 11 feet slipped by on five, six and nine. "Obviously the last time I played, I played well. I didn't get the result I wanted but I've still got a lot of confidence in my game," said McIlroy. "I shot a solid score today. I gave myself plenty of chances on that back nine and actually felt like I left a couple out there as well. "It was as gettable as you're going to get this golf course. Hopefully no more rain over the next few days and the wind can get up a bit and the course can start to play a little bit tougher."

  American Justin Thomas leads by one after taking advantage of benign conditions at the Renaissance Club

  McIlroy's playing partner MacIntyre had the home crowds roaring in delight when he produced an unorthodox par save on the par-three 12th, chipping over the adjoining wall after an errant tee shot landed on the 14th green. He then ignited his round with three successive birdies before making the turn in two under after a bogey on 18. Two further bogeys and a birdie completed a "decent" opening round. "I got off to a really good start and saw a score out there, but it's links golf and if you're not in the right spots you can have some difficult pitches and putts," MacIntyre, 27, told BBC Sport. Patience paid off for fellow Ryder Cup star Fleetwood as he was one under through 11 holes before making birdies at four of the closing seven. Aberg, who was second at this year's Masters and will make his Open debut at Royal Troon next week, recovered from outrageous misfortune on the eighth to charge up the leaderboard. The 24-year-old's approach on eight landed near the pin but directly on Collin Morikawa's ball, sending both squirting off the green. Aberg was unable to save par but rallied on the back nine with three birdies and an eagle on the par-five 16th. "I thought I hit a decent shot [on eight], and we just saw the ball just go straight sideways," he said. "I've never seen it before. Probably not going to see it for a long time again."
