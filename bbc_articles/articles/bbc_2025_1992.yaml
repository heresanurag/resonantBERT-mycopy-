content: |-
  It's been a busy first month, with a blizzard of activity, so we compare his pledges with what he has delivered.

  Has Trump kept his day one promises?

  Donald Trump made a lot of promises while running for president. He pledged to cut taxes, reduce prices, stem undocumented migration, end wars and strengthen American industry. Some of his proposals were detailed by his policy team or presented by Trump himself, in "Agenda 47" videos on his campaign website. Others were offered seemingly off-the-cuff - a product of Trump's "think out loud" style and openness to adopting ideas others had suggested to him. In his victory speech on 6 November, he made it clear he intended to keep the promises that sent him back to the White House: "I will govern by a simple motto: Promises made, promises kept." It's become a slogan of sorts in his first month in office, which has been marked by a blizzard of activity and notable progress in achieving some of his goals. In areas such as immigration and foreign policy, Trump has broad power to act unilaterally - and has done so. In other areas, he has run up against legal challenges and political obstacles. Many of the other promises he's made will ultimately require action from Congress, under narrow Republican control, to become permanent. Here's a look at some of Trump's biggest "day one" promises and his efforts to turn them into reality.

  "When I win, I will immediately bring prices down, starting on day one." Aug 2024 This is perhaps his biggest challenge and a major campaign promise that remains undelivered. In his inaugural address, Trump promised to "marshal the vast powers" of his Cabinet to rapidly bring down costs and prices, but it's unclear how. One way, he says, is by increasing drilling to reduce energy costs. A steep price rise in January, the biggest monthly increase for 16 months, has complicated Trump's task. He blamed Joe Biden, who left office on 20 January, and Democratic spending. "I had nothing to do with it," said Trump. At other times, however, he has admitted it's hard for US presidents to control prices. But economists warn some of his policies could fuel inflation and polling suggests voters would like to see him doing more about an issue that often tops their priorities.

  "On day one, I will launch the largest deportation program in American history to get the criminals out." Nov 2024 Immigration has perhaps been Trump's main focus since taking power, with more than a dozen executive orders aimed at overhauling the system. His plan to deport foreign nationals in the country illegally, starting with those convicted of crimes, seems to have widespread public support. But it is uncertain whether he will meet his promise to deport so many. A few raids have made headlines but the number of people being removed does not seem to be record-breaking, according to the daily figures. In his first month in office, the US deported 37,660 people - less than the monthly average of 57,000 removals and returns in the last full year of Joe Biden's administration, data obtained by Reuters shows. A DHS spokesperson told the agency that Biden-era deportation numbers were higher because illegal immigration was higher. Nationwide border encounters decreased 66% in January compared to 2024, according to the White House.

  "I'll be looking at J6 early on, maybe the first nine minutes." Dec 2024 True to his word, hours after taking the presidential oath, Trump issued pardons and commutations that paved the way for the release of more than 1,500 people convicted or charged in connection with the US Capitol riot. A police officer who was punched that day told the BBC the pardons were a "slap in the face".

  "They're dying, Russians and Ukrainians. I want them to stop dying. And I'll have that done - I'll have that done in 24 hours." May 2023 Trump has initiated the first talks between the US and Russia since the start of the war, but Ukraine has vowed to reject any deal hatched without it, and there's been an angry exchange between leaders. President Volodymyr Zelensky fears the US president delivering on his campaign promise to end the war but on Moscow's terms and with no security guarantees. There is also anxiety in European capitals that they are being sidelined, and that Trump may dismantle some of the sanctions imposed on Russia as punishment for the invasion.

  Trump told NBC in December he "absolutely" planned to end birthright citizenship on day one: "If somebody sets a foot of just a foot... on our land, congratulations. You are now a citizen of the United States of America. Yes, we're going to end that." In one of the first acts of his second presidency, Trump ordered an end to an automatic right to American citizenship currently received by nearly anybody born on US soil. Birthright citizenship is not the norm around the world, although it is in Mexico and Canada, and Trump's move targets those who are in the US illegally or on temporary visas. The right was established by an amendment to the US Constitution nearly 160 years ago, and most legal scholars say the president doesn't have the power to unilaterally change it. The issue could be heading for the US Supreme Court after an appeals court ruled against Trump, upholding a legal block on his plan.

  "On January 20th, as one of my many first Executive Orders, I will sign all necessary documents to charge Mexico and Canada a 25% Tariff on ALL products coming into the United States, and its ridiculous Open Borders." Nov 2024 Trump announced on 21 January that he would levy blanket tariffs on his neighbours on 1 February, linking them to the flow of drugs and migrants into the US. The president has long seen tariffs, which are a tax on imports, as a way to protect domestic industry and increase revenue. Canada and Mexico said they would enact retaliatory taxes on US imports. But Trump delayed starting the tariffs for one month, after promises by both countries to increase border enforcement. There had also been volatility in the markets and warnings from economic experts that these actions could cause prices to rise.
