content: |-
  An emergency law handing control of British Steel to the government dominates Sunday's front pages.

  'Ring of steel' and 'King will not slow down'

  The government's intervention to take control of British Steel's Scunthorpe plant featured on several front pages on Sunday

  The Mail on Sunday, external says Downing Street has wrestled control of British Steel from the Chinese, after a law was rushed through Parliament on Saturday to allow it to take control of the company. The Sunday Mirror, external says the emergency legislation has thrown a "ring of steel" around the Scunthorpe plant. Elsewhere, the Sunday Times says, external ministers are considering deploying the Royal Navy to escort a fuel shipment to the plant. A senior source tells the paper the government wants to ensure the cargo is not intercepted or redirected. But the Ministry of Defence told the paper no decision has been made and it later issued a statement saying it was not involved in escorting the shipment. The Sunday Telegraph argues, external that the attack by Hashem Abedi on three prison officers will raise important questions about security in Britain's prisons. A former prison governor and adviser on extremism in jails tells the paper the assault by one of the brothers involved in the Manchester Arena attack in 2017 is a catastrophe and a "resignation issue". A prison service spokesman said violence in jails would not be tolerated.

  In the Observer, Rachel Reeves calls, external for a strong international response to Donald Trump's economic policy. In a column, the chancellor writes that she is determined to ease the impact on British families. The Mail on Sunday says, external it has seen a "bombshell" email which it calls a significant boost to convicted child serial killer Lucy Letby's fight to overturn her convictions. The former nurse is serving 15 whole-life sentences for killing seven babies and attempting to kill seven others at the Countess of Chester Hospital. According to the Sunday Telegraph,, external single-sex spaces would be protected under an overhaul of equality laws being considered by the government. Britain's human rights watchdog is said to have submitted a new code of practice for the government to assess and calls the current guidance, last updated in 2010, "out of date". "Dream on" is the Sunday Express's headline, external - said to be Queen Camilla's very definitive answer when asked, during their state visit to Italy, if King Charles III might slow down following his brief hospital admission in March. She said the King, who is undergoing cancer treatment, was driven by "helping others" and would not be reducing his workload.

