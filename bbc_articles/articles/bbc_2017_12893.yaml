title: The Royal Family attend church in Sandringham - BBC News
date: '2017-12-25'
section: General
url: http://www.bbc.co.uk/news/uk-42478299
content: |-
  Prince Harry and fiancee Meghan Markle, join the Queen at church in Sandringham.

  The Queen and members of the Royal Family have been to church on the Sandringham estate for the traditional Christmas carol service.

  Prince Harry's fiancee, Meghan Markle, also attended, which is not usual as protocol stipulates that only partners who are married into the family are invited along.
