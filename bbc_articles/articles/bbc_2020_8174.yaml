  Hundreds of job cuts are announced and all state schools will resume full lessons in September.

  450 jobs to go at Celtic Manor and ICC

  Almost half of the workforce at Celtic Manor Resort and International Convention Centre Wales in Newport are to be made redundant. Parent group the Celtic Collection said the “devastating impact of the Covid-19 pandemic” meant it would lose 450 jobs from its permanent workforce of 995. Celtic Manor Resort, which hosted the 2010 Ryder Cup golf tournament and a 2014 Nato summit, reopens next Tuesday, 14 July for the first time since March 23. The company said it would have "reduced capacities and restricted facilities in line with safety guidelines to mitigate the risk of Coronavirus”. It said the number of job losses was “based on the current restrictions surrounding hospitality and tourism, and the total may reduce significantly should more of our facilities be permitted to reopen during the consultation period”. Staff whose positions are at risk of redundancy have been sent letters advising them of the process.
