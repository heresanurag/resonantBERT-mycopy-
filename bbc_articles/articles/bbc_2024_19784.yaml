  Norris had looked the favourite for pole ever since making a strong impression in Friday practice and he delivered in style. The McLaren has not been upgraded since the Miami developments that turned it in a front-runner overnight after starting the season behind Red Bull and Ferrari. This upgrade introduced for the start of the second part of the season is not as big as the Miami one but Piastri said it was “doing what we expected” and it enabled Norris to dominate on a track that so far Verstappen has effectively owned. Norris came into the weekend admitting he had not been driving at the level of a world champion so far this season and had been making too many mistakes. And he will be determined to notch up a second win to back up his claim that he still has a chance of closing the 78-point lead Verstappen has in the championship.

  Mercedes had looked quick on Friday but their car was not quite on the pace when it mattered in qualifying and Russell ended up 0.571secs off pole. Even so, Hamilton should have joined his team-mate in the top 10 shootout and was on course to do on his final lap before a snap at the rear on the exit of Turn 13 cost him time all the way to the line and he failed to progress through by 0.103secs. Ferrari’s Carlos Sainz, his weekend compromised by a gearbox failure that restricted him to just seven laps in the only dry practice session, joined him outside the top 10 after fighting the rear end of his car throughout qualifying. “I made a mistake in the last corner and lost about 0.1secs and that put me out of Q3 but even then I wasn’t fast enough just in general. "I struggled in the middle sector with the car being very oversteery and that’s where I lost most of my time, but also in the last sector. “Now all I can do is try to do my best but I don’t expect it to be a great race.”
