  Mr Slack's experience of a near-miss is not an isolated incident. Just 24 hours before the deadly collision, a military helicopter came too close to a different regional jet, which then performed a sudden go-around, according to a list of incidents and accidents from the FAA. After several national incidents in 2023, the Federal Aviation Administration (FAA) ordered a safety review warning that "one close call is one too many". "Inadequate, inconsistent funding", as well as staffing shortages, had led to an "erosion" of safety standards that made "the current level of safety unsustainable", it found. Chronic air traffic control staffing shortages impact the FAA's ability to maintain safety standards, the 2023 safety review found. Last year, the agency barely exceeded its hiring target of 1,800 controllers - by 11. But the 2023 review found those very targets were insufficient to "adequately satisfy system needs". Prof Hansman said staffing issues have been a "perpetual" concern, as waves of employees have retired. Mr Bazman, the retired air traffic controller, said Covid made a lot of staffing issues worse. "It's a domino effect, it really is," he said. Training for the highly specialised job of safely guiding aircraft, often full of people, into the air and onto the ground can take as long as three years. When staff is short, available workers are put into the most critical positions and some roles go unfilled. Prof Hansman cautioned against blaming the controller shortage for the recent collision, saying: "There is no indication that there was a controller incompetency issue."

  With the budget for the FAA determined by Congress - and the leader of the FAA appointed by the president and confirmed by the Senate - the organisation can sometimes fall prey to the ups and downs of Capitol Hill, the safety review found. The chronic controller shortage was made worse when a 35-day US government shutdown that started in 2018 put a pause on hiring. Last year, US lawmakers tried to add landing spots there through the FAA's budget reauthorisation just two weeks after a near-miss at the airport - a move Virginia Senator Tim Kaine opposed. "We should not be jamming more flights onto the busiest runway in the United States," Kaine told fellow lawmakers.

  Then, there is the steady rotation of people at the top, in the role of FAA administrator. In three years, the agency has had just as many administrators. When the American Airlines jet and helicopter collided on Wednesday, there was, in fact, no FAA administrator. The Biden-appointee Michael Whitaker had resigned in December, just one year into his five-year term. Media reported the early departure was spurred by an adviser to President Donald Trump, Elon Musk, who had called for Whitaker's resignation after the FAA proposed fining his rocket company SpaceX $600,000 for alleged launch violations. While Trump has named an acting administrator in the wake of the crash, the permanent administrator will need to go through a congressional approval process. Prof Hansman said the rotating door of administrators makes it harder to make substantive changes or improvements. "It keeps keeping on, it keeps operating the way it has," he said. But after Wednesday's crash, change should be expected, Todd Inman, of the National Transportation Safety Board (NTSB), told media Friday evening. "Our job is to find the facts. More importantly, our job is to make sure this tragedy doesn't happen again - regardless of what anyone may be saying," he said. "We will be advocating for years for changes that need to be made."
