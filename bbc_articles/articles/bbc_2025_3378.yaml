title: 'Abu Wadee: Palestinian migrant who made antisemitic posts charged - BBC News'
date: '2025-03-11'
section: Middle East
url: http://www.bbc.co.uk/news/articles/cn0j9lpx994o
content: |-
  Mosab Abdulkarim Al-Gassas, aka Abu Wadee, is charged with knowingly arriving in the UK without leave.

  The BBC understands that, upon arrival in the UK, he was taken to the Manston asylum seeker processing centre

  A Palestinian man who made antisemitic remarks has been charged with knowingly arriving in the UK without leave, the Home Office says. Mosab Abdulkarim Al-Gassas - also known as Abu Wadee - is believed to have arrived by small boat and been brought ashore in Kent on Thursday but was not arrested until Sunday evening, a day after newspapers first reported his arrival. A Home Office spokesperson said he had been remanded in custody. Abu Wadee will appear at Manchester Magistrates' Court on Tuesday.

  The Campaign Against Antisemitism said it had uncovered video in which he prayed for all Jews to be killed, and pictures he had posted of himself holding an assault rifle. It said the Home Office must take immediate action to "ensure that he cannot pose a threat to public security". Shadow home secretary Chris Philp had written to the government earlier, calling for him to be "deported immediately". Philp said: "I am glad the authorities have tracked him down, but he should never have been able to get here in the first place." A Home Office spokesperson said earlier: "The government is committed to ending small boat crossings which undermine our border security, and restoring order to the asylum system to ensure that the rules are respected and enforced. "The British public can be reassured that we take all steps necessary at all times to protect the nation's security, including taking action in the Border Security Bill to give the police and immigration officers stronger powers to act where anyone poses a threat."
