  Today's Prime Minister's Questions comes as prices reach record highs and more rail strikes planned.

  Bill is an 'attack on women' - Labour

  Reeves says the Bill of Rights is not just an attack on victims of crime, it's an attack on women. Woman have used the Human Rights Act to challenge the police when they have failed or refused to investigate abuse or rape cases, she says. She says the government has "effectively decriminalised rape". It has made pitiful progress on record low rape convictions under this government, with waits for cases to complete in court reaching three or four years, and the number of rape trials postponed in crown courts rising four-fold, she says. This bill of rights will stop them for forcing our under-resourced police to investigate, she adds. The government is soft on rape, soft on rapists and hard on survivors, she says - "they want to take away the final backstop available for victims to get justice". Video caption: Labour's Ellie Reeves: This is not a Bill of Rights, it's a con Labour's Ellie Reeves: This is not a Bill of Rights, it's a con
