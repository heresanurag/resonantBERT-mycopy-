  Tim started taking his pictures in January last year, after a pothole in his area wasn't repaired properly. "I had a word with a council official, and he recommended that I look at the manifesto of the Monster Raving Loony Party from 2017. In there, it says residents should highlight potholes with plastic ducks – seriously, this is true. And I thought, OK, I'll put plastic ducks in potholes." After taking the pictures (for safety reasons, he works at quiet times and takes a friend to help) he sent them to the council, and posted them on a local Facebook group. Encouraged by the feedback, he progressed from plastic ducks to other visual jokes. "I put a toad in a pothole – not a real toad – and wrote: 'This is my favourite Sunday dish.' And people either get it or they don't." Tim does not know how many potholes he has photographed – he guesses 100 to 150 – but now the pothole art is the "interesting bit" of his campaign. The dull bit, he admits, is his spreadsheet of every road defect in the borough, which allows him to chase up repairs. "There are about 2,500 entries on there," he says. Grover encouraged Tim to join the Dull Men's Club after seeing the pothole pictures online. Tim did so, and was happy to accept the Anorak of the Year award in the good-natured spirit in which it was offered. But for Tim, there is a serious side to his hobby, even if it could seem... well, less glamorous than others. "I don't do it for money or fame," he says. "I do it because I want to make a difference to my community." It's an outlook shared by the Dull Men's Club Anorak of the Year from 2021 – who, it turns out, is neither dull, nor a man.

  Rachel Williamson with some of her supplies

  In 2020, during the first Covid lockdown, Rachel Williamson was looking at a socially-distanced queue outside a chemist in her hometown of Rhyl in Denbighshire. "My twin sister joined the queue. They're all looking miserable, and I'm in the car waiting for her. And I just wondered – could I put a sparkly hat on the post box to make this queue smile?" Although Rachel – a 61-year-old retired police detective – had knitted since she was a girl, she couldn't crochet. With little else to do in lockdown, she tried, and within two days had a sparkly hat for the post box outside the chemist. Another one, for the box outside the Post Office, soon followed. "My sister went in the Post Office and she said: 'Nobody's talking about Covid any more, they're talking about the post box topper outside the door.'" She has since topped more than 300 post boxes, and made countless other decorations for the community. She does requests from elsewhere in the UK – "I've sent one to Scotland, one to Nantwich [in Cheshire]" – and local people chip in with supplies. "My living room is full of wool," she says. "I don't know where the Christmas tree is going to go." During lockdown, Rachel's toppers featured in a charity book and calendar, which brought her to the attention of the Dull Men's Club. So how does it feel for a woman to be invited to such a club? "I'd never heard of it, but I felt very privileged," she says. Yet despite being an Anorak of the Year, is Rachel's hobby even dull? Is it not colourful, life-enhancing, even - dare we say - quite interesting? "I've got three grown-up sons, and when they come round, all I talk about is my knitting," she says. "I am the dullest person on the planet to them. I've gone from a fast-moving detective to fluff and stuff."

  Rachel posts her creations - including this festive effort - on the Dull Men's Club Facebook group

  Like Tim, Rachel has found purpose in her (arguably) dull hobby. "After 18 years in the police, it has restored my faith in people. The people of Rhyl have been absolutely great. And we've made lots of people smile." She picked up her Anorak of the Year award in a ceremony in a pub near Llangollen. "The people who haven't got hobbies are the dull people." says Rachel. It's a realisation that also came to Grover Click – the original Dull Man – while compiling the club's calendar, decades after that first conversation in the New York bar. "We started writing about these people and thought it was kind of funny," he says. "But then you see these guys are onto something. They've got their act together." To sum it up, Grover points to his foreword to the 2024 Dull Men's Club calendar. "What they [the dull men] are doing is referred to in Japan as ikigai," he writes. "It gives a sense of purpose, a motivating force. A reason to jump out of bed in the morning."
