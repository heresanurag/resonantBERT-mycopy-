title: 'Your pictures of Scotland: 6 - 13 August - BBC News'
date: '2021-08-13'
section: Scotland
url: https://www.bbc.co.uk/news/uk-scotland-58116627
content: |-
  A selection of your pictures of Scotland sent in between 6 and 13 August.

  Send your photos to scotlandpictures@bbc.co.uk. Please ensure you adhere to the BBC's rules regarding photographs that can be found here.

  Please also ensure you follow current coronavirus guidelines and take your pictures safely and responsibly.

  Conditions of use: If you submit an image, you do so in accordance with the BBC's terms and conditions.

  The Milky Way seen through a croft gate on the Isle of Benbecula. Photographed by Seonaidh MacInnes, 16, and sent in by his dad Neil.

  Alan Urquhart sent in this image. He said: "My daughter Isabella enjoying the waves at Machir Bay in Islay."

  Glyn Booton's view from his living room in Roberton. Glyn said: "Fantastic colours and lasted for a good 10 minutes."

  "Looking up at Edinburgh through a mobile phone," said George Current of his image.

  Tracy Smith, from Newton Mearns, said her picture at Inveraray contrasts the older style of boat in the foreground and a more modern luxury boat in the background.

  Andrew Patrick said of his photograph: "I took this sunset over Loch Fyne from Ardrishaig, with a peach-toned moon, having just moved to the area."

  "A splash of colour on the way to Moulin, north of Pitlochry," said David Hay of his image.

  Sunrise from Craighouse on the Isle of Jura by Gus Bowman, from Burntisland.

  Monique Alexander took this picture of a happy looking frog at Muir of Dinnet nature reserve.

  Adam Bienkowski took this image of a funnel cloud from his dining room window in Glasgow. He said it got quite large but did not appear to connect with the ground.

  Kevin Monk said of his photo: "St Kilda, edge of the world. Third attempt trying to reach it. Well worth the wait."

  An atmospheric sky taken by David Currie from Millennium View, Kelso.

  Jennifer Lemon took her image in Glasgow during the weekend's thunderstorms.

  Ian Burns' picture of a salmon leaping at the Falls of Shin in the Highlands.

  Amanda McIntosh captured this shot of lightning at Gairloch harbour.

  Noctilucent clouds over St Abb's Head in an image sent in by Euan and Helen Gibson.

  John Slater described his image as a storm in a birdbath. He said: "The birdbath is on the balcony of my mother’s flat in Edinburgh. The thunderstorm brought heavy drops of rain to derange the water."

  A robin enjoying the sunshine near Inverurie in Colin Gerrie's photo.

  Valentina Kretzschmar, who sent in this picture, said: "We were awed by the idyllic scenery of the Sound of Mull during our late evening walk."

  Mark Reynolds' snap of a rainy day on the beautiful Isle of Lismore.

  Russell Hart, from Glasgow, took this photograph of a sunset at Corrour.

  Anthony O'Loughlin said of his image: "A pensive puffin at Brough of Birsay, Orkney, just before they left for the year."

  "Always a delight to see otters in Edinburgh and last Sunday was no exception," said Tom Kelly, adding: "This wee otter is the latest addition to the Water of Leith’s growing otter family."

  Beverley Foster's view from her boat's wheelhouse across the bay at Lochgoilhead as heavy rain fell.

  Dot Reid said: "Fabulous sun and blue skies met us at the outdoor pool at Tarlair, Macduff. The reflection of the old pavilion and hills onto the very calm and now unused pool was magnificent."

  Hannah Borhan took this photo on a walk up the Eildon Hills in the Scottish Borders. She said: "Lovely heather flowers give the hills a purple tint."

  Lyndsey Fairnie, who sent in this image, said: "Ice to see you: My family and I have loved spotting ice houses on our travels around Scotland this summer. This one was captured in Dunbeath."

  David Ramsay took his photograph on Mull. He said: "An otter waking from a nap after hunting all morning."

  Kathleen Erin-Lawson said of her image: "This is our youngest daughter enjoying the wild flowers in front of the Belhaven Big Top at North Berwick’s Fringe by the Sea festival."

  Alison Whitten, from Newcastle, was on a family holiday in the Highlands when she took this image of Eilean Donan Castle. She said: "It was a real wow moment when we saw this."

  Mark Woodliff took his shot while watching Dumbarton FC. He said: "When the football result doesn’t go your way but the sunset doesn’t disappoint."

  Simon Gillespie, from Wormit, photographed this male hawker dragonfly at Morton Lochs nature reserve.

  Gerry Doherty captured this scene. He said: "Very strange sunset in Dumbarton - storm clouds, blue skies,red skies and a red rainbow plus raining."

  Swans having a “difference of opinion” at Pitfour Lake, Mintlaw, in this picture from Charlie Scott, from New Pitsligo.

  Dominic Colella, from Clynder. Argyll, captured this image of a rainbow and a thunderstorm.

  Stuart McKenzie, of Cardross, snapped this image of Whitehills from Banff Links Beach.

  Colin Denholm's image of the locomotive, the Aberdonian, heading into Stonehaven.

  Bruce Cairns took this shot. He said: "I've been visiting my dad in hospital in Inverness this week - thank you to NHS Scotland. I stopped for a couple of shots of dusk light and the crescent moon over the Moray Firth near Ardersier on my way back from the hospital to my hotel. It was very peaceful."

  Gordon Stewart, from Irvine, visited Fingal's Cave in Staffa. He said: "Who could fail to be impressed by the massive basalt columns?"

  Ross Miller, from Duns, went up into the Lammermuir Hills to take pictures of the stars and was surprised to capture the trail of a Perseid meteor.

