title: 2,500 young Italians compete for one job - BBC News
date: '2018-02-12'
section: General
url: http://www.bbc.co.uk/news/world-europe-43007377
content: |-
  For some, going the distance in their job search means taking a special bus up and down the country.

  Around a third of young Italians are out of work.

  For some, going the distance in their job search means taking a special bus up and down the country to reach interviews.

  They're all competing for the same job – and only one of them will succeed.
