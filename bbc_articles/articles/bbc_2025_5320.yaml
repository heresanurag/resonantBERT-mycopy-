content: |-
  The 21-year-old Stranger Things actress has reacted to headlines about her recent media appearances.

  Millie Bobby Brown says journalists are 'bullying' her

  The 21-year-old actor criticised journalists for writing articles about her recent red carpet appearances

  Stranger Things actor Millie Bobby Brown has criticised recent press articles about her appearance, saying "this isn't journalism, this is bullying". The 21-year-old posted a three-minute video on her Instagram page, in which she called out article headlines and the names of the reporters who wrote them. Brown has been on the promotion circuit in recent weeks for the press tour of her new movie The Electric State, whilst also making appearances at the SAG and Brit awards. "I grew up in front of the world and for some reason people can't seem to grow up with me," Brown said.

  Brown has made recently public appearances to promote her new film, The Electric State

  She added: "Instead, they act like I'm supposed to stay frozen in time, like I should still look the way I did on Stranger Things season one. And because I don't, I'm now a target." The articles highlighted by Brown criticise her hair, face, body and style, with some insinuating she looks much older than she is. "The fact that adult writers are spending their time dissecting my face, my body, my choices, is disturbing," Brown said. "That some of these articles are written by women makes it even worse," she added. Brown has grown up in the media spotlight since the age of nine, when she appeared in ABC drama Once Upon a Time in Wonderland and BBC America show Intruders. Her big break came in 2016, when she was cast as Eleven in the Netflix's sci-fi hit Stranger Things. It led to worldwide recognition for Brown, who was nominated for various accolades at the SAG and Emmy awards. In her social media video, Brown concluded: "I will not be shamed for how I look, how I dress or how I present myself. "Let's do better, not just for me but for every young girl who deserves to grow up without the fear of being torn apart for simply existing." Brown has been praised by fellow actors in response to the post, including Sex and the City's Sarah Jessica Parker, who wrote that she was "enormously proud". Brown's co-star in Enola Holmes, Louis Partridge, commented: "Well said Millie. Handled with grace." Fellow former child actor and The Handmaid's Tale star Mckenna Grace added: "No young woman or person deserves to feel pressure or cruelty for simply existing. You are so well spoken and so beautiful. Very well said, thank you for making this video."
