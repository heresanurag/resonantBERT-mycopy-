title: Banksy posts clip of Idles raft stunt at Glastonbury Festival - BBC News
date: '2024-07-01'
section: Somerset
url: http://www.bbc.co.uk/news/articles/ced3we4kvgpo
content: |-
  The artist used an unsuspecting band at Glastonbury Festival to launch his latest performance.

  Banksy has appeared to confirm he was behind a stunt during a band's headline set at the Glastonbury Festival - involving an inflatable raft holding dummies of migrants in lifejackets. The boat was lifted above the heads of the thousands-strong audience during Idles’ show on the Other Stage, with revellers believing the crowdsurfing was part of the Friday night performance. The mysterious artist posted a clip of the stunt, external - thought to symbolise small boat crossings of migrants in the Channel - on his Instagram account, his usual way of announcing a new creation. But a spokesperson for the British punk band told the Guardian, external that they were not aware of the stunt until after the gig had finished. Idles’ set closed the Other stage on Friday night, after performances from Bombay Bicycle Club, Anne-Marie, and Headie One.

  As the raft bobbed its way across the many thousands at the Other stage, the band played the song Danny Nedelko, which features lyrics that strongly condemn right-wing immigration policies and call for togetherness and compassion. At a festival Q&A event on Saturday, the actor Simon Pegg called Idles' set "literally one of the greatest performances I've ever seen at Glastonbury". Banksy’s and Idles' management has been contacted by the BBC for comment.

  Wearing the Banksy-designed vest, Stormzy used his 2019 set to highlight inequality in the justice system, and the arts.

  Banksy is one of the world's most famous artists, but despite his global following, his identity remains, officially at least, unknown. And Friday night was not the first time the British street and "guerrilla" artist has made an impact on Worthy Farm. In 2019, Banksy designed the union flag emblazoned stab vest worn by rapper Stormzy during his Pyramid Stage show. And a mobile sculpture by Banksy titled Sirens of the Lambs was driven round the site in 2014, surprising crowds at “mealtimes”. It was designed to highlight the issue of animals being farmed for their meat.

  Migration is a key theme at this year’s Glastonbury Festival, with a new area in Williams Green being the focal point. To enter the "re-purposed airport" Terminal 1 “celebrating migration”, people have to answer a question from the UK government’s citizenship test correctly.
