  That means knowledge of "cats' psychology" as well as good "cat-whispering skills" are vital for the successful applicant.

  But if life on a Greek island isn't quite floating your boat, there are a few other dream jobs around at the moment.

  You could be a Nutella taster in Italy - previous experience not necessary - or a warden on a picturesque Welsh island (as long as you can speak Welsh).

  But beware: sometimes things may not turn out quite they way you thought they would.

  Ben Southall beat thousands to the "best job on the planet" - becoming caretaker of Australia's Hamilton Island, back in 2009.

  "It was the best job in the world but also the busiest job in the world," he complained to The Independent last year. "I remember there was a winner's party on Hamilton Island, but I didn't manage to get to it because I was doing back-to-back interviews."
