title: Northern Ireland weather weather warning issued for Sunday - BBC News
date: '2025-02-23'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cn9vd083j5qo
content: |-
  After Friday’s wet and windy weather, more strong winds are coming to island of Ireland on Sunday.

  This stormy picture was taken at Magilligan Point, County Londonderry

  More unsettled weather is headed for Northern Ireland over the weekend, with a wind warning in force on Sunday. After Friday's wet and windy weather, another area of low pressure has brought a further spell of strong winds to the island of Ireland. The yellow alert for strong winds, which may lead to some disruption, covers all of Northern Ireland and came into effect at 03:00 GMT on Sunday. The warning was in place until 15:00.

  Large waves may come onshore and rain will accompany the strong winds, which will make for very poor weather conditions, especially on roads. Delays and disruption to transport can be expected again, with possible damage to trees and some infrastructure. Short-term loss of power and other services is possible, the Met Office said.

  There was some localised flooding in Ballymena on Friday

  Southerly winds are expected to increase through Sunday morning, peaking late morning to early afternoon with gusts of 50-60mph (80-95 kmh), and perhaps as much as 70mph (112kmh) on the exposed Irish Sea coastline and some other areas of high ground.

  For comparison southerly winds gusted to over 60mph (95 kmh) on Friday. Winds are expected to ease slowly through Sunday afternoon.

  Last month's Storm Éowyn brought down trees across Northern Ireland

  In the Republic of Ireland Met Éireann has issued wind and rain yellow alerts for counties Carlow, Kilkenny, Wexford, Wicklow, Munster, Donegal, Galway, Leitrim, Mayo and Sligo from 02:00 local time (02:00 GMT) on Sunday to 15:00. A separate wind warning for Donegal, Galway, Leitrim, Mayo and Sligo is in place from 15:00 on Sunday to midnight.

