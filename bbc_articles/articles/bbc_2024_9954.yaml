title: Trump's lawyers spar with Stormy Daniels in hush-money trial - BBC News
date: '2024-05-10'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68987627
content: |-
  The BBC's Nada Tawfik goes through the cross-examination that the former adult-film star faced in court.

  Donald Trump's hush money trial continued in New York with the cross-examination of Stormy Daniels by the defence.

  Mr Trump has pleaded not guilty to criminal charges of falsifying business records in relation to a hush-money payment made to Ms Daniels. He also denies having sex with her.

  The BBC's Nada Tawfik goes through the cross-examination of a defiant Stormy Daniels on the stand.
