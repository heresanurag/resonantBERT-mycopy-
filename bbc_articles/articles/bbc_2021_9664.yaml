title: 'Plymouth shooting: Forensic investigators at the scene - BBC News'
date: '2021-08-13'
section: General
url: http://www.bbc.co.uk/news/uk-58200017
content: |-
  Police cordoned off the area and said that the situation has been contained.

  Forensic teams are gathering evidence after six people died following a shooting in Plymouth on Thursday.

  Devon and Cornwall Police tweeted; "there have been a number of fatalities at the scene and several other casualties are receiving treatment. A critical incident has been declared. The area has been cordoned off and police believe the situation is contained."
