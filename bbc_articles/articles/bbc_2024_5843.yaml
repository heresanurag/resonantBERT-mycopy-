  BBC Verify analyses the collision between the container ship and the Key Bridge in Baltimore

  BBC Verify has analysed the moment of the collision between the Dali container ship and the Francis Scott Key Bridge in Baltimore.

  The path of the ship can be followed using data from the ship tracking website MarineTraffic. A closer look at the footage shows that the ship’s lights went out in the minutes before it collided with the bridge.
