  Who has made Troy's Premier League team of the week?

  After every round of Premier League matches this season, BBC football pundit Troy Deeney will give you his team and manager of the Week. Here are this week's choices. Do you agree? Give us your thoughts using the comments form at the bottom of this page.

  Emi Martinez (Aston Villa): Solid, comfortable, he just does everything well, doesn't he? Another really good performance between the posts for an in-form Aston Villa side.

  Ezri Konsa (Aston Villa): He has grown from strength to strength and become one of the best centre-backs in English football. This is really hard to say because I am a Birmingham fan and he is a Villa player, but he has been exceptional. Murillo (Nottingham Forest): He was a monster for Nottingham Forest, an absolute powerhouse. He loves defending and you have seen that with his last-second clearance off the line. He doesn't over-egg things, just defends. Neco Williams (Nottingham Forest): He has been excellent all season for Forest and never gets spoken about. He moved across from left-back to right-back against Manchester United, dealt with it and just delivered again. Curtis Jones (Liverpool): That was a midfielder playing at right-back against Everton in the Merseyside derby and he handled it exceptionally well. Showed a very mature performance.

  Ryan Yates (Nottingham Forest): He was the best player on the pitch for Forest. Did all the nasty, horrible things well. Understood the game, a captain marvel. Sandro Tonali (Newcastle): What a year this guy has had. From being banned, to coming back and being so solid. He does all the right things and what a goal that was against Brentford. Enzo Fernandez (Chelsea): I have not been a big lover of Enzo, he has floated in and out of games. But he is starting to grow on me more and more. That Chelsea midfield is starting to click and he will have a decent end to the season.

  Jack Grealish (Manchester City): It's been well publicised that he is probably going to leave City this summer, but he has handled himself so well. He came on against Bournemouth in the FA Cup and did really well - and then did well against Leicester, scoring the opening goal. Liam Delap (Ipswich): Scored a massive goal in a monumental game for Ipswich. I was desperate to put Marcus Rashford in for the first time but he only played 65 minutes so that will have to wait. Anthony Elanga (Nottingham Forest): Wow, what a performance. Not only the goal but everything he did ran Manchester United ragged. How do you get rid of that player and keep Antony if you are Man Utd? That is the question a lot of people will be asking.

  Kieran McKenna (Ipswich): It was a must-win game at Bournemouth, especially after Wolves beat West Ham the night before. Away to a very difficult side, if Ipswich had lost, relegation would have been done and dusted. But that 2-1 win kept them alive. It was a massive result.

