content: |-
  Mike Bushell gets sprinting tips from Britain's fastest sprinter - Zharnel Hughes.

  Would you line up against Britain's fastest man?

  BBC presenter Mike Bushell didn't make it out of the blocks when he took on sprinter Zharnel Hughes - who is preparing for the Olympics in Paris this summer.

  In 2019, the sports presenter clocked a time of 9.27 seconds, racing over 60m as part of an experiment against elite competitors at the Indoor Grand Prix in Birmingham - 2.59 seconds behind the race winner.
