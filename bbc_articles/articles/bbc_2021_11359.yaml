content: |-
  A selection of your pictures of Scotland sent in between 3 and 10 September.

  Send your photos to scotlandpictures@bbc.co.uk. Please ensure you adhere to the BBC's rules regarding photographs that can be found here.

  Please also ensure you follow current coronavirus guidelines and take your pictures safely and responsibly.

  Conditions of use: If you submit an image, you do so in accordance with the BBC's terms and conditions.

  Nut today: Raymond McMillan caught this scene in the woodland adjacent to his garden in Tomatin. He said: 'The squirrel was a bit possessive so the chaffinch stayed for only a few seconds.'

  Hillbilly: Nick Hocking said he took this picture while scrambling along the Anonach Eagach ridge in Glencoe on a fantastic day.

  Pier into the darkness: William Brown enjoyed the night time at Oban Harbour.

  Busy bee: Jim Boyd took this pic in his garden in Arrochar.

  Thanks a bunch to Kirsty Cleland who sent in this colourful picture of flowers in Skipness looking across to the Isle of Arran.

  Bridge the light fantastic: Neil McRobie said it was a cloudy but warm morning at South Queensferry.

  Animated: Angus Moyse took this picture of his friend Annie Mac queuing at the Dens Road market in Dundee.

  Jeana Anderson caught the last of the light in Dunfermline, Fife.

  Post uplift: Liz Meyer caught this post van being loaded onto the Graemsay Ferry at Stromness while on holiday in Orkney.

  This picture gives me butterflies: Helen Sadie said this Common Blue Butterfly was basking on the banks of the Clyde in Helensburgh.

  Stag party: Emma Flack's view from her window of Loch Kishorn.

  I cirrusly love this picture: Mike More said he saw this amazing cloud inversion heading over the Forcan Ridge at sunrise.

  Wheelie nice scene: Colin Martin enjoyed his cycle ride to Benglass on the Isle of Skye.

  John McGuinness said this swan was carefully picking his way through the green algae at Lochore Meadows Country Park in Fife.

  Rock n' roll: Anne Cameron was looking at the Bass Rock, from the East Lothian coast just outside North Berwick.

  Looking from Ornsey on Skye directly toward Loch Hourn in Knoydart.

  No train no gain: John Ireland loved seeing this Jacobite steam train passing through Corpach in Fort William.

  Catch of the day: Robin Blythe found this TomPot Blenny when diving Trail Island at Wee Cumbrae on the Clyde.

  Flower power: Mirren Sneddon photographed her son wandering through the field of hope sunflower maze at Ardross farm near Elie.

  Forest reclaims house: Simon Dunsmore took this picture of Dunmore House near Falkirk saying he thought it was spooky.

  No strings attached: Carole Graham enjoyed seeing this giant puppet of Storm, goddess of the sea, at Anstruther Harbour Festival.

  Other worldly: Katy Anderson said she thought this jellyfish on Ayr beach looked like a UFO.

  Eagle-eyed: Elizabeth Scott took this photo of a white-tailed eagle perched on a rocky island while on a boat trip from Port Ellen, Islay.

  Horsing around: Nicola Sutherland said her daughter Murren enjoyed getting a kiss from one of the horses at the Riding School for the disabled in West Lothian.

  Thistle cheer you up: Ian Marshall said this unusual artichoke flower in his St Andrews garden took him completely by surprise.

  Go with the flow-er: Ann McMillan took this shot looking up to Edinburgh Castle after browsing the markets in the Grassmarket.

  Jib Cameron spent the most incredible day on the banks of Loch Vaa.

  Balancing act: Mark Ewing managed to catch a wonder of nature as this crane fly (daddy long legs) emerged at Comrie golf course.

  Winging it: Clare Smart caught this rare shot of an owl while in Skye for her son's wedding.

  Sun down: Craig Bradshaw enjoyed the sunset at Ailsa Craig in the south west of Scotland.

  Are you robin my name? A robin in John Brown's shot of Dunrobin Castle.

  Aerial view: Eric Brawley wondered if this was a fantastic or sad picture of a derelict Haghill Primary school in Glasgow.

  Red sky at night: Mary Meldrum could not believe how beautiful Oban harbour looked in the evening light.

  Moove over: The Highland Cow got in the way of Britta Schmitz's shot of Iona Abbey.

  Wave goodbye: Arthur Campbell was looking at the Isles of Eigg and Rum from a sunset cruise boat

  Peak a boo: William Brown caught the early morning in Bonawe near Oban.

  Whale hello there: Bill Wright said he was approached by this very curious Minke whale while on a boat trip off the Isle of Mull.

  Red Sea: John Young captured this view looking from Glenbarr as the sun went down over Islay from the shoreline.

  Please ensure that the photograph you send is your own and if you are submitting photographs of children, we must have written permission from a parent or guardian of every child featured (a grandparent, auntie or friend will not suffice).

