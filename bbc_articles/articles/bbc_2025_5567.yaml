title: Michael Sheen buys £1m worth of people's debts - BBC News
date: '2025-03-06'
section: Wales
url: http://www.bbc.co.uk/news/articles/cvg1ewdgk7no
content: |-
  The Hollywood actor has helped 900 people in south Wales with their debts for a new documentary.

  Michael Sheen writes off £1m of debt for 900 people

  As part of a new Channel 4 documentary, Michael Sheen has used £100,000 of his own money to write off £1m of people from South Wales' debts

  Hollywood actor Michael Sheen has written off £1m-worth of people's debts, using £100,000 of his own money. Sheen started a debt acquisition company to help 900 people in south Wales. It has been documented in a new Channel 4 show called Michael Sheen's Secret Million Pound Giveaway, external, due to air next week - five months after the closure of Port Talbot's last blast furnace, which marked the end of traditional steelmaking in south Wales. The show aims to reveal how some banks and finance companies profit from society's most vulnerable.

  Sheen said he did not have £100,000 to "throw around" and therefore wanted the project to be "effective". Despite initial doubts, an encounter with a woman in a Port Talbot cafe who shared the story of "steelworkers in tears" losing their jobs, convinced him to keep going.

  It comes two months after Sheen announced he was funding a new theatre company to fill the gap left by the folding of National Theatre Wales. In 2021, Sheen declared himself a "not-for-profit" actor, pledging to use all the money he earns for good causes. The 56-year-old, who has starred in films such as Frost/Nixon and The Damned United, also sold his houses to make sure the 2019 Homeless World Cup went ahead in Cardiff. Appearing on the One Show on Tuesday, the actor explained how exactly the system of debts work. It sees people's debts get put into a bundle, with a debt-buying company then able to buy those bundles at a lower price. Despite the money being owed by people remaining the same, the companies that own the debt can then sell them for less and less money. Sheen said he was able to set up a debt acquisition company with £100,000 of his own money to buy £1m worth of debt because it had come down in value. Although the system was "bizarre" and he initially had "no idea" how it worked, Sheen said "it seemed like a good thing to do". The company was not set up in Sheen's name and he had to be at "arm's length from it". He did not know the identity of people's debts he paid off, he only knew where they lived and the kind of debt it was. Sheen added: "I would never know who they are - I still don't know who they are."

  Sheen, from Port Talbot has performed in theatre venues across the world - including the Sydney Opera House

  During the making of the documentary, the process became far more complicated than he anticipated. "I thought I would only work on this for a few weeks or a month or something, and it turned into two years, because we had to do it secretly," he said. Sheen added that setting up the company took so long that at a one point he felt like he wasn't going to be able to keep doing it. His mindset changed after filming in a cafe in his hometown of Port Talbot as the local steelworks prepared to close. "The woman who worked at the cafe we were filming in told me the story of the men sitting on every table in tears, who were losing their jobs," he said. "And I just thought - then, it really hits home, I just thought anything I can do [to help]". The hour-long documentary will air on Channel 4 on Monday 10 March - five months after the last remaining blast furnace was closed in Port Talbot - which brought an end to the traditional method of steelmaking in south Wales. As a result, Tata Steel announced that 2,800 jobs were going to be cut which created uncertainty and stress for many families. Currently, Sheen confirmed that he has helped 900 people with their debts across south Wales. He added that due to the "stigma" around discussing money, some people might not even realise their debts have been paid off, and therefore he urged people to check their accounts.
