  Meanwhile, Luke Bodset from the AA said the problem was a "long-running gripe" with motorists known in the industry as the "pump-price postcode lottery". "The focus has been primarily on supermarkets: why, when eggs, bread, etc are the same price wherever you go, is road fuel not treated similarly?" he said. "The 'reasons' given by the retailers are [that] pump prices are set locally – forecourts within an area will compare their prices with those of nearby rivals and set them accordingly. "And so, unless one forecourt budges on price, the others don't see a need to move." He said that competitive fuel stations were hard to find unless you live locally to them, but hoped that would change with a new government scheme. Expected to come in early next year, the fuel finder project will require every forecourt to register its pump prices with a central database so people can compare prices. "It is expected that the transparency will not only direct drivers to the cheap fuel stations, without having to come across them by chance, but also spur competition," Mr Bodset said. "Those retailers who keep their prices high will see customers drawn away to the cheaper ones and be pressured to bring down theirs in turn."

