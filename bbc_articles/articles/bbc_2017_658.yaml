  Dick Van Dyke said he worked with an entire cast of "Brits" and not one told him to work on his Cockney accent

  Dick Van Dyke, best known for his role in Mary Poppins as Bert, a Cockney jack-of-all-trades, says he "never got" the Cockney accent.

  He told Radio 4's Today programme that despite being in a whole cast of "Brits", not one had ever told him the accent needed some work.
