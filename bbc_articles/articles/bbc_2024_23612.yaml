title: Met PC Ross Benson sacked for 'spanking' 12-year-old girl - BBC News
date: '2024-09-29'
section: London
url: http://www.bbc.co.uk/news/articles/cd6qgw97w92o
content: |-
  Ross Benson was also placed on the College of Police's barred list, after the misconduct hearing.

  Ross Benson was found to have committed gross misconduct

  A Metropolitan Police officer has been sacked after a misconduct panel found he assaulted a 12-year-old child by "spanking her bare bottom on numerous occasions". The hearing found Ross Benson had been accused of smacking the girl between April and August 2018, the Met said. The force added the child was known to him and that there was a sexual element to the spanking, which happened when he was off duty. Following the disciplinary hearing, Mr Benson was dismissed without notice and placed on the barred list held by the College of Policing.

  He had worked in the North West Basic Command Unit in London. The Met said Bedfordshire Police arrested Mr Benson on suspicion of sexual assault in November 2020, but in September 2021 he was informed no further action would be taken. Bedfordshire Police then contacted the Met’s Directorate of Professional Standards and a misconduct investigation was launched which concluded on Friday that Mr Benson had breached the standard of professional behaviour at the level of gross misconduct, the force said. Det Supt Will Lexton-Jones said: "My thoughts are first and foremost with the victim who displayed courage in reporting this. "PC Benson's abhorrent behaviour has led to his immediate dismissal, which is a decision I fully support. "I hope this outcome demonstrates how we are rooting out those who do not demonstrate the high standards we demand from our officers."
