title: 'Sinead O''Connor: Crowds gather to view funeral cortege - BBC News'
date: '2023-08-08'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-66436816
content: |-
  Emotional crowds of people gathered to see the funeral cortege for Sinead O'Connor, as it passed through the town of Bray, Ireland.

  The Irish singer died in July at the age of 56.
