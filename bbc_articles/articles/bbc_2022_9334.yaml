title: 'Euro 2022: Is women''s football coming home? - BBC News'
date: '2022-07-27'
section: General
url: http://www.bbc.co.uk/news/uk-62313312
content: |-
  People across the country have been celebrating as England beat Sweden 4-0 in the Euro 2022 semi-final.

  The England Women's Football Team is through to the final of Euro 2022 after beating Sweden 4-0.

  Across the country, crowds gathered to watch the Lionesses play their way to victory.

  Many fans have been describing how it has inspired a greater interest in girls and women taking part in the sport.
