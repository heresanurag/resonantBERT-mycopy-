  • None Manchester United have now been eliminated from European competition by Spanish opposition for the third consecutive campaign.
  • None Sevilla are now unbeaten in 20 games, just the fourth different side within Europe's top five leagues this season to enjoy such a run (also Bayern Munich, Paris St-Germain and Real Madrid).
  • None Including both their quarter-final victory over FC Copenhagen and their match with Sevilla, Manchester United had 46 shots, with 21 hitting the target - however, the Red Devils have managed just two goals from the penalty spot in those matches with a conversion rate of 4.4%.
  • None Manchester United have been awarded 22 penalties in all competitions this season, the most by a side in a single campaign within Europe's top five leagues since Barcelona in 2015-16 (24).
  • None Since his Manchester United debut on 1 February, only Robert Lewandowski (28) and Lionel Messi (27) have had a direct hand in more goals in all competitions than Bruno Fernandes (20 - 12 goals, eight assists) within Europe's top five leagues.
  • None Bruno Fernandes has scored 100% of the 14 penalties he has taken in all competitions this season, netting six for Sporting Lisbon.
