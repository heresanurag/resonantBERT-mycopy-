title: Video captures moment tornado rips off a roof - BBC News
date: '2023-07-21'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66273034
content: |-
  A resident filmed a twister in North Carolina tearing off a roof and tossing up debris in the air.

  Cell phone footage captured a strong tornado in North Carolina tearing off a roof and tossing up debris in the air. The tornado left sixteen people injured, two of them with life-threatening injuries, according to the National Weather Service.
