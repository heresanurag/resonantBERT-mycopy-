title: Georgian woman looking for birth parents found dad was a friend on Facebook
  - BBC News
date: '2024-12-01'
section: Europe
url: http://www.bbc.co.uk/news/articles/c36p9drnrdlo
content: |-
  Tamuna Museridze has reunited hundreds of families torn apart by a baby trafficking scandal – now she has found her own birth parents.

  Woman searching for birth parents found dad was a friend on Facebook

  Tamuna's search for her birth parents took eight years

  Tamuna Museridze took a deep breath and made the phone call she had dreamed of since finding out that she might be adopted. She was calling the woman she believed was her biological mother. She knew it might not lead to a fairy tale reunion - but she didn't expect the response to be cold and angry. “She started screaming, shouting - she said she hadn’t given birth to a child. She didn't want anything to do with me,” Tamuna recalls, explaining she felt more surprised than upset by the response. “I was ready for anything, but her reaction was beyond anything I could imagine.” Tamuna wasn’t prepared to walk away just yet. She wanted to know the circumstances of her adoption, and there was something else she wanted that only her mother could give her - the name of her father. Tamuna’s search had begun in 2016, after the woman who raised her died. Clearing out her house, Tamuna found a birth certificate with her own name on it but the wrong birth date, and she started to suspect she was adopted. After doing some research, she set up a Facebook group called Vedzeb, or I’m Searching, hoping to find her birth parents. Instead, she uncovered a baby trafficking scandal in Georgia that has affected tens of thousands of lives. Over many decades, parents were lied to and told their newborn babies had died – the infants were then sold. Tamuna is a journalist and her work has reunited hundreds of families, yet - until now - she couldn’t solve the mystery of her own origins and wondered if she too had been stolen as a child. “I was a journalist on this story, but it was a personal mission for me as well,” she says.

  Tamuna had already helped reunite other families through a Facebook group, including identical twins Ano (L) and Amy (R) and their birth mother Aza (C) - they were stolen, separated and sold at birth

  The breakthrough in her search had come in the summer, when she received a message through her Facebook group. It was from someone who lived in rural Georgia, who said they knew a woman who had concealed a pregnancy and given birth in Tbilisi in September 1984. That’s around the time Tamuna was born - a date she had shared publicly. The person believed the woman was Tamuna’s birth mother - and crucially they gave a name. Tamuna immediately searched for her online but when she couldn’t find anything, she decided to post an appeal on Facebook asking if anyone knew her. A woman soon responded, saying the woman who had concealed the pregnancy was her own aunt. She asked Tamuna to take the post down but she agreed to do a DNA test.

  While they were waiting for the results, Tamuna made the phone call to her mother. A week later, the DNA results arrived, indicating that Tamuna and the woman on Facebook were indeed cousins. Armed with this evidence, Tamuna managed to convince her mother to acknowledge the truth and reveal the name of her father. It was a man called Gurgen Khorava. “The first two months were shocking, I couldn’t believe these things were happening to me,” she recalls, “I couldn’t believe I had found them.” Once Tamuna had Gurgen’s name, she quickly tracked him down on Facebook. It turned out that he had been following her story on social media - her work reconnecting families is widely known across Georgia. Tamuna was amazed to find that he had “been in my friend list for three years”. He just hadn’t realised he was a part of her story. “He didn’t even know my birth mother had been pregnant,” says Tamuna. “It was a huge surprise for him." They soon arranged to meet in his hometown of Zugdidi in western Georgia – about 160 miles (260km) from where she lives in Tbilisi.

