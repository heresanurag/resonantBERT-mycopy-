  Looking back, Tamuna thinks she was in a state of shock, but as she walked up to Gurgen’s garden gate, she felt surprisingly calm. When the 72-year-old appeared, they hugged, then stopped to take a moment to look at each other, smiling. “It was strange, the moment he looked at me, he knew that I was his daughter,” she recalls. “I had so many mixed emotions.” She had a lot of questions and didn’t know where to start. “We just sat together, watching each other and trying to find something in common,” she says. As the two of them chatted, they realised they shared a lot of interests - Gurgen had once been a renowned dancer at the State Ballet of Georgia, and was delighted to learn that Tamuna’s daughters - his granddaughters - shared his passion. “They both love dancing, and so does my husband,” she says with a smile.

  Tamuna (L) with her newly-found half sister Rusiko (C) and cousin Manoni (R), who Gurgen introduced her to

  Gurgen invited his entire family to his home to meet Tamuna, introducing her to a large group of new relatives - half siblings, cousins, aunts, and uncles. The family agreed there was a strong resemblance between them. “Out of all his children, I look the most like my father,” she says. They spent an evening sharing stories, eating traditional Georgian food, and singing while Gurgen played the accordion. Even though she had now met her father, Tamuna still had a niggling question: had she - like thousands of other Georgians - been stolen from her mother at birth and sold? Her adoptive parents were no longer alive so she couldn’t turn to them for answers. She finally got a chance to ask her birth mother in October. A Polish TV company was filming a documentary about Tamuna and took her to meet her mother, who agreed to talk to her in private. Unlike many people Tamuna has helped to reunite, she discovered that she had not been a stolen child herself. Instead, her mother had given her up and kept the secret for 40 years.

  Tamuna and Gurgen are in regular contact and plan to see each other over Christmas

  Her mother and father were not in a relationship and had only had a brief encounter. Her mother - overwhelmed by shame - chose to hide her pregnancy. In September 1984, she travelled to Tbilisi, telling people she was going for surgery, and instead gave birth to a daughter. She stayed there until arrangements were made for Tamuna’s adoption. “It was painful to learn that I spent 10 days alone with her before the adoption. I try not to think about that,” Tamuna reflects. She says that her mother asked her to lie and tell people she had been stolen. “She told me that if I would not say that I was stolen, everything would end between us... and I said that I couldn’t do that." Tamuna feels this would be unfair to all the parents whose babies were stolen. “If I lie, nobody's going to believe those mothers any more,” she explains. Her mother then asked her to leave the house and they have not spoken since. “Would I do it all again?” she reflects. “Of course I would, I found out so much about my new family.”

  Tamuna (R) has become close to many of her biological relatives including Nia (L) who is a second cousin

  Twins Amy and Ano were taken from their mother as babies and sold. They found out about each other by chance and soon discovered thousands of others in Georgia who were also stolen from hospitals. Watch more on this story on the BBC iPlayer (UK only). You can also watch the documentary on YouTube, external.
