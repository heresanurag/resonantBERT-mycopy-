title: Met sickened by Couzens' crime - Cressida Dick - BBC News
date: '2021-07-09'
section: General
url: http://www.bbc.co.uk/news/uk-57779871
content: |-
  The Metropolitan Police commissioner gives a statement after officer Wayne Couzens admits murdering Sarah Everard.

  Metropolitan Police Commissioner Cressida Dick says she has told the family of Sarah Everard "how very sorry I'm am for their loss, for their pain and their suffering".

  She was speaking outside the Old Bailey after Met Police officer Wayne Couzens pleaded guilty to murdering marketing executive Ms Everard.

  Dame Cressida said the Met was "sickened, angered and devastated by this man's crimes - they are dreadful".
