title: University of East Anglia student who died at gym named - BBC News
date: '2024-10-17'
section: Norfolk
url: http://www.bbc.co.uk/news/articles/c99vd4v551eo
content: |-
  Police say the death at the University of East Anglia Sportspark is "being treated as unexplained".

  Police officers remained at the scene on Thursday morning as inquiries continued

  A university student who died following an incident at a gym has been named locally as Mohammed Farraj. Emergency services were called to the University of East Anglia's Sportspark, in Norwich, at about 19:00 BST following reports of a medical incident. Norfolk Police said a man in his 20s, who had been using gym equipment, was pronounced dead at the scene. It is jointly investigating the incident with the Health and Safety Executive (HSE). A spokesperson for the university confirmed a student had died and the site would remain closed.

  "Emergency services were called to the Sportspark gym shortly after 7pm following reports of a medical incident involving a man who had been using gym equipment," the police spokesperson said in a statement. "A man, aged in his 20s, was treated by paramedics but was sadly pronounced dead at the scene. His family have been informed. "The area was evacuated while emergency services provided medical treatment. "A police cordon is in place and the gym will remain closed while enquiries are carried out to establish the circumstances surrounding the death, which is being treated as unexplained but not suspicious."

  The University of East Anglia Sportspark was closed off while the emergency services were in attendance

  The university told the BBC it was "providing support to staff" and the Sportspark remained closed. The UEA Students' Union said it was "deeply shocked and heartbroken" and its thoughts and condolences were with Mr Farraj's family, friends and loved ones. It encouraged people to check in on friends and colleagues who could be affected by the incident, and said its student services team was also available for support. Molly Walker, a first-year medicine student, said her peers had been left "shocked and sad" about the death. "It’s awful, they were so young and they clearly had a bright future coming here so it’s just tragic," the 19-year-old said. "Everyone’s just really upset by it, it’s not a nice thing to have happened on our campus."

  Harry Darlington, who works near to the Sportspark, said hearing of the incident was "horrific"

  Neil Tosdevin, who works at the university, said it was "shocking" to hear of the incident. "I go in the gym and see the students using it all the time; that’s really sad," he added. Harry Darlington, 28, said: "It's really scary to realise someone has actually died at the gym. It's really horrific." Pictures showed a large number of emergency service vehicles, including a forensics van, at the scene.

  The HSE confirmed it was making "initial inquiries" and assisting Norfolk Police's investigation. East of England Ambulance Service has been approached for comment.

