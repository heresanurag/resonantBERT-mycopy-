content: |-
  Several deaths have been linked to the storm and thousands of people are staying in emergency shelters.

  Several deaths have been linked to the storm and thousands of people were in emergency shelters as storm Florence made landfall in the Carolinas.

  It has been downgraded from a hurricane to a tropical storm but continues to soak the East Coast area with rain, downing trees and damaging homes.
