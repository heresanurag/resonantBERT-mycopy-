content: |-
  Footage shows collapsed buildings and makeshift camps in the rebel-held town of Harem in Idlib.

  Makeshift camps have popped up in the wreckage of collapsed buildings in the rebel-held town of Harem in Idlib, as rescuers continue to search for survivors.

  Aid supplies have struggled to reach Syria after Monday's earthquake, which has killed more than 25,000 people in southern Turkey and northern Syria.
