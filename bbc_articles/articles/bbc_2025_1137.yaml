  • None What's happening after three years of the war in Ukraine? The meetings mark an acceleration in Trump's efforts to achieve a swift end to the war. The White House said the US president had held a "lengthy" phone-call with Russian President Vladimir Putin on Wednesday, after which Trump said negotiations to stop the "ridiculous war" in Ukraine would begin immediately. He also said it was not "practical" for Ukraine to join Nato and "unlikely" it could return to its 2014 pre-invasion borders. Ukraine has repeatedly called for Nato membership and has rejected ceding territory as part of any peace deal. Trump's stance has also been echoed by his defence secretary, fuelling European alarm that the US may be making concessions to Russia before any peace deal was negotiated. Pete Hegseth also said European nations must provide the "overwhelming" share of funding for Ukraine - claiming the US would no longer "tolerate an imbalanced relationship" with its allies. US Vice-President JD Vance likewise told the Munich Security Conference on Friday that Europe must "step up in a big way to provide for its own defence", in his speech largely spent criticising European democracies. Zelensky called on Saturday for the creation of a European army, arguing the continent could no longer count on Washington. Meanwhile, on the ground in Ukraine, Zelensky said a Russian attack had left at least 100,000 people without power in Mykolaiv. He said homes were without heating following a drone strike on the city's "critical infrastructure". Russia launched a full-scale invasion of Ukraine on 24 February 2022, having already seized Crimea and part of the eastern Donbas region in 2014.
