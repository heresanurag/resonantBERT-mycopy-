  The Duchess of Sussex reveals "As Ever" will be the new name for her home and cooking range.

  Meghan puts new label on jams and lifestyle range

  Meghan's lifestyle brand is now going to be called 'As Ever'

  Meghan, the Duchess of Sussex, has announced a new identity for her lifestyle brand, which will be called As Ever. Despite the social media teasers showing celebrities with pots of jam from Meghan, the previous brand name American Riviera Orchard seems to have reached a sticky end. On a social media post, Meghan said the newly-named product range would be a joint project with Netflix, which is showing her cooking and lifestyle series, With Love, Meghan next month. "'As ever' means 'as it's always been' or some even say 'in the same way as always,'" said Meghan's post, external.

