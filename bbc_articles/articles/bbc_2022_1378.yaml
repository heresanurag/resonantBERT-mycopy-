title: 'Wales'' coal tips: People living nearby ''worry'' when it rains - BBC News'
date: '2022-01-02'
section: General
url: http://www.bbc.co.uk/news/uk-wales-59154743
content: |-
  A resident describes what it is like living near one of Wales' higher-risk coal tips.

  "You worry every time it rains," is the feeling of one man living near a coal tip.

  Phil Thomas is from Ynyshir, Rhondda Cynon Taf, and believes locals would have "no chance" if it moved down the mountainside.

  It is one of the tips to have been classed as higher risk by the Welsh government.

  Mr Thomas describes what it is like living near the site.
