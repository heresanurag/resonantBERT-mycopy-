content: |-
  Transgender weightlifter Laurel Hubbard's attempt to win Commonwealth gold ends with injury as England's Emily Campbell takes +90kg bronze.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Transgender weightlifter Laurel Hubbard's attempt to win Commonwealth gold ended with injury as England's Emily Campbell took +90kg bronze. New Zealander Hubbard, 40, led with a 120kg lift after the snatch discipline but had to withdraw with an elbow injury before the clean and jerk. Samoa's Feagaiga Stowers, 17, took gold on Australia's Gold Coast ahead of Nauru's Charisma Amoe-Tarrant.

  Hubbard is the oldest of the 207 weightlifters competing at the Games. The Australian Weightlifting Federation had formally complained about her participation, and the president of the Samoan federation also voiced his opposition. Commonwealth Games Federation chief executive David Grevemberg said the issue needs "robust debate". Hubbard, who has been tested over the past 12 months to ensure her testosterone levels are below the limits for female competition, says she has been "hurt" by the coverage. "It's obviously a difficult time. But the one thing I am happiest about is that I tried to reach for my best performance," she said. "The Commonwealth Games here are a model for what sport can, and should, be. It's an incredible environment and an amazing atmosphere. "Without any doubt, they have lived up to the mantra of humanity, equality and decency." Hubbard kept a low profile before the Games, arriving on the Gold Coast after her New Zealand team-mates. Once competition began, she opened a 7kg advantage over her rivals in the snatch discipline but injured her elbow in an unsuccessful attempt to lift 132kg. The announcement of her withdrawal prompted confusion and surprise in the arena, but paved the way for Campbell to win bronze. She lifted 103kg in the snatch and 139kg in the clean and jerk for a total of 242kg. That left her just a kilogram adrift of second place, with Stowers well clear at the top of the podium on 252kg.

  England's Emily Campbell is the British record holder in the +90kg category

  "I started weightlifting just two years ago and I am over the moon that it has brought me here," Campbell said. "This is just the beginning for me and I believe the future has excellent things in store for me." Asked about Hubbard's withdrawal, she added: "I hope she is all right. "I really hope people can be more mindful when passing remarks about her, as she is only doing what we all love doing - lifting."

  Campbell's bronze was England's sixth medal at the weightlifting arena, after Owen Boxall won bronze in the men's -105kg earlier in the day. The 27-year-old looked to be heading out of the competition before lifting 152kg on his final snatch to sit tied for second place at the halfway stage. He then lifted 199kg in the clean and jerk to post 351kg and improve on his fourth in Glasgow four years ago. Samoa's Sanele Mao won gold with a total of 360kg to win his country's fourth Commonwealth gold. India's Pardeep Singh took silver, as defending champion David Katoatau of Kiribati finished fifth. Wales' Jordan Sakkas came seventh, while Zachary Courtney of Scotland was forced to withdraw after the snatch. In the women's +90kg, Wales' Tayla Howe produced a total of 207kg to finish sixth.
