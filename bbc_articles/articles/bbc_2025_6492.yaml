  Terry Haines, the founder of Washington DC-based consultancy Pangaea Policy, told the BBC he believes that it was "deliberate" that the administration put forward various people to become the public faces of tariffs. "[They wanted to] throw as many spokespeople out there, say different things, and flood the zone with opinion," he said. "It may have efficacy in politics, but it confuses the hell out of markets." As an example, Mr Haines pointed to Navarro, who he said gets "more leeway than you'd expect" owing to the four-month jail term he served for contempt of Congress after ignoring a subpoena from a House committee investigating the 2021 US Capitol riot. "They appeal to different audiences. Bessent would be interested in the financial press, while Navarro has a different message," he said. Haines, however, cautioned against assuming that any one person contributed the most to Trump's decision. "Markets want winners and losers, like People magazine-style stuff," he said. "But we need to know who to listen to, and that became, pretty much by default, Bessent." Several experts contacted by the BBC said they expect Bessent to now take a much more prominent public role in tariff policy, with Lutnick taking charge of the negotiations, while Navarro, Hassett and Greer play supporting roles. Haines, for example, said he believes Bessent will become, in real terms, "the spokesman for economic policy". Ultimately, a more structured approach could contribute to market stability, according to Andrew Hale, an economist at the conservative Heritage Foundation. "I imagine it will get more certain as we go forward," he said. "It's what businesses and investors want."
