title: M1 closed overnight after man dies in crash - BBC News
date: '2020-12-12'
section: Leicester
url: http://www.bbc.co.uk/news/uk-england-leicestershire-55285201
content: |-
  The southbound carriageway of the motorway has since reopened after the crash near Leicester.

  A man has died in a crash between two lorries on the M1 motorway.

  The crash happened at about 19:00 GMT on Friday near junction 21a for Leicester Forest East and forced the closure of the southbound carriageway overnight.

  A 52-year-old man was pronounced dead at the scene, but no-one else was hurt.

  Leicestershire Police has appealed for any witnesses to the crash to get in touch. The carriageway reopened at about 05:00 on Saturday.

