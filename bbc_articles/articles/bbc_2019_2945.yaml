title: US sisters found safe in California woodland - BBC News
date: '2019-03-04'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-47440111
content: |-
  It was a "miracle" finding the girls huddled under a bush in a rainy California forest, officials said.

  The sheriff said Leia and Caroline Carrico were in good spirits when they were found

  Two sisters who wandered away from home and got lost in woodland for two days have been found safe and well.

  Leia Carrico, eight, and Caroline, five, from North California, spent 44 hours in a cold and rainy forest.

  The girls were found huddled under a bush, having survived drinking water from huckleberry leaves and eating cereal bars they had brought with them.

  They were "in good spirits", Humboldt Country Sheriff William Honsal said, adding their discovery was a "miracle".

  Caroline speaking with a firefighter shortly after being rescued

  The girls' mother, Misty Carrico, alerted authorities when she noticed her daughters were missing on Friday afternoon.

  The sisters had asked her if they could go for a walk around their home in Benbow, near the Eel River, but she had declined.

  After noticing her daughters were missing, Ms Carrico went looking for them with neighbours and friends, before calling the sheriff.

  Dozens of police and rescue officials, using helicopters and dogs, were involved in the search.

  They found the girls on Sunday morning, 1.4 miles (2.3km) from where they had set off, just hours before a rain storm was due to hit.

