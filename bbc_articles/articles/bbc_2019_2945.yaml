  The girls told rescuers that they had got lost following a deer trail and made the decision to stay put.

  They were reunited with their parents and assessed by paramedics, who said they were dehydrated and cold.

  Sheriff Honsal added that the girls had received some wilderness training from their youth club, 4-H, which may have helped them survive.

  "It is so amazing to have such good news, to know they are safe," the sheriff said. "We have so many of these kinds of efforts that end up in tears and tragedy."

