content: |-
  His announcement comes after more than a year of conflict between Israeli and Hezbollah forces.

  In a statement, Israeli Prime Minister Benjamin Netanyahu says his security cabinet will approve a ceasefire deal agreement to end fighting with Hezbollah in Lebanon.
