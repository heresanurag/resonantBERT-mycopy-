title: King Charles writes to Donald Trump after assassination attempt - BBC News
date: '2024-07-15'
section: UK
url: http://www.bbc.co.uk/news/articles/c51ykzn0739o
content: |-
  The contents of the letter, which was delivered via the UK embassy in the US, have not been made public.

  The then-Prince of Wales and Mr Trump outside the US ambassador's residence in London during a 2019 state visit

  The King has written privately to former President Trump after he survived an assassination attempt, Buckingham Palace has confirmed. The message was delivered on Sunday via the UK embassy in Washington DC. The contents of the letter have not been made public, but the BBC understands the sentiments are in keeping with those communicated by the prime minister over the weekend. Mr Trump survived a shooting while he was speaking at a rally in Butler, Pennsylvania on Saturday. Prime Minister Sir Keir Starmer said he was "appalled" by the attack. In a call with the former US president on Sunday afternoon, Sir Keir is understood to have expressed his condolences for the victims and their families, and wished Mr Trump and those injured a quick recovery. The former president was shot in the ear when a gunman opened fire at the Pennsylvania rally. One spectator was killed and two others were seriously injured. The suspected shooter, Thomas Matthew Crooks, was shot dead at the scene Mr Trump, who raised his fist to the crowd while bleeding after the shooting, told the New York Post he was "supposed to be dead" and described the assassination attempt as a "surreal experience". He is due to speak this week at the Republican National Convention in Milwaukee, Wisconsin, where he is set to be formally confirmed as the party's candidate for November's presidential election. Mr Trump says he has rewritten his speech in the wake of the shooting, and will use it to "bring the country together".

  Trump held up a fist as he was rushed off stage, bleeding from his ear
