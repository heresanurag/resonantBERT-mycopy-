  The series of stoppages left it impossible to draw any serious conclusions about relative pace, although it remains clear that McLaren are the team to beat. On an unusually cold day of only 13C, all the drivers mentioned the strong north-westerly winds as making life difficult on a circuit with so many long, fast corners. Norris said: "We're still in a good position, it's tricky just because of the wind. Wind makes a big difference, especially on a circuit like this when it's so quick. "You're on such a fine limit for a long time in the first sector, the tiniest bit of wind can upset the car a lot. I still feel good, like we're in a reasonable place." Frenchman Isack Hadjar continued to impress for Racing Bulls with third fastest time on his first visit to Suzuka, considered one of the most demanding circuits on the calendar. His team-mate Liam Lawson, who was demoted from the Red Bull team after just two races before this event, was fifth fastest behind Lewis Hamilton's Ferrari. Hamilton said: "It felt great. We got through all the programme. We have some performance to pick up - we're not the quickest at the moment - but it's a good baseline. "From weekend to weekend I'm getting more comfortable, and understanding more of the set-up changes we can do and knowing what tools I have that can get the car in a better place." Mercedes' George Russell was sixth fastest, from the second Ferrari of Charles Leclerc. Russell said: "A pretty positive day for us, the car has been handling really nicely and I've been pretty pleased with that. We've got to make sure it stays the same for tomorrow. "It is really windy out there and tomorrow the wind is going to shift 180 degrees so that is going to really change how the car is feeling but I am confident we can be in the mix for fighting for the front two rows." Max Verstappen was eighth, complaining of understeer in his Red Bull, with Pierre Gasly's Alpine and the Williams of Carlos Sainz completing the top 10.

