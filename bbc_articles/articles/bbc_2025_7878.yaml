title: 'Japanese Grand Prix: Jack Doohan in high-speed crash as Oscar Piastri fastest
  in second practice - BBC Sport'
date: '2025-04-04'
section: Formula 1
url: http://www.bbc.co.uk/sport/formula1/articles/cj0zrre33evo
content: |-
  Alpine's Jack Doohan suffers a high-speed crash as Friday practice at the Japanese Grand Prix is punctuated by four red-flag stoppages.

  Jack Doohan is one of six rookies in F1 this year

  Coverage: Live radio commentary of practice and qualifying on BBC 5 Sports Extra, race live on BBC Radio 5 Live. Live text updates on the BBC Sport website and app

  Alpine's Jack Doohan suffered a high-speed crash as Friday practice at the Japanese Grand Prix was punctuated by four red-flag stoppages. The Australian was uninjured in the crash, which was caused because Doohan failed to shut the DRS overtaking aid, which meant the car had less grip than he expected as he entered the 160mph first corner. Team principal Oliver Oakes said it had been a "misjudgement" and "something to learn from". Doohan's was the first of four incidents that led to the session being stopped, two of which were for the grass catching fire beside the track.

  The second stoppage was caused when Aston Martin's Fernando Alonso spun off and became beached in the gravel at Degner One, shortly after the session was restarted following a 20-minute delay to repair the damage to the barriers at Turn One. And a few minutes after the session was resumed, the cars had to return to the pits when the grass caught fire between Dunlop and Degner One. That left only seven minutes of running at the end of the session, but it was stopped after six when a bigger patch of grass caught fire on the run down to Spoon Curve. The fires are believed to have been caused by a combination of sparks from the cars and dry grass - Japan's wet season is in the summer. The country's grand prix was held in the autumn until last year, when it was moved to avoid typhoon season and to improve Formula 1's sustainability with regard to travel and logistics. A statement from F1's governing body, the FIA, said: "While we continue to look into the fires that occurred during FP2, our focus before tomorrow will be on taking preemptive measures. "The grass has been cut as short as possible, and loose, dried grass has been removed from affected areas. Prior to tomorrow's sessions, the grass will be dampened, and specific response teams will be stationed around the track."

  Doohan's accident, which badly damaged his car, was the result of an oversight by a driver in only his fourth race in F1. He was on only his second flying lap of the day, as his car had been driven by reserve Ryo Hirakawa in the first session. The DRS, which boosts straight-line speed by reducing downforce, is triggered to shut automatically if the driver brakes. Doohan turned into the first corner having lifted off but not braked, and because he did not press the DRS button, the device remained activated. That meant the wing was still in its open, low-downforce position, and the car immediately spun as he entered the corner. It careered across the gravel trap before making a heavy impact with the crash barrier. Doohan said: "It was a heavy one, something that caught me by surprise, and I will learn from it. I know the team has a lot of work ahead to repair the car." The shunt could increase the pressure on the 22-year-old, who has been dealing with questions as to whether his seat is under threat following Alpine's signing of Argentine Franco Colapinto as reserve driver. Colapinto raced for Williams last year and his presence in a race seat could unlock significant amounts of sponsorship money from Latin America.

