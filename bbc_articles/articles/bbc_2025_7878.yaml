  Yuki Tsunoda impressed in the first session, topped by Norris, after his move up to Red Bull in place of Lawson, with sixth fastest time just 0.107 seconds slower than team-mate Verstappen. The Japanese was only 18th in the second session, and did not complete a representative lap on the soft tyres. Tsunoda said: "P1 was better than expected. Good start for myself and P2 didn't even set a lap time. Lots of work to do. Maybe slightly struggled. So far overall it's OK, just have to build up the confidence more." He said the car felt "a little bit more different than I expected" out on track compared with the simulator, which he tried last week, and was "feeling a bit more tricky". Verstappen said: "Today has been quite difficult for me, trying a lot of different things with the car but it seems like a lot of things are not really clicking at the moment, quite difficult to put the lap down. "You need a lot of confidence and commitment around here and at the moment I don't feel I can use that so we still have a bit of work to do."
