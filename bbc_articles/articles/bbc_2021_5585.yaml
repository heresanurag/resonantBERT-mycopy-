content: |-
  Sir Keir Starmer says he takes "full responsibility" for Labour's vote collapse in Hartlepool.

  Tories have moved further in grabbing Labour seats

  This isn't a general election, but it gives a striking impression as to what's going on in politics across the country right now. For the big picture, the Conservatives are cock-a-hoop. Labour are disappointed, limping behind. Results are not yet over, but there are three things we can already say: Tories have moved further along in grabbing Labour areas which the opposition used to be able to rely on. It's more evidence of a profound move over time, while Labour is getting squeezed to the cities. We're also reminded of the fragile connection between Westminster and the rest of the country. Boris Johnson has had a torrid time in Westminster in the past few weeks, yet he remains a magnet for millions of voters. Labour have discovered they are a brand which some people want nothing to do with. We are in a scenario where there are very different situations for politics across the country. Welsh Labour's performance is different to England's. All the parties have to grapple with the fact that the jigsaw is becoming more and more complicated. It used to be a pretty stable political system.
