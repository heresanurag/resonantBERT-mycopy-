  Video captured from the ground shows a FedEx cargo jet returning to Newark Airport in New Jersey to make an emergency landing.

  Video captured from the ground shows a FedEx cargo plane returning to Newark Airport in New Jersey to make an emergency landing.

  According to a statement from the FAA, the plane took off from Newark en route to Indianapolis when it struck a bird, damaging one of the engines on the Boeing 767.

  The plane landed safely with no injuries reported.
