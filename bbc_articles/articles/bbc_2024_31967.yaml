title: 'Newspaper headlines: ''Love and hugs'' for Kate and ''Shift to Reform'' -
  BBC News'
date: '2024-12-26'
section: The Papers
url: http://www.bbc.co.uk/news/articles/ce8nwyydy74o
content: |-
  Many of Boxing Day's front pages feature images of members of the Royal Family from Christmas Day.

  'Love and hugs' for Kate and 'Shift to Reform'

  Many of the papers feature photos of the Royal Family at their Christmas service in Sandringham, Norfolk. "Beret Xmas Kate" is the headline in the Sun, external, which includes a front-page photo of the Princess of Wales in her headwear. The Daily Mail, external calls her an "inspiration" to cancer sufferers, and leads on the King's speech - focusing on Charles's praise for the "selfless" health workers who have treated his family this year. Contingency plans are being drawn up in Whitehall for an increase in pupils attending state schools, amid concerns of some independent institutions collapsing when VAT is levied on fees in the new year, according to the front of the Times, external. British sitcom Gavin and Stacey aired for the last time on Christmas Day and the Daily Star dedicates its front page to the TV show.

  Polling expert Sir John Curtice tells the i newspaper, external that Labour's support among voters has "fallen away sharply" with a rapid decline in popularity not seen before in a new government. He says that Britain's established two-party system faces its biggest challenge since the early eighties - and the rise of the SDP - with Labour, the Tories and Reform all polling at consistently similar levels. In other domestic news tougher penalties may be on the way for people who break fox hunting laws, the Daily Telegraph, external reports. It says there could also be prosecutions when a fox is killed through "recklessness". The Daily Express, external reports that many high street retailers see today's Boxing Day sales as crucial for their sales figures. Finally, the Guardian, external leads with concerns about the marketing of weight loss jabs saying the medical advertising watchdog is examining complaints that rules about the promotion of prescription-only drugs are being flouted.

