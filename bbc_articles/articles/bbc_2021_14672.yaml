content: |-
  Boris Johnson urges the public to get vaccinated to avoid the re-introduction of Covid restrictions.

  Boris Johnson was asked in his news conference about times he’s been photographed recently not wearing a mask in places where he should have been.

  “I wear a mask wherever the rules say that I should,” the prime minister said.

  The question specifically referred to his visit to Hexham General Hospital, where he was pictured at times with a mask and at times without.

  The rules throughout the Northumbria NHS Trust are that “anyone attending our hospitals and community settings must continue to wear a face-covering at all times to protect patients, visitors and staff”.

  There has been a widely-reported statement from the trust, although the trust declined to send it to us today.

  The statement is reported to have said that everyone on the official visit had been reminded of the rules in advance and that the prime minister “did wear a mask for the majority of the visit”.

  But it added that he had walked along a corridor “for a very short period of time, without a mask” and that “this brief moment was captured on camera”.

  “As soon as this was identified he was given a mask and he put it on.”
