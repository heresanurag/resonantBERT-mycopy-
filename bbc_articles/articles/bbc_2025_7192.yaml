title: Apprentice winner Dean Franklin 'not aware' of licence breach - BBC News
date: '2025-04-22'
section: General
url: http://www.bbc.co.uk/news/articles/cvg7nx47dyeo
content: |-
  Dean Franklin says he has had the correct licences to run his air conditioning business since 2014.

  Father-of-two Dean Franklin said he was unaware of any ongoing Environment Agency investigation

  The winner of The Apprentice 2025 said he was "not aware of any ongoing investigation" after reports his air conditioning firm had been operating without the correct licence. Dean Franklin, 35, from Hornchurch, east London, was crowned the latest winner of the long-running BBC reality show on 17 April by Lord Alan Sugar. The Sun newspaper reported, external he was at "the centre of a rogue trader probe" for failing to provide an F-gas certificate for his business for 17 months, which is required by the Environment Agency. Mr Franklin told BBC Essex: "I'm not aware of any ongoing investigation. I am F-gas registered and have been since 2014."

  "I wouldn't always believe what you read in the newspapers," he added. F-gases, or fluorinated greenhouse gases, are regulated by the Environment Agency and companies or individuals working with them must be qualified to do so.

  Lord Sugar declared air conditioning business owner Dean Franklin as the winner of The Apprentice on 17 April

  Coverage in the national media said Mr Franklin's firm, ADL, could be liable for a £200,000 fine if a breach of regulations was to be found. In a statement, an Environment Agency spokesperson said: "We are clear that it is against the law to work with F-gas without the correct qualifications and certification. "We are investigating reports of a potential breach of these regulations." Mr Franklin gave his response to the allegations while taking part in BBC Essex's behind-the-scenes look at this year's run of The Apprentice, featuring candidates from the county including Chisola Chitambala, Liam Snellin and Emma Rothwell.

