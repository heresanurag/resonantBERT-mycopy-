title: 'Azerbaijan at war: Reporter’s journal - BBC News'
date: '2020-10-17'
section: General
url: http://www.bbc.co.uk/news/world-asia-54577561
content: |-
  A BBC team spent a week looking at the Nagorno-Karabakh conflict from the Azerbaijani side.

  The BBC has been covering the bloodshed over the disputed enclave of Nagorno-Karabakh from both sides - in Azerbaijan and in Armenia. BBC International Correspondent Orla Guerin, producer Zeynep Erdim and cameraman Goktay Koraltan have spent a week looking at the conflict from the Azerbaijani side.
