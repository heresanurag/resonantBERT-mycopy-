id: bbc_2024_30641
title: 'Newspaper headlines: Nato considers 3% target and ''Andrew''s links to China
  spy'' - BBC News'
date: '2024-12-13'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c2ldzrl0nr7o
content: |-
  Talks over European defence and the banning of a Prince Andrew associate from the UK lead the papers.

  The Duke of York's link to an alleged Chinese spy is the lead for the Times, external, the Telegraph, external and the Daily Mail, external. They report that concerns were raised over communications found on one of the businessman's devices after he was stopped by UK border security in 2021, and that he has now been barred from entering the country on national security grounds. The Times says Prince Andrew's ties to China go back to his days as a trade envoy, a role he was given by then-Prime Minister Tony Blair when he retired from the navy in 2001. The front page of the Guardian, external carries a photo of a coffin draped in the Syrian flag being carried through the streets of the country's capital, Damascus, during a public funeral. The paper reflects that, while the streets of the city have been filled with celebrations since former President Bashar al-Assad fled last Sunday, the country is beginning to grapple with the fact that many of the 130,000 people who are estimated missing may be "lost forever". "Joy gives way to sorrow as Syria buries its dead", the headline reads. The Financial Times, external leads with more detail on talks among European Nato members about increasing the alliance's target for spending on defence. It says an increase from 2% of GDP to 3% is being discussed. The paper quotes a German official as saying the move would send a "good signal" to US President-elect Donald Trump, who believes Nato's European members should pay more towards their defence. The same story is the lead in the i, external, which says the former chief of the navy, Admiral Lord West, and former Defence Secretary Ben Wallace are among those urging the UK government to push towards the 3% target by the end of the decade. Prime Minister Sir Keir Starmer, the paper says, favours a lower target of 2.5%. The Sun, external reports that police had to intervene after a Christmas party for royal staff "spiralled" out of control. The paper says glasses were smashed, punches were thrown and a woman was arrested after staff visited a bar following an early evening drinks reception at Buckingham Palace. The Palace stresses that the party was an unofficial event, but says the facts will be "fully investigated" and "appropriate action" taken.

  A number of the papers bear potentially good news for people who are living with sleep apnoea. The Times, external reports that scientists have developed an app-controlled tongue implant which can "zap" snorers into submission. It says the Genio implant has been fitted in two patients so far, and works by stimulating a particular nerve in the tongue. And the Mail, external reports that figures from the department store John Lewis show sales of their boxed cards are down 23% on last year. The paper speculates the price of a first class-stamp may be one of the reasons why. It says the store has also reported that people are shunning bigger Christmas trees, with sales of six-footers down 13% this year. In contrast, there has been a 55% rise in people buying smaller, cheaper trees - meaning, the paper says, more families are enjoying a merry "little" Christmas.

