title: '''Lucy Letby is a hateful human being'' - twins'' parents - BBC News'
date: '2023-08-20'
section: General
url: http://www.bbc.co.uk/news/uk-66382674
content: |-
  The nurse was found guilty of murdering one of their babies and attempting to murder the other the following day.

  The parents of twin brothers who were among Lucy Letby's 13 victims have told the BBC the nurse is a "hateful human being" who has taken "everything" from them.

  Letby murdered one of their baby boys, and tried to kill the other twin the following day.

  The nurse was found guilty of murdering a total of seven babies who were being looked after on a neonatal ward at the Countess of Chester Hospital between June 2015 and June 2016.

  She was also found guilty of attempting to murder another six babies, with the jury undecided on the attempted murder of a further four. She was found not guilty of two counts of attempted murder.

  If you, or someone you know, need help after reading this story, details of organisations offering assistance can be found on the BBC Action Line website.

  Panorama - Lucy Letby: The Nurse Who Killed - will be on BBC One and BBC iPlayer at 20:00 BST (UK only) on Friday 18 August.
