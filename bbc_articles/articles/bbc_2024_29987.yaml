title: Nottingham students warned after Bonfire Night fireworks 'war' - BBC News
date: '2024-11-08'
section: Nottingham
url: http://www.bbc.co.uk/news/articles/c3rx4lnqxxgo
content: |-
  Meanwhile, some students in Nottingham tell of their fears after the fireworks "war" on Bonfire Night.

  Universities have warned action will be taken against any students found to be involved in a fireworks "war" in Nottingham. Emergency services went to Midland Way in Radford at about 22:20 GMT on Tuesday, after it was reported fireworks had been launched at surrounding buildings, parked vehicles and people. A "large disturbance" was declared due to about 300 people outside student accommodation throwing fireworks at each other and fire engines. Now both Nottingham Trent University (NTU) and the University of Nottingham have warned students, some of whom told the BBC they had been left "scared" and "worried".

  Nottingham student, Akua Appenteng, said she was asleep when she was alerted to what was happening on Tuesday. "It was all very hectic, I woke up and I saw loads of people running and a lot of police cars," the 18-year-old said. "It was really scary and quite traumatic. "I'd like to see more of a police presence to stop this sort of thing from happening, not just on Bonfire Night but also during the regular weeks. "I'd also like to see a restriction to fireworks being sold in supermarkets [and] shops."

  Emergency services were called to the scene on Tuesday

  Caroline Asiedu said she had learned about plans for Bonfire Night fireworks online. "I was scrolling on social media and I saw 'the war' doing the rounds, but I never thought it would blow up as much as it did," the 19-year-old said. "I know people that got injured in the incident - when I was going up into my room, my friend ran towards me and told me she got hit by a firework. "She showed me the scar that it left and we had to find some ice to put on it quickly. Thankfully she's OK." Kesiah Sarpong, 18, said it had left her "worried for the future". "It makes me feel fearful," she added. "It's my first year here and it makes me feel like I don't want to live here any more, I'm actively looking for new accommodation which is closer to the city centre."

  Patryk Ciesielski said he saw about 100 people outside

  Patryk Ciesielski, 21, who lives in one of the accommodation blocks, said: "It was the same as usual - I think it happens every year, it's basically people shooting fireworks at each other. "They also set some bins on fire. "I don't really mind it, it's just kind of loud, but I think it was going for quite a while this time around. "Even with my window closed, it was kind of smelly inside, and my eyes were hurting, but other than that I don't really mind."

  The city's two universities say they are both working with Nottinghamshire Police

  A 48-hour dispersal order for the area around Midland Way and St Peters Street, originally put in place on Tuesday, was renewed on Thursday evening. The order gives police officers extra powers to move on those they suspect of preparing to be involved in antisocial behaviour. Senior officers confirmed the original incidents were still under investigation. In a statement, the University of Nottingham said it would "support any police investigation and will take appropriate action" if students were "found to be putting themselves or others at risk". "We work proactively with local partners, including the police, to communicate with our students about the dangers involved with the misuse of fireworks and the potential legal consequences of any associated anti-social behaviour," a spokesperson said. "[We] will not tolerate unacceptable behaviour of this kind from anyone in our community." Nottingham Trent University (NTU) said it was supporting police with inquiries, and added: "We regularly remind our students of the importance of being responsible and considerate neighbours and if any of our students are found to have committed any wrongdoing they will face swift disciplinary action under our code of conduct. "Any students who are concerned about behaviour in their neighbourhood are invited to call our security team, who are available to support 24/7."

