content: |-
  With the Under-20 Six Nations producing senior internationals quicker than ever before, BBC Sport looks at why Henry Pollock might be England's next breakthrough star.

  Under-20 Six Nations: Why Henry Pollock might be England's next breakthrough star Last updated on .From the section Rugby Union

  Henry Pollock says he plays best when he is "aggressive and confrontational" The Under-20 Six Nations is producing ready-made senior internationals quicker than ever before. England flanker Chandler Cunningham-South played in the competition last season and is pushing for a senior start after impressive cameos from the bench in this year's Six Nations. In 2022, full-back Henry Arundell caught the eye with a length-of-the-field try against Scotland before playing under Eddie Jones during England's tour of Australia. The name to remember this campaign is Henry Pollock. The 19-year-old put in back-to-back player-of-the-match performances in England's opening two victories over Italy and Wales, which included a hat-trick of tries in Treviso. "It shows you that you aren't too far away, especially with what Chandler did, coming off the back of the Under-20 World Cup and going straight into the first-team squad," Pollock told BBC Sport. "But in my experience I can't think about that yet. I have to keep playing well for under-20s, and after under-20s see what happens." The Northampton Saints flanker, who will still be eligible for the under-20s next season, made his Premiership debut in November against Leicester Tigers. An all-action 30-minute cameo, which included a run down the wing and a jackal turnover on his own line, showed why his potential is so high. He has been using 2003 World Cup-winning open-side flanker Richard Hill - now the England team manager - as his mentor. "He has been in touch with me week in and week out," Pollock added. "He came to the Scotland game and he has talked about stuff I don't do right. "Like work-rate off the ball or on kick chase - not dropping back early. Little pointers that maybe other coaches wouldn't pick up, but because he is such a high-level coach having played at such a high level, he is very knowledgeable in that aspect." Born in 2005, Pollock missed Hill's impactful performance in the World Cup final in England's win against Australia. Instead, Michael Hooper's role in helping the Wallabies reach the World Cup final in 2015 caught the eye of a 10-year-old Pollock, who sees similarities with the former Australia captain in terms of his size and speed. "When I was younger, I would look up to Michael Hooper," he said. "The way he uses his size to his maximum potential. "He has gone from strength to strength and now is playing sevens, which is something I want to do when I am his age." The teenager's speed and footwork for his opening try against Italy showed why he would be a good fit for sevens. Add in a length-of-the-field solo try while on loan at Bedford Blues in the Championship, and Pollock is quickly building quite the highlight reel of tries for an open-side flanker. But he also wants to be known for producing "those moments that no-one expects you to do", such as his vital turnover at the end of the first half against Wales in round two. On the immediate horizon this Friday is Ireland, who are also undefeated and still on course for a third Grand Slam in a row. However, a bonus-point win for England in Bath would seal the title for the first time since 2021. "Ireland being such an experienced team is something we do talk about," Pollock said. "But if we play to our maximum I believe that no team will stand in front of us. "It is not knockout rugby, but it almost feels like that."
