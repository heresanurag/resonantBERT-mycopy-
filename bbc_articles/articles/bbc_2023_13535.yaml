title: Japan joins race to Moon with successful rocket launch - BBC News
date: '2023-09-07'
section: General
url: http://www.bbc.co.uk/news/world-asia-66739236
content: |-
  Japan's H-IIA rocket carrying the national space agency's moon lander launched from the Tanegashima Space Center on 7 September

  Japan has successfully launched a rocket carrying a lunar lander, following three delays due to bad weather.

  The lander, dubbed the "moon sniper", is expected to attempt a Moon landing in February if all goes well.
