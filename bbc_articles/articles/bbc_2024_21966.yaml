title: 'Eluned Morgan: Country first, party second, pledges first minister - BBC News'
date: '2024-09-15'
section: Wales
url: http://www.bbc.co.uk/news/articles/cvglllj28xpo
content: |-
  First minister will "undoubtedly fall out" with UK government as she tries to realise Welsh plans.

  Eluned Morgan was appointed first minister after Vaughan Gething quit

  First Minister Eluned Morgan says she will "undoubtedly fall out" with the UK Labour government as she tries to realise her own plans for Wales. She told BBC Politics Wales that as first minister she would have a "country first, party second" approach. Asked whether she would be prepared to have difficult conversations with her Labour colleagues in Westminster when it comes to asking for more funding for Wales, Morgan said she would be "standing up for Wales". The election of a Labour government in both Cardiff and London has been heralded as a "restart" in the relationship between the Welsh and UK governments following hostilities with the Conservatives.

  Morgan said there had already been a "transformation in terms of our relationship with the UK government". The new first minister has already made clear tackling long waiting lists in the NHS would take precedence over fixing long-term problems in the health service. She said her ambition would not be realised before the next Senedd election in 2026. However, she said she would attempt to shake things up by putting more pressure on well-paid NHS bosses to deliver and would bring in a panel of experts to highlight good practice and "shine a light" on poor performance. "Let's be clear, we are not going to fix the NHS in the next 20 months," she said. Morgan added "the things that matter most to people, like the longest waiters," will be brought down. She said she wanted improvements to be "faster" and to make sure "people are focused on delivery". "I think it's important that we put the pressure on those people who are managing the NHS, who are paid significant sums of money. "The chief executives of our health boards are paid a quarter of a million pounds a year. "Let's get them to be more accountable for the money that the taxpayers are giving them." She added: "There are examples where people have really brought down these numbers in some places and in others they are simply not delivering the way they should."

  The NHS Confederation, which represents the health service, has been asked to comment. Morgan talked a lot about "delivery" and focusing on the people's priorities, namely the NHS. However, it is inevitable that prioritising funding and resources to one problem means other public services lose out. She said the public would have to wait until she speaks in the Senedd on Tuesday to get a full picture of her plans for government. However, she implied some of those decisions could be challenging. And while she would not be drawn on whether education or the economy would lose out under her plans, there was an implication action on climate change may be scaled back. In a week above inflation public sector pay deals were announced for teachers, doctors and others, Morgan seemed to suggest simply paying workers more would lead to better productivity. But Plaid Cymru leader Rhun ap Iorwerth said Labour's legacy in Wales was "an NHS in crisis, a stagnating economy and falling educational standards". He added: "There is no indication that this government will take any responsibility for their record - or crucially demand fair funding from their bosses in London." Meanwhile, Welsh Conservative Senedd leader Andrew RT Davies said Labour had the "wrong priorities" and Morgan should be on the phone to Sir Keir Starmer "night and day" over cuts to the Winter Fuel Payment.

  She has a reputation for robust conversations, and she is hoping by confronting the problems in the health service and other areas head on, that she will be able to turn the tide on her party's popularity. In May 2026, the Welsh public will go to the polls in the Senedd elections and current projections see Welsh Labour battling to hold on to their firm grip on power in Cardiff Bay. Morgan's political calculation is that she needs to target her finite resources on the issues that have the greatest political impact. And to do that she will try to run the Welsh government more like a business, with a focus on delivery and performance. But, as experts have warned it is unlikely she will succeed in transforming the fortunes of the health service in the time she has, it is a huge political gamble. Welsh Labour are hopeful that having their "Labour family" in power in Westminster will make that gamble easier to achieve.

  But she said she would not let her political allegiances get in the way of asking the prime minister and the chancellor for more funding. She said she would "absolutely" put "country first, party second". "There will be times when undoubtedly we will fall out. "But we will try and do that politely and cordially. "I have to tell you that, so far, that relationship is really positive. "There’s been a transformation in terms of our relationship with the UK government." As UK Labour prepares for its party conference this coming week, Welsh Labour will be pressing upon its colleagues that their performance in the Senedd elections will be a key test of Sir Keir Starmer's term in office. But the question is whether that political pressure will be enough to turn on the Treasury's taps.
