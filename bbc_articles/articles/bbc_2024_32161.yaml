title: Wolves lose EU safeguards, opening way for culls - BBC News
date: '2024-12-03'
section: Europe
url: http://www.bbc.co.uk/news/articles/cy4pyw8d4vzo
content: |-
  The European Commission says numbers have soared and the animals are now causing damage to livestock.

  European conservation officials have adopted EU proposals to end protections for wolves in Europe

  The first snow of winter has fallen in Sanmartin, a village in Romania’s eastern Carpathian mountains. Shepherd József Rácz and his sons keep 500 ewes up on the high pasture here. It’s a hard life: when he’s not worrying about milking his sheep, which he does three times a day, he’s worrying about protecting them from predators. Each year, József loses five or six of his herd to a wolf, or a bear. It’s why he keeps 17 dogs. “A good dog is the best tool a shepherd has, to protect his flock at night, and in the daytime too,” the farmer says.

  On Tuesday, 45 years of strict protection for grey wolves in Europe came to an end, after conservation officials adopted EU measures to downgrade the animal's protected status. The news means that grey wolves will be moved from Annex II (strictly protected) to Annex III (protected) of the Bern Convention. This will remove many of the safeguards that have allowed the animals to flourish in Europe and means that from the beginning of March next year, each EU country will be able to set an annual quota of wolves to kill.

  József keeps 17 dogs in a bid to ward predators away from his sheep

  The Commission argued that the number of wolves in the EU has almost doubled, from 11,000 in 2012 to over 20,000 today, and that they were causing too much damage to livestock. The Worldwide Fund for Nature (WWF) has called the decision "extremely disappointing". "Wolf populations have barely recovered after going extinct in most parts of Europe, and weakening their protection could jeopardise this fragile recovery," said the WWF in a statement. The organisation also accused the Commission of prioritising political decisions over science, saying the decision was influenced by "personal reasons after Commission President Von der Leyen’s pony was killed by a wolf in 2022". Wildlife campaigners have argued that improved protection methods, including trained sheep dogs, would be a better solution than removing safeguards. They say that wolves keep down numbers of deer and wild boar, which damage trees and crops. Wolves also prevent the spread of diseases by eating sick animals. In the town of Baile Tusnad, in a valley near József’s village, wildlife experts met recently to discuss large carnivores. Most, though not all, oppose the hunting of wolves and bears. “African swine fever is spreading all over Europe,” said Michal Haring, a biologist from Slovakia, “and the wolf is a very good ‘doctor’ for this, suppressing the disease. Wolves cannot catch it.” Another argument against shooting wolves is that they hunt in packs of five to eight, usually a pair and their offspring. If the older wolves are shot, the pack fragments, making it harder for them to catch deer and wild boar. “Individual wolves are more likely to attack sheep and other domesticated animals,” Mr Haring explains.

  Wolves keep down deer and boar populations, and also help to suppress disease, campaigners say

  Campaigners also pointed to a 2023 EU report, external, which states that only around 50,000 of Europe’s 68 million sheep and goats are killed by wolves each year – 0.065% of the total number – adding that the overall impact of wolves on EU livestock is “very small”. Moreover, it says there have been no fatal wolf attacks on humans for 40 years. “If we expect countries like India or Indonesia to protect their tigers,” says Laurent Schley, head of the Wildlife department in the Luxembourg government, “and Africans to protect lions and elephants, then we as relatively rich Europeans should be willing to tolerate some wolves.” Luxembourg is one of the few western European countries where no wolves have been sighted yet, Mr Schley believes it’s only a matter of time. “We have very high densities of deer and wild boar, so the conditions for the wolf are there. "Of course, if individual wolves or packs start killing too much livestock, or were to show aggression towards humans, we would have to draw the line. Human safety always comes first.”

  But back on the mountainside, József says wolves are dangerous because “they’re clever animals”. He favours tougher legal measures to cull the predators. Bears approach through the forest, treading on branches and alerting his dogs, József says: if they break into the wickerwork enclosure where his herd stay at night, they will only grab one animal. If a pack of wolves get in though, they can kill dozens of sheep at a time. Last year, József’s favourite dog, Moody, was killed by wolves, in broad daylight, as they moved from one pasture to the next. All they found was his bloodied pelt. The more wolves there are, József says, the more likely they will take his sheep. And it takes a long time to train a good dog.
