title: British Army serviceman charged with terror offence - BBC News
date: '2023-01-27'
section: UK
url: http://www.bbc.co.uk/news/uk-64435207
content: |-
  The 21-year-old serviceman is due to appear at Westminster Magistrates' Court on Saturday.

  A serving member of the British Army has been charged with a terror offence, the Metropolitan Police has said.

  Daniel Abed Khalife, 21, was charged over two incidents including attempting to "elicit information of a kind likely to be useful to a person committing or preparing an act of terrorism" in 2021.

  He is due to appear at London's Westminster Magistrates' Court on Saturday.

  The Met's Counter-Terrorism Command said Mr Khalife was also charged with placing an article "with the intention of inducing in another a belief that the said article was likely to explode or ignite and thereby cause personal injury or damage to property" at Beaconside, Stafford, on or before 2 January of this year.
