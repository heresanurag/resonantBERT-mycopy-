title: Your pictures of Scotland 25 June - 2 July - BBC News
date: '2021-07-02'
section: Scotland
url: https://www.bbc.co.uk/news/uk-scotland-57642923
content: |-
  A selection of your pictures of Scotland sent in between 25 June and 2 July.

  Send your photos to scotlandpictures@bbc.co.uk. Please ensure you adhere to the BBC's rules regarding photographs that can be found here.

  Please also ensure you follow current coronavirus guidelines and take your pictures safely and responsibly.

  Conditions of use: If you submit an image, you do so in accordance with the BBC's terms and conditions.

  Puffin else matters: Charles Colliar captured this seabird making sure it got its catch back to its burrow on Lunga in the Treshnish Isles.

  Lava lamp: Brian Potter thought the light in Assynt made it look like Stac Pollaidh had just erupted.

  A river runs through it: Stewart MacFarlane captured this tranquil scene in Dean Village in Edinburgh.

  Flower power: Yvonne Beresford saw this bee flying between her Nasturtiums in her back garden near Elsrickle, South Lanarkshire.

  Hare-brained idea: A beautiful brown hare caught snacking on the farmer's crops in Angus.

  Looking fly: Peter Spalding captured this incredible picture of Burnet moths in Larbert, Falkirk.

  Counting sheep: Valerie Pegler saw these sleeping sheep next to Loch Lomond.

  Room with a view: Castle Stalker reflected on Loch Laich, near Appin in the Western Highlands. Laura Colacino said the walk to this view is wheelchair accessible.

  You otter come in: This otter in Beauly made the water look so inviting, Sam Mcconnell thought.

  Infinity and beyond: Jamie Macdonald enjoyed his walk along Rosemarkie beach in Fortrose.

  Buckle udder the strain: Ricardo Gabriel saw this Highland cow decide to take a break on the beach in Fionnphort on the Isle of Mull.

  Moved to deers: Steve Ewens was all alone with these deer just off the Bealach na Bà with the Cuillin Ridge of Skye partially hidden by mist.

  Strike a pose: Alli McMahon caught this red squirrel trying to reach an itch in Morton Loch, Tayport

  Fifty Shades of Hay: Jane Termini Taylor captured the sunset on this field near Newton Stewart in Dumfries and Galloway.

  Woody Woodpecker: Tracey Ross spotted this male great spotted woodpecker tending to his chicks in Angus.

  Scene and not heard: Richard Petrie captured this tranquil setting at LochTay.

  Reflections of a fox: William Johnston said this fox was basking in the evening sun on the opposite side of the canal on Glasgow's Kelvin walkway. He was thrilled to be able to get the fox and his reflection in one frame.

  The fresh breath of brightness burning: Elaine Hamilton took this picture of Anniesland Tower from Glencoe Street in Glasgow.

  Treasure Island: Peter Allen took this photograph looking back at Catacol village on the north end of the Isle of Arran, showing the turquoise waters caused by algae.

  Nothing can ruin this view: Simon Dunsmore took this photo of Lady Anstruther’s tower with Elie Ness lighthouse in the background whilst visiting Elie in Fife.

  Bird's eye view: Mark Peggie caught this nosy pheasant at her window in Pencaitland, East Lothian.

  Ask us skiff you need anything: These rowers look like they are making their skiffs go fast in Lamlash Bay at the Isle of Arran. Picture by Liam Blizard.

  Kelp I'm on my own: Stephen Hall captured this lonely piece of seaweed on Belhaven Bay Beach, Dunbar.

  All tied up in knots: Jamie Whitelaw took this picture of the 'From the Sea' sculpture made of string overlooking Calgary Bay on the Isle of Mull.

  Water you think about this? Dorrie Baker captured the Union Canal looking very picturesque in Edinburgh.

  Steaming along: Graham Paton caught this great angle of the Flying Scotsman returning to Edinburgh after a Fife trip

  Plant life: Curtis Welsh said this intense field of colour was a spectacle near Ancrum in the Scottish Borders.

  View from above: Martin Bell took this picture of Lochindorb Castle near Grantown on Spey.

  Fisherman's friends: James Johnston said this picture was taken at the Boatshore cove at Cockenzie where years ago the wee sailing yawls would land their catch.

  Took the wind out of his sails: Stephen McCaveny was blown away by this scene in Ullapool.

  Not too grainy: Sue McCann captured this field of ripening barley at Braefoot.

  Rock your world: Rob Jenkins thought this was a 'magical sunset' over Loch Quoich.

  Heron time: Jim Vaas was there at the right moment to capture this heron in flight over the River Teviot at Roxburgh in the Borders.

  Mount your blessings: Molly Stevenson was stunned by the scenery at Glen Etive.

  Wet behind the ears: Chris Elder's nine-year-old daughter, Niamh, loved playing in Loch Morlich.

  Seas the day: Inna Baltaca said her daughter has been making the most of their holiday at Camusdarach Beach in Morar.

  Fowl-mouthed: Graham Grosie photographed these two squabbling gulls fighting for their perch at St Abbs.

  Auld Reekie: Mustafa Kheraluwala took this picture from the top of Calton Hill giving an incredible view of Edinburgh and its famous skyline.

  Fall fowl: Davey Jay said he nearly lost his eye capturing this shot of a tern in the Isle of May.

  Spiralling out of control: Jessica Poce was amazed at the stairs in Princes Square in Glasgow

  Flying ban: Emily Alexander said this poplar hawk moth was hitching a ride to Islay on the MV Finlaggan ferry.

  Don't count your chickens: Five-year-old Ella Rose with Hamish the chicken at the Ark on the Clyde, Finlaystone Country Park.

