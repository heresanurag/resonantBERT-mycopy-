title: Former FBI diver explains risks of Baltimore recovery - BBC News
date: '2024-03-28'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68681104
content: |-
  Divers recovered two bodies in the aftermath of the bridge collapse and will return when debris has been cleared.

  Divers working to reach vehicles buried beneath the collapsed bridge in Baltimore have faced dangerous and difficult conditions, according to officials.

  In their search they were able to recover two bodies on Wednesday. Divers will return to the water to locate the missing men once the debris has been cleared.

  Bobby Chacon, a former FBI diver, walks us through some of the risks divers face in similar recovery efforts.
