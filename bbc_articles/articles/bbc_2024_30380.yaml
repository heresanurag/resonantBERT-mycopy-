  A horse which broke free from a Scottish racecourse has been captured on video galloping through a nearby town two miles away.

  A horse which broke free from a Scottish racecourse has been captured on video galloping through a nearby town around two miles away.

  Rufio was seen running through the streets of Prestonpans after unseating jockey Lucy Brown during a meet in Musselburgh.

  The 10-year-old bay gelding was later returned to the stables unharmed after being halted by a member of the public.

  A spokesperson for Musselburgh Racecourse said it was an "extremely rare occurrence".
