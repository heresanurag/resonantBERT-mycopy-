id: bbc_2024_1992
title: Michael Jordan championship trainers sell for $8m - BBC News
date: '2024-02-03'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68172218
content: |-
  The auction of Jordan's shoes from six NBA finals has set a new world record for game-worn trainers.

  A set of trainers worn by Michael Jordan has been sold for $8m(£6.3m), says auction house Sotheby's.

  The six individual shoes were worn by Jordan during his six NBA championship wins in the 1990s. The sale has set the world record for game-worn trainers.
