title: British jihadists refusing to leave Syria - BBC News
date: '2018-09-21'
section: General
url: http://www.bbc.co.uk/news/world-45593493
content: |-
  Two British extremists who have lived in the country for years, on why they won't lay down their weapons.

  Jihadists from the UK are still fighting in Idlib – some of the last British extremists in Syria – and some are allied to the al-Qaeda linked Hayat Tahrir al-Sham, once know as the Nusra front.

  It’s accused of torture and random killings, is a terrorist group in the eyes of most governments, and it has Idlib in its grip.

  The BBC's Quentin Sommerville has spoken to two British extremists who have lived and fought in Syria for years. They say they won’t lay down their weapons for anyone.
