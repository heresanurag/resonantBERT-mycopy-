title: 'Iceland: Close-up drone footage of volcanic eruption - BBC News'
date: '2021-03-25'
section: General
url: http://www.bbc.co.uk/news/world-56512554
content: |-
  A drone captures spectacular images as lava spews from Iceland's Fagradalsfjall volcano.

  A drone operator cycled through snow for seven kilometres to capture spectacular images as the erupting Fagradalsfjall volcano spewed lava.
