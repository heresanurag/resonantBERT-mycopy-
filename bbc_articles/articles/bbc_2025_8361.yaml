  On Wednesday afternoon, Trump acknowledged that the markets had looked "pretty glum" and that "people were getting a little queasy" – a reflection that undercut some of the bravado he expressed over the past week and could hint at the real reason for his tariff change of course. Earlier in the day, he was on Truth Social, urging people to "BE COOL!" and promising that "everything is going to work out". And on Monday he lashed out at what he called "panicans" - a party based on "weak and stupid people" who weren't patient with his efforts. In the end, it was Trump who made an abrupt change of course. He insisted, however, that his tariff announcement was one that had to be made, and that any economic disruptions reflected a sickness that had been allowed to fester in the American economy. Democrats, meanwhile, painted a less rosy picture. Senate Minority Leader Chuck Schumer accused Trump of "governing by chaos". "He is reeling, he is retreating, and that is a good thing," he said.

  In the end, the thought process behind Trump's decision may not really matter. The reality is that the US is now making nice – or at least nicer - with nations that had faced their retaliatory trade fire, even though Trump is still imposing a 10% across the board tariff that by itself would have been huge news just a few weeks ago. It is enough of a step down for the stock market to bounce back, however, and Trump is now leaning into a trade war with China which he hit with 125% tariffs. That will have global economic repercussions of its own, but it is more in line with recent American foreign policy - including that of Democratic President Joe Biden - as it seeks to constrain Chinese ambitions. The big unknown, however, is whether Trump's actions over the past week – setting allies scrambling and threatening the established global order – will have made such a strategy more difficult to pursue. And in 90 days, when Trump's pause expires, this week's economic drama and uncertainty could begin all over again.

