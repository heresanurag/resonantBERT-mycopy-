title: Taylor Swift/ Travis Kelce romance reaches White House - BBC News
date: '2023-10-04'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-67010457
content: |-
  Pentagon spokesman says he can "neither confirm or deny" reports about the most-talked-about NFL romance.

  News of the most-talked-about fling to reach the NFL has made it as far as the White House.

  During a regular press conference the White House National Security Council spokesman, John Kirby, was asked about the Taylor Swift and Travis Kelce romance.

  He jokingly said he could "neither confirm or deny" reports about the famous duo after Swift was spotted at two Kansas City Chiefs games.
