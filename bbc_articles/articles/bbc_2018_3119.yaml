title: 'France avalanche: Lucky escape for Alps snowboarder - BBC News'
date: '2018-03-08'
section: General
url: http://www.bbc.co.uk/news/world-europe-43323716
content: |-
  Thomas Kray's headcam was recording when the avalanche struck - he survived by activating his safety airbag.

  Snowboarder Thomas Kray had a lucky escape after being caught by an avalanche on a downhill run in Savoie in the French Alps.

  He activated his safety airbag, which allowed him to stay above the crumbling snow.
