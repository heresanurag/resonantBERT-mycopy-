content: |-
  BBC Sport looks at the statistics behind Rafael Nadal's success as the 22-time Grand Slam champion prepares for his final tournament.

  "In this life, everything has a beginning and an end."

  The beginning in question was 23 years ago, while the end is fast approaching.

  At this week's Davis Cup Finals, which start on Tuesday, one of the tennis greats will say goodbye. Rafael Nadal will bring to a conclusion a glittering career.

  BBC Sport looks at the statistics underlining the success of the Spaniard - who will retire as the second-most successful men's singles player of all time.
