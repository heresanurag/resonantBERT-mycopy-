title: Northern agrees to scrap railcard fare prosecutions - BBC News
date: '2024-10-15'
section: England
url: http://www.bbc.co.uk/news/articles/c9dy8l8edpxo
content: |-
  The rail operator says it is working with the government to simplify it price structure.

  The operator said it was working with the government to "simplify its price structure"

  Rail operator Northern is withdrawing all live prosecutions against passengers reported for using railcard discounts for on-peak services where the original fare was below £12. It follows the case of engineering graduate Sam Williamson, who was reported to the operator’s prosecutions and debt recovery department for using his 16-25 railcard for travel on a service to Manchester. Mr Williamson faced prosecution for paying £1.90 less than he should have done despite admitting his error and offering to pay a fine or a new fare - prompting widespread criticism of Northern. The Department for Transport instructed the company to review its ticketing policy to ensure it was clear and fair to passengers and asked it to review the details of such cases.

  The terms and conditions of Mr Williamson's railcard specified the discount was only valid for on-peak services where the original fare was £12 or more yet despite the small-print, he was able to buy a ticket that informed him he could travel at “anytime”.

  Sam Williamson faced prosecution despite admitting his error and offering to pay a fine or new fare

  Northern contacted Mr Williamson, 22, on Friday to inform him his case would be closed after his story was picked up from social media. The publicly owned company has now confirmed it will also review up to 25 historical cases it had prosecuted since 2020. The operator said it was working with the government to "simplify its price structure". “We understand that fares and ticketing across the railway can, at times, be difficult to understand, and we are reviewing our processes for ensuring compliance with ticket and railcard terms and conditions," a statement read. “With regard to recent reported cases involving use of the 16-25 railcard with fares under £12 before 10am, we are withdrawing any live cases and will also look to review anyone who has been prosecuted previously on this specific issue. “We are actively engaged with the government and industry to simplify fares to help customers. “We have withdrawn two cases today and two more are to be withdrawn at the end of the month that are already in the system. "We will ensure that anything coming up for review does not go forward for prosecution."
