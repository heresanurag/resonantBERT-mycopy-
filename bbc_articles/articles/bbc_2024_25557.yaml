  "Honestly I was afraid to be thrust into a world of entertainment with so many eyes on me that I wouldn't know what to do with myself," she said. "I just started taking the time to understand myself, my sound, my boundaries and my vision before thrusting myself into the public eye." After another call from the show's producers earlier this year, Ace said "age and wisdom" convinced her to sign up. She said she only realised "this is really happening" during a sound-check for her blind audition - in which she sang a cover of Aretha Franklin's Ain't No Way.

  She made it through the callbacks round to reach the semi-final

  By the end of her audition all four judges had turned round, with Ace selecting Sir Tom as her coach. Sir Tom said he "loved" Ace's performance, describing it as "refreshing" and "wonderful". "I tried not to think about it in the moment - it was an amazing experience," Ace said. Asked by the BBC what she wanted her music to convey, she said it "tells of a 21st century journey". "I want people to be able to listen and understand my own journey in my life that I've had as a child of an immigrant, as a trans woman and a multicultural person."

  The semi-final of The Voice UK airs on ITV1 at 20:20 BST on Saturday.

