title: 'The Voice: Contestant''s music ''tells a 21st century journey'' - BBC News'
date: '2024-10-19'
section: Oxford
url: http://www.bbc.co.uk/news/articles/cvglxpn3095o
content: |-
  Ace, from Oxford, is one of 12 contestants to have reached the semi-final of The Voice.

  Ace performed a cover of Aretha Franklin's Ain't No Way at her blind audition

  A performer who came to the UK from Vietnam as a teenager has reached the semi-final of TV singing contest The Voice. Ace joined the team of legendary Welsh singer Sir Tom Jones following her blind audition - in which all four of the programme's coaches turned their chairs. The 20-year-old, from Oxford, said her success on the programme thus far had only sunk in after receiving messages from friends and relatives she "didn't even know" she had. She added that she was "just a lowly transsexual with a dream and some high heels" who "has something to say".

  Ace, who grew up in the Vietnamese cities of Hanoi and Hoi An before moving to Oxfordshire, had initially been asked to take part in the show a "couple of years ago" but "politely declined".

