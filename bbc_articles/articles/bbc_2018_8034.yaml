title: Waterspout over Black Sea in Russia - BBC News
date: '2018-07-22'
section: General
url: http://www.bbc.co.uk/news/world-europe-44916480
content: |-
  The rare phenomenon appeared off the coast of a seaside town.

  Footage has been captured of a waterspout, off the coast of a Russian seaside resort.

  The rare phenomenon is a whirling column of air and water.
