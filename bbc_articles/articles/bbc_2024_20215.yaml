title: 'Respite care: Disabled Anglesey woman still has bed built for her age 8 -
  BBC News'
date: '2024-08-28'
section: Wales
url: http://www.bbc.co.uk/news/articles/c4gzrl8120ko
content: |-
  Taylor Crowe's family say the 19-year-old is at risk of falling from her bed and injuring herself.

  Disabled woman uses bed built for her when she was 8

  Taylor Crowe, 19, was born with conditions including severe brain damage, quadriplegia, cerebral palsy and epilepsy

  The family of a young woman living with severe disabilities say she is still relying on a specialised bed made for her when she was eight years old. Taylor Crowe, 19, was born with conditions including severe brain damage, quadriplegia, cerebral palsy and epilepsy, and is in need of beds which would prevent her from falling out and injuring herself. Her mother, Emma Crowe, is now fundraising for a specialised enclosed bed at the family home as well as a portable one, after she was unable to get funding for the latter from their council. Anglesey council said it was aware of the matter but "does not comment on individual cases".

  Emma said her daughter qualifies for respite care, meaning that the family are able to apply for help while they take a break from caring duties - but that without a portable bed Taylor was at risk of getting injured when outside of their home. "It really would be something to be able to have a break," Emma said, adding that she and her husband, Peter, wanted to be able to spend time with their two sons, aged 11 and 16. "We have had all these years we haven’t been able to do anything with our other kids and enjoy our family time," she said. Emma said she hoped that providing Taylor with respite care - and a bed that supports her needs - would allow the other family members to spend time together. "If we wanted to go to Alton Towers with the boys, Taylor would be cared for," she said. Emma added that she did not want to "seem like I'm complaining", but said the situation is often challenging, particularly finding time to spend with the couple's two sons.

  Taylor’s family say she has been "defying the odds from day one"

  She said that for a long time she had been reluctant to accept help for Taylor because "she's my baby". "I've been scared to leave her with other people, but I have to think of my other kids," she said. The family has now set up a fundraising page to try and raise funds for the beds on their own. "If I had the money I would go and buy it all myself," she said. On the GoFundMe page, the family said doctors did not think Taylor would "live this long", but that she has been "defying the odds from day one". Emma said there are "constant challenges" in providing care for Taylor, including taking the whole family out for meals, because many restaurants do not have wheelchair access.
