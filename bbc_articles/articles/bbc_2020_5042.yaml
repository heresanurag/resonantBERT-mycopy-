  A round up of news and updates on the coronavirus pandemic in Wales.

  A trauma consultant in Wales is urging motorcyclists to take care after dealing with the consequences of a string of serious accidents.

  Professor Ian Pallister, from Swansea's Morriston Hospital, said one person had died and others had suffered life-changing injuries in motorbike collisions in the last week.

  “In the eight weeks preceding that, we had none,” said Prof Pallister.

  “It could be that they are now starting to take advantage of the quieter roads and going out and about more.

  “However, just because the roads are quiet does not mean they are any less dangerous.”

  He said motorcyclists should whenever possible heed the message of stay home, protect the NHS and save lives to ease pressure on the NHS.

  “Our theatre capacity is nothing like what it usually is,” he said.

  “We have to prioritise serious injuries and emergencies above everything. Unfortunately that does mean someone else will not get the treatment they have been waiting for.”
