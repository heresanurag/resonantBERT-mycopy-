  Manchester United have a third bid for Chelsea midfielder Mason Mount, worth about £55m, rejected.

  Mason Mount: Chelsea reject Manchester United's third bid of £55m for midfielder Last updated on .From the section Chelsea

  Mason Mount made his debut for Chelsea in 2019 Manchester United have had a third bid for Chelsea midfielder Mason Mount, worth about £55m, rejected. United had warned they would walk away from negotiations with the Blues if the offer was not accepted. Chelsea are thought to want at least £58m plus another £7m in possible add-ons for the England international. However, United feel that figure is excessive as Mount only has a year left on his contract and talks about an extension have stalled. United have previously had bids worth up to £40m and £50m for Mount rejected by their Premier League rivals. It is understood Chelsea have told United they are prepared to meet to resolve the matter.
  • None 'An exceptional player' - what would Mount bring to Man Utd? Red Devils boss Erik ten Hag wants Mount to be his first signing of the summer as he looks to strengthen his side following their qualification for next season's Champions League. Personal terms are not thought to be a problem and United are confident the player wants to make the move to Old Trafford. Mount, who has scored 33 goals in 195 appearances for Chelsea since making his debut in 2019, missed the end of the domestic season with injury as the Blues came 12th - their lowest finish for more than 25 years. He won the Champions League in 2021 with Chelsea and started their 1-0 win over Manchester City in the final. He has also won the Fifa Club World Cup and Uefa Super Cup with the Blues. The 24-year-old has been capped 36 times by England, scoring five goals, and was part of manager Gareth Southgate's squad for the 2022 World Cup in Qatar. Mount came through Chelsea's academy before joining Dutch side Vitesse on loan for the 2017-18 season, scoring nine goals in 29 Eredivisie appearances. The following campaign he was loaned to Derby County, scoring eight goals in 35 Championship games under manager Frank Lampard as the Rams suffered a 2-1 defeat by Aston Villa in the play-off final. Upon his return to Chelsea in 2019, Mount made his breakthrough under the newly appointed Lampard and became a key player at Stamford Bridge. Last month Chelsea appointed former Tottenham boss Mauricio Pochettino as their new manager, replacing interim boss Lampard who took over after Graham Potter was sacked. The situation with Mason Mount has been bubbling for some time and now looks to be coming to an end. Chelsea want to keep Mount but his contract situation, the lack of agreement and Manchester United's long pursuit suggest this is only going to end one way. When Todd Boehly and the Clearlake group took over they made a point of not wanting to let players get into the last two years of their contracts. They had been stung the previous season when they lost Antonio Rudiger on a free to Real Madrid, which left them with a lot to do in the transfer market. Chelsea made two contract offers to Mount last year and the wages would have been comparable to other big-name players at Stamford Bridge. In an attempt to try to find a resolution, Chelsea even discussed with Mount's camp the possibility of extending his contract for a year, increasing his money and giving everyone more time to find a solution - but like the other two offers, it was rejected. The main issue with these negotiations is that Chelsea and the player have not been able to agree on wages.
