title: Fine cancelled for Essex couple who found migrant on motorhome - BBC News
date: '2025-03-17'
section: Essex
url: http://www.bbc.co.uk/news/articles/c74k7my94m3o
content: |-
  A couple are "ecstatic" having been fined £1,500 after they reported a stowaway on their bike rack.

  A couple who were fined £1,500 after they reported a migrant had clung to a bike rack on their motorhome have been told the penalty has been cancelled. The Home Office had ordered Adrian and Joanne Fenton, from Heybridge in Essex, to pay the fine for "failing to check that no clandestine entrant was concealed" in the vehicle as they crossed the English Channel. The couple originally highlighted the case on BBC Three Counties Radio, and Mrs Fenton said she was "ecstatic" about the Home Office's change of heart. "How many more people are going to get caught out exactly the same?" she said.

  The couple said the stowaway was found under a bicycle rack cover

  Mr Fenton, 57, had boarded Le Shuttle from Calais to Folkestone in Kent on the evening of 15 October, after they had been travelling around France. Mrs Fenton, 55, told the JVS show on BBC Three Counties Radio that, after a six-hour drive back to their home, her husband had unzipped the cover of the bicycle rack and found the migrant inside.

  Mrs Fenton said the migrant told police he was 16 and from Sudan

  The couple said they called the police to tell them they had found the stowaway. Mrs Fenton said the boy later informed the police he was 16 years old and from Sudan. They then received an email saying they were being fined. The couple argued he had been clinging to the outside of the motorhome, rather than inside it, and that they did the right thing by calling police.

  Joanne Fenton said they would still be travelling abroad, but would not put a cover on their bike rack

  The pair have now received an email from Border Force, which is part of the Home Office, reducing the fine to £0. Mr Fenton added: "We don't want anyone else to go through what we've gone through. "If someone does call the police because they've got someone discovered in their motorhome, Border Force shouldn't even be considering fining them because everyone's doing the moral and the right thing." He said the Home Office should "be looking at their policy and make sure that it's fit for purpose and not targeting holidaymakers". Mrs Fenton said the couple would still take their motorhome abroad but would be "ultra careful - there'll be no covers over the bike rack".

