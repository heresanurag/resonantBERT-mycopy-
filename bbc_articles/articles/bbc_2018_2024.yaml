title: 'Winter Olympics: Jamaica''s women''s bobsleigh coach Sandra Kiriasis quits
  - BBC Sport'
date: '2018-02-15'
section: Winter Olympics
url: http://www.bbc.co.uk/sport/winter-olympics/43058774
content: |-
  The Jamaican women's Olympic bobsleigh debut is under threat after a coach quits and threatens to withdraw use of the team's sled.

  Sandra Kiriasis won bobsleigh gold at the 2006 Winter Olympics in Turin

  The Jamaican women's historic Winter Olympics bobsleigh debut is under threat after their coach quit and threatened to take the team's sled. German Sandra Kiriasis, an ex-Olympic champion, claims she was forced out when her role was changed, and that she is legally responsible for the sled. Kiriasis wants payment for it but the Jamaica Bobsleigh Federation declined and is disputing she owns the sled. "I've never known such disappointment in this sport, in my life," she said. Kiriasis said she had to quit after refusing to change roles from driving coach to track performance analyst, which would have given her no access to the athletes. The sled situation remains unresolved, with the JBF denying their team will have to pull out of the event. Kiriasis, who won Olympic gold in 2006, said it was her contacts which led to the team securing the sled. Jazmine Fenlator-Victorian and Carrie Russell are hoping to become the first Jamaican women competitors - 30 years after the Jamaican men, who inspired the film Cool Runnings, made history in Calgary.

  Jamaica's Jazmine Fenlator-Victorian and Carrie Russell finished seventh in a World Cup race in December

  The team are due to start official training on Saturday before their heats on Tuesday and Wednesday. Kiriasis said: "The athletes have told me they don't understand why this has happened as they have no problem with me and we have a good relationship." Jamaica Bobsleigh said: "Sandra Kiriasis has elected not to continue her position. We are deeply disappointed in her decision to leave the programme. "We thank her for her invaluable contribution and contributing to the success of Jamaica's first female bobsled Olympic appearance. "Ms Kiriasis' departure will not impact JBSF or its athletes' performance." Jamaica recorded their highest finish in a World Cup race in Winterberg in Germany in December, finishing seventh after switching from a Japanese sled to the one currently under dispute.

  The whole situation is a complete mess. This will have an effect on the Jamaican team, whether because they have lost their world-class coach or both coach and equipment. The most important race in a lifetime could be jeopardised by the internal bickering within the Jamaican Bobsleigh and Skeleton Federation.

