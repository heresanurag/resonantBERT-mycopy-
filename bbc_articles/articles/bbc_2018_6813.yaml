id: bbc_2018_6813
title: 'Zimbabwe: Exiled white farmers return - BBC News'
date: '2018-06-22'
section: General
url: http://www.bbc.co.uk/news/world-africa-44577569
content: |-
  Rob Smart was driven from his farm under Robert Mugabe's rule and has now been allowed back by the Zimbabwean government.

  Many white farmers in Zimbabwe were forced out of their land by supporters of President Robert Mugabe.

  But now the new government might give some of them permission to return.
