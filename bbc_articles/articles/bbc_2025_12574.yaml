  In 2015, Iran agreed a long-term deal on its nuclear programme with a group of world powers after years of tension over the country's alleged efforts to develop a nuclear weapon. Iran had been engaging in talks with the US this year over its nuclear programme and was scheduled to hold a further round when Israel launched strikes on Iran on 13 June, which Israeli Prime Minister Benjamin Netanyahu said targeted "the heart" of Iran's nuclear programme. "If not stopped, Iran could produce a nuclear weapon in a very short time," Netanyahu claimed. Israeli air strikes have destroyed Iranian military facilities and weapons, and killed senior military commanders and nuclear scientists. Iran's health ministry said on Saturday that at least 430 people had been killed, while a human rights group, the Human Rights Activists News Agency, put the unofficial death toll at 657 on Friday. Iran has retaliated with missile and drone strikes against Israel, killing 25 people including one who suffered a heart attack.
