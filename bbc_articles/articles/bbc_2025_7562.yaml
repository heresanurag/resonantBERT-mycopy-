title: Youngest London Marathon runner celebrates birthday on race day - BBC News
date: '2025-04-26'
section: Hull & East Yorkshire
url: http://www.bbc.co.uk/news/articles/clyw9e3zpwko
content: |-
  Lucy, from Hull, is celebrating her 18th birthday by running the 2025 London Marathon on Sunday.

  Lucy will run the London Marathon in memory of her mother, who died of cancer

  The youngest participant in the 2025 London Marathon will celebrate her 18th birthday on race day. Lucy, from Hull, will run her first marathon on Sunday alongside her dad to raise money for Macmillan Cancer Charity in memory of her mother, Clare, who died from cancer when the teenager was nine years old. The 17-year-old said: "How many people can say they spent their 18th birthday running the London Marathon? It's going to feel like a massive achievement for me once it's all done." Event organisers said it had seen an increase in the number of young adults taking part in the race in recent years.

  Lucy and her dad Chris take part in a run ahead of the London Marathon

  Lucy decided to take on the 26.2-mile challenge with her dad after watching last year's event on television. She said: "I'm excited and definitely nervous." The youngster has spent time training for the race and admitted long-distance running had been a "struggle", but said she had found a "passion". "To get where I am today has been hard but we got there," she said. "It's all about pushing through those hard days to prove to yourself and others that you can do anything you put your mind to."

  More than 56,000 people are expected to take part in the 45th London Marathon, according to the organisers. On race day, Lucy will be wearing a Macmillan top with the letters 'MUM' on the back. "It's all about her," said Lucy. Her dad, Chris, said he was running in memory of his mother Joan, who died from cancer in 2023. "It will be a special moment for us both to cross the finish line together," added Lucy.
