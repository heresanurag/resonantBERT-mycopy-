  After four years of The Hundred, outside investment is coming and the tournament could look very different come 2025.

  What next for The Hundred?

  More than two million people have attended matches since The Hundred began in 2021

  Tradition is not a word usually associated with The Hundred. But the sight of the men's and women's champions standing side by side on the Lord's outfield, enormous trophies held aloft as fireworks go off around them, has become a fixture of the British cricketing summer. With the fourth edition of the tournament at an end, though, and stakes in all eight teams set to be sold this autumn, there is a sense of the unknown surrounding its future. What is certain is The Hundred does have a future. The England and Wales Cricket Board (ECB) announced that 540,000 tickets were sold for this year's tournament, taking the total beyond two million over the first four years. Of those, more than a million attended women's games and there were record crowds for women's matches at seven of the eight grounds used in The Hundred in 2024. For all that the competition continues to split opinion, confirmation that 41% of tickets this year were sold to families and 30% to people new to cricket suggests it has been successful in its aim of bringing people to the sport. Despite that, TV viewing figures were down on previous years. Although being up against the Olympics for two weeks in the middle of the tournament, perhaps that is to be expected - and the BBC's coverage of the men's final still attracted almost half a million more viewers than the 2023 final.

