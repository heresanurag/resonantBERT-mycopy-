  One way to ward them off would be to lose the draft system and then set salaries for each contract in favour of an IPL-style auction. In terms of competitiveness though, the draft has worked well as the two finalists in the women's competition this year would attest. Both Fire and Spirit struggled in the early years but, similarly to US sports, high draft picks have enabled them to reshape and develop their squads to compete. Another sign of that competitive balance is the number of close games this year, including three ties and the tournament's first Super Five in the men's Eliminator. Whether anything is done that might alter that is just another question as yet unanswered. We know the ECB will retain ownership of the competition itself and there is no indication The Hundred will expand beyond its existing eight teams until at least the end of the current broadcast cycle in 2028. In theory, that locks in the 100-ball format for another four years as well. But given it has not been adopted elsewhere and the phenomenon that is T20 cricket remains, the prospect of adding those extra 20 balls per innings, losing five-ball sets in favour of six-ball overs and suchlike will always be lurking. The forthcoming changes, though, have the potential to put The Hundred front and centre again.
