  Daniel Halliday was "jumping waves with his big brother" when he disappeared, his family said

  A body found by the coastguard was 14-year-old Daniel Halliday who went missing after a swim, police have confirmed. The teenager's family said he had been "jumping waves with his big brother" when he disappeared in strong currents at Crosby Beach, Merseyside, on 30 June. His body was discovered on Monday across the bay at New Brighton. Following forensic examinations the body has now been formally identified, Merseyside Police said.

  The force said officers were supporting his family. His death is not being treated as suspicious and the case has been referred to the coroner’s office, a statement added. Daniel's family previously said he was "a loving son, brother, cousin, nephew and grandson" and they were all devastated.
