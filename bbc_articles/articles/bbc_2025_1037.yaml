title: 'ICC Champions Trophy: Ben Duckett passed fit for England after groin problem
  - BBC Sport'
date: '2025-02-15'
section: England
url: http://www.bbc.co.uk/sport/cricket/articles/cjw4jqqd8e5o
content: |-
  England opener Ben Duckett is passed fit to take part in the Champions Trophy after a scan on a groin problem.

  Duckett is England's first-choice opener in all three formats

  England opener Ben Duckett has been passed fit to take part in the 50-over Champions Trophy, which starts next week in Pakistan. Duckett had an issue with the left side of his groin during the heavy defeat by India in the third one-day international in Ahmedabad on Wednesday. But scans have given the 30-year-old the all-clear from injury. England travel from the United Arab Emirates to Pakistan on Tuesday and play Australia in their opening group game in Lahore on Saturday, 22 February. England will also play South Africa and Afghanistan in their group games.

  Brendon McCullum's side go into the tournament on the back of a 3-0 ODI series defeat by India and four losses from five T20s against the same opponents. They have already lost Jacob Bethell to a hamstring injury with the 21-year-old replaced by Tom Banton. Wicketkeeper Jamie Smith has not played since the third T20 on 28 January because of a calf injury while there are also concerns over Brydon Carse's toe issue, a cut to Jofra Archer's hand and a hamstring niggle affecting Jamie Overton.
