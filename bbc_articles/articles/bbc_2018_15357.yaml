  What the managers said

  "We respect everybody. We've not qualified for a major tournament for a long, long time, so we can't be going in saying we will easily qualify.

  "It's a tough challenge ahead but one I think we can achieve. If we play to the level we have shown in the past month, I believe we will have a chance."

  "Everybody in the pot we were in, we all were thinking we would get Netherlands and Germany after those two had been drawn together. I laughed when it did happen - but then the screen flashed up to say we were being shifted.

  "There was a collective sigh of relief not being in the other group but it's hardly going to be easy.

  "I'm not suggesting for one minute that Switzerland and Denmark will be easy. Switzerland are one of best teams in Europe and Denmark beat us in a play-off for World Cup 2018 qualification and in the Nations League.

  "I'm sure it will be eventful, it's really exciting. I am really honoured and privileged to be back, now we can get our teeth into it."

  "It could be better, it could be worse. It's good that we are in a five-team group, it's masses better.

  "Croatia have an outstanding player in Luka Modric but also some very good players as well. In the same part of the world Slovakia also, I don't know an awful lot about Hungary but obviously we will do our homework over the coming months.

  "Looking back at Euro 2016, it's about challenging the players to climb that mountain again. It had a massive effect and we want to be back there. Once you get a taste of that you want some more."

  "It's a tough, tough challenge, there's no getting away from that, but we have to remain positive.

  "We are are a developing team, we've proven ourselves more than capable of playing the best teams in the second tier of European football, now we will have to play two of the top tier again and believe we can do as well as we can.

  "One big result at home can build momentum and create belief - that is what we will be needing in this group."

  "There were some obvious fixtures, like Germany in pot two and Serbia in pot three, that could have made it a lot tougher, but I've been involved in England games long enough to know that away from home especially, where there will be an incredible atmosphere, these are games you have to get right in preparation and mentality.

  "That will be the biggest issue for us in preparing for those games.

  "The nice thing for me is that now we've got an 18-month period where the motivation is high, where we've got not only a Nations League semi-final to look forward to next summer, but this group, which is about getting through to the Euro 2020 finals and earning a right to play those finals at Wembley."

  England and manager Gareth Southgate will has made the traditional - and understandable - cautious noises after the draw but nothing can disguise the fact they have been dealt a kind hand in Dublin.

  It is a hand they have helped fashion for themselves with their excellent performances against Spain and Croatia in the Nations League but, realistically, serious questions would be asked if England failed to qualify.

  England, currently, are in a different phase of their progress to everyone else in their group and, with Germany avoided, England and Southgate can have no complaints.
