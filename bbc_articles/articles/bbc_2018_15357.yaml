title: 'Euro 2020 draw: England avoid Germany but Northern Ireland face Germans &
  Netherlands - BBC Sport'
date: '2018-12-02'
section: General
url: http://www.bbc.co.uk/sport/football/46418521
content: |-
  England avoid Germany in the draw for the Euro 2020 qualifiers but Northern Ireland must face the three-time winners and the Netherlands in Group C.

  England boss Gareth Southgate says his side can look forward to an "even more exciting next 18 months" after learning who they will face in Euro 2020 qualifying.

  The 2018 World Cup semi-finalists were drawn with the Czech Republic, Bulgaria, Montenegro and Kosovo in Group A, with fixtures to run between March and November next year.

  With England also to contest the inaugural Nations League finals in June, Southgate said the "next stage" for his team was "to handle expectation and make sure we keep playing at a high level".

  He told BBC Sport: "We've got another semi-final to look forward to this summer, there are boys who have won at youth level on the world stage and are pushing this group from underneath.

  "We've had a really exciting calendar year, and there is potential for the next 18 months to be even more exciting."

  Northern Ireland have what looks like one of the most difficult draws, with Germany and the Netherlands in Group C.

  Germany dropped into pot two for the draw in Dublin after relegation in the Uefa Nations League, and as well as them and the Dutch, Michael O'Neill's side will also face Estonia and Belarus.

  "It's very cruel, possibly the worst draw we could have got," O'Neill said.

  "We need to produce some of the biggest results in Northern Ireland's history, and we believe we can do that."

  The Republic of Ireland had initially been drawn in Group C but were handed a reprieve as the group already contained two of the 12 host nations for Euro 2020.

  They were therefore placed in Group D instead, along with Switzerland, Denmark, Georgia and Gibraltar.

  Fellow hosts Scotland joined Belgium, Russia, Cyprus, Kazakhstan and San Marino, while Wales will meet World Cup finalists Croatia, Slovakia, Hungary and Azerbaijan.

  The Euro 2020 qualifiers will take place between March and November 2019, with the winner and runner-up of each group going through directly.

  The qualifying process is condensed because of this year's Nations League group games, with England and Scotland guaranteed a Euro 2020 play-off place - should they fail to qualify via their regular qualifying group - after winning their Nations League sections.

  Wembley will stage both the semi-finals and the final of Euro 2020, as well as three group games and a last-16 match.

  Glasgow's Hampden Park and Dublin's Aviva Stadium will each host three group games and a last-16 match.

  England had to be placed in a five-team group, as did Portugal, the Netherlands and Switzerland, to ensure they have free dates for the Nations League finals in June 2019.
