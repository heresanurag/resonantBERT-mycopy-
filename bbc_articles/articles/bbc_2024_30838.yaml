title: 'Harlesden: Woman killed and two injured in shooting - BBC News'
date: '2024-12-15'
section: London
url: http://www.bbc.co.uk/news/articles/cj0rmjdnzndo
content: |-
  The woman died at the scene, while one of two men shot is in a critical condition in hospital.

  Woman killed and two injured in London shooting

  A woman has been killed and two men have been injured in a shooting in north-west London. The Metropolitan Police said officers were called to reports of a shooting at about 21:15 GMT on Saturday in Harlesden where they found the woman, believed to be aged in her 40s. She died at the scene. One of the two men, both aged in their 30s, is said to be in a critical condition. The other man's injuries are not life-threatening. A local resident, who did not wish to be named, said they heard five gunshots in a row on Saturday night. No arrests have been made and a murder investigation is under way.

  A man who lives near the scene of the shooting told the PA News agency: "I was inside the church and someone came in and said there had been a shooting. "I looked outside and it was pandemonium."

  The River of Life Elim Pentecostal Church on Gifford Road is behind the police cordon. Another witness who lives in the area and did not wish to be identified told BBC News: "I heard the gun shots and then when I opened the window I saw one guy running." He said one man had been hit in the leg and the shots had been fired from a car. A neighbour, who lives on Gifford Road, said her daughter had come home 10 minutes before the shooting. The woman added that the victim did not live in the area. "My son thought there were fireworks, then I heard my neighbour screaming and I realised there was a shooting," she said. "It's crazy, it's sad. It's scary, it does not feel safe. "I've lived here since 2008 and I've never heard anything like this before."

  One neighbour described the scene as "pandemonium"

  Supt Tony Josephs said: "This is a truly shocking incident that has left a woman dead and two others injured, and I understand the concern this will cause the local community and those across London. "I want to reassure people that a team of experienced detectives are already working at pace to piece together the events of last night and identify whoever was responsible for this heinous act of violence." He appealed for anyone with information about the shooting to contact police. Dawn Butler, the MP for Brent East, said she was "devastated to learn of the murder" and also urged anyone with information to contact the police. The junction of Gifford Road and Creukhorne Road has been cordoned off while officers continue their investigation.
