id: bbc_2018_7809
title: 'Adenomyosis: Pain ''10 times worse than childbirth'' - BBC News'
date: '2018-07-17'
section: General
url: http://www.bbc.co.uk/news/health-44851478
content: |-
  Three women describe living with the intense pain and heavy periods caused by adenomyosis.

  It’s a condition that few people have heard of, is very hard to diagnose, but affects millions of women worldwide.

  For some, a hysterectomy is the only cure.
