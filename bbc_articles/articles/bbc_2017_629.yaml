id: bbc_2017_629
title: Egypt activist 'tortured for his T-shirt' - BBC News
date: '2017-01-26'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-38742237
content: |-
  Mahmoud Hussein, 21, describes how he came to be arrested in Egypt, and what happened to him in detention.

  It is six years since the outbreak of the 18-day revolution in Egypt which swept its leader, Hosni Mubarak, from power.

  Human rights campaigners say the situation in the country is now far worse than before the uprising, and Mahmoud Hussein, 21, is one of thousands who have been detained in recent years under Egypt's latest strongman, President Abdul Fattah al-Sisi.

  He told the BBC's Orla Guerin how his ordeal began.
