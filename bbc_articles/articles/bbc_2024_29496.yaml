  US-based doctor James Hook tells the BBC he has seen cases of young people taking up smoking after vaping. He thinks the way smoking is glamorised by celebrities means cigarettes "give young people a certain credibility those older than them do not have to work as hard for". He adds that many of them are "emulating older people that are considered sophisticated, trendy or appealing".

  Dr Hook also says that UK authorities taking a tougher stance on smoking might be encouraging people to rebel. "There will always be individuals who challenge the status quo so it should come as no surprise a ban on something only adds fuel to the fire of rebellion and a threat to a person's sense of independence." The government is planning one of the toughest smoking laws in the world which would eventually ban the sale of cigarettes in the UK as the new law will effectively raise the legal age people can buy cigarettes by one year every year. With the government's intent on stamping out the deadly habit, the resurgence of the cigarette - and the cigfluencers - may be more of a passing trend than a lasting cultural shift, particularly as its appeal is less about the act itself and more about the aesthetic and symbolism it represents.
