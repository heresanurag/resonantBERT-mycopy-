  ParalympicsGB arrive at the opening ceremony of the 2024 Paralympics in Paris.

  Watch the moment Great Britain's team arrive at the opening ceremony for the 2024 Paralympic Games in Paris, led by wheelchair tennis player Lucy Shuker and wheelchair basketball player Terry Bywater.

  The main ceremony was held at Place de la Concorde, following a parade along the Champs-Elysees from the Arc de Triomphe.

