title: Man arrested over Grindr carjack robberies in Salford and Bury - BBC News
date: '2019-03-27'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-47727764
content: |-
  The 21-year-old suspect is held after two men were stabbed and a third was threatened.

  The latest victim was stabbed repeatedly in his car on Bolton Road, Pendlebury

  A man has been arrested after three attempted robberies on users of the Grindr dating app.

  Three men were targeted in Salford and Bury by a man who demanded their car keys at knifepoint.

  In the most recent attack, a man in his 20s was stabbed several times by his "date" in his car in Pendlebury.

  Greater Manchester Police (GMP) said a 21-year-old man had been arrested on suspicion of robbery and section 18 assault and remained in custody.

  The latest victim had parked his car, with his "date" inside, in Bolton Road at about 17:45 GMT on Tuesday when the attacker demanded he hand over his car keys.

  He then stabbed him a number of times before running off towards Birch Drive and High Bank Road. The victim is in a serious condition in hospital.

  GMP believe the same man carried out two earlier attempted carjackings on Monday.

  A man in his 50s was threatened at his home in Irlam o' th' Height at 19:00 by an offender with a knife who demanded he hand over his car keys, but fled the scene when the vehicle failed to start.

  One hour later in Prestwich, a man in his 40s had a knife held to his throat on Bury Old Road by an attacker who demanded his car keys.

  The victim received cuts to his throat, back and forearm and was taken to hospital for treatment before he was later discharged.

  Ch Insp Amanda Delamore said: "Our thoughts remain with the three victims who have all been left incredibly shaken by their ordeals and officers will continue to provide them with support at this distressing time."

