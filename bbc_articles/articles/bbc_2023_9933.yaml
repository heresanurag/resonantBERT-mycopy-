title: Berlin 'lioness' on loose 'is a wild boar' - BBC News
date: '2023-07-21'
section: General
url: http://www.bbc.co.uk/news/world-europe-66265769
content: |-
  Police in Germany earlier said they were treating a video circulating on social media as "authentic".

  German police have called off a search for what was suspected to be a lioness on the loose in Berlin. A local mayor said that they now believed that the animal that was causing alarm was a wild boar.

  Earlier, police said they believed that a video circulating online was "authentic" and that a "big cat" was also seen by two officers.

  The video appears to show the animal in a heavily forested residential area of Kleinmachnow.

