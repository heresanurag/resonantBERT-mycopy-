content: |-
  The Labour leader endorses Diane Abbott to be Labour candidate in Hackney North and Stoke Newington.

  Diane Abbott free to stand for Labour, says Starmer

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Keir Starmer says Abbott 'free' to stand for Labour

  Labour leader Sir Keir Starmer has said Diane Abbott is "free to go forward as a Labour candidate", ending days of speculation about the veteran left-winger's future. Ms Abbott, the first female black MP, had claimed she had been banned from standing for Labour at the general election on 4 July. Sir Keir has now given Ms Abbott his blessing to stand in Hackney North and Stoke Newington - a seat she has represented since 1987. Labour's National Executive Committee has the final say on Ms Abbott's candidacy - but a senior party source told the BBC the group will not block her from standing.
  • None 'Labour wants to exclude me from Parliament' - Abbott

  Ms Abbott said: ‘“I will not be making any comment until next week but the narrative looks positive.” However, speaking at a rally outside Hackney Town Hall on Tuesday, she said: "I promise you that as long as it is possible, I will be the Member of Parliament for Hackney North and Stoke Newington." A Momentum spokesperson said: "Starmer tried to force her out. She held firm - and won. "You come at the queen, you better not miss." The last week has been dominated by a stand-off between Ms Abbott and the Labour leadership. Sir Keir had repeatedly dodged questions on Ms Abbott's future, even after she appeared to confirm reports in the Times newspaper, external that she had been blocked from standing as a Labour candidate despite having the whip restored. On Thursday deputy Labour leader Angela Rayner raised the pressure on Sir Keir, telling Sky News: "I don't see any reason why Diane Abbott can't stand as a Labour MP." Prime Minister Rishi Sunak said the episode showed "Angela Rayner is in charge" of Labour, instead of Sir Keir. "If he's given into Angela Rayner on this, imagine what he'll give into when it comes to the union's demanding higher taxes, or indeed weakening our defence and security," he said. An SNP spokesman said "the way Diane Abbott and other progressive candidates have been treated is shameful". Lib Dem Leader Sir Ed Davey said: "Candidate selection for other parties is not an issue I get into." Ms Abbott was suspended from Labour last year after suggesting Jewish, Irish and Traveller people experience prejudice, but not racism "all their lives", sparking a long-running process which saw her sit as an Independent MP. She apologised on X, formerly known as Twitter, and withdrew her remarks.

  Labour is in a bitter row with accusations that Sir Keir is carrying out a "purge" of left-wing candidates and placing his supporters in winnable seats. Ms Rayner has argued Sir Keir is not acting "in a factional way". Former Brighton MP Lloyd Russell-Moyle told the BBC he had been made a "sacrificial lamb" after Labour suspended him following a complaint about his behaviour. Overnight, Mr Russell-Moyle was replaced by Chris Ward, a former advisor to Sir Keir, as Labour's candidate for Brighton Kemptown. The BBC does not know the nature of the complaint made against Russell-Moyle. On Wednesday after he was suspended, a Labour Party spokesperson said: "The Labour Party takes all complaints extremely seriously and they are fully investigated in line with our rules and procedures, and any appropriate disciplinary action is taken." Speaking exclusively to Politics Live on BBC Two Mr Russell-Moyle claimed Labour were giving preferential treatment to Sir Keir's allies. When asked about whether there is a cull of left-wing candidates, Mr Russell-Moyle said: "Quite clearly the timing for me is highly suspicious. "The appointment of the person replacing me is highly suspicious. "It would be better if the party made sure that if they are replacing MPs at the last-minute they are replacing MPs that are similar in terms of ideological belief or from local roots." Shama Tatler, of the Starmer supporting Labour to Win group, has been selected as Labour candidate for Chingford and Woodford Green after Faiza Shaheen was barred, despite having already launched her campaign. Ms Shaheen, who fought the seat in 2019, has said she is considering legal action over the move and released a statement last night accusing some within Labour of a “systematic campaign of racism, Islamophobia and bullying”.
