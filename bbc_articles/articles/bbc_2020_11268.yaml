  Joe Biden outlined how he would tackle Covid-19 as President Trump goes on the attack at a Florida rally.

  Is President Trump right about US carbon emissions?

  In the final presidential debate last night, Donald Trump said the US has had the "best carbon emission numbers" in the last 35 years. He went on to claim that countries such as China, Russia and India were "filthy". Last year, the US's carbon emissions per capita were at their lowest point in the past 35 years - if this is what Trump was referring to. The data shows that, in recent decades, total carbon emissions have been on a general downward trend, with some fluctuations. There's been a shift to both gas and renewable energy sources, and away from coal, largely because of cost. Trump would have burned more coal (which would have increased emissions), but it proved uneconomic to do so. As far as other countries are concerned, China has higher total CO2 emissions than the US, although emissions from the US are still much bigger than both India and Russia. And as far as emissions per capita go, the US is still ahead of China, Russia and India. Emissions from the US per capita in 2017 were over 16 tonnes while India's were the lowest – at fewer than two tonnes.
