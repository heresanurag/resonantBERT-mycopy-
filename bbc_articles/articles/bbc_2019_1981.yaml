title: 'Baftas 2019: The Favourite takes home seven awards - BBC News'
date: '2019-02-11'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-47157927
content: |-
  The Favourite is the big winner at the Bafta film awards but Alfonso Cuaron's Roma picks up best film.

  Olivia Colman was named best actress - can she repeat it at the Oscars?

  The Favourite dominated the Bafta film awards on Sunday night, picking up seven awards out of 12 nominations.

  Among its haul were best actress for Olivia Colman and best supporting actress for Rachel Weisz.

  Mexican film Roma won best film, while Rami Malek won best actor for playing Freddie Mercury in Bohemian Rhapsody.

  Colman, who starred as Queen Anne in The Favourite, said the team were having "an amazing night" and would be enjoying several drinks later.

  Speaking about her co-stars Rachel Weisz and Emma Stone, Colman said: "As far as I'm concerned, all three of us are the same and should be the leads, and it's weird we can't do that.

  "This is for all three of us. It's got my name on it but we can scratch on some other ones."

