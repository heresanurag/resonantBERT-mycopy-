title: Man charged with Manor House murder and robbery of 87-year-old - BBC News
date: '2025-05-10'
section: London
url: http://www.bbc.co.uk/news/articles/c5y858k2vrgo
content: |-
  It comes after an elderly man was attacked near a children's playground in north London on Tuesday.

  Man charged with murder and robbery of 87-year-old

  The force is appealing for witnesses to contact them

  A man has been charged with murder and robbery after an 87-year-old died in north London. Emergency services were called to Goodchild Road at about 18:00 BST on Tuesday, where the elderly man was found and taken to hospital with fatal injuries. Peter Augustine, 58, from Hornsey, was arrested on Thursday and appeared before Willesden magistrates on Saturday. He has been remanded in custody and is due at the Old Bailey on 13 May. In court, the victim was named as John Mackey, a resident of Manor House, although the Met Police said formal identification was still under way.

  Mr Mackey's next of kin are being supported by officers, the force added. It is appealing for witnesses to contact them.
