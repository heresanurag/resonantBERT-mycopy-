  Since Tokyo, the squad's results have slowly turned for the better. Successive world bronzes in the team sprint came in 2021 and 2022, but 2023 was the year they really caught the eye. At the World Championships in Glasgow, Finucane won sprint gold while she, Capewell and Lauren Bell won silver in the team sprint. In Apeldoorn in January, Marchant - who is racing quicker then ever before - became the first British woman to be crowned European champion in the 500m time trial, meaning Great Britain currently boasts the European champions in the event in the elite, under-23 (Rhianna Parris-Smith) and junior (Georgette Rand) categories. Looking ahead to Paris, Olympic qualification will be confirmed in April but Finucane currently tops the UCI rankings for the individual sprint, while Great Britain lead the team sprint rankings. For the first time in 12 years, Team GB heads to an Olympics among the favourites for the women's team sprint gold, with exciting medal chances across all the sprinting events. "I think it's such a privilege that we are in this place and we just want to keep the momentum moving towards Paris," said Finucane. "I am really confident they're going to do well," says Park. "It's actually a joy to be part of their journey, because it's great to see them enjoying their riding, feeling that they're in control of their programme, and they're writing themselves into the history books. "Other people are trying to help create and support what they want, but ultimately those women are doing it for themselves."

