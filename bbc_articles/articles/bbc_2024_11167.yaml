  Former President Jacob Zuma has made a huge impact in the election

  South Africa's former President Jacob Zuma, 82, is back with a vengeance. He was ousted by the ANC in 2018, amid allegations of corruption, which he denied. He was succeeded by President Cyril Ramaphosa. About three years later, he was sentenced to 15 months in prison for contempt after he defied a court order to appear before an inquiry looking into corruption during his nine-year presidency. President Ramaphosa released Mr Zuma after he served only three months of his sentence in an attempt to placate him and his angry supporters. But he is likely to rue the decision, as Mr Zuma returned to the political frontline under the banner of a new party, uMkhonto we Sizwe (MK), or Spear of the Nation. Results released so far suggest that the ANC has bled support mostly to MK, which could take control of KwaZulu-Natal province. If this is borne out by the final result, Mr Zuma would become the political don of the province and it would give him a base from where to plot Mr Ramaphosa's downfall - his key objective. His conviction means he is barred from taking a seat in the National Assembly but he is still able to pull the strings from behind the scenes. MK's growth is extraordinary. It was registered only last September, with Mr Zuma announcing in December that he was joining it as he could not vote for a Ramaphosa-led ANC. Since then it has shaken up South African politics in a way that no new party has done in such a short period since the end of apartheid. The South African Mail & Guardian newspaper's KwaZulu-Natal correspondent, Paddy Harper, said that MK had not only eroded the ANC's support, but also that of the radical Economic Freedom Fighters (EFF), South Africa's third-biggest party until now. The results so far suggest that MK is challenging it for third spot in the national parliament.
