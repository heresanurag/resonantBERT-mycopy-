title: Armed police at Westminster crash site - BBC News
date: '2018-08-14'
section: General
url: http://www.bbc.co.uk/news/uk-45180971
content: |-
  Officers responded after a vehicle crashed into security barriers shortly after 07:30 BST.

  A man has been arrested after a car crashed into security barriers outside the Houses of Parliament, Scotland Yard say.

  A number of pedestrians have been injured, the Met Police said.
