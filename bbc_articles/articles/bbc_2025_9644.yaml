content: |-
  Kerri Pegg was arrested in her Wigan flat after having an affair with a Liverpool drug boss.

  Bodycam footage shows the moment police officers arrested Kerri Pegg, who has been jailed for nine years after having a relationship with a Liverpool crime boss.

  Pegg had climbed the career ladder from graduate to governor at HMP Kirkham in Lancashire in six years.

  But her trial heard she "didn't play by the rules" and began a relationship with inmate Anthony Saunderson, helping him secure day release.

  Pegg, from Up Holland in Lancashire, was convicted of misconduct in public office and possession of criminal property.

  Police raided Pegg's home in Orrell, Wigan and found a toothbrush with Saunderson's DNA on it.

