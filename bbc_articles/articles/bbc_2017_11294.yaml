content: |-
  Live updates after an aircraft and helicopter crashed in mid-air over Buckinghamshire.

  As we've been reporting, police say it is "too early to tell" what caused an air crash on the Waddesdon Estate in Buckinghamshire.

  Supt Rebecca Mears from Thames Valley Police said: "Our priority has to be with the next-of-kin, speaking to them and letting them know.

  "We anticipate being here until about Monday morning, potentially longer. We do not rush these things - it's really important we do a meticulous investigation and really thorough to get to the bottom of what's happened here."

  Forensic tents (pictured) have been put up by police at the scene.

  The Press Association reports that a Notice to Airmen had been issued to warn pilots the Wycombe Air Park's air traffic control services would be closed during three 30-minute periods on selected days between 7 - 30 November, due to a "staff shortage".

  The crash occurred about half an hour after the latest closure was due to end, it said.
