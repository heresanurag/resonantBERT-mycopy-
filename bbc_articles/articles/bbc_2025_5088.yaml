title: Man caught with stolen Cadbury Creme Eggs stuffed inside jacket - BBC News
date: '2025-03-27'
section: General
url: http://www.bbc.co.uk/news/videos/cm2jmlzgyrvo
content: |-
  A staff member flagged down a police car and found the chocolate eggs in his jacket, police say.

  Police have released footage of the moment a man was found with £220-worth of Cadbury Creme Eggs stuffed inside his jacket and bag.

  Deon De Groot, 26, went into Tesco Express in Welland Road, Dogsthorpe, Peterborough, at about 11:40 GMT on Saturday and stuffed the chocolate into the bag.

  Cambridgeshire Police said a staff member flagged down officers in a passing police car who found boxes of the chocolate eggs in his jacket. The bag was also found dropped nearby.

  De Groot, of no fixed address, was sentenced to 12 weeks in prison, suspended for a year, at Peterborough Magistrates' Court.

  He was banned from entering Cambridgeshire for the next three months.
