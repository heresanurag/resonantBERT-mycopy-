title: Avanti West Coast workers to strike over Christmas - BBC News
date: '2024-12-11'
section: Business
url: http://www.bbc.co.uk/news/articles/c1j0pn23ryjo
content: |-
  Train managers have voted for walkouts on 22, 23 and 29 December in a row over rest days.

  Avanti West Coast train managers have voted to strike for three days over the Christmas period. The RMT union said that walkouts have been scheduled for 22, 23 and 29 December for Avanti services after rejecting the train company's proposals for "rest day working arrangements". Train managers usually work a 41-hour week but due to staff shortages can be asked to work on their days off - but the RMT said that the current arrangements were "unacceptable". A spokesperson for Avanti West Coast said that at "one of our busiest and most important times of the year" customers "will now face significant disruption because of these strikes".

  Rail services on all three days are expected to be limited. A revised timetable for 22 and 23 December will be made available on Saturday 14 December. Around 300 train managers are expected to join the walkout. The strikes have been announced weeks after RMT members working at a number of rail companies accepted a pay rise of 4.75% for the last financial year and a 4.5% increase for 2024-25. At the time, the then transport secretary Louise Haigh said it would "ensure a more reliable service by helping to protect passengers from national strikes, and crucially, it clears the way for vital reform and modernising working practices to ensure a better performing railway for everyone". RMT general secretary Mick Lynch said: "Train managers are being treated unfairly compared to senior managers, who receive significant payments for covering these roles. "Our members have had enough and this strike action demonstrates their determination to win a fair deal." Avanti West Coast said: "We are disappointed the RMT have voted to decline the very reasonable offer made to them to resolve the rest day working dispute and prevent inconvenience to those many people who will be travelling on the West Coast Main Line over this time. "We will continue to work with the RMT to resolve the dispute." Mr Lynch said the union remained ready to reach a settlement, adding: "We urge management to show they are serious about resolving this dispute." Since the middle of 2022, rail travel had been disrupted by industrial action as the RMT and the union Aslef sought better pay and conditions for their members. The previous Conservative government said changes to working practices were required in return. The Labour government secured a deal with the unions after winning the general election.
