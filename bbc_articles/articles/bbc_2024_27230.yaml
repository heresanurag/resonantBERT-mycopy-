title: 'Mary Ward: Woman reported violent crime weeks before killing - BBC News'
date: '2024-10-09'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cy0g394y63eo
content: |-
  Mary Ward, 22, was found dead by police officers at her home in Belfast on 1 October.

  Mary Ward was found dead at her home by police

  A woman who was found dead in south Belfast was the victim of a violent crime in recent weeks, the police ombudsman has said. The body of Mary Ward, 22, was found by police at her home in Melrose Street on 1 October. The Police Service of Northern Ireland (PSNI) has since started a murder investigation. Officers added following a review of its previous engagements with Ms Ward the case had been referred to the ombudsman.

  "Whilst at this time there is no suggestion of individual criminality or misconduct, we are nonetheless concerned about our organisational response," a PSNI statement said. The Police Ombudsman's Office said the focus of its investigation would be on the police response to a report of violence in the weeks leading up to her death. It confirmed the case was referred to it by police on Sunday night.

  Police remain at the scene in Melrose Street

  Ms Ward died from a number of wounds to her neck, BBC News NI understands. Her body was found by police officers who went to her house on Tuesday October 1 – but it is believed she was killed on September 25. The PSNI had been contact with her on a number of occasions in the weeks beforehand. This began on September 4 when she made a complaint to the police about being the victim of violence. The last contact it had with the mother-of-one was on September 25. Details of the murder investigation were not released until just before midnight on Monday. It is believed the PSNI had determined a number of days ago that Ms Ward had been murdered. Police believe Ms Ward was last seen alive on 25 September.

  Head of public protection branch, Det Ch Supt Fisher, said Ms Ward was the fourth woman to be killed in Northern Ireland in the last six weeks. "This is absolutely appalling," she continued. "Four families have been shattered forever by meaningless violence. “As a police service we recently revised our Tackling Violence against Women and Girls Action Plan and adopted the new national framework to align our response to this violence with that of terrorism and serious organised crime. "The level of violence and loss in Northern Ireland demands nothing less. “We are absolutely determined that we will be relentless in our pursuit of the perpetrators.” Combating violence against women and girls (VAWG) has been rising up the list of police and political priorities recently. Two years ago, the PSNI launched an action plan. This was followed by an Executive Office strategy published last month, external. It is in response to the fact more than 30 women and girls have been murdered in Northern Ireland in the last five years. In the 12 months to July, the PSNI recorded 22,400 VAWG-related offences. The PSNI has said this is a 16% drop year-on-year and shows some progress is being made. However, it accepts there is still much to be done by it – and wider society.

  Sinn Féin MLA Deirdre Hargey has expressed her condolences to the family of Ms Ward. She said: “This is absolutely sickening. Violence against women and girls anywhere in our society is reprehensible and must be eradicated. "The executive’s recently launched Strategic Framework to End Violence Against Women and Girls sets out how it aims to tackle this scourge on our society. "We must do everything we can to bring violence, harm and abuse of women to an end."

  Speaking about Ms Ward's family, Women's Aid NI said: "We cannot begin to imagine the horrific pain you are experiencing at the moment, but please know our thoughts and hearts are with you all at this incredibly distressing time." The charity called for anyone with any information, "no matter how small you think it is," to speak to the police.

  Det Ch Insp Foreman, who is leading the major investigation team, added: “Our thoughts at this time are first and foremost with Mary’s loved ones, who have been devastated and are struggling to come to terms with this tragic loss." Police have appealed for anyone who may have seen or been in contact with her close or on that date to get in touch.
