title: Nicola Sturgeon makes comedy bow at Glasgow Comedy Festival - BBC News
date: '2025-03-22'
section: Scotland
url: http://www.bbc.co.uk/news/articles/c8d4n339nn6o
content: |-
  The former first minister will appear with author Val McDermid at the King's Theatre in Glasgow.

  Nicola Sturgeon only briefly referenced events of the last week

  Nicola Sturgeon has made her debut at a comedy festival, two days after being told she is no longer under investigation in the police probe into the SNP's finances. The former first minister and the crime author Val McDermid appeared together at the King's Theatre in Glasgow for a performance called Books and Banter. Sturgeon was greeted with applause as she entered, and briefly referenced the week's events. On Thursday police confirmed the former SNP leader will face no further action in their long-running investigation, called Operation Branchform.

  Sturgeon's husband Peter Murrell, the former SNP chief executive, appeared on the same day at Edinburgh Sheriff Court where he made no plea to a charge of embezzlement. Earlier this year the couple announced they had separated some time ago and planned to end their marriage.

  A relaxed looking Nicola Sturgeon posed for selfies as she arrived at the King's Theatre

  Sturgeon's Glasgow Comedy Festival appearance was first announced last November and comes after she previously held a number of "in conversation with" events across the country with McDermid. After walking onto the stage, she said: "The last couple of years have been interesting. The last couple of weeks have been interesting." She said she "wouldn't have got through" the last few years without the support of McDermid, the author's partner Jo, and her own close friends. She also thanked the audience. "From the bottom of my heart, thank you all for the support." McDermid said it was a special day and that her friend was now "free and out in the world". "Delighted to welcome Nicola here tonight to start this new chapter," she added.

  Nicola Sturgeon appeared to be enjoying herself on stage

  Later in the event, Ashley Storrie, daughter of the late comedian Janey Godley, joined the pair on stage to reflect on her comedy Dinosaur and her mother. Janey Godley, who died from cancer recently, became friends with Sturgeon after posting voiced-over spoof versions of the former first minister's Covid briefings. The Books and Banter show also featured crime author Christopher Brookmyre. Sturgeon was arrested and then released without charge in June 2023, and on Thursday said there had been a "cloud of investigation" hanging over her since then. Speaking to journalists outside her Glasgow home she said: "I think it won't surprise anybody to hear me say that has not been an easy experience. So to reach this point today is obviously something I am relieved about. "I have done nothing wrong, and I don't think there was ever a scrap of evidence that I had done anything wrong." Sturgeon announced earlier this month she would not stand for re-election in the 2026 Holyrood election, but on Friday First Minister John Swinney said he would "look forward" to her campaigning efforts for the SNP in the future. His comments came after Sturgeon spent time helping her election agent, Mhairi Hunter, win a by-election for a seat on Glasgow City Council this week.
