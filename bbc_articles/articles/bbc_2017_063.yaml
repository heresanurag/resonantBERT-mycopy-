content: |-
  Thousands of people attend anti-Trump protests in London and Edinburgh.

  Thousands of protesters have joined rallies in London and Edinburgh as part of an international campaign on the first full day of Donald Trump's presidency.

  Organisers aim to highlight women's rights, which they perceive to be under threat from the new US administration.

  The BBC's Sian Grzeszczyk was at the London protest.
