id: bbc_2018_6926
title: FBI agent accidentally shoots customer in leg during backflip move - BBC News
date: '2018-06-04'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-44357703
content: |-
  The off-duty agent was picking up his gun after it fell out of its holster during a dance move.

  An off-duty FBI agent was filmed accidentally shooting a customer in the leg, as he went to pick up the gun he dropped whilst performing a particularly bold dance move.

  The man who was hit by the bullet was taken to hospital with a non-life-threatening injury.
