  Details and reaction to a briefing by Education Minister Kirsty Williams and Deputy Chief Medical Officer Dr Chris Jones.

  Sarah Everard was found dead after going missing while walking home in south London Image caption: Sarah Everard was found dead after going missing while walking home in south London

  Police in Wales should be commended for the way they handled vigils paying respects to Sarah Everard last weekend, according to the education minister.

  Ms Everard was found dead in a wooded area in Kent, after going missing while walking home in south London on 3 March.

  A Metropolitan Police officer has been charged with her kidnap and murder.

  Kirsty Williams said the scenes witnessed at Clapham Common in London on Saturday, where police arrested a number of people at a vigil on grounds of breaching Covid regulations, would have “shocked” those watching.

  However, she praised the way gatherings in Wales were held without incident.

  “I don’t think anybody that watched those scenes [at Clapham Common] can’t have been shocked by what they saw,” she said.

  “But can I say how grateful I am to women and men in Wales who over this weekend also carried out vigils to mark the death of Sarah, and the wider issues that that death makes us confront as a society, and the police that oversaw those gatherings in a really respectful way.

  “We have to remember we’re still in the middle of a pandemic and we need people to be cognisant of that, but I would commend both those that wanted to have their voices heard this weekend in Wales, and the police for the sensitive way that that was handled."
