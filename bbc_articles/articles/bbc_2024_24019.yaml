  The 27-year-old admitted making unwarranted demands with menaces for sexual videos and images.

  Christopher Morrow plead guilty pleas to all 16 counts of blackmail

  A Belfast man has pleaded guilty to trying to blackmail 16 women into sending him sexual videos and images. Christopher Morrow, 27, of Rochester Road in east Belfast, appeared at Belfast Crown Court on Thursday to be re-arraigned on 17 charges. Morrow entered guilty pleas to all 16 counts of blackmail. The defendant admitted making unwarranted demands with menaces for sexual videos and images from 16 individual women.

  The charges span a four-month period between 14 January and 10 April 2023. He also pleaded guilty to possessing an extreme pornographic image on 10 April, 2023. A prosecution lawyer told the court the pleas were acceptable to the Crown and that a separate charge of harassment was to be “left on the books". Morrow, who was granted continuing bail, is due to be sentenced on 24 October.
