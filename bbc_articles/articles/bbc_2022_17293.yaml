title: 'Glen Allen: Murderer at large from Maghaberry Prison - BBC News'
date: '2022-12-16'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-64006315
content: |-
  A man convicted after stabbing his victim 51 times in 2008 is on the run following temporary release.

  Glen Allen was jailed for 14-and-a-half year in 2010 for the murder of William Meek in 2008

  A convicted murderer is at large after failing to return to Maghaberry Prison following temporary release.

  Glen Allen, 34, was jailed for 14-and-a-half years in 2010 for the murder of William Meek.

  Mr Meek was stabbed 51 times in the head, face and neck in June 2008.

  The Department of Justice said Allen went missing on Wednesday. He is described as being about 5ft 9in tall and of medium build, with dirty fair hair and blue eyes.

  He also has scars on his right hand, left finger and knee.

  The police said that despite searches to arrest Allen, they have so far been unable to find him.

  They have appealed for anyone who has seen him or knows where he is to get in contact.

  The police also appealed directly to Allen to hand himself in.

  The Department of Justice has appealed for anyone with information to contact the police.
