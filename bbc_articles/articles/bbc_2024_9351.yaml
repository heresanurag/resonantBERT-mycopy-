title: 'Ron''s Place: Artistic fantasy world gets listed status - BBC News'
date: '2024-04-05'
section: Liverpool
url: http://www.bbc.co.uk/news/uk-england-merseyside-68731665
content: |-
  The flat, known as Ron's Place, was secretly transformed by its tenant with weird and wonderful features.

  Bright colours and intricate carvings adorn the whole flat

  A flat transformed by an artist over 33 years has been granted Grade II listed status after a campaign to save it.

  The unique work by Ron Gittins was discovered in Birkenhead, Wirral after his death in 2019.

  The Silverdale Road flat is the first example of what is called Outsider Art, done by those without conventional training, to be nationally listed.

  Historic England said the listing recognised Mr Gittens' "unique artistic achievements and vision".

  It was only after his death, at the age of 79, that his relatives uncovered the weird and wonderful private world he had made for himself.

