title: 'Farm fail: BBC reporter tries to bottle feed newborn lamb - BBC News'
date: '2025-04-09'
section: General
url: http://www.bbc.co.uk/news/videos/cx200nd2nmwo
content: |-
  It's lambing season, so BBC Breakfast decided to visit a farm to meet some of the new arrivals.

  Spring has sprung and lambing season is in full swing, so BBC Breakfast decided to visit Penhein Farm in Chepstow to meet some of the new arrivals.

  When lambs are orphaned or abandoned, the farm tries to match them with adoptive mothers and also steps in to feed them if required.

  But things didn't go quite to plan when reporter John Maguire tried to lend a hand.
