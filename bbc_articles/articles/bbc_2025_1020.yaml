title: Lottery winners invest in Durham Women FC in ownership change - BBC News
date: '2025-02-15'
section: England
url: http://www.bbc.co.uk/news/articles/c79dpyvr8r0o
content: |-
  The directors hope the investment will lead to the club's promotion to the Women's Super League.

  Patrick and Frances Connolly (both centre) celebrated with co-directors Lee Sanders (left) and Dawn Hepple (right)

  A couple who won £115m on the lottery have invested in a football club with the aim of reaching the Women's Super League. Patrick and Frances Connolly, from Hartlepool, have acquired a 25% stake in Championship side Durham Women FC following a change in ownership. The couple, who won the EuroMillions in 2019, are long-term supporters of the club and are keen to "inspire the next generation of female athletes". Club directors Lee Sanders and Dawn Hepple have taken possession of the club from Durham University, with a new board of directors in place.

  Mr Sanders said the investment from Mr and Mrs Connolly will be "transformative" and allow Durham Women FC to work towards building a "bespoke stadium" and ultimately promotion to the Women's Super League. "It takes us to the next level," he said. Durham Women FC is one of the only independent clubs in the women's game and is not affiliated with a men's team.

  Mr and Mrs Connolly moved from Moira, County Down, to Hartlepool more than 30 years ago. They have been sponsors of Durham Women for a number of years and said they have "always" been involved in women's football because their daughters used to play for Hartlepool St Francis. "We are now excited to have a bigger role in helping Durham Women FC reach new heights, with a target to deliver a sustainable future and inspire the next generation of female athletes," they said. Mr Sanders, who is the club's founder and former first team manager, said the players were "excited" by the change. "Obviously, some of them say they wish they were a bit younger now," he added. Durham currently sit in fourth place in the Women's Championship and only one team will be promoted to the top flight at the end of the season.
