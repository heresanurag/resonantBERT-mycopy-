title: Smooth Mars bar man gets £2 compensation from chocolate giant - BBC News
date: '2024-12-01'
section: England
url: http://www.bbc.co.uk/news/articles/cx247dwx1p7o
content: |-
  Mars Wrigley UK says the smooth bar "slipped" through and confirmed the swirl is being kept.

  Thousands of people liked the Facebook picture of Harry Seager's smooth Mars bar

  A man who caused an online storm when he found a Mars bar without its signature ripple has received £2 in compensation. Harry Seager’s picture of the confectionery generated interest from thousands of members on the Dull Men’s Club Facebook page, with one labelling it “hideous”. The 34-year-old said while Mars Wrigley UK would not give him a reason for the imperfection, group members said the bar had escaped being blown by air. Mars Wrigley UK said earlier this month the bar "slipped" through its production line and confirmed the swirl was being kept.

  Mr Seager, from Aylesbury, Buckinghamshire, was on the way to a classic car show in Birmingham with friends and picked up the chocolate bar at a service station in Thame, Oxfordshire. “The only reason I emailed [Mars] was because I was interested in what might have caused it to happen. That is all I wanted to know and they kept side-lining that question,” he said. “I think £2 is great, it will be two free Mars bars. Maybe they could have sent me more but I’m not being ungrateful. I think it’s amazing after everything that’s happened that I got the £2 voucher.”

  Mr Seager said he planned to buy more Mars bars with the £2

  Mars bars were first made by hand in Slough, Berkshire, in 1932, and are still made in the town. “A few people who used to work at Mars’ factories commented [on Facebook] and they said it goes through a machine called an enrober, which is like the waterfall the bars go through," Mr Seager said. “Apparently they get blown with air along the top as it comes out of that waterfall. Apparently there’s meant to be somebody at the end who removes the ones which haven’t been hit by the air. “I don’t know what happens to them then. I suppose they got put into products that have Mars bars in, like cakes and things.” With regards to other confectionery, Harry enjoys most chocolate bars but is not a fan of all sweet treats. “I don’t like the strawberry and orange cremes in a box of Roses or a box of Quality Street but I do like the coffee ones. I remember they took the coffee ones out a very long time ago but as a kid I remember them,” he added. Those Quality Street Coffee Cremes are only available at John Lewis and Waitrose this Christmas.

