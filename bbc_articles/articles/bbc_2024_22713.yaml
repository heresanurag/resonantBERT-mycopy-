title: 'Natalie McNally: Murder accused Stephen McCullagh denied bail - BBC News'
date: '2024-09-21'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cg4qz660zw9o
content: |-
  Stephen McCullagh is accused of murdering his pregnant partner in her Lurgan home.

  Natalie McNally was murdered in her home in Lurgan

  A man accused of the murder of his pregnant partner in her Lurgan home has been described in court as a “particularly skilful and manipulative individual”. Natalie McNally was 15 weeks pregnant when she was killed in December 2022. Denying bail, Mr Justice O’Hara said Stephen McCullagh of Woodland Gardens in Lisburn was also a “master of media manipulation”. If released, the judge said, the 33-year-old would “inevitably and potentially interfere with witnesses”.

  Mr McCullagh appeared in court in Belfast on Friday via video link and in front of a public gallery filled with Ms McNally's family and friends. Prosecution barristers told the court Ms McNally’s murder was "executed with a great deal of planning and premeditation, which is highly significant”. The court heard the case was “wrapped in domestic violence which has become so prevalent in our society”.

  The court also heard about Mr McCullagh’s internet browsing history in the days before Ms McNally was murdered. A prosecution barrister said the search history included “What’s more painful, dying by drowning or being burnt alive?” and “Is it extremely painful to die by gunshot than to stabbed in the heart?” As bail was denied some people in the public gallery clapped. Mr Justice O’Hara said: “Stop. I will clear the court. You are here to witness what happens in court not to participate in it.” The trial date has been set for 6 May.
