  As devices were taken for analysis, further layers of research began to reveal themselves. "What's it like to be raped" is just one of the online searches Plumb has made, as well as "killers from Harlow Essex" and "how long does chloroform keep a person unconscious". The detective continued: "We found a number of items that were an immediate concern to us that I know he would have used to make his plan reality. "He'd bought items online, he'd tried to recruit like-minded people to make his plan a reality. "He had all the items he needed to cause Holly Willoughby some serious harm."

  Det Ch Insp Greg Wood said Plumb was an "obsessive loner" who lived in a flat

  During his trial, Plumb maintained he was "too overweight" to have ever carried out his plan. He insisted it was "just online chat" borne out of pure fantasy. He was challenged on his two previous convictions for attempted kidnap in 2006 and another two offences of false imprisonment committed in 2008. Plumb said he had a "stewardess fantasy" at the time he tried to force two air hostesses to get off a train in the space of three days in August 2006. In 2008, he "terrified" two 16-year-old girls when he tied their wrists up and forced them into the store room of a shop. He was handed a sentence of 12 months, suspended for two years, for his first offences, before he was jailed for 32 months for the false imprisonments.

  Plumb's history, unusually revealed to the jury, ultimately confirmed his downfall. He wept in the dock after the jury returned its verdicts inside a packed courtroom. He was told he would be sentenced on 12 July. Det Ch Insp Wood said Plumb was an "obsessive loner" who became a "very dangerous" man. "He has targeted real women on separate occasions, threatened them with really significant violence," he added. "I've got no doubt if he wasn't convicted, he would have remained a very dangerous individual".
