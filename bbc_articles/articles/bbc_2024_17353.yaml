title: How Gavin Plumb plotted to kidnap and kill Holly Willoughby - BBC News
date: '2024-07-04'
section: Essex
url: http://www.bbc.co.uk/news/articles/cw5y165w69go
content: |-
  Deep inside the TV presenter's inbox lies a warning from the man plotting to rape and murder her.

  At the top of Gavin Plumb's "wishes" for life, the name Holly Willoughby was found

  Amid the packed inbox of Holly Willoughby's Instagram account, Gavin Plumb waited for his message to be answered. "I wanted to see if you are aware that there is some very real looking images of you online?" he wrote. His watchful eye was not a caring one, however. In the background, Plumb was planning to kidnap, rape and ultimately murder the TV presenter. How was he caught?

  During a forensic search of Gavin Plumb's flat in Harlow, Essex, a handwritten note was found. Scribbled across a side and a half of paper, a list of the names of 136 female celebrities had been laid out. Top of the pile was Holly Willoughby. Later, among a sprawling lair of computers and electronic devices, a Microsoft Word document entitled Wishes was recovered. The ultimate desire - Ms Willoughby. Another text contains just one line: "In July 2014 Holly and Gavin Plumb (born 25 February 1987) ended their year long affair".

  Gavin Plumb told an online associate that he no longer wanted to fantasise about Ms Willoughby - he wanted the "real thing"

  Ten years on from the conclusion of his fantastical relationship, Plumb's reality is a prison cell. The 37-year-old has been found guilty of soliciting murder, inciting kidnap and inciting rape after his plot against Ms Willoughby was uncovered. "I've got no doubt that Gavin Plumb could've gone on to commit some really horrific crimes," says Det Ch Insp Greg Wood, of Essex Police.

  By his own admission, Plumb was a loner who rarely left his house and had developed an "obsession" with the presenter, best known for co-hosting ITV's This Morning alongside Philip Schofield. Plumb searched online for other people who found Ms Willoughby attractive and his desires started to spiral. Speaking online to a man only known as Marc, the pair began to devise a plot that would see her abducted from her home by force and taken to a "dungeon". "I'm going to be living out my ultimate fantasy," Plumb wrote. "I'm now at the point that fantasy isn't enough anymore. I want the real thing." The message comes during an exchange of hundreds of messages between Plumb and Marc, most of which included graphic sexual detail. Asked in March 2023 what the final plan was, Plumb, a security guard, said they would "hit it" at night so there was less traffic. "Chloroform both of them [Ms Willoughby and her husband] that way then they can both be easily restrained," he explained. "We're then gonna force her to make a video saying she come with us under her own free will... and she’s fully consenting to everything we do to her – so that covers us."

  This video can not be played To play this video you need to enable JavaScript in your browser. Gavin Plumb shot footage of items including handcuffs and provided a running commentary as he listed them

  By October that year, Marc had got "cold feet" and Plumb was using the alias BigBear341987 to post in a group on the Kik chat app called Abduct Lovers - which had about 50 active members. Sharing four pictures of Ms Willoughby, he wrote: "The one in the public eye I want." It caught the eye of David Nelson, who responded "nice" and began to engage in a private conversation with Plumb. The chat led to Plumb outlining his abduction plot to Mr Nelson, including sending him a video of a "kidnap kit" he has assembled - including hand and ankle shackles, a rope and a ball gag. Little did Plumb know that Mr Nelson was actually an undercover police officer from the US. Having been alerted by Mr Nelson - via the FBI - Essex Police scrambled into action and officers raided Plumb's house in Potters Field in the new town.

  Plumb maintained during his trial that his plot was "just online chat" borne out of pure fantasy

  "To get such information - certainly from an international law enforcement colleague - is really rare," Det Ch Insp Wood said. "Whilst at the address, we identified a number of items that we know that he was going to use to make his plan a reality." When his door was busted in, Plumb initially appeared shocked. However, he knew what the officers were there for. "I can pretty much guess what you're looking for," he told them. At the mention of Holly Willoughby, he admitted: "I’m not going to lie, she is a fantasy of mine – but she is to a lot of guys, isn’t she?"

  His trial heard that two bottles purporting to be chloroform were found, as well as a 31-piece lock-picking set and 400 metal cable ties. Handcuffs, two packets of rope and a document containing images of a mapped route from Plumb's address to Ms Willoughby's house were also discovered. On top of a wardrobe, a photograph album packed full of images of women was recovered, while a device containing "millions" of pictures of Ms Willoughby - many of which were "deep fake" pornographic images - was seized.

