content: |-
  The passing of actress Dame Maggie Smith features prominently on Saturday's front pages.

  A number of the papers paid tribute to Dame Maggie Smith following her death

  Most front pages carry tributes to Dame Maggie Smith, described by the Daily Mirror, external as "a true legend" and by The Sun as "Magnificent Maggie." The Guardian's film critic Peter Bradshaw said she was the "grandest of grandes dames., external" While writing in the Daily Express, external, the theatre critic, Neil Norman calls her "a world class performer whose appeal crossed generations". Elsewhere, the Financial Times, external reports that Germany and France are calling for an urgent rethink of plans to roll out the EU's biometric border on the tenth of November. They say the main computer system won't be able to cope with the new entry exit system that will require all non-EU citizens, including British visitors, to register their personal details, including their fingerprints. The European Commission said it was in close contact with member states who were working hard to ensure the system could start on time. And The Times considers research suggesting that receiving a Michelin star may be "more of a curse than a blessing", external for a restaurant. A study of highly rated venues in New York found those with Michelin stars were more likely to close down than those without. The paper says the findings are replicated in London and France. It seems staff may seek higher wages after an award and landlords more rent. The paper asks if chefs focus too much on pleasing the guide, rather than their customers.

