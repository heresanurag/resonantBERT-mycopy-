title: Bordesley public meeting calls for end to Birmingham bin strike - BBC News
date: '2025-06-11'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/c2kqej2932ko
content: |-
  About 150 people attend a gathering in Bordesley, with more to be held across Birmingham.

  Residents have had to use mobile waste collections during the strike

  About 150 people have attended a public meeting calling for the union Unite and Birmingham City Council to resolve the ongoing strike by bin workers. The all-out strike began 13 weeks ago in a dispute over pay, and the union has warned the strike could last until December after members voted to continue the action. Shafaq Hussain from End the Bin Strike, who organised the meeting in Bordesley, said the dispute had gone on too long and had seen an "unacceptable" environmental impact. Birmingham City Council said it had made a "fair and reasonable offer" and remained committed to resolving the dispute, but Unite said members still sought an "acceptable" deal.

  The meeting heard calls for council tax to be reimbursed and for residents to organise a bulk delivery of waste to the council itself. Residents have previously called for a council tax refund, to which the council said it was a legal responsibility to pay the tax. Mr Hussain, who estimated about 150 people attended the meeting, said talks held at the arbitration service Acas had failed and people now wanted an independent panel to be created to take over negotiations. He said the all-out strike began on 11 March, but on-off action had started in January, adding: "That's a long time."

  The bin strike has been going on for months

  Residents had wanted council leader John Cotton to attend, Mr Hussain said, but he declined. One question raised was whether commissioners overseeing the council's financial situation were involved in the dispute and what they were doing. "If the commissioners or the leader of the council are not negotiating directly with the union, there is going to be a stalemate," Mr Hussain said. Further public meetings will be held across the city, Mr Hussain said.

  A council spokeswoman said the authority recognised the "significant impact" the industrial action had on people and it was grateful to community groups who were working to clear waste. The spokeswoman said Cotton did not attend as it would not be appropriate for him to take questions on specifics of the negotiations and offers, which were sensitive, and complex legal matters.

