title: Elon Musk's X accused of breaching content rules by EU - BBC News
date: '2024-07-12'
section: Business
url: http://www.bbc.co.uk/news/articles/cw0y1ezpv5xo
content: |-
  The EU says the way the social media site designs and operates blue tick accounts "deceives" users.

  Elon Musk's social media site X has been accused by the European Union of breaching its online content rules, with its "verified" blue tick accounts having the potential to "deceive" users. The bloc's tech regulator said users could be duped into thinking the identity of those with blue tick marks was verified, when in fact anybody can pay for a blue tick. It said it had found evidence of "malicious actors" abusing the system. The investigation began under the EU's Digital Services Act (DSA). It could lead to X being fined up to 6% of its global annual turnover and being forced to change how it operates in the bloc. Mr Musk reacted angrily: "The DSA is misinformation," he wrote on X, external. The billionaire, who bought the platform for $44bn in 2022, said the DSA rules amounted to "censored speech" which he said he found unacceptable, external. "A democratised system, allowing everyone across Europe to access verification, is better than just the privileged few being verified," she wrote on the social media site. The findings follow a seven month investigation under the DSA. The law, which was introduced in 2022, requires big tech firms, like X, to take action to stop illegal content and safeguard the public. ByteDance's TikTok, AliExpress and Meta Platforms are also being investigated under the act. The Commission said its review of X had found a lack of transparency around advertising and that X did not provide data for research use as required under EU rules. "In particular, X prohibits eligible researchers from independently accessing its public data, such as by scraping, as stated in its terms of service", the Commission said, external. The tech regulator also said that the way X designed and operated its interface for blue tick verified accounts did "not correspond to industry practice and deceives users". "Since anyone can subscribe to obtain such a 'verified' status, it negatively affects users' ability to make free and informed decisions about the authenticity of the accounts and the content they interact with," it said. "There is evidence of motivated malicious actors abusing the 'verified account' to deceive users," it added.

  The Commission said X could defend itself against the findings or resolve the issue by committing to changes that would bring it into compliance. Any such deal would be made public, it added, in response to Mr Musk's claim that the commission had offered an "illegal secret deal". "Back in the day, BlueChecks used to mean trustworthy sources of information," Thierry Breton, Commissioner for Internal Market, said. "Now with X, our preliminary view is that they deceive users and infringe the DSA." "X has now the right of defence - but if our view is confirmed, we will impose fines and require significant changes." The Commission pushed back against Mr Musks's charge of censorship, saying its rules were aimed at ensuring "a safe and fair online environment for European citizens that is respectful of their rights, in particular freedom of expression". Among its rules, it said, are requirements that companies inform users when their accounts are restricted and that users who are banned can contest those decisions. The Commission said it was continuing investigations into X's practices around dissemination of illegal content, and how well it combats the spread of fake news.
