title: US President Barack Obama farewell speech in Chicago - BBC News
date: '2017-01-11'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38580546
content: |-
  Barack Obama outlined his achievements and paid tribute to his family as he neared the end of his second term.

  President Barack Obama outlined his achievements in his farewell speech in Chicago.

  The country's first black president, now 55, was first elected in 2008 on a message of hope and change.

  His successor, Donald Trump, has vowed to undo some of Mr Obama's signature policies after he is sworn into office on 20 January.
