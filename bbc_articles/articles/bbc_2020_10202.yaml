id: bbc_2020_10202
title: 'Tel Aviv: Drone filmed dropping suspected cannabis over city - BBC News'
date: '2020-09-04'
section: General
url: http://www.bbc.co.uk/news/world-54035450
content: |-
  A quadcopter was seen releasing small bags, believed to contain illegal drugs, over Tel Aviv, Israel.

  A quadcopter has been recorded releasing a payload of little bags, which Israeli police suspect contained "a dangerous drug", over Tel Aviv.

  It followed activists who seek to legalise the drug in Israel promising free cannabis from the air on social media.

  While medical use of cannabis is permitted in the country, recreational use remains illegal.
