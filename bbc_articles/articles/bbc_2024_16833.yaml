title: BBC Verify analyses attacks on the French railway system - BBC News
date: '2024-07-27'
section: General
url: http://www.bbc.co.uk/news/videos/cy68w5900jlo
content: |-
  French rail company SNCF said its high-speed network had been targeted by "malicious acts" aimed at paralysing the rail network.

  With much of the rail network in France disrupted by several arson attacks ahead of the Olympic opening ceremony in Paris, BBC Verify have been assessing the damage.

  The French rail company SNCF said its high-speed network had been targeted by "malicious acts" aimed at paralysing the system.

  Images of emergency repairs from three separate locations across the country shows the vandalism happened to the north, east and west of Paris, but suggests the possible targeting of key points where rail lines cross and divert.
