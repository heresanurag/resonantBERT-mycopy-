title: Sainsbury's Cambridge petrol station marks 50th anniversary - BBC News
date: '2025-01-05'
section: Cambridgeshire
url: http://www.bbc.co.uk/news/articles/cly47xey8gwo
content: |-
  An archivist says the petrol station's electronic payment system could not keep up with demand.

  JS Journal, Sainsbury's staff magazine, said petrol was 68p a gallon when "the average price of four-star in the area is 73p"

  It is 50 years since a supermarket chain opened its first petrol station - proudly describing the pumps as "space-age". On the new Sainsbury's forecourt in Coldham's Lane , Cambridge, the unbranded four-star petrol was 68p a gallon, or 15p a litre. That equates to £1.14 a litre now, external. Sainsbury's had planned to open it on 3 December 1974, when it unveiled its first store on the outskirts of an established city, but delays manufacturing the pumps pushed the launch back to 10 January 1975. Drivers "sometimes faced a 10-minute wait as the electronic payment system struggled to keep up with the high demand", according to George Cooban, from the Sainsbury Archive, external.

  The company described the six petrol pumps as "space-age"

  Sainsbury's said the six pumps at the on-site, self-service petrol station were "space-age", adding that "unlike most service stations" customers could pay "without getting out of a car". The supermarket chain had had a branch in the centre of the university city since 1925, but was keen to expand. Its initial planning application to build at Coldham's Lane was turned down by Cambridge City Council, but Sainsbury's won on appeal.

  The first day's sales exceeded its targets by 150%, according to the supermarket

  Conservative MP Jim Prior (right) and company chairman John Davan Sainsbury welcomed shoppers as the doors opened

  Assistant archivist Mr Cooban, who is based at the Sainsbury Archive at London Museum Docklands, said long queues appeared outside the branch when it was opened in December. "Some wanted to get ahead with their Christmas shopping," he said. "There were national shortages of certain staple foods at the time so 'bread hunters and sugar-seekers' contributed, external to the high footfall as well."

  Sainsbury's had imported icing sugar from West Germany during the national sugar shortage, external and shoppers may have been keen to get their hands on some of it (above) for Christmas baking

  The shop was large enough for the supermarket chain to start selling electrical goods, kitchenware, cosmetics and gardening tools

  The car park had 376 spaces, which filled within minutes on the opening day. Mr Cooban said: "The size of the store allowed Sainsbury's to experiment with non-food products it had not sold before, including electrical goods, kitchenware, household linens, cosmetics, stationery and even gardening and DIY tools." On opening, it was the chain's fourth largest branch, with a sales area of 2,271sq m (24,000sq ft), and a freezer centre next door.

  As well as a petrol station, the branch - enlarged in 1988 - also had Sainsbury's first-ever customer toilets

