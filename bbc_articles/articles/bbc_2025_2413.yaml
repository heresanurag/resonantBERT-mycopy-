title: Phillipson says new Ofsted report cards will help 'stuck' schools - BBC News
date: '2025-02-03'
section: Family & Education
url: http://www.bbc.co.uk/news/articles/c20gkmy6k74o
content: |-
  Ofsted scrapped its single-word judgements for schools after the death of head teacher Ruth Perry.

  Phillipson says new Ofsted report cards will help struggling schools

  The government will step in more quickly to help struggling schools based on the findings of new Ofsted report cards, the education secretary has said. Bridget Phillipson said in a speech on Monday that the old single-word Ofsted judgements, which were scrapped last year, were "too blunt" and "too vague" to serve a purpose. She said new regional teams, with a budget of up to £100,000 per school, would help turn around the 600 "stuck" schools in England which had received back-to-back negative judgements from Ofsted. However, the report cards have drawn strong criticism from school leaders, who said the proposals risk "replicating the worst aspects of the current system".

  Prof Julia Waters, whose sister Ruth Perry took her own life after an Ofsted inspection, said it appeared to be "a rehash of the discredited and dangerous system it is meant to replace". The changes follow a major public debate around Ofsted after a coroner ruled that an inspection contributed to the death of primary school head teacher Mrs Perry in 2023. Phillipson pushed back on the criticism of the report cards after her speech, saying parents wanted more information about schools. She also said she was "delighted to see the debate raging" over the proposed reforms, saying "that is how we shape the best education system". She said report cards would provide "rich, granular insight" which would help to deliver "tailored" support for struggling schools. Those schools which do not improve will be transferred to a successful academy trust, even if they are already run by a different academy or a council. Under Ofsted's proposals, the old one or two-word judgements, ranging across four grades from "Outstanding" to "Inadequate", will be replaced from the 2025 autumn term by a report card describing what inspectors have found on key aspects of each school, including: There will be five possible grades for each area, which are also one or two words in length: "causing concern", "attention needed", "secure", "strong" and "exemplary". The grading scales will focus on how schools support disadvantaged and vulnerable pupils, and there will be more emphasis on the local circumstances in which schools operate. A separate part of the report card will say whether the school's duties around safeguarding have been met.

  Using the new report cards, like this one, parents will be able to click the drop-down arrows and read more about the school's performance in each area

  The new format will be used for inspections across all settings, from early years to further education colleges, but will be tailored to the type of provider, Ofsted said. Ofsted boss Sir Martyn Oliver said the proposals were designed to "raise standards and improve the lives of children, particularly the most disadvantaged". He said the "suite of grades" would give parents "much more detail" and help identify a school's strengths and areas for improvement. However, school leaders' unions said the new system would add "enormous pressure" to schools, and could "worsen an already severe recruitment and retention crisis" in teaching. Pepe Di'Iasio, general secretary of the Association of School and College Leaders, said the plans would generate a "new league table based on the sum of Ofsted judgements across at least 40 points of comparison". It would be "bewildering for teachers and leaders, never mind the parents whose choices these reports are supposedly intended to guide", he added. Paul Whiteman, general secretary of the National Association of Head Teachers, said the plans would "do little to reduce the enormous pressure school leaders are under". Daniel Kebede, general secretary of the National Education Union, said the five-point grading scale "maintains the current blunt, reductive approach that cannot capture the complexity of school life nor provide more meaningful information to parents". As well as criticism over its single-word judgements, Sir Martyn has also previously said Ofsted's inspection process should be "far more empathetic". Those comments came in the wake of the inquest into Ruth Perry's death, in which the coroner said the inspection at her school had "lacked fairness, respect and sensitivity" and was at times "rude and intimidating". Ofsted removed its practice of issuing overall grades for a school at the start of the current academic year, bringing in a temporary system of grading individual aspects of a school's performance, ahead of the introduction of report cards later this year. Wirral head teacher Stuart Mycroft had his school, Castleway Primary, inspected under the current system in the autumn term.

  Head teacher Stuart Mycroft said his school's recent inspection was an "emotional rollercoaster"

  He told the BBC he was not convinced that Ofsted had truly changed. He said the inspection had left him crying in his office, despite it ultimately resulting in a "Good" judgement. He said the inspection process had been confrontational and unpleasant. "The impact emotionally was huge," he said. "I was absolutely exhausted." Ofsted's consultation on its new report cards will run until 22 April. It said it would be trialling the new system over the coming months.
