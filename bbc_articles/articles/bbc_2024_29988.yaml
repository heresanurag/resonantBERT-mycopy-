  New inflation fears and poignant remarks by the Prince of Wales make Friday's front pages.

  'Reeves is driving up prices' and William's 'hardest year'

  Trump with his wife Melania (left) and his new chief of staff, Susie Wiles (right)

  Prince William's stark words about a "brutal" past year feature on most of the front pages. The Daily Mail, external says the "emotional" prince spoke candidly at the end of his visit to South Africa about his wife and father’s cancer diagnoses. "Hardest year of my life,", external reads the Sun's headline. The Times calls it "William's own annus horribilis" echoing the late Queen's summation of her year at the end of 1992. Finally, the Daily Mail says there is a perfect German word for the kind of gloomy weather much of Britain has been experiencing in recent weeks. The paper explains that dominant high pressure - which leads to warm and sunny days in the summer - often brings "anti-cyclonic gloom" at this time of year, otherwise known as dunkelflaute, which roughly translates as "dark doldrums".

