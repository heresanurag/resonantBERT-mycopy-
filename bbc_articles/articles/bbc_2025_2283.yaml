title: Wonder Woman game axed as Warner Bros cuts three studios - BBC News
date: '2025-02-26'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/c0q1w9q1qvyo
content: |-
  Warner Bros Games joins a growing list of companies making cuts in the gaming industry.

  Wonder Woman game axed as Warner Bros cuts three studios

  Warner Bros Games says it will focus on other franchises including Harry Potter and Mortal Kombat

  Warner Bros Discovery has confirmed plans to shut three of its gaming development studios. The decision means the anticipated Wonder Woman game, which has been in production for three years at one of the affected studios, Monolith, will not be released. Player First Games, which made MultiVersus, and Warner Bros. Games San Diego will also be shuttered. The announcement comes after a difficult time in the industry, with widespread job losses since a boom during the Covid pandemic.

  A spokesperson from Warner Bros told BBC Newsbeat the "difficult decision" was aimed at boosting profitability. On Wonder Woman, they said: "Our hope was to give players and fans the highest quality experience possible for the iconic character, and unfortunately this is no longer possible within our strategic priorities." Last month, MultiVersus said there would be no more updates for the game, external, which would have to be played offline "for the foreseeable future". Warner Bros said it will instead focus on developing its core franchises including Harry Potter, Mortal Kombat, DC and Game of Thrones. "As difficult as today is, we remain focused on and excited about getting back to producing high-quality games for our passionate fans and developed by our world class studios and getting our games business back to profitability and growth in 2025 and beyond," the spokesperson said.

  Last year was a challenging one for the games sector, seeing games delayed, studios closed around the world and thousands of layoffs including at Microsoft's Xbox and Sony's PlayStation . Warner Bros Games had big expectations for Suicide Squad: Kill the Justice League but the game was panned by fans and critics. Updates for the game ended in January after weak sales and poor reviews. And last month, the company announced the departure of David Haddad, the chief of the gaming unit, after 12 years. Wider trends in the industry have seen sales struggle as gamers spend less on new games, choosing instead to stick with long-running online games like Fortnite or yearly franchises such as Call of Duty and EA Sports FC. As well as people spending less on new games since the pandemic, the cost of making blockbuster releases has increased and investors are putting less money into the industry.

