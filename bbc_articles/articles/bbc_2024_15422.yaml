title: 'East Ham: Third child dies following house fire - BBC News'
date: '2024-07-16'
section: London
url: http://www.bbc.co.uk/news/articles/clwy9gv039po
content: |-
  Neighbour Rida Nawaz says she "saw everything" and did her best to help them escape.

  Investigations are taking place into the cause of the fire

  A third child has died following a house fire in east London, the Metropolitan Police has said. The blaze broke out on the ground and first floor of a terraced house on Napier Road in East Ham, shortly before 08:30 BST on Saturday. One child was confirmed dead at the scene of the blaze on Saturday morning while a second died later that night. The mayor of Newham, Rokhsana Fiaz, added: "Three children have now died from a family, and there really are no words to express how as a community we are reeling from the shock and horror of what a house fire can do."

  Tributes have been paid by members of the local community

  All six people believed to be members of the same family lived in the house and were inside at the time. Two others remain in hospital while a third has been discharged and is receiving treatment as an outpatient, the force. Police also said there was no evidence of suspicious circumstances. A joint investigation by the police and London Fire Brigade (LFB) is under way into the cause of the fire. Half of the first floor and ground floor of a terraced house were damaged and the blaze was under control by just after 09:00, the fire service added. LFB Assistant Commissioner Patrick Goulbourne said: "This is a terribly sad incident and the thoughts of all of us at London Fire Brigade are with the family, friends and all those affected at this difficult time."

  The fire broke out at around 08:30 BST and was under control around 30 minutes later, the fire service said

  In a statement posted on Monday evening, Ms Fiaz added that "the family was part of a tight-knit community which is now grieving". Cheerag Jetha told BBC London on Monday he had lived next door to the family for 10 years and they were "really good neighbours" and a "really nice family". "At around 08:25 I noticed smoke coming through my window," he said. "I looked out - I could smell smoke... smoke from my neighbour's back garden, maybe the conservatory area."

  Cheerag said "it all happened so quick" and the fire spread in minutes

  Mr Jetha said the fire appeared to have spread from the conservatory at the back of the house. As he made his way outside to the front of his house to warn other neighbours, he said a "bang happened" and the situation "really escalated". "At 08:32 they were able to rescue the mother - the mother through the upstairs window, the father through the loft," he said. "Within five minutes they got the kids out - unfortunately one was dead at the scene. The other three were rushed to hospital." He said two of the children who died were aged eight and 11 with the younger one attending the primary school across the street from their house. The neighbour said the incident was "quite traumatic". Mr Jetha added: "They got along with everyone. It's just so sad to see what's happened."

  He said the children were "quiet" but would "play with the local kids from time to time". "It's just really sad to see kids die in the way they did, in the circumstances," he continued.

  Rida said the children always appeared to be in a "happy mood" and would say hello

  Other neighbours previously described throwing bricks to break windows in an effort to help the family escape. Rida Nawaz said she "saw everything" and did her best to help. "We just wanted to save them and we couldn't," she said through tears. Ms Nawaz said she was best friends with the mother for four years and would often spend time with her and the family at dinners and parties. "She's a very powerful lady, she's like a hero for our kids, even the father as well," she explained. She said the children always appeared to be in a "happy mood" and would say hello to her. "She is, I think, the best mother in the world," she added.
