title: 'Kettering: Man charged with murders of nurse and two children - BBC News'
date: '2022-12-18'
section: Northampton
url: http://www.bbc.co.uk/news/uk-england-northamptonshire-64015289
content: |-
  Anju Asok, 35, and her children were found seriously injured at a property in Kettering on Thursday.

  Anju Asok and Janvi Saju died after being found with serious injuries at a property in Northamptonshire

  A man has been charged with murdering an NHS nurse and her two young children.

  Saju Chelavalel, 52, was arrested after police were called to his home at Petherton Court in Kettering, Northamptonshire, on Thursday morning.

  Anju Asok, 35, her son Jeeva Saju, 6, and daughter Janvi Saju, 4, were found at the property with serious injuries.

  Northamptonshire Police said post-mortem examinations discovered they died as a result of asphyxiation.

  Ms Asok died at the scene while her two children died later in hospital.

  She had worked at Kettering General Hospital since last year and was described as a "committed and compassionate staff nurse who was loved and respected by her dear friends and colleagues".

  Mr Chelavalel will appear at Northampton Magistrates' Court on Monday.

