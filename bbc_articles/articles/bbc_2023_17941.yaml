title: 'Dagenham: Armed man dies in Met Police shooting - BBC News'
date: '2023-11-24'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-67517446
content: |-
  The man told officers he wanted to take his own life and had loaded guns, the force says.

  Officers were called to Weston Green by a man who said he was in possession of loaded firearms, the Met Police said

  A man has died in a police shooting in east London.

  Firearms officers were called to Weston Green, Dagenham, at about 20:00 GMT on Thursday after a man told the Met Police he wanted to take his own life and was in possession of loaded firearms.

  Shots were fired by officers just before 21:00.

  The force said it had informed the Independent Office for Police Conduct (IOPC).

  The IOPC has confirmed it has started an independent investigation.

  "Our investigators were sent to the scene and the police post-incident procedures to begin gathering information," an IOPC spokesman added.

  "We have no further information at this time."

  The Met Police added a specialist negotiator had also attended and tried to "bring the incident to a safe conclusion".

  Officers and paramedics provided first aid and CPR but the man was pronounced dead at the scene.

  The Met also said a non-police firearm was located by officers at the scene.

  It added an investigation was in its "very early stages".

  Formal identification of the man, believed to be 40, is yet to take place but his next of kin has been informed.

  Assistant Commissioner Matt Twist said: "Our thoughts remain with the loved ones of the man who has died, with the local community in Dagenham and the officers involved in this incident.

  "The IOPC is independently investigating this matter. It is right that officers are held to account when shots are fired, and we will work with the IOPC to provide all the information they need to carry out their inquiries.

  "Our armed officers are highly trained and work around the clock to keep people safe in London. We ask them to do an incredibly difficult job every day and make split-second decisions under huge pressure.

  "A fatal police shooting is rare. The officers involved in this matter are being supported as they assist the IOPC investigation."

