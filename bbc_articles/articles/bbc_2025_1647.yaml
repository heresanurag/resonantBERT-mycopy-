content: |-
  Two aviation experts have analysed footage of the plane crash and explored what might have caused it.

  On Monday afternoon a Delta Air Lines plane crashed as it came in to land at Toronto Pearson Airport in Canada, miraculously there were no fatalities.

  Lecturer and former commercial pilot Marco Chan and aviation expert Professor Graham Braithwaite have spoken to the BBC and analysed video footage of the moment the plane crashed.

  It is not clear yet what caused the incident, with analysts suggesting that the weather may have played a role, or that the aircraft struck something in its path. Investigations are now underway by Canadian authorities.

