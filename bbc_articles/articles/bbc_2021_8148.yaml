title: 'Farne Islands: Puffins see visitors return after 18 months - BBC News'
date: '2021-07-17'
section: General
url: http://www.bbc.co.uk/news/uk-57873055
content: |-
  Tourists haven't been able to go to the Farne Islands for 18 months and it's changed the birds' behaviour.

  Birds on the Farne Islands, including puffins, have changed their behaviour after 18 months with no visitors.

  The islands, off the coast of Northumberland, have been home to nothing but the seabirds since the Covid pandemic began and it's made some reconsider their surroundings.

  Arctic terns are now nesting elsewhere and the seagulls have become more aggressive.

  BBC Breakfast was among the first groups of visitors allowed back.
