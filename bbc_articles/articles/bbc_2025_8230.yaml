title: King and Queen visit Colosseum during state visit to Italy - BBC News
date: '2025-04-08'
section: Europe
url: http://www.bbc.co.uk/news/articles/cg720ylkz37o
content: |-
  King Charles and Queen Camilla visit the historic landmark in Rome on the second day of their trip.

  King and Queen at temple of love in Italy visit

  King Charles and Queen Camilla were pictured at Rome's Temple of Venus

  King Charles and Queen Camilla found an appropriately symbolic place in Rome to pose for photographs on the second day of their state visit to Italy. They stood in the ancient Temple of Venus, honouring a goddess of love, during a four-day trip which coincides with their 20th wedding anniversary. The royal visitors were earlier given a ceremonial red-carpet welcome by Italy's President Sergio Mattarella and his daughter Laura at the Quirinale Palace. At the Colosseum, shouts of "Carlo" could be heard from the crowds as the King and Queen met tourists visiting the historic monument.

  The royal couple stood at the Roman temple overlooking the Colosseum

  The state visit is part of the UK's efforts to reinforce its links with its European allies. In a symbolic show of unity, the UK's Red Arrow pilots flew alongside their Italian counterparts, the Frecce Tricolori, in a flypast that trailed the colours of both countries over the skies above Rome. The UK's ambassador to Italy, Lord Llewellyn, has said the alliance between Italy and the UK was "vital in a changing Europe, as both our countries stand steadfast in our support of Ukraine".

  The King and Queen watched a flypast from the Quirinale Palace on Tuesday

  The Colosseum provided a picture book setting for a photograph, with the royals standing on a balcony at the site of the Temple of Venus and Rome, built almost 2,000 years ago. The King and Queen will celebrate their 20th anniversary on Wednesday by attending state banquet in the evening - a glitzy event which will have a guest list of politicians and celebrities.

  Anniversary photos were taken in the British ambassador's residence on Monday

  A new set of photographs to mark their anniversary were taken on Monday evening, as the King and Queen visited the British ambassador at his residence. State visits are a soft power mix of public engagements and diplomatic meetings. Such visits are carried out on behalf of the UK government - Foreign Secretary David Lammy has been accompanying the King on the trip. King Charles will meet Italy's Prime Minister Giorgia Meloni on Wednesday. He will also make a speech to both houses of Italy's Parliament - the first time a UK monarch will deliver such an address.

  The King and Queen met Italy's President Sergio Mattarella and his daughter, Laura, at the Quirinale Palace

  The state visit had originally been intended to include engagements at the Vatican, but that was postponed because of the ill-health of Pope Francis. But with the Pope seeming to be getting better, there has been speculation about a possible private meeting when the King and Queen are in Rome.

