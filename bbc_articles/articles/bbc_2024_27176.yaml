  Australia's prime minister has apologised for making a "hurtful" comment in parliament, after he mocked opposition lawmakers by asking them if they had Tourette's syndrome. The remark - which was quickly withdrawn - has angered disability advocates and been labelled "ableist" and "despicable" by MPs across the political spectrum. Late on Tuesday, Anthony Albanese returned to the chamber to ask for forgiveness from Australians living with the disorder. "I regret saying it. It was wrong. It was insensitive and I apologise," he said in his address.

  Albanese made the taunt after facing interjections from frontbenchers, including shadow treasurer Angus Taylor, during a speech on tax changes. "Have you got Tourette's or something? You know, you just sit there, babble, babble, babble," he said, responding to the interruptions. Tourette's syndrome is a condition that causes people to make involuntary movements or sounds, called tics. The President of the Tourette Syndrome Association of Australia said Albanese's comment demonstrated the need to increase awareness about the disorder. "For him to just flippantly use it in such an offhanded manner speaks volumes... we have a lot of work to do," Mandy Maysey told Seven News. "If people see Albanese doing that in parliament, then it will trickle down, and people already use it as a punchline or an insult," she added. The Australian Greens disability spokesman Jordon Steele-John, who has cerebral palsy, criticised Albanese for "using disability as the butt of his jokes" - saying that "casual ableism is still ableism". Opposition health spokeswoman Anne Ruston had earlier called the taunt "despicable" and demanded the PM apologise to the "entire Tourette's community". "Mocking a disability is no laughing matter," she wrote on X. Research estimates one in every 100 school-aged children may have Tourette's syndrome in Australia and that roughly 1-2% live with the disorder in the UK. Tourette's syndrome is a genetic inherited neurological condition, which means it can be passed on from birth parents to their children.
