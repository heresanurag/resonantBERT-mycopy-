title: 'Rishi Sunak: UK to fund migrant detention centre in France - BBC News'
date: '2023-03-10'
section: UK
url: http://www.bbc.co.uk/news/live/uk-64914564
content: |-
  The UK will contribute almost £500m over three years to help France curb migrants crossings the Channel in small boats.

  Agreement will make even bigger difference going forward - Sunak

  The Times asks two questions next. The first is aimed at Sunak: The UK has already spent £300m on supporting French efforts to stop small boats. What makes you think that this new money will be any more effective now? Sunak responds by saying: "Let's just be clear, there are joint efforts" rather than just French efforts, and speaks of the "shared challenge" the two countries face. He acknowledges, however, that global migration is a challenge. "There are global forces at play," he says. He adds that both nations are working "incredibly hard" to try to break the cycle. He says there is no one solution for the problem, and nor will it be solved overnight, but that cooperation with allies, including France is very important. The second question, directed at Macron, is about the relationship between France and the UK. Can this relationship ever be as close as it once was, the Times asks. "This is my wish", Macron says, but says it "will depend on our commitment, our willingness".
