  \ of twitter post 3 by Jeremy C. Owens\n\nOne industry-watcher said LG was likely\
  \ to take a short-term hit to its brand as a result of the event, but said that\
  \ it would also serve as a reminder that the promise of a \"seamless\" smart home\
  \ was still some way off.\n\n\"The target market for these kinds of products is\
  \ still hi-tech-friendly early adopters who are willing to put in more effort than\
  \ the regular user,\" said Tuong Nguyen from the consultancy Gartner.\n\n\"But even\
  \ for early adopters, it tends to be a little more work than expected.\n\n\"The\
  \ challenge for manufacturers is that they not only to offer a good user experience\
  \ but also have to get all the different technologies involved to work together.\n\
  \n\"An analogy would be that it's less like taking one child to the zoo than having\
  \ to chaperone a whole class.\"\n\nThe BBC is not responsible for the content of\
  \ external sites."
