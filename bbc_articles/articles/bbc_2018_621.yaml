title: 'CES 2018: LG robot Cloi repeatedly fails on stage at its unveil - BBC News'
date: '2018-01-08'
section: Technology
url: http://www.bbc.co.uk/news/technology-42614281
content: "A robot designed to help households control smart devices repeatedly fails\
  \ on stage as it is unveiled.\n\nThis video can not be played To play this video\
  \ you need to enable JavaScript in your browser. WATCH: LG's marketing chief said\
  \ Cloi \"doesn't like me\" after it ignored his commands\n\nA robot created by LG\
  \ to help users control their smart home repeatedly failed on stage at its CES debut.\n\
  \nCloi was meant to be the centrepiece of the South Korean firm's presentation where\
  \ it was supposed to show how new artificial intelligence tech could enhance use\
  \ of kitchen appliances.\n\nInstead it gave no response to three consecutive commands\
  \ beyond blinking.\n\nExperts say the demo represented a \"disastrous\" debut for\
  \ the bot, which was mocked on social media.\n\nThe event was the first press conference\
  \ of the morning at the Las Vegas tech fair. Samsung, Intel, HTC and Sony are among\
  \ other big companies scheduled to unveil products over the course of the day.\n\
  \nLG's focus this year was to promote ThinQ, its in-house AI software, which it\
  \ intends to roll out across various products to make them easier to use and capable\
  \ of \"evolving\" to meet customers' needs.\n\nAlthough LG also includes Google's\
  \ Assistant in some of its latest TVs and smart speakers, it has chosen to rely\
  \ on its own solution for its robots.\n\nThe firm already has robots in use in South\
  \ Korean shopping centres and airports, and also makes robotic vacuums for the home.\n\
  \nBut Cloi - which is pronounced Kloh-ee - represents a push to put the technology\
  \ at the heart of consumers' homes.\n\nLG said that Cloi had been deliberately designed\
  \ to appear cute\n\nThe machine was described as being the \"ultimate in simplicity\
  \ when managing your smart home,\" when it was presented on stage by David VanderWaal,\
  \ LG's US marketing chief.\n\nAnd it initially behaved as planned when he asked\
  \ it for his schedule.\n\nBut subsequent requests to find out if his washing was\
  \ ready, what was planned for dinner and what recipes it could suggest for chicken\
  \ all fell flat.\n\n\"The first time it failed everyone laughed and thought it was\
  \ just a glitch,\" commented Ben Wood, an analyst at CCS Insight, who was in the\
  \ audience.\n\n\"The second time, there was a realisation that something was wrong.\n\
  \n\"And when it failed again, there was a stunned silence in the audience and then\
  \ a bit of hubbub as people felt sorry for this guy.\"\n\nAlthough it is far from\
  \ the first time a CES demo has gone awry, Mr Wood said it highlighted a problem\
  \ with many of the AI-based technologies being pitched to the public.\n\n\"It will\
  \ be damaging to LG and highlights a broader point about all the companies exhibiting\
  \ here: is their technology really ready for prime time?\"\n\nMr VanderWaal later\
  \ unveiled a further three robots, highlighting LG's ambitions in the sector.\n\n\
  LG describes its three new commercial robots as being \"concepts\" at this stage\n\
  \nHowever, by this point many viewers of the firm's YouTube livestream were more\
  \ preoccupied by making jokes about Cloi's earlier appearance.\n\nOne suggested\
  \ that she was a feminist who did not enjoy being bossed about in the kitchen, while\
  \ another posted: \"RIP Cloi\uFEFF 2018-2018\".\n\nTwitter users also joined in\
  \ the fun.\n\nThis Twitter post cannot be displayed in your browser. Please enable\
