content: |-
  Jack Merritt spoke to the Law in Action podcast about his work helping prison inmates in Suffolk study law.

  The first victim of yesterday's London Bridge attack has been named as Jack Merritt, a Cambridge University law ad criminology graduate.

  Earlier this year, Jack Merritt spoke on a BBC Radio 4 Law in Action podcast about his work helping inmates at Warren Hill prison in Suffolk to study law.
