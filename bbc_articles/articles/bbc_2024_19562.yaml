title: Three murder charges after inmate dies at HMP Fosse Way - BBC News
date: '2024-08-22'
section: Leicester
url: http://www.bbc.co.uk/news/articles/c0rw0z9gpgro
content: |-
  A 31-year-old man was found unresponsive in his cell and pronounced dead at the scene.

  Three men have been charged with murder after an inmate died at a prison in Leicestershire.

  The 31-year-old man, who has not yet been named by police, was found unresponsive in his cell at HMP Fosse Way on Tuesday and was pronounced dead at the scene.

  Leicestershire Police said prisoners Shaan Karim, 38, Thierry Robinson, 21, and Ashirie Smith, 18, had all been charged with murder and were remanded in custody to appear at Leicester Magistrates' Court on Friday.

  Three other men, aged 27, 28 and 35, have all been released under investigation after previously being arrested on suspicion of murder, the force added.
