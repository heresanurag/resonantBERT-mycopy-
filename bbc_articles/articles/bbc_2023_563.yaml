  "Thank you so much for all your efforts.

  "Now it's time for us all to relax. Let us all celebrate Dad's life."

  Aled Glynne Davies was a former editor of BBC Radio Cymru

  Mr Davies's family and friends had appealed for information, in particular video footage, in the search to find him.

  Mr Glyn said the search was frustrated by the lack of footage of him that night.

  BBC presenter Huw Edwards, who used to work with Mr Davies, said he was a "journalist and broadcaster of rare ability".

  He described him as a "kind and generous man" and offered his condolences to the family.

  BBC Wales Director Rhuanedd Richards said: "Aled was an innovative, energetic and passionate editor during his time leading BBC Radio Cymru between 1995 and 2006.

  "His passing is a great loss to the broadcasting world as well as to the Welsh language."

  "We are heartbroken," says Aled Davies's son, Gruffudd Glyn
