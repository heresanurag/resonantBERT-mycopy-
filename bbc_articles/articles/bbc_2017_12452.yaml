title: Nature reclaims US battleship graveyard - BBC News
date: '2017-11-12'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-41951057
content: |-
  How what is potentially the largest group of WW1 shipwrecks in the world could become a nature sanctuary.

  Mallows Bay, on the Maryland side of America's Potomac River, hosts potentially the largest group of World War One shipwrecks anywhere in the world.

  A century since the United States entered the conflict, the BBC Travel Show has been to see how the vessels are being reclaimed by nature.

  The Travel Show can be seen on BBC World News and the BBC News Channel.
