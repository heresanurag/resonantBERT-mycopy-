title: I haven't seen UK government feuding over refugees, says minister - BBC News
date: '2022-04-06'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-61010746
content: |-
  Lord Harrington insists "raised voices" at meetings reflect a shared desire to help Ukrainians.

  A Home Office minister has said he "has not seen any feuding" between government departments over how to deal with Ukrainian refugees.

  Lord Harrington insisted "raised voices" in meetings were the result of a desire shared by all ministers to "do the same thing" and help people.

  He also revealed that 29,000 visas had been issued to Ukrainians, with around 65,000 applications received so far.

  But Labour said the government had to "step up to the plate".

  Several newspapers have reported that Home Secretary Priti Patel and Foreign Secretary Liz Truss have argued over how to clear a backlog of Ukrainian refugees' applications, amid reports that only "hundreds" of people have so far made it to the UK.

  The BBC understands that HM Revenue and Customs and Department for Work and Pensions staff are now helping with the processing of Ukrainian refugees.

  A Home Office source said a "cross-government effort" was under way.

  Lord Harrington, making his maiden speech since becoming a minister, said during a Lords debate: "I've not seen this feuding between departments that's reported."

  He told peers he had attended meetings with Home Secretary Priti Patel and Housing and Communities Secretary Michael Gove, among others, adding: "I've seen raised voices because we are all trying to do the same thing, but not [because we are angry] with each other...

  "What happens behind closed doors, I couldn't possibly know... I've not experienced [feuding] myself."

