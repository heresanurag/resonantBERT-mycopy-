content: |-
  Gavin Plumb is accused of soliciting to murder and incitement to kidnap the TV presenter.

  Holly Willoughby left her role at This Morning in October, after 14 years as a presenter

  A man accused of soliciting to murder and incitement to kidnap the TV presenter Holly Willoughby has been refused bail.

  Gavin Plumb, of Harlow, Essex, denies charges relating to an alleged plot between 2 and 5 October involving the former presenter of This Morning.

  Mr Plumb was not present when his application for bail was denied at Chelmsford Crown Court.

  The 36-year-old was returned to custody ahead of trial in June.

  He is accused of planning to assemble a "kidnap and restraint kit" and encouraging a third party to travel to the UK to carry out the alleged offences.

  Gavin Plumb, pictured in 2014, was remanded in custody

