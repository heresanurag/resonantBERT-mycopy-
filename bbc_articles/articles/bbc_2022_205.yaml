content: |-
  Last updated on .From the section Tennis

  Novak Djokovic practised again at Melbourne Park on Thursday, shortly before the draws were made Novak Djokovic remains in the Australian Open draw as the decision over whether the defending champion can stay in the country drags on. The nine-time champion has been drawn against fellow Serb Miomir Kecmanovic. Britain's US Open champion Emma Raducanu, seeded 17th, faces American world number 68 Sloane Stephens, the 2017 champion at the New York major. The Australian Open is the first Grand Slam of the 2022 season and starts at Melbourne Park on Monday. The draw was originally supposed to take place at 3pm local time (04:00 GMT) on Thursday but was delayed by one hour and 15 minutes. Australian Prime Minister Scott Morrison held a news conference to update the country about the coronavirus pandemic at 3:45pm, although he declined to say when a decision about Djokovic might be made. Top seed Djokovic, 34, practised again at Melbourne Park earlier on Thursday, with Australia's immigration minister Alex Hawke still considering whether to revoke his visa again and throw him out of the country. The world number one is hoping to win a record-extending 10th Australian Open men's title which would be his 21st Grand Slam triumph, moving him clear of Switzerland's Roger Federer and Spain's Rafael Nadal. Djokovic has not been vaccinated against Covid-19 and had his visa revoked when he arrived in Australia last week, following questions over the vaccine exemption that would have permitted him to enter. However, on Monday a judge dramatically overturned the decision and ordered his release from an immigration detention hotel after finding that border officials had not followed proper procedure. On Wednesday, Djokovic admitted to meeting a L'Equipe journalist on 18 December despite knowing he had tested positive for Covid, as well as there being mistakes on his immigration forms.
  • None What's next for Djokovic after visa row? What happened in the rest of the draws? Britain's former world number one Andy Murray was drawn against 21st seed Nikoloz Basilashvili - a day after beating the Georgian in the Sydney Tennis Classic. Heather Watson, who is the only other British woman to have directly qualified for the main draw, takes on Egypt's Mayar Sherif. Harriet Dart and Liam Broady could increase the British contingent in the singles if they win matches in the final qualifying round on Friday. Australian world number one Ashleigh Barty starts her quest for a first home Grand Slam title against a qualifier, while defending champion Naomi Osaka opens against Colombia's Camila Osorio. Top seed Barty could face Japan's Osaka, seeded 13th as she returns after a four-month break from the sport, in the fourth round. In the men's draw, Spanish sixth seed Nadal starts against unseeded American Marcos Giron. Russian second seed Daniil Medvedev, who lost to Djokovic in last year's final but beat the Serb to win the US Open title, will play Swiss Henri Laaksonen. Last year's finals were limited to 50% capacity, meaning about 7,500 fans were allowed to watch Crowds on two of the Australian Open show courts have been capped at 50% capacity in response to rising coronavirus rates in Melbourne, the Victorian government announced earlier on Thursday. However, those sessions on the main Rod Laver Arena and Margaret Court Arena which have already sold more than that will not be affected. All tickets already bought will remain valid and there will be no changes to ground pass access. More than 37,000 people tested positive for Covid in Victoria on Wednesday. The state, which has an estimated population of 6.7 million, recorded 25 more deaths and a further 953 people were hospitalised. "We are confident in the Covid-safe measures we have in place and there are still plenty of tickets available," said Tennis Australia chief revenue and experiential officer Ben Slack. What a horrible draw for Emma Raducanu in her first Grand Slam match since becoming a Grand Slam champion. Her preparations for the Australian Open were seriously disrupted by Covid, although Sloane Stephens has had an unusual build-up, too, having got married on New Year's Day. Andy Murray faces probably the hardest hitter on tour right now in Nikoloz Basilashvili, but has the confidence of having beaten him at last year's Wimbledon and again in Sydney on Wednesday. Dan Evans faces the former top 10 player David Goffin, who was forced to retire from his Sydney quarter-final against Murray on Thursday. The Belgian has had a succession of wrist, elbow, ankle and knee problems in recent years. And Cameron Norrie, who is yet to win a match this season, has what looks a very tough draw against Sebastian Korda, who reached the fourth round of Wimbledon and the French Open last year. But the American tested positive for Covid on arrival in Adelaide last week, and has been hitting tennis balls against the wall of his hotel bedroom ever since.
