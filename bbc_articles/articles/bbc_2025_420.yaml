content: |-
  Chelsea sign England midfielder Keira Walsh from Barcelona.

  The 27-year-old, who spent eight years at Manchester City before joining Barcelona, has signed a four-and-a-half-year deal with Chelsea. The Women's Super League transfer deadline was on Thursday but the deal was only announced on Friday. Chelsea did not confirm the fee but it does not challenge the world record of around £900,000 that they paid for USA defender Naomi Girma earlier this month. "It's unbelievable. I'm very happy to be here and very excited to get started," Walsh said. "You look at the history of the trophies Chelsea have won and I'm an ambitious player and person, so for me, it is a good fit." Despite Barca initially being unwilling to sell, it is believed Chelsea's bid was accepted late on Wednesday before Walsh had a medical on Thursday. The 27-year-old, who left Manchester City to join Barcelona for a then world record fee of £400,000 in 2022, was keen to return to England to be close to family. Chelsea, who are top of the Women's Super League and the only unbeaten side after 12 games, have had a long-standing interest in Walsh and have been looking to bolster their midfield since the summer. Manager Sonia Bompastor has received significant backing as the club bid to win the Champions League. Walsh has won the competition twice with Barcelona. While she has played for Barcelona in the group stages of the competition this season, she is still eligible to play for Chelsea from the quarter-finals onwards.
  • None What do Walsh & Girma signings mean for Chelsea and rest of WSL?

  It has been a huge month for Chelsea as they have signed two of the world's best players in Girma - widely regarded as the game's best centre-back - and Walsh. Chelsea have made no secret that their intention is to win the Women's Champions League and they have backed Bompastor to do that. They have a seven-point lead in the WSL, are in the fifth round of the Women's FA Cup and the semi-finals of the Women's League Cup as they chase a quadruple. By signing Walsh they have found cover for injured midfielder Sophie Ingle, who has missed the season with an anterior cruciate ligament injury, and they have taken a key player away from European rivals Barcelona. Walsh was always keen to return home having felt like she had achieved all she could in Barcelona and it means she will be close to family in the build-up to Euro 2025.
