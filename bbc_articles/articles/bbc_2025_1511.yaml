title: British journalist Charlotte Peet reported missing in Brazil - BBC News
date: '2025-02-19'
section: Latin America
url: http://www.bbc.co.uk/news/articles/c4gexj8ll31o
content: |-
  The Association of Foreign Press Correspondents in Brazil says it is concerned over her disappearance.

  A British journalist has been reported missing in Brazil, prompting concerns from an association of foreign correspondents which has urged authorities to step up search efforts. Charlotte Peet, 32, is understood to have last contacted a friend on 8 February, saying she was in São Paulo and planned to travel to Rio de Janeiro. She has not been heard from since. Days later, her UK-based family told the friend they had lost contact with her. They have provided authorities with details of her flight and a copy of her passport to aid the search. The Association of Foreign Press Correspondents in Brazil (ACIE) released a statement "expressing concern over her disappearance and solidarity with her family and friends".

  According to the statement, someone initially reported the case to police in Rio before it was transferred to São Paulo, where she was last seen. The statement also added that Brazil's Department of Homicides and Personal Protection (DHPP) was assisting in the case. According to her LinkedIn profile, Ms Peet has worked as a freelance journalist in Rio and London for outlets including Al Jazeera and the Times. "Her disappearance has sparked growing concern among colleagues and journalists in the region, with ACIE calling for intensified efforts to locate her as soon as possible", a statement on behalf of its president Edmar Figueiredo and its board of directors said. A UK Foreign Office spokesperson said: "We are supporting the family of a British woman who has been reported as missing in Brazil and are in contact with the local authorities."
