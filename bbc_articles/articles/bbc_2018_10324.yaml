  Last week Cipriani vowed to "do everything" to remain in the England set-up after making his first Test match start in 10 years during the summer tour to South Africa.

  He was dropped from the national side in 2008 - the same year he won his first cap - after visiting a nightclub prior to a match against Scotland.

  In 2011, Cipriani was fined by his then club Melbourne Rebels for taking a bottle of vodka from a nightclub and later in the same year served a one-match ban for breaking a team curfew.

  Four years later he was banned for driving for 18 months and ordered to pay fines and costs totalling £7,620 after being found to be nearly twice the drink-drive limit.

  Cipriani has played 16 times for England since his international debut in 2008

  Over the last year or so the rugby had really been doing the talking for Danny Cipriani. Many thought he wouldn't get a look in under Eddie Jones but Jones recalled him for the tour of South Africa in June.

  He kept his head down, worked extremely hard on the tour, got a start in the third Test and set up the try which led to an England victory.

  I think in terms of his club future, Gloucester will put it down as an incident they can move on from. At the moment, England are staying very tight-lipped.

  It's pretty hard to second guess Eddie Jones' position. In the past, Jones has said that what happens on club duty is not to do with him and that if someone behaves themselves on and off the field in an England camp, that's what he's interested in. On the tour of South Africa, Cipriani's behaviour was exemplary and Jones made a big point of saying that before selecting Cipriani for the third Test.

  But with the World Cup on the horizon, no England players can afford slip-ups, let alone players whose behaviour in the past has been called into question.

  Cipriani just had to keep his head down. He was probably in the best place he's been in for a decade. Gloucester were saying Cipriani had been worked extremely hard in pre-season and that he'd been a fantastic addition to the club. Up until Tuesday night, things were going swimmingly. He must just feel so disappointed with himself.

  His international future is now hanging by a thread.

