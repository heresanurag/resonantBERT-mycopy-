title: Danny Cipriani fined for assault in Jersey nightclub - BBC News
date: '2018-08-16'
section: Jersey
url: http://www.bbc.co.uk/news/world-europe-jersey-45206046
content: |-
  The England rugby player says he is "truly sorry" after admitting assault and resisting arrest.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England rugby international Danny Cipriani has been fined £2,000 after an assault in a Jersey nightclub.

  The Gloucester player pleaded guilty to common assault and resisting arrest and was ordered to pay £250 compensation to a woman police officer.

  She has been named in reports as former Welsh international footballer Jodie Botterill.

  Three other charges - assault on police, larceny and being disorderly on licensed premises - were dropped.

  Cipriani tweeted he was "truly sorry... most importantly [to] the police" and was "mortified" by his actions.

  The 30-year-old fly-half has seven days to pay the fine and compensation or face 10 weeks in prison.

  The officer has been named in reports as former Welsh international footballer Jodie Botterill

  Defence advocate Mike Preston told Jersey Magistrates' Court Cipriani was sorry for the "confusing situation" and was "mortified if he harmed the police officer in any way".

  Mr Preston said Cipriani "had too many drinks" at Drift nightclub in The Royal Yacht Hotel, St Helier, and police were called when he tried to grab a body camera off a doorman.

  Mr Preston argued his client did this because fame had made him more sensitive to being filmed and he was confused by the situation.

  He was later picked up by police but managed to escape from his cuffs and a second officer was needed to restrain him.

  Police were called after Cipriani tried to grab a doorman's body camera at Drift nightclub

  Cipriani is said to have sworn at the officer, telling her to get off him.

  The court heard she was left with bruises on her bicep and red marks on her neck.

  The former Wasps and Sale stand-off did not think he had done anything wrong at the time and did not understand why the police had been called, the court was told.

  The club is part of The Royal Yacht Hotel in St Helier

  He was in Jersey with his club as part of a pre-season tour and was supported in court by Gloucester team captain Willi Heinz.

  Cipriani, who moved to Kingsholm in the summer, is due to make his debut in a friendly against Ulster on Saturday.

  In response to his player's guilty plea, Gloucester chief executive Stephen Vaughan commented: "We will deal with it in a robust but balanced way but based purely on the facts.

  "As a high-profile sportsperson there is often a large degree of public and media scrutiny involved, which Danny is well aware of.

  "The incident in question was over in a matter of seconds and was a reaction to the conduct of other parties involved.

  "He knows his responsibilities and is aware of the impact of this type of incident on the club. However, Danny is a Gloucester Rugby player and will receive our full support."

