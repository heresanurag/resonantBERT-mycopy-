  Raducanu withdraws from GB squad to 'look after body'

  Emma Raducanu has climbed back into the world's top 50 after reaching the Miami quarter-finals last week

  Emma Raducanu has withdrawn from the Great Britain squad for next week's Billie Jean King Cup qualifiers in the Netherlands to "look after her body". The British number two reached the Miami Open quarter-finals last week. Raducanu has competed in seven tournaments so far this year - the most she has played in the first three months of a season. The 22-year-old, who climbed back into the world's top 50 this week, needed medical attention before losing to fourth seed Jessica Pegula in Miami. Raducanu's representatives said pulling out of the British squad was a "difficult decision". They added: "She needs a little space in the calendar to best look after her body."

  Raducanu has been hampered by a series of fitness issues over recent seasons, while she recently took time off after being targeted by a stalker at the Dubai Tennis Championships in February. The 2021 US Open champion plans to do a training block over the next two to three weeks. She has pulled out of the Rouen Open, which starts on 14 April, and it is unclear when she will return to match action. Great Britain face the Netherlands and Germany in a new BJK Cup round-robin format between 10-12 April. Raducanu was part of the British squad that reached the semi-finals of last year's BJK Cup. Her withdrawal means British captain Anne Keothavong is assessing her options, but likely to call up another player next week to join Katie Boulter, Sonay Kartal, Harriet Dart and Olivia Nicholls. "Of course you always miss a player of her quality on the team. But I have the utmost belief in the players who are travelling," said Keothavong. The leading nation from the qualifying ties in The Hague will seal a place in the Finals later this year. The other two teams will go into the play-offs for the chance to return to the qualifiers in 2026. Earlier on Wednesday, world number two Iga Swiatek pulled out of Poland's qualifying ties against Switzerland and Ukraine, saying it was a "difficult decision" and she would instead be "focusing on myself and my training".
