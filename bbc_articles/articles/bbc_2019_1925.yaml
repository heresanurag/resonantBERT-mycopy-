  Glendon Spence, 23, was stabbed inside a Brixton youth club in London and died an hour later on 21 February

  In 2018 there were 19 stabbing fatalities - all under the age of 25 - in the West Midlands.

  There have been 17 homicides in London so far this year, six of which happened in nine days.

  On Tuesday alone five people were stabbed - four of whom were attacked in less than eight hours and one who died.

  In the 12 months leading up to March 2018, a quarter of all knife crime victims were men aged 18-24.

  Patrick Green, from the Ben Kinsella Trust - a charity which campaigns against knife crime - said "nobody is doing enough" to stop it.

  "If lessons are to be learned we really to get behind not just the enforcement element but also to make sure that the next group of young people don't carry the same attitude that a knife will protect them," he said.

  West Midlands Police saw a 72% rise in knife crime between April 2013 and the year ending March 2018, Office for National Statistics (ONS) analysis shows.

  Across England and Wales there were 285 killings by a knife or sharp instrument in the 12 months ending March 2018, the highest since records began in 1946.

  Out of 43 forces, West Midlands Police saw the third highest knife crime offences per head of population between April 2017 to March 2018, according to the Home Office.

