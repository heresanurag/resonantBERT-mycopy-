title: 'Birmingham stabbings: ''Knife crime is an emergency'' - police chief - BBC
  News'
date: '2019-02-27'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/uk-england-birmingham-47388707
content: |-
  Three teens were stabbed to death in Birmingham within 12 days in what police are calling a "crisis".

  Three teens stabbed to death in Birmingham in 12 days. (l-r) Hazrat Umar, 18, Abdullah Muhammad and Sidali Mohamed, both 16

  A West Midlands Police boss has declared knife crime "an emergency" after three teens were stabbed to death within 12 days in Birmingham.

  Chief Constable Dave Thompson said stop and searches would be stepped up and more officers would patrol the streets amid the "crisis".

  There have been 269 knife crimes recorded in the city so far this year.

  Police also urged more help from parents and teachers to tackle the violence among youngsters.

  The spate of killings in Birmingham follows knife crime attacks in London, where there have been 12 fatal stabbings in 2019.

  Mr Thompson, who was with Police and Crime Commissioner David Jamieson outside the scene of a teen stabbing at a charity shop in Birmingham, pledged extra patrols with additional officers in certain areas.

  He said: "Immediate and intensive action is needed to prevent this current crisis from continuing. My officers have been given extensive powers to search people without the need to suspect they are carrying weapons.

  "I recognise this will upset some innocent young people, but I fear the carriage of weapons in the current environment is growing, often through fear, and we can take no chances.

  "For our young people, their families and communities we need to stop this emergency quickly. Without specific areas or people to target that means blunt action to prevent violence."

  This video can not be played To play this video you need to enable JavaScript in your browser. Birmingham stabbings: Stop and search to be stepped up

  Hazrat Umar, 18, was stabbed to death in the Bordesley Green area of Birmingham on Monday.

  Mr Umar was a relative of the former chief prosecutor for North West England Nazir Afzal. Mr Afzal said: "I don't want any other family having to experience what our family has."

  On Tuesday, police were also called after a 16-year-old boy was stabbed in the leg near a British Heart Foundation shop in Bull Street, Birmingham, at 17.30 GMT.

  Officers vowed to leave "no stone unturned" after the teenager was taken to hospital and is in a "stable condition". No arrests have been made.

  A man, 29, suffered serious stab injuries to his arm, near to Aston Street, Birmingham, just after 14.30 GMT and was taken to hospital on Wednesday.

  And on Saturday, Gary Cunningham, 29, was found with fatal stab injuries at a flat in Harborne.

  Mr Jamieson added: "We need the support of local communities to stop this violence. It is not a job the police can do alone and they can't simply arrest their way out of this problem."

  Det Chf Superintendent Mark Payne, from the West Midlands Police homicide team, said that while investigators are doing all they can to find the killers, they need help from parents and teachers to turn the tide against knife crime.

  "Knife crime and violence is not an issue we can tackle on our own. We need help from partners, parents, schools and the wider community to tackle this growing issue," he said.

