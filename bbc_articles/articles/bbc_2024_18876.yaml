content: |-
  The supermarket says there is a potential "burn risk" to customers when eating them.

  Tesco recalls 'melt in middle' vegan burgers for getting too hot

  The Food Standards Agency said the recall was a precautionary step

  Tesco is recalling its "melt in the middle" meat-free burgers because they might get too hot inside. The supermarket said, external there was a potential "burn risk" to customers when eating them. Anyone who has bought the vegan product - named Tesco Plant Chef 2 Meat-Free Burgers with Melting Middle - is being urged not to eat it. Customers should return them to the store and will be offered a full refund, Tesco said.

  The Food Standards Agency said it was a precautionary step. They issued an alert, external saying the melting middle - which is made of mustard and gherkins - "may maintain a high temperature once cooked" and could burn when customers bite into the burger.

  It is unclear when the product was first on shelves, but a vegan blog shared a photo of them on Facebook at the end of June – with people commenting that the centre was like “lava”. “They are nice but careful when eating as the middle is like eating the sun!” one person said. Another person, writing after the product recall, said on Reddit: “I did almost burn my mouth on them" adding that inside was "molten lava". The FSA issues alerts when there is a problem with a food product meaning it must either be withdrawn (taken off the shelves) or recalled (when customers are asked to return it). On the box, the burgers - made from fava bean and pea protein - are described as "succulent and tangy" and "with an American style mustard and gherkin melt".
