title: Prince Harry plays sit-down volleyball on Nigeria visit with Meghan - BBC News
date: '2024-05-12'
section: Africa
url: http://www.bbc.co.uk/news/world-africa-68995686
content: |-
  The Duke and Duchess of Sussex have been welcomed by a charity which helps service personnel in Nigeria.

  Harry and Meghan were given scarves in Nigerian colours before watching a game of sit-down volleyball

  Day two of the Duke and Duchess of Sussex's Nigeria visit began with a game of sitting volleyball. In Abuja, the couple spent time with Nigeria Unconquered, which compiles the country's Invictus Games team. Harry and Meghan are to speak at a reception hosted by the Nigerian military's chief of defence staff. The duchess will later co-host a Women in Leadership event with Dr Ngozi Okonjo-Iweala, director general of the World Trade Organization.

  After arriving at the Armed Forces' Officers Mess and being given scarves in the green and white colours of Nigeria, Harry and Meghan watched a game of sitting volleyball, before Harry was invited to play with the team. The Duke participated in a few rounds of the game, which were played by 'Team Harry' and 'Team CDS' - referring to the military's chief of defence staff who is behind the couple's visit to Nigeria.

