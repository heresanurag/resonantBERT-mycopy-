content: |-
  Tiny uninhabited Mullagrach is in the Summer Isles in the Highlands.

  Mullagrach is in the Summer Isles off the north-west Highland coast

  A tiny uninhabited island in Scotland's Summer Isles has been put up for sale for offers over £500,000. Mullagrach is just 89 acres (36ha) in size and a 35-minute boat ride from Coigach peninsula on the north-west Highland mainland.

  The island has a small, heather-clad roofed cabin with a rainwater collection system and an outdoor composting toilet. Bottled water is needed for drinking. Selling agent Galbraith said viewing of Mullagrach was limited due to weather conditions and access. It also advised visitors to wear outdoor clothing, sturdy footwear and to be able to travel by boat and climb ladders up on to the island.

  Some of the island's wild inhabitants on a clifftop

  Mullagrach, bought in 2004 by Chris and Lorna Bown, is reached by boat from Old Dorney Harbour, about two miles away. Galbraith said the island was managed in a way to avoid disturbing its wildlife.

  The island has a small cabin with an outdoor composting toilet

  The Summer Isles is a group of about 30 small islands, also large rocks and rocky reefs called skerries. The largest of the islands is Tanera Mòr. The Summer Isles lie within the Wester Ross Marine Protected Area. The designation protects a range of natural habitats including burrowed mud, maerl beds and also wildlife such as northern feather stars.

  The Summer Isles lie just off the Wester Ross coast
