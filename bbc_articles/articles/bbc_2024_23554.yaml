content: |-
  The charges come as soup was thrown over two famous pieces of artwork by Vincent Van Gogh.

  Three charged after soup thrown at Van Gogh paintings

  Soup was thrown at the paintings on Friday

  Three people have been charged after food was thrown at two Vincent Van Gogh paintings in the National Gallery. Orange-coloured soup was thrown at Sunflowers 1888 and Sunflowers 1889 in the highly acclaimed Poets and Lovers exhibition at the central London gallery. Stephen Simpson, 61, and Mary Somerville, 77, both of Bradford, West Yorkshire, and Phillipa Green, 24, of Penryn, Cornwall, were arrested at the scene on Friday. The Metropolitan Police said they had now been charged with causing criminal damage and would appear at Westminster Magistrates' Court on Monday.

  The National Gallery said the two paintings targeted had been removed from public viewing for examination but were put back on display within hours after they were found to be undamaged.

  The paintings form part of triptych of works which Van Gogh had wanted presented together

  The paintings form part of an exhibition of more than 60 pieces painted by the Dutch artist, who died in 1890 aged 37. Along with a painting of a maternal figure, the two targeted sunflower paintings form part of a triptych of works being shown together. Its presentation is significant as Van Gogh suggested having the paintings shown this way to his brother, Theo, before he died. The exhibition has received rave reviews from critics, with The Times calling it a "once-in-a-century" show, while The Guardian said it was a "riveting rollercoaster ride". It is the third time in recent years an artwork at the National Gallery has been targeted.
