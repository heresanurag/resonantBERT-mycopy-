content: |-
  The boxer says he had a tough time being "a cuddly dad" and training "to rip someone's head off" at the same time.

  He's just won one of the most talked about boxing matches, and now Tommy Fury has been talking about how hard it is being "a cuddly dad" while "wanting to rip someone's head off".

  The boxer said he moved out of the home he shares with influencer Molly-Mae Hague and their baby Bambi to prepare for the fight with YouTuber KSI.

  "I've been seeing Molly and the baby once a week for 10 weeks," he told ITV.

  Fury and KSI fought it out in Manchester on Saturday night, with Fury winning on points after six rounds.

  Speaking to Good Morning Britain, Fury said he felt he had to move out of the family home to concentrate on the fight.

  "It's been so tough, but I can't switch from being a super-dad, a cuddly dad and fiancé, giving kisses and cuddles out, to then a few hours later going to training and wanting to rip someone's head off.

  "It's very difficult to get out of those different spaces."

  He said his fiancee could not look up from the floor during the match.

  "I'm the father to our beautiful daughter and she doesn't want me taking punches. She tolerates it because she knows how happy it makes me."

  Meanwhile, his opponent KSI, whose real name is Olajide William Olatunji, has called for a rematch after describing the result as "a robbery".

  But Fury had choice words for the social media star accusing him of doing star jumps and running around the ring.

  "It made me look bad in the process, but at the end of the day he should have just stood there and had a fight."

