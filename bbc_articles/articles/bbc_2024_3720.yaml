title: 'UFC 299: Michael ''Venom'' Page beats Kevin Holland in entertaining debut
  - BBC Sport'
date: '2024-03-10'
section: Mixed Martial Arts
url: http://www.bbc.co.uk/sport/mixed-martial-arts/68526629
content: |-
  Britain's Michael 'Venom' Page outpoints Kevin Holland in an entertaining debut at UFC 299 in Miami, Florida.

  Page (right) started his career in kickboxing before transitioning to MMA

  Britain's Michael 'Venom' Page outpointed Kevin Holland in an entertaining welterweight debut at UFC 299 in Miami, Florida. Londoner Page, 36, combined his signature kickboxing, distance control and showboating to beat American Holland, 31, by unanimous decision. Former Bellator star Page was competing in the UFC for the first time in his 23-fight career. "This is where I'm supposed to be," said Page. "I've got a little more - well, a lot of work to do - but anyone who doubted I'm supposed to be here can see that for themselves." Page, nicknamed MVP, was a slight underdog heading into the bout at the Kaseya Centre, but Holland had few answers to his elusive footwork and slick in-and-out striking style. Page signed with the UFC in December after his contract with Bellator came to an end, where he earned 16 wins in 18 fights. He opted to join the UFC while declining offers from multiple promotions, adding pre-fight he wanted to grow his legacy in the organisation before targeting an all-British bout with welterweight champion Leon Edwards. Page displayed the showmanship he is known for during his walkout, paying tribute to former WWE star The Undertaker and appearing in a hooded black robe, before dancing the rest of the way towards the octagon. With his hands-down, bouncing stance, Page delivered an array of strikes on Holland in the first round, including a big straight right hand, a body kick and a spinning back elbow. Between rounds Holland could be heard telling his corner "he's faster than we thought" as he continued to struggle to land on Page, with his best moment coming from a takedown midway through the contest. With Page continuing to find a home for his attacks while moving in and out of danger, his confidence grew and he started to showboat, much to the annoyance of Holland who mimicked Page's demeanour late in the fight out of frustration. But the fighters would embrace, shaking hands and sharing words as the final bell rang, before Page was declared the winner.

  Wood won nine of her 17 fights in the UFC

  On the undercard fellow Briton Joanne Wood ended her trailblazing career with victory as she beat Maryna Moroz by split decision, before confirming her retirement from the sport. Wood, 38, who was Scotland's first professional female MMA fighter, finishes her career with 17 wins from 25 fights across a 12-year career, with nine of her victories coming in the UFC. After a slow start Wood grew into the fight, finding a home for her strikes in the second round and continuing into the third, with the highlight being an eye-catching spinning backfist which wobbled Ukraine's Moroz. Following victory Wood took off her gloves, traditionally a symbolic gesture from retiring fighters, before leaving the octagon for the final time to the sound of bagpipes. "[Emotions] haven't hit me yet, afterwards I feel the adrenaline is still going, I'm doing OK. I'm not a sobbing mess. But I feel after a few whiskies I will be," said Wood. "I'm retiring on a good note, even before this win I was sure. I'm good for money, I've worked for this moment to walk away on a good note. I'm healthy, happy, content and still going to be involved with martial arts - just not myself. "I'm a Scottish lass and my motto is never give up and you don't have to be loud to be heard."

  In the main event, Sean O'Malley outclassed Marlon 'Chito' Vera to retain his bantamweight title by unanimous decision. American O'Malley, 29, won every round on the judges' scorecards to avenge his defeat by Ecuador's Vera in 2020. O'Malley was the slicker of the two on the feet, landing a variety of damaging strikes including punch combinations and a huge knee. The victory was the first defence of O'Malley's title and his 10th win in 12 UFC bouts. Following the fight, O'Malley called out featherweight champion Ilia Topuria. "Dana [White] give me a jet to Spain baby, I'm coming for Ilia Topuria. I want Ilia, give me Ilia," said O'Malley. "He's a scary dude, he excites me, going up a weight class excites me, but honestly I'm here for whatever. If you guys want me to knock out Merab Dvalishvili I'll do that too but Ilia is an exciting fight for the people."
