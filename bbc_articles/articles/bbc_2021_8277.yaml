title: 'England v Denmark: Who made your England XI for semi-final against Denmark?
  - BBC Sport'
date: '2021-07-07'
section: General
url: http://www.bbc.co.uk/sport/football/57713107
content: |-
  BBC Sport readers pick their starting XI for England's Euro 2020 semi-final against Denmark.

  We asked you who should start for England in their Euro 2020 semi-final match against Denmark- and the majority of you think Gareth Southgate should stick with the same XI he picked against Ukraine.

  Having yet to concede a goal in the tournament, it comes as no surprise that goalkeeper Jordan Pickford was the most selected player overall.

  Harry Maguire and John Stones remain your preferred partnership in front of Pickford. After his goal against Ukraine, Maguire is the second most selected player overall, while Stones is fourth.

  Now Harry Kane is up and running with three goals, the England captain has been entrusted by you to lead the line again. Kane - who earned star of the match honours against Ukraine - is the third-most picked player overall.

  The front three are completed by Raheem Sterling, who is the most selected player on the left side of attack, and Jadon Sancho who is the top choice to start on the right.

  While Jack Grealish was a popular choice, the Aston Villa captain's picks were split between a host of midfield and forward roles, so he just misses out.

  You can still choose your England XI but your selections will not be counted towards the result. Don't forget to share your picks on social media using #bbcfootball.

