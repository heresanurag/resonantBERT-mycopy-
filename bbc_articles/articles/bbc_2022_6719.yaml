title: 'In pictures: First day back at Stormont - BBC News'
date: '2022-05-09'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-61380697
content: |-
  The parties return to the hill post-election where they will hold talks with NI Secretary Brandon Lewis.

  Northern Ireland's political parties are back at Stormont after Thursday's historic election.

  There was a freshers' week feel on the hill but it does not look like they will be able to get down to business any time soon.

  The Democratic Unionist Party (DUP) says it will not re-enter the Stormont power-sharing executive without "decisive action" from the UK Government on Brexit trading arrangements.

  Sinn Féin's Michelle O'Neill with her party's newly-elected assembly members following the historic poll result at the weekend.

  Sinn Féin's female assembly members take a selfie - 32 out of 90 seats at Stormont are now filled by women, compared to 27 in the last election.

  DUP leader Sir Jeffrey Donaldson pictured after his meeting with Northern Ireland Secretary Brandon Lewis. He has said his party will not go back into government in Northern Ireland until its concerns about post-Brexit trading arrangements are resolved.

  The new SDLP team - the party lost four seats and returns to the assembly with eight MLAs (members of the legislative assembly).

  Ulster Unionist leader Doug Beattie, pictured outside Erskine House, says if the protocol is the obstacle to a functioning executive then it needs to be dealt with
