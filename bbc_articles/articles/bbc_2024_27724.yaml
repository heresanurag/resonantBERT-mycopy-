title: 'Harry Kane: Does criticism expose England''s cracks? - BBC Sport'
date: '2024-11-13'
section: England Men
url: http://www.bbc.co.uk/sport/football/articles/c1jr97r6e7jo
content: |-
  Harry Kane's thinly veiled criticism of England absentees increases current sense of drift, writes Phil McNulty.

  England captain Harry Kane has expressed his unhappiness at the number of withdrawals from the latest squad

  England captain Harry Kane's diplomacy skills are almost as carefully crafted to the point of perfection as the marksmanship that has made him his country's all-time record goalscorer. So when Kane diverted from his trademark non-controversial messaging to deliver what amounted to a very public slap down on England team-mates for missing the forthcoming Uefa Nations League games against Greece and the Republic of Ireland, it was a moment of wide significance. This final England camp under interim manager Lee Carsley before new coach Thomas Tuchel takes charge on 1 January has been chaotic even before a ball is kicked here in Athens, with eight players withdrawing from the original 26-man squad. Even one of those replacements, Everton defender Jarrad Branthwaite, did not make it on to the plane to Greece before he was forced to return to his club for injury treatment. One of the characteristics of Gareth Southgate's eight years as England manager was his restoration of the joy of representing the country, a basic willingness to turn up - something Kane's harsh words for the no-shows suggested was already in danger of being lost. Kane told ITV: "I think the joy to play for England - he [Southgate] brought that back. Every camp people were excited and wanted to play for England. "That is the most important thing, England comes before anything. It comes before club. It is the most important thing you play for as a professional footballer. Gareth was hot on that and not afraid to make decisions if that started to drift from certain players. "It's a shame this week. It's a tough period of the season and maybe it's been taken advantage of a little bit. I don't really like it, if I'm totally honest. I think England comes before any club situation.” Here, Kane makes the assumption that every player - perhaps more pertinently every club - shares this unswerving commitment to England as the top priority above all else. This may not be so. Indeed, it may be some blue-sky thinking from a player, no matter how brilliant, who has not won a trophy in his career for club or country. This isn't the first time Kane has gone on the front foot to the media, having spoken up against team criticism from pundits during Euro 2024. But this is the first time he has criticised his own team-mates.

  The mood around England seems increasingly gripped by a sense of drift, a holding operation with Carsley as the front man while Tuchel strangely waits in the wings before taking charge. The Football Association (FA) has led England, and as a result Carsley, into a situation where it looks like they are treading water until the new man takes office. Increasingly questions are being asked as to why Tuchel is not starting his role here in Greece, and why he is not even in Athens casting his eye over the players the FA hopes he will guide to World Cup glory in 2026, as his 18-month contract suggests is the sole objective of his appointment. Carsley has been quick to play down Kane's words, insisting there was no rift between club or country. He also pointed to November always being a "challenging" month for injuries. It should also be stated that those missing will insist they are absent for genuine reasons. Liverpool's Trent Alexander-Arnold lasted only 25 minutes of the 2-0 win against Aston Villa before going off with a hamstring injury. Arsenal's Declan Rice could only play 71 minutes of the draw at Chelsea with an already broken toe, while Bukayo Saka also went off injured. It is impossible to think any of those players would not want to have completed such important games. Chelsea's Cole Palmer was an injury doubt before the game at Stamford Bridge but played the full match, while Manchester City's Jack Grealish eventually pulled out after being included - much to manager Pep Guardiola's obvious irritation - despite missing seven games through injury. Southampton goalkeeper Aaron Ramsdale reportedly fractured his finger at Wolverhampton Wanderers, while reasons for the withdrawals of Chelsea defender Levi Colwill and Manchester City's Phil Foden are unknown, although they both played 90 minutes at the weekend. It will be intriguing to see how Kane's words, which are sure to be interpreted as a thinly-veiled suggestion of some lead-swinging, are received by those who are in his crosshairs.

