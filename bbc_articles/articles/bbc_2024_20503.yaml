  Cheyenne Naeb shoved railway worker Brittany Mansfield in front of a train at Glasgow's Queen Street station.

  American student who pushed woman on to rail track jailed

  Cheyenne Naeb admitted pushing Brittany Mansfield on to the tracks at Queen Street station

  A student who pushed a woman on to railway tracks after missing his train has been jailed. Cheyenne Naeb, 26, walked away from Brittany Mansfield after shoving her in front of a stationary train on platform seven at Glasgow’s Queen Street Station in February last year. The 28-year-old railway worker injured her hip and suffered cuts to her hand, scrapes to her legs and a swollen elbow. American student Naeb, who was studying for a PhD in philosophy at the University of Dundee, was jailed for 20 months after admitting assaulting Mrs Mansfield to her injury and danger of life and behaving in a threatening and abusive manner.

  During sentencing at Glasgow Sheriff Court, Sheriff John McCormick told Naeb the consequences of actions could have been “catastrophic,” describing his behaviour as a “gross overreaction”. Naeb, who had planned to become a professor after graduating from his course, had run on to the platform at about 09:11 on 1 February 2023 to see the train he wanted to board departing.

  Brittany Mansfield said she thought Naeb should have got a longer sentence

  Mrs Mansfield told him that the train had gone, to which Mr Naeb shouted: "Don't you come near me, you made me miss my train. Don't look at me." He also swore at her. When Mrs Mansfield turned to face Naeb, he pointed his finger at her, to which she told him he was no longer allowed to travel. Naeb reacted by pushing Mrs Mansfield with both hands to her chest with such force that she came off the end of the platform. The court heard she landed “in between the running lines of platform seven in front of a train that was preparing to leave the station”. She was able to pull herself back on to the platform, but Naeb had already walked off showing “no concern” for her wellbeing. Naeb was stopped by police after Mrs Mansfield radioed for help. She was later taken to hospital to be checked over. Naeb’s father had flown in from the United States to attend the sentencing.

  Paul Sweeney, defending, said: "He asks me to offer his appologies to her [Ms Mansfield] and he fully accepts his behaviour on that day was wrong. "He knows the physical and mental anguish he caused to her and he is sorry for that." He added: "It was hoped that he would embark on further academia by becoming a professor but this will be difficult. "His father travelled from America to see his son imprisoned rather than be at his graduation." Sheriff McCormick said: "I have read the victim impact statement regarding the ongoing physical and mental injuries. "Taking everything into account, there is no appropriate alternative to a custodial sentence."

  Speaking outside the court, Miss Mansfield said: "As a victim, I think the sentence should have been longer. I could have died. "It is not as if he pushed me off a kerb - it was quite a drop." The mum said she was off work for around nine months after the attack. She added: "I still have to stand on the platforms where it happened. It is never ending." When asked if she had any ill feelings towards Naeb, Miss Mansfield replied: "No, I do not necessarily forgive him but I do not want to be bitter. "If I was to carry on hatred and things like that, I think I would go on a downward spiral. "I have children and I want to make sure that I am in the best frame of mind."
