  The London talks between officials from the UK, France, Germany, Ukraine and the US aimed at securing a ceasefire were downgraded this week after Rubio and special envoy Steve Witkoff pulled out. Instead, Trump's Ukraine envoy Gen Keith Kellogg attended the talks in London, and Witkoff will head to Russia to meet President Vladimir Putin for the fourth time. British diplomats said they were not entirely clear why Rubio and Witkoff had pulled out of the London talks. The US state department blamed logistical reasons, but it was clear the decision was last-minute and left the Foreign Office wrongfooted. Speaking to BBC Radio 4's Today programme, Yuriy Sak, an adviser to Ukraine's ministry of strategic industries, said Ukrainian negotiators would attend the London meeting on a "very clear, narrow mandate" to achieve a ceasefire that will "pave the way for further talks".

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: BBC on the scene of a devastating Russian missile attack in Sumy

  Russia intensified attacks on Ukraine since Wednesday followed a brief lull over Easter when it halted air strikes. Putin called a temporary ceasefire for the Easter weekend but UK Defence Secretary John Healey told the House of Commons on Tuesday that British military intelligence had found no evidence of a let-up in attacks. "While Putin has said he declared an Easter truce, he broke it," he said. "While Putin says he wants peace, he has rejected a full ceasefire; and while Putin says he wants to put an end to the fighting, he continues to play for time in the negotiations." It is estimated that hundreds of thousands of people have been killed or injured on all sides since Russia invaded Ukraine on 24 February 2022, and nearly seven million Ukrainians are currently listed as refugees, external worldwide. The conflict goes back more than a decade, to 2014, when Ukraine's pro-Russian president was overthrown. Russia then annexed Crimea and backed militants in bloody fighting in eastern Ukraine.
