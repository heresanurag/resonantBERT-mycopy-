title: Trump attacks Zelensky over possibility of Crimea going to Russia - BBC News
date: '2025-04-23'
section: General
url: http://www.bbc.co.uk/news/articles/c78jx68d922o
content: |-
  The Ukrainian president has consistently rejected the suggestion that his country give up its claim to the Crimean Peninsula.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: President Trump says it's been 'hard' to get a deal with Zelensky to end war with Russia

  US President Donald Trump has accused Volodymyr Zelensky of harming peace negotiations, after the Ukrainian president said Kyiv would not recognise Russian control of Crimea. Writing on Truth Social, Trump claimed a deal to end the war was "very close", but that Zelensky's refusal to accept US terms "will do nothing but prolong" the conflict. Earlier, US Vice-President JD Vance laid out the US vision for a deal, saying it would "freeze the territorial lines [...] close to where they are today". Ukraine has long said it will not give up Crimea, a southern peninsula illegally annexed by Russia in 2014.

  Vance said the deal would mean Ukraine and Russia "are both going to have to give up some of the territory they currently own". The administration has yet to publicly offer specifics about what geographic concessions would have to be made. When asked by reporters at the White House about whether the administration was looking to recognise Russia's sovereignty over Crimea, Trump said he just wanted to see the war end. "I have no favourites. I don't want to have any favourites. I want to have a deal done," he said. Recognising Russia's illegal occupation of Crimea would not only be politically impossible for Zelensky to accept, it would also be contrary to post-war international legal norms that borders should not be changed by force. He has consistently rejected the suggestion that his country give up its claim to the Crimean Peninsula. "There's nothing to talk about here. This is against our constitution," he said.

  Rescuers in Kyiv have been combing through the wreckage of a residential building destroyed in an overnight Russian attack

