title: 'Indian Wells: World number one Iga Swiatek reaches fourth round - BBC Sport'
date: '2024-03-11'
section: Tennis
url: http://www.bbc.co.uk/sport/tennis/68529412
content: |-
  World number one Iga Swiatek overcomes a slow start to beat Czech teenager Linda Noskova 6-4 6-0 and reach the fourth round at Indian Wells.

  World number one Iga Swiatek overcame a slow start to defeat Czech teenager Linda Noskova in straight sets and reach the fourth round at Indian Wells.

  The Polish 22-year-old, a four-time major winner, trailed 4-2 in the first set and faced three break points in a pivotal seventh game.

  But she won 10 successive games from that point to earn a 6-4 6-0 victory.

  Swiatek, who lost to Noskova at the Australian Open, will play Kazakhstan's Yulia Putintseva in the last 16.

  The 19-year-old Noskova, who came back from a set down to stun Swiatek in the Australian Open third round in January, looked in firm control as she led 15-40 on her opponent's serve when already 4-2 ahead in the opening set.

  But Swiatek responded in devastating fashion and, after battling back to take the first set, took just 28 minutes to settle the second.

  In WTA history, Swiatek is responsible for 11% of all sets won 6-0 in WTA 1,000 tournaments - with this the 22nd occasion she has achieved that.

  Angelique Kerber and Caroline Wozniacki will meet in the fourth round as both look to continue building momentum after recently returning to action.

  German former world number one Kerber earned a fourth win since giving birth to her first child just over a year ago, beating Veronika Kudermetova 6-4 7-5.

  "I think it was a really intense match," Kerber said. "We played almost two hours for two sets. It's another important match win for me, for sure, and gives me confidence for the next rounds."

  Denmark's Wozniacki, who lifted the Indian Wells title in 2011, resumed her tennis career midway through last season after three years in retirement. She was taken the distance before seeing off American Katie Volynets 6-2 4-6 6-0.
