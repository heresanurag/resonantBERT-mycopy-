content: |-
  The health secretary, who supports Aberdeen, says he should have gone to a "wider range" of matches.

  Gray 'sorry' after chauffeur trips to football

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Health Secretary Neil Gray has said he is sorry he did not go to a "wider range" of football matches after using ministerial cars to attend four Aberdeen games. The Dons fan was driven by a chauffeur to watch three games at Hampden, as well as a home match. He registered the events as official government visits. In a statement to parliament, Gray said he should have attended a greater variety of games to avoid giving the impression he was acting "more as a fan and less as a minister". The Scottish Conservatives accused him of having a "jolly to watch the football" at taxpayers' expense.

  Gray also said he had used the chauffeur service for five Scotland games. The health secretary told MSPs that he had been joined by a family member or guest at six of the matches. He said that they travelled with him but at no additional cost to the taxpayer. Gray said all the engagements were “official ministerial business”, and that he had not planned to attend only Aberdeen club matches. He said: "I should have made sure that I attended a wider range of games and not just Aberdeen, and I apologise for my error." The SNP MSP added: “I am a football fan. I follow Aberdeen. But I should not have allowed the impression to be given that this played any role in my engagements and I am sorry for my error.”

  The health secretary was driven in a ministerial car to Scotland v Portugal at Hampden in October

  Gray was given VIP tickets to Aberdeen matches at Hampden three times, once in his current role and twice when he was wellbeing economy, fair work and energy secretary. The Airdrie and Shotts MSP watched Aberdeen v Hibernian in Scottish League Cup semi-final in November, and the final against Rangers in December, as well as the semi-final of the Scottish Cup against Celtic in April. The minister was also driven to an Aberdeen home league match against Livingston in May during a day of ministerial visits in the city. He said he was a guest of the SPFL at the first two matches, and of the SFA at the Celtic match. Gray told MSPs he discussed a range of issues at the Hampden matches, including pyrotechnics, business engagement in sport and the SPFL’s work to support community wellbeing. In March 2022, while serving as minister for culture, Europe and international development, Gray used the chauffeur service to go to Scotland matches against Ukraine and Poland. After becoming economy secretary, he was driven to two European Championship qualifiers against Georgia and Norway in June and November 2023. Last month, he attended Scotland's game against Portugal at Hampden.

  Scottish Conservatives called for a parliamentary investigation under the ministerial code. Deputy leader Rachael Hamilton accused Gray said: “Taking family members and guests to these games, in limos paid for by the taxpayer, confirms beyond all doubt that these meetings were not government business, but a jolly to watch the football. “Taxpayers have been duped and Neil Gray must now refund them in full.” Gray said the ministerial code makes clear that family members or guests can accompany a minister. Labour MSP Neil Bibby said the minister's attendance at the Aberdeen v Livingston game at Pittodrie has "raised particular eyebrows" and asked for further details of the discussions to be published. Scottish Greens co-leader Patrick Harvie said the "real issue" was the minister's use of a government car and there would not have been a problem had he used public transport. Speaking to journalists following Gray's statement, First Minister John Swinney said he would not refer the health secretary for an investigation under the ministerial code. He said the statement had addressed "all the issues that need to be considered" and he now considers the matter "closed".
