title: King Charles and Queen Camilla reveal their official Christmas card for 2024
  - BBC News
date: '2024-12-08'
section: UK
url: http://www.bbc.co.uk/news/articles/cx2nnm7r2k6o
content: |-
  This is their third Christmas card selection since Charles became King.

  King Charles and Queen Camilla have chosen a photograph of themselves taken in the garden of Buckingham Palace for their official Christmas card. The photograph - taken in April - shows the smiling couple standing side-by-side on what appears to be a sunny day. The greeting inside reads "Wishing you a very happy Christmas and New Year". The King - standing on the left - is wearing a grey suit and blue tie with his right hand tucked into his pocket, while the Queen wears a blue wool crepe dress. This photograph is their third Christmas card since Charles became King.

  The image, captured by photographer Millie Pilkington, was taken as the King returned to public duties following his cancer diagnosis and treatment. The palace said the card reflects the moment life was beginning to return to normality. The photograph is also a more informal picture than the one chosen for Christmas 2023. Last year's picture was captured by Hugo Burnand and showed the royal couple in the Throne Room at Buckingham Palace following the coronation. The couple were standing side-by-side, with King Charles pictured wearing the Imperial State Crown and Queen Camilla wearing Queen Mary's Crown. Christmas images used to decorate official festive cards are regularly released by senior members of the Royal Family. It will take Charles and Camilla several days to personally sign all the cards. There will be around 2,700 which will be sent to people across the globe including family, friends, world leaders and organisations.
