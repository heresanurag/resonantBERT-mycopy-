title: X sign removed at Elon Musk's HQ after neighbours complain - BBC News
date: '2023-08-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66296419
content: |-
  The flashing sign went up three days ago. San Francisco officials investigated its installation.

  The flashing sign was put up on the roof of headquarters at X, formerly known as Twitter, on Friday.

  City officials in San Francisco said they were investigating the sign's installation after numerous complaints.
