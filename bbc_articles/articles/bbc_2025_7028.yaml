title: Cefn Cribwr murder investigation launched after woman found dead - BBC News
date: '2025-04-20'
section: Wales
url: http://www.bbc.co.uk/news/articles/cvg7k2w78dyo
content: |-
  Police attended a property in the village after receiving a request for a welfare check on two people.

  Police were called to a property on Bryn Terrace in Cefn Cribwr

  A man has been arrested on suspicion of murder after a woman was found dead. Police attended a property in Cefn Cribwr in Bridgend county at 21:15 BST on Friday after concerns were raised for the welfare of two people. A 48-year-old woman was confirmed dead inside the property on Bryn Terrace and a 56-year-old man from Pyle was found at the scene, South Wales Police said. The man was arrested on suspicion of murder and police are not looking for anyone else in connection with the incident.

  Det Ch Insp Lianne Rees said: "Our thoughts remain with the family and friends of the woman who has died."
