title: ScotRail services operating normally amid communications issue - BBC News
date: '2024-12-06'
section: Scotland Business
url: http://www.bbc.co.uk/news/articles/c1wqj12rq7vo
content: |-
  Network Rail is experiencing a nationwide fault with the radio system between driver and signallers.

  Services from ScotRail stations are running as scheduled

  Trains across Scotland are operating as normal amid a system fault affecting other services across the UK. Network Rail is experiencing a nationwide fault with the radio system between driver and signallers, leading to delays and cancellations to services. Commuter services between Glasgow and Edinburgh are operating as normal with no queues. Passengers are advised to check individual routes before travelling.

  Services at Central Station and Queen Street station in Glasgow are running normally with no delays or cancellations currently shown on departure boards.

  ScotRail spokesperson Paul McKay said: "Our colleagues are Network Rail are experiencing an industry-wide problem with communications systems, you should contact them if you have any questions on the fault. "ScotRail services are operating well, with some minor delays in places. "We're asking customer to check before they travel. The fault does not affect the safe running of trains." ScotRail said there was a seperate issue with some journey searches on its app which is is being fixed by the provider. Passengers can check live journey information, external using the Network Rail website. Network Rail delays were caused by a failure of the onboard GSM-R communication system. GSM-R is designed to enable driver and signallers to communicate digitally with signalling centres. The failure is currently being investigated by the operator. Traffic Scotland operator manager Douglas Cairns told BBC Radio's Good Morning Scotland programme: "Our advice would be to check in with your transport operator - Scotrail or another - to check on what cancellations or delays there are as the morning continues."
