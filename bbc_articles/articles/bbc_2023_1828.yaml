  • None Facing the team with the second most sacks in a single season in NFL history, the Chiefs' offensive line didn't allow Mahomes to be sacked once
  • None Mahomes became the 13th quarterback to win multiple Super Bowls
  • None Mahomes is the first player from the top four professional sports in the US to win multiple MVPs and multiple championship MVPs within 2000 days of his debut (1869)
  • None Reid became the 15th coach to win multiple Super Bowls
