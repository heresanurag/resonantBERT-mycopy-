title: North Korea state TV reports on Trump Kim summit - BBC News
date: '2018-06-11'
section: General
url: http://www.bbc.co.uk/news/world-asia-44441923
content: |-
  North Korean state television is finally reporting that Kim Jong-un is to meet the US president on Tuesday.

  North Korean state television is now reporting that the country's leader, Kim Jong-un, is to meet US President Donald Trump on Tuesday.

  It may seem late, but actually Mr Kim's activities are usually not reported on until he is safely back in North Korea.
