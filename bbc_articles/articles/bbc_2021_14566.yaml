title: Wreaths laid on Poppies to Paddington memorial train - BBC News
date: '2021-11-11'
section: Cornwall
url: http://www.bbc.co.uk/news/uk-england-cornwall-59237919
content: |-
  The Poppies to Paddington event symbolises the long journey made by soldiers on their way to war.

  Wreaths were handed over in Penzance, Cornwall, to start their journey to Paddington, London

  Poppy wreaths from south-west England have been laid on a memorial train to mark Remembrance Day.

  The Poppies to Paddington event, organised by The Veterans Charity and Great Western Railway, started in 2020 as memorial services had to be cancelled due to the pandemic.

  The journey symbolises the long journey made by soldiers on their way to war.

  Wreaths were laid in Penzance and Paignton on the train heading to Paddington.

  The Poppies to Paddington event started in 2020 and has continued in 2021

  Mayor of Penzance, Jonathan How, was joined by St Ives MP Derek Thomas and representatives of the armed forces in laying wreaths on the train.

  The wreaths travelled to London in First Class

  Mr How said: "Poppies to Paddington gives us a modern-day echo of the long train ride from Penzance Station that began so many people's journey to war.

  "We must never forget that quite a number of those same people suffered horrific injuries while others never returned at all."

  The wreaths were due to be placed on Paddington's war memorial in London.

