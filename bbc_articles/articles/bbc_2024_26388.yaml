title: Thousands march in London over deaths in custody and riots - BBC News
date: '2024-10-26'
section: London
url: http://www.bbc.co.uk/news/articles/c62llg60p42o
content: |-
  The protests included one remembering those who died in custody, and another supporting riot participants.

  Thousands march over riots and deaths in custody

  Thousands took part in a demonstration organised on behalf of Tommy Robinson

  Thousands of people have joined three different marches in London, focusing on the UK’s summer riots and the deaths of people in police custody. An annual event by United Families and Friends Campaign took place in Trafalgar Square remembering those who have died in police custody, and was attended by hundreds including the family of Chris Kaba. Thousands also took part in a demonstration between Victoria Station and Whitehall organised on behalf of Tommy Robinson, which aimed to support those jailed over the UK riots. A counter-protest also took place. During the Trafalgar Square event family members of those killed took a handwritten note addressed to the prime minister to Downing Street.

  Family members of people killed while in custody took a handwritten note addressed to the prime minister to Downing Street

  Speaking outside Number 10 while all dressed in black, they said: "Families are indefinitely traumatised and impacted on their wellbeing by the hands of the state... this is a vexed question and we want it settled amicably. "Everybody has the right to life and so do the families." They added it was "painful every time we hear of another death" and "the families must never be forgotten". During the march some people held signs reading "No justice, no peace" and "No more deaths in custody". Members of the Justice for Chris Kaba campaign group also attended the event and a member of the group addressed crowds during the event where they spoke of a "collective grief", "devastation" and "disappointment".

  Speeches were made at the event in Trafalgar Square

  The event came after Metropolitan Police firearms officer Martin Blake, 40, was found not guilty of murder after he shot Chris Kaba dead during a police stop in Streatham, south London, in 2022. Following the conclusion of the murder trial, a judge lifted reporting restrictions and it was revealed Mr Kaba was part of a London gang called the 67 and was connected to two previous shootings. Outside 10 Downing Street, Mr Kaba’s cousin Sheeda Kaba said the home secretary's new measures on anonymity for firearms officers were like a "punishment" for her cousin's case. "All that said to us was that we're tightening the protection of officers because there could never be another officer that gets this far, going to trial," she said. "But talking on behalf of my family, we will not be silenced. We're gonna carry on saying Chris's name."

  An activist earlier told the crowd they were not just gathering "for the Kaba family" but for all "grieving" families who they said were "bereaved at the hands of the state". Marcia Rigg, the sister of Sean Rigg, who died in police custody in 2008, said: "We are here to remind him (Sir Keir Starmer) now that he's the prime minister (that) everybody is entitled to their right to life no matter what. "If there's a crime then they go to prison and serve their sentence. Not a death sentence. There is no justice."

  Some who joined the Unite the Kingdom demonstration held banners referring to Peter Lynch, who died while serving a prison sentence

  Elsewhere in Westminster, thousands attended the Unite the Kingdom demonstration, although Mr Robinson, 41, whose real name is Steven Yaxley-Lennon, was not able to join the crowds as he was remanded into custody by police on Friday. In a post from Mr Robinson’s X account before the event, his team asked supporters to remember "we’re here not only for him, but most importantly to pay respects to Peter Lynch, and support the families of the political prisoners". The post referred to 61-year-old Lynch who died while serving a prison sentence for taking part in rioting in Rotherham, as well as others jailed in connection with disorder that took place across the country in July and August. Demonstrators carried placards reading "Two tier Keir fuelled the riots", "Bring back Rwanda" and "Stop the Boats".

  A counter-protest to the Unite the Kingdom demonstration was organised by Stand Up To Racism

  Two arrests were made at the demonstration - one on suspicion of a breach of the Public Order Act conditions in place and an alleged breach of the peace, and one on suspicion of a racially aggravated public order offence, the Met said. A counter-protest organised by Stand Up To Racism also took place at the other end of Whitehall, which called for supporters to "take to the streets" in a "massive anti-fascist demonstration". During speeches it heard from speakers including former Labour leader Jeremy Corbyn, Labour MP Diane Abbott and trade union general secretaries. Two arrests were made near the Stand Up to Racism protest - one woman was arrested on suspicion of common assault - who was later de-arrested, and another arrest was made after an officer was allegedly assaulted, the Met said. Another arrest was made on suspicion of a racially aggravated public order offence after a racist remark was allegedly directed at an officer, with the force saying it had not been confirmed which protest the person was attending. There will be a "significant" policing presence in central London throughout Saturday, Scotland Yard said, adding officers from other police forces are on duty to support those from the Met and British Transport Police in Westminster.
