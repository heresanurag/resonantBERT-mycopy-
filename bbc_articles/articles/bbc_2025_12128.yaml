title: Kneecap rapper released on unconditional bail over terror charge - BBC News
date: '2025-06-19'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cy4k4xnlj8qo
content: |-
  Kneecap's Liam Óg Ó hAnnaidh, aka Mo Chara, is accused of displaying a flag in support of proscribed organisation Hezbollah.

  Kneecap rapper Liam Óg Ó hAnnaidh, better known as Mo Chara, leaving Westminster court in central London

  A rapper with Irish language hip-hop group Kneecap has been released on unconditional bail after appearing in a London court on a terror charge. Liam Óg Ó hAnnaidh, charged under the name Liam O'Hanna, is accused of displaying a flag in support of proscribed organisation Hezbollah at a London gig. The 27-year-old, who performs under the name Mo Chara, arrived at Westminster Magistrates' Court accompanied by band members Móglaí Bap (Naoise Ó Cairealláin) and DJ Próvaí (JJ Ó Dochartaigh). Supporters of the group offered a round of applause outside a court in London on Wednesday, after the appearance.

  Liam Óg Ó hAnnaidh, with fellow band member Móglaí Bap (Naoise Ó Cairealláin, right) and JJ O'Dochartaigh (DJ Próvaí, centre) outside court on Wednesday

  Mr Ó hAnnaidh will appear at court for the next hearing on 20 August. The chief magistrate Paul Goldspring told him he must attend court on that day.

  One of the people protesting outside Westminster court ahead of the hearing of Kneecap rapper Liam Óg Ó hAnnaidh

  The court room was full and court staff had to bring in more seats for journalists. In a statement, posted on social media in May, Kneecap said: "We deny this 'offence' and will vehemently defend ourselves."

  A large crowd outside the court in London on Wednesday

  The band arrived at court on Wednesday wearing "Free Mo Chara" T-shirts. Large green flags saying "Free Speech, Free Palestine" are also on display. A mixture of Palestinian and Kneecap flags were being held by some of the crowd, and cheers were heard after a van drove past displaying the slogan "More Blacks, More Dogs, More Irish, Mo Chara". The slogan is a spin on the discriminatory message contained in a much-copied archive photograph. Kneecap said it had "plastered" London with messages of support for its band member.

  The group go by the stage names of Mo Chara, Móglaí Bap and DJ Próvaí

  Kneecap are an Irish-speaking rap trio who have courted controversy with their provocative lyrics and merchandise. The group was formed in 2017 by three musicians who go by the stage names of Mo Chara, Móglaí Bap and DJ Próvaí.

  The film won a British Academy of Film Award (Bafta) in February 2025. In April, the group faced criticism after displaying messages about the war in Gaza during their set at US music festival Coachella. In November 2024, the group won its case against the UK government over a decision Kemi Badenoch took when she was a minister to withdraw an arts grant.
