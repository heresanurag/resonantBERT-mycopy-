  Kent Police are appealing for anyone who witnessed the crash to get in contact.

  Woman and her dog killed in collision with taxi

  The taxi was travelling towards Herne Bay on the Old Thanet Road

  A woman and her dog have died after being hit by a car in Kent. Kent Police said they were called to reports of a collision on Old Thanet Way, near Herne Bay, at about 20:30 BST on Friday. The force said a black taxi was travelling towards Herne Bay when it crashed between the Chestfield and Greenhill roundabouts. A woman in her 60s was walking her dog at the time. They were pronounced dead at the scene. The woman’s next of kin have been informed.

  Police are asking anyone who saw what happened, who has not yet spoken with officers, to come forward. Anyone with dashcam or CCTV footage is also asked to get in contact.

