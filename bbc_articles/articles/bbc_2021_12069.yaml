title: 'Fuel shortage: Several petrol stations shut in Wales - BBC News'
date: '2021-09-24'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-58676366
content: |-
  But Tesco and Asda say they have good availability and can refill despite queues at some stations.

  This video can not be played To play this video you need to enable JavaScript in your browser. People should carry on buying petrol as normal, the UK government says

  Several supermarkets have closed petrol stations in Wales due to demand for fuel, amid panic buying.

  It comes despite assurances from the UK government that people should carry on buying petrol as normal.

  Tesco and Sainsbury's both confirmed closures, but Tesco said it had a "good availability" with deliveries arriving every day.

  Asda had to close some stations to temporarily refuel to meet demand, but did not report any fuel shortages.

  Sainsbury's said its Thornhill store in Cardiff had shut on Friday afternoon, adding: "All our sites are receiving more fuel and we'll reopen again as soon as possible."

  A Tesco Extra petrol station on Cowbridge Road, in Bridgend, was also closed as of 12:00 BST on Friday and at a Tesco in Bridgend, diesel was not available and only two pumps out of eight on its forecourt were open to motorists.

  Cardiff Gate services off junction 30 of the M4 ran out of fuel at about 19:45 BST, according to Traffic Wales.

  The Asda petrol station at Leckwith, near Cardiff City FC Stadium, was closed on Friday evening to refuel after the increased demand.

  Traffic brought to a halt at Aberthaw as drivers try to fill up

  Sion Jones, of Valley Services, Llandysul in the Teifi Valley, said he would have to "consider rationing fuel sales" to customers if panic buying continues.

  Transport Secretary Grant Shapps told the BBC the Army could be brought in to drive fuel tankers if it would help.

