  South Wales Police appealed on Twitter for drivers to keep roads clear.

  "We are aware of drivers queuing at petrol stations across South Wales," the force wrote.

  "Keeping highways clear is essential for emergency services, & other public service functions, and hindering them poses a public safety risk."

  Sainsbury's in Thornhill was closed on Friday afternoon

  Bus company Stagecoach South Wales also wrote on Twitter: "All our services are experiencing severe delays due to traffic queues at petrol stations. We are working to maintain services."

  Stagecoach apologised to passengers because it was unable to use the bus stop at Asda in Dowlais, Merthyr, due to the amount of vehicles queueing for fuel at the superstore.

  Cardiff Bus said in a statement: "We would like to apologise for the current delays we are experiencing across our network.

  "The roads are extremely busy due to the panic buying of fuel - we would like to thank you for your patience, our driver will be with you asap."

  Queues were seen outside a garage in Dolgellau...

  It is estimated that the UK is short of about 100,000 HGV drivers - with gaps made worse by the Covid-19 pandemic and Brexit.

  Outside Wales, some stations owned by BP and Esso-owned Tesco Alliance were shut on Thursday because of a lack of delivery drivers.

  Mr Jones is considering rationing fuel at the garage he works at

  Steve Coombe, of the Petrol Retailers Association, said: "There were no supply outages last week but there are some sites that are confirming delay in deliveries... they appear confined to London and the south-east [of England] and one or two in the Midlands, but they appear to be temporary in nature."

  He added: "Sometimes newspaper headlines can sensationalise... everyone keep calm, there is plenty of stock.

  "Those sites that have had problems are getting their fuel replenished."

  Motorists queued for fuel in Llanishen, Cardiff, on Friday

  Will Young, who queued for half an hour for petrol at Morrisons in Llanishen, said: "You could see it coming really because on the news yesterday, it said it's going to happen over the next couple of weeks.

  "It's not my problem but it is a problem for people who use their cars for every day purposes like business and taking their children to school."

  Tony Fundell, another shopper, told BBC Wales: "I think people are panicking. I've got enough to last me a few days so I'll top up as and when I need it.

  "I'm retired so I've got enough time on my hands but I feel sorry for those who are in business."

  Sometimes newspaper headlines can sensationalise the issue, says the Petrol Retailers Association

  Chris Bird, director of C J Bird Transport in Llantrisant, told BBC Radio Wales that petrol panic buyers are "creating their own problem".

  "If you don't need it, don't bother. Unfortunately as humans we tend to panic and be very selfish in these times," he said.

  He added that turning to European drivers to fix the HGV driver shortage is no solution.

  "The eastern European drivers have been the band aid for the job for the last 10 years I would say.

  "It's solvable, the market will find its feet, the wages will go up to a point where people will become more attracted to it."

  The Welsh government said: "The shortage of HGV drivers is of significant concern as they are critical to effective and timely distribution of goods across the country.

  "We are monitoring the situation very closely but responsibility lies with UK government and we continue to raise our concerns with them."

  Some senior UK government ministers will meet later to discuss supply problems at petrol stations.
