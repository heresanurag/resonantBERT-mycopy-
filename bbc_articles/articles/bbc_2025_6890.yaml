title: Report recommends blood treatment over Jersey toxic water row - BBC News
date: '2025-04-02'
section: Jersey
url: http://www.bbc.co.uk/news/articles/cwygynqkd30o
content: |-
  Scientists for Jersey's government have revealed steps to tackle the health impacts of private water supply contamination.

  Lisa Cabot's levels of one forever chemical are 16 times higher than normal

  Residents who were exposed to "forever chemicals" in Jersey should be offered treatments such as bloodletting to reduce levels of contamination in their bodies, doctors and scientists have advised the island's government. Private borehole water supplies on the island were contaminated with per- and polyfluoroalkyl substances (PFAS) – a group of more than 9,000 synthetic chemicals used in everyday products globally from frying pans to make-up. Research shows some can cause serious health conditions like cancer,, external and there are links to fertility issues.

  Known as "forever chemicals" because they take a long time to break down, some reports have estimated there are hundreds of locations affected by them in the UK., external Thousands more sites are thought to be contaminated across Europe, and the Crown Dependency of Jersey has become a focal point for efforts to tackle the impacts. Foam containing PFAS was used on a fire training ground at the island's airport in the 1990s, which leaked into nearby private borehole water supplies.​​ ​​The island's government set up a scientific panel in 2023 to advise on the toxic chemicals, following years of campaigning by residents who say their health has been impacted. ​​Now, the scientists have recommended two types of treatments: , externalcholesterol-lowering tablets, and blood-letting - a treatment where blood is gradually withdrawn from a vein, allowing the body to naturally replenish it.

  A cluster of farms and houses lie at the foot of the old airport training ground

  Ministers are expected to decide whether to implement the recommendations in the summer following a public consultation. ​​Panel chair Dr Steve Hajioff told the BBC that "PFAS increase ​the risk of kidney cancer and testicular cancer" and "appear to increase people's cholesterol". ​​"We can't be certain at an individual person level whether any problems they have are related to PFAS," he explained. "That doesn't mean they're not, but it doesn't mean they are. And that's a really difficult position to be in." He said that scientists currently do not know for sure whether lowering PFAS levels in people's bodies, such as through blood-letting, "reduces their risk of disease going forward". ​​But he said it could "prevent those future children from ever being exposed to PFAS". Early research suggests the chemicals can be passed on through the placenta, external.

  ​​Graeme Farmer lived in a cottage just north of the Jersey airport training ground in the mid-1990s and drank water from a private borehole. He believes this has caused cancer to run through generations of his family. ​​"I was diagnosed with blood cancer six years ago," the 57-year-old told the BBC. "My dad went down with kidney cancer followed by bladder cancer." ​​His brother also had a tongue growth removed around the same time.

  Graeme Farmer believes generations of cancer in his family is caused by 'forever chemicals'

  In 2022, a Jersey government blood-testing programme revealed most of the islanders living in the area have high levels of PFAS in their bodies, including Mr Farmer. ​​"I work for myself as a carpenter, I do a good shift every week but I'm exhausted when I come home - I'm in bed by 7pm every night," he explained. ​​"It's had a massive impact emotionally and physically on my family." ​​In 2005, the Jersey government signed a confidential deal with 3M, the company that manufactured the firefighting foam used at the airport, under which it agreed not to pursue any legal claims against the firm in return for £2.6m towards the clean-up.​​ 3M says it has permanently discontinued production of the firefighting foam, called AFFF, and announced in 2022 it would stop manufacturing PFAS globally by the end of 2025., external Locals in Jersey have been battling for more help for decades including Lisa Cabot, who grew up in the affected area from the mid-1980s for nine years and drank from private borehole water. Her results in the government testing round showed her levels of one type of PFAS were 16 times higher than normal. She believes her health problems including high cholesterol levels and thyroid issues are linked to PFAS found in the contaminated water. ​​"I'm worried now it's passed on to my children - I'm more worried about them than me, because they will have had it from birth and not from later on in life," the 52-year-old said. ​​"For years you knew it had happened but nobody was taking it seriously." The scientific panel is now recommending that the island's government roll out testing for firefighters who worked at the training ground during the affected time period too.

  Dr Steve Hajioff chairs the scientific panel that looked into 'forever chemicals' in Jersey

  People in some areas of the UK are also worried about the impact of ​​PFAS. Residents of Bentham, a town in North Yorkshire, are taking legal action against a firefighting foam manufacturer over potential health risks caused by "forever chemicals" found in soils and groundwater. ​​In 2024, the Royal Society of Chemistry urged the UK government to toughen regulations on safe levels of PFAS in drinking water, in line with other countries. Last year, the UK government also announced it would develop a strategy for PFAS,, external but it hasn't published a paper yet.
