content: |-
  A round-the-world cruise ship has been delayed in Belfast for almost three months.

  Three months into their global cruise, they've not left Belfast

  Holly Hennessy has been waiting in Belfast from May for the ship to be ready

  Passengers on a round-the-world cruise have been left stranded in Belfast for three months after their voyage was beset by delays. Villa Vie Residences' Odyssey arrived at Queen’s Island in the Northern Ireland capital to be outfitted before it was scheduled to leave on 30 May for the first leg of a three-year cruise. But the ship has still not left yet thanks to problems with its rudders and gearbox. Florida resident Holly Hennessey is among those on board to have "hunkered down" and made the city their unexpected home.

  This video can not be played To play this video you need to enable JavaScript in your browser. The round-the-world cruise has been left stranded in Belfast for three months

  Travelling with her cat, Captain, has meant the self-proclaimed "cruise addict" has been unable to leave Belfast while waiting for the ship to be ready. Passengers are allowed to spend time on the ship during the day, but must disembark in the evenings. "We can spend all day aboard the ship, and they provide shuttle buses to get on and off," Ms Hennessey said. "We can have all of our meals and they even have movies and trivia entertainment, almost like cruising except we're at the dock."

  Holly and her cat Captain have been exploring Belfast

  Despite enjoying the sights, the damp weather has been a shock for the US native. "I've never had so much use for my umbrella in my life, and I carry my raincoat everywhere I go." Passengers on the cruise were given the option of buying their cabin outright rather than paying a daily rate for their room like a traditional hotel. It allows them to remain onboard beyond the Villa Vie Residences' Odyssey's initial three-year tour. "I want to stay just as long as I am able,” she said. “I have always wanted to live on a ship, and it will be a dream come true for me."

  Angela and Stephen Theriac have spent the time taking trips abroad

  Villa Vie Residences' website states that the cost of buying a cabin can range from $99,999 to $899,000. Ms Hennessey’s cabin has space for a double bed, small living area with room for the cat and a balcony. "Villa Vie is a community and a real community has pets,” she said. The company says they are trying to do everything they can to "relieve the anxiety" of passengers by planning trips and other cruises or putting them up in hotels. Angela and Stephen Theriac lived in Nicaragua and have made the most of their wait. Since May they have travelled by train around Spain, taken weekend trips to England, and visited Greenland. "We are travellers, and we want to make the most of the place we are in,” said Ms Theriac. “We keep teasing we will apply for residency here in Belfast." Her husband Stephen says they have settled in with the locals. "We have eaten in every restaurant and had a Guinness in every pub,” he said. “It is just all part of our adventure."

  Dr David Austin has been cruising since he retired at the beginning of the year

  Dr David Austin, from Georgia in the United States, says he has "stopped counting down" the days until the ship launches. "The payoff of seeing the world in this fashion is too great to feel too disappointed with each delay announcement," he said. “I was committed, having sold my house right before my arrival, and I’ve stayed committed to this adventure with every delay."

  Villa Vie Residences' Odyssey, docked in Belfast, was due to depart May 30

  CEO Mike Petterson said that he expects the ship to launch by the end of next week. "We're not focused on the next days or weeks, we are focused on the rest of our lives and what this company will do for the residents and the industry," he said. Mr Petterson explained that Villa Vie Residences' Odyssey is the first "affordable" residential cruise ship. "When you're the first at doing something, you will run into hiccups, but we're definitely getting there, and although we are late, we will launch," he added.
