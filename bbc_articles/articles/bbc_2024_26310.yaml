title: Keir Starmer attempts to define 'working people' tax pledge - BBC News
date: '2024-10-25'
section: Politics
url: http://www.bbc.co.uk/news/articles/cgqy8v7ze0ko
content: |-
  The prime minister is under pressure to set out who he is excluding from possible tax increases.

  Sir Keir Starmer has attempted to define who "working people" are, amid renewed scrutiny of his tax plans ahead of next week's Budget. Labour promised at the general election not to increase taxes on working people - but the party did not define who it had in mind. The government is looking at increasing tax on asset sales, such as shares and property, freezing income tax thresholds, and changes to inheritance tax. The prime minister insists working people will not be hit by these changes - but he has struggled to define who exactly he is seeking to protect from tax rises. The Conservatives have accused Labour of "reinventing" what counts as a working person, as the Budget approaches.

  In an interview during a Commonwealth leaders' summit, the prime minister was asked whether those who work, but get additional income from assets such as shares or property, would count as working people. He replied that they "wouldn't come within my definition" - but warned against making "assumptions" about what that meant for tax policy. He said he thought of a working person as someone who “goes out and earns their living, usually paid in a sort of monthly cheque" and who can't "write a cheque to get out of difficulties". Speaking afterwards, his spokesman sought to clarify that those with a "small amount of savings" could still be defined as working people. This could include cash savings, or stocks and shares in a tax-free Individual Savings Accounts (ISA), he suggested. But ministers have been reluctant to translate these comments into numbers.

  The prime minister accepted that his own definition was "broad". Those people he had in mind, he added, were those who were “doing alright” but had an “anxiety in the bottom of their stomach" about making ends meet if something unexpected happened to their family. The issue has taken on a central political importance ahead of next Wednesday's Budget, Labour's first since 2010, amid a row over whether the party is sticking to promises it made in its election manifesto. During a BBC interview back in the UK, Treasury minister James Murray was asked repeatedly to give a more precise answer. When asked whether someone who owned shares or sold a business could be a working person, he said he would not "get into too many hypotheticals". "We're talking about where people get their income from," he said, adding ministers wanted to protect people who "get their income from work".

