content: |-
  The families of Bebe King, Elsie Dot Stancombe and Alice da Silva Aguiar meet King Charles in London.

  King Charles signed a book of condolence for the victims of the knife during a visit to Southport

  King Charles has met the families of the three young girls killed in the Southport knife attack. The private meeting was held in Clarence House, a royal residence in central London. The King had travelled to Southport on Tuesday, where he expressed his "sympathy and empathy" for the people of the town. He met survivors and emergency service workers and also signed a book of condolence.

  Bebe King, six, Elsie Dot Stancombe, seven, and Alice da Silva Aguiar, nine, died after an attacker entered a Taylor Swift-themed dance class on Hart Street on 29 July. Ten others were seriously hurt including yoga teacher, Leanne Lucas, 35, who was recently readmitted to hospital.

  Elsie Dot Stancombe, Alice da Silva Aguiar and Bebe King died after the attack on 29 July

  Patrick Hurley, MP for Southport, met the King at Southport Community Fire Station, and said afterwards: "He was very keen to express his sympathy and empathy. "Very keen to make sure the people of Southport know that from the symbolism perspective, the country's heart goes out to the people here."

  The King stopped to look at the tributes, flowers and cuddly toys that have been left outside Southport Town Hall. He greeted crowds who had gathered to see him before meeting some of the children who survived the attack, their families and the police liaison team working with them. The King previously issued a statement in the wake of the stabbing, saying how he was "profoundly shocked to hear of the utterly horrific incident". He called for unity after riots spread across England in the days following the attack. Funerals have recently been held for Alice da Silva Aguiar and Bebe King, while several vigils for the girls have also taken place.
