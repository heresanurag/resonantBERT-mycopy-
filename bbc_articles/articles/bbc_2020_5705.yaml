id: bbc_2020_5705
title: Tip reopening in Sutton Coldfield leads to long queues - BBC News
date: '2020-05-19'
section: General
url: http://www.bbc.co.uk/news/uk-england-birmingham-52716476
content: |-
  There have been huge queues since a recycling centre in Sutton Coldfield reopened.

  Since Veolia Household Recycling Centre in Sutton Coldfield, West Midlands, reopened, it's led to huge queues of cars on the roads in the local area.

  Local businesses situated near the site have raised concerns.

  Phil Taylor, who owns a plumbing supplies store, described it as "horrendous".

  He said: "We've not been able to get deliveries in. Customers haven't been able to get into here."

  Birmingham City Council said residents should only visit the waste centres if it was "absolutely essential".
