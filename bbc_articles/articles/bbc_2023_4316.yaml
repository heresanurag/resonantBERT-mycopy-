id: bbc_2023_4316
title: Bola Tinubu wins Nigeria's presidential election against Atiku Abubakar and
  Peter Obi - BBC News
date: '2023-03-01'
section: Africa
url: http://www.bbc.co.uk/news/world-africa-64760226
content: "Bola Tinubu, 70, is declared the winner of Nigeria's election despite opposition\
  \ calls for a rerun.\n\nBola Tinubu arrives at a polling station before casting\
  \ his ballot in Lagos last week\n\nRuling party candidate Bola Tinubu has been declared\
  \ the winner of Nigeria's disputed presidential election.\n\nThe 70-year-old veteran\
  \ politician got 37% of the vote, official results show.\n\nTheir parties had earlier\
  \ dismissed the poll as a sham, and demanded a rerun.\n\nMr Tinubu urged them to\
  \ accept the result, but Labour said it was taking legal action to annul his victory.\n\
  \nMr Tinubu is one of Nigeria's richest politicians, and based his campaign on his\
  \ record of rebuilding the biggest city, Lagos, when he was governor.\n\nHe was\
  \ nevertheless defeated in the city by Mr Obi, a relative newcomer who mobilised\
  \ the support of many young people, especially in urban areas, shaking up the country's\
  \ two-party system.\n\nMr Tinubu won most other states in his home region of the\
  \ south-west, where he is known as a \"political godfather\" - for helping to put\
  \ others into office.\n\nHe campaigned for the presidency under the slogan: \"Emi\
  \ lo kan\", which means \"It's my turn\" in Yoruba.\n\nScenes of celebration have\
  \ been reported in Mr Tinubu's strongholds in the south-western states.\n\nTraditional\
  \ drummers lined the streets, beating their drums for excited dancers in Osun, while\
  \ supporters marched to a live band in Ekiti.\n\nSome partied into the early hours\
  \ in Lagos, even though he was defeated by Mr Obi in the city.\n\nThe normally bustling\
  \ streets of Lagos are relatively quiet on Wednesday, the usual rush-hour traffic\
  \ has not been seen and some shops, businesses and banks have not opened.\n\nLife\
  \ has returned to normal in places that did not support Mr Tinubu, like the capital,\
  \ Abuja, and Kano in the north.\n\nIn north-eastern Adamawa state, home to Mr Abubakar,\
  \ there is an air of disappointment in the main city Yola, but grudging acceptance\
  \ that after several attempts for the presidency, it is time for the former vice-president\
  \ to move on.\n\nMr Obi's stronghold in south-eastern Anambra state, where he once\
  \ served as governor, is quiet but there is an underlying sense of bitter anger.\
  \ Many feel frustrated at what they see as a fraudulent electoral process.\n\nThis\
  \ video can not be played To play this video you need to enable JavaScript in your\
  \ browser. Who is Nigeria's new president?\n\nIn his acceptance speech, Mr Tinubu\
  \ called for reconciliation.\n\n\"I take this opportunity to appeal to my fellow\
  \ contestants to let us team up together. It is the only nation we have. It is one\
  \ country and we must build it together,\" he said in a televised speech.\n\nHe\
  \ added that they had the right to challenge the results in court but said that\
  \ the lapses in the election \"were relatively few in number and were immaterial\
  \ to affect the outcome of this election\".\n\nAt a news conference later, Mr Obi's\
  \ running-mate Yusuf Datti Baba-Ahmed urged his supporters to stay calm.\n\nLabour's\
  \ lawyers were \"putting the papers together\" to challenge Mr Tinubu's victory\
  \ in court, he added.\n\nAccording to official results, voter turnout was 27%, one\
  \ of the lowest since the end of military rule in 1999.\n\nWith about 8.8 million\
  \ votes cast for Mr Tinubu, he was the choice of less than 10% of the record 93\
  \ million Nigerians who registered to vote, helped by a divided opposition.\n\n\
  A newly introduced electronic voting system seems to have eliminated the ballot-stuffing\
  \ that happened in the past and helped present a more accurate picture of the voting\
  \ population.\n\nVoter apathy is not thought to have been as much of a factor as\
  \ problems on voting day.\n\nMany potential voters left polling stations without\
  \ casting their ballots after voting did not start on time in many places.\n\nIn\
  \ some opposition strongholds, voting did not take place at all and there were also\
  \ cases of ballot-box snatching and voter intimidation in southern states such as\
  \ Rivers, Lagos and Delta.\n\nBola Tinubu's supporters have been celebrating his\
  \ victory\n\nPresident Muhammadu Buhari is stepping down after two terms in office,\
  \ marked by economic stagnation and growing insecurity around the country - from\
  \ an Islamist insurgency in the north-east to a nationwide crisis of kidnapping\
  \ for ransom and separatist attacks in the south-east.\n\nMr Tinubu now has the\
  \ task of solving these problems, among others, in Africa's most populous nation\
  \ and biggest oil exporter.\n\nAfter fighting military rule in Nigeria, escaping\
  \ into exile and being one of the founding members of the country's democracy in\
  \ 1999, Mr Tinubu will feel that he was destined to become president.\n\nHe was\
  \ always the favourite to replace Mr Buhari - whom he helped become president -\
  \ and the hurdles he has surmounted to get here will make this an even sweeter win\
  \ for him.\n\nHe was not expected to win the party primary, yet he won.\n\nMany\
  \ said his decision to go with another Muslim as a running mate would prove an obstacle,\
  \ but it was not.\n\nPreviously all major parties have split their presidential\
  \ tickets with a Christian from the south and a northern Muslim in order to achieve\
  \ broad support across this vast nation of 210 million people.\n\nHe will now have\
  \ to prove that he can hit the ground running and that he is still the same formidable\
  \ force who built modern Lagos, Nigeria's commercial hub.\n\nMr Tinubu, known as\
  \ \"Jagaban\" by supporters, will now be looking at unifying a country that is retreating\
  \ into regional lines and religious blocs, as the election results show.\n\nWhile\
  \ he met the 25% requirement in two-thirds of Nigeria's 36 states to show he was\
  \ nationally accepted, the nature of the win indicates the absence of a truly national\
  \ party.\n\nMr Obi won in Christian-dominated states and former strongholds of the\
  \ main opposition Peoples Democratic Party in the south, while the PDP support shrank\
  \ back into its northern heartlands.\n\nAdditional reporting by BBC teams around\
  \ the country\n\nNigerians cast their votes in Saturday’s general election. They\
  \ had 18 candidates to choose from for president and people also voted for senators\
  \ and members of the house of representatives. The BBC is using data provided by\
  \ Nigeria’s Independent National Electoral Commission (Inec) to tally the results.\
  \ To win in the first round, a candidate must have the largest number of votes nationwide\
  \ and at least 25% of the votes in two-thirds of the 36 states and Federal Capital\
  \ Territory (Abuja) To win in the first round, a candidate must have the largest\
  \ number of votes nationwide and at least 25% of the votes in two-thirds of the\
  \ 36 states and Federal Capital Territory (Abuja) \n\n \n\n \n\n Click on map to\
  \ see results in detail"
