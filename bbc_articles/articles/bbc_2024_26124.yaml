title: Vladimir Putin hosts Brics summit to show West pressure not working - BBC News
date: '2024-10-23'
section: World
url: http://www.bbc.co.uk/news/articles/cly3ylwg4eqo
content: |-
  Russian President Vladimir Putin is welcoming more than 20 world leaders to the Brics summit.

  The Kremlin says the summit is one of the "largest-scale foreign policy events ever" in Russia

  The West has dubbed you a pariah for invading Ukraine. Sanctions are aiming to cut off your country's economy from global markets. And there's an arrest warrant out for you from the International Criminal Court. How can you show the pressure is not working? Try hosting a summit. This week in the city of Kazan President Putin will greet more than 20 heads of state at the Brics summit of emerging economies. Among the leaders invited are China’s Xi Jinping, Indian Prime Minister Narendra Modi and Iranian President Masoud Pezeshkian. The Kremlin has called it one of the "largest-scale foreign policy events ever" in Russia. "The clear message is that attempts to isolate Russia have failed," thinks Chris Weafer, founding partner of consultancy firm Macro-Advisory. "It's a big part of the messaging from the Kremlin that Russia is withstanding sanctions. We know there are severe cracks beneath the surface. But at a geopolitical level Russia has all these friends and they’re all going to be Russia's partners." So, who are Russia's friends? Brics stands for Brazil, Russia, India, China and South Africa. The grouping, often referred to as a counterweight to the Western-led world, has expanded to include Egypt, Ethiopia, Iran and the United Arab Emirates. Saudi Arabia, too, has been invited to join.
  • None What Moscow really wants from US election The Brics nations account for 45% of the global population. Added together, members' economies are worth more than $28.5tn (£22tn). That's around 28% of the global economy.

  This year's Brics summit is taking place in Kazan, Russia

  Russian officials have indicated that another 30 countries want to join Brics or seek closer ties with the club. Some of these nations will take part in the summit. In Kazan this week expect a lot of talk about Brics representing the "global majority". But apart from providing Vladimir Putin his moment on the geopolitical stage, what is the event likely to achieve? Keen to ease the pressure from Western sanctions, the Kremlin leader will hope to convince Brics members to adopt an alternative to the dollar for global payments. "A lot of the problems Russia's economy is facing are linked to cross-border trade and payments. And a lot of that is linked to the US dollar," says Mr Weafer. "The US Treasury has enormous power and influence over global trade simply because the US dollar is the main currency for settling that. Russia's main interest is in breaking the dominance of the US dollar. It wants Brics countries to create an alternative trade mechanism and cross-border settlement system that does not involve the dollar, the euro or any of the G7 currencies, so that sanctions won't matter so much." But critics point to differences within Brics. "Likeminded" is not a word you would use to describe the current membership. "In some ways it’s a good job for the West that China and India can never agree about anything. Because if those two were really serious, Brics would have enormous influence," notes Jim O'Neill, former Chief Economist of Goldman Sachs. "China and India are doing their best to avoid wanting to attack each other a lot of the time. Trying to get them to really co-operate on economic things is a never-ending challenge." It was Mr O’Neill who, at the turn of the century, dreamt up the acronym "Bric" for four emerging economies he believed should be "brought into the centre of global policy making". But the four letters would take on a life of their own, after the corresponding nations formed their own Bric group - later Brics, when South Africa joined. They would attempt to challenge the dominance of the G7: the world's seven largest "advanced" economies (Canada, France, Germany, Italy, Japan, the UK and the US). It's not just India and China who have their differences. There is tension between two of the newest Brics members, Egypt and Ethiopia. And, despite talk of detente, Iran and Saudi Arabia have long been regional rivals. "The idea that they’re all going to fundamentally agree on something of great substance is bonkers really," believes Mr O’Neill. And while Russia, fuelled by anti-Western sentiment, talks about creating a "new world order", other Brics members, like India, are keen to retain good political and economic relations with the West. In Kazan, Vladimir Putin's task will be to skim over the differences and paint a picture of unity, while showing the Russian public – and the international community – that his country is far from isolated.
