  Adam Peaty returns from Covid to help Great Britain qualify for Sunday's men's 4x100m medley relay final.

  This video can not be played To play this video you need to enable JavaScript in your browser. Adam Peaty and Team GB finish second to qualify for the 4x100 Medley final

  Adam Peaty returned to the Olympic pool after what he said was the worst week of his life physically to help Great Britain qualify for Sunday's men's 4x100m medley relay final. Peaty tested positive for Covid-19 on Monday, a day after winning 100m breaststroke silver, and did not take part in the mixed 4x100m medley relay heats on Friday. He returned on Saturday alongside Oliver Morgan, Joe Litchfield and Matt Richards, clocking three minutes 32.13 seconds to qualify fifth-fastest in Paris. The British quartet finished second in their heat, behind the United States, who finished in 3:31.62. "It's probably the worst week of my life in terms of how my body is, and that's no exaggeration," Peaty, 29, said.

  "Everything's come at once. Since Covid, it's just every day waking up with a different thing. "The medical team's been brilliant. I think it's just a victory getting on that start block there. "Hopefully, that'll give my body a nice little push for tomorrow." Peaty did not line up for Great Britain in the mixed relay final, which took place later on Saturday. However, the Briton said he knew he would not be at 100% for the next two days as the swimming events come to a close. "I'm glad I've got a heat swim [done]. It's my first hard stuff since I had the final on Sunday last week," he added. "It's been a rough week, but hopefully we'll find a way through the next 36 hours." Great Britain are defending Olympic champions in the mixed event, with Peaty part of the team that won gold in Tokyo. Richards, Tom Dean, Duncan Scott or James Guy, who won gold in the men’s 4x200m freestyle relay on Tuesday, could also come in for the final. Britain also took silver in the men's 4x100m medley relay in Tokyo three years ago. That final takes place on Sunday at 18:10 BST. Wiffen became the first athlete from Northern Ireland to win an Olympic gold medal in 36 years as he triumphed in the 800m freestyle earlier in the week.
