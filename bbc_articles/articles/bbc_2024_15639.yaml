  Chris Devine - an associate professor of politics at the University of Dayton and co-author of Do Running Mates Matter? - told the BBC that vice-presidential picks tend to have quite a small effect on the overall race. “If it’s the case that people look at JD Vance and see him as insufficiently experienced, they will think less of Donald Trump and his judgement,” he says. "Not by a lot, but potentially on the margins." But Mr Devine also noted that Mr Vance is an “incredibly talented communicator” despite being a relative political newcomer.
