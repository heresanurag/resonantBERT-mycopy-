  Most Americans had little knowledge of him until Wednesday night. A CNN poll conducted last month showed that 13% of registered voters said they had a favourable opinion of Mr Vance and 20% an unfavourable one – nearly two-thirds either had never heard of him or had no opinion. Some convention-goers on Wednesday said they were still learning about his biography. Cindy Dore and Jackie Canon, two Republican delegates from Louisiana, said they were excited by Trump’s pick. She said she appreciated Hillbilly Elegy, but other than that, she didn’t know a lot about Mr Vance. The speeches began shortly after it was announced that President Biden had been diagnosed with Covid-19 and temporarily suspended campaign activities. The climax of the Republican convention will be Donald Trump’s speech on Thursday night.

