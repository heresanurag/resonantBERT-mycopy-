title: 'Vance: Trump running mate vows to fight for ''forgotten'' America - BBC News'
date: '2024-07-18'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/crgl9dgjgkxo
content: |-
  The young vice-presidential pick channelled his working-class roots as he assailed “career politicians” like President Biden.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Donald Trump’s vice-presidential pick JD Vance vowed in a primetime speech to fight for working-class Americans that he argued had been “cast aside and forgotten” by the Democrats. Introducing himself to millions of Americans watching on TV at home, the Ohio senator channelled his humble roots in the Midwest as he assailed “career politicians” like President Joe Biden. He argued in his address at the Republican National Convention in Milwaukee, Wisconsin, that Trump was the "last best hope” for Americans. Trump and his running mate will challenge the Democratic White House ticket, currently Mr Biden and his Vice-President, Kamala Harris, in November’s election. Mr Biden’s account on X, formerly Twitter, hit back at Mr Vance on Wednesday night, over his positions on abortion and Ukraine. Mr Vance, 39, is hoping to become one of the youngest vice-presidents in US history. In the speech, he charted his journey from a difficult childhood in small-town Ohio to the US Marines, Yale Law School, and finally the US Senate.

  This video can not be played To play this video you need to enable JavaScript in your browser. Usha Vance: My husband JD a 'powerful example of the American dream'

  The author of best-selling memoir Hillbilly Elegy, about his impoverished family in Appalachian coal country, said “America’s ruling class” had destroyed communities like his hometown with trade agreements and foreign wars. “From Iraq to Afghanistan, from the financial crisis to the Great Recession, from open borders to stagnating wages, the people who govern this country have failed and failed again,” he said. He continued: “Donald Trump represents America’s last best hope to restore what – if lost – may never be found again.

  “A country where a working-class boy, born far from the halls of power, can stand on this stage.” The running mate, who is married to Usha Vance, a lawyer and daughter of Indian immigrants, said the US had traditionally welcomed newcomers, but that it ought not to import foreign labour. “When we allow newcomers, we allow them on our terms,” he said. Mr Vance was previously an opponent of Trump, once dismissing the Republican as an “idiot” who could become “America’s Hitler”.

  JD Vance said his mother, Beverly Aikins, (pictured) is "10 years clean and sober"

  By then a venture capitalist in Silicon Valley, he later mended fences with Trump. He won the former president's endorsement and was elected to the Senate in 2022, taking office the following year. Democrats have seized on some of Mr Vance’s past statements, including that he doesn’t “really care what happens to Ukraine” and support for a nationwide abortion ban. He has recently moderated his stance on abortion to align with the official Republican platform, which says the issue should be decided by individual states. He did not mention the war in Ukraine during his speech, or say much at all about foreign policy, which was the theme of the third day of the party conference. Mr Vance did say that US allies must share in the burden of securing world peace and America would avoid conflict but “punch hard” if provoked under a second Trump presidency. He began his speech by talking about last Saturday's assassination attempt on Trump. "They accused him of being a tyrant," he said. "They said he must be stopped at all costs. But how did he respond? He called for national unity, for national calm.” In the immediate aftermath of the attack, Mr Vance blamed it on Mr Biden’s rhetoric and his warnings that his Republican rival poses a threat to democracy.

