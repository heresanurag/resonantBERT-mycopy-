title: National Gallery bans liquids after repeated protestor attacks - BBC News
date: '2024-10-17'
section: London
url: http://www.bbc.co.uk/news/articles/c89ljnwgpqwo
content: |-
  The ban starts Friday morning and excludes baby formula, expressed milk and prescription medicines.

  Two Just Stop Oil activists were jailed after throwing soup over Vincent van Gogh's Sunflowers painting in 2022

  The National Gallery has banned liquids except baby formula, expressed milk and prescription medicines after a number of attacks on paintings in its central London building. The measure, in effect from Friday morning, comes in the wake of "physical damage" to its artworks by protesters. "Unfortunately, we have now reached a point where we have been forced to act to protect our visitors, staff and collection," a spokesperson for the gallery said. Protesters targeted the art museum on five separate occasions since July 2022.

  Vincent van Gogh's Sunflowers, John Constable's The Hay Wain and Diego Velazquez's Rokeby Venus have all been damaged. The spokesperson said: "Such attacks have caused physical damage to the artworks, distress to visitors and staff, and disruption to our mission to ensure great art is available for everyone, everywhere to enjoy. "Two of these attacks have happened in the last two weeks and that is why we have taken the difficult and unfortunate decision to change the way we operate for the foreseeable future. The gallery advised visitors to take "minimal items" with them, and said all bags would be inspected. It said it was "sorry" to make this decision, and believed entry into the museum will now take longer.

  Van Gogh's Sunflowers was targeted at the gallery which caused damage to the frame, estimated to be worth £10,000 to £20,000, and paintings, according to prosecutor James Bowker. Three Just Stop Oil supporters, Stephen Simpson, of Bradford, West Yorkshire, Mary Somerville, also of Bradford, and Phillipa Green, of Penryn, Cornwall, all pleaded not guilty to criminal damage at Westminster Magistrates' Court last month. The trio will next appear at Southwark Crown Court on 28 October. This was shortly after two Just Stop Oil activists were jailed for pouring soup and causing £10,000 worth of damage in October 2022 to the frame of Sunflowers by the Dutch artist. Phoebe Plummer was handed a two-year jail term, while Anna Holland was sentenced to 20 months. Two supporters also glued themselves to Constable's The Hay Wain in July 2022. Protesters allegedly smashed the glass protecting the Rokeby Venus, or The Toilet of Venus, and caused more than £6,000 of damage in November 2023.
