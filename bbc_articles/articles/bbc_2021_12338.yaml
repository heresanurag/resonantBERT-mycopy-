title: 'Sir David Amess death: Parliament pays tribute to former colleague - BBC News'
date: '2021-10-21'
section: General
url: http://www.bbc.co.uk/news/uk-58959327
content: |-
  MPs have been remembering Sir David Amess, who was killed in his Essex constituency.

  MPs bowed their heads in a minute's silence to remember their former colleague, Sir David Amess, who was killed in his Essex constituency.

  Boris Johnson said that Sir David "simply wanted to serve the people of Essex".

  Following sessions of remembrance in both Houses, members attended a memorial service at nearby St Margaret's Church.
