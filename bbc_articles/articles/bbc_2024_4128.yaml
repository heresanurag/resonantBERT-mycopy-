content: |-
  Palmer, Gordon, Gomez, Branthwaite, Mainoo, Barkley, Toney... BBC Sport looks at the players hoping to break into Gareth Southgate's England squad on Thursday.

  England take on Brazil and Belgium at Wembley this month in the last fixtures before manager Gareth Southgate names his squad for Euro 2024.

  The squad size returns to 23 players for the tournament in Germany, down from 26 at Euro 2020 and the 2022 World Cup in Qatar.

  The squad has become pretty settled in recent years because of the success the team have had in major competitions combined with Southgate's loyalty to his trusted core group.

  That will make it increasingly tough for players to break into the final squad.

  BBC Sport takes a look at the players who will be hoping for one last chance to impress when Southgate names his squad for the friendlies on Thursday at 14:00 GMT.

  One of the standout performers for Chelsea this season. The 21-year-old has been involved in 19 goals (11 goals, eight assists) in the Premier League, with Mauricio Pochettino describing his style of play as similar to that of Argentine Angel di Maria.

  Southgate was at Stamford Bridge when Palmer scored and assisted in the Blues' win over Newcastle on Monday night, the fifth different league game this campaign in which Palmer has achieved that feat.

  The 21-year-old forward was called into the senior squad during the last break and made his debut against Malta.

