title: Joe Biden falls during graduation ceremony - BBC News
date: '2023-06-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65780853
content: |-
  The US president had been shaking hands with Air Force Academy graduates when he fell on stage.

  US President Joe Biden fell on stage at a graduation ceremony for the US Air Force Academy. He was helped up and seated within a few seconds.

  The White House said he was "fine", and had tripped over a sandbag.
