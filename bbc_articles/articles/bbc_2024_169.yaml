title: Liverpool triple shooting suspect captured on CCTV opening fire - BBC News
date: '2024-01-04'
section: General
url: http://www.bbc.co.uk/news/uk-67884241
content: |-
  A man in Liverpool is thought to have fired shots in a corner shop, at a cinema and at a house.

  A gunman has been caught on CCTV firing shots inside a Liverpool corner shop on Wednesday night.

  A man has been arrested on suspicion of three shootings: in the News and Booze store in Norris Green, outside the Showcase Cinema in Croxteth and on Malpas Road.

  No-one was hurt in the incidents, and the 49-year-old suspect was arrested early on Thursday morning.

  BBC News reporter Andy Gill looks at the three locations where a gun was fired. Read more here.
