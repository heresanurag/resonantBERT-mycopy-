  It was a painful image but the congregation was reminded that this was a celebration of her life, a service which is traditional in their home country one week after a loved one has passed away. At the service led by Fr John Heneghan, Alice's parents thanked the local community for their support while her headteacher at Churchtown Primary read tributes about Alice from her classmates. Jinnie Payne said: "If I could describe her in at least three words it would be amazing, caring and confident. "If you were having a bad day and you needed someone - Alice would be there to help you.”

  The service was held at St Patrick’s Catholic Church in Southport

  One speaker, who spoke on behalf of Alice's family, fought back tears as she said: "Alice, you are the most beautiful, strongest girl in the world and I hope you know we love you from the bottom of our hearts. "Keep smiling and dancing with the girls." She read out another message from the family which said: "We love you Alice, Your smile is extremely contagious and full of joy. "You never fail to uplift everyone's mood." One of Alice's classmates added: "You will be in our hearts forever. "You are the most kindest person in the world, and we know that you are the strongest girl we have ever met."

  A separate memorial event was held in Southport on Monday

  This was the first family service but the local community needed it too. Prayers were also said for Bebe and Elsie. The congregation gathered for a rendition of You Are My Sunshine outside the church after the ceremony. Alice's funeral is due to be held on Sunday. Also on Tuesday, it was confirmed by Alder Hey hospital that all children injured in the knife attack who were treated on its site had been discharged. Alder Hey said: "We also want to say thank you to all who sent well wishes to Alder Hey and to the families affected. "Our heartfelt sympathies remain with all those impacted by last week’s tragic events." Axel Muganwa Rudakubana, from Banks in Lancashire, has been charged with three counts of murder, 10 attempted murders and possession of a curved kitchen knife. The 17-year-old, who was born to Rwandan parents in Cardiff, moved to the Southport area in 2013.
