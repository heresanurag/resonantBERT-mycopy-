title: '''Amazing, caring and confident'' - vigil held for Southport victim Alice
  da Silva Aguiar - BBC News'
date: '2024-08-07'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/c8dppdn37jvo
content: |-
  Nine-year-old Alice da Silva Aguiar was one of three girls stabbed to death at a dance studio last week.

  Alice da Silva Aguiar was one of the three children killed in a knife attack during a Taylor Swift-themed event at a dance school on 29 July

  Mourners gathered on Merseyside to pay tribute to a Portuguese girl who died in a mass stabbing at a dance workshop in Southport last week. Alice da Silva Aguiar was killed along with Bebe King and Elsie Dot Stancombe as they attended a Taylor Swift-themed dance class on 29 July. Ten others were seriously injured in the attack. Family and friends of Alice sang hymns, and read tributes in English and in Portuguese, during the memorial service at St Patrick's Church on Tuesday. The nine-year-old's parents, Sérgio and Alexandra, walked into the service clutching a toy and their daughter's ballet shoes.

