title: Fan who flew 10,000 miles from Australia for Merseyside derby meets Everton
  players - BBC News
date: '2024-12-09'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/c5ywezqr9eqo
content: |-
  Mackenzie had wanted to take in the final Merseyside derby at Goodison Park before the club's move.

  Mackenzie meets the Everton first team squad at Finch Farm after flying 10,000 miles for a cancelled game

  An Australian teenager who flew 10,000 miles to watch his beloved Everton in the Merseyside derby only for it to be called off has been to the training ground to meet the players. Mackenzie lives in Sydney but was determined to make it to the Blues' final clash with Liverpool at Goodison Park before the move to their new stadium at Bramley Moore Dock. The match, slated for an early kick-off on Saturday, was called off over safety fears as Storm Darragh battered Merseyside. However the15-year-old said he was "over the moon" after Everton invited him to the club's Finch Farm.

  Mackenzie, whose mother Rita was born in Liverpool and whose Everton-supporting family still live in the city, turned down money for driving lessons to make the journey, desperate "to be part of history". After the game was cancelled, club captain Seamus Coleman sent Mackenzie a video message in which he said he was "disappointed as well".

  Mackenzie was able to watch Everton beat his dad's club Wolverhampton Wanderers

  But the fullback told Mackenzie he "would love to see you down the training ground". The Toffee from down-under was able to chat with the first team squad and manager Sean Dyche, and got involved in a training session. Speaking at Finch Farm, he said: "It's truly an honour to be here and it's kind of surreal how close I am to everyone. "These are the guys who are going to go out on Saturday and beat Arsenal. It's so crazy that I'm just this close to them." Things got better for Mackenzie when centre-back James Tarkowski offered to sort the teenager a ticket for the away clash against Arsenal at the weekend.

  Mackenzie said "Everton mean everything to me"

  "This club goes global and to see someone whose travelled half-way around the world just to come and watch a game it's amazing," Tarkowski said. "I'm gutted for him, I was gutted for myself that the game wasn't on, but a little a gesture from the club to come and meet the lads today." Mackenzie added: "I didn't think they would care this much to be honest. "All I really did was come from Australia, I'm just a fan really just like everyone else who came for the derby. "I'm really surprised I've gotten this much attention for that." Asked if he could make it to the re-arranged derby, the schoolboy said: "I'll figure it out, I'll find a way."
