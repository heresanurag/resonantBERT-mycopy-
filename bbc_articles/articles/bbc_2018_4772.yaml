title: Feeding mother offered university place after viral photos - BBC News
date: '2018-04-09'
section: General
url: http://www.bbc.co.uk/news/world-43590732
content: |-
  Jahantaab Ahmadi nursed her baby during a university entrance exam. The photos went viral and changed her life.

  Jahantaab Ahmadi took her two-month-old baby with her to sit a university entrance exam.

  Photos of the young Afghan mother nursing her child went viral and have changed her life.
