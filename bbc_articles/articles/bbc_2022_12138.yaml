title: 'Watch: How Queen Elizabeth''s journey to lying-in-state unfolded - BBC News'
date: '2022-09-15'
section: General
url: http://www.bbc.co.uk/news/uk-62901409
content: |-
  Queen Elizabeth's coffin is brought to Parliament to lie in state, so the public can pay their respects.

  Queen Elizabeth II's coffin has travelled in a procession from Buckingham Palace to Westminster Hall, where she will lie in state for four days.

  Crowds watched as King Charles III, the Prince of Wales and other senior royals walked behind the coffin as it journeyed down the Mall, through Horse Guards Parade, past Whitehall and into Westminster Hall.

  Members of the public are now able to pay their final respects to the Queen at Westminster Hall, until the morning of Her Majesty's funeral on Monday 19 September.
