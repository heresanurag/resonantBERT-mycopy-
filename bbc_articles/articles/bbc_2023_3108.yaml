title: 'Nicola Bulley search: Mordaunt says health revelations sexist and shocking
  - BBC News'
date: '2023-02-20'
section: Lancashire
url: http://www.bbc.co.uk/news/uk-england-lancashire-64696164
content: |-
  Commons leader says disclosure of Nicola Bulley's health "really does grate with a lot of women".

  The disappearance of Nicola Bulley has drawn huge scrutiny

  Commons Leader Penny Mordaunt has described the disclosure of private information about missing mother Nicola Bulley as "sexist" and "shocking".

  Police were criticised for revealing the 45-year-old, missing since January 27, had been struggling with the menopause and alcohol issues.

  Her family said they knew police were revealing the details as they asked for a stop to "appalling" speculation.

  Ms Mordaunt said the Lancashire force needed to face "serious questions".

  The force released the details about Ms Bulley's health following a press conference on Wednesday, when they said they had immediately categorised her as high-risk after she was reported missing due to "specific vulnerabilities".

  They revealed her struggles with the menopause and alcohol, saying they wanted "to avoid any further speculation".

  Her family later issued a statement, saying: "Although we know that Nikki would not have wanted this, there are people out there speculating and threatening to sell stories about her.

  "This is appalling and needs to stop."

  However, Lancashire Police faced a backlash from politicians and privacy campaigners, with the prime minister and home secretary also raising concerns about Ms Bulley's personal details being released in the public domain.

  Ms Mordaunt - a former women's minister - didn't hold back from criticising the actions of the force over its handling of the investigation into her disappearance.

  She told my Sunday With Laura Kuenssberg programme: "I think that [police] clearly were motivated to try and explain why this case is a complex one.

  "But I think there are serious questions to be asked about why they wanted to reveal particular information."

  She said the revelation of health details "really does grate with a lot of women and we have to put up with all kinds of sexist behaviour in all kinds of settings", adding: "And I think to have it play out in this kind of environment is why people are so upset."

  Penny Mordaunt said people were "upset" about the disclosure of Ms Bulley's health details

  Lancashire Police said it would conduct an internal review into its investigation, led by its head of crime Det Ch Supt Pauline Stables.

  Shadow home secretary Yvette Cooper, also appearing on the programme, said she had received "further information" from the force after raising concerns about its disclosure of details.

  "I am very worried about the nature of the social media speculation and frenzy that there has been around this case," she said.

  Asked whether there was a broader issue in how police view women and whether women could trust forces with "deeply personal" information, Ms Cooper said: "There is a wider issue about the way in which the police has dealt with particularly violence against women and girls, and of course with standards around misogyny and around approaches towards violence and abuse within police forces themselves."

  Ribbons have been tied to the riverside bench near where Ms Bulley disappeared

  Sir Peter Fahy, former chief at Greater Manchester Police, said on Saturday there was "a huge feeling in policing" that the scrutiny of Lancashire Police was "unfair".

  He said officers had made a "huge degree of effort" in tracing witnesses, CCTV footage and digital data, which "closed off many potential theories".

  He added that it was "disappointing that certain politicians have not perhaps tried to give this a more balanced view".

  The most acute anxieties in this case are, of course, around the importance of the investigation and finding Ms Bulley.

  But the police's handling of the case has, for politicians and many members of the public, again raised concern over how sometimes women are unfairly treated by those meant to keep them safe.

