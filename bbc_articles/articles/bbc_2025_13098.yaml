title: Human remains found in Derby in search for woman missing since 2010 - BBC News
date: '2025-06-03'
section: Derbyshire
url: http://www.bbc.co.uk/news/articles/clygxy948zpo
content: |-
  Derbyshire Police believe the remains belong to Izabela Helena Zablocka, who was last seen 15 years ago.

  Izabela Helena Zablocka had been living in Derby when her family lost contact with her in 2010

  Human remains have been found as part of a murder inquiry following the disappearance of a woman last seen 15 years ago, police have said. Derbyshire Police launched an investigation into the disappearance of Izabela Helena Zablocka, who moved to the UK from Poland in 2009, after the force received a missing persons report in May. The force had been searching an address in Princes Street in Normanton, Derby, leading to the discovery in the garden of human remains, which it believes belong to the missing woman. Police said it had arrested four people in total on suspicion of murder.

  The fourth person, a 39-year-old woman, was arrested and bailed over the course of the weekend. She has since been re-arrested, the force said. Three others - another woman aged 39, a woman aged 43 and a 41-year-old man - remain on bail pending further inquiries. Ms Zablocka's family in Poland lost contact with her in August 2010, and despite their attempts to trace her, she was never found, the force added. Leading the investigation, Det Insp Kane Martin said the identification of the remains was expected to be a "lengthy process".

  Police will remain in Princes Street in the coming days

  In a statement released by the force, he said: "Izabela's family are at the forefront of our minds following this discovery and, whilst formal identification has not yet taken place, it is our belief that these remains do belong to Izabela. "As such, we have spoken with Izabela's family in Poland, and they are aware. Our thoughts are with them at this extremely difficult time. "Identification of the remains is likely to be a lengthy process, but we will issue updates when we are able. "I know that reports of these findings will send shockwaves through the local community, and I understand the concern of residents. "Officers will remain in Princes Street in the coming days, and anyone with concerns is encouraged to speak with them."

  Ms Zablocka came to work in the UK in 2009

  Detectives are continuing to piece together information about the days before Ms Zablocka's death. Det Insp Martin added: "Izabela had friends in Derby, socialised in Derby, and worked in Derby. "We know that someone out there will have information about Izabela that may help us understand what happened to her, and urge anyone who saw, spoke to, or heard anything about Izabela in July or August 2010 to come forward. "You may hold the key piece of information that we need to understand the full circumstances of Izabela's disappearance, and to give her family answers on what happened to their loved one." Charity Crimestoppers is offering a £20,000 reward for any information that leads to the conviction of someone in the case.

