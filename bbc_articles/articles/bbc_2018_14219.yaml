title: Brexit deal will not jeopardise UK integrity, vows Raab - BBC News
date: '2018-11-02'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-46065909
content: |-
  Brexit Secretary Dominic Raab made the pledge after meeting with Sinn Féin and the DUP in Stormont.

  The Brexit secretary expects to be able to answer MPs' questions on Brexit on 21 November

  The Brexit Secretary has pledged that the government will not sign up to any deal which could threaten the UK's constitutional integrity.

  Dominic Raab made the comments after a one-day visit to Northern Ireland.

  He met with businesses in Warrenpoint and Larne, and he also met with politicians at Stormont.

  Asked three times if the government had ruled out any new regulatory checks at the Irish Sea ports, he said: "We are engaged in a negotiation process."

  He added that he was not going to engage in a running commentary but said the UK position was "we want to preserve the internal market within the United Kingdom".

