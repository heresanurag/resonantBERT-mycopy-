  It comes as a number of operators eye the growing market for driverless taxis. German car maker Volkswagen believes it could swell to €450bn in size by 2035, according to a recent report by Fortune magazine, external. But the rise of self-driving cars and ride-hailing services on US roads has also been met with some scepticism over their safety. Tesla said in a post on its X account on Monday that its robotaxi service "will greatly increase safety for vulnerable road users, such as pedestrians & cyclists". The US National Highway Traffic Safety Administration is reportedly, external reviewing information from Tesla regarding the safety of its self-driving taxis in bad weather, following a request in May. General Motors pulled the plug on its Cruise robotaxi project in December after accidents involving its self-driving vehicles. The company also cited the increasingly competitive market as a reason for suspending its ride-hailing initiative.
