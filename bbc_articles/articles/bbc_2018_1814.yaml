id: bbc_2018_1814
title: Benjamin Netanyahu tells Iran to not test 'Israel’s resolve' - BBC News
date: '2018-02-18'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-43104518
content: |-
  Israel's PM directed his comments at the Iranian foreign minister at the Munich security conference.

  Israeli Prime Minister Benjamin Netanyahu has warned Iran to not test "Israel’s resolve".

  Speaking at the Munich security conference, a high-profile annual gathering of world leaders, he held up what he said was a piece of an Iranian drone shot down by Israel earlier this month.

  His words were directed at the Iranian Foreign Minister Mohammad Javad Zarif, seated in the audience.
