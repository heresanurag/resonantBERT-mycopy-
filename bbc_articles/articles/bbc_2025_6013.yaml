id: bbc_2025_6013
title: 'Ukraine war: Zelensky claims 155 Chinese fighting for Russia - BBC News'
date: '2025-04-10'
section: World
url: http://www.bbc.co.uk/news/articles/c1wdd228953o
content: |-
  It follows Beijing's denial that many of its citizens are involved in the conflict.

  The two captured Chinese citizen's passports were displayed in the video shared by Zelensky

  Ukrainian President Volodymyr Zelensky says at least 155 Chinese citizens are fighting for Russia in the war. His comments come after two Chinese fighters were captured earlier this week - marking Kyiv's first official allegation that China was supplying Russia with manpower. Speaking to journalists on Wednesday, Zelensky reiterated his claim that there are "many more" Chinese nationals engaged in the conflict, based on information gathered by his government. Responding on Thursday, a Chinese government spokesman said they "advise relevant parties to correctly and soberly understand China's role and not to make irresponsible remarks".

  The two captured Chinese citizens were also seen speaking in the video shared by Zelensky

  "China is neither the creator nor a party to the Ukrainian crisis. We are a staunch supporter and active promoter of the peaceful resolution of the crisis," said foreign ministry spokesman Lin Jian. He reiterated an earlier comment that appeared to suggest that Chinese soldiers fighting for Russia were doing so in their private capacity. Mr Lin said China "has always required its citizens to stay away from armed conflict areas and avoid being involved in armed conflicts in any form, especially to avoid participating in military operations of any party". Beijing has previously denied many of its citizens are fighting for Russia, saying the claim has "no basis in facts".

  Earlier this week, Zelensky said his forces had fought six Chinese soldiers in Ukraine's eastern Donetsk region and took two prisoner. Russia declined to comment on this revelation. On Wednesday Zelensky had told reporters that the "the Chinese issue is serious." "There are 155 people with surnames, with passport data - 155 Chinese citizens who are fighting against Ukrainians on the territory of Ukraine," he said, according to remarks reported by Interfax., external He added that Russia was recruiting Chinese citizens on social media, and that "official Beijing knows about this". According to Zelensky, the alleged recruits receive training in Moscow before being sent out to the battlefield in Ukraine, as well as migration documents and payment. He also released on X a video of what appeared to be an interrogation of the two captured Chinese soldiers. Speaking in Mandarin Chinese, the soldiers described their background and how they were captured. One of them said it was his "first time on duty and first time in combat. Before this I had never even fired a gun". He added that he was captured with a Russian soldier. The other mentions he was in a group that included two other Chinese soldiers before they were separated in the chaos. "Everyone dispersed, I don't know if they're dead or not," he said. He said he eventually surrendered along with Russian soldiers.

  Zelensky said on X that: "Ukraine believes that such blatant involvement of Chinese citizens in hostilities on the territory of Ukraine during the war of aggression is a deliberate step towards the expansion of the war, and is yet another indication that Moscow simply needs to drag out the fighting." He has called on the US and the rest of the world for a response. Washington has said the reports of Chinese fighting for Russia are "disturbing". Ukraine has in the past questioned China's declared neutral stance. Zelensky previously alleged that Beijing supplies "elements that are part of Russia's weaponry" and called for the country to maintain a "consistent" position. China has been accused by the US of helping Russia make more munitions, armoured vehicles and missiles. It has also been scrutinised for allowing dual-use technology that can be used both commercially and militarily - such as computer chips and drones - to be exported to Russia. While Beijing and Moscow are close political and economic allies, China has attempted to present itself as a neutral party in the conflict and has repeatedly denied supplying Russia with military equipment. It defends its trade with Moscow by saying it is not selling lethal arms and "prudently handles the export of dual-use items in accordance with laws and regulations". The allegations about Chinese soldiers fighting for Russia follows Ukraine's capture of two injured North Korean soldiers in Russia's Kursk Oblast.
