  "I was looking for my seat. There's no assigned seating, which was kind of interesting," she explained.

  She agreed that people sitting behind her may have had their view obscured by her lilac Vivienne Westwood fascinator, adding "she could barely see" herself.

  Perry shot to fame in 2008 with the song I Kissed A Girl, going onto dominate the charts in the early 2010s. Her last album Smile was released in 2020.

  She joined American Idol in its sixteenth season as part of its reboot on ABC in 2018, following in the footsteps of previous judges like Simon Cowell, Paula Abdul, Mariah Carey and Nicki Minaj.

  Her time on the show attracted some controversial headlines. Last year a contestant accused her of "mom shaming" after Perry made a joke about her "laying on the table too much".

  She also faced backlash when another contestant in 2018 said he was left uncomfortable when Perry kissed him on the lips because it was his first kiss.

  Last year Perry sold the rights to her five studio albums for a reported $225m (£177.5m), shortly before ending her nearly two-year Las Vegas residency in November.

  She is married to actor Orlando Bloom and they have a daughter named Daisy Dove, aged three.
