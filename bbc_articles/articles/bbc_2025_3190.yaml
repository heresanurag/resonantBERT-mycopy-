  President Eisenhower enjoyed an informal stay with the Queen during which she cooked drop scones.

  When the Queen served drop scones for a US president at Balmoral

  This video can not be played To play this video you need to enable JavaScript in your browser. Look back at President Eisenhower's visit to Balmoral

  US president Donald Trump has been invited to meet King Charles in Scotland to discuss an unprecedented second state visit to the UK. An official letter from the monarch, delivered by Prime Minister Sir Keir Starmer on Thursday, offered a meeting at either Dumfries House in Ayrshire or Balmoral Castle, a favourite retreat of the Royal Family since the days of Queen Victoria. King Charles's mother, the late Queen Elizabeth, met 13 US presidents during her 70 years on the throne but only one ever stayed with her at Balmoral. Dwight D Eisenhower, who was often affectionately known by the nickname Ike, was a five-star general who had worked closely with Princess Elizabeth's father - King George VI - during World War 2 and became a friend of the family.

  After the war, in1946, the general had visited Balmoral and when he became president the young Queen made her first state visit to the US, staying with Eisenhower in private quarters at the White House in 1957. She enjoyed it so much she invited the president to stay with her at her favourite Scottish sanctuary. Reports from the time describe an informal and friendly meeting during which the Queen served drop scones at a lakeside picnic. She even sent the president the recipe because he had liked them so much.

  The Queen and President Eisenhower inspected a guard of honour from the Royal Highland Fusiliers at the entrance to Balmoral Castle

  King Charles, who was 10 years old when his mother hosted Eisenhower in 1959, has now extended a rare invitation to the current US president to meet him in Scotland. Like his mother, the King is seeking to play a major role in facilitating the US and UK's "special" diplomatic relationship. In his letter to President Trump, the King suggested meeting at either Dumfries House, which he has owned since 2007, or Balmoral, which is only about 58 miles (93km) from the Trump International golf resort at Menie in Aberdeenshire. The president is due to open a new course named after his mother - who was born and brought up on the Isle of Lewis - this summer. President Trump said it would be an "honour" to return to the UK, which he called a "fantastic" country.

  General Eisenhower had previously visited Balmoral in 1946 when the Queen's father King George VI hosted him

  The only US president the late queen did not meet during her reign was Lyndon Johnson. However, despite her regular visits from the US head of state, she sought to keep Balmoral as place where the affairs of state did not usually intrude. A New York Times front page article covering President Eisenhower's visit in 1959 remarked on the "informality" that governed his overnight stay. It says that he was the first American head of state to be honoured at the castle, which had been bought by Queen Victoria more than a century before. According to its report, Queen Elizabeth was seen "pacing casually" with her sister Princess Margaret on the road by the gatehouse to the castle when the president drove up with Prince Philip just before noon. The Queen's husband had greeted the US president at Dyce Airport in Aberdeen and the American flag was flown from the Queen's car as it drove the 55-mile route to the castle. According to the newspaper, school children were lining the route and workmen "lifted their caps and touched their forelocks in salute" as the president drove by. A BBC report from the time said people along the route were waving flags and banners proclaiming "We like Ike!".

  King Charles (left) was just 10 when he met Eisenhower in 1959

  When the president arrived at Balmoral, the Queen shook his hand and a lone bagpiper sounded the "Royal Salute". Eisenhower, who was 68 at the time, was said to have "fallen easily into an unhurried pace" as the 33-year-old Queen led him towards the castle. The rest of his visit was away from public view but newspaper reports from the time said he had a tour of the estate and picnic lunch on the shore of Loch Muick. They later exchanged gifts and paid a visit to the Queen Mother's home at nearby Birkhall, which is now a favourite place for King Charles to stay. Months after the visit, in January 1960, a letter for President Eisenhower arrived at the White House in Washington. Written on official Buckingham Palace letterhead and signed "Elizabeth R", the handwritten note contained a recipe for drop scones (scotch pancakes). It read: "Dear Mr President, seeing a picture of you in today's newspaper standing in front of a barbecue grilling quail reminded me that I had never sent you the recipe for the drop scones, which I provided you at Balmoral. "Now, I hasten to do so, and I hope you will find them successful." The Queen continued: ""Though the quantities are for 16 people, when there are fewer I generally put in less flour and milk, but use the other ingredients as stated. "I've also tried using golden syrup or treacle instead of only sugar, and I think that can be very good too. "I think the mixture needs a great deal of beating while making and shouldn't stand about too long before cooking." It remains to be seen what recipes King Charles might share with President Trump when they meet.

  Beat eggs, sugar, and about half the milk together. Add flour and mix well together, adding remainder of milk as required – also bicarbonate and cream of tartar. Although the queen does not provide the instruction, the pancakes are then cooked on a hot griddle.
