title: Liverpool looking into Alisson Becker injury issues - Arne Slot - BBC Sport
date: '2024-10-18'
section: Liverpool
url: http://www.bbc.co.uk/sport/football/articles/c9wkzpgpxw0o
content: |-
  Liverpool manager Arne Slot says the club are looking into Alisson Becker's injury issues after the Brazil goalkeeper suffered hamstring damage.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Liverpool manager Arne Slot has urged a rethink of the domestic calendar after losing his first-choice goalkeeper Alisson Becker to injury. The Brazil international sustained a hamstring injury in a win at Crystal Palace on 5 October and is expected to be sidelined until at least the next international break, in mid-November. Alisson played in a Champions League tie on the Wednesday evening before getting injured in the Premier League's 12:30 Saturday game. Slot's predecessor Jurgen Klopp called the lunchtime kick-off "a crime" and the Dutchman wants the packed schedule looking into. "The 12:30 kick-off is not a problem because we train at the same time but what might be something to think about for the English FA [is that] if you play a Champions League game on a Wednesday evening and then to play on Saturday at 12:30 might be a disadvantage when it comes to injuries," said Slot. "What is very good in Holland is that I’m 99.9% sure that all the teams that play in the Champions League in the upcoming week don’t play on a Sunday. "They get extra rest to prepare in the best possible way for the Champions League game. That is not something that is common here in England."

  Liverpool host Chelsea at 16:30 BST on Sunday before a Champions League game away at RB Leipzig on Wednesday. Alisson has already missed two games this season through injury and was out for more than two months from February to April last season. "It’s a bit uncommon for goalkeepers," said Slot. "For me, it’s common because the goalkeeper I had at Feyenoord [Justin Bijlow] also had his issues with injury, also muscle injuries. That’s not what you see a lot, so these two are more of an exception. "We are looking into it and what could be the reason. "One of the things that we all know is that if you've had one, then the chances of getting another one always go up so we've tried to be really careful with him." Alisson, 32, will miss his side's league game against Chelsea on Sunday along with top-flight matches against Arsenal, Brighton and Aston Villa, Champions League meetings with RB Leipzig and Bayer Leverkusen and a Carabao Cup game against Brighton. Irish keeper Caoimhin Kelleher is expected to play for the Reds.

