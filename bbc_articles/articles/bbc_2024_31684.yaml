title: Pilot killed in light aircraft crash in field near Fife Airport - BBC News
date: '2024-12-23'
section: Edinburgh, Fife & East
url: http://www.bbc.co.uk/news/articles/cgq1zdj858qo
content: |-
  The Air Accidents Investigation Branch is investigating the incident where a 50-year-old man died.

  The crash happened just before 11:40 near Fife Airport

  The pilot of a light aircraft has died after crashing into a field near Fife Airport. The 50-year-old man died at the scene, near Kinglassie, just before 11:40. The Air Accidents Investigation Branch (AAIB) said it was investigating the crash near the airport - a small airfield used by local flying clubs. Police Scotland said no-one else was injured in the crash and inquiries into the incident were ongoing.

  The plane came down in a field near Fife Airport

  A rescue helicopter was sent to the crash site as well as specialist units from Scottish Fire and Rescue Service (SFRS) A SFRS spokesperson said: "We were alerted at 11:38 on Monday 23 December to an incident involving a light aircraft near Kinglassie, Fife. "Operations Control mobilised two appliances and a heavy rescue unit to the scene to assist emergency services partners." The AAIB said an investigation had been launched. A spokesperson said: "A team of inspectors are travelling to the accident site to make inquiries and gather evidence as part of the process of conducting a safety investigation."

  A rescue helicopter and specialist teams were dispatched to the crash site
