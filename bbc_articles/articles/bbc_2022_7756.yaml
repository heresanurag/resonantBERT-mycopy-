title: 'Isle of Man TT: Organisers confirm Cesar Chanal died not Olivier Lavorel -
  BBC Sport'
date: '2022-06-08'
section: Motorsport
url: http://www.bbc.co.uk/sport/motorsport/61733290
content: |-
  Organisers confirm Cesar Chanal died and Olivier Lavorel is critical after the crash on Saturday.

  Organisers have confirmed it was rider Cesar Chanal who died in the incident

  Isle of Man TT race organisers have confirmed that they named the wrong French sidecar competitor as having died in an incident on Saturday. In a statement, they said rider Cesar Chanal had now been confirmed as having died in the crash during lap one of the first sidecar race of 2022 on the Mountain Course. On Saturday, they wrongly said passenger Olivier Lavorel had died. He remains in a critical condition in Aintree Hospital in Liverpool. In the statement, organisers said: "An initial identification procedure was conducted using established procedures and would appear to have resulted in a mistaken identification. "We now believe it was Cesar Chanal who died at the scene of the accident on Saturday, 4 June. Olivier remains in a critical condition and continues to receive treatment."

  Both competitors' families had now been informed and a "thorough review of the processes relating to the identification of competitors will take place in due course," it added. The incident took place less than a mile from the start line between the bottom of Bray Hill and Quarterbridge. It led to the race being red-flagged, and the remainder of the day's schedule abandoned.

  Olivier Lavorel and Cesar Chanal were newcomers to the Isle of Man TT races

  The races are organised by ACU Events Limited on behalf of the Isle of Man government's Department for Enterprise (DfE). The statement by organisers added: "One of the competitors sustained injuries that would not support life and was sadly declared dead at the scene. The second competitor was unconscious with severe injuries. "The injured competitor was treated at the roadside before being transferred to Noble's Hospital, and then airlifted to a specialist hospital in Liverpool to receive treatment. "An initial identification procedure was conducted using established procedures and would appear to have resulted in a mistaken identification." The statement concluded: "Our thoughts are with the family and loved ones of both Olivier and Cesar at this truly devastating time. "We ask that people do not speculate on social media." A spokesman for the Isle of Man Constabulary confirmed officers would now be "investigating the racing incident and the events leading up to it, and the aftermath" on behalf of the island's coroner of inquests. Both the DfE and the Isle of Man government have declined to comment at this stage. Although new to the TT, the pair have been regular competitors in the French F1 and F2 National Sidecar Championships, recording several podium finishes. Two other competitors have died during the 2022 Isle of Man TT. Welsh rider Mark Purslow died in a crash in practice last week while Northern Ireland rider Davy Morgan suffered fatal injuries in an accident on Monday.

