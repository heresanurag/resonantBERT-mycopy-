title: Chile declares state of emergency over forest fires - BBC News
date: '2017-01-22'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-38710219
content: |-
  Chile has requested international help to deal with forest fires.

  They broke out over a week ago and spread quickly in the dry and hot summer weather.
