  Police release bodycam footage showing moments before Chris Kaba is shot.

  The Metropolitan Police has released bodycam footage showing the moments leading up to when a man was shot during a police vehicle stop in 2022.

  Police officer Martyn Blake has been cleared of murdering Chris Kaba, when he shot him in the head in south London two years ago.

  The officer denied intending to kill the 24-year-old.

  Earlier in the trial, Mr Blake told the court: "I had a genuine belief that there was an imminent threat to life.

