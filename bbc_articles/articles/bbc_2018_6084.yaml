  The Department of Digital, Culture, Media and Sport later clarified that this would form part of its proposed UK-wide review of journalists' compliance with the new data protection regulations, to be undertaken by the Information Commissioner's Office (ICO) in four years time.

  "Within this ICO review, or aligned to it, we will make sure there is an independent named reviewer for Northern Ireland," a spokesman said.

  The newspaper industry was united in its opposition to a second phase to the inquiry. But Sir Brian Leveson has said he "fundamentally disagrees" with claims changes to the media landscape meant it was unnecessary.

  In a letter to ministers in February, he said the "full truth" about the extent of unlawful behaviour at tabloid newspapers had yet to be exposed.
