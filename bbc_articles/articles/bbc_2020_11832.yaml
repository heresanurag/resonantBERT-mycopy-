id: bbc_2020_11832
title: 'Joyce Echaquan: Trudeau decries ''systemic racism'' after indigenous woman
  death - BBC News'
date: '2020-10-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-54380645
content: |-
  A video of a dying indigenous woman being insulted by hospital staff is being widely condemned.

  A video of a dying indigenous woman screaming in distress and being insulted by hospital staff shows the "worst form of racism", says Canadian Prime Minister Justin Trudeau.

  Joyce Echaquan streamed herself on Facebook shortly before she died.

  A nurse has been fired and three investigations are under way.

  Ms Echaquan's family has said they will be taking legal action over her death.
