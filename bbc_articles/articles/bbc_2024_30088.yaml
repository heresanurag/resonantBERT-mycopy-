title: 'Enniskillen: Man dies after motorcycle collision - BBC News'
date: '2024-11-09'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/ckgd3djvz8vo
content: |-
  A man has died after a collision on the Derrylin Road, police have said.

  A man has died following a crash in County Fermanagh, police have said.

  A Black Audi A4 and a Honda CBF 600 motorcycle collided on the Derrylin Road in Enniskillen at about 21:35 GMT on Friday.

  The rider of the motorcycle was pronounced dead at the scene.

  Police have appealed for anyone with information, or dashcam footage, to contact them.
