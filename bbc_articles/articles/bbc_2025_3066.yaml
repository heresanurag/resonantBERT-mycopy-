id: bbc_2025_3066
title: 'Newspaper headlines: Trump ''won''t deport Harry'' and tributes to Southport
  ''angels'' - BBC News'
date: '2025-02-09'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c89721pyp3xo
content: |-
  The parents of two girls killed in Southport pay tribute to their "angels" on several Sunday papers.

  The Mail on Sunday leads on its exclusive, external about Andrew Gwynne.

  "Minister sacked for 'hope you die' jibe about pensioners" is the headline. The paper describes the WhatsApp messages he sent as "vile", "sexist" and "racist" - and says they were shared in a group called "Trigger Me Timbers". "Now the mask slips to expose sneering bigots at the heart of Labour" declares the Mail's editorial, external. It says the prime minister "was right to get rid of Mr Gwynne" and that his "constituents might be wise to look elsewhere for an MP."

  The Sunday Times reports that Sir Keir Starmer asked, external the cabinet secretary to urge the BBC not to run a story revealing that his top adviser, Sue Gray, earned more than him. The article says Simon Case contacted the corporation's director-general, Tim Davie. It says Mr Case did not "explicitly say the story should not go ahead" but made clear No 10 had "grave reservations". The paper says there's no evidence the BBC's coverage was affected by the government's lobbying and that Mr Davie made clear he would not intervene. The details were revealed in a book about Sir Keir's rise to power called Get In.

  "Tories call for Reform pact to save UK" is the headline on the front of the Sunday Express, external. It says leading Conservatives have called for Kemi Badenoch to make an election pact with Nigel Farage. A former Tory minister is quoted as saying "you can't have two parties competing on the right because inevitably that will help Labour to win". A spokesperson for the Conservatives says "reports of a Tory-Reform pact are nonsense". The Reform UK MP Rupert Lowe is also unenthusiastic. He points to the deal Nigel Farage made with Boris Johnson before the 2019 general election. Lowe says standing down candidates gave the Conservatives an eighty seat majority and that "they didn't even do Brexit well".

  The Sunday Telegraph says Donald Trump has "ruled out" deporting Prince Harry, external from the US. President Trump is reported as saying he has no interest in "throwing out" the Duke of Sussex, over claims of "past drug taking" made in his memoir. The right-wing American think tank, the Heritage Foundation, has been urging the US authorities to release the Duke's immigration records, to show whether drug use was disclosed. According to the paper, Trump said Prince Harry had "enough problems with his wife" whom he describes as "terrible".

  The Times has the first interviews, external with the parents of Bebe King and Elsie Dot Stancombe, two of the children killed in the Southport stabbings. The paper says they want their daughters to be remembered "for the characters they were, rather than the tragedy, or the nationwide riots that followed". The Sun on Sunday has spoken, external to the man who confronted the attacker, Axel Rudakubana. Joel Verite, who was among the first on the scene, says the horror of that day will live with him forever.

  The lead story for the Observer says, external Labour is planning a "root and branch overhaul" of the benefits system so that claimants don't face an "all-or-nothing choice". The paper says it understands that rules that leave people choosing between "working and being deemed too sick to work are set to be redrawn". The article says the proposals will be unveiled in the spring.

  The Sunday Mirror is among the papers that report, external on the government's plan to digitise more of the home buying process in England and Wales. The article says the new system will slash the time a sale takes and reduce the number of deals that collapse. A housing minister, Matthew Pennycook, tells the paper that the change will allow Britain to "follow in the footsteps of Norway", where transactions take a month on average, compared with nearly five months here. The Mirror's editorial welcomes the move. It says buying and selling "will always be headache, but this will take some pain out of it."
