content: |-
  Lord Cameron explains why the UK and US have taken action against the attacks on ships in the Red Sea.

  Lord Cameron has said military action responding to the Houthi attacks in the Red Sea has sent the "clearest possible message".

  The US and UK have carried out a second joint operation in Yemen in response to attacks on commercial shipping in the region.

