  The TV personality appeared on several reality shows, after rising to fame on How Clean Is Your House.

  Kim Woodburn, who has died at the age of 83, found fame alongside her co-star Aggie McKenzie in Channel 4 show How Clean is Your House.

  But when the show ended in 2009 following a six-year run, it was just the start for the acerbic star, who went on to create some of television's most memorable moments with her no-holds barred opinions.
