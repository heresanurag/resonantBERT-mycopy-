title: M1 reopens after third serious crash in 24 hours - BBC News
date: '2019-12-25'
section: UK
url: http://www.bbc.co.uk/news/uk-50913893
content: |-
  A "serious" collision shut a stretch of the busy motorway near Wakefield on Christmas Day.

  The southbound carriageway of the M1 in West Yorkshire has reopened after it was shut following a "serious incident" involving "multiple vehicles".

  It was the third major crash on the motorway in 24 hours.

  West Yorkshire Police said the latest incident happened on a stretch between junction 40 and junction 39 near Wakefield.

  A woman died in a collision 140 miles further south in Bedfordshire late on Christmas Eve.

  A diversion route was put place following the latest incident in West Yorkshire and Highways England had issued instructions for drivers planning to travel in the area.

  The agency said the road was "now fully open again".

