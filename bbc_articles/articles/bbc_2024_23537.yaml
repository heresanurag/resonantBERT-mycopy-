content: |-
  At least 105 people have died nationwide, as officials airdrop supplies to devastated areas of the US south-east.

  Thirty killed in one county after hurricane swamps North Carolina

  This video can not be played To play this video you need to enable JavaScript in your browser.

  At least 30 people have died and scores more are unaccounted for in just one county in North Carolina, after Hurricane Helene tore across the state and caused catastrophic flooding. A clearer image of the damage the storm inflicted after barrelling through Florida and Georgia emerged throughout Sunday, with Buncombe County appearing to be the hardest hit area. “We have biblical devastation,” said Ryan Cole, an emergency official in the county, which contains the mountain city of Asheville. "This is the most significant natural disaster that any one of us has ever seen." At least 116 people have died nationwide since the hurricane made landfall in Florida on Thursday, according to the BBC's US partner CBS, and that figure is expected to rise as officials reach more areas.

  Helene began as a hurricane - the most powerful on record to hit Florida's Big Bend, and moved north into Georgia, the Carolinas and Tennessee. The majority of deaths have been confirmed in North and South Carolina where Helene landed as a tropical storm. On Sunday evening, officials in North Carolina said 30 people had died in Buncombe County alone. Crews across the state are battling power and mobile service outages, downed trees and hundreds of closed roads. Some residents returned to find their homes entirely destroyed on Sunday. And with some 1,000 people still unaccounted for in Buncombe County, relatives are working to locate family members with limited mobile service. "This storm has brought catastrophic devastation... of historic proportions," North Carolina Governor Roy Cooper said. The American Red Cross has opened more than 140 shelters for those in south-eastern states who evacuated their homes. More than 2,000 people are currently using the shelters, the organisation said on Sunday.

  Hundreds of roads remain closed across North Carolina, with some open only to the emergency services

  Erin Quevedo, the owner of a flooded salon in Buncombe County, spoke to The Asheville Citizen Times, external while ankle-deep in mud. "The salon was completely destroyed. It looks like the water came up to about five feet inside," she said. "Right now, all we're doing is we're trying to salvage what we can." Rescue operations are ongoing in North Carolina and supplies, including food and water, are being delivered by air to affected areas that cannot be reached due to closed roads. "People are desperate for help and we are pushing to get it to them - [it is] a massive effort," Governor Cooper said. The North Carolina National Guard has rescued more than 119 people - including one infant, according to Major General Todd Hunt. He said the largest rescue was of 41 people north of Asheville. Many petrol stations are closed throughout North Carolina with long queues of cars at those that are still open. Meanwhile, the few open supermarkets have been crowded by customers attempting to buy bottled water. The damage from the storm is estimated at between $95bn and $110bn (£71bn-£82bn) nationwide. The scale of the destruction will become clearer in the coming days.

