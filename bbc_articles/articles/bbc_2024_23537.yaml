  The search for survivors is ongoing and federal emergencies have been declared in six states, including Florida and Georgia. "The devastation we're witnessing in Hurricane Helene's wake has been overwhelming," President Joe Biden said on Saturday. He was briefed by Deanne Criswell, head of the Federal Emergency Management Agency (FEMA), who he directed to speed up support to storm survivors, including deployment of extra teams to North Carolina. Some of the areas most affected by the storm lie in states expected to be decisive in November's presidential election, namely Georgia and North Carolina. The White House has said Vice President Kamala Harris will visit affected areas as soon as she can do so without affecting rescue operations. Meanwhile Donald Trump's campaign said he would visit the Georgia city of Valdosta on Monday. Although Helene has weakened significantly, forecasters warn that high winds, flooding and the threat of tornadoes could continue. There could be as many as 25 named storms in 2024, the National Oceanic and Atmospheric Administration warned earlier this year. Between eight and 13 of those storms could develop into hurricanes and a handful already have, including Helene. More storms could be on the horizon, officials warned, as the official end of hurricane season is not until 30 November.
