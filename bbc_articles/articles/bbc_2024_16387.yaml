content: |-
  Long on top and flowing in the back is the hairstyle of choice at this year's Royal Welsh?

  Griff, 5, has been growing out his mullet since last year's Royal Welsh Show

  Business in the front, party in the back. A mullet is never far away around the sheep sheds and showgrounds of this year's Royal Welsh Show. The outrageous hair style of 1970s and 80s rock stars is making something of a comeback, with the farmers of Wales leading the herd. Ceredigion sheep farmer Gwion Hughes, who is keeping it short and tidy in the back for now - a lone sheep in a growing flock of flowing locks - said: "It's just a craze now, really."

  "It never really appealed to me," Gwion told BBC Radio Wales Breakfast. But at the sheep showground five-year-old Griff's flowing blond locks would be contenders if the Royal Welsh were to bring in a mullet category. Mum Sophie, from Builth Wells, Powys, said last year at the show his big sister decided "mullet was the way to go" and her son has been growing it ever since.

  Griff says he loves his mullet

  Hayden Clarkson, 17, from Abergavenny, Monmouthshire, said he was pretty sure the mullet's comeback is complete. "I've had this mullet for about three years now," he said. "I don't think I'm ever going to go back to be honest. The girlfriend loves it."

  Hayden thinks the name for people with a mullet could be "mulletarian"

  "I do," said 17-year-old Bethan Francis, running her fingers through his long dark hair. "It's so curly," she gushed.

