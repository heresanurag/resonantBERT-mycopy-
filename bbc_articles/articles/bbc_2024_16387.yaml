  So what does he call someone sporting a mullet? "Mulletonian," Hayden offered, before agreeing with Bethan he is a "mulletarian".

  Dawson says he may be a "mullet man"

  Dawson Ellis, 20, from Rhymney, Caerphilly county, said he started growing his hair after the Covid lockdown. "I thought, 'oh why not make a mullet," he recalled, adding he got encouragement from his girlfriend. "I love his mullet, it's lush," said Gracie Andrews.

  Cattle farmer Matthew Iceton from Eggleston in County Durham denied having a mullet at all, despite a clear resemblance. "That's not a mullet," he said, before agreeing his hair style may be inspired by one. He was also encouraged to shake out his locks by others in the barn and they shouted "mullet".

  Sarah says with a bit more length in the back she could be a "mullet mama"

  Sarah Gibbons, a sheep farmer from Hay-on-Wye, said she does her own hair and may struggle to reach her back locks sometimes. "I get the sheep shears on it for a mullet," she said. "Trouble is farming, we don’t really look in the mirror, so I don't know what I've got." And her description of a mullet-wearing woman? "That's want I want to be when I grow up, a mullet mama."
