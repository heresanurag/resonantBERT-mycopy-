id: bbc_2025_020
title: Lancashire driver used expired licence for 49 years - BBC News
date: '2025-01-01'
section: Lancashire
url: http://www.bbc.co.uk/news/articles/c4g3ypjygjno
content: |-
  The motorist, aged in his 60s, was also found to have no MOT and his Range Rover was seized.

  A motorist was stopped by police and found to have been driving with a provisional licence which expired 49 years ago.

  The man, aged in his sixties, was pulled over on Wigan Road in Bamber Bridge, Preston, at about 10:00 GMT on Monday, Lancashire Police said.

  Checks showed he also had no MOT and police seized his Range Rover.

  Revealing the incident in a post on X, external, the force said: "This driver was found to have been driving for 49 years with an expired provisional licence! Vehicle seized and driver reported."
