content: |-
  With the opening ceremony set for Friday, BBC Sport previews the Tokyo 2020 Olympics - a Games like no other.

  The Tokyo 2020 opening ceremony takes place at the Olympic Stadium on Friday (12:00 BST)

  The Tokyo Olympic Games are upon us. They look and feel different to any other Games of times gone by, but they are here. At last. With an unexpected additional year of preparation under their belts, more than 11,300 athletes from 207 nations will compete over the next couple of weeks, all vying to get their hands on the medal they've worked so long for. When the Games were postponed in March 2020, organisers said the Olympic flame "could become the light at the end of the tunnel". With the Covid-19 pandemic still raging worldwide, that metaphorical tunnel is still being traversed, but Friday's opening ceremony offers a glimmer of that light. "I think it will be a moment of joy and relief when entering the stadium, a moment of joy in particular for the athletes because I know how much they are longing for this moment," said International Olympic Committee president Thomas Bach. "Then they can finally be there, they can enjoy this moment under very special circumstances."

  Masks, quarantine, saliva tests. Make no mistake, these are an Olympics like no other. With Tokyo in a state of emergency throughout the Olympics after a spike in Covid-19 infections, the Games have come under huge criticism from the Japanese public, the majority of whom have said they want the Olympics to be cancelled or postponed again. But safety is paramount for the organisers, and huge precautions are being taken, including holding the Games behind closed doors with no fans, from either Japan or overseas, being permitted inside venues. As for the athletes, they are under strict restrictions too. They must wear a face mask at all times - except when eating, drinking, training, competing or sleeping - and minimise physical interaction with others, and are being tested for Covid-19 every day.

  Team GB's Adam Peaty is looking to defend his 100m breaststroke Olympic title

  But unfortunately the virus has affected the Games already, before they have officially started. On Friday, 19 new cases of Covid-19 were reported, bringing the total of cases related to Games personnel to 106. There have been 11 positive cases among athletes in Tokyo. Six Team GB athletes have had to isolate in their rooms after being identified as close contacts of someone on their flight who later tested positive for Covid-19. US tennis player Coco Gauff had to pull out of her debut Games after testing positive before arriving in Tokyo, while Team GB's Dan Evans and Johanna Konta and world number one shooter Amber Hill withdrew for the same reason.

  There will be a record 339 medal events held across 33 sports, with five new sports - and 34 new events in total - added to the Tokyo 2020 programme by the IOC. Some 48.8% of athletes competing at the Tokyo Olympics are women - a record figure. The five new sports are karate, skateboarding, sport climbing, baseball/softball and surfing. Baseball and softball technically aren't 'new' sports on the Olympic programme, but they haven't been contested at a Games since Beijing 2008. New events have been introduced to the boxing, canoe slalom, canoe sprint, cycling, rowing and swimming programmes, while there are new mixed-gender events including a 4x100m mixed medley relay in swimming and a mixed relay in triathlon.

  These sports have been introduced in a bid to attract younger audiences and reflect "the trend of urbanisation of sport". IOC president Bach said: "We want to take sport to the youth. With the many options that young people have, we cannot expect anymore that they will come automatically to us. We have to go to them." This year's Games are also doing their bit for sustainability. The medals are made from recycled mobile phones, while the Olympic torch was made from aluminium waste from temporary housing built in the aftermath of the 2011 Great East Japan Earthquake. Only eight new competition venues have been built from scratch, while much of the energy powering Tokyo 2020 comes from renewable sources. In total, the Games will cost £11.5bn, up 22% because of the one-year delay.

