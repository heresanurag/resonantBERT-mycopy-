  For the first time in 125 years, Team GB have chosen more female athletes than male to compete in an Olympics, with 201 of the 376 athletes originally selected being women. There will be British representation in 26 of the 33 Olympic sports in Tokyo. Team GB won 65 medals at London 2012, increasing to 67 in Rio four years later. In Tokyo, UK Sport says it hopes between 45 and 70 medals will be won. This has reduced from the ambition of between 54 and 92 medals that was set in 2018, taking into account the "extraordinary circumstances" presented to athletes and staff in the build-up to the Games.

  But who will win those medals? Swimmer Adam Peaty (100m breaststroke), gymnast Max Whitlock (pommel horse) and taekwondo star Jade Jones are tipped to retain their gold medals from Rio, with Jones - the 57kg winner in London and Rio - bidding to become the first British female athlete to win gold at three successive Olympic Games. Track cyclists Jason and Laura Kenny both have the chance to become GB's most successful Olympian - Jason is currently tied for the record with Sir Chris Hoy on six golds, while Laura is already Britain's most successful female Olympian with four golds. Sprinter Dina Asher-Smith is the face of the Games for Team GB and has medal chances in the 100m and 200m, while skateboarder Sky Brown, GB's youngest Olympian at just 13, is a medal contender in the women's park event. Sailor Hannah Mills and rower Mohamed Sbihi will lead Team GB into Friday's opening ceremony, with Tokyo being the first Olympics at which nations can select two flag bearers in a bid to increase gender equality.

  US gymnast Simone Biles, 24, has five Olympic medals, including four gold

  American gymnast Simone Biles was one of the standout stars in Rio five years ago. The 24-year-old won four golds and one bronze at her debut Games and is set to compete in all five events again. If she defends her all-around title she would be the first Olympic gymnast to do so since 1968. Two more Americans are expected to dominate in the swimming pool. Caeleb Dressel has 'just' the two Olympic golds so far but the 24-year-old is favourite to win up to six gold medals in Tokyo, while Katie Ledecky, who won four golds in Rio to add to her one from London 2012, is expected to compete in up to six events. In the Olympic Stadium, look out for Jamaica's six-time Olympic medal-winning sprinter Shelly-Ann Fraser-Pryce as well as Swedish pole vaulter Armand Duplantis. Serbia's tennis world number one Novak Djokovic continues his pursuit of a Golden Grand Slam, having won the Australian Open, French Open and Wimbledon titles this year, and needing the Olympic and US Open titles to complete the feat. But arguably one of the most anticipated performances of the Tokyo Games will come from 43-year-old transgender weightlifter Laurel Hubbard. New Zealand's Hubbard, who broke male national records as a junior, will be the first trans athlete to compete at the Olympics in an individual event - the women's 87kg category.

