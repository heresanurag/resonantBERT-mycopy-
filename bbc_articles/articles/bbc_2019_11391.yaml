content: |-
  What do you want to know about polling, policies (or anything else) ahead of the 2019 UK general election?

  Confused by the latest election developments in the UK election campaign? Got a question about polling or policy? Or is there anything else you'd like us to explain?

  Send your questions to BBC News and we'll do our best to answer them.

  Here are some we have answered recently:

  Do you have any questions about the forthcoming election?

  In some cases your question will be published, displaying your name, age and location as you provide it, unless you state otherwise. Your contact details will never be published. Please ensure you have read the terms and conditions.

  Use this form to ask your question:

  If you are reading this page and can't see the form you will need to visit the mobile version of the BBC website to submit your question or send them via email to YourQuestions@bbc.co.uk. Please include your name, age and location with any question you send in.
