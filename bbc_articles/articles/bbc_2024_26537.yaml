content: |-
  As the ninth edition of the Women's T20 World Cup gets under way in the United Arab Emirates, test your knowledge by ordering how batters and bowlers have performed in previous editions.

  Ahead of the Women’s T20 World Cup in United Arab Emirates we wanted to test your knowledge of the previous editions. Australia once again come into the tournament as defending champions having won the past three editions. The ninth edition of the Women's T20 World Cup takes place from 3-20 October. Your challenge is to order run-scorers and wicket-takers from highest to lowest, both for England and the tournament as whole, based on their performances in the previous editions.

  Follow ball-by-ball coverage of every game in the Women's T20 World Cup on BBC Sounds, with live text commentaries and in-play clips on the BBC Sport website and app.
