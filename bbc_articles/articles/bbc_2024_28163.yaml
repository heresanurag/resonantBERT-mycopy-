  The family of the murdered black civil rights activist accuses the agencies of having a role in his death.

  Malcolm X’s family sues FBI, CIA and NYPD over his murder

  Malcolm X was killed in 1965 when three armed men shot him 21 times

  The family of murdered black civil rights activist Malcolm X is suing the FBI, the CIA and the New York police department (NYPD) for $100m (£79m), accusing them of a having role in his death. The lawsuit says the agencies were involved in the plot and failed to stop the killing. “We believe that they all conspired to assassinate Malcolm X, one of the greatest thought leaders of the 20th Century,” Ben Crump, a civil rights attorney who is representing the family, said at a news conference. Malcolm X was killed in 1965 when three armed men shot him 21 times as he was preparing to speak in New York.

  The lawsuit alleges that a “corrupt, unlawful and unconstitutional” relationship between law enforcement and the “ruthless killers” allowed for the murder. A link between the agencies and the killers “went unchecked for many years and was actively concealed, condoned, protected and facilitated by government agents”, the lawsuit says. It says the NYPD, coordinating with the agencies, also detained members of Malcolm X's security team days before the shooting and intentionally removed their officers from inside the ballroom where he was shot. Federal agents, including undercover operatives, were in the ballroom during the assassination and took no steps to intervene, the lawsuit alleges. The family announced their intention to sue last year. The NYPD said it "will decline comment on pending litigation" and the CIA did not immediately respond to a request for comment. The FBI told the Associated Press that it was its “standard practice” not to comment on litigation. Malcolm X was a lead spokesman for the Nation of Islam - which advocated separatism for black Americans - before his acrimonious split from the organisation. He was 39 when he was killed. One man, a Nation of Islam member, confessed to killing him. In 2021, two other men convicted of killing him had their convictions thrown out after a New York state judge declared there had been a miscarriage of justice. The two men were later fully exonerated after New York's attorney general found prosecutors had withheld evidence that would have probably cleared them of the murder. Family of the wrongly convicted men sued and won $26m from New York City and $10m from New York state.
