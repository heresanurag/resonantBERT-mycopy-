title: Thirty mummies in wooden coffins found in Egypt - BBC News
date: '2019-10-20'
section: General
url: http://www.bbc.co.uk/news/world-50116478
content: |-
  In the largest haul of its kind in more than a century, 30 mummies have been unearthed in Egypt.

  Thirty wooden coffins of men women and children, thought to belong to the families of high priests, have been found in Luxor, Egypt.

  The well-preserved burials are around 3,000 years old and will be shown in the Grand Egyptian Museum.
