title: 'Victor Adeboyejo: Bolton Wanderers striker out through injury due to ''hefty
  sneeze'' - BBC Sport'
date: '2024-09-05'
section: Bolton
url: http://www.bbc.co.uk/sport/football/articles/cwywj70wjq2o
content: |-
  Bolton Wanderers striker Victor Adeboyejo missed their EFL Trophy win at Barrow having injured himself during a "hefty sneeze".

  Bolton Wanderers striker Victor Adeboyejo missed their EFL Trophy victory at Barrow on Tuesday having injured himself after a "hefty sneeze".

  The 26-year-old suffered a back injury on Monday which was set off by the sneeze, manager Ian Evatt said.

  Bolton won the fixture 3-2 to get their EFL Trophy campaign off to the perfect start despite Adeboyejo's absence.

  "He had a pretty hefty sneeze – now Victor is a powerful boy and even his sneezes are powerful," Evatt told the Bolton News., external

  “He felt a bit of a crack in between his ribs and we are hopeful it is just a cartilage or muscular issue, but until we had a good look at the scan we won’t know.”

  Bolton, who have won once in League One this season, have a number of absences due to injury and the international break.

  “I have to start having a long look at myself when players start getting injured sneezing,” Evatt added.

  “That is just the way things seem to be going at the moment, but we have to deal with it.”
