title: Vintage Higgins beats Selby in Tour Championship final - BBC Sport
date: '2025-04-07'
section: Snooker
url: http://www.bbc.co.uk/sport/snooker/articles/cp8jkr20re8o
content: |-
  John Higgins comes from 8-5 behind to beat Mark Selby 10-8 in a gripping Tour Championship final in Manchester.

  An emotional John Higgins produced a vintage display to defeat fellow four-time world champion Mark Selby 10-8 in a compelling Tour Championship final in Manchester. The Scot dominated the early stages on Sunday to lead 5-1 but appeared on the ropes when Selby reeled off seven consecutive frames to hold an 8-5 advantage in a high-quality encounter. However, from there, Higgins who turns 50 next month, exhibited his fighting qualities, crafting breaks of 110, 67 and 84 as he edged back in front at 9-8. Victory was sealed with a sublime 132 clearance as Higgins collected the top prize of £150,000 and his second ranking title in as many months after a four-year drought. "You are playing a monster of a player," said Higgins. "To be 5-1 up and to be frozen out to be 8-5 behind, you don't come back and win five in a row against Mark Selby normally. "I managed to do it, so it was incredible. "It is incredibly difficult. You are just hitting a brick wall and I've done it so many times against him over the years. "He just plays incredible stuff. It was my best ever win." It was a stunning performance from Higgins, who appeared shorn of confidence in a mid-match wobble when a rampant Selby scored 767 points to his 66 during a seven-frame burst. At that stage it looked as though his only consolation would be to keep hold of the £10,000 high break prize alongside a runner-up cheque of £60,000. Instead, Higgins concluded the match with its eighth century to equal the record for a best-of-19 contest. In doing so, he delivered an ominous warning that he simply cannot be discounted when the World Championship begins on 19 April. While no player has won the Tour Championship and gone on to triumph at the Crucible in the same season, Higgins will take some stopping if he can replicate this form.

  Higgins, who is nicknamed 'The Wizard of Wishaw', has appeared rejuvenated since his win at the World Open in March. When he compiled two 102 breaks on his way to establishing a commanding 5-1 lead, he looked to be continuing the form that carried him past Xiao Guodong and Barry Hawkins earlier in the week. However, Englishman Selby, 41, took the concluding two frames of the afternoon with superb breaks of 112 and 136 and held sway once play resumed in the evening. By the time he levelled at 5-5, Selby was going through the gears and looked to be accelerating towards a third ranking title success of the campaign - only to be denied in remarkable fashion by a player he has twice faced in world finals. "He is incredible," said Selby on ITV4. "That is why he is an all-time great. The way he played from 8-5. I put it to him and he stood up like the warrior he is."
