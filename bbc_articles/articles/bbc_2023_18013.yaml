id: bbc_2023_18013
title: Escaped circus lion roams around Italian town before capture - BBC News
date: '2023-11-12'
section: General
url: http://www.bbc.co.uk/news/world-europe-67399095
content: |-
  Video shows the big cat wandering along a residential street before it is captured.

  A lion that was spotted walking through Ladispoli, west of Rome, has been captured and returned to the circus it escaped from.

  Videos posted on social media show locals shocked at seeing the big cat roaming the streets of the seaside town.

  Kimba, the lion, was caught more than five hours after the initial alert was raised.

  Circus owner Rony Vassallo said the lion was doing fine, and that investigations were under way to find out how he escaped.
