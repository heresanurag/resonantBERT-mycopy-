content: |-
  The West African nation is guaranteed a new leader as Nana Akufo-Addo steps down after serving two terms.

  Vote counting begins in Ghana as new president awaits

  Temporary polling booths - like this one at a school in Kumaso - are now being pulled down

  Votes are being counted after Saturday's general election in Ghana, following a voting process that was largely peaceful except for a fatal shooting in the north of the country. Police said four men were arrested at a polling station in the town of Nyankpala, where an opposition MP candidate had attempted to file a complaint but was stopped by ruling party supporters. Soldiers have since been sent to Nyankpala in armoured vehicles to restore calm. Elsewhere election day has been peacefully conducted, with some Ghanaians queuing before dawn to make sure they cast their ballots.

  Polling centres officially closed at 17:00 GMT, and election results are expected to be announced on Tuesday. Ghana's land borders have been closed until Sunday evening, in a move that correspondents describe as unusual. The West African nation is guaranteed a new president as Nana Akufo-Addo steps down after reaching the official limit of two terms in office. But he could be replaced with a familiar face, if former President John Mahama succeeds in his comeback attempt for the NDC party. His main challenger is expected to be Vice-President Mahamudu Bawumia, who would become the country's first Muslim leader if he wins for the governing NPP party. Other candidates include Nana Kwame Bediako, a businessman popular with young voters and Alan Kyerematen, who defected from the ruling NPP party last year. Close to 19 million Ghanaians are registered to vote. Despite Ghana recently bringing in tougher legislation to drive up the numbers of women in frontline politics, only one woman is in the running to become president - Nana Akosua Sarpong Frimpomaa of the Convention People's Party (CPP).

  The only other female presidential candidate in this election - Akua Donkor of the Ghana Freedom Party - died in October. Yet her name will still be listed on ballot papers because the candidate chosen to succeed her was disqualified. Saturday's general election also sees voters in 275 constituencies across the country choosing their members of parliament. Since the return of multi-party politics to Ghana in 1992, only candidates from either the National Democratic Congress (NDC) or the governing New Patriotic Party (NPP) have won the presidency. No party has ever won more than two consecutive terms in power.

  Close to 19 million people were registered to vote in this general election

  In order to win in the first round, a presidential candidate must gain more than 50% of the vote. Failing that, the top two contenders will enter a run-off vote to take place by the end of December. Voting for the first time, 18-year-old Serwaa Yeboah Joshebeth told the BBC "it is important for you to vote to choose the best for your country". The recent graduate wants to see more job opportunities, "not for me alone but for others who need them [too]." "The next leader must focus on education and jobs for the youth," the retired university worker told the BBC outside a polling booth in the city of Kumasi. "I benefit from stipends from the state at my age already," he adds. As campaigns came to a close on Friday, Bawumia said of his main rival: "What is clear is that notwithstanding the challenges we've had, we have performed better than the government of John Dramani Mahama." While Mahama told supporters "it is a choice between the Ghana we have today and the Ghana we want together. A Ghana of opportunity, prosperity, and justice for all." Ghanaians have been hit particularly hard by inflation in recent years, which reached a peak of 54.1% in 2022. Although it has since come down, many thousands of people have been pushed into poverty and living standards have suffered, says the World Bank, external. That same year, Ghana defaulted on its debt repayments and the government is still in lengthy negotiations with international lenders to try and restructure the loans. Unemployment is also at a high - particularly among the young, whose views could have a big impact on the outcome of the election. Additional reporting by Favour Nunoo in Accra and Damian Zane in London
