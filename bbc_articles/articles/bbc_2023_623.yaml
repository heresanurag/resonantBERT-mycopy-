title: 'Oscars 2023: Till director calls out ''misogyny towards Black women'' after
  Oscars snub - BBC News'
date: '2023-01-26'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-64396730
content: |-
  Chinonye Chukwu, who wrote and directed Till, says industries are "committed to upholding whiteness".

  Director Chinonye Chukwu has accused Hollywood of "unabashed misogyny towards Black women" after her film Till missed out on an Oscar nomination.

  Till is based on the true story of the mother who pursued justice after her son Emmett Till was lynched in 1955.

  The film's star Danielle Deadwyler had been widely tipped to be named in the best actress category on Tuesday for her portrayal of Mamie Till-Mobley.

  But she was absent, and no black stars were on the lead acting shortlists.

  Black Panther: Wakanda Forever's Angela Bassett is the only black actress to be nominated for an Oscar this year, in the best supporting actress category. In recent years, the Academy has nominated Cynthia Erivo, Viola Davis and Andra Day in the best actress category.

  Jalyn Hall as Emmett Till and Danielle Deadwyler as Mamie Till-Mobley in Till

  Chukwu, who wrote and directed Till, posted a message on Instagram in an apparent reference to her film's lack of nominations.

  She said: "We live in a world and work in industries that are so aggressively committed to upholding whiteness and perpetuating an unabashed misogyny towards Black women.

  "I am forever in gratitude for the greatest lesson of my life - regardless of any challenges or obstacles, I will always have the power to cultivate my own joy, and it is this joy that will continue to be one of my greatest forms of resistance."

  Her message was posted alongside a picture of herself with civil rights activist Myrlie Evers-Williams, who features in the film.

