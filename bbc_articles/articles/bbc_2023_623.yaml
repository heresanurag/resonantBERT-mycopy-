  Emmett Till was 14 when he was brutally murdered after a white woman said he had harassed her at a store.

  His death galvanised the civil rights movement, and his mother insisted the coffin remain open so his injuries could be seen by the thousands of people who paid their respects in Chicago.

  Deadwyler won rave reviews for her portrayal of Mamie Till-Mobley. Mark Kermode that she gave "an awards-worthy performance", while The Times' film critic Kevin Maher that the actress was "an Oscar cert", adding: "Nominations, at the very least, are due."

  She was nominated for a Bafta last week but was overlooked by the Oscars - as was Viola Davis, who was also among the favourites to be nominated for the best actress Oscar, for The Woman King.

  The nominees on the final list were Cate Blanchett, Ana de Armas, Andrea Riseborough, Michelle Williams and Michelle Yeoh.

  Meanwhile, no women are nominated for best director, although Women Talking, directed by Sarah Polley, is up for best film. The overall field is led by Everything Everywhere All At Once, about a Chinese woman, played by Yeoh, who hops through the multiverses as different versions of herself.

  The BBC asked the Academy of Motion Picture Arts and Sciences, which organises the Oscars, for a comment, but they said they were not giving a response at this time.

  The Oscars have been criticised for their lack of diversity in recent years. The failure to nominate black or minority actors in 2016 led to a furious backlash, with film stars boycotting the ceremony and the growth of the #OscarsSoWhite movement in 2015.

  It led to a promise from the Academy to double its female and black and ethnic minority members, a target it said it met in 2020.

