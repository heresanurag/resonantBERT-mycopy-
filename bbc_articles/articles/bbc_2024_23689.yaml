title: 'Newspaper headlines: UK limits Israel weapon sales and ''comeback rickets
  row'' - BBC News'
date: '2024-09-03'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c3rd234pw89o
content: |-
  The suspension of some British arms sales to Israel and the pricing of Oasis tickets lead the papers.

  A number of papers report on the launch of Kemi Badenoch's campaign for the Conservative leadership

  Many of Tuesday's papers focus on Britain's decision to restrict some arms sales to Israel. The Guardian, external says the UK has broken with the US by changing its policy on weapon exports. The i says the Foreign Secretary, David Lammy, has "sent a stark message" to the Israeli government. In an editorial, the Times, external calls the measure a "PR exercise", which is "designed to insulate Labour from any domestic fallout". But the Daily Mirror, external says that continuing to supply the arms "would have risked contributing to war crimes". The website of the Jewish Chronicle, external says Jewish and pro-Israel groups have reacted with disappointment. It quotes the Jewish Leadership Council as saying that "when the bodies of the six murdered hostages are still being buried, it is more important than ever for the UK to stand by its ally". The Daily Mail, external says the Conservatives have accused Prime Minister Sir Keir Starmer of "running scared" from giving MPs a say on plans to axe winter fuel payments for millions of pensioners. The paper says government sources have indicated ministers would reject calls for a Commons debate and vote. Sir Keir has defended the cut, which he says is needed to fill a £22bn "black hole" in the public finances. The Daily Express, external leads with Kemi Badenoch's pitch to lead the Conservatives. Its editorial says the shadow communities secretary has "got off to a strong start". The paper says that among some "very strong candidates" for the leadership, she has "some of most the visionary plans" to heal what it describes as a "wounded party". The Financial Times, external describes her campaign launch speech as "policy-light". One of Britain's biggest car dealerships, Vertu Motors, has told the Daily Telegraph, external that manufacturers are delaying deliveries of petrol vehicles to avoid fines. The company suggests that carmakers are "rationing" them so they don't exceed yearly quotas set by the government, which are designed to increase the proportion of electric vehicle sales. It tells the paper that customers ordering a petrol or hybrid vehicle today at some dealerships will have to wait until February for their cars to be delivered.

  Several papers cover the continuing complaints about inflated ticket prices for the Oasis comeback tour. Under the headline "Pulling the plug on Oasis wonder-haul", the Mirror, external says the prime minister has hinted the law could change to stop event companies from charging more when demand surges. The Times', external headline says "some might say it's too late". The article quotes consumer group Which? as saying the high level of demand for Oasis tickets was "clear from the outset". Finally, the Sun, external says football pundit and former player Alan Shearer had to "hide" for four hours on a train to avoid hundreds of fans of Sunderland - arch rivals of his old club, Newcastle. Shearer told The Rest is Football podcast he'd got on a busy carriage on his way home from a wedding on Saturday, only to realise it was also full of Sunderland supporters coming back from an away game against Portsmouth. The paper says he hid his face under a cap and was "petrified" when jubilant fans started singing about him and his former club. But despite the chanting, he managed to finish his journey without being recognised.

