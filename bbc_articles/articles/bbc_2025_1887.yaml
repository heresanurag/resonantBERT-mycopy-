  A selection of news photographs from around the world.

  Onlookers watch as SS United States, a retired American ocean liner that was built during 1950 and 1951 for United States Lines, is towed out to sea on the Delaware River. The ship is on her way to Alabama where she is due to be sunk to create an artificial reef in Philadelphia, Pennsylvania.
