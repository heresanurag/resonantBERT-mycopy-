id: bbc_2018_12706
title: 'Rita Ora: ''I was obsessed with online comments'' - BBC News'
date: '2018-10-24'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-45960083
content: |-
  Rita Ora says women are often bullied online for the way they look and she too has felt the effects.

  Pop star Rita Ora has spoken out about bullying online, saying women are often targeted because of the way they look.

  She said she too had felt the effects - but encouraged others not to let abuse dent their self-confidence.

  She was speaking as part of the 'I will not be deleted' campaign against cyber-bullying.
