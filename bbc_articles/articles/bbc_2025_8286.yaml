title: 'Masters 2025: Why Rory McIlroy has ''never been in better form'' going into
  Augusta for latest history tilt - BBC Sport'
date: '2025-04-08'
section: Golf
url: http://www.bbc.co.uk/sport/golf/articles/c367wy39524o
content: |-
  Rory McIlroy goes into this week's Masters - looking to finally land the only major title which eludes him - with his game "on the right track".

  I've never been in better form before Masters - McIlroy

  Rory McIlroy is making his 17th appearance at the Masters this week

  Rory McIlroy believes he has never "been in better form" coming into the Masters as he looks to finally land the only major title that has eluded him. The 35-year-old Northern Irishman returns to Augusta as one of the favourites to win the Green Jacket this weekend. McIlroy, who has earned seven top-10 finishes in his previous 16 Masters appearances, has already claimed two tournament wins in 2025. A dominant final round led to a two-shot victory at Pebble Beach in February, before he mentally reset to win The Players Championship at Sawgrass in a play-off showdown on the Monday. It is the first time he has won two PGA Tour events before heading to Augusta National. "I played great at Pebble Beach. Had to do it the hard way at Sawgrass, coming back on the Monday and playing in tough conditions," McIlroy told BBC Sport NI. "Those are great confidence builders, they are validations of the stuff I worked on at the end of last year and it shows me my game is on the right track."

  The high level of McIlroy's game is shown in a number of the key statistics used by the PGA Tour to assess its players. As well as the obvious measure of the two titles, McIlroy has the lowest scoring average among the 186 players with 69.281. Scottie Scheffler, the standout dominant player and reigning Masters champion, is second behind McIlroy with 69.499, while the tour average is 71.45. McIlroy has been solid off the tee and, with getting the better of the devilish Augusta greens crucial, also ranks in the top 10 of the putting stats. However, he lags down the list in terms of greens in regulation, which is another vital component for Masters champions. "Every year I come back with the goal of winning this tournament and after the start I've had this year I don't feel like I've ever been in better form coming into this week," McIlroy said. "I'm happy to be here and I'm excited to get going."

