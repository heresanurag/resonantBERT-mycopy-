  Ever since McIlroy claimed the fourth major of his career - almost 11 years ago - there has been fervent discussion about his chances of winning the Masters to secure a rare 'career Grand Slam'. Only five men have completed the full collection of Masters, US PGA Championship, the Open Championship and US Open titles - Gene Sarazen, Ben Hogan, Gary Player, Jack Nicklaus and Tiger Woods. Going into the 2015 Masters, McIlroy was the overwhelming favourite to win the Green Jacket. He had won back-to-back majors in 2014 at the Open and US PGA - having previously won the 2011 US Open and 2012 PGA. McIlroy has made six top-10 finishes at Augusta in the past 10 years but has not won another major since a gripping triumph at Valhalla. Before his 11th attempt at golfing immortality, McIlroy insists the "excitement outweighs the burden". "I understand the narrative and the noise," he said. "There is a lot of anticipation and build-up coming into this tournament each and every year, but I just have to keep my head down and focus on my job."

  McIlroy's best finish at the Masters was second place in 2022, where he shot an extraordinary final-day 64 to finish three behind Scottie Scheffler

  McIlroy has been working with sports psychologist Bob Rotella in the build-up to his 17th career appearance at the Masters. The pair are talking, he says, about "trying to chase a feeling" on the course, rather than "getting too much into results and outcomes". McIlroy has tried a number of different approach strategies in his bid for the Green Jacket. This year he decided to play the Houston Open - where he finished fifth - to bridge the three-week gap after Sawgrass. Before that he made a trip to Georgia for a reconnaissance of Augusta National, which has a slightly different look this year after being damaged by Hurricane Helene. "Mentally it's one of the most demanding venues we play all year," McIlroy told BBC Sport NI. "Here and the US Open are probably the two you have to take an extra second or two to think about what you're doing, make sure you're making the right decision, playing the right shot. "You have to be on the whole time from first tee shot to last putt on Sunday, and I feel like I've got better at doing that over the years."

  McIlroy says he has shown "a lot of resilience from setbacks" and is "proud" of how he has played since a bitter loss at last year's US Open

  Away from the course, McIlroy is hoping some lighter activities can take his mind off his latest tilt. That includes binge-watching television series Bridgerton - which he claimed he was talked into by wife Erica - and reading a fictional novel "for the first time in a long time" after picking up John Grisham's The Reckoning. McIlroy is joined in Augusta by Erica and four-year-old daughter Poppy, who has recently shared his triumphant moments on the course. The family will take part in the Masters traditional par-three contest on Wednesday alongside McIlroy's close friends Shane Lowry and Tommy Fleetwood, and their wives and children. "It's a nice way to go into the week, a bit of fun on the par three on Wednesday and the real stuff gets started on the Thursday," McIlroy added.
