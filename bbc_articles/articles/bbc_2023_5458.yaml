title: Kenya starvation cult explained in 60 seconds - BBC News
date: '2023-04-26'
section: General
url: http://www.bbc.co.uk/news/world-africa-65393674
content: |-
  Kenya has been gripped by the story of cult death as detectives continue to dig up mass graves.

  The dead are thought to have been members of the Good News International Church.

  It is believed they were persuaded to starve themselves in order to reach heaven before what they were told was going to be the end of the world.
