  There has been no confirmation of those deaths from authorities, but the prosecutor in the city of Kermanshah told the Tasnim news agency that two people were killed by "anti-revolutionary elements" on Tuesday.

  The state-run Irna news agency meanwhile said a police assistant died of injuries he sustained in violent clashes with protesters in the southern city of Shiraz on Tuesday.

  In Tehran, videos posted online showed women taking off their headscarves and shouting "death to the dictator" - a chant often used in reference to the Supreme Leader. Others shouted "justice, liberty, no to mandatory hijab".

  A woman who took part in a protest on Monday in the northern city of Rasht sent BBC Persian photographs of what she said were bruises she suffered as a result of being beaten by riot police with batons and hoses.

  "[The police] kept firing tear gas. Our eyes were burning," she said. "We were running away, [but] they cornered me and beat me. They were calling me a prostitute and saying I was out in the street to sell myself.

  Another woman who protested in the central city of Isfahan told the BBC's Ali Hamedani: "While we were waving our headscarves in the sky I felt so emotional to be surrounded and protected by other men. It feels great to see this unity. I hope the world supports us."

  Tehran Governor Mohsen Mansouri tweeted on Tuesday that the protests were "fully organised with the agenda to create unrest", while state TV alleged that Ms Amini's death was being used as an "excuse" by Kurdish separatists and critics of the establishment.
