content: |-
  Jude Bellingham is voted the star player by BBC Sport readers as England beat Senegal to progress to the quarter-finals of the Fifa World Cup in Qatar.

  Last updated on .From the section World Cup

  England put in a mature and professional performance as they beat Senegal 3-0 to reach the quarter-finals, but there was one player who stood out above the rest.

  Jude Bellingham was named player of the match by BBC Sport readers as the midfielder received an average rating of 8.53.

  The next highest-rated player was Jordan Henderson, underlining the impressive display by the England midfield.

