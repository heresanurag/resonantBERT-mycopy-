  He calls the decision "extraordinarily major" and a "big new idea" that wasn't considered in advance.

  Vallance says Covid advice took 'far too long' to be published

  Vallance says it was a "regret" that during the pandemic it often took a long period of time for research produced by the Sage group of scientific advisers to be published. "I believe that scientific advice should be made public; that's beneficial for everybody," he says. He says that research relied on by ministers should always be open to "scrutiny, comment and challenge". Often, at the start of the pandemic, the minutes and research papers produced by Sage took "far longer" than they should have done to be made public, says Vallance. He says there have already been changes made to system and - going forward - he sees no reason why faster publication cannot be the norm, except in areas of national security.
