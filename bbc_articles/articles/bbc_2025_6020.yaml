  A man and a woman appear in court over the death of a man shot through a window of his house.

  Pair in court over grandfather shot through window

  Barry Dawson was shot dead in his house on Saturday

  A man and a woman have appeared in court charged over the death of a 60-year-old grandfather who was shot in his own home. Barry Dawson was killed when a bullet was fired through a downstairs front window of his terraced house on Elm Street in Stanley, County Durham, on Saturday afternoon. Kevin Dorward, 38, of Annfield Plain, has been charged with Mr Dawson's murder, while Michaela Hetherington, 35, also of Annfield Plain, faced a charge of perverting the course of justice. No pleas were entered when they appeared separately at Newton Aycliffe Magistrates' Court on Thursday. Both were remanded in custody to appear at Durham Crown Court on 9 May.

  Durham Police said a 21-year-old man had also been arrested on suspicion of murder, while a 20-year-old man and 49-year-old woman had been arrested on suspicion of assisting an offender. All three remain in police custody.

  Police cordoned off Elm Street in Stanley on Saturday afternoon

  Mr Dawson's family described him as a "much-loved father, granddad and partner who will be greatly missed". "We are truly devastated, and his loss will leave an enormous gap in our lives," the family said.

  A police spokesman said investigations continue and officers would remain working in the Elm Street area "for a significant period of time".
