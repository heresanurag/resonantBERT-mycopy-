title: 'Thames Valley Police: Wolf-whistling sergeant sacked - BBC News'
date: '2024-07-22'
section: Berkshire
url: http://www.bbc.co.uk/news/articles/cv2g1xkdygjo
content: |-
  A panel found the former officer's conduct was "intentional, deliberate and targeted”.

  James Endean worked for Thames Valley Police for 22 years before he was dismissed without notice

  A police sergeant given a role to champion ethics wolf-whistled at women while on duty, a panel concluded. James Endean worked for Thames Valley Police for 22 years and as a sergeant from 2009, before he was sacked without notice last month. The panel found Mr Endean, who was previously based in Reading, Berkshire, repeatedly bullied colleagues and made comments about his penis and sexual abilities. It said this conduct continued even after a reflective practice meeting, and that it was “intentional, deliberate and targeted”.

  Mr Endean was made an ethics champion in January 2022 and received further training, according to the police force's documents. The panel was told by his colleagues that he would “rate” women’s attractiveness while on patrols and told them that some were “asking for it”. Colleagues reported how he had told them women would enjoy sex with him and that his fingers “should be on Britain’s Got Talent”. After a catalogue of allegations were made against him in March 2023, he was moved from Reading to Bracknell and Wokingham, where he worked in a supervisory role.

  Luke Ponte, for Mr Endean, said some colleagues “may have all colluded to exaggerate” claims or simply lied. Mr Endean told the panel one colleague “led a campaign” to get him moved from Reading. But the panel said his treatment of that colleague – including making repeated comments about the size of the officer’s penis – left his victim feeling “humiliated”. It found Mr Endean abused his position as a sergeant and that his behaviour had often been “unfair”. His comments about sex were “unwanted and grossly inappropriate” and created an environment that was “hostile, offensive and degrading”, especially for his female colleagues. The wolf-whistling would have been “loud enough to be heard by members of the public”, the panel found. Mr Endean was sacked for gross misconduct following the hearing on 28 June, with the outcome published on Thursday.
