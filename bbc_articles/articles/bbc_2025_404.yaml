  Ofer Kalderon and Yarden Bibas were taken by Hamas from Nir Oz, while Keith Siegel was taken from Kfar Aza. Mr Bibas' wife Shiri, and their two children, Ariel, now five, and Kfir, now two, were also taken captive. Their fate is unknown. Their release will bring the number of hostages freed under the ceasefire deal so far to 18. On Saturday, 183 Palestinian prisoners are expected to be released. The Palestinian Prisoners' Club said 111 people detained after 7 October 2023 would be among them. Four hundred Palestinian prisoners - ranging from those serving long sentences for bombings and other attacks to teenagers held without charge - have so far been freed in exchange. Most have returned to the occupied West Bank, East Jerusalem and Gaza, while many of the most serious offenders have been deported. The most recent exchange, which took place on Thursday, demonstrated the precariousness of the arrangement. Israel briefly delayed letting the prisoners go after it was outraged by the way eight hostages were treated as they were released. As seven of the eight were freed in Khan Younis, crowds of spectators - many taking pictures with mobile phones - pushed in as the captives were led by gunmen to Red Cross vehicles before being transferred to Israel. In a separate release, in Jabaliya, an eighth was led out through a scene of rubble from Israeli air strikes in a stage-managed event and put on a platform before being handed over to the Red Cross. The Israeli prime minister's office later said it had since received from mediators "a commitment that a safe exit will be guaranteed for our hostages" yet to be released. Meanwhile UK Prime Minister Keir Starmer has told former British-Israeli hostage Emily Damari that he was "overjoyed" at seeing her released, according to a statement issued by a spokesperson for the Damari family. In a phone call with Mr Starmer on Friday morning, Emily - who was freed on 19 January - and her mother thanked the prime minister and everyone who had campaigned for her release, the statement said. It said that the Damaris revealed to the prime minister that Emily had been held for a time in facilities belonging to the main UN agency for Palestinian refugees, Unrwa, and that she had been denied medical treatment. They called on Mr Starmer to put "maximum pressure" on Hamas and Unrwa to allow the International Committee of the Red Cross (ICRC) to visit the hostages still being held in Gaza, the statement added.
