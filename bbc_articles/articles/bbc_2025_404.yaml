content: |-
  Yarden Bibas and two others will be exchanged for more Palestinian prisoners in the fourth swap since the ceasefire began.

  Father of youngest hostage among three men to be released on Saturday, Hamas says

  Yarden Bibas with his wife Shiri and their two children, Ariel and Kfir

  The Palestinian armed group Hamas has released the names of three hostages it says it will free on Saturday under the ceasefire deal with Israel. They are Israelis Ofer Kalderon, 54, and Yarden Bibas, 34, and American-Israeli Keith Siegel, 65. Mr Bibas is the father of Kfir, the youngest hostage who was 10 months old when he was kidnapped by Hamas. His wife Shiri and their other son Ariel, four, were also captured. The Israeli prime minister's office said Israel had received the list of hostages. Israel will release another batch of Palestinian prisoners in return. It will mark the fourth such exchange of hostages for prisoners since the ceasefire came into effect on 19 January.

  Some 251 hostages were taken by Hamas when it attacked Israel on 7 October 2023, killing about 1,200 people. The attack triggered a war which has devastated Gaza. Israel's 15-month military offensive killed 47,460 Palestinians in the territory, according to Gaza's Hamas-run health ministry.
