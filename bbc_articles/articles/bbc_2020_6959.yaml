id: bbc_2020_6959
title: 'In pictures: Global protests against racism and police brutality - BBC News'
date: '2020-06-06'
section: World
url: http://www.bbc.co.uk/news/world-52952031
content: |-
  Sparked by the death of George Floyd in the US, thousands gather globally to say black lives matter.

  The death of unarmed black man George Floyd in police custody in the US has sparked some of the largest protests against racism, inequality and police brutality since the 1960s.

  Rallies were organised globally to express solidarity with US protesters.

  Thousands marched in the UK, France and Australia chanting "no justice, no peace" and "black lives matter".

  Many protests have evolved as people express anger at killings and systemic injustice in their own countries.

  Concerns about the spread of coronavirus prompted many to wear face masks, and government officials in some cities asked residents not to attend large gatherings.

  The police chief in Washington DC said he expected Saturday's demonstrations to be the largest ever in the capital.

  People took to the streets for the 12th day running in Washington DC

  Around 20,000 members of the US National Guard have been posted to police protests in Washington DC, where Mayor Muriel Bowser has requested their removal, saying their presence is "unnecessary"

  People marched on the newly-named Black Lives Matter plaza in the US capital

  In New York City, healthcare workers joined protests, holding placards reading "do no harm" and "racism is a public health crisis"

  In Australia, there were major protests in Sydney, Melbourne and Brisbane that focused on the treatment of indigenous Australians

  In France, protests have re-ignited a campaign for justice for Adama Traoré, a 24-year-old black man who died in police custody in 2016

  In London, protesters walked in the cold and rain and, outside the US embassy, they dropped to one knee and raised their fists in the air chanting "colour is not a crime". Police in riot gear clashed briefly with crowds

  Some drew attention to the death of black train station worker Belly Mujinga with Covid-19 in April. A man who claimed he had coronavirus reportedly spat at her before she fell ill

  A silent vigil was held for George Floyd in Berlin's Alexanderplatz square. Also in Germany, Bundesliga footballers warmed up wearing shirts reading "Red card to racism #BlackLivesMatter" and took a knee prior to kick-off

  In the Portuguese capital, Lisbon, hundreds of people gathered, and some held banners calling for justice for Claudia Simões, a woman who was assaulted by police
