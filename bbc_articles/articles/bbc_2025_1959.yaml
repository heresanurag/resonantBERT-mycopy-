title: 'Wythenshawe: Homes evacuated after huge lorry fire breaks out - BBC News'
date: '2025-02-23'
section: Manchester
url: http://www.bbc.co.uk/news/articles/cj92n9lwkwgo
content: |-
  Firefighters are tackling a blaze involving several lorries in Wythenshawe, Manchester.

  This video can not be played To play this video you need to enable JavaScript in your browser. Emergency services rush to the scene after huge lorry fire

  Homes had to be evacuated after a large lorry fire broke out on an industrial estate. Greater Manchester Fire and Rescue Service (GMFRS) said the blaze "involving heavy goods vehicles" broke out on Ennis Close, Wythenshawe, just after 08:00 GMT. Ten fire engines had tackled the fire at its height but it was scaled back to four engines as it was brought under control after nearly three hours, GMFRS said. GMFRS said people had been "advised to keep their windows and doors closed and to avoid the area".

  The fire broke out just after 08:00 GMT with ten fire engines dispatched to the scene

  Ben Meighan-Carey, who lives nearby, said: "It sounded like fireworks, then it seemed to get louder." He added that "there were constant bangs" which sounded like "explosions" for five to 10 minutes. "I looked outside and there was loads of smoke," Mr Meighan-Carey said. The fire broke out on the Roundthorn industrial estate near Wythenshawe Hospital.

  The fire broke out at an industrial estate in Wythenshawe

  GMFRS said fire appliances from across Greater Manchester were called to to the blaze. A spokesperson said: "Crews arrived quickly and are working hard to extinguish the fire." Greater Manchester Police and North West Ambulance Service were also in attendance but confirmed there were no casualties. Greater Manchester Police (GMP) said a cordon had been put in place and its officers had helped evacuate nearby homes, though residents had all now been able to return. Ledson Road, Floats Road and part of Southmoor Road were closed but had since been reopened.

