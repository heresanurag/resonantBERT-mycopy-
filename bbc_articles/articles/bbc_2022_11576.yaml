title: Scottish Conservatives axe aide's job offer over CV row - BBC News
date: '2022-09-22'
section: Scotland politics
url: http://www.bbc.co.uk/news/uk-scotland-scotland-politics-62980787
content: |-
  Scottish Conservative leader Douglas Ross last week highlighted Mr Paterson's experience in an email to party staff

  The Scottish Conservatives have withdrawn a job offer to a man accused of inventing parts of his CV.

  Craig Paterson was named as the party's new head of research in an email sent to staff, describing him as being a "senior political adviser" to former Scottish Labour leader Jim Murphy.

  But Mr Murphy said that he had "never knowingly met this guy let alone employed him".

  The Tories said the offer was withdrawn after "new information came to light."

  Mr Paterson declined to comment when approached by BBC Scotland.

