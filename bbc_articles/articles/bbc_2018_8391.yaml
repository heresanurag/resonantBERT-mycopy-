  He achieved four wins at the North West 200, including successes in the 125cc and 250cc races in 2009, a Supersport triumph in 2012 and a Superbike victory in 2014. William won seven races at the Ulster Grand Prix in Dundrod, three in the Supersport class, two on 125cc machines and two in the 250cc class. His best result at the TT was a second place in TT Zero in 2016, while he also finished third on four separate occasions.

