title: 'Grant Shapps: People don''t miss Boris Johnson ''drama'' - BBC News'
date: '2024-10-08'
section: General
url: http://www.bbc.co.uk/news/uk-65870511
content: |-
  The energy secretary reflects on the resignation of the former prime minister as an MP.

  People "don't miss the drama" of Boris Johnson's premiership, Energy Secretary Grant Shapps has said.

  Speaking to the BBC's Laura Kuenssberg, Mr Shapp also defended government policies, saying No 10 was following a "fundamentally Conservative approach to the world".
