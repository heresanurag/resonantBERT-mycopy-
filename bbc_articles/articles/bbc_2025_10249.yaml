title: King Charles travels to support Canada as it fends off Trump - BBC News
date: '2025-05-26'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cgkdnmm8k2no
content: |-
  The King and Queen will be arriving in Canada on Monday for a visit seen as a symbol of support.

  King and Queen arrive in Canada for historic visit

  To play this video you need to enable JavaScript in your browser. This video can not be played Watch: Why King Charles III's trip to Canada is more than just a royal visit

  King Charles and Queen Camilla have landed in Ottawa, at the start of a two-day visit to Canada seen as bringing a message of support for the country in the face of threats and taunts from US President Donald Trump. Prime Minister Mark Carney, who recently won a general election on a wave of anti-Trump sentiment, met the royal couple on the airport runway in Canada's capital. In warm afternoon sunshine, in front of a forest of Canadian flags, the King and Queen were greeted with a mix of a ceremonial guard and community gathering. There were red-jacketed Royal Canadian Mounted Police and crowds of schoolchildren to meet the King and Queen, with an accompanying band playing tea dance music.

  Representatives of Canada's First Nations communities were among the welcoming party, including an Algonquin group playing drums. The King and Queen, on their first visit to Canada since the start of their reign, will go on to a community festival, before a formal meeting with Prime Minister Carney. But the main purpose of the visit is the King's "Speech from the Throne" to Canada's Parliament on Tuesday, the first time a monarch will have delivered this for almost 50 years. It is expected to include a defence of Canada's sovereignty and to reject claims it should be taken over by the US. The King is following in the footsteps of his mother, Queen Elizabeth II, who delivered the speech in 1977 and opened Canada's Parliament in 1957. The timing of this week's visit has been seen as a sign of solidarity with Canada, after calls from Trump for the country to become the 51st US state. The US threat has inflamed public opinion with some businesses in Ottawa, as elsewhere in Canada, putting on displays of national identity such as "Proudly Canadian" posters. Carney, when he visited Trump at the White House earlier this month, stressed that Canada was "not for sale" and that message is likely to be conveyed in the King's speech which is written on the advice of Canada's government.

  Mark Carney won an election campaign promising to stand up to the US president

  Former Canadian high commissioner to the UK Jeremy Kinsman said this was a message the King will be pleased to deliver. "It's going to be very affirmative of Canadian sovereignty. And I can say personally that it's something that King Charles will celebrate saying. I have no doubt," said Mr Kinsman, who worked as a diplomat with the King when he was Prince of Wales. The speech, to be delivered in French and English, will set out the Canadian government's policy agenda in a way that is similar to the King's Speech at the State Opening of Parliament in Westminster. But it is also expected to have lines asserting the independence of Canada - a Commonwealth country and Nato member. Speaking ahead of the King's visit and State Opening, Carney said: "This is an historic honour which matches the weight of our times." In terms of the ceremony, the King is expected to wear a suit, in an event that will be more low key than the crown and elaborate robes on display in the UK's opening of Parliament. As well as the speech in Parliament, this brief trip will include community events in Ottawa and a chance to meet local leaders. This royal visit will be something of a diplomatic balancing act. The King is head of state of both Canada and the UK - and in his UK role, the King has been helping to maintain good relations with the US, sending a warm personal letter to President Trump inviting him for a second state visit. In Canada, he will be expected to reflect a very different message, with Canada's government rejecting Trump's ambition to take over the country. Ahead of the visit, a royal source said: "The King has long experience and great skill in walking that diplomatic tightrope. "He's held in high regard around the globe and across the political spectrum, with good relations with world leaders who understand his unique position."

