  Coverage: Follow live text commentary from 20:00 GMT and radio coverage from 21:00 on BBC Radio 5 Live, BBC Sounds, BBC Sport website & app

  Liverpool's Natasha Jonas aims to add the WBA welterweight belt to her world title collection when she faces Wales' Lauren Price on Friday in London. The British rivals headline an all-women card at the Royal Albert Hall in a fight many are finding difficult to call. WBC and IBF belt holder Jonas, 40, is the established world champion and in the form of her life, while Price has been hyped as unbeatable in her fledgling pro career. Price, 30, is undefeated in eight bouts and won her maiden world title in just her sixth fight when she beat Jessica McCaskill a year ago. BBC Sport has asked the world of boxing for their predictions.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  WBC lightweight champion Caroline Dubois: "It's a tough fight. I've counted out Jonas probably three times now and every time she's come and proven me wrong. She's made me eat my words every time so I am not going to bet against her now. She's a tough woman and she's got the skills. I don't know who is going to win the fight. I think the smart, soulless thinker will say Price has it in the bag but I don't know. It's a 50/50 fight." Heavyweight Delicious Orie: "I really like both of them. I know Price quite well, I've been in the amateur programme with her. I think Price has what it takes and I think age, mileage and hunger plays a factor. I've heard Jonas can really punch and Price hasn't really faced this kind of level in the professional ranks. If I had to really put my money on it then I would say Price just edges it." WBO welterweight champion Mikaela Mayer: "I am definitely tuning in on Friday. This is going to be very competitive, high-action fight. I give Price the advantage when it comes to movement and speed. My gut says Price wins by close decision, but it really depends on who has the better strategy. Can't help but root for Jonas, though, as I have said previously I want my revenge in a rematch." Retired world champion & boxing analyst Barry Jones: "I think Price on points. If it was three-minute rounds I'd say she stops her. She will win it wide, not necessarily comfortable though."

  Featherweight Raven Chapman, who fights Karris Artingstall on the undercard: "I'm slightly edging to Jonas. I just think that the experience she has, having been there with good opponents and having been there and done it all, might just edge it for her." Heavyweight Fabio Wardley: "It's a fantastic card and shows how far women's boxing has come and how many stars are being built. I see a changing of a guard, which is almost how the fight has been set up and designed to be. I can see a Price win and then become the next big name in women's boxing. The likes of Jonas and Katie Taylor are similar to Tyson Fury and Anthony Joshua, they are on the backend and have had their big moments and are finishing up."

