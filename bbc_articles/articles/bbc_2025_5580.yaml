  Former world champion Ricky Hatton: "It's a 50/50 fight. Both have a gameplan and it will go down to who can get off to the best start and execute it. I really think it's such a close fight. We know through history that youth can beat experience and experience can beat youth. I'm sitting on the fence." Undercard fighter and flyweight Chloe Watson: "It will be a great, exciting fight and I think Jonas will get the win with her strength and resilience towards the end of the fight. Price is a really good boxer but Jonas has shown she can get through fights and answer questions." Watson's opponent, Jasmina Zapotoczna: "I predict Jonas will win on points. People are underestimating her because of her age but she is so experienced, a southpaw, tricky in the ring and very focused." Former world champion Hannah Rankin: "I'm going for Price on points. She is the younger, fresher fighter and I think her speed will cause Jonas problems. I do think Jonas is a strong, tough fighter and I cannot see her getting stopped."
