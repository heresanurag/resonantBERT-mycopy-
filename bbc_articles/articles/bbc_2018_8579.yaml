content: |-
  It's all about tactics at Northern Ireland's only such competition - the piggy back or reverse Estonian?

  The Dalriada Festival is taking place this weekend in Glenarm, County Antrim, and one of the highlights is a wife-carrying competition.

  BBC News NI talks tactics with some of the couples taking part.
