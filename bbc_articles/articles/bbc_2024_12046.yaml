title: Kevin Campbell tributes show he was 'amazing character' - England boss Gareth
  Southgate - BBC Sport
date: '2024-06-16'
section: Football
url: http://www.bbc.co.uk/sport/football/articles/c3gg2j3gw9go
content: |-
  Tributes from the world of football to Kevin Campbell show he was a hugely popular amazing character, England boss Gareth Southgate says.

  This video can not be played To play this video you need to enable JavaScript in your browser. Arsenal and Everton striker Kevin Campbell has died at the age of 54

  Tributes from the world of football to Kevin Campbell show he was "hugely popular" and an "amazing character", England boss Gareth Southgate said. Campbell, who has died aged 54 following a short illness, started his playing career at Arsenal and won the top-flight title, FA Cup, League Cup and European Cup Winners' Cup with the club. He also played for for Leyton Orient, Leicester City, Nottingham Forest, Everton, West Brom, Cardiff City and Turkish club Trabzonspor. He made his final appearance as a player in February 2007 before moving into broadcasting. "Kevin is [about] the same age as me," said Southgate, speaking before England's opening Euro 2024 game against Serbia on Sunday. "I remember him being in the Arsenal youth team at a similar time and playing against him in reserve team football. "A hugely popular man. His son has been in our junior pathway as well. "Our thoughts are very much with his family at this time and some of the tributes have been fabulous. "Clearly, people who knew him better than I did talk about what an amazing character he was. A very sad day."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Millwall goalkeeper and Montenegro international Matija Sarkic, who was 26, has also died. Southgate said: "I know that some of our players and staff actually played and worked with Matija as well so both pieces of news were received with shock and great sadness. "Those boys that played with him are feeling that even more." Campbell's son Tyrese - a striker who has spent the past seven seasons at Championship side Stoke City - called the pain of losing his dad as "indescribable". "He was the life and soul of every party and room he blessed, a one-in-a-million person that was loved by everyone," the 24-year-old added. Kevin Campbell made his senior debut for Arsenal in 1988 and scored nine goals in 22 appearances for the Gunners during their title-winning campaign in 1990-91. He then helped the London club win the FA Cup and League Cup double in 1993, followed by the European Cup Winners' Cup in 1994. "Being a London boy and growing up watching him and Ian Wright playing together was brilliant for us youngsters," former Crystal Palace striker Clinton Morrison, 45, told BBC Radio 5 Live. "The way they scored goals and the way they celebrated, that's how we were, looking up to those two players as idols. "Kev was like that even when he finished football. He still had that bright smile and I only remember the good stuff, brightening up a room and being a top player and a great individual." Campbell moved into broadcasting after his playing career and worked for BBC Sport and Sky. "He was adored by everybody," said BBC Radio 5 Live presenter Mark Chapman. "It doesn’t matter if you worked with him on 5 Live or supported Arsenal, West Brom or Everton, he was adored by everybody. "He was always so positive and always had a smile on his face whenever he came into the 5 Live sport studio. And he was a heck of a striker." Campbell moved from Arsenal to Forest in 1995 and spent three seasons at the City Ground, scoring 22 goals in 39 games during his final campaign to help the club win promotion to the Premier League. Following a short stint with Trabzonspor, he moved to Everton on loan in March 1999, scoring nine times in their final eight Premier League games to help the Toffees avoid relegation. He was rewarded with a permanent deal that summer and stayed for more than five seasons. Campbell's playing career came to an end with spells at West Brom and Cardiff. "I’ve been watching the TV and everybody who’s come on has said exactly the same thing, what a great guy he was," said former Everton defender Phil Jagielka, who joined the Goodison Park club after Campbell had left. "He made a lot of people laugh, he always had a good smile on his face. I’d seen him around and about the place at Goodison. "I played with his son Tyrese at Stoke. It will be a really, really sad day for the family and all you can do is send your regards and, hopefully, they will get through this tough period. "What a guy, what gentleman, what a character. I don’t think I ever saw him without a smile on his face and he was always one of those people to come up to you and give you a hug and have a little bit of a laugh and a joke." Former Tottenham keeper Paul Robinson, also speaking on BBC Radio 5 Live, added: "He graced our lives in the media and we all got to experience a little bit of his charm. Former England striker Alan Shearer told BBC One's Match of the Day that he was "lucky enough to play" with Campbell for the England Under-21s "and work with him on bits in TV over the years". "He had an infectious personality and a great character," added Shearer. "You can see, with the outpouring of grief today, how much he will be missed. Sending our condolences to all his family and friends. Such sad news."

  Campbell won the league title with Arsenal in 1990-91

  Earlier on, a host of Campbell's ex-team-mates also paid tribute to him, including Ian Wright, Tony Adams and Wayne Rooney. Former Arsenal striker Wright posted a number of crying emojis on X and images of the pair together. "I can't talk about it too much because I well up. He meant the whole world to a lot of people, especially myself," he told ITV. "Super Kev - a goal machine, a giant of a man with an even bigger heart," said former Gunners captain Tony Adams. "An intensely private and truly wonderful human being. I'm devastated for his loved ones and all of us. Love you Super Kev." Campbell was at Everton when Rooney burst on to the football scene as a teenager. "Kev was a great team-mate but more importantly a brilliant person who helped me a lot in my earlier years," said Rooney.
