title: Harrow couple battle to bring surrogacy baby home from Belarus - BBC News
date: '2024-07-18'
section: London
url: http://www.bbc.co.uk/news/articles/cm528vv490go
content: |-
  Baby Bella's British passport could take another three months, but her parents' visas expire in August.

  Bella, who was born on 5 June, was named after Belarus, the country of her birth

  A couple say their life has been made "hell" as they try to return to the UK with their daughter, who born through a surrogate mother in Belarus. Graeme and Maura Batsman, from Harrow in north-west London, have been told that applying for baby Bella's British passport could take another three months - but their visas to stay in the Eastern European country expire next month. Mr Batsman has also been told he must return to work in the UK or face losing his job. The Home Office advises, external that surrogacy overseas "is often complex" and can take several months.

  Maura and her husband cannot conceive naturally because of medical issues

  The Foreign, Commonwealth and Development Office (FCDO) told BBC London it could not comment on individual cases, but said that consular assistance in Belarus was "severely limited" as there was current FCDO advice against travelling to the country. It also told the BBC that a request for emergency travel documents for surrogate births could only be considered once a standard passport application had been submitted for the baby.

  Speaking from an apartment in Belarus, the couple criticised the "lengthy" procedures needed to get Bella back to the UK. They said they had met couples from other countries who went through the same process "in five days". In addition, Mr Batsman said that once back in the UK, it would take "up to a year" for them to be recognised officially as Bella's parents. “We think it’s unfair that you have to go through all this to get the child and then the immigration office is just there to make your life hell for the next year for no logical reason," he said.
