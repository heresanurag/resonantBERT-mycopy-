  The Batsmans started the surrogacy process before Belarus’s neighbour and ally Russia invaded Ukraine in 2022. The couple explained that some people had criticised their decision to go to Belarus for surrogacy, but said: “People who have a desire to have a child don’t really care about politics.”

  Graeme and Bella outside the British Embassy in Minsk, the capital city of Belarus

  Graeme and his wife Maura, who is originally from the Philippines, met in early 2021 and married a year later. They wanted to start a family but were told they could not conceive due to medical complications and that even through IVF, their chances of success were slim. The couple decided to explore the option of surrogacy, external – when a woman carries and gives birth to a baby for another person or couple.

  The cost of this process in the UK can exceed £50,000, so the couple looked at other countries and eventually settled on Belarus, which they said had favourable rules. So far, the couple estimate they have spent about £35,000 on the surrogacy process, and more than £6,000 on fees and other costs. They said the surrogate mother, who is in her 30s and a mother of three herself, was paid about £275 a month for 10 months and a £13,000 fee once the baby was born, as well as her daily expenses.

  The couple said their family in the UK "can't wait" to meet Bella

  In addition to passport and birth certificate applications, the couple have had to provide a letter explaining why they chose surrogacy, medical records and evidence of their stay in the country, including details of flights, hotels and insurance costs. “There are a lot of duplicates and the UK’s legal process is just totally messed up,” Mr Batsman said.

  They have asked the British government to expedite their passport application so they can leave together as a family, before they are deported without their daughter and before Mr Batsman loses his job. Asked whether he would recommend having a child through surrogacy in Belarus, Mr Batsman said: “The desire to have a child is rather high, so people will probably do whatever they can. “We started this two and a half years ago and it’s been a constant fight. “I’m sure one day it will be positive, but it’s not pleasant.”
