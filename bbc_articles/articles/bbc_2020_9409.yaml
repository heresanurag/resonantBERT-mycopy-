title: Bid to find owners of 118 'stolen' bikes found in Hackney - BBC News
date: '2020-08-09'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-53713308
content: |-
  The bicycles were discovered during a search of a building in Hackney.

  The bikes have been estimated to be worth more than £30,000

  The owners of 118 bikes worth more than £30,000 are being sought by police.

  The Met found the bikes, which are believed to have been stolen, in a building in Hackney, east London.

  Officers made the discovery after 11 people reported seeing their stolen property being sold online.

  Two men, aged 21 and 60, were arrested on suspicion of handling stolen goods and possession of criminal property following the raid on 2 August. Both have been bailed.

  Two men were arrested after the bikes were discovered in Hackney

  Sgt Jo Stephens said police "strongly believe [the bikes] have been stolen - either in burglaries, robberies, or from the street - for the purpose of selling on for a profit to unsuspecting buyers".

  Anyone who has had their bicycle stolen in Hackney or Tower Hamlets in the last six months has been advised to email the Met at ce-mist@met.police.uk

