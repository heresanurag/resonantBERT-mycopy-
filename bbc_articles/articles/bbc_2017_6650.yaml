title: Stephen Hough jailed for 12 years for Janet Commins killing - BBC News
date: '2017-07-17'
section: North East Wales
url: http://www.bbc.co.uk/news/uk-wales-north-east-wales-40625655
content: |-
  Stephen Hough raped and killed 15-year-old Janet Commins before dumping her body 41 years ago.

  Stephen Hough told police he was stealing petrol elsewhere when Janet was killed

  A man who raped and killed a 15-year-old schoolgirl in 1976 has been jailed for 15 years.

  Janet Commins' body was found near a school field in Flint, north Wales, by three children playing hide and seek.

  Stephen Hough, 58, from Flint, was convicted of manslaughter, rape and sexual assault at Mold Crown Court last week. He was cleared of murder.

  Hough was sentenced to 12 years and a further three after admitting sexually assaulting a 15-year-old girl in 2016.

  The two sentences will run consecutively.

  After his arrest following the 2016 incident, Hough's DNA matched samples found on Janet's body, prompting his arrest and subsequent trial on charges relating to her death.

  Talking about the offences dating back to 1976, Mr Justice Lewis said Hough had shown "no remorse whatsoever for what you did to that young girl".

  "You knew what you were doing... for your own sexual pleasure".

  Hough was jailed for 12 years for manslaughter, eight years for rape and eight years for sexual assault - the sentences will run concurrently.

  The judge said he took into account the fact Hough was 16 when he committed the crimes.

