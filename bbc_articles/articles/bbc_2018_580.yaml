title: Cocaine found in fresh pineapples - BBC News
date: '2018-01-18'
section: General
url: http://www.bbc.co.uk/news/world-europe-42727956
content: |-
  Police in Portugal and Spain seize 754kg (1,660lbs) of drugs hidden inside a shipment of pineapples.

  Police in Portugal and Spain have seized cocaine hidden inside fresh pineapples.

  The drugs had been transported from South America.
