title: 'Edinburgh trams: Proposals for new city centre loop unveiled - BBC News'
date: '2019-05-10'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-48227077
content: |-
  The 10-year city centre transformation project would see the tram extend between Haymarket and University of Edinburgh.

  Plans to extend Edinburgh's tram network to include a hospital and university are being proposed as part of an overhaul of the way people will move around the city.

  The 10-year city centre transformation project would see the tram extend over North Bridge to the BioQuarter and the Edinburgh Royal Infirmary.

  A tram loop could also be built between Haymarket and University of Edinburgh.

  The council hopes to reduce city centre traffic by up to 30%.

  The council said it wanted to treat cars as "guests" in a "pedestrian priority zone".

  The plans also include setting up a free city centre hopper bus.

  Prominent parts of the Old Town would be completely closed to traffic, including Victoria Street, Cockburn Street and a longer stretch of the Royal Mile.

  Waverley Bridge could become a vehicle-free plaza and a "centrepiece" bridge could be built for pedestrians and cyclists, connecting the Old Town and the New Town.

  Car parking would be gradually reduced across the city centre, with George Street, Victoria Street and Cockburn Street losing parking space altogether.

  There are also plans for remaining parking areas to be subject to a trial of a "parking free day" - where existing spaces are used for alternative uses one day per week.

  The proposals will go out for a public consultation for approval, subject to the thumbs up by the council's transport and environment committee next week.

  Lesley Macinnes, City of Edinburgh Council's transport and environment convener, said: "This is a serious approach to how we equip the city for the future and how we meet the emerging challenges from the climate change emergency, population growth, changing expectations of our city centre and air quality.

  "This is a clear statement of intent about what we want to achieve in the city centre. This is our strategy for a city centre that is truly fit for purpose."

  As part of the blueprint, there are plans to construct four lifts, situated across the city centre, to help people access Edinburgh's two levels with more ease.

  The lifts will be provided from Market Street to the top of The Mound, Waverley Station to North Bridge, Cowgate to George IV Bridge and Grassmarket to Edinburgh Castle and will be used by cyclists and those with wheelchairs.

  Mrs Macinnes said: "You will come out the back of Waverley Station and take that lift up to North Bridge.

  "Instantly, you have got public transport with buses instantly connected with the train. It's about collapsing the city centre to be able to access both levels."

  Improvements will be made to make key routes more attractive to pedestrians and cyclists but key bus routes will remain across North Bridge and South Bridge and up and down The Mound.

  Mrs Macinnes said: "This is an exciting and ambitious strategy, one which will deliver transformative benefits across the city and for a whole range of people travelling to and within Edinburgh.

  "We want everyone to share in Edinburgh's success and re-imagining our city centre and its purpose will help make this happen.

  "Here we have a blueprint to move the city forward. The proposals are designed to prompt debate - they aren't finalised designs or ideas.

  "They are examples of what we could do to deliver the city centre that residents are telling us they want."

