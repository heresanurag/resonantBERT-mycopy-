title: 'France election: Macron supporters cheer first projections - BBC News'
date: '2022-04-24'
section: General
url: http://www.bbc.co.uk/news/world-europe-61211425
content: |-
  The incumbent, Emmanuel Macron, has secured the largest share of the vote in the presidential election.

  Cheers from Emmanuel Macron's supporters have greeted the first projections in France.

  The results suggest the incumbent has secured the largest share of the presidential vote and beaten far-right leader Marine Le Pen.

  Le Pen was running for the presidency for a third time.
