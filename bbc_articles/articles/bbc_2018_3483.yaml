id: bbc_2018_3483
title: Vladimir Putin thanks Moscow crowd after election win - BBC News
date: '2018-03-19'
section: General
url: http://www.bbc.co.uk/news/world-europe-43454156
content: |-
  The president said the result showed "what has been done over the last few years".

  Vladimir Putin will lead Russia for another six years, after securing an expected victory in Sunday's presidential election.

  After his win he addressed crowds in Moscow.
