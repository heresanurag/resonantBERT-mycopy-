  The actress tells Vanity Fair that working with her boyfriend is "strangely comfortable".

  Zendaya: Working with Tom Holland is 'second nature'

  Zendaya met Tom Holland when they were both cast in 2017's Spider-Man: Homecoming

  Zendaya has described working with her boyfriend Tom Holland as "strangely comfortable". The A-list couple met while filming 2017's Spider-Man: Homecoming and are now rumoured to be starring together in director Christopher Nolan's next film. They do not often discuss their relationship, but Zendaya was asked by Vanity Fair, external whether it was weird acting opposite each other. "Not really," she replied. "It’s actually strangely comfortable. It’s like second nature, if anything."

  She continued: "You feel extra safe with the person you’re acting beside. "I love working with him. He’s so talented, and so passionate about what he does. "He always gives things 1,000%, even if he’s absolutely worn down. I really appreciate that about him. She added: "It feels pretty normal. That’s how we met. Literally, at a chemistry read." Zendaya, 28, rose to fame on the Disney Channel and has since starred in Dune, Challengers, Malcolm & Marie and the TV series Euphoria. Holland, also 28, played the lead role in Billy Elliot the Musical in the West End as a child, and has since appeared in Uncharted, Cherry and The Devil All The Time. His role as Spider-Man saw him star in three of the superhero films alongside Zendaya, as well as other appearances in the Marvel Cinematic Universe.
