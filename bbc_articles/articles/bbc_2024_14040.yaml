title: 'Discovery Cove: Family pay tribute to girl who died in Florida accident -
  BBC News'
date: '2024-06-05'
section: Wales
url: http://www.bbc.co.uk/news/articles/c3ggd8denxzo
content: |-
  Talented rower Anna Beaumont, 13, is described by family as a "beautiful soul" who will "never be forgotten".

  Anna Beaumont was described as a "beautiful soul" taken in a "tragic accident"

  The family of a 13-year-old girl who died while on holiday in Florida say her death was a "tragic accident". Anna Beaumont, from Cardiff, was found unresponsive in a pool at Discovery Cove in Orlando on 28 May. The Orange County Sheriff's Office said she was taken to hospital in critical condition but died the next day. On Tuesday her family said in a statement: "Anna was a beautiful soul who has been taken from us in a tragic accident." "We are devastated by her loss, but she will never be forgotten," they added. "We would like to thank the emergency response teams and hospital staff in Orlando who tried so hard to save Anna's life. "We will not be making any further statements and ask for privacy at this incredibly difficult time."

  SeaWorld Orlando houses dolphins at Discovery Cove as well as at the theme park and at Aquatica water park

  Andrew Williams, the head teacher at Anna's school, Radyr Comprehensive, described her as a "cherished member of our school family" in a statement shared with the BBC on Sunday. He said: "The very thought of losing a child is an unimaginable journey and I know I speak on behalf of the whole school community when I say that our thoughts are with Anna's family as they try to come to terms with their loss. "Anna was a cherished member of our school family, and her absence will be profoundly felt by pupils, staff and all who had the privilege of knowing her. "Her spirit, kindness and presence touched so many lives." Bethan Simmonds, from Noah’s Ark Charity, said Anna raised more than £1,000 for the charity during the Covid lockdown in a cycling challenge. "There’s something special about anyone raising money for a charity, but there is something particularly special about a child who uses her own experience of being a patient in hospital to help other children,” she said, describing Anna as "a very special young person".

  Discovery Cove is an all-inclusive resort and sister park of SeaWorld Orlando and Aquatica Orlando. The company released a statement about the incident to local media, which said: "Our staff responded to an emergency involving a guest yesterday [May 28]. "When emergency personnel arrived, they took over care and transported the guest to a nearby hospital. "Out of respect for privacy of our guests, we do not provide any health information. Our thoughts are with this family."

  Rhys Livesy, a councillor for the Pentyrch and St Fagans area of Cardiff, offered his deepest sympathies to the family and to Anna’s friends. "The effect this sad news must be having on Anna’s family and friends is unimaginable," he said in a statement. "It seems Anna had rowing and education links throughout the local area," he added.

  The Foreign Office said: "We are supporting the family of a British child who died in the United States."
