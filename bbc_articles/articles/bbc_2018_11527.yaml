id: bbc_2018_11527
title: Thousands march in Barcelona streets - BBC News
date: '2018-09-12'
section: General
url: http://www.bbc.co.uk/news/world-europe-45491810
content: |-
  They gathered to celebrate the national day of Catalonia, which comes after the region's failed move for independence from Spain last year.

  Hundreds of thousands of Catalan pro-independence demonstrators have gathered in Barcelona, to mark Catalonia's national day.

  It's the first such celebration since separatist politicians were thwarted in their bid to declare Catalan independence from Spain, in October last year.
