title: 'Bobsleigh World Cup: Great Britain win gold in four-man event - BBC Sport'
date: '2025-01-05'
section: Sport
url: http://www.bbc.co.uk/sport/articles/clynk2y9wk5o
content: |-
  Great Britain win gold in the four-man event at the IBSF Bobsleigh World Cup in Winterberg, Germany.

  Great Britain have won gold in the four-man bobsleigh at the IBSF World Cup in Winterberg, Germany.

  The team of Brad Hall, Taylor Lawrence, Arran Gulliver and Greg Cackett claimed victory with a time of combined time of one minute 48.07 seconds from their two runs, beating Germany by just under two tenths of a second.

  It is the first time since 2012 that a team from Germany has not won the Winterberg race, which is the third of eight World Cup legs in the 2024-25 season.

  For Hall, who is based in Colchester, it is his fourth World Cup gold in the four-man event, taking three golds during the 2022-23 season.

  "To finish in first place here is incredible," said Hall. "It's been a very long time since anyone other than the Germans have won here.

  "We're extremely happy and we're now hoping this is a stepping stone to being on top of the podium a few more times this season before we hit the World Championships in March."
