  Arsenal are looking into a move for Real Madrid forward Rodrygo, Barcelona keen on Liverpool winger Luis Diaz and Chelsea determined to hold on to Enzo Fernandez amid Real Madrid links. Arsenal are exploring a move for 24-year-old Brazil forward Rodrygo, who could leave Real Madrid this summer. (Sky Germany), external Bayer Leverkusen attacking midfielder Florian Wirtz is expected to choose between a move to Bayern Munich and Liverpool within the next 10 days, with both clubs keen on the 22-year-old Germany international. (Kicker - in German), external Barcelona want to sign Liverpool's 28-year-old Colombia winger Luis Diaz, who has two years remaining on his Anfield deal. (ESPN), external Liverpool have looked at 20-year-old Lyon and Belgium winger Malick Fofana as a possible option if Diaz ends up leaving the club. (Mundo Deportivo - in Spanish), external Napoli and Chicago Fire are leading the race to sign 33-year-old Belgium midfielder Kevin de Bruyne, who will leave Manchester City as a free agent this summer. (Talksport), external
