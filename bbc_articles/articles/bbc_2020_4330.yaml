  'Police may be sent to funerals with too many mourners'

  Police could be called if too many mourners turn up to funerals, a funeral director has said. Current coronavirus restrictions have meant the number of mourners allowed to attend funerals and cremations is capped in certain areas. Dean Thomas, a funeral director in Caerphilly, said he is being asked to restrict numbers to five family members only. "The biggest issue we face is families can’t attend," he said. "There are guidelines in place which state who can attend. This includes close family, carers, parents and children. "If more people turn up, the funeral won’t be allowed to continue, and the police could be called. "The local authority are citing safety. Families are being asked to choose. It’s not right." Previously, Health Minister Vaughan Gething has said individual funerals may not be possible if the number of coronavirus deaths is at the "top end of the reasonable worst case scenario".
