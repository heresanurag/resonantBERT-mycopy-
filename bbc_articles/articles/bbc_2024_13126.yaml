title: 'Omagh: Gun found during James Street security alert - BBC News'
date: '2024-06-25'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cx999kznnwno
content: |-
  The gun was found at the back of a property in James Street in the town on Monday afternoon.

  A gun has been found during a security alert in Omagh, County Tyrone.

  It was found at the back of a property in James Street at about 12:50 BST on Monday.

  A number of homes and businesses in the area were evacuated as police conducted a security operation.

  Residents have now returned to their homes and all roads have been reopened.

  The gun has been taken away for forensic examination.
