title: Oprah Winfrey alludes to JD Vance's 'childless cat lady' jibe - BBC News
date: '2024-08-22'
section: General
url: http://www.bbc.co.uk/news/videos/cy8xj2889z2o
content: |-
  Oprah Winfrey spoke about racism, sexism, and income inequality as she addressed the DNC.

  Oprah Winfrey spoke about racism, sexism, and income inequality as she addressed the Democratic National Convention in Chicago.

  But she said when a house was on fire, Americans did not ask about people's "race or religion", but did their best to save them, even if they were "childless cat ladies".

  It sounded like a reference to a comment by Donald Trump's running mate JD Vance, who came under fire for speaking about leading Democrats using that term.

  Oprah does not have any children.
