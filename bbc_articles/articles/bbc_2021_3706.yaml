content: |-
  Some care home residents in England are now allowed one nominated visitor, as restrictions begin to ease.

  Some care home residents in England are now being allowed one nominated visitor, as lockdown restrictions begin to ease.

  Anne Thompson was happy to be able to hold hands with her mum Kathleen, who is in a care home in Scarborough.

  However, different care homes are operating different systems.

  Read more: Can I hug my relative in a care home?
