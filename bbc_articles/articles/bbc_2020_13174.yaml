title: Wrexham's high-rise police station demolished - BBC News
date: '2020-11-01'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-54760040
content: |-
  A former high-rise police station is flattened in a controlled blast to make way for a supermarket.

  This video can not be played To play this video you need to enable JavaScript in your browser. A controlled explosion was used to flatten the former high-rise police station

  A former high-rise police station has been demolished in a controlled explosion, after crowds were told to stay away.

  The 10-storey 1970s block in Wrexham closed in 2019 with officers moving to a new base.

  A supermarket and drive-through coffee shop is due to be built on the site.

  The demolition was streamed online as Wrexham council asked people to observe Wales' national lockdown, and avoid travel to cut Covid-19 cases.

