content: |-
  The former Little Mix singer has announced her debut solo album will be released soon.

  Going solo was scary, says Perrie Edwards

  Perrie Edwards has released her first solo music since Little Mix announced a hiatus in 2022

  Perrie Edwards says launching a solo music career after more than 10 years in Little Mix was "so scary". The 30-year-old has just released her second single, Tears, after her debut Forget About Us in April. "I'm really happy now the first song's been and gone," she tells Radio 1. "The pressure's kind of gone now. "Not to wish it all away, but the suspense and the emotions that were running through my body before I launched with anything, it was so scary."

  Perrie has followed Leigh-Anne Pinnock - who released My Love and Don't Say Love last year - as a Little Mix member going solo. The girl group, formed of Perrie, Leigh-Anne and Jade Thirlwall, announced they were taking a break in 2022 after first forming on X Factor in 2011. It came after Jesy Nelson announced she was leaving the group in 2020. Since then, Perrie had her son Axel with her fiance, footballer Alex Oxlaide-Chamberlain, and has pursued a career outside music including in fashion.

  Little Mix were one of the UK's biggest acts and were labelled among the best girl groups ever by Billboard Magazine

  Perrie's debut, Forget About Us, which she co-wrote with Ed Sheeran, marked her return to music. The track reached the top 10 in the UK Official Charts and Perrie says she's "just so pleased by the response and the reception it's had". "Now that's out and everyone's had a little vibe of Perrie and what my solo journey's going to be like," she says. But Tears, which she describes as a "70s kind of funky, feel good" song, is "so different", she says. Speaking to presenters Vick Hope, Jamie Laing and Katie Thistleton, Perrie says Tears has influenced the rest of the tracks on her upcoming album. "I've had so much fun experimenting with different genres and sounds. "It all kind of ties together nicely on the album." While she says she's "so proud" of her solo music, releasing music without her bandmates has been "wild", she tells Radio 1. "I like to spiral," she says. "I overthink overthinking. "It's like when you post on Instagram - there's no going back." Perrie has confirmed her debut solo album is in the works but is yet to confirm a release date.

