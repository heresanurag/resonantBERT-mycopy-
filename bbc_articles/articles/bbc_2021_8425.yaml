content: |-
  Mark Drakeford has set out how Covid restrictions will be reduced over the next few weeks.

  Impact on the NHS is still driving decisions, Mark Drakeford says Image caption: Impact on the NHS is still driving decisions, Mark Drakeford says

  Responding to the Conservatives' call for greater speed in relaxing measures, Mark Drakeford said the impact of Covid on the NHS was "incredibly sensitive" to both the effectiveness of vaccines and the extent to which people continue to observe "sensible actions" during the pandemic.

  He said a "shift of just two or three per cent" in the effectiveness of jabs was the "difference between large numbers of people needing or not needing hospitalisation".

  "If people continue, as people in Wales have, to do their best to look after themselves and others, that will suppress the number of people needing hospitalisation," he said.

  "If people act as though coronavirus has gone away, and there's no risk to themselves or others, that will drive more numbers into the hospital sector.

  "At the better end of that spectrum", he said, the impact on the NHS was "manageable".

  "If the dial gets set at the other end of that spectrum, then we will be back where we were in the winter, with very large numbers of people needing to be cared for in a hospital, with all the impact that that would make on the ability of the NHS to go on doing all of those other things."
