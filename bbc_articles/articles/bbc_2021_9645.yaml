title: 'North Shields fire: Firefighters tackle huge blaze near Fish Quay - BBC News'
date: '2021-08-13'
section: Tyne & Wear
url: http://www.bbc.co.uk/news/uk-england-tyne-58207577
content: |-
  Witnesses report seeing smoke billowing across the River Tyne.

  Firefighters are tackling a large roof blaze near the Fish Quay in North Shields

  Firefighters are tackling a large blaze at a building in North Tyneside.

  Emergency services were called to the derelict building on Brewhouse Bank, near the Fish Quay in North Shields, just after 16:00 BST on Friday.

  Witnesses have reported being able to see billows of smoke from as far away as South Shields across the River Tyne.

  Firefighters are urging people to stay away from the area and keep their doors and windows shut because of the large amount of smoke.

  Firefighters are urging people to stay away from the area because of the large amount of smoke

  A large number of tyres are in the burning building along with general waste and rubbish.

  Tyne and Wear Fire Service said there were 10 appliances and an aerial ladder at the scene.

  The fire has broken out in a derelict building

