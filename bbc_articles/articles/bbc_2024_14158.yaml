title: Scotland to cut Craig Gordon & John Souttar from Euros squad - BBC Sport
date: '2024-06-06'
section: Scotland Men
url: http://www.bbc.co.uk/sport/football/articles/cjmm73ny1ddo
content: |-
  Goalkeeper Craig Gordon and defender John Souttar are the Scotland players set to miss out on Euro 2024.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Goalkeeper Craig Gordon and defender John Souttar have both been excluded from the final Scotland squad for Euro 2024. Head coach Steve Clarke had to trim his group from 28 to 26 for the tournament following Friday's home friendly with Finland. And after Hearts veteran Gordon, 41, earned his 75th cap from the bench against the Finns, it was confirmed that he will miss out. Gordon has played just seven matches since breaking his leg in December 2022 and Rangers centre-back Souttar has also had injury troubles. The 27-year-old missed the last three matches of the season through injury, and will not add to his nine international appearances in Germany. "John is one of the ones that misses out," Clarke told BBC Scotland. "I just felt I had enough cover in that position on the right.

  "Both conversations were really tough but the one with Craig was particularly emotional. "I promised I'd put him on the pitch tonight. I don't want to be the guy that left him out of the Euros and didn't give him his 75th cap. "I'm sure Craig, the person he is, the manner he's got, the determination he's got to prove people wrong, it won't stop at 75. "He's still going at 41 but it's not in his mind so it's not going to be in my mind." Clarke lost Aaron Hickey, Nathan Patterson and Lewis Ferguson to injuries before assembling his provisional group. Since then Lyndon Dykes and Ben Doak have withdrawn, with Tommy Conway and Lewis Morgan called up and both the latter two will go to Germany.

