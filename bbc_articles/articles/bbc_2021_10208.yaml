  Greens Senator Sarah Hanson-Young, who is leading the inquiry, questioned why broadcast regulators had not acted first.

  Mr Rudd, a noted critic of Mr Murdoch's media outlets, has also written to Australian Communications and Media Authority to demand scrutiny.

  "While it is unrealistic to believe that we can ever stamp out misinformation... it is especially alarming that so much of this content has been crafted and distributed by the country's largest media company, News Corporation, principally through Murdoch's Sky News," he said.

  Sky News Australia has a small TV viewership locally, but a big presence online with a significant global following.

  The station has said its uploads drew more than 22 million viewers a month.
