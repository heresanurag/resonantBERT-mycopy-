title: Actor Laurence Fox's Question Time clash over Meghan Markle - BBC News
date: '2020-01-17'
section: General
url: http://www.bbc.co.uk/news/uk-51145321
content: |-
  The Lewis actor clashes with an audience member over whether press coverage was racist.

  The Duke and Duchess of Sussex's decision to step back from royal life sparked debate on BBC's Question Time.

  Actor Laurence Fox clashed with an audience member, a university lecturer and race and ethnicity researcher, who said the way Meghan Markle had been treated in the press was "racist".
