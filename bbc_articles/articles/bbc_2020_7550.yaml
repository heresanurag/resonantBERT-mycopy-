title: 'South Asian anti-black racism: ''We don''t marry black people'' - BBC News'
date: '2020-07-14'
section: General
url: http://www.bbc.co.uk/news/newsbeat-53395935
content: |-
  Amit's relationship with Michelle was a secret for years because he feared his family's reaction.

  Amit, who is British with Indian heritage, kept his relationship with Michelle, who’s British with Ghanaian heritage, secret for years - because he feared his family’s reaction. He says that racist attitudes about black people in his community can be influenced by colourism and the caste system in some south Asian countries.

  Rapper Raj Forever’s music draws on his Jamaican and Sri Lankan heritage. But growing up he was made to feel like an outsider in the Asian community and has heard offensive slurs used to describe black people.

