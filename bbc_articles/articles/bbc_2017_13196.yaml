id: bbc_2017_13196
title: '''Sufficient progress'' will see Brexit trade talks begin - BBC News'
date: '2017-12-08'
section: General
url: http://www.bbc.co.uk/news/uk-politics-42276954
content: |-
  EU Commission says Brexit discussions can move on to the next phase, as "sufficient progress" has occurred.

  The European Commission has said "sufficient progress" has been made in the first phase of Brexit talks to allow discussions to move on to Britain's future relationship with the EU.

  President Jean-Claude Juncker said he was confident the leaders of the other 27 EU members, who will meet next week, would allow the talks to progress.
