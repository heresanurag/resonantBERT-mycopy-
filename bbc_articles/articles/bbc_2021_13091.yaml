content: |-
  A serious case review over Lilly Hanrahan's death criticises authorities' checks on her murderer.

  Lilly Hanrahan was 21 months old when she was murdered by Sean Sadler

  Authorities' failure to share details about a man before he murdered a girl in his partner's care "contributed" to her death.

  The Probation Service admitted error following a serious case review over toddler Lilly Hanrahan, killed in Birmingham in 2017.

  The probe highlighted a catalogue of missed chances to check on killer Sean Sadler's presence in her life.

  Sadler, 32, was jailed in March for at least 20 years.

  Babysitting Lilly in the Northfield area of the city, he threw and violently shook her, causing a brain injury that led to her death.

  He had also attacked the 21-month-old about a week before the fatal assault.

  But despite authorities being aware of Lilly since her mother became unable to care for her, chances to monitor the adults in her life were missed, the review found.

  Information about Sadler going unshared by the Probation Service was said by the investigation to be a key "omission".

  A Probation Service spokesperson has apologised for "failure" which she said "contributed" to Lilly's death.

  The report, published on Tuesday, said Lilly had been hospitalised as a baby and, due to her mother's substance misuse, was placed in the care of her maternal grandmother.

  But in 2016 the woman informed authorities she felt unable to manage the toddler.

  A special guardianship order (SGO) was made in September of that year, with another woman, unnamed in the report, appointed.

  Her first biological child was fathered by Sadler. During her assessment prior to appointment as guardian, she said there had been no contact with him since becoming pregnant.

  By 2017, they were in a new relationship, with Sadler murdering Lilly in November of that year.

  Sean Sadler told authorities he was in a relationship with Lilly's guardian two months before he murdered the toddler, but no action was taken

  The SGO assessment, the review concluded, could have "made inquiries of previous partners" and "also have explored [the guardian's] family dynamics more closely", although the report added that had those components been completed, it was unlikely the SGO would not have been made.

  Had a supervision order been in place, it concluded, there would have been a requirement for the guardian to inform the local authority about her new partner.

  Sadler, the report added, had a history of mental health problems. Following a conviction for battery and criminal damage, he began to be supervised by the Probation Service, and in September 2017, two months before Lilly died, he disclosed he was in a new relationship with a woman whom he used to see when he was younger.

  But, the report said, information about the risks posed by him was not shared by the Probation Service with the guardian or children's social services, as required by procedure.

  "Had [the Probation Service] done so, Children's Social Care would have been alerted and safeguarding processes put in place," the review said.

  It added: "Indeed, this omission may well have had very serious consequences for Lilly, and may be the single omission that could have made a difference."

  Additionally, notes from 25 January 2017 in the children's social work team suggested that visits were taking place to see Lilly and the guardian, but no records of those visits exist, and the case was closed on 22 March 2017.

  From October to 14 November 2017, Lilly's guardian and her nursery reported seeing bruises on her, but no safeguarding concerns were identified.

  Two days later, Lilly was found collapsed, and died on 22 November.

  Of Lilly's guardian, the review said: "She told us that she blames herself completely for the death of Lilly: that she should have been more suspicious of her then partner, should not have taken his word, should not have allowed him to babysit for Lilly, should have seen the pattern in the bruises.

  "She also blames the police for not informing her about her then partner's convictions.

  "In fact, probation had a duty to inform her. She said, that had she known, she would have immediately taken steps to distance herself from him."

  Sarah Chand, head of West Midlands Probation Service, said:"My heartfelt sympathies remain with Lilly's family and I would like to apologise to them for the failure by probation which contributed to her death.

  "Since this horrific crime, we have recruited more staff, work more closely with social services and continue to conduct visits to offenders' homes to better protect children and partners from domestic violence."

  Andy Couldrick, chief executive of Birmingham Children's Trust, which manages children's care in the city, said the trust "acknowledged" the shortcomings in the report and offered its "deepest" condolences.

  "In this case, services were involved for six months following the [SGO], and there were no issues or concerns being raised that suggested our involvement needed to continue," he said.

  "When Mr Sadler became reattached to the family, children's services' involvement had ended.

  "If children's services had been alerted by Probation, or by the services that were made aware of unexplained bruising to the child, then of course children's services would have become involved once more with the family."

  He added the "robustness and rigour" of services, including support following the issuing of an SGO, had been improved.

  Penny Thompson CBE, independent chair of Birmingham Safeguarding Children Partnership, said Lilly's death was "profoundly sad".

  She added: "I offer condolences to her family and loved ones. I know they continue to feel her loss intensely."

  Following the review, she said she wanted to highlight the importance of adult-oriented services sharing information with those supporting children, and the importance of professionals having "open and curious minds".

