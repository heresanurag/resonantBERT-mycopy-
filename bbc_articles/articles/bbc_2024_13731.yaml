title: 'US Women''s Open: Yuka Saso storms home to win second major - BBC Sport'
date: '2024-06-03'
section: Golf
url: http://www.bbc.co.uk/sport/golf/articles/c8440wnd8pwo
content: |-
  Japan's Yuka Saso recovers from a three-shot deficit to became the youngest player to win two US Women's Open titles.

  Japan's Yuka Saso overturned a three-shot deficit to became the youngest player to win two US Women's Open titles.

  There had been a three-way tie heading into what became a dramatic final day, with Australia's Minjee Lee, American Andrea Lee and Thailand's Wichanee Meechai level at the top of the leaderboard.

  But Saso, 22, produced a run of four birdies in five holes on the back nine to snatch victory by three strokes.

  "It feels great," said Saso. "I really wanted it, as well.

  "Not just to get a second win but also to prove something to myself. I haven't won in two and a half or three years. I definitely had a little doubt if I can win again or if I won't win again."

  Her two-under-par 68 saw her triumph on four under at Lancaster Country Club in Pennsylvania, with compatriot Hinako Shibuno finishing second.

  That gave Saso, who switched her international allegiance from the Philippines in 2022, her second LPGA Tour title - both coming at the US Women's Open.

  Saso became the first Filipino player to win a major when she clinched her first US Women's Open title as a teenager in 2021.

  "Winning in 2021, I represented the Philippines [and] I feel like I was able to give back to my mom," Saso said at her trophy presentation.

  "This year, I was able to represent Japan, and I think I was able to give back to my dad. I'm very happy that I was able to do it."

  She was obliged to renounce one of her two citizenships before she turned 22 and chose to take Japanese citizenship.

  Saso suffered an early blow on Sunday when she followed a birdie on the second by four-putting the sixth for a double bogey.

  But after steadying the ship she stormed clear as only two players finished under par, with Minjee Lee limping home in 41 for an eight-over 78 while Meechai struggled to a closing 77.

  Andrea Lee posted a 75 to share third place with fellow American Ally Ewing, who surged through the field with a 66.

  Saso is the third player to win major championships with their first two LPGA Tour titles, after after Se Ri Pak and In Gee Chun.
