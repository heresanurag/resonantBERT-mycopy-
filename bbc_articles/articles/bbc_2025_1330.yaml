title: Jellycat toys thief given suspended jail sentence - BBC News
date: '2025-02-18'
section: England
url: http://www.bbc.co.uk/news/articles/cx2p22252j3o
content: |-
  Ruby Smith is sentenced after 40 of the collectable toys are discovered at her home.

  A woman who stole almost £3,000 worth of Jellycat toys has been given a suspended prison sentence. Ruby Smith, 35, of Eye in Suffolk, was captured on CCTV putting the toys into her bag, her clothing and a child's pram before leaving without paying, Norfolk Police said. She had previously admitted to seven counts of thefts between July and September from garden centres in Bressingham, Wroxham and Thetford in Norfolk. Police said 40 of the collectable toys had been seized from her home and on Monday she had been given a 26-week prison sentence, suspended for 24 months.

  An axolotl and an aubergine were among the items discovered

  Jellycat, founded in London in 1999, is known for its plush toys which retail from about £12 for smaller items and up to £200 for larger ones. The toys of animals and everyday items have become hugely collectable, with buyers often sharing their latest purchases on social media. Some ranges, including a peach which went viral last year, have sold out on release and caused a surge in secondary sales on platforms such as Vinted.

  Last year Jellycat opened concept pop-up stores including a patisserie in Paris and a fish and chip shop in London

  At Norwich Magistrates' Court, Smith was also ordered to pay £1,780 in compensation and a £154 victim surcharge. She was told to wear an electronic monitor for three months, participate in an accredited programme for 40 days and take part in a rehabilitation activity programme for up to seven days.

