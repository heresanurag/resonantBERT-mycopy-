title: Why don't Europeans buy more American cars? - BBC News
date: '2025-02-16'
section: Business
url: http://www.bbc.co.uk/news/articles/cq8kn5v37wxo
content: |-
  Trump wants US vehicles to be more popular in Europe, but it's a difficult market for them to crack.

  Large American pickup trucks are difficult to drive around Europe's old and narrow streets

  Donald Trump is threatening to introduce big tariffs on EU car imports, unhappy that Europeans don't buy more American vehicles. But why are US cars, with the notable exception of Tesla, not more popular in Europe? Italy's ancient towns and cities, with their narrow, cobbled streets, offer an obvious explanation why, in the words of US President Donald Trump, Europeans "don't take our cars". Or as car industry analyst Hampus Engellau puts it: "Try to go around Italy in a big SUV. I've done it, and it's very difficult". Add cost to the question, and it becomes obvious why you don't see too many American pick-up trucks on European roads, observes Mike Hawes, CEO of The Society of Motor Manufacturers & Traders, which represents the industry in the UK. "We tend to have higher fuel prices than the Americans, so we prefer smaller, more fuel-efficient vehicles, while they generally prefer larger vehicles." Mr Engellau, who works for Swedish investment bank Handelsbanken Capital Markets, also highlights petrol prices being substantially cheaper in the US. "They pay per gallon what we pay per litre," he says. There are 3.8 litres to one US gallon.

  Yet these differences have done little to deter European carmakers from gaining market share in the US. Again, in the words of Mr Trump, the US has "millions of cars coming in - BMW, Mercedes, Volkswagen and many others". In 2022, 692,334 new EU-made cars were exported to the US, worth €36bn ($37bn; £30bn). While only 116,207 new US-made cars went in the opposite direction, for €5.2bn. This imbalance is caused by unfair trading rules and needs correcting, according to Mr Trump. "Mr Trump is concerned because the terms of trade are not really equal," explains Mr Engellau, pointing out that the EU's 10% tariffs on cars imported from the US far exceeds the 2.5% tariffs the US – currently - charges on cars imported from the EU.

  Small cars are far more popular in Europe than they are in the US

  These disparities have prompted Trump to say he wants to raise US tariffs on European automotive imports. He has already announced 25% import tariffs on steel and aluminium imports, two metals crucial for carmakers. Trump's move appears to have prompted EU officials to consider reducing their own tariffs in order to protect Europe's automotive industry from a potential trade war. Trump's intervention has not impressed Jim Farley, the boss of US carmaker Ford. "So far what we've been seeing is a lot of cost and a lot of chaos," NBC News recently reported him as saying., external In fact, the very focus on trade is perhaps misplaced, according to automotive industry veteran Andy Palmer, formerly the chief operating officer of Nissan and CEO of Aston Martin, and currently a consultant. "If you can help it, you don't want to ship cars around the world. They're big boxes of expensive air," he says. The automotive industry is global, adds the SMMT's Mr Hawes, so carmakers generally want to "manufacture close to where the customer is based". As such, several European carmakers, most notably marques such as BMW, Mercedes and Audi, are making some of their largest cars in North America, and some of these vehicles are exported back to Europe.

  US carmakers have historically pursued similar strategies in Europe. General Motors owned and manufactured European marques such as Opel/Vauxhall and Saab, but it sold the former in 2017, and shut the latter back in 2009. Meanwhile, Ford offloaded Aston Martin in 2007, Jaguar and Land Rover in 2008, and Volvo in 2010. After years of losing money, Ford is currently redirecting its European business towards electric and commercial vehicles and away from small, affordable cars, such as its Focus models. Ford plans to cut 800 jobs in the UK and 2,900 jobs in Germany by 2027, which represents a 14% reduction in its 28,000-strong European workforce. Elon Musk's Tesla has a factory near Berlin in Germany, where it makes its Model Y cars for the European market, but even here there are headwinds as low-cost Chinese imports in particular see their share of Europe's market for electric cars grow. Europe is a very tough marketplace for carmakers, according to Jose Asumendi, head of European automotive research at JP Morgan, an investment bank. "You need to have the right products, and you need to run the manufacturing plants well." He also points to brands having a competitive advantage in their home countries, be it BMW, Mercedes, Volkswagen and Audi in Germany, Peugeot, Citroen and Renault in France, or Fiat and Alfa Romeo in Italy. "There's a natural inclination for people to buy local champions, especially in Germany, France and Italy," explains Mr Asumendi. He adds that while other European countries are more open to different brands, the market is crowded, with a slew of Japanese, South Korea, and, increasingly, Chinese cars.

  Adding to Europe's complexities for overseas carmakers are different taxation regulations, and the need to communicate in many different languages. Mr Palmer does not think "European customers have any particular objections to American cars", and Mr Asumendi agrees. "I think Europeans do like American brands, but there are many other brands available in Europe, so competition is fierce," he says. Mr Trump's ambition is to make the US car industry stronger, by bringing more production and innovation home. But Mr Palmer insists that a car trade war with Europe will not deliver this. Not least, he says, since tariffs tend to "insulate the beneficiaries from the free market, and this merely makes them lazy, so they stop innovating and fail to remain competitive". "It's not about trade," adds Mr Palmer. "It's about investment and collaboration."
