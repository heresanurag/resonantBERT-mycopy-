title: Cynthia Nixon holds NY governor rally in Brooklyn - BBC News
date: '2018-03-21'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43481370
content: |-
  The Sex and the City star kicked off her gubernatorial bid in one of New York's most deprived areas.

  Sex and the City star Cynthia Nixon has announced she is launching a bid for New York governor.

  She held her first campaign stop in Brownsville, Brooklyn, one of the city's most run-down neighbourhoods.
