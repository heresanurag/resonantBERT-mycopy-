content: |-
  Iran's President Ebrahim Raisi has been killed in a helicopter crash, according to state media.

  Iran's President Ebrahim Raisi has been killed in a helicopter crash, according to the country's state media.

  He was travelling with Foreign Minister Hossein Amir-Abdollahian, who also died after the aircraft came down on Sunday.

