content: |-
  Gisèle Pelicot, 71, is the woman at the centre of this trial, but no-one has emerged unscathed in her family.

  In stifled sobs and fierce accusations, family falls apart at mass rape trial

  Gisèle Pelicot has attended almost all the trial since it began in September

  At the epicentre of this devastating family drama is Gisèle Pelicot, a diminutive 72-year-old woman, drugged by her former husband and abused for a decade by dozens of strangers he had recruited online. Watching her entering the court in Avignon and giving evidence, it was staggering to imagine the amount of abuse her body sustained. But as other members of her family have taken the stand, it has become painfully clear that no-one has emerged unscathed from the storm unleashed by the actions of the Pelicot patriarch. The damage to this family is clear. Individually, they have described the destructive force that engulfed them in November 2020 as a “tsunami” that left nothing but ruin in its wake. Dominique Pelicot was finally caught after an alert security guard caught him filming under women’s skirts. But it took weeks for police to discover the full truth that ultimately tore his family apart. Warning: This story contains details some readers may find disturbing For years, he had been drugging his wife and recruiting men online to rape her while she was unconscious. He filmed the abuse and neatly classified each visit in folders on his hard drive. Faced with the evidence, Dominique Pelicot admitted the rape charges against him. Alongside obscene language describing his videos, he added captions with the men’s names. Fifty other men have been on trial with him and only a handful admit rape. More than 20 others could not be identified and are still at large. Gisèle Pelicot has attended almost all of this trial. She waived her anonymity and allowed the public to see what she had endured. The videos leave no doubt that the sex acts were not consensual. Ms Pelicot can be seen lying on the bed, snoring, as her husband whispers instructions to various men to touch her, prod her, use her. Artificial sleep affords her mind a degree of protection, but her body becomes an object. She was, in her own words, treated “like a rag doll, like a garbage bag“. "I am 72 now and I don't know how much time I have left,” she told the court last week.

  The magnitude of Dominique Pelicot’s betrayal and crimes is such that the aftershocks have rippled far beyond his ex-wife. The Pelicots’ middle child, Caroline Darian, now 45, screamed her anguish at her father in court as she demanded to know the truth about photos found on his computer. Entitled “My naked daughter”, the images show her semi-naked and, she says, clearly drugged.

  Caroline Darian accused her father of lying to the court, saying she was convinced he abused her

  Mr Pelicot has offered various and at times contradictory explanations for the pictures, although he has denied abusing his daughter. “I never touched you,” he pleaded with her. But his duplicity has been abundantly exposed during this trial, and he has clearly lost the right to be believed by his daughter. “You are a liar,” she shouted back at him. “I am sick of your lies, you are alone in your lie, you will die lying.” Fighting back tears, she accused her father of looking at her “with incestuous eyes”. Caroline Darian has told the court she feels she is the trial’s “forgotten victim” as, unlike her mother’s case, there is no record of the abuse she is convinced was inflicted on her. She has founded a charity to highlight the dangers of drug-induced assault and published a book in 2022 detailing her family’s trauma. In it, she hinted at a rift with her mother, who she found had dropped off a bundle of warm clothes for her father in jail, weeks after his crimes came to light. “I couldn’t believe it,” Caroline wrote. “She was still looking after the person who got her raped for a decade.” That apparent rift was exploited by a combative defence lawyer who suggested Gisèle Pelicot had chosen her former husband over her daughter by not demanding the truth about the photos of Caroline. Gisèle shook her head, but Caroline cracked a slight smile, appearing to acknowledge the lawyer's description.

  Florian, the youngest sibling of the family (L), described the pain his sister Caroline had gone through. His brother David also took the stand

  When Caroline’s brothers David and Florian took the stand they made repeated references to the pain she was going through, urging their father to tell the truth. Stifling sobs, Florian, 38, the youngest of the family, turned to face Dominique Pelicot sitting in a glass box to his left and said: “If you have any dignity and humanity – you don’t have anything left to lose anyway – tell Caroline the truth.” He also spoke of his longstanding suspicion he was the product of an affair his mother had in the 1980s, which was compounded by a faint but lifelong feeling that his father loved his siblings more than him. In a desperate search for answers, he wondered out loud whether he could be the “motive” for his father’s crimes. He said he would seek out a paternity test, adding it would be a “relief” not to be Dominique Pelicot’s son. Through tears, Florian painted a desolate picture of what his life had become. His marriage to the mother of his three children, Aurore, has not survived revelations that Dominique Pelicot also surreptitiously took photographs of her. Despite their separation, this slight, softly-spoken woman has frequently attended the trial and said it had exposed the “banality” of abuse. Aurore, herself a survivor of incest, is having to live with the regret of not having listened to her instincts regarding Mr Pelicot. “If she had, she may have been able to alter the course of events,” her lawyer said.

  The eldest of the Pelicot children, David, is a burly man of 50 who bears a striking resemblance to his father. Taking the stand this week, he described how he had grown closer to Dominique Pelicot when he had himself become a father. Then, his voice growing more anguished and clutching the stand as if to steady himself, he recalled the harrowing detail the night his mother told him of his father’s arrest. “All of us know where we were when the tsunami hit,” he said.

  Caroline Darian talks to her brother David during a break in the trial in Avignon

  Naked photographs of his wife Celine, pregnant with their twin daughters, were also found among Mr Pelicot’s files. She was in the bathroom, snapped with a hidden camera. His voice heavy with emotion, David described watching his mother, frail and lost, standing on a train platform, her life reduced to her dog and a suitcase. Recalling the birthday parties his parents used to throw for him and his siblings, to the envy of their friends, he said: “My childhood has disappeared; it was erased.” The trauma rippling through this family seems without end. David’s son, now 18, wonders what really happened when Dominique asked him to “play doctor” as a child. His young siblings, the family’s lawyer said on Wednesday, “will have to find their place in a family in which their grandmother, their mother, their brother and their aunts have all been victims of their grandfather.” Caroline’s young son is still profoundly shaken by the carefully worded revelation, four years ago, that his beloved grandfather hurt his grandmother. “This is just a sample of the depth of the suffering caused by a rape in the family,” lawyer Stéphane Babonneau said in his closing arguments. A verdict is expected on 20 December. Mr Pelicot is facing 20 years in jail – the maximum sentence for rape in France. And for the rest of his family the trauma will live on. Because none of them will ever know for certain what he may or may not have done. In one of the shaky phone videos shown in court, a tall naked man stands in the middle of a dark bedroom. Another man sits on the bed, smiling, next to an unconscious woman lying on her side, lightly snoring. Behind her, on a chest of drawers, is a photograph, clearly discernible despite the low lighting. It is the Pelicot family, huddling close on a beach on a sunny day, and beaming at the camera.
