  Wherever they could, prosecutors attempted to provide other witnesses or evidence that could corroborate Cohen's claims. Prosecutors have introduced a paper trail of texts, emails, phone calls, bank records and legal contacts Cohen left as he brokered payouts to Ms Daniels and another woman, Playboy model Karen McDougal, in exchange for their silence. They also called on people like former tabloid publisher David Pecker and Ms Daniel's former attorney Keith Davidson, to shed light on events involving Cohen and the hush-money payments that he made. They are hoping these may buoy Cohen, who has been caught lying under oath, and keep jurors from entirely dismissing his testimony. That is something that the jury could do if they decide he is not credible. Prosecutors did not shy away from acknowledging Cohen's flaws in the courtroom. During opening statements, assistant district attorney Michael Colangelo told the jury: "You will need to keep an open mind" about Cohen, and "keep in mind all the evidence that corroborates Michael Cohen's testimony".
