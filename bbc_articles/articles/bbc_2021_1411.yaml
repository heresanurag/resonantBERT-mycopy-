title: 'Covid-19: Welsh Government update 3 February 2021 - BBC News'
date: '2021-02-03'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-55917514
content: |-
  Details and reaction to Wednesday's briefing on the pandemic by Health Minister Vaughan Gething.

  There is no indication that the South African variant of Covid-19 is spreading widely among communities in Wales, according to the health minister.

  While the source of 10 of Wales’ 13 confirmed cases have been identified, Vaughan Gething was asked where he believed the other three cases had originated.

  “The reason why we’re doing that backward contact tracing around those three people is to answer exactly that question”, he said.

  “The fact that we’ve only got a handful of cases at present suggests that there isn’t sustained community transmission in Wales of the South African variant.

  “But we need to understand what’s happened with those three cases to understand how those people have got the South African variant, if they have come into contact with other people through different points of contact earlier on.

  “So that’s why the investigation is taking place because we need to answer that question”.

  Mr Gething also said it was important to learn more about the so-called Kent variant, to identify how that was likely to impact continued spread of the virus within Wales.

  “The Kent variant has got into sustained community transmission. It’s now the dominant form of coronavirus in Wales”, he said.

  “We know that in itself is much more contagious as well, so it’s about understanding the impact of this new variant, and where and how those three people may have come into contact to acquire this particular strain of coronavirus."
