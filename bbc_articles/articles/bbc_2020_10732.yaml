content: |-
  The shadow chancellor says half of her 40 requests for targeted wage support for workers were “rebuffed” by the government.

  The shadow chancellor says half of her 40 requests for targeted wage support for workers have been “rebuffed” by the government.

  After the chancellor announced his job support scheme, Anneliese Dodds said it was a “relief this government has U-turned now”.

  She said the delay will have “impacted on business confidence”.
