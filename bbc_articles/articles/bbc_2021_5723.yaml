id: bbc_2021_5723
title: 'Israel-Gaza: Strike collapses building during live BBC report - BBC News'
date: '2021-05-14'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-57114168
content: |-
  BBC producer Adnan Elbursh was broadcasting live from Gaza City when a building behind him was hit.

  A building in Gaza City collapsed during a live BBC TV report after being hit by an Israeli strike.

  BBC Arabic reporter Adnan Elbursh and his team kept broadcasting, unaware of what was about to happen.

  The report, for presenter Mohamed Seif, came on Wednesday as the fighting between Israel and Palestinian militants continued to escalate.
