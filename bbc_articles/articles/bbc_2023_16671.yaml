  Based around Derry Girls Erin, Michelle, Clare and Orla, plus "the wee English fella" James, the show is about the everyday life of a group of teenagers set against the backdrop of the Troubles.

  It ran for 19 episodes across three seasons. Its final episode aired on 18 May and focused on Northern Ireland preparing to vote on the Good Friday Agreement in 1998.

  The third season saw an average of three million UK viewers tuning in for its seven-episode run.

  Lisa McGee was awarded the freedom of Derry City and Strabane at a ceremony in December last year for showcasing the city and district in the series.

  She was the first ever female recipient of the council's highest honour.

  Mayor of Derry Sandra Duffy said the Derry Girls writer has 'boosted civic pride'

  Following the success of the series for Channel 4, the broadcaster has commissioned a new eight-part TV series from McGee set in Belfast.

  The comedy-thriller How To Get To Heaven From Belfast, according to Channel 4 publicity, will follow three women from Belfast who meet up at the wake of an old friend.
