title: Derry Girls final season wins International Emmy Comedy Award - BBC News
date: '2023-11-21'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-67483358
content: |-
  The Channel 4 comedy picked up the top prize in New York alongside Netflix special Vir Das: Landing.

  Derry Girls creator Lisa McGee and executive producer Liz Lewin pose with the Best Comedy award

  The third and final series of Derry Girls has won a coveted International Emmy award for comedy.

  Winners were announced at a gala ceremony in New York City on Monday night.

  The Channel 4 comedy series won the International Emmy for Comedy alongside Netflix special Vir Das: Landing, which first aired in 2022.

  It follows success at the Royal Television Society Awards, Irish Film and Television Awards and the Baftas.

  Derry Girls was first broadcast in 2018 and ran for three seasons before finishing in 2022.

  Derry Girls centres on teenager Erin Quinn (centre) and her friends growing up in the city

  Following the win and referencing the show's previous awards, Derry Girls creator Lisa McGee posted to X saying: "Collection complete".

