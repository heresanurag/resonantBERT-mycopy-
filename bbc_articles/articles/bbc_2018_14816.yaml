content: |-
  President Trump and four ex-presidents attended the funeral in Washington.

  'The last words he said were, I love you, too'

  "He was born with just two settings: full throttle, then sleep." But jokes aside, his son describes him as a patient and loving father. When Bush Jr spoke to his father on his deathbed, he says he told him he loved him. "I said, 'Dad I love you and you've been a wonderful father'. And the last words he would ever say on earth were: 'I love you too.'" "To us, he was close to perfect." Bush Jr says after his mother, Barbara Bush, passed away, all his father wanted was to "hold mom's hand again".
