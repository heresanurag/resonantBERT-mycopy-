content: |-
  Spanish officials confirm a body found during the search for Jay Slater is that of the missing teen.

  Spanish officials have confirmed that a body found in Tenerife during the search for Jay Slater is that of the missing teen.

  A Spanish court said fingerprint tests showed the body is that of the 19-year-old, and that his death was caused by "trauma consistent with a fall in a rocky area".

  Jay Slater's body was found close to an area that was already searched by Spanish police and by family and friends of the teen.

  BBC correspondent Fiona Trott walks us through the remote national park in Masca where the body was found.
