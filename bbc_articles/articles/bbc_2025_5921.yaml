title: 'River Thames: Girl, 11, missing in water named as Kaliyah Coa - BBC News'
date: '2025-04-01'
section: London
url: http://www.bbc.co.uk/news/articles/ckg5v4rp4qzo
content: |-
  A recovery mission is now under way to find 11-year-old Kaliyah along the Thames, Met Police said.

  The girl entered the river close to Barge House Causeway, near London City Airport

  An 11-year-old girl who went missing in the River Thames has been named as Kaliyah Coa. The Met Police said "a recovery mission" was now under way to find her along the Thames. Police were called at about 13:20 BST on Monday after Kaliyah, who had been playing during a school inset day, entered the water near Bargehouse Causeway, near London City Airport in east London. Emergency services conducted a large-scale search in an effort to find her.

  Ch Supt Dan Card from the Met said: "Specialist officers are supporting Kaliyah's family through this deeply upsetting time and our thoughts go out to all those impacted by what has happened. "We are committed to finding Kaliyah and are working with partners to conduct a thorough search over a wide area - utilising drone technology and boats."

  He added: "I'd like to thank the members of public, our first-responding officers, and colleagues from other emergency services, as they responded rapidly to carry out a large-scale search during a highly pressurised and distressing time." The force is appealing for witnesses. It said Kaliyah's family had "asked for privacy at this distressing time". The force search on Monday involved boats and helicopters from HM Coastguard, the Royal National Lifeboat Institution and London Fire Brigade.

  People living nearby said Kaliyah had been playing near the water with a young boy and girl. They said they had heard shouts and screams and other children who were playing had said a girl had disappeared in the water and they could not find her. One woman, who later found shoes, a sock, a coat and phone by the river, had taken a life ring to the water but could not see Kaliyah. Bargehouse Causeway is a concrete slope that goes directly into the River Thames and is used to transport boats. Some residents pointed out that it appeared to be covered in moss and is slippery.
