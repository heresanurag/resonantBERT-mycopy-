title: 'Alyson Nelson: Man handed life sentence for murdering ex-partner - BBC News'
date: '2023-11-23'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-67480882
content: |-
  William Finlay admits stabbing Alyson Nelson in her home in Whitehead, having previously denied it.

  A man has been sentenced to life in prison for murdering his former partner in her home in Whitehead, County Antrim.

  Former nurse Alyson Nelson, 64, was stabbed to death in the house on Victoria Avenue in April 2022.

  William Finlay, from Old Forde Gardens in Whitehead, appeared at Belfast Crown Court.

  The 68-year-old had previously denied murdering the retired nurse but changed his plea to guilty.

  He was charged with murdering Ms Nelson, aggravated by domestic abuse.

  The judge sentenced Finlay to life imprisonment and scheduled a hearing for 19 January when he will tell him the minimum term he must serve before he can be considered for parole.

  A defence lawyer told the court they would be seeking a pre-sentence report and a forensic psychiatrist's report to deal with "specific issues".

  Finlay was remanded into custody and was led from the dock in handcuffs by two prison officers.
