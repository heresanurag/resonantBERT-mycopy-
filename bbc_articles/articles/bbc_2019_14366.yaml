title: 'John McDonnell: ''Extremely disappointing'' if exit poll right - BBC News'
date: '2019-12-13'
section: General
url: http://www.bbc.co.uk/news/election-2019-50765945
content: |-
  The shadow chancellor says the exit poll predicting large Conservative gains has come has a shock.

  Shadow Chancellor John McDonnell says the exit poll predicting large Conservative gains has come has a shock.

  He told the BBC's Andrew Neil that the big issue was Brexit, not Jeremy Corbyn's leadership.
