title: 'Sir David Amess: Political world pays tribute to much-loved MP - BBC News'
date: '2021-10-16'
section: General
url: http://www.bbc.co.uk/news/uk-58931360
content: |-
  Sir David Amess has been described as "one of the kindest, most gentle people in politics".

  Boris Johnson has led tributes from the political world to Sir David Amess MP, who was stabbed to death at his constituency surgery in Essex.

  The prime minister said he was "one of the kindest, nicest, most gentle people in politics".

  Watch to hear from other politicians, including Labour leader Sir Keir Starmer, close friend Ann Widdecombe, and Kim Leadbeater - the sister of Jo Cox, the MP who was murdered in 2016.
