  The chancellor opens the 2024 Budget amid noisy scenes in the Commons.

  The chancellor opened the 2024 Budget amid noisy scenes in the Commons.

  Jeremy Hunt told MPs the UK has seen higher growth since 2010 under the Conservatives than every large European economy.

  He went on to offer "permanent cuts in taxation".

