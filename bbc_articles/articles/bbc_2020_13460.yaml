  Early data suggests the vaccine is nearly 95% effective, after a trial of 30,000 people in the US.

  Why was UK not at front of Moderna vaccine queue?

  Sky's Thomas Moore asks why the UK government has not bought up some of the Moderna vaccine before now. Matt Hancock says there is not a stockpile, the vaccine has not yet been manufactured and in Europe first availability will be in the spring. "It is critical we have been buying the first vaccines that will be available," he says. He adds that, if you take the Astrazeneca agreements and Pfizer vaccines into account, the UK has more than 100 million doses on order. Jonathan Van-Tam says the spiked coronavirus protein is being targeted by most of the vaccine trials around the world and these early results are beginning to show us this is a "plausible target for vaccines to be working against". "When we started this journey in February/March we didn't even know that, so we are in a happier place than we were," he says.
