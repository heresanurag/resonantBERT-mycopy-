  Mazen al-Hamada, who returned to Syria from the Netherlands, had publicly testified on the torture he faced while in prison.

  'I wish he'd lived to see new Syria' - Crowds bury anti-Assad activist

  Mourners carried Mazen Al-Hamada's coffin through the streets of Damascus on Thursday

  Warning: This article contains graphic details of torture "We gave our blood and soul to the revolution," crowds chanted, as they carried Mazen Al-Hamada's coffin through the streets of Damascus, draped in the green, white and black flag adopted by protesters back in 2011, now ubiquitous in the city since the fall of Bashar Al-Assad. As the funeral procession moved forward, more and more people joined it. "Mazen is a martyr," many shouted, some weeping. If the world knew before this about the extent of the brutality of Assad's regime against its own people, it was in part because of Mazen, an activist who was an outspoken critic of the regime. On Sunday, his body was found in the notorious "slaughterhouse", Seydnaya prison in Damascus. It bore signs of horrific torture. A doctor who examined it told the BBC he had fractures, burn marks and contusions all over his body, allegations corroborated by Mazen's family. "It's impossible to count the wounds on his body. His face was smashed and his nose was broken," his sister Lamyaa said. A protester when the uprising in Syria began in 2011, Mazen Al-Hamada was arrested and tortured. Released in 2013, he was given asylum in the Netherlands. He began to speak openly about what he was subjected to in prison. In the documentary Syria's Disappeared by Afshar Films, Mazen describes how he was raped, his genitals clamped, and how his ribs were broken by a guard jumping on his chest over and over again.

  Assad's regime brutally tortured Mazen al-Hamada after the uprising began in 2011

  While in asylum, Mazen's nephew Jad Al-Hamada says he began suffering from severe depression and other mental health issues. During this time, he was seen in a video claiming he was being threatened by members of Syria's ethnic minority Kurds, and called for violence against them in response. His family says he was not of sound mind at the time. In 2020, he decided to return to Syria. "The government told him he had a deal and that he would be safe. He was also told that his family would be arrested and killed if he didn't return," Lamyaa said. He was arrested as soon as he arrived in the country. And his family believes he was killed after rebels took Hama last week, shortly before the regime fell. "I am happy that we are free, but I wish he had lived to see it. He paid the price for our freedom," said Lamyaa. Mazen's story is just a small glimpse into the atrocities committed by the Assad regime. More than 100,000 people disappeared under his rule, most believed to be dead. Now their families are searching for their bodies. At the Damascus hospital, the bodies brought from Seydnaya were laid out in a morgue, and when they ran out of space, the most decomposed ones were kept in a shed-like structure just outside. The stench was overwhelming. One body was decapitated. The others bore marks of severe torture. In one corner, there was a plastic bag with a human skull and bones. Families were looking through it to identify their loved ones.

  Relatives of missing people in Syria are searching through body bags for their loved ones

  Nineteen-year-old Ahmad Sultan Eid's disfigured body was identified by his mother and brother. His mother nearly collapsed after she saw it, and nurses took her to the emergency room. "Oh my boy, my baby, you were only 19," she wailed. "There's nothing left for us anymore." Ahmad's brother leaned his face against a wall and wept. All around us, people were holding up the photos of the loved ones they were searching for. "I haven't been able to find anything. How can you find anything if you're looking through skeletons?" said Mustafa Khair-ul-Inam, an elderly man who had come looking for his two sons Omar and Mohammad who disappeared in 2011. Amhad Masri meanwhile had come looking for his brother Khalil. "Until now we weren't allowed to ask where our loved ones are, otherwise we would be arrested. Can you imagine our feelings? They didn't do anything and just like that they are gone. Maybe they are in a mass grave somewhere. Living in a jungle was better than living in Syria," he said. Grief and rage – which couldn't be expressed openly until just a week ago – were pouring out. "Every mother who is looking for her son should get revenge against Assad. Putin should not give him refuge. He should send Assad back so we can execute him in a public square," one woman shouted loudly. I asked Mazen's sister Lamyaa what justice she wanted for her brother. "The perpetrators of the crimes have all escaped. But I want them brought back so we can get justice in a court of law."
