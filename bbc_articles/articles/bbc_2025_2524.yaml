  Jenner stabbed the Kent Police officer in the head with a pair of scissors, a court is told.

  Man jailed for trying to kill PC with scissors

  Jenner will serve at least 20 years before being able to be considered for parole

  A man has been jailed for 30 years for trying to kill a police officer by stabbing him in the head with a pair of scissors. Robert Jenner attacked PC Sean Quinn at a flat in Maidstone, Kent, in June 2023, leaving the officer with a gaping wound across his forehead which exposed his skull. PC Quinn and a group of colleagues had gone to Jenner's flat after he was suspected of running naked in a nearby park, exposing himself to women, Kent Police said. Jenner denied attempted murder and wounding with intent, and refused to leave his cell to attend court during his trial. He was found guilty in his absence on Tuesday.

  Jenner's defence had argued he had acted to defend himself from what he believed was an unlawful arrest, but the prosecution said, given the severity of his actions, he must have been trying to end PC Quinn's life. PC Ashley Bates had punched Jenner several times on the back of his head to get him to release the scissors. In her victim impact statement she described the scene as "utterly terrifying" with "so much blood".

  This video can not be played To play this video you need to enable JavaScript in your browser. Bodycam footage shows police attempting to arrest Jenner before he attacked the officer

  In his statement read to the court PC Quinn said his scars "serve as a constant reminder of the attack". Statements from his children were also read, with one saying: "Jenner failed in killing my dad, but a part of him still died that day." Another: "I'll hear his cries and screams for the rest of my life".

  Judge Philip St John-Stevens said during sentencing: "When [PC Quinn] left for work that morning, he thankfully had no idea what was to happen that day." Ch Supt Neil Loudon said the injuries inflicted upon PC Quinn were among the worst he had ever seen. Jenner will serve at least 20 years before he can apply for parole and will then spend five years on licence.
