title: Man seen 'slashing' inflatable Santa on CCTV in Lowestoft garden - BBC News
date: '2024-12-24'
section: General
url: http://www.bbc.co.uk/news/videos/cm2l0q5e4r9o
content: |-
  CCTV shows the decoration deflating after the incident, which the owner described as "disheartening".

  CCTV footage captured the moment someone appeared to puncture an inflatable Santa Claus in a front garden.

  The footage showed a man wearing a camouflage jacket and green hat outside Michael Cook's home in Lowestoft, Suffolk at about 14:20 GMT on Sunday.

  After fiddling with his jacket and bag, he approaches the large decoration before walking off, leaving it to deflate.

  Mr Cook said: "My neighbour called me and said he saw the man slashing it but he did not want to approach him as he did not want to get into a conflict with him.

  "It can be repaired but it is disheartening in today's world anything valuable seems at risk of theft or destruction."

  He said he had not reported the incident to police.
