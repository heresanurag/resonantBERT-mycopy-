title: Seven people charged following Palestine Action protest - BBC News
date: '2025-06-25'
section: Middle East
url: http://www.bbc.co.uk/news/articles/cj0m2g0ylrmo
content: |-
  Police made 13 arrests for offences, including assaulting an emergency worker, at the London protest on Monday.

  Seven people have been charged following a Palestine Action protest in central London on Monday where 13 were arrested. The charges include a racially aggravated public order offence, assaulting an emergency worker and breaching the Public Order Act, the Metropolitan Police said. A 31-year-old woman has also been cautioned for assaulting an emergency worker. Hundreds of people gathered for the protest in Trafalgar Square, where the force said there were a "number of clashes between officers and people in the crowd".

  It comes a day after the home secretary announced Palestine Action will be banned under anti-terror law. If Parliament approves the move, it will effectively designate the group as a terrorist organisation, making membership and support of the group illegal.

  Organisers chose the central London venue last-minute, after the police imposed restrictions blocking them from the original location in Parliament Square. Supporters gathered in a crowd, carrying signs and Palestinian flags, with some chanting: "We will not be silenced." There was a heavy police presence throughout the day until the dispersal at 15:00 BST. On Friday, members of the group broke into the RAF Brize Norton base in Oxfordshire and spray-painted two military planes in red. Home Secretary Yvette Cooper called the incident "disgraceful" when announcing her decision to proscribe the group. Cooper said Palestine Action had a "long history" of criminal damage, and since 2024 "its activity has increased in frequency and severity". Palestine Action said the move from the government was "unhinged", and has instructed its lawyers to pursue a legal challenge. Following the protest, 25-year-old Liam Mizrahi, of no fixed address, was charged with a racially aggravated public order offence and held on remand to appear in court on Tuesday. Lavina Richards, 37, of Elsdale Street, Hackney, was also held in custody. She is charged with two counts of assaulting an emergency worker, and will appear in court on Wednesday. Bipasha Tahsin, 21, of Pinchin Street, Tower Hamlets, and Eleanor Simmonds, 31, of no fixed address, were both charged with assaulting an emergency worker. They were bailed, and will appear in court on 8 July and 25 July respectively. Matthew Holbrook, 59, of Somerhill Road, Hove, Tom Jubert, 40, of Chippendale Street, Hackney, and Hafeza Choudhury, 28, of Berkeley Path, Luton, were charged with breaching conditions imposed under the Public Order Act and were bailed with a court date set for 21 July. All defendants will appear at Westminster Magistrates' Court, except from Simmonds who will appear at Croydon Magistrates' Court.
