content: |-
  They are flown to Alder Hey Children's Hospital and a third person is taken to hospital in Bangor.

  The air ambulance landed in a field next to the overturned car

  Two children have been flown by air ambulance to hospital after a car overturned in a crash in north Wales.

  The passengers were taken to Alder Hey Children's Hospital in Liverpool and a third person was transferred to Ysbyty Gwynedd Hospital in Bangor.

  Emergency services were called to the single-vehicle crash on the A55 between Abergwyngregyn and Tal y Bont, in Gwynedd, at 08:30 BST.

  The westbound carriageway was closed for 90 minutes but has since reopened.

  Traffic was diverted with congestion at one point stretching back to junction 15 at Llanfairfechan.

