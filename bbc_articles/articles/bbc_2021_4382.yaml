content: |-
  The PM was quizzed by Labour leader Sir Keir Starmer over accusations of "Tory sleaze".

  What more is Labour calling for?

  Labour leader Sir Keir Starmer has called for a wider inquiry into lobbying and the contact between the government and former prime minister David Cameron about the finance firm Greensill Capital. Boris Johnson has asked Nigel Boardman, a government lawyer, to conduct a review by the end of June, looking into the development and use of so-called supply chain finance schemes (the things Greensill was involved with) in government, and especially the role of Greensill Capital and its founder. The government says that Mr Boardman will have access to all the information he needs. But the investigation has no power of sanction and no legal force. Labour is calling instead for a committee of government and opposition MPs to be set up, which will take a broader look at the lobbying of ministers and will have the power to summon and question witnesses in public. You can read more about the affair here.
