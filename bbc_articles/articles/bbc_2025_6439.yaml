title: Man who died in Worksop house explosion named - BBC News
date: '2025-04-15'
section: Nottinghamshire
url: http://www.bbc.co.uk/news/articles/c86jgdd2q06o
content: |-
  Officers recovered 53-year-old David Howard's body from under debris following the blast.

  David Howard died at the scene, police said

  A man who died in a house explosion that saw dozens of people evacuated from their homes has been named as David Howard. Emergency services were called to John Street, Worksop, Nottinghamshire, shortly after 20:00 BST on Saturday. Nottinghamshire Police said officers recovered the 53-year-old's body from under debris following the blast. His daughters have been informed and are being supported by specially trained officers, the force added.

  Neighbouring properties were also severely damaged by the blast

  A major incident was declared by emergency services following the explosion on Saturday evening. One terraced house was destroyed and two more partially collapsed. Eight further properties and 20 cars were damaged by debris, police said, with one other person treated for minor injuries. An investigation to determine the cause is continuing. Det Ch Insp Ruby Burrow, from Nottinghamshire Police, said: "Our thoughts are very much with David's loved ones at this devastating time. "He has lost his life in truly tragic circumstances, and we would ask everyone to respect his daughters' privacy. "Our investigation to establish exactly what happened is ongoing and we are working hard to find the answers his family needs. "We would ask that while the investigation is being carried out that people avoid speculation both online and in the community."

  The clear-up operation was continuing on Monday morning

  A spokesperson for Bassetlaw District Council said about 50 people from 35 properties were evacuated on the night but residents had since been able to return to all but 16. Temporary accommodation is being provided to those still unable to return. The council said a number of families would not be allowed back for a "considerable period of time". On Monday, a BBC reporter at the scene said the road outside the affected houses had been cleared. Vehicles from a demolition company and the council housing repair were at the blast site. Police said the two houses either side of the affected property would most likely have to be demolished.

  The blast was declared a major incident by the emergency services

  Debbie Adams, who lives just a few houses away, said the explosion shook her house and filled her dining room with dust. She was told to leave by the emergency services and said she did not know when she might get back in. Piotr Peruki, whose house backs on to the scene, was offered a place in the community centre but spent Saturday night in his car. His 14-year-old son, who went to stay with friends in Sheffield, is still affected by the shock. "For him it was a very bad experience, he is scared," he added. Purvi Srikenthen, who runs a local shop, said: "We heard there were lots of families affected and children affected. "So we have tried to give them what they need, especially with food."

