title: Galashiels man, 84, in court charged with murdering wife in home - BBC News
date: '2024-12-10'
section: South Scotland
url: http://www.bbc.co.uk/news/articles/c627z8j4vw6o
content: |-
  Retired nurse John Hanson was arrested following the death of his wife Margaret at their home in Galashiels.

  Margaret Hanson was found dead at her home on Monday

  An 84-year-old man has appeared in court charged with the murder of his wife in their Galashiels home. Margaret Hanson, also aged 84, was found dead at the house in Wood Street after police were called at about 03:00 on Monday. Her husband John Hanson, a retired nurse, appeared in private at Selkirk Sheriff Court charged with her murder. He made no plea and the case was continued for further examination.

  He was remanded in custody and is due to appear in court again within eight days. In a statement, released through Police Scotland, Mrs Hanson's family said: "We are devastated at the loss of our mum and gran. "Margaret will be sorely missed by all who knew and loved her. "We would ask that our privacy is respected at this very difficult time." Det Insp Debbie Duncan said: "Our thoughts remain with the family and friends of Margaret who are being supported by specialist officers."
