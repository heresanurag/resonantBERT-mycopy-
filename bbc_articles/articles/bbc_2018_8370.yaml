title: 'Thailand cave: Flooded farmers support rescue effort - BBC News'
date: '2018-07-08'
section: General
url: http://www.bbc.co.uk/news/world-asia-44729887
content: |-
  Efforts to free the boys trapped in a Thai cave have seen nearby farms saturated with water.

  Efforts to free the boys trapped in a Thai cave have seen nearby farms saturated with water, but many of those affected say they will do all they can to help the rescue mission.
