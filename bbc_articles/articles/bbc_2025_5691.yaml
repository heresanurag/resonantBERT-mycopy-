content: |-
  Scotland are maybe not the roaring certainties that the odds-layers tell you they are, but they'll be fine. Or else the night sky might fall, writes Tom English.

  'Why Wales game is must-win for Scotland coach Townsend'

  Coverage: Watch on BBC One, listen on BBC Radio 5 Live, BBC Radio Scotland and BBC Sounds; text commentary and highlights on the BBC Sport website and app

  It will all change on Saturday when the pipes skirl and the passion rises and the Scotland team bus pulls into view, but this has been the lowest of low-key build-ups to a Six Nations game at Murrayfield for quite some time. There's a twisted logic around the visiting fans, their team bottom of the table and winless in 15, feeling better about themselves than the hosts, but there you have it - the Six Nations in all its complex glory. Wales, without a victory since Tom Jones was in short pants, are coming to Edinburgh with a pulse after a fine performance against Ireland. Matt Sherratt, the interim head coach, has applied the defibrillator and the patient is now showing signs of life. They're coming to a rugby country that has had the energy sucked out of it with that late loss in Twickenham, which followed on from the spirit-sapping defeat by Ireland at Murrayfield, which obliterated their Six Nations hopes. Hello darkness my old friend would be a more fitting preamble than Flower of Scotland. The sound of silence has been deafening in Scottish rugby circles for much of the past fortnight.

  Maybe that's why Finn Russell, as opposed to Scotland's other co-captain Rory Darge, did media on Friday. Maybe Scottish Rugby felt they needed some stardust, a galvanising presence to fire up the fans and convince them that, yes, the championship bid is over, but yes again, there is something big to play for here. The 'something big' is back-foot stuff, though. They're playing to avoid a nightmare rather than to keep a dream alive. Their motivation is to avert the horror show of one win from four with a trip to Paris to come and the grand inquisition of the coaches that would come with it. Scottish heads are done in. Scotland are ranked number one in the tournament for fewest tries conceded, fewest tackles missed and most ball carries, number two for metres gained, line breaks, breakdown steals and tries scored. And yet they sit fourth in the table and are already out of contention for the big prize. Still we hear the mumbo-jumbo from former players in other places about Scotland supposedly talking themselves up. During the week, the great Welsh and Lions scrum-half Mike Phillips joined the list of people who don't understand Scottish rugby and the fatalism that has run through it for close to a quarter of a century. Phillips said the Scots have been predicting Six Nations glory for 20 years, a comment so remarkable that people here will remember it in the way they remember where they were when they heard Elvis had died. (Younger readers: swap Taylor Swift for Elvis and replace 'died' with 'releasing a new album' or some such revelation). Predictions of greatness? Many Scottish rugby fans look 20 years older than they actually are because of all the angst they've gone through. Phillips has been living in an alternate reality this whole time.

