  None of this phony war stuff in the media is going to permeate Scotland's bubble in any meaningful way. They know what's at stake here - not a championship tilt, but credibility and, possibly, the future of Gregor Townsend. Scottish Rugby is under relatively new management and there will be a deep reluctance to change the international coaching ticket even if the Wales game goes wrong, but defeat would bring howls of protest from fans. Scotland have won 18 out of 38 in the Six Nations on Townsend's watch. They've lost two games by a single point - one game by two points, one by three and two by four. Ten Six Nations matches have been lost by seven points or fewer - including two in 2020 and 2021 (they won the other three) and three in 2024 (they won the other two). What-might-have-beens are writ large over his regime. Refereeing decisions have been unkind at crucial moments, but in eight attempts Scotland have not gone into the final weekend with a realistic shot at the title. They have advanced under Townsend's coaching, though. Anybody saying otherwise is allowing their disappointment to overtake their perspective. Scotland in full flow are a thrillfest, just not a consistent one. There's a reason why Scotland have not contended. The talk of their golden generation is about as misplaced as the chat about them bigging themselves up. For sure, this is probably the most talented backline Scotland has ever produced, but in no way is it among the most talented pack of forwards. It's a good pack, but it's a way off championship-winning good and a world away from Grand Slam good. You hear talk of Townsend wasting the golden generation. That's one-eyed analysis. It focuses solely on the wonders of the backline without properly assessing the forwards and their superior counterparts in Ireland and France.

