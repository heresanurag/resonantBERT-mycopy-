  But not in Wales. There is nothing superior about this Welsh team in the pack or behind the pack and that's why Townsend won't be cut any slack if Scotland don't win. No allowances will be made for the injured Sione Tuipulotu, no nuance will be applied because Scott Cummings, Max Williamson, Andy Onyeama-Christie and Josh Bayliss are unavailable. This is a should-win because Townsend's team look stronger in most positions, have won the past two against Wales and have home advantage, but it's also a must-win. Townsend can't hope to avoid heavy flak, or a serious examination of the way of things by his bosses, if his team goes from three wins in 2023 to two wins in 2024 to (possibly) one win in 2025. That would suddenly look like a dead end. By the skin of their teeth, and the width of a goalpost, the bookmakers were proven right when they made England favourites at Twickenham. They're now making Scotland overwhelming, almost unbackable, favourites on Saturday. According to the bookies, Wales don't have much of a prayer and that kind of status will suit them nicely. No-hopers? Diolch. They're not the only ones with points to prove, though. That wasteful loss to England has sickened Scotland to their core and you can imagine them nursing that frustration for a fortnight. They should be two from three. They're maybe not the roaring certainties the odds layers tell you they are, but they'll be fine up front, they could be wondrous out the back and they should have too much for Wales. Or else the night sky might fall.
