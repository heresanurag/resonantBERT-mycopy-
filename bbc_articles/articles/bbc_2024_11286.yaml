title: 'Dave Myers: Praise for 20,000 bikers who rode to Barrow - BBC News'
date: '2024-06-10'
section: Cumbria
url: http://www.bbc.co.uk/news/articles/cxee5rlen55o
content: |-
  Police say no arrests were made during a Dave Myers' tribute day attended by thousands of bikers.

  Lili Myers said her husband was a Barrovian who "put the town on the map"

  Police have praised 20,000 motorcyclists who descended on the home town of Hairy Biker Dave Myers to enjoy a "trouble-free" tribute day. The TV chef died in February at the age of 66, after he was diagnosed with cancer. Cumbria Police said no arrests were made on Saturday at the event dubbed "Dave Day". At the end of a mammoth bike ride from London, fellow Hairy Biker Si King addressed the crowds and said his friend would have been "proud".

  "We've all been in tears, not one dry eye," he added, to huge cheers.

  Myers' widow Lili said: "Dave was always a Barrovian in his heart. He loved Barrow and he wanted to put Barrow on the map. "And today, beyond his grave, he’s done it again."

  Fellow Hairy Biker Si King said the tribute would have made his friend proud

  Supt Andy Wilkinson, of Cumbria Police, said: "There was a great turnout yesterday for the motorcycle procession, both from motorcyclists making their way to Barrow and local people attending to support them. "We estimate that approximately 20,000 motorcyclists attended and I am pleased to say there were no major incidents on the road network. "A great deal of planning took place ahead of yesterday to ensure the safety of all involved. "I would like to thank everyone for their safe manner of driving and working with ourselves and our partner agencies."

  Wendy Gunning, who runs a wool shop in the town's indoor market, crocheted pies in honour of the chef to sell for charity. She said: "Dave was a customer for years and I knew his family. He always supported local businesses. "His favourite food was Green's Pies so I decided to crochet pies while my husband Stephen, a biker, joined the ride at Burton-in-Kendal." She said she had struggled to keep up with demand and sold more than 100 items, raising more than £500 for charity. "All the profit goes to his charities. He was such a nice guy and I wanted to get involved in Dave Day," Ms Gunning added. "It has been fantastic how many people have come together to commemorate Dave Myers."

  Stuart Lawson travelled from Hartlepool with his dog Jinx for the tribute day

  Cumbria Police urged motorists to drive with care on the county's busy roads as the massive convoy of bikers journeyed home.
