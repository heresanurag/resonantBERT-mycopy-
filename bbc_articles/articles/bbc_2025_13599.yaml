  Davy Russell won the seat for Labour with 8,559 votes, a majority of 602 over the second-placed SNP. Christina McKelvie, who died in March from secondary breast cancer, had held the seat since 2011. Reform UK finished third with 7,088 votes, following a campaign that attracted criticism for a controversial advert that claimed Sarwar would prioritise people from Asian backgrounds. The party's deputy leader Richard Tice said the result was a "massive boost" going into the May 2026 vote. Meanwhile, Sarwar urged Sir Keir Starmer's government to move faster with delivering change that would put extra money in people's pockets. He also attacked media pundits for being "obsessed with a Labour government" in Westminster.

  The first minister said the SNP was still recovering from a difficult 2024

  Swinney later denied his "two horse race" comment was an attempt to eat into Labour's vote by spotlighting Reform. The first minister told the programme he had been "standing up to Farage for months" and this had been crystallised during the by-election campaign. Swinney also told the programme he believed Reform voters were motivated by anger at the cost of living. When asked about the possibility of a cabinet reshuffle, the first minister replied: "I've got a cabinet minister coming back from maternity leave in Mairi McAllan, so I have to look at the team. I'll be doing that in due course." He added that his party were still in "the process of recovery" after he was sworn in as first minister last May with the SNP facing "significant difficulties" at the time. Swinney also said he would focus on improving public services - such as cutting waiting times for GPs - and mitigating the cost of living crisis before the 2026 Holyrood election.
