title: Sarwar accuses Swinney of 'dishonest' by-election campaign - BBC News
date: '2025-06-08'
section: Scotland Politics
url: http://www.bbc.co.uk/news/articles/cdr5vgn5zk4o
content: |-
  The Scottish Labour leader told BBC Scotland's Sunday Show that SNP tactics pushed voters to Reform UK.

  Anas Sarwar said the SNP campaign was an attempt to push voters to Reform UK

  Scottish Labour leader Anas Sarwar has accused John Swinney of running a "dishonest and disgraceful" campaign ahead of last week's Holyrood by-election. Sarwar claimed the SNP were pushing voters to Reform UK through their tactics, which he described as "shameful" on BBC Scotland's Sunday Show programme. But Swinney justified his "two-horse race" remark by saying Labour's vote share had "collapsed" in the by-election and that his party's own data showed a surge for Reform. Scottish Labour won an unexpected victory in Thursday's by-election as Davy Russell took the Hamilton, Larkhall and Stonehouse seat.

  The first minister also told the programme he would consider a reshuffle of his cabinet "in due course" following the defeat, which saw the SNP lose a seat previously held by the late Christina McKelvie.

  In the run-up to the contest Swinney declared it a "two-horse race" between his party and Nigel Farage's Reform UK. In a combative interview with presenter Martin Geissler, Sarwar said: "The people of Hamilton, Larkhall and Stonehouse sent a message to John Swinney that he ran a dishonest and disgraceful campaign that attempted to push people into the arms of Reform, rather than confront the issues that he has caused in communities across Scotland." Sarwar also said the SNP campaign, in support of candidate Katy Loudon, showed a lack of ambition and was "running down the clock" on its time in government rather than offering policies that would benefit people. He added the first minister had "no idea about what's affecting the day to day lives of people in Scotland, which is a disgrace."

