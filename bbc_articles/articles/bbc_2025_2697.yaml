content: |-
  Harvey Willgoose died after being stabbed at a school in Sheffield on Monday.

  This video can not be played To play this video you need to enable JavaScript in your browser. Harvey Willgoose's parents pay tribute to their son after fatal stabbing

  The mother of a 15-year-old boy who was stabbed to death at a school in Sheffield has urged anyone carrying knives to "imagine the devastation" they can cause. Harvey Willgoose died after being stabbed twice in the chest with a knife at All Saints Catholic High School on Monday afternoon. A 15-year-old boy, who cannot be named because of his age, appeared in court on Wednesday morning charged with murder, possession of a bladed article and affray. Speaking on Wednesday afternoon, Harvey's mum Caroline said: "I don't want anybody to go through what we are going through."

  She added: "Just think if it was your brother, sister, dad, mum. Can you imagine the devastation if you lost somebody through that?" Mrs Willgoose described her son as "the life and soul of the party" and "a joy to be around". "He loved football, football was his life. He was going to be an actor at one point, I think he would have been good at it." She said Harvey's final words to her before he left the family home to go to school on Monday were "I love you". "I have got his grubby t-shirt on so I can smell him," she added. "I don't want to go to sleep because I don't want to wake up and have to relive it all and remember it."

  Harvey's family described him as a "best friend to all"

  Harvey's father, Mark, said his son was his "best pal" and described him as a "loveable rogue". "We need to learn from this so no-one goes through what we have as a family," he said. Mrs Willgoose thanked Harvey's friends and family for their "amazing" support, adding: "That's what's keeping us going". "It's just unbelievable what people are doing." Tributes to Sheffield United fan Harvey have been left outside Bramall Lane stadium and at his school, in Granville Road. A Mass will also take place for him at St Joseph's Catholic Church in Handsworth on Saturday.

  Tributes have been left for Sheffield United fan Harvey at Bramall Lane

  After the 15-year-old suspect was charged, Chris Hartley from the Crown Prosecution Service, said it was "extremely important" there should be no reporting, commentary or sharing of information online which could in any way prejudice proceedings. "The Crown Prosecution Service reminds all concerned that criminal proceedings against this defendant are active and that the youth has a right to a fair trial." Mrs Willgoose said: "We want justice for Harvey, we want to do it right. We don't want any obstacles, we want to get the best outcome for Harvey." The 15-year-old, who has been remanded into youth detention, is due to appear at Sheffield Crown Court on Thursday. Listen to highlights from South Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
