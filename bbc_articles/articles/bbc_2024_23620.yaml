title: 'Bhim Kohli death: Children held over Franklin Park attack - BBC News'
date: '2024-09-03'
section: Leicester
url: http://www.bbc.co.uk/news/articles/c1l5y5nge31o
content: |-
  Five children are arrested on suspicion of murder after the 80-year-old man died in hospital.

  Bhim Kohli died in hospital after being assaulted while walking his dog in Franklin Park

  Five children have been arrested on suspicion of murder following the death of an 80-year-old man who was attacked in a park. Bhim Kohli died in hospital after being assaulted while walking his dog at Franklin Park, in Braunstone Town, Leicestershire, on Sunday evening. Leicestershire Police said a boy and a girl, both aged 14, and another boy and two girls aged 12, were in custody. Officers have appealed for witnesses to come forward.

  Police say Mr Kohli was attacked on Sunday evening

  People in the area have spoken of their disbelief and sadness about what happened in the park, which is next to a primary school. On Tuesday it was busy with police vehicles, camera crews and reporters. Later, some people arrived carrying flowers to leave as a tribute to Mr Kohli. A neighbour of the victim, Deep Singh Kaila, 70, described the incident as "shocking". He added: "He was a very nice guy. He was always there, working in the allotment. Everyone knows him." Nick Brown, leader of Braunstone Town Council, said: "Everyone's shocked by these events. It's stunned the community. "We're trying to pull together to listen to what people have got to say and support the family and friends.

  A murder investigation was started after the man died on Monday night

  Police said the victim had been near the park's Bramble Way entrance at about 18:30 BST when he was seriously assaulted by a group of young people who left the scene before emergency services arrived. Five children were detained following inquiries, the force said. Due to prior police contact with the victim, the force will be making a voluntary referral to the Independent Office of Police Conduct (IOPC), it added. Detectives have been speaking to residents in the area and have appealed for anyone who was in the park on Sunday evening to come forward.

  Nearby residents expressed their shock at hearing the news. Julie March, 38, said: "It's tragic; we can't even comprehend how it happened. "And it's just on our doorstep." Emma Ghent, 34, said: "From what we have heard, he lives so close to us, so it is literally on our doorstep. "He walks his dog every day in the park, and we have a dog; my husband walks the dog in the park. "It could have been him; he could have been there at the same time.

  Det Insp Emma Matts said officers were trying to establish the details of the attack. "A scene preservation will remain in place at the park while our investigation progresses," she said. "Local officers are also in the area carrying out reassurance patrols and can speak to anyone in the local community who has concerns." Officers have said they are particularly keen to speak to anyone who saw the victim before the assault or a group of young people leaving the area. Follow BBC Leicester on Facebook, external, on X, external, or on Instagram, external. Send your story ideas to eastmidsnews@bbc.co.uk, external or via WhatsApp, external on 0808 100 2210.
