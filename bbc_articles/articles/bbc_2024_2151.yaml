title: 'Bristol stabbings: Boy, 14, charged with murder of Mason Rist and Max Dixon
  - BBC News'
date: '2024-02-06'
section: Bristol
url: http://www.bbc.co.uk/news/uk-england-bristol-68209536
content: |-
  The 14-year-old is the fifth person charged with the murders of Mason Rist and Max Dixon.

  Mason, left, and Max, right, were fatally stabbed

  A fifth person has been charged with the murders of two boys in Bristol.

  A 14-year-old boy was charged with the murders of Mason Rist,15, and Max Dixon, 16, on Monday afternoon and remanded into custody.

  The teenagers died after being attacked in Knowle West on the night of 27 January.

  A police inquiry has seen five people charged with murder, including a 17-year-old boy over the weekend.

  Two other people were charged with two counts of assisting an offender last week and they both were remanded too.

  Meanwhile, officers arrested a 46-year-old man on suspicion of assisting an offender on Monday and he is still being questioned..

  He is the 13th person to be arrested as part of the investigation.

  A 49-year-old woman and a 14-year-old girl who were arrested Sunday morning on suspicion of assisting an offender have both been released on conditional bail.

  The boys' families have been updated and are being supported by specially trained officers.

