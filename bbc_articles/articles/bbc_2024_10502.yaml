title: 'Rishi Sunak: ''Unequivocal apology'' for victims of infected blood scandal
  - BBC News'
date: '2024-05-21'
section: General
url: http://www.bbc.co.uk/news/uk-69040119
content: |-
  Rishi Sunak apologises for the infection of around 30,000 people with contaminated blood products, and the failure to address the problem.

  Prime Minister Rishi Sunak has apologised for the infection of around 30,000 people with contaminated blood products, and the failure to address the problem.

  Mr Sunak accepted the findings of Sir Brian Langstaff's inquiry report: "Was there a cover-up? Let me directly quote him - there has been".
