content: |-
  Ex-Paralympic champion Stephen Bate is forced to withdraw from the men's B cycling road race as his pilot Chris Latham falls ill.

  GB's Bate out of road race because of pilot illness

  Stephen Bate (right) and Chris Latham formed a partnership following the delayed 2020 Paralympics in Tokyo

  Former Paralympic champion Stephen Bate has been forced to withdraw from the men's B cycling road race after his pilot Chris Latham fell ill. Bate, 47, races in the category for visually impaired riders. All competitors ride on tandem bikes with a sighted pilot. Bate and Latham have formed a team throughout the Paris 2024 Paralympics, winning silver in the individual pursuit earlier in the Games. But Latham's illness means Bate is unable to participate and he was forced to withdraw on Friday morning, hours before the race. "Unfortunately over the last 24 hours Chris Latham has developed signs and symptoms of illness and has therefore been withdrawn from the road race on medical grounds," a statement from British Cycling read. "This means he and tandem partner Steve Bate will no longer be competing in the men’s B road race this afternoon. We wish Chris a speedy recovery and look forward to seeing him back on his bike soon."

  Riders and pilots in the B category are a team, meaning a replacement pilot cannot be sourced for Bate. After winning silver on the opening day of the Games in the velodrome, Bate and Latham competed in the men's B road time trial on Wednesday. They finished fifth in what may prove to be Bate's final Paralympic Games race. Bate is one of the most experienced members of the ParalympicGB squad, and won two gold medals at the 2016 Games in Rio de Janeiro.
