title: Two murder arrests after man stabbed in Deptford - BBC News
date: '2024-06-07'
section: London
url: http://www.bbc.co.uk/news/articles/cjjj9ynyw46o
content: |-
  A man in his 20s dies after being found injured in a street in Deptford on Thursday night.

  Two men have been arrested after a man was stabbed to death in south-east London.

  The victim, a man in his 20s, was found in Carteret Way, Deptford at about 22:35 BST on Thursday.

  The Met said its officers and the London Ambulance Service treated the man but he died at the scene.

  The two men were arrested on suspicion of murder and remain in custody, the force added.
