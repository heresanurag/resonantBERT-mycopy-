  Meanwhile, Mr Rowlands also said Conservative general election candidate Craig Williams betting on the date of the next general election had been a "huge error of judgement on his part". "The issues around Craig have been raised on the door," said Mr Rowlands. "But more people are interested in the record of government here in Wales." Mr Williams was an aide to the prime minister in the last Parliament.
