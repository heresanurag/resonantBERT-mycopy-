title: 'Six Nations 2025: Wales include Taulupe Faletau and Eddie James to face Italy
  - BBC Sport'
date: '2025-02-06'
section: Wales
url: http://www.bbc.co.uk/sport/rugby-union/articles/cx2qe28249po
content: |-
  Number eight Taulupe Faletau is fit and centre Eddie James will make his first Wales Test start in the Six Nations trip to face Italy on Saturday.

  Fit Faletau and James Wales' two changes for Italy

  Taulupe Faletau has 104 Wales caps while Eddie James has three

  Coverage: Listen live on BBC Radio 5 Live, BBC Radio Wales & BBC Radio Cymru; text commentary and highlights on BBC Sport website and app; watch on ITV1 and S4C.

  Number eight Taulupe Faletau has been passed fit and centre Eddie James will make his first Wales international start in the Six Nations trip to Italy on Saturday. Head coach Warren Gatland has made two changes from the 43-0 drubbing by France in Paris with Faletau coming in for Aaron Wainwright and James replacing the injured Owen Watkin. Wainwright is named as a replacement after recovering from a facial injury suffered at the Stade de France, with Leicester flanker Tommy Reffell dropping out of the 23-man squad. Scarlets centre James, who has made three previous Wales replacement Test appearances, partners Nick Tompkins in another new centre combination with Ben Thomas staying at fly-half. The midfield trio all regularly play at inside centre for their professional sides. Wales will fly from their Nice training base to Rome on Thursday as they bid to avoid a 14th consecutive international defeat.

  Cardiff number eight Faletau was unavailable to face France because of a knee issue. The 34-year-old has not played an international since the World Cup pool victory against Georgia in October 2023 because of a series of injuries. That was the last time Wales won a Test match with Gatland's side having since suffered 13 successive international defeats. "He brings experience and a little bit of X-factor," said Gatland. "We know what an outstanding player he's been in the past for Wales. He hasn't had a lot of games in the last few years. "Just having him back gives everyone a bit of confidence. In terms of the way he's trained he's looked good. "He wasn't quite right last week with his knee, so it has been tough on him with the injuries he's had over the last couple of years. "Hopefully with him we are looking for some of those special traits he has to get us on the front foot and hopefully inspire the players around him." Wainwright, 27, left the field in the fourth minute in Paris after taking a blow to his head but suffered no facial fracture or concussion. "With the cut on his face, I spoke to him early in the week and he said he was 100% keen to be available," said Gatland. "He wasn't looking at any opportunity to not put himself in contention to be selected. "He didn't get much time last week so it's good to see him back and hopefully having an impact off the bench."

  James, 22, comes in for Watkin who is ruled out of the rest of the tournament because he requires surgery for the serious knee injury suffered in Paris. "With Eddie, it's about giving him that opportunity and confidence. I've been impressed," said Gatland. "He's not just a big guy in terms of being able to carry the ball forward but he's got some lovely skills and hands. "We've been encouraging him to do that with some of his passing and offloading game. "He gives us an opportunity to get over the gain line with his size." His partnership with Tompkins is Wales' 24th different starting duo in 60 internationals since the start of 2020. "What you're trying to do is have combinations that are settled and build experience and partnerships over a period," said Gatland. "Unfortunately, with Owen being injured, it has been a forced change on us. "For a number of years now, there's been lots of different combinations. It's trying to settle on a midfield. "It's important for the team going forward, with the nine and 10 inside and the back-three as well, having that solidity in midfield." Gatland outlined why he had made only a couple of changes. "When you're looking at picking a squad, if you make three or four changes, do those players feel like they've been made the scapegoat?" said Gatland. "There's a couple of forced changes, but there's an opportunity for those guys to go out and do what we did well last week. "Also an opportunity to fix some things to change the performance."

  Gatland's side face an Italian outfit that were beaten 31-19 by Scotland in Edinburgh in the opening round of matches. Wales have not been beaten in Rome since 2007 and their last Six Nations victory was the away trip to Italy two years ago. This has been followed by seven consecutive defeats in the tournament and defeat this weekend will leave Gatland's squad contemplating consecutive Wooden Spoons with home matches against Ireland and England and a trip to Scotland to come. Another loss will also probably see Wales drop to a lowest position of 12th in the world rankings.

