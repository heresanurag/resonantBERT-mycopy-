title: Father and daughter who died in Ingoldmells caravan fire named - BBC News
date: '2025-04-08'
section: Lincolnshire
url: http://www.bbc.co.uk/news/articles/cqx4932x9vwo
content: |-
  Lee Baker, 48, and his 10-year-old daughter Esme Baker died following the fire in Ingoldmells.

  Father and daughter who died in caravan fire named

  Esme Baker, 10, and her 48-year-old father Lee Baker are believed to have died in the fire

  Two people who died following a fire at a caravan park have been named by police. Lee Baker, 48, and his 10-year-old daughter Esme Baker, died at Golden Beach Holiday Park, in Ingoldmells, Skegness on Saturday. They were from the Nottingham area and had been "excited to be spending the first weekend of the holidays together", their family said in a tribute. "We are all utterly devastated at what's happened. This loss is incomprehensible at the moment," they added.

  Drone footage of the park showed the remains of the caravan after the fire on Saturday

  Lincolnshire Police said it was still awaiting formal identification, which could take some time. The police and fire service were called to the holiday park at about 03:50 BST on Saturday and said they were working together on the investigation to establish the cause of the blaze. Senior investigating officer Det Insp Lee Nixon said the intensity of the fire had made the investigation "incredibly challenging". "We are working hard to validate the facts available to us to be able to provide answers for the family and loved ones of those who were very tragically taken by this fire," he said. Dan Moss, area manager for prevention and protection at Lincolnshire Fire and Rescue, said: "Our thoughts and deepest condolences are with the family at this time. "Once investigations are complete, local fire crews and our community fire safety team will be on hand to talk to people in the area and address any fire safety concerns they may have, at what will be an upsetting time."

  Tributes were left at the Golden Beach Holiday Park on Sunday morning

  In a statement, the owners of the park said: "On behalf of everyone at Golden Beach Holiday Park we would like to send our deepest sympathies and condolences to the families and friends affected by [Saturday's] tragic events." They thanked emergency services for their help and support and asked for "patience and privacy" while investigations continued. People laid tributes at the park on Sunday morning. Jack Price, who works as a bingo caller at the Sandancer pub in Ingoldmells, said he knew Mr Baker and Esme well. "It's like they were family members, they weren't just customers to us. Everyone behind the bar knew them. It's just unbelievable," he said. An online fundraiser set up by the pub for the victims' family described them as "two peas in a pod" who were "both happy-go-lucky people who loved life". Ruth Dorrin, who donated to the appeal, said: "It's just so sad and when you've got little ones, it's just heartbreaking. "You're meant to come on holiday to enjoy yourself, aren't you? It's just... you can't put into words." Another fundraising page set up to support the family said: "Lee was a hard working plasterer who loved his football and adored his darling daughter. "Esme was the brightest, funniest, most intelligent, happy little girl who loved to read, colour, dance her little heart out." Listen to highlights from Lincolnshire on BBC Sounds, watch the latest episode of Look North or tell us about a story you think we should be covering here, external.
