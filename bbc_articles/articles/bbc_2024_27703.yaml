  James is also looking forward to working under Bellamy as the former Wales captain is a player he admired when he first dreamed of playing for his country. “He was a player I aspired to be when I was younger because of his work ethic. He had an aura on the pitch – give him the ball and he will go and get you a goal or an assist,” the ex-Swansea City and Manchester United man added. “But he was also so important off the ball with his work rate. A lot of his principles – the way he wants to get on the ball, creates one-v-ones and get in behind, while off the ball it is all about how quickly you can win it back - I’ve grown up with at Swansea and with other teams I played with. “Having missed the first two camps it’s been all about learning what’s required. I felt like I was missing out and that’s why it’s great to be back.”

