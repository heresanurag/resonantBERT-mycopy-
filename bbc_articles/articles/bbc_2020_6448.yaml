  Bringing you the latest news from across England about the coronavirus pandemic.

  A giant teddy bear has been cheering up people up on a Cornish street for 50 days of lockdown.

  Each day 'Paws' was given a different theme and accompanied by a motivational message written on his whiteboard on Paul's Row in Truro.

  The family behind the idea say they decided to put him outside at the start of lockdown to make people smile on their daily walk and soon realised people wanted to see more of him.

  He even has his own Facebook page .

  Quote Message: "We just put the bear out one morning and had loads of people say they loved it so we did it again and then 50 days later here we are. We have had lots of letters and cards to say how grateful people are and people changed their walk routes to visit Paws daily." from Lauren Turner "We just put the bear out one morning and had loads of people say they loved it so we did it again and then 50 days later here we are. We have had lots of letters and cards to say how grateful people are and people changed their walk routes to visit Paws daily."
