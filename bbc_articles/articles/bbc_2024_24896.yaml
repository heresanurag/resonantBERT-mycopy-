title: 'NFL London: Caleb Williams stars as Chicago Bears beat Jacksonville Jaguars
  35-16 - BBC Sport'
date: '2024-10-13'
section: American Football
url: http://www.bbc.co.uk/sport/american-football/articles/c1m9y3359kjo
content: |-
  Chicago’s rookie quarterback Caleb Williams puts on a show in London as he leads the Bears to a 35-16 win over the Jacksonville Jaguars.

  The Chicago Bears celebrated their third straight win at Tottenham

  Chicago's rookie quarterback Caleb Williams put on a show in London as he led the Bears to a 35-16 win over the Jacksonville Jaguars on Sunday. Williams was the number one pick in this year's draft and crossed the Atlantic for the second of the season's London games - and just the sixth appearance of what promises to be a glittering NFL career. A crowd of 61,182 flocked to Tottenham Hotspur Stadium to see Williams go head-to-head with Jaguars quarterback Trevor Lawrence, the number one pick of the 2021 draft. And it was the 22-year-old Williams who came out on top, throwing four touchdown passes as the Bears tore to a third straight win, improving their overall record to 4-2. After throwing five touchdown passes across his first five games, Williams threw two to tight end Cole Kmet to give the Bears a 14-3 lead at half-time. Then he threw two more on Chicago's first two possessions of the second half - both to Keenan Allen. Lawrence, 25, replied by making two touchdown passes to Gabe Davis but the Jaguars never looked like mounting a fightback as they slipped to 1-5 for the season. Williams, though, ended the day with some impressive figures. He made 23 of his 29 passes for a completion rate of 79.3% and 226 passing yards, plus added 56 rushing yards off just four carries.

  Williams was the 2022 winner of the Heisman Trophy for best college player

  You could say that Sunday's game was a microcosm of Williams' rookie season. He made a slow start to his NFL career, but is growing in confidence with each passing week. The Jags made it difficult early on at Tottenham, forcing the Bears to go three-and-out on their first two possessions. But on their next, Kmet was left wide open down the middle and Williams found him for a 31-yard touchdown. DJ Moore was then in space down the left as Williams launched a deep ball from halfway but it lacked zip and was picked off by Jaguars safety Andre Cisco for an interception. Williams still looked a little hesitant on Chicago's next drive, but gradually got into his groove to keep the drive going. He made some key completions and scrambled for a couple of first downs before capping the drive with a two-yard touchdown pass to Kmet right before half-time. Chicago recovered a Jacksonville fumble on the first play of the second half, giving Williams the opportunity to fizz a nine-yard touchdown pass down the middle to Allen. Despite being sacked three times on Chicago's next possession, Williams kept his cool to get into position to loft a fade pass to Allen at the back of the end zone. A Lawrence interception then gifted the Bears the chance to seal victory and D'Andre Swift punched the ball in from a yard, right after Moore fell inches short of giving Williams what would have been his fifth touchdown pass. Asked what sets Williams apart from other rookie quarterbacks, Bears coach Matt Eberflus said: "His ability to learn and grow, and want to get better. This year's a big year for him. "He's always been good enough, but he's learning the game, our offence and their skillsets, so that we can really expand our offence during the course of the season. "After six games, I think we're in a good spot."

  London had previously proved a happy hunting ground for Lawrence. He claimed his first NFL win at Tottenham in 2021 and the Jags won both games in London last year, when they became the first NFL team to play two games outside the US in the same season. That sparked a five-game winning streak but the Jags ultimately missed out on last season's play-offs, losing five of their last six games, and that malaise has continued into the new season. Even after Sunday's game, Lawrence has fractionally more passing yards than Williams and a slightly better touchdown-to-interception ratio, so he may be frustrated at his receivers. Davis failed to hold onto Lawrence's pass into the end zone on Jacksonville's opening drive, which meant they had to settle for a field goal. Tight end Evan Engram then fumbled after catching a Lawrence pass at the start of the second half and even when Davis claimed his second touchdown late on, the Jags dropped three passes into the end zone earlier in that drive. But Lawrence only has himself to blame for the wayward pass that was intercepted by Bears cornerback Josh Blackwell and, after their field goal, the Jags only earned one more first down during the rest of the first half. Having handed Lawrence a new five-year contract in June worth $275m (£216m), Jags fans will hope he can help the team get back to winning ways as they cross town to face the New England Patriots at Wembley on Sunday, 20 October. Listen to live commentary as the Detroit Lions visit the Dallas Cowboys on BBC Radio 5 Sports Extra and the BBC Sport website (from 21:00 BST).
