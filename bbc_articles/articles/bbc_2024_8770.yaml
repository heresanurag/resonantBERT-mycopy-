title: Cash machine ripped from Sawbridgeworth building society - BBC News
date: '2024-04-24'
section: General
url: http://www.bbc.co.uk/news/uk-england-beds-bucks-herts-68883799
content: |-
  Video shows the machine being removed from a wall and lifted on to a getaway pick-up truck.

  The moment a cash machine was ripped from a building society then driven away has been captured on video.

  Hertfordshire Police said a stolen telehandler vehicle was used to remove the unit from the Nationwide Building Society in Knight Street, Sawbridgeworth, at about 05:30 BST.

  In footage filmed from a nearby window, the cash machine was then seen being lowered on to a white pick-up truck.

  Three males fled the scene, leaving the telehandler behind, police said.

