id: bbc_2024_10209
title: Slovak PM shot in apparent assassination attempt - BBC News
date: '2024-05-15'
section: General
url: http://www.bbc.co.uk/news/world-europe-69017531
content: |-
  Slovak Prime Minister Robert Fico has been shot, in what officials are calling an assassination attempt.

  Mr Fico was said to have sustained five gunshot wounds.

  Police arrested a suspect at the scene in Handlova, where Mr Fico had been attending a meeting.
