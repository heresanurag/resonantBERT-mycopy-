  A further 77 UK coronavirus deaths are reported in the UK - the lowest daily total since 23 March.

  Will there be a post-Covid baby boom?

  With people stuck at home with not much to do under lockdown, it was predicted that scores of new babies could make their appearance in a few months' time. This was based on previous baby booms after, for example, World War Two. Not so says French newspaper Le Parisien, which has been speaking to couples about their baby plans . Generally speaking, people like to feel secure before embarking on the biggest adventure of their lives, it says. But with mounting job uncertainty and financial insecurity, this is looking less likely for many. “During the 2007-2008 financial crisis, fertility declined in most European countries,” says Gilles Pison, a demographer. “When we look at past crises, we see above all a postponement of birth plans, but not an abandonment. These births generally recover once the crisis has passed. So I don't expect a baby boom in the short term." People may not be intentionally having more babies. However, there were warnings early on in the crisis that lockdowns would restrict women’s access to contraception and family planning services, which could lead to millions of unplanned pregnancies.
