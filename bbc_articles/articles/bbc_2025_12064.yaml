content: |-
  Stormchasers captured footage of the major twister swirling near Dickens, Nebraska.

  An enormous tornado touched down near Dickens, Nebraska on 16 June.

  Stormchasers captured dramatic footage of the twister from close range, along with the moment it intersected with a rainbow.

  The Lincoln County Sheriff reported there were no injuries caused by the twister.
