content: |-
  Lock Will Rowlands says players have to accept responsibility for the "brutal situation" Wales are in as they prepare to face South Africa.

  Will Rowlands has played 35 internationals for Wales

  Coverage: Live on S4C, BBC Radio Wales, Radio Cymru, live text and commentary on the BBC Sport website and app

  Lock Will Rowlands says players have to accept responsibility for the "brutal situation" Wales are in as they prepare to face world champions South Africa on Saturday. Wales have lost a record 11 consecutive internationals which has resulted in the position of head coach Warren Gatland coming under scrutiny. Gatland's side have not claimed a Test match victory since the 2023 World Cup and face losing every match in the 2024 calendar year. "We are all very aware we are the players, ultimately, we are the people who are playing the game and who control whether we win or lose," said Rowlands. "You need good coaching input, support staff, you need everything else around it, but ultimately, the buck falls with us. "We are the ones responsible. Everyone is aware of that. We are the ones who have let ourselves down, probably, so far. "Gats [Warren Gatland] is a very good man and he has done a great job for Wales. It is a brutal situation for everyone to be in."

