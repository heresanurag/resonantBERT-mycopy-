title: Residents prepare as outer bands of Hurricane Milton hit Florida - BBC News
date: '2024-10-10'
section: General
url: http://www.bbc.co.uk/news/videos/cdx9ke9zky3o
content: |-
  A tornado has touched down in southern Florida as the state prepares for the "deadly and catastrophic" storm.

  The outer bands of Hurricane Milton have moved over Florida, as officials warn the storm would be "deadly and catastrophic".

  Tornadoes have been sighted in southern Florida ahead of the arrival of the storm, expected to make landfall at category three strength at midnight local time.

  Many residents are heeding US President Joe Biden's warning to leave, after he said it was a matter "of life and death".

  The US Army is also on the ground setting up flood reinforcements.
