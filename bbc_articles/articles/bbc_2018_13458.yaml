title: 'Brexit TV debate: Theresa May challenged to invite all parties - BBC News'
date: '2018-11-26'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-46349627
content: |-
  Jeremy Corbyn would "relish" a head-to-head with Theresa May, while other parties want involvement.

  Theresa May was criticised for missing a TV debate ahead of the 2017 general election

  Theresa May faces calls from several parties to be included if she decides to hold a TV debate on her Brexit deal.

  Labour said Jeremy Corbyn would "relish" going head-to-head with the PM, in response to reports she wanted to challenge him to a TV showdown.

  The SNP, Lib Dems, Plaid Cymru and Greens have demanded to be involved to ensure a range of views is reflected.

  Meanwhile, Conservative MP Bernard Jenkin said a Brexiteer must be on the panel. No 10 has declined to comment.

  A spokesman told reporters the prime minister "debates the leaders of the opposition parties regularly on Brexit" and was doing so again in the House of Commons on Monday afternoon.

  However, he did not deny the option was being considered.

  A Labour Party spokesman responded to the report in Monday's Daily Telegraph by saying: "Jeremy would relish a head-to-head debate with Theresa May about her botched Brexit deal and the future of the country."

  Scottish National Party leader Nicola Sturgeon had been quick to respond to suggestions Mrs May was considering challenging Mr Corbyn to a debate ahead of the Commons vote on the deal, asking "how about it?"

