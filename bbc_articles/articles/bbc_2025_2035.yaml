  Homes were evacuated when the van parked in a driveway exploded in the middle of the night in Clydebank.

  This video can not be played To play this video you need to enable JavaScript in your browser. Van loaded with fireworks set on fire near Glasgow

  Families in Clydebank faced "sheer terror" when a van containing fireworks was deliberately set alight in the middle of the night. Homes were evacuated and roads closed when the vehicle, which was parked on a driveway, exploded with a shower of fireworks on Braes Avenue at about 01:00 on Sunday. There were no reported injuries. Police have appealed for information about a man seen leaving the scene of the "wilful vehicle fire".

  Yvonne O'Neill, Clydebank East Community Council secretary, described it as "absolutely awful" and "disgusting behaviour". Writing on social media, she said the culprit had "absolutely no regard for the kids living in these houses." "I've never witnessed anything like it - kids screaming in sheer terror," she added.

  The community council has asked for senior officers from Police Scotland to attend its meeting on 3 March to address concerns about anti-social behaviour. Lauren Oxley, who represents Clydebank Waterfront on West Dunbartonshire Council, said she had raised concerns about the "absolutely shocking" incident. "I've written to the council and police for some further information and to ask what action is being taken because clearly, the current patrols aren't enough," she said. West Dunbartonshire Council's housing department said they understood the van containing the fireworks belonged to the owner/occupier and they would therefore not be able to take any action as it was not local authority housing.

  Police have appealed for information about a man seen making off in the direction of the canal path

  Police said the man was described as white, in his 30s, with slim build and a shaved head and wearing a dark hooded jacket and dark bottom. He was seen making off in the direction of the Forth and Clyde Canal path, which runs behind to the street in the Whitecrook area of the town. Det Con Andrew Baldacci appealed for anyone who has information about the man, or the man himself, to come forward. "I'd also ask anyone who saw what happened or has any information about the incident, and has not already spoken to police, to contact us," he added. Police asked to see private CCTV, doorbell or dashcam footage from the area at the time.
