title: Murder accused appears in court after Derby bank stabbing - BBC News
date: '2025-05-08'
section: Derbyshire
url: http://www.bbc.co.uk/news/articles/c1egedj1wqdo
content: |-
  Gurvinder Johal died after being attacked at the branch in Derby city centre on Tuesday afternoon.

  Gurvinder Singh Johal had recently returned from a trip to India with his family

  A man has appeared in court charged with murder after a customer was stabbed at a bank in Derby city centre. Haybe Cabdiraxmaan Nur, 47, of Western Road in Derby, has been charged with the murder of Gurvinder Johal, 37, who was stabbed inside Lloyds in St Peter's Street just after 14:30 BST on Tuesday. He spoke through a Somali interpreter to confirm his name and age, and was remanded in custody to appear at Derby Crown Court on Friday.

  Flowers have been left outside Lloyds in St Peter's Street

  Samanatha Shallow, deputy chief crown prosecutor in the East Midlands, said: "Following a review of the evidence provided by Derbyshire Constabulary, we have authorised criminal charges in relation to the death of 37-year-old Gurvinder Johal." She added: "Our thoughts remain with the family of Mr Johal at this time." A second man in his 30s, who was arrested in connection with the incident, has been released without any further action. A family friend told the BBC on Wednesday that Mr Johal was "a smiler" and "a good friend". He said that Mr Johal had just returned to Derby from a family trip to India with his wife, children and extended family. Supt Rebecca Webster, from Derbyshire Police, said: "For the family of the victim, we know that life will never be the same again, and our thoughts are with them as they begin to deal with their tragic loss." The Independent Office for Police Conduct confirmed it had received a referral from the police in relation to the case, but later said: "We have now notified the force that it did not meet the threshold for a referral and was therefore not valid."

