title: 'In pictures: Stunning Sturgeon Moon lights up the skies - BBC News'
date: '2022-08-12'
section: In Pictures
url: http://www.bbc.co.uk/news/in-pictures-62518102
content: |-
  Photographers around the globe capture the final supermoon of the year.

  People around the world have been enjoying the fourth and final supermoon of 2022.

  Known as the Sturgeon Moon, it was at its closest point to Earth at 02:36 BST on Friday.

  The supermoon rises near the Shard skyscraper and St Paul's Cathedral in London

  A plane is seen with the full moon behind, also in London

  The moon glows over the Royal Liver Building in Liverpool

  The Dovercourt Lower Lighthouse in Essex with the supermoon rising behind

  People on the ferris wheel at the International Balloon Fiesta in Bristol with the moon glowing behind

  The moon rises above the statue of the Ancient Greek god Poseidon in Ancient Corinth near Athens

  The moon rises over Cape Sounio and the Temple of Poseidon, east of Athens

  Here the moon sinks behind the Hagia Sophia Mosque in Istanbul

  The moon shines behind Edinburgh Castle during the Royal Edinburgh Military Tattoo fireworks display

  The last supermoon of the year rises over Lower Manhattan, New York

  One observer captures the event near the Eiffel Tower in Paris

  The moon rises in the sky behind world's tallest building of Burj Khalifa in Dubai
