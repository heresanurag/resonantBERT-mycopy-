title: Ben Stokes trial jury shown bodycam arrest video - BBC News
date: '2018-08-09'
section: General
url: http://www.bbc.co.uk/news/uk-england-bristol-45127329
content: |-
  The cricketer is one of two men charged with affray outside a Bristol nightclub on 25 September.

  Bodycam footage showing the moment cricketer Ben Stokes was arrested has been released.

  The Durham all-rounder is on trial at Bristol Crown Court, accused of being involved in a confrontation in the city last September.

  Jurors were shown the footage on Wednesday.

  Ryan Ali, 28, has been charged with affray alongside Mr Stokes. Both deny the charges.

  The case against a third man, Ryan Hale, 27, was dropped mid-trial.
