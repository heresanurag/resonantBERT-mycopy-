  Britain's Adam Peaty continues his seven-year unbeaten streak in the 100m breaststroke by winning his qualifying heat with a time of 57.56 seconds.

  Britain's Adam Peaty continues his seven-year unbeaten streak in the 100m breaststroke by winning his qualifying heat to advance to the semi finals with a time of 57.56 seconds.

