content: |-
  The only surprise about France's historic Six Nations campaign is that they didn't win a Grand Slam, writes Tom English.

  'French rugby's Belle Epoque is only just beginning'

  This video can not be played To play this video you need to enable JavaScript in your browser. France thrash Scotland to become Six Nations champions

  Half an hour played in Paris and things are a little testy. France's discipline is rank. They've had two men in the bin. Peato Mauvaka somehow escapes a full red for a diving headbutt on Ben White. And Darcy Graham has just scored. It's 13-10 to the championship-chasers, but it's stressed. The stadium cameras pick out Antoine Dupont in the crowd and the place erupts. To these people, it's like an apparition. God is with us, so have faith. Apart from the cacophony that greeted the tries that came in a dominant second half, the roars for Dupont - in that moment of need and again later as he lifted the trophy with the stand-in captain Gregory Alldritt - were the loudest of the night. And what a night. What an era they might be entering. As the fireworks crackled, the tinsel fell and the lap of honour snaked around the vast stadium, it felt like the beginning of something.

  To say that French rugby is in rude order is putting it mildly. First, a moment of reflection. Saturday was not the time or the place to ponder what might have been for this team - not when everybody was losing their mind at the joy of it all - but the realisation will dawn at some point that this should have been a Grand Slam season for Les Bleus. That one inexplicable blip at Twickenham will confound experts for the rest of time. One of the great wings of his generation (Damian Penaud) and arguably the greatest player ever (Dupont) both fumbled glorious chances to score. It's as surreal now as it was in real time. Nearly everything else France have done this season has had world class written all over it. The 43-0 drubbing of Wales on opening night was a record home win over the visitors. It was the first time they'd 'nilled' the Welsh in the championship in more than a quarter of a century. The 73 points they put on Italy was the second highest total in a match in the history of the competition. The trip to Dublin, billed as the clash of the heavyweights, turned into a one-sided romp. With awesome power and gorgeous subtlety, France put in one of the greatest away Six Nations performances that anybody can remember. It was Ireland's biggest defeat at home in 12 years and France's total of 42 points was the most they'd scored in that fixture on Irish soil.

