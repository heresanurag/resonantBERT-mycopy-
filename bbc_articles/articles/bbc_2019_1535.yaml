content: |-
  Stars including Melissa McCarthy, Glenn Close and Spike Lee dazzled on the famous red carpet.

  Lady Gaga blew a kiss to photographers in a pose reminiscent of Marilyn Monroe, but her jewellery harked back to another screen legend of yore, Audrey Hepburn, who was the last person to wear that diamond necklace
