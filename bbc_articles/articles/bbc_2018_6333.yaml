title: Austerity and immigration rules concern UN racism official - BBC News
date: '2018-05-12'
section: UK
url: http://www.bbc.co.uk/news/uk-44089309
content: |-
  The official also says Brexit has led to a "growing acceptability of intolerance and racist speech".

