title: Mother pleads guilty to stabbing daughter to death - BBC News
date: '2024-08-30'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/c5yd496g3qno
content: |-
  Shay Kang was found with fatal injuries at a house in Rowley Regis, West Midlands in March.

  Shay Kang, aged 10, died of stab wounds to the chest in March

  A woman has pleaded guilty to stabbing her 10-year-old daughter to death. Shay Kang was found with chest wounds at a house in Robin Close in Rowley Regis, West Midlands on 4 March. Her mother Jaskirat Kaur, also known as Jasmine Kang, admitted manslaughter on the basis of diminished responsibility at Wolverhampton Crown Court on Friday. The 33-year-old denied murdering her daughter and her manslaughter plea was accepted. She will be sentenced on 25 October.

  Defence barrister Katherine Goddard KC said there was "no dispute over the facts" of the case. The defendant, wearing a grey jumper, attended the short hearing on via video-link and spoke only to confirm her name and that she could hear Judge Michael Chambers KC. In a tribute released by her school, Brickhouse Primary, after her death, Shay was described as a "bright, happy, fun-loving child who was well liked by all". Shay's body was formally released to the school's headteacher in July and her funeral, arranged by the school, will be held on Thursday 5 September. The school community raised £8,875 in a fundraiser for Shay's funeral, with any left over money going towards permanent tributes to Shay on the school's estate. It is also creating a memorial garden for the 10-year-old at the school, with landscaping work starting in August, and is funded by a memorial day the school held.

  Shay's godmother, Kayleigh Coclough, said: "She was just such a lovely child - so happy and bubbly. She was perfect."

  Previously speaking to the BBC, Shay's godmother, Kayleigh Coclough, said that she had no children of her own and so she had put all her love into Shay. "Me and my mom were at the birth. I was the one that cut her cord," she said. "She was just such a lovely child - so happy and bubbly. She was perfect. "She was my whole world. She still is."
