title: Bangladesh issues arrest warrant for British MP Tulip Siddiq - BBC News
date: '2025-04-13'
section: Politics
url: http://www.bbc.co.uk/news/articles/cp8k67028e6o
content: |-
  Lawyers acting for the ex-minister denied the charges, which they said were "politically motivated".

  Bangladeshi authorities have issued an arrest warrant for the British MP and former Labour minister Tulip Siddiq. The country's Anti-Corruption Commission (ACC) has been investigating allegations Siddiq illegally received land as part of its wider probe of the regime of her aunt, Sheikh Hasina, who was deposed as prime minister in August. The Hampstead and Highgate MP, who quit as economic secretary to the Treasury in January, was named in the arrest warrant alongside more than 50 others. Lawyers acting for Siddiq denied the charges, which they said were "politically motivated".

  The ACC had not presented any evidence or informed Siddiq about an arrest warrant, the lawyers added. The UK lists Bangladesh as a 2B extradition country - meaning clear evidence must be presented before ministers and judges make a decision.

  The ACC is examining claims Sheikh Hasina and her family embezzled up to £3.9bn from infrastructure spending in Bangladesh. The investigation is based on a series of allegations made by Bobby Hajjaj, a political opponent of Hasina. Court documents seen by the BBC show Hajjaj has accused Siddiq of helping to broker a deal with Russia in 2013 that overinflated the price of a new nuclear power plant in Bangladesh. In a statement seen by the BBC, Siddiq's lawyers Stephenson Harwood said: "The allegations are completely false and have been dealt with in writing by Siddiq's lawyers. "The ACC has not responded to Siddiq or put any allegations to her directly or through her lawyers. "Siddiq knows nothing about a hearing in Dhaka relating to her and she has no knowledge of any arrest warrant that is said to have been issued. "To be clear, there is no basis at all for any charges to be made against her, and there is absolutely no truth in any allegation that she received a plot of land in Dhaka through illegal means. "She has never had a plot of land in Bangladesh, and she has never influenced any allocation of plots of land to her family members or anyone else. "No evidence has been provided by the ACC to support this or any other allegation made against Siddiq, and it is clear to us that the charges are politically motivated."

  Before resigning, Siddiq had referred herself to the PM's ethics adviser Sir Laurie Magnus when the corruption allegations first surfaced. Sir Laurie said in his report that he had "not identified evidence of improprieties". But he added it was "regrettable" that Siddiq had not been more alert to the "potential reputational risks" of the ties to her aunt Sheikh Hasina, the deposed prime minister of Bangladesh and leader of Awami League party.

  ACC chairman Mohammad Abdul Momen has previously told the BBC the allegations "are by no means 'targeted and baseless'" and its investigation was "based on documentary evidence of corruption". "Tulip Siddiq must not shy away from the court proceedings in Bangladesh. "I would welcome Siddiq come and defend her case and with the best possible legal support accompanying her," he added. He also rejected her lawyer's claims that the ACC was interfering in UK politics, adding: "ACC briefing to the media is a regular phenomenon, it is delivered professionally and with all accuracy." A Conservative Party spokesman said: "If it is the case that Keir Starmer's choice for anti-corruption minister is the subject of an international arrest warrant for corruption, she should immediately stand down as Labour MP. "It is shocking that Keir Starmer believes 'the door remains open' for Ms Siddiq returning to a government position." The prime minister left open the possibility of Siddiq returning to government in the future in his letter accepting her resignation as a minister in January.
