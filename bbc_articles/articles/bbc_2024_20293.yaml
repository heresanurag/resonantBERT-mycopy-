  Once unsure of his place in the Bazball era, Joe Root has found his best form by playing like Joe Root, writes Stephan Shemilt

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch highlights on England v Sri Lanka on day one of second Test

  “In this job you can be a bit like Peter Pan, you never really have to grow up.” Joe Root was standing on the outfield at Old Trafford after guiding England to victory over Sri Lanka in the first Test. It’s an apt comparison. When Root joined England for his first tour in 2012, he was so young-looking that spinner Graeme Swann compared him to the team mascot. Even after more Tests as captain than any other England player, a job that can make a man twice as old and half as happy, Root remains baby faced and impish at the crease. The batter that never grew up, Test cricket his Neverland. But Bazball threatened to turn Root into a Lost Boy. Though his form remained excellent through the first phase of the Ben Stokes-Brendon McCullum era, Root himself admitted to being unsure of his role in the new world. A team man and a loyal friend to Stokes, Root would have been at pains to support the message of ultra-positivity. Root’s reverse-scoop became both a symbol of the revamped England, but a threat to the effectiveness of their greatest batter. “As a previous captain who fitted back into the set-up, you’re so aware of not stepping on toes, not saying stuff in team meetings that is different to the captain’s message,” said Cook. “I definitely disagreed with some things Joe Root did as captain, but never would have said it in a meeting, rather over a beer behind closed doors. “When Ben Stokes was saying he wanted to play in a certain way, Root would have been over-conscious to make sure he wasn’t the person that didn’t buy in.”

