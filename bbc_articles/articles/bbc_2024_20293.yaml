  By the time the latest reverse caused his downfall, Root had notched more records in what will end as the most prolific career England Test cricket, and possibly even the game as a whole, will ever see. This was his 33rd Test century, equalling Cook as England’s most hundred-hungry batter. Six Test tons at Lord’s is a joint-record and Root went past Cook for most Test runs in this country. Root needs another 198 runs to overhaul Cook’s 12,472 as the most by an England batter in Tests. He could get there before the summer is out, or in Pakistan in October at the latest. After that, it will be chipping up the list towards Sachin Tendulkar’s 15,921. Even if Root does not pass the Little Master, he will almost certainly retire with an amount no other player that follows him will match. There will remain, though, one achievement of Cook’s to emulate. Sir Chef has five hundreds in Australia, including three on the glorious Ashes-winning tour of 2010-11. Root has yet to reach three figures down under, an itch to scratch in just over a year’s time. Nearing his 34th birthday, Root is now roughly the same age as Cook when the opener ended his Test career in 2018, but in his own words, has “still quite a lot more to do”. On 145 caps, he has missed just two Tests since he made his debut and, following injuries to Stokes and Zak Crawley, is the only Bazball ever-present. To peer into his hunger for scoring Test runs, we can revisit that India tour and the aftermath of the Bumrah incident. “I’m trying to play how I think is the best way to score runs,” said Root in February. “As an experienced player, the amount of cricket I’ve played, you trust your instincts in the moment. “The reason that I’ve been able to play as many games as I have and been fortunate to play as many games as I have is because, under pressure, a lot of times I’ve managed to make those right decisions. “We’re all England fans in that dressing room, we all want the best for England cricket. We will continue to do everything we can to win as many games as we can and get the best out of each other.”

