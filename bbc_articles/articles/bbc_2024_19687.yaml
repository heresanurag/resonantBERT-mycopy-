content: |-
  Aerial footage shows lava spewing into the air in the region south of the country's capital - Reykjavik.

  Aerial footage shows red-hot lava spewing into the air in the region of Reykjanes in Iceland.

  It is the sixth time since December that a volcano has erupted in the area - south of the country's capital Reykjavik.

  The Icelandic Meteorological Office said the eruption began at 21:26 local time (22:16 BST) following a series of earthquakes.

  The nearby fishing village of Grindavik was evacuated. It is not known how many people were in the area as most of its nearly 4,000 residents left in November.
