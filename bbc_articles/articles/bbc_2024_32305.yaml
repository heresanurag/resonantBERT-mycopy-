  Since the BBC highlighted the issue to the government, Mrs Trafford’s MP, Richard Burgon, has written to the trust for more information about their investigation. The Information Commissioner's Office, the public body for data protection, said it was assessing the incident too. A Department of Health spokesperson said it was a “hugely concerning” case, and added: ”We expect NHS organisations to take allegations of staff misconduct very seriously and investigate incidents properly. “Everyone dealing with mental health issues deserves to be looked after with dignity and respect.”
