content: |-
  The popular pair's new animation is the first feature that doesn't Sallis's voice, in a story that the return of an old foe.

  Wallace & Gromit without Peter Sallis is 'emotional' says Nick Park

  If you asked TV viewers to name a favourite double act, chances are the two stars of Vengeance Most Fowl would be close to the top of the list. It's Wallace & Gromit's first major appearance in over a decade, and the first film not to feature the voice of Peter Sallis as the cheese-loving inventor.

  "It has been quite emotional [doing this production] since we lost Peter, he was such an original, unique voice," says Nick Park of Sallis, who died in 2017 at the age of 96. "So it's very hard for anyone to step into his shoes. But we have been blessed with a youngish actor whom we've known for many years who can do a fantastic Wallace impersonation. "He's stepped in very kindly, and is just great. It's hard to tell them apart."

  The original voice of Wallace, Peter Sallis with Nick Park in 2008

  Take a bow, Ben Whitehead - the 47-year-old actor and voice artist says he feels honoured to be taking on the role. But also admits to feeling a degree of pressure.

  "Because it's a very popular character. I got to work with Peter [Sallis] a couple of times for [2005's] The Curse of the Were-Rabbit film. "So yeah, there's a great deal of pressure with that. And I feel very grateful to Aardman for giving me so much time to build the character. "You kind of have to do the 'hmm' and the 'hee-hee'," he continues - demonstrating some Wallace-isms that sound indistinguishable from Peter Sallis's Yorkshire tones. "Definitely the elongation of the vowels like 'cheeeeese'!"

  Ben Whitehead says he feels "enormous pressure" taking on the role of Wallace

  Wallace and Gromit are back, and Aardman Animations have invited us to go behind the scenes to see how the latest film, Vengeance Most Fowl, was made.

  Fans have been clamouring for more from the plasticine pair for years. So why now? "Whenever we've done talks around the world, the last question is always, 'When is the next Wallace & Gromit film?', explains Park. "The last time we did that I just came home burning with this idea that's been around for years."

  The idea was - what if Wallace created a pre-programmed, voice-controlled smart Gnome. Enter Norbot, but of course regular viewers of Wallace & Gromit will be unsurprised to learn that the inventor's well-intentioned idea, as usual, ends up causing mayhem.

  In Vengeance Most Fowl Wallace & Gromit are joined by smart gnome Norbot

  This isn't the only familiar element to appear in this latest story. This new adventure also features an old villain, the criminal mastermind Feathers McGraw, a chicken-impersonating-penguin whom Wallace & Gromit - mostly Gromit - defeated in 1993's The Wrong Trousers.

  "Whenever we're out and about talking about the future of Wallace & Gromit, the single most asked question is 'when will Feathers be back?", says Merlin Crossingham, who directs Vengeance Most Fowl alongside Nick Park. "Everybody loves a villain, it's often said your film is only as good as its villain, [so it] seemed a perfect opportunity to bring Feathers back for this story."

  Directors Merlin Crossingham and Nick Park on one of the film's sets

  Wallace & Gromit were first introduced to audiences with 1989's A Grand Day Out. Since then their adventures have involved everything from malfunctioning clothing to mysterious were-rabbits.

  "I think Wallace & Gromit have so many facets to their relationship," says Crossingham. "They are best pals. They're kind of partners in crime, they're man and dog. And hopefully in the films, their stories, and their relationship everybody young and old relates to them.

  "I truly think it's that relatability, not just of their simplicity of lifestyle from which madness erupts. "But everybody somewhere in the stories connects with them on some level. "And I think that what Nick has created, right back at the beginning with A Grand Day Out, has really struck a chord with people."

  The last time a new Wallace & Gromit adventure went out on Christmas Day was in 2008 with A Matter of Loaf and Death. It was day's most-watched show, with more than 16 million viewers tuning in. It was also the most-watched show of the entire year. While it's still possible that it could repeat that feat, it's up against some extremely tough competition.

  "Bring it on, Gavin & Stacey!" jokes Crossingham, acknowledging the huge popularity of the Essex and Barry-based comedy, whose finale also goes out on Christmas Day.

  However while Gavin & Stacey might be reaching its conclusion, this definitely isn't a finale for Wallace & Gromit. "[It's] certainly not the end," says Nick Park. "I think there's plenty of bounce still in their bungee. "We'll carry on. There's always ideas worth kicking about." "Give us a minute though," Interjects Merlin. "They take a while to make!"

  Wallace & Gromit: Vengeance Most Fowl is on BBC One at 18.10 on Christmas Day.
