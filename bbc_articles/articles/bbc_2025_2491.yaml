id: bbc_2025_2491
title: AI-generated child sex abuse images targeted with new laws - BBC News
date: '2025-02-03'
section: UK
url: http://www.bbc.co.uk/news/articles/c8d90qe4nylo
content: |-
  Yvette Cooper says the UK will make it illegal to own AI tools to make images of child sexual abuse.

  Those who have been found to own AI "paedophile manuals" could be jailed for up to three years

  Four new laws will tackle the threat of child sexual abuse images generated by artificial intelligence (AI), the government has announced. The Home Office says the UK will be the first country in the world to make it illegal to possess, create or distribute AI tools designed to create child sexual abuse material (CSAM), with a punishment of up to five years in prison. Possessing AI paedophile manuals - which teach people how to use AI for sexual abuse - will also be made illegal, and offenders will get up to three years in prison. "What we're seeing is that AI is now putting the online child abuse on steroids," Home Secretary Yvette Cooper told the BBC's Sunday with Laura Kuenssberg.

  Cooper said AI was "industrialising the scale" of sexual abuse against children and said government measures "may have to go further." Other laws set to be introduced include making it an offence to run websites where paedophiles can share child sexual abuse content or provide advice on how to groom children. That would be punishable by up to 10 years in prison. And the Border Force will be given powers to instruct individuals who they suspect of posing a sexual risk to children to unlock their digital devices for inspection when they attempt to enter the UK, as CSAM is often filmed abroad. Depending on the severity of the images, this will be punishable by up to three years in prison. Artificially generated CSAM involves images that are either partly or completely computer generated. Software can "nudify" real images and replace the face of one child with another, creating a realistic image. In some cases, the real-life voices of children are also used, meaning innocent survivors of abuse are being re-victimised. Fake images are also being used to blackmail children and force victims into further abuse. The National Crime Agency (NCA) said that there are 800 arrests each month relating to threats posed to children online. It said 840,000 adults are a threat to children nationwide - both online and offline - which makes up 1.6% of the adult population. Cooper said: "You have perpetrators who are using AI to help them better groom or blackmail teenagers and children, distorting images and using those to draw young people into further abuse, just the most horrific things taking place and also becoming more sadistic." She continued: "This is an area where the technology doesn't stand still and our response cannot stand still to keep children safe." Some experts, however, believe the government could have gone further. Prof Clare McGlynn, an expert in the legal regulation of pornography, sexual violence and online abuse, said the changes were "welcome" but that there were "significant gaps". The government should ban "nudify" apps and tackle the "normalisation of sexual activity with young-looking girls on the mainstream porn sites", she said, describing these videos as "simulated child sexual abuse videos". These videos "involve adult actors but they look very young and are shown in children's bedrooms, with toys, pigtails, braces and other markers of childhood," she said. "This material can be found with the most obvious search terms and legitimises and normalises child sexual abuse. Unlike in many other countries, this material remains lawful in the UK."

  Home Secretary Yvette Cooper said the UK will be the first country in the world to make it illegal to possess, create or distribute AI tools designed to generate CSAM

  The Internet Watch Foundation (IWF) warns that more sexual abuse AI images of children are being produced, with them becoming more prevalent on the open web. The charity's latest data shows reports of AI-generated CSAM have risen 380% with 245 confirmed reports in 2024 compared with 51 in 2023. Each report can contain thousands of images. In research last year it found that over a one-month period, 3,512 AI child sexual abuse and exploitation images were discovered on one dark website. Compared with a month in the previous year, the number of the most severe category images (Category A) had risen by 10%. Experts say AI CSAM can often look incredibly realistic, making it difficult to tell the real from the fake. The interim chief executive of the IWF,, external Derek Ray-Hill, said: "The availability of this AI content further fuels sexual violence against children. "It emboldens and encourages abusers, and it makes real children less safe. There is certainly more to be done to prevent AI technology from being exploited, but we welcome [the] announcement, and believe these measures are a vital starting point." Lynn Perry, chief executive of children's charity Barnardo's, welcomed government action to tackle AI-produced CSAM "which normalises the abuse of children, putting more of them at risk, both on and offline". "It is vital that legislation keeps up with technological advances to prevent these horrific crimes," she added. "Tech companies must make sure their platforms are safe for children. They need to take action to introduce stronger safeguards, and Ofcom must ensure that the Online Safety Act is implemented effectively and robustly." The new measures announced will be introduced as part of the Crime and Policing Bill when it comes to parliament in the next few weeks.
