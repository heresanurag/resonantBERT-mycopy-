title: 'Ukraine war: Russian strikes on Odesa damage Orthodox cathedral - BBC News'
date: '2023-07-23'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-66281027
content: |-
  At least one person was killed and 19 injured in the blasts, including four children.

