title: Jacob Rees-Mogg quotes Chitty Chitty Bang Bang in speech - BBC News
date: '2024-07-07'
section: General
url: http://www.bbc.co.uk/news/videos/ckmgrvj50x7o
content: |-
  Jacob Rees-Mogg ended his speech with a quote from the fictional character Caractacus Potts.

  Former MP Sir Jacob Rees-Mogg ended his thank-you speech with a rather unusual quote: "From the ashes of disaster grow the roses of success."

  That quote came from Caractacus Potts, one of the characters from the film Chitty Chitty Bang Bang.

  Mr Rees-Mogg lost his seat in the old North East Somerset constituency, which became North East Somerset and Hanham. That area's new MP is now Dan Norris.

  As he left the stage, he shook hands with the Monster Raving Loony Party candidate, Barmy Brunch, who was wearing a balaclava decorated with baked beans.

