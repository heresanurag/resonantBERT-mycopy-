title: Samantha Fox abused police after being removed from BA plane - BBC News
date: '2024-09-03'
section: London
url: http://www.bbc.co.uk/news/articles/cgq2pez5dyyo
content: |-
  The former Page 3 model and pop star pleads guilty to being drunk and disorderly at Heathrow airport

  Samantha Fox was suffering from "severe anxiety" at the time, a court heard

  Former model and singer Samantha Fox threatened to knock out a police officer's teeth after being removed from a British Airways plane, a court has heard. Fox has pleaded guilty to being drunk and disorderly during the incident, which stopped the London Heathrow to Hamburg flight from taking off on 3 December. Julianna Belinfante, prosecuting, told Uxbridge Magistrates' Court that flight staff had been made aware that Fox was seen "walking and behaving strangely and was slurring her words, and staff could smell alcohol on her". The 58-year-old was fined £1,000 and given a 12-month community order, including up to 25 rehabilitation activity requirement days.

  Fox, who also admitted using threatening behaviour, causing harassment, alarm or distress to a police constable, began "behaving in a confrontational manner" towards her wife, Linda Olsen, while on the plane. After the former model began "rocking back and forth in her chair, headbutting the seat in front of her" the decision was made to return to the gate, the court heard. Police were then called to remove her from the plane. Ms Belinfante said she was described by officers as "rude and argumentative" and was "verbally abusive" towards them as she was escorted from the airport.

  Alastair Smith, who represented Fox, said his client had bought two drinks at the airport to "calm her nerves" as she was "suffering from severe anxiety". A charge of assaulting her wife on the flight was dropped by prosecutors. Mr Smith said: "She shouldn't have taken any flights as she was not in a fit state to do so. She should have cancelled her commitments, but it is not in her character to do so." The flight, which was carrying 162 adults and four children, was delayed by 12 hours until 07:30 the next day, with 42 passengers claiming compensation, the court heard. Fox was also ordered to pay £1,718 to British Airways, the sum the airline said it had lost as a result of the incident.
