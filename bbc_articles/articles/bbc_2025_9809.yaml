title: Cat caught smuggling drugs into Costa Rica prison - BBC News
date: '2025-05-21'
section: General
url: http://www.bbc.co.uk/news/videos/c0j7zexwpl9o
content: |-
  The feline was found carrying 235.65g of marijuana and 67.76g of heroin, authorities say.

  Officers at Pococi Penitentiary in Costa Rica have caught a cat carrying two packages of drugs attached to its body.

  According to a statement on Facebook from the country's Ministry of Justice, guards spotted the animal in a green area of the prison on 6 May, before capturing it.

  The cat was carrying packages containing 235.65g of marijuana and 67.76g of heroin, authorities said, adding that the drugs have been confiscated and the animal handed over to the National Animal Health Service for health evaluation.
