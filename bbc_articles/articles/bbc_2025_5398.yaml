  Earlier on Tuesday, Zelensky described the White House showdown with Trump as "regrettable" in the wake of the US announcing a pause in military aid to Kyiv. Zelensky said "it was time to make things right", after Trump had accused him of not being ready to come to the negotiating table. The Ukrainian leader also outlined the first stages of how the war could be ended. The Oval Office meeting between Zelensky and US officials last week was due to conclude with the two parties signing a deal that would grant the US access to rare earth minerals in Ukraine. After the clash, which saw Trump accuse Zelensky of "gambling with World War Three", the Ukrainian delegation left without signing the deal. Trump told Zelensky: "Come back when you're ready for peace."
