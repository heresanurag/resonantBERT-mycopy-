content: |-
  James May says he won't team up with Jeremy Clarkson and Richard Hammond when the Amazon series ends.

  New show from The Grand Tour trio 'unlikely'

  James May said it was remarkable how long the show has lasted

  James May has told the BBC that another motoring series with Jeremy Clarkson and Richard Hammond is unlikely to happen. The trio had huge success on the Top Gear then The Grand Tour, with the final episode of the Amazon show set to arrive in September. Asked by Amol Rajan for the Today Podcast whether he had any plans for another series or episode, May said: "We're not going to make another series together about cars." He added that "you should never say" never - but that it was "pretty unlikely". Reflecting on his legacy, May said the trio had been working together for "longer than we thought". "We have to accept we've done it for nearly 22 years. When I started doing it in 2003, I thought this was a bit of a laugh and maybe it would last a few years."

  May, Clarkson and Hammond started presenting BBC's Top Gear in 2003 and in 2015 launched The Grand Tour on Amazon. "I recorded today the last piece of voiceover ever for The Grand Tour," May told the podcast audience at the BBC Radio Theatre. He added that it was "remarkable" it lasted so long, and he was "grateful and thankful that it happened". "I don't want to be the person in the pub who used to be on the telly," he joked. He told the audience his greatest ambition now was "to get to the end of my life without running over anybody". "I've managed it so far and it would be deeply ironic and unpopular if it happened now."
