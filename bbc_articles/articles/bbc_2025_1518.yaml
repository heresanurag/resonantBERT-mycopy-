  Meet the bagpiper helping to show that the bagpipes are more than "just a traditional instrument".

  A music student at the Royal Conservatoire of Scotland in Glasgow is helping to show that the bagpipes are more than "just a traditional instrument".

  Anna Smart, 24, who is originally from Fife, started playing the bagpipes when she was only six years old.

  Now, she is part of a bagpipe pop group called the Rollin' Drones and has played at gigs across the world, helped to break down gender stereotypes in the industry and gained popularity on TikTok for her Scottish twists on modern pop songs.

  "It's my little fun fact, people don't expect that I would play the bagpipes, but I love it," Anna said.

  And she has big ambitions for the future – including a dream to perform at the 14,300 capacity OVO Hydro in Glasgow and to work with a major music artist.
