  England lock Nick Isiekwe says he is in peak condition after recovering from a serious heart condition which could have ended his career.

  From heart op to England return - how Isiekwe fought back

  Nick Isiekwe made his England debut as a teenager in 2017, when coach Eddie Jones used the summer tour to Argentina to bring through a host of youngsters

  Saracens and England lock Nick Isiekwe says he is now in peak condition after recovering from a serious heart condition which could have ended his career. Isiekwe, who had surgery for a dilated aorta at the end of 2022, was named in Steve Borthwick’s 36-man squad this week for the autumn internationals. The 26-year-old says he now feels "a sense of pride" he has been able to overcome such a debilitating setback and return to his physical best. "It was a massive thing to go through," he told BBC Radio 5 Live. "But I think what it has done for me is give me that sense of a resilience. "The pain, and what comes afterwards, I wouldn't wish on anybody. "I probably feel in the best shape I’ve felt in a very, very long time." Isiekwe has won 11 England caps, having made his debut as a 19-year-old in 2017, but faced the prospect of early retirement two years ago after an MRI scan showed his aorta had swollen dangerously.

  Saracens have started the season strongly with three wins from four games

  But a groundbreaking operation, which required his breastbone to be split open, saved his career and enabled him to represent England again and win the Premiership with Saracens in 2023. However, despite his remarkably quick return, he says it took time psychologically to recover from the procedure. "[At the time] you just treat it as if it is an injury and you don't realise how big it is," Isiekwe said. "It was kind of like [starting again]. I didn't expect to have to start again but I have had to roll with it and I feel like I've got to the point now I wanted to get to. "It was difficult but I think there is something beautiful in the struggle. "I had it in the back of my mind for quite a long time. But now I feel completely normal – and I don't have any reservations." Isiekwe was a late call-up to the England squad for the summer tour of New Zealand following Charlie Ewels' suspension, although he did not make an appearance - with George Martin and Maro Itoje starting the two Tests against the All Blacks. "In the summer I had a few things I needed to work on, from a physical point of view," he added. "But I used the summer to really get right and really push it. I feel great."
