title: Andrew Tate allegations detailed in UK civil claim documents - BBC News
date: '2025-04-10'
section: Europe
url: http://www.bbc.co.uk/news/articles/cz955kjw17no
content: |-
  Details of the case against Tate brought by four UK women are seen for the first time by BBC News.

  Andrew Tate speaking to reporters in Bucharest after returning from a trip to the US last month

  Andrew Tate pointed a gun in a woman's face and said "you're going to do as I say or there'll be hell to pay", according to one of four UK women suing the influencer and self-proclaimed misogynist. The allegation is described in court documents, seen by the BBC, which also contain detailed accounts of rape, assault and coercive control. One woman claims Tate threatened to kill her, another says he made clear he would kill anyone who spoke to her, and a third claims Tate convinced her he had killed other people. Tate has denied the claims in a written defence submitted to the High Court, calling them a "pack of lies" and "gross fabrications".

  Separately, Tate continues to face serious legal challenges in three countries - a mixture of civil and criminal claims in the UK, US and Romania. This civil case concerns incidents the four women allege took place in Luton and Hitchin between 2013 and 2015. Two of the women worked for Tate's webcam business in 2015, while the other two were in relationships with him in 2013 and 2014. The BBC has previously spoken to two of the claimants about their alleged experiences with Tate as part of a Panorama documentary broadcast in September 2024. However, this is the first time the full extent of the women's allegations has been revealed.

  Warning: This article contains strong language and distressing details of alleged violence and sexual assault

  Some of the allegations in the documents seen by the BBC include that Tate:
  • None Raped and strangled a woman who was working for his webcam business in 2015
  • None Assaulted another woman who was also working for his webcam business at the same time
  • None Strangled both of the above women so often that they developed red petechiae - spots from burst capillaries - in their eyes, a common side effect of asphyxia
  • None Told a third claimant "I'm just debating whether to rape you or not" before raping and strangling her
  • None Strangled a fourth claimant, whom we are calling Sienna, during sex until she lost consciousness, and then continued to have sex with her Three of the women previously reported Tate to the police but in 2019, the Crown Prosecution Service (CPS) decided not to bring criminal charges. They are now seeking damages "arising from the assaults, batteries, and infliction of intentional harm", their civil claim states. Tate denies all the allegations, and argues that the women cannot now take legal action against him because too much time has passed, and emails, texts, and other potential evidence would have been lost. A preliminary hearing for the case is due to take place on 15 April. "Sienna", the fourth woman involved in the civil case, was not part of the group that reported Tate to the police. She told the BBC that when she slept with Tate, the sex was initially consensual. "But then, during sex, he started to strangle me. I passed out, and he carried on having sex with me," she said. Tate denies strangling Sienna, and that she lost consciousness due to strangulation, adding that he "may have put a hand on her neck but there was no restriction of her breathing".

