  In her claim submitted to the court, Sienna also describes an alleged incident at Tate's flat in late 2014, where she saw a gun on his sofa. She says she "did not know if it was real or a replica". In his written defence, Tate says "there may have been a toy gun in the flat but the 4th Claimant [Sienna] never said anything about it". "I didn't really mention it to him or anything," Sienna told the BBC. "But I distinctly remember it being there and kind of being a bit freaked out by it, because it's not really something you see in the UK." She added that she thought it would be "a bit strange for a fully grown man to have a toy gun".

  In the court documents another claimant, referred to as AA, alleges Tate threatened her with a gun in her face while swearing, calling himself "a boss" and a "G" and adding: "You're going to do as I say or there'll be hell to pay." Tate denies this happened, writing in his defence that he only started calling himself "Top G" in recent years. AA says Tate "threatened [her] daily" while she was working for him in 2015, and describes two alleged incidents in which he "grabbed her by her throat and pinned her up against the wall, so she was unable to move". Tate also denies AA's claims that he threatened her and grabbed her by the neck. Another claimant, BB, alleges Tate "made it very clear that she was 'his', and if anyone else spoke to her, he would kill them". BB's written claim describes her being "forced to barricade herself inside the bathroom while the Defendant [Tate] threatened to 'beat the shit out of' her". Tate denies this allegation, and describes his relationship with BB as "loving and affectionate until shortly before she ceased to work for the business". In a statement, his solicitor Andrew Ford said the women's allegations, including the claims of Tate having a gun, "are vehemently denied and will be fully contested in court". "No firearm was recovered during police searches," Mr Ford said. "When the matter was referred to the Crown Prosecution Service, they concluded there was insufficient prospect of conviction and chose not to charge Mr Tate with any offence."

  Details of help and support with sexual abuse and violence are available in the UK at BBC Action Line

  All four women say they have developed long-term mental health problems as a result of their alleged experiences with Tate. Lawyer Matt Jury of McCue Jury & Partners, who is representing the women, told the BBC his clients had "been denied justice by the police and CPS, while watching Andrew Tate's influence grow". "They have been left with no other choice but to bring their case in the High Court to finally bring Tate to account," he said. The women's claim against Tate is one of several serious legal challenges around the world that he is fighting, including some where he is co-accused with his brother Tristan Tate. They are currently facing a mix of criminal and civil legal action in three countries - the UK, the US and Romania. In Romania, they are facing allegations including human trafficking, trafficking of minors and money laundering. Andrew Tate also faces allegations of rape. They are also under criminal investigation in the US state of Florida. Andrew Tate has said that US authorities are "trying to find crimes on an innocent man". Andrew Tate's ex-girlfriend Brianna Stern also filed a lawsuit in Los Angeles last month, accusing him of sexual assault, battery and gender violence. Last year, the brothers were detained in Bucharest after Bedfordshire Police in the UK said it had obtained an arrest warrant in relation to allegations of rape and trafficking dating back to between 2012 and 2015. The pair deny all accusations against them. A travel ban imposed on the brothers in Romania was recently lifted, and they have since travelled to the US and Dubai - something Sienna said was "horrible to see". "Maybe men will look at him and think, 'oh well if he can get away with that, then so can I' - and it kind of makes it normalised," she told the BBC. Sienna added that she thought the UK should be "pushing a lot harder" for the extradition of the Tate brothers. Neither of the brothers have been convicted of any crimes.
