content: |-
  BBC Weather explains what the different alerts mean after the Met Office issued a red warning in Scotland.

  BBC Weather's Nick Miller explains what the different warnings mean after the Met Office issued a red warning for extreme weather in Scotland.

  The alert covers its central belt, from Edinburgh to Glasgow, and means the risk to life is likely.
