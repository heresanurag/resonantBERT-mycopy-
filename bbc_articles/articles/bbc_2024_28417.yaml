  Kate, who lives on an old farm near Mold, Flintshire, said her children had been out enjoying the snow since early this morning. Her twin daughters Evie and Esme, five, had been busy making snow angels, having also checked on the family's sheep. "They've been out and made snow angels and thrown snow balls, they're inside now warming up," she said. The deputy head teacher, who has three children, said all the hills were covered in snow and it was "so peaceful". Staff at a hospice in Wrexham were thanked for braving the weather to reach work.

  Staff at a hospice in Wrexham showed their "dedication" by making it work despite the snow

  "Our wonderful staff made it in this morning in this snow and we are so grateful for their dedication," said Laura Hughes, ward manager at Nightingale House Hospice. "They all work so hard to never let our patients down." The disruption came as the Met Office issued a new yellow warning for snow and ice across parts of Wales from midnight until 10:00 GMT on Wednesday. "Snow and ice may lead to difficult travelling conditions on Tuesday night and Wednesday morning," the forecaster said, with up to 5cm (2in) expected on hills. The yellow weather warning covers all counties in Wales except Anglesey and Pembrokeshire.

  The Met Office issued six yellow warnings for snow and ice across the UK on Wednesday

  BBC Wales Weather presenter Sue Charles said about 2-5cm (1-2 inches) of snow had fallen across parts of north, east and mid Wales overnight with up to 10-15cm (4-6in) on the hills. She added: "Snow is becoming less of a risk later with a band of rain, sleet and snow moving south-eastwards - but it's a weakening feature - with snow becoming more confined to higher ground and the hills."
