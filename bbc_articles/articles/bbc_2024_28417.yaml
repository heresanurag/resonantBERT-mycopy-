  The Met Office has issued further weather warnings after more than 140 schools had to shut and several roads were closed when snow fell across parts of the country. There are six yellow warnings, external in place for snow and ice across the UK, including Wales, and all last until Wednesday morning. Snow left one road impassable and there were collisions on two others roads, with schools across mid, north-east and south-east Wales shut on Tuesday. Snow started falling across parts of the UK on Monday night in what the Met Office called the country's "first taste of winter".

  Schools closed for the day in Wrexham, external, Powys, external, Denbighshire, external, Flintshire, external, Torfaen, external and Blaenau Gwent, external. On the roads, the A44 in Powys was impassable and was shut in both directions from the A470 at Llangurig to the B4343 at Dyffryn Castell. Traffic Wales also reported crashes on snowy roads causing a closure on the A55 eastbound at Caerwys in Flintshire. The A483 southbound between Rossett and Gresford in Wrexham county was also shut after a collision. Transport for Wales said 13% of its services have been disrupted due to severe weather. The UK Health Security Agency also issued the first amber cold weather health alert of the season, warning conditions could be dangerous for vulnerable people, including the elderly.

