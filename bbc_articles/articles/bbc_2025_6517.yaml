  Authorities believe Ms Hackman died around 12 February and her husband on 18 February, with their bodies discovered on 26 February. Medical investigators believe Ms Arakawa contracted hantavirus pulmonary syndrome (HPS), a life-threatening lung condition with symptoms including fatigue, fever, muscle aches, dizziness and abdominal issues, which led to a sudden death. Hantavirus refers to a strain of viruses carried by rodents, primarily transmitted to humans through inhalation of airborne particles from dried rodent droppings. Infections typically occur when the virus becomes airborne from a rodent's urine, droppings, or saliva, according to the Centers for Disease Control and Prevention (CDC), external. If respiratory symptoms develop during HPS, the mortality rate is approximately 38%, according to the CDC. The agency reported 864 cases of hantavirus in the US between 1993 and 2022, mostly in rural western states. Mr Hackman's cause of death was severe heart disease, with advanced Alzheimer's disease listed as a contributing factor. Experts told the BBC his Alzheimer's may have prevented him from realising his wife of more than 30 years was dead in the home where he was living.
