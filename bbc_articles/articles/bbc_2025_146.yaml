  It is a brand new year and if you are a stargazer there are some wonderful celestial events for you to get excited about - weather permitting.

  Eye-catching celestial events to look out for in 2025

  It is a brand new year and if you are a stargazer there are some wonderful celestial events for you to get excited about. Coming up astronomers expect there to be more sightings of aurora borealis to light up the night sky as the Sun's activity continues to peak, as well as a partial solar eclipse, a total lunar eclipse and two consecutive supermoons.

  We kick started 2025 with the annual Quadrantid meteor shower. It's likely to have been one of the strongest meteor showers of the year and reached it's peak 3 and 4 January in the UK. Meteors or shooting stars are pieces of debris that enter the Earth's atmosphere at speeds of up to 70km (43 miles) per second, vaporising and causing streaks of light. The Quadrantids are known for their active peak which can reach a rate of up to 120 per hour for a short period. The Quadrantids get their name from their apparent point of origin in the sky, the former constellation Quadrans Muralis, and will have a blue or yellow-white tinge with fine trails. Remember, the best way to observe any meteor is to move away from light pollution, wrap up warm and let your eyes adjust to the night sky for at least 15 minutes. No equipment is needed though a clear sky and a lot of patience are prerequisites.
