content: |-
  The family of Claire Knights, who went missing from Upstreet, has been informed, police say.

  The family of Claire Knights, missing from Upstreet, have been told about the discovery

  Police searching for a missing woman have found a body near a Kent beach.

  Formal identification is yet to take place but the family of 54-year-old Claire Knights, who was missing from Upstreet, has been informed.

  The discovery was made by a member of the public near Minnis Bay, just after 19:00 BST on Friday, Kent Police said.

  Detectives are treating the death as suspicious and a man in his 20s from Margate was arrested on Thursday on suspicion of murder.

  The body was found in an area popular with dog walkers near Minnis Bay

  There will be an increased police presence in the area while investigations take place, the force added.

  Ms Knights' spaniel, called Zebulon, was found on Minnis Bay on Wednesday - the day she was last seen.

  Police found Ms Knights' spaniel Zebulon on Minnis Bay on the day she was last seen

