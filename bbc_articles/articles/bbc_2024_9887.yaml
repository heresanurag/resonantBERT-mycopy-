content: |-
  Manahel al-Otaibi was convicted of "terrorism charges" reportedly related to her social media posts.

  Manahel al-Otaibi said in 2019 she felt free to wear what she liked because of the Saudi crown prince's declarations

  Two human rights groups have condemned an 11-year prison sentence handed to a Saudi fitness instructor and women's rights activist by a terrorism court. Manahel al-Otaibi, 29, was convicted of charges related to her clothing choices and expression of her views online, Amnesty International and ALQST said, external. These included calls for an end to the guardianship system and videos of her shopping without an abaya, they added. Saudi diplomats told the UN she was found guilty of "terrorism offences". A letter from the Sunni Muslim-ruled Gulf kingdom's mission in Geneva, external confirmed that Manahel al-Otaibi's trial had concluded with her conviction in January, but it provided no further details about the case. Dozens of people, many of them women, have been have been imprisoned in Saudi Arabia in the past two years in connection with social media posts.

  Amnesty International and ALQST, a London-based Saudi rights organisation, said Manahel al-Otaibi was an early supporter of the social and economic reforms enacted by Crown Prince Mohammed bin Salman after he was named heir to the throne in 2017 by his father King Salman. Two years later, she told German broadcaster Deutsche Welle that she felt free to wear what she liked and express her views, external. She also explained that her behaviour was "based on what the crown prince has said... that I have the right to choose what I want to wear, as long as it is respectable".

