  Laura Kuenssberg speaks to Prime Minister Liz Truss.

  From the Conservative party conference in Birmingham Laura Kuenssberg’s guests are Prime Minister Liz Truss, Shadow Chancellor Rachel Reeves and Star Wars actor Mark Hamill. On the panel is former cabinet minister Michael Gove, Guardian political editor Pippa Crerar and John Lewis chair Sharon White.
