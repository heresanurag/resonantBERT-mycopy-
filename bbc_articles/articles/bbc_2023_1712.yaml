  Chase Doak filmed the suspected Chinese surveillance balloon from his driveway in Billings, Montana

  The US is tracking a suspected Chinese surveillance balloon that has been spotted flying over sensitive sites in recent days.

  Chase Doak filmed the balloon from his driveway in Billings, Montana.
