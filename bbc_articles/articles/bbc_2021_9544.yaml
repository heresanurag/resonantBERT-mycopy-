title: 'Tokyo Olympics: Karsten Warholm sets stunning 400m hurdles world record -
  BBC Sport'
date: '2021-08-03'
section: Olympics
url: http://www.bbc.co.uk/sport/olympics/58067231
content: |-
  Norwegian Karsten Warholm runs a stunning men's 400m hurdles race to obliterate his previous world record and take gold at Tokyo 2020.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Norway's Karsten Warholm ran a stunning men's 400m hurdles race to obliterate his previous world record and take gold at Tokyo 2020. Warholm, 25, finished in 45.94 seconds to slash more than seven tenths off his old record, while American Rai Benjamin was hot on his heels to win silver having also beaten the previous record. Warholm had set the previous world record of 46.70 in Oslo in July. Brazil's Alison dos Santos took the bronze medal with a time of 46.72. "You know the cliche that it hasn't sunk in yet? I don't think it has but I feel ecstatic," Warholm, who now holds the European, world and Olympic titles, told BBC Sport.

  "I can't believe the time, it's so fast! A lot of the time I am asked about the perfect race... I said it didn't exist, but this is the closest I've ever come. "I told myself going into the race, remember all the work you have put in. It was the only thing missing from my [medal] collection. "I can't describe how important this is for me. This is what I do morning until night - it's huge."

  Warholm had already broken the world record in July

  It was tipped to be one of the most exhilarating races at the Games after Benjamin had come within five hundredths of a second of taking the then-world record in winning the US trials this summer. Warholm established a strong lead when he raced out of the blocks but Benjamin threatened to claw him back before the Norwegian's final push for the line. He roared with delight when he looked up at the screen to see his time, ripped his shirt in celebration and posed for photographs next to the new world record. Two-time world 110m hurdles champion Colin Jackson told BBC TV: "When you talk about world records, this is up there with Usain Bolt's time of 9.58 seconds in the 100m and up there with Flo Jo's 10.49 seconds in the 100m. "This is one of the most outstanding world records and I'm pretty sure that world record will outlive me. "It's just breathtaking. Wow. I am truly in shock." Former 1500m Olympic silver medallist Steve Cram added: "No wonder he rips his shirt apart - he is Superman in this event! "I cannot believe what we have just seen. Two men running times you could only dream of."

