content: |-
  The lorry fell off the Thelwall Viaduct on the M6 and landed on the embankment below.

  An HGV van fell on to an embankment near to Thelwall Viaduct

  A lorry has fallen from a bridge on the M6 and landed overturned on the embankment below. The incident happened between junctions 20 and 21 at the Thelwall Viaduct near Warrington, Cheshire, at about 18:50 BST, Cheshire Police said. The driver of the vehicle is not believed to have suffered any life-threatening injuries, the force added. Police said three lanes are expected to remain closed on the northbound carriageway overnight due to "serious damage" caused to the barrier.

  Cheshire Fire and Rescue Service said firefighters used rescue equipment to lower themselves down to reach the driver. It added crews applied water to cool the HGV and are using bunding to contain a leak of about 220 gallons (1,000 litres) of bio-diesel from the vehicle's fuel tanks. One lane will remain open with a reduced speed limit, police added. Motorists are advised to avoid the area and find an alternative route during this time.
