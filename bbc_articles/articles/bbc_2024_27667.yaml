title: Megan Fox and Machine Gun Kelly expecting first child - BBC News
date: '2024-11-12'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/c0enx32z5d1o
content: |-
  Fans congratulate the Transformers star, who's spoken about a previous pregnancy ending in miscarriage.

  Megan Fox has announced she and US rapper Machine Gun Kelly are expecting their first child together. The Transformers actress tagged the musician in a photo which showed her kneeling, covered in a black substance and cradling a baby bump. Fox, who last year revealed that a previous pregnancy had ended in a miscarriage, also posted a picture of a positive pregnancy test alongside the portrait. The actress, who has been dating Kelly since 2020, captioned the images with: "Nothing is ever really lost. welcome back".

  Fox previously spoke about her miscarriage on ABC's Good Morning America. She said: "I've never been through anything like that before in my life. It was very difficult for both of us. "It sent us on a very wild journey together and separately - trying to navigate what does this mean and why did this happen?" She also shared her experiences in her book, Pretty Boys are Poisonous, through two poems.

  In an interview with Women's Wear Daily Fox also revealed that she'd experienced an ectopic pregnancy on a different occasion. This is when a fertilised egg implants itself outside of the womb, usually in one of the fallopian tubes. The American actress has three children, and Machine Gun Kelly has a daughter from a previous relationship.

