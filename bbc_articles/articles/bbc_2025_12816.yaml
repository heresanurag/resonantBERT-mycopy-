  Speaking in April, Trump said: "They're going to do a second, as you know, a second fest... that's what it is: a fest, and it's beautiful, and it's the first time it's ever happened to one person. "And the reason is we have two separate terms, and it's an honour... I'm a friend of Charles, I have great respect for King Charles and the family, William, we have really just a great respect for the family. "And I think they're setting a date for September."

  The Times, external reported that Buckingham Palace raised concerns about Trump's "threats to Canada, seeing it as a reason not to rush into a state visit". According to the newspaper, a senior source said that a senior Palace aide told government officials that the King did not want to give Trump a state visit while the US president was "impugning his sovereignty" over Canada. It added that senior government sources said the King wished to have a state visit at a later date. The prime minister's spokesman was asked whether Starmer overruled the King in bringing Trump's visit forward. The spokesman said: "That is untrue."
