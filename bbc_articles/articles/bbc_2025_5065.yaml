  • None Watch: Henry Zeffman on what you need to know...in 58 seconds The independent forecaster, the Office for Budget Responsibility (OBR), tasked with the near impossible job of economic projections amid such swirling uncertainty, nonetheless has a go. With more than a splash of understatement, the OBR writes in its latest economic and fiscal outlook - which accompanied the chancellor's Spring Statement - that "following the election of a new US administration in November, US trade policies and those of its major trading partners remain in flux". Across five pages, the OBR works through various scenarios following a hike in tariffs of 20 percentage points by the US. Firstly on countries other than the UK, then on all countries including the UK and finally again on all countries including the UK but where those countries reciprocate with equivalent tariffs on US goods. Flick to page 40 here to have a read for yourself., external The most severe, involving retaliation, the forecaster reckons, "would almost entirely eliminate the headroom against the fiscal mandate" – in other words, near nuke on its own all the budgetary shuffling and trade-offs Reeves has been juggling with in recent weeks. For this reason among many ministers will be desperate to avoid anything close to this scenario playing out. And all of this just days before what Trump has dubbed "Liberation Day" next Tuesday, when, yes, a huge number of new tariffs are anticipated. The chancellor has told the BBC that there are "intense negotiations with US counterparts" including "on cars, steel and every other kind of tariff". There are "a few more days left of those negotiations", Reeves said, adding: "We don't want to get into a trade war". The world has changed, and continues to change.

