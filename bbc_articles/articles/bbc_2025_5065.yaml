  Chris Mason: Trump means uncertainty is the new certainty for the UK

  The return of Donald Trump to the US presidency means the government are dealing with an increasingly uncertain world

  The world has changed, said the chancellor - and hours later it did, again. It is a phrase that has become a familiar one at Westminster in the last few days and the line used to justify the shift in priorities and spending cuts Rachel Reeves announced in her Spring Statement. When folk in government say the world has changed what they mean, at least in part, is Donald Trump is back in the White House and they can't be remotely certain what is going to happen next. In the latest example of stagecraft and statecraft amounting to the same thing for America's president, he set out in a news conference that Washington would be imposing an import tax or tariff of 25% on all cars America buys from abroad.

  For the UK, the US is the second largest car export market after the EU, according to the Society of Motor Manufacturers and Traders. Two and a bit months in to Trump's second term, the strategy from the government in the UK has been to wrangle in private and say as little as possible in public. "If in doubt, say nowt" is how you might colloquially describe the approach, resisting the temptation to be drawn into commentary about the president's actions for fear of provoking a blast of his ire. And alongside this, work has been under way to agree a US-UK trade deal, which may provide some insulation from the whims and broadsides of Trump. But all this underlines that uncertainty is the new certainty and considerable bandwidth is absorbed within government anticipating what might be around the corner and then seeking to negotiate about and/or mitigate the consequences of whatever is expected to change.
