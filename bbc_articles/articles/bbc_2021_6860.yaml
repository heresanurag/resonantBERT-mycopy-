  G7 leaders pledge one billion doses of Covid-19 vaccines for poorer countries, says PM Boris Johnson.

  G7 leaders have pledged one billion doses of Covid-19 vaccines for poorer countries, says PM Boris Johnson.

  He described the response was "another big step towards vaccinating the world".
