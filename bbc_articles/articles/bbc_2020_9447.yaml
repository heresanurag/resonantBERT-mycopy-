title: 'Beirut blast: City explosion causes widespread damage - BBC News'
date: '2020-08-09'
section: General
url: http://www.bbc.co.uk/news/world-53657745
content: |-
  Video is emerging online of the huge blast that has devastated a large part of the Lebanese capital.

  A large explosion has devastated the Lebanese capital city of Beirut, causing widespread damage and many casualties.

  The blast was so strong, it was reportedly felt in Cyprus, an island around 240km (150 miles) away.

  Officials are blaming 2,750 tonnes of ammonium nitrate, which was stored unsafely in a warehouse for six years.
