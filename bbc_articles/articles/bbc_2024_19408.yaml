  Chelsea sign Joao Felix from Atletico Madrid for £45m as Conor Gallagher moves in the opposite direction for about £33m.

  Chelsea sign Felix from Atletico for £45m as Gallagher leaves

  Joao Felix (left) and Conor Gallagher played together during the Portuguese forward's loan spell at Chelsea in 2023

  Chelsea have signed Portugal forward Joao Felix from Atletico Madrid for a fee in the region of £45m, with England midfielder Conor Gallagher going the other way for about £33m. Felix, 24, who has signed a seven-year deal to begin a second spell at Stamford Bridge, scored four goals in 20 appearances during a loan spell in west London in 2023. "I’m really happy to be back at Chelsea and I can’t wait to get started," said Felix. "I can see some familiar faces from the last time I was here, which is always nice." Gallagher meanwhile has signed a five-year contract with the Spanish top-flight club. Gallagher joined Chelsea at the age of six and went on to make 90 appearances, scoring 10 goals. He had entered the final year of his contract at Stamford Bridge so Chelsea wanted to sell now to avoid losing him on a free transfer next summer. "To everyone at Chelsea, thank you for making my dreams come true," Gallagher wrote on Instagram. "It's been an absolute honour every time I put on the shirt, and it was a dream come true to captain the team on many occasions. "I loved every moment. These memories will last forever. I appreciate all the love and support from the fans."

