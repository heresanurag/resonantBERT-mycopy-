title: 'Dixie Fire: California town decimated by largest active US blaze - BBC News'
date: '2021-08-09'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-58123369
content: |-
  The US' largest active fire warped street lights and destroyed the town of Greenville, California.

  The Dixie Fire - the largest active blaze in the US - has destroyed homes, historic buildings, and even warped the street lights in Greenville, California.
