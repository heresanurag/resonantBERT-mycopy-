title: Woman, 66, arrested in Camden on suspicion of 'Rolex murder' - BBC News
date: '2025-06-20'
section: London
url: http://www.bbc.co.uk/news/articles/cvg1d4g3vg7o
content: |-
  Jennifer Abbott was found by her niece and neighbours with tape across her mouth at her home.

  Woman held on suspicion of murder in Rolex case

  Jennifer Abbott, known also as Sarah Steinberg, was well known in the community

  A 66-year-old woman has been arrested on suspicion of murder after a 69-year-old was found fatally stabbed in her home in north London. Emergency services were called to a report of an unresponsive woman at a property in Mornington Place, Camden at 18:00 BST on Friday, 13 June. The victim, named by police as Jennifer Abbott, was found by her niece and neighbours. The neighbour said she had been left with tape across her mouth. On Wednesday, the Metropolitan Police said a missing Rolex watch may be linked to Ms Abbott's death.

  Met detectives added that they were keeping an open mind about the possible motive for the stabbing and appealed for information about the watch which they believed was missing from Ms Abbot's address.

  The suspect remains in police custody after being arrested on Wednesday, the force added.

  Detectives have made the missing Rolex watch a focus of the murder investigation

  The 69-year-old, also known as Sarah Steinberg, was last seen walking her pet corgi in Camden on 10 June, before she was found fatally injured three days later. A post-mortem examination gave the cause of death as sharp force trauma. The victim's family have been informed and are being supported by specialist officers. Det Insp Barry Hart, from Homicide Command, Specialist Crime North, said: "This arrest marks a significant step forward. "There are several lines of enquiry ongoing, and we are working hard to establish the exact circumstances of this incident. "Locals can expect to see an increased police presence in the area while we conduct our enquiries."

  One neighbour, who did not want to be named, told the BBC Ms Abbott had recently confided to friends she was fearful living at her flat because of crime in the area. "Jenny was having a coffee with [her neighbour] only last week, and was crying in the cafe saying, saying 'I'm scared to go to sleep at night because of all the drug-taking activity that goes on'." Ms Abbott had told her neighbour that drug abusers had gained access to her block of flats and were using her hallway to use drugs. The neighbour said: "I remember Jenny saying to me that she came out one day and they're all standing in front of her door, cooking up their stuff, making the whole area a shooting gallery. "She told me she came out and asked could she get by and the answer came 'wait a minute, we're not finished'."
