title: Donna Jones stands by 'divisive' protest arrest comments - BBC News
date: '2024-08-05'
section: Hampshire & Isle of Wight
url: http://www.bbc.co.uk/news/articles/czk00ykdl75o
content: |-
  PCC's call for government to acknowledge the cause of recent unrest had been criticised by some MPs.

  Donna Jones had said arresting violent protesters would not tackle the cause of the unrest

  A police and crime commissioner said she "stands by" her claim that arresting people for disorder is "treating the symptom and not the cause" of civil unrest, after her comment was criticised as "divisive". Hampshire and Isle of Wight PCC Donna Jones made the remark when she appealed for calm on Saturday, as far-right demonstrations descended into riots in towns and cities. Eastleigh MP Liz Jarvis, external accused Ms Jones of "attempting to justify the criminality", describing the PCC's earlier comments as "divisive, inflammatory and grossly irresponsible". In a statement on Sunday, Ms Jones clarified her position on the protests, saying: "The violence that has erupted across the UK this week has been criminal, unlawful and senseless."

  Ms Jones, who is also chair of the Association of Police and Crime Commissioners (APCC), said: "I stand by my statement issued yesterday where I called for calm, and for the country to work together stop this mindless, criminal behaviour." She said she fully supported the police response to "stem the growth of these riots", adding: "Those acting outside of the law should expect to feel the full force of it. “The violence we have seen has endangered our communities and infected lawful protest on a much broader issue. “As a country this issue is something we should seek to understand without letting it divide us." Nazir Afzal, former chief executive of the APCC, has also criticised Ms Jones' earlier comments, calling them "totally unacceptable". “I would have heavily advised against a current PCC, let alone the chair, appearing to justify rioting and criminality that police officers are bravely having to deal with right now," he said.

  On Saturday, Ms Jones had said: "The commonality amongst the protest groups appears to be focused on three key areas - the desire to protect Britain’s sovereignty, the need to uphold British values and, in order to do this, stop illegal immigration." "The government must acknowledge what is causing this civil unrest in order to prevent it. "Arresting people, or creating violent disorder units, is treating the symptom and not the cause." She also said government plans for cooperation between police forces had led to "an accusation of two-tier policing, which has enflamed protestors". Home Secretary Yvette Cooper said on Saturday: "Anyone who gets involved in criminal disorder, violent thuggery on our streets, will have to pay the price." She warned those involved in the disorder to "expect there to be arrests, prosecutions, penalties and the full force of the law". "It's really important that communities can feel safe on the streets and their are consequences for breaking the law," she said.

  A protest in Portsmouth passed without any arrests

  Winchester MP Danny Chambers also criticised Ms Jones, external, saying he was "deeply concerned" she believed "rioters vandalising our streets and attacking mosques are motivated by 'the need to uphold British values'." "These extreme views make her totally unsuitable to hold this position of responsibility," he said. But Police Federation Chair Zoe Wakefield praised Ms Jones, saying she "understands policing". She said the "decimation of policing by the government" had left police officers exhausted as forces struggled to cope with the wave of unrest. "The only way to police these protests is by cancelling rest days and annual leave," she said.

  Tensions have been high since the killing of three young girls in Southport, Merseyside, on Monday. Ms Jones described the behaviour of some protesters as "extremely violent, highly distressing and absolutely criminal". "Police officers have been injured, buildings have been targeted because of those living in them or worshiping at them and police cars and vans set on fire," she said. A protest in Aldershot on Wednesday descended into disorder but a separate gathering in Portsmouth on Saturday passed without any arrests.

  Axel Rudakubana, 17, who was born in Cardiff, appeared at Liverpool Crown Court earlier this week and was charged with murdering the three girls. He was also charged with 10 counts of attempted murder after eight other children and two adults were seriously injured in the attack. He was remanded into youth detention accommodation. Responding to the subsequent unrest, Prime Minister Sir Keir Starmer announced a programme to clamp down on violent groups by allowing forces to share intelligence. He said: "These thugs are mobile, they move from community to community, and we must have a police response that can do the same."

