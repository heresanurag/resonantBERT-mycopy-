  Six Republicans join Democrats and rule it is constitutional to put Trump on trial after leaving office.

  Trump wants to live at Mar-a-Lago, as an employee

  Trump is facing legal troubles in Washington, and at home in Palm Beach, Florida, too. He bought his ocean-side property, an estate called Mar-a-Lago, in 1985, and spent part of his winters there. Then, after leaving the White House, he moved in. Some of his neighbours want him out, saying he will bring down property values, and have talked about evicting him. They say an agreement that was reached nearly 30 years ago, one that turned the estate into a private club, does not allow anyone to live there on a permanent basis unless they work on the premises. Trump, through a lawyer, has argued that he should be allowed to stay, as an employee. The issue is being discussed at a Palm Beach Town Council meeting on Tuesday. One of his former employees, Wes Blackman, a former project director at Mar-a-Lago, says that Trump will see the designation as an employee not as a demotion, but as an opportunity, a loophole that will allow him to stay where he is. The designation as an employee is "convenient and expedient", says Blackman. "It gets him out of a tight situation." Besides, says Blackman, the fight with his neighbours in Florida is not the biggest problem Trump is facing today. Over the course of the day, Blackman has been watching the impeachment trial in Washington, wondering how his old boss will fare.
