id: bbc_2019_1952
title: Exclusive pictures of final Islamic State group bastion - BBC News
date: '2019-02-27'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-47374596
content: |-
  Several hundred fighters from the Islamic State group are holed up in Baghuz.

  Coalition forces are preparing a final assault on the Islamic State group's final bastion of Baghuz.

  BBC Arabic's Feras Kilani joined Iraqi paramilitary fighters as they monitor the remaining few hundred fighters and their families.
