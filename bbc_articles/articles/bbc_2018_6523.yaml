  Former Bishop of Liverpool James Jones, who led the Gosport Independent Panel, said: "The documents seen by the panel show that for a 12-year period a clinical assistant, Dr Barton, was responsible for the practice of prescribing which prevailed on the wards.

  "Although the consultants were not involved directly in treating patients on the wards, the medical records show that they were aware of how drugs were prescribed and administered but did not intervene to stop the practice."

  Families of those who have died at Gosport Memorial Hospital gathered at Portsmouth Cathedral to hear the findings of the inquiry

  Relatives had said they hoped the findings of the report would end their "harrowing" wait for answers.

  The document said families were "consistently let down" by those in authority, both medical individuals and institutions, when they complained about the treatment of their loved ones.

  Bishop Jones, who also headed the Hillsborough Inquiry, said: "It's not for the panel to ascribe criminal or civil liability.

  "It will be for any future judicial processes to determine whatever culpability and criticism might be forthcoming."

  Bishop Jones led the panel and announced its findings outside Portsmouth Cathedral

  Police previously investigated the deaths of 92 patients during three inquires between 1998 and 2006, but no prosecutions were brought.

  Chief Constable Olivia Pinkney, of Hampshire Constabulary, said the force had "co-operated fully" with the panel and "shared with them more than 25,000 documents containing 100,000 pages of information".

  "We will assess any new information contained within the report in conjunction with our partners in health and the CPS in order to decide the next steps," she added.

  The CPS said it will "consider" the report and take "any appropriate steps as required".

  The report said an "awareness" that the deaths "might be due to 'another Shipman'" had "cast a shadow over how concerns at the hospital were viewed".

  GP Harold Shipman was jailed for life in 2000 for murdering 15 patients between 1995 and 1998.

  Family tributes were placed outside the cathedral

  "The police focused on the allegation that Dr Barton was guilty of unlawful killing, rather than pursuing a wider investigation," the report added.

  "Hampshire Constabulary approached Dr Barton's managers, including the then chief executive at the trust and Dr Althea Lord, the responsible consultant, in a way that ignored the possibility that they too might have been subject to investigation."

  It said the quality of the force's three investigations was "consistently poor".

  The panel found officers had a mindset of seeing family members who complained as "stirring up trouble" while seeing the hospital as the place to go for guidance and assurance during their inquiries.

  The report added: "There was an institutionalised regime of prescribing and administering 'dangerous doses' of a hazardous combination of medication not clinically indicated or justified, with patients and relatives powerless in their relationship with professional staff."

  Gladys Richards who died at the hospital in 1998 was among the photographs on display

  Gosport MP Caroline Dinenage said it highlighted many "failures" by the authorities to properly investigate.

  She said organisations must look closely at the full report and urged the government to take action if there were cases to answer.

  She said: "I can't even imagine what the families must be going through - it's absolutely heartbreaking."

  Nursing staff first raised concerns about the poor prescribing and administration of opioids at the Gosport Memorial Hospital nearly 30 years ago but their fears were "silenced" by management, the inquiry revealed.

  In 1991, Anita Tubbritt, a staff nurse at the hospital rang Keith Murray, the local Royal College of Nursing branch convener, to express concerns she and other staff shared over the use of diamorphine and syringe drivers.

  The report said the nurses gave the hospital a chance to rectify the practice and in choosing not to do so "deaths resulted and, 22 years later, it became necessary to establish this panel in order to discover the truth of what happened".

  Janet Davies, chief executive of the Royal College of Nursing, said the report made for "very sober reading for everybody involved in the care of patients".

  "Nursing as a profession must work hard to seek out lessons from Gosport and we expect that approach to be shared by regulators and the health and care system," she added.

  "The report is right to praise the bravery shown by the nurses who raised concerns. It highlights how difficult it can be for nursing staff to challenge the decisions taken by others."

  Health Secretary Jeremy Hunt said there had been a "catalogue of failures"

  The health secretary described the findings as "truly shocking".

  He said "brave nurse whistleblowers" had first raised concerns in 1991, as well as families.

  He added there had been a "catalogue of failures", including by the Department of Health.

  A report first compiled by Prof Richard Baker in 2003 - and published 10 years later - found evidence of an "almost routine use of opiates" since 1998.

  Speaking in the Commons, Mr Hunt asked why it had taken 10 years for this to be made public.

