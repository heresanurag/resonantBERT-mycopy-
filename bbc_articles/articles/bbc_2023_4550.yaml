title: 'France pension protests: Bordeaux''s historic town hall in flames - BBC News'
date: '2023-03-24'
section: General
url: http://www.bbc.co.uk/news/world-europe-65058331
content: |-
  Video shows the front of the Palais Rohan on fire during protests over raising the pension age.

  Footage has emerged of the large front door of Bordeaux's historic town hall - the Palais Rohan - on fire.

  It wasn't clear who was responsible for the blaze, which was quickly put out by firefighters.
