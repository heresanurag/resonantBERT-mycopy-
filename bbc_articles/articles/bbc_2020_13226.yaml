title: 'US election: Biden supporters'' messages to Trump voters - BBC News'
date: '2020-11-09'
section: General
url: http://www.bbc.co.uk/news/election-us-2020-54859464
content: |-
  Supporters of US President-Elect Joe Biden give their message to people who voted for Donald Trump.

  US President-Elect Joe Biden has spoken of his wish to "unify" the United States, in his first speech since his election win.

  Some of those who voted for Joe Biden tell the BBC what their message would be to friends who supported Donald Trump.
