title: 'Trump and Sessions: How relations soured - BBC News'
date: '2018-11-07'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-40721017
content: |-
  From staunch allies to public bickering, here's how the relationship soured.

  Donald Trump has called Attorney General Jeff Sessions "beleaguered" and said he wouldn't have hired him had he known that Sessions would later recuse himself from ongoing investigations into Russia's meddling in the US election.

  But there was a time when the two conservative politicians were staunch allies. Here's how the relationship soured.
