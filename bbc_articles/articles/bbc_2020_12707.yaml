title: Curious, hopeful, nervous... voters react - BBC News
date: '2020-11-04'
section: General
url: http://www.bbc.co.uk/news/election-us-2020-54805298
content: |-
  Biden supporter Lesley and Trump supporters Eliana and Mike share how they're feeling about the night.

  As the polls closed, US voters have shared how they feel about their candidate.

  Joe Biden supporter Lesley Batson is disappointed Florida went to Donald Trump, but she is staying optimistic and eager to see the electoral college map later on Wednesday.

  Donald Trump supporter Eliana Girard is feeling everything is "leaning toward" the president, while Mike Harlow is happy but "nervous".
