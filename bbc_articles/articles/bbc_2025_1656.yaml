  On Thursday, there will be a live episode of the soap, broadcast from the set in Borehamwood. Ms Waple said: "To think when they do the live performance they're actually going to be there, and I'll be here watching it on my TV - I can get it in stereo. "There's a child that lives next door, he cries a lot and screams a lot, I wonder if that interferes with their filming because you do hear them shout 'action'." She added: "I dread to think anything happens to EastEnders. We'd have a housing estate there."

  The actors who play Bianca Jackson, Minty Peterson and Phil Mitchell have all been regulars at Golden Plaice fish and chip shop

  If BBC Elstree Centre is the EastEnders equivalent of a Hollywood studio then Borehamwood high street is the walk of fame. Ask anybody in the shops, cafes or pubs at the centre of town and they will probably have a story about meeting or serving the show's cast. Aziz Chatt, a cook at Golden Plaice fish and chip shop, said: "Bianca was here a couple of weeks ago, she came twice in the last couple of weeks. "Minty used to come nearly every week. "Phil Mitchell loves his fish and chips. He comes and takes his cod and chips. I saw him a few weeks ago, he's a nice and chatty man... He likes salt and vinegar."

  Michelle Smith remembers when the actor who plays Max Branning would have a daily jog down the street in his "teenie weenies"

  Michelle Smith, the manager of Peace Hospice Care, has noticed that things bought in her shop have ended up on screen. "We used to be a furniture shop so they bought a lot from us... we've spotted sofas and things," she said. "Ten years ago it was a Jubilee or something, they had a big episode with Dot and another lady. I watched it and was like, 'Oh my God, there's all the bits they bought from the shop'." She has lost count of how many cast members have visited the shop over the 22 years she has worked in the area and recalls regularly spotting Max Branning actor Jake Wood getting some exercise in between filming. "Max Branning used to run round in his little 80s shorts. You used to see him jogging all the time in his teenie weenies," she said.

  Karen Whitehouse's son was in an early episode of EastEnders

  Karen Whitehouse works in the same shop, and her son was an extra in one of the show's first episodes. She said: "He was just in a carnival scene where the kids are running around. "The funny thing is, when people come into Borehamwood to see if they can spot the actors, you do get a lot." Ms Smith added: "We've had to take a few out the back door when they've really been harassed. "They're all really lovely people, because they come in so often you see them in the street, and they shout 'all right?'."

  EastEnders producer Chris Clenshaw (right) is presented with a special award by Hertsmere Borough Council leader Jeremy Newmark

  To mark the soap's 40th birthday, Hertsmere Borough Council presented Chris Clenshaw, the show's executive producer, with a special award. Council leader and Elstree Film Studios chairman Jeremy Newmark said: "EastEnders has been totemic of the growth in the screen sector here in Hertsmere and proven a trailblazer with its treatment of the important social issues of the day. "It's played a critical role in our national conversations over the past 40 years and we are very proud to have the BBC EastEnders team right here in the heart of our borough."

  Eastenders at 40: Behind the Scenes As EastEnders hits four decades on our screens, the BBC went on set at Albert Square to talk to the soap's stars about how it's celebrating its birthday.
