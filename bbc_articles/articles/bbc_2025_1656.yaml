  Explosions and super fans - Borehamwood residents on 40 years of living next door to EastEnders.

  What is it like living next door to Albert Square?

  As all EastEnders fans know, the TV soap's famous Albert Square is not really in the East End of London. Since its beginnings, the show has been shot on an outdoor set at BBC Elstree Centre, which is tucked away in the centre of Borehamwood in Hertfordshire. To an outsider, the terraced houses complete with satellite dishes could fool you into thinking it is just another residential street. Get closer though and you will find fans camped outside the security gates with umbrellas and chairs, hoping to meet their favourite actors as they sneak out on a lunch break. So what is it like for the people of Borehamwood who, for the last 40 years, could technically call The Queen Vic pub their local?

  Darren Bloch lives next to the EastEnders set in Hertfordshire

  A few weeks ago, Darren Bloch was washing up when something exploded. "I started panicking. I could see smoke and all that," he said. "I quickly shouted to my wife to call the fire service and she called down to say, 'Oh, no, don't worry, it's EastEnders. They sent a letter around to say it was going to happen'.

  The access road to the EastEnders set near Darren Bloch's house

  The couple live so close to the set that Albert Square hardman Phil Mitchell's house overlooks their back garden. Mr Bloch said: "From our bedroom, you can see the whole set, the tops of the buildings and all the set, so we're right on the set. "When we tell our friends where we live they find it's amazing... They've definitely come up to our bedroom and had a good look."

  Friends of Mr Bloch like to try and watch filming take place from his bedroom window

  The 37-year-old only moved to the area four months ago. He is originally from South Africa where they have never heard of characters like Ian Beale, Dot Branning or Kat Slater. Although Darren lives closer to the fictional London borough of Walford than anybody else in the world, he has never seen an episode in his life. "I've Googled it a few times, just to see if I know any of the faces that I regularly see walking around, nothing so far, I haven't been so lucky," he said. "We did watch Strictly [Come Dancing] this year, that was my first reference of an EastEnders actor."

  Darren Bloch often spots EastEnders fans camped outside his house

  Alongside the couple's home is a road that leads into the set, which is blocked off by a large security gate. Fans are often sitting on the edge of Darren's driveway hoping for a glimpse of their favourite characters on their way to the local shops. He said: "When we first moved in it was something we definitely had to get used to, having so many people just walking and looking over. "You think, 'Are they looking into our property?' and then you realise they're just trying to get a glimpse of the studios. "I sometimes see people getting autographs or signatures or something. I just don't know who they are."

  Pamela Waple has lived near the set for eight years

  Somebody who would recognise the cast is Mr Bloch's neighbour and fan of the soap, Pamela Waple. The 74-year-old, who moved to Borehamwood eight years ago, said: "They are all so friendly and so charming. If I'm out in the front garden, they will stop and they chat and they admire my roses. "They sometimes film out the front of the house. There was one a few weeks ago with [character] Jack Branning."

  In 2022, EastEnders started using a new set as the previous outdoor site had deteriorated

  Behind Ms Waple's garden shed are two houses, part of the soap's set, but through the gap between them you can catch a glimpse of Albert Square itself. She said: "We do hear the occasional bang, and shouting and hoorays. At Christmas, we see the decorations when they decorate the square. "Christmas goes up about August and there's all snow on the rooftops. It is very odd."

  Ms Waple can often hear EastEnders being filmed on the set behind her house

  In 2022, the show started using a new set after the original one, used since 1984, had deteriorated to the point it was no longer usable. During construction, residents were invited for a tour of the £86.7m replacement. Ms Waple said: "We could walk around Albert Square which was quite surreal, but the neighbours I went with didn't watch it so it didn't mean much to them, but for me it was bizarre walking around Albert Square."

