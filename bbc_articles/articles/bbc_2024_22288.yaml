title: 'Nottingham: Maternity scandal trust faces accountability call - BBC News'
date: '2024-09-18'
section: Nottingham
url: http://www.bbc.co.uk/news/articles/c70zzk72g7xo
content: |-
  Campaigners are concerned nobody at the trust has been "investigated, sanctioned, or dismissed".

  Sarah and Jack Hawkins said after two years, no-one at the trust had been "disciplined or dismissed"

  Families affected by the Nottingham maternity scandal have called for more accountability. The largest inquiry of its kind in NHS history is currently under way into care given to thousands of families at the Nottingham University Hospitals (NUH) NHS Trust, which runs maternity departments at City Hospital and Queen's Medical Centre. Campaigners have expressed concern that after two years of investigation, no-one at the trust has been "investigated, sanctioned, disciplined, or dismissed". After its annual public meeting on Wednesday, NUH said it will make six commitments to improve the service, including a liaison service, funding ongoing psychological support and working with families on future policy and accountability.

  NUH chief executive Anthony May said he was committed to "turning feedback into action"

  The review is examining nearly 2,000 cases - involving the death or severe harming of a baby or mother - in a 10-year period from 2012. Led by senior midwife Donna Ockenden, it was launched in September 2022 and campaigners used this anniversary and the APM to press for further action. The first hour of Wednesday's meeting was dedicated to the maternity review. Jack and Sarah Hawkins, whose daughter Harriet died in the womb at Nottingham City Hospital in April 2016, have been involved in the campaign for years. "As families, we want to know why there has been no accountability," they said in a statement prior to the meeting. "We are clear there has been harm caused by individuals. "That harm is both clinical failures and also failures to be open and honest to explain what has really happened. "We cannot fathom how no-one has been investigated, sanctioned, disciplined, or dismissed given the experiences we have had and have made clear to NUH."

  The trust said the new liaison service would provide women and families with a single point of contact after any distressing experience during their maternity and neonatal care. It is due to be launched later this year. Other commitments include working with families to agree a full apology for the failings in maternity services, and also develop an approach for oversight in implementing the report's recommendations. There will also be work on a "lasting legacy" for those harmed in the departments, as well as the psychological support to last beyond the publication of the final report. A further commitment on accountability was made by the trust following a suggestion by Sarah Hawkins, whose daughter Harriet was stillborn at City Hospital in 2016. NUH chief executive Anthony May said: "These commitments are part of our efforts to improving maternity services and to engage constructively with women and families. "I know there is much more to do but we are committed to listening and learning, and to turning feedback into action. "I should like to pay tribute to the families that have been kind enough to share their experiences with me, to Donna Ockenden for her ongoing independent maternity review, and to my colleagues in maternity for their hard work, day-in, day-out."

  Felicity Benyon said it was "a positive step forward" for the trust to accept it has more to do

  Felicity Benyon, a mother from Mansfield whose bladder was removed by mistake during childbirth, was among the patients and families affected by failings who attended the meeting. "It's another positive step forward that they are acknowledging as a trust, and [Mr] May as the chief executive, that there are still issues and there's still big room for improvements," she said. "The main thing that [we] families are focused on now is accountability, and I feel that was very vaguely hit upon today. "We need a lot more transparency on what accountability has actually already happened, and how they're going to ensure that future problems, and future members of staff, are held accountable."

  It is the second year running that maternity failings have been under an intense spotlight at the trust's annual public meeting. A big media presence and tough questions from harmed families made this an opportunity for the trust to be held to account in a pressured and very public arena. Donna Ockenden, leading the maternity review, paid tribute to the bravery of traumatised families who fought for years to get their voices heard and a meaningful review put in place. Sarah and Jack Hawkins, who have campaigned tirelessly for safety improvements, challenged the trust to add accountability to the list of pledges, and Sarah spoke powerfully about the life long trauma of losing a child as a result of avoidable harm. The trust set out its commitments today – witnessed by many - but now comes the harder part - delivering and improving relationships with families whose lives have been damaged forever.

