title: Rebuilding Notre-Dame cathedral... with 1,000 oak trees - BBC News
date: '2024-04-12'
section: General
url: http://www.bbc.co.uk/news/world-europe-56761834
content: |-
  Two years since the fire, workers are preparing for the reconstruction phase of the Paris landmark.

  It's been two years since a fire ravaged the Notre-Dame cathedral in Paris.

  Workers are now preparing for the reconstruction phase - with the help of 1,000 centuries-old oak trees.
