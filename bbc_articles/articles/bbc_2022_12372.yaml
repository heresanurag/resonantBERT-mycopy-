title: Flower-strewn hearse journeys to Windsor Castle - BBC News
date: '2022-09-19'
section: General
url: http://www.bbc.co.uk/news/uk-62929200
content: |-
  Huge crowds lined the Long Walk as the procession headed to St George's Chapel.

  The Queen’s coffin came back to the place she called home, Windsor Castle.

  It was driven in the state hearse up the Long Walk, lined up with huge crowds, after an elaborate and sombre procession though London.

  Senior members of the Royal Family joined the procession as the state hearse approached St George's Chapel.

  King Charles III, Princess Anne, Princes Andrew and Edward, as well as Princes William and Harry walked behind the hearse.
