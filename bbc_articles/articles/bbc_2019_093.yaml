title: 'Black Mirror: Bandersnatch star Will Poulter quits Twitter - BBC News'
date: '2019-01-03'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-46747512
content: |-
  It follows online comments about the British actor's appearance in the recent episode of Black Mirror.

  Bandersnatch actor Will Poulter has quit Twitter, following the response to his role in the Black Mirror episode.

  Will, who appears as Colin Ritman in the "choose your own adventure" Netflix drama, says he needs to change his relationship with social media.

  Some people commenting on Bandersnatch called Will "ugly" for his appearance in the show.

  "In light of my recent experiences I am choosing to take a step back, of sorts, from Twitter," he wrote.

  He also thanked people who had commented on the show for their responses to the show "whatever they may be".

