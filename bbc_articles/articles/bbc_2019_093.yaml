  Bandersnatch is about the dark and difficult adaptation of a book into a video game by a group of software developers and has several different endings.

  In the show, Will plays a game creator - and he'd tweeted to say he was "nervous" about the episode's release.

  Comments about his appearance were posted after Bandersnatch came out on 28 December 2018.

  Will announced he was leaving Twitter less than a week later.

  "As we all know there is balance to be struck in our engagements with social media. There are positives to enjoy and inevitable negatives that are best avoided," he said.

  "It's a balance I have struggled with for a while now and in the interest of my mental health I feel the time has come to change my relationship with social media."

  Viewers of Bandersnatch made choices while watching the show which affected the episode's outcome

  Will added that he would occasionally continue to tweet for several anti-bullying organisations.

  "I hope that this shift to reduce my personal expression and increase the focus on issues that matter will result in a better outcome for everyone."

  Visit the Radio 1 advice pages if you want more advice on coping with the pressures of social media.

