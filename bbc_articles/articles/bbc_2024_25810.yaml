title: More than 20 products recalled over peanut contamination fears - BBC News
date: '2024-10-21'
section: Leicester
url: http://www.bbc.co.uk/news/articles/cpv2994y17wo
content: |-
  Among the products recalled are a range of dips, curry powders and seasonings.

  Among the products recalled are a range of dips, curry powders and seasonings (stock photo)

  More than 20 spice products including dips, curry powders and seasonings have been recalled over fears they may contain peanuts not mentioned on the label. In a notice issued by the Food Standards Agency (FSA), the decision to withdraw the products - supplied by FGS Ingredients Ltd in Leicester - was described as "precautionary". The products recalled include Domino's BBQ Dip, seasonings and curry powders by Favourit and Dunnes Stores, and some Westmorland Family Butchery sausages and burgers. It comes after a recall over a possible peanut contamination by FGS Ingredients, where the firm said testing was ongoing to understand "where and how this issue originated".

  FGS Ingredients took the "precautionary step" of recalling a number of products, the Food Standards Agency said

  Mustard products containing traces of peanut can be found in food such as dips, sauces, salads and pre-packed sandwiches. Last month FGS Ingredients said additional testing across its ingredients had "not detected any presence of peanut content or residue", but advised customers to remove products from sale containing the mustard ingredients. A spokesperson previously said: "We have never previously been involved in any incident of food contamination. Nevertheless, we continue to support the FSA investigation in every way necessary to help determine the source of this issue." The latest FSA notice, external said consumers had been advised to return the products for a full refund. The FSA added: "These products are sold under several different brand names at several different retail stores. "Point of sale notices will be displayed where the products were sold. These notices explain to customers why the products are being recalled and tell them what to do if they have bought the products." FGS Ingredients said testing found no presence of peanut at their premises in Leicester, but said analysis of mustard supplied from India "has produced some positive but inconsistent traces of peanut residue in limited pockets of the raw mustard product but not across entire batches". A spokesperson said: "The FSA Incidents and Resilience Unit has received information from its counterparts in India that now confirms the issue originated at agricultural level in India." The firm said it was now sourcing mustard from farms in Canada. "FGS Ingredients is continuing to work diligently and closely with both the FSA and Leicester Environmental Health to ensure any product posing even a potential threat to consumer health is swiftly removed from the supply chain," the spokesperson added.

