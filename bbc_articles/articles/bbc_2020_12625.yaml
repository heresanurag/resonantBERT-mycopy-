title: 'Yorkshire Ripper death: Force apology over victim descriptions - BBC News'
date: '2020-11-14'
section: Leeds & West Yorkshire
url: http://www.bbc.co.uk/news/uk-england-leeds-54934458
content: |-
  West Yorkshire Police apologises for the "tone and terminology" used by officers in the 1970s.

  The son of Sutcliffe's first victim, Wilma McCann, had appealed for an apology

  A police force has apologised for the "language, tone and terminology" used in the 1970s to describe some of the Yorkshire Ripper's victims.

  Senior West Yorkshire officers said some of the 13 women killed by Peter Sutcliffe, who has died aged 74, were "innocent" but implied others were not.

  The son of his first victim Wilma McCann had appealed for an apology.

  Force Chief Constable John Robins said the language used at the time was "as wrong then as it is now".

  This video can not be played To play this video you need to enable JavaScript in your browser. Speaking before an apology from police, Richard McCann, the son of Peter Sutcliffe's first victim, Wilma McCann, reacts to his death

  Speaking earlier, Richard McCann, who was five when his mother was killed, said: "They described some of the women as 'innocent', inferring that some were not innocent - including my mum.

  "She was a family woman who, through no fault of her own, was going through adversity and made some bad decisions, some risky decisions."

  "She paid for those decisions with her life."

  Twelve of the 13 women Sutcliffe was convicted of murdering: (Top row) Wilma McCann, Emily Jackson, Irene Richardson, Patricia Atkinson, Jayne McDonald and Jean Jordan.(Bottom row) Yvonne Pearson, Helen Rytka, Vera Millward, Josephine Whitaker, Barbara Leach and Jacqueline Hill

  Mr Robins said: "On behalf of West Yorkshire Police, I apologise for the additional distress and anxiety caused to all relatives by the language, tone and terminology used by senior officers at the time in relation to Peter Sutcliffe's victims.

  "Such language and attitudes may have reflected wider societal attitudes of the day, but it was as wrong then as it is now."

  He added that the force's approach to investigations was now "wholly victim-focused".

  After the force published its apology, Mr McCann tweeted: "Now that's worth celebrating. Thank You."

