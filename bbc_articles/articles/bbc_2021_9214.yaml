title: Clashes in Paris over Covid measures - BBC News
date: '2021-07-24'
section: General
url: http://www.bbc.co.uk/news/world-europe-57956846
content: |-
  French anti-riot police fired tear gas during protests against Covid-19 curbs and vaccination.

  French officials say more than 160,000 people across the country have taken part in latest protests against government moves to curb the spread of Covid-19.

  In Paris, anti-riot police fired tear gas as clashes broke out during protests, and made several arrests.
