title: 'ICU hospital staff: ''Scared, sad, petrified, worried'' - BBC News'
date: '2021-01-07'
section: General
url: http://www.bbc.co.uk/news/health-55564425
content: |-
  On Wednesday the UK recorded more than 1,000 daily Covid deaths and hospitals are struggling to cope.

  For the first since April the UK has recorded more than 1,000 daily Covid-related deaths – one of the highest figures of the pandemic.

  Right now, London is at the epicentre of this crisis. Hospitals now have more Covid patients being admitted every day than they did at the peak in April. Many doctors and nurses say they're reaching breaking point.

  The BBC's medical editor Fergus Walsh has been allowed to film inside the intensive care unit at London's University College Hospital, which is one of the busiest in the capital.

  Read more: 'How long can we keep going like this? About a week'
