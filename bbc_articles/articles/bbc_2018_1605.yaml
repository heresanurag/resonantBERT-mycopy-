id: bbc_2018_1605
title: 'Florida shooting: Parents and pupils speak to Trump - BBC News'
date: '2018-02-22'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43152280
content: |-
  President Trump met pupils and parents affected by school shootings in Florida and across the US.

  Students and parents from Marjory Stoneman Douglas High School in Parkland, Florida, and parents who have lost children at previous school shootings told President Trump about their experiences.
