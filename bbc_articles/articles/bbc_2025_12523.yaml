title: Windrush campaigners back Notting Hill Carnival funding bid - BBC News
date: '2025-06-22'
section: London
url: http://www.bbc.co.uk/news/articles/c86gwge7zxgo
content: |-
  Ministers are being urged to back the event amid calls for more funding to address safety issues.

  Notting Hill Carnival organisers say they need government funding to run the event safely

  Campaigners have urged the government to step in to protect the future of Notting Hill Carnival as they mark Windrush Day. The west London carnival is in jeopardy, its chairman Ian Comfort said in a letter leaked to the BBC on Wednesday, in which he asked Culture Secretary Lisa Nandy to provide "urgent funding" for public safety measures. While the government acknowledged the significance of the event, it stopped short of offering financial backing and urged organisers to work with local authorities and the police. Jacqueline McKenzie, a campaigner and human rights lawyer who helped victims of the Windrush scandal, said the carnival held "huge national and international significance".

  "The government needs to recognise this and act urgently to protect it," Ms McKenzie said. By the late 1950s, Notting Hill had became home to many people from the Caribbean who arrived in Britain on HMT Empire Windrush and accompanying ships, and the carnival was founded by pioneers of that generation. Ms McKenzie said the carnival being at risk "adds insult to injury" for victims of the Windrush scandal, in which thousands of British people, mainly of Caribbean origin, were wrongly classed as illegal immigrants. Many were deported while others faced difficulty securing work, accessing healthcare or housing. "It should not be lost on us that these funding concerns coincide with Windrush Day on Sunday," she said.

  "To see this celebration in jeopardy whilst so many of the Windrush generation continue to fight for justice following the Home Office scandal only adds insult to injury. "Carnival embodies the fundamental role of Black and Caribbean communities in Britain, and the government should be upholding the Windrush legacy instead of undermining it."

  Jacqueline McKenzie said the government should "act urgently" to protect the carnival

  The carnival, which attracts around two million people over the August bank holiday weekend, has caused concern to the Metropolitan Police over the potential for a "mass casualty event". On Thursday, London Mayor Sir Sadiq Khan said the risk of a crowd crush at Notting Hill Carnival "made me frightened". He also backed calls for the government to step in as the current funding provided by City Hall and two councils was the maximum possible. A City Hall spokesperson said it has been working with partners to ensure the safety of carnival-goers, which it described as "paramount". Patrick Vernon, a cultural historian and Windrush campaigner, said: "Notting Hill Carnival is far more than a street event - it is a vital cultural institution with both national and international significance. "As the second-largest carnival in the world, second only to Rio de Janeiro, it underscores London's position as a leading global capital of diversity, creativity and cultural exchange."

  Patrick Vernon said the carnival represented the "best of Britain"

  Mr Vernon campaigned for a national Windrush Day following the Home Office scandal in 2018. "The injustice faced by the Windrush Generation in recent years makes the threat to Notting Hill Carnival all the more painful," Mr Vernon said. He added that the carnival represented the "best of Britain", with "unity in diversity, creativity in adversity, and joy in community".

  Crowd sizes have been raised as a major safety concern at the carnival

  Glenda Caesar, director of the Windrush National Organisation, also urged the government to step in to save the event. "In the face of historical and ongoing injustices experienced by people of colour, the carnival stands not only as a celebration of resilience, heritage and identity but also as a powerful symbol of unity and inclusion," she said.

  A government spokesman said: "Notting Hill Carnival is an important community event, and we recognise that for many it is a moment to come together and celebrate. "We all want this to go ahead, and event organisers should work with local authorities and the police to keep it safe for everyone attending."
