content: |-
  Cameron Norrie stuns British number one Jack Draper with an assured second-round win at Wimbledon.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Cameron Norrie looked back to his best as he stunned British number one Jack Draper with an assured second-round win at Wimbledon. Norrie was displaced by Draper, 22, as Britain’s leading man last month. The 28-year-old has struggled this season, suffering first-round exits at the French Open, Queen’s and Eastbourne. But he moved past an in-form Draper 7-6 (7-3) 6-4 7-6 (8-6). "It wasn't easy coming out here today to play Jack, he's been playing so well and we're such good friends off the court so we had to put that aside today," said Norrie. "I felt like I was a little bit of the underdog coming in today, so I was pretty relaxed." Norrie will play fourth seed Alexander Zverev in the third round. His victory was another triumph for British number twos on Court One after Harriet Dart overcame Britain’s top-ranked woman Katie Boulter in extraordinary fashion earlier on Thursday. British wildcard Jacob Fearnley took a set off seven-time champion Novak Djokovic but fell short of creating a seismic shock earlier on Thursday at Wimbledon. Fearnley, a 22-year-old from Scotland, was beaten 6-3 6-4 5-7 7-5 by the Serb second seed in an increasingly febrile atmosphere on Centre Court. "All in all this match potentially deserved to go into a fifth, particularly with the way he played in the fourth. But I'm very glad it didn't," said Djokovic, who is still recovering from knee surgery last month.

  Draper came into the Championships on a rich vein of form having won his first ATP Tour title in Stuttgart a couple of weeks earlier. Seeded at Wimbledon for the first time, his five-set victory under the Centre Court lights in the first round evoked memories of Andy Murray. But Draper, whose career has already been hampered by injury and fitness issues, will have to wait at least another year to try and emulate the two-time Wimbledon winner. The left-handers needed a tie-break to settle the opening set and Norrie swept aside his big-hitting opponent with lightning-fast reactions at the net. The former world number eight continued to outsmart Draper, winning the next four games before holding off the 28th seed to take a two-set lead. Unable to serve out the third after breaking early, Draper was left ruing missed chances as Norrie took charge of the tie-break to reach the third round.

