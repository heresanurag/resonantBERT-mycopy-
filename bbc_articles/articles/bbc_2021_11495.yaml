title: Planes turned into graffiti canvasses by street artist - BBC News
date: '2021-09-18'
section: General
url: http://www.bbc.co.uk/news/uk-wales-58573703
content: |-
  Street artist Jim Vision had an idea for what to do with planes that have ended their flying days.

  When the Covid pandemic suddenly stopped flights around the world, airlines found they had planes they no longer needed.

  He got in touch with Plane Reclaimers in south Wales with a plan to turn an old Boeing 777 into a giant canvas for his work.
