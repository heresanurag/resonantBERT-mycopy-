content: |-
  South Africa's double World Cup-winning coach Rassie Erasmus backs under-fire Wales boss Warren Gatland before Saturday's match in Cardiff.

  Rassie Erasmus' first game in charge of South Africa was against Warren Gatland's Wales in June 2018 in Washington DC, which Wales won 22-20

  Coverage: Live on S4C, BBC Radio Wales, Radio Cymru, live text and commentary on the BBC Sport website and app

  South Africa's double World Cup-winning coach Rassie Erasmus has backed under-pressure Wales boss Warren Gatland before their Autumn Nations Series match in Cardiff on Saturday. Wales' 52-20 defeat against Australia last weekend meant Gatland's side have slumped to a record 11th successive Test loss, the worst results sequence in the nation's 143-year history. Gatland has overseen just six wins from 23 Tests since returning for a second stint as head coach in December 2022, with Wales slipping to 11th in the world rankings. Now the world champions lie in wait for Wales this weekend, with question marks surrounding Gatland's future. "Warren can't all of a sudden become a bad coach with his track record," said Erasmus. "The players that they have, if you look at them individually, there are some world-class players in there. "I know the record of losing 11 on the trot is not great. I just know Warren is a great coach and I know they've got great players. "It's not quite clicking, but he is a guy who has fixed things before."

  Erasmus and Gatland have coached against each other for Wales and South Africa, while the two were the opposing head coaches when the Springboks defeated the British and Irish Lions in 2021. "We've had good discussions. I think it was in Twickenham where we last saw each other last summer," said Erasmus. "We had a good chat there about the Lions series. Although we've bumped heads in the past, he's a rugby man through and through. "Coaching can become lonely, It's cut-throat. Whenever someone is under the pump, you don't wish anything bad on that person. "I wouldn't say I'd love him to beat us, but I'd love him to be successful. I've got a lot of respect for him and hope he gets the respect from everyone he deserves." Erasmus took the South Africa reins in 2018, when the Springboks were at a low ebb, before guiding them to World Cup success in 2019 and 2023. "It's tough to talk about other people's situations, but I can try and put myself in Warren's [shoes] because I have been there before," said Erasmus. "Sometimes you just turn it around because players believe in a coach, sometimes you just say a right word and the players say they are going to do it for the coach and the country. "We are preparing for the Wales we know. We find them very similar to Argentina, almost like South Africans, in terms of people working hard and players who have ground it out before. "They are a team with everything to gain and nothing to lose."
