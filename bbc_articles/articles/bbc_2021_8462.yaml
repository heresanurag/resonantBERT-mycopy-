title: 'Bangladesh factory fire: Owner arrested after blaze kills 52 - BBC News'
date: '2021-07-10'
section: Asia
url: http://www.bbc.co.uk/news/world-asia-57790294
content: |-
  Eight face murder charges, and a separate inquiry into child labour at the factory is also launched.

  Victims were trapped inside the burning building because a key exit had been locked, officials said

  Police in Bangladesh have arrested the owner of a factory where at least 52 people died in a fire late on Thursday.

  Abul Hashem, the owner of Hashem Foods, and four of his sons were among eight people detained on Saturday. Police say they all face murder charges.

  Authorities said many of those who died were trapped inside the building because a main exit was locked.

  Children were among the victims and a separate inquiry into the use of child labour has been launched.

  Bangladesh labour minister Monnujan Sufian told AFP news agency that she had been to a hospital and spoken to survivors as young as 14.

  "If child labour is proved, we will take action against the owner and the inspectors," she said.

  Hashem Foods is a unit of the multinational Sajeeb Group of which Mr Hashem is chairman and managing director. Also arrested on Saturday was the group's chief executive officer, Shahan Shah Azad, and other senior officials, the Dhaka Tribune reported.

  Prior to his arrest, Mr Hashem told Bangladeshi media that "workers' carelessness" such as a discarded cigarette could have started the fire.

  This father took a picture of his missing daughter to a hospital in Dhaka

  The blaze broke out on Thursday night on the ground floor of the six-storey factory in Rupganj, an industrial town near the capital, Dhaka. Emergency crews said most of the victims had been trapped on the third floor.

  Fire official Abdullah Al Arefin said each floor was accessible by two stairways which some workers couldn't reach because the blaze had cut them off. He said some people managed to escape to the roof via the stairs and were rescued, but others could not because a door leading to the roof was locked. He said many of those trapped had jumped from windows to escape the flames.

  The fire, fuelled by chemicals and plastics stored inside the building, burned for nearly 24 hours before it was put out.

  Relatives are giving blood samples for DNA testing to help identify the victims

  More than 50 people were injured and worried families have been gathering at hospitals to look for their missing loved ones.

  Laizu Begum said her 11-year-old nephew was among those unaccounted for.

  "We heard the door of the floor where my nephew worked was padlocked. Then we realised, after seeing how big the fire was, that he is probably dead," she said.

  Worried father Chandu Mia was at the hospital with a photograph of his 15-year-old daughter. "I am not sure if she is alive," he said.

  Survivors and families told AFP that child workers at the factory were being paid 20 taka ($0.24; £0.17) per hour.

  Bilal Hossain said he had been to the hospital morgue to claim the remains of his 14-year-old daughter Mitu Akter.

  "I sent my baby girl to die. How will I tell her mother?," he said, adding that the factory even owed his daughter back wages.

  Bangladesh is no stranger to deadly fires and disasters involving high-rise buildings and government critics say safety standards are still lax.

  Safety reforms were promised after the Rana Plaza disaster in 2013 when a nine-storey building collapsed killing more than 1,100 people. At least 70 people also died in 2019 when fire ripped through apartments in Dhaka where chemicals were illegally stored.
