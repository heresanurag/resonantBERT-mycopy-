content: |-
  The government announced its long-promised plan to close the gap between rich and poor parts of England.

  Letters are all about timing...

  Putting in a letter of no confidence against the prime minister is not as straight-forward as it might sound for some who are looking to the next stage of the process. A former minister has told me they have decided to make their own submission, but are waiting until they are sure they have the numbers to oust Boris Johnson. You see, once the 54 letters have come in and triggered the vote, under the party rules, another challenge could not be mounted for a year. "What we can't have is the prime minister free from challenge for another 12 months," the ex-minister told me. They say other colleagues also don't want to "jump the gun" too, adding: "What's holding people back is the worry a leadership contest may give him a mandate to continue." While the "right thing to do" would be to put their letter in, they add, the "pragmatic approach" was to wait longer - given the full Sue Gray report, policy inquiry and a "steady drip of allegations" were still to come. "The end is almost inevitable. The question is - is now the right time to put a letter in? We need to be sure we can win the vote."
