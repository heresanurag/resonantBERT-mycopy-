id: bbc_2018_12346
title: 'Trump: US synagogue shooting ''terrible'' - BBC News'
date: '2018-10-27'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-46003895
content: |-
  President Trump says a shooting in a synagogue in Pittsburgh may have been averted, if a guard had been in place.

  President Trump has told reporters a shooting in a synagogue in Pittsburgh may have been averted, if a guard had been in place.

  Four police officers are among those wounded. Police have not yet said how many people were killed.
