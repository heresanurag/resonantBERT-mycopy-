title: Your pictures of Scotland 5 - 12 March - BBC News
date: '2021-03-12'
section: Scotland
url: https://www.bbc.co.uk/news/uk-scotland-56320559
content: |-
  A selection of your pictures of Scotland sent in between 5 and 12 March.

  Send your photos to scotlandpictures@bbc.co.uk. Please ensure you adhere to the BBC's rules regarding photographs that can be found here.

  Please also ensure you follow current coronavirus guidelines and take your pictures safely and responsibly.

  Conditions of use: If you submit an image, you do so in accordance with the BBC's terms and conditions.

  Making a splash: "Male chases female goosander to get a bit of her fish supper," says Gus Traill of this image taken on the River Nith in Dumfries.

  Are you kidding? Three wild goats born on Langholm moor were spotted by Caroline Blackie.

  Pretty patterns: These "stunning colours" were found in the woods near Dunfermline by David Boyle.

  Striking scene: "Lovely stroll through Princes Street Gardens on Saturday morning," says Neil McRobie. "Fountain looking amazing."

  I need direction: Michael Stewart came across this "helpful sign" on the coastal path between Inverbervie and Johnshaven.

  Colourful character: A heron, taken at Scone Park, by Nick Yeats.

  Take your pick: A climber caught at sunset at Ben Macdui by Karolina Samerek.

  And they're off: Alex McSorley took a walk up to Kelso racecourse and captured this photo of the horses.

  Spring scene: Crocuses in Stow sitting in the sunlight were snapped by Derek Brown.

  Industrial setting: Rab Smith saw these oil platforms moored in the Cromarty Firth.

  Out and about: A sunny weekend in the Pentlands from Rachael Fleming.

  Starry night: Stuart Gilbert sent in this view over the East Neuk of Fife.

  Doonhamer's delight: Devorgilla Bridge reflections on the River Nith in Dumfries from Susan McCormick.

  On the road: "A photo through the ears of my pony Dolly at Loch More, Caithness," says Cath Whittles.

  Dusk descends: Photography student Murronrose Dunn caught this scene at New Lanark Mill.

  Can you dig it? "This is a picture of my son Arran Morris at Westport Beach by Campbeltown," says Kathryn Nelson.

  Over the fence: Julie Macrae sent in this image of 95-year-old neighbour, Rene Cook, in Inverness.

  Take it to the bridge: Crossing the Clyde at Dalmarnock/Rutherglen from Lynsey Fraser.

  Feeding time: "Taken whilst on a walk just outside Kilmarnock with my friend Angela Murray," says Roslyn McCourty.

  Perfect poise: Marie-Pierre Garroway of High Burnside saw this "beautifully balanced" goldfinch while out walking.

  Bobbing along: A morning paddle at Rosemarkie beach in the Highlands for Olivia Philips.

  Lockdown traffic jam: Busy times on the Union Canal in Edinburgh from Graham Paton.

  Looking up: "A lovely whispering cloud formation adorns the skies above Spean Bridge," says Mark Reynolds.

  Clear day: Kirsty Hunter sent in this crisp view from the River Avon Heritage Trail with the unused Westfield Viaduct in the distance.

  Wonderful walk: Jim Hughes says there is "always something to photograph" along the Water of Leith.

  Keeping warm: Janina Dolny spotted Greyfriars Bobby in some new gear on her walk to work.

  Under the rainbow: Ed Jones saw this scene one afternoon in Portobello.

  Seeing double: A reflective picture of the Dutch Village at Craigton Park, St Andrews from Ian Morton.

  Home sweet home: "Saw this wee cottage on a walk round Muir of Dinnet nature reserve the red really stood out against the grey skies," says Stewart Culross.

  Two's a crowd: "This guy was enjoying the view before I disturbed him," says Bobby Hughes of this image on Dumgoyne.

  Effort rewarded: "The walk to the top of Calton Hill was totally worth it for this stunning sunset over Edinburgh," says Steven Thom.

