  Jordan Henderson: Jurgen Klopp unsure how people 'dare to judge' former Liverpool midfielder Last updated on .From the section Liverpool

  Jordan Henderson (second right) won eight major trophies at Liverpool, including the Premier League title in 2020 Liverpool manager Jurgen Klopp says he does not know how people "dare to judge" Jordan Henderson after the former Reds midfielder left Saudi Arabia club Al-Ettifaq to join Ajax. Henderson, 33, only joined Al-Ettifaq in July and signed a three-year deal, thought to be worth £700,000 a week. He was heavily criticised for the move after being a prominent supporter of the LGBTQ+ community while at Anfield. "I am happy for him," Klopp said, after Henderson's move to Ajax on Thursday. "It looks like he's happy and that's the most important thing to me."
  • None Listen to the latest The Red Kop podcast Same-sex sexual activity is illegal in Saudi Arabia, but on joining Al-Ettifaq in September Henderson said had been "really hurt" by the backlash to his move, adding his intention has always been to "help causes and communities". However, recent reports have suggested he failed to settle in Saudi Arabia and his departure comes after just 17 league appearances. BBC Sport was told the split between the Saudi Pro League and Henderson was amicable, and the financial implications of his departure are said to be "positive" for the Saudis. "I haven't spoken to him about it," said Klopp. "From time to time I forget that I actually don't read these kind of stories that people are critical of the move, first there and now coming back. "I don't know how we dare to judge these kind of things, we have one life and sometimes the decisions are perfect in the first place and sometimes it is different after you make them. He was there and it was 100% an interesting experience. "When I spoke to him [he said] 99% it was football wise absolutely fine. It's the start of something, not like it is here, and many things to develop there in the future but he was not critical of it. "Ajax is a sensational club in a difficult moment. Ajax always played the best football when they have combined their real talent with experience. "It's an experience. In England only do people think 'why do they go abroad when all other countries want to come to England?'. As beautiful as this country is it's an international experience [to play in another country]. For me it was the same. "He can enjoy football and the family will enjoy it because the city is wonderful. I am very happy for him." Liverpool are currently without Mohamed Salah, with the forward at the Africa Cup of Nations with Egypt. He went off injured in the first half of their draw against Ghana on Thursday and Klopp said "we don't know anything" at stage. "I spoke last night with him and how it is with these injuries, you need further assessment," said Klopp. "That's what they are doing now and then we will know more. Of course, it was in that moment a shock: 'Oh my God, what is it?' "We all know how rarely Mo goes off or needs to go off so there is definitely something and we will see."
