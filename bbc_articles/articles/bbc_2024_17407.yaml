title: 'Newspaper headlines: Biden under pressure and Cavendish''s Tour de France
  record - BBC News'
date: '2024-07-04'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cd1xnr0qz4jo
content: |-
  The election, the US president's bid for a second term and a 35th stage win for Mark Cavendish feature in the papers.

  Political coverage and commentary takes up most of the front pages. The BBC, along with other broadcasters, is not allowed to report details of campaigning while the polls are open. Away from the UK election, a number of papers report on speculation that US President Joe Biden is considering ending his bid for a second term in the White House. It follows a shaky performance by Mr Biden in his first debate against Republican contender Donald Trump last week. The Guardian reports that, at a briefing on Wednesday, White House press secretary Karine Jean-Pierre said Mr Biden was "absolutely not" thinking about stepping back, external and that he had been "very clear" he was busy doing his job. A CBS News poll which indicated Mr Biden was in the lead a month ago found that Trump was two points ahead following the debate, according to The Financial Times. The paper says Mr Biden is under mounting pressure to withdraw, as Democratic politicians, party operatives, and donors question his prospects. The paper also reports on the impact that Hurricane Beryl, external, which became the earliest category five Atlantic hurricane on record as it moved across the Caribbean this week, is having on the insurance sector. It says the storm has "battered" shares as insurers prepare for significant losses and fuelled fears that warming oceans will worsen such storms in the future. The Times reports on the awarding of the Order of the Thistle, Scotland's highest order of chivalry, to Queen Camilla and Duke of Edinburgh, external. The paper says King Charles III gave the two the honour in recognition of their charitable work in Scotland.

  Mark Cavendish won his 35th Tour de France stage on Wednesday, surpassing a record set in 1975

  The Sun says hopes are rising that a drug that has been found in trials to slow memory decline in Alzheimer's patients will soon be available, external on the NHS. Donanemab - which clears the brain of toxic proteins - has been approved in the United States. The paper says the UK's Medicines and Healthcare products Regulatory Agency is expected to rule on Donanemab's use by the NHS before the end of the year. Alzheimer's Research UK tells the Sun that this marks another important milestone in the global effort to tackle dementia. An archeological survey of more than 1,000 hectares of land, external in Shropshire has identified a wealth of previously unknown features, according to the Guardian. The paper says two grand Roman villas as well as a number of earlier iron age farmsteads have been detected. It says the survey is the largest ever conducted by the National Trust - and an archaeologist tells the paper that the extent of the discoveries was a "surprise". In sport, the Times reports that Gareth Southgate may switch, external England's formation for the Euros quarter final against Switzerland after practising with a three-man defence in training. And the Guardian carries a picture of cyclist Mark Cavendish with his arms raised as he crossed the finish line to win the fifth stage of the Tour de France on Wednesday. The win took the 39-year-old to 35 stage wins in the race, meaning he has surpassed a record set by Belgian Eddy Merckx in 1975.

