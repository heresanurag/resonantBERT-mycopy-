content: |-
  The musician tells Jamie Oliver, who is guest editing R4's Today, how cooking is a space for his neurodiversity.

  Musician Loyle Carner told Jamie Oliver how he hopes to expand his self-funded cooking school to help more young people with ADHD.

  Loyle explained how food was always a space for his neurodiversity "to exist".

  Chef and campaigner Jamie Oliver was guest-editing BBC Radio 4's Today programme on Tuesday for a special episode.
