  A string of other MPs also reacted angrily to Mrs May's comments.

  Conservative Remain-backer Dominic Grieve said her "attack on the integrity of MPs is very unfortunate".

  Speaking to BBC News, the former Attorney General said he would not be "bullied by anyone in government into supporting something that I think will do our country a great deal of harm".

