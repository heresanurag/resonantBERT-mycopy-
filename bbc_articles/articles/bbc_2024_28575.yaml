  In Beirut, two TikTokers are filming the damage caused by Israeli air strikes for families who have fled.

  As people are displaced by the Israeli air strikes pounding the Beirut suburb of Dahieh, two TikTokers are filming the damage for families who have fled.

  Ali Baydoun and Adam Kassak post videos online documenting the scale of damage to buildings for those who have been forced to abandon their homes at short notice.

  Dahieh, a Hezbollah stronghold, has come under heavy fire from the Israeli force in recent weeks.
