title: 'As it happened: Rise in Covid infections slowing in UK, ONS says - BBC News'
date: '2020-11-06'
section: UK
url: http://www.bbc.co.uk/news/live/uk-54837611
content: |-
  New coronavirus infections in England have stabilised at around 50,000 a day, new figures suggest.

  The prime minister has defended data used by the government to justify the lockdown in England, saying the "data is really irrefutable about what is happening now in the country."

  A chart presented at Saturday's No 10 briefing suggested a worse-case figure of up to 1,500 deaths a day by 8 December, but that has been adjusted down to 1,010 a day, after an error was found.

  Downing Street said it accepted a mistake had been made but the "underlying analysis" of the threat to the NHS was correct.

  Asked about it on a visit to Leicestershire, Boris Johnson said: "The thing is the data is really irrefutable about what is happening in the country - that's why we've had to take the action we have and I very much regret it.

  "But if you look at the admissions to hospitals, they are 25% up on last week, the overall number of Covid patients in hospitals is now more than 10,000... and climbing quite fast, and the number of deaths alas is on an upward curve."
