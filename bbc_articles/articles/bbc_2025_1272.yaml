title: EuroMillions £65m jackpot claimed by UK ticket-holder - BBC News
date: '2025-02-17'
section: UK
url: http://www.bbc.co.uk/news/articles/c3w8w7v0n2xo
content: |-
  A single ticket in the UK held the winning numbers for the Valentine's Day draw.

  A claim has been made by a UK ticket-holder for the Valentine's Day's £65m EuroMillions jackpot. National Lottery operator Allwyn said the lucky ticket-holder came forward over the weekend to claim their prize of £65,341,620.50. The operator added that Saturday's £7.4 million Lotto jackpot had also been claimed by a single ticket-holder. Andy Carter, senior winners' adviser at Allwyn, said: "It's been an astonishing weekend of millionaire-making, which promises to keep me and my team very busy."

  The EuroMillions winner matched all seven numbers on Friday's draw - 04, 14, 31, 36 and 38 with Lucky Stars 03 and 10. Fourteen UK players also netted £1 million each in Friday evening's EuroMillions UK Millionaire Maker draw. Mr Carter said on Monday that seven of those winners are still yet to claim their prize. "We're asking everyone to check their tickets and we're very much looking forward to meeting all the lucky winners soon," he added. Friday's ticket-holder is the second UK EuroMillions jackpot winner of 2025. Earlier this month, one anonymous ticket-holder scooped a prize of more than £83.4m after it was left unclaimed for 13 days. Winners must claim their prize within 180 days of the draw. Successful players can decide whether they want to be named or remain anonymous upon claiming the prize. The UK's biggest EuroMillions jackpot, worth £195m, was claimed by an unnamed winner in July 2022. That same year, a then record-breaking £184m was won by Joe and Jess Thwaite from Gloucester, with a Lucky Dip ticket for the draw on 10 May. There are nine EuroMillions prizes yet to be claimed by UK ticket-holders, according to the National Lottery's website, external, with the largest standing at £1m.
