  Watch: Labour’s Damien Egan gives victory speech

  New Labour MP for Kingswood Damien Egan said 14 years of Conservative governments had "sucked the hope out of our country", as he thanked his constituents after his by-election victory.

  Labour also won the Wellingborough by-election, overturning big Conservative majorities in both seats.
