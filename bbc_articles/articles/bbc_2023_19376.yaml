title: 'Watch: Policeman commandeers bike to chase drug dealer - BBC News'
date: '2023-12-06'
section: General
url: http://www.bbc.co.uk/news/uk-67629952
content: |-
  PC Lewis Marks used a member of the public's bike to chase down a man in Northampton.

  Newly released police footage showed PC Lewis Marks jumping out of his van and commandeering a member of the public's bike to catch a suspected drug dealer.

  The man, who was tackled to the ground on 23 August, was charged with two counts of possession with intent to supply Class A drugs, possession of criminal property and escaping lawful custody.

  He has been sentenced to three years and eight months in prison.

  The video shows PC Marks using the bike to chase the man across the grass and intercept him in Northampton town centre, where he was arrested.
