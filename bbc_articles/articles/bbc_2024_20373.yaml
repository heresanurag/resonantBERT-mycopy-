title: 'Paris 2024: Shelly-Ann Fraser-Pryce withdraws from Olympic 100m with injury
  - BBC Sport'
date: '2024-08-03'
section: Olympic Games
url: http://www.bbc.co.uk/sport/olympics/articles/cv2gg4e0320o
content: |-
  Sprint icon Shelly-Ann Fraser-Pryce withdrew from the Olympic 100m competition before her semi-final because of injury.

  Sprint icon Shelly-Ann Fraser-Pryce withdrew from the Olympic 100m competition before her semi-final at Paris 2024 on Saturday because of injury. The 37-year-old Jamaican, a five-time world and two-time Olympic 100m champion, is competing at her final Games before retirement. Fraser-Pryce, who has 24 global medals, qualified from her heat on Saturday but did not line up in the semi. She is part of Jamaica’s women's 4x100m team, who won gold in Tokyo three years ago. On Sunday Fraser-Pryce said it was "difficult" to "find the words to describe the depth of my disappointment". In an Instagram post, she said: "I know that my supporters share and shoulder this disappointment with me."

  Fraser-Pryce and US sprinter Sha'Carri Richardson, who went on to win silver, were delayed entering the warm-up area after being denied entry by officials at a gate they had previously used. However, Jamaica chef de mission Ian Kelly later confirmed Fraser-Pryce's absence was because of injury. "Mrs Fraser-Pryce was allowed to enter the warm-up track but from another gate from which she was directed to enter from," he said. "There is no truth that she was not allowed to enter the stadium. Unfortunately she was not able to compete due to an injury sustained during her final warm-up." Fraser-Pryce was bidding to make the 100m podium at a fifth successive Olympics after being denied a third title by team-mate Elaine Thompson-Herah in Tokyo three years ago. The third-fastest woman in history with a personal best of 10.60 seconds, Fraser-Pryce announced her decision to retire in February - 17 years after she first appeared on the global stage for Jamaica's 4x100m relay team at the 2007 World Championships.
