title: Chuka Umunna tells Jeremy Corbyn to 'call off the dogs' - BBC News
date: '2018-09-08'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-45453807
content: |-
  The anti-Brexit backbencher claims Jeremy Corbyn is driving centre-left MPs out of the Labour Party.

  This video can not be played To play this video you need to enable JavaScript in your browser. Chuka Umunna tells Labour's leader to "call off the dogs"

  Labour MP Chuka Umunna has accused leader Jeremy Corbyn of driving centre-left MPs like himself out of the party.

  The MP - a leading member of the cross-party People's Vote for a second EU referendum - urged Mr Corbyn to "call off the dogs".

  In a speech, the MP said so-called moderates face a "clear and present danger" of being run out of the party by hardline factions.

  Some of Mr Corbyn's critics have faced battles with their local parties.

  Three of them lost no-confidence votes by local party members in their constituencies this week.

  Chris Leslie, MP for Nottingham East, accused the party leadership machine of orchestrating the move after losing a vote on Wednesday.

  Fellow MPs Joan Ryan, for Enfield North, and Luton South's Gavin Shuker also dismissed the votes, which carry no official force in the party.

  They said they would carry on as usual, with Ms Ryan blaming "Trots, Stalinists, Communists and assorted hard-left" for the 94-92 vote defeat.

  This video can not be played To play this video you need to enable JavaScript in your browser. Jeremy Corbyn emphasises his party's aspirations following criticism by former PM Tony Blair

  It comes as Shadow Chancellor John McDonnell prepares to begin a speaking tour of the UK in a bid to draw a line under bitter infighting in the party and push the agenda onto Conservative spending cuts, the Guardian reports.

  He is expected to launch the "road to rebuilding the economy tour" later in Broxtowe, the Nottinghamshire constituency of Conservative MP Anna Soubry, the paper says.

  Earlier this week, former Prime Minister Tony Blair said he was "not sure it is possible" for Labour "moderates" to take the party back from Mr Corbyn and the left - and hinted at the creation of a new "centre ground" party.

  Meanwhile, Aberconwy Conservative MP Guto Bebb - a former minister - has joined the calls for another referendum, saying the public should "decide if they are happy" with the prime minister's deal.

  Mr Umunna has written to members of his local Labour Party in Streatham, south London, to deny reports that he is involved in talks about a new party, the New Statesman reports.

  In a speech to the Blairite campaign group Progress, the former frontbencher said MPs were being targeted for standing up for zero tolerance of racism.

  He said: "My message to our leadership: it is within your power to stop this, so call off the dogs and get on with what my constituency, one of the most diverse communities in the nation, demands we do - without equivocation, fight this Tory Brexit.

  "That is where all our efforts should be."

  Mr Umunna told the BAME Voices for Progress conference that the Brexit debate has normalised hatred and that black and minority ethnic voters have "paid the price".

  He warned the Labour leadership it would be a "complete betrayal" of the party's values to "act as a bystander and wave through this disastrous Brexit" and called for it to back a referendum on the final deal.

  They told the BBC: "This is incoherent and inaccurate, and does a disservice to his constituents who want Labour to oppose the Tories' brutal cuts to the services our communities rely on."

  Joan Ryan, MP for Enfield North, lost a no-confidence vote in her constituency earlier this week

  Other Labour MPs who have lost local confidence votes include Frank Field, who quit the parliamentary party last week - citing the handling of the anti-Semitism row and bullying in local constituency parties - and Kate Hoey.

  These ballots were organised by activists angry at Mr Field, Ms Hoey and Mr Stringer's decision to back the government in Brexit votes, which they say robbed Labour of the chance of forcing a general election it could have won.
