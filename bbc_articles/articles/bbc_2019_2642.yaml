id: bbc_2019_2642
title: 'Ethiopian Airlines: Mourning the crash victims - BBC News'
date: '2019-03-13'
section: General
url: http://www.bbc.co.uk/news/world-africa-47547848
content: |-
  Relatives of the people who died on board an Ethiopian Airlines flight have been speaking of their grief.

  An Ethiopian Airlines flight from Addis Ababa to Nairobi crashed on 10 March, killing 157 people.

  Among them were passengers from 30 countries and 21 United Nations staff members.

  Some of the victims relatives have spoken of their grief and shock.
