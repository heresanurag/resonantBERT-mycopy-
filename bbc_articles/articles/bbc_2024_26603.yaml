  “Alison and Noel held me and comforted me and pushed me to carry on,” she said. “We then found the pieces on the floor, and the team kept them safe for me and actually ran out to buy me a new chain. "After this I just couldn’t stop the tears from flowing for the rest of the challenge, which is why I look so puffy and ugly, but I continued to carry on but I couldn’t give it my all.” The 34-year-old mother of three, from Carmarthenshire, is one of twelve amateur bakers competing on this year’s Bake Off. “I wasn’t sure whether to say this, but I am, it’s part of me and my journey,” she said. “[It] consumed almost all of the showstopper. It’s not a sob story or an excuse as to why I didn’t do amazing, but it’s something I want to explain. And with it being Baby Loss Awareness week next week, it feels appropriate to share awareness.”

  Georgie is one of twelve contestants on this year's Bake Off

  This week’s showstopper challenge, which was broadcast on Tuesday evening, required the bakers to create a puppet theatre out of biscuits. “I really wanted to create something special in this showstopper for Wales, I’m really sorry I couldn’t give it my best," she said in a Instagram post on Tuesday night. "I don’t look for sympathy or anything of the sort. I just want to explain why I didn’t give my best," she added. Georgie said she later discovered that she was not the only contestant on the show affected by the loss of a child. Fellow Bake Off contestant Nelly, who lives in Dorset, created a 'Forest Dance' puppet theatre and told the programme her piece was "about my relationship with my husband". “We went through a lot of obstacles, but on the end of the forest is the light. We have two beautiful children and there are five stars – each one represents our babies which are no more with us," Nelly said on the show. Georgie said Nelly "shared her grief with me", adding: "We got up and carried on." “For anyone struggling, please know you’re not alone," said Georgie. If you are affected by any of the issues in this article you can find details of organisations that can help via the BBC Action Line.
