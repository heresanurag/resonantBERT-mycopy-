content: |-
  GBBO's Georgie says her life changed forever when her daughter was stillborn at 25 weeks.

  Bake Off's Georgie told her followers "you're not alone" after sharing that her daughter was stillborn in 2021

  The Great British Bake Off contestant Georgie has said filming for the show's latest episode was "exceptionally hard" after the necklace she wore to remember her late daughter broke. Georgie told her Instagram followers "you're not alone" after revealing that her life changed forever in 2021 "when my little girl was stillborn at 25 weeks". “During the showstopper challenge, my necklace that I wear daily with her hand and footprint, and my mother-daughter necklace, broke half way through the challenge without me knowing, and I had a meltdown," she said. Georgie described how she was comforted by presenters Alison Hammond and Noel Fielding and said the Channel 4 production team "were absolutely amazing".

