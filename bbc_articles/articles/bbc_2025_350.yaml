title: Kennington family loses 'safe place' as their home burns down - BBC News
date: '2025-01-05'
section: Oxford
url: http://www.bbc.co.uk/news/articles/cjdlz4mpemmo
content: |-
  Laura, Toby and their two autistic sons now live with grandparents after losing their home in fire before Christmas.

  'Whole life gone' in house fire, family says

  Laura and her family lived in the bungalow that her grandma built

  A mother has said she watched her "whole life just go" as her home was destroyed by fire just before Christmas. Laura, 37, said her family, from Kennington, Oxfordshire, were having breakfast and preparing to go to school on 11 December when at her husband Toby shouted that the house was on fire. The parents and their two autistic sons Joshua, 12, and Jake, 11, managed to get out of their bungalow with only their pyjamas on. They lost two cats in the fire. Laura said it was "heart-breaking" that their "safe place is just all gone".

  The family got stuck in the burning house because of the smoke

  They managed to open a window before finding their escape route

  Toby said the only thing that had been going through his mind was: "Just get out. Get everyone out of the house as soon as possible." His wife said she had seen "three-foot flames, which looked just like little orange ripples" outside her bedroom door. "It's only a little bungalow, so between the living room is the kitchen and the porch front door," Laura said. "We got stuck in the porch because of the smoke and couldn't see the door to get the key to open [it]. "We managed to open a window, which gave as a gust of air, which made us see the lock and managed to get out the house."

  Toby said the only thing going through his mind during the fire was to "just get everyone out"

  The parents said the fire service arrived "really quickly" but it had "felt like forever" as they were watching the fire ravage their home. "We just didn't know what to do because you think you would grab this, grab that, but you don't - you just need to get out. "You just don't think it's ever going to happen to you." They said one of their kittens ran out with them and was saved. "Unfortunately, we lost two cats in the fire - a 16-year-old cat and the kitten's brother."

  Laura said they wanted to keep life "as normal as possible" for their two sons after the fire

  Laura said the road had been busy that morning, with people going to or coming back from work. "Everyone came and got us coats and some slippers so we didn't get so cold. "It was the worst day of our life, but... the community of Kennington has been amazing. "They've been so warm and welcoming with donations of clothes, food and just wanted to talk to us." Laura said the bungalow had been built by her grandmother. "I've been there sixteen years, so it's been like watching my whole life just go," she said. "We had a new floor put down and a new dishwasher but it means nothing when I know the boys are OK. "It's just heart-breaking to know that [our] safe place is just all gone." The family is now staying with Laura's grandparents, who live nearby. "We could've gone into emergency accommodation but I don't know where that would have put us," Laura said. "With the boys' autism and learning disabilities, we want to keep it as normal as possible."

  Laura said it was "heart-breaking" to know their safe place "is just all gone"

