  England missed out on further athletics medals as Holly Bradshaw and Molly Caudery came fourth and fifth respectively in the women's pole vault, Sophie McKenna finished fifth in the shot put and Alexandra Bell was fifth in the 800m.

  There was boxing throughout day nine in Australia with 13 fighters from the home nations moving into their respective finals on Saturday. Six Northern Irish boxers - Brendan Irvine (men's -52kg), James McGivern (men's -60kg), Carly McNaul (women's -51kg), Kurt Walker (men's -56kg), Aidan Walsh (men's -69kg) and Michaela Walsh (women's -57kg) - won their semi-final bouts on Friday, although Steven Donnelly had to settle for bronze in the men's -75kg tournament. England enjoyed a good day in the boxing ring as well as Galal Yafai (men's -49kg), Lisa Whiteside (women's -51kg), Peter McGrail (men's -56kg), Pat McCormack (men's -69kg) and Frazer Clarke (men's +91kg) all advanced into finals. There were semi-final defeats for Luke McCormack (men's -64kg) and Cheavon Clarke (men's -91kg) with both men getting bronze medals. Wales had mixed fortunes as Lauren Price (women's -75kg) and Sammy Lee (men's -81kg) both reached finals, but Michael McDonagh lost in the men's -60kg category. The two Scottish fighters who had reached the semi-finals - Reece McFadden (men's -52kg) and John Docherty (men's -75kg) - both lost their fights. It means there will be a total of 16 home nations fighters going for gold on Saturday as Wales' Rosie Eccles (women's -69kg), England's Sandy Ryan (women's -69kg) and Northern Ireland's Kristina O'Hara (women's 45-48kg) had booked their places in finals earlier this week.

  01:30: Hockey - women's bronze medal match. Having lost their semi-final with New Zealand on penalties, England face India before the Kiwis play Australia in the final. 04:32: Boxing - men's -91kg final. New Zealand's David Nyika - the winner of 2014 light-heavyweight gold - spent part of last year training in a car park after splitting with his long-term coach. Nyika beat England's Cheavon Clarke in the semi-finals and fights Australia's Jason Whateley in the final. 05:40: Athletics - men's 4x100m final. Great Britain won a memorable relay gold at the 2017 World Championships in London and two of that quartet, Nethaneel Mitchell-Blake and Adam Gemili, will be in action for England. Usain Bolt anchored Jamaica to gold four years ago and, even in his absence, Jamaica will take some beating once more. 05:57: Athletics - women's 4x100m final. Reigning champions Jamaica remain the team to beat in this relay, particularly with Olympic champion Elaine Thompson likely to be in their ranks, but England could threaten an upset having won silver at the 2017 World Championships. 06:02: Netball - semi-finals. England face Jamaica with Australia meeting New Zealand in the other semi-final. 07:38: Athletics - women's 4x400m final. Jamaica won gold in a Games record of 3:23.82 four years ago and will be among the favourites again. 09:32: Boxing - women's -57kg final. Northern Ireland's Michaela Walsh will be looking to upgrade her silver medal from Glasgow 2014 but will be mindful of local favourite Skye Nicolson, who is following in the footsteps of her late brother Jamie. 11:30: Basketball - women's gold-medal match. After stunning Canada in the semi-finals, England go for an unlikely gold in the final against Australia.
