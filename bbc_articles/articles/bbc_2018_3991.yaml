  Daley had won gold in the synchronised 10m platform diving with Max Brick in 2010, and a silver with James Denny in Glasgow four years ago. But the 23-year-old returned to the gold-medal position with Goodfellow, 21, in Australia as the pair scored 405.81 points. Fellow Englishmen Dixon and Williams, both 17, collected 399.99 points to take silver. Daley has now won four Commonwealth gold medals, having also won 10m platform individual golds in 2010 and 2014. Injury meant he could not defend his individual title this time. "I didn't know if I was going to be able to compete so this medal means a whole lot to me," said Daley. "This has been a really rough and rocky ride. It was close to whether I would be pulled from the synchro. I had massage, compression, ice baths - I did everything I could to get myself in the best possible shape." Goodfellow added: "He has been struggling all week but it shows what a great competitor he is. We only did our dives two days ago so we didn't know what would happen." Laugher, who had already won the men's 1m springboard and 3m springboard, secured his third gold of the Games as he and Mears scored 436.17 points, well clear of Canada's Philippe Gagne and Francois Imbeau-Dulac on 415.23.

