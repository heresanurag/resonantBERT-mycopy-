title: 'Commonwealth Games: Katarina Johnson-Thompson and Tom Daley among gold medallists
  - BBC Sport'
date: '2018-04-13'
section: Commonwealth Games
url: http://www.bbc.co.uk/sport/commonwealth-games/43750400
content: |-
  Katarina Johnson-Thompson and Tom Daley are among the gold medallists on the ninth day of the Commonwealth Games.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Katarina Johnson-Thompson and Tom Daley were among the winners as home nations athletes secured five gold medals on the ninth day of the Commonwealth Games. England's Jack Laugher won his third gold medal on the Gold Coast as he and Chris Mears triumphed in the men's synchronised 3m springboard competition, with Daley and Dan Goodfellow winning the men's synchronised 10m platform event. Elsewhere, bowler Alex Marshall became Scotland's most successful Commonwealth Games competitor by claiming a fifth gold as part of the men's fours, while compatriot Grace Reid won the women's 1m springboard. Wales set a new record for most medals won at an overseas Commonwealth Games. Their previous best was the 25 they secured in New Zealand in 1990, but rhythmic gymnast Laura Halford took them past that figure with a silver in the hoop. Wrestler Kane Charig added another silver in the men's -65kg, while Sarah Wixey won bronze in the women's trap shooting behind Northern Ireland's Kirsty Barr, who took silver.

  England's Matthew Dixon and Noah Williams finished behind Daley and Goodfellow to take silver in the men's synchronised 10m platform event, and 18-year-old Niamh Emerson took a bronze in the women's heptathlon. There were further medals for the home nations in bowls as Scotland's Lesley Doig and Claire Johnston beat Canada's Leanne Chinery and Kelly McKerihen 18-10 to win women's pairs bronze.

  7. Scotland (nine gold, 13 silver, 19 bronze, 41 total), 10. Wales (seven gold, 10 silver, 12 bronze, 29 total), 21. Northern Ireland (one gold, one silver, four bronze, six total), 28. Isle of Man (one silver)

  The England quartet of Louis Ridout, David Bolt, Jamie Chestney and Samuel Tolchard won bronze with a 15-9 victory over the Welsh team of Ross Owen, Stephen Harris, Marc Wyatt and Jonathan Tomlinson in the men's fours. England's Robert Paxton defeated Scotland's Darren Burnett in the men's singles bronze medal match in the bowls. Another Englishman, Charlie Bowling, won bronze in the -65kg wrestling, Scotland's Seonaid McIntosh claimed bronze in the 50m rifle three positions shooting competition and England's Sam Gowin finished with bronze in the rapid-fire 25m pistol event. England's James Arnott took a silver medal in the men's T47 100m race. England's women sprung a surprise in the basketball, beating world number five-ranked Canada 65-53 to move into a final against hosts Australia (11:30 BST, Saturday). In the men's hockey there was disappointment for England, however, as they were beaten 2-1 by Australia in the semi-final. They now face a bronze-medal match against India (10:00 BST, Saturday).

