  Johnson-Thompson added heptathlon gold to the pentathlon title she won at the World Indoor Championships in Birmingham last month. Having led after the first day, the 25-year-old went 31cm clear of the rest of the field in the long jump, before throwing 40.46m in the javelin. Johnson-Thompson safely negotiated the final event, the 800m, to finish on 6,255 points, 122 more than Canada's Nina Schultz, who took the silver. "I was nursing an injury going into day two. I'm just happy I made it over the line; there was no way I was stopping," Johnson-Thompson told BBC Sport. "I'm so happy. It's been a long, emotional two days but I'm glad it's finally over." Emerson, 18, won the 800m to climb from fourth place and take the bronze medal. Zharnel Hughes, who finished first in the men's 200m but was subsequently disqualified for impeding rival Jereem Richards, helped England into Saturday's 4x100m relay final. But the 4x400m team were eliminated after lead runner Matthew Hudson-Smith fell to the track in pain with a leg injury after only 50 metres of the opening leg.

