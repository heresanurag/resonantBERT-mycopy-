  Marshall, 51, won his fifth Commonwealth gold medal as he helped Scotland to a dramatic victory over Australia in the bowls men's fours. Australia led 8-2 after three ends and 13-11 in the final end, but Marshall's team picked up four shots to win gold. This latest success means Marshall eclipsed sprinter Alan Wells and Para-cyclist Neil Fachie, who both won four Commonwealth golds for Scotland. It also means Scotland have won five bowls medals on the Gold Coast, but they were denied a sixth as Burnett lost 21-14 to Paxton in the men's singles bronze medal match.

