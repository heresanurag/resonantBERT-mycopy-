  She wrote: "Whilst we were attempting to create a glass bottle into a vase following a YouTube tutorial it went terribly wrong and it resulted in me incurring injuries and burns requiring continuous hospital treatment over the past seven weeks."

  Ms Quinnen, a pro dancer and. social media influencer, is partner to TV personality AJ Pritchard - best known for his stint as a professional dancer on Strictly and subsequent appearance on I'm a Celebrity... Get Me Out of Here! last year.

  Mr Pritchard told The Sun: "It was just a complete freak accident and what is scary was that helplessness. It felt like time stopped for me. What was seconds, felt like hours to put out the flames."

  He said he worked with his brother, Curtis, who appeared on Love Island in 2019, to save Ms Quinnen.

  "Abbie's hair was on fire. Her top was on fire. Her body was engulfed," he told the newspaper.

  Quinnen urged fans to "be careful" when copying YouTube videos

  "We had to put wet towels on her to cool her skin, then to get her from the flat in West London to A&E."

  The injuries have left Ms Quinnen needing multiple skin grafts as part of her recovery.

  Mr Pritchard said they had been successful but will likely leave "small scars in certain areas".

  "The surgeon was very happy with the way that went and seeing the improvement from week to week," he said.

