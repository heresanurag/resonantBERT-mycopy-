content: |-
  Pro dancer Abbie Quinnen had seven weeks of "continuous hospital treatment" after copying a video.

  Strictly Come Dancing star AJ Pritchard's girlfriend has revealed she had seven weeks of "continuous hospital treatment" after burning herself while trying to copy a YouTube stunt.

  Fellow dancer Abbie Quinnen required skin grafts for her burns after trying to turn a glass bottle into a vase.

  Mr Pritchard said "seconds felt like hours" as he extinguished the flames.

  On Sunday, Ms Quinnen thanked doctors and told fans to "really... be careful" when copying YouTube videos.

  "I will be OK, I love you all," she added in an Instagram post explaining the incident on 19 January.

