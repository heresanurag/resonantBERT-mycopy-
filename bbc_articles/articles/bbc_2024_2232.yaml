content: |-
  The discovery was made on a section of Douglas Beach on Thursday afternoon, police confirm.

  The body was discovered on a section of Douglas Beach opposite Tower House

  The body of a woman was found on the Isle of Man seafront on Thursday afternoon, police have confirmed.

  The discovery was made on Douglas Beach opposite the Tower House shopping centre shortly before 14:00 GMT.

  Police confirmed the dead woman was from the island but no further details have been released.

  An Isle of Man Constabulary spokeswoman said her next of kin had been informed and were being supported by specialist officers.

  "Enquiries are currently ongoing to ascertain the cause of death but we would ask the public not to speculate," she added.

  A police cordon remained in place for just over two hours on Thursday.

