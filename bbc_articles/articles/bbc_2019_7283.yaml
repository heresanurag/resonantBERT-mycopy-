title: 'Carrie Lam: Hong Kong leader''s ''deep sorrow'' over controversy - BBC News'
date: '2019-06-15'
section: General
url: http://www.bbc.co.uk/news/world-asia-china-48646767
content: |-
  Chief Executive Carrie Lam expressed "deep sorrow" over the extradition controversy.

  Hong Kong has suspended its plans to push through a law which would allow extradition to mainland China, its chief executive announced Saturday.

  Carrie Lam expressed "deep sorrow" over the resulting controversy which sparked massive protests.
