title: Video appears to show Ukrainian sea drones sink Russian landing ship - BBC
  News
date: '2024-02-14'
section: General
url: http://www.bbc.co.uk/news/world-europe-68292319
content: |-
  The video released by the Ukraine's military intelligence agency appears to be filmed by cameras onboard the drones.

  Ukraine's military intelligence agency has released footage appearing to show Ukrainian sea drones destroying a Russian landing ship in the Black Sea.

  The big amphibious ship, named the Caesar Kunikov, has sunk off the coast of Russian-occupied Crimea, according to Ukraine's armed forces.

  Powerful explosions were heard early on Wednesday morning, according to local social media, which suggested the landing ship had been hit not far south of the town of Yalta.

