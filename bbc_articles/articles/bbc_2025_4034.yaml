title: Davina McCall 'feels amazing' returning to work after brain tumour - BBC News
date: '2025-03-17'
section: General
url: http://www.bbc.co.uk/news/videos/ce8mpd7pv55o
content: |-
  TV presenter Davina McCall says going back to work is "like the final piece of the jigsaw."

  TV presenter Davina McCall has said going back to work is "like the final piece of the jigsaw" during an interview on the BBC's One Show.

  "I am so happy to be back," she told presenters Alex Jones and Vernon Kay, inher first live interview since being operated on for a benign tumour.

  McCall said her partner, celebrity hairdresser Michael Douglas, played an important role in her return.

  The 57-year-old former Big Brother host revealed in November that a colloid cyst had been found during a health check-up as part of her menopause advocacy work.

  She had surgery and spent time in intensive care, before recovering at home.
