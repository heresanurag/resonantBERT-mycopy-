content: |-
  Fit-again Daniel James returns for Wales, while in-form Rubin Colwill is recalled for their final Nations League games.

  Daniel James has scored seven goals in 53 internationals for Wales

  Daniel James has been named in a Craig Bellamy Wales squad for the first time after missing the first four internationals of this season through injury. The Leeds United winger, 26, is joined by in-form Cardiff City midfielder Rubin Colwill in a 26-strong squad for final Nations League games in Turkey and at home to Iceland this month. Unbeaten in four games under Bellamy, victory over the Group B4 leaders in Kayseri on Saturday, 16 November would put Wales on course to wrap up promotion to League A in their final fixture in Cardiff three days later. Aaron Ramsey remains absent having been sidelined by a hamstring problem picked up in Wales' 2-1 win in Montenegro at the start of September. Leeds' Ethan Ampadu and Swansea City's Ollie Cooper are also unavailable through injury, but Joe Allen retains his place having returned from international retirement as a second-half substitute at Cardiff City Stadium last month. Bellamy has also made one change to his goalkeeping options with Wolverhampton Wanderers keeper Tom King recalled as back-up in place of Sheffield United's Adam Davies.

  This video can not be played To play this video you need to enable JavaScript in your browser. Bellamy explains he 'expected more' from Rubin Colwill at his age

  James missed Wales' opening Nations League games with Turkey and Montenegro in September and the trip to Iceland and home return against Montenegro last month with a hamstring injury. He made his return for Leeds on 18 October and has started the Championship side's past two fixtures, scoring in the 3-0 win over Plymouth last Saturday. James' Leeds team-mate Joe Rodon will earn his 50th cap for Wales if the defender plays in both games this month. Colwill's recall to the senior squad comes as he has been receiving rave reviews during Cardiff's revival under interim boss Omer Riza this season. The 22-year-old attacking midfielder - who featured in the 2022 World Cup - was not initially in Bellamy's first Wales squad in September but was promoted from the under-21s as a late call-up. However, he did not get any game time and reverted to Matty Jones' under-21 squad for last month's unsuccessful Euro 2025 qualifying climax. Wales' squad also includes Harry Wilson, who scored twice in stoppage time on Monday night as Fulham beat Brentford 2-1. It was only a sixth appearance in the Premier League this season for 27-year-old Wilson - all as a substitute - as Bellamy has had to cope with a lack of domestic playing time for a number of his squad. The former Wales captain has raised expectations with his unbeaten start as head coach following the sacking of Robert Page in the summer. After a goalless draw at home to Turkey in the first game, he has enjoyed home and away wins against Montenegro and a 2-2 draw in Iceland. While Bellamy's side travel to Turkey with the prospect of winning the group still in their own hands, defeat would not end their hopes of a return to Nations League A division. There is also a play-off route to promotion if they finish as runners-up, while finishing third would open up the prospect of a March play-off to avoid relegation.
