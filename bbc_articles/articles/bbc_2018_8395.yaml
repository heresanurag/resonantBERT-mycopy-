  • None Sweden have lost three of their past four matches against England, a run which follows 12 consecutive games without defeat against them between 1979 and 2006.
  • None Six of England's last 11 goals against Sweden have been scored via headers, all from different players (Sol Campbell, Steven Gerrard, Gareth Barry, Andy Carroll, Maguire and Alli).
  • None England - who scored with both shots on target on Saturday - have found the net with 10 of their past 13 shots on target at this World Cup.
  • None England have now scored 11 goals in a World Cup for only the second time, also doing so in their victorious year of 1966.
  • None Alli is the second youngest player to score for England at the World Cup (22 years and 87 days), behind only Michael Owen (18 years and 190 days against Romania in 1998).
  • None Maguire became the first player to score their first England goal in a World Cup knockout match since Rio Ferdinand in 2002 against Denmark.
  • None Pickford made three saves in this match and became the youngest England goalkeeper to keep a clean sheet in a World Cup match (24 years and 122 days).
