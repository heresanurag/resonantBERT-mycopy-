title: Murder inquiry launched as teenager dies in New Moston - BBC News
date: '2025-06-08'
section: Manchester
url: http://www.bbc.co.uk/news/articles/c9918glkxrvo
content: |-
  Three people are arrested after a boy was killed in north Manchester, police say.

  Forensics are on scene outside the Fairway Inn pub in New Moston

  A murder investigation has been launched after a teenage boy died in north Manchester. Officers, paramedics and the air ambulance were called to Nevin Road in the New Moston area of Manchester at about 17:00 BST, Greater Manchester Police said. The force has not yet said how the boy died. Three people have been arrested in connection with the incident. Supt Marcus Noden said it was "distressing and heartbreaking" that a boy had lost his life and urged witnesses to come forward.

  Police and forensics officers are at the scene, with a section of Nevin Road cordoned off

  The force said it was "still trying to establish the circumstances" around the incident and several areas had been cordoned off, including outside the Fairway Inn Pub on Nuthurst Rd. An air ambulance was scrambled to the scene, landing in Nuthurst Road Park, a short distance away from Nevin Road.

  Detectives said the boy's family was being supported by specialist officers. Supt Noden appealed for anyone with information to come forward. He said they wanted to hear from "anyone who was in the Nevin Road area" who saw the incident take place. "We will bring updates as we get them as the investigation continues," he added.
