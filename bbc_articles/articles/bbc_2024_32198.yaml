  Alan Clark echoed the delight as he said was "unbelievably proud" of his daughter, Olivia Clark. He said: "She has fought for so long for so many years to get to this stage and she is Wales number one and she is in the Euros final - it is just unbelievable. I am so proud, brilliant." Gareth Fishlock, Jess Fishlock's brother, said he was "so happy" for Jess and described the win as "amazing for the country and everyone involved."

  Wales' most-capped player and record goalscorer Jess Fishlock says qualifying for a major tournament with her country is "the proudest moment of her life"

  Eight-year-old Harlow, said she was "so happy" to be at the game with her dad in Dublin among a crowd of 25,832 supporters. Speaking of the win, her father Joey Healey, 34, said the players have "inspired the next generation of Welsh women football players." "The sky's the limit now thanks to those girls and what they've done tonight." He added that they were "definitely off to Switzerland, but the wife doesn't know yet".

  Father Joey Healey took his daughter Harlow to watch the qualifying game in Dublin

  Wales fan Vikky Perkins, 51, watched the game in Cardiff and said the grit shown by the women matches the Welsh spirit. "It was impossible to breathe for the last ten minutes, Wales played with tenacity and sustained quality and it paid of," she added. "Such an incredible achievement for these individuals, a huge moment for women's football and a proud moment for our country."

  Ruth Billingham hopes to go to Switzerland to watch the women play next year

  Ruth Billingham, 46, from Cardiff, admitted she was not really a football fan but Wales' journey has had her and her daughter gripped. "What an inspiring win! We saw Wales play Ireland in Cardiff last week and it was a great atmosphere. Tonight was the icing on the cake. Bring on the euros!" she said. Her dad, a Cardiff city and Wales supporter for 40 years, Nigel Billingham, spoke of it being a really emotional win for him. The 76-year-old said: "I've been to see both the games in Cardiff [play-off semi-final and first leg of the final] and it's tremendous the team will go to Switzerland."

  Judy Shaw was "sceaming, bouncing, jumping" around the room when Wales secured their place in Euro 2025 making history

  Judy Shaw, 60, said after the team narrowly losing out so many times, she is "absolutely buzzing" at the result. She said: "I am shouting, screaming, bouncing around the room. After so many times we have come so close. Qualification for the Euros!" "Incredible amazing fantastic. Flights will be booked to Switzerland." Her daughter Holly Lewis, 28, was in Dublin and said she "couldn't put into words how it feels". "There is nothing quite like following this team. Wales deserve this. They have deserved this for so long and I'm just so happy for the team that all their hard work has paid off. "I think this will be really big for women's football in Wales. Hopefully it will encourage more people to come to games and support the team. "This is the start of something and I can't wait to see what happens next."

  Supporters in Cardiff say they are heading to Switzerland to support the women "as they would the men"

  Rhodri Williams, watched from a pub Cardiff and said he follows the men so it would be wrong for him not to head to Switzerland and support the women in their first major tournament next year. He added: "It was a really good performance from the girls, looking forward to heading out there next summer." Steffano Antoniazzi from Aberystwyth said he was very nervous but Wales "defended resolutely". "We have seen such an uptake in the women's and men's football so hopefully this just kicks on and we can see more and more girls coming through the system. "Who knows what the future holds."

  John Foster said "you don't get much cooler" than Hannah Cain's penalty score

  Jon Foster said the VAR got his pulse going: "I had no idea what was going on with the VAR check so it was a relief to see what way it went and Cain took it so well, you didn't get much cooler than that." The 52-year-old added that the last 20 minutes were tense but they "held on brilliantly", adding that he thought "Katie McCabe was pretty lucky to stay on as but I'm an Arsenal fan so I'll allow it."

