title: 'Euros 2025: Wales make footballing history in defiant win - BBC News'
date: '2024-12-04'
section: Wales
url: http://www.bbc.co.uk/news/articles/c791nq8nl73o
content: |-
  Wales defeated the Republic of Ireland 2-1 making footballing history in their first major tournament.

  Wales made history by reaching a major women's tournament for the first time

  Wales fans and players are celebrating after they made history by reaching a major women's tournament for the first time. After a level first leg in Cardiff, Wales came out on top against the Republic of Ireland in the second leg, securing their place in the 2025 Euros. Wales' record goalscorer and cap holder Jess Fishlock described the win as being the "proudest moment of her life". Supporters both in Dublin and on home soil have spoken of their pride for the women who are inspiring the next generation.

  Wales' First Minister Eluned Morgan joined supporters in their praise in a post on X, describing Wales' players as "history makers". She added: "An incredible performance to make all of us proud."

