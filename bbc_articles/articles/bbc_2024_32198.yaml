  Former captain Laura McAllister said she was "feeling incredibly emotional but so, so proud of the efforts of these girls". She had previously said says women's football in Wales could be taken to "stratospheric heights" if the national team qualified for Euro 2025. "We've been waiting a very long time for this but we always knew the moment would come. "No one deserves this more than this squad and this group. I couldn't be happier for them." She added she was secretly dreading the Euro draw in Lausanne on 16 December but now "she absolutely can't wait". "My first tournament as a UEFA Vice President with Cymru there competing. Cannot wait."

  McAllister says reaching the finals could prove transformative for women's sport in Wales

  Adding to the congratulations were players' family members, as defender Lily Woodham's mum Julie described the team as "amazing". Speaking after the match, she said: "I cant believe we've done it. Off to Switzerland."

