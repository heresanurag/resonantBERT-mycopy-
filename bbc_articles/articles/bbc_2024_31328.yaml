  Amy Fairman of the River Action campaign group said agricultural waste is responsible for a greater percentage of water pollution than sewage in the UK. She said that while their impact on bees is widely recognised, neonicotinoids also harm marine ecosystems, including river insects. "River insects are right at the bottom of the food chain," she told BBC News. "If we're destroying the bottom of the food chain in our rivers, this is going to have a knock-on effect." The chemicals are also "notably quite dangerous to human health", Ms Fairman said. She suggested people considering swimming in polluted rivers should "understand the levels of contamination" and "educate" themselves about the risks before entering the water. The latest analysis suggests a slight increase in neonicotinoids levels compared to previous years. The Rivers Trust and Wildlife and Countryside Link has pointed out its analysis is based on a small sample size of data provided by the Environment Agency. The charities are calling for more comprehensive river monitoring by the regulator after only a small proportion of the country's river sites were tested for neonicotinoids in the last year.

  Neonicotinoids are used by sugar beet farmers to protect their crops from virus yellows

  At the Labour Party conference in September, Environment Secretary Steve Reed committed to "restore nature and stop animal waste, fertiliser and pesticide pollution running into our waterways." On Monday, a Defra spokesperson said the department is "committed to tackling all sources of pollution to clean up our rivers, lakes and seas. “This government has been clear that we will change existing policies to ban the use of neonicotinoid pesticides that threaten bees and other vital pollinators.” The Environment Agency said its testing was "specifically targeted at sites where we want to better understand the chemical risk and any action needed to protect the environment."
