  Pride celebrations have returned to Glasgow following its cancellation last year due to Covid.

  Thousands of people turned out for the Pride Mardi Gla march from Festival Park to George Square.

  Participants, who were dressed in bright colours, were asked to take a lateral flow test before the event and wear masks.

  About 10,000 people joined the Glasgow march in 2019.

  Glasgow, Birmingham and Nottingham are among the only major cities hosting marches this year with most other events being cancelled.
