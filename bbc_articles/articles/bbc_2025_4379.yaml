title: Zumba-loving great-grandmother toasts 95th birthday with class - BBC News
date: '2025-03-20'
section: General
url: http://www.bbc.co.uk/news/videos/c9wpedderqno
content: |-
  Mary Marson went to her first session in 2017 and now attends three times a week.

  A woman from south London has celebrated her 95th birthday by attending a Zumba class.

  Mary Marson, from Surrey Quays, has been attending classes three days a week since 2017.

  The great-grandmother says she wants to encourage others to keep active in their later years.

