title: Tragedy chanting arrests after Man Utd and Liverpool's FA Cup clash - BBC News
date: '2024-03-19'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-68600056
content: |-
  Police have arrested eight men, two on suspicion of tragedy chanting, after the game at the weekend.

  Police arrested eight men for a range of offences at the FA Cup quarter final tie

  Eight Liverpool and Manchester United fans have been arrested, including two on suspicion of tragedy chanting, after an FA Cup clash.

  Police confirmed the men aged between 19 and 59 were arrested on suspicion of a range of offences including possession of drugs and pyrotechnics.

  Two Manchester United fans were arrested on suspicion of tragedy chanting.

  Greater Manchester Police said the incidents "will not be tolerated".

  A ninth man, aged 34 from Edinburgh, was charged with possession of a class B drug, possession of a pyrotechnic and throwing missiles, and has since been bailed.

  About 72,000 people went to the FA Cup quarter final at Old Trafford to watch Manchester United beat Liverpool 4-3 in a thrilling knockout tie.

  Two Manchester United fans were arrested on suspicion of tragedy chanting

  Eight men were arrested for the following offences:

  Ch Insp Jamie Collins said the force "will clamp down on this and arrest those who engage in such behaviour, regardless of what team they support".

  "We held a supporter group meeting with both sets of fans prior to the match and both groups agreed that tragedy chanting was totally unacceptable."

  He said officers were working with clubs to identify another Manchester United supporter filmed tragedy chanting at the match in footage circulating on social media.

