title: Murder charge after Beswick man killed 'trying to stop car theft' - BBC News
date: '2024-03-19'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-68606057
content: |-
  A man has been charged with murder after Christopher Hanley died on Saturday.

  A 35-year-old has been arrested for the murder of Christopher Hanley

  A man has been charged with murder after a 57-year-old man died while apparently trying to stop the theft of his Land Rover.

  Paramedics found Christopher Hanley's body on Olympic Street in the Beswick area of Manchester on Saturday.

  Marvin Sutton, 35, will appear before magistrates later, Greater Manchester Police (GMP) said.

  A 43-year-old man has been bailed on suspicion of assisting an offender.

  The force has urged anyone with information about Mr Hanley's death - in what it described as an attempted car theft - to come forward.

