title: 'Harshita Brella murder: Corby residents react to investigation - BBC News'
date: '2024-11-18'
section: Northamptonshire
url: http://www.bbc.co.uk/news/articles/cj0jvy7z291o
content: |-
  Harshita Brella's husband is suspected of her murder, but is thought to have fled the country.

  Police are trying to piece together what happened to Ms Brella, who lived in Corby

  People have spoken of their sadness and confusion after the suspected murder of a woman whose body was found in the boot of a car more than 100 miles from her home. Police believe Pankaj Lamba murdered his wife Harshita Brella in Northamptonshire earlier this month. The 24-year-old's body was discovered in Ilford, east London, and the suspect is believed to have fled the country. "I don’t understand how people can do [something] like that," said Aleksanders Nadejs, who lives in the same road as the couple in Corby.

  Neighbour Aleksanders Nadejs said he was "feeling sad" at news of Ms Brella's suspected murder

  Prashant Odedara, who works at a nearby convenience store, said Ms Brella and Mr Lamba visited the shop "once or twice a week" and "didn't talk much about themselves". "Unlike other customers, they were very friendly. We didn’t know much about them... they were just quiet," he said. "They were like normal working people. What was happening in their personal private life, we don’t know much about."

  Shopkeeper Prashant Odedara said Ms Brella and her husband were quiet but friendly people

  Ryan Morgan, 31, who has lived in the road since May, described the last few days as "crazy", because of the emergency services and media in the area. "I've got two young kids, a two-year-old and a four-year-old, so it is a bit worrying knowing that someone has potentially been murdered just next door to us," he said. The BBC understands multiple people lived in the property, along with Ms Brella and her husband.

  Ryan Morgan, who moved into the road in May, said hearing the news was a bit worrying

  Officers said Ms Brella was found in the early hours of Thursday in the vehicle in Brisbane Road, Ilford, more than 100 miles from her home on the Lincoln estate in Corby. They believe Mr Lamba transported her there. Northamptonshire Police had been contacted on the Wednesday regarding concerns for her welfare.

  Ms Brella's body was found about 100 miles away from her home in Corby

  Police have released a photo of Pankaj Lamba, who they believe has fled the country

  The force said it had made a mandatory referral to the Independent Office for Police Conduct because there was previous contact with Ms Brella. The Northamptonshire Telegraph, external first reported she was the subject of a domestic violence protection order, saying it was made in early September and lasted 28 days. Police have since confirmed the order had been in place before Ms Brella's death. Northamptonshire Police said a forensic post-mortem examination, which took place at Leicester Royal Infirmary on Friday, established Ms Brella was murdered. The inquest into the death of Ms Brella is due to open on Wednesday.

  Ms Brella and her husband Pankaj Lamba lived at an address on the Lincoln estate in Corby
