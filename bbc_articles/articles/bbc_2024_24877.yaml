title: Two people rescued as boat capsizes off Southend - BBC News
date: '2024-10-13'
section: Essex
url: http://www.bbc.co.uk/news/articles/cp3wxlj5pwyo
content: |-
  One person is winched into an HM Coastguard helicopter, while the other makes their own way ashore.

  Two people have been taken to hospital, one in a serious condition, after a boat capsized out to sea.

  Emergency services, including an HM Coastguard helicopter and two RNLI lifeboats were called to Shoebury Common beach, in Southend, earlier.

  The coastguard said one of the casualties "was able to make it to shore on his own", while the other was winched into a helicopter.

  Essex police and fire services, and the ambulance service, assisted in the search and rescue operation on the Thames estuary.
