title: Thousands evacuate Californian homes amid dam collapse fears - BBC News
date: '2017-02-13'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38954475
content: |-
  Nearly 190,000 people in Northern California have been told to evacuate their homes after the tallest dam in America was weakened by heavy rainfall.

  Officials say part of the Oroville Dam could collapse at any moment.

  It is the first time the lake has experienced such an emergency in its near fifty year history.
