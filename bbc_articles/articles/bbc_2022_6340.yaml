id: bbc_2022_6340
title: 'War in Ukraine: Video shows Ukraine school destroyed after bombing - BBC News'
date: '2022-05-08'
section: General
url: http://www.bbc.co.uk/news/world-europe-61370417
content: |-
  The governor of the Luhansk region says Russian forces bombed the school on Saturday afternoon.

  Over 60 people are feared dead after a bomb hit a school in the village of Bilohorivka in eastern Ukraine. The governor of the Luhansk region Serhiy Gaidai said Russian forces dropped a bomb on the school on Saturday afternoon where 90 people were sheltering, causing a fire that engulfed the building. 30 people have been rescued so far.
