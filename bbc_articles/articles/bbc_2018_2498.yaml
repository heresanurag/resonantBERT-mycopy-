title: French climber Elisabeth Revol describes 'Killer Mountain' rescue - BBC News
date: '2018-02-02'
section: General
url: http://www.bbc.co.uk/news/world-europe-42914271
content: |-
  French climber Elisabeth Revol says, to be rescued, she had to leave her climbing partner behind.

  French mountaineer Elisabeth Revol says she was forced to abandon her weak and ailing climbing partner in order to be rescued from one of Pakistan's most deadly Himalayan mountains, Nanga Parbat.
