content: |-
  The American has been streaming continuously for 30 days to try reclaim the record he set last year.

  Kai Cenat spent the last 30 days continuously streaming to reclaim the record he set last year

  Kai Cenat has reclaimed the record for attracting the most Twitch subscribers in a single stream. The 22-year-old American had been streaming continuously on the platform for the last 30 days and hosted several guests including Snoop Dogg, Serena Williams and Bill Nye. The number of subscribers amassed in that period was 727,694 – although the final number is still to be confirmed by Twitch. The figure is more than double the previous record of 326,252 which was set by IronMouse in October – breaking Kai’s previous record from 2023.

  Snoop Dogg called Kai on the second day of the stream to talk about his next album and on the fourth day gave him a tour of his Los Angeles home. Viewers were shown the rapper’s recording booth as well as the property’s other luxuries – among them a basketball court, arcade room and casino.

