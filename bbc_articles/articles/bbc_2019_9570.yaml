title: Man crosses English Channel by flyboard - BBC News
date: '2019-08-04'
section: General
url: http://www.bbc.co.uk/news/world-europe-49226353
content: |-
  Frenchman Franky Zapata has become the first person to cross the English Channel on a flyboard.

  Frenchman Franky Zapata has become the first person to cross the English Channel on a jet-powered flyboard.

  Powered by a kerosene-filled backpack, the inventor made the 22-mile (35.4-km) journey in 22 minutes.
