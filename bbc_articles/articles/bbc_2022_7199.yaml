title: Drone test for delivering school meals - BBC News
date: '2022-06-17'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-61841678
content: |-
  A Scottish council is trailing delivering meals to more remote schools by drone.

  Argyll and Bute said getting school meals to some rural and island sites can mean using vans, taxis and ferries, which can be affected by weather conditions.

  The council said drones also offered an alternative carbon-free mode of transport, as they were fully electric.
