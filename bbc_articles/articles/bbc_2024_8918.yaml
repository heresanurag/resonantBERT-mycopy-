title: 'Orpheus Pledger: Home and Away star arrested after Australian manhunt - BBC
  News'
date: '2024-04-26'
section: Australia
url: http://www.bbc.co.uk/news/world-australia-68902803
content: "The actor was taken into custody on Thursday after failing to front court\
  \ on assault charges.\n\nPolice issued an arrest warrant for actor Orpheus Pledger\
  \ on Tuesday\n\nFormer Home and Away star Orpheus Pledger has been arrested after\
  \ a three-day police manhunt in Australia.\n\nMr Pledger, 30, is facing four charges\
  \ for allegedly assaulting a woman, authorities say.\n\nHe had been granted bail\
  \ on Monday to undergo a court-ordered medical assessment, on the strict condition\
  \ that he return the following day.\n\nBut when he failed to show up in court, police\
  \ appealed for public information and issued an arrest warrant.\n\nThe actor was\
  \ detained in Melbourne on Thursday, Victoria Police said. They did not offer further\
  \ details. \uFEFF\n\nHis manager, Craig McMahon, told the Sydney Morning Herald\
  \ newspaper he had not been in contact with his client this week but that he had\
  \ been shocked by the assault allegations.\n\nHe also said that Mr Pledger had been\
  \ struggling with mental health issues.\n\nThe actor has appeared on Australian\
  \ television shows for over two decades.\n\nIn 2016, he joined the cast of Home\
  \ and Away where he played Mason Morgan for three years.\n\nPrior to that, he appeared\
  \ on the popular soap opera Neighbours, as well as TV shows Silversun and CrashBurn.\n\
  • None Australian police launch manhunt for Home and Away star"
