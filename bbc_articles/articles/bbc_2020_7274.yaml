title: 'Coronavirus: Yo! Sushi adapts conveyor belt system - BBC News'
date: '2020-07-03'
section: General
url: http://www.bbc.co.uk/news/business-53281473
content: |-
  As Yo! Sushi prepares to reopen some restaurants in England, it has had to adapt its conveyor belt system.

  The restaurant chain Yo! introduced the UK to the concept of choosing sushi dishes from a conveyor belt.

  But as it prepares to reopen some of its restaurants in England, it has had to adapt its system in the age of coronavirus.
