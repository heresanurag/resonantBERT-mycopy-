title: Didcot power station towers demolished - BBC News
date: '2019-08-18'
section: General
url: http://www.bbc.co.uk/news/uk-england-oxfordshire-49386491
content: |-
  The power station's gigantic, concrete towers created clouds of dust as they were blown up.

  After more than 50 years, Didcot power station's cooling towers have been demolished.

  The power station's gigantic, concrete towers created clouds of dust as they were blown up in the heart of Midsomer Murders country.

  But seconds after they fell power was cut from up to 49,000 homes when a electricity pole was damaged.
