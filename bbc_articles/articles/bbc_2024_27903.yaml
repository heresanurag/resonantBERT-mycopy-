  The Desperate Housewives star acknowledged most Americans were not as "privileged" to "get to escape".

  Eva Longoria says her family no longer lives in 'dystopian' US

  The Desperate Housewives star is considered a power broker in Democratic politics

  Hollywood actress Eva Longoria has revealed that her family no longer lives in the United States, and is splitting time between Mexico and Spain. In an interview with French magazine Marie Claire for its November cover story, Longoria attributed the decision to the country's "changing vibe" after the Covid-19 pandemic, homelessness and high taxation in California, and the re-election of Donald Trump. She also acknowledged she was "privileged" enough to move, saying: “Most Americans aren’t so lucky. They’re going to be stuck in this dystopian country." The Desperate Housewives star is viewed as a power broker for women and Latinos in Democratic Party politics.

  With a keen interest in immigration policy, she has been visibly involved with Democratic candidates at the national and local level since at least 2012. She spoke at the Democratic National Convention and hit the campaign trail on behalf of Kamala Harris this year, with a tagline for the 2024 presidential candidate that adopted the "Si se puede" slogan ("Yes it's possible" in Spanish) from 1970s Latino-led farm-worker protests into the phrase "She se puede". In her Marie Claire interview, published on Thursday, external, Longoria described being dispirited at Trump's victory over Harris last week. “If he keeps his promises, it’s going to be a scary place," she said.

  She added that Trump's win in 2016 had crushed her belief that "the best person wins" in politics. “I had my whole adult life here,” Longoria said of Los Angeles, adding that “it just feels like this chapter in my life is done now”. Longoria is a ninth-generation Texan who moved to California in her twenties. In 2006, she earned a Golden Globe nomination in her starring role as Gabrielle Solis in Desperate Housewives. More recently, she has hosted the CNN mini-series Searching for Mexico and Searching for Spain. She is married to José "Pepe" Bastón, her third husband and the president of Mexican broadcaster Televisa. The couple share a six-year-old boy, Santiago, while Bastón also has three children from a previous marriage.
