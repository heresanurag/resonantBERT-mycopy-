title: 50 Cent fan, 64, goes viral after Birmingham gig - BBC News
date: '2023-11-16'
section: General
url: http://www.bbc.co.uk/news/uk-england-birmingham-67445691
content: |-
  Rapper 50 Cent takes to social media to praise Mary Jane Farquarson.

  Video shared by Rapper 50 Cent showed 64-year-old Mary Jane Farquharson enjoying his gig at Resorts World Arena.

  A big fan of hip hop, Mrs Farquharson, from Nuneaton, said she was introduced to the genre by her son and now cannot get enough of it.

  Writing on X, formerly Twitter, 50 Cent said she was "by far" the coolest person at the gig.
