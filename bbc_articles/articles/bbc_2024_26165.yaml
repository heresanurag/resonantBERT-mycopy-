  Blue-throated macaws Lily and Margot took flight on Monday and have not been seen since.

  Lily and Margot took flight on Monday and have not been seen since

  Blue-throated macaws Lily and Margot were on a routine flight when they flew out of their enclosure on Monday. The pair have taken detours and hidden high up in the trees in the past but have never completely disappeared until now. London Zoo has asked for any sightings to be reported to them, adding the two blue and yellow-feathered birds were likely to stick together.

  The macaws are "ambassadors to their species", London Zoo has said

  This species of parrot was believed to be extinct until some were recognised in the Bolivian savannah in 1992. As such, endangered Lily and Margot are "ambassadors" for their species, London Zoo has said. At the zoo, their diet and health is monitored by experts. With help from local residents and Westminster Council, the Regent's Park zookeepers have been combing the area for sightings. With no luck, they are now appealing to the wider public.

  The birds tend to stay very high up in trees, only descending for food and are most likely to stick together, a London Zoo spokesperson said. As well as their bright blue and yellow plumage, they have a very long tail and a very loud call, making them distinguishable from London's indigenous birdlife. The zoo has asked for any sightings to be reported to birds@zsl.org with a photo and geo coordinates.
