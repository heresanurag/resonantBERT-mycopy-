title: Jay Slater's funeral will 'celebrate his life' - BBC News
date: '2024-08-04'
section: Lancashire
url: http://www.bbc.co.uk/news/articles/cv2gg37ywjqo
content: |-
  Ahead of his funeral on 10 August, relatives release a tribute to the teenager who died in Tenerife.

  The body of the 19-year-old was returned to the UK from Tenerife last week

  Jay Slater's family say his funeral will be a "celebration" of his life. The body of the 19-year-old, from Oswaldtwistle, Lancashire, was returned to the UK from Tenerife last week. His disappearance sparked a high-profile month-long search, but officials later said he died on 17 June - the day he went missing - from "trauma consistent with a fall in a rocky area". Well-wishers who attend his funeral on 10 August at Accrington Cemetery Chapel have been asked to wear something blue in his memory.

  Mr Slater had attended the NRG music festival with two friends before his disappearance and his last known location was the Rural de Teno Park in the north of the Canary Island. He had travelled to an Airbnb in Masca after a night out but the two men said to have rented the property were later ruled "not relevant" to the case. The Spanish Civil Guard said Mr Slater could have fallen in the steep, inaccessible area where he was discovered.

  The apprentice bricklayer was remembered in a tribute from his family which outlined the major events and passions of his life. They said: "After Jay left Rhyddings High School he went on to become an apprentice bricklayer with the PH Build group, a job he greatly enjoyed. "At the young age of five Jay started playing football for Huncoat United FC until the age of 17 and also did a few seasons with the Sunday team at St Joesph's. "He also loved spending time chilling out with his friends." The family recalled his love of music festivals and added: "Jay will be very sadly missed by all those who knew him."
