  The two sides have been at odds over the length of time it will take to introduce new arrangements once the UK leaves the bloc's Common Fisheries Policy.

  Tony Connelly, RTE's Europe editor, said: "I think we are really in the final stages because it looks like they are just now talking about fish, perhaps state aid as well, but all of the issues have been boxed off and we are now in final hours focusing on fisheries."

  Mr Connelly told BBC Radio 4's Today programme that although fishing only makes up a small part of the UK economy, for fishing communities in Europe, it is a "moment of real pain."

  "They have built up an industry, they have invested in boats and they've had access to these waters for decades, if not centuries and it has been taken away from them and they have not real say in the matter, they had no part in the vote - so feelings are running pretty high," he said.

  He added that while both sides would like to come to an agreement this weekend, "I don't think either side wants to be pressurised into last minute concessions they will regret later."

  The UK, led by its chief negotiator David Frost, has insisted its sovereign rights over its waters must be respected from day one and its fleets must be able to keep a much larger share of their own catch.

  The EU is insisting on a much longer transition period, with guarantees on access and how catches are distributed.

  Mr Barnier warned on Friday that if the UK wanted to reduce access for EU fishing vessels then it would "maintain its sovereign right" to impose new conditions on UK firms' access to its common market for goods.

  In response, Mr Johnson said the UK side was willing to keep talking but things were looking difficult and urged the EU to "come to the table" with new proposals that recognised the UK's autonomy.

  Why, you might ask, if the EU's priority in negotiations was to protect the single market, is Brussels allowing the issue of fish to endanger the whole deal?

  The level playing field is worth a lot more in monetary and political terms to the bloc, but it sounds quite abstract to voters.

  However, fishermen and women losing their jobs, industries dwindling... that would be very visible, very quickly, elevating the importance of fishing rights.

  It is in coastal countries where governments fear a public backlash if it's perceived they've sacrificed national fishing communities for a deal with UK.

  Although the majority of EU members are not coastal nations, and although everyone in the bloc would love to finally put this deal to bed - for political and financial reasons, as well as being plain fed up with the process - the EU as a whole won't try to force member states to sign up if they are unhappy.

  Michel Barnier spoke to EU coastal countries on Friday to try to find a compromise position but, because of the "nothing is agreed until everything is agreed" mantra of negotiations, the EU mood is less optimistic about prospect of imminent breakthrough than it was two days ago.

  The two sides are reported to have made progress in recent days on the issues of fair competition and what to do if the UK is deemed to get an unfair competitive advantage by moving away from EU rules and standards.

  If a deal is reached between the two sides, it would need to be agreed by parliaments in the UK and the European Union's member states.

  UK MPs have now finished for the Christmas break, but Cabinet Office minister Michael Gove said on Thursday that they could be called back to ratify a deal in the coming days, were one to be agreed.
