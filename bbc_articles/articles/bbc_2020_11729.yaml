content: |-
  More than 164,000 acres of the US state has burned since the Cameron Peak Fire ignited in August.

  The US state of Colorado is battling the largest wildfire in its history.

  More than 164,000 acres have burned since the Cameron Peak Fire ignited in August.

  No deaths have been reported and the cause of the blaze is still being investigated.
