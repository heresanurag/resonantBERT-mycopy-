id: bbc_2023_1700
title: Chinese fighter jet flies 20 feet from US military plane - BBC News
date: '2023-02-03'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-64129801
content: |-
  The US said its pilot had to evade the jet to avoid colliding in international airspace over the South China Sea.

  US officials say this Chinese jet got so close to an American military plane that the US pilot had to perform evasive manoeuvers while flying in international airspace over the South China Sea in order to avoid a collision.
