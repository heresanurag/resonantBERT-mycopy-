title: Keir Starmer brands donor flat claims 'farcical' - BBC News
date: '2024-09-27'
section: Politics
url: http://www.bbc.co.uk/news/articles/cr4xz9gq0d5o
content: |-
  The PM is facing questions around his use of Labour peer Lord Alli's flat for filming during the pandemic.

  The prime minister has said the row over him using a party donor’s flat to film videos when he was leader of the opposition is "farcical". After weeks of criticism over donations from the Labour peer Lord Waheed Alli, the latest questions for Sir Keir Starmer revolve around the use of his apartment to record a Christmas message in December 2021, when Covid restrictions were in place. In the video, Sir Keir is sitting behind a desk, with a picture of him and his family in the background. The Conservatives have accused him of “passing off someone else’s house as his own".

  Speaking to reporters in New York, during his visit for the UN General Assembly, he said that was "pretty farcical". "Anybody who thinks that I was pretending it was my own home, the idea that I've got union jacks by my fireplace at home or that I would invite a bunch of you lot into my living room to have a look around. "I mean, I think the idea that I was trying to pretend that it was my home is pretty farcical." He added: "And no I'm not going to be inviting you in to film me in front of my fireplace. I'm very sorry, that's about the last thing I'd do!" The prime minister said: "I understand why the public have questions about this. I think the best thing we can do is to explain the circumstances and be absolutely clear that nothing wrong has been done here. Everybody has complied with all of the rules. But look, I know why you're asking questions." A source who has spoken to Lord Alli recently said he was "mortified" and "never wanted to become the story". Sir Keir Starmer defended the donor: “He is a Labour Lord and he wanted a Labour victory and that was his sole motivation. And the fact that he is already a Labour lord takes away any sense that there’s a reward for him. "He wanted a Labour victory that motivated him, and he got one.”
