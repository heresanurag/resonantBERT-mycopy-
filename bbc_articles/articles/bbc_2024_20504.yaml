  Atkinson’s knock, the joint-third highest score by an England number eight in Tests, continued a sensational start to his international career. In his first Test against West Indies on the same ground last month, Atkinson claimed 12-106, the fourth-best match figures by a bowler on Test debut. In taking five wickets in an innings, 10 in a match and now scoring a century, Atkinson has a place on all three Lord’s honours boards after only five days of playing Tests at the home of cricket. “It's very surreal,” he told Test Match Special. “I've always thought of the Lord's honours board growing up and pictured myself up there for my bowling, so it's incredible to see myself up there with the bat. I couldn't ask for more. “It's been an incredible 12 months. I can't quite believe it.” Atkinson had made three previous first-class half-centuries, the last of which came for Surrey against Kent in 2023. Earlier this season, Atkinson was batting as low as number 10 for Surrey but has found himself at number eight for England after a rejig in the batting order because of an injury to captain Ben Stokes.

  This video can not be played To play this video you need to enable JavaScript in your browser. Atkinson plays 'magnificent' shot to bring up his 100

  Atkinson was 74 not out overnight after the opening day and needed only 22 deliveries on the second morning to move to three figures. He hit his first two balls on Friday for four, then overturned being given out lbw on 82 from the third. Overall, he reached his century from 103 deliveries, the sixth-fastest hundred in Test cricket on this ground. And Atkinson said there is “no reason” why he cannot continue to make significant contributions with the bat. “Obviously I’ll try to score as many runs as I can,” he added. “I've always backed my batting and haven't had huge opportunities to score big runs for Surrey. To get the opportunity batting at eight I made use of it and hopefully going forward I get more chances." Atkinson was watched by his father Ed, with whom he attended matches at Lord’s as child. His mother Caroline died following a car crash in 2022. Asked how his mother would have felt, Atkinson replied: "Extremely proud. She would have loved to have been here. “It was a bit emotional at times, but it was a very special day. I just tried to focus on my batting and not get too ahead of myself. Thankfully I got there in the end.”

