content: |-
  England’s Gus Atkinson says he is not surprised by his maiden century in the second Test against Sri Lanka at Lord’s.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England’s Gus Atkinson said he was not surprised by his maiden century in the second Test against Sri Lanka at Lord’s. Atkinson, 26, stroked a sublime 118 to become the first England number eight to make a Test ton in 11 years. It was also the Surrey pace bowler’s maiden first-class hundred, beating his previous best score of 91, and his first century in any sort of cricket since 108 not out in a second XI game against Worcestershire in 2018. “I’ve been frustrated with my batting this year,” said Atkinson. “I know how good a player I can be and I feel like I’ve got so much natural ability with the bat. “I felt like I was moving really well and hitting the ball really cleanly. It was one of those days where it comes off.” Atkinson helped England to 427 all out in their first innings, then chipped in with two wickets as Sri Lanka were rolled over for 196. England opted against enforcing the follow-on and closed on 25-1, 256 ahead.

