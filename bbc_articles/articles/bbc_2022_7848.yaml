  Only one man really knows the answer to that, and he's not sharing his plans. But if we want to look for clues as to how this "special military operation" might finish, we need to look at the words of Mr Putin himself.

  In a speech at the start of June, he openly compared himself to Peter the Great, equating Russia's invasion of Ukraine with the Russian tsar's expansionist wars some three centuries ago.

  It was, implicitly, an admission that his own war was a land grab.

  "It seems it has fallen to us, too, to reclaim and strengthen [our lands]," Mr Putin said. Speaking to a group of young entrepreneurs, a smile flickered across his face. It was quite clear he was referring to his invasion of Ukraine.

  Russia made crucial errors at the start of this war. They underestimated the will of the Ukrainian people to resist as well as the capability of their armed forces.

  Their rush to the capital was met with crushing defeat. It was a painful experience, but also a valuable lesson.

  Their slow but relentless march into the Donbas shows they have learned from their mistakes and seem determined not to repeat them.
