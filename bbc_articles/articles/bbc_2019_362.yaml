title: Peers debate private members' bills - BBC News
date: '2019-01-14'
section: Parliaments
url: http://www.bbc.co.uk/news/live/uk-politics-parliaments-46867621
content: |-
  The House of Lords debates bills on civil partnerships and on stalking.

  Peers approve second reading of the Parking (Code of Practice) Bill and it moves onto committee stage.

  With that the Lords adjourn for the day.

  Peers return on Monday - as do we, for more coverage of Parliament.

  Thanks for joining us.
