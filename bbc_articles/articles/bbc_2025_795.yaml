title: Oasis, Mariah and OutKast nominated for Rock and Roll Hall of Fame - BBC News
date: '2025-02-12'
section: Culture
url: http://www.bbc.co.uk/news/articles/cy0pzyr0x78o
content: |-
  The band are among 14 nominees, alongside Mariah Carey, New Order, Cyndi Lauper and White Stripes.

  Oasis nominated for the Rock and Roll Hall of Fame

  The band are due to start their long-awaited reunion tour this summer

  Manchester bands Oasis and New Order are among the 14 acts being considered for inclusion in the prestigious Rock and Roll Hall of Fame this year. They're joined by artists such as Mariah Carey, Cyndi Lauper and The White Stripes on the 2025 longlist. Half of the 14 nominees are first-timers, including English punk star Billy Idol, rock and roll pioneer Chubby Checker, and "mad dog with soul" Joe Cocker. Performers become eligible for nomination 25 years after the release of their first commercial recording. Voting starts now, with the finalists revealed in April.

  About half of the nominees will ultimately be inducted into the institution later this year.

  Mariah Carey is one of the biggest-selling artists of all time

  It is the second time Oasis have been nominated, having first appeared on the ballot in 2024. Their inclusion comes as the band gear up for a sold-out reunion tour, which kicks off in Cardiff this July. But singer Liam Gallagher has previously criticised the Hall of Fame, saying he wasn't interested in receiving an award from "some geriatric in a cowboy hat". He added, perhaps sarcastically, that Oasis didn't deserve their nomination "as much as Mariah [Carey]". "She smashed it," he noted.

  In the end, both Oasis and Carey were overlooked last year - with voters choosing to induct Cher, Mary J Blige, Ozzy Osbourne and A Tribe Called Quest instead. Asked for her thoughts on the snub, Carey said: "My thoughts are: I didn't get in. "My lawyer got into the Rock & Roll Hall of Fame before me," she added, referencing entertainment lawyer Allen Grubman - who also represented clients like Madonna, Bruce Springsteen and Lady Gaga. Grubman was inducted into the Rock Hall in 2022 as the recipient of the Ahmet Ertegun Award, which honours music industry figures. Carey is one of the most egregious oversights in the Hall of Fame's history. With 19 US number one singles, she is second only to the Beatles in terms of chart success - but she didn't receive her first nomination for the hall of fame until last year, almost a decade after she first became eligible. Other notable artists who have failed to enter the hall include Iron Maiden, The Monkees, Daft Punk, Wu Tang Clan and The Smiths.

  The White Stripes - Jack and Meg White - are nominated in their first year of eligibility

  Winners are chosen by an international panel of 1,200 musicians, historians and music industry professionals. Fans also get to vote for their favourites online, with their top five choices becoming a "fans' ballot" that's counted as one vote. This year's selection won't help to counter criticisms of the institution - where women make up less than 9% of inductees. Only two solo women appear on the longlist. Of the eight bands cited, only White Stripes and New Order have female members. Rap music's under-representation continues to be a theme, too, with OutKast the sole hip-hop act on the list. Eligible artists without a nomination include Snoop Dogg, De La Soul, Busta Rhymes and The Roots.

  British artists get a strong showing this year, with Billy Idol, Bad Company and Joe Cocker all up for consideration. Joy Division and New Order are nominated as a single act. The former, led by Ian Curtis, were one of the most influential bands of the British post-punk scene, with singles like Transmission and Love Will Tear Us Apart. New Order were formed after Curtis died in 1980, adding keyboardist Gillian Gilbert, and shifting their sound to extroverted electronic dance music. Both bands were previously nominated in 2023, but were absent from last year's ballot. Unlike Oasis, the members are not currently on speaking terms, and have toured without original bassist Peter Hook since 2011. Speaking after the band's previous Rock Hall nomination, he said the ceremony could be the "olive branch" the band needed to make amends. The ceremony has a history of reuniting feuding bandmates - with Led Zeppelin, Talking Heads, the Police, Simon & Garfunkel and Cream all reforming to accept their honour. Others have failed to put aside their differences. Roger Waters refused to join Pink Floyd for their induction in 1996; and Axl Rose skipped Guns N' Roses big moment in 2012, saying the ceremony didn't "appear to be somewhere I'm actually wanted or respected".
