title: South Korea welcomes first panda twins - BBC News
date: '2023-07-12'
section: General
url: http://www.bbc.co.uk/news/world-asia-66172308
content: |-
  The moment a giant panda gave birth to twins for the first time in South Korea has been captured on camera.

  A giant panda gave birth to twins for the first time in South Korea on Tuesday.

  The babies - both female - were born hours apart, one weighing 180g (6.3oz) and the other 140g (4.9oz). The Everland theme park zoo says mother Ai Bao handled the delivery well.
