title: 'Downing Street party: Conservative MPs demand answers from Boris Johnson -
  BBC News'
date: '2022-01-12'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-59961535
content: |-
  PM will face MPs amid mounting pressure to say if he attended a Downing Street event held in lockdown.

  The PM is set to face questions he has so far declined to answer

  Conservative and opposition MPs are demanding answers from Boris Johnson over whether he attended a drinks event in the No 10 garden during lockdown.

  Labour's deputy leader Angela Rayner said that if he was there, and he lied about it, his position is "untenable".

  And Tory MPs have been expressing their anger and concern over the reports.

  Mr Johnson will take Prime Minister's Questions at noon - his first public appearance since details of the May 2020 event emerged.

  The prime minister has so far declined to say whether he attended the gathering, but witnesses have told the BBC both he and his wife were among 30 people at the drinks.

  The PM's performance in the Commons will be closely watched by Conservative MPs, some of whom are understood to have privately called for a leadership challenge to Mr Johnson.

  A contest will take place if 54 Conservative MPs send letters to the backbench 1922 committee.

  Senior Tory backbencher Tobias Ellwood said the prime minister needed to apologise for his actions, "show some contrition" and get a grip of the situation or he will be "out of office".

  Conservative MP David Simmonds told BBC London: "We're all pretty frustrated with the situation. The PM is going to have to start answering some questions about it today."

  He said holding a party in lockdown was "clearly indefensible" and it should not be impossible for Mr Johnson to say whether he was there or not.

  Backbencher Nigel Mills told BBC Newsnight: "If the prime minister knowingly attended a party, I can't see how he can survive."

  On Tuesday, Scottish Conservative leader Douglas Ross said Mr Johnson must quit if he was found to have broken Covid rules.

  On Monday, ITV published a leaked email from Mr Johnson's principal private secretary, Martin Reynolds, inviting staff to "socially distanced drinks in the No 10 garden" on 20 May 2020 - when lockdown rules in England banned large outdoor gatherings.

  The invitation encouraged people to "bring your own booze" and "make the most of the lovely weather".

  Mr Johnson has said it is a matter for Sue Gray - the senior civil servant investigating a series of reported parties in Downing Street and in Whitehall in 2020 - to determine what happened.

  The PM's official spokesman has also refused to confirm whether Mr Johnson attended the May 2020 Downing Street gathering. He added that the prime minister retained full confidence in Mr Reynolds.

