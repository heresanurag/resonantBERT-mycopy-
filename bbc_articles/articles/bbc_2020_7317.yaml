title: 'Coronavirus in Wales: Updates from Friday 3 July - BBC News'
date: '2020-07-03'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-53276743
content: |-
  From Monday 6 July, the five-mile limit will be lifted, the Welsh government confirms.

  Several Welsh stations are to lose train services for a "short time" because their platforms have raised social distancing concerns.

  They are either too short or too curved to allow the opening of two train doors, Transport for Wales said.

  Services will no longer stop at Llanfairpwll and Valley on Anglesey, Conwy, Gilfach Fargoed in Caerphilly county or Sugar Loaf in Powys.

  The changes come into force on Monday, TfW said.
