title: 'Springfield Road: Joseph Brennan dies after serious assault - BBC News'
date: '2024-03-07'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-68495640
content: |-
  Police have started a murder investigation after the victim was was found with serious injuries on Wednesday.

  Police have started a murder investigation after a man who was found with serious injuries in west Belfast died in hospital.

  The man has been named locally as Joseph Brennan from the Poleglass area of the city.

  The incident happened in Cupar Street, off the Springfield Road, just after 20:00 GMT on Wednesday.

  Officers had previously said they were at the scene of a serious assault.

  A 35-year-old man has been arrested on suspicion of murder and remains in custody, they added.

  Police cordons around the scene were lifted by Thursday morning

  Police said the victim was found unconscious after officers were notified of an altercation outside a bar.

  "Our enquiries continue, and I'm keen to take the opportunity to appeal to anyone with information to get in touch," Det Insp Sean Armstrong said.

  "Did you witness the events leading up to the altercation? Might you have captured footage of the actual incident? Please contact our detectives."

  Sinn Féin MP Paul Maskey said he was "deeply saddened" by the news of the death and appealed for those with information to come forward.

  "I would like to express my condolences with the man's family and friends as they come to terms with this terrible loss," he added.

  "I would appeal to anyone with information on this death to immediately bring it forward to the police to assist with their inquiries."
