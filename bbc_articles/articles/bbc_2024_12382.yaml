content: |-
  Scotland show their best qualities - as well as their worst - to get their Euro 2024 campaign back on track, writes Tom English.

  'Steely Scotland still standing after coming out swinging'

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Two minutes into this nerve-jangling, palpitation-inducing, fingernail-biting night in Cologne, Scotland won a corner, their first of the tournament. To supporters in full possession of their senses - ie pretty much every set of fans at this tournament bar the wonderful mavericks in the Tartan Army - this wouldn’t have been much of a big deal. To the Scots, it was a cause for mass celebration. They went berserk. The decibel level rose from mere ear-splitting to near ear-drum-busting. A corner! It was like their every pent-up frustration following last Friday's footballing disaster came roaring out. The corner amounted to nothing, but two minutes later they had another. More chaos, more delirium. Mark it down, Opta! Mark it down.

  It turned out that the happy chaos down at the cathedral from early morning on Wednesday was like a gathering of Trappist monks compared to the bedlam that followed at Cologne Stadium. A riot of a football match broke out and at the end of it Scotland were down one more defender in the shape of the injured Kieran Tierney but still, mercifully, in this tournament. They got one point. It could have been none and it could have been three. Switzerland will talk about Dan Ndoye’s one-on-one with Angus Gunn and their goals that were ruled offside, but which were tight. A draw was fair. Both teams turned up. Both teams stood toe-to-toe and traded blows. It was pulsating. Scotland have two goals now, both of them knocked in by kindly opponents, but they’re still there. No Aaron Hickey, no Nathan Patterson, no Ryan Porteous and now no Tierney either. They’re struggling for numbers. The sight of Tierney pulling up and being taken off was grim. It was just about the only moment in the entire night they fell a bit silent, with emphasis on the ‘bit’.

