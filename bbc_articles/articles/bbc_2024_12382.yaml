  In the wake of the Munich debacle, Scotland found themselves. Let’s not go down the road of a moral victory. A dead end, that. But let’s give them praise because they have had the lousiest of weeks and they came out fighting. They were favourites to lose, but they took the lead when McTominay headed away a Switzerland short corner then then took off in pursuit of the ball-carrier, Andy Robertson. Yes, his eventual shot went in off Fabian Schar, but the briskness and intensity of Scotland’s counter was electrifying. It offered hope. Billy Gilmour came into the team and what a difference he made. His personality, his hunger for the ball, his calmness amid the malestrom stood out like a beacon. He had a presence and a strut. The quality of his direct opponent Granit Xhaka, and the pressure of the occasion, a must-not-lose, only seemed to make it more enjoyable for him. Scotland didn’t hit the levels of their run of victories from March to September last year, but they showed signs of getting back there. Their pressing was brave and relentless, their work-rate through the roof. The tendency for self-harm was there, too, in the guise of a loose pass, given away in a moment of stress by Anthony Ralston and seized upon by Xherdan Shaqiri. His curling, first-time finish was outrageous. Ralston turned away. Gunn hopped up and down in frustration. Others just bowed their heads. What none of them did was allow it to fry their collective brain.

