  There were plenty of Swiss fans here, too, and they also made a hell of a racket. When they piped-up, Scotland’s fans responded. There was a mighty contest on the pitch and also in the stands. There was noise and colour and chances. It would have been cruel had either team lost, especially Scotland because it could well have cost them a shot at staying in the tournament. Tierney’s departure was a horrible moment, a psychological blow at a time when Switzerland’s menace was a gathering storm. Scotland qualified for this championship on the back of victories, of course, but also because of resilience, most notably the smash-and-grab in Norway. We haven’t seen much of that over the last 10 games. They’ve been easy to score against and, too often, architects of their own downfall. This was a steelier Scotland, especially when having to cope with the disappointment of losing one of their leaders to what looked like a bad injury. They soaked it up and went again. Some of their best attacking moments came after Tierney exited, which was an illustration of their fight. They needed to find something and they found it, and now belief will sustain them on the road to Stuttgart on Sunday to face a Hungary side who are pointless. There are draws and there are draws. This one felt like a liberation from recent woes. Its true relevance will only be known come Sunday, but as the quiet was restored around midnight in Cologne and Clarke and his players retreated to the sanctuary of their hotel, it must have felt good, oh so good to be still alive.

