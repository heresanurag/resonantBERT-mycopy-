title: Rare bat born by C-section in San Diego Zoo - BBC News
date: '2017-01-24'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38727488
content: |-
  A Rodrigues fruit bat has been born by C-section at San Diego Zoo.

  The species is critically endangered and only found on Rodrigues Island, which is 300 miles east of Madagascar.
