  Emergency services have been deployed to rescue and evacuate residents stranded by floods.

  Emergency services have been deployed to rescue and evacuate residents stranded by floods in Poland and the Czech Republic.

  The death toll from the ongoing flooding across central Europe now stands at 16 people.
