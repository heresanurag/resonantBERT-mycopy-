title: 'UAW strike: This union worker fist-bumped Biden, but may vote for Trump -
  BBC News'
date: '2023-09-27'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-66940361
content: |-
  The current and former presidents are wooing striking auto workers in Michigan ahead of 2024 battle.

  A walkout by car workers in the US is a sign of economic dissatisfaction that will be a key issue in 2024

  Donald Trump is in Michigan to woo striking car-workers, a day after President Joe Biden turned up on the picket line in the Midwestern state - an early skirmish in the battle for the blue-collar vote ahead of next year's White House election.

  The former president skipped the televised Republican debate over in California to deliver primetime remarks on Wednesday at a non-unionised car parts supplier just outside Detroit.

  On Tuesday, Mr Biden's glad-handing of United Auto Workers (UAW) members, also near Motor City, was a first for a sitting US president during a strike in modern times.

  The clusters of red-shirted car workers on the picket line in the Detroit suburb of Wayne this week had few illusions about what's driving these back-to-back visits by the two men most likely to face-off in the 2024 polls - efforts to lay claim to votes in what is expected to be a key state in that contest.

  One of the striking car workers at Ford, 38-year-old Tony Branner, said he had voted for neither candidate in 2020.

  He told the BBC he had not been paying much attention to the election campaign so far.

  But with the two rivals practically at his doorstep, he was ready to listen.

  "Whoever is fighting to help my job be better, I will support," he said. "I'm interested in what both of them have to say."

  Mr Trump's visit offers a reminder of his success in winning over many mostly white working-class voters who felt left behind economically and ignored by mainstream politicians.

  After the 2020 election, exit polls showed Mr Trump winning four in 10 union members - more than any other Republican for generations.

  In his remarks on Wednesday evening, he presented himself as a saviour for the US car industry, warning of Mr Biden's efforts to tilt the industry toward electric vehicles.

  "He wants electric vehicle mandates - that will spell the death of the US auto industry," he told the crowd. "All of these cars will be manufactured in foreign lands."

  He pledged to put a tax on foreign imports and take other measures to protect American manufacturing.

  Those messages are resonating with some on the picket line, where Mr Biden was already seen as suspect for decision such as cancelling the Keystone XL oil pipeline. That move drew criticism from unions worried about lost jobs.

  "He's [Biden is] threatening the auto industry with EVs," said car worker Kevin Puckett, who voted for Mr Trump in 2016 and 2020, and expects to do so again.

  "To mandate them and go full steam ahead - it's putting the car companies in a bad way."

  A day earlier, Mr Biden had cautiously endorsed the car workers' demands for a 40% pay rise, as he offered himself up as the true champion of the working class.

  Mr Biden, who calls himself the most pro-union president in history, has installed pro-labour officials at key regulatory bodies, such as the National Labor Relations Board.

  He has also backed provisions in his signature spending bills encouraging the use of made-in-America materials and requiring companies that receive federal money to offer certain levels of pay.

  But much of Mr Biden's action has been symbolic: messages of support, like the appearance in Michigan this week.

  For Biden supporter Lillian Dunson, one of hundreds of workers put on temporary layoff by Ford after the strike began on 15 September, those kinds of gestures were important.

  "I believe that he [Mr Biden] feels what we feel, what the people feel - that he's not just a billionaire," she said.

  "He's disingenuous," she added of Mr Trump, noting he remained on the side lines in 2019, the last time car workers went on strike.

  Mr Trump - who is visiting Michigan without a union invite, unlike Mr Biden - has been critical of the UAW leadership in this strike.

  During his presidency, the National Labor Relations Board reversed several Obama-era rulings that had made it easier for small unions to organise.

  But though the union's president, Shawn Fain, has been less than complimentary of Mr Trump, he has also withheld an endorsement of Mr Biden's bid for re-election.

  The focus on the car workers comes as wider economic dissatisfaction remains high. Though unemployment is low and wages are rising, price inflation has remained stubborn.

  Some car workers said it was hard not to be seduced by Mr Trump's call to Make America Great Again.

  As recently as the 1990s, the average worker in the industry commanded some of the highest pay in the country.

  But that guarantee of a comfortable middle-class life has steadily eroded.

  "I think we do need to take care of our own first," said Curtis Cranford, who has worked in the industry since 1985 and backed Mr Trump in 2016 and 2020.

  He was rueful about his decision, noting what he described as "personal" shortcomings by Mr Trump, who has been found liable by courts for business fraud, defamation and sexual assault.

  Mr Cranford was among a handful of workers who exchanged fist bumps with Mr Biden this week. He said the Democratic president seemed "sincere".

  But he expressed disappointment with the White House's handling of issues such as immigration and inflation.

  He is also concerned about money being spent to support Ukraine, and feels divided from Democrats on issues such as abortion.

  "I really don't want to vote for [Mr Trump], but if he's the only Republican standing, then I probably would," he said.

  Mr Trump won Michigan in a surprise victory in 2016. Mr Biden reclaimed the Great Lakes state four years later.

  Democrats solidified their gains in midterm elections last year.

  But the conflicting political views on the picket line suggest this Rust Belt state, which could hold the keys to the White House next year, is still very much contested territory.
