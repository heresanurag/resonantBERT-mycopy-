title: 'M23 crash: Vintage car rally driver dies in lorry crash - BBC News'
date: '2019-11-03'
section: Surrey
url: http://www.bbc.co.uk/news/uk-england-surrey-50281989
content: |-
  The 80-year-old man, who was taking part in the annual London-to-Brighton event, died at the scene.

  An air ambulance was called to the scene of the crash, on the M23 near Hooley, Surrey

  A man has died while taking part in a classic car rally after his vintage vehicle crashed with a lorry on a motorway.

  The 80-year-old, driving a 1903 Knox Runabout Old Porcupine, was killed at the scene of the crash on the M23 in Surrey at about 10:00 GMT.

  His female passenger was seriously injured and taken to hospital.

  The car had been entered into the Bonhams London to Brighton Veteran Car Run, organisers have confirmed.

  They said the car had "left the route, which does not include the M23, when the crash took place".

  More than 400 vehicles dating from before 1905 were registered to take part in this year's run.

  The crash happened on the southbound carriageway, near Hooley.

  More than 400 pre-1905 cars were taking part in this year's Veteran Car Run, which was started by Alan Titchmarsh

  The road remains closed both ways between junctions seven and eight, close to the M25 junction.

  The run's organisers added: "We are doing all we can to support the family concerned and are working with the police, but we cannot comment any further at this stage."

  Surrey Police urged anyone who witnessed the collision, or has dashcam footage, to get in touch.

