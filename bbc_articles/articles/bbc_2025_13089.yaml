content: |-
  Pupils have been ordered to stay inside after the buzzard swooped into a primary school playground in East London.

  A village primary school in east London has ordered pupils to stay inside due to a dive-bombing buzzard taking up residence in its playground. There are concerns the bird is guarding its nest and may attack children at Dame Tipping Primary School in Havering-atte-Bower after reports it had swooped on village residents.

