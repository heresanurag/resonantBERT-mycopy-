title: 'Eras Tour: Ed Sheeran joins Taylor Swift for Wembley show - BBC News'
date: '2024-08-15'
section: Culture
url: http://www.bbc.co.uk/news/articles/cwyw74p8ejeo
content: |-
  Swift closes the European leg of her tour with five record-breaking performances at Wembley Stadium.

  Swift kicked off a record-breaking run of shows at London's Wembley Stadium on Thursday night

  Taylor Swift was joined by "best friend" Ed Sheeran as she kicked off the final part of the European leg of the Eras Tour on Thursday evening at London's Wembley Stadium. Performing a mix of the two songs they've made together, Everything Has Changed and End Game, Swift thanked Sheeran for appearing alongside her to perform to a sell-out crowd of 92,000 fans. The concert was her first performance since the cancellation of shows in Vienna last week because of a terror threat. It was also the first time she'd returned to the UK since an attack in Southport last month, in which three children were killed at a Swift-themed dance class. The BBC understands that Taylor Swift has privately reached out to the families affected by the attacks. She did not reference either event during the show.

  Taylor Swift in her traditional Lover leotard for the show's opener.

  Gigs in the Austrian capital were cancelled after authorities said they had foiled a terrorist plot, which was planned for one of Swift's sold-out shows at the Ernst Happel Stadium. The 34-year-old, who has not spoken publicly about Vienna, did release a statement after the three little girls were killed in Southport. She said she was "completely in shock" at the "loss of life and innocence".

  Taylor Swift thanked Ed Sheeran for taking a break from his own tour to perform with her.

  As has been the case with most of the Eras Tour, things ran pretty much as expected. But Sheeran's appearance during the surprise acoustic section of the evening prompted a huge roar from the 92,000 audience members. The songs featured in the acoustic section towards the end of the show are kept secret from the audience until they are performed. After a mash-up of their 2012 hit Everything Has Changed, the pair then launched into 2017 collaboration End Game. Swift then repaid the favour by duetting on Sheeran's mega-ballad Thinking Out Loud. "This is one of my best friends in the world," she told the crowd at the end of their mini-set. "He works so hard, he's on tour right now and he's probably so tired but he wanted to come and play for you," she added.

  The 34-year-old global megastar put on a breathless run of 46 of her greatest hits.

  With a runtime of more than three hours, there's not much time for rambling ad libs on the setlist and apart from this, Swift's interactions with the audience stayed on script. Swift thanked the crowd throughout, and whilst introducing the Folklore and Evermore era of the evening, she told fans how overwhelming the crowd size felt. She said she would miss performing to these crowds and was experiencing "feelings and emotions I didn't think about before talking about it". Fans were told to watch out for her surprise songs, which are often the best way of knowing what headspace she is in.

  When a fan died of a cardiac arrest following an Eras tour concert in Rio de Janeiro last year, Swift did not directly address the incident at her next show, instead releasing a statement on social media. However, fans interpreted her choice of the song Bigger Than the Whole Sky as a tribute to 23-year-old Ana Clara Benevides Machado. On Thursday evening Swift chose to perform King of My Heart from Reputation and The Alchemy from her latest album The Tortured Poets Department. Both choices gave little away about how she might be feeling, but showcased just how large her repertoire of songs is.

  More security had been put in place ahead of her Wembley run, which ends on Tuesday. Non-ticket holders were banned from standing outside the stadium during the show, a practice known as "Tay-gating". Fans were also reminded of Wembley's strict bag policies, which featured an extensive list of banned items. Her shows at Wembley, which also take place on Friday, Saturday, Monday and Tuesday evening, will help her set a venue record. She previously played for three nights at the same venue in June, but returns for five more nights to equal a record previously set by Take That in 2011.

  Swift appeared unfazed by the humid British weather as she performed at London's Wembley Stadium.

  Swift has also already played in Edinburgh, Liverpool, Cardiff and Dublin as part of her UK and Ireland leg. Including songs from ten of her studio albums, her setlist features 46 songs, 16 costume changes and a total run time of more than three hours. The tour, which will end later this year, has travelled all over the globe. She started in Glendale, Arizona, in March last year and spent six months in the US before heading to gigs south of the border in Mexico, Argentina and Brazil. This year began with shows in Japan, Australia and Singapore before the European leg started in France in May, and the first UK dates in Edinburgh in June. But she's not done yet and will be heading back to finish the tour in the US and Canada later in 2024.
