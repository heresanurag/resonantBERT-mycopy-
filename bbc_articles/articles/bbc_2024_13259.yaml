content: |-
  Coach Matthew Mott says it is time for England to be "frontrunners" at the T20 World Cup and "throw the first punch" in Thursday's semi-final against India.

  England want to 'throw first punch' against India - Mott

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England coach Matthew Mott says it is time for his side to "throw the first punch" against India in their T20 World Cup semi-final. The defending champions struggled through the group stage, only progressing on net run-rate at the expense of Scotland. They came through their Super 8s pool in second behind South Africa and now face unbeaten India in Guyana on Thursday at 15:30 BST. "We haven't quite clicked as a whole unit yet," Mott told the BBC. "Bits and pieces have worked at different times but our 'A-game' is certainly enough to match with India."

  India have eased through the tournament, impressively beating Australia by 24 runs on Monday to top their Super 8s group. England were beaten by Australia in the first group stage and also lost to South Africa in the Super 8s. After their first match against Scotland was washed out, they needed heavy victories against Oman and Namibia to avoid an early exit. "We've had to play some ugly cricket at times," added Mott. "But from here on in it's time to be the frontrunners. "It's time to more or less throw the first punch at India and then try to get our nose in front and never give it back."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Much of the discussion before the semi-final has been around the lack of a reserve day and there is rain forecast for Thursday. The first semi-final between South Africa and Afghanistan has a rain reserve day but England's meeting with India does not. Instead, there are 250 minutes available throughout the afternoon on Thursday - the same total available across the two days in Trinidad - to fit in a match. If no result is possible, India will progress, as they won their Super 8s group. Mott said in an "ideal world", there would be a reserve day and it is something the International Cricket Council "need to look at long term". There has also been criticism, external of the fact India's semi-final venue, in the event of their qualification, was predetermined, whereas other sides had to wait for their route to be confirmed, but Mott played down the significance of the latter issue. “We were quite aware there was every chance that we'd be here in Guyana,” he said. “We've had to fight our way through this tournament and it's something that's galvanised us as a group and will hold us in really good stead for cut-throat matches.” A surface suiting spinners is expected at Providence Stadium, which could help India, whose squad includes four spinners and batters who grew up on low surfaces. England have uncapped left-arm spinner Tom Hartley in their squad, who could come into contention for a debut. But Australian Mott, who was speaking before England's training and prior to seeing the pitch, said he does not expect "drastic changes". The match is a repeat of the semi-final of the last T20 World Cup in Australia, where a superb England thrashed India by 10 wickets in Adelaide en route to winning the title. Mott said India, who timidly posted 168-6 that night before England chased the target in 16 overs, are a more aggressive side this year. "We're not looking back at all with this group," he added. "One of its big mantras is staying present. "They are a different team, too, than when we took them on."
