content: |-
  Former MP Fiona Onasanya was sacked by her constituents in the first successful re-call petition prompting a by-election.

  Peterborough's former MP Fiona Onasanya was sacked by her constituents in the first successful re-call petition prompting a by-election.

  The East Anglian city voted to leave the EU by 61% in 2016, but Ms Onasanya's successor will also have to address local issues in education, crime and homelessness.

  For BBC1's This Week. political correspondent Ben Schofield takes a look at issues as the constituency elects a new MP and meets some of the candidates.

  UK viewers can watch the full programme for 12 months from transmission
