  'You get a real buzz from it'

  Tracy Martin-Smith, a senior sensory officer in Haverfordwest, works with blind people of all ages to help with skills and mobility.

  She said she gets a lot of job satisfaction from seeing how people's lives can be improved.

  Ms Martin-Smith added: "The oldest person I've worked with is 105. I like working with people and I think it's one of those areas that you start working in sensory loss and you get a real buzz from it. And I really like seeing people out and about."

  She has received support from the sensory needs service and she helps Ms Martin-Smith teach Braille along with other training around the county.

  She also attends social groups with other people who have sight loss.

  "These are particularly useful for people losing their sight later in life as it gives them a chance to do things they wouldn't ordinarily do and go to places they wouldn't ordinarily go to," said Ms Peter.

  "A lot of people might be quite isolated and people can lose their confidence when they lose their sight so these groups are very important for them.

  "People often pick my brains so they can learn how to cope with things they think they can't do anymore, but actually they can."

