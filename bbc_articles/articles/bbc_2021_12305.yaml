title: Farmer crushed to death by Aga cooker, inquest hears - BBC News
date: '2021-10-21'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-59004038
content: |-
  Anthony Rees was trying to move the 74-stone stove when it fell and crushed him, inquest hears.

  The inquest heard how Anthony Rees did not want to wait for his son to help him move the stove

  A 78-year-old farmer died while trying to move a 74 stone (470kg) stove, an inquest has heard.

  Anthony Rees was moving the Aga cooker at his home in Llanbedr Dyffryn Clwyd, near Ruthin, Denbighshire, when it fell and crushed him in June.

  His wife Elizabeth Rees said she asked him to wait until their son could help but "he wanted to get the job done".

  She said medication he was taking for cancer could have influenced his actions.

  "The medication may have contributed to the accident... it was out of character," said Mrs Rees.

  The former deep sea diver, who turned to farming after retiring as a marine operations manager, was diagnosed with multiple myeloma, a form of blood cancer last April.

  In a statement from Mrs Rees, read out at the inquest in Ruthin, she described how her husband had built a four-wheeled trolley to move the stove in June.

  She said she told him to wait until their son Daniel could come to help but he moved it on his own.

  The 470 kg log-burning Aga stove was being removed to be replaced with a new oil-fuelled model

  "I couldn't understand why he had been so keen to go ahead," Mrs Rees said.

  The cooker toppled over, pinning Mr Rees to the ground and she was unable to free him.

  After dialling 999 she called a neighbour, David Heller, who managed to move the cooker while she freed her husband.

  Paramedics and doctors carried out CPR but he was declared dead at the scene, and the cause of death was given as crush injuries to the chest.
