  Tom Curry and Sam Underhill – nicknamed the "Kamikaze Kids" by Eddie Jones – will start together in the back row for England against Jones’ Japan on Sunday.

  Furbank and Curry return for England against Japan

  George Furbank (left) and Tom Curry are the two changes in England's starting XV to face Japan

  Coverage: Listen to live commentary on BBC Radio 5 Sports Extra and BBC Sounds, follow live text commentary on the BBC Sport website and app

  Tom Curry and Sam Underhill – nicknamed the "Kamikaze Kids" by Eddie Jones – will start together in the back row for England against Jones' Japan on Sunday. Curry is back after concussion and starts on the blind-side flank in place of Chandler Cunningham-South, who drops to the bench. In the other change from the starting XV that lost to South Africa, full-back George Furbank comes in for Freddie Steward. Meanwhile, Sale's 20-year-old prop Asher Opoku-Fordjour is set for his England debut from the bench, with experienced tight-head Dan Cole left out of the 23. Also among the replacements, Fin Smith is named as back-up fly-half instead of George Ford. Steve Borthwick’s side have lost five games in a row, but are heavy favourites to stop their losing run against the Blossoms, who are the last side they beat in June. "We anticipate a tough challenge from a team that thrives on playing fast and with tempo," said Borthwick, who worked under Jones before replacing him as England head coach. "Japan are a dangerous team so it’s important that we execute our gameplan and maintain focus throughout the full 80 minutes."

  Northampton fly-half Fin Smith, who has five England caps, comes on to the bench in place of George Ford

  Captain Jamie George again starts at hooker, and says he is desperate for England to finish their campaign on a high after an underwhelming autumn. "I am not sitting here and saying we are absolutely fine and that all I care about is performances because of course we are aware Test rugby is about results," George told BBC Sport. "We talk about getting fans off their seats, and that happens if you win. So absolutely that is the most important thing for us. "We have unbelievable trust in the players we have here, and unbelievable trust in the staff we have here, but we have to make sure we are getting better, and look like we are getting better and feel like we are getting better. "I think we have done that in certain areas, but I think there are strides to take in certain areas too." Japan will be led by captain Naoto Saito on former England head coach Jones' return to Allianz Stadium. The scrum-half is the only player in Japan's starting XV to play club rugby outside of his native country, as backup to France captain Antoine Dupont at Toulouse. Japan beat Uruguay 36-20 in their last outing but have lost all 10 previous meetings with England. Borthwick's side overcame Jones' team 52-17 in their last meeting, before England's summer tour of New Zealand.

  Eddie Jones (right) was England's head coach from 2015 to 2022

  Jones has kept a low profile in the build-up to his first game against England at Twickenham since being sacked by the Rugby Football Union in 2022. "I much prefer it that way," George told BBC Sport. "My message to everyone is not to listen to the external noise too much." However, the England captain says the hosts are expecting the unexpected from their former coach. "We have worked with Eddie long enough, Steve has worked with him for longer than any of us. So we know that something is coming," he added. "We know Japan are the sort of team that want to play fast and move the ball and come up with innovation. That is something Eddie is very passionate about. "We can’t predict exactly what he is going to bring, but we have to get our own house in order and get ready and alive for what might be coming."
