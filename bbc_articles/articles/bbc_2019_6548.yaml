id: bbc_2019_6548
title: Prescription drugs sold illegally in Uganda - BBC News
date: '2019-06-17'
section: General
url: http://www.bbc.co.uk/news/world-africa-48634434
content: |-
  The BBC has uncovered evidence that prescription drugs have been taken out of circulation by health workers and sold on illegally.

  The BBC has uncovered evidence that life-saving drugs meant for the sick have been stolen and sold on illegally.

  Africa Eye has been undercover in Uganda to expose how some health workers there are at the heart of criminal networks.
