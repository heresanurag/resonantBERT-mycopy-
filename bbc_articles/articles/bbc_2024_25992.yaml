title: '''Dramatic'' police chase caught on dashcam - BBC News'
date: '2024-10-22'
section: General
url: http://www.bbc.co.uk/news/videos/c2ekexe0vvlo
content: |-
  A 31-year-old man was arrested on suspicion of multiple driving offences.

  Footage showing the moment a man was arrested after a police chase has been released.

  Nottinghamshire Police shared dashcam and bodycam footage of the pursuit in Bawtry, Nottinghamshire, on 15 October.

  The chase came to an end after officers made "tactical contact" with the Ford Focus near the village of Everton.

  Police said a 31-year-old man was arrested on suspicion of dangerous driving, failing to stop, going equipped for theft, driving without insurance, and driving otherwise than in accordance with a licence.

  He was released on conditional bail, the force added.
