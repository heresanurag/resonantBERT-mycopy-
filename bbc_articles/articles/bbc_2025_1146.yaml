  The successful player matched all seven Valentine's Day numbers, the lottery operator said.

  The winner matched all seven Valentine's Day numbers

  A single UK ticket-holder has scooped a £65m EuroMillions jackpot by winning the draw on Valentine's Day. The winning numbers were 04, 14, 31, 36 and 38 with Lucky Stars 03 and 10. The successful player matched all seven numbers to win the prize of £65,341,620.50, National Lottery operator Allwyn said. Meanwhile, 14 UK players netted £1 million each in Friday evening's EuroMillions UK Millionaire Maker draw.

  Winners must claim their prize within 180 days of the draw. Successful players can decide whether they want to be named or remain anonymous upon claiming the prize. Earlier this month, a jackpot of more than £83.4m was claimed by an anonymous UK winner after 13 days. The National Lottery said it came in at number 23 on their list of the "most spectacular" - meaning the largest - wins of all time. The UK's biggest EuroMillions jackpot, worth £195m, was likewise claimed by an unnamed winner in July 2022. That same year, a then record-breaking £184m was won by Joe and Jess Thwaite from Gloucester, with a Lucky Dip ticket for the draw on 10 May. The third-biggest win came in November 2024, when an anonymous ticket-holder claimed a £177m jackpot. There are nine EuroMillions prizes yet to be claimed by UK ticket-holders, according to the National Lottery's website,, external with the largest standing at £1m.
