content: |-
  The behaviour is known as an 'alert circle', a formation meant to protect elephant calves from threats.

  Video shared by the San Diego Zoo Wildlife Alliance shows the moment a group of elephants protect their young during a 5.2 magnitude earthquake.

  The behaviour is known as an 'alert circle', a formation meant to protect calves from threats.

  The earthquake struck Julian, California and was felt across San Diego County on 14 April.
