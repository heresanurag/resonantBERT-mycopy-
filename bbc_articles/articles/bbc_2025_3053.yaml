id: bbc_2025_3053
title: 'Strabane: Stephen Holmes dies days after being assaulted at house - BBC News'
date: '2025-02-08'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c62q1qz29e7o
content: |-
  The 31 year old's sister describes him as "everybody's friend" as police launch a murder investigation.

  Stephen Holmes was seriously injured in an attack on Monday

  A man who died days after a serious assault in County Tyrone was a family man who was "everybody's friend", his sister has said. A murder investigation has been launched after Stephen Holmes, 31, was attacked at a house in Beechmount Village, Strabane, in the early hours of Monday. The father of two had been in a critical condition in hospital following the assault and died from his injuries on Saturday morning. His sister Zara said he was an "easy-going, gentle soul" who was well-liked.

  Speaking to BBC News NI, Mr Holmes' sister said he was the "baby of the house and wanted for nothing". "He was everybody's friend and loved his family," she added.

  There has been a police presence at the house in Beechmount Village in Strabane this week

  Mr Holmes was initially taken to Altnagelvin Hospital in Londonderry for his injuries before being transferred to the Royal Victoria Hospital in Belfast. Cllr Paul Gallagher said that Mr Holmes died in "very tragic circumstances" and that his death had been "devastating" for the family. He added the assault had taken place in a newly built estate, and that neighbours and the surrounding community had been left in shock. Sinn Féin Cllr Paul Boggs expressed his sympathies to Stephen Holmes' family and said that the "outpouring of messages is testament to the sadness being felt across Strabane by those who loved and knew Stephen".

  On Thursday, a 31-year-old man appeared in court on a number of charges related to the assault, including causing grievous bodily harm with intent. Dylan McCrossan, of Beechmount Village, appeared via video-link before Strabane Magistrates' Court where he confirmed his identity. He also confirmed that he understood the charges against him, including possessing cocaine and the Class C drug Pregabalin. He was remanded into custody. On Saturday, police said the charges concerning Mr McCrossan will now be reviewed by officers.
