title: Thousands of migrants gather at US-Mexico border crossing - BBC News
date: '2021-09-18'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-58608496
content: |-
  At least 10,000 people are camped under the bridge at the US-Mexico border, in poor conditions.

  The US government is set to fly back to Haiti thousands of migrants who have gathered under a US-Mexico border bridge.

  At least 10,000 people are camped under the bridge connecting Del Rio in Texas to Mexico's Ciudad Acuña.

  Read more: US 'set to fly back' Haitian migrant arrivals
