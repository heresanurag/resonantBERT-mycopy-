content: |-
  Stars like Charli XCX have made see-through outfits all the rage at big events, but not everyone's a fan.

  Not so demure any more: The rise of 'free the nipple' fashion

  Charli XCX told viewers that ITV had complained about her outfit at the Brit Awards

  Six months ago, a viral TikTok trend made us obsessed with being very demure and very mindful - but now, modesty has taken a back seat among celebrities who have made see-through outfits all the rage on red carpets and catwalks. At the Brit Awards last week, big winner Charli XCX went full brat as she wore a sheer black dress, prompting hundreds of complaints to media watchdog Ofcom. She used one of her acceptance speeches to address the controversy of her outfit. "I heard that ITV were complaining about my nipples," she said. "I feel like we're in the era of 'free the nipple' though, right?" The nearly naked look has been a talking point at other award ceremonies - including last Sunday's Oscars and the Grammys in February, when Kanye West's wife Bianca Censori dropped her coat on the red carpet to reveal an almost entirely invisible dress. The love for transparent textiles has continued at London and Paris fashion weeks, with many of the celebrities watching on also getting the memo.

  Paris Jackson's translucent dress left little to the imagination at Paris Fashion Week

  At Stella McCartney's Paris show, US actress and Michael Jackson's daughter Paris Jackson wore a translucent black off-the-shoulder maxi dress with only a nude-coloured thong underneath. Rapper Ice Spice sported a black lace catsuit with a feathered coat at the show. Naked dressing was a key trend in some designers' spring/summer collections, and the theme has continued in autumn/winter looks too. As Vogue wrote in January, external: "For a period of time, sheerness was few and far between, but nowadays, 'naked dressing' is commonplace every season." Dior's latest collection embraced see-through material and presented it in an ethereal way, with intricate detailing and gender-fluid silhouettes. Creative director Maria Grazia Chiuri described her collection as "demonstrating how clothing is a receptacle that affirms cultural, aesthetic and social codes".

  Dresses with intricate detailing and patterns on were a part of Dior's Autumn/Winter collection

  The trend divides opinion but is certainly part of a wider movement - last summer Charli XCX's definition of being a brat included wearing "a strappy white top with no bra". Sheer dressing is a nod to the minimalist looks of the 1990s - think transparent blouses and Kate Moss wearing a thin slip dress - and with our love for nostalgia fashion, it's no wonder it is taking off again. The trend also had a resurgence a decade ago. The "free the nipple" movement was everywhere in the early 2010s, with Rihanna stirring up headlines with her sheer crystal-embellished dress at the CFDA awards in 2014. Charli XCX's Brits outfit was praised by some on social media. "Stop policing women's bodies," one person wrote, while another said she looked comfortable in her outfit so "why is society judging?"

  But many found it too risque for prime-time TV. Ofcom received 825 complaints about the Brits ceremony, the majority relating to Charli's outfit and Sabrina Carpenter's eye-opening pre-watershed performance. "Maybe think about putting this on at a time when kids ain't gonna be watching," one person wrote on social media.

  Fashion stylist and CEO of clothing brand Mermaid Way, Julia Pukhalskaia, calls the choice to wear revealing dresses a "provocative statement", but says it's a "way to reclaim the right to govern one's body". The controversy around it feeds into a wider dialogue about women's rights and double standards when it comes to dress codes, she adds.

  Abhi Madan, creative director of fashion brand Amarra, believes the trend "is about embracing freedom and boldness in fashion". The idea of freeing the nipple "isn't just about exposure - it's a movement towards body positivity and challenging conventional fashion norms", he argues. "Designers are now integrating sheer elements not just for shock value but to create a refined and elegant silhouette that empowers wearers."

  In 2014, Rihanna wore a sheer dress embellished with diamonds at the CFDA Awards

  It seems many Hollywood stars this year were feeling empowered as chiffon, lace and tulle were in plentiful supply at the Oscars. Shock value is surely a factor for some, too, though. At Vanity Fair's Oscars afterparty, Julia Fox wore a mesh dress with only long wavy hair to cover some of her modesty. There were other interpretations of the naked dress - Megan Thee Stallion wore a green dress with strategically placed foliage and nipple coverings, while Zoe Kravitz opted to cover up the front but expose the back as a beaded mesh panel revealed her buttocks in her Saint Laurent dress. "This year, naked dressing seemed to particularly thrive at the event," the New York Times noted, external.

  However, not everyone is on board. The Times fashion director Anna Murphy wrote that she's over the trend, external because "it's only women who do this". "It is not an equal opportunities endeavour. It is, rather, a manifestation of the kind of thing that keeps this world unequal. That women's bodies are for public consumption and men's, usually, aren't," she wrote. Some men have been embracing the nearly naked trend, though. In 2022, Timothée Chalamet wore striking a backless red top at Venice Film Festival, and at the 2023 Grammys Harry Styles freed the nipple in a plunge harlequin jumpsuit. It's the women who will continue to cause more of a stir on runways and red carpets - and society will still be split on whether it's redefining conventional notions of modesty in fashion, a product of misogyny, or simply seeking attention.
