  Around 15 fire engines and 97 firefighters tackled the fire that destroyed a single-storey building.

  Around 15 fire engines and 97 firefighters tackled a fire that destroyed a single-storey building on Monday night.

  The London Fire Brigade said there were no reports of any injuries and that the cause of the fire, now under control, was being investigated.
