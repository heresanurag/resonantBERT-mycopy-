id: bbc_2022_3605
title: Europe's largest nuclear plant shelled in Ukraine - BBC News
date: '2022-03-05'
section: General
url: http://www.bbc.co.uk/news/world-60613863
content: |-
  Security camera footage from the Zaporizhzhia nuclear plant appears to show a fire at the facility.

  Security camera footage from the Zaporizhzhia nuclear plant appears to show a flare lighting up the site, followed by shelling and a fire.

  According to Mayor Dmytro Orlov of nearby Enerhodar, "continuous enemy shelling of [the plant's] buildings and units" seemed to cause a fire at the nuclear station, which is the largest in Europe.
