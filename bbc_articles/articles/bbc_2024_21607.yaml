title: Birmingham MP Paulette Hamilton feared Afro hair may hurt career - BBC News
date: '2024-09-11'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/c74l2kmvemjo
content: |-
  Campaigners want the government to make Afro hair a protected characteristic to stop discrimination.

  Paulette Hamilton became Birmingham's first black MP in March 2022 following a by-election

  An MP says she felt she would "never succeed in a career" with her natural hair, as campaigners call on the government to make Afro hair a protected characteristic to stop discrimination. Paulette Hamilton sponsored a drop-in session at Parliament, where campaign group World Afro Day (WAD) called for the 2010 Equality Act to add the specification for Afro hair. More than 100 public figures, including Mel B and Beverley Knight, have signed an open letter to the government supporting the change. Birmingham Erdington MP Hamilton said legislation did not go far enough to protect people of colour in the workplace.

  WAD highlighted that while race is already a protected characteristic, schools and workplaces can still unfairly target people of colour due to their natural hair. Protected characteristics are specific aspects of a person's identity stated in the Equality Act like age, race or gender, and by law, no one should be discriminated against because of these characteristics. Hamilton said she "absolutely” believed that the government should change the Equalities Act to include Afro hair. "I'd wear wigs, I'd have perms, I'd wear extensions, because that's what people said I had to do,” the Labour MP said.

  Beverley Knight is among public figures to have signed an open letter to the government supporting the change

  "I also have four girls, and I wanted to show them that I could be my authentic self and achieve." She added: "You had employers that, one in three possibly, wouldn't even employ people if they had their natural hair and that is true discrimination. "This is why there is a large group of us out there. It isn't just a small group, it's a large group." WAD founder Michelle De Leon said she had felt under pressure to use chemicals to straighten her natural hair since she was a child. She added that, for many people of colour, concerns about how their hair would be perceived were on their mind from the beginning of the employment process. "I think it starts even before you get to the workplace. Like an interview - can I wear my own hair to the interview? Will I be accepted with my own hair? Should I change myself to be accepted?” she said. "So that psychology starts before you even get the job, before you even walk into the office.” Chi Onwurah, Labour MP for Newcastle upon Tyne Central and West, also attended the event and said it was important to "promote and recognise the importance of equal treatment for all", adding "there's so much ignorance and prejudice about Afro hair".

