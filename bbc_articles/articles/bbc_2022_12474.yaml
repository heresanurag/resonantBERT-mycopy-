title: 'Kenny Logan: Scotland rugby hero reveals prostate cancer ''shock'' - BBC Sport'
date: '2022-09-06'
section: General
url: http://www.bbc.co.uk/sport/rugby-union/62807215
content: |-
  Former Scotland international Kenny Logan reveals his "huge shock" at being diagnosed with prostate cancer.

  Former Scotland international Kenny Logan has revealed his "huge shock" at being diagnosed with prostate cancer.

  Logan, who won 70 caps for his country, was given the news in February.

  After choosing to have his prostate removed, the 50-year-old says he is "95% back to normal" three months after the operation.

  "It's hard because when you're told you've got cancer... I literally fell over," Logan told BBC Breakfast. "I had no symptoms whatsoever."

  Stirling-born Logan, whose club career took him to Glasgow, London Wasps and London Scottish, made his international debut in 1992 against Australia at the age of 20.

  The winger went on to score 13 tries for Scotland over an 11-year period before retiring after the 2003 World Cup.

  Appearing on the show alongside his wife, BBC presenter Gabby Logan, he said: "I went to get a wellness check. I sat down with the guy and he said 'Everything's fine, your hormones are fine, but your PSA [Prostate-specific antigen] is high'.

  "I said 'What does that mean?' He said 'It's to do with your prostate, you should probably get checked'.

  "So I did and very quickly - within about three or four months - I had a biopsy and they said there's something there but we'll just keep an eye on it.

  "The big figure he said to me was '40% of your mates have got this and they just don't know they've got it.' And this year, on February 7, I was diagnosed with prostate cancer, which was a huge shock."

  Logan admitted he was "pretty battered" after surgery, but says he is now on the mend.

  "I had to make three decisions," he said. "Do you go for radiotherapy, take it out, or brachytherapy. So I decided to take it out. I'm now three months since the operation, had the prostate out, I'm probably 95% back to normal. I'm extremely lucky."

  In May, another former Scotland international, Scott Hastings, also revealed he had cancer. The 57-year-old former British and Irish Lion has received chemotherapy for non-Hodgkin's lymphoma.
