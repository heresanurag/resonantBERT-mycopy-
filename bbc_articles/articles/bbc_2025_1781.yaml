title: 'Notting Hill: Man found guilty of top chef Mussie Imnetu''s murder - BBC News'
date: '2025-02-21'
section: London
url: http://www.bbc.co.uk/news/articles/cpv42kxedrko
content: |-
  Mussie Imnetu suffered serious brain damage after being punched and kicked until he was unconscious.

  Mussie Imnetu died in hospital after being attacked

  A self-proclaimed "monster" has been found guilty of murdering a top chef near the Notting Hill Carnival. Omar Wilson, 32, repeatedly punched and kicked Mussie Imnetu outside Dr Power restaurant in Queensway, west London, and left him dying in the street to go clubbing, the Old Bailey heard. Mr Imnetu, 41, who had previously worked under chefs Gordon Ramsay and Marcus Wareing, was said to have been "heavily intoxicated" when he became involved in a late-night altercation on 26 August last year. A jury deliberated for more than 20 hours to find Wilson guilty of the chef's murder.

  Following the altercation, Mr Imnetu was taken to hospital with brain damage and died four days later. During the trial, Wilson, of Napier Road, Leytonstone, east London, claimed he acted in self-defence, telling jurors: "I just regret that somebody's life was taken while I was trying to defend mine."

  In the aftermath of the attack, Wilson told an associate he "crossed the line". In a message, he admitted: "There's a monster in me, man, and it's just like sometimes it comes out. "And I think I've messed up now. I've messed up, everything's finished." Wilson has been remanded into custody and is due to be sentenced on 28 February.

  Samantha Yelland, of the Crown Prosecution Service, said: "Our thoughts remain with Mussie Imnetu's devastated family and friends who loved him dearly, as well as those who had to witness the shocking attack that evening. "Omar Wilson's savage violence ultimately took the life of a much-loved man, and the Crown Prosecution Service was determined that he should face justice. "While Wilson tried to claim his actions were in self-defence, the evidence clearly showed that he was the only person acting violently. "I hope today's verdict - which will see Wilson put behind bars for the murder - provides some comfort to those who now have to live a life without Mussie."

  Det Ch Insp Brian Howie from the Met's Specialist Crime Command, said: "Mussie was a loving husband, father, son and a respected chef. "He was in London for a few days to help train his colleagues and went out that evening to enjoy the post Notting Hill Carnival atmosphere, where tragically he was violently assaulted. "Our thoughts very much remain with Mussie's family and friends in Dubai, Sweden and London."
