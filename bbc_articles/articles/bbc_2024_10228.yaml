title: Men charged over Leeds mum and daughter crash deaths - BBC News
date: '2024-05-16'
section: Leeds & West Yorkshire
url: http://www.bbc.co.uk/news/uk-england-leeds-69019983
content: |-
  The two men are charged with causing death by dangerous driving over the crash in Leeds last year.

  Justyna Hulboj, 27, and Lena Czepczor, 4, were walking along Scott Hall Road in Leeds when the crash happened

  Two men have been charged over a crash in Leeds in which a mother and her four-year-old daughter died. Justyna Hulboj, 27, and Lena Czepczor were hit by an Audi TT while walking on Scott Hall Road on 16 January 2023. Police said Jasskamal Riyat, 35, of Buckstone Avenue, Leeds, and Hardeep Bhachu, 27, of Grant Row, Leeds, had both been charged with two counts of causing death by dangerous driving. They were released on bail to appear at Leeds Magistrates Court at later dates. Mr Bhachu will appear before city magistrates on 29 May, while Mr Riyat is due to appear on 12 June.

