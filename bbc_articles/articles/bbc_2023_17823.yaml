  Excitement is high as India take on Australia in the final of the ICC Cricket World Cup in Ahmedabad city.

  Why Amitabh Bachchan fans are asking him to not watch the match

  The big question is: will Bollywood superstar Amitabh Bachchan watch the match or not? That's because the actor is known to be superstitious about watching India's matches. "When I don't watch, we WIN!" the actor wrote on X (formerly Twitter) after India won the semi-final match against New Zealand. Since then, Indian fans have been asking him to stay away from the final. Back in 2011, his son, actor Abhishek Bachchan, had said his father believed the Indian team would lose a wicket if he watched their World Cup matches. So, the legendary actor would stay in his room, asking his family to update him about the score. While he skipped the semi-final in 2011, reports say he did watch the final - which India won. So, maybe he should just watch it this time too.
