title: 'James Anderson: England great ''open'' to continuing career in white-ball
  cricket - BBC Sport'
date: '2024-08-13'
section: England
url: http://www.bbc.co.uk/sport/cricket/articles/cgrjnz8pgkvo
content: |-
  James Anderson says he is "still fit enough" to continue his career as he considers a move into white-ball cricket.

  James Anderson says he is "still fit enough" to continue his cricket career and will consider a move into white-ball cricket. The 42-year-old, the most prolific fast bowler in Test history, announced his retirement from international cricket after England's win against the West Indies at Lord's in July. While Anderson stopped short of announcing his retirement from cricket, his immediate transition into a coaching and mentoring role with England suggested that his playing days were over. But Anderson, who took 704 wickets in 188 Tests, says he is "open" to prolonging his career by playing short-form cricket.

  "I might be in a bit of denial because I'm well aware I won't play for England again, but I've still not made a decision on my actual cricket career," Anderson said, speaking at the launch of a new campaign by the England and Wales Cricket Board to get more children playing the sport. "There's definitely a bit of intrigue with the shorter formats because I've not played any franchise stuff before. Watching The Hundred this year, seeing the ball swing around, it makes me feel like I could do a job there. "I know it's a while since I played it and my age will get brought up again but I really feel I'll be good enough to play that form of cricket." Anderson added he would make a decision on his future at the end of the summer and he is "not shutting myself off to anything". Anderson's last T20 match was in 2014 as he dedicated the last 10 years of his career to red-ball cricket. England are keen to tap into Anderson's expertise before the 2025 Ashes series in Australia by retaining him in a coaching role. The ECB campaign which Anderson was supporting is encouraging more people to find their way to play, no matter if that is casual cricket at home, in the street, at the local park, at school, or at a local club or community project.
