content: |-
  The M5 in Somerset has reopened after an earlier lorry fire closed all lanes.

  This video can not be played To play this video you need to enable JavaScript in your browser. The M5 has reopened in Somerset after a lorry caught fire

  The M5 has now reopened in both directions between junction 22, at Burnham-on-Sea, and junction 23 at Puriton, with two lanes still closed southbound. Emergency surface repairs are anticipated to be carried out later on Friday evening. National Highways says motorists face up to four hours of delays compared to normal travel time.

  All lanes had been closed between between junctions 22 and 23 on the M5

  The truck was transporting "agricultural grade milk powder" for Mole Valley, the agricultural supplies company said. A spokesperson for Mole Valley added: "It was likely a wheel or tyre failure caused the fire. "The driver called the emergency services immediately and the driver is safe."

