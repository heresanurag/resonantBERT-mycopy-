content: |-
  Green Party co-leader was asked on BBC Question Time about migration and the switch from petrol cars.

  The Green Party's co-leader was asked on BBC Question Time about immigration and the switch from petrol cars.

  Adrian Ramsay said the health sector is dependent on skilled migrants coming to the UK.

  On the switch from petrol and diesel vehicles to electric, he says national infrastructure needs investment and a "clear timescale".
