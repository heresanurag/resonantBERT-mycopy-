title: Graziano Di Prima to leave Strictly Come Dancing - BBC News
date: '2024-07-13'
section: Culture
url: http://www.bbc.co.uk/news/articles/c4ngl4qkjgeo
content: |-
  In a statement, the dancer said he "deeply regrets" the events leading up to his exit from the show.

  Graziano Di Prima out of Strictly Come Dancing line-up

  Strictly Come Dancing star Graziano Di Prima has confirmed that he is leaving the show. In a statement on Instagram, he said he "deeply regrets" the events leading up to his departure and acknowledged that his "intense passion and determination to win might have affected my training regime". A BBC spokesperson confirmed that Di Prima was "no longer a part of the line-up of professional dancers for the upcoming series". "While we would never comment on individual cases, it is well-known that the BBC has established a robust duty of care procedures, and if issues are raised we will always take them seriously and act swiftly as appropriate,” they said.

  Di Prima, 30, first joined the Strictly line-up in 2018 as the partner of radio DJ Vick Hope. He remained part of the show for the following two years, though did not have a celebrity partner, then in 2021 danced with comedian and Loose Women host Judi Love. He returned in 2022 and was paired with actress Kym Marsh, with whom he reached the quarter finals, and last year danced with TV presenter Zara McDermott. Away from Strictly, Di Prima has competed in numerous international dance competitions and toured globally with dance company Burn The Floor. In his statement, he said he understood that it was "best for the show that I step away". "While there are aspects of this story involving external influences that I can't discuss at this time, I remain committed to being strong for my family and friends," he said. “I wish the Strictly family and the BBC nothing but success in the future. I also want to thank everyone who has supported my career, both professionally and personally. When the time is right, I will share my story.”

  The episode is not the first time Strictly - which is among the most watched shows in the BBC line-up - has faced a complaint about the practices of one of its professional dancers. Last month, following widely-reported complaints about his teaching methods, the show confirmed that long-standing professional Giovanni Pernice would not be part of the 2024 series. Pernice had said earlier he was surprised by the allegations and rejected "any suggestion of abusive or threatening behaviour".
