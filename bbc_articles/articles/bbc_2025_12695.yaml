title: Child abuse training failures before Alfie Steele's Droitwich murder - BBC
  News
date: '2025-06-24'
section: Hereford & Worcester
url: http://www.bbc.co.uk/news/articles/c5y279p3mplo
content: |-
  Twenty cases when police had contact with Alfie Steele and his family were investigated.

  Alfie Steele was killed by his mother and her partner at their home in 2021

  A police force that repeatedly met the family of a nine-year-old boy who was later murdered in his home did not sufficiently train front-line officers to identify child abuse, a police watchdog's report concluded. Alfie Steele was killed by his mother and her partner at their home in Droitwich, Worcestershire, in 2021 and the pair were jailed two years later. Twenty cases when West Mercia Police had contact with Alfie and the couple were examined by the Independent Office for Police Conduct (IOPC) which concluded there was "no indication of misconduct" by any officer. Alfie's grandfather Paul Scott said: "We see nothing in the report that shows any change, it is a waste of public money."

  He told the BBC the report had not changed anything and he was "still living a nightmare which doesn't go away". "If they had done their jobs, he wouldn't have died," Mr Scott said. "Nothing will bring Alfie back but we hoped at least, that things would change and that another child wouldn't die." The nine-year-old was subjected to months of abuse and died after being held under the water in the bath at his home in February 2021. He had endured years of abuse and had more than 50 injuries on his body at the time of his death. Alfie's mother, Carla Scott was jailed for manslaughter, while her partner, Dirk Howell was sentenced to at least 32 years in prison for murder in June 2023.

  Alfie Steele was nine years old when he was killed

  Mr Scott said he wanted somebody to be held accountable for his grandson's death. He added: "What about the chain of command in the police? "Nobody is taking responsibility. Nobody is learning, I don't want to turn on my television and see that another child has died."

  The IOPC said it had examined cases where the force had contact with Alfie, his mother or Howell between March 2018 and February 2021, following concerns raised by worried neighbours and witnesses. They found a different police officer or police community support officer (PCSO) responded to each call and Alfie was never spoken to by any officer on his own. "Alfie's mother also often answered any questions on his behalf, which meant his voice was never heard by police," a spokesperson said. "The climate of fear which existed within the family home often led to Alfie being in bed, allegedly asleep, during many of the times police were called."

  Alfie loved going to watch sport with his grandfather, Paul Scott

  The IOPC said its investigation had found areas of improvement for the force to better train officers to identify child abuse. They include putting warning markers on police logs and highlighting that a child at a particular address is subject to a child protection plan. They also recommend West Mercia Police's policies around referrals to children's services are reviewed to ensure they are fit for purpose, a finding which it said the force had accepted and introduced. Derrick Campbell, an IOPC director, said: "We found no indication of misconduct by any individual officer but we recommended that eight police constables and two PCSOs undertake reflective practice, to review how they handled interactions concerning Alfie. "In our view, when called to the home, officers should have found a way to speak to Alfie without other adults being present, in line with best practice."

