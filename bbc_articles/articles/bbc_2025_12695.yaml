  Mr Campbell said the force had since trained hundreds more officers and was committed to ensuring everyone who worked there knew what had happened to Alfie and made sure children "do have a voice" in any welfare reports. The IOPC investigation began in July 2023, following a mandatory referral from West Mercia Police. A BBC investigation previously found police and social workers were contacted more than 60 times by members of the public, who were concerned the nine-year-old was being abused. Freedom of Information requests by the BBC discovered Worcestershire County Council was contacted 36 times between 2018 and 2020, by people who were concerned about his welfare. West Mercia Police was also contacted 28 times in the same three years. In a statement on Tuesday, the force said, following Alfie's death, it had carried out a review which led to "significant changes and training" for officers, to make sure the signs of child abuse and vulnerability were fully understood. Deputy Chief Constable Rachel Jones said the force had since extended the training to raise awareness to all officers and staff of "the importance to capture the voice of the child". She added the entire workforce was being told about what had happened to Alfie "to highlight the importance of this and how vital it is we get it right". "We must put safeguards in place to make sure no child ever suffers like that again," she added.
