content: |-
  Baby Reindeer's Richard Gadd and Jessica Gunning are among the stars in the running for Emmy Awards.

  Baby Reindeer's Richard Gadd and Jessica Gunning are both up for acting awards

  The stars of Baby Reindeer and The Crown are among those nominated for this year's Emmy Awards. Scottish comedian Richard Gadd, creator of controversial Netflix series Baby Reindeer, has three nominations - for acting, writing and producing. Jessica Gunning, who plays stalker Martha, is also nominated for an acting award, as are co-stars Nava Mau (Teri) and Tom Goodman-Hill (Darrien). The series has 11 nominations in all. Most nominated is Japan-set samurai epic Shogun with 25, while The Bear has set a record for a comedy programme with 23.

  Hiroyuki Sanada is nominated for best lead actor in a drama, for Shogun
  • None Only Murders in the Building - 21

  Imelda Staunton is nominated for best lead actress in a drama series

  Imelda Staunton is up for best lead actress in a drama, for playing Elizabeth II in the final series of Netflix royal drama The Crown. Jonathan Pryce (Prince Philip), Dominic West (the Prince of Wales, Prince Charles), Elizabeth Debicki (Diana, Princess of Wales) and Lesley Manville (Princess Margaret) also have nominations. And Claire Foy - who played Elizabeth II in the first two series - has a nomination for best guest actress, for returning in a final scene in which the monarch reflects on her life. Olivia Colman, The Crown's other former lead actress, is nominated for a different role - Chef Terry in US restaurant drama The Bear. The Bear has 10 acting nominations in total, including for its stars Jeremy Allen White and Ayo Edebiri, and British guest actor Will Poulter.

  The Bear's Ayo Edebiri is up for outstanding lead actress in a comedy series

  Other nominated British actors include Idris Elba for Hijack, Gary Oldman and Jack Lowden for Slow Horses, Tom Hollander for Feud, Jonathan Bailey for Fellow Travelers, Michaela Coel for Mr & Mrs Smith, Matt Berry for What We Do in the Shadows, and Juno Temple for Fargo. For murder mystery comedy Only Murders in the Building, the central cast members Steve Martin, Martin Short and Selena Gomez are all in the running, alongside Meryl Streep, who joined for season three. Elsewhere, Jennifer Aniston and Reese Witherspoon will go head-to-head for their roles in The Morning Show, while Jodie Foster and Robert Downey Jr are among the other big names on the shortlists. The Emmys are the most prestigious honours in the US TV industry. The winners will be announced on 15 September.
