  Kyle Smith sent down the crucial final stone to seal victory for Great Britain

  Great Britain men's curling team moved up to joint third in the table with a 7-6 victory over Denmark after a thrilling last end. The Danes led 6-5 but failed in their attempt at a crucial double takeout that would have taken the match to sudden death. It left GB skip Kyle Smith with the simple task of finding the house with his final stone, which he did for a crucial win. Only the top four in the table progress to the semi-finals. "It's all in our own hands and you can't ask for more than that," Smith told BBC Sport. "A couple of wins and we'll be in a perfect place in the semi-finals." They play Norway on Tuesday before their final match against the USA on Wednesday. The British women are also still in contention for a semi-final spot after snatching a crucial 8-7 win over Switzerland. Eve Muirhead's team scored two points in the 10th and final end for victory, with matches against Japan and Canada coming up. They currently lie in joint fourth place with USA. The skip said: "It was a tough game. Both teams played really well. It was a game of inches. We stepped up a gear from yesterday and we want to take this into tomorrow [against Japan]."

  Both Brad Hall and Joel Fearon will also compete in the four-man bobsleigh

  Great Britain's bobsleigh pilot Brad Hall said it was a "tough" night as "inconsistencies" cost him and Joel Fearon from building on the seventh position they held in the two-man event heading into the final two runs. The pair finished in 12th, 1.43 seconds off the medals, but believe better is to come in the four-man event at the weekend. "Twelfth is better than anything I've achieved at a World Cup so that has to be a positive," Hall said. Fearon added: "I'm so proud of what Brad has achieved in a short space of time and tonight was a bit of an anticlimax after Monday, but we'll have the power of two more guys in the four-man and we think it'll be exciting - so tune in."
