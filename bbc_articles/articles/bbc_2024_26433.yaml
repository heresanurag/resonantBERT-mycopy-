title: Strikes on Tehran another big escalation - Jeremy Bowen - BBC News
date: '2024-10-26'
section: General
url: http://www.bbc.co.uk/news/videos/cd7nx1yvd79o
content: |-
  Israel has launched air strikes on Iran, with blasts heard in the capital Tehran.

  As footage of the aftermath of the air strikes on Iran emerges, the BBC's International Editor Jeremy Bowen explains this is another big escalation in the deepening war in the Middle East.

  Israel says it’s responding to months of continuous attacks from Iran, not just the ballistic missiles Iran fired at Israel on 1 October, but aggression from Iran’s allies and proxies.

  In a statement, the Iranian foreign ministry condemned Israel's attack and described it as a "clear violation" of international law.
