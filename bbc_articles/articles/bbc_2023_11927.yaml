  Watch as Hana Burzalova and her team-mate Dominik Cerny get engaged as she crosses the finish line of the women's 35k race walk at the World Athletics Championships in Budapest.

  Watch Hana Burzalova and her team-mate Dominik Cerny get engaged after Burzalova crossed the finish line 28th in the women's 35k race walk at the 2023 World Championships. Cerny had finished 19th the men's race earlier in Budapest.

