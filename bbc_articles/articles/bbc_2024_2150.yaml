content: |-
  Buckingham Palace has announced that King Charles is being treated for a form of cancer.

  King Charles has been diagnosed with a form of cancer. Here is the Buckingham Palace statement in full:

  During The King's recent hospital procedure for benign prostate enlargement, a separate issue of concern was noted.

  His Majesty has today commenced a schedule of regular treatments, during which time he has been advised by doctors to postpone public-facing duties.

  Throughout this period, His Majesty will continue to undertake State business and official paperwork as usual.

  The King is grateful to his medical team for their swift intervention, which was made possible thanks to his recent hospital procedure.

  He remains wholly positive about his treatment and looks forward to returning to full public duty as soon as possible.

  His Majesty has chosen to share his diagnosis to prevent speculation and in the hope it may assist public understanding for all those around the world who are affected by cancer.
