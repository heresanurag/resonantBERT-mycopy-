title: Children in 'save Desborough Library' protest - BBC News
date: '2017-11-21'
section: General
url: http://www.bbc.co.uk/news/uk-england-northamptonshire-42074836
content: |-
  About 60 primary school children gathered in Desborough to show their support for the town's library.

  About 60 primary school children gathered to fight the possible closure of a library.

  Desborough Library, in Northamptonshire, could be shut as part of council cuts of £10m.
