title: Morocco's national football team give blood after quake - BBC News
date: '2023-09-10'
section: General
url: http://www.bbc.co.uk/news/world-africa-66767126
content: |-
  The team's upcoming match against Liberia on Morocco's coastline was cancelled as a result of the earthquake.

  Players and staff of Morocco's national football team have given blood after a deadly earthquake hit their country.

  More than 2,000 people have been killed by the 6.8-magnitude earthquake.

  The team was due to play an African Cup of Nations qualifier against Liberia on Saturday in Agadir, 205km (127 miles) south-west of Marrakesh, but the game has been cancelled.

