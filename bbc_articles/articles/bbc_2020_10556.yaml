title: Investment giant BlackRock cracks down on romance outside work - BBC News
date: '2020-09-23'
section: Business
url: http://www.bbc.co.uk/news/business-54261911
content: |-
  It's not just the flings with colleagues, BlackRock wants to know who you are dating outside the office too.

  New rules over office romances are being rolled out at the investment giant BlackRock.

  They will now extend to relationships outside the office in a bid to clamp down on conflicts of interest.

  BlackRock staff were already expected to tell managers if they were dating one of their 16,000 colleagues.

  But the new policy, shared in a memo with staff, says they must disclose relationships with "external partners" with a connection to the firm.

  The size of the New York based firm, which has more than $7tn under management and vast numbers of suppliers and clients around the globe, means that the new rules will have far-reaching implications, shining a probing light into the personal lives of potentially hundreds of thousands of people.

  It follows the #Metoo movement, which revealed sexual harassment within a range of professional settings and focused attention on workplace strategies to clamp down on relationships between bosses and subordinates.

  McDonald's chief executive Steve Easterbrook was removed last year after a relationship with a colleague came to light.

  At BlackRock late last year senior executive Mark Wiseman, was fired for failing to disclose an affair with a colleague. He had been tipped as a possible successor to the firm's high profile chief executive Larry Fink.

  While many workplaces require staff to be open about relationships with colleagues, BlackRock's new policy is unusual in asking for information about partners at other firms.

  The policy says they should disclose any personal relationship they have at any "service provider, vendor, or other third party (including a client), if the non-BlackRock employee is within a group that interacts with BlackRock", according to the internal memo, seen by the BBC.

  Former McDonald's boss Steve Easterbrook lost his job over a relationship with a colleague

  The aim is to tackle any conflicts of interest, or perceived conflicts of interest, by taking the matter out of the hands of the employee concerned and allowing human resources and lawyers at the firm assess whether there is a problem.

  But there is a new urgency around managing private and professional boundaries thanks to the switch to working from home prompted by the pandemic.

  "I can see why it is an issue for [BlackRock]," says Tom McLaughlin, employment lawyer with BDBF. "We are staring down the barrel of the majority of office workers working from home again. Employers will realise they do need to know more about people's domestic arrangements than they did before."

  The new policy defines which relationships come under the new policy as any that could be "susceptible to perceived impropriety, bias, favouritism, and/or abuse of authority within a work environment".

  That includes not only romantic or sexual relationships, but family connections and outside business interests,but not "friendships with work colleagues."

  However it is not clear from the memo where the threshold lies, at what point does a friendship, or a series of dates, becomes significant enough to require disclosure.

  There is no law prohibiting employers from asking questions about relationships, but the answers will need to be treated carefully to comply with privacy rules.

  "The real crunch will come if there is a perceived conflict of interest," says Mr Tom McLaughlin.

  BlackRock says disclosures would be treated with discretion, and if necessary, "alternative work arrangements" may be put in place.

