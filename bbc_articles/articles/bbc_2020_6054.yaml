title: 'Coronavirus in England: Latest updates - BBC News'
date: '2020-06-03'
section: England
url: http://www.bbc.co.uk/news/live/uk-england-52843327
content: |-
  Bringing you the latest news from across England about the coronavirus pandemic.

  There have been more than 279,000 confirmed cases of coronavirus in the UK and almost 40,000 people have lost their lives, government figures show.

  However, these numbers only include people who have been tested, and the total number of deaths relating to coronavirus is likely to be higher.

  The UK has the highest official death toll in Europe and the second highest in the world. However, the government and many experts say it is too soon to make international comparisons.

  Although daily deaths have decreased, the downwards trend appears to have stalled in recent days.

  The majority of the UK's deaths have been in England, with more than 35,000 so far - about 90% of the total for the UK.

