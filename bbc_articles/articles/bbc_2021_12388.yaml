title: 'Boris Johnson: No ''uncontrolled immigration'' to solve driver shortage -
  BBC News'
date: '2021-10-03'
section: General
url: http://www.bbc.co.uk/news/uk-politics-58778886
content: |-
  The prime minister says the "big lever marked uncontrolled immigration" will not be pulled to solve the driver shortfall.

  Boris Johnson has said the "big lever marked uncontrolled immigration" would not be pulled in order to to solve the UK's shortage of skilled drivers.

  Speaking to the BBC's Andrew Marr, the prime minister said some ''controlled'' immigration to address the problem was "entirely sensible".
