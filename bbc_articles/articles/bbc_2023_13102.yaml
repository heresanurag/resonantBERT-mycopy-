  Census figures last year indicated 45% of the population of Northern Ireland had a Catholic background.

  Politicians and independent members of the Policing Board - an oversight body set up during the policing reforms - have also highlighted concerns about how the data breach could affect undercover officers.

  For such officers, secrecy is all the more important.

  PSNI intelligence specialists have links with the security service MI5.

  Dissident republicans have claimed they have access to the data breach list

  That is one of the reasons why PSNI commanders are discussing the course of action after this week's events with security chiefs and the government in London.

  Budgets may come under more pressure, if compensation claims move forward or PSNI staff need to be given extra support with their personal security.

  Police are assessing a claim by dissident republicans that they have the leaked information.

  For the PSNI Chief Constable Simon Byrne, and his leadership team, this is the most unexpected of crises, with still unpredictable repercussions.
