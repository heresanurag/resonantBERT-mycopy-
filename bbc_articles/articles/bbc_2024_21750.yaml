content: |-
  The recycled bedding has been distributed to new owners who have signed up to the scheme.

  Sustainable living is something we’ve heard a lot about, but how would you feel about using secondhand bedding?

  As the new academic year begins, some students at St Andrews University have been opting for environmental bed linen options.

  Transition University of St Andrews, a community interest company, has gathered preowned duvets, pillows and sheets and professionally washed them, ready for the new semester.

  This is part of Transition's St AndReuse programme, a townwide partnership project with St Andrews Environmental Network.

  The bedding has been distributed to new owners who have signed up to the scheme.

  More than 60 students have signed up and the scheme is sold out, although the organisation has plans to expand in the future.
