  Reacting to the news of his death, movie critic Bilge Ebiri paid tribute online, saying: "No matter how good people think he was, Wolfgang Petersen was *better.*

  "In the Line of Fire is an eternal masterpiece (watch it again.) Das Boot revolutionised Hollywood action for a generation. Enemy Mine, AIr Force One, Troy... All amazing movies."

  Jürgen Prochnow as the submarine commander, known as the old man and in the background Bernd Tauber as the quartermaster Kriechbaum in Das Boot

  Petersen released his first English-language film, the children's fantasy adventure The NeverEnding Story, in 1984.

  Another film and theatre critic Alan Zilberman offered: "Wolfgang Petersen made some terrific thrillers, including In the Line of Fire and Das Boot, but I'll always associate him most with The NeverEnding Story. No children's film ever hit harder. Rest in power."

  Petersen moved into Hollywood action and disaster movies in the 1990s, working with Eastwood and John Malkovich in assassination thriller In The Line of Fire.

  Wolfgang Petersen alongside Outbreak stars Rene Russo, Dustin Hoffman and Cuba Gooding Jr at the film's Los Angeles premiere in 1995

  Later, he directed Dustin Hoffman in the pandemic-themed Outbreak.

  Moving into the 21st Century, the German worked with George Clooney in The Perfect Storm and Pitt in Troy.

  The late filmmaker died in the the arms of his wife of 50 years, Maria, at his residence in Los Angeles.
