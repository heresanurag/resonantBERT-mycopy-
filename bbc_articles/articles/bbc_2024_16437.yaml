title: Boy, 8, pulled from River Arrow in Alcester dies - BBC News
date: '2024-07-24'
section: England
url: http://www.bbc.co.uk/news/articles/cydv234l0p5o
content: |-
  Joshua Hillstead, from Birmingham, reportedly fell into the River Arrow in Alcester.

  An online fundraising page has been set up by a friend of Joshua Hillstead's family

  An eight-year-old boy has died after reportedly falling into a river in Warwickshire. Joshua Hillstead, from Maypole, Birmingham, was pulled from the River Arrow in Alcester on Monday evening and received specialist trauma care at the scene. Warwickshire Police said he was then taken to hospital and died on Tuesday evening. Det Insp Heidi Twynham said: "Losing a child is devastating, and we offer our condolences to the family after this tragic accident."

  His death was announced within minutes of a 16-year-old boy, who was found after a search of a reservoir near Dudley. The force said Joshua died as a result of complications and that it was working with his family to provide support. It said it was called, along with the fire service and ambulance service at 21:30 BST on Monday, to a spot behind Kingfisher Way. West Midlands Ambulance Service said Joshua was in a serious condition when it arrived and was taken to Birmingham Children's Hospital for further treatment. A girl was also rescued from the water and was discharged at the scene after being assessed and given first aid. Det Insp Twynham said: "Fast, unpredictable currents and invisible deeper sections make rivers dangerous places, particularly for children and non-confident swimmers." An online fundraising page has been set up to raise money for his family.
