title: Britain's 'oldest' barrister Noel Philo still loves his job at 90 - BBC News
date: '2025-01-03'
section: England
url: http://www.bbc.co.uk/news/articles/c20njmj4k15o
content: |-
  Noel Philo continues to prosecute and defend criminal cases at Lincoln Crown Court.

  Noel Philo turned 90 on Christmas Day and says he is still enjoying his job at Lincoln Crown Court

  A man thought to be Britain's oldest practising criminal barrister says he has no intention of retiring any time soon. Noel Philo, who was called to the bar in 1975 and works at Lincoln Crown Court, celebrated his 90th birthday on Christmas Day. "I do feel that through my work, I can do some good and help people," Mr Philo said. "As long as I am wanted and as long as I'm fit, I'll keep going. How long that will be, I don't know."

  Although his caseload has reduced in recent years, his colleagues at Nottingham-based chambers, KCH Garden Square, told the BBC he still makes himself available every day. In recent years, his cases have included a partially-sighted man who crashed his partner's car into a house because he thought she was cheating on him, and a woman who attacked her neighbour with a claw hammer in a row over parking. He also helped bring to justice a travel company director who cost eight schools more than £350,000 after failing to ensure they were insured for trips.

  Noel Philo, centre, studied law at Oxford from 1955 to 1958

  Born in 1934, Mr Philo was educated at the University of Oxford and admitted as a solicitor in 1966. He said he loved his job and had lots of friends at the court, which was a "wonderful" place to work. The building did have its drawbacks, however. "When it was built, about 1839, people were smaller," he said. "Jurors these days can hardly fit into the jury box." Other changes he had seen during his decades of service included the introduction of video technology, which allowed him to continue appearing while isolating at home during the Covid-19 pandemic. "I can be in three courts in one day, quite far from each other, by video, so that is an excellent thing," he added. Speaking at a surprise reception for Mr Philo before Christmas, the Recorder of Lincoln, Judge Simon Hirst, paid tribute to him. Judge Hirst said: "I have been in the legal profession some 30 years and when I began my career at chambers in Hull I was a regular visitor to Grimsby Crown Court. "In the robing room, Noel always had words of wisdom for a 'baby' barrister and displayed acts of kindness."

  Mr Philo says he has no plans to retire

  Judge Hirst added: "We are always delighted to have Noel helping us at this court, and I hope it continues for many years to come." Mr Philo has four children and nine grandchildren. None of them have followed him into the legal profession, but his wife Liz is a qualified solicitor and also still sits as a deputy district judge. He was given his festive name after being born on Christmas Day 1934 in Esher, South West London. "At least it means no one can forget my birthday," Mr Philo joked. He said continuing to work "keeps the old brain going", adding "it's a case of use it or lose it". "Obviously, if I got to the stage where I was no longer any use, I wouldn't get any briefs and I would have to retire," he said. "My senior clerk says that he thinks I'll still be going when the rest of them have retired, but I'm not sure about that." Listen to highlights from Lincolnshire on BBC Sounds, watch the latest episode of Look North or tell us about a story you think we should be covering here, external.

