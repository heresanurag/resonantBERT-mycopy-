title: 'Taylor Hinds: Liverpool defender target of sexually-inappropriate comment
  - BBC Sport'
date: '2025-03-10'
section: Women's Football
url: http://www.bbc.co.uk/sport/football/articles/cj67nlg1p2do
content: |-
  Liverpool defender Taylor Hinds says she is "determined to make a stand" after being subjected to "sexually inappropriate comments" from a fan.

  Taylor Hinds captained Liverpool during their victory over Arsenal

  Liverpool defender Taylor Hinds says she is "determined to make a stand" after being subjected to "sexually inappropriate comments" from a fan during her side's Women's FA Cup victory at Arsenal on Sunday. Hinds said she heard the comments while down with a head injury during Liverpool's 1-0 win. She and a team-mate reported the comments to officials and a member of the crowd was removed from the stadium. Liverpool and Arsenal released statements on Monday condemning the abuse Hinds suffered. Hinds, who captained Liverpool, said it was "hard" to continue playing following the comments. "I will not let the actions of one individual ruin what was a fantastic day for the team and our supporters but it is not okay and I was determined to make a stand," the Jamaica defender said. "It was hard for my mum and dad to not realise what was going on and to find out later what was being shouted at their daughter during a game of football. "I'm doing fine and would like to thank my team-mates and everyone at Liverpool for having my back, as well as the match officials for their swift actions and everyone at Arsenal for their assertive actions and backing. "Together we can continue to make our sport better both now and for the years to come."

  A Liverpool spokesperson said the club "condemns all forms of discrimination" and will continue to campaign against it. "All players, now and in the future, should have the knowledge that our pitches and stadiums are safe places to play football," a club statement read. "We thank Taylor for immediately raising this issue, her teammates and everyone at Arsenal for their swift actions. "We will fully support the ongoing investigation for the individual involved." Arsenal said they have offered their "full support" to Hinds and confirmed an investigation is under way. "We have a zero-tolerance approach to abuse and discrimination of any kind and remain committed to taking strong action against such behaviour," the club added.
