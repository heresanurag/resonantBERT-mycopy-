title: Aberhosan farmer died in animal feed spillage, inquest hears - BBC News
date: '2023-03-01'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-64810612
content: |-
  A farmer died from "traumatic injuries" after animal feed spilled on him, an inquest hears.

  Farmer Iwan Evans, 78, died on Cleiriau Isaf farm in Aberhosan, Powys, on 17 Febuary

  A farmer died after animal feed spilled on him "with force", an inquest opening has heard.

  A post-mortem examination concluded 78-year-old Iwan Evans died of "traumatic injuries" at his farm in Aberhosan, Powys, on 17 February.

  The inquest heard that a company was delivering animal feed to a "freestanding" bin when "its contents spilled".

  Mr Evans was "underneath the bin and its contents appear to have hit him".

  The inquest has been opened and adjourned to "allow a full investigation of the circumstances" of the death

  The coroner at Pontypridd, Rhondda Cynon Taf, heard the haulage driver and Mr Evans' son tried to remove the feed bin using "farm vehicles and chains".

  The haulage driver "ran the short distance to the farm house to alert the deceased's wife who contacted emergency services".

  CPR was carried out, but Mr Evans was confirmed to have died at 18:24 GMT.

  Coroner Patricia Morgan opened and adjourned the inquest to "allow a full investigation of the circumstances" of Mr Evans' death.

  A review of the evidence will be held in six months.
