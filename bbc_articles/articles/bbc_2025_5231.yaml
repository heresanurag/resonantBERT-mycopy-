title: 'Stormont: Programme for government presented to the NI Assembly - BBC News'
date: '2025-03-03'
section: Northern Ireland Politics
url: http://www.bbc.co.uk/news/articles/ce8vvzg2n6mo
content: |-
  The programme for government includes a target of treating an extra 70,000 patients to reduce hospital waiting lists.

  Emma Little-Pengelly says the Programme for Government aims to deliver for the people of Northern Ireland

  The programme for government is "a message of ambition", the deputy first minister has said. The plan, called Doing What Matters Most, was unanimously agreed by the four parties in the executive last week. It was presented to the Northern Ireland Assembly on Monday, with First Minister Michelle O'Neill describing it as a "significant milestone". However, the Social Democratic and Labour Party (SDLP)'s Matthew O'Toole said it was a "missed opportunity" and that his party would be "demanding better than this late, limp, listless programme for government".

  Treating an extra 70,000 patients to reduce hospital waiting lists and building more than 5,000 new social homes by 2027 are targets for the government in the programme. Little-Pengelly, from the Democratic Unionist Party (DUP), said the programme for government was "not the totality of our ambitions". "This is about prioritisation, and prioritisation is always difficult," she told assembly members on Monday. "We are in a fiscally constrained environment. It is difficult to fund everything that we want to fund and that does require hard decisions." Speaking in the assembly, O'Neill said the final document recognised the four-party executive's "shared ambitions".

  The plan, called "Doing What Matters Most", was unanimously agreed by the four parties in the executive last week.

  It is just over a year since the Northern Ireland Executive reformed in February 2024. A draft version of the programme was published last September before an eight-week public consultation. More than 1,400 responses were received in the consultation process for the draft programme for government. The last time an executive managed to get one over the line was during the assembly's fourth term between 2011 and 2015.

  O'Neill, the Sinn Féin vice-president said the programme showed the public parties were "willing to work together to do right by them." "I believe the programme for government shows what we need to prioritise in order to make this a better place to live, work and invest," O'Neill said. "As a result we have introduced targets and annual objectives, which will be updated each year aligned to our budget." Little-Pengelly said her message was one of "hope". "It is a message of ambition and it is a message of seeking to do everything in our power to deliver for the people of Northern Ireland," she added. "The programme for government provides a roadmap to grow our economy, strengthen our communities and support hardworking families."

  Matthew O'Toole said the programme is a 'missed opportunity'

  Social Democratic and Labour Party (SDLP) member Matthew O'Toole said his party would be "demanding better than this late, limp, listless programme for government". The leader of the opposition said: "This document contains aspirations we share, but it is far short of the kind of clear, targeted plan that the people of Northern Ireland deserve after so many years of failure." He added: "This programme is better than nothing. It's a modest improvement on the draft, but it's a missed opportunity. It's nowhere near good enough. "I say to the first and deputy first ministers, and indeed all ministers - is this it?"

  The final document runs to 100 pages and focuses on nine key priorities:
  • None Better support for children and young people with special educational needs

  Michelle O'Neill said the programme was a milestone for the executive

  Alliance Party deputy leader Eóin Tennyson said the process of developing the programme for government was "fraught at times" and involved "needless delay", but he welcomed agreement on it as a "step forward". He said the paper was not an "exhaustive list" of what ministers would achieve, "nor should it be seen as the ceiling of our ambition". "It does however set out a series of positive proposals in a number of areas where there is consensus amongst the four parties within mandatory coalition," he said. The Police Federation for Northern Ireland (PFNI) said it was "beyond disappointing" that the programme for government failed to make "cast-iron promises" on police numbers and general funding. PFNI chair Liam Kelly said: "This is dismaying. It is a standstill agenda. All we have here an intention to 'develop a robust business case that will seek to stabilise, and begin to grow, police officer numbers'. "There is nothing to say what that actually means or a fixed timeline."

  Alongside the priorities there are specific targets. On the issue of waiting lists, the programme said that by 2027, which is when the assembly mandate runs out, the executive will have invested up to £135m a year "to reduce waiting lists by treating an additional 70,000 patients". It added that it would also increase elective care capacity through expansion of elective care centres and mega clinics by investing an extra £80m a year to "remove the demand/capacity gap that causes waiting lists to grow". Health Minister Mike Nesbitt said the amounts were "very dramatic and very welcome", but he would be writing to the first and deputy first ministers, and the finance minister, to seek clarity on the proposals and timelines. The Ulster Unionist Party (UUP) minister added that £80m is what is needed to stop waiting lists getting longer, and £135m was needed per year for five years to reduce them. "If that money's come in... I need to start planning immediately about getting that money out and getting people seen in a more timely manner," he said.

  Health Minister Mike Nesbitt welcomed the funds spelled out for waiting lists in the programme for government

  Traditional Unionist Voice (TUV) assembly member Timothy Gaston said the document does not address unionist concerns over post-Brexit trade arrangements under the Northern Ireland Protocol. "Where is the section on how this executive is going to deal with the protocol? It isn't so much as mentioned," he said. "I ask unionists who claimed that they would fight the protocol within the arena of Stormont - how's that working out for you?" People Before Profit (PBP) assembly member Gerry Carroll said the programme for government was a "clear indication that the executive is out of touch with the people they claim to represent". He added: "The mere existence of this programme for government has been hailed as a celebration. I would ask, is the bar really this low? Do ordinary people not deserve better?"

  On social housing, the document said that the executive "want to commit to the long-term public subsidy required to deliver more social homes". Its target for 2027 is to have started work on at least 5,850 new build social homes in Northern Ireland. Kirsten Hewitt, director of homelessness services at the Simon Community, told BBC News NI's Good Morning Ulster that while the organisation welcomed the focus on social housing, further action was needed. "Absolutely, it's so important but what we need are the actions that are associated with that – how are we going to deliver at least 2,000 social homes each year because that's whats needed in Northern Ireland. "Last year, we had just over 1,300 built so we really need to improve." She said government departments needed to work together to address homelessness.

  On childcare, the executive said that it would have agreed a comprehensive Early Learning and Childcare Strategy. It also committed to increasing renewable electricity capacity by 40% by 2027 and considering an Employment Rights Bill for introduction in the assembly. The document also specifically mentioned the issue of special educational needs and said the executive would produce a reform agenda and delivery plan to help improve outcomes for children with SEN and their families.

  The paper stated that the executive would "make progress" on the redevelopment of Casement Park, but did not include a definitive timeframe for this. The programme for government also committed to establishing a delivery unit to drive reform and transformation across government and wider public services. Alongside the document, the executive promised to keep the public updated by "publishing annual reports on the progress we are making". It added: "This will show that meaningful progress is being made to deliver the projects and programmes included in the programme for government."
