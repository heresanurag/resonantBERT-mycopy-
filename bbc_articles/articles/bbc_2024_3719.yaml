title: 'Newspaper headlines: Gove warns of extremism and Johnson in trip to Venezuela
  - BBC News'
date: '2024-03-10'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-68526001
content: |-
  Several politics stories make Sunday's front pages, including Boris Johnson's "secret" talks last month.

  The Sunday Times reports that Boris Johnson flew to Venezuela last month for what it describes as "secret talks" with its autocratic leader about the war in Ukraine.

  There has been concern in western diplomatic circles that Nicolás Maduro might supply weapons or other military support to Russia. The paper notes that Mr Johnson has championed President Zelensky on the world stage since leaving Downing Street and said he also discussed normalising relations with the UK which doesn't recognise the legitimacy of Venezuela's government.

  The Sunday Telegraph leads with a call from the Communities Secretary Michael Gove for pro-Palestinian protesters not to march alongside extremists who he says are trying to "subvert democracy". In an interview with the paper, Mr Gove warns that some pro-Palestinian events "have been organised by extremist organisations".

  The paper says his comments come ahead of plans to set out a new official definition of extremism which will be used by the government to cut ties or funding to any groups deemed to have crossed the line.

  Mr Gove's plan to ban some individuals and organisations under this new framework also makes the Observer front page. It says it has seen leaked documents that express fears within government that the scheme is at risk of legal challenge. The paper reports that some departments will pilot the plans and that local councils are expected to follow the government's lead.

  The Mail on Sunday leads on a claim by Earl Spencer in his memoir that he was sexually abused as an 11-year-old by a female member of staff at his boarding school. Princess Diana's brother describes the woman as a "voracious paedophile" and says she groomed and abused boys in their dormitories.

  The Earl says the trauma has caused lifelong damage. The paper has bought the rights to the book. The school says the welfare of children has been at the heart of significant changes since the 1970s.

  The mother of the teenage murder victim Brianna Ghey is pictured in the Sunday Mirror for her new campaign to make children kinder. Esther Ghey wants mindfulness lessons to be part of the school curriculum. The 37 year-old from Cheshire has been into a primary school where such lessons are already taking place.

  She tells the paper that she doesn't know if Brianna's murder could have been stopped, but is convinced that if children are taught from a young age to "have empathy and self-compassion" they will be happier and feel better about themselves.

  The Sunday People reports that a man who was jailed in 2009 for causing the death of a toddler could be freed on parole within months. The case of Baby P, or Peter Connolly, shocked the country and highlighted failings in social care. His stepfather, Steven Barker was jailed for a minimum 12 years for his part in the death. The paper adds that his previous applications for parole have been turned down.

  And the Daily Star has the revelation that just one in three Brits puts on fresh socks every day. It carries the headline "The Socky Horror Show".

