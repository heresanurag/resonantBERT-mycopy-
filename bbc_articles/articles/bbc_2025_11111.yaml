title: 'Gurvinder Johal death: Trial date set for man accused of bank murder - BBC
  News'
date: '2025-05-09'
section: Derbyshire
url: http://www.bbc.co.uk/news/articles/c4g3dyx8x2go
content: |-
  Haybe Cabdiraxmaan Nur, of Western Road in Derby, will provisionally stand trial in the New Year.

  A family friend told the BBC on Wednesday that Mr Johal was "a smiler" and "a good friend"

  A man charged with murder after a stabbing inside a city centre bank will provisionally stand trial in the New Year. Haybe Cabdiraxmaan Nur, 47, of Western Road, Derby, was charged with the murder of Gurvinder Johal, 37, who was stabbed inside Lloyds in St Peter's Street just after 14:30 BST on Tuesday. Appearing via video link at Derby Crown Court from HMP Nottingham, Mr Cabdiraxmaan Nur was told by Judge Shaun Smith KC through a Somali interpreter he will provisionally stand trial on 19 January 2026. No application for bail was made.

  Flowers were left outside Lloyds in St Peter's Street where Mr Johal died

  Judge Smith KC told Mr Cabdiraxmaan Nur on Friday: "In the meantime, you will be remanded into custody." The judge said the custody time limit would be extended from November until the end of January 2026 in order for reports to be submitted in sufficient time for any trial - which is expected to last "two to three weeks". The defendant was told he will appear at Derby Crown Court again on 15 August. Derbyshire Police said a second man in his 30s, who was arrested in connection with the incident, was released without any further action on Thursday. The Independent Office for Police Conduct confirmed it had received a referral from the force in relation to the case, but later said: "We have now notified the force that it did not meet the threshold for a referral and was therefore not valid."

