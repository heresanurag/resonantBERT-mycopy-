title: Wormwood Scrubs escaped prisoner Graham Gomm arrested - BBC News
date: '2024-07-20'
section: London
url: http://www.bbc.co.uk/news/articles/cjk3vn2zgkgo
content: |-
  Graham Gomm, who is on remand for burglary, escaped during a hospital visit on Thursday.

  Graham Gomm, a prisoner from Wormwood Scrubs prison who absconded during a hospital visit has been found. The 63-year-old was arrested at 08:30 BST on 20 July in Putney and has been returned to prison, a spokesperson for the Met Police said. He was taken to Hammersmith hospital on 18 July by prison staff after becoming unwell. The force said that an investigation will continue into Mr Gomm's escape from custody.

  Police were alerted at about 01:20 BST on Thursday that Mr Gomm had absconded. He had last been seen wearing a grey T-shirt and grey tracksuit. Officers carried out searches, reviewed CCTV and visited addresses related to him. The Met said the arrest was the result of a "coordinated police operation working alongside colleagues from HM Prison Service".

  Thursday's incident was the second time in three years that a prisoner has gone on the run from custody during a medical visit. In 2021, Manray Woolfall fled when he was being taken to a central London hospital after a suspected medical episode.
