title: Conquering K2 in winter 'together' - BBC News
date: '2021-01-19'
section: General
url: http://www.bbc.co.uk/news/world-asia-55710125
content: |-
  The BBC speaks to Nirmal Purja, from the team of the first climbers to reach the K2 summit in winter.

  A team of Nepalese climbers has become the first ever to summit the world’s second highest mountain, K2, in winter.

  K2, along the Pakistan-China border, is notoriously challenging - with high winds and sub-zero temperatures.

  One of the leading members of the team is a former Gurkha and British special forces soldier, Nirmal Purja. He spoke to BBC Pakistan correspondent Secunder Kermani.
