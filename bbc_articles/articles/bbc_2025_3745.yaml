  Jurors heard Mr Kondor was delivering parcels in the Armley area using his own Transit van, which was full of parcels he had collected from an Amazon depot. While he was away from his vehicle delivering a parcel, Ross, who lived nearby and had gone out to buy cannabis, climbed into the driver's seat and started to drive the van away, the court heard. Mr Kondor tried to stop him by opening the front nearside passenger door of the van and attempting to climb in. The court was told how Ross sped off and swerved erratically from side to side before hitting two parked cars, all in an effort to "get rid" of Mr Kondor as he hung on to the van from the open passenger door. Witnesses described Mr Kondor's legs dragging on the ground as he clung on to the inside of the open door, with one woman saying she heard him shouting for help. Mr Kondor died from head and chest injuries from the second crash, the court heard. Ross denied murder, but was convicted with a majority verdict of 10 to one on Wednesday.

  Mitigating, James Keeley said Ross's intention was "to cause serious bodily harm rather than kill". "It was an unplanned reaction to Mr Kondor grabbing hold of the passenger door," he added. "He has previous convictions, but none for serious violence, and he's expressed remorse. He has to live with the guilt." However, judge Mr Justice Goss said he did not accept this and that Ross had lied. "He said he was never aware that Mr Kondor was hanging on to the van. That's not true remorse."

  This video can not be played To play this video you need to enable JavaScript in your browser. Mr Justice Goss: 'Your actions must have terrified him in the last minute of his life'

  Passing sentence, the judge said: "Although I cannot be sure you intended to kill Mr Kondor, your actions must have terrified him in the last minute of his life, knowing he had to hang on to his speeding van or fall onto the road." He added: "You ignored his pleas to stop and callously murdered him, thereby not only depriving him of his life, but also taking a much-loved and hard-working partner away from [Ms George]."

