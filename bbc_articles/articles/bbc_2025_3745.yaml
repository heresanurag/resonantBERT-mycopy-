title: Life in jail for Leeds thief who murdered Amazon driver - BBC News
date: '2025-03-14'
section: England
url: http://www.bbc.co.uk/news/articles/c4g03987z2do
content: |-
  Mark Ross given 30-year minimum term for killing driver whose van he was trying to steal in crash.

  Mark Ross was was found guilty of murder following a trial at Leeds Crown Court

  A thief who killed an Amazon delivery driver who was trying to stop his van from being stolen has been sentenced to life in prison. Claudiu Carol-Kondor, 42, died when Mark Ross drove the van into a parked car after hitting speeds of up to 60mph (96 km/h) on residential streets in Leeds on 20 August. During his trial at Leeds Crown Court, Ross claimed he did not know Mr Kondor, from Sheffield, was hanging on to the van after he stole it, but he was convicted of murder by a jury. Sentencing the 32-year-old, of Conference Road, Armley, a judge said he would serve a minimum term of 30 years and added that Mr Kondor must "have been terrified in the last seconds of his life".

  In a victim impact statement read to the court, Mr Kondor's fiancé Mariana George said: "My wounded heart is still waiting for him to walk into the house." She said: "Claudiu worked hard and dreamed of buying his own van. He finally did this three weeks before he was killed. "Ours was a beautiful relationship. He was a man of integrity and hard work. "He loved his job and always wanted to do his best."

  Claudiu Carol-Kondor died when he was thrown from the van he had been driving for Amazon

  The couple lived in Sheffield together but she added that she has since returned to their home country of Romania. In her statement, she described how since Mr Kondor's murder, the meaning of her life had changed. "Plans have disappeared completely, the desire to wake up in the morning has disappeared, the feeling of being able to walk safely in the street; disappeared. "The dream of getting married and living a quiet life in England has died. "Loneliness has forced me to return to Romania with a broken heart."

