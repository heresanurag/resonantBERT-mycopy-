title: Priti Patel says police must take harassment more seriously - BBC News
date: '2021-10-02'
section: UK
url: http://www.bbc.co.uk/news/uk-58770536
content: |-
  The home secretary's call follows the murder of Sarah Everard by serving Met officer Wayne Couzens.

  Priti Patel on harassment: "I want women to have the confidence to call it out"

  Police must take harassment and flashing more seriously, Priti Patel said, as forces face questions over how violence against women is dealt with in the wake of Sarah Everard's murder.

  The home secretary said police had to "raise the bar" and treat everybody "with respect, dignity and seriously".

  There are calls for an inquiry into police misogyny after a Met officer was jailed for murdering Ms Everard.

  Wayne Couzens falsely arrested the 33-year-old in order to abduct, rape and murder her, and the Metropolitan Police is facing questions over its failure to stop him.

  Ms Patel told the Daily Telegraph: "I would say to all women: give voice to these issues, please... There is something so corrosive in society if people think that it's OK to harass women verbally, physically, and in an abusive way on the street and all that kind of stuff.

  "I want women to have the confidence to call it out. I don't see all of this as low level."

  The Metropolitan Police has issued guidance about what women should do if challenged by a lone plain-clothes officer.

  Suggestions include asking "very searching questions" and requesting to speak to an operator on a police radio.

  Waving down a bus, running into a house or calling 999 is advised in the event someone believes they are in "real and imminent danger".

