  A Royal Mail spokeswoman said: "We're very pleased to confirm that Sir Andy Murray's gold post box has been successfully reinstated this afternoon.

  "All mail was collected safely and the post box will be operational again from tomorrow [Wednesday]."

  A spokeswoman for Police Scotland confirmed they had been called to Dunblane's High Street at about 19:50 and that they were making inquiries into the circumstances of the collision.

  On Tuesday the post box was pictured on its side, surrounded by traffic cones
