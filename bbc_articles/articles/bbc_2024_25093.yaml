content: |-
  Britain's Jacob Fearnley extends his winning streak to 13 matches as he beats Corentin Moutet at the Stockholm Open.

  Jacob Fearnley is appearing in just his second ATP Tour main draw

  Britain's Jacob Fearnley extended his winning streak to 13 matches as he beat Corentin Moutet at the Stockholm Open. The Scot was unranked just over a year ago but has risen inside the top 100 on the back of winning four Challenger titles in a row. The 23-year-old, having taken a few weeks off, won two qualifying matches to reach the main draw of the ATP 250 event in Sweden. He beat France's Moutet 6-2 7-6 (7-5) to set up a second-round meeting with Dutch seventh seed Tallon Griekspoor. It is Fearnley's second ATP Tour-level victory, having won in the Wimbledon first round in July after being given a wildcard. Fearnley's climb to 98th in the world - from 1,893rd in September 2023 and 646th at the start of this year - is the fourth biggest into the top 100 since 2000, according to ATP statistics.

  At the same event, Cameron Norrie lost 6-4 6-4 to Serbia's Miomir Kecmanovic as he continued his comeback from an arm injury. Elsewhere, Dan Evans beat Japan's Taro Daniel 6-2 7-6 (7-4) to reach the second round of the Almaty Open in Kazakhstan. British women's number one Katie Boulter was also victorious, beating Italian veteran Sara Errani 6-3 6-2 either side of a rain delay at the Ningbo Open in China. Harriet Dart was also victorious at the Japan Open, beating Germany's Laura Siegemund 3-6 7-5 7-5.
