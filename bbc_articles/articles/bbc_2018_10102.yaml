  Dr Zaf Iqbal, a doctor with Crystal Palace Football Club, told the BBC: "In every Premier League game, there always has to be a doctor on each bench, two paramedics and mandatory equipment.

  "Compared with 10 years ago, I think players are better protected."

  As well as the screening programme, he said, the club had defibrillators - which deliver an electric shot to the heart - on the training ground and coaching staff had been trained to use them.

  "The thing that will save these guys is a defibrillator," he said.

  The FA said it had one of the most comprehensive heart-screening programmes in sport and offered emergency training to medical teams at professional clubs.

  A spokesman said: "There are multiple health benefits from playing football. However, we are aware that a very small number of people may have an increased risk of heart abnormalities through hard training, which is why we have this programme in place."
