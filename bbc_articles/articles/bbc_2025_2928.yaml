title: Former Plaid Cymru leader Lord Dafydd Elis-Thomas has died - BBC News
date: '2025-02-07'
section: Wales
url: http://www.bbc.co.uk/news/articles/cly5p2453z3o
content: |-
  Dafydd Elis-Thomas led the party between 1984 and 1991, and later entered the House of Lords.

  Former Plaid Cymru leader and Senedd Presiding Officer Lord Elis-Thomas has died at the age of 78, his family has announced. Dafydd Elis-Thomas led Plaid between 1984 and 1991 and served as MP for Meirionydd and then Meirionydd Nant Conwy between 1974 and 1992, when he was appointed to the House of Lords. He was the first presiding officer, or speaker, of the new Welsh Assembly when it opened in 1999. Lord Elis-Thomas was described as the "Senedd's founding father", and flags will fly at half-mast outside the Senedd building on Friday in tribute.

  Known for being independently minded, Lord Elis-Thomas later clashed with the Plaid leadership and left the party in 2016, eventually serving as a minister – though not a party member – in Carwyn Jones and Mark Drakeford's Labour governments. He retired from the Senedd and front-line politics in 2021. In a statement, his family said he died "peacefully at his home" on Friday morning following a short illness. "The family request privacy at this difficult time." Tributes to Lord Elis-Thomas have come in from across the political spectrum in Wales. First Minister Eluned Morgan said: "Wales has lost one of its greatest servants, and many of us have lost an irreplaceable friend. "Dafydd was a true giant of Welsh politics and a passionate champion of our nation, our language, and our culture." Morgan praised his "infectious enthusiasm", "wise counsel" and "mischievous sense of humour", adding "our nation is immeasurably richer for his lifetime of service". Plaid Cymru leader Rhun ap Iorwerth said his death "will be a huge loss to Welsh politics and the civic life of Wales". He described Lord Elis-Thomas as "one of the most influential figures of his generation" who made a "priceless contribution in laying the firm foundations of devolution". "We remember Dafydd as a ground-breaking MP when he became the youngest Member of the 1974 UK Parliament before leading Plaid Cymru with passion and distinction. "Dafydd was a personal friend to my family and I, and was an influential figure during my formative years," ap Iorwerth said, adding Elis-Thomas' "love for our nation, its language and culture was unwavering".

  Elin Jones, the current Senedd Presiding Officer, said it was "hard to imagine Welsh political life" without Lord Elis-Thomas, describing him as the "Senedd's founding father". "Since the early 1970s he has been omnipresent, having served in the House of Commons, the House of Lords and our Senedd," she said. "He was keen to establish a modern democracy from the start, learning from other Parliaments what to do, and what not to do. "He became the keeper of the Welsh constitution but was always prepared to think outside the box."

  Lord Elis-Thomas became an MP for Meirionydd and then Meirionydd Nant Conwy between 1974 and 1992

  Liz Saville-Roberts, Plaid Cymru MP for Dwyfor Meirionnydd, described Lord Elis-Thomas as "a tremendous figure in the public life of Wales". "I have spoken to so many people in the constituency, and especially in Meirionnydd, who tell me how Dafydd's politics had passionately inspired them as young people," she said. "His tireless work and his commitment to Wales, its people, and its democracy has left a huge mark on our history." Llyr Gruffydd, Plaid MS for North Wales, said he had "blessed memories" of Lord Elis-Thomas. "Thanks to him for all the work he did for Wales," he said. Former Welsh Labour minister Lee Waters described him as "an amazing character" who played an important role in Welsh politics. "I liked him a lot, even though he could be maddening. Very sad news," he said. Welsh Conservatives leader Darren Millar MS said: "Lord Elis-Thomas was a titan of Welsh politics; his passing is a great loss. "No one could ever argue that he didn't have a deep love for Wales and Welsh people." His predecessor Andrew RT Davies added he was "deeply saddened" to hear of Lord Elis-Thomas's death. "He was always forthright and robust when expressing his views, and for that I admired him strongly," he added.
