title: 'Paris Olympics: No medal for Bryson or French in modern pentathlon - BBC Sport'
date: '2024-08-11'
section: Olympic Games
url: http://www.bbc.co.uk/sport/olympics/articles/cj62z9ylw0po
content: |-
  Team GB's Kerenza Bryson misses out on an Olympic medal in modern pentathlon while defending champion Kate French pulls out with illness.

  Kerenza Bryson won gold at the 2024 European Championships last month but could not add an Olympic medal

  Kerenza Bryson could not add to Great Britain's medal haul at Paris 2024 as she fell out of contention in the Olympic women's modern pentathlon. The 25-year-old junior doctor - who was Team GB's sole representative in the final because defending champion Kate French withdrew before Sunday's climax - led after Saturday’s semi-finals but finished ninth in the final. "Not getting a medal here makes me hungry for another Olympic Games." Bryson slipped to fifth after the opening showjumping event - which will be dropped for Los Angeles 2028 as a result of the horse-punching controversy in Tokyo - and fell to sixth by losing quickly to Italy's Elena Micheli in the fencing. Swimming is considered the Briton's weakest event and, needing a fast 200m freestyle to make up ground, she trailed the rest of the field in her heat. That left Bryson sitting seventh going into the final event of laser run - which is a 3,000m run, split into five 600m laps and four visits to the shooting range. She needed to make up a gap of 30 seconds in the time trial to finish on the podium, but that never looked likely. Hungary's Michelle Gulyas won gold with a new world record of 1,461 points, just ahead of French veteran Elodie Clouvel, who finished on 1,452. South Korea's Seung-min Seong claimed bronze with 1,441 as Bryson ended on 1,404. Bryson, who is also an army reservist, received a huge ovation from British fans as she jogged around the track with a Union Jack minutes later. "I'm really disappointed with my performance, I came here to get a medal and I thought I was capable of one," said Bryson, who took a year off medicine and starts a NHS job in Bath next month. "But I'm also trying to be really positive and remember I'm Olympian. "I'm also a doctor and an army officer and sometimes you have to remember there is more to life than sport and medals."

  French won gold in Tokyo with an Olympic record of 1,385 points

  Earlier, French's chances of matching her medal at Tokyo 2020 were dashed because of sickness. The 33-year-old was ranked fifth after Saturday's semi-finals, just four points behind leader Bryson. "This has been an extremely difficult decision for Kate as she had hoped to defend her Olympic title and ride in the jumping for a final time in Olympic competition," a Team GB statement said. After winning gold in Tokyo in 2021, French took a break from the sport in 2023 and only returned to training last August. Her withdrawal and Bryson's struggles meant Britain missed out on an Olympic medal in the women's pentathlon for only the second time - after Rio 2016 - since the event was introduced in 2000.
