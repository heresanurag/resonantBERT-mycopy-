  England take on Spain in the Euro 2024 final - BBC Sport looks at five key battles that could decide who lifts the trophy.

  Will Foden get the better of Rodri? Five key battles

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England will go in search of more history on Sunday when they take on Spain in the Euro 2024 final in Berlin. Gareth Southgate has led his team to back-to-back European Championship finals and a first men's major tournament final on foreign soil. Spain have been the great entertainers in Germany, while England have had to call on grit and determination as they steadily improved to reach the final. BBC Sport looks at five key battles that could decide who lifts the trophy on Sunday.

  The midfield is likely to prove crucial in the final, with superstar talent in abundance. Southgate has found a way of getting both Premier League Player of the Season Phil Foden and La Liga Player of the Season Jude Bellingham to play in a central attacking role - and the two could be key to unlocking Spain. Foden was superb against the Netherlands and was unlucky not to cap a stellar performance with a goal, and while Bellingham has struggled at times, he is capable of popping up with moments of magic. Standing in their way will be Manchester City holding midfielder Rodri - who has lost only one of his past 79 games for club and country. Foden knows only too well how good Rodri is with the two playing together at City, but that could also be advantageous to Southgate when working out how to manage him. The 28-year-old, who was born on the day England knocked Spain out of Euro '96, is widely considered to be the best player in the world in his position. Like he is for City, he is the engine of the Spain team and has dictated play from the midfield - creating five chances, providing one assist and recovering the ball 31 times.

  Before this tournament, there were murmurs of an up-and-coming star in Barcelona's ranks - 16-year-old winger Lamine Yamal. But at Euro 2024, the teenager - who turns 17 the day before the final - has truly announced himself on the world stage, becoming the youngest player to start a European Championship match in Spain's opener against Croatia. His goal in the semi-final made him the youngest goalscorer at a Euros or World Cup, breaking Pele's record. He also broke Pele's record of being the youngest player in a semi-final in either tournament. He has provided three assists and created 13 chances, causing havoc on the right wing while Nico Williams does the same on the left. If England are to have a chance of winning, they will have to deal with Spain's threat down the flanks. Kieran Trippier has been preferred on the left side of defence throughout the tournament but he is an injury doubt after being replaced by Luke Shaw at half-time in the semi-final against the Netherlands. Southgate confirmed it was just a precaution but Shaw has looked sharp when he has come on and not like someone who has spent four months out with injury. As England's only natural left-back, the final could be the time to hand Shaw a start. He scored after just two minutes of the Euro 2020 final against Italy, so he has been there and done it on the big occasion.

  For both Marc Cucurella and Bukayo Saka, Euro 2024 has been a tale of redemption. Only six months ago, Chelsea left-back Cucurella was being booed off by his own fans, having struggled to impress following a £63m move from Brighton in 2022. But the 25-year-old was at the heart of Chelsea's unexpected late surge for a European place and has continued that form at Euro 2024. He has started five of Spain's six matches, having earned only four caps prior to the tournament, and has struck up a brilliant partnership with Williams down Spain's left-hand side. For Saka - after the heartbreak of missing a penalty in the final of Euro 2020 and the horrific racial abuse he received in the aftermath - Euro 2024 has highlighted his resilience. The 22-year-old has been a consistent threat, earning his reward with a fine goal against Switzerland in the quarter-final before dispatching his penalty in the shootout - his story coming full circle.

  Declan Rice has played every minute of England's Euro 2024 and covered more distance than any other player with 74.91km. The Arsenal midfielder has had more than 300 touches and 236 completed passes while under pressure - more than any other player at the tournament. He has also made seven line-breaking passes that have led to a shot and, defensively, is joint-top with France's Jules Kounde for balls recovered with 41. Rice will look to dominate the middle of the park to prevent RB Leipzig midfielder Dani Olmo from adding to his three-goal tally, which he has accumulated despite starting only two games. Olmo is level with four other players on goals but his two assists mean he leads the race for the Golden Boot. In the absence of Pedri, who suffered a tournament-ending injury against Germany in the last eight, Olmo has stepped up and interest in the 26-year-old from clubs around Europe has ramped up.

  Spain's entertaining style at this tournament is in large part down to their dynamic wingers - Yamal and Williams. Athletic Bilbao winger Williams, 21, has impressed down the left-hand side with his dribbling and ability to run at defences. He and Yamal have become close friends and both celebrate birthdays in the two days leading up to the final. Southgate will certainly look to trusted defender Kyle Walker to prevent any combined birthday/Euro-winning celebrations on Sunday. Walker is 13 years Williams' senior but the quick full-back is one of the few defenders in Europe who can claim to be able to deal with the pace of France striker Kylian Mbappe and Brazil forward Vinicius Jr. The Manchester City defender, one of four England players to have played every minute of their Euros campaign so far, thrives in one-against-one battles and will have to put his speed to good use to keep up with Williams on Sunday.
