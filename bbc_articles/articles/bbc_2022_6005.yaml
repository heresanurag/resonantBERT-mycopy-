title: Boris Johnson's first public speech after Sue Gray report published - BBC News
date: '2022-05-25'
section: General
url: http://www.bbc.co.uk/news/uk-politics-61579100
content: |-
  The prime minister says he takes full responsibility, after a report into parties at No 10 is made public.

  The prime minister has repeated his apology for Downing Street parties, after Sue Gray's report into breeches of Covid lockdown rules was made public.

  In a statement to MPs in the House of Commons, Boris Johnson said, "I am humbled and I have learned a lesson", adding that he would "take full responsibility".
