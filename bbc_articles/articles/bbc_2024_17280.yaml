content: |-
  Everton sign centre-back Jake O'Brien on a four-year deal for £16.4m from Lyon.

  Jake O'Brien has won two caps for the Republic of Ireland

  Everton have signed centre-back Jake O'Brien from Lyon on a four-year deal for £16.4m. The 23-year-old Republic of Ireland defender made 27 appearances for the Ligue 1 side last season. He becomes Everton's fifth summer signing after midfielder Tim Iroegbunam, forwards Iliman Ndiaye and Jesper Lindstrom, and the return of Jack Harrison on loan from Leeds. "I'm buzzing and so happy to have signed," O'Brien said. "I've been dreaming of this kind of move in the Premier League, with such a historic club. It's a very exciting move for me." O'Brien said Everton was a "huge club" with a "big future". "When the transfer window opened there were other clubs in for me but there was only one club I wanted to go to - it was Everton," he said. "They've shown the faith in me so now it's my turn to show why on the pitch."

  O'Brien began his career with hometown club Cork City, then joined Crystal Palace's academy on loan before signing for the Premier League club permanently. After loan spells with Swindon Town and Belgian club RWD Molenbeek, he joined Lyon for an undisclosed fee last summer. The defender said Everton boss Sean Dyche's development of youth, including fellow centre-back Jarrad Branthwaite, was what attracted him to the club. Dyche added: "Jake further strengthens our talented core of centre-backs and adds competition to our squad which can help us continue to progress. "He is still young but has earned valuable experience both abroad and at international level, and has many impressive attributes to become a top-quality player for Everton in the Premier League."
