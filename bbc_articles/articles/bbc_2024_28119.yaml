content: |-
  A chippy worker shoots to fame through online videos, attracting millions of viewers.

  The 'chip shop diva' who became a global star

  Destiny Harold has become known as the 'chip shop diva'

  She's the "chip shop diva" catapulted to stardom through a series of TikTok videos. Destiny Harold's online clips, shot by colleague Mitch Key, have added glamour to her job at Merchants fish and chip shop in Bewdley, Worcestershire. Together, the pair have racked up millions of online hits, earning their employer five-star reviews and plenty of new customers in the process. Ms Harold, who works two days a week at the chippy while studying to become a nurse, said the aim was just to promote the shop's food and they had not expected it to become so big.

  Their TikTok antics have attracted millions of followers

  Merchants has now become an institution on the video sharing site with its most watched video having 25 million views. The teenager said the store had become busier since its success, adding she did not mind her new status as a local celebrity. "They've been coming in asking for pictures and everything ," Ms Harold added. "People come and ask for a can of pop just to come and see me."

