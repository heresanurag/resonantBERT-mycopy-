  Owner Antony Akathiotis wants to make sure his "hardworking" employee is protected. “Destiny and Mitch work really well together but social media can be a scary business," he told the Dudley News, external. “It does worry me and we want to make sure we are protecting Destiny."

  The TikTok project is the brainchild of Mr Key

  The TikTok project is the brainchild of Mr Key, who has also worked at the restaurant for about three years. It originally started off as an account promoting its food, such as the chip shop's giant cod meal, but soon went huge. "We've always wanted to get the staff involved and show that human, real, raw aspect of the business," Mr Key said. The pair said they had some more surprises to come through their films. The videos have even spawned musical tributes, with one being reworked into a dance track. It comes after the Binley Mega Chippy in Coventry also found global fame when a fan created a TikTok with a catchy jingle.

