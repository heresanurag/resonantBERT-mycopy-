  Who impressed for England in Thomas Tuchel's first game as head coach against Albania? Alex Howell rates the players.

  Who 'didn't show enough' against Albania? How England's players rated

  The Thomas Tuchel era is officially under way, but who impressed most in his first game as England head coach against Albania? BBC Sport football news reporter Alex Howell rates how the players performed in Friday's World Cup qualifier - and you can see how BBC Sport readers rated them at the bottom of the page too.

  Jordan Pickford: Barely had a save to make. His distribution was good as always. 6 Kyle Walker: Picked as right-back in a four-man defence and gave England width in attack. His experience helped a backline with two debutants. One key interception but hard to judge defensively as he didn't have much to deal with. 6 Ezri Konsa: Very tidy at the back, dealt with the few Albania attacks when called upon and continues to excel at international level. A positive first start under the new manager ahead of the 2026 World Cup. 7 Dan Burn: A first England start caps a dream couple of weeks for the Newcastle defender. Overall he was solid and made a couple of key blocks. A couple of nervy moments and a slight misunderstanding with Pickford after blocking a shot in the first half, but dealt with the danger afterwards. A threat from set-pieces and hit the bar with a header. 6 Myles Lewis-Skelly: A full England debut caps an amazing breakthrough season for the Arsenal defender. He was tasked, like he is for his club, with stepping into midfield but also ran on the outside at times too. His goal means the 18-year-old is the youngest player to score on his senior England debut. 8 Declan Rice: The deepest of the midfielders and again not really tested defensively. Gave the ball to the attackers and kept play moving. A clever pass set up Kane's goal. 7 Curtis Jones: Just a third start for Jones but showed, in flashes, why he has been a key part of Liverpool's midfield this season. Linked the play well and looked to get into the box when he could. A quiet second half before being replaced in the 74th minute. 6 Phil Foden: A quiet performance from the Manchester City man playing in his unfavoured position on the right wing. Undoubted talent but he found it hard against an Albania side that defended deep and he didn't show enough. 5 Jude Bellingham: A superb pass for Lewis-Skelly's opener. He looked to make things happen with passes or by dribbling past players to get through Albania's low block. 7 Marcus Rashford: Linked well with Bellingham on the left and looked to beat his full-back when the opportunity came. He also pressed well which is something Tuchel wanted him to show. Subbed after a quiet second half. 6 Harry Kane: The instruction to press and stay high up the pitch was clear, a big difference from the Kane that England saw at the Euros last summer. An excellent touch and finish for his trademark goal showed why he is still captain and first choice number nine. 7

  Morgan Rogers: Brought on in a deeper central role as Tuchel looked to use his dribbling skills and power to break down a stubborn Albania defence. 6 Jarrod Bowen: Came on for Foden but with England scoring a second soon after he came on, the game went flat. 6 Anthony Gordon: Similarly to Bowen, there weren't many attacks for Gordon to show what he is about. Will be an interesting battle for the starting role on the left side of England's attack. 6 Jordan Henderson: Came on and marshalled the midfield as England saw out a comfortable win. 6 Reece James: A late sub for Lewis-Skelly but no time to show anything. N/A

