content: |-
  Adam Peaty has to settle for Olympic silver as Italian Nicolo Martinenghi snatches gold in the 100m breaststroke final in Paris.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A tearful Adam Peaty had to settle for Olympic silver as Italy's Nicolo Martinenghi snatched a stunning gold in the 100m breaststroke final in Paris. Peaty, 29, was well placed with 25m to go but was pipped by 0.02 seconds and finished in a tie for second with American Nic Fink. The Briton was bidding to become only the second man, after the great American Michael Phelps, to win the same swimming event at three consecutive Olympics. Silver still caps a remarkable achievement for Peaty who took a break from the sport after issues with alcohol and his mental health since his last gold in Tokyo. "I am not crying because I have come second. I am crying because of how much it took to get here," Peaty told the BBC. "In my heart I have won. These are happy tears." The medal takes Peaty's Olympic tally to six medals - three golds and three silvers. After Kimberley Woods' kayaking bronze earlier on Sunday, Team GB now have two silvers and two bronze medals after two days of these Olympics.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'In my heart I've already won' - Peaty reacts to silver medal

  Just last year Peaty was considering quitting the sport for good, describing his troubles as a "self-destructive spiral". Those issues came to a head after he broke his foot in 2022, which led to the end of his incredible eight-year unbeaten run over 100m. After returning last autumn, he won bronze at this year's World Championships and qualified fastest for this final ahead of China's Qin Haiyang. Qin, the 2023 world champion who was expected to be Peaty's main rival for gold, led the Briton by 0.05 seconds at the turn before fading. Peaty moved into the lead halfway down the final length before Martinenghi, the bronze medallist from Tokyo, came through in the final strokes with Peaty and Fink touching the wall at exactly the same time. Peaty became emotional afterwards as he spoke about his difficult recent years and there were more tears after the medal ceremony when he hugged his three-year-old son. "It has been a very long way back," said Peaty. "I gave it my absolute all. "It is just incredibly hard to win it once, and again, and again, and trying to find new ways to do it. "I can't have that relentless pursuit every single day without a sacrifice of some sort and that sacrifice can come in different ways - time, energy, relationships." He refused to be drawn on his future after the race, instead insisting his focus remains on the relays later in the meet.
