title: 'Watch: Pod of dolphins spotted in River Orwell - BBC News'
date: '2025-03-27'
section: General
url: http://www.bbc.co.uk/news/videos/czdn97pnm1jo
content: |-
  A conservation group says the pod's move inland is concerning.

  A pod of dolphins has been spotted close to the Orwell Bridge in Ipswich.

  The mammals were seen in the water just before 09:00 GMT on Wednesday.

  Adam Case, of Woolverstone Marina, said they approached his boat.

  Conservation group the Cetecean Research and Rescue Unit said the pod's move inland was concerning.
