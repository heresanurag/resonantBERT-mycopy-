content: |-
  Tesco has started consultations about opening seven days a week on the Isle of Lewis.

  Unholy row over plan to open island supermarket on Sundays

  The Tesco store in Stornoway currently replenishes stock on a Sunday but does not open to the public

  A Scottish island community is divided over a supermarket's plans to open on a Sunday. The Tesco branch on the Isle of Lewis in the Outer Hebrides has started holding consultations with staff and residents about opening seven days a week. The island, which has a population of about 20,000, has a long tradition of observing the Sabbath day, meaning that some shops - including both supermarkets - currently keep their doors closed on a Sunday. More than 700 people have now signed an online petition against the proposed change.

  Many of the island's residents are members of various protestant denominations that believe Sunday should be a day of rest. The practice is derived from the Bible's fourth commandment which states "Remember the Sabbath day, to keep it holy". Observance of the Sabbath was once so strict that play park swings were chained up at dusk on Saturday, and hanging out washing on a Sunday was frowned upon. Restrictions have relaxed over recent decades, with the first Sunday commercial flight landing at Stornoway airport in 2002 and Sunday ferry sailings have operated since 2009. But while petrol stations and some restaurants now open on Sundays, many local shops, including the only other supermarket, a Co-op, remain closed. Council run-facilities such as swimming pools, soft-play areas and the island's two-lane bowling alley are also shut, even though the local authority allows similar facilities to open on other islands.

  Ferries now sail from the island on a Sunday

  A petition against the Tesco proposals was started by Alasdair Macleod, who said "work-free Sundays" make people from Lewis the "envy" of many people living on mainland Scotland. He said: "Many of us hold cherished memories of island Sundays as a guaranteed day of rest, relaxation and no work - a precious day of family time and worship. "However, this simple yet profound day is at risk due to the concept of seven-day trading creeping into our culture. "When stores and businesses open their doors on Sunday, it may seem like a convenience at first, but the resulting ripple effect leaves workers with less time to rest, less time for family, less time for church worship and invariably, a lower quality of life."

  Although the Tesco store is currently closed on a Sunday, some staff already work to replenish shelves. The supermarket said that no staff member would be forced to work on the Sabbath if the plans go ahead. Christian Davies, store director for Tesco in the Highlands and Islands, said: "We are confident we can carefully balance the demand for a seven-day opening while remaining respectful to local traditions and culture. "While shopping on a Sunday is not for everyone, a store that is open seven days a week would significantly improve the shopping experience for all customers, by offering choice to those who do want to shop on a Sunday and reducing congestion during other days of the week, especially on a Saturday."
