title: Actor Michael Madsen arrested on domestic violence charge - BBC News
date: '2024-08-20'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/crmwvl37v8jo
content: |-
  The Reservoir Dogs star is alleged to have pushed his wife and locked her out of their home.

  Michael Madsen has not publicly commented on the issue

  US actor Michael Madsen was arrested on Saturday on a charge of domestic battery, the Los Angeles County Sheriff's Department has said. In a statement sent to the BBC, it said its deputies responded to a "family disturbance" incident shortly after midnight in the city of Malibu, California. The department said a woman alleged "her husband pushed her and locked her out of their residence". Madsen, who starred in Quentin Tarantino's Reservoir Dogs and Kill Bill films, was later released from custody on a $20,000 (£15,400) bond. The 66-year-old has not publicly commented on the issue.

  "The investigation is ongoing and will be forwarded to the Van Nuys Superior Court House for filing," the sheriff's department said. The statement provided no further details. A representative for Madsen said in a statement to Variety website that "it was a disagreement between Michael and his wife, which we hope resolves positively for them both". Michael Madsen and DeAnna Madsen have been married for 28 years. Madsen is best known for his roles as psychopath Mr Blonde in Reservoir Dogs and assassin Budd in Kill Bill: Volume 2.
