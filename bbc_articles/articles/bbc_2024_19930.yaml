title: 'Watch: Injured horse flown to California hospital - BBC News'
date: '2024-08-26'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-66350512
content: |-
  Obe, a 25-year-old horse, slipped and fell in southern California where firefighters came to his rescue.

  Obe, a 25-year-old horse, was airlifted to hospital after slipping and falling in Orange County, southern California.

  He had been on a walk with his owner when the incident occurred.

  Struggling to get up, Obe was sedated before he was fitted with a harness and taken to the skies before landing at the Shea Center, a riding facility in San Juan Capistrano.

  Obe was eventually able to stand up and greet other horses at the facility, local news reported.
