id: bbc_2018_9395
title: Boris Johnson 'has caused offence', PM says - BBC News
date: '2018-08-07'
section: General
url: http://www.bbc.co.uk/news/uk-45103331
content: |-
  Theresa May says Boris Johnson was wrong in the language he used to describe women who wear burkas.

  Prime Minister Theresa May says former foreign secretary Boris Johnson "was wrong" in the language he used to describe women who use the burka.

  Mrs May added that wearing the burka "should be a matter for a woman to choose".
