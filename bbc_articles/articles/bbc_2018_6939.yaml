title: 'Myanmar: Soldiers accused of raping Rohingya women - BBC News'
date: '2018-06-26'
section: General
url: http://www.bbc.co.uk/news/world-asia-44607781
content: |-
  Aid agencies warn that thousands of unwanted babies could be given up for adoption.

  Since 700,000 Rohingya refugees fled Myanmar last year there have been widespread reports of sexual assaults by the Burmese military.

  Aid agencies warned that unwanted pregnancies would result in hundreds, perhaps thousands of babies being given up for adoption. Here's one woman's story.
