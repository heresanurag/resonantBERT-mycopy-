id: bbc_2024_28966
title: Atmospheric river brings floods and snow to California - BBC News
date: '2024-11-23'
section: General
url: http://www.bbc.co.uk/news/videos/cy9jwe249xwo
content: |-
  The weather event has multiplied damages from the 'bomb cyclone' seen in the US north-west earlier this week.

  An atmospheric river swept through Northern California, dumping record rain and deep snow in the region. In Santa Rosa, the rainfall shattered a three-day record of about 10 inches set in October 2021.

  The weather event occurs when water evaporates into the air and is carried along by the wind. It followed a bomb cyclone that hit the US Pacific north-west and killed multiple people.

  BBC Weather has reported that the atmospheric river will continue to move eastwards.
