  However, world number one Scheffler looked imperious, chipping in from a bunker for a birdie on the 12th hole and sending his tee shot on the 16th inside three feet to set up another. New Zealand's Ryan Fox had a sensational start, shooting five under for his front nine but dropped two shots on the back nine to finish four off the lead. England's 2022 US Open champion Matt Fitzpatrick birdied all three holes that make up Amen Corner - the 11th, 12th and 13th - as he moved to four under, but had three bogeys in his final five holes as he signed for a one-under 71. His European Ryder Cup team-mate Viktor Hovland raced to four under after nine holes but a double bogey on the 10th checked the Norwegian's progress as he also shot a 71. Nicolai Hojgaard and Max Homa completed their rounds on Friday, with both shooting 67.

  After winning at the Arnold Palmer Invitational and the Players Championship in March, Scheffler is favourite to win a second Masters title. While his 2022 triumph is his only major victory, the 27-year-old American boasts top-10 finishes in nine of his past 14 appearances and last year was a cumulative 18 under par in golf's biggest events - the best of any player. "I was just going to try and stay patient and take advantage of some holes where I could," said Scheffler. "It's so challenging when the winds get this high because it blows in so many different directions."

  In 32 rounds of golf this year, Scottie Scheffler has played 14 in 66 shots or fewer

  Playing partner Rory McIlroy is chasing a first Masters title to finally complete golf's career Grand Slam and had a shaky start with two bogey in his first three holes. Historically, the Northern Irishman has played himself out of contention on day one at the Masters with poor scores limiting his recoveries at the weekend. However, he found his form on the back nine to birdie the 12th and 14th holes and despite a bogey on the 17th, finished under par after round one for the first time since 2018. "It was a little scrappy," he conceded. "A little wasteful coming in. I had a good chance for birdie on 15 and missed a shortish one on 16. I might rue the last four holes. "Scottie is just so efficient with everything - the amount of bogey-free rounds he plays is phenomenal and that's the secret to winning major championships. "[But] overall, not a bad score and a lot of golf left to play."

  DeChambeau's only major victory so far came at the 2020 US Open, during a period where he bulked up physically and pushed the boundaries of professional golf. Back then, he said that his power meant Augusta National should actually be a "par-67" for him. However, he has never overpowered the course, his best finish being joint 21st as the lowest amateur in 2016. If he triumphs on Sunday, he will become the eighth player to win both that prize and the Green Jacket, joining the likes of Woods and Phil Mickelson. His 65 marks his joint lowest round at a major as he twinned his trademark long drives with skilful play around the greens. "It was a brutal challenge," he said. "Strategy out here sometimes goes unnoticed and people think you can bomb it. You have to place it and I did that. "Regarding the 67 comment, you know, you mess up, I'm not a perfect person. Everyone messes up. "You learn from your mistakes and that was definitely one."

  Only six UK golfers are in this week's field but five were in the top 20 as the sun set on day one. Joining Willett, McIlroy and Fitzpatrick in making solid starts were Hatton and Tommy Fleetwood. Hatton was building momentum when he birdied the second hole and holed out from 50 yards on the fifth for another. But he dropped a shot after finding the water off the tee at the 12th. As play closed, he made another birdie to ensure he began Friday four behind DeChambeau. However, a double-bogey seven at the par-five 15th and a further dropped shot at the last saw him finish level par. Like Hatton, Fleetwood is still searching for a first major title. He was in the final group out on the course and shot three birdies in a row to close the back nine but slipped back to two under after bogeying the 10th, his final hole of the day. He returned on Friday with string of pars but a bogey-bogey finish saw him sign for a 72. The Thursday hooter had sounded with Justin Rose on the 18th, meaning he could finish the hole and the Englishman signed for a 73.
