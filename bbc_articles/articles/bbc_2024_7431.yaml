  -7 DeChambeau (US); -6 Scheffler (US); -5 Hojgaard (Den), Homa (US); -4 Willett (Eng) Selected others: -2 Niemann (Chi), Zalatoris (US); -1 McIlroy (NI), Hovland (Nor), Fitzpatrick (Eng), Smith (Aus), Morikawa (US); Level Hatton (Eng), Garcia (Spa), Thomas (US), Schauffele (US), Fleetwood (Eng); +1 Rahm (Spa), Woods (US), Koepka (US), Aberg (Swe), Mickelson (US); +7 Spieth (US)

  Bryson DeChambeau leads by one from Scottie Scheffler after the first round of the Masters was completed on Friday. The LIV golfer finished seven under par but world number one Scheffler showed ominous touch in his bogey-free 66. Max Homa and Nicolai Hojgaard were among 27 players finishing their rounds on Friday and both are at five under, while Tiger Woods hit a one-over 73. England's 2016 winner Danny Willett, playing his first tournament since September, is four under par. The performance of Willett, given his struggles with injury surprised even himself. The 36-year-old underwent shoulder surgery in late September and was expected to be out for at least 12 months but has returned within six. "I was still unsure on Monday if I was going to play or not," Willett, who holed a 20-foot birdie putt on the 18th to move within three of the lead, told Sky Sports. "I've been sat at home watching guys play golf on TV for six months. It's good to be back."

  Five-time winner Woods had looked in good form at one under par after 13 holes when the hooter sounded to end play on Thursday. However, Woods, who said earlier this week he "aches every day" after suffering a catalogue of injuries in recent years, looked to be moving not quite as well on Friday morning. He bogeyed his first hole, the 14th, and dropped another shot at the last. And, having only played 25 holes in a single tournament so far this year, the 48-year-old will have to play 23 on Friday as he looks to set a new record of most consecutive cuts made at the Masters - he currently shares that with Fred Couples and Gary Player on 23. The top 50 and ties, and those within 10 shots of the lead, make the halfway cut - Woods is joint 37th after round one.

  After waiting two and a half hours for thunderstorms to pass so they could start their first round, those out early on Thursday had exploited the wet conditions which had slowed the notoriously tough Augusta National greens. DeChambeau opened with three consecutive birdies and accelerated with five more in six holes on the back nine to take a commanding lead into the clubhouse.

