title: 'E-scooters: Public nuisance or climate-friendly travel? - BBC News'
date: '2021-06-07'
section: General
url: http://www.bbc.co.uk/news/uk-57385757
content: |-
  Electric rental scooters are being introduced to six London boroughs today - but not everyone's pleased.

  Electric scooters - which are already being tried out in more than 30 towns and cities across the UK - are now being introduced to six London boroughs.

  The government is assessing the risks and benefits of the scooters, but critics say they are a menace to pedestrians and other road users.

  One woman, Elaine, told the BBC she was knocked over by someone riding an e-scooter, which made her fall on her guide dog.
