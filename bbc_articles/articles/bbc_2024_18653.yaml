content: |-
  Kylian Mbappe says there is "no limit" to what he and Real Madrid can achieve together after scoring on his debut against Atalanta to help the club win a record sixth Uefa Super Cup.

  This video can not be played To play this video you need to enable JavaScript in your browser. It feels like Mbappe's been here for a while - Bellingham

  Kylian Mbappe said there is "no limit" to what he and Real Madrid can achieve together after he scored on his debut against Atalanta to help the club win a record sixth Uefa Super Cup. The France captain completed a long-awaited move years in the making when he joined Real this summer after a trophy-laden spell at Paris St-Germain. And despite having resumed training just over a week ago, it took PSG's record goalscorer just under 70 minutes to lay down his first marker of intent for the new season, with a clinical finish to ensure a triumphant start and more silverware for his new employers. "It was a great night - I've been waiting for this moment for a long time," Mbappe told Movistar, in fluent Spanish. "To play with this shirt, with this badge, for these fans, it's a gift for me." With Vinicius Jr, Jude Bellingham, Rodrygo and Endrick also at manager Carlo Ancelotti's disposal, the addition of Mbappe - arguably the best attacking player in the world - has only strengthened the current European and Spanish champions. And as they head into the new campaign, Mbappe stressed they are capable of great things. "We are at Real Madrid, we have no limit. If I can score 50, then 50, but the most important thing is winning and improving as a team, because we will win as a team," Mbappe added. England midfielder Bellingham, who played a starring role in Real's victory over the Serie A side and laid on a goal for his new team-mate, added: "He's just one of those players, he's brilliant. "So sharp. So much technical quality. A great team-mate as well. He works for the team, like the rest of the lads. Credit to him, and he deserves it tonight." Speaking to TNT Sports, Ancelotti added: "Mbappe did really well. He adapted well to the team. He combined well with Vinícius Jr and with Bellingham. "Of course, we have a lot of quality, but we have to play together and we did that tonight."

  The TNT pundits watching Mbappe make his Real bow were equally effusive in their praise of the 25-year-old, who received an ovation when he was withdrawn late in the game. "Mbappe getting his goal is what all Real Madrid fans wanted," said former England and Manchester United defender Rio Ferdinand. "They have added arguably the best player in the world to this team. Because they have so much youth, there is a hunger. They are adding players with hunger. Mbappe has to prove himself now - no matter how good he has been he hasn’t done it here. There is so much to prove for a lot of these players." With Mbappe switching to the left after the break and Vinicius Jr roaming more centrally, it also allowed Bellingham to surge forward effectively and take control of the game for Real against a tiring Atalanta. "Bellingham was absolutely phenomenal in the number eight position. His influence was magnificent," added Ferdinand. "They look like a team of mates, and that doesn’t bode well for everyone else. Teams will have to double up on Mbappe and Vinicius Jr, which gives Bellingham more space. He looked like the big kid in the playground today." Former England and Bayern Munich midfielder Owen Hargreaves added: "With Jude and Vinicius Jr, Real Madrid had too much depth in the second half. "Ancelotti is the perfect manager, a players’ manager, adding Mbappe to that mix to go with Endrick, who will be an amazing young player. This group of players is absolutely exceptional."
