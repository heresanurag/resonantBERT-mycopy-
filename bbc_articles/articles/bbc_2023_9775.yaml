title: 'Watch: Boris Johnson Partygate reported approved by MPs - BBC News'
date: '2023-06-20'
section: General
url: http://www.bbc.co.uk/news/uk-politics-65956624
content: |-
  The former PM would have faced a 90-day suspension if he were still an MP, but quit after seeing the findings in advance.

  MPs have voted to approve a report which found Boris Johnson deliberately misled MPs over parties at Downing Street during lockdown.

  He would have faced a 90-day suspension if he were still an MP, but quit after seeing the findings in advance.
