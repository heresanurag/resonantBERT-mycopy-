content: |-
  Nerys Lloyd is sentenced to 10 years and six months for gross negligence manslaughter.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A former paddleboard firm owner has been jailed for 10 years and six months after the deaths of four people on a river in south-west Wales. Paul O'Dwyer, Andrea Powell, Morgan Rogers and Nicola Wheatley died after paddleboarding in "extremely hazardous conditions" on the Western Cleddau river in Haverfordwest, Pembrokeshire in October 2021. Nerys Bethan Lloyd, 39, an ex-police officer from Port Talbot, pleaded guilty to gross negligence manslaughter last month. She was sentenced during a two-day hearing at Swansea Crown Court, which heard she was unqualified to lead a paddleboard tour of this kind.

  Neither Lloyd nor co-instructor Mr O'Dwyer were qualified to lead the tour, and Mrs Justice Stacey criticised the "abysmal" approach to health and safety during her sentencing remarks. Citing her police and RNLI training, the judge said Lloyd "knew better", although acknowledged she was "horrified" at what happened. The group of seven participants, led by Lloyd and Mr O'Dwyer, set off after 09:00 BST on 30 October 2021. Three particpants died along with Mr O'Dwyer.

  Lloyd was jailed for 10 years and six months

  During the sentencing hearing, the court heard there had been heavy rain in the days before and "the river was in flood conditions" with a "visibly strong current". On Tuesday, the court was shown photos of a weir the group was trying to navigate. This included a section called fish pass, which was 11m (36ft) long and on an incline of about one in seven, or 14%. The court was shown conditions on the weir on the day of the incident, with Mark Watson KC, prosecuting, explaining on Tuesday it showed "immense turbulence" of the water.

  Nicola Wheatley, Morgan Rogers, Paul O'Dwyer and Andrea Powell died after paddleboarding in 2021

  Mrs Justice Mary Stacey said the group "fell down the face of the weir" in no more than 20 seconds. They were sucked into a hydraulic jump - or spin - a recirculating flow similar to a washing machine. She added: "The ankle leashes attached to the boards of those stuck in the hydraulic spin, which are totally unsuitable for fast-flowing water, made it even harder for them to get free." Mrs Justice Stacey said that the "four participants were not wearing wetsuits and one had decided that a life jacket would not be necessary." She added there had been "no safety briefing" beforehand, none of the participants had the right type of leash for their boards in these conditions and Lloyd did not have any next of kin details. Mr O'Dwyer initially exited the river safely, but then re-entered the water in an attempt to rescue the others. Mr O'Dwyer, from Port Talbot, Ms Rogers, from Merthyr Tydfil, and Ms Wheatley, of Pontarddulais, Swansea county, all died at the scene. Ms Powell, from Bridgend, died in hospital on 5 November 2021, about a week after the incident.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The judge said it was clear to her Lloyd intended for the group to go over the weir down the fish pass if possible "which would be more interesting" than carrying the boards round the weir. Mr O'Dwyer had researched alternative routes, but all were "dismissively rejected by you", the judge said. Mr O'Dwyer deferred to Lloyd as the company owner to decide the final route but raised valid concerns, such as the drop over the weir. Mrs Justice Stacey said Lloyd's interest "seemed to be more in an exciting route than safety" and it was clear from CCTV she went straight down the middle of the weir rather than making any attempt to get to the side. She added she showed "a blatant disregard for a very high risk of death". Her lawyer told the court Lloyd took "full blame for the mistakes" that led to the deaths. He said there was a plan to get out of the water ahead of the weir but the force of the water meant she and the others were carried over it.

  The paddleboarders got into difficulties at a weir outside County Hall in Haverfordwest

  Mrs Justice Stacey asked Mr Elias to explain why Lloyd's arms could be seen in a "joyful, confident, triumphant" manner in the video of her going over the weir. The judge said this gave the impression it was "all intentional," adding the gesture seemed to convey "excitement and fun". David Elias KC, defending, responded saying this was not the case and Lloyd "simply couldn't wait for those who were coming behind her because of the force over the weir". Mrs Justice Stacey said in her sentencing remarks said that Mr O'Dwyer and Lloyd did not intend to harm any participants. "But you chose to lead the group over a weir in conditions that could not have been more treacherous, placing all of them in extreme danger," the judge added. Lloyd trained as a firearms officer after joining South Wales Police following university and Mrs Justice Stacey said she would have been "well-versed" in the importance of health and safety and risk assessments. Lloyd was sacked by the police in November 2021 for a matter "unrelated to the paddleboarding incident," the force said. A month earlier she accepted a caution for fraud, relating to a vehicle insurance claim. The judge paid tribute to the families of those who died for their "dignity and courage in the midst of overwhelming grief". Det Supt Cameron Ritchie, of Dyfed-Powys Police, described the paddleboarding tragedy as "completely avoidable".

  CCTV footage shows Lloyd with her arms outstretched and standing on the paddleboard

  Speaking after the sentencing, Lisa Rose, specialist prosecutor with the Crown Prosecution Service special crime division, said Lloyd was not qualified to take inexperienced paddleboarders out in such conditions. "There are no words that can articulate the devastation this tragedy has caused, and I can only hope that this sentence provides a sense of justice for those affected," she said. Helen Turner, Health and Safety Executive (HSE) inspector said the victims placed their trust in Lloyd to deliver a safe and enjoyable paddle, "but through her incompetence, carelessness and complacency she failed to plan or assess the obvious risk at the weir or to take even basic safety measures".

  On Tuesday, the court heard powerful impact statements from the families of each of the victims. Morgan Rogers' mum, Theresa Hall said Lloyd "guided Morgan to her death" and the "physical and mental pain that I now live with is too much to bear". Speaking to Lloyd, she said, "you, in your arrogance have stopped me being able to fully grieve for my daughter". Nicola Wheatley's husband Darren Wheatley called Lloyd "a coward" who had "hidden behind your carefully orchestrated smoke screen". With audible anger in his voice he said while they "cried all day" that Christmas, Lloyd was posting pictures on social media celebrating Christmas lights with her family and friends.

  This video can not be played To play this video you need to enable JavaScript in your browser. Families of the paddleboard tour victims have shared tributes to their loved ones after the woman responsible for their deaths was jailed

  Mark Powell, the husband of Andrea Powell, said when he saw his wife in a coma he "burst into tears" seeing the cuts and bruises to her face and body. Mr Powell said their son Finn "had the most amazing bond" with his mum. When he told Finn, who was seven at the time of her death, that she had died, he burst into "uncontrollable tears" and that noise would stay with him forever. Ceri O'Dwyer, the wife of Mr O'Dwyer, had a statement read on her behalf. She told Lloyd she was once her friend but was met with "blame, rejection and gaslighting" when she tried to "shift blame" on to her husband. Paul made a "devastating mistake" but "died trying to save others". "Grief is in our household every single day. You carried on as if nothing ever happened," she added.
