content: |-
  A 16-year-old has been detained on suspicion of causing grievous bodily harm.

  Arrest after boy stabbed in chest in Primark store

  Police cordoned off the entrance to the branch in Long Row

  A teenager has been arrested after a 17-year-old boy was stabbed in the chest in a Primark store in Nottingham. Nottinghamshire Police said the victim was attacked inside the shop in Long Row at about 11:30 GMT on Sunday. He was treated at the scene by paramedics and was taken to hospital with serious but not life-threatening injuries, the force added. At about 17:00, police said a 16-year-old boy had been arrested on suspicion of causing grievous bodily harm.

  The force is appealing for witnesses to come forward

  Officers believe there was an altercation between a group of young people outside the store before the stabbing happened. Det Insp Paul Shortt said: "This was an appalling act of violence carried out in full view of members of the public. "A team of detectives is now working to understand exactly what happened in the moments before, during and after this incident." The force asked anyone with any information to get in touch. A Primark spokesperson said staff were assisting the police investigation and that the store would be closed until further notice. They added: "Our thoughts are with the victim and we are focused on supporting our colleagues who were in store at the time."

