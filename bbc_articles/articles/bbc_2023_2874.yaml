id: bbc_2023_2874
title: Mountains of rubble after quake strikes Turkey - BBC News
date: '2023-02-06'
section: General
url: http://www.bbc.co.uk/news/world-europe-64534048
content: |-
  A magnitude 7.8 earthquake struck south-east Turkey, demolishing buildings and killing scores of people.

  The quake, which hit Gaziantep early on Monday, was reported to be 10km deep (six miles).

  People are posting footage on social media of locals trapped under the rubble.

  Tremors were felt as far away as Turkey's capital Ankara and in neighbouring countries.
