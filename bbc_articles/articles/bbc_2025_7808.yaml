title: 'Val Kilmer obituary: A difficult man but a brilliant actor - BBC News'
date: '2025-04-03'
section: Culture
url: http://www.bbc.co.uk/news/articles/c4n7xy3ew8mo
content: |-
  An often underrated actor, Val Kilmer had extraordinary range.

  Val Kilmer, who has died at the age of 65, was often underrated as an actor. He had extraordinary range: excelling in comedies, westerns, crime dramas, musical biopics and action-adventures films alike. And perhaps his best performance combined his skills as a stage actor with a fine singing voice, to bring to life 1960s-counterculture icon Jim Morrison, in Oliver Stone's film The Doors. Critic Roger Ebert wrote: "If there is an award for the most unsung leading man of his generation, Val Kilmer should get it. "In movies as different as Real Genius, Top Gun, Top Secret!, he has shown a range of characters so convincing that it's likely most people, even now, don't realise they were looking at the same actor."

  Kilmer was born into a Christian Science family in California

  Val Edward Kilmer was born, on 31 December 1959, into a middle-class family in Los Angeles. His parents were Christian Scientists, a movement to which Kilmer would adhere for the rest of his life. He attended Chatsworth High School, in the San Fernando Valley, where future actor Kevin Spacey was among his classmates and where he developed a love of drama. Kilmer's ambition was to study at the Royal Academy of Dramatic Art (Rada), in London, but his application was rejected because, at 17, he was a year below the minimum entry age. Instead, Kilmer became the then youngest pupil to enrol at the Julliard School, in New York, one of the world's most prestigious drama conservatories.

