content: |-
  The moment Simon Kindleysides steps into history as the first paralysed man to walk the route.

  A person from Norfolk is the first paralysed man to walk the London Marathon.

  Simon Kindleysides, from Blofield, is paralysed from the waist down but completed the 26-mile route in 27.5 "actual walking hours" using a battery-powered exoskeleton suit.
