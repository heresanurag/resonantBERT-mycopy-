title: 'Daniel Anjorin: Murder accused Marcus Monzo wanted to kill, court told - BBC
  News'
date: '2025-06-05'
section: London
url: http://www.bbc.co.uk/news/articles/cp3nlggxzkko
content: |-
  Marcus Monzo is on trial accused of murdering Daniel Anjorin 14, in Hainault last year.

  Daniel Anjorin died after being stabbed as he left his home on his way to school

  The man accused of murdering a 14-year-boy in a series of sword attacks in east London had "a clear intention to kill", a jury has heard. Marcus Monzo, 37, denies murdering Daniel Anjorin as the schoolboy left his home and walked to school in Hainault on 30 April last year. The defendant is also accused of attacking five other people who were seriously injured during a 20-minute period. He denies a total of eight charges, including four counts of attempted murder. On the first day of the trial at the Old Bailey, the jury heard Daniel had suffered a "devastating and unsurvivable injury to his face."

  Prosecutor Tom Little KC added that Mr Monzo had "a clear intention to kill a number of people... it did not matter who they were, or indeed how old they were."

  Warning: this story contains details some may find distressing

  It is alleged the first attack happened at about 06:15 when Mr Monzo drove his grey Ford Transit van at speed into pedestrian Donato Iwule who was "catapulted" into a nearby garden. Mr Monzo then got out of the van and hit Mr Iwule in the face with a sword, the court heard. The jury heard how Daniel was wearing sports clothes, a backpack and headphones when he was approached from behind and attacked by Mr Monzo at about 07:00 BST on Laing Close. "He had left home and was just walking to school, minding his own business, looking forward to the day ahead when he was killed by the defendant," Mr Little said. Mr Monzo must have seen Daniel and "moved quickly like a predator" behind him, Mr Little said. "He lifted the sword above his head and then swung it downwards towards Daniel's head and neck area," he said. "His life was snuffed out in an instant."

  Marcus Monzo is on trial at the Old Bailey charged with Daniel's murder

  After police arrived, the defendant approached them brandishing the sword, the court heard. In body camera footage played to the jury, police are seen repeatedly shouting at him to drop his sword as they called for backup. One officer, PC Yasmin Mechen-Whitfield, chased the defendant through a series of alleyways through residential properties, the court heard. She was hit three times with the sword, which had a 60cm (24in) blade, sustaining "significant injuries" that could have "easily" killed her, the court heard.

  Mr Monzo then broke into the home of a couple before going into their bedroom where they were asleep with their four-year-old daughter, the jury was told. The prosecutor said: "Their bedroom door suddenly opened and the defendant entered their bedroom holding what they described as a machete in his hand but was of course the same sword. "He shouted out towards them 'Do you believe in god?' "What happened must have been truly horrifying and confusing," Mr Little said. Mr Monzo attacked the male resident with the sword, only stopping when the couple's daughter started crying, the jury heard. Police had been following the defendant and he was backed into a nearby garage area near to the other alleged attacks, the court was told. Mr Monzo then struck another police officer, Insp Moloy Campbell, with the sword before attempting to flee, the prosecutor said. He added that Mr Monzo then climbed on top a garage before he was eventually disarmed and arrested.

  When police arrested Mr Monzo and asked if he understood, he replied: "Allah, Allah will unite us all" and "God, God, will reunite us all," the court heard. During a police interview, Mr Monzo claimed his personality had switched and he compared the events to the movie The Hunger Games. He also told police that he had "many personalities" and that one of them was a "professional assassin", the prosecution said. When police searched his home, they found a cat he had killed and skinned, as well as a quantity of cannabis, jurors were told. Mr Little said Mr Monzo's behaviour was triggered "by self-induced intoxication in the form of drugs" which led to a psychotic disorder. He added the defence's case was that the defendant was "most likely suffering from a pre-existing condition which created a vulnerability to experiencing psychotic episodes with schizophrenia-like symptoms, prompted by his use of cannabis". Drug-induced psychosis is not a recognised medical condition and cannot alone establish diminished responsibility, Mr Little said, adding that psychiatrists will discuss whether Mr Monzo met the threshold for a schizotypal disorder diagnosis. Mr Monzo also denies wounding with intent, aggravated burglary and possession of an offensive weapon relating to a kitchen knife. He previously admitted two counts of having an offensive weapon, namely two swords.
