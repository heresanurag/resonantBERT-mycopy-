title: Lyndon Dykes injury 'spooked' Scots vs Gibraltar - Steve Clarke - BBC Sport
date: '2024-06-05'
section: Scotland Men
url: http://www.bbc.co.uk/sport/football/articles/ce992nlkvgxo
content: |-
  Steve Clarke thinks the injury that ruled Lyndon Dykes out of the Euro 2024 finals "spooked" his players during their friendly with Gibraltar.

  Steve Clarke has yet to name his final 26-man squad for the finals

  Steve Clarke thinks the injury that ruled Lyndon Dykes out of the Euro 2024 finals "spooked" Scotland's players as nerves kicked in during the less-than-convincing warm-up win over Gibraltar. They ended a seven-match run without a victory and some players got much-needed game time in Faro on Monday. But a 58-minute wait before Ryan Christie's opening goal led to some tension inside the Estadio Algarve, eased by Che Adams' emphatic finish. Queens Park Rangers striker Dykes sustained his injury last week and head coach Clarke said: "Probably what happened with Lyndon on the training pitch the other day spooked them a little bit as well. "You have to understand. They are human, they have emotions like everybody else."

  Scotland, with Hearts' Lawrence Shankland replacing Dykes up front, missed a series of chances in Portugal and Clarke also thought "it comes down a little bit to confidence". "Shanks didn't really have any clear-cut chances where you are thinking 'go on, he's getting there'," he said. "It's maybe something we need to look at - his positioning, especially on set-plays, where he was maybe too far out from the centre of goal. There are always things you can look at. "What can we do about it? Keep practising in training." Clarke was talking before it was announced that Liverpool winger Ben Doak had joined Dykes in leaving the provisional squad, with Bristol City striker Tommy Conway called up from the under-21s as a replacement. "Don't forget these players are nervous," Clarke added. "They have the biggest tournament coming up for the country next week. They all have half a mind on Germany already. "It sounds terrible to say that, but that's just the way it is. It's natural. "They want to go on the plane flying to Germany for the Euros and they are involved in what's going to be a fantastic tournament in the summer, so you have to make allowances for that. "People won't think of that. They just think of the excitement, etc. But, until you are actually on the plane and on the way to Germany, there is always a doubt in the back of your mind."
