title: One of world's oldest men dies at age 111 - BBC News
date: '2024-08-17'
section: Coventry & Warwickshire
url: http://www.bbc.co.uk/news/articles/clyn89j77meo
content: |-
  John Farringdon is believed to have been the third oldest man in the world.

  One of world's oldest men dies at 111

  John Farringdon celebrated his 111th birthday with a barbecue and an Abba tribute act

  One of the world's oldest men has died aged 111 in Warwickshire. John Farringdon, who lived at Cubbington Mill Care Home in Leamington Spa, celebrated his birthday on 7 June with the help of an Abba tribute act. The care home said he died peacefully earlier this week. Mr Farringdon, born just a year after the Titanic sank, was the third oldest man in the world, according to the Gerontology Research Group.

  The world record is officially held by John Tinniswood, from Liverpool, who was born just over nine months earlier. However, there are other claims. A spokesperson for the care home said Mr Farringdon would be "profoundly missed" by everyone who knew him.

  John Farringdon was the oldest man in Warwickshire and the second oldest man in the UK at the time of his death

  "John’s life was a testament to resilience. His lifelong beliefs and values included forgiveness, chivalry, truthfulness and optimism," a spokesperson added. "He was courageous, strong, and a true gentleman. John led an incredible life." Mr Farringdon worked at Ford Motor Company for 40 years, carried a baton in the Commonwealth Games relay, and met the Red Arrows at Ragley Hall. Before working for Ford, Mr Farringdon had been a typewriter mechanic.

  Mr Farringdon was surrounded by cards from well-wishers on his 111th birthday in June

  The politics fan also met former Prime Minister Rishi Sunak at Number 10 Downing Street, having been invited to attend Prime Minister's Questions by Jeremy Wright, the Conservative MP for Kenilworth and Southam. At the time, Mr Farringdon said: "I've seen it on TV so many times and it seems so different, it's such a large room. We had a lovely, lovely day." Laura Russell, manager of Cubbington Mill Care Home, said he had always been a "big Conservative fan" and had dreamt of going to Parliament. The care home added: "And let’s not forget, he was a Dancing Queen fan of Abba!"

  Mr Farringdon said it was a "great honour" to be selected as a baton bearer

  "Our thoughts are with John's family and friends during this difficult time," they said. "We extend our deepest condolences and offer our support as we honour the memory of a truly exceptional individual."
