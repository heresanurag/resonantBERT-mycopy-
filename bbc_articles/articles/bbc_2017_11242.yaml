title: Footage shows hunt saboteur being hit with riding crop - BBC News
date: '2017-11-21'
section: General
url: http://www.bbc.co.uk/news/uk-england-sussex-42056947
content: |-
  A woman was filmed hitting a man during a hunt in Sussex.

  A woman was filmed repeatedly hitting a man with a riding crop during a hunt in Sussex.

  It happened after the man, who appears to be a hunt saboteur, took hold of the horse's reins.
