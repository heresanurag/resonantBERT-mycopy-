  Lifeguards were being trained how to use the drone when the drama unfolded in what's being called a world first rescue.

  Lifeguards were being trained how to use the drone when the drama unfolded at Lennox Head, Australia.

  Officials say the rescue is a world first after they invested in hi-tech drone technology.
