title: 'Cyclone Chido: Emmanuel Macron lands in cyclone-hit Mayotte - BBC News'
date: '2024-12-19'
section: Europe
url: http://www.bbc.co.uk/news/articles/cr56q8qg312o
content: |-
  Rescuers race to find missing people and survivors in the French territory devastated by Cyclone Chido.

  French President Emmanuel Macron has arrived in Mayotte as the French Indian Ocean territory continues to reel from the devastation of Cyclone Chido. Macron landed in Mayotte on Thursday morning and said he brought four tonnes of food and health cargo with him. At least 31 people are reported by French officials to have died, while thousands are still missing after the cyclone tore through the small islands on Saturday. A state of exceptional natural disaster has been declared in Mayotte.

  Earlier, French senator for Mayotte, Salama Ramia told the BBC that emergency food was the top priority. "One or two shops have opened but not everybody has money to buy food, and even the shops are beginning to be empty, and so, the food for me is really urgent."
  • None Tens of thousands without water in Mayotte as curfew brought in

  Designed specially for France's overseas territories, the emergency allows administrative barriers to be overcome in order to deal with the crisis more quickly and effectively. It has been activated for one month, but can be extended by periods of two months if required. "Faced with this exceptional situation, exceptional resources must be deployed to quickly restore vital services and implement a sustainable reconstruction plan for Mayotte," said the minister responsible for overseas territories, François-Noël Buffet. Emergency services have been delivering food and water and clearing roads, while also racing to find the missing. Health workers are concerned infectious diseases could spread, as residents have reported clean drinking water shortages and shops are rationing supplies. The authorities have said their priority is to get damaged water plants back up and running. Half the territory remains without power. A newly imposed curfew requires people to stay in their homes for six hours overnight to prevent looting. Mayotte is one of the poorest parts of France, with many of its residents living in shanty towns. Macron's administration has been criticised for underinvesting in Mayotte over a number of years. It has been home to 100,000 migrants seeking asylum to France and living in informal settlements. They're believed to have been amongst those worst affected by the cyclone. Chido - the worst storm to hit the archipelago in 90 years - brought wind speeds of more than 225km/h (140mph) on Saturday, flattening areas where people live in shacks with sheet metal roofs and leaving fields of dirt and debris. After Mayotte the storm hit the African mainland, killing at least 45 people in Mozambique and 13 in Malawi.
