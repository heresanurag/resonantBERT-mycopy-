  The BBC's Colin Paterson meets festival-goers, at Worthy Farm for Glastonbury Festival.

  Glastonbury boss Emily Eavis has been welcoming festival goers as the gates open at Worthy Farm. The BBC's Colin Paterson, who is covering the event for the 19th time, has also been saying hello to the first to arrive.
