id: bbc_2018_8727
title: 'Davis resignation: Brexit return of control ''illusory'' - BBC News'
date: '2018-07-09'
section: General
url: http://www.bbc.co.uk/news/uk-politics-44764671
content: |-
  The Brexit Secretary resigns over differences with PM Theresa May over the terms of leaving the EU.

  David Davis has resigned as Brexit secretary over his differences with Prime Minister Theresa May over government policy on the terms of leaving the EU.

  "The return of control to parliament is more illusory than it is real," he told the BBC's Laura Kuenssberg.
