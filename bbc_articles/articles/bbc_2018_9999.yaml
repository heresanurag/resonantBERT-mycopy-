title: Young Stoke City fan 'scared' after police pepper spray - BBC News
date: '2018-08-23'
section: General
url: http://www.bbc.co.uk/news/uk-england-stoke-staffordshire-45277851
content: |-
  Alfie Spain, 12, was left crying and vomiting after Lancashire Police sprayed Stoke City supporters.

  The young Stoke fan caught up in a stand-off among fans and officers at Preston North End on Saturday.

  In a statement police said: "Officers acted in the honestly held belief that the threat they and others faced made the use of the spray justified and proportionate."
