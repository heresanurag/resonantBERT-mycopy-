  England defeated Scotland 46-0 in Edinburgh last year to extend their winning run in the Six Nations over their visitors to 23 games. Without a win over the Red Roses since 1999 an upset seemed unlikely, especially with Bryan Easson's side coming into the fixture off the back of a disappointing 25-17 home defeat by Italy. Clifford, who grabbed her first international try last week, was on hand to power over from close range in a dominant opening period for the hosts. Mitchell made nine changes from the side that won in Cork, one of which was former England captain Packer, who had not featured since the opening-round win over Italy in York. She was given a chance to respond to impressive performances from Sadia Kabeya in the seven jersey and did just that, scoring the second try of the match - her 50th for the Red Roses - following a powerful carry from number eight Maddie Feaunati. Aldcroft replaced Packer as England skipper in January and is the only player to start every game this campaign. The blind-side flanker showed no sign of fatigue as she intercepted Helen Nelson's pass and galloped clear for her side's third try. MacDonald was another player who had not featured since the opening round and after a bright start, the elusive wing cut through the Scotland defence for a deserved try. Heading into the fixture, England's average winning margin over Scotland was 46 points in the Six Nations, which looked likely to increase when tries by Ward and Atkin-Davies ended an utterly dominant half of rugby.

