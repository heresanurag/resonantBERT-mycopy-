content: |-
  England score nine tries to hammer Scotland in Leicester and set up a Women's Six Nations Grand Slam decider with France at Allianz Stadium next Saturday.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England scored nine tries to hammer Scotland in Leicester and set up a Women's Six Nations Grand Slam decider against France at Allianz Stadium next Saturday. The victory extends the Red Roses' winning run to 24 games before a home Rugby World Cup that starts in August. Prop Kelsey Clifford grabbed the first of six first-half tries, with John Mitchell's side in complete control right from the opening whistle. Flanker Marlie Packer was next to cross, followed by captain Zoe Aldcroft, wing Claudia MacDonald and lock Abbie Ward. Lark Atkin-Davies's try ensured a 42-0 lead at half-time, a vastly improved margin from last Saturday's win in Ireland, when England led 7-5 at the break. Player of the match MacDonald raced clear down the wing for her second try early in the second half, before Lisa Thomson finally got Scotland on the board with a try from a rolling maul. Wing Abby Dow capped off the scoring, in front of a crowd of 15,530, with a brilliant solo try, before a simple finish in the corner. The Red Roses are chasing a fourth successive Grand Slam and a seventh Six Nations title in a row. Scotland, who finished fourth in last year's championship, will host Ireland next Saturday, with hopes of adding to their sole victory over Wales this campaign.

