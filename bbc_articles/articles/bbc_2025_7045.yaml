  MacDonald, who featured in the World Cup final in 2022, missed last year's Women's Six Nations after suffering a second neck injury in February 2024. Saracens' Jess Breach nailed down the left wing spot in her absence, but MacDonald went up another gear from her return in York, with her high work-rate and footwork causing Scotland problems throughout the game, and was rewarded with a second try. Dow then paid a reminder to the class on the opposite wing, as she showed terrific strength and balance to run half the pitch and finish off the try of the game. Scotland's second-half performance will please Easson after his side managed a first try against England since 2023 and held the hosts to only three scores - two of which came in the closing stages. Flanker Evie Gallagher, who came into the game with the most turnovers (five) in the competition, was at the heart of slowing down England's breakdown, producing the kind of display that made the 24-year-old a contender for player of the match. Three debutants also appeared off the bench as Easson continued to look at new talent before the World Cup. France's victory in Italy earlier on Saturday, despite being behind at half-time, meant the slim chance of England winning the title in Leicester evaporated prior to kick-off. However, even with the game likely to be their toughest assignment this championship, the Red Roses have not lost to Les Bleus since 2018 and will go in as heavy favourites.
