  Rippon has also received support from Hollywood actor and Oscar winner Reece Witherspoon.

  Rippon has also received support from Hillary Clinton, and Youtube star Tyler Oakley. Kenworthy competes the men's slopestyle skiing on Sunday 18 February from 05:00 GMT and Rippon takes to the ice in the men's single event on Friday from 01:00.

