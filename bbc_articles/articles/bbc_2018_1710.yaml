title: 'Winter Olympics 2018: Team USA''s first openly gay male Olympians march with
  pride in opening ceremony - BBC Sport'
date: '2018-02-10'
section: Winter Olympics
url: http://www.bbc.co.uk/sport/winter-sports/43015188
content: |-
  American freestyle skier Gus Kenworthy and figure skater Adam Rippon receive messages of support as they march at the opening ceremony.

  Four years ago, American freestyle skier Gus Kenworthy considered quitting the sport because he thought he was going to lose fans and sponsors for being himself. Flash forward to the opening ceremony of Pyeongchang 2018 and the Sochi silver medallist walked into the Olympic stadium with Team USA as one of their first openly gay male Winter Olympic athletes. He posted his delight on Twitter, posing for photos with team-mate and figure skater Adam Rippon. "We're here. We're queer. Get used to it" was the message. Kenworthy also posted on Instagram, "I'm so proud to be representing the LGBTQ community alongside this amazing guy! Eat your heart out, Pence", a message for the US Vice President who was present at the ceremony.

  Skater Rippon had criticised Pence during an interview with USA Today for expressing anti-LGBT views and accused him of supporting gay conversion therapy, which Pence's aides have denied. In an emotional interview with Ski Sunday in 2017, Kenworthy said of all the things he has done in his life, he was most proud of coming out. "Before I came out, I thought I was going to start being judged worst at events. I felt like I had a lot to lose and was going to lose it all so I was scared". But since then, he says he has received messages of support and even others saying he has helped them come out to their parents or friends.

