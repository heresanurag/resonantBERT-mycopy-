id: bbc_2019_3433
title: UK pledges £400m to Syrian crisis - BBC News
date: '2019-03-09'
section: UK
url: http://www.bbc.co.uk/news/uk-47504517
content: |-
  Funds will provide essential aid to those living in Syria and refugees in neighbouring countries.

  Many in Syria are living in makeshift camps

  The UK government is to pledge an additional £100m for Syria crisis response this year, on top of the £300m already allocated for 2019.

  The £400m will support ongoing aid "to those most in need" both in Syria and in the neighbouring countries where many have fled since war broke out.

  More than 360,000 people have died in Syria's civil war which began in 2011.

  Funds will provide access to clean water, food, clothes and shelter, as well as emergency medical care.

  The UK has donated more than £2.8bn to the Syrian crisis since 2012, including more than 10 million vaccines and 140 million medical consultations.

  As well as causing hundreds of thousands of deaths, the war has left 1.5 million people with permanent disabilities, including 86,000 who have lost limbs.

  At least 6.2 million Syrians are internally displaced, while another 5.7 million have fled abroad, typically to neighbouring Lebanon, Jordan and Turkey.

  The latest pledge will be made at a conference titled the Supporting the Future of Syria and the Region, co-hosted by the EU and the UN in Brussels next week.

  The money pledged by the Department for International Development (DfID) will also be used to provide counselling for those traumatised by eight years of conflict, as well as helping refugees to return to their education or develop a career.

  Millions living in Syria have been denied access to humanitarian aid by the Syrian regime, who routinely refuse requests from the UN and aid organisations to deliver aid.
