title: 'Laos: Parents ''devastated'' over daughter''s suspected poisoning death -
  BBC News'
date: '2024-11-23'
section: London
url: http://www.bbc.co.uk/news/articles/c5y3ze59zzeo
content: |-
  Simone White died in Laos after drinking alcohol suspected to have been laced with methanol.

  Simone White's parents described their daughter as a "soul who gave so much"

  The parents of British lawyer Simone White, who died in a suspected poisoning in Laos, have said they are "devastated" by the "terrible tragedy". Ms White, from Orpington, south-east London, died in hospital after drinking alcohol suspected to have been laced with methanol in the backpacking hotspot Vang Vieng. The 28-year-old was one of six tourists to die after staying in the popular tourist town. In a statement, her parents said: "Simone was one of a kind and had the most wonderful energy and spark for life.

  "She was a soul who gave so much to so many and was loved by her family, friends and colleagues." They said their daughter had been "taken far too soon" and would be "sorely missed by her brother, grandmother and entire family". They added: "Our hearts go out to all other families who have been affected by this terrible tragedy."

  Ms White's employer, law firm Squire Patton Boggs, described her as a "talented colleague with a bright future". In a statement the firm said: "It is with deep sadness that we mourn the tragic passing of our dear friend and colleague Simone White." The spokesperson added that Ms White was "someone who epitomised our firm values". In comments under the statement posted on professional networking site LinkedIn, one colleague at the firm wrote: "Simone was one of the kindest, most genuine and thoughtful people I have ever met. "She lived life to the fullest and encouraged everyone around her to do the same."

  Holly Bowles, left, and teammate Bianca Jones were visiting Laos from Australia

  Holly Bowles, a 19-year-old Australian, became the sixth person to die from the suspected poisoning on Friday. Her friend and community football club teammate Bianca Jones, also 19, a US man and two Danish women, aged 19 and 20, are also among the victims. The two Australian victims died after being transferred to a hospital in Bangkok, Thailand, while Ms White was treated in Vientiane, the capital of Laos. The names of the Danish and American victims have not been released. New Zealand and Dutch officials have also both said they were monitoring incidents involving nationals. The New Zealand government told the BBC one of its citizens is suspected to have been poisoned with methanol, and the embassy was providing assistance. News reports and testimonies suggest the tourists may have consumed alcohol laced with methanol - a deadly substance often found in bootleg alcohol. Medical specialists say drinking as little as 25 millilitres of methanol can be fatal, but it is sometimes added to drinks because it is cheaper than alcohol.

  Christer Hogstrand, a professor of molecular ecotoxicology, at King’s College London said it was also "not uncommon in home-distilled alcohol". "Methanol is like the alcohol in our drinks – colourless and odourless – but its impact on humans can be deadly," he explained. "It has a different carbon atom structure which completely changes how humans process it in the body, leading to these potentially fatal consequences." It is not yet known where any of the people who fell sick or died were poisoned. It can take up to 24 hours for victims to start showing signs of illness. The Nana Backpacker Hostel - where the Australian teenagers were staying - has said it gave out free shots to around 100 guests the previous evening. But the hostel's manager told news agency Associated Press that no other guests had become unwell., external The manager of the hostel has since been detained for questioning by police. Methanol poisoning has long been a well-known issue across South East Asia, particularly in the poorer countries along the Mekong river. But despite foreign governments posting warnings about alcohol consumption in these places, there is still little awareness among the backpacker party scene.

