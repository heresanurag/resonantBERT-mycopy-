content: |-
  More people are being prosecuted for dangerous driving thanks to a huge increase in footage submitted to police by the public.

  The public is helping police to prosecute dangerous drivers by capturing footage of reckless behaviour on their phones, helmet cameras and dashcams.

  Of the 150,000 clips sent to police in England and Wales every year, an estimated 90% result in drivers being sanctioned.

  Police in the West Midlands have set up a special portal to allow the public to submit footage as part of an operation targeting dangerous driving. Watch some of the most dangerous manoeuvres caught on film in the West Midlands.

  Read more: The cyclist helping to catch hundreds of bad drivers
