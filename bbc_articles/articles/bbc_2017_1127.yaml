title: Wayde van Niekerk relives Rio Olympics 400m gold - BBC Sport
date: '2017-01-01'
section: General
url: http://www.bbc.co.uk/sport/athletics/38418992
content: |-
  South Africa's Wayde van Niekerk relives his historic 400m gold at the Rio Olympics, when he smashed Michael Johnson's 17-year-old world record.
