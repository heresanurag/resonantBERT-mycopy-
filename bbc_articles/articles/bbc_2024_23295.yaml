  "It is unjust to detain the defendant further, as the possibility of his innocence has become clear to a respectable degree,” Murayama said at the time. Hakamada was then released from jail and granted a retrial. Prolonged legal proceedings meant that it took until last year for that retrial to begin - and until Thursday morning for the court to declare the verdict. The detail upon which his retrial and final acquittal hinged was the nature of the red stains on clothing prosecutors said was his. The defence questioned how the stains had aged. It said the fact they remained red and had not darkened after an extended time immersed in soybean paste meant the evidence was fabricated. Thursday's ruling found that "investigators tampered with clothes by getting blood on them" which they then hid in the tank of miso, according to AFP.

  Hakamada’s 91-year-old sister, Hideko, has cared for him since he was released from jail in 2014

  Decades of detention, mostly in solitary confinement with the ever-present threat of execution, have taken a heavy toll on Hakamada’s mental health, according to his lawyers and family. His sister has long advocated for his release. Last year, when the retrial commenced, Hideko expressed relief and said "finally a weight has been lifted from my shoulders". Retrials for death row inmates are rare in Japan - Hakamada's is only the fifth in Japan's post-war history. Along with the United States, Japan is the only G7 country that still imposes capital punishment, with death row prisoners being notified of their hanging just a few hours in advance.
