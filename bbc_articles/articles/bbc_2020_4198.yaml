  The latest news and updates on the coronavirus pandemic in Wales on Monday.

  Families to get compensation for NHS staff deaths

  Families of Welsh NHS and social care workers who die in service as a result of Covid-19 will be entitled to financial support of £60,000. Health minister Vaughan Gething's announcement was made at the same time as a similar scheme was announced for England. The minister said he hoped the payments will provide "peace of mind". Eligible beneficiaries will receive a payment of £60,000 under the scheme, which will last for the duration of the Covid-19. Mr Gething said: "Our frontline workers in the NHS and social care sector are going above and beyond to deliver care and services for patients and to the most vulnerable in our communities across Wales. "Their bravery on the frontline of this pandemic is something the whole nation is thankful and proud of." Plaid Cymru AM Rhun ap Iorwerth said it was an "overdue yet welcome announcement".He added: "The priority must be ensuring our front line workers are kept safe in the workplace by having access to enough of the correct protective equipment they need."
