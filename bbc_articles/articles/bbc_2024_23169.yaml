title: Five arrested on suspicion of murder of missing Yeovil man - BBC News
date: '2024-09-25'
section: Somerset
url: http://www.bbc.co.uk/news/articles/crm23xwe93wo
content: |-
  Police said the disappearance of Michael Wheeler is being treated as a murder inquiry.

  Five arrested on suspicion of missing man murder

  Michael Wheeler has not been seen or heard from for a month

  Five men have been arrested on suspicion of murder in connection with a man who has been missing for a month, police have said. Avon and Somerset Police said the arrests relate to the disappearance of Michael Wheeler, 37, from Yeovil. Concerns were raised about his welfare on 16 September, weeks after he was last heard from on 24 August. The five men arrested are aged between their late teens and late 30s, and are currently being held in police custody.

  Mr Wheeler's car was recovered last week after being found abandoned in Yeovil, with concerns being raised after he failed to contact friends or family, or attend regular appointments. Police said "several actions" had been undertaken to find him including searches in recent days at Ham Hill, Stoke sub Hamdon, and at addresses in Yeovil and Crewkerne, as well as a public appeal.

  Det Ch Insp Lorett Spierenburg, who is leading the investigation, said: “This is an incredibly difficult time for Michael Wheeler’s family, who understandably are incredibly worried and desperate to know what has happened to him." She added police had been "keeping an open mind" over what had happened to Mr Wheeler, but inquires had now turned to a murder investigation. She also confirmed arrests had been carried out last week "to enable us to question several individuals while under caution to understand if they knew anything that could help us locate Michael". Four of those individuals have now been re-arrested on suspicion of murder in the past 24-hours, along with a fifth man who was not arrested last week, she said.

  “Detectives will be questioning all five men as part of our ongoing efforts to establish what has happened and whether any criminal offences have occurred," she said. A sixth man who was arrested last week remains on police bail. Det Ch Insp Spierenburg added: “We recognise the news of this significant development in our investigation is likely to cause concern among the local community. “We’d like to reassure people there is no evidence of there being any increased risk to public safety, but would encourage anyone with concerns to speak to local officers.” Police have urged anyone with information about Mr Wheeler's whereabouts since he was last seen in August in the Yeovil area to get in touch.

