  • None Last surgeons standing in Darfur city's only hospital They both credit the local communities for welcoming those seeking refuge and sharing with them the little that is available. In the case of South Sudan, "it is a million extra people who've come in to a country where already 60% of the population is in emergency hunger", says Ms Dagesh. Most families are now down to a meal a day, with children and the elderly given priority. "But you see them wearing out and thinning in front of you - malnourished children. You see mothers who are trying to breastfeed, and there is nothing coming out of their breast," she said. Most of the refugees are women, children and some elderly people. They say most of the able-bodied men were either killed or simply disappeared. So, they fled to save themselves and the children. They have nothing. Faced with the hunger in the camps, some in South Sudan have tried to sell firewood. But Ms Dagesh says it exposes them to harassment, violence and rape.

  More than 700,000 Sudanese have headed west into neighbouring Chad since the war began

  Many of the refugees she met had come from Sudan's agricultural areas. The war disrupted their lives and livelihoods. They would want to see peace restored so they can go back home, but the fighting has been raging for close to two years now with no end in sight. With the hunger situation deteriorating inside Sudan in the absence of a ceasefire, the closure of the kitchens supplying emergency meals will only increase the numbers fleeing across borders. Yet aid agencies that normally would help are strained. The UNHCR says it has been forced to rationalise "to levels where our interventions are absolutely limited - they are at the minimum". It does not help that the agency was already underfunded. The UNHCR's call for donor contributions last year yielded only 30% of the anticipated amount, forcing their teams to cut "everything", including the number of meals and amount of water refugees could receive. The US has been the UNHCR's main funder and the announcement last month of the aid freeze and subsequent waiver appeared to have thrown things into limbo. "We are still assessing, working with partners, to see the extent to which this is affecting our needs," Mr Balde told the BBC. Faced with impossible choices, some refugees are already resorting to seek refuge in third countries, including in the Gulf, Europe and beyond. Some are embarking on "very dangerous journeys", he says.
