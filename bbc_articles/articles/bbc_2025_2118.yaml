  • None What is USAID and why is Trump poised to 'close it down'?
  • None 'My wife fears sex, I fear death' - impacts of the USAID freeze The former head of USAID, Samantha Power, had embraced the idea of working with the local groups rather than relying only on traditional channels like the UN. Money had started to flow through international aid organisations that got US grants, but a channel for direct funding was in the works. "It was ground-breaking," says Ms Tracy. "The only time that USAID had ever done this was with the White Helmets [humanitarian group] in Syria." For Ms Tariq, the cut in US funding made it impossible to buy stock for the more than 25 kitchens in the six neighbourhoods in the capital, Khartoum, she helps to service. She told the BBC that left them unprepared for a worsening situation as the army advanced on the area, which has been held by the RSF since the conflict broke out. There was widespread looting of markets as the RSF began to withdraw and the army tightened its siege. Most of the kitchens had closed, she said. Some are trying to get food on credit from local fishermen and farmers, but very soon "we expect to see a lot of people starving".

  Those behind the community kitchens are now hoping to fill the funding gap through private donations

  Here and in the rest of the country, Ms Tracy's Mutual Aid Sudan Coalition fund will do what it can to plug the gap left by USAID. "I think we can shore up [the emergency kitchens]," she said, "but the reality is that [private donations] are going to have to do even more now, because even if humanitarian assistance resumes, it's never going to be what it was." "These volunteers were challenging us to work differently, and we were responding," says a member of a former USAID partner organisation. They are "exhausted, traumatised and underfunded" and "we were scaling up to help them". The State Department did not answer specific questions about waivers for Sudan, saying that information was shared directly with groups whose applications were successful. "The aid review process is not about ending foreign aid, but restructuring assistance to ensure it makes the United States safer, stronger, and more prosperous," it said in response to a BBC query. The UN World Food Programme (WFP) says it has received waivers for its 13 existing Sudanese grants with USAID, but there is no certainty about what comes next for future funding. That would anyway have been under negotiation - now the talks will take place in changed circumstances. In 2024 the US was the largest single donor to Sudan, both in direct donations and in contributions to the UN's Sudan Humanitarian Response Plan.

  Millions have been forced from their homes and some - like these people arriving in South Sudan - have fled to neighbouring countries

  Top UN officials told the BBC the impact of Washington's policy shift would be felt beyond the borders of Sudan, with more than two million civilians now refugees in neighbouring countries. "I witnessed people who have fled conflict but not hunger," said Rania Dagesh, the WFP's assistant executive director for partnerships and innovation, after visiting camps in Renk and Malakal, South Sudan, earlier this month. The influx of refugees has only strained available meagre resources further. "We have to rationalise, rationalise, rationalise," says Mamadou Dian Balde, the UN High Commissioner for Refugees' regional bureau director. He had also been to visit refugee camps in Chad and Egypt when he spoke to the BBC. "We are strained. It's extremely difficult."
