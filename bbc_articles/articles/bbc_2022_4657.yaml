title: 'Immigration: PM outlines Rwanda plans for asylum seekers - BBC News'
date: '2022-04-14'
section: General
url: http://www.bbc.co.uk/news/uk-61105169
content: |-
  Single men arriving in Britain on boats or lorries could be given a one-way ticket to Rwanda.

  Prime Minister Boris Johnson has outlined plans for some asylum seekers who arrive in the UK via boats and lorries, to be sent to Rwanda.

  Single men could be given a one-way ticket to the country, in a £120m trial agreed with the African nation.
