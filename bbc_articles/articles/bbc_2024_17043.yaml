title: '''Babymoon’ couple surprised after baby born in Tenerife - BBC News'
date: '2024-07-29'
section: General
url: http://www.bbc.co.uk/news/videos/crgr8jwl20lo
content: |-
  Cai Daniels and Ali Lloyd were on holiday in Tenerife when Ms Lloyd unexpectedly went into labour.

  A couple who were on their “babymoon” in Tenerife have been stuck on the Spanish island after their baby was born three months prematurely.

  Cai Daniels, 26, and Alis Lloyd, 20, may have to wait up to eight weeks to return to their home in Llanelli, Carmarthenshire.

  "It was meant to be a relaxing break before we kicked into gear," Mr Daniels said.

  A friend has set up a fundraising page to help the new parents pay for their living costs, which are not covered by their travel insurance.
