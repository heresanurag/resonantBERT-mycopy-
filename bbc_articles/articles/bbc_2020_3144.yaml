title: 'Coventry ''drive-by shooting'': Two held as man, 19, killed - BBC News'
date: '2020-03-15'
section: Coventry & Warwickshire
url: http://www.bbc.co.uk/news/uk-england-coventry-warwickshire-51887581
content: |-
  Abdul Wahid Xasan, of Foleshill, died from gunshot wounds to his back, West Midlands Police say.

  Victim Abdul Wahid Xasan, of Foleshill, died in hospital following the shooting

  A 19-year-old man died after being targeted in a drive-by shooting involving a car that was later found burned out in Coventry.

  Abdul Wahid Xasan, of Foleshill, Coventry, was shot as he walked along Harnall Lane and into Adelaide Street in Hillfields at about 14:30 GMT on Friday, West Midlands Police said.

  He died later that day in hospital from gunshot wounds to his back.

  A 15-year-old boy and a man, 19, have been arrested on suspicion of murder.

  Police said a post-mortem examination was due to take place.

  "The gunshots were fired from a black VW Golf R, with light coloured or silver wing mirrors and five spoke alloy wheels," the force said in a statement.

  "A car was discovered burnt out in London Road yesterday evening and is believed to be the one used."

  Cordons are in place at both locations as forensic experts work to gather evidence.

  Two arrests were made during early morning raids

  Det Ch Insp Scott Griffiths, from the force's homicide unit, said the killing was a "horrific crime" but the investigation had made "swift progress" to "bring Abdul's killers to justice".

  He said: "It is abhorrent that these people think nothing of using a firearm in broad daylight on a residential street with a children's nursery close by.

  "It is vital that anyone who saw what happened yesterday afternoon, and has not already spoken to us, does so."

  He also urged those responsible for setting the car on fire to come forward.

