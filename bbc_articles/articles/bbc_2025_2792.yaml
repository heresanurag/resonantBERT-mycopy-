title: 'Newspaper headlines: ''Failed by the state'' and ''Trump''s Gaza takeover
  plan'' - BBC News'
date: '2025-02-06'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cm29rpll933o
content: |-
  Failings in the handling of two killers and Donald Trump's Gaza comments dominate the headlines.

  'Failed by the state' and 'Trump's Gaza takeover plan'

  Harm caused by social media is like cancer caused by smoking, according to a counter terror chief

  The Guardian says President Donald Trump's Gaza "takeover" plan is facing "global condemnation", external. According to the paper, an "unusually broad wave of international outrage" followed his "shock" announcement, after a meeting with Israel's Prime Minister, Benjamin Netanyahu, at the White House. However, the Guardian says Trump appeared untouched by hours of criticism, telling reporters in the Oval Office that "everybody loves" the plan. The Financial Times says there are also "fears" for the future of the occupied West Bank, external. The paper says Arab states and Palestinians are worried that Trump could give Israel the green light to "annex" the territory. The i says the UK is on a "collision course", external with the American president. The paper says Sir Keir Starmer risks a showdown, after he insisted that Palestinians "must be allowed home" to Gaza. Downing Street is quoted as saying that the UK government will speak to Trump and his team about "all of his proposals", but the paper says No 10 would not be drawn on whether the prime minister would directly raise the issue of the president's comments on Gaza. "Failed by the state," is the verdict of the Daily Mirror after separate reports into the killers, Axel Rudakubana and Valdo Calocane. The stark words stand alongside pictures of the three young girls murdered in Southport, external by Rudakubana and the three people stabbed to death in Nottingham, external by Calocane. The Daily Express also leads on the story, external with the headline "Failed!" It says the Southport killer should have been flagged as a terror threat.

  The Times leads with a claim from Britain's head of counterterrorism that the harm created by social media is similar to the "cancer" caused by smoking, external. Matt Jukes says an online age restriction here, similar to Australia's ban on social media use by under-16s, "warrants serious attention". The paper says Mr Jukes' comments follow revelations that the Southport killer watched violent and extremist videos on social media, just before he attacked three girls at a dance class last summer. The immigration policy announcement by the Conservative leader, Kemi Badenoch, is the lead story for both the Daily Telegraph and the Daily Mail. "Tories to kick out low-paid migrants," is the Telegraph's headline. It says Badenoch is seeking to combat the threat from Reform UK, external, after criticism of the Tories' failure to set out policies to take on the party. In an article for the paper the shadow home secretary, Chris Philp, confirms that the Conservatives would set a binding annual cap on visa numbers. The Mail's take paraphrases Badenoch, saying she would "ban migrants, who claim benefits, from becoming UK citizens". The paper says she "will take the fight to Reform" with what it calls a "dramatic tightening of the rules", external. Finally, the Telegraph reports that Ferrari is preparing to "put its foot down" on strange, bling requests from super-rich customers. The paper says the Italian car-maker is drawing up plans to potentially prevent drivers from selecting garish colour schemes, external. The Telegraph has several pictures including a Ferrari in camouflage colours and what the paper calls "some other terrible paint jobs".

