title: Tunisia inquest shown police map of killer's spree - BBC News
date: '2017-01-16'
section: General
url: http://www.bbc.co.uk/news/world-europe-38643286
content: |-
  A court has watched a police recreation of the hour-long killing spree at a Tunisian beach resort in June 2015, which left 38 people - including 30 British tourists - dead.

  A court has watched a police recreation of the hour-long killing spree at a Tunisian beach resort in June 2015, which left 38 people dead.

  The inquest into the deaths of 30 Britons who died during the attack heard Tunisian security forces deliberately "slowed down" as Islamist gunman Seifeddine Rezgui opened fire.
