content: |-
  The Met Office has issued an amber weather warning for snow and ice for most of the country.

  Snow and ice are expected for most of Wales this weekend as an amber weather warning has been issued.

  It is the second highest level of warning and is in effect from 18:00 GMT on Saturday until midday on Sunday, with warnings of travel disruption.

  The Met Office have also issued a yellow snow and ice warning for the whole of Wales from midday on Saturday until the end of Sunday.

  Meteorologist Sabrina Lee explains what we can expect this weekend.

  Video filmed by Alex Knill and edited by Erin Lister.
