  A man has been arrested on suspicion of murder after a person died in a fire in a block of flats in east London.

  The victim, who is believed to be a female, died at the scene, emergency services said.

  Five people are also known to have been injured and taken to hospital.

  Five ambulance crews and a helicopter were sent to Tollgate Road in Beckton after the fire was reported to emergency services at 17:26 BST on Thursday afternoon.

  Inquiries into its cause are ongoing, the Metropolitan Police said.

  The police, London Ambulance Service and London Fire Brigade remain at the scene dealing with the fire, a Met spokesperson added.

  The mayor of Newham, Rokhsana Fiaz, said: "We are deeply saddened by the news that there has been one fatality already from the fire that broke out in flats in Beckton.

  "Our deepest condolences to loved ones now in mourning."

  Tollgate Road is cordoned off and restrictions are in place on surrounding roads.
