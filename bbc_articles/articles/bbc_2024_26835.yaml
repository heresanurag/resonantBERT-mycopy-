content: |-
  Carole Ann Ford is the last surviving original cast member of the first Doctor Who series.

  Carole Ann Ford is the last surviving original cast member of Doctor Who

  The last surviving cast member from the very first Doctor Who series said she would like to return to the show as the 60th anniversary of her final appearance approaches. Carole Ann Ford, from Ilford, played Susan, granddaughter of the Doctor played by William Hartnell when the BBC show started in 1963. The character has been frequently mentioned in the recent series with Ncuti Gatwa. During an appearance at Luton Comic Con, the actress said she wanted to return although she admitted it "would be very emotional.. very emotional". "I don't know if I could survive the excitement actually, it would be intense beyond all intensity," she said.

  Carole Ann Ford, far right, says a return to Doctor Who will be emotional 60 years on

  The 84-year-old is the last member of the original cast following the death of William Russell in June. She said: "It's not just returning, it would bring back all the memories of William Russell and Jackie and Bill [William Hartnell] and various other people who aren't with us anymore. "I might be a little bit overcome and start blubbing. "I keep being reminded I'm the last one standing and it's not something I'm happy to hear."

  Carole Ann Ford (left) appeared in the very first series of Doctor Who. William Russell (right) - the first Doctor's companion - died in June

  She appeared as the granddaughter of the original Doctor, played by William Hartnell, but was left behind after a showdown with the Daleks set in Bedfordshire and broadcast on 26 December 1964. At the time, the Doctor promised to return for her, but despite an appearance in the 20th anniversary special The Five Doctors, a story that would address the reunion between the characters is yet to take place. "He said he'd come back and get me and never did. I'd give him a good telling off if I saw him again," she said. "I understand their dilemma, how difficult it must be to write for me. It has been 60 years since I was first in it. "I've met Russell [T Davies] a few times and I absolutely adore him. He is the man that would be the boss man to say yes or no - so hopefully it's going to be yes."

  Susan was the Doctor's granddaughter in the first two series of the show

  Last year the character returned to screens in a newly colourised version of the 1963 episode, The Daleks, which was broadcast on BBC Four to mark the show's 60th anniversary. The actress encouraged fans to be vocal in their support of her return if there was any chance of her returning. In an interview on BBC Three Counties Radio, she hinted that she had had "one or two" conversations about returning in the past. "I've had many conversations about going back, maybe not with the right people, I don't know," she added. When it was suggested her character could be recast, she joked: "They better not, I'd burn the studio down."

