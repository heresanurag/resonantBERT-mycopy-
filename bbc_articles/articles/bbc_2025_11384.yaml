  Trump's row with state officials has ramped up after his decision to deploy federal troops to LA. The president has vowed to "liberate" the city, but he has been accused by California Governor Gavin Newsom of an "assault" on democracy. Other state officials, too, have insisted that local law enforcement has the situation under control. But US Defence Secretary Pete Hegseth has backed Trump, telling a Senate hearing on Wednesday that sending the troops to Los Angeles was "lawful and constitutional". The military deployment to the LA area will cost $134m (£99m), the Pentagon has said.

  While addressing troops at the Fort Bragg military base in North Carolina earlier this week, Trump described the protests as a "full-blown assault on peace and public order". The Republican president said he planned to use "every asset at our disposal to quell the violence". He urged troops to boo the names of Newsom and Joe Biden, his presidential predecessor, during his speech. In televised remarks of his own, Newsom - who is seen as a potential presidential contender himself - again criticised the president's rare deployment of the US military without a request from state officials. He called it a "brazen abuse of power". "California may be first – but it clearly won't end here," he said. "Other states are next. Democracy is next. Democracy is under assault right before our eyes."

  Trump has set a goal for border agents of at least 3,000 daily arrests as he seeks to ramp up mass deportations, a signature pledge of his re-election campaign. Since assuming office, the president has drastically reduced illegal crossings at the US-Mexico border to historically low levels. A CBS News/YouGov poll conducted in early June, before the protests kicked off, found 54% of Americans saying they approved of Trump's deportation policy, and 50% approved of how he was handling immigration. That compares with smaller numbers of 42% who gave approval to his economic policy and 39% for his policy on tackling inflation.

