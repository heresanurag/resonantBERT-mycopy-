  Having come so close to a first Arsenal hat-trick, Russo could have been forgiven for feeling frustrated at full-time. Two video assistant referee (VAR) interventions meant she had two goals chalked off for offside, either side of a wasted opportunity when one-on-one with visiting goalkeeper Misa Rodriguez. But the England forward celebrated at the final whistle and said the thought of being in the last four had "not sunk in yet". "It was just amazing - the result, the fans, playing at the Emirates... it just doesn't get old," Russo told BBC Sport. "When we went to Madrid we were disappointed, but we knew we had the belief and we knew what we needed to do. There was disappointment and it turned into fire quite quickly." Her contribution, alongside that of team-mate Kelly, played a key role in Arsenal's courageous comeback and Houghton said it showed Russo's "maturity". She is now the joint-top scorer in the Champions League with six goals and has 17 in all competitions for her best goalscoring season to date. "She got a lot of criticism at the beginning of the season and was probably doing too much work for the team - not being selfish enough as a striker," added Houghton. "She showed a real maturity about her display [against Real Madrid]. Almost everything she touched went in the back of the net. "She's got the goals that have sent Arsenal into a semi-final of the Champions League."

  Alessia Russo is the joint-top goalscorer in the Women's Champions League this season with six goals - level with Pernille Harder
