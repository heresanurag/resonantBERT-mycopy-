title: Researchers in Canada find ship where Shakleton died - BBC News
date: '2024-06-16'
section: General
url: http://www.bbc.co.uk/news/videos/cl559wldqpzo
content: |-
  Researchers found the Quest, the ship where Shackleton died in 1922, 390m deep off Newfoundland and Labrador.

  Researchers in Canada found the Quest, the ship where explorer Ernest Shackleton died in 1922. It was found on the ocean floor off Newfoundland and Labrador at a depth of 390m.

  Shackleton suffered a fatal heart attack on board on 5 January 1922 while trying to reach the Antarctic, but the Quest remained in service for 40 more years.

  The ship sank in 1962 after it suffered ice damage. It was found intact, however. This follows the 2022 discovery of Shackleton's Endurance.
