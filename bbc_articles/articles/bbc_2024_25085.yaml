title: Keir Starmer does not rule out NI rise for employers - BBC News
date: '2024-10-15'
section: Politics
url: http://www.bbc.co.uk/news/articles/cx20mp7e545o
content: |-
  Sir Keir Starmer says this month's Budget was "going to be tough" but would "focus on rebuilding our country".

  PM does not rule out NI rise for employers

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Sir Keir Starmer has not ruled out a National Insurance increase for employers in the Budget, in a BBC Breakfast interview. The prime minister side-stepped questions over whether Labour’s manifesto promise not to raise taxes for "working people" covered employers' National Insurance (NI), but it was apparent from the prime minister’s interview that NI for employers is going to rise. The Labour Party's 2024 manifesto ruled out raising National Insurance, income tax and VAT. Speaking in Downing Street, Sir Keir said this month's Budget was "going to be tough" but would "focus on rebuilding our country".

  Sir Keir said Labour had been "very clear in the manifesto that we wouldn't be increasing tax on working people". He added: "It wasn't just the manifesto, we said it repeatedly in the campaign and we intend to keep the promises that we made in our manifesto."

  On Monday, Rachel Reeves said Labour's election pledge not to increase NI on "working people" related to the employee element, as opposed to the sum paid by employers. Treasury officials are reportedly exploring national insurance on employer pension contributions to raise budget revenue. Introducing national insurance at the full 13.8% rate on employer pension contributions could raise as much as £17bn a year for the exchequer according to the Institute for Fiscal Studies (IFS)., external Employers currently pay NI at a rate of 13.8% on all employees' earnings above £175 per week. NI rates also apply to employees, who start paying when they turn 16 and earn more than £242 a week, or have profits of more than £12,570 a year. It is not paid by people over the state pension age, even if they are working. The BBC understands some business groups have been steered away from expecting an increase in the headline rate of national insurance for employers.

  The prime minister is adamant that he will not be drawn on Budget speculation in advance of the formal announcement in just over a fortnight. That is the standard position that governments adopt given these are market-moving measures – and in this particular case the Budget will be the biggest political and economic moment for this government so far. That being said, it was pretty clear from the prime minister’s interview that National Insurance for employers is going to rise. In communication terms, Downing Street knows that a hare is running – they have the option of ruling increasing employer NI out, and by not doing so, they know that people will assume it is going to happen. A similar dance has taken place on the possibility of Reeves altering the fiscal rules – the government’s own rules about how much money it can borrow and in what circumstances. There will be a row about whether this is consistent with Labour’s manifesto or not. Either side of that argument has a reasonable case, and so there is a question for the government about trust. But the more important question is what a national insurance increase for employers would mean for the economy, especially at the same time as the government is trying to make the UK a better environment for business investment.

  Laura Trott, Conservative shadow chief secretary to the Treasury, accused Reeves of "breaking Labour's manifesto promise not to increase tax on working people". She said it would be a "tax on work that will deter investment, employment and growth". The Office for Budget Responsibility's (OBR) research, external indicates that increasing employer national insurance could hike hiring costs, which may lead to slower jobs growth or stagnant wages. Daisy Cooper, the Lib Dem's Treasury spokesperson, said: "The burden of this Budget should fall on the likes of big banks, social media giants and oil and gas firms, instead of our local community businesses." And Paul Johnson, from the IFS, told Times Radio: "It seems to me that would be a straightforward breach of a manifesto commitment... it says very clearly we will not raise rates of national insurance."

  Raising employer national insurance is still a tax on working people, Alex Veitch, director of policy at the British Chambers of Commerce said. "Nearly all UK companies are small, with many family-owned, and they are the anchors in our local economies," he said. Raising employer National Insurance contributions would "simply hobble growth and lead to businesses having less money to invest in their staff," Mr Veitch told the BBC. Rain Newton-Smith, director general of the Confederation of British Industry (CBI), warned that raising national insurance would be a "difficult move" for employers. "If the overall costs of hiring aren’t matched by higher productivity, it makes it harder for businesses to create the jobs and the growth that we need to really fund our public services," she told BBC Radio 4's Today programme. High Street shops, manufacturing and the transport sector could be particularly badly hit, Ms Newton-Smith warned. Labour claims nearly 38,000 new jobs will be created in the UK in the coming years by £63bn in private funds committed by businesses at an investment summit on Monday.

  In addition to the signals on national insurance, on Tuesday the government released £68m to prepare brownfield land for new housing. Sir Keir told the BBC the money would go towards "housing for all parts of the country". The government has committed to 1.5 million homes over the next five years by reforming the housebuilding system. The new money follows the government's announcement of securing £550m for housebuilding from three investment funds: Schroders, Man Group, and Resonance, during its investment summit on Monday. "We've said as a government we're going to fix the foundations, rebuild our country and expressly saying now is the time to back us," Sir Keir said.

