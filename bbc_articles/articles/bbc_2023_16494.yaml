title: 'Storm Babet: Yellow weather warning in place for NI - BBC News'
date: '2023-10-16'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-67123791
content: |-
  A weather warning is in place for Northern Ireland, while the army is deployed in Cork amid flooding.

  Midleton in County Cork was "impassable" as a month's worth of rain fell

  A yellow weather warning for rain is in place for Northern Ireland as Storm Babet is due to bring heavy and prolonged downpours.

  The Met Office warning began at 14:00 BST on Wednesday and will end at 10:00 on Thursday.

  The main focus is on counties Antrim and Down, where the heaviest rain is most likely on high ground.

  In the Republic of Ireland, the army has been deployed in County Cork as weather conditions worsen.

  More than 100 homes have been flooded in the town of Midleton, Cork County Council said.

