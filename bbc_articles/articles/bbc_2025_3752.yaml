title: Housing estate streets named in honour of Ruchill Hospital - BBC News
date: '2025-03-14'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/c07zxj3p9v1o
content: |-
  Would you live on Vaccine Avenue or Virology Grove?

  The development of over 400 homes features Radiography Road

  They are names that bring illness and disease to mind - but a new Glasgow housing estate is to have its streets named after vaccines, radiography and viruses. Ashlar Village is on the site of the former Ruchill Hospital, which closed in 1998. Now the development of over 400 homes will feature Vaccine Drive, Virology Grove, Radiography Road and Laboratory Place. The Glasgow MSP Paul Sweeney suggested some of the names and told BBC it was in tribute to the work at the hospital in the past.

  Speaking to the Jeremy Vine Show, he explained his original suggestion was to acknowledge "key pioneers" at the hospital, which was originally built to deal with infectious disease. He explained: "The council said that since Black Lives Matter and controversies over naming streets after people, we have decided no longer to name streets after persons alive or dead - so it would need to be something more abstract. "I head-scratched and thought 'let's make it more particular to the function of the hospital' - obviously it's tricky to name something Tuberculosis Terrace so I tried to keep them appropriately named." Social media reaction has been mixed, with some comments calling them "crazy" and others cracking jokes. However Sweeney believes the choices serve as an acknowledgment of the history in the area, even if he admits some of that past was "unpleasant", including the hospital dealing with the Aids epidemic in the 1980s. He said: "It's a very important social history and it's trying to credit some of the work done there, but perhaps in a more oblique way than first intended."

  Ashlar Village is on the site of the former Ruchill Hospital, which dealt with infectious diseases

  Not all of his ideas made the cut though - X-Ray Drive was rejected by the council due to a hyphen being in it, which forced the change to Radiography Road. Some neighbouring streets are, however, named in honour of the architect who designed the old hospital - Alexander McDonald. The new development will feature one, two three and four bedroom homes with a garage or parking space, which Sweeney says will help an area that has consistently suffered from "a chronic lack of homes". A spokeswoman for Glasgow City Council said that naming conventions for Glasgow streets have been in place since the late 1980s, basing them around "the history of the site in question." She added "After a series of discussions on an initial list of proposed names, and in keeping with the street naming convention - whereby street names are given using the history of the site in question - the local elected members felt that these names fitted given the former hospital on site was famous for its remarkable work with infectious diseases."
