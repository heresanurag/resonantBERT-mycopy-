  Man arrested at Heathrow over £400,000 in suitcase

  Border Force stopped the man as he tried to board a flight to Turkey

  A man has been charged with money laundering after £400,000 was found in a suitcase at Heathrow Airport. The Austrian national was arrested by Border Force staff at the west London airport on Wednesday as he tried to board a flight to Turkey, the National Crime Agency (NCA) said. Nearly 11,000 Euros (about £9,150) was found in a carry-on backpack, which was also seized, the agency said. The man was due to appear at Uxbridge Magistrates' Court on Friday.
