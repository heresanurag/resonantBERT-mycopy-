id: bbc_2017_13068
title: South Korea and US stage 'largest' air drill - BBC News
date: '2017-12-04'
section: General
url: http://www.bbc.co.uk/news/world-asia-42219709
content: |-
  North Korea accuses them of "begging for nuclear war", days after it fired its 'highest' missile.

  This is the US's largest deployment of stealth fighter jets to South Korea.

  Tens of thousands of South Korean and American troops are involved in the annual exercises.
