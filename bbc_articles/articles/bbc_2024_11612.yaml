content: |-
  Season three of the Netflix show has thrust the characters of Will and Alice Mondrich into the limelight.

  Bridgerton star on being the show's 'working class hero'

  Season three has seen a change in status for Will and Alice Mondrich

  This article contains minor spoilers for series 3 of Bridgerton. The majestic world of Bridgerton has thrust a number of budding couples into the limelight over its three seasons. Daphne Bridgerton and the Duke of Hastings, Kate Sharma and Anthony Bridgerton and, now, Penelope Featherington and Colin Bridgerton. While Penelope and Colin’s love story is the focus of season three, there's another couple who've been there from the start: Will and Alice Mondrich. Theirs is a rare, established relationship in the Bridgerton world, and the two are long-married with three children. "It’s nice to know there is evolution to the character, and a whole roundness," Martins Imhangbe, who plays Will, tells BBC Newsbeat. "They’ve done excellent in carving these characters and these lives." Will and Alice (played by Emma Naomi) were first seen as friends of the Duke, then as owners of their own business and in season three they're living on a grand estate after a significant inheritance, becoming a part of high society known as "the ton". "There's something about the working-class hero that people love," says Martins. "About not wanting to be a part of society and being OK with that."

  Bridgerton is set in the world of Regency London high society

  Martins says the Mondrich family go on a "complex journey" navigating their new-found wealth and status. "You see the scepticism and hesitation to be involved in high society, the pros and cons at the same time," he says. "You can see the struggle that it’s not as straightforward as – ‘OK, now we’re rich’ and we’re going to have a great time." Martins says the Mondriches aren't in Julia Quinn's series of Bridgerton novels, and as an actor the roles were "almost a gift". He also says "the complexities of having a bigger plot in the show" mirrored the characters' journeys. "It's almost like they're now the celebrities and don't know how to navigate that," says Martins. "It was similar for us, we didn't know exactly how to navigate our new roles."

  Bridgerton's been praised for the diversity of its cast and storylines, and Martins says representation is an opportunity that comes with a sense of responsibility. "I feel very proud, being able to give that space and shine a light on that narrative," he says. "Because we don't often see it, especially in period dramas - you hardly see a non-toxic, healthy, beautiful black family at the forefront. "It feels like there's a responsibility to tell that narrative, to put in the work and be mindful of all the sensitivities and the nuances." But he says he views it as a positive type of pressure. "I don't see it as a burden," he says. "I don't see it as like I have to be the spokesperson... the face for blackness. "But I do feel a sense of honouring." That’s particularly true, he says, when Martins considers the inspiration for his character, Bill Richmond, a British boxer born into slavery, and thought to be the first black boxing entrepreneur in London. "It fills me with pride to be able to honour these people, because oftentimes, these people are erased from history. I didn't know about Bill Richmond until I got the audition."

  Martins says he didn't know Bridgerton "was going to do what it's done"

  Richmond is widely considered a boxing trailblazer who paved the way for Jack Johnson - the first black world heavyweight champion and an inspiration for Muhammad Ali. "I think it’s important that we do not erase history. And I think Bridgerton makes a strong appeal for that," says Martins. "That's why it resonates with a lot of people because they can see themselves within it and they feel honoured." Martins relates more than you might think to the boxing role, having trained in real life. But modern boxing is very different, he admits, to the Bridgerton time period. "Now people do it because they enjoy the sport and it's a chance to exercise," he says. "But in those days either you used boxing as a way to get out of your financial crisis or to put yourself in a better position for your family." Martins admits the physical side was a challenge too. "I didn't know that you had to hold your hand a particular way. And the moves were a lot more robotic. "I had to adopt that kind of posture, that kind of physicality. But I always try to bring a bit of flair, a bit of enjoyment and charisma."

  If you look online, Martins' name has at points been linked with the prestigious James Bond role. "I'll be thrilled... it's very flattering to be in that conversation," he says. "I do love action films but I guess then you’ve got to do the work [the role demands]." In true covert 007 style though, he doesn’t give much away for what will come in the second part of season three. "You can expect to see some tough decisions being made," he says.

  The second part of Bridgerton's third season will be released on Netflix on 13 June.

