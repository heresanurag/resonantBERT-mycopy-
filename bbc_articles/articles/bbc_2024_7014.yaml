title: 'Trains: Couple marry on London Paddington to Swansea service - BBC News'
date: '2024-03-09'
section: General
url: http://www.bbc.co.uk/news/uk-wales-68517210
content: |-
  Vince Smith and Leah Anderson met on a train and have now exchanged vows on the railway too.

  A couple have tied the knot on a train between London Paddington and Swansea in a romantic tribute to where they met.

  Leah Anderson and Vince Smith had the ceremony and even a wedding breakfast on the Great Western Railway service on Friday.

  It is thought to be the first wedding in the UK to be entirely held on a moving train.
