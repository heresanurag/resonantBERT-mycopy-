content: |-
  One child is among 14 killed after a helicopter carrying top officials to a war "hot spot" crashes.

  'We didn't start the war but we have to end it'

  Zelensky finishes his speech and is straightaway greeted by applause from delegates in Davos. He is now facing questions and is asked about what the war looks like to him on the frontlines right now. "I think the war doesn't look good, which has not been good since the beginning," the president answers in Ukrainian. "How it looks? It looks as follows: we are standing strongly in the east of our country. "It is very important to know that we are strong, not just in the east but also inside the country. "It was not us who started the war but it is us who will have to end it." Zelensky thanks countries for their help since the conflict began but adds that Ukraine still needs help from allies to support air defence systems. He says the world must outpace Russia and adds that Ukraine's defence systems must outpace Russia's missiles.
