title: 'Tim Westwood: BBC warned by Metropolitan Police over report into allegations
  - BBC News'
date: '2024-10-26'
section: Culture
url: http://www.bbc.co.uk/news/articles/c937yrezl7po
content: |-
  The former Radio 1 and 1Xtra DJ has denied claims of misconduct, calling them false.

  BBC warned by Met over report into Westwood allegations

  The Metropolitan Police has warned the BBC that parts of a report about Tim Westwood’s alleged misconduct may “interfere with justice” if published. The external review is to examine the BBC’s knowledge of, and response to, complaints, allegations and concerns about misconduct by the former Radio 1 and 1Xtra DJ. Mr Westwood has denied claims of misconduct, commenting: "It's all false allegations." The BBC declined to comment. In July, a spokesperson for the corporation said it was liaising with police to ensure that any steps taken - including publishing the report - do not have a "negative impact" on any ongoing police investigation.

  "This is taking time," it added. Several women have accused the presenter of predatory and unwanted sexual behaviour and touching, in alleged incidents between 1992 and 2017, after a joint investigation by the BBC and the Guardian. In August 2022, a review, led by Gemma White KC, was commissioned by the BBC to examine the near 20-year employment of Mr Westwood with the broadcaster.

  It was initially believed the review would take around six months but a report is yet to be published. In a new statement to BBC News, a Met Police officer said: “We have seen the report and made recommendations to the BBC as to which sections of the report may interfere with justice if published." BBC News understands the report is now due to be published within the next month. In June, the BBC said: "This is an extremely important ongoing process, led by an independent reviewer. "As we have said from the beginning, it is essential we fully understand what was known about concerns regarding Tim Westwood’s conduct during his time with the BBC and this remains the priority." A freedom of information request by BBC News earlier this year revealed that the BBC has spent more than £3 million on the review so far. It is believed Mr Westwood has been interviewed under caution by the Metropolitan Police four times since the broadcast of the joint BBC News and Guardian investigation. In a statement, police said the offences are alleged to have happened between 1982 and 2016. Detectives said they interviewed a 66-year-old man under caution last year. There has been no arrest.

  The women also accused Mr Westwood of abusing his position in the music industry. Some of them said they encountered Mr Westwood when they were under 18. One said she was only 14 when he first had sex with her. In a video that appeared on social media last year, the DJ was asked whether the allegations were true. He replied: "It's all false allegations. It's all false allegations. "I've never done that, period. They're all false allegations. I will prove that as soon as I get my opportunity and trust me, I am ready." In April 2022, Mr Westwood stepped down from his Capital Xtra show. The 66-year-old has continued to play in gigs up and down the country, despite some campaigners calling for nightclubs not to host him since the allegations emerged. The Mail Online reported that he had moved to Lagos, Nigeria, for the first half of this year.
