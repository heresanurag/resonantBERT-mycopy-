title: 'Petra Srncova: Body found is missing hospital worker - BBC News'
date: '2021-12-13'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-59631639
content: |-
  Police say initial inquiries into Petra Srncova's death suggest it is not suspicious.

  Petra Srncova's family has been informed, police say

  The Czech foreign minister has confirmed that a body found in a park in south-east London is that of Petra Srncova - a nursing assistant who was last seen two weeks ago.

  The 32-year-old from Camberwell was last seen taking a bus on 28 November.

  The Metropolitan Police confirmed a body had been found in Brunswick Park on Sunday morning.

  "Initial inquiries suggest the circumstances are not suspicious," the force said.

  Czech Foreign Minister Jakub Kulhanek said the Met had informed the Czech Embassy the body belonged to Ms Srncova, who disappeared on the way to her home.

  A Met spokesperson said the body was found by a member of the public and a post-mortem has yet to take place.

  They added: "Her death is being treated as unexplained but initial inquiries suggest the circumstances are not suspicious."

  Her family has been informed.

  The senior nursing assistant was last seen at around 20:22 GMT on 28 November in the Camberwell area after taking two buses from her place of work at Evelina London Children's Hospital.

  She was reported missing by a concerned colleague on 3 December.

  Her disappearance had prompted appeals for information that were supported by Camberwell MP Harriet Harman.

  A man who was arrested last week has been released on bail pending further inquiries.

