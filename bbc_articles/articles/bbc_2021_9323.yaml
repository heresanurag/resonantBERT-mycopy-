title: 'As it happened: Hundreds missing in Germany floods - BBC News'
date: '2021-07-16'
section: Europe
url: http://www.bbc.co.uk/news/live/world-europe-57860153
content: |-
  Emergency workers search for the missing in the wake of floods that have killed at least 120 people.

  These men are seen carrying cat boxes in Pepinster, Belgium Image caption: These men are seen carrying cat boxes in Pepinster, Belgium

  While the main focus has been on helping those in danger, many people have also been seen rescuing their pets and other animals from the devastation.

  German Uwe Gödecke told Deutsche Welle that he was able to flee out of his kitchen window with his wife and their dog Kuno, before being rescued by a German Red Cross motor boat.

  This man managed to carry his dog to safety in Ensival, Belgium Image caption: This man managed to carry his dog to safety in Ensival, Belgium

  But these two dogs in a house in Trooz in Belgium were still waiting to be rescued... Image caption: But these two dogs in a house in Trooz in Belgium were still waiting to be rescued...

  Meanwhile, two women were seen trying to get their animals out of an evacuation zone in the Netherlands where a burst dyke has prompted fears of rising floodwater.
