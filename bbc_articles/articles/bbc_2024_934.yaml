title: Man dies in shooting outside Granton pub on Hogmanay - BBC News
date: '2024-01-02'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-67856748
content: |-
  Another man is in hospital after what police described as a targeted attack at the Edinburgh bar.

  Police sealed off an area outside the Anchor Inn following the incident

  A 38-year-old man has died after a shooting outside an Edinburgh pub before the New Year bells.

  Police were called to reports of two men being seriously injured at the Anchor Inn on West Granton Road at about 23:50 on Sunday.

  The 38-year-old was pronounced dead a short time later, while a 39-year-old man is in hospital in a serious but stable condition.

  Police Scotland said it was treating the attack as murder.

  Det Supt Graham Grant said: "Our thoughts and condolences are with the family and friends of both men involved.

  "Inquiries are at a very early stage to establish the full circumstances surrounding what happened, and while officers have already gathered CCTV and spoken to various people who were in the area at the time, I'd urge anyone with information who hasn't yet spoken to us to come forward.

  "In particular if anyone has private CCTV, doorbell footage or dashcam of the Granton Crescent/Road area around the time of the incident, please bring it to our attention."

  Supt Grant added: "This incident will undoubtedly have caused concern in the local community and officers will be carrying out extra patrols of the area and I'd like to reassure the public that everything possible is being done to trace whoever is responsible."

