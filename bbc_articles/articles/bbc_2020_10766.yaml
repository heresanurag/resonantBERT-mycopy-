title: Chancellor Rishi Sunak announces new Job Support Scheme - BBC News
date: '2020-09-24'
section: General
url: http://www.bbc.co.uk/news/uk-54279371
content: |-
  The UK chancellor said the Job Support Scheme would start in November and last for six months.

  Chancellor Rishi Sunak has announced a new Job Support Scheme to start in November.

  The six-month scheme will replace furlough and means the government will pay part of workers' wages who have lost hours.

  The chancellor also said he was extending help for the self-employed on "similar terms" to the existing job support scheme.
