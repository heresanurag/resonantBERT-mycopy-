title: 'Ukraine crisis: MPs applaud Ukrainian ambassador in UK Parliament - BBC News'
date: '2022-03-03'
section: General
url: http://www.bbc.co.uk/news/uk-politics-60586758
content: |-
  Watch as politicians stand and clap for Vadym Prystaiko, who was attending Prime Minister's Questions.

  Watch the moment that MPs stood and applauded in the House of Commons for the Ukrainian ambassador, who was watching Prime Minister's Questions from the gallery.

  Speakers of the Commons have usually frowned on MPs who clap in the chamber, but Lindsay Hoyle smiled at the tribute to Vadym Prystaiko.

  Several MPs wore yellow and blue ribbons, the colours of the Ukrainian flag.

