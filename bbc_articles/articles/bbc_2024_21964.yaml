content: |-
  Why Am I So Single?, a look at modern dating, hits the West End stage.

  Why Am I So Single? is the subject of a new West End musical and a question perhaps many people will have asked themselves over the years.

  The production, a look at modern dating, has been created by the duo who who came up with Six The Musical, the all-singing and dancing story of the wives of Henry VIII that became a smash hit around the world.

