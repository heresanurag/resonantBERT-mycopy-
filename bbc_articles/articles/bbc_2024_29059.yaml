title: 'Darts: Luke Humphries beats Luke Littler to win Players Championship final
  - BBC Sport'
date: '2024-11-25'
section: Darts
url: http://www.bbc.co.uk/sport/darts/articles/cvgx0jpj04jo
content: |-
  World number one Luke Humphries defended his Players Championship title with an 11-7 win over teenager Luke Littler in Minehead.

  World number one Luke Humphries retained the Players Championship title with an 11-7 win over teenager Luke Littler in Minehead. Humphries, who beat Littler to win the world title in January, averaged 103.69 and punched the air with delight as he came out on top again. The 29-year-old, who has also won the World Matchplay this year, is only the second player after Michael van Gerwen to defend the Players title. It was a third big final involving the pair after Littler beat Humphries to land the Premier League in May. Littler was seeking his 11th title in an extraordinary debut season as a professional and second major TV ranking triumph this month after claiming the Grand Slam trophy a week ago. Backed by a boisterous crowd, the 17-year-old was fancied to get the better of Humphries, who had not looked at quite his brilliant best during the tournament in Somerset but stepped up a level in the final. "I'm really proud of that one because I didn't feel myself this week playing-wise," said Humphries, who repeatedly lifted the trophy to the crowd as confetti rained down on him. "There's something Luke does to you, he really drives me and makes me want to be a better player. I enjoy playing him." Humphries had to recover from 6-2 down to beat Dirk van Duijvenbode 11-8 in the semi-finals after earlier seeing off Ryan Joyce 10-5. "I was very fortunate against Dirk but I rode my luck, got into the final and I was in my comfort zone," he added. "These big games are what I live for, what I dream of, being a major champion is what I do it all for. "If you go by stats Luke is easily the best player in the world, but there's something about me that never gives up. "He's made me a bit hungrier, to practice more, to try a bit harder because if no-one sticks with him, he's going to win everything. I do believe we are the two best players in the world."

  The match was played in a warm spirit with Humphries congratulating Littler after big checkouts

  Humphries opened up a 5-1 lead in a scrappy start to the final before Littler burst into life. A double double 20 finish and checkouts of 170 and 164 reduced the deficit to one, but the defending champion kept his composure - despite pulling away from the oche at one stage after wistling from the crowd - to seal victory. "It was tough, I missed a few doubles," said Littler. "If you don't take chances early on, it takes a lot to come back. I didn't have enough in the end." He hit three bull finishes as he beat World Grand Prix champion Mike de Decker 10-3 earlier on Sunday, before edging out Ross Smith 11-9 in a topsy-turvy last-four encounter. Humphries pocketed £120,000 for his tournament victory, while Littler – who has now won more than £1m in prize money this year – collected £60,000, taking his earnings to £618,500 for the Order of Merit, which is calculated over a two-year period. He has picked up £395,000 in winning the Premier League of Darts and World Series finals but, as those are invitational events, they do not count towards the rankings. Littler still goes into Monday's draw (16:30 GMT) as the bookmakers' favourite for the world championship, which starts on 15 December. A year ago he was ranked 164 and won the PDC world youth title on the Minehead stage with victory over Gian van Veen. This time Van Veen, 22, became the first Dutchman to lift the youth trophy after a dramatic 6-5 victory over his compatriot Jurjen van der Velde. Van der Velde, 21, was in tears after he missed five match darts.
