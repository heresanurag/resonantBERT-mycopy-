title: 'Shane Frane: Policewoman''s killer extradited to finish sentence - BBC News'
date: '2024-08-20'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cr7r9dvn4zdo
content: |-
  Shane Frane killed PC Philippa Reynolds in Derry in 2013 when a stolen car crashed into a police car.

  Shane Frane, pictured at a court appearance in 2013, had been on-the-run since January 2024

  A man who killed a policewoman in Londonderry more than 11 years ago has been extradited from the Republic of Ireland to complete his sentence. Shane Frane admitted the manslaughter of Const Philippa Reynolds following a fatal car crash in Derry in February 2013. He was jailed for at least six years in 2014 but had been on the run since January after breaching the conditions of a temporary release from jail. Frane was arrested in the Republic of Ireland on 1 February 2024 and extradited to Northern Ireland on Tuesday.

  Philippa Reynolds was on routine patrol in an unmarked police car when it was struck by a stolen vehicle

  He has been remanded in custody until 16 September following an appearance before Lisburn Magistrates' Court. The 36-year-old, who is originally from Limerick in the Republic of Ireland, was the driver of a stolen car which crashed into a police car, killing Const Reynolds. Sergeant Davey from the international policing unit of the Police Service of Northern Ireland (PSNI) said they would continue to work closely with authorities in the Republic of Ireland to return fugitives to Northern Ireland. He said they appreciated the "continued and effective assistance" of Irish police in arresting and returning Frane. “Our message is clear to anyone who has left Northern Ireland to avoid the consequences of their actions: we will use all powers available to have you arrested and returned to Northern Ireland," he said.
