content: |-
  Donald Trump's youngest son made a rare appearance at one of his father's campaign events in Florida.

  Donald Trump's youngest son, Barron Trump, made a rare appearance at one of his father's campaign rallies in Florida on Tuesday. The youngest Trump did not speak at the event but did wave at the crowd as he received a standing ovation.
