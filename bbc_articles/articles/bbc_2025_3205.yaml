title: Chaos and unproven theories surround Tate brothers' release from Romania -
  BBC News
date: '2025-03-01'
section: Europe
url: http://www.bbc.co.uk/news/articles/c99np092vk1o
content: |-
  The abrupt departure of the Tate brothers by private jet has left a fresh trail of confusion and unanswered questions in its wake.

  Were Tate brothers released in secret deal - or is the truth far more chaotic?

  Andrew Tate is accused of human trafficking and sexually exploiting women alongside his brother Tristan

  These were already turbulent times in Romania. But as people here navigate the late winter ice and slush on Bucharest's elegant streets, the abrupt departure of the Tate brothers by private jet has left a fresh trail of confusion and unanswered questions in its wake. A country grappling with a cancelled presidential election, its future in Europe, its support for neighbouring Ukraine, widespread corruption, and collapsing faith in public institutions, is now left pondering why two controversial foreigners, facing a raft of complex but serious criminal charges, have been treated with such apparent lenience; their confiscated assets and their passports suddenly returned to them. Was a secret deal done between Romania's government and the Trump administration? If so, in these increasingly transactional times, what does Romania get in return? Or was this more like a pre-emptive gesture of good will towards the American president, a gift to lay at Donald Trump's imperious feet? Or are we searching for conspiracies when the truth is probably far more chaotic?

  As foreign leaders – from Volodymyr Zelensky to Sir Keir Starmer – travel to Washington DC bearing deals and other apparent peace offerings, one might ask who could blame Romania, a staunch NATO ally navigating a host of internal and external challenges, for trying to keep an increasingly unpredictable US administration on side? "It's a matter of life (or death) for Romania," said security analyst George Scutaru, describing his country's need to shore up Western support in the face of growing pressure from the Kremlin. Declining to comment on the Tate issue specifically, Scutaru said it was clear Moscow was seeking to undermine Romania's democracy and that the government had good reason to seek ways to remind the Trump administration of the many advantages – commercial, diplomatic, and military – of continuing to back it. But if the Tate brothers are part of that equation, it is already clear that many Romanians are not impressed. This is a country already facing a strong populist backlash against an elite ruling class that is widely seen as corrupt and out of touch with the struggles of ordinary people who feel treated as second-class citizens – a mere source of cheap labour - within the European Union. So, the sight of the Tates appearing to receive special treatment plays into the notion that Romania's institutions are hollow and cater only to those with money.

  The brothers were released from house arrest by a Romanian court in January

  "For me, what has happened is unacceptable. We cannot allow Romania's image to be tarnished by impunity and defiance," fumed Elena Lasconi, a prominent presidential candidate here, expressing deep concern that Romanian prosecutors' sudden decision to relax the Tates' travel restrictions was the result of "external influence." "It's my personal perception that probably there is... pressure on the Romanian political system, as logically the prosecutor would have applied very strict rules to control (the Tates) and probably the United States would have been a place where they would be allowed to travel (due to concerns they would not be extradited if they failed to return)," said international human rights lawyer, Silvia Tabusca. It is beyond doubt that Andrew Tate's lucrative brand of assertive masculinity has earned him allies in President Trump's administration. One of his former lawyers, Paul Ingrassia, now works in the White House. Many in the so-called "manosphere" see Tate as a persecuted hero who has just been rescued from Romania's corrupt clutches. There is also a more nebulous far-right alignment between some pro-Trump and pro-Tate figures in the US, far-right and allegedly pro-Russian forces in Romania, and the Kremlin itself, which stands accused of plotting to weaken Bucharest's pro-western stance. But the picture is not clear cut.

  Trump denies being involved in the case

  President Trump distanced himself from the brothers' case on Thursday and there are signs of a broader push-back in the US, with the governor of Florida Ron DeSantis making it clear the Tates are "not welcome" in his state, amid plans to open a "preliminary inquiry" into allegations against them of human trafficking and violence against women. Meanwhile in Bucharest, the theory that Romania's government cut a deal with the US to release the brothers is treated with caution by some analysts. "I think the chances (of such a deal) are fifty-fifty," said Sorin Ionita, a political commentator, questioning the ability of Romania's various institutions and ministries to arrange a "coherent" policy concerning the Tates. "I'm not sure they coordinate. Did they manage to demand something in exchange (from the US)? I'm not sure," said Ionita, bemoaning a situation almost designed to persuade Romania's public to lose faith in state institutions, and speculating that lower level "satellite" figures in an equally chaotic Trump administration were probably behind any deal in order "to extract money from the Tate brothers." The BBC has seen no evidence of this. "It's very depressing to see," he added. As for the question of whether the Tates will return to Romania, as their lawyer has promised, to continue their legal battles, a degree of uncertainty endures.

