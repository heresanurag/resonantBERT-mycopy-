  The fact that most of their assets have been unfrozen could be seen as weakening the Romanian authorities' ability to compel them to come back. The Tates themselves have also questioned whether they can receive a fair trial in Romania, complaining of a "conspiracy" against them. And while Andrew Tate pointed out on Thursday that he and his brother currently face "no active indictment" in Romania, a more accurate way of describing their situation might be to say there is currently a lull in a long and complex legal process. An initial case has been returned to prosecutors for amendments, while a second and more substantial prosecution case against them is now pending. "In the second case, we have 34 victims that cooperate and have been identified as victims. Among them are two minors, one a 17-year-old girl that has been recruited in order to be exploited by the criminal group. And the second girl is 15-years-old, and there is a crime for sexual acts with a minor in which they are also involved," said the lawyer, Silvia Tabusca, outlining the allegations in the second case. The brothers also face arrest on separate and unrelated criminal charges in the UK. The Tates deny any wrongdoing in all these cases. In the coming months, Romania faces far more pressing challenges than the fate of two foreign celebrities. Presidential elections have been rescheduled for May and a leading candidate – often accused of being a Kremlin puppet - has just been detained and is facing six criminal charges including fascism and undermining the constitutional order. With their self-declared misogyny, extreme views, and online personas, Andrew and Tristan Tate do chime with some of the themes preoccupying and dividing society in America and far beyond. Clearly, they remain influential figures, particularly among boys and young men. But the brothers face years of legal battles which may well push them, and their still lucrative brand, further to the periphery of the far larger dramas now reshaping our world.
