id: bbc_2024_23257
title: 'Newspaper headlines: Johnson''s ''pep talk'' with Harry and Treasury rethinks
  non-dom plan - BBC News'
date: '2024-09-26'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cvg3n49l719o
content: |-
  Making a number of Friday's front pages is Boris Johnson's memoir, Unleashed, published next month.

  Stories concerning the forthcoming Budget feature prominently. The Financial Times, external and the Daily Telegraph, external highlight suggestions that the government could soften its stance on abolishing the non-dom tax status. Both papers quote former chancellor Jeremy Hunt as saying Labour "fail to understand the importance of globally competitive tax rates". Officials tell the Telegraph that the Treasury is "committed" to "removing the outdated non-dom tax regime".

  The Times, external says ministers could get tens of billions of pounds extra to invest in the economy by "tweaking" rules on borrowing. Sources say officials have been asked to draw up options to "offset" assets - such as the money owed in student loans - against the wider national debt. But the i reports that some economists are warning against the change. They say the measure could keep interest rates higher for longer.

  The front page of the Guardian, external pictures a road filled with cars carrying people fleeing Lebanon, as the conflict between Israel and Hezbollah intensifies. "Netanyahu says Lebanon strikes will go on, despite ceasefire call" is the headline. The paper's editorial calls on the US to make military aid to Israel conditional on a hostage and ceasefire deal in Gaza. The article says Hezbollah has insisted such an agreement is necessary for it to back down.

  "How did he escape justice?" is the headline on the Daily Mirror, external's front page, alongside a picture of Mohamed Al-Fayed. The paper says one of his alleged victims has demanded an investigation into the conduct of the Metropolitan Police. The article says 19 women made abuse claims against the businessman while he was still alive. Scotland Yard is quoted as saying that it's carrying out a "full review of all existing allegations".

  The Daily Mail, external leads on revelations made in Boris Johnson's forthcoming memoir. The paper says Palace and government officials asked Johnson to talk the Duke of Sussex out of leaving the UK. The former prime minister describes the discussion, which took place in early 2020, as a "manly pep talk".

  The Sun, external says stars of ITV's I'm a Celebrity Get Me Out of Here will be allowed to use weight loss jabs. It says Ozempic, which is also used to treat diabetes, will be given to contestants with a prescription. A source is quoted as saying people on medication go to "ITV's off-camera medical team as often as they need" and that it will be "no different" with Ozempic. The source said: "It's not for ITV to pass judgement".

  The inside pages of the Daily Express feature pictures of Sir Winston Churchill living it up on a luxury yacht. The photos of Sir Winston, who was about 30 at the time, were found in a box of maritime memorabilia bought at auction. The boat's owner, Gilbert A Tonge, is said to have often invited the rich and famous on board. The paper finds a modern parallel. Under the headline "Winston enjoys MP's perk long before Keir", the article says politicians were "enjoying" benefits more than a hundred years before the "current scandal engulfing Sir Keir and other Labour bigwigs."
