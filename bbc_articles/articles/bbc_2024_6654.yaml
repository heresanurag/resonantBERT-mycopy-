title: 'LIV Golf: League withdraws world ranking bid as Jon Rahm criticises system
  - BBC Sport'
date: '2024-03-06'
section: Golf
url: http://www.bbc.co.uk/sport/golf/68479599
content: |-
  Masters champion Jon Rahm says Official World Golf Ranking is not "a good system" after LIV Golf withdraws its application to join.

  Jon Rahm became one of the most high-profile names to join LIV Golf when he did so in December 2023

  Masters champion Jon Rahm said the Official World Golf Ranking (OWGR) is not "a good system" after LIV Golf withdrew its application to join. A letter from the league's CEO Greg Norman told players it will not pursue its bid for world ranking points. "It's now clear that the best way forward for LIV as a league and LIV golfers is not through the current ranking system," Norman said. The Saudi-backed league was denied OWGR accreditation in October. Two-time major winner and world number three Rahm is among the players to have switched from the PGA Tour to LIV Golf. "I'm going to go back to what I said two years ago. I didn't think it [OWGR] was a good system back then," said Spaniard Rahm, speaking before the LIV Golf Hong Kong, which begins on Friday. "If anything, the more time goes on, the more it proves to be wrong," the 29-year-old added. When LIV Golf originally applied in July 2022 - a month after its formation - the OWGR raised concerns about the new league's format. It features the same 54 players all season who play 54-hole, shotgun start, no-cut events. Norman's letter to LIV's players, which has been seen by BBC Sport, said: "A resolution which protects the accuracy, credibility and integrity of the OWGR rankings no longer exists. "The OWGR has shown little willingness to productively work with us."

