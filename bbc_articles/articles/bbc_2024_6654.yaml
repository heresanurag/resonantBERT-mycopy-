  LIV players will only be able to improve their world ranking, which is one of the factors used to determine eligibility for major championships, through DP World Tour events, the Asian Tour or other satellite tours. With LIV Golf players getting no points from the circuit's events, many of the big names that left the US PGA Tour have slipped down the rankings, with Rahm one of just four LIV players who currently feature in the OWGR's top 50. Fellow major champion Bryson DeChambeau said it was up to those in charge of the game to find a "collective way" to rectify the issue. "We should focus on having the best players in the majors," said the American. "All the governing bodies, everybody, come together, sit down and figure this out. Because we need to do this for the fans." LIV and PGA Tour players compete against each other at majors, with many LIV players earning their way into the tournaments based on previous achievements. The majors can make exceptions and issue their own invitations, as has been done this year with Chilean Joaquin Niemann, who has been given special invitations for next month's US Masters and the US PGA Championship in May. "Now they've given one player a chance before you know it there will be a solution," said Rahm. "I think it's opening the door slightly. "If anybody in this world doesn't think 'Joaco' [Niemann] deserves to be in the top 10 or doesn't know that he's a top player in the world, I don't know what game you're watching." Meanwhile, British Open officials have made no concessions to LIV Golf, making it increasingly difficult to qualify for the tournament through the world ranking points route. Former major winners Rahm, Cameron Smith, Dustin Johnson, Brooks Koepka, DeChambeau and Phil Mickelson already have places for this year's British Open at Royal Troon in July. DeChambeau said players should be invited to the majors based on their performance in the previous year. "They do it with [the PGA] Tour Championship, right? Very simple," he said. Negotiations around a merger are still in progress between the PGA Tour and Saudi Arabia's Public Investment Fund, which funds LIV Golf.
