content: |-
  Italy's Lamont Marcell Jacobs claims a shock gold in the Olympic 100m final, after Great Britain's Zharnel Hughes is disqualified for a false start.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Italy's Lamont Marcell Jacobs claimed a shock gold in the Olympic 100m final, after Great Britain's Zharnel Hughes was disqualified for a false start. Jacobs, who only switched away from long jump in 2018, streaked clear to win in 9.80 seconds, 0.04 clear of American Fred Kerley. Canada's Andre de Grasse won a second successive Olympic bronze in third. World champion Christian Coleman and Trayvon Bromell, the world's fastest in 2021, were both absent from the final. Coleman, banned for whereabouts failures after missing three drugs tests, and Bromell, eliminated in the semi-finals, were joined on the sidelines by the long-retired defending champion Usain Bolt. Few would have picked Jacobs, who was born in Texas to an American father but moved to his mother's Italian homeland before his first birthday, as the Jamaican great's successor. Jacobs only broke the 10-second barrier for the first time in May. But the European indoor 60m champion carried the momentum from his fast start all the way to the line to register a time faster than Bolt's winning mark in Rio. He was greeted by compatriot Gianmarco Tamberi, who had won a joint high-jump gold just minutes before and wrapped him in the Italian flag and an embrace. "I don't know, it's a dream, a dream, it is fantastic," said Jacobs. "Maybe tomorrow I can imagine what they are saying, but today it is incredible." Second-placed Kerley admitted Jacobs was a new name to him. "I really didn't know anything about him. It was my first time racing him at the Monaco Diamond League [where Jacobs finished third in 9.99 seconds]," he said. "He did a fantastic job." Hughes will be left to wonder what might have been in a final stripped of its usual stars and big names. His clear false start brought back memories of defending champion Linford Christie's disqualification at Atlanta 1996 and denied him a shot of joining the most prestigious honour roll in athletics. Hughes, who made the same mistake at last month's British Championships, said it was the result of a sudden cramp in his calf.

  This video can not be played To play this video you need to enable JavaScript in your browser. Tokyo Olympics: Rojas sets new world record after becoming triple jump Olympic champion

  The 100m final was almost overshadowed by an undercard of superb field events. Venezuela's Yulimar Rojas added Olympic gold to her world triple-jump titles, finally claiming the world record she has threatened all season. The 25-year-old already had victory wrapped up when she approached her final attempt, with no-one able to get close to her opening-round leap of 15.41m. Despite a sub-par step phase, she still soared out to 15.67m to beat the previous 15.50m world record set two months before her birth by Inessa Kravets of Ukraine. "Wow. It is a fantastic night," said Rojas. "I knew we had that distance in my legs to get it today. I was failing a bit in the technical aspect, but the last jump was one to give everything, and it was like that." Portugal's Patricia Mamona took silver with a personal best 15.01m, but Colombian defending champion Caterine Ibarguen could only finish 10th. There was drama of a different kind in the men's high jump. Qatar's double world champion Mutaz Essa Barshim and Italy's Tamberi opted to share gold rather than take part in a jump-off. Both had three failures as they attempted to match the Olympic record of 2.39m and, with error-free records on countback, they could have fought for sole possession of the title. However, the friends, external decided to end the contest and split the title, sparking ecstatic celebrations from Tamberi who has competed with a plaster cast at the end of his run-up as a souvenir of an Achilles injury that ruled him out of Rio 2016 and almost ended his career.

  Daniel Rowden missed out on a spot in the 800m final by five thousandths of a second

  Sisters Tiffany Porter and Cindy Sember were unable to make Tuesday's 100m hurdles final for Great Britain. Puerto Rico's Jasmine Camacho-Quinn threw down the gauntlet to the rest of the field as she qualified in a new Olympic record of 12.26, just 0.06secs outside the world record of American rival Kendra Harrison, who also progressed. Neither Daniel Rowden or Elliot Giles could make Wednesday's 800m final, with Rowden missing out on a fastest loser spot by just five thousandths of a second after getting boxed in around the final bend. "I'm very disappointed," said Rowden. "I went for a gap coming into the home straight and the gap closed as soon as I went through it, I lost my stride and that was it. "In 800m running, if there's no space, it probably means that you've put yourself in the wrong position and it's disappointing because I knew my potential was to win a medal and it's disappointing that I couldn't make that a reality." Nijel Amos, London 2012 silver medallist and the fastest man in the world this year, briefly appeared to have been eliminated after falling in his semi-final. However the meeting referee judged that he had been impeded by American Isaiah Jewett, who also fell, and advanced the Botswanan to the final, expanding the field to nine athletes. Jazmin Sawyers and Abigail Irozuru both made the long jump final during the morning session.

