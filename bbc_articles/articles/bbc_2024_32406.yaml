title: Exasperation over misspelt road repainting in Cirencester - BBC News
date: '2024-12-06'
section: Gloucestershire
url: http://www.bbc.co.uk/news/articles/c4g3mzlp022o
content: |-
  A newly-patched stretch of road near a school now reads "Ceep Klear".

  Newly repainted road markings reading "Ceep Klear" near a school have caused dismay among residents. The misspelling appeared on a re-patched section of Watermoor Road in Cirencester, Gloucestershire. Pictures of the sign, near Paternoster School, attracted hundreds of comments on social media, with locals complaining the error was part of a wider problem with the town's roads. Paul Skuse, who runs a Cirencester group on Facebook, posted: "Another top quality repair carried out."

  One group member said: "Must be a joke. No one can be that bad at spelling!" Another complained that poor repairs were making the town's roads and pavements dangerous for push chairs and wheelchair users.

  One man remarked: "[The] 'repair' won't last long enough for anyone else to notice." Joe Harris, the Liberal Democrat leader of Cotswold District Council, said the mistake was proof "the management of the roads in this county simply isn't good enough". Wales & West Utilities, which carried out the work, has been approached for comment.

