id: bbc_2025_7875
title: Ben Stokes would be taking on too much as England white-ball captain, says
  Michael Vaughan - BBC Sport
date: '2025-04-04'
section: Cricket
url: http://www.bbc.co.uk/sport/cricket/articles/c985d82nnejo
content: |-
  Ben Stokes has been England Test captain since 2022

  Michael Vaughan believes it would be "nonsense" and "selfish" for England to make Ben Stokes a white-ball captain. Test skipper Stokes is under consideration for at least one of the limited-overs roles after Jos Buttler stepped down in February. The Telegraph has reported that Harry Brook is set to become T20 captain, leaving a choice between Brook and Stokes for the 50-over job. BBC Sport understands no final decisions have been made. Stokes has a chequered injury history - he is currently recovering from hamstring surgery - and has not played white-ball cricket for England since 2023. Any return to the limited-overs format would be an increase in workload in a defining year for the 33-year-old's Test captaincy, with a home series against India followed by the Ashes in Australia. Vaughan, himself a former England captain, said: "It's absolute nonsense to think that Ben Stokes is going to play white-ball cricket. "He gives absolutely everything, not just when he's playing for England but when he's training. He is all or nothing. "In a way, I think it's quite selfish to even consider him, because he will say yes, because he is Ben Stokes. He will do whatever England ask him to do. Just don't ask him, just let him be." Stokes has energised England's Test team since taking charge in 2022. In the aftermath of Buttler's resignation, England director of cricket Rob Key said it would be "stupid" not to consider Stokes for a white-ball job. Should Stokes take on one or both white-ball roles, it would also further align him with head coach Brendon McCullum, who added the limited-overs sides to his Test responsibilities at the beginning of this year. Stokes is the best leader England have and his white-ball pedigree includes match-winning performances in the finals of the 2019 50-over World Cup and 2022 T20 World Cup.

  But the coming months will shape his legacy as Test captain, and England's hopes of regaining the Ashes in Australia would be almost destroyed if they were to lose Stokes. Any further burden on his body would be a huge gamble. "Let him get the Ashes urn in his hands," said Vaughan, who was speaking as part of Test Match Special's delivery of the Cowdrey Lecture at Lord's. "It's not just about this India series or the Ashes series, I want to see him leading the home Ashes in 2027, I want him to get England to a World Test Championship final. "Why put the burden on him to play white-ball cricket? It's not about putting pressure on him because he deals with pressure better than anybody, but just let him look after his body and get him playing Test cricket for as long as possible." Though Key has said England will consider all options, it is thought that Stokes and current white-ball vice-captain Brook remain the only two candidates. Although batter Brook captained England in five one-day internationals against Australia last year, giving further responsibility to the 26-year-old would also come with risk. He is still establishing himself in England's white-ball sides and is also a key member of the Test team, so his workload would be a concern. Furthermore, he would have to demonstrate the maturity to be England captain. Occasionally prone to a clumsy comment in the media, Brook last year was criticised for saying "who cares?" when asked about some of England's dismissals in an ODI defeat by Australia. The England captain is often required to discuss complex situations, just as Buttler did when addressing the controversy surrounding the fixture against Afghanistan at the Champions Trophy. England could face Afghanistan again at the T20 World Cup early next year. But Vaughan said if England consider Brook to be ready to be T20 captain, then he is also ready for the 50-over job. "Harry Brook will be the T20 captain, I think that's being announced soon and that's what we're expecting," said Vaughan. "So the next T20 World Cup is in a year - if you're saying that Harry Brook is good enough to be the captain in that format with that tournament coming so soon, surely he's good enough to be 50-over captain for that World Cup in 2027?" Vaughan, England captain for the epic 2005 Ashes victory, was joined by fellow TMS regulars Jonathan Agnew, Phil Tufnell and Ebony Rainford-Brent for the Cowdrey Lecture. The lecture, named after former England captain Colin Cowdrey, is delivered at Lord's each year.
