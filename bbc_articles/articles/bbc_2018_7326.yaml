title: '''Political earthquake'' sees Spain''s PM ousted from office - BBC News'
date: '2018-06-01'
section: General
url: http://www.bbc.co.uk/news/world-europe-44330370
content: |-
  Spain's Minister Mariano Rajoy has been forced from office after a no-confidence vote.

  Spain's Prime Minister Mariano Rajoy has been forced from office after a no-confidence vote.

  The BBC's Gavin Lee said his departure followed a "political earthquake" after his party was implicated in a major corruption scandal.
