content: |-
  New evidence on the Lucy Letby case from a panel of experts leads many of the papers.

  'Baby killer or victim?' and victim's mother hits out

  Scientists say there may be some truth to the phrase "things will feel better in the morning", some papers say

  The Lucy Letby case is the lead on most of the front pages. "Baby killer ... or victim?" is the question posed by the Daily Mirror. It says a "bombshell new dossier" has been put forward by medical experts, external on behalf of the jailed nurse. The Daily Telegraph says there are growing calls for a retrial, external after an "unprecedented intervention into the conviction of a serial killer" by 14 world-leading specialists. The Daily Express says the former nurse has been given "hope" that she will be freed, external from prison. But the Daily Mail features an interview with a "distraught mother", saying she has hit back at the "upsetting" and "disrespectful" attempts, external to free Letby. The mother of a baby boy - whom Letby was convicted of attempting to murder - tells the paper that Tuesday's news conference was a "publicity stunt". "NHS allowed Nottingham killer to skip medication" is the headline on the front of the Times. It leads on the independent review into the treatment of Valdo Calocane - who has paranoid schizophrenia - before he stabbed to death three people. The paper says Calocane was described as "personable and kind", external by mental health workers, before he was discharged despite a history of violence and a refusal to take medication.

  According to the Financial Times, China is seeking "ammunition" for talks on tariffs with President Trump - by reviving anti-trust investigations, external into the American Big Tech companies, Google and Nvidia. Beijing is also considering a new probe against Intel, as it looks for leverage with Trump, according to the paper. The FT says US tech companies are being caught in the crossfire of growing tensions between China and the US. Finally, you have no doubt been told at some point that "things will feel better in the morning". Now scientists say there may be some truth to that, according to the papers. A large study by University College London has found that people are generally at their best in the morning, external because the hormone cortisol - which regulates mood and motivation - peaks shortly after waking. "Rise and shine, it's the happiest time of the day," declares the Telegraph.

