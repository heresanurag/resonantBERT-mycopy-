title: 'Brit Awards: Jack Saunders and Yinka Bokinni to host red carpet show - BBC
  News'
date: '2024-02-15'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-68304049
content: |-
  Jack Saunders and Yinka Bokinni have been announced as red carpet hosts for the awards ceremony.

  Jack Saunders hosts the Official Chart Show on Radio 1 every Friday

  Jack Saunders and Yinka Bokinni have been confirmed as hosts of the Brit Awards red carpet show in March.

  Jack, who presents the Radio 1's Official Chart Show, says working the Brits "has been a lifelong dream".

  Clara Amfo, Maya Jama and Roman Kemp will host the main ceremony while Jack and Yinka catch up with artists as they arrive.

  Nominees for the awards were announced last month with Raye receiving a record-breaking seven nominations.

  "I can't wait to rock the red carpet with Yinka and bring a bit of fun and chaos to the night," Jack says.

  Yinka, who presented Capital Xtra's Breakfast Show for three years and hosted Radio 1's Early Breakfast Show over the summer, describes it as "an honour" and "a dream" to be reporting from the red carpet.

  "I honestly can't wait to catch up with the nominees and to be part of such an iconic evening celebrating the world's biggest talent," she says.

  Yinka Bokinni has previously presented the Mobo Awards and Capital Xtra's Breakfast Show

  Organisers have also announced two more performances from Jungle and Rema.

  Afrobeats singer and rapper Rema is nominated for the international song of the year award for Calm Down and says he is "honoured" to be returning to the event.

  British electronic music project Jungle has a nomination for group of the year and say they're "really excited to be part of such an amazing showcase for British music".

  Jack and Yinka will interview stars on the red carpet from 19:30 on ITV2 as part of the build up to the ceremony.

  They'll also host the Aftershow on ITVX with backstage interviews with award winners.

  The annual show will be broadcast from London's O2 Arena on 2 March and feature performances from Kylie Minogue, Raye and Dua Lipa.

