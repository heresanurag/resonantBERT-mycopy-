title: 'Emma Atkinson: Tributes for mum killed in Leeds tower block fall - BBC News'
date: '2024-10-23'
section: West Yorkshire
url: http://www.bbc.co.uk/news/articles/c1dp74g65q2o
content: |-
  Ms Atkinson's unborn baby was delivered in hospital and is receiving "critical care".

  Tributes have been paid to Emma Atkinson following her death on Tuesday morning

  Tributes have been paid to a "bubbly" mum who died after falling from a tower block in Leeds. The victim, who has been named locally as Emma Atkinson, died at Shakespeare Towers, in the Burmantofts area, on Tuesday morning. Ms Atkinson, who was in her 30s, was in the "late stage of pregnancy" and her baby was delivered in hospital after the fall. West Yorkshire Police said the baby had been receiving "critical care".

  Following the news of her death, Ms Atkinson's friends and family shared tributes on social media. She was described as a "one of a kind lass" by a friend, while another said she was a "beautiful soul gone far too soon".

  Floral tributes were left for Ms Atkinson outside Shakespeare Towers in Leeds

  Others added she was "bubbly" and a "lovely person" and offered condolences to her other children and family. Floral tributes have also been laid outside the tower block, with cards reading "heaven has gained another angel". A spokesperson for the force said there were believed to be no suspicious circumstances relating to Ms Atkinson's death and the coroner had been informed. If you, or someone you know, have been affected by this story, please visit BBC Action Line to find information on organisations that can help. Listen to highlights from West Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
