title: Gatwick Airport passengers complain of new check-in delays - BBC News
date: '2023-03-26'
section: Sussex
url: http://www.bbc.co.uk/news/uk-england-sussex-65075418
content: |-
  Passengers report long queues again due to a problem with the airport's self-check-in machines.

  One passenger said that when she arrived the queue was "out of the door"

  Passengers flying from Gatwick Airport have reported long queues again due to a problem with the airport's self-check-in machines.

  Earlier, Gatwick said it was "running well" and had made significant progress rectifying a technical issue which caused delays on Saturday.

  But Elaine MacDonald, travelling on Sunday, described "absolute chaos" after queuing for about 90 minutes.

  Gatwick said it had seen "some queuing" but overall it was "running as usual".

