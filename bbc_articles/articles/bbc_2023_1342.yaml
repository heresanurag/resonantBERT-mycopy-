content: |-
  Women around the country are sending us updates, describing their lives under Taliban rule.

  Women from all walks of life have been affected since the Taliban takeover, including one aid worker from one of the poorest and most remote regions of the country. She says she’s been unable to carry out her work since restrictions were imposed on female aid workers and says it breaks her heart every time someone asks her when they will start getting aid again

  Quote Message: We met different people; we would speak with women, men, children, and old people. We would ask about their problems and needs, and then we report their problems and voices to our offices. Our office was trying really hard to help them all. I was feeling glad and great to help my people. We met different people; we would speak with women, men, children, and old people. We would ask about their problems and needs, and then we report their problems and voices to our offices. Our office was trying really hard to help them all. I was feeling glad and great to help my people.

  Quote Message: The salary that I was receiving monthly from our office would help me to support my family and my sisters' and brothers' education. But now that we are all at home, have lost our jobs, and are not able to go out alone or without mahram (male guardian), we should have someone from our family go out with us, like our father, brother, or husband. The salary that I was receiving monthly from our office would help me to support my family and my sisters' and brothers' education. But now that we are all at home, have lost our jobs, and are not able to go out alone or without mahram (male guardian), we should have someone from our family go out with us, like our father, brother, or husband.

  Quote Message: I wanted to study and get a masters, but now all my dreams are broken. We are just alive without hope. Now I spend most of my time at home. I watch films, videos on social media and Tv programmes to pass time. I wanted to study and get a masters, but now all my dreams are broken. We are just alive without hope. Now I spend most of my time at home. I watch films, videos on social media and Tv programmes to pass time.

  Quote Message: I've had several run-ins with the Taliban; whenever I go out, they stop me at checkpoints and tell me to wear a hijab and cover my face and hair. Though I have a proper hijab, they would still stop you and order you to wear your hijab properly." I've had several run-ins with the Taliban; whenever I go out, they stop me at checkpoints and tell me to wear a hijab and cover my face and hair. Though I have a proper hijab, they would still stop you and order you to wear your hijab properly."
