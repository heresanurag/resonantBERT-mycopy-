  Peter and Barbie Reynolds were returning to their home in Bamiyan on 1 February when they were detained.

  British couple in their 70s arrested by Taliban

  A British couple in their 70s have been arrested by the Taliban in Afghanistan. Peter Reynolds, 79, and his wife Barbie, 75, were returning to their home in Bamiyan on 1 February when they were detained. The couple have been running training projects in Afghanistan for 18 years and their daughter, Sarah Entwistle, told the BBC she had not heard from her parents in more than two weeks. It is not known exactly what the couple were arrested for but projects run by them include one training mothers and children, which had apparently been approved by the local authorities despite a ban by the Taliban on women working and on education for girls older than the age of 12.

  The couple, who originally met at the University of Bath, married in Kabul in 1970. Since 2009 they have been running training projects in five schools in Kabul and one project in Bamiyan training mothers and children. While the Taliban's return to power in August 2021 saw most of their staff leave – along with most westerners – Mr and Mrs Reynolds insisted on staying put. After their arrest, the couple were initially able to keep in touch with their four children by text message. The family knew that their parents were being held by the interior ministry and were assured by them that they were "fine". Three days later, however, the texts stopped. The children have heard nothing since. Ms Entwistle, who lives in Daventry, Northamptonshire, told the BBC: "It's been over two weeks since the messages stopped, and they were taken into custody. "We would like the Taliban to release them to go back to their home and continue their work." She told the Sunday Times, external: "They said they could not leave when Afghans were in their hour of need. "They were meticulous about keeping by the rules even as they kept changing." She added: "My mother is 75 and my father almost 80 and [he] needs his heart medication after a mini-stroke. They were just trying to help the country they loved. The idea they are being held because they were teaching mothers with children is outrageous." The couple were arrested alongside their American friend Faye Hall and a translator from their business, the PA news agency reported, quoting an employee. The employee, who described the pair as "the most honourable people I have ever met", said Mr Reynolds had been denied access to heart medication and his condition was "not good".

  Ms Entwistle and her three siblings have written a letter to the Taliban, pleading with them to release their parents. "We do not understand the reasons behind their arrest," they wrote. "They have communicated their trust in you, and that as Afghan citizens they will be treated well." "We recognise that there have been instances where exchanges have been beneficial for your government and western nations. However, our parents have consistently expressed their commitment to Afghanistan, stating that they would rather sacrifice their lives than become part of ransom negotiations or be traded." The Foreign Office is aware two British nationals have been detained in Afghanistan. But assistance is limited by the fact that the UK does not recognise the Taliban and has no embassy in Kabul. Taliban official sources have told the BBC they arrested British nationals, who they believe were working for a non-governmental organisation (NGO) in Bamiyan province. An official claimed they had been arrested, about 20 days ago, after using a plane without informing Bamiyan police headquarters or the border security forces. The Taliban announced women would be banned from working for NGOs in 2022 and in December last year Al Jazeera reported, external the government had said it would close any NGOs employing women.
