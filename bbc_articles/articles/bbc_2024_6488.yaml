title: 'Deeside: Two charged with murdering Ethan Ives, two - BBC News'
date: '2024-03-05'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-68473076
content: |-
  Three people are accused after the death of two-year-old Ethan Ives, with two charged with murder.

  Michael Ives, 46, and Kerry Ives, 45, are accused of murdering two-year-old Ethan Ives

  Two people have been charged with murdering a two-year-old boy.

  Michael Ives, 46, and Kerry Ives, 45, both of Garden City, Deeside, appeared in Wrexham Magistrates' Court accused of killing Ethan Ives, who died in 2021.

  They also face a number of other charges and were remanded into custody.

  A third person, Shannon Kayleigh Ives, 27, from Mold, also faces a number of other charges, and was bailed to appear in court in April.

  Michael and Kerry Ives have both been charged with murder, causing or allowing a child to suffer serious physical harm, and causing the assault, ill treatment, neglect or abandonment of a child to cause unnecessary suffering or injury.

  They are due to appear in crown court on Wednesday.

  Shannon Ives has been charged with causing or allowing a child to suffer serious physical harm, and causing the assault, ill treatment, neglect or abandonment of a child to cause unnecessary suffering or injury.

  She has been bailed to appear in court on 4 April.
