content: |-
  Marcus Fakana has been sentenced for a year over the relationship, a campaign group in Dubai says.

  Briton, 18, sentenced in Dubai over sex with girl

  Marcus Fakana has been unable to leave the country since September

  An 18-year-old British man who had a sexual relationship with a 17-year-old British girl in Dubai while the pair were on holiday with their families has been sentenced to one year in prison, a campaign group has said. Marcus Fakana, of Tottenham, north London, began the secretive holiday romance in September with another Londoner, who is now aged 18. After returning home and seeing pictures and chats, the girl's mother reported the relationship to Dubai police, who then arrested Fakana at his hotel. Sex with another person aged under 18 is illegal in Dubai. Campaign group Detained in Dubai called the judgment an "utter disgrace" and said Fakana would appeal against the "unreasonable" sentence.

  The organisation, which helps foreigners abroad and is an international authority on UAE law, added that Fakana felt "abandoned by the British government". A UK Foreign, Commonwealth & Development Office spokesperson said: "We are supporting a British man in the UAE and are in contact with his family." The Dubai Public Prosecutor's office has been approached for comment but previously said its legal system "is committed to protecting the rights of all individuals and ensuring impartial judicial proceedings".

  Radha Stirling, the founder and chief executive of Detained in Dubai, said Fakana, who has been unable to leave the country since September, was "desperately hoping" to return home this week. "But prosecutorial mishandling in the first stages of the case meant it wasn't heard as a misdemeanour when it should have been," she said. "The family have issued a plea to Dubai ruler HH Sheikh Mohammed Al Maktoum to spare Marcus for consensual sex with another British citizen."

  Ms Stirling told the BBC that the teenager would be deported following his sentence. She added: "I'm not sure that this is a law they should be upholding to this extent. "A custodial sentence for consensual sex with two people - tourists who were only supposed to be there for a short time - does not warrant a year in jail, doesn't warrant tearing this family apart and ruining this young 18-year-old's life." She previously said that his parents "don't know what to do" and had had to return to London without their son to resume their jobs, as a cleaner and in a warehouse.
