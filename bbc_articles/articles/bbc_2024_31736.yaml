  The PGA Tour proved a happy hunting ground for graduates from the DPWT such as Bob MacIntyre and Frenchman Mathieu Pavon. The Scot won the Canadian Open with his dad on the bag and then the Scottish Open for a pulsating victory that counted on both tours. A year to treasure for the Oban lefty. He and Pavon made it to the 30-man Tour Championship, as did Wolverhampton's Aaron Rai.

  Big names departed the LPGA Tour, including 29-year-old Lexi Thompson, who is stepping back from full-time play as fellow Solheim stars Ally Ewing, Marina Alex and Brittany Lincicome announced retirements. Major champions So Yeon Ryu and IK Kim also bade farewell and Catriona Matthew played her last Women's Open.

  Peter Oosterhuis won four successive European Order of Merit titles and twice finished runner-up at The Open

  Sadly the game lost too many fine names in 2024, with deaths announced for two Ryder Cup stalwarts, Englishman Peter Oosterhuis (aged 75) and the 'Welsh Bulldog' Brian Huggett (87). Both were great men of golf, architects of the modern game, who will be greatly missed. The sport was shocked by the tragic loss of PGA Tour winner Grayson Murray at the age of 30 and the popular former pro turned broadcaster Mark Carnevale (64). Legend Chi Chi Rodriguez died aged 88, hall of famer Susie Maxwell Berning (83), former R&A head pro Jim Farmer (76) and the respected and much loved American writer Jeff Babineau (62) were also mourned in 2024.
