title: 'Newspaper headlines: ''Democracy under threat'' and ''Farewell, Navalny''
  - BBC News'
date: '2024-03-02'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-68453959
content: |-
  Many front pages lead with the prime minister's statement outside Downing Street on Friday.

  Prime Minister Rishi Sunak gave an address outside 10 Downing Street on Friday, criticising "extremists" who had taken over the streets of the UK

  Most of Saturday front pages focus on Rishi Sunak's warning that extremist groups are trying to tear Britain apart. "Democracy under threat" is the Daily Telegraph's headline, describing the speech as essentially an "appeal to the nation" to stand up to right-wing and Islamist extremism. "Banish this hatred from our streets, implores PM" says the Times. "We'll beat this poison" says the Daily Express, describing the speech as a "dramatic intervention".

  According to the FT Weekend, Labour is"on alert" for Rishi Sunak to use next week's Budget as a "springboard" for a surprise general election in May. A senior Labour election strategist is quoted as saying the government is definitely preparing for May but it remains to be seen whether the prime minister ends up actually going for it.

  The Telegraph reports that ahead of the Budget, Chancellor Jeremy Hunt is facing calls to increase spending on defence. The paper says the request was made formally by Defence Secretary Grant Shapps in a letter in which he's understood to have said "bold action" is needed, and the UK has to re-establish its "leadership in Europe".

  Most of the papers feature photographs from the funeral of the Russian opposition leader, Alexei Navalny, which took place in Moscow yesterday. The Mirror describes the service as a "hero's burial" noting that his coffin was lowered to the tune of Frank Sinatra's My Way. The Mail quotes some of those who defied orders not to attend the funeral. One supporter of Alexei Navalny said he did not see anything wrong in, his words, coming to say "goodbye to a great man".

  The Formula 1 Red Bull team principal, Christian Horner, is "fighting for his future", according to the Guardian. Yesterday, he denied fresh claims of inappropriate behaviour. The Times and the Mirror say he has held "crisis talks" with F1 chiefs. the Telegraph highlights comments by Red Bull's star driver, Max Verstappen, that Christian Horner's thoughts appear to be elsewhere, as the new F1 season begins. The paper sums up with the headline "driven to distraction".

  And the Times says a Jane Austen expert has criticised plans for a statue of the author close to her final resting place at Winchester Cathedral. The £100,000 life-sized sculpture is expected to be unveiled next year to mark the 250th anniversary of the birth of the writer. But at a public meeting, Elizabeth Proudman, a leading light in the Jane Austen society, raised concerns at the prospect of tourists taking selfies with the statue. She added that it also wasn't in keeping with what's known about the author, a very private person who "despised publicity".

