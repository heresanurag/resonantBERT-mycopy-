title: Tributes paid to British couple killed in Naples cable car crash - BBC News
date: '2025-04-19'
section: Leicestershire
url: http://www.bbc.co.uk/news/articles/c4grkzvlkwno
content: |-
  Elaine and Graeme Winn were among four people killed in the incident at Mount Faito, while another was "extremely seriously injured".

  Elaine and Graeme Winn, who had posted several pictures on social media of their biking trips, were travelling in Italy

  Tributes have been paid to British couple Elaine and Graeme Winn who were among four people killed in a cable car crash near Naples. The school Mrs Winn worked at in Market Harborough described the 58-year-old as "much-loved and highly respected", and tributes were also left for the couple on social media. The mountain cable car cabin plunged to the ground after one of the cables supporting it snapped on Thursday, local officials said. The cable car operator said it had passed a safety inspection just two weeks ago and that a criminal investigation has been opened.

  The two other victims include the driver of the cable car, named by authorities as 59-year-old Carmine Parlato, and an Israeli woman identified as Janan Suliman. A fifth person in the cabin, Ms Suliman's brother, was "extremely seriously injured" in the crash and airlifted to hospital, where he remains in a critical condition, officials said. Authorities in Torre Annunziata have opened an investigation into the cause of the crash. A spokesperson for Welland Park Academy said Mrs Winn worked at the Leicestershire secondary school as a business manager and that it was "deeply saddened" by her death. "Elaine was a much-loved and highly respected member of our school community," they said. "Her professionalism, warmth, and unwavering dedication to school life touched the lives of students, staff, and families alike." They added: "The care and kindness she showed to everyone in our community means her loss will be felt deeply by us all."

