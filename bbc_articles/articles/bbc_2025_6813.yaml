  The mayor of Castellammare di Stabia - where the cable car is located - said it was believed a traction cable had snapped. "The emergency brake downstream worked but clearly not the one on the cabin that was about to reach the top of the hill," Luigi Vicinanza told Italian media on Thursday. He added that there had been regular safety checks on the cable car line which runs the two miles (3km) between the town to the top of Mount Faito. Vicinanza's spokesman told PA news agency that 10 people were rescued from a second cabin which was also on the line near the bottom of the valley at the time of the incident. They were winched to safety. The investigation into the incident will examine the possibility that strong winds could have been among the causes of the incident. The cable car service had been suspended on Tuesday and Wednesday due to adverse weather conditions and had only resumed full operations on Thursday morning.

  British tourist Megan Pacey was near the site of the incident on Thursday with her husband and their two young children when they saw the suspended cable car. Ms Pacey said: "We were within a minute or two of [the incident] happening." "We watched the first couple of people come down in a harness, and as we left, there was a sense of urgency that had kicked in." She said flowers and candles had been left as tribute on the railway station steps on Friday.

  Locals have placed flowers on the steps of the railway station

  A day of mourning will be held in the town, which is between Pompeii and Sorrento, and all local events for the Easter holiday have been cancelled. The president of the region, Vincenzo De Luca, said it was a "truly tragic and painful" day. Shortly after the crash, Italian Prime Minister Giorgia Meloni, who was on a trip to Washington, expressed her "sincere condolences" to the families of the victims. The Mount Faito cable car has been operating since 1952. A similar accident on the line in 1960 left four people dead.
