content: |-
  Manchester City are weighing up an Eberechi Eze move, PSG are interested in a Manchester United duo, Aston Villa target Atletico Madrid forward Joao Felix, plus more.

  Manchester City weighing up move for Eberechi Eze with Kevin de Bruyne's future at club uncertain, PSG interested in Manchester United's Jadon Sancho and Bruno Fernandes, and Aston Villa target Portugal forward Joao Felix. Manchester City are considering a move for Crystal Palace winger Eberechi Eze, with the 26-year-old England international having a release clause of £60m plus add-ons. (Mirror), external Saudi Arabian club Al-Ittihad want 33-year-old Belgium playmaker Kevin de Bruyne, which has led to Manchester City weighing up a deal for Eze. (Guardian), external Manchester City are interested in Paris St-Germain and Italy goalkeeper Gianluigi Donnarumma, 25, as they look to replace 30-year-old Brazil international Ederson, who could move to Al-Ittihad. (Sky Sports Italy), external Ederson will cost Al-Ittihad at least £40m, but Manchester City are willing to let him leave as long as their valuation is met. (ESPN), external Paris St-Germain want 24-year-old Manchester United winger Jadon Sancho, and the England forward appears open to the idea of joining the French champions. (Foot Mercato - in French, external) PSG are also interested in Manchester United's Portugal midfielder Bruno Fernandes, 29. (L'Equipe - in French), external Everton are preparing to offer England defender Jarrad Branthwaite, 22, an improved deal in a bid to convince him to reject Manchester United. (Fabrizio Romano), external Aston Villa are targeting Atletico Madrid and Portugal forward Joao Felix, 24, after agreeing to sell France winger Moussa Diaby, 25, to Al-Ittihad for £50m. (Guardian), external

  Tottenham value Brazil forward Richarlison at £60m, with Saudi Pro League club Al-Ahli having indicated they are interested in the 27-year-old. (Times - subscription required), external Spurs winger Bryan Gil, 23, and left-back Sergio Reguilon, 27, who are both Spanish, have been left out of the club's pre-season tour of Japan and South Korea so they can explore moves away from the club. (Standard), external Newcastle United have held talks with manager Eddie Howe to reassure him about the scope of his role, and the club are confident he would reject taking over as England boss if there was interest from the Football Association. (Telegraph - subscription required), external Arsenal are prepared to offer English forward Eddie Nketiah, 25, as part of a swap deal with Crystal Palace for 24-year-old England defender Marc Guehi. (Metro), external French club Marseille have agreed personal terms with Nketiah and are confident of completing a deal for the striker. (L'Equipe - in French), external Manchester United and West Ham are competing to sign Morocco right-back Noussair Mazraoui from Bayern Munich, who want about £19m for the 26-year-old. (Sky Sports Germany), external West Ham could pursue a deal for Manchester United's 26-year-old English right-back Aaron Wan-Bissaka if Mazraoui moves to Old Trafford. (Sky Sports), external Negotiations between Paris St-Germain and Napoli over a deal for Nigeria forward Victor Osimhen, 25, have stalled. (Fabrizio Romano), external Besiktas have told former Arsenal, Liverpool and England midfielder Alex Oxlade-Chamberlain, 30, that he is no longer part of their plans. (Mirror), external
