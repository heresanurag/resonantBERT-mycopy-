title: Supermarket delivery driver rescued from Westgate ford - BBC News
date: '2021-01-20'
section: Tyne & Wear
url: http://www.bbc.co.uk/news/uk-england-tyne-55732938
content: |-
  Police say the van "careered" off the road and the man was rescued from the overturned vehicle.

  The driver sat on his overturned van until rescuers arrived

  A supermarket delivery driver had to be rescued from his overturned van after he careered off the road and ended up in a fast-flowing ford, police said.

  Firefighters and police were called to the River Wear, Westgate, in Weardale, after reports that a Morrisons van was stuck at 17:00 GMT on Tuesday.

  Police said the van had "careered" off the road and the man sat on top of the vehicle before being rescued.

  County Durham Fire and Rescue Service said the rescue was "challenging."

  Water specialists from the fire service braved the river in a raft attached to a nearby footbridge and gave the man a life jacket.

  Police said the driver was not injured but was taken to hospital as a precaution.

  The fire service tweeted a video of the scene, and said they were "so proud" of the water rescue team.

