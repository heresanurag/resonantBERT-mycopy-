  Scott Bisset, who lives nearby, went to see if he could help after he was called by people who heard the driver shouting for help.

  Mr Bisset, a member of the local mountain rescue team, said he thought the driver may have ended up there after being directed by his sat-nav.

  He said: "There's not a vehicle in the world that could have got through.

  "The river was in flood - the snow here has melted and there was rain, so there was a lot of water in the river.

  "The van was washed off and turned over on its side, luckily the front was pointing upstream, so it acted like a boat.

  "If the water had been hitting the side of the van or the back, the driver would unfortunately have drowned.

  "When I got there the driver was extremely distressed."

  The van has not yet been recovered from the water

  He also said that rescuers had put their lives at risk.

  "I know they practice for this but in those conditions, with that freezing water travelling at great speed, in the dark and the pouring rain, it was very dangerous and they were very brave," he said.

  The van has not yet been recovered from the water.

