title: 'Brit Awards 2024: Watch record-breaking Raye win award after award - BBC News'
date: '2024-03-04'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-68460735
content: |-
  The singer-songwriter makes history with six Brits in a year, including Artist and Song of the year.

  Singer-songwriter Raye has broken the record for winning the most Brits in one year - equalling the the career total of David Bowie, Michael Jackson and Oasis.

  The south Londoner collected Artist, Album, Song and Songwriter of the year, as well as Best new artist and Best R&B act.

  She had already made history with a record-breaking seven nominations before the ceremony at London's O2 Arena.

  Kylie Minogue received the Global Icon award and closed the ceremony with a glistening performance.
