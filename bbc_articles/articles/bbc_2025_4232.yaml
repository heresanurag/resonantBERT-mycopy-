content: |-
  Former Liverpool defender and long-time BBC Match of the Day pundit Alan Hansen receives his MBE for services to football and broadcasting at Windsor Castle on Tuesday.

  Former Liverpool defender and long-time BBC Match of the Day pundit Alan Hansen has received his MBE for services to football and broadcasting.

  The ex-Scotland international, 69, was honoured at an investiture ceremony at Windsor Castle on Tuesday.

  Hansen was seriously ill in hospital last summer but was discharged after two weeks to recover at home.

  He spent 14 years with Liverpool, winning eight First Division titles, three European Cups and two FA Cups during the 1970s and 1980s.

  Hansen, who earned 26 caps for Scotland, began his senior career with Partick Thistle and joined Liverpool in 1977, spending four seasons as captain before retiring in 1991.

  After hanging up his boots, Hansen moved into punditry and worked on Match of the Day from 1992 until 2014.

  Meanwhile, two-time Olympic champion rower Helen Glover was made an OBE for services to the sport at the ceremony, while Paralympic archery champion Jodie Grinham was made an MBE.
