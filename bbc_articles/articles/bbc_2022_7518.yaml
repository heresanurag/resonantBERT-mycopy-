title: Boy, 15, stabbed to death and mother hurt in Manchester - BBC News
date: '2022-06-10'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-61757631
content: |-
  Police search for a man who was known to the victims after the "ferocious" attack in Manchester.

  The boy died in hospital after being found at a house in the Miles Platting area

  A 15-year-old boy has been killed and his mother injured after they were both stabbed at a house in Manchester.

  The teenager died in hospital after he was found with stab wounds following a "ferocious" attack in Bednal Avenue, in the Miles Platting area, at about 21:30 BST on Thursday, police said.

  His mother, aged in her 40s, was treated for serious stab wounds and taken to hospital.

  No arrests have been made and police said they were searching for a man.

  The suspect was described as Asian and wearing dark clothing, aged in his mid 40s, of medium build and medium height.

  He was last seen walking on Sawley Road shortly after the attack took place.

  Greater Manchester Police said officers believed he was known to the victims and the attack was thought to have been a "domestic incident".

  People have been advised not to approach him and to call 999.

  Det Ch Insp Gina Brennand described the stabbing as "a ferocious attack"

  Police said the woman remains in a stable condition and a large police cordon had been set up at the scene as the investigation continued.

  Neighbour Ayomide Ladeji said the teenager was a "good kid and everyone around knew him".

  "When I found out it was crazy. I'm still trying to process it now," he said.

  Police officers at the scene in Bednal Avenue

  Another resident said the woman lived in the house with three children, adding "they were a quiet family and very polite children".

  "We would see the boy going to and from school. This is devastating."

  Another neighbour, who did not want to be named, said: "It's terrible. It's not the kind of thing that happens round here.

  "The area has improved massively with regeneration and this is so sad."

  A large police cordon has been set up at the scene on Bednal Avenue

  Det Ch Insp Gina Brennand described the stabbing as "a ferocious attack".

  She added: "We are working at a tremendous pace to find the person that did this and to take them off the streets and into custody where we can continue to piece together what we know.

  "Last night's events are nothing short of devastating as a teenage boy has tragically lost his life and a mother is grieving in hospital after also being seriously attacked.

  "This is a shocking incident for the people of Manchester to wake up to, but I do wish to stress that our enquiries so far suggest this was a contained and domestic-related incident."

