content: |-
  Switzerland's Marcel Hug and Catherine Debrunner surge to victory in the men's and women's wheelchair races at the London Marathon.

  It was a Swiss double in the wheelchair races with victories for Marcel Hug and Catherine Debrunner

  Switzerland's Marcel Hug surged to victory in the men's wheelchair race at the London Marathon for the fourth year in a row. The 38-year-old crossed the line in one hour 28 minutes and 35 seconds for his fifth win in London. American Daniel Romanchuk finished second with Briton David Weir, in his 25th consecutive appearance, third. Catherine Debrunner, also of Switzerland, dominated the women's wheelchair race to win in 1:38:54.

  Victory was Debrunner's second in London and she led from very early on, soon putting a gap between herself and her rivals as she went on to finish more than six minutes in front of fellow countrywoman Manuela Schar in second. "I am really happy about the win and that we [her and men's winner Hug] could do it together is even better," Debrunner told BBC Sport. "It was really tough, the wind was all the time. It was a little race against the wind and if you have to do it all on your own it is really long." Great Britain's Eden Rainbow-Cooper, who won the Boston Marathon last week, came sixth in 1:50:39.

  Meanwhile, Hug, who won the men's race in Boston, had Romanchuk for company throughout the first half of the race in London. The pair appeared to have moved clear of the rest of the field but Weir and Japan's Tomoki Suzuki reeled them in. However, Hug had enough left in the tank to drop his competitors in the second half of the race to win comfortably. "It was a really amazing race but it was also really tough. The conditions were tough, there was a lot of wind. I tried many times to break away and it finally happened," Hug told BBC Sport. "So many great memories here, some tight finishes. I was lucky today I could go away a little bit earlier. The crowd is always amazing. For us, it's really amazing."

  The London Marathon has become the first marathon in the world to offer equal prize money for wheelchair and non-disabled races. This year, winners in all elite races will receive $55,000 (£43,500) with prize money awarded in US Dollars.

