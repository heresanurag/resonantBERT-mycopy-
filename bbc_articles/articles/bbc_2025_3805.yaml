title: 'Six Nations: Will Scotland''s ''France-lite'' spoil Les Bleus title party?
  - BBC Sport'
date: '2025-03-15'
section: Scotland
url: http://www.bbc.co.uk/sport/rugby-union/articles/cn48g8pvk0wo
content: |-
  Imperious yet vulnerable, France face a less clinical version of themselves as Scotland aim to spoil the hosts' Six Nations title hopes, writes Tom English.

  Blair Kinghorn could be key to Scotland's hopes in Saint Denis

  Coverage: Listen live on BBC Radio 5 Live, BBC Radio Scotland Extra & BBC Sounds, live text coverage and highlights on BBC Sport app & website

  When thinking about Scotland's prospects of turning the awe-inspiring, championship-chasing Les Bleus to a sickly shade of green on Saturday night in Paris, a scene from Dumb and Dumber comes to mind. Lloyd quizzing Mary about the precise nature of his unrequited love. "What are my chances?" he asks. "Not good," says Mary. "Not good, like one out of a hundred?" he wonders. "I'd say, more like one out of a million," Mary replies. Cue Lloyd, euphoric: "So... you're telling me there's a chance?" Well, yes, but... It's not just the main protagonists who have skin in this Six Nations finale, of course. England will be all over it presuming they put Wales away earlier in the day. If they falter then Irish eyes will be like saucers, but only if they've done a job on Italy first.

  Scotland head coach Gregor Townsend says that the rugby world will be glued to their screens on Saturday night - and he's probably right. France are so watchable, so compelling, so vulnerable at Twickenham and so imperious in Dublin. They're a drama unto themselves. Everybody loves a flawed genius and here it is in team form. How could such a collection of stellar players only have a championship to win on Saturday night instead of a Grand Slam? The loss to the English is incomprehensible and yet that flakiness adds to France's appeal. They're an eminently loveable lot. It's not just the creative majesty of their team that captivates, it's the terrible beauty of their 7-1 bench, an idea borrowed from the Boks but, somehow, more impressive when France do it. Why do we love them? For their collective class - they need four tries to set a new Six Nations try-scoring record. For their individual excellence - Damian Penaud has 12 (or twelve, as the old vidiprinter would present it) tries in his past five games for club and country, with the young maestro Louis Bielle-Biarrey scoring a ridiculous 23 in his past 20.

