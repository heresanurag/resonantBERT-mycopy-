  It was a battle the year before in Paris, when Scotland fell 19-0 behind after 18 minutes but then rallied magnificently to make it 25-21 after 67 minutes. That 50-minute spell - 21-6 to the visitors - was among the most scintillating of the entire Townsend era. A late misfire out of touch cost them - Gael Fickou sealed it soon after - but that was a scary experience for France. You win your opponent's respect when you take them to the wire the way Scotland did that day. And on other days. During the Covid spring of 2021, Scotland won in Paris. They weren't supposed to. They hadn't won in France in 12 attempts, going back to when Townsend was in his pomp as a player, but they did that night. Duhan van der Merwe scored the winner, one of 32 tries he has scored in 48 Tests. Darcy Graham is on the opposite wing on Saturday. Graham has 30 tries in 45 Tests. The pair of them are the finest wing combination in probably the finest Scotland backline there's ever been. The case for Scotland delivering a scare can be stretched out a little. With Finn Russell, Huw Jones and Tom Jordan all wondrous attackers, they can score from anywhere, that much has been long-established.

  This video can not be played To play this video you need to enable JavaScript in your browser. How French power game has made them Six Nations title favourites

  Under Townsend, Scotland have had a ton of possession and territory in most of their games against France. In six out of the seven championship games, Townsend's team have had more attacking minutes than France. On occasion, a lot more. They have three wins and four losses against France in the Six Nations. Throw in World Cup warm-ups and it's five wins and seven losses. Three of France's victories have been by a score. Only rarely have the French taken the Scots to the cleaners while Townsend has been in charge. Statistics suggest a close enough contest, but the evidence of our eyes pretty much takes us in the opposite direction. If Scotland play as they have been playing, they will score some wonder tries but won't have the horses to live with France when the power comes on. And, when that power comes on and pulls Scotland this way and that, enter the French assassins behind the scrum - all clever angles and deception, outrageous vision and ruthless execution. In the recent past, Scotland have shown an impressive capacity to stay in the fight and make life difficult for France. This is a different team and a different time, though. Under the disco lights at the Stade de France, Paris is ready to party.
