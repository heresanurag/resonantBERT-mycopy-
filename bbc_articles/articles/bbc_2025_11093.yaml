  The service, held at Westminster Abbey, marks 80 years since the end of World War Two in Europe

  A thanksgiving service was held at Westminster Abbey on Thursday to mark 80 years since the end of World War Two in Europe.

  The Royal Family, senior politicians, and veterans attended the ceremony.

  It began with a two-minute silence, as the royals stood around the Tomb of the Unknown Soldier.

  Winston Churchill's great-great grandson was also there - he lit the Candle of Peace and lead a prayer for "peace across the world and Europe".

  Later the royals attended a special concert at Horse Guards Parade, where the King delivered a speech to the crowd.
