  YouTube star PewDiePie has married his girlfriend Marzia Bisognin after eight years together.

  Both posted about the ceremony, which took place in Kew Gardens in London.

  The 29-year-old Swedish star - real name Felix Kjellberg - made his name with video game commentaries and was at one point the world's highest earning YouTuber.

  Italian Marzia Bisognin, 26, is also an internet personality, who's more recently moved into fashion and design.

