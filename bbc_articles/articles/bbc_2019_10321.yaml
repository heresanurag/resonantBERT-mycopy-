title: PewDiePie and Marzia Bisognin marry at Kew Gardens - BBC News
date: '2019-08-20'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-49409396
content: |-
  The couple have been together for eight years and wed at the famous London attraction.

