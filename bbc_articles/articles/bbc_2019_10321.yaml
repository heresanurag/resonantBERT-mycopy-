  With 99 million subscribers on YouTube, PewDiePie was in a competition with Bollywood record label T-Series to be the biggest YouTube channel in the world.

  The battle led to hackers taking control of thousands of printers around the world to print messages of support for PewDiePie.

  In April he posted a video asking for his fans to end the movement- saying some of the stunts done to promote his channel were "disgusting" and "disappointing".

