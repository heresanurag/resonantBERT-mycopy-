id: bbc_2021_14530
title: 'Storm Arwen: Tree fall in Bridgend narrowly misses woman - BBC News'
date: '2021-11-27'
section: General
url: http://www.bbc.co.uk/news/uk-wales-59446695
content: |-
  A woman had a lucky escape after a tree fell just feet away from where she was standing.

  CCTV footage shows the moment a woman narrowly avoided being hit by a falling tree in a pub beer garden amid strong winds from Storm Arwen.

  Cheryl Pound had the lucky escape while having a cigarette break after closing The Star pub in Bridgend where she works.

  Footage from the pub, in Market Street, captured the moment the tree fell just feet away from her.

  At the time the tree came down, flattening rows of pub tables, the nearest weather station recorded wind gusts in excess of 50mph (80km/h).
