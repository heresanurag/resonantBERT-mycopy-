  Before passing sentence, Mr Justice Turner told the boy he did not find he attacked Mr Kohli due to his race, even though the court heard he used racist language. "You made a cowardly attack on an elderly man," he added. Mr Justice Turner said he was sure the boy wanted to "confront" Mr Kohli in order to impress the girl as she filmed what happened. He said the boy approached Mr Kohli while wearing a balaclava, adding the elderly man had done nothing to deserve the attack that followed. Addressing the girl, he told her she "did not play a leading role" but it was not a minor part either.

  To play this video you need to enable JavaScript in your browser. This video can not be played "We don't want any other family to endure this pain," Bhim Kohli's daughter says

  Speaking on the steps outside court after sentencing, Ms Kohli said: "The death of my dad has left a hole in our family. "A hole that can never be filled because of the actions of two teenagers. "I believe that on that day the two teenagers made a choice; the boy chose to attack my dad and the girl chose to film my dad's attack. "I feel angry and disappointed by the sentence passed as it does not reflect the severity." She added that, after the boy and girl had served their sentences, "they still have life ahead of them".

  Linda Haigh was friends with Mr Kohli for more than 20 years

  The BBC was told it was reported to police that in July, Mr Kohli had stones thrown at him and was spat at by a group of children after he told them to get off his neighbour's garage roof. And the following month, Mr Kohli spoke to officers after he saw two white boys aged 12 and 13 racially abuse a man and throw a large rock at him near the same park where he encountered his own attackers. A witness to the August attack, Linda Haigh, said she warned police about racially motivated problems in the area before Mr Kohli died, and believes he would still be alive had they taken her more seriously. An investigation conducted by Leicestershire Police, reviewed by the Independent Office for Police Conduct, did not identify any "misconduct or missed opportunities which could have prevented Mr Kohli's death". Ch Supt Jonathan Starbuck said: "Prior to Mr Kohli's death, police were aware of two reports of anti-social behaviour involving youths in the Franklin Park area which were being investigated. "Partnership work in the area following Mr Kohli's death did identify further incidents which had not been reported." He added that "organisational learning" to improve logging anti-social behaviour had been identified.

  Kelly Matthews, the senior district crown prosecutor for the Crown Prosecution Service in the East Midlands, said the attack was "violent and unprovoked"

  Kelly Matthews, senior district crown prosecutor for the Crown Prosecution Service (CPS) in the East Midlands, said it was "not often that we see individuals so young in court charged with violent offences". "The girl was the catalyst for this attack taking place," Ms Matthews said, when asked why the female defendant had also been found guilty of manslaughter. "If it wasn't for her, then events may have unfolded differently on that day. "She pointed out Mr Kohli to the boy. She approached Mr Kohli with the boy. When the boy started attacking Mr Kohli, she took out her phone and started filming the incident and laughing, encouraging him." Ms Matthews said "some very young witnesses" gave key evidence about what happened before and after the attack, "specifically of the two defendants bragging about what had happened".

