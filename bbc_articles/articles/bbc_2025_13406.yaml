title: 'Bhim Kohli: Boy and girl sentenced for killing dog walker, 80 - BBC News'
date: '2025-06-06'
section: Leicestershire
url: http://www.bbc.co.uk/news/articles/czxy2npz7d5o
content: |-
  A 15-year-old boy and a 13-year-old girl were both found guilty of Bhim Kohli's manslaughter.

  Bhim Kohli, 80, died the day after he was attacked at a park in Leicestershire

  A 15-year-old boy and a 13-year-old girl have been sentenced for killing an 80-year-old man out walking his dog in a park. Bhim Kohli died the day after he was assaulted in Franklin Park, yards from his home in Braunstone Town, Leicestershire, on 1 September last year. The boy, who racially abused Mr Kohli before slapping him in the face with a slider shoe, was sentenced to seven years in custody at Leicester Crown Court on Thursday. The girl, who encouraged the assault and laughed as she filmed it on her phone, was given a youth rehabilitation order of three years and made subject to a six-month curfew. Both were convicted of manslaughter.

  During the hearing, prosecutor Harpreet Sandhu KC said Mr Kohli was subjected to a "seven-and-a-half minute period of continuing aggression" while taking his dog Rocky for a walk. The attack left Mr Kohli with three broken ribs and other fractures, but Mr Sandhu KC said the fatal injury was to his spinal cord, caused by a spine fracture. Mr Kohli's children found him at the park "screaming out" in pain after the attack.

  A trial previously heard Mr Kohli's children found him lying on the ground after the attack

  Mr Kohli's daughter, Susan Kohli, told the court he was a "devoted life partner" to his wife Satinder for 55 years. Taking to the witness box to read her victim impact statement out to the court, she said: "We feel nothing but anger and disgust towards the boy and the girl. "The girl disgustingly videoed dad as he lay on his side after the attack. "Dad passed away before our eyes surrounded by his family who all had tears in their eyes." Ms Kohli added she and her mother were always "looking over our shoulders when taking Rocky for a walk after what happened to dad".

