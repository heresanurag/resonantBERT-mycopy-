title: 'Covid vaccines: NHS jabs more than 1m children aged 12-15 in England - BBC
  News'
date: '2021-11-14'
section: UK
url: http://www.bbc.co.uk/news/uk-59282304
content: |-
  A single dose of the Pfizer jab has been available to 12 to 15-year-olds since 20 September.

  More than a million children between 12 and 15 years old in England have received a Covid-19 vaccine.

  Vaccine clinics have been held at around 3,500 schools, with 800 more to be visited next week, NHS England said.

  A single dose of the Pfizer-BioNTech jab has been available to 12 to 15-year-olds since 20 September.

  However, this offer came later than many European countries and the US - who began to vaccinate those age groups over the summer.

  Health Secretary Sajid Javid said: "Over a million young people aged 12 to 15 have now received the crucial protection the vaccine provides.

  "This is a phenomenal accomplishment and will make a huge difference in stopping Covid-19 from further disrupting their education, their health and their lives."

  On Sunday a 36,517 new cases were recorded, up by more than 6,000 from the same time last week. A further 63 deaths within 28 days of a positive test were also reported.

  Almost three million children aged 12 to 15 in England are eligible for one dose, NHS England has said.

  The rollout to this age group came later in the UK than in some other places, after a period of controversy over approving the Pfizer-BioNTech jab vaccine for younger children.

  The vaccination programme began in earnest once it was approved by the UK's chief medical officers, but much of Europe began to offer jabs to this age bracket ahead of their return to school in the autumn.

  The US is currently also offering doses of the Pfizer vaccine to children aged between five and 11 years old.

  Coronavirus jabs are also available to children in Scotland and Wales, who have focused on the use of vaccine clinics - while Northern Ireland is getting them to children via their own school programme.

  Following the announcement that the million mark had been reached, NHS officials said 95% of schools had already been visited or had a visit planned in the coming weeks.

  Dr Emily Lawson, head of the NHS Covid-19 vaccination programme, described the news as "fantastic".

  She explained it was down to the schools programme and the "hard work of specialist NHS teams who are either visiting hundreds of schools every single week or our vaccination sites".

  "I would urge families to look at the information together and then book in to give children and their loved ones crucial protection ahead of winter," Dr Lawson added.

  Letters requesting consent are sent to parents and guardians before the school clinics with information on vaccination.

  Those who want their children to be jabbed outside of school hours are asked to go to vaccination sites, where consent will be asked for on the day.

  There are around 60 immunisation services for school age children across the country, with teams made up of clinical staff including paediatric nurses and school nurses.

