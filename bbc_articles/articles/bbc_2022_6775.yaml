  • None Go straight to all the best Crystal Palace content The party started at the final whistle, with thousands of fans flooding onto the pitch, letting off more smoke flares, saluting their team and manager Lampard. But he and the club will hope they will never have to cope with a similar scare again given lavish spending on players and a move to a new stadium in 2024. Spirit from fans and players save Everton again Everton fans ran onto the pitch when safety was confirmed Lampard described this game as "all or nothing" given Everton's wretched away record, which has seen them win once on the road in the league since August. And despite a poor showing in the first period, where once again Everton looked inferior to their opponents, they somehow managed another second-half turnaround, which has been crucial in keeping them in the Premier League. The scenes at the final whistle were in stark contrast to those before the break where a tempestuous game boiled over on the pitch and left a livid feeling in the stands. After the introduction of Dele Alli at the break and a move to a more attacking formation, Everton matched their second-half showings against Newcastle, Leicester and Chelsea, which earned two wins and a draw. Lampard may well question why his side have to play poorly to find the inspiration, but boosted by a support which has had a massive role in their survival, they turned the game around against a Palace side which had beaten them twice already this season. Jean-Philippe Mateta scored his seventh goal of the season Sunday's defeat by Brentford threatened to derail Everton's momentum gathered by their superior home form, but the hand that supporters have played in keeping the Toffees up cannot be underestimated. Lampard and fans tried to evoke the spirit of recent matches from the start, with the team coach greeted by a wall of blue smoke outside the stadium. That almost boiled over early on as Anthony Gordon and Wifried Zaha squared up to each other, causing a melee, but once Palace settled they quickly picked off an Everton side who struggled to keep the ball. Lampard again favoured a 3-5-2 formation, but when his side retreated into a back five, Patrick Vieira's visitors were able to enjoy plenty of possession and control the game. There were moments in first half for Everton's fans to get excited about, like Richarlison's free-kick that hit the bar. But for the most part the passionate home support turned to anger as Mateta scored his seventh goal of the season before helping to create Palace's second. The fact it came from Ayew was contentious. He had hacked down Gordon shortly before but only received a yellow card and was then on hand to take advantage as both Vitaliy Mykolenko and Abdoulaye Doucoure somehow failed to connect with the ball on the line following Zaha's shot. That silenced the crowd, who must have felt like relegation was staring them in the face. But a half-time switch to a back four by Lampard, who replaced the ineffective Andre Gomes with Alli, breathed life into Everton. Nine minutes after the break, Keane fired in after Mykolenko's free-kick was headed back to the centre-back by Mason Holgate. And with 15 minutes left, Everton managed to conjure up another goal. Alli had a hand in it, crossing the ball, but when the Palace defence failed to clear Richarlison's shot ended up in the bottom corner, setting off wild celebrations. That seemed minor compared to Calvert-Lewin's winner. Everton fans could not contain their delight, running onto the pitch, with Zaha seeming to take issue with some supporters' attentions. The pitch was eventually cleared, but there was little hope for the stewards as thousands celebrated with their heroes at the final whistle. Everton goalkeeper Jordan Pickford was surrounded by fans after full time Everton will start next season as a top-flight club for a 69th consecutive campaign, with only Arsenal currently on a longer run of consecutive seasons in the English top flight The celebrations continued into the Everton dressing room after the game
