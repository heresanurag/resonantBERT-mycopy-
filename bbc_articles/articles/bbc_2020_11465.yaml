  Good Morning Britain presenter Piers Morgan tweeted: "RIP Frank Bough, 87. Star of Grandstand, Nationwide and Breakfast Time. His career was ruined by scandal, but he was one of the great live TV presenters. Sad news."

  Astrologer Russell Grant, a regular on Breakfast Time, said Bough was "a great man to work with" and was "always there for advice and support".

