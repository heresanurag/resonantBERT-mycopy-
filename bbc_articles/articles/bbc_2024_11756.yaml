title: 'Lucy Letby trial: Switching off life support was ''hardest decision'' - mum
  - BBC News'
date: '2024-06-13'
section: England
url: http://www.bbc.co.uk/news/articles/cxrrvyw56zqo
content: |-
  Lucy Letby is said to have been "caught virtually red-handed" by a senior consultant paediatrician.

  Lucy Letby is being retried over the attempted murder of Baby K

  The mother of a newborn baby who was allegedly the victim of a murder attempt by Lucy Letby said deciding to switch off her daughter's life support was "the hardest decision of her life". In a witness statement read to Manchester Crown Court, the mother of the infant, known as Baby K, said she and her husband made the decision because they did not want her "to be suffering any more". The prosecution alleges Ms Letby tried to murder the baby by dislodging her breathing tube on 17 February 2016 at the Countess of Chester hospital, but does not claim she was responsible for her death.

  Baby K was born "extremely premature" and weighed just 1lb 8oz (692g). After she became unwell at the Countess of Chester within hours of her birth, she was transferred to Arrowe Park hospital in Wirral. In her statement, which was read to the court, Baby K's mother said she was lying awake in the family accommodation area at Arrowe Park in the early hours of 20 February when she said had the "strangest feeling which I cannot begin to describe". Her husband was also awake, she said, and they both went to see Baby K. She said: "As we walked into the room I could see the monitors and sats (oxygen saturation) readings were low. I knew straight away things weren't great. "The doctor confirmed the worst. I asked if it was just a waiting game now or if she was going to get better. We had a long conversation and she said what happens next was entirely our decision. "I remember saying to the doctor that she had been poked and prodded from the moment she was born. "Her tiny little delicate body had swollen up so much we didn't want her to be suffering any more.

  "We didn’t want to be informed that we'd lost our little girl by alarms on the machines going off. We didn't want to prolong things any more. "We made the decision together to switch off the machines and let her go. It was by far the hardest decision of my life. "One of the staff showed us to a family room where it was peaceful and quiet. Our daughter was wrapped in a blanket and was wearing a little hat. "Our daughter was in my husband's arms when she took her last breath and silently passed away."

  Lucy Letby was jailed last year for the murder of seven babies and the attempted murder of six others

  Within two hours of Baby K's birth, Ms Letby, originally of Hereford, was said to have been "caught virtually red-handed" by a senior consultant paediatrician. Jurors heard he had seen Ms Letby standing over the cot "doing nothing" as Child K's blood oxygen levels dipped and alarms were not sounding as they should have done. The prosecution alleges Ms Letby went on to interfere with Baby K's breathing tube twice more on the same night shift in an bid to create the impression with her colleagues that the infant was habitually dislodging her own tube. She died there three days later. The jury has been told about Ms Letby's convictions last year for the murder of seven babies and the attempted murder of six others.
