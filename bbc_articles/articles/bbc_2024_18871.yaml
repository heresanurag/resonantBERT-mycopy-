  Find out which part of Team GB won the most medals at this years Olympics

  How many Paris 2024 medallists come from your area?

  Team GB added 65 medals to their Olympics haul this year, beating their Tokyo total by one and creating moments that will go down in Olympics history. But where did all these medals come from across Great Britain and Northern Ireland? We have taken a deep dive into the stats to find out which nations and regions produced the most medal-winners this year, and which sports they conquered. So - which parts of Team GB triumphed, and which struggled to get off the starting blocks?

  As with our analysis of Team GB medals won between 1896 and 2020, we've followed the official Olympics rules where a team medal only counts once. To calculate regional success, we've split the medal by the number in the team. So, each person of a four-person relay wins 0.25 of a medal for their region. Each athlete's region or nation has been determined by their place of birth.

  Historically, London has topped the Team GB medals table, but this year the West Midlands led the way. Across the board, Team GB won the fewest gold medals since Athens in 2004. However, athletes such as 19-year-old climber Toby Roberts and trap shooter Nathan Hales meant the South East alone would have come 20th in the official Olympics medal table, with 3.5 golds.

  The South West won Team GB's first artistic swimming medal, with duet members Izzy Thorpe and Kate Shortman both hailing from Bristol. The duo, who have been swimming together since they were nine, won silver in the pool. He won a silver in the men's 200m individual medley and was part of the gold-winning men's 4x200m freestyle, bringing his Olympic medal total to eight, the most won by any Scot.

  The West Midlands was also the most successful part of Team GB when adjusted for population, winning 1.45 medals per one million people. All four of Team GB's canoe medals came from the West Midlands, although it's unlikely the athletes learned their craft on the canals of Birmingham.

  All of the medals from Wales-born athletes this year came from women's cycling events. Emma Finucane won two individual bronzes in the women's kieran and the individual sprint, and there were Welsh team members for the medal-winning women's team pursuit, madison and team sprint. Three medallists were born in Northern Ireland, swimmer Jack McMillan and rowers Rebecca Shorten and Hannah Scott. Shorten and Scott won silver in the women's four and gold in the women's quad sculls respectively. Belfast's McMillan, meanwhile, helped Team GB retain their Olympic 4x200m freestyle relay title, after racing in the heats although he was not selected to swim in the final.

  Several of the stars that captured sports fans' hearts heralded from the North. Bryony Page, who soared to victory in the women's trampolining, comes from the North West, as does 800m golden girl Keely Hodgkinson. In the relatively new sport of BMX freestyle, Keiran Reilly took the silver home for the North East.

  Yorkshireman Tom Pidcock had everyone holding their breath in the mountain bike cross country when he dramatically overtook France's Victor Koretzky to take gold. Yorkshire is also the birthplace of Team GB's only Taekwondo medallist this year, Caden Cunningham, who won silver in the men's +80kg.

  Other sports where Team GB only won one medal include weightlifting, with East Midlands-born Emily Campbell winning bronze in the women's 81kg, and boxing, with Lewis Richardson from the East winning bronze in the men's 71kg. Finally, not all Team GB medallists were born in the UK. Sky Brown, who was born in Japan, won bronze in the women's skateboarding, despite dislocating her shoulder a week before Paris 2024.
