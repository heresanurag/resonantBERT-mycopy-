content: |-
  The explosion at Treforest Industrial Estate was caught on a local brewery's CCTV.

  An explosion at Treforest Industrial Estate was caught on CCTV.

  Nearby Twt Lol brewery caught the blast that happened on Wednesday evening in Pontypridd, Rhondda Cynon Taf.

  South Wales Fire and Rescue Service and South Wales Police remain at the scene of the blaze.

  One person is still unaccounted for.
