title: Narwhal tusk hero a year on from London Bridge attack - BBC News
date: '2020-11-23'
section: General
url: http://www.bbc.co.uk/news/uk-55022920
content: |-
  It's almost a year since Darryn Frost helped to stop a man who was on the rampage, stabbing people.

  On 29 November 2019, a man with knives went on the attack in the London Bridge area.

  Phone footage from the day shows Darryn Frost fighting off Usman Khan with a narwhal tusk, to help end the attack.

  Khan, who was wearing a fake suicide vest, was then shot dead by police.

  A year on, Darryn spoke to BBC Breakfast about his memories of the day.
