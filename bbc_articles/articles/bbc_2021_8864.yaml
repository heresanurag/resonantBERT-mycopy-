  England are one win away from a first major men's tournament triumph since 1966 - and you can watch and follow all the action from Sunday's Euro 2020 final with Italy on the BBC.

  Last updated on .From the section European Championship

  Date: Kick-off: Venue:Coverage: Live on BBC One and iPlayer from 18:20. Listen to live commentary on BBC Radio 5 Live. Live text commentary, goal clips, report and highlights on the BBC Sport website and app.

  England are one win away from a first major tournament triumph since 1966 - and you can watch and follow all the action from the Euro 2020 final with Italy on the BBC.

  Sunday's match, which kicks off at Wembley at 20:00 BST, is live on BBC One and BBC iPlayer.

  Build-up starts from 18:20 for the biggest game for the Three Lions since the 1966 World Cup final.

  Former England striker Gary Lineker will be joined at Wembley by ex-England captain Alan Shearer and former Three Lions players Rio Ferdinand and Frank Lampard.

  Gabby Logan will be pitchside, and alongside her will be former England women's defender Alex Scott and World Cup and European Championship winner Jurgen Klinsmann.
  • None 55 years, 302 games & more than 140,000 miles - England's pursuit of final number two

  On commentary duties will be Guy Mowbray and former England midfielder Jermaine Jenas.

  Kelly Somers will also be at Wembley with all of the squad news and player interviews.

  BBC Radio 5 Live will have full match commentary from Wembley.

  Mark Chapman presents build-up from 18:00 and there is a special 606 with Alistair Bruce-Ball and Chris Sutton from 23:00.

  The BBC Sport website will have build-up to the final throughout Sunday followed by live text commentary, goal clips, highlights, report and reaction.
