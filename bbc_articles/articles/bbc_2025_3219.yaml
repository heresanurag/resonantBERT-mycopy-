title: US expects 'substantial progress' in peace talks with Ukraine - BBC News
date: '2025-03-10'
section: World
url: http://www.bbc.co.uk/news/articles/cy9dp5rr2x9o
content: |-
  Ukraine is under US pressure to accept a quick truce to end the war with Russia, with US-Ukrainian talks set to begin in Saudi Arabia.

  US expects 'substantial progress' in peace talks with Ukraine

  Washington expects "substantial progress" to be made during talks with Ukraine this week, according to a senior US diplomat. Intelligence sharing will be discussed and the US hopes to sign a deal on critical minerals at the talks in Saudi Arabia, Middle East envoy Steve Witkoff said on Monday. Witkoff, US Secretary of State Marco Rubio and National Security Adviser Mike Waltz are due to arrive in Jeddah for Tuesday's talks with their Ukrainian counterparts. "We're going over there with an expectation that we're going to make substantial progress," Witkoff told Fox News. On whether a minerals deal was imminent, he said "all the signs are very, very positive".

  US President Donald Trump has stepped up pressure on his Ukrainian counterpart Volodymyr Zelensky to accept his demands for a quick ceasefire with Moscow - but without any immediate pledge of a US security guarantee. Ten days ago the two publicly clashed at the White House, with Trump claiming Zelensky was not ready to end the fighting. Russian President Vladimir Putin launched a full-scale invasion of Ukraine in February 2022, and Moscow currently controls about 20% of Ukrainian territory.

  Witkoff said that among the issues to be discussed in Saudi Arabia were security protocols for the Ukrainians and territorial issues. He said the US administration had never shut off intelligence sharing for anything defensive that Ukraine needed, while earlier on Monday Trump told Fox News that he had "just about" lifted the intelligence sharing pause on Ukraine. A senior US state department official said that the Trump administration believes Ukraine's leadership is "ready to move forward" with the US's demand for a ceasefire process with Russia. "The fact that they're coming here at senior levels is a good indication to us that they want to sit down and they're ready to move forward," said the state department official, speaking on condition of anonymity in order to discuss the talks with Ukraine in Jeddah. While Zelensky has come to the Gulf kingdom to meet Crown Prince Mohammed bin Salman, he is not expected to play any formal role in the talks with the Americans. The Ukrainian team will be represented by Zelensky's head of office Andriy Yermak, the country's national security adviser as well as foreign and defence ministers. Zelensky wrote on social media on Monday that Ukraine "has been seeking peace since the very first second of the war, and we have always said that the only reason that the war is continuing is because of Russia". A short while later, during a daily briefing, Kremlin spokesman Dmitry Peskov said that it was important to determine whether Ukraine really wanted peace or not. Zelensky has on numerous occasions been accused by US officials of not wanting peace.

  The Ukrainian leader has been under strong US pressure to make concessions ahead of any peace talks, while he has been pushing for firm security guarantees for Kyiv, stressing that Putin violated previous ceasefire deals. On Friday, Trump issued a rare threat of further sanctions against Moscow in a push for a deal. Russia is already heavily sanctioned by the US over the war. Trump said he was contemplating the move because "Russia is absolutely 'pounding' Ukraine on the battlefield right now".

  Soon after the White House row, Zelensky expressed regret about the incident and tried to repair relations with the US - the country's biggest military supplier. Witkoff later said that Trump had received a letter from Zelensky that included an "apology" and "sense of gratitude". The envoy said that in Saudi Arabia the US team wanted to discuss a "framework" for peace to try to end the Russia-Ukraine war. A major minerals deal - derailed because of the row - is also reported to be back on the agenda in Saudi Arabia. Ukraine has offered to grant the US access to its rare earth mineral reserves in exchange for US security guarantees.

  Ukrainian MP Oleksiy Goncharenko said he believed Zelensky needed to secure the US-Ukraine relationship "at any cost" during his trip to Saudi Arabia, while making clear "what our red lines are". "Otherwise, if there is a deal outside of these terms, then we will just say no, that's all. Because it's our army fighting," he told BBC Radio 4's Today programme.

