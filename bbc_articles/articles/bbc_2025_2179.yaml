  In his speech, Reed had also outlined plans for a 25-year farming roadmap and food strategy, which would put food production at its core and make farm businesses more resilient to challenges such as severe flooding, drought and animal disease. He said it would ensure farming is a "sector which recognises restoring nature is not in competition with sustainable food production, but is essential to it". As farmers outside the conference centre sounded their tractor horns, he announced measures including extending the seasonal worker visa scheme for five years, support for precision breeding and new technology. He also announced new requirements for government catering contracts to favour "high quality, high welfare products that British producers are well placed to meet".

  Earlier in the day, a multi-generational farming family - Martin Towler, his daughter and son-in-law, Hazel and Tom Church, and their five-year-old son Bertie - went to the Treasury to handover a collection of pre-loved farming toys donated by farmers who might be hit by the government's proposed changes to agricultural inheritance tax. The family have been farming Scald End Farm, a mixed beef and sheep farm in north Bedfordshire, since the 1940s but they all now also have to work off farm to supplement their income. They say the impact of the proposed inheritance tax changes will leave them facing a £400,000 bill and the prospect of selling off so much of the 210-acre farm that it would become unviable as a business.

  Farmers concerned that government changes to inheritance tax rules will make many businesses unprofitable gathered outside the conference

  The Towler and Church farming family from north Bedfordshire travelled to London to raise their concerns over changes to agricultural inheritance tax rules

  Mr Church said he hoped the government would listen to farmers' concerns and try to find a compromise on its inheritance tax policy. He told the BBC the changes, as currently proposed, would have a "detrimental" impact on the family's ability to run a profitable business. "We are struggling at the moment as it is. There's no two ways about that," he said. "Farming is incredibly low return on investment when you look at the asset values of the land and the income generated. "If we are saddled with further debt through death - is it viable? Selling land is going to make it even less viable."

  Shadow environment secretary Victoria Atkins has said the Conservatives would reverse the inheritance tax on farmers "straight away". During Tuesday's conference in Westminster - the first time it has been held outside Birmingham for years - Reed, took questions from the audience. There was clear anger among those questioning him on the tax changes and he was told many older farmers "were wishing their lives away" and now felt they would benefit their families by dying before the 2026 tax change. Reed said he would not comment on individual circumstances. He pointed out farmers would still have to pay at half the rate of others and would have ten years to do so.

