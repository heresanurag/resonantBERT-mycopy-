title: Environment Secretary Steve Reed speech disrupted by farm inheritance tax protesters
  - BBC News
date: '2025-02-25'
section: Science & Environment
url: http://www.bbc.co.uk/news/articles/c2ljdvqegkeo
content: |-
  The environment secretary is met with blaring tractor horns as he tries to win over farmers.

  Protesters stood in front of Reed as he spoke on stage at the conference

  Farmers protesting at government changes to agricultural inheritance tax rules have briefly disrupted a minister's speech at a national conference. Environment Secretary Steve Reed was met with horns from tractors parked outside and protesters who silently unfurled banners in front of him as he outlined farming reforms, which included plans to focus on food production and make the industry more resilient to disruption. Reed told the hundreds gathered at the National Farmers' Union (NFU) conference that he could not give them "the answer many of you want on inheritance tax" but he understood the strength of feeling in the room. NFU president Tom Bradshaw told the annual conference on Tuesday the inheritance tax changes were "morally wrong and economically flawed".

  One banner read 'How high up your "pecking order" is eating Steve?'

  Under the government's planned changes, from April 2026, inherited agricultural assets worth more than £1m, which were previously exempt, will be liable to the tax at 20% - half the usual inheritance tax rate. Other allowances could mean a couple who are married or in a civil partnership could pass on a farm worth as much as £3m. The government has previously said that the changes will only impact the wealthiest 500 farms each year, a number disputed by farmers unions which estimate up to 70,000 farms could be affected overall. Mr Bradshaw, whose speech was also briefly interrupted by two protesters who appeared to be urging people to be vegan, said the government had broken promises made before the election and had increased the mental health pressures on farmers, calling for it to correct the tax policy "urgently'. "We will fight this family farm tax until ministers do the right thing," he said. "Frankly, this government needs a reset moment with farming, where they face up to the reality of how much the industry is struggling." Many farmers argue that while they are asset rich, for example in terms of their land or livestock, they are cash poor and the proposed changes would mean they would have to sell up in order to pay the tax.

