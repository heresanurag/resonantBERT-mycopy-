title: Emergency crews tackle flood waters in rescue operations - BBC News
date: '2024-11-26'
section: General
url: http://www.bbc.co.uk/news/videos/cly27v2y0eno
content: |-
  More than 100 flood warnings are in places across the country, with homes, businesses and roads being impacted.

  Flooding in the wake of Storm Bert has brought havoc to parts of the UK.

  More than 100 flood warnings are in places across the country, including a "danger to life" warning in Northamptonshire.

  Aerial footage filmed in some areas across the UK shows how vast the flooding is.

  Further rainfall warnings are still being issued in some places.
