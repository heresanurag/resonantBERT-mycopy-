content: |-
  Julian Assange is with his family in Australia, after walking free from a US court in Saipan.

  Wikileaks founder Julian Assange has landed in Australia, after walking free from a US court in Saipan.

  He hugged his wife and father at the airport in Canberra, as a small group of supporters cheered his arrival.

  Speaking shortly after being reunited with her husband, Stella Assange said he would speak when he was ready, but needed time.
