title: Thousands join Tommy Robinson march in London - BBC News
date: '2024-07-28'
section: London
url: http://www.bbc.co.uk/news/articles/ce4qd4e4e1vo
content: |-
  Police said a major operation was in place to "keep the peace" between protesters and counter-protesters.

  People waved Union and St George's flags at the Tommy Robinson rally in Trafalgar Square

  Thousands of supporters of the far-right activist Tommy Robinson have filled Trafalgar Square in central London after a march. He claimed the event was the "biggest patriotic rally" the UK had ever seen. A counter-protest by Stand Up To Racism and former Labour leader Jeremy Corbyn's Peace & Justice Project also took place in London. The Metropolitan Police said a major operation was in place to "keep the peace" between the two protests, amid fears of serious disruption. A Trans Pride event was also held in the capital.

  The Trans Pride march gathered near Oxford Street in central London

  Amid a sea of England and Union Jack flags, Tommy Robinson's supporters listened to speeches attacking immigration and promoting "patriotism". He received a loud cheer in Trafalgar Square when he asked the crowd how many of them had voted for Reform at the general election. He revealed he had asked Nigel Farage to speak at the protest, but said the Reform leader had told him he "couldn't make it". At the anti-racist counter-protest nearby, Jeremy Corbyn gave a speech, and demonstrators held placards reading "no to racism, no to hatred" and chanted "we won't be silent".

  The Metropolitan Police said five arrests had been made:
  • None Two men were arrested on suspicion of "GBH-level [grievous bodily harm] assault" after a participant in the Stand Up To Racism demonstration was assaulted in Victoria Embankment Gardens, the Met said. The victim sustained a head injury and was given first aid by officers
  • None A member of the public was arrested on suspicion of assaulting a steward at Trans Pride, and another man was arrested on suspicion of assaulting an emergency worker and a racially aggravated public order offence after a police officer was kicked
  • None One man was arrested on suspicion of criminal damage and a racially aggravated public order offence after allegedly snapping a Palestinian flag and making a racially abusive remark. The Met Police has not said whether the five arrested people were participants in any of Saturday's protests. Ahead of the marches, police barricaded Whitehall and mobile units were parked in side streets around Westminster. One thousand officers were on duty and Scotland Yard used powers under the Public Order Act to place strict conditions on the timing and location of both protests. The Met said officers would remain on duty after the marches had finished. Chief Superintendent Colin Wingrove, who is in charge of the weekend's operation, said police would "intervene decisively" to deal with protesters who broke the conditions. He said: "Our first priority is to keep the peace to ensure that those exercising their right to lawful protest can do so safely."

  Anti-racist counter-protesters marched from Russell Square to a rally in Whitehall

  Tommy Robinson, whose real name is Stephen Yaxley-Lennon, faces contempt proceedings at the Royal Courts of Justice on Monday after being accused of continuing to talk online about a libel case he lost in 2021.
