title: 'HS2: Grant Shapps keeping ''open mind'' on route''s future - BBC News'
date: '2019-09-03'
section: General
url: http://www.bbc.co.uk/news/business-49569453
content: |-
  The transport minister will wait for the result of another review before deciding if the project continues.

  Transport Minister Grant Shapps says he will keep an "open mind" over the future of the HS2 high-speed railway until another review into the project is complete.

  The review will be chaired by Douglas Oakervee, a civil engineer and former chairman of HS2.
