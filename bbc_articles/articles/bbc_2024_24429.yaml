title: 'Greenisland: Boys aged 10 and 11 charged over church arson attack - BBC News'
date: '2024-09-09'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/czjyx942pj9o
content: |-
  Three boys, one aged 10 and two aged 11, have been charged after a fire at a church in Greenisland.

  Firefighters released an aerial image showing the damage to the church buildings

  Three boys, two aged 11 and a 10-year-old, have been charged with arson after a large fire severely damaged a church in County Antrim. The Church of the Holy Name, in Greenisland, was set on fire on Sunday, 1 September. The blaze also spread to the parish hall at the Church of Ireland building on Station Road. The police said a significant amount of damage was caused to both buildings.

  It is believed the fire started when bins were deliberately set alight near the church

  At the height of the blaze, 49 firefighters and nine fire appliances were involved in the operation to bring it under control. The Northern Ireland Fire and Rescue Service (NIFRS) said on Monday that they thought bins had been set alight before the flames spread to the nearby building. No one was injured by the blaze. The church had been celebrating its 70th anniversary on the weekend of the attack. The three boys are due to appear at Belfast Youth Court on Monday 30 September.

  Firefighters were called to the scene at 20.45 BST on Sunday 1 September
