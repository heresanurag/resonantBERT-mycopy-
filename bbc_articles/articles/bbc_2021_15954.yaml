content: |-
  Tornadoes have ripped through several states killing dozens of people, authorities say.

  Workers were trapped inside an Amazon warehouse in Illinois after its roof collapsed in deadly storms.

  Tornadoes have wreaked havoc across several states killing dozens of people.

  The warehouse in Edwardsville in southern Illinois was damaged during a tornado on Friday night.
