content: |-
  Chris Ward's trainer cleaning business in Glasgow began as a hobby more than a decade ago.

  The trainer market is worth billions of pounds globally.

  A growing number of people are eager to get their hands on the latest styles and drops - and also to keep their most-prized footwear in pristine condition.

  Chris Ward's company Box Fresh Glasgow cleans and repairs trainers for customers across Scotland.

  He told the BBC that demand for shoe cleaning services has been on the rise in recent years.

  Read more: Meet the Scots making money from trainers
