title: Verified video shows Air India plane descending and moment of crash - BBC News
date: '2025-06-12'
section: General
url: http://www.bbc.co.uk/news/videos/cy4kxq9e9gqo
content: |-
  A plane bound for London Gatwick carrying 242 people has crashed after taking off from Ahmedabad in India.

  A video showing the moment a London-bound Air India flight crashed in India is now verified.

  BBC Verify has geolocated Air India flight AI171 to a location in Ahmedabad which is consistent with the flight path between the runway and the crash site.

  The appearance of the aircraft in the footage is consistent with an Air India plane.
