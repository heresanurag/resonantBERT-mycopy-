  The government also said it wanted to "explore ways in which new and upcoming songwriters [and] composers" could be paid more fairly.

  The MPs' report noted writers received particularly poor revenues from streaming services, after pop composer Fiona Bevan revealed she had earned just £100 for a track on Kylie Minogue's number-one album Disco.

  "Right now, hit songwriters are driving Ubers," she told the inquiry. "It's quite shameful"

  In its response, the government said it would work with Credit's Due - an initiative launched by Abba's Bjorn Ulvaeus - to ensure writers receive proper credit and remuneration for songs they worked on.

  It also agreed that the role of curators who make playlists on services such as Spotify and Apple Music warranted further investigation.

  While the select committee recommended intro using a "code of conduct" to avoid bribes and favouritism, the government said it would gather more evidence to decide "the case for further intervention".

  Mr Knight welcomed the government's response, saying: "Our inquiry into music streaming exposed fundamental problems within the structure of the music industry itself.

  "It is testimony to all those who gave evidence to our inquiry that the government has acknowledged our report as a 'key moment' for the music industry.

  "Within days we expect to see the government's own research published into the pitiful earning of creators in this digital age and hope it will corroborate what artists and musicians told us.

  "We will be monitoring the outcome and what tangible steps the government pledges to take to redress this unfairness and reward the talent behind the music."

  The BPI said: "We welcome government's recognition of the need for a better understanding of the complexity of the music-streaming market".

  Working together to address areas of concern was "preferable to legislative intervention", it said, warning new regulations could jeopardise the industry's "hard won return to growth after years of decline".

