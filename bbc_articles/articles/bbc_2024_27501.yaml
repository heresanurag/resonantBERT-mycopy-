  Mother in CCTV plea after theft from baby's grave

  Tasha Morris lost her baby, Oscar, in August following a crash

  A pregnant woman whose baby son died after a serious car crash forced his premature delivery wants CCTV to be installed at a cemetery following the theft of ornaments from his grave. Tasha Morris, whose son Oscar died in August, was left angry after finding his final resting place in Leominster cemetery, Herefordshire, was targeted. Ms Morris has called for security to be stepped up at the site to help catch those who vandalise or steal from graves in the future. However, despite being "incredibly saddened" to hear about what happened, Herefordshire Council said it had no plans to install CCTV and would "continue to respect the privacy of people visiting graves".

  Ms Morris was seriously injured in the crash, leading her to need urgent abdominal surgery, but Oscar died during the crash - he was delivered during the operation. "Because I was so injured and ill myself, it was really hard to be able to grieve the loss of Oscar," she said.

  She said the grave had recently been decorated with a white heart and a blue bear floral arrangement, but three days later she found they had disappeared. "My heart just sank when I realised they were missing," she said. "I was so angry and upset that someone would steal from a baby that hadn't done anything to anyone." She added: "I'm angry because a cemetery is a very precious place with a lot of sentimental items, and a lot of people that were loved and the fact there are no cameras to protect such precious places is crazy."

  Ms Morris said she was worried it would happen again if the cameras were not installed However, the council said it did not have plans to install cameras, preferring instead to respect people's privacy. "We are incredibly saddened to hear that a theft may have taken place in Leominster cemetery," a spokesperson said. "We completely appreciate the impact of these actions and our thoughts are with the family and friends at this upsetting time. "We have no plans to install CCTV in these locations and will continue to respect the privacy of people visiting their loved ones graves."

