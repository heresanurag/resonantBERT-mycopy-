title: Derry woman injured in suspected gas explosion in Kylemore Park - BBC News
date: '2023-01-14'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-64275808
content: |-
  A woman is taken to hospital by ambulance after the blast in Kylemore Park in Londonderry.

  A woman has been taken to hospital after a suspected bottled gas explosion at a house in Londonderry.

  It happened in Kylemore Park at about 11:50 GMT on Saturday.

  The woman was treated by paramedics at the scene and then taken to Altnagelvin Area Hospital in the city.

  Sinn Féin councillor Conor Heaney, who has been to the scene, said the house was "extensively damaged and not structurally sound".

  It is understood the address is not connected to the mains gas network.

  Cllr Heaney said the woman who was injured was elderly.

  "Neighbours broke down her door and administered first aid and removed her from the property," he told BBC News NI.

  "A nurse across the street helped her."

  Damage was caused to the front and back of the house

  Emergency services left the scene at about 14:00.

  Social Democratic and Labour Party councillor Shauna Cusack said her thoughts and prayers were with the woman's family.
