title: '''Miracle baby'' born to mum diagnosed with cancer - BBC News'
date: '2022-12-22'
section: General
url: http://www.bbc.co.uk/news/uk-64067372
content: |-
  Heidi's mum was diagnosed with cancer while pregnant just months after dad James was too.

  A couple, who were diagnosed with cancer within months of each other, have praised the consultant who helped get their baby here safely.

  James was diagnosed first and then months later his wife Bethany was diagnosed while she was pregnant.

  Bethany's treatment at the Worcestershire Royal Hospital had to take place during her pregnancy with daughter Heidi.
