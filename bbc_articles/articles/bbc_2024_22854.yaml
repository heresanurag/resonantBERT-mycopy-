title: Cardiff City fire manager Erol Bulut - BBC Sport
date: '2024-09-22'
section: Cardiff
url: http://www.bbc.co.uk/sport/football/articles/cvgw152jg2lo
content: |-
  Cardiff City have fired manager Erol Bulut with the Bluebirds bottom of the Championship.

  Cardiff City have sacked manager Erol Bulut, with the Bluebirds bottom of the Championship. Cardiff have picked up just one point from six leagues games and have scored just one goal - their worst start to a season in 94 years. First-team coach Nikolaos Karydas has also left, with Omer Riza taking charge of the club on an interim basis. Bulut's final game was Cardiff's 2-0 home defeat against Leeds United on Saturday. The Bluebirds have also lost to Sunderland, Burnley, Middlesbrough and Derby County, with their only point coming in the south Wales derby against Swansea City.

  After a relegation battle in 2022-23, Cardiff improved in Bulut's first year in charge, finishing 12th. The 49-year-old was rewarded with a new two-year deal in June, which was set to run until the end of the 2025-26 season. But a calamitous start to this season has seen the Turkish boss sacked after just eight games in all competitions. "The board of directors wish to thank Erol for all of his hard work and wish him well for the future," said a club statement. The Bluebirds will now look to appoint a 12th permanent manager in the 14 years that Vincent Tan has owned the club.
