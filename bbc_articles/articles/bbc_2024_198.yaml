title: 'Rwanda bill latest: Lee Anderson and Brendan Clarke-Smith resign over vote
  - BBC News'
date: '2024-01-16'
section: UK Politics
url: http://www.bbc.co.uk/news/live/uk-politics-67998491
content: |-
  Voting took place in the Commons as Rishi Sunak hopes to revive a plan to send some asylum seekers to Rwanda.

  This is the biggest rebellion Rishi Sunak has suffered.

  In fact, it’s the biggest rebellion the government has suffered for some years.

  Around 60 of his own MPs defied the prime minister to back changes to toughen up the proposed new law on the Rwanda policy.

  So where does it leave him?

  The key test comes tomorrow when the whole bill – as opposed to individual amendments – is voted on. This is called third reading. It’s the final vote in the Commons before the bill goes to the House of Lords when peers have the chance to suggest changes.

  If the government loses at third reading, the whole bill will be defeated. That would be a major blow for the prime minister and almost certainly mean asylum seekers won’t be sent to Rwanda this side of an election. That is not what the rebel MPs from the right of the party want.

  So the big question is, will enough of the 60 MPs who defied Rishi Sunak today, do the same when the stakes are much higher tomorrow?

  Ministers seem confident they can win tomorrow. But several of those Conservative MPs who voted today to toughen up the bill have said they will rebel again tomorrow if the government doesn’t suggest their own changes.
