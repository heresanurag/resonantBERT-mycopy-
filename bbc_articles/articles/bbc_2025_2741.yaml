  The Conservative leader speaks to the BBC after she told party staff they needed to do better.

  Badenoch told Tory staff they need to do better

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Kemi Badenoch quizzed about reports she told party staff to improve

  Conservative leader Kemi Badenoch has defended her management style, telling the BBC it "isn't just about telling everybody how great they are". Earlier this week some Conservative party workers were left unhappy after Badenoch used an all-staff call to say they needed to improve. Asked about reports she accused some of them of not pulling their weight, she said: "I believe that everyone who works for the Conservative Party need to be fully dedicated to the mission. "If we feel there are people who are doing a great job we will tell them - and when they aren't, we will do the same."

  Asked if she was suggesting some of her staff were useless, Badenoch said: "No, that's not what I said at all. We want to have a high-performing organisation. "Leadership isn't just about telling everybody how great they are - sometimes it is about telling them how to improve. "Quite frankly, one of the thing we are seeing in this country is millions of people out of work and not enough people pulling their socks up and getting back on their feet. "We need sometimes to have tough words when people aren't doing well and words of praise when they are doing well. That's exactly what I did." On Tuesday, the Guido Fawkes website reported, external that Badenoch had told staff at Conservative Central Headquarters they "must do better". Pressed on whether she was panicking about the challenge posed by Nigel Farage's Reform UK party, Badenoch said it was not the first time the Conservatives had had low poll ratings. "We need to make sure we understand what is going wrong," she said. "That is we have just been kicked out of government - the public aren't going to rush back to us just because Labour are doing badly, we need to rebuild trust with the public. We need to make sure we are fit and ready." During her time in politics, Badenoch has gained a reputation for being blunt - but speaking to BBC Newscast last year before becoming leader, she said she might have to tone down her approach. Asked about her manner, she said: "I just think I'm saying something that I wouldn't mind hearing back, so I treat people how I treat myself and, you know, I've had even some of my advisers saying, 'Why did you say that?' "I have to be mindful that I have a higher tolerance for things than others, and I think part of being a leader is being able to calibrate so that you can help manage other people."
