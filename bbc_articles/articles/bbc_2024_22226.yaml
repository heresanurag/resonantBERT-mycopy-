title: 'Carmarthen: Drug dealing woman jailed after 16 months on run - BBC News'
date: '2024-09-17'
section: Wales
url: http://www.bbc.co.uk/news/articles/clyl2rg31j9o
content: |-
  Lynne Leyson was arrested on her return to Wales, having fled the area in a bid to evade justice.

  Lynne Leyson was arrested by Dyfed-Powys Police after spending 16 months on the run across the UK

  A woman who went on the run for 16 months after being convicted for her part in a drug dealing operation has now been jailed. Lynne Leyson, 53, fled her home in Carmarthen after being found guilty of conspiracy to supply cocaine, conspiracy to supply cannabis, and possessing criminal property at a hearing at Swansea Crown Court in May 2023. She failed to appear at her sentencing hearing at Swansea Crown Court on 21 July 2023 and was sentenced to nine years in prison in her absence at a hearing on 15 September 2023. Officers from Dyfed-Powys Police arrested Leyson at Pibwr Farm in Carmarthen on Monday, having returned to the area on Sunday evening, the court heard.

  Leyson was one of six people arrested following a warrant at the farm in October 2021, when officers found 592g of cocaine with a street value of between £47,760 and £60,200 and 1.4kg of cannabis with a street value of approximately £15,615. They also found £17,190 in cash along with a semi-automatic pistol. Other members of Leyson's family were jailed in 2023 for dealing cocaine and cannabis. They had used guns, knives and doberman dogs to threaten villagers who were suspicious of goings on at the remote farm in Capel Dewi.

  Samson Leyson and father Stephen Leyson were jailed for dealing cocaine and cannabis in July 2023

  Lynne Leyson appeared at Swansea Crown Court on Tuesday, where she was committed to prison to start her sentence. She will next appear at Swansea Crown Court on 4 October. The court heard Lynne Leyson had travelled extensively across the UK during her 16 months on the run. Dyfed-Powys Police said significant resources had been used in the hunt for Leyson, with a wanted appeal and an appeal on Crimewatch. The force said a 26-year-old woman was also arrested on suspicion of assisting an offender and has been released on police bail pending further enquiries.

  Leyson's husband Stephen, 56, and his son Samson, 25, were jailed for a total of 17 years at Swansea Crown Court in July 2023, after police carried out a raid at the farm. Stephen Leyson was sentenced to 11 years for possession of a firearm and conspiracy to supply Class A and Class B drugs, while Samson Leyson was given six years for conspiracy to supply Class A and Class B drugs. Two associates, Richie Coleman and Emma Calver-Roberts, of Vetch Road, Pembroke, both pleaded guilty at a previous hearing to conspiracy to supply Class A and Class B drugs. Coleman was sentenced to two years and four months while Calver-Roberts was given a two year sentence for conspiracy to supply cocaine, suspended for two years. For conspiracy to supply cannabis, Calver-Roberts was given a concurrent suspended sentence of eight months. She was also ordered to undertake a 30 day rehabilitation programme, along with 150 hours of unpaid work. A third associate, Andrew Jenkins, of Mount Pleasant, Swansea, was sentenced to nine months for conspiracy to supply Class B drugs.

  Cocaine and cannabis was found at the farm

  Detective Chief Inspector Rhys Jones, who was leading the search for Lynne Leyson, said her arrest showed "our determination to find those who think they can evade justice". He thanked officers "for their commitment, dedication, support, and persistence in bringing this element of the investigation to a successful conclusion". DCI Jones also thanked members of the public for their assistance and information provided over the last 16 months, "which has been greatly appreciated". He said this would "send a strong message that the activities of those individuals linked to organised crime groups operating within the area of Dyfed Powys will not be tolerated, and that they will be brought to justice".
