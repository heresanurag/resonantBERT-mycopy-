content: |-
  It comes as Boris Johnson is quizzed by MPs on the government's coronavirus response.

  Brazil's variant: Two 'spike' changes flagged up

  As MPs have been mentioning today - a coronavirus variant has been found circulating in the Amazonas state of Brazil, and was picked up in Japan in travellers from the region. It’s different from the UK and South African variants, but it contains common mutations - two changes to the virus’ "spike" in particular which have been flagged as potentially making the virus more infectious. This is not going to be the last mutation we hear about. At the moment changes are mainly being picked up in areas that do lots of genetic tracking of the virus - it’s almost certain there are other mutations already circulating unseen in other parts of the world. And the virus will continue to mutate - it’s just a question of how, how much and how fast. For now there’s no evidence the virus is becoming more dangerous - but if more people catch it then, left unchecked, more will potentially become ill or die. But the vaccines, which target several different areas of the virus’ spike, should still work - though that’s something that scientists the world over will be monitoring very closely.
