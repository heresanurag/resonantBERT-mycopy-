  • None Tottenham have conceded twice in all of their four matches under Mourinho in all competitions - they only had a run of conceding 2+ goals in four consecutive matches once under Mauricio Pochettino, doing so in February and March 2015.

  Manchester United are next in action against Manchester City at Etihad Stadium on Saturday, 7 December (17:30 GMT). Tottenham are at home to Burnley on the same day (15:00).
