  Who impressed for England in Thomas Tuchel's second game as head coach against Latvia? Alex Howell rates the players - and you can too.

  Who can be 'a real asset'? England player ratings v Latvia

  Thomas Tuchel's England eased past Latvia 3-0 in a World Cup qualifier at Wembley for the new head coach's second successive win. Football news reporter Alex Howell rates how the players performed on Monday - and you can see how BBC Sport readers rated them at the bottom of the page too.

  Jordan Pickford: Hardly called into action and had just one shot to save. 6 Reece James: Made his first start for England since September 2022 and capped it with a free-kick of the highest quality. The Chelsea captain attacked well and linked up nicely with Morgan Rogers and Jarrod Bowen, showing that if he can stay fit he can be a real asset for the Three Lions. 8 Marc Guehi: A mix-up with Pickford nearly led to a goal for Latvia. It wasn't Guehi's best night but he still has lots of credit in the bank from his displays at Euro 2024 - although it seems like he is going to have to win Tuchel around. 5 Ezri Konsa: A hard night to judge the Aston Villa centre-half with little for him to deal with. Looked composed once again and had a good chance saved by Latvia keeper Krisjanis Zviedris. 6 Myles Lewis-Skelly: The 18-year-old stepped into midfield more than he did on his England debut on Friday and looked comfortable, just as he does for Arsenal. Took a lot of responsibility on just his second appearance and can be very happy with his start to international football. 7 Declan Rice: A solid night. Positioned himself well as England's only defensive midfielder, something he does so successfully it is often taken for granted. Also provided a second assist in two games for Harry Kane. 7 Morgan Rogers: Started his first match for his country in an unfamiliar deeper role as Tuchel looked to use his dribbling ability to progress the ball. Looked good and injected pace into England's play when the tempo slowed. Gives his manager a different option against teams who defend in a low block. 8 Jude Bellingham: The Real Madrid man will always show quality and make things happen for England, but this wasn't his best night. Lucky to avoid a second yellow card for a second-half tackle and then substituted after 67 minutes. 6 Jarrod Bowen: Showed plenty of effort, but it didn't quite click for the West Ham forward. He is a quality player, but has to take his chances when given them in an area of the pitch where England have lots of options. Taken off after 60 minutes. 5 Marcus Rashford: Looked sharp when he had space to dribble with the ball. Tuchel used him on both wings and his pace was a threat all evening. His link-up with Bellingham was one of the positives of the game and this international window. 6 Harry Kane: A quiet night up against three centre-backs but scored another goal to make the last 20 minutes of the game comfortable for England. 7

  Eberechi Eze: Introduced on the left wing with 30 minutes to go. As comfortable as always on the ball and scored his first England goal. 7 Phil Foden: Brought on in his favoured number 10 role and provided an assist for Eze. 6 Jordan Henderson: Replaced Rice in the heart of England's midfield and offered a calm presence as Tuchel's side cruised to a win. 6 Curtis Jones: Like Henderson, Jones kept the ball tidily enough in midfield with the game already won. 6 Kyle Walker: Little to do defensively after coming on as England looked to add more goals. 6

