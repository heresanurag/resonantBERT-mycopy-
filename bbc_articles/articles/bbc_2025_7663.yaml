title: Final Glastonbury Festival resale tickets sell out in 20 minutes - BBC News
date: '2025-04-27'
section: Somerset
url: http://www.bbc.co.uk/news/articles/c9346wzgr74o
content: |-
  US pop star Olivia Rodrigo, British band The 1975 and legend Neil Young will headline the festival.

  The world-famous festival returns to Worthy Farm in June

  The final batch of resale tickets for Glastonbury Festival have sold out in 20 minutes after "incredible demand". The general admission tickets for the world-famous event in Somerset were released at 09:00 BST on Sunday, and the festival announced on X they were gone by 9:20 BST. Those who missed out on buying tickets last November were given two more chances to buy them this week, in the annual coach and general resales. Coach resale tickets sold out in about 30 minutes on Thursday. US pop star Olivia Rodrigo, British band The 1975 and rock legend Neil Young will headline the festival this summer.

  Writing on X, Glastonbury Festival said: "On a morning of incredible demand, all of the tickets in today's resale have been sold. "Thank you to everyone who bought one, and sorry to those who missed out." The cost of a ticket rose from £355 per person to £378.50 from last year, including a £5 booking fee. The number of tickets available for the resales depended on the number of people who did not pay the full price for their ticket after putting down a £75 deposit in November.
