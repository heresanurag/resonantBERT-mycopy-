  • None The areas you don't see at Glastonbury Festival The festival will take place at Worthy Farm between 25 June and 29 June. Among the many acts performing at the festival will be five-time Brit award winner Charli XCX, Scissor Sisters and Rod Steward who will play the Sunday afternoon "legend slot". After this summer, the event will take a "fallow year" before returning in 2027.

