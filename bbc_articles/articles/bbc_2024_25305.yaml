title: Community 'rallies' after boy, 7, dies in Benwell house blast - BBC News
date: '2024-10-17'
section: Tyne
url: http://www.bbc.co.uk/news/articles/c1d5lrgw1p1o
content: |-
  A local vicar says the people are in shock but are "coming together" to support each other.

  An investigation is under way to establish the cause of the explosion which also destroyed three houses

  A community left "devastated" by a house explosion which killed a seven-year-old has rallied to offer support to help those affected, a vicar has said. The blast, which also left six people in hospital, happened in Violet Close in Benwell, Newcastle, at about 00:45 BST on Wednesday. The Reverend Chris Minchin of Benwell and Scotswood Team Parish, said people were in "shock", but had been making donations, including baby clothes, because a lot of young families had been affected. An investigation is under way to establish the cause of the explosion which also destroyed three houses.

  An evacuation centre was also set up nearby and the Red Cross gave out mobile phone chargers and food. The West End Women and Girls Centre also opened up offering food and a "warm welcome".

  This video can not be played To play this video you need to enable JavaScript in your browser. Eyewitnesses told the BBC they heard a "very loud bang" and saw a "bright flash"

  The vicar said: "Everyone is really tired, they have been up all night, it's been tough. "People are just starting to talk, nobody can prepare mentally or spiritually for something like that. "There was a busyness before. It is only hitting people now." He said many people caught up in the explosion had to leave their homes in their pyjamas "grabbing" pets as they fled.

  A number of residents had to leave their homes and stay in hotels

  A number of residents had to be put up in hotels by Newcastle Council while others stayed with family and friends. The Reverend Minchin said St James's Church in Benwell Lane would be open for prayers and candles would be lit for those affected. The council has confirmed the house was a council-maintained property.

  This video can not be played To play this video you need to enable JavaScript in your browser. Police say the seven-year-old boy died at the scene

  Council Labour leader Karen Kilgour said news of the boy's death had been "heart-breaking". The authority had been working with the local community "to establish a rest centre to provide shelter and immediate support to those who have been displaced from their homes", she said.
