title: Trains stop for one minute to remember Stonehaven crash victims - BBC News
date: '2021-08-12'
section: NE Scotland, Orkney & Shetland
url: http://www.bbc.co.uk/news/uk-scotland-north-east-orkney-shetland-58183508
content: |-
  Three people died when the 06:38 Aberdeen to Glasgow service crashed into a landslide near Stonehaven a year ago.

  Rail services across Scotland stopped for one minute at 09:43 to remember those who died in a train crash southwest of Stonehaven a year ago.

  People were asked to observe a minute's silence at railway stations across the country.

  If safe to do so, train services came to a halt in memory of the three men who died on 12 August last year.

  Brett McCullough, Donald Dinnie and Chris Stuchbury died in the Stonehaven crash in Aberdeenshire last August

  Six other people were injured when the 06:38 Aberdeen to Glasgow service crashed into a landslide at Carmont, south of Stonehaven, caused by heavy rain.

  A memorial plaque was unveiled at a private ceremony attended by the families of those who died.

  A full report into the crash is expected in the autumn. However, Network Rail's interim report found that the train "struck a pile of washed-out rock and gravel before derailing".

  The Rail Accident Investigation Branch has said there was "near-continuous heavy rain" in the area between around 05.50 and 09:00 on the day of the crash, which caused "significant flooding".

  The 51.5mm (2in) of rain that fell in this period was almost 75% of the monthly total in Aberdeenshire in an average August.

  But it was "dry and sunny" when the derailment happened at 09.37. The minute's silence is being held at 09:43 - the time the crash was first reported.

