title: 'Clifton Suspension Bridge: Murder arrest after human remains found in Bristol
  and London - BBC News'
date: '2024-07-13'
section: England
url: http://www.bbc.co.uk/news/articles/c0xj9vlg763o
content: |-
  The 34-year-old was held on suspicion of murder by armed officers in Bristol.

  The remains were found on the Clifton Suspension Bridge

  A man has been arrested on suspicion of murder following the discovery of human remains in suitcases at Clifton Suspension Bridge in Bristol. The 34-year-old was detained by Avon and Somerset armed officers at Temple Meads Station in Bristol in the early hours of Saturday. The remains found in the luggage and in a flat in Shepherd's Bush, west London, belong to two men, police have said. Investigators, wearing blue forensic suits, masks and gloves are continuing their work at the crime scene, which is outside the property on Scott's Road and was earlier extended by 33ft (10m).

  They could be seen working near a set of bins outside an estate, just off Scott's Road, with one taking photographs of the area. Three police vehicles were used to block the view from beyond the cordon. The Met's deputy assistant commissioner Andy Valentine said the arrest is "a significant development". "We understand the concerns of local communities in both Bristol and London and officers will remain in the Clifton and Shepherd's Bush areas over the coming days to reassure those affected by this tragic incident," he added. "Anyone with any concerns is encouraged to speak with them." The Met Police had previously put out a statement saying they wanted to speak to a Yostin Andres Mosquera. Police are not looking for anyone else and the man arrested at Temple Meads Station is being taken to London for questioning.

  Just before midnight on Wednesday, Avon and Somerset Police received a report of a man with a suitcase acting suspiciously on the Clifton Suspension Bridge. Officers arrived within 10 minutes, but the man had left, leaving the cases behind. A second suitcase was found nearby. The Metropolitan Police took over the investigation after body parts were found in the flat west London flat. Police have said formal identification of the two victims is yet to take place. A 36-year-old man who was arrested in Greenwich in south-east London on Friday in connection with the investigation has since been released without charge.

  In Bristol, some locals have told the BBC the incident has left the community in shock. Gemma Osborne, the manager of Hart's bakery, which is near to the city's Temple Meads Station, said it feels "very close to home". "It’s always a concern being with our start times being so early that everyone is safe on the way to work," she said. “It’s made me feel quite spooked. It’s very rare so we shouldn’t let it creep us out – but it definitely makes you think."
