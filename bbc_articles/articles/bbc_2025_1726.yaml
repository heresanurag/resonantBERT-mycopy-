  Ms Agnifilo also took issue with Mr Mangione remaining in federal custody. She said the federal jail made it harder for him to meet lawyers to prepare for his court appearances. Mr Mangione's lawyer also complained that the chief New York City detective on the case and Mayor Eric Adams had spoken to HBO, the US TV network, about evidence that the defendant's legal team had not even seen yet. During the proceedings, prosecutors went over the mountain of evidence they plan to present at trial, including DNA, police reports and photographs from the scenes of the crime, body camera footage, phone records and other materials. The judge set a deadline of 9 April to submit pre-trial motions. In addition to the New York cases, Mr Mangione also faces charges of forgery, carrying firearms without a licence, and other counts in Pennsylvania, where authorities arrested him at a McDonald's. A fundraiser for legal expenses for Mr Mangione - an Ivy League-educated member of a prominent Baltimore family - has raised over half a million dollars since his arrest. He is being held at the Metropolitan Detention Center Brooklyn, the same facility where Sean 'Diddy' Combs is awaiting trial on sex-trafficking charges.
