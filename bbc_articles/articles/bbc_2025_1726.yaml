  A lawyer for Luigi Mangione, accused of killing UnitedHealthcare CEO Brian Thompson, has argued that the 26-year-old is not being granted the right to a fair trial. The comments came during a brief procedural hearing on Friday, which drew hundreds of supporters - some from as far as Kansas - chanting the defendant's name and wearing shirts adorned with his face. Mr Mangione arrived in court with his hands and legs shackled, wearing a green sweater and a bulletproof vest. He has pleaded not guilty to the New York charges. The killing of Mr Thompson, 50, a husband and father of two, sparked a nationwide conversation about the US healthcare system, unleashing pent-up anger at the industry and some ugly reaction.

  Mr Mangione is being tried in three separate cases in New York and Pennsylvania, where he was arrested

  Chants from Mr Mangione’s supporters could be heard from the court’s 15th floor on Friday. His brief appearance drew more people than the number that attended the public gallery in the same courtroom last year for President Donald Trump’s hush money trial. Some of Mr Mangione's supporters wore face masks and green Luigi hats, from the Super Mario video game franchise. Among members of the public in court was Chelsea Manning, who was convicted more than a decade ago of espionage for leaking secret military files to Wikileaks. Investigators say Mr Mangione was motivated to kill Mr Thompson because of anger with US healthcare insurance companies. In addition to the New York state-level charges, he is accused of federal stalking and murder offences that could potentially carry a death penalty. The separate cases were a source of frustration for Mr Mangione's lawyer, Karen Friedman Agnifilo, who argued before the packed court on Friday that her client was being treated differently to other defendants. "His right to a fair trial is continuing to be impacted," she said at the hearing, which lasted less than 30 minutes. She cited her client's detainment in federal custody and remarks made by city officials about the case as factors that could influence the proceedings. At the beginning of the hearing to discuss a pre-trial schedule, Ms Agnifilo said her client should not have to be shackled while in court, arguing it denied him the presumption of innocence guaranteed to all defendants. "He is a model prisoner" in federal custody, Ms Agnifilo said. But Judge Gregory Carro said court security preferred for Mr Mangione to remain shackled.

