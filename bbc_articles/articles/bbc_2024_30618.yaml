content: |-
  The two-times world heavyweight makes a Christmas visit to the hospital where he was born.

  Boxer Anthony Joshua has surprised patients with an unannounced visit to the hospital where he was born.

  The two-time world heavyweight champion handed out gifts to children staying on Starfish Ward at Watford General Hospital on Thursday.

  He recorded a special Christmas message for "phenomenal" NHS staff, saying: "I've seen first hand the amazing work these guys do. We're here to appreciate you guys today. It's a small thing but can hopefully lift up some of the people's spirits."

  Ward manager, Kerry Beasley, said: "It can be a difficult time of year but today's visit has re-energised people. To see the smiles on children's faces is so heart-warming."

