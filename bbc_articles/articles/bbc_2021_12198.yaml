content: |-
  The White House says fully vaccinated travellers will be allowed into the US from November.

  A much awaited change for the industry

  This is really early days, we are still waiting to have that official announcement from the US government but my understanding from speaking to industry sources is that some of these airlines are now being briefed a change will happen. Of course this is a much-awaited change for the industry - they have been desperate to get the US-UK lines connected again. If you happen to be from the the US coming into the UK you have been able to come in if you have been double jabbed in the US since August - and not have to quarantine - so that has opened up for people travelling in one direction. But at the moment you can't travel from the UK to the US unless you have a green card or you have a special stipulation or a US passport as well. That has really limited things for businesses which rely on being able to go back and forth between the US and UK, but of course crucially for families who have been disconnected during this time and haven't been able to visit. A lot of these long-haul airlines really rely on UK-US routes and that has been closed pretty much since the beginning of the pandemic so that is a long time without that source of income.
