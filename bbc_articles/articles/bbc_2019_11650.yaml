  Comedian and writer Shappi Khorsandi noted there were "so many beautiful tributes to Deborah Orr" on her Twitter timeline on Monday, calling it "a huge loss to journalism, to writing".

  "I read so much of her work over the years... Her always fiercely intelligent point of view," she added.

  Other journalists, writers and beyond have been paying their tributes.

