title: 'Monaghan deaths: Men named as Christopher Mooney and Kieran Hamill - BBC News'
date: '2022-12-02'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-63833715
content: |-
  Christopher Mooney and Armagh man Kieran Hamill died at separate locations in County Monaghan.

  Christopher Mooney's body was found at a house on Thursday morning

  The two men who died at separate locations in County Monaghan on Thursday have been named locally as Christopher Mooney and Kieran Hamill.

  Mr Mooney, who was 60, was found dead at a house at Knockreagh Lower in Broomfield at about 06:45 local time on Thursday.

  Gardaí (Irish police) said he had suffered a "violent death".

  Mr Hamill, 37 and from Cullaville in County Armagh, died nearby after he was hit by a car at Ballynacarry Bridge.

  His death is being investigated as a fatal road traffic crash, according to gardaí.

  However, Irish media outlets are reporting that detectives believe Mr Hamill had been inside the house where Mr Mooney died shortly before the crash.

  Gardaí said the post-mortem examination of Mr Mooney's body had been completed but the results could not be disclosed for operational reasons.

  Police on both sides of the border closed the road at Ballynacarry Bridge after the collision on Thursday
  • None Investigation after two bodies found near Irish border
