title: 'Jessie J breast cancer: singer undergoes surgery after diagnosis - BBC News'
date: '2025-06-24'
section: Culture
url: http://www.bbc.co.uk/news/articles/c78nw73yez6o
content: |-
  The singer reveals she has undergone surgery and is now resting at home awaiting her results.

  Singer Jessie J says she has undergone surgery for breast cancer and is now resting at home while awaiting her results. In a social media post, the 37-year-old star thanked her doctor, surgeon and "all the nurses who cared for me", sharing series of photos and videos of her time in hospital. She described the post as the "honest lows and highs of the last 48 hours" and promised to "always show the good and hard bits of any journey I go through". The Essex singer revealed her early breast cancer diagnosis at the beginning of June and received widespread support from fellow colleagues for sharing her experience.

