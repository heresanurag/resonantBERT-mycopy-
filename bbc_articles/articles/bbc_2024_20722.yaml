  Family tribute to 'much loved son' hit by lorry on M74

  Christopher Keenan, pictured aged 16, was hit by a lorry while walking on the M74 in Glasgow

  A family has paid tribute to their "much loved son" who died after being hit by a lorry while he was walking on the M74 motorway. Christopher Keenan, 18, was pronounced dead at the scene of the incident near Hamilton, South Lanarkshire, at about 03:10 on Saturday. Police Scotland said officers had received a report of a man walking southbound on the motorway, near junction six, a short time earlier. The force said its inquiries into the circumstances were ongoing and any witnesses should contact them, external.

  The family of Mr Keenan, from Blantyre, said in a statement: “We would like to thank everyone for their condolences. "Christopher was a much loved son, brother, grandson and cousin. "He was an inspiration to all that knew him, and he will be greatly missed by everyone.” Police Scotland Sgt John Houston made an appeal for dashcam footage from the time of the incident He said: “Our thoughts remain with Christopher's family and friends at this very difficult time. “I am urging anyone who witnessed the incident, or saw Christopher walking along the roadway, and has not yet spoken to us to please get in touch."
