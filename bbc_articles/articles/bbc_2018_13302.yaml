title: 'Prince Charles: 70 years in 70 pictures - BBC News'
date: '2018-11-14'
section: In Pictures
url: http://www.bbc.co.uk/news/in-pictures-46150569
content: |-
  To mark the Prince of Wales' 70th birthday, we present an image from every year of his life.

  The Duke of Edinburgh, Prince William, Earl Spencer, Prince Harry and the Prince of Wales turn on to Horse Guards Parade as they follow behind the coffin of Diana, Princess of Wales, during the funeral procession to Westminster Abbey. Following the death of the princess in a car crash in Paris, in 1997, the prince insisted that she be given a royal funeral.
