title: MSP husband of Strictly contestant Punam Krishan saves man's life - BBC News
date: '2024-11-09'
section: Scotland
url: http://www.bbc.co.uk/news/articles/cr5mr7292plo
content: |-
  Dr Sandesh Gulhane, husband of TV doctor Punam Krishan, gave the man CPR at the Scottish Parliament.

  Dr Sandesh Gulhane raced to the scene when the man collapsed

  An MSP has saved the life of a man who collapsed and stopped breathing at the Scottish Parliament in Edinburgh. Scottish Conservative health spokesman Dr Sandesh Gulhane stepped in and gave the man CPR after he became unresponsive with no pulse last week. Dr Gulhane, who is also a GP, then led a team of first aiders who used a defibrillator to resuscitate him. The MSP is married to TV doctor Punam Krishan, who was recently voted off Strictly Come Dancing.

  The man had been waiting in a queue to visit Holyrood and ­collapsed near the entrance. Dr Gulhane told BBC Radio Scotland's Mornings programme: "Unfortunately he didn't have a pulse and stopped breathing so we had to resuscitate him. "We went through two cycles and we shocked him twice. "We were then able to bring back his pulse and get him breathing again which was fantastic news. I do hope that he is OK and he is on his road to recovery."

  Dr Gulhane is married to Strictly Come Dancing contestant and TV doctor Punam Krishan

  As a junior doctor, the Glasgow MSP worked on the resuscitation team and said he had faced similar situations before. "My concern was for people on the team who hadn't experienced a situation like that before," he said. "If they hadn't seen somebody potentially die and then have this happening. "So I am proud of how well they all worked together and how we came together despite it being a lot of people's first time." He added: "As a GP or a junior doctor, when these things happen, you have to continue your day, you can't just stop. "So I went back to the round table and got on with my day because it is important that you do move on from these situations."

  The team of first aiders assisted the man after he collapsed at the Scottish parliament

  Dr Gulhane said he wanted to stress the importance of learning how to do CPR and having defibrillators available nearby. "There's plenty of places where you can learn basic CPR and it's free, like the British Heart Foundation, external or St John Ambulance, external," he said. "There's no magic involved, it's just a skill you can learn. "But it's also important to have a defibrillator because ultimately it was the defibrillator that saved this man's life." He encouraged anyone who ever faced a similar situation to stay calm and work through simple steps to help bring the person back to life. "If something happens, I'd encourage everyone to make sure it's safe and start CPR, get someone to call an ambulance and get the defibrillator," he said. "It tells you what to do - the defibrillator will literally speak to you and tell you what to do. "And don't be scared, the 999 operator will also talk you through it and help you." A Scottish Ambulance Service spokesman confirmed it was called to the Scottish Parliament and a patient was taken to the Royal Infirmary of Edinburgh. He added: “If someone has had a cardiac arrest, early CPR and use of a defibrillator are essential to increasing the chances of survival."
