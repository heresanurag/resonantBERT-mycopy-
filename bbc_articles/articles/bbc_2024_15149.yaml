  BBC sports editor Dan Roan looks ahead to Sunday night's Euro 2024 final in Germany, where England play Spain looking to "shake off failure and secure legendary status".

  'A chance to shake off failure and secure legendary status'

  Gareth Southgate's England secured their place in the Euro 2024 final with victory over the Netherlands

  For so long a symbol of serial sporting underachievement, the England men’s football team stand on the threshold of what would be a seminal achievement. Sunday night's European Championship final (kick-off 20:00 BST) represents a chance to shake off the failure that had come to define the side, and secure legendary status for the players and their manager. And with many millions watching on, provide the country with a moment of togetherness. One that will be cherished for generations to come. Gareth Southgate’s side has made a habit of reaching the business end of major tournaments over recent years, a rare source of consistency in the national landscape at a time of political volatility. Indeed, during the manager’s eight years in charge, there has been five UK prime ministers. The comparison is apt, because as well as leading a team that forms part of the country’s identity, Southgate has been expected to comment on a range of societal issues during his tenure - one that coincided with the Covid pandemic, a cost-of-living crisis, and division. Few sporting figures would have handled such a challenge with as much thought and eloquence. "We live in what’s been an angry country. I would love that to be different as we move forward. Hopefully we can bring some temporary happiness," Southgate said, as he prepared for Sunday’s final against Spain, alluding to his strong sense of patriotism, the criticism he received during the early stages of the Euros, and the forces of pride, joy and unity that victory would unleash.

