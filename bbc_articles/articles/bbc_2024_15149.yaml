  Whatever happens against opponents Spain in Berlin, Southgate’s legacy as the man who nursed the England team back to health is already assured. No other manager of the men’s side has reached a major overseas final. No other has reached a Euros final, let alone two in consecutive tournaments. The moments of individual brilliance, courage and never-say-die resolve of his men have restored pride. The dismal cycle of humiliations, penalty shootout defeats, resignations, reviews, scandals and divided squads that came to define the team over two decades has been consigned to history. Young talent has been introduced, loyalty has been afforded to a core group of players, preparation has been professionalised, the shirt no longer weighs heavily. Southgate took charge of England in 2016, but his attempts to help restore credibility to English football had begun five years earlier when he joined the Football Association (FA) as its new director of elite development, before managing the under-21s. His early years coincided with the opening of the national football centre at St George’s Park and the introduction of the 'England DNA' - a coaching strategy designed to boost elite performance. Southgate was a key part of the effort that laid the foundations for England’s under-17s and under-20s winning World Cups, and the under-19s becoming European champions. And yet, for all the strides the senior team has made under his leadership, silverware has remained stubbornly elusive. The years since their only major title - the 1966 World Cup - have continued to tick by.
  • None Will Foden get the better of Rodri? Five key battles

  While England's Lionesses delivered a seismic Euros triumph in 2022 on home soil, the nation’s first major football trophy for 56 years, the men’s team has continued to fall agonisingly close. World Cup semi-finalists in 2018. Finalists at the Euros in 2021. Quarter-finalists at the World Cup a year later. The eventual disappointment on each of these occasions only reinforced the sense held by some that Southgate was destined to be the nearly man of English football. A manager who may have revitalised the side from the ignominy of previous years, but who did not quite have what it took to deliver the glory the country craved. Such sentiments have echoed around England’s campaign in Germany, as the team initially produced laboured performances that failed to match the elevated expectations surrounding an exceptional generation of players. Southgate struggled to get the balance of the team right, and eyebrows were raised when he said he was still "experimenting" with his midfield. Some pundits criticised his side in the harshest possible terms, and cups of beer were even thrown at the manager by some fans after a goalless draw against Slovenia. It was clear that the scrutiny upset Southgate, as the pressure built. England needed a last-gasp comeback to avoid what would have been a devastating defeat by Slovakia in the last 16, then scraped past Switzerland on penalties. Only against the Netherlands in the semi-final, when England had to come from behind for the third match in a row, enjoying some good fortune when awarded a penalty, did they finally produce the kind of football that justified their pre-tournament billing as favourites.

