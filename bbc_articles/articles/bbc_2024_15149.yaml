  But that rousing victory amid an atmosphere of shuddering intensity, earned Southgate another chance to silence the critics that clearly affected his morale in Germany. To confound those who, despite the resilience of his side, and the way his tactics, selections and substitutions have largely been vindicated at this tournament, suggest he has benefitted from favourable draws. Those who believed he had taken the side as far as he could and who would have preferred that he had walked away from the job after the last World Cup, as he came close to doing after sensing faith in him was fading. Those who would have preferred that he and his players "stick to football", a view the manager firmly rejected in 2021 when he wrote: "Our players are role models. And, beyond the confines of the pitch, we must recognise the impact they can have on society. I have a responsibility to the wider community to use my voice, and so do the players. It’s their duty to continue to interact with the public on matters such as equality, inclusivity and racial injustice." Few will be criticising Southgate for such a stand if England triumph in Berlin. None will argue he is lucky if his side can overcome the might of Spain - a genuine footballing heavyweight, boasting world-class players - the most impressive team at these Euros. If his side can join the Lionesses as European champions, and the 58-year itch is finally scratched. And if - in his 102nd match in charge - he joins Sir Alf Ramsey as the only men to lead England to a major title. Almost three decades ago, as an England player, Southgate suffered the pain and regret of missing a decisive penalty at Wembley in the semi-finals of the Euros against Germany. Three years ago he could only watch as some of his young players suffered the same fate at the same stadium, as England lost to Italy in another shootout, this time in the final. Now, in the epic surroundings of Berlin’s Olympic Stadium, on European football’s grandest stage, and in what many believe will be his last match as manager, he can finally exorcise those demons, and heal the wounds of those memories. As a nation stops to watch, and dares to dream, Southgate’s story of redemption can be completed. And England’s long, long wait can end.
