title: 'Gatwick: Disruption after plane stuck on runway - BBC News'
date: '2024-06-28'
section: Sussex
url: http://www.bbc.co.uk/news/articles/cllynl5yl81o
content: |-
  The airport says it had to close its runway and divert some flights but it is now operating again.

  Several flights are believed to be waiting to take off from Gatwick

  Thousands of air travellers have had their journeys disrupted after Gatwick Airport had to close its runway due to a broken-down aircraft. A total of 23 flights had to be cancelled due to a "departing aircraft having hot brakes", the airport said. It said the runway has now been cleared and is operating as normal, and the broken down plane has been moved. The airport said the runway was closed for 50 minutes.

  A statement from the airline said: "Our pilots took the precautionary decision to cancel take-off due to a technical issue. "Safety is always our top priority and we apologise to customers for the inconvenience caused." Patrick Wiltshire was flying from his home in Dubai to visit family in London, when his flight was diverted. "Five minutes from landing it suddenly diverted and flew to Brussels," he told BBC Radio Sussex, from the airport in Belgium. "I've missed my taxi booking and I've missed my event for the evening. "There's been very limited information so we've had to take to our phones to find out what's going on, on Twitter."
