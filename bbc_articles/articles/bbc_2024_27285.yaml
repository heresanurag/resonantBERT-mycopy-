  Dressing up for Halloween is pretty easy if you're an actress who has starred in horror films. Courtney Cox shared pictures of her dressed as Gale Weathers, a character of the Scream film series that she played in all six movies. But the best bit were her two dogs also dressed in spooky outfits.

