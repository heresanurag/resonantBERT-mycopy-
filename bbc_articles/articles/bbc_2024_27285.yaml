content: |-
  Heidi Klum attended her Halloween bash as E.T., while Lizzo's costume referenced a recent episode of South Park.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  It is Halloween once again and two things are inevitable - running out of sweets before young crowds of trick or treaters have knocked on your door, and social media feeds being inundated with celebrities in costumes. So to save you some aimless scrolling, here are some of the best celebrity Halloween costumes we've seen this year.

  Heidi Klum and husband Tom Kaulitz dressed as E.T. at Klum's annual Halloween party

  Heidi Klum is famous for both her annual Halloween party and the incredible costumes she wears to them. This year, for the 23rd instalment of the event, Klum and husband, German guitarist, Tom Kaulitz dressed as E.T., the extra-terrestrial from Steven Spielberg's 1982 classic film. Klum's outfit was complete with a glowing first finger on her left hand, just like the original character, and a wig of blonde hair to match her own. But Klum wasn't the only celebrity to dress as E.T. Janelle Monae appeared as the endearing alien for a Halloween special of The Jennifer Hudson show.

  Janelle Monae (left) also dressed up as ET on Jennifer Hudson's chat show on Thursday

  Monae is similarly famous for going the extra mile with her costumes, and told Hollywood Reporter, external: “Halloween is such a happy space for me, it has been since I was a kid. "It opens a larger conversation of how do we become agents of joy? How do we become agents of happy? "Bringing Halloween experiences and creative experiences is heart work, not hard work. I do this because my heart needs it.”

  Alex Scott (left) and Jess Glynne dressed as McDonalds characters for a party in London

  Elsewhere, TV presenter Alex Scott and her partner, singer Jess Glynne dressed as Ronald McDonald and the Hamburglar as they attended a party thrown by an alcohol brand in London.

  On Thursday, Lupita Nyong'o swapped trick or treating for the opening night of a Broadway musical in New York City. But she still made sure to get in the spirit - donning a ghostly-white wig and contact lenses.

  Rapper Nelly was celebrating not only Halloween but also his 50th birthday

  Rapper Nelly attended a party in Atlanta, Georgia celebrating not only Halloween but also his 50th birthday.

  Jonathan Ross put on a spooky show for visitors at his home

  TV chat show host Jonathan Ross handed out sweets to trick-or-treaters who turned up outside his London home

  Sienna Miller and Oli Green wore all-black outfits while Green had spiders painted on his face

  Actress Sienna Miller and her partner Oli Green wore all-black outfits to a party in London, while Green had spiders painted on his face.

  Pixie Lott dressed up as an Aperol Spritz

  It's not often that you get thirsty looking at Halloween costumes, but Pixie Lott mastered her look this year by dressing as a fashionable Aperol Spritz cocktail. The 33-year-old also completed her look with a slice of orange as a hat.

