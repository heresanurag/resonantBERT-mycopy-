  Amelia Dimoldenberg really reached into the Disney/Pixar archives for this look, as she appeared as the character Roz from the 2001 film Monsters Inc. You'd be forgiven for not remembering this slug-like monster, who played a small part as an extremely grumpy office worker in the animated film.

