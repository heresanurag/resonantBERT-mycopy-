  Lizzo definitely wins the award for most timely Halloween costume. She dressed as a fake weight loss drug, which was dreamt up in a recent South Park episode that joked about her body positivity message. The costume also doubled up as a response to online speculation that her recent weight loss had been fuelled by the drug Ozempic. The singer posted on Instagram, external in September: “When you finally get Ozempic allegations after five months of weight training and calorie deficit..."

