  David Beckham let the world know that his wife, Victoria Beckham, has dressed up for Halloween for the first time in 27 years! It might only be a green mask but David captioned his Instagram post with "it's as good as we are gonna get" before asking his children "are you not proud of mum?". The pair were out celebrating Halloween with their daughter, Harper.

  Maya Jama attended her own party in London in a costume inspired by the 1988 film Beetlejuice

  Meanwhile, Maya Jama attended her own Halloween bash in a Beetlejuice-inspired costume. Fans might recognise her vibrant green hair and monochrome suit from the 1988 film, or the sequel which hit cinemas earlier this year. Rather than imitating the man himself, she described her costume as "Beetlejuice's unruly niece".

  Kylie Jenner has really embraced the "less is more" theory this Halloween. The 27-year-old influencer posted a picture on Instagram of her completely nude as she re-created Demi Moore's look, external on the poster image of the 1996 film Striptease.

