  Ed Sheeran's costume echoed an AI-generated image of him wearing a monkey costume that's become a popular internet meme. The singer posted a photo of himself posing in a replica outfit and holding a phone displaying the image. "Haters will say its AI", the caption read, with the hashtag: "#FeltCuteMightDeleteLater".

  Not many toddlers get a Halloween party as extravagant as Molly-Mae's daughter, Bambi, who had her very own Halloween Boogie Ball with a spooky ball pit and festive treats galore. The mother-daughter hosting duo opted for a classic fairy tale costume, external with Bambi dressed as Little Red Riding Hood and Molly-Mae as the wolf disguised as the grandma.

