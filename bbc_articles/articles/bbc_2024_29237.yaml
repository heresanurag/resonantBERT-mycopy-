title: 'Dawn Hollyoak: Great British Bake Off star dies aged 61 - BBC News'
date: '2024-11-26'
section: Culture
url: http://www.bbc.co.uk/news/articles/cd17ezpw04lo
content: |-
  Show judge Paul Hollywood sent his love to Ms Hollyoak's family, describing her as a "lovely lady".

  The baker appeared on the Channel 4 series in 2022

  Great British Bake Off stars have paid tribute to former contestant Dawn Hollyoak, who has died at the age of 62. The baker competed on the Channel 4 show in 2022, becoming the sixth contestant to leave the tent. Her death, believed to have come after a significant illness, was announced "with a heavy heart" on her Instagram page, with the message saying: "Not only a wonderfully talented baker but first and foremost an amazing mother, grandmother, wife and friend. "Dawn passed away peacefully surrounded by her family. We will miss her forever, but promise to continue her baking legacy!" Judge Paul Hollywood shared his condolences, writing: "I'm so sorry to hear that, send my love to the family, a lovely lady x." Carole Edwards, who competed on the same series as Ms Hollyoak, said she would miss her friend "terribly". She added: "A beautiful and talented lady inside and out, fly high my friend, life just won't be the same without you." Other amateur bakers who competed on her series paid tribute, including Maxy Maligisa, who said: "Dawn will be missed so much. Our memories together are memories that I will cherish forever xx." Janusz Domagala wrote: "All my love is with you." Giuseppe Dell'Anno, who won the series in 2021, described the news as "devastating" as he recalled being "blown away by her joyous personality and her infectious smile". "She will be sorely missed, but will live in the heart of those who loved her forever!" he added.

  Dawn's family said she was an amazing mother, grandmother, wife and friend

  Mother-of-three Ms Hollyoak competed on the show aged 60 and she described herself as an "artist in and out of the kitchen", according to the show's website. "Dawn loves the challenge of an illusion cake (the more impossible-sounding, the better), favouring whacky and intricate designs that allow her to express her creative talent," it says on her profile on the site. "She prides herself on her steady hand and attention to detail, especially when it comes to the intricacy required for lace patterns on biscuits." Following her departure from the show, she said: "I really don't want to share tears over it because it's been the most amazing experience."
