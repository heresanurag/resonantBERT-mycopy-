  The treatment of inmates at Cecot, where scores of inmates are locked up in each windowless cell, has been criticised by rights groups. But Bukele's crackdown on crime continues to be very popular with the vast majority of Salvadoreans who say they can go about their lives without threats from gang members for the first time in years. However, some relatives of the tens of thousands of people which have been rounded up and jailed under emergency measures brought in by Bukele say their loved ones have been wrongfully rounded up in sweeping police round-ups. Amnesty International has criticised the "gradual replacement of gang violence with state violence" in the country - a criticism dismissed by Bukele, who points out that his hardline approach to crime last February won him re-election to a second term with more than 84% of the votes.
