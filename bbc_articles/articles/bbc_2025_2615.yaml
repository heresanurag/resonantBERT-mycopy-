  El Salvador was the second stop on Secretary of State Rubio's first overseas tour as the US top diplomat. His first stop was Panama, where he demanded that Panama make "immediate changes" to what he called the "influence and control" of China over the Panama Canal. On Tuesday, he will hold meetings with officials in Costa Rica and Guatemala expected to focus on migration as well as countering Chinese influence in the region. Since coming to office, US President Donald Trump has focused on speeding up the removal of undocumented migrants, with the promise of "mass deportations".
