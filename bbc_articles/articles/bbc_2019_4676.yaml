id: bbc_2019_4676
title: ATM thefts could involve 'several gangs' - BBC News
date: '2019-04-01'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-47771492
content: |-
  Eight machines have been stolen in seven separate incidents in 2019, police say.

  A digger was used in the raid in the village of Ahoghill

  There could be several gangs involved in the theft of cash machines in Northern Ireland, the police have said.

  Det Ch Insp David Henderson said eight ATMs had been stolen in seven separate incidents in 2019, along with one attempted theft.

  "We are actively looking at it being several gangs involved," he said.

  He said there was no evidence paramilitaries were involved, but added that they may be taking "some of the criminal assets".

  Det Ch Insp Henderson made the comments following the latest theft, when a cash machine was stolen from outside a shop in County Antrim.

  A digger, which had been stolen from a nearby site, was used in the raid at the Nisa shop on Brook Street in Ahoghill.

  The incident happened in the early hours of Monday, and police said considerable damage was caused to the building.

  Shop owner Walter Millar said the machine "will certainly be missed" by the community but there was now a "fear" about replacing it after the theft.

