title: 'Northants: UK''s first black female Olympian appointed MBE - BBC News'
date: '2024-09-26'
section: Northamptonshire
url: http://www.bbc.co.uk/news/articles/cdrj5lgd63lo
content: |-
  Anita Neil, who was 18 when she competed in Mexico City in 1968, says she "feels like a trailblazer".

  Anita Neil, 74, was recognised for her services to athletics at a ceremony at Windsor Castle

  The first black woman to compete for Great Britain at the Olympic Games embraced her role as a sporting trailblazer as she was appointed MBE. Anita Neil competed in the women's 100m and 4x100m metres relay team in Mexico City aged just 18 in 1968 and at the following Games in Munich four years later. The 74-year-old, from Wellingborough, Northamptonshire, was recognised with the royal honour for her services to athletics at Windsor Castle on Wednesday. Ms Neil said it was "fantastic" that the ceremony had been hosted by the Princess Royal, herself a former Olympian.

  "She said 'It's a long time coming', and I said 'Yes, I certainly know that,' said Ms Neil. "I said it's an honour and a pleasure that I'm receiving the MBE from a fellow Olympian." Great Britain's first black male Olympian is thought to be Harry Edward, who competed at the 1920 Games in Antwerp. Asked if she felt like a trailblazer in female British sport for her Olympic feat, Ms Neil said: "Yes I do, because I go to schools and homes and all sorts of places, giving talks and speeches. "I opened a school the other month in the local area. They appreciate me now, they know I'm here."

  Ms Neil said it was "fantastic" to receive her MBE from the Princess Royal - herself a British Olympian

  Ms Neil competed in the long jump during her school days before rising to prominence on the track. She became an international athlete at 16 when reigning Olympic gold medallist Mary Rand was injured, taking her place at a competition in Lille, France. Ms Neil said: "That was quite an experience because I was the youngest on the team, and quite nerve-wracking. I'd never flown before." During her career, Ms Neil said she had no sponsorship and little equipment or finances, and would often train on a rough school playing field on her own, compared to current British athletes who have "got it all now". She said she had been "glued" to the women's sprinting events held at the Paris Olympics Games this summer and had kept "a whole lot" of memorabilia from the Games she competed in, including opening ceremony dresses, running spikes and event tickets. "[It is] unbelievable to think that I did it," she said. Ms Neil said representing Great Britain ranked as her greatest achievement. She added: "I won medals at the European Games and I stood on the podium and watched the Union Jack flutter in the breeze. "That was for me and for my country, and I felt very, very proud of that."

  Ms Neil represented Great Britain at both the 1968 and 1972 Olympic Games

