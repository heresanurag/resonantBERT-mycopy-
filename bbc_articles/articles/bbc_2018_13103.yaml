  In some places, veterinarians have been working in groups to try and treat injured and lost animals for free.

  This dog, named Fatty, received burns to his eyes and chin during the Camp Fire in Paradise

  Reuben, a comfort dog, is petted at a church being used as an emergency shelter in Chico, California

  People who are missing their animals have been advised to check designated local rescue points - including airports and even casinos - where animals are being taken on an emergency basis.

  A dog recovered from an abandoned home is transferred to a rescue point

  A police officer tends to a horse that was found wandering near Paradise
