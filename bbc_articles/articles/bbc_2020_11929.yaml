title: 'Birthday Honours 2020: Marcus Rashford given MBE - BBC News'
date: '2020-10-09'
section: General
url: http://www.bbc.co.uk/news/uk-54487060
content: |-
  The England player's award came for services to vulnerable children in the UK during lockdown.

  England player Marcus Rashford was named in the Queen's delayed birthday honours list for services to vulnerable children in the UK during the coronavirus pandemic.

  The 22-year-old Manchester United forward successfully campaigned to extend free school meals over the summer after pressing the government into a U-turn on the issue.
