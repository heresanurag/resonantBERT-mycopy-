title: Boy dies falling from Sheffield hotel window - BBC News
date: '2021-08-19'
section: Sheffield & South Yorkshire
url: http://www.bbc.co.uk/news/uk-england-south-yorkshire-58262259
content: |-
  The boy, aged under 10, fell from the OYO Sheffield Metropolitan Hotel, police say.

  Emergency services were called to the OYO Sheffield Metropolitan Hotel at about 14:30 BST

  A young boy has died falling from a hotel window in Sheffield.

  Emergency services were called to the OYO Sheffield Metropolitan Hotel in Blonk Street at about 14:30 BST on Wednesday.

  The boy, who has not been formally identified, is believed to be under 10. South Yorkshire Police said his family was being supported by its officers.

  A spokesperson for the force said it was not treating the incident as suspicious.

  They added the NCP car park behind the 111-bed hotel had been closed and people had been advised to avoid the area.

  South Yorkshire Police said a car park behind the hotel had been closed after the incident

