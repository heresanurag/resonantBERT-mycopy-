content: |-
  McLaren's Oscar Piastri sets the pace in practice at the Miami Grand Prix as a crash for Briton Oliver Bearman ends the session early.

  McLaren's Oscar Piastri set the pace in practice at the Miami Grand Prix as a crash for Briton Oliver Bearman ended the session early.

  Piastri was 0.356 seconds quicker than Ferrari's Charles Leclerc in second place with Red Bull's Max Verstappen third as the teams prepared for sprint qualifying later on Friday.

  Bearman lost control at Turns 11 and 12, spinning his Haas into the wall four minutes before the end of the session.

  That prevented the second McLaren driver Lando Norris from doing a lap on the soft tyres, and he ended up 12th as a result.

  Williams drivers Carlos Sainz and Alex Albon were fourth and fifth, ahead of Racing Bulls' Isack Hadjar.

  Mercedes driver George Russell, who had led the times until the soft-tyre runs started, was another to miss out on a faster lap as a result of Bearman's crash and slipped down to seventh place.

  Red Bull's Yuki Tsunoda was eighth, ahead of Russell's team-mate Kimi Antonelli and Aston Martin's Fernando Alonso.

  Lewis Hamilton, another not to run on the soft tyres at the end of the session, was down in 13th.

  Verstappen is driving after his partner Kelly Piquet gave birth to their first child, daughter Lily. The world champion missed Thursday's media day.

  Miami is the second sprint event of the season, and the circuit marked it by announcing a new contract that will keep the race on the calendar until 2041.
