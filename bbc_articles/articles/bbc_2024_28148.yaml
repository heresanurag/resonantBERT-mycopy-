  A man is critically ill in hospital after the collision near Huddersfield on Saturday.

  Four arrests after M62 crash during police pursuit

  The crash happened between junctions 24 and 25 of the M62

  A man is critically ill in hospital after a crash involving a car which was being pursued by police on the M62. West Yorkshire Police said the white Toyota Corolla had collided with a Peugeot 306 just before Junction 24 for Huddersfield at about 15:00 GMT on Saturday. The Peugeot driver was taken to hospital and the four female occupants of the Toyota were arrested on suspicion of theft of a motor vehicle. The motorway was closed in both directions for more than five hours following the incident, with National Highways reporting hour-long delays.

  Police said the Toyota had failed to stop for officers on the M621 as it travelled towards the M62 at Birstall at about 14:55. A pursuit was authorised and the car drove at speed on to the M62 heading towards Manchester. Police said the Peugeot driver had suffered serious injuries in the crash and his condition in hospital was critical but stable. The eastbound carriageway of the motorway was reopened at about 20:20, but police said the westbound carriageway would remain closed until the early hours of Sunday as an investigation continued. The force added the Independent Office for Police Conduct had been notified as was standard procedure for an incident of this nature. Listen to highlights from West Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
