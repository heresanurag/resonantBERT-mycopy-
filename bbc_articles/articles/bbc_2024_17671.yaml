title: Turnout high as far right aims for power in key French vote - BBC News
date: '2024-07-07'
section: Europe
url: http://www.bbc.co.uk/news/articles/cw0ygnyxgnqo
content: |-
  The National Rally wants outright victory, but stalemate is more likely in France's crucial election.

  French turnout high as far right aims for power in key vote

  Turnout on Sunday was the highest in a parliamentary election for more than 40 years

  France is voting in one of its most significant elections in years, with the far right hoping for a historic victory, but with political stalemate the more likely result. This is the first time the anti-immigration National Rally (RN) of Marine Le Pen and Jordan Bardella has had a realistic chance of running the government and taking outright control of the National Assembly. But after the RN’s first-round victory last Sunday, more than 200 rival candidates dropped out to give others a better chance of defeating the far right. Voting ends at 20:00 (18:00 GMT) and by midday turnout was 26.63%, marginally up on the first round and the highest figure in a parliamentary vote since 1981.
  • None The far right is close to power in France. Will the rest of Europe follow?

  Whatever the result, it is difficult to see President Emmanuel Macron coming out of this well. Four weeks ago, he said it was the responsible solution to call a snap vote in response to the RN’s victory in European elections, minutes after the party’s 28-year-old leader Jordan Bardella challenged him to do so. It is not yet clear if there will be another presidential address after the exit polls come out when voting ends on Sunday evening. The two-round election came as a shock to a country gearing up for the start of the Paris Olympics on 26 July. Security was already tight and now 30,000 police have been deployed for a period of heightened political tension.

  National Rally posters feature Jordan Bardella and Marine Le Pen rather than local candidates

  There are fears of violence in Paris and other French cities, whatever the outcome of the vote, and a planned protest outside the National Assembly on Sunday evening has been banned. In Dreux, a historic old town on the road to Normandy, Sunday’s vote fell on the day the Olympic flame was passing through. “For us it’s a massive thing, bigger than the election,” says Pauline in the tourist office. The flame has been travelling around France for almost two months, and Dreux is holding a weekend of festivities to mark its arrival. “Macron should have waited until after the Olympics,” Dreux resident Antoine told the BBC.

  On the beat in Dreux, where the Olympic torch arrived on the day of the election

  Veteran commentator Nicolas Baverez believes the president has not just blown up his term in office and opened the gates of power wide for the far right. “He’s compromised the running of the Paris 2024 Olympics, which could deliver a final blow to France’s credit and its image,” he wrote in Le Point on the eve of the vote. The constituency that includes Dreux is one of the races to watch in the second round of this election. Candidates such as Marine Le Pen and Jordan Bardella have already won their seats, by winning more than half the vote. But another 500 contests are being decided in run-offs, mostly involving either two or three candidates. Former conservative cabinet minister Olivier Marleix was beaten in the first round by far-right candidate Olivier Dubois. They both qualified for the run-off, along with a candidate from the left-wing New Popular Front, which is in second place nationally. But because Nadia Faveris was narrowly beaten into third by her conservative rival, she pulled out of the race “to block National Rally”. One voter, Morgan, was sceptical that anything would change in the town, whoever won.

  For 10 years, our governments have been making promises but they've never delivered. If RN wins I don't think anything would change either

  There have been 217 of these withdrawals across France, including 130 Popular Front candidates and 81 from the president’s Ensemble alliance. And that has dramatically changed the balance of this pivotal general election. There are 577 seats in the French parliament and projections after Sunday’s first round gave the RN a fighting chance of securing an outright majority of 289. However, final opinion polls on Friday suggested that was out of reach, with 205 to 210 seats as a potential maximum.

  The parties trying to block an RN victory range from the radical left, Communists and Greens to the Macron centrists and conservatives. They say they are defending the country from the extreme policies of the far right. National Rally has watered down many of its plans but still wants to give French citizens “national preference” over immigrants for jobs and housing. It aims to abolish the right of automatic citizenship to the children of immigrants who have spent five years aged 11 to 18 in France. It also wants to bar dual nationals from dozens of sensitive jobs. Opinion polls are not necessarily reliable. Each of the 500 races is a local contest and voters do not follow recommendations from political parties. If the RN managed upwards of 250 seats, it might seek out allies to form a minority government. President Macron's party had to make do with similar numbers until he became frustrated with his limited ability to pass reforms in parliament. That kind of RN government is unlikely, believes Prof Armin Steinbach of HEC business school in Paris. It would soon face a vote of no confidence, he believes, and under the constitution, France cannot have another general election for at least another year. Another potential scenario is a “grand coalition” that would involve most of the other parties, except for the radical France Unbowed (LFI) party, which the Macron alliance and conservatives reject as extremists. This idea has gained some momentum in recent days, but Greens leader Marine Tondelier has made clear “there’ll be no Macronist prime minister”, whatever happens.

  Greens leader Marine Tondelier says she will not be part of a government led by a Macron figure

  There is also talk of a technocrat government, similar to those that ran Italy during the eurozone debt crisis. But instead of choosing experts from outside politics, it might include politicians with proven expertise in particular fields. In any case, France is entering uncharted territory, says Jean-Yves Dormagen of the Cluster 17 institute. President Macron himself has said he is not about to resign and will continue to serve out his final three years in office. “We will have Macron as a lame duck president who created this mess without having to do so,” Prof Steinbach told the BBC. “And he’s losing legitimacy.” The immediate concern for France is to have some kind of government in place during the Olympic Games. Constitutional expert Benjamin Morel believes the president could form a national unity government until the end of the Paris Games. “That would give the parties time to to reach an agreement between now and the start of the school year and the next budget,” he told Le Figaro.
