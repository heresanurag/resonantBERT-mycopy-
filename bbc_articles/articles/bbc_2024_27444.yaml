content: |-
  The Princess of Wales' appearance at the Remembrance Sunday ceremony at the Cenotaph features on several of Monday's front pages.

  Kate's 'solemn duty' and PM to hold talks with Macron

  The Princess of Wales attended the National Service of Remembrance at the Cenotaph on Sunday

  The Daily Telegraph says, external Sir Keir Starmer and President Macron are planning to - as the paper says - "thwart" efforts by Donald Trump to scale back US support for Ukraine. Government insiders told the paper that the British and French leaders will discuss whether President Biden can be persuaded, before he leaves the White House, to give Kyiv permission to fire long-range Storm Shadow missiles deep into Russia. The Times leads, external on the talks between the prime minister and the French president. It says Donald Trump's pledge to impose blanket tariffs of up to 20% on imports will be on the agenda. The Guardian focuses, external on the symbolism of Sir Keir attending the French Armistice Day service, describing it as a "pointed show of European solidarity" after Trump's re-election. Civil servants have warned that the government's plan to "smash" people smuggling gangs will have little impact on Channel crossings and on reducing illegal migration to the UK, the i reports., external Insiders have told the paper that department officials were "underwhelmed" by the strategy set out by the prime minister last week, and experts have said that smugglers will adapt. A Home Office spokesperson says the government will "stop at nothing" to dismantle people smuggling gangs and bring them to justice. Most of the papers mark Remembrance Sunday. Many feature photographs of the Princess of Wales, who is gradually returning to royal duties after her cancer treatment, at yesterday's service at the Cenotaph in London. " "Show of resilience" says the Daily Express. "Solemn duty" says Metro. "Kate's salute to heroes" is the Sun's headline. The Daily Mail says her determination to attend Remembrance events over the weekend demonstrated the importance "the Royal Family attach to commemorating the Fallen".

