content: |-
  The family of Martin O'Donovan say the death of their much-loved son, uncle and brother is cruel.

  Murder charge after man dies from being hit by car

  Martin O'Donovan died in hospital from his injuries

  A man has been charged with the murder of a man who died after being hit by a car. Martin O'Donovan, 46, died in hospital after being seriously injured in the incident on Stonyhurst Road in Woolton, Liverpool, on Friday, Merseyside Police said. His family said he was a "loving, caring, fun, and intelligent" son, brother and uncle. Stephen Bates, 41 and of Herondale Road, Mossley Hill, is due to appear at Liverpool Magistrates' Court on Tuesday charged with murder.

  In a statement, Mr O'Donovan's family said he was "an accomplished engineer and skilled outdoorsman," adding: "He was well-read, well-travelled and full of light. "His wonderfully joyous spirit will live on in everyone who had the pleasure of meeting him. "We are devastated that he has been taken from us in such cruel and senseless circumstances, and as we process such an overwhelming loss, we take solace in the fact that he will always be remembered for the remarkable man that he was."

