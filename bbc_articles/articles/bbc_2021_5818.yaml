  World must help India through current crisis - Fauci

  The chief medical adviser to US President Joe Biden, Dr Anthony Fauci, has told the BBC that other countries must step up to help India through the current health crisis and to ramp up vaccination rates. "The number of people needing hospitalisation and not being able to get a hospital bed, the lack of oxygen, the lack of equipment, it is really a very desperate situation. We really need to get a concerted effort of other countries to try and help India out. "Not only to help them from outside to within, but to help them to be able to get their own situation (under control), namely to produce more vaccines, and to get people vaccinated. "Only 2% of the population is fully vaccinated and about 9-10% have partial vaccination. For a country of so many people, we've got to do better than that and we've got to do better than that quickly, because that's going to be the solution. That's the intermediate and long-range solution."
