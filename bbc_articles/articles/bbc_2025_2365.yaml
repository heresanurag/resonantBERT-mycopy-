title: Eggheads star quizzer Chris Hughes dies aged 77 - BBC News
date: '2025-02-27'
section: Culture
url: http://www.bbc.co.uk/news/articles/cx2009jgj58o
content: |-
  The show paid tribute to the "great" quizzer, who also won Mastermind and Brain of Britain.

  Chris Hughes, pictured on the show, was described as an "Eggheads great"

  Quizzer Chris Hughes, star of the popular BBC and Channel 5 series Eggheads, has died aged 77, a statement on the programme's social media accounts has said. Hughes was one of several general knowledge experts who regularly appeared on the show, which saw members of the public take on the five so-called "Eggheads". A statement posted on the show's Facebook and X accounts on Thursday, reported by the Press Association news agency, paid tribute to an "Eggheads great". "It is with immense sadness that we announce the passing of Eggheads great Chris Hughes," it read.

  "Chris joined the show in 2003 and over the next 20 years gave us not only brilliant answers but very many laughs and happy memories." It concluded: "He will be hugely missed by all his Eggheads family."

