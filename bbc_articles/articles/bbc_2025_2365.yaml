  Hughes was born in Middlesex and attended Enfield Grammar School. Before becoming known as one of the country's leading quizzers, he worked as a train driver and railway worker. He went on to become a regular contributor on Eggheads - which began on BBC Two in 2003 before moving to Channel 5 in 2020. The Eggheads panel was made up of general knowledge experts, including winners from others shows such as Mastermind, The Weakest Link and Who Wants To Be A Millionaire?. In each episode, five Eggheads would compete with a team made up of five members of the public, who would play individually against a single Egghead in each round, before a final face-off between the remaining players of both sides. If the amateurs were successful, they would take home a cash prize. The jackpot would increase by £1,000 per episode, with each edition's prize money rolling into the next day if the Eggheads won. As a result of the Eggheads high level of expertise, many of the jackpots would reach a sizeable sum before finally being won. The highest ever jackpot reached £75,000, which was won by a team in 2007. The series was presented by news presenter Dermot Murnaghan, before Radio 2 DJ and Channel 5 talk show host Jeremy Vine took over the role. Hughes is one of only seven people to have won both Brain of Britain and Mastermind, and also scored a victory on International Mastermind. Eggheads producer Robert Dean said on X:, external "[Hughes] was an amazing Egghead who considered everyone on the production team part of his family. "I have such fond memories of him and count myself lucky to have known him. I'll miss him tremendously." After having reached the final of another hit quiz show, The Weakest Link, without getting a single question wrong, host Anne Robinson declared Hughes to be "the best contestant we have had on the Weakest Link" and chose not to use her mean spirited signature catchphrase: "you are the Weakest Link, goodbye!".
