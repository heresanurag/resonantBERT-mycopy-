id: bbc_2018_1187
title: UK sends medics to halt Rohingya diphtheria outbreak - BBC News
date: '2018-01-16'
section: General
url: http://www.bbc.co.uk/news/world-asia-42693213
content: |-
  There have been 4,000 suspected cases of diphtheria in the overcrowded refugee camps and at least 31 deaths.

  Medics in the camps are seeing 100 new cases every day.
