title: 'Elections 2021: Leaders in final push for votes - BBC News'
date: '2021-05-05'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-56992989
content: |-
  Campaigning in the biggest test of opinion since the general election is in its final day.

  Boris Johnson and Keir Starmer are among leaders battling for votes ahead of Thursday's polls

  Political party leaders have hit the road in England in a final push for votes ahead of Thursday's elections.

  Prime Minister Boris Johnson said the Conservatives faced some "tough contests" but the party was "fighting for every vote".

  Labour leader Sir Keir Starmer said his party was doing the same but had "a mountain to climb" to win back support in key battlegrounds.

  Polls open from 07.00 to 20:00 BST on Thursday, with results due from Friday.

  About 48 million people in England, Wales and Scotland will be able to take part in the elections, many of them postponed from last year because of the pandemic.

  As well as polls for the Scottish Parliament and the Senedd in Wales, there are elections for seats on 143 English councils and 13 local mayors.

  There will also be a by-election for the Westminster seat of Hartlepool.

  Thursday's votes represent the first electoral test for parties since the Conservatives won a majority at the 2019 general election.

  They will be the first votes since Sir Keir took over as Labour leader 13 months ago and Sir Ed Davey won the Liberal Democrat leadership race last August.

