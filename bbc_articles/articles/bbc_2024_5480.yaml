title: 'Fentanyl poisoning: Footage that led to ''nerdy'' killer''s arrest - BBC News'
date: '2024-03-22'
section: General
url: http://www.bbc.co.uk/news/uk-england-essex-68629666
content: |-
  Video shows Luke D'Wit talking to police outside the home of a couple he drugged with fentanyl.

  Video showed the moments that led to a man being convicted of murdering a married couple he worked for by drugging them with the opioid painkiller fentanyl.

  Stephen Baxter, 61, and his wife Carol, 64, were found dead at their home in West Mersea, Essex, in April 2023.

  Luke D'Wit, 34, had rewritten the couple's will so he could seize control of their business after their deaths, Chelmsford Crown Court heard.

  Footage showed him talking to police outside their house after the bodies were discovered, and his arrest nearly three months later.

  The couple's daughter Ellie, 22, said her parents became "irritated" that D'Wit was so frequently at their home in Victory Road and they thought the computer science graduate was "nerdy weird".

  D'Wit, of Churchfields, West Mersea, was jailed for a minimum of 37 years.
