  Police worked to keep rival protesters apart in Bolton, where smoke bombs and fireworks were thrown from both sides.

  Police worked to keep rival protesters apart in Bolton, where smoke bombs and fireworks were thrown from both sides, the BBC'S Phillip Norton reports.

  Around 250 members of the Asian community chanted "Allahu Akbar" towards demonstrators who waved England flags and slogans.

  A dispersal notice has been authorised to give officers there increased powers to tackle anti-social behaviour.
