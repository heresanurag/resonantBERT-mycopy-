title: New investigation ordered into 'doorstep murder' of Alistair Wilson - BBC News
date: '2024-09-16'
section: Highlands & Islands
url: http://www.bbc.co.uk/news/articles/c0r884dlgpno
content: |-
  The banker and father-of-two was shot dead at his home in the Highlands nearly 20 years ago.

  New cold case probe ordered into doorstep murder of Alistair Wilson

  Scotland's top law officer has ordered a complete re-investigation of the murder of banker Alistair Wilson almost 20 years ago. The father-of-two was fatally wounded at his home in Nairn, in the Highlands, in what became known as the "doorstep murder". His killer has never been caught. New teams of prosecutors from the Crown Office and Procurator Fiscal Service (COPFS) and officers from Police Scotland will work on a full cold case investigation.

  Mr Wilson, 30, was shot on 28 November 2004 and died in hospital from the injuries. He and his wife Veronica had been bathing their two young sons and getting ready to read them a bedtime story when the killer came to the door. A stocky man aged 20 to 40 years old and wearing a baseball cap spoke to Mrs Wilson, asking for her husband by name. When he came downstairs, the man handed him a blue envelope with the word "Paul" on it. Mr Wilson went inside briefly and when he returned the man opened fire with a handgun. The gun involved was found on 8 December 2004 in a drain on Seabank Road, Nairn, by council workers carrying out gully cleaning. Forensic analysis identified it as the murder weapon.

  This video can not be played To play this video you need to enable JavaScript in your browser. Speaking in 2017, Veronica Wilson said finding answers would allow her family to move on from "this dark shadow"

  She said it was a "deeply disturbing" crime and the Wilson family had suffered a devastating loss. She said: "There have been strenuous efforts made over many years to resolve this case and a great deal of evidence has been gathered. "However, I have decided that it is appropriate for all the details of the case to be considered afresh and for further investigations to be made. "It is my sincere hope that this secures justice for Alistair Wilson’s family and for the wider community who have been affected by this violent crime."

  The police investigation will be overseen by a detective chief superintendent. Police Scotland's Assistant Chief Constable Steve Johnson said the force remained committed to bringing the killer to justice. He said: "We are now approaching the 20th anniversary of the murder of Alistair Wilson, and our thoughts remain with his family and the loss they have suffered. "Unresolved murder cases are never closed in Scotland and there is no time bar to providing the police with information. "We would appeal to anyone who may have information not yet shared with the police to come forward and report it, external." Former Nairn provost Sandy Park said a fresh investigation was "good news". He said: "Nairn was a very, very peaceful lovely place to live in - a seaside holiday resort. Everything was going for Nairn. "It is very difficult to describe the shock of disbelief at the time."

  Forensic officers outside the Wilsons' home in Nairn in 2004

  In December last year, Mr Wilson's family complained to the Police Investigations and Review Commissioner (Pirc) about the handling of the police investigation. Police Scotland and COPFS said at the time they had met the family to discuss the matters raised by them. Earlier in 2023, it emerged a potential suspect had been jailed for an unrelated offence. Police did not name the suspect who was jailed in connection with the supply of drugs. In 2022, Police Scotland said a dispute over decking at the Havelock Hotel, which sits across the road from the Wilsons' home, was the most likely motive for the shooting.

  Police recovered the Haenel Schmeisser gun used to kill Alistair Wilson

  Police have taken thousands of statements since the start of the original investigation. The early months of the inquiry involved a plea to people in Nairn and the surrounding area to voluntarily give DNA samples. Tests on the German-made gun failed to extract any DNA. The Haenel Suhl pocket pistol is from the 1930s and police believe the weapon was likely to have been taken to the UK after World War Two as some form of souvenir. The ammunition used in the killing was from the 1980s or 90s.
