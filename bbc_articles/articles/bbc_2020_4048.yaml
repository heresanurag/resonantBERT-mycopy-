  Bringing you the latest on the coronavirus pandemic's impact around England.

  Police have urged people not to drive to the Lincolnshire coast to take exercise.

  It comes after details of a document - previously sent to police forces across the UK - were made public.

  The document - entitled "what constitutes a reasonable excuse to leave the place where you live" - was issued by the National Police Chiefs' Council and the College of Policing,

  On exercise, it states driving to the countryside for a walk is "reasonable" if "far more time" is spent walking than driving.

  Quote Message: If you don't need to travel in your car to go for a walk, because you can walk from your house, then actually don't do that.. There is opportunity for the majority of our communities in the county to go from their home address or very close to their home address without the need to travel half an hour to the coast". from Jason Harwin Deputy Chief Constable of Lincolnshire Police If you don't need to travel in your car to go for a walk, because you can walk from your house, then actually don't do that.. There is opportunity for the majority of our communities in the county to go from their home address or very close to their home address without the need to travel half an hour to the coast".
