title: Royal Family view floral tributes at Balmoral Castle gates - BBC News
date: '2022-09-10'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-62863841
content: |-
  The Queen's three younger children, Princess Anne, Prince Andrew and Prince Edward were among those viewing floral tributes.

  The Queen's three younger children, Princess Anne, Prince Andrew and Prince Edward were among family members who viewed floral tributes at the gates to Balmoral Castle.

  Her Majesty's four granddaughters Zara Tindall, Princesses Beatrice and Eugenie and Lady Louise Windsor, plus her eldest grandson Peter Phillips, were also there.

  Some family members appeared emotional as they read what people had written about the Queen.

  The family waved to well-wishers as they stood at the gates to say goodbye, before walking back inside the castle grounds.
