content: |-
  A court hears Adam Yusuf was compelled to join a protest after being influenced by social media.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A man sentenced for carrying a knife at a protest in Leicester at the weekend said he was influenced by social media.

  Adam Yusuf, 21, received a suspended jail sentence after admitting possessing a knife at a march on Sunday.

  The protest followed unrest on Saturday in which 25 officers and a police dog were injured.

  It came amid tensions involving mainly young men from sections of the Muslim and Hindu communities.

  Leicestershire Police's temporary chief constable, Rob Nixon, told the BBC that social media had played a "huge role" in fanning the flames.

  "There are significant things on there which are false," he said, citing assaults of people and attacks on religious establishments as examples.

  "My plea is that please, if people are seeing information on social media, if they can't validate it, please don't circulate it.

  "Because what we know people are doing is they are receiving fake news via social media and then they are forwarding it on, so it's amplifying the problem, and it's raising fear."

  Rob Nixon said police had been outnumbered by groups of hundreds of people

  Yusuf, of Bruin Street in Leicester, is one of two people who have already been sentenced in relation to the disorder.

  Leicester Magistrates' Court heard Yusuf told the probation service he had been "influenced by social media" in relation to events taking place near where he lived and was "upset".

  He was sentenced to a year in prison, suspended for 18 months.

  Sentencing Yusuf, the magistrate told him: "This behaviour will not be tolerated and brings shame on our city and community relationships."

  Police say 47 people have now been arrested in relation to disorder in the city since 28 August.

  Of these, two people were arrested on Saturday and 18 were arrested on Sunday.

  Mr Nixon said arrests will continue "for several weeks, if not months".

  "We have about a 50-strong investigation team that are wrapping across all of these different elements and I know that we're starting to identify imagery of people," he said.

  There was a further protest in Belgrave Road on Sunday afternoon

  On Monday, Amos Noronha, 20, of Illingworth Road, Leicester was jailed for 10 months after pleading guilty to possession of an offensive weapon following his arrest on Saturday night.

  A third man, Lukman Patel, 31, of Homeway Road, Leicester, remains in custody after pleading not guilty to possession of an offensive weapon and racially aggravated harassment/alarm/distress.

  Police said "proactive patrols" continued in East Leicester overnight between Monday and Tuesday, and no new incidents had been reported.

  Mr Nixon said officers faced "significant aggression" over the weekend and 25 were now known to have been injured, although none of the injuries were serious.

  He said the main disorder on Saturday had been sparked by a protest, and police had not known so many people would become involved.

  "At one point we had got a group of probably 200 on one side and we ended up with a group of probably 600 or 700 on the other," he said.

  "So you've got 800 or 900 people in a really close area, being protected by about 100 or so officers, and I think my officers did an amazing job in really difficult circumstances."

  Another protest involving about 100 people followed on Sunday, but police said the area was quiet overnight into Monday.

  Police closed several side streets in the Humberstone Road area during the unrest

  The arrests have included people from outside of the city, including some from Birmingham.

  "I think there are people from outside of Leicester that are going onto social media and talking about 'let's get behind this, let's travel to Leicester'," said Mr Nixon.

  "So they are stoking up people from outside of Leicester to try and join a fight, which is probably being fuelled by the social media rhetoric."

  Community leaders in the city have joined police in calling for calm.

  City Mayor Sir Peter Soulsby said: "We often talk about the good community relations in Leicester, but you can never be complacent about it, you can never take it for granted.

  "It is always a work in progress and it is quite clear there is work to be done here."

  Reading a joint statement from the Hindu and Muslim communities, Pradip Gajjar said: "The two faiths have lived harmoniously in this wonderful city for over half a century.

  "We arrived in this city together, we faced the same challenges together, we fought off racist haters together, and collectively made this city a beacon of diversity and community cohesion.

  "We together call upon the immediate cessation of provocation and violence both in thought and behaviour."

