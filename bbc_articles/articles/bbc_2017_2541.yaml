title: Victorian pioneer Marianne North 'most prolific female artist' - BBC News
date: '2017-02-11'
section: General
url: http://www.bbc.co.uk/news/38921858
content: |-
  A largely forgotten Victorian botanical artist has emerged as the most prolific female for works in the UK's oil painting collection.

  A largely forgotten Victorian has emerged as the female artist with the largest number of works in the UK's oil painting collection.

  Marianne North travelled the world in the late 19th Century to produce hundreds of botanical works - her position was revealed in analysis of Art UK's digital archive.

  Miss North has a gallery, which she designed herself, devoted to her works at Kew Gardens in London.
