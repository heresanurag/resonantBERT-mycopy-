title: 'Tashan Daniel: Two charged with murder over Tube station stabbing - BBC News'
date: '2019-10-06'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-49948493
content: |-
  Tashan Daniel was heading to an Arsenal football match when he was stabbed at Hillingdon station.

  Two men have been charged with murder over the death of a 20-year-old athlete in a London Underground station.

  Tashan Daniel was heading to an Arsenal football match when he was stabbed on 24 September at Hillingdon station.

  Two men, aged 21 and 19, have been remanded in custody and will appear at Highbury Corner Magistrates' Court on Monday.

  A woman, 18, arrested on suspicion of assisting an offender has been released under investigation.

  Mr Daniel, a full-time athlete, was attacked as he made his first solo trip to the Emirates stadium to watch Arsenal play Nottingham Forest.

