content: |-
  There's been a huge drive to vaccinate Bolton residents as Covid cases linked to the India variant continue to rise there.

  In the past week there's been a huge drive to vaccinate people living in Bolton, as coronavirus cases linked to the Indian variant continue to rise there.

  Health officials are particularly targeting those eligible for the jab, but have yet to come forward.

  BBC correspondent, Ed Thomas, has been hearing from residents in the town.

  Where is the Indian variant and how is it spreading?
