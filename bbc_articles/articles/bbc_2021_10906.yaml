content: |-
  Fully vaccinated travellers from the UK and EU will be allowed into the US from early November.

  Nadine with her brother Ash Cooper and her sister Victoria Cooper, the last time they were all together in 2019 Image caption: Nadine with her brother Ash Cooper and her sister Victoria Cooper, the last time they were all together in 2019

  Nadine Beasley, from Bournemouth, is one of those who have been waiting to visit her family in the US.

  Despite the change in travel rules she is going to miss her sister’s wedding, for which she is maid of honour, by days. However, she will be reunited with her family at Christmas.

  "My sister is getting married on 30 October in California," she says. "I was meant to be her maid of honour, my daughter a flowergirl.

  "We were due to fly out on 22 October, so we're naturally upset about the ban being lifted in November, because we'll miss her wedding by days.

  "However, we've now made our fourth rebooking since February 2020 to fly out on 20 December. So that means Christmas with my parents and my siblings, who are all in California, which is better than the last 18 months of waiting and knowing nothing."

  With the travel ban she has not seen her siblings or parents for more than two years.

  She says it is annoying that she will miss her sister's wedding by days, having already missed her brother's but says the fact there is "light at the end of the tunnel" in the form of a date means it feels like "a weight’s been lifted".

  "We’re going with my nan. It’s bittersweet because we lost grandad," she adds.
