title: 'Actor Gene Hackman: One of Hollywood''s greatest ''tough guys'' - BBC News'
date: '2025-02-27'
section: Culture
url: http://www.bbc.co.uk/news/articles/cjm9ndw9xeeo
content: |-
  Although he did not become an actor until his 30s, Hackman became one of Hollywood's most bankable stars.

  Gene Hackman won two Oscars and was nominated for another three

  Gene Hackman, who has died aged 95, started his acting career later in life but became one of Hollywood's most bankable stars. The US actor, his wife Betsy Arakawa, 64, and their dog were found dead at their home in Santa Fe, New Mexico. Santa Fe County Sheriff's office in New Mexico confirmed they were found "deceased Wednesday", but that officers "do not believe that foul play was a factor". Hackman had an illustrious five-decade career as an actor. He won two Oscars and was nominated for another three, playing violent men, yet was equally at home in comedy. He was once described as having the face of a truck driver, and was suited to character as well as leading roles. Having shot to fame in Bonnie and Clyde at the end of the 60s, he was rarely out of work - in films like The French Connection, Mississippi Burning and Superman. But he retired from acting in 2004 on the advice of his heart doctor, and rarely gave an interview again - opting for a quiet life in New Mexico with his second wife, Betsy.

  Gene Hackman and Betsy Arakawa, who married in 1991, attended the 1989 Academy Awards together

  Eugene Allen Hackman was born in San Bernardino, California, in 1930 and led a peripatetic childhood. His parents divorced, and he was palmed off on various relatives until settling with his maternal grandmother in Danville, Illinois. His father left the family when Hackman was still in his teens. "When young Gene was 13, his father abandoned the family, driving away while his son was out playing in the street," reported The New York Times' late writer Robert Berkvist, external. He went on: "As his father passed by, Mr Hackman recalled years later, he gave him a wave of the hand. "'I hadn't realised how much one small gesture can mean,' he once said. 'Maybe that's why I became an actor.'" Hackman's mother died in 1962 - she burned to death in 1962, after setting fire to her mattress with a cigarette while drunk. As a teenager, Hackman was keen to branch out and lied about his age to join the Marines at the age of 16, serving nearly five years. He was stationed in China where he worked as a radio operator, which led to later work as a disc jockey.

  Gene Hackman said early on he had "trouble with authority"

  "I have trouble with direction," he once said of his short military career, "because I have trouble with authority. I was not a good Marine." After briefly studying journalism and TV production at the University of Illinois, Hackman left to enrol at the Pasadena Playhouse in California in the 60s, where he and classmate Dustin Hoffman were voted the "least likely to succeed". Undeterred by this vote of no confidence, both actors decamped to New York where they shared a flat with another aspiring thespian, Robert Duvall. Hackman managed to pick up a few minor stage roles, supplementing his income by taking on a variety of odd jobs. He would often relate the story of how he was spotted by a former drill sergeant outside a New York hotel while he was working as a doorman. Recognising his former charge, the sergeant exclaimed that he knew Hackman would never amount to anything.

  He gained his first Oscar nomination alongside Warren Beatty in Bonnie and Clyde

  There was also a stint as an overnight cleaner in New York's Chrysler Building, something Hackman later described as the worst job he ever had. There were parts in light comedies both off and on Broadway, which led first to minor television roles and then to some film work. His first movie role was in the 1964 film Lilith, starring Warren Beatty. Impressed by his performance, Beatty cast Hackman as his brother, Buck Barrow, in Bonnie and Clyde in 1967. Hackman received an Oscar nomination for best supporting actor and was nominated again for I Never Sang for My Father in 1970. But then came The French Connection.

  He won his first Oscar as a tough drugs cop -"Popeye" Doyle - in The French Connection in 1971

  It was the part that made him. He played the part of the maverick narcotics agent Jimmy "Popeye" Doyle who pursues a French drugs dealer, most notably in a famous sequence on the New York subway. It brought him an Academy Award for best actor, and he reprised the role in The French Connection II in 1975. Whether it was for critically-acclaimed movies such as The Conversation and Night Moves, or popular blockbusters like The Poseidon Adventure, he became a reliable box-office draw. One of the great screen tough guys, he effortlessly switched to comedy in Young Frankenstein and played the sleazy supervillain Lex Luthor in Superman and Superman II.

  The French Connection established Gene Hackman as one of the great screen tough guys

  Hackman was so upset about the producers' treatment of the director, Richard Donner, that he refused to take a part in the next sequel, although he later appeared in Superman IV: The Quest for Peace. The 80s was another successful decade, notably for his appearance in Mississippi Burning, for which he was again nominated for a best actor Academy Award. It was a powerful performance as an FBI agent, tasked, along with a rookie colleague, with investigating the racist murder of black civil rights workers in the early 60s. Director Alan Parker referred to Hackman as " a very intuitive and instinctive actor".

  Another Oscar for best supporting actor came in 1993 for Unforgiven - a Clint Eastwood Western - in which he played a sadistic sheriff, Bill Daggett. The film also won best picture. The awards came three years after Hackman required bypass surgery following a heart attack. There was a leading role as Edward "Brill" Lyle, the computer genius in the 1998 film, Enemy of the State, where he starred alongside Will Smith in a frightening tale of government surveillance. Hackman's hard-edged screen persona made him ideal for the intelligent but ruthless characters in film adaptations of John Grisham novels - such as The Firm and Runaway Jury - in which, for the first time, he and former flatmate Dustin Hoffman appeared on screen together. His versatility, and the luxury of being able able to choose scripts, led in 2001 to another great performance, in the offbeat comedy The Royal Tenenbaums, which drew rave reviews. But he chose to bow out from acting in the political satire, Welcome to Mooseport in 2004. Explaining his decision, he told Reuters, external he didn't want to risk going out on a sour note. "The business for me is very stressful. The compromises that you have to make in films are just part of the beast," he said, "and it had gotten to a point where I just didn't feel like I wanted to do it any more." A decade later, he did briefly come out of retirement to narrate two documentaries about the history of the US Marine Corps - but otherwise stuck to his plan.

  Gene Hackman and Clint Eastwood holding their Oscars for Unforgiven

  After quitting acting, he gained a new reputation as a writer of historical fiction. He co-wrote four books with Daniel Lenihan, Wake of the Perdido Star (1999), Justice for None (2004), Vermillion (2004) and Escape from Andersonville (2008). He went on to deliver two solo writing efforts, Payback at Morning Peak (2011) and Pursuit (2013). He spoke about why he had taken to his new job. "I like the loneliness of [writing], actually. It's similar in some ways to acting, but it's more private and I feel like I have more control over what I'm trying to say and do," he told Reuters. "There's always a compromise in acting and in film, you work with so many people and everyone has an opinion (laughs). "But with the books, it's just Dan and I and our opinions. I don't know that I like it better than acting, it's just different. I find it relaxing and comforting."

  After retiring from the cinema, Gene Hackman gained a new reputation as an author

  Hackman married Faye Maltese in 1956. The couple had three children but divorced in 1986. Five years later he married Betsy Arakawa, who ran an upmarket furniture store in Santa Fe, New Mexico. Gene Hackman made more than 80 films, and still managed to become both a proficient golfer and respected painter. He was also a mean performer on the racetrack, driving Formula Ford cars and taking part in the 1983 Daytona Endurance Race. Throughout his career, he gave few interviews and eschewed the celebrity lifestyle. "If you look at yourself as a star," he said, "you've already lost something in the portrayal of any human being."
