  • None This is the first encounter between Portugal and Switzerland to see both sides score since March 1993 (1-1 in a World Cup qualifier).
  • None Switzerland are winless in their past nine games played in Portugal (including Euro 2004), losing seven and drawing twice since a 2-0 victory against Portugal in a World Cup qualifier in April 1969.
  • None Portugal have lost just one of their past 16 games across all competitions (W6 D9) and are unbeaten since a 2-1 defeat against Uruguay in the 2018 World Cup (P9 W4 D5 L0 since).
  • None Two of Cristiano Ronaldo's past five goals for Portugal have come from direct free-kicks; only two of his previous 52 goals prior to this were scored in the same manner.
  • None Ricardo Rodriguez's past three goals for Switzerland - and five of his past six - have been penalties.
  • None Only Strahil Popov for Bulgaria (four) and Benjamin Kololli for Kosovo (five) have been directly involved in more goals among defenders in this Nations League campaign than Switzerland's Ricardo Rodríguez (three - two goals, one assist).

  Portugal play the winners of Thursday's semi-final between England and the Netherlands (19:45 BST) in the Nations League final in Porto on Sunday (also 19:45). Switzerland will take part in Sunday's third-place play-off at 14:00.
