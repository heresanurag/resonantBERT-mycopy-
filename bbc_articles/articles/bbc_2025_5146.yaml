  'Never say never' on future PWR return - Maher

  Ilona Maher will now turn her attention to getting selected for the USA at the World Cup

  Ilona Maher has not ruled out a return to the Premiership Women's Rugby (PWR) in the future after playing her final game for Bristol Bears as they were defeated by Gloucester-Hartpury in the semi-final. The versatile American back featured in seven games for the Bears since signing in January and scored four tries, including one in the 36-20 loss at Queensholm. The 28-year-old is the most followed rugby union player in the world on social media and her arrival has had a significant impact on the PWR, with three clubs seeing record attendances and online followers skyrocketing. "I never say never, I think it was amazing that even I got to come and play here for two and a half months," Maher said. "What I was hopefully able to do and learn in two and a half months was amazing but I hope that even if I'm not playing this league continues to grow and we can get these numbers out to games even when I'm not there."

  Maher won bronze at the Paris Olympics last summer as part of the USA side and joined Bristol to switch back to playing XVs ahead of the World Cup in August. She said her focus now for the next few months will be to continue playing, with the American Eagles facing Australia and New Zealand in May as part of the Pacific Four Series. "We start with the Pac Four with USA 15s and I hope I've proven myself in this space to vie for a roster spot in the USA team and I hope I'll be selected for that," Maher said. "It'll be a lot of continuing to learn the game and put myself in the position to make a roster for the World Cup but also be the best player I can be in the World Cup." Bristol head coach Dave Ward and assistant coach Tom Luke were instrumental in bringing Maher to England and she said she was now a "Bear for life". "I'm proud to have been part of this team, a special programme they have here," Maher said. "The girls were so welcoming and made me part of the team and I got to play with some of England's best players and Wales and Scottish, so it just set me up to be more successful at the World Cup. "I'll be playing against them - I wish I was playing with them but it was amazing."
