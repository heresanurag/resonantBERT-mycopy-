content: |-
  Royals, politicians and Commonwealth officials gathered in St Paul's Cathedral to give thanks to the Queen.

  Royals and officials filled St Paul's Cathedral on Friday for a service to thank the Queen, who is marking 70 years on the throne.

  The Queen herself was not able to attend, having experienced "discomfort" the previous day.

  Referring to her love of horse racing, Archbishop of York Stephen Cottrell said she was "still in the saddle".
