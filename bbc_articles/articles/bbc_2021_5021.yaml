title: Duke of Edinburgh's death marked at Buckingham Palace - BBC News
date: '2021-04-09'
section: General
url: http://www.bbc.co.uk/news/uk-56688243
content: |-
  A sign was displayed on Buckingham Palace's gates announcing the Duke of Edinburgh's death and its flag lowered to half-mast.

  Buckingham Palace has lowered its flag to half-mast as a mark of respect to Prince Philip.

  A sign was also displayed on the palace gates announcing the Duke of Edinburgh's death.
