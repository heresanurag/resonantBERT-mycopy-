content: |-
  It is the first time RSF attacks have reached the city, which is the de-facto capital of the army-led government.

  Paramilitaries strike Port Sudan for first time, army says

  Hundreds of thousands of displaced civilians have fled to Port Sudan since the two-year civil war began

  A drone attack launched by the paramilitary Rapid Support Forces (RSF) struck a military airport in the city of Port Sudan on Sunday, according to the Sudanese army. It marks the first time RSF attacks have reached the city - the de-facto capital of Sudan's military-led government - since the conflict between the warring factions erupted two years ago. Sudanese army spokesperson Nabil Abdullah said the RSF had launched several "suicide drones" at the eastern Red Sea port city, targeting the Osman Digna Air Base, "a goods warehouse and some civilian facilities". He said no injuries had been reported but the attack had caused "limited damage". The RSF has not commented on the incident.

  Sudan plunged into conflict in April 2023 when a vicious power struggle broke out between the Sudanese Armed Forces (SAF) and RSF, a powerful paramilitary group, ahead of a planned transition to civilian rule. At least 150,000 people are estimated to have died in the ensuing civil war, with some 12 million forced to flee their homes. The United Nations has described the situation in Sudan as the world's largest and most devastating humanitarian crisis, with over 30 million people in need of aid and millions facing acute food shortages and famine. Prior to the attacks on Sunday, Port Sudan had avoided bombardment and was regarded as one of the safest places in the war-ravaged nation. After the SAF lost control of the capital Khartoum early in the war, Port Sudan became the de facto headquarters for the military-led government helmed by General Abdel Fattah-al Burhan. UN agencies moved their offices and staff to the coastal city and hundreds of thousands of displaced civilians have fled there during the war. "We were on the way to the plane when we were quickly evacuated and taken out of the terminal," a traveller told AFP news agency on Sunday following the strikes. Video footage on social media, which the BBC has not independently verified, appears to show an explosion and huge plumes of black smoke billowing into the sky. The airport has been closed and all flights suspended, a government source told AFP news agency.

  The two-year conflict has left the nation divided into rival zones. The RSF, led by General Mohamed Hamdan Dagalo - known as Hemedti - controls most of the vast Darfur region in western Sudan, and parts of the south. The military-backed government controls eastern and northern Sudan, including the key Red Sea city of Port Sudan. Sunday's strike is the latest in a string of RSF drone attacks on military and civilian infrastructure in army-held territory. On Saturday, an army source reported a drone attack on Kassala, on Sudan's eastern border, about 250 miles (400km) from the nearest RSF position. The SAF has taken back swathes of territory in recent months, including regaining control of the presidential palace in Khartoum in March. Taking back the capital was seen as a turning point in the two-year civil war, but while the SAF currently have momentum, it is unlikely that either side can achieve a victory that will enable them to govern the whole of Sudan, according to a report by the International Crisis Group. This is Sudan's third civil war in 70 years, but is regarded as worse than the others, tearing through the core of the country and hardening divisions. Following a coup in 2021, a council of generals ran Sudan - led by the two men at the centre of the current conflict. Al-Burhan was head of Sudan's armed forces and in effect the country's president, while Hemedti was his deputy and leader of the RSF. The pair disagreed about the direction the country was going in and the proposed move towards civilian rule - in particular plans to absorb the 100,000-strong RSF into the army. Tensions between the army and the RSF grew as a deadline for forming a civilian government approached, before fighting between the two sides for control of the Sudanese state began. International efforts to broker peace have failed and both sides are backed by foreign powers who have poured weapons into the country.
