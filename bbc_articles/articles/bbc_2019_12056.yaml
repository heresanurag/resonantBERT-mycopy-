content: |-
  Thirty-one people died when two trains collided after a driver missed a red signal on 5 October 1999.

  More than 500 people were injured when two trains collided head-on after a train driver missed a red signal on 5 October 1999

  A Paddington rail disaster survivor has said he fears safety standards may be slipping 20 years after the crash.

  Thirty-one people died when two trains collided almost head-on after a driver missed a red signal on 5 October 1999.

  In 2018-19, 304 trains passed through red signals, a 10-year high, according to official data for England, Wales and Scotland.

  "The risk now is that standards might drop," said Jonathan Duckworth, chair of the Paddington Survivors Group.

  He was one of 227 people hospitalised when his First Great Western train collided with another train at Ladbroke Grove, about two miles from its destination of Paddington, at a combined speed of about 130mph.

  In the 10 years following 1999 the number of Signals Passed at Danger (Spads) more than halved, from 593 to 273.

  But the number has begun to creep up again and July saw 41 Spads, more than one a day, the highest number in a single calendar month for 12 years.

  The UK has "one of the safest railway networks in Europe", rail minister Chris Heaton-Harris said.

  He added: "We are continually learning how to make our railways safer, that is the legacy of a terrible disaster such as this.

  "But disasters could happen any time. That is why one of my many jobs is to ensure we have safety hardwired into every decision that they make."

  Emergency services freed 20 trapped survivors and took eight days to clear the scene of the crash.

  A 70-metre wall of fire engulfed the two trains as fuel caught alight following the collision at about 08:10 BST on a Tuesday morning 20 years ago.

  "We went through a massive fireball. I could feel the heat coming through the windows," Mr Duckworth said.

  "I had no idea what was going on. I thought perhaps it was a bomb.

  "We basically derailed and overturned, so our coach ended up on its side.

  "There was a bit of a battle to get out. It's not easy to get out of an overturned carriage."

  When he got out Mr Duckworth saw "smoke billowing out from charred carriages" lying on their sides as police and rescuers swarmed over the wreckage to try to locate trapped survivors.

  It would take days to remove all the bodies from the wreckage.

