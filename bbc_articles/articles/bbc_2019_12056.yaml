  The outcry that followed led to the biggest-ever safety reform of the country's rail network.

  A series of complex public inquires culminated in two reports by Lord Cullen.

  The inquiry found the crash was caused by the Thames Trains service travelling from Paddington passing through a red signal.

  But Lord Cullen concluded the crash was the culmination of "a catalogue of failures to act".

  He levelled severe criticism at Thames Trains for its "slack and less than adequate" safety culture. It was fined £2m in 2004.

  Railtrack, Network Rail's predecessor, was accused of a "lamentable failure" to introduce safe signalling systems in the entrance to Paddington station.

  Lord Cullen levelled severe criticism at the rail industry for "a catalogue of failures to act" on known rail safety problems

  Paddington was supposed to be a watershed but a series of fatal rail crashes followed at Hatfield in 2000, at Selby in 2001 and at Potters Bar in 2002.

  The Paddington Survivors Group, set up to help victims and bereaved families cope with trauma, campaigned to improve rail safety.

  Under pressure from the group, a train protection warning system that halted trains passing through red signals became industry standard.

  The group worked with the Office for Rail and Road and Network Rail to reorganise the industry in the wake of the crash.

  Network Rail, which superseded Railtrack in 2002, was fined £4m in 2007 for health and safety breaches in the run-up to the Paddington crash, after years of campaigning by the survivors group.

  In addition to July seeing the highest number of Spads for more than a decade, the past 12 months has seen 10 trains pass red signals and reach the "conflict point" - the position along the track at which a collision could theoretically take place.

  The average over the past five years has been between four and five.

  Carriages overturned as the two trains crashed

  A memorial garden has been created, partially overlooking the site of the rail crash

  Concern over the increase led the Rail Safety and Standards Board (RSSB) to write to Network Rail and all train and freight operating companies.

  Mark Phillips, RSSB chief executive, said the 20th anniversary of the disaster was "a timely reminder of what can go wrong if we don't keep our eyes on the ball".

  "We need to look at current train protection technology and industry initiatives, and ask whether enough is being done," he added.

  Mr Duckworth said: "The risk is now that there hasn't been a serious rail crash for 20 years, standards might drop and focus might change.

  "The industry needs to keep recognising that safety is of great importance, because though these incidents don't happen anymore, when they do occur they are devastating."

