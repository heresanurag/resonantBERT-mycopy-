title: 'Michael McMonagle: Review of Access NI checks needed - Jim Gamble - BBC News'
date: '2024-10-09'
section: Northern Ireland Politics
url: http://www.bbc.co.uk/news/articles/cvg345d13j4o
content: |-
  The child protection expert says an independent review is needed after Michael McMonagle admitted child sex offences.

  Jim Gamble said he is questioning if Access NI is fit for purpose

  There needs to be a "full and external review" into Access NI checks in the wake of the Michael McMonagle fall out, according to the former head of the Child Exploitation and Online Protection Centre. Jim Gamble questioned if the scheme, which provides criminal record checks, is "fit for purpose". Last month McMonagle pleaded guilty to a series of child sex offences, including attempting to incite a child to engage in sexual activity. He was employed by the British Heart Foundation (BHF) in September 2022 after references given by former colleagues in Sinn Féin did not raise concerns about his suitability for employment.

  Depending on the level of check, different criminal records and cautions are disclosed on a person's certificate. An enhanced background check would hold information about any ongoing investigation. According to Mr Gamble, the BHF recruitment process had decided that an enhanced check was not required for the role McMonagle was applying for. The charity's chief executive Fearghal McKinney previously told BBC News NI "the BHF is confident we undertook all necessary statutory and moral duties required throughout this entire process". "For you to be subjected to an enhanced check you need to be applying for a role with children and vulnerable adults or in a position of trust," Mr Gamble told the Good Morning Ulster on Wednesday. "It's about how frequently you will be left alone with children and young people, that will determine whether or not you need this check, and this is the hurdle you have to jump." Mr Gamble believes anyone that is in a critical role, that is communicating by, for and on behalf of an organisation, representing them, and engaging on their behalf, that role needs to be automatically included for an enhanced check.

  Sinn Féin president Mary-Lou McDonald has apologised for party's handling of the the investigation. In a statement on Monday, she confirmed she has ordered "a complete overhaul of governance procedures" in Sinn Féin. Mr Gamble said any investigation into Sinn Féin needs to be an "external independent review with no holes barred so that people can see that you're not just committed to saying the right thing but actually doing the right things". He said that an independent review needs to make a judgement on whether for some people in the party, protecting the reputation of the organisation was more important than protecting vulnerable young people. The Department of Justice has been asked for comment.

  Meanwhile, a Stormont committee is seeking legal advice on whether the first and deputy first ministers should be called back for further questioning about the Michael McMonagle controversy. Last week, the issue was raised when Michelle O'Neill and Emma Little-Pengelly appeared at the Executive Office committee. On Wednesday, the committee heard concerns from some MLAs that Sinn Féin still has questions to answer about its handling of the case. DUP assembly member Brian Kingston said that since the first minster had given evidence to the committee, more details had come to light and that O'Neill had since apologised to the BHF for how her party had dealt with the matter. "That change in position has only come about through scrutiny by this committee, the media and the assembly," he said. "This committee has the core responsibility to restore public confidence in those who oversee safeguarding matters."

  It could take a number of days before the committee receives the legal advice

  Alliance, the SDLP, the TUV and independent members of the committee also spoke in favour of bringing the ministers back to clarify more details. SDLP Foyle MLA Sinead McLaughlin said there was a "moral duty" to resolve the issue in order to restore public credibility. The TUV MLA Timothy Gaston said the committee had an "onus" to ask further questions of the first minister and Sinn Fein junior minister Aisling Reilly about previous evidence that they did not engage with McMonagle, when they took part at an organ donation event at Stormont last year. Pictures later emerged showing McMonagle standing near the ministers. O'Neill has insisted McMonagle was "not on my radar".

  Sinn Féin MLA Carál Ní Chuilín questioned the rationale for only inviting ministers from her party back, adding: "You either bring back all four ministers or none - it makes a mockery of the joint office." She asked for legal advice to be sought on that point and whether the committee could ask the ministers questions about issues that could stray beyond its remit. It was also proposed that MLAs should invite the ministers to appear at the committee on 23 October, before the assembly breaks for half-term recess. It could take a number of days before the committee receives the legal advice. The committee's chair Paula Bradshaw said she had reached out to the BHF to ask if they wanted an opportunity to come to the committee, but said the charity wants to "draw a line" under the matter.
