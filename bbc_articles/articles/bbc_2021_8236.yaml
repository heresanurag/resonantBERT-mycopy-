content: |-
  England have a "very special opportunity" to make the country happy when they face Denmark in their Euro 2020 semi-final, says Gareth Southgate.

  Last updated on .From the section England

  England have 'very special opportunity' in semi-final - Southgate England have a "very special opportunity" to make the country happy when they face Denmark in their Euro 2020 semi-final on Wednesday, says manager Gareth Southgate. A 4-0 quarter-final win against Ukraine in Rome on Saturday sent Southgate's side through to the last four. They now return to Wembley - the site of their last semi-final appearance in the men's Euros 25 years ago. "England matches bring families and communities together," said Southgate. Speaking to BBC sports editor Dan Roan, he added: "The opportunity to bring happiness and create brilliant nights for our fans, our nation, is a very special one that you have when you play with England. "They are matches that you remember where you were and some of the nicest messages you get are that people appreciate how the players have been - that they feel they can connect with them - they should be very proud of that."
