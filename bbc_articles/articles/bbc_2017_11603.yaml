id: bbc_2017_11603
title: Russia posts video game screenshot as 'proof' of US helping IS - BBC News
date: '2017-11-14'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-41991012
content: |-
  The image supposedly shows the US aiding IS, but instead it came from a smartphone game.

  The game simulates the attack capabilities of an AC-130 gunship

  Russia's Ministry of Defence has posted what it called "irrefutable proof" of the US aiding so-called Islamic State - but one of the images was actually taken from a video game.

  The ministry claimed the image showed an IS convoy leaving a Syrian town last week aided by US forces.

  Instead, it came from the smartphone game AC-130 Gunship Simulator: Special Ops Squadron.

  The ministry said an employee had mistakenly attached the photo.

  The Conflict Intelligence Team fact-checking group said the other four provided were also errors, taken from a June 2016 video which showed the Iraqi Air Force attacking IS in Iraq.

  The video game image seems to be taken from a promotional video on the game's website and YouTube channel, closely cropped to omit the game controls and on-screen information.

  In the corner of the image, however, a few letters of the developer's disclaimer can still be seen: "Development footage. This is a work in progress. All content subject to change."

  The gameplay video, left, with the Russian MoD photo, right

  Hours later, the ministry published an updated statement with a different set of images, which it also said proved their claims.

  It repeated the claim it was "irrefutable evidence that US are actually covering Isis [IS] combat units to recover their combat capabilities, redeploy, and use them to promote the American interests in the Middle East".

  Russia alleges the US is co-operating with so-called Islamic State by providing cover to fleeing IS militants. In a Facebook post, the ministry said it liberated the town of Abu Kamal last week alongside the Syrian army.

  It said the US-led coalition refused requests to cooperate and "eliminate fleeing Isis convoys".

