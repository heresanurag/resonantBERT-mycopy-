  Watch CCTV of a 14-year-old girl who stabs two teachers and a student at Ysgol Dyffryn Aman.

  Watch the moment a 14-year-old girl stabs two teachers at Ysgol Dyffryn Aman.

  The pupil, who cannot be named due to her age, was found guilty on Monday of attempted murder after stabbing two teachers and a pupil at Ysgol Dyffryn Aman, Ammanford, Carmarthenshire, in April last year.

  This is CCTV footage which the jury at Swansea Crown Court watched before reaching their verdict.

  The teenager stabbed Fiona Elias before turning to Liz Hopkin, the jury heard.

  After what was described as a "stand-off", the jury heard the girl then moved to another part of the school and ran towards a pupil with a knife and shouted, "I'm going to kill you".
