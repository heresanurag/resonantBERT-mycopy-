title: 'John McCain funeral: Senator laid to rest at US Naval Academy - BBC News'
date: '2018-09-03'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-45389738
content: |-
  The war hero who went on to become a maverick Republican senator is buried after a private ceremony.

  John McCain's funeral procession heads to the cemetery at the US Naval Academy

  Senator John McCain has been buried at the US Naval Academy in Annapolis, Maryland, after a small private ceremony.

  A military flypast was performed with the squadron one plane short, to symbolise the dead senator.

  Mr McCain graduated from the elite Naval Academy in 1958, later serving in Vietnam as a fighter jet pilot.

  Family and friends were joined by his classmates and the current midshipmen for a service at the school's chapel.

  It caps a week of memorials for Mr McCain, who died on 25 August, aged 81, from the effects of brain cancer.

  John McCain will be buried next to an old friend, in the grounds of the US Naval Academy

  On Saturday, heavyweights from across the political spectrum gathered at the Washington National Cathedral to remember the Arizona senator, who became one of America's most high-profile politicians.

  Two former presidents - George W Bush and Barack Obama - paid tribute to Mr McCain's courage and sense of honour.

