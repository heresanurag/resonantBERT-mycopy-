  According to data from the United Nations migration body (IOM), the Atlantic route is fast becoming the deadliest migrant journey in the world. An estimated 807 people have died or disappeared so far in 2024 - an increase of 76% compared to the same period last year. But the number of casualties is likely to be significantly higher, because fatal accidents tend to go unrecorded on this route. “Every 45 minutes, a migrant dies trying to reach our beaches. This means trafficking mafias are increasingly becoming more powerful,” says Mr Clavijo, referencing data sourced from the Spanish rights group Walking Borders. The UN’s Office on Drugs and Crime estimates that criminals make around $150m a year on this route. “The mafias that organise trips have realised that this is like drug trafficking, with little chance of being detected," Lieutenant Antonio Fuentes, from a team in Spain’s Guardia Civil set up to tackle the smugglers, tells the BBC. "For them, a migrant is a mere commodity. They carry people like they could carry drugs or weapons. They are simply victims."

  To better understand these criminal networks, the BBC spoke to one Senegalese smuggler organising boat trips - who asked to remain anonymous. “If you take a big boat, one that can carry 200 to 300 people, and each of them pay around $500, we are talking about a lot of money,” he says. When challenged about his criminal responsibility as a trafficker, on a trip that has killed many in his community, the smuggler is unrepentant and tells the BBC: “It is a crime, whoever gets caught should be put in prison, but there’s no solution. “You will see people in the water who have died, but the boats keep going.” For five days, the BBC receives no news from Mr Oualy. Then, one evening, he calls. “The motor was heating up and the wind was so strong, some of the fishermen suggested we head to Morocco. But the captain refused. He said if we moved slowly, we’d be in Spain by 6am.” Mr Oualy was less than a day away from reaching the Canary Islands when the ship’s engine ran into trouble - and many of the migrants, fearful of stronger winds once they went further out into the Atlantic Ocean, rebelled against their captain. “Everyone started arguing and insulting each other. The captain gave in and turned back to Senegal.”

  If I die, it is God’s choice"

  Mr Oualy survived the journey, but he sustained injuries and serious health problems from the journey. He is in constant pain and moves slowly. After a year planning the trip, Mr Oualy is back to square one - and has now returned to his family and is saving enough money for another passage. “I wish to go back and try again. Yes, honest to God, that is my belief. That is better for me. If I die, it is God’s choice.” If Mr Oualy makes it to Europe, it is likely he will not see his family for years. If he dies at sea, he will be lost to them forever.
