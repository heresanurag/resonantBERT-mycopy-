title: 'Newspaper headlines: ''Putin shatters own truce'' and ''over 80 dog attacks
  a day'' - BBC News'
date: '2025-04-20'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c74nxq3l29jo
content: |-
  Sunday's front pages include stories on Russia being accused of breaking an Easter truce it proposed in Ukraine.

  The Sunday Telegraph's front page focuses on scepticism about the so-called "Easter truce", external in the Ukraine war. It says critics have described it as a "naked attempt" by President Vladimir Putin to curry favour with Donald Trump, after the US president threatened to walk away from efforts to secure peace. The Observer leads with the latest from Gaza, reporting that the territory has been pushed to "new depths of despair", external by the seven-week-long Israeli military blockade that has cut off aid supplies to the strip. It cites interviews with civilians, medics and humanitarian workers inside Gaza, and says many are now more afraid of the risk of famine than airstrikes. Israel's government introduced the blockade after accusing Hamas of stealing aid supplies. "Bending knee to China risks UK Security" is the Sunday Express, external front page headline, as it quotes senior Conservatives who have accused the government of risking national security over its relations with Beijing. It follows comments from Chancellor Rachel Reeves that it would be "very foolish" not to engage with the world's second largest economy.

  Emmanuel Macron is set to visit the UK for a state visit in May, the Times reports

  The Sunday Times reports that French President Emmanuel Macron will be granted a state visit, external before Donald Trump's expected trip in September as the UK seeks closer ties with Europe. The paper reports that Macron has received an invitation from the King to stay at Windsor Castle next month on what would be his first full state visit to the UK. The Mail on Sunday claims a number of Labour ministers are secretly plotting to defy the Supreme Court's landmark court ruling that a woman is defined by biological sex , externalunder equalities law. It cites leaked WhatsApp messages it has seen. Officially the UK government has welcomed the ruling, saying it provided "clarity". The Sun leads with an exclusive report claiming that the recently crowned winner of the BBC reality series The Apprentice is at the centre of a probe over claims that his air conditioning business operated without a key licence for several months, external. Dean Franklin told the paper he was not aware of any review or investigation and said he had all the necessary qualifications for his work.

  In its front page splash the Sunday Mirror, external reports that campaigners are calling for tougher penalties in light of figures that show more than 80 people a day are savaged by out-of-control dogs. It says police statistics show that attacks are on the rise across England and Wales. But in happier canine news, several papers feature pictures from the annual 'Corgi Derby' held at Musselburgh race course in Scotland yesterday. Sixteen competitors took part in this year's 70-metre sprint with four-year-old Juno from Edinburgh taking victory. The event celebrating the late Queen Elizabeth's favourite dog breed was first held in 2022 to mark her Platinum Jubilee.

