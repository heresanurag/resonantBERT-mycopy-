title: Queen Elizabeth's wedding cake slice sells for £2,200 at auction - BBC News
date: '2024-11-05'
section: Essex
url: http://www.bbc.co.uk/news/articles/c0j87lwjy69o
content: |-
  A bidder from China secures the 77-year-old dessert as it goes under the hammer in Essex.

  The 77-year-old cake was found in a suitcase under a bed in Scotland

  A "very rare" slice of wedding cake from the marriage of Queen Elizabeth II and Prince Philip has sold at auction for £2,200. The fruit cake was found under a bed in a suitcase, 77 years after the original 9ft (2.7m) cake was dished out to 2,000 guests. It was gifted by the then-Princess Elizabeth to Marion Polson, the housekeeper at The Palace of Holyroodhouse in Edinburgh from 1931 to 1969. "It's a real little find, a little time capsule of glorious cake," said James Grinter, of Colchester-based auction house Reeman Dansie.

  The cake, initially expected to fetch £500, was sold to a bidder from China who purchased it over the phone.

  The cake was still in its original presentation box when it was discovered by Ms Polson's family

  Ms Polson was given a slice as a token of thanks for purchasing the newlyweds a "delightful" dessert service. She kept hold of it until her death in the 1980s, when it was stashed away under a bed with some of her belongings. The cake was still in its original presentation box and came with a letter from the Queen, dated November 1947. It read: "My husband and I are deeply touched to know that you shared in giving us such a delightful wedding present. "We are both enchanted with the dessert service; the different flowers and the beautiful colouring will, I know, be greatly admired by all who see it."

  Ms Polson's Scottish family contacted the auctioneers earlier this year as they sought to sell it under the hammer.

  Royal expert James Grinter said the items up for sale were "very, very rare"

  The royal couple's lavish cake consisted of four tiers and was laced with alcohol for the wedding on 20 November 1947. Mr Grinter, Reeman Dansie's royal expert, said Ms Polson's slice was the first piece ever sold "in its completeness". He told BBC Essex: "This one actually has its original contents which is very, very rare. "Bear in mind it was produced at a time of rationing... They had the most magnificent cake made for them. "I've seen photographs of it - it would fill half a room, it was absolutely enormous." Mr Grinter said the cake was no longer in the best condition, adding: "I don't think I'd particularly want to eat it, I must admit."

