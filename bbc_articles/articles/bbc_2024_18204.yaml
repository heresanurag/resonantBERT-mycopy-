content: |-
  Great Britain's Elinor Barker and Neah Evans win a hard-earned silver medal in an enthralling madison before Jack Carlin takes a dramatic sprint bronze at the Paris Olympics.

  This video can not be played To play this video you need to enable JavaScript in your browser. GB's Elinor Barker and Neah Evans claim silver in the women's madison

  Elinor Barker and Neah Evans won a hard-earned silver in an enthralling madison before Jack Carlin took a dramatic sprint bronze as Britain's cyclists continued to deliver medals at the Paris Olympics. A huge push on the final sprint of the madison gave world champions Barker and Evans a total of 31 points - six behind gold medallists Italy. Carlin, meanwhile, missed out on the chance to race for gold when he lost to eventual champion Harrie Lavreysen in the semi-finals, but beat his Dutch compatriot Jeffrey Hoogland over three races for bronze. It was not without controversy, though, with the race restarted after Carlin - who broke his ankle in April - mistakenly caused a collision that could have ruined his chances. The two medals take Team GB's tally to seven at the Saint-Quentin-en-Yvelines velodrome, with two more days of racing to come. Evans' silver in the madison also means every member of the British track squad has won a medal in Paris.

  Elinor Barker and Neah Evans are the reigning madison world champions

  Britain were defending women's madison champions coming into the 120-lap race, with Katie Archibald and Dame Laura Kenny having won the inaugural Olympic race three years ago in Tokyo. GB were the only team on the podium to not take a 20-point lap, with bronze medallists the Netherlands the first to make the catch. With sprints taking place every 10 laps, Barker and Evans - who are the world champions - made the perfect start by taking the opening five points on offer. They remained in the medal positions throughout, though that looked in danger when first the Dutch then Italy lapped the rest of the field, with the American duo often in touching distance of the British pair. Barker and Evans took the most points of any nation on the sprints, with Barker - who has a team pursuit Olympic medal of every colour after winning bronze earlier in the week - launching a fierce attack to wrap up the double points on the last 250m. "We really, really wanted gold," Barker - a four-time Olympic medallist at 29 - told BBC Sport. "We came in as world champions which obviously meant we put that pressure on ourselves. We had a target on our back potentially. "We said it wouldn't change the way that we raced but it was hard not to feel like we needed to take responsibility for things at times and perhaps that's what we'll pick up in our analysis but also I think - an Olympic medal. "There are plenty of world champions this week that haven't medalled. I think every single medal is a huge achievement." Their silver medal marks a redemption for the pair, who crashed out of the madison at January's European Championships. Evans later revealed she had been diagnosed with the Epstein-Barr virus in April, a bacterial infection that "properly floored" her and left her struggling to climb stairs. "To come away with a medal is huge because there's nothing guaranteed," said the 34-year-old. "It's unorganised chaos. You're like if only...but it's an Olympic silver medal."
  • None Evans emerges from madison chaos hungry for more than silver

