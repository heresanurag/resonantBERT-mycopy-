  Like Barker, 27-year-old Carlin is now a four-time Olympic medallist but his long wait for gold - at this or any major competition - continues. In an era of Dutch sprinting dominance, he was always facing the biggest of asks to stand on the higher steps of the podium, particularly after his ankle break at the Track Nations Cup in Canada earlier this year. In the semi-finals, the sensational Lavreysen - a five-time world champion and now double Olympic gold medallist in the individual sprint - proved too much, but against Hoogland he stood more of a chance. They split the opening two heats of the best-of-three match sprint, forcing a decider in front of the huge numbers of British and Dutch fans inside the velodrome. That was when the drama started. Carlin - who was already carrying a warning from his quarter-final against Japan's Kaiya Ota on Thursday - suddenly veered up the track, causing a collision with Hoogland. The race was stopped, Carlin instantaneously raising his hand in apology before holding his head in disbelief, fearing he would be disqualified. "We're using two different tyres, the front is a bit more slippy, and as I turned, I turned too aggressively for it, slipped a little bit and I leaned into him," Carlin told BBC Sport. "I'd left it in the hands of the [commissaires]." He took his time to regain his composure before the restart, and after winning his second successive bronze in the event, having won the same colour in Tokyo, he cast an emotional figure on the podium. "It's been a tough couple of months after what happened in Canada, and I think the last three months have been probably the hardest of my career, trying to get back to health," Carlin said. "Without British Cycling's support, I don't think I'd have been on the line today, or at this Games. They mended me back together and got me to a place where I'm medal competitive, and I can only be thankful for that." On his final race against Hoogland, he added: "It was the fastest sprint I’ve done in the whole competitions, I gave it absolutely everything and I’m so proud of myself." Elsewhere in Friday's action, Emma Finucane and Sophie Capewell - who were crowned team sprint Olympic champions alongside Katy Marchant on Monday - progressed to the 1/8 finals in the individual sprint. That event continues on Saturday, when Carlin is back on the track in the men's keirin alongside team-mate Hamish Turnbull, while Ethan Hayter and Ollie Wood contest the men's madison.
