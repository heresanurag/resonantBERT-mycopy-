title: 'Australia drought: ‘Wall of dust’ envelops town - BBC News'
date: '2020-01-17'
section: General
url: http://www.bbc.co.uk/news/world-australia-51146501
content: |-
  A dust cloud sweeps across a New South Wales town, turning it red in seconds.

  A dust cloud has rapidly swept across an Australian town, turning it red within minutes.

  Locals in Nyngan, New South Wales, filmed the event – which was caused by storm-generated winds.
