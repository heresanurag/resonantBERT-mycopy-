title: View from a plane of giant Antarctic ice crack - BBC News
date: '2017-02-22'
section: General
url: http://www.bbc.co.uk/news/science-environment-39056226
content: |-
  New video is released of an Antarctic ice crack that may produce a giant iceberg.

  The British Antarctic Survey has released new footage of the ice crack that promises to produce a giant iceberg.

  The 175km-long fissure runs through the Larsen C Ice Shelf on the eastern side of the Antarctic Peninsula.
