title: Building hit by missile in Kharkiv's Freedom Square - BBC News
date: '2022-03-02'
section: General
url: http://www.bbc.co.uk/news/world-europe-60568298
content: |-
  Video show a deadly Russian strike in Ukraine's second city, Kharkiv.

  Central Kharkiv has been hit by a Russian air strike. The morning strike appeared to target government offices in Freedom Square in the city centre.

  According to emergency workers at least 10 people have been killed, and Ukrainian officials says dozens were injured.

  Warning - this video contained distressing footage. It has been verified by the BBC but the source is unknown.
