content: |-
  Over 30,000 bronze coins, possibly from a 4th Century shipwreck, have been found off the coast of Italy.

  Over 30,000 bronze coins, possibly from a 4th Century shipwreck, have been found off the coast of Sardinia.

  Italy’s Ministry of Culture said in a statement that the pieces were “in an exceptional and rare state of preservation”.

  The discovery comes after an amateur diver spotted something metallic in the shallow waters and alerted local authorities.
