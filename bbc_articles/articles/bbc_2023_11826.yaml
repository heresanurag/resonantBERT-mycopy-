title: Pembrokeshire campsite owner on moment car rolled onto tents - BBC News
date: '2023-08-13'
section: General
url: http://www.bbc.co.uk/news/uk-wales-66493914
content: |-
  A cot protected a baby from injuries after a car crashed into its tent, says the campsite's owner.

  A car has crashed into a campsite in Pembrokeshire in South West Wales, injuring a number of people, two of them seriously.

  Newgale Campsite owner Mike Harris spoke to the BBC and recalled what the scene was like before emergency services arrived.

  Police said the car crashed into the campsite just after 22:30 BST and that the passengers in the car were among the injured.

  Mr Harris said there was a baby in a tent hit by the car - but it was protected from injuries by being in a cot, which was a "miracle".
