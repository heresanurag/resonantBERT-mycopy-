id: bbc_2018_13623
title: Will MPs vote for Brexit deal? - BBC News
date: '2018-11-27'
section: General
url: http://www.bbc.co.uk/news/uk-politics-46352907
content: |-
  MPs on all sides of the House of Commons have expressed their concerns on the PM's plans.

  The Prime Minister got the EU to back her plans for Brexit. But back in Westminster, MPs on all sides of the House of Commons have said they will vote against it.

  So why do they say they can’t they support it?
