title: Coronavirus in Scotland - Restrictions lifted & no new deaths - BBC News
date: '2020-07-13'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-53348185
content: |-
  Shopping centres can reopen, dentists can offer some routine procedures, and children can play organised contact sport outdoors.

  The decision to exclude social care workers from a new UK fast-track health and care visa when freedom of movement with the EU ends in January has been labelled as "just crazy"

  Donald Macaskill, chief executive of Scottish Care, said he was "immensely disappointed" with the decision, which his organisation campaigned strongly against.

  Scotland has distinctive needs because of its ageing population and despite a recruitment drive, staffing "depends on inward migration", he told BBC Radio Scotland.

  "The fact it’s happening in January, just at the point where we could potentially have another wave of the pandemic, and flu at its peak, is just crazy," he said.

  "This is policy taking over practical common sense and it’s based on a presumption of carers which is devoid of reality."

  Mr Macaskill said around 6-8% of Scotland's workforce come from Europe, and the UK government's "toxic and xenophobic approach" could put off those already here.
