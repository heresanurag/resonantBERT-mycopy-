title: 'Bangor: Man released on bail after attempted murder arrest - BBC News'
date: '2024-06-08'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c6ppdzvqq3wo
content: |-
  A man in his 40s was found lying unconscious on Fort Road with a significant head injury.

  A 41-year-old man has been released on bail after being arrested on suspicion of attempted murder in Bangor.

  The arrest happened after reports of a serious assault on Fort Road at 22:55 BST on Friday.

  A man in his 40s was found lying unconscious on the road with a significant head injury.

  He was taken to hospital where he remains in a serious condition.

  Police have appealed for anyone who was in the area at the time to contact them.
