title: 'Afghanistan: Chaotic scenes at Kabul airport - BBC News'
date: '2021-08-17'
section: General
url: http://www.bbc.co.uk/news/world-asia-58226712
content: |-
  Video shows hundreds of Afghans attempting to escape, as the Taliban took over the capital.

  Video shows hundreds of Afghans at Kabul airport attempting to escape, as the Taliban took over the capital.

  Gunfire was heard on Monday morning, with eyewitnesses telling the BBC that civilians had been killed. US troops reportedly fired into the air to scatter the crowds.

  The Taliban have taken control of Afghanistan, almost 20 years after being ousted by a US-led military coalition.
