title: 'Missing Vietnamese tourist: Man charged with abduction remanded - BBC News'
date: '2019-08-12'
section: York & North Yorkshire
url: http://www.bbc.co.uk/news/uk-england-york-north-yorkshire-49320020
content: |-
  The girl was last seen in York on 6 August and police say she could be "anywhere in the country".

  A man has appeared in court charged with child abduction over the disappearance of a 15-year-old Vietnamese girl in York.

  Ho Quang Ngoc, 25, is accused of taking a child and facilitating a breach of immigration laws.

  The girl, who speaks no English, went missing from her tour group in York on 6 August and has not been seen since.

  Mr Ngoc, who is Vietnamese, appeared at York Magistrates' Court where he was remanded in custody.

  He is due to appear at York Crown Court on 16 September.

  North Yorkshire Police are appealing for information over the missing girl.

  Seven other people arrested last week have been released under investigation.

  Another man and woman were separately arrested in Staffordshire and are in police custody.

