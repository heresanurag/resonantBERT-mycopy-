title: Boy, 5, who died in fall from block of flats named locally as Aalim Makail
  - BBC News
date: '2024-05-17'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-69025732
content: |-
  The Met Police and Newham Council are both conducting investigations over Aalim Makail's death.

  Police and paramedics were called to Jacobs House on Thursday

  A five-year-old boy who died after falling from one of the upper floors of a tower block of flats in east London has been named locally as Aalim Makail. He fell from Jacobs House in New City Road, Plaistow, at about 06:00 BST on Thursday and was pronounced dead at the scene, the Met Police said. Police are not treating his death as suspicious but Newham Council says it is "undertaking a full investigation". The council described Thursday's events as "heartbreaking and tragic". A neighbour previously said the boy's parents were "inconsolable".

  Police were called at about 06:00 BST on Thursday

  Abi Gbago, chief executive of Newham Council, said it would provide an update once its investigation concludes. She said: "Yesterday was a heartbreaking and tragic day for all concerned, and we are united both in our grief, and in our determination to ensure the family are fully supported. "What they have been through with the loss of Aalim, their child, is truly devastating and they will need time and space to mourn such a terrible loss." The Boleyn Trust, which runs New City Primary School where the five-year-old attended, said: "Aalim was a beautiful, happy and caring child, he was much loved by his family and all the staff at New City. "This is a terrible tragedy and our thoughts and prayers go out to his family at this sad time." Asim Uddin, mosque leader at Masjid Ibrahim Plaistow, described Aalim's death as "shocking" and said the community was "sharing the grief". He said: "We are fully supporting the family. We are all standing side-by-side with the family and making sure there is support."

  Flowers have been left near the scene

  Throughout Friday, the number of flowers, toys and cards left near the tower block has grown, many of them left by children from Aalim's school who stopped by on their way home. An anonymous resident of Jacobs House described the windows as "poor quality". He told the BBC: "The design of the windows on high floors are not good and safe for children. "You can actually unlatch the windows in the living room, kitchen and one of the bedrooms wide open which is clearly not meant to be safe. If a latch does break, it will not close properly and it could blow wide open no matter what." Newham Council did not answer questions about windows in Jacobs House. A spokesperson for the Building Safety Regulator, part of the Health and Safety Executive, said: "We are engaging with the appropriate agencies to understand the facts." Two separate fundraising pages have raised more than £3,000 for the family. Scotland Yard said a file would be prepared for the coroner.

