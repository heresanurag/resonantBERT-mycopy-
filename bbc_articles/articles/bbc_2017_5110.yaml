  Le Real Madrid rejoint la Juventus en finale de la Ligue des champions.

  Ligue des champions: le Real Madrid en finale

  Le Real Madrid a validé son billet pour la finale de la Ligue des champions malgré sa courte défaite lors de la manche retour chez ses voisins de l'Atlético (2-1).

  Avec leur succès à domicile (3-0), les (Merengue) ont tout de même tremblé en début de rencontre quand l'Atletico Madrid a réussi à marquer deux buts par Saul Niguez (12e) et Griezmann (16e). Les visiteurs ont réagi ensuite et réduit le score par Isco (42e).

  En se qualifiant pour la finale de la Ligue des champions pour la deuxième année consécutive , le Real Madrid aura l'occasion d'imiter l'AC Milan, dernière équipe à avoir remporté la C1 deux années de suite. C'était en 1989 et 1990. Ils affronteront la Juventus le 3 juin à Cardiff en Ecosse. Leur troisième finale en quatre ans.

  Si le Real Madrid a réduit le score face à l'Atletico Madrid, il le doit à Karim Benzema. Le long de la ligne de but, et dans un périmètre restreint, le Français a éliminé trois défenseurs avant de centrer pour Kroos dont la frappe repoussée est revenue dans les pieds d'Isco, le buteur.

  Selon Cristiano Ronaldo, la différence d'expérience entre le Real et l'Atlético de Madrid a joué un rôle important dans la qualification des (Merengue) pour la finale de la Ligue des champions.

  Pour Zinedine Zidane l'Atletico Madrid a eu la chance de marquer deux buts "mais nous savions qu'en marquant un seul nous l'achèverons".
