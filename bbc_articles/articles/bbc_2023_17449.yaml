title: Street celebrations as convoy carrying hostages returns to Israel - BBC News
date: '2023-11-27'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-67539822
content: |-
  Thousands lined the streets near the Hatzerim military base in southern Israel to welcome the hostages freed from Gaza on Sunday.

  Thousands of people lined the streets near the Hatzerim military base in southern Israel to welcome the hostages freed from Gaza on Sunday.

  Some of the hostages can be seen waving to the crowds from inside the minibuses. The group of 14 included nine children.

  Hamas took an estimated 240 people hostage during the deadly 7 October attacks on Israel.
