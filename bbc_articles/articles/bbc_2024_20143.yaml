title: 'US Open 2024: Aryna Sabalenka says young fan is ''inspiration'' after second-round
  win, Coco Gauff through - BBC Sport'
date: '2024-08-28'
section: Tennis
url: http://www.bbc.co.uk/sport/tennis/articles/cpvy77v3z1xo
content: |-
  Aryna Sabalenka said a young fan of hers in the crowd was "such an inspiration" after her US Open second-round win.

  Aryna Sabalenka was beaten in last year's US Open final by Coco Gauff

  Aryna Sabalenka underlined her US Open title credentials with a dominant second-round win over Lucia Bronzetti that she said was inspired by a "mini-me" fan in the crowd. Second seed Sabalenka, runner-up in New York last year, beat Italy's Bronzetti 6-3 6-1 in just 61 minutes. Afterwards she headed straight over to meet a young fan who had come dressed as Sabalenka, complete with a temporary tiger tattoo on her left arm. "I just looked up, and I saw on the big screen, like, mini me. It was so cute," Sabalenka said. "It's such a motivation to keep going to inspire the young generation. That was a very adorable moment."

