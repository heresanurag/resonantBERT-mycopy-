content: |-
  Team GB's Sky Brown overcomes a shoulder injury to claim Olympic bronze in a thrilling women's skateboarding park final in Paris.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Team GB's Sky Brown overcame a shoulder injury to claim Olympic bronze in a thrilling women's skateboarding park final in Paris. Brown, 16, was seen clutching the left shoulder she dislocated last week after a heavy fall during Tuesday's preliminary round. But a sensational final run of 92.31 ensured she added to the bronze she collected in Tokyo, when she became GB's youngest medallist aged 13 years and 28 days. "I feel like this made my story," Brown said. "I felt the adrenaline and was just hyped up. I didn't even think about it." Australia's Arisa Trew, 14, took gold at Place de la Concorde with 93.18, as Japan's Kokona Hiraki also repeated her result from three years ago, scoring 92.63 for silver. A new winner had been guaranteed after defending champion Sakura Yosozumi failed to advance earlier in the day. And Trew, who was sporting her trademark pink helmet, superbly executed a high-risk and high-speed final round to become the youngest medallist at Paris 2024.

  Sky Brown, 16, was already Great Britain's youngest Olympic medal winner of all time

  Brown vowed to "fight through" the pain after coming through qualifying and said she would require surgery after the Games. She delivered a display brimming with grit and flair despite performing with heavy strapping. Sitting just outside the podium places after an opening 80.57, she increased the difficulty of her routine with each round and was eyeing an upgrade on her medal from Tokyo 2020 until the last skater, Hiraki, pipped her. Nevertheless the bronze is a remarkable achievement for the British boarder, who only turned her attention and training back to the skatepark when her bid to qualify for the surfing came up narrowly short in March. "This journey has been crazy with lots of downs but lots of ups," she added. "Since Tokyo I have learned a lot. I was one spot away from qualifying for the surfing. It made me stronger. I am super stoked. I wasn’t even sure I was going to make it here." A turbulent build-up to Paris also included a tear to the medial collateral ligament in her right knee in April. But now, incredibly, Brown has two Olympic medals at the age of just 16.
