title: 'England 23-22 Ireland: Marcus Smith''s last-gasp drop-goal hands England thrilling
  win - BBC Sport'
date: '2024-03-09'
section: General
url: http://www.bbc.co.uk/sport/rugby-union/68522819
content: |-
  Marcus Smith kicks a last-gasp drop-goal as England produce their best display of the Steve Borthwick era to stun Ireland in a Six Nations thriller.

  Last updated on .From the section Rugby Union

  Marcus Smith kicked a last-gasp drop-goal as England stunned Ireland and ended their chance to win back-to-back Grand Slams in a Six Nations thriller at Twickenham.

  England trailed by two points after James Lowe's late try but Smith's final act chipped the ball over the posts to send the home fans into delirium.

  In an action-packed second half, Lowe opened his account with an acrobatic finish in the corner before tries by George Furbank and Ben Earl handed a resurgent England the lead.

  Lowe's second was an equally fine finish and looked set to clinch the title for Ireland, but Smith kept his nerve to inflict a first Six Nations defeat on Ireland since Paris in 2022.

  Ollie Lawrence opened the scoring for England in a blistering start but Ireland, chasing history in their pursuit of a first double Grand Slam in the Six Nations, gained a foothold in the game through Jack Crowley's assured boot.

  Victory for England keeps their faint title hopes alive and also means they have ended their run of three successive Six Nations with only two victories from five games.

  But Ireland still lead the Six Nations standings and will retain their crown with a win over Scotland in Dublin on the final weekend.
