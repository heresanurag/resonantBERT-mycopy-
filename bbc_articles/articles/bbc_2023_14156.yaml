  Laughing gas joins drugs including diazepam, GHB and GBL under the class C categorisation.

  The ban is being issued under the Misuse of Drugs Act 1971, which regulates drugs in the UK based on their perceived harm and potential for misuse.

  It is already illegal to produce or supply laughing gas for its psychoactive effects under the Psychoactive Substances Act 2016. That law makes production, supply and importation of nitrous oxide for human consumption illegal, but not possession.

  Alexandre Piot, director of research at the Conservative Drug Policy Reform Group, said it was "of concern that the government has dismissed the counsel of its statutorily established expert advisory board on this issue".

  "It is imperative to educate the public about the actual risks of nitrous oxide abuse and the perils associated with its homemade production. But the wider costs and benefits of this measure have not been weighed with the expert care they deserve."

  Jane Slater, from the campaign Anyone's Child: Families for Safer Drug Control, which wants drugs to be legalised and regulated, said criminalising possession "will only give more young people criminal records, make using it more dangerous, fuel organised crime activity, and cause further harm to our families and communities".

  "If this government is serious about addressing the problems with nitrous oxide then it would listen to the experts who are recommending a health-led approach supported by better use of existing controls."

  Some 15 neurologists and other health experts wrote to the government last week saying possession of the drug should not be criminalised.

  The letter said there was "very little evidence that the criminalisation will lead to reductions in neurological harm and will impact people's opportunities who are not in education and employment".

  Between 2001 and 2020, there were 56 registered deaths involving nitrous oxide in England and Wales - 45 of them since 2010, according to the government report.

  Prof David Nutt, from Imperial College London's department of medicine, previously said there was around about one death per year in the UK from around one million nitrous oxide users. "A comparison with alcohol would be that around 28,000 deaths happen per year in around 40 million users of alcohol," he added.

  Anyone inhaling big doses of laughing gas risks falling unconscious or suffocating from a lack of oxygen. Inhaling the gas directly from a large canister can be fatal. Some people using it recreationally to get a high have died as a result.

  UK medics are increasingly seeing young people coming into hospitals with complications from longer-term heavy use.

  Repeated hits of nitrous oxide can deplete body levels of an important vitamin called B12, which, in turn, can cause permanent nerve damage.

  It can affect both the spinal cord and the nerves in arms and legs, causing loss of feeling, abnormal sensations and muscle weakness or even full paralysis.

  Other symptoms include weakness and bladder or bowel urgency or incontinence. Importantly, patients often do not mention nitrous oxide use, possibly because they do not connect it with their symptoms, or because they don't want to admit to a doctor that they've been misusing it.
