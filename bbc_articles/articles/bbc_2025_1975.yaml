  Hot Ones host on Louis Theroux podcast and big Pokémon news: What to stream this week

  This week, American YouTuber Sean Evans will be talking to Louis Theroux about his show Hot Ones - and whether he'd ever have Kanye West on as a guest. But that's not all the week has in store. Gaming fans have Pokémon Day and the release of Monster Hunter Wilds to look forward to, Pamela Anderson's new film The Last Showgirl is coming out, and Blackpink star Lisa is dropping her debut solo album. Read on for this week's biggest releases...

  Sean Evans is best known for his YouTube show Hot Ones, where he interviews celebrities while they eat chicken wings that get progressively spicier. But the tables are being turned on Tuesday, when he's appearing as a guest on Louis Theroux's podcast, external. I've been told we can expect the pair to discuss the art of interviewing, the evolution of Sean's career, and some of the most memorable moments from Hot Ones - including the viral DJ Khaled and Conan O'Brien episodes. The pair will also chat about Sean buying the Hot Ones brand from Buzzfeed, and Louis asks whether he would ever consider inviting Kanye West on the show.

  You know the saying... you wait for one creature-collecting gaming franchise from Japan and then two come along at once (or at least, we think that's it). For those who celebrate, Thursday is Pokémon Day – when fans of the long-running series get a glimpse of what to expect in the coming year. We'll be watching closely for updates on Pokémon Legends Z-A – the upcoming Nintendo Switch game teased at last year's Pokémon Presents showcase – and hoping to learn more about plans for The Year of Eevee (2025 is dedicated to the popular bushy-tailed character). You can watch the presentation on the Pokémon YouTube, external from 14:00 GMT. And on Friday, it's the long-awaited release of Monster Hunter Wilds (PC, PlayStation 5 and Xbox), from Resident Evil and Street Fighter developer Capcom. Originally a big hit in Japan, recent entries in the series have found a huge worldwide audience. This sequel returns players to The Forbidden Lands, tasking them with, er, hunting monsters of increasing size and strength. But the similarities with Pokémon end there. You almost certainly wouldn't want a soft toy version of these bad boys.

  Pamela Anderson is back in the spotlight. The Baywatch actress, who first rose to prominence in the 90s, is now starring in The Last Showgirl, a film about a woman who must plan for her future after her show abruptly closes following a 30-year-run. It's a film about second chances - and plenty of critics have described this as 57-year-old Pamela's own comeback. But when I met her recently, she said she wasn't sure she'd call it that. "I would say it's just a new chapter," she told me, adding that everything that went before was "bootcamp and learning experiences". "I've always been fascinated with the craft of acting, and I just wasn't getting the opportunity to put what I was craving into something." My full interview with Pamela will be out later this week - and the film is released in UK cinemas on Friday.

  I feel like Blackpink singer Lisa is everywhere right now. She's just taken on her first major acting role in season three of The White Lotus, HBO's hit TV show about rich entitled holiday-makers, which is set this time in her homeland, Thailand. And on Friday, Lisa - whose full name is Lalisa Manoba - is releasing her first ever solo album independent from her famous girl group. Entitled Alter Ego, it includes singles Moonlit Floor, which interpolates Sixpence None the Richer's classic track Kiss Me, as well as New Woman featuring Spanish star Rosalía, and hip hop track Rockstar.
  • None Banks's new album, Off With Her Head, is released on Friday
  • None Everything is Recorded's new album, Temporary, is also released on Friday
