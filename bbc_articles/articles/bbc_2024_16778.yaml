content: |-
  Superstar scrum-half Antoine Dupont delivers by coming off the bench to lead France to their first gold of the Paris Olympics.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'One of the greatest moments in French rugby' - France win gold

  Superstar scrum-half Antoine Dupont delivered in mesmerising style as he came off the bench to lead France to their first gold of the Paris Olympics. Dupont, a poster boy of the Games, set up a try and scored two himself to inspire the hosts to a stunning 28-7 win over Fiji in the men's rugby sevens final. "It is sensational. It is unbelievable. It is a big reward for us," Dupont said. "It is huge. We worked a lot for a lot of months and a lot of years - in some players' case - for this moment." The match was tied 7-7 at half-time when the inspirational Dupont, who decided to skip the Six Nations to focus on the sevens, came on to the field to a huge ovation. Within 21 seconds, he had scampered down the left flank and found British-born Aaron Grandidier on hand to finish off the move. From that point, France grew in confidence and never looked like being beaten. Dupont added two more tries - including one after the final hooter - to spark jubilant scenes. French President Emmanuel Macron celebrated in the stands as the players and almost 70,000 spectators sang and danced in triumph. The majority of the crowd remained standing for the next hour, going through a repertoire of songs including a rousing rendition of national anthem La Marseillaise, before applauding each of the victorious home players as the gold medals were put around their necks.

  Dupont is a titan in the 15-a-side ranks, captain of his country and voted 2021 World Player of the Year. So when he switched to the sevens format it was a huge story and a decision that led to forensic analysis in France. The 27-year-old decided to skip the Six Nations earlier this year to prioritise his nation's bid for seven-a-side gold glory on home soil. After an initially frosty response, that decision eventually further endeared Dupont to the French public - and it has resulted in Les Bleus landing glory on the first full day of the Games. France's biggest sports newspaper, L'Equipe, lauded him across Wednesday’s front pages, before an idolising Stade de France crowd regularly chanted his name when the tournament began. In the build-up to the gold medal match, you could spot fans wearing Dupont masks as they milled about outside the stadium. Every time his face appeared on the big screen inside, when the players strode out and prepared during the warm-up, the level of noise went up a notch to ear-splitting levels. When Dupont darted out at the start of the second half, expectation rose. Then he showed why he is one of the greats. Like all generational talents, he delivered on the biggest stage. He came on, took the game by the scruff of the neck, and delivered the gold medal which France craved. Afterwards, Dupont was asked how he coped with being hailed by some as the best player of all time after adding sevens glory to his 15s success. "It is always a pleasure to hear words like that - but honestly I don't spend a lot of time thinking about that," he said. "I am still young and have a lot of work still to do."

