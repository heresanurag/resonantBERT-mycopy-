title: Heavy snow showers forecast for parts of Northern Ireland - BBC News
date: '2022-02-23'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-60491942
content: |-
  Yellow weather warnings are issued for counties Antrim, Tyrone, Fermanagh, and Londonderry.

  Binevenagh Forest near Limavady was carpeted with snow last weekend and there is more on the way

  Heavy snow showers and lightning are forecast for northern and western counties of Northern Ireland from later on Wednesday afternoon.

  The Met Office has updated its yellow warning for wind and snow to snow and lightning in counties Antrim, Tyrone, Fermanagh and Londonderry.

  The warnings come into force at 17:00 GMT and will last until 20:00 on Thursday.

  The Met Office said some of the areas may be affected by lightning.

  Following windy weather and rain during the day, temperatures are expected to drop sharply in the evening.

  Showers will turn increasingly wintry, with snow initially on high ground dropping to lower levels through the night.

  By Thursday morning, a covering of snow is expected in some areas, with several centimetres possible at some lower levels and more over hills and mountains.

  The gusty winds will mean blizzard-like conditions are likely on some high-level roads, for example the Glenshane Pass and the Coleraine to Limavady Road.

  Temperatures will drop below 0C in places, leading to icy stretches through the rush hour on Thursday morning.

