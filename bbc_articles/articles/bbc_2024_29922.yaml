content: |-
  Mateusz Sikorski was driving on the wrong side of the road when he collided with Christopher Boyle.

  Jail for death crash driver on wrong side of road

  Christopher Boyle was killed in the two-car crash in Pembrokeshire in September

  A chef who was driving on the wrong side of the road has been jailed for two years and four months for killing a taxi driver in a crash. Christopher Boyle, 57, died on 2 September on the A4139 between Tenby and Penally in Pembrokeshire. Mateusz Sikorski, 30, pleaded guilty to death by dangerous driving in October and was sentenced to 28 months. Swansea Crown Court was told Sikorski, who was born in Poland, was visiting Wales to look for work as a chef.

  The court heard he had been staying with friends who ran a local restaurant. He was driving a friend's BMW towards Penally when he collided head-on with Mr Boyle, who was travelling in the opposite direction. Sikorski initially told police at the scene that Mr Boyle was travelling on the wrong side of the road, but later admitted he [Sikorski] was on the wrong side of the road, which was backed up by CCTV footage from a nearby petrol station. The court heard he was driving on the opposite side for "at least half a mile" before the collision. Mr Boyle was pronounced dead at the scene.

  Christopher Boyle's death has left a "void", his family says

  A victim impact statement was read out in court on behalf of Elizabeth Evans, Mr Boyle’s sister. "The loss of Chris has been absolutely devastating," it read. "His tragic death by no fault of his own has left a void in our lives that can never be filled." Mr Boyle was described as a "beloved member of the community," adding the "laughter he brought to gatherings will forever be missed". Ms Evans said he was "the backbone who held our family together", and the "impact of that one careless act will never fade".

  "Mateusz Sikorski's manner of driving posed a major risk to other road users and resulted in fatal consequences," says the Crown Prosecution Service

  James Hartson, defending, told the court the defendant had "genuine and heartfelt remorse for his actions". He described the defendantac's tions as a "lapse of concentration" and said "he has always accepted full responsibility for Mr Boyle's death". Sentencing Sikorski, Judge Geraint Walters told him he was driving on the wrong side of the road, whether that was because he had "voluntarily forgotten" or because "driving in the UK is on the opposite side of the road than you're familiar with". He added: "It's incumbent on all of us no matter what country we're driving in, that we familiarise ourselves with the rules. “Either you had forgotten or were ill equipped," he added.

