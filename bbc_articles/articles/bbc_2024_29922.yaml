  "These cases are amongst the most difficult that courts have to deal with. "On one hand you're harmless," he said. "On the other side of matters, the harm caused by that dangerous act couldn't be much worse. "A loving son, partner, father, brother and admired by extended family could never have predicted moments before he encountered you that he was experiencing his last seconds of life. "Sentences can’t restore life, but the hurt, anguish and grief can in many families last many many years and nobody completely recovers from it." Craig Harding of the Crown Prosecution Service said: "Mateusz Sikorski's manner of driving posed a major risk to other road users and resulted in fatal consequences. "Our thoughts and sympathies remain with Mr Boyle’s family and friends who have suffered a dreadful loss."
