  After hitting China, Yagi is also expected to make landfall in northern Vietnam late on Saturday in a weakened state. Tens of thousands in the provinces of Hai Phong and Thai Binh will be evacuated to safer ground by the end of Friday, AFP news agency reported, citing local authorities. The military has mobilised some 460,000 officers to help manage the storm's impact, Vietnamese media reported. Vietnam's deputy agriculture minister has warned that it could hit regions "crucial to the socio-economic development" of the region. "Carelessness could result in catastrophic damage," Nguyen Hoang Hiep said. Four airports in the country's north, including Hanoi's Noi Bai International Airport, will be shut on Saturday in anticipation of the storm, Vietnam's civil aviation authority said. Earlier this week, floods and landslides brought by Yagi killed at least 13 people in northern Philippines, with thousands of people forced to evacuate to safer ground. Scientists say typhoons and hurricanes are becoming stronger and more frequent with climate change. Warmer ocean waters mean storms pick up more energy, which leads to higher wind speeds. A warmer atmosphere also holds more moisture, which can lead to more intense rainfall. Yagi comes a week after typhoon Shanshan hit Japan, killing at least six people and injuring hundreds.
