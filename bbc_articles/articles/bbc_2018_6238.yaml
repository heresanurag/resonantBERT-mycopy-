  • None Only once have England been bowled out for a lower score than 184 after winning the toss and batting in a Lord's Test, in 1955
  • None England lost their last five wickets for 16 in 34 balls in 25 minutes
  • None Alastair Cook and Mark Stoneman average 19 as an opening partnership from 19 innings, with a highest stand of 58. They have failed to put on more than 35 in their past 10 Test innings together
