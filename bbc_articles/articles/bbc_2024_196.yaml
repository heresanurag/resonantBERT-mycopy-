title: Fujitsu CEO 'sorry' over postmaster scandal - BBC exclusive - BBC News
date: '2024-01-16'
section: General
url: http://www.bbc.co.uk/news/world-67999236
content: |-
  When asked if he would apologise, Takahito Tokita said: "Yes, of course."

  The global chief executive of Fujitsu has told the BBC he is sorry for the impact the company's Horizon IT has had on UK sub-postmasters and their families.

  Takahito Tokita was speaking to the BBC at the World Economic Forum in Davos, Switzerland.

  When the BBC's Hope Rhodes asked if he would apologise, he said: "Yes, of course."
