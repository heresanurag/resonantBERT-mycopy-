  But the 2017-18 survey suggests only 28% of children achieve that amount in school - and only 22% after school.

  Being active includes sporting activities, active play, walking, fitness activities, dance and using a scooter.

  Pupils at Mossbourne Community Academy in Hackney, London, are learning to row through a programme run by London Youth Rowing to open up the sport to more young people.

  "It's a really good stress reliever, especially when there are exams," says one pupil.

  "You find things out about yourself you didn't know were there," says another.

  Rowing coach Oliver James believes a culture of sport can be created.

  "It becomes an expectation that doing sport is just something that young people do," he says.

  There is evidence that ethnic background and family earnings also have an impact on activity levels.

  Twice as many children from well-off families can swim unaided by the end of primary school, compared to those from the poorest families

  Girls from Asian and black backgrounds are less active than children from other communities while 86% of children from the highest-earning families can swim 25m unaided, compared to only 42% from families earning the least.

  The type of activities children do changes as they get older.

  Playing tag or climbing in a playground are popular among younger age groups, but this gives way to team sports which become the most popular activity by years 7-8 at school.

  Tim Hollingsworth, chief executive at Sport England, said he wanted to see a national focus on the health and wellbeing of children.

  "Parents, schools, the sport and leisure industry and government all have a role to play in addressing and increasing childhood activity. This research is the first of its kind anywhere in the world and is a big wake-up call for all of us.

  "We all care about the health and wellbeing of our children. These results tell us that what is currently being done to support them is not enough and change is required."

  He said listening to young people and what they want was the best starting point.

  Dr Alison Tedstone, head of diet, obesity and physical activity at Public Health England said: "Physical activity is crucial for good physical and mental health of children and young people - this work is a timely reminder for everyone to do more to help them be more active."

  Sport England will be releasing a second report, due in March 2019, highlighting children's attitudes to sport and physical activity.

