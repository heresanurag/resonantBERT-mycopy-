  Prime Minister Theresa May congratulated Ms Davidson and Ms Wilson with a tweet wishing them and baby Finn "every happiness for the future".

  He added: "I am so very pleased for Ruth and Jen. They will make fantastic parents and I wish them both the very best as they embark on this exciting chapter of their lives as a family."

  Scotland's first minister, Nicola Sturgeon, also tweeted wishing Finn "a lifetime of happiness".

