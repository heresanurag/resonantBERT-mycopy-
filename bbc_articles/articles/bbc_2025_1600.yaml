title: 'Marco Asensio: Aston Villa to sign Paris St-Germain midfielder on loan - BBC
  Sport'
date: '2025-02-02'
section: Aston Villa
url: http://www.bbc.co.uk/sport/football/articles/c983jk6lp2ko
content: |-
  Aston Villa are set to sign Spain midfielder Marco Asensio on loan from Paris St-Germain until the end of the season.

  Manchester United forward Marcus Rashford completed a loan move to the Midlands club on Sunday.

  Villa have also signed Spanish full-back Andres Garcia from Levante and Netherlands forward Donyell Malen from Borussia Dortmund in January. They sold Colombia striker Jhon Duran to Saudi Pro League side Al-Nassr in a £71m deal and centre-back Diego Carlos to Fenerbahce for around £8.45m.

  Asensio, 29, has scored seven goals in 47 appearances for PSG since joining from Real Madrid in the summer of 2023, helping the club win the French title in 2024.

  He has also had spells at Mallorca and Espanyol, as well as earning 38 caps for Spain.

  Boss Unai Emery said his side "need new players" following Saturday's 2-0 defeat at Wolves, which left the club eighth in the Premier League.

  The Midlands club finished in the top eight of the new Champions League group stage to qualify for the last 16.
