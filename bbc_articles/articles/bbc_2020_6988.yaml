title: Lightning strike sets house on fire in Gowerton, Swansea - BBC News
date: '2020-06-24'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-52942333
content: |-
  The lightning set fire to the roof in what a neighbour calls a "one in a million" chance.

  This video can not be played To play this video you need to enable JavaScript in your browser. Fire destroyed the roof of the house after the lightning strike

  A house has been set on fire after being hit by lighting.

  Emergency crews were called to the property on Porth Y Waun, Gowerton, Swansea, just after 18:00 BST.

  Firefighters from Gorseinon, Sketty and Swansea have been fighting the blaze.

  Mid and West Wales Fire and Rescue Service said the roof of the house was "well alight", but everyone in the building had been accounted for and there were no causalities.

  Neighbour Stuart Roberts said: "My little girl went to the window and said there was smoke coming from a house down the road.

  "It was horrific - it looked like it hit the TV aerial - one in a million that happening, it was a terrible shame."

  The alarm was raised just after 18:00

  No-one was hurt in the fire

