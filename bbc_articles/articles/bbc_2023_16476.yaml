id: bbc_2023_16476
title: Entire streets destroyed in Gaza refugee camp - BBC News
date: '2023-10-16'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-67121800
content: |-
  In footage from Saturday, people can be seen walking through huge piles of rubble.

  A large number of buildings in a refugee camp in northern Gaza have been destroyed by Israeli strikes.

  Civilians had been told to leave the area and head to southern Gaza ahead of the strikes.

  More than 1,400 people in Israel were killed in Hamas attacks just over a week ago. Nearly 2,700 people in Gaza have been killed in Israel's retaliatory bombardment.

  In footage taken on Saturday, people can be seen walking through the rubble in Jabalia.
