content: |-
  Chris Eubank Jr slaps Conor Benn across the face with an egg during a head-to-head at an extraordinary media conference for their fight in Manchester.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Chris Eubank Jr slapped Conor Benn across the face with an egg during a head-to-head at an extraordinary media conference in Manchester. The British rivals - who will fight at Tottenham Hotspur Stadium on 26 April - at times acted like petulant children and hurled foul-mouthed insults at each other throughout the event. Tension later filled the auditorium at the Manchester Central venue before the obligatory face-off. The pair exchanged words close up, before Eubank produced an egg from his pocket and hit Benn across the cheek with his left hand. An already volatile Benn, with his father Nigel next to him, lost control and both boxers were held back by security guards. A scheduled fight between the pair in October 2022 was called off after Benn failed a voluntary drugs test, prompting a two-year battle with anti-doping authorities, before his suspension was lifted in November. Benn has always denied intentionally doping and both fighters are being tested by the Voluntary Anti-Doping Association (Vada) for the contest. An independent report by the WBC in February 2023 said his failed drugs test was not intentional and could have been caused by a "highly elevated consumption" of eggs. "Apparently egg contamination was the reason for his two failed drugs tests. So I contaminated him with an egg," Eubank posted on social media with a clip of the incident.

  Eubank made a slow entrance and demanded Benn be seated closer to him. "I don't know who you think you're talking to," responded a twitchy Benn, dressed in a black silk pyjama-like outfit. The fighters belittled each other's records, Eubank spoke about the injustice of a rehydration clause which means he cannot weigh more than 10lb more than the middleweight limit on fight night, and Benn said he would "render [Eubank] unconscious". "I'm excited to end this man's career," said 28-year-old Benn, who has won all 23 of his fights, with 14 stoppages. With 34 wins in a career spanning more than 13 years, Eubank, 35, has fought at a significantly higher level. His losses have come against former world champions Billy Joe Saunders, George Groves and Liam Smith. "I'm going to beat him because I'm a better fighter in every department," he said. Eubank and Benn have reignited a family rivalry after their hall-of-fame fathers fought for a second time almost 32 years ago. Eubank Sr was not in attendance, however, and appears reluctant to be involved in the promotion of the fight. "The bottom line is that his dad does not even like him," said Benn. As the war of words continued, Nigel Benn and Eubank's team, including promoter Ben Shalom, remained quiet. But Eubank took particular aim at Benn's promoter, Eddie Hearn, who refused to back down. "This is not the Eddie Hearn show," he said, talking over Hearn every time the Matchroom chairman spoke as a standoff ensued.
