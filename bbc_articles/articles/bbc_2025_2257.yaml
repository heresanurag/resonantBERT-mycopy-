  It is unlikely the Manchester Central Auditorium - which usually caters for corporate events - has seen such histrionics. Benn v Eubank is a bloodline rivalry which has transitioned into bona-fide hatred. Put these two volatile Englishmen together in any room and the chances of it kicking off are extremely high. Asked by BBC Sport before the media conference what he thought of his opponent, Benn - without hesitation - replied: "Idiot." We expected a push or maybe some insults which crossed the line, but Eubank's actions caught everybody by surprise. The pair are set to face off again at Tottenham Hotspur Stadium on Thursday. The security firm used by organisers may need to call on a few more staff.
