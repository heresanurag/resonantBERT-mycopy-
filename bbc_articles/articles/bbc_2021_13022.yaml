content: |-
  First Minister Mark Drakeford says he expects businesses to stay open and Christmas be more like we're used to.

  Christmas 2021 will be more like we're used to - Drakeford

  Christmas 2021 will be more like "the ones that we're used to" if nothing unexpected happens, the Welsh First Minister says. "The most likely scenario in our control plan says that we ought to be able to get through the autumn and the winter with restrictions at the sort of level, we have at the moment," Mark Drakeford says. "That would be very different to last Christmas, far more like the sort of Christmases we were used to. "All that does depend on us all doing the things that keep us safe, coming forward for vaccination and the simple things that we've learned to do together. "Then, if nothing unexpected arises, and we've got to plan for the unexpected as well, then we can look forward to a Christmas much more like the ones that we are used to."
