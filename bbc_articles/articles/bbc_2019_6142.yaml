  Schumer also combined the news of her pregnancy with a list of more than 20 Democratic candidates that she was endorsing in the US mid-term elections the following month.

  In another post on Monday, the comedian said she had stopped off at the Metropolitan Museum in New York to pose for a photo on her way to the hospital.

