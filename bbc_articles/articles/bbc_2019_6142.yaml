title: Comedian Amy Schumer gives birth to 'her own royal baby' - BBC News
date: '2019-05-06'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-48181924
content: |-
  She announced the arrival of a "royal baby" just after the Duchess of Sussex delivered her own son.

  Amy Schumer and her husband Chris Fischer announced the birth on Instagram

  Comedian Amy Schumer and husband Chris Fischer are celebrating the birth of their first child - a boy.

  Schumer posted about the birth with the caption: "10:55pm last night [03:55 BST on Monday]. Our royal baby was born."

  Their new arrival was announced on the same day the Duke and Duchess of Sussex's own baby boy was born.

  The couple had also announced their pregnancy in October 2018 - by editing their faces onto a photo of Prince Harry and Meghan's bodies.

  Schumer posted a photo of herself, her husband and their baby at the hospital in New York, which appeared to have been taken soon after the birth.

