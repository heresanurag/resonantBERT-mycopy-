title: 'Mexico crash: Passenger films inside plane - BBC News'
date: '2018-08-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-45036199
content: |-
  All 103 passengers survive a crash in the Mexican state of Durango, but 97 of those are injured.

  A passenger plane has crashed in the Mexican state of Durango, but all 103 people on board survived.

  Footage from inside the plane shows the moment of the crash.

  One of those was Lorenzo Nunez who described a "strong explosion" moments after take off.
