title: 'Irish Lottery: Light trick ''caused number change'' - BBC News'
date: '2017-10-09'
section: Europe
url: http://www.bbc.co.uk/news/world-europe-41549781
content: |-
  A winning lottery ball appeared to change from number 38 to number 33 during the weekend's draw.

  The ball, second from left, appeared to be labelled number 33 as well as number 38

  One of the winning balls in Saturday's Irish National Lottery appeared to change numbers due to a trick of the light, lottery chiefs have said.

  Ball 38 was the second one to drop during the draw.

  But after it was nudged by the next ball it seemed to be labelled number 33 as well as 38.

  That led some people on social media to suspect foul play, but the Irish National Lottery has stressed that nothing sinister was afoot.

