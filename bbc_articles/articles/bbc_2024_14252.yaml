title: 'Lyra McKee: Court hears journalist was killed by a single bullet - BBC News'
date: '2024-06-07'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cqqq9g44kw5o
content: |-
  The journalist was observing rioting in the Creggan estate in Derry in April 2019 when she was shot.

  Lyra McKee died after being shot while she observed rioting in the Creggan area of Derry in April 2019

  Lyra McKee was killed by a single bullet to the head, a pathologist has told Belfast Crown Court. Dr Christopher Johnston said the 29-year-old journalist had been "given six cycles of CPR, but to no avail". Ms McKee was observing rioting in the Creggan estate in Londonderry in April 2019 when she was shot and killed. Three men from Derry are on trial at Belfast Crown Court accused of her murder - Jordan Devine, 23, of Bishop Street, Paul McIntyre, 56, of Kells Walk and Peter Cavanagh, 35, of Mary Street.

  Jordan Devine, Peter Cavanagh and Paul McIntyre (left to right) are all accused of the murder of Lyra McKee

  On Friday, Dr Johnston, who was assistant state pathologist at the time of the killing, told the non-jury trial that the journalist "had a cardiac arrest at the scene and died as a result of a bullet to the head". He said: "This injury would have caused immediate unconsciousness and very rapid death." Seven other men, also all from Derry, are on trial on charges which include rioting and throwing petrol bombs. They are: Joseph Barr, 36, of Sandringham Drive; Jude Coffey, 26, of Gartan Square; William Elliott, 57, of Ballymagowan Gardens; Joseph Campbell, 23, of Gosheden Cottages; Patrick Gallagher, 32, of John Field Place; Christopher Gillen, 43, of Balbane Pass, and Kieran McCool, 55, of Ballymagowan Gardens. All ten defendants have denied the charges against them.
