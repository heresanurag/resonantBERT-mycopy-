title: 'Bill Dare: Spitting Image and Dead Ringers creator dies - BBC News'
date: '2025-03-04'
section: Culture
url: http://www.bbc.co.uk/news/articles/cm2yme20rypo
content: |-
  Tributes have been paid to the 64-year-old comedy writer, who died in an "accident overseas".

  Dare worked on popular comedy programmes including The Now Show and Dead Ringers

  Comedy writer and producer Bill Dare, who worked on shows including ITV's Spitting Image and BBC's Dead Ringers, has died, his agent has said. The 64-year-old created several award-winning satirical programmes for TV and radio over a decades-long career. In a statement, his agent said he had "died at the weekend following an accident overseas" but did not provide further details. In a post on social media, Dead Ringers star Jon Culshaw called Dare the "wisest comedy alchemist and the dearest, dearest friend".

  Dare also worked on programmes including The Late Edition and I've Never Seen Star Wars. His topical satire show Dead Ringers is set to mark its 25th anniversary on BBC Radio 4 this year. Dare also produced The Now Show, a biting take on the news which ran on Radio 4 from 1998 to 2024. Former EastEnders actress Tracy-Ann Oberman said on Instagram that she was "devastated" at the news and that her "entire comedy career was down to Bill".

  Dare was described by colleagues as a 'comedy obsessive' and 'legendary figure'

  Julia McKenzie, comedy commissioner for Radio 4, said: "Bill has been a huge part of Radio 4 comedy for decades, as a writer and producer, and listeners will have heard his legendary name at the end of many of their favourite shows." She added: "He was funny and very dry in person, amusingly cynical when he needed to be and always pushed to keep the comedy he made, and particularly satire, spiky. "He will leave a big hole in the comedy world and in our hearts." Richard Morris, the creative director of comedy and entertainment at BBC Studios Audio, said: "Bill was a legendary figure in the comedy world and we, his friends and colleagues in radio, will miss him hugely. "We'll miss the sharp wit and wisdom he brought to every production he worked on." In a statement released on Monday, Dare's representatives at JFL Agency said: "We are shocked and greatly saddened to have to announce the death of our brilliant client Bill Dare, who died at the weekend following an accident overseas. "Our thoughts are with his wife Lucy, daughter Rebecca, and with all of Bill's family and friends who will be devastated by his loss. "Bill was a truly legendary producer and writer, and his comedy instincts were second to none."
