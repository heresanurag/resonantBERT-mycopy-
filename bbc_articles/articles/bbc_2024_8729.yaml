content: |-
  Lady Bushra, one of the UK's best-known British Asian drag queens, opens up about his first UK tour.

  Amir Dean, also known as Lady Bushra, is one of the country's most well-known British Asian drag artists.

  Since debuting Lady Bushra four years ago, Amir has travelled the world performing at comedy nights and cabarets - from Los Angeles to Liverpool.

  This week, he opened his first UK tour - Saree About It - with a gig at Manchester's Frog and Bucket comedy club.

  Lady Bushra spoke to the BBC about growing up gay in Bradford, representing South Asians in the British drag scene, and the best make-up techniques.

  Video shot by Community Affairs correspondent Ashitha Nagesh, and edited by Gemma Laister.
