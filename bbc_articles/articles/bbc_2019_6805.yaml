  • None England have now qualified for the knockout stages of the Women's World Cup in each of their five appearances (1995, 2007, 2011, 2015 and 2019).
  • None Argentina remain winless in all eight of their Women's World Cup matches (W0 D1 L7), failing to score in six of those.
  • None Taylor scored her second Women's World Cup goal and her first goal in any competition for England since April 2018, when she scored against Bosnia and Herzegovina in a World Cup qualifier.
  • None Argentina had just two shots, a joint-low in a 2019 Women's World Cup match (also two for Thailand v USA); they also managed just one touch in the opposition box, the fewest of any team in a match at this tournament.
  • None England started a Women's World Cup game without goalkeeper Karen Bardsley for the first time in the last three tournaments - Carly Telford made her World Cup debut.
  • None This was Jill Scott's 14th start at the Women's World Cup, the most by an England player in the competition - this game took her one clear of Fara Williams' tally of 13 between 2007 and 2015.
