id: bbc_2021_109
title: 'Covid-19: France begins 6pm curfew - BBC News'
date: '2021-01-17'
section: General
url: http://www.bbc.co.uk/news/world-europe-55691213
content: |-
  The French government has imposed a nationwide curfew from 6pm - 6am to fight the surge in cases of coronavirus.

  While some departments were already under these restrictions, the majority of France was under an 8pm - 6am curfew.

  French Prime Minister Jean Castex said the measures would be in place for at least 15 days.
