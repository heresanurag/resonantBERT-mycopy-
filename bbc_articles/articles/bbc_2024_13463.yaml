title: Bolivian police arrest leader of apparent coup attempt - BBC News
date: '2024-06-27'
section: Latin America
url: http://www.bbc.co.uk/news/articles/c288eewr1wko
content: |-
  Troops pulled away from government buildings hours after the presidential palace was stormed.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Bolivian police have arrested the leader of an apparent attempted coup, hours after the presidential palace in La Paz was stormed by soldiers. Hundreds of troops and armoured vehicles had taken up position on Murillo Square where key government buildings are located. One armoured vehicle attempted to smash down the entrance to the presidential palace. Soldiers later withdrew from the South American city. The military leader in charge, Gen Juan José Zúñiga, had said he wanted to "restructure democracy" and that while he respected President Luis Arce "for now", there would be a change of government. He was later arrested, seconds after telling reporters the military had staged the intervention at the president's request. Gen Zúñiga, who was first appointed commander of the Bolivian Army in 2022, was removed from his role on Tuesday, after he made inflammatory comments about the country's former president, Evo Morales, during an interview the previous day. In dramatic footage seemingly filmed inside the presidential palace as the coup unfolded, President Arce could be seen confronting Gen Zúñiga, ordering him to stand down and asking him to vacate his role. Loud bangs could be heard in background, as the two men - surrounded by aides, journalists and armoured police officers - spoke face-to-face. Earlier, the left-wing leader condemned the coup attempt, calling on the public to "organise and mobilise... in favour of democracy". "We cannot allow once again coup attempts to take Bolivian lives," he said in a televised message to the country from inside the presidential palace. His words clearly resonated, with pro-democracy demonstrators taking to the streets in support of the government. He also announced he was appointing new military commanders, confirming reports that Gen Zúñiga had been dismissed after openly criticising Mr Morales. Mr Morales, who also condemned the coup attempt, called for criminal charges to be brought against Gen Zúñiga and his "accomplices". The public prosecutor's office has opened a criminal investigation, and head of the Bolivian Navy, Vice-Adm Juan Arnez Salvador, has also been arrested.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  On Monday he vowed to arrest Mr Morales if he ran for office again next year, despite the former president being barred from doing so. Mr Morales was forced out of office in 2019 by military chiefs who said he was trying to manipulate the result of a presidential election, sending him into exile in Mexico. Speaking from Murillo Square after it was taken by troops, Gen Zúñiga accused an "elite" of taking "over the country, vandals who have destroyed the country." But moments before his arrest, the general told reporters that the president had instructed him to get out the "blindados" (armoured vehicles), in a bid to improve his waning popularity. He was bundled into a waiting police van seconds later. Andrea Barrientos - a leading opposition senator - echoed his claims, suggesting that an economic and judicial crisis had prompted Mr Arce to launch a "self-coup". Bolivia is currently experiencing significant cost of living pressures, as it struggles to manage a US dollar shortage. "I will say that the government has a lot of questions to answer to the people of Bolivia, and they need to explain this situation very well," Ms Barrientos added. "We will say that we need a deep investigation about this situation."

  Nonetheless, it is increasingly clear that Wednesday's move this was a short-lived and ill-judged military uprising rather than any wider unravelling of power. Certainly, the government now looks more vulnerable, and others may try to dislodge Mr Arce's administration - albeit through politics rather than via the military. As troops occupied La Paz, Mr Morales called on his supporters, particularly in the country's indigenous coca-growers movement, to take to the streets to demand an end to the attempt coup. That display of popular power may well have helped strengthen the resolve against Gen Zuñiga's plans, which also included freeing "political prisoners" including former leader Jeanine Áñez. Both Mr Arce and his predecessor belong to the same political party, despite internal political feuds. Their rivalry has led some Bolivians, including Gen Zúñiga, to worry that Mr Morales might seek another term in office. Concerns come after he tried to bypass the constitution and seek a fourth term in 2019. Mr Morales went on to win the vote, but he was forced to resign and flee the country after violent protests. The centre-right Jeanine Áñez was the country's interim leader between 2019-20, but was sentenced to 10 years in jail over what prosecutors say was a coup to oust her predecessor Mr Morales. The incumbent president, Mr Arce, went on to win a re-run vote in 2020.

  Soldiers took up positions outside key government buildings in La Paz

  Formerly allies, Mr Arce and Mr Morales have not seen eye to eye on much recently, but they were united in their condemnation of the use of troops to force political change in Bolivia. Before Mr Morales took power in 2005, Bolivia was one of the most politically volatile nations in the Americas. His time in power brought much-needed stability to the Andean nation, at least until its ignominious end. For his part, Mr Arce - who was elected after a period of instability following the 2019 election - will have been heartened by the speed of the regional response. Close allies like the left-wing governments in Venezuela and Colombia were quick to condemn what was happening and call for democracy to prevail. Washington also called for calm. In Paraguay, centre-right President Santiago Peña also condemned the attempted coup. Even those Bolivians who opposed his socialist rule will not want to see a return to a dark time in South America where militaries with terrible human rights records often pushed out the country's democratically elected leaders at the barrel of a gun. But Jhanisse Vaca Daza - a human rights activist - said she feared Mr Arce could use the apparent coup as a reason to crack down on his opponents. "It will legitimise and give (President) Arce's government more power to arrest new members of the opposition who they deem may be a threat to their governance," she said. "The fear for many people that are currently Legislative Assembly members is that this could also lead to either closing the Legislative Assembly or arresting members that may be suspected to have collaborated with the military." Political analyst Carlos Toranzo told BBC Mundo there was "a lack of clarity" on whether what happened on Wednesday was a coup d'etat attempt or "lamentably, a show orchestrated by the government itself". "It's strange," Mr Toranzo said as he recalled the chain of events leading up to the military presence at Murillo Square, adding that there was a "total tranquillity from the president and his cabinet". "In all coup d'etats communications to the palace are cut off," the analyst explained, but in this instance the military left communication channels at the palace, and the official broadcasters untouched. Asked if there was anything to be gained by orchestrating an attempted coup, Mr Toranzo replied: "[President] Arce is winning. The whole country defended democracy."

  Are you in La Paz? If it is safe to do so, tell us what you've seen.
