title: 'Bangladesh deaths: Fourth Cardiff family member dies - BBC News'
date: '2022-10-19'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-63302006
content: |-
  A woman whose husband and two children were killed by suspected carbon monoxide poisoning has died.

  Sadiqul Islam is the only family member to have survived. His mother, Husnara Begum, passed away earlier, three months after the incident in July

  A woman whose husband and two children were killed by suspected carbon monoxide poisoning in Bangladesh has died.

  Husnara Begum, 45, from Riverside, Cardiff, died in hospital in Dhaka, nearly three months after the incident.

  Her husband, Rafiqul Islam, 51, died along with son, Mahiqul, 16, shortly after they were found unconscious at a flat in Sylhet on 26 July.

  Their daughter, Samira Islam, 20, died around a week later.

  Rafiqul Islam, 51, and Mahiqul Islam, 16, died en route to hospital after being found unconscious in a flat in July

  Their other son, Sadiqul Islam, 24, also required hospital treatment but was discharged shortly afterwards.

  The family had travelled to Bangladesh to visit family and had planned on staying for two months.

  Police had initially opened a murder investigation, but subsequently suggested the deaths had been caused by a faulty generator.
