content: |-
  The late Queen Elizabeth II visited the world famous Chelsea Flower Show more than 50 times.

  The King toured the show meeting garden designers in his first visit as monarch

  The King and Queen Camilla have visited the Chelsea Flower Show as displays pay tribute to Queen Elizabeth II.

  The late Queen rarely missed the annual gardening show during her 70-year reign, visiting it more than 50 times.

  A life-size topiary of her pony Emma are among royal tributes at the annual horticultural event in London, visited by tens of thousands.

  The Princess of Wales made an appearance after inspiring the idea for the show's first Children's picnic.

  The King also appeared to be on the lookout for plants to fill a patch in his Gloucestershire home Highgrove, after rabbits took a liking to some of his plants.

  Designer Jane Porter, who showed the King some purple flowers which caught his eye, said: "He was really interested in one of the plants we've got because at Highgrove something's being eaten by rabbits and he wants to replace it.

  "I love that, that's brilliant, he's such a keen gardener. I'm sure he would have his eye out for all sorts of things - he was very knowledgeable about everything in the garden."

  During the visit, the King and the Queen visited A Garden of Royal Reflection and Celebration, which features light pink and white planting and a silver birch to reflect the tastes of the late Queen, as well as blues, purples and pinks to represent the King's preferences.

  The circular garden designed by Dave Green is enclosed by hedging to create a space for contemplation about the monarchy, and is overseen by a bronze bust of the King.

  There the monarch presented the new Elizabeth Medal of Honour which recognises British and international non-horticulturists who have significantly advanced the science, art or practice of horticulture for the benefit of all and the environment.

  A topiary in the Great Pavilion depicts Emma, the late Queen's fell pony which made a poignant appearance during her coffin's procession at her funeral.

  The King and Queen handed out awards in the Garden of Royal Reflection and Celebration

  Speaking about the medal, RHS president Keith Weed said: "The Royal Horticultural Society was exceptionally fortunate to have Her Majesty as our patron throughout her reign.

  "This award celebrates both Her Majesty's glorious reign and the work she did to raise the profile of UK horticulture, both nationally and internationally through her visits to RHS Chelsea Flower Show and wider work."

  Despite her mobility problems, last year the late Queen attended the Chelsea Flower Show - a highlight of her calendar - in the grounds of the Royal Hospital Chelsea.

  Elsewhere on Monday, Catherine sat down with school pupils having a picnic as part of a campaign to get young people gardening, before giving them a tour of the show.

  During the visit, she revealed her son Prince Louis was "growing broad beans at school", before she sketched flowers and plants for the children in lieu of a signature.

  The Princess of Wales met pupils from 10 schools taking part in a campaign to get children gardening

  Catherine looked at some of the show gardens with schoolchildren

  When asked by a pupil what being a Royal Family member was like, she replied: "You have to work hard, but you know the best thing about it is meeting kiddies like you."

  In 2019, the princess co-designed a Chelsea Flower Show garden to encourage the public to get back in touch with nature.

  In another first, the show has hosted its first same-sex wedding.

  The King and Queen met Manoj Malde, who got married to his husband in a traditional Hindu Indian ceremony in a garden he designed - featuring fruit and vegetables celebrating Asian household cooking.

  The King and Queen met Manoj Malde and his husband, the first same-sex couple to get married at the Chelsea Flower Show

  The Queen sitting down on swing joked "I might stay here"

  Also for the first time in memory, women garden designers will outnumber men as they make up a reported 58% of designers at the show - which has been held every since 1913 apart from gaps during the World Wars and 2020.

  More than 150,000 people are expected to visit the Chelsea Flower Show when it opens its doors on Tuesday to Saturday.
