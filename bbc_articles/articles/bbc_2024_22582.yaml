title: Ex-Met officer faces rape and sex assault charges - BBC News
date: '2024-09-02'
section: London
url: http://www.bbc.co.uk/news/articles/cwyx2pv14eqo
content: |-
  The former Met Police officer is charged with raping and sexually assaulting a vulnerable woman.

  The police watchdog began an investigation in April 2023 after the Met made a referral

  A former Metropolitan Police officer has been charged with 15 counts of sexual assault and two counts of raping a vulnerable woman he met while on duty. Mark Tyrrell, 55, who was based in the force's Parliamentary and Diplomatic Protection Command, is set to appear at Westminster Magistrates' Court on Wednesday. The alleged offences are said to have taken place between 2017 and 2023, the Independent Office for Police Conduct (IOPC) said. He is also accused of three counts of perverting the course of justice over claims that he deleted messages, pressured an alleged victim to provide false accounts, and lied during interview while under caution.

  He is also accused of misconduct in public office for allegedly engaging in an inappropriate relationship with the woman. The IOPC began an investigation in April 2023 after the Met Police made a conduct referral to the watchdog. He retired during the inquiry.
