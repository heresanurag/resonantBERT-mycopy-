title: Police ram runaway electric car after brakes fail on M62 - BBC News
date: '2024-03-07'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-68500233
content: |-
  An electrical fault meant the driver was unable to stop and police had to bring the car to a halt.

  Motorway police used several vehicles to guide the car to a halt

  A runaway electric car had to be boxed in between police cars after an electrical fault left the driver unable to brake on a motorway.

  The driver of the Jaguar I-Pace had been travelling on the M58 at about 14:15 GMT on Wednesday before calling police to plead for help.

  Officers were able to escort the car on to the M57 and then the M62.

  It was finally halted 25 minutes later between Junction 11 for Birchwood and 12 for Eccles, police said.

  A police spokesman said officers "worked together to stop all other traffic" and before bringing the car to a halt at about 14:40 GMT. No one was injured.

  Jaguar Land Rover said the company was investigating as a matter of "urgency".

  A spokeswoman said: "A full review is underway to determine the cause of this incident, which is still yet to be established.

  "The safety of our clients and vehicles is JLR's highest priority."

