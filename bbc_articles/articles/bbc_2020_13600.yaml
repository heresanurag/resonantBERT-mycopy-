title: Can cloud computing save money? - BBC News
date: '2020-12-03'
section: General
url: http://www.bbc.co.uk/news/business-23544529
content: |-
  Cloud computing is a growing industry, but can the technology bring down the costs of doing business for firms?

  Cloud computing is a growing industry that allows businesses and individuals to store data that can be accessed from everywhere.

  Companies that provide cloud storage services in Asia say the technology could bring down the cost of doing business for many firms.

  Puneet Pal Singh spoke to Ajit Melarkode, from cloud storage firm Rackspace, about the benefit and potential risks of opting for cloud storage.
