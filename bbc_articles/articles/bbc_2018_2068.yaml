title: Armed teacher's fear? 'Missing and hitting a student' - BBC News
date: '2018-02-23'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43172779
content: |-
  Karl Donnelson from Colorado is armed and says he's ready to fire if an incident occurs in his school.

  Karl Donnelson from Colorado carries a concealed gun and says he's ready to fire if an incident occurs in his school.

  US president Donald Trump has said arming teachers could prevent school shootings like that which left 17 people dead last week in Florida.
