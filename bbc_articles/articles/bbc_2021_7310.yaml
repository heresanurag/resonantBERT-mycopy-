title: 'Covid: British holidaymakers return from Portugal - BBC News'
date: '2021-06-08'
section: General
url: http://www.bbc.co.uk/news/uk-57397829
content: |-
  Travellers speak of their frustration after Portugal was removed from the green list.

  British holidaymakers have spoken of their frustration at having to return from Portugal earlier than planned, as the country was moved to the amber travel list.

  The move which came into effect at 04:00 BST means people arriving must take two tests and quarantine for 10 days.

  Airlines put on dozens of extra flights as people scrambled to get home.
