id: bbc_2018_1999
title: Oxfam former boss knew of sexual misconduct claims - BBC News
date: '2018-02-11'
section: General
url: http://www.bbc.co.uk/news/uk-43020015
content: |-
  Oxfam's former head Dame Barbara Stocking told Newsnight she would handle things differently with hindsight.

  The former head of one of the UK's biggest charities spoke to BBC Newsnight following reports into the use of prostitutes by its aid workers in Haiti.

  Oxfam's former head Dame Barbara Stocking tells the BBC's Emily Maitlis she would handle the situation differently with hindsight.
