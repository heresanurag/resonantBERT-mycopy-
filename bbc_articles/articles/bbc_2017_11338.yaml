  Hospitals in Yemen could run out of fuel in three weeks. The BBC reports from one of them.

  The UN said this week that hospitals in Yemen could run out of fuel in three weeks.

  The Saudi-led coalition has imposed a blockade on Yemen's borders, ports and airports since 6 November in response to a missile attack by Houthi rebels that hit near Riyadh.

  Clive Myrie reports from the city of Aden.

