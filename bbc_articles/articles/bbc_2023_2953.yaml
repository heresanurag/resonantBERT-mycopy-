title: 'Ukraine vigil: Helen Mirren tears up reciting poem in London - BBC News'
date: '2023-02-24'
section: General
url: http://www.bbc.co.uk/news/uk-64750159
content: |-
  The actress was among the speakers at a vigil held at Trafalgar Square to mark one year since the war began.

  Dame Helen Mirren teared up as she recited a poem at a London vigil to mark one year since the start of the war in Ukraine.

  The Oscar-winning actress recited the English version of the poem Take Only What Is Most Important by Serhiy Zhadan, at the event in Trafalgar Square.
