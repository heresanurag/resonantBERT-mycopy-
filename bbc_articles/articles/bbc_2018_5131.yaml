title: Who was Winnie Mandela? - BBC News
date: '2018-04-02'
section: General
url: http://www.bbc.co.uk/news/world-africa-43622204
content: |-
  South African anti-apartheid campaigner and former wife of Nelson Mandela dies aged 81.

  Winnie Madikizela Mandela was the former wife of South Africa's first black president, Nelson Mandela.
