content: |-
  A house in Rhyl has appeared for sale which features a tonne of Disney themed murals and interiors.

  A look inside the Disney-themed house for sale

  You ain't never had a house like this...

  A Disney fan has put their three-bedroom home up for sale, bringing A Whole New World to a Welsh town. Although hard to tell from the exterior of the Rhyl property, it hides a host of Disney-themed murals, with an Aladdin-themed living room as well as the Magic Mirror from Snow White over the fireplace.

  Unsurprisingly, the current homeowner is "a massive Disney fan" and told her estate agent that she has visited Disneyland more than 20 times. “If you’re a Disney fanatic, it’s definitely the house for you,” said estate agent Marti Anderson-Bryan. Disney’s Aladdin is at the heart of this property, with an open-plan living-room/kitchen/diner that features an extensive mural of Aladdin himself alongside Princess Jasmine, the Genie, Abu, Rajah, Iago, and the Sultan.

  This video can not be played To play this video you need to enable JavaScript in your browser. Inside the Disney-themed house in Rhyl on sale for £180k

  One of the bedrooms has a Lion King theme, and there's even a hint of Harry Potter in there, too. “The Maleficent Room – that is actually the Ministry of Magic from Harry Potter versus Disney villains," Ms Anderson-Bryan said. "That’s the theme of the room. The fireplace is a replica from the Ministry of Magic from the Harry Potter movies. She’s even got a door with Platform 9 3⁄4 on it.” The room is covered with images of Disney villains, including Maleficent, Ursula, the Evil Queen from Snow White, and Jafar.

  One mural features Aladdin, Princess Jasmine, Abu, and others from the film, Aladdin

  The staircase features a Mary Poppins mural that depicts a silhouette of the traditional London skyline, while the stairs themselves feature a variety of Disney quotes.

  The London skyline gives the stairs a Mary Poppins touch

  Even the kitchen cupboards are Disney-themed – each one inscribed with the name of an iconic Disney song.

  Heading upstairs, the bedrooms are Disney-themed too, with each of its three bedrooms packed full of Disney stuffed toys and collectibles. The main bedroom is Lilo & Stitch meets Sugar Rush - that's the fictional video game inhabited by Vanellope von Schweetz in the movie, Wreck-It Ralph.

  Cakes and sweets give this room more of a Sugar Rush feel

  There's also a Lion King themed bedroom, with muted oranges and dusky reds giving off definite Pride Lands vibes. A third bedroom is 1980s themed and packed full of collectibles and memorabilia. “[The current owner] sells and collects Disney collectibles. So, the house is stuffed with collectibles, obviously things she’s bought over the years, but she also sells them,” Ms Anderson-Bryan said. An '80s-themed mural in the garden brings it all together - featuring assorted retro pop culture characters including He-Man, She-Ra, Optimus Prime, an Ewok, and ET.

  An '80s-themed mural features He-Man, She-Ra, and E.T. among others

  It's still on the market, and has not received any offers.
