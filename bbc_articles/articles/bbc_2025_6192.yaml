title: Mickey Rourke leaves Celebrity Big Brother over 'unacceptable behaviour' -
  BBC News
date: '2025-04-12'
section: Culture
url: http://www.bbc.co.uk/news/articles/cwynegdv09eo
content: |-
  The Hollywood actor was formally warned by the show earlier this week over "offensive" language he had used.

  Hollywood actor Mickey Rourke has left Celebrity Big Brother after "further use of inappropriate language" and "instances of unacceptable behaviour", ITV has said. On Saturday, Rourke, 72, used behaviour and language considered to be threatening and aggressive towards fellow housemate Chris Hughes, the BBC understands. No physical altercation took place between the pair. Sunday's episode showed the events that led to his departure, including him using "sexual language" that The Only Way Is Essex's Ella Rae Wise said made her feel uncomfortable.

  She later told Big Brother in the diary room: "(It) just makes me feel on edge. I don't like the jokes, like the sexual jokes being made towards me. I'm a young girl and I'm not a piece of meat." Rourke also appeared to become aggressive and swore at Love Island star Hughes during a pirate-themed task. Rourke apologised when confronted over his behaviour in the diary room and said: "I stepped over the line. And I take responsibility for doing the wrong thing. Because I lost my temper, and I've been trying to work on it my whole life and I wish I would have had better self-control and I'm very sorry." Big Brother then said Rourke would be leaving the house.

  Just days before, the Bafta-winning star of The Wrestler received a formal warning from Big Brother for "unacceptable language and behaviour" directed at another housemate, JoJo Siwa. Siwa accused Rourke of being "homophobic" for saying he was "going to vote the lesbian out real quick" and making other comments about her sexuality. Hughes, 32, had comforted Siwa, 21, in Wednesday's episode after Rourke's comments. A spokesperson for the ITV show said: "Mickey Rourke has agreed to leave the Celebrity Big Brother House this evening following a discussion with Big Brother regarding further use of inappropriate language and instances of unacceptable behaviour."

  The Oscar-nominated star entered the ITV reality show on Monday 6 April alongside TV and social media personality Siwa, Hughes and 10 other celebrities. According to a transcript released by ITV ahead of Wednesday evening's episode, Rourke first asked Siwa if she liked boys or girls. She replied: "Girls. My partner is non-binary." He then told her: "If I stay longer than four days, you won't be gay any more." She responded: "I can guarantee I'll still be gay and I'll still be in a very happy relationship." He then made the comment about voting her out, and apparently referred to an earlier conversation about the smoking area when he said: "I need a fag," before gesturing to Siwa and adding: "I'm not talking to you." After being told he couldn't say that by Hughes, Rourke claimed: "I know. I was talking about a cigarette."

  Rourke was called into the diary room, where Big Brother told him his "language was offensive and unacceptable" and gave him the formal warning. He responded: "I apologise. I don't have dishonourable intentions - I'm just talking smack, you know. I wasn't taking it all so serious. I didn't mean in it any bad intentions and if I did, sorry." After going back into the main house, Hughes told him Siwa "was very upset earlier", and she informed Rourke it was "not an acceptable word". He told her: "I want to apologise. I've got a habit of having a short fuse. And I don't mean nothing by it. I do mean it [sorry]. If I didn't, I wouldn't say it to you."
