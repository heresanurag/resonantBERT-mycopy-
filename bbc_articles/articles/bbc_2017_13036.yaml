title: Theresa May statement at Brexit news conference - BBC News
date: '2017-12-04'
section: General
url: http://www.bbc.co.uk/news/uk-politics-42223402
content: |-
  Theresa May says there will be more Brexit talks this week and she is "confident that we will conclude this positively".

  Theresa May said the two sides had been "working hard" and "negotiating hard" but differences remained on two issues.

  Speaking after Jean-Claude Juncker, the President of the European Commission, the UK Prime Minister said they would meet again this week, and she was "confident that we will conclude this positively."
