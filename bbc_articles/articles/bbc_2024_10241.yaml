  It prompted Republican lawmakers to move ahead with their contempt measure. "The transcript of the interview was released months ago," Harriet Hageman, who sits on the judiciary panel, wrote in a post on X. "What is so damning in the audio that this administration is afraid to release them?" James Comer, the oversight panel's top Republican, said Mr Biden and his advisers "clearly fear" the release of the recordings "because it will again reaffirm to the American people that President Biden's mental state is in decline". Mr Comer's committee did not meet until later on Thursday, as several of its Republican members had travelled to New York to show their support for Mr Trump in his ongoing criminal trial, and descended into a chaotic shouting match ahead of its late-night vote. The contempt resolution now goes to the full House, which Republicans currently control by a single seat. It is unclear if they have the votes to hold Mr Garland in contempt. If they are successful, Mr Garland will join his two recent predecessors - Bill Barr, who served under Trump, and Eric Holder, who served in the Obama administration - to face a contempt charge. Neither of those men ultimately faced criminal charges.
