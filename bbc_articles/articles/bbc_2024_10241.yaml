  Mr Hur defended his report as "necessary, accurate and fair" during a congressional hearing a month after its release. Congressional Republicans have pushed to learn more about the report, putting pressure on the US Department of Justice to share full transcripts of the interview and other relevant documents. But Mr Garland wrote a letter to Mr Biden on Wednesday that audio tapes of his interview "fall within the scope of executive privilege" - giving the White House legal grounds to withhold their release. Executive privilege is a legal authority that allows the president and others within the executive branch to keep certain records or communications under wraps, blocking Congress or the judiciary's access to them. Mr Garland sent another letter on Thursday to the Republican chairmen of the judiciary and oversight panels. The letter said that the justice department would not release the recordings and criticised the committee leaders for "a series of unprecedented and frankly, unfounded attacks" on his department. Republicans, who allege the Biden administration is "weaponising the government" against former President Donald Trump, have launched a range of probes in recent months. But Mr Garland noted the president had fully co-operated with the department's criminal probe and sat voluntarily for the interview. In later remarks to reporters, he slammed "this effort to use contempt as a method of obtaining our sensitive law enforcement files" as contributing to "an atmosphere that puts our agents and prosecutors at risk". Mr Biden confirmed he was blocking the release of the tapes in a separate letter from his White House counsel to the committee chairmen on Thursday morning. "The absence of a legitimate need for the audio recordings lays bare your likely goal - to chop them up, distort them, and use them for partisan political purposes," it said.

