title: Mike Amesbury row is matter for police, says Phillipson - BBC News
date: '2024-10-27'
section: England
url: http://www.bbc.co.uk/news/articles/c0qdzqjlq2ko
content: |-
  The MP for Runcorn appeared to be shouting at a man, warning him he would "never threaten an MP again".

  MP row is matter for police, says Phillipson

  This video can not be played To play this video you need to enable JavaScript in your browser. The video shows the 55-year-old backbencher during the apparent disturbance in Frodsham, Cheshire

  A video appearing to show an altercation involving MP Mike Amesbury is a "matter for the police", the education secretary said. Bridget Phillipson's comments come after she was asked whether the Labour party would be investigating the incident in Cheshire. The footage, which went viral after being posted on X on Saturday, appeared to show Amesbury shouting and swearing at a man who was lying on the pavement during an apparent disturbance in Frodsham town centre. The Labour member for Runcorn and Helsby was seen pointing to the man and saying "you won’t threaten the MP ever again, will you?" in the early hours of Saturday.

  Phillipson told BBC's Sunday with Laura Kuenssberg programme: "Mike Amesbury has himself gone to the police. Cheshire police are now investigating the matter, I think it's important they are now allowed to get on and do their job. "It is right now the police look into this matter, investigate and decide what action, if any, is required." It is not clear from the footage, which was apparently filmed by an onlooker, what happened in the moments beforehand. A Cheshire Police spokeswoman said officers were called to reports of an assault and were examining the circumstances.

  A Labour Party representative said: "We are aware of an incident that took place last night. We understand that Mike Amesbury MP approached Cheshire Police to report what happened this morning himself and that he will cooperate with any inquiries they have." Posting on his own Facebook page, the 55-year-old backbencher said: "Last night I was involved in an incident that took place after I felt threatened following an evening out with friends. "This morning I contacted Cheshire Police myself to report what happened. "I will not be making any further public comment but will of course cooperate with any inquiries if required by Cheshire Police."

  Mike Amesbury was a shadow minister for local government when Labour were in opposition

  Cheshire Police said: “At 02.48 BST on Saturday 26 October police were called to reports of an assault in Frodsham. “A caller reported he had been assaulted by a man in Main Street. Enquiries are ongoing.” The footage, which has been shared widely on X, shows some people trying to calm Amesbury down, although others can be heard expressing anger and expletives.

  Earlier on Friday, Amesbury posted on X, external about attending a meeting with local residents about community safety and policing. The politician, who has been a Labour MP in Cheshire since 2017, was also a shadow minister for local government when the party was in opposition. In July 2023, a 56-year-old man was convicted of stalking and harassing the MP at his constituency office and in Frodsham town centre. The court heard the offender had stared through the office glass, asked guards about their level of security, and followed and confronted Amesbury on several occasions. At the time, Amesbury said it had resulted in him feeling "that little bit more anxious".
