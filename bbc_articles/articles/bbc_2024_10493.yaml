  Goh Choon Phong also pledged cooperation with investigations and assistance to passengers and crew.

  'My son got thrown all over the place'

  Earlier, we spoke to the father of a Singaporean passenger who has just arrived back in the country. Chiew says his 22-year-old son was in London on holiday visiting his girlfriend, who was studying there on an exchange programme. The pair were flying back to Singapore on SQ321 when turbulence hit. He told the BBC: "My son was on his way to the restroom, while his girlfriend was seated. Both are okay. "He said he wasn't injured, he was all right - but he's a bit bruised, he was thrown all over the place." He said his son had messaged him yesterday afternoon to say he had landed in Bangkok after the flight was diverted. "When he told us we were shocked, we didn't know the severity of his injuries. I told him to get a check-up, to check his head for possible concussions." He said he was looking forward to seeing his son. "We're blessed that he's well and so is his girlfriend. But when something like this happens, you don't know until you look at him physically. We're going straight home, he needs the rest."
