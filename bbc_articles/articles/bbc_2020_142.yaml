title: 'Climate change: Can Glasgow go carbon neutral? - BBC News'
date: '2020-01-17'
section: General
url: http://www.bbc.co.uk/news/science-environment-51141619
content: |-
  As more cities declare climate emergencies, we look at how Glasgow aims to cancel out its carbon footprint.

  A number of British cities aim to go carbon neutral by 2030 to fight climate change.

  Glasgow – which will host a major United Nations climate change summit in November 2020 – is one of them.

  But bringing the carbon footprint of a whole city down to zero requires big changes. So what can be done, and how quickly?

  The BBC's Environment Reporter Laura Foster has been looking at the challenges that the city faces.
