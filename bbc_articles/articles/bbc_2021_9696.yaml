  The coastguard moved 650 people from Limni, in the north of the island of Evia.

  Hundreds of people in Greece have been rescued from an island near Athens as wildfires spread to the coast.

  The coastguard moved 650 people from Limni, in the north of the island of Evia, after a severe heatwave sparked fires across the country.
