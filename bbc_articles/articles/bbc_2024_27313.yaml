title: 'Typhoon Kong-rey: Plane struggles to land in Taiwan - BBC News'
date: '2024-11-01'
section: General
url: http://www.bbc.co.uk/news/videos/cg4lk5eyq0po
content: |-
  A plane at Taoyuan Airport was forced to abort its initial landing amid strong winds.

  Typhoon Kong-rey, the biggest typhoon to directly hit Taiwan in nearly 30 years, has made landfall on the island's eastern coast.

  One plane at Taoyuan Airport failed its initial landing amid the strong winds, forcing it to re-ascend.

  At one point before it made landfall, the typhoon was packing winds over 200km/h close to its centre, making it the equivalent of a Category 4 hurricane.
