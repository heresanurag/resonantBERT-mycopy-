title: 'Maltby dog attack: Girl, 6, taken to hospital with head injuries - BBC News'
date: '2024-05-10'
section: Sheffield & South Yorkshire
url: http://www.bbc.co.uk/news/uk-england-south-yorkshire-68991146
content: |-
  The girl was "mauled" by the animal while playing unsupervised in the garden, police say.

  South Yorkshire Police officers were called on Thursday evening to reports of a dog attack

  A six-year-old girl has been taken to hospital with head injuries after being "mauled" by a family dog. It is thought the child was bitten by the dog, believed to be a Pocket Bully, when she fell over while playing unattended in a garden in Maltby, near Rotherham, on Thursday. South Yorkshire Police said the girl's mother had managed to free her from the dog before calling 999. The force said the girl's injuries were not thought to be life threatening. The animal was later signed over to police.

  Following the attack, Ch Insp Emma Cheney urged families to "take action now and protect your children". "Please remember all dogs can be aggressive and should never be left unsupervised with children," she said. "Parents should ensure children learn to respect a dog's space and be encouraged to have boundaries around feeding and resting times." She added: "An incident like this is a stark reminder that regardless of a dog's nature, or previous interactions with children, other dogs and people, dogs can act out of character and cause serious injury and harm."

