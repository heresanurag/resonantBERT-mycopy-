content: |-
  The 77-year-old said he was healing from the infection, but that his recovery would take "some time".

  Elton John left with 'limited vision' in one eye

  Sir Elton John says he has been left with "only limited vision" in one eye after a "severe" infection. The 77-year-old music legend said he was healing from the infection, but that his recovery would take time. "Over the summer, I've been dealing with a severe eye infection that has unfortunately left me with only limited vision in one eye," he wrote on Instagram. "I am healing, but it's an extremely slow process and it will take some time before sight returns to the impacted eye."

  He added that he was "so grateful for the excellent team of doctors and nurses and my family, who have taken such good care of me". Many stars have been sending their best wishes. Designer Donatella Versace commented: "Sending you so much love Elton! Feel better soon. Love you." Tennis legend Billie Jean King said: "Sending our love and support your way. Feel better soon, friend." Sir Elton, known for hits including Your Song, Rocket Man and I'm Still Standing, has sold more than 300 million records. Last year, he played the last UK show of his farewell tour to an estimated 120,000 people at Glastonbury.
