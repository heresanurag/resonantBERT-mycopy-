title: Trump says 25% tariffs on EU will be announced soon - BBC News
date: '2025-02-27'
section: Business
url: http://www.bbc.co.uk/news/articles/c05ml3q2gn7o
content: |-
  "The EU was formed to screw the United States," Trump says.

  Trump says 25% tariffs on EU will be announced soon

  US President Donald Trump has said he is planning to hit goods made in the European Union with tariffs of 25%, claiming the bloc was created to "screw the United States". "We'll be announcing it very soon," he told reporters at an appearance with members of his cabinet. "It'll be 25% generally speaking and that will be on cars and all other things." The European Union said it would react "firmly and immediately against unjustified tariffs". Trump's appearance sparked questions about his trade plans, as he also appeared to raise the possibility that looming tariffs on imports from Mexico and Canada, set to come into force on 4 March, might be postponed again.

  An administration official later said the deadline remained in place, with the president planning to review Mexico and Canada actions related to border security over the coming days. Trump made clear on Wednesday that trade with Europe also remained in his sights, repeating his criticism of European policies, which he said put American exporters of food products and cars at a disadvantage. "The European Union was formed to screw the United States - that's the purpose of it and they've done a good job of it," he said. "But now I'm president." The EU rejected the president's claims, saying the creation of a regional market had made doing business in Europe easier for American firms. "It has been a boon for the United States," a spokesperson for the commission said. "We're ready to partner if you play by the rules. But we will also protect our consumers and businesses at every turn. They expect no less from us."

  Tariffs are a tax on imports that is collected by the government and paid for by the companies bringing in the goods. Trump has vowed to use the levies to boost US manufacturing, raise money and push other countries to change policies he opposes. But there are concerns such measures could fuel inflation, with warnings that Americans could face higher prices for goods as businesses may choose to pass on some or all of the cost of tariffs to customers. Since taking office, he has raised tariffs of 10% on goods from China and taken steps to hit other imports with duties, including directing his staff to develop recommendations for custom "reciprocal" tariffs for each country. But he has also suspended some of those plans, leaving many businesses and analysts guessing as to whether he is prepared to carry out his threats. "The 25% threat that he threw out today is in line with the high end of the range that he previously indicated," said Tobin Marcus, head of US policy and politics at Wolfe Research. "It's a number that's concerning - certainly should be concerning - for the trans-Atlantic trade relationship, but not totally out of the blue."

  Antonin Finkelnburg, of the Federation of German Wholesale, Foreign Trade and Services which represents businesses, told the BBC that a 25% tariff on EU goods entering the US would created a "difficult" but "not an impossible" situation for Germany's economy. "We are worried but we shouldn't be afraid," he told the BBC's Today programme. Germany's car industry's products are popular in the US. Mr Finkelnburg said many German car manufacturers were "already producing in the American market, so they wouldn't be directly affected by the tariffs", but said tariffs would still drive up prices. "The car parts that are manufactured in to those cars are crossing the borders of Mexico and Canada several times so that already is driving the prices up," he added.

  Earlier this month, Trump ordered 25% tariffs on goods from Mexico and Canada, America's top two trading partners. But he suspended the duties before they went into effect until 4 March, to allow for talks on border security. On Monday, Trump said he expected tariffs of 25% on goods from Mexico and Canada to come into effect "on schedule". At Wednesday's meeting, when asked for an update, he said the 25% tariffs on Mexico and Canada would go into effect on 2 April. That is the same day that the Commerce Department is supposed to deliver its wider recommendations for "reciprocal" tariffs. Commerce Secretary Howard Lutnick told reporters that "the overall is April 2" , distinguishing between tariffs tied to concerns about drug trafficking and migration from Mexico and Canada. The Dow Jones Industrial Average, S&P 500 and Nasdaq all headed lower in mid-day trade, while the peso and Canadian dollar gained.
