content: |-
  Lancaster also says she "didn't realise" her husband Sir Rod Stewart had posted online about Wallace.

  Penny Lancaster says Gregg Wallace intimidated and distressed people on set

  Model Penny Lancaster has claimed that she was both a "witness" and "victim" to "bullying" behaviour by former MasterChef host, Gregg Wallace. It is the first time the 53-year-old has spoken out since her husband, Sir Rod Stewart, publicly accused Wallace last month of being an "ill-mannered bully" who had "humiliated" his wife during her 2021 appearance on the show. Lancaster told ITV's Loose Women on Thursday: "I didn't realise my husband had sent that post out until it was out". Wallace stepped down from MasterChef two weeks ago while an investigation into the allegations of historic misconduct are under way. His lawyers have strongly denied all the allegations.

  After the first claims emerged, Sir Rod posted on Instagram: "Good riddance Wallace... You humiliated my wife when she was on the show, but you had that bit cut out didn't you? Lancaster - who made it to the quarter-finals of Celebrity MasterChef - told Loose Women: "Without going into details, I didn't realise my husband had sent that post out until it was out and of course, you can imagine, the influx of inquiries there were." She said she was on jury duty at the time and didn't realise what had happened until later, saying she was "in shock" by Sir Rod's message. "When I did turn my phone back on I got a message from a friend saying, 'Oh my God, how amazing was that message your husband put out!' And I was like 'What message? What has he done?'" Speaking to the panel, Lancaster said: "I most definitely was witness and victim to some of the bullying and harassment behaviour of Gregg Wallace, and unfortunately, a lot of those involved in the production team were also witness to that, and I really feel that he used his position of power to, I believe, intimidate and cause distress to a lot of people on set. "And it's really unfortunate that someone like him is allowed to get away with that, and while others sort of stand by and let it happen at the same time." Lancaster added: "I felt a little bit vindicated that something was put out there, going back to sort of that whole Me Too [movement], it's shocking to think how many women do suffer in the hands of... [men] in a powerful position and are too afraid to talk out. "They don't feel at the time that they're going to be supported or listened to. So sometimes it can take a few years later for someone to mention something. It gives the other victims and people that have suffered the confidence to come forward."

  Wallace pictured here at an awards ceremony in London in July 2023

  Wallace stepped aside from presenting MasterChef after a BBC News investigation last month discovered 13 people, spanning a range of ages across five different programmes, had made allegations against Wallace of inappropriate sexual comments. Other women have since come forward with further claims against the 60-year-old. Wallace's lawyers have said it is entirely false that he engages in behaviour of a sexually harassing nature. Production company Banijay UK announced an "immediate, external review to fully and impartially investigate" and has said that Wallace was "committed to fully cooperating throughout the process". Asked about Lancaster's specific allegations, Banijay says it "takes this matter incredibly seriously but while the external investigation is ongoing, we won't be commenting on individual allegations". "It is important to note, that MasterChef welfare processes are regularly adapted and strengthened and there are clear protocols to support both crew and contributors. "These include multiple ways of reporting issues, including anonymously. HR contact details are promoted, and contributors are assigned a point of contact on set available to discuss any issues or concerns." A BBC spokesman has described the allegations into Wallace's conduct as "concerning", and said the corporation would be supporting MasterChef producer Banijay UK in its investigation. It also thanked those "who had the courage to speak out", adding it hopes that the independent investigation "can be concluded rigorously and as swiftly as possible" and would "follow due process and ensure fairness to all involved." Lancaster met her rock-star husband, best known for hit songs 'Do You Think I'm Sexy' and 'Maggie May', in 1999 while he was on tour. The couple married in 2007 and have two sons, Alastair, 18 and Aiden, 13. In 2017, during a discussion about the #MeToo campaign on social media started by survivors of sexual harassment and assault, Lancaster revealed she had been sexually assaulted as a teenager by someone she had worked for.
