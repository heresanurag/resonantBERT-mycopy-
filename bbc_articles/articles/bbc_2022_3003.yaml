id: bbc_2022_3003
title: 'Ukraine war: Mariupol theatre destroyed in bombing - BBC News'
date: '2022-03-17'
section: General
url: http://www.bbc.co.uk/news/world-europe-60777075
content: |-
  President Zelensky said the theatre in the besieged Ukrainian city was being used as a shelter by hundreds of people.

  President Zelensky has accused Russia of intentionally bombing a theatre sheltering civilians in the besieged city of Mariupol.

  Moscow denies claims it bombed a theatre where people were hiding, with the Russian word for "children" written on the ground outside the building.
