  The BBC's Azadeh Moshiri has been to Glystra beach near Kiotari, one of the areas worst affected by wildfires.

  The BBC's Azadeh Moshiri has been to Glystra beach near Kiotari, one of the areas worst affected by the wildfires in Rhodes.

  Whole buildings have been destroyed here and even the beach umbrellas are gone.
