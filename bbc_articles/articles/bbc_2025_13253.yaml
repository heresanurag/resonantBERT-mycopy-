title: 'Watch: Moment girl rescues sister from runaway vehicle in China - BBC News'
date: '2025-06-04'
section: General
url: http://www.bbc.co.uk/news/videos/cwy729z15ego
content: |-
  An 11-year-old girl in Henan, China, pulled her baby sister from the path of a runaway electric mini cabin scooter.

  A toddler was saved when her 11-year-old sister pulled her out of the path of a runaway electric cabin scooter in central China's Henan town.

  CCTV footage obtained by Chinese state-run national broadcaster China Central Television shows the cabin scooter smashing through the glass doors of a restaurant, narrowly missing the toddler and smashing into a wall.

  The driver apologised and paid for the damage to the restaurant, according to Reuters news agency.
