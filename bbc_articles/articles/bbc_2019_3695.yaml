title: 'Christchurch shootings eyewitness: ''They started falling'' - BBC News'
date: '2019-03-16'
section: General
url: http://www.bbc.co.uk/news/world-asia-47580283
content: |-
  A woman driving near one of the mosques attacked in Christchurch says she tried to help the shooting victims.

  Several people are dead after shootings at two mosques in the city of Christchurch, according to police in New Zealand.

  A woman driving near one of the mosques says she tried to help some of the victims.
