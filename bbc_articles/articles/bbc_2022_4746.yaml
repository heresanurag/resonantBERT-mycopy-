content: |-
  June Brown's most famous character weathered more than 30 years of hardship and disappointment in EastEnders.

  2007: Dot attempts to hide Anya Covalenco (Olga Fedori) and baby Tomas from the immigration authorities. She takes them to a church where she believes they will be given sanctuary. Anya eventually decides to give herself up and asks Dot to look after her child. Dot agrees - but later finds looking after a baby is too much for her and gives him up for adoption.
