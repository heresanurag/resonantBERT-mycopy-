title: 'Mike Freer: Man charged over threatening call made to MP - BBC News'
date: '2024-02-06'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68218269
content: |-
  Tory MP Mike Freer has said he plans to stand down at the next general election over safety fears.

  MP Mike Freer has announced he will stand down at the next general election over safety fears

  A man has been charged in connection with threatening behaviour towards Conservative MP Mike Freer.

  The Met Police said James Phillips, 46, of north London, had been charged with malicious communications.

  Mr Freer's office reported on 1 February that the minister had received an abusive phone call the previous day, the police said.

  The MP for Finchley and Golders Green is to stand down at the next election over safety fears.

  Mr Phillips, who was arrested on Tuesday, is also charged with assaulting a police officer, the Met Police said.

  He will appear at Willesden Magistrates' Court on Wednesday.

  A separate investigation into an arson attack at the MP's office in Finchley, north London, on Christmas Eve is ongoing, with a man and a woman charged with arson with intent to endanger life, the Met added.

  The force said its investigation had established the offence was not a hate crime and the two incidents were not believed to be linked.

