title: Rome doesn't take Spanish Steps ban sitting down - BBC News
date: '2019-08-07'
section: General
url: http://www.bbc.co.uk/news/world-europe-49272106
content: |-
  If you're tempted to sit on the Italian capital's famous Spanish Steps, you could now be fined.

  If you're tempted to sit on the Italian capital's famous Spanish Steps, you might want to stand up again.

  The Scalinata di Trinità dei Monti is classified as a monument, so it's subject to one of Rome's new strict laws where tourists could be given a hefty fine.
