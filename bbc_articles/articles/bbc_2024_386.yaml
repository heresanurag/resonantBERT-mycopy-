title: Female artists dominated 2023 music charts - but new acts are being squeezed
  out - BBC News
date: '2024-01-03'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-67862412
content: |-
  But only one of the top 10 biggest-selling albums of 2023 was a new release, official figures show.

  Flowers was Miley Cyrus's first number one since 2014

  Female artists had a record year on the UK singles chart, spending the most weeks at number one since records began in 1952.

  For 31 out of 52 weeks, female acts topped the chart either as solo artists or in collaboration with other musicians.

  Miley Cyrus had the biggest song of the year, with the break-up anthem Flowers attracting 198 million streams.

  But new music was largely absent from the year's top 10 best-selling albums.

  The Weeknd's two-year-old greatest hits compilation The Highlights was at number one, with Taylor Swift's 2022 album Midnights in second place.

  New records by Lewis Capaldi, Olivia Rodrigo and Ed Sheeran were all outsold by "best of" collections from Elton John, Eminem, Fleetwood Mac and Abba.

  The only new release in the top 10 was Taylor Swift's 1989 (Taylor's Version) - but even that was a re-recorded and repackaged version of an album from 2014.

