title: Fast jet stream speeds transatlantic flight - BBC Weather
date: '2024-02-24'
section: General
url: http://www.bbc.co.uk/weather/features/68385942
content: |-
  After a commercial aircraft raced over the Atlantic this week, Simon King explains how climate change might make journey times quicker but bumpier in the future.

  With a powerful jet stream this week, a commercial aircraft going from New York to Lisbon reached a ground speed of 835mph (1,344km/h) as it caught a lift in the strong winds.

  That is approximately 260mph (420km/h) faster than a typical top speed for such a flight.

  Simon King explains how climate change might make journey times across the Atlantic even quicker but bumpier in the future.
