title: 'People''s Vote march: In pictures - BBC News'
date: '2018-10-20'
section: UK
url: http://www.bbc.co.uk/news/uk-45926996
content: |-
  Thousands from all over the UK take to the streets of central London to demand a say on the Brexit deal.

  Many young people who were unable to vote in the 2016 referendum because of their age joined Saturday's march, saying they would have to live with the consequences of Brexit. Polls have suggested a growing division among young and old voters.
