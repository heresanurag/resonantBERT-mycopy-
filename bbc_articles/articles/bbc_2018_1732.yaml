  But the real fight may yet be among the Syrian Kurds themselves, for not all support Mr Ocalan, despite the omnipresence of his photo.

  Thousands have fled PYD rule in order to escape large-scale conscription and the use of child soldiers. Many complain the PYD are mercenaries and criminals.

  Stories of human rights abuses abound, like bulldozing Arab villagers' homes on the pretext of clearing out IS extremists, accusations the PYD denies.

  Since 2015, private schools, including those teaching in Arabic, have been forced to close by the Kurdish administration.

  Meanwhile, the Syrian state continues to issue all civil documents, such as birth, marriage and death certificates, in an attempt to maintain influence.

  With so many competing interests, the fight for Afrin will be ugly. Kurdish dreams of "democratic federalism" and Turkish dreams of safe zones free of "terrorists" may lead inexorably to Syria's de facto partition.

  Whatever the future holds for Afrin, one side's dream is likely to be the other's nightmare.

  Diana Darke is the author of several books on Middle East society, including My House in Damascus: An Inside View of the Syrian Crisis (2016), and The Merchant of Syria (2018). Follow her on Twitter.
