content: |-
  Tanya Fear, 31, who has appeared in Doctor Who, has not been seen since last week.

  British actress Tanya Fear has been reported missing in Los Angeles.

  Fear, 31, who appeared in a 2018 episode of BBC sci-fi drama Doctor Who, was last seen on Thursday, according to her friends and family.

  In a statement on the @FindTanyaFear Twitter account, her uncle said the family were "deeply worried".

  Her mother said: "I am devastated about this situation, and appeal to anyone with information to please come forward and bring our daughter home safely."

  The statement said her family are urging Los Angeles police to investigate her disappearance. They also said they want to launch their own search and are applying for visas to travel from the UK.

  The actress's manager, Alex Cole, told ABC News she was fine when he last saw her a week ago.

  "Since she's been here, she's had a great career and this is just the beginning," he said.

  "We're obviously concerned and [hope] we find out this is a simple mistake and we find her."

  Fear appeared alongside Jodie Whittaker in 2018 Doctor Who episode Arachnids in the UK

  The actress, whose real name is Tanyaradzwa Fear, has also appeared in TV's Spotless, Endeavour, DCI Banks and Midsomer Murders. She was seen in the movie Kick-Ass 2 and had recently started doing stand-up comedy.

  The Los Angeles Police Department confirmed a missing persons report was filed for her on Thursday, 9 September.

  According to @FindTanyaFear, which is described as being run by her family, the actress left her Hollywood Bowl apartment without her phone or purse and was last seen at 22:00 local time that day.

