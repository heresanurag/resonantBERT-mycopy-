title: Footage shows miraculous escape in fatal crane collapse - BBC News
date: '2024-07-19'
section: General
url: http://www.bbc.co.uk/news/videos/c6p2ddj5p3jo
content: |-
  Crews in Fort Lauderdale, Florida, were building the crane when a section of it came loose.

  Footage has been released of the moment a driver escaped being crushed by a collapsed crane which killed one person and injured three others.

  On 4 April, crews in the US city of Fort Lauderdale, Florida, were in the process of increasing the crane's height when a section of it came loose.

  A construction worker died after falling with the crane section.

  Two of those injured were taken to hospital while a third was treated at the scene.
