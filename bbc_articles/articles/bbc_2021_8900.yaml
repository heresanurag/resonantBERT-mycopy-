  However, cafe and business owners told BBC Radio Wales they were concerned the Welsh government was asking them to make decisions which affected people's health.

  Health Minister Eluned Morgan said it was not asking pub landlords and other business owners to be "doctors" and there were "clear guidelines" to help them set rules.

  "Most places have been doing these measures since the beginning of the pandemic... what they need to do is to make sure those rules are known to those people who work there... or who want to enter those premises," she said.

  She dismissed claims that not having set rules could cause confusion, saying she was sure "people will act responsibly" when thinking about changes.

  While face masks will remain mandatory in shops and many other public places, from 7 August people will not have to wear them in pubs, restaurants and cafes.

  Ms Morgan said this was because people already had to take masks off to eat and drink and the rules were to protect the most vulnerable people in society who still had to go to the supermarket.

  "The big difference between going to shops is that a lot of people don't have any choice and they have to go to shops in order to make sure they are going to be able to eat," she said.
