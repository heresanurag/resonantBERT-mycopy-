  In 2022, federal agents discovered classified files in Trump's Florida home and he was charged with wilfully retaining defence information. He pleaded not guilty, and the case was ultimately dropped once he was re-elected. Since returning to office, Trump has taken steps to revoke the security clearances and protections of other top officials linked to the Biden administration. Among those whose security clearance and detail has been retracted is former top US military commander Mark Milley, a vocal critic of Trump. The new Defence Secretary, Pete Hegseth, has also ordered Milley's "conduct" to be investigated, and his military grade to be reviewed. Trump has also revoked the security detail of former chief medical adviser to the president, Anthony Fauci, who led the US response to Covid-19. Trump said at the time the decision was "very standard" and that it was not possible for everyone to have security protection for the rest of their life because they worked for the government. He ended security protection for his own former Secretary of State Mike Pompeo, and Secret Service protection for his former National Security Adviser, John Bolton, last month. The president has also ordered, external that the security clearance of dozens of former intelligence officials, including two ex-CIA directors, be revoked. They signed a letter in 2020 suggesting that reports about a laptop owned by Joe Biden's son, Hunter, were a Russian hoax. But the computer, whose trove of data contained evidence of drug abuse, prostitution and foreign business deals, was real.
