content: |-
  A number of Monday's newspapers have the latest on the ongoing war in Ukraine.

  'Europe in turmoil' and 'Happy ever Bafta'

  US star Demi Moore - who wore a sparkly outfit - had been up for Best Actress

  Several of Monday's front pages focus on the news that the United States is preparing for talks with Russian officials in Saudi Arabia, which are expected to start in Riyadh and will not include Ukrainian officials. The Daily Telegraph, external suggests Sir Keir Starmer's decision to speak publicly about the possibility of sending British troops to Ukraine could put pressure on European allies to support the idea of a peacekeeping force there. Starmer wants to act as a bridge between Washington and European leaders as they scramble to co-ordinate their response to US-led peace talks on Ukraine beginning in Saudi Arabia, according to the Times, external. The Daily Mail , externalbelieves the prime minister is - in its words - flying into a storm as he prepares to attend the crisis summit with other European leaders in Paris, because of growing anger over his refusal to increase defence spending. For the Guardian, external, the very fact that US officials are beginning talks in Saudi Arabia without European leaders lays bare what it calls the sudden, transatlantic chasm over the war.

  In other news, "Please Get Screened" is the Daily Mirror's, external headline as it urges women to come forward for breast cancer tests. The BBC presenter and breast cancer survivor, Victoria Derbyshire, is backing a new drive to boost the number of women being tested for the disease. Photos from Sunday nights Bafta's ceremony dominate a number of front pages - including Demi Moore who poses on the Sun, external. Half of UK farmers have reconsidered their future in the sector due to a rise in financial pressures in the last year, new research has found, according to the Daily Express, external. Finally, according to the Daily Star, external the sun is finally set to reappear this week as an 800 mile-wide "subtropical surge" brings the first taste of spring.

