  Scotland 'found a way to win' against Australia

  Scotland head coach Gregor Townsend was left frustrated by aspects of his side's performance in their 27-13 Autumn Nations Series win over Australia, but praised the way his players "found a way to win". Much of the talk in the build-up to this game was about how Scotland needed to end the year with a positive result - the type of fixture they have to win to "be taken seriously", as Huw Jones put it. Captain Sione Tuipulotu's try put Scotland in front at half-time after a largely underwhelming first 40 minutes, but they upped their game after the interval and crossed for three magnificent tries from Duhan van der Merwe, Josh Bayliss and Finn Russell. Ultimately, the Scots did what they had to do, turning it on at key moments against a Wallabies side high on confidence after wins against England and Wales. "There was more in us," Townsend said. "We weren't as accurate in the first half. "It shows we can get a win when we're not playing as well. There were moments in the game that I loved. We're better than some of the aspects today, but I'm proud that the players found a way to win. "I'm inwardly happy, but if there was a game next week it would be a tough review and there would be a lot of things to improve."

  It was noticeable how Scotland turned it up a level in the second half, and although Townsend felt the performance fell short of the levels they reached in the defeat by South Africa earlier this month, he credited his player's physical output. "The composure we had in defence close to our line was on show," he said. "I felt our fitness as well in the second half, we outworked the defence and that created chances for us." With the 2025 Six Nations the next focus for Scotland, Townsend was asked if he feels his side are ready to kick on and compete after the autumn they have had. "The frustrations of the [2024] Six Nations - to be in every game and not come through with more than two wins - shows they were ready back then and I believe that experience has made us better," he said. "We have to grow again in the next campaign."

  Scotland captain Sione Tuipulotu's grandmother Jacqueline was in the stands at Murrayfield on Saturday

  For Tuipulotu, captaining his adopted country against the nation of his birth was given additional meaning by the presence in the crowd of his grandmother Jacqueline, who had flown over earlier this week to surprise both Sione and his brother Mosese, who featured for Scotland A against Chile on Saturday. Jacqueline - born in Greenock - is the reason both Tuipulotu brothers are eligible to play for Scotland, and she gave her grandson a hug as he received the Hopetoun Cup post-match. "It was an amazing moment," Sione said. "When she handed over the cup she said 'you got 'em!' "I'm super happy and it makes the day all worthwhile, when we win like that. We won playing our rugby, we scored some brilliant tries. We know how dangerous our back three is but it was a group effort today and that's what I'm most pleased about. "We knew we needed a win today, nothing less. We put that pressure on ourselves and we delivered."
