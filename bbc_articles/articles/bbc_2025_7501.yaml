title: Donald Trump deep sea mining order violates law, China says - BBC News
date: '2025-04-25'
section: Science & Environment
url: http://www.bbc.co.uk/news/articles/cx2v37z333lo
content: |-
  The US president speeds up permits for a practice opposed by many countries and environmentalists.

  The Metals Company have formally applied to the US government for permits to mine the deep sea

  Donald Trump has signed a controversial executive order aimed at stepping up deep-sea mining within US and in international waters. The move to allow exploration outside its national waters has been met by condemnation from China which said it "violates" international law. Thursday's order is the latest issued by the US president to try to increase America's access to minerals used by the aerospace, green technology and healthcare sectors. The deep sea contains billions of tonnes of potato-shaped rocks, called polymetallic nodules, which are rich in critical minerals like cobalt and rare earths.

  The latest US executive order, external was issued to "establish the United States as a global leader in responsible seabed mineral exploration", it reads. The move appears to bypass a long-running round of UN negotiations on mining in international waters. Many countries, including China, have delayed issuing permits until countries agreed a framework for how resources could be shared. "The US authorisation... violates international law and harms the overall interests of the international community," Chinese foreign ministry spokesman Guo Jiakun said on Friday. China dominates global production of rare earths and critical metals like cobalt and lithium. Trump has been frustrated by this relative weakness of the US position, analysts say. "We want the US to get ahead of China in this resource space under the ocean, on the ocean bottom," a US official said on Thursday. To achieve this, the order says the US will speed up the process of issuing exploration licences and recovery permits both in its own waters and in "areas beyond national jurisdiction". The administration estimates that deep-sea mining could boost the country's GDP by $300bn (£225bn) over 10 years and create 100,000 jobs The EU, the UK and others support a moratorium on the practice until further scientific research is carried out. Environmentalists and scientists are concerned that marine species living in the deep sea could be harmed by the process. "Deep-sea mining is a deeply dangerous endeavour for our ocean," said Jeff Watters of Ocean Conservancy, a US-based environmental group. "The harm caused by deep-sea mining isn't restricted to the ocean floor: it will impact the entire water column, top to bottom, and everyone and everything relying on it," he added in a statement released on Friday. It is not clear how quickly deep-sea mining could begin but one mining company, The Metals Company (TMC), is already in discussions with the US government to obtain permits. TMC's CEO Gerard Barron has previously said he hopes to begin mining by the end of the year. Along with others in the mining industry, he disputes the environmental claims made and has argued that the abyssal zone - 3,000m to 6,000m below sea level - has very low concentrations of life. "Here there's zero flora. And if we measure the amount of fauna [animal life], in the form of biomass, there is around 10g per square metre. That compares with more than 30kg of biomass where the world is pushing more nickel extraction, which is our equatorial rainforests," he previously told the BBC. A recent paper published by the Natural History Museum and the National Oceanography Centre looked at the long term impacts of deep sea mining from a test carried out in the 1970s. It concluded, external that some sediment-dwelling creatures were able to recolonise the site and recover from the test, but larger animals appeared not to have returned. The scientists concluded this could have been because there were no more nodules for them to live on. The polymetallic nodules where the minerals are found take millions of years to form and therefore cannot easily be replaced.
