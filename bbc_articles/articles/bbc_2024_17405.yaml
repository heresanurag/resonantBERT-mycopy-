  Hathaway was named in Wales' training squad for the summer Tests but was unavailable for the defeat by South Africa because the match fell outside World Rugby's international window which ruled out English-based club players. Aberystwyth-born Hathaway, who has represented Wales and England at under-20 level, offers options at full-back and wing. Wales have moved to secure his services after Exeter wing Immanuel Feyi-Waboso was in a similar position earlier this season and chose to play for England. After missing the Six Nations because of his club commitments in Japan, Williams reverts to his favoured full-back position with Cameron Winnett dropping out of the first XV after starting the last six internationals. Williams, 33, is the team's most experienced campaigner and is set to win his 91st cap for Wales with five further Tests played for the British and Irish Lions. Mason Grady, who played most of his rugby on the wing for Cardiff last season, also continues out of position at inside-centre having been given the number 12 jersey against South Africa for the first time in his senior career. He will partner Owen Watkin once more, with Nick Tompkins named on the bench.

  Archie Griffin was named in the 2024 Six Nations squad

  Griffin, 22, will make his first international start in the Sydney city where he was born. He is Welsh-qualified through his parents and has previously made one brief replacement appearance against England at Twickenham in February. Tomas Francis has been Wales' long-time tight-head first-choice option but has not played since the World Cup and his move to French side Provence, while Leon Brown, Keiron Assiratti and Henry Thomas are unavailable through injury. Scarlets prop Harri O'Connor is named on the bench with Lewis not involved. Tshiunza will play his first game for Wales since the World Cup, while Hill will be involved on the international stage for the first time since the 2021 Six Nations defeat to France in Paris. Hill was playing fourth division rugby in Japan before his international recall. Wales have second-row issues with Adam Beard and Teddy Williams injured and Will Rowlands rested for the summer series. Dragons duo Carter and Matthew Screech played against South Africa but neither will be involved against the Wallabies this weekend.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'Poignant' cultural welcome for Wales squad in Australia

  Wales have lost their last seven internationals since defeating Georgia in the World Cup and have not beaten the Wallabies in Australia since 1969. Australia have a new head coach in Joe Schmidt who has taken over from Eddie Jones. The Wallabies have also named an inexperienced team with a new skipper in flanker Liam Wright, and centre Josh Flook and lock Jeremy Williams making their debuts. There are five newcomers among the replacements, including Tom Lynagh, who is the son of Wallabies World Cup winner Michael and brother of Italy international Louis. Only prop James Slipper, number eight Rob Valetini and wing Andrew Kellaway started the World Cup record defeat against Wales in France last year. “We’ve had a good week of preparations here in Sydney and are excited to get out on field on Saturday," said Gatland. “This first Test is going to be a great challenge for us. "Test matches are all about fine margins and we know we need to be accurate, keep our discipline and stay in the fight for the full 80 minutes. “There’s a lot of talent within the Australia squad and we know they will want to come out firing and put in a performance against us this weekend."
