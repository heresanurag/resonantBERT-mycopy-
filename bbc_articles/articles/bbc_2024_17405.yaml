  Cardiff centre Ben Thomas is given the Wales fly-half role and wing Josh Hathaway will make his debut for the first Test against Australia.

  Hathaway to make debut as Thomas given Wales fly-half role

  Josh Hathaway will become Wales' 1,207th cap while Ben Thomas is the sixth fly-half Warren Gatland has selected since he returned as head coach in December 2022

  Coverage: Listen on, BBC Radio Wales, Radio Cymru, BBC Sounds, the BBC Sport website and app, plus live text commentary, followed by report and reaction on the BBC Sport website and app.

  Cardiff centre Ben Thomas has been given the Wales fly-half role and wing Josh Hathaway will make his debut in the first Test against Australia in Sydney on Saturday. Thomas, 25, replaces Sam Costelow and makes his first international start in his third Test match following two replacement appearances in 2021. He partners Cardiff team-mate Ellis Bevan after the scrum-half made his debut in the 41-13 defeat against South Africa at Twickenham last month. Gloucester wing Josh Hathaway, 20, is handed his debut on the wing with Liam Williams switching to full-back to replace Cameron Winnett. Bath tight-head prop Archie Griffin will make his first Test start in his second international while Christ Tshiunza is named at lock alongside Exeter team-mate Dafydd Jenkins with the recalled Cory Hill on the bench. Prop Dillon Lewis and lock Ben Carter were ruled out through injury. Number eight Aaron Wainwright will win his 50th cap after making his first Wales appearance as a replacement in the 23-10 win over Argentina in 2018. Wainwright is only one of three starting survivors, alongside Williams and prop Gareth Thomas, from the side that beat Australia 40-6 in the World Cup in Lyon last September.

  Wales head coach Warren Gatland only named one specialist fly-half in Costelow for the summer squad with Thomas and fellow Cardiff player Jacob Beetham acting as cover. Wales have been searching for a fly-half successor to the retired Dan Biggar and unavailable Gareth Anscombe, with Costelow starting four games in the Six Nations and the defeat against the Springboks. Gatland says he has been looking for more physical options at 10 and overlooked Ioan Lloyd for the Australia trip. Thomas has only made one start at 10 for Cardiff this season with 16 appearances in his more natural inside-centre position. South African fly-half Tinus de Beer started almost every match for the Arms Park side, while Callum Sheedy will arrive at Cardiff from Bristol for next season. Costelow has been named as a replacement this weekend.

