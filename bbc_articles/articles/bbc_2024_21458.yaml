title: 'Jeffrey Donaldson: Ex-MP pleads not guilty to sex offence charges - BBC News'
date: '2024-09-10'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c5ydzxw3w5po
content: |-
  The former DUP leader is to stand trial for charges against two alleged victims next year.

  The former Democratic Unionist Party leader Sir Jeffrey Donaldson has pleaded not guilty to historical sex offence charges during an appearance at Newry Crown Court. The 61-year-old is accused of 18 offences, which allegedly occurred between 1985 and 2008. The case facing the former Lagan Valley MP involves two alleged victims. The charges include rape, four counts of gross indecency and 13 counts of indecent assault.

  His wife, Lady Donaldson, 58, also pleaded not guilty to three charges related to aiding and abetting. Her defence team has applied to have two other charges against her withdrawn. The couple were arrested at their home in March 2024 and are on continuing bail. On Tuesday, the latest stage of their prosecution involved their arraignment - the point at which they had to formally enter pleas.

  Lady Donaldson was also in court and issued a not guilty plea to charges she faced

  Both accused stood in the dock of number one court for the 10-minute hearing on Tuesday as each of the charges were read out to them. They both replied ‘not guilty’ to each charge, the former MP leaning down to speak his responses loudly and clearly into a microphone. The case will be reviewed on 25 October. Judge Paul Ramsey told the pair they are not required to attend on that date as it will be an administrative hearing. They were released on continuing bail. The court was told that a trial date has been fixed for 24 March 2025 and is scheduled to last up to two weeks.

  Sir Jeffrey Donaldson was elected leader of the DUP in 2021. He was Northern Ireland's longest-serving MP, having been first elected to Parliament in 1997 as a representative of the Ulster Unionist Party (UUP). He first entered politics when he worked for MP Enoch Powell between 1982 and 1984 after joining the UUP. Sir Jeffrey's own career in frontline politics began in 1985 when he was elected to the Northern Ireland Assembly as its youngest member. In 2003, he left the UUP to join the DUP due to his long-standing opposition to the 1998 Good Friday Agreement and the leadership of David Trimble. Sir Jeffrey recently steered the DUP back into government in Northern Ireland ending a two-year boycott of the devolved institutions. He was knighted in 2016 for political service. He married his wife Eleanor in 1987.
