title: 'Israel fires: Blaze near Jerusalem largely controlled - BBC News'
date: '2025-05-02'
section: Middle East
url: http://www.bbc.co.uk/news/articles/c4g2vlewj09o
content: |-
  A national emergency was declared and events for Israel's Independence Day on Thursday were cancelled as the fires spread near Jerusalem.

  This garden shop in Mesilat Zion was left charred and in ruins

  Fires that have ravaged large parts of central Israel since Wednesday have largely been extinguished, the country's Fire and Rescue Authority says. More than 150 teams have been battling the blaze, which has scorched around 20 sq km (7.7 sq miles) of land in the Latrun area - between Jerusalem and Tel Aviv. Israel's ambulance service said at least 12 people had been treated for smoke inhalation, but no fatalities have been reported. Seventeen firefighters were injured, according to Israeli broadcaster Kan. Authorities said hot and dry conditions, with strong winds, made controlling the fires more challenging, and a senior official warned they could flare up again.

  "I've been in the service for 24 years, and I've been through many fires," said Shlomi Harush, a deputy commander of Ayalon fire station. "There's no doubt that this is one of the toughest fires I've seen." Israeli Prime Minister Benjamin Netanyahu had declared a national emergency in response to the fires, and hundreds of people evacuated their homes, but an evacuation order for 12 towns near Jerusalem has now been lifted. Countries including France, Italy and Spain had dispatched aircraft to assist in the emergency. The fires led to the cancellation of most official events celebrating Israel's Independence Day on Thursday, and there was a nationwide ban on lighting fires for barbecues - a traditional part of the day. A major highway linking Jerusalem and Tel Aviv has now reopened. Videos posted online earlier this week showed people abandoning their cars as flames and smoke whipped across the road. Israeli authorities have provided conflicting accounts for the cause of the fire. Israeli President Isaac Herzog said the fires were "part of the climate crisis, which must not be ignored". Netanyahu blamed the fires on arsonists and said that 18 people had been arrested, but Israeli police later said that only three suspects were in detention, and they were not linked to the wildfires.

