title: 'Watch: Sinkhole appears in car park near Charvil school - BBC News'
date: '2024-06-27'
section: General
url: http://www.bbc.co.uk/news/uk-england-berkshire-67473936
content: |-
  Drone footage shows the hole which is about two metres (6.5ft) deep and one metre (3.2ft) wide.

  A car park near a primary school has been fenced off after a large sinkhole appeared in the ground.

  Drone footage filmed by Lee Cripps showed the hole at East Park Farm Car Park in Charvil, Berkshire.

  It was discovered on Monday morning and is about two metres (6.5ft) deep and one metre (3.2ft) wide.

  Staff from the school are guarding the hole to make sure members of the public do not get too close.
