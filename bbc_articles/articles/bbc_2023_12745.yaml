title: '''My goodness!'' - BBC reporter''s live reaction to historic moon landing
  - BBC News'
date: '2023-08-23'
section: General
url: http://www.bbc.co.uk/news/world-asia-66590446
content: |-
  Watch Samira Hussein's response as India's Chandrayaan-3 space mission reaches the lunar surface.

  India has completed its historic mission to land near the Moon's south pole. The BBC's South Asia correspondent was at the space centre in Bangalore.

  She filmed the final moments of the tense wait for the landing and her reaction when the outcome was clear.
