title: '''I carry a saw and wear a stab-proof vest'' - BBC News'
date: '2019-03-19'
section: General
url: http://www.bbc.co.uk/news/uk-47617957
content: |-
  A young former drug dealer tells the BBC what, out of fear of being attacked, he keeps under his coat.

  A young former drug dealer says he carries a saw and wears a stab-proof vest out of fear of being attacked.

  On the day reporter Noel Phillips met "Jordan" (not his real name) in Coventry he was hiding the saw under his coat. Other days he carries a knife or machete.

  The number of crimes related to knives and other offensive weapons dealt with by the criminal justice system reached a nine-year high in 2018, figures show.

