title: Aerial footage shows extent of flooding in Florida - BBC News
date: '2024-06-18'
section: General
url: http://www.bbc.co.uk/news/videos/c2vvdnwvn84o
content: |-
  The southern part of the state has seen heavy downpours as a tropical disturbance passes through.

  A tropical disturbance has caused dangerous flooding in southern Florida, blocking roads and delaying travellers. A state of emergency was declared for that region of the state as more rain is expected.

  The National Hurricane Center said the weather system has a slight chance of becoming a tropical storm.
