content: |-
  Bringing you the latest news from across England about the coronavirus pandemic.

  When libraries went into lockdown, the buildings and books were off-limits but their kindness, connection and sense of community continued.

  We went to Ipswich Library to hear how people have been finding solace in more than just the pages of a favourite book.

  As the coronavirus pandemic gathered pace, book lovers were just as quick to act.

  Libraries found their shelves being cleared as novels, children's picture stories and recipes were borrowed in their thousands.
