title: Moment journalist and cameraman attacked by masked men in Georgia - BBC News
date: '2024-12-09'
section: General
url: http://www.bbc.co.uk/news/videos/c07ggrnxx45o
content: |-
  The journalist told the Associated Press that the men took their equipment after the attack.

  A TV journalist and cameraman have come under attack from masked men while covering pro-EU protests in Georgia.

  Reporter Maka Chikhladze, from pro-opposition TV Pirveli, was violently thrown to the ground, while cameraman Giorgi Shetsiruli was kicked in the head on a side street in the capital, Tbilisi.

  They were covering the 10th night of mass pro-EU protests that have taken place in several cities. The protests are in response to Georgia's increasingly authoritarian government suspending the process towards joining the EU.
