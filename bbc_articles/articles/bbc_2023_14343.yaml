title: O2 Academy Brixton can reopen once conditions are met - council - BBC News
date: '2023-09-15'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-66825942
content: |-
  Lambeth Council says the venue can host events again if it meets 77 "robust" safety conditions.

  Two people died in the crush at O2 Academy Brixton, while a 21-year-old woman remains in hospital

  The O2 Academy Brixton can reopen once it has met 77 "extensive and robust" conditions "designed to promote public safety", Lambeth Council has said.

  The south London music venue's licence was suspended last December after two people were killed when fans without tickets tried to force their way in.

  The council held a two-day licencing hearing on whether the academy should be allowed to host events again.

  The venue's owner said a timeline for when it will reopen would be announced.

  The 77 conditions to be met by the venue include stronger doors, new crowd management systems, more detailed risk assessments, a new ticketing system, a centralised control and command centre and new security and management.

  The council's cabinet member for safer communities, Mahamed Hashi, said the measures had been "proposed by (owners) AMG (Academy Music Group) at the hearing to support their aim of regaining the venue's licence so it can reopen, and making sure we never see a tragedy again like the one there in December 2022".

  He added that the local authority would continue to support the ongoing police investigation into the incident.

  In a statement, AMG said it was "immensely grateful" to Lambeth Council for its decision and that the academy would reopen with a series of test events.

  The Met Police said it would work with AMG and the council to ensure "safety is paramount".

  Supt Gabriel Cameron said it had always been the Met's aim that the academy was "run by a licensee who will take all necessary steps to ensure [safety]".

  During the two-day hearing the force had called for a different firm to run the venue.

  Rebecca Ikumelo, 33, and Gaby Hutchinson, 23, died in hospital after the crush

  Mother-of-two Rebecca Ikumelo, 33, from Newham, and Gaby Hutchinson, 23, from Gravesend in Kent, who was a security contractor working at the venue, died in the crush during a gig by Afrobeats artist Asake on 15 December 2022.

  A third woman remains in hospital in a critical condition.

  London Ambulance Service treated 10 patients at the scene, eight of whom were transferred to hospital.

  In the days and weeks after, concerns were raised over the strength of the venue's doors and staffing levels, including whether there was enough medical cover.

  Amy Lamé, the mayor's appointed nightlife czar, said she welcomed the decision to reopen the "cherished" venue.

