id: bbc_2019_8717
title: Latvia PM urges good balance in EU top jobs - BBC News
date: '2019-07-01'
section: General
url: http://www.bbc.co.uk/news/world-europe-48821024
content: |-
  Nominees for the top EU jobs must be a balance of nations and gender, Latvia's PM says.

  Krisjanis Karins, a conservative, was speaking before a Brussels summit of EU leaders.

  The leaders are split, especially over a successor to Commission chief Jean-Claude Juncker.
