title: 'Covid: Limit reached on government ''telling people what to do'' - BBC News'
date: '2020-12-11'
section: Wales politics
url: http://www.bbc.co.uk/news/uk-wales-politics-55259111
content: |-
  Wales' top doctor says more coronavirus restrictions before Christmas are being considered.

  Frank Atherton: "The reality is we are in a difficult position in Wales"

  Authorities have "reached the limit... [of] telling people what to do", Wales' top doctor has said, warning of a "perilous" rise in coronavirus cases.

  However, chief medical officer Frank Atherton said ministers were considering whether more restrictions would be needed in the coming weeks.

  Asked if that could happen before Christmas, he said: "That's something ministers are considering."

  The first minister Mark Drakeford had appeared to rule that out on Tuesday.

  Facing the same question, in the Senedd, Mr Drakeford said: "I don't think that means that we will be taking further measures this side of Christmas."

  Speaking to Dot Davies on BBC Radio Wales on Thursday, Dr Atherton urged people to think about their behaviour to keep themselves safe.

  He has previously said he will not be visiting relatives in Northern Ireland and England over Christmas.

  There will be a time lag before officials know the effect of the current rules, including the ban on serving alcohol in hospitality venues.

