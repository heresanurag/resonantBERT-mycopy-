  "Ministers are considering what to do in the period immediately after Christmas to try to give us some headroom into January," Dr Atherton said.

  "But the reality is we are in a difficult position in Wales. We are in a difficult position in the UK, but Wales has the highest rates at the moment of the four nations.

  "And so it's down to all of us to think about what we can do to keep ourselves safe.

  "I really believe that we have reached the limit of what we can do through legislation, through telling people what to do."

  "We have to say to the people of Wales, 'Look at the situation we are in'.

  "It really is quite perilous."

  Dr Atherton also warned parents should not be talking at school gates, because of the risk of Covid-transmission, and "we need to have as little contact as possible".

  "Even that kind of level of human contact in the winter with the level of virus transmission that we have in Wales can pass [on] the virus", he said.
