  Last week, the Minister for Schools Standards in England, Nick Gibb, said that since 2010, the proportion of children taking a language at GCSE had risen from 40% to 46% in 2018.

  He said the government was "determined to see this rise further", and was taking a range of measures to tackle this - such as creating a new network of schools that excel in the teaching of languages to share their expertise and best practice with others.
