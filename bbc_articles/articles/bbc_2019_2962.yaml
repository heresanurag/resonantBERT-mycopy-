title: Save UK's 'dwindling' language skills, say MPs and peers - BBC News
date: '2019-03-04'
section: Family & Education
url: http://www.bbc.co.uk/news/education-47421735
content: |-
  Decline in language learning is "a disaster for the country", says a parliamentary group.

  Schools should teach a language to pupils from age five to 18 to reverse a "disastrous" decline in language skills, say MPs and peers.

  It follows a BBC investigation showing falls of between 30 and 50% since 2013 in the numbers taking language GCSEs in some areas of England.

  Head teachers warned the aim might not be realistic because of teacher shortages and funding pressures.

  Ministers said the picture in England had improved slightly since 2010.

  This improvement in the overall proportion taking a language GCSE, thanks largely to Spanish and Mandarin, hides a collapse in numbers studying German and French.

  Between 2010 and 2018 in England, the numbers of German GCSEs fell from 57,806 to 39,941 and at A-level from 5,055 to 2,785, according to the Department for Education.

  The all-party parliamentary group on modern languages called for cross-government action in a recovery plan published on Monday.

  Jean Coussins, a crossbench peer and joint chair of the group, said: "We are complacent. In the 21st Century speaking only English, is as much of a disadvantage as speaking no English at all."

  The report pointed towards a declining proportion of online content in English, and said that according to the British Council, 75% of the world's population does not speak English.

  The group is calling for a range of new qualifications, amid concerns that it is seen as harder to get a good grade in GCSEs than other subjects.

  "One of myths we need to bust is [that] languages are just for the top set," said Baroness Coussins, pointing out that in a number of other countries the expectation is that everyone can learn another language.

  But Geoff Barton, from the Association of School and College Leaders, said that while head teachers supported the ambition to encourage language learning, it was important to be realistic.

  He said given funding constraints and the difficulty in recruiting specialist teachers, "it is hard to see how schools could fulfil an objective to ensure all young people learn a language from ages five to 18".

