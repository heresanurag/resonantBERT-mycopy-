  The plan also suggests tax breaks for smaller businesses as part of promoting life-long learning of languages.

  Baroness Coussins said: "We're at a crunch point. When we're faced with the practical challenge of negotiating dozens of new free trade agreements, we'll discover speaking English is not enough."

  That call was backed by Dr Adam Marshall, director general of the British Chambers of Commerce.

  He said: "Language skills lead to a better understanding of how people and cultures operate, and that understanding is often the key to closing a business deal."

  The German Ambassador to the UK, Peter Wittig, expressed his dismay in a tweet following the BBC's report last week.

  In response to the parliamentary recovery plan Mr Wittig told the BBC that the decline in Britons learning German was "deeply worrying".

  He added: "Speaking languages and engaging with other cultures are the currency of the 21st century.

  "In today's inter-connected world, communicators and bridge-builders are needed as never before."

  The German ambassador said not only did learning a language open doors in fields from finance to engineering, but it "encourages friendship, trust and understanding across borders".

