content: |-
  Firefighters remain at the scene of two incidents on Arran and Cumbernauld following a week of wildfires across Scotland.

  Extreme wildfire warning in final day with rain to come

  Fires have been burning for days at Glen Rosa on Arran

  An extreme wildfire warning covering all of Scotland is in place for a final day, with rain showers due in parts of the country on Sunday. The Scottish Fire and Rescue Service (SFRS) said crews remained at the scene of ongoing wildfires and urged the public to "act responsibly". On the Isle of Arran mountain rescuers said pockets of fire continue to burn on Glen Rosa and have told hillwalkers to avoid the area. A fire has also been burning for two days in Acharacle in the Highlands, and two fire crews at the scene.

  Police Scotland has also asked people to avoid the area of a wildfire on Isle of Bute. The blaze began at about 11:40 at the Rhubodach Loop, just off the A886. The SFRS issued the wildfire warning during a long period of unseasonably dry weather. Temperatures have been well above the April average and Thursday was the warmest day of the year so far in Scotland - reaching 23C (73F ) in Aboyne, Aberdeenshire. Sunday will mark a return to more typical April conditions. Met Office chief meteorologist Jason Kelly said: "A change is on the way this weekend, as we say goodbye to the wall-to-wall sunshine. "High pressure sinks southwards and allows low pressure to take hold bringing more cloud, rain and showers, and also lower temperatures."

  The wildfire on Arran covered an area of grass measuring 600m by 600m

  The Glen Rosa fire on the Isle of Arran was reported at about 13:00 on Thursday. Three crews were sent to the scene, with one remaining on Saturday morning. A helicopter is expected to assess the damage from the air later. Police have told hillwalkers there will be no access to the popular Goatfell walk due to public safety. Meanwhile, dampening down work has concluded after a large grass fire in Cumbernauld in Lanarkshire, which had been burning since Thursday. It led to the overnight evacuation of a dog kennel and cattery. Owner Eran Yehudai told BBC Scotland News he had to evacuate 25 dogs and 10 cats from the premises. The SFRS said the last crew left the scene at 08:30. On Friday, firefighters contained a wild blaze on an area of dunes and grass near near the St Fergus Gas Terminal in Peterhead.

  The SFRS received "multiple calls" about a gorse fire in the Pentlands
  • None Thurso Moors, Thurso: Three fire engines were sent to a large area of gorse and heather measuring approximately 250m.
  • None The Gramps, Aberdeen: A major outdoor fire on Kincorth hill was reported on Thursday night. Two fire engine were sent.
  • None John Kennedy Drive, Thurso: Smoke was reported in undergrowth on Friday morning. Crews worked to extinguish a fire in a moorland area.
  • None The Pentland Hills near Edinburgh: On Thursday evening a large area of grass about 1 km long caught light. Crews were at the scene until Friday night.
  • None Rothesay, Isle of Bute: A grass fire was reported on Tuesday morning. The blaze covered a square mile, with crews at the scene until Thursday afternoon.
  • None Bonhill, West Dunbartonshire: Six fire crews extinguished a blaze on Tuesday that affected an area of grass measuring approximately 1.5 miles.
  • None Glendale area, Isle of Skye: A wildfire on Tuesday affected an area of grass approximately two miles long.
  • None Loch Dee, Galloway Forest Park: A large grass fire was reported on Thursday 3 April, with crews still working in the area until Tuesday evening.

  SFRS deputy assistant chief officer Kenny Barbour, said the risk of wildfires remained while the warm and dry weather continued. He said: "Wildfires have the potential to burn for days, as we've seen this week in Dumfries and Galloway, and they spread through vast areas of land in our countryside, which is devastating for those who live nearby. "Our firefighters will continue to work with local landowners and other partners to bring these fires under control." He added: "We are asking the public to exercise extreme caution and think twice before using anything involving a naked flame."
