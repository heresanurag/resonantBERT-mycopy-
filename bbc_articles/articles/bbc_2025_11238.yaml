title: US cities follow LA's protests over Trump's immigration raids - BBC News
date: '2025-06-10'
section: General
url: http://www.bbc.co.uk/news/videos/cd904744ejeo
content: |-
  From Boston to Houston, demonstrators elsewhere have followed the displays of opposition in LA.

  Demonstrators in a number of other US cities have joined Los Angeles in protesting over raids by immigration authorities under US President Donald Trump.

  Protesters were filmed on Monday in cities including Boston, Houston and Philadelphia, as demonstrations entered their fourth day in Los Angeles.

  Trump sent another 2,000 National Guard troops to LA - as well as 700 US Marines - even as protests quietened towards the end of the day.
