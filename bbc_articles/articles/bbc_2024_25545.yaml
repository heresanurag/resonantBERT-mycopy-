  An emergency assistance centre is set up for people told to leave their homes after a house fire in Bedford.

  One dead after 'explosion' and fire at house

  Residents have been asked to keep their windows open after a blaze in Cleat Hill, Bedford

  One person has died and another has been seriously injured after an "explosion" and fire at a house, police have said. At about 07:30 BST on Saturday emergency services were were called to reports of a fire at Cleat Hill, in Bedford. Properties were evacuated and roads closed. "One person is confirmed to have died in an explosion and subsequent fire," said Bedfordshire Police in a statement. Bedford Borough Council has set up an emergency assistance centre for people who have been unable to return to their homes.

  A police spokesperson said: "Inquiries are ongoing to identify the cause of the explosion and residents still in their homes should keep their windows open. They added: "We understand that this incident is very concerning for those who live in the vicinity and are still advising for people to avoid the Cleat Hill area whilst work at the scene continues."

