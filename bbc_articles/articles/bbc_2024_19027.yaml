title: Man charged after woman assaulted before Hampden cup tie - BBC News
date: '2024-08-18'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/cvg570e5lgeo
content: |-
  Police say the woman, who is a St Johnstone employee, had a supporters drum taken from her during the incident.

  Police formed a line outside the national stadium to separate supporters before kick-off

  A 22-year-old man has been charged after a woman was assaulted and robbed outside Hampden before Rangers' Premier Sports Cup match against St Johnstone. Police said the 51-year-old, an employee of the Perth club, had a supporters drum taken from her during the incident. It happened at about 16:45 on Saturday, an hour before the match kicked off. Two other men, aged 16 and 21, were also arrested for breach of the peace and resisting arrest. All three men will appear before Glasgow Sheriff Court on Monday.

  The woman, believed to be a fan liaison officer, did not require hospital treatment. A St Johnstone spokesperson said: "We are aware of an incident involving one of our club employees prior to today’s Premier Sports Cup match against Rangers at Hampden Park. "We are working with Rangers Football Club, Police Scotland, the SPFL and the SFA, with an active investigation now underway." Officers formed a barricade to separate the two sets of supporters prior to the match. Cup holders Rangers are currently playing their home games at the national stadium due to refurbishments at Ibrox. Philippe Clement's side progressed to the quarter finals of the tournament after a 2-0 victory.
