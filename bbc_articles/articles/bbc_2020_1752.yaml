  Local resident Carol Calcutt told BBC Radio Shropshire the Boat Inn pub by the river front in nearby Jackfield was now submerged in water.

  "Practically just the roof showing there now," she said.

  A care home and surrounding properties in Whitchurch, Herefordshire, were also evacuated after they were overcome by floods, local fire services said.

  A woman was lifted to safety by rescue workers as floodwater surrounded the village of Whitchurch in Herefordshire.

  Vehicles were stranded in Hampton Bishop near Hereford after the River Lugg burst its banks

  A clean-up operation is under way in areas such as Ross-on-Wye amid the ongoing flood warnings

  Meanwhile, Welsh Water has warned drinking water is running out in Monmouth and surrounding areas after "unprecedented flooding" at its treatment works in Mayhill.

  There was some relief in Upton upon Severn, Worcestershire, on Monday as defences appeared not to have been breached overnight, but severe flood warnings for the area now predict river levels will peak by Wednesday.

