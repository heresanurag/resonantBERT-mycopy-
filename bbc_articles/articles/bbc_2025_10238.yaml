title: NI Liverpool fan released from hospital after being struck by car at parade
  - BBC News
date: '2025-05-26'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c8jgm4rpyd1o
content: |-
  Jack Trotter from Newtownards, County Down, tells BBC News NI he is in "absolute agony" after the incident on Water Street.

  NI Liverpool fan discharged from hospital after being struck by car at parade

  Jack Trotter was celebrating Liverpool's Premier League win with friends when the incident happened

  A man from Northern Ireland has been discharged from hospital after being struck by a car at a Liverpool Football Club parade. Jack Trotter, from Newtownards, County Down, and his girlfriend Abbie Gallagher were hit by the car as it drove into fans on Water Street, in Liverpool. It happened at about 18:00 BST on Monday as thousands of Liverpool FC fans gathered in the city centre for the Premier League victory parade. Speaking to BBC News NI from hospital on Monday night, Mr Trotter said he was in "absolute agony" after sustaining injuries to his back and leg. He was taken to hospital by ambulance and kept in overnight.

  Mr Trotter and Ms Gallagher pictured with friends shortly before the incident

  The couple had travelled to the parade with friends from Northern Ireland. Although Water St had been closed to traffic, it is believed the driver of a Ford Galaxy car was able to follow an ambulance after a road block was temporarily lifted, Assistant Chief Constable Jenny Sims from Merseyside Police told reporters on Tuesday. A 53-year-old British man has been arrested on suspicion of attempted murder. ACC Sims said the police force was aware of 50 people requiring hospital treatment. "Of those, 11 remain in hospital for ongoing treatment, they are all in a stable condition and I am pleased to say that they appear recovering well." The incident is not being treated as terrorism, she added.

  David Kitchen, from the North West Ambulance Service, said 27 patients were taken to various hospitals across Liverpool. Four of the injured were children and one paramedic on a bike was also struck but not seriously injured, he added. In a post on social media, Mr Trotter said the scenes were "crazy". "I'm writing this because I've got a million texts asking if I'm okay and it's crazy over here. I've barely any service," he said. "The parade was going unreal until the very end. Unfortunately I was hit, however I'm extremely lucky as I dodged the car just in time, however still got hit. "In absolute shock how an event like this can turn to such a tragedy."

  Ross Welsh said he was shaken up after the incident

  Ross Welsh, from Lisburn, said he had to "jump to get out of the way" of the car, but did not see anyone hit by it. "It wasn't very, very close, but it was close enough that we felt we had to get out of the way quick," he told the Nolan Show. "Once the videos started coming out and you realise it was that car that we were close to, I was quite shaken up last night and just thankful it wasn't worse like it could have been. "It's really put a dampener on it and you feel you can't celebrate anymore."

  BBC Northern Ireland and Radio 5 live presenter Connor Phillips was in the crowd, about 500 yards away from Water Street at the time of the incident. "There were two helicopters in the sky and they were obviously following the parade and providing footage of the parade as it was happening," he told Good Morning Ulster. "As we started to disperse after the team had passed and after the Premier League trophy had passed, we did notice there was another helicopter in the sky and one of my friends said, 'I think that's an air ambulance'. "So as we made our way back into Liverpool, back up to where we where, we started to see and we started to hear different things, it was starting to come through." Mr Phillips said it was "like the wind was taken out of everybody's sails". "Back in the pubs and bars and restaurants that I was in, people were gathering around the TV, we were watching the breaking news, the yellow breaking news line saying there's been a major incident in Liverpool. "It took time for all of us to come to terms with it."

