  On Monday evening, BBC News NI spoke to some fans who had travelled to Liverpool, after their flight landed in Belfast. John Baxter attended the parade but did not see what had happened. "Going with Liverpool fans to a thing like this you're always expecting something good but unfortunately it's went the other way."

  John and Daniel Baxter travelled to Liverpool for the celebrations

  Daniel Baxter said the mood was "a bit of a let down". "Before the incident, everything was fine, everyone was happy, partying, celebrating and then I think once the news started to come out about what had happened, everyone was sort of panicking to know what happened, get to the bottom of it," he said.

  Stephen Boyd travelled to Liverpool on Saturday and returned on Monday night

  Stephen Boyd described the incident as "scary". "Up until that incident, I would say, there was at least a million on the streets and I thought it was very well behaved and very well attended by all fans, it's just shocking."
