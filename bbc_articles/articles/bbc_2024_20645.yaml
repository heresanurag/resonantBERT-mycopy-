  In Rotherham, six arrests have been made and one person has been charged following Sunday's rioting, South Yorkshire police said. The force also said at least 12 police officers were injured, with one left unconscious, after anti-immigration demonstrators threw planks of wood at officers and sprayed them with fire extinguishers. Assistant Chief Constable Lindsey Butterfield added: "Our police dogs suffered minor injuries after missiles were launched at them and horses had bricks, eggs, bottles and beer cans thrown at their heads. "They were spat at and threats made to cut the saddles in an attempt to injure the riders." Some members of the 700-large group smashed windows to gain access to a Holiday Inn Express and a large bin was set alight. The officer knocked unconscious suffered a head injury, the force said, adding that at least two others had suspected broken bones. Hotel employees and residents, some of whom are asylum seekers, were "terrified", but no injuries were reported, police said. The Mayor of South Yorkshire Oliver Coppard said there were "240 people" in the hotel when it was attacked. "[The asylum seekers] have faced violence and persecution in their home countries and have come here as a result and yet they have now faced that violence here - I can't imagine how terrified they must have been," he told Today. The asylum seekers were all evacuated to safety, Mr Coppard added. Ms Cooper called the scenes "utterly appalling" and said police have government backing to take "the strongest action". At a second hotel in Tamworth, Staffordshire, officers said they had to deal with "violent acts of thuggery" on Sunday evening. One officer was injured at the site as people threw missiles, smashed windows, and started fires, Staffordshire Police said. Meanwhile, a group of rioters in Middlesbrough smashed the windows of houses and cars and hurled objects at officers. Forty-three people have been arrested following the "staggering" violence witnessed there, David Felton, the assistant Chief Constable of Cleveland Police, said. He added that police officers will remain in the area throughout the day.

  Merseyside Police have said five more people have been charged in connection to the disorder witnessed in Liverpool, including a 14-year-old boy. In Dorset, 600 people from opposing sides gathered on the seafront in Weymouth. Officers said there had been a "small number of low-level incidents", with one man arrested for a public order offence. And in Bolton, anti-immigration protestors were confronted by a group of up to 300 people shouting "Allahu Akbar" - or "God is greatest". Greater Manchester Police issued a Section 60AA order in the town which requires people to "remove face coverings used to disguise or conceal their appearance". The violence followed similar scenes of unrest in Southport, Belfast, Hartlepool, Hull, Liverpool, Stoke-on-Trent, Nottingham, Sunderland and elsewhere earlier in the week. Sir Keir indicated the response to the violence could mirror elements of the handling of the riots in 2011, when he was director of public prosecutions. "We do have standing arrangements for law enforcement, which means that we can get arrests... and convictions done very quickly," the PM said. "I myself was part of that in 2011 when I was director of public prosecutions, and I'm determined we will do whatever it takes to bring these thugs to justice as quickly as possible." Ministers have suggested that courts could sit 24 hours to fast-track prosecutions - as they did in 2011 - while police forces have measures in place to draft in extra officers to tackle potential unrest. Shadow Home Secretary James Cleverly said his party would support the government in bringing the perpetrators to justice, but that "key decisions could and should have been made earlier. "The fact that most of yesterday we were still not sure whether the prime minister would or would not be going on holiday, I don’t think sends a good signal", he told Today. "I think the Cobra [meeting] should have been convened much earlier," Mr Cleverly added, suggesting there would be "important operational decisions" to be made on things such as funding, aid and the use of powers.
