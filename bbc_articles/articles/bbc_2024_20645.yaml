content: |-
  No 10 to hold emergency Cobra meeting after weekend of violence

  This video can not be played To play this video you need to enable JavaScript in your browser. Hotel attacked and police injured in more clashes

  Downing Street has confirmed there will be an emergency response meeting on Monday after more than 150 people were arrested following violent disorder in UK towns and cities over the weekend. It comes after Sir Keir Starmer condemned an attack on a hotel housing asylum seekers in Rotherham and promised those involved in unrest would face "the full force of the law". Police responded to violent scenes in Rotherham, Middlesbrough, Bolton and other parts of the UK on Sunday. The Cobra meeting follows some of the worst rioting the UK has seen in recent years, in the wake of the fatal stabbing of three young girls in Southport last week.

  Rioters toss a trash bin during an anti-immigration protest in Rotherham

  Various parts of England and Northern Ireland have seen violence break out in the days since, which politicians say has been fuelled by misinformation on social media and far-right groups inflaming tensions. Cobra - or COBR - meetings are named after Cabinet Office Briefing Room A on Whitehall. It is an emergency response committee - a get together of ministers, civil servants, the police, intelligence officers and other officials appropriate to the situation they are looking into. Monday's meeting will be intended to provide the government with an update on the violence over the weekend and the response in the coming days. It will involve relevant ministers and police representatives. Sources have suggested this should be seen in the context of meetings that have already taken place, such as one between the prime minister and police chiefs last Thursday, and a meeting of senior ministers on Saturday. Home Secretary Yvette Cooper said there are "obviously" issues around social media, which acts as a "rocket booster behind both the spread of misinformation and also the organisation of this violence." "Social media companies need to take some responsibility; we also need to make sure that criminal activity online is being pursued", she told BBC Breakfast.

  When asked about the founder of the far-right English Defence League, Tommy Robinson - whose real name is Stephen Yaxley-Lennon - spreading misinformation online, Ms Cooper said while she can not comment on specific people, "if it's a crime offline, it's a crime online." "You can't just have the the armchair thuggery or the people being able to incite and organise violence and also not face consequences for this," she told BBC Radio 4's Today Programme. During the prime minister's televised address on Sunday, he warned those involved that they will "regret" taking part. Sir Keir said: "People in this country have a right to be safe, and yet we've seen Muslim communities targeted, attacks on mosques... Other minority communities singled out, Nazi salutes in the street, attacks on the police, wanton violence alongside racist rhetoric, so no, I won't shy away from calling it what it is: far-right thuggery."
  • None Police officer injured after second hotel targeted in Tamworth
  • None Faith leaders urge communities to 'remember what unites us In a statement, the Home Office offered mosques greater protections as part of a new process, under which it said "rapid security" deployment can be requested in order to allow a return to worship as fast as possible.

