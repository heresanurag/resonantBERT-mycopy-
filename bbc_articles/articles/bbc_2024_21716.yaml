  She added that the fact some had been in children's sizes showed "the callous nature of those involved" in migrant smuggling. "Tragically, we have seen only recently how they don't care about risking the lives of those they transport." The seizure comes a week after six children and a pregnant woman were among 12 people who died after a boat carrying dozens of migrants sank off the French coast, in the English Channel. It was the deadliest loss of life in the Channel this year. Prior to the incident, 30 people had already died crossing the body of water in 2024 - the highest figure for any year since 2021, when 45 deaths were recorded, according to the UN's International Organisation for Migration.
