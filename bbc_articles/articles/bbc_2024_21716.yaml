title: Dangerous life jackets set for small boat crossings seized - BBC News
date: '2024-09-12'
section: UK
url: http://www.bbc.co.uk/news/articles/cgkykdr2n77o
content: |-
  The National Crime Agency says some of the 600 jackets were found to be in children's sizes.

  Some of the life jackets were found to be in children's sizes

  Hundreds of dangerous life jackets destined to be worn by migrants crossing the English Channel in small boats have been seized, according to the National Crime Agency (NCA). Criminal gangs had planned to use the 600 jackets while smuggling people into the UK. The NCA said they did not meet UK or EU safety standards and would not have served as adequate flotation aids in deep water. Jacque Beer, an NCA investigations lead, added that the life jackets "would not have provided protection in the sea, and they would only have been used to dupe those paying for crossings into thinking they were safe when they were not".

  The shipment was discovered on a lorry in Zwolle, in the Netherlands, after Dutch border officers intercepted it on Monday. Some of the seized life jackets were found to be in children's sizes. Local authorities are now investigating the lorry's 23-year-old driver, who was arrested on suspicion of offences related to people smuggling, the NCA said. It added that the shipment had been initially sent to Italy after it was purchased, before being transported to the Netherlands. The NCA said the seizure came as the result of a joint operation with Dutch and Italian authorities, as well as the UK Border Force. "There is no doubt that this unsuitable equipment had been acquired by criminal networks who intended to use it for small boat crossings," Ms Beer, the agency's regional head of investigations, said.

