content: |-
  The BBC's Nada Tawfik runs through documents shown as evidence in court as Trump's criminal trial continues.

  Donald Trump's hush-money trial continued in New York with the third week of witness testimony.

  Prosecutors introduced crucial evidence by questioning Trump Organization ex-controller Jeffrey McConney, and an accounting employee named Deborah Tarasoff.

  Each of the 34 felony charges against Mr Trump corresponds to an invoice, ledger entry, or cheque tied to reimbursing Michael Cohen for the hush money payment to Stormy Daniels. Today, we saw all those documents.

  The BBC's Nada Tawfik runs through documents shown in court and what it means for Mr Trump.
