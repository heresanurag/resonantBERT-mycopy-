id: bbc_2023_14848
title: Tata jobs fears remain despite funding for Port Talbot steelworks - BBC News
date: '2023-09-16'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-66830867
content: |-
  Residents and community leaders are worried about future steel jobs despite £1.2bn investment.

  Port Talbot's steelworkers site is the biggest in Britain

  Welsh ministers and Tata bosses are due to continue talks next week about the future of the Port Talbot site.

  The UK government and Tata has agreed a £1.2bn deal to secure its future and 5,000 out of 8,000 jobs in the UK, of which 4,000 are based at the plant.

  Tata Steel boss T.V. Narendran said its factory was losing up to £1.5m a day.

  Locals like Olivia Martin, whose father and partner work at Tata, told the BBC any job cuts could "have a massive impact" on people's lives.

  "It keeps a lot of roofs above people's heads," said Ms Martin from Cwmafan.

  The company's plans involve switching from using blast furnaces powered by fossil fuels to electric arc furnaces which can be powered by using renewable energy.

  And instead of producing virgin steel, the plant would produce recycled steel.

  The UK government has said the deal "has the potential to safeguard over 5,000 jobs across the UK".

  Community union official Barbara Evans said local businesses were reliant on the Tata site and would be concerned about their future as well as Tata employees.

  "What we would really like is a clear decision on what the investment is going to include for us," she said.

  "The steel industry is a one-in-four employer, meaning for every job in the steel industry you are looking at four jobs associated with it in the local community.

  "It is not just Port Talbot but the wider south Wales area. I don't live locally but I have worked here for nearly 30 years."

