title: 'Keaton Slater: Man arrested over fatal hit-and- run - BBC News'
date: '2024-06-18'
section: Coventry & Warwickshire
url: http://www.bbc.co.uk/news/articles/c722yv4867yo
content: |-
  Keaton Slater died on Friday when he was struck by a car in Radford Road, Coventry.

  New pictures of Keaton have been released as police urge anyone with information about the crash to come forward

  A man has been arrested over a hit-and-run crash which killed a 12-year-old boy in Coventry. The 21-year-old suspect was detained by police at an address in the city just before 04:00 BST on suspicion of causing death by dangerous driving. Keaton Slater died when he was struck by a black BMW at 16:30 on 14 June in Radford Road. West Midlands Police continues to appeal for help in finding Dolars Aleksanders, 21, who is also wanted on suspicion of causing death by dangerous driving.

  Police believe there were four people in the car at the time of the crash but Det Insp Sam Lewis, from the West Midlands force, said the main suspect remains at large. "Our efforts remain focused on finding and arresting Dolars Alexsanders," he said.

  Dolars Alexsanders is wanted on suspicion of causing death by dangerous driving

  Detectives have seized a black BMW that was found abandoned on Friday evening in New Arley and said the vehicle is currently being forensically examined. Police said one of the BMW’s occupants was being treated as a witness while another had been voluntarily interviewed and released under investigation. “We continue to support Keaton’s family at this time and they and the officers have been touched by the huge outpouring of support there has been since Friday,” Det Insp Lewis said. Anyone with information about Mr Alexsanders’ whereabouts has been asked to urgently call 999.

  Keaton was a Coventry City fan and the club said it was "deeply saddened" by his death

  Following Keaton's death tributes have poured in for the avid Coventry City fan, with dozens of flowers being left at the scene of the crash. One resident told the BBC it was "gutting" for the family and the community. England midfielder James Maddison, who has promoted a fundraising page for Keaton's family, said: "As a father I can’t even begin to imagine what they are going through." The webpage set up to help Keaton's family has already raised nearly £44,000.

  People have left dozens of tributes to Keaton, who was a fan of Coventry City FC

  Coventry City Football Club said it was "deeply saddened" by Keaton's death. In a statement, the club said: "Keaton was a huge Coventry City supporter and the thoughts and condolences of everyone at [the club] and the entire Sky Blue community are with Keaton’s family and friends at this awful time for them." The Cardinal Newman Catholic School pupil has been remembered by his head teacher, Emma O'Connor, as "beautiful" and "fun loving" with a "wonderful sense of humour".
