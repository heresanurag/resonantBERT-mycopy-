title: Met Police officers rescue people and fight blaze at hostel - BBC News
date: '2025-02-10'
section: General
url: http://www.bbc.co.uk/news/videos/c1lv19jvqldo
content: |-
  Bodycam footage shows officers evacuating the building and tackling the fire with extinguishers in Euston, London.

  Nine Metropolitan Police officers have been commended for bravery after rescuing 20 people from a fire at a hostel in Euston, London.

  The officers were the first emergency responders on the scene when the fire started in the early hours of 8 February and searched the smoked-filled five-storey building, leading trapped and disorientated people to safety.

  The nine officers and three members of the public were taken to hospital for minor injuries caused by smoke inhalation, and have since been discharged.

  You can watch bodycam footage from the incident above.
