  Ch Insp Stewart Mackie said the scene was "chaotic" when emergency services arrived

  Ch Insp Stewart Mackie added: "The road is anticipated to remain closed for some time to allow collision investigation to take place," he added.

  "This is likely to be a complex inquiry that will take some time and I am grateful to the public for their patience while this is carried out. Further details will follow once they are available."

  The Scottish Ambulance Service said teams were sent to the scene of the accident at 16:33.

  A spokesman said: "We dispatched five ambulances, our special operations team, a helimed resource, our trauma team, a 3RU unit, two managers and a patient transport resource to the scene.

  "We transported four patients to Aberdeen Royal Infirmary."

  One person was airlifted to the hospital and three were taken there by road ambulance.

  The A90 has been closed in both directions at Drumlithie

  Scottish Citylink confirmed that one of their Citylink Gold coaches was also involved.

  A spokesman said: "One of our coaches travelling from Glasgow to Aberdeen was involved in a serious multi-vehicle accident this afternoon on the A90 near Glenbervie Junction. Our immediate thoughts are for those involved in the incident.

  "Safety is our absolute priority and we will assist police with their inquiries into the circumstances. There were no reported injuries to passengers travelling on the coach and they were provided with alternative transport to take them to Aberdeen bus station."
