content: |-
  France scrum-half Nolann le Garrec says his reaction to a slight head contact in Racing 92's defeat by Perpignan was "inadequate".

  'An inadequate reaction' - Le Garrec sorry for 'dive'

  Nolann le Garrec has regularly taken on kicking duties ahead of former England fly-half Owen Farrell this season, including against Perpignan last weekend

  France scrum-half Nolann le Garrec has apologised after appearing to dive in a Top 14 match. Racing 92's Le Garrec, who has won 10 caps for his country, dropped to the turf clutching his face after a slight and accidental collision with Perpignan prop Bruce Devaux on Saturday. The incident sparked jeers from the Perpignan fans when replayed on their stadium's big screen and referee Kevin Bralley instructed Le Garrec to play on once he was back on his feet. Former referee Nigel Owens, commenting on social media,, external said he would have given Le Garrec a straight red card, while other critics said the 22-year-old's exaggeration endangered players who have suffered serious head injuries.

  "I wanted to come back to the situation of my contact to the head and my inadequate reaction," Le Garrec said in a statement to Midi Olympique on Tuesday., external "At the time, I received a shoulder to the face from the Perpignan prop and I did not know at all if it was intentional or not. "I did not know how to react. After reviewing the images, I see that this gesture was completely involuntary on the part of the prop. I apologise to the match referees! I did not want to disrespect anyone. It is not how I behave."

  Le Garrec has competed with Maxime Lucu to be understudy to France captain and scrum-half Antoine Dupont

  Le Garrec also suggested that the situation in the match contributed to his reaction. Racing had just had Fijian wing Vinaya Habosi sent off for making contact with the head of a Perpignan player, and trailed by 11 points with 10 minutes remaining. Racing ultimately lost 28-24. The big-spending Parisian side, who sacked former England coach Stuart Lancaster in February, lie only four points above the relegation play-off spot with five rounds remaining of the regular season. Le Garrec is not the first player to be accused of play-acting this season. In March, La Rochelle coach Ronan O'Gara compared Stade Francais flanker Romain Briatte to Brazilian footballer Neymar, after Australian second row Will Skelton was sent off after clearing out a ruck. While Bath centre Ollie Lawrence admitted that he "probably could have carried on" when he hit the turf following a head clash with Northampton's Alex Mitchell in January - however he denied cheating, saying he was entitled to go to ground. Rugby's laws, external expressly forbid players to "do anything that may lead the match officials to consider that an opponent has committed an infringement" or, more generally, to act contrary to "the spirit of good sportsmanship".
