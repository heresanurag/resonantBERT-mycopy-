title: Arrests over paint thrown on Tower Bridge during London Marathon - BBC News
date: '2025-04-27'
section: London
url: http://www.bbc.co.uk/news/articles/cly5prqxz9wo
content: |-
  The protesters were arrested and the London Marathon continued uninterrupted across Tower Bridge.

  The protesters were arrested after throwing paint on Tower Bridge

  Two people have been arrested for throwing powder paint on Tower Bridge as the men's elite runners were passing during the 45th edition of the London Marathon. A group called Youth Demand said two of its supporters jumped over the barriers and threw the substance on the bridge at about 10:35 BST. They were wearing T-shirts that said "Youth Demand: Stop Arming Israel". The Metropolitan Police said a member of the London Marathon event staff intervened to remove the protesters from the path of the men's elite race, which was able to pass unobstructed moments later. Police said the paint appeared to be "chalk-based" and was not expected to present a hazard to runners.

  The protesters were arrested on suspicion of causing a public nuisance and they remain in custody. Hugh Brasher, chief executive of London Marathon Events, said: "It's very disappointing that two people attempted to disrupt the London Marathon which does so much good, raises so many millions for charity, brings so much joy and brings communities together. "Our staff and the police intervened immediately and the event was not impacted in any way."
