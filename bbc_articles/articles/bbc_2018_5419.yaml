  The other victims range in age from 23 to 69 years of age.

  All the victims have since been treated and released from hospital, according to police.

  In a short statement on Facebook, Bombay Bhel Restaurant called the incident "extremely horrific and sad".

  "We want to thank you for all of your support and well wishes, especially to the families that were affected."

  A police officer walks in front of shattered glass at Bombay Bhel restaurant

  Chief Evans said her police force is working with others in the region as well as provincial and federal law enforcement in the investigation.

  Mississauga Mayor Bonnie Crombie called the incident a "heinous crime" and said those involved need to be brought to justice.

  "This is not the Mississauga I know," she told journalists on Friday morning.
