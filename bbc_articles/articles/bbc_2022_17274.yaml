id: bbc_2022_17274
title: Suspected crush outside Asake gig at Brixton O2 Academy - BBC News
date: '2022-12-16'
section: General
url: http://www.bbc.co.uk/news/uk-64000314
content: |-
  Four people are in a critical condition after a suspected crush outside a concert at the Brixton O2 Academy.

  Police were called there at 21:35 GMT on Thursday, during the gig by afro-pop singer Asake.

  Video from social media appears to show people trying to get past security at the venue's front door.
