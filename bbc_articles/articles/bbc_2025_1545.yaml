content: |-
  England don't have the replacements to sustain their high-tempo gameplan, leaving them vulnerable to late surrenders says World Cup winner Matt Dawson.

  England Rugby World Cup winner Matt Dawson has his say on the team's defeat in their Six Nations opener against Ireland

  There was a moment in Ireland's win over England that can't be overlooked. Midway through the first half, with England seven points up but stretched, Marcus Smith killed the ball illegally. Referee Ben O'Keefe showed him yellow, leaving England facing 10 minutes with only 14 men and no fly-half away to the Six Nations champions. England defended superbly, however. They kept Ireland at bay for nine minutes and 30 seconds. Smith was poised on the sidelines, ready to come back on. And then, as the fatigue built up by that rearguard effort told, England faltered. England scrum-half Alex Mitchell squared up against James Lowe out wide. He did the right thing, using the touchline and not over-committing, which would allow Lowe to step him. Mitchell got his hands on Lowe, but was so drained by the defensive effort that he couldn't chase up his legs to reel in the Ireland wing and bring him down. Instead, Lowe broke free, fed Jamison Gibson-Park and Ireland were back within two points. Had Smith got back on and brought England up to their full complement with their seven-point lead still intact, it might well have been a different game. A bigger half-time lead would have boosted England's confidence. Ireland might have got tighter. In the end, the game took a very different path.

