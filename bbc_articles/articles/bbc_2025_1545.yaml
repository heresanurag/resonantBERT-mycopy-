  Otherwise, England's replacements didn't do enough to alter the flow of the game. They came on and played as a series of cameos, rather than a concerted force to change tactics that had run their course. Ireland's replacements were different. Dan Sheehan, Cian Healy, Iain Henderson, Jack Conan, Jack Crowley, Robbie Henshaw - these are all high-level, experienced operators. By the time they arrived on the pitch, Ireland had shown their adaptability and nous. England's back row of Ben Earl, Tom Curry and Ben Curry posed a significant jackal threat, spreading across the width of the pitch, meaning one was always on hand to disrupt the breakdown. But Ireland solved the puzzle, narrowing their attack to the same point over multiple phases, ensuring quicker recycling and sucking in England to open gaps out wide.

  Ben Curry was replaced after an hour, but led England's defensive stats, making 21 tackles without missing one

  Chandler Cunningham-South came off the bench and, while he is a powerful athlete, he couldn't get into the match. He gave away a penalty for tackling an airborne Hugo Keenan before a bad defensive read opened the way for Lowe to canter through and set up Ireland's third try. I have liked what I have seen of Ted Hill this season playing for Bath - he might be the beneficiary if Borthwick opts against Cunningham-South in the matchday squad to face France. What England need most though is a quality that doesn't show up in many stats that modern coaches consider - the ability to step up and seize a moment when the stage is the biggest. Dan Luger was an example from back in the day. He was a good winger for Harlequins and Saracens, but in an England shirt he found another level to go to. Ollie Chessum, whose season has been disrupted by a knee injury, is one of the current players who seems to have that ability, but many of England's squad are struggling to lift themselves beyond their club form while playing for their country. France coming to Twickenham next is another huge test for England. I would keep the starting XV from this defeat - the spirit and energy in the first half was something to cling on to. Switching Marcus Smith to full-back would put England's most reliable game-breaker too far from the action. Ireland also had some success peppering him with high balls in the backfield. France would surely follow suit. England have to reflect on the first half, because there was enough in that 40 minutes to maintain positivity. And if they can do that they can perhaps get on the right side of both those sliding-doors moments and the scoreline.

