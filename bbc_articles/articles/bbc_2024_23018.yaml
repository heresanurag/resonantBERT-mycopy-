  Joe El-Abd closes in on an agreement to replace Felix Jones as England defence coach.

  El-Abd close to deal to become England defence coach

  Joe El-Abd's playing career took in clubs in England, Wales and France before he moved into coaching

  Joe El-Abd is close to finalising a deal to become the new England defence coach. The former flanker, currently head coach of French side Oyonnax, is expected to be in place for the upcoming November internationals. El-Abd, 44, has been the favourite for the role following the shock resignation of Felix Jones last month. England's next Test is against New Zealand at Twickenham's Allianz Stadium on 2 November. El-Abd played over 100 times for Bristol in the 2000s, along with stints with Caerphilly in the Welsh top flight and in France with Toulon and Oyonnax.

  El-Abd played more than 100 times for Bristol

  He has since forged an impressive coaching career across the Channel, first with Oyonnax, then with Castres, before returning to Oyonnax as head coach. El-Abd is a close confidante of the England boss Steve Borthwick, with the pair being former flat-mates at Bath University. Ex-England assistant coach Paul Gustard and Stormers coach Norman Laker were also known to be in contention for the role. While El-Abd is expected to be in place for England's training camp at the end of October, as it stands Jones will also remain part of the coaching team, for the short term at least. Jones is currently serving his 12-month notice period following his resignation and while he is likely to be in high demand after winning back-to-back World Cups with South Africa, he has yet to be bought out of his contract by a future employer. Meanwhile Kevin Sinfield is on the verge of agreeing a new contract with the Rugby Football Union, which would see him remain on the coaching staff on a reduced-hours basis.
