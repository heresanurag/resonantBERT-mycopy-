id: bbc_2018_5490
title: Dementia-friendly lunches served at Norwich restaurant - BBC News
date: '2018-05-22'
section: General
url: http://www.bbc.co.uk/news/uk-england-norfolk-44209601
content: |-
  A restaurant aims to give diners with dementia and their carers the "best possible time".

  When Hannah Springham's mother got dementia, eating out became "quite a sad experience" as, at times, she no longer knew her daughter.

  Upon becoming a restaurateur in Norwich, Ms Springham was determined her diners would still have the "best possible time", whether living with the condition or caring for those with it, and so introduced the dementia-friendly lunch service.
