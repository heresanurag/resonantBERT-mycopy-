content: |-
  Laura Muir sets a new British women's 1500m record as Faith Kipyegon and Yaroslava Mahuchikh both break world records at the Paris Diamond League.

  Laura Muir's previous 1500m best was the 3:54.50 she ran to win Olympic silver in 2021

  Laura Muir set a new British 1500m mark as rival Faith Kipyegon smashed the world record at the Paris Diamond League, while Yaroslava Mahuchikh broke a 37-year mark in the women's high jump. Muir, 31, ran three minutes 53.79 seconds for third place to improve the national record she set in winning Olympic silver in Tokyo three years ago. Kenyan Kipyegon clocked a sensational 3:49.04 to claim victory ahead of Australian Jessica Hull as the 30-year-old now eyes a third successive Olympic title in the French capital next month. British champion Georgia Bell clocked a huge personal best of 3:56.54 for fifth as she builds towards her Games debut, while Katie Snowden was ninth in 3:58.13.

