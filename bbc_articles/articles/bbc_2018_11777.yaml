  The Duke and Duchess of Sussex visited the county together for the first time.

  Thanks for joining us for our live coverage of the Duke and Duchess of Sussex's first official visit to Sussex. The couple, who married in May 2018, drew large crowds in Chichester, Bognor Regis, Brighton and Peacehaven. You can read about the full visit here.
