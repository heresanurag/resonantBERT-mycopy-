title: Woman in court over Madeleine McCann family stalking charges - BBC News
date: '2025-02-22'
section: England
url: http://www.bbc.co.uk/news/articles/cx29k37lyp9o
content: |-
  Julia Wandel, 23, had claimed she was the missing child prior to her arrest at Bristol Airport.

  Julia Wandel was interviewed by the BBC in January 2024

  A woman who claimed to be Madeleine McCann has appeared in court charged with four counts of stalking the missing girl's family. Julia Wandel, also known as Julia Wandelt, was arrested at Bristol Airport on Wednesday on suspicion of stalking involving serious alarm and distress. Ms Wandel, originally from Poland, was remanded into custody after appearing at Leicester Magistrates' Court on Friday and is due to enter a plea at the city's crown court on 7 April. Court documents state the 23-year-old is alleged to have sent messages, left voicemails and turned up at the family home between 3 January 2024 and 15 February 2025.

  The documents say Ms Wandel is alleged to have gone to the McCanns' home in Leicestershire twice - on 2 May and 7 December - as well as sending WhatsApp messages to Kate and Gerry McCann, and Instagram messages to Madeleine's siblings. They add the conduct "had a substantial adverse effect" on the family's day-to-day activities "when you knew or ought to have known that your course of conduct would cause alarm or distress".

  Madeleine McCann's disappearance at the age of three in Portugal in 2007 is one of the most widely reported missing child cases in history and remains unsolved. A 60-year-old woman from Wales, who was also arrested alongside Ms Wandel on suspicion of stalking, has been released on bail, Leicestershire Police said.

