title: Blake Lively and Taylor Swift messages can be included in Justin Baldoni legal
  case, judge rules - BBC News
date: '2025-06-20'
section: Culture
url: http://www.bbc.co.uk/news/articles/c20n6jl83v8o
content: |-
  Lively's team had claimed they were irrelevant to the ongoing legal case but the judge disagreed.

  Blake Lively and Taylor Swift messages can be included in legal case

  Taylor Swift has been described in legal documents as one of Blake Lively's "dragons"

  Messages between Blake Lively and Taylor Swift can be handed over to Justin Baldoni as part of his ongoing high-profile legal battle with the actress, a judge has decided. Communications between Lively and her friend Swift about the environment on the It Ends With Us film set are relevant to the case, US District Judge Lewis Liman ruled on Wednesday, according to Variety, external. Lively's team had applied to prevent Baldoni obtaining the messages, arguing they were irrelevant. She sued Baldoni and his studio in December, alleging she was sexually harassed on set and that he led a campaign to "destroy" her reputation. He counter-sued, but his defamation lawsuit was dismissed by a judge last week.

  In May, Baldoni's lawyers tried to get hold of the the messages directly from Swift herself by sending subpoenas to the pop star and her legal team. But the subpoenas were dropped after Swift's legal team objected that they amounted to an "unwarranted fishing expedition". Lively then attempted to prevent Baldoni gaining access to the messages via the usual discovery process. But the judge wrote on Wednesday: "Given that Lively has represented that Swift had knowledge of complaints or discussions about the working environment on the film, among other issues, the requests for messages with Swift regarding the film and this action are reasonably tailored to discover information that would prove or disprove Lively's harassment and retaliation claims."

  In response to the judge's decision, a spokesperson for Lively told Billboard, external the actress had "produced far more documents in this case" than Baldoni. They added that Baldoni and his publicity team had been trying to "drag Taylor Swift" into the saga since last summer. "We will continue to call out Baldoni's relentless efforts to exploit Ms Swift's popularity, which from day one has been nothing more than a distraction from the serious sexual harassment and retaliation accusations he and the Wayfarer [Studios] parties are facing," the spokesperson said. But Judge Liman said Lively's claim that Baldoni was only involving Swift in the case for PR purposes "does not justify denying the Wayfarer parties relevant discovery". A representative for Baldoni declined to comment on the decision. Swift's representatives did not immediately respond to a request for comment.

  At the time the subpoena was withdrawn, Lively's spokesperson said they were "pleased" and would "continue to stand up for any third party who is unjustly harassed or threatened in the process". Prior to that, Swift's representatives told the BBC she was being brought into a legal row to create "tabloid clickbait". It was originally reported that Swift had been subpoenaed to give information after it was alleged she tried to pressure Baldoni to accept script rewrites by Lively for the film. Baldoni had said he was invited to Lively's New York home in 2023 to discuss script changes, where Lively's husband, Ryan Reynolds, and Swift were there to serve as her "dragons". In response, Swift's representatives said "she was not involved in any casting or creative decision" and "never saw an edit or made any notes on the film". Variety also previously reported that Baldoni's lawyers were using the subpoena to try to get messages relating to an allegation that Lively's representatives had threatened to release old text messages if Swift didn't issue a statement supporting her. Lively's lawyers denied those allegations as "unequivocally and demonstrably false". The case is scheduled to go to trial in March 2026.
