content: |-
  Emily Damari, 28, lost two fingers while being taken captive during the 7 October 2023 attacks.

  Emily Damari lost two fingers after being shot during the 7 October 2023 attacks

  A British-Israeli hostage released by Hamas after 15 months in captivity has said her scars represented "freedom, hope and strength" as she underwent a series of surgeries for her injuries. Emily Damari, 28, was shot in the hand as she was dragged from her home in southern Israel during Hamas's 7 October 2023 attack, causing her to lose two fingers. She said an operation in Gaza had left her in "intense pain" for a year and a half, and that a scar from an "open, festering wound" did not heal for months due to the conditions in which she was held. Ahead of her treatment, Ms Damari said she had "fully embraced" the pain and injuries because of what they symbolise to her.

  Ms Damari was held by Hamas in Gaza for 471 days prior to her release. She was one of the first hostages to be freed as part of a ceasefire deal struck between the Palestinian armed group and Israel after 15 months of fighting. She was taken from her home in Kibbutz Kfar Aza, near the Gaza border, on the morning of Hamas's unprecedented attack. Ms Damari was also shot in the leg, and previously said she had only received an out-of-date bottle of iodine to treat her wounds while in captivity. The 28-year-old said the complex operations on her hand and leg in Israel's Sheba Medical Center had gone "much better than expected". She said the scar on her hand was "looking better" and that the pain, caused by "the nerves being sewn together" in Gaza, had gone. Now, with the help of physiotherapy, she hoped to have improved use of her hand. But Ms Damari noted that her recovery would take time and her hand would "never fully recover". She said the conditions in which hostages were being held were "unimaginable". "It was shocking but not surprising to see how emaciated some of the other hostages were when they came out," she reflected. "Hamas has created hell on Earth," she said, adding that there were others whose mental and physical health was "in much worse shape" than hers. She called for the release of all remaining hostages without delay.

  Damari said the operations in Israel had gone "much better than expected"

  Ms Damari's mother, who grew up in Beckenham in south-east London, added that her daughter had been "sewn up like a pin-cushion" in Gaza. "It is nothing short of a miracle that she did not contract a life-threatening infection," said Mandy Damari. Ms Damari said she was "so excited" to visit the UK with her mother once she had healed and the remaining hostages are released. "I have so many people that I want to thank personally for helping me get my life back." The pair have been invited to Downing Street by UK Prime Minister Sir Keir Starmer, who previously spoke to Ms Damari over the phone. During that conversation, she said she had been held at United Nations facilities during her captivity. The UN's Gaza agency has called for an independent investigation into the allegation. In total, 251 hostages were taken by Hamas when it attacked Israel on 7 October 2023, and a further 1,200 people were killed. The attack triggered a war which has devastated Gaza. Israel's military offensive killed at least 48,365 people, according to the territory's Hamas-run health ministry. The first phase of a ceasefire came into force on 19 January, allowing the release of 33 Israeli and five Thai hostages in exchange for about 1,900 Palestinian prisoners.
