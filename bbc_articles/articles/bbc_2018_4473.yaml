title: 'Syria: Seven years of war explained - BBC News'
date: '2018-04-08'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-43337411
content: |-
  What started as protests against the government has morphed into a global conflict.

  The war in Syria has now lasted for seven years.

  Although its roots lie in peaceful protests against the government, it has become something much more complex.

  Joe Inwood explains who is fighting whom and why,
