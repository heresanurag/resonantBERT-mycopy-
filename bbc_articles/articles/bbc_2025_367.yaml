  American superstar Ilona Maher says rugby needs more people "connecting" with the sport after making her debut for Bristol Bears.

  'I love being a superstar, but we can't just have one' - Maher's mission

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Almost an hour and a half after the final whistle at Ashton Gate and Ilona Maher was still at pitchside, still posing for pictures and greeting the hordes of fans, one by one, who had waited in the cold January weather hoping to see her. The American might have only played for 20 minutes of Bristol Bears' eventual defeat to rivals Gloucester-Hartpury on her debut for the home club, but her influence was bouncing around the stadium. Before Maher had even stepped out on to the pitch, the impact of her arrival was being felt across women's domestic rugby union in the UK. News of the 28-year-old's signing for the West country club in December created such a buzz that the Bears moved this fixture from their usual ground of Shaftesbury Park to Ashton Gate. In the end, 9,240 fans came out, smashing the Bears' previous record attendance of 4,101 against Harlequins in May 2022 and setting a new Premiership Women's Rugby record for a standalone game. "I saw the line of people out there [after full-time] and was like, 'I'm going to take as many photos as I can'," Maher said. "They bought a seat and that seat is going to lead to hopefully some more seats, and fans are the revenue we need to bring in to make this league bigger. "It's almost - I feel - my duty. They're doing so much, so I want to do more for them."

  Ilona Maher's debut saw a new attendance record set for a standalone PWR game

  Maher is the most followed rugby union player - male or female - on social media. Her profiles have amassed more than eight million followers across Instagram and TikTok. Having long been an advocate for body positivity and women's sports, since claiming bronze as part of the USA's rugby sevens side at the Paris Olympics last summer, Maher's profile has only continued to skyrocket. This autumn she was a runner-up on television show Dancing With The Stars and Maher has also been featured prominently by Forbes and Sports Illustrated. At Ashton Gate, a documentary crew from US production house Hello Sunshine - a company founded by Oscar winner Reese Witherspoon - was following Maher's every move for a future project. Maher might only be on a three-month deal with Bristol, as she switches back to XVs in the hope of selection for the USA at the Rugby World Cup this summer, but fans walked in wearing shirts emblazoned with her name across the back. One had travelled about 4,000 miles with his family from Louisville, Kentucky to see the game. Another came from Washington DC. Maher said she was "proud" of the impact she has made, but rugby still has work to do to showcase more athletes in the sport. "I've seen the power in it, I've seen the power of people connecting with the individual and then going to the sport," Maher said. "If we can have more people connect with Holly Aitchison, Jaz Joyce, Evie Gallagher, that brings them in. "That's my goal - I love being a superstar and people call me the superstar of rugby but that's not enough for the sport, we can't just have one superstar. "We need to have more, we need to have people connecting with so many different players and that is what will grow our game."

  Ilona Maher is looking to make a big impact in her three months at Bristol

  Maher admitted to feeling nerves while sitting on the bench before being called to play. The utility back, capped twice by her country in XVs, had last played 15-a-side in 2021 and she spent the week with her new team "soaking up" information. The Bears travel to Exeter next weekend and have five weeks of games to round out the regular season, with Maher's influence on and off the field surely set to continue to be felt. "Once I did get on the field I felt like 'this is rugby', something I've been doing for the past 10 years now, something that is in my blood I think, so I felt really confident once I got there," Maher said. "Each game I'm going to learn more and more. You do learn more by losing, but it puts a fire in you for the next game."
