content: |-
  England power to a series win over New Zealand with an emphatic 323-run victory inside three days of the second Test in Wellington.

  England power to series win in New Zealand

  Chris Woakes' 2-20 represents his best return in the fourth-innings of an overseas Test

  Second Test, Wellington (day three of five)

  England powered to a series win over New Zealand with an emphatic 323-run victory inside three days of the second Test in Wellington. After setting the home side a mammoth 583, England battled high winds, the threat of showers and Tom Blundell's swashbuckling 115. Chris Woakes and Brydon Carse reduced New Zealand to 59-4 before Blundell lit up a grey day with his assault on off-spinner Shoaib Bashir. The wicketkeeper hit Bashir for four sixes until his attempted sweep at the same bowler was brilliantly caught by the quick-thinking Ben Duckett running around from slip. Ben Stokes ran through the tail for 3-5, his best Test figures in more than two years, to leave New Zealand 259 all out. The margin of victory is England's biggest in terms of runs against the Black Caps. It gives Stokes' side their first away series win in two years and first in New Zealand since 2008. England already had this match in their grasp on Sunday, when they resumed on 378-5 in their second innings and a lead of 533. Joe Root, 73 not out overnight, completed his 36th Test century with a trademark reverse-scoop off pace bowler Will O'Rourke. Root was out for 106 in the same over, prompting England to declare on 427-6. Stokes left himself unbeaten on 49. One minor concern for England is the fitness of Harry Brook, who did not field on Sunday as a precaution over a sore ankle. England will have the opportunity for a clean sweep in the third Test in Hamilton on Saturday (22:00 GMT Friday).

  New Zealand, on the back of an historic 3-0 series win in India, started this series as favourites only to be steamrollered in barely seven days of Test cricket. England enjoyed some fortune in their eight-wicket win in the first Test, benefiting from eight dropped catches in Christchurch. Bar being reduced to 43-4 on the first morning here, the tourists have dominated a one-sided affair, far removed from New Zealand's classic one-run win the previous time these two sides met on this ground. Brook made a scintillating century on the opening day and Gus Atkinson's hat-trick rammed home England's advantage. On the back of a big first-innings lead, Jacob Bethell's 96 continued the impressive start to his Test career and Root helped himself to his sixth ton of the year. England now head to Hamilton with the opportunity to become only the third visiting side to win a three-Test series 3-0 in this country.

  Stokes, 35 not out overnight, swung at everything, yet connected with virtually nothing. Root's progress to an inevitable century was serene. Stokes was celebrating Root's century from the moment he connected with the audacious reverse-scoop. Now only four players in history have more Test tons than Root. England could have batted on and on, but were instead bowling 45 minutes into the day. Their trio of seamers have been unerring in their execution of careful plans and the Kiwi top-order again succumbed. Woakes bowled Devon Conway from round the wicket and went wide of the crease to take the edge of Kane Williamson. Carse showed agility to hold Tom Latham one-handed in his follow-through, then suckered Rachin Ravindra into edging a wide one. Blundell had not passed 50 in his previous eight Test innings and was dropped on nought by diving third-slip Bethell off Carse. Reprieved, Blundell bludgeoned his way to a fifth Test hundred. Bashir was clobbered straight on to the grass bank. Nathan Smith joined in with two sixes of his own. Blundell under-edged the same bowler past wicketkeeper Ollie Pope to reached three figures from 96 balls. Stokes did not relent. Bashir was kept on for a 17-over spell. When Blundell attempted a paddle-sweep, Duckett anticipated superbly and held the catch at the second attempt. Stokes was effusive in his celebrations with his spinner. Only when Bashir had his man did Stokes himself come into the attack. Matt Henry hoicked the captain to deep square leg, Smith pulled to Pope to fall for 42 and O'Rourke was the final man to fall to Stokes' bouncers.

  Given their win in India is little more than a month ago, it is curious that New Zealand find themselves with so many issues two Tests into their home summer. Blundell's runs are welcome, yet Conway's form at the top of the order continues to deteriorate. The left-hander's average has fallen year-on-year since a prolific start to his Test career in 2021. He averages less than 22 in 2024 and could come under threat from Will Young, the player of the series in India. Tim Southee's four wickets in this series have cost 61.5 runs each and in other circumstances his place may come into question. The 35-year-old, New Zealand's second-highest wicket-taker, will end his Test career on his home ground in Hamilton.
