content: |-
  The doctor broke supervision restrictions seven times while working at a Fort William hospital.

  Doctor saw under-18s alone while facing child abuse image charges

  A doctor who was facing charges over child abuse images in England carried out unsupervised consultations with under-18s while working at a Scottish hospital, a tribunal has revealed. Dr Carey Girling was banned from treating child patients without a chaperone present while he was being investigated by police. He broke these restrictions on more than one occasion in March 2022 while working at Belford Hospital in Fort William. The following year, he was convicted of making indecent photographs of children. The Medical Practitioners Tribunal Service (MPTS) has now struck him off the medical register.

  Dr Girling qualified as a doctor in 2017 and in March 2022 was employed as a locum doctor in the emergency department at Belford Hospital - a general hospital within the NHS Highland catchment. The tribunal heard that Dr Girling was initially arrested in November 2020 accused of being in possession of child abuse images. He was allowed to return to work during the investigation but was required to be supervised while attending to patients under the age of 18. He was also required to keep an adequate log detailing his consultations and have the chaperone sign it. The tribunal found that Dr Girling broke this condition and carried out unsupervised consultations on child patients seven times between 20 and 27 March 2022. He was also found to have provided false information about chaperones being present during the consultations but the MPTS said it received no evidence to confirm this. The tribunal heard that an email from a senior charge nurse at the hospital to the General Medical Council (GMC) stated "no one in the emergency department was aware that he required a chaperone or required to have a log completed".

  The tribunal comes after Dr Girling was convicted of making indecent photographs of children in England in 2023. A police investigation found 28 Category A images on his laptop and one Category A image on an external hard drive belonging to him. He initially pled not guilty to the charges, before changing his plea at Cambridge Crown Court in June, 2023. He was ordered to carry out 200 hours of unpaid work, attend rehabilitation, and register with the police. He also has to comply with a sexual prevention order until 2028. The MPTS tribunal ruled on Friday that Dr Girling’s fitness to practise is impaired by reason of misconduct and conviction. A ruling published by the MPTS said they were "satisfied that the circumstances of Dr Girling’s case were so serious that his misconduct and conviction were fundamentally incompatible with continued registration". It added that his actions had "undermined and breached the trust and confidence of patients and the public in the medical profession" and that his "convictions inevitably brought the profession into disrepute". In a statement submitted to the tribunal, the doctor said he no longer worked in a clinical role and "had no intention of ever returning to one". He said he had always done his "best for patients" and wished to "move on in life and from medicine". Dr Girling has 28 days to appeal the decision. NHS Highland said Dr Girling had clear instruction from the General Medical Council (GMC) - which maintains the official register of medical practitioners - that he had to have chaperones for any patient under 18. A spokesperson added: "Immediate action was taken to suspend any further locum shifts and we communicated to the GMC that he was in breach of his conditions. "It is the action taken by NHS Highland that has resulted in this further tribunal being undertaken.”
