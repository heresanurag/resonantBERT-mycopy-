title: Labour donor Lord Waheed Alli had 'temporary' No 10 pass - BBC News
date: '2024-08-25'
section: Politics
url: http://www.bbc.co.uk/news/articles/c86l7xqzze8o
content: |-
  The Conservatives have accused the government of "cronyism" after it emerged the peer could access No 10.

  Labour donor was given 'temporary' No 10 pass

  Lord Alli was made a Labour peer by Sir Tony Blair and is a significant Labour fundraiser

  Major Labour donor Lord Waheed Alli did have a pass to Number 10 but it was "temporary" and "given back several weeks ago", Downing Street has confirmed to the BBC. The Conservatives have accused Labour of "cronyism" after the Sunday Times said, external the peer - who has donated hundreds of thousands of pounds to the party - was able to access Downing Street, despite not having an official government role. Earlier on Sunday, Cabinet Office minister Pat McFadden said it was not "unusual for people to have passes to attend political meetings". A No 10 source confirmed Lord Alli held a garden reception during the brief time he had a pass, but declined to say why he had one, or when or why he gave it up.

  The TV executive was appointed to the House of Lords by Tony Blair in 1998 and has recently led fundraising for the Labour Party, as well as donating to individuals including Prime Minister Sir Keir Starmer. Asked about the Sunday Times report during an appearance on Sky News on Sunday, Mr McFadden said: "I don't think he's got the pass now but he may have had one in the past." Tory shadow paymaster general John Glen MP said it was "disappointing" to see Labour "only attempting to act on their culture of cronyism after feeling the pressure in the media". It comes after Chancellor Rachel Reeves was challenged over Labour donor Ian Corfield's appointment to a civil service position in the Treasury. Mr Corfield - who has previously donated £20,000 to Labour MPs, including £5,000 to Ms Reeves last year - was given a temporary job focused on organising an international investment summit taking place in October. Labour had defended the appointment as "perfectly appropriate" but it is understood Mr Corfield has now moved to an unpaid advisory role. Shadow Treasury minister Laura Trott previously called the appointment a "clear conflict" and urged the prime minister's independent ethics adviser to investigate. Civil service sources told the BBC "hundreds" of officials are appointed through the post-election "exceptions" process - where time-limited jobs can be filled outside of usual recruitment processes. They also said Mr Corfield's appointment was signed off by the independent Civil Service Commission. BBC News has asked the government to comment on Mr Corfield's contract status.
