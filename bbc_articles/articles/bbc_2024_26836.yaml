title: Man arrested and released after woman attacked near golf club - BBC News
date: '2024-10-06'
section: Edinburgh, Fife & East
url: http://www.bbc.co.uk/news/articles/c39l4z111yvo
content: |-
  A 26-year-old woman remains in hospital after she was assaulted near a golf course in Dalkeith.

  The attack happened in a wooded area near Newbattle Golf Course

  A man has been arrested but released without charge after a woman was seriously assaulted near a golf club in Midlothian. The 26-year-old woman was walking in a wooded area near Newbattle Golf Course in Dalkeith on Friday evening when she was assaulted. Emergency services attended and she was taken to hospital with serious injuries, where she remains in a stable condition. A 32-year-old man was arrested in connection with the incident. He has been released pending further inquiries.

  Police Scotland said their investigation into the incident is ongoing and anyone with information should contact them, external. Ch Insp Ben Leathes, Local Area Commander, said: “I’d like to reassure the public, we have increased high visibility patrols in the area and these will continue as our enquiries progress. “Anyone with information or concerns can speak to these officers.”
