title: 'Grand National: Broadway Boy to return home after fall while leading race
  - BBC Sport'
date: '2025-04-06'
section: Horse Racing
url: http://www.bbc.co.uk/sport/horse-racing/articles/cwyqj1yx2pzo
content: |-
  Broadway Boy was leading the Grand National when he fell heavily on Saturday

  Broadway Boy is to return home after suffering a heavy fall in the Grand National. The horse, trained in Gloucestershire by Nigel Twiston-Davies, was leading the Aintree showpiece when he came down heavily at Valentine's Brook on the second circuit. "It sounds a lot more positive and he's coming home. There's going to be a couple of weeks of uncertainty for future racing," said Nigel's son and assistant trainer Willy Twiston-Davies. "But it looks a lot more positive than it did yesterday [Saturday] and the most important thing is our horse is coming home and should be OK. "His welfare for the next few weeks is the most important thing and the vets at Aintree did a tremendous job. "Laura Scrivener, who looked after him all night, was fantastic with him and our boy's coming home." Willy's jockey brother Sam said the horse was "stiff and sore". Following the race, Broadway Boy and Celebre D'Allen - who was pulled up - were walked on to horse ambulances after being assessed on course by vets and taken to the racecourse stables for further assessment.

  Celebre D'Allen is trained in Somerset by Philip Hobbs and Johnson White. "He's had his stay at Aintree and I've seen videos of him this morning looking much brighter in himself and he's been out for a pick of grass," said White. "The vets have seen him and he's probably going to travel to a livery yard close to Aintree later today. It's positive news and he's going the right way. "In the heat of the moment, I haven't really spoken to the vets about what it really is, but it was probably a combination of the heat and everything." Celebre D'Allen's rider Micheal Nolan was given a 10-day suspension after Aintree stewards ruled he had continued when his mount had no more to give and was losing ground. Meanwhile Nick Scholfield, who pulled up his National mount Monbeg Genius after the third-last fence, has announced his retirement. The 35-year-old was third in the big race on Teaforthree in 2013 and fourth with Santini in 2022. Scholfield, who plans to become a trainer, won the Grade One Tolworth Hurdle at Sandown in 2013 aboard Melodic Rendezvous, one of eight victories on the horse.
