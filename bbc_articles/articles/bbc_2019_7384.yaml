  • None Joined Arsenal in a deal worth about £17m in 2004.
  • None In May 2005, he became the second player to be sent off in an FA Cup final, as Arsenal beat Manchester United in a penalty shootout.
  • None Played in the 2006 Champions League final as the Gunners lost 2-1 to Barcelona.
  • None Made a total of 69 appearances for Arsenal, scoring 16 goals, and played 21 times for Spain, scoring four times.
  • None Joined Real Madrid on loan in 2006 and scored twice as a substitute in the final game of the season to earn Real the La Liga title.
  • None After permanently leaving the Gunners that summer, he moved to Atletico Madrid before returning to Sevilla.
  • None Is the most decorated player in Europa League history, winning the competition five times - twice with Atletico Madrid and three times at Sevilla.
  • None After spells at Espanyol, Cordoba and Chinese side Xinjiang Tianshan Leopard, he joined Spanish second division strugglers Extremadura
  • None Last year, it was reported that Reyes was set to return to Arsenal as a coach under Unai Emery, for whom he played at Sevilla.
