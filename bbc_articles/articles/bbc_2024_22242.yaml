  • None Sean 'Diddy' Combs: What we know about the accusations against him Tuesday's indictment against Mr Combs accuses him of similar violence. The indictment follows a string of sexual assault allegations against Mr Combs, one of the most successful music moguls in the history of rap. Four women, including Ms Ventura, have filed lawsuits accusing him of sexual and physical abuse. In a statement issued last December, Mr Combs defended himself against what he described as "sickening allegations" made by "individuals looking for a quick payday". In June, he returned a ceremonial "Key to the City of New York" following a request from Mayor Eric Adams, who had bestowed the honour on him just nine months earlier. Days later, Howard University announced it was revoking Mr Combs's 2014 honorary degree. The musician is credited with helping turn rappers and R&B singers such as Usher, Mary J Blige and The Notorious B.I.G. into stars in the 1990s and 2000s.
