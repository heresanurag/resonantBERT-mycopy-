  In court documents, federal prosecutors said that Mr Combs had "abused, threatened, and coerced women and others around him to fulfill his sexual desires, protect his reputation, and conceal his conduct". Prosecutors accuse Mr Combs of "creating a criminal enterprise" whose members - under his direction - engaged in sex trafficking, forced labour, kidnapping, arson and bribery. "On numerous occasions", the documents said, Mr Combs assaulted women by "striking, punching, dragging, throwing objects at, and kicking them". The indictment did not specify how many women were alleged victims. It also does not accuse Mr Combs himself of engaging directly in unwanted sexual acts with women. The Bad Boy records founder, who was also known during his career as P. Diddy and Puff Daddy, has faced many of the accusations before. Last November, his ex-girlfriend, singer Casandra Elizabeth Ventura, filed a civil lawsuit against him that included graphic descriptions of violent abuse. He denied the accusations, but settled the case a day after it was filed. In May, Mr Combs released a public apology after video footage from a Los Angeles hotel appeared to show him beating Ms Ventura in a hallway.
