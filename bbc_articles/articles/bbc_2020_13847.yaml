title: 'Covid in Scotland: Fears of level 1 businesses heading for lockdown - BBC
  News'
date: '2020-12-22'
section: Highlands & Islands
url: http://www.bbc.co.uk/news/uk-scotland-highlands-islands-55394862
content: |-
  Restrictions will jump from level one to level four in the south of Scotland, Highland and Moray on Boxing Day.

  Donald Begg said there is understanding but also frustration about the move to tighter restrictions

  Businesses in parts of the north and south of Scotland face moving into the country's toughest Covid restrictions on Boxing Day - despite currently operating under level one rules.

  They say they are frustrated by the decision to put the whole of mainland Scotland into level four restrictions.

  It includes Highland, Moray, Dumfries and Galloway and the Borders which have been in level one for several weeks.

  Pubs, cafes and non-essential shops close from Saturday for three weeks.

  Nicola Sturgeon announced the introduction of the toughest level four rules at the weekend, saying "firm preventative action" was needed following the emergence of a faster-spreading strain of coronavirus.

  Donald Begg, managing director of family-owned Begg Shoes, said there was an "element of understanding" but also of "an element of frustration" about the development.

  The firm has shops in Inverness in the Highlands and Elgin in Moray.

  Mr Begg said: "The phones have been going mad with everybody wondering 'what do we do?' Staff have been wondering and suppliers panicking about what they do with deliveries."

  He added: "I think it is just about us all working together right now."

