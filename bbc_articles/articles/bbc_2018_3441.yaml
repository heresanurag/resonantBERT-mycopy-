title: North Korea's Kim Jong-un greets South Koreans in Pyongyang - BBC News
date: '2018-03-09'
section: General
url: http://www.bbc.co.uk/news/world-asia-43307454
content: |-
  The North Korean leader is seen warmly welcoming delegates from the South with dinner and smiles.

  North Korean state television has released a video of its leader, Kim Jong Un, welcoming a South Korean delegation on Monday.

  The South's officials made a rare trip to Pyongyang for the meeting.

  This video has no sound.
