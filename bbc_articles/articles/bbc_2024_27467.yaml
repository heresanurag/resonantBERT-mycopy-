title: Argentina football hooligan leader shot dead in street - BBC News
date: '2024-11-10'
section: Latin America
url: http://www.bbc.co.uk/news/articles/c62ln17dv32o
content: |-
  Andrés Bracamonte, known as Pillín, was gunned down near his club's stadium in Rosario.

  The leader of a notorious gang of football hooligans in Argentina has been shot dead near his club's stadium in Rosario. Andrés Bracamonte, known as Pillín, had spent more than 20 years as head of the Rosario Central supporters' gang and had a history of taking part in violent conflicts with rival hooligans. He and his deputy, Daniel "Rana" Atardo, were just four blocks from the Gigante de Arroyito stadium when they were gunned down by a motorcyclist on Saturday. Rosario Central had just played a league match, but Bracamonte did not attend it. He had been banned from matches because of previous incidents and had been accused of money-laundering and extortion by Argentine authorities.

  The two men were taken to the local Centenario Hospital, but doctors were unable to save their lives. Bracamonte's killing was widely reported by Argentine media, who described it as a settling of scores. Newspapers reported that Bracamonte had a long criminal record and had been the victim of frequent attacks. The most recent was in August, when a bullet grazed his back while he was with his partner, who was also injured. Bracamonte, who was 52, was also accused of having links with a drug cartel known as Los Monos and was under investigation for money-laundering as a result.
