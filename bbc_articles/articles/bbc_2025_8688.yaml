content: |-
  One passenger says people were queuing "out the door" amid delays at check-in and security.

  Long queues at airport as 'IT issue' causes delays

  The queues at Stansted Airport early on Sunday

  Queues of passengers stretched outside an airport's terminal early on Sunday as an "IT issue" caused delays. A post on X by London Stansted Airport, external at 06:20 BST said: "Due to an ongoing IT issue, a number of airport systems have been affected, including check-in, baggage and security. "The issue has now been resolved but some arrivals and departures may be subject to delays," it continued. One passenger, who did not wish to be named, said she had been stuck in queues at the terminal for hours and had missed her flight.

  She said she arrived at the Essex airport at 04:45 and passengers were queuing "out the door". "I spoke to one woman who had already been standing for an hour and we were getting nowhere near the entrance," she said. "The queue for security was out the door and around the corner." The woman, from Chelmsford, said she left after waiting more than two hours, as her flight to Greece was boarding and she was told it was taking off without the rest of the passengers. In its post, the airport added: "Engineers are working hard to fully restore all systems as soon as possible." It updated the post, external again at 10:41 to say departing flights may still experience delays, despite the issue being resolved. The airport apologised to passengers and advised them to stay in touch with their airlines.

