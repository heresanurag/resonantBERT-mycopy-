  Fellow actor Jason Watkins, who portrays Director of Strategic Governance Simon Harwood replied, also in character, saying the company had noted how the BBC Sounds logo "is of course an utterly 'opposite colour-way'".

  The BBC blocks logo was first introduced in 1958 and has gone through various updates over the years, the most recent in 1997.
