content: |-
  Darren Millar MS says he had always been 'pro-life' but 'does not like to impose his views on anybody else'.

  'I'm Christian - get over it', says Welsh Tory leader

  Darren Millar took over the party in Wales after Andrew RT Davies stood down last week

  Being a Christian is "part of who I am" and "people need to get over it", according to the new leader of the Conservatives in the Senedd. But Darren Millar said he was "not a person who likes to impose [his] views on other people". The Clwyd Member of the Senedd (MS) was elected leader of the Welsh Conservatives in the Senedd on 5 December after Andrew RT Davies stood down on 3 December. He is also chief executive of a Christian charity, the Pocket Book Testament League, and works an average of seven hours a week for the organisation alongside his political role.

  He told BBC Politics Wales he would "reappraise those commitments" following his appointment and said "the people of Wales should be on no uncertain terms that I am committed to them and my constituents". Having previously been connected to a preacher accused of homophobia through his work with another Christian charity, Mr Millar said he had "made it clear that [he does] not believe that anybody should be discriminated against on the basis of their sexual orientation". He also said "he had always been pro-life" on the issue of abortion and reproductive rights but added he "believes in freedom of choice and personal responsibility - I do not like to impose my views on anybody else". Mr Millar was elected unopposed by his Senedd group following the resignation of Andrew RT Davies. It followed a vote of confidence in Mr Davies, which he won despite it exposing a split in the group.

  Mr Millar paid tribute to his predecessor on Sunday saying he did "a fantastic job", adding that he wanted to "build on his legacy". "Andrew has his style and I have my own," he said. "I want to plough my own furrow and point out that it is more important in politics to define yourself by what you are for rather than what you are against." He said the Welsh Conservatives are "pro freedom of choice, pro personal responsibility, pro home ownership, pro farming, pro Wales and pro devolution." "I want to take a positive message to the people of Wales which will hopefully inspire them," Mr Millar added.
