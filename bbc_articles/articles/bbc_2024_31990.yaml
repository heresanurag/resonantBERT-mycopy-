title: HMP Five Wells prison officer arrested over alleged misconduct - BBC News
date: '2024-12-27'
section: Northamptonshire
url: http://www.bbc.co.uk/news/articles/cgm9e97myrvo
content: |-
  A 19-year-old woman is suspended from a privately-run prison following her arrest.

  HMP Five Wells opened in 2022 and is run by security firm G4S

  A female prison officer has been suspended after being arrested on suspicion of misconduct in public office. It follows reports in The Sun, external that a custody officer was detained after a video of her having sex with a male inmate was shared with prisoners at HMP Five Wells in Wellingborough, Northamptonshire. The BBC has not been able to verify the nature of the allegations but can confirm she is aged 19 and was suspended from her job at the privately-run prison on 23 December, following her arrest by Northamptonshire Police. "A prison custody officer has been suspended and arrested by Northamptonshire Police on suspicion of misconduct in a public office," a spokesperson for HMP Five Wells said.

  Both the prison and police said they were unable to comment further.

