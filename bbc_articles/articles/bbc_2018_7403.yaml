title: Fisherman robbed of haul at sea off Devon's Slapton Sands - BBC News
date: '2018-06-24'
section: Devon
url: http://www.bbc.co.uk/news/uk-england-devon-44592957
content: |-
  The fisherman was confronted three miles off shore by two men with a knife in an inflatable vessel.

  The fisherman was robbed three miles off Slapton Sands in Devon

  Two men in an inflatable vessel have stolen a fisherman's haul after threatening him with a knife three miles off shore.

  Devon and Cornwall Police said the theft happened off Slapton Sands in Devon at 05:30 BST.

  The local fisherman discovered the men cutting his nets and confronted them before they stole his haul of plaice and Dover sole.

  The force has warned people not to "buy any fish from unreputable sources".

