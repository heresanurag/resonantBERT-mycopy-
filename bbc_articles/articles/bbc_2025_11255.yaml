title: 'BET Awards: Kendrick Lamar dominates LA ceremony with top prizes - BBC News'
date: '2025-06-10'
section: Culture
url: http://www.bbc.co.uk/news/articles/cj42jeyrl57o
content: |-
  The rapper wins five out of his 10 nominations including for best album and video.

  Kendrick Lamar stole the show at the BET Awards in Los Angeles, which celebrate black actors, singers and sports stars, winning five out of his 10 nominations including best album, video and male hip-hop artist. The rapper won best album for GNX and best video for Not Like Us, while he and filmmaker Dave Free also took home the prize for video director of the year. Lamar said at the awards, which were hosted by Kevin Hart: "BET has always made sure they're representing the culture right and always put me in the midst of the cycle of what we represent." Rapper Doechii, who won best female hip-hop artist, used her moment on stage to lambast US President Donald Trump for "using military forces to stop protest" in LA, where US Marines and the National Guard are being deployed.

  Doechii used her platform to criticise US President Donald Trump

  Demonstrations began on Friday after Immigration and Customs Enforcement (ICE) raids in heavily Latino parts of the city, by the federal agency that identifies people in the US illegally and carries out arrests and deportations. Doechii added: "I want y'all to consider what kind of government it appears to be, when every time we exercise our democratic rights to protest, the military is deployed against us." Last year's BET hip-hop awards were also dominated by Lamar, where he won eight out of 11 nominations. Ultimate icon awards, for achievement in music, entertainment, advocacy and community impact, were also handed out to musicians Mariah Carey, Snoop Dogg and Kirk Franklin, along with actor Jamie Foxx. Foxx accepted his award from Stevie Wonder, and spoke about his recovery after having a stroke in 2023. "I gotta be honest, when I saw the in memoriam [segment], I was like, 'Man, that could have been me'," he said. Carey, who also performed at the awards, was given hers by Busta Rhymes, and said: "This means so much. If you're gonna get one, might as well start with the Ultimate Icon Award. "My life and career have been quite the adventure. I will spare you the long, drawn-out saga tonight," she added, as she praised her fellow icon winners. Wicked star Cynthia Erivo won best actress, having also been nominated for the BET Her award - which recognises empowering songs that focus on women - for her stellar version of Defying Gravity. Gladiator II's veteran star Denzel Washington won best actor. The ceremony also featured R&B artist Ashanti's compilation of songs, including her 2002 hit Foolish, while Lil Kim performed Left Eye (Remix) with Honey Bxby. Other performers included Jim Jones, Amerie, Keyshia Cole, Mya, TI, B2K and Bow Wow with Jermaine Dupri.

  Here is the list of winners in full:
  • None Video of the year – Not Like Us – Kendrick Lamar
  • None Video director of the year – Dave Free and Kendrick Lamar
  • None Dr Bobby Jones best gospel/inspirational award – Rain Down on Me – GloRilla feat. Kirk Franklin, Maverick City Music
  • None Best movie – Luther: Never Too Much
