title: Southport mum says she will 'never feel true happiness again' - BBC News
date: '2025-02-10'
section: Lancashire
url: http://www.bbc.co.uk/news/articles/cpdx74335d5o
content: |-
  Seven-year-old Elsie Dot Stancombe was one of three girls killed at a Taylor Swift-themed dance class.

  Attack mum 'will never feel true happiness again'

  Elsie Dot Stancombe's mother described her as a "dedicated" Taylor Swift fan

  The mother of a seven-year-old girl who was murdered in the Southport knife attacks has said she will "never feel true happiness again". Elsie Dot Stancombe was one of three girls killed at a Taylor Swift-themed dance class in the Merseyside town on 29 July. The others were nine-year-old Alice da Silva Aguiar and six-year-old Bebe King. Jenni Stancombe also told ITV's Good Morning Britain, external that she welcomed the recently announced public inquiry into the Southport attacks. Axel Rudakubana, now 18 and originally from Banks in Lancashire, was last month jailed for a minimum of 52 years for their murders.

  This video can not be played To play this video you need to enable JavaScript in your browser. Southport: Parents of girls killed in Southport attack tell of their anguish and hopes

  Mrs Stancombe described Elsie as "very brave" and "fearless", adding that it was a "privilege to be her mum". Elsie's parents have set up a charity, Elsie's Story, to help children in need. In their first television interview, Mrs Stancombe said: "We feel like it's our duty as her mum and dad to continue writing Elsie's story for her. "So many times we've said: 'We'll never feel true happiness again, ever'. "We might just feel a little something else when we make another little girl smile, for Elsie. "We want to do her proud."

  Speaking about the forthcoming public inquiry, Mrs Stancombe said: "It will hold people to account for some of the decisions that they've made and, as a result, allowed this to happen. "Our girls just need to be safe. Children need to be safer and protected." Her husband, David Stancombe, urged the public inquiry to fully scrutinise the anti-terror scheme Prevent, which failed to stop Rudakubana. He said: "The fact that he's been flagged up so many times and because he didn't meet the criteria of certain things... It just doesn't work like that, does it?" Rudakubana also attempted to kill eight other children, who cannot be named for legal reasons, as well as Leanne Lucas, who was running the dance class, and local businessman John Hayes.

  Meanwhile Bebe King's parents, who cannot be named for legal reasons, told Good Morning Britain they had concerns about the televising of sentencing hearings. Bebe's father said: "We understand it had to be heard in court, but that's it. "It didn't have to be televised at all. You know, that's what's really hurt us." They also spoke about Bebe's legacy. Her mother said: "I really, really hope that in spirit, she can still have an impression on the world. "She can help just the future, protecting children, and I believe she's going to move mountains." Bebe was "pure light and joy", she said. "She was a beautiful, funny, crazy, gorgeous girl, and her legacy? "It can't be defined by what's happened." Alice da Silva Aguiar's parents have chosen not to speak publicly but support the other families.

