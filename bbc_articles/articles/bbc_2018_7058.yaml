content: |-
  Last updated on .From the section World Cup

  The final round of group matches at the 2018 World Cup has drawn to a close, and the last 16 has been finalised.

  But how did the teams progress - and who faces whom in the first round of the knockout stage?
  • None Uruguay progress as group winners with hosts Russia through in second place.
  • None Uruguay play Portugal (the runners-up in Group B) in the last 16 while Russia play Spain (Group B winners).
  • None Spain progress as group winners - on goals scored above Portugal, who are through in second place. Portugal were set to win the group until late goals in both games.
  • None Spain face hosts Russia (Group A runners-up) in the last 16, with Portugal up against Uruguay (Group A winners).
  • None France are through as group winners - with Denmark through in second place following a goalless draw between the two sides in their final group game.
  • None France will play Group D runners-up Argentina, while Denmark face Croatia, the winners of Group D.
  • None Croatia are through as group winners after scoring a late goal to beat Iceland and maintain their 100% record - they will face Group C runners-up Denmark.
  • None Argentina are through as runners-up after defeating Nigeria 2-1 and will play Group C winners France.
  • None Brazil qualify as winners with two wins from three and will play Group F runners-up Mexico in the next round.
  • None Switzerland take the runners-up spot and will face Group F winners Sweden.
  • None Sweden qualify as group winners following a dramatic victory over runners-up Mexico in their final game.
  • None The Swedes will face Group E runners-up Switzerland in the next round, while Mexico face five-time champions Brazil.
  • None Belgium qualify as group winners following victory over runners-up England in their final game.
  • None Belgium will face Group H runners-up Japan in the next round, while England meet Colombia.
  • None Colombia take top spot and will play Group G runners-up England in the last 16.
  • None Japan qualify in second in dramatic style - finishing ahead of Senegal through fair play - and will next face Group G winners Belgium.
