title: Glowing lava patterns form on erupting Kilauea volcano - BBC News
date: '2025-02-03'
section: General
url: http://www.bbc.co.uk/news/videos/c1ez3972220o
content: |-
  Timelapse video captured the Kilauea volcano erupting for the seventh time since 23 December 2024.

  Timelapse footage captured the moment Kilauea volcano in Hawaii began erupting for the seventh time in just a few weeks.

  The eruption created glowing patterns as lava spread over the mountainside.

  Officials said the lava posed no threat posed to homes or infrastructures.
