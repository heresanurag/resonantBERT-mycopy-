title: Devon beach lifeguard's double life rescuing refugees - BBC News
date: '2017-12-23'
section: General
url: http://www.bbc.co.uk/news/uk-england-devon-42445304
content: |-
  Beach lifeguard Richie Heard works in Devon in the summer and saves refugees in the winter.

  Beach lifeguard Richie Heard spends summers working in north Devon and winters saving refugees in the Aegean Sea.

  He spoke during a visit home from the Greek island of Lesbos, where he is operations manager with Refugee Rescue.

  He said the sound of crying babies, stranded with their parents in boats on rocks, never leaves him.
