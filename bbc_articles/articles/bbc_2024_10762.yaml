title: 'Whaley Bridge: Two further arrests after burglary shooting death - BBC News'
date: '2024-05-04'
section: Derby
url: http://www.bbc.co.uk/news/uk-england-derbyshire-68952923
content: |-
  Derbyshire Police confirmed two further arrests were made in relation to the death of Marcus Smith.

  The man who died has been named locally as Marcus Smith

  Two more people have been arrested in connection with the shooting of two men during a burglary in Derbyshire. Police said on Friday two men had been arrested after reports of a burglary in Eccles Road, Whaley Bridge, at 01:20 BST on Wednesday. A man in his 30s was arrested on suspicion of conspiracy to commit burglary and remains in custody. Another man in his late teens was arrested on suspicion of assisting an offender. The force also confirmed a man found at the scene with fatal gunshot wounds was Marcus Smith, 19. A farmer in his 50s is being questioned on suspicion of murder and attempted murder, with officers being given further time to question the man. Mr Smith lived in nearby Chapel-en-le-Frith and played football for a local team. He was also a DJ at a pub, which shared a tribute to him on social media.

  Police said the investigation would continue for "some time"

  A second man in his teens was also found with a gunshot wound nearby and remains in hospital. Police said his injuries are "not thought to be life-threatening" and that he has been arrested on suspicion of aggravated burglary. A man in his 20s was arrested on suspicion of aggravated burglary after the vehicle he was travelling in was stopped on the A6 near Chapel-en-le-Frith on Wednesday afternoon and remains in custody. The man in his 30s was arrested on Thursday night, while the man arrested on suspicion of assisting an offender was detained on Friday. Police say they are keeping an open mind about whether the incident was linked to a reported burglary at the property at about 15:30 BST on Tuesday.

