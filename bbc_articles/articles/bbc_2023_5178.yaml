title: MSPs to discuss proposals for return of lynx to Scotland - BBC News
date: '2023-04-25'
section: Highlands & Islands
url: http://www.bbc.co.uk/news/uk-scotland-highlands-islands-65374055
content: |-
  Rewilding charities argue bringing back the cats would benefit ecotourism and biodiversity.

  Rewilding charities believe 400 wild lynx could released into the Scottish Highlands

  Proposals for the reintroduction of lynx to Scotland are to be discussed by MSPs at Holyrood.

  The wild cats were once native to Britain, but were driven to extinction 500 to 1,000 years ago.

  A group of conservation organisations believe bringing back lynx would benefit ecotourism and help control roe deer where they damage woodland.

  But farmers' union NFU Scotland said any proposals to reintroduce lynx were unacceptable to farmers and crofters.

  Ariane Burgess, Scottish Greens MSP for the Highland and Islands, will help to lead the discussion during the Lynx to Scotland event at the Scottish parliament later.

  MSPs, senior advisors and rural groups are set to attend.

  Rewilding charities Scotland: The Big Picture, Trees for Life and The Lifescape Project have organised the event.

  They said research suggested the Highlands could support about 400 wild Eurasian lynx.

  Peter Cairns, executive director of Scotland: The Big Picture, said: "It's good news that politicians and policy makers are now seriously discussing the return of lynx, which would have strong public support.

  "Scotland is one of the poorest places on Earth for nature, and if we are serious about tackling the nature and climate emergencies, these conversations really matter."

  NFU Scotland opposes the reintroduction of the cats

  The potential for reintroducing lynx was debated in Holyrood last week, after a parliamentary motion by SNP MSP Kenneth Gibson received cross-party support.

  The motion noted calls on the Scottish government to rectify lynx extinction in Scotland by a managed reintroduction, following appropriate assessments.

  NFU Scotland said there were concerns about the impact of lynx on livestock.

  A spokesman said: "The past few years have seen a long line of brazen and presumptuous claims from organisations about the imminent reintroduction of predators to the UK.

  "The only application to date, to reintroduce lynx to Kielder in the North of England, was rejected."

  Last year, the first detailed social feasibility study into a trial reintroduction of lynx to Scotland found divided opinions.

  The Lynx to Scotland project commissioned the research in the Cairngorms National Park and Argyll.

  The study found opposition among rural residents and workers.

  The perceived benefits included ecotourism and lynx helping to control roe deer numbers in areas where they damage woodland, but there were concerns that lynx could prey on livestock.

  According to the researchers, there was very little concern that the cats posed any danger to people.

  Eurasian lynx are found in the wild in western Europe, Russia and central Asia.
