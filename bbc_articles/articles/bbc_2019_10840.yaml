  Labour MP Karl Turner confronts Johnson's adviser Dominic Cummings over death threats he's received.

  "Get Brexit done," Boris Johnson adviser Dominic Cummings responds to Labour MP Karl Turner telling him he's "had death threats overnight".

  The exchange was filmed in Parliament's Portcullis House.
