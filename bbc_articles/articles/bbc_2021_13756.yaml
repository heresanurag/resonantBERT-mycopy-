title: Queen officially opens Scottish Parliament session - BBC News
date: '2021-10-02'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-58760784
content: |-
  Her Majesty spoke of her affection for Scotland and the challenges of the Covid pandemic

  First Minister Nicola Sturgeon says the visit from the Queen is "tinged with regret" at the absence of Prince Philip, offering the parliament's condolences and sorrow.

  Quote Message: This is the first time you have opened our parliament without the Duke of Edinburgh by your side. On behalf of everyone in our chamber, and across Scotland, I convey again our deep sympathy and shared sorrow at your loss." from Nicola Sturgeon Scotland's First Minister This is the first time you have opened our parliament without the Duke of Edinburgh by your side. On behalf of everyone in our chamber, and across Scotland, I convey again our deep sympathy and shared sorrow at your loss."

  The first minister says the Queen has been a "steadfast friend" of the parliament since it began and thanks her for her "kind and thoughtful address", describing it as the highlight of the day.
