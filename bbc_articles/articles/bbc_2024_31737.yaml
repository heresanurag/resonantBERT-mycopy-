title: 'Blackfriars: Man clipped by train pulling into railway station - BBC News'
date: '2024-12-24'
section: General
url: http://www.bbc.co.uk/news/videos/c983n053mmgo
content: |-
  Govia Thameslink Railway is urging people to be safe on trains and at stations this Christmas.

  Govia Thameslink Railway (GTR) has released CCTV footage of a man who was clipped by a train while he was waiting at London Blackfriars station as part of efforts to urge passengers to get home safely this festive period.

  In the video, the man gets too close to the train as it pulls into the station, then stumbles into it and gets knocked to the ground while it is still moving.

  He suffered no injuries but GTR, the UK's biggest rail operator, has warned passengers to take extra care at its stations and especially to stay behind the yellow line while waiting at platforms.

