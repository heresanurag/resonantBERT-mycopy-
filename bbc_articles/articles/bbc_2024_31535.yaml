  British flyweight Galal Yafai: "I'm going Usyk again. I like Fury and I like Usyk, but there's one thing me and Usyk have in common, we are both Olympic champions, everything else I don't come close to him." Super-flyweight prospect Shannon Ryan: "It will be the same result, Usyk by points. I think it will be competitive and Fury will bring more and be more switched on but Usyk will take over from round eight onwards." Scotland's first female world champion Hannah Rankin: "I’ve been tearing my hair over this one, it’s taken me so long to come to a decision. It may be a little bit controversial but I will go with Fury. I think the loss has really got to him. He’s training really hard and has the bit between his teeth. Normally rematches go the same way but I will go with Fury on points. He will learn from his mistakes and be super focused." Heavyweight prospect Moses Itauma: "Fury can win but it's whether he makes the necessary adjustments. I haven't seen Usyk's camp though, I need to see both camps."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Retired world champion Richie Woodhall: "It has to be a disciplined display but I think Fury will do it. Most people are saying Usyk again and he might raise his game but Fury has the physical advantage. As long as he's had a good camp and he comes in as fit as he can be. I think this could be the best we see of Fury." South African heavyweight Kevin Lerena: "I believe Tyson will knock him out. We know Tyson can box. He was boxing his ears off and having a great time before he got caught and the fight swung in Usyk's favour. Take away those rounds where he had to recover, Tyson would have won." Boxing coach Dave Coldwell: "I wouldn't say it's a 50-50 fight, but I would lean to Usyk on a 55-45. If Usyk still has enough in the tank, he beats him again. He's very good at riding out little crisis moments and he's always done it throughout his career. He's been hurt several times but rides out the rocky moments. He will probably get hurt again in this fight, but he doesn't panic and knows how to handle adversity." Heavyweight David Allen: "I thought Tyson would win the first fight and that he would stop him. Usyk forced the pace, he made him work. A lot of people say that Tyson dropped the ball. I think Tyson wins the rematch. I don't think there's a heavyweight out there that beats him. You just don't know when you're over the cliff. You can spar all you want, but you just never know. I would go for Tyson to win because he has a touch of genius but you can say that about Usyk."

