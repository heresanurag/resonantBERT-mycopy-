title: 'Team GB: Diver Kyle Kothari on ''repping'' his community - BBC News'
date: '2024-09-25'
section: General
url: http://www.bbc.co.uk/news/videos/cly480zknjvo
content: |-
  Kyle Kothari from Harrow, north-west London, has been talking how he got into diving.

  Team GB diver Kyle Kothari says he is proud to represent his Indian heritage and his north-west London community.

  In an interview with BBC Radio London's Claira Hermet, he spoke about growing up in Harrow, how he got into diving and how it is important that British children of Indian descent get to see people like him in places where they would not normally.

