  A week before his 100th birthday, Capt Sir Tom became the oldest person ever to get to number one in the UK singles charts when his duet of You'll Never Walk Alone - with singer Michael Ball - took the top spot.

  His 100th birthday on 30 April 2020 was marked with an RAF flypast, personal birthday greetings from the Queen and prime minister, and he was made an honorary colonel of the British Army.

  "I'm still Captain Tom, that's who I really am but if people choose to call me colonel, well, thank you very much," he replied.

  The following month it was announced he would be awarded a knighthood for his fundraising efforts and would be known as Captain Sir Thomas Moore "under Ministry of Defence protocol".

  On 17 July 2020, he was knighted in the grounds of Windsor Castle, in the Queen's first official engagement in person since the lockdown period began in March.

  This was the first knighthood the Queen had carried out in person since the beginning of the pandemic

  His youngest daughter said at the time of his fundraising efforts that her father had become a "beacon of hope" during challenging times.

  And indeed, Capt Sir Tom always seemed to know just the right thing to say to buoy the nation's spirits as the public tried to abide by government regulations to stem the spread of the coronavirus pandemic.

  "To all those people who are finding it difficult at the moment, the sun will shine on you again, and the clouds will go away," he said.

  "Tomorrow will be a good day" - another example of his positivity - became a hashtag on social media posts.

  An image of Capt Sir Tom lit up the night sky during the virtual 2021 New Year celebrations over the Millennium Dome (O2 Arena) in London

  The proud Yorkshireman completed his 100 laps of his garden live on television in April 2020, with a Guard of Honour from 1st Battalion the Yorkshire Regiment and a rousing round of applause from his family.

  By the time he closed his fundraising page at midnight on his 100th birthday, Capt Sir Tom had raised £32,794,701 for charities supporting the NHS, from more than one-and-a-half-million global donors.

