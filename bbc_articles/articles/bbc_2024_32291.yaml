title: 'Newcastle house explosion: Man in court over two deaths - BBC News'
date: '2024-12-05'
section: Tyne
url: http://www.bbc.co.uk/news/articles/c1mrlny3j87o
content: |-
  A man appears in court over the deaths of two people in a blast in Newcastle.

  The explosion destroyed houses on Violet Close, Benwell, in the early hours of 16 October

  A man has appeared in court charged over the deaths of two people in a house explosion in Newcastle. Seven-year-old Archie York and Jason Laws, 35, died in the blast in Violet Close, Benwell, on 16 October. Reece Galbraith, 33, of Rectory Road, Gateshead, appeared at Newcastle Magistrates' Court charged with two counts of manslaughter, production of cannabis, and being concerned in the supply of cannabis. No pleas were entered and he will next appear at Newcastle Crown Court on 7 January.

  Mr Galbraith was granted bail but the prosecution appealed against the decision and the former construction worker was remanded in custody with a further hearing to be held within 48 hours. Three men previously arrested as part of the investigation – two in their 30s and one in his 50s – remain on police bail. Det Ch Insp Katie Smith, from Northumbria Police, described the explosion as a "truly tragic incident". "We recognise the strength of feeling around what has happened and would continue to ask people to avoid speculation both online and in the community which could jeopardise the ongoing proceedings," she said. The force has asked anyone with information about the case to come forward.

  Archie York, seven, died when the building exploded

  Archie York died in the explosion, which ripped through the building at about 00:45 BST. His aunt, Abbie, described him as a "loving boy, with a cheeky little grin on his face all of the time". His parents and two-month-old brother were taken to hospital following the blast but have since been discharged. Jason "Jay" Laws was later named as the second person to have died in the explosion. His brother, professional boxer Joseph Laws, described him as "the best dad in the world".
