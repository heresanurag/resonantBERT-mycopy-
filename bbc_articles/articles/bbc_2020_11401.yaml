title: 'Covid-19: President Trump''s doctor ''extremely happy'' with progress - BBC
  News'
date: '2020-10-04'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-54403742
content: |-
  Physicians looking after Donald Trump said they were "cautiously optimistic, but he's doing great".

  Donald Trump's personal physician has told reporters he's "extremely happy with the progress the president has made" after starting treatment for Covid-19.

  Dr Sean Conley and other doctors from Mr Trump's medical team spoke from outside Walter Reed Army Medical Center in Washington on Saturday morning.

  They said he was doing "very well" and in "exceptionally good spirits".

  However, their account was later disputed.
