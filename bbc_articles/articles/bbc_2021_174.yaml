  Fans of the University of Alabama football team gathered in the streets of Tuscaloosa, ignoring social distancing.

  Fans of the University of Alabama football team gathered in the streets of Tuscaloosa in Alabama, ignoring social distancing.

  They were celebrating the university's third national championship in the past six years.
