content: |-
  After 45 PCR tests in three weeks and a frantic race around the globe, Casey Dawson finally realises his Olympic dream.

  Casey Dawson finally made it onto the ice in Beijing... on borrowed skates

  After 45 PCR tests in three weeks, a missed event and his luggage being lost, Casey Dawson was finally able to realise his Olympic dream - on borrowed skates. The 21-year-old speed skater tested positive for Covid-19 last month, and a mix-up over testing further delayed his arrival in Beijing. When clearance finally came, Dawson made the 6,000-mile journey from Salt Lake City to Beijing - via Atlanta and Paris - and arrived just hours before stepping onto the ice for the 1500m. The American finished second last, but if medals were given out for overcoming the odds, he would surely be taking one home. "I'm just so happy to finally be here, because I didn't think I would be," he said.

