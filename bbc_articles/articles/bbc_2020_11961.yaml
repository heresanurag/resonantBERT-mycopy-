title: '''Je suis Samuel'' - France rallies for beheaded teacher - BBC News'
date: '2020-10-19'
section: General
url: http://www.bbc.co.uk/news/world-europe-54592695
content: |-
  Rallies are held across France in support of murdered teacher Samuel Paty.

  Rallies are held across France in support of Samuel Paty, the teacher beheaded after showing cartoons of the Prophet Muhammad during a lesson.

  Banners reading "Je suis enseignant" (I am a teacher) and "Je suis Samuel" (I am Samuel) were on display in solidarity.
