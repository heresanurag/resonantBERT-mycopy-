title: Alec and Hilaria Baldwin announce new family reality show - BBC News
date: '2024-06-05'
section: Culture
url: http://www.bbc.co.uk/news/articles/c4nn5zze5m0o
content: |-
  The couple, who have seven children all under the age of 10, said The Baldwins will air on TLC in 2025.

  Baldwin is well known for his role as Jack Donaghy on the NBC sitcom 30 Rock

  Actor Alec Baldwin and his wife, Hilaria Baldwin, are set to star in their own reality TV show about their family. The couple, who have seven children all under the age of 10, said The Baldwins will air on US cable network TLC in 2025. The family shared the announcement on Instagram with a teaser video,, external captioned: "We’ve got an exciting announcement to share!" However, the decision to do the show has been criticised due to Alec Baldwin's forthcoming trial. The actor is set to stand trial in July for involuntary manslaughter over a fatal shooting on the set of Western movie Rust in 2021.

