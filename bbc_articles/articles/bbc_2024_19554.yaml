  • None Doug Emhoff: The first 'second dude' in the White House Kerstin, the founder and CEO of production company Prettybird, even provided her creative expertise and connections to the 2020 campaign. "They were like, 'The ex-wife wants to do what?'" Kerstin said to Marie Claire in 2020.

  Kamala Harris is known to be very close to her only sibling and younger sister, Maya Harris. After their parents’ divorce, the two girls were primarily raised by their mother, Shyamala Gopalan, in Berkeley, California. Like her older sister, Maya pursued a career in law, graduating from Stanford University law school in 1992. She worked as a litigator and taught law classes before joining the American Civil Liberties Union (ACLU) of Northern California, where she became executive director in 2006. Maya, 57, eventually shifted to politics, serving as a senior policy adviser to Hillary Clinton on her 2016 presidential campaign. She then served as campaign chair to her sister’s failed 2020 bid for Democratic nominee, before becoming a surrogate for the Biden-Harris ticket.

  Maya Harris was campaign chair of Ms Harris's 2020 presidential attempt

  Maya’s only child, Meena, followed the Harris family tradition by graduating from law school. Meena advised her "Aunty" Kamala through the early stages of her political career, as she moved through positions at elite Silicon Valley companies like Uber, Facebook and Slack. Beginning in 2017, the mother of two launched Phenomenal, a media and merchandising company that focuses on projects led by women and other underrepresented groups. But Meena’s career is still linked in some ways to her aunt’s. In June 2020, she published a children’s book about her aunt and mother called "Kamala and Maya’s Big Idea". And after Mr Biden selected Ms Harris as his running mate, Phenomenal began selling “Vice President Aunty” sweatshirts.

  Husband to Maya, step-father to Meena, Tony West is another accomplished member of the Harris clan, and another lawyer. A graduate of Stanford law (where he met Maya and her then-toddler daughter), Mr West has worked at high levels of the private and public sector. He was associate attorney general under President Barack Obama and worked as general counsel of PepsiCo. Mr West is now the chief legal officer of Uber, but he's also emerged as a key adviser to his sister-in-law's campaign. Uber said he would take a leave of absence to devote himself to Team Harris. "I have always believed family comes first," Mr West said in a statement. "So I’ve decided to dedicate myself full-time to supporting my family and my sister-in-law on the campaign trail."

  Although Dr Shyamala Gopalan died before she could see her daughter run for president, Kamala and Maya Harris say their scientist mother inspired both of their careers. "My mother was the first person to tell me that my thoughts and experiences mattered," Ms Harris wrote on Facebook in 2022. “My mother would often say to me: 'Kamala, you may be the first to do many things. Make sure you are not the last.'" Ms Gopalan, who died in 2009, moved to the US from India at age 19 to study science, going on to work as a breast cancer researcher. Her activism in the civil rights movement led her to her future husband: economist and Jamaican immigrant Donald Harris. Ms Harris has credited her mother with raising both her and Maya. Her current relationship with her father is unclear.

