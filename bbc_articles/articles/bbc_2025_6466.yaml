  A piece of golfing history is not all Rory McIlroy will receive for his triumph at Augusta National.

  What does McIlroy get for Masters triumph?

  This video can not be played To play this video you need to enable JavaScript in your browser.

  With his Masters victory on Sunday making him just the sixth man to complete the career Grand Slam, Rory McIlroy's latest win is no doubt the most significant of his career. For what he called the best day of his "golfing life", the 35-year-old has earned a place in the history of his sport. That, however, is not all the world number two will receive for his dramatic play-off victory over Justin Rose. Here's what else he takes home from Augusta National.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  After breaking away from celebrations with friends who had gathered on the other side of the ropes, McIlroy was heard to remark "I've got to go and get a Green Jacket". While not the only tournament to reward its victor with a blazer - the winner of the RBC Heritage this weekend will receive a snazzy plaid number, for example - the Masters' Green Jacket is without a doubt the most iconic item of clothing in sport. "It's very nice," was McIlroy's reflection after the garment was slipped on to his shoulders by last year's champion Scottie Scheffler. He will have to make the most of it while he can, though. While McIlroy is free to wear his jacket wherever he pleases for the next 12 months, thereafter it must stay on club grounds. Winners also receive a gold medal - a tradition which dates back to the tournament's first staging in 1934 - and a replica of the trophy which is modelled on the Augusta National clubhouse.

  Rory McIlroy was presented his Green Jacket by 2024 champion Scottie Scheffler

  At $21m (£15.9m), this year's Masters prize pot was the biggest in the tournament's history. While hardly motivated by money at this stage of his stellar career, McIlroy's share as winner comes in at $4.2m (£3.2m). The five-time major winner was quick to credit his caddie and childhood friend Harry Diamond after sinking the winning putt. Set to bank 10% of the winnings, Diamond had a more than productive weekend's work too.

  Past champions at Augusta gather for dinner on the Tuesday of Masters week each year

  The Masters tournament delights in its use of the phrase "a tradition unlike any other" and the annual Champions Dinner certainly falls into that category. Starting in 1952 at the urging of Ben Hogan, the exclusive meal is an invite-only affair with admittance strictly limited to past champions. Upon arrival in Georgia each year, three-time winner Phil Mickelson has reportedly often enjoyed asking those without a Green Jacket if they have any dinner plans on Tuesday evening. As reigning champion, it will be McIlroy's responsibility to plan next year's menu too - Ulster fry anyone?

  This video can not be played To play this video you need to enable JavaScript in your browser.

  While McIlroy must leave his jacket on site after the 2026 tournament, he can be sure that it will be suitably set aside in one of the most exclusive parts of the club. On his return to Augusta, the Holywood golfer will see parts of the fabled grounds he has yet to experience in his past 17 years of visiting. There is a champions' locker room, complete with champions' lockers and champions' parking spaces. During Masters week, there is even a champions' practice range.

  Fred Couples and Bernhard Langer have won three Masters titles between them

  As the world number two, it has been quite some time since McIlroy has had to worry about his place in the field at golf's biggest events. When it comes to the Masters, now he never will again. While other majors offer limited exemptions to their past champions, winners at Augusta National can return for as long as they like. Just this year, Bernhard Langer, 67, and Fred Couples, 65, were in the field and finished only one and two shots respectively away from the cut. Could McIlroy see himself making as many return visits? "They are going to have to wheel me out of here when I am 90 years old," he said.
