  Corey Comperatore was honoured at the Republican National Convention (RNC) in July, with his helmet and coat displayed on stage as Trump spoke. Helen said at the July rally, Corey had hoped - and joked - that Trump might call him on stage. The family watched the RNC moment on television, after Trump told Helen about the planned tribute. "And I just cried because I said he got his moment on stage with Trump," she said. "So, you know, it was kind of like a nice moment, but it was a sad moment at the same time."
