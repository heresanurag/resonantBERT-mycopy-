content: |-
  Keely Hodgkinson says she has the 800m world record in her sights after the Olympic champion was named BBC Sports Personality of the Year.

  Keely Hodgkinson is the fourth successive woman to win BBC Sports Personality of the Year

  Keely Hodgkinson says she feels "pretty close" to breaking the 800m world record after the Olympic champion capped a memorable 2024 by being named BBC Sports Personality of the Year. Hodgkinson ended her wait for a global title at Paris 2024 to become Team GB's first Olympic champion on the track since Sir Mo Farah's 5,000m and 10,000m double at Rio 2016. The 22-year-old also retained her European title in Rome and improved her British women's record to one minute 54.61 seconds - a time bettered by only five athletes in history. Her coaches Trevor Painter and Jenny Meadows, who shared the Coach of the Year award, said they would target both world indoor and outdoor golds next year before chasing the sport's longest-standing record in 2026. It has been 41 years since Czech athlete Jarmila Kratochvilova ran 1:53.28 in 1983, while Hodgkinson will also target Jolanda Ceplak's world indoor mark of 1:55.82 at an event named the 'Keely Klassic' in Birmingham in February. "I'm not afraid to put my goals out there," said Hodgkinson, who won the Sports Personality of the Year public vote ahead of darts star Luke Littler and cricketer Joe Root. "I'm pretty close [to the world record], I would like to think. I have seen this year what my body is capable of and I'm excited to push on. "That world record is something I will always have in the back of my head. But I have so many years to get stronger so I'm looking forward to seeing what happens. "I trust in Trevor and Jenny a lot. I know what shape I'm in before I step on the start line. It all depends if it comes together and that can depend on many things in athletics."

  Hodgkinson had finished second at successive World Championships after claiming a stunning silver on her Olympic debut as a teenager in Tokyo three years ago. But, having vowed to never settle for second on such a stage again after losing out to Kenya's Mary Moraa in Budapest in 2023, in Paris she became only the 10th British woman to win athletics gold at a Games. Meadows, a world 800m bronze medallist and herself coached by husband Painter, said: "Keely is an incredible athlete and I know that it's still the beginning for her. "She has huge ambitions in the sport and she wont stop until she's at least won another one in LA and even beyond that. "It's really exciting we now feel like we know how to get those records indoor and outdoor. "For 2025,the big aim is to win the world indoors and world outdoors. Get the two global titles, that is the big aim. "Then we think 2026 is the right time to go for the outdoor record. Physically we know she can run 1.53 something in 2025 and then we will push on from there."

  Keely Hodgkinson went unbeaten in nine races over 800m in 2024

  In another stellar season Hodgkinson went unbeaten over two laps and battled through illness to retain her European title, which in 2022 represented her first major outdoor title. Her improved British record at the London Diamond League in July was not only confirmation that she was ready to make the next step on the podium in Paris, but it has also brought Kratochvilova's as yet untouched record firmly within reach. Painter said: "We are always going to push those boundaries and try to get the world records, whether indoor or out. "Whether it happens in 2025 we will have to wait and see, but we will do our best to get it." After a minor hamstring injury ended her 2024 season before she could defend her Diamond League title, Hodgkinson returned to training in South Africa in recent weeks. But having admitted that she struggled mentally following the unfamiliar high of her breakout first Games at Tokyo, she is unwavering in her determination as she prepares to chase more history and - in her own words - become one of Britain's greatest ever athletes. The World Indoor Championships take place in Nanjing, China, in March, while outdoor gold is on the line in Tokyo in September. Before then, Hodgkinson will hope to break the world indoor record - set by Ceplak on the day the Briton was born - at her own event at Birmingham's Utilita Arena on 15 February. "I think this year I have found a real joy in competing," said Hodgkinson. "I just loved London [Diamond League] so much, I loved Prefontaine [Classic], I loved Paris. "I have loved being in front of a crowd, putting on a performance, having people behind me and winning for them. "So I am just looking forward to continuing in that way."
