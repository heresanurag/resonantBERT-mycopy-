content: |-
  Patrick Vieira: Police & FA investigating after Crystal Palace boss involved in altercation with fan Last updated on .From the section Crystal Palace

  Premier League managers talking during the 2021-22 season on pitch invasions and fan violence Police and the Football Association are investigating after Crystal Palace boss Patrick Vieira was involved in an altercation with a fan following their Premier League defeat at Everton. Television footage showed him being taunted by an Everton supporter as fans ran on to the pitch at full-time. The Frenchman appeared to kick out at the fan before being ushered away by other supporters. Police say they have not received a formal complaint about the incident. "Merseyside Police is investigating an altercation on the pitch at Goodison Park following the Everton v Crystal Palace match on Thursday," the force said in a statement. "We are working with Everton to gather all available CCTV footage and are speaking to witnesses. "No formal complaint has been received and enquiries into the incident are ongoing." Everton staged a stunning comeback to win and retain their top-flight status. "I have nothing to say about that," Vieira said when asked about the incident during his post-match news conference. Everton manager Frank Lampard said: "I feel for Patrick. I didn't get him at the end. I would have said, 'come in with us' - although he might not have wanted that. "Of course he ran 80 yards across the pitch and it's not easy." Everton fans poured on to the Goodison Park pitch at full-time after the Toffees secured their Premier League status in dramatic fashion The FA said it is "very concerned about the rise in anti-social behaviour from fans". "Football stadiums should always be a safe and enjoyable space for everyone, and these incidents are completely unacceptable and have no place in our game," said the FA in a statement on Friday. "It is illegal to enter the pitch area in any stadium and these actions are putting players, fans and people who run the game at great risk. This simply cannot continue and we can confirm that we are investigating all of the incidences." The Premier League also issued a statement on Friday, saying it is "concerned about fan behaviour at grounds", but "recognises that reckless actions are carried out by a small minority of fans and the majority of supporters attend and watch matches in a safe and respectful way". "The Premier League has encouraged clubs to remind supporters that it is illegal for them to enter the pitch at any time and may result in a criminal record and stadium bans. We will continue to discuss and address the ongoing issue of fan behaviour with The FA, EFL and other football partners ahead of the start of next season to ensure matches are safe environments for all." A Crystal Palace source told BBC Sport that the security was a "joke" and that striker Christian Benteke was "slapped" during the first, smaller pitch invasion that followed Everton's third goal. The source said: "At the end of the game they [the fans] were goading players and staff which is unacceptable. "Is it going to take another Billy Sharp incident or worse before people say fans shouldn't be allowed on the pitch?" The source also claimed that Palace boss Vieira told the officials it "wasn't safe" after the first pitch invasion - but despite those "warning signs" the away team was "left to their own devices" to get off the pitch. On the pitch invasion, Lampard added: "It was pure elation of fans who have come on the pitch after avoiding relegation. "If it is done in the right way let them stay on the pitch, let them have their moment. As long as they behave, no problem." Speaking on Sky Sports, former England striker Dion Dublin said: "We know how overjoyed the Everton fans are but you can't be doing that. You can't be pushing managers and pushing players, touching players and shouting in their faces. "We know it is only one or two who spoiled it for everyone else. Having fans on the pitch is not the way forward. We need to stop letting fans, or allowing fans to get on the pitch. It is too dangerous." Vieira's confrontation at Goodison Park comes amid rising concerns over pitch invasions in English football following a number of recent high-profile incidents. Footage on social media also appeared to show Swindon players involved in a confrontation with Port Vale fans following Vale's League Two semi-final shootout win on Thursday. The other League Two semi-final, played on Wednesday, also ended in a pitch invasion with Mansfield boss Nigel Clough saying such incidents are "getting concerning" after his player Jordan Bowery appeared to be shoved by a fan late on in their win at Northampton. Earlier on Thursday, a fan was jailed after running on to the pitch and headbutting Sheffield United captain Billy Sharp at the end of the Blades' Championship play-off semi-final shootout defeat by Nottingham Forest on Tuesday.
