  Asked if he would like his three children to support Villa, who are seventh in the Premier League, Prince William said: "I'm generally very open to whoever they support, but obviously I'm a bit biased. "But also they come to games with Villa. They're going to probably support Villa, but I've left the other two at home, probably watching tonight, so we'll wait and see who they support." The prince was seen hugging some of Villa's players, including Marco Asensio and England international Marcus Rashford as they came out of the dressing room. He spoke about Villa's tactics and the "intensity" of PSG's press - and how they would put pressure on the Villa defence - and Ferdinand joked: "Do not go for a punditry job, please, because I could be out of the game. "The way he just dissected that there, I'm going to nick that for later on."

  Prince William went through the emotions as Villa faced attack after attack from a dominant Paris St-Germain side

  There was excitement and anticipation

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The prince started supporting Villa during his school days. Despite attending school in Berkshire, Prince William chose a team further afield as he did not want to follow the crowd. "A long time ago at school I got into football big time. I was looking around for clubs. All my friends at school were either Man United fans or Chelsea fans and I didn't want to follow the run of the mill teams," he told the BBC in 2015. "I wanted to have a team that was more mid-table that could give me more emotional rollercoaster moments." William was born 26 days after Villa's European Cup final win against Bayern Munich on 26 May 1982. He has spoken previously about the joy he gets from following a club with the ups and downs that Villa have experienced. "Aston Villa's always had a great history. I have got friends of mine who support Aston Villa and one of the first FA Cup games I went to was Bolton v Aston Villa back in 2000. Sadly, Villa went on to lose to Chelsea (in the final)," he added. "It was fantastic, I sat with all the fans with my red beanie on, and I was sat with all the Brummie fans and had a great time "It was the atmosphere, the camaraderie and I really felt that there was something I could connect with."

