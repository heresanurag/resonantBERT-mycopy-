title: Prince of Wales takes Prince George to watch Aston Villa in Paris in Champions
  League - BBC Sport
date: '2025-04-10'
section: Aston Villa
url: http://www.bbc.co.uk/sport/football/articles/c87pplxg30vo
content: |-
  The Prince of Wales says it was a "big deal" for him to take his son Prince George to Paris to watch Aston Villa face Paris St-Germain in the Champions League quarter-finals.

  Prince William (right) watched the match alongside his son Prince George (centre) and friend Thomas van Straubenzee (left)

  The Prince of Wales was in Paris alongside his son Prince George and childhood friend Thomas van Straubenzee to watch Aston Villa in their Champions League quarter-final first leg against Paris St-Germain on Wednesday night. However, despite the diehard Villa fan wearing his "lucky clothes" they lost 3-1 in the Parc des Princes and face a difficult task in the return leg at Villa Park next Tuesday. Prince William said he was "pretty terrified" and "nervous" but predicted a 2-1 victory when he spoke to TNT Sports pundits Rio Ferdinand and Ally McCoist on the touchline before the game. He said it was a "big deal" to take George, who was wearing a Villa scarf, and the pair were seen punching the air and hugging when Morgan Rogers gave their team a first-half lead. But PSG, who were crowned French champions on Saturday, fought back and scored three unanswered goals to take control of the tie. Prince William, who was in the crowd for Villa's home win over Bayern Munich and in Monaco in January, was asked if he was on a "lads' tour" by former England international Ferdinand. "Well, I've got my son here as well, so I'm on best behaviour," he replied. "But I thought, you know what, it's been 43 years since anything like this has happened in my generation as a Villa fan, and I want George to experience a night out away from home in a big European competition. "I hope it's not 43 years until the next one happens, but I think those memories are really important to create and bringing him along tonight is a big deal for me."

