  Prince William's links with football extend beyond Villa as he is also patron of the Football Association. He regularly attends England matches and was at the Euro 2021 and Euro 2024 men's finals, where manager Gareth Southgate's team were beaten by Italy and Spain respectively. Prince William also attended the Lionesses win against Germany in the Women's Euro 2022 final and awarded the players their medals. He has previously enjoyed playing polo - competing on the same team as his father, King Charles. The King, like Prince Philip - the late Duke of Edinburgh - was also a keen cricketer and hosted the West Indies cricket team in 2024 before a Test match against England at Lord's. Prince Philip also took part in carriage driving and was credited with bringing it to the UK. Queen Camilla is patron of the British Equestrian Federation, while the Princess of Wales is a keen follower of tennis - becoming patron of the All England Lawn Tennis and Croquet Club in 2016. Princess Anne won the individual title at the European Eventing Championship at Burghley in 1971. She was subsequently voted BBC Sports Personality of the Year and went on to participate in the 1976 Montreal Olympic Games, riding The Queen's horse, Goodwill. Her daughter, Zara Phillips, became the first British royal to win an Olympic medal when she was part of the five-strong Great Britain eventing team that won silver behind Germany at London 2012.
