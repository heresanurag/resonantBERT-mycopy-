title: 'Bukayo Saka: Arsenal winger left out of England squad to face Andorra on Saturday
  - BBC Sport'
date: '2025-06-07'
section: England Men
url: http://www.bbc.co.uk/sport/football/articles/ceqgdzdnlqvo
content: |-
  Thomas Tuchel is set to name an experimental starting XI in England's World Cup qualifier against Andorra with Bukayo Saka left out of squad.

  Arsenal forward Bukayo Saka has been left out of the England squad that will face Andorra with Thomas Tuchel expected to field an experimental starting XI in Saturday's (17:00 BST) World Cup qualifier.

  BBC Sport has learned the German coach has looked at the prospect of deploying Chelsea right-back Reece James in the unfamiliar position of left-back, while Liverpool midfielder Curtis Jones has emerged as an option on the right side of defence.

  Elsewhere, Aston Villa's Ezri Konsa and Newcastle's Dan Burn are options in central defence.

  Chelsea playmaker Cole Palmer is expected to make his debut under Tuchel after impressing during training this week.

  Declan Rice is being considered for a rest, with a view to the Arsenal midfielder playing in Tuesday's friendly against Senegal. That may open the door for Jordan Henderson and Jude Bellingham to figure in a central role.

  Bayern Munich forward Harry Kane should spearhead the attack, with Chelsea winger Noni Madueke and Aston Villa midfielder Morgan Rogers among the options Tuchel has looked at out wide.

  Arsenal forward Saka has been left out of the squad to face Andorra.

  Speaking on Friday, head coach Tuchel revealed the 23-year-old had only completed one full training session during the week, with his omission likely to be linked to his fitness.

  Saka has yet to play under Tuchel, having missed the German's first camp through injury.

  It remains to be seen whether he can play a part in the friendly against Senegal.

  Atletico Madrid midfielder Conor Gallagher and Villa striker Ollie Watkins, who has returned home with a minor injury, have also been left out of the matchday party.

  It was confirmed on Friday that Watkins would be leaving the group as precaution, but it was unclear whether Gallagher's omission was also down to a fitness issue.
