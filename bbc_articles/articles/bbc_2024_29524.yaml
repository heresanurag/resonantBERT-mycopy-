title: Prince William's rugby skills tested in South African township - BBC News
date: '2024-11-04'
section: UK
url: http://www.bbc.co.uk/news/articles/cj6krygxpdgo
content: |-
  The Prince of Wales has been playing rugby on a visit to a township outside Cape Town.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The Prince of Wales has dusted off what he called his “rusty” rugby skills with some legends of the sport on a visit to a township outside Cape Town. Prince William arrived in South Africa on Monday for a visit that will focus on his Earthshot environmental prize and supporting young people. He met children from the Ocean View, Masiphumelele and Langa townships, many of whom have challenging home lives - rugby is used to support them as well as unite communities and mentor schoolchildren. The prince was shown around by some of South Africa’s most well-known rugby players, including former Springboks Joel Stransky and Percy Montgomery.

  But it was the sight of Tendai Mtawarira, better known as “The Beast” and South Africa’s most capped prop, that brought back some vivid memories. “The last time I shook his hand was back in 2013 in Cardiff where we’d just won the Prince of Wales cup against Wales and he usually makes a turn in the changing room,” said Mtawarira. “I was only only wearing my towel and was half naked back then so he said it was a change for me to be fully dressed.” Prince William joined in a training session with some young players where his royal status was no barrier to the odd rough tackle. Tom Solimi from the Ocean View Secondary School, who has international ambitions and wants to be a South African Springbok, was one of several who tried their luck coaxed on by teammates. “It was just a game, it was just a bit of rugby,” he said. “We wanted to play a little game to make him welcome, and we really enjoyed it.” The visit was organised by the Atlas Charity, which was created by England 2003 Rugby World Cup winner Jason Leonard. He was in the township to show the prince around. “Some of the boys and girls want to get away from their normal home life,” he said. “They come to a place like this that is a safe sanctuary where they can spend two to three hours here being a child.”

  With so many former rugby players on the pitch, the prince’s own performance came in for some scrutiny. The critique from Leonard was kind but cautious. “He’s not too bad. He said it had been a few years since he played, so you’ve got to cut him some slack.” Prince William is in South Africa this week for his Earthshot Prize awards ceremony. The prize supports eco-friendly innovations from around the world, with five winners each receiving £1m. The prince, who will be wearing sustainable clothing during his time in Cape Town this week, started his visit by meeting 120 young people from across Africa and South East Asia who are part of the Earthshot Climate Leaders Youth Programme. He told them: “What you’re going to do is change the world. "This is the generation that is going to do that. You are creating solutions and a better life for all of us". The Earthshot Prize winners will be announced at a ceremony on Wednesday night in Cape Town.

