title: Taylor Swift 'devastated' as fan dies before show - BBC News
date: '2023-11-18'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-67461445
content: |-
  The pop star gave out water bottles to fans during the concert in Brazil, amid sweltering heat.

  Taylor Swift has said she is "devastated" after a fan died before her concert in Rio de Janeiro, Brazil, on Friday night.

  In a statement on Instagram, the pop star said her heart was "shattered", adding: "She was so incredibly beautiful and far too young."

  It came as temperatures reached 39C in the city, which is the latest stop on Swift's record-breaking Eras Tour.

  Brazil has been experiencing an unprecedented heatwave during recent days with red alerts, warning of serious danger to health, issued across the country.

  The star was seen handing out water bottles to fans during the concert.

  "I can't believe I'm writing these words but it is with a shattered heart that I say we lost a fan earlier tonight before my show," Swift wrote.

  "I can't even tell you how devastated I am by this."

  Swift said she would not be able to speak about the incident from the stage because she felt "overwhelmed by grief" whenever she tried to talk about it.

  "I want to say now I feel this loss deeply and my broken heart goes out to her family and friends."

  She added that this was "the last thing" she thought would happen when she brought the tour to Brazil.

  Swift said she had little other information about the death.

  However, according to Brazilian newspaper Fohla De Sao Paolo, the fan fainted at the stadium and later died, with the cause of death being given as cardiorespiratory arrest.

  Taylor Swift addressed the death in an Instagram post

  In videos and pictures circulated on social media, Swift was later seen urging staff at the stadium to give water to fans during the concert.

  At one point, while singing All Too Well, she was seen throwing a water bottle into the crowd.

  Swift's Instagram story, commenting on the death of the fan, was posted after the show.

