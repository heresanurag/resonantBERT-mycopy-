content: |-
  This is how people in Bromley, London – including her former tennis coach – reacted to the result.

  Emma Raducanu, the teenage tennis sensation from Bromley, London, has won the US Open.

  The 18-year-old, who is the first qualifier to win a Grand Slam, defeated Leylah Fernandez in straight sets.

  This is how people in her hometown, including her former tennis coach, reacted to the result.
