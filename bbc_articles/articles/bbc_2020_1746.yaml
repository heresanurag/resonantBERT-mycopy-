title: Former SNP MP Angus Robertson bids to run for Holyrood in 2021 - BBC News
date: '2020-02-18'
section: Scotland politics
url: http://www.bbc.co.uk/news/uk-scotland-scotland-politics-51545141
content: |-
  The SNP's former Westminster leader hopes to contest the Edinburgh Central seat held by Ruth Davidson.

  Angus Robertson was an MP from 2001 until 2017

  The SNP's former leader at Westminster, Angus Robertson, has announced plans to contest the Holyrood seat held by Ruth Davidson.

  Mr Robertson will seek the party's nomination to stand in Edinburgh Central at the 2021 election when Ms Davidson is expected to step down.

  The ex-Moray MP told the Edinburgh Evening News he intends to overturn the Tories' 610-vote majority.

  Ms Davidson took the seat from the SNP at the last Scottish election in 2016.

  But in October she announced she was unlikely to seek re-election, two months after she quit as Scottish Conservative leader.

  Since then she accepted and then turned down a lucrative job with a lobbying firm and has been nominated for a seat in the House of Lords.

  Ruth Davidson led the Scottish Conservatives from 2011 to 2019

  Announcing his intention to contest the seat, Mr Robertson accused Ms Davidson of putting "other career interests in London ahead of the people she still represents at Holyrood" and argued that constituents "deserve better".

  Mr Robertson also highlighted his links to the capital, having grown up in Stockbridge.

  He said: "Edinburgh Central deserves a full-time MSP who will put the interests of their constituents first.

  "At present, the heart of Scotland's capital city is represented by somebody who would prefer to be in the House of Lords and pursuing a career in public relations.

  "Edinburgh Central needs an MSP that has a full-time commitment to their constituents and constituency, and the SNP needs a full-time candidate to win this important seat. I believe I am best placed to be that candidate.

  "I will not pretend to constituents that I can be in two places at the same time."

