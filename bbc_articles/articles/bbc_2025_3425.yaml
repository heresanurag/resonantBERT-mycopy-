  Scotland's Clarke 75% sure he will leave after 2026 World Cup

  Coverage: Watch on BBC Scotland & iPlayer, listen on BBC Radio Scotland & Sounds, live text coverage on the BBC Sport website & app

  Scotland head coach Steve Clarke says there is a 75% chance he will not renew his contract after the 2026 World Cup. The 61-year-old has led Scotland to back-to-back European Championships and is aiming to take the national side to a first men's World Cup since 1998. However, with his contract due to run out after the showpiece in the United States, Canada, and Mexico, Clarke was asked if he is sure this will be his final 17 months in charge. "I'll go on percentage - 75%," said the former West Brom and Kilmarnock manager. "That's something that I haven't spoken to my bosses about. I said before the September camp last year that I'm going to run my contract down and then we'll see what happens."

  Scotland face Greece in a two-legged Nations League play-off later this month as they aim to stay in the competition's top tier. Then they will attempt to negotiate a World Cup qualifying group containing either Portugal or Denmark, Greece and Belarus. Scotland missed out on the 2022 World Cup in Qatar after losing to Ukraine in a play-off and Clarke says the next 12 months will ultimately determine his future. "If we have a fantastic year and get to the World Cup and do well at the World Cup, maybe somebody will persuade me to stay," he explained. "But at this moment in time, I'm happy to run my contract down. "I want to go to America, that's the bottom line. I want to help this group of players to get to the World Cup in America. "I've still got 10 big games this year to determine my future moving forward. "Whether I stay here or whether I go somewhere else, the next year can determine my future."
