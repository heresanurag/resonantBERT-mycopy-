title: Murder arrest after three men found dead in Colchester - BBC News
date: '2019-10-07'
section: Essex
url: http://www.bbc.co.uk/news/uk-england-essex-49951572
content: |-
  Two men are found in a property and another in a car after police are called to reports of a fight.

  Police were called to Wellesley Road in Colchester on Saturday night

  Three men have been found dead after reports of a fight in Colchester.

  Essex Police said a 32-year-old man was being questioned on suspicion of murder over the deaths on Saturday night.

  Two men were discovered at a property on Wellesley Road and a third was found in a car outside.

  Officers, who were called to the scene at about 22:15 BST, said they were "keeping an open mind" about the circumstances.

  The force urged anyone in the area between 18:00 BST on Saturday and 01:00 on Sunday who saw anything suspicion or unusual to contact them.

  David Beales, 64, an Anglican minister who lives on the street opposite the property affected, said he "heard nothing" overnight and woke up to find police officers walking up and down the road.

  "This is normally quite a peaceful street," he said, adding: "There has been a history of sometimes noise in the flats where the incident took place, but nothing dire like this."

  A police cordon remained at the scene on Sunday afternoon

