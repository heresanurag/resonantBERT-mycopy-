title: 'Michelle Trachtenberg: Buffy the Vampire Slayer and Gossip Girl star dies
  at 39 - BBC News'
date: '2025-02-26'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/c778rp2je47o
content: |-
  Trachtenberg, 39, found fame in television series Buffy the Vampire Slayer, and later Gossip Girl.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Michelle Trachtenberg on the red carpet over the years

  Actress Michelle Trachtenberg, who rose to fame as a child star in the 1990s and 2000s, has died aged 39. Police in Manhattan said they responded to an emergency call on Wednesday morning and found Trachtenberg "unconscious and unresponsive". She was pronounced dead at the scene. The US actress was best known for playing Buffy the Vampire Slayer's younger sister Dawn Summers, and later took on the role of manipulative socialite Georgina Sparks in Gossip Girl as an adult. Trachtenberg made her film debut in Harriet the Spy in 1996, and also appeared in several Nickelodeon productions. Co-stars paid tribute to her, describing her as a "fiercely intelligent" person who "cared deeply" about her work.

  Her family's representatives confirmed her death in a statement. "It is with great sadness to confirm that Michelle Trachtenberg has passed away. The family requests privacy for their loss," it said. Authorities said her death was not being treated as suspicious. "Criminality is not suspected. The medical examiner will determine the cause of death. The investigation remains ongoing," the NYPD said in a statement.

  Michelle Trachtenberg, pictured in 2020, rose to fame in the early 2000s

  Trachtenberg got her start in acting at age nine on the Nickelodeon television series The Adventures of Pete & Pete. In the early 2000s, she was nominated for several acting awards - including a Daytime Emmy Award - for her role in Buffy the Vampire Slayer. She also starred in films including EuroTrip, Ice Princess, Killing Kennedy, and Sister Cities. Blake Lively, a Gossip Girl co-star, said everything Trachtenberg did "she did 200%". "She laughed the fullest at someone's joke... she cared deeply about her work, she was fiercely loyal to her friends and brave for those she loved, she was big and bold and distinctly herself," she wrote on social media. "The real tragedies in life are the ones that blindside you on an idle Tuesday. Hold those you love and have loved dear." US comedian Rosie O'Donnell, who starred alongside Trachtenberg in her Harriet the Spy debut, said her death was "heartbreaking". "I loved her very much. She struggled the last few years. I wish I could have helped." Josh Safran, a writer and producer on Gossip Girl, said it was "an honour and joy to write for Michelle for so many years", as she had a "clear voice" as an actor. "You heard her as you typed," he wrote. "You knew she'd make each line rougher, more real, much funnier - and that made the writing better.

  Trachtenberg (far right) with other Buffy cast members, including Marsters (centre right) and Hannigan (centre left), in 2001

  Buffy cast member James Marsters said on social media that the actress was "fiercely intelligent, howlingly funny, and a very talented person". "She died much too young, and leaves behind scores of people who knew and loved her," Marsters said. How I Met Your Mother actress Alyson Hannigan, who played Willow Rosenberg in Buffy, shared a series of photos on social media, including images of the two sharing scenes, and said Trachtenberg "brought a loving energy to the set of Buffy". Trachtenberg first appeared in Gossip Girl - which ran from 2007 to 2012 - in 2008. She returned to the role for two episodes of the second season of HBO Max's reboot in 2023. Her last major acting role was in 2021 as the host of a true-crime docuseries Meet, Marry, Murder, which appeared on digital streamer Tubi. In 2021, Trachtenberg accused Buffy the Vampire Slayer creator Joss Whedon of inappropriate behaviour on set, after her co-star Charisma Carpenter said she had been left traumatised due to the treatment she received from Whedon.
