  Elsewhere in the industry, former Hollyoaks and Holby City actor Jeremy Edwards found work, like Jarvis, as a security guard, and as a gardener. As Celebs Now reported, in 2011, he noted: "I don't know any actors who work consistently without other work. A lucky few, but not many, I had a good 10-year run!"

  Gemma Merna, who played Carmen McQueen in Hollyoaks for eight years - winning best comedy performance at the 2007 British Soap Awards - now also works as a yoga instructor and personal trainer.

  Meanwhile, Geoffrey Owens, who played Elvin in the Cosby Show between 1985 and 1992, thanked supporters last year after photos of him working as a cashier at US grocery Trader Joe's were mocked online.

  Rap star and Cosby Show fan Nicki Minaj donated $25,000 (£22,433) to the "legend" after he was similarly job-shamed, however, Owens donated the amount to a fund helping actors in need.

