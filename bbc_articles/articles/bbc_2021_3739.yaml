content: |-
  A selection of your pictures of Scotland sent in between 12 and 19 March.

  Send your photos to scotlandpictures@bbc.co.uk. Please ensure you adhere to the BBC's rules regarding photographs that can be found here.

  Please also ensure you follow current coronavirus guidelines and take your pictures safely and responsibly.

  Conditions of use: If you submit an image, you do so in accordance with the BBC's terms and conditions.

  Tom and Jerry: Peter Jones said this plucky field mouse was giving as good as he got from Oscar the cat in his Kinloss garden

  It's a frog's life: Frogs spawning in ponds all across the country signals that spring is here. This frog picture was taken in Edinburgh by Philip Gifford

  Bird watching: This beautiful goldfinch turned the tables on Danielle Morris to watch her in her garden in Edinburgh

  Blooming beautiful: Springtime has arrived in Deborah Thom's garden in Inverness with all these golden crocuses

  As light as a feather: Rick Harvey identified this as a female kingfisher when he came across it in Aberdeen

  Rocket to the moon: Brian Thompson took this lovely picture one early morning of the moon over Victoria Tower at Greenock town hall

  Heron time: This magnificent bird timed it precisely to find its breakfast in Alford in Aberdeenshire. Pic: Kathleen Stuart

  In otter news: Iain MacCormick came upon this chap having his breakfast on Benbecula while out for his morning stroll

  Free as a bird: A dipper in Murieston soaking moss prior to using it to build its nest. Picture by Geoff Donnelly

  Sun city: Clarissa Linnitt managed to catch the last of the rays illuminating Edinburgh city centre after work

  A bird in the hand: Hayley Grant had this robin eating mealworms from her hand in her back garden in Wick, Caithness

  Strike a pose: John Dyer caught this mallard duck in a yoga pose at Strathclyde Loch in Motherwell

  Bird's eye view: This picture of a hungry but awkward pigeon in Joan Grady's back garden in Glasgow really made her smile

  Sunset beach: Gaynor Duthie had the perfect view during her Mother's Day stroll at Crovie pier in Aberdeenshire

  A wilderness re-tree-t: Julie Sneddon captured Loch Etive at its best in all its remote beauty

  Branching out: A fascinating image captured by Raymond Sutherland of a tree growing out of rocks on Blackford Hill in Edinburgh

  Once in a blue dune: Martin Neill took this picture of Aberdeenshire's Balmedie Beach from the sand dunes on a sunny morning

  Knot for sail: The Royal Navy's aircraft carrier HMS Queen Elizabeth, arriving in impressive style in the Firth of Clyde for the first time. Michael Leek said his picture shows the ship approaching Dunoon, on the Cowal Peninsula

  Stand off: Sophie Bolton was met by a huge flock of sheep during her walk at Kilninian on Mull

  It doesn't cost any Monet: Everyone can look at this painting on the side of a building in Gourdon for free. Picture by Patricia Hall

  For all who have served, thank you: The sun casts a poignant glow over the Commando Memorial at Spean Bridge. Picture: Neil Lea

  Fancy meeting you hare: Ken O'Keefe had a captivating encounter with this brown hare in a field near Glenrothes in Fife

  Fall fowl: Hopefully Katie Percival didn't have any "deliveries" from above as she watched these crows flying to their nests near the cemetery in Keir Mill, Dumfriesshire

  Emotional solar coaster: Danny Garry had an uplifting moment watching the sunset on Cairnpapple Hill

  Village life: Lauren Foster captured this sunrise in Craigtoun country park, St Andrews, overlooking what is known as the Dutch Village

  That wheel good factor: Barry Macintyre captures so much life in this photograph of rusting old farm equipment at the former Drumbeg Quarry near Drymen

  Wave goodbye to the winter: Dorothy Aitken braced a windy Seamill beach to take this shot, but hopefully summer is just around the corner

  Everyone disa-pier-ed: A deserted Oban Ferry Terminal just before Richard Gawthrope caught the last boat home to Mull

  An all-time glow: Maud Chalmers took this picture of the beautiful reflection on the water of the sunset over Cocksburn Reservoir at Bridge of Allan

  Don't look: Adam Kautsky said: "I really liked the magic of the moment in Maritime Lane in the old port of Leith, Edinburgh"

  I'm at a moss for words: A snap of a sunny spring day on the High Bridge Path with a snow-clad Aonach Mor in the distance, by Mark Reynolds

  Sea no evil: Ian Barnes took this photo of Cove Harbour near Dunbar in East Lothian

  Dressed in all its finery: Little Jessica Shaw loved seeing this peacock walking along her street in Dunfermline

  Fur real? Adam Henderson couldn't believe it when this vole popped out of a wall in woods near Dundee

  Walnut Whip: Marina Moreno took this wonderful picture of the new W Hotel in Edinburgh as the sun was setting

