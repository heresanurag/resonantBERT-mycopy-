title: Inside Hong Kong's parliament after protesters were evicted - BBC News
date: '2019-07-01'
section: General
url: http://www.bbc.co.uk/news/world-asia-48834050
content: |-
  The BBC's Nick Beake goes inside the Legislative Council to see the damage after activists broke in.

  Pro-democracy activists stormed the building during a day of protests on the anniversary of Hong Kong's transfer of sovereignty to China from Britain.

  The BBC's Nick Beake has been inside to see the damage.
