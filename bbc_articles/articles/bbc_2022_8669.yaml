id: bbc_2022_8669
title: Sri Lanka protesters set PM's home on fire - BBC News
date: '2022-07-13'
section: General
url: http://www.bbc.co.uk/news/world-asia-62109020
content: |-
  Prime Minister Ranil Wickremesinghe was not in the building at the time.

  Sri Lankan President Gotabaya Rajapaksa has announced he will step down after protesters stormed his official residence and set the prime minister's house on fire.

  Neither the PM nor the president were in the buildings at the time.

  There is anger among demonstrators at the country's rampant inflation and shortages of food, fuel and medicine.
