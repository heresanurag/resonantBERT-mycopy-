title: 'Norton Canes: Woman arrested over Christmas Day village murder - BBC News'
date: '2024-12-26'
section: Stoke & Staffordshire
url: http://www.bbc.co.uk/news/articles/c0kv181n5k1o
content: |-
  An investigation is ongoing following the death of a man found in cardiac arrest on Christmas Day.

  Police were called to reports of a man in cardiac arrest in Norton Canes, Staffordshire

  A woman has been arrested on suspicion of murder after a man died at a house in a Staffordshire village on Christmas Day. Staffordshire Police say officers were called to a report of a man in his 30s in cardiac arrest on Elm Road, Norton Canes, at around 03:25 GMT on Wednesday. Despite medical efforts he died shortly afterwards and a post-mortem examination is scheduled to take place on Boxing Day morning, police add. The 33-year-old woman, from Cannock, remains in custody and is being questioned by police.

  Police say the man's next of kin have been informed. The force added that a crime scene was expected to remain at the address for a number of days. Local residents would, they said, see an "increased presence of neighbourhood officers in the area as they provide reassurance and help to gather evidence".

