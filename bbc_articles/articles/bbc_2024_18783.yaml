  • None If you feel it is an emergency, call the police immediately on 999

  It’s hard to marry the brutal nature of the weapons and the shocking injuries they can inflict with the gawky young men shifting nervously on the pavement. Removing their balaclavas has taken away any intimidating edge. These are not hardened gangsters. They try to be cocky in front of the officers, but they aren’t convincing. They are children, wide-eyed and worried. But still, they were armed and capable of something very dangerous. “Some of things they are doing to each other are horrific,” PC Jones says. “They don’t seem to put the same value on human life. Maybe it’s self-value, or their value for each other. “We are having success, but we need to do more, and not just policing.”
