title: 'Premier League opening-weekend predictions: Chris Sutton faces The Courteeners
  frontman Liam Fray - BBC Sport'
date: '2024-08-16'
section: Premier League
url: http://www.bbc.co.uk/sport/football/articles/cql3vn4edxxo
content: |-
  BBC Sport football expert Chris Sutton takes on The Courteeners frontman Liam Fray to make his predictions for the opening round of Premier League fixtures.

  A new season, and a new challenge for BBC Sport's prediction expert Chris Sutton. Sutton faced off against a guest for each of the 38 game weeks in 2023-24 and triumphed 21-10 (with seven draws) to secure his second predictions title in a row. He will have a guest each week this time too, but now you can find out if you can do any better. You can make your own score predictions below, and then see which scoreline is the most popular. That will be used to calculate your points total to compare with Sutton and his guests. "I am hoping to get more of a challenge from you lot," Sutton said. "Last season it turned into a bit of a canter for me - I've just been too good." A correct result (picking a win, draw or defeat) is worth 10 points. The exact final score earns 40 points. Sutton's opponent for the opening round of games is The Courteeners frontman Liam Fray.

  The Courteeners' seventh studio album, Pink Cactus Cafe, is released on 25 October. Their new single, Solitude Of The Night Bus, is out now.

  Liam is a Manchester United fan who is feeling excited about the new season under Erik ten Hag. "We have been so unlucky to pick up more injuries, but with these new signings we look like we mean business," he told BBC Sport. "What we have done in the transfer market feels a lot more professional and thought out than it has done in previous years. The only issue is that everyone else looks good too! "Look, we have to improve on eighth place from last year, we simply have to, but there are a lot of teams who like us are vying for fourth place so it is going to be very difficult. "We arguably got away with eighth because of the number of late goals we scored - we had Scott McTominay to thank for a few of those, and I really hope he stays. "But we have definitely got enough quality now and the return of Jadon Sancho is going to be interesting as well. "There is a very good player there, and we have not really seen it at United. You never know - if Ten Hag starts playing him and it clicks for Sancho then we have got another talented attacker in our squad. "On the basis of last year, and I have to be honest, my heart says we can make the top four this time, but my head says no. "But let's see. I am always optimistic and we will find out more when the season starts, we get players back from injury and we see how it all fits together." Chris Sutton and Liam Fray were speaking to BBC Sport's Chris Bevan.

  The first weekend of the season is always tricky to predict for various reasons, and with Manchester United I really don't know what to expect. I am not going to give them a win just because they are Manchester United and have had some great teams in the past, put it that way. They won the FA Cup final with a good performance against Manchester City, but they finished eighth in the Premier League and their manager Erik ten Hag will be under pressure from the off. I remember their start to last season when they beat Wolves in their first game but were very unconvincing, and this time performances are really important for Ten Hag, as well as results. Fulham sold Joao Palhinha to Bayern Munich in the summer, and the likes of Tosin Adarabioyo, Bobby De Cordova-Reid, Willian and Tim Ream have all left too. They had a pretty decent season last time out and, although their results did drop off in the last couple of months of the campaign, they won at Old Trafford in February. I can see them getting something this time, too. I can only base these predictions on what I see and I have not seen enough good performances from United under Ten Hag to have any confidence in them playing well. Ten Hag has made a few new signings but they will miss injured striker Rasmus Hojlund up front, and they need to show they can control this kind of game at home. Liam's prediction: I am going, and it will be good to get back in there and hear everyone singing. It is a big blow to be without Hojlund who had really found his form at the end of last season, and looks so fearless. I still think we will win though, and I don't really care how - getting three points is the most important thing. 2-0 Liam on Ten Hag: I really like him and I am glad he stayed. I would like to think that even if results are not great to begin with, the owners who stuck by Ten Hag in the summer will take into consideration the injuries we have got and give him some time.

  I love the job Ipswich boss Kieran McKenna has done, with back-to-back promotions, and they have brought a few players in, including goalkeeper Arijanet Muric from Burnley. Kalvin Phillips is set to sign on loan for the season too. The way they start the season is going to be so important to get some confidence and a foothold in the top flight, as it is with all the promoted clubs, and Ipswich have got it tough because after facing Liverpool they go to the Etihad Stadium next weekend. Liverpool have not signed anyone yet under new boss Arne Slot but their firepower is incredible and I don't see Ipswich keeping them out. Ipswich were really brave with their playing style in the Championship but this is another step up, and it is a big one. I reckon they will score, but Liverpool will get more. Liam's prediction: I've heard Ipswich are quite gung-ho and a good watch, but I don't know how that will work out for them in the Premier League. I can't see anything other than a Liverpool win. 0-2

  Many people are tipping Arsenal to win the Premier League and in some ways I understand why, but their title hopes really come down to what Manchester City do, and if they dip or not. Mikel Arteta's side can not do much more than last season, when they took the title race to the final day, but they really need to get off to a flyer. I think they will. Wolves were another team who faded badly in the final few weeks of last season but their manager, Gary O'Neil, still exceeded expectations after taking charge only days before it started. He has got some work to do on his squad because they still need to replace Pedro Neto and Max Kilman, who both left in the summer, and this is a tough game for them to kick off with. Liam's prediction: A few people seem to think it is going to be Arsenal's year this year, but I can never see past Manchester City. Like City, Arsenal might be missing a few players who are just back in training after the Euros but they should win this one. 2-1

  Everyone will be watching this to see what brand of football Brighton play under their new manager Fabian Hurzeler, and if he has tweaked it compared to their style under Roberto de Zerbi. If the Seagulls players are still settling into a new system then it definitely helps Everton. We know that they will be battle-hardened under Sean Dyche and I just wonder if the Toffees will have too much nous for them. Dyche always seems to have been fighting fires since taking over but without last season's points deductions they would have been in mid-table for most of the campaign and that's where I think they will end up this time. This is Everton's last season at Goodison Park, and I am expecting them to start it with a home win. Liam's prediction: I am mates with Everton keeper Jordan Pickford so I have got to back them here, he won't be happy if I don't! I love watching him for England but he encapsulates his club so much because he has got so much character and spirit, so I hope for his sake they get off to a half-decent start. 2-1

  This is another tough game for one of the promoted sides. Newcastle have got some quality players and they are also such a powerful, physical and relentless outfit. Southampton will know what is coming, but I am not sure they will be able to stop it happening. Liam's prediction: I heard a Southampton fan talking recently about whether they would rather be at the top of the Championship or in the Premier League getting trounced every week and he said he preferred to be in the Championship. I can understand why - I have gone for Newcastle to win this quite easily and it won't be much fun for Southampton if it turns out like this all the time - hopefully it won't. 3-0

  I was wondering how Bournemouth would replace Dominic Solanke's goals and then the news broke about them bringing in Brazil striker Evanilson from Porto, which is an exciting signing for their fans. Things have been relatively quiet at Nottingham Forest compared to what usually happens with the ins and outs there each summer, and hopefully there will be less drama when the season starts too. I supported Forest as a boy so I always want them to do well, and I do think they will crack the Premier League eventually, and have a smoother ride. Maybe it will be this year. Bournemouth won 3-2 at the City Ground in December, with Solanke completing his hat-trick with a stoppage-time winner after Forest had been reduced to 10 men just 23 minutes into Nuno Espirito Santo's first game as Forest boss. I don't see this game having quite so many thrills and spills, and I am going for Forest to edge it. Liam's prediction: Forest are going to be bobbing around the relegation zone again and I fancy an away win here. Bournemouth will miss Solanke but they played some good football last season. 1-2

  I like what West Ham have done in the transfer market this summer and I am really excited about seeing Germany striker Niclas Fullkrug in the Premier League. Fullkrug is an old-fashioned, throwback, type of striker but he can finish. Style-wise, the Hammers will be back to the 'West Ham way' under new boss Julen Lopetegui, which is what their fans wanted. Expectations are high so let's see how they get on. For Aston Villa, the question is whether they can hit the heights of last season again. It is going to be difficult for them to combine a top-four challenge with Champions League football once that gets started, and there might be some bumps in the road. This is a difficult one to call because there are reasons to back both teams, so I am going to go with a draw. Liam's prediction: I like watching Villa - I think John McGinn is brilliant - but both of these teams are going to have good seasons. 1-2

  England striker Ivan Toney is still at Brentford and who knows how that will pan out. They will be fine if Toney does leave, because they carried a threat for so long without him last season anyway, and I like the balance in their team. Crystal Palace ended last season really well under Oliver Glasner but I am not sure how they will shape up this time. Jean-Philippe Mateta has been at the Olympics, Michael Olise has left, while Marc Guehi and Joachim Andersen could be sold as well - so we could be seeing a very different Palace. We will have to wait to see how things settle down for both sides but, in the meantime, this is another game with draw written all over it. Liam's prediction: I think both teams will be pretty attacking so I can see a few goals. 2-2

  Several of Manchester City's stars won't play at all, because they only returned to training this week, but the likes of Kevin de Bruyne and Bernardo Silva will be able to play more minutes after featuring as late substitutes in the Community Shield. I have no idea what to expect from Chelsea, and I don't even know what the club is trying to do anymore. Is their priority to build a team to win trophies, or is there some other business strategy going on? Chelsea have got some talented players and Cole Palmer will have a say again against his former club, but I still think City will find a way to win it. Liam's prediction: It pains me to say it but I can't see anything other than another City victory. They are just so strong. 0-2

  I am hearing a lot of nonsense about Tottenham and how their manager Ange Postecoglou 'needs a good start' to the new campaign. I don't understand why he is under pressure now at the start of his second season. The Spurs fans were bored and fed up every weekend under Jose Mourinho and Antonio Conte, but they were entertained last season and almost made the top four too - all without Harry Kane. Nobody can argue that Ange did not make progress, so why is he being questioned? It feels like people are waiting for him to fail, and I think that is deeply unfair. I don't think it will bother Postecoglou, though. He will just plough through it. He has managed for a long time and has had huge success. I am expecting Spurs to have another good season under him, especially now they have signed Solanke, which looks like an astute bit of business. Leicester will be well-organised under Steve Cooper, and they probably stand the best chance of staying up out of the three promoted clubs, but I think Spurs will be too strong for them. Liam's prediction: I like Ange a lot and I love watching James Maddison too. Maybe Solanke could bring the best out of Son Heung-min again, and I see Spurs as being a big threat to United getting fourth. 0-2
