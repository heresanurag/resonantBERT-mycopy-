title: 'Euro 2024 stickers: Why are Topps albums missing players? - BBC News'
date: '2024-04-23'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-68882610
content: |-
  A new company has taken over the famous collectible favourite - but some fans have called foul.

  Trading card company Topps is the new provider of the official Euro 2024 sticker album

  You might have done it solo, with friends or even with people in the office... and you wouldn't be the only one.

  We've been collecting, swapping and completing Panini's football sticker albums for almost 50 years.

  But this year's Euro 2024 books are set to look a bit different, with trading card company Topps taking over responsibility for the first time.

  They kicked off their collection last month, with footy manager Jose Mourinho as the face of the launch. But it's a few other faces - or the lack of them - which have got people talking.

  Household names including Man City's John Stones and Phil Foden aren't in the collection - and neither are wingers Marcus Rashford and Bukayo Saka.

  Instead, they've been replaced with players who have made few or no England appearances - such as Rico Lewis and Leicester City's Luke Thomas.

  And, despite not qualifying for the tournament, the Wales team is included in packs.

  Some of the tournament favourites, including England and Germany, also won't be in their official kits.

  Has something come unstuck?

  Topps might have become the official provider of the Euro 2024 sticker album and have most of the rights to player likenesses, kits and club badges - but they don't have all of them.

  That's because Panini still holds the rights for some top European teams including England, Spain, Germany and current Euros champs Italy.

  Collector Harry says the design of the new album is good, but he's less impressed by some elements

  And the news has led some long-time fans to wonder if the shine's come off their hobby for the new tournament.

  Harry completes album books as a hobby and uploads the results on YouTube. He likes the new Topps album but says it has its flaws.

  "The graphics are more on-point - the picture is up there - it's just the finer details that've let us down," he says.

  The 31-year-old thinks the final product feels "rushed" and the missing elements have ruined the experience of completing the book.

  "Can you imagine getting one of the rarest cards and it isn't licensed?" he says.

  "For a company as big as Topps I would've thought the finest details matter, so it is disappointing for myself and other collectors out there."

  Fellow fan Daniel also decided to try out the new official albums, but has also been left disappointed at some of the players included

  "England has Rico Lewis," he says.

  "No disrespect to Rico Lewis but he's played 90 minutes for England and probably isn't even going to the tournament.

  "Which spoils it a bit, it takes the excitement out of it.

  "It feels like it defeats the purpose of even having a sticker book."

  A spokesperson from Topps told Newsbeat it was "proud" of its first sticker collection but admitted it was disappointed that a "small number of players" were missing.

  "This is due to the tournament's former sticker partner having blocked certain parts of the collection, to the detriment of the fans," they said.

  "Unlike the former sticker partner, we are committed to the fans and believe the offering of stickers and cards - and range of current and former players - will get everyone excited for the tournament."

  Panini, which has launched its own "tournament edition" album dedicated to the England team, said it was "extremely proud" to hold the official rights to the Three Lions squads.

  "Panini has been synonymous with football for over 60 years, and we remain committed to producing the best possible product for our collectors," a spokesperson said.

  "We hope our collectors will enjoy finding players for England alongside favourites from France, Germany, Italy and Spain, all in 100% official kits, in this compact and completable collection."

