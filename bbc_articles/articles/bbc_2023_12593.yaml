title: 'GDP: UK economy grew by 0.2% in second quarter of 2023 - BBC News'
date: '2023-08-11'
section: Business
url: http://www.bbc.co.uk/news/live/business-66469579
content: |-
  The 0.2% growth in the second quarter was up on the first quarter, when GDP grew by 0.1%.

  Some growth - but how do we turbo-boost prosperity?

  Those who could spend, did. Households with pandemic-era savings, or perhaps pay rises, were still able to treat themselves to non-essentials. It’s that resilience in consumer spending, and a bounce back in manufacturing, especially of cars, that helped the economy to expand last quarter, defying fears. Yet the UK remains an outlier amongst the G7 countries, our level of output is (just) below that of prior to the pandemic. And as inflation and higher interest rates bite harder, the Bank of England predicts little growth in the next year or two. Over half of homeowners have now been exposed to higher mortgage rates, and that’s climbing. Some economists are fearful that, as in the 1970s, we may face stagflation - stagnant growth and stubborn inflation. This as many peoples incomes, once you strip away inflation and tax change, slide. Despite these figures then, a crucial question for politicians remains in the run-up to the election: how do we turbo-boost prosperity?
