title: 'Sarah Everard: Police announce ''human remains'' find - BBC News'
date: '2021-03-10'
section: General
url: http://www.bbc.co.uk/news/uk-56355184
content: |-
  "What appears to be human remains" have been found in the search for missing Sarah Everard, Met Police Commissioner Cressida Dick has said.

  Metropolitan Police Commissioner Cressida Dick has announced that detectives investigating the missing Sarah Everard have found "what appears to be human remains" in woodland in Kent.

  Ms Dick spoke of the shared shock and disgust of the police and public at the arrest of a Metropolitan police officer on suspicion of her murder.

  She reassured the public that an increased police presence will be in force in the areas surrounding Sarah's disappearance along with continued large scale investigative activity.
