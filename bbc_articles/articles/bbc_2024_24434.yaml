  The prime minister speaks to Laura Kuenssberg in his first major Downing Street interview.

  The UK's recently-appointed Prime Minister Sir Keir Starmer spoke to the BBC's Laura Kuenssberg in his first major Downing Street interview.

  Sir Keir discussed the riots that erupted across the UK earlier this summer, changes to the winter fuel payment scheme and the findings from the Grenfell Inquiry’s final report.

  He also shared his assessment of the current state of the NHS, describing it as "broken".
