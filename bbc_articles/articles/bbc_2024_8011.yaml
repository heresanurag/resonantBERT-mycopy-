content: |-
  The Olivier Awards host reacted after a snapper apparently asked her to "show your leg".

  Olivier Awards host Hannah Waddingham had a message for a photographer ahead of the ceremony, after he apparently asked her to "show your leg".

  Video of the incident has been shared on social media, with many praising the actress for putting the snapper in his place.
