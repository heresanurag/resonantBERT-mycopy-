title: 'Roe v Wade: How a Mississippi legal challenge could upend abortion rights
  - BBC News'
date: '2022-06-24'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-59486375
content: |-
  The Supreme Court is being asked to overturn the 1973 ruling that legalised abortion in the US.

  Mississippi has called on the Supreme Court to overturn legalised abortion in a case that directly challenges the historic 1973 Roe v Wade ruling.

  If successful, America’s abortion policies could be transformed. The decision may not come until next spring.

  The BBC spoke to protesters and abortion supporters outside the last abortion clinic in Mississippi.
