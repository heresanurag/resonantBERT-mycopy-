  Linda De Sousa Abreu has appeared in court charged with misconduct in public office.

  Prison officer in court over sex in cell video

  Linda De Sousa Abreu was released on conditional bail at Uxbridge Magistrates’ Court

  A prison officer has appeared in court after a video was shared online that apparently shows a female member of staff having sex with an inmate in a cell at HMP Wandsworth. Linda De Sousa Abreu, from Fulham in south-west London, appeared at Uxbridge Magistrates’ Court charged with misconduct in public office. The 30-year-old spoke to confirm her name, address and date of birth. The court heard Ms De Sousa Abreu, a mother and a Portuguese national, was apprehended by police at Heathrow Airport, after notifying the prison of her travel plans. Ms De Sousa Abreu has been released on conditional bail and is due to appear at Isleworth Crown Court on 29 July.

  The Metropolitan Police said it began an investigation on Friday "after officers were made aware of a video allegedly filmed inside HMP Wandsworth". The charge states that the accused "wilfully and without reasonable excuse or justification misconducted yourself in a way which amounted to an abuse of the public's trust in the office holder by engaging in a sexual act with a prisoner in a prison cell".
