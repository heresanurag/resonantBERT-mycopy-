  David McKean, announcing the family accident on Friday, described his wife as his "everything" and said his young son was both "brave" and "deeply compassionate".

  "It is impossible to sum up Gideon here. I am heartbroken to even have to try," he wrote on Facebook. "I used to marvel at him as a toddler and worry that he was too perfect to exist in this world. It seems to me now that he was."

  The Kennedy family, an American political dynasty, has been beset by a series of tragedies.

  Mrs McKean's grandfather, New York Senator Robert F Kennedy, was assassinated in 1968. His death came less than five years after his brother, President John F Kennedy, was also shot dead.
