title: 'Newspaper headlines: Israel prepares for Lebanon ''push'' and Starmer''s penthouse
  stay - BBC News'
date: '2024-09-26'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c5yjqj1ngy7o
content: |-
  Reports on the possible entry of Israeli troops into Lebanon dominate Thursday's front pages.

  The Daily Telegraph, external says any Israeli ground invasion to force Hezbollah away from Israel's border would be a huge, complex operation. It suggests Israel would be taking on a better armed adversary than Hamas. But the paper also reports that Israeli Prime Minister Benjamin Netanyahu is understood to have given the "green light" for discussions on a proposal for a ceasefire in Lebanon. It would be linked to the conflict in Gaza and the release of hostages there. The US is said to be mediating emergency talks, with details being discussed at the UN.

  The Times, external reports that ministers are drawing up plans for Texas-style prison reforms in England and Wales which would allow inmates to win points towards reducing their jail time, by taking part in workshops. Prisoners in the US state can shorten the time they serve by earning credits for good behaviour and by going on courses aimed at addressing the underlying causes of offending, such as drug rehabilitation. The policy's understood to have brought down the prison population and the rate of offending in Texas.

  There are suggestions in the Guardian, external that the government's plans to crack down on the tax status of non-doms may not raise any extra money for the Treasury. The paper says officials are thought to be worried that the government's spending watchdog believes the policy may be undercut by the fact that so many high-earning non-doms have now left the UK.

  The Daily Telegraph, external picks up on Sir Keir Starmer's interview with the BBC in which he says the salary of his chief of staff, Sue Gray, shouldn't be a subject of public debate. It has emerged that she is paid £3,000 more than him. The prime minister said he wouldn't discuss it or the salaries of any individual members of staff.

  According to the Guardian, external, Sir Keir has become dismayed at "tensions inside the No 10 machine" because of infighting across government involving Ms Gray. He is said to be under pressure from senior aides and cabinet members to "get a grip" on the situation.

  The Daily Mail, external says Sir Keir is facing "mounting questions" about the use of an £18m penthouse in London briefly lent to him by the Labour donor, Lord Waheed Alli. The prime minister said he had used the flat during the election to help stop his son being distracted from his GCSE studies. But the Mail reports that he has also been accused of using the flat, dressed to look like his home, to record a video during Covid urging the public to work from home. The prime minister's press secretary said no social distancing rules were broken.

  The Times, Express and Guardian all carry photos of Post Office campaigner Sir Alan Bates receiving his knighthood at Windsor Castle.
