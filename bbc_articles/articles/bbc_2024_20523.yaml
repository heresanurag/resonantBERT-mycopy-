title: Appeal after boy, 13, killed in Oldbury stabbing attack - BBC News
date: '2024-08-30'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/cy4lwg3829lo
content: |-
  Police have launched a murder investigation following the attack on Thursday afternoon.

  A 13-year-old boy has died after being stabbed inside his own home in Oldbury

  Police are appealing for information from the public after a 13-year-old boy was stabbed to death at his home in the West Midlands. The murder investigation was launched after officers were called to Lovett Avenue, Oldbury, at about 16:00 BST on Thursday. West Midlands Ambulance Service said the boy received treatment from paramedics but died at the scene. Ch Supt Kim Madill, of West Midlands Police, confirmed the attack took place inside the boy's home and appealed for anyone with more information to come forward.

  Tributes have been laid at the scene in Lovett Avenue, Oldbury

  "We know that the incident took place inside his home," Ch Supt Madill said at a news conference on Friday. “I’m here to let the family and the wider community know that we will work with you and support you as we seek to find who is responsible for the death of this young boy." An online portal has also been set up to allow people to send in information, pictures or video directly to investigating officers. "My personal ask today is if you have any information at all, no matter how small, then please send it in," she reiterated. "This can include CCTV, perhaps Ring doorbell footage, you can send that directly to us by clicking on a link on the [West Midlands Police] website." Local officers and youth workers would be in the area over the coming days to address any concerns, she added.

  Ch Supt Kim Madill appealed for anyone with information or CCTV footage to contact police

  People have laid bouquets of flowers outside the house. One woman collapsed in tears after she left her tribute. A police cordon has been put in place and forensic officers have been seen at the back of the property. Detectives have also been making door-to-door inquiries with neighbours in an effort to find out more about what happened. Last year, the West Midlands had the highest rate of knife offences in England and Wales, with many victims in their teens.

  No arrests have yet been made after the fatal stabbing

  One woman who has lived on the estate for over 30 years said she was "shocked" after finding out the victim was teenager. “I used to see him playing out in the street. They used to play outside,” she said. The neighbour, who didn’t want to be named, said the news had made her feel “uneasy.” “It’s just getting worse," she said of knife crime in the region. "I haven't seen anything as close as this one."

  Dudley councillor Caroline Reid, whose own brother was killed in 1998, said the incident was "heartbreaking" and "just so sad." "I came here to pay my respects and put flowers down," she said while at the scene. "I've lived this myself and even though it was 26 years ago, it still feels like yesterday and you relive it." Ms Reid, who lives in the area, said she wanted to pay her respects as both "a parent and a neighbour." "No one will understand what it is like unless you have walked those steps and been through it yourself. There are no words. The grief is awful. "This is someone who has lost a child. His poor mother, a part of her has gone."

  Smethwick MP Gurinder Singh Josan says his thoughts, prayers and condolences were with the family and friends of the 13-year-old

  Smethwick MP Gurinder Singh Josan said in a statement: "This is a tragic waste of a young life and my thoughts, prayers and condolences are with the family and friends of the young boy."

  West Midlands Crimestoppers chair, Mohammed Zafran said knife crime was an increasing problem in the area. "We need parents to lay the foundations and more community leaders to come out in the open and put it to the authorities to ensure we have more youth hubs which can stop these youths from loitering on the streets," he said.
