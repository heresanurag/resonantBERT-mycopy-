content: |-
  In a tournament billed as cricket's attempt to break into the US, India's dramatic win provides a Hollywood ending, writes Matthew Henry.

  'India triumph as World Cup gets its Hollywood finale'

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Cricket’s attempt to crack the United States got its Hollywood ending. South Africa looked to have the T20 World Cup won before India surged back to take the title in one final twist. Throughout the finale the plots of tournaments gone by flashed before our eyes. For India it was the pain of defeat in the 50-over World Cup final eight months ago. That day a crowd of 90,000 arrived in Ahmedabad but Australia had read the wrong script. Before that there had been the thrashing by England in Adelaide in 2022, defeat by New Zealand in the Manchester rain in 2019 and the loss to West Indies in 2016, again in front of an expectant home crowd, since their last World Cup win. India had at least won one before. For South Africa the past was nothing but pain. The rain in Sydney, Allan Donald’s run-out in 1999, getting the maths wrong in 2003 and Grant Elliott at Eden Park in 2015. It all resurfaced as part of the narrative.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch the best shots of Kohli's "excellent" 76 in the T20 World Cup final

  Either way this was going to be an emotional finale, with inner demons to overcome. As it was Virat Kohli charged in to embrace Hardik Pandya, while Rohit Sharma dropped to the floor in celebration. This was Rohit’s redemption, captain of India here as he was during the disappointment last year. Having had a leading role in The Agony of Ahmedabad, he has completed the sequel - The Kensington Coronation. Kohli won the 50-over World Cup in 2011 as part the supporting cast. The then 22-year-old lifted the great Sachin Tendulkar onto his shoulders in the victory lap. This time he was the leading man. He struggled throughout this tournament, floundering as India progressed unbeaten through both group stages and the semi-finals, but was always lurking - like the baddie that has never been killed off. Kohli hit three fours in his first four balls. After that he stood casually leaning against his bat, one arm on his hip. He was back. His nonchalant flick onto the roof of the Sir Garfield Sobers pavilion will be a moment played over and over – as will the Suryakumar Yadav catch at the death and Jasprit Bumrah’s ferocious dismissal of Reeza Hendricks that was enough to send batters around the world hiding behind the sofa. In the celebrations, Rohit and Kohli stood arm in arm, before announcing they will depart this stage, with this their last T20 international.

