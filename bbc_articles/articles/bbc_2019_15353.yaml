title: 'General election 2019: Animated tour in 10 stops - BBC News'
date: '2019-12-16'
section: Election 2019
url: https://www.bbc.co.uk/news/election-2019-50787480
content: |-
  Fly through 15 hours of election results in 10 simple stops.

  (1/10) The Conservatives won 365 seats, giving Boris Johnson a majority of 80. Their 44% share of the vote was the highest since Margaret Thatcher came to power in 1979. So how did this happen?

  (2/10) Right at the beginning of the night it was clear something unusual had happened. The third seat to declare, Blyth Valley, had been Labour for nearly 70 years and was predicted to stay that way. Labour lost here by 712 votes.

  (3/10) This story was repeated again and again, as Labour's "Red Wall" in the North crumbled. Labour's vote share reduced by 13% in the North East and 10% in Yorkshire & Humber. Many of these seats voted strongly to leave the EU.

  (4/10) Many northern Conservative wins were due more to a reduced Labour vote than a large boost for the Tories. However, in Wakefield, which had been Labour since 1932, the Tories won a majority of over 3,000.

  (5/10) By around 02:00 GMT the Conservatives started to win seats in Wales, taking six from Labour in total. Plaid Cymru held on to their four seats, but a Remain pact with the Greens and Liberal Democrats failed to create a breakthrough.

  (6/10) The Liberal Democrats had hoped to win back seats in the South West that they lost to the Tories in 2015. Despite increasing their share of the vote by 3%, the Lib Dems failed to win any new seats here.

  (7/10) Jo Swinson, the Liberal Democrat leader, narrowly lost her seat of East Dunbartonshire in Scotland to the Scottish National Party, who had a good night.

  (8/10) The SNP won 14 seats overall, from the Liberal Democrats, Tories and Labour. They now have 48 seats, up 13 from 2017 and only slightly down from their 2015 landslide.

  (9/10) In Northern Ireland the DUP, who had backed the Conservatives since 2017, lost two of their seats, including their Westminster leader Nigel Dodds. The SDLP picked up two and the Alliance Party won one.

  (10/10) Across the UK Labour suffered 60 losses. Their only gain was Putney in London, but Kensington, which they'd won in 2017, went back to the Conservatives. Despite breaking even in London, a largely Remain voting area, Labour's vote share still declined by 6%.

