title: King Charles and Queen Camilla make cameo on American Idol - BBC News
date: '2023-05-09'
section: General
url: http://www.bbc.co.uk/news/uk-65529519
content: |-
  The newly crowned monarchs make a surprise appearance with Katy Perry and Lionel Richie.

  King Charles and Queen Camilla made a surprise appearance on the US talent show American Idol on Sunday.

  They were part of a comedy sketch with Katy Perry and Lionel Richie, who performed at the King's coronation concert, broadcast from Windsor Castle.
