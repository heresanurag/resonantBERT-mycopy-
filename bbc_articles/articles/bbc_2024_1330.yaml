content: |-
  The Post Office has been accused of failing to produce evidence to the inquiry into hundreds of wrongful convictions.

  That's it from us for now

  We're ending our live coverage of the Post Office inquiry for today. Proceedings will resume at 10:00 on Tuesday, 16 January. Up for questioning is Rajbinder Sangha, the release management co-ordinator at Fujitsu - the company at the centre of the controversial Post Office IT system. He is also a former member of Fujitsu’s fraud and litigation support office. In the meantime, we have plenty of stories and explainers on the inquiry you can read, including:
  • A comprehensive look at what the Horizon saga is all about
  • Revelations that the Post Office lied and threatened BBC over Horizon whistleblower
  • And the latest development that Fujitsu won a Foreign Office contract despite concerns This coverage was brought to you by Emily McGarvey, Paul Gribben, Victoria Lindrea, Natasha Preskey, Catherine McGowan, Anna Boyd and Emily Atkinson.
