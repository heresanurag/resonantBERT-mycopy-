title: Baby killed by pet dog in Coventry named as Elle Doherty - BBC News
date: '2024-06-21'
section: Coventry & Warwickshire
url: http://www.bbc.co.uk/news/articles/cl44k0rnr2eo
content: |-
  Police are "satisfied" that no criminal offences have been committed in relation to the dog attack.

  Elle Doherty died after being bitten by her family's pet dog on Sunday

  A seven-month-old baby who died after being bitten by her family's pet dog has been named by police. Elle Doherty suffered serious head injuries when the dog, registered as a Belgian Malinois, attacked her shortly after 15:00 BST on Sunday at her family's home in Coventry. West Midlands Police said that the dog was removed from the home on Shorncliffe Road on Sunday and was humanely destroyed on the same day. On Friday, police confirmed they were "satisfied" that no criminal offences had been committed.

  A spokesperson for the police force said: "Elle received treatment at the scene by paramedics before being rushed to hospital for further treatment. "Tragically, she died a short time later. Our thoughts remain with her family at this devastating time." The force said it had updated Elle's family and a file was being prepared for the coroner. The spokesperson added: "Our thoughts remain with the family at this tragic time, and they have now asked to be left to grieve in private."
