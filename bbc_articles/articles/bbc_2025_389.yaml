  "Net zero drive will raise cost of holidays," is the headline on the front of the Sunday Telegraph. Rules that came into force last week mean, external airlines will have to fill planes up with at least 2% green fuel, rising to 10% and then 22% by 2040. Government analysis seen by the Telegraph suggests the policy could add £302.40 to the average price of return plane tickets for a family of four by 2040. The government claims the calculations are based on a worst case scenario. The Sunday Times says Nato will urge the prime minister to significantly increase spending on air and missile defences., external The formal request is expected to come later this year when the alliance issues member countries with updated force requirements. Air defences are said to be needed to protect critical national infrastructure such as nuclear power stations and military bases. A government spokesperson says the UK is "fully prepared" to deter and defend itself against any threat alongside Nato allies. Insiders quoted by the Mail on Sunday say the Princess of Wales' former school, Marlborough College, has been chosen for all three of her children, external, with parents there reportedly "talking about nothing else". Fees at the school in Wiltshire cost £59,000 pounds a year. Sources say the house earmarked for Prince George has a royal connection, having once been the home of the Seymour family.
