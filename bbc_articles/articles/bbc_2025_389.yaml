title: 'Newspaper headlines: Prince William''s ''sorrow'' and ''bleak midwinter''
  - BBC News'
date: '2025-01-05'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c0ew01p3rnxo
content: |-
  Tributes to a Briton killed in the New Orleans attack, and winter NHS delays lead Sunday's newspapers.

  Edward Pettifer was killed in New Orleans on 1 January

  The Sunday Telegraph is among the front pages to feature a picture of Edward Pettifer, the British man killed in the attack in New Orleans on New Year's Day. He was the stepson of a former nanny to Prince William and Prince Harry. "Wills' sorrow at Brit terror death," is the Sunday People's headline, while the Sunday Express says the King is "devastated"., external Royal insiders have told the Sun on Sunday, external that Edward Pettifer's death marks a "terrible start" to 2025 for the royal family "following a traumatic 12 months". The Observer reports that ministers are considering relaxing restrictions on inmates in England and Wales, external who can be sent to open prisons. The rules being looked at include whether inmates could be held in open conditions for up to five years before their release rather than the current limit of three years. The national chair of the Prison Officers' Association has warned such a move would "destabilise" the open population. The Sunday Times says the economic secretary to the Treasury, Tulip Siddiq, lived in a property given to her family by an ally of her aunt's deposed regime in Bangladesh, external. The new administration in Dhaka has accused Sheikh Hasina of massacres, killings, crimes against humanity, as well as corruption and embezzlement. A source close to Siddiq said she lived at the property in Hampstead in north London "for a period", adding the she had "nothing" to do with the political associations of others. The Sun on Sunday says her own finances need to be "spotless", pointing out she is the minister responsible for overseeing the fight against money-laundering and corruption., external

