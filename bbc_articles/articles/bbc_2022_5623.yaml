title: Mariupol ‘doesn’t exist anymore’, says Ukraine’s FM Dmytro Kuleba - BBC News
date: '2022-04-20'
section: General
url: http://www.bbc.co.uk/news/world-europe-61137047
content: |-
  Dmytro Kuleba told CBS’s Face the Nation Russian troops have “decided to raze the city to the ground".

  Ukraine’s foreign minister has said the city of Mariupol “doesn’t exist anymore”, after weeks of Russian attacks.

  Dmytro Kuleba told CBS’s Face the Nation that Russian troops have “decided to raze the city to the ground at any cost”.
