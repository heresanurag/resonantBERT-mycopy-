content: |-
  The sentencing of eight Taiwanese soldiers is the latest in a string of spying cases.

  Taiwan jails spies 'seduced by money' to work for China

  One of the men, who was believed to be key to recruiting soldiers, got a 13-year sentence, the longest in the group. (file picture)

  A court in Taipei has jailed eight Taiwanese soldiers for spying on behalf of China in exchange for money. Retired military officers bribed active duty soldiers with as much as 700,000 Taiwan dollars ($21,900; £16,700) to join a spy network, the court found. One of the men, who was believed to be key to recruiting soldiers, got a 13-year sentence, the longest in the group. One of the recruits, a lieutenant-colonel, was handed nine years for planning to defect to China by flying a helicopter, while another shot an instructional video about surrendering to China in the event of war.

  China sees self-ruled Taiwan as a breakaway province that will eventually be under its control, and has not ruled out the use of force to take the island. The two sides have been spying on each other since the end of the Chinese civil war in 1949. Ten people in total were indicted for spying last year, and eight were sentenced on Thursday. The court acquitted one, while another - a retired officer - remains at large. "They were seduced by money," the court said. "Their actions violated their official duties of being loyal to the country, defending the country and the people... to seriously endanger national security and the well-being of the people of Taiwan." Taiwan recently flagged Beijing's growing espionage efforts, with the sentencing on Thursday the latest in a string of cases. Last month, a sergeant who worked at a navy training centre was indicted for allegedly photographing and leaking confidential defence data to China. Taipei has also raised concern over the growing frequency of Chinese fighter jet flights around the island. On Friday, Taiwan's President William Lai said the island's people "must unite as one" and "defend national sovereignty and safeguard democracy". He was speaking at an event to commemorate the 66th anniversary of China's assault on Taiwan's Kinmen islands.
