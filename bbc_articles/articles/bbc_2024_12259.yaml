content: |-
  King Charles and Queen Camilla were in Windsor for the colourful Order of the Garter ceremony.

  King and Queen appear in Order of Garter ceremony

  King Charles and Queen Camilla took part in the traditional ceremony

  It was a plume with a view for the royals at Windsor this afternoon, as the King and Queen took part in the Order of the Garter ceremony. They walked in the traditional procession of the most senior order of chivalry, founded almost 700 years ago. They wore long velvet robes and plumes of white ostrich feathers in the colourful procession. Lord Lloyd-Webber, who has become a Knight Companion of the order, took part for the first time.

  Lord Lloyd-Webber has become a member of the chivalric order

  The composer of musicals, including Cats and Phantom of the Opera, had written an anthem for the King's Coronation last May. Also being installed in the order were the Duchess of Gloucester, Air Chief Marshal Lord Peach and Lord Kakkar, former chairman of the Judicial Appointments Commission. They attended a service for the order at St George’s Chapel, Windsor. But Prince Andrew, no longer a working royal, did not take part in the procession.

  The colourful annual ceremony was watched by crowds in Windsor

  The new members of the order appeared alongside existing ones, including the Prince of Wales, Sir Tony Blair, Sir John Major, Baroness Amos and Lord Patten. It had already been announced that the Princess of Wales, who is still undergoing chemotherapy, would not be at Monday's ceremony. While there was torrential rain at Trooping the Colour on Saturday, there was warm sunshine in Windsor for this next regular date in the annual calendar of royal events.

  Prince William was at Windsor, but Catherine did not attend

  As well as the King and Queen and members of the Royal Family, up to 24 companions can be members of the order at any one time. The order was founded in 1348 by King Edward III and membership is now a recognition of a contribution to public life, with Lord Kakkar, at the age of 60, becoming the youngest of the current 21 companion members. After the service, the royals left in the traditional carriage procession up the hill, returning to Windsor Castle.
