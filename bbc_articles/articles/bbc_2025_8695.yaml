title: 'Graham Linehan: Father Ted creator denies harassing trans woman - BBC News'
date: '2025-05-12'
section: Culture
url: http://www.bbc.co.uk/news/articles/c7879vg96y6o
content: |-
  Graham Linehan, 56, appears in court on charges of harassment of Sophia Brooks, 18, and criminal damage.

  Graham Linehan spoke outside court in a T-shirt showing a Daily Telegraph headline reading "Trans women are not women"

  Father Ted co-creator Graham Linehan has pleaded not guilty to harassment and criminal damage against a transgender woman. The Irish comedy writer, who also created The IT Crowd and Black Books, appeared at Westminster Magistrates' Court in London on Monday. The 56-year-old denied two charges including one of harassing Sophia Brooks, 18, a transgender activist, on social media in October. He is also accused of damaging her phone during the "Battle of Ideas" conference in London in the same month, at which he was a speaker. The case will go to trial in September.

  Mr Linehan spoke to confirm his name, date of birth and his plea. He said outside court afterwards that he had for six years defended "the rights of women and children" and had faced abuse and threats. Mr Linehan must return to the court for trial on 4 September. He is accused of harassment by posting abusive comments on social media between 11 and 27 of October, and of damage to a phone to the value of £369. He was granted bail on condition he did not contact the complainant directly or indirectly.
