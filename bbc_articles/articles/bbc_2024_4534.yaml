content: |-
  Aston Villa survive a late Everton comeback to end their two-match winless run with a victory at Walton Hall Park in the Women's Super League.

  Last updated on .From the section Women's Football

  Aston Villa survived a late Everton comeback to secure a victory at Walton Hall Park in the Women's Super League.

  Kenza Dali put Villa in front in the 55th minute with a crisp strike after Rachel Daly set her up with a backheel.

  Five minutes later, Ebony Salmon doubled Villa's lead when she headed home Jordan Nobbs' fine cross.

  Elise Stenevik gave Everton late hope, heading in Aurora Galli's free-kick, but was then sent off for a second bookable offence in injury time.

  Stenevik was penalised after catching a counter-attacking Miri Taylor as the visitors held on to rise to seventh in the WSL table.

  Everton stayed 10th, eight points clear of the relegation zone, having not won since 18 February.

  Both sides came into the fixture out of form and lacked confidence in the first half.

  Villa improved after the restart and were ultimately deserved winners against an Everton side who managed just one shot on target.

  In all likelihood, both Villa and Everton already have enough points to stay up this season, with bottom club Bristol City only managing six points from their first 15 games.
