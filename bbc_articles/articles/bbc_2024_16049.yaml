title: Strictly judge Craig Revel Horwood says complaints about Graziano and Giovanni
  are a 'shock' - BBC News
date: '2024-07-21'
section: Culture
url: http://www.bbc.co.uk/news/articles/cm52jg0v2nmo
content: |-
  The Strictly judge said he had found out about the allegations "through the press".

  Strictly Come Dancing judge Craig Revel Horwood has said complaints about professional dancers on the show have come as a "shock". The BBC programme has been hit by damaging allegations concerning former dancers Giovanni Pernice and Graziano Di Prima. Pernice has denied "any suggestion of abusive or threatening behaviour". On Thursday, Di Prima's spokesman admitted he made a "mistake" by kicking celebrity partner Zara McDermott once during rehearsals. Speaking on BBC Radio Wales, Revel Horwood said he found out about the allegations "through the press".

  Zara McDermott, who was partnered with Graziano Di Prima, has said she was involved in "distressing" incidents during training

  "It’s a shock and news to me," he said. "The judges are never present at any of the teaching and we literally come in on a Saturday and judge what we see before us. "We’re kept very, very separate to the rest of the company, so for us it’s complete news." He said he reads about something every day and thinks "that can't be right", adding he would "wait and see" the outcome of the investigations. Earlier this week, the BBC announced it would put a member of the Strictly production staff in all future rehearsals, and that there would also be two new dedicated welfare producers. The corporation insisted it would always take any issues seriously and act when made aware of inappropriate behaviour.

  Revel Horwood said he welcomed the BBC's decision to give stars chaperones during rehearsals, adding he had seen that in the theatre as well. "When I was in Annie, we had chaperones everywhere because of the kids and laws and all of that stuff," he said. "I've noticed in the theatre world, we have chaperones and people we can speak to if you're having a down day. "So, we have psychologists on the shows now and all of that. "I think it’s just a normal progression of what is happening in life." Asked if he was worried about the future of Strictly, he said: "I don't think so." "It's one of those shows that belongs in the people's hearts that are at home who love dancing, and there's nothing better than seeing someone come from nothing and work hard and move up to being absolutely phenomenal."

  Strictly has been at the centre of controversy after complaints about Pernice and Di Prima. It had been widely reported that Sherlock star Amanda Abbington, who was paired with Pernice in the series last year, experienced difficulties with him. Pernice said he was surprised by allegations about his dance teaching methods, and that he was looking forward to clearing his name. Last month, it was announced he would not return to Strictly for this year's series. On Tuesday, TV star Zara McDermott, who was partnered with Di Prima last year, said she was involved in incidents in the Strictly training room that she now finds "incredibly distressing" to watch back. Di Prima's spokesman Mark Borkowski said the news agenda has focused on an isolated incident the dancer deeply regrets and has apologised for. "There is never a time when kicking, or any sense of that is right," Mr Borkowski told BBC News. "And he knows that." But McDermott's spokesman said on Thursday: "Zara has already confirmed in a statement released on her social media earlier this week that the reported conduct was not a singular incident." Di Prima has also been left out of this year's Strictly line-up.
