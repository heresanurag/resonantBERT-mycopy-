  With five massive stadium shows this summer, K-Pop is establishing itself in the UK mainstream.

  K-Pop summer: How the UK is (finally) embracing Korean pop

  Aespa recently sold out Wembley Arena and will return in June to play the SM Town festival in Twickenham

  Six years ago, Amber Clare was a devoted One Direction fan. Scrolling through Twitter for information about the band's solo projects, she saw a reply that said "Listen to Icy by Itzy". Intrigued, she clicked on the link, external. It changed her life. "I'd never listened to K-Pop before that point but I immediately became a fan," she says. "And now Itzy is the reason I have my job." Today, Clare is the marketing and social media manager for K-Stars, the UK's first and biggest shop devoted to Korean pop music. Based in Manchester, it started as a small business in Manchester's Affleck's Palace in 2019. "You'd order things by PayPal, and then the CEO would pack them up by himself and ship everything out," Clare recalls. Now it's a two-storey emporium, based on Deansgate, with a staff of more than 20 dedicated K-Pop enthusiasts. It's a sign of how the genre has exploded in the UK, even though radio and television has largely shunned all but the biggest acts, like BTS, aespa and Blackpink. "It's still kind of a niche - but it's not a small niche," says Clare. "In my head I'm the only Itzy fan, but when I went to see them in concert, it was sold out. "I was like, 'Wow, where have all you people been hiding?'" In fact, the UK is now among the top 10 countries that follow K-Pop on Spotify, with the boyband Ateez placing two records in the top five of the UK album charts last year. This summer, Blackpink will play two nights at Wembley Stadium, with Stray Kids pulling off the same feat in Tottenham. Meanwhile, Twickenham Stadium will say "anyong haseyo" to one of K-pop's longest-running festivals.

  K-Pop artists tend to be prolific. Itzy have released 80 songs since their debut in 2019

  Established in 2008, the SM Town Live festival is a showcase for artists signed to the SM Entertainment Label, one of the industry's key players. To celebrate the company’s 30th anniversary, they're transplanting the event from Seoul to Middlesex. "It's essentially a multi-day festival all in one, because you've got so many artists all at the same venue, jam packed into the space of three or four hours," says Reese Carter, of boyband Dear Alice, who'll be among the performers in Twickenham. "It's non-stop. You've got to prep yourself, because you'll definitely want to dance." "It's very down to earth but it goes straight to your heart," adds Ten from K-Pop group WayV.

  SM holds a unique place in Korea's musical history. Founded in 1995 by Lee Soo-man, it is widely credited with establishing the K-Pop template. It was the first company to introduce the trainee system, where young talent goes through intensive training that lasts months, or even years, before making their "debut". And it dominated what's known as the "first generation" of K-Pop idols, with bands like H.O.T. and S.E.S. The Twickenham show will pay tribute to that three-decade journey, with a line-up that includes everyone from Red Velvet, EXO and Girl's Generation to current chart-toppers like aespa, Riize and all of the sub-units of boyband NCT - which boasts more than 20 members. "That's very rare," says Ten, one of the group's most recognisable (and chatty) stars. "The last time we had an NCT concert as a whole was two years ago. It's so difficult to schedule every group to be in the same spot at the same time." But that's not all. The concert will also feature what's been billed as "a group of promising trainees", known for now as SMTR25 – showcasing the future of the label. "Performing alongside the senior artists we've admired since our trainee days, as well as our talented junior artists, makes this an incredibly meaningful experience for us," said aespa in an email to the BBC. The hope is that shows like this will open a few doors - because, for all the strides K-Pop has made in the last couple of years, bands have consistently prioritised America over Europe. It's a logical step. The US is the world's biggest music market, so it offers more opportunities for touring and merchandise sales, while an MTV Award performance or a concert for NPR's Tiny Desk series travels further internationally than an appearance at the Brit Awards. "The situation here isn't as good as what the American industry gets," acknowledges Amber Clare. "Every single K-Pop group, if they announce a world tour, America will always be on the map - but European countries are always left wondering if they're going to be included or not."

  WayV are one of six "sub-units" of the band NCT, who predominantly sing in Chinese - another important market for K-Pop

  In a crowded market, labels are increasingly turning their attention to the UK – where the anglophone media has international reach, and there's a baked-in affection for boy and girl groups like Take That, Spice Girls, Girls Aloud and Little Mix. To make inroads, bands have teamed up with some of Britain's biggest artists. Aespa's 2023 single Better Things, external was co-written by Raye, while Le Sserafim collaborated with PinkPantheress on club anthem Crazy, external and with Jungle on their latest song, Come Over, external. Last year, SM went one further – creating a British boyband and putting them through the K-Pop machinery. That group was Dear Alice, whose gruelling traineeship was documented in BBC series Made In Korea. Having survived the process, the five-piece finally premiered their debut single, Ariana, external, at a massive SM Town concert in Seoul in January. "These shows are timed down to the second," says singer Blaise Noon. "When we got our time to go on stage, it was literally like, 8:30 and 48 seconds. It just shows how so well thought out is." Bringing the production to London is evidence that SM has its sights trained on the UK, he confirms. "In the UK, we produce some really amazing boy groups, so I think we have that connection in the culture. So I think they definitely want to hit it. I can see it getting bigger and bigger every day." Ten, who releases a new solo album, Stunner, next week, says he's already experienced the devotion of UK fans. When his group WayV last visited England in 2023, "we were surprised that people could sing along to our songs, because we sing in Chinese", he says. "This opportunity with SM Town, I feel like it's going to open a bigger market for K-Pop in the UK. "I hope so, because I'd like to come and perform my solo stuff to my UK fans too."

  Dear Alice - stylised as dearALICE - are the first British band to be taken under the wing of K-Pop label SM Entertainment

  The opportunity is there. Nine of the 10 best-selling albums in the world last year were by South Korean artists, illustrating the music's broad appeal - but none of those records charted in the UK’s Top 50. Lack of radio exposure is one factor - but listeners can also be put off by clunky English lyrics or the sudden-but-deliberate stylistic shifts that characterise K-Pop. If you're willing to dig into the genre, though, you can find some of the most audacious and indelible hooks music has to offer. One by-product of K-pop’s (relative) obscurity is the bond it creates among fans. There's a sense of belonging that comes from discovering and nurturing your "bias", outside the glare of the mainstream. It’s a relationship bands foster by a fire hose stream of social media content, where dance challenges, video diaries and photoshoots are posted daily. Dear Alice experienced the impact of that effort at a UK meet-and-greet last weekend. "It felt like we were hanging out with a bunch of our mates," says Dexter Greenwood. "They were just cool people," adds James Sharp. "We're starting to recognise faces and remember people on this journey - and I think there's going to be more and more." By the time they play Twickenham in June, the group promise to have more new music to showcase. In the meantime, though, they want to introduce their labelmates to some of the UK's finer customs. "We've got to order a bunch of Greggs for the SM family," says Noon.
