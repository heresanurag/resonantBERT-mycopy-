  The BBC contacted 46 police forces across the UK and among the 27 that responded, 8,365 cyberstalking offences had been recorded in 2024. Only eight forces were able to provide an age breakdown, with the youngest alleged victim recorded as an eight-year-old boy in Wiltshire in 2024 and the youngest suspect was a 10-year-old in Cheshire in 2021. The Metropolitan Police had also recorded two victims under the age of 10, but did not specify how old they were.

  MP Jess Phillips has been a victim of stalking and says prevention should be the priority

  Anonymity is a common feature in cyberstalking cases, where perpetrators can create multiple accounts to evade detection. To tackle this, the government announced new measures in December, including the Right to Know statutory guidance, which will allow victims to learn their stalker's identity as quickly as possible. They are also set to expand the use of Stalking Protection Orders (SPOs), which can restrict alleged stalkers from contacting their victims, both measures will come into force once the Crime and Policing Bill receives Royal Assent. But charities warn court delays for SPOs are already limiting their effectiveness. "Delays are a big concern," said Phillips. "We're working to strengthen SPOs so victims stay protected - even after sentencing."

