title: 'Ben Chilwell: Crystal Palace sign Chelsea left-back on loan - BBC Sport'
date: '2025-02-03'
section: Football
url: http://www.bbc.co.uk/sport/football/articles/cwyj8wnzy4po
content: |-
  Chelsea defender Ben Chilwell joins Premier League rivals Crystal Palace on loan for the rest of the season.

  Chelsea defender Ben Chilwell has joined Premier League rivals Crystal Palace on loan for the rest of the season.

  Left-back Chilwell, 28, has not made a Premier League appearance since April 2024 and was told last August he was not part of Enzo Maresca's plans.

  The England international has only appeared once this season, in the second half of the Blues' Carabao Cup win against Barrow in September.

  Chelsea boss Maresca has previously said Chilwell, who has a contract until the summer of 2027, is free to leave on a permanent deal.

  "I'm very excited to be here," Chilwell told the official Crystal Palace website.

  "Crystal Palace is a club that's going in a great direction. You look at the last few months, with the results and how the team's playing, and it was a no-brainer to make the decision to come here."

  Palace were keen to sign Chilwell to boost their defensive options after Morocco international Chadi Riad was ruled out for the rest of the season with a knee injury.

  Chelsea signed Chilwell from Leicester City on a five-year deal for £45m in 2020, before extending his contract in April 2023.

  The most recent of his 21 England caps came in a friendly in March 2024 against Belgium.

  Chilwell was left out of Gareth Southgate's provisional 33-man England squad for Euro 2024.

  Palace are 12th in the Premier League with 30 points from 24 games.

  Chilwell could make his Palace debut against Doncaster Rovers in the fourth round of the FA Cup on 10 February (19:45 GMT).
