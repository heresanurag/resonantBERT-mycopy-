content: |-
  Louis Rees-Zammit says making his debut for reigning Super Bowl champions Kansas City Chiefs was a “great first experience”.

  Louis Rees-Zammit says making his debut for reigning Super Bowl champions Kansas City Chiefs was a "great first experience". The former Wales wing featured in the Chiefs' pre-season friendly defeat by Jacksonville Jaguars. Rees-Zammit performed as running back, kicker and kick-returner during Saturday's match, in addition to being part of the punt coverage team. He finished with two carries for one yard, one reception for three yards and one tackle on special teams. The 23-year-old also - somewhat unexpectedly - took a kick-off in the fourth quarter.

  "It was a great first experience," Rees-Zammit told the Irish NFL Show following the 26-13 loss at EverBank Stadium in Florida. "I loved it, I loved getting the snaps I did, on special teams as well, which was great. "I've just got to look back on this, review it and see how I can get better. "The atmosphere was great, it was pretty electric in the stadium and there was a load of Chiefs fans, which helped massively. It was a great game and I'm looking forward to the next one." Rees-Zammit is competing for a spot on the Chiefs' 53-man regular-season roster, but was listed as Kansas City's fifth-choice running back on the franchise's initial depth chart.

  There was also a debut for former Gaelic football goalkeeper Charlie Smyth. He marked his first outing for the New Orleans Saints by kicking a winning field goal to secure a 16-14 pre-season win at the Arizona Cardinals. The rookie 22-year-old Irishman, who, like Rees-Zammit, joined the NFL's International Player Pathway Programme earlier this year, converted from 37 yards with just five seconds remaining.
