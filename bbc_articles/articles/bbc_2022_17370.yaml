content: |-
  The boys, aged two and five, were found dead at a home in east London on Friday afternoon.

  The boys were found dead at an address in east London on Friday afternoon

  A 44-year-old woman has been charged with murdering two young boys who were found dead at a home in Dagenham in east London.

  Kara Alexander, of Dagenham, is accused of killing the boys, two and five, whose bodies were found at a property in Cornwallis Road on Friday afternoon.

  The 44-year-old appeared at Barkingside Magistrates' Court on Tuesday where she was remanded in custody.

  Ms Alexander is next due to appear at the Old Bailey on Thursday.

  Post-mortem examinations and formal identification will take place in due course, the Metropolitan Police said.

  Family members have been informed of the deaths and continue to be supported by specialist officers, the force said in a statement.

  A man was also arrested but later released.

