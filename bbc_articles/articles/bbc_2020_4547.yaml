  Updates as a health board revealed 84 deaths linked to Covid-19 over the course of a month.

  Deaths reporting system to be investigated, says First Minister

  The recording of deaths of people who have died after testing positive for coronavirus is to be investigated after a Welsh health board failed to report numbers. First Minister Mark Drakeford said it was important that "accurate information" was reported by health boards so people could "have confidence" in what was being published. Betsi Cadwaladr health board, which is responsible for the care of people in north Wales, reported 84 deaths over the course of a month for the first time today citing issues with its reporting system. Public Health Wales (PHW) explained this was the reason for the biggest single daily jump in confirmed deaths of people with coronavirus - 110 - taking the total to 751. Mr Drakeford said: "The additional deaths reported by Betsi Cadwaladr don't change the overall picture, but I have asked for an assurance this afternoon that this is being thoroughly checked, that the whole system is being investigated, so that we can say confidently on Monday that the figures we are reporting through Public Health Wales genuinely represent an accurate picture in every part of Wales". PHW has repeatedly warned that the number of deaths could be higher than the figures show, as they only include those who died in hospitals, and some care homes, and whose tests were analysed in a lab.
