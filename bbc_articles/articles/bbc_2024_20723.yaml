content: |-
  A police officer on a motorbike was attacked in Liverpool as protests in the city broke out into violence.

  A police officer on a motorbike was attacked in Liverpool as protests in the city turned violent.

  Merseyside Police said hundreds of protesters had gathered in the city and that bricks and bottles were thrown at officers.

  Assistant Chief Constable Jenny Sims said two officers had been injured during the protests with one suffering a broken nose, and another left with a broken jaw.
