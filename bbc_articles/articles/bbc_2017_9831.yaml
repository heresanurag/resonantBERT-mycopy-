id: bbc_2017_9831
title: 'Newspaper headlines: Cabinet ''all-out war'' over Brexit - BBC News'
date: '2017-09-24'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-41376126
content: |-
  The debate over Brexit in both the Conservative and Labour parties dominates the Sunday papers.

  The Sunday papers are dominated by Brexit following Theresa May's speech in Florence on Friday.

  The Sunday Telegraph claims that the "fragile" cabinet truce over the prime minister's transition plan has begun to "fracture", after Foreign Secretary Boris Johnson set out a series of red lines on Brexit - including a demand for the UK not to adopt any new EU rules and regulations during any transition period.

  The Mail on Sunday goes further, arguing that the cabinet split over Brexit has "erupted into a bitter all-out war" between Mr Johnson and Chancellor Philip Hammond.

  In what it describes as an "unprecedented clash" between the great offices of state, the Mail says allies of Mr Hammond have crudely dismissed a claim by supporters of Mr Johnson that Mrs May's speech "thwarted" the chancellor's bid to lock the UK into a five-year transition period.

  With the headline "I saved Brexit", the Sunday Express says Mr Johnson is claiming credit for Mrs May's speech, after he took on Remainers in the cabinet by arguing for a two-year transition period.

  Writing in the Sunday Telegraph, International Trade Secretary Liam Fox argues that Florence will be added to the roll-call of cities forever associated with the history of the EU - such as Rome, Maastricht and Lisbon - but this time as "a symbol of a new, more open and future-orientated relationship".

  "We have laid our cards on the table", he says, "now is the time for the EU to reveal its hand."

  According to former Conservative cabinet minister John Redwood. "we will only know whether the speech was successful when we see and hear considered responses of the EU and its member states".

  Writing in the Sunday Express, he warns that if Mrs May has failed to persuade them to come to the table in a more positive frame of mind, "we will be leaving with no deal".

  The lead story in the Sunday Times claims to reveal plans by four cabinet ministers to replace Theresa May in the wake of June's general election.

  Boris Johnson, Philip Hammond, David Davis and Amber Rudd are all said to have been "embroiled in leadership plots" after the Conservatives lost their majority in Parliament.

  More than 30 Labour MPs have written an open letter to the Observer, calling on Jeremy Corbyn to commit to "full and permanent membership" of the EU single market.

  The signatories, who also include MEPs, peers and trade union leaders, say Labour needs to offer a clear alternative to the Conservatives over Brexit.

  Writing in the paper - ahead of Labour's annual conference in Brighton - Mr Corbyn argues it was evident in Florence that the government is "no clearer" about our long-term relationship with the EU.

  Labour, he claims, "are now the political mainstream" and "a government in waiting."

  The fallout from the decision not to renew Uber's licence to operate in London is widely covered.

  Seventy per cent of respondents to a poll conducted by the Sun on Sunday have called for the move to be reversed.

  The Sunday Times suggests "peace may be breaking out" after the taxi app "signalled it was prepared to make concessions on passenger safety and benefits for drivers".

  The pro-market Reaction website says London Mayor Sadiq Khan has been "woefully ineffective" in handling the dispute and argues he would be "quite vulnerable" if the Conservatives "weren't in such a mess" in London.

  Finally, the Mail on Sunday reports that Britain's oldest postcard publishers will close at the end of the year "as sales plummet in the social media age".

  It says the "last post" has been sounded for the traditional seaside card because younger generations of holidaymakers "choose to send selfie snaps through Facebook and Instagram".
