content: |-
  Manchester United head coach Ruben Amorim says Dan Ashworth's shock exit is "not the best situation" but believes the club's vision remains clear and unaffected.

  Dan Ashworth spent just under a month working with Ruben Amorim

  Manchester United head coach Ruben Amorim says Dan Ashworth's shock exit is "not the best situation" - but believes the club's vision remains clear and unaffected. The departure of United's sporting director was confirmed on Sunday after just 159 days with the club. Amorim spoke to media for the first time since Ashworth's exit to preview the team's Europa League game at Viktoria Plzen on Thursday. "The first thing I want to say is that, since the first day, I felt great support from the ownership," said Amorim, who took charge on 11 November. "From Omar [Berrada, chief executive], from Dan also, from Jason [Wilcox, technical director]. Dan was part of that, and I really felt support from Dan also. "But this is football and sometimes these things happens. It happens with players, with coaches. "I know that it's not the best situation but the important thing is we continue in our way. The path is really clear for everybody and I think this can happen in football." Asked if he is concerned whether United are more unstable than when he arrived, Amorim added: "I don't think so. I've felt since day one the support from everybody, so one person leaving doesn't change nothing. "Of course, it's a bad situation, because we are talking about a human being, a professional, that supports us as a team. "But I think the most important thing is that your vision is really clear and that vision doesn't change if only one person leaves."

