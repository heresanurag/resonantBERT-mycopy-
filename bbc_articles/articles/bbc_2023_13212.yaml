title: Man dies after fall from cruise ship at Port of Cromarty Firth - BBC News
date: '2023-08-20'
section: Highlands & Islands
url: http://www.bbc.co.uk/news/uk-scotland-highlands-islands-66562826
content: |-
  The Viking Cruises crew member was airlifted to Aberdeen Royal Infirmary after the incident on Friday.

  The man is a crew member for Viking Cruises

  A man has died after falling from a cruise ship at a port in the Highlands.

  The Viking Mars crew member, understood to be in his 40s, was airlifted to Aberdeen Royal Infirmary after the incident at the Port of Cromarty Firth in Invergordon.

  The alarm was raised at about 11:00 on Friday and two ambulances, a helicopter and trauma team were sent to the scene.

  But on Sunday Viking Mars confirmed the crew member, who has not been named, had died from his injuries.

  A company statement said: "It is with great sadness that we confirm a crew member passed away following an incident in Scotland on 18 August.

  "We shared our deepest sympathies with the crew member's family and are working to ensure they have the support they need during this difficult time.

  "Viking's focus remains on the safety and wellbeing of our crew and guests.

  "Our operations team is working with local authorities to determine how this occurred."

  Police Scotland confirmed on Friday that they had received reports of the man having fallen from the ship at Saltburn Pier.

  On Sunday a force spokesperson said: "Emergency services attended and the man was taken by helimed to Aberdeen Royal Infirmary where he died a few hours later. "A report has been sent to the procurator fiscal."

  Officers previously said the Health and Safety Executive had been made aware of the incident.
