title: Man charged with attempted murder after police officer hit by car - BBC News
date: '2019-11-01'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-50260346
content: |-
  The policeman was hit during a vehicle stop in north London.

  The officer was taken to hospital after he was hit by the car at about 11:30 GMT

  A man has been charged with attempted murder after a police officer was hit by a vehicle in north London.

  The officer was struck in White Hart Lane in Tottenham on Tuesday morning during a vehicle stop. He was taken to hospital but has since been discharged.

  Aydin Altun, 25, of, Suffolk Road, Tottenham, was arrested on suspicion of attempted murder and possession of a firearm and was charged on Thursday.

  He will appear at Highbury Corner Magistrates' Court later.

