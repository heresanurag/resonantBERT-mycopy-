title: Ex-snooker champion Graeme Dott charged with child sex offences - BBC News
date: '2025-04-09'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/articles/c985555nr49o
content: |-
  The 47-year-old faces historical charges relating to two children who were understood to be around 10 years old at the time.

  Former world snooker champion Graeme Dott has been charged with child sex offences. The 47-year-old Scot, who won the world title in 2006, faces historical charges relating to two children who were understood to be around 10 years old at the time. Prosecutors claim the first attack happened in the Glasgow area between 1993 and 1996. The second charge relates to an alleged attack between 2006 and 2010.

  Mr Dott, from Larkhall, South Lanarkshire, is expected to appear in court on 11 June. He was scheduled to be playing world championship qualifying matches this week but has now been suspended by snooker's world governing body, the WPBSA. In a statement, it said "Graeme Dott has been suspended by the WPBSA due to a case which is scheduled to be heard before the high court in Scotland. "Whilst court proceedings are ongoing, it would be inappropriate for the WPBSA to make any further comment." Mr Dott turned professional in 1994, having won the UK Under-19 Championship in 1992 and the Scottish Amateur Championship in 1993. He first qualified for the world championships in 1997. As well as his 2006 world title triumph, he is a two-time runner-up at the event which is staged at The Crucible theatre in Sheffield. He also won the China Open in 2007, the same year he reached a career-high of second in the world rankings.
