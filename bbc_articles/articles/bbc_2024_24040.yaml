content: |-
  Colin Gray is accused of knowingly allowing his son access to a gun used to kill two teachers and two students in Georgia.

  Father of US school shooting suspect charged with murder

  Students and community members have gathered outside the school in the days following the shooting

  The father of a 14-year-old boy accused of killing four people at a high school in the US state of Georgia has been arrested and charged with murder. Colin Gray, 54, is facing four charges of involuntary manslaughter, two counts of second-degree murder and eight of cruelty to children. Officials said on Thursday evening the charges were directly connected to his son's actions and "allowing him to possess a weapon". The son, Colt Gray, is accused of killing two teachers and two students in Wednesday's shooting at Apalachee High School in Winder, near Atlanta. He is due in court on Friday charged - as an adult - with four counts of murder.

  In Georgia, state law allows prosecutors to charge minors from age 13 as an adult in certain crimes. This means they face potentially more severe sentences if convicted. Authorities are investigating whether Colin Gray bought the AR-style weapon as a gift for his son in December 2023, law enforcement sources told CBS News, the BBC's US partner. The charges against the father are thought to be the most severe levelled against the parent in this kind of case. In May 2023, the FBI alerted local police to online threats about a school shooting, associated with an email address linked to the suspect. A sheriff's deputy went to interview the boy, who was 13 at the time. His father told police he had guns in the house, but his son did not have unsupervised access to them, the FBI said in a statement on Wednesday. Officials say the threats were made on Discord, a social media platform popular with video gamers, and contained images of guns.

