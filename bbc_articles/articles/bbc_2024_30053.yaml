content: |-
  Britain's oldest satellite is in the wrong part of the sky, but no-one's really sure who moved it.

  Somebody moved UK's oldest satellite, and no-one knows who or why

  Artwork: The half-tonne Skynet-1A satellite was launched in November 1969

  Someone moved the UK's oldest satellite and there appears to be no record of exactly who, when or why. Launched in 1969, just a few months after humans first set foot on the Moon, Skynet-1A was put high above Africa's east coast to relay communications for British forces. When the spacecraft ceased working a few years later, gravity might have been expected to pull it even further to the east, out over the Indian Ocean. But today, curiously, Skynet-1A is actually half a planet away, in a position 22,369 miles (36,000km) above the Americas.

  Orbital mechanics mean it's unlikely the half-tonne military spacecraft simply drifted to its current location. Almost certainly, it was commanded to fire its thrusters in the mid-1970s to take it westwards. The question is who that was and with what authority and purpose? It's intriguing that key information about a once vital national security asset can just evaporate. But, fascination aside, you might also reasonably ask why it still matters. After all, we're talking about some discarded space junk from 50 years ago. "It's still relevant because whoever did move Skynet-1A did us few favours," says space consultant Dr Stuart Eves. "It's now in what we call a 'gravity well' at 105 degrees West longitude, wandering backwards and forwards like a marble at the bottom of a bowl. And unfortunately this brings it close to other satellite traffic on a regular basis. "Because it's dead, the risk is it might bump into something, and because it's 'our' satellite we're still responsible for it," he explains.

  If a satellite died at 40E it would drift to the nearest gravity well, which is 75E.

  Dr Eves has looked through old satellite catalogues, the National Archives and spoken to satellite experts worldwide, but he can find no clues to the end-of-life behaviour of Britain's oldest spacecraft. It might be tempting to reach for a conspiracy theory or two, not least because it's hard to hear the name "Skynet" without thinking of the malevolent, self-aware artificial intelligence (AI) system in The Terminator movie franchise. But there's no connection other than the name and, in any case, real life is always more prosaic.

  What we do know is that Skynet-1A was manufactured in the US by the now defunct Philco Ford aerospace company and put in space by a US Air Force Delta rocket. "The first Skynet satellite revolutionised UK telecommunications capacity, permitting London to securely communicate with British forces as far away as Singapore. However, from a technological standpoint, Skynet-1A was more American than British since the United States both built and launched it," remarked Dr Aaron Bateman in a recent paper on the history of the Skynet programme, which is now on its fifth generation. This view is confirmed by Graham Davison who flew Skynet-1A in the early 70s from its UK operations centre at RAF Oakhanger in Hampshire. "The Americans originally controlled the satellite in orbit. They tested all of our software against theirs, before then eventually handing over control to the RAF," the long-retired engineer told me. "In essence, there was dual control, but when or why Skynet-1A might have been handed back to the Americans, which seems likely - I'm afraid I can't remember," says Mr Davison, who is now in his 80s.

  Could the command to move Skynet-1A have come from the US Air Force's 'Blue Cube'?

  Rachel Hill, a PhD student from University College London, has also been scouring the National Archives. Her readings have led her to one very reasonable possibility. "A Skynet team from Oakhanger would go to the USAF satellite facility in Sunnyvale (colloquially known as the Blue Cube) and operate Skynet during 'Oakout'. This was when control was temporarily transferred to the US while Oakhanger was down for essential maintenance. Perhaps the move could have happened then?” Ms Hill speculated. The official, though incomplete, logs of Skynet-1A’s status suggest final commanding was left in the hands of the Americans when Oakhanger lost sight of the satellite in June 1977. But however Skynet-1A then got shifted to its present position, it was ultimately allowed to die in an awkward place when really it should have been put in an "orbital graveyard". This refers to a region even higher in the sky where old space junk runs zero risk of running into active telecommunications satellites. Graveyarding is now standard practice, but back in the 1970s no-one gave much thought to space sustainability.

  British engineers are developing technologies to snare defunct satellites in low orbits

  Attitudes have since changed because the space domain is getting congested. At 105 degrees West longitude, an active satellite might see a piece of junk come within 50km of its position up to four times a day. That might sound like they’re nowhere near each other, but at the velocities these defunct objects move it’s starting to get a little too close for comfort. The Ministry of Defence said Skynet-1A was constantly monitored by the UK's National Space Operations Centre. Other satellite operators are informed if there's likely to be a particularly close conjunction, in case they need to take evasive action.

  The Americans have already shown it's possible to grab a high-orbiting satellite

  Ultimately, though, the British government may have to think about removing the old satellite to a safer location. Technologies are being developed to grab junk left in space. Already, the UK Space Agency is funding efforts to do this at lower altitudes, and the Americans and the Chinese have shown it's possible to snare ageing hardware even in the kind of high orbit occupied by Skynet-1A. "Pieces of space junk are like ticking time bombs," observed Moriba Jah, a professor of aerospace engineering at the University of Texas at Austin. "We need to avoid what I call super-spreader events. When these things explode or something collides with them, it generates thousands of pieces of debris that then become a hazard to something else that we care about."
