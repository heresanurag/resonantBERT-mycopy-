title: 'Coronavirus in Wales: Updates on 14 July 2020 - BBC News'
date: '2020-07-14'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-53402326
content: |-
  The latest developments on the response to the pandemic in Wales.

  The Welsh Government says no tax will be paid on main residential property purchases for less than £250,000.

  Finance Minister Rebecca Evans announced the Land Transaction Tax "holiday" at the daily coronavirus briefing.

  The minister said the move would take effect on 27 July to coincide with the full reopening of the housing market in Wales as the coronavirus lockdown eases.

  She said the "tax holiday" would last until 31 March 2021.

  "Unlike in England, this new threshold will not apply to the purchase of additional properties such as buy-to-lets or second homes," she added.

  "It will support people looking to purchase their first home or those seeking to move up the property ladder.

  "So it will offer more targeted help to those who may be affected by the economic challenges resulting from the pandemic."

  The minister said the new threshold meant that no tax will be paid on around 80% of transactions in Wales where the main residential rates apply.

  She said it would help "growing families needing to move on in the housing ladder as well as first time buyers".

  Ms Evans added that £30m would be invested in "the construction of modern social homes, supporting jobs and securing a decent place to call home for those who need it".

  The Welsh Government's "tax holiday" follows UK Chancellor Rishi Sunak's announcement of a stamp duty holiday on the first £500,000 of property sale values in England and Northern Ireland.

  The Scottish government says it will introduce a temporary cut to the transaction tax on house sales in Scotland next week.
