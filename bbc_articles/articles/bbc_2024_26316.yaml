  In response to the Southport stabbings, and the lack of information given by police about the suspect in the face of false claims, the government's independent reviewer of terrorism legislation, Jonathan Hall KC, said that the law, as it currently stands, "stokes the risk of online disinformation" (the deliberate spreading of false information). He also stated the false claims that circulated on social media about the identity and asylum status of the suspect were "plausibly connected to some of the violence that followed". Mr Hall has written to the Law Commission suggesting legal reforms which would allow names, nationality, and ages of individuals to be reported where there is no substantial risk of prejudice. Many of the misleading posts we have analysed are still on X and Facebook, and David Miles is still posting on Telegram. The government asked Ofcom to consider how illegal content, particularly disinformation, spread during the unrest. The media regulator concluded that there was a "clear connection" between the violent disorder in England and Northern Ireland in the summer and posts on social media and messaging apps. In an open letter, external setting out its findings, Ofcom boss Dame Melanie Dawes said such content spread “widely and quickly” online following the stabbings in Southport. Meanwhile, the government has told the BBC it is working at pace to implement the Online Safety Act, which requires social media platforms to remove illegal content and prevent the deliberate spread of false information. The act was passed into law in October 2023, but its protections have yet to come into effect. We approached X for a comment, but have not received a reply.
