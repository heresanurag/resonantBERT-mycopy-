id: bbc_2017_12084
title: '''Climate change is bad...it affects everything'' - BBC News'
date: '2017-11-15'
section: General
url: http://www.bbc.co.uk/news/world-41992630
content: |-
  People in Vunidogoloa had to move 2km (1.24m) inland, and say climate change is to blame.

  Fiji is relocating low-lying coastal villages due to the impact of rising sea levels.

  The country is hosting the UN Climate Change Conference in Bonn, Germany, which will attempt to agree the fine print on the 2015 Paris climate accord.
