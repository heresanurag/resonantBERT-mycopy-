title: Port Talbot steelworks is town's North Star - Michael Sheen - BBC News
date: '2024-01-19'
section: General
url: http://www.bbc.co.uk/news/uk-wales-68008733
content: |-
  The Hollywood actor says everyone in the town has grown up with the steelworks - including him.

  "The light that never goes out."

  Hollywood actor Michael Sheen says anyone who - like him - has grown up in Port Talbot has grown up with the steelworks.

  The town and the industry have been synonymous for decades and almost everyone there has either worked at the site or has a friend or family member who did.

  Sheen said "so many families' lives revolve around its axis".
