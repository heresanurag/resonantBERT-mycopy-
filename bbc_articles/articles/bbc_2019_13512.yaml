title: Nicola Sturgeon grilled on possible Jeremy Corbyn alliance - BBC News
date: '2019-11-08'
section: General
url: http://www.bbc.co.uk/news/uk-politics-50350251
content: |-
  The SNP leader is asked if she would be willing to form an alliance with Labour in Westminster.

  SNP leader Nicola Sturgeon is grilled by the BBC's Laura Kuenssberg on Scottish independence, Brexit and whether she would be willing to form an alliance with Labour's Jeremy Corbyn.
