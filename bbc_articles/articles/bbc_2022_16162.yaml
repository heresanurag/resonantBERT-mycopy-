title: 'Natalie McNally: Suspect seen in victim''s street on night of Lurgan stabbing
  - BBC News'
date: '2022-12-22'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-64069346
content: |-
  A man arrested on suspicion of murdering pregnant 32-year-old Natalie McNally is freed on bail.

  This video can not be played To play this video you need to enable JavaScript in your browser. CCTV footage shows a man leaving Natalie McNally's street on the night she was killed

  Police investigating the stabbing of Natalie McNally have released CCTV footage of a suspect seen entering her street on the night she was killed.

  The 32-year-old was 15 weeks pregnant when she was stabbed to death in her home in Lurgan on Sunday night.

  The CCTV footage shows a man entering Silverwood Green at 20:52 GMT on Sunday. He leaves at 21:30.

  A 32-year-old man arrested on suspicion of murder was released on police bail on Thursday night.

  The charity Crimestoppers has offered a £20,000 reward for information about Ms McNally's killing.

  Police previously said she may have known her killer.

  Natalie McNally was 32 and was expecting a child when she was killed

  She was stabbed a number of times and some of her wounds appeared to have been inflicted as she tried to defend herself.

  Det Ch Insp John Caldwell said: "The person on the CCTV is a suspect - I believe that is the person who has murdered Natalie McNally."

  The man in the CCTV footage was carrying a rucksack when he arrived in Silverwood Green.

  He appeared to be wearing white footwear, which Mr Caldwell said were possibly trainers.

  On Thursday Ms McNally's youngest brother Niall appealed to her killer to "do the decent thing and confess to her murder".

  This video can not be played To play this video you need to enable JavaScript in your browser. Natalie's brother Niall McNally appeals for her killer to confess to police

  He said the family were devastated and he could not put into words the heartache they were experiencing.

  "I really can't believe we will never see her beautiful smile or hear her infectious laugh again," he said.

  "Nats really was the best sister ever and such a lovely person.

  "To add to our unbearable heartache we are devastated that we will never meet Natalie's baby.

  "We were all looking forward to welcoming the family's first grandchild.

  "The killer has denied Nats the opportunity of being a mummy."

  Her uncle John McStravick said she came from one of the most caring families he had ever met.

  "Natalie was a gorgeous, kind, generous girl who went the extra mile for her friends and family," he said.

  Natalie's's brother Niall (left) and uncle John McStravick (centre) joined Det Ch Insp John Caldwell for a press conference on Thursday

  A man in his 30s who was arrested on suspicion of murder was released on bail on Tuesday pending further inquiries.

  He is not the same man who was arrested on Wednesday and released on Thursday.

  Ms McNally worked as part of the marketing team at public transport provider Translink.

  In posts on social media, friends described her as "one of the best".

  Police were called to Ms McNally's house in Silverwood Green at 22:00 on Monday.

  She was pronounced dead when the emergency services arrived.

  Mr Caldwell said there were no signs of a break-in at the property.

  He said he wanted information from people who may have driven along the Kiln Road in Lurgan between 20:45 and 21:45 on Sunday.
