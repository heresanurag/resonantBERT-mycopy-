  Around 3,000 people took the plunge in the River Derwent in Hobart to mark the winter solstice.

  Around 3,000 nude swimmers took the plunge into the River Derwent in Hobart, Australia, to mark the winter solstice.

  The swim, which takes place at the crack of dawn, saw swimmers brave temperatures of 6C on dry land, and 12C in the water.
