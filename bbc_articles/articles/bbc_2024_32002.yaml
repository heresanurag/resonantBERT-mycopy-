title: 'Newtownards: Murder investigation launched after Boxing Day death - BBC News'
date: '2024-12-27'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c627060675do
content: |-
  Two women, aged 58 and 33, and a 36-year-old man have been arrested over the death of a 50-year-old man.

  Police remain at the scene in Newtownards

  Police have launched a murder investigation following the death of a man in Newtownards, County Down, on Thursday. Police received a report that a man was unconscious at a block of flats on West Street just before 01:50 GMT. The 50-year-old was taken to hospital, and later died. A post-mortem will take place in due course. Two women, aged 58 and 33, were arrested at the scene in Mitchell Court and a man, aged 36, was later arrested at a nearby address. Police Service of Northern Ireland (PSNI) officers remain at the scene.

  Forensic officers have been examining the scene

  "Of course, it's particularly shocking that this should happen at Christmas and we know that the thoughts of our community will be with this man's family and friends today," he said.

  Jim Shannon MP told BBC News NI: "A man is dead and his loved ones grieve. "The family focus on their loss and not on Christmas. "Our thoughts are with them at this time."
