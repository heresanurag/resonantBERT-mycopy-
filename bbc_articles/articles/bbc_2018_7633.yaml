title: Nigeria's 'snazzy' sold-out World Cup kit - BBC News
date: '2018-06-02'
section: General
url: http://www.bbc.co.uk/news/uk-44339529
content: |-
  Fans spent hours waiting in line to try to get hold of the Super Eagles' new replica football strip.

  Shoppers queued outside for hours to try to get their hands on Nigeria's new World Cup football kit in central London.

  The Nigeria Football Federation says there were three million pre-orders for its replica shirts, and they've been selling out online.

  The home and away shirts, priced at £64.95, were sold out on the Nike website soon after they were released.

  So why is it proving so popular?
