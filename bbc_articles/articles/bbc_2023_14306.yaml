title: Military truck driven through police road block in Taunton - BBC News
date: '2023-09-11'
section: Somerset
url: http://www.bbc.co.uk/news/uk-england-somerset-66772197
content: |-
  Nine vehicles are damaged in a trail of destruction after a truck is driven through a road block.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Nine vehicles were left damaged after a privately-owned military truck was driven through a police road block.

  Officers attended an address in Norton Fitzwarren, near Taunton, at 16.40 BST on Sunday after reports a man made threats to a person living there.

  When they arrived a large military truck was driven at police vehicles, damaging four police cars and five other vehicles. No-one was injured.

  A man has been arrested on suspicion of attempted murder of police officers.

  He has also been arrested on multiple counts of suspicion of criminal damage, Avon and Somerset Police said.

  The military truck was used to smash into and past parked cars and police vehicles

  After driving through the road block, the truck hit a parked car and a signpost.

  The vehicle was driven to the A361 bridge over the M5 in Somerset - roughly six miles away - where it was left.

  The National Police Air Service (NPAS) said it deployed its Exeter aircraft to assist Avon and Somerset Police.

  The force said the man who was arrested remains in police custody.

  An area in Norton Fitzwarren has been cordoned off and forensic teams remain at the scene.

  Jo Roadnight, who lives in the area, says the incident came as a real shock, as normally Norton Fitzwarren is "a quiet place to live."

  "It was such a shock that something like this had happened locally," said Ms Roadnight.

  "As [people] were walking past our house they were chatting about what was going on and how unusual it was.

  "I couldn't believe it. It was quite scary."

