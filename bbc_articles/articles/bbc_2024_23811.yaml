title: 'Paralympics 2024: Faye Rogers reflects on ''unbelievable'' journey to gold
  - BBC Sport'
date: '2024-09-04'
section: Disability Sport
url: http://www.bbc.co.uk/sport/articles/cgrjkgked5eo
content: |-
  Faye Rogers reflects on her battle from a car accident three years ago to a Paralympic gold medal in the women's 100m S10 butterfly in Paris.

  As Faye Rogers stood with her Paralympic gold medal, glistening in the bright lights of the Paris La Defense Arena, the sense of achievement felt almost overwhelming. The Aberdeen-based swimmer had just triumphed in her first Paralympics, taking gold by the slenderest of margins ahead of team-mate Callie-Ann Warrington. She was pushed all the way in a thrilling contest in the women's 100m S10 butterfly. Her journey to this moment was just starting to hit home as she stood there, trying to comprehend what she had just done. Three years ago, Rogers was seriously injured in a car crash, the day before she was due to link up with new coach Patrick Miley, father of former Scottish swimmer Hannah, for the first time. She had already tried out for the Olympic team after taking up competitive swimming aged nine. Following that accident, this moment in Paris must have seemed an impossibility. She was told just that by the medical staff caring for her - that she would never race competitively again.

  "It's unbelievable," Rogers told BBC Scotland. "It's three years as of now since my accident and it's just such a lovely full circle. "Being told you're never going to be able to compete again, or even swim properly, as someone whose life revolved around swimming was really, really tough. "I'm really proud of myself for bouncing back from that. My coach, Patrick Miley, has played a huge part. He supported me since day one. "I had to phone Patrick from the hospital after the accident and I'd never actually worked with him yet. I was so anxious making that call because I didn't want to let him down. "I wasn't sure what he was going to say and he just couldn't have been more supportive. We've gone from there and my mum and dad and my whole family really, they've never stopped supporting me." So much must have gone through her mind before a race of that enormity considering everything that had come before. However, Rogers entirely grasped her chance. "It's not sunk in yet and, when I was on the podium, I was in shock," she said. "I didn't know where to look and I just couldn't stop grinning. It's unbelievable. I couldn't be happier. "You obviously hope to win but don't dare to think about it because, if it doesn't happen, it'll only make it hurt more. "Finishing, touching the wall, was the first time that I let myself think about it and I was just like, wow!"

  Rogers was born in Stockton-on Tees but confirmed her intention to compete for Scotland, if selected, at the Commonwealth Games in 2026, an event that may yet be held in Glasgow. "Representing Scotland would be amazing," she explained. "That is my plan. "I think the atmosphere up in Aberdeen, the team that we've got training up there is amazing. "Patrick, he's done wonders for my swimming and he is almost solely responsible for me being where I am today. "I've had so much support from the whole team up in Scotland. I would really love to be able to compete for Scotland one day."

