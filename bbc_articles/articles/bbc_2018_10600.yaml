title: Dua Lipa 'proud' of fans after concert removal - BBC News
date: '2018-09-13'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-45506312
content: |-
  The singer says she wants to perform again for her supporters and see "a room full of rainbows".

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch the moment some fans were taken out of Dua Lipa's concert in Shanghai

  Dua Lipa says she's "proud" of fans after some were forcefully removed from her concert in Shanghai, China.

  Videos posted on social media appear to show security workers pulling people out of their seats.

  It was suggested some fans were ejected for waving pro-gay rights flags at the concert on Wednesday.

  Writing on Twitter, Dua appears to reference this, saying: "I'm proud and grateful that you felt safe enough to show your pride at my show."

  She added: "I would love to come back for my fans when the time is right and hopefully see a room full of rainbows."

