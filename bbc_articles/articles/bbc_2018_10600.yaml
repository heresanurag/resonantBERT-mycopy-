  It's recently become more common for big names to play in Shanghai.

  It comes as record labels look to capitalise on a growth in the Chinese music market - despite Shanghai in particular being known as a difficult place to book shows in comparison to other major cities around the world.

  Before foreign artists can perform there, China's Ministry of Culture runs background checks on artists and their team.

  They have also been known to request to see set lists up to five months in advance of shows in order to approve lyrical content

  In 2006, Jay-Z wasn't allowed to play there because of his "vulgar lyrics" while the Rolling Stones were told to drop five songs - including Honky Tonk Woman and Let's Spend the Night Together - because of references to sexual themes.

  As more global super stars head to Shanghai with little sign of pre-tour admin being watered down, Dua Lipa might not be the last British export to be greeted with a different atmosphere to what they're used to on the rest of their world tour.

  This is the first time Dua Lipa has toured in China. She played in Guangzhou and Shanghai.

  A China representative for Dua Lipa's record company Warner Music Group told the BBC that no-one was available to comment.

  The singer is scheduled to perform next in Manila on Friday.

