title: 'CES 2019: The expanding door that fights parcel thieves - BBC News'
date: '2019-01-10'
section: General
url: http://www.bbc.co.uk/news/technology-46807384
content: |-
  A door that locks away small parcels and calls the police if larger ones are stolen is at CES.

  An expanding door that locks away small parcels and calls the police if larger ones are stolen is on show at the CES tech expo in Las Vegas.

  Its developers suggest the innovation is more secure than Amazon's own solution to the problem of parcel thieves.

  It looks a bit clunky and requires a fairly large hallway, but Chris Fox tried out the invention to see if it worked in practice.

  Read and watch all our CES coverage at bbc.com/ces2019
