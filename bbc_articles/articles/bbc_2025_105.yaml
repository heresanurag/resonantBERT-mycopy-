  The Environment Agency (EA) had issued 109 flood warnings in England, mostly concentrated in the North West. There were also 11 flood warnings in place for north Wales and 17 warnings in place for Scotland. The Met Office weather warnings in place across the UK, external:
  • None A yellow warning for snow and ice for northern Scotland until 10:00 tomorrow
  • None A yellow warning for ice for the rest of Scotland, Northern Ireland and much of England and Wales throughout this evening and into Thursday morning Previous rain warnings covering parts of the UK, including for rain in north west England, have now been lifted. London's New Year's Day parade suffered a short delay due to the high winds in the capital.

  Some braved the weather to watch London's New Year's Day parade

  The parade was delayed by 30 minutes to avoid coinciding with a squall line - a narrow band of extremely high wind and rain - that was expected in London around midday. Organisers said inflatable cartoon characters due to feature in the parade would not be used after advice from the Met Office.

  A weather front over Scotland is bringing rain with some sleet and snow over hills. It will bring much colder arctic air as it move southwards, with sunny spells and snow showers following. A few centimetres of snow is expected at low elevations overnight, but the hills of north Scotland are likely to see 5-10cm of snow in places bringing some local disruption. It will feel increasingly bitter as arctic air reaches all areas by Thursday. Over the weekend, there is a yellow snow warning in place for the vast majority of the UK, stretching from southern Scotland, across north England, the Midlands, Wales, over London and across much of the south east and west. An area of low pressure will move into this cold air on Sunday bringing rain and some disruptive snow on its northern edge.

  The poor weather conditions are causing rail disruptions in parts of the country and several rail operators have urged passengers to check online before travelling.
  • None Heavy flooding led to widespread cancellations across Northern Rail services on Wednesday, including to and from Manchester airport.
  • None The TransPennine Express service urged customers not to travel at all on Wednesday due to heavy flooding on several routes.
  • None Transport for Wales said the weather had caused a number of its lines to be blocked.

  Heavy rain flooded roads in the Scottish Highlands earlier on New Year's Eve

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Spectacular fireworks display brings in new year for UK

  Despite the poor weather, thousands of people gathered along Embankment in the capital to see in the New Year with a fireworks display over the Thames at midnight on Wednesday. Celebrations in Manchester also went ahead as planned, after its fireworks display was moved to the top of the city's central library. Hogmanay celebrations in Edinburgh were cancelled over public safety concerns, as were fireworks displays in Blackpool, Newcastle, the Isle of Wight and Ripon in North Yorkshire. Scotland's Culture Secretary Angus Robertson said cancelling the festival was "undoubtedly" the correct decision. The fireworks display in Blackpool was cancelled because of the expected high winds. The town's other events, including a projection show to mark the start of 2025, went ahead.

