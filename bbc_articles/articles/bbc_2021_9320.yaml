id: bbc_2021_9320
title: 'Germany floods: Collapsed buildings and submerged cars - BBC News'
date: '2021-07-16'
section: General
url: http://www.bbc.co.uk/news/world-europe-57849078
content: |-
  Heavy rain has caused flooding in western Germany, leading to collapsed buildings and submerged cars.

  Severe flooding has hit western Germany, leaving more than 50 people dead.

  Buildings and vehicles were washed away and hundreds of people were evacuated.

  Police and the army were deployed to some areas to help residents.
