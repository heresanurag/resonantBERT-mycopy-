title: Plane crashes into bus on busy São Paulo street - BBC News
date: '2025-02-08'
section: General
url: http://www.bbc.co.uk/news/videos/cevepp0wdn9o
content: |-
  Two people were killed in the accident, the Brazilian city's fire department said.

  Two people were killed and two more injured when a small plane crashed in São Paulo, emergency services have confirmed.

  The aircraft came down on the busy Marques de Sao Vicente Avenue, colliding with a bus on the ground.

  A passenger on the bus and a motorcyclist hit by debris were taken to hospital, while those who died were aboard the plane, fire department spokesperson Captain Maycon Cristo said.

  Smoke could be seen rising over Brazil's largest city in the aftermath of the incident.
