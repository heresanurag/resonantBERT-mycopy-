title: Lincolnshire's Cranswick pig farming suspended over abuse claims - BBC News
date: '2025-05-13'
section: England
url: http://www.bbc.co.uk/news/articles/c3e5398lp51o
content: |-
  Cranswick says it has suspended "the team" at one of its Lincolnshire sites while it investigates.

  The footage was filmed over several weeks last year, according to Animal Justice Project

  Supermarket food supplier Cranswick has suspended operations at one of its farms after footage emerged appearing to show workers abusing piglets. The Hull-based firm said "the team" at Northmoor Farm near Market Rasen, Lincolnshire, had been suspended, adding that "an urgent and thorough investigation" was under way. Asda, Morrisons, Sainsbury's and Tesco have suspended use of the farm. A spokesperson for Cranswick said: "The welfare of the animals we rear is of the utmost importance and we are extremely disappointed to see the unacceptable lapse of welfare standards captured at Northmoor Farm."

  The footage was filmed by Animal Justice Project (AJP). According to AJP, workers were filmed holding piglets by their hind legs and slamming them to the ground, using a banned method of killing the animals known as "piglet thumping". Other footage, first reported by the Mail on Sunday newspaper, appeared to show the botched killing of a sow that left the animal screaming. A sow was also shown apparently being beaten with metal bars. AJP claimed a worker who failed to kill a sow using a bolt gun told an undercover worker: "Don't let nobody see you doing like what we did." A Cranswick spokesperson said: "As soon as we saw the footage, we immediately suspended the team working at the farm and we are conducting an urgent and thorough investigation. "We have also suspended the farm from supplying any pigs until the investigation is completed."

  The allegations relate to a site near Market Rasen

  Tesco said it expected all its suppliers to "adhere to our high welfare standards", while a Sainsbury's spokesperson said: "These allegations involve unacceptable treatment of animals, which has no place in our supply chain." A Morrisons spokesperson said: "We care deeply about animal welfare and these are shocking and concerning allegations." AJP has lodged a legal complaint with trading standards citing multiple breaches of the Welfare of Animals at the Time of Killing regulations, external by the farm. Under the legislation, using blunt trauma to kill pigs is illegal in England. In a letter, AJP's barrister Ayesha Smart urged trading standards to investigate the incident and "enforce any breaches of law to ensure that animal welfare standards in our society are upheld and that those who wilfully disregard them are held accountable". Emma Milligan, trading standards operational delivery manager, said they were reviewing footage captured at Northmoor Farm. "We take reports of cruelty towards livestock extremely seriously and we work with partners, including Lincolnshire Police and the Animal and Plant Health Agency to investigate and take action to protect livestock," she said.

  Using blunt trauma to kill pigs is illegal under the Welfare of Animals at the Time of Killing (England) Regulations

  Claire Palmer, AJP's founder, said: "There must be an independent public inquiry into pig farming practices and regulatory failures. "Ultimately, we're calling for a legislative phase-out of pig farming in favour of a food system that no longer depends on animal suffering." The National Pig Association has been approached for a comment.

