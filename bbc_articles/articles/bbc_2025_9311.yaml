title: 'Eiger: Two dead in Swiss mountain avalanche - BBC News'
date: '2025-05-18'
section: Europe
url: http://www.bbc.co.uk/news/articles/c8d14yyverro
content: |-
  The police say that eight people were in the area on a ski tour and all but one were swept away.

  The avalanche on the Eiger occurred around midday on Saturday

  At least two people have died after a "severe" avalanche on the Eiger mountain in the Swiss Alps on Saturday, local police say. The avalanche took place shortly after midday, and swept away seven people who were in the area on a ski tour, prompting the police to launch a large-scale rescue operation. One man died at the scene while another was treated at the scene but later died in hospital. Police had earlier reported that everyone who had been buried in the avalanche had been rescued. The Eiger, at 3,967m (13,000 ft), is a well-known peak in Bern, near the tourist resorts of Grindelwald, Lauterbrunnen, and Wengen.

  At least eight people were on the mountain when the avalanche occurred, but one person had not been affected, police said. Five other people had been flown to hospital where they were receiving treatment. Authorities are investigating the incident. The north face of the Eiger is famous among mountaineers and has a reputation for being one of the world's most challenging climbs.
