  Mr Lewis said that while the UK remained in the EU, Conservative MEPs were "fully represented and part of the process of making those decisions".

  Mr Lewis also defended the Tories' failure to provide figures for the total number of party members they have.

  According to some estimates, their numbers have fallen behind Labour, the SNP and the Liberal Democrats.

  Asked how it compared with Labour's membership, which has surged beyond 500,000, Mr Lewis said he was "not going to play a numbers game", and that he planned to obtain an overall figure which was not currently available.

  The party has a "huge number" of members and activists across the country, he added.
