content: |-
  Shane O'Brien appears in court over the stabbing in a London bar after being arrested in Romania.

  Shane O'Brien is alleged to have murdered 21-year-old Josh Hanson

  A man has appeared in court charged with murder after being extradited from Romania over a stabbing in London more than three years ago.

  Shane O'Brien, 31, of Hillingdon, is accused of killing Josh Hanson at the RE bar in Eastcote in October 2015.

  He was returned to the UK after being detained in Romania on 23 March.

  Mr O'Brien is now due to appear from custody at the Old Bailey on 9 April after a brief hearing at Westminster Magistrates' Court.

  Mr Hanson, 21, from Kingsbury in north-west London, was pronounced dead at the scene on 11 October 2015.

  A post-mortem examination revealed he died from a haemorrhage, inhalation of blood and an incised wound to the neck.

  Josh Hanson was pronounced dead at the scene

