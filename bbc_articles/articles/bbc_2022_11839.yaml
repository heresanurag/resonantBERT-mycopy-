title: 'Flint: Arrest as missing girl, 12, found in Birmingham - BBC News'
date: '2022-09-26'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-63028482
content: |-
  A man is in custody following an "intensive investigation" involving two police forces.

  The investigation involved North Wales Police, as well as West Midlands Police

  A man has been arrested after a missing 12-year-old girl from north Wales was found in Birmingham.

  North Wales Police were alerted on Friday afternoon and an "intensive investigation" launched alongside West Midlands Police.

  Officers said the girl was traced about 100 miles away from her home in Flint, in Flintshire, and she has now been reunited with her family.
