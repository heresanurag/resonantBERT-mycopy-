content: |-
  The former chancellor is under pressure after it was revealed he paid a penalty to HMRC last year related to unpaid tax.

  Government likely to insist all questions about Zahawi wait till inquiry is over

  Labour have an urgent question in the Commons shortly that will allow them to press the government on Nadhim Zahawi and his taxes. Opposition parties have been calling for the prime minister to sack the Conservative Party chairman over the revelation that he paid a penalty over previously unpaid tax while serving as chancellor. But the prime minister's announcement that he wants his ethics advisor to investigate whether there were any breaches of the ministerial code actually gives Zahawi some breathing space. Though the prime minister says there are "questions that need answering", Nadhim Zahawi will stay in post while he's being investigated. Any final decision from Rishi Sunak has been delayed. The Conservative Party chairman has said he's confident he's "acted properly throughout". Investigations can sometimes take the immediate pressure off – they kick a decision into the long grass. When this issue makes its way to the floor of the Commons shortly, we can expect the government minister who's responding to insist that all questions should wait until the inquiry is done. An answer that works for now, but won’t work forever.
