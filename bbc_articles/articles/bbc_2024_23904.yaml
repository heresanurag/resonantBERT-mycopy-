title: Beekeeper inspired by grandfather's long lost hives - BBC News
date: '2024-09-05'
section: Edinburgh, Fife & East
url: http://www.bbc.co.uk/news/articles/c049365367ro
content: |-
  Ross Main now tends five million bees - all descended from his late grandfather's hive.

  Ross Main tends to about five million bees

  When Ross Main tracked down the abandoned beehives his grandfather had kept in a disused quarry, he was surprised to find that the bees were still there. The fine art graduate now manages dozens of colonies and millions of bees across Fife – and they are all descended from his grandfather’s hive. Ross grew up in Dunbar and was often taken to the East Lothian quarry near Innerwick during his childhood. When he became a father for the first time in 2015, he was inspired to try and find the old hives. He thought his family had sold them off several years earlier, so did not expect to find much. Ross, 36, drove from his home in Fife and tracked down the location, hundreds of metres down an old track which was overgrown with gorse.

  William Main used to sell honey to butcher shops in East Lothian

  "I made my way through and there was still a hive there, " he told BBC Scotland News. “I couldn't believe the bees had still survived." The hive had been untouched since his grandfather, William Main, died of cancer in 2007, aged 77. It was dilapidated, so Ross got hold of a beekeeping suit and a beehive and learned how to transfer the colony to their new home. Once the transfer was made, which takes about a month, he was able to move the colony in their new hive to a new home in Auchtermuchty, Fife.

