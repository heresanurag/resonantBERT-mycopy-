title: 'Battersea shooting: Rico Andrews named as murder victim - BBC News'
date: '2023-10-09'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-67057671
content: |-
  Rico Andrews was killed in Battersea on Thursday night, prompting a murder investigation.

  Rico Andrews was shot dead in Shuttleworth Road on Thursday

  A man who was shot dead on a south-west London street has been named.

  Metropolitan Police officers were called to reports of gunshots heard on Shuttleworth Road in Battersea at about 21:50 BST on Thursday.

  Rico Andrews, 21, was found injured by officers and paramedics who provided emergency first-aid, but he died at the scene.

  A post-mortem examination found the cause of death to be a gunshot wound to the chest.

  Mr Andrews' next of kin are being supported by specialist officers. There have been no arrests and inquiries continue.

  Det Ch Insp Neil John, who is leading the murder investigation, said: "This is a tragic incident where a young man has lost his life whilst standing on a street in Battersea.

  "Detectives are working at pace to gather as much information as possible and I would ask anyone who was in the area and saw events unfold, or anyone who has captured this on phone or doorbell footage, to contact police immediately."

