id: bbc_2018_3429
title: Immigration agents detain mother in front of screaming children - BBC News
date: '2018-03-09'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-43350249
content: |-
  Plainclothes officers seize a woman near a California school in front of her three daughters.

  Perla Morales-Luna was arrested by plainclothes officers in front of her three screaming daughters in National City, California. She is suspected of a role in a smuggling ring and being in the US illegally.
