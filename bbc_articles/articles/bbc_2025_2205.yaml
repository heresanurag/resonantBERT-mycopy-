content: |-
  Campbell Scott disappeared from a luxury hotel before being found miles outside Nairobi by a cattle herder.

  This video can not be played To play this video you need to enable JavaScript in your browser. Officials examine area of shrubland where missing businessman was found dead

  The body of a murdered Scottish businessman was found in a sack by a Kenyan cattle herder days after he went missing from his hotel. Campbell Scott, 58, arrived in Nairobi's affluent Westlands district for a business trip on 15 February. He was last seen the following night with an unidentified man, having been to a nightclub. The BBC has learned his body was found with visible injuries in a forest about 60 miles (96.5km) outside of Nairobi. His hands and legs had been bound with rope. Local police have arrested two people - a taxi driver and a waiter from the club - who may have been among the last to see him alive.

  Mr Scott, from Dunfermline in Fife, was a senior director at credit scoring firm Fico. He was attending a conference at the JW Marriott Hotel in Nairobi and was due to meet colleagues to discuss a presentation. When he did not return to the hotel on 16 February, colleagues tried to call him but could not reach him. They filed a police report and a search was launched, with Interpol later joining the investigation. On Saturday police received a report that a cattle herder had seen a body inside a sack, which was later identified as Mr Scott. Footage taken at the scene shows a number of men wearing surgical masks and gloves examining the shrubland.

  It is expected that a post-mortem examination will be carried out later on Tuesday. The BBC's deputy Africa editor Anne Soy said the apparent murder has surprised the local community. She told the BBC's Good Morning Scotland programme: "It is unusual especially because the victim is a foreigner who had just arrived in the country. "He was going to meet other businessmen for what looks like legitimate business. "There are really no theories as to what could have happened. The employer has asked people not to speculate about any issues around his death." Mr Scott studied at Woodmill High School in Dunfermline and Kirkcaldy Technical College, going on to work for a number of companies before joining Fico. Confirming his death on Monday, a spokeswoman for the firm said staff were "devastated" by the news. She added: "Campbell was a leader in our international Scores business. "He joined Fico in 2014 and was instrumental in introducing Scores to new markets and growing our business with existing partnerships. We mourn his passing and will miss his humour and kindness. "Our thoughts are with Campbell's family and friends. We ask that the media respect their privacy." The UK's Foreign Office said: "We are supporting the family of a British man who has died in Kenya and are in contact with the local authorities."
