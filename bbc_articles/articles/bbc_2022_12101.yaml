title: 'Hollie Thomson: Man accused of murder appears in court - BBC News'
date: '2022-09-15'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-62898828
content: |-
  Ms Thomson was from the Greenan area of West Belfast and was found dead on Sunday.

  A 31-year-old man has appeared in court charged with the murder of 28-year-old Hollie Thomson.

  Ms Thomson, from the Greenan area of West Belfast, was found dead in a house on Sunday 11 September.

  Chris Morelli, from Willowvale Avenue, appeared before Belfast Magistrates Court via video-link on Wednesday.

  A police witness said that Ms Thomson had died from suffocation but this was challenged by a lawyer for the defendant.

  A second post-mortem examination is to take place before Ms Thomson's body is released to her family.

  The court was also told the defendant had attempted to take his own life shortly after the murder of Ms Thomson.

  Bail was refused and Mr Morelli is now due to appear before Belfast's Crown Court.
