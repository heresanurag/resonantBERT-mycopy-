  Kane keen to carry on beyond 2026 World Cup

  This video can not be played To play this video you need to enable JavaScript in your browser.

  England captain Harry Kane says the 2026 Fifa World Cup may not be his last international tournament. The 31-year-old's future remains uncertain, despite extending his all-time scoring record to 69 goals in 103 appearances for his country when he scored the opener in the 5-0 win against the Republic of Ireland on Sunday. England interim manager Lee Carsley benched Kane for the 3-0 victory in Greece on Thursday, while he was criticised for his performances at Euro 2024. But when asked if the next World Cup, to be held in the United States, Canada and Mexico, would be his last shot at glory with England, the Bayern Munich striker told PA: "I don't think so. "I think there's a perception when you get to your 30s that you're coming to an end, but for me I'm performing at the highest level I've ever performed and feel as good as I've ever felt, so it's about taking in the moment.

  "I don't like to look too far ahead and in my career, I never have, the [2026] World Cup is going to be exciting. "In America it will be an incredible occasion and ultimately it's about trying to win that, looking at where you are, where to improve and it will be no different in a couple of years." Kane was speaking at the unveiling of a statue and a mural of him at the Peter May Sports Centre in east London, where he began playing as a five-year-old for Ridgeway Rovers. "It's pretty special to be honest," Kane told BBC Newsround. "I played on these pitches as a five-year-old with dreams of playing for England, and I've been lucky enough to achieve that. "Hopefully the boys and girls will walk past and be inspired by the story of my journey, my life and hard work." When asked what it would take to get a statue of him at Wembley Stadium, he added: "I think we need to win a major tournament." England will look to do that under Thomas Tuchel, who will begin his 18-month contract as manager on 1 January after Carsley's temporary spell. Kane played under Tuchel at Bayern last season and is confident the German can end the Three Lions' trophy drought. "He's a fantastic coach and a really good guy as well," he said. "I'm excited to work with him again. "I know he'll bring bundles of energy, and come March we'll be focused on America and the World Cup, and that's an exciting prospect to look forward to." England will find out their World Cup qualifying opponents on 13 December, with the first games scheduled to take place in March.

  Harry Kane scored his 69th goal for England in 103 appearances against the Republic of Ireland
