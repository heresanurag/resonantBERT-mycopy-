title: 'COP27: Barbados PM Mia Mottley''s plea to rich nations - BBC News'
date: '2022-11-08'
section: General
url: http://www.bbc.co.uk/news/science-environment-63557041
content: |-
  Prime Minister Mia Mottley calls for more funding to help poorer nations fight climate change.

  The Prime Minister of Barbados Mia Mottley has called on rich nations to do more to help at the developing world fight climate change, as she addressed the COP27 climate summit.

  She said the world looked like it did during colonial times and she called on industrialised countries to provide funding to help "fight this battle".
