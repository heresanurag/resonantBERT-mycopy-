title: 'Radio 1''s Big Weekend: AJ Tracey and London Grammar join line-up - BBC News'
date: '2024-05-14'
section: Newsbeat
url: http://www.bbc.co.uk/news/newsbeat-69007693
content: |-
  AJ Tracey and London Grammar are among the artists to join the line-up at Luton's Stockwood Park.

  AJ Tracey is joining the Sunday at Big Weekend

  New names have been added to Radio 1's Big Weekend line-up, with AJ Tracey and London Grammar joining the bill. The festival, which is taking place from 24 to 26 May, is being headlined by Coldplay, Raye and Chase & Status. Jax Jones, Remi Wolf, Nathan Dawe and Wilkinson are now also going to be hitting the stage at Luton's Stockwood Park. The new acts were announced by Greg James on his Breakfast show, who said the "line-up is now complete". This year's Big Weekend will be the first time artists have played across all of the event's four stages for three full days - in previous years Friday was reserved for an 18-plus dance night. Over 100,000 music fans are expected to be in attendance at the festival.

  Sabrina Carpenter, who is currently UK number one with Espresso, is performing on the Sunday

  Nathan Dawe and Wilkinson have been added to the Friday, Jax Jones has been added to the Saturday, while AJ Tracey, London Grammar and Remi Wolf are performing on the Sunday. It was previously announced Chase & Status and Becky Hill will play the main stage on the opening Friday, alongside acts like Rudimental and Ella Henderson, with artists such as Raye, Aitch, Griff and Mabel announced as playing the main stage on Saturday. Coldplay, Sabrina Carpenter, Olly Alexander and Vampire Weekend will be on the main stage on the final day of the festival.

  Stockwood Park is in the south of the town, about a 10-minute drive from Luton FC's ground at Kenilworth Road. The ground became football's most-memed away end when the club returned to the Premier League in 2023. Luton is also the hometown of actress Emily Atack, presenter Stacy Dooley and cricketer Monty Panesar. The festival returned in 2022 in Coventry after a break in the previous two years due to Covid-19.

