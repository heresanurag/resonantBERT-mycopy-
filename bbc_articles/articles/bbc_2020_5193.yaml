title: 'Coronavirus: People making a difference - BBC News'
date: '2020-05-04'
section: England
url: http://www.bbc.co.uk/news/live/uk-england-52524999
content: |-
  BBC News brings you a day of live coverage focusing on the positive stories at this challenging time.

  Politicians, police, postal workers and paramedics...are just a few of the key workers on show in scarecrow form around the village of Kilkhampton in Cornwall.

  Resident Val Shadrick said she put out a call on Facebook for locals to make the effigies to keep the village entertained.

  Ms Shadrick said she expected about 30 to be put up, but more than 150 have appeared.

  She said initially she thought making the straw sentinels would be "something that the children and bigger kids could get involved with, should they be bored" as well as livening up the villager's daily walks.

  But as more and more people got involved, Ms Shadrick said it had reached the point where she'd coined the phrase "scarecrow-navirus".
