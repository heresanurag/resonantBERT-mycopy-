title: Zendaya pays tribute to Euphoria co-star Angus Cloud - BBC News
date: '2023-08-02'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-66375353
content: |-
  Tributes are continuing to be posted following the death of the actor aged 25.

  Zendaya (pictured here with Cloud last year) is the star of Euphoria

  Zendaya has said that "words are not enough to describe the infinite beauty" of her Euphoria co-star Angus Cloud, following his death aged 25.

  The actress, who stars as recovering addict Ruby "Rue" Bennett in the HBO series, shared a black and white image of Cloud on Instagram, celebrating his "boundless light, love and joy".

  Rappers Drake - an executive producer on it - and Kid Cudi also paid homage.

  Cloud died on Monday at his family home in Oakland, California, a publicist confirmed. "It is with the heaviest heart that we had to say goodbye to an incredible human today," said the Cloud family.

