title: 'Newspaper headlines: Perry in space and Birmingham bin strikes - BBC News'
date: '2025-04-14'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c807dp0yk0jo
content: |-
  A number of Tuesday's front pages reflect on Katy Perry becoming the first pop star to venture into space.

  The Daily Telegraph, external leads with a warning that bin workers across the country could be poised to go on strike. The paper says the Unite union is considering staging walkouts in areas where there are pay disputes similar to the row in Birmingham, which has led to rubbish piling up on the streets. The headline on the front of the Daily Mail, external is "Bin strike grinds on as Labour humiliated". It says Unite's members in Birmingham rejected an improved pay offer despite a plea by the Deputy Prime Minister Angela Rayner for them to accept. The Guardian, external reports that senior Labour figures are urging the government to review Chinese investment in Britain in the wake of the British Steel episode. A Labour peer, Helena Kennedy, tells the paper "this fiasco shows the risks". A Conservative MP is quoted by the Daily Express saying "China is a threat to everything we do", while the Times, external says the Energy Secretary Ed Miliband publicly encouraged Chinese involvement in key parts of UK infrastructure less than a month ago.

  The i Paper, external says Downing Street has been trying to calm tensions with China diplomatically. The Financial Times, external reports that some European Commission staff who are heading to the United States for meetings next week are being given burner phones and basic laptops. The paper says such counter-espionage methods are usually reserved for trips to China - and illustrate the worsening in relations with the US since President Trump returned to power. Katy Perry is back in the papers for a second day after her brief trip to space. The Sun's, external headline, "I kissed the ground and I liked it" is neatly echoed by the Daily Star's, external "I went to space and I liked it", as they cover the singer's trip - and grateful return to Earth - alongside an all-female crew.

