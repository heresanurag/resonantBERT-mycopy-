title: Murder accused Michael and Kerry Ives called child beaters - court - BBC News
date: '2025-06-09'
section: Wales
url: http://www.bbc.co.uk/news/articles/clygxk0j5p1o
content: |-
  Michael and Kerry Ives are on trial accused of murdering their two-year-old grandson Ethan.

  A couple accused of murdering their grandson were called "child beaters" by their son, a court has heard. Two-year-old Ethan Ives-Griffiths was living with his grandparents before he died on 16 August 2021 from a catastrophic head injury. Michael Ives, 47, and Kerry Ives, 46, both of Garden City, Flintshire, deny murder, causing or allowing the death of a child and child cruelty. Ethan's mother, Shannon Ives, 28, of Mold, has denied causing or allowing the death of a child and child cruelty.

  On Monday, Mold Crown Court heard details of text messages sent by members of the Ives family to each other. In one message, Kerry Ives and her adult son discussed him moving out of her home because she lied about her tenancy.

  Kerry Ives, 46, and Michael Ives, 47, are charged with the murder of their grandson Ethan

  In one message, Kerry Ives said: "The reason dad told you to get out was because you called us 'child beaters'." Her son replied that by the time "you realise what you put all us kids through, it'll be too late". His mother responded by saying: "What's he put you through? Nothing." She said he too would have issues if "you had parents like he did: Kicked out at a young age, going into a children's home, being hit every day". Kerry Ives said she too was "hit every day by my mum and dad". The court was told Mr Ives sent a text to another of his adult children after Ethan moved in to live with the couple. It said when Ethan was being "naughty" he "needs to learn the hard way".

  Ethan's mother, Shannon Ives, is accused of causing or allowing the death of a child and child cruelty

  By July 2021, Ethan was on the child protection register and the court heard details of repeated contact between Shannon Ives and social services. In one text message, she asked: "I won't have the children taken from me, will I?" The jury heard social workers and health visitors made frequent attempts to contact Shannon Ives and establish where she and Ethan were staying. Prosecutor Caroline Rees KC told the court earlier Ethan was "quiet and withdrawn, small and painfully thin", by the time of his death. The jury was played a series of CCTV clips, taken from security cameras installed in the Ives' front and rear garden. On 4 August 2021 - the day he collapsed - Ethan was seen struggling to stand up on a trampoline as two older children bounced around him while his grandparents and mother looked on. In one video, Shannon Ives climbed on to the trampoline while Ethan was standing and jumped, causing him to fall back down. Later, Michael Ives was seen picking Ethan up by one arm from the trampoline and carrying him back to the house. A while later Ethan was back on the trampoline as Michael Ives appeared to make a gesture with his closed hand to an older child who then seemed to strike Ethan several times on his head. Ethan was seen in one video having his hands placed on his head by Michael Ives as he sat on the trampoline. He struggled to keep his hands in that position as he repeatedly tried to stay upright. In the two weeks before his death, the prosecution said Shannon Ives sent messages to a health visitor and social worker saying either she or Ethan were unwell, but CCTV footage on those days appeared to show them both leaving and returning to the house.

  Ethan was discovered "severely underweight, covered in bruises at his grandparents' house

  The jury also heard a 13-minute 999 call made by Kerry Ives to the ambulance service on the evening of 14 August 2021, saying he had collapsed while watching television. "He fell to the floor, and his body has gone all limp," she said, adding that he was "gasping for breath". Michael Ives left the house to get a local defibrillator and the call handler is heard instructing Kerry Ives to place Ethan on his back and to check his airway. Michael Ives returned and told the call handler Ethan had a similar episode the day before but had come around. Family members can be heard saying "come on, Ethan". They also said his condition had not changed, and that while he "appears to be" breathing he is still "unresponsive". Michael Ives is heard saying "he looks like he's asleep". The call ended when paramedics arrived at the house. As the recording was played in court, Michael Ives was sat with his head in his hand, while Shannon Ives wiped away tears. Ethan collapsed on 14 August 2021 after a "forceful attack" by those who should have cared for him most, the jury was told. A post-mortem examination showed he weighed 22lb (10kg) and was 92cm (3ft) tall. He had 40 different injuries on his body, including a swollen brain and numerous trauma injuries to his head and abdomen. The court heard the pathologist concluded it was likely he had been the victim of non-accidental injuries and the cause of death was a head injury. The defendants deny all the charges and the trial continues.
