  Gatland offered to resign after the loss to Italy in 2024 but vowed to fight on immediately after the latest defeat by the Azzurri. Following the winless autumn 2024 series - which included defeats against Fiji, Australia and South Africa - the WRU held a review. Gatland was given the green light to continue for the 2025 Six Nations but his second stint sunk to a new low with a record 43-0 defeat in the opening game against France in Paris, before the loss in Rome. It is the third time a Wales head coach has left in the middle of the Six Nations following Graham Henry (2002) and Mike Ruddock (2006).

