  Gatland's return has coincided with a tumultuous time for Welsh rugby both on and off the pitch, starting with a financial crisis that brought the threat of a strike by the national team before facing England in February 2023. That game went ahead but issues surrounding the financing of the professional game in Wales have continued. Gatland managed just one win in the 2023 Six Nations, but galvanised Wales to reach the quarter-finals of the World Cup that year. Wales have not won a Test since beating Georgia in the pool stages of that tournament, finishing bottom of the Six Nations for the first time in 21 years in 2024 and going winless for a full calendar year for the first time since 1937. Gatland had been under increasing pressure and scrutiny amid a wider debate about the structures underpinning the national team. After the record home defeat by Australia in November 2024, former Wales captain Gwyn Jones said he thought Gatland had already "checked out". There was also criticism from some of his former players like Mike Phillips, Tom Shanklin, Dan Biggar and Jamie Roberts, who is currently a WRU board member.

