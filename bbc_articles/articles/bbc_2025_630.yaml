content: |-
  Warren Gatland leaves his role as Wales head coach by mutual consent after 14 successive Test match defeats.

  Warren Gatland was Wales head coach from 2007 to 2019 before returning for a second spell in December 2022

  Warren Gatland has left his role as Wales head coach during the Six Nations after a record 14 successive Test match defeats. Gatland, 61, was contracted until the 2027 World Cup but has departed by mutual consent, the Welsh Rugby Union (WRU) confirmed. Cardiff head coach Matt Sherratt will take over as interim head coach for the remaining three games of the Six Nations. WRU chief executive Abi Tierney said Gatland initiated talks over his future after the loss in Italy on Saturday in which both parties agreed an immediate change was "in the best interests" of the Wales squad. In a statement, Gatland said: "I would like to thank the WRU board for the faith shown in me after a tough campaign throughout 2024 and affording me the time and resource to try to turn things around for this 2025 tournament. "We have worked hard, we have a talented young squad that is developing and have been desperate to turn potential into results but now is the right time for a change. "I've reached the end of this particular chapter, but remain grateful to all those in Wales who have supported me, the players who have played for me and all those around me, especially my management team, who have contributed to what we have achieved over the years." No announcement has been made on the rest of the current coaching team.

  Wales face Ireland on 22 February in Cardiff, then travel to Scotland on 8 March before finishing the tournament at home against England on 15 March. Tierney said the WRU wants to appoint a permanent successor before the summer tour to Japan with "all options open". Former Australia coach Michael Cheika, Glasgow coach Franco Smith and Ireland interim boss Simon Easterby are potential long-term successors. "We are grateful to Warren for all he has done for the game in Wales. He remains our longest-serving and most decorated head coach in terms of the silverware he has won," said Tierney. "It is a credit to [Sherratt] that he has not hesitated to answer Wales' call."

  Matt Sherratt previously worked as Wales attack coach under Rob Howley between 2016 and 2017

  Gatland presided over statistically the worst Wales side in their 144-year international rugby history, slumping to their 14th successive defeat as they lost 22-15 to Italy in Rome last weekend. The New Zealander previously enjoyed a successful 12-year spell as Wales coach which included three Grand Slams, two World Cup semi-finals and a record run of 14 victories that led to Wales briefly topping the world rankings. He left after the 2019 Rugby World Cup before returning for a second stint when he replaced Wayne Pivac in December 2022. Since then Gatland has overseen just six victories in 26 Tests - a win ratio of just 23%. Wales have also slumped to a lowest position of 12th in the world rankings. Over both spells Gatland has been in charge for 151 games with his overall record standing at 76 wins, 73 defeats and two draws.

