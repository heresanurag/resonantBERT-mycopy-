title: Protests greet Donald Trump's nomination of Neil Gorsuch - BBC News
date: '2017-02-01'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38823812
content: |-
  Protesters condemn the nomination of Neil Gorsuch by Donald Trump outside the US Supreme Court.

  Protests have been taking place outside the US Supreme Court at the nomination of Neil Gorsuch by Donald Trump.

  Labor union leader Mary Kay Henry was among those to voice her opposition.
