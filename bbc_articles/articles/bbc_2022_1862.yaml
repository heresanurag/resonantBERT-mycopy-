  Strolz was also thinking about his nearest and dearest after picking up his medal. "It means the world to me because I was not on the team any more last summer, and made it back into the team, got the full support again," he said. "When I think about it, all the pictures and the gold medal of my father, it's hard for me not to cry. It's just a dream coming true."

  This video can not be played To play this video you need to enable JavaScript in your browser. Winter Olympics: Therese Johaug wins gold in 10km cross-country by less than half a second

  Norway's Therese Johaug won gold in the women's 10km classic to add to an impressive medal haul. The 33-year-old, who also won the first gold medal at this year's Winter Olympics - in the 15km skiathlon on Saturday, came into the Games with 19 World Championship medals to her name and won bronze over this distance at Sochi in 2014. Finland's Kerttu Niskanen, finished less than half a second behind to win the silver with her compatriot Krista Parmakoski securing the bronze medal. There was a second gold of the Games too for Irene Schouten of the Netherlands, who added the speed skating 5,000m title to her victory in the 3,000m earlier in the week. Schouten, the world 5,000m champion, set an Olympic record with a winning time of six minutes 43.51 seconds. Silver went to Canada's Isabelle Weidemann, with Martina Sablikova of the Czech Republic getting bronze. In the men's snowboard cross, Austria's Alessandro Haemmerle took the gold medal in a photo finish from Eliot Grondin of Canada, with Italy's Omar Visintin third.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A star-studded quartet of Natalie Geisenberger, Johannes Ludwig and Tobias Wendl and Tobias Arlt helped Germany edge to gold in the luge team relay. All four had already won across the women's singles, men's singles and doubles in Beijing and they narrowly pipped Austria, with Latvia winning the bronze medal. Meanwhile, Ashley Caldwell, Christopher Lillis and Justin Schoenefeld helped the USA win gold in the inaugural mixed team aerials. Hosts China, who ended up with silver, led early on but Lillis recorded the highest score of the competition (135.00) before Schoenefeld sealed their victory. Canada held off Switzerland to win the bronze.

