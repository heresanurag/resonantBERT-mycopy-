  Elsewhere, Austria's Johannes Strolz won gold in the men's Alpine combined - and created a little piece of history. The 29-year-old's success sees him emulate his father Hubert, who finished first in the same discipline in Calgary in 1988. They are the first father-son pair to win an Olympic title in the same Alpine skiing event.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Norway's Aleksander Aamodt Kilde followed up his bronze in the men's super-G with a silver and Canada's James Crawford took the bronze. Kilde's medal follows a difficult Games so far for his partner, American Mikaela Shiffrin. Shiffrin was a favourite for medals in both the giant slalom and the slalom but pulled up early in her attempts at both events. She has suggested she might make way for a team-mate to complete in her place in Friday's super G. Kilde had defended Shiffrin in the wake of her shock early exits, external and Shiffrin duly congratulated him on his success via social media.

