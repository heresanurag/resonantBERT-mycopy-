title: 'Winter Olympics: Chloe Kim wins snowboard halfpipe gold to retain title -
  BBC Sport'
date: '2022-02-10'
section: Winter Olympics
url: http://www.bbc.co.uk/sport/winter-olympics/60328694
content: |-
  American Chloe Kim wins snowboard halfpipe gold with incredible ease to retain her Winter Olympic title from 2018.

  This video can not be played To play this video you need to enable JavaScript in your browser. Winter Olympics: USA's Chloe Kim bags the second gold of her career

  Chloe Kim won snowboard halfpipe gold with incredible ease to retain her Winter Olympic title from 2018. Unbeaten since 2019, the 21-year-old American blew away her competition with a 94.00 score on her opening run. Such was her lead, Kim attempted 1260s - never before landed in women's halfpipe competition - on her second and third runs but fell both times. Spain's Queralt Castellet won silver with 90.25 while Japan's Sena Tomita took the bronze medal with 88.25. Speaking about her emotional reaction to landing her first run, Kim said: "I was so proud of myself. "I had the worst practice ever. I probably landed my run twice when I'm used to landing it eight times, normally, and so that puts you in a weird headspace. It felt so inconsistent. "I didn't want to feel all that pressure of having to land my first safety run [in competition]. I overflowed with emotion when I was able to land it on the first go, and it opened up a lot of opportunity for me to go try something new."

  In Pyeongchang four years ago, Kim - then just 17 - became the youngest woman to win an Olympic snowboarding gold medal. But in the aftermath of her success, she struggled with the pressures and fame that accompanied it, and later took 19 months away from the sport in 2019-20 and enrolled at Princeton University in New Jersey. Following her return to snowboarding in 2021, she won a second World Championship gold before landing her sixth X-Games title. "I am more prepared this time," she added. "Luckily, it was a learning curve since the last time. "Now that I've grown up a little more and I understand boundaries and I have an amazing therapist, so I think it will make the journey a lot more doable." Her victory at the Beijing Games makes her the first woman to win back-to-back snowboard halfpipe titles in Olympic history. The event was added to the Olympic programme in 1998 - two years before Kim was born.

