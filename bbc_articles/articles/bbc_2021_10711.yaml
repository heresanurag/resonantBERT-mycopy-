title: 'Malala: ''Futures of Afghan child refugees aren''t lost'' - BBC News'
date: '2021-08-16'
section: General
url: http://www.bbc.co.uk/news/world-asia-58236327
content: |-
  Nobel peace laureate, Malala Yousafzai was shot in the head by the Taliban in 2012.

  In an exclusive interview, Nobel peace laureate, Malala Yousafzai, has told the BBC that countries need to open their borders to Afghan refugees, following the fall of the country's government to the Taliban.

  The Pakistani activist was shot in the head by Taliban gunmen in 2012 because she campaigned for girls' education.

  Malala Yousafzai told BBC Newsnight's Sima Kotecha that the world needs to act.
