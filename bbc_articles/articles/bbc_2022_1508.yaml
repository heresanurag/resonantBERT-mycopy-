content: |-
  He entered politics as a part-time assistant in Edwin Poots' office - now he will be first minister.

  Paul Givan first entered politics as a part-time assistant for Edwin Poots - now he has been announced as first minister by his friend and colleague

  Paul Givan has already boldly gone where no DUP first minister has ever gone before. He's been to a Sinn Féin Ard Fheis (annual conference).

  The year was 2008. His friend, Edwin Poots, had just been sacked as minister for culture arts and leisure, and so Mr Givan lost his job as special adviser.

  He went to work for a trade organisation and ended up on one of the many stands at Sinn Féin's annual conference at the RDS in Dublin.

  It was an unlikely place for a rising politician from the DUP's right wing to find himself.

  And it never happened again.

  He was co-opted in 2010 as an MLA for the Lagan Valley constituency, replacing the local MP Sir Jeffrey Donaldson.

  Now he finds himself on the verge of taking Stormont's top job, once more at the behest of his friend and colleague Edwin Poots.

  And once again he will find himself at close quarters with Sinn Féin - with potentially much bigger consequences.

  Paul Givan has said his first contact with politics was working as a part-time assistant in Mr Poots' constituency and Stormont offices.

  He became involved in the DUP after listening to an Ian Paisley speech at an anti-Agreement rally in Kilkeel, County Down.

  He's been associated with the so-called Paisley wing of the party ever since.

  But it was his appointment as minister for communities in May 2016 that really catapulted Paul Givan into the public eye.

  A keen soccer player, when Paul Givan visited a GAA club in 2016 it was the first time the sports minister had kicked a Gaelic football

  He famously visited a Lisburn GAA club where the keen soccer player swapped codes to score a point for the cameras.

  It brought him some cross-community kudos - unlike his next big move - the highly controversial decision to cut funding for a small Irish language bursary scheme called Liofa in December 2016, during the crisis over the botched RHI scheme.

  The email informing employees of the decision was signed off "Happy Christmas and Happy New Year".

  It earned him the label "ignoramus" from Gerry Adams and is said by some to have been the final straw which helped to bring down Stormont in early 2017.

  Paul Givan soon reversed the decision but it was too late.

  Martin McGuinness resigned - he probably would have done so anyway - and devolution was suspended for three years.

  Edwin Poots, NI's Agriculture Minister, replaced Arlene Foster as DUP leader amid tensions within the party

  Paul Givan has a strongly socially conservative streak in common with his new party leader.

  In March, he brought forward a Private Members Bill which seeks to amend the law in Northern Ireland to prevent abortions in cases of non-fatal disabilities, including Down's Syndrome.

  The prospect of having to drop the bill should he be offered a ministerial post is said to have made him think twice.

  But it's thought there's a precedent for allowing the bill to proceed, even if it might have to be transferred to another MLA's name.

  There's no doubt his role as first minister will be a daunting challenge.

