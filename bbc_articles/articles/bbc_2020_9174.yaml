title: Face mask found in chicken nugget in Aldershot - BBC News
date: '2020-08-05'
section: General
url: http://www.bbc.co.uk/news/uk-england-hampshire-53662400
content: |-
  A mother says her daughter nearly choked on the face mask.

  A six-year-old girl nearly choked on a blue surgical face mask baked into her chicken nuggets, a mother says.

  Laura Arber, 32, bought a Happy Meal from McDonald's in Aldershot, Hampshire, on Tuesday.

  She said her daughter started making choking noises as she tucked into her nuggets back at home five minutes away. Ms Arber said: "I had to put my finger in her mouth to make her sick and it came up all speckled with blue."

  McDonald's has apologised and said food safety is of the "utmost importance to us" and the company places great emphasis on quality control, following "rigorous standards to avoid any imperfections". A spokesperson said: "As soon as we were made aware of the issue we opened a full investigation with the relevant supplier, and have taken action to ensure any product from this batch is removed from restaurants.
