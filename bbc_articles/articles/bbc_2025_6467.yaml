title: Rare footage from Sudanese city under siege - BBC News
date: '2025-04-15'
section: General
url: http://www.bbc.co.uk/news/videos/c0r57e55zz0o
content: |-
  El-Fasher residents Mostafa, Hafiza and Manahel film as their home city comes under fire in Sudan's civil war.

  The Sudanese city of el-Fasher has been largely cut off from the outside world for a year as a result of the country's civil war, which began two years ago. It is the Sudanese army's last stronghold in Darfur against the paramilitary Rapid Support Forces (RSF).

  The BBC managed to send phones to three residents of the city - Mostafa, Hafiza and Manahel - who wanted to film their lives. In many of the videos they sent, the sound of shelling and gunfire can be heard in the background.

  Their footage was recorded between August and November, by which time they all decided it was too dangerous to stay in el-Fasher and left the city.
