  The BBC's Gary O'Donoghue was reporting at the rally in Pennsylvania when he was forced to take cover after shots were fired.

  The BBC's Gary O'Donoghue was reporting at the rally in Pennsylvania when he was forced to take cover after shots were fired a few hundred metres from where the BBC team was standing.
