  Former world number one Murray had been due to face Canada's Felix Auger-Aliassime in the first round of the men's singles on Sunday, but withdrew before the match. "I am really disappointed at having to withdraw but the medical staff have advised me against playing in both events," he said. He has been replaced in the singles draw by Australian Max Purcell. Should Murray win a medal with Salisbury in the doubles, he will become the first man to win four Olympic medals since tennis returned to the Olympic programme in 1988. Murray and Salisbury face German pair Kevin Krawietz and Tim Puetz in the second round.
