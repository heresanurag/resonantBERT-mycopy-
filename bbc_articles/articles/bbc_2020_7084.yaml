title: 'Child sex case: Twenty-six people charged with historical offences - BBC News'
date: '2020-06-16'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/uk-england-birmingham-53066287
content: |-
  Fourteen men and 12 women, mainly from Walsall, are charged with historical child sex offences.

  Twenty-six people have been charged with historical child sex offences.

  The offences relate to several young people who West Midlands Police say suffered physical and emotional abuse between 2008 and 2016.

  Fourteen men and 12 women, mainly from the Walsall area and aged between 20 and 69, are those charged.

  Others are from West Bromwich; Wolverhampton; Bilston; and Redcar on Teesside. They will appear before magistrates at a later date.

  Charges include sexual assault of a child under 13, conspiracy to cause or incite children to engage in sexual activity, conspiracy to cause children to watch sexual acts, cruelty to a person under 16 and the rape of a child under 13, police said.

  Ch Insp Jo Floyd said: "This is a complex investigation involving several young people who have suffered physical and emotional abuse.

  "We understand that this investigation will cause concern in the local community and I would like to reassure anyone affected by it that we take all reports of abuse seriously, no matter how long ago it happened."

  The group are due to appear at Birmingham Magistrates' Court on 22 and 23 June.

