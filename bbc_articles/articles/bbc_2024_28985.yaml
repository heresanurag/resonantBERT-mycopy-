title: Man arrested over Birmingham fatal shooting released - BBC News
date: '2024-11-24'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/cx2yren8g7lo
content: |-
  Police say a man who was arrested on suspicion of murder has been released without charge.

  Police launched a murder investigation after a man was shot dead in Birmingham

  A man arrested on suspicion of murder after a man was shot dead has been released without charge. Police found the victim, in his 20s, dead in a car after officers were called to reports of a shooting on Rotton Park Road in Edgbaston, Birmingham, shortly before 23:00 GMT on Friday. Another man, in his 30s, was found seriously injured and was taken to hospital where he remains, West Midlands Police said. The arrested man has since been released from the investigation, police said. Officers are continuing to appeal for information about the shooting and have urged potential witnesses to get in touch “urgently”.

  Det Ch Insp Laura Harrison said: "This was a tragic incident and we’re working at pace to understand exactly what happened.”

  Residents said they heard three gunshots as they sat watching television

  Mohammed Faisal, who lives near where a cordon was set up on Rotton Park Road, said he was watching television when he heard gunshots. He said he heard two shots, shortly followed by a third. "Five minutes later, I saw the blue lights turn up and I knew something bad had happened," he said. "We get a lot of crashes by the junction here, so I wondered if it was that at first but then it became obvious it wasn't. "It's extremely worrying especially when you have children living here like I do. You don't want something like this happening near your home."

