title: Starmer set to announce new Russia sanctions at G7 - BBC News
date: '2025-06-17'
section: Europe
url: http://www.bbc.co.uk/news/articles/czxw679z4xvo
content: |-
  No 10 says G7 allies back the measures - but Donald Trump indicates the US will not impose more sanctions now.

  The announcement comes as Russia continues to carry out strikes against Ukraine

  The UK is expected to unveil new sanctions against Russia designed to "restrict Putin's war machine" alongside other Ukraine allies on Tuesday. Prime Minister Sir Keir Starmer said the measures would increase economic pressure on the Kremlin to show Vladimir Putin "it is in his and Russia's interests to demonstrate he is serious about peace". However, it appeared unlikely that the US would join the move after Donald Trump signalled his opposition to further measures during the G7 summit in Canada, saying the sanctions "cost [the US] a lot of money". Meanwhile, Ukrainian officials said 14 people were killed after another wave of drone and missiles struck Kyiv overnight.

  Downing Street said the new sanctions package would aim to keep up "pressure on Russian military industrial complex" but did not provide further details. In a statement, Sir Keir said he and other G7 partners were finalising the new measures at the Alberta summit, and that they would "squeeze Russia's energy revenues and reduce the funds they are able to pour into their illegal war". "The fact is, Russia doesn't hold all the cards," he said. Asked why limited information had been released about the contents of the sanctions package, a No 10 spokesman said: "It's just a point of fact that the G7 has only just begun... it would be premature to get ahead of what those sessions will yield." Ukrainian President Volodymyr Zelensky and other allies wanted to use the summit to encourage Trump to put pressure on Russia. Earlier on Monday, Trump - who announced he would leave the summit early due to the escalating conflict in the Middle East - indicated he did not back the sanctions plan. He said: "You're talking about billions and billions of dollars. Sanctions are not that easy. It's not just a one-way street." Trump said he was "waiting to see whether or not a deal" could be agreed between Russia and Ukraine to end the war before signing up to a new sanctions package. His early departure from the summit means any announcement on sanctions will likely not involve the US. Talks in Canada are likely to include discussion about how to reduce the price much of the world pays for Russian oil. The G7 agreed in December 2022 to cap the price of Russian crude oil at $60 per barrel, making that a condition of access to western ports and shipping insurance. But this has been rendered less effective by falling energy prices. The European Commission wants a cap at $45 (£33.18) . Ukraine wants it even lower at $30 (£22.12). Ukraine's Western allies also want a tough new package of direct economic sanctions. The European Commission has already proposed a fresh round of penalties aimed at Moscow's energy revenues, banks and military industry. Some US senators are also pushing for tough new sanctions that that would impose steep tariffs on countries that buy cheap Russian oil, most particularly China and India. But how successful they will be is not clear. During a press conference with Canadian Prime Minister Mark Carney, Trump also called Russia's removal from the G7 group "a mistake" and said it "makes life more complicated". In 2014, then-US President Barack Obama and other world leaders decided to expel Russia from the group of major economies after Russia's annexation of Crimea.
