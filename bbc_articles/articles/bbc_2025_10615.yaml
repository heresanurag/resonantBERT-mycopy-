title: '''Magic'' rare otter sighting in Ceredigion garden pond - BBC News'
date: '2025-05-05'
section: General
url: http://www.bbc.co.uk/news/videos/cm247ppwnk1o
content: |-
  It was spotted by wildlife-lover Kerry Irwin-Hall who is no stranger to seeing animals in her garden.

  A wildlife lover said she "couldn't quite believe it" after an otter popped its head out of her pond.

  Kerry Irwin-Hall, who lives in Llandysul, Ceredigon, says it was a "really magical" experience.

  She has seen hedgehogs and "the occasional fox" but never an otter in the two years she has lived there.

  Kerry said it was "absolutely magic" to have an otter in the pond and she hopes to see it again soon.
