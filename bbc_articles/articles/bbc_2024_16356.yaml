title: 'Newspaper headlines: Kamala Harris ''anointed'' as ''dollars pour in'' - BBC
  News'
date: '2024-07-23'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cy941p14j0jo
content: |-
  Most of the papers focus on the latest from the US, as Kamala Harris wins more endorsements and donations.

  Sign up for our morning newsletter and get BBC News in your inbox.

  Many of the front pages feature a photograph of Kamala Harris with a broad smile as they report on her bid to win the Democratic presidential nomination. The Daily Telegraph speculates, external that she is likely to pick a “white man” as her running mate to boost her chances in key battleground states where polling shows she is behind Donald Trump. "The anointed" is the headline for the i newspaper.

  Labour's immigration policy is the lead for the Daily Mail., external It reports figures from the Refugee Council which estimate that changes to the way claims are processed could result in 70,000 illegal migrants being granted asylum. The Conservatives believe the figure could be nearer to 90,000. The front page of the Daily Express is a prediction from the leader of Reform UK, external - Nigel Farage - that more Conservative MPs will defect to his party within a year. The paper reports that Mr Farage is open to the former Home Secretary, Suella Braverman, making the switch. He believes several Tories who lost their red wall seats would still be MPs if they had moved over to Reform before the election. The Times reports, external that we are becoming more accepting as a nation of fraud and theft. The paper quotes the Department for Work and Pensions as saying that there is "a growing propensity for people to commit fraud". This, it says, is making it harder to control the cost of claimants ripping off the benefits system. The paper says DWP officials have also pointed to a recent study which suggests one in five Britons can now be classed as having “low integrity”, up from one in fourteen just over a decade ago. There's a story that may be of concern to dog-owners in several newspapers,, external which report that our canine friends can smell if we're stressed and - if we are - it affects their mood. Under the headline "Pedigree glum" - the Express explains that scientists from Bristol Veterinary School carried out tests which showed that dogs who were exposed to human stress odours behaved in a way that indicated pessimism and negative emotion. The Guardian reports that athletes, external competing at the Paris Olympics - which begin on Friday - won't be offered junk food at the restaurant in the athletes village. Instead Michelin-starred and plant-based dishes will be the order of the day. Organisers were keen to raise standards to encourage the athletes to make healthier choices. One example the paper gives is a croissant topped with a poached egg, artichoke cream and sheep's cheese, sprinkled with truffle. The paper reminisces that it's a long way from Beijing in 2008 when Usain Bolt claimed to have won two gold medals fuelled by a thousand chicken nuggets. Adieu nuggets, the headline says.
