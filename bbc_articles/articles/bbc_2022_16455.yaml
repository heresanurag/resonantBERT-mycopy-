content: |-
  The cabinet minister, on Laura Kuenssberg's Sunday show, says health workers should end their industrial action.

  Dowden says pay demand from nurses is 'not affordable'

  Laura Kuenssberg starts off by asking cabinet minister Oliver Dowden about the reliability of an ambulance turning up during the strikes this week. He urges ambulance union leaders to "call off this strike" to guarantee availability of care to the public. He says the government is working with union leaders to ensure availability and says if you have a life threatening injury you can continue to rely on the ambulance service. He says the government is working relentlessly to ensure a high level of service for people in the most difficult of circumstances. He again urges unions to be reasonable to call off the strikes. Asked about nursing strikes, Dowden says he's tried to resolve the issue by "taking politics out of this and putting it to an independent pay review body". He says nurses have been offered a minimum of £1,400 or 9% pay rise. He says the 19% urged by nursing unions is "simply not affordable", saying this could add to inflation.
