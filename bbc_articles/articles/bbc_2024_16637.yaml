title: Met Police officer admits stealing from dead man in the street - BBC News
date: '2024-07-26'
section: England
url: http://www.bbc.co.uk/news/articles/crglwd8nx62o
content: |-
  Craig Carter took about £115 from the victim after he collapsed in Hornsey in 2022.

  A Metropolitan Police officer who stole from a dead man who collapsed on the street has pleaded guilty to misconduct in public office. Craig Carter, 51, from Harlow in Essex, was sent to collect Claudio Gaetani's property, including a wallet, following his sudden, non-suspicious death in north London in September 2022. Mr Gaetani's family suspected money to be missing when the items were returned to them. Body-worn video from the scene showed Carter counting out about £100.

  When the wallet was booked into the Met's property store, only £6 and a few euros were inside. Carter appeared earlier at Wood Green Crown Court, where Judge Daniel Fugallo told him to expect a custodial sentence. He was granted bail and is due to be sentenced at the same court in September.

  Mr Gaetani, an Italian filmmaker and actor, was reportedly visiting London for a theatre festival at the Southbank Centre. He collapsed and died while cycling to a house in Hornsey where he was staying with friends. The Crown Prosecution Service (CPS) said Carter's behaviour had fallen "woefully short" of the public’s expectations of a police officer. It said: "It is not only disturbing, but deeply disrespectful to the victim’s family. Our thoughts remain with them at this time."
