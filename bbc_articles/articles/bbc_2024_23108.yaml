title: More heavy rain expected across England and Wales, Met Office warns - BBC News
date: '2024-09-25'
section: UK
url: http://www.bbc.co.uk/news/articles/cx245zzd0ppo
content: |-
  Yellow weather warnings are in place for Thursday and Friday, with more flooding possible.

  More heavy rain expected across England and Wales

  The Billing Aquadrome holiday park in Northamptonshire was evacuated on Tuesday night

  The Met Office has issued new yellow weather warnings for rain on Thursday and Friday, after days of thunderstorms and downpours caused flooding across parts of central and southern England. Warnings for heavy rain are in place for most of England, excluding the north-west and parts of the West Midlands, and much of Wales. The Environment Agency has 27 flood warnings, external and 60 less severe flood alerts in place across England. Heavy rain over the weekend and Monday saw houses and businesses flooded, roads and fields submerged in water, rail services cancelled and delayed, rivers overflowing, and even a football stadium closed in London after a sinkhole formed.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The Met Office also issued a yellow warning for rain in Northern Ireland from Wednesday evening until noon on Thursday. Heavy rain could lead to flooding and transport disruptions in places. BBC Weather's lead presenter Simon King said the rain is not expected to be as heavy as in recent days, but could still lead to flooding due to water levels already being high in places. The warnings, external issued for the week ahead are:
  • None For southern England, southern Wales and parts of the Midlands from 10:00 BST onwards on Thursday
  • None A continuation of that warning for southern England and southern Wales into Friday until 10:00 BST
  • None A separate warning covering northern England east of the Pennines and north-east England between 10:00 BST on Thursday and midnight Up to 100mm of rain is possible around the Pennines and North York Moors, which would amount to about a month's worth of rainfall.

  Part of the A421 became flooded after heavy rain earlier this week

  Fields and roads became flooded after the River Great Ouse burst its banks

  This rider and her horse overcame this flooded road in Bedfordshire

  Less rain is expected elsewhere but heavy downpours are still forecast for many. While the rain is expected to clear later on Friday and the forecast is drier for the weekend, temperatures are expected to fall below the average for this time of year. Several parts of the country started the week with persistent rain and flooding. Emergency services rescued 43 people from a holiday park in Northampton on Tuesday evening, after caravans were left surrounded by water from a nearby river which had burst its banks. Areas including Buckinghamshire, Northamptonshire and Warwickshire were among the worst hit on Monday, the Met Office said previously. Some places experienced more than a month's worth of rain in a matter of hours over the weekend and Monday. Football team AFC Wimbledon in south London said its pitch sustained "significant damage" after the nearby River Wandle broke its banks.

