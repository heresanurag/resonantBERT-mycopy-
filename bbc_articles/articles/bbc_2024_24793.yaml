  Craig Bellamy is pleased with Wales' performance in their 2-2 Nations League draw with Iceland - despite throwing away a 2-0 half-time lead.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Craig Bellamy says he was pleased with Wales' performance in their 2-2 Nations League draw with Iceland - despite throwing away a 2-0 half-time lead in Reykjavik. Goals from Brennan Johnson and Harry Wilson had put Wales in control, only for them to concede twice in three second-half minutes. Wales were fortunate not to lose but, having introduced such a radically different playing style during his three games so far, Bellamy is still encouraged by how the team has adapted during the early stages of his tenure. "I was really pleased. I enjoyed it. We'll benefit so much from that 45 minutes [in the second half], it's so good for us," he said. "In the long run this will be beneficial for us. Obviously to be 2-0 up and draw is disappointing, but it was a pleasing performance. "It was me learning about the players and them learning from us. It's never good to concede, I don't like it, we'll look at it again. "I felt momentum played a big part. It's about us understanding when to take the sting out the game, which will come. Overall, I'm pleased with the performance."

  Despite the disappointment in Iceland, Wales remain unbeaten under Craig Bellamy

  The draw in Iceland means Bellamy is the first Wales manager to remain unbeaten after his first three competitive matches. His opening draw with Turkey and 2-1 win in Montenegro last month had rejuvenated Wales, with a progressive new approach exciting fans, players and pundits alike after the disappointment of missing out on Euro 2024. Wales looked to be heading for a second successive victory and top spot in Group B4 after an impressive first half in Reykjavik, but collapsed after the break. Iceland wasted several chances before scoring their two goals and had further opportunities to take all three points. Wales, by contrast, were non-existent as an attacking force in the second half and will hope to rediscover their first-half verve when they face Montenegro in Cardiff on Monday. "I'm a big fan of Iceland so I knew it was going to be a difficult game," said Bellamy. "Of course we were 2-0 up by half-time but my words were 'this is going to be a long half'. "A very good manager [Iceland boss Age Hareide], we knew being 2-0 down they were going to throw more men at the press because they had to. "How were we going to find the solutions? Because the solutions were there but it's being able to find them at the time. "There's a lot to benefit us, especially the second half. It allows us to coach more, it builds a library in the players’ heads: 'Remember this situation, remember when we found this period difficult'. They can memorise it. This is our third game together. "In the long run, I'm really happy. And this is not me trying to sugar-coat drawing after being 2-0 up, it really isn't. What I'm telling you now I told the players. This was really good." Wales will be without Tottenham Hotspur forward Johnson and Rennes midfielder Jordan James against Montenegro due to suspension after they picked up their second bookings of the campaign against Iceland. Johnson, who has scored seven goals in seven games for club and country, was taken off at half-time after taking a knock during the first half. "It was a precaution. He took a kick," said Bellamy. "He did feel something from impact so we'll get him checked out."
