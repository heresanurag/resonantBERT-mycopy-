id: bbc_2019_11904
title: MPs reject Boris Johnson's three day Brexit bill timetable - BBC News
date: '2019-10-22'
section: General
url: http://www.bbc.co.uk/news/uk-politics-50144894
content: |-
  MPs voted against a proposal to examine the prime minister's bill in three days.

  MPs have rejected a proposal to examine Boris Johnson's Brexit bill in the Commons in three days.

  It was rejected by 322 votes to 308.
