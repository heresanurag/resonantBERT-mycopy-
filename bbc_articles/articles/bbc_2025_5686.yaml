title: Trump Turnberry vandalised by pro-Palestine group - BBC News
date: '2025-03-08'
section: Scotland
url: http://www.bbc.co.uk/news/articles/cr52q7l6drdo
content: |-
  Police Scotland is investigating the incident at the Ayshire resort owned by the Trump Organisation.

  Paint was daubed on one of the Turnberry resort's buildings

  A pro-Palestinian group has vandalised parts of Donald Trump's Turnberry golf resort in Scotland. Palestine Action posted photographs on social media showing red paint daubed across one of the buildings at the Ayrshire course. The words "Gaza is not for sale" are sprayed across one green and another green appears to have been dug up. A further photograph shows a damaged lamp post at the resort owned by the Trump Organisation. A spokesperson said it was a "childish, criminal act".

  Police Scotland confirmed it was investigating the incident. President Trump caused widespread international criticism after repeatedly proposing to empty the Gaza strip of all Palestinians. He proposed taking ownership of the Gaza Strip and redeveloping it, after saying earlier that Palestinians should move out of the region. "The US will take over the Gaza Strip and we will do a job with it too," Trump said during a joint conference with Israeli Prime Minister Benjamin Netanyahu last month.

  Donald Trump playing at the Turnberry resort in 2023

  Trump made the comments after meeting with the Israeli leader at the White House. Netanyahu responded, saying the idea is "worth paying attention to". The US president has previously said neighbouring nations could take in displaced Palestinians from Gaza - a proposal that was rejected by Arab nations. The president later posted an AI-generated video of what Gaza might look like under his proposals. Turnberry is widely rated as one of the top five golf courses in the world. It has hosted The Open Championship four times, including in 1977 when Tom Watson beat Jack Nicklaus in what famously became known as the "Duel In The Sun". But it has not been included on the Open schedule since Trump bought the resort in 2014.

  Parts of the course were dug up by the pro-Palestine group

  The Turnberry resort underwent a massive refurbishment after it was bought from a Dubai-based company in 2014. It became the organisation's second golf resort in Scotland. Trump International Golf Links opened north of Aberdeen in 2012, after years of controversy. Trump was moved to build a course in Scotland as a tribute to his later mother, who was born and brought up in Lewis. The president has been a regular visitor to Scotland over the years and last month was invited to meet King Charles at Balmoral.

  A lamp post was broken from its plinth at the resort

  Palestine Action describes itself as a "direct action network dismantling British complicity with Israeli apartheid". A statement from the group said: "Palestine Action rejects Donald Trump's treatment of Gaza as though it were his property to dispose of as he likes. "To make that clear, we have shown him that his own property is not safe from acts of resistance. We will continue to take action against US-Israeli colonialism in the Palestinian homeland." A spokesperson for Trump Turnberry said: "This was a childish, criminal act but the incredible team at Trump Turnberry will ensure it does not impact business. "Turnberry is a national treasure and will continue to be the number one beacon of luxury and excellence in the world of golf." A Police Scotland spokesperson said: "Around 04:40 on Saturday 8 March 2025 we received a report of damage to the golf course and a premises on Maidens Road, Turnberry." The force said inquiries were ongoing.
