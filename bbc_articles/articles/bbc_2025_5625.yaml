content: |-
  Investigators in Kenya have released images of three men wanted in connection with the killing of Campbell Scott.

  Three wanted over murder of Scottish man in Kenya

  Samuel Musembi Kamitu, left, Benard Mbunga Mbusu, centre, and Alphonse Munyao Kilewa, right, are wanted by Kenyan police in connection with Mr Scott's death

  Police in Kenya have named three men wanted in connection with the murder of a Scottish businessman whose body was found in a sack of pineapples. Campbell Scott was found dead in a forest 60 miles (96.5km) from Nairobi after he went missing from his hotel on 16 February. The country's Directorate of Criminal Investigations (DCI) has released images of the men, who they believe are linked to the "brutal murder" of the 58-year-old. They have been named as Benard Mbunga Mbusu, Samuel Musembi Kamitu and Alphonse Munyao Kilewa, also known as "Edu".

  The DCI posted a statement on X asking for anyone with information on their whereabouts to contact them. Two other men appeared in court accused of using Mr Scott's bank cards to withdraw money on Saturday.

  Campbell Scott was found dead in a pineapple sack hidden in a forest in Kenya

  Mr Scott, from Dunfermline in Fife, was a senior director at the credit scoring firm Fico and had been attending a conference at the JW Marriott Hotel in Nairobi. He went missing after failing to meet colleagues to deliver a presentation having visited a nightclub. His body was found in Makongo Forest with his hands bound. A number of arrests have been made in connection with the investigation. Police initially arrested two men - a taxi driver and a nightclub waiter - who are believed to have been among the last to see him alive. Then on Saturday two other men were arrested in Mombasa, 301 miles (485km) from Nairobi on Kenya's Indian Ocean coast. Officers believe Mr Scott visited a house belonging to one of the men, where he was killed. They allege that the same man withdrew money from Mr Scott's account at three different locations, working with the second suspect. A court in Nairobi agreed that police could hold the men for 21 days while the investigation into his death continues.

  Pathologists said samples would be submitted for toxicology testing after it was determined the injuries sustained by Mr Scott were "too minor" to have caused his death. The DCI has asked Interpol to help track Mr Scott's mobile phone and debit and credit card transactions.
