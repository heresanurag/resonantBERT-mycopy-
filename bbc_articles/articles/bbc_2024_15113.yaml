  At about 19:00 on 20 May, Breagan said he wanted to do another interview. This time he said he had stopped Digby from getting into a fight at the party, and had suggested they go for a walk. The file doesn’t indicate why he changed his statement, which now tallied with Digby’s. Mark Olden - who spoke to Breagan before he died - says he told him they had been held in adjacent cells at the police station, which allowed them to communicate and “straighten” their stories. Police wrote that they were now “reluctantly obliged” to release both men without charge.

  Nearly 1,000 people had been interviewed by mid-July, when Det Supt Forbes-Leith produced a report to sum up what had been achieved. “Despite the most exhaustive enquiries... not one shred of evidence has been forthcoming to suggest who the culprits were,” he wrote. He noted there was a “general feeling” that Digby and Breagan were responsible, together with others who had been at the party with them. But he added: “This, however, is surmise and not one of the group has had a finger pointed at him with certainty.” His views were echoed by his superior officer, Chief Supt James Dunham, who said that despite prolonged interrogation of the two suspects and “scientific examination” of their clothing nothing had emerged to connect them to the “murderous act”. Dunham said a large proportion of those interviewed were “inveterate liars”. “Little or no information has been forthcoming from residents or habitues of this squalid slum area,” he wrote. The only way to make progress would be to use “‘outside’ information or assistance”, he said. It is not clear what this means. Certainly, the case did not move forward from that point.

  Both prime suspects - Breagan and Digby - are now dead, along with many of the witnesses. Yet for decades the Metropolitan Police said the case was still open. So even though the files had been transferred to the National Archives, they could not be released because information might prejudice the “detection of crime”, under Section 31 of the Freedom of Information Act. Over the years many people have tried to get the files open - including me. But the Kelso Cochrane family, with expert legal support, assembled a comprehensive Freedom of Information application. When it was turned down, they appealed and won. The Metropolitan Police told us that “our thoughts remain with Mr Cochrane’s family”, and that any new evidence that came to light would be “assessed and investigated accordingly”.

  Cochrane's daughter Josephine says black people's deaths are less thoroughly investigated

  Before he came to the UK Kelso Cochrane had lived in the US. He had married there and had a child. His daughter Josephine never knew him growing up, because he was killed when she was still very young. She told us: “There is some joy that I found him. There’s some joy that I could talk about him to my grandchildren and children.” She says she wasn’t surprised that the prime suspects were detained so quickly, that one had even threatened to kill a black man, and yet the investigation didn’t progress. “It’s normal to me,” she says. “This is what happens in the world. This is how certain people are treated and certain people act. People know they can get away with things. “When a black person is murdered it starts out that the police are investigating and by the end of the month they’re not investigating any more. And if people like me don’t chase, to find out what happened to our family members... it’ll just go in the archives. That’s just how people like me have been treated in the United States and all over the world.” The police file is being released in sections, as some redactions are being made for data protection reasons. There are several more tranches to come.
