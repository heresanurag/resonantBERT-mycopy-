title: 'Libya: BBC finds little foreign aid in flood-hit Derna - BBC News'
date: '2023-09-15'
section: General
url: http://www.bbc.co.uk/news/world-africa-66823715
content: |-
  In the Libyan city of Derna, Anna Foster describes the flood devastation and lack of international aid.

  BBC correspondent Anna Foster is on the ground in the Libyan port city of Derna, where thousands of people were killed when two dams burst in the wake of Storm Daniel.

  She describes the scene of the disaster, where rescuers, ambulance crews and forensic teams are working fast after whole neighbourhoods were washed away.

  Figures for the number of dead vary from around 6,000 to 11,000 and thousands of people are still missing.
