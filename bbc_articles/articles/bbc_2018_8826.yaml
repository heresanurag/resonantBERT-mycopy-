title: 'Thai cave rescue: Chilean miner''s message to trapped boys - BBC News'
date: '2018-07-06'
section: General
url: http://www.bbc.co.uk/news/world-asia-44720617
content: |-
  Remember the miners trapped underground in Chile? One of them has sent a message to the Thai cave boys.

  Mario Sepulveda was one of 33 men rescued from a mine in Chile in 2010.

  He has now sent a message of encouragement to the 12 boys and their coach trapped in a cave in Thailand.
