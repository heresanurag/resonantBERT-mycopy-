content: |-
  Shane Davies was kayaking with a friend on Saturday but they became separated, Sussex Police says.

  Shane Davies has not been seen since getting into difficulty in the sea off Sussex

  A body has been found following a search operation to find a kayaker who went missing off the Sussex coast.

  Shane Davies was last seen at about 15:30 BST on Saturday after he got into difficulty in the sea off the Pagham and Selsey beach area.

  The 33-year-old was kayaking with a friend but they became separated.

  Coastguards carried out an extensive search and a body was discovered in the water on Sunday morning, which police said is believed to be Mr Davies.

  Next of kin and the coroner have been informed, officers said.

  Shane Davies was kayaking in the sea off Selsey and Pagham

  Insp Oliver Pullen said: "Our thoughts are with Shane's family at this incredibly difficult time.

  "I'd like to thank [the] coastguard and other colleagues for their work to help find Shane."

