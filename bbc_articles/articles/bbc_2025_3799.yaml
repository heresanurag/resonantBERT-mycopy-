content: |-
  England have laid down gauntlet with a team selection that aims to beat old rivals and land new titles in Saturday's Six Nations meeting with Wales

  Victory is everything, but not enough for England

  Henry Pollock, 20, is set to make his Test debut away to Wales in a potential Six Nations title decider

  Coverage: Watch on BBC One, BBC Sport website and app, plus S4C via iPlayer. Text commentary and highlights on BBC Sport website and app. Listen live on BBC Radio Wales, BBC Radio Cymru and BBC Radio 5 Live

  England's teamsheets are usually best printed on grid paper. Head coach Steve Borthwick measures out the shape of his team, prioritising consistency and reliability with the care and consideration of a draughtsman. When Wednesday's teamsheet landed though, it was a departure. Names splattered in from leftfield, a free-form approach to positions, a delicious cheese-dream of a bench – a side picked like Jackson Pollock paints. Borthwick's selections over the campaign have been getting more adventurous, but this was a crank-up of the curveball. In total, there were seven positional or personnel changes to the starting XV for Saturday's trip to Wales. Tommy Freeman, only an occasional centre for his club, makes his first Test start in midfield. Wing Tom Roebuck makes his first Test start full-stop. Elliot Daly, the only back with north of 50 caps, pinballs back to the 11 shirt from full-back. Marcus Smith, who started the tournament at fly-half, is at 15. Across the matchday 23, there are three specialist fly-halves, four open-side flankers, one centre and one specialist second row. Back-row Ben Earl is primed to move into the backline. Twenty-year-old Henry Pollock is poised to make his debut. Ollie Sleightholme, who scored two tries in last weekend's win over Italy, and the 72-cap experience of Henry Slade are nowhere.

