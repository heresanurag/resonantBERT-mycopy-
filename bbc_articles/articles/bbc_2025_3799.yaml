  If it is uncharacteristic for this coach, it is not in keeping with the fixture either. The vision of 18-year-old Mathew Tait being slung under Gavin Henson's arm in 2005 lingers. The Principality has rarely been the place for England to experiment or christen new talent. But, while the usual city-centre storm will brew up for England's arrival, this trip to Cardiff is unique. Victory is everything, but also not quite enough. The Six Nations title permutations are complex. Given France's vast points difference advantage, England need France to fail to win against Scotland in Saturday's final game. If they do, an England victory of any kind over Wales would likely take them ahead of Fabien Galthie's men. A four-try bonus point is more likely to be needed however to stay ahead of Ireland, who lurk in third and play Italy earlier in the day. So, England, with a mobile back row of Earl and Tom and Ben Curry, feel the need for speed if they are to finish as Six Nations top guns. "The thing you are seeing around the park is speed wins," said Earl in the week. "We are talking a lot about moving the ball, being aggressive, outworking teams. Our players buy into that." With Pollock, Chandler Cunningham-South and Tom Willis on the bench, a complete recharge of the back row maybe possible to keep the needle high and the scoreboard ticking over in the second half. However, Wales will relish the chance to stick a spanner in the spokes and puncture such title pretensions. In Jac Morgan, they might have the player of the championship. As Wales have racked up the losses – 16 straight and counting – he has raged bright. He has made 73 tackles so far in the Championship – six more than any other player and only 12 short of Justin Tipuric's 2007 record for a Welshman in a Six Nations campaign.

  Morgan, right, has been proclaimed the best seven in Britain by his team-mate Dafydd Jenkins

  On the other side of the ball, he has made more metres through contact of any other player. Alongside Aaron Wainwright and the enduring class of Taulupe Faletau, he will be a formidable barricade to England's ambitions. After three home wins for England, Lions coach Andy Farrell will one of those interested to see how well the visitors cope when the hostilities ramp up and the noise builds. The final-round trip west has seen English touring hopes go south before. If the stars align and England do manage to track an unlikely route all the way to the trophy, it will have been a remarkable title win.

  Beaten by Ireland in the opening game, bettered in almost every facet by France in the second, a narrow conversion miss away from defeat by Scotland in the third, their campaign could have a very different complexion. Wales know how title bids can blossom from such unlikely ground though. In 2021, Wayne Pivac's side rode their luck and took their chances, benefiting from refereeing calls and opponents' indiscipline, to carry off the crown against the odds. Wales' title victory that year was also finally delivered via a Scotland upset in Paris. If, around 21:00 GMT on Saturday, it seems that the French are slipping up again and England have kept clear of Ireland in the standings, Steve Borthwick and his men will leave their team hotel and head into central Cardiff for a second time that day. Past the drinkers and Chip Alley eaters, they would wind their way up Westgate Street and back to the Principality Stadium. With their own final whistle having blown more than three hours earlier, the stands would be empty for a presentation featuring a replica trophy and a lack of local love. It would be a surreal, but very sweet final destination for a campaign that has teetered at times, but clung to a course.

