title: What caused the Hawaii wildfires? - BBC News
date: '2023-08-11'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-66470118
content: |-
  What sparked the fires is still a mystery, but a mix of wind and dry weather helped the flames spread.

