title: Northumberland postbox closed because snails eating mail - BBC News
date: '2024-08-20'
section: Tyne
url: http://www.bbc.co.uk/news/articles/cm2nlym5y2jo
content: |-
  Royal Mail says it sometimes closes boxes due to wildlife infestations but hopes it can reopen soon.

  Snails have a varied diet including plants, flowers, leaves and even paper and cardboard

  A postbox has been closed because snails have been crawling inside and munching the mail. The red box in Adderstone, a remote area of North Northumberland, has been out of use since July this year. Royal Mail said a postbox may be temporarily closed due to wildlife infestation, and advised customers to use the nearest convenient one. But Northumberland County councillor Guy Renner-Thompson said: "It serves quite a few houses and farms and we'd like to get it back open as soon as possible."

  The postbox was stolen in 2023 and had to be replaced

  "That postbox there has had quite a chequered history, because about a year ago it was stolen and Royal Mail had to replace it," added Mr Renner-Thompson, who is Conservative councillor for the Bamburgh ward, which includes Adderstone. "Now it's been attacked by a different sort of pest, but even though it's in a very remote location, it is surprisingly well used, so I hope Royal Mail find a solution quickly."

  A mild winter and wet spring mean it has been a good year for slugs and snails

  Duncan Hutt from Northumberland Wildlife Trust said many people did not realise slugs and snails had a very varied diet. "Snails eat paper because most contains cellulose from the wood pulp which they can digest and use for energy, and they also get calcium from paper and that's what they need to build their shells," he said. "There's also an awful lot of snails and slugs around this year following a mild winter and wet spring. "That's good for species like hedgehogs, frogs and song thrushes which eat them, but not such good news for gardeners or people in Adderstone who want to post a letter."
