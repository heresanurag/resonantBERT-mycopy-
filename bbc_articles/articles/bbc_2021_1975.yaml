title: 'Storm Darcy: Snowy fun, freezing dips and delays - BBC News'
date: '2021-02-08'
section: General
url: http://www.bbc.co.uk/news/uk-55985835
content: |-
  Weather warnings are in place across the UK as Storm Darcy disrupts services, including vaccination centres.

  Heavy snow and ice has brought disruption to parts of the UK, with coronavirus vaccination centres and schools shutting in some areas.

  Police have warned people not to travel, with long delays expected.
