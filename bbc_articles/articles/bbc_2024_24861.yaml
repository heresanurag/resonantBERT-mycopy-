title: Tower falls as historic San Francisco Church destroyed by fire - BBC News
date: '2024-10-12'
section: General
url: http://www.bbc.co.uk/news/videos/c6256jy9nldo
content: |-
  Video shows the San Francisco Church in Iquique, Chile engulfed in flames, with smoke rising above it.

  Video shows the dramatic moment a historic church in Iquique, Chile, was destroyed by fire.

  Twelve firefighting units attended the blaze at the San Francisco Church on Friday, but were unable to save the mostly-wooden structure, local media reported.

  It was the first Catholic church built in the country, according to the World Monuments Fund, and was declared a national monument in 1994.

  Regional officials said that there were no fatalities, and that the cause of the fire was under investigation.
