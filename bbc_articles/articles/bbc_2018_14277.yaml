content: |-
  Mother of five Sarah Wellgreen was last seen near her Kent home on 9 October.

  Sarah Wellgreen was last seen on the evening of 9 October

  A man has been charged with the murder of a missing mother from Kent.

  Sarah Wellgreen, 47, was last seen near her home in New Ash Green, Kent, on 9 October.

  Ben Lacomba, 38, from Bazes Shaw, New Ash Green, was charged with the mother of five's murder on Thursday.

  Mr Lacomba was first detained on 16 October before being re-arrested and charged. He has been remanded to appear before Medway Magistrates' Court on Friday, police said.

  The search for Ms Wellgreen is ongoing.

  Officers previously searched a property, believed to be Ms Wellgreen's home, after receiving fresh information.

  It is understood to be the third time the property has been searched since 11 October.

  The beautician's family celebrated Ms Wellgreen's birthday in her absence on 14 December.

  Son Lewis Burdett has said the family was living a "never-ending nightmare".

  About 2,000 hours of footage has been received by police, while more than 1,300 volunteers have joined searches of the surrounding area.

  Officers have searched woodland near Bluewater shopping centre in Dartford and areas in Greenhithe near the River Thames.

  Divers also searched the River Darent in Dartford town centre, while the fire service has provided a drone.

