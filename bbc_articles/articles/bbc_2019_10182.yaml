content: |-
  President Bolsonaro responds to criticism about his previous comments, suggesting NGOs started the Amazon fires.

  Brazil's President Bolsonaro has responded to criticism about his previous comments, suggesting non-governmental organisations could be to blame for starting the fires in the Amazon.

  During his post on Facebook Live, he said that NGOs were "the biggest suspects" because of their lost funding, but still failed to offer any evidence to support his claim.

  The president also suggested lack of funding was to blame for the crisis.

  "There aren't the resources. The chaos has arrived", he said.
