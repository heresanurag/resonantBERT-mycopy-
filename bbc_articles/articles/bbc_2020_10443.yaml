title: 'Oregon wildfires: Drone footage shows homes completely wiped out - BBC News'
date: '2020-09-11'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-54123440
content: |-
  Drone footage shows streets of houses destroyed by fires in the US state of Oregon.

  Drone footage shows streets of houses that have been completely wiped out by wildfires in the US state of Oregon.

  Some residents have been allowed to return to where their houses once stood and are realising the extent of the damage to their communities.
