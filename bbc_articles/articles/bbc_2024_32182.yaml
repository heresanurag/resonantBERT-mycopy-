content: |-
  Samantha Miller was fatally hit while travelling in a golf cart and still wearing her wedding dress.

  Samantha Miller was killed, and her new husband Aric Hutchinson injured, just hours after they tied the knot last year

  A US woman has pleaded guilty to drink-driving charges over an incident in which she killed a newlywed bride who was travelling in a golf cart on her wedding night. Jamie Lee Komoroski was sentenced to 25 years in prison over the crash in South Carolina last year that killed Samantha Miller while she was still wearing her wedding dress. The victim's husband, Aric Hutchinson, was among three others who were hurt, along with two of his family members who were also in the vehicle. He wept as he told the court his new wife had "wanted the night to never end", Associated Press reported.

  This video can not be played To play this video you need to enable JavaScript in your browser. Bride killed hours after wedding was 'my world' says husband

  The collision occurred in the city of Folly Beach in April 2023 as the newlyweds were being taken back to their accommodation just hours after their ceremony. Komoroski was accused by prosecutors of drinking at several bars and then driving at 65mph (104km/h) in a 25 mph zone. Her car hit the golf cart carrying the couple, driven by Mr Hutchinson's brother-in-law. A blood test showed that she was three times over the drinking limit, according to a report released by state officials after the crash. She had earlier refused to provide officers with breath samples, a police incident report said. At Charleston County Courthouse on Monday, Komoroski admitted charges including felony DUI resulting in death. She received multiple sentences that will run at the same time. Addressing the court before being sentenced, she spoke of her regret and said she took full responsibility. Mr Hutchinson, who sustained a brain injury and broken bones in the crash, also spoke. Although he has said he has no memory of the incident itself, he was able to recount his final conversation with his wife. "On the golf cart, she told me she didn’t want the night to end and I kissed her on the forehead and then the next thing I remember is waking up in the hospital," he said. After the sentencing, he said he felt "the punishment fit the crime", according to CBS News affiliate WCSC. "I do think she’s sorry," Mr Hutchinson said. "However, that doesn’t change the fact that Sam’s not here, my wife’s not here, the family we planned, all of our injuries. So that’ll take some time for sure."
