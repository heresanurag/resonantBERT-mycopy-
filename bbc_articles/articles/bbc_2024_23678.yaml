  No, not to do with the phone. Millions of people have tried (and mostly succeeded) in splitting an apple down symmetrical lines. The TikTok trend has had courageous attempts from celebs such as Glen Powell, Amelia Dimoldenberg and Daisy Edgar-Jones trying to move their arms up, down and side to side, in sync to the lyrics of Apple. But as the trend eventually fades away, the videos and memories remain. We'll let you decide if they are rotten right to the core.

  So is brat summer actually over "forever"? Not everyone agrees with Charli that we are done with the lime green entirely. "It’s our responsibility as Australians to create a Brat Summer," writes one fan. "Don't forget about South America," says another. And ultimately, "brat summer is a state of mind, not a season," according to another fan. Charli herself has teased a possible Brat Autumn, external. So as we approach the mild orange chill of Halloween season, is it maybe time to rebrand?, external

