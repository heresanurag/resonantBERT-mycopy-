title: Brat summer officially over, declares Charli XCX - BBC News
date: '2024-09-03'
section: Newsbeat
url: http://www.bbc.co.uk/news/articles/cwyj2y7ggd7o
content: |-
  The cultural phenomenon has inspired millions of posts, plenty of dance moves and reached American politics.

  Has your life been touched by a block of lime green and low resolution Arial font this summer? The cultural phenomenon that is "brat" has inspired millions of posts, plenty of dance moves and even reached the heights of American politics. But as the days become smaller and the nights draw in Charli XCX - who spawned the phrase - has said it's over. The singer posted to say "goodbye forever brat summer" along with some of notable brat-related moments.

  But some fans - particularly those in the southern hemisphere, where summer is yet to arrive - have vowed to keep the spirit alive.

  Brat is the name of Charli's sixth studio album which has found critical success and worldwide appeal as people have rushed to embrace its rebellious attitude. The singer told the BBC's Sidetracked podcast brat was a concept that represented a person who might have "a pack of cigs, a Bic lighter and a strappy white top with no bra". It is thought of by some as a rejection of the "clean girl" aesthetic - which suggested a groomed ideal of femininity. "You’re just like that girl who is a little messy and likes to party and maybe says some dumb things sometimes," Charli explained on social media. "Who feels like herself but maybe also has a breakdown. But kind of like parties through it, is very honest, very blunt. "A little bit volatile. Like, does dumb things. But it’s brat. You’re brat. That’s brat."

  It does not take much for the heat of US politics to spawn endless memes, but brat has hit the race to be the most powerful politician in the world. Shortly after President Joe Biden announced he was leaving the US election race and endorsed his vice-president Kamala Harris, Charli posted "kamala IS brat". The Harris campaign then scattered references to the album across its social media accounts, renaming her profile Kamala HQ. Obviously, it had to be a new lime green photo in the style of the Brat album cover. Experts have said it was part of an effort for Kamala Harris to appeal more to younger voters. We'll find out how successful it's been in November.

