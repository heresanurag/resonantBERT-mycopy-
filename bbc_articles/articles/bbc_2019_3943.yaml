title: Marine crawls to finish Boston Marathon for fallen comrades - BBC News
date: '2019-04-17'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-47956510
content: |-
  Micah Herndon's legs gave way around 22 miles into the race. But that didn't stop him from finishing.

  US marine Micah Herndon's legs gave way around 22 miles into the Boston Marathon. But that didn't stop him from crossing the finish line.
