content: |-
  The body was found at a National Trust estate and the arrested man is being treated for serious injuries.

  The body of the woman, believed to be in her 60s, was found at a National Trust estate

  A man has been arrested on suspicion of murder after the body of a woman was discovered at a National Trust estate.

  Police found the body in woodland on the Watlington Hill estate, Oxfordshire, just before 18:00 BST on Friday.

  The arrested man is being treated in hospital for serious injuries.

  Thames Valley Police said it was linking the murder to reports of a man seen acting suspiciously near a pub a few hours earlier.

  The victim is believed to be in her 60s, the force added.

  Officers have appealed for anyone who saw a man behaving strangely near the Fox and Hounds pub in the Christmas Common area of Oxfordshire at about 15:30 to get in touch.

  Anyone who saw anything suspicious in the Watlington Hill area at about 17:30 has also been asked to contact detectives.

  Det Supt Craig Kirby said: "We are carrying out a thorough investigation to piece together what has happened to lead to this woman's death."

