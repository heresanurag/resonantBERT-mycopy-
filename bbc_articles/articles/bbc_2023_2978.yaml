title: 'Knowsley: Fifteen arrests over clash outside asylum seeker hotel - BBC News'
date: '2023-02-12'
section: Liverpool
url: http://www.bbc.co.uk/news/uk-england-merseyside-64611823
content: |-
  A police officer and two members of the public suffered minor injuries during the disorder.

  This video can not be played To play this video you need to enable JavaScript in your browser. A police van was set on fire outside a hotel housing asylum seekers

  Fifteen people, including a 13-year-old boy, have been arrested after violent clashes outside a Merseyside hotel accommodating asylum seekers.

  A police officer and two members of the public suffered minor injuries during the disorder in Knowsley on Friday.

  A police van was set alight and missiles including lit fireworks were thrown at officers.

  Thirteen males and two women, aged between 13 and 54, have been arrested on suspicion of violent disorder.

  A peaceful protest and counter protest had been taking place outside the Suites Hotel when police said a group of people arrived who were "only interested in causing trouble".

  Chief Constable Serena Kennedy said: "They turned up armed with hammers and fireworks to cause as much trouble as they could and their actions could have resulted in members of the public and police officers being seriously injured, or worse."

  Home Secretary Suella Braverman said she condemned the "appalling disorder".

  "The alleged behaviour of some asylum seekers is never an excuse for violence and intimidation," she said in a tweet, also thanking Merseyside Police officers for "keeping everyone safe".

  A spokeswoman for the Home Office said the violence was "totally unacceptable".

  "We are working closely with Merseyside Police and partners on the ground to ensure the safety of those in our care and the wider community," they added.

  A dispersal order has been put in place for the area for 48 hours.

  A police van was set on fire in the riot

  Sir George Howarth MP, Labour MP for Knowsley, said "an alleged incident posted on social media" had triggered the demonstration.

  Shadow home secretary Yvette Cooper called the incident "shameful and appalling", while also claiming Ms Braverman was "wrong to dismiss far right threats for political reasons".

  She added: "Instead she should be championing vigilance against all kinds of extremism."

  Police confirmed they had been investigating reports that "a man made inappropriate advances toward a teenage girl" in Kirkby on Monday.

  No victim had been initially identified and a man in his 20s was arrested on Thursday in another part of the country on suspicion of a public order offence, Chief Constable Kennedy said.

  He was released with no further action following advice from the Crown Prosecution Service (CPS).

  The investigation was "ongoing" and Chief Constable Kennedy appealed for anyone with information to contact the police.

  "Social media speculation, misinformation and rumour can actually damage the outcome of investigations and cause unnecessary fear and consequent behaviour, so I would continue to ask people to be mindful of the damage that such actions can cause."

  Witnesses described the violence as "terrifying"

  On the night of the violence, Sir George told the BBC: "The people of Knowsley are not bigots and are welcoming to people escaping from some of the most dangerous places in the world in search of a place of safety.

  "Those demonstrating against refugees at this protest tonight do not represent this community."

  Ahmed, who did not want to give his second name, said he saw the protest from a window in the hotel, where he has been staying for a month as a political asylum seeker.

  The 34-year-old said he had been a teacher in Egypt and others staying in the hotel included doctors and engineers, adding: "People are afraid.

  "We respect this country. We come here to search [for] freedom... but I'm shocked this happened."

  He said he thought the violent actions only represented a minority, adding "in any country, some people are good, some people are not good".

  Alan Marsden, who lives locally, said he attended the protest after seeing the allegations "on TikTok and online" but left when it became clear it was no longer peaceful.

  The 59-year-old said: "It was bad. Kids with masks and balaclavas on turned up. There were 300 or 400 people here.

  "It was mostly women and children until all the hooligans turned up."

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Ahmed said he and others staying at the hotel were afraid

  Clare Moseley, founder of refugee charity Care4Calais, said the scene was "like a war zone".

  She said she was among 100 to 120 people from pro-migrant groups who went to the scene in reaction to the protest to show support for the asylum seekers.

  She added that counter protesters had been "barricaded in a car park".

  "I was really frightened for us, I was really frightened for the people in the hotel," she said.

  "All you could hear was fighting in every direction. Fireworks going off, banging, locks flying, smashing glass, and you could hear people shouting.

  "The police van went right up in flames and exploded, then [the protesters] broke through again and started fighting with the police."

  The protesters were "very organised and very violent", Ms Mosley added.

  Extra police officers will be on patrol in the area following the riot

  Ch Con Kennedy said: "There is no excuse for the violence that was carried out last night and we will arrest anyone who fails to heed this advice."

  Extra police officers will be on patrol in the area while a dispersal order has been implemented until Monday afternoon.

  Knowsley Council previously said it had been given less than 48 hours' notice in January 2022 of the Home Office's intention to temporarily accommodate asylum seekers at the hotel.

  It is understood the government appointed private company Serco to manage the hotel site and provide support to asylum seekers there.

  Knowsley Council said it was "not involved in that contract" and was not being paid to accommodate asylum seekers, but said it was committed to supporting people fleeing persecution.

  The government has been accommodating asylum seekers in Knowsley since 2016, the council said.

  Correction 16 March 2023: This article was amended to remove an out of date annual cost of the asylum system which could be confusing to readers. We also updated information about the daily cost of hotels.

