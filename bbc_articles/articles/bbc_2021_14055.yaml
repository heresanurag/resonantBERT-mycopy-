title: 'Jennifer and Stephen Chapple: Man appears in court over murders - BBC News'
date: '2021-11-25'
section: Somerset
url: http://www.bbc.co.uk/news/uk-england-somerset-59414106
content: |-
  Collin Reeves is accused of killing Jennifer and Stephen Chapple while their children were sleeping.

  Jennifer and Stephen Chapple died at their home in Norton Fitzwarren, Somerset

  A man has appeared in court accused of murdering a couple while their children slept upstairs.

  Jennifer and Stephen Chapple were found seriously injured at their house on Dragon Rise in Norton Fitzwarren, Somerset, at 21:45 GMT on Sunday.

  They had been stabbed multiple times and died at the scene.

  Collin Reeves, 34, also of Dragon Rise, appeared at Taunton Magistrates' Court and was remanded in custody to appear at Exeter Crown Court on 26 November.

  Nine members of Mr Reeves' family were in court

  Mr Reeves, a former soldier, spoke only to confirm his name, age and address in a two-minute-long hearing.

  Nine members of Mr Reeves' family were present in court.

  A second man, aged 67, was arrested on suspicion of the two murders on Sunday evening, and was released under investigation on Tuesday.

  Avon and Somerset Police confirmed he remains under investigation.

  Collin Reeves will be back in court on Friday

