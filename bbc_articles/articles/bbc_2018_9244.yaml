id: bbc_2018_9244
title: Climber 'dug shelter' to survive mountain ordeal in New Zealand - BBC News
date: '2018-08-03'
section: Australia
url: http://www.bbc.co.uk/news/world-australia-45053876
content: |-
  The off-duty Australian soldier spent a week trapped in freezing conditions in New Zealand.

  A road leads towards Mt Aspiring, where the man was found in freezing conditions

  An Australian climber who survived nearly seven days in freezing conditions on a New Zealand mountain has been airlifted to safety, rescuers say.

  Terry Harch, 29, was reported missing on Monday after failing to return from a hike at Mt Aspiring, near Wanaka.

  Rescuers found him on Thursday, saying it was "extraordinary" that he was able to stand and wave to a helicopter.

  Lt Harch had endured freezing winds of up to 60km/h (37 mph) and heavy snow.

  "We think he dug himself a snow dug-out shelter and that's helped in his survivability over these last few days," rescue co-ordinator Geoff Lunt told Radio New Zealand.

  The man was found in a "reasonably good condition" and was suffering only from "minor frostbite".

  He was rescued during a brief spell of good weather at 15:35 local time (03:35 GMT) on Friday.

  The Australian Army confirmed that Lt Harch was a soldier currently on leave in New Zealand.

  Search teams received a signal from the man's distress beacon on Tuesday, but struggled to reach him amid strong winds and thunderstorms in the region.

  Wanaka Search and Rescue chairman Bill Day said Lt Harch was carrying a private tracking device which was configured to alert a private company in Texas. The US firm then called New Zealand's Rescue Co-ordination Centre.

  The climber's hiking equipment - including a sleeping bag, a cooker and food - had earlier been discovered in a hut lower down the 3,033m (9,950ft) mountain.

  "A lot of climbers leave a lot of their equipment and clothing at a base camp and then make a fast ascent on the mountain that they're climbing, and then come back down again," Mr Lunt said.

  "I'm sure he was suitably equipped to carry out that, but as to what happened, we'll find that out later."

  Authorities said it was too windy on Thursday for the man to be winched to safety. Instead, rescuers carrying food and medical supplies used skis to reach him.
