id: bbc_2018_6224
title: Aeroplane makes emergency landing on Devon beach - BBC News
date: '2018-05-06'
section: General
url: http://www.bbc.co.uk/news/uk-england-devon-44023712
content: |-
  A vintage light aeroplane has made an emergency landing on a beach after its engine failed.

  Pilot Zac Rockey was praised for safely navigating onto the sand at Jacobs Ladder, Devon, which backs onto a tall steep cliff.
