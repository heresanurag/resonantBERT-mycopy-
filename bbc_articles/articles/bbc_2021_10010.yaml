  And another 140 people in the UK have died within 28 days of a positive Covid-19 test.

  Covid impacting the training of new HGV drivers

  Supply chain issues, in part due to a shortage of lorry drivers, are affecting businesses across the UK. One problem is that the pandemic has halted HGV driver training and testing for more than 12 months, according to the trade association Logistics UK. And the Road Haulage Association adds that, alongside Brexit, this has led to the current shortfall of around 100,000 HGV drivers. Trainee driver Hayley O'Beirnes has been speaking to BBC Radio 5 Live about the hurdles she has faced to get into the industry "Any normal person would have thrown in the towel by now, what should have just taken a few months has taken nearly a year," she says. Ms O'Beirnes - who starting training in February - says she has always wanted to be an arctic lorry driver, but delays and rising prices of training have stopped her from completing her training. "I couldn't afford the £3,000, which is the average cost of doing training up front, I was forced to find a company that did finance."
