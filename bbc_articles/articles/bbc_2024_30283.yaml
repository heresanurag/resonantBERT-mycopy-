  The 26-year-old man was taken into custody at a McDonald's in the town of Altoona, Pennsylvania, on Monday.

  Luigi Mangione charged with murdering healthcare CEO in New York

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A 26-year-old man has been charged with murder over last week's fatal shooting of UnitedHealthcare CEO Brian Thompson in New York City. Luigi Mangione was taken into custody at a McDonald's in the town of Altoona, Pennsylvania, on Monday after a customer at the fast-food outlet recognised him. An Ivy League graduate from a prominent Maryland family, he was found in possession of a gun and a handwritten document that expressed "ill will" towards corporate America, according to police. People who knew him told US media he suffered from a painful back injury and that he had become socially withdrawn in recent months.

  Mr Thompson, 50, was fatally shot in the back last Wednesday morning outside the Hilton hotel in Midtown Manhattan where UnitedHealthcare, the medical insurance giant he led, was holding an investors' meeting. Police say he was targeted in a pre-planned killing.

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: BBC at McDonald's where Luigi Mangione was arrested

  Mr Mangione initially appeared in a Pennsylvania court on Monday charged with possession of an unlicensed firearm and other charges. He was handcuffed at the wrists and ankles and seemed calm during the hearing, occasionally looking around at those present, including the media. Just hours later, New York investigators charged him with murder and four other counts including firearms charges. Last week's shooting triggered a huge manhunt, with New York City investigators using one of the world's largest digital surveillance systems as well as police dogs, drones and divers in a Central Park lake to search for the attacker. Investigators revealed that finding Mr Mangione was a complete surprise, as they did not have his name on a list of suspects before Monday. It was ultimately a McDonald's customer in Altoona that recognised the suspect from media coverage and alerted an employee, who then tipped off the police. When police arrived, Mr Mangione showed them a fake New Jersey driver's licence with the name Mark Rosario, said court papers. A search of his backpack uncovered what police called a "ghost gun" - which could have been 3D-printed - and a loaded magazine with six rounds of 9mm ammunition. Prosecutors said he was also carrying a US passport and $10,000 (£7,840) cash, $2,000 of it in foreign currency, though Mr Mangione disputed the amount in court.

  This is the gun found with Luigi Mangione when he was found in Pennsylvania.

  The three-page document found in his possession said: "These parasites had it coming" and "I do apologise for any strife and trauma, but it had to be done", a senior law enforcement official told the New York Times. Investigators say the words "deny", "defend" and "depose" were written on shell casings found at the scene of Mr Thompson's murder. Officials believe this could be a reference to what critics call the "three Ds of insurance" - tactics used by insurance companies to reject payment claims by patients in America's complicated healthcare system. Earlier in the day, New York Police Commissioner Jessica Tisch said the weapon and suppressor seized by investigators from the suspect were "both consistent with the weapon used in the murder" of Mr Thompson.

