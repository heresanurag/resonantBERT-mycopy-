title: 'Billie Jean King Cup qualifying: Emma Raducanu named in Great Britain squad
  - BBC Sport'
date: '2024-03-15'
section: Tennis
url: http://www.bbc.co.uk/sport/tennis/68573519
content: |-
  Former US Open champion Emma Raducanu is named in Great Britain's squad to face France in the qualifying round of the 2024 Billie Jean King Cup.

  Great Britain lost to France in the qualifying round of the Billie Jean King Cup but beat Sweden, without Raducanu, in their play-off in November 2023

  Former US Open champion Emma Raducanu has been named in Great Britain's squad to face France in the qualifying round of the 2024 Billie Jean King Cup. Raducanu, 21, joins British number one Katie Boulter, Harriet Dart and Heather Watson in what captain Anne Keothavong says is a "full-strength team". France will host the tie from 12-13 April after they beat Keothavong's team in Coventry last year. Keothavong insisted GB were "getting stronger and better". She told the LTA website, external: "I'm delighted to be travelling with a full-strength team off the back of some terrific results recently. "The French side will present a significant challenge as always, but we all know how representing GB inspires us." GB booked their place in this year's qualifiers with a 3-1 play-off win over Sweden in November. The winner of the best-of-five tie will progress to the Billie Jean King Cup Finals later this year, while the losing nation will compete in the play-offs. Great Britain and France have faced each other four times in the tournament's history, with both sides securing two victories each. Raducanu is continuing her comeback after an injury-hit 2023 season - her latest match ended in a straight-set defeat in the third round at Indian Wells on Tuesday. Meanwhile, Boulter, 27, won her first WTA 500 title earlier this month after coming from a set down to beat Marta Kostyuk in the San Diego Open final.

  In the other qualifiers, four-time Grand Slam winner Naomi Osaka will play in the BJK Cup for the first time in four years when Japan face Kazakhstan in Tokyo. The former world number one made her return to tennis in January after giving birth to her daughter Shai last year. Osaka, 26, has played in five tournaments so far and was recently defeated by Belgium's Elise Mertens in the last 32 at Indian Wells. For Poland's qualifying tie in Switzerland, world number one Iga Swiatek has been selected in the squad. The 22-year-old, a four-time major winner, is through to the semi-finals at Indian Wells after Caroline Wozniacki retired injured in their quarter-final tie. For Germany, Angelique Kerber is part of the team to play Brazil in Sao Paulo as the 36-year-old three-time Grand Slam champion also makes a return after giving birth last year.
