title: Trump accuses UK's Labour Party of 'foreign interference' - BBC News
date: '2024-10-23'
section: US & Canada
url: http://www.bbc.co.uk/news/articles/cdjej417009o
content: |-
  Trump's team accuses activists of making illegal contributions, but the UK prime minister says volunteers have travelled to the US before.

  Donald Trump's campaign has filed a Federal Election Commission (FEC) complaint against the UK's Labour Party, accusing it of "blatant foreign interference" in the US election in aid of the Harris-Walz campaign. The complaint cites media reports about contact between Labour and the Harris campaign as well as apparent volunteering efforts, arguing that this amounts to illegal "contributions". The BBC understands that Labour activists campaigning in the US presidential election are doing so in a personal capacity. UK Prime Minister Sir Keir Starmer, the Labour leader, has sought to play down the row - pointing out that Labour has long sent volunteers to US elections.

  It is considered normal for party officials from the UK to be in contact with counterparts in the US. This has also has taken place previously between Trump's Republican Party and the UK's Conservative Party. Asked by BBC political editor Chris Mason whether the row risked jeopardising his relationship with any future Trump administration, the UK PM said "no". Sir Keir pointed to a dinner the two men had together at Trump Tower in New York last month, saying they "established a good relationship". The BBC has contacted the Harris-Walz campaign for comment.
  • None Follow live coverage of the US election campaign The dispute appears to have begun with a LinkedIn post which asked for people to travel to the US and said nearly 100 were signed up to go. The post, from Labour Party head of operations Sofia Patel, added that 10 "spots" are available and that "we will sort your housing". It appears to have since been deleted.

  The Trump campaign complaint cites this, as well as newspaper reporting that Labour-linked individuals have travelled to the US to campaign for Harris. That reporting, the complaint alleges, creates a "reasonable inference that the Labour Party has made, and the Harris campaign has accepted, illegal foreign national contributions". The complaint also refers to Washington Post reporting that communications were exchanged between the parties and that senior officials have met in private. The Trump campaign has also made comparisons with an international programme in 2016 in which the Australian Labor Party, or ALP, sent delegates to help with Bernie Sanders' campaign. In that instance, however, the ALP paid for flights and daily stipends. The party and the campaign were each handed down civil penalties of $14,500. Activists' trips by the UK Labour Party have not been organised or funded by the party, it is understood from party officials. Foreign nationals are permitted to serve as campaign volunteers as long as they are not compensated, according to FEC rules. A former Labour activist who volunteered for Barack Obama's presidential campaign in 2008 called Trump's allegations "nothing more than a political stunt". Matthew McGregor told BBC Radio 4's Today programme that the most a foreign volunteer could receive was a bottle of water or some pretzels. In reference to Patel's offer to "sort" the housing of those who went on the trip, Mr McGregor said it was common for Democratic activists to offer their spare rooms or sofas to volunteers. Speaking to the Today programme himself, one Trump ally said the suggestion of interference was more of a "perception problem than a legal one". Chris Ruddy, CEO of Newsmax Media, added that story was more important in the UK than in the US currently, but as the election got closer it "could become a bigger issue".

