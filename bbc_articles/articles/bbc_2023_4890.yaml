title: Lightning storm illuminates skies above Illinois - BBC News
date: '2023-04-03'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65163579
content: |-
  The phenomenon was seen just days after a series of tornadoes ripped through several US states, including Illinois.

  Skies above the US state of Illinois were lit up by an extraordinary display of lightning on Sunday.

  It came after dozens were killed and thousands left without power when a series of tornadoes tore through towns and cities in the south and midwest of the United States.
