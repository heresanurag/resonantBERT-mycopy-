  Man killed by XL bully dog in his own home

  David Daintree, 53, was found dead after ambulances and police were called

  A man has been killed by his own XL bully dog at his home in Lancashire, police have said. David Daintree, 53, was attacked by the pet in Ashley Court in Accrington and was found dead at about 21:30 BST on Tuesday. Lancashire Police said officers had “no alternative” but to shoot the dog to “prevent it from causing further injury”. Supt Marie Jackson said Mr Daintree's family were being supported by specialist officers after the "tragic incident".

  An investigation has been launched and detectives are appealing for anyone with information to come forward. The ambulance service first contacted police after it received reports of the man being attacked, the force said.

  Mr Daintree was later found dead and the dog was deemed to be "continuing to pose a significant threat of serious harm". Supt Jackson said: "My thoughts are with his loved ones at this time. “An investigation into the circumstances is ongoing and I would appeal to anyone with any information to get in touch. “We will have extra officers out and about in the area carrying out enquiries and I would urge anyone with information or concerns to speak to them.”
