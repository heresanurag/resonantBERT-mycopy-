  • None Leicester are the only side to score in all their Premier League games this season (11 games).
  • None Cardiff have failed to score in six Premier League games this season, a joint-divisional high along with Huddersfield and Southampton.
  • None Leicester have won seven of their past nine Premier League games against promoted sides (drawn one, lost one).
  • None Leicester have won three of their past five Premier League away games (lost two), as many victories as they had managed in their previous 12 on the road in the competition (drawn one, lost eight).

  Leicester's players travel to Bangkok for the funeral of Vichai Srivaddhanaprabha and arrive back in midweek to prepare for their home match against Burnley on Saturday, 10 November (15:00 GMT) while Cardiff host Brighton on the same day at 12:30.
