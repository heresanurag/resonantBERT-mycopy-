title: 'Mahbouba Seraj: Afghanistan is a country in trouble - BBC News'
date: '2021-12-07'
section: General
url: http://www.bbc.co.uk/news/world-asia-59555481
content: |-
  Mahbouba Seraj is a prominent Afghan women’s rights activist. She has a personal message for the Taliban.

  When the Taliban came back to power in August 2021, she stayed in the country and continues to voice the concerns of Afghan women.

  From Kabul, she tells Yalda Hakim for BBC 100 Women about her fears for her nation, and has a personal message for the Taliban.
