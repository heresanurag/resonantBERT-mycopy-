  Racegoers have gathered at the Ascot Racecourse for the first day of the glamorous racing fixture. More than 250,000 racegoers are expected during the week at the Berkshire track. The weather is expected to be warm and dry. The event was founded by Queen Anne in 1711, and has since become as much a social occasion as a sporting event.
