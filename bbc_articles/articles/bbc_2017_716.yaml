title: Wheelchair user Doug Paulley on winning bus buggy dispute - BBC News
date: '2017-01-18'
section: General
url: http://www.bbc.co.uk/news/uk-38664446
content: |-
  Wheelchair user Doug Paulley says the case "will hopefully make a major difference for disabled travellers".

  Speaking after the judgement, wheelchair user Doug Paulley says the case "will hopefully make a major difference for disabled travellers".

  Wheelchair user Doug Paulley brought his case after he was told he could not get on a bus to Leeds in 2012 when a mother with a pushchair refused to move.

  He had argued operator FirstGroup's "requesting, not requiring" policy was discriminatory.
