content: |-
  Tulsi Gabbard said she was seeking further information from the FBI and other US agencies.

  US intelligence head 'not told' about UK's secret Apple data demand

  Tulsi Gabbard, the director of US National Intelligence, says she was not informed in advance about the UK government's demand to be able to access Apple customers' encrypted data from anywhere in the world. Earlier this year, the UK government asked for the right to see the data, which currently not even Apple can access. The tech giant last week took the unprecedented step of removing its highest level data security tool from customers in the UK. In a letter, Ms Gabbard said she was seeking further information from the FBI and other US agencies and said, if the reports were true, the UK government's actions amounted to an "egregious violation" of US citizens' privacy.

  The Home Office notice, which cannot legally be made public, was issued to Apple under the UK's Investigatory Powers Act in January. Ms Gabbard added that she was also seeking legal advice over whether the UK had breached an agreement between it and the US not to demand data belonging to each other's citizens. In response to the Home Office notice, last week Apple pulled its top level privacy tool, Advanced Data Protection, from the UK market. Advanced Data Protection (ADP) means only account holders can view items such as photos or documents they have stored online through a process known as end-to-end encryption. Apple would have to break its encryption systems in order to comply with the UK government demand, as currently it cannot see data protected in this way so would be unable to share it with law enforcement. This is something it says it will never do. Apple's UK users' data remains encrypted in the UK but at a level which means it can be accessed by the tech giant if served with a warrant.
  • None Apple pulls UK Advanced Data Protection - what it means for you In the letter to Senator Ron Wyden and Representative Andy Biggs which has now been published online, Tulsi Gabbard said she first read about the notice in the media and had not been informed beforehand by either the UK or by Apple. Apple did not comment. The Home Office referred the BBC to comments made earlier this week by security minister Dan Jarvis. The Minister of State for Security said: "I cannot comment on operational matters, and it would not be appropriate for me either to confirm or to deny the existence of any notices under the Investigatory Powers Act 2016." He added: "What I can say is that the suggestion that privacy and security are at odds is not correct; we can and must have both." Meanwhile, two US lawmakers have also requested the US Department of Justice (DOJ) review the UK government's notice to Apple and its implications. US Senator Alex Padilla and Representative Zoe Lofgren, two Democrats who both represent California, asked the DOJ to investigate whether the UK might have breached the terms of the US-UK Agreement on Access to Electronic Data for the Purpose of Countering Serious Crime. "It is difficult to see the UK's notice to Apple, if the reports are accurate, as anything less than an action that undermines US law, public policy, and information security by requiring US companies to take such reckless action as undermining encryption for all users globally," the lawmakers said in a statement, external.
