  King Charles meets survivors of the Southport knife attack that claimed the lives of three young girls.

  King Charles has met survivors of the Southport knife attack that claimed the lives of three young girls.

  Crowds cheered as he arrived in the Merseyside town shortly after 13:30 BST, where hundreds of tributes have been left to the victims.

  In a private meeting, the King heard about the experiences of some of the young children who were attacked, and also signed a book of condolence.
