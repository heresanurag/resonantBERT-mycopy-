title: 'Newspaper headlines: PM to ''end gloom'' and donor ''breaks cover'' - BBC
  News'
date: '2024-09-24'
section: General
url: http://www.bbc.co.uk/news/articles/c9vpywnepv4o
content: |-
  Many of Tuesday's front pages look ahead to the speech by Prime Minister Sir Keir Starmer at the Labour conference.

  "Light at the end of this tunnel, PM tells Britain" is the Daily Telegraph, external's headline. The paper says Sir Keir Starmer will use his conference speech to warn that he can't lower taxes yet, but can "bring joy" back to people's lives over the next five years. The Times, external focuses on Sir Keir's plans to give investigators new powers to access information about people's bank accounts, as part of measures to tackle benefit fraud. The Mirror, external leads with a different pledge set to be included in the prime minister's speech. It says he will today confirm a Hillsborough Law will be introduced by April to stop state bodies misleading investigations. The Financial Times, external reports on Rachel Reeves's speech at the conference in Liverpool yesterday, telling readers it struck an "optimistic note". The Daily Express, external leads on the winter fuel debate. The paper says dozens of retired union members gathered yesterday to oppose the decision to means-test the payments. It highlights booing in the venue when it was announced that a debate on the matter would be delayed. The Daily Mail, external reports on what it describes as a "chilling threat" from the leader of the RMT union, Mick Lynch. The paper says that, during a speech at a fringe event in Liverpool, Mr Lynch said the goal of union chiefs was the "complete organisation of the UK economy". The Mail says that unions have been "flexing their muscles" at the Labour conference, with the Royal College of Nursing leaving the chancellor "red-faced" when it rejected a government pay offer. The Guardian, external leads on claims that six water companies in England have overcharged customers by up to £1.5bn. Lawyers at the first environmental competition class action against water companies are said to have argued, at a tribunal, that the firms underreported the true scale of their sewage pollution of rivers and waterways. As a result, it is claimed they were able to charge customers higher bills. The report carries a statement from the industry body, Water UK, which describes the allegation as "highly speculative" and "without merit". The Times, external says Chinese internet users are mourning a retired British petroleum engineer, known to them as "Old Dry Keith". Keith Brown's wife began posting social media videos of him preparing his daily ham and tomato sandwich, which the paper says attracted criticism from millions of people for its "Anglo" blandness. But, according to the Times, Keith Brown's hundreds of thousands of followers came to appreciate his "stoic acceptance of mediocrity".

