  After every round of Premier League matches this season Troy Deeney gives us his team of the week. Do you agree with his choices?

  Who has made Troy's Premier League team of the week?

  After every round of Premier League matches this season, BBC football pundit Troy Deeney will give you his team and manager of the week. Here are this week's choices. Do you agree? Give us your thoughts using the comments form at the bottom of this page.

  David Raya (Arsenal): He made some big saves and it was a solid performance, which obviously kept Arsenal with an opportunity to go on and thrash Manchester City 5-1.

  Neco Williams (Nottingham Forest): He was excellent at the back against Brighton and also got his goal. He was a catalyst going forwards and backwards for that team. I even liked the fact the manager had to calm him down from getting sent off. That really set the tempo for that game. James Tarkowski (Everton) and Morato (Nottingham Forest): Both of them are solid centre-backs. Both teams had clean sheets, both played pivotal parts. Tarkowski with a little assist for the Beto goal and Morato came into a team that just lost 5-0. To have the impact he did, he hasn't played a lot of football lately but I thought he was excellent. Myles Lewis-Skelly (Arsenal): The talk of the town. People said they didn't like his celebration. I loved it. It shows he has got a bit of personality and a bit of life. The young man is growing into an exceptional football player.

  Jean-Ricner Bellegarde (Wolves): He scored a goal but he was powerful in running over people. The team has lacked a leader with real quality and he showed leadership with his performance. It was a massive game for Wolves against Villa. If they lost that I think they would have really struggled to stay up. Morgan Gibbs-White (Nottingham Forest): The heartbeat of that team. He got his goal but it was a proper captain's performance. Showed why he is worth the money they paid for him a few years ago. Thomas Partey (Arsenal): The goal was deflected but I feel he does all of the horrible work that no-one really sees. Intercepting Phil Foden was massive for the goal.

  Anthony Elanga (Nottingham Forest): Three assists. I'm starting to question why Manchester United let him go to replace him with Antony. I will let that sink in. Antony, who they have just basically given away. Chris Wood (Nottingham Forest): The main man, the man mountain. Chris Wood is getting better with age like a fine wine. Mohamed Salah (Liverpool): The reason for Liverpool winning the game. Salah's penalty and then an unbelievable finish. The second goal, you know he was going to go with that left foot but you just can't stop it. It was real quality. It was one of those moments where you realise it is stupid we are even having a conversation about him potentially leaving the club. He was excellent.

  Vitor Pereira (Wolves): It was a massive game as I said earlier and he came through. I have been critical of Wolves because they have been dire, but it was a massive win for them against Aston Villa.

