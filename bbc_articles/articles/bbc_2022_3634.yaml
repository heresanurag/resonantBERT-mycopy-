  Find out which films, actors and directors have won what at the Hollywood ceremony.

  This year's Oscars have been handed out in Los Angeles, honouring the movie industry's finest from the past 12 months. Here is the list of winners and all the nominees at the 94th Academy Awards.

  Sci-fi epic Dune won the most awards, with six

  Javier Bardem and Nicole Kidman were both nominated for Being the Ricardos

  Billie Eilish and brother Finneas O'Connell's No Time to Die was named best original song

