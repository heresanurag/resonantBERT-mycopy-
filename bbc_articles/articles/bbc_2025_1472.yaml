title: What's your message to Ukraine? - BBC asks Trump - BBC News
date: '2025-02-19'
section: General
url: http://www.bbc.co.uk/news/videos/cz61xvjnjn8o
content: |-
  The US and Russia have been in peace talks about the Russia-Ukraine war that Ukraine wasn't included in.

  BBC reporter Bernd Debusmann Jr asked US President Donald Trump for his message to Ukraine after the country wasn't included in negotiations to end the war.

  Russia and the US have been in talks in Saudi Arabia this week discussing the first steps towards negotiations to end the war that started on 24 February 2022.

  Saying he was "disappointed" by Ukraine's reaction, Trump appeared to blame the country for starting the war, saying it "could have made a deal" earlier.
