id: bbc_2017_1228
title: Mexico's Colima volcano in fiery explosion - BBC News
date: '2017-01-19'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-38674298
content: |-
  Webcams have caught the dramatic eruption of Mexico's Colima volcano, which has seen an increase in activity since October.

  The explosion sent a large plume of ash and smoke 2,000m (6,561 feet) above the crater.

  Mexico has more than 3,000 volcanoes, but only 14 are considered active.
