title: 'Treforest Industrial Estate: Man says explosion was carnage - BBC News'
date: '2023-12-14'
section: General
url: http://www.bbc.co.uk/news/uk-wales-67716592
content: |-
  Stephen Davies was at the gym in the industrial estate when he heard the explosion.

  Police and firefighters are still tackling a huge blaze at an industrial estate in south Wales

  Stephen Davies was at the nearby gym at the time of the blast in Pontypridd, Rhondda Cynon Taf.

  He said: "The walls just exploded up in front of us, up the stairwell as I said earlier, and the ceiling collapsed the walls just fell in, and all the debris just piled in to the gym into the cafe area."

  He added that "it was carnage".

  One person remains unaccounted for, and roads in the area remain closed and an investigation is taking place into the cause.
