title: 'Stormont Live: Wednesday 14 October 2020 - BBC News'
date: '2020-10-14'
section: N. Ireland Politics
url: http://www.bbc.co.uk/news/live/uk-northern-ireland-politics-54530687
content: |-
  First Minister Arlene Foster delivered a statement to the assembly on increased coronavirus restrictions.

  Christopher Stalford of the DUP asks about support for those working in the hospitality sector.

  Mrs Foster says she is aware that any in that sector are working on limited contracts, often for a “minimum wage”.

  “There is a need for us to be aware of that,” she says, adding she is due to meet with representatives from Hospitality Ulster later today.

  Sinead McLaughlin of the SDLP says the decisions being taken have “to be right”.

  She says “Derry is nine days into these restrictions already” and reads a letter she has received from a business leader in the area before asking the first minister for her thoughts.

  Mrs Foster says “I hear what she’s saying in relation to the lowest paid”.

  “I accept that footfall is down,” says Mrs Foster, with regard to shops.

  “You can still travel in a taxi with all of the appropriate safeguards, but I do accept that there are people who will take this and will not want to be out and about,” she adds.

  “We need to get that balance of keeping the economy going, I accept at a lesser level than we would like,” says Mrs Foster.

  Robbie Butler of the UUP asks the first minister to confirm there will be support for online learning and student support, if required.

  Mrs Foster says, “I have been clear that the last thing we want to do is get into that awful phrase yet again, of blended learning”.

  She pays tribute to teachers for their efforts, adding “we should always try and ensure our children have an education and our children are at school”.

  “We have to take into account the impact this will have on their life chances in the future,” says the first minister.

  SDLP MLA Pat Catney asks the first minister to provide businesses with “clarity” and wants an outline of the support to be put in place.

  Mrs Foster says she accepts businesses need clarity, adding that is why they will be in place on Friday.

  She hopes the support package will be signed off tomorrow, she adds.

  Rachel Woods of the Green Party says there are "so many questions” in relation to the regulations announced today.

  Mrs Foster says “I know there are a lot of people who are vulnerable, or who are perhaps older and who are very, very worried at present”.

  “I don’t have all of the answers,” she adds.

  “We’re dealing with a pandemic, we’re working at speed, and we’re trying to work through all of the answers.”

  “Six o’clock on Friday is the target for when these regulations will take effect.”

  Matthew O’Toole of the SDLP says the statement today doesn’t make clear that it’s “not to beat the virus in the short term”.

  He says “the blunt truth is this is about buying time for our health service not to be overwhelmed”.

  Mrs Foster responds, “what we’re trying to do is push down the transmission of the virus”.

  She says the R rate, or rate of transmission is at present about 1.5, adding that the aim is to reduce it to below 1.

  “We have to take these interventions now. Mr Speaker. as the virus has got out of control in some places,” says the first minister.

  “We’re interfering with people’s lives,” she says, adding that is not something she wants to do.

  Sinéad Bradley, also of the SDLP, asks about enforcement of the regulations.

  Mrs Foster says “we will continue to work with those people who want to help us with compliance and enforcement of the regulations”.

  “Personal responsibility is a wonderful thing,” she says.

  “If people do what we’re asking them to do, then it has a consequence,” says the first minister.

  Dolores Kelly of the SDLP says there are “still some concerns around schools” and wants to know if the two-week period will be “used constructively by the education minister and others” to ensure “more deprived children” get additional support if required.

  Mrs Foster says “it is those children who don’t have access to the internet, who don’t have access to wi-fi, whose parents don’t have an interest in education” that suffer when schools are not sitting.

  That concludes questions on the first minister's statement to the assembly.
