  Leclerc said he "wanted to be cautious" but he was "targeting pole position". "We did a good preparation work because the feeling with the car was good," he said. "There are things we need to improve as always and I am not very happy with the balance yet but we are in a much better place compared to Bahrain testing and there is still some performance to find. "But that is the same for everyone. The cars are pretty new for everyone and you have to push it to understand where exactly is the limit. "It has been a solid first day and we have to see how it goes tomorrow when we push a bit more. "For sure McLaren is up there. Red Bull might be struggling a little bit more for now, but with them and especially Max (Verstappen) you can never really rule them out. I am sure they will be in the fight and Mercedes look strong as well." Norris, who was fastest in the first session of practice and third behind Leclerc and McLaren team-mate Oscar Piastri in the second, said: "Been a good start to the weekend. We have a good basis. "Not confident with the car in terms of finding the best balance, especially on low fuel. High fuel I felt good, low fuel too many problems so a bit of a struggle. I think we'll be strong, Ferrari will be strong, Mercedes will be strong." Verstappen was seventh fastest for Red Bull, but did not complete his fast lap on the soft tyres after making a mistake at Turn Three. On race pace, Red Bull appeared to be the fourth quickest car behind Ferrari, McLaren and Mercedes, but it was close between the top four and wet weather is expected on Sunday, which will mix things up and is likely to bring Verstappen into the fight for victory.

