content: |-
  Ex-Love Islander Whitney Adebayo says she was abused online after appearing on the Netflix show.

  Whitney Adebayo pictured at the Brit Awards earlier this month

  Former Love Island star Whitney Adebayo says she has been subjected to death threats and "evil" racist abuse following her appearance on the Sidemen's Netflix reality show Inside. Posting on Instagram, external, Adebayo shared screenshots of offensive messages from people who had seen her on the show, created by the UK superstar YouTube group led by KSI. "I've received a mix of reactions - some positive, some negative," she noted. "But what I've encountered more than anything is the reality of racism. "I understand that being in the spotlight [brings] criticism, but what I've experienced the past few days goes beyond criticism. This evil, hatred and pure racism and should not be tolerated."

  She added that the "hateful messages", "death threats" and "unjust treatment I've received" were "not only hurtful" but also "serve as a reminder that racism is still very much embedded in British culture". Inside is an reality TV competition featuring 10 influencers and celebrities who compete in challenges to secure a £1m prize fund, with everything they buy or do costing money from the total. Adebayo appeared on series two alongside TikTok star Milli Jo McLoughlin, podcaster Mandi Vakili and rapper DDG, as well as former Manchester United and France footballer Patrice Evra. Some of the abuse aimed at Adebayo regarded her appearing to mock Evra's use of English, something she has defended as an "inside joke"., external

  Expanding on the abuse she had received, she continued: "This isn't just about a TV show; it's about the way society can sometimes respond to women like me, women who may stand out or don't fit a certain mold [sic] of being cute and mute. "For those of you who have supported me, thank you. Your love and encouragement keep me grounded. "To those who have tried to tear me down, I want to remind you: your hate doesn't define me. It only fuels my determination to grow and to be unapologetically myself." Now that her journey on the show "has come to an end", as she noted, she signed off with: "Love me or hate me, either way I know you were entertained. You're welcome x." Prior to her appearance on Inside, Adebayo appeared on series 10 of Love Island in 2023, finishing as a runner-up alongside her partner Lochan Nowacki. Nowacki shared his support for his girlfriend online, commenting: "So proud of you baby! It's a shocking and disgusting world we live in sometimes! "For everyone that knows you knows you are kind and pure hearted! And I for one was definitely entertained! I love you! Always on top queen! Here for you always."
