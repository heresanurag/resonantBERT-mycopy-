content: |-
  Keir Starmer denies giving workers "false hope" before closure of last Port Talbot blast furnace.

  No false hopes on Tata jobs, says Starmer

  Sir Keir Starmer was on a two-day trip to Wales

  Sir Keir Starmer has said he cannot give "false hope" to Port Talbot steel workers ahead of the planned closure of the town's last blast furnace next month. The Labour UK government is in discussions to save jobs at Tata Steel, where thousands face redundancy. The prime minister said his ministers will do "everything we can" but added: "I'm not going to pretend it's [anything] other than tough." Welsh Conservative Senedd leader Andrew RT Davies claimed Labour ministers had led Port Talbot "up the garden path".

  Plaid Cymru said Labour was on the "backfoot" in responding to Tata. The UK Labour leader was speaking to journalists at the 57.4-megawatt Brechfa Forest West windfarm in Carmarthenshire, as part of a two day trip to Wales. Sir Keir met Eluned Morgan in Cathays Park, in Cardiff, on Monday for his first meeting with her since she became first minister. The Labour leader claimed to have "turbocharged" the party's action on steel since he has been in power. Asked if he was risking giving false hope to Port Talbot steel workers, he said: "No. "We're working really hard on this, both the first minister and myself jointly on this, because it's so important we do everything we can to preserve those jobs." He later added: "I don't want to give anybody false hope. I'm not going to give up on trying to preserve as many jobs as we can. "I'm not going to give up on making sure that those in the supply chains have the money they need to diversify, where they need to diversify, which is why we put money behind this just seven days ago. "It is very important that we have steel production here in south Wales, very important that the government is committed to that. "This is a tough time, there's no doubt about that but we will do everything we can to preserve those jobs."

  In opposition Labour had been accused by the Conservative government of giving false hope to Tata Steel workers, and it’s a charge Sir Keir Starmer continues to resist as Prime Minister. While it is true that the new Labour government has announced funding for supply chain businesses, this was formed at the cross-party transition board whose remit and budget was set by the previous Westminster administration. Tata Steel, meanwhile, is pressing ahead with its plans. It has already invited workers to volunteer for redundancy, and will close the second of two blast furnaces in September. Since the steelmaker announced its original proposals at the beginning of this year, barely any changes have been made to the overall plan to cut 2,800 jobs and shut the heavy end of Port Talbot’s operation by the autumn. With just weeks remaining, the blueprint for Tata Steel’s restructure seems unlikely to change. Any additional investment or job creation is likely to be secondary, and small in scale, compared with what’s being lost.

  The remaining blast furnace in Port Talbot is due to close in September.

  Eluned Morgan told BBC Wales: "We're all very aware that there's a Damocles sword hanging over the Tata situation." "The situation is difficult, and you know, we have to be prepared for all options." The first tranche of cash from a £100m fund to help workers and firms affected by restructuring plans was announced last week. The £13.5m announced was to support local firms whose main customer is Tata Steel find new markets and to help workers find new jobs, access training and gain skills and qualifications in areas where there are vacancies.

  No.10 has promised to reset the relationship between the Welsh and UK governments, with the same party now running both. Asked whether there will be extra cash for the Welsh government to bring down waiting lists, Ms Morgan said: "There's a whole array of issues that we discussed yesterday. "Because they will be putting some money on the table in England to bring those waiting lists down, we will get some money as a result of that, we'll decide to spend that how we want. "I'm very keen to make sure that we use that money to bring waiting lists down." She said the UK government can learn things from the Welsh government. "We've changed the rules, for example, around around GPs and how they should see patients. We've changed their contracts. They haven't done that in England yet," she said. Ms Morgan added: "We will work together on things that we agree on, but they need to understand that there some things are devolved."

  On the visit to the hillside windfarm seven miles north of Carmarthen on Tuesday, Sir Keir said renewable energy was a "massive opportunity" for the country. "There's a huge opportunity here for Wales, which has got the resources, it's got the natural resources, it's got the shallow seas, and it's got the skilled people here in Wales that can operate this," he said. He and Eluned Morgan saw inside one of the turbines, which are up to 100m tall, after a technician stopped it for safety reasons.

  Andrew RT Davies criticised Sir Keir's comments on Tata. He said: "Clearly now the realisation is coming that what the Conservatives did in government offered real hope to maintain steel production in Port Talbot with arc furnaces." He added: "The steel workers and communities in Port Talbot have been misled by Labour and led up the garden path". Ann Davies, Plaid Cymru MP for Caerfyrddin, said: "Labour has known about Tata's plans and associated job losses in Port Talbot for months. But it has constantly found itself on the back foot in responding to them. ‘We were told by Labour Welsh government to wait for a UK Labour government - with its £3bn plan for steel - to deliver new hope and a new plan for primary steel-making in Wales. It is clearer now than ever that there was no plan."
