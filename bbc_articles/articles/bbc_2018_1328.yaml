id: bbc_2018_1328
title: Moment policeman catches falling child - BBC News
date: '2018-02-21'
section: General
url: http://www.bbc.co.uk/news/world-europe-43149091
content: |-
  He was guarding a bank in Asyut, Egypt, when he spotted the boy three floors above.

  A policeman guarding a bank in Asyut, Egypt, caught a child falling from the third floor.

  The child was unharmed and the policeman was only slightly injured.
