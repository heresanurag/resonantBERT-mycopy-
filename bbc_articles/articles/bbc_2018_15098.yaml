title: MPs debate homeless deaths stats - BBC News
date: '2018-12-19'
section: Parliaments
url: http://www.bbc.co.uk/news/live/uk-politics-parliaments-46592594
content: |-
  The House of Commons debates official figures showing nearly 600 homeless people died in England and Wales last year.

  With the Commons finished for the day, that's it from us until after Christmas.

  Today began with questions to trade and equalities ministers, before shadow housing minister Melanie Onn asked an urgent question on new statistics about deaths among homeless people.

  Commons Leader Andrea Leadsom then gave the business statement, repeatedly stressing that MPs will get to vote on the government's Brexit deal in the week beginning January 14.

  Following that, MPs debated the UN report on the Rohingya refugee crisis, as chosen by the backbench business committee.

  Parliament returns on Monday 7th of January, do join us then...and have a happy Christmas.
