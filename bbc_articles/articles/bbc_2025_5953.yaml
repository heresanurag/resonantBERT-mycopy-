content: |-
  He travelled thousands of miles to watch his beloved team win in a nail-biting match.

  A Bristol City fan travelled thousands of miles to watch his beloved team win in a nail-biting match.

  Haydon Roberts scored a 96th-minute winner for the Robins against West Brom on Tuesday - much to the delight of Dean Allen who journeyed from Cape Town in South Africa.

  His trip involved hopping on a cruise liner to Lanzarote, before flying to Bristol Airport, and arriving at Ashton Gate with 10 minutes to spare.

