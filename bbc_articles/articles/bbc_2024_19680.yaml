  Smith will be 'world class for long period' - Bell

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch the best shots from Jamie Smith's century

  Jamie Smith will be a "world-class player over a long period of time", according to former England international and Sri Lanka batting coach Ian Bell. Smith, 24, made his maiden Test century on the third day of England's series opener against the Sri Lankans at Emirates Old Trafford. Bell, who played 118 Tests, has worked with Smith for England Lions and Hundred side Birmingham Phoenix. "The small part that I played in his development, I've watched a guy who's worked extremely hard," said Bell. "I'm sure he's going to be a massive part of this England team in all formats over a long time." Surrey's Smith was given the gloves by England ahead of county team-mate Ben Foakes and Yorkshire's Jonny Bairstow for the series against West Indies earlier this summer. He missed out on a maiden century in the third Test against the Windies, making 95 at Edgbaston, but made no mistake with 111 in Manchester on Friday. Overall, he is only the third England player to have three scores in excess of 70 in their first five Test innings and his 318 runs after five knocks is the second-most of any wicketkeeper in Test history. And 42-year-old Bell, whose 7,727 runs put him ninth on England's all-time list in Tests, said he was "not at all" surprised by the start Smith had made at the highest level of the game. "He's going to be a world-class player for England over a long period of time," said the former Warwickshire batter. "He's confident, and he's taken to international cricket with ease."

  Smith's knock helped England to 358 in their first innings, an advantage of 122 runs. When their top-order batting failed, Sri Lanka were in danger of being beaten inside three days before rallying to 204-6 - albeit only leading by 82. Smith's celebration on reaching three figures was low key, but he later spoke of his "pride" over the achievement. "I probably didn't show it, but inwardly I was obviously very happy," he said. "That's just me as a person. I don't want to show too much emotion, it's all inward and it's mainly about the job to do for the team. "Once you reach the moment, you can enjoy that 30 seconds, but then it's back on to what the team requires." Smith was initially selected to bat at number seven and has now found himself at number six as England cover for injured captain Ben Stokes. He has spent most of his first-class career in the top six for Surrey and former captain Michael Vaughan said England have a "lovely headache" over where Smith should bat in the future. "The only question to come is whether Smith is batting too low," Vaughan told Test Match Special. "England have such a powerhouse line-up, they want someone at seven who can bat with the tail and he's certainly got the skillset for that. "I admire his aggressive strokeplay, but mostly I admire his defence. If you've got that, if you can nullify the best balls and play straight, you can bat anywhere you want in the order."
