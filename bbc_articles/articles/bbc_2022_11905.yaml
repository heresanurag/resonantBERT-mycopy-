title: 'Queen Elizabeth II: Camilla remembers Queen''s smile in tribute - BBC News'
date: '2022-09-18'
section: General
url: http://www.bbc.co.uk/news/uk-62942351
content: |-
  The Queen Consort recalls her late mother-in-law's 'wonderful blue eyes' on the eve of the monarch's funeral.

  The Queen Consort has paid tribute to the Queen, recalling her "wonderful blue eyes" and saying she would "always remember her smile".

  Camilla told the BBC how Queen Elizabeth II carved out her own role for many years in the "difficult position" of being a "solitary woman" in a male-dominated world.

  On the eve of her Platinum Jubilee in February, the Queen endorsed the then-Duchess of Cornwall to be known as Queen Consort when the time came.
