title: St Joseph's Preparatory school in Stoke-on-Trent to close ahead of VAT change
  - BBC News
date: '2024-09-03'
section: Stoke & Staffordshire
url: http://www.bbc.co.uk/news/articles/ckg2422e1glo
content: "St Joseph's Preparatory School in Stoke-on-Trent blames factors including\
  \ \nfunding changes.\n\nSt Joseph's Preparatory School blames \"changes in independent\
  \ school funding\" for its decision\n\nA private school in Staffordshire has announced\
  \ it will close due to “financial challenges”, ahead of the imposition of VAT on\
  \ its fees. St Joseph’s Preparatory School in Stoke-on-Trent made the announcement\
  \ on its website, citing “changes coming regarding independent school funding”.\
  \ Labour pledged to end private schools' VAT exemption and business rate relief\
  \ if it got into government. VAT at the standard rate of 20% will be charged on\
  \ private school fees from 1 January.\n\nThe government said the move would fund\
  \ 6,500 new state school teachers in England. A statement from the school said:\
  \ “In making their decision, the trustees have focused on the varied financial challenges,\
  \ which the school community has faced in recent years, and the changes coming regarding\
  \ independent school funding. \"This has been an incredibly difficult decision and\
  \ one not taken lightly. \"The trustees will work with the governors and staff to\
  \ bring this decision into effect in a manner that causes the least possible negative\
  \ impact, particularly for the children who will require new school places, as a\
  \ result of this decision. \"Our prayers are with everybody at this heartbreaking\
  \ time.\" Trustees said parents would be invited to a meeting on Wednesday about\
  \ the next steps.\n\nIn a post on Facebook, the school wrote that “with great regret...\
  \ this term will be our last”. More than 50 people including former staff, pupils\
  \ and parents commented on the post, with one writing that the news was “heartbreaking”.\
  \ Another wrote: “This is such sad news. My years spent at Joe’s were truly wonderful\
  \ and life changing! \"It really was a truly special place to work. Sending lots\
  \ of love to staff and pupils during this sad time.”"
