  This epic rivalry began in Spain, coming to a head when Guardiola's Barcelona took on Mourinho's Real Madrid in the 2011 Champions League semi-final. Mourinho accused Guardiola of criticising referees, to which Guardiola delivered an expletive-laden response. "Off the pitch, he has already won. I award him a Champions League trophy for victories in the press room," he added. The two managers locked horns again in the Premier League while Mourinho was in charge of Manchester United, with Guardiola’s City winning three of the teams' six meetings during the Portuguese's Old Trafford tenure. Mourinho's team were City's closest pursuers in 2017-18 as they finished second - but he was sacked after a poor start to the following campaign.

  Never one to hold back post-match - particularly if his team had just been beaten - Mourinho exchanged words with Conte moments after a humiliating 4-0 defeat on his return to Stamford Bridge with Manchester United in October 2016, apparently unhappy with the Italian's celebrations towards the end of the game. The following season, Mourinho accused some of his managerial rivals of "acting like clowns" on the touchline - in an apparent dig at Conte and Liverpool boss Jurgen Klopp. Conte responded by reminding Mourinho of his own misdemeanours during his managerial career. He took things a step further in 2018, calling the Portuguese "a little man" and "fake".

  Rafael Benitez's Liverpool were top of the Premier League in early 2009 but Sir Alex Ferguson's United were hot on their heels in second. Benitez appeared to crack under the pressure during a bizarre press conference in January, during which the Spaniard produced a list of "facts" relating to Ferguson's apparent influence over match officials and the football authorities. Ferguson's team, as they so often did, would come out on top at the end of the campaign, finishing four points ahead of Liverpool. He later wrote in his autobiography: "The mistake [Benitez] made was to turn our rivalry personal. Once you made it personal, you had no chance. I had success on my side."

  Arsene Wenger and Sam Allardyce in 2014, with Allardyce then managing West Ham United

  In stylistic terms, Arsenal and Bolton were at opposite ends of the football spectrum in the mid 2000s - the Gunners were free-flowing and fluid, the Trotters were physical and direct. However, Arsenal won only one of their eight matches against Bolton between September 2004 and February 2007, with Allardyce's side victorious in four of those games. The rivalry continued during Allardyce's time at Blackburn. In his autobiography, Allardyce wrote: "I enjoyed beating Arsenal more than anyone when I was in charge at Bolton. We’d really got to them and Arsene Wenger hated us." Speaking in December 2016, Wenger admitted that a 2-2 draw at Bolton in 2003 - which cost the Gunners dearly in the title race - still hurt him, saying: "You have awkward moments and you never forget them. It's a scar on your heart."

  Arsenal manager Arsene Wenger was given a special presentation at Old Trafford, led by great rival and then-Manchester United boss Jose Mourinho, for his final visit in April 2018.

  Bold, brash, backed by Roman Abramovich's millions and - in his own words - "special", Mourinho was always likely to succeed at Stamford Bridge after arriving in June 2004. There always seemed to be a mutual respect between Mourinho and Ferguson - less so between the Portuguese and Wenger. Branded a "voyeur" by Mourinho after criticising his negative tactics in 2005, Wenger said the Chelsea boss was "out of order" and "disconnected with reality". The feud continued when Mourinho returned for a second spell at Stamford Bridge in 2013, with the Portuguese calling Wenger a "specialist in failure". In 2014, the pair had to be separated on the touchline during a heated encounter between the two London rivals.

  Probably the defining managerial rivalry in Premier League history, Arsene Wenger pictured with Sir Alex Ferguson in 2008.

  The Premier League was dominated by Manchester United and Arsenal in the late 1990s and early 2000s, with the two teams winning every title between 1996 and 2004. English football fans knew little about Wenger prior to his appointment as Arsenal manager in October 1996, but the Frenchman was quick to make an impression - and ruffle one or two feathers among his rivals. After Wenger had suggested that a rule change to the fixture scheduling would benefit United, a furious Ferguson retorted: "He has no experience of English football. He has come from Japan and now he is telling us how to organise our football. "Unless you have been in the situation and had the experience, then he should keep his mouth shut - firmly shut."

  Having held a 12-point lead over Manchester United in January 1996, Kevin Keegan's Newcastle were being chased down by Ferguson's relentless Red Devils during the second half of the campaign. As the season entered its final straight, Ferguson suggested that Leeds and Nottingham Forest - two of Newcastle’s final three opponents - would not try as hard against the Magpies as they would against his own team. Keegan snapped, telling Sky Sports after his team's win over Leeds: "[Ferguson] went down in my estimation when he said that. I'd love it if we beat them – love it." United would end the season four points clear of Keegan's team.
