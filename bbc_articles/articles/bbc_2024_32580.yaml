  Both Bristol Airport and Cardiff Airport are advising passengers to contact their airline or tour operator due to anticipated disruption. Network Rail said all lines on the network in Wales - except between Cardiff and Bristol via the Severn Tunnel, and the Core Valley lines - would remain closed for the rest of Saturday. In Wales, all domestic football and rugby matches scheduled for Saturday were cancelled, as was Cardiff City's Championship fixture against Watford which had been due to kick off at 15:00. Richard Griffiths, owner of the Richmond Hotel in Aberystwyth, said the town was in "complete darkness" following a power cut earlier.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'It's like sandpaper on your face': BBC reporter on Storm Darragh

  All of London's Royal Parks are closed on Saturday, including the Winter Wonderland attraction in Hyde Park. Horse races planned this afternoon at Aintree in Merseyside and Chepstow in south Wales were abandoned due to the weather. The Premier League match between Everton v Liverpool, scheduled at Merseyside's Goodison Park, was also been postponed. In Northern Ireland, where there is an amber weather warning until 21:00 GMT, multiple Christmas events have been cancelled this weekend. Belfast City Council said its Christmas market would be closed on Saturday, while the Enchanted Winter Garden events at Antrim Castle Gardens had been cancelled for Friday and Saturday. Storm Darragh has also brought heavy rain over the weekend, with 144 flood alerts - meaning flooding is possible - in England. There 71 alerts in Wales, which was badly affected by flooding during Storm Bert and where the ground is still very saturated. Storm Darragh is the fourth named storm of the season following Bert and Conall which caused severe flooding last month.

