  CCTV footage shows the food truck that Daniel Khalife used to escape leaving prison.

  Footage from September 2023 shows the food truck that Daniel Khalife strapped himself to as part of his escape from Wandsworth prison.

  The former British army soldier was found guilty of spying for Iran on Thursday. Footage captured on CCTV across London shows how his escape unfolded.
