title: 'Covid-19: Welsh Government update 8 February 2021 - BBC News'
date: '2021-02-08'
section: Wales
url: http://www.bbc.co.uk/news/live/uk-wales-55934325
content: |-
  Details and reaction as Health Minister Vaughan Gething gives a briefing on the pandemic.

  The Welsh Government has "done everything" it could have at the time decisions were made to respond to the Covid-19 pandemic, according to the health minister.

  But Vaughan Gething said: "That's not the same as saying that looking back we wouldn't want to do different things."

  Speaking at the Welsh Government's press conference, he added: "I think that's a really important part of the honesty that we need because we have learnt, our knowledge has developed, and it's important that we then use that to make different and hopefully better choices in the future.

  "So, it isn't just about saying that we've done everything we could in the past, it's about being humble enough to recognise that we have better knowledge now and we can make even better choices in the future."

  With the number of deaths from coronavirus reported to Public Health Wales going past 5,000, Mr Gething said the "knowledge that the choices we really make can make a difference between whether people are alive or not" has been one of the things he has found "most difficult during the pandemic".

  "I've never tried to understate the importance of those choices or the impact, not just on me, but on our advisors and the whole team of ministers for the choices that we make," he added.
