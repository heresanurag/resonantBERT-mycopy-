content: |-
  Video shows the British Airways aircraft approaching the runway almost side-on, before taking off again.

  This is the moment a plane flying into Heathrow Airport had to abort its landing during strong winds.

  Video shows the British Airways passenger aircraft wobbling and approaching the runway almost side-on, before taking off again.

  The plane was travelling to London from Berlin and successfully landed on its second attempt.
