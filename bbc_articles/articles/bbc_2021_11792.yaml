title: 'Cancer: New gene tests mean Welsh patients could avoid chemo - BBC News'
date: '2021-09-23'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-58654240
content: |-
  The new technology means Kate Molton's stage four lung cancer can treated with one tablet a day.

