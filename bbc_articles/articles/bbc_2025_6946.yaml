  Going after Musk instead of Trump seems to be a strategic option for Democrats. A poll by Marquette Law School suggests Musk is viewed unfavorably by 53% of registered voters here. Driving in his car across rural Wisconsin, Ben Wickler, chairman of the Wisconsin Democratic Party, told the BBC that if Crawford could beat Schimel, "there'll be a very clear kind of game plan for how to fight back against the world's richest man trying to destroy American democracy". Allison Prasch, a professor at the University of Wisconsin-Madison who specialises in US political rhetoric, said this race was a strategy test for both sides. "We know that Wisconsin, up to the very end of the presidential cycle, was very close," she said, noting that some cities such as Milwaukee and Madison unexpectedly swung towards Trump and helped deliver him the state's electoral college votes. "What happens in Wisconsin [now] is going to tell us a lot about what's going to happen, not just in 2026 but in 2028."

  Musk's critics say he has practical reasons to care about the Wisconsin race. They point to an ongoing case involving Tesla, Musk's electric vehicle company, that could head to the state's supreme court in the future. The billionaire is suing because Wisconsin bans car manufacturers from owning dealerships, but Tesla's business model involves running its own showrooms. The BBC has contacted Musk's America PAC for comment. Wisconsin Republican strategist Matt Terrill said Musk was allowed to donate to campaigns for things he personally cared about, like any other citizen might - including the Democratic donors heavily backing Crawford. "Musk has obviously got his views from a political standpoint of what he as an American citizen wants to see happen, not just as someone who's a part of the Trump administration," said Terrill. The result won't just be a referendum on Trump's presidency so far, but will test Musk's reputation as a kingmaker in American politics.
