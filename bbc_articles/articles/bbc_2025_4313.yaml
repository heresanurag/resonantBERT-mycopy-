title: Mineral deal 'ready to sign', says Zelensky - BBC News
date: '2025-03-02'
section: General
url: http://www.bbc.co.uk/news/videos/cvg1v97rr8qo
content: |-
  Speaking to reporters after a summit of European leaders in London, Ukrainian President Zelensky reflects on the public White House showdown.

  President Zelensky has told the BBC the minerals deal between the US and Ukraine remains "ready" to sign despite the public showdown between him and the Trump administration on Friday.

  He was asked about the future of the deal, which would grant the US access to Ukraine's rare mineral reserves, by Laura Kuenssberg.

  "It is our policy to continue what happened in the past, we're constructive," he continues, "if we agreed to sign the minerals deal, we're ready to sign it."

  "The agreement that's on the table will be signed if the parties are ready," he concludes.
