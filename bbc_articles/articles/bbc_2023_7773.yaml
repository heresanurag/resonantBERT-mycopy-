title: 'Watch: West Ham players confront violent AZ Alkmaar fans - BBC News'
date: '2023-05-19'
section: General
url: http://www.bbc.co.uk/news/world-europe-65647098
content: |-
  Video footage shows chaotic scenes inside the AFAS Stadion, Alkmaar, in the Netherlands.

  West Ham players confronted a group of AZ Alkmaar fans who attacked an area in which their friends and family were watching the teams' Europa Conference League semi-final second leg.

  BBC commentator Alistair Bruce-Ball, who was inside the stadium, said he saw punches being thrown by the AZ fans.

  Video footage shows chaotic scenes inside the AFAS Stadion, Alkmaar, in the Netherlands, after West Ham won.

  You can read more about the scenes at the end of the match here.
