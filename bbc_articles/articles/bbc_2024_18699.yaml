  The NASUWT teaching union said it was frustrated with the length of time taken to produce the action plan on pupil behaviour but welcomed the principle of serious consequences. It also said it was disappointing the Scottish government had not committed any additional funding, time or resources for schools to implement the action plan. On the new guidance on mobile phones, the union's national official for Scotland Mike Corbett said: “We know that mobile phones can be used as a tool to bully and harass fellow pupils and teachers, as well as distracting pupils from their learning. "We therefore welcome the guidance from the Scottish government that school leaders can take steps to limit or ban the use of phones in their schools if they see fit. However, to be effective, addressing the use of mobile phones should form part of joined up whole-school strategies on managing pupil behaviour." The EIS, Scotland's largest teaching union, agreed that the action plan on behaviour would not address violence in schools unless there was more funding. On the mobile phones guidance, the union's general secretary Andrea Bradley said that schools, parents, teachers and pupils should be involved in developing policy. She said: "The reality is that the use of personal mobile devices has increased due to the paucity of digital devices and lack of investment in the IT infrastructure of schools. "Implementation of the national guidance should therefore be accompanied by investment of necessary resources to ensure that pupils who may not have access to Smart phones or data are not disadvantaged.”
