title: 'Japanese Grand Prix: Max Verstappen says his social media response to Liam
  Lawson demotion ''speaks for itself'' - BBC Sport'
date: '2025-04-03'
section: Formula 1
url: http://www.bbc.co.uk/sport/formula1/articles/cwy71rz7663o
content: |-
  Max Verstappen says it "was not a mistake" that he liked a comment on social media criticising Red Bull's decision to demote Liam Lawson.

  Liam Lawson (left) and Max Verstappen were team-mates at Red Bull for just two races

  Coverage: Live radio commentary of practice and qualifying on BBC 5 Sports Extra, race live on BBC Radio 5 Live. Live text updates on the BBC Sport website and app

  Max Verstappen says it "was not a mistake" that he liked a comment on social media describing Red Bull's decision to demote Liam Lawson as "a panic move" and "close to bullying". The remarks were made by Dutch former Formula 1 driver Giedo van der Garde, a friend of the Verstappen family, on Instagram, external after Red Bull moved New Zealander Lawson down to their second team Racing Bulls in a swap with Japan's Yuki Tsunoda just two races into the season. Red Bull's Verstappen said: "I liked the comment, the text, so I guess that speaks for itself, right?" The four-time champion refused to expand in public on his feelings about the decision, but added: "Everything has been shared with the team, how I think about everything. "Sometimes it's not necessary, you know, to always share and say everything in public. I think it's better [not to]."

  Fellow F1 drivers Oscar Piastri, Pierre Gasly - himself the victim of a mid-season driver swap by Red Bull - and Nico Hulkenberg also liked the post. Red Bull's decision to drop Lawson was a U-turn after they preferred him over Tsunoda last winter when they paid off Sergio Perez two years before the end of his contract. That was despite Lawson having raced in only 11 grands prix over two seasons compared with Tsunoda's four years of experience. Ferrari driver Lewis Hamilton described the dropping of Lawson as "pretty harsh". Verstappen said Red Bull had to "take a good look at ourselves and just keep on working and keep on improving the car".

  Lawson struggled to come to terms with the wayward handling of the Red Bull car. He qualified 18th for the season-opening Australian Grand Prix, and last for both the sprint and main grand prix in China, and failed to make significant progress in any of the races. Red Bull demoted him because they felt he was in a spiral from which he could not recover. Verstappen explained the characteristics that had led Lawson to struggle. "It's hard because, I mean, for me, this is the only car that I know, right?" Verstappen said. "But I think from what I see out there, it is a little bit more nervous, a little bit more, I would say, unstable in different corner phases, maybe. Well, maybe [than] some other of my team-mates have been used to before. "Some bits, of course, are clearly faster than where they came from, but to just piece it all together probably is a bit harder."

