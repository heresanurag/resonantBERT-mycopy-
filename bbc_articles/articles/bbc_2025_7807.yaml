  Lawson, meanwhile, said the news he had been relegated was "tough to hear" but he is determined to "prove that I belong here in Formula 1" now he is back with his former team. Lawson said that after receiving the call from Red Bull team principal Christian Horner saying he had been demoted he "had one or two days to think about it" but since then had been full into preparations with Racing Bulls. "For me the main thing is being in a car," he said. "I want to prove I belong here. In terms of where my future is, I don't know, and the only way I can control that is by driving fast." Lawson suffered from a number of car issues during pre-season testing and in the first race of the season that denied him track time. He said: "In F1, we have issues, it is part of it. I had maybe hoped that would be taken into consideration more. "That's why it was important to me to come to a track I knew. But it's motorsport and the decision was not mine but I will make the most of this one." And he insisted he felt it was not a mistake to give him the Red Bull drive in the first place. "It doesn't change how I view it," he said. "I felt I was ready. Although the weekends were tough, that doesn't change."
