id: bbc_2021_9467
title: Labour's Kim Leadbeater wins Batley and Spen by-election - BBC News
date: '2021-07-02'
section: General
url: http://www.bbc.co.uk/news/uk-politics-57692363
content: |-
  Labour's Kim Leadbeater said she was delighted constituents had "rejected division and... voted for hope".

  Labour's Kim Leadbeater has won the Batley and Spen by-election after a closely-fought campaign, with a narrow majority of 323.

  The result means Ms Leadbeater now represents the seat previously held by her sister Jo Cox, who was murdered in the constituency in 2016.
