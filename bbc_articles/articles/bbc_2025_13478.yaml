  Yusuf, who was previously a member of the Conservative Party, became Reform UK's chairman shortly after last year's general election. A former banker who sold his tech start-up company for more than £200m, Yusuf has described himself as a "proud British Muslim patriot". He donated £200,000 to Reform during the general election campaign and as chairman he was given the job of professionalising the party, wooing donors and increasing Reform UK's activist base. Yusuf was seen as central to Reform's operation and had been spearheading the party's so-called Doge teams to cut wasteful spending in the councils it now controls. The acronym refers to Elon Musk's Department of Government Efficiency in the US. Tech entrepreneur Nathaniel Fried, who was brought in to lead the Doge unit, said he was stepping down with Yusuf. "I have a huge amount of respect for the work that the councils are doing to save taxpayer money, and reduce wastage," he wrote on X. But he added that Yusuf "got me in and I believe it is appropriate for me to leave with him". Yusuf's unexpected resignation came after he had spent recent days trumpeting the Doge initiative, which was only formally launched this week. He has previously hailed Farage as the UK's "next prime minister" who "will return Britain to greatness".

  Prominent Reform supporter Tim Montgomerie said he was "a big fan" of Yusuf but added: "He was a young man in a hurry - he upset quite a lot of people who didn't want the party to professionalise, to modernise. "He faced a lot of prejudice, not necessarily from inside the party but on social media, I think that affected him. "I think the row over the burka question that the new MP asked yesterday may have been the last straw for him." Liberal Democrat Deputy Leader Daisy Cooper said: "By sacking himself, Zia Yusuf seems to be leading the 'UK Doge' by example. You have to admire his commitment to the cause. "It's already clear Reform UK cannot deliver for the communities they are elected to stand up for. Instead, they have copied the Conservative playbook of fighting like rats in a sack." A Labour Party spokesperson said: "If Nigel Farage can't manage a handful of politicians, how on earth could he run a country? "He has fallen out with everyone he has ever worked with. Reform are just not serious." Conservative leader Kemi Badenoch said: "Reform is not a political party. It is a fan club."

  Reform has seen its support in national polls grow since last year's general election, when the party won 14.3% of the vote share and secured five MPs. However, it has been dogged by infighting which culminated in Great Yarmouth MP Rupert Lowe being expelled from the party. It came after he was accused of harassing staff members and threatening "physical violence" against Yusuf. Lowe denied the claims and last month the Crown Prosecution Service said he would not face criminal charges in relation to the allegation of threats, after he was referred to the police by the party. Responding to Yusuf's resignation, Lowe said: "The question is - how did a man with no political experience be given such vast power within Reform?"
