title: 'Watch: Moment Israeli boy reunites with dad after hostage ordeal - BBC News'
date: '2023-11-25'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-67531102
content: |-
  Nine-year-old Ohad Munder, held by Hamas for seven weeks, ran towards his father on Friday.

  There was joy and relief as Israeli hostages freed by Hamas were reunited with their families on Friday.

  Nine-year-old Ohad Munder ran down the hallway of Schneider Children's Medical Center in Petah Tikv to his father.

  The video released by the hospital also show his mother Keren and grandmother Ruthi reunited with their family, after being held by Hamas for seven weeks.
