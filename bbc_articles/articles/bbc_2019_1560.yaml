  Live updates as US Air Force and RAF planes hold special fly-past to mark the 75th anniversary of a fatal World War Two crash killing 10 airmen in Sheffield in 1944.

  Crowds come from far and wide

  It seems plenty of people have wanted to watch the special fly-past and pay their own tribute to the men who died in the crash here all those years ago. Julia Johnson, pictured below, said she had come specially from London for the event. She said: "I saw the article on the BBC website about Tony and the hard work and felt I really wanted to be here on the day, regardless of fly-past." Julia said she cried when she heard the story. The florist said she'd also offered to make a wreath for the servicemen who died in the crash. "It’s fantastic and I’m very excited. Got the buzz walking here from the hotel. "Lots staying at the hotel round the corner for this morning."
