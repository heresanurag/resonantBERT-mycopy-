  Stars of the stage, screen and the sporting world perform at the Platinum Party at the Palace.

  Stars of stage, screen and the sporting world have performed at the Platinum Party at the Palace, to honour the Queen's 70 years on the throne.

  Queen and Duran Duran were just some of the acts playing the Platinum Jubilee concert, which was closed with a performance by Diana Ross - who has not performed live in the UK for 15 years.

  Here are some of the best moments from the show, which you can watch in full on iPlayer here.
