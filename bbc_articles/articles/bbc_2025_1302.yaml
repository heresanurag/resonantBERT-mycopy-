content: |-
  Labour ministers say the sport - which has one track in Wales - will be banned as soon as possible.

  Greyhound racing to be banned in Wales

  Greyhound racing will be banned "as soon as practically possible", the Welsh government has said in what would be a first for the UK. Deputy First Minister Huw Irranca-Davies announced plans to wind down the sport, which has been criticised for harming dogs. No timeline has been announced for the ban, but Irranca-Davies said it is not "impossible" it could come in before the next Welsh Parliament election in May 2026. It follows cross-party calls for a ban, a government consultation and a petition that attracted 35,000 signatures.

  Wales only has one dog-racing track: the Valley Stadium in Ystrad Mynach.

  The news was welcomed by a coalition of animal welfare charities including the Dogs Trust, which said England, Scotland and Northern Ireland should follow suit. "Greyhound racing is inherently dangerous for the dogs involved, and running at speed around oval tracks causes significant injury to many dogs," it said. "In some cases, the injuries are so severe that it is necessary to euthanise the dog." The RSPCA said it would protect the dogs from the "inherent risks that come with competitive racing". But the Greyhound Board of Great Britain (GBGB), which regulates the sport, said the announcement had "nothing to do with greyhound welfare and everything to do with pressure from the extreme animal rights movement". It said the Welsh government had failed to meet the industry in Wales or its regulator, and said its own consultation "highlighted the lack of evidence to support the case for a ban". "We have engaged in the consultation process in good faith as regulator for the sport, but this statement is hugely disappointing," said chief executive Mark Bird.

  Ministers have been under pressure to ban the sport, including from their own Labour members. Last Wednesday Irranca-Davies said he would make an announcement "in the spring", but six days later he said "now is the right time to move to ban greyhound racing in Wales". "I'm pleased to share with the Senedd today that I have seen the strength of feeling on this, and I have listened," he said. Irranca-Davies pointed to bans in other countries, including New Zealand where the government announced a ban in December. No date has been announced for a Welsh ban, but the deputy first minister said: "I want a ban to come into force as soon as practicably possible. "There will be work to do in ensuring the dogs, their owners, and those involved in the industry around the racetrack, can wind down from this activity while still protecting the welfare of dogs currently within the industry, the local community and the local economy." Wales would be the first UK nation to ban the sport. The government will ask an "implementation group" to flesh out proposals and learn from other countries.

  In the Welsh Parliament on Tuesday the minister responsible faced questions over when the ban would be introduced, with the next election just over a year away. Plaid Cymru's Llyr Gruffydd welcomed the statement and told the Senedd his party would do "what we need to do in terms of working with you to make sure that what is introduced is fit for purpose". But he asked if it would need fresh legislation in the Senedd, saying there were "challenges" to legislate in the 14 months remaining before the parliament dissolves. Irranca-Davies said there were different ways it could be implemented, and promised to come back after recess "to scope up a little more about the timescale of the group". Welsh Liberal Democrat leader, and rescue greyhound owner, Jane Dodds said it was an "absolutely fantastic day". Many had seen the "the trauma and the injuries to these dogs, their suffering has been needless. Their abuse has been unnecessary and their pain has been avoidable", she said. "From today we need to mark this in the sand and to make sure that this stops." The move was also welcomed by several Labour members, including North Wales MS Carolyn Thomas. "This is a good day for thousands of animals in Wales," she said.

  Andrew RT Davies, former Welsh Conservative leader, said he did not disagree with anything that had been said but added that enforcement is "really important". "There will be illicit greyhound racing going on once you shut the licensed track," he warned. The issue is one the Conservatives say their MSs have a free vote on. A Welsh Conservative spokesman said: "While there are various views on the banning of greyhound racing in Wales, it is important that any changes are taken forward in a way that engages stakeholders and is fair." Hefin David, the Labour MS for Caerphilly whose constituency covers the Ystrad Mynach track, raised concerns about what will happen with the land. David said on social media platform X: "The track is on a flood plain. I understand the owners introduced flood mitigation, as well as clearing up flooding. "A ban would mean derelict land on a flood plain adjacent to my constituency." He said the implementation group must look at any financial commitment required to remediate the land. Asked by BBC Wales if he was considering compensating anyone in the industry, Irranca-Davies said that is not an "issue we are considering at all". But he said ministers wanted to engage with the sector and its workforce, and to avoid the site becoming "derelict".

  The UK government, asked if it was considering implementing a ban in England, declined to comment. A source told the BBC the GBGB had undertaken a number of welfare reforms, and that officials were monitoring the organisation's progress. Banning greyhound racing in England was ruled out by the previous UK Conservative government.
