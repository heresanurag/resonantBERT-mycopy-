  Protests flare up in Los Angeles, as demonstrators against immigration raids face off with law enforcement

  When protests flared up in Los Angeles over immigration raids, US President Donald Trump deployed the National Guard to the Californian city.

  Security forces and protesters faced off against each other in clashes that at times turned violent on Sunday.

  Video from the unrest shows batons being used and armoured vehicles being deployed.
