title: 'Sir John Curtice: Damaged politics sees voter trust at record low - BBC News'
date: '2024-06-12'
section: Politics
url: http://www.bbc.co.uk/news/articles/cv223kzq6r9o
content: |-
  New research finds voters "almost never" trust politicians to tell the truth or put the UK first.

  Trust and confidence in the UK’s politics and election system has never been worse, according to analysis by the electoral expert, Sir John Curtice. His report for the National Centre for Social Research finds record numbers of voters saying they “almost never” trust governments to put country before party or politicians to tell the truth when in a tight corner. “The public is as doubtful as it has ever been about the trustworthiness and efficacy of the country’s system of government and the people who comprise it,” Sir John says. The report, external suggests disillusionment over Brexit among leave voters is one of the main reasons for the collapse in trust.

  Brexit had not necessarily turned out as many had hoped, Sir John told BBC Radio 4's Today programme. "Leave supporters in particular have just basically gone back to being extremely doubtful about our politicians, about our system of government," he said. "It isn't just Brexit - it's also other domestic policy challenges."

  Political scandal and the cost-of-living crisis are also to blame, according to the report. “Those struggling financially are particularly disenchanted with the state of government and politics in Britain,” the report adds. The report, entitled ‘Damaged Politics’, finds 45% of voters would “almost never” trust the government to put country before party - the highest proportion ever. Almost six in ten (58%) would “almost never” trust politicians to tell the truth when in a tight corner and eight out of ten voters (79%) say Britain’s system of governance needs to be improved “quite a lot” or “a great deal”. Asked if they favoured a voting system that was fairer to smaller parties, 53% agreed, the highest proportion ever to question first-past-the-post elections.

  Tony Martin from Hull says politicians need to stop treating voters like idiots.

  The BBC’s Your Voice Your Vote has had many comments on the lack of confidence in politics and politicians. Tony Martin from Hull asks: “When can we trust politicians of all parties to tell the truth however unpalatable? Stop treating us like idiots!” Tina from Bristol says she won’t be voting because “all parties argue and shout at one another... then when they get voted in. They don’t do what they promise.” For Abbie, 36, from Kent, the biggest issue is restoring trust in politics: “Many voters just believe all the parties are the same,” she wrote. Juozas, 22, wants politicians to address the decline of trust in institutions: “Repeatedly seeing scandals addressed years after they’ve happened makes me feel decision makers can dodge accountability... “If feels like every time a scandal is uncovered accountability has to be imposed through relentless public pressure, rather than through the rule of law,” he wrote.
