  • None 'Studio sex' and 'hitman threats': Insiders speak out about Diddy's 90s music empire Mr Combs was one of the most successful rappers and music moguls in the US, known for helping make people stars. Known as Puffy, Puff Daddy, P Diddy, Love, or Brother Love over the years, he emerged on the music scene in the 1990s and quickly became a household name. Early in his career, he helped launch the careers of Mary J Blige and Christopher Wallace - aka Biggie Smalls, or the Notorious B.I.G. His music label Bad Boy Records soon became one of the most important labels in rap and expanded to include Faith Evans, Ma$e, 112, Mariah Carey and Jennifer Lopez. His star power led to several reality shows on MTV and VH1 where he searched for the next big musical talent. Since he was indicted, dozens of lawsuits have accused Mr Combs of using that power to drug, assault, rape, intimidate and silence people. Currently, he is being held at the Metropolitan Detention Center in Brooklyn, New York. His criminal trial is scheduled to begin on 5 May.
