id: bbc_2024_20355
title: Child, 11, arrested in raids following Teesside riots - BBC News
date: '2024-08-29'
section: Tees
url: http://www.bbc.co.uk/news/articles/c80e1x3j87do
content: |-
  Cleveland Police has now arrested 110 people following widespread disorder almost a month ago.

  An 11-year-old child was among those arrested during early morning raids on Wednesday, following riots across the country. Fourteen people were detained, aged between 11 and 43, on suspicion of violent disorder, including a mother and her son. Cleveland Police has now arrested 110 people following widespread disorder across Hartlepool and Middlesbrough almost a month ago. Supt Marc Anderson, who was Silver Commander during the Middlesbrough disorder, said he had never "seen anything like" it in his 30 years of service.

  The raids follow a Cleveland Police operation involving 40 detectives scouring hours of CCTV footage, body cam images and social media posts. Violence broke out in Middlesbrough on 4 August, a few days after similar trouble in Hartlepool on 31 July.

  Those arrested are being held on suspicion of violent disorder

  Four juveniles were among those arrested

  Supt Anderson said: "What the community had to put up with that day was completely unacceptable." One woman and four juveniles were all in custody following the raid, alongside nine men, police said. All are held on suspicion of violent disorder.
