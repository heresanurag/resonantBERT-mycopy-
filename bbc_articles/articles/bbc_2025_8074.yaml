  Both Yang and Mohamed - who were first elected in 2024 - have made several interventions on the Israel-Hamas conflict in Parliament. In February, Mohamed initiated a cross-party letter, signed by 61 MPs and lords, calling for a ban on goods from Israeli settlements on Palestinian territory, citing an opinion from the International Court of Justice (ICJ). She has also criticised Israel for withholding humanitarian aid from Gaza, telling the House of Commons in October that international law "prohibits the starvation of civilians as a method of warfare", and has mentioned humanitarian organisations' claims of "ethnic cleansing" in Gaza. In January, Yang spoke in favour of bringing sanctions against Israeli ministers Itamar Ben-Gvir and Bezalel Smotrich, after they suggested building Israeli settlements in northern Gaza to encourage Palestinians to leave. She has also highlighted the dangerous conditions journalists and medical professionals face while in the Palestinian territory. When asked about Israel's decision, Conservative leader Kemi Badenoch told the BBC's Sunday with Laura Kuenssberg that countries "should be able to control their borders". "What I think is shocking is that we have MPs in Labour [who] other countries won't allow through," Badenoch said. "I think that's very significant."

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: Israel decision to deny MPs entry an "insult to Britain" - Thornberry

  Her comments were rebuffed by Emily Thornberry, the Labour chair of the foreign affairs select committee, who described Yang and Mohamed as "highly respected parliamentarians" and "potential leaders". "Israel is badly advised to try and alienate them, to humiliate them and to treat them in this way," she told the programme. "I think that it's an insult to Britain and I think it's an insult to Parliament." Sir Ed Davey accused Badenoch of "yet another complete shocker". The Liberal Democrat leader said she "has once again shown unbelievably poor judgement by failing to back two British MPs denied entry to Israel". Lammy called Badenoch's comments "disgraceful", asking her: "Do you say the same about Tory MPs banned from China?" During the war in Gaza, there have been protests, violent incidents and raids by Israeli forces in the West Bank. Hundreds of deaths have been reported there. Israeli troops have been engaged in an extended operation in the occupied Palestinian territory, where two Palestinians were killed on Friday. The current war began on 7 October 2023, when Hamas fighters launched a surprise attack on Israel, killing around 1,200 people and taking 251 hostages back to Gaza. Since then, Gaza's Hamas-run health ministry says more than 50,000 people have been killed. It said 1,309 people have died since a ceasefire ended on 18 March. Lammy said: "The UK government's focus remains securing a return to the ceasefire and negotiations to stop the bloodshed, free the hostages and end the conflict in Gaza."
