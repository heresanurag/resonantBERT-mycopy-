title: Yuan Yang and Abtisam Mohamed 'astounded' after being denied entry to Israel
  - BBC News
date: '2025-04-06'
section: Middle East
url: http://www.bbc.co.uk/news/articles/cn9133z2v30o
content: |-
  Israel says Yuan Yang and Abtisam Mohamed were refused entry as they intended to "spread hate speech".

  Two MPs 'astounded' after being denied entry to Israel

  Abtisam Mohamed (left) and Yuan Yang have now left the country

  Two Labour MPs say they are "astounded" to have been denied entry to Israel while on a trip to visit the occupied West Bank. Abtisam Mohamed and Yuan Yang said it was "vital" parliamentarians were able to witness the situation in the occupied Palestinian territory first-hand. They were refused entry because they intended to "spread hate speech" against Israel, the nation's population and immigration authority said. Foreign Secretary David Lammy criticised Israeli authorities, describing the move as "unacceptable, counterproductive, and deeply concerning".

  But Conservative leader Kemi Badenoch said Israel had a right to "control its borders", adding it was "significant" there were Labour MPs other countries did not want to let in. Yang, the MP for Earley and Woodley, and Mohamed, the MP for Sheffield Central, flew to Israel from London Luton Airport with two aides on Saturday afternoon. The Israeli immigration authority said Interior Minister Moshe Arbel denied entry to all four passengers after they were questioned. It accused them of travelling to "document the security forces". The Israeli embassy in London said in a statement on Saturday that the country "will not allow the entry of individuals or entities that act against the state and its citizens". It said Mohamed and Yang had "accused Israel of false claims" and were "actively involved in promoting sanctions against Israeli ministers". It also said they had supported campaigns aimed at boycotting the country "at a time when Israel is at war and under attack on seven fronts". The UK Foreign Office said the group was part of a parliamentary delegation. However, Israel's immigration authority said the delegation had not been acknowledged by an Israeli official. The Israeli embassy said the MPs "were offered hotel accommodation, which they declined" and the cost of their return flight to the UK was covered. Israel's Interior Ministry said the MPs left the country early on Sunday. Mohamed and Yang said their trip had been organised with UK charities that had "over a decade of experience in taking parliamentary delegations". "We are two, out of scores of MPs, who have spoken out in Parliament in recent months on the Israel-Palestine conflict and the importance of complying with international humanitarian law," the MPs said in a joint statement. "Parliamentarians should feel free to speak truthful in the House of Commons, without fear of being targeted." Lammy said the Foreign Office had been in touch with both MPs to offer support, adding: "I have made clear to my counterparts in the Israeli government that this is no way to treat British parliamentarians." The Council for Arab-British Understanding and Medical Aid for Palestinians - the latter of which is a registered UK charity - said in a joint statement that they had organised the trip. "This visit was part of that long-standing programme," they said. "When questioned, the group was clear, open and transparent about the aims and objectives of the visit, which included visiting a range of projects run by humanitarian and development organisations operating in the West Bank. "The group had informed the UK consul general in Jerusalem of their visit and was planning to meet with them as part of the itinerary."

