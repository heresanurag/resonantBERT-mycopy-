content: |-
  The singer says the attack at a workshop themed around her music left her "completely in shock".

  Taylor Swift in 'shock' over knife attack as fans raise £180k

  Swift said the "horrendous trauma" had left her at a "complete loss"

  Singer Taylor Swift has said the knife attack at a dance workshop themed around her music which left three children dead and nine more injured has left her "completely in shock". Children and adults were attacked at the event on Hart Street, Southport, on Monday. Posting on Instagram, the star said she was "at a complete loss" for how to convey her sympathies. Her fans have raised more than £180,000 for the families of the victims of a knife attack on Merseyside.

  Swift, who played in nearby Liverpool as part of her European tour in June, said the "horror" of the attack, which had left three children dead, five critically injured and three more hurt, was "washing over her". She said the "loss of life of life and innocence" and the "horrendous trauma inflicted on everyone who was there" had left her at a "complete loss for how to ever convey my sympathies to these families". A crowdfunding page called Swifties for Southport has raised more than £181,000 for Alder Hey Children's Hospital, where many of the injured have been treated. The Taylor Swift UK & EU Facebook group organisers said the money would go to the hospital's charity arm.

  Local residents have been visiting the scene to leave tributes to the victims

  In a statement, the group said it was working with the hospital to "help raise money for the families affected by the tragedy in Southport". It said it was also "raising funeral funds for the two young Swifties who have tragically passed". They added that every donation would go to the hospital's charity and would "help make a difference to those impacted in a time of great sadness". Cristina Jones, from the group, told BBC Newsbeat that Swift's statement expressing sympathy was "lovely". "It's very, very heartfelt... and I felt like she took her time to really draft it," she said. "I'm really grateful that she said something, because I can tell that she really cares. "I know that her thoughts are going to be entirely with the families, and I think that's what we need to be focusing on right now." She added that the group was "very, very happy" with how much had been raised and she would be speaking to the hospital about the funds "very, very shortly".

  The attack also left two adults critically injured. A 17-year-old boy, from Banks in Lancashire, has been arrested on suspicion of murder and attempted murder over the attack. Police said the motivation for the attack was "unclear" but it was not being treated as terror-related.

