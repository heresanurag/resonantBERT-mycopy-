  Earlier this week, Trump revealed the names of five cryptocurrencies that he said he would like included in the strategic reserve. The market prices of the five coins he named - Bitcoin, Ethereum, XRP, Solana and Cardano - swiftly jumped after that announcement. Mr Yanowitz said the US government needed to be wary of being seen to pick winners. "Ensuring transparency through independent audits and public reporting is crucial for fostering innovation instead of favouritism," he said. Additionally, Sacks said that each government department - including the intelligence agencies - will have to audit and "self-report" their own cryptocurrency holdings. No exceptions have so far been made. "We'll take in that report, and then the Secretary of the Treasury will be setting up accounts within the charging department, one for Bitcoin and one for all other digital assets," he said. Trump aggressively courted the crypto community during his presidential campaign. Former US President Joe Biden led a crackdown on crypto, citing concerns about fraud. With additional reporting from Bernd Debusmann Jr at the White House
