title: Attempted murder arrest after car strikes people near Birmingham nightclub
  - BBC News
date: '2024-10-05'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/articles/cr75l1p2x7ro
content: |-
  Police say a 22-year-old man is arrested on suspicion of attempted murder.

  Officers were called to Livery Street, Birmingham, in the early hours of Friday morning

  A man has been arrested on suspicion of attempted murder, after a car was "deliberately" driven into people outside a freshers event. Officers were called to Livery Street, in central Birmingham, during the early hours of Friday after a car hit pedestrians near the Tunnel Club. A 22-year-old man was arrested on Saturday and taken into custody for questioning, West Midlands Police said. Another man, arrested earlier on suspicion of affray, was in hospital, police said. “At this stage, we believe this to have been an isolated and deliberate attack linked to an earlier incident inside the nightclub,” said Det Ch Insp Dave Sproson from Birmingham Police.

  A number of people were injured when a car was driven at a group outside the nightclub with the car then being driven away from the scene. Police added it was believed that six people were injured during the incident in total, with five taken to hospital for treatment. Two people remained in hospital on Saturday, but their injuries were not believed to be life-threatening. Det Ch Insp Sproson said: “We’re working hard to understand exactly what happened and why. “At this stage, we believe this to have been an isolated and deliberate attack linked to an earlier incident inside the nightclub. “The investigation continues to make good progress, but we’d still appeal for anyone with information or mobile phone images to get in touch via our dedicated website.” Livery Street is close to Birmingham's city centre, near an entrance to Snow Hill station.

