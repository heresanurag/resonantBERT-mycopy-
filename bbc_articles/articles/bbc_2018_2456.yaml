  She's taking a break from acting to focus on activism, here's a reminder of the causes she supports.

  Jennifer Lawrence has announced that she is quitting acting for a year so that she can focus on campaigning for a US non-profit organisation.

  Here's a reminder of times the Oscar-winning actor has spoken out about the causes she believes in.
