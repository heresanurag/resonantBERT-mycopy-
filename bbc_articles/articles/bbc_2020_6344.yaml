title: 'Reni Eddo-Lodge: Author makes book chart history - BBC News'
date: '2020-06-10'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-52993678
content: |-
  The author becomes the first black British writer to top the overall UK book chart.

  Reni Eddo-Lodge has become the first black British author to top UK's best-seller list since the official book chart was launched in 1998.

  Last week, Eddo-Lodge's book Why I'm No Longer Talking To White People About Race topped the paperback non-fiction chart, following protests about racism.

  The 2017 work has now become the best-selling title in the UK overall, according to Nielsen BookScan.

  The author said it felt "absolutely wild to have broken this record".

