title: Taylor Swift cancellation 'felt like a break-up' - BBC News
date: '2024-08-08'
section: General
url: http://www.bbc.co.uk/news/videos/cm23ylpel38o
content: |-
  Jess, from Bristol, had a cry in the airport toilet after she found out the singer's Vienna gig was cancelled.

  A fan with a ticket to one of Taylor Swift's concerts in Vienna has said "it feels like a huge loss" after all the singer's shows in the city were cancelled.

  Jess, from Bristol, said the news "felt like a break-up", but that it was the best decision for everyone's safety.

  They were cancelled due to a possible security threat, with two people arrested on suspicion of planning attacks inspired by the Islamic State group on large events in the Austrian capital.
