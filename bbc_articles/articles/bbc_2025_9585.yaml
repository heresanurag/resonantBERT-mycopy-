content: |-
  Thousands were evacuated after a 7.4 magnitude earthquake struck off Chile's southern coast on Friday morning.

  Evacuations in Chile and Argentina after tsunami warning

  People had evacuated to higher ground in Punta Arenas, Chile, earlier on Friday

  Coastal areas of Chile and Argentina were evacuated after Chilean authorities issued a tsunami warning following a 7.4 magnitude earthquake off the country's southern coast. Thousands of people made their way to higher ground after the earthquake struck in the Drake Passage between Cape Horn, on the southern tip of South America, and Antarctica on Friday at 09:58 local time (12:58 GMT). The US Geological Survey said its epicentre was 219km (136 miles) from Ushuaia, Argentina - the world's most southerly city. The tsunami warning was issued for Chile's remote Magallanes region and the Chilean Antarctic Territory, with precautionary measures also taken in Argentina's Tierra del Fuego region.

  The earthquake struck at a shallow depth of 10km (6 miles), the US Geological Survey said. There were no immediate reports of damage or injuries. Residents in affected areas were advised to act calmly and follow the instructions of the authorities. In a post on X, Chilean President Gabriel Boric said: "We call for evacuation of the coastline throughout the Magallanes region." More than 1,700 people moved to higher ground in the sparsely-populated area, including 1,000 from the town of Puerto Williams and 500 from Puerto Natales, , according to Chile's disaster agency (Senapred). Some 32 people also followed evacuation procedures in Chile's Antarctic research bases, Senapred added. The agency has issued its highest level of alert for disasters, meaning all resources can be mobilised to respond. Footage posted on social media showed people calmly heading for higher ground in the remote town of Puerto Williams, with sirens blaring in the background. Chile's police force also posted a video showing an officer pushing a person in a wheelchair up a hill in the town, home to around 2,800 people. In Argentina, the earthquake was felt primarily in Ushuaia, with other towns affected "to a lesser extent", the office for the governor of the region said. An official from the region's civil protection agency told local media that around 2,000 people had been evacuated away from the Argentine coastline. Chile is often affected by earthquakes, with three tectonic plates converging within its territory.
