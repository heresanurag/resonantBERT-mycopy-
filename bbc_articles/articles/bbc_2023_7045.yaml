title: 'Local elections 2023: Voters head to the polls in England - BBC News'
date: '2023-05-04'
section: UK Politics
url: http://www.bbc.co.uk/news/live/uk-politics-65411351
content: |-
  Some 8,000 council seats are up for grabs, as voters decide who will run services in 230 local councils.

  Around England, thousands of voters have been turning out to decide who will represent them locally.

  As is the tradition, the vote has been taking place in a whole range of venues that have been taken over for the day.

  Here are some of our favourites.

  Democracy may be at work in the Brocket Arms pub in Ayot St Lawrence, but that doesn't mean the man delivering the kegs gets the day off Image caption: Democracy may be at work in the Brocket Arms pub in Ayot St Lawrence, but that doesn't mean the man delivering the kegs gets the day off

  Hopefully voters haven't been feeling all at sea as they cast their ballots at this polling station in Poole Image caption: Hopefully voters haven't been feeling all at sea as they cast their ballots at this polling station in Poole

  The political parties are hoping voters will join the dots when they walk into the polling booth at the Bank View Cafe in Sheffield Image caption: The political parties are hoping voters will join the dots when they walk into the polling booth at the Bank View Cafe in Sheffield

  This shipping container in Middlesbrough is one of the nation's smaller polling stations Image caption: This shipping container in Middlesbrough is one of the nation's smaller polling stations

  The Bridlington Priory Church in Yorkshire is among the many religious buildings being redeployed for the day Image caption: The Bridlington Priory Church in Yorkshire is among the many religious buildings being redeployed for the day
