title: Bank of England holds UK interest rates at 5% - BBC News
date: '2024-09-19'
section: Business
url: http://www.bbc.co.uk/news/articles/cgq8ydy8e79o
content: |-
  Economists are betting on rates being held in September with a cut to come in November instead.

  Interest rates held at 5% but 'on the path down'

  Interest rates are "now gradually on the path down", the Bank of England governor has said after borrowing costs were held at 5%. Andrew Bailey said inflation had "come down a long way" but warned the Bank would need to see more evidence that it will remain low before cutting rates further. The decision to hold rates comes as prices continue to rise slightly faster than the Bank's target, with inflation remaining at 2.2% last month. Experts are predicting the Bank will cut rates further in November. There are two more interest rates decisions this year.

  The decision to hold interest rates, which was widely expected, follows a cut from 5.25% in August - the first reduction since the onset of the pandemic in 2020. "I think interest rates are going to come down, I'm optimistic on that front," Mr Bailey said. But he said it was "vital" that inflation remains low. "So we need to be careful not to cut too fast or by too much,” he added. The base interest rate dictates the rates set by High Street banks and other lenders. The higher level has meant people are paying more to borrow money for things like mortgages and credit cards, but savers have also received better returns. Higher interest rates push mortgage rates up. This can result in landlords raising their rent to cover higher repayments.

  Sofia and James face having to move house yet again because rent keeps rising

  Sofia and her husband James are among those affected. They moved with their one-year-old son to Berkshire after their rent went up by £100 a month to £1,650 in May 2024. They moved to a smaller terraced house where they are paying £1,400. They have a joint income of £54,000 and say they cannot save for a deposit to buy a house. "When I went on maternity leave, I could only go off for about 10 weeks because we just couldn't afford any more. Even that was a major stretch to the point where we had to put ourselves into a bit of debt," Sofia said. She added food banks helped them and sometimes her husband had to work from home as he did not have the money to put fuel in the car. The Bank said the decision to hold this month was "guided by the need to squeeze persistent inflationary pressures" out of the UK economy. It expects inflation to rise to around 2.5% towards the end of this year, but it also suggested the country’s economic picture was improving.

  It said it had received reports of a "improving real incomes" and added mortgage approvals had increased to their highest level since September 2022 – the month of former Prime Minister Liz Truss’s infamous mini-Budget, which led to soaring mortgage rates. While the impact of two giant global shocks - the Covid pandemic and the Ukraine war - on consumer prices have died down, prices are still rising faster than the Bank's 2% target. Mr Bailey said the two inflation shocks had "passed through" the economy. He said: "We've beaten the problem that...we saw in these huge global shocks. They appear to have left fewer...aftershocks behind them. Probably all of us feared they would. "I think probably confidence is rising." But the UK's economic recovery has been muted. The strong growth in the first half of the year has slowed, with consumers holding back due to high prices. The Bank warned while there was "improved sentiment and expectations" of increased economic growth, it expected weaker expansion of 0.3% between July and September, down from 0.4%. The UK has had sluggish economic growth in recent years, something which the new Labour government has pledged it will change.
