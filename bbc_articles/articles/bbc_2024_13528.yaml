  “It’s an interesting format, the T20 World Cup, one I’m not a huge fan of because teams can go through or not go through potentially because of a weather situation,” added Stokes. “When England were put under pressure, especially at the back end of the group stages, they showed what a good team they were. "India are a very good team, especially in the conditions that pitch offered. It gave India a huge advantage.” Stokes, who was invited to speak to the England football team before the ongoing European Championship, compared the criticism of the cricketers to the pressure Gareth Southgate’s team are under before Sunday’s last-16 tie against Slovakia. “Unfortunately, it’s the way the English mentality is – they have got through and they are getting a load of grief,” said the 33-year-old. "I know what it’s like. I guess that comes from expectation and everyone wanting their team to do well.” Stokes was speaking at Hawthorn Primary School in Newcastle, where he delivered a coaching session and took questions from pupils The Durham man is backing calls from the England and Wales Cricket Board and four other national sporting governing bodies for the government elected at the general election to guarantee every child at least two hours of physical education in schools each week.

  Stokes will lead England in Test series against West Indies and Sri Lanka this summer

  Stokes is preparing for the first Test against West Indies on 10 July, which will be the last for England’s all-time leading wicket-taker James Anderson. At nearly 42, Anderson is retiring from international cricket after Stokes, Test coach Brendon McCullum and managing director Rob Key told him England will be looking to younger pace bowlers. Stokes was not drawn on his reasons for that decision, but said: “I’d rather talk about the memories of Jimmy, what he is to the game and what he is to English cricket. “He’s a complete and utter role model for all fast bowlers. The commitment he has shown to his craft is just phenomenal. He’s an incredible professional, an incredible athlete and one of our greatest ever to play the game.” After a long-term left-knee problem restricted the amount he has been able to bowl, Stokes had surgery in November. On England’s tour of India earlier this year, Stokes bowled in the fifth Test, his first competitive spell for eight months, and took a wicket with his first delivery. He has since played two County Championship matches for Durham, bowling 63.1 overs and taking 15 wickets as he hopes to play a full role as an all-rounder for England in the home summer and beyond. “It’s going really good,” he said of his recovery. “I’m desperate to get back into it now. I’m buzzing to get going and walking back out in an England shirt.”
