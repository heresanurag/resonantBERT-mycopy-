title: 'T20 World Cup: Ben Stokes backs Jos Buttler to remain England white-ball captain
  - BBC Sport'
date: '2024-06-28'
section: England
url: http://www.bbc.co.uk/sport/cricket/articles/clmynyrj052o
content: |-
  Ben Stokes backs Jos Buttler to remain as England white-ball captain, despite the heavy defeat by India in the T20 World Cup semi-final.

  Ben Stokes played a key role in England's T20 World Cup title win under Jos Buttler in 2022

  Ben Stokes has backed Jos Buttler to remain as England white-ball captain, despite the heavy defeat by India in the T20 World Cup semi-final. The defending champions were hammered by 68 runs in Guyana, a third defeat in four matches against other Test-playing nations at the tournament in the Caribbean and United States. The surrender of the T20 title won in 2022 comes after a miserable defence of the 50-over World Cup in India last year, when England won only three of their nine matches. “Jos is the man to lead that white-ball team forward,” Stokes told BBC Sport. “He is a great leader. He’s got the respect of all the team members in the dressing room.”

  Stokes was man of the match when England lifted the 50-over World Cup in 2019 and was instrumental in the T20 final success two years ago in Australia. The England Test captain came out of one-day international retirement to play in the 50-over World Cup defence last autumn, but skipped the latest T20 World Cup as part of his rehabilitation from knee surgery. And despite England’s men now not being the holders of at least one global white-ball title for the first time in five years, Stokes believes the team are progressing under captain Buttler and coach Matthew Mott. “They have done a great job in getting to another major semi-final,” said Stokes. “Being part of sport is about growing and progressing your side. It’s not shabby to say you got through to a World Cup semi-final.” After rain forced the abandonment of their World Cup opener against Scotland, England were on the brink of elimination following a heavy defeat by Australia. But big wins over Oman and Namibia, along with Australia’s tight defeat of Scotland, put Buttler’s side through to the Super 8s. Successes over West Indies and USA, either side of defeat by South Africa, sent England to the last four, where they were outclassed by India, bowled out for only 103 in pursuit of 172 on a low, turning pitch. It means England’s defeat of West Indies is their only victory over another team that plays Test cricket, with their other three wins coming against teams outside of international cricket’s elite.

