  Arsenal great Henry in frame to be next Wales boss

  Legendary former Arsenal and France striker Thierry Henry is one of the names being considered to succeed Rob Page as Wales manager. Henry, who has managed Monaco and Montreal Impact, is in charge of France’s Under-21 side and is preparing to lead his country’s Olympic team in the Games in Paris next month. The 46-year-old has a connection to Wales, having studied for his coaching badges with the Football Association of Wales (FAW). The FAW sacked Page last Friday after three-and-a-half years in charge following Wales’ failure to qualify for Euro 2024. The governing body plans to take its time in appointing a successor, with no fixture for Wales until they begin their Nations League campaign at home against Turkey in September. Some FAW bosses are keen to hire a big name, as they did when they appointed former Wales and Manchester United captain Ryan Giggs in 2018. Henry would be an even higher-profile appointment, given he is one of his generation’s greatest players and remains prominent as a television pundit as well as France's Under-21 coach. The FAW would not be able to offer Henry as large a salary as some other national associations but, as he would be able to maintain his lucrative media and sponsorship work if he was Wales manager, the governing body believes its financial constraints would not necessarily prevent a deal from happening.

