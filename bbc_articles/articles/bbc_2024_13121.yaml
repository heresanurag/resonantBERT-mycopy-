  It was a similar case when Giggs was in charge, with the former winger dividing his time between various business and commercial interests as well as his managerial duties. Henry had a stellar playing career, winning two Premier League titles, two FA Cups and a host of individual honours during a prolific period at Arsenal that saw him became the club’s all-time leading scorer. He also won two La Liga titles and the Champions League with Barcelona before embarking on a coaching career that has seen him serve as an assistant to teams such as Belgium as well as managing in his own right. Speaking on BBC Wales’ Elis James' Feast of Football podcast, former Wales striker Robert Earnshaw said: "I spent some time with Thierry on the coaching course a couple of years ago because he was on the Welsh FA course. "He knows [FAW chief football officer] David Adams and the set-up, and he understands Welsh football. The one thing that stood out when I was sat with Thierry was his football brain is brilliant. "With France Under-21s and the Olympic team, he understands young players. He would raise the bar and the level. I don't know whether he would want it. I could see someone like Thierry doing it. His football brain is brilliant, he's so sharp, advanced and has got great ideas."
