id: bbc_2017_10388
title: NFL anthem protests after Las Vegas attack anger fans - BBC News
date: '2017-10-04'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-41487808
content: |-
  Kansas City Chiefs players protest during the national anthem on a day of mourning for Las Vegas.

  Fans have criticised three Kansas City Chiefs players who protested during the US national anthem amid a day of national mourning for a mass shooting.

  The demonstration at Monday's game against the Washington Redskins came a day after a gunman killed 59 people and wounded hundreds in Las Vegas.

  Fans held up signs such as one urging players, "protest on your own time".

  Some NFL players have been kneeling or sitting during the anthem to protest against racial inequality.

  Cornerback Marcus Peters was the only player shown on TV seated as the anthem was played on Monday.

  But his teammate Ukeme Eligwe sat, too, and Justin Houston knelt apparently in prayer.

  Kansas City Star newspaper sports editor Jeff Rosen tweeted: "Man, can't get behind Marcus Peters and Ukeme Eligwe sitting tonight.

  Flags flew at half mast at Arrowhead Field in Kansas City on Monday night, and a moment of silence was observed before the Star-Spangled Banner was sung.

  Sports television network ESPN had already made a decision not to show the anthem due to ongoing protests, but reportedly reversed course after the Las Vegas shooting attack.

  The Redskins team all stood for the anthem

  At the stadium in Kansas City - Richard Conway, BBC Sport

  The atmosphere outside the Arrowhead stadium was rowdy and loud as fans "tailgated" before going to see their team play.

  But speaking to some, it was clear that many were not happy with players protesting during the national anthem.

  One Chiefs fan even told me he wouldn't celebrate a touchdown if a protesting player scored.

