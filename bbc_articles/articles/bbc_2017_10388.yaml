  Fans held up counter-protest signs including one that said: "Praying 4 Vegas - take a knee 4 the right reason".

  The national anthem protests began last year against police treatment of African-Americans, but took on a new lease of life after US President Donald Trump said such players should be fired.

  Their defenders say they have the right to free speech under the constitution.

  The Chiefs won 29-20 against the Redskins.

