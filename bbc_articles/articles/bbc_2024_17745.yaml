  The last major tournament game against the Netherlands provided one of the best performances in England's footballing history. Both teams only needed a point to get out of their group, but Terry Venables's side triumphed in style, scoring four goals in just over an hour. Alan Shearer scored a 23rd-minute penalty and netted again in the 57th minute, while Teddy Sheringham scored in the 51st and 62nd minutes. Such an impressive victory boosted the feel-good fever around England's home tournament. They didn't manage to go the distance in the end - losing to Germany in the semis on a penalty shootout - but this impressive group-stage win will always hold a special place in English hearts.
