  As England prepare for their Euro 2024 semi-final against the Netherlands, BBC Sport looks back at the Three Lions' 10 most memorable matches since the two sides met at Euro '96.

  England's best performances since 1996 - what's your favourite?

  England won a penalty shootout against Switzerland on Saturday to reach the Euro 2024 semi-finals

  England have set up a Euro 2024 semi-final against the Netherlands to evoke memories of one of their finest performances. At Euro '96, the Three Lions secured a fantastic 4-1 group-stage victory against the Dutch on their way to the semi-finals of the championships. It was the last time the two faced each other in a major tournament. With their last-four tie on Wednesday, BBC Sport looks back at some of England's most memorable performances since then. You can scroll to the bottom of this page to rank the games yourself and share your order.

  The moment that made the nation think England could finally win a major tournament again - after their 1966 World Cup triumph - as they came from behind to beat Denmark in extra time. Mikkel Damsgaard scored a stunning free-kick to put the Danes ahead, but Simon Kjaer's own goal levelled the match before the break. Captain Harry Kane then slotted home the rebound after his penalty had been saved to complete the turnaround in extra time.

  If one game set England’s Euro 2020 alight, this was arguably it. The Three Lions earned their first knockout win against Germany in 55 years to book a quarter-final spot. They left it late at Wembley as Raheem Sterling and Kane struck to round off a commanding performance. Yet there were other memorable moments. Thomas Muller missed a glorious chance to equalise for Germany, while Timo Werner and Kai Havertz had shots saved in each half. In the end, England ground out a win and instilled a sense of hope that Euro 2020 could finally be the chance to end their trophy drought.

  The Three Lions won their first World Cup penalty shootout to put their spot-kick hoodoo to rest. Colombia's Yerry Mina equalised in the final minute of normal time after Kane netted a penalty. Jordan Henderson missed the first spot-kick in the shootout for England, but Mateus Uribe hit the crossbar and Jordan Pickford saved Carlos Bacca's effort.

  The manner of this England victory made the group-stage game memorable. It was their biggest at a World Cup tournament, with Kane netting a hat-trick and defender John Stones claiming two goals. Gareth Southgate's side were ruthless in front of goal, exhibiting a clinical edge which proved crucial in the rest of their run to the semi-finals.

  A 19-year-old Theo Walcott shone in Zagreb, scoring his first England goals in superb fashion with a hat-trick in World Cup qualifying. Wayne Rooney also netted to end an 11-month goal drought for his country. Victory was sweetened by the fact England had missed out on Euro 2008 by losing to Croatia at Wembley 10 months prior. Fabio Capello's side got their revenge in impressive fashion.

  Memories of World Cup defeats against Argentina at Mexico ‘86 and France ‘98 were painful for England. But this group-stage win in Japan went some way to avenging those heartbreaking results. David Beckham stroked home a penalty to seal the victory, while Michael Owen hit the post and Paul Scholes also came close. They went on to progress from their group, but were knocked out by eventual winners Brazil in the quarter-finals.

  The Three Lions left it late to qualify for the 2002 World Cup, having been 2-1 down as the clock reached 90 minutes. However, David Beckham provided a wonderful moment at Old Trafford with a spectacular 93rd-minute equaliser, curling an excellent long-range free-kick into the top corner. The goal meant his side avoided a tough play-off against Ukraine and booked their place in Japan and South Korea.

  As perfect England performances go, it's hard to get much better than this. Behind after six minutes at Munich's Olympiastadion, what followed was one of the Three Lions' greatest displays. Michael Owen and Steven Gerrard scored to give them a half-time lead. Then, Owen scored two more to complete his treble, while Emile Heskey also netted as they humiliated their rivals on their own ground.

  Glenn Hoddle's men went to Rome needing a point to qualify for the 1998 World Cup and produced a commanding performance to see out a stalemate. In what turned out to be Paul Gascoigne's last competitive match for his country, England were patient and kept the ball to nullify a strong Italian side. Their opponents had won their last 15 competitive matches, but the Three Lions’ composed and battling display kept them out.

