content: |-
  A state of emergency is declared in the country after massive blast at an industrial area.

  A state of emergency has been declared in Seychelles after a massive explosion at an industrial area on the main island, Mahé.

  Video footage shows the moment the blast took place, leaving a trail of destruction along the island's east coast.

  The international airport was also damaged, despite being 4km (2.5 miles) away. Schools are shut and hospitals closed to all but emergency cases.

  A number of people have been injured and several people have also been evacuated from their homes.

  The blast happened just after 02:00 local time (22:00 GMT Wednesday) at a construction and quarrying company, where explosives were being stored in four containers.

