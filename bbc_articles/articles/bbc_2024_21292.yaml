title: Driver jailed for death of Ecuador politician's daughter - BBC News
date: '2024-08-09'
section: London
url: http://www.bbc.co.uk/news/articles/cgl2klz0gw9o
content: |-
  Vanessa Sagnay de la Bastida died when a speeding car crashed into her as she walked with her fiancé.

  Vanessa was crossing the road in west London with her fiancé when she was hit

  A speeding Mercedes driver has been jailed for 10 years for causing the death of an Ecuadorian politician's daughter in London. Psychologist Vanessa Sagnay de la Bastida was crossing the road holding hands with her fiancé Michael Williams as they walked home near Wandsworth Bridge, in west London, on 16 March 2022. Octavian Cadar, 39, drove towards them at about 55mph, more than double the 20mph speed limit, causing the terrified couple to become separated as they fled. Ms Sagnay, 27, who was known as Charlotte, was hit before she reached the pavement, causing her to somersault in the air and land on a railing and sign post.

  She suffered a catastrophic head injury and died at the scene. Cadar, of Bexley, south-east London, had accused the couple of causing the collision by "messing about in the road", only admitting later to jurors that was wrong. He also claimed he was trying to avoid them but the court was told the accident would not have happened if he had been driving at 30mph. A jury deliberated for 42 minutes to find him guilty of causing Ms Sagnay's death by dangerous driving. Cadar was jailed for 10 years and disqualified from driving for 10 years and eight months. In 2018, he had been convicted of speeding, fined, and given six penalty points at Bromley Magistrates' Court. Speaking at his sentencing, Mr Williams, who was studying for a PhD at University College London, said: "No-one should have the power to kill just to drive fast. "Cadar valued speeding in a sports car more than our lives. Afterwards he reacted with anger and blame. "What was my worst nightmare is now my reality. At least in my nightmares I am with Charlotte again." On his fiancée, he said: "My life with Charlotte was wonderful, she was the best friend I ever had. "She had the magical ability to support people in just the way they needed."

  Ms Sagnay de la Bastida was hoping to do a PhD

  He added: "She was completely non-judgmental and fiercely, unflinchingly, fought for everyone to be treated fairly. "Friendship like that made it feel easy for me to be myself, and my best self. "How could I possibly explain who Charlotte was, what she meant to me, and everything that was lost when she was killed? "She was half of me. I am less than a person without her." On the day of her death, they had been finalising details of their wedding, he said: "Charlotte never got to hear what I wrote in my wedding vows. "Instead I read them at her funeral." Her mother, Jeanne Sagnay de la Bastida, spoke of her pride at her daughter's academic success at St Andrew's University, having achieved two Masters degrees, and that she was about to embark on a PhD. Weeping, she told the court: "My daughter was, is and always will be my life, my everything and my everyone. On her grief and loss, she said she felt as if an atomic bomb had exploded, leaving her struggling to breathe "toxic air".

  She said: "It is unnatural, unexpected, violent, undeserved, senseless, amoral. "It has taken up residence in my body and consumed me." Ms Sagnay and Mr Williams, who had known each other since school in Scotland, were on their way home from a trip to the gym. Describing the collision, Mr Williams said he realised he had been separated from Ms Sagnay because they were no longer holding hands. He said: "She fell on the front of the car. She went onto a street sign. There was a loud bang. I screamed and I crossed the street. I tried to call the ambulance. "I was on the phone to the emergency services and that is when the driver of the car came out. "He was shouting. He was angry and he was saying 'why did you freeze? Why didn't you keep walking?' "I said to him 'because we were terrified'."
