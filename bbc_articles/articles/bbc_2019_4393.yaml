title: Boy charged with murder over Bristol motorbike death - BBC News
date: '2019-04-08'
section: Bristol
url: http://www.bbc.co.uk/news/uk-england-bristol-47848718
content: |-
  Motorcyclist Michael-Lee Rice died at the scene in the Hartcliffe area of Bristol.

  The crash happened in Fulford Road at 17:45 BST on Friday

  A 15-year-old boy has appeared in court charged with murder over a crash that left a motorcyclist dead.

  The rider, named in court as Michael-Lee Rice, died at the scene after crashing into a parked van in the Hartcliffe area of Bristol on Friday.

  The boy did not enter a plea at Bristol Magistrates' Court and only confirmed his name and address. He will appear at Bristol Crown Court on Tuesday.

  He is also charged with causing a danger to road users.

  The boy was arrested after police and emergency services were called to Fulford Road at 17:45 BST.

  Detectives are continuing to appeal for witnesses or anyone with information to contact them.

  Officers are especially keen to hear from anybody who may have dashcam footage.

