  How to follow the Fifa World Cup 2023 on the BBC Sport, television and radio.

  Last updated on .From the section Women's World Cup

  The BBC will show live coverage of England's Round of 16 tie against Nigeria at the Fifa Women's World Cup.

  Sarina Wiegman's European champions face Nigeria on Monday, 7 August at 08:30 BST in Brisbane.

  The tie will be live on BBC One and there will be commentary on 5 Live and BBC Sounds.

  The game will also be shown on BBC iPlayer and the BBC Sport website.
  • None All the best 2023 Women's World Cup content in one place

  The BBC is the only place you can watch both semi-finals on 15-16 August. The final, on Sunday, 20 August (11:00), will be broadcast by both the BBC and ITV.

  The tournament is the biggest yet with 32 nations taking part, and more than one million match tickets were sold in advance.

  Knock-out phase fixtures and broadcast coverage to be confirmed.
