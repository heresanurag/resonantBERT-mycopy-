content: |-
  Craig Ferguson, 20, travelled solo through six countries to raise funds for a men's mental health charity.

  The Scotland fan who walked from Hampden Park in Glasgow to Munich has arrived to cheers from the Tartan Army.

  Craig Ferguson, 20, travelled solo through six countries to raise funds for Brothers in Arms, a men's mental health charity based in Glasgow.

  He left Glasgow in May and arrived to a guard of honour and the world’s media.

  He shouted “thanks so much for coming down”, before enjoying some champagne in the Munich sun and joining in a rendition of Flower of Scotland.

  He has raised over £51,000 for the charity.
