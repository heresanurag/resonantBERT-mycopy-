content: |-
  The closing arguments in the rapper's assault trial descended into a shouting match in an LA courtroom.

  Closing arguments in the trial of rapper A$AP Rocky descended into a shouting match between prosecution and defence lawyers on Friday.

  Watch as the judge adjourns the hearing and yells at the sparring attorneys.

  The rapper denies two felony assault charges related to a 2021 shooting incident in Hollywood.

  Prosecutors allege Rocky, whose real name is Rakim Mayers, pulled a gun on accuser A$AP Relli, real name Terrell Ephron, during an argument.

  The two men were part of the A$AP Mob hip-hop collective. Mayers has waived his right to testify, while his wife, singer and businesswoman Rihanna, has attended court during the trial.
