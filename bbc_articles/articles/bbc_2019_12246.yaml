title: Car drives 'at' pedestrians on Aberystwyth seafront - BBC News
date: '2019-10-05'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-49944738
content: |-
  Three men are arrested and a man treated for minor injuries, Dyfed Powys Police say.

  This video can not be played To play this video you need to enable JavaScript in your browser. The moment was caught on camera

  A man has been injured after a car was caught on camera apparently driving at pedestrians in Aberystwyth.

  Emergency services were called to Marine Terrace on the town's seafront in Ceredigion, just before 05:00 BST on Saturday.

  One man was treated for non-life threatening injuries, police said.

  Three men have been arrested on suspicion of affray and driving offences and remain in police custody currently.

  One eye witness described the incident as "car madness".

  Dyfed-Powys Police said: "Reports stated that a dark green car was driving erratically and dangerously in the area, and that it had possibly collided with some pedestrians and the pillar of a shelter on the prom."

  County councillor Ceredig Davies posted on Facebook: "Sometimes words just aren't enough to express complete and utter contempt for an individual acting in such a dangerous and thoughtless manner."

