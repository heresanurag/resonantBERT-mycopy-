title: Comic overwhelmed as millions watch slo-mo footballer routine - BBC News
date: '2023-08-25'
section: General
url: http://www.bbc.co.uk/news/uk-england-manchester-66611893
content: |-
  Karl Porter's impression of a footballer's celebration has been shared widely on social media.

  A comic whose slow-motion impression of a footballer celebrating has been watched by millions online has said the reaction has been "overwhelming".

  Karl Porter's routine has been widely shared online, with his Instagram post receiving more than 3.3 million views.

  It has also garnered thousands of comments, including one from the Premier League asking who inspired it.

  The 30-year-old said it was based on what he saw during his time as a binman at Manchester City's Etihad stadium.

