title: 'Bayesian yacht sinking: Mike Lynch drowned in Sicily wreck but daughter''s
  death probed - BBC News'
date: '2024-10-04'
section: Suffolk
url: http://www.bbc.co.uk/news/articles/cm24eevj8zmo
content: |-
  The inquests into the British tech tycoon, his 18-year-old daughter and two other victims of the yacht sinking have opened.

  Hannah and Mike Lynch were among the seven people who died when the Bayesian sank

  British tech tycoon Mike Lynch drowned but the cause of his daughter's death when a yacht sank off the coast of Sicily is under investigation, an inquest has heard. A total of seven people died when the Bayesian, a 56m (184ft) sailing boat, was hit by bad weather in the early hours of 19 August. The inquests of Mr Lynch, 59, his daughter Hannah, 18, as well as Morgan Stanley International bank chairman Jonathan Bloomer, 70, and his wife, Judy, 71, opened at Suffolk Coroner's Court in Ipswich. Mr and Mrs Bloomer's causes of death are also under investigation. Senior Coroner Nigel Parsley told the short hearing he would adjourn the four inquests until 15 April, 2025.

  The court heard from Det Supt Mike Brown of Suffolk Police. He told the hearing on Friday morning Miss Lynch’s provisional cause of death was "under investigation” following a post-mortem examination on 7 September. Mr Lynch’s post-mortem examination was carried out on 6 September and his cause of death was given as drowning. Post-mortem investigations were also conducted for Mr and Mrs Bloomer but the cause of their deaths was still "under investigation", the inquest heard. Det Supt Brown said the time of death for all four was recorded as 05:00 the same day. Mr Parsley questioned him whether a provisional cause of death of "under investigation" was common at this stage. "It wouldn’t be unusual for such a verdict to be given, at the moment, in terms of the pathologist's view," the officer told the court.

  Judy and Jonathan Bloomer lived in Kent and were well-known in their home village

  Mr and Mrs Bloomer were from a village near Sevenoaks, Kent, and regularly attended church services here. They were said to be well-known in the area. A total of 10 passengers and 12 crew were on board the Bayesian when it sank. Det Supt Brown told the court the Bayesian was 0.8 nautical miles from the coast of the fishing village of Porticello at the time. Fifteen people managed to escape to a lifeboat including a one-year-old as well as Mr Lynch's wife Angela Bacares. Bodies of the deceased were recovered following a search by divers over several days. Miss Lynch's body was the last to be recovered. Clifford Chance lawyer Chris Morvillo and his wife Neda Morvillo died as well as the yacht's chef Recaldo Thomas.

  The Bayesian left the Sicilian port of Milazzo on 14 August before it sank on 19 August

  Det Supt Brown said Italian authorities would be the lead investigators in the case and Suffolk Police would await information from them. He added the Bayesian "sank rapidly" for "reasons yet to be ascertained". Mr Lynch was a prominent figure in the UK tech industry but more recently came into the limelight due to a long-running legal dispute that resulted in him being extradited to the US to face fraud charges. He was eventually cleared along with his business partner Stephen Chamberlain. Mr Chamberlain died just several days before Mr Lynch after he was hit by a car while running in Stretham, Cambridgeshire. An inquest into Mr Chamberlain's death opened and adjourned in Alconbury, Cambridgeshire on 5 September. The court heard he died of "traumatic head injuries" following the collision.

