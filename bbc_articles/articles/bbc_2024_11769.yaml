  Imelda Staunton may be in a position to provide some pointers on royal etiquette of her own when she attends her investiture ceremony, having portrayed the late Queen Elizabeth II in two series of Netflix drama The Crown. Her other famous roles in an acting career spanning six decades include Dolores Umbridge in the Harry Potter films and the title role in the movie Vera Drake, for which she won a Bafta and was Oscar-nominated. Dame Imelda said of her new honour: "Theatre, film and television are essential to our well-being, stand at the heart of our culture, and are admired throughout the world. I am proud to play my part in this important industry." Dame Anya Hindmarch is known across the world for her handbag designs, high-end adornments that are seen on the arms of the world's most glamorous women. But she also developed her "I'm not a plastic bag" range of canvas tote bags to highlight the need to cut the use of plastic.

  Anya Hindmarch initially started her business from her kitchen table and is now a dame

  Tracey Emin, now Dame Tracey, has become one of the best-known female artists in the world through a wide range of artworks that often document her personal experiences. They include My Bed - a dishevelled bed inspired by four days she stayed in bed drinking vodka - which was exhibited at London's Tate Gallery and later sold at Christie's auctioneers for £2.5m. As well as Sir Alan, there are knighthoods for historian Niall Ferguson, the Royal Ballet's resident choreographer Wayne McGregor, climate scientist Prof James Skea and composer John Rutter, who is behind some of the most celebrated modern Christmas carols. And from the world of politics, former Prime Minister Gordon Brown is made a Companion of Honour, an honour afforded to just 65 people at any one time.

  Mark Cavendish has joined Chris Hoy and Bradley Wiggins as a knight on two wheels

  Leading the way in the sporting honours is Mark Cavendish, the cyclist from the Isle of Man who became known as the Manx Missile and is now Sir Mark. Later this month he will try to make cycling history at the Tour De France, where a 35th stage win of his career would see him set a new record for the event. For years, Graeme Souness was renowned as one of the hardmen of football, but his CBE in the Birthday Honours is partly in recognition of a more recent accomplishment. He was introduced to teenager Isla Grist, a girl from Inverness who has epidermolysis bullosa (EB) - a genetic disorder which means most of the skin covering her body is full of blisters. Souness revealed in interviews he had regularly been left in tears by her battling attitude to life and set about raising awareness and funds for the condition, including swimming the English Channel at the age of 70.

  Isla Grist's painful condition moved former footballer Graeme Souness to raise millions to treat people with her skin disorder, commonly known as butterfly skin

  Another former Scottish international, Ally McCoist, is now an OBE - partly for a playing career, mainly spent at Rangers, and partly for his broadcasting career, which included an 11-year stint as a team captain on BBC One's A Question Of Sport. Karen Carney, the footballer who earned 144 caps for England's women, also becomes an OBE, alongside Sandy Lyle, the first British golfer to win the Masters. Yorkshire and England cricketer Katherine Sciver-Brunt and rugby union referee Wayne Barnes, who officiated the most recent World Cup final, are among other new OBEs.

  Cheryl Foster, who went from Welsh international footballer to referee is a new MBE, a rank she now shares with David McNulty, British swimming's national lead coach, who has guided the success of several recent Olympic medallists. But one of the other new MBEs is a woman whose biggest feat came just this year. Ultramarathon runner Jasmin Paris became the first woman to complete the gruelling Barkley Marathons in Tennessee, memorably slumping to the ground exhausted as she finished the race just inside the allotted 60 hours.

