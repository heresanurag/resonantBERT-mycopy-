  In the music world, Simon Le Bon, who has been the frontman of Duran Duran since 1980, is appointed an MBE, while the voice behind two of the biggest number ones of the 1970s - Boney M singer Liz Mitchell - is awarded the same honour. Rebecca Ferguson - who went from a runner-up on X-Factor to a singing career with four top 10 albums - is also named an MBE, as is M-People singer Heather Small, for her voluntary and charitable work. Two broadcasting pioneers are among those honoured in the TV and radio world. Gordon McNamee, the founder of Kiss FM who took it from pirate radio station to a major player on the airwaves, is now an MBE. So too is veteran TV broadcaster Nick Owen, whose amiable presenting style on ITV's Good Morning Britain helped establish the format of breakfast TV in the 1980s. Since 1997, he has been one of the lead presenters of BBC Midlands Today.

  News of their MBEs will be music to the ears of Rebecca Ferguson and Liz Mitchell

  There is a heart-warming double honour linked to Strictly Come Dancing. Professional dancer Amy Dowden, who has been treated for cancer and will return to the series this year, is an MBE. That honour is matched by Rose Ayling-Ellis, the EastEnders actress who became the show's first deaf contestant and went on to win the famous glitterball trophy in 2021. Former Coronation Street actress Shobna Gulati, who played Sunita Alahan across two spells between 2001 and 2014, among other roles, is also appointed an MBE. Satirist Armando Iannucci, whose TV and radio career stretches back 30 years, is made a CBE. Most of his greatest successes have come behind the scenes as a writer and producer, but one of his most lasting contributions to British culture is as co-creator of the character Alan Partridge with comedian Steve Coogan.

  From dinner lady to shopkeeper to MBE - former Coronation Street actress Shobna Gulati is now an MBE
  • None Companion of Honour - Limited to 65 people. Recipients wear the initials CH after their name
  • None CBE - Commander of the Order of the British Empire
  • None OBE - Officer of the Order of the British Empire
  • None MBE - Member of the Order of the British Empire

  Business leaders to be honoured include energy bosses Greg Jackson of Octopus Energy and Alistair Phillips-Davies of SSE, who are appointed CBEs, as well as Julia Hoggett, chief executive of the London Stock Exchange, who becomes a Dame. Two BBC figures are made CBEs - Barbara Slater. the former Olympic gymnast who retired this year after 15 years as the corporation's first director of sport, and Alan Yentob, who played a major role in shaping BBC television as an executive, before becoming a presenter of his own programmes. Longtime BBC News technology correspondent and author Rory Cellan-Jones becomes an OBE. And two women who have a way with words can add some letters to their names. Author Monica Ali, whose acclaimed novel Brick Lane documented the world of arranged marriage in the Bangladeshi community, is made a CBE. And Susie Dent, the author and lexicographer who has been a "dictionary corner" staple of Channel 4's Countdown for 32 years, outlasting any of the presenters, is awarded an MBE.

  Women of words: Author Monica Ali and Countdown's Susie Dent are both honoured

  Of course, the honours are not only there to celebrate the rich and famous. As always, ordinary members of society have been recognised for their extraordinary commitments. Almost two thirds of this year's recipients are people who have undertaken outstanding work in their communities. Of the 1,077 recipients on the main list, announced by the Cabinet Office, 48% are women and 10% are from an ethnic minority background. The youngest recipient on the list is Shamza Butt from Bradford, who is 20 years old and receives a BEM for her work as a member of the National Citizens' Service Trust Youth Voice Forum. At the other end of the spectrum is 100-year-old Harold Jones from Sutton Coldfield, who also receives a BEM for his fundraising for charities relating to Motor Neurone Disease and the local community. And Michael Palmer, Andrew Airey and Timothy Owen, who founded the 3 Dads Walking campaign after losing their young daughters to suicide, each receive an MBE. The three fathers have walked all across the UK to raise awareness of suicide in young people as well as funds for charity.
