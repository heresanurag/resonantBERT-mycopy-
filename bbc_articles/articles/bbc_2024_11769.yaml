title: 'King''s birthday honours 2024: Alan Bates, Tracey Emin and Mark Cavendish
  recognised - BBC News'
date: '2024-06-14'
section: Business
url: http://www.bbc.co.uk/news/articles/c511l0j4l2po
content: |-
  Gordon Brown, 3 Dads Walking and Susie Dent also given awards in the King's Birthday honours.

  Dame Imelda Staunton, Sir Alan Bates and Dame Tracey Emin can start using their new titles immediately

  Alan Bates - the former sub-postmaster who successfully campaigned to highlight the Post Office Horizon scandal - has been knighted in the King's Birthday Honours. He joins three new dames - actress Imelda Staunton, designer Anya Hindmarch and artist Tracey Emin - at the top of a list that highlights British achievers in a range of fields, as well as hundreds of people from ordinary walks of life. Sporting honours in this year's list include a knighthood for cycling star Mark Cavendish, as well as honours for former international footballers Graeme Souness, Ally McCoist and Karen Carney. In the entertainment world, there is a Strictly Come Dancing double as professional dancer Amy Dowden and former EastEnders star Rose Ayling-Ellis, winner of the 2021 series, are both named MBEs. There are also honours for author Monica Ali and singer Rebecca Ferguson. And after more than 30 years in Countdown's dictionary corner, lexicographer Susie Dent gets an MBE.

  The new Sir Alan Bates famously took action after more than 900 Post Office colleagues were prosecuted for stealing because of incorrect accounting information from a computer system he had repeatedly complained about. He founded a campaign to overturn the convictions and his fight for justice became the subject of ITV drama Mr Bates vs The Post Office. Sir Alan told BBC News he was at the inquiry into the affair when he found out about the honour.

