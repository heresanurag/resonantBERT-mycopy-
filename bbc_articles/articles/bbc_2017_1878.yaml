title: Bell ringing is a 'contact sport' - BBC News
date: '2017-02-13'
section: General
url: http://www.bbc.co.uk/news/uk-38954853
content: |-
  Worcester Cathedral's ringing master Mark Regan describes how bell ringing accidents can happen

  A 51-year-old man was winched down 80ft to the floor of Worcester Cathedral after being pulled upside down when his foot was caught by a bell rope.

  He fractured a bone in his back but is still able to walk.

  Mark Regan is the ringing master at the cathedral and tells BBC Radio 4's Today bell ringing can be like a "contact sport" and is all based on maths.
