id: bbc_2019_3194
title: 'Brexit: Theresa May vows to stand down if deal is passed - BBC News'
date: '2019-03-27'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-47725529
content: |-
  The PM agrees to quit if Tory MPs back her deal - but the DUP says it will still vote against it.

  Theresa May has promised Tory MPs she will quit if they back her Brexit deal.

  She told backbench Tories: "I am prepared to leave this job earlier than I intended in order to do what is right for our country and our party."

  The PM said she knew that Tory MPs did not want her to lead the next phase of Brexit negotiations "and I won't stand in the way of that".

  But the DUP said it had not changed its position and would still vote against the deal.

  The BBC's Laura Kuenssberg said the DUP's refusal to back the deal at this stage was a "huge blow" for Number 10.

  Many Conservative Brexiteers - including the chairman of the European Research Group Jacob Rees-Mogg - had been waiting to see if the DUP's 10 MPs would back the deal before deciding whether to get behind it - and their decision makes it even more difficult for the deal to pass.

  In a statement released after the PM announced her offer to stand down, DUP leader Arlene Foster said the "necessary changes" she wanted to see to the backstop clause in the withdrawal agreement had still not been secured.

  She told the BBC the backstop threatened the integrity of the United Kingdom and her party would never "sign up to something that would damage the Union".

