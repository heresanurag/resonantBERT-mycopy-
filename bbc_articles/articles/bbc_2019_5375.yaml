title: Teenage boy charged after Castlemilk death - BBC News
date: '2019-05-25'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-48395279
content: |-
  The 14-year-old is arrested and charged as police investigate the death of 35-year-old Daniel McGuigan in Glasgow's Castlemilk.

  Daniel McGuigan was pronounced dead at the scene

  A 14-year-old boy has been arrested and charged by police in connection with the death of a man in the Castlemilk area of Glasgow.

  Officers had responded to reports of the man being attacked in front of his work colleagues in Stravanan Street at about 10:50 on Friday.

  He was pronounced dead at the scene.

  He has now been identified as Daniel McGuigan, who was 35. Police have said inquiries into the death are continuing.

  The 14-year-old is expected to appear at Glasgow Sheriff Court on Tuesday.
