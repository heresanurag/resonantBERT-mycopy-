  Frank Munford's collection ranges from 1970s packets of Tudor Crisps to a Walkers tracksuit top.

  'I don't like crisps, but I collect the packets'

  Frank Munford says he "can't help" but collect crisp-related items

  A man who collects vintage crisp packets and memorabilia has said he does not actually like the snacks. Seventy-year-old Frank Munford, from Lincoln, began his collection five years ago. Alongside packets from long-gone brands such as Tudor Crisps, he has limited edition mugs, a crisp advent calendar and a Walkers jacket. “I’ve never met any other crisp packet collector,” Mr Munford said. "I’d like to so we can exchange information and maybe packets."

  Mr Munford says friends have encouraged his hobby

  Mr Munford has more than 100 crisp packets, with the oldest dating from the early Seventies. He describes the collection as a "part of social history". The feeling of "the chase" and completing a set has kept his hobby alive. However, despite pouring so much time into his collection, Mr Munford said he was not keen on eating crisps. If he had to pick a favourite flavour, it would be cheese and onion.

  Mr Munford also collects vintage crisp prizes, which could be claimed from companies, including these butterfly brooches

  Among the more unusual items in his collection is a full set of Tudor "Flutter-Byes" – butterfly brooch pins which customers could claim from the company. "You would’ve had to have eaten 240 packets of crisps to claim that,” he said. Mr Munford belongs to a collector’s club in Lincoln and said his friends were “encouraging” about his crisp compendium. His wife Pam is also supportive. "I'm proud of him, proud of what he’s achieved and done over the years," Mrs Munford said. "The family has grown up with his collecting," she added. “It’s just dad."

  Among Mr Munford’s favourite items is his set of Tudor Crisps mugs, which cost £80

  Mr Munford said his collecting would “never end” because “I can't help myself”. He urged fellow collectors to be proud of their hobby, never embarrassed. “Don’t be a closet collector, come out," he added. Listen to highlights from Lincolnshire on BBC Sounds, watch the latest episode of Look North or tell us about a story you think we should be covering here, external.
