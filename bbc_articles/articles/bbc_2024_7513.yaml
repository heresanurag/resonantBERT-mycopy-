title: 'Grand National result: I Am Maximus wins at Aintree ahead of Delta Work -
  BBC Sport'
date: '2024-04-13'
section: Horse Racing
url: http://www.bbc.co.uk/sport/horse-racing/68806070
content: |-
  I Am Maximus storms clear to win the Grand National at Aintree for jockey Paul Townend and trainer Willie Mullins.

  I Am Maximus' victory is jockey Paul Townend's first in the Grand National

  I Am Maximus stormed clear to win the Grand National for jockey Paul Townend and trainer Willie Mullins. The 7-1 joint favourite triumphed by seven and a half lengths at Aintree from runner-up Delta Work, with Minella Indo third and Galvin fourth. "What an unbelievable race and unbelievable horse," said Townend. There was early drama in the famous race as last year's winner Corach Rambler unseated jockey Derek Fox at the first fence.

  Mac Tottie, who was pulled up, was treated by vets but was cleared to return to trainer Peter Bowen's yard. There were no concerns about any other runners. Of the 32 starters, 21 horses completed the race - the highest number across the finish line since 1992. Rachael Blackmore looked like she might secure a second National win as Minella Indo challenged, while Kitty's Light finished fifth for Welsh trainer Christian Williams, whose young daughter Betsy is being treated for leukaemia. Sixth went to amateur jockey David Maxwell, riding Ain't That A Shame, a horse he bought earlier this year and a purchase which enabled him to ride in the race for the first time. But it was the team of Mullins, Townend and owner JP McManus who triumphed as I Am Maximus led home an Irish 1-2-3-4. At the 13th attempt, Townend claimed his first National win while it was a second for Mullins after Hedgehunter in 2005 and McManus' third triumph following Don't Push It (2010) and Minella Times (2021). It follows last month's Cheltenham wins for Townend and Mullins in the Champion Hurdle with State Man and Galopin Des Champs' successful Gold Cup defence. The other 7-1 joint-favourite, Limerick Lace, also owned by McManus, was hoping to become the first mare to win the race since Nickel Coin in 1951, but made a couple of early mistakes and drifted to the back of the field, eventually finishing 10th. Victory means Mullins is now favourite to win the British trainers' championship, which concludes at the end of this month. "Aintree is the first race you see, it's the first race everyone in racing wants to see. Fantastic stuff, you just couldn't make it up," said Mullins. Last year's race had been delayed by 14 minutes after animal rights activists entered the track, but there was no disruption this time. The number of runners had been reduced from a maximum of 40 following a safety review. Other safety measures included a standing start for the race, which went off at the first time of asking, a reduction in height to one of the fences and added foam and rubber toe boards on every fence.

  I Am Maximus won last year's Irish Grand National and trainer Willie Mullins considers him a contender for next year's Cheltenham Gold Cup

  In one of the most competitive renewals for some time, there were plenty still in with chances as they approached the final couple of fences. Loose horse Mahler Mission, who had earlier unseated rider Ben Harvey, threatened to cause problems for those at the head of the field, but luckily all were able to run their race. It all changed at the elbow as I Am Maximus went past Minella Indo and once Townend and his mount took the lead they powered home. "The feeling passing the line is up there with the best I've had, but it's a different feeling," he said. "Grade Ones are extra special and tactical and in the Irish National and English National you need a bit of luck, the feeling winning this is unique."

  Elsewhere on Saturday's card, Gordon Elliott, who trained runner-up Delta Work and fourth-placed Galvin in the Grand National, and jockey Jack Kennedy had a double. First, his talented mare Brighterdaysahead bounced back from defeat at the Cheltenham Festival with a comfortable win in the Turners Mersey Novices' Hurdle. She had headed to Prestbury Park as one of the bankers of the week in the Mares' Novices' Hurdle but finished second to Golden Ace. However, back up in trip and despite facing some tough opposition, the 6-5 favourite finished seven and a half lengths clear of Staffordshire Knot. Later, Kennedy and Elliott combined again as the 11-8 favourite Found A Fifty rallied late on to edge past Master Chewy and take the Maghull Novices Chase. There was also an impressive win for Strong Leader in the Liverpool Hurdle, justifying trainer Olly Murphy's decision to skip the Stayers' Hurdle at Cheltenham. The 8-1 chance and jockey Sean Bowen came to the front jumping the last and went on to win by four and a quarter lengths.

