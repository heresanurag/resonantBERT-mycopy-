content: |-
  Baby Chloe is the second child for the Olympic cycling champion and his wife Sarra.

  Baby Chloe weighed 4lb 14oz when she was born

  Sir Chris Hoy has announced that his wife Sarra has given birth to a baby daughter.

  Chloe Rose Carol was born at 36 weeks and weighed 4lb 14oz.

  The six-time Olympic cycling gold medallist and his wife already have a two-year-old son, Callum.

  Sir Chris revealed the news of the latest arrival on Twitter, saying: "Delighted to announce the safe arrival of Chloe Rose Carol Hoy this week! Sarra and Chloe doing really well.x"

  Chloe is Sir Chris and wife Sarra's second child

  Lady Hoy added: "We owe a huge debt of thanks to our local hospital & amazing staff, who gave me the most incredible care, while our family of 3 became 4."

  The couple's first child was born 11 weeks prematurely by emergency caesarean section after Sarra was diagnosed with pre-eclampsia.

  He weighed just 2lbs 2oz and spent 60 days in neonatal care but has now grown into a healthy toddler.

  Following his birth, Lady Hoy became the official ambassador of Bliss Scotland, a charity for babies born prematurely or sick.
