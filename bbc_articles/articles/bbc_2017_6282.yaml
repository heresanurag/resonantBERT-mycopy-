title: 'Newspaper review: Grenfell Tower - ''Inside hell'' - BBC News'
date: '2017-06-19'
section: The Papers
url: http://www.bbc.co.uk/news/blogs-the-papers-40322616
content: |-
  Many of the papers continue to lead on the Grenfell Tower disaster, while others focus on the beginning of Brexit negotiations.

  The Financial Times is one of several papers to lead on the Brexit negotiations that begin on Monday, reporting that Philip Hammond is to campaign to put business concerns at the heart of talks. It reports that the chancellor will say the country must leave the EU "via a slope, not a cliff-edge", but the paper notes he will also confirm the UK is leaving both the single market and customs union - contrary to the hopes of some business leaders and MPs.
