  A selection of striking news photographs taken around the world this week.

  A mural of Italian writer Michela Murgia is painted on a building in Rome by street artist Laika. It includes the phrase "Remember me as you please", which is the title of her posthumous book. The writer and activist died last August, a few months after publicly revealing she had stage four kidney cancer. The mural was commissioned by gay rights activist group Arcigay.
