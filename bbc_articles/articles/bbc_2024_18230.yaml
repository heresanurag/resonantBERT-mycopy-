title: 'Newspaper headlines: ''Sister saw attack'' and ''rioters face 10 years'' -
  BBC News'
date: '2024-08-11'
section: The Papers
url: http://www.bbc.co.uk/news/articles/c1w7q0zrdjro
content: |-
  The stories leading the papers on Sunday include a tribute from the parents of a Southport stabbing victim and possible jail sentences for rioters.

  The Sunday Times reports that the director of public prosecutions believes hundreds more people involved in the riots will be hauled before the courts in the coming days, external. Stephen Parkinson says some of them could face up to ten years in prison. He said that so far most of those prosecuted had been charged with violent disorder, which carries a maximum sentence of five years in prison. But he tells the paper the next phase will involve prosecutors considering the more serious offence of rioting, which could mean up to ten years. The Observer highlights its interview with the justice secretary, external, Shabana Mahmood, who lays the blame for the 'crisis-hit' criminal justice system squarely at the door of the Conservatives. She argues that record court backlogs and prison overcrowding inherited from the previous government makes it extremely difficult to process the huge numbers of people involved in the violence. She praises the police, lawyers and judges for showing they can 'rise to the challenge' in the wake of the unrest, but says their job has been made harder with the system 'inherited' from the Tories. According to the Sunday Telegraph, a revamp of the school curriculum, external after last week's unrest will teach children as young as five to spot fake news online. Education Secretary Bridget Phillipson said it was more important than ever that young children were given critical thinking skills, to arm them against what she calls putrid conspiracy theories. Much of the violence was triggered by false claims online that the Southport attacks were carried out by an asylum seeker. The paper says those claims were then inflamed by more sophisticated forms of disinformation such as websites set up to imitate newspapers. The review will look at teaching children to spot extremist content by including more critical thinking skills in subjects such as Maths, English and Information and Communications Technology.

  The Sunday Express, external, Mirror, external, Mail, external and Telegraph, external all carry a picture of the family of six-year-old Bebe King who died in the Southport attacks last month. Her parents - Lauren and Ben King - released a statement revealing that Bebe's elder sister Genie witnessed the stabbings before escaping, and praised her incredible strength and courage. They said her resilience was a testament to the love and bond she shared with her little sister. The Sunday Telegraph reports that NHS , externalX-ray staff are now being told to ask men if they are pregnant before scans, external, as part of inclusivity guidance. The new guidelines were written after a trans man, who was unknowingly pregnant, had a CT scan. X-rays and scans can be harmful to unborn babies. But NHS staff have told the paper the new rules are causing confusion and anger among patients. Finally, senior Whitehall staff are said to have told the Mail on Sunday that Sir Keir Starmer's chief of staff, Sue Gray, is blocking access to the prime minister, external, to the extent he's being denied vital security briefings. The paper claims Ms Gray wields such power that even the head of the home civil service, Simon Case, has been forced to ask her permission to speak to Sir Keir. But a Downing Street source tells the paper the Prime Minister is having weekly National Security Council meetings, and regular security briefings.

