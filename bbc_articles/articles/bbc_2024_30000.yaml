  Grammy nominations 2025: Who's up for the biggest prizes?

  Beyoncé's eighth album Cowboy Carter could extend her lead as the most-awarded artist in the history of the Grammys

  Beyoncé, Taylor Swift, Billie Eilish, Charli XCX, Kendrick Lamar and Chappell Roan will all be up for major honours at the 2025 Grammy Awards. The trophies will be handed out in a star-studded ceremony on 2 February, with 94 categories in total. Here are the contenders for the biggest prizes.
