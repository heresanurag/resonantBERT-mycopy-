id: bbc_2024_13950
title: A really, really big election with nearly a billion voters
date: '2024-06-04'
section: General
url: http://www.bbc.co.uk/news/extra/2gd2po82go/big-india-election
content: "The general election is the largest democratic exercise ever\n\nWhat will\
  \ decide how Indians vote? Will a grand new Hindu temple prove Mr Modi’s trump card?\
  \ Will the economy, job prospects or welfare schemes be uppermost in voters' minds?\
  \ Or will they vote on the basis of caste or religion?\n\nThe temple to Hindu God\
  \ Ram in the northern city of Ayodhya is expected to provide a divine push to Mr\
  \ Modi’s election pitch by appealing to the majority Hindu community.\n\nMr Modi\
  \ inaugurated the temple in January in a grand ceremony televised live Mr Modi inaugurated\
  \ the temple in January in a grand ceremony televised live\n\nThe temple - which\
  \ replaced a 16th Century mosque torn down by Hindu mobs in 1992, sparking riots\
  \ in which nearly 2,000 people died, was inaugurated with much fanfare by the PM\
  \ in January.\n\nThe event was broadcast live on TV; schools, colleges and most\
  \ offices were given a day off and people were encouraged to watch the ceremony.\n\
  \nCould PM Modi’s vow to make India “a developed nation by 2047”, its independence\
  \ centenary, chime with voters? \n\nIndia – with its GDP at $3.7tn (£3tn) - is the\
  \ world’s fastest growing major economy. Last year, it beat the UK to become the\
  \ fifth largest in the world and is on course to reach $7tn by 2027, which would\
  \ see it leapfrog Japan and Germany into third spot after the US and China.\n\n\
  But the spoils of India's boom are concentrated in few hands and inequality remains\
  \ high. India ranks 140th in terms of global per-capita income and more than 34\
  \ million of its citizens live on less than $2.15 a day, even though government\
  \ data shows \"extreme poverty\" has reduced a lot.\n\nMany voters will be thinking\
  \ of jobs. Seven to eight million young Indians enter the labour market annually,\
  \ but millions are unable to find work.\n\nRecent government data shows falling\
  \ unemployment and a steady increase in labour force participation - to 57.9% in\
  \ 2022-23 from 49.8% five years earlier. But experts point out most new jobs are\
  \ low-paying and poor quality - for example in agriculture or women doing unpaid\
  \ family work.\n\nA telling indication of distress is that millions more are now\
  \ signing up for the $3-a-day government rural job scheme. Thousands are even ready\
  \ to migrate to war zones for work.\n\nThey were meant to clean up murky political\
  \ financing, but electoral bonds were recently banned by India’s top court, which\
  \ ruled them \"unconstitutional\". The court also ordered the government-run State\
  \ Bank of India (SBI) to provide details of who bought them and how much parties\
  \ received.\n\nThe fact that the BJP was the biggest beneficiary – securing almost\
  \ half of bonds worth 120bn rupees ($1.4bn; £1.1bn) donated between 2018 and 2024\
  \ – isn’t looking good on Mr Modi’s report card.\n\nYouth Congress members burn\
  \ posters of PM Modi during a protest against electoral bonds Youth Congress members\
  \ burn posters of PM Modi during a protest against electoral bonds\n\nReports have\
  \ linked many donations to companies being investigated by government anti-crime\
  \ agencies. Calling it the \"biggest scam in Indian history\", opposition parties\
  \ allege the agencies were used for “extortion”, which ministers have denied.\n\n\
  The scale of India's welfare state is staggering: the Modi government claims it\
  \ has spent hundreds of billions of dollars to help poor households, reaching more\
  \ than 900 million people. A number of state leaders have also invested heavily\
  \ in welfare schemes.\n\nBut does that free sack of rice or money to build toilets\
  \ prompt people to vote for a party? Analysts say such schemes can help, but that\
  \ they are unlikely to be the only driving factor.\n\nIndia has long had religious\
  \ divisions but critics say fault lines have deepened in the decade since the BJP\
  \ won power. They say India is becoming a Hindu state where its secular status is\
  \ increasingly being challenged and its 200 million Muslims - the country's biggest\
  \ minority, accounting for some 14% of the population - are marginalised. The government\
  \ rejects this, saying it is inclusive.\n\nIn the last Lok Sabha, the BJP did not\
  \ have a single Muslim MP. Rights groups and activists also point to increasing\
  \ violence against Muslims, especially in states governed by the BJP. The government\
  \ denies accusations it has a divisive agenda and its supporters appear largely\
  \ unconcerned by such criticisms.\n\nThe election comes amid accusations from the\
  \ opposition, activists and global rights organisations that Indian democracy is\
  \ under threat. Rahul Gandhi has accused the government of targeting opposition\
  \ leaders, spying upon them and imposing constraints on parliament, the judiciary\
  \ and the free press. \n\nOrganisations like Human Rights Watch say the Indian authorities\
  \ have used politically motivated criminal charges, including terrorism, to jail\
  \ many critics and foreign funding rules to harass the opposition, rights groups\
  \ and the press - charges the government denies."
