title: ‘Who do you trust?’ Election struggles to offer hope for food bank Britain
  - BBC News
date: '2024-07-03'
section: BBC InDepth
url: http://www.bbc.co.uk/news/articles/c6p24ene5peo
content: |-
  In food banks across one town, people say they are desperate - and the election is failing to offer hope.

  Pam is used to poverty and desperation, but she’s never known it this bad. She runs the Rock Foundation Food Bank in Grimsby. “We are feeding 800 people a week, it was 300 five years ago,” she says.

  The food bank is in a derelict public toilet, and the food is passed out through a small hatch. “At another food bank someone pulled a knife out,” Pam explains. “We’ve done it in a way that we can shut it down quickly if anything was to happen.”

  We counted at least six food banks in this square mile of East Marsh, which is home to 10,000 people. It‘s not only one of the most deprived wards in Grimsby, but also in the top 1% of most deprived places in all of England, on almost every single metric - income, employment, health, crime and education.

  The average household income here is just £22,200. The average years a man could expect to live in good health has just dipped below 60 years.

  One woman at the food bank, struggling to walk, shows me her fruit. How important is this to you, I ask her. “If I didn’t have it, I wouldn’t eat.”
