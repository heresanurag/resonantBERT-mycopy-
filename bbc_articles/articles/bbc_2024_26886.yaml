  The parents of Jay Cartmell say he was "loved by all who met him".

  Parents' tribute to boy, eight, shot at farm

  Jay Cartmell was described as "loved by all who met him"

  The parents of an eight-year-old boy who died after being shot at a farm have described him as "loving, kind and full of mischief". Jay Cartmell, from Frizington, in west Cumbria, died in hospital after suffering wounds to his head and face on land near Warcop on 28 September. Leigha and James Cartmell said they were heartbroken over the passing of their little boy who was "loved by all who met him". A man in his 60s was arrested on suspicion of gross negligence manslaughter and later released on bail.

  In a statement issued through Cumbria Police, Mr and Mrs Cartmell said "Jay loved being outdoors" and "the muddier he could get the better". They said he was an avid motorcycle speedway fan, a passion he had shared with his dad since first being taken to Workington Speedway when he was one. He "always went to the pit to fist bump his heroes, local racers Harry and Sam McGurk", his parents said. Jay was a defender at Whitehaven Miners Football Club, and even scoring an own goal "didn't dampen his enthusiasm", his parents said. His favourite player was Erling Haaland and he dreamed of meeting Lionel Messi.

  Jay had been going to speedway races with his dad since he was a baby, his family said

  Jay also "enjoyed fishing and rabbiting with his dad" and helped looking after the family pets, which included lurchers, ferrets and a bearded dragon. "He loved school and had a talent for maths," Mr and Mrs Cartmell said. "Jay was extremely loved, not only by us, but by all who met him. He had fantastic friends and always had a smile on his face. "We will miss him every day, but his love surrounds us and his memory will never fade." Mr and Mrs Cartmell thanked the Air Ambulance Service, the Royal Victoria Infirmary in Newcastle and Alder Hey Children's Hospital in Liverpool. They also thanked local groups, including the Workington Speedway Supporters Club, for their donations.

