title: Baby skeleton found under Bishop Auckland floorboards - BBC News
date: '2024-07-30'
section: England
url: http://www.bbc.co.uk/news/articles/czk0z2n97y5o
content: |-
  The discovery has been made by contractors renovating the upper floor of property.

  A police presence remains outside the property on Fore Bondgate

  The skeleton of a baby has been found beneath the floorboards of a house. The discovery was made by contractors renovating the property in Bishop Auckland, County Durham, on Monday. Forensic analysts, including an expert anthropologist, have been brought in to help determine its age and how long it has been in the current location. A post-mortem examination and CT scan are scheduled for later this week to determine the cause of death.

  Durham Police said it had also begun tracing previous residents of the address in Fore Bondgate. Det Ch Insp Mel Sutherland added: "Our investigations are at an early stage. "Obviously, this is a sensitive inquiry and at this point we remain open-minded as to the circumstances surrounding the death."
