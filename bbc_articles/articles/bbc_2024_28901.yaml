  Earlier, the TrafficWatchNI service reported "very difficult driving conditions" in some higher areas including the Glenshane Pass, Windyhill Road in Limavady and Glenpark Road, Omagh. A gritter vehicle got stranded in snow on the Coleraine Mountain Road, which also was closed for a period.
  • None A number of roads were closed due to rock falls, landslides and fallen tress - the Greenhill Road, on the A4 near Brookeborough, County Fermanagh, is closed due to subsidence at a bridge. The latest on road closures can be found on the TrafficWatchNI website, external.
  • None The Broadway roundabout in Belfast was briefly closed due to flooding near the Royal Victoria Hospital.
  • None P&O Ferries cancelled Saturday's 04:00 GMT ferry between Larne and Cairnryan but said passengers would be accommodated on the 08:00 sailing.
  • None Ballymena United's football match against Larne was called off because of a waterlogged pitch at Ballymena Showgrounds. Translink has list of all its disrupted bus and rail services on its website, external.

  Met Éireann (the Irish , externalMeteorological Service) issued red warnings, external for heavy rain in west Cork and west Galway but these have now been lifted. In the Republic of Ireland, ESB Networks said about 6,000 customers remained without power, following the storm, at 22:30 local time. Images posted online appeared to show that the River Feale in west Limerick had burst its banks. In County Donegal there was major flooding on Bridge Street in Killybegs where a clean-up has been taking place. It was one of the worst hit counties for power cuts while the highest wind gust recorded on the island of Ireland was 71mph (114kph) at Malin Head in the county. A status yellow wind warning for Carlow, Cork, Kerry, Kilkenny, Waterford, Wexford and Wicklow is in place until 02:00 local time on Sunday.

