id: bbc_2024_28901
title: 'Northern Ireland: Homes flooded and travel hit by Storm Bert - BBC News'
date: '2024-11-23'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c624xe3vx61o
content: |-
  Heavy wind and rain brings flooding to Dundonald and Coalisland, as well as widespread travel disruption.

  Homes near Moat Park, Dundonald, were among those affected by the flooding

  A number of homes were flooded in counties Down and Tyrone on Saturday following hours of heavy rain and wind caused by Storm Bert. Some residents in Dundonald were stuck in their houses due to the flood water on Saturday while up to 10 homes may have been flooded in Coalisland. An emergency payment scheme was later activated by Communities Minister Gordon Lyons. It means householders who have suffered "severe inconvenience" from flooding can claim a £1,000 payment through their local council. Travel was also heavily disrupted, with roads and train lines affected by flood water, fallen trees and other debris.

  The Northern Ireland Fire and Rescue Service (NIFRS) said between 08:00 and 13:30 on Saturday, it received 85 calls in relation to flooding.

  At the height of the storm, up to 6,500 people were left without power in Northern Ireland, but by 22:00 GMT fewer than 200 people still had no electricity. The Northern Ireland Fire and Rescue Service (NIFRS) said between 08:00 and 13:30 on Saturday, it received 85 calls in relation to flooding. Ten people were assisted from vehicles in flood water, with another rescued from a river in Antrim.

  Three fire appliances were deployed to Park Avenue in Dundonald, but some residents were stuck as water flooded the downstairs of their properties. Resident Sarah Kirkwood left her home after she woke up at about 07:00 GMT on Saturday and saw the water rising in the street. She then rang the Department for Infrastructure's (DfI) flood incident helpline to ask for sandbags. "I made them aware of the situation in the street, the water was coming up the manholes," she told BBC News NI.

  Sarah Kirkwood says she was talking to her neighbours from their upstairs windows while they were stuck inside their houses

  Ms Kirkwood explained that the area was prone to flooding, but the water had never entered her home before. "It comes about halfway up the street every year and they've been doing works... so we thought it was all in hand," she added. After leaving to get sandbags, Ms Kirkwood arrived back to find her property had flooded, which left her frustrated. Despite the turn of events, Ms Kirkwood said she is "fortunate" to have family she can stay with while the damage in her home is dealt with. It is understood that emergency accommodation has been provided for those unable to return to their homes.

  Firefighters worked to pump water away from flooded residential streets near Moat Park in Dundonald

  Up to 10 homes may have been flooded in Coalisland

  Meanwhile, homes at Kings Row, Coalisland, have also been hit. Mid Ulster councillor Dan Kerr told BBC News NI he had been contacted by three or four residents whose homes had been flooded. He said firefighters and staff from the Rivers Agency went to the scene and sandbags had been secured from a nearby Gaelic Athletic Association (GAA) club. NIFRS Group Commander Danny Ard said the number of flooded properties could be as high as 10 but firefighters could not confirm a final figure until the water has receded. Mr Ard added that a mail distribution centre in Mallusk, Newtownabbey had also been flooded. Three pumping appliances and one high-volume pump were used to take the water away.

  Three fire appliances were used to reduce water levels in Coalisland

  At the scene: Residents were trapped The fire service pumped water at Park Avenue, where a number of residents could not get out of their houses. Kelly Kitchen’s son and his partner were among those residents. Kelly said her son told her he woke this morning after 09:00 to find his house had been flooded. He was not able to leave. A video of his home showed a fridge floating in the kitchen and a couple of feet of dirty water on the ground floor. Some residents went to a nearby church hall to stay warm and dry during the operation.

  The Dundonald floods happened at Park Avenue, off the Comber Road

  The railway line between Belfast and Antrim was closed for a time but has since re-opened and the line between Belfast and Dublin has also reopened, public transport operator Translink said. The strongest winds in Northern Ireland - at 67mph - were recorded in Ballypatrick, County Antrim, while Derrylin in County Fermanagh recorded a quarter of its average November rainfall in 12 hours overnight.

