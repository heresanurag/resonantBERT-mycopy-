  Storm Bert has not finished with us yet. A fresh batch of strong winds will develop on Sunday and the Met Office has issued a yellow warning for strong winds, valid from 11:00 to 18:00 GMT on Sunday. There was a significant reduction in the wind on Saturday afternoon, but they will freshen again overnight. The earlier heavy rain combined with snow melt has led to flooding in many areas as rivers burst their banks. Flooding will continue to be a hazard as snow melt feeds down into the river network. According to the Met Office: "Strong south-westerly winds are expected to develop during Sunday morning across Northern Ireland. "Gusts of 45-55 mph are expected widely with gusts of up 65 mph possible over hills and exposed locations around the coast." The top wind gusts will be similar to those of Saturday and therefore could cause some further damage and disruption.
