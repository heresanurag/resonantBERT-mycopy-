  His show, which aired in the coveted 20:00 to 21:00 EST slot, was cited in court documents by Dominion's attorneys in their claim some of its output was defamatory.

  Additionally, Fox News is also facing a lawsuit filed in March by former guest booker Abby Grossberg in which she accused Carlson of "vile sexist stereotypes". Fox News has counter-sued and said it would "vigorously defend these claims".

  Carlson's latest interview with Mr Trump came two weeks ago, despite disclosures in the Dominion case showing he had privately said of the ex-president: "I hate him passionately."

  He also interviewed Twitter CEO Elon Musk during what would become his final week on Fox News.

  His departure appears to have been sudden and came without the usual farewell that might be expected from a long-serving presenter.

  A video shared on Twitter by journalist Aaron Rupar showed Carlson ending his show on Friday with the words "we'll be back on Monday".

  On air on Monday morning, a Fox News anchor announced the departure with a tribute that thanked Carlson "for his service to the network".

  Stepping in for the primetime slot that night, guest host Brian Kilmeade briefly remarked on his colleague's departure.

  He told viewers: "As you probably have heard, Fox News and Tucker Carlson have agreed to part ways. I wish Tucker the best. I'm great friends with Tucker and always will be."

  Carlson first joined Fox as a contributor in 2009 before becoming a co-host of the Fox and Friends Weekend show between 2012-16. He began hosting the Tucker Carlson Show in 2016.

  Before his Fox career began, Carlson also hosted shows on CNN and MSNBC and co-founded the Daily Caller website.

  His tenure at CNN ended in 2005, just months after a heated on-air exchange with Daily Show host Jon Stewart.

  Fox Corporation, the Murdoch-controlled company that owns Fox News, saw its share price drop more than 3% in New York after the announcement.

  That is comparable to the initial reaction when the company announced it would pay $787m (£631m) to settle the defamation suit brought by Dominion, though the shares in that case quickly recovered.

  One way that Carlson's departure could affect Fox News financially is in its forthcoming negotiations with cable networks over lucrative so-called carriage fees - paid to Fox by cable firms for carrying its network.

  These fees are critical to the company's bottom line and it now enters negotiations with a vacancy in its most prominent time slot.

  Another cable TV host, CNN's Don Lemon, announced on Monday that he had been "terminated" by CNN after 17 years, just hours after appearing on its recently re-launched morning show.

  The embattled host had come under intense public criticism earlier this year for disparaging remarks about Republican presidential hopeful Nikki Haley.

  Additional reporting by Natalie Sherman and Michelle Fluery in New York
