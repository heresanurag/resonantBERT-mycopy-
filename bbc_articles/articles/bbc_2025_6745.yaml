title: Eurostar hit by delays ahead of Easter weekend - BBC News
date: '2025-04-18'
section: London
url: http://www.bbc.co.uk/news/articles/czjnpwwwz32o
content: |-
  Eurostar says the delays were caused by an "overhead power issue" with several trains between Paris or Brussels and London affected.

  Several Eurostar trains between London, Paris and Brussels have been hit by delays ahead of the Easter weekend. At least one train was cancelled on Friday, and four others delayed by at least an hour, according to the Eurostar website. Eurostar apologised to affected passengers, saying disruption was caused by an "overhead power issue" near Paris' Gare du Nord terminal - but added that "all trains are now on the move". It said earlier in the day that the delays were caused by a fire near the tracks, without giving further details or the location.

  On Friday, UK firefighters put out a fire underneath a bridge near Ebbsfleet International, east of London, according to a post on X by Network Rail Kent and Sussex. It said services had been impacted and replacement buses were now in operation. Southeastern Railway later wrote on X that the line had reopened but "at a reduced speed of 160kph (100mph)". Reports in France said trains to and from Gare du Nord station in Paris were affected, and facing severe disruption. "We're sorry for the inconvenience and thank our passengers for their patience while we work to get services back to normal," Eurostar said in a statement.
