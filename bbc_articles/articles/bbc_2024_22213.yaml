  BBC Sport picks out 10 new Women's Super League players who you should keep an eye on in the 2024-25 season.

  Ten new signings to watch in the Women's Super League

  A number of big-name players have joined the Women's Super League this summer

  The return of the Women's Super League is almost here and there will be new players looking to make their name in the competition after arriving in the summer. Clubs have been busy in the transfer window as they build for the 2024-25 season, which begins on 20 September. As we near the beginning of the campaign, BBC Sport has picked out 10 players - in no particular order - who will be looking to catch the eye in England's top flight.

  Caldentey is one of the nominees for the 2024 women’s Ballon d’Or

  Mariona Caldentey has already impressed for the Gunners in the Champions League since joining from Barcelona this summer. The 28-year-old Spain winger has an impressive trophy haul from her time with the Catalan side, winning six league titles, three Champions Leagues and six Spanish Cups during her 10-year stint. She was part of the Spain team who beat England in the 2023 World Cup final and is an exciting addition to Arsenal’s front line.

  Lucy Bronze has won the WSL with Liverpool and Manchester City

  England defender Lucy Bronze is no stranger to the Women’s Super League, but she’s made the decision to return after two years away. She joined Barcelona from Manchester City in 2022, but the right-back has now moved to Chelsea and - as one of the world’s best defenders - will be a big addition to Sonia Bompastor’s team. Bronze, 32, has won five Champions Leagues, three WSL titles, lifted the Euro 2022 trophy with England and was part of the Lionesses side who reached the 2023 World Cup final.

  Gabi Nunes won a silver medal at the Olympic Games in Paris with Brazil last month

  Aston Villa have invested heavily following the arrival of new boss Robert de Pauw - smashing their transfer record to recruit Gabi Nunez. The 27-year-old Brazil forward has joined for £250,000 from Levante and will be a big boost as Villa look to better last season’s seventh-placed finish.

  Vilamala returned to fitness last season after suffering the second anterior cruciate ligament tear of her career

  Spain youngster Bruna Vilamala, 22, has joined Brighton on a season-long loan from Barcelona and brings a mix of potential and proven experience. She has netted 20 goals in 50 appearances for Barcelona and was awarded an international call-up for world champions Spain in June, scoring on her debut against Denmark. With Elisabeth Terland having left Brighton for Manchester United, could Vilamala fill the void?

  WSL newcomers Crystal Palace have looked to established striker Katie Stengel as they put together a squad to try to compete after promotion to the top flight. Stengel, 32, has played in the Women’s Super League previously with Liverpool and joins from Gotham FC. She scored 17 goals in 33 games for Liverpool during the 2022-23 WSL season.

  Chantelle Swaby played at the 2023 Women’s World Cup for Jamaica

  Jamaica defender Chantelle Swaby joined Leicester on a free transfer this summer and could be a big addition to their backline. She helped Fleury finish fifth in the French top flight last season and has also played for the USA’s Sky Blue FC - and Rangers, where she won the 2021-22 Scottish Women’s Premier League.

  Olivia Smith is the youngest player to feature for Canada’s senior national team, making her debut at 15 years and 94 days old in 2019

  Liverpool shelled out a club record fee of £210,000 for Canada international Olivia Smith and will hope she proves her worth in her debut WSL campaign. The Reds are looking to build on a successful season, in which they finished fourth, and 20-year-old Smith - who can play as a forward or attacking midfielder - could play a significant role.

  Aoba Fujino scored 24 goals and registered 17 assists during her 15 appearances for Tokyo Verdy

  Manchester City have a well-stocked squad, but they’ve added a number of players this summer - including Japan forward Aoba Fujino. The promising 20-year-old became Japan’s youngest ever scorer at the 2023 Women’s World Cup and was a regular threat for Tokyo Verdy in the Japanese top flight. She joins compatriots Risa Shimizu, Ayaka Yamashita and Yui Hasegawa at City.

  Dominique Janssen played for Arsenal between 2015 and 2019

  After a spell with German heavyweights Wolfsburg, former Arsenal defender Dominique Janssen is back in the WSL. She has signed for Manchester United, who will be looking to build on winning the FA Cup last season. The 29-year-old Netherlands international could be crucial in ensuring United keep goals out this year.

  Hayley Raso left Real Madrid at the end of the season

  Tottenham have added some attacking firepower by signing Australia winger Hayley Raso. Raso, who used to play for Manchester City and Everton, is an experienced forward who has played a big role in her country’s efforts in recent years. She scored three times as Australia reached the semi-finals of the World Cup in 2023, where they were knocked out by runners-up England.
