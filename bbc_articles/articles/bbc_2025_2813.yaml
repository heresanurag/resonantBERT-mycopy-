id: bbc_2025_2813
title: Google remakes Super Bowl ad after AI cheese gaffe - BBC News
date: '2025-02-06'
section: Technology
url: http://www.bbc.co.uk/news/articles/cx2j15r1g09o
content: |-
  Its Gemini tool wildly overestimated global gouda consumption in ad that was meant to show off its capabilities.

  Gouda is popular - but not that popular

  Google has re-edited an advert for its leading artificial intelligence (AI) tool, Gemini, after it overestimated the global appetite for Gouda. The commercial - which was supposed to showcase Gemini's abilities - was created to be broadcast during the Super Bowl. It showed the tool helping a cheesemonger in Wisconsin write a product description by informing him Gouda accounts for "50 to 60 percent of global cheese consumption". However, a blogger pointed out on X that the stat was "unequivocally false" as the Dutch cheese was nowhere near that popular. Replying to him, external, Google executive Jerry Dischler, insisted this was not a "hallucination" - where AI systems invent untrue information - blaming the websites Gemini had scraped the information from instead. "Gemini is grounded in the Web - and users can always check the results and references," he wrote. "In this case, multiple sites across the web include the 50-60% stat." The ad has now been re-edited to remove the error. Google has posted it on YouTube, external - which it owns - and it no longer contains any reference to what percentage of the world consumes the hard cheese. In a statement, Google told the BBC it had remade the ad after speaking to the cheesemonger featured in it and asking him what he would have done. "Following his suggestion to have Gemini rewrite the product description without the stat, we updated the user interface to reflect what the business would do," the statement added. Accurate figures on cheese are hard to pin down - however it is thought that cheddar is in fact the most popular variety in the world, though preferences vary from country to country. Another major contender is mozzarella, external, given its use in pasta and pizza.

  The Google advert promotes how small businesses could use an AI tool to help them in their work

  The incident is embarrassing for Google, given the extremely high profile of the Super Bowl and the extra scrutiny ads for it receive. Blogger Nate Hake - who spotted the error, external - said it was an example of "AI slop". But it's not the first time the tech giant has found itself on the back foot over its AI products. A year ago, Gemini was "paused" following criticism of the "woke" images it generated, such as an image of the US Founding Fathers which inaccurately included a black man. It's even had previous issues with cheese. In May last year, its AI overviews search feature was criticised after it told some users to use "non-toxic glue" when they searched for 'how to make cheese stick to pizza better'. The search engine's AI-generated responses also said geologists recommend humans eat one rock per day. Problems with AI tools are not limited to Google - in January, Apple was forced to suspend its news alert summariser after it invented a slew of inaccurate headlines. Adverts at the Super Bowl themselves are also no stranger to controversy. Last year, Uber Eats made a last minute change to its advertisement after criticism that it inappropriately made light of food allergies.
