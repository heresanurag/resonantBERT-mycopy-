content: |-
  Emergency crews remain at the scene in Newcastle, with people being warned to avoid the area.

  Boy, 7, dies and six injured in house explosion

  This video can not be played To play this video you need to enable JavaScript in your browser. Eyewitnesses told the BBC they heard a "very loud bang" and saw a "bright flash"

  A seven-year-old boy has died and six people have been taken to hospital following an explosion which destroyed three houses. Emergency crews were called to Violet Close in Benwell, Newcastle, at about 00:45 BST. Police, who have now enforced a no-fly zone in the area, said the boy's death was "truly devastating". Eyewitnesses described a "very loud bang" and a "bright flash", with some residents then told to leave their homes and go to a rest centre run by Red Cross volunteers.

  Three houses along the terrace were completely destroyed and several cars badly damaged. The area was littered with piles of debris and a heavy smell of smoke lingers. Firefighters and search dogs have been combing the wreckage and Northern Gas Networks said its engineers had been at the scene. An investigation is under way into how the explosion happened.

  This video can not be played To play this video you need to enable JavaScript in your browser. Police say the seven-year-old boy died at the scene

  Supt Darren Adams from Northumbria Police said the seven-year-old boy died at the scene. “This is a truly devastating outcome,” he said. "I have no doubt the people of Elswick and Benwell and our wider region will join me in extending their condolences to family and friends." He also said a no-fly zone measuring 200m (656ft) around the seat of the explosion had been put in place.

  Emergency crews described it as a "large scale incident"

  One eyewitness told BBC Radio Newcastle: "There was a big flash and I was thinking 'it's an explosion' and then after that I was thinking 'is it a car or something?' "But after that there was the smell and I woke up my family and we went outside. "It's a massive shock. In this area there are many children, many families." An evacuation centre was set up nearby and the Red Cross has been giving out mobile phone chargers and food. The West End Women and Girls Centre said anyone who had been evacuated from their home was welcome to stay at the centre for food, drinks or warmth.

  Roads have been closed and people have been told to avoid the area

  Tyne and Wear Fire and Rescue confirmed all fires had been extinguished. Assistant chief fire officer Lynsey McVay said: “Six flats were badly affected, two of which suffered the main brunt of the explosion. "We continue to search the buildings and our specialist dog unit remains on scene."

  Residents said many families lived in houses around the area

  Newcastle City Council asked people to avoid the area and told those living nearby to stay indoors and keep windows closed. It also confirmed the house was a council-maintained property. Leader Karen Kilgour said housing officers had been on site to support residents, some of whom were being moved into temporary hotel accommodation. "The safety of residents remains our absolute priority and we will continue to provide assistance in any way we can," she said.
