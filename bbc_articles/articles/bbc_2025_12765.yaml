id: bbc_2025_12765
title: CCTV shows bears raiding supplies after enclosure escape - BBC News
date: '2025-06-24'
section: General
url: http://www.bbc.co.uk/news/videos/cx234gj1234o
content: |-
  CCTV footage shows one of a pair of escaped European Brown bears helping itself to food after escaping its enclosure.

  The two bears sparked the evacuation of Wildwood Devon wildlife park and then consumed a "week's worth of honey" while on the loose for just under an hour.

  Staff monitored the bears on CCTV and said they "remained very calm throughout", and did not enter any public areas, choosing instead to remain at the back of the bear house.
