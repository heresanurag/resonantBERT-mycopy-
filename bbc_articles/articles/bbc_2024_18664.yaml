  The quake shook homes and startled residents, but no structural damage or injuries have been reported.

  A 4.4 magnitude earthquake shook homes and startled residents in California on Monday.

  No structural damage or injuries have been reported by the Los Angeles Fire Department, but the tremor sent many rushing for safety.

