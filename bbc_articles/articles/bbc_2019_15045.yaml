id: bbc_2019_15045
title: London Bridge attacker was 'complying' with licence conditions - BBC News
date: '2019-12-01'
section: General
url: http://www.bbc.co.uk/news/uk-50615949
content: |-
  Met police say attacker Usman Khan was complying with 'extensive list' of conditions.

  The London Bridge attacker was 'complying' with conditions set out by Multi-Agency Public Protection Arrangements (MAPPA) according to the Metropolitan Police.

  Usman Khan, a convicted terrorist released from prison in December 2018, killed two people before being shot dead by police on Friday.

  Assistant Commissioner Neil Basu said a series of raids had been carried out, but that it was believed Khan was acting alone.
