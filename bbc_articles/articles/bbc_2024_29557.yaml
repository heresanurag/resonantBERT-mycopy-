content: |-
  Bonfire night can turn from family fun to "hell" in a split second, says one mum from Cwmbran.

  Mum of girl burned by firework warns of dangers

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Bonfire night can turn from family fun to "hell" in a split second, said the mum of a four-year-old who was burned by a rogue firework. In 2018, Rosie-May and her family were at a friend's house to watch the display but a multi-box flare shot at Rosie-May's neck, setting her on fire. Mum Ellie Mason, from Cwmbran, Torfaen, said the 999 handler told them to put her daughter in a bath of cold water. A quick response from the emergency services was key for Rosie-May, but fire and police unions say firefighters being attacked is slowing response times and putting lives at risk.

  Ms Mason told BBC Radio Wales Breakfast that when Rosie-May caught on fire her first instinct was to pick her up and try to pat her down "in blind panic because I didn't know what to do". She said she "wouldn't have known" to put her daughter in a cold bath: "My instinct was to cover [the burn] with cling film." Rosie-May was taken to the Royal Gwent Hospital before being transferred to a specialist burns unit at Morriston Hospital, Swansea. She needed a chemical bath and skin grafts and spent five weeks in hospital after the incident.

  It has been six years since Rosie-May was hit by the flare

  A quick response from the emergency services was key for Rosie-May, but fire and police unions say firefighters being attacked is slowing response times. Last Bonfire Night, police control centres in Wales took over 1,500 calls for help. The Fire Brigades Union (FBU) Wales said firefighters have increasingly been attacked with rocks and fireworks, as well as abusive comments over the past decade. Gareth Tovey, from FBU Wales, said: "The worst thing is, it means that we need to potentially withdraw from that situation and we have to remember we were only ever there to make sure people are safe." He added that groups of youths would often hold their phones up and film on occasions which could really affect firefighters. While Bonfire Night is the busiest night of the year for firefighters, Mr Tovey said these attacks were not limited to 5 November. "We certainly see these attacks on crews throughout the year, at different holiday events and through different school holidays." Home Office figures recorded a 60% increase in attacks across the UK compared to 10 years ago.

  The emergency services say they still want people to enjoy Bonfire night

  Steven Davies, a group manager at Mid and West Wales Fire and Rescue Service, said fire engines were equipped with CCTV and anyone spotted throwing fireworks would be prosecuted. He also warned people thinking of having their own bonfires not to have them too close to their or anyone else's home, or they would face having them put out by fire crews. "We will work with the police and local authorities to monitor any bonfires which might be too big or too close to properties," he added.

  Special PC Ben Johns, of South Wales Police said officers were also faced with abuse on Bonfire Night and extra patrols would be put on to deal with anti-social behaviour. While patrolling on Halloween, Special PC Johns was out with a team that was attacked by a group who threw fireworks and eggs at the police van. "I think it's something as police officers we shouldn't be subject to but we are quite resilient, if you were a member of the public and that was happening it would be incredibly scary," he said. He said the van was taken out of service to check it was safe, which meant the team could not respond to 999 calls. Special PC Johns said he wanted people to enjoy Bonfire Night safely but the date always sparked an increase in anti-social behaviour. Meanwhile, officers in Abercynon, Rhondda Cynon Taf, have been given extra powers to deal with anti-social behaviour following an "unsafe" bonfire in Nant-Y-Fedw, said South Wales Police. A dispersal order, covering the surrounding area, will apply to those aged 10 years and over and will be in place for 48 hours from 17:00 GMT on Tuesday. South Wales Police added that a dispersal order has also been applied in Butetown and Grangetown. The order has been put in place from 18:00 on 4 November until 18:00 on 6 November.

  The Welsh government said it condemns "in the strongest terms attacks on members of the emergency services at any time of the year". "Firefighters should be able to serve the public without fear of being attacked while on duty," it added.
