  Part of Burrow’s legacy is a new facility in Leeds called the Rob Burrow Centre for MND, paid for by the money he and Sinfield raised. Construction, which is now under way, is expected to take a year to complete and the charity remains focused on raising the last £1m of its target. A special ceremony took place at the building site on Monday, attended by his family and Sinfield. Dr Jung said the centre "represents hope", and as well as medical facilities she said it would provide a safe and warm place to grieve and plan after receiving bad news. Clearly emotional, she said that Burrow looked out for her and even checked in on her before her first media interview. "I can see what kind of teammate he must have been, looking out for his team members”, Dr Jung said. “When I see the mural of Rob outside the centre, I see the focus on his face. “That's how I remember him, with his cheeky grin and his focus.” Follow BBC Yorkshire on Facebook, external, X (formerly Twitter, external) and Instagram, external. Send your story ideas to yorkslincs.news@bbc.co.uk.
