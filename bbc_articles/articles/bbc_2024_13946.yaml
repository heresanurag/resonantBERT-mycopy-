title: Rob Burrow medics recall 'beaming smile and determination' - BBC News
date: '2024-06-04'
section: West Yorkshire
url: http://www.bbc.co.uk/news/articles/c7221110ql5o
content: |-
  Staff who treated the Leeds Rhinos legend pay tribute to the rugby league star who died on Sunday.

  Rob Burrow's medical team recalled how determined the former rugby league star was

  Members of the team that treated Leeds Rhinos legend Rob Burrow have paid tribute to the rugby league star. Staff at Seacroft Hospital in Leeds, where Burrow's motor neurone disease (MND) was treated, said they remembered his stubbornness and "beaming smile" in the face of the incurable, degenerative disease. The 41-year-old father of three died at Pinderfields Hospital in Wakefield on Sunday surrounded by his family. Dr Agam Jung, the consultant neurologist who led Burrow's care, said the first time she met him he walked in with a huge smile, adding that other patients "drew a lot of strength from him".

  Dr Agam Jung said Burrow looked out for her when she had to do nerve-wracking interviews

  Burrow was diagnosed with MND in 2019 and was given only two years to live. He campaigned relentlessly to raise money to spread awareness of the disease with his best friend and former team-mate Kevin Sinfield, 43. Together they raised more than £15m in less than five years. Claire Lang, an MND specialist nurse and care co-ordinator for Burrow at Seacroft Hospital, said he was “the most positive person I have come across”. She said that despite losing his mobility and speech, Burrow was determined to “do things his way”. Ms Lang added that Burrow had helped raise “vital awareness” about what living with MND really meant. She added: "Rob showed people in a human way and in a family way how MND affects someone".

  Burrow's physiotherapist Ali Whelan said they would both laugh together and he had his own ideas about treatment

  Meanwhile, Burrow’s physiotherapist, Ali Whelan, said he had strong opinions on what he wanted. "He would come in with a pre-programmed message to me on his iPad saying, ‘thank you very much for the speech, but I'm going to say no’.

  In May, Burrow's wife Lindsey and former team-mate Kevin Sinfield took part in the Rob Burrow Leeds Marathon

  A final message from Burrow urged people not to "waste a moment" of their lives. The speech was recorded for BBC documentary There’s Only One Rob Burrow, with the former Leeds Rhinos star asking for it to be shared after his death. "My final message to you is whatever your personal battle be brave and face it," he said. "In a world full of adversity we must still dare to dream."

