title: 'Winter Olympics: Great Britain''s women hammer Sweden as men defeat Italy
  - BBC Sport'
date: '2022-02-10'
section: Winter Olympics
url: http://www.bbc.co.uk/sport/winter-olympics/60328474
content: |-
