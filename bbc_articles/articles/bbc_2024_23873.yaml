  "You just imagine you're on the sixth floor of some building and you need to run away downstairs. Is it realistic that you can do this in two minutes?" Ukrainian MP Oleksiy Goncharenko told the BBC. Officials said 271 people had been wounded in the Russian strikes on Poltava, and by Wednesday afternoon, 400 people had already given blood at the main regional hospital. Among them was Oleksandr Moskvich, 38, who was badly wounded on the frontline last year in the fierce battle for the eastern city of Bakhmut.

  I’m burning inside. I’ll do anything I can to help. I can’t fight at the moment so this is the best I can do

  He pointed to scars on his neck and back where he had been shot by Russian troops while he was on patrol. "At the moment I can only give people my blood, my support. I can talk to them and try to understand, because I passed through this." Poltava is observing three days of mourning and there was an eerie quiet throughout the hospital. A Ukrainian flag flew outside the building with a black ribbon attached, while inside, the corridors of the blood donation ward were filled as people waited their turn. The doctor in charge of blood donation, Volodymyr Rudikov, said the people of Poltava had joined together at an unimaginably difficult time: “This is something I’ve never seen in my 16 years as a chief doctor."

  President Zelensky promised that what he called "Russian scum" would pay for the attack, and repeated calls for more air defences so Ukraine could protect itself by carrying out its own long-range missile attacks. In a statement confirming the deaths of military personnel, Ukraine's land forces said an investigation was under way to establish whether enough was done to protect those in the facility the missile hit. Poltava regional governor Philip Pronin called the attack a "cunning and cynical Russian strike," and later said 15 people were still thought to be trapped under the rubble. Mr Zelensky was due to meet the Irish premier on Wednesday as Ireland prepared to announce new funding for Ukraine's war effort. The Irish government said the package would provide essential humanitarian assistance, support rehabilitation and eventual reconstruction, and contribute to Ukraine's longer-term goals.
