  Joseph Dix and Macauley Ruddock appear in court, charged with killing a father-of-two.

  Two charged with murder after assault victim dies

  Andrew Main was in hospital for a month before he died

  Two men have appeared in court charged with murder after a father-of-two who was assaulted in July died in hospital a month later. Andrew Main, 33, from Falkirk, was injured in an assault near the entrance to the Travelodge on Princess Way, Swansea, on 17 July. Joseph Dix, 26, of Frome, Somerset, and Macauley Ruddock, 27, of Bath, were originally charged with wounding with intent to cause grievous bodily harm but were charged with murder following Mr Main's death on 14 August. The pair appeared at Swansea Crown Court on Friday where they denied the charge and both will stand trial in January 2025.

  Mr Main's sister Nikki issued a tribute to her brother, describing him as "a witty man with a huge heart". She added: "He was adored by family and friends and beloved by more. He will forever live in our hearts and memories. "He was a fabulous brother, fun uncle, and supportive daddy to his two children. "As a family, we are destroyed by what has happened to Andrew. We can’t thank everyone enough for the love and support they have shown."
