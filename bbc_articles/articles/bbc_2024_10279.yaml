title: 'Marjorie Taylor Greene: ''9/11 absolutely happened'' - BBC News'
date: '2024-05-17'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-55942990
content: |-
  The Republican congresswoman says she remembered 'crying all day watching it on the news.'

  Republican congresswoman Marjorie Taylor Greene says she regrets past comments in which she questioned whether the terror attacks on 9/11 or some school shooting tragedies actually happened.

  But she did not apologise and did not refer to a host of other incendiary statements made before she was elected to Congress in November.

  She has been condemned by colleagues from both parties, although the Republican leadership stopped short of removing her from two committees. The US House will vote on whether to punish her for those statements.

  Read more: Republican lawmaker says she 'regrets' QAnon posts
