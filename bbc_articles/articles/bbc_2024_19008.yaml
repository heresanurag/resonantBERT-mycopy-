content: |-
  The family who own the estate think the Civil War leader's final resting place is in their attic.

  Is Cromwell's body buried at this country house?

  Stephen Wombwell has lived at Newburgh Priory all his life

  Over the centuries, the story of the burial of English Civil War leader Oliver Cromwell's headless body at Newburgh Priory in North Yorkshire has been myth, rumour and legend. The Wombwell family, who have lived at the Priory for nearly 500 years, believe it was brought back to the Tudor house from London by his grieving daughter in 1660. Cromwell died of natural causes after ruling the country as Lord Protector, but when the monarchy was restored, his corpse was exhumed and beheaded. Stephen Wombwell, the current custodian of the estate near Coxwold, said the story could not be "proved" because it would be disrespectful to open the burial vault.

  Oliver Cromwell was the Lord Protector of England from December 1653 until his death in September 1658

  Oliver Cromwell was an MP who became a soldier during the Civil War and helped to overthrow the king. He was interred at Westminster Abbey after his death in 1658, but two years later King Charles II vowed retribution for his father's execution and displayed Cromwell's severed head in public. At the time, Cromwell's daughter Mary was living at Newburgh Priory as the wife of the first Earl Fauconberg. Mr Wombwell said: "Mary is meant to have gone down to London, managed to bribe someone to get the body but couldn't get the head, and brought the body back up here and buried him in the roof."

  The tomb is in the roof space at Newburgh Priory

  The tomb is now a brick wall with wood over it. "It's not exactly a grand entrance way to the tomb of such a great statesman as Oliver Cromwell," said Mr Wombwell. "He's tucked away in the roof which is exactly the reason really. Mary wasn't meant to have the body so obviously squirrelled him away up in the attic." The tomb became an enclosed vault after an 18th Century earl raised the roof. Stories abound of attempts to solve the mystery, including the future King Edward VII trying to break into the vault and royal requests for it to be opened. Mr Wombwell added: "I would not allow it to be opened, partly because it's macabre digging people up from final resting places, and also he is related to us."

  The vault that is supposed to contain Oliver Cromwell's body is in the attic at Newburgh Priory

  Cromwell expert Stuart Orme, who works at a museum dedicated to the leader's life, said there were "many stories" about his final resting place. The head's burial location has been verified as Sidney Sussex College in Cambridge, where Cromwell studied. Mr Orme said: "Cromwell was the most significant figure in the parliamentary war effort and was involved in the trial and execution of Charles I. "The most likely explanation is that Cromwell's body was thrown into a communal burial pit in London, but we'll never know for sure where it is." A confident Mr Wombwell added: "There's no reason why it's not true. No-one else is claiming him. There's as much reason for him to be here as anywhere else." Listen to highlights from North Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
