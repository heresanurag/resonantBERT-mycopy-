title: Drone spots suspected burglars on Mansfield bank roof - BBC News
date: '2021-08-15'
section: Nottingham
url: http://www.bbc.co.uk/news/uk-england-nottinghamshire-58213759
content: |-
  Police found no sign of any intruders until they deployed a thermal imaging drone.

  Police could not find any suspects after the intruder alarm went off at the Santander bank, but a thermal imaging drone found three people on the roof

  Three suspected burglars who tried to hide from police on the roof of a bank were foiled by a thermal imaging drone.

  Nottinghamshire Police attended the Santander bank in Stockwell Gate, Mansfield, at 01:10 BST after the intruder alarm was activated.

  Officers could not find any suspects until the force's drone spotted three people on the roof.

  Two men, aged 25 and 40, and a 31-year-old woman, were arrested on suspicion of burglary and remain in custody.

  Police said Nottinghamshire Fire and Rescue Service was also in attendance to help officers search the roof.

  Fire crews helped police search the roof of the bank in Mansfield

  It is unclear whether anything was taken from the bank.

  Det Sgt Lauren Morgan said: "This is a great example of how multiple departments from the force can work together to achieve good results and I would like to thank everyone who was involved in the arrests."

