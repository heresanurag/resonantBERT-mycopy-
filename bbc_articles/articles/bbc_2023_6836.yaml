  Ofgem lowers the energy price cap, but analysts warn average bills are likely to remain high for some time yet.

  'It'll take more than this to take the strain off family life'

  Speak to people in Ipswich and they’ll tell you this morning's news is welcome, but many think it will be a long time before they feel any real benefit. Pamela and her husband both work and have had to use a food bank to make ends meet in recent months. She is pleased energy bills might start to fall, but it will take a much more significant drop, or more government support, to take the strain off their family life, she says. When I visited last August, the fear was palpable - energy bills were set to rise and the government hadn't yet outlined its plans to help. When ministers did expand the support available, it did make a difference. People are aware of that, they're also aware of the huge profits that have been made by energy producers. Now the mood has shifted to one of frustration and resignation. The sunny days are a welcome distraction, with many trying to find ways to enjoy the next few months. But that will also be done on a strict budget - the struggle has set in.
