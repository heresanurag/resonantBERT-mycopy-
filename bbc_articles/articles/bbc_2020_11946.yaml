id: bbc_2020_11946
title: 'Covid-19: Children ''top priority'' in Wales firebreak - BBC News'
date: '2020-10-19'
section: General
url: http://www.bbc.co.uk/news/uk-wales-54602959
content: |-
  First Minister Mark Drakeford said children would be the top priority in the "short, sharp" lockdown in Wales.

  Wales will go into a "short, sharp" national lockdown from Friday, 23 October until Monday, 9 November.

  People will be told to stay at home, while pubs, restaurants and non-essential shops will shut.

  Primary schools will reopen after the half-term break, but only Years 7 and 8 in secondary schools will return at that time.

  Mr Drakeford told a media briefing it had been a difficult decision but the NHS would not be able to look after the increasing number of seriously ill people.
