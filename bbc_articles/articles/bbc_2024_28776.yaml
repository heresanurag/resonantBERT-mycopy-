content: |-
  Two-time Olympic triathlon champion Alistair Brownlee announces his retirement from the sport at the age of 36.

  Double Olympic triathlon champion Alistair Brownlee has announced his retirement from the sport aged 36. Brownlee won gold at London 2012 before defending his title in Rio four years later. A world champion in 2009 and 2011, Brownlee is the only triathlete to be crowned junior world champion, U23 world champion, European champion and Olympic champion. "Triathlon has profoundly shaped my life. I have dedicated nearly half of it to being a professional athlete, fulfilling my childhood dream and achieving far more than I ever dared to imagine," Brownlee wrote on X. "I look forward to embracing a slightly slower pace of life, yet not too slow. "There's an exciting array of events, challenges and adventures awaiting me - things I've always wanted to have a crack at but haven't had the chance to pursue."

  World Triathlon president Antonio Arimany paid tribute to Brownlee, saying his legacy will "live as long as the sport itself". "Alistair's contribution to the world of triathlon over more than two decades is immeasurable," said Arimany. "He is a true icon of our sport and he will inspire generations to come of young triathletes from all around the world." Brownlee's first Games came in 2008 in Beijing, where he finished in 12th place. It was not until 2012, when Brownlee won gold on home soil, that he captured a legion of fans. Having been in school when London was awarded the Games in 2005, Brownlee took gold seven years later by beating Spanish rival Javier Gomez by 11 seconds. Alongside his brother Jonny, who took bronze in London, Brownlee has taken the sport to new heights, the pair competing against one another on the world's biggest stages. Gomez, who was sandwiched between the Brownlee brothers when he won silver at London 2012, called that race the "the highest level triathlon" ever. The 41-year-old Spaniard also acknowledged that Alistair "changed the way we used to race" and was the "most complete triathlete" at his peak. "He was super-aggressive, tactically really good at racing. He's been a great athlete, probably the best we've ever seen," Gomez told BBC Sport's Olly Foster. "Alistair has had such an impact in the sport that he will be remembered forever in the sport of triathlon." Shortly after London 2012, the brothers launched the Brownlee Foundation, a charity aiming to inspire children from all backgrounds to take up the sport. In 2016, Alistair helped Jonny over the finish line at the Triathlon World Series event in Mexico when his brother started to wobble on the home straight. Jonny, two years younger than Alistair, was leading the race when his legs started to give way in the Mexican heat. Alistair, who was in third position at the time, propped his brother up for the final 700m and helped him over the line to finish ahead of him in second place.

