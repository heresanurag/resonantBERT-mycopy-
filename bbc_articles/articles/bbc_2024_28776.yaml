  Brownlee became the first triathlete in Olympic history to successfully defend his crown when he won gold at Rio 2016. Alistair pulled away from his brother during the midway stage of the 10km finish to win the event, with Jonny claiming silver. Alistair failed to qualify for the Tokyo Games in 2021 as he was suffering from an ankle problem that eventually required surgery. He retired from racing the Olympic distance after his Tokyo disappointment, focusing instead on long-course triathlons and Ironman events. Brownlee won 22 World Series golds during his 18-year career, as well as two golds at the Commonwealth Games in Glasgow in 2014 in the individual and mixed-team relay.
