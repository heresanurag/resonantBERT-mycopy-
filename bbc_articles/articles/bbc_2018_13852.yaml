id: bbc_2018_13852
title: Hibs boss Neil Lennon struck by object at Tynecastle - BBC Sport
date: '2018-11-01'
section: General
url: http://www.bbc.co.uk/sport/av/football/46052997
content: |-
  Hibs manager Neil Lennon is struck by an object thrown from the crowd at Tynecastle in stoppage-time of a 0-0 derby draw.

  Hibs manager Neil Lennon was struck by an object thrown from the crowd moments after Hearts had what would have been a stoppage-time winner disallowed in a 0-0 Edinburgh derby draw at Tynecastle.
