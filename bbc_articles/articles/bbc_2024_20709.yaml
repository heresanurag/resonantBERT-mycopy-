title: 'Strictly Come Dancing 2024: Nick Knowles, Sam Quek and Paul Merson complete
  line-up - BBC News'
date: '2024-08-05'
section: Culture
url: http://www.bbc.co.uk/news/articles/c39kklz2nzxo
content: |-
  She joins previously announced contestants including Shayne Ward, Toyah Willcox and Chris McCausland.

  Sam Quek served as a team captain on the revamped Question of Sport

  Sam Quek, Nick Knowles and Paul Merson have joined Strictly Come Dancing, completing the 2024 line-up. The trio join previously announced celebrities including singer Toyah Willcox, comedian Chris McCausland and actor and singer Shayne Ward. Merson, Quek and Knowles were revealed as the final three contestants on Monday's episode of The One Show. Quek said she was "chuffed to be a part of this legendary show", but added the prospect of competing was "quite daunting".

  Merson is a former professional footballer and manager who now works as a pundit for Sky Sports Knowles is a TV presenter, best known for hosting property programmes such as DIY SOS. And Quek is an Olympic hockey player and TV presenter who also served as a team captain on panel show Question of Sport. Strictly Come Dancing, now in its 20th year, airs on BBC One and iPlayer from September through to December. Here is the 2024 line-up in full:

  Sam Quek won 125 international caps for the England and Great Britain women’s hockey teams, including a gold medal at the 2016 Rio Olympics. In 2017, Quek was awarded an MBE for services to hockey. She is now a broadcaster and television personality, and has presented the BBC's Morning Live as well as coverage of football, American football, rugby and cricket. Between 2021 and 2023, she was team captain on Question of Sport - a revamped version of the panel show A Question of Sport. Paddy McGuinness hosted the more recent iteration, while Quek's opposing team captain was Ugo Monye, who has previously competed on Strictly. Quek said: "As a former hockey player I’m used to playing as part of a team, but the thought of dancing on the ballroom floor in front of a live audience is quite daunting! "I’m chuffed to be a part of this legendary show and quickstep into the shoes of a performer, it feels absolutely surreal but I’m ready for every bit of the adventure."

  Nick Knowles has been the face of DIY SOS for 24 years - including its recent iteration DIY SOS: The Big Build. He has also fronted travel programmes, many for Channel 4, such as Into the Grand Canyon, The Mighty Mississippi and Nick Knowles in South America. Knowles said he was "so, so excited to be doing Strictly this year". "People may be more used to me getting stuck in on a building site or travelling the world, but dancing live on TV will be a whole new adventure," he said. "I’ve spent my whole life learning new skills and I’ve never been afraid of a challenge - there’s life in the old dog yet to take on one more big one – being taught how to dance!"

  Paul Merson described Strictly as a "whole new ball game"

  Paul Merson made his debut playing for Arsenal Football Club aged 17 and went on to win the PFA Young Player of the Year. Merson played for the club for over a decade, playing 424 times, scoring 99 goals and winning all domestic trophies, as well as the European Cup Winners’ Cup. He played 21 times for England, scoring three times and went on to play for Middlesbrough, Aston Villa, Portsmouth and becoming player manager at Walsall Football Club. Merson is now a football pundit and commentator. He said: "Joining Strictly is a whole new ball game for me, but I’m going to tackle this challenge head on. "I’m ready to swap the pitch for the Ballroom floor, so here’s hoping my two left feet can learn some moves and you never know, maybe I’ll be taking home the Glitterball!"

  Gladiator and Olympian Montell Douglas becomes the newest star to be added to the Strictly line-up

  Former Olympian Montell Douglas is perhaps best-known to audiences for her role as Fire in the BBC One series Gladiators. Douglas is the former holder of the British woman's 100m sprint record and competed at the Beijing Winter Olympics bobsleigh team in 2022. In 2010, Douglas won Commonwealth Gold in the 4x100m relay race. Her appearance at the Beijing Winter Olympics in the Bobsledding team saw her become the first female UK athlete to compete at both the Summer and Winter Olympic Games. In a statement, Douglas invoked Gladiators' most famous catchphrase, joking: “Strictly ARE YOU READY?" "Fire is here to light up the Ballroom. Wow I am so honoured to have been asked to do the show. It is such an amazing thing to be a part of and I can’t wait to get started." She added: "Hopefully a few of my Gladiator moves will come in handy with the Tango or Paso Doble!”

  Dean said he was looking forward to getting "stuck into something new"

  Dean is a three-time Olympic champion. At the Tokyo 2020 Olympics, he made history as the first British man to win a gold medal for the men’s 200m swim freestyle in more than 100 years. He went on to win a further gold medal in Tokyo and become England’s most decorated athlete at the subsequent 2022 Commonwealth Games, winning a total of seven medals. More recently, Dean brought home his third gold medal for Team GB from the Paris 2024 Olympic Games in the team 4 x 200m freestyle relay. Dean said he had accidentally let the news slip during an interview earlier this month, but the BBC later confirmed his participation. In a statement, he said: “I am taking part in Strictly Come Dancing 2024! "You may have heard me accidentally say it poolside first... but now I can officially talk about how excited I am to get stuck into something new, meet some brilliant people and get dancing. Bring it on!"

  Borthwick is one of the longest-serving actors on EastEnders, known for playing Jay Brown/Mitchell

  Borthwick rose to fame for his portrayal as Jay Brown/Mitchell in BBC soap EastEnders. He has starred in since 2006, making him one of the longest-serving actors on the show. He has previously won a British Soap Award for best dramatic performance from a young actor, and an Inside Soap Award for best actor. Borthwick's participation in Strictly marks a return to the Elstree ballroom, after he won the 2023 Christmas special. In a statement, Borthwick said: “I had a ball doing the Strictly Christmas special last year, so when I was asked to join for this series it was the easiest yes! "This is a fresh challenge and it will be so different to be learning a new dance every week and for the public to have their say. " He added: "I’m hoping to be Salsa-ing around Albert Square in no time and I’ll be asking my Walford Strictly alumni for some words of wisdom. See you on the dancefloor!”

  Actress Sarah Hadland is best known for appearing in films and TV series like Miranda Hart's BBC sitcom Miranda, as well as children's show Horrible Histories. She has also appeared in ITV's comedy series The Job Lot, for which she was nominated for a Royal Television Society Award, and her film credits include James Bond film Quantum of Solace. Hadland said she was "particularly excited to be part of such an iconic show in its 20th year". "I cannot believe I am part of Strictly, I'm so ready for the glitz, glam and glitter and hopefully I can make everyone watching at home proud."

  Shayne Ward scored the Christmas number one in 2005 with his debut single That's My Goal

  Ward's debut single That's My Goal was the UK's Christmas number one after he won the second series of ITV singing competition The X Factor in 2005. Since then, he has become well known as an actor, playing Aidan Connor in ITV soap Coronation Street - winning him best newcomer at the National Television Awards. He has also performed in musicals like Rock of Ages in the West End and currently appears in crime drama series The Good Ship Murder on Channel 5. Ward says he was "buzzing to see all of the sparkles and magic that is Strictly in real life". "I'm no stranger to live TV, but dancing Latin and Ballroom in front of millions is a whole new level. No promises on my dancing ability, but I will give it my best shot."

  Tasha Ghouri has said she "hopes to represent and make everyone proud out on that dancefloor"

  Ghouri is a model and professional dancer, and she said she's excited to learn dance styles she's not trained in on Strictly. She starred on the 2022 series of Love Island, where she met her boyfriend Andrew Le Page. The 25-year-old was born deaf, and uses a cochlear implant - a small electronic device that helps her to hear. She also recently co-authored a romance novel, Hits Different, which features a deaf character. Her appearance comes three years after Rose Ayling-Ellis became Strictly's first deaf contestant, and went on to win. "Pinch me, I can't believe I'm going to be on Strictly Come Dancing!" Ghouri said. "I’ve been watching the show since I was little - it's a firm Ghouri family favourite - so this is a total dream come true."

  Wicks has said he loves a challenge

  Pete "the Pirate" Wicks first appeared on screens on The Only Way Is Essex in 2015. He also regularly appears alongside his best friend, Made In Chelsea's Sam Thompson, and the pair have a podcast together, Staying Relevant. Wicks has said appearing on Strictly is "terrifying", but that he's "genuinely looking forward to getting stuck in". He is also friends with Zara McDermott, who has spoken about having negative experiences on the show last year. On Tuesday, sharing the announcement that Wicks would be on the show, she wrote: "I've never been so excited. Love you."

  Toyah Willcox sang 80s hits including I Want to Be Free

  Eighties popstar Toyah Willcox is responsible for 13 top 40 singles, including hits It's A Mystery, I Want to Be Free and Brave New World. And this year, she played Glastonbury with her husband, Robert Fripp. She's also appeared in over 40 stage plays. The Sun on Sunday, external previously reported that Willcox would be starring on Strictly, and she said in April that she "wouldn’t say no" to the opportunity. She told Kay she had been "lying" to everyone as an attempt to keep the secret, and that she was looking forward to the regular spray tans.

  "I am honestly still pinching myself, a portly balding opera singer, me, taking part in Strictly Come Dancing," Evans joked about the announcement

  A lot of people might recognise Wynne Evans as the face, and the voice, behind the Go Compare adverts. Evans has had two number one classical music albums, and has given over 200 performances at the Royal Albert Hall in London. He’s also turned his hand to presenting, he has a daily radio show on BBC Radio Wales, and has presented on BBC Radio 3 and Classic FM. He also has a zest for cooking, as he won Celebrity Masterchef last year. Evans says he’s "pinching" himself at the news, and "aims to make Wales proud". He also told Kay he'd be taking inspiration from Bill Bailey, who won the show in 2020 with Oti Mabuse.

  The practising NHS GP is the resident doctor on BBC Morning Live and BBC Radio Scotland, and she's also written a children's book, as well as newspaper columns. "This still doesn’t feel real, I am overjoyed to be a contestant on this year’s show," she said. "I have watched Strictly every year with my family and it feels extra special that it’s the 20th year, I can’t believe I will be the one getting Strictly-fied now. "This is so out of my comfort zone, but I’m up for the journey and will give it my absolute all."

  Chris McCausland was the first celebrity contestant confirmed for the next series of Strictly Come Dancing

  Chris McCausland was the first celeb to be confirmed for this year's series, which also made him the show's first blind contestant. The comedian is a regular face on flagship comedy shows such as Have I Got News for You and QI. Speaking to ITV's This Morning on Monday, he said his participation in Strictly was the "worst kept secret" in showbusiness following weeks of newspaper reports. The national disability charity, Sense, welcomed news that he was joining the show, calling it a "pivotal moment" for disability representation. "I don't dance, I haven't danced, I can't dance, I can't see the dancing I will have to do. What can possibly go wrong?," joked McCausland, who lost his sight in his 20s.

  JB Gill said when he got the call to join Strictly, "it was an immediate yes" from him

  JLS singer JB Gill was unveiled as the second celebrity contestant confirmed for Strictly's next series. Gill said he was looking forward to "showing off some new skills" to his fellow bandmates. He is one part of the wildly successful boy band JLS, who rose to fame on The X Factor and went on to have hits including Beat Again and Everybody In Love. The singer said he loved his time dancing in the Strictly Christmas special over a decade ago. But speaking on This Morning, he admitted that some of the routines like ballroom dancing were "quite alien" to him. "So it's going to be a learning curve for me," he said.

  Strictly has been at the centre of controversy as claims have emerged about the treatment of some of the celebrities on the show. The actress Amanda Abbington, who was paired with Giovanni Pernice, has said she found his alleged behaviour “unnecessary, abusive, cruel and mean”. Pernice's spokesperson has previously denied any allegations of threatening or abusive behaviour. He will not be returning for the show's series this year. McDermott has said she was involved in incidents in the Strictly Come Dancing training room that she now finds "incredibly distressing" to watch back. A spokesman for her professional dancer, Graziano Di Prima, later admitted to BBC News that he had kicked McDermott once in a rehearsal last year. Di Prima has also left the show. The BBC has said it will introduce measures to "strengthen welfare and support" on the show, including a chaperone who will be present "at all times" during training room rehearsals.
