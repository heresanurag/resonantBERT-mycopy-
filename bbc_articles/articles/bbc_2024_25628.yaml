title: Horse who led Queen's coffin procession given 'animals' OBE' - BBC News
date: '2024-10-02'
section: UK
url: http://www.bbc.co.uk/news/articles/c1k7w9mppw3o
content: |-
  Military horse Yogi is said to have provided "unique emotional support" to his riders throughout his career.

  A horse who led the procession of the Queen's coffin from Buckingham Palace to Westminster Hall has been awarded the "animals' OBE". Lord Firebrand, known as Yogi, was awarded the PDSA Order of Merit in recognition of his outstanding devotion to society, including his role in the late monarch's lying in state and other royal events. The military working horse, who was part of the King's Troop Royal Horse Artillery based in Woolwich, retired in December 2023 and is the 55th recipient of the medal. The charity said he had provided "unique emotional support" to his riders throughout his career.

  Lord Firebrand, known as Yogi, had a 10-year career as a military horse

  Known for his calm temperament, Yogi was entrusted to lead at major ceremonies including the state opening of Parliament, state visits, the Platinum Jubilee celebrations and Trooping the Colour. His rider, Capt Amy Cooper, said Yogi was the only horse she could trust to deliver "such a high-profile parade, under such scrutiny and pressure." Capt Cooper said: "Yogi is always the first choice for any parade commander." The PDSA, the UK's largest veterinary charity, is celebrating a decade of awarding the medal, described by the animal charity as the "animals' OBE", to animals who have demonstrated outstanding devotion to their owner or wider society. Jan McLoughlin, PDSA director general, said Yogi went "beyond his general role and responsibility by supporting his rider during high-pressure occasions." Also honoured at the ceremony, was a pair of detection dogs who have conducted more than 1,000 police searches every year and uncovered more than £5m in criminal cash. Yoyo and Scamp are the 53rd and 54th recipients of the award. Last year, a Labrador was awarded with a medal for his 11-year career as a fire investigation dog.
