title: 'Viewpoint: The ''delicious spectacle'' of President Trump - BBC News'
date: '2017-01-19'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-38664788
content: |-
  The first of two animated opinion pieces for BBC Newsnight looking ahead to Donald Trump's presidency. Roger Kimball, art critic, social commentator and editor of The New Criterion, says the moral panic needs to stop.

  The inauguration of Donald Trump as president of the US is on Friday.

  What does he represent? What might his presidency bring? In the first of two very personal viewpoints for BBC Newsnight, Roger Kimball, art critic, social commentator and editor of the magazine The New Criterion, says the moral panic needs to stop.

  Watch the second opinion piece - from Trump critic Andrew Sullivan - here.
