title: UK & Ireland sole bidder for Euro 2028 after Turkey withdraws to focus on Euro
  2032 - BBC Sport
date: '2023-10-04'
section: General
url: http://www.bbc.co.uk/sport/football/67003581
content: |-
  The UK and Republic of Ireland are now the only bidders for Euro 2028 after Turkey withdraws to focus on a joint bid with Italy for Euro 2032.

  Last updated on .From the section European Football

  The UK and Republic of Ireland will now bid unopposed for Euro 2028 after Turkey withdrew to focus on a joint bid with Italy for Euro 2032.

  Turkey agreed to merge their Euro 2032 bid with Italy in July and that has now been approved by governing body Uefa.

  While Italy had only bid for the 2032 tournament, Turkey had bid to host both Euro 2028 and 2032.

  Both bids still need official approval by Uefa at a meeting of its executive committee on Tuesday.

  "These are exciting times and we have a very compelling Euro 2028 proposal for Uefa," read a joint statement from the five national associations, from England, Scotland, Wales, Northern Ireland and the Republic of Ireland.

  "Our bid will be ground-breaking for the men's Euros and will deliver lasting legacies across the whole of the UK and Ireland."

  Uefa said: "The presentations at that meeting will be an important part of the process which will take due consideration of the content of the bid submissions before reaching a decision."

  Turkey hosted June's Champions League final between Manchester City and Inter Milan at Istanbul's Ataturk Olympic Stadium, but a major international tournament has never been held in the country.

  Reigning European champions Italy hosted the Euros in 1968 and 1980 and Rome's Stadio Olimpico was also used as a venue at Euro 2020.

  In April, 10 grounds were selected for the UK and Republic of Ireland's bid, including Glasgow's Hampden Park, Cardiff's Principality Stadium, Dublin's Aviva Stadium and Wembley in London.

  Belfast's Casement Park and Everton's Bramley-Moore Dock, the former unbuilt while the latter is still under construction, are also included in the bid.

  The Republic of Ireland, Northern Ireland and Wales have never hosted a major tournament.

  England were one of the 11 countries to host Euro 2020 along with Scotland, as well as being sole hosts of the 1966 World Cup and Euro 96.

  A review into disorder at the Euro 2020 final, held in London at Wembley, found"ticketless, drunken and drugged-up thugs" could have caused death as they stormed the stadium.
