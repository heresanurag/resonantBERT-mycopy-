content: |-
  Carlos Alcaraz keeps alive his hopes of retaining his Wimbledon title by coming through a five-set thriller against Frances Tiafoe.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Defending champion Carlos Alcaraz avoided a surprise exit at Wimbledon by holding off American Frances Tiafoe in a five-set thriller. The Spaniard won an intense match 5-7 6-2 4-6 7-6 (7-2) 6-2 in front of a raucous Centre Court crowd. It keeps Alcaraz's hopes of winning back-to-back major titles alive after triumphing at the French Open last month. "Obviously it is always a big challenge playing against Frances," said third seed Alcaraz. "All I was thinking is 'fight one more ball'." Friday's first match on the main show court lived up to the pair's previous meeting in the semi-finals of the 2022 US Open. Alcaraz was the victor on that occasion as well, beating Tiafoe in a five-set epic on the way to winning his first Grand Slam title. World number one Jannik Sinner is also through to the last 16 after an emphatic 6-1 6-4 6-2 win against Miomir Kecmanovic.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'That was extraordinary!' - Daria Kasatkina tops shots of the day five

  Tiafoe was seeded 10th at Wimbledon last year, but he has since dropped down the rankings and suffered second-round exits at this year's Australian Open and French Open. Now 29th in the world rankings, he frustrated Alcaraz throughout and received the early backing of the crowd after coming back from a break down to take the opening set. "He is a really talented player, really tough to face," Alcaraz added. "He deserves to be at the top, he deserves to fight for big things." Alcaraz, who had not dropped a set at the Championships until then, regained control in the second, but a single break of serve was enough for Tiafoe to win the third. The American waved to the crowd and pointed to his ears, calling for more noise under the closed Centre Court roof. The fans willingly obliged, cheering on the 26-year-old through the fourth set until it reached a tie-break after both players' serve held firm. Sensing the crowd were on his opponent's side, Alcaraz whipped up emotion with cries of "vamos" after striking huge winners and he cruised his way through to force a decider. From there it was plain sailing for the three-time major winner, who broke twice before raising his arms in celebration after sealing the victory with a delightful drop shot. He will play American Brandon Nakashima or French 16th seed Ugo Humbert in the fourth round.

  This video can not be played To play this video you need to enable JavaScript in your browser. Best shots: Jannik Sinner sails through straight set win against Miomir Kecmanovic

  Only four men's singles matches, including Alcaraz's, were completed on Friday, with play on the outside courts ending early because of the weather. Australian Open champion Sinner was one of those to benefit from the use of the show courts, featuring last on Centre Court to book his place in round four. The top seed raced through the first set in 21 minutes and was on course for a bagel after breaking opponent Kecmanovic twice, but the Serbian managed to salvage one game. World number 52 Kecmanovic found his feet in the second set but it was still all on Sinner's terms as he wrapped up the match in one hour and 36 minutes. Sinner will play either American 14th seed Ben Shelton or Canada's Denis Shapovalov next. Shelton leads Shapovalov 3-2 in the first set of their match, which will resume on Saturday at 13:00 BST on Court One after rain halted play on Friday. Queen's champion Tommy Paul wrapped up a 6-3 6-4 6-2 win over Alexander Bublik on court two before the rain arrived. Meanwhile, Bulgarian 10th seed Grigor Dimitrov moved past Frenchman Gael Monfils 6-3 6-4 6-3 under the Court One roof. Nakashima and Humbert's third-round tie was suspended just before the fourth set headed to a tie-break, while fifth seed Daniil Medvedev leads Jan-Lennard Struff by two sets to one.
