title: 'Salford: Baby''s remains found in field near motorway bridge - BBC News'
date: '2024-11-21'
section: Manchester
url: http://www.bbc.co.uk/news/articles/c0en27ppzzlo
content: |-
  Detectives are trying to establish the baby's identity as well as when and how he or she died.

  A cordon has been put up around the area where the remains were found which is close to the M61

  A baby's body has been discovered in a field, police have said. The infant's remains were found at about 12:30 GMT by a woman who had been walking her dog near Ashtons Field in the Little Hulton area of Salford. Greater Manchester Police (GMP) said detectives were working with other agencies to establish the identity of the infant it was calling "Baby A", as well as how and when he or she had died. The force, which confirmed a post-mortem examination would take place in the next two days, said it was too early to know Baby A's gender, ethnicity or age and how long the infant's body had been in the field, which is close to a bridge over the M61.

  The body was found close to Ashtons Field in the Little Hulton area of Salford

  GMP's district commander for Salford, Ch Supt Neil Blackwood, said: "At this stage we are following several lines of inquiry and we are working with local partner agencies. "We know this news will devastate our communities and while we do not have all the answers yet... I want to reassure residents we will do all we can to find out what has happened."

  Ch Supt Neil Blackwood said it was "too early" to know Baby A's gender, ethnicity or age

  The chief superintendent urged anyone with any information to come forward. "The most important thing for us right now is to find answers for this baby," he said. "Even the most minor of detail could be crucial to our investigation. "If you have seen anyone in the area over the last few days, or know who the parents could be, please call as soon as you can. "As soon as we are in the position to confirm further details about the circumstances, we will do so."
