content: |-
  Ahn Gwi-ryeong faced off with armed soldiers who were sent to stop lawmakers from entering parliament in Seoul.

  'We had to stop this': Woman who grabbed South Korean soldier's gun speaks to BBC

  This video can not be played To play this video you need to enable JavaScript in your browser.

  A chaotic night in South Korea produced scenes most thought were consigned to the nation’s history. One in particular has caught the attention of many: a woman confronting soldiers who were sent to block lawmakers from entering the National Assembly. Footage of Ahn Gwi-ryeong, 35, a spokesperson for the opposition Democratic Party, grabbing the weapon of a soldier during the commotion has been shared widely online. “I didn’t think... I just knew we had to stop this,” she told the BBC Korean Service. Ahn made her way to the assembly building as soldiers descended on it, shortly after the president declared martial law across South Korea. Like many in South Korea’s younger generation, the word “martial law” was foreign to her. It was last declared in 1979. When Ahn first heard the news, she admitted “a sense of panic took over”.

  When martial law is declared, political activities like rallies and demonstrations are banned, strikes and labour actions are prohibited, and media and publishing activities are controlled by the authorities. Violators can be arrested or detained without a warrant. Shortly after the declaration of martial law, opposition leader Lee Jae-myung called on lawmakers to gather in the National Assembly and hold a vote to annul the declaration. Arriving at the assembly building just past 23:00 local time, Ahn recalled turning off office lights to avoid detection as helicopters circled overhead.

  Ahn Gwi-ryeong was among a crowd who refused to let soldiers block entry to the National Assembly

  By the time she reached the main building, soldiers were engaged in a stand-off with officials, aides and citizens. She said: “When I saw the armed soldiers... I felt like I was witnessing the regression of history.” Ahn and her colleagues were desperate to prevent the troops from entering the main building, where the vote would be held. They locked the revolving doors from the inside and piled furniture and other heavy objects in front of the doors. “Honestly, I was scared at first,” she said, adding: "But seeing such confrontation, I thought, ‘I can’t stay silent’."

  The assembly passed the resolution calling for the lifting of martial law at around 01:00. All 190 members who were present voted to repeal it. At 04:26, President Yoon announced he was reversing his decision. After the chaos subsided, Ahn slept for a short time inside the assembly building. She continued: “I was actually a little scared to go outside the assembly in the morning because there didn't seem to be any taxis running, and after such a storm last night, it was hard to get back to reality.” During her conversation with the BBC, Ahn was wearing the same black turtleneck and leather jacket she had been wearing in the footage from the night before. At times, she was overcome with emotion. “It’s heartbreaking and frustrating that this is happening in 21st century Korea,” she said.
