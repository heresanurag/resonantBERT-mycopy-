content: |-
  Residents near the blaze at Yokesford Hill Industrial Estate are advised to shut their windows.

  Firefighters have advised residents near Yokesford Hill Industrial Estate to stay inside and keep windows shut

  A blaze involving 35,000 tonnes of waste has broken out at an industrial estate.

  Hampshire & Isle of Wight Fire & Rescue Service has been at the scene at Yokesford Hill Industrial Estate in Romsey since about 04:00 BST.

  Nearby residents have been advised to stay inside and keep windows shut due to the spread of smoke.

  Yokesford Hill has been closed and members of the public have been advised to avoid the area.

  Crews have been on the scene since about 05:00 BST

  A spokesperson for the fire service said the cause of the blaze was currently unknown.

  They said 18 crews were attending the blaze and "expected to be there for some time".

  Yokesford Hill has been closed while firefighters continue to tackle the blaze

  Portchester Fire Station said the fire involved 35,000 tonnes of waste

