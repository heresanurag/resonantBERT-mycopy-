title: 'Six Nations 2025: Dan Sheehan to captain much-changed Ireland against Wales
  - BBC Sport'
date: '2025-02-20'
section: Irish Rugby
url: http://www.bbc.co.uk/sport/rugby-union/articles/c5y0jgwvxeqo
content: |-
  Dan Sheehan is named captain of a much-changed Ireland team for Saturday's Six Nations game against Wales in Cardiff.

  Sheehan becomes the 111th men's player to captain Ireland in a Test match

  Coverage: Watch on BBC One; listen on BBC Sounds, BBC Radio Ulster & BBC Radio Wales; live text and highlights on BBC Sport website and app

  Dan Sheehan will captain Ireland against Wales in Saturday's Six Nations game in Cardiff. The hooker will lead the team for the first time with regular skipper Caelan Doris ruled out because of a knee injury. Sheehan, 26, came off the bench in Ireland's wins over England and Scotland but replaces the injured Ronan Kelleher in a team showing seven changes from the win at Murrayfield. Alongside Sheehan in the front row is Leinster tight-head prop Thomas Clarkson, who will make his first start after earning his debut in November, while loose-head prop Jack Boyle is set for his Test debut off the bench. Jack Conan replaces Doris at number eight, while Joe McCarthy returns to the second row after recovering from the head injury that ruled him out of the first two games. In the backline, Mack Hansen returns to the wing after missing the Scotland game while Garry Ringrose is named to start alongside Robbie Henshaw in midfield, with Bundee Aki dropping to the bench. Jamie Osborne will make his Six Nations debut at full-back, replacing Hugo Keenan, with Sam Prendergast retained at fly-half after impressing in his away debut against Scotland. Gus McCarthy and Cian Prendergast - Sam's brother - are also set to make their Six Nations debuts off the bench.

  Ireland are hoping to clinch the Triple Crown and move one step closer to the Grand Slam and a third successive title with victory over Wales, who have lost their past 14 Tests. Wales will be under the charge of interim head coach Matt Sherratt for the first time after replacing Warren Gatland last week. "Playing Wales in Cardiff is one of the great tests and we know the challenge that awaits us," said Ireland interim head coach Simon Easterby. "With a new coaching set-up in place, Wales will be re-energised and determined to impress in front of a vocal home support. "There will also be a huge Irish travelling support which, when added to the closed roof and the great respect and rivalry between the two nations, will add to an electric atmosphere."

  Being named the 111th men's player to captain Ireland in a Test match caps Sheehan's impressive comeback from injury. The 26-year-old suffered an anterior cruciate ligament injury in Ireland's series against South Africa last summer, but returned in time to captain Leinster against the Stormers in January before making an impact off the bench in the wins over England and Scotland. "We have made a few changes to the squad this week, some of which were enforced, and we're confident that the 23 we have selected are primed and ready to go," added Easterby. "Dan Sheehan's selection as captain is recognition of his high standing within the squad, both on and off the pitch. I have no doubt that he will relish the opportunity to lead Ireland for the first time. "Equally, I would also like to congratulate Jack Boyle on his inclusion in the match day squad for the first time. Jack has impressed for his province Leinster and in the national training camps over the last number of months and he is a young forward with a bright future."

