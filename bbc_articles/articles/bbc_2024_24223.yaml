title: Vigil to be held for man, 80, killed in park attack - BBC News
date: '2024-09-07'
section: Leicester
url: http://www.bbc.co.uk/news/articles/c0l856ze82eo
content: |-
  A memorial gathering was held after Bhim Kohli was fatally attacked while walking his dog.

  The vigil was held at the civic centre in Braunstone

  A vigil has been held in memory of an 80-year-old man who died after being attacked at a park. Bhim Kohli was walking his dog Rocky at Franklin Park in Braunstone Town, Leicestershire, on Sunday evening when he was assaulted. He died later in hospital. A 14-year-old boy has been charged with his murder and appeared in court on Thursday. The vigil on Friday evening, at the Memorial Garden at Braunstone Civic Centre off Welcome Avenue, saw dozens of residents attend.

  Bhim Kohli's family described him as "a loving husband, dad and grandad".

  Shortly before the vigil began, Nick Brown, leader of Braunstone Town Council, said: “It’s an opportunity for the community to show its support for the family and show its solidarity with them and to show its love for them. “But it is also to pay tribute to Bhim, who was a valued member of this community. “This isn’t a moment for speeches by councillors, it is for people coming together with the family.” The event was organised by members of the community with the support of the council and in consultation with the family, Mr Brown said.

  Mr Kohli died in hospital following the attack, which happened near the park's Bramble Way entrance at about 18:30 on Sunday. In a statement, his family described him as "a loving husband, dad and grandad". "Bhim loved to laugh," they said.

  Bouquets and candles have been left in the days since the attack

  The teenager accused of his murder, who cannot be named for legal reasons, is next due to appear at Leicester Crown Court for a plea and trial preparation hearing on 11 October, with a provisional trial date set for 17 February. Meanwhile Leicestershire Police has renewed its appeal for witnesses and information. Chief Constable Rob Nixon said: "Local officers are still in the area, still identifying information both for the incident itself but also on events that may have led up to that incident as well. "We certainly recognise this has had a big impact on the local community."

