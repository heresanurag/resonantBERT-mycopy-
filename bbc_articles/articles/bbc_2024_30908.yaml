content: |-
  Bhim Kohli was attacked in Franklin Park, Leicestershire, in September and died a day later.

  Bhim Kohli was walking his dog Rocky when he was attacked

  A 12-year-old girl has been charged with manslaughter after the death of an 80-year-old man in Leicestershire. Bhim Kohli died on 2 September, a day after being attacked at Franklin Park in Braunstone Town while walking his dog Rocky. The girl, who cannot be named because of her age, appeared at Leicester Youth Court - sitting at Leicester Magistrates' Court - earlier and was released on bail. She is next due at Leicester Crown Court on 3 February. A 15-year-old boy has previously been charged with Mr Kohli's murder.

  He is due to enter a plea at Leicester Crown Court on Wednesday, and a provisional trial date of 17 February has been set.

  The attack occurred at Franklin Park on the evening of 1 September

  Leicestershire Police said the attack occurred near the park's Bramble Way entrance at about 18:30 BST on 1 September. In a statement, his family described him as "a loving husband, dad and grandad". "Bhim loved to laugh," they said. "He was always very happy and talkative, the joker of the family and always loved to outsmart us with a smile." Because of prior police contact with the victim, Leicestershire Police made a voluntary referral to the Independent Office of Police Conduct (IOPC). Following further contact with the IOPC, the force then made a mandatory referral. "We will carry out an assessment to decide what further action may be required from us," an IOPC spokesperson added.

