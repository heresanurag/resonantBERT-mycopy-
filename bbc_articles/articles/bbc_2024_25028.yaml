title: 'Dungannon: Three arrested after child dies - BBC News'
date: '2024-10-14'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c756y5xpk70o
content: |-
  The death happened in Windmill Court in Dungannon, County Tyrone, on Sunday 13 October.

  Police say they are treating the death as suspicious

  The death of a child in County Tyrone is being treated as suspicious, police have said. A man and two women, all aged in their 20s, have been arrested. The child died at an address in Windmill Court in Dungannon, on Sunday. A post mortem examination will take place to determine the cause of death.

  Sinn Féin assembly member for Fermanagh and South Tyrone Colm Gildernew said the death of the young child was a "tragedy" and offered his condolences to the family. "Inevitably there will be shock and sadness at the loss of such a young life and that will reverberate throughout the town of Dungannon," he added.

  The child died on Sunday, police say

  Speaking at Stormont on Monday, Deborah Erskine, Democratic Unionist Party (DUP) assembly member for Fermanagh and South Tyrone, urged the public not to speculate about the "tragic" incident. "This is a death of a child, which is very concerning and very worrying," she told BBC News NI. "I’m asking that the public don’t speculate to allow the police to do their job in fully investigating this so that it can be brought to a conclusion as swiftly and as quickly as possible." Erskine added there would be "widespread concern, worry and shock" not just in Dungannon but across Northern Ireland.

  Social Democratic and Labour Party councillor Karol McQuade called for anyone with information to contact the police, adding: "It’s just tragic when a child has been involved in an incident like this." Barry Monteith, an independent councillor for Mid Ulster, said the death was "extremely shocking and tragic". "All we can do is have our thoughts and feelings for all the people that love that child and express sympathy, because every child deserves love," he added.
