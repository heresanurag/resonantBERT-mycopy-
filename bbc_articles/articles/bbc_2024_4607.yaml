  A selection of striking images from around the world, taken over the past seven days.

  A British Airways Concorde jet is transported across the Hudson River to the Intrepid Museum in New York after undergoing a seven-month restoration. The aircraft, which was retired in 2003, was known for its supersonic speed of flying from New York to London in less than three hours.
