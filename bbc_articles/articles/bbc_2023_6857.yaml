title: Escaped water buffalo herd wreck Essex swimming pool - BBC News
date: '2023-05-22'
section: General
url: http://www.bbc.co.uk/news/uk-england-essex-65674881
content: |-
  A couple win compensation from a farm after the animals cause £25,000 of damage in the garden.

  A couple have won compensation after a herd of water buffaloes escaped from a farm and wrecked their new swimming pool.

  CCTV captured the moment the animals fell through the pool cover and into the water, causing £25,000 of damage.

  The farmer managed to rescue them unharmed after the incident at the home in Wivenhoe, near Colchester, Essex in July.

  An NFU Mutual spokesperson confirmed the claim had been "settled and paid".
