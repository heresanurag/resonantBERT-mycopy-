title: 'St Helens stabbing: Manhunt after woman knifed to death - BBC News'
date: '2018-11-25'
section: Liverpool
url: http://www.bbc.co.uk/news/uk-england-merseyside-46329898
content: |-
  Police want to speak to Adam Brettle, 23, from Warrington, about the death of a 29-year-old woman.

  People are advised not to approach Adam Brettle

  A manhunt has been launched after a woman was fatally stabbed in Merseyside.

  The 29-year-old victim was found with several wounds at a property in Swan Avenue, St Helens, by police officers just before midday on Saturday.

  She died at the scene despite the efforts of paramedics and an air ambulance crew.

  Police, who believe the victim knew the offender, want to speak to Adam Brettle, 23, from Warrington.

  Officers advised members of the public not to approach him.

  Det Ch Insp John Williams, from Merseyside Police, said: "I would advise the public not to approach Brettle directly if you see him, but to call police on 999 immediately so that we can take the necessary action.

  "I also want to make it clear that having any current association with Brettle will bring police officers to your door, so I would encourage anyone with information to do the right thing and come forward as soon as possible."

  A post-mortem examination is due to take place to establish the cause of death.

