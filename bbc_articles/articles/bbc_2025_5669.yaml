title: Zelensky hopes for 'meaningful' US-Ukraine talks next week - BBC News
date: '2025-03-07'
section: World
url: http://www.bbc.co.uk/news/articles/cly2dz0qgxlo
content: |-
  The talks in Saudi Arabia come as both sides seek to heal a rift after presidents Zelensky and Trump clashed in public.

  Zelensky hopes US-Ukraine talks next week will be 'meaningful'

  President Zelensky revealed that Ukrainian and American teams had already "resumed work"

  US-Ukraine talks will be held in Saudi Arabia next week, President Volodymyr Zelensky has said, expressing hopes that it will be "a meaningful meeting". The Ukrainian leader, who will be in the Gulf kingdom but not take part in the talks, said Kyiv was working to reach a "fast and lasting" peace. US President Donald Trump's special envoy, Steve Witkoff, said the American team wanted to discuss a "framework" for peace to try to end the Russia-Ukraine war. Last Friday, Zelensky and Trump were involved in a public clash at the White House - during which Trump said Zelensky was not ready to end the fighting. The US proceeded to pause military aid to Ukraine and stop sharing intelligence.

  The Ukrainian president has expressed regret about the incident and tried to repair relations with the US - the country's biggest military supplier. On Thursday, Witkoff said Trump had received a letter from Zelensky that included an "apology" and "sense of gratitude". "Hopefully, we get things back on track with the Ukrainians, and everything resumes," Witkoff said. Zelensky has been under strong US pressure to make concessions ahead of any peace talks, while the Ukrainian president has been pushing for firm security guarantees for Kyiv. Russia launched a full-scale invasion of Ukraine in February 2022, and now controls about 20% of Ukrainian territory. The fighting continues, with Ukraine on Thursday night reporting a "massive missile and drone" attack on its energy infrastructure. The Polish military also said it was forced to scramble fighter jets and activate ground-based air defence systems amid the attack, which threatened regions as far as western Ukraine.
