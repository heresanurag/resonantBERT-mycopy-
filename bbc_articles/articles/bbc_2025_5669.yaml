  Zelensky announced the US-Ukraine talks in Saudi Arabia in a series of posts on social media, after attending Thursday's crisis summit in Brussels where European Union leaders endorsed plans for a boost in defence spending. "Ukrainian and American teams have resumed work, and we hope that next week we will have a meaningful meeting," he wrote on X. "Ukraine has been seeking peace since the very first moment of the war, and we have always stated that the war continues solely because of Russia." Zelensky urged the global community to put more pressure on Moscow so it "accepts the need to end" the war. He also made an apparent reference to a truce plan outlined earlier this week by French President Emmanuel Macron, which proposed a ceasefire in the air and at sea, and an end to attacks on energy and other civilian infrastructure. Russia has not publicly commented on the French proposals. On Thursday, Putin said Moscow was seeking a peace "that would ensure calmness for our country in the long-term perspective. "We don't need anything that belongs to others, but we won't give up anything that belongs to us either," the Kremlin leader added. China's Foreign Minister Wang Yi said he hopes a "fair, lasting, binding peace agreement that every side can accept" could be struck. Russia annexed Ukraine's southern Crimea peninsula in 2014, and claims another four Ukrainian regions in the south-east as its own - although Moscow doesn't fully control them. Ukraine and its European allies have in recent weeks expressed alarm over what many on the continent see as Donald Trump's overtures to Russia. Trump vowed during the US election campaign to bring the war to an end quickly, and preliminary US-Russian talks were held in Saudi Arabia last month - without European or Ukrainian representatives present. The US's decision to halt its military aid Ukraine has been cast by Trump administration officials as a means of getting Kyiv to co-operate with the US-led peace talks. Any corresponding pressure the US has been putting on Moscow to make concessions has not been made public.

