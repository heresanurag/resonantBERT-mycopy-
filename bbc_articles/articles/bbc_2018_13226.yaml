title: EU leaders still hope for post-Brexit fishing access - BBC News
date: '2018-11-25'
section: Scotland politics
url: http://www.bbc.co.uk/news/uk-scotland-scotland-politics-46328763
content: |-
  Scotland's first minister warns of broken promises to the fishing industry, as the EU signs off the Brexit deal.

  Nicola Sturgeon has warned of broken promises over fishing as EU leaders agreed to Theresa May's Brexit deal.

  A document published by the remaining 27 EU countries made clear they hoped to negotiate access to UK waters based on existing rights.

  Ms Sturgeon said that could not be squared with promises made to the UK fishing industry.

  Theresa May has said her deal would take the UK out of the controversial Common Fisheries Policy (CFP).

  The prime minister and EU27 leaders approved the Brexit deal on Sunday after less than an hour's discussion at a meeting in Brussels.

  But a document published online made clear the remaining EU members were still seeking to negotiate continued access to UK fishing grounds during the two-year transition period.

  The document said a fishing deal was a priority and "should build on, inter alia, existing reciprocal access and quota shares".

  Scottish Secretary David Mundell has previously said he could not support any extension of CFP rules beyond 2020.

  Ms Sturgeon tweeted: "I'll be interested to hear David Mundell explain how this - 'existing reciprocal access and quota shares' - can be squared with the promises made to the Scottish fishing industry. (Hint - it can't)."

