content: |-
  The 55m-tall ride "failed and crashed", emergency services say.

  Two in hospital after fair ride 'drops to ground'

  This video can not be played To play this video you need to enable JavaScript in your browser. Emergency services have placed a cordon around the scene

  Two women have been taken to hospital after a fairground ride "failed and crashed" in Birmingham city centre. West Midlands Fire Service said the ride had "dropped to ground level whilst in operation" in Centenary Square. Images taken by the BBC show wires from at least two gondolas on the 55m tall City Flyer ride tangled up with each other. Emergency services were called to the scene at 19:29 GMT on Thursday.

  West Midlands Ambulance Service said the two women's injuries were not thought to be serious but they were taken to Midland Metropolitan University Hospital. Another 11 patients were assessed and discharged at the scene. West Midlands Police has a cordon in place between the ice rink, the library and the Rep theatre, with people asked to avoid the area.

  One witness at the scene told the BBC he had seen "girls who appeared to be injured" walking away from the area, with "one girl who seemed to have her face cut". Lilly Nitsch, 18, from Leamington Spa, was at the scene and told the BBC she was shocked by the incident. "That's one of my favourite rides growing up," she said. "It makes me think of of the times you've been on rides like that. It makes me feel lucky." The City Flyer ride, run by funfair suppliers Danter Attractions, has been described as "one of the tallest rides around".

  Amelie Huet, 18, was in the ice skate bar nearby with a group of friends during the incident. She told the BBC she had gone out on to the balcony after hearing sirens, and had seen ambulances, police cars and fire engines. "Someone told us the structure dropped and someone fell out," she said.

