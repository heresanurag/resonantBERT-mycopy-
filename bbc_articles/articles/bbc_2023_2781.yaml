  Ukraine's president tells EU leaders in Brussels that his country's fight is not just to defend Ukraine, but Europe's way of life.

  UK wants to train Ukraine's pilots 'as quickly as humanly possible'

  The UK wants to train Ukrainian pilots to use its aircraft "as quickly as humanly possible", Downing Street has said. A key aim of Zelensky's tour of European capitals has been to lobby for the supply of fighter jets, but doubts have been raised about how many Western nations could spare and how quickly Ukrainian pilots could be trained to use them. Discussing the issue with reporters, the prime minister's spokesman said: "Obviously we can train them on aircraft the UK [has]. "What we can also do at the same time is instruct trainees on tactics and procedures that all Nato nations use." Asked about how long the training could take, the spokesman said: "What we are doing is exploring how quickly this can be done, particularly given some Ukrainian pilots may have years [of experience], albeit in Soviet-era jets that are very different to our own." He added that the UK was working with the Ukrainian military to "adapt our training and get pilots up to full flying standard as quickly as humanly possible".
