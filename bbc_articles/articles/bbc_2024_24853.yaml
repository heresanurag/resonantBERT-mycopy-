content: |-
  As hurricanes devastate Florida, influencers have been risking their lives with livestreams and stunts.

  Influencers risking death in hurricanes for clicks and cash

  This video can not be played To play this video you need to enable JavaScript in your browser.

  While millions of people in Florida fled Hurricane Milton, Mike Smalls Jr ventured into the violent winds in Tampa, Florida, holding a blow-up mattress, an umbrella and a pack of ramen noodles. He went outside Wednesday evening as the storm pounded the US state and livestreamed on the platform Kick. He told his online audience if he reached 10,000 views, he would launch himself and his mattress into the water. Once he hit the threshold, he took the plunge. Then he got worried: “The wind started picking up and I don’t know how to swim...so I had to grab on to the tree.” The area was under an evacuation order - meaning residents had been advised by local officials to leave their homes, for their own safety. Mike’s hour-long stream from Tampa Bay has more than 60,000 views on the streaming platform Kick, and has been seen by millions after being clipped up and posted on other social-media platforms, including X. Live streaming - filming yourself in real time - has become increasingly lucrative for content creators looking to make quick money. But these streams can involve dangerous stunts, as content creators try to stand out in an increasingly competitive environment. Many people have criticised Mike's behaviour on social media, suggesting he’s risking his life for clicks. He made it safely - and told me he'd do the risky stunt again, “if the price is right”. When asked about the backlash, he admits what he did was “controversial” and acknowledges that some might think he is risking not just his life, but the lives of those who might have to save him. But, he added: “From a content creator standpoint, people like to see kind of edgy things."
