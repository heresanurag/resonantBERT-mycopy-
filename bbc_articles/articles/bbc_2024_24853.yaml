  • None Helene is deadliest mainland US hurricane since Katrina The Tampa Police Department said in a statement: “Ignoring mandatory evacuation orders puts lives at risk. When individuals disregard these warnings, they not only jeopardise their own safety, but also create additional challenges for first responders who are working tirelessly to save lives. "Intentionally placing oneself in harm's way could divert critical resources and delay vital rescue operations for others." Hundreds of people have died during this year’s hurricane season, which has devastated parts of the US south-eastern coast. Millions had been forced to evacuate as Hurricane Milton, which at its peak was measured as a category 5 storm, made landfall on Wednesday along Florida's Gulf Coast. At least 16 people have died in the storm, millions are still without power and thousands had to be rescued by first responders as water overtook homes. Hurricanes Helene and Milton have bookended an exceptionally busy period of tropical weather in the US. In less than two weeks, five hurricanes formed - not far off from what the Atlantic would typically see during an entire year.

  Mike Smalls Jr floated on a mattress during one hurricane and pitched a tent under an overpass for another

  Mike is one of a number of content creators on social media platforms, including Kick and TikTok, who have been livestreaming and making money from pulling reckless stunts and risking their lives in hurricanes. Livestreaming content is Mike’s full-time job, he says. Previous stunts posted on his profile include setting fireworks off inside a bedroom and winding up staff in fast-food restaurants. His plan for livestreaming Hurricane Milton was: “Get some nice clips, and then, if things get too wild, I can, just, you know, track my little five, 10-minute walk back home,” he added. This wasn’t the first time he’d exposed himself to danger. A few weeks before Milton struck, he went out into Hurricane Helene - which also hit Florida - carrying a tent as a prop and livestreamed for more than five hours. He filmed himself on his phone holding up the tent in an underpass, saying he was “going to survive the hurricane. Why? To entertain the people”. Just metres away, the ocean was crashing over barriers. “It's my job just to entertain and think of creative things to entertain my chat. And if people want to, you know, if they're inspired by what I do, I respect it," he said, adding you have to gauge and "do things at your own risk". Platforms like Kick offer incentives: money for the number of views streamers get and donations from people who like what they’re doing. Smalls Jr did not specify how much money he earned from this particular livestream, but said the metrics vary from streamers, with some making $300 to $400 per hour. He added he made enough from his latest stream to pay a few bills.
