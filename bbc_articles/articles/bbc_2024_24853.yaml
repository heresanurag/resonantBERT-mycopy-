  It might appear, Mike says, that he’s doing anything for views, but he says he takes safety very seriously. Despite not knowing how to swim, he insists that he assessed the risks. He speaks with bravado after surviving the natural disaster: “I stayed here, and I didn’t die and I’m chilling." When asked to respond to specific questions on Smalls Jr and the platform’s responsibility, Kick said it is “a fiercely creator-first platform, and we do not influence the content our creators chose to stream. However, if that content breaches our Terms of Service, or is in any way illegal, then we can impose a ban or suspension". They did not comment when asked about whether Smalls Jr's action breach their specific community guidelines which detail: "Safety First: Prioritise safety for yourself, your audience, the public and anyone else involved." TikTok told the BBC that their monetisation guidelines lay out how some content is not eligible to earn money through LIVE features, including “content that tricks or manipulates others... exploits controversial issues to bait engagement, or exploits the suffering of vulnerable people”. Mike’s profile - and his hurricane content - is still available. When asked about endangering the lives of emergency workers, Smalls Jr said he knows what he's getting himself into. "Don’t save me," he said. "If I do another hurricane? All right. You ain't got to say nothing. I do not want to put your life at risk. No.”
