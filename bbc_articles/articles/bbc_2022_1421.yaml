title: 'Winter Olympics: Closing ceremony marks ends of 2022 Beijing Games - BBC Sport'
date: '2022-02-21'
section: Winter Olympics
url: http://www.bbc.co.uk/sport/winter-olympics/60451409
content: |-
  The Beijing Games closed on Sunday, with IOC president Thomas Bach calling for political leaders to be inspired by the athletes' "examples of peace".

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The Beijing Winter Olympics came to a close on Sunday in a touching ceremony. Almost 3,000 athletes competed in 109 events across 15 disciplines during the past two weeks. International Olympic Committee president Thomas Bach called for political leaders "around the world" to be inspired by the athletes' "example of solidarity and peace". "This unifying power of the Olympic Games is stronger than the forces that want to divide us," he said. Bach said the athletes had "given peace a chance," with his comments coming amid rising tensions between Russia and Ukraine. "Each and every one of you strived to achieve your personal best. We were deeply touched how you were wishing and cheering for your competitors to achieve their best as well," he said. "You not only respected each other: you embraced each other, even if your countries are divided by conflict."

  Bach also encouraged countries to continue vaccinating against Covid-19, saying: "If we want to finally overcome this pandemic, we must be faster. "We must aim higher, we must be stronger, we must stand together. Vaccination means caring for each other. "In this Olympic spirit of solidarity, we call on the international community: give equal access to vaccines for everybody around the world." Great Britain leave Beijing with two medals - gold in the women's curling and silver in the men's event. Curling skip Bruce Mouat, who led the men's rink, was the flagbearer for Team GB at the closing ceremony. The Olympic flame was extinguished, with the next Games taking place in Milan-Cortina in Italy in 2026. The Winter Paralympics begins in Beijing on 4 March.

  This video can not be played To play this video you need to enable JavaScript in your browser. Kamila Valieva misses out on medal after below-par performance in figure skating final

  The Beijing Games were engulfed by the controversy surrounding Russian figure skater Kamila Valieva and the teenager's failed drug test. The positive test came to light after the Russian Olympic Committee won gold in the team figure skating, with the 15-year-old becoming the first woman to land a quadruple jump at an Olympic Games. However, the medal ceremony was delayed, with it coming to light that Valieva had tested positive for a banned drug used to prevent angina attacks. After a series of appeals and re-appeals, Valieva was allowed to compete in the remaining individual events, but it has led to questions about her coaching team and the fairness of children competing in Olympic events, particularly as she crumbled in her final event. None of the podium athletes from the event have received their medals, with the IOC asking the World Anti-Doping Agency (Wada) to investigate the positive result. "Every athlete wants a fair playing field and we also want to protect the health and mental health of athletes," two-time Olympic champion Lizzy Yarnold said on BBC TV. "The biggest thing I have learned is remembering athletes are humans. We need to protect our young athletes." There have been moments of brightness. Norway will leave Beijing with a record 16 gold medals and 37 in total, having dominated in the snow. China's 18-year-old Eileen Gu became one of the stars of the Games with gold in the big air and halfpipe, while snowboarder Shaun White closed his career on the slopes. The biggest sporting surprise was America's Mikaela Shiffrin, a heavy pre-Games favourite to clean up in the skiing events. She crashed out of three of her best events and did not manage to grab a medal in the others. While the Games have been a success for China, who secured their best Winter Olympics medal haul, questions over human rights abuses and the safety of tennis player Peng Shuai that dominated the build-up to the competition remain.

