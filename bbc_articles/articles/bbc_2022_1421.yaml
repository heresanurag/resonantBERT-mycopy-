  This is Great Britain's lowest medal total since 2010, where they won a sole gold in the women's skeleton. UK Sport set a target of three to seven medals but there were a number of near-misses and disappointment in the sliding events, making it the first time since 2002 that Britain have failed to win a skeleton medal. Snowboarder Charlotte Bankes, 2018 skeleton bronze medallist Laura Deas and alpine skier Dave Ryding were among the medal hopes, but struggled for rhythm and form in Beijing. Britain's first medal of the Games came on Saturday in the men's curling, before Eve Muirhead's rink claimed gold on the final day. Sally Munday, the chief executive of UK Sport, said the "greatest progress can come if we really learn from disappointment". "I also know that whilst the last 24 hours has created real joy, there are a number of our athletes who will leave Beijing disappointed," Munday wrote. "Whilst there have been some memorable performances, many did not achieve the results they came for and no-one will be more disappointed than the athletes themselves. "We always knew that Beijing 2022 would be a challenge like nothing they had previously experienced. "We also know that the jeopardy that makes sports on snow and ice such a compelling spectacle for those of us watching is also a recipe for uncertainty. This undeniably played its part in preventing some of our medal hopes from achieving their dreams."

