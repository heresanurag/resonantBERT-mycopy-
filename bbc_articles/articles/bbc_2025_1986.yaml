content: |-
  Luton Town fans brace themselves for relegation as their team are beaten 2-0.

  Luton Town fans have predicted their team will be relegated after rivals Watford won the M1 derby 2-0.

  During Saturday's showdown at Vicarage Road, the Hatters, who had won only one of their 26 previous away games across two seasons, managed few meaningful efforts on target.

  Last season, Luton were relegated from the Premier League and the club now sits at the bottom of the Championship, five points from safety, with just 12 games left to play.

  Luton have not won a league game at Vicarage Road since 1994.

