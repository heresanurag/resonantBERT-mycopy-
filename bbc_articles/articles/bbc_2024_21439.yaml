  The video message from the Princess of Wales gives us a glimpse of the Wales' home life in Norfolk.

  In pictures: Kate's video offers glimpse of royal life in Norfolk

  The Princess of Wales has spoken of her focus on being cancer-free in a new video message. Kensington Palace has said the message was filmed in August in Norfolk by Will Warr, a freelance wedding videographer from London.

  Princes Louis and George play in front of the video camera while their mother Catherine looks on in this scene

  Catherine's family assembled for a group photograph - all smiling and looking at the camera

  The video has a retro feel in parts - here, Catherine and Princess Charlotte sit together on a picnic blanket and share food

  Family is a recurring theme - William, Prince Louis, Prince George, and their maternal grandfather Michael Middleton are seen here playing cards

  In this scene, Princes Louis and George sit alongside their father on a picnic blanket as Kate hands over a cheese board

  The video contains many intimate family moments, such as this one of the Prince and Princess of Wales sharing a laugh while in a forest

  They are also seen here in a more relaxed setting on the beach

  The video also shows the couple holding hands

  The video, shot in autumnal colours, suggests how pleased she is to have completed this stage of her treatment

  In the video, she says her experience has given her a "renewed sense of hope and appreciation of life"

  She says this year has show her how "life as you know it can change in an instant"
