title: Mum-to-be found out she had breast cancer while 36 weeks pregnant - BBC News
date: '2024-11-14'
section: Manchester
url: http://www.bbc.co.uk/news/articles/c05z89dj88go
content: |-
  After a Caesarean section, Laura Hudson had to endure chemotherapy and have a mastectomy.

  'My cancer was found as I was about to give birth'

  Laura Hudson's aggressive breast cancer was only diagnosed at the end of her pregnancy

  Laura Hudson was 36 weeks pregnant with her first child when she found out she had an aggressive form of breast cancer. Within a matter of days she was preparing not only for a Caesarean section to deliver her baby, but also to undergo chemotherapy and have a mastectomy. Laura, from Astley near Wigan, can barely believe what has happened to her as she recalls the events of the last 12 months. She and her husband Sam are now celebrating Aurora's first birthday together, and the couple are incredibly relieved that Laura has been declared cancer free.

  The family celebrated Aurora's first birthday one year after her mum's cancer diagnosis

  Laura, now 34, said she first realised something was wrong when she felt a lump in her right breast. Not overly concerned, she nevertheless told her GP, who thought it was "most likely to do with pregnancy" and asked her to return after two weeks. "At that next appointment, I thought it had got bigger and the doctor agreed and sent off the request for further checks," Laura recalled. She told BBC Radio Manchester she was lucky to find it and then "follow her instincts" by going to the GP. Because her lump had grown so quickly, medics wanted to start treatment as soon as possible at The Christie NHS Foundation Trust's centre in Wigan. Laura said she and Sam were "so shocked because it's not something you expect, especially during pregnancy". She added: "My first thought was for my baby."

  Laura and Sam said her cancer diagnosis had come as "such a shock"

  While the newly expanded family were able to spend a few days together, Laura quickly needed to start chemotherapy before her mastectomy and breast reconstruction. The treatment at the Royal Albert Edward Infirmary in Wigan has been successful, meaning Laura and Sam can focus all of their energies on their baby.

  Laura said her daughter was like "a beautiful light in the dark"

  Her consultant at The Christie, Claire Kelly, described Laura as an "inspirational woman" who, by sharing her story, had also raised awareness of the disease. "A lump is not the only symptom of breast cancer, so it's important that people check themselves regularly and know what's normal for them," added Dr Kelly. Breast cancer symptoms are listed on the NHS website., external Laura said she was "so glad" she got checked after finding the lump, adding "I don’t know where I'd be if I hadn’t".. "The big message to women is make sure you get it checked," she said. Laura said life with her daughter had been "amazing - she's made the last year worth going through" and added: "She's my aurora in the truest sense of the word, a beautiful light in the dark."
