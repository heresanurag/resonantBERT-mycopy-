title: Pro-Palestinian protesters arrested at Trump Tower sit-in - BBC News
date: '2025-03-14'
section: General
url: http://www.bbc.co.uk/news/videos/cr42kp3x6nko
content: |-
  The demonstrators were demanding the release of detained activist Mahmoud Khalil, who is facing deportation.

  Nearly 100 protesters were arrested during a sit-in at Trump Tower in Manhattan, as they demanded the release of Mahmoud Khalil, a Palestinian activist detained by federal immigration agents.

  Khalil, a prominent figure during the Gaza war protests at Columbia University in the spring of 2024, has drawn global attention after the Trump administration moved to deport him.

  The case has raised questions about free speech on college campuses and the legal process that would allow for the deportation of a US permanent resident.

  The demonstration was organised by Jewish Voice for Peace, a Jewish activist group that advocates against the State of Israel.
