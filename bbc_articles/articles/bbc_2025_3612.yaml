title: Watch moment cargo ship and oil tanker collide in North Sea - BBC News
date: '2025-03-13'
section: General
url: http://www.bbc.co.uk/news/videos/crlxe8yg33xo
content: |-
  A thermal imaging camera onboard a nearby ship captured the collision on Monday.

  A thermal imaging camera has captured the moment a cargo ship struck an oil tanker in the North Sea on 10 March.

  The video, captured by Orca AI, shows the Solong hitting the Stena Immaculate, before an explosion can be seen.

  BBC Verify has geolocated the recording, and determined that it was captured onboard a nearby vessel, the Ionic Aspis.

  One crew member is missing, presumed dead, while more than 30 people were rescued.
