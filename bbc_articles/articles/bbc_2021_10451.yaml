  Great Britain's women's hockey team entered the Tokyo Games as defending Olympic champions, but the five years since Rio have been difficult with captain Hollie Pearne-Webb saying it had been far from a rollercoaster because "there haven't been too many highs". Just seven of the gold medal-winning squad from Rio competed in Tokyo, but they were able to put the difficulties of the last cycle behind them to win bronze - marking it the third Olympics in a row at which they have won a medal. "For the girls it means a hell of a lot," said head coach Mark Hager. "It's so rewarding for the group. Four months ago, if you asked me if we could get a medal I'd probably have said no. We had belief so it's very pleasing." The men's team were knocked out in the quarter-finals.

  Chelsie Giles claimed Great Britain's first medal of the Tokyo Olympics with bronze in the women's -52kg event. Judo will lose £1,117,530 in funding for Paris.

  Kate French's Olympic gold was Great Britain's first since Steph Cook's victory at Sydney 2000, with two silvers and a bronze won across the Athens, Beijing and London Games. Joe Choong added a second gold in the men's event after finishing 10th in Rio five years ago. Pentathlon GB faces a 20% cut to its funding for the Paris cycle.

