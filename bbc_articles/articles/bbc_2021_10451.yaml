  Equestrian lost £5,451,405 in funding before Tokyo 2020, but the team delivered more medals than they did in Rio five years ago. Ben Maher won individual showjumping gold on Explosion W, after Oliver Townend, Laura Collett and Tom McEwen won team eventing gold. McEwen also won a silver in the individual event, and Charlotte Dujardin won her sixth Olympic medal with dressage bronze. A day earlier, Dujardin claimed bronze in the team dressage event alongside Carl Hester and Charlotte Fry. The equestrian team's funding will be reduced again for Paris, to £11,085,964.

  Team GB won seven gymnastics medals in Rio five years ago, but with a vastly different squad brought home only three from Tokyo. Max Whitlock and Bryony Page - the only members of the squad to compete in both Rio and Tokyo - were among the medals, Whitlock retaining his pommel horse title and Page winning bronze on the trampoline to add to the bronze the women's artistic gymnasts won in the team all-around competition. That bronze was GB's first medal in the women's team event for 93 years, while Whitlock's gold saw him become the most successful gymnast of all time on the pommel horse. Gymnastics will receive slightly less - £12.5m - for the Paris 2024 cycle.

