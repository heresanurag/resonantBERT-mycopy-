content: |-
  How Great Britain fared sport-by-sport at the Tokyo 2020 Olympic Games relative to their funding.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Team GB was unofficially set a target of between 45 and 70 medals by UK Sport, although the funding body's chief executive Sally Munday said it was taking a more "holistic" approach given the lack of competition for athletes during the Covid-19 pandemic. Britain finished Tokyo 2020 with 65 medals, equalling their total as hosts in London nine years ago and making Tokyo their second-most successful overseas Olympics after Rio 2016. Team GB chef de mission Mark England called the medal haul as "the greatest achievement in British Olympic history". He said: "Not only has the team made history but it has probably made history on the back of the most complex and most challenging and difficult environment that we will face certainly in my lifetime. "It has been against all the odds and I think it is the greatest achievement in British Olympic history. It has been the miracle of Tokyo and it has been wonderful to be here." Here we take a look at how each sport fared in Tokyo relative to its funding.

  Team GB have not won an Olympic medal in archery since 2004, and that run continued at Tokyo 2020. Archery was one of several sports to lose its funding after the Rio Games five years ago, before UK Sport U-turned in 2018 and decided to reinstate financial support. It has had its funding hugely increased for the Paris 2024 Olympic cycle, however, to more than £2.1m.

  Athletics funding was cut from £26,824,206 after the 2016 Games, at which GB won two golds, one silver and four bronzes. Keely Hodgkinson and Laura Muir both broke British records as they claimed silver in the women's 800m and 1500m respectively, while the quartet of CJ Ujah, Nethaneel Mitchell-Blake, Richard Kilty and Zharnel Hughes missed out on the 4x100m title by just a hundredth of a second. There were bronze medals for Josh Kerr in the men's 1500m, Holly Bradshaw in the women's pole vault, and in the women's 4x100m for Asha Philip, Imani-Lara Lansiquot, Dina Asher-Smith and Daryll Neita. The funding is set to be cut again, with the athletics squad receiving £22,175,520 for the next Olympic cycle.

  Team GB's badminton squad were unable to bring home any medals from Tokyo, capping a difficult five years for the sport since Chris Langridge and Marcus Ellis' men's doubles bronze at Rio 2016. Badminton lost all its UK Sport funding after Rio despite that medal, before a 2018 reprieve. Its funding for the Paris 2024 cycle has been massively increased to £3.2m. A seven-strong squad competed in Tokyo, with Ellis and Lauren Smith reaching the quarter-finals of the mixed doubles and Toby Penty making the last 16 of the men's singles, showing promise for Paris in three years' time.

  This video can not be played To play this video you need to enable JavaScript in your browser. GB's Lauren Price beats China's Li Qian to win gold in the women's middleweight boxing

  Tokyo 2020 is Britain's most successful Olympics in the boxing ring since 1920, with six medals. Lauren Price won middleweight gold, a day after Galal Yafai became Olympic flyweight champion. There were silver medals for Ben Whittaker (light-heavyweight) and Pat McCormack (welterweight), while Karriss Artingstall (featherweight) and team captain Frazer Clarke (super-heavyweight) claimed bronzes. The team doubled their medal total from Rio, despite a funding cut of £1,680,001. It is set to lose a further £688,929 before Paris.

  Liam Heath became Britain's most successful Olympic canoeist with K1 200m bronze - his fourth Olympic medal - while Mallory Franklin won women's canoe slalom silver. The total of two medals was half what the sport won at the London and Rio Games, and the fewest medals won since the Sydney 2000 Olympics. Canoeing faces a huge funding cut for the Paris 2024 cycle, however, from £16.3m to £12.2m - more than 25%.

  This video can not be played To play this video you need to enable JavaScript in your browser. Tokyo Olympics: GB's Jason Kenny wins the men's keirin to claim his seventh Olympic gold

  Team GB's cycling team had their funding cut by a huge £5,708,510 before Tokyo, but still won an impressive 12 medals across track cycling, mountain biking and BMX. Tom Pidcock kicked things off with mountain bike cross-country gold, before Bethany Shriever won gold in the women's BMX racing final, moments after team-mate Kye Whyte claimed the nation's first Olympic medal in the event with silver in the men's. There was another gold for Charlotte Worthington in the BMX freestyle, where team-mate Declan Brooks took bronze in the men's event. In the velodrome, Great Britain won seven medals - more than any other nation in Tokyo. Jason Kenny won his seventh Olympic gold with a spectacular defence of his men's keirin title. Two days earlier, his wife Laura became the first British woman to win gold at three Olympic Games, winning the madison alongside Katie Archibald. It was an Olympic debut to remember for Matt Walls, who was crowned champion with a dominant performance in the omnium. There were silvers for GB in the men's team sprint, the men's madison and the women's team pursuit, while Jack Carlin won an impressive bronze medal in the men's individual sprint. Cycling will receive £3,042,378 more in funding for Paris 2024.

