  Skateboarding received just £197,725 from UK Sport but Sky Brown's bronze medal at the age of 13 means more Olympic success could be on the agenda at future Games. Like sport climbing, skateboarding, basketball, fencing, surfing, table tennis and weightlifting will all receive 'progression' funding from UK Sport for the Paris cycle. In weightlifting, Emily Campbell became the first British woman to win an Olympic medal with her +87kg silver - Great Britain's first Olympic weightlifting medal since 1984. That came despite the sport losing its UK Sport funding after Rio 2016.

