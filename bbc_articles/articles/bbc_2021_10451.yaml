  British athletes are a common sight on the Olympic triathlon podium and Tokyo 2020 was no different, with three medals. Alex Yee kicked off the success, winning men's silver on his Olympic debut, before Georgia Taylor-Brown added another silver in the women's event. But better was to come as Yee and Taylor-Brown teamed up with Jonny Brownlee and Jess Learmonth to win gold in the mixed relay event, ensuring Brownlee would bid farewell to the Olympics with a complete set of medals. British Triathlon will receive a slight reduction in funding for Paris but with young athletes like Yee taking over the mantle from the Brownlees, the future looks bright.

