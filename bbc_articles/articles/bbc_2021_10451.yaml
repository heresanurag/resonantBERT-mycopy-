  Team GB had their diving funding cut from £7,467,860 to £7,223,280 for Tokyo, but won the same number of medals as five years ago. After winning one gold, one silver and one bronze in Rio, GB won a gold and two bronzes in Japan. Tom Daley ended his long wait for an Olympic title with a sublime display alongside Matty Lee in the men's synchronised 10m then went on to win bronze in the individual event. There was another medal on the men's 3m springboard, where Jack Laugher won bronze.

