  Rowing has historically been one of Team GB's most successful sports, and as such received the most funding for the Tokyo cycle, but took home just a silver and bronze from Japan. Their two medals - in the men's quadruple sculls and men's eight respectively - is the team's lowest haul since Atlanta 1996, and the first time GB has failed to win a gold medal since 1980. In December, it was announced rowing's funding had been reduced by about 10% to £22.2m for the Paris 2024 cycle. British Rowing performance director Brendan Purcell said GB's performance in Tokyo was "heartbreaking" and "frustrating" but added: "We're really confident we're on the track to lift up and deliver in Paris."

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Sailing was one of the success stories for Team GB in Tokyo, as they finished as the top sailing nation for the fifth time in six Olympics. Hannah Mills became the most successful female Olympic sailor of all time with her 470 gold alongside Eilidh McIntyre, adding to Giles Scott's Finn gold, Dylan Fletcher and Stuart Bithell's 49er gold, John Gimson and Anna Burnet's Nacra 17 silver and Emma Wilson's windsurfing bronze. After winning his second successive Finn title, Scott said British sailing was "in a good place" but much will change going into Paris, with the Finn class being dropped and the 470 changing to a mixed event.

  Team GB had their shooting funding boosted from £3,950,888 to £6,008,790 for Tokyo 2020. Matthew Coward-Holley was going for gold, but had to settle for bronze in the men's trap shooting final. British medal hope Amber Hill, the world number one, withdrew from the women's skeet competition on the eve of the Olympics after testing positive for Covid-19. Funding is set to be reduced to £5,802,749 for Paris.

  Shauna Coxsey was Team GB's sole hope as sport climbing made its Olympic debut but Coxsey, set to retire after the Games, failed to reach the women's final. Climbing is one of seven sports that will receive 'progression' funding during the Paris 2024 cycle, "marking the start of a programme of support in the long-term medal potential". It has been awarded £1,562,811.

