  British swimming's remarkable Tokyo 2020 campaign will not be forgotten in a hurry, such was the success in the pool. Eight medals, four of them gold, made it GB's greatest ever Olympic performance in the pool and the first time in 113 years that GB had won four swimming golds at one Games. It was kick-started by Adam Peaty winning the 100m breaststroke to become the first British swimmer to retain an Olympic title, before Duncan Scott claimed four medals - the most by a Briton at a single Games. "I really do think this squad is going to go from strength to strength heading to Paris," said four-time Olympic medallist Rebecca Adlington. "None of our top swimmers will be stopping and there are loads of talented female and male swimmers who aren't even in Tokyo who will be bursting through soon, so it's looking very bright for the future."

  Britain's taekwondo hopes were dealt a blow early on when two-time defending champion Jade Jones suffered a shock defeat in the first round. But up stepped Bradly Sinden and Lauren Williams, who won silvers in their respective events, before Bianca Walkden added a second bronze medal to her collection. It meant GB Taekwondo equalled its record haul from Rio 2016, despite missing out on gold for the first time since 2008.

