id: bbc_2019_4163
title: '''No cheese cakes'' warning from Brexit stockpiling firm - BBC News'
date: '2019-04-10'
section: General
url: http://www.bbc.co.uk/news/business-47878345
content: |-
  Lola's Cupcakes has stockpiled 10 tonnes of cream cheese ahead of Brexit to avoid its factory grinding to a halt.

  Asher Budwig, managing director of Lola's Cupcakes, says the company identified soft cheese as one of the products that might be affected by Brexit disruption as it is imported from Germany.
