title: The man with a titanium chest - BBC News
date: '2017-02-04'
section: General
url: http://www.bbc.co.uk/news/magazine-38853200
content: |-
  After seven years with part of his breastbone missing, Edward Evans gets a revolutionary titanium implant.

  For seven years, part of Edward Evans's sternum was missing - the bone would normally have protected his lungs and heart.

  A single blow to his chest could have killed him.

  Now Edward, from the Midlands, has become the first person in the UK to get a 3D-printed titanium replacement.

  His story was featured on Trust Me I'm A Doctor on BBC Two - @BBCTrustMe on Twitter

