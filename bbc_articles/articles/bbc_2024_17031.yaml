  Officials arrested Ronnie Dean Stout, 42, and accused him of "calmly leaving the area by blending in with the other citizens who were in the area and fleeing the rapidly evolving fire" that he had set. He is being held in jail without bail as authorities determine what charges he will face. A woman who answered the door of the mobile home listed as his home address in Chico told the San Francisco Chronicle, external that prosecutors "are trying to make him the scapegoat". “They’re saying he did it intentionally, but he didn’t. The car caught on fire,” the unidentified woman said, before refusing to answer further questions.

  The Park fire is one of many currently burning across the US and Canada. The National Interagency Fire Center is currently monitoring 102 large fires in the US, mostly in states on the west coast. In Oregon, a firefighting pilot was killed in a tanker plane crash after the aircraft went missing on Thursday night. In Canada, a large wildfire in the Jasper National Park destroyed hundreds of buildings in the town of Jasper. Weekend conditions have improved in Jasper, with rain and cooler temperatures helping efforts to protect other parts of the historic tourism town.

