title: James Cleverly urges Tory 'discipline' in leadership bid - BBC News
date: '2024-07-24'
section: Politics
url: http://www.bbc.co.uk/news/articles/cv2g0z1gkzyo
content: |-
  The shadow home secretary is first Tory MP to say he is standing in the race to replace Rishi Sunak.

  James Cleverly has called for the Conservatives to show more “self-discipline”, after becoming the first MP to confirm he is standing to be the party's next leader. The former home and foreign secretary blamed "too much time rowing amongst ourselves" for the party's election drubbing earlier this month. He also called for the Tories to "expand our base of support" as they seek to recover from their worst-ever result in modern history. More contenders are expected to announce their candidacy in the coming days, ahead of a Monday deadline to secure nominations. Contenders need to get the backing of 10 colleagues to stand in the three-month contest to replace Rishi Sunak as leader.

  Other potential candidates include former home secretaries Suella Braverman and Dame Priti Patel, shadow security minister Tom Tugendhat and shadow communities secretary Kemi Badenoch. Former immigration minister Robert Jenrick has also been tipped to run, whilst former cabinet minister Mel Stride has also said he is considering a leadership bid. As well as serving in Mr Sunak's cabinet, Mr Cleverly also held a clutch of more junior government roles under Boris Johnson. In a sign he will try to run on a pitch to unify the party's various factions, he said the party's achievements in office had been “overshadowed" by internal bickering. Speaking to BBC Radio 4's Today programme, he also said the party would need to broaden its appeal, and said the party "doesn't do mergers" when asked if it could move closer to Nigel Farage's Reform UK. In an article for the Telegraph, external, he wrote that he wanted the Conservatives to be a "natural home" for Lib Dem and Labour voters, as well as backers of Reform. He also called for defence spending to rise to 3% of national income "as soon as possible" and more housebuilding in urban areas.

  Despite calls from some MPs for the leadership rules to change, the party has kept the same system - in place since 1998 - to choose Mr Sunak's successor. This will see Tory MPs whittle down the field of candidates who secure enough backers to four by the time of the party's annual conference in Birmingham at the end of September. In a series of further ballots, the MPs will then narrow the field to a final two contenders, with party members then choosing the winner. The online vote will end on 31 October, with the result announced two days later on 2 November, three days before the US presidential election.
