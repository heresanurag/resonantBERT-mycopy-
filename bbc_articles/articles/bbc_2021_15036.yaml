  Thousands of climate activists protested in Glasgow - and cities around the world - during the summit Image caption: Thousands of climate activists protested in Glasgow - and cities around the world - during the summit

  China and the US issued a surprise joint statement vowing to boost climate co-operation Image caption: China and the US issued a surprise joint statement vowing to boost climate co-operation

