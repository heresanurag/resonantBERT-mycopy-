  Day one started off with hundreds of people having to wait in long queues to get into the venue Image caption: Day one started off with hundreds of people having to wait in long queues to get into the venue

  Former US President Barack Obama brought some star power to the summit, and called on young activists to "stay angry" in the fight against climate change Image caption: Former US President Barack Obama brought some star power to the summit, and called on young activists to "stay angry" in the fight against climate change

