title: Footage shows the moment of suspected gas explosion in Derby - BBC News
date: '2025-06-11'
section: General
url: http://www.bbc.co.uk/news/videos/cx273kplqjgo
content: |-
  Video footage captures the moment a suspected gas explosion happened at a house in Derby.

  Video footage has shown the moment a suspected gas explosion took place in Derby.

  A man remains in hospital with serious injuries following the blast in Eden Street, Alvaston, on Tuesday at 19:24 BST.

  Neighbouring properties were also damaged in the explosion while a small dog with some injuries was rescued from the house.

  Derbyshire Police said an investigation into the cause of the blast would begin later.

