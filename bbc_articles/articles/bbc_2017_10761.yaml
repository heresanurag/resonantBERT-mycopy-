  Whittaker was revealed as the next Time Lord in July. The Broadchurch star succeeds Peter Capaldi, who took over the role in 2013 and leaves in the forthcoming Christmas special.

  The reaction to Whittaker's casting was mostly positive - but some fans protested that the Doctor shouldn't be played by a woman.

  The appointment also sparked a war of words between two former Doctors.

  Peter Davison, who played the character from 1981 to 1984, said he felt "a bit sad" that the character might no longer be "a role model for boys", but his comments were dubbed "rubbish" by his successor Colin Baker.

