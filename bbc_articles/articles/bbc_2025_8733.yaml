title: 'Yungblud: ''I can''t play a festival that''s £800 a ticket'' - BBC News'
date: '2025-05-12'
section: General
url: http://www.bbc.co.uk/news/videos/c5y53yxz719o
content: |-
  The singer and musician said he decided to launch his own festival as he was tired of the status quo.

  Yungblud has hit out at the cost of some music festivals, saying prices are "stupid" and do not "represent real people".

  Speaking to the BBC's Laura Kuenssberg, the singer and musician said he decided to launch his own festival as he was tired of the status quo and wanted to "make a positive change."
