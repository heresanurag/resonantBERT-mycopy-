title: Zelensky to meet US vice-president at Munich conference - BBC News
date: '2025-02-14'
section: World
url: http://www.bbc.co.uk/news/articles/cy5k6gk50qvo
content: |-
  It comes as Ukraine and its European allies are still reacting to Trump's phone call with Putin.

  Zelensky to meet US vice-president at Munich conference

  A woman pays her respects this week at portraits of dead Ukrainian servicemen in Zavallia, central Ukraine

  Ukraine's President Volodymyr Zelensky will meet US Vice-President JD Vance for talks in Munich later, with the war expected to dominate a major security meeting of world leaders. Zelensky is also expected to meet US Secretary of State Marco Rubio. It comes as Ukraine and its European allies are still reacting to US President Donald Trump's surprise announcement this week that he and Russia's Vladimir Putin had agreed in a call to begin talks to end the war. Trump said on Thursday that he expected Russian officials to also be at the conference in Munich and suggested they could meet with US and Ukrainian officials - but a senior Ukrainian official said talks with Russia were not expected.

  "Russia is going to be there with our people," the US president said in comments made to the reporters. "Ukraine is also invited, by the way, not sure exactly who's going to be there from any country - but high-level people from Russia, from Ukraine and from the United States."

  This video can not be played To play this video you need to enable JavaScript in your browser. Watch: US Secretary of State Marco Rubio disembarks plane following mechanical issue

  However, Zelensky adviser Dmytro Lytvyn told reporters the Ukrainian delegation had no plans to attend such a meeting. Russia did not immediately respond to a BBC request for comment on the issue. Trump's announcement came a day after he held separate phone calls first with Putin, then with Zelensky. Describing the talks as "great", Trump said there was a "good possibility of ending that horrible, very bloody war". But he said it was not "practical" for Kyiv to join the Nato military alliance and also "unlikely" that Ukraine could return to its pre-invasion borders in 2014. Zelensky - who admitted it was "not very pleasing" that Trump had spoken to Putin before him - warned that Ukraine would not agree to any peace deal proposed by the US and Russia without Kyiv's involvement. "We cannot accept it, as an independent country," he said, stressing that his priority was "security guarantees", something he did not see without US support. Zelensky said European allies "needed to be at the negotiating table too", amid growing fears across the continent that Trump's overture to Putin could lead to a separate US-Russia deal on Ukraine's and Europe's future. French President Emmanuel Macron told the Financial Times that only Zelensky could negotiate on behalf of his country with Russia, warning a "peace that is a capitulation" would be "bad news for everyone". EU foreign policy chief Kaja Kallas said: "Any quick fix is a dirty deal." In Munich, Zelensky's goals in his meeting with Vance seem clear: to encourage the US to continue to stand by Ukraine and keep the beleaguered nation's best interests in mind as it tries to negotiate an end to the war. What the Americans want from this meeting is more uncertain. Vance may try to assure Zelensky that the Ukrainians will be involved in the forthcoming peace negotiations, even if lately it seems as though they will be a junior partner. Vance, in fact, may be delivering a blunt message - one that Defence Secretary Pete Hegseth said publicly on Monday, even if he later walked it back somewhat. The US does not envision a Nato that includes Ukraine. And in order to end the war, Ukraine will have to give up territory that is currently under Russian control It may be a bitter pill for Zelensky to swallow, but the kind of additional US military aid to Ukraine that it eventually would need to keep up the fight seems unlikely at this point. Neither Trump nor Trump's Republican Party in Congress have much interest in keeping the support going.

  Following the overthrow of Ukraine's pro-Russian president in 2014, Moscow annexed the Black Sea peninsula of Crimea and backed pro-Russian separatists in bloody fighting in eastern Ukraine. The conflict burst into all-out war when Russia invaded Ukraine nearly three years ago. Moscow's attempts to take control of the capital Kyiv were thwarted, but Russian forces have taken around one-fifth of Ukraine's territory in the east and south, and have carried out air strikes across the country. Ukraine has retaliated with artillery and drone strikes, as well as a ground offensive against Russia's western Kursk region. Accurate casualty counts are hard to come by due to secrecy by both the Russian and Ukrainian governments, but it is estimated that hundreds of thousands of people, most of them soldiers, have been killed or injured, and millions of Ukrainian civilians have fled as refugees.

