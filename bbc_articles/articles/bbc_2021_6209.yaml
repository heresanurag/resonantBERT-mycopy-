title: 'Rural crime: Bodycams for farmers as they fight rural crime - BBC News'
date: '2021-05-23'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-56996106
content: |-
  Police are helping farmers in north Wales to use technology to tackle thefts and scams.

  Farmer Garry Williams says he would be willing to wear a bodycam to fight rural crime

  Farmers across Wales are turning to technology to fight rural crime - including wearing bodycams.

  A recent survey by NFU Cymru found that 31% of farmers had invested at least £1,000 in crime prevention measures in the last five years.

  In north Wales, police are working with the farming community to launch Future Farms Cymru, a scheme using technology to tackle thefts on farms.

  Farmers will use social media, CCTV and bodycams to protect their property.

  In Carmarthenshire, farmer Garry Williams uses a WhatsApp group to keep local farmers informed of any suspicious activity in the area.

  "On this farm we've had ladders, tools, strimmers etc stolen and as a result we've put up CCTV cameras and have a lock-up to keep our tools safe," he said.

  "At the moment, I think the two biggest issues in this area are quad theft and sheep theft."

  After getting fed up with being targets for criminals, including thieves and scammers, Mr Williams and his fellow farmers are prepared to embrace modern methods to protect their traditional way of life.

