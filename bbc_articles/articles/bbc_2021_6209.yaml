  "Rural crime is a worry for all farmers but I'm especially concerned about elderly farmers in our community who are more vulnerable to these crimes and being conned by fraudsters," said Mr Williams.

  "My advice to all farmers is to remain vigilant and to take any measures possible to improve on-farm security to deter these criminals.

  "I'd need to know more about them but I can imagine if you were to notice something suspicious at night, having a body camera may give an added layer of security."

  NFU Cymru president John Davies said rural crime continued to wreak havoc on farms across Wales, "causing not only financial but emotional pressures on farming families".

  Tech could soon be mixed with tractors on Welsh farms

  "Farmers are using preventative measures to deter criminals and secure their machinery, tools and stock," he said.

  "These measures include upgrading building security and routinely removing equipment from vehicles overnight with some even installing CCTV on farms and blocking field entrances.

  "Farmers are trying various tactics to prevent crime on their farm and so some may well be interested in these new technologies being trialled in north Wales, if effective and cost-efficient."

