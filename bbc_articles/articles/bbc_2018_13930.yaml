title: '''Drunk'' Canadian curlers kicked out of tournament final - BBC News'
date: '2018-11-19'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-46269865
content: |-
  Olympic gold medallist Ryan Fry and three team mates were forced out after opponents complained.

  Ryan Fry won gold in Canada's victory over Great Britain at the Sochi 2014 Winter Olympics

  A curling team led by an Olympic gold medallist has been kicked out of a Canadian tournament for poor behaviour and drunkenness.

  Ryan Fry, who won gold for Canada at the 2014 Winter Olympics, and his teammates forfeited their final game at the Red Deer Curling Classic in Alberta after fans and opponents complained.

  In a statement, Fry apologised for his behaviour.

  He was part of the Canadian curling team that beat Great Britain's curlers in the Sochi 2014 final.

  "They went out to curl and they were extremely drunk and breaking brooms and swearing," Red Deer Curling Centre facility manager Wade Thurber told Canadian broadcaster CBC.

  Mr Thurber also said there was "some damage in the locker room". Fry and teammates Jamie Koe, Chris Schille, and DJ Kidby were disqualified as a result.

