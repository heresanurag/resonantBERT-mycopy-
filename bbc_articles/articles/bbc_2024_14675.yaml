content: |-
  The Lib Dem leader takes part in the extreme activity as part of his election campaign.

  Lib Dem leader Ed Davey has completed a bungee jump in his latest election campaign stunt.

  He was filmed shouting "vote Liberal Democrat" while dangling in the air after his jump in Eastbourne.
