id: bbc_2025_13214
title: Video appears to show Ukraine drone attack in Russia - BBC News
date: '2025-06-04'
section: General
url: http://www.bbc.co.uk/news/videos/cvg53nyg72vo
content: |-
  Footage shows attack drones homing in on their targets as they sit on the tarmac.

  Ukraine claims to have hit more than 40 Russian bomber planes at a number of military airbases, in one of its most audacious drone attacks since the war began.

  Footage appears to show Russian warplanes on a runway being struck and bursting into flames.

  Other videos appear to show cargo crates burning on a truck near Russia's Belaya airbase as well as smoke rising from the country's Olenya airbase.

  Sources from Ukraine's security service, SBU, told the BBC "enemy strategic bombers are burning en masse in Russia".

  They also said Ukraine was conducting "a large-scale special operation aimed at destroying enemy bomber aircraft," according to a statement sent from sources within the service to BBC Ukraine.

