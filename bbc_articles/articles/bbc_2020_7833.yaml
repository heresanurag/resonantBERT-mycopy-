  Scotland rugby legend Doddie says reaching life's milestones helps him live with MND.

  Doddie Weir says reaching milestones in life helps him live with Motor Neurone Disease (MND).

  As he celebrates his 50th birthday, the former Scotland rugby international says he is looking forward.
