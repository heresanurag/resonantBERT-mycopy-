title: Shocked Dudley couple find python hiding in bedroom - BBC News
date: '2021-09-18'
section: Birmingham & Black Country
url: http://www.bbc.co.uk/news/uk-england-birmingham-58611602
content: |-
  The couple say they have no idea how the 5ft female python got into their home.

  The female python was said to be "very friendly"

  A shocked couple who found a 5ft (1.5m) python in their bedroom say they have no idea how it got into their house.

  The pair called police to their home on Quarry Bank, in Dudley, West Midlands, after making the discovery.

  They had shut it in the room and officers were able to safely remove the python and take it to a vet.

  The couple have speculated it may have arrived in a delivery or slithered in through pipes before it was spotted on Wednesday.

  A large item had arrived the previous day and they said they thought it may have been hidden in the box.

  West Midlands Police said such discoveries were usually left to the RSPCA but it had sent three student officers on this occasion because no-one from the charity had been available.

  They eventually found the snake on top of a cabinet, wrapped around a vanity mirror.

  Using their batons, they put it in a shoe box with holes in.

  A check-up carried out by Manor Vets, in Halesowen, later found the mature female snake had a few lumps and old injuries, but was generally in good health.

