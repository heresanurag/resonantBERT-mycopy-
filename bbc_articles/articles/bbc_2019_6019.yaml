id: bbc_2019_6019
title: Bolivia landslide sweeps houses away - BBC News
date: '2019-05-01'
section: General
url: http://www.bbc.co.uk/news/world-latin-america-48115497
content: |-
  Homes in the city of La Paz were destroyed, but no casualties were reported.

  A landslide destroyed more than a dozen homes in the Bolivian city of La Paz on Tuesday.

  Local media reported that 17 houses were lost, but no deaths were reported as authorities had evacuated the area.
