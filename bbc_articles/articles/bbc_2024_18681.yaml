content: |-
  The chemical is one of three substances released into the canal in the incident in Walsall.

  Sodium cyanide in canal 'could be gone in a week'

  Twelve miles of canals were cordoned off as a precaution, but the contamination zone was "smaller than expected", the Environment Agency said

  A toxic chemical that spilled into a canal in Walsall could be removed or neutralised within a week, an expert has claimed. Sodium cyanide was one of three substances released into the canal after what the Environment Agency (EA) called a waste disposal incident at Anochrome Ltd. The EA has now installed a temporary dam across the canal, providing a physical barrier to block off the contaminated section. Dr Jonathan Paul, a senior lecturer in geosciences, said the situation would hopefully be resolved within a week.
  • None Canal cyanide spill: Where is it and what are the dangers

  Anochrome Ltd, which deals in surface coatings and sealing, said it "regrettably" released chemicals into the Walsall waterway in the early hours of Monday morning. A 12-mile stretch was cordoned off on Tuesday, but the EA said on Wednesday the contamination zone was "smaller than expected". About 100 dead fish have been seen floating on the surface near Reservoir Place. People have been urged not to go near a long section of the canal network from the middle of the borough to Birmingham and connected waterways in Wednesbury, Tipton and West Bromwich. Speaking to BBC Radio WM, Dr Paul, a lecturer at Royal Holloway, University of London, said there were several strategies the EA could use to dilute or remove the toxic substance from the water.

  The Environment Agency said the incident at Anochrome Ltd was believed to be a waste disposal issue

  "One of the cheaper solutions would be just to dilute the water, pump in a load of fresh water from somewhere else so the concentrations go down," he said. "There are other more active things they could do, they could run it through a filter to try and remove it. "Or they could add certain chemicals to the water which would have the effect of taking the cyanide out of the water and making it a kind of scum on the surface which could be skimmed off and then disposed of safely." Sodium cyanide can cause seizures, vomiting and loss of consciousness.

