id: bbc_2023_11788
title: Flood waters hit Frankfurt airport and underground station - BBC News
date: '2023-08-17'
section: General
url: http://www.bbc.co.uk/news/world-europe-66533844
content: |-
  The German city was hit by severe thunderstorms and heavy rain causing travel disruption.

  Video posted on social media shows a plane surrounded by flood waters, after thunderstorms and lightning disrupted flights at Frankfurt International Airport on Wednesday evening.

  A spokesperson for the airport said they experienced "massive amounts of rain in a short period" but that flights "started regularly" again on Thursday morning.

  Flood waters can be seen cascading down into Frankfurt's main underground station in another video posted online.

  The German city has experienced severe weather conditions, with thunderstorms and heavy rain disrupting travel.
