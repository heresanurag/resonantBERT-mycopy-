  Funeral held for toddler who died in Dungannon

  Tavia Da Costa was due to turn two years old later this month

  The funeral for Tavia Da Costa, who was due to turn two later this month, has taken place in Dungannon after she died at a house in Windmill Court in the town last Sunday. Hundreds attended the service at St Patrick's church in the County Tyrone town. On Saturday evening, a crowd of about 400 people gathered for a candlelit vigil organised by the Lisnahull Residents Group. Three people appeared in court in Belfast on Thursday charged in connection with her death.

  The vigil on Saturday night was organised by the Lisnahull Residents Group

  A tin whistle was played at the start of the vigil and prayers were said, members from the East Timor community and local councillors also spoke briefly.

  Independent Mid Ulster councillor Barry Monteith was one of the organisers of the vigil on Saturday. “For a crowd to turn out like this at such short notice, it shows the real Dungannon and that we’re a community united in grief," he said. “There are people here from far and wide to put their arms round each other and support each other to find away through this.

  Barry Monteith said people had attended from "far and wide"

  “Because people have just been shocked and horrified after what happened, so it was important to come together tonight.”

  Roy Setiawan, chair of the Timorese Association Inclusive Support, said people had attended the vigil to show their support

  Roy Setiawan, chair of the Timorese Association Inclusive Support, said the community was “heartbroken”. “As a community this has really touched us from the Lisnahull Community Association and we appreciate what have they have done, because it feels like everybody’s loss," he said. “It’s important to come together tonight commemorate and remember little Tavia, because we’re all feeling the loss, but a lot of people are here to support her and her family.”
