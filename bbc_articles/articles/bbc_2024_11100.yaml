title: 'Lurgan: Mother says son still ''petrified'' after sectarian attack - BBC News'
date: '2024-05-09'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-68982443
content: |-
  Adrian and Alister Douglas were caught on camera trying to force open the door of a woman's home.

  This video can not be played To play this video you need to enable JavaScript in your browser. Brothers Adrian and Alister Douglas were charged after the incident was captured on a doorbell camera

  A young mother, who was the victim of sectarian abuse, has said her son is still "petrified" over the attack. It happened at her home in Lurgan, County Armagh and was captured on the victim's doorbell camera in April 2023. Two brothers have been sentenced after they were caught on camera trying to force open the door of the house while one shouted sectarian abuse. Adrian Douglas, 35, of Carrick Drive in Lurgan, County Armagh, was handed 10 months in prison. Alister Douglas, 38, of Charles Baron Gardens, was given a 12-month suspended sentence. Adrian Douglas, will spend another 10 months on licence after serving his jail term. Danielle Skelton, who was at home alone with her son at the time of the incident in 2023, said he remains badly affected. "He won't sleep in his own room," she told BBC News NI. "Any slight bang or the door goes he's bouncing from one side to the other. Ms Skelton told BBC News NI she would have preferred both men to have received a custodial sentence.

  Danielle Skelton spoke to BBC News NI after the sentencing hearing

  Warning: Report contains language some readers may find offensive She is living in a new property with her son, who is now three, but said she remains afraid of staying alone in her home. "The cameras are the only thing I have backing me." Ms Skelton said she was advised by police to leave the property. The 999 call she made was played to court during the case, and the judge said that her distress was "palpable". She explained that she had moved into a largely-Protestant area of Lurgan after being offered social housing. The court heard the brothers had been watching a Rangers vs Celtic football match before going to Ms Skelton's home on 30 April last year and the incident had been fuelled by alcohol. Handing down the sentence, Patrick Lynch KC said: "Sectarianism has bedevilled our community for centuries and it is a tragedy that atavistic hatreds still emerge as it seems in this case through the raw emotions defeat in a Scottish football match fuelled by alcohol. "It must be made clear that the courts will impose severe sentences to emphasise that such expressions of hostility through violence, threat of violence or other methods of intimidation will not be tolerated." The video was widely-shared on social media, and shows the two men banging on the door of the house and shouting sectarian insults. The men shouted "Fenian" and "taig", derogatory terms referring to Catholics, as well as hammering and kicking at the door.

  Danielle Skelton said police advised her to move out of the home she shared with her young son after the attack

  Despite a female family member repeatedly telling Adrian Douglas that his children and nieces and nephews were watching him, he continued banging on the door. On spotting the doorbell camera, Alister Douglas tried to prise it off the door frame. Adrian Douglas admitted an intimidation charge, while Alister Douglas admitted aiding and abetting his brother. In Ms Skelton's victim impact statement she said her life had been impacted in a number of ways. She said moving was stressful and then she was left feeling unsafe and forced to move out. "I have still been left with high level of stress and anxiety," she wrote. "I am petrified to leave my current home... I have a heart condition exacerbated with stress and anxiety. "My son has been impacted he hasn't been able to sleep in his own bedroom and is startled by loud noises."

  In a statement on Thursday, Police Service of Northern Ireland Ch Insp Brendan Green said it was "heartening to see that a custodial sentence has been passed" and he hoped it sent "a clear message to anyone who believes sectarianism or intimidation in any capacity is ok". "From the outset, this attack was viewed as a sectarian hate crime and was treated with the utmost seriousness," he added. "We believe everyone has the right to feel safe in their home and we will continue to make every effort to ensure that this happens, prevent future incidents, and to hold offenders accountable before the courts." He said he commended Ms Skelton for her "bravery and tenacity in seeing her case through the criminal justice system" and hoped "today's outcome offers her some degree of closure on what has undoubtedly been a difficult and challenging time".
