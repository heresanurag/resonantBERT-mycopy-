content: |-
  People living in London and York are among those now facing high alert restrictions.

  Analysis: How long can stand-off last?

  At least 48 hours have passed since there was any discussion between the government and leaders in Greater Manchester. It's not complete radio silence - I understand conversations have continued between officials in Whitehall and the region's local authorities. But there won't be a breakthrough until politicians on one side pick up the phone. Both camps have indicated they're ready to talk, but neither seems willing to make the first move. The prime minister did not put a time limit on his pledge to impose restrictions if no agreement can be reached, but he will only be able to wait so long. One thing everyone involved agrees on is that something needs to be done as coronavirus cases continue to rise . Given the political fault lines this row has exposed - Conservative vs Labour, north vs south, local vs national - deciding exactly what is proving far more difficult.
