title: 'Bridgend: Two charged over babies'' bodies found in Wildmill - BBC News'
date: '2024-01-05'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-67891981
content: |-
  The bodies of two babies were found in a home in Bridgend in November 2022.

  Flowers were laid at the property in Wildmill after the babies' bodies were found

  Two people have been charged after the bodies of two babies were found in a home.

  Police were called to Maes-y-Felin in Wildmill, Bridgend, on 26 November 2022.

  Zilvinas Ledovskis, 48, and Egle Zilinskaite, 30, have been charged with two counts of concealing the birth of a child and two counts of preventing the lawful and decent burial of a body.

  They will appear at Cardiff Magistrates' Court on 20 February.
