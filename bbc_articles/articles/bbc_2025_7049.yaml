  Verstappen's pole was his second of the season. After his first, in Japan two weeks ago, he held off Norris and Piastri for the entire grand prix to win. Piastri, though, said the three zones in which the drivers can use the Drag Reduction System overtaking aid might make it easier for him to have a try at passing Verstappen than in Japan. The Australian said: "I'm feeling confident in what we've got. There are a lot of DRS zones around here, which is a nice difference to Suzuka. So, yes, let's see if we can make some progress. Russell said he and Verstappen had agreed that McLaren were still the team to beat. "Max and I were just talking now," Russell said. "We both recognise McLaren are the standout favourites and definitely have the pace on everybody else. "If Oscar gets into the lead, you'll probably see a repeat of Bahrain. If we stay in the order we qualified, I think it could be a tight race until the pit stops." Russell added that the decision to bring a softer range of tyres for Saudi Arabia this year could also impact the race. "The medium tyre this year was last year's soft, which only one driver used in the whole race. "We saw the tyres were too hard in Japan. We've all pushed to have softer tyres. Hopefully, it won't make it a slam-dunk one-stop, and there could be a couple of different strategies on the table."
