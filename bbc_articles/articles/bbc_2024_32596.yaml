  Bethell has proved he belongs, says Stokes

  Jacob Bethell was chosen to play Test cricket despite never making a first-class hundred

  Jacob Bethell has proved he belongs in international cricket with his runs against New Zealand, according to England captain Ben Stokes. Bethell, 21, was given a Test debut batting at number three for the first time in his first-class career in the series opener in Christchurch and made an unbeaten 50. The left-hander followed up with 96 in the series-clinching 323-run win in the second Test in Wellington. "I'm pretty sure there were a lot of doubters about the role we brought him into for that first Test match," Stokes told BBC Sport. "You've got a young lad with so much potential and so much talent, why not let him go out there and expose himself to Test cricket at its toughest?" In Wellington, Bethell fell four runs short of becoming the youngest England batter for 85 years to score a Test century when he edged behind off Tim Southee. "I was devastated for him to not get that three figures," added Stokes. "I walked in and I said to him: 'It's only four runs, isn't it?' "His response was: 'Yeah, but it would have been flair if I smacked that through the covers to bring it up.' Class. I think he's proved a lot and proved why we rate him so highly." Bethell's chance was originally earmarked for Jordan Cox. Cox was due to keep wicket in place of regular gloveman Jamie Smith, who has missed the tour on paternity leave. When Cox broke his thumb in the nets, regular number three Ollie Pope covered as keeper and slid to number six, opening up the slot for Bethell. Before the Wellington Test, Stokes said England will revert to their usual formation in the home summer, with Pope at three and Smith keeping wicket. But Bethell's success has given England options. He could stay at three or open in place of the struggling Zak Crawley. Pope could retain the gloves, giving flexibility to where Smith bats.

  Asked if Bethell's runs have given him a selection headache, Stokes replied: "No, I don't see it like that. "If it hadn't have gone well for him in those first two Test matches, that wouldn't have changed anyone's mind in our dressing room of him as a player." Harry Brook was named player of the match in Wellington for his first-innings 123, his third century of the winter. The Yorkshireman did not field on Sunday, when England bowled out New Zealand for 259, because of an ankle problem sustained playing football. Brook said his ankle is "a little bit sore" and "hopefully" he will be fit for the third and final Test in Hamilton on Saturday (22:00 GMT, Friday). England's series win is their first away from home in two years and their first in New Zealand since 2008. Victory in Hamilton would leave them as only the third visiting team to win a three-match series 3-0 in this country. For New Zealand, heavy defeats in each of the two Tests against England come after a historic 3-0 win in India, arguably their greatest performance in a Test series. "We'll head to Hamilton and if we are able to get in a position of strength, hopefully we're able to put a foot on the throat and put them under a bit of pressure too," said home captain Tom Latham. On the prospect of making changes to his team, Latham said: "We'll have to wait until we get to Hamilton, to decide what the surface is doing. Those conversations will be had once we get there."
