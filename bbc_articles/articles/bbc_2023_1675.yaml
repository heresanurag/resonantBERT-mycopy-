  Mr Walker also previously presented the BBC's Saturday morning sports show, Football Focus, and appeared on Strictly Come Dancing, finishing fifth with partner Nadiya Bychkova.

  He announced he was leaving the BBC for Channel 5 in April last year.

  Among the well-wishers on Twitter were Football Focus reporter Mark Clemmit, who said: "Mate.....Much love from us."

  Former professional boxer Tony Bellew added: "Get well soon Dan," and Strictly judge Motsi Mabuse wrote: "Oh wow!!! Get well soon."

  Mr Walker said he was home with no broken bones

  Mr Walker later tweeted an update, saying he was home with no broken bones.

  "Blown away by all the lovely messages. Thank you," he said.

  "Just got home from hospital. Battered and bruised but - amazingly - nothing broken.

  "Very thankful to still be here. I have no memory of anything and just remember coming round on the tarmac with paramedics & police around me."

  The incident came as Yorkshire Ambulance services were disrupted by strike action.

  Nearly 1,400 YAS workers who are members of the GMB union walked out at 18:00 GMT on Sunday, with the service saying it would have fewer ambulances available to respond to patients.

