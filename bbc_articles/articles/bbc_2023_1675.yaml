title: 'Dan Walker: TV presenter injured in bicycle crash - BBC News'
date: '2023-02-21'
section: Sheffield & South Yorkshire
url: http://www.bbc.co.uk/news/uk-england-south-yorkshire-64704132
content: |-
  The former BBC Breakfast host says he is "glad to be alive" after being in a collision with a car.

  Dan Walker said his face was "a mess" after the collision

  TV presenter Dan Walker has said he is "glad to be alive" after he was in a collision with a car while cycling.

  The former BBC Breakfast host, who now works for Channel 5, shared photographs of his bloodied face on social media, taken from inside an ambulance.

  Mr Walker, 45, who lives in Sheffield, South Yorkshire, said: "Bit of an accident this morning. Glad to be alive after getting hit by a car on my bike.

  "Face is a mess but I don't think anything is broken."

  The photos were taken in a Yorkshire Ambulance Service (YAS) vehicle alongside two members of staff, after the incident on Moore Street in Sheffield city centre on Monday morning.

  Mr Walker praised the emergency services, saying: "Thanks to Shaun and Jamie for sorting me out and the lovely copper at the scene. This is my [sic] smiling. Thankful for our NHS".

