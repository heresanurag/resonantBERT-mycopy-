content: |-
  The event has historically featured the exchange of jabs between presidential candidates.

  Donald Trump criticised his rival Kamala Harris for not attending, during his speech at the Al Smith charity dinner in New York.

  Harris did appear in a pre-recorded skit for the event, with actress and comedian Molly Shannon, in which she lightly mocked Trump.

  The event has historically featured the exchange of jabs between presidential candidates, who would typically also poke fun at themselves.
