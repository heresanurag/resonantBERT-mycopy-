title: Meteor lights up Michigan skies - BBC News
date: '2018-01-18'
section: General
url: http://www.bbc.co.uk/news/science-environment-42724709
content: |-
  The US Geological Survey said seismic waves produced by the meteor were similar to that of a 2.0 earthquake.

  Footage of a flash of light appearing across Michigan is thought to have been caused by a meteor.

  The US Geological Survey said seismic waves produced by meteor similar to that of a 2.0 earthquake.
