title: 'US Election 2020: Moment BBC projects Biden victory on TV - BBC News'
date: '2020-11-08'
section: General
url: http://www.bbc.co.uk/news/election-us-2020-54845496
content: |-
  The BBC projects that Joe Biden has topped the 270 electoral votes needed to defeat Donald Trump.

  The BBC projects that Joe Biden has won the race to become US president, defeating Donald Trump following a cliff-hanger vote count after Tuesday's election.

  This was the moment of the BBC News announcement on TV.
