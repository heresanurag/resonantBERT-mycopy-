title: Royal Navy tracks Russian warships through UK waters - BBC News
date: '2025-04-26'
section: England
url: http://www.bbc.co.uk/news/articles/cvgpzem6l55o
content: |-
  Plymouth-based frigate HMS St Albans monitored the Admiral Golovoko as it entered the Channel.

  Plymouth-based frigate HMS St Albans (foreground) monitored the RFN Admiral Golovoko as it entered the Channel

  Royal Navy ships based in Plymouth and Portsmouth were deployed to track Russian warships through British waters this week, a navy spokesperson has said. Plymouth-based HMS St Albans, a Type-23 frigate, monitored the Admiral Golovoko as it sailed east through the English Channel and launched a Merlin helicopter to gather information from the air. HMS Alban's commanding officer, Cdr Matt Teare, said the "regularity of Russian activity around the United Kingdom reinforces the vital importance of continuous integration with our allies and partners".

  HMS Albans was also involved in a three-day operation to monitor the Russian Steregushchiy-class corvette Stoikiy earlier this month, the navy said. Cdr Teare said the frigate "is at very high readiness to operate whenever, and wherever, the nation needs us in the protection of our home and the waters surrounding it". He added he was "extremely proud" of his crew's professionalism and "tireless dedication to keeping our nation safe". Meanwhile, Portsmouth-based patrol HMS Mersey tracked RFN Soobrazitelny as the corvette sailed west, supported by Royal Fleet Auxiliary tanker RFA Tidesurge. Russian tanker Kola was also monitored heading in the same direction in a coordinated effort with the Joint Maritime Security Centre.
