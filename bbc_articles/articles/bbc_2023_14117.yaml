title: 'Venice: Scuffles occur outside Woody Allen film premiere - BBC News'
date: '2023-09-05'
section: General
url: http://www.bbc.co.uk/news/entertainment-arts-66710299
content: |-
  The protesters chanted "no rape culture" as they attempted to get on to the red carpet at the Venice Film Festival.

  Scuffles broke out at the Venice Film Festival premiere of Woody Allen's film Coup De Chance.

  The protesters chanted "no rape culture" as they attempted to get on to the red carpet, before being led away from the event.

  The Venice Film Festival has given spots to new films by Woody Allen, Luc Besson and Roman Polanski, three directors hit by MeToo scandals.
