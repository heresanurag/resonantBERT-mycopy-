  Liam Gallagher has had chart success with his recent solo album while Noel is currently touring with his band Noel Gallagher's High Flying Birds.

  When working together, the pair wrote and performed hits including Wonderwall and Don't Look Back in Anger - which became a unifying song in the aftermath of the 2017 Manchester Arena bombing.

  A crowd spontaneously started singing the song at a memorial event for the victims and Noel performed it when the arena reopened in September.

