title: Witness video shows aftermath of Baltimore bridge collapse - BBC News
date: '2024-03-28'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-68663489
content: |-
  A large ship struck Key Bridge in Baltimore, shows the aftermath of the crash as the bridge collapsed into the river.

  A bridge in Baltimore has collapsed after a ship crashed into it. Video shared by a witness shows the remains of the bridge in the water. The man recalled hearing a loud bang.

  The Francis Scott Key Bridge was struck by "a large vessel" causing it to collapse into the Patapsco River, according Chief Kevin Cartwright, director of communications for the Baltimore City Fire Department.

  There is now an ongoing multi-agency rescue operation being led by the fire department, collaborating with the US Coastguard and other Maryland agencies.
