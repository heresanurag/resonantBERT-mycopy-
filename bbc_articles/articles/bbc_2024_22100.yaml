  One of Turkey's exciting young talents at Euro 2024, attacking midfielder Yildiz will hope to make his Champions League debut this season. He played 32 times for Juventus last season, scoring four goals.

  The Belgium winger scored 14 goals and bagged 14 assists for Dutch champions PSV in all competitions last season. There is no doubt about his ambition - he says he wants to challenge for the Ballon d'Or within five years.
