  Forward Mbappe only needs to score twice to enter the top-10 European Cup goalscorers ever this season. But he has yet to lift the trophy. His move from Paris St-Germain to perennial European champions Real Madrid means this could be his year.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Midfielder Bellingham exceeded all expectations last season, hitting 23 goals in all competitions as Real Madrid won the Champions League and La Liga. The goals dried up a bit though after Christmas and, two huge goals aside, his Euro 2024 performances for England were underwhelming. Can he hit the ground running in the Champions League this season?

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The most exciting youngster in the world. The winger made a name for himself at Barcelona last season, breaking several records at the age of 16. But he became a global phenomenon at Euro 2024, helping Spain lift the trophy. Can he live up to the hype this season? He already has three La Liga goals.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Another of Spain's European Championship stars, the attacking midfielder is playing senior football for a Spanish club for the first time. Barca's summer signing from Leipzig scored in his first three appearances for the club but will be out of action for the next four to five weeks after suffering a hamstring injury. He could be back in time for Barcelona's Champions League clash with Bayern Munich on October 23.

  This video can not be played To play this video you need to enable JavaScript in your browser. I try to never set limits - Kane after winning 100th England cap

  Striker Kane is beginning his annual hunt for a maiden trophy again. Last season he hit a sensational 44 goals for Bayern but they didn't win any silverware for the first time in more than a decade. Can that change under former Burnley boss Vincent Kompany?
  • None 'Night belongs to him and his golden boots' - Kane's 100 caps in numbers

  Another Londoner at Bayern, although Olise made his senior France debut in this month's Nations League games. The winger, a big summer signing from Crystal Palace, will he hoping to impress in his first season playing in Europe.
  • None The 'superstar' set for Musiala reunion - how Olise fits in at Bayern

  This video can not be played To play this video you need to enable JavaScript in your browser.

  The versatile attacking midfielder is back at Leipzig on loan from Paris St-Germain for the second season in a row. He scored 10 goals and registered 15 assists in 43 games last season - and will seek to improve on that tally this time.

  The latest Norwegian wonderkid, winger Nusa joined Leipzig from Club Bruges this summer - despite being a target for Chelsea, Tottenham and Brentford. He has already scored twice for his new club, which takes him halfway to his best goalscoring season already.

  This video can not be played To play this video you need to enable JavaScript in your browser. Julian Alvarez: Atletico Madrid move from Man City is new challenge

  Forward Alvarez has already scored eight Champions League goals and won the trophy - but this will be his first season as the main man in a team. Atletico Madrid will be expecting him to deliver after paying £81.5m to recruit him from Manchester City.
  • None An unwanted sale - so why have Man City let Alvarez leave?

  This video can not be played To play this video you need to enable JavaScript in your browser. Conor Gallagher speaks Spanish at his unveiling at Atletico Madrid

  Midfielder Gallagher finally completed his on-off transfer to Atletico Madrid from Chelsea - and seems to have settled in well. His energy and drive could see him become a favourite of Atleti boss Diego Simeone.
  • None 'Chelsea since birth' - is Gallagher exit a 'soulless ploy' or sense?

  Defensive midfielder Neves joined PSG from Benfica for a fee of at least £50m, in one of the biggest signings of the summer. He has already played 75 first-team games for Benfica, four for PSG and won 11 caps for Portugal, despite still being a teenager.
  • None Wanted by Europe's top clubs - who is Benfica teenager Neves?

  Another big-money teenager to join PSG this summer - they paid £42m to sign Rennes attacking midfielder Doue. Tottenham and Bayern Munich had also wanted the exciting youngster, who can play on the wing or centrally.

  Gyokeres is considered one of the most lethal strikers in Europe, despite being yet to play in one of the top leagues. He has played in the second tiers in Sweden, Germany and England - for Swansea and Coventry - and has scored 51 goals in 56 games for Sporting. This will be his first season in the Champions League.

  This video can not be played To play this video you need to enable JavaScript in your browser. Ademola Lookman - I've always believed in my ability

  Winger Lookman has become a new man since joining Atalanta in 2022, scoring 33 goals in just over two years - including a hat-trick in the Europa League final against Bayer Leverkusen. The London-born player had failed to hit double figures in any of his seasons in England and will be hoping to add to the 61 minutes of Champions League experience he had at Leipzig.
  • None 'Just the beginning' - Atalanta hat-trick hero Lookman eyes more glory nights

  This video can not be played To play this video you need to enable JavaScript in your browser.

  New England international Gomes remains Manchester United's youngest Premier League player, having made his debut aged 16 in 2017. But it is at Lille where the flexible midfield player has made his name, and made a Ligue 1 high of eight assists last season.

  The talented midfielder turned down the chance to move to Juventus and Napoli earlier this year to stay with Shakhtar Donetsk, despite the continuing invasion of Ukraine by Russia. Sudakov will be aiming for another good Champions League campaign, having netted against Barcelona last season.

  Celtic have spent big this summer with the £11m club record signing of midfielder Engels, who made his Belgium debut earlier this month. He was a regular for Augsburg in the Bundesliga last season in a variety of positions, including all across the midfield and at right-back.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Florian Wirtz has been on the scene for years but is still only 21. He has spent his senior career so far with Bayer Leverkusen and, with their German double win last season, the clamour for him to move on to win trophies may die down. Twelve of his 44 Leverkusen goals have come in the Europa League, but this is his first season in Europe's top competition.

  Frimpong excelled last season as a right wing-back in Xabi Alonso's nearly unstoppable Leverkusen team. He scored 14 goals and notched another 12 assists in all competitions. Can he take the Champions League by storm?

  The diminutive midfielder, supposedly dubbed the next Luka Modric, has been linked to Juventus and Arsenal but remains at Dinamo Zagreb for now. Part of Croatia's Euro 2024 squad, this is his second season in the Champions League group stages after 2022-23.

  Serhou Guirassy missed the start of the season through injury

  Striker Guirassy joined Borussia Dortmund for what could prove to be a bargain £15m this summer, after a breakout season for Stuttgart ended with him scoring 28 goals in 28 Bundesliga games - at the age of 28. He was unfortunate to not win a Golden Boot, with Bundesliga rival Kane the only player to score more in Europe's top five leagues. This is his second season in the Champions League after the 2020-21 campaign with Rennes - when he netted a goal against Chelsea.

  Ukraine keeper Trubin is entering his fifth season in the Champions League with Shakhtar Donetsk and Benfica - not bad for a 23-year-old. He has made 37 appearances in Europe already, including the Europa League and qualifiers.

  England Under-20 midfielder Clark was one of the so-called Jurgen Klopp's kids at Liverpool last season, playing 12 times. He became their youngest ever European goalscorer with a Europa League goal against Sparta Prague. He will hope to get a lot more game time this season after a £10m move to Austria to play for Salzburg, managed by ex-Liverpool assistant Pep Lijnders.
  • None All you need to know about Klopp's cup-winning kids

