content: |-
  We pick out 25 players outside the Premier League you could watch this season, as the Champions League comes to the BBC.

  Players to watch in Champions League - from stars to wonderkids

  Michael Olise's move from Crystal Palace to Bayern Munich will give him his first taste of Champions League football

  The Champions League returns this week, and this time you'll be able to watch highlights across the BBC. From 22:00 on the Wednesday of Champions League matchweeks, there will be match-by-match highlights available on BBC iPlayer and the BBC Sport website and app, plus a special Champions League Match of the Day on BBC One at 22:40. To get everyone in the mood, BBC Sport has picked out 25 players outside the Premier League to watch this season, ranging from the very obvious to some talented youngsters.

