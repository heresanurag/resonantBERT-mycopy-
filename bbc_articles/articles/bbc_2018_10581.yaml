title: 'Hurricane Florence: Mass evacuation from ''storm of a lifetime'' - BBC News'
date: '2018-09-13'
section: US & Canada
url: http://www.bbc.co.uk/news/world-us-canada-45499234
content: "The storm has been downgraded slightly, but is still \"extremely dangerous\"\
  \ and packing 125mph winds.\n\nThis video can not be played To play this video you\
  \ need to enable JavaScript in your browser. People have left homes and taken precautions\
  \ ahead of the hurricane\n\nUS East Coast residents are running out of time to flee\
  \ before Hurricane Florence hits the region as soon as Thursday evening, officials\
  \ warn.\n\nThe storm was downgraded to category three with maximum sustained winds\
  \ of 120mph (195km/h), but officials say it is still \"extremely dangerous\".\n\n\
  Up to 1.7 million people have been ordered to evacuate across South Carolina, North\
  \ Carolina and Virginia.\n\nFour South Carolina motorways have been diverted one-way\
  \ to speed the exodus.\n\nOn Wednesday, Georgia declared a state of emergency, following\
  \ the Carolinas, Virginia, Maryland and Washington DC.\n\nA National Weather Service\
  \ forecaster said: \"This will likely be the storm of a lifetime for portions of\
  \ the Carolina coast.\n\n\"And that's saying a lot given the impacts we've seen\
  \ from Hurricanes Diana, Hugo, Fran, Bonnie, Floyd and Matthew.\n\n\"I can't emphasise\
  \ enough the potential for unbelievable damage from wind, storm surge and inland\
  \ flooding with this storm.\"\n\nThis video can not be played To play this video\
  \ you need to enable JavaScript in your browser.\n\nJeff Byard, of the Federal Emergency\
  \ Management Agency, said: \"This is going to be a Mike Tyson punch to the Carolina\
  \ coast.\"\n\nNorth Carolina Governor Roy Cooper warned that \"disaster is at the\
  \ doorstep\", and \"tens of thousands\" of buildings may be flooded.\n\nWaves 83ft\
  \ (25m) tall were recorded at sea on Wednesday morning.\n\nBut while many coastal\
  \ residents have complied with mandatory evacuation orders, others are boarding\
  \ up their homes and vowing to ride out the storm.\n\nA holidaymaker from Ohio says\
  \ he plans to ride out the storm from his rental home in North Carolina's Outer\
  \ Banks\n\nIn a video posted to his Twitter account on Wednesday, US President Donald\
  \ Trump warned residents in Florence's bullseye to heed official warnings.\n\n\"\
  Get out of its way, don't play games with it,\" said Mr Trump. \"It's a big one,\
  \ maybe as big as they've seen, and tremendous amounts of water.\"\n\n\"Bad things\
  \ can happen when you are talking about a storm this size. It's called Mother Nature.\
  \ You never know, but we know. We love you all, we want you safe.\"\n\nEuropean\
  \ astronaut Alexander Gerst shared images of Florence's eye wall from space, calling\
  \ the storm a \"no-kidding nightmare\".\n\nThis Twitter post cannot be displayed\
  \ in your browser. Please enable Javascript or try a different browser. View original\
  \ content on Twitter The BBC is not responsible for the content of external sites.\
  \ Skip twitter post by Alexander Gerst This article contains content provided by\
  \ Twitter. We ask for your permission before anything is loaded, as they may be\
  \ using cookies and other technologies. You may want to read Twitter’s cookie policy,\
  \ external and privacy policy, external before accepting. To view this content choose\
  \ ‘accept and continue’. The BBC is not responsible for the content of external\
  \ sites.\n\nForecasters say the storm poses such a threat because it is expected\
  \ to slow down and hover for nearly two days over the Carolina coast, before dipping\
  \ south towards Georgia.\n\nIt is forecast to bring 20-40in (50-100cm) of rain and\
  \ life-threatening storm surges of up to 13ft. As of Wednesday evening, officials\
  \ say these surges are now \"highly likely\" as Florence churns closer.\n\nThe National\
  \ Weather Service also predicts \"catastrophic flash flooding and prolonged significant\
  \ river flooding\" in parts of the Carolinas and Appalachians.\n\nHurricane force\
  \ winds will emanate up to 70 miles from the centre of the storm, say meteorologists.\n\
  \nNational Hurricane Center Director Ken Graham warned that waterways up to 40 miles\
  \ inland may flood.\n\nMr Graham said the Pamlico and Neuse rivers in North Carolina\
  \ will see their flows \"reversed\" as storm surges push water back inland.\n\n\
  He added that half of fatalities during hurricanes are caused by storm surges, and\
  \ another quarter of deaths are due to inland rains and flooding.\n\nThe barrier\
  \ islands of the Carolina coastline could be prone to flooding\n\nThe relationship\
  \ between climate change and hurricanes is a complex one.\n\nWarmer seas power hurricanes.\
  \ So as the temperature of ocean water goes up, we might expect the intensity of\
  \ hurricanes to increase in future.\n\nA hotter atmosphere can also hold more water,\
  \ so this should allow hurricanes to dump more water on affected areas.\n\nBut there\
  \ are so many factors that contribute to these rare events, it has been difficult\
  \ to tease out clear trends from the data.\n\nChuck Ledford (L), watches Looney-Tunes\
  \ with his daughter Misty as they evacuate in Wilmington, North Carolina\n\nNavy\
  \ ships that are under repair and cannot go to sea are secured to the Norfolk, Virginia,\
  \ port with heavy moorings\n\nHurricanes are violent storms that can bring devastation\
  \ to coastal areas, threatening lives, homes and businesses. Hurricanes develop\
  \ from thunderstorms, fuelled by warm, moist air as they cross sub-tropical waters.\
  \ \n\nWarm air rises into the storm. Air swirls in to fill the low pressure in the\
  \ storm, sucking air in and upwards, reinforcing the low pressure. The storm rotates\
  \ due to the spin of the earth and energy from the warm ocean increases wind speeds\
  \ as it builds. When winds reach 119km/h (74mph), it is known as a hurricane - in\
  \ the Atlantic and Eastern Pacific - or a typhoon in the Western Pacific. \"Everybody\
  \ has a plan until they get punched in the face. Well, we're about to get punched\
  \ in the face.\" \n\nFlorida Mayor Bob Buckhorn, ahead of Hurricane Irma (2017)\
  \ The central eye of calmer weather is surrounded by a wall of rainstorms.\n\nThis\
  \ eyewall has the fastest winds below it and violent currents of air rising through\
  \ it. A mound of water piles up below the eye which is unleashed as the storm reaches\
  \ land. \n\nThese storm surges can cause more damage from flooding than the winds.\
  \ \"Urgent warning about the rapid rise of water on the SW FL coast with the passage\
  \ of #Irma's eye. MOVE AWAY FROM THE WATER!\"\n\nTweet from the National Hurricane\
  \ Center The size of hurricanes is mainly measured by the Saffir-Simpson scale -\
  \ other scales are used in Asia Pacific and Australia. Winds 154-177km/h\n\nRoofs\
  \ and trees could be damaged. \n\nStorm surge +1.8m-2.4m Hurricane Sandy (2012)\
  \ caused $71bn damage in the Caribbean and New York Hurricane Ike (2008) hit Caribbean\
  \ islands and Louisiana and was blamed for at least 195 deaths \"For everyone thinking\
  \ they can ride this storm out, I have news for you: that will be one of the biggest\
  \ mistakes you can make in your life.\" \n\nMayor of New Orleans Ray Nagin ahead\
  \ of Hurricane Gustav, 2008\n\nAre you in the area? How are you preparing for the\
