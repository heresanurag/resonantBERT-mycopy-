id: bbc_2018_1904
title: 'Amber Rudd: Jacob Rees-Mogg ''wrong'' to attack civil service - BBC News'
date: '2018-02-05'
section: General
url: http://www.bbc.co.uk/news/uk-politics-42936958
content: |-
  Amber Rudd says the Brexiteer should not have accused Treasury officials of fiddling figures.

  Amber Rudd says the Brexiteer should not have said that Treasury officials fiddled figures on Brexit to keep the UK in the European Union customs union.

  The home secretary was speaking on the Andrew Marr Show.
