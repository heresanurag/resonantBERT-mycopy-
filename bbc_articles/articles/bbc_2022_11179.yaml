title: 'Ukraine war: Billowing smoke after strike in Sevastopol - BBC News'
date: '2022-08-20'
section: General
url: http://www.bbc.co.uk/news/world-europe-62615923
content: |-
  Footage appears to show smoke rising from an area in Sevastopol where Russia's Black Sea fleet is based.

  More drone attacks against Russian targets have been reported in Crimea.

  The unconfirmed reports follow a string of attacks against Russian military sites and equipment in the annexed peninsula over the past week.

  Video appears to show smoke rising from the area in Sevastopol where Russia's Black Sea fleet is based.

  The BBC has not been able to independently verify the footage.
