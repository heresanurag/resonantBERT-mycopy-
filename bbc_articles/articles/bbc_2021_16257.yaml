  The woman's body was found in a house in Harcourt Drive on Saturday morning

  A murder investigation has been launched following the death of a woman in north Belfast.

  The 30-year-old's body was found in a house in Harcourt Drive on Saturday morning.

  A man, also aged 30, has been arrested on suspicion of murder.

  Det Ch Insp Darren McCartney said: "A post-mortem examination will take place in due course but I am treating her death as murder at this time."

  Detectives from the PSNI's Major Investigation Team are investigating and have appealed for anyone with information to contact them.

  SDLP North Belfast assembly member Nichola Mallon said: "The local community is deeply shocked to learn of the suspected murder of a woman in Harcourt Drive in North Belfast this morning.

  "This news is disturbing and I would urge anyone with any information to pass it to the police.

  "My thoughts are with the victim's family and friends at this extremely distressing time as they cope with the worst news any of us can imagine."

  North Belfast MP John Finucane of Sinn Féin said: "My thoughts are with the woman's family and friends at this extremely difficult time.

  "A police murder investigation is under way and I would call on anyone with any information which may help those inquiries to contact the PSNI."
