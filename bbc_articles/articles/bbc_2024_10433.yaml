title: 'Cliff Mitchell: Ex-Met PC jailed for 13 years for multiple counts of rape
  - BBC News'
date: '2024-05-02'
section: London
url: http://www.bbc.co.uk/news/uk-england-london-68937440
content: |-
  Cliff Mitchell's victims described him as "the devil" and "a pathetic excuse of a man".

  A former Metropolitan Police officer has received a minimum jail sentence of more than 13 years after being convicted of 10 counts of rape, including three of raping a child under the age of 13. His two victims described Cliff Mitchell, aged 24, as "the devil" and "a pathetic excuse of a man". Mitchell, of Wandsworth, south-west London, was a PC in the Met when several of the offences happened. He was sacked by the force in 2023. The court heard during his trial how Mitchell had kidnapped and raped one of his two victims while armed with a knife in September 2023, telling her to put her arms behind her back, before tying her up with cable ties and putting tape over her mouth. The jury was told he laughed at her as she cried, told her she was a slut and that no-one would believe her if she said anything because he was a police officer. Following a trial at Croydon Crown Court, he was found guilty of 10 counts of rape, three counts of rape of a child under 13, one count of kidnap and a breach of a non-molestation order. He received a life term, and must serve a minimum sentence of 13 years and 225 days for his crimes, which took place between 2014 and 2023.

  Mitchell had previously been the subject of a rape investigation in 2017, which resulted in no further action, the Met Police has said. Following his arrest in 2023, that case was reinvestigated, which resulted in Mitchell being charged with an additional three counts of rape of a child under 13 and three counts of rape. Sentencing Mitchell, Mrs Justice May said his crimes were so serious "a sentence of life imprisonment is required". She said: "Cliff Mitchell is clearly a deeply troubled young man... (his) serious offending appears to have arisen for desire for control. "The fact he was a police officer, albeit for a short time, will make imprisonment a harsher experience for him."

  At the sentencing hearing, one victim's statement addressing Mitchell read: "You have shown no remorse for what you did to us. "You deserve to spend the rest of your life in a cell because you are a serious danger to every woman walking the streets. "You are the devil. You disgust me. I hope you suffer for the rest of your life." The other victim, who said she lived in constant fear, said to Mitchell in court: "I'm holding you to account for your actions; you took away my self-worth. "You are a pathetic excuse of a man." The court heard how the two women suffer from post-traumatic stress disorder.

  Mitchell was a PC in the Met's West Area Basic Command Unit and was serving in Hounslow when a number of the offences were committed, the Met Police has said. He was suspended from the force after the later allegations came to light and was dismissed in December 2023.

  A jury at Croydon Crown Court found Mitchell guilty of 10 counts of rape, three counts of rape of a child under 13, one count of kidnap and a breach of a non-molestation order

  Shadow home secretary Yvette Cooper said the case raised questions as to how Mitchell was able to obtain a job in the Met, having previously been investigated for rape. "The fact that the police did not know Mitchell had a non-molestation order out against him whilst he was a serving officer shows total system failure in tackling violence against women and girls," she said. She called for "wholesale changes to vetting procedures". Deputy Assistant Commissioner Stuart Cundy said: "The fact (Mitchell) abused his power as an officer as part of his attempt to manipulate (the victims) is even more abhorrent. "We understand the concerns around Mitchell being cleared to join the Met after an initial report of rape was made in 2017, and the questions this inevitably raises. "Under our reformed vetting approach, Mitchell would not be granted vetting clearance and be able to join the Met. "We continue to reform and invest in our vetting unit, which today is larger, better equipped and staffed by people who are showing greater professional curiosity, diligence and determination than ever before."

