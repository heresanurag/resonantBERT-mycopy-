title: Inverness CT scrap Fife training plan and consider administration - BBC Sport
date: '2024-06-05'
section: Inverness CT
url: http://www.bbc.co.uk/sport/football/articles/cqqqez5y1vlo
content: |-
  Inverness scrap the controversial plan to move their training base to Fife and are preparing to go into administration should they fail to find new investment or new owners.

  Inverness Caledonian Thistle are preparing for life in Scottish League 1

  Inverness Caledonian Thistle have scrapped their controversial decision to move their training base 136 miles south to Fife and are preparing to go into administration should they fail in efforts to find new investment or new owners. The decision comes two days after chairman Ross Morrison resigned. Morrison was one of the architects behind the plan to share training facilities with League 1 rivals Kelty Hearts after relegation from the Scottish Championship. Now Caley Thistle have revealed they "are in discussions with potential new investors into the club and remain hopeful of finding a new investor or new owners".

  However, they point out that the collapse of a Loch Ness park and ride deal with Norwegian renewables company Statkraft at Caledonian Stadium, worth between £1.4million and £1.7m over five years, has left them in a precarious position. "It is also prudent to approach a suitably qualified insolvency practitioner to advise on how we may proceed should our efforts to find new investment fall short," the board of directors said in a club website statement. "For clarity, on the football front, we have decided to remain training at Fort George for the foreseeable future." Morrison had argued the move to Kelty would make it easier to attract players from the central belt and save the club money on accommodation costs. However, the idea was met with fierce criticism from supporters as well as former players and coaches, many of whom felt the club's identity was under threat. More than 200 fans attended a meeting last week to protest against the decision and voice their concerns - and some said they would refuse to buy a season ticket. It is against that backdrop that Morrison stood down prior to a board meeting on Monday. The reversal of the decision may cast doubt over whether the Highland club can maintain their full-time status, as well as the future of head coach Duncan Ferguson.
