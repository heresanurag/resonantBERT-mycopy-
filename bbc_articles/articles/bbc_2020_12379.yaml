title: First privately owned spacecraft successfully delivers astronauts to ISS -
  BBC News
date: '2020-11-17'
section: General
url: http://www.bbc.co.uk/news/54971249
content: |-
  Commander Mike Hopkins said his team had an amazing ride on the privately owned spacecraft.

  Four astronauts travelling in the SpaceX Dragon capsule have arrived at the International Space Station (ISS).

  The mission is considered a landmark achievement for private space travel.
