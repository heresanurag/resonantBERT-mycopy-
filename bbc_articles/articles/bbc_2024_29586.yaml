title: Blackpool South MP mugged by gang who snatched mobile phone - BBC News
date: '2024-11-05'
section: Lancashire
url: http://www.bbc.co.uk/news/articles/c1dpeyqk4x4o
content: |-
  Labour's Chris Webb described being attacked on the way back to his flat in London.

  MP Chris Webb said he was not injured in the attack in the capital

  Labour MP Chris Webb has described being mugged in London by a gang who stole his mobile phone. Writing on X, external, the member for Blackpool South said he was attacked as he returned from parliament along Lambeth Walk to his flat in the capital at about 22:00 GMT on Monday night. The Labour MP said that while he is "not an easy target" as a "big guy" of 6ft 2in, a "stealthy" group on bikes clad in balaclavas managed to catch him off-guard. "Luckily I have no injuries and I am ok," he said.

  Downing Street said Sir Keir Starmer's thoughts were with Mr Webb. A spokesman for the prime minister said there had been a shocking rise in people snatching bags and phones, and more must be done. Mr Webb told how he was mugged: "I was walking to the shop. I was on the phone to my wife. "I then literally said I think I jinxed myself, that I better get off my phone. I don't know this area and it's a bit dark. "Got to the shop, said that and, as I'm walking away, went to reach into my pocket to get my phone to phone my wife back, and that's when they grab me. "They grab my arm to stop me and then off they went," he said.

  The MP was targeted in the robbery in central London on Monday

  The gang made a quick getaway on their bikes, he added. Webb said he then locked his iPhone using his smartwatch and when police came, he helped them to track the phone to a location where a suspect was caught with a bag of phones and arrested. However, the MP's phone was not recovered. He added: "I wasn't on the phone at the time and I didn't hear them, which is remarkable in itself, of how stealthy they are, because these are on bikes," he added. "So the fact that, you know, and I'm normally pretty aware of my surroundings, I've got pretty decent reflexes and things like that from training and boxing training. "And I'm just surprised, because if I grabbed hold of one of them, they would have gone flying on the bike, because I wouldn't have let go. So I'm kind of surprised how they managed to get so close to me without me realising."

  He said his first instinct was to chase the group but he quickly realised he should instead get the phone tracked and locked and call the police. "I don't think I was targeted as an MP," he continued. "While I was in a suit and shirt and tie, they would not have known I was a member of parliament." He said the police went "above and beyond" to help him. The Metropolitan Police said officers were called at 21:55 GMT on Monday. "The victim was approached by a group of men who stole his phone from his hand. Inquiries remain ongoing," the force said.
