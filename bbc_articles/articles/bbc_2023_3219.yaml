title: 'Swansea: Specialist paramedics at ''surreal'' explosion scene - BBC News'
date: '2023-03-21'
section: General
url: http://www.bbc.co.uk/news/uk-wales-65018519
content: |-
  Exclusive footage shows specialist paramedics at work at the scene of a deadly gas explosion.

  Footage shows the scene faced by members of the Hazardous Area Response Team (Hart), of the Welsh Ambulance Service, were called to the scene of a house explosion in Swansea.

  "It can be quite surreal, it's almost like a movie set," said Hart paramedic Gareth Denman.

  Within half an hour of the 999 call following the explosion that killed one person and left three others in hospital, the team were at the scene.

  Exclusive footage shows the human chain formed by firefighters to remove debris, personal items and clothing strewn across the street, as well as the moment a cat was rescued.

