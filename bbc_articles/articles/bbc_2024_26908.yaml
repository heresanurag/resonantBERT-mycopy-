  Police Scotland Ch Insp Kat Thompson thanked the local community for their assistance. She said: "Our inquiries are ongoing to establish the full circumstances of what happened and we continue to work with partner agencies. “Our thoughts are with the family of the man who has died and everyone affected in the local community. “We would like to thank the local community for their co-operation and support and officers remain in the area. The fire service said specialist urban search and rescue units and a heavy rescue unit were among the resources it had deployed. On Monday gas engineers were seen carrying out work in front of the damaged flat.
