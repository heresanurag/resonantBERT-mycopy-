title: Days of disruption expected after fatal flat explosion - BBC News
date: '2024-10-07'
section: Tayside & Central Scotland
url: http://www.bbc.co.uk/news/articles/cr753n3y141o
content: |-
  Emergency services remain at the scene in Alloa, where a blast killed one man and left three others in hospital.

  Work continues at the scene in Alloa to make the area safe

  Disruption is expected for several days around the site of a fatal flat explosion in Clackmannanshire. Police are continuing investigations into the blast in Alloa on Sunday night which killed one man and left three others injured in hospital. Emergency services have remained at the scene on Kellie Place, which is cordoned off as work continues to make the two-storey building safe. A small number of residents who were evacuated are unable to access their homes.

  Ellen Forson, the leader of Clackmannanshire Council, told the BBC that initial investigations suggested the wider area was safe. She said: "I think that local people should expect some disruption in the coming days, just to allow the investigation to take place and to make sure that nothing is disturbed that's important." She also praised the "tight knit community" for coming together to help.

  Emergency services worked at the scene throughout Monday

  Nearby residents told BBC Scotland News the explosion sounded like a "sonic boom" when it happened on Sunday night about 18:00. A rest centre that was set up at Alloa Town Hall after the incident has now closed, with those affected having found accommodation with friends and family. Two men, aged 72 and 19, and a 49-year-old woman were taken to Forth Valley Royal Hospital for treatment. The area's MSP Keith Brown said there was a "sense of shock" in the community. He said: "I can't see that particular street being used until it's made completely safe, and that includes the future of the house that's been the subject of the explosion." He added that as well as the emergency services, rail authorities had also attended the scene, because the site is on the bridge of the local railway. CCTV footage recorded by a nearby restaurant captured the moment of the explosion. A number of locals were reported to have rushed to the scene to try and help.

