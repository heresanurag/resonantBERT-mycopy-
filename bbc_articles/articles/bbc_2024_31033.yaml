content: |-
  Ben Boulos sat down with Teresa Wickham to discuss the neurological condition dystonia after their on-air interaction was posted on TikTok.

  BBC Breakfast's Ben Boulos sat down with retail analyst Teresa Wickham to learn more about dystonia and reflect on his previous on-air mistake.

  In a 2023 interview, Boulos mistook Wickham's dystonia symptoms for nodding. Their interaction went viral on TikTok, and Wickham said the moment has helped in raising awareness about the condition.

  Dystonia is a lifelong neurological condition, external which can cause uncontrolled and painful muscle cramps and spasms. It is estimated to affect at least 100,000 people in the UK.
