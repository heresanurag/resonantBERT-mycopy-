title: Koala rescued from fire in Australia - BBC News
date: '2019-11-20'
section: General
url: http://www.bbc.co.uk/news/world-australia-50482858
content: |-
  Bushfires are spreading across Australia's east coast, ravaging the marsupial's main habitat.

  Hundreds of koalas are feared dead as bushfires spread across Australia's east coast, ravaging their main habitat.

  But some people are doing what they can to save the vulnerable marsupials.
