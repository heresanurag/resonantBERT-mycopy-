title: Andrew Lloyd Webber says Covid vaccine refusers are 'selfish' - BBC News
date: '2021-05-17'
section: General
url: http://www.bbc.co.uk/news/uk-57146619
content: |-
  Composer Andrew Lloyd Webber says people who refuse the Covid vaccine are selfish.

  Composer Andrew Lloyd Webber has compared people who refuse Covid vaccines to drink drivers.

  Speaking to BBC Radio 4's World at One programme, he called for people to consider how vaccine refusal affects others.
