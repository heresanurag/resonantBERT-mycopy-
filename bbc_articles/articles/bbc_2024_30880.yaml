  The pair performed the same dance again in the final, along with other routines to You Get What You Give by New Radicals and You'll Never Walk Alone by Gerry and the Pacemakers. Speaking before the final about his relationship with Buswell, who has reached the final twice before, McCausland said: "They [Strictly bosses] knew that Dianne would be the best partner for me. In terms of her humour, outlook on life, just the similarities between us and her communication. "I think they just knew how good we would work together, so I'm grateful for that." He has also entertained viewers with his quick-witted quips during interviews. After 20 years as a rising star of comedy, McCausland's Strictly success has now secured his place as one of Britain's most popular TV personalities.
