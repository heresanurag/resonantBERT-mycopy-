id: bbc_2021_251
title: 'Capitol riots: Moment protesters storm US legislature - BBC News'
date: '2021-01-07'
section: General
url: http://www.bbc.co.uk/news/election-us-2020-55564421
content: |-
  The US Capitol has gone into lockdown amid violent clashes between police and Trump supporters, who broke security lines and are inside the building.

  A Joint Session of Congress to certify the election of Joe Biden has gone into an unexpected recess, and the Capitol building into lockdown, after Trump supporters breached security lines.

  Earlier, President Trump addressed supporters at a rally outside the White House and encouraged them to protest the election result.
