title: '''Ice pancakes'' form on freezing Glasgow river - BBC News'
date: '2022-12-14'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-63974538
content: |-
  Frozen discs were spotted in Glasgow's Linn Park during the current cold snap.

  'Ice pancakes' have formed on a Glasgow river after days of freezing weather.

  Steven McCann spotted the discs floating next to a waterfall in the city's Linn Park.

  The pancakes form when foam floating on a river surface freezes. The chunks then become rounded as they bump into each other.
