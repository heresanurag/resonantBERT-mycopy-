title: 'European elections 2019: Corbyn sets out Labour''s Brexit position - BBC News'
date: '2019-05-20'
section: General
url: http://www.bbc.co.uk/news/uk-politics-48327089
content: |-
  Jeremy Corbyn says the British media is obsessed with defining people on how they voted in the 2016 EU referendum.

  Labour leader Jeremy Corbyn says Labour is not defining voters on how they voted in the 2016 EU referendum.

  Speaking to the BBC's Andrew Marr, he rejected claims that his party does not have a clear position on Brexit.
