title: 'Sri Lanka attacks: Family attends funeral - BBC News'
date: '2019-04-23'
section: General
url: http://www.bbc.co.uk/news/world-asia-48015268
content: |-
  Speaking at his wife's funeral, Lewis Allen recalls the moment he learnt she had died in the Sri Lanka attacks.

  Dutch national Monique Allen was killed in one of the attacks in Sri Lanka on Easter Sunday.

  She was on holiday with her three sons and husband, Lewis, when the Cinnamon Grand hotel was bombed. The rest of her family survived the attack.

  Speaking at her funeral, Mr Allen recalls searching for his wife in the immediate moments after the attack.
