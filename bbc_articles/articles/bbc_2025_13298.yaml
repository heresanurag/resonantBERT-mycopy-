title: Benfleet woman's CCTV catches fox stealing from washing line - BBC News
date: '2025-06-05'
section: General
url: http://www.bbc.co.uk/news/videos/cx2x1ex1wd3o
content: |-
  Evie Rogers hopes her missing clothes will return, but they are still unaccounted for.

  A thieving fox was caught on camera stealing laundry from a washing line.

  Evie Rogers, from Benfleet, noticed brand new dresses and underwear had gone missing and caught the culprit in the middle of the night on a security camera.

  "We did wonder for a little while whether there might have been a local weirdo, but the Ring doorbell did in fact catch a fox," she told BBC Essex.

  She shared her misfortune on Facebook, hoping she would be reunited with the missing garments, which are still unaccounted for.

  Dr Blake Morton, an animal behaviourist at the University of Hull, said foxes would often pinch items to make their dens comfier for their young.

  "At this time of year, we also get a lot of reports of foxes taking things like shoes and dog toys," he said.

  "As the cubs get older, they might be teething and, like puppies, they need stimulation."
