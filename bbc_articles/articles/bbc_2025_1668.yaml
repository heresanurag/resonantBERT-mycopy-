  As the BBC soap turns 40, take our quiz to see how well you know life around Albert Square.

  How well do you know EastEnders?

  How well do you know the UK's favourite soap? As EastEnders celebrates 40 years of Albert Square drama, do you consider yourself Queen of the Vic when it comes to EastEnders knowledge, or is it last orders for you and time to "Get outta' my pub!"? Take our quiz and find out.
