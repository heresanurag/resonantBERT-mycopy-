title: Cyclone Chido kills 94 people in Mozambique - BBC News
date: '2024-12-23'
section: Africa
url: http://www.bbc.co.uk/news/articles/c938wn7k2v3o
content: |-
  The storm also devastated Mayotte, where one week on, many residents still lack basic necessities.

  Cyclone Chido has killed 94 people in Mozambique since it made landfall in the east African country last week, local authorities have said. The country's National Institute of Risk and Disaster Management (INGD) said 768 people were injured and more than 622,000 people affected by the natural disaster in some capacity. Chido hit Mozambique on 15 December with winds of 260 km/h (160mph) and 250mm of rainfall in the first 24 hours. The same cyclone had first wreaked havoc in the French Indian Ocean territory of Mayotte, before moving on to Mozambique, Malawi and Zimbabwe.

  In Mozambique, the storm struck northern provinces that are regularly battered by cyclones. It first reached Cabo Delgado, then travelled further inland to Niassa and Nampula. The country's INGD said the cyclone impacted the education and health sector. More than 109,793 students were affected, with school infrastructure severely damaged. Some 52 sanitary units were damaged, the INGD said, which further risks access to essential health services. This is exacerbated further in areas where access to healthcare facilities were already limited before the cyclone. Daniel Chapo, leader of Mozambique's ruling party, told local media the government is mobilising support on "all levels" in response to the cyclone. Speaking during a visit to Cabo Delgado on Sunday, one of the most badly affected areas, Chapo said the government is working alongside the INGD to ensure those affected in the provinces of Mecúfi, Nampula, Memba and Niassa can rebuild.

  In Mayotte, Chido was the worst storm to hit the archipelago in 90 years, leaving tens of thousands of people reeling from the catastrophe. The interior ministry in its latest update confirmed 35 people had died. Mayotte's prefect previously told local media the death toll could rise significantly once the damage was fully assessed, warning it would "definitely be several hundred" and could reach thousands. More than 1,300 officers were deployed to support the local population.

  One week on, many residents still lack basic necessities, while running water is making a gradual return to the territory's capital. The ministry has advised people to boil water for three minutes before consuming it. Around 100 tonnes of equipment are being delivered each day, the ministry said, as an air bridge was built between Mayotte, Reunion and mainland France. In a statement on Friday, interior minister Bruno Retailleau said 80 tonnes of food and 50 tonnes of water had been distributed across Mayotte that day.

  Tropical cyclones are characterised by very high wind speeds, heavy rainfall, and storm surges, which are short-term rises to sea-levels. This often causes widespread damage and flooding. The cyclone, the INGD said, "highlights once again, the vulnerability of social infrastructures to climate change and the need for resilient planning to mitigate future impacts". Assessing the exact influence of climate change on individual tropical cyclones can be challenging due to the complexity of these storm systems. But rising temperatures do affect these storms in measurable ways. The UN's climate body, the IPCC, previously said there is "high confidence" that humans have contributed to increases in precipitation associated with tropical cyclones, and "medium confidence" that humans have contributed to the higher probability of a tropical cyclone being more intense.
