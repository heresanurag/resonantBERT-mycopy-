  The size of Davis Cup crowds and atmospheres created continues to be a talking point. The previous format of home and away ties, taking place across Friday, Saturday and Sunday, were largely partisan affairs played in front of strong crowds - albeit often in smaller venues. The round-robin format of the last 16, introduced following a controversial revamp, has led to largely empty arenas when the host nation are not playing and in some midweek ties. However, sales are said to be strong for Britain's final tie against Canada on Sunday, with the hope they could top the record 13,000 attendance set on the same day of last year's event at Manchester Arena.
