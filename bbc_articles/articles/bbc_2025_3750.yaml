title: John Lennon celebrated on Royal Mint coin for 85th birthday - BBC News
date: '2025-03-14'
section: Liverpool
url: http://www.bbc.co.uk/news/articles/cgr2dq9yjw5o
content: |-
  The coin, marking what would have been John Lennon's 85th birthday, recognises his legacy.

  John Lennon is the next music artist to form part of The Royal Mint's ongoing Music Legends coin series

  Beatles star John Lennon has been immortalised on a new coin to coincide with the year he would have celebrated his 85th birthday. It has been issued by The Royal Mint to honour Lennon's life and record-breaking career. The design of the coin is based on one of Lennon's most famous portrait photographs, taken on the roof of his penthouse in New York City, six years before he was shot dead. Its Imagine inscription on the right side of the coin is a special nod to the artist's single and album which became a posthumous hit worldwide.

  Coin designer Henry Gray wanted the portrait, based on an image taken by photographer Bob Gruen, to feature as the main design along with John Lennon's name. Lennon follows the likes of Queen, David Bowie, Shirley Bassey and Sir Paul McCartney, to be honoured on their very own UK coin. As a founder of The Beatles and also a solo artist, Lennon won an accolade of awards including seven Grammys, and has also been inducted into the Rock and Roll Hall of Fame, Songwriters Hall of Fame and has a star on the Hollywood Walk of Fame.

  John Lennon pictured in a recording studio before his death

  Lennon was killed by Mark Chapman, who shot him four times outside his New York Manhattan apartment on 8 December1980. Following his death fans gathered at the nearby Strawberry Fields memorial in Central Park for an all-day vigil, with musicians playing Lennon's songs while the crowd sang along. His widow, Yoko Ono is said to place a lit candle in the window of Lennon's room in the Dakota Building every year on 8 December.

  Fans and collectors will have their opportunity to secure a commemorative coin via The Royal Mint

  Rebecca Morgan, director of commemorative coin at The Royal Mint said the coin was a "fitting tribute" for what would have been the singer's 85th birthday on 9 October. "Still admired by millions of people and generations worldwide, we hope this coin and its design will be treasured for many years to come," she added.

