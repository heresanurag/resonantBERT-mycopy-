content: |-
  England's 2-1 loss in the Euros final after a late goal from Spain dominates the front pages.

  'Lions weep tonight' but team 'did us proud'

  England's 2-1 loss to Spain in the final of the Euros dominates the front pages.

  England's loss to Spain in the final of the Euros, which saw them equalise after going 1-0 down before conceding again in the 86th minute, dominates the front pages. The headline in the Daily Express, external reads, "Dream Is over... but three lions, you did us proud", while the Daily Mail says "football's not coming home". The Daily Telegraph, external shows a dejected Jude Bellingham on the pitch after the match contemplating the defeat. The Daily Mirror, external says the team will be "shattered" by the defeat, but manager Gareth Southgate has triumphed in one area: making England "believe in itself again". Owen Slot, the chief football writer for the Times, says on the front page that a "familiar heavy feeling returned to a familiar looking football team" in Berlin as England were unable to muster a second comeback against Spain. He says that despite their magic moments at this tournament, the brief "flutters of genius", England will know they were the second best team in the final. Inside, the paper says, external it understands that Southgate is expected to receive an upgrade to his OBE for getting his side to the final. He could, it suggests, even be knighted. The Sun, external goes further, saying the England manager looked a "certainty to be knighted" despite the defeat. It notes that Southgate took over a demoralised team in 2016 and has now led them to two Euros final and a World Cup semi. The paper reports that Betfair is offering odds of two to one for a knighthood.

  A number of papers lead on the aftermath of the attempted assassination of former president and Republican candidate Donald Trump at a rally in Pennsylvania on Saturday. The Financial Times, external says the shooting was an act of political violence that has transformed the 2024 presidential race - and threatens to polarise the United States still more. It says now is the time for the voices of moderation to be heard, though it suggests the mood on both sides of the political divide at the moment doesn't lend itself to cool heads or calm nerves. The Guardian, external agrees that the attempt on Mr Trump's life has upended the race for the White House - and triggered fears of more political violence to come. It says the US is "reeling" after the shooting and enduring one of the most contentious periods in its modern history. Inside, in an editorial, external, the paper urges "politicians of all stripes" to be careful in their rhetoric, and calls for the American public to make "this grim moment" a turning point for the better, not worse. For the Daily Telegraph, external, Mr Trump's call after the shooting for Americans to unite in the face of violence struck a "statesmanlike tone". It says the incident had cast a dark shadow over the presidential race - but that election strategists felt that his unity message would help win over swing voters in the run-up to November's presidential election. America has been left in "uproar" after the assassination attempt, according to the Daily Mail, external. The paper says Trump is now "tipped for a 'landslide' election victory" in November.

