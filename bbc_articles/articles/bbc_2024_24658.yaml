title: Human trafficking charges against Stagecoach tycoon are dropped - BBC News
date: '2024-10-10'
section: Tayside & Central Scotland
url: http://www.bbc.co.uk/news/articles/cdd4qy34m2yo
content: |-
  Dame Ann Gloag said the "malicious allegations" have been a devastating threat to her legacy.

  Ann Gloag was appointed a Dame in the 2019 New Year honours list

  Human trafficking charges against Scottish transport tycoon Dame Ann Gloag have been dropped, the Crown Office has said. The 81-year-old Stagecoach co-founder was charged alongside three other people by Police Scotland last year. All four strongly denied the charges. The Crown Office and Procurator Fiscal (COPFS) said it would take no further proceedings against any of the accused, unless further evidence became available. Dame Ann said the "malicious allegations" had been a devastating threat to her legacy.

  The allegations, dated from 2007 and 2022, were understood to be related to people brought to Scotland as part of Dame Ann's charity work with the Gloag Foundation. Her husband David McCleary and two other members of their family were also charged. A spokesperson for COPFS said: "After careful consideration of the facts and circumstances of the case, including the available admissible evidence, independent Crown Counsel instructed that there should be no proceedings taken at this time. "The Crown reserves the right to proceed in the future should further evidence become available, and it is in the public interest to do so."

  Dame Ann Gloag has donated to many charities over the years including the Africa Mercy hospital ship project

  Dame Ann said she welcomed the Crown Office decision. Her spokesperson said: "The threat that these malicious allegations have posed to Dame Ann's legacy has been devastating and acute. "The resulting waste of public funds and police time is deeply concerning and raises serious questions. "Dame Ann looks forward to moving forward with her life and will take time to reflect on the future focus of her charitable giving." A source close to Dame Ann previously told the BBC that the family were "victims of collusion" and had endured "a Kafkaesque nightmare for the last two years." Dame Ann co-founded the Stagecoach bus company in 1980, with her brother Sir Brian Souter, and was made a dame for her business and charity work. The Perth-based firm grew to become the UK's biggest bus and coach operator, and is now managed by DWS Infrastructure. When Dame Ann retired from the company in 2019, she was Scotland's richest woman. Dame Ann also founded the Gloag Foundation, a charitable trust which works to support projects that "prevent or relieve poverty and encourage the advancement of education, health and religion in the UK and overseas", according to its website.
