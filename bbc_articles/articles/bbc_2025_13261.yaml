title: Putin will seek revenge for Ukraine drone attack, warns Trump after phone call
  - BBC News
date: '2025-06-04'
section: World
url: http://www.bbc.co.uk/news/articles/cx2r108l785o
content: |-
  Trump says a call with the Russian president was a "good conversation" but would not lead to "immediate peace".

  Trump's call with Putin was the first since a major Ukraine attack on missile-carrying aircraft deep inside Russia

  Vladimir Putin has said he will have to respond to Ukraine's major drone attack on Russian airbases, Donald Trump has warned. Speaking after a phone call with the Russian president, the US president said: "President Putin did say, and very strongly, that he will have to respond to the recent attack on the airfields." Russian officials declined to confirm this on Wednesday night, but Moscow had earlier said that military options were "on the table" for its response. Trump warned in a social media post that the phone call, which lasted more than an hour, would not "lead to immediate peace" between Russia and Ukraine.

  Russian state-owned news agency RIA Novosti reported that Putin told Trump that Ukraine had tried to "disrupt" the negotiations and that the government in Kyiv has "essentially turned into a terrorist organisation". The two also "exchanged views on the prospects for restoring cooperation between the countries, which has enormous potential", it said. The conversation between the two leaders is the first since Ukraine launched a surprise attack using smuggled drones to strike Russian airbases on 1 June, targeting what it said were nuclear-capable long-range bombers. Trump told Putin during the call that the US was not warned in advance of the attack, Russian presidential aide Yury Ushakov said. Ukraine's Minister of Strategic Industries Yuriy Sak told Radio 4's World Tonight programme that his country had hoped the US would respond to the "incessant Russian missile and drone attacks" with "more sanctions and with more pressure". Last week, Trump appeared to set a two-week deadline for Putin, threatening to change how the US is responding to Russia if he believed Putin was still "tapping" him along on peace efforts in Ukraine. The comment was one of a string of critical remarks by Trump, who on 26 May said that Putin had gone "absolutely crazy" and was "playing with fire" after Russia escalated drone and missile attacks on cities in Ukraine, killing dozens of civilians. Trump made no mention of a deadline nor his previous remarks in Wednesday's post on his Truth Social platform. Ukrainian President Volodymyr Zelensky wrote on X about the scale Russian attacks on his country since Moscow's full-scale invasion in 2022. "Many have spoken with Russia at various levels. But none of these talks have brought a reliable peace, or even stopped the war," he said. "If the world reacts weakly to Putin's threats, he interprets it as a readiness to turn a blind eye to his actions." On Wednesday, a delegation of Ukrainian officials including Deputy Prime Minister Yulia Svyrydenko and Presidential Office head Andriy Yermak were set to meet US senators in Washington to discuss arms purchases and efforts to stop the fighting. Yermak said on social media that the delegation planned to discuss "defense support and the situation on the battlefield", sanctions against Russia and a previously signed reconstruction investment fund. Trump's warning also comes just days after a second round of direct peace talks in Istanbul between the warring sides ended without a major breakthrough, although they agreed to swap more prisoners of war. Ukrainian negotiators said Russia rejected an "unconditional ceasefire" - a key demand of Kyiv and its Western allies including the US. The Russian team said they had proposed multi-day ceasefires in "certain areas" of the frontline in Ukraine, although they gave no further details. Trump has previously - and repeatedly - said he believes the two sides are making progress, despite ongoing fighting on the frontline and aerial attacks carried out in both Russia and Ukraine. Separately on Wednesday, Putin also had a call with the US-born Pope Leo XIV. The Vatican confirmed that "particular attention" was paid to peace in the Ukraine war.

