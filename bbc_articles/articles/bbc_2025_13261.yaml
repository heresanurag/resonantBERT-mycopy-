  In Putin's call with Trump, the two leaders also discussed Iran. Trump said he believed the two "were in agreement" that "Iran cannot have a nuclear weapon". The US reportedly proposed that Iran halt all production of enriched uranium - which can be used to make reactor fuel but also nuclear weapons - and instead rely on a regional consortium for suppliers. Iran has not yet responded to the plan presented at the talks last Saturday. According to Trump, Putin "suggested that he will participate in discussions with Iran and that he could, perhaps, be helpful in getting this brought to a rapid conclusion". "It is my opinion that Iran has been slow walking their decision on this very important matter," Trump wrote. "We will need a definitive answer in a very short period of time." Iran's Supreme Leader Ayatollah Ali Khamenei has criticised the US proposal and said his country will not stop enriching uranium.
