title: 'Watch: Moment Tories lose Selby and Ainsty seat to Labour - BBC News'
date: '2023-07-21'
section: General
url: http://www.bbc.co.uk/news/uk-politics-66264364
content: |-
  Keir Mather wins the constituency of Selby and Ainsty with 16,456 votes.

  Labour's Keir Mather has won the seat for Selby and Ainsty in North Yorkshire, with 16,456.

  The seat was previously held by the Conservative Party's Nigel Adams, who resigned earlier this year.
