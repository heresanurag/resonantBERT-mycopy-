title: Rafah ground offensive ‘must not happen’ - Lammy - BBC News
date: '2024-02-22'
section: General
url: http://www.bbc.co.uk/news/uk-politics-68358524
content: |-
  Shadow Foreign Secretary David Lammy has led the Labour Party's calls for an “immediate humanitarian ceasefire” in Gaza in the House of Commons.

  Mr Lammy said a ground offensive in Rafah by Israel would be a "humanitarian disaster, moral catastrophe and a strategic mistake" and it must not happen.

  Labour has proposed its own amendment to the SNP's motion calling for an "immediate ceasefire".

  SNP and Tory anger as Speaker breaks convention on Gaza vote
