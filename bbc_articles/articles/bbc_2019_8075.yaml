  Updates from Thursday 25 July as the UK hit the July temperature record.

  Train problems 'could last until weekend'

  Severe disruption on the railways caused by "extremely high" temperatures could affect services on Friday, the Rail Delivery Group (RDG) has warned. The RDG, which represents train operators and Network Rail, said there was "severe disruption" across the country but particularly around London and the South East of England. Director Robert Nisbet said the heat was affecting metal track and overhead cables, with 20 out of 26 operators impacted. He said: “We believe there could be roll-on impacts tomorrow, because many of the trains will be in the wrong places, many of the rail staff will be in the wrong places and it will take time to re-set, to stabilise the timetable again. "We could see disruption up until the weekend.”
