content: |-
  Sonya Massey was shot at her home after police told her to put down a pot of boiling water.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Illinois police have released bodycam footage showing the chaotic moments that led to the fatal shooting of a woman who had called 911 to report a suspected intruder at her home. The killing of Sonya Massey, 36, over Independence Day weekend has led to criminal charges against the officer who opened fire, and drawn condemnation from the White House. Sangamon County Sheriff’s Deputy Sean Grayson has been sacked from the police force and charged with murder and official misconduct. He has pleaded not guilty to the charges. As of Monday, he was being held without bond. Daniel Fultz, a lawyer representing Mr Grayson, declined to comment when contacted by the BBC. On Monday, Illinois State Police released bodycam footage that shows the officers shouting at Ms Massey to put down a pot of boiling water as they point their pistols at her. The incident in the early hours of 6 July began when Ms Massey called police to her home in Springfield, 200 miles (320km) south of Chicago, to report that she believed someone had broken into her property. Officers followed her inside when Ms Massey entered her home, and watched as she searched for her identification.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'I want justice for my baby' - Massey's father speaks out after bodycam video released

  In the video, Mr Grayson sees a pot sitting on a lit stove, gestures towards it and says: "We don't need a fire while we're here." Ms Massey walks to the stove to remove the cooking utensil. She and Mr Grayson appear to laugh over her pot of "steaming hot water", before she twice says: "I rebuke you in the name of Jesus." "You better [expletive] not or I swear to God I'll [expletive] shoot you in your [expletive] face," Mr Grayson says. He then draws his pistol as he shouts for her to drop the pot. "OK, I'm sorry," Ms Massey is heard saying before she ducks. After shooting her, the officer says: "What else do we do? I’m not taking hot [expletive] boiling water to the [expletive] face." The video also records Mr Grayson telling his police partner that she would not need medical help. As the other deputy tries to get a medical kit, the officer says: "She's done. You can go get it, but that's a head shot." Mr Grayson then leaves to get his own medical kit, after the other officer says that they can at least try to stop Ms Massey's bleeding. On Monday, the Sangamon County State’s Attorney’s Office said Mr Grayson was not justified in his use of force.

  In a statement, President Biden said he was "heartbroken" for her family and that her death was a reminder "that all too often Black Americans face fears for their safety in ways many of the rest of us do not". Vice-President Kamala Harris called on Congress to pass police reforms, posting on X: "Sonya Massey deserved to be safe. "The disturbing footage released yesterday confirms what we know from the lived experiences of so many - we have much work to do to ensure that our justice system fully lives up to its name." Illinois Attorney General Kwame Raoul called the footage of the shooting "horrific" in a statement on Monday. “As the community reacts to the release of the footage, I urge calm as this matter works its way through the criminal justice system," Mr Raoul said. Attorneys for Ms Massey's family have commended prosecutors for their swift action against Mr Grayson. Personal injury lawyer Benjamin Crump said the footage would "shock the conscience of America".
