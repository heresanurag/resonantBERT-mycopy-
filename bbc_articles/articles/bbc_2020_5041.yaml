title: Coronavirus in Scotland - preparing to ease lockdown - BBC News
date: '2020-05-22'
section: Scotland
url: http://www.bbc.co.uk/news/live/uk-scotland-52664837
content: |-
  The latest updates on the coronavirus pandemic in Scotland.

  Quote Message: The first minister was was keen to stress, again and again, that the first phase of lockdown easing hasn’t happened yet. If it does happen, it happens from 28 May. The current lockdown remains in place, and the one thing that would slow down progress towards easing it is to take the brakes off far too rapidly. I also liked the point she clarified that you will be allowed to meet people from another household outside, as long as it is one at a time, but it doesn’t limit you to one household. So no big house parties or garden parties, but you don’t have to choose just one set of buddies. You can move from one to another. Try to limit the travel, stay local. She said 'OK, the five-mile limit is not a rigid rule, you won’t be stopped by the police, but try to stay local because we don’t really want you to go indoors'. There has been a reluctant acquiescence from the business elements, even though the construction industry had hoped to go a lot more quickly than this. But Nicola Sturgeon is adamant she has to go at the carefully caveated pace that will not allow the virus to regroup."

