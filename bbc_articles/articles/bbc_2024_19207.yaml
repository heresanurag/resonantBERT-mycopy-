title: ‘Their brutal ordeal is over’ - Biden remarks after prisoner swap - BBC News
date: '2024-08-02'
section: General
url: http://www.bbc.co.uk/news/videos/ckdgqdwz098o
content: |-
  The US president thanked his allies, who he says played a key role in the prisoner exchange.

  US President Joe Biden has celebrated the release of American prisoners in Russia, as part of a prisoner exchange.

  Sixteen prisoners have been released from Russian prisons in the biggest exchange deal between Russia and the West since the Cold War.

  Wall Street Journal reporter Evan Gershkovich and US Marine veteran Paul Whelan are among those on their way back to the US.

  Biden added that the exchange was largely due in part to American allies.
