  Aitana Bonmati has once again found herself at the heart of success for both Barcelona and Spain. The creative playmaker won every possible trophy at club level as Barca secured a historic quadruple. Bonmati scored a career-best 19 goals across all four competitions as Barca won a fifth straight league title, the Champions League, Supercopa and Copa de la Reina. The 2023 Ballon d'Or winner netted the first goal in Barca's Champions League final triumph over Lyon and was named the competition's player of the season. And having helped Spain to lift their first World Cup trophy in 2023, Bonmati spearheaded their charge to the inaugural Nations League title in February with four goals, including one in their 2-0 win over France in final.

