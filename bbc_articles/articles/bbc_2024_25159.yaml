  Often considered one of the most underrated players in world football, Caroline Graham Hansen grabbed fans' attention with a stellar 2023-24 season. The crafty winger, who is known for dancing past defenders, has struggled with injury throughout her career but starred on all fronts for Barcelona over the past 12 months. As the Spanish side wrapped up a historic quadruple, Graham Hansen racked up an incredible 60 goal contributions in 40 games. She finished Liga F, which Barca won for the fifth straight time, as the Golden Boot winner with 21 goals. They often arrived at crucial moments, too, with her second-half strike against Chelsea ultimately taking Barcelona into the Champions League final - and a hat-trick against Levante in the final of the Supercopa.

