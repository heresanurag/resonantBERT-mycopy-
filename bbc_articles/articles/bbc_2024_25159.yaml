  Barbra Banda was already a global superstar after the Tokyo Olympics in 2021 and 2023 World Cup, but her profile hit new heights when Orlando Pride paid Chinese club Shanghai Shengli $740,000 (£581,000) to sign her in March. The second most-expensive women's footballer - behind her Zambia team-mate Racheal Kundananji - Banda has lived up to that status in the NWSL - America's top league. Despite joining Orlando Pride late in the NWSL regular season, the clinical striker has netted 13 goals and sits second in the league's scoring chart. Already the first female player to score successive hat-tricks at the Olympic Games, having done so in 2021, Banda once again dazzled on that stage this summer. The Zambia captain scored four goals in Paris, including a first-half hat-trick against Australia, to become Africa's all-time top scorer in Olympic football history with 10 goals.

