  Vote now for the BBC Women's Footballer of the Year 2024, with the winner announced on 26 November.

  Last chance to vote for your BBC Women's Footballer of the Year

  This video can not be played To play this video you need to enable JavaScript in your browser. BBC Women's Footballer of the Year 2024: Meet the nominees

  There is not long left to vote for your 2024 BBC Women's Footballer of the Year. Fans from across the world can vote for their favourite from the five-player shortlist of Barbra Banda, Aitana Bonmati, Naomi Girma, Caroline Graham Hansen, Sophia Smith. The award was first given out in 2015, making this its 10th year. Voting closes at 09:00 GMT on Monday, 28 October 2024 and the winner will be announced on Tuesday, 26 November on BBC World Service and the BBC Sport website and app. The five contenders for the BBC World Service accolade were chosen by a panel of experts, including coaches, players, administrators and journalists. Below is the opportunity to cast your vote, and read more on the five contenders.

