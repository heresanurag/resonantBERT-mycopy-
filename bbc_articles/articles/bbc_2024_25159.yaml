  Defenders can often fly under the radar, but that's not the case for Naomi Girma. Described as "the best defender I have ever seen" by United States head coach Emma Hayes, Girma has impressed for both club and country. The 24-year-old, whose parents were both born in Ethiopia, made history in January when she was named the US women's player of the year - becoming the first defender to win the award. She played every minute in her nation's run to Olympic gold and the centre-back, known for her composure on the ball and leadership qualities off it, was widely considered one of their most pivotal players during the tournament. The United States' triumph in Paris wrapped up a remarkable treble in 2024 after their success in the Concacaf Gold Cup and She Believes Cup. There was similar success for Girma at club level as San Diego Wave secured the NWSL shield and Challenge Cup.

