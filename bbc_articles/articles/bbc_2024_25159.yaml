  There are not many strikers who are more in form than Sophia Smith. The 24-year-old was a crucial cog in Emma Hayes' United States gold-medal-winning machine, hitting the back of the net on three occasions at Paris 2024. The most important of those was an extra-time winner against Germany in the semi-finals, with Smith cool and composed enough to place a delicate chip over the goalkeeper. Smith also proved prolific in the SheBelieves Cup, scoring two goals and converting her penalty in the shootout in the final against Canada to earn herself the tournament's Most Valuable Player accolade. However, her hot goalscoring form for the United States should have come as no surprise given her record at club level. With the Portland Thorns, Smith finished the 2023 regular season as the NWSL's Golden Boot winner on 11 goals - a tally she has already matched in 2024.
