  A selection of striking images from around the world, taken over the past seven days.

  State Troopers arrest students during a pro-Palestinian protest at the University of Texas in Austin. Hundreds of people have been arrested on dozens of campuses across the US, where protests and encampments have sprung up, in support of Palestinians in Gaza.
