title: Brighton Marine Drive cliff-plunge van driver killed - BBC News
date: '2019-05-12'
section: Sussex
url: http://www.bbc.co.uk/news/uk-england-sussex-48243765
content: |-
  The vehicle was found wrecked at the bottom of 100ft cliffs, below Marine Drive, Brighton.

  The van crashed down the cliff on to Undercliff Walk

  A driver was killed when his van plummeted nearly 100ft (30m) off a cliff in Brighton.

  Sussex Police received calls just after 06:30 BST on Sunday telling them a van had "gone over the cliff" from Marine Drive.

  The silver Vauxhall was found badly damaged on Undercliff Walk. The driver was pronounced dead at the scene.

  The force said it was investigating and has appealed to drivers with dash-cam footage to come forward.

