title: 'Liverpool: Mohamed Salah says no progress on new contract - BBC Sport'
date: '2025-01-04'
section: Liverpool
url: http://www.bbc.co.uk/sport/football/articles/clynq1l84gdo
content: |-
  Liverpool forward Mohamed Salah says there has been no progress on extending his contract - and a breakthrough is "far away".

  Mohamed Salah has won the Champions League and Premier League with Liverpool

  Mohamed Salah says there has been no progress on extending his Liverpool contract - and a breakthrough is "far away". The Egypt forward has entered the final six months of his deal and can now hold talks with non-English clubs over a free transfer when it expires this summer. The 32-year-old, who joined Liverpool from Roma in 2017, has scored 20 goals in all competitions this season to help the Reds top the Premier League and Champions League tables. Asked whether he thought this was his final season at Anfield, he told Sky Sports: , external"So far, yes. It's the last six months. "There is no progress there. We are far away from any progress. "So, we just need to wait and see." Asked about the prospect of winning the Premier League this season, he added: "It's my last year in the club so you want to do something special for the city."

  Salah has been increasingly vocal about his Liverpool future in media interviews over recent months. Following a 3-0 win against Manchester United in September, Salah said he treated the game as if it was the "last time" he would play at Old Trafford, before saying something similar when Liverpool beat Manchester City last month. After a win over Southampton in November the former Chelsea forward said he was "disappointed" by the lack of a contract offer, reiterating after Monday's win at West Ham that any agreement was "far away". Despite those comments Salah says he has been able to block out the speculation and focus on his football. He said: "The thing in my head is that if this is the last six months, what do you want to see in the future? "Do you want to look back and say I was concerned or stressed about the contract? Or do you just want to say I had an unbelievable season? That's what is in my head. "If I ever feel distraction, I just remind myself I want to look back and say I had an unbelievable season. That's what I want to do." Salah is the Premier League top scorer this season with 17 goals, three ahead of Manchester City's Erling Haaland. The former Basel forward, club captain Virgil van Dijk and England defender Trent Alexander-Arnold are all out of contract at the end of the season. Alexander-Arnold has been heavily linked with a move to Real Madrid, though Reds manager Arne Slot says he is "fully committed" to the club.
