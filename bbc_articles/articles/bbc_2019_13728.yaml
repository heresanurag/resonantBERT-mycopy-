title: 'Wales weather: Met Office warns of floods and disruption - BBC News'
date: '2019-11-23'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-50530656
content: |-
  The Met Office issues two separate weather warnings for heavy downpours in south Wales.

  The warning covers most of south Wales and some areas of southern Powys

  Forecasters have warned of flooding and disruption in south Wales with heavy downpours on Tuesday and Wednesday.

  The Met Office yellow warning is in place until 15:00GMT on Wednesday and covers most of the south of the country, and parts of southern Powys.

  Some properties are likely to flood and travel could be disrupted, it said.

  There are four flood warnings in place on Tuesday evening in Kidwelly and Pendine in Carmarthenshire and Newgale and Dale in Pembrokeshire.

