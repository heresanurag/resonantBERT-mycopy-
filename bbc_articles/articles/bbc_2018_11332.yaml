title: First '999 Day' honours emergency services across UK - BBC News
date: '2018-09-09'
section: UK
url: http://www.bbc.co.uk/news/uk-45463288
content: |-
  The new emergency services day hopes to raise some of the £2m needed for a memorial to staff.

  The national event is being held at a park in Manchester

  Thousands of people have celebrated the first emergency services day to honour the contribution of crews across the UK.

  Also known as "999 Day", the event in Manchester started with a two-minute silence at 09:00 BST, on the ninth hour of the ninth day of the ninth month.

  A thanksgiving service was held in the city on Friday to honour those who have died in public service.

  Prime Minister Theresa May said the UK was "indebted" to emergency staff.

