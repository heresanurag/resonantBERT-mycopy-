id: bbc_2017_12543
title: Florida plane highway crash caught on dashcams - BBC News
date: '2017-11-20'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-42050165
content: |-
  The crash was caught on the dashcams of two police officers.

  A pilot has crash landed on a Florida highway after experiencing engine trouble.

  It happened near Clearwater Airpark in Pinellas County on Sunday morning.

  The incident was caught on the dashcam of two police officers who were in the area on an unrelated call.

  There were no reported injuries.
