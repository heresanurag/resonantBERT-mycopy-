title: Watch the moment a skate attacks a fisherman's boat off Shetland - BBC News
date: '2024-11-23'
section: General
url: http://www.bbc.co.uk/news/videos/crmz0pw7l1jo
content: |-
  A man has been telling how his small inflatable boat was attacked by a skate while he was fishing off the coast of Shetland.

  RNLI technician Paul Hutchison was out at sea at Muckle Roe when the large fish began to ram his boat.

  The creature punctured the vessel in several places, even leaving behind a few of its teeth.

  It is believed the fish was most likely a flapper skate, which is native to the Shetland waters.

  The common skate , which includes flapper skates, has been listed as critically endangered by the International Union for Conservation.
