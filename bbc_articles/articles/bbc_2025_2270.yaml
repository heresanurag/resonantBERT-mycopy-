content: |-
  The noodle dish, provided only to mourners, has gone viral on Chinese social media.

  Chinese foodies pose as mourners to try funeral home's noodles

  Guizhou cuisine is known for its spicy and sour flavours

  Foodies in China have been reportedly flocking to an unlikely destination - a funeral home - after a noodle dish served at its canteen went viral on social media. The dish is found at the Erlong Funeral Home in the southwestern province of Guizhou. The canteen caters to the funeral home's customers, but as word began to spread about its noodles, hordes of diners - some posing as mourners - began showing up to try the food. Erlong has since announced it will allow some members of the public to eat at its premises, as long as they do not disturb genuine mourners.

  The funeral home offers various types of noodle dishes during breakfast and supper hours, which cost 10 yuan per bowl ($1.38; £1.09). The most popular type is reportedly the noodles topped with minced pork and peanuts. One Erlong worker told Jiupai News that they "only served customers who come to the funeral home to handle matters". But other people have been sneaking in to get a bowl of noodles, the worker said, adding that sometimes queues at Erlong are so long that diners sometimes have to wait a couple of hours to get their food. "There have been people pretending to be relatives of the deceased, it's hard to tell them apart when it gets crowded, and it's hard to manage," he said. To meet the demand, the funeral home has since decided to offer 50 bowls of noodles to members of the public every day - for free - as long as "they do not affect people's mourning", according to Erlong's chef in an interview with local media. While the noodle dish was already popular among locals, the craze appeared to have ramped up earlier this month when a social media user posted about the dish while visiting a friend in Guizhou, which is known for its spicy and sour dishes. "My friend says the food at this funeral home is so good," they wrote earlier this month on Xiaohongshu, also known as RedNote. "The queue for food is longer than the queue to lay flowers for the deceased." "I didn't get to eat the noodles, because my friend's mum didn't know anyone who was holding a funeral service." Since then, many Chinese social media users have also shared their experiences eating the noodles. On Douyin, the Chinese version of TikTok, one user shared a photo of the dining hall's tickets, with what appeared to be a crowd queuing up for food. "I heard the noodles here were very good," they wrote. "I thought about how short life was, and got another bowl."
