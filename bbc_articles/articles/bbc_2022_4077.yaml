id: bbc_2022_4077
title: 'Ukraine crisis: Kyiv residential buildings hit in Russian strikes - BBC News'
date: '2022-03-16'
section: General
url: http://www.bbc.co.uk/news/world-europe-60748417
content: |-
  More residential buildings are set ablaze after explosions in the capital.

  Kyiv has been hit by more Russian strikes, with a number of tower blocks damaged and set ablaze.

  Two people have been killed in an airstrike that hit one residential building, according to Ukraine's state emergency service.
