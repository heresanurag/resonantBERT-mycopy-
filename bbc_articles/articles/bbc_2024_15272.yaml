content: |-
  The pop star turned domestic abuse campaigner is given an honorary degree from Leeds Beckett University.

  Mel B says receiving an honorary degree has been "life-changing"

  Former Spice Girl Melanie Brown has described receiving an honorary degree for her work supporting domestic abuse victims as "life-changing". The pop star turned campaigner received the award from Leeds Beckett University at a graduation ceremony on Monday. Brown, also known as Mel B, became a campaigner for domestic abuse victims after leaving what she described as an abusive relationship. She said the award was "as massive" as performing at Wembley Stadium with the Spice Girls.

  A spokesperson for the university said the award award recognised "her role as a campaigner and advocate for domestic abuse victims, as well as her reputation as a globally recognised music icon". Brown, who hails from Leeds, said she had also been studying on the Trauma Informed Care course at the university and had passed all of her exams. “Being awarded this honorary degree from Leeds Beckett University has been life-changing," she added. “I didn’t just want to accept an award. I wanted to be accepted as a student at Leeds Beckett. "Not only have I been awarded this degree, but I was also accepted as a student on the trauma informed care course, which has been a huge step for me in so many ways." The pop icon added that becoming a student “was probably one of the most terrifying things I’ve ever done, but it’s changed my life". She said she planned to frame her degree certificate along with her student card. In March, Brown spoke to the BBC about how she moved into her mum's bungalow, after she left ex-husband Stephen Belafonte. Belafonte, a film producer, has repeatedly denied the claims against him made by the singer. Follow BBC Yorkshire on Facebook, external, X (formerly Twitter), external and Instagram, external. Send your story ideas to yorkslincs.news@bbc.co.uk, external.
