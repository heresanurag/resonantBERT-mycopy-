title: Huge fire rips through warehouse in Russia - BBC News
date: '2024-01-14'
section: General
url: http://www.bbc.co.uk/news/world-europe-67971416
content: |-
  Hundreds of firefighters battled to put out the blaze at the Wildberries warehouse in St Petersburg.

  A huge fire has broken out at the Wildberries warehouse in St Petersburg.

  The blaze covered up to 70,000 square metres, with nearly 300 firefighters battling to put out the flames.

  All staff members were said to have been evacuated in time, and no injuries were reported.
