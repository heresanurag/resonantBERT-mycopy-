title: Boy, 13, critical after Ashton-in-Makerfield hit-and-run - BBC News
date: '2020-07-08'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-53333376
content: |-
  A 15-year-old boy is being held on suspicion of driving offences after the victim was hit on the pavement.

  The 13-year-old was hit on the pavement in Old Road

  A 13-year-old boy is fighting for his life after being hit by a car as he walked along the pavement.

  The driver and passenger of the Jaguar failed to stop following the crash in Wigan at about 16:30 BST on Tuesday, Greater Manchester Police (GMP) said.

  The boy is thought to have been walking along Old Road in Ashton-in-Makerfield when the car hit him and then a wall.

  A 15-year-old boy has been arrested on suspicion of causing serious injury by dangerous driving.

  He remains in custody for questioning, said a GMP spokesperson.

  A nearby wall was damaged after it was struck by the car

  The 13-year-old sustained serious injuries and was taken to hospital where he remains in a life-threatening condition.

  Old Road was closed for about six hours while police investigated but has since reopened.

  "We are very much keeping an open mind and would make a direct plea to anyone who may have been involved, or has the slightest bit of information, to do the moral thing and come forward," he said.

