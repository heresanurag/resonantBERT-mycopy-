  A man is arrested on suspicion of murder after 45-year-old Pamela Munro was stabbed to death.

  Man arrested after woman stabbed to death in Enfield

  Pamela Munro was pronounced dead at an address in Enfield

  A man has been arrested on suspicion of murder after a woman, named as 45-year-old Pamela Munro, was stabbed to death in north London on Saturday. The Metropolitan Police, along with London Ambulance Service and London's Air Ambulance, responded to reports of a stabbing at an address in Ayley Croft in Enfield. Ms Munro was found with stab wounds and died at the scene. A 29-year-old man was arrested on suspicion of murder on Monday morning and was remanded in custody, police said.

  Det Ch Insp Neil John, of the Met's Specialist Crime Command, said: "Investigating officers have worked relentlessly across the weekend to investigate the circumstances around Pamela's death. "We continue to support her family, who are understandably devastated. "We continue to ask anyone who may have information or particularly anyone who was driving through Ayley Croft between 18:30 BST and 19:30 on Saturday 19 April, and could have any dashcam footage, to contact us."
