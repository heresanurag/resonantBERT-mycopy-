  Wiegman wins fourth best coach of the year award

  Wiegman led the Lionesses to the Euro 2022 final and their debut appearance in a World Cup final the following summer, the second time she has led a national side to consecutive major finals after doing so with the Netherlands in 2017 and 2019.

  The Lionesses added more silverware to their collection under Wiegman in 2023, winning the first Women's Finalissima against Brazil in April, as well as the Arnold Clark Cup.

  No coach has won a place on the Fifa best women's coach podium more times than Wiegman, with the Dutchwoman having featured on seven occasions, winning four times.

  "I didn't expect to win," said Wiegman. "We have had a very good run with England but so have a lot of teams.

  "Going to the top is easier than staying there, after winning the Euros everyone really wants to beat us. We want to improve every day and keep winning games," she added.

  A glittering run continues for Earps, who memorably saved a penalty in England's debut World Cup final appearance in the summer, which they lost 1-0 to Spain.

  Collecting the Fifa Best goalkeeper prize for the second successive year, the Manchester United keeper said: "It just feels even more special [to win it again], to have a level of consistency is the most difficult thing you can do in football.

  "It is really hard to maintain levels when people have really high expectations of you."

  Her standout performance across the season also saw her voted both BBC Sports Personality Of The Year and BBC Women's Footballer of the Year, as well as being named Women's Super League goalkeeper of the year and earning a fifth-place finish in the voting for the Ballon d'Or.
