id: bbc_2018_9058
title: 'World Cup: Paris celebrations turn violent on the Champs Elysees - BBC News'
date: '2018-07-16'
section: General
url: http://www.bbc.co.uk/news/world-europe-44844447
content: |-
  Police used water to disperse crowds when violence erupted after France's win over Croatia.

  France are celebrating their second World Cup win in 20 years.

  However, the celebrations turned violent when dozens of vandals clashed with police and destroyed local shop fronts on the Champs Elysees.
