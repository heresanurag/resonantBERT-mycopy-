title: DUP Covid lockdown messages published by inquiry - BBC News
date: '2024-05-09'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-68981075
content: |-
  Ex-Agriculture Minister Edwin Poots suggested an incremental relaxation of restrictions in May 2020.

  Edwin Poots is giving evidence to the inquiry on Thursday

  WhatsApp messages exchanged between DUP ministers after the start of the Covid-19 pandemic have indicated concern at the high level of restrictions in the first few months. The exchanges were published late on Wednesday on the Covid inquiry website. In May 2020, then-Agriculture Minister Edwin Poots told colleagues: "Incremental relaxation based on publi (sic) safety needs to happen and soon." The discussion then moved onto wider health issues. The first case to be detected in Northern Ireland had happened in February that year. Former Education Minister Peter Weir said: "There is no point saving 100 lives from Covid if we cost 200 from other sources." Mr Poots replied: "We are doing that, less screening, less clinics, less people reporting TIAs (transient ischaemic attack) and chest complaints leading to more strokes and heart attacks. "All hospitals are operating well below capacity."

  He added: "Lockdown was based on an overwhelmed health service... we are not in that place." Messages were also published from the then-DUP Junior Minister Gordon Lyons and special adviser Philip Weir. It appeared to be a WhatsApp group but the document which has been published does not make it clear.

  Justice Minister Naomi Long is to also give evidence at the inquiry

  The exchange is contained in a document entitled "Extract of Edwin Poots' WhatsApp messages with Philip Weir, Emma Little-Pengelly and other members of the Executive, dated between 09/06/2020 and 11/06/2020". However, the WhatsApp messages quoted above are dated 7 May 2020. They included what appears to be criticism of some non-DUP ministers, but, again, this is not totally clear.

  Carál Ní Chuilín, left and Deirdre Hargey both spoke at the inquiry on Wednesday

  Meanwhile, the former Sinn Féin minister Carál Ní Chuilín included a formal apology to families who lost relatives during the pandemic in her written statement to the inquiry. Before voicing her apology at Wednesday's session in Belfast, she had set out her position within a wide-ranging 46-page written document. It has now been published on the inquiry website. Ms Ní Chuilín wrote: "I attended the funeral of my dear friend Bobby Storey in a personal capacity, and I accept that in doing so I caused hurt to families who lost a loved one during the pandemic. I apologise for the hurt caused by my actions." The former minister also wrote about receiving abuse online during the pandemic, some of which she said was misogynistic. She concluded by saying she hoped lessons could be learned "to ensure that we are better placed to protect lives in the event of a future pandemic". Ms Ní Chuilín said there needed to be better information sharing and co-operation with the Irish government.
