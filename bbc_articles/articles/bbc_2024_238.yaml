id: bbc_2024_238
title: Alan Bates attacks 'madness' of Post Office compensation delays - BBC News
date: '2024-01-16'
section: General
url: http://www.bbc.co.uk/news/uk-politics-67993903
content: |-
  The former sub-postmaster, famously portrayed in an ITV drama, says he is "frustrated to put it mildly".

  The former sub-postmaster, Mr Bates, who came to fame when portrayed in an ITV drama with his name in the title has given evidence to the inquiry into the Post Office scandal.

  Addressing the Business and Trade Committee, Alan Bates said he was “frustrated to put it mildly” over the lack of financial redress.

  The founder of the Justice for Sub Postmasters Alliance said it has “gone on for far too long” and he was waiting for his first offer.

  There have been calls for Mr Bates, from Llandudno, Conwy, to be honoured for his campaigning.
