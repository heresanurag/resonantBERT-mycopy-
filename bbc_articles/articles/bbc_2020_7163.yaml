title: 'Liverpool stabbing: Two men and a woman injured - BBC News'
date: '2020-06-20'
section: Liverpool
url: http://www.bbc.co.uk/news/uk-england-merseyside-53120334
content: |-
  One man was wounded in the abdomen, while the other victims were injured in the head, police say.

  A man was seen with a knife in Mirfield Street

  Two men and a woman have been injured in a stabbing in Liverpool.

  Police were called to Mirfield Street at about 09:30 BST following reports of a man with a knife.

  Paramedics later found a man with stab wounds to his abdomen and he was taken to hospital. Another man and a woman were found with head injuries, which are not thought to be serious.

  A 27-year-old man and a 22-year-old woman, both from Liverpool, have been arrested on suspicion of assault.

  Another man, aged 32, and a 30-year-old woman have been arrested on suspicion of aggravated burglary.

  Police are appealing for anyone with information to contact them.

