id: bbc_2021_072
title: Cold snap creates 'pop-up' ice hockey rink - BBC News
date: '2021-01-03'
section: General
url: http://www.bbc.co.uk/news/uk-scotland-55523137
content: |-
  A farmer's field in Scotland has been transformed into a "pop-up" ice hockey rink.

  Locals in Bishopton, Renfrewshire, have been taking advantage of the clear skies and icy conditions.

  One said the frozen rink had been playing host to skaters and hockey players of all ages and abilities, from six to 60.
