content: |-
  Nadja Ensink-Teich's husband Jeroen was killed as he went to post cards announcing his baby's birth.

  In 2015, Dr Jeroen Ensink was killed metres from his home as he went to post cards announcing his baby's birth.

  His wife Nadja Ensink-Teich says she wants an apology from police, after an inquest highlighted a number of failures.

  Watch the BBC's Victoria Derbyshire programme on weekdays between 09:00 and 11:00 on BBC Two and the BBC News Channel in the UK.
