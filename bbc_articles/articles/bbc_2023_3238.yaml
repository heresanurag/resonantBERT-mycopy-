title: Met Commissioner's response to force's damning Baroness Casey report - BBC
  News
date: '2023-03-21'
section: General
url: http://www.bbc.co.uk/news/uk-65022126
content: |-
  The report concludes there is discrimination across the Metropolitan Police Service.

  Sir Mark Rowley, commissioner of the Metropolitan Police Service, has responded to a report by Baroness Louise Casey, which has concluded that there is racism, misogyny and homophobia across the force.

  Baroness Casey was appointed to review the Met's culture, following the murder of Sarah Everard by serving police officer, Wayne Couzens.

  Speaking to the BBC's Lucy Manning, Sir Mark said he accepted Baroness Casey's "diagnosis".
