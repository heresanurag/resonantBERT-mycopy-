title: Barnsley protester who targeted Nigel Farage sentenced - BBC News
date: '2024-08-28'
section: South Yorkshire
url: http://www.bbc.co.uk/news/articles/cy549q44524o
content: |-
  Josh Greally is sentenced for targeting Nigel Farage during an election visit to Barnsley.

  Man who threw items at Farage gets suspended term

  Josh Greally threw items, believed to be coffee cups, towards a bus that Nigel Farage was travelling on

  A man who threw items towards Reform UK leader Nigel Farage during his general election campaign has been handed a suspended prison sentence. Josh Greally, from Chesterfield, was filmed throwing objects while Mr Farage was travelling on an open-top bus in Barnsley on 11 June. Barnsley Magistrates' Court heard Greally, 28, had gone to the town as part of a planned protest against Mr Farage. Greally, who had previously pleaded guilty to a charge of using threatening, abusive, insulting words and behaviour with intent to cause fear, was given a six-week prison sentence suspended for 12 months.

  The incident was caught on camera during Nigel Farage's campaign visit to Barnsley

  Reacting to the sentencing, Mr Farage said Greally had been allowed to "walk free" after the "very dangerous, provocative, violent" incident. In a video posted on X, formerly Twitter, he said: "Today he's been given a suspended prison sentence. He will not serve any custodial time at all." He went on to call for more prisons to be built. Video from the incident showed Mr Farage shielding his face while items, believed to be coffee cups, hit the side of the double-decker. The court previously heard the objects "made a bang on the side of the bus" after Greally threw them from a building site next to the vehicle. Officers arrested Greally quickly, with no complaint being made to police, District Judge James Gould was told. CCTV played to the court showed Greally, who was wearing a red hoody, picking the items from a construction area and throwing them. It was a "planned offence", the judge said. The university graduate was a man of "previous good character" and had been remorseful, his defence barrister said.

  Sentencing him, Judge Gould said the attack happened while Mr Farage was campaigning ahead of the general election, which aggravated the offence. Speaking to probation staff, Greally said it was a "planned offence" with him travelling from his Chesterfield home to Barnsley to join a group of protesters. While politicians may be challenged in discussion, "that must never spill over into violence or intimidation," the judge said. "That is not the pursuit of free speech, it is the attempt to silence the voice of opposition," he added. Greally was also ordered to complete 120 hours of unpaid work, 20 rehabilitation activity days, pay £85 costs and a surcharge of £154. Listen to highlights from South Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
