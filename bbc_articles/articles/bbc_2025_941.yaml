content: |-
  Leinster edge a spirited Ospreys side to remain unbeaten in this season's United Rugby Championship.

  Ospreys flanker Harri Deaves was named player of the match

  Leinster edged a spirited Ospreys side to remain unbeaten in this season's United Rugby Championship. Visiting skipper Luke McGrath opened the scoring before Harri Deaves and Charlie Tector exchanged tries just before the break. Ethan Lewis got Ospreys back to within a score before Rabah Slimani crossed for Leinster. A late Cameron Jones effort set up a grandstand finish and while Ospreys could not complete the comeback, they did bag a deserved losing bonus-point. It was a first Ospreys defeat under head coach Mark Jones since he took over in December.

