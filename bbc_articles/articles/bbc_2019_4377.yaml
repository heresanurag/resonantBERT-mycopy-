title: One hurt at Brighton pier's Air Race fairground ride - BBC News
date: '2019-04-08'
section: Sussex
url: http://www.bbc.co.uk/news/uk-england-sussex-47857392
content: |-
  Part of the Air Race ride on Brighton's Palace Pier came detached and hit a passer-by.

  Part of the ride came loose and hit a passer-by

  One person was injured when part of a fairground ride on Brighton Palace Pier came loose and hit them.

  Pier chief executive Anne Ackford said part of the Air Race ride had become detached and had struck a passer-by.

  Ambulance crews said one person was taken to hospital with a leg injury. Paramedics checked others over for shock.

  Ms Ackford said: "We have been in immediate contact with the manufacturer to ask them... to investigate."

  Initial reports said four people were hurt on the ride

  A spokeswoman for the Health and Safety Executive (HSE) said: "The HSE is aware and we are investigating the incident."

  Ms Ackford said the pier's organisers would "co-operate fully with any investigation".

  On the pier website, the publicity for the ride promises visitors they will "race through the skies on this thrilling motion ride which guarantees to send your pulse racing".

