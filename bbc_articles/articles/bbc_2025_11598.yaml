title: Dua Lipa and Callum Turner confirm engagement - BBC News
date: '2025-06-13'
section: Culture
url: http://www.bbc.co.uk/news/articles/c3d4jlgpg30o
content: |-
  The singer says she has not yet set a date to tie the knot with Bafta-nominated British actor Turner.

  Callum Turner and Dua Lipa went to this year's Met Gala together

  Dua Lipa has confirmed that she's engaged to actor Callum Turner, saying it's "a really special feeling". The singer, 29, has been with 35-year-old Londoner Turner for almost a year and a half. He's best known for roles in Fantastic Beasts and Masters of the Air, and was Bafta nominated in 2020 for BBC One's The Capture. "Yeah, we're engaged," she told British Vogue, external. "It's very exciting. This decision to grow old together, to see a life and just, I don't know, be best friends forever - it's a really special feeling."

  The couple sparked engagement rumours last Christmas when she posted pictures of herself wearing a ring. She told Vogue that Turner had the ring made for her after consulting with her best friends and sister. "It's so me. It's nice to know the person that you're going to spend the rest of your life with knows you very well." They have not yet set a wedding date, with Lipa saying she must first finish her current world tour - which ends in Mexico in December - and Turner is busy filming. He is due to play the lead in the Apple TV sci-fi series Neuromancer, adapted from William Gibson's 1984 novel. "We're just enjoying this period," she said. "I've never been someone who's really thought about a wedding, or dreamt about what kind of bride I would be. All of a sudden I'm like, 'Oh, what would I wear?'"
