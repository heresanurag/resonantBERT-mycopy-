  Briton Alfie Hewett will play in two Wimbledon finals after winning both last-four ties in the wheelchair singles and doubles on Friday.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Briton Alfie Hewett will play in two Wimbledon finals after winning in both wheelchair singles and doubles semi-finals on Friday. Hewett continued his quest for a first Wimbledon singles title with a thrilling 4-6 6-4 7-5 victory over Argentine Gustavo Fernandez to reach Sunday's showpiece. And later on court three he was joined by compatriot Gordon Reid for a 6-1 7-6 (14-12) win over Dutch pair Tom Egberink and Maikel Scheffers. He and Reid will next face either British-Spanish pair Ben Bartram and Daniel Caverzaschi or Japanese duo Tokito Oda and Takuya Miki, with their match scheduled for Saturday- a day before the final.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  In the singles final, Hewett will face Spanish fourth seed Martin de la Puente who beat defending champion Oda in the last four on Friday. Hewett has won eight Grand Slam singles titles and has won every major across singles and doubles - except the Wimbledon singles title. Against world number three Fernandez he recovered from a set and a break down, securing his win after two hours 41 minutes in front of a partisan crowd on court three. The 26-year-old's victory also avenged his French Open semi-final loss to Fernandez - the 2019 Wimbledon champion - six weeks ago. And he was full of emotion after the result, throwing his racquet above him and pointing to his support team. Just over five hours later Hewett was celebrating again, this time alongside Reid, after the pair saved six set points before converting a third match point in a gripping tie-break at the end of their second set. On Thursday, Hewett had been hampered by a shoulder issue, although there were no signs of an injury on Friday. Elsewhere, Briton Andy Lapthorne was beaten 6-1 6-0 by the Netherlands' Sam Schroder in the semi-finals of the men's quad wheelchair singles.
