title: 'Southport: Two men admit violent disorder over Hartlepool unrest - BBC News'
date: '2024-08-02'
section: Tees
url: http://www.bbc.co.uk/news/articles/c0474gg9xl4o
content: |-
  Seven men and one woman have been charged after disorder broke out on Teesside on Wednesday.

  Two men admit to disorder over Hartlepool unrest

  Multiple people have been arrested after police officers were attacked in Hartlepool

  Two men have admitted to violent disorder during disturbances in Hartlepool on Wednesday. Riot police were involved in a clash with a group of more than 100 people, which is thought to have flared over the stabbings of children in Southport. Steven Mailen, 54, of Elliott Street, Hartlepool, admitted the offence at Teesside Magistrates' Court, where he was described as the "main instigator" of the violence. His partner Ryan Sheers, 28, of Powlett Road, also admitted violent disorder.

  Paul Doney, prosecuting, said Mailen was "constantly in the face of officers" and was shouting until he was struck on the leg by a police baton. Sheers had attempted to push through the police cordon, shouting and refusing to move away. He was then bitten on the buttock by a police dog, the court heard.

  The defendants, who have no previous convictions, were granted bail by district judge Helen Cousins to appear before Teesside Crown Court for sentencing on 2 September. Sheers, formerly a McDonalds worker, wept and thanked the judge when he was told he would be bailed.

  Mailen and Sheers were among seven charged in relation to the disorder.
  • None Anthony Allen, 42, of Ormesby Road, Hartlepool. He did not enter a plea and was remanded in custody. He is also accused of assaulting an emergency worker.
  • None John Barton, 33, of Duke Street, Hartlepool, pleaded not guilty and was remanded in custody.
  • None Peter Clark, 47, of Ladykirk Road, Newcastle, was remanded in custody and entered no plea.
  • None James Elliott, 41, of Raby Road, Hartlepool, was remanded in custody and entered no plea.
  • None Dylan Robert Wiley, 28, of St Catherine’s Court, Hartlepool, denied the charge and was remanded in custody. They will all appear at Teesside Crown Court on 2 September. Eleven people were arrested as police officers were attacked with missiles, glass bottles and eggs in Hartlepool's Murray Street area. An 11-year-old boy was later held on suspicion of arson on Thursday after a police car was set alight on Teesside. He has now been released on conditional bail with strict conditions, police say.

  Another five people, including a 13-year-old, were arrested overnight and on Friday morning, Cleveland Police said. Among those arrested were two 19-year-old men and an 18-year old man. A 39-year-old woman was arrested and has since been charged with violent disorder. A 13-year-old boy was also arrested on suspicion of violent disorder and has since been released on conditional bail. Cleveland Police previously said it believed the disorder was linked to protests over the fatal knife attack on three children in Southport on Monday.

  Hartlepool MP Jonathan Brash described the night's events as "appalling" and called for people to "remain calm". He told BBC Radio Tees there was "no excuse" for what had happened. Cleveland Police has said it is also investigating an assault after video posted on social media appeared to show a "young boy of black or ethnic origin" being "punched in the face", during the unrest.

  Disorder has broken out in multiple areas of the country since the Southport attack. More than 100 people were arrested in central London on Wednesday as officers clashed with protesters on Whitehall during a demonstration. There was also unrest in Southport on Tuesday, which came hours after a peaceful vigil was attended by thousands to remember the girls who died. Eight people are being sought by police after objects were hurled outside a hotel housing migrants during a protest in Aldershot. Earlier, Prime Minister Sir Keir Starmer said "action will be taken" following the "violent disorder" at a meeting with police chiefs at Downing Street. Speaking in a televised speech afterwards, he laid out plans for forces across the country to increase their co-operation to tackle such incidents.

