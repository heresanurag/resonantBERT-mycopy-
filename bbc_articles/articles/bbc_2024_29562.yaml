content: |-
  Police said a 74-year-old man died, and urged the public to stop sharing distressing images on social media.

  Man, 74, dies after being hit by bus as police urge social media restraint

  The Cowgate area was sealed off and forensic officers were called to the scene

  A man has died after being struck by a bus in Edinburgh with police asking the public to stop sharing distressing photos and videos of the incident on social media. The 74-year-old was hit by the single decker in the city's busy Cowgate area on Saturday at about 19:25 . A number of roads were closed and people in pubs were asked to leave the area. Footage and pictures which later circulated on social media suggested the man had suffered catastrophic injuries.

  BBC Scotland News reporter James Delaney, who was near the scene on Saturday night, said an extensive police cordon was quickly set up. He said: "Inside were two forensic tents, probably about 100m apart. "The Cowgate is usually jumping on a Saturday night, but the bars and pubs inside the cordon had been closed. "We saw about a dozen or so people in white forensic suits, and there were a few guys in suits too who I assume were detectives."

  Police erected sheets on the South Bridge to screen off the accident scene

  Officers also put up sheets on the South Bridge to screen off the view of the Cowgate below. Police Scotland said an investigation had begun, and officers were keen to speak to anyone who was in the area at the time who had not yet been contacted. Ch Insp Trisha Clark, the local area commander, added: "We are aware of videos and images circulating on social media which are causing distress to the deceased's family and those viewing them inadvertently. "We would ask members of the public not to share them out of respect for his family, and to report them to the relevant social media platform to prevent further circulation. "There has been a lot of speculation, and I would like to reassure the local community that this was an isolated incident and there is no risk to the wider public. The police cordons in the area have now been lifted and a bunch of flowers was placed at the scene on Sunday morning.
