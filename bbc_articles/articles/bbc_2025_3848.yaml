title: Ted Lasso returns to TV for fourth series - BBC News
date: '2025-03-15'
section: Culture
url: http://www.bbc.co.uk/news/articles/cvgev638632o
content: |-
  Jason Sudeikis is back in the role of Ted, the coach of a fictional English Premier League football club.

  Jason Sudeikis has won two Emmys for playing football coach Ted Lasso

  Emmy Award-winning Ted Lasso is returning to TV for a fourth series, Apple TV+ has revealed. Its US star Jason Sudeikis is back in the role of Ted, who coaches fictional English Premier League football club AFC Richmond, having returned to the US in series three. No further casting has been confirmed, but the comedy's other stars include Hannah Waddingham, Nick Mohammed, Juno Temple and Phil Dunster. In a cryptic statement, Sudeikis said: "As we all continue to live in a world where so many factors have conditioned us to 'look before we leap', in season four the folks at AFC Richmond learn to leap before they look, discovering that wherever they land, it's exactly where they're meant to be."

  Jason Sudeikis, Hannah Waddingham and Brendan Hunt star in the show

  In series three, Roy Kent, played by Brett Goldstein, became assistant coach, alongside coach Beard (Brendan Hunt), while Ted dealt with personal issues at home. Sudeikis also co-produces the show, while Goldstein is also an executive producer and writer for the show. So far, Ted Lasso's 36 episodes across its three seasons have picked up 13 Emmys and 61 nominations since it was first broadcast in 2020. Sudeikis also won Emmys for lead actor in a comedy series in 2021 and 2022. Apple TV+ has yet to announce when the new series will be broadcast.
