  "If I get the eighth, you'll be saying 'if you get the ninth it'll inspire this...' and it never ends," he added in an interview with BBC Radio 5 Live. "When do you kind of go, 'what's enough?' I'll just keep playing and if I get to eight great, nine, 10, 11, 12, who knows. "Age is just a number. I've realised once I am round a snooker table I feel like a teenager and that's all that really counts and I'll just keep putting them [his opponents] in their place."

  'The Rocket' is currently enjoying an unbroken period of 745 days at the top of the world rankings - a remarkable feat considering he has limited his playing schedule in recent seasons. And he not only heads to snooker's most famous venue as the bookmakers' favourite, but is also regarded as the "man to beat" by many of his peers, a testimony to his longevity 23 years on from winning his first world title. Three-time winner Mark Williams says it is difficult to see past his fellow member of snooker's famed Class of '92 as the eventual champion, even if Judd Trump has more ranking event titles to his name this term. "Even with how good Judd has been, if Ronnie plays in all the tournaments he is the best player by far," said Williams. "There is no question that he is the best player by a mile. If he entered every tournament and played properly he would be number one player in the world easily. "Course he does [want eight], there is no question. He is the favourite. He does not have to play his top game. His B game [is good enough]... if he keeps himself together, he is the one everybody has to beat."

  Ronnie O'Sullivan could join Steve Davis, Stephen Hendry and Mark Williams in winning the three Triple Crown events in a season

  Mark Allen, who has tasted success in both the Masters and UK Championship, added: "Ronnie is coming off the back of an incredible season. "Going for the eighth adds its own pressure but he has shown over the years he can handle it. He is chasing history and clearly the man to beat."

  This video can not be played To play this video you need to enable JavaScript in your browser. Ronnie O'Sullivan on coaching and creating an environment for young snooker talent

  Aside from chasing history, O'Sullivan recently penned a three-year ambassadorial agreement with Saudi Arabia, committing the world number one to playing in all World Snooker Tour events in the nation. As part of that he says he is also committed to setting up an academy in the Middle East and developing an elite environment to widen the appeal and success of the sport. "If you look at what China has done with their young players, you can copy and paste that and Saudi Arabia can develop academies where young players can go and play, create competitions and events," he added. "I want to be part of it to make sure they get the right type of coaching. I've spent some time with a couple of young players trying to give them good basics and share things with them. I love seeing people develop. "I used to be fascinated by the Nick Bollettieri tennis academy and think if I was a young kid that is where I would want to go, practicing among Grand Slam champions. That would inspire you. "All I wanted to do was be close to Steve Davis as a kid because I thought if I could learn something from him it would help me develop as a player. "The excitement is creating an environment where young kids can develop as players and it is motivational that they can't help but become brilliant snooker players. "It's like Kenya and runners. If you want to be the best runner in the world, you have to go and live in their back yard because they know how to train and take it to another level. That is what I want to try and do."
