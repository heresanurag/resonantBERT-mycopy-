title: 'World Snooker Championship 2024: Ronnie O''Sullivan chases record eighth title
  - BBC Sport'
date: '2024-04-19'
section: Snooker
url: http://www.bbc.co.uk/sport/snooker/68843849
content: |-
  Ronnie O'Sullivan is the "man to beat" as he looks to complete "best season ever" with a record eighth World Championship title in the modern era.

  Ronnie O'Sullivan won the first of his seven world titles in 2001

  Coverage: Watch live on BBC TV, BBC iPlayer, BBC Sport website and BBC Sport mobile app; live text coverage of selected matches; updates on Radio 5 Live.

  Ronnie O'Sullivan says it will be his "best season ever" if he can claim a record eighth World Championship title in the modern era. O'Sullivan faces Jackson Page in the first round at the Crucible in a match that begins on Wednesday. The 48-year-old is aiming to win his sixth title this term and become only the fourth player to win all three Triple Crown events in a season. "I have just pitched up, played and got it right," O'Sullivan told BBC Sport. "I haven't got this masterplan where I've plotted it out. If I did win it this year it would have to be my best season ever considering I have only played 11 events. They are the key events that I have won."

  Alongside the UK Championship and the Masters, O'Sullivan has also enjoyed success in the Shanghai Masters, World Grand Prix and the Riyadh Season World Masters of Snooker during the current campaign. Widely regarded as snooker's greatest ever player, the Englishman will also have the opportunity to win a record-extending 42nd career ranking title in Sheffield, while he has only once before, in 2000-01, won six events in a season. However, while media talk has constantly revolved around moving ahead of Stephen Hendry - whose record he equalled in 2022 - O'Sullivan says he pays little attention to how many world titles he could end his career with.

