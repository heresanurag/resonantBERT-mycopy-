id: bbc_2024_7330
title: Key power plant in Ukraine destroyed by Russian strikes - BBC News
date: '2024-04-11'
section: General
url: http://www.bbc.co.uk/news/world-europe-68793381
content: |-
  A major power plant near Kyiv has been completely destroyed by Russian strikes, energy company Centrenergo has said.

  Trypillya power plant was the largest provider of electricity for three regions, including Kyiv.

  Centrenergo chairman Andriy Hota said the plant was hit by multiple missiles.

  More than 80 missiles and drones targeted sites across Ukraine in the early hours of Thursday.
