title: Who are the men convicted in the Gisèle Pelicot rape trial - BBC News
date: '2024-12-20'
section: Europe
url: http://www.bbc.co.uk/news/articles/c785nm5g5y1o
content: |-
  Dominique Pelicot has been found guilty of drugging his ex-wife, Gisèle, raping her and inviting dozens of men to abuse her.

  • None Dominique Pelicot: Guilty of aggravated rape on his ex-wife, Gisèle. Also guilty of the attempted aggravated rape of the wife of one of the co-accused, Jean-Pierre Marechal, Cillia, and taking indecent images of his daughter, Caroline, and his daughters-in-law, Aurore and Celine. Sentenced to 20 years. He is 72.
  • None Jean-Pierre Marechal: Guilty of attempted rape and aggravated rape of his wife, as well as drugging her. Sentenced to 12 years. The only one of the 51 who was not accused of raping or attempting to rape Gisèle, the 63-year-old admitted to following Dominique Pelicot's lead, drugging his own wife for five years, raping her and inviting Dominique to rape her too.
  • None Charly Arbo: Guilty of aggravated rape. Sentenced to 13 years. He is 30 years old.
  • None Cyrille Delville: Guilty of aggravated rape. Sentenced to eight years. He is a father-of-two.
  • None Christian Lescole: Guilty of aggravated rape. Acquitted of having child abuse imagery. Sentenced to nine years. He is a volunteer firefighter and father of two daughters. He has been in jail since 2021.
  • None Lionel Rodriguez: Guilty of aggravated rape. Sentenced to eight years. The 44-year-old was an employee in the same supermarket where Dominique Pelicot got caught upskirting in 2020, leading to the rape investigation.
  • None Nicolas Francois: Guilty of aggravated rape and having child abuse imagery. Sentenced to eight years and banned from working in jobs with children for several years. He is a 43-year-old freelance journalist.
  • None Jacques Cubeau, 73, lorry driver: Guilty of aggravated rape. Sentenced to five years. He is a divorced father-of-two.
  • None Patrice Nicolle: Guilty of aggravated rape. Sentenced to eight years. The 55-year-old father-of-two is an electrician.
  • None Thierry Parisis: Guilty of aggravated rape. Sentenced to eight years. He is 54.
  • None Simoné Mekenese: Guilty of aggravated rape. Sentenced to nine years. The 43-year-old construction worker and father-of-six lived next door to the Pelicots.
  • None Nizar Hamida: Guilty of aggravated rape. Sentenced to 10 years. The 40-year-old had worked as a hairdresser, builder and delivery driver.
  • None Boris Moulin: Guilty of aggravated rape. Sentenced to eight years. He is a 37-year-old delivery driver.
  • None Jerome Vilela: Guilty of aggravated rape. Sentenced to 13 years. The 46-year-old former firefighter and supermarket employee is divorced with two children. He has been in jail since 2021.
  • None Didier Sambuchi: Guilty of aggravated rape. Sentenced to five years. The 68-year-old is a retired lorry driver and father-of-two.
  • None Quentin Hennebert: Guilty of aggravated rape. Sentenced to seven years. The 34-year-old former prison guard now works as an ambulance driver.
  • None Philippe Leleu: Guilty of aggravated rape. Sentenced to five years of which two are suspended. He is a 62-year-old gardener.
  • None Jean-Luc LA: Guilty of aggravated rape. Sentenced to 10 years. The 46-year-old has four children. He has been in jail since 2023.
  • None Fabien Sotton: Guilty of aggravated rape. Sentenced to 11 years. He has three children. His criminal record includes domestic violence and sexual assault of a minor. He has been in jail since 2021.
  • None Karim Sebaoui: Guilty of aggravated rape and having child abuse imagery. Sentenced to 10 years. The 40-year-old is an unmarried IT specialist.
  • None Joan Kawai: Guilty of aggravated rape. Sentenced to 10 years. He went to the Pelicots' the same night his daughter was born. He has been in jail since 2021.
  • None Jean-Marc LeLoup: Guilty of aggravated rape. Sentenced to six years. The 74-year-old is a retired driver.
  • None Andy Rodriguez: Guilty of attempted rape and aggravating factors. Sentenced to six years. The 37-year-old has already spent several months in jail on domestic violence charges.
  • None Vincent Coullet: Guilty of aggravated rape. Sentenced to 10 years. He is 43 years old and already detained for domestic violence.
  • None Adrien Longeron: Guilty of aggravated rape and child abuse imagery. Sentenced to six years. The 34-year-old was jailed in 2020 for raping and stalking three former girlfriends.
  • None Hughes Malago: Guilty of attempted rape and two aggravating factors. Sentenced to five years. The 39-year-old is a tiler and biker.
  • None Ahmed Tbarik: Guilty of aggravated rape. Sentenced to eight years. The 54-year-old plumber who set up his own business, as well as a boxing club, had been married for 30 years when he went to the Pelicots' home.
  • None Husamettin Dogan: Guilty of aggravated rape. Sentenced to nine years. The 43-year-old builder is married and has a child. He had precedents for drug trafficking.
  • None Romain Vandevelde: Guilty of aggravated rape. Sentenced to 15 years. He is 63 and HIV-positive. He has been in jail since 2021.
  • None Joseph Cocco: Guilty of aggravated sexual assault. Sentenced to three years. He is a 69-year-old divorced father of one.
  • None Saifeddine Ghabi: Acquitted of rape and attempted rape. Guilty of sexual assault. Sentenced to three years. The 37-year-old lorry driver is a father-of-three.
  • None Jean Tirano: Guilty of aggravated rape. Sentenced to eight years. He is a 52-year-old roofer.
  • None Mohamed Rafaa: Guilty of aggravated rape. Sentenced to eight years. The 70-year-old worked as a DJ and club manager. He has been in jail since 2021.
  • None Ludovick Blemeur: Guilty of aggravated rape. Sentenced to seven years. The 39-year-old former firefighter and warehouse worker had a three-month-old baby daughter when he visited the Pelicots.
  • None Patrick Aron: Guilty of aggravated rape. Sentenced to six years, but walks free today as he has medical issues and will need to be placed in a special jail, according to the judge. The 60-year-old was married for 25 years with two kids.
  • None Abdelali Dallal: Guilty of aggravated rape. Sentenced to eight years, but walks free today due to medical issues and will need to be placed in a special jail, according to the judge. He is 47.
  • None Grégory Serviol: Guilty of aggravated rape. Sentenced to eight years. The 33-year-old is a painter and decorator.
  • None Cedric Grassot: Guilty of aggravated rape. Sentenced to 12 years. The 50-year-old is a delivery driver.
  • None Cendric Venzin: Guilty of aggravated rape. Sentenced to nine years. The 44-year-old worked a series of odd jobs and at the time he was arrested in 2022 was managing a hotel in Corsica.
  • None Mahdi Daoudi: Guilty of mass rape and drugging. Sentenced to eight years. The 36-year-old is married.
  • None Thierry Postat: Guilty of aggravated mass rape and drugging, and possession of child pornography. Sentenced to 12 years, and banned from working with children for life. The 61-year-old refrigeration specialist is divorced with three grown children. He has been in jail since 2021.
  • None Florian Rocca: Guilty of aggravated rape. Sentenced to seven years. The father of three daughters was already convicted of theft, driving without a license and drug-related offences.
  • None Dominique Davies: Guilty of aggravated rape. Sentenced to 13 years. The 45-year-old is a lorry driver.
  • None Cyprien Culieras: Guilty of aggravated rape. Sentenced to six years. He is 45 and has eight prior convictions.
  • None Mathieu Dartus: Guilty of aggravated rape. Sentenced to seven years. The 53-year-old former baker raised two children after his wife died.
  • None Cyril Beaubis: Guilty of aggravated rape. Sentenced to nine years. The 47-year-old is a lorry driver.
  • None Paul-Koikoi Grovogui: Guilty of aggravated rape. Sentenced to eight years. He is 31.
  • None Omar Douiri: Guilty of aggravated rape. Sentenced to eight years. The 36-year-old was married and employed by a cleaning company.
  • None Redouane Azougagh: Guilty of aggravated rape. Sentenced to nine years. The 40-year-old father of four kids from two different wives has prior convictions for domestic violence.
  • None Hassan Ouamou: Guilty of aggravated rape. Sentenced to 12 years. The 30-year-old is currently on the run in Morocco and has told investigators he has no intention of returning to France.
  • None Redouane El Farihi: Guilty of aggravated rape. Sentenced to eight years.
