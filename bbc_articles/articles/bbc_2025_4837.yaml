title: 'James Bond: Spider-Man and Harry Potter producers to make next 007 movie -
  BBC News'
date: '2025-03-25'
section: Culture
url: http://www.bbc.co.uk/news/articles/c5y0nw3nd8yo
content: |-
  Amy Pascal and David Heyman have been described as "two of the most accomplished" producers around.

  Spider-Man and Harry Potter producers to make next Bond

  Daniel Craig played 007 in the last five films but his successor is yet to be announced

  Amazon MGM Studios have announced that Amy Pascal and David Heyman will produce the next James Bond movie - the company's first since gaining creative control of the famous spy film franchise. Pascal is best known for the three latest Spider-Man titles starring Tom Holland, while Heyman was behind all eight Harry Potter movies. In a statement on Tuesday, Amazon MGM Studios' head of film, Courtenay Valenti, described them as "two of the most accomplished, experienced, and respected film producers in our industry." In a joint statement, Pascal and Heyman called 007 "one of the most iconic characters in the history of cinema".

  Pascal is currently in post-production on Amazon MGM's Project Hail Mary, starring Ryan Gosling, set for release in March next year

  Long-serving masterminds Barbara Broccoli and Michael G Wilson announced they were stepping down from the franchise in February, giving creative control to Amazon MGM Studios, which was formed when Amazon bought Bond's parent studio in 2022. The Bond films were launched by Albert "Cubby" Broccoli in 1962, before his daughter and stepson took over.

  "We are humbled to follow in the footsteps of Barbara Broccoli and Michael Wilson who made so many extraordinary films and honoured and excited to keep the spirit of Bond very much alive as he embarks on his next adventure," noted Pascal and Heyman. Amazon's Valenti added: "We are honoured to be working with them on James Bond's next chapter and are excited to deliver to global audiences storytelling that upholds the impeccable legacy of this beloved character." The new deal came after mounting speculation about the fate of the British spy, four years after his last outing in No Time to Die, which was also Daniel Craig's fifth and final appearance in the role. Following the announcement last month, Amazon boss Jeff Bezos asked his 6.8 million followers on X: "Who'd you pick as the next Bond?"

  David Heyman's other credits include Greta Gerwig's Barbie and the first two Paddington movies

  Amazon and its chosen producers will now decide which actor will take over the famous character, but there is still no timescale for when that that will happen or when the next film will be made. James Norton, Aaron Taylor-Johnson and Theo James are among the bookmakers' favourites to fill Craig's shoes. Pascal recently produced Challengers, starring Zendaya, and was also behind the Spider-Verse film series. Heyman is currently in pre-production on the Harry Potter television series and in post-production on Taika Waititi's adaptation of Kazuo Ishiguru's Klara and the Sun, starring Jenna Ortega and Amy Adams. The Hollywood power duo are also working together on Noah Baumbach's Jay Kelly, starring George Clooney and Adam Sandler.
