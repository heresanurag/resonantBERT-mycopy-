  Canadian Prime Minister Mark Carney called Trump's announcement a "direct attack" on his country and its car industry. European Commission president Ursula von der Leyen said the bloc would consider the measures before any potential response. Early on Thursday, Trump threatened "far larger" tariffs if the European Union and Canada worked together to do what he described as "economic harm" to the US.

  The car industry is already grappling with the expanded tariffs on steel and aluminium. Ford and General Motors among other major car firms have urged Trump to exempt the industry from any further duties. A 2024 study by the US International Trade Commission, external predicted that a 25% tariff on imports would reduce imports by almost 75%, while increasing average prices in the US by about 5%. White House officials said it wanted US workers make more parts, not simply assemble them, and have maintained their action is pushing firms to relocate. A day before the latest tariffs, South Korea's Hyundai announced it would invest $21bn (£16.3bn) in the US and build a new steel plant in Louisiana. Trump hailed the investment as a "clear demonstration that tariffs very strongly work". United Autoworkers union leader Shawn Fain, who had opposed Trump in the election, said the president was "stepping up to end the free trade disaster that has devastated working class communities for decades". Elsewhere, head of trade group the American Automotive Policy Council, Matt Blunt, said car makers were "committed" to Trump's vision of "increasing automotive production and jobs in the US". But American Automakers said the tariffs must avoid raising prices for customers.
