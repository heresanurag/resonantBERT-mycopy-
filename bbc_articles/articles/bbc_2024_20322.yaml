content: |-
  Lee Carsley names four debutants in first England squad since replacing Gareth Southgate.

  Lee Carsley has named four uncapped players in his first England squad

  Lee Carsley has handed call-ups to Angel Gomes, Tino Livramento, Morgan Gibbs-White and Noni Madueke in his first squad since being named England interim manager. Lille winger Gomes, Newcastle defender Livramento, Nottingham Forest midfielder Gibbs-White and Chelsea winger Madueke all played for Carsley during his time as England Under-21 manager. Manchester City playmaker Jack Grealish, who was cut from England's preliminary Euro 2024 squad, has been recalled as well as Manchester United defender Harry Maguire. England take on the Republic of Ireland in Dublin on 7 September (17:00 BST) and Finland at Wembley on 10 September (19:45) in the Nations League. Carsley was appointed to the role following Gareth Southgate's resignation after Euro 2024.

  Carsley, who played for the Republic of Ireland, spent three years as England's Under-21s boss after his appointment in 2021. Six members of Carsley's first squad - Gomes, Madueke, Gibbs-White, Cole Palmer, Anthony Gordon and Levi Colwill - won the Under-21 European Championship under him in 2023. Gomes, 23, left Manchester United for Lille in 2020. At United, he had broken into the first team in 2017, aged 16 years 263 days, the youngest player to make his debut from the club since Duncan Edwards in 1953. "Angel is very technical, he controls the game with his skill and his technique. He is very determined, has a great attitude and loves football," Carsley said. "I think he is a player people will be excited to see." Gomes was taken to hospital on 17 August after suffering a head injury in a Ligue 1 fixture against Reims. He later said he was "all good" after receiving treatment. Gibbs-White, a regular under Carsley in the Under-21 set-up, has also been handed his first call-up following his impressive start to Nottingham Forest's Premier League campaign. "Morgan is a very attacking player, full of energy, very creative, very exciting," said Carsley. "He has been really successful with England and I thought that was important."

  Arsenal defender Ben White, who earned the last of his four caps in March 2022, was again left out of the squad after making himself unavailable for selection. "As far as I am aware, he [White] wasn’t available for selection and nothing has changed in my two weeks. That’s where we are at with it," said Carsley. "He is a player I really like," he later told 5 Live's John Murray. Brentford striker Ivan Toney, Manchester City defender Kyle Walker and Arsenal goalkeeper Aaron Ramsdale, who all went to Euro 2024, have also been left out of the 26-man squad. Manchester United defender Luke Shaw and Real Madrid midfielder Jude Bellingham both miss out through injury, while Brighton captain Lewis Dunk, Liverpool defender Joe Gomez and Crystal Palace youngster Adam Wharton, who all travelled to Germany but did not play, have been omitted along with United forward Marcus Rashford and Tottenham midfielder James Maddison. Newcastle United full-back Kieran Trippier, who played 54 times under Southgate, announced his retirement from international football on Thursday. Carsley told 5 live he had conversations with Trippier and Walker and, on the latter, said a lack of minutes for his club this season had played a part in his decision. "He has had a decorated career with England and I don’t see that ending," he added. “I am really confident in the players; I am really confident in their ability and I believe in them."

  In his first interview after taking the job as interim England head coach, Lee Carsley said he wanted to put his "own stamp" on the squad - and he’s definitely delivered on that. As well as first call-ups for Tino Livramento, Angel Gomes, Morgan Gibbs-White and Noni Madueke - in a squad including five of those who won the Under-21 European Championship under Carsley in 2023 - he’s made big calls in leaving out Kyle Walker and bringing back in Harry Maguire. Lille's Gomes could have a big impact on how this England team play given the importance he had in the build-up play for Carsley's Under-21 side. Carsley said Gomes "controls games with his technique" and the centre of midfield has been a problem area for England – predecessor Gareth Southgate trialled Trent Alexander-Arnold in the position during Euro 2024. Gomes could help the side dominate possession and control play and clips of him doing the role for the Young Lions went viral on social media last summer. Elsewhere, there's a recall for Manchester City forward Jack Grealish. Carsley agrees that Grealish could be coming in as one of the players who has a "point to prove". Carsley would not be drawn on whether he wants the job full-time but will be hoping that this group put in two good performances in the next two games to keep his name in the frame for the role.
