title: Imran Khan Oxford University chancellor bid rejected, says adviser - BBC News
date: '2024-10-16'
section: Oxford
url: http://www.bbc.co.uk/news/articles/cglk74dwg0ro
content: |-
  Mr Khan applied for the role from prison in Pakistan, where he has been for over a year.

  The former Prime Minister of Pakistan Imran Khan has had his bid to become chancellor of the University of Oxford rejected, his adviser has said. Mr Khan, who has been in prison for more than a year on charges he says are politically motivated, submitted his application for the predominantly ceremonial role in September. On Wednesday, the university released a shortlist of 38 candidates who will take part in the first round of voting among its alumni later this month - with Mr Khan's name not featuring. The university told the BBC that it would not be commenting on individual applications for the role.

  It also highlighted its rules for prospective candidates, including that they must not be disqualified from being a charity trustee or subject to a disqualification order made by the Charity Commission, and must be a “fit and proper person” as determined by Revenue & Customs (HMRC) guidance.

  Mr Khan captained his country at cricket, before turning to a career in politics

  In a post on X, external, Khan's adviser Sayed Bukhari said the university's decision was "extremely unfortunate". "This is a loss for Oxford Uni to present itself as a global trend setting institution," he said. Mr Bukhari added that he had written to the university asking for an explanation of its decision to exclude Mr Khan from the ballot. The former cricket star is already an honorary fellow of Oxford’s Keble College, where he studied philosophy, politics and economics (PPE) in the 1970s.

  Mr Khan has been jailed since his arrest on 5 August 2023. His lawyers and his political party, PTI, claim that more than 200 cases have been registered against him and only two cases were decided in this time. Mr Khan was exonerated in an illegal marriage case and the cypher case, in which he was accused of divulging state secrets. He was also granted bail in more than two dozen cases by the local courts but he remains behind bars. Currently he is under trial in a case registered by the National Accountability Bureau, in which he is accused of misusing his prime ministership to unlawfully buy and sell state gifts and for not declaring his assets. The ex-prime minister has also been booked in numerous cases around the violent riots that broke out after he was first taken into custody.

  Former leader of the opposition Lord Hague is on the shortlist of candidates

  Among the 38 names on the shortlist that will be voted on by the university's staff and graduates are former Conservative Party leader Lord Hague and Lord Mandelson, who was a key architect of New Labour. Both studied at the university, before climbing to the top of British politics. The first round of voting will take place in the week commencing 28 October, with the top five candidates going through to a final round of voting in the first week of November. The successful candidate will be announced as chancellor later in November.

  Lord Patten had served as Chancellor since 2003

  The role cannot be held by current students, employees of the university or candidates to political office. Chris Patten is the outgoing chancellor and has held the position since 2003. Lord Patten, 80, was the last Governor of Hong Kong from 1992 to 1997 and chairman of the Conservative Party from 1990 to 1992.

