content: |-
  Steve Dymond took his own life after being told he had failed a lie detector test on The Jeremy Kyle Show.

  No 'clear link' between Jeremy Kyle Show and guest death - coroner

  This video can not be played To play this video you need to enable JavaScript in your browser. Clips from The Jeremy Kyle Show showing a visibly upset Mr Dymond were played at the inquest

  A guest on The Jeremy Kyle Show died after experiencing stresses in his relationship and poor mental health, a coroner has said. Hampshire coroner Jason Pegg said the show was a "possible" factor but not the "probable" cause of Steve Dymond's suicide in May 2019. Mr Dymond, 63, from Gosport, Hampshire, was found dead a week after being accused of lying by the presenter during filming for the former ITV talk show. In a statement, Mr Kyle said he had been "exonerated" and his name had "finally been cleared".

  Recording a conclusion of suicide, the coroner said: "There is an absence of reliable evidence that demonstrates that Steve Dymond’s appearance on The Jeremy Kyle Show probably caused or contributed to his death. "Steve Dymond's participation in the show is one of a number of factors, and whilst it is possible that the manner of his experience added to his distress, it is not probable." The coroner recorded that Mr Dymond died from the combined effect of an overdose and a heart condition.

  Jeremy Kyle said he had tried to "de-escalate" a conflict between show guest Steve Dymond and his partner

  Mr Dymond, who had a history of suicide attempts, was found dead in a rented room in Portsmouth. He had hoped that taking a lie detector test on the show would prove he had not cheated on his partner Jane Callaghan, the inquest in Winchester heard. In recorded footage shown at the hearing, Mr Kyle told the guest to "grow a pair" and "I wouldn't trust you with a chocolate button". In a key clip, Ms Callaghan sobbed and shouted when the results of a lie detector test were revealed. Mr Kyle told Mr Dymond: "Just so you're aware you failed every single question." The construction worker was filmed tearfully pleading: "I swear to God, I am being so straight... I have not been unfaithful to her." The inquest was told failing one question meant failing all of them, according to the administrator of Mr Dymond's polygraph test. Giving evidence to the inquest, the TV presenter denied "humiliating" Mr Dymond. Mr Kyle said: "From the moment Steve Dymond came out, I called him 'mate', I called him 'pal'. "I de-escalated, I calmed it down, I pushed it backstage. "And that was what the show was all about - conflict resolution."

  It was Mr Dymond's idea to go on the show and take a lie detector test to prove "he hadn't cheated", his former partner said

  Mr Dymond's son, Carl Woolley, said the "only good thing" that had come from his father's death was that The Jeremy Kyle Show was cancelled. In a statement read outside the inquest by one of the family's solicitors, Mr Woolley said: "It has been five years since my father died. "In my view anyone watching the clips of the show would see that he was in tears, and spoken to in the most brutal way by Jeremy Kyle. "The coroner has recorded that the lie detector test, in which Jeremy Kyle believes in so strongly, can have an accuracy of 60-96%."

  In Jeremy Kyle's statement, a spokesperson said: "His Majesty’s Coroner has today clearly and unequivocally found that Jeremy Kyle did not in any way cause or contribute to the tragic suicide of Steve Dymond. "He is now exonerated of that ill-informed accusation and his name has finally been cleared. "Out of respect for the family of Mr Dymond and the judicial process, Jeremy has always maintained that it would be inappropriate to discuss details whilst the legal inquest was ongoing and he has remained steadfastly silent in the face of lies, false accusations and unfair criticism over the last five and a half years. "This has taken a huge toll on him and his family and he would like to thank everyone who has truly supported him through these tough times." ITV said the coroner had highlighted the show's "comprehensive" processes for selecting and caring for guests, including an offer of counselling to Mr Dymond. In a statement, the broadcaster said: "ITV is committed to continuing to evolve and strengthen the care given to all those who take part in our shows which we believe set industry-leading standards."

