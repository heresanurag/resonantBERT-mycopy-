content: |-
  Alex and his two children came to lay flowers at 01:00 BST in memory of the Duke of Edinburgh.

  Despite warnings not to attend due to Covid restrictions, mourners have continued to travel to Buckingham Palace to pay their respects to the Duke of Edinburgh.

  To avoid the crowds during the daytime, Alex and his two children came to lay flowers in the middle of the night,

  They spoke to the BBC outside the gates at just after 01:00 BST on Saturday, despite the cold weather.
