title: Windrush passenger Alford Gardner's memories of voyage to UK - BBC News
date: '2019-06-22'
section: General
url: http://www.bbc.co.uk/news/uk-48697573
content: |-
  Seventy-one years ago Alford Gardner was one of hundreds of Caribbeans who came to rebuild post-war UK.

  Former RAF serviceman Alford Gardner came to the UK on the Empire Windrush from Jamaica.

  The 93-year-old grandfather was one of hundreds of Caribbean migrants who arrived in Tilbury Docks on 22 June 1948.

  During a family get-together in West Yorkshire, some of his relatives quizzed him about his journey.
