  The 880-year-old building has been operated as a B&B by Christine and her family for 25 years. "The positive thing for me is it's an old house and I'm of the older generation, and we've already had youngsters staying here having seen previous TikTok videos - and they love it," she said. Christine finishes the viral video by saying: "Whether you need to recover from a brat summer or menty b - this is the place for you. Slay!"

