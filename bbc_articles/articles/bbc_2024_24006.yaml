  "There were various accounts that I like where people would film their dads just going round the supermarket and stuff, and it's kind of funny because it's like the older generation," the 26-year-old told the BBC. Having come up with the idea, she suggested it to her mum Christine. Christine said: "I'm open to anything, because I've done the B&B for years and so one can get into a bit of a rut, and I have very nice people coming, but I felt I needed to try something new. "Most people who come are from the older generation, and I thought it'd be nice to try and attract younger people."

  Fyfield Manor, near Wallingford in Oxfordshire, is 880 years old

  In the video, Christine can be heard describing the B&B's features as having "understood the assignment", and being 880 years old "no cap". She also describes a medieval dining room as having "so much rizz". "I just put myself in [Frannie's] hands and did what I was told and I'm just amazed, being the older generation, I can't believe that so many people would like it," Christine said. "I didn't even know what any of the words meant!"

