title: The 800-year-old Oxfordshire B&B that's embraced gen z marketing - BBC News
date: '2024-09-05'
section: Oxford
url: http://www.bbc.co.uk/news/articles/c89w2kql3v9o
content: |-
  A TikTok made by Fyfield Manor in Oxfordshire using popular Gen Z terms has been viewed 9m times.

  Frannie Brown came up with the idea for the video, which starred her mum Christine

  An 880-year-old bed and breakfast has gone viral after adopting a Gen Z approach to its advertising. Fyfield Manor, near Wallingford in Oxfordshire, posted a video to its TikTok page on Monday with the caption: "When you ask your gen z daughter to write the marketing script." The video, which describes the B&B as "giving zen" and "very demure", has since been viewed 9.4m times. The mother and daughter team behind the video said they had been "amazed" by the response to the video.

  Frannie Brown said she came up with the idea after seeing similar videos on the platform.

