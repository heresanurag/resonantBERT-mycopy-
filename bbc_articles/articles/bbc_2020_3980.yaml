content: |-
  President Trump vows to "move heaven and earth" to safeguard Americans as cases spike in New York.

  Palestinian couple Ammar and Baraa show off their rings before getting married near Hebron, West Bank Image caption: Palestinian couple Ammar and Baraa show off their rings before getting married near Hebron, West Bank

  The global pandemic has brought us many remarkable images - from photos of the world's busiest spots abandoned to ordinary events turned upside-down by measures to control the virus. Here are some of the most eye-catching pictures from Saturday:

  A day of remembrance was held in China to honour victims of Covid-19 on the annual Tomb Sweeping Day that remembers the dead Image caption: A day of remembrance was held in China to honour victims of Covid-19 on the annual Tomb Sweeping Day that remembers the dead

  A new field hospital is under construction near Golokhvastovo, Moscow in Russia Image caption: A new field hospital is under construction near Golokhvastovo, Moscow in Russia

  Medics clap to show gratitude to health workers in Spain on a day when the country recorded its lowest death toll for a week Image caption: Medics clap to show gratitude to health workers in Spain on a day when the country recorded its lowest death toll for a week

  The normally crowded Chinatown in London is quiet on a weekend when the government instructed people to stay home Image caption: The normally crowded Chinatown in London is quiet on a weekend when the government instructed people to stay home

  Images of crowds are surprising now when we are used to seeing empty city streets - this picture is from Sweden, which has not introduced a lockdown Image caption: Images of crowds are surprising now when we are used to seeing empty city streets - this picture is from Sweden, which has not introduced a lockdown
