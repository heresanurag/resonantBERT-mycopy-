title: Israel orders army to 'seize additional territories' in Gaza - BBC News
date: '2025-03-22'
section: Middle East
url: http://www.bbc.co.uk/news/articles/clyj5vq4wnwo
content: |-
  The defence minister says the IDF will increase the intensity of its operation in Gaza until Hamas releases hostages.

  Israel's defence minister has told the military to "seize additional areas in Gaza" and threatened to permanently occupy parts of it, if Hamas does not free all remaining hostages. Israel Katz said that the military would continue its ground operation in Gaza "with increasing intensity" until all of the hostages "both living and dead" were returned. It is thought 24 of the 59 hostages still held in Gaza are alive, but their fate remains in the balance after negotiations on the second phase of the ceasefire deal failed to progress. The fragile ceasefire that had been in place since January ended this week as Israel resumed its ground campaign and bombing of Gaza, killing hundreds of people.

  The situation in the Strip has been described as "gravely, gravely concerning" with "absolutely desperate tragedies occurring all over Gaza" by Sam Rose from the UN agency for Palestinian refugees, Unrwa. Israel and the US have accused Hamas of rejecting proposals to extend the ceasefire. Hamas has said it is "engaging with the mediators with full responsibility and seriousness". However, Katz said in a statement on Friday that "the more Hamas continues its refusal, the more territory it will lose to Israel". Katz added that Israel still agreed to a proposal, which was brought by US envoy Steve Witkoff, "to release all the kidnapped, both living and dead, in advance and in two stages with a ceasefire in between". "We will intensify the fighting with strikes from the air, sea and land and by expanding the ground manoeuvre until the hostages are released and Hamas is defeated," Katz wrote. The defence minister also said Israel would "implement US President Trump's voluntary transfer plan for Gaza residents". Trump said he wants the US to take over and rebuild the Gaza Strip, while permanently removing its population of two million Palestinians.
  • None Why did the ceasefire not hold?
  • None Explaining the latest on the war in Gaza The Palestinian Authority and Hamas have said Gaza is "not for sale", while the UN warned that any forced displacement of civilians from occupied territory is strictly prohibited under international law and "tantamount to ethnic cleansing". Months of negotiations, led by the US, Qatar and Egypt, saw a ceasefire deal proposed in three stages. Israel and Hamas failed to agree on how to take the truce beyond the first phase. The plan stalled when the US and Israel proposed to extend stage one. Hamas rejected the change and said it was a "blatant attempt" by Israel "to evade the agreement". The ceasefire was broken on Tuesday when Israel launched a heavy wave of airstrikes on the Gaza Strip, killing more than 430 people in two days, the Hamas-run health ministry said. On Thursday, Hamas launched three rockets at Tel Aviv. Blaming Hamas for the resumption of violence, Israeli government spokesman David Mencer said the group had "rejected every hostage deal". Israel says Hamas is still holding 59 hostages, 24 of whom are believed to still be alive.

  Israel Katz issued a "last warning" to Hamas on Wednesday, calling for the return of the remaining hostages being held by the group

  On Friday, the acting US ambassador to the UN squarely blamed Hamas for the ongoing war and resumption of fighting. "Every death would have been avoided had Hamas accepted the bridge proposal," Dorothy Shea told the UN Security Council. Hamas has denied it is responsible for stalling the negotiations, and said it "remains deeply involved" and is "engaging with the mediators with full responsibility and seriousness". In a statement on Telegram, Hamas wrote it is discussing "the Witkoff proposal and other different ideas put forward, all with the goal of securing a prisoner exchange deal that ensures the release of prisoners, ends the war, and achieves a withdrawal" [of Israeli troops from the Gaza Strip]. In his statement, Katz also said that civilians would be evacuated from the areas the Israel Defense Forces (IDF) are targeting. Previous evacuation orders have sent panic through Palestinians families, many of whom have been displaced repeatedly by the war and have few safe options left. Israel blocked all food, fuel and medical supplies entering Gaza at the beginning of March in order to put pressure on Hamas. It accused Hamas of commandeering the provisions as part of its strategy against Israel, though did not provide evidence for this claim. The Israeli military launched a campaign to destroy Hamas in response to an unprecedented cross-border attack on 7 October 2023, in which about 1,200 people were killed and 251 were taken hostage. More than 49,500 Palestinians have been killed in Gaza since then, the Hamas-run health ministry says, and there is large-scale destruction to homes and infrastructure in the Strip.
