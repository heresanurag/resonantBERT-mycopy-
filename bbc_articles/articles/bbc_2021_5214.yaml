  Westminster, Holyrood, Stormont and the Senedd dedicated the day to memories of Prince Philip.

  MPs' tributes not at all sombre

  Dressed in black, MPs began by standing with their heads bowed for a minute's silence in memory of Prince Phillip. But their tributes to him are not at all sombre. Prime Minister Boris Johnson - a man who loves words (and has sometimes got into trouble for them) - recalled the Duke admitting to "dontopedalogy" or the science of opening your mouth and putting your foot in it. The SNP leader, Ian Blackford, who was wearing Highland dress, remembered the Duke's love of Balmoral - and his loathing of over-long speeches. And the Labour leader, Sir Keir Starmer, recounted taking part in the Duke of Edinburgh Award Scheme when he was 14 - wandering around Dartmoor as part of a small team, trying desperately to find his way. "If that doesn't prepare you for politics," he said, "nothing will." Well over 100 MPs want to speak in this debate, so it is likely to last well into the evening.
