id: bbc_2017_3157
title: 'Australia PM Malcolm Turnbull on Trump call: ''Call ended courteously'' -
  BBC News'
date: '2017-02-02'
section: General
url: http://www.bbc.co.uk/news/world-38842289
content: |-
  Australian PM Malcolm Turnbull tells Ben Fordham on 2GB Radio he's "disappointed" that details of a call between himself and President Trump were made public.

  Australian PM Malcolm Turnbull said he was disappointed that details of the call he had with President Trump - which he described as "very frank and forthright" - had been made public.

  He told a Sydney radio station that "the report that the president hung up is not correct".
