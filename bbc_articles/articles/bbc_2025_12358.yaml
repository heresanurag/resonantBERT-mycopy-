title: Norfolk council leader sorry over 'poor people' Facebook post - BBC News
date: '2025-06-20'
section: Norfolk
url: http://www.bbc.co.uk/news/articles/c0rvg14v54ko
content: |-
  Kay Mason Billig says her Facebook post showing a steak and wine dinner was "a private joke".

  Kay Mason Billig said her personal post had been taken out of context

  A council leader apologised "unreservedly" for posting a picture of a steak dinner on Facebook with the words: "Wonder what all the poor people are doing?" Norfolk County Council's Conservative leader Kay Mason Billig said it was a private joke taken out of context and the comments were "not intended to be about anyone else". A copy of her post, which showed a tomahawk steak, red wine and a salad, was shared with the Eastern Daily Press, external. The council's Liberal Democrat group leader Brian Watkins said it made "a mockery of many in our county struggling to make ends meet" and called for her to resign.

  Mason Billig has been a county councillor since 2021 and took over as leader in May 2023

  Mason Billig, who has led the council since 2023 and is entitled to allowances of more than £51,000, external, said: "Of course I apologise unreservedly if I have caused any offence, it was never my intention to do so." She said the image – taken from her personal Facebook page – was being "twisted into something it isn't". "My husband and I have sometimes called ourselves 'the poor people'," she explained. "It's a private joke as we live fairly modestly, so when we have a treat, we will sometimes post about it. "It's not intended to be about anyone else and is no reflection on people who are less well off than ourselves. "I am deeply disappointed that someone has decided to be this horrible when they must certainly know it's actually self deprecation."

  Professor Paul Whiteley said the personal post becoming public was "certainly embarrassing"

  While the post was made on her personal page, University of Essex professor of government Paul Whiteley said politicians had to be careful using social media. "To somebody who didn't know her, it would sound like she was being rude about people who are poor, even if that's not what she meant," he said. "That's what it will sound like to the vast majority of people." Watkins, whose Liberal Democrats are the main opposition group on the council, said Mason Billig "should consider her resignation immediately". "A councillor is never off duty. These comments make a mockery of many in our county struggling to make ends meet." Labour group leader Steve Morphew said Mason Billig was "out of touch".

