content: |-
  A judge dismissed the assault case against Dustin Lance Black over inconsistencies in evidence.

  The assault case against Oscar-winning screenwriter Dustin Lance Black was dismissed mid-trial on Wednesday.

  Mr Black, who is married to Olympic diving champion Tom Daley, was accused of assaulting Teddy Edwardes at a nightclub in Soho on 18 August 2022.

  He was alleged to have twisted the presenter's wrist "very hard".

  But a judge at Westminster Magistrates' Court dismissed the case, citing inconsistencies in Ms Edwardes's evidence.

  The Crown Prosecution Service has released CCTV footage of the incident at a Soho nightclub.
