  Thorpe, dubbed the grandad of the team by Vaughan,, external hit five centuries in that period, including one packed with his trademark grit, batting with a broken finger against West Indies. He played his 100th Test against Bangladesh early in the 2005 season, but it proved to be his last. Having played in five unsuccessful Ashes series, Thorpe was left out when Vaughan's side famously won back the urn in 2005, the younger batting options of Ian Bell and Kevin Pietersen preferred. After retiring that summer, Thorpe began coaching in Australia with New South Wales. He soon returned to work with Surrey and by 2010 was again involved in the England set-up, as batting coach of the development Lions side before moving up to assist the senior men's side. He left his role as assistant coach in February 2022 after a 4-0 Ashes defeat in Australia, but also had been part of the backroom team for England's 50-over World Cup win in 2019. After leaving England he was appointed Afghanistan men's head coach in March 2022 but did not oversee a match after he fell ill. Whether batting or coaching, Thorpe was a fixture on the international scene for almost three decades.

  Thorpe (right) led England during the 2021-22 Ashes series in Australia when coach Chris Silverwood was absent because of Covid-19
