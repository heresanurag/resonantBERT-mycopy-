url: http://www.bbc.co.uk/sport/cricket/articles/c0xx3435g0vo
content: |-
  Graham Thorpe was part of the England set-up for almost 30 years and, after his death aged 55, will be remembered as one of the best players of his generation.

  'Thorpe was an underrated rock fans could rely on'

  Graham Thorpe, who has died aged 55, will be remembered as one of the best batters of his generation. Across his 100 Tests between 1993 and 2005, Thorpe was a world-class left-hander in a struggling England side and a key player in the upturn that followed. With his trademark headband in place, he could grind out runs against some of the game's greats or lead a brave counter-attack with a flurry of boundaries. Between his playing and coaching careers, Thorpe spent nearly 30 years as a key part of the England set-up. He was a Surrey legend and, with bat in hand, he was as complete as England have seen.

