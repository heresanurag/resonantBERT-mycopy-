  England come up against former boss Eddie Jones when they face Japan on Sunday, but how much do you remember about his time in charge?

  Quiz: How well do you remember Jones' England reign?

  Eddie Jones was succeeded by Steve Borthwick after seven years in charge of England

  Coverage: Listen to live commentary on BBC Radio 5 Sports Extra and BBC Sounds, follow live text commentary on the BBC Sport website and app

  The Australian, who now leads Japan, had seven years in charge of England and led them to a Six Nations Grand Slam and the 2019 World Cup final. England face Jones' Japan in their final Autumn Nations Series match, so how much do you remember of his tenure at Twickenham?
