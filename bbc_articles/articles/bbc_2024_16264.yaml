content: |-
  A boy, 15, is held on suspicion of murder after another teenager is fatally stabbed in east London.

  Arrest after boy, 15, stabbed to death in Hackney

  The 15-year-old was pronounced dead at the scene, the Met Police said

  A 15-year-old boy has been arrested on suspicion of murder after another boy, also aged 15, was stabbed to death in east London. Police said they were called at 16:05 BST on Tuesday to Stoke Newington in the borough of Hackney, where they found a teenage boy with stab wounds. He was pronounced dead at the scene on Stellman Close. The victim's family has been informed, the Metropolitan Police said. A force spokesperson the boy was arrested made later the same day, after a suspect fled the scene.

  Speaking to reporters near to the scene of the stabbing, Det Ch Supt Conway said the boy's family were "understandably heartbroken". "No one should have to lose a child," he said, adding they were being supported by specially-trained officers. "I know the community will be searching for answers today and will be shocked and angry at this tragic loss of life. “I want them to know that we will do everything in our power to provide those answers and bring those responsible to justice," he said.

  The Mayor of Hackney Caroline Woodley and the Met's Det Ch Insp James Conway briefed reporters on Wednesday afternoon

  The Chief Superintendent added that officers were conducting house-to-house inquiries in the area, reviewing hours of CCTV footage and speaking to witnesses. Local people could expect to see a higher police presence in the area over the coming days as inquiries continued, while a large section of Stellman Close would remain closed for several days, he added.

  Police officers are on the scene speaking to residents on Wednesday

  Dean Hanmore, who has lived all of his life on the estate where the stabbing took place, told BBC London what had happened was “terrible”. The 59-year-old said: “People are frightened to come out of their houses." “When the kids' school holidays are broken up, something goes on," he said. "There’s always something going on - fighting or stabbing.”

  Two Lime bikes have also been cordoned off

  Tina Scott, 40, said she heard about the stabbing and saw the roads had been closed off when she arrived home from work on Tuesday. “It’s shocking to say the least,” she said. “A young lad at that. Who knows really what’s gone on? But he’s a 15-year-old boy. “His family, my heart breaks for them. It’s affected us all. “Everyone is shocked this has happened so close. Does anyone expect it to happen almost on your doorstep? No." She added: “Unfortunately, these are the realities of young lives, or life in general now.” Another resident described the area as a close-knit community.

  The stabbing happened "in a busy area", police say

  "My thoughts and prayers are with his loved ones and all those affected by this tragic loss," he said. “Violence of this kind has no place in our society. There is no honour in staying silent - I urge anyone with any information to come forward as soon as possible."

  The scene of the stabbing is just metres from a primary school

  The boy’s death means a total of eight teenagers aged 13 to 19 have been killed in homicides in London so far this year. All the victims were male, and all of them were killed in fatal stabbings, apart from 15-year-old Rene Graham who was shot dead on Sunday in Ladbroke Grove. Other victims include 14-year-old Daniel Anjorin, who was killed in a sword attack in Hainault in April. Det Ch Supt Conway said the death was a "sobering reminder of the devastating consequences of knife crime and serious violence". "It tears families apart and robs children of their futures. "We remain steadfast in our commitment to tackle these crimes and protecting young people across London." But he added police "can't do this alone" and that they relied on the wider community to help "solve these problems". The number of teenagers losing their lives to violence in the capital rose last year, from 14 in 2022, to 21 in 2023. However, it is a fall since the record number of deaths seen in 2021, when 30 teenagers were killed in London.

  Research from the Mayor’s Office for Policing and Crime (Mopac) has found that violence affecting young people traditionally peaks in the summer months. In 2023, eight teenagers were killed between June and August. The mayor, who continues to face questions over what he is doing to keep young Londoners safe, has previously raised concerns about the impact of the cost-of-living crisis fuelling violence. His Violence Reduction Unit said it was set to announce a series of summer interventions and activities for young people, including sport and music production and offering support into employment.
