title: 'Watch: Explosion and gunshots seen near Turkish city of Ankara - BBC News'
date: '2024-10-23'
section: General
url: http://www.bbc.co.uk/news/videos/c5y58237p7ko
content: |-
  Two attackers are seen arriving in a car before firing their guns and approaching the building.

  At least five people have been killed and 14 injured in an attack at the headquarters of an aviation company near the Turkish capital Ankara, authorities have confirmed.

  CCTV footage shows two attackers inside and outside the building, with an explosion seen on a separate video.

  Interior Minister Ali Yerlikaya said that two attackers were also killed in the incident at Turkish Aerospace Industries (TAI), and later said one of them was female.

  TAI is a key player in Turkey’s aerospace industry, designing, developing and manufacturing various aircraft for commercial and military use.
