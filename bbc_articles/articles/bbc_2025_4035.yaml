title: King hosts Carney at Buckingham Palace - BBC News
date: '2025-03-17'
section: General
url: http://www.bbc.co.uk/news/videos/cq5z95095ygo
content: |-
  Canada's new PM meets King Charles at Buckingham Palace, before talks with UK PM Starmer.

  King Charles, who is also king of Canada, has hosted Mark Carney at Buckingham Palace.

  The Canadian PM, who was in France earlier for talks with Emmanuel Macron, will later meet UK PM Starmer at Downing St.

  Canada has been taking part in talks with concerning a coalition of nations willing to contribute to a peacekeeping force in Ukraine.

  Tensions between Ottawa and Washington DC have been strained since US President Donald Trump said Canada should become the 51st state of America.
