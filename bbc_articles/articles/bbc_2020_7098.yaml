  Dexamethasone cuts by a third the risk of dying for those on ventilators, researchers find.

  What are the rules about funerals?

  Boris Johnson was asked whether the rules on attendance at funerals in England would be relaxed. At the moment the only mourners allowed to attend are members of the deceased person’s household and close family members or close friends if family members are unable to attend. Numbers must be kept low enough to allow everybody to stay two metres apart. Someone to conduct the service, a funeral director and other staff may also attend. The guidance for England says that mourners who are self-isolating for 14 days but do not have symptoms should be helped to attend, as should those in vulnerable groups who are shielding. Anyone showing symptoms of coronavirus should not attend. In Scotland the advice is slightly different, with those self-isolating or shielding encouraged to seriously consider not attending. In Wales, those allowed to attend the funeral are the person organising it, people who have been invited and any carers, with numbers again limited by the requirements of social distancing. The guidance for Northern Ireland includes a limit of 10 mourners and stresses that those who are self-isolating should not mix with other people attending.
