title: 'Michael Mosley: Cause of death ''indeterminate'', coroner finds - BBC News'
date: '2024-12-20'
section: UK
url: http://www.bbc.co.uk/news/articles/c75w16g05vdo
content: |-
  Police said in June that the broadcaster had died of natural causes, after he went missing while on holiday in Greece.

  An inquest into the death of broadcaster Dr Michael Mosley has not been able to determine a cause, with the coroner instead recording an open conclusion. The 67-year-old science journalist went missing in June after going for a walk on the Greek island of Symi. His disappearance sparked a high-profile search effort by emergency services and his body was found after four days. In written findings, senior coroner for Buckinghamshire Crispin Butler said the cause of Dr Mosley's death was "indeterminate" and "unascertainable" - and "was most likely attributable either to heatstroke (accidental) or non-identified pathological cause".

  Mr Butler said Dr Mosley's death was not found to be as a result of homicide, suicide, or an accident related to injuries. An open conclusion by a coroner means there is insufficient evidence to decide how a death came about - the case is left open in case further evidence comes to light. Dr Mosley, a broadcaster for almost 20 years, known for programmes that focused on diet, exercise and medicine, had been staying with family and friends when they travelled to Pedi Beach on the morning of 5 June, a findings document said. "Michael had intentionally left his mobile phone back at the house to prevent it getting wet on the ferry," the document added. "Later in the afternoon Michael decided he was going to walk back home rather than take the ferry." The findings said Dr Mosley had a rucksack, a litre of water, a biscuit, a hat and an umbrella with him and was "described as looking energetic and cheerful as he set off".

  Following a large search effort, Dr Mosley's body was found next to a fence around 30 minutes walk from Pedi, where he was last seen

  He collapsed and died on the same day in a rocky area near Agia Marina Beach on the island, Mr Butler said in his written findings. "There had been high temperatures during this time," he concluded. "Michael's death was most likely attributable either to heatstroke (accidental) or a non-identified pathological cause." Mr Butler said there was "nothing of note" in toxicology results, while Dr Mosley's death "may have been due to a medical event or as a result of a non-traumatic accident". Greek authorities conducted an extensive search for Dr Mosley, deploying police officers, firefighters, divers and a helicopter. An initial post-mortem examination in June concluded that he had died of natural causes. Greek police spokeswoman Konstantia Dimoglidou told the BBC at the time that the post-mortem found no injuries on his body that could have caused his death. Dr Mosley's wife Dr Claire Mosley previously said she had been overwhelmed by the "extraordinary" outpouring of affection from the public following his death. The presenter fronted TV series including Trust Me I'm a Doctor and The Truth about Exercise - as well as the BBC Radio 4 series Just One Thing, which attracted 25 million listeners around the world. Millions more knew him for giving advice on BBC One's The One Show and ITV's This Morning. He was also famous for popularising the 5:2 and Fast 800 diets, which advocate for intermittent fasting and low-carbohydrate meals.
