title: Alert issued over potentially deadly fake bottles of Glen's Vodka - BBC News
date: '2024-09-05'
section: Business
url: http://www.bbc.co.uk/news/articles/c8er23xwwjno
content: |-
  The Food Standards Agency warns counterfeit bottles have been found to contain a dangerous substance.

  The fake bottles are made to look like the genuine Glen's Vodka, pictured here

  The public are being warned about fake bottles of Glen’s Vodka which have been found to contain an industrial solvent that can cause death in severe cases. The Food Standards Agency (FSA) said some 35cl counterfeit bottles have been found to contain isopropyl alcohol, which is not intended for human consumption. The fake vodka may have a strange smell and taste differently to genuine vodka, the FSA warned. It comes a day after Food Standards Scotland, external (FSS) warned that fake Glen's Vodka had been found in local convenience stores in Glasgow and Lanarkshire.

  In a statement, the FSA - which covers England, Wales and Northern Ireland - said it "has been made aware of the production and distribution of counterfeit vodka labelled as Glen’s Vodka". "Products sampled were found to contain isopropyl alcohol, so they are unsafe. Isopropyl alcohol is an industrial solvent and is not intended for human consumption," it said. Drinking the solvent "can quickly lead to alcohol poisoning and in severe cases death", the FSA said., external It advises consumers to check for a "laser etched lot code applied to the bottle between the rear label and the base of the bottle". The FSA says that isopropyl has "a strong odour and it may be possible to detect contaminated products by smell alone". "If the vodka has a strong smell, do not consume it. Instead store it in a safe place and report it to your local authority for further instruction and advice," the agency said. After the FSS released a warning in Scotland on Tuesday, a spokesperson for the Loch Lomond Group, which owns Glen’s Vodka, said: “Our priority is the health and safety of the public which includes our many thousands of loyal Glen’s customers. "We are working hard to support the excellent efforts of Food Standards Scotland and the other authorities involved to address the matter urgently."
