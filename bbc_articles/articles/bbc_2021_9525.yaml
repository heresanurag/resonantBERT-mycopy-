title: 'Afghanistan: Orphan''s reunion with British soldier after 19 years - BBC News'
date: '2021-08-03'
section: General
url: http://www.bbc.co.uk/news/world-asia-58028234
content: |-
  Ramin Paikar was among the orphans visited by British soldiers stationed in Kabul in 2002.

  Ramin Paikar was a child living in an orphanage in Kabul in 2002.

  British soldiers used to visit and bring gifts every week. They were part of the international coalition, which had removed the Taliban from power. He remembers it as the “best time”.

  Now, as foreign forces leave, the BBC reconnects Ramin with one of those British soldiers, Adam, who is from Nottinghamshire in the UK.
