title: Three killed in Peterborough wrong-way crash - BBC News
date: '2019-04-14'
section: Cambridgeshire
url: http://www.bbc.co.uk/news/uk-england-cambridgeshire-47925574
content: |-
  A car was driven in the wrong direction down the slip road to Stanground off the Fletton Parkway in Peterborough.

  One of the cars involved in the crash was driven the wrong way down a slip road, police said

  Three people died in a head-on crash when a car was driven the wrong way down a slip road, police have said.

  It happened just after midnight at the slip road to Stanground off the Fletton Parkway in Peterborough, Cambridgeshire.

  All three people in one of the cars were killed, police said.

  The driver of the other vehicle was arrested on suspicion of causing death by dangerous driving and driving under the influence of alcohol or drugs.

  Wreckage was strewn across the dual carriageway

  Police said he was in a critical condition in hospital.

  The westbound stretch of the road was closed but has since reopened.

  The chair of the Cambridgeshire Police Federation, Liz Groom, tweeted that her thoughts were with the "families of those who have died" and also with "officers and emergency services colleagues who attended".

