title: Train derails and explodes into flames - BBC News
date: '2021-05-17'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-57145192
content: |-
  The freight train was carrying highly flammable fertiliser and nearby residents have been evacuated.

  The incident happened near the city of Sibley in the north west of Iowa.
