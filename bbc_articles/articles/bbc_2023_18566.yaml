title: 'Prague: Dramatic video from city shows people leaping from building ledge
  - BBC News'
date: '2023-12-22'
section: General
url: http://www.bbc.co.uk/news/world-europe-67795376
content: |-
  A gunman entered Charles University killing 14 people in one of the country's worst fatal shootings.

  Dramatic videos have been shared after a shooting in Prague that left 14 people dead and at least 24 others injured.

  In one video, people are seen leaping from building ledges to safety.

  The incident, which happened at Charles University, is not being treated as a terrorist incident.

  It is being reported that the gunman was a 24-year-old from a village outside Prague, and that the gunman's father was found dead earlier on Thursday.
