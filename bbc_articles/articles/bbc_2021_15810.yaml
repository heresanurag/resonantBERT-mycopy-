title: 'Downing Street parties inquiry: Opposition MPs call for independent figure
  to lead probe - BBC News'
date: '2021-12-18'
section: UK Politics
url: http://www.bbc.co.uk/news/uk-politics-59709414
content: |-
  The UK's top civil servant is no longer leading the probe after it emerged an event was held in his own office.

  An inquiry into Downing Street lockdown parties should be led by an independent figure, opposition MPs have said.

  The UK's top civil servant, Simon Case, had been chosen to lead the investigation but he stepped aside after it emerged an event was held in his own office last December.

  No 10 said the probe would be concluded by senior civil servant Sue Gray.

  But Labour MP Chris Bryant and the SNP's Westminster leader questioned whether she could be independent.

  Mr Bryant, who is chairman of the Commons standards committee, said he was not convinced about Ms Gray leading the investigation.

  "She will know every single one of them [involved in the parties] I would have thought, so again I'm not sure that this is the right direction," he told BBC Radio 4's Today programme.

  The SNP's Ian Blackford suggested there should be a judge-led inquiry.

  He told BBC Two's Newsnight that "having somebody else from the civil service marking their own isn't good enough" and that it should be someone with authority from outside the government and civil service.

  However, Lord Barwell, a former Conservative MP who was chief of staff for then-Prime Minister Theresa May, said he could not think of a better person for the role.

  In past investigations he said Ms Gray had been "completely independent" and he was confident "we will get the facts".

  Labour's deputy leader Angela Rayner said Ms Gray had an "incredible responsibility to restore trust".

