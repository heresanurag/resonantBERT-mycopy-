id: bbc_2018_12178
title: A specialist truck removes a suspect package sent to Robert De Niro - BBC News
date: '2018-10-26'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-45981140
content: |-
  A "total containment vehicle" was sent to move the suspected device while police investigate at the actor's New York restaurant.

  Police are investigating a suspect package that was delivered to actor Robert De Niro's restaurant in Tribeca, New York City. Similar packages have been sent to CNN and senior Democrats this week.
