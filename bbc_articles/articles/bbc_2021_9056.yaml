  Former world boxing champion Joe Calzaghe and the YouTuber and boxer KSI were among those to pay tribute to Sebastian.

  "Really Saddened to hear the news of the passing of Seb Eubank. Thoughts and Prayers to Chris and family," Calzaghe said.

  Sebastian's promoters and agents, Kalle and Nisse Sauerland, described him as a "true gentleman and a sincere human being".

  Promoter Eddie Hearn added: "So saddened by the news of the passing of Seb Eubank. Our thoughts and prayers go out to his family and friends."

  Eubank Snr, 54, held the WBO middleweight and super-middleweight titles between 1990 and 1995 and was undefeated in his first 10 years as a professional.
