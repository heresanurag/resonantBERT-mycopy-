title: Barry boy makes 700 Christmas cards to spread festive joy - BBC News
date: '2023-12-15'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-67726980
content: |-
  Joshua from Barry has hand-made and delivered the festive cards to care homes and hospital.

  Joshua, 5, has made and delivered more than 700 Christmas cards for care home residents and hospital patients

  A five-year-old boy has spread Christmas cheer by making and hand-delivering more than 700 cards.

  Joshua from Barry, Vale of Glamorgan, created the cards for care home residents and hospital patients.

  His mum Claire said: "We normally make cards, and then he came up with the idea of sending a card to everyone in Barry."

  As Claire works in the care sector, they decided to focus his idea on the older generation.

  People staying at 12 care homes in Barry, plus Bethel House, Dinas Powys, and Barry and District Hospital were the chosen recipients.

  Joshua, who started his mammoth task at the end of October, finished his deliveries this week.

  Joshua's mum Claire said the card-making process began in October and involved a lot of sequins

  He was often invited into the care homes to give out his Christmas cards.

  He also made 200 extra cards for the annual Christmas charity Shoebox Appeal.

  Claire added: "Joshua has written his name in all of the cards and his age. There's been a lot of sequins around in the making of them.

  "When we went to the care homes some of the residents said they don't get many cards so we have had lots of happy tears."
