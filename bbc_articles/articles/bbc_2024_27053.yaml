title: Fatal flat explosion in Alloa captured on CCTV - BBC News
date: '2024-10-08'
section: General
url: http://www.bbc.co.uk/news/videos/cx2kw05yz5vo
content: |-
  CCTV footage shows the moment a flat in Alloa exploded, killing one man and leaving three people injured.

  CCTV footage has captured a fatal explosion at a flat in Alloa, Clackmannanshire.

  A man, who has not yet been identified, was inside the property when the explosion occurred and was pronounced dead at the scene.

  Three other individuals who were injured were taken to Forth Valley Royal Hospital for treatment.
