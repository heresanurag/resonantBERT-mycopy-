title: Boy, three, dies after farm tractor crash in Bury - BBC News
date: '2022-07-17'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-62193570
content: |-
  The child dies despite his family flagging down an ambulance while driving to a hospital, police say.

  Police said the "heart-breaking incident" happened on a farm in Tottington

  A three-year-old boy has died after a tractor crash on a farm.

  Greater Manchester Police said that following the crash in Bury on Saturday afternoon, the child's family flagged down an ambulance while driving him to hospital.

  However paramedics said he died before he could get there.

  The force said the tractor driver was helping with inquiries and that it was conducting an investigation with the Health and Safety Executive.

  Ch Insp Ian Partington said: "This is a heart-breaking incident that has seen a young boy tragically lose his life and my thoughts go out to his family and loved ones who will be utterly devastated by today's events.

  "Despite his family flagging down an ambulance while driving him towards hospital as quickly as they could, the boy sadly could not be saved after the best efforts of paramedics."

  Police said the crash happened on farmland off Bentley Hall Road in Tottington.

  A spokesperson said: "Specialist officers are supporting the family of the boy, and we ask that their privacy is respected at this devastating time."

