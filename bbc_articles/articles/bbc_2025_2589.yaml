content: |-
  The threat of US tariffs and potential political headaches for Sir Keir Starmer lead many of the papers.

  The prime minister is said to be facing an internal Labour backlash over the Rosebank oilfield scheme

  Sir Keir is facing a growing backlash within Labour, external over the potential approval of a large oilfield, west of the Shetland Islands, the Guardian reports. It says the Treasury is minded to support the Rosebank scheme, but MPs are nervous about breaking the spirit of a manifesto pledge of no new oil or gas licences. The development was originally given a provisional go-ahead in 2023. The Daily Telegraph's front page features a photo of Jack Lopresti, the former deputy chairman of the Conservative Party. He is now in Ukraine, after losing his seat at the general election, and says he wants to fight on the frontline, external having joined the foreign legion. The front pages of both the Sun, external and the Daily Mirror, external feature the same image of the Princess of Wales, taken by six-year-old Prince Louis, to mark World Cancer Day. Kate stands on a felled tree with her arms outstretched. Volunteers clearing up flood damage in Grantham, Lincolnshire, have been shocked to come across antique litter which has risen up as a result of high water, according to the i. The hoard included a a 160-year-old empty beer bottle as well as a can of Diet Pepsi from the 1980s. Ian Simmons, who was among the team cleaning up, tells the paper it was a "powerful reminder of the long-lasting consequences of littering".

