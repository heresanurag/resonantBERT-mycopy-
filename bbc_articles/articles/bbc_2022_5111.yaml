title: Man dies during organised scuba dive at Kinghorn beach - BBC News
date: '2022-04-11'
section: Edinburgh, Fife & East Scotland
url: http://www.bbc.co.uk/news/uk-scotland-edinburgh-east-fife-61061152
content: |-
  Emergency services were called to Kinghorn Beach in Fife after he got into difficulty in the water.

  Police say a man was rescued from the water after getting into difficulty on a dive but died a short time later

  A man has died after an incident during an organised scuba dive near a beach in Fife.

  Emergency services were called to Kinghorn beach at 09:55 BST on Sunday after receiving reports of a man in difficulty in the water.

  A coastguard helicopter landed on the beach during the emergency operation.

  Police Scotland said the dive had been taking place close to the beach. The man was rescued from the water but he died a short time later.

  A force spokesperson said: "Enquiries into the circumstances surrounding the death are ongoing. A report will be submitted to the Procurator Fiscal."

