title: Grieving loved one in public is not easy, Queen told Sentamu - BBC News
date: '2022-09-19'
section: UK
url: http://www.bbc.co.uk/news/uk-62946724
content: |-
  Former Archbishop of York also reveals the monarch did not favour a "long, boring" funeral service.

