title: 'West Belfast: Man dies after Donegal Celtic social club shooting - BBC News'
date: '2022-10-02'
section: Northern Ireland
url: http://www.bbc.co.uk/news/uk-northern-ireland-63108972
content: |-
  The victim, named locally as Sean Fox, was shot by two masked gunmen who then escaped on foot.

  Investigations continue in west Belfast following the shooting of Sean Fox

  A man has died after a shooting at a social club off the Suffolk Road in west Belfast.

  The victim has been named locally as Sean Fox.

  He was shot by two masked gunmen who walked into the Donegal Celtic FC social club and then made their escape on foot, the police said.

  The shooting happened shortly before 14:30 BST on Sunday, when the club was busy with customers watching football on TV.

  Eyewitnesses told BBC News NI that people initially believed the masked men came in to rob the social club.

  They said the men then walked up to the victim and shot him in the back of the head, continuing to shoot after he fell.

  Another eyewitness said the gunmen "knew who they wanted to kill and did it in seconds".

  "One shot him while the other one stood and watched the door," they said.

  It is understood Mr Fox, who was in his 40s and originally from west Belfast, was friends with Jim Donegan, who was shot dead as he waited to pick up his son from school in 2018.

  Detectives from the the Police Service of Northern Ireland (PSNI) Major Investigation Team have launched a murder investigation and are urging anyone with information to contact them.

  This looks a particularly cold-blooded brutal execution.

  We had two masked gunmen casually walk into a crowded social club and identify their victim.

  It is clear the gunmen knew who they were attacking and didn't leave anything to chance.

  It is unclear who was behind this killing, it is far too early to say.

  Sinn Féin MP for the area, Paul Maskey, told BBC News NI there was "total shock" in the community following this "uncalled for, unjust" shooting.

  He urged anyone with information to come forward and asked for the PSNI be given space to carry out their investigation.

  "My thoughts and sympathies are with this man's family... I condemn those responsible. There is no place for guns on our streets," he added.

  People Before Profit councillor Matt Collins called the shooting "a horrific and appalling act of violence, which must be condemned by all".

  "My thoughts are with the victim's family and anyone impacted by this barbaric act," he said.

  There's absolutely no place for guns or violence in our communities."

  SDLP councillor Brian Heading added: "This incident has cast a dark cloud over the entire area.

  "People in this community want to be able to live their lives in peace and this shooting in broad daylight in a busy establishment must be condemned in the strongest possible terms by all."

  Det Ch Insp John Caldwell said: "At approximately 14:45 BST, police received a report that two masked men had entered the Donegal Celtic Sports and Social Club shortly before 14:30 BST and shot the man a number of times.

  "He was pronounced dead at the scene. Both gunmen are believed to have made their escape on foot along Suffolk Road."
