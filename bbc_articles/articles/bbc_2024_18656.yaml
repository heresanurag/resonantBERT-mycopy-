title: 'Southend dog attack: Woman died after ''bite wound'', inquest told - BBC News'
date: '2024-08-15'
section: Essex
url: http://www.bbc.co.uk/news/articles/c78l9pv50gzo
content: |-
  An inquest into 34-year-old Michelle Hempstead's death is opened and then suspended, pending a criminal investigation.

  Michelle Hempstead, 34, died on 30 July - the day after being attacked by a dog in Southend-on-Sea, the opening of an inquest was told

  A woman died after suffering a dog bite wound to her arm, an inquest heard. Michelle Hempstead, 34, died on 30 July after being attacked by a dog in Southend-on-Sea the previous day. An inquest was opened at Essex Coroner's Court on Thursday and suspended for three months pending a criminal investigation. The senior coroner for Essex, Lincoln Brookes, asked for his "deepest condolences" to be passed to Ms Hempstead's family.

  Essex Police previously said it was not looking for anyone else in connection with the incident after officers were called to Retort Close on 29 July

  Court coordinator Andy Flack said Ms Hempstead was taken to Southend Hospital for treatment after being found by police with a "laceration to her upper limb" on 29 July. She was transferred to a hospital in east London where she died the next day. A post-mortem examination at Basildon Hospital found Ms Hempstead suffered a dog bite wound to her left upper arm. Mr Flack said that transection of the left axillary artery – the main artery to the arm – was also a contributory cause to her death. Multi-organ failure and hypovolemic shock – where a severe loss of blood or other fluids prevents the heart from pumping enough blood – were also given as contributory causes. "I've received a written request from Essex Police to suspend the coronial proceedings pending a criminal investigation," Mr Brookes said.

  An online fundraising page set up to raise money for Ms Hempstead's funeral described her as the "kindest soul". One friend wrote on the page: "Michelle wasn't just a mother to five beautiful children, she was a daughter, a friend, a neighbour, a big support system for the people around her but undoubtedly the kindest soul to have crossed everyone's paths. "We are absolutely heartbroken by her absence and we’d like to do her justice by coming together as a community at this unfortunate time." Essex Police previously said it was not looking for anyone else in connection with the incident after officers were called to Retort Close by the ambulance service at about 23:30 BST on 29 July. Two dogs were seized, the force said at the time, but only one of them was believed to have been involved in the attack. Police have not said what breed it was, but indicated that it was assessed as not a banned breed.

