  On Saturday, Home Secretary Yvette Cooper defended Phillips as "fearless and formidable" and someone who has campaigned "tirelessly for justice for those badly let down by endemic institutional failure" for many years. Asked about the comments, Farage said Musk had used "very tough terms", but that "in public life, tough things get said. They get said by both sides of the debate." Farage said he believed in free speech, "even if what people say is offensive, if you find it offensive, if most people find it offensive". He continued: "This man happens to be the richest man in the world, but equally, the fact that he's bought Twitter now actually gives us a place where we can have a proper open debate about many things... We may find it offensive, but it's a good thing, not a bad thing." Earlier this week, Farage distanced himself from Musk's support for Tommy Robinson, a far-right activist who is serving a jail term for committing contempt of court.

  "The fact that he supports me politically and supports Reform doesn't mean I have to agree with every single statement he makes on X," Farage told the programme. "I will, at the inauguration, have a conversation with him on a variety of things – this will no doubt be one of them." In the interview, broadcast on BBC One on Sunday morning, Farage said the public is "absolutely right to be" angry about grooming gangs. He went on: "I just think people ask themselves, what has happened to our country? How could this possibly have happened? Why did everybody want to cover it up? Why has there been no full public inquiry?" In a letter seen by the BBC, Phillips and Cooper wrote to the Conservatives setting out why they had asked Oldham Council to set up its own inquiry, rather than grant its request for a government-led one. The previous Conservative government turned down a similar request in 2022. The letter pointed out the local authority had already started setting up its own inquiry, and added that victims have said "loud and clear" they want action. "In Oldham the crimes committed by grooming gangs were horrific," they wrote.

  "Young girls were abused in the most cruel and sadistic way. Victims and the community need to know that all steps are taken to deliver justice and protect children properly in the future." They said they supported an independent review commissioned by Mayor Andy Burnham, which covered historic abuse in Oldham and led to a new police investigation, as well as other child protection work across Greater Manchester. The letter highlighted the work of the Child Sexual Abuse Inquiry, external, which published its final findings in 2022. It made clear that "abuse must be pursued and challenged everywhere with no fear or favour" - whether in care homes, churches, homes or by grooming gangs. Professor Alexis Jay, who led that inquiry, said in November she felt "frustrated" that none of its 20 recommendations to tackle abuse had been implemented more than two years later. On Friday, Health Secretary Wes Streeting said the government was getting "on with the job" of implementing the recommendations "in full" since taking office in July.

  There have been several investigations into grooming gangs in various parts of England, including Rotherham, Bristol, Cornwall and Derbyshire. An inquiry into abuse in Rotherham found 1,400 children had been sexually abused over a 16-year period, predominantly by British Pakistani men. An investigation in Telford found that up to 1,000 girls had been abused over 40 years - and that some cases had not been investigated because of "nervousness about race". Police figures from 2023 reveal that group-based child sexual abuse accounted for 3.7% of all sexual offences against children reported to police. According to the data, 26% of group-based child sexual abuse happened within families, compared with 17% involving groups including grooming gangs.
