title: Nigel Farage defends Elon Musk over grooming gangs posts - BBC News
date: '2025-01-05'
section: Politics
url: http://www.bbc.co.uk/news/articles/cd9x3d4v7jdo
content: |-
  The tech billionaire has used his X platform to heavily criticise the UK government and individual ministers.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Nigel Farage has defended Elon Musk after the billionaire attacked the UK government's response to grooming gangs on X, the social media platform he owns. In a series of posts over several days, Musk suggested Sir Keir Starmer failed to prosecute gangs and said Home Office minister Jess Phillips "deserves to be in prison". It came as the Home Office defended its decision to reject a request for it to lead a public inquiry into child sexual exploitation in Oldham. The Conservatives and Reform UK have called for a wider national inquiry. Asked about Musk's comments on Sunday with Laura Kuenssberg, Farage said he had used "very tough terms" but that "free speech was back" on X under his ownership.

  The Reform UK leader was also pressed on his wider relationship with Musk, who is said to be considering donating money to his party. Musk's latest intervention on UK politics came after Phillips, a safeguarding minister within the Home Office, instructed Oldham Council to launch its own local inquiry into historic child sexual abuse in the town, similar to inquiries set up in Rochdale and Telford. The local authority had called for a government-led inquiry. The tech tycoon seized on the decision, which was taken in October, and began heavily criticising the British government online. He suggested Sir Keir had failed to properly prosecute rape gangs while director of public prosecutions (DPP), and has repeatedly shared posts from Reform and Conservative MPs calling for a national inquiry. Musk, who is a key adviser to incoming US President Donald Trump, called the prime minister "two-tier Keir" and accused Phillips of being a "rape genocide apologist".

