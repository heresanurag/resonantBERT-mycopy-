  'I have not seen that complete an England performance for years'

  In his BBC Sport column, World Cup winner Matt Dawson reflects on England's huge Six Nations win over Wales, their Six Nations campaign and why Maro Itoje is a Lions captain in waiting. I have not seen the complete performance England produced against Wales for a number of years. The first 10 minutes of the 68-14 win in Cardiff were absolutely brutal. It was so fast and accurate. The system they pieced together was machine-like, yet they still had the creativity to emphatically unravel Wales. Some of the criticism of Steve Borthwick as head coach has been fair, but he got his selection spot on and he has created an environment where those players have been able to put down that performance at the Principality Stadium.

