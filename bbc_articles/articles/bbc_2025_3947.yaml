  Itoje has been one of England's standout performers. He is 30 years old and has won 93 caps but he is playing like when he first came on the scene. Every game he is up for man of the match. When top players get the armband it gives them superhuman strength. If anything, Itoje has got a bit quieter, but his performance are shouting from the rooftops. He is so much more disciplined; he doesn't give as many penalties away. There is less gesticulating. He used to cheer and be very expressive but he has an absolute killer instinct about him at the moment in everything he does. It is crying out for him to be Lions captain. He is nailed on to be in that Test team and he has two tours under his belt. Ireland's Caelan Doris is another candidate, but the back row will a hugely competitive area for the Lions, whereas in the second row Itoje is playing all day long. Fin Smith, meanwhile, has established himself as England's number 10. I know there have been a couple of current and former players being slightly biased, mainly because of the clubs they play for, saying that Marcus Smith should be the fly-half. But the facts are there for everyone to see and at Test level you have to have a fly-half with control and the ability to make everything look easy. Fin Smith's passing was good but his touchline kicking was world-class and possibly the best I've ever seen. Every single time they had a penalty he was making England 40 or 50 metres. They had a couple of early penalties and I was thinking they should take the three points, but Fin Smith kicks it five meters from the touchline - and those margins make a massive difference. Then you add his calmness and distribution, picking the right holes and making the right calls. George Ford did the same when he came on, zipping about. Wales were running in circles. Contrast that with Wales, where Gareth Anscombe was too deep and very lateral and played into England's hands.

  France were the best team in the tournament. They had a couple of dodgy moments against England, which cost them a Grand Slam, but they will take winning the championship. They have had their post-2023 World Cup sulk and everyone has regrouped and moved on to the next challenge in 2027. Scotland are a little bit like my football team, Everton. As a fan, you start every season thinking we can get into Europe. But no, we are a mid-table team. Maybe in 10 years it might be different. Scotland are such a good side and do some incredible stuff, but they just don't have the squad to be able to do it against a series of top teams over a longer period of time. Ireland have had a tough time with the coaching changes and a few injuries, and we maybe got fooled a bit with the second half against England when they powered past them. They are not quite the Ireland they used to be with that full Leinster contingent, but I would be reluctant to say they are on the slide. They still have some excellent players and Andy Farrell is coming back as head coach, so Ireland will be a threat in the next World Cup. Wales could not have given any more, but they don't have the personnel to compete at this level and that is why they have lost 17 games on the bounce. It is an infrastructure issue which hasn't been addressed for years - and they have a mountain to climb in the next five years.

