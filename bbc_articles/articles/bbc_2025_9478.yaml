  Bodycam footage shows the moment a police officer was recruited to deliver a pizza while responding to reports of an alligator in a Florida neighbourhood.

  Bodycam footage shows the moment a police officer was recruited to deliver a pizza while he was responding to reports of an 8ft (2.4m) alligator in a Florida neighbourhood.

  A frightened delivery driver asked for help when the reptile crawled dangerously close to her drop-off address.

  According to police, Florida Fish and Wildlife trappers managed to relocate the animal out of the neighbourhood.
