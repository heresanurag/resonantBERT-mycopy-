title: 'Tideswell: CCTV released of attempt to ram-raid tractor depot - BBC News'
date: '2025-02-08'
section: General
url: http://www.bbc.co.uk/news/videos/ce85p5dl1eeo
content: |-
  Police say suspects attempted to ram-raid the B&B Tractors depot in Tideswell, Derbyshire.

  An investigation is under way after about a dozen people were involved in an attempted ram-raid at a tractor depot.

  The CCTV footage shows a Citroen Relay van being driven into the B&B Tractors depot in Tideswell, Derbyshire, just after 00:00 GMT on Wednesday.

  The Derbyshire Rural Crime Team said at least 13 people, some of whom appeared to be carrying cans of fuel, tried to break into the site but failed.

  Police said it was likely the suspects were targeting quad bikes "that would be driven from the scene" and sold on.

