  The mounting problems facing Ruben Amorim as Manchester United sink closer to their worst-ever Premier League campaign.

  Fewer goals than Antony and January regrets - the problems facing Amorim

  When Manchester United sacked Erik ten Hag in October, they were 14th in the Premier League table and seven points from both the top four and the bottom three. Fast forward three and a half months and the club are 15th, 15 points from the top four and 12 points above the relegation zone after suffering a 1-0 defeat by Tottenham - the eighth league defeat under new manager Ruben Amorim. There has been no 'new manager bounce' with Portuguese coach Amorim saying he has "a lot of problems" and his job is "so hard". It is no secret that United are enduring a historically poor Premier League campaign but just how large are the problems facing Amorim?

  Amorim may have jumped the gun when he described this side as "the worst team maybe in the history of Manchester United" in January. After all, the club were relegated from the first division in 1974. But in the Premier League era, they are the worst statistically at this stage of a season.
  • None United's tally of 29 points from 25 matches is their lowest at this stage of a Premier League season
  • None United have lost 12 times in 25 matches, a loss rate of 48%.
  • None The club are averaging 1.16 points-per-game, which, if continued, would give them an end-of-season points tally of 44 points from 38 matches. That would be their lowest Premier League points tally.
  • None United have won four, drawn two and lost eight of Amorim's 14 Premier League matches.
  • None Only Tottenham, Wolves, Ipswich, Leicester and Southampton have earned fewer points than United's 14 in their 14 Premier League matches under Amorim. Amorim has managed 21 matches since joining United. He has won nine, drawn three and lost nine of those matches, giving him a win rate of 43%. That is the lowest of any permanent Manchester United manager since Sir Alex Ferguson's retirement in 2013 over their first 21 matches in charge, with Louis van Gaal (48%) the next lowest. Jose Mourinho (52%), David Moyes (57%), Erik ten Hag (67%) and Ole Gunnar Solskjaer (71%) all had significantly better records in all competitions from their first 21 matches in charge.

