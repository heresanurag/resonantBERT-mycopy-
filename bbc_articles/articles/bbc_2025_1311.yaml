  Of all of United's problems under Amorim, their inability to score enough goals is the most glaring. A deeper look at the numbers does not make for happy reading.
  • None United have scored 28 goals in 25 Premier League matches this season - a rate of 1.12 goals-per-game.
  • None Only four teams in the division - Ipswich, Southampton, Leicester and Everton - have scored fewer.
  • None Amad Diallo, who has been ruled out of the remainder of the season with an ankle injury, is the side's top scorer in the Premier League (six) and all competitions (nine), while centre forwards Rasmus Hojlund (two) and Joshua Zirzkee (three) have managed just five goals in 45 Premier League appearances between them.
  • None In 14 matches under Ten Hag this season, United's Expected-Goals-per-game (xG) was 1.7. This has fallen slightly under Amorim, with United's xG 1.6-per-game since he took charge.
  • None United's 'big chances' created record is identical under Ten Hag and Amorim this season, with the side creating 2.9 big chances each match.
  • None Despite United's struggles, captain Bruno Fernandes is fourth highest for chances created in the league (53). Cole Palmer (66) is top. United finished last season with a goal difference of -1, the first time they had ended a Premier League campaign with a negative goal difference. However, they are on course to eclipse that with a -7 goal difference this term. Similarly, while the 57 goals they scored during the 2023-24 campaign was their joint-lowest in the Premier League, they are on course to score fewer this season. If they maintain their rate of 1.12 goals per game, they would finish with 44 scored.

  During the early weeks of Amorim's reign, the former Sporting boss bemoaned the lack of time he had been to spend with his players on the training ground. However with a less packed schedule with qualification for the Europa League knockout stages assured and a Carabao Cup exit at Tottenham's hands, Amorim has been able to spend more time on the training ground. But a "free week" before Sunday's trip to Tottenham proved anything but productive. Between the 2-1 win against Leicester City in the FA Cup on 7 February and Sunday's loss to Spurs, United lost six players. Diallo, Kobbie Mainoo, Manuel Ugarte and Toby Collyer were ruled out of the trip through injury, while Leny Yoro and Christian Eriksen fell ill. Their absences added to the long-term casualties of Luke Shaw, Mason Mount, Lisandro Martinez and Jonny Evans. It meant Amorim was forced to name an inexperienced bench against Spurs with Victor Lindelof joined by Elyh Harrison, Harry Amass, Tyler Fredricson, Jack Fletcher, Jack Moorhouse, Chido Obi, Ayden Heaven and Sekou Kone. Sweden defender Lindelof was the only one of those to have previously played for the first team.

  Manchester United made two signings in the January window, bringing in Patrick Dorgu from Italian club Lecce and defender Ayden Heaven from Arsenal but the squad was thinner by the end of the window than when it started as Marcus Rashford, Antony and Tyrell Malacia departed on loan. Dorgu, a multi-functional left-footed Denmark international, should provide balance at wing-back to Amorim's 3-4-3 system. But the decision to allow both Antony and Rashford to leave without signing a replacement looked risky at the time and is proving so now. Their departures left Hojlund, Zirzkee, Diallo and Alejandro Garnacho as the side's only recognised forwards. That list is down to three now, given Diallo's season-ending injury. Garnacho has no Premier League goals or assists since Amorim joined. Rashford has made two eye-catching substitute appearances for Aston Villa since moving to Birmingham, and he played a hand in Ollie Watkins' equaliser against Ipswich on Saturday. As for Antony, the Brazilian has scored three times in four matches for Real Betis since moving to Spain. This matches the tally he managed during 38 appearances for United last season and means he has scored more so far in February than United have.
