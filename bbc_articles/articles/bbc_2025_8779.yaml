title: Child dies after minibus overturns on M4 slip road - BBC News
date: '2025-05-12'
section: Berkshire
url: http://www.bbc.co.uk/news/articles/cgq3y2gd281o
content: |-
  The M4 in Berkshire was closed for several hours on Sunday following the incident near Reading.

  National Highways said there was a large emergency services presence at the scene

  A child has died after a minibus overturned on a motorway slip road, police have said. The M4 in Berkshire was closed in both directions following the single vehicle collision on the link road from junction 10 of the motorway to the A329M near Reading at about 14:45 BST on Sunday. The motorway reopened after about three hours but the slip road remained closed, Thames Valley Police (TVP) said just before 20:00. The force said other passengers were seriously injured in the crash and confirmed no arrests have been made.

  National Highways said earlier on Sunday that the M4 was closed eastbound, between junctions 11 and 10, and westbound, between junctions 8/9 and 11, because of a "serious injury incident involving an overturned vehicle" on the link road. It warned of "severe" delays approaching the closures in both directions, partly because of broken down vehicles in the queues. South Central Ambulance Service (SCAS) confirmed it had five critical care units and six ambulances at the scene near Reading, and a spokesperson for Thames Valley Air Ambulance said it sent a helicopter and a critical care response vehicle. Royal Berkshire Fire & Rescue crews were also in attendance.

  Traffic was queueing eastbound at junction 11 following the incident

