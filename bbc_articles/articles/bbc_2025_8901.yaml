  • None Offer a new BBC family account for every parent of a young child, offering support at key milestones from birth to leaving school The BBC says it is the most trusted news provider in the UK, with 45% of the population naming it as the source they trusted the most in 2024. That is down from 57% a decade ago. Mr Davie also called for a national plan to switch off traditional broadcast transmissions in the 2030s, and ensure a "smooth" transition to internet-only delivery of programmes. The BBC could launch its own device aimed at people who haven't switched to streaming, based on the existing Freely online service, Mr Davie said. "We want to double down on Freely as a universal free service to deliver live TV over broadband. "And we want to consider developing and launching a streaming media device with Freely capabilities built in, with a radically simplified user interface specifically designed to help those yet to benefit from IP services."
