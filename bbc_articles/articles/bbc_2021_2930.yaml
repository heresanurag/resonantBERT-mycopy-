content: |-
  Mrs Zaghari-Ratcliffe's husband, Richard, has been told a new court case is scheduled against her.

  Nazanin Zaghari-Ratcliffe – the British-Iranian woman jailed in Iran on spying charges – has been freed after five years.

  But now her husband, Richard, has been told a new court case is scheduled against her.

  Prior to the end of Nazanin's jail sentence, he spoke to the BBC's Caroline Hawley.

  Read more: Zaghari-Ratcliffe released but faces new court date'My wife has been used as a bargaining chip'
