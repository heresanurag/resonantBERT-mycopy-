title: 'Garden City: Grandparents charged with toddler murder - BBC News'
date: '2024-03-06'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-68490830
content: |-
  Two-year-old Ethan Griffiths was taken to hospital in August 2021 and later died of a brain injury.

  The pair, along with the boy's mother, will appear at Mold Crown Court in May

  The grandparents of a toddler who suffered a fatal brain injury have been charged with his murder.

  Two-year-old Ethan Ives Griffiths was discovered at the home of Michael Ives, 46, and Kerry Ives, 45, in Garden City, Flintshire on 14 August, 2021.

  He was taken to Alder Hey Children's Hospital in Liverpool where he later died.

  The pair were also charged with assault and neglect.

  Their application for bail was refused by Judge Rhys Rowlands.

  Ethan's mother Shannon Ives, 27 and from Mold, is also charged with causing or allowing him to suffer serious physical harm, as well as causing his assault, ill treatment, neglect and abandonment.

  She is due to appear at the magistrates' court on 4 April.

  All three defendants will appear together at Mold Crown Court on 17 May.
