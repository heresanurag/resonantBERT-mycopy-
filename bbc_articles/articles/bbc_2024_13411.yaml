title: 'Newspaper headlines: Snoozing England fan and debate reaction - BBC News'
date: '2024-06-27'
section: The Papers
url: http://www.bbc.co.uk/news/articles/cn00552gv34o
content: |-
  A number of Thursday's newspapers give verdicts on Rishi Sunak and Sir Keir Starmer clashing on the final debate before voting begins next week.

  How the front pages saw the BBC's election debate

  The Daily Telegraph leads with the BBC's Election debate - the paper says the two main party leaders clashed over immigration, welfare and taxes in the final television debate before the country heads to the polls next month. Sticking with the fiery TV debate from Nottingham, the Daily Mail examines, external Rishi Sunak's attack on Labour's immigration and tax plans. "You're Taking People for Fools" is its headline, quoting Mr Sunak's accusation about the way Sir Keir Starmer would deal with illegal migration. The issue is key for the Daily Express, external too which argues the Labour leader "failed" nine times to say what he would do with migrants arriving on British shores. For the Times, external, Mr Sunak was in "barnstorming mood" as he tried to "ram home" his claim Labour would raise taxes. It says the prime minister and the Labour leader launched "highly negative attacks" on each other in a bad-tempered debate. The Guardian calls, external the debate tetchy, and says the two leaders clashed "bitterly" particularly over their response to the political betting scandal. The paper says the Labour leader launched a "fierce attack" on the culture at the top of Conservative Party and - in Sir Keir's words - its "wrong instinct" to place bets on the future of the country. Away from the debate, the Daily Star interviews, external an England fan who was pictured in Cologne fast asleep while watching the Three Lions being held to a 0-0 draw with Slovenia on Tuesday night. According to the Financial Times, external, Rassemblement National party chief Jordan Bardella has pledged to fight a “cultural battle” against Islamism and secure an EU budget rebate even as he promised “a lot of pragmatism” on the economy if his party wins snap elections. Metro reports, external on runaway aristocrat Constance Marten and her partner Mark Gordon being found guilty of hiding the birth of their newborn daughter who was found dead in a Lidl bag for life last winter. The pair face a retrial on charges the jury could not reach verdicts on. Finally, the i newspaper says, external hackers working under the Kremlin's protection were behind a major cyber attack on the NHS this month.

