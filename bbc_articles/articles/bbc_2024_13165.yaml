title: Moment China's lunar probe lands back on Earth - BBC News
date: '2024-06-25'
section: General
url: http://www.bbc.co.uk/news/videos/cgrr57d7m8jo
content: |-
  The probe returned with the first ever samples from the Moon's unexplored far side.

  Footage released by state-run broadcaster CCTV shows the moment China's lunar probe landed back on Earth, after a nearly two-month long mission.

  The Chang'e-6 landed in the Inner Mongolia desert on Tuesday, carrying the first ever samples from the Moon's unexplored far side.

  China is the only country to have landed on the far side of the Moon, having done so before in 2019.

  Scientists are eagerly awaiting as the samples could answer key questions about how planets are formed.
