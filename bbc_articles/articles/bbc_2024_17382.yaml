content: |-
  If the forecast is accurate, it means Sir Keir Starmer will become prime minister with 410 Labour MPs.

  Labour is set to win a landslide victory in the UK general election, according to an exit poll for the BBC, ITV and Sky.

  The party is expected to win 410 seats, with the Conservatives on 131. If the exit polls are correct, it will mean Sir Keir Starmer will become the new prime minister.

  Voting closed at 22:00 BST, with results from most of the 650 constituencies expected to come through overnight.

