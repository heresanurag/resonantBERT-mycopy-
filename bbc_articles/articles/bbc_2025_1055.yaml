title: 'Albufeira: Put your clothes on or pay a fine, Portuguese resort warns - BBC
  News'
date: '2025-02-15'
section: Europe
url: http://www.bbc.co.uk/news/articles/cn7g3nv34ejo
content: |-
  Wearing bikinis and going shirtless may soon be banned in the city, as it fights against badly behaved tourists.

  The plans mean going shirtless away from the beach could land you in trouble

  Tourists in the popular Portuguese city of Albufeira may soon be banned from wandering its streets in swimwear, or face a hefty fine. The beachside city in the southern Algarve region, a favourite with British holidaymakers, has revised its code of conduct, explicitly prohibiting people from being in a state of partial or complete nudity in public areas. Under the new plans, anyone wearing a bikini or going without a shirt away from the beach could be fined up to €1,500 (£1,250). Albufeira joins a relatively long list of European cities with similar laws, including Barcelona, Dubrovnik and Nice.

  The city boasts beautiful beaches and a vibrant nightlife, but its reputation as a party destination has damaged Albufeira's image. Last year, eight British men were filmed dancing completely naked on a bar in broad daylight on Rua da Oura, Albufeira's main party strip. The videos went viral and Portuguese police were able to identify the tourists. It sparked an emergency meeting with the local council, security forces and businesses, and Mayor José Carlos Rolo promised to crack down on "excessive" tourist behaviour. The proposal document (in Portuguese), external states that the "urgent" change is necessary to "preserve Albufeira as a multicultural, family-friendly and safe destination". It also bans sex acts in public - another local nuisance. The rules extend to terraces that can be seen from public spaces, and business operators found to have allowed bad behaviour could also face substantial fines. The proposal is currently out for public consultation, but could be in place in time for summer.
