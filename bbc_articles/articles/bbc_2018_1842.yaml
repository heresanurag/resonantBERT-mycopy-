id: bbc_2018_1842
title: Theresa May replies to 'extremely regrettable Brexit' remark - BBC News
date: '2018-02-18'
section: General
url: http://www.bbc.co.uk/news/uk-politics-43096455
content: |-
  Prime Minister Theresa May was told "things would be so much easier" if the UK stayed in the EU.

  Munich Security Conference chairman, Wolfgang Ischinger, has told Theresa May "things would be so much easier" if the UK stayed in the EU.

  His remarks were made during a question and answer session after the prime minister called for a security treaty to ensure post-Brexit co-operation.
