title: Irish MP Coppinger highlights consent in parliament - BBC News
date: '2018-11-14'
section: General
url: http://www.bbc.co.uk/news/world-europe-46207308
content: |-
  Irish TD Ruth Coppinger brandished a lacy thong in parliament amid an outcry over a rape trial.

  Ruth Coppinger, a TD (MP) in the Irish parliament, showed a lacy thong amid an outcry over a court case in which a jury was told about an alleged rape victim's underwear.
