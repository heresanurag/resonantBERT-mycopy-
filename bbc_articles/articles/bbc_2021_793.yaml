title: Inside Newcastle's Covid mass vaccination centre - BBC News
date: '2021-01-11'
section: General
url: http://www.bbc.co.uk/news/uk-55624751
content: |-
  Seven mass vaccination centres have opened across England to help deliver the Coronavirus vaccine.

  Seven new mass vaccination centres have opened up across England to help deliver the Coronavirus vaccine, as the Prime Minister says we are facing a "perilous moment" in the fight against the virus.

  The Centre of Life in Newcastle is home to one of them, with others in Bristol, Epsom, London, Manchester, Stevenage and Birmingham.

  Initially they will be used to vaccinate the over 80's, alongside NHS staff and health and social care workers. It's part of a drive that the government hopes will see 15 million people vaccinated against the virus by mid-February.
