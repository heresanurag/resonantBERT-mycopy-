title: Man on scooter stabbed to death in east London - BBC News
date: '2024-08-29'
section: London
url: http://www.bbc.co.uk/news/articles/c9wjxzpj977o
content: |-
  Tributes are paid to Jade Anthony Barnett, 38, as two men are held in custody on suspicion of murder.

  Man on scooter stabbed to death in east London

  The 38-year-old was described as "a ray of sunshine" by one of his neighbours

  Two men have been arrested on suspicion of murder after a man on a mobility scooter was stabbed to death in east London on Wednesday. Jade Anthony Barnett, 38, was found with a stab injury after reports of a fight on Rushmore Road, Clapton, at 15:38 BST. He was treated by paramedics but died at the scene, the Metropolitan Police says. His sister Simone Barnett described him as a "cheerful and caring" man.

  A black and grey mobility scooter was pictured at the crime scene on Wednesday evening

  Ms Barnett, 45, from Hackney, explained that her brother had lived in Clapton with his mother, but his friends said he had moved to the Stratford area. "He comes around here [Clapton] all the time, everyone knew my brother - young, old, mothers, fathers, everybody knew my brother," she said. "Everybody is family, he's just that character." Mr Barnett's friends say he lost his leg in a motorcycle accident in 2007. Local resident Jacqui told BBC London that Mr Barnett was "just a good soul, a ray of sunshine". She said she would greet him by saying: "Hello Mr Sunshine".

  Jade Anthony Barnett's sister said "everyone knew my brother - young, old, mothers, fathers, everybody"

  Describing the 38-year-old as a "comedian", she added: "If someone was low, he'd always make a joke and make you laugh - that's the kind of man he was". Siobhan Burns, another local resident, said she was in shock. “I actually seen him yesterday morning before all this happened and he was just looking so fresh," she said. She said he had seemed "happy" and "just so full of life”.

  The Metropolitan Police has begun a murder investigation following the death of Jade Anthony Barnett who was fatally stabbed in Clapton

  On Wednesday evening, a black and grey mobility scooter could be seen behind the police cordon close to a forensics tent at the scene. The mobility scooter and tent are on Overbury Street, overlooked by a housing estate, with the cordon stretching on to Rushmore Road. Two men, aged 28 and 21, have been arrested and remain in custody at an east London police station, the Met said in a statement. Det Ch Supt James Conway said the investigation was still in the early stages and detectives were working to establish the circumstances. "A number of streets have been cordoned off as our investigation continues at pace and I am grateful for the patience of the local residents of Clapton," he said. "Our thoughts are with the family of the victim at this difficult time. "The public can expect to see continued and significant police activity in the local area as we continue with our rigorous investigation."
