title: 'EFL Cup debutants: Kaden Braithwaite, Toby Collyer, Lucas Bergvall, Kadan
  Young, Nico O''Reilly, Josh Nichols and Jack Porter - BBC Sport'
date: '2024-09-26'
section: EFL Cup
url: http://www.bbc.co.uk/sport/football/articles/cz9p5d2d48yo
content: |-
  The EFL Cup has its critics, but it remains an important competition when it comes to blooding emerging Premier League talent.

  Kadan Young (left), Jack Porter and Kaden Braithwaite all made their full senior debuts in the EFL Cup

  Teenage goalkeeper Jack Porter became the youngest player to start a match for Arsenal when he made his senior debut in the Carabao Cup on Wednesday. At 16 years and 72 days old, Porter replaced Cesc Fabregas - who played in this competition aged 16 years and 177 days in 2003 - as the youngest player to line up for the Gunners when they beat Bolton 5-1 in the third round. Seen by many as an inconvenience in an already congested calendar, the EFL Cup remains essential when it comes to blooding emerging Premier League talent. From future England stars Wayne Rooney, John Terry and David Beckham all making their first-team debuts in the competition, to 'Klopp's Kids' - a group of young Liverpool players who guided the Reds to the 2024 trophy - it has often provided a platform for youngsters to impress. This season, an 18-year-old winger who has been compared to Kylian Mbappe, an exciting Swedish prospect, and a 16-year-old defender are among those to be handed their chance in the EFL Cup. BBC Sport takes a look at the latest crop of young talent to be handed their first-team debuts in the competition.

  Arsenal's teenage goalkeeper Porter was handed a shock start in their EFL Cup tie against Bolton with number one choice David Raya out with a thigh injury, and summer signing Neto cup-tied having already played in the competition for parent club Bournemouth. Porter is highly rated by Arsenal and signed a scholarship with them in the summer, with Gunners boss Mikel Arteta saying the 16-year-old frequently trains with the first team. The England Under-17s player was part of the squad that travelled to Manchester City on Sunday, and featured on the bench for Arsenal’s draw at Atalanta. Porter has made six appearances for the Arsenal Under-18s, conceding 12 goals and keeping one clean sheet. Arsenal boss Mikel Arteta, said: "We told him yesterday and he was over the moon. He spoke straightaway to his family and they were not prepared for that. "It is a big step, a big occasion for them and I think they were nervous about it. But he reacted really well, he was really composed in training and his team-mates helped him, too. What an experience and what a way to break a record."

