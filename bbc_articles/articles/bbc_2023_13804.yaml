title: Sunday with Laura Kuenssberg live updates as justice minister quizzed on Daniel
  Khalife - BBC News
date: '2023-09-10'
section: UK Politics
url: http://www.bbc.co.uk/news/live/uk-politics-66759016
content: |-
  Justice Secretary Alex Chalk says security protocols were in place at Wandsworth prison on day of the escape.

  Guests on the panel at the end of programme had lots to say after seeing a short snippet from Laura Kuenssberg's new documentary State of Chaos, which looks at the period of political turbulence in the UK between 2016 and 2022.

  Stephen Fry said the Labour party was afraid to mention Brexit, adding it was a "catastrophe" and that "everyone knows it".

  "It's funny because it's a clown car crash and you can't help but be amused by it," he says.

  Salma Shah said she would watch the programme and be "slightly triggered by it".

  She says there has been a "fundamental failure" when it comes to the types of people that are being recruited into politics and that there needs to be "a big change in mindset" when it comes to defining what public service really is.

  Charlie Taylor says the churn of justice and prisons ministers is leading to decisions being made which are "not in the interests of the public".
  • You can watch the first part of State of Chaos on BBC Two and BBC iPlayer on Monday 11 September at 21:00
