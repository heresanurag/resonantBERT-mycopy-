  In a statement, his daughter, Mrs Bentley, said it was "horrific" to identify her dad "under such terrible circumstances". "Kimberley Hawkins knew by leaving Dad in that car park, on a freezing cold night, that she was leaving an incredibly vulnerable man who had no way of communicating as he could barely talk," Mrs Bentley said. "He didn't have a phone and he had no way of getting any help. "He must have been terrified realising that he'd been abandoned and not knowing when or if help would arrive." The court heard the pair had gone to the cashpoint after Hawkins provided "sexual services" for Mr Shadwick. Mr Shadwick’s younger sister, who lost both of her brothers within three months, said he "did not deserve to be treated and abandoned in this way". Tania Rickards said her brother had health problems "from a young age", and eventually had to give up his career as a HGV driver in 2003 following a Parkinson's diagnosis in his early 30s.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  Mr Shadwick's brother, Kevin, had been diagnosed with terminal cancer in August 2022, and was given six months to live that November. "After Christmas 2022, we had said that we will get January over and then we would try and get Neil transport to come down and meet up with Kevin, but we never got the chance to do that," Mrs Rickards said. "It would have been the last time we were all together but Kimberley Hawkins robbed us of being able to do that."

  Mary Cowe, prosecuting, told the court Mr Shadwick was “extremely vulnerable” and lived in supported accommodation, relying on carers visiting him four times a day. Describing the incident that led to his death, Miss Cowe said: “It was selfish and spiteful but not premeditated. “She [Hawkins] told a friend she had performed sexual favours for Mr Shadwick and he couldn’t pay.” Hawkins was jailed for six years for the manslaughter of Mr Shadwick. A further six months was added consecutively for related offences of aggravated vehicle taking and assault occasioning actual bodily harm plus other charges of theft, drug possession and breach of previous suspended sentences.

  Det Insp Adam Stacey, who led the investigation, said: “Hawkins’ actions were callous, and they had fatal consequences for a man whom she knew was extremely vulnerable. “The footage from the early hours of that morning is heartbreaking to watch, as Neil Shadwick was abandoned in sub-zero temperatures in the street without his mobility scooter and therefore unable to seek shelter or help. “The family feel robbed that they didn’t get the chance to say goodbye to Neil, as he was cruelly taken away from them.”
