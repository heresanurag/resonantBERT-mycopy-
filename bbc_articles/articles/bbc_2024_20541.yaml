content: |-
  Kimberley Ann Hawkins stole Neil Shadwick's mobility scooter, leaving him to die in the cold.

  Mobility scooter thief who left man to die is jailed

  Kimberley Ann Hawkins stole Neil Shadwick's mobility scooter, dragging him along the ground until he let go

  A woman who stole a disabled man's mobility scooter, dragged him along the ground, and left him for dead has been jailed. Kimberley Ann Hawkins, 41, pleaded guilty to the manslaughter of Neil Shadwick, 63, in Gloucestershire, following the incident in January 2023. Mr Shadwick's eldest daughter, Victoria Bentley, said her "incredibly vulnerable" father must have been "terrified" at being left to die in a supermarket car park in sub-zero temperatures. Hawkins, of no fixed address, was sentenced at Gloucester Crown Court to six and a half years in jail.

  Mr Shadwick was found unresponsive in a Tesco car park on Stratford Road in Stroud on 22 January, when the Met Office had forecast temperatures as low as -6°C overnight. CCTV footage showed Hawkins and Mr Shadwick, who had severe Parkinson’s, arriving at the supermarket at about 02:30 GMT to use the cash machine.

  Neil Shadwick's eldest daughter and sister have fond memories of him from their respective younger years

  When Mr Shadwick appeared unable to withdraw money for Hawkins, she became "frustrated" and took his mobility scooter while he was still partially on it. She dragged him along the road for just under a minute before he eventually let go, then she rode away, leaving him on the ground. He was found by supermarket staff who arrived for work at about 05:45 GMT. Mr Shadwick had severe hypothermia, pneumonia and lung injuries. In the ambulance, all he was able to say was "robbed" and "Kim". He later died in hospital.

