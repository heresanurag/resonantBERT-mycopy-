  An immigrant rights campaigner has five things to say at the LGBTQ Solidarity Rally in New York.

  An immigrant rights campaigner took the podium at the LGBTQ Solidarity Rally in New York on Saturday.

  Thanushka Yakupitiyage from the New York Immigration Coalition spoke at one of a number of worldwide protests over President Trump's agenda.
