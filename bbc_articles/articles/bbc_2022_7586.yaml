title: 'Platinum Jubilee: Trooping the Colour celebrated by jubilee crowds - BBC News'
date: '2022-06-04'
section: General
url: http://www.bbc.co.uk/news/uk-england-london-61677065
content: |-
  Well-wishers have descended on London to watch the ceremony marking the Queen’s official birthday.

  People from all around the world have descended on London to celebrate the Queen’s Platinum Jubilee.

  Many of them came to The Mall and Horse Guards Parade to watch Trooping the Colour, the annual military ceremony commemorating the Queen’s official birthday.

  It’s one of many events taking place across the UK over the four-day bank holiday weekend.
