title: Charli XCX's Brat finally tops chart as James Blunt misses out - BBC News
date: '2024-10-18'
section: Culture
url: http://www.bbc.co.uk/news/articles/cy43xneg5g7o
content: |-
  Charli's remix album goes to number one - so Blunt will not change his name to Blunty McBluntface.

  Charli XCX's Brat album reached the top spot with the help of some famous collaborators

  Charli XCX's album Brat has finally topped the UK charts, after it was re-released as a remix album. Brat And It's Completely Different But Also Still Brat includes new versions of the album's tracks featuring Ariana Grande, The 1975 and Kesha. The original Brat has been in the charts for 19 weeks but peaked at number two. Meanwhile, James Blunt, who promised to legally change his name if a re-release of his 2004 album Back to Bedlam made it to number one, will now not have to be known as Blunty McBluntface.

  Back to Bedlam originally spent 10 weeks at number one and remains one of the UK's best-selling albums of all time. But the album's 20th anniversary edition only made it to number seven in this week's chart. Former The Beautiful South frontman Paul Heaton is at number two, with Sabrina Carpenter, Coldplay and Chappell Roan also in the top five.

  KSI has been appearing as a guest judge on Britain's Got Talent

  In the singles chart, Carpenter made history by becoming the first artist in 71 years to spend 20 weeks at number one in a single year. Her song Taste is number one for the eighth consecutive week and is now 2024's longest-running number one single, overtaking Noah Kahan's Stick Season. Carpenter also spent seven weeks at number one earlier this year with Espresso, and five weeks at number one with Please Please Please. She equals a record set by Frankie Laine in 1953, who spent 20 weeks at the top of the chart with the songs I Believe, Hey Joe and Answer Me. Elsewhere, KSI's much-talked about track Thick Of It has become his ninth top 10 single. The YouTuber, who is currently appearing as a guest judge on Britain's Got Talent, told the Official Charts company: "To all my fans, thank you so much. To all the haters - haha! Stay mad!"
