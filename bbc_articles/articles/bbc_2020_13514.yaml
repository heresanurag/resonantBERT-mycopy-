content: |-
  Home Secretary Priti Patel gives an "unreserved" apology if she upset people after report into her conduct.

  Home Secretary Priti Patel gives an "unreserved" apology if she upset people during her work at the Home Office.

  It follows a report on bullying claims. She says she is working to reform the department.
