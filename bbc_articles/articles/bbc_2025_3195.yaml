title: Bus crash in Bolivia kills at least 37 people - BBC News
date: '2025-03-01'
section: Latin America
url: http://www.bbc.co.uk/news/articles/c4g02qx349do
content: |-
  About 30 people were also injured after two buses collided early on Saturday, police say.

  Bus crash kills at least 37 in Bolivia

  The buses collided not far from the south-western city of Uyuni, police said (file photo of Uyuni)

  At least 37 people have died and 30 left injured after two passenger buses collided in Bolivia, police said. The crash happened early on Saturday about 5km (3 miles) from the south-western city of Uyuni. One of the drivers was receiving intensive care while the other was in a stable condition, police commander Wilson Flores said. Images published in Bolivian media showed a badly damaged coach with its bodywork ripped off and luggage scattered on the roadside.

  The buses collided on the route between Uyuni and Colchani in Bolivia's Potosí department after a "lane invasion", local media reported. One bus was travelling to the western city of Oruro, where Oruro Carnival - one of Latin America's largest festivals - was taking place. The vehicles were recovered by 10:00 local time (14:00 GMT) and those injured were taken to hospitals in both Oruro and Potosí. Those who died have not been identified and the condition of the injured is yet to be determined. According to local media, Cdr Flores said police were awaiting the results of alcohol tests taken by the drivers. Deadly traffic accidents are common in Bolivia. More than 30 people were killed in February when a bus plunged almost 800m (2625 ft) into a ravine between the cities of Potosí and Oruro. In January, 19 people were killed when another bus came off a road in the same region, also near Potosí. An average of 1,400 people die in road accidents every year in the country of about 12 million inhabitants, according to government data.
