title: Man 'checked farm in Holly Willoughby kidnap plan' - BBC News
date: '2024-06-27'
section: Essex
url: http://www.bbc.co.uk/news/articles/cgxxqj30kp0o
content: |-
  The defendant was arrested after revealing his alleged plot to a US undercover police officer online.

  A court has heard how Mr Plumb planned to abduct broadcaster Holly Willoughby from her house

  A security guard checked out an abandoned stud farm to keep Holly Willoughby as part of a plan to kidnap her, a court heard. Gavin Plumb, 37, has denied plotting to kidnap, rape and murder the television celebrity. He allegedly told another man online Ms Willoughby would be put in a van before being taken to her "new home and new way of living". Chelmsford Crown Court also heard Mr Plumb, of Harlow, Essex, discussed booking an ITV studio tour during the presenter's time as a host of This Morning and whether it would involve meeting her.

  A court sketch of Gavin Plumb (right) who allegedly plotted to kidnap and murder Holly Willoughby

  Mr Plumb told another man online, who unbeknown to him was an undercover police officer, he had been planning to kidnap Ms Willoughby for about "two-and-a half years". When asked what they would do when they were done, in a message read out to jurors, he said: "Slit her throat, clean her out and dispose of it." Mr Plumb sent a potential accomplice a video in 2023 of restraint "kit" items laid out on a bed, the court heard. His footage, played to the jury, showed ankle shackles, ball gag, rope, metal cable ties and handcuffs. Online searches were also read out, including "killers from Harlow in Essex", "rape in the United Kingdom" and "violence against women - rape". Alison Morgan KC, prosecuting, read out a WhatsApp exchange where the defendant said: "We've got somewhere in the country to keep her, Ryan [another man he had been speaking with] is interested again by the looks of it." The man he was speaking with, known only as Marc, replied: "Cool where is the location?" Mr Plumb said it was "a stud farm that's abandoned", adding: "It's got cells." He said in a further message: "It could finally be happening." The defendant told Marc he was "looking more towards a home invasion", before he would "get control of her" and "pick up some outfits". He said Ms Willoughby would be taken to a "waiting van" and on to "her new home and her new way of living".

  In a separate message, the defendant posted a photograph of Ms Willoughby and wrote: "She's wearing things like this for a reason which is to tease us guys - she's getting punishment for all the teasing."

  While speaking about booking a tour of the ITV studios, Mr Plumb wrote: "I'm not sure if I'm booking an ITV studio tour or just to the area." Marc replied: "Go to the area and follow her home." The defendant went on: "She will be driving, I will be on foot though." He later added in a message in 2022: "I'm calling the studio tours tomorrow to see if they are still available and if you meet presenters." Mr Plumb has been accused of attempting to live his "ultimate fantasy" and has been described by the prosecution as someone who had an "obsession" with the presenter. He has denied soliciting murder and incitement to rape and incitement to kidnap.
