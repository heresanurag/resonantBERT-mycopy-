title: Jeremy Corbyn reacts to 'terror memorial' claims - BBC News
date: '2018-08-13'
section: General
url: http://www.bbc.co.uk/news/uk-politics-45171633
content: |-
  The Labour leader defends his presence at a wreath-laying ceremony said to have honoured the perpetrators of the Munich Olympics terror attack.

  Jeremy Corbyn has defended his presence at a wreath-laying ceremony said to have honoured the perpetrators of the Munich Olympics terror attack.

  The Labour leader was asked about the event - in Tunis in 2014 - after reports that relatives of victims were angry at his attendance.
