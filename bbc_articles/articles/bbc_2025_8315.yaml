  Cranes have been used to remove the vehicles from the road

  One resident described the scene as "absolute carnage". He said: "You could hear a helicopter through the night, it was very strange, I knew something big had happened as I've been stuck in the traffic." Another resident said she was in "disbelief" at seeing what had happened. "I live round the corner and at 3am all we could hear was helicopters going around," she said. "I came down to see the crash this morning and I'm shock, disbelief, I just hope everyone's OK." At about lunchtime, the damaged vehicles were being lifted on to low loaders and being removed. A police detection dog was also sent into a black BMW which was wedged between the police cars.

  Investigators are working to determine the sequence of events leading up to the crash

  The ambulance service said it had sent five crews, a specialist paramedic, a duty officer and two crews from its Hazardous Area Response Team. Tyne and Wear Fire and Rescue Service said it sent five appliances from across Newcastle and crews left the scene just before 04:00. The Great North Air Ambulance Service was also dispatched. A spokesperson said: "Our team worked alongside the North East Ambulance Service to assess and treat multiple patients."

  The crash hit the morning rush hour, with motorists forced to find alternative routes over the River Tyne. It led to 30 to 40-minute queues over the Redheugh Bridge and about 40-minute delays through the Tyne Tunnel. BBC Radio Newcastle's Andy Watson said traffic had been "snarled up all morning" and the National Highways had told him the site would take some time to clear. Labour's Northumbria Police and Crime Commissioner Susan Dungworth said she was being "regularly updated" by the chief constable. "My thanks go to all the emergency services who attended the scene, and I wish all officers involved a speedy recovery," she said.

