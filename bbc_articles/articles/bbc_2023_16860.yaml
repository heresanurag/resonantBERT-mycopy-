content: |-
  David Cameron has been made foreign secretary as Rishi Sunak reshuffles his cabinet.

  Former Prime Minister David Cameron has been appointed foreign secretary as Rishi Sunak reshuffles his cabinet.

  Mr Cameron replaces James Cleverly, who has in turn been made the new home secretary.

  This reshuffle was triggered by the sacking of Suella Braverman, days after she wrote a controversial article in The Times newspaper, criticising the Met Police.

  Mrs Braverman said serving as home secretary was "the greatest privilege" of her life.

