id: bbc_2020_5095
title: 'Coronavirus: Fears for people with learning disabilities - BBC News'
date: '2020-05-14'
section: General
url: http://www.bbc.co.uk/news/uk-52658968
content: |-
  People are being treated "as disposable bodies", a disabilities campaigner warns, after deaths spiked.

  The Care Quality Commission says there has been 175% more deaths in places that can support people with learning disabilities in England last month, than reported in the same period last year.

  While elderly people are entitled to be tested for Covid-19, people with a learning disability are not.

  BBC Breakfast spoke to disabilities campaigner, Sara Ryan, and Dr Dominic Slowie, former NHS national clinical director for learning disability.
