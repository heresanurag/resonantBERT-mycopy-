  Seven more deaths were confirmed and visitors were urged to stay away from popular places.

  What to do if you go for a walk and it's crowded?

  So what should you do if you go for a walk in a park and it is crowded? Prof Robert Dingwall, a sociologist from Nottingham Trent University who is advising the UK government, said problems occur when people cannot maintain the recommended two metre (6ft) separation. He says: "If that is the case, then it probably is better to go home and pick a quieter time or a quieter location." Dr Robin Thompson, an epidemiologist at Oxford University, added: "The key thing is to exercise while minimising contacts. "There are many walks all across the UK - so, where possible, individuals can research walks without main attractions such as viewpoints or other areas that represent likely gathering points for groups of people." "Local footpaths are likely to be less crowded than walks through major parks. And we can all try and maintain at least two metres distance between ourselves and others while out exercising."
