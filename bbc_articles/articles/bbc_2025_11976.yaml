  Israel's Prime Minister, Benjamin Netanyahu, told Israeli Air Force personnel at Tel Nof airbase that taking control of the skies over Tehran "changes the entire campaign". "We are on the way to achieving our two objectives: eliminating the nuclear threat and eliminating the missile threat," he said. "When we control the skies over Tehran, we strike regime targets, as opposed to the criminal Iranian regime which targets our civilians and comes to kill women and children. We tell the people of Tehran to evacuate - and we act." In a separate interview with ABC News, Netanyahu was asked about reports from US media that President Donald Trump had rejected an Israeli plan to assassinate Iran's Supreme Leader, Ayatollah Ali Khamenei, because it might escalate the conflict. "It's not going to escalate the conflict. It's going to end the conflict," he replied. President Trump blamed Iran for not engaging fully in talks with the US on a new deal that would place strict curbs on its nuclear programme. "Iran is not winning this war, and they should talk... before it's too late," he told reporters at the G7 summit in Canada. Iranian Foreign Minister Abbas Araghchi said Netanyahu had attacked Iran to scuttle a deal between Iran and the US. "If President Trump is genuine about diplomacy and interested in stopping this war, next steps are consequential," he added. "Israel must halt its aggression, and absent a total cessation of military aggression against us, our responses will continue."
