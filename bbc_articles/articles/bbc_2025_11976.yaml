title: Israel bombs Iran state TV during live broadcast - BBC News
date: '2025-06-17'
section: Middle East
url: http://www.bbc.co.uk/news/articles/c3w46pw2xn0o
content: |-
  Israel's military says it struck a "communications centre of the Iranian regime", but Iran calls the attack a "war crime".

  To play this video you need to enable JavaScript in your browser. This video can not be played

  Israeli aircraft have struck the headquarters of Iran's state broadcaster in Tehran, after the Israeli military told residents of the area of the capital where it is located to evacuate. A live broadcast on Islamic Republic of Iran Broadcasting's TV channel was briefly interrupted after blasts were heard and the studio lights went out. Iranian media reported that at least one staff member was killed. The Israeli military said it targeted a "communications centre of the Iranian regime". Iran's foreign ministry said the strike was a "war crime". Residents of Tehran meanwhile appeared to be fleeing in large numbers, with pictures showing traffic jams on one highway heading north.

  Earlier, the Israeli military declared that it had achieved "full air superiority" over the city and had destroyed a third of Iran's missile launchers. It came after Iranian missiles struck four different areas in the northern and central Israel overnight, killing at least eight civilians, according to the military. Iran's health ministry said at least 224 people had been killed and more than 1,200 injured in Israeli air strikes since Friday, when Israel launched a large-scale air campaign targeting Iran's nuclear programme and ballistic missiles. Iranian missile strikes have killed at least 24 people and injured 592 others in Israel over the same period, according to the Israeli prime minister's office.
