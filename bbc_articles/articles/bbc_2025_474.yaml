title: 'Kosovo election: Albin Kurti''s party ahead but short of majority - BBC News'
date: '2025-02-10'
section: Europe
url: http://www.bbc.co.uk/news/articles/c23ny33jlmjo
content: |-
  Albin Kurti's party is on track to come first in Kosovo's general election but may not be able to govern alone.

  Albin Kurti has been in power since 2021

  Kosovo's Prime Minister Albin Kurti has claimed victory for his party in Sunday's parliamentary elections, although partial results suggest he is short of a majority. Kurti's ruling Vetevendosje party has about 41% of the votes with 88% counted. He gained 50% in 2021. He said he was confident he would be able to form a government, adding: "We are the [winners] and this is confirmation of a good, prosperous and democratic government." There was a delay in announcing the official results due to the failure of the Central Election Commission's counting system.

  President Vjosa Osmani has called on the commission to "protect the integrity of the electoral process, ensuring that every vote is counted correctly". The commission blamed the delay on "technical issues", but the editor of the media group Koha said the president should sack the commission's chair. Besnik Krasniqi said the failure of the system for preliminary results was "intolerable".

  The centre-left Vetevendosje party is expected to secure more than 40 seats in the 120-member parliament. The Democratic Party of Kosovo (PDK) is polling 22%, the Democratic League of Kosovo (LDK) is on 18%, and the Alliance for the Future of Kosovo (AAK) has 8%. These are the only parties which passed the 5% threshold to gain seats in parliament. Kurti came to power in 2021 when a coalition run by his party secured a small majority with over 50% of the vote. Before any results were officially declared Kurti said: "Our coalition will form our third government. "It will continue the work. The people won, Vetevendosje won." Kurti's popularity has been boosted by efforts to extend government control over the ethnic-Serb majority north.

  But that has antagonised Kosovo's main backers - the EU and the US. Opposition parties advocate a more conciliatory approach, and have criticised the government's handling of the economy. The centre-right LDK has campaigned on joining Nato, and restoring relations with the US. The PDK, also centre-right, was founded by former guerrilla fighters of the Kosovo Liberation Army. "We are proud of the campaign and the election day. We await the results, but already we have reason to be optimistic," said Vlora Citaku, deputy PDK leader. Meanwhile, AAK leader Ramush Haradinaj, a former prime minister of the country, said he was "looking forward to co-operating on the creation of an opposition government" to prevent Kurti's return to power. Under Kosovo's constitution, 10 MPs must come from the Serb minority, and they will not co-operate with Kurti's party. The remaining 10 seats are reserved for other minority ethnic groups, which have previously worked with Vetevendosje, which translates as "self-determination". Kurti has previously said he would not co-operate with any of the opposition parties. Kosovo unilaterally declared independence from Serbia in February 2008, after years of strained relations between its Serb and mainly ethnic Albanian inhabitants. It has been recognised by the US and most major EU countries, but Serbia, backed by its powerful ally Russia, refuses to do so, as do most ethnic Serbs inside Kosovo.
