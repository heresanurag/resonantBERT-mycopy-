title: 'Watch: Cleaning up Southport’s streets after riot - BBC News'
date: '2024-08-01'
section: General
url: http://www.bbc.co.uk/news/videos/cxx280j8kdzo
content: |-
  The BBC visits the mosque attacked on Tuesday and a nearby memorial site, after three girls were stabbed to death.

  The BBC's Will Vernon visits the mosque attacked on Tuesday night in Southport to see the clean-up efforts.

  Metres away from the stabbing, a riot kicked off after misinformation about the background of the suspect in Monday's stabbings in which three young girls were killed.

  A peaceful vigil happened earlier in the evening for locals to pay their respects.
