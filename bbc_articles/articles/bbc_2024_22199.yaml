title: 'Jay Blades: The Repair Shop host''s driving charge thrown out - BBC News'
date: '2024-09-17'
section: Wolverhampton
url: http://www.bbc.co.uk/news/articles/cj9jn00yd97o
content: |-
  The 54-year-old presenter is told the charge has been dismissed during a short court hearing.

  Jay Blades' case was heard at Cannock Magistrates' Court, sitting in Walsall

  BBC Repair Shop host Jay Blades who had been accused of using his mobile phone while driving, has had the charge thrown out. The 54-year-old appeared for a two-minute hearing at Cannock Magistrates' Court, which was sitting in Walsall. He had previously pleaded not guilty to the offence, which was alleged to have been committed in Wombourne, Staffordshire, on 2 April. At the hearing Mr Blades, from Claverley, Shropshire, said his plea had not changed before prosecutor Zulqarnain Saeed confirmed the Crown Prosecution Service was offering no evidence.

  Mr Saeed said the police officer who was due to give evidence had been "unavailable" and so the case would not proceed. Magistrate Neil Ravenscroft then told Mr Blades the matter was dismissed and said to him that he was free to go.

  Mr Blades was told the driving charge against him had been dismissed

  The presenter is also facing a charge of controlling and coercive behaviour against his estranged wife Lisa Zbozen. The accusation was made after West Mercia Police launched an investigation when officers were contacted on 3 May. Ms Zbozen had posted a message on Instagram the day before, saying the couple's 18-month marriage had ended. In relation to this charge, Mr Blades appeared at Kidderminster Magistrates' Court on Friday. Following the hearing, he was bailed and is due to appear at Worcester Crown Court on 11 October.

  Mr Blades has hosted The Repair Shop since its launch in 2017

  Mr Blades became one of the most recognisable personalities on TV following the launch of The Repair Shop in 2017. The show involves members of the public bringing in treasured possessions to be restored to their former glory. It won a National Television Award in 2023, shortly followed by a Bafta for its royal special, during which the future King Charles took a clock and vase to the workshop. Mr Blades has also hosted Money for Nothing, Jay Blades' Home Fix and Jay and Dom's Home Fix, as well as a 2022 documentary about learning to read at the age of 51. In 2021, he was appointed an MBE for his services to craft.

  Following Mr Blades' court appearance on Friday, the BBC dropped a repeat of an episode of David & Jay’s Touring Toolshed, in which Mr Blades appears with actor David Jason. A BBC spokesperson said at the time: "It would not be appropriate to comment on ongoing legal proceedings." Mr Blades also resigned as chancellor of Buckinghamshire New University with immediate effect, the institution confirmed.

