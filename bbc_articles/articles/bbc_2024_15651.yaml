  • None A source in Ukraine’s military confirmed to the BBC that Ukrainian troops had withdrawn from the village of Krynky - a key foothold on the Russian-occupied eastern bank of the Dnipro river in the southern Kherson region. But the source added that Ukraine's operations in the area continued
  • None Britain's new Prime Minister Sir Keir Starmer will host some 45 European leaders on Thursday at a summit he hopes will begin to reset London's relationship with the continent. The gathering of the European Political Community (EPC) will also give leaders a chance to reaffirm support for Ukraine.
