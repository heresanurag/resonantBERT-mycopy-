title: Germany plans to halve military aid for Ukraine - BBC News
date: '2024-07-18'
section: Europe
url: http://www.bbc.co.uk/news/articles/c0kr91zqp0lo
content: |-
  Berlin says a G7 scheme to raise $50bn from interest on frozen Russian assets will ensure other funding.

  Germany has been providing Ukraine with advanced military weaponry, including Leopard tanks

  Germany is planning to nearly halve military aid for Ukraine next year, from around €8bn (£6.7bn; $8.7bn) to around €4bn, according to a draft budget approved by the government. Finance Minister Christian Lindner said Ukraine's financing was "secure for the foreseeable future" due to a G7 group of rich nations scheme to raise $50bn from interest on frozen Russian assets. Germany is Ukraine's second biggest military donor, after the US. In 2024, Berlin's budget for Kyiv is set at nearly €7.5bn. The planned aid cut comes amid fears in Ukraine and among its European allies that US funds could be slashed or even stopped if Donald Trump wins the presidency in November's election.
  • None What weapons are being supplied to Ukraine?

  The draft budget was approved by the German government on Wednesday. Although military aid to Ukraine is set to be reduced, the defence budget for 2025 will be raised by €1.3bn to €53.25bn. This is still less than the €6bn for which Defence Minister Boris Pistorius had been pushing. Overall, Germany is planning to meet the target of 2% GDP spending on defence as required by the Nato alliance. The defence budget still needs to be approved by lawmakers.
