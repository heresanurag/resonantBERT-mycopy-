title: Mineral Resources' boss opposes staff leaving office for coffee - BBC News
date: '2024-08-29'
section: Business
url: http://www.bbc.co.uk/news/articles/cdey4zzl529o
content: |-
  Managing director of Mineral Resources Chris Ellison wants to "hold staff captive all day long".

  Workers who leave the head office to buy a cup of coffee are costing an Australian mining firm too much money, according to its boss. Managing director of Mineral Resources Chris Ellison said during a financial results presentation on Wednesday he wants to "hold staff captive all day long". "I don't want them leaving the building," he said. The head office in Perth has a restaurant, nine staff psychologists, a gym, and other facilities designed to encourage staff to stay in the office.

  "We have a lot of different benefits that we have brought on," said Mr Ellison, whose company has a strict "no work from home policy". "Why have I done that? Because when I get them first thing in the morning, I want to hold them captive all day long. I don't want them leaving the building. "I don't want them walking down the road for a cup of coffee. We kind of figured out a few years ago how much that costs." He said the rest of the mining industry should "get on board" with his thinking on the benefits of working in the office rather than at home. "The industry cannot afford it. We can't have people working three days a week and picking up five days a week pay - or four days." The company culture at Mining Resources also extends to Mr Ellison's views on parents, with the company building a day-care centre on site big enough for 105 children. "Another reason for them to come in and enjoy work," he said. "Drop their little tykes off next door. We have doctors on board and nurses who are going to feed them, but mum and dad will be working in our office."
  • None UK workers could get right to four-day week

  Mr Ellison is not the only boss to enforce a no work from home policy. Last week, the head of London-based smartphone maker Nothing sent an all-staff email to announce the end of hybrid working and a move to fully office-based work. "I know this is a controversial decision that may not be a fit for everyone, and there are definitely companies out there that thrive in remote or hybrid setups," he wrote in the email. "But that’s not right for our type of business, and won’t help us fully realize our potential as a company."
