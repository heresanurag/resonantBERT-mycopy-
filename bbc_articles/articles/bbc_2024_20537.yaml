  More than 80 people were evacuated from the Spectrum Building in Dagenham after a fire on 26 August.

  Flat fire residents fear nowhere to go come Monday

  More than 80 people were evacuated from the Spectrum Building on Freshwater Road

  Residents of a tower block in east London where a fire took hold earlier this week say they have nowhere to go beyond Monday. More than 80 people were evacuated from the Spectrum Building on Freshwater Road, Dagenham, in the early hours of Monday, although there were no casualties. Resident Nitya Sravya Jogi told BBC London the company that manages the building, Block Management UK (BMUK), had been "careless" and had still failed to engage with those affected. A spokesperson for BMUK said it was working with authorities to investigate the fire and "ensure the safety and well-being of residents".

  The displaced residents who have not been staying with friends or family have been provided accommodation in hotels paid for by Barking and Dagenham Council. Ms Sravya Jogi, who is eight weeks pregnant and lived on the fifth floor of the building with her husband, said when she saw the fire "the feeling sank in we were going to die".

  Nitya Sravya Jogi said she and her husband thought they were going to die

  She said the experience had "traumatised" her family. "Grief comes in different times," she added. "It's been very tough mentally and psychologically. "Physically they [the council] have accommodated us in this Travelodge since 28 August, we are here until Monday. "We are not sure if they will accommodate us beyond Monday." Ms Sravya Jogi added: "[BMUK] has not taken any liability for the lives that would have been lost in case we did not manage to escape. "They don't have the moral standards to at least apologise."

  The fire broke out in the early hours on 26 August

  Darren Rodwell, leader of Barking and Dagenham Council, said: “I think they [BMUK] have a moral duty if not a legal duty, to support these residents. “The local authority has stepped up and actually gone beyond the powers that we have. “Our community has stepped up and supported these residents. “The people making the profit out of these types of blocks should be stepping up. “And if they’re not going to step up, we should make them accountable.” BMUK made its first public comment on Friday, five days after the fire.

  Darren Rodwell, leader of Barking and Dagenham Council, said the management company had a "moral duty" to support residents

  A BMUK spokesperson said: "We are both shocked and saddened by the fire on Freshwater Road in Dagenham. "We are working alongside the London Fire Brigade, the Ministry of Housing, Communities and Local Government, Barking and Dagenham Council and the building owner along with all other relevant authorities to ensure the safety and well-being of residents. "Together we will assist the emergency services with their inquiries and investigation.”

  Margaret Mullane, Labour MP for Dagenham and Rainham, said her office had being operating an open surgery for residents' "individual issues". She added that homelessness legislation should provide for residents without somewhere to stay, and she was aware that some residents were being taken to local authority flats. The investigation into the cause of the fire continues. London Fire Brigade's commissioner said it would be "protracted and complex".
