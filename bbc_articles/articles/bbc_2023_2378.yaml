title: 'Israel protests: Tens of thousands in anti-government rally - BBC News'
date: '2023-02-05'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-64527567
content: |-
  It's the fifth week of mass protests across Israel over government plans to curb the judiciary's powers.

  Protesters say the plans could jeopardise Israel's democratic values.

  Prime Minister Benjamin Netanyahu, leading a hard-right government, has dismissed the protests as a refusal to accept the last election results.
