  Cowboy boots, dresses, music awards and storyboards will be included in the collection.

  Taylor Swift personal items to be displayed at V&A

  Some of Taylor Swift's personal items are to go on display at London's Victoria and Albert Museum this month. Cowboy boots, dresses, music awards and storyboards will be included in the free exhibit, featuring as part of a temporary collection. Taylor Swift: Songbook Trail will offer visitors a chance to see costumes and archival material up close, with many items on display for the first time, the V&A said. The Grammy-winning singer is currently on her blockbuster Eras Tour, with recent performances in Edinburgh, Liverpool, Cardiff, London and Dublin. The collection, which opens on 27 July and closes on 8 September, includes items loaned from Swift's archive which explore her childhood and recording legacy, the V&A said.

  Swift's black ruffled dress, as seen in the music video Fortnight, is one of a number of objects on loan from Swift's personal archive

  Among the items will be customised cowboy boots worn by Swift during 2007's Soul2Soul II Tour, where she opened for Tim McGraw and Faith Hill, as well as the black ruffled dress worn in her recent music video for Fortnight, the first single from latest album The Tortured Poets Department. The installations have been designed by Tom Piper, whose other projects include the V&A's 2021 exhibition Alice: Curiouser And Curiouser. Kate Bailey, the museum's senior curator in its theatre and performance department, said: "We are delighted to be able to display a range of iconic looks worn by Taylor Swift at the V&A this summer - each celebrating a chapter in the artist's musical journey. "Taylor Swift's songs - like objects - tell stories, often drawing from art, history and literature."
