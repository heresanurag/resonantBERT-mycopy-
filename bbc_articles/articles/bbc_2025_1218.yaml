content: |-
  New Zealand batter Kane Williamson joins Middlesex for part of the 2025 County Championship and Vitality Blast.

  New Zealand batter Kane Williamson has joined Middlesex for the 2025 season and will be available to play in the County Championship and Vitality Blast. The 34-year-old is the Black Caps' all-time leading Test run-scorer and stepped down as their white-ball captain last season in order to pursue opportunities overseas during the home summer. Williamson will be able to play at least 10 of Middlesex's 14 T20 Blast group fixtures and at least five County Championship matches during the second half of the campaign. "To have secured one of the most talented players in the world game is a real coup," said Middlesex director of cricket Alan Coleman. Williamson has scored more than 18,000 runs, including 47 centuries, in 366 appearances for his country. His 9,276 runs in 105 Test matches - an average of 54.88 - is the most of any player in the country's history. He was named player of the tournament at the 2019 World Cup and has featured in seven of the past 10 annual International Cricket Council men's Test Team of the Year awards.

  Williamson has had two spells in England previously, having played for Gloucestershire in 2011 and 2012 and Yorkshire between 2013 and 2018. He is due to join Karachi Kings in the Pakistan Super League in mid-April before moving to Lord's in May. "I've played a bit of county cricket in the past, but not for a number of years now, so when this opportunity arose with Middlesex it was a really exciting prospect," Williamson said. Williamson will also play for and captain Lord's-based Hundred side London Spirit.
