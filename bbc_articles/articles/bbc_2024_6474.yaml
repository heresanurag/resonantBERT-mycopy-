title: 'Budget: Cardiff boy, 17, starts affordable pizza business - BBC News'
date: '2024-03-05'
section: General
url: http://www.bbc.co.uk/news/uk-wales-68473007
content: |-
  Joshua Steer makes affordable pizzas for students in Cardiff.

  Expensive pizza restaurants were the spark for Joshua Steer to start his own business making affordable pizzas for students "who don't have a lot of money" in Cardiff.

  He was speaking to the BBC about the Budget on Wednesday, and how he hopes support for businesses can be more accessible.

  "My biggest problem with pizza, it's so overpriced," he said.
