  Scarlets centre Joe Roberts replaces George North to make his Six Nations debut alongside Owen Watkin on Sunday.

  Six Nations 2024: Wales make five changes to team to face France Last updated on .From the section Welsh Rugby

  Joe Roberts will make his Six Nations debut against France Coverage: Watch live on BBC One, BBC iPlayer and online from 14:20 GMT; listen on BBC Radio 5 Sports Extra, BBC Radio Wales & Radio Cymru; text commentary and highlights on BBC Sport website and app. Wales have changed their centre partnership to face France in the Six Nations on Sunday in Cardiff. Joe Roberts and Owen Watkin replace World Cup pairing George North and Nick Tompkins, who have been dropped. They are among five changes to the side beaten by Ireland, including a positional switch that sees captain Dafydd Jenkins start at blind-side flanker for the first time. Lock Will Rowlands and hooker Ryan Elias are also promoted to start. Rowlands, who plays his club rugby in France with Racing 92, starts for the first time since the World Cup alongside Adam Beard in the second row. Scarlets hooker Elias replaces Dee, who is now set to win his 50th Wales cap from the replacements bench where is joined by recalled Gareth Davies. Tompkins and North have been Wales' established midfield partnership in the past year but have been left out of the matchday squad completely in a surprise move by Warren Gatland. Scarlets centre Roberts, 23, will make his Six Nations debut in only his second Test appearance, after wining his first Wales cap against England in their World Cup warm-up defeat at Twickenham last summer. Both of the new centres missed out on World Cup selection, but Roberts offers a left-foot kicking option in midfield while Watkin returned to start the Six Nations opener against Scotland.
