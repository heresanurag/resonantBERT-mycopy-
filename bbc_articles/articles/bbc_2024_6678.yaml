  • None What we have learned about Wales in the Six Nations North, who missed that opening game through injury, has been one of Gatland's more impressive performers during the Six Nations. The Ospreys centre, the third most capped player in Welsh rugby history, has a combined 155 caps with Tompkins, compared to 38 between Watkin and Roberts. "Nick and George have been spoken to. They were disappointed, which I get, [but] they firmly believe in what we are doing," said assistant coach Mike Forshaw. "There is always a risk in every selection [but] we need to look at Joe. He's a really promising young 13 and was unlucky not to go to the World Cup [and] Owen Watkin has a lot of experience. "We just felt if we were going to have a look, this was the game to do it." Jenkins has never started a professional game at six for either Exeter Chiefs or Wales, but Gatland will be looking for a more physical presence in the back row. James Botham began the tournament in the number six jersey but suffered a knee injury against Scotland and was replaced by Cardiff team-mate Mann for the next two matches, scoring in both. The 22-year-old has emerged as a rising star for Wales but has been unable to take part in training over the past two weeks due to several minor injuries. "I don't think it's a risk with Daf at six," said Forshaw. "He's around two very smart back-rowers and Will Rowlands played 70 minutes on the weekend in Paris. I saw glimpses of him getting back to his best. I think it's a good fit for us this week." Christ Tshiunza has been missing for the last four months with a broken foot but makes his return this (Wednesday) evening in a friendly for Exeter. North and Tompkins 'disappointed' at omission, says assistant coach Mike Forshaw Wales have lost 10 out of their last 11 Six Nations games including three in this year's tournament. They are battling to avoid their first Six Nations wooden spoon in 21 years with a home match to finish the tournament against Italy on Saturday, 16 March. "There are a few changes to the team this week as there are some players that deserve an opportunity," said Gatland. "It'll be a tough, physical challenge from France on Sunday particularly up front. "We know they will start hard and it's about us staying in the fight, having good line speed defensively and keeping our discipline. We're looking for an 80 minute performance. "We're excited to be back at home for our last two matches in front of a passionate Welsh crowd."
