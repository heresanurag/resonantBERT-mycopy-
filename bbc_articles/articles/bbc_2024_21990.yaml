title: 'Nottingham: Fundraiser marks 10th anniversary of cyclist''s death - BBC News'
date: '2024-09-15'
section: Nottingham
url: http://www.bbc.co.uk/news/articles/c0kjjjj3yyvo
content: |-
  Louise Wright was 29 when she was hit by a lorry in 2014 in Nottingham as she cycled to work.

  Louise Wright was "beautiful inside and out", her mum said a decade on after her death

  A woman is bracing for the "toughest" challenge in memory of her friend who was killed while riding her bike. Louise Wright was 29 when she was hit by a lorry in 2014 in Nottingham as she cycled to work, with the driver given a suspended sentence. A fundraiser in her name, which marks 10 years since her death, had so far raised almost £2,500. Coleen Coxon, Ms Wright's friend, says she is due to complete two marathons in two days in the Sahara desert next month.

  Ms Wright (right) has been described as "beautiful, kind and thoughtful" by her friend

  Ms Wright was crossing the junction of Lower Parliament Street and Pennyfoot Street on her bike when a lorry driver turned left without indicating, dragging her under the wheels. A decade on, Ms Coxon said she wanted to pay tribute to her friend by fundraising for the charity Brake. "I think it's important to raise awareness of what happened to Louise because it was one careless accident which could have been avoided and I want other people not to have to suffer in the same way," she said.

  Ms Wright's mum, Sharon Brown (left), has described Ms Coxon's efforts as "amazing"

  So far, Ms Coxon has Nordic-walked a marathon, completed four ultra challenges and aims to complete a total of 242 miles (390km) by the end of the year. Her final challenge is to walk 57 miles (92km) over two days in the Sahara desert next month which she says will be "the toughest yet". She added: "I know I can do the distance, so it's just getting used to the heat. It's going to be very challenging."

  Ms Brown said fundraising in her daughter's memory "keeps me going"

  Ms Wright's mum, Sharon Brown, says the fundraising helps to keep her daughter's memory alive. Ms Brown, from Loscoe in Derbyshire, said: "Louise was a lovely daughter, she was beautiful inside and out. I think about her all the time. "I think about the good memories and that's what keeps me going." She described Ms Coxon's fundraising efforts as "amazing", and added: "I'm very proud of her for what she's doing and for such a good cause as well. "Brake is a really good charity raising awareness of road safety."

