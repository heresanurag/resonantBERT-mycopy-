title: People left dangling upside down on amusement park ride - BBC News
date: '2024-06-16'
section: General
url: http://www.bbc.co.uk/news/videos/c100281gjyjo
content: |-
  Footage recorded by an eyewitness shows the moment people got stuck on a ride in Portland, Oregon.

  About 30 people were rescued from an amusement park in Oregon, according to Portland Fire and Rescue, after one of the rides got stuck and left them dangling upside down.

  "I feel bad for them... It's so scary," said an eyewitness, who filmed and narrated the moment the riders were left hanging upside down at Oaks Park.

  The emergency services have said all riders were rescued and no injuries were registered.
