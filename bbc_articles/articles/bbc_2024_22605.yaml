title: Kylie Minogue announces new album and biggest tour in a decade - BBC News
date: '2024-09-20'
section: Culture
url: http://www.bbc.co.uk/news/articles/c4g9xlkvy24o
content: |-
  The tour will kick off in her home country Australia in February, before swinging through Asia and the UK.

  Popstar Kylie Minogue has announced her biggest world tour in more than a decade, and a sequel to her comeback album Tension. The 13 tracks on Tension II will be released on 18 October, with the global tour kicking off in her home country Australia in February, before swinging through Asia and the UK. In a statement, the pop icon said she is "beyond excited" to be "celebrating the Tension era and more" with fans. "There will be a whole lot of Padaming," she said, a reference to her viral, Grammy-winning 2023 single Padam Padam.

  Twenty dates have been announced so far, but Minogue said more are coming. The 56-year-old is in the middle of a career renaissance, off the back of Tension and Padam Padam. In February she picked up her second Grammy - 20 years after her first - and the following month received the Brits' Global Icon Award. Since popping up as plucky car mechanic Charlene on soap opera Neighbours in 1986, she's racked up dozens of hit singles and a trophy cabinet full of awards. She's also performed at the Sydney Olympics, been made an OBE, and starred in several films. The tour and album has been met with excitement - and some stress. The concert dates in Newcastle clash with Eurovision which is being held in Switzerland in May. Meanwhile, her shows in Sydney are happening at the same time as the annual Gay and Lesbian Mardi Gras parade - prompting many of her Australian fans to weigh up a difficult dilemma. Minogue has a large following in the LGBT community. "What should we do... On a Night Like This?!" one online commenter said.
