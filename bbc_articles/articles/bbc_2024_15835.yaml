content: |-
  British number one Katie Boulter battles past Tatjana Maria to set up a second-round meeting with compatriot Harriet Dart.

  This video can not be played To play this video you need to enable JavaScript in your browser.

  British number one Katie Boulter battled her way into the Wimbledon second round to set up a meeting with compatriot Harriet Dart. The 27-year-old defeated 2022 semi-finalist Tatjana Maria 7-6 (8-6) 7-5 in front of a packed court three. Boulter was handed a tricky draw against the 36-year-old German, but she overcame a nervy start to win in just over two hours. She is seeded at SW19 for the first time after a positive season produced titles in San Diego and Nottingham. "I know she made [the] semi-finals here a couple of years ago and I can completely see why," said Boulter. "A great competition, she made me work for absolutely everything. I'm looking forward to the ice bath - I'm not sure I've said that before." With Emma Raducanu, Lily Miyazaki and Sonay Kartal all winning on Monday, it is the first time since 1987 that there have been five British women in the second round at Wimbledon.

  This video can not be played To play this video you need to enable JavaScript in your browser. 'That is how you do it' - Dart's best shots from victory over Zhuoxuan

  Boulter said she is is expecting "an absolute battle" against her Billie Jean Cup team-mate Dart. "Playing a Brit in the UK, on the grass, is never an easy draw," added Boulter. The pair faced each other at the Nottingham Open last month, with Boulter winning the first-round tie in three sets. Speaking before Boulter's victory over Maria, Dart said: "We're team-mates, we played big tournaments, we've grown up together, we've been close. "It's always going to be tricky, whoever I play, especially when you play a fellow Brit. But it's great to see that all of us are doing well and putting us in positions where we do get to play each other, hopefully more so in the latter rounds." World number 94 Dart did not lose serve against Bai, breaking the 21-year-old in the 10th game to take the first set, and only a rain interruption delayed her progress. "The last few weeks I've had some really good matches, some that have gone my way, some that haven't," added Dart. "For me it's just being able to build on it, try and play some good tennis. Today I showed that. I was really clinical out there - I was pretty proud of that." Dart and Boulter were among 11 Britons in action on Tuesday after Andy Murray announced he would not play singles following his back operation.

  Katie Boulter has reached the third round in her past two appearances at Wimbledon
