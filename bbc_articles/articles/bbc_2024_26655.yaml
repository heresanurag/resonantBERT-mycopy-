title: Murder trial told boy's injuries consistent with abuse - BBC News
date: '2024-10-04'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/cgmgny20mxpo
content: |-
  Craig Rowland denies murdering his son Lewis as he stands trial in Belfast.

  Craig Rowland is accused of murdering his son Lewis

  A jury at the trial of a man accused of murdering his infant son has heard evidence that serious injuries to the child when he was 13 weeks old were “consistent with physical abuse". Craig Rowland, of Millington Park in Portadown, denies murdering his son, Lewis Rowland, and further denies his manslaughter. The 29-year-old and the child’s mother, 31-year-old Laura Graham, previously pleaded guilty to a charge of wilfully neglecting their son. On Friday, Belfast Crown Court heard evidence from consultant paediatrician Dr David Graham, who was on duty at when the infant was first admitted to hospital.

  He said the child - who had been brought to Craigavon Area Hospital on 20 November 2015 by his parents - was “extremely unwell and needed urgent resuscitation to save his life”. Dr Graham said a CT scan conducted a short time after Lewis was admitted was “abnormal” and showed “evidence of extensive brain injury". He said when he told the child’s parents about the scan, the baby’s mother appeared upset but he “didn’t see any evidence of a reaction” from Mr Rowland.

  The doctor told the jury the infant’s parents told him about an incident which they said occurred a month earlier where he had taken a seizure. He said his parents also told him their child had been unwell the night before he was brought to hospital and had been displaying abnormal movements including shaking and stiffening of his limbs. They told him that after 30 minutes he seemed to settle but had further abnormal movements the next morning. During his evidence, Dr Graham referred to a report he was asked to prepare for the police. He said the 13-week-old had suffered multiple serious injuries including abusive head trauma, retinal haemorrhage, extensive face and neck bruising and a fracture of the tibia. The doctor concluded that all of the injuries were “consistent with physical abuse".

  The court also heard evidence that Lewis had sustained a spinal injury and a fractured rib. The 13-week-old was said to have been left “permanently and severely disabled” as a result of the head injury. Dr Graham noted an “inconsistency” in the history provided by the child’s parents about how and where the bruising appeared. He also said the delay in seeking medical help for the infant was an “excessive length of time.” Lewis was transferred to the Royal Belfast Hospital for Sick Children later on 20 November 2015 for emergency surgery, with medical staff concerned he might not survive.

  A nurse who was on duty in the intensive care unit told the jury she was “shocked” when his parents declined the offer of a bedroom. Kelly-Ann Fitzpatrick said parents would normally stay in hospital in a situation where a child was critically ill. She later confirmed to a defence lawyer that after leaving the hospital at about 21:30, both parents returned at 23:00 to say their lift had not arrived. The nurse agreed with the lawyer that both parents then asked to see their child and had interacted with him in a warm way. Lewis died in hospital almost three years later on 20 October 2018 as a result of complications from surgery.
