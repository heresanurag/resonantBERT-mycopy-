  Trump's border tsar, Tom Homan, told reporters at the White House on Monday that Trump did "exactly the right thing". "The plane was already over international waters with a plane full of terrorists and significant public safety threats," he said. "We removed terrorists. That should be celebrated in this country." El Salvador's President Nayib Bukele confirmed the arrival of deportees. "Oopsie... Too late," he said of the judge's order, writing on social media. His team also published footage of some of the men inside one of its mega-jails. According to the White House, El Salvador's government received $6m (£4.62m) to take the detainees, which Leavitt said "is pennies on the dollar" compared to the cost of confining them in US prisons. Rights groups accused Trump of using a 227-year-old law to circumvent due process. The American Civil Liberties Union (ACLU) questioned Trump's use of a sweeping wartime authority which allows fast-track deportations. "I think we're in very dangerous territory here in the United States with the invocation of this law," said Lee Gelernt from the organisation. The Alien Enemies Act only allowed deportations when the US was in a declared war with that foreign government, or was being invaded, Mr Gelernt said. "A gang is not invading," he told BBC News. The act was last used during World War Two to intern Japanese-American civilians. Making matters worse was the fact "the administration is saying nobody can review what they're doing", Mr Gelernt added. Meanwhile, Amnesty International USA said the deportations were "yet another example of the Trump administration's racist targeting" of Venezuelans "based on sweeping claims of gang affiliation". Venezuela itself criticised Trump, saying he "unjustly criminalises Venezuelan migration". The latest deportations under Trump's second term are part of the president's long-running campaign against illegal immigration. The US president has also moved to strengthen ties with El Salvador. The two gangs targeted with the weekend deportations were declared "foreign terrorist organisations" by Trump after returning to the White House in January.
