content: |-
  About 1500 workers in Tamil Nadu state have been striking work for the past 11 days.

  Why hundreds of Samsung workers are protesting in India

  More than a thousand workers are participating in the strike

  For the past 11 days, about 1,500 workers of South Korean technology giant Samsung Electronics have been striking work in the southern Indian state of Tamil Nadu, leading to major disruptions in production. The plant in Chennai city, one of Samsung's two factories in India, employs nearly 2,000 workers and produces home appliances, contributing about a third to the company's annual $12bn (£9bn) revenue in India. The striking workers gather at a plot of land near the 17-year-old factory daily, demanding that Samsung recognise their newly-formed labour union - the Samsung India Labour Welfare Union (SILWU). They say that only a union can help them negotiate better wages and working hours with the management. The protest, one of the largest Samsung has seen in recent years, comes even as Prime Minister Narendra Modi has been courting foreign investment by positioning India as a viable alternative to China for manufacturing activities. Samsung India has released a statement saying that the welfare of its workers was its top priority. "We have initiated discussions with our workers at the Chennai plant to resolve all issues at the earliest,” it said. Hours earlier, the police had detained around 104 workers for undertaking a protest march without permission. The protesters were released in the evening. "The workers have decided to strike work indefinitely till their demands are met,” said A Soundararajan, member of Centre of Indian Trade Unions (Citu), backed by the Communist Party of India (Marxist). Citu has backed the new union in the factory. The workers have three key demands: Samsung must recognise the new union, allow collective bargaining, and reject competing unions as about 90% of the workforce belongs to SILWU, said Mr Soundararajan.

  The Chennai plant contributes about $4bn to Samsung's annual $12bn India revenue

  Workers, earning an average of 25,000 rupees ($298; £226) a month, are demanding staggered raises totalling a 50% increase over the next three years, according to Citu. Citu also alleged that workers at the plant were being "pressurised to finish each product - like a refrigerator, washing machine, or TV - within 10-15 seconds", work non-stop for four to five hours at a stretch, and do their jobs in unsafe conditions. “We categorically deny that workers are made to work for four hours at a stretch. All workers get suitable breaks in between," Samsung India said in an official statement. "Also, employees work on their given task of the manufacturing process as products are passed through the conveyor line. They are not required to 'finish' a product in such a time frame, which is not realistic. We reiterate that we are in compliance with all laws and regulations," the statement added. Mr Soundararajan also alleged that workers were pressurised by the management to leave the new union and that their families were threatened as well. Samsung India said the firm "categorically denies all the allegations and that it maintains absolute compliance with all the existing labour laws". Meanwhile, Tamil Nadu's Labour Welfare Minister CV Ganesan said he had assured union officials that talks were under way to resolve their issues. "We will fulfil the demands of the workers," he said. Sijo*, a protester, said that he arrives at the protest site daily at 08:00 IST (02:30 GMT) and stays until 17:00, joining hundreds of workers in their blue Samsung India uniforms. The union arranges for lunch and water for the protesters, while a makeshift cloth tent protects them from the elements. There are no washroom facilities, so the workers use the outdoors. "Since the factory was set up, employees have been working without complaints or a union. But things have been getting bad over the past couple of years, and now, we need the support of a union," Sijo said. He added that his pay doesn't keep pace with the cost of living and that this has put a strain of his family's finances. Up until 2020, the Samsung Group was known for not allowing unions to represent its workers. But things changed after the company came under intense public scrutiny after its chairman was prosecuted for market manipulation and bribery.

  In July, Samsung workers in South Korea went on strike to demand more leaves and better pay

  Millions of Indian workers join trade unions - often backed by leftist parties - who use their political clout to enforce labour laws and negotiate better conditions. "Foreign companies set up in India but resist following local laws on workers' rights to association and collective bargaining," alleged Mr Soundararajan. Many prominent multinational companies, including Apple and Amazon, have set up factories in India. But labour rights activists allege that many of them underpay and overwork their Indian employees and collude with state governments to clamp down on workers' rights. Shyam Sundar, a labour economist, said multinational corporations use various "human resource strategies" to prevent workers from forming unions in developing countries like India. For one, they fiercely oppose workers joining external, politically-backed unions and encourage them to form "worker-led" internal ones. "This ensures that the management has some control over the union's activities," Mr Sundar said. Mr Soundararajan alleged that management at the Chennai plant had also approached workers with this solution, which they refused. A source in Samsung India told the BBC that the organisation "fully supports unions but not ones backed by a third-party". Later the company said in an official statement that it "is ready to communicate with the work council comprised of a majority of employees on matters including wages, benefits and working conditions". Mr Sundar said firms also hire young, unskilled workers, especially from rural areas, by attracting them with a good starting salary. "These 'trainees' are promised to be made permanent employees after a couple of months, but this doesn't happen. The salaries too stay stagnant or have very low increments." The rapid growth of "flexible workers" - employees hired on contract - has become a key strategy of multinational corporations to stop unionising by ensuring a pliant workforce, he added. According to the latest government statistics, every two in five workers employed in factories, external in India in 2022 were contractual labourers, making up about 40% of the workforce in industrial establishments. "Companies use the threat of re-location or non-expansion to discourage state governments from enforcing labour laws," Mr Sundar said. "But workers can leverage global labour unions to pressure companies to abide by international labour laws," he added. *Name changed to protect the worker's identity This story has been updated with official statements from Samsung India With inputs from Vijayanand Arumugam from BBC Tamil and Nikhil Inamdar from BBC News
