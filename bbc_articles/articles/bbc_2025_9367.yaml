title: 'Emilia-Romagna Grand Prix result: Max Verstappen wins from Lando Norris in
  Imola - BBC Sport'
date: '2025-05-18'
section: Formula 1
url: http://www.bbc.co.uk/sport/formula1/articles/cjrn7djgev5o
content: |-
  Red Bull's Max Verstappen takes victory in the Emilia-Romagna Grand Prix, ahead of Lando Norris and Oscar Piastri.

  Max Verstappen has won four of the five races since Imola returned to the Formula 1 calendar in 2020

  Red Bull's Max Verstappen took a dominant victory in the Emilia-Romagna Grand Prix founded on an audacious overtaking move on the first lap. The four-time champion passed pole-sitter Oscar Piastri's McLaren around the outside of the first chicane after the start and controlled the race from there. A late safety car closed the field up and put the McLarens of Piastri and Lando Norris on Verstappen's tail. But a consummate restart from Verstappen allowed him to break free while Norris, on much fresher tyres than Piastri, fought for three laps before finally passing the Australian to take second. The result, Verstappen's second win of the season, reduces Piastri's championship lead over Norris to 13 points from 16, and puts the Dutchman nine behind the Briton. Lewis Hamilton benefited from an offset strategy, starting on the hard tyre, and the two safety cars to fight up from 12th on the grid to finish fourth for Ferrari, passing his team-mate Charles Leclerc in the hectic closing laps thanks to much fresher tyres.

  For McLaren, there will be questions about strategy, after they pitted Piastri early in the race when he was second behind Verstappen, albeit beginning to lose time. Piastri acknowledged that they had made some "wrong calls" and also that he had "braked too early" on the first lap when challenged by Verstappen. That decision to stop early put Verstappen in a comfortable 10-second lead over Norris, who was unable to do anything about the Red Bull's advantage, and forced Piastri to have to fight back through the midfield cars to reclaim his position. A virtual safety car mid-race made Verstappen's life even easier for a while, and wrecked Piastri's hopes of second place, but the Red Bull had long ago taken control of the race.

  Verstappen moves alongside Piastri as he passes him at the start

  It was a fitting drive to mark Red Bull's 400th grand prix. The two caution periods led to a see-sawing battle between the McLaren drivers for second place. Piastri had been on target to pass Norris when the Briton made his only pit stop and looked set to lead to a fight with Norris coming back at Piastri on fresher tyres. Shortly after Norris' stop, Esteban Ocon's Haas stopped on the hill between the Tosa and Piratella corners, leading to a virtual safety car (VSC) period. Norris was ahead after the VSC because Piastri stopped for fresh tyres to avoid being vulnerable to cars behind. Then, officials decided to deploy a full safety car when Kimi Antonelli's Mercedes stopped in exactly the same place as Ocon had. This time, Verstappen and Norris stopped for fresh tyres and Piastri did not - because he had no appropriate ones still available - and that put Norris back behind Piastri, but on 16-lap fresher tyres. Behind the safety car, Norris suggested that Piastri's tyres "looked pretty dead" and they should not fight if they wanted to challenge Verstappen for the win. But McLaren chose not to apply team orders and the two battled for three laps before Norris finally swept by into the first chicane with five laps to go, by which time Verstappen was out of reach. The closing laps were compelling viewing, with the field alternating position between drivers on old tyres and those on fresh. This allowed Hamilton to move up. He had started on hard tyres and ran long, which allowed him to make his first stop under the VSC, and again for fresh tyres under the safety car. He passed Albon's Williams and Leclerc and was just 1.4 seconds behind Piastri at the flag. Leclerc, struggling on old tyres in the final laps after an early pit stop left him with no fresh ones to fit at the safety car, fought hard to hold back Albon. But the Monegasque was investigated by stewards into whether he had forced the Williams off track when they were side by side through Tamburello, and Ferrari ordered him to hand the position over, giving Albon fifth place. George Russell took seventh after a difficult race with Mercedes, falling back from third on the grid. Albon's team-mate Carlos Sainz finished eighth, ahead of the Racing Bull of Isack Hadjar and Red Bull's Yuki Tsunoda, who scored the final point after his heavy crash in qualifying. And the timing of the two safety cars also wrecked the hopes of Aston Martin and Fernando Alonso, after his excellent fifth place on the grid. After a strong run in the early laps keeping pace with Russell and Norris, an early pit stop and a limited tyre allocation boxed Aston and Alonso in, and he bemoaned on the radio that he was "the unluckiest driver ever" as he slumped to an 11th-place finish.

  Lewis Hamilton's fourth place in Imola is the first time he has finished ahead of Ferrari team-mate Charles Leclerc in a full grand prix this season

  It's the glamour of Monaco next weekend, with all drivers forced to make at least two pit stops in an attempt to make the racing less predictable around the iconic but tight street circuit.
