title: Blue-green algae back at 2023 levels - BBC News
date: '2024-08-02'
section: Northern Ireland
url: http://www.bbc.co.uk/news/articles/c3g0e58gq40o
content: |-
  Scientists say there is "a strong likelihood" it will travel down the Bann river to the north coast.

  Large green mats of algae have formed around the lough, particularly in the north-east

  Blue-green algae is back at 2023 levels in Lough Neagh. Large green mats have formed around the lough, particularly in the north-east. A "very sharp uptick" in the amount of potentially toxic algae has been noticed in recent days by scientists monitoring the lough. Blue-green algae has already been detected in the Bann River system and scientists have said it could travel further up the north coast, where it closed bathing waters in Portstewart and Portrush last year.

  The water at Antrim was a green colour when BBC News NI visited on Thursday

  Causeway Coast and Glens Council confirmed this week that blue-green algae had been most recently detected at Cloonavin in Coleraine. While the algae may well make it to the coast, it cannot survive in salt water, but bathing bans or advisories may be used as a precaution until it has confirmed to have broken down. The council has advised that people should not enter the water as a precautionary measure near Cloonavin and also advised pet owners to ensure their animals do not have access to this water.

