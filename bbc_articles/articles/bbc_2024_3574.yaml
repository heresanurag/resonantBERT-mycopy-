title: 'Rochdale rape: Four boys aged 12 to 14 arrested - BBC News'
date: '2024-02-11'
section: Manchester
url: http://www.bbc.co.uk/news/uk-england-manchester-68269292
content: |-
  The boys were held after a "young female" reported being raped in Rochdale, police say.

  Officers were called to the scene at about 18:00 GMT on Saturday

  Four boys have been arrested on suspicion of rape in Rochdale, police have said.

  Greater Manchester Police said the boys, aged 12, 13, 14 and 14, were held after a "young female" reported being raped in the Newbold area at about 18:00 GMT on Saturday.

  The force said the four boys remain in custody for questioning.

  It added that the child who reported the attack was "currently being supported by specialist officers".

  The force has appealed for anyone who was in the area at the time of the reported attack

  A representative said forensic officers had been at a scene on Kingsway and a police dog team had been used to search undergrowth in the area.

  The area, which has been cordoned off, lies in a supermarket car park, about 330ft (100m) from the store entrance and about 165ft (50m) from the Newbold Metrolink tram stop.

  The force has appealed for anyone who was in the area at the time of the reported attack or may have information about what happened to get in touch.

