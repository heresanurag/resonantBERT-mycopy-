title: 'Cup final: Mass brawl outside Hampden ahead of kick-off - BBC News'
date: '2023-02-26'
section: Glasgow & West Scotland
url: http://www.bbc.co.uk/news/uk-scotland-glasgow-west-64777252
content: |-
  Police said the disturbance took place about six hours before Rangers and Celtic were due to kick-off.

  Two rival groups clashed outside Hampden Park ahead of the cup final

  Police have launched an investigation into a mass disturbance outside Hampden ahead of the League Cup final.

  Officers confirmed the alarm was raised at about 09:00 on Sunday, six hours before the match between Rangers and Celtic was due to kick-off.

  A Police Scotland spokeswoman said a "large group" was involved and inquiries were ongoing.

  Some Rangers fans had been given access to the grounds by the stadium operators to set up a pre-match display.

  No arrests were made at the time. After the match four people were arrested for disorder related offences and assault but police said the incidents were quickly resolved.

  Police Scotland said it would continue to investigate the earlier disturbance, and urged the clubs to do likewise.

  Chief Superintendent Mark Sutherland said: "Prior to today's match supporters of both clubs had been granted pre-arranged access to Hampden Park by the stadium operators to set up displays, with Celtic on Saturday, 25 February and Rangers on the morning of Sunday, 26 February.

  "A stewarding and policing plan was in place to support this arrangement. At around 8.50am on Sunday, 26 February, 2023, during this pre-arranged attendance, a disturbance took place outside the stadium involving supporters from both clubs."

  A number of videos of the disorder were posted on social media.

  One, filmed from a tenement flat window, showed dozens of individuals walking along Somerville Drive on Glasgow's south side.

  A handful of police officers were present but they were unable to prevent a brief fight breaking out with a rival group.

  During the incident one man is seen being knocked to the ground while another throws a traffic cone nearby.

  Some of those involved were wearing blue hats while others were wearing green hats, but the vast majority were dressed in black.

  A separate clip, filmed at ground level, shows a group of men shouting as they run along the perimeter of the stadium.

  The footage stops as police officers arrive on a side street facing the national stadium.

  Celtic later won the match 2-1, lifting the first trophy of the season.

  CORRECTION: An earlier version of this story said the incident was a pre-arranged clash between rival supporters of the Glasgow clubs. Police have confirmed that this was incorrect. We apologise for this error in our reporting.
