title: Louis Tomlinson brings TV to watch England at Glastonbury - BBC News
date: '2024-07-02'
section: General
url: http://www.bbc.co.uk/news/videos/cpd9zjv8kero
content: |-
  The singer didn't want to miss out on seeing England play against Slovakia in Euro 2024.

  Singer Louis Tomlinson delighted Glastonbury attendees by bringing along a television to watch England's football team play against Slovakia in Euro 2024.

  Tomlinson told the BBC's Culture and Media Editor, Katie Razzal, it was "touch and go" with the signal for a while.

  The One Direction star attended the festival as a concert goer, rather than performing himself and set the television up in the camp grounds.

  England's win against Slovakia means they are now through to the quarter-finals of the competition.
