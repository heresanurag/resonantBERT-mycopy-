content: |-
  The EU says it will begin shipping arms to Ukraine, the first time it has done so in a conflict.

  The European Union says it will begin shipping arms to Ukraine - the first time in its history it has supplied arms in a conflict.

  Ros Atkins looks at how Western military aid for Ukraine has escalated, including a historic policy shift from Germany.
