title: 'Bexhill: Circus performer hurt after falling from tightrope - BBC News'
date: '2024-08-20'
section: Sussex
url: http://www.bbc.co.uk/news/articles/czx6wql53n4o
content: |-
  Gravity Circus is carrying out a 'thorough investigation' and future performances will go ahead.

  The female performer was taken to hospital in Brighton after the fall on Monday

  A tightrope performer is being treated in hospital after falling 5m (16ft) during a circus show in East Sussex. South East Coast Ambulance Service (Secamb) said it was called to Glyne Gap Field, in Bexhill, at 16:45 BST on Monday to "reports a person had fallen from height". A Secamb spokesperson said the woman's injuries "did not appear to be life-threatening". Gravity Circus said its "primary concern" was the wellbeing of the performer and it was conducting a "thorough" investigation.

  A helicopter from Air Ambulance Charity Kent Surrey Sussex (KSS) arrived at 17:30 BST to assist. The woman, who was taken to Royal Sussex County Hospital in Brighton by road, suffered facial and other injuries, Secamb said. Gravity Circus said she was part of an act called the High Wire Troupe, from Colombia. Audience member, Hayley Welsh, told BBC Radio Sussex the performer was on a chair on the tightrope. She said: "It looked like her leg gave way. She lost balance and went flying down wrapped around the wire. "She smashed down onto the metal floor."

  In a comment on Facebook, Gravity Circus said the performer was "doing well" in hospital. It said: "We can confirm that an accident occurred last night involving one of our tightrope performers during the show. "In live entertainment and high-risk performances, accidents can unfortunately happen despite stringent safety measures. "Our emergency protocols were immediately enacted, and the performer was promptly taken to the hospital. "Our primary concern is the wellbeing of the performer, their family, the high wire troupe, and our entire circus family. "We are closely monitoring the situation and conducting a thorough investigation". The spokesperson said forthcoming performances will go ahead as scheduled.
