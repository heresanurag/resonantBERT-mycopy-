title: 'Channel migrants: Hundreds of boats stored in Dover - BBC News'
date: '2020-07-20'
section: General
url: http://www.bbc.co.uk/news/uk-england-kent-53477253
content: |-
  More than 2,900 people have crossed this year in small inflatable dinghies.

  Hundreds of migrant boats have been filmed being stored at a location in Dover.

  Since the beginning of the year, 2,900 people have crossed the English Channel in small dinghies.
