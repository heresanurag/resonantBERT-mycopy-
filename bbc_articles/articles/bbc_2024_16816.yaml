  Inside the $5bn SoFi stadium in LA that will host Manchester United against Arsenal this weekend in part to prepare for the opening game of the World Cup in 2026.

  Take a look inside the $5bn SoFi stadium in Los Angeles that will host Manchester United against Arsenal this weekend. The game is being used, in part, to prepare for the opening game of the World Cup in 2026.

