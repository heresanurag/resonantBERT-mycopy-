content: |-
  First Minister Nicola Sturgeon warns Scotland may be facing a "potential tsunami" of Covid infections.

  The STUC reacts to Nicola Sturgeon's calls for home working.

  The trade union organisation says workers are being placed in an "invidious position".

  They are calling for the Scottish government to lift the burden of Covid safety from workers’ shoulders and legislate imminently if they won’t.

  They are also asking the UK government to reinstate furlough now.

  STUC General Secretary Roz Foyer says it is "all fine and well" for the first minister to appeal to workers to work from home if they can, but says she needs to be more direct.

  Ms Foyer adds that often employers refuse such requests and many workers are now worried about asking.

  Quote Message: Once again workers are being called on make judgments on whether to work from home even where they know their employer will not be sympathetic. The first minister needs to instruct employers to comply and withdraw all government support from any companies that fail to do so. from Roz Foyer STUC general secretary Once again workers are being called on make judgments on whether to work from home even where they know their employer will not be sympathetic. The first minister needs to instruct employers to comply and withdraw all government support from any companies that fail to do so.
