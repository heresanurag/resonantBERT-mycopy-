id: bbc_2025_5415
title: 'Stockwell: Boy shot dead by ''delivery driver'' named by police - BBC News'
date: '2025-03-05'
section: London
url: http://www.bbc.co.uk/news/articles/cx28gxjz27go
content: |-
  Inquiries continue after the teenager was shot dead near Stockwell Tube station on Tuesday.

  Lathaniel Burrell has been named by the Met as the teenager fatally shot on Tuesday afternoon

  A 16-year-old boy who died after being shot in south London has been named by the Metropolitan Police as Lathaniel Burrell. An eyewitness to the killing in Stockwell told the BBC the teenager was shot dead by a man dressed as a food delivery driver on a moped. Lathaniel - who locals have said was a "very bright" school pupil - died on Paradise Road, near Stockwell Tube station, at about 14:30 GMT on Tuesday. The Met Police has called it an "enormously shocking incident". The eyewitness said two boys came down the stairs at a block of flats when the moped rider took out a gun and fired, adding that the teenager who died was well known in the area and was involved in gangs.

  Police said inquiries were still ongoing, no arrests have been made, and detectives are keeping an open mind about the possible motive for the attack. Those living in the area have been shocked by the killing.

  Patricia, who has lived in Stockwell for 21 years, said: "The situation is really bad now. I don't go out any more. In the night, I don't feel safe. "I feel so bad for the boy. It's too much for me." A young woman who lives nearby said: "This area is not safe at night. There are a lot of teenage boys that cause a lot of trouble who live around here. "They hang around at night, play around with the cops. Things like playing with fireworks and running from the police. But it can get serious. Someone I know got stabbed some time last year. "I think about where the cameras are when I am walking at night, but there are no cameras in that area [of the shooting]." She added that the attackers had "no shame - there is a primary school next door".

  Sandra, who also lives nearby, told BBC London on Wednesday: "It's very sad; we know the family. The dad is very well known round here, who brought up our kids in youth clubs. "It is awful, really sad, and really horrible." Roisin and Niamh said: "It feels quite unsafe; we are five girls living in a flat, and to have that on your doorstep is scary." They added: "We're very upset for the whole community, and it's a big shock to the system arriving home from work and having to sign in and out to get into your flat, with police constant over the last 24 hours."

  The local MP claims the community will never get over the shock

  Florence Eshalomi, Labour MP for Vauxhall and Camberwell Green, told BBC London she wanted people to feel safe within their community. "Stockwell is a vibrant, diverse, close-knit community. We are going to make sure that there is a visible police presence to reassure people," she said. The MP added: "This is a sad, wasted life; this boy could have had so much potential. His future has been robbed. "The family and community will continue to grieve; you can never get over this shock." Det Ch Insp Sarah Lee said the police need the public's help to come forward with any information: "We are particularly keen to speak to anyone who has any mobile phone or dash cam footage from the area surrounding Paradise Road. "This is a horrendous crime, which has shocked the local community and beyond. Our thoughts are with Lathaniel's family and friends at this devastating time," she added. Last May, a man was shot dead about a mile away from Tuesday's shooting. Jazmel Patterson-Low was 26 years old when he was shot on the Westbury Estate in Lambeth, with police saying his cause of death was a single gunshot wound. The Met said a 25-year-old man was arrested but was released with no further action. No other arrests have been made.

  The shooting happened near Stockwell Tube station on Tuesday afternoon

  Sonja Jessup, BBC London home affairs correspondent, said it's very rare for teenagers to be killed in shootings in London; a knife is the weapon in most homicides involving young victims. Of the 11 young people who lost their lives to violence in the capital last year, 10 were stabbed. One teenager, 15-year-old Rene Graham, was shot. There have also been incidents where young children have been injured in shootings. In November, an eight-year-old girl was seriously injured, along with her father, as they sat inside a car in Ladbroke Grove with her mother and two-year-old sibling. In May, a nine-year-old girl was left with life-changing injuries after she was shot as she ate dinner with her family at a restaurant on Kingsland High Street in Dalston. The fatal shooting of the 16-year-old boy in Stockwell will have caused huge concern in the community, and police will be trying to provide reassurance and, at the same time, persuade people to come forward with information to help them find the killer. This is often challenging, particularly when communities live in fear of gangs or organised crime, or where some may not trust the police.
