title: Kellen Moore joins New Orleans Saints from Super Bowl winners Philadelphia
  Eagles - BBC Sport
date: '2025-02-12'
section: American Football
url: http://www.bbc.co.uk/sport/american-football/articles/cly9m9wegjmo
content: |-
  Kellen Moore is appointed head coach of the New Orleans Saints, two days after helping the Philadelphia Eagles win the Super Bowl as offensive coordinator.

  Kellen Moore was a quarterback for the Detroit Lions and the Dallas Cowboys before moving into coaching

  Kellen Moore has been appointed head coach of the New Orleans Saints, two days after helping the Philadelphia Eagles win the Super Bowl as offensive coordinator. Moore succeeds Dennis Allen, who was sacked in November after the Saints suffered seven successive defeats, with Darren Rizzi taking interim charge until the end of the season. "I'm excited to join the New Orleans Saints and deeply appreciate the faith that [team owner] Mrs Benson and the entire Saints organisation have placed in me," Moore said. "I look forward to embracing the challenges ahead and am eager to get started. I would also like to thank the Philadelphia Eagles for an incredible 2024 season. I'm excited to begin this new chapter."

  The move means Moore will have a different job for a fourth successive year, though this is his first role as head coach. The 36-year-old previously worked at the Dallas Cowboys between 2018 and 2022 - serving as offensive coordinator the last of those years, before similar roles at the Los Angeles Chargers in 2023 and the Eagles last season. "He is an outstanding communicator with the ability to lead people and has a clear vision for this football team," said Saints general manager Mickey Loomis. Team owner Gayle Benson added: "Through the search process, it became clear that Kellen is the right person to help us re-establish a winning programme and culture that our fans are accustomed to and have come to expect." The Saints have missed out on the play-offs the last four seasons and have reached just one NFC Conference final since winning the Super Bowl in 2010. The Eagles beat the Kansas City Chiefs 40-22 in New Orleans on Sunday to deny them an unprecedented third straight Super Bowl.
