title: Daniel Dae Kim thanks Ed Skrein after taking over Hellboy role - BBC News
date: '2017-09-14'
section: Entertainment & Arts
url: http://www.bbc.co.uk/news/entertainment-arts-41264654
content: |-
  Daniel Dae Kim replaces Ed Skrein, who quit the Hellboy reboot amid a "whitewashing" row.

  Daniel Dae Kim has starred in TV shows like Lost and Hawaii Five-0

  Actor Daniel Dae Kim has been confirmed for the Hellboy reboot, two weeks after British star Ed Skrein dropped out amid accusations of "whitewashing".

  Daniel Dae Kim, who is known for shows like Hawaii Five-0 and Lost, will play Major Ben Daimio in the new film.

  The character was Japanese-American in the original Hellboy comics.

  Kim said he applauded his fellow actor Skrein "for championing the notion that Asian characters should be played by Asian or Asian American actors".

  He added: "He could not have addressed the issue more elegantly and I remain indebted to him for his strength of character."

