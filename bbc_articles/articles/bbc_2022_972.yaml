title: 'New Year Honours: Lauren Price to turn professional in 2022 - BBC Sport'
date: '2022-01-01'
section: Wales
url: http://www.bbc.co.uk/sport/wales/59829837
content: |-
  Olympic boxing champion Lauren Price announces she will turn professional in 2022 after being appointed an MBE in the Queens New Years Honours list.

  Lauren Price became the first Welsh boxer to win an Olympic gold medal when she beat China's Li Qian in the women's middleweight final at the Tokyo games

  Price, 27, won middleweight gold in Tokyo, becoming the first Welsh fighter to claim an Olympic boxing gold medal. Price, who has been awarded an MBE in the Queen's New Year Honours list, says she will announce who she has signed with in the next few weeks. "I've achieved all I can as an amateur, I've won gold at every single major tournament," Price said. "Winning Olympic gold changed my life." Price has also won gold medals at the Commonwealth Games, World Championships and European Games. She is a former kickboxing world champion and played international football for Wales. Price now wants to follow in the footsteps of London 2012 gold medal winner Katie Taylor, the Irish boxer who has become an undisputed world champion.

  "I'm definitely going to go professional, it should come out in the next few weeks who I intend to sign with," she told BBC Sport Wales. "Now I want to go on the next journey and that is following in the footsteps of one of the greatest in Katie Taylor. "She's undisputed and I want to do what she has done. "I was the first Welsh person to win Olympic boxing gold and maybe I can be the first [Welsh] female to become a world champion as well."

