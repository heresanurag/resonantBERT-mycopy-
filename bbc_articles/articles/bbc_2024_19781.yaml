title: Rotherham riot investigator thanks public for support - BBC News
date: '2024-08-24'
section: South Yorkshire
url: http://www.bbc.co.uk/news/articles/c5ydl2vl6gpo
content: |-
  So far, 28 people have been jailed for their roles in disorder in Manvers on 4 August.

  The major disorder involved rioters throwing missiles at police officers and the hotel and starting fires

  A senior police officer has thanked people for their help in bringing those responsible for mass disorder outside a Rotherham hotel to justice. Fifty-eight officers, along with three police dogs and a police horse, were injured during the riot outside Holiday Inn Express in Manvers on 4 August. So far, 28 people have been jailed, with more due to be sentenced in the coming weeks. Det Ch Insp Ben Wood, from South Yorkshire Police, said the convictions would not have been possible without the "amazing" support of the community.

  Over the past two weeks, Sheffield Crown Court has heard how two groups of protesters gathered outside the hotel, which was housing around 200 asylum seekers at the time. One group was there in support of those seeking refuge, while the other group was made up of people against them. As a safety precaution, officers escorted the supporters off site when the situation began to deteriorate. Footage played in court show rioters throwing missiles at officers which included concrete blocks, fencing posts, chairs and glass bottles. Fires were also started, with hotel staff trapped inside as the fire alarm went off. On Friday, brothers Luke and Paul Sissons became the latest to be jailed for taking part in the violence, which was described by a judge as "racist in nature".

  Members of the community gathered the following day to help clean up the area

  Det Ch Insp Wood said: "I wanted to personally say a thank-you to those who have helped us in our investigation. "Those who have been brought to justice have received a collective sentence of over 71 years in prison, this could not have been done without your support, thank you." He said officers had also received numerous letters of thanks which he described as "truly wonderful". The investigation into the Rotherham riot was ongoing, he said, adding: "Be assured - if you were there, we are coming for you." Listen to highlights from South Yorkshire on BBC Sounds, catch up with the latest episode of Look North or tell us a story you think we should be covering here, external.
