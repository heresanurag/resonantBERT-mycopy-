title: Mothers challenge government over two-child benefit cap - BBC News
date: '2024-11-04'
section: UK
url: http://www.bbc.co.uk/news/articles/czj7nj9j8l0o
content: |-
  A charity supporting the women say the Universal Credit policy is "discriminatory and irrational".

  Two mothers are challenging the government in court over the Universal Credit (UC) two-child benefit policy. That two-child cap prevents parents from claiming the child element of UC or child tax credit for a third or subsequent child. The women, who cannot be identified, had two or more children non-consensually in relationships that began when they were teenagers. A non-consensual conception exception to the two-child cap, sometimes referred to as the rape clause, allows for financial support for a child conceived non-consensually but only if that child is the third or subsequent child.

  One of the women went on to have more children consensually later in life, while the other had to manage on support for only two of three children living with her after an older child was returned to her from care. The Child Poverty Action Group (CPAG), which is providing legal representation for them, said the policy was "discriminatory and irrational". Claire Hall, the charity's head of strategic litigation, said: "They should be able to get the exemption for the non-consensually conceived children, irrespective of at what point they are born." One of the women - known only as LMN - taking High Court action against the Department for Work and Pensions (DWP) eventually received benefits for her third child. "She went for years without this support, amounting to thousands of pounds which will not be backdated", CPAG said. The second woman - known as EFG - said in a statement through CPAG : "If I had been raped after my first two children were born, the exceptions would be applied." CPAG says that both women have missed out on thousands of pounds of support because of the current policy. A DWP spokesman said: "We cannot comment on ongoing legal cases." The High Court challenge is expected to take place next year. The two-child cap came into effect in April 2017 and has been opposed by anti-poverty campaigners. At the time a DWP spokeswoman said: "We have always been clear this will be delivered in the most effective, compassionate way, with the right exceptions and safeguards in place." The spokeswoman was unable to explain how claims would be verified when made by a woman who had never accessed support or told anyone about being raped. In 2023 Sir Keir Starmer told the BBC his Labour government would not change the two-child cap and would not commit extra money to benefits without first growing the economy. In the past campaigners brought a legal challenge to the Supreme Court against the two-child limit, arguing that it breached parents' and children's human rights - that case was dismissed 2021.
