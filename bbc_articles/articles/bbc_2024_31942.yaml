  A total of 451 people arrived at the UK coast on 11 boats - the first arrivals for more than a week.

  More than 450 migrants crossed the English Channel in small boats on Christmas Day

  More than 450 migrants crossed the English Channel in small boats on Christmas Day - the first arrivals for more than a week. A total of 11 boats made the journey to the UK from France on Wednesday morning, with more expected to follow in the coming days. The total number of Christmas Day arrivals was 451, according to official government figures. A Home Office spokesperson said: "We all want to end dangerous small boat crossings, which threaten lives and undermine our border security."

  More than 35,000 people have made the journey so far in 2024, which is 20% higher than last year. Those who arrived in Dover on 25 December broke a period of more than a week of no crossings. The last time vessels carrying migrants were known to have made the journey was on 14 December, when 160 people in three boats arrived, according to the Home Office. The 35,040 people to have arrived this year is fewer than the record high for a year in 2022, when 45,775 people made the crossing. Home Secretary Yvette Cooper previously acknowledged that it would be "no comfort" to the public if numbers continued to remain at high levels. Sir Keir Starmer said he had made "smashing the gangs" who facilitate the small boats crossings one of his top priorities. The Prime Minister has set up a new Border Security Command, and is attempting to work more closely with the UK's European neighbours to pull apart organised crime gangs involved in people smuggling.
