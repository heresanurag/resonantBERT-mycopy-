title: Ex-MP Craig Williams charged with betting offences - BBC News
date: '2025-04-15'
section: Politics
url: http://www.bbc.co.uk/news/articles/c230pvpdek9o
content: |-
  Craig Williams was previously the MP for Montgomeryshire and an aide to Rishi Sunak

  Fifteen people including former Conservative MP Craig Williams have been charged with betting offences by the Gambling Commission. The investigation was launched last year following bets placed on the timing of the 2024 general election. The commission said the investigation focused on individuals "suspected of using confidential information - specifically advance knowledge of the proposed election date - to gain an unfair advantage in betting markets". Before the election was called, Williams was the MP for Montgomeryshire and an aide to then-Prime Minister Rishi Sunak.

  The group of those charged includes Russell George, a Member of the Senedd, who has since been suspended from the Welsh Conservative group. Others charged include Laura Saunders, the former Conservative parliamentary candidate in Bristol North West, and her partner Anthony Lee, a former director of campaigning for the Conservatives.

  Responding to the charges announced on Monday, a Conservative spokesman said the party "believes that those working in politics must act with integrity". "Current members of staff who have been charged are being suspended with immediate effect," he said. "These incidents took place in May last year. Our party is now under new leadership and we are cooperating fully with the Gambling Commission to ensure that their investigation can conclude swiftly and transparently." Welsh Conservatives leader Darren Millar said the suspension of George was "a neutral act pending the outcome of the justice process". Bernard Gentry, chairman of the Welsh Conservatives, told BBC Wales: "It's disappointing that these individuals have been charged. But we need to wait for the result of the court case before passing judgement." The other individuals charged are:
  • None Thomas James, the director of the Welsh Conservatives
  • None Nick Mason, a former chief data officer for the Conservative Party
  • None Simon Chatfield, former chief marketing officer for the Conservative Party
  • None Anthony Hind, former deputy digital director for the Conservative Party
  • None Iain Makepeace, former chief head of design and print for the Conservative Party Following the commission's announcement, a Met Police spokesperson said Mr Hunt was "attached to the Royalty and Specialist Protection Command at the time of his alleged offending". "A further nine officers will face no further action in relation to any criminal investigation," a statement added. The Gambling Commission said the 15 people have been charged under section 42 of the Gambling Act and are due to appear at Westminster Magistrates Court on 13 June. Those found guilty of an offence under section 42 could face a fine or a jail term of up to two years. Labour Party chairwoman Ellie Reeves said: "This is a very serious development. The British people will expect that anyone found guilty of wrongdoing faces the full force of the law. "[Conservative leader] Kemi Badenoch must make crystal clear that anyone found guilty of using insider information to cheat the system to try to enrich themselves has no place in the Conservative Party. No ifs, no buts."

  On 22 May 2024, Rishi Sunak announced the general election would be held on 4 July that year - a decision that overturned expectations of an autumn poll. In early June 2024, it was reported that Williams had placed a bet on the date of the general election. Approached by the BBC at the time, Williams said he had "clearly made a huge error of judgement that's for sure and I apologise". He refused to comment on whether he knew about the election date when he placed the wager saying it would not be "appropriate" while the Gambling Commission was investigating. Following the commission's decision to launch an investigation, the Conservative Party pulled its support for Williams and Saunders. Mr Lee and Mason both took leaves of absence from their party roles after the allegations first emerged during the general election campaign. Mason, who is currently a councillor in Herefordshire, has been suspended from the Conservative group on the council and now sits as an independent.

