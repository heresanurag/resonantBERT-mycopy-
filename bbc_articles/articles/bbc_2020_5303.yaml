content: |-
  The first minister warns it is "too soon" to make any other changes.

  A woman was stunned to discover orders her brother-in-law received telling him of Germany's surrender on VE Day in 1945.

  Lester Saul was a Merchant Navy master mariner honoured for bravery during the Atlantic convoys.

  Shirley Ballard, 84, of Cardiff, was going through papers left by her late sister Grace when she made the find.

  They were in Morse code and sent on 8 May 1945.

  The message read: "Germany has surrendered unconditionally. Cease fire has been ordered from 22:01 GMT 8th May. Repeat 22:01 GMT 8th May.

  "Pending further orders all existing instructions regarding the defence, security and control of merchant shipping are to remain in force.

  "Ships at sea, whether in convoy or sailing independently are to continue their voyage as previously ordered.

  Master Saul was also told U-boats were "apparently complying" with orders to remain on the surface displaying a black flag or navigation lights.

  He was advised to give them a "wide berth" and report their position, speed and course by radio.

