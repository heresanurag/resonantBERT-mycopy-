title: 'Israel-Gaza: UK aid supplies air-dropped into Gaza for first time - BBC News'
date: '2024-02-22'
section: Middle East
url: http://www.bbc.co.uk/news/world-middle-east-68360902
content: |-
  The BBC's Quentin Sommerville was on board the Jordanian plane tasked with delivering the aid.

