  Mr Hakamata was working at a miso processing plant in 1966 when the bodies of his boss, his boss' wife and their two children were recovered from a fire at their home in Shizuoka, west of Tokyo. All four had been stabbed to death. Authorities accused Mr Hakamata of murdering the family, setting fire to their home and stealing 200,000 yen in cash. Mr Hakamata initially denied doing so, but later gave what he came to describe as a coerced confession, following beatings and interrogations that lasted up to 12 hours a day. In 1968 he was sentenced to death. For years, Mr Hakamata's lawyers had argued that DNA recovered from the victims' clothes did not match his, and alleged that the evidence was planted. Although he was granted a retrial in 2014, prolonged legal proceedings meant it took until last October for the retrial to begin. The case has raised questions about Japan's justice system, including the time taken for a retrial and the allegations of forced confessions.
