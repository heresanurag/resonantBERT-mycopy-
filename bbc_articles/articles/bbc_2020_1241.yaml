id: bbc_2020_1241
title: 'South Korea Coronavirus: Concern in Daegu as cases rise - BBC News'
date: '2020-02-21'
section: General
url: http://www.bbc.co.uk/news/world-asia-51587160
content: |-
  More than 200 cases of coronavirus have been confirmed in South Korea, with many linked to a religious group.

  South Korea has stepped up measures to contain the spread of the deadly new coronavirus, as the number of confirmed cases rose above 200.

  The southern cities of Daegu and Cheongdo have been declared "special care zones".
