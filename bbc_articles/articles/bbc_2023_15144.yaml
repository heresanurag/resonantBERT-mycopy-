title: BBC crew find injured friends in overrun Gaza hospital - BBC News
date: '2023-10-13'
section: General
url: http://www.bbc.co.uk/news/world-middle-east-67094214
content: |-
  BBC Arabic reporter Adnan El-Bursh visits the main hospital in Gaza City, which is at breaking point.

  Gaza City's main hospital, Al Shifa, is at breaking point, with hundreds of seriously injured people filling the hallways and bodies lying in corridors and outside, as staff work under immense pressure.

  Inside, BBC Arabic's reporter Adnan El-Bursh and his team discover their own neighbours, relatives and friends are among those injured and killed.
