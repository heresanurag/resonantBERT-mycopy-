title: Gang who supplied 'assassination kits' jailed - BBC News
date: '2025-06-27'
section: Derbyshire
url: http://www.bbc.co.uk/news/articles/cn0z4636522o
content: |-
  The court heard the trio were involved in the manufacture and supply of weapons to gangs elsewhere.

  Ronald Knowles and Gary Hardy were jailed for a range of serious firearms offences

  A garden gun maker and notorious "drugs general" have been jailed for producing and distributing "assassination kits" for organised crime groups across the country. Roland Knowles, 64, known as "the armourer", was arrested by armed police as he tried to burn the evidence in his back garden in Alfreton, Derbyshire, in August 2023. The kits were sold by "facilitator" Gary Hardy, 62, from his home in Ravenshead, Nottinghamshire, and distributed by Steven Houston, 65, from Corley, Warwickshire. Jailing Hardy for 23 years, Knowles for 13 and a half years, and Houston for 25 years, Judge Mark Watson said: "Each of you contributed in different but important ways – you all knew what you were doing."

  Armed police seized four kits containing guns, silencers, bullets and latex gloves

  Hardy sent "assassination kits" to Houston, who supplied the weapons to members of criminal gangs elsewhere. These included known criminal and "customer" - Jason Hill, 23, who was jailed for four years after pleading guilty before his trial. Officers found two handguns, two silencers and ammunition in a safe hidden in the garden in a raid on Hill's house. Hill is currently serving a life sentence for the "brutal and cold-blooded" murder of Owen Fairclough, whose body was found in Breaston, Derbyshire, in June 2023.

