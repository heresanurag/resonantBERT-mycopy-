  Abi Joyce, for the prosecution, said: "[The Crown] asserts that Hardy and Houston were respected heads of organised crime groups for the manufacture and sale of numerous weapons... these were provided with silencers and have been referred to as assassination kits. "These weapons found their way into the hands of serious crime groups across the country." Police recovered weapons from Coventry, Wolverhampton, Essex and London - which the court heard were linked to Knowles's makeshift factory in his back garden. The prosecution said Knowles was referred to as "the armourer", and was employed by Hardy and Houston to make the firearms, and evidence suggested he was paid by the pair to do so, the court heard. "The prosecution say these three men played leading roles in a long-standing conspiracy to sell weapons," Ms Joyce added. The makeshift factory was discovered as part of an investigation into Hardy by Nottinghamshire Police and the East Midlands Special Operations Unit (EMSOU). Nottingham Crown Court was told Knowles converted at least 33 replica pistols, and had enough bullets for a further 80 kits that were packaged with silencers and latex gloves.

  Each "assassination kit" contained a handgun and silencer with 10 bullets and gloves

  Det Ch Insp Mark Adas said "this is the largest firearms manufacturing operation" he had come across and one of the biggest in the East Midlands. Police began with their arrests after stopping a van in Measham, Leicestershire, in August 2023. Officers seized a box containing four "lethal" self-loading pistols, each individually packaged with a silencer, blue nitrile gloves and 10 rounds of live ammunition. The force said the bullets had been converted from blank firing to live. "These were lethal assassination kits. I call them that because they were individually packaged. The firearms were designed to kill. It is highly concerning," Det Ch Insp Adas said. The court heard as officers moved into Knowles's garden in Milton Avenue, drone footage captured the moment he emerged from an outbuilding with his hands up before being handcuffed in front of a bonfire he started.

  In mitigation for Knowles, Balraj Bhatia said the defendant was "extremely remorseful" and was described as an "exemplary prisoner" by staff. Emma Goodall KC, for Hardy, said he had health problems and had shown good character in prison, becoming a mentor to other inmates. Gordon Cole KC, for Houston, said the defendant was remorseful for his actions and knew the impact it had on his wider family. Mr Cole also said there was a "lack of evidence" he was the head of an organised crime group. Clive Stockwell KC, for Hill, said he "does not accept" the prosecution's case he bought the firearm from Houston and there was no evidence the firearms found were fired.

  Jason Hill and Stephen Houston were also sentenced at Nottingham Crown Court

  Hardy, of The Birches, Ravenshead, Nottinghamshire, was found guilty of:
  • None Conspired with others to sell or transfer a firearm
  • None Conspired with others to have in your possession a firearm with intent by means thereof to endanger life or to enable another person by means thereof to endanger life
  • None Conspired with others to convert into a firearm a thing, namely a blank firing firearm
  • None Conspired with others to sell or transfer a firearm
  • None Conspired with others to have in your possession a firearm with intent by means thereof to endanger life or to enable another person by means thereof to endanger life
  • None Conspired with others to convert into a firearm a thing, namely a blank firing firearm Houston, 65, of Breach Oak Lane, Corley, Warwickshire, was found guilty of:
  • None Conspired with others to sell or transfer a firearm
  • None Conspired with others to have in your possession a firearm with intent by means thereof to endanger life or to enable another person by means thereof to endanger life
  • None Conspired with others to convert into a firearm a thing, namely a blank firing firearm
  • None Possessing a firearm with intent by means thereof to endanger life or to enable another person by means thereof to endanger life

