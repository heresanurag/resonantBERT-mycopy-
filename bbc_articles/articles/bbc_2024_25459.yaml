content: |-
  Translink also issued warnings to commuters on Thursday evening as a result of heavy traffic.

  Translink has warned of delays due to traffic congestion

  Translink warned of further delays to bus services in and out of Belfast city centre due to traffic congestion on Friday evening. Additionally, a number of rail services were cancelled from the new Grand Central Station due to "operational reasons". In a post on X, formerly Twitter, the transport operator said some bus services in and out of the city centre are experiencing delays of approximately 35 minutes. "Apologies for any delay and inconvenience," it said. The transport provider also issued warnings to commuters on Thursday evening as a result of heavy traffic in and out of Belfast city centre.

  Digital signage informed commuters that some services have been delayed or cancelled due to roadworks

  On the rail network, the 18:04 BST Portadown to Belfast Grand Central service was cancelled. Translink said the 18:43 Belfast Grand Central to Lisburn service was also cancelled. A number of other trains, including the Enterprise service between Belfast and Dublin, and the Bangor to Belfast line, faced delays. "Due to operational reasons, we have disruption to train services this evening," Translink posted on X, adding a further apology for the inconvenience. According to the Translink app, a number of bus services were also cancelled.

