title: Mike Ashley's Sports Direct considers Debenhams bid - BBC News
date: '2019-03-27'
section: Business
url: http://www.bbc.co.uk/news/business-47717367
content: |-
  Sports Direct considers making £61m buyout offer for the struggling department store chain.

  Mike Ashley's Sports Direct is considering a £61.4m bid to take full control of Debenhams.

  Sports Direct already owns a near 30% stake in the retailer.

  The potential offer would be conditional on Mr Ashley becoming Debenhams chief executive.

  Sports Direct renewed its attack on the Debenhams board, saying it was either incompetent or was co-operating with lenders to wipe-out the investments of shareholders.

  It is considering making an offer of 5p per share for Debenhams, more than double Tuesday's closing share price of 2.2p.

  Debenhams said it was not making a statement at present, but it has been resisting Sports Direct takeover attempts.

  Sports Direct is the biggest Debenhams shareholder, with a 29.7% stake. Brandes Investment Partners, Odey Asset Management, and retail conglomerate Landmark Group are also significant shareholders.

  Mike Ashley owns more than 60% of Sports Direct

  The department store chain is currently trying to raise up to £200m from existing lenders.

  Under that deal shareholders, including Sports Direct, could see the value of their investments all but wiped-out.

  Abandoning that refinancing deal would be a condition of a Sports Direct offer. Debenhams would also not be able to go into administration or insolvency.

  Debenhams is expecting confirmation of the refinancing deal this week, and has already said a takeover offer from Mr Ashley would not immediately solve its funding crisis.

  Sports Direct deputy chief financial officer Chris Wootton said shareholders were "sick and tired of being ignored, cast aside and trampled underfoot by the lenders of Debenhams".

  The sports retailer is continuing with plans to force an emergency general meeting in May to try to oust all but one of the directors on Debenhams' board.

  Laith Khalaf, a senior analyst at Hargreaves Lansdown, said: "The Debenhams board are bound by their duty to shareholders to give this proposal proper consideration, though it's not as yet a firm offer for the company," he said.

  "This is not conventional corporate behaviour by any means, but that's what we've come to expect from the Sports Direct chief executive.

  "What we haven't had from either Mike Ashley or Debenhams is a strategic plan for the long term future of the company, and today that still remains sadly lacking," he added.
