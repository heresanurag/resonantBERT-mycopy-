  Vladimir Putin proposed direct talks on 15 May in Istanbul in response to a call by European leaders and Ukraine for a 30-day unconditional ceasefire. Zelensky then challenged Putin to meet him in person, but on Thursday the Kremlin said that the Russian president was not among officials due to travel. Following a bilateral meeting with Erdogan in Ankara, Zelensky accused Moscow of "disrespect" towards Trump and Erdogan because of the Russian delegation's lack of seniority and reiterated his challenge to the Russian leader to meet him personally. "No time of the meeting, no agenda, no high-level of delegation - this is personal disrespect to Erdogan, to Trump," he said. Meanwhile, Medinsky told reporters in Istanbul that Russia saw the talks as a "continuation" of failed negotiations in 2022 that took place shortly after Russia launched its full-scale invasion of its neighbour. "The task of direct negotiations with the Ukrainian side is to sooner or later reach the establishment of long-term peace by eliminating the basic root causes of the conflict," Medinsky said. The Ukrainian delegation will be headed by its Defence Minister Rustem Umerov, according to a decree from Zelensky issued on Thursday. It will also include its deputy heads of intelligence, military general staff and foreign ministry. Medinsky, who led previous rounds of failed negotiations with Ukraine in 2022, will lead the Russian delegation, a statement from the Kremlin said. Russia's deputy defence minister, deputy foreign minister and military intelligence head will also be there.

  The head of Moscow's delegation, presidential aide Vladimir Medinsky, insisted the Kremlin team had "all the necessary competencies"

  The Istanbul talks mark the first direct negotiations between Russia and Ukraine since the unsuccessful effort in 2022. Russia has indicated it wants to pick up where they left off. The terms under discussion included demands for Ukraine to become a neutral country, cut the size of its military and abandon Nato membership ambitions - conditions that Ukraine has repeatedly rejected as tantamount to capitulation. Fighting in Ukraine rages on, with Russia saying its forces had captured two more villages in the eastern Dontesk region on Thursday. Moscow now controls approximately 20% of Ukraine's territory, including the southern Crimea peninsula it illegally annexed in 2014. UK Defence Minister John Healey called on Ukraine's allies to "put pressure on Putin". Speaking after a meeting with German counterpart Boris Pistorius in Berlin on Thursday, Healey urged further sanctions on Russia "to bring him to the negotiating table".
