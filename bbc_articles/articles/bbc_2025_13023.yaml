content: |-
  Celebrities were seen in water taxis on Venice's canals in the lead up to the lavish multi-million dollar ceremony.

  Celebrities including Kim Kardashian, Bill Gates and Oprah Winfrey are arriving in Venice to attend the extravagant wedding of Amazon founder Jeff Bezos and Lauren Sanchez.

  Usher, Kylie Jenner and Ivanka Trump were among those seen boarding water taxis before the lavish ceremony, which is expected to take place this weekend and cost more than €40m (£34m; $46m).
