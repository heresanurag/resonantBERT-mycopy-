title: London Zoo 'devastated' by aardvark fire death - BBC News
date: '2017-12-23'
section: General
url: http://www.bbc.co.uk/news/uk-42465392
content: |-
  A nine-year-old aardvark has died after a fire at London Zoo, with four meerkats also presumed dead.

  London Zoo says a nine-year-old aardvark called Misha has died and four meerkats are missing, presumed dead, following a fire there.

  A number of zoo staff were treated at the scene for smoke inhalation and shock.

  Keepers and security worked to keep animals safe before firefighters arrived.
