content: |-
  Scrum-half Rhys Webb returns as Wales make five changes for their Six Nations Championship opener against Italy in Rome.

  Last updated on .From the section Welsh Rugby

  Coverage: Live on S4C, BBC Radio Wales, BBC Radio Cymru & BBC Sport website and BBC Sport app, plus live text commentary

  Wales have made five changes from the team that beat South Africa in November for Sunday's Six Nations opener against Italy in Rome.

  Scrum-half Rhys Webb returns after injury, while former captain Sam Warburton is named on the blind-side flank by interim coach Rob Howley.

  Props Nicky Smith and Samson Lee come in to the team, with Jake Ball in for the injured Luke Charteris at lock.

  Bath number eight Taulupe Faletau has failed to recover from a knee injury.

  Scott Williams is preferred at centre to Jamie Roberts, who is on the bench, while Dan Biggar will partner Webb at half-back.

  The Ospreys scrum-half missed the autumn Tests against Argentina, Japan and South Africa after injuring a knee against Australia on 5 November.

  Lock Alun Wyn Jones leads the team for the first time since taking over from Warburton as skipper.

  None of the uncapped players in the extended squad have made the match day 23, with interim coach Rob Howley saying it was important to start the tournament with a win.

  In fact Howley's starting XV averages more than 45 caps a man.

  "We've gone with a lot of experience with 10 out the XV who started against South Africa," he said.

  "It's important to start well hence the selection you see.

  "We've been there as coaches and some of the players have - 2009 comes to mind - when we made a number of changes and given opportunities but we just feel for the start of the campaign we want to start well.

  "We believe the Six Nations is going to be about momentum and we wanted to pick a rather experienced team to start the tournament."
