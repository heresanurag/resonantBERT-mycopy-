id: bbc_2020_2340
title: 'In pictures: Storm Dennis brings flooding to Wales - BBC News'
date: '2020-02-16'
section: Wales
url: http://www.bbc.co.uk/news/uk-wales-51520986
content: |-
  Cars and homes bear the brunt of Storm Dennis after a month's rain fell in two days.

  Overnight flooding has caused devastation to parts of Wales on Sunday, with many evacuated. South Wales Police said rescue agencies were dealing with "multiple" floods and landslides.
