  Villa attacking midfielder Morgan Rogers said the club's fans have a vital role to play in generating an atmosphere to inspire the club to the semi-finals of Europe's elite competition for the first time in over four decades. When asked how important the home support at Villa Park will be, Morgan said: "Massive. Two-legged ties, that's the whole purpose of it. "You get your advantage at home, especially in the position we're in, the second leg being at home. I think that's massive for us. "We can create a real atmosphere, we've done it this season in the big games, not just Champions League but in the big league games as well." Emery added: "If we are connecting with our supporters, if we are transmitting positive energy, if we are playing more or less getting tactically and individually good things on the field, the supporters, they are going to help us a lot with their energy. "They are going to transmit to us their energy, and always for our players playing at home, with the energy they can receive from our supporters, it's something adding positively. We need to use now Villa Park like our home and like our fortress."

  Unai Emery has been in charge of Aston Villa since October 2022
