title: Luke Littler to face Michael van Gerwen in PDC World Darts Championship final
  - BBC Sport
date: '2025-01-03'
section: Darts
url: http://www.bbc.co.uk/sport/darts/articles/c3vr045zqrlo
content: |-
  Teenager Luke Littler thrashes Stephen Bunting 6-1 with a ruthless display to set up a PDC World Championship final against Michael van Gerwen on Friday.

  Littler is only the seventh player to reach consecutive PDC World Championship finals

  Teenager Luke Littler thrashed Stephen Bunting 6-1 with a ruthless display to set up a PDC World Championship final against Michael van Gerwen on Friday. The 17-year-old was runner-up last year and is bidding to become the youngest winner of the tournament after a whirlwind 12 months which has seen him become a household name. The teenager averaged 105.48, his highest of this year's competition, as he overpowered his fellow Englishman at Alexandra Palace in London. Three-time champion Van Gerwen, who defeated Chris Dobey 6-1 in the semi-finals on Thursday, became the youngest winner aged 24 in 2014. "Everyone else is looking forward to it more than I am, but if I win seven sets I will be happy," said Littler of the final, which starts at 19:30 GMT. "Michael has been in numerous finals, this is my second, I know where I went wrong last year and I am sure I will fix it. "It's the stuff of dreams, everyone wants to pick up a trophy, but you have to be at the top of your game to do it. "I have got no pressure, I am going to enjoy it, if I can get off to a quick start I'll be happy." Fourth seed Littler has looked increasingly comfortable as the tournament has progressed and raced into a 4-0 lead on Thursday. He took the opening set despite an average of 113.35 from Bunting and kicked on from there. Eighth seed Bunting won the fifth set but missed three double attempts to seal the next and Littler went further ahead with bullseye to clinch an 84 checkout. With victory in sight, the teenager treated the crowd to a spectacular 170 finish. Third seed Van Gerwen is seeking his fourth title but last triumphed in 2019, with two defeats in the final since then. "I have been there before, the smell is not good enough, you want to touch it," said the Dutchman. "Luke's been there, he has had a sniff. I am going to make sure he keeps it as just a sniff as well. "I was the favourite two years ago and lost. Now I'm not favourite, and maybe I'm going to win it. You never know."

  The way Littler demolished former BDO world champion Bunting showed why he has taken the world of darts by storm as he threw 13 180s and took out three ton-plus finishes. "It has been an amazing tournament so far," he said. "I have just beaten what's in front of me and I am glad to get through." Littler has risen from 164 to number four in the world rankings since his fairytale run to the final in January 2024, where he lost to Luke Humphries. He won 10 titles in his debut year as a professional, amassed more than £1m in prize money and was named BBC Young Sports Personality of the Year. In the process, he has helped the profile of darts soar, with the number of junior academies doubling. Google say he was the most searched-for athlete online in the UK during 2024. "I have won plenty of titles leading up to this, that is what we do, we lead up to the big one, I can't wait for the final," said Littler.

  Van Gerwen will compete in his seventh world championship final

  Van Gerwen started strongly against Dobey, who was unable to reel him in with the Dutchman's 98.84 average enough to seal victory. England's Dobey had knocked out 2021 champion Gerwyn Price in the last eight but failed to reach the same level in his first world semi-final appearance. Dobey missed three darts at the double in the second set to go two behind, and while the world number 15 fought back to win the third - where he notched a 170 'Big Fish' checkout before a 108 finish - it was a brief highlight. Van Gerwen rattled off the next four sets with the minimum of fuss to reach the final for a seventh time. He threw eight 180s and took out three ton-plus checkouts, including a majestic 158. "I'm here with a mission and a target. You will have ups and downs but I showed a good mentality," he said. "Even when things were not going my way I was able to produce good stuff at the right moments. That gives me a lot of confidence."
