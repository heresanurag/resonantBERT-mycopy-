title: Why did Trump float takeovers of Greenland and the Panama Canal? - BBC News
date: '2024-12-25'
section: World
url: http://www.bbc.co.uk/news/articles/c1lnzzd1zrmo
content: |-
  Trump's promises to use America's strength to its advantage helped propel him twice to the White House.

  Greenland and the Panama Canal aren't for sale. Why is Trump threatening to take them?

  President-elect Donald Trump ran on a platform of isolating the US from foreign conflicts like the Ukraine war, increasing tariffs on foreign trade partners, and rebuilding domestic manufacturing. But in recent days he has suggested a more outwardly aggressive approach for his foreign policy. At first, he joked about Canada being an additional US state. Since, he has threatened to take back control of the Panama Canal. He also reiterated a desire from his first term to own the autonomous Danish territory of Greenland, which is not for sale. The US is unlikely to take control of any of these regions. But these statements could indicate that Trump's "America First" vision includes flexing the superpower's muscle beyond its borders for US trade and national security interests. On Sunday, Trump told a conservative conference in Arizona that Panama was charging US ships "ridiculous, highly unfair" fees to use its namesake canal. After taking charge of building the canal in the early 20th century, the US turned full control over to Panama in the 1970s via a treaty. But this week, Trump said that if the "rip off" did not stop, he would demand the canal be returned to the US – though he did not specify how. Trump added he did not want the Panama Canal "falling into the wrong hands" and specifically cited China, which has significant interests in the waterway. "There's a real US national security interest... in controlling its neutrality," Will Freeman, a fellow on Latin American studies at the Council on Foreign Relations, said of Trump's remarks. "Trump's statement is mostly about that." China is the second-largest user of the Panama Canal after the US, according to data. It has major economic investments in the country as well. In 2017, Panama cut diplomatic ties with Taiwan and recognised it as part of China, a major win for Beijing. The Panama Canal is not only essential for US trade in the Pacific, Mr Freeman said - in the event of any military conflict with China, it would be needed to move US ships and other assets. He also noted Trump's frequent comments about trade partners' unfair treatment of the US, as well as the president-elect's pledge to sharply increase tariffs on foreign goods, particularly those from China. Trump's complaints about shipping fees seemed to reflect his views on trade, Mr Freeman said. While the statements might be "coercive", said Mr Freeman, it remained to be seen "whether canal authorities lower fees on US cargo in response to the threat". Panama's President José Raúl Mulino has released a statement saying that the canal and the surrounding area belonged to his country - and would remain so.

  Over the weekend, Trump said in a social media post that the US "feels that the ownership and control of Greenland is an absolute necessity" for reasons of national security and global freedom. The US maintains Pituffik Space Base in Greenland. The territory is rich with natural resources, including rare earth minerals, and occupies a strategic location for trade as global powers seek to expand their reach in the Arctic Circle. Russia, in particular, sees the region as a strategic opportunity. Trump floated the idea of purchasing Greenland in 2019, during his first term as president, and it never came to fruition. Greenland's prime minister, Múte B Egede, responded to Trump's latest comments this week: "We are not for sale and we will not be for sale." On Truth Social, Trump's account showed an image of an American flag being planted in the middle of the Panama Canal. His second-eldest son, Eric Trump, posted an image on X that showed the US adding Greenland, the Panama Canal and Canada to an Amazon online shopping cart. For Trump, promises to use America's might to its advantage helped propel his two successful presidential campaigns. It was a tactic he used during his first presidency, threatening tariffs and the deployment of "armed soldiers" to steer Mexico into beefing up enforcement along its US border. Heading into his second term, Trump could plan to use a similar playbook once he takes office on 20 January. While it remains to be seen what will happen, Denmark has expressed a willingness to work with his administration. It also announced a huge boost in defence spending for Greenland, hours after Trump repeated his desire to purchase the Arctic territory.
