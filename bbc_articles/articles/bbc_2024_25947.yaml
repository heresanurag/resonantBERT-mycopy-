title: 'David Warner: Former Australia opener ''available'' for India series despite
  Test retirement - BBC Sport'
date: '2024-10-22'
section: Australia
url: http://www.bbc.co.uk/sport/cricket/articles/c0lwl2y8g97o
content: |-
  Former Australia opener David Warner says he is available to come out of Test retirement for the upcoming series against India.

  David Warner played 383 matches for Australia across all three formats

  Former Australia opener David Warner says he is available to come out of Test retirement to play in the upcoming series against India. Steve Smith has opened alongside Usman Khawaja in the four Tests Australia have played since Warner, 37, retired in January. However, Smith will move back to number four for the series against India, starting in November, because all-rounder Cameron Green is out with a back injury, meaning Australia have to find another partner for Khawaja. "I'm always available, just got to pick up the phone," Warner told Code Sports. "I'm always dead serious." Warner said he has messaged both Australia coach Andrew McDonald and chief selector George Bailey about returning. However, he said McDonald replied saying "you retired". Cameron Bancroft, Marcus Harris, Sam Konstas and Matthew Renshaw are the most likely candidates to partner Khawaja, with no indication Australia are considering a recall for Warner. Australia host India in five Tests from November to January, with the tourists looking to retain the Border-Gavaskar Trophy.

  Warner scored 8,786 runs at an average of 44.59 in 112 Tests, with 26 centuries, his final match coming in victory over Pakistan at his home Sydney Cricket Ground. The left-hander also retired from one-day internationals in the lead-up to his final Test, and from T20 internationals following Australia's exit from the T20 World Cup in June. Warner is continuing to play T20 franchise cricket and has signed a two-year deal to represent Sydney Thunder in the Big Bash League. He has not played in the Sheffield Shield, Australia's domestic red-ball competition, since 2021, but said he would be "more than happy" to play in the next round of fixtures if he was "really needed" for the India series. He added: "I did retire for the right reasons to finish the game, and I wanted to finish. But my hand is up if they desperately need someone. I'm not going to shy away from that." Smith struggled in his four Tests as opener, scoring 171 runs at an average of 28.50, with Green's absence after spinal surgery allowing the former captain to move back to his preferred spot at number four. Bancroft, Harris and Renshaw have all struggled in their limited Test careers, though Bancroft, who has not played for Australia since the 2019 Ashes, has been in fine form in the Sheffield Shield over the past two years. New South Wales opener Konstas, 19, has only played five first-class matches, but hit centuries in both innings in the opening round of this year's Shield.
