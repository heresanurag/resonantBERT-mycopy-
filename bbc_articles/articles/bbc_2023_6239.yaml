title: 'Watch: Elon Musk on the BBC row - BBC News'
date: '2023-04-12'
section: General
url: http://www.bbc.co.uk/news/world-us-canada-65248354
content: |-
  In a last-minute interview with the BBC's James Clayton, Mr Musk was asked about the "government funded" Twitter label.

  Elon Musk has spoken to the BBC's James Clayton, in a last-minute interview at the Twitter HQ.

  The BBC was labelled "government funded" on its Twitter page, something the corporation objected to.
