content: |-
  Warner Bros CEO David Zaslav was speaking a graduation ceremony for students at Boston University.

  David Zaslav, the boss of entertainment company Warner Bros Discovery, was giving a speech at a Boston University graduation ceremony when he was interrupted by students shouting "pay your writers", in support of the writers strike in the United States.

  The Writers Guild of America has been on strike for three weeks, seeking better pay and contracts for TV and film screenwriters.

  During the speech, graduates turned their back on Mr Zaslav, and some protesters also gathered with banners outside the campus.
