content: |-
  A collection of some of the best looks from Sunday's awards in Los Angeles.

  The best looks from the Grammys red carpet

  The Smith household was represented by sibling stars Jaden Smith and Willow Smith who turned heads on arrival

  Music stars stepped out in their gladrags for the Grammys on Sunday night in Los Angeles. Here are some of the best looks from on the red carpet and inside the premiere ceremony before the main show.

  Sabrina Carpenter wore a sky blue dress. Not a garment you would want to spill your espresso on. She won best pop solo performance for her coffee-coloured summer hit as well as best pop vocal album for Short n' Sweet.

  Breakthrough star Chappell Roan was crowned best new artist. She wore a fittingly striking outfit - a yellow and baby blue Jean-Paul Gaultier number, inspired by artist Edgar Degas's depiction of ballet dancers. And makeup. So much makeup.

  Olivia Rodrigo wore a vintage Versace halter-neck dress as she took to the red carpet.

  Alicia Keys now has 17 Grammy wins to her name, after picking up the honorary Dr. Dre Global Impact Award. And she had the biggest earrings of the night, too. Ornate ones that required their own headband to hold them in place.

  Previous Grammy winner Billie Eilish was back in the house with her brother and trusted producer Finneas. Together they performed Birds of a Feather - her 2024 track, not the old BBC sitcom. She was nominated for most of the night's major awards once again but no joy this time around, though she did seem to enjoy Charli XCX's performance of their flirtatiously fashioned-themed track, Guess, a lot.

  Charli's boots were made for walking, right up to the stage where she brought the party with a raucous medley of Brat floorfillers including Von Dutch - which had earlier won best dance/pop recording.

  She was nominated for six awards - including best album for The Tortured Poets Department - but like another of the Grammys' biggest darlings, Eilish, went away empty handed. The album prize went to Beyoncé, and Swift did present her fellow singer with another award on the night.

  Kacey Musgraves waved to photographers as she arrived. She later got her hands on an award - her eighth - for best country song, for The Architect.

  Kanye West wore black while his wife Bianca Censori wore, well, next to nothing. It caused a bit of a stir at the venue and online. He was up for best rap song for his and Ty Dolla $Ign's track Carnival. The award went to Kendrick Lamar's Not Like Us, but the couple were already gone after their stunt.

  Wicked star Cynthia Erivo had her nails painted with diamonds, moons and stars ahead of her Grammys performance of Fly Me To The Moon in honour of late producer Quincy Jones.

  Poppy was up for best metal performance for Suffocate, a track she features on alongside Knocked Loose. And she went for a smart-casual look.

  Best new artist nominee Benson Boone later slipped into something a little more comfortable than this to backflip around the Grammys stage during his performance.

  It was all white on the night for US singer Gracie Abrams, who was nominated for best pop duo/group performance for her track Us, featuring Taylor Swift. Having supported Swift on some of her Eras tour dates, she knows how to dress for a big occasion, choosing a butter chiffon Chanel dress, with a bridal veil.

  A be-horned Kim Gordon, of Sonic Youth fame, was up for two best alternative music awards.

  Kehlani walked the red carpet with her daughter, Adeya Nomi. The singer was nominated for three awards including best R&B song for After Hours.

  Knxwledge and Anderson .Paak accepted the best progressive R&B album gong for Why Lawd? Unusually, the prize was a tie. They shared the award with Avery*Sunshine for her album, So Glad to Know You.

  Sierra Ferrell swept the board in the American Roots categories, winning four awards - and beating Beyoncé for best Americana performance.

  Singer-songwriter Norah Jones was all smiles on arrival. She won best traditional pop vocal album for Visions.

  Kelsea Ballerini may have lost best country duo/group performance to Beyoncé and Miley Cyrus. But she was a winner still with this outfit.

  Sean Ono Lennon picked up the award for best rock performance on behalf of his late dad's band, The Beatles. You may have heard of them.

  St. Vincent scored several awards on the night, including best alternative music album for All Born Screaming. The rock star also had some fun on the red carpet with fellow musician Charlotte Kemp Muhl.

  Green Day - fronted by Billie Joe Armstrong (centre) - were up for several rock awards. They lost one to the Beatles which might explain the sulky look here.

  Raye represented the UK in the songwriter of the year and best new artist categories, as well as performing on the night.

  Nine-time Grammy winner Sheryl Crow knows her way around a red carpet, as well as a rousing chorus. She played her part in a musical tribute to the city of LA.

  Celebrity couple Chrissy Teigen and John Legend, who also performed on Sunday, let their eyes do the smiling.

  Comedian and former Daily Show presenter Trevor Noah was suited and booted for his fifth stint hosting the Grammys. During the ceremony, Noah poked fun at returning US President Donald Trump's stance on immigration, Shakira's homeland of Colombia and Taylor Swift's fans. Brave man, especially with the last one.

  Madison Beer was up for best dance pop recording for Make You Mine.

  Teddy Swims, and he also scrubs up well for the big occasion. He showed why he was nominated for best new artist with his performance on the night.

  Lady Gaga was dressed to kill in her best leather. Die With a Smile, her song with Bruno Mars, slayed all opponents in the best pop duo/group performance category. The duo also staged a special performance of the 1960s song California Dreamin' in honour of those affected by the Los Angeles wildfires.

  LA firefighters were invited this year in honour of their work helping to tackle the fatal blazes, coverage of which featured heavily in this year's ceremony.

  Florida rapper Doechii, who first broke through on TikTok, went for a preppy look

  Doechii was all smiles before and after becoming only the third female artist to win best rap album for Alligator Bites Never Heal. She followed in the footsteps of Lauryn Hill and Cardi B, both of whom she namechecked in her powerful acceptance speech.

  Speaking of Cardi B... The best rap performance nominee may have lost out to Kendrick Lamar on the night, but she still shone as ever in a vintage gold Roberto Cavalli dress with a feathery twist.

  US country musician Shaboozey performed a rendition of his chart-conquering hit, A Bar Song (Tipsy), at this year's main ceremony. Let's raise a glass to that... It was nominated for song of the year, which was ultimately won by Kendrick Lamar's Not Like Us.

  Miley Cyrus was already a winner by the time she walked the red carpet in a black Saint Lauren cut-out dress. II Most Wanted, her collaboration with star of the night Beyoncé', won one of the early prizes for best country duo/group performance.

  Jaden and Willow's dad, Will Smith, was once again the man in black as he stepped out for his first major awards outing since slap-gate at the Oscars in 2022. He was there to pay tribute to Quncy Jones during a special segment dedicated to the late producer, who died recently aged 91 at his home in Bel Air.

  Sunglasses indoors is par for the course for socialite Paris Hilton.

  Finally, feliz cumpleaños to Colombian star Shakira who performed at the Grammys on her birthday. Her main present this year was the prize for best Latin pop album for Las Mujeres Ya No Lloran. "I want to dedicate this award to all my immigrant brothers and sisters in this country" she declared.

  **The big winners on the night, Beyoncé and Kendrick Lamar, were either too cool or too (fashionably) late to walk the red carpet beforehand. But just for good measure, here's what they were wearing while collecting their awards.
