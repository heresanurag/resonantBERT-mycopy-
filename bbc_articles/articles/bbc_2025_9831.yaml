  In October last year I tuned in to a routine bail hearing online when, without warning, the posh English persona disappeared. Speaking in a clear American accent he told the judge he was born Nicholas Alahverdian before his name changed to Rossi. As he claimed to have hidden his identity to escape "death threats", I found myself wondering why he'd chosen that specific moment for the mask to slip. The saga continues, but the novelty has worn off. The intrigue and farce has been stripped away while the serious allegations remain. In August, Nicholas Rossi is due to face the first of two separate rape trials. He denies all the charges.

  The story of Nicholas Rossi, the US fugitive who came to the UK with a new identity after faking his own death.
